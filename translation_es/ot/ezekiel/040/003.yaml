translation:
  language: es
  text: Me llevó allí, y he aquí, un hombre cuya apariencia era como la apariencia de bronce[a], con un cordel de lino[b] en su mano y una caña de medir; y estaba de pie en el portal[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: "cuya apariencia era como bronce". El hebreo repite "apariencia" para dar énfasis.'
    reason: lexical_alternative
  - marker: b
    text: 'O: "un cordel de lino hilado" o "una línea de lino". El hebreo puede referirse a una cuerda hecha de lino/flax.'
    reason: lexical_alternative
  - marker: c
    text: 'O: "en la puerta". El término hebreo puede referirse a la estructura del portal o al área de acceso.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּבֵא
  english_pob_choice: He brought
  chosen_spanish: Me llevó
  alternatives_spanish:
  - Me trajo
  - Y me llevó
  lexicon: HALOT
  rationale: El hebreo sigue la acción narrativa con el verbo de movimiento en forma consecutiva. En español, 'me llevó' expresa con naturalidad el desplazamiento del profeta al lugar de la visión sin añadir una carga interpretativa innecesaria.
- source_word: שָׁמָּה
  english_pob_choice: there
  chosen_spanish: allí
  alternatives_spanish:
  - allá
  - a ese lugar
  lexicon: HALOT
  rationale: El adverbio señala el lugar inmediato de la visión. 'Allí' es la forma más natural y precisa en español.
- source_word: וְהִנֵּה
  english_pob_choice: and behold
  chosen_spanish: y he aquí
  alternatives_spanish:
  - y miren
  - y entonces
  lexicon: HALOT
  rationale: '''Y he aquí'' conserva el registro profético y la función discursiva de introducir una visión súbita o destacada, sin volverlo coloquial.'
- source_word: אִישׁ
  english_pob_choice: a man
  chosen_spanish: un hombre
  alternatives_spanish:
  - una persona
  - un varón
  lexicon: HALOT
  rationale: El hebreo usa el sustantivo común masculino singular. 'Un hombre' preserva el valor léxico y evita neutralizar el referente.
- source_word: מַרְאֵהוּ כְּמַרְאֵה נְחֹשֶׁת
  english_pob_choice: whose appearance was like the appearance of bronze
  chosen_spanish: cuya apariencia era como la apariencia de bronce
  alternatives_spanish:
  - cuya apariencia era como bronce
  - de apariencia semejante al bronce
  lexicon: HALOT
  rationale: Se conserva la repetición de 'apariencia' del hebreo para no borrar el énfasis retórico. 'Bronce' es la equivalencia más idiomática y tradicional para esta descripción visionaria; 'cobre' es posible, pero menos natural aquí.
- source_word: פְּתִיל פִּשְׁתִּים
  english_pob_choice: a linen cord
  chosen_spanish: un cordel de lino
  alternatives_spanish:
  - una cuerda de lino
  - una línea de lino
  - un cordel de lino o de lino hilado
  lexicon: HALOT
  rationale: La expresión denota un cordel hecho de lino/flax, probablemente para medir. 'Cordel de lino' es claro y conserva la materia del hebreo sin forzar el sentido técnico.
- source_word: בְּיָדוֹ
  english_pob_choice: in his hand
  chosen_spanish: en su mano
  alternatives_spanish:
  - en la mano
  - en su mano derecha
  lexicon: HALOT
  rationale: El singular es explícito en el hebreo y se mantiene. 'En su mano' reproduce la imagen concreta sin añadir orientación no indicada.
- source_word: קְנֵה הַמִּדָּה
  english_pob_choice: a measuring reed
  chosen_spanish: una caña de medir
  alternatives_spanish:
  - una caña de medición
  - un bastón de medir
  - una vara de medir
  lexicon: HALOT
  rationale: La expresión nombra un instrumento de medición hecho de caña/reed. 'Caña de medir' es transparente en español y conserva el objeto como instrumento, no como mero símbolo.
- source_word: וְהוּא עֹמֵד
  english_pob_choice: and he was standing
  chosen_spanish: y él estaba de pie
  alternatives_spanish:
  - y estaba de pie
  - y permanecía de pie
  - y se hallaba de pie
  lexicon: HALOT
  rationale: El participio describe una postura continua. 'Estaba de pie' expresa mejor ese aspecto descriptivo que un simple pretérito puntual.
- source_word: בַּשַּׁעַר
  english_pob_choice: in the gateway
  chosen_spanish: en la puerta
  alternatives_spanish:
  - en el portal
  - en la puerta de acceso
  - en la entrada
  lexicon: HALOT
  rationale: Aunque en contextos arquitectónicos puede abarcar la estructura del acceso, en español 'puerta' mantiene el valor básico del término sin sobrecargar el lector con tecnicismo. La ambigüedad entre puerta/portal se conserva de forma natural.
theological_decisions:
- issue: Identidad del 'hombre' de la visión
  english_pob_reading: Rendered simply as 'a man' without identifying him as an angel or theophany.
  chosen_spanish_reading: Se traduce simplemente como 'un hombre', sin identificarlo como ángel, mensajero o figura teofánica.
  alternative_spanish_readings:
  - un ángel
  - un mensajero celestial
  - una figura teofánica
  rationale: El hebreo solo presenta a un 'hombre' con rasgos visionarios y herramientas de medir. La traducción no debe resolver esa identidad con más precisión de la que ofrece el texto, para preservar la tensión interpretativa documentada por POB.
  doctrine_reference: 'Principio de prudencia exegética: no importar una identificación teológica que el versículo no explicita.'
translation_notes:
  revision_awareness: 'Este borrador mantiene el estado de alta concordancia del expediente en inglés y no introduce revisiones sustantivas respecto al sentido auditado: conserva la repetición de ''apariencia'', el instrumento de medición, y la ambigüedad funcional de שַׁעַר sin resolverla doctrinalmente.'
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' fuera del versículo porque no aparece en el texto fuente.
  - Se conserva el tono visionario con 'y he aquí' para reflejar el marcador discursivo hebreo.
  - No se normaliza 'bronce' a 'cobre', porque el expediente inglés ya justificó 'bronze' como la opción idiomática más adecuada en este contexto visionario.
  - Se usa 'caña de medir' para preservar el carácter instrumental del hebreo y evitar una paráfrasis excesiva.
