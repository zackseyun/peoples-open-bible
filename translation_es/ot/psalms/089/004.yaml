translation:
  language: es
  text: 'Yo he hecho un pacto con mi escogido[a]; he jurado a David mi siervo:'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo literalmente: "he cortado un pacto con mi escogido".'
