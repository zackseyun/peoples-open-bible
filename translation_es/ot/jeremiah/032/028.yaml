review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el hebreo: mantiene la transición inferencial (''Por tanto''), la fórmula profética (''así dice Yahvé''), el aspecto inminente/progresivo de נֹתֵן, el modismo de control (''en manos de''), el etnónimo ''caldeos'' y el sujeto singular de וּלְכָדָהּ referido naturalmente a Nabucodonosor. Sin embargo, omite la nota léxica preservada en el rastro inglés sobre la forma hebrea del nombre נְבוּכַדְרֶאצַּר, que sigue siendo pertinente en español porque el texto principal usa la forma tradicional castellana ''Nabucodonosor''.'
  spanish_quality_summary: El español es claro, digno y ampliamente legible. La única mejora recomendada es sustituir 'He aquí' por 'Miren[a]' o 'Mira[a]' para evitar un giro más arcaizante de lo necesario y para anclar la nota léxica exigida. También conviene suavizar 'en manos de' a singular idiomático 'en mano de' para corresponder más estrechamente al hebreo repetido בְיַד sin perder naturalidad.
  glossary_alignment: 'Se alinea correctamente con la terminología del proyecto: יְהוָה → ''Yahvé''; הַכַּשְׂדִּים → ''los caldeos''; la referencia al rey de Babilonia está bien; no hay conflictos con otros términos doctrinales del glosario. La forma castellana ''Nabucodonosor'' es aceptable si se conserva en nota la variante más cercana al hebreo.'
  issues:
  - severity: medium
    issue: Falta la nota léxica sobre la forma hebrea del nombre del rey.
    rationale: El audit trail inglés preserva explícitamente la variante hebrea 'Nebuchadrezzar' frente a la forma tradicional inglesa. En español, como se usa la forma tradicional 'Nabucodonosor', corresponde mantener una nota equivalente que informe que el hebreo aquí tiene una forma más cercana a 'Nebucadrezar'.
  - severity: low
    issue: '''He aquí'' suena más arcaico de lo necesario para el estilo meta del proyecto.'
    rationale: Aunque fiel a הִנְנִי, el español moderno y eclesial amplio puede expresar la deíxis solemne con 'Miren' o 'Mira' sin perder sentido. Esto mejora la legibilidad.
  - severity: low
    issue: '''en manos de'' puede ajustarse a ''en mano de'' para reflejar mejor el singular hebreo y el modismo bíblico en español.'
    rationale: Ambas opciones son comprensibles, pero 'entregar en mano de' es un giro bíblico-natural en español y corresponde más de cerca al doble בְיַד del hebreo.
  revised_spanish_text: 'Por tanto, así dice Yahvé: Miren[a], estoy entregando esta ciudad en mano de los caldeos y en mano de Nabucodonosor, rey de Babilonia, y él la capturará.'
  revised_footnotes:
  - marker: a
    text: 'Hebreo: una forma del nombre más cercana a «Nebucadrezar»; tradicionalmente se vierte «Nabucodonosor» en español.'
