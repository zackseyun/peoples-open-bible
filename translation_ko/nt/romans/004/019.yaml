translation:
  language: ko
  text: 그는 믿음이 약해지지 않고, 백 세쯤 된 자기 몸이 이미 죽은 것과 같음과, 사라의 태가 죽었음을 깊이 살폈습니다.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: κατενόησεν
  english_pob_choice: considered
  chosen_korean: 깊이 살폈습니다
  alternatives_korean:
