review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador capta bien el sentido general del hebreo: lamento contra Moab, destrucción del pueblo de Quemos y deportación de hijos e hijas. Sin embargo, no preserva con suficiente precisión el contraste léxico de בָּנֶיךָ / וּבְנֹתֶיךָ, porque «tus hijos ... y tus hijas» en español puede sonar parcialmente redundante o inclusivo en el primer miembro. Además, la nota al pie está anclada en «Moab» en lugar del segmento relevante de cautiverio, y el texto de la nota no refleja con precisión la alternativa inglesa auditada.'
  spanish_quality_summary: 'El español es claro y digno, pero requiere un pequeño ajuste para mayor fidelidad y naturalidad: «tus hijos» debe ser «tus hijos varones» o preferiblemente «tus hijos» solo si no hubiera contraste explícito con hijas; aquí sí lo hay, por lo que conviene marcar el masculino. También conviene mover la nota al lugar semánticamente pertinente. «Quemos» y «¡Ay de ti!» son legibles y adecuados.'
  glossary_alignment: No hay conflicto con la terminología principal del proyecto. «Quemos» es una transliteración española aceptable para כְּמוֹשׁ. No aparece Yahvé/Mesías u otros términos sensibles del glosario. La decisión de mantener «cautivos / en cautiverio» concuerda con la revisión inglesa que uniformó los términos cercanos.
  issues:
  - severity: medium
    issue: «tus hijos» no refleja con suficiente precisión el masculino específico frente a «tus hijas».
    rationale: El hebreo contrasta explícitamente hijos varones e hijas. En español, «hijos» puede percibirse como inclusivo; en este contexto conviene evitar ambigüedad.
  - severity: medium
    issue: La nota al pie está anclada en «Moab» en vez de la frase de cautiverio donde pertenece la alternativa léxica.
    rationale: Las notas deben marcar el lugar exacto del texto al que comentan. La alternativa trata sobre los dos términos hebreos de cautiverio, no sobre «Moab».
  - severity: low
    issue: El texto de la nota dice «para ambos miembros del paralelismo», pero la formulación puede precisarse mejor en español.
    rationale: La nota inglesa auditada explica que los dos términos hebreos son casi sinónimos y forman un paralelo poético; conviene expresarlo con mayor claridad.
  revised_spanish_text: ¡Ay de ti, Moab! El pueblo de Quemos ha perecido, porque tus hijos varones han sido llevados cautivos[a], y tus hijas, en cautiverio.
  revised_footnotes:
