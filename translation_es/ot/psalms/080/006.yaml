translation:
  language: es
  text: Los alimentaste con pan de lágrimas[a], y les diste a beber lágrimas en abundancia.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «lágrimas por la tercera medida» o «en medida triple»; el término final probablemente alude a una medida grande, pero su fuerza precisa es incierta.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הֶאֱכַלְתָּם
  english_pob_choice: You have fed them
  chosen_spanish: Los alimentaste
  alternatives_spanish:
  - Los has alimentado
  - Los hiciste comer
  lexicon: HALOT
  rationale: 'El hifil de אכל es causativo: ‘hacer comer’ / ‘alimentar’. En español, ‘alimentaste’ comunica con naturalidad esa acción causativa sin volverla más explicativa de lo que el hebreo permite. Se mantiene el sujeto divino implícito del salmo.'
- source_word: לֶחֶם
  english_pob_choice: bread
  chosen_spanish: pan
  alternatives_spanish:
  - alimento
  - comida
  lexicon: HALOT
  rationale: El hebreo dice literalmente ‘pan’, y conviene conservar esa imagen concreta porque forma parte del paralelismo poético. ‘Alimento’ o ‘comida’ suavizarían la metáfora.
- source_word: דִּמְעָה
  english_pob_choice: of tears
  chosen_spanish: de lágrimas
  alternatives_spanish:
  - con lágrimas
  - lleno de lágrimas
  lexicon: HALOT
  rationale: Se conserva la construcción metafórica ‘pan de lágrimas’ para reproducir la imagen hebrea sin convertirla en una paráfrasis adjetival.
- source_word: וַתַּשְׁקֵמוֹ
  english_pob_choice: and given them to drink
  chosen_spanish: les diste a beber
  alternatives_spanish:
  - los hiciste beber
  - les hiciste beber
  lexicon: HALOT
  rationale: 'El hifil de שקה es causativo: ‘dar de beber / hacer beber’. ‘Les diste a beber’ suena natural en español y conserva el valor causativo y el paralelismo con ‘alimentaste’.'
- source_word: בִּדְמָעוֹת
  english_pob_choice: tears to drink
  chosen_spanish: lágrimas
  alternatives_spanish:
  - con lágrimas
  - de lágrimas
  lexicon: HALOT
  rationale: Con el verbo de beber, la preposición marca la sustancia dada a beber. En español, ‘les diste a beber lágrimas’ transmite esa idea de manera idiomática y preserva el paralelismo poético.
- source_word: שָׁלִישׁ
  english_pob_choice: in full measure
  chosen_spanish: en plena medida
  alternatives_spanish:
  - en medida triple
  - en tres medidas
  - con creces
  lexicon: HALOT
  rationale: שָׁלִישׁ es un término de medida oscuro. La traducción ‘en plena medida’ sigue la decisión POB inglesa de conservar la idea de abundancia sin fingir precisión metrológica. ‘En medida triple’ queda como alternativa más literal, pero incierta.
translation_notes:
  revision_awareness: El pasaje coincide estrechamente con el texto hebreo masorético; la solución española sigue la lectura del POB inglés y conserva la metáfora poética sin añadir interpretaciones doctrinales o explicativas no exigidas por el contexto. No se detectaron revisiones posteriores que alteren la línea de traducción.
  spanish_consistency_notes:
  - Se mantiene el tuteo reverencial implícito en la segunda persona plural del poema bíblico (‘alimentaste’, ‘diste’), coherente con el habla directa a Dios en el salmo.
  - Se conservan imágenes corporales concretas (‘pan’, ‘lágrimas’, ‘beber’) en lugar de generalizarlas, para respetar el paralelismo hebreo.
  - ‘En plena medida’ evita resolver artificialmente la ambigüedad de שָׁלִישׁ y deja visible la tensión lexical documentada en el audit trail.
