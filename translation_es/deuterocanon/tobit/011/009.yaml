translation:
  language: es
  text: 'Y Ana corrió hacia su hijo y cayó sobre el cuello de su hijo[a], y le dijo: «Te he visto, hijo».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literalmente, «cayó sobre el cuello de su hijo», un modismo que expresa un abrazo emotivo.
    reason: lexical_alternative
lexical_decisions:
- source_word: προσδραμοῦσα
  english_pob_choice: ran up
  chosen_spanish: corrió hacia él
  alternatives_spanish:
  - corrió hasta él
  - se acercó corriendo
  lexicon: LSJ
  rationale: El participio expresa un movimiento rápido hacia la persona encontrada. «Corrió hacia él» conserva la vivacidad sin sonar forzado en español. «Se acercó corriendo» es posible, pero resulta algo más explicativo.
- source_word: ἐπέπεσεν ἐπὶ τὸν τράχηλον
  english_pob_choice: fell on the neck
  chosen_spanish: cayó sobre el cuello
  alternatives_spanish:
  - se echó sobre el cuello
  - se abrazó al cuello
  lexicon: LSJ
  rationale: La frase griega conserva la imagen concreta de un abrazo emotivo. «Cayó sobre el cuello» sigue de cerca la metáfora corporal y evita suavizarla demasiado. «Se abrazó al cuello» transmite el sentido, pero sustituye la imagen tradicional del original.
- source_word: τὸν τράχηλον
  english_pob_choice: the neck
  chosen_spanish: el cuello
  alternatives_spanish:
  - el cuello de él
  - su cuello
  lexicon: LSJ
  rationale: El griego usa una construcción concreta («el cuello de su hijo»). «El cuello» mantiene la imagen física y funciona bien junto con la mención siguiente de «su hijo».
- source_word: τοῦ υἱοῦ αὐτῆς
  english_pob_choice: of her son
  chosen_spanish: de su hijo
  alternatives_spanish:
  - de su hijo varón
  - de su muchacho
  lexicon: LSJ
  rationale: υἱός significa específicamente «hijo». «Hijo» preserva esa precisión y evita generalizar a «niño» o «muchacho» en este miembro de la frase.
- source_word: Εἶδόν σε
  english_pob_choice: I have seen you
  chosen_spanish: Te he visto
  alternatives_spanish:
  - Te vi
  - Te he encontrado
  lexicon: LSJ
  rationale: El aoristo expresa el encuentro ya cumplido con fuerza afectiva. «Te he visto» reproduce bien el valor perfectivo y la alegría del reencuentro. «Te vi» suena más narrativo y menos emotivo.
- source_word: παιδίον
  english_pob_choice: child
  chosen_spanish: niño
  alternatives_spanish:
  - hijo mío
  - pequeño
  lexicon: LSJ
  rationale: παιδίον es un diminutivo afectuoso. En este contexto, «niño» mantiene la ternura sin añadir posesión ni dulcificación extra. Aunque el hijo ya es adulto, el vocativo maternal justifica este matiz.
translation_notes:
  revision_awareness: El texto griego y el audit trail inglés están en alta concordancia; no se registran revisiones aplicadas. Se mantuvo la imagen idiomática del abrazo sin desplazarla por una paráfrasis más interpretativa.
  spanish_consistency_notes:
  - Se usó «Y» al inicio para seguir la cadencia narrativa continua del relato.
  - Se prefirió «Y Ana» como forma natural y transparente de Ἄννα.
  - Se mantuvo el vocativo entre comillas españolas para reflejar el habla directa.
  - No se introdujo lenguaje eclesiástico ajeno al griego; el versículo es doméstico y afectivo.
