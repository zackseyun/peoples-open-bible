translation:
  language: es
  text: 'Los hijos de Yaflet: Pasaj[a], Bimhal y Ashvat[b]. Estos fueron los hijos de Yaflet.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «Pasah» para el primer nombre listado. Las transliteraciones de nombres personales hebreos varían según la tradición editorial.
    reason: lexical_alternative
  - marker: b
    text: O «Estos son los hijos de Yaflet». La fórmula demostrativa hebrea puede traducirse en pasado o en presente en estilo genealógico.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּבְנֵי / בְנֵי
  english_pob_choice: sons of
  chosen_spanish: hijos de
  alternatives_spanish:
  - descendientes de
  - los hijos de
  lexicon: HALOT
  rationale: En genealogías, בְּנֵי puede equivaler naturalmente a una relación filial literal o a un listado de descendientes. En español, 'hijos de' conserva la forma genealógica breve y directa sin cargar innecesariamente con un sentido técnico de linaje más amplio que el hebreo inmediato no exige aquí.
- source_word: יַפְלֵט
  english_pob_choice: Japhlet
  chosen_spanish: Yaflet
  alternatives_spanish:
  - Jaflet
  - 'Yaflet (transliteración alternativa: Jaflet)'
  lexicon: transliteración estándar del nombre propio
  rationale: Se translitera el nombre propio. 'Yaflet' refleja mejor en español el valor de י inicial y mantiene una forma legible y coherente con la pronunciación aproximada del hebreo, sin traducir el nombre.
- source_word: פָּסַךְ
  english_pob_choice: Pasach
  chosen_spanish: Pasac
  alternatives_spanish:
  - Pasaj
  - Pasah
  lexicon: transliteración del nombre propio
  rationale: El hebreo final כ en un nombre propio puede representarse en español con 'c' suave/velarizada según criterio editorial. 'Pasac' preserva la forma breve del nombre y evita una grafía inglesa como 'Pasach' que resulta menos natural en español.
- source_word: וּבִמְהָל
  english_pob_choice: Bimhal
  chosen_spanish: Bimhal
  alternatives_spanish:
  - Bimhál
  lexicon: transliteración del nombre propio
  rationale: Nombre propio transliterado de forma transparente. Se mantiene 'Bimhal' como forma legible en español, sin añadir acento gráfico porque no hay una necesidad fonológica clara en español.
- source_word: וְעַשְׁוָת
  english_pob_choice: Ashvath
  chosen_spanish: Ashvat
  alternatives_spanish:
  - Ashwath
  - Asvat
  lexicon: transliteración del nombre propio
  rationale: El grupo consonántico final se refleja con 't' final, y 'sh' conserva la articulación de שׁ en una transliteración utilizable en español. 'Ashvat' evita la terminación inglesa 'th', que no es natural en español.
- source_word: אֵלֶּה
  english_pob_choice: These were
  chosen_spanish: Estos fueron
  alternatives_spanish:
  - Estos son
  - Estos
  lexicon: HALOT
  rationale: La fórmula demostrativa genealógica puede expresarse en pasado o presente. 'Estos fueron' sigue la opción narrativa del inglés POB y suena natural en español bíblico sin perder la función resumidora del hebreo.
- source_word: בְּנֵי יַפְלֵט
  english_pob_choice: the sons of Japhlet
  chosen_spanish: los hijos de Yaflet
  alternatives_spanish:
  - los descendientes de Yaflet
  - los hijos de Jaflet
  lexicon: HALOT
  rationale: Se repite la fórmula genealógica al cierre para conservar la estructura hebrea. 'Los hijos de Yaflet' mantiene simetría con el inicio y respeta el cierre del listado.
translation_notes:
  revision_awareness: El inglés POB mantiene una estructura genealógica simple y no introduce decisiones teológicas adicionales; la revisión reciente no cambió el contenido base. La presente versión conserva esa estructura, adapta la transliteración a un español publicable y preserva la ambigüedad de la fórmula demostrativa mediante nota.
  spanish_consistency_notes:
  - Se usa 'Yahvé' como forma base del proyecto solo cuando aparece el nombre divino; en este versículo no aplica.
  - Se mantiene la repetición de la fórmula genealógica final para reflejar la estructura hebrea.
  - Se evitó 'Cristo', 'Señor' u այլ terminología no presente en el texto.
  - 'La transliteración se mantiene uniforme como criterio editorial: Yaflet, Pasac, Bimhal, Ashvat.'
