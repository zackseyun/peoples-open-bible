translation:
  language: es
  text: Sus propias manos traerán las ofrendas de alimento[a] de Yahvé; traerá la grasa junto con la pechuga, para que la pechuga sea mecida como ofrenda mecida delante de Yahvé.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, más literalmente, 'las ofrendas por fuego de Yahvé' o 'las ofrendas encendidas de Yahvé'.
    reason: lexical_alternative
lexical_decisions:
- source_word: יָדָיו
  english_pob_choice: his own hands
  chosen_spanish: sus propias manos
  alternatives_spanish:
  - sus manos
  lexicon: HALOT
  rationale: El sufijo posesivo de 3ms se expresa de modo natural con 'sus propias manos', que conserva la idea de participación personal enfatizada en el contexto ritual.
- source_word: תְּבִיאֶינָה
  english_pob_choice: shall bring
  chosen_spanish: traerán
  alternatives_spanish:
  - deberán traer
  - habrán de traer
  lexicon: HALOT
  rationale: El imperfecto causal se vierte con futuro simple en español para mantener el valor instructivo/normativo sin sonar rígidamente arcaico.
- source_word: אִשֵּׁי יְהוָה
  english_pob_choice: the food offerings of Yahweh
  chosen_spanish: los sacrificios encendidos de Yahvé
  alternatives_spanish:
  - las ofrendas por fuego de Yahvé
  - los sacrificios por fuego de Yahvé
  lexicon: HALOT
  rationale: En español, 'sacrificios encendidos' conserva el rasgo técnico del fuego y evita que 'comida' desvíe el sentido cultual. La alternativa más literal queda reflejada semánticamente en la expresión elegida, pero sin la posible ambigüedad de 'alimentos'.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  lexicon: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
  rationale: Se sigue el estándar del proyecto para el Tetragrámaton, transliterado como 'Yahvé' en el texto principal.
- source_word: הַחֵלֶב
  english_pob_choice: the fat
  chosen_spanish: la grasa
  alternatives_spanish:
  - el sebo
  - la parte grasa
  lexicon: HALOT
  rationale: En contexto sacrificial, חֵלֶב designa la porción grasa reservada para la ofrenda; 'grasa' es claro y natural en español.
- source_word: עַל הֶחָזֶה
  english_pob_choice: with the breast
  chosen_spanish: junto con el pecho
  alternatives_spanish:
  - con el pecho
  - sobre el pecho
  lexicon: HALOT
  rationale: Aunque עַל puede significar 'sobre', el flujo ritual aquí indica acompañamiento/agrupación de las porciones. 'Junto con' comunica bien esa relación sin forzar una localización física.
- source_word: יְבִיאֶנּוּ
  english_pob_choice: he shall bring
  chosen_spanish: traerá
  alternatives_spanish:
  - deberá traer
  - lo traerá
  lexicon: HALOT
  rationale: Se mantiene la continuación del mandato en futuro simple. El objeto se sobreentiende por el contexto inmediato y no requiere redundancia excesiva en español.
- source_word: הֶחָזֶה
  english_pob_choice: the breast
  chosen_spanish: el pecho
  alternatives_spanish:
  - la pechuga
  - el busto
  lexicon: HALOT
  rationale: En el registro sacrificial, 'pecho' es una equivalencia comprensible y más natural en español general que 'breast' traducido literalmente. Se evita un término coloquial o anatómicamente más marcado.
- source_word: לְהָנִיף
  english_pob_choice: to wave
  chosen_spanish: sea mecido
  alternatives_spanish:
  - sea ofrecido meciéndolo
  - sea alzado
  lexicon: HALOT
  rationale: El infinitivo causativo en esta construcción expresa la acción ritual sobre el pecho; en español pasivo se evita atribuirle al oferente la acción directa de 'mecer'. 'Mecido' conserva la imagen ritual sin sobreinterpretar el agente.
- source_word: תְּנוּפָה
  english_pob_choice: as a wave offering
  chosen_spanish: como ofrenda mecida
  alternatives_spanish:
  - como ofrenda mecida alzada
  - como ofrenda mecida delante de Yahvé
  lexicon: HALOT
  rationale: '''Ofrenda mecida'' reproduce el término técnico תְּנוּפָה con naturalidad en español y mantiene la relación con el gesto ritual. Se evita ''wave offering'' en inglés y se conserva el sentido cultual.'
- source_word: לִפְנֵי יְהוָה
  english_pob_choice: before Yahweh
  chosen_spanish: delante de Yahvé
  alternatives_spanish:
  - en presencia de Yahvé
  lexicon: HALOT
  rationale: '''Delante de Yahvé'' preserva la fórmula cultual tradicional con español claro y digno.'
theological_decisions:
- issue: Significado técnico de אִשֵּׁי יְהוָה
  english_pob_reading: food offerings of Yahweh
  chosen_spanish_reading: sacrificios encendidos de Yahvé
  alternative_spanish_readings:
  - ofrendas por fuego de Yahvé
  - sacrificios por fuego de Yahvé
  rationale: Se mantiene el valor técnico-sacrificial ligado al fuego, pero se evita 'alimentos', que en español puede sugerir comida ordinaria. 'Sacrificios encendidos' preserva la referencia cultual y es inteligible para lectores contemporáneos.
  doctrine_reference: DOCTRINE.md Translation philosophy §§1, 6
- issue: Construcción pasiva/impersonal en לְהָנִיף ... תְּנוּפָה
  english_pob_reading: that the breast may be waved as a wave offering
  chosen_spanish_reading: para que el pecho sea mecido como ofrenda mecida
  alternative_spanish_readings:
  - para que se meza el pecho como ofrenda mecida
  - para que el pecho sea ofrecido meciéndolo
  rationale: La construcción final expresa propósito y evita atribuir al oferente la acción ritual que el hebreo presenta de manera funcional. El pasivo mantiene la dirección litúrgica del gesto sin introducir un agente no explícito.
  doctrine_reference: DOCTRINE.md Translation philosophy §§1, 4
translation_notes:
  revision_awareness: La redacción sigue el ajuste de la revisión inglesa que separó claramente el traer de las porciones y el ser mecido del pecho, evitando atribuir al oferente la acción de mecer. También conserva la decisión del audit trail de tratar אִשֵּׁי como término técnico sacrificial, aunque en español se eligió una formulación más natural que 'ofrendas por fuego'.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' conforme al estándar del proyecto para el Tetragrámaton.
  - Se usa 'ofrenda mecida' de manera consistente para תְּנוּפָה.
  - '''Pecho'' se emplea como equivalente cultual de הֶחָזֶה en lugar de un término anatómico más técnico.'
