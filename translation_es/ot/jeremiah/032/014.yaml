base_translation:
  language: en
  yaml_path: translation/ot/jeremiah/032/014.yaml
  text: 'Thus says Yahweh of hosts[a], the God of Israel: Take these documents, this deed of purchase, both the sealed one and this open one, and put them in an earthenware vessel[b], so that they may last for many days.'
  footnotes:
  - marker: a
    text: Or 'these scrolls.' The Hebrew term can refer broadly to written documents; in this context they are legal transaction records.
    reason: lexical_alternative
  - marker: b
    text: Or 'this unsealed document' for 'this open copy.' The Hebrew contrasts an open document with the sealed one.
    reason: alternative_reading
  ai_draft:
    model_id: gpt-5.4
