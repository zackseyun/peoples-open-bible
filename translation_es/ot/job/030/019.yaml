translation:
  language: es
  text: Él me ha arrojado al cieno[a], y he llegado a ser como polvo y ceniza[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «al fango» o «al barro». El hebreo חֹמֶר puede denotar arcilla, barro o cieno; aquí el contexto favorece una imagen de degradación y suciedad.
    reason: lexical_alternative
  - marker: b
    text: O «he sido hecho como polvo y ceniza» / «he sido comparado con polvo y ceniza».
    reason: alternative_reading
lexical_decisions:
- source_word: הֹרָנִי
  english_pob_choice: He has thrown me
  chosen_spanish: Él me ha arrojado
  alternatives_spanish:
  - Él me ha lanzado
  - Él me ha echado
  - Él me ha precipitado
  lexicon: HALOT
  rationale: El verbo causativo con sufijo de 1.ª persona expresa una acción violenta de arremeter contra alguien. «Arrojar» conserva la fuerza del golpe y funciona con naturalidad en español bíblico contemporáneo.
- source_word: לַחֹמֶר
  english_pob_choice: into the mire
  chosen_spanish: al cieno
  alternatives_spanish:
  - al lodo
  - al barro
  - al pantano
  lexicon: HALOT
  rationale: חֹמֶר puede referirse a barro, arcilla o fango/ciénaga según el contexto. Aquí el paralelismo de humillación favorece una imagen de suciedad y degradación; «cieno» preserva ese matiz de fango/mire sin sonar demasiado técnico.
- source_word: וָאֶתְמַשֵּׁל
  english_pob_choice: I have become
  chosen_spanish: he venido a ser
  alternatives_spanish:
  - me he convertido en
  - he llegado a ser
  - he quedado como
  lexicon: HALOT
  rationale: El verbo en esta forma expresa resultado o estado asumido tras la acción previa. «He venido a ser» mantiene el sentido resultativo y la comparación que sigue, sin perder la naturalidad del español.
- source_word: כֶּעָפָר
  english_pob_choice: like dust
  chosen_spanish: como polvo
  alternatives_spanish:
  - como polvo seco
  - como tierra
  - como ceniza
  lexicon: HALOT
  rationale: עָפָר es «polvo» en sentido de fragilidad y humillación. Se conserva la comparación bíblica tradicional y el paralelismo con «ceniza».
- source_word: וָאֵפֶר
  english_pob_choice: and ashes
  chosen_spanish: y ceniza
  alternatives_spanish:
  - y polvo y ceniza
  - y las cenizas
  - y la ceniza
  lexicon: HALOT
  rationale: אֵפֶר suele ser «ceniza» en español. La pareja «polvo y ceniza» mantiene la imagen idiomática y la resonancia bíblica del abatimiento extremo.
theological_decisions:
- issue: Sujeto implícito del verbo causativo en 3.ª persona singular
  english_pob_reading: Render the subject as 'He,' referring to God in context
  chosen_spanish_reading: Se expresa con «Él», entendiendo el sujeto implícito como Dios en el contexto del lamento de Job
  alternative_spanish_readings:
  - Uno me ha arrojado al cieno
  - Me han arrojado al cieno
  - Arrojado al cieno, he venido a ser...
  rationale: El hebreo presenta un sujeto masculino singular implícito. En el discurso de Job, el referente contextual es Dios; explicitarlo como «Él» respeta la forma verbal y hace transparente la referencia sin sobreinterpretar.
  doctrine_reference: Contextual reference in Job's lament; no doctrinal change
translation_notes:
  revision_awareness: El borrador sigue el giro revisado en el audit trail inglés, que prefirió una imagen más precisa y formal para לַחֹמֶר («mire» en la última revisión) frente a una lectura más general como «mud». En español, «cieno» conserva esa formalidad relativa y la fuerza degradante de la metáfora, sin desplazar el paralelismo final con «polvo y ceniza».
  spanish_consistency_notes:
  - Se mantiene «Él» en mayúscula inicial por referencia implícita a Dios en el contexto.
  - «cieno» se usa como equivalente natural de mire/fango degradante; se evita «arcilla» porque debilitaría la humillación metafórica.
  - Se conserva la construcción perfecta compuesta («ha arrojado», «he venido a ser») para reflejar el resultado duradero del hebreo.
  - La pareja «polvo y ceniza» se mantiene por su valor idiomático y su ecos bíblico, sin añadir términos no atestiguados.
