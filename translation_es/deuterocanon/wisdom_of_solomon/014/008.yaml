translation:
  language: es
  text: Pero la cosa hecha por manos humanas está bajo maldición[a], tanto ella como el que la hizo, porque uno la hizo, pero lo perecedero fue llamado dios[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, de manera más explícita en el contexto, 'el ídolo hecho por manos humanas'. La expresión griega dice literalmente 'lo hecho por manos'.
    reason: lexical_alternative
  - marker: b
    text: O 'fue llamado un dios'.
    reason: alternative_reading
lexical_decisions:
- source_word: χειρόποιητον
  english_pob_choice: the thing made by hands
  chosen_spanish: la cosa hecha por manos
  alternatives_spanish:
  - la cosa hecha con manos
  - lo hecho por manos
  - el ídolo hecho por manos
  lexicon: LSJ
  rationale: χειρόποιητον significa literalmente algo 'hecho por manos' o 'hecho a mano'. En español, 'la cosa hecha por manos' conserva la forma y la fuerza del griego sin introducir explícitamente 'ídolo' en el texto principal. 'Por manos' reproduce la construcción instrumental de modo sobrio y entendible.
- source_word: ἐπικατάρατον
  english_pob_choice: accursed
  chosen_spanish: maldita
  alternatives_spanish:
  - acurrsada
  - bajo maldición
  - maldecida
  lexicon: LSJ
  rationale: El término expresa estar bajo maldición. 'Maldita' mantiene la carga judicial y religiosa de manera natural en español contemporáneo, equivalente a 'accursed'.
- source_word: ὁ ποιήσας αὐτό
  english_pob_choice: the one who made it
  chosen_spanish: el que la hizo
  alternatives_spanish:
  - su hacedor
  - el que la fabricó
  - el que la hizo
  lexicon: LSJ
  rationale: La frase participial se vierte de manera personal y clara. 'El que la hizo' refleja bien el griego y conserva la referencia al objeto femenino implícito en español para 'cosa'.
- source_word: ἠργάζετο
  english_pob_choice: was at work on it
  chosen_spanish: hizo
  alternatives_spanish:
  - trabajaba en ella
  - estaba trabajando en ella
  - la elaboraba
  lexicon: LSJ
  rationale: Aunque el inglés auditado opta por una nuance procesiva, el contexto griego y la revisión posterior muestran que la cláusula contrasta con 'el que la hizo'. En español, 'hizo' evita oscuridad y mantiene la relación sintáctica con el agente, sin imponer una lectura demasiado libre.
- source_word: φθαρτὸν
  english_pob_choice: the perishable thing
  chosen_spanish: la cosa perecedera
  alternatives_spanish:
  - la cosa corruptible
  - lo perecedero
  - la cosa que perece
  lexicon: LSJ
  rationale: φθαρτὸν describe lo perecedero/corruptible. 'La cosa perecedera' es natural y conserva el contraste entre la fragilidad del objeto y el título divino que se le atribuye.
- source_word: θεὸς ὠνομάσθη
  english_pob_choice: was called god
  chosen_spanish: fue llamada dios
  alternatives_spanish:
  - fue llamada un dios
  - fue nombrada dios
  - fue llamada dios
  lexicon: LSJ
  rationale: El griego usa un predicado sin artículo; el inglés POB preserva 'called god' para mantener la fuerza polémica. En español, 'fue llamada dios' conserva esa misma tensión sin suavizarla con 'un dios', que podría sugerir una clasificación distinta a la del texto.
theological_decisions:
- issue: Si explicitar 'ídolo' en el texto principal
  english_pob_reading: Keep the broader expression 'what is made by hands' rather than inserting 'idol'
  chosen_spanish_reading: Mantener 'la cosa hecha por manos' sin introducir 'ídolo' en el texto principal
  alternative_spanish_readings:
  - el ídolo hecho por manos
  rationale: El contexto de Sabiduría 14 es claramente idolátrico, pero el sustantivo/grupo léxico griego es más amplio. Mantener la expresión literal preserva la retórica y deja que la condena recaiga sobre el objeto manufacturado como tal, en línea con la primacía del original.
  doctrine_reference: 'Translation philosophy: original-language primacy over translation tradition; never paraphrase beyond what the source text warrants.'
- issue: Cómo reflejar el contraste interno de ὁ μὲν ... τὸ δὲ
  english_pob_reading: because the one made it, but the perishable thing was called god
  chosen_spanish_reading: porque el que la hizo ... la cosa perecedera fue llamada dios
  alternative_spanish_readings:
  - porque uno la hizo ... la cosa perecedera fue llamada dios
  - porque el uno la hizo ... la otra, perecedera, fue llamada dios
  rationale: La partícula contrastiva del griego distingue entre el agente y el objeto. En español, el contraste se mantiene con la duplicación referencial 'el que la hizo' / 'la cosa perecedera', sin resolver la tensión teológica de que algo perecedero reciba un nombre divino.
  doctrine_reference: 'Translation philosophy: preserve theological tension rather than resolve it; optimal equivalence.'
- issue: Si traducir θεὸς como 'dios' sin artículo
  english_pob_reading: Use 'god' without the article
  chosen_spanish_reading: Usar 'dios' sin artículo
  alternative_spanish_readings:
  - un dios
  rationale: En español, la ausencia de artículo en predicado nominal también puede conservarse. 'Dios' sin artículo mantiene la carga polémica del pasaje y evita desviar el sentido hacia una mera pertenencia a una clase de dioses.
  doctrine_reference: 'Translation philosophy: preserve theological tension rather than resolve it; optimal equivalence.'
translation_notes:
  revision_awareness: La redacción sigue el final adjudicado del inglés POB, especialmente en conservar la expresión amplia para χειρόποιητον, mantener la distinción entre el hacedor y la cosa perecedera, y reflejar la tensión del predicado θεὸς ὠνομάσθη sin resolverla con un artículo indefinido. También toma en cuenta la revisión posterior que aclaró el contraste sintáctico y evitó una paráfrasis procesiva demasiado libre.
  spanish_consistency_notes:
  - Se prefirió 'dios' sin artículo para conservar la fuerza polémica del predicado griego.
  - '''Hecha por manos'' evita insertar ''ídolo'' en el cuerpo principal y deja esa explicitación para la nota.'
  - Se mantuvo un registro bíblico claro y contemporáneo, con vocabulario sobrio y directo.
  - Se usó 'maldita' para ἐπικατάρατον por su naturalidad y peso religioso en español.
  - La referencia al objeto se mantiene femenina en español por concordancia con 'cosa'.
