translation:
  language: es
  text: 'Y Josué dijo: «Por esto sabrán que el Dios vivo[a] está en medio de ustedes, y que ciertamente expulsará[b] de delante de ustedes a los cananeos, a los hititas, a los heveos, a los ferezeos, a los girgaseos, a los amorreos y a los jebuseos».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «el Dios viviente».
    reason: lexical_alternative
  - marker: b
    text: O «desposeerá»; el verbo hebreo enfatiza la remoción segura de la tierra.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר
  english_pob_choice: And Joshua said
  chosen_spanish: Entonces Josué dijo
  alternatives_spanish:
  - Y Josué dijo
  - Luego Josué dijo
  lexicon: HALOT
  rationale: La forma narrativa wayyiqtol introduce la intervención de Josué; «Entonces» conserva el avance discursivo natural en español sin perder la secuencia narrativa.
- source_word: בְּזֹאת
  english_pob_choice: By this
  chosen_spanish: Por esto
  alternatives_spanish:
  - Con esto
  - En esto
  lexicon: HALOT
  rationale: La expresión indica el medio o señal por la cual sabrán; «Por esto» suena natural en español y mantiene el valor demostrativo-instrumental.
- source_word: תֵּדְעוּן
  english_pob_choice: you will know
  chosen_spanish: sabrán
  alternatives_spanish:
  - conocerán
  - llegarán a saber
  lexicon: HALOT
  rationale: El futuro de conocimiento se expresa de forma directa con «sabrán», que comunica el sentido predictivo del hebreo sin sobrecargar la frase.
- source_word: אֵל חַי
  english_pob_choice: the living God
  chosen_spanish: el Dios vivo
  alternatives_spanish:
  - el Dios que vive
  - el Dios viviente
  lexicon: HALOT
  rationale: «Dios» es la equivalencia natural de אֵל en este contexto; «vivo» conserva la cualidad cualitativa/definitiva del hebreo y la fórmula tradicional sigue siendo clara en español.
- source_word: בְּקִרְבְּכֶם
  english_pob_choice: among you
  chosen_spanish: en medio de ustedes
  alternatives_spanish:
  - entre ustedes
  - en su medio
  lexicon: HALOT
  rationale: La imagen espacial apunta a la presencia divina entre el pueblo; «en medio de ustedes» evita la lectura individualista que podría sugerir «dentro de ustedes».
- source_word: וְהוֹרֵשׁ יוֹרִישׁ
  english_pob_choice: he will surely drive out
  chosen_spanish: ciertamente expulsará
  alternatives_spanish:
  - sin duda echará fuera
  - seguramente desterrará
  lexicon: HALOT
  rationale: La combinación infinitivo absoluto + verbo finito intensifica la certeza. «Ciertamente expulsará» conserva esa fuerza y mantiene el matiz de remoción eficaz de los pueblos.
- source_word: מִפְּנֵיכֶם
  english_pob_choice: from before you
  chosen_spanish: de delante de ustedes
  alternatives_spanish:
  - de su presencia
  - de ante ustedes
  lexicon: HALOT
  rationale: La preposición y el sustantivo de rostro/presencia expresan remoción espacial. «De delante de ustedes» reproduce bien el giro hebreo sin sonar forzado.
- source_word: הַכְּנַעֲנִי
  english_pob_choice: the Canaanites
  chosen_spanish: a los cananeos
  alternatives_spanish:
  - al cananeo
  lexicon: HALOT
  rationale: En una lista de pueblos, el español prefiere el plural étnico para sonar natural y claro.
- source_word: הַחִתִּי
  english_pob_choice: the Hittites
  chosen_spanish: a los hititas
  alternatives_spanish:
  - al hitita
  lexicon: HALOT
  rationale: Se usa el etnónimo plural en español para una enumeración de pueblos.
- source_word: הַחִוִּי
  english_pob_choice: the Hivites
  chosen_spanish: a los heveos
  alternatives_spanish:
  - a los hivitas
  lexicon: HALOT
  rationale: «Heveos» es el etnónimo usual en español bíblico y corresponde al pueblo designado por el hebreo.
- source_word: הַפְּרִזִּי
  english_pob_choice: the Perizzites
  chosen_spanish: a los ferezeos
  alternatives_spanish:
  - a los perizitas
  lexicon: HALOT
  rationale: Se adopta el etnónimo tradicional y reconocible en español para esta lista de pueblos.
- source_word: הַגִּרְגָּשִׁי
  english_pob_choice: the Girgashites
  chosen_spanish: a los gergeseos
  alternatives_spanish:
  - a los gergaseos
  lexicon: HALOT
  rationale: Se conserva la forma española tradicional del etnónimo, adecuada para listas bíblicas.
- source_word: הָאֱמֹרִי
  english_pob_choice: the Amorites
  chosen_spanish: a los amorreos
  alternatives_spanish:
  - al amorreo
  lexicon: HALOT
  rationale: El plural étnico es más natural en español cuando se enumeran pueblos.
- source_word: הַיְבוּסִי
  english_pob_choice: the Jebusites
  chosen_spanish: a los jebuseos
  alternatives_spanish:
  - al jebuseo
  lexicon: HALOT
  rationale: Se conserva el etnónimo plural estándar para la lista final de pueblos.
theological_decisions:
- issue: Presencia de Dios expresada por אֵל חַי
  english_pob_reading: the living God
  chosen_spanish_reading: el Dios vivo
  alternative_spanish_readings:
  - el Dios viviente
  - un dios vivo
  rationale: El hebreo usa אֵל חַי como afirmación teológica de la presencia activa de Dios; «el Dios vivo» comunica la fórmula con precisión y sin introducir el nombre divino donde el texto no lo da.
  doctrine_reference: 'DOCTRINE.md: original-language primacy; evitar importar YHWH cuando el hebreo usa אֵל'
- issue: La fuerza del verbo de expulsión/conquista
  english_pob_reading: he will surely drive out
  chosen_spanish_reading: ciertamente expulsará
  alternative_spanish_readings:
  - ciertamente echará fuera
  - seguramente expulsará
  rationale: El hebreo intensifica la certeza de la remoción de los pueblos. «Ciertamente expulsará» conserva la contundencia sin suavizarla ni convertirla en una paráfrasis doctrinalmente atenuada.
  doctrine_reference: 'DOCTRINE.md: no paraphrase beyond source warrant; preserve lexical force'
translation_notes:
  revision_awareness: 'El contexto inglés auditado coincide estrechamente con el hebreo: se conserva la estructura demostrativa («por esto»), la certeza futura («sabrán»), la cualidad de אֵל חַי («el Dios vivo») y la fuerza del verbo causativo de expulsión. No se siguió una traducción mecánica del inglés; se ajustaron giros al español natural manteniendo el mismo alcance semántico y teológico. No hubo revisiones aplicadas en el ciclo final, y el estado de concordancia fue alto.'
  spanish_consistency_notes:
  - Se mantiene «Dios» para אֵל por contexto, sin introducir «Yahvé», ya que el Tetragrámaton no aparece en este versículo.
  - Se prefieren etnónimos plurales en español por tratarse de una lista de pueblos; esto hace más natural la lectura pública.
  - Se evita «dentro de ustedes» para בְּקִרְבְּכֶם porque podría sonar individualista; «en medio de ustedes» preserva la idea corporativa.
  - El verbo «expulsará» conserva el componente de remoción/dispossession señalado por el audit trail, y la nota aclara la alternativa léxica tradicional.
