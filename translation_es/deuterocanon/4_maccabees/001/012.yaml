    issue: «me volveré al discurso acerca de ellos» suena poco natural y ambiguo en español
    rationale: Aunque intenta reflejar τρέψομαι, en español «volverse al discurso» no es giro idiomático. El sentido es dirigir o volver la exposición hacia ese asunto; «me dirigiré al discurso acerca de ellos» o similar comunica mejor la función retórica.
