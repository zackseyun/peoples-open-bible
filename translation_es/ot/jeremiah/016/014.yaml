translation:
  language: es
  text: 'Por tanto[a], he aquí, vienen días, declara Yahvé, cuando ya no se dirá: «Vive Yahvé, que hizo subir[b] a los hijos de Israel de la tierra de Egipto»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, de manera más idiomática, «por eso» o «así que». El hebreo expresa una conclusión inferida.
    reason: lexical_alternative
  - marker: b
    text: «Hizo subir» también puede traducirse «sacó», en referencia al éxodo de Egipto.
    reason: lexical_alternative
lexical_decisions:
- source_word: לָכֵן
  english_pob_choice: Therefore
  chosen_spanish: Por tanto
  alternatives_spanish:
  - Por eso
  - Así que
  lexicon: HALOT
  rationale: Expresa con naturalidad la conclusión inferida del contexto previo, manteniendo el tono profético sin volverlo coloquial.
- source_word: הִנֵּה
  english_pob_choice: behold
  chosen_spanish: he aquí
  alternatives_spanish:
  - mira
  - vean
  lexicon: HALOT
  rationale: Conserva la fuerza deíctica y de llamada de atención típica del discurso profético; «he aquí» sigue siendo claro y reverente en español bíblico moderno.
- source_word: יָמִים בָּאִים
  english_pob_choice: days are coming
  chosen_spanish: vienen días
  alternatives_spanish:
  - se acercan días
  - están por venir días
  lexicon: HALOT
  rationale: En español, «vienen días» reproduce bien la expectativa futura sin forzar una construcción demasiado literal o pesada.
- source_word: נְאֻם יְהוָה
  english_pob_choice: declares Yahweh
  chosen_spanish: declara Yahvé
  alternatives_spanish:
  - dice Yahvé
  - oráculo de Yahvé
  lexicon: HALOT
  rationale: Sigue el valor profético de fórmula de oráculo y mantiene el nombre divino como «Yahvé», conforme al estándar del proyecto.
- source_word: וְלֹא יֵאָמֵר עוֹד
  english_pob_choice: it will no longer be said
  chosen_spanish: ya no se dirá
  alternatives_spanish:
  - no se dirá más
  - ya no se volverá a decir
  lexicon: HALOT
  rationale: Respeta el pasivo impersonal hebreo con una construcción natural en español y conserva el sentido temporal de עוֹד con «ya no».
- source_word: חַי יְהוָה
  english_pob_choice: As Yahweh lives
  chosen_spanish: ¡Vive Yahvé!
  alternatives_spanish:
  - ¡Por la vida de Yahvé!
  - ¡Yahvé vive!
  lexicon: HALOT
  rationale: En español, la exclamación breve conserva mejor la fuerza juratoria de la fórmula fija que una traducción más analítica. Se mantiene el carácter de juramento vivo del hebreo.
- source_word: אֲשֶׁר הֶעֱלָה
  english_pob_choice: who brought up
  chosen_spanish: que hizo subir
  alternatives_spanish:
  - que sacó
  - que hizo salir
  lexicon: HALOT
  rationale: «Hizo subir» reproduce de cerca el verbo en hifil y preserva la conexión con el idioma del éxodo; «hizo salir» explicitaría más la liberación, pero cambia ligeramente la imagen verbal.
- source_word: בְּנֵי יִשְׂרָאֵל
  english_pob_choice: the sons of Israel
  chosen_spanish: a los hijos de Israel
  alternatives_spanish:
  - a los israelitas
  - al pueblo de Israel
  lexicon: HALOT
  rationale: Se conserva la estructura filiar del hebreo («hijos») y el matiz masculino plural del original, como prefiere el proyecto cuando no se pierde claridad.
- source_word: מֵאֶרֶץ מִצְרָיִם
  english_pob_choice: from the land of Egypt
  chosen_spanish: de la tierra de Egipto
  alternatives_spanish:
  - de Egipto
  - fuera de la tierra de Egipto
  lexicon: HALOT
  rationale: «Tierra» traduce de manera directa אֶרֶץ y mantiene la fórmula del éxodo sin añadir interpretación.
theological_decisions:
- issue: Nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - Jehová
  rationale: El texto hebreo usa el Tetragrámaton directamente; el estándar español del proyecto es «Yahvé», no el sustituto litúrgico «Señor».
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Fórmula de juramento חַי יְהוָה
  english_pob_reading: As Yahweh lives
  chosen_spanish_reading: ¡Vive Yahvé!
  alternative_spanish_readings:
  - ¡Por la vida de Yahvé!
  - ¡Yahvé vive!
  rationale: La fórmula hebrea funciona como juramento y no como simple afirmación doctrinal; en español, la exclamación transmite mejor su fuerza idiomática.
  doctrine_reference: HALOT / tradición profética de juramento
- issue: Traducción de בְּנֵי יִשְׂרָאֵל
  english_pob_reading: the sons of Israel
  chosen_spanish_reading: los hijos de Israel
  alternative_spanish_readings:
  - los israelitas
  - el pueblo de Israel
  rationale: Se preserva el lenguaje filial masculino explícito del hebreo, siguiendo la preferencia del proyecto por la precisión de género cuando no oscurece el sentido.
  doctrine_reference: DOCTRINE.md Translation philosophy §4 (Gender-accurate over gender-neutral)
translation_notes:
  revision_awareness: El borrador sigue de cerca la última revisión inglesa, que permaneció sin cambios y fue confirmada con alto grado de acuerdo; no se detectan revisiones posteriores que alteren el sentido base.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» de forma consistente para יְהוָה.
  - Se conserva el valor profético de fórmula de anuncio con «declara Yahvé».
  - «Hijos de Israel» mantiene la correspondencia con el hebreo y la política del proyecto sobre precisión de género.
  - La puntuación reproduce una sola cita directa final, en estilo bíblico legible para publicación.
