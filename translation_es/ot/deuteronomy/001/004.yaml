translation:
  language: es
  text: después de haber abatido a Sihón, rey de los amorreos, que vivía en Hesbón, y a Og, rey de Basán, que vivía en Astarot[a], en Edrei.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O posiblemente, «que vivía en Astarot y Edrei». El hebreo nombra ambos lugares con una preposición repetida, y la relación exacta entre ellos no queda del todo explícita.
    reason: alternative_reading
lexical_decisions:
- source_word: אַחֲרֵי
  english_pob_choice: after
  chosen_spanish: después de haber
  alternatives_spanish:
  - después de
  - tras haber
  lexicon: HALOT
  rationale: La secuencia temporal introduce una acción previa a la del contexto inmediato. «Después de haber» conserva la relación temporal y suena natural en español bíblico moderno.
- source_word: הַכֹּתוֹ
  english_pob_choice: he had struck down
  chosen_spanish: haber derrotado
  alternatives_spanish:
  - haber golpeado
  - haber vencido
  lexicon: HALOT
  rationale: El verbo נכה puede expresar golpear/abatir/derrotar. «Derrotado» comunica el resultado narrativo en español con claridad, sin debilitar la fuerza del evento. La construcción con infinitivo compuesto reproduce bien el valor previo de la acción.
- source_word: סִיחֹן
  english_pob_choice: Sihon
  chosen_spanish: Sihón
  alternatives_spanish:
  - Sihon
  lexicon: Transliteración estándar
  rationale: Se conserva el nombre propio en forma española habitual con acento gráfico para lectura natural.
- source_word: מֶלֶךְ הָאֱמֹרִי
  english_pob_choice: king of the Amorites
  chosen_spanish: rey de los amorreos
  alternatives_spanish:
  - rey amorreo
  - rey de los amoritas
  lexicon: HALOT
  rationale: La cadena constructa y el gentilicio se expresan de modo directo y claro en español. «Amorreos» mantiene la referencia étnica bíblica establecida.
- source_word: אֲשֶׁר יוֹשֵׁב בְּחֶשְׁבּוֹן
  english_pob_choice: who lived in Heshbon
  chosen_spanish: que vivía en Hesbón
  alternatives_spanish:
  - que habitaba en Hesbón
  - que residía en Hesbón
  lexicon: HALOT
  rationale: יָשַׁב aquí indica residencia. «Vivía» es natural y fiel; «Hesbón» es la forma española habitual del topónimo.
- source_word: עוֹג
  english_pob_choice: Og
  chosen_spanish: Og
  alternatives_spanish:
  - Ogg
  lexicon: Transliteración estándar
  rationale: Se mantiene el nombre propio en transliteración estándar, sin adaptar innecesariamente.
- source_word: מֶלֶךְ הַבָּשָׁן
  english_pob_choice: king of Bashan
  chosen_spanish: rey de Basán
  alternatives_spanish:
  - rey del Basán
  lexicon: HALOT
  rationale: «Rey de Basán» reproduce con naturalidad la relación de pertenencia territorial. Basán es la forma española estable del nombre geográfico.
- source_word: אֲשֶׁר יוֹשֵׁב בְּעַשְׁתָּרֹת בְּאֶדְרֶעִי
  english_pob_choice: who lived in Ashtaroth at Edrei
  chosen_spanish: que vivía en Ashtarot, en Edrei
  alternatives_spanish:
  - que vivía en Ashtarot y Edrei
  - que vivía en Ashtarot, cerca de Edrei
  - que vivía en Ashtarot, en la región de Edrei
  lexicon: HALOT
  rationale: Se preserva la doble preposición hebrea sin resolver en exceso la relación exacta entre los dos topónimos. «En Ashtarot, en Edrei» mantiene la ambigüedad documentada por el audit trail y evita cerrar indebidamente una relación sintáctica que el hebreo deja comprimida.
theological_decisions:
- issue: Relación espacial entre Ashtarot y Edrei
  english_pob_reading: who lived in Ashtaroth at Edrei, with a note that the Hebrew names both places with repeated 'in,' and the precise relationship between them is not fully explicit.
  chosen_spanish_reading: que vivía en Ashtarot, en Edrei
  alternative_spanish_readings:
  - que vivía en Ashtarot y Edrei
  - que vivía en Ashtarot, cerca de Edrei
  rationale: El hebreo repite la preposición con dos topónimos y no aclara del todo su relación. La redacción española conserva esa tensión sin simplificarla indebidamente; la puntuación separa los lugares sin decidir más de lo que el texto permite.
  doctrine_reference: Principio de transparencia textual y cautela exegética; no aplica una doctrina específica.
translation_notes:
  revision_awareness: Se siguió el estado más reciente del auditor inglés, que marca alta concordancia y sin revisiones aplicadas. No se introdujeron cambios doctrinales ni textuales respecto del análisis base; solo se ajustó la formulación al español manteniendo la ambigüedad documentada en la relación entre Ashtarot y Edrei.
  spanish_consistency_notes:
  - Se usó «Yahvé» como terminología general del proyecto solo cuando aparezca el nombre divino; en este versículo no aplica.
  - Se preservaron los nombres propios geográficos y personales con transliteración española estable.
  - Se mantuvo una equivalencia formal-optimal sin sobreexplicar la sintaxis comprimida del hebreo.
