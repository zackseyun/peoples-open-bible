translation:
  language: es
  text: 'Devastaré su vid y su higuera[a], de las cuales ella dijo: «Estas son mi salario[a], que me dieron mis amantes». Las convertiré en bosque, y las bestias del campo las devorarán.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «paga»; el término hebreo puede llevar el sentido del salario de una prostituta dentro de la metáfora de infidelidad en Oseas.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַהֲשִׁמֹּתִי
  english_pob_choice: I will lay waste
  chosen_spanish: convertiré en desolación
  alternatives_spanish:
  - la devastaré
  - la haré desolada
  lexicon: HALOT
  rationale: El hifil de שׁמם expresa causar desolación o devastación. En español, “convertiré en desolación” conserva la fuerza judicial y el resultado de ruina, con un registro claro y digno.
- source_word: גַּפְנָהּ
  english_pob_choice: her vine
  chosen_spanish: su vid
  alternatives_spanish:
  - su viña
  lexicon: HALOT
  rationale: 'La forma hebrea es singular con sufijo: “vid”, no “viña”. Aunque el contexto puede ser colectivo, la imagen singular debe conservarse.'
- source_word: וּתְאֵנָתָהּ
  english_pob_choice: and her fig tree
  chosen_spanish: su higuera
  alternatives_spanish:
  - su árbol de higos
  lexicon: HALOT
  rationale: תְּאֵנָה designa normalmente la higuera. “Higuera” es la traducción natural y precisa en esta pareja agrícola con “vid”.
- source_word: אֲשֶׁר אָמְרָה
  english_pob_choice: of which she said
  chosen_spanish: de las cuales ella dijo
  alternatives_spanish:
  - acerca de las cuales ella dijo
  - de las que ella dijo
  lexicon: HALOT
  rationale: El relativo retoma a la vid y la higuera. “De las cuales” mantiene la relación sin sobreexplicar.
- source_word: אֶתְנָה
  english_pob_choice: wages
  chosen_spanish: ganancias
  alternatives_spanish:
  - paga
  - salario
  - alquiler
  lexicon: HALOT
  rationale: El término puede referirse al pago o recompensa, con posible matiz sexual en el contexto de Oseas. “Ganancias” conserva el sentido transaccional en español y permite que el contexto aporte la carga moral sin introducir una expansión interpretativa en el texto principal.
- source_word: הֵמָּה לִי
  english_pob_choice: These are my
  chosen_spanish: Estas son mis
  alternatives_spanish:
  - Son para mí estas
  - Estas me pertenecen como
  lexicon: HALOT
  rationale: La partícula es enfática. “Estas son mis” reproduce naturalmente el énfasis antes del sustantivo.
- source_word: מְאַהֲבַי
  english_pob_choice: my lovers
  chosen_spanish: amantes
  alternatives_spanish:
  - mis amantes
  - mis amadores
  - mis paramours
  lexicon: HALOT
  rationale: En Oseas, el término alude a amantes ilícitos dentro de la metáfora de adulterio; “amantes” comunica la relación sin necesidad de ampliar en el cuerpo del texto, aunque el posesivo ya lo mantiene implícito.
- source_word: וְשַׂמְתִּים לְיַעַר
  english_pob_choice: I will make them a forest
  chosen_spanish: Las convertiré en un bosque
  alternatives_spanish:
  - Las haré un bosque
  - Las tornaré en bosque
  lexicon: HALOT
  rationale: El hebreo expresa el paso de cultivo a crecimiento silvestre. “Convertiré en un bosque” suena natural en español y conserva la imagen de reversión de la tierra cultivada.
- source_word: וַאֲכָלָתַם
  english_pob_choice: will devour them
  chosen_spanish: las devorarán
  alternatives_spanish:
  - las comerán
  - las consumirán
  lexicon: HALOT
  rationale: Con sujeto animal, אָכַל puede significar “devorar”. “Devorarán” reproduce mejor la fuerza destructiva de la imagen.
- source_word: חַיַּת הַשָּׂדֶה
  english_pob_choice: the wild animals of the field
  chosen_spanish: las bestias del campo
  alternatives_spanish:
  - los animales salvajes del campo
  - los animales del campo
  lexicon: HALOT
  rationale: La expresión bíblica tradicional “bestias del campo” conserva el paralelismo y el tono elevado; en español sigue siendo comprensible y fiel.
theological_decisions:
- issue: Si hacer explícito el matiz sexual/económico de אֶתְנָה en el texto principal
  english_pob_reading: Render as 'wages' in the main text, preserving the transactional sense without adding 'prostitute's' explicitly.
  chosen_spanish_reading: Mantener una equivalencia económica general en el texto principal (“ganancias”) y dejar el matiz sexual implícito en el contexto de Oseas.
  alternative_spanish_readings:
  - renta
  - salario
  - pago de prostituta
  - ganancias de prostituta
  rationale: El contexto profético ya establece la metáfora de infidelidad/adulterio. “Ganancias” preserva el carácter remunerativo sin sobrecargar el versículo con una ampliación que el hebreo no dice de forma explícita en esta cláusula.
  doctrine_reference: 'Principio de equivalencia óptima: preservar lo que el texto fuente permite afirmar sin añadir glosas interpretativas al cuerpo principal.'
translation_notes:
  revision_awareness: No se registran revisiones aplicadas en el paquete de auditoría; el dictamen más reciente indica que no hubo cambios necesarios y el revisor externo mostró alta concordancia.
  spanish_consistency_notes:
  - Se mantuvo “Yahvé” como norma del proyecto para el nombre divino cuando aparezca en otros contextos, aunque este versículo no lo contiene.
  - Se preservó la imagen singular “vid”/“higuera” en lugar de generalizar a “viña”, siguiendo el hebreo.
  - El sustantivo de acción “ganancias” evita una paráfrasis fuerte y conserva la tensión lexical de אֶתְנָה.
  - Se usó “bestias del campo” por su resonancia bíblica y porque no oscurece el sentido en español moderno.
