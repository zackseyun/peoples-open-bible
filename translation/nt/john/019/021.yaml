theological_decisions:
- issue: Rendering Ἰουδαῖος/Ἰουδαίων in Johannine passion context
  chosen_reading: Jews
  alternative_readings:
  - Judeans
  rationale: The immediate context concerns the inscription 'King of the Jews,' a fixed political-religious designation in the passion narrative. Rendering it 'Jews' preserves the recognized title and avoids awkwardness. Because Ἰουδαῖος can in some contexts mean 'Judean,' the alternative is preserved in a footnote to maintain transparency and avoid overstating ethnic implications.
  doctrine_reference: 'Translation philosophy: original-language primacy; preserve tension rather than resolve it where ambiguity is genuine.'
