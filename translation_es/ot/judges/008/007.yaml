    issue: La nota al pie [a] está colocada en 'dijo' en vez de en 'abrojos'.
    rationale: El motivo de la nota es la incertidumbre léxica sobre הַבַּרְקֳנִים, por lo que el marcador debe anclarse al término español correspondiente en el texto principal.
  - severity: medium
    issue: La nota dice 'O “con abrojos”', pero el texto principal ya usa 'abrojos'.
    rationale: Así formulada, la nota no ofrece una alternativa real y resulta incoherente. Debe presentar una opción como 'zarzas' o similar, preservando la incertidumbre botánica ya documentada en el inglés.
  revised_spanish_text: 'Y Gedeón dijo: «Por tanto, cuando Yahvé entregue a Zebá y a Zalmuná en mi mano, yo trillaré vuestra carne con las espinas del desierto y con los abrojos[a]».'
