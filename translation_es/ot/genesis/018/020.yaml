translation:
  language: es
  text: 'Entonces Yahvé dijo[a]: «El clamor contra Sodoma y Gomorra es grande[b], y su pecado es muy grave».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «El clamor de Sodoma y Gomorra es grande». El hebreo puede leerse de manera más literal así; el texto principal hace explícito que el clamor va dirigido contra ellas.'
    reason: alternative_reading
  - marker: b
    text: 'O: «es muy pesada». El hebreo dice literalmente que es “muy pesada”, un modismo para indicar gran gravedad.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר
  english_pob_choice: Then ... said
  chosen_spanish: Entonces ... dijo
  alternatives_spanish:
  - Y ... dijo
  - Y entonces ... dijo
  lexicon: HALOT
  rationale: La forma narrativa con waw consecutiva avanza la acción; «Entonces» mantiene ese valor secuencial con español natural y digno.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  - el SEÑOR
  lexicon: HALOT
  rationale: Se conserva el nombre propio divino del hebreo, según la práctica POB. «Yahvé» es la forma española estable para el Tetragrámaton y evita la sustitución por un título.
- source_word: זַעֲקַת
  english_pob_choice: the outcry against
  chosen_spanish: el clamor contra
  alternatives_spanish:
  - el clamor de
  - el grito contra
  lexicon: HALOT
  rationale: זַעֲקָה expresa un clamor o grito de protesta/aflicción. «Contra» hace explícito el objeto implícito del hebreo, como en la decisión inglesa, sin añadir interpretación ajena.
- source_word: סְדֹם וַעֲמֹרָה
  english_pob_choice: Sodom and Gomorrah
  chosen_spanish: Sodoma y Gomorra
  alternatives_spanish:
  - Sodoma y Gomorra
  lexicon: HALOT
  rationale: Se usan los nombres geográficos tradicionales en español, transparentes y ampliamente reconocibles.
- source_word: כִּי רָבָּה
  english_pob_choice: is great
  chosen_spanish: es grande
  alternatives_spanish:
  - es abundante
  - es mucha
  lexicon: HALOT
  rationale: El predicado femenino singular concuerda con «el clamor». «Grande» conserva la magnitud del hebreo sin forzar un matiz más técnico.
- source_word: וְחַטָּאתָם
  english_pob_choice: and their sin
  chosen_spanish: y su pecado
  alternatives_spanish:
  - y su culpa
  - y su ofensa
  lexicon: HALOT
  rationale: חַטָּאת en este contexto significa «pecado». El posesivo plural se expresa de forma colectiva con «su»; en español el referente grupal queda claro por el contexto.
- source_word: כִּי כָבְדָה מְאֹד
  english_pob_choice: is very severe
  chosen_spanish: es muy grave
  alternatives_spanish:
  - es muy pesada
  - es extremadamente grave
  - es muy severa
  lexicon: HALOT
  rationale: כָבְדָה literalmente es «pesada», pero en registro moral/judicial el español natural es «grave». Esto conserva el valor idiomático de la carga semántica sin calco mecánico.
theological_decisions:
- issue: Renderización del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Jehová
  - el SEÑOR
  rationale: La base hebrea usa directamente el Tetragrámaton, y la política POB evita el reemplazo por un título. «Yahvé» es la forma española elegida para preservar el nombre revelado.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Sentido de זַעֲקַת en el contexto
  english_pob_reading: the outcry against Sodom and Gomorrah
  chosen_spanish_reading: el clamor contra Sodoma y Gomorra
  alternative_spanish_readings:
  - el clamor de Sodoma y Gomorra
  - el grito contra Sodoma y Gomorra
  rationale: El hebreo permite entender un clamor que surge «de» las ciudades o un clamor «contra» ellas. Se conserva la lectura contextual que hace explícito el objeto del clamor, como en el audit trail inglés.
  doctrine_reference: HALOT; decisión contextual de POB sobre el objeto implícito
- issue: Índole de כָבְדָה מְאֹד
  english_pob_reading: is very severe
  chosen_spanish_reading: es muy grave
  alternative_spanish_readings:
  - es muy pesada
  - es muy severa
  - es muy grave
  rationale: El hebreo usa la imagen de «peso» para expresar gravedad moral o jurídica. «Muy grave» comunica ese valor en español sin perder la tensión idiomática documentada.
  doctrine_reference: HALOT; idiomática hebrea de ‘pesadez’ = gravedad
translation_notes:
  revision_awareness: 'El borrador sigue de cerca el texto hebreo masorético y el audit trail inglés, manteniendo las dos decisiones sensibles ya documentadas: el objeto implícito del clamor y el modismo de «peso» para la gravedad del pecado. No se requieren revisiones adicionales respecto del pasaje fuente.'
  spanish_consistency_notes:
  - Se conserva «Yahvé» de manera consistente para יְהוָה.
  - Se usa «clamor» para זַעֲקָה, evitando términos más interpretativos como «queja» o «denuncia».
  - «Pecado» traduce חַטָּאת con el valor moral estándar del contexto.
  - La puntuación y las comillas siguen el uso editorial en español para discurso directo bíblico.
