revisions:
- from: Pues nos enseña el dominio propio, para que dominemos todos los placeres y deseos, y practiquemos la valentía, para que soportemos voluntariamente todo dolor;
  to: Porque nos enseña el dominio propio, de modo que podamos dominar todos los placeres y deseos, y a practicar la fortaleza, para soportar voluntariamente todo dolor;
  rationale: Se ajustó la sintaxis para reflejar mejor el valor de ὥστε como resultado/capacidad y evitar una repetición rígida de 'para que'. También se cambió 'valentía' por 'fortaleza' para representar mejor ἀνδρείαν en un contexto de virtud estable y resistencia al sufrimiento.
