translation:
  language: es
  text: David oyó en la región agreste que Nabal estaba esquilando sus ovejas[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, más ampliamente, 'su rebaño'. El hebreo צֹאן puede referirse colectivamente al ganado menor, aunque 'ovejas' encaja mejor con el contexto de la esquila.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּשְׁמַע
  english_pob_choice: heard
  chosen_spanish: oyó
  alternatives_spanish:
  - escuchó
  - se enteró
  - llegó a oír
  lexicon: HALOT
  rationale: El imperfecto consecutivo narra una acción pasada simple. En español, 'oyó' mantiene la inmediatez del hecho sin añadir interpretación; 'se enteró' explicaría el resultado del oír, pero es más interpretativo.
- source_word: בַּמִּדְבָּר
  english_pob_choice: in the wilderness
  chosen_spanish: en el desierto
  alternatives_spanish:
  - en el desierto agreste
  - en el desierto / en la estepa
  - en la región agreste
  lexicon: HALOT
  rationale: El hebreo מִדְבָּר puede abarcar desierto o región abierta y árida. Aquí se eligió 'desierto' como equivalente natural y lectoramente claro en español, sin perder el sentido de lugar apartado.
- source_word: כִּי
  english_pob_choice: that
  chosen_spanish: que
  alternatives_spanish:
  - porque
  - pues
  lexicon: HALOT
  rationale: Introduce el contenido de lo que David oyó; en español 'que' reproduce mejor la subordinación explicativa del hebreo en este contexto.
- source_word: גֹזֵז
  english_pob_choice: was shearing
  chosen_spanish: estaba esquilando
  alternatives_spanish:
  - esquilaba
  - estaba trasquilando
  - se hallaba esquilando
  lexicon: HALOT
  rationale: El participio expresa acción en curso o contemporánea. 'Estaba esquilando' conserva el aspecto progresivo y usa el verbo español más natural para cortar la lana de las ovejas.
- source_word: נָבָל
  english_pob_choice: Nabal
  chosen_spanish: Nabal
  alternatives_spanish:
  - '-'
  lexicon: Nombre propio; transliteración estándar.
  rationale: Es nombre propio y debe conservarse sin traducción.
- source_word: אֶת צֹאנוֹ
  english_pob_choice: his sheep
  chosen_spanish: sus ovejas
  alternatives_spanish:
  - su rebaño
  - su ganado menor
  - sus animales
  lexicon: HALOT
  rationale: צֹאן puede referirse colectivamente a ganado menor, pero en un contexto de esquila el referente natural en español son las ovejas. 'Sus ovejas' preserva la especificidad contextual; 'su rebaño' es una alternativa válida pero más general.
translation_notes:
  revision_awareness: El texto coincide con el patrón del POB inglés y con el dictamen de alta concordancia; no se requieren revisiones adicionales. Se mantuvo la progresión narrativa simple, el valor aspectual del participio y la especificidad contextual de 'ovejas'.
  spanish_consistency_notes:
  - Se usó 'David' y 'Nabal' como nombres propios sin adaptación.
  - Se prefirió 'oyó' frente a 'se enteró' para no añadir una inferencia causal.
  - '''Desierto'' se mantiene como equivalente amplio de מִדְבָּר, en armonía con el uso bíblico del término.'
  - La nota al pie preserva la alternativa semántica de צֹאן sin debilitar el sentido principal del contexto de esquila.
