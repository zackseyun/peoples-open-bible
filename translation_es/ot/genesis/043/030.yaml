translation:
  language: es
  text: Entonces José se apresuró[a], porque su compasión por su hermano se conmovió[b], y buscó dónde llorar[c]. Entró en la habitación y lloró allí.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «se apresuró a salir». El hebreo simplemente dice que se apresuró; el contexto sugiere que abandonó la escena pública.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «sus entrañas se conmovieron». El hebreo idiomáticamente habla de sus compasiones siendo agitadas o profundamente conmovidas.'
    reason: lexical_alternative
  - marker: c
    text: 'O: «buscó llorar». El hebreo dice más literalmente: «buscó llorar», y el contexto implica un lugar privado para hacerlo.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְמַהֵר
  english_pob_choice: hurried
  chosen_spanish: se apresuró
  alternatives_spanish:
  - se dio prisa
  - se apresuró a salir
  lexicon: HALOT
  rationale: El verbo expresa rapidez/urgencia. «Se apresuró» conserva el movimiento y la naturalidad en español sin añadir ‘salir’, que no está en el hebreo.
- source_word: נִכְמְרוּ רַחֲמָיו
  english_pob_choice: his compassion ... was stirred
  chosen_spanish: sus entrañas se conmovieron
  alternatives_spanish:
  - su compasión se conmovió
  - sus afectos se conmovieron
  - sus entrañas se estremecieron
  lexicon: HALOT
  rationale: El hebreo usa una imagen corporal-emotiva fuerte, literalmente “sus compasiones/entrañas fueron conmovidas o calentadas”. «Entrañas» preserva esa tensión idiomática que el POB inglés también retuvo con ‘compassion’ y su nota alternativa.
- source_word: אֶל אָחִיו
  english_pob_choice: for his brother
  chosen_spanish: por su hermano
  alternatives_spanish:
  - hacia su hermano
  - para con su hermano
  lexicon: HALOT
  rationale: La preposición marca el objeto/dirección de la emoción. «Por su hermano» es idiomático en español y evita introducir el nombre propio que el texto aquí no repite.
- source_word: וַיְבַקֵּשׁ לִבְכּוֹת
  english_pob_choice: he sought a place to weep
  chosen_spanish: buscó dónde llorar
  alternatives_spanish:
  - buscó un lugar para llorar
  - quiso llorar
  lexicon: HALOT
  rationale: El hebreo dice literalmente que ‘buscó llorar’. Como el contexto implica privacidad, «buscó dónde llorar» conserva el matiz de búsqueda sin forzar una traducción demasiado interpretativa.
- source_word: הַחַדְרָה
  english_pob_choice: the room
  chosen_spanish: el aposento
  alternatives_spanish:
  - la habitación
  - el cuarto
  - la sala interior
  lexicon: HALOT
  rationale: El término designa un espacio interior privado. «Aposento» mantiene un registro digno y bíblico en español, sin caer en arcaísmo excesivo.
- source_word: וַיֵּבְךְּ שָׁמָּה
  english_pob_choice: and wept there
  chosen_spanish: lloró allí
  alternatives_spanish:
  - lloró ahí
  - se echó a llorar allí
  lexicon: HALOT
  rationale: «Lloró allí» reproduce de forma directa la acción y el valor locativo de שָׁמָּה. «Lloró» es el equivalente natural de ‘wept’ en este contexto.
theological_decisions:
- issue: Conservar el lenguaje corporal-emotivo de רחמים/“compassion” sin suavizarlo a mero sentimiento.
  english_pob_reading: his compassion ... was stirred
  chosen_spanish_reading: sus entrañas se conmovieron
  alternative_spanish_readings:
  - su compasión se conmovió
  - sus afectos se conmovieron
  - sus misericordias se conmovieron
  rationale: El hebreo presenta una metáfora visceral y afectiva. «Entrañas» evita reducir el pasaje a una emoción abstracta y preserva la carga intensa del original; además, mantiene la tensión lexical que el POB inglés señaló con su nota alternativa.
  doctrine_reference: Antropología bíblica; lenguaje figurado de las emociones en la Escritura
translation_notes:
  revision_awareness: 'La revisión inglesa eliminó ‘out’ por no estar en el original y simplificó ‘was stirred up’ a ‘was stirred’. En español se siguió esa dirección: no se añadió ‘salir’ al texto principal, y se mantuvo una formulación directa del verbo hebreo sin intensificadores innecesarios.'
  spanish_consistency_notes:
  - Se usó «Yahvé» en vez de una máscara reverencial solo donde corresponde; aquí no aparece el nombre divino.
  - Se evitó «siervo» y se mantuvo el paralelismo afectivo del hebreo sin moralizarlo.
  - «Aposento» se eligió por registro bíblico claro, pero sin arcaísmos que oscurezcan el sentido.
  - La imagen de «entrañas» se conserva por fidelidad semántica y para no neutralizar la intensidad emocional del hebreo.
