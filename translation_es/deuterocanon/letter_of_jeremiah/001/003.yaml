translation:
  language: es
  text: Pero ahora, en Babilonia, verán dioses de plata y de oro y de madera[a], llevados sobre los hombros, causando temor entre las naciones.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O “causando temor a las naciones” / “infundiendo temor entre las naciones”. El griego literalmente dice algo como “mostrando temor a las naciones”, lo cual puede describir tanto la exhibición misma como su efecto en los observadores.
    reason: lexical_alternative
lexical_decisions:
- source_word: νυνὶ δὲ
  english_pob_choice: But now
  chosen_spanish: Pero ahora
  alternatives_spanish:
  - Y ahora
  - Ahora bien
  lexicon: LSJ
  rationale: Conserva el valor temporal inmediato de νυνί y el matiz adversativo de δέ con una solución natural en español.
- source_word: ὄψεσθε
  english_pob_choice: you will see
  chosen_spanish: verán
  alternatives_spanish:
  - veréis
  - ustedes verán
  lexicon: LSJ
  rationale: Futuro de ὁράω; en español neutral latinoamericano, la forma impersonalizada 'verán' resulta natural y publicable.
- source_word: ἐν Βαβυλῶνι
  english_pob_choice: in Babylon
  chosen_spanish: en Babilonia
  alternatives_spanish:
  - en Babilonia
  lexicon: LSJ
  rationale: La localización es directa; 'Babilonia' es la forma española usual del topónimo.
- source_word: θεοὺς
  english_pob_choice: gods
  chosen_spanish: dioses
  alternatives_spanish:
  - ídolos
  lexicon: LSJ
  rationale: Se conserva el sustantivo del griego, sin sustituirlo interpretivamente por 'ídolos', para mantener la ironía y la afirmación textual original.
- source_word: ἀργυροῦς καὶ χρυσοῦς καὶ ξυλίνους
  english_pob_choice: of silver and gold and wood
  chosen_spanish: de plata y de oro y de madera
  alternatives_spanish:
  - de plata, oro y madera
  - hechos de plata, oro y madera
  lexicon: LSJ
  rationale: Los adjetivos de material se vuelven una serie nominal natural en español, manteniendo explícita la tríada material sin forzar un calco adjetival.
- source_word: ἐπʼ ὤμων αἰρομένους
  english_pob_choice: being carried on shoulders
  chosen_spanish: llevados sobre los hombros
  alternatives_spanish:
  - cargados sobre los hombros
  - llevados en hombros
  lexicon: LSJ
  rationale: '''Llevados sobre los hombros'' conserva la imagen de transporte y el participio pasivo de manera idiomática.'
- source_word: δεικνύντας φόβον
  english_pob_choice: causing fear
  chosen_spanish: causando temor
  alternatives_spanish:
  - mostrando temor
  - infundiendo temor
  lexicon: LSJ
  rationale: El griego dice literalmente algo cercano a 'mostrando temor', pero el contexto admite el efecto sobre los observadores; 'causando temor' preserva la tensión semántica documentada en el audit trail.
- source_word: τοῖς ἔθνεσιν
  english_pob_choice: among the nations
  chosen_spanish: entre las naciones
  alternatives_spanish:
  - a las naciones
  - entre los pueblos
  lexicon: LSJ
  rationale: El dativo plural se expresa con naturalidad como 'entre las naciones', manteniendo el sentido colectivo y contextual.
theological_decisions:
- issue: 'θεοὺς: mantener ''dioses'' o interpretar como ''ídolos'''
  english_pob_reading: gods
  chosen_spanish_reading: dioses
  alternative_spanish_readings:
  - ídolos
  rationale: Se preserva el sustantivo del original para no introducir una evaluación interpretativa que el griego no expresa léxicamente; la ironía del pasaje se deja al contexto.
  doctrine_reference: 'DOCTRINE.md: Primacía del idioma original y preservación de tensiones textuales'
- issue: 'δεικνύντας φόβον τοῖς ἔθνεσιν: relación entre la imagen y el temor'
  english_pob_reading: causing fear among the nations
  chosen_spanish_reading: causando temor entre las naciones
  alternative_spanish_readings:
  - mostrando temor a las naciones
  - infundiendo temor entre las naciones
  rationale: Se mantiene la lectura contextual que privilegia el efecto del desfile de ídolos sobre los pueblos, sin borrar la literalidad comprimida del griego.
  doctrine_reference: 'DOCTRINE.md: Preservar la tensión semántica y teológica'
translation_notes:
  revision_awareness: 'Se siguió el audit trail inglés: se mantuvo la decisión de traducir θεοὺς como ''dioses'' y se reflejó la revisión que favorece una expresión más natural para δεικνύντας φόβον τοῖς ἔθνεσιν. La redacción española evita calcos innecesarios, pero conserva la literalidad donde el texto griego es deliberadamente irónico o ambiguo.'
  spanish_consistency_notes:
  - Se usa 'Babilonia' para el topónimo, no 'Babilón'.
  - Se mantiene 'dioses' en vez de 'ídolos' por fidelidad al sustantivo griego.
  - '''Temor'' se usa para φόβος por ser más bíblico y natural que ''terror'' en este contexto.'
  - La nota al pie conserva la ambigüedad auditada entre 'mostrar' y 'causar/infundir' temor.
