base_translation:
  language: en
  yaml_path: translation/ot/jeremiah/029/008.yaml
  text: 'For thus says Yahweh of hosts[a], the God of Israel: Do not let your prophets who are among you and your diviners deceive you, and do not listen to the dreams that you dream.'
  footnotes:
  - marker: a
    text: Or 'the dreams that you dream'; the Hebrew expression is difficult and may reflect either dreams the people themselves are dreaming or dreams they are in some sense fostering or causing.
    reason: lexical_alternative
