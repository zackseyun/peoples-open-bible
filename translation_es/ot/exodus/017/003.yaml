review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el sentido básico del hebreo: el pueblo tiene sed, murmura contra Moisés y formula la acusación en singular representativo. También conserva adecuadamente «el pueblo», «contra Moisés» y la secuencia singular «me ... mis hijos ... mi ganado». Sin embargo, hay un problema formal importante: el marcador de nota [a] se usa dos veces en el texto para dos funciones distintas, mientras la nota existente solo explica el singular pronominal. Además, el anclaje de la nota debe ir sobre la frase singular relevante, no sobre «agua».'
  spanish_quality_summary: El español es generalmente claro y digno, con buen registro bíblico. «Tuvo sed de agua» y «murmuró contra Moisés» son naturales. No obstante, «para matar[a]me a mí» es ortográficamente incorrecto por la inserción del marcador dentro del infinitivo; debe colocarse en un punto que no rompa la palabra, por ejemplo después de «mí» o tras toda la secuencia singular. También conviene alinear la nota únicamente con la singularidad preservada.
  glossary_alignment: No hay conflictos con la terminología base del proyecto en este versículo. «Murmuró» para לון es defendible y acorde con la racionalidad auditada. «Nos sacaste de Egipto» es una adaptación natural de «brought us up from Egypt» y no altera el sentido. «Mi ganado» representa bien מִקְנַי.
  issues:
  - severity: high
    issue: Uso incorrecto y duplicado del marcador [a]
    rationale: Las instrucciones exigen marcadores únicos por nota y que cada nota tenga un anclaje exacto en el texto. El borrador coloca [a] en «agua» y también dentro de «matar[a]me», pero solo existe una nota, además referida al singular pronominal, no a «agua».
  - severity: medium
    issue: El marcador de nota rompe una palabra española
    rationale: «matar[a]me» es una forma tipográficamente incorrecta e impropia para el texto bíblico publicado. El marcador debe ir fuera de la palabra.
  - severity: low
    issue: La nota está anclada en un lugar semánticamente impreciso
    rationale: La nota explica las formas singulares «me ... mis hijos ... mi ganado», así que debe anclarse junto a esa secuencia, no en «agua».
  revised_spanish_text: 'Y allí el pueblo tuvo sed de agua, y el pueblo murmuró contra Moisés y dijo: «¿Por qué nos sacaste de Egipto, para matarme a mí[a] y a mis hijos y a mi ganado con sed?»'
  revised_footnotes:
  - marker: a
    text: 'El hebreo mantiene formas singulares: «matarme a mí y a mis hijos y a mi ganado». Probablemente es un singular representativo de la queja de cada miembro del pueblo; muchas traducciones lo suavizan al plural.'
    reason: lexical_alternative
  revision_rationale: 'Se corrige un problema formal importante de notas: se elimina el uso duplicado del marcador [a], se coloca el anclaje donde realmente corresponde la explicación del singular hebreo y se evita partir la palabra «matarme». El contenido traductológico principal del borrador se mantiene porque es fiel al hebreo y al expediente inglés.'
