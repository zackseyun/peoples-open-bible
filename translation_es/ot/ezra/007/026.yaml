translation:
  language: es
  text: Y cualquiera que no cumpla la ley de tu Dios y la ley del rey, que se ejecute sentencia contra él de inmediato, ya sea para muerte, para destierro[a], para confiscación de bienes o para encarcelamiento.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «para expulsión» o, más literalmente, «para desarraigo». El término arameo es raro y puede referirse al destierro de su lugar o de su comunidad.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְכָל דִּי
  english_pob_choice: And anyone who
  chosen_spanish: Y cualquiera que
  alternatives_spanish:
  - Y quienquiera que
  - Y todos los que
  lexicon: HALOT
  rationale: La expresión introduce una cláusula relativa indefinida y distributiva. «Cualquiera que» mantiene ese alcance general con naturalidad en español jurídico.
- source_word: לָא לֶהֱוֵא עָבֵד
  english_pob_choice: will not obey
  chosen_spanish: no haga
  alternatives_spanish:
  - no obedezca
  - no cumpla
  - no practique
  lexicon: HALOT
  rationale: El hebreo/arameo dice literalmente que no «haga» o no esté «haciendo» la ley; en este contexto legal, la idea es incumplirla. «No haga» conserva el valor verbal sin forzar una paráfrasis excesiva; «no obedezca» sería también posible, pero menos pegado a la forma.
- source_word: דָּתָא
  english_pob_choice: law
  chosen_spanish: la ley
  alternatives_spanish:
  - el decreto
  - el edicto
  - la norma
  lexicon: HALOT
  rationale: En el contexto imperial de Esdras, דָּתָא puede significar ley, decreto o regulación. «La ley» preserva el paralelismo con «la ley del rey» y su tono formal.
- source_word: אֱלָהָךְ
  english_pob_choice: your God
  chosen_spanish: tu Dios
  alternatives_spanish:
  - tu Dios personal
  - su Dios
  lexicon: HALOT
  rationale: Se trata del posesivo de segunda persona singular dirigido a Esdras. «Tu Dios» es la equivalencia natural y fiel.
- source_word: וְדָתָא דִּי מַלְכָּא
  english_pob_choice: and the law of the king
  chosen_spanish: y la ley del rey
  alternatives_spanish:
  - y la ley real
  - y el decreto del rey
  lexicon: HALOT
  rationale: Mantiene la coordinación y el paralelismo con «la ley de tu Dios». «Del rey» traduce con precisión la relación posesiva.
- source_word: אָסְפַּרְנָא
  english_pob_choice: promptly
  chosen_spanish: de inmediato
  alternatives_spanish:
  - pronto
  - rápidamente
  - sin demora
  lexicon: HALOT
  rationale: El adverbio expresa prontitud en la ejecución judicial. «De inmediato» funciona con claridad en español moderno y conserva la urgencia.
- source_word: דִּינָה לֶהֱוֵא מִתְעֲבֵד מִנֵּהּ
  english_pob_choice: let judgment be executed on him
  chosen_spanish: se le hará juicio
  alternatives_spanish:
  - se ejecutará juicio sobre él
  - se le aplicará sentencia
  - se hará ejecutar juicio sobre él
  lexicon: HALOT
  rationale: La construcción aramea expresa la realización de un juicio/sentencia sobre el transgresor. «Se le hará juicio» conserva el pasivo y el registro jurídico, sin especificar más de lo que el texto dice.
- source_word: הֵן ... הֵן ... הֵן ... וְ
  english_pob_choice: whether ... or ... or ... or
  chosen_spanish: ya sea ... para ... o para ... o para ...
  alternatives_spanish:
  - sea ... o ... o ... o
  - bien ... o ... o ... o
  lexicon: HALOT
  rationale: La serie introduce posibles penas. En español, «ya sea... o...» reproduce bien la estructura alternativa con estilo legal.
- source_word: לְמוֹת
  english_pob_choice: for death
  chosen_spanish: para muerte
  alternatives_spanish:
  - para la muerte
  - con pena de muerte
  - a muerte
  lexicon: HALOT
  rationale: La preposición marca una sanción. «Para muerte» conserva la concisión del listado penal; «con pena de muerte» sería más interpretativo.
- source_word: לשרשו
  english_pob_choice: for banishment
  chosen_spanish: para destierro
  alternatives_spanish:
  - para expulsión
  - para uprootamiento
  - para desarraigo
  lexicon: HALOT
  rationale: El término es raro y probablemente alude a un castigo de expulsión o remoción de la comunidad/lugar. «Destierro» comunica bien el valor judicial en español y mantiene la ambigüedad de base.
- source_word: לַעֲנָשׁ נִכְסִין
  english_pob_choice: for confiscation of goods
  chosen_spanish: para confiscación de bienes
  alternatives_spanish:
  - para multa sobre los bienes
  - para pérdida de bienes
  - para incautación de bienes
  lexicon: HALOT
  rationale: La frase apunta a un castigo relacionado con posesiones/bienes. «Confiscación de bienes» es la formulación jurídica más clara y fiel.
- source_word: וְלֶאֱסוּרִין
  english_pob_choice: or for imprisonment
  chosen_spanish: o para prisión
  alternatives_spanish:
  - o para encarcelamiento
  - o para cautiverio
  - o para ser puesto en prisiones
  lexicon: HALOT
  rationale: El sustantivo se refiere a ataduras o prisión. «Prisión» es la equivalencia más clara en un listado penal.
theological_decisions:
- issue: Relación entre la ley de Dios y la ley del rey
  english_pob_reading: 'Render both plainly and coordinately: ''the law of your God and the law of the king'''
  chosen_spanish_reading: 'Traducir ambas expresiones de modo coordinado: «la ley de tu Dios y la ley del rey»'
  alternative_spanish_readings:
  - subordinar la ley del rey a la de Dios
  - interpretar la ley del rey como mera aplicación de la ley de Dios
  rationale: El versículo presenta dos autoridades legales coordinadas dentro del decreto persa. La versión española conserva esa tensión textual sin resolverla teológicamente de antemano.
  doctrine_reference: Preservar la tensión teológica sin armonizarla artificialmente.
translation_notes:
  revision_awareness: 'Concordancia alta con el audit trail inglés: se mantuvo la estructura legal, la coordinación entre la ley de Dios y la del rey, y la lista de penas. La principal decisión de español fue optar por un equivalente jurídico natural («destierro», «confiscación de bienes», «prisión») sin perder la rareza del término arameo señalado en la nota.'
  spanish_consistency_notes:
  - Se usó «ley» para דָּתָא de manera consistente en ambas ocurrencias.
  - «Tu Dios» conserva el posesivo singular dirigido a Esdras.
  - La lista de penas mantiene paralelismo y registro jurídico formal.
  - La nota al pie marca correctamente la ambigüedad de לשרשו sin sobretraducirla en el texto principal.
