review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español sigue bien el sentido del hebreo y del audit trail inglés: mantiene הִנֵּה con «he aquí», conserva «con él», respeta la afiliación tribal, preserva el idiomático חכם לב con «sabio de corazón» y expresa correctamente la finalidad en «para que hagan». Sin embargo, hay un ajuste importante de fidelidad onomástica y uno menor de estilo/claridad en la nota.'
  spanish_quality_summary: 'El texto es legible y digno, con registro bíblico natural. «Y he aquí» funciona, aunque algo marcado; no necesita cambio. La frase central suena bien en español eclesial. El principal problema de calidad es la forma del nombre propio: «Ahisamac» debería reflejar mejor el hebreo y el audit trail como «Ahisamac»/«Ahisamac» con consonante final representada; en español la forma más fiel y natural es «Ahisamac» si se sigue la costumbre castellana de transliterar final ך como c, pero dado el inglés POB «Ahisamach» y el hebreo אֲחִיסָמָךְ, conviene «Ahisamac» o «Ahisamac». Además, la nota debe ir sin comillas sobrantes iniciales.'
  glossary_alignment: 'No hay términos del glosario principal en disputa. Se preserva adecuadamente «sabiduría» y el hebraísmo «corazón». No aparecen Yahvé, Mesías, Espíritu, etc. El tratamiento de nombres propios es el punto a corregir: conviene alinear mejor «Ahisamac» con la evidencia fuente y el rastro inglés.'
  issues:
  - severity: medium
    issue: Transliteración del nombre אֲחִיסָמָךְ como «Ahisamac» en lugar de una forma más fiel al hebreo y al audit trail.
    rationale: El inglés POB usa «Ahisamach» y el hebreo termina en ךְ. «Ahisamac» pierde la aspiración/fricativa final documentada por la transliteración fuente. Aunque en español hay flexibilidad, aquí la forma actual parece inconsistente con la evidencia auditada. Se recomienda «Ahisamach» para máxima alineación interlingüística del proyecto.
  - severity: low
    issue: La nota al pie empieza con comilla simple innecesaria.
    rationale: 'La nota dice: ''Hebreo: «sabio de corazón»... Esa comilla inicial sobra y genera descuido editorial.'
  revised_spanish_text: Y he aquí, he puesto con él a Oholiab, hijo de Ahisamach, de la tribu de Dan; y en el corazón de todo sabio de corazón he puesto sabiduría[a], para que hagan todo lo que te he mandado.
  revised_footnotes:
  - marker: a
    text: 'Hebreo: «sabio de corazón», un modismo para personas dotadas de sabiduría o destreza.'
    reason: cultural_note
  revision_rationale: Se corrige la transliteración del nombre propio para alinearla mejor con אֲחִיסָמָךְ y con el audit trail inglés («Ahisamach»), y se limpia la puntuación de la nota al pie. El resto del texto preserva bien el sentido fuente, la decisión léxica de «sabio de corazón / sabiduría» y la claridad del español.
