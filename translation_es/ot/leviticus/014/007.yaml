translation:
  language: es
  text: Rociará[a] sobre el que está siendo purificado de la enfermedad de la piel siete veces[b], y lo declarará limpio[c], y soltará el ave viva sobre el campo abierto.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Es decir, rociará con la mezcla ritual mencionada en el contexto inmediato. El objeto no se expresa en hebreo en este versículo, pero está implícito.
    reason: lexical_clarity
  - marker: b
    text: Tradicionalmente, «lepra». El término hebreo se refiere en Levítico de manera más amplia a diversos padecimientos de la piel, no necesariamente a la lepra moderna.
    reason: lexical_alternative
  - marker: c
    text: O «lo declarará limpio». La acción del sacerdote es ritual/judicial, no solamente médica.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהִזָּה
  english_pob_choice: He shall sprinkle it
  chosen_spanish: Rociará
  alternatives_spanish:
  - Rociará sobre ello
  - Rociará con ello
  lexicon: HALOT
  rationale: En un rito sacrificial, נזה expresa el acto de rociar o asperjar un líquido. En español, «rociará» conserva la acción ritual sin introducir un objeto innecesario; el objeto queda implícito por el contexto inmediato, como en el hebreo.
- source_word: הַמִּטַּהֵר
  english_pob_choice: the one being cleansed
  chosen_spanish: el que se está purificando
  alternatives_spanish:
  - el que está siendo purificado
  - el que va a ser purificado
  lexicon: HALOT
  rationale: El participio hitpael de טהר señala a la persona en proceso de purificación. «Se está purificando» conserva mejor el proceso ritual que un adjetivo simple como «limpio».
- source_word: מִן הַצָּרַעַת
  english_pob_choice: from the skin disease
  chosen_spanish: de la enfermedad de la piel
  alternatives_spanish:
  - de la lepra
  - de la afección de la piel
  lexicon: HALOT
  rationale: צָרַעַת en Levítico no coincide exactamente con la lepra moderna. «Enfermedad de la piel» evita una identificación médica anacrónica y mantiene el alcance ritual del término.
- source_word: שֶׁבַע פְּעָמִים
  english_pob_choice: seven times
  chosen_spanish: siete veces
  lexicon: HALOT
  rationale: Equivalente directo y natural en español para la expresión adverbial numérica.
- source_word: וְטִהֲרוֹ
  english_pob_choice: and he shall pronounce him clean
  chosen_spanish: y lo declarará limpio
  alternatives_spanish:
  - y lo purificará
  - y lo limpiará
  lexicon: HALOT
  rationale: En contexto sacerdotal/jurídico, טהר puede referirse al acto formal de declarar a alguien limpio. «Declarará limpio» preserva ese valor ritual y evita reducirlo a una limpieza médica o meramente física.
- source_word: וְשִׁלַּח
  english_pob_choice: and he shall let the living bird go free
  chosen_spanish: y soltará
  alternatives_spanish:
  - y enviará lejos
  - y liberará
  lexicon: HALOT
  rationale: שׁלח significa enviar o soltar. Dado que el ave está viva y es liberada como parte del rito, «soltará» suena natural en español y conserva la idea de liberación.
- source_word: הַצִּפֹּר הַחַיָּה
  english_pob_choice: the living bird
  chosen_spanish: el ave viva
  alternatives_spanish:
  - el pájaro vivo
  - el ave que está viva
  lexicon: HALOT
  rationale: «Ave viva» mantiene la distinción ritual frente al ave sacrificada del versículo anterior y resulta más sobrio que «pájaro» en registro bíblico.
- source_word: עַל פְּנֵי הַשָּׂדֶה
  english_pob_choice: over the open field
  chosen_spanish: sobre el campo abierto
  alternatives_spanish:
  - en el campo abierto
  - sobre la llanura abierta
  lexicon: HALOT
  rationale: La expresión idiomática puede referirse a la superficie o extensión abierta del campo. «Sobre el campo abierto» conserva la imagen espacial del hebreo con buena fluidez en español.
theological_decisions:
- issue: Valor ritual/judicial de טהר en la acción sacerdotal
  english_pob_reading: Or 'declare him clean.' The priest's action is ritual/judicial, not merely medical.
  chosen_spanish_reading: lo declarará limpio
  alternative_spanish_readings:
  - lo purificará
  - lo limpiará
  rationale: La forma verbal en este contexto no describe una curación médica sino un pronunciamiento ritual con efectos legales dentro del culto. «Lo declarará limpio» deja claro ese carácter formal.
  doctrine_reference: Levítico 14; función sacerdotal de declarar pureza ritual
- issue: Sentido de צָרַעַת
  english_pob_reading: skin disease
  chosen_spanish_reading: enfermedad de la piel
  alternative_spanish_readings:
  - lepra
  - aflicción de la piel
  rationale: Siguiendo la decisión del POB inglés, se evita «lepra» para no importar una categoría clínica moderna ajena al sistema levítico de impureza.
  doctrine_reference: Levítico 13–14; distinción entre impureza ritual y diagnóstico médico moderno
translation_notes:
  revision_awareness: Se siguió la lectura estable del texto base y se mantuvo la misma decisión auditada del inglés POB para צָרַעַת y para el valor jurídico-ritual de טהר, sin introducir cambios de sentido ni ampliar el alcance del versículo.
  spanish_consistency_notes:
  - Se usó «Yahvé» como forma de referencia divina solo cuando corresponde; en este versículo no aparece el nombre divino.
  - «Ave» se prefirió a «pájaro» por registro bíblico y por continuidad con el contraste ritual del pasaje.
  - «Sobre el campo abierto» conserva la imagen espacial de עַל פְּנֵי הַשָּׂדֶה sin sobreinterpretarla como destino geográfico técnico.
