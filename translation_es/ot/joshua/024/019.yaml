translation:
  language: es
  text: 'Y Josué dijo al pueblo[a]: «No podrán servir a Yahvé, porque él es un Dios santo; él es un Dios celoso. No perdonará[b] sus transgresiones ni sus pecados».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «Dios santo», con morfología plural en las palabras para «Dios» y «santo», pero con sentido singular. Literalmente: «Dioses santo él». El pronombre singular muestra que se refiere al único Dios de Israel.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «No llevará/cargará sus transgresiones y sus pecados». El hebreo usa un modismo que a menudo significa «perdonar».'
    reason: alternative_reading
lexical_decisions:
- source_word: תֽוּכְלוּ
  english_pob_choice: are not able
  chosen_spanish: No pueden
  alternatives_spanish:
  - No son capaces de
  - No pueden hacerlo
  lexicon: HALOT
  rationale: תּוּכְלוּ expresa capacidad/posibilidad. «No pueden» comunica incapacidad real de modo natural en español, sin debilitar el sentido de imposibilidad que el contexto exige.
- source_word: לַ/עֲבֹד
  english_pob_choice: to serve
  chosen_spanish: servir
  alternatives_spanish:
  - adorar
  - rendir servicio
  lexicon: HALOT
  rationale: עבד en este marco de pacto abarca servicio leal a Yahvé, no solo culto. «Servir» conserva mejor el alcance covenantal que «adorar», que estrecharía indebidamente el sentido.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: Se mantiene el nombre divino personal representado por el Tetragrámaton. «Yahvé» sigue el estándar POB en español y evita la sustitución por un título.
- source_word: אֱלֹהִים קְדֹשִׁים הוּא
  english_pob_choice: he is a holy God
  chosen_spanish: él es un Dios santo
  alternatives_spanish:
  - él es santos Dioses
  - él es un Dios santo
  lexicon: HALOT
  rationale: Aunque la forma hebrea tiene morfología plural en «Dios» y «santos», el pronombre singular הוּא fija el referente como el único Dios de Israel. El español idiomático debe ser singular; se conserva la tensión en la documentación, no en una literalidad engañosa.
- source_word: אֵל קַנּוֹא הוּא
  english_pob_choice: he is a jealous God
  chosen_spanish: él es un Dios celoso
  alternatives_spanish:
  - él es un Dios celoso de
  - él es un Dios ardiente
  lexicon: HALOT
  rationale: קַנּוֹא en contexto de pacto expresa exclusividad relacional y rechazo de lealtades rivales. «Celoso» es el equivalente más transparente en español y preserva mejor esa fuerza que «ardiente» o «zeloso».
- source_word: לֹא יִשָּׂא
  english_pob_choice: he will not forgive
  chosen_spanish: No perdonará
  alternatives_spanish:
  - No llevará
  - No cargará con
  lexicon: HALOT
  rationale: נשא con lenguaje de pecado puede significar «llevar/cargar» o, idiomáticamente, «perdonar». En este contexto amonestador, la idea es que Yahvé no absuelve el pecado de manera trivial; «No perdonará» expresa el sentido idiomático con claridad.
- source_word: פִשְׁעֲכֶם
  english_pob_choice: your transgressions
  chosen_spanish: sus transgresiones
  alternatives_spanish:
  - sus rebeliones
  - sus infracciones
  lexicon: HALOT
  rationale: פֶּשַׁע implica rebelión/transgresión contra autoridad pactal. «Transgresiones» mantiene el matiz jurídico-covenantal y armoniza con el término siguiente.
- source_word: חַטֹּאותֵיכֶם
  english_pob_choice: your sins
  chosen_spanish: sus pecados
  alternatives_spanish:
  - sus faltas
  - sus ofensas
  lexicon: HALOT
  rationale: חטאת es el término común para pecado. «Pecados» es el equivalente más directo y estable en español.
theological_decisions:
- issue: Morfología plural en «Dios santo» con pronombre singular
  english_pob_reading: 'Render as singular: ''he is a holy God'''
  chosen_spanish_reading: «él es un Dios santo»
  alternative_spanish_readings:
  - «él es santos dioses» (engañoso y no viable)
  - «él es un Dios santo» con nota sobre la morfología plural
  rationale: La concordancia singular del pronombre hebreo obliga a entender el referente como uno solo. El español debe expresar claramente el monoteísmo, mientras la nota conserva la observación morfológica del hebreo.
  doctrine_reference: 'Affirmations; Translation philosophy #1 and #3'
- issue: Sentido de לֹא יִשָּׂא con pecados y transgresiones
  english_pob_reading: Interpret idiomatically as refusal to forgive
  chosen_spanish_reading: «No perdonará»
  alternative_spanish_readings:
  - «No llevará sus transgresiones y sus pecados»
  - «No cargará con sus transgresiones y sus pecados»
  rationale: El verbo hebreo con este complemento suele funcionar idiomáticamente como «perdonar». En este pasaje, Josué advierte de la seriedad del pacto; por eso se traduce según su sentido idiomático natural, sin borrar la imagen subyacente.
  doctrine_reference: 'Translation philosophy #6'
translation_notes:
  revision_awareness: 'La redacción sigue el último estado revisado del POB en inglés: se mantuvo Yahweh/Yahvé en lugar de una sustitución titulada, y se conservaron las decisiones ya confirmadas sobre la capacidad de servir, la singularidad de la referencia divina y el valor idiomático de נשא con pecado. No se introdujeron cambios doctrinales nuevos; solo se ajustó al español la misma lectura auditada.'
  spanish_consistency_notes:
  - Se usa «Yahvé» para el Tetragrámaton, conforme al estándar POB en español.
  - Se prefirió «servir» para עבד por su alcance de lealtad de pacto.
  - «Dios santo» permanece singular en español aunque la nota explica la morfología plural hebrea.
  - «Dios celoso» conserva el matiz de exclusividad pactal, no simple emoción humana.
  - Se traduce נשא con «perdonar» en el cuerpo del texto y se deja la alternativa literal en nota.
  - Se mantiene el registro bíblico moderno y digno, sin arcaísmos innecesarios.
