translation:
  language: es
  text: Pondrás un camino para que venga la espada a Rabá de los amonitas[b][a], y a Judá en Jerusalén fortificada.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'También puede entenderse: «contra Rabá de los amonitas, y contra Judá en Jerusalén fortificada». La construcción hebrea admite movimiento hacia o avance hostil contra esos lugares.'
    reason: alternative_reading
  - marker: b
    text: Rabá era la ciudad principal de los amonitas.
    reason: cultural_note
lexical_decisions:
- source_word: דֶּרֶךְ
  english_pob_choice: a road
  chosen_spanish: un camino
  alternatives_spanish:
  - una ruta
  - un camino abierto
  lexicon: HALOT
  rationale: דֶּרֶךְ denota una vía o trayecto; en español, «camino» es natural y conserva la imagen de una vía marcada para el avance de la espada.
- source_word: תָּשִׂים
  english_pob_choice: you shall set
  chosen_spanish: pondrás
  alternatives_spanish:
  - establecerás
  - colocarás
  lexicon: HALOT
  rationale: שׂים expresa poner/colocar/establecer. «Pondrás» mantiene la fuerza directa de la instrucción y suena más natural que un calco rígido.
- source_word: לָבוֹא
  english_pob_choice: to come
  chosen_spanish: para que venga
  alternatives_spanish:
  - para venir
  - para que llegue
  lexicon: HALOT
  rationale: El infinitivo de בוא expresa finalidad o resultado. En español, la construcción final «para que venga» comunica mejor el propósito de la vía que un infinitivo desnudo.
- source_word: חֶרֶב
  english_pob_choice: the sword
  chosen_spanish: la espada
  alternatives_spanish:
  - una espada
  lexicon: HALOT
  rationale: Aunque el hebreo es formalmente indefinido, en la imagen profética la espada funciona como agente conocido de juicio. El artículo definido en español conserva esa fuerza idiomática.
- source_word: אֵת רַבַּת בְּנֵי עַמּוֹן
  english_pob_choice: to Rabbah of the Ammonites
  chosen_spanish: contra Rabá de los amonitas
  alternatives_spanish:
  - a Rabá de los amonitas
  - hacia Rabá de los amonitas
  lexicon: HALOT
  rationale: La preposición hebrea puede leerse como dirección o como avance hostil. Dado el contexto bélico, «contra» explicita el matiz adversativo sin abandonar la posibilidad de movimiento hacia la ciudad.
- source_word: וְאֶת יְהוּדָה
  english_pob_choice: and to Judah
  chosen_spanish: y contra Judá
  alternatives_spanish:
  - y a Judá
  lexicon: HALOT
  rationale: Se mantiene el paralelismo con el primer objetivo y se deja claro el sentido hostil implícito en el contexto del juicio.
- source_word: בִירוּשָׁלַם
  english_pob_choice: in Jerusalem
  chosen_spanish: en Jerusalén
  alternatives_spanish:
  - a Jerusalén
  - sobre Jerusalén
  lexicon: HALOT
  rationale: La preposición ב indica ubicación; «en Jerusalén» es la equivalencia directa y natural.
- source_word: בְּצוּרָה
  english_pob_choice: fortified
  chosen_spanish: fortificada
  alternatives_spanish:
  - fortificada como plaza fuerte
  - amurallada
  lexicon: HALOT
  rationale: El adjetivo describe a Jerusalén como ciudad fortificada. «Fortificada» preserva el valor atributivo sin sobreexplicar.
theological_decisions:
- issue: Dirección literal frente a sentido hostil de las preposiciones
  english_pob_reading: Both Rabbah and Judah/Jerusalem are presented as destinations/targets of the sword's advance.
  chosen_spanish_reading: Ambas ciudades se presentan como destinos del avance de la espada, con el matiz hostil explicitado por «contra».
  alternative_spanish_readings:
  - Ambas ciudades como simples destinos geográficos de la espada
  - Ambas ciudades como objetivos explícitos de la espada
  rationale: El hebreo permite tanto dirección como agresión. En castellano, «contra» preserva la tensión semántica y evita suavizar el juicio profético.
  doctrine_reference: Juicio profético y lenguaje de guerra en los oráculos de Ezequiel.
translation_notes:
  revision_awareness: 'Coincide con la revisión más reciente consultada: el texto fuente y la auditoría inglesa mantienen un alto grado de acuerdo y no requieren cambios sustantivos. Se conservó la ambigüedad direccional/hostil del hebreo mediante «contra», y se explicitó en nota la alternativa direccional.'
  spanish_consistency_notes:
  - Se usó «Yahvé» en otras secciones según la norma del proyecto; en este versículo no aparece el Tetragrámaton.
  - Se prefirió «espada» para חֶרֶב como imagen judicial profética, siguiendo el sentido del contexto.
  - 'Se mantuvo la equivalencia de nombres propios: Rabbah > Rabá; Judah > Judá; Jerusalem > Jerusalén.'
