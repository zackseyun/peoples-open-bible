  glossary_alignment: No hay conflictos con la terminología del proyecto. «Dios» y «el hombre de Dios» están bien. La preservación de «hijos de Israel» concuerda con la decisión de mantener el colectivo masculino del hebreo, con nota aclaratoria adecuada.
