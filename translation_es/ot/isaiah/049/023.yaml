review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien el hebreo y el rastro POB en la mayor parte del versículo: mantiene la imagen de cuidado real paralelo a ‘nodrizas’, conserva la postración/homenaje sin convertirla en adoración, preserva la viveza de ‘lamerán el polvo de tus pies’, y usa correctamente ‘Yahvé’ según la política española del proyecto. Sin embargo, hay una inconsistencia importante entre el texto principal y la nota b: el texto dice ‘los que esperan en mí’, mientras que la nota b repite exactamente esa misma lectura como alternativa; la alternativa documentada en el expediente inglés es la esperanza, no la espera. Además, ‘esperan en mí’ suena menos natural y menos fiel al hebreo que ‘esperan en mí’/‘esperan en mí’ as note? Mejor en español bíblico neutral: ‘los que esperan en mí’ es comprensible, pero para el hebreo קוי con sentido de esperar/poner esperanza, ‘los que esperan en mí’ funciona; la nota debe ofrecer ‘los que ponen su esperanza en mí’ o similar. También
    conviene afinar ‘Con el rostro hacia la tierra’ a una formulación más idiomática de postración plena.'
  spanish_quality_summary: El español es claro, digno y ampliamente legible. ‘Padres de crianza’ y ‘nodrizas’ forman una pareja natural y fiel. ‘Se inclinarán ante ti’ es aceptable, aunque ‘con el rostro en tierra’ suena más idiomático que ‘hacia la tierra’ para esta imagen. La única falla real de calidad editorial es la nota b, que actualmente no aporta una alternativa y contradice su propia justificación.
  glossary_alignment: 'Buen alineamiento general con la terminología del proyecto: יְהוָה → ‘Yahvé’ correctamente; no hay conflicto con términos doctrinales mayores. La decisión de no usar lenguaje de adoración para יִשְׁתַּחֲווּ está bien justificada. La nota léxica de קוָֹי debe alinearse con la alternativa del expediente inglés (‘hope’) en español, no repetir ‘esperan’.'
  issues:
  - severity: medium
    issue: La nota b repite la misma redacción del texto principal en vez de ofrecer la alternativa semántica documentada.
    rationale: El texto dice ‘los que esperan en mí’, y la nota b dice también ‘O “los que esperan en mí”’. Según el expediente inglés, la alternativa preservada es ‘those who hope in me’; en español debe reflejarse como ‘los que ponen su esperanza en mí’ o equivalente.
  - severity: low
    issue: ‘Con el rostro hacia la tierra’ es comprensible, pero menos idiomático que una formulación de postración como ‘con el rostro en tierra’.
    rationale: אַפַּיִם אֶרֶץ describe una postura de humillación/prostración. ‘En tierra’ suena más natural y vívido en español sin alterar el sentido.
  revised_spanish_text: Reyes serán tus padres de crianza[a], y sus princesas tus nodrizas. Con el rostro en tierra se inclinarán ante ti, y lamerán el polvo de tus pies. Entonces sabrás que yo soy Yahvé; no serán avergonzados los que esperan en mí[b].
  revised_footnotes:
  - marker: a
    text: O ‘tus padres adoptivos’. El término hebreo puede designar a quienes crían, sostienen o protegen.
    reason: lexical_alternative
  - marker: b
    text: O ‘los que ponen su esperanza en mí’. El verbo hebreo incluye tanto espera como expectativa confiada.
    reason: lexical_alternative
  revision_rationale: Se corrige la nota b para que preserve la alternativa léxica real documentada en el expediente inglés (‘hope’), en lugar de repetir la lectura principal. También se suaviza ‘hacia la tierra’ a ‘en tierra’ por mayor naturalidad e idiomaticidad en español, sin cambiar el sentido de postración del hebreo.
