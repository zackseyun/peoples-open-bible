translation:
  language: es
  text: Mis hermanos que subieron conmigo hicieron que se derritiera el corazón del pueblo[a], pero yo seguí plenamente a Yahvé mi Dios.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘desalentaron al pueblo’; literalmente, ‘hicieron que se derritiera el corazón del pueblo’.
    reason: lexical_alternative
lexical_decisions:
- source_word: אַחַי
  english_pob_choice: my brothers
  chosen_spanish: mis hermanos
  alternatives_spanish:
  - mis parientes
  - mis compatriotas
  - mis compañeros
  lexicon: HALOT
  rationale: Se conserva el parentesco literal de ‘hermanos’, que en este contexto se refiere a los compañeros israelitas de Caleb. En español, ‘mis hermanos’ mantiene la cercanía de alianza sin forzar una explicación interpretativa en el texto principal.
- source_word: עָלוּ עִמִּי
  english_pob_choice: went up with me
  chosen_spanish: subieron conmigo
  alternatives_spanish:
  - fueron conmigo
  - ascendieron conmigo
  lexicon: HALOT
  rationale: עלה conserva el sentido básico de ‘subir’ en el marco geográfico de la misión. ‘Subieron conmigo’ es natural en español y reproduce la perspectiva retrospectiva del relato.
- source_word: הִמְסִ֖יו אֶת לֵב הָעָם
  english_pob_choice: made the heart of the people melt
  chosen_spanish: hicieron derretirse el corazón del pueblo
  alternatives_spanish:
  - desalentaron al pueblo
  - hicieron desfallecer el ánimo del pueblo
  - hicieron derretir el corazón del pueblo
  lexicon: HALOT
  rationale: Se preserva la imagen verbal de ‘derretir’ para reflejar el hebreo de manera auditable. El español ‘derretirse’ comunica bien la metáfora de pérdida de valor o firmeza, sin borrar la fuerza figurada del original.
- source_word: לֵב הָעָם
  english_pob_choice: the heart of the people
  chosen_spanish: el corazón del pueblo
  alternatives_spanish:
  - el ánimo del pueblo
  - el valor del pueblo
  - el corazón del pueblo
  lexicon: HALOT
  rationale: ‘Corazón’ mantiene la metáfora hebrea del centro de la voluntad y la valentía. En español, ‘corazón del pueblo’ es claro y conserva el vínculo con la imagen del texto fuente.
- source_word: מִלֵּאתִי אַחֲרֵי
  english_pob_choice: wholly followed
  chosen_spanish: seguí plenamente
  alternatives_spanish:
  - seguí por completo
  - seguí enteramente
  - fui totalmente fiel tras
  lexicon: HALOT
  rationale: El hebreo expresa seguir con total lealtad. ‘Seguí plenamente’ transmite el sentido de entrega completa sin introducir una perífrasis poco natural en español; mantiene la fuerza ética y relacional del modismo.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  - el SEÑOR
  lexicon: HALOT
  rationale: Se adopta la forma española estable ‘Yahvé’ conforme al criterio del proyecto para el Tetragrámaton, evitando la sustitución por un título. Es la opción más natural y reconocible para una lectura bíblica en español.
- source_word: אֱלֹהָי
  english_pob_choice: my God
  chosen_spanish: mi Dios
  alternatives_spanish:
  - mi Dios
  - mi Dios personal
  lexicon: HALOT
  rationale: 'El sufijo posesivo de primera persona debe conservarse: Caleb habla de una relación personal de lealtad pactual. ‘Mi Dios’ es la forma directa y exacta en español.'
theological_decisions:
- issue: Contraste entre Caleb y los otros espías
  english_pob_reading: but I wholly followed Yahweh my God
  chosen_spanish_reading: pero yo seguí plenamente a Yahvé mi Dios
  alternative_spanish_readings:
  - pero yo seguí por completo a Yahvé mi Dios
  - pero yo fui enteramente fiel a Yahvé mi Dios
  rationale: 'El hebreo usa un contraste fuerte: ellos desanimaron al pueblo, pero Caleb permaneció íntegro en su seguimiento. ‘Pero yo seguí plenamente’ conserva esa oposición sin suavizarla, y mantiene la idea de fidelidad total.'
  doctrine_reference: Joshua 14:8; fidelidad pactual del creyente frente a la infidelidad ajena
translation_notes:
  revision_awareness: La redacción española sigue de cerca la lectura revisada del inglés POB, que sustituyó un conector de simultaneidad por un contraste explícito (‘but’). También conserva la imagen hebrea de ‘derretir el corazón’ en lugar de reducirla a ‘desanimar’, aunque se señala la alternativa interpretativa en nota.
  spanish_consistency_notes:
  - Se usó ‘Yahvé’ conforme al criterio del proyecto para el Tetragrámaton, coherente con el tratamiento del nombre divino en el resto de la traducción.
  - Se mantuvo ‘corazón’ para preservar la metáfora hebrea y evitar una nivelación hacia ‘ánimo’ en el texto principal.
  - ‘Seguí plenamente’ se eligió para reflejar el modismo hebreo de seguir con total lealtad, sin recurrir a lenguaje eclesiástico más tradicional pero menos transparente.
