translation:
  language: es
  text: Y así vi a los impíos sepultados; habían entrado y salido del lugar santo[b], y fueron olvidados[a] en la ciudad donde así habían hecho. También esto es vanidad[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, siguiendo algunas versiones antiguas y un entendimiento distinto del hebreo: «y fueron alabados en la ciudad donde así habían hecho».'
    reason: textual_variant
  - marker: b
    text: «El lugar santo» puede referirse al recinto del templo o a otro lugar sagrado.
    reason: cultural_note
  - marker: c
    text: Hebreo hebel, a menudo traducido «vanidad»; también «vapor», lo que sugiere algo fugaz o difícil de apresar.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּבְכֵן
  english_pob_choice: And so
  chosen_spanish: Y así
  alternatives_spanish:
  - Entonces
  - De este modo
  - Así
  lexicon: HALOT
  rationale: El hebreo introduce una observación con valor consecutivo/inferencial; «Y así» conserva esa conexión de manera natural en español sin perder el matiz de continuación.
- source_word: רָאִיתִי
  english_pob_choice: I saw
  chosen_spanish: vi
  alternatives_spanish:
  - he visto
  - he observado
  lexicon: HALOT
  rationale: El perfecto simple español expresa adecuadamente la observación puntual de Qohelet en este contexto narrativo.
- source_word: רְשָׁעִים
  english_pob_choice: the wicked
  chosen_spanish: los impíos
  alternatives_spanish:
  - los malvados
  - los perversos
  lexicon: HALOT
  rationale: «Impíos» conserva la categoría moral y religiosa del término sin sonar excesivamente coloquial; evita una expansión interpretativa.
- source_word: קְבֻרִים
  english_pob_choice: buried
  chosen_spanish: sepultados
  alternatives_spanish:
  - enterrados
  lexicon: HALOT
  rationale: Ambas opciones son posibles; «sepultados» suena más digno y formal en español bíblico, sin alterar el sentido pasivo del participio.
- source_word: וָבָאוּ
  english_pob_choice: they had come
  chosen_spanish: habían entrado
  alternatives_spanish:
  - habían venido
  - habían llegado
  lexicon: HALOT
  rationale: El verbo puede abarcar «venir/entrar»; aquí «entrado» se ajusta mejor a la secuencia con «lugar santo» y mantiene la relación espacial sugerida por el contexto.
- source_word: וּמִמְּקוֹם קָדוֹשׁ
  english_pob_choice: from the holy place
  chosen_spanish: del lugar santo
  alternatives_spanish:
  - del lugar sagrado
  - del santuario
  lexicon: HALOT
  rationale: «Lugar santo» sigue de cerca el hebreo מקום קדוש y preserva la ambigüedad entre recinto sagrado o área del templo, como en el inglés auditado.
- source_word: יְהַלֵּכוּ
  english_pob_choice: gone
  chosen_spanish: salido
  alternatives_spanish:
  - andado
  - ido
  lexicon: HALOT
  rationale: En combinación con «entrado», «salido» expresa de modo natural el movimiento completo sin forzar una traducción literal de «caminar» que sonaría extraña en español.
- source_word: וְיִשְׁתַּכְּחוּ
  english_pob_choice: they were forgotten
  chosen_spanish: fueron olvidados
  alternatives_spanish:
  - quedaron olvidados
  - se les olvidó
  lexicon: HALOT
  rationale: El sentido básico de שכח es «olvidar/ser olvidado». Se mantiene la lectura principal del texto consonántico, dejando constancia de la variante interpretativa en nota.
- source_word: בָעִיר
  english_pob_choice: in the city
  chosen_spanish: en la ciudad
  alternatives_spanish:
  - dentro de la ciudad
  lexicon: HALOT
  rationale: La construcción con artículo definido se reproduce de forma directa y natural en español.
- source_word: אֲשֶׁר כֵּן עָשׂוּ
  english_pob_choice: where they had done so
  chosen_spanish: donde así habían hecho
  alternatives_spanish:
  - donde habían actuado así
  - donde habían hecho esas cosas
  lexicon: HALOT
  rationale: «Así» mantiene la fuerza anafórica de כן sin precisar de más lo que hicieron; «habían hecho» conserva el verbo genérico del hebreo sin añadir contenido ausente.
- source_word: גַּם זֶה הָבֶל
  english_pob_choice: This too is vanity
  chosen_spanish: También esto es vanidad
  alternatives_spanish:
  - Esto también es vapor
  - También esto es fugacidad
  lexicon: HALOT
  rationale: «Vanidad» sigue la tradición terminológica de Eclesiastés y la decisión auditada en inglés; se conserva el término como refrán del libro, con la alternativa semántica indicada en nota.
theological_decisions:
- issue: Sentido difícil de la frase sobre los impíos, el lugar santo y el olvido en la ciudad
  english_pob_reading: The verse describes wicked people who participated in or frequented the holy place, then died and were forgotten in the city.
  chosen_spanish_reading: El versículo describe a impíos que estuvieron vinculados al lugar santo y luego fueron olvidados en la ciudad, sin precisar más su falta.
  alternative_spanish_readings:
  - El versículo puede sugerir participación hipócrita en lo sagrado.
  - El versículo contrapone implícitamente a los impíos con los justos.
  rationale: Se preserva la ambigüedad observacional del hebreo y del audit trail inglés. No se explicita más de lo que el texto permite, ni se resuelve el alcance de la conducta de los impíos.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: La redacción sigue la revisión final del inglés auditado, que mantuvo la estructura general y solo suavizó la puntuación; en español se conserva esa misma sobriedad, con una puntuación equivalente y sin ampliar el contenido del verso. Se tomó en cuenta la nota textual sobre la posible lectura «alabados», pero se adoptó la lectura principal de «olvidados» en el cuerpo del texto.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como convención general del proyecto cuando corresponda; aquí no aparece.
  - Se usa «vanidad» para hebel en armonía con el registro de Eclesiastés y con el audit trail inglés.
  - Se preserva la ambigüedad del hebreo respecto al «lugar santo» y a la acción de los impíos, sin resolverla interpretativamente.
  - 'La sintaxis española sigue el paralelismo del hebreo con fluidez natural: observación inicial, acciones sucesivas, y refrán conclusivo.'
