translation:
  language: es
  text: Honra a tu padre y a tu madre, como Yahvé tu Dios te lo mandó, para que tus días se prolonguen y para que te vaya bien[a] sobre la tierra[b] que Yahvé tu Dios te da.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «para que te sea bien».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «en la tierra que Yahvé tu Dios te da».'
    reason: lexical_alternative
lexical_decisions:
- source_word: כַּבֵּד
  english_pob_choice: Honor
  chosen_spanish: Honra
  alternatives_spanish:
  - Da honor a
  - Ten en honor
  lexicon: HALOT
  rationale: El imperativo piel de כבד en este contexto relacional expresa tratar como valioso o digno de peso. En español, «honra» conserva la fuerza ética y la naturalidad bíblica sin volverse explicativo de más.
- source_word: אָבִיךָ ... אִמֶּךָ
  english_pob_choice: your father and your mother
  chosen_spanish: a tu padre y a tu madre
  alternatives_spanish:
  - a tu padre y madre
  - a tu padre y a tu madre
  lexicon: HALOT
  rationale: La repetición de אֶת antes de cada sustantivo da simetría y énfasis a ambos padres. La formulación española mantiene esa paridad de forma clara y fluida.
- source_word: כַּאֲשֶׁר צִוְּךָ
  english_pob_choice: as ... commanded you
  chosen_spanish: como ... te lo mandó
  alternatives_spanish:
  - como ... te mandó
  - tal como ... te lo mandó
  lexicon: HALOT
  rationale: La relación comparativa de כַּאֲשֶׁר se expresa de manera natural con «como». Se añade «lo» para recoger el objeto implícito del mandato y evitar una frase demasiado abrupta en español.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  lexicon: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
  rationale: 'La traducción española del nombre divino sigue el criterio del proyecto: se usa «Yahvé» como transliteración del Tetragrámaton, preservando el nombre personal del Dios del pacto y evitando la sustitución por un título.'
- source_word: אֱלֹהֶיךָ
  english_pob_choice: your God
  chosen_spanish: tu Dios
  alternatives_spanish:
  - tu Dios, el que te pertenece por pacto
  lexicon: HALOT
  rationale: La forma posesiva de segunda persona se vierte directamente como «tu Dios», manteniendo la relación de pacto sin añadir glosa innecesaria al texto principal.
- source_word: לְמַעַן
  english_pob_choice: so that
  chosen_spanish: para que
  alternatives_spanish:
  - a fin de que
  - con el fin de que
  lexicon: HALOT
  rationale: לְמַעַן expresa propósito o resultado. «Para que» es la equivalencia española más natural y precisa en un registro bíblico contemporáneo.
- source_word: יַאֲרִיכֻן יָמֶיךָ
  english_pob_choice: your days may be long
  chosen_spanish: tus días se prolonguen
  alternatives_spanish:
  - tus días sean prolongados
  - vivas largos días
  lexicon: HALOT
  rationale: La imagen hebrea de «hacer largos los días» se conserva con una construcción verbal natural en español. «Se prolonguen» mantiene la metáfora temporal sin forzar una paráfrasis como «vivas por mucho tiempo».
- source_word: וּלְמַעַן יִיטַב לָךְ
  english_pob_choice: and so that it may go well for you
  chosen_spanish: y para que te vaya bien
  alternatives_spanish:
  - y para que te resulte bien
  - y para que haya bien para ti
  lexicon: HALOT
  rationale: El hebreo usa un giro idiomático de bienestar. «Te vaya bien» es la expresión española más natural que conserva el sentido de prosperidad/beneficio personal.
- source_word: עַל הָאֲדָמָה
  english_pob_choice: on the land
  chosen_spanish: sobre la tierra
  alternatives_spanish:
  - en la tierra
  - en el suelo
  lexicon: HALOT
  rationale: אֲדָמָה aquí refiere a la tierra prometida, no a tierra como material o suelo genérico. «Sobre la tierra» sigue de cerca עַל y suena idiomático en español bíblico.
- source_word: נֹתֵן לָךְ
  english_pob_choice: is giving you
  chosen_spanish: te da
  alternatives_spanish:
  - te está dando
  - te está concediendo
  lexicon: HALOT
  rationale: El participio puede expresar acción en curso o certeza inminente. En español, «te da» preserva la seguridad del don divino y evita una perífrasis innecesaria en este contexto de promesa.
theological_decisions:
- issue: Rendering the divine name יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - el SEÑOR
  rationale: Se mantiene la decisión doctrinal del proyecto de traducir el Tetragrámaton por el nombre propio de Dios, no por un título sustitutivo. «Yahvé» es la forma española estable para esa opción.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Nature of the promise attached to honoring parents
  english_pob_reading: Retain the text's covenantal promise of long life and well-being on the land without narrowing it to either an absolute individual guarantee or a merely symbolic principle.
  chosen_spanish_reading: Mantener la promesa del texto de días prolongados y bienestar en la tierra sin reducirla ni a una garantía individual absoluta ni a un principio meramente simbólico.
  alternative_spanish_readings:
  - Convertirla en una promesa universal e individual de longevidad
  - Interpretarla solo como una promesa nacional o corporativa
  rationale: El hebreo presenta una promesa real en clave de pacto, pero no obliga a resolver la tensión entre aplicación individual y corporativa. La traducción conserva esa amplitud semántica sin cerrar indebidamente el sentido.
  doctrine_reference: 'DOCTRINE.md Translation philosophy §3: Preserve theological tension rather than resolve it'
translation_notes:
  revision_awareness: El borrador sigue de cerca el texto hebreo y el audit trail inglés, sin cambios respecto a la última revisión aprobada. Se preserva la equivalencia de las dos cláusulas finales de propósito y la referencia explícita al nombre divino Yahvé.
  spanish_consistency_notes:
  - Se usa «Yahvé» de forma consistente para יְהוָה, conforme al criterio del proyecto.
  - «Honra» conserva el valor imperativo y la metáfora de peso/dignidad de כבד.
  - La construcción final «te da» mantiene el aspecto de don continuo o cierto del participio hebreo sin sobrecargar el español.
