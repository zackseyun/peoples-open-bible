- from: Porque un fuego se ha encendido en mi ira[a], y arde hasta las profundidades de Seol; devora la tierra y su produce, y abrasa los cimientos de los montes.
  to: Porque un fuego se ha encendido en mi ira, y arde hasta las profundidades de Seol[a]; devora la tierra y su fruto, y abrasa los cimientos de los montes.
  rationale: Se corrige 'su produce' a 'su fruto' para un español natural y fiel al sentido de יבול. Se reubica la nota al segmento 'Seol' porque allí está la variante documentada, y se ajusta su redacción para reflejar mejor las alternativas preservadas por el POB inglés.
