translation:
  language: es
  text: Y por eso, ustedes deben soportar todo sufrimiento por causa de Dios.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: διὰ τοῦτο
  english_pob_choice: because of this
  chosen_spanish: Y por esto
  alternatives_spanish:
  - Por esta razón
  - Por esto
  lexicon: BDAG
  rationale: La expresión retoma el argumento precedente con valor inferencial y causal. «Y por esto» conserva el enlace lógico con un español natural y breve, sin volverla excesivamente formal.
- source_word: ὀφίλετε
  english_pob_choice: you ought
  chosen_spanish: ustedes deben
  alternatives_spanish:
  - ustedes deberían
  - están obligados a
  lexicon: BDAG
  rationale: El verbo expresa obligación moral. En español, «deben» comunica con claridad la fuerza exhortativa sin perder naturalidad; «deberían» sería más débil y «están obligados a» más rígido.
- source_word: πάντα πόνον
  english_pob_choice: every hardship
  chosen_spanish: toda dificultad
  alternatives_spanish:
  - todo sufrimiento
  - todo padecimiento
  - toda pena
  lexicon: BDAG
  rationale: πόνος puede abarcar dolor, esfuerzo penoso o dificultad sufrida. Dado que el contexto martirial hace natural la idea de pruebas y aflicciones, «toda dificultad» evita reducir el sentido solo a dolor físico y conserva una amplitud fiel al texto griego y a la revisión inglesa.
- source_word: ὑπομένειν
  english_pob_choice: to endure
  chosen_spanish: soportar
  alternatives_spanish:
  - perseverar en
  - aguantar
  - resistir
  lexicon: BDAG
  rationale: «Soportar» transmite la idea de mantenerse firme bajo presión o sufrimiento. Es idiomático en español y corresponde bien al valor exhortativo de ὑπομένειν.
- source_word: διὰ τὸν θεόν
  english_pob_choice: for the sake of God
  chosen_spanish: por causa de Dios
  alternatives_spanish:
  - por Dios
  - por amor a Dios
  - a causa de Dios
  lexicon: BDAG
  rationale: La preposición con acusativo expresa motivo o causa. «Por causa de Dios» comunica la razón devocional del sufrimiento y evita la ambigüedad de «por Dios» en español.
theological_decisions:
- issue: Fuerza de la obligación moral en ὀφίλετε
  english_pob_reading: exhortational obligation ('you ought')
  chosen_spanish_reading: obligación exhortativa ('ustedes deben')
  alternative_spanish_readings:
  - ustedes deberían
  - ustedes tienen que
  rationale: El griego no es mera sugerencia. «Deben» conserva la paraénesis y la responsabilidad moral sin convertir la exhortación en un mandato más duro de lo que el contexto exige.
  doctrine_reference: 'DOCTRINE.md: optimal equivalence; preserve source sense without paraphrase'
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión inglesa que cambió 'pain' por 'hardship' para reflejar mejor πόνον en un contexto de sufrimiento; por eso la versión española usa «dificultad» en lugar de un término más restringido como «dolor».
  spanish_consistency_notes:
  - Se mantiene «Dios» para θεόν conforme al estándar del proyecto.
  - Se traduce el imperativo exhortativo con «deben» para conservar la fuerza moral sin sonar arcaico.
  - No se introduce terminología eclesiástica tradicional que atenúe el sentido de obligación o padecimiento.
