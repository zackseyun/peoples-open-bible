translation:
  language: es
  text: 'Te acercaste[a] el día que te llamé; dijiste: «No temas».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Te acercaste el día que clamé a ti»; también, «Te acercaste» puede expresarse como «Viniste cerca» o «Te aproximaste».'
    reason: lexical_alternative
lexical_decisions:
- source_word: קָרַבְתָּ
  english_pob_choice: You came near
  chosen_spanish: Te acercaste
  alternatives_spanish:
  - Te acercaste
  - Te aproximaste
  - Llegaste cerca
  lexicon: HALOT
  rationale: El qal perfecto 2ms de קרב expresa cercanía concreta. «Te acercaste» conserva la imagen de proximidad y suena natural en español. «Te aproximaste» es posible, pero un poco más técnico; «llegaste cerca» resulta menos idiomático.
- source_word: בְּיוֹם
  english_pob_choice: on the day
  chosen_spanish: en el día en que
  alternatives_spanish:
  - el día en que
  - cuando
  - en aquel día
  lexicon: HALOT
  rationale: La preposición temporal ב con יוֹם se vierte mejor con una construcción temporal explícita. «En el día en que» mantiene con bastante fidelidad el giro hebreo sin sonar forzado en español.
- source_word: אֶקְרָאֶךָּ
  english_pob_choice: I called to you
  chosen_spanish: te invoqué
  alternatives_spanish:
  - te llamé
  - clamé a ti
  - te llamé a ti
  lexicon: HALOT
  rationale: En este contexto poético de oración, קרא con sufijo 2ms puede traducirse como dirigirse a Dios en súplica. «Te invoqué» comunica mejor ese acto orante que un simple «te llamé», sin exagerar más allá del verbo.
- source_word: אָמַרְתָּ
  english_pob_choice: you said
  chosen_spanish: dijiste
  alternatives_spanish:
  - hablaste
  - pronunciaste
  lexicon: HALOT
  rationale: אָמַר es el verbo común de decir. «Dijiste» es la correspondencia más directa y natural en español.
- source_word: אַל
  english_pob_choice: Do not
  chosen_spanish: 'No'
  alternatives_spanish:
  - 'No'
  - No llegues a
  - Nunca
  lexicon: HALOT
  rationale: אַל con imperfecto/jussivo forma una prohibición. En español, «No temas» reproduce de forma clara y fiel la fuerza prohibitiva.
- source_word: תִּירָא
  english_pob_choice: fear
  chosen_spanish: temas
  alternatives_spanish:
  - tengas miedo
  - tiemble tu corazón
  lexicon: HALOT
  rationale: El verbo ירא aquí expresa miedo/temor. «Temas» mantiene la forma breve y bíblica de la prohibición; «tengas miedo» es equivalente, pero menos conciso.
theological_decisions:
- issue: Identidad del destinatario en el paralelismo verbal de segunda persona masculina singular
  english_pob_reading: 'The verse is rendered as direct address to God: ''You came near ... you said.'''
  chosen_spanish_reading: 'La segunda persona se conserva como trato directo a Dios: «Te acercaste... dijiste».'
  alternative_spanish_readings:
  - 'Un sujeto impersonal o indeterminado: «Se acercó...»'
  - Un tratamiento no dirigido a Dios explícitamente
  rationale: Las formas verbales 2ms señalan un único destinatario masculino singular; en el marco de la oración del contexto, la lectura más probable es que se trate de Dios. La traducción preserva esa cercanía relacional sin añadir formulaciones doctrinales ajenas al verso.
  doctrine_reference: Translation philosophy §1, §3
translation_notes:
  revision_awareness: El texto inglés auditado mantiene alta concordancia con la fuente hebrea y no muestra revisiones activas; se conservó la estructura temporal y la secuencia de dos acciones en segunda persona, ajustando el verbo de llamada a un registro orante natural en español.
  spanish_consistency_notes:
  - Se mantiene «Dios» implícito por el contexto, sin sustituir el pronombre por una nominación explícita no presente en el hebreo.
  - «Te invoqué» se eligió por el valor devocional del contexto poético, pero se dejó en nota la alternativa más literal «clamé a ti» para conservar la tensión léxica.
  - 'La puntuación respeta la cita directa final y el tono breve del reproche/prohibición: «No temas».'
