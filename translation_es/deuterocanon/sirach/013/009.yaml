translation:
  language: es
  text: Cuando un noble te hace acercarte[a], mantén cierta distancia, y entonces te acercará aún más.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'El hebreo es conciso y también podría entenderse de forma más literal como «Acércate a un noble; mantente lejos». El paralelo griego favorece el sentido adoptado aquí: cuando un poderoso te llama o te hace acercarte, conserva la reserva, y él mismo te hará acercarte más.'
    reason: alternative_reading
lexical_decisions:
- source_word: קָרֵב
  english_pob_choice: draws near
  chosen_spanish: se acerca
  alternatives_spanish:
  - se aproxima
  - te llama cerca
  - te acerca
  lexicon: HALOT
  rationale: El hebreo puede leerse de manera verbal con sentido de acercamiento, y el paralelo griego apoya la idea de una acción del poderoso que convoca o hace acercar. En español, «se acerca» conserva la naturalidad y el movimiento de proximidad sin forzar una explicitación innecesaria de objeto directo.
- source_word: נָדִיב
  english_pob_choice: noble
  chosen_spanish: noble
  alternatives_spanish:
  - príncipe
  - magnate
  - hombre poderoso
  lexicon: HALOT
  rationale: «Noble» conserva el matiz de persona de rango o posición alta que la nota inglesa también retuvo, sin estrechar el término a una figura monárquica específica.
- source_word: הֱיֶה רָחוֹק
  english_pob_choice: keep your distance
  chosen_spanish: mantén tu distancia
  alternatives_spanish:
  - aléjate
  - permanece lejos
  - guarda distancia
  lexicon: HALOT
  rationale: La forma imperativa pide reserva ante el poderoso. «Mantén tu distancia» reproduce bien esa cautela en español moderno y digno.
- source_word: וּכְדֵי כֵן
  english_pob_choice: and then
  chosen_spanish: y entonces
  alternatives_spanish:
  - y así
  - y de ese modo
  - por eso
  lexicon: HALOT
  rationale: La frase introduce la consecuencia del comportamiento prudente. «Y entonces» expresa con claridad ese resultado, sin perder la relación causal o consecutiva del hebreo y del griego.
- source_word: יַגִּישֶׁךָ
  english_pob_choice: he will bring you nearer still
  chosen_spanish: te acercará aún más
  alternatives_spanish:
  - te hará acercarte aún más
  - te traerá más cerca
  - te llamará más cerca
  lexicon: HALOT
  rationale: El verbo transmite la idea de hacer que alguien se acerque. «Te acercará aún más» conserva el valor comparativo indicado por el griego τόσῳ μᾶλλον y mantiene la fluidez del proverbio.
theological_decisions:
- issue: Relación entre el hebreo y el paralelo griego en el primer miembro
  english_pob_reading: 'The Greek parallel supports the sense adopted here: when a powerful person summons you, maintain reserve, and he will invite you closer.'
  chosen_spanish_reading: El primer miembro se entiende como la acción del noble/poderoso que se acerca o llama, no como una iniciativa del destinatario.
  alternative_spanish_readings:
  - Cuando te acerques a un noble...
  - Cuando un noble te acerque...
  rationale: 'La lectura elegida sigue la decisión auditada del POB inglés: el hebreo es terso y puede parecer más literalista si se toma como mandato de acercarse, pero el paralelo griego favorece la escena social de alguien poderoso que convoca. En español se conserva esa tensión con una formulación que no borra ninguna de las dos posibilidades, aunque privilegia el sentido contextual apoyado por el griego.'
  doctrine_reference: Sabiduría práctica / prudencia social; no implica una doctrina específica.
translation_notes:
  revision_awareness: Seguí la revisión auditada del POB inglés que ajustó el primer miembro para no añadir un objeto explícito que no está en el hebreo, y mantuve el resultado intensivo del final («aún más») coherente con τόσῳ μᾶλλον del griego.
  spanish_consistency_notes:
  - Se usó «noble» para נָדִיב en coherencia con el registro sapiencial y con el POB inglés.
  - Se prefirió «te acercará aún más» para reflejar la fuerza consecutiva e intensiva del final.
  - La nota al pie conserva la tensión interpretativa entre la literalidad hebrea y el apoyo del griego sin resolverla artificialmente.
