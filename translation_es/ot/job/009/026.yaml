  glossary_alignment: No hay términos teológicos sensibles en este versículo. La alineación léxica general con el audit trail es buena. Se preserva la alternativa de נֶשֶׁר mediante nota, y «presa» refleja bien el uso contextual de אֹכֶל.
  issues:
