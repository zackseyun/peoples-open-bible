translation:
  language: es
  text: Y les entregó[a], tras haberlo pesado, seiscientos cincuenta talentos de plata, y vasos de plata por valor de cien talentos, y cien talentos de oro, y veinte cuencos de oro[b], y diez vasos de bronce fino y resplandeciente.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El griego de 1 Esdras difiere notablemente del paralelo hebreo de Esdras 8:27, que habla de dos objetos de bronce fino y da un valor para los cuencos de oro. Como 1 Esdras se traduce aquí desde el testimonio griego, el texto principal sigue el inventario griego.
    reason: textual_variant
  - marker: b
    text: O posiblemente «veinte objetos de oro»; el término griego es raro, pero el paralelo hebreo apoya entenderlo como una clase de cuenco o recipiente.
    reason: lexical_alternative
lexical_decisions:
- source_word: παρέδωκεν
  english_pob_choice: handed over
  chosen_spanish: se lo entregó
  alternatives_spanish:
  - se lo entregó a ellos
  - les entregó
  lexicon: LSJ
  rationale: En este contexto de inventario y traslado de bienes del templo, «entregar» reproduce bien el acto formal de transferencia sin sonar mecánico en español.
- source_word: στήσας
  english_pob_choice: after weighing it out
  chosen_spanish: tras haberlo pesado
  alternatives_spanish:
  - después de pesarlo
  - habiéndolo pesado
  lexicon: LSJ
  rationale: La forma participial apunta al pesaje previo de los objetos valiosos; «tras haberlo pesado» conserva ese valor temporal y la conexión con la práctica de medir por peso.
- source_word: τάλαντα ἀργυρίου ἑξακόσια πεντήκοντα
  english_pob_choice: six hundred fifty talents of silver
  chosen_spanish: seiscientos cincuenta talentos de plata
  alternatives_spanish:
  - 650 talentos de plata
  lexicon: LSJ
  rationale: Se mantiene la unidad antigua «talentos» para respetar el registro inventarial del texto fuente y no modernizar la medida.
- source_word: σκεύη ἀργυρᾶ
  english_pob_choice: silver vessels
  chosen_spanish: vasos de plata
  alternatives_spanish:
  - vasijas de plata
  - utensilios de plata
  lexicon: LSJ
  rationale: «Vasos» funciona bien en español bíblico para objetos del templo y conserva la amplitud de σκεύη sin volverlo demasiado general.
- source_word: χρυσίου ταλάντων ἑκατόν
  english_pob_choice: a hundred talents of gold
  chosen_spanish: cien talentos de oro
  alternatives_spanish:
  - cien talentos áureos
  lexicon: LSJ
  rationale: La estructura de cantidad + unidad + material queda clara y natural en español, manteniendo el orden inventarial del griego.
- source_word: χρυσώματα
  english_pob_choice: golden bowls
  chosen_spanish: copas de oro
  alternatives_spanish:
  - cuencos de oro
  - vasos de oro
  - objetos de oro
  lexicon: LSJ
  rationale: El término es raro y el paralelo hebreo sugiere recipientes de oro; «copas» es una opción prudente y publicable en español, aunque no obliga a fijar demasiado la forma exacta del objeto.
- source_word: χαλκᾶ ... στίλβοντα
  english_pob_choice: ten vessels of fine gleaming bronze
  chosen_spanish: diez vasos de bronce fino y resplandeciente
  alternatives_spanish:
  - diez vasos de bronce bueno y resplandeciente
  - diez recipientes de bronce fino y brillante
  lexicon: LSJ
  rationale: 'Se conserva la cualidad doble del griego: el material y su calidad/brillo. «Brillante» o «resplandeciente» reflejan στίλβοντα; «fino» traduce la idea de χρηστοῦ como bronce de buena calidad.'
translation_notes:
  revision_awareness: La versión inglesa POB más reciente eliminó la repetición de 'bronze' antes de 'vessels' para ajustarse mejor al orden griego. La redacción española sigue ese ajuste con «vasos de bronce fino y resplandeciente», sin duplicar innecesariamente el material antes de «vasos».
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma general de la serie, pero este versículo no contiene el tetragrámaton.
  - Se conserva el estilo inventarial con cantidades y unidades antiguas, sin convertir medidas.
  - «Vasos» se usa de manera consistente para σκεύη en este tipo de contexto culto/tesoro.
  - Se evita sobreinterpretar χρυσώματα; la nota deja abierta la alternativa más general que el audit trail permite.
