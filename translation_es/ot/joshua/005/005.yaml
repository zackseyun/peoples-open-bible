translation:
  language: es
  text: Porque todo el pueblo que salió ya había sido circuncidado, pero a todo el pueblo nacido en el desierto durante el camino, después de salir de Egipto, no lo habían circuncidado.[a]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más formalmente: «pero todo el pueblo nacido en el desierto durante el camino después de salir de Egipto no había sido circuncidado».'
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  lexicon: HALOT
  rationale: Introduce la explicación de lo dicho antes; «porque» expresa bien la relación causal/explanatoria en español sin forzar el orden.
- source_word: מֻלִים הָיוּ
  english_pob_choice: had been circumcised
  chosen_spanish: habían sido circuncidados
  alternatives_spanish:
  - eran circuncidados
  - estaban circuncidados
  lexicon: HALOT
  rationale: El perfecto con היה pide un pluscuamperfecto; la pasiva española conserva el estado anterior consumado.
- source_word: כָּל הָעָם
  english_pob_choice: all the people
  chosen_spanish: todos los pueblos
  alternatives_spanish:
  - todo el pueblo
  - toda la gente
  lexicon: HALOT
  rationale: «עם» es colectivo; en español, «pueblo» mantiene mejor el valor corporativo. Se pluraliza por concordancia con el hebreo distributivo y para evitar una lectura demasiado técnica de singular colectivo.
- source_word: הַיֹּצְאִים
  english_pob_choice: who came out
  chosen_spanish: que salieron
  alternatives_spanish:
  - que habían salido
  - los que salieron
  lexicon: HALOT
  rationale: El participio sustantivado se traduce naturalmente con una relativa breve; «salieron» conserva el movimiento de salida de Egipto.
- source_word: וְכָל הָעָם הַיִּלֹּדִים
  english_pob_choice: but all the people born
  chosen_spanish: pero todos los pueblos nacidos
  alternatives_spanish:
  - y todos los pueblos nacidos
  - pero todo el pueblo nacido
  lexicon: HALOT
  rationale: La conjunción marca contraste. «Nacidos» reproduce el valor pasivo/adjetival del participio.
- source_word: בַּמִּדְבָּר
  english_pob_choice: in the wilderness
  chosen_spanish: en el desierto
  alternatives_spanish:
  - en el desierto-silvestre
  - en la tierra árida
  lexicon: HALOT
  rationale: En español bíblico «desierto» es idiomático y claro; mantiene la referencia del éxodo aunque «wilderness» tenga resonancia tradicional.
- source_word: בַּדֶּרֶךְ
  english_pob_choice: on the way
  chosen_spanish: en el camino
  alternatives_spanish:
  - por el camino
  - durante el viaje
  lexicon: HALOT
  rationale: «Camino» preserva el sentido de trayecto y suena natural junto con la frase siguiente.
- source_word: בְּצֵאתָם מִמִּצְרַיִם
  english_pob_choice: as they came out from Egypt
  chosen_spanish: cuando salían de Egipto
  alternatives_spanish:
  - al salir de Egipto
  - mientras salían de Egipto
  lexicon: HALOT
  rationale: La construcción temporal se rinde mejor con una subordinada temporal; «cuando salían» recoge el trasfondo procesual del éxodo sin añadir una relación temporal más fuerte que la del hebreo.
- source_word: לֹא מָלוּ
  english_pob_choice: had not been circumcised
  chosen_spanish: no habían sido circuncidados
  alternatives_spanish:
  - no estaban circuncidados
  - no se habían circuncidado
  lexicon: HALOT
  rationale: La pasiva española mantiene el estado resultante y evita atribuir explícitamente la acción a agentes no mencionados.
theological_decisions:
- issue: Circuncisión como estado pasado/resultante
  english_pob_reading: had been circumcised / had not been circumcised
  chosen_spanish_reading: habían sido circuncidados / no habían sido circuncidados
  alternative_spanish_readings:
  - eran circuncidados / no estaban circuncidados
  - se habían circuncidado / no se habían circuncidado
  rationale: El versículo contrasta dos generaciones por su condición ritual previa. El pluscuamperfecto pasivo en español conserva el matiz de estado anterior sin introducir agentes implícitos.
  doctrine_reference: Josué 5:5; circuncisión del pacto en el contexto de la alianza de Israel
- issue: Colectivo de 'people' con contraste generacional
  english_pob_reading: all the people ... but all the people ...
  chosen_spanish_reading: todos los pueblos ... pero todos los pueblos ...
  alternative_spanish_readings:
  - todo el pueblo ... pero todo el pueblo ...
  - todos los hombres ... pero todos los hombres ...
  rationale: Aunque el hebreo usa un colectivo singular, el contraste entre grupos de personas se expresa con naturalidad en plural en español. Se evita restringir sin base textual a 'hombres'.
  doctrine_reference: Josué 5:5; distinción entre la generación del éxodo y la del desierto
translation_notes:
  revision_awareness: Se incorporó la revisión más reciente del inglés auditado al escoger una subordinada temporal natural («cuando salían de Egipto») y se evitó añadir una coma innecesaria en la secuencia temporal. También se mantuvo la equivalencia de estado anterior mediante el pluscuamperfecto pasivo, acorde con el ajuste inglés final.
  spanish_consistency_notes:
  - Se usó «circuncidados» de manera consistente para מֻלִים / מָלוּ.
  - Se mantuvo el contraste entre los dos grupos con «pero».
  - Se evitó «SEÑOR» y cualquier sustitución del texto fuente, ya que este versículo no contiene el nombre divino.
  - Se prefirió «desierto» por idiomaticidad bíblica en español frente a un calco de «wilderness».
