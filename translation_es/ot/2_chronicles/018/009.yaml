translation:
  language: es
  text: Y el rey de Israel y Josafat, rey de Judá, estaban sentados, cada uno en su trono, vestidos con vestiduras[a], en la era, a la entrada de la puerta de Samaria; y todos los profetas profetizaban delante de ellos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O "ataviados con ropas". El hebreo dice literalmente "vestidos con vestiduras".
    reason: lexical_alternative
lexical_decisions:
- source_word: וּמֶלֶךְ יִשְׂרָאֵל
  english_pob_choice: Now the king of Israel
  chosen_spanish: Y el rey de Israel
  alternatives_spanish:
  - Ahora el rey de Israel
  - Y el rey de Israel, entonces
  lexicon: WLC / HALOT
  rationale: El ו inicial aquí puede ser simple enlace narrativo; en español, 'Y' preserva la continuidad del relato sin añadir un matiz temporal no explícito. 'Ahora' sería posible en estilo narrativo, pero no es necesario para la fidelidad del hebreo.
- source_word: וִיהוֹשָׁפָט מֶלֶךְ יְהוּדָה
  english_pob_choice: and Jehoshaphat king of Judah
  chosen_spanish: Josafat, rey de Judá
  alternatives_spanish:
  - y Josafat, rey de Judá
  - y Josafat rey de Judá
  lexicon: WLC / HALOT
  rationale: Se conserva el nombre propio y la aposición real de manera natural en español. La coma ayuda a leer la estructura apposicional sin sobrecargar el texto.
- source_word: יוֹשְׁבִים ... וְיֹשְׁבִים
  english_pob_choice: were sitting ... and sitting
  chosen_spanish: estaban sentados ... y sentados
  alternatives_spanish:
  - estaban sentados ... y estaban sentados
  - se sentaron ... y se sentaron
  lexicon: WLC / HALOT
  rationale: El hebreo repite el participio para describir tanto la postura regia como la escena localizada. El español conserva la repetición con 'estaban sentados ... y sentados' para no perder el énfasis descriptivo del original.
- source_word: אִישׁ עַל כִּסְאוֹ
  english_pob_choice: each on his throne
  chosen_spanish: cada uno en su trono
  alternatives_spanish:
  - cada cual en su trono
  - cada uno sobre su trono
  lexicon: WLC / HALOT
  rationale: אִישׁ tiene aquí valor distributivo; 'cada uno' lo expresa de forma natural. כִּסֵּא en contexto real se traduce mejor como 'trono' y no como 'asiento'.
- source_word: מְלֻבָּשִׁים בְּגָדִים
  english_pob_choice: clothed in garments
  chosen_spanish: vestidos con ropas
  alternatives_spanish:
  - clothed in garments
  - ataviados con ropas
  lexicon: WLC / HALOT
  rationale: '''Vestidos con ropas'' reproduce con sobriedad la imagen literal de estar cubiertos con vestiduras, sin introducir el matiz interpretativo de ''vestiduras reales'' o ''ropas lujosas''.'
- source_word: בְּגָדִים
  english_pob_choice: garments
  chosen_spanish: ropas
  alternatives_spanish:
  - vestidos
  - vestiduras
  lexicon: WLC / HALOT
  rationale: '''Ropas'' es claro y neutral en español contemporáneo. ''Vestiduras'' sería más solemne, pero puede sonar más eclesiástico que el hebreo aquí.'
- source_word: בְּגֹרֶן
  english_pob_choice: at the threshing floor
  chosen_spanish: en la era
  alternatives_spanish:
  - en la era de trillar
  - junto a la era
  lexicon: HALOT
  rationale: גוֹרֶן designa la era de trillar; 'era' es el equivalente natural y conciso en español bíblico actual. Mantiene el escenario concreto sin añadir elementos.
- source_word: פֶּתַח שַׁעַר שֹׁמְרוֹן
  english_pob_choice: at the entrance of the gate of Samaria
  chosen_spanish: a la entrada de la puerta de Samaria
  alternatives_spanish:
  - en la entrada de la puerta de Samaria
  - a la entrada del portal de Samaria
  lexicon: WLC / HALOT
  rationale: La cadena constructa se refleja con 'a la entrada de la puerta de Samaria'. Aunque 'puerta' puede parecer redundante, expresa bien el acceso/umbral del recinto urbano tal como lo hace el hebreo.
- source_word: וְכָל הַנְּבִיאִים
  english_pob_choice: and all the prophets
  chosen_spanish: y todos los profetas
  alternatives_spanish:
  - y todos los profetas de
  - y todos los profetas entonces
  lexicon: WLC / HALOT
  rationale: Traducción directa y natural del colectivo con conjunción simple.
- source_word: מִתְנַבְּאִים לִפְנֵיהֶם
  english_pob_choice: were prophesying before them
  chosen_spanish: profetizaban delante de ellos
  alternatives_spanish:
  - profetizaban en su presencia
  - estaban profetizando delante de ellos
  lexicon: WLC / HALOT
  rationale: El hitpael expresa actividad profética real; 'profetizaban' comunica bien ese sentido sin forzar perífrasis innecesarias. 'Delante de ellos' sigue de cerca לִפְנֵיהֶם y conserva el carácter público de la escena.
theological_decisions:
- issue: Repetición de la postura sentada de los reyes y el matiz escénico
  english_pob_reading: were sitting ... and sitting
  chosen_spanish_reading: estaban sentados ... y sentados
  alternative_spanish_readings:
  - se sentaron ... y sentados
  - estaban sentados ... y estaban sentados
  rationale: No se suaviza la repetición hebrea, porque funciona como recurso de escena y de ubicación simultánea. La duplicación en español, aunque algo enfática, preserva la textura del texto fuente.
  doctrine_reference: Ninguna; decisión de estilo y fidelidad textual.
translation_notes:
  revision_awareness: El auditorio inglés revisó el verso para mantener el segundo participio como simple 'and sitting' sin sujeto explícito repetido. El español sigue esa misma economía sintáctica al no añadir un nuevo sujeto ni convertir la segunda frase en una nueva cláusula finita.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' como norma del proyecto, pero este versículo no contiene el nombre divino.
  - '''Mesías/Cristo'' no aparece en el versículo.'
  - Se conserva el lenguaje real con 'rey' y 'trono' sin sustituirlo por términos más eclesiales.
  - '''Profetizaban'' se usa para מִתְנַבְּאִים, evitando diluir la fuerza verbal del hebreo.'
