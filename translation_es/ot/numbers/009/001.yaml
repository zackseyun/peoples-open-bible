translation:
  language: es
  text: 'Y Yahvé habló a Moisés en el desierto de Sinaí[a], en el segundo año después de que salieron de la tierra de Egipto, en el primer mes, diciendo:'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «en la región desértica de Sinaí».
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  - el SEÑOR
  lexicon: HALOT
  rationale: El texto hebreo usa el nombre propio del pacto, no un título. En español, la forma tradicional y reconocible que corresponde al criterio POB es «Yahvé», manteniendo el nombre divino sin sustituirlo por una convención de mayúsculas.
- source_word: וַיְדַבֵּר
  english_pob_choice: And ... spoke
  chosen_spanish: Y habló
  alternatives_spanish:
  - Entonces habló
  - y dijo
  lexicon: HALOT
  rationale: El waw consecutivo avanza la narración. «Y habló» conserva ese movimiento sin imponer una relación temporal más fuerte que la del hebreo.
- source_word: אֶל מֹשֶׁה
  english_pob_choice: to Moses
  chosen_spanish: a Moisés
  alternatives_spanish:
  - con Moisés
  lexicon: HALOT
  rationale: Con דבר, אֶל marca al destinatario del habla. En español, «a Moisés» expresa de forma natural esa dirección.
- source_word: בְּמִדְבַּר סִינַי
  english_pob_choice: in the wilderness of Sinai
  chosen_spanish: en el desierto de Sinaí
  alternatives_spanish:
  - en el desierto de Sinaí
  - en la región desértica de Sinaí
  lexicon: HALOT
  rationale: מִדְבָּר admite «desierto» o «desierto/terreno desértico»; el POB inglés preserva la alternativa «desert of Sinai». En español, «desierto de Sinaí» es claro y fiel, y permite la alternativa lexical documentada en nota.
- source_word: בַּשָּׁנָה הַשֵּׁנִית
  english_pob_choice: in the second year
  chosen_spanish: en el segundo año
  alternatives_spanish:
  - durante el segundo año
  lexicon: HALOT
  rationale: La expresión temporal es directa. «En el segundo año» es la formulación española más natural y cercana al hebreo.
- source_word: לְצֵאתָם מֵאֶרֶץ מִצְרַיִם
  english_pob_choice: after they came out of the land of Egypt
  chosen_spanish: después de que salieron de la tierra de Egipto
  alternatives_spanish:
  - después de su salida de la tierra de Egipto
  - a partir de que salieron de la tierra de Egipto
  lexicon: HALOT
  rationale: El infinitivo constructo con ל y sufijo marca un anclaje temporal respecto del éxodo. «Después de que salieron» expresa bien esa relación en español, sin perder el evento de salida; «tierra de Egipto» conserva אֶרֶץ.
- source_word: בַּחֹדֶשׁ הָרִאשׁוֹן
  english_pob_choice: in the first month
  chosen_spanish: en el primer mes
  alternatives_spanish:
  - durante el primer mes
  lexicon: HALOT
  rationale: Es una frase temporal sencilla. «En el primer mes» es idiomática y fiel.
- source_word: לֵאמֹר
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - y diciendo
  lexicon: HALOT
  rationale: Esta partícula introduce el contenido del discurso siguiente. «Diciendo» mantiene el enlace formal sin convertirlo en otro verbo principal.
theological_decisions:
- issue: Nombre divino YHWH
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Jehová
  - el SEÑOR
  rationale: Se preserva el nombre propio del pacto presente en el hebreo, en vez de sustituirlo por un título. La forma «Yahvé» es la opción POB para español, coherente con la decisión inglesa de usar una transliteración del Tetragrama.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
translation_notes:
  revision_awareness: El control cruzado del inglés POB indica alta concordancia y ausencia de cambios necesarios; por tanto, el borrador español sigue de cerca el sentido base sin introducir ajustes textuales adicionales.
  spanish_consistency_notes:
  - Se conserva la secuencia narrativa con «Y habló», evitando una paráfrasis más libre.
  - «Tierra de Egipto» mantiene el valor de אֶרֶץ frente a una reducción a «Egipto».
  - La nota[a] reproduce la alternativa lexical documentada para מִדְבָּר, sin ampliar indebidamente el rango semántico.
  - Se usa puntuación española estándar y se mantiene «diciendo» como conector formal de discurso.
