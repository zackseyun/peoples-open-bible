translation:
  language: es
  text: Entonces Natán fue a su casa, y Yahvé hirió[a] al niño que la mujer de Urías había dado a luz para David[b], y enfermó[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «golpeó» o «afligió» al niño.
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «la mujer de Urías», preservando la negativa narrativa deliberada de nombrar directamente a Batseba aquí.'
    reason: cultural_note
  - marker: c
    text: O «y se enfermó» o «y cayó enfermo». El hebreo se refiere a que el niño llegó a estar enfermo.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֵּלֶךְ
  english_pob_choice: Then ... went
  chosen_spanish: Entonces ... fue
  alternatives_spanish:
  - Y ... fue
  - Entonces ... se fue
  lexicon: HALOT
  rationale: La secuencia narrativa del waw consecutivo pide un enlace temporal natural. «Entonces» conserva el avance del relato; «fue» es una forma sobria y fiel para נָתָן fue a su casa.
- source_word: בֵּיתוֹ
  english_pob_choice: his house
  chosen_spanish: su casa
  alternatives_spanish:
  - su hogar
  - su casa propia
  lexicon: HALOT
  rationale: El hebreo dice literalmente «su casa»; en español es claro y natural. Mantiene la concreción del texto sin añadir matices no presentes.
- source_word: וַיִּגֹּף
  english_pob_choice: struck
  chosen_spanish: golpeó
  alternatives_spanish:
  - hirió
  - azotó
  - afligió
  lexicon: HALOT
  rationale: נָגַף puede expresar golpear con efecto dañino. «Golpeó» conserva la fuerza directa del verbo sin precisar indebidamente el tipo de mal que vino sobre el niño. «Afligió» sería posible, pero suaviza demasiado la acción causal explícita.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  - el SEÑOR
  lexicon: 'DOCTRINE.md: Contested terms — יהוה / YHWH → Yahvé'
  rationale: 'Se sigue el criterio del proyecto: el Tetragrámaton se transcribe como «Yahvé» para preservar el nombre personal divino, en lugar de sustituirlo por un título.'
- source_word: הַיֶּלֶד
  english_pob_choice: the child
  chosen_spanish: el niño
  alternatives_spanish:
  - el hijo
  - el pequeño
  lexicon: HALOT
  rationale: En este contexto el referente es un niño recién nacido o muy pequeño. «Niño» es natural en español y comunica bien la referencia humana concreta; «hijo» sería menos preciso aquí.
- source_word: אֲשֶׁר יָלְדָה אֵשֶׁת אוּרִיָּה לְדָוִד
  english_pob_choice: whom Uriah’s wife had borne to David
  chosen_spanish: que la mujer de Urías había dado a luz para David
  alternatives_spanish:
  - que la esposa de Urías había dado a luz para David
  - que la mujer de Urías había parido a David
  lexicon: HALOT
  rationale: Se mantiene la designación narrativa «la mujer de Urías», evitando introducir «Batseba» donde el hebreo la omite deliberadamente. «Había dado a luz» reproduce el verbo de manera digna y clara; «para David» refleja el dativo final/relacional del hebreo.
- source_word: וַיֵּאָנַשׁ
  english_pob_choice: and it became sick
  chosen_spanish: y enfermó gravemente
  alternatives_spanish:
  - y enfermó
  - y cayó enfermo
  - y se puso muy enfermo
  lexicon: HALOT
  rationale: El verbo expresa el comienzo de una enfermedad seria. «Enfermó gravemente» transmite ese deterioro sin convertir la frase en una explicación médica añadida; la gravedad queda apoyada por el desarrollo inmediato del relato.
theological_decisions:
- issue: Agencia divina en la aflicción del niño
  english_pob_reading: the LORD struck the child
  chosen_spanish_reading: Yahvé golpeó al niño
  alternative_spanish_readings:
  - Yahvé afligió al niño
  - Yahvé hirió al niño
  rationale: Se conserva la agencia explícita de Yahvé en el texto. «Golpeó» mantiene la acción directa y fuerte del hebreo, sin reinterpretarla como mero estado emocional o pasivo. No se suaviza la atribución divina, porque el pasaje la presenta de forma frontal.
  doctrine_reference: Principio de primacía del texto original y preservación de la agencia verbal
- issue: Conservación de la referencia a la esposa de Urías
  english_pob_reading: Uriah’s wife
  chosen_spanish_reading: la mujer de Urías
  alternative_spanish_readings:
  - la esposa de Urías
  - Batseba
  rationale: Se mantiene la perífrasis del hebreo, que aquí evita nombrarla directamente. Traducir «Batseba» borraría una tensión narrativa deliberada que el texto conserva en este versículo.
  doctrine_reference: Principio de no borrar tensiones léxicas o narrativas documentadas
translation_notes:
  revision_awareness: El inglés auditado pasó de «he became sick» a «it became sick» para concordar mejor con «the child»; el español sigue esa lectura impersonal con «enfermó gravemente», manteniendo el sujeto «el niño» como referente y evitando una relectura más interpretativa.
  spanish_consistency_notes:
  - Se usa «Yahvé» de forma consistente para יְהוָה, conforme al estándar del proyecto.
  - Se evita «SEÑOR» como sustitución reverencial, para no ocultar el nombre divino.
  - Se conserva «la mujer de Urías» en lugar de introducir «Batseba», respetando la estrategia narrativa del versículo.
  - «Niño» se prefiere aquí frente a «hijo» por la edad implícita del referente.
  - «Golpeó» deja abierta la intensidad exacta del daño, en línea con la ambigüedad controlada del hebreo y la nota inglesa sobre «struck/afflicted/plagued».
