translation:
  language: es
  text: '¡Mira![a], brotan de sus bocas; hay espadas sobre sus labios, porque dicen[b]: «¿Quién oye?»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «se derraman de sus bocas»; el verbo hebreo sugiere algo que brota, mana o se vierte con fuerza.
    reason: lexical_alternative
  - marker: b
    text: 'El hebreo dice simplemente: «¿Quién oye?». El objeto queda implícito, dejando abierta la arrogante insinuación.'
    reason: alternative_reading
lexical_decisions:
- source_word: הִנֵּה
  english_pob_choice: Look
  chosen_spanish: ¡Mira!
  alternatives_spanish:
  - ¡Mira, pues!
  - ¡He aquí!
  - Observa!
  lexicon: HALOT
  rationale: La partícula llama la atención del oyente; en español, «¡Mira!» conserva el impulso deíctico con naturalidad y sin el tono arcaico de «He aquí».
- source_word: יַבִּיעוּן
  english_pob_choice: they pour out
  chosen_spanish: brotan
  alternatives_spanish:
  - se derraman
  - brotan con abundancia
  - se desbordan
  lexicon: HALOT
  rationale: El verbo hebreo evoca algo que brota o fluye con fuerza. «Brotan» reproduce bien la imagen verbal y mantiene la fluidez poética en español.
- source_word: בְּפִיהֶם
  english_pob_choice: from their mouths
  chosen_spanish: de su boca
  alternatives_spanish:
  - de sus bocas
  - de la boca de ellos
  - en su boca
  lexicon: HALOT
  rationale: Con el verbo «brotan», la preposición natural en español es «de», que conserva la idea de origen del flujo verbal.
- source_word: חֲרָבוֹת
  english_pob_choice: swords
  chosen_spanish: espadas
  alternatives_spanish:
  - sables
  - puñales
  - armas
  lexicon: HALOT
  rationale: El sustantivo denota literalmente armas cortantes, y la metáfora de habla violenta debe preservarse en español sin interpretarla como mera agresividad genérica.
- source_word: בְּשִׂפְתוֹתֵיהֶם
  english_pob_choice: on their lips
  chosen_spanish: sobre sus labios
  alternatives_spanish:
  - en sus labios
  - con sus labios
  - en los labios de ellos
  lexicon: HALOT
  rationale: «Sobre sus labios» reproduce mejor la imagen paralela del hebreo y sugiere que la violencia está lista para salir en palabras.
- source_word: מִי שֹׁמֵעַ
  english_pob_choice: Who hears?
  chosen_spanish: ¿Quién oye?
  alternatives_spanish:
  - ¿Quién escucha?
  - ¿Quién lo oye?
  - ¿Quién está oyendo?
  lexicon: HALOT
  rationale: El hebreo deja el objeto implícito; «¿Quién oye?» conserva esa indeterminación. «Oye» es breve y refleja bien la fuerza retórica de la pregunta.
theological_decisions:
- issue: Objeto implícito del verbo «oír» en la pregunta retórica
  english_pob_reading: 'The text leaves the hearer unnamed: ''Who hears?'''
  chosen_spanish_reading: 'La pregunta queda abierta: «¿Quién oye?»'
  alternative_spanish_readings:
  - ¿Quién nos oye?
  - ¿Quién lo oye?
  - ¿Quién oye esto?
  rationale: El hebreo no especifica qué se oye ni a quién, y la fuerza del verso está en la arrogancia abierta de los impíos. Mantener la omisión preserva la tensión teológica sin resolverla prematuramente.
  doctrine_reference: Preservar la tensión teológica del texto sin añadir contenido ausente del hebreo.
translation_notes:
  revision_awareness: La revisión inglesa eliminó la repetición de «swords» tras «pour out» para ajustarse mejor al hebreo, donde «swords» pertenece a la segunda cola («on their lips»). La versión española sigue ese ajuste al colocar «espadas» solo en la segunda cola y no después de «brotan».
  spanish_consistency_notes:
  - Se mantiene «Dios»/«Yahvé» fuera del versículo porque el hebreo no lo menciona explícitamente.
  - Se conserva la metáfora de la violencia verbal con «espadas» en vez de neutralizarla.
  - La puntuación reproduce el paralelismo poético y la cita final directa.
  - Se evita «SEÑOR» o un equivalente litúrgico porque no aparece el nombre divino en este versículo.
