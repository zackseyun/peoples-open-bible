base_translation:
  language: en
  yaml_path: translation/ot/2_kings/021/006.yaml
  text: He made his son pass through the fire[a], practiced soothsaying and divination, and consulted mediums and spiritists. He did much evil in the eyes of Yahweh[c][b], provoking him to anger.
  footnotes:
