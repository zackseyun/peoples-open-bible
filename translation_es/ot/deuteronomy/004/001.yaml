review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador capta bien la estructura general del hebreo y mantiene correctamente Yahvé para יְהוָה. Sin embargo, introduce un problema importante de concordancia al pasar a singular en varias formas verbales y pronominales donde el hebreo usa segunda persona plural: אֶתְכֶם, תִּחְיוּ, וּבָאתֶם, וִירִשְׁתֶּם, אֲבֹתֵיכֶם, לָכֶם. Además, la nota a no refleja una alternativa real al texto principal, y ''juicios'' en español puede conservarse pero conviene ofrecer la alternativa documentada ''ordenanzas''.'
  spanish_quality_summary: 'El español es claro y digno, pero la mezcla de vocativo singular ''Israel'' con tratamiento singular (''te'', ''vivas'', ''entres'', ''tomes'', ''tus'') debilita la fidelidad formal y suena inconsistente respecto del hebreo. Una redacción con plural explícito suena natural y más exacta: ''les enseño'', ''para que vivan, entren y tomen posesión''.'
  glossary_alignment: 'Alineado en lo principal con la terminología del proyecto: ''Yahvé'' está bien; ''estatutos'' para חֻקִּים y ''juicios'' para מִשְׁפָּטִים son defendibles, aunque conviene preservar en nota la alternativa ''ordenanzas'' como en el rastro inglés. ''la tierra'' y ''tomen posesión'' también están bien.'
  issues:
  - severity: high
    issue: Cambio indebido de segunda persona plural a singular
    rationale: 'El hebreo se dirige a Israel con formas plurales (''os/ustedes''): ''os enseño'', ''para que vivan'', ''entren'', ''tomen posesión'', ''vuestros/sus padres'', ''os/les da''. El singular del borrador altera la forma del discurso y parte del sentido corporativo.'
  - severity: medium
    issue: Nota [a] no corresponde a una alternativa significativa
    rationale: La nota dice 'O “Y ahora”' cuando el texto principal ya dice 'Y ahora'. Debe reflejar una alternativa real, p. ej. 'Ahora'.
  - severity: low
    issue: Falta en nota la alternativa léxica española más natural para מִשְׁפָּטִים
    rationale: Dado que 'juicios' puede sonar menos idiomático en español bíblico contemporáneo, conviene conservar 'ordenanzas' como alternativa, en línea con el expediente inglés.
  revised_spanish_text: Y ahora[a], Israel, escucha los estatutos y los juicios[b] que yo les enseño a hacer, para que vivan y entren y tomen posesión de la tierra que Yahvé, el Dios de sus padres[c], les da.
  revised_footnotes:
