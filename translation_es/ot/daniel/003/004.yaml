    text: Or 'with might' / 'with a loud voice.' The Aramaic expression literally refers to strength, here describing the force or volume of the herald's cry.
    reason: lexical_alternative
  - marker: b
    text: Aramaic 'they are saying' functions here as an impersonal official formula; hence 'it is proclaimed.'
    reason: lexical_alternative
