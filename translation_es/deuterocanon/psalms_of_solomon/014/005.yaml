translation:
  language: es
  text: Y no se acordaron[a] de Dios, que los caminos de los hombres son conocidos delante de él continuamente, y conoce los secretos[b] del corazón antes de que lleguen a ser[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'También: «no tuvieron presente a Dios».'
    reason: alternative_reading
  - marker: b
    text: O «las cámaras ocultas del corazón»; el griego permite una imagen espacial, pero en este contexto se entiende mejor como «los secretos del corazón».
    reason: lexical_alternative
  - marker: c
    text: 'O «antes de que sucedan» o «antes de que surjan». El griego es amplio: «antes de que lleguen a ser».'
    reason: alternative_reading
lexical_decisions:
- source_word: ἐμνήσθησαν
  english_pob_choice: did not remember
  chosen_spanish: no se acordaron
  alternatives_spanish:
  - no recordaron
  - no tuvieron presente
  lexicon: BDAG
  rationale: Conserva la fuerza moral de no tener a Dios en la mente; en español, 'acordarse de' es natural y directo. 'Recordaron' suena menos idiomático aquí, y 'tener presente' es más interpretativo.
- source_word: τοῦ θεοῦ
  english_pob_choice: God
  chosen_spanish: de Dios
  alternatives_spanish:
  - de Yahvé
  lexicon: Fuente griega con referencia al Dios de Israel
  rationale: El griego dice θεοῦ sin el nombre divino explícito; 'Dios' reproduce con fidelidad el texto fuente. No se introduce 'Yahvé' aquí porque el testimonio griego no lo marca directamente en esta cláusula.
- source_word: ὁδοὶ
  english_pob_choice: ways
  chosen_spanish: caminos
  alternatives_spanish:
  - sendas
  - conducta
  lexicon: BDAG
  rationale: '''Caminos'' mantiene el valor bíblico-moral de ὁδοί y suena natural en español. ''Conducta'' explicita demasiado, y ''sendas'' es más poético pero menos corriente.'
- source_word: γνωσταὶ
  english_pob_choice: are known
  chosen_spanish: son conocidos
  alternatives_spanish:
  - están conocidos
  - son manifiestos
  lexicon: BDAG
  rationale: '''Son conocidos'' conserva el sentido estativo/pasivo sin forzar el español. ''Son manifiestos'' introduce una idea no necesaria y ''están conocidos'' suena menos natural.'
- source_word: ἐνώπιον αὐτοῦ
  english_pob_choice: before him
  chosen_spanish: delante de él
  alternatives_spanish:
  - en su presencia
  - ante él
  lexicon: BDAG
  rationale: '''Delante de él'' expresa bien la perspectiva de estar bajo la mirada divina y evita un registro demasiado jurídico. ''Ante él'' sería posible, pero algo más formal; ''en su presencia'' enfatiza más de lo que exige el griego.'
- source_word: διὰ παντός
  english_pob_choice: continually
  chosen_spanish: continuamente
  alternatives_spanish:
  - siempre
  - sin cesar
  lexicon: BDAG
  rationale: '''Continuamente'' reproduce la idea de constancia continua. ''Siempre'' es válido pero menos enfático en la duración, y ''sin cesar'' introduce una intensidad que el contexto no requiere.'
- source_word: ταμεῖα καρδίας
  english_pob_choice: the secrets of the heart
  chosen_spanish: los secretos del corazón
  alternatives_spanish:
  - las cámaras ocultas del corazón
  - las estancias interiores del corazón
  lexicon: BDAG; revisión aplicada del expediente
  rationale: La revisión del expediente favorece una lectura figurada como 'secretos del corazón' para evitar una literalidad que choque con 'antes de que lleguen a ser'. En español, 'los secretos del corazón' comunica con claridad la imagen figurada y preserva el sentido sin una metáfora espacial torpe.
- source_word: ἐπίσταται
  english_pob_choice: he knows
  chosen_spanish: conoce
  alternatives_spanish:
  - sabe
  - está al tanto de
  lexicon: BDAG
  rationale: '''Conoce'' es la forma más natural y sobria para el conocimiento exhaustivo de Dios. ''Sabe'' funciona, pero es más general; ''está al tanto de'' es demasiado coloquial.'
- source_word: πρὸ τοῦ γενέσθαι
  english_pob_choice: before they come to be
  chosen_spanish: antes de que lleguen a ser
  alternatives_spanish:
  - antes de que sucedan
  - antes de surgir
  lexicon: BDAG
  rationale: La traducción conserva la amplitud del griego, sin reducirla solo a acontecimientos o pensamientos. 'Lleguen a ser' mantiene la noción de venir a la existencia, acorde con el alcance abierto de γενέσθαι.
theological_decisions:
- issue: Alcance del conocimiento divino sobre el corazón humano
  english_pob_reading: The verse states that God knows even the inner realities of the heart before they come to be.
  chosen_spanish_reading: Dios conoce los secretos del corazón antes de que lleguen a ser, es decir, incluso las realidades interiores antes de manifestarse.
  alternative_spanish_readings:
  - Dios conoce solo las acciones externas antes de que ocurran
  - Dios conoce únicamente los pensamientos ya formados
  rationale: El griego presenta un conocimiento exhaustivo y previo de Dios, sin limitarlo a actos externos ni a un sistema doctrinal posterior. La redacción española mantiene esa amplitud y la imagen figurada del corazón como ámbito interior.
  doctrine_reference: Divine foreknowledge / omniscience
- issue: Tratamiento del nombre divino en esta cláusula
  english_pob_reading: God
  chosen_spanish_reading: Dios
  alternative_spanish_readings:
  - Yahvé
  - SEÑOR
  rationale: Como el texto griego aquí usa θεοῦ y no un sustituto explícito del nombre, 'Dios' es la opción más fiel al testimonio recibido. No se aplica la convención de 'Yahvé' cuando la base inmediata no la exige.
  doctrine_reference: Translation of divine names
translation_notes:
  revision_awareness: 'He seguido la revisión aplicada al expediente: se evita una traducción demasiado literal de ταμεῖα καρδίας como ''cámaras'' porque eso crea una imagen menos natural junto a πρὸ τοῦ γενέσθαι. La redacción adoptada refleja la decisión revisada preferida por el expediente (''secretos del corazón''), y mantiene la amplitud del final con ''antes de que lleguen a ser''.'
  spanish_consistency_notes:
  - Se mantiene 'Dios' para θεός/θεοῦ según el criterio general, sin forzar 'Yahvé' cuando el griego no explicita el nombre divino.
  - Se usa 'conoce' para ἐπίσταται y 'continuamente' para διὰ παντός, en línea con el audit trail inglés.
  - '''Caminos'' conserva el lenguaje bíblico moral de ὁδοί sin volverlo una paráfrasis.'
  - La nota sobre ταμεῖα καρδίας refleja la tensión lexical/documental y su resolución revisada en el expediente.
  - La cláusula final conserva la amplitud semántica de γενέσθαι sin cerrar el sentido solo a eventos externos o solo a pensamientos.
