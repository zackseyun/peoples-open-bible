    issue: La frase «a Sadoc y a Abiatar, los sacerdotes» suena menos natural en español que una aposición integrada.
    rationale: El hebreo tiene aposición colectiva a ambos nombres. En español, «a los sacerdotes Sadoc y Abiatar» comunica eso con más fluidez y menos tropiezo sintáctico.
  - severity: low
    issue: La nota al pie podría reflejar mejor que «así y así» es un modismo resumidor tradicional.
    rationale: El inglés auditado explica el idiomatismo y menciona el valor tradicional; en español conviene conservar esa orientación de forma breve.
