translation:
  language: es
  text: y una oveja de cada doscientos, de los pastizales bien regados de Israel[a], para ofrenda de grano y para holocausto y para ofrendas de paz, para hacer expiación por ellos, declara el Señor Yahvé.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘de la tierra bien regada de Israel’ o ‘de los ricos pastizales de Israel’. La frase hebrea probablemente se refiere a tierra de pastoreo bien regada.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְשֶׂה אַחַת
  english_pob_choice: and one sheep
  chosen_spanish: y un cordero
  alternatives_spanish:
  - y una oveja
  - y un animal del rebaño
  lexicon: HALOT
  rationale: שֶׂה designa un animal del rebaño, normalmente oveja o cabra, y en este contexto sacrificial la referencia proporcional funciona bien con una forma natural en español. ‘Cordero’ es fluido y cultual; ‘oveja’ sería más literal pero menos idiomático aquí.
- source_word: מִן הַצֹּאן מִן הַמָּאתַיִם
  english_pob_choice: from every two hundred
  chosen_spanish: de cada doscientos
  alternatives_spanish:
  - de entre el rebaño, de cada doscientos
  - uno del rebaño por cada doscientos
  lexicon: HALOT
  rationale: 'La construcción expresa una proporción de tributo: un animal por cada doscientos. ‘De cada doscientos’ comunica con claridad la relación numérica sin añadir palabras innecesarias.'
- source_word: מִמַּשְׁקֵה יִשְׂרָאֵל
  english_pob_choice: from the well-watered pastures of Israel
  chosen_spanish: de los pastizales bien regados de Israel
  alternatives_spanish:
  - de la tierra bien regada de Israel
  - de la tierra de riego de Israel
  - de los ricos pastizales de Israel
  lexicon: HALOT
  rationale: מַשְׁקֶה alude probablemente a tierra o pasto bien regado; en el contexto de ganado, ‘pastizales bien regados’ conserva la imagen agrícola y resulta claro en español. ‘Pastizales’ evita un calco opaco como ‘la bebida de Israel’.
- source_word: לְמִנְחָה
  english_pob_choice: for a grain offering
  chosen_spanish: para ofrenda vegetal
  alternatives_spanish:
  - para ofrenda de cereal
  - para ofrenda de grano
  - para oblación
  lexicon: HALOT
  rationale: מִנְחָה en contexto sacrificial puede ser ‘ofrenda de cereal/grano’; en español bíblico contemporáneo ‘ofrenda vegetal’ mantiene la categoría cultual tradicional sin sonar excesivamente técnica. Se evita ‘oblación’ por su registro más arcaico.
- source_word: וּלְעוֹלָה
  english_pob_choice: and for a burnt offering
  chosen_spanish: y para holocausto
  alternatives_spanish:
  - y para ofrenda quemada
  - y para ofrenda totalmente consumida
  lexicon: HALOT
  rationale: עוֹלָה es el holocausto, la ofrenda consumida por el fuego. ‘Holocausto’ es el término bíblico más asentado y preciso en español para este sacrificio.
- source_word: וְלִשְׁלָמִים
  english_pob_choice: and for peace offerings
  chosen_spanish: y para ofrendas de paz
  alternatives_spanish:
  - y para ofrendas de comunión
  - y para sacrificios de paz
  lexicon: HALOT
  rationale: שְׁלָמִים remite a ofrendas de bienestar/paz. ‘Ofrendas de paz’ conserva el valor tradicional y la raíz semántica sin imponer ‘comunión’, que es más interpretativo.
- source_word: לְכַפֵּר עֲלֵיהֶם
  english_pob_choice: to make atonement for them
  chosen_spanish: para hacer expiación por ellos
  alternatives_spanish:
  - para expiar por ellos
  - para hacer propiciación por ellos
  lexicon: HALOT
  rationale: כפר en lenguaje sacrificial implica expiación/atonement. ‘Hacer expiación’ mantiene la fuerza cultual y evita reducir el término a una sola teoría doctrinal.
- source_word: נְאֻם אֲדֹנָי יְהוִה
  english_pob_choice: declares the Lord GOD
  chosen_spanish: declara el Señor Yahvé
  alternatives_spanish:
  - declara el Señor DIOS
  - oráculo del Señor Yahvé
  lexicon: HALOT
  rationale: El hebreo tiene la fórmula de declaración profética con el título compuesto אֲדֹנָי יְהוִה. Siguiendo la política del proyecto, יְהוִה se traduce ‘Yahvé’; para אֲדֹנָי se usa ‘Señor’, que en español reproduce dignamente el título sin enmascarar el Nombre divino.
theological_decisions:
- issue: Tratamiento del Nombre divino en אֲדֹנָי יְהוִה
  english_pob_reading: the Lord GOD / Lord Yahweh
  chosen_spanish_reading: el Señor Yahvé
  alternative_spanish_readings:
  - el Señor DIOS
  - Señor Yahvé
  rationale: 'El texto hebreo distingue dos elementos: el título אדני y el Tetragrammaton. En español, ‘Señor Yahvé’ conserva ambos sin recurrir a la sustitución reverencial de ‘SEÑOR’, que el proyecto no usa como máscara.'
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Sentido sacrificial de לְמִנְחָה, וּלְעוֹלָה, וְלִשְׁלָמִים
  english_pob_reading: for a grain offering and for a burnt offering and for peace offerings
  chosen_spanish_reading: para ofrenda vegetal y para holocausto y para ofrendas de paz
  alternative_spanish_readings:
  - para ofrenda de cereal y para ofrenda quemada y para ofrendas de paz
  - para oblación y para holocausto y para sacrificios de paz
  rationale: La lista corresponde a categorías cultuales, no a usos genéricos. Se preservan los tres tipos de ofrenda con términos españoles reconocibles y litúrgicamente claros, sin borrar sus diferencias.
  doctrine_reference: Levítico 2; Levítico 1; Levítico 3
- issue: Valor de כפר
  english_pob_reading: to make atonement for them
  chosen_spanish_reading: para hacer expiación por ellos
  alternative_spanish_readings:
  - para expiar por ellos
  - para hacer propiciación por ellos
  rationale: ‘Expiación’ conserva la ambigüedad bíblica entre purificación, compensación y reconciliación sacrificial. Evita definir de antemano una teoría específica y mantiene la tensión del texto.
  doctrine_reference: Levítico 16; Números 15
translation_notes:
  revision_awareness: Sin cambios sustanciales respecto del último paso de revisión; se conserva la decisión del Nombre divino en forma directa (‘Yahvé’) y la lectura cultual de las ofrendas. El punto de mayor discusión sigue siendo מִמַּשְׁקֵה יִשְׂרָאֵל, resuelto aquí con una imagen agrícola clara y fiel.
  spanish_consistency_notes:
  - Se usa ‘Yahvé’ para יְהוִה conforme al estándar del proyecto.
  - Se mantiene ‘Señor’ para אֲדֹנָי, produciendo la fórmula ‘Señor Yahvé’.
  - ‘Ofrenda vegetal’ se reserva para מִנְחָה en contexto sacrificial.
  - ‘Holocausto’ se usa para עוֹלָה.
  - ‘Ofrendas de paz’ conserva la terminología cultual clásica sin añadir glosa interpretativa.
  - La nota al pie marca la única ambigüedad léxica significativa del verso.
