revisions:
- from: Y sus hermanos[a], hombres valientes, eran ciento veintiocho; y el supervisor sobre ellos era Zabdiel, hijo de Haggedolim.
  to: Y sus hermanos[a], hombres de valor, eran ciento veintiocho; y el supervisor de ellos era Zabdiel, hijo de Haggedolim.
  rationale: Se ajusta 'hombres valientes' a 'hombres de valor' para reflejar mejor גִּבּוֹרֵי חַיִל. Se mejora la naturalidad de 'sobre ellos' a 'de ellos' sin perder el sentido administrativo de פָקִיד עֲלֵיהֶם. También se corrige el formato de la nota al pie, conservando exactamente la alternativa interpretativa documentada en la auditoría inglesa.
