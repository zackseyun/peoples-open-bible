  text: '그래서 그분의 제자들 가운데 몇 사람이 서로에게 말하였습니다. 「그분이 우리에게 「조금 있으면 너희가 나를 보지 못하고, 또 조금 있으면 너희가 나를 볼 것이다」라고 하시고, 또 「내가 아버지께로 가기 때문」이라고 하시는 말씀이 무슨 뜻일까?」'
