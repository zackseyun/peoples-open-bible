translation:
  language: es
  text: Así que tengan cuidado de hacer tal como Yahvé su Dios les ha mandado; no se desvíen ni a la derecha ni a la izquierda[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «no se desvíen a la derecha o a la izquierda», un modismo que significa no apartarse en ninguna dirección de lo que Dios mandó.'
    reason: cultural_note
lexical_decisions:
- source_word: וּ/שְׁמַרְתֶּם
  english_pob_choice: be careful
  chosen_spanish: tengan cuidado
  alternatives_spanish:
  - cuídense de
  - observen cuidadosamente
  - mantengan diligencia
  lexicon: HALOT
  rationale: שמר con infinitivo de propósito expresa atención cuidadosa que conduce a obediencia; en español, 'tengan cuidado' transmite una exhortación natural y fiel sin reducirlo a mera vigilancia.
- source_word: לַ/עֲשׂוֹת
  english_pob_choice: to do
  chosen_spanish: de hacer
  alternatives_spanish:
  - para hacer
  - a hacer
  - de llevar a cabo
  lexicon: HALOT
  rationale: עָשָׂה aquí es la realización concreta de lo mandado. 'De hacer' encaja con 'tener cuidado de' y conserva la sencillez obediencial del hebreo.
- source_word: כַּ/אֲשֶׁר
  english_pob_choice: just as
  chosen_spanish: exactamente como
  alternatives_spanish:
  - tal como
  - como
  - justo como
  lexicon: HALOT
  rationale: La expresión marca conformidad estricta con el mandato divino. 'Exactamente como' refleja bien la fuerza normativa de כַּאֲשֶׁר sin añadir paráfrasis indebida.
- source_word: צִוָּה
  english_pob_choice: has commanded
  chosen_spanish: ha mandado
  alternatives_spanish:
  - ha ordenado
  - ha comandado
  - mandó
  lexicon: HALOT
  rationale: El perfecto español 'ha mandado' comunica una orden ya dada con vigencia continua. 'Mandar' mantiene el valor imperativo-relacional más natural en este contexto que 'ordenar'.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  - Jehová
  lexicon: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
  rationale: La norma del proyecto para el Tetragrámaton es 'Yahvé' en español. Se preserva el nombre propio divino del texto hebreo, no un sustituto titulado.
- source_word: אֱלֹהֵי/כֶם
  english_pob_choice: your God
  chosen_spanish: su Dios
  alternatives_spanish:
  - su Dios propio
  - su Dios de ustedes
  - vuestro Dios
  lexicon: HALOT
  rationale: El sufijo plural de segunda persona indica posesión pactal. En español latinoamericano, 'su Dios' es la forma natural y reverente para el plural de ustedes.
- source_word: לֹא תָסֻרוּ
  english_pob_choice: do not turn aside
  chosen_spanish: no se desvíen
  alternatives_spanish:
  - no se aparten
  - no se desvíen del camino
  - no se aparten de ello
  lexicon: HALOT
  rationale: סוּר es metafórico de desviarse del camino correcto; 'no se desvíen' preserva la imagen direccional con buen español y evita debilitar la advertencia.
- source_word: יָמִין וּ/שְׂמֹאל
  english_pob_choice: to the right or to the left
  chosen_spanish: ni a la derecha ni a la izquierda
  alternatives_spanish:
  - a la derecha o a la izquierda
  - ni hacia la derecha ni hacia la izquierda
  lexicon: HALOT
  rationale: La locución idiomática expresa desviación en cualquier dirección. 'Ni a la derecha ni a la izquierda' reproduce esa fuerza y suena natural en español.
theological_decisions:
- issue: Renderización del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - Jehová
  rationale: El texto hebreo contiene explícitamente el Tetragrámaton. La política del proyecto pide 'Yahvé' como forma española principal para mantener el nombre personal de Dios revelado a Israel.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Valor de la prohibición idiomática 'right or left'
  english_pob_reading: do not turn aside to the right or to the left
  chosen_spanish_reading: no se desvíen ni a la derecha ni a la izquierda
  alternative_spanish_readings:
  - no se aparten ni a la derecha ni a la izquierda
  - no se desvíen a un lado o al otro
  rationale: El hebreo usa una imagen espacial para prohibir cualquier desviación del mandato. La formulación escogida conserva tanto la literalidad como el sentido exhortativo, sin suavizar la advertencia.
  doctrine_reference: POB idiom policy / covenant obedience
translation_notes:
  revision_awareness: El audit trail inglés indica alta concordancia, sin revisiones aplicadas y sin cambios necesarios en la última pasada. La versión española sigue esa línea de estabilidad, conservando la estructura exhortativa, el nombre divino y el modismo direccional con equivalencia óptima.
  spanish_consistency_notes:
  - Se mantuvo 'Yahvé' según la terminología del proyecto para יְהוָה.
  - '''Su Dios'' conserva el posesivo plural de segunda persona en español latinoamericano.'
  - '''No se desvíen'' preserva la metáfora del camino sin volverla explicativa en el texto principal.'
  - La nota al pie explica el modismo direccional solo una vez y está anclada en la frase correspondiente.
