translation:
  language: es
  text: 'Y él le dijo[a]: «Soy yo. Ve y dile a tu amo: “Mira, Elías está aquí”».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, «Yo soy él». El hebreo tiene simplemente el pronombre enfático «yo», que aquí funciona como autoidentificación.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר
  english_pob_choice: And he said
  chosen_spanish: Y él le dijo
  alternatives_spanish:
  - Entonces le dijo
  - Y dijo
  lexicon: HALOT
  rationale: El wayyiqtol introduce la acción narrativa siguiente; en español, «Y él le dijo» conserva la secuencia sin añadir matices interpretativos. Se explicita el sujeto para claridad natural en español.
- source_word: לוֹ
  english_pob_choice: to him
  chosen_spanish: le
  alternatives_spanish:
  - a él
  lexicon: HALOT
  rationale: El pronombre clítico dativo «le» expresa el complemento indirecto de manera natural y concisa en español.
- source_word: אָ֑נִי
  english_pob_choice: I am he
  chosen_spanish: Yo soy
  alternatives_spanish:
  - Yo soy él
  - Soy yo
  lexicon: HALOT
  rationale: El hebreo tiene un pronombre enfático de autoidentificación. En español, «Yo soy» conserva la fuerza enfática y evita añadir un objeto no presente en el hebreo; el sentido identificatorio queda claro por el contexto.
- source_word: לֵךְ
  english_pob_choice: Go
  chosen_spanish: Ve
  alternatives_spanish:
  - Anda
  - Vete
  lexicon: HALOT
  rationale: Imperativo breve de הלך. «Ve» es la equivalencia directa y natural en español.
- source_word: אֱמֹר
  english_pob_choice: say
  chosen_spanish: dile
  alternatives_spanish:
  - di
  - cuéntale
  lexicon: HALOT
  rationale: Aunque el inglés POB usa «say», el hebreo dirige una comunicación a un destinatario concreto («a tu master»). En español, el imperativo con pronombre enclítico «dile» refleja mejor esa orientación interpersonal y sigue siendo fiel al mandato de hablar.
- source_word: לַאדֹנֶיךָ
  english_pob_choice: to your master
  chosen_spanish: a tu amo
  alternatives_spanish:
  - a tu señor
  - a tu maestro
  lexicon: HALOT
  rationale: Aquí אָדוֹן se refiere a un superior humano, Ahab, no a Dios. «Amo» reproduce con fuerza la relación de autoridad y evita la ambigüedad devocional de «Señor»; «maestro» sería menos exacto en este contexto social.
- source_word: הִנֵּה
  english_pob_choice: Look
  chosen_spanish: Mira
  alternatives_spanish:
  - Mira bien
  - Fíjate
  lexicon: HALOT
  rationale: La partícula deíctica llama la atención sobre la presencia de Elías. «Mira» conserva el tono inmediato y natural de exhortación a atender.
- source_word: אֵלִיָּהוּ
  english_pob_choice: Elijah
  chosen_spanish: Elías
  alternatives_spanish:
  - Elías el profeta
  lexicon: HALOT
  rationale: Nombre propio transliterado conforme a la política del proyecto.
theological_decisions:
- issue: Rendición de אָדוֹן aplicado a un superior humano
  english_pob_reading: master
  chosen_spanish_reading: amo
  alternative_spanish_readings:
  - señor
  - maestro
  rationale: El contexto es la relación entre Obadías y Acab. Traducirlo como «amo» preserva la distinción entre autoridad humana y el título divino, sin enmascarar el matiz social de subordinación.
  doctrine_reference: 'DOCTRINE.md: Translate titles; preserve divine-name/title distinctions'
translation_notes:
  revision_awareness: 'Se corrigió el problema de validación anterior: el marcador de nota [a] ahora aparece en el texto de destino exactamente donde corresponde. No se requieren otras revisiones respecto del paquete fuente; la decisión principal se mantiene alineada con el audit trail inglés.'
  spanish_consistency_notes:
  - Se mantuvo la distinción entre el título humano «amo» y posibles lecturas divinas de «Señor».
  - Se prefirió una formulación natural en español que conserve la autoidentificación enfática del hebreo.
  - 'Los nombres propios se transliteran de manera estándar: «Elías».'
