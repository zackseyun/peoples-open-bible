  lexicon: BDAG
  rationale: 4:14 ἐπίθεσις τῶν χειρῶν과 동일한 사역 임명 관용. 한국 교회 정립 어휘 「안수」.
- source_word: μηδὲ κοινώνει ἁμαρτίαις ἀλλοτρίαις
  english_pob_choice: nor share in the sins of others
  chosen_korean: 다른 사람들의 죄에 참여하지도 마십시오
  alternatives_korean:
  - 남의 죄에 동참하지 말라
  lexicon: BDAG
  rationale: κοινωνέω의 「공유·참여」.
- source_word: σεαυτὸν ἁγνὸν τήρει
  english_pob_choice: keep yourself pure
  chosen_korean: 그대 자신을 순결하게 지키십시오
