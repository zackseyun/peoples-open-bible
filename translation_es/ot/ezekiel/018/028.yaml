translation:
  language: es
  text: Porque consideró[a] y se volvió de todas sus transgresiones que había cometido, ciertamente vivirá[b]; no morirá.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «vio» o «y vio»; el verbo hebreo significa literalmente «ver», aquí probablemente en el sentido de percibir o considerar.
    reason: lexical_alternative
  - marker: b
    text: O «se arrepintió» para «se volvió»; el hebreo dice «se volvió/retornó», preservando la imagen concreta de reversión desde el pecado.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּרְאֶה
  english_pob_choice: Because he considered
  chosen_spanish: Porque él consideró
  alternatives_spanish:
  - Porque vio
  - Y vio
  lexicon: HALOT
  rationale: El hebreo ראה significa literalmente “ver”, pero en este contexto de reflexión moral el sentido es de percibir o tomar conciencia. “Consideró” conserva esa fuerza cognitiva en español. Se mantiene el valor causal con “Porque”, siguiendo la lógica del verso en el contexto inmediato.
- source_word: וישוב
  english_pob_choice: turned back
  chosen_spanish: se volvió
  alternatives_spanish:
  - se arrepintió
  - volvió
  lexicon: HALOT
  rationale: שׁוּב expresa la imagen concreta de volver/retornar. “Se volvió” conserva el movimiento de reversión desde el pecado sin sustituirlo por una formulación más interpretativa como “se arrepintió”. En español, el complemento “de” deja claro el alejamiento de sus delitos.
- source_word: מִכָּל פְּשָׁעָיו
  english_pob_choice: from all his transgressions
  chosen_spanish: de todos sus delitos
  alternatives_spanish:
  - de todas sus transgresiones
  - de todas sus rebeliones
  lexicon: HALOT
  rationale: פֶּשַׁע denota transgresión o acto de rebeldía. “Delitos” comunica la gravedad de la falta en un registro natural y sobrio para español bíblico moderno; se evita “transgresiones” por ser más técnico y menos directo, aunque sigue siendo una alternativa válida.
- source_word: אֲשֶׁר עָשָׂה
  english_pob_choice: that he had committed
  chosen_spanish: que había cometido
  alternatives_spanish:
  - que había hecho
  - que realizó
  lexicon: HALOT
  rationale: עָשָׂה es amplio (“hacer”), pero con pecados como objeto el español idiomático pide “cometer”. El pluscuamperfecto (“había cometido”) refleja correctamente la relación temporal retrospectiva del verso.
- source_word: חָיוֹ יִחְיֶה
  english_pob_choice: he will surely live
  chosen_spanish: ciertamente vivirá
  alternatives_spanish:
  - vivirá ciertamente
  - vivirá sin duda
  lexicon: HALOT
  rationale: La combinación infinitivo absoluto + imperfecto intensifica la afirmación. “Ciertamente vivirá” preserva esa fuerza enfática de modo natural en español y evita una construcción demasiado literal o extraña.
- source_word: לֹא יָמוּת
  english_pob_choice: he will not die
  chosen_spanish: no morirá
  alternatives_spanish:
  - no va a morir
  - no llegará a morir
  lexicon: HALOT
  rationale: La negación verbal simple transmite con claridad el contraste con la promesa anterior. Se mantiene la amplitud semántica del hebreo sin precisar el tipo de muerte.
theological_decisions:
- issue: Alcance de la promesa de vida y la amenaza de muerte
  english_pob_reading: Retain the text's direct promise and warning language as 'he will surely live; he will not die' without specifying whether the referent is exclusively physical, spiritual, temporal, or eschatological.
  chosen_spanish_reading: Mantener el lenguaje directo de promesa y advertencia como “ciertamente vivirá; no morirá”, sin precisar si el alcance es físico, espiritual, temporal o escatológico.
  alternative_spanish_readings:
  - vivirá físicamente
  - vivirá en sentido espiritual
  - gozará de vida pactal/judicial
  rationale: El hebreo sostiene una afirmación sobria y amplia. En español conviene conservar esa tensión sin resolverla con categorías teológicas posteriores que el texto no explicita. Así se respeta el alcance moral y judicial del pasaje dentro del discurso de Ezequiel.
  doctrine_reference: Preservar la tensión teológica sin resolverla.
translation_notes:
  revision_awareness: El texto español sigue el acuerdo alto del auditoría inglesa y no introduce cambios de fondo respecto de la última pasada revisada; solo adapta las decisiones léxicas al español con registro bíblico moderno y claro.
  spanish_consistency_notes:
  - Se usa “Yahvé” solo cuando el Tetragrámaton aparece explícitamente; en este versículo no aparece.
  - Se prefiere “se volvió” para mantener la imagen de retorno de שׁוּב, evitando sustituirla por un término teológico más interpretativo.
  - “Delitos” funciona aquí como equivalente contextual de פְּשָׁעִים, manteniendo seriedad moral sin perder naturalidad en español.
  - La intensificación verbal se expresa con “ciertamente” para reflejar el infinitivo absoluto + imperfecto.
  - No se especifica el tipo de vida o muerte para conservar la tensión teológica del hebreo y del POB inglés.
