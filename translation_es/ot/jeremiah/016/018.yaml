translation:
  language: es
  text: Y primero les pagaré el doble de su iniquidad y de su pecado[a], porque han profanado mi tierra con los cadáveres de sus ídolos detestables y han llenado mi heredad con sus abominaciones.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «con los cadáveres de sus cosas detestables»; el término hebreo suele referirse a ídolos en contextos proféticos.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְשִׁלַּמְתִּי
  english_pob_choice: I will repay
  chosen_spanish: pagaré
  alternatives_spanish:
  - recompensaré
  - pagaré de vuelta
  lexicon: HALOT
  rationale: El piel de שלם aquí tiene valor de retribuir o pagar en respuesta a una culpa. «Pagaré» conserva la idea de retribución judicial y suena natural en español; el complemento «primero» ya comunica la prioridad marcada por רִאשׁוֹנָה.
- source_word: רִאשׁוֹנָה
  english_pob_choice: first
  chosen_spanish: primero
  alternatives_spanish:
  - en primer lugar
  - antes que nada
  lexicon: HALOT
  rationale: 'La función es adverbial y temporal: indica que este acto de retribución viene antes. «Primero» es claro y fiel al orden del hebreo.'
- source_word: מִשְׁנֵה
  english_pob_choice: double
  chosen_spanish: doble
  alternatives_spanish:
  - dos veces
  - doble porción
  lexicon: HALOT
  rationale: El sustantivo expresa duplicación o medida doble. «Doble» es la forma más breve y directa para el sentido punitivo del pasaje.
- source_word: עֲוֺנָם
  english_pob_choice: their iniquity
  chosen_spanish: su iniquidad
  alternatives_spanish:
  - su culpa
  - su maldad
  lexicon: HALOT
  rationale: «Iniquidad» preserva la carga moral y jurídica del término y mantiene el paralelo con «su pecado» sin reducirlo a un sentido meramente general.
- source_word: וְחַטָּאתָם
  english_pob_choice: and their sin
  chosen_spanish: y su pecado
  alternatives_spanish:
  - y sus pecados
  - y su ofensa
  lexicon: HALOT
  rationale: Aunque la forma es singular, puede funcionar colectivamente. «Pecado» conserva el paralelismo hebreo y la amplitud colectiva del término.
- source_word: חַלְּלָם אֶת אַרְצִי
  english_pob_choice: they have defiled my land
  chosen_spanish: han profanado mi tierra
  alternatives_spanish:
  - han contaminado mi tierra
  - han deshonrado mi tierra
  lexicon: HALOT
  rationale: חלל expresa profanación o contaminación ritual-moral. «Profanado» reproduce mejor ese matiz en español bíblico contemporáneo que «defiled» en inglés o una reducción a simple suciedad.
- source_word: בְּנִבְלַת שִׁקּוּצֵיהֶם
  english_pob_choice: with the carcasses of their detestable idols
  chosen_spanish: con los cadáveres de sus ídolos detestables
  alternatives_spanish:
  - con los cadáveres de sus cosas detestables
  - con los cadáveres de sus abominaciones
  lexicon: HALOT
  rationale: נִבְלָה significa «cadáver/carroña». שִׁקּוּצִים en el contexto profético suele apuntar a ídolos; «ídolos detestables» hace explícito ese referente como lo hace la POB inglesa, mientras que «cadáveres» conserva la imagen repulsiva del hebreo.
- source_word: וְתוֹעֲבוֹתֵיהֶם
  english_pob_choice: their abominations
  chosen_spanish: sus abominaciones
  alternatives_spanish:
  - sus cosas abominables
  - sus detestables prácticas
  lexicon: HALOT
  rationale: «Abominaciones» es el equivalente tradicional y transparente de תּוֹעֲבוֹת, y mantiene el tono profético de repulsión moral y cultual.
- source_word: מָלְאוּ אֶת נַחֲלָתִי
  english_pob_choice: have filled my inheritance
  chosen_spanish: han llenado mi heredad
  alternatives_spanish:
  - han llenado mi herencia
  - han llenado mi posesión
  lexicon: HALOT
  rationale: נַחֲלָה aquí designa la porción heredada o asignada, aplicada a la tierra de Yahvé. «Heredad» conserva esa resonancia covenantal y suena bíblica sin ser opaca.
theological_decisions:
- issue: Si explicitar en la traducción principal que שִׁקּוּצֵיהֶם alude a ídolos
  english_pob_reading: Rendered as 'their detestable idols' in the main text, with a footnote preserving the more literal alternative
  chosen_spanish_reading: «sus ídolos detestables» en el texto principal, con nota que conserva la alternativa más literal
  alternative_spanish_readings:
  - «sus cosas detestables»
  - «sus abominaciones»
  rationale: En Jeremías, שִׁקּוּצִים suele funcionar como polémica contra ídolos. Hacer explícito «ídolos» ayuda al lector español a captar el referente sin añadir una doctrina ajena al pasaje; la alternativa más literal queda registrada en nota.
  doctrine_reference: 'Translation philosophy: optimal equivalence; primacy of source-language sense over inherited translation tradition.'
translation_notes:
  revision_awareness: El pasaje muestra alto acuerdo con la revisión más reciente del POB inglés; no se requieren cambios sustantivos. Se preserva la lectura óptima del hebreo y se mantiene la explicitación de «ídolos» en el sintagma polémico, con la alternativa más literal en nota.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como forma de respeto al nombre divino cuando aparezca en el contexto mayor; en este versículo no figura explícitamente.
  - «Iniquidad» y «pecado» se distinguen para reflejar el paralelismo hebreo.
  - «Profanado» se usa para חלל por su fuerza ritual-moral.
  - «Heredad» se prefiere a «herencia» para conservar el matiz de posesión pactal.
