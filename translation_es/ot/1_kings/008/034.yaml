review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el hebreo y el rastro inglés: ‘oye… en el cielo’, ‘perdona el pecado de tu pueblo Israel’ y ‘tráelos de vuelta a la tierra’ preservan adecuadamente el sentido de תִּשְׁמַע הַשָּׁמַיִם, וְסָלַחְתָּ, לְחַטַּאת, עַמְּךָ יִשְׂרָאֵל, וַהֲשֵׁבֹתָם y אֶל הָאֲדָמָה. También mantiene correctamente ‘sus padres’ para לַאֲבוֹתָם, en línea con la decisión teológica documentada. La revisión necesaria es menor y de estilo/fidelidad idiomática.'
  spanish_quality_summary: El español es claro y entendible, pero ‘oye tú en el cielo’ suena menos natural y más forzado que ‘escucha en el cielo’ o ‘oye en el cielo’. Además, la nota b introduce una glosa explicativa dentro de una nota presentada como alternativa, cuando el inglés solo conserva la alternativa léxica ‘restore them to the land’. Conviene ajustar la redacción para mayor dignidad y precisión editorial.
  glossary_alignment: No hay conflicto con la terminología del proyecto. No aparece Yahvé ni otros términos sensibles del glosario. ‘Pecado’, ‘tierra’ y ‘sus padres’ están bien alineados con las decisiones POB. La elección de ‘tráelos de vuelta’ corresponde bien al causativo de שוב.
  issues:
  - severity: medium
    issue: ‘oye tú en el cielo’ suena marcado e innecesariamente enfático en español
    rationale: El hebreo incluye אַתָּה, pero en español no hace falta explicitar ‘tú’ para una súplica natural; mantenerlo aquí vuelve la frase menos fluida sin aportar sentido esencial. ‘Escucha en el cielo’ preserva mejor la dignidad y legibilidad.
  - severity: low
    issue: La nota b mezcla alternativa y explicación interpretativa
    rationale: 'El inglés auditado ofrece una alternativa simple: ‘restore them to the land’. La nota española ‘O “tráelos de vuelta a la tierra,” es decir, restáuralos a la tierra’ invierte la relación entre texto principal y alternativa, y añade una glosa que no corresponde al formato de nota léxica.'
  - severity: low
    issue: La nota c puede sonar ligeramente ambigua con ‘los antepasados’
    rationale: Aunque aceptable, conviene mantener más de cerca el énfasis del inglés en los antepasados receptores de la promesa. Una formulación como ‘los antepasados a quienes Dios dio la tierra’ ya lo expresa; no es un error grave, solo ajuste menor de claridad.
