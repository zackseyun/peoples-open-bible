  yaml_path: translation/ot/isaiah/015/009.yaml
  text: 'For the waters of Dimon are full of blood[a], for I will bring more upon Dimon: a lion upon the fugitives of Moab[c][b], and upon the remnant of the land.'
  footnotes:
