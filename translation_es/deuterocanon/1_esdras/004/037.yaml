revisions:
- from: 'Vino[a] es injusto, el rey es injusto, las mujeres son injustas, y todos los hijos de los hombres[b] y todas sus obras son injustos: todas esas cosas. Y no hay verdad en ellos, y en su injusticia perecerán.'
  to: El vino es injusto, el rey es injusto, las mujeres son injustas, y todos los hijos de los hombres[a] y todas sus obras son injustas, todas esas cosas. Y no hay verdad en ellos, y en su injusticia perecerán.
  rationale: Se corrige el artículo inicial para que 'vino' sea inequívocamente sustantivo y refleje mejor el referente griego. Se repara la concordancia de 'obras' con 'injustas'. Se elimina la nota innecesaria sobre 'vino' y se conserva la nota legítima sobre la expresión antropológica masculina. El resto del verso mantiene bien la repetición retórica y el sentido de la fuente.
  reviewer_model: gpt-5.4
