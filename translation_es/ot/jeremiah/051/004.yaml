    issue: חֲלָלִים se tradujo como 'los muertos'
    rationale: Aunque comprensible, 'los muertos' es más amplio y neutral que el hebreo, que denota personas muertas violentamente, 'the slain'. El paralelismo con 'los traspasados' pide un término más fuerte y específico.
  revised_spanish_text: Y caerán los abatidos en la tierra de los caldeos[a], y los traspasados[b] en sus calles.
