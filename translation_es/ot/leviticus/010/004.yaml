translation:
  language: es
  text: 'Entonces Moisés llamó a Misael y a Elzafán, hijos de Uziel, tío de Aarón, y les dijo: «Acérquense; lleven a sus hermanos[a] de delante del santuario[b] fuera del campamento».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Aquí «hermanos» reproduce el hebreo אָח, que puede abarcar parientes cercanos. Los referidos son Nadab y Abiú, primos de Misael y Elzafán.
    reason: lexical_alternative
  - marker: b
    text: O «de delante del lugar santo».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּקְרָא
  english_pob_choice: called
  chosen_spanish: llamó
  alternatives_spanish:
  - convocó
  - mandó llamar
  lexicon: HALOT
  rationale: El verbo קרא en este contexto narrativo expresa llamar a alguien para que se acerque o acuda. «Llamó» es natural en español y conserva el sentido directo sin añadir matices de autoridad más fuertes de los que exige el hebreo.
- source_word: בְּנֵי עֻזִּיאֵל
  english_pob_choice: the sons of Uzziel
  chosen_spanish: hijos de Uziel
  alternatives_spanish:
  - hijos de Uzziel
  - descendientes de Uziel
  lexicon: HALOT
  rationale: La construcción de estado constructo identifica de forma inmediata a Misael y Elzafán como hijos de Uziel. «Hijos» mantiene la relación genealógica más precisa que «descendientes».
- source_word: דֹּד אַהֲרֹן
  english_pob_choice: Aaron’s uncle
  chosen_spanish: tío de Aarón
  alternatives_spanish:
  - el tío de Aarón
  - pariente de Aarón
  lexicon: HALOT
  rationale: דּוֹד suele significar «tío» en contextos de parentesco. En español, «tío de Aarón» comunica de manera natural la relación que el hebreo atribuye a Uziel.
- source_word: קִרְבוּ
  english_pob_choice: Come near
  chosen_spanish: Acérquense
  alternatives_spanish:
  - Vengan cerca
  - Acerquémonos
  lexicon: HALOT
  rationale: El imperativo plural de קרב pide que se aproximen. «Acérquense» conserva la fuerza espacial y el tono solemne del mandato cerca del santuario.
- source_word: שְׂא֤וּ
  english_pob_choice: carry
  chosen_spanish: lleven
  alternatives_spanish:
  - carguen
  - transporten
  - lleven afuera
  lexicon: HALOT
  rationale: נשא aquí implica levantar y trasladar los cuerpos. «Lleven» expresa en español la acción de removerlos sin sonar demasiado crudo ni perder el sentido práctico.
- source_word: אֲחֵיכֶם
  english_pob_choice: your brothers
  chosen_spanish: sus hermanos
  alternatives_spanish:
  - sus parientes
  - sus hermanos varones
  lexicon: HALOT
  rationale: Aunque el referente inmediato son primos, el hebreo אָח puede abarcar parientes cercanos del mismo linaje masculino. «Sus hermanos» preserva el lenguaje de parentesco del original, como hace la POB en inglés.
- source_word: מֵאֵת פְּנֵי הַקֹּדֶשׁ
  english_pob_choice: away from before the sanctuary
  chosen_spanish: de delante del santuario
  alternatives_spanish:
  - de la presencia del santuario
  - de ante el santuario
  lexicon: HALOT
  rationale: La expresión combina un término espacial («rostro/frente») con un valor locativo de procedencia. «De delante del santuario» reproduce bien la relación espacial y evita el calco demasiado rígido de «antes de».
- source_word: הַקֹּדֶשׁ
  english_pob_choice: the sanctuary
  chosen_spanish: el santuario
  alternatives_spanish:
  - el lugar santo
  - el lugar sagrado
  lexicon: HALOT
  rationale: En este pasaje, el sustantivo designa el recinto sagrado desde el cual deben retirar los cuerpos. «Santuario» es claro, reverente y compatible con el uso bíblico moderno.
- source_word: אֶל מִחוּץ לַמַּחֲנֶה
  english_pob_choice: to outside the camp
  chosen_spanish: a fuera del campamento
  alternatives_spanish:
  - fuera del campamento
  - al exterior del campamento
  lexicon: HALOT
  rationale: La frase hebrea expresa movimiento hacia el exterior del campamento. «A fuera del campamento» conserva la direccionalidad de אֶל; aunque no es la opción más elegante, refleja mejor el valor de movimiento que un simple «fuera».
translation_notes:
  revision_awareness: La redacción sigue la revisión más reciente del audit trail al preferir una expresión más precisa para מֵאֵת פְּנֵי הַקֹּדֶשׁ, evitando «frente del santuario» y usando una fórmula locativa más cercana al hebreo («de delante del santuario»).
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el texto fuente lo requiera; aquí no aparece.
  - Se mantiene «santuario» para הַקֹּדֶשׁ conforme al contexto espacial sagrado, en línea con el registro reverente del POB.
  - «Sus hermanos» conserva el parentesco amplio del hebreo, sin sustituirlo por «parientes», para no perder la formulación bíblica directa.
