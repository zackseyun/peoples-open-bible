theological_decisions:
- issue: Rendering overlapping sin vocabulary (עון / חטא / פשע)
  chosen_reading: 'Different English expressions are used to preserve the verse''s layered description of human offense before God: ''guilt,'' ''sinned,'' and ''rebelled.'''
  alternative_readings:
  - Use 'iniquity' consistently for עון
  - Flatten all three terms into 'sin' language
  rationale: 'The Hebrew intentionally stacks related but distinct terms. Preserving some differentiation reflects the source text''s moral and theological texture: defilement/culpability, sinful acts, and rebellion against God. This avoids importing a doctrinal system while honoring the lexical distinctions present.'
  doctrine_reference: Translation philosophy items 1, 5, and 6
