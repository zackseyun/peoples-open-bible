translation:
  language: es
  text: 'Pero los parientes que estaban recostados con él[a], asombrados por su mente inestable[b], seguían diciendo estas cosas:'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «que estaban comiendo con él» o «que estaban a la mesa con él»; el griego evoca específicamente la costumbre antigua de comer recostados.'
    reason: cultural_note
  - marker: b
    text: Literalmente, «su mente inestable»; la frase se refiere a su disposición mental alterada o inconstante.
    reason: lexical_alternative
lexical_decisions:
- source_word: συνανακείμενοι
  english_pob_choice: who were reclining with him
  chosen_spanish: que estaban recostados con él
  alternatives_spanish:
  - que estaban comiendo con él
  - que estaban a la mesa con él
  lexicon: LSJ
  rationale: El participio alude a compartir una comida recostados a la mesa. «Recostados con él» conserva la imagen cultural sin volver el español forzado; las alternativas explicitan el banquete, pero pierden algo de la forma verbal concreta del griego.
- source_word: συγγενεῖς
  english_pob_choice: relatives
  chosen_spanish: parientes
  alternatives_spanish:
  - familiares
  - deudos
  - consanguíneos
  lexicon: LSJ
  rationale: El término designa a los miembros de la familia o del parentesco cercano. «Parientes» es natural en español contemporáneo y mantiene el sentido amplio del griego.
- source_word: ἄσταθη
  english_pob_choice: unstable
  chosen_spanish: inestable
  alternatives_spanish:
  - vacilante
  - inconstante
  - incierto
  lexicon: LSJ
  rationale: Modifica a διάνοιαν y describe una disposición mental o anímica tambaleante. «Inestable» reproduce bien esa idea en español moderno.
- source_word: διάνοιαν
  english_pob_choice: state of mind
  chosen_spanish: estado de ánimo
  alternatives_spanish:
  - mente
  - pensamiento
  - disposición mental
  lexicon: LSJ
  rationale: Aquí el sentido no es solo intelectual sino de disposición interior. «Estado de ánimo» comunica de manera natural la condición mental o anímica observada; la nota de la palabra griega queda reflejada por el adjetivo «inestable».
- source_word: θαυμάζοντες
  english_pob_choice: marveling
  chosen_spanish: maravillados
  alternatives_spanish:
  - asombrados
  - admirados
  - sorprendidos
  lexicon: LSJ
  rationale: El participio expresa asombro o admiración ante lo que ven. «Maravillados» conserva ese matiz de sorpresa intensa sin decidir de más sobre si la reacción es positiva o negativa.
- source_word: προεφέροντο
  english_pob_choice: kept saying
  chosen_spanish: seguían diciendo
  alternatives_spanish:
  - decían
  - seguían afirmando
  - repetían
  lexicon: LSJ
  rationale: El imperfecto indica acción continuada o repetida. «Seguían diciendo» refleja mejor esa continuidad que un pasado simple.
- source_word: τάδε
  english_pob_choice: these things
  chosen_spanish: estas cosas
  alternatives_spanish:
  - lo siguiente
  - esto
  lexicon: LSJ
  rationale: Es la fórmula introductoria del discurso que sigue. «Estas cosas» es fiel y suficientemente natural en español.
translation_notes:
  revision_awareness: Se corrigió la validación anterior asegurando que ambos marcadores de nota [a] y [b] aparecen exactamente en el texto español. También se mantuvo el tono de introducción discursiva y la imagen cultural del recostarse a la mesa.
  spanish_consistency_notes:
  - Se prefirió «parientes» para συγγενεῖς por ser el equivalente natural y claro en español.
  - Se evitó «SEÑOR» o terminología eclesiástica ajena porque el verso no contiene vocabulario divino.
  - «Estado de ánimo inestable» preserva la tensión entre mente y disposición anímica sin reducir διάνοιαν a mera intelectualidad.
  - Los marcadores de nota están anclados exactamente en los lugares correspondientes del texto.
