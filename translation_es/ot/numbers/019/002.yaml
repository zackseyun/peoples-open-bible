translation:
  language: es
  text: 'Esta es la ordenanza de la ley que Yahvé ha mandado, diciendo: Habla a los hijos[a] de Israel, para que te traigan una vaca roja[b], sin mancha[c], que no tiene defecto, y sobre la cual no ha subido un yugo[d].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «Habla a los israelitas»; literalmente, «a los hijos de Israel».
    reason: lexical_alternative
  - marker: b
    text: O «una novilla roja».
    reason: lexical_alternative
  - marker: c
    text: O «sin defecto»; la cláusula siguiente especifica que no tiene defecto.
    reason: lexical_alternative
  - marker: d
    text: Literalmente, «sobre la cual no ha subido un yugo».
    reason: source_note
lexical_decisions:
- source_word: חֻקַּת
  english_pob_choice: statute
  chosen_spanish: ordenanza
  alternatives_spanish:
  - estatuto
  - decreto
  - precepto
  lexicon: HALOT
  rationale: חֻקָּה designa una disposición fija de carácter legal-ritual. En español, «ordenanza» comunica bien la idea de una norma establecida sin sonar tan técnico como «estatuto», y mantiene el tono jurídico del contexto.
- source_word: הַתּוֹרָה
  english_pob_choice: the law
  chosen_spanish: la ley
  alternatives_spanish:
  - la instrucción
  lexicon: HALOT
  rationale: En este marco ritual, תּוֹרָה tiene sentido de instrucción normativa; «la ley» es la forma española más natural y reconocible para conservar ese peso jurídico. «Instrucción» sería posible, pero debilita el encuadre legal explícito del verso.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  lexicon: HALOT
  rationale: Se conserva el nombre divino del Tetragrámaton como «Yahvé», siguiendo el estándar del proyecto en español y evitando la sustitución por un título. La forma «Yahvé» es la opción publicada más natural en español bíblico contemporáneo.
- source_word: בְּנֵי יִשְׂרָאֵל
  english_pob_choice: sons of Israel
  chosen_spanish: los hijos de Israel
  alternatives_spanish:
  - los israelitas
  - los hijos de Jacob
  lexicon: HALOT
  rationale: El hebreo es literalmente masculino plural. Se mantiene la forma directa «los hijos de Israel» en el texto principal para preservar la fuerza formal y la correspondencia léxica; «los israelitas» queda como alternativa idiomática, pero neutraliza el original.
- source_word: וְיִקְחוּ אֵלֶיךָ
  english_pob_choice: that they bring to you
  chosen_spanish: para que te traigan
  alternatives_spanish:
  - y te lleven
  - para que te lleven
  lexicon: HALOT
  rationale: Aunque el verbo básico es «tomar», la construcción con אֶל hace que el movimiento hacia Moisés sea lo relevante. «Traigan» expresa esa dirección de modo natural en español, evitando la literalidad pesada de «tomen a ti».
- source_word: פָרָה אֲדֻמָּה
  english_pob_choice: a red heifer
  chosen_spanish: una vaca roja
  alternatives_spanish:
  - una novilla roja
  - una becerra roja
  lexicon: HALOT
  rationale: פָרָה puede referirse a una vaca/hembra bovina adulta; en español, «vaca roja» es más transparente y fiel al referente zoológico que «novilla», que sugeriría juventud no requerida por el hebreo. Se evita el tecnicismo ritual inglés «heifer» porque no es la opción más clara en español.
- source_word: תְּמִימָה
  english_pob_choice: without blemish
  chosen_spanish: sin defecto
  alternatives_spanish:
  - sin mancha
  - intacta
  - perfecta
  lexicon: HALOT
  rationale: תְּמִימָה describe la integridad física/ritual del animal. «Sin defecto» reproduce con precisión la exigencia cultual y encaja con la cláusula siguiente sobre la ausencia de «mancha», sin introducir una valoración moral.
- source_word: מוּם
  english_pob_choice: defect
  chosen_spanish: mancha
  alternatives_spanish:
  - defecto
  - imperfección
  lexicon: HALOT
  rationale: מוּם se refiere a una descalificación física ritual. Aquí se opta por «mancha» porque en español bíblico suena natural en paralelo con «sin defecto» y conserva la idea de impedimento cultual; la ambigüedad se mantiene en nota para no perder el matiz físico.
- source_word: אֲשֶׁר לֹא עָלָה עָלֶיהָ עֹל
  english_pob_choice: on which no yoke has come
  chosen_spanish: sobre la cual no ha subido yugo
  alternatives_spanish:
  - a la que no se le ha puesto yugo
  - que nunca ha llevado yugo
  lexicon: HALOT
  rationale: El hebreo dice literalmente que ningún yugo «ha subido» sobre ella. La traducción conserva esa imagen con un español claro; la construcción puede sonar algo literal, pero respeta el gesto verbal del original y la restricción ritual.
theological_decisions:
- issue: Nombre divino del Tetragrámaton
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: El verso usa יְהוָה de manera directa, por lo que el texto español debe preservar el nombre propio de Dios y no sustituirlo por un título. «Yahvé» es la forma elegida por el proyecto para mantener transparencia y trazabilidad.
  doctrine_reference: 'DOCTRINE.md §Contested terms: יְהוָה YHWH'
- issue: Tratamiento de בְּנֵי יִשְׂרָאֵל
  english_pob_reading: sons of Israel
  chosen_spanish_reading: los hijos de Israel
  alternative_spanish_readings:
  - los israelitas
  - los hijos de Israel
  rationale: La forma hebrea es masculína plural y funciona corporativamente. Se preserva en el texto principal para no neutralizar sin necesidad la forma de la fuente; la alternativa idiomática se registra por claridad, no por preferencia.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
- issue: Término ritual de pureza del animal
  english_pob_reading: without blemish / no defect
  chosen_spanish_reading: sin defecto / sin mancha
  alternative_spanish_readings:
  - sin imperfección
  - intacta
  rationale: La pareja de expresiones hebreas distingue integridad y ausencia de descalificación física. En español, «sin defecto» y «sin mancha» mantienen la distinción sin borrar la tensión lexical entre ambos términos.
  doctrine_reference: DOCTRINE.md §Lexical precision and ritual terminology
translation_notes:
  revision_awareness: La versión inglesa auditada pasó por una revisión que ajustó la segunda cláusula de תְּמִימָה para evitar redundancia con «defect». En español, se resolvió la tensión manteniendo la dupla «sin defecto / sin mancha», de modo que el primer término exprese integridad ritual y el segundo la ausencia de mancha física, respetando ambas capas del hebreo sin borrar la repetición significativa.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» conforme al estándar español del proyecto para el nombre divino.
  - Se evitó «Cristo» u otra terminología no pertinente.
  - «Los hijos de Israel» preserva la forma masculina plural del hebreo; no se neutralizó en el texto principal.
  - La secuencia «sin defecto, en la cual no hay mancha» refleja la doble cualidad hebrea sin fusionarla en una sola idea.
  - «Vaca roja» se escogió por claridad idiomática en español, aunque el referente ritual puede equivaler al inglés «red heifer».
