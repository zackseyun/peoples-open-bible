translation:
  language: es
  text: Aun si estos tres hombres estuvieran en medio de ella, vivo yo, declara el Señor Yahvé, no librarían ni a hijos ni a hijas[a]; ellos solos serían librados, y la tierra quedaría desolada.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «si hijos y si hijas librarían»; en este contexto de juramento, es un modismo que significa que no librarían ni a hijos ni a hijas.'
    reason: lexical_alternative
lexical_decisions:
- source_word: שְׁלֹשֶׁת הָאֲנָשִׁים הָאֵלֶּה
  english_pob_choice: these three men
  chosen_spanish: estos tres hombres
  alternatives_spanish:
  - estas tres personas
  - estos tres varones
  lexicon: HALOT
  rationale: Se conserva el demostrativo plural y el sustantivo masculino humano 'hombres', que corresponde bien a אֲנָשִׁים y mantiene el referente masculino del contexto.
- source_word: בְּתוֹכָהּ
  english_pob_choice: in its midst
  chosen_spanish: en medio de ella
  alternatives_spanish:
  - dentro de ella
  - en su interior
  lexicon: HALOT
  rationale: La expresión española reproduce el valor locativo idiomático del hebreo con naturalidad. 'Ella' mantiene la referencia a la tierra/ciudad mencionada en el contexto.
- source_word: חַי אָנִי
  english_pob_choice: as I live
  chosen_spanish: vivo yo
  alternatives_spanish:
  - tan cierto como que vivo
  - por mi vida
  lexicon: HALOT
  rationale: Se preserva la fórmula juramentaria, pero en español suena más directa y solemne como 'vivo yo'. La inversión ayuda a marcar el juramento profético.
- source_word: נְאֻם אֲדֹנָי יְהוִה
  english_pob_choice: declares the Lord GOD
  chosen_spanish: declara el Señor Yahvé
  alternatives_spanish:
  - oráculo del Señor Yahvé
  - declara el Señor Dios
  lexicon: HALOT; DOCTRINE.md contested terms
  rationale: Se vierte יְהוָה como 'Yahvé' según la terminología del proyecto, y אֲדֹנָי como 'Señor'. Se evita la convención de sustitución por 'SEÑOR' para no ocultar el nombre divino.
- source_word: אִם בָּנִים וְאִם בָּנוֹת יַצִּילוּ
  english_pob_choice: they would deliver neither sons nor daughters
  chosen_spanish: no librarían ni a hijos ni a hijas
  alternatives_spanish:
  - no salvarían ni a hijos ni a hijas
  - ni a hijos ni a hijas salvarían
  lexicon: HALOT
  rationale: 'Se conserva el sentido idiomático del hebreo en el contexto juramentario: no rescatarían ni siquiera hijos o hijas. ''Librar'' mantiene continuidad con el pasivo ''serían librados''.'
- source_word: הֵמָּה לְבַדָּם יִנָּצֵלוּ
  english_pob_choice: they alone would be delivered
  chosen_spanish: ellos solos serían librados
  alternatives_spanish:
  - solo ellos serían rescatados
  - ellos únicamente serían librados
  lexicon: HALOT
  rationale: '''Ellos solos'' reproduce el énfasis exclusivo de הֵמָּה לְבַדָּם. ''Serían librados'' mantiene la relación lexical con יַצִּילוּ y el contraste activo/pasivo.'
- source_word: וְהָאָרֶץ תִּהְיֶה שְׁמָמָה
  english_pob_choice: and the land would become a desolation
  chosen_spanish: y la tierra quedaría desolada
  alternatives_spanish:
  - y la tierra se convertiría en desolación
  - y la tierra sería una desolación
  lexicon: HALOT
  rationale: '''Quedaría desolada'' expresa el estado resultante sin perder el valor de juicio consumado. ''Tierra'' es la referencia natural en español para הָאָרֶץ en este contexto.'
theological_decisions:
- issue: Rendering the divine name יְהוָה in the compound title אֲדֹנָי יְהוִה
  english_pob_reading: the Lord GOD
  chosen_spanish_reading: el Señor Yahvé
  alternative_spanish_readings:
  - el Señor Dios
  - Señor Yahvé
  rationale: Se mantiene el nombre del pacto como 'Yahvé', conforme a la directriz del proyecto, y se traduce אֲדֹנָי como 'Señor'. La forma evita la ocultación del Tetragrámaton y conserva la solemnidad del juramento profético.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: El alcance exclusivo del rescate frente a hijos e hijas
  english_pob_reading: the three righteous men could not deliver even their own sons or daughters, only themselves
  chosen_spanish_reading: ni aun a sus hijos e hijas rescatarían; solo ellos serían librados
  alternative_spanish_readings:
  - no afectarían la sentencia sobre sus hijos e hijas
  - no librarían a sus descendientes
  rationale: 'La versión española mantiene la tensión teológica del oráculo: la justicia/juicio divino no se extiende por mera representación familiar. No se suaviza el contraste entre el rescate limitado y la ruina de la tierra.'
  doctrine_reference: 'DOCTRINE.md Translation philosophy #3: Preserve theological tension rather than resolve it'
translation_notes:
  revision_awareness: La redacción sigue de cerca el último estado en inglés, sin revisiones pendientes en el pasaje fuente. Se respetó la decisión auditada de conservar el contraste entre el rescate exclusivo de los tres hombres y la desolación de la tierra, así como la forma juramentaria del hebreo.
  spanish_consistency_notes:
  - Se usó 'Yahvé' para יְהוָה de manera consistente con la política del proyecto.
  - '''Librar'' se mantuvo para conectar el verbo activo y pasivo del versículo (''no librarían'' / ''serían librados'').'
  - '''Tierra'' se eligió como equivalente natural de הָאָרֶץ en este contexto de juicio sobre el territorio.'
  - La nota al pie explica la ambigüedad idiomática del hebreo sin introducir paráfrasis doctrinal.
