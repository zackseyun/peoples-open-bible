review_pass:
  verdict: revise
  source_alignment_summary: El borrador conserva bien la estructura impersonal de וַיֵּאָמַר, el destinatario «al rey de Jericó», el valor de הִנֵּה como llamada de atención, y el sentido general de que unos hombres israelitas llegaron esa noche para reconocimiento. Sin embargo, «desde los israelitas» no refleja bien מִבְּנֵי יִשְׂרָאֵל en español natural ni fiel; suena locativo/direccional y poco idiomático. Además, «hombres han venido» es gramaticalmente posible pero menos natural que «han venido unos hombres» o «unos hombres han venido».
  spanish_quality_summary: 'El texto es mayormente claro y digno, pero tiene dos tropiezos de legibilidad: 1) «desde los israelitas» es poco natural y ambiguo; 2) «Mira, hombres han venido» suena forzado en español contemporáneo. También conviene alinear el texto principal con la decisión lexical inglesa para לַחְפֹּר: mejor «para explorar/investigar la tierra» o «para reconocer la tierra»; «reconocer» es aceptable, pero la nota actual dice «espiar la tierra» y la razón habla de buscar/investigar, por lo que puede mejorarse ligeramente la coherencia.'
  glossary_alignment: No hay términos de glosario mayor en juego como Yahvé/Mesías. «Israelitas» es apropiado para מִבְּנֵי יִשְׂרָאֵל en este contexto. La excepción necesaria es que debe usarse «de entre los israelitas» o «de los israelitas», no «desde los israelitas».
  issues:
  - severity: high
    issue: «desde los israelitas» para מִבְּנֵי יִשְׂרָאֵל
    rationale: «Desde» en español normalmente expresa punto de partida espacial/temporal, no procedencia partitiva de un grupo humano en este contexto. El hebreo indica que los hombres pertenecen al pueblo de Israel; «de entre los israelitas» comunica eso con fidelidad y naturalidad.
  - severity: medium
    issue: Orden y naturalidad de «Mira, hombres han venido»
    rationale: Aunque entendible, el orden sin determinante suena rígido en español. «Mira, han venido aquí esta noche unos hombres de entre los israelitas…» preserva mejor la fluidez sin perder el énfasis informativo.
  - severity: low
    issue: Coherencia entre texto principal y nota para לַחְפֹּר
    rationale: «Reconocer la tierra» es posible, pero la nota explica el verbo como buscar/investigar y ofrece «espiar» como alternativa. «Explorar la tierra» armoniza mejor con ese campo semántico y con la idea de reconocimiento.
  revised_spanish_text: 'Y se le dijo al rey de Jericó[a]: «Mira, han venido aquí esta noche unos hombres de entre los israelitas para explorar la tierra».'
  revised_footnotes:
  - marker: a
    text: O «para espiar la tierra». El verbo hebreo puede llevar el sentido de buscar o investigar, y en este contexto se refiere a una exploración de reconocimiento.
    reason: lexical_alternative
  revision_rationale: Se corrige «desde los israelitas» a «de entre los israelitas» para reflejar con fidelidad y naturalidad el sentido partitivo de מִבְּנֵי יִשְׂרָאֵל. Se mejora la sintaxis española con «han venido aquí esta noche unos hombres» y se ajusta «para reconocer» a «para explorar» para alinear mejor el texto con el valor léxico documentado de לַחְפֹּר y con la nota alternativa «espiar».
