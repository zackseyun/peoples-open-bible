review_pass:
  verdict: revise
  source_alignment_summary: El borrador refleja bien el contraste de אַךְ con «Pero» y preserva adecuadamente שְׁאוֹל como «Seol» con nota alternativa. También capta el valor pasivo/causativo de תּוּרָד con una forma pasiva. Sin embargo, «derribado» desplaza la imagen principal de descenso hacia la de ser tumbado, y «los profundos lugares del pozo» no representa con naturalidad ni precisión יַרְכְּתֵי בּוֹר, que significa las partes más hondas/recesos del pozo/fosa.
  spanish_quality_summary: El texto es comprensible, pero «a los profundos lugares del pozo» suena poco idiomático en español bíblico moderno. «Serás hecho bajar» sería demasiado calco, pero «serás bajado» o mejor «serás llevado abajo» tampoco es ideal. La opción más natural y fiel es «serás hundido» o «serás hecho descender»; no obstante, para mantener el pasivo claro y una lectura digna, «serás bajado» sigue siendo menos elegante. La mejor reparación breve y natural es «serás precipitado al Seol, a las profundidades del pozo», que conserva humillación y descenso, y mejora mucho la fluidez.
  glossary_alignment: Alineado con la política del proyecto al conservar «Seol» transliterado y no resolverlo como «infierno» o «tumba» en el texto principal. No hay términos del glosario mayor en conflicto. La nota léxica sobre «Seol» está bien y debe mantenerse.
  issues:
  - severity: medium
    issue: «serás derribado» debilita la imagen de descenso de תּוּרָד
    rationale: Aunque comunica humillación, «derribado» en español suele sugerir ser tumbado o abatido, no necesariamente ser llevado hacia abajo. El hebreo Hophal de ירד enfatiza ser hecho descender/bajado.
  - severity: high
    issue: «a los profundos lugares del pozo» es poco natural y menos preciso para יַרְכְּתֵי בּוֹר
    rationale: La expresión española suena forzada y no reproduce bien la idea de las partes más hondas, recónditas o profundas. «A las profundidades del pozo» es más fiel e idiomática.
  revised_spanish_text: Pero tú serás precipitado al Seol[a], a las profundidades del pozo.
  revised_footnotes:
  - marker: a
    text: O «la tumba» o «el reino de los muertos» para «Seol».
    reason: lexical_alternative
  revision_rationale: Se revisa «serás derribado» a «serás precipitado» para expresar mejor el descenso impuesto y humillante de תּוּרָד en un español natural. Se cambia «a los profundos lugares del pozo» por «a las profundidades del pozo» para reflejar con precisión e idiomaticidad יַרְכְּתֵי בּוֹר. Se mantiene «Seol» con la nota alternativa, en línea con la decisión léxica y teológica documentada.
