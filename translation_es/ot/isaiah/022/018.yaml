base_translation:
  language: en
  yaml_path: translation/ot/isaiah/022/018.yaml
  text: He will surely wrap you up tightly[a], like a ball, into a broad land. There you will die, and there will be the chariots of your glory[c][b], O shame of your master's house.
  footnotes:
  - marker: a
    text: Or 'He will surely wind you up tightly' or 'He will surely roll you up tightly.' The Hebrew uses an intensified form of the same root together with a cognate noun for emphasis.
    reason: lexical_alternative
  - marker: b
    text: Literally, 'to a land broad of hands,' an idiom for a wide or spacious land.
    reason: cultural_note
  - marker: c
    text: Or 'your glorious chariots' / 'the chariots that were your glory.' The Hebrew expression may refer to the chariots in which he took pride.
    reason: lexical_alternative
