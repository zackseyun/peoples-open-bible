translation:
  text: Jesus said, "The kingdom of the Father is like a woman carrying a jar full
    of meal. While she was walking on the road, still far away, the handle of the
    jar broke. The meal emptied out behind her on the road. She did not know it; she
    had not noticed the trouble. When she reached her house, she set the jar down
    and found it empty."
  philosophy: optimal-equivalence
  drafter_model: gemini-3.1-pro-preview
  drafter_label: gemini_3_1_pro_thomas_redraft
  drafted_at: '2026-04-22T10:55:51Z'
  footnotes:
  - marker: handle
    text: Literally 'ear' (ⲙⲁⲁϫⲉ).
    reason: lexical_alternative
  - marker: trouble
    text: Or 'problem', 'toil' (ϩⲓⲥⲉ).
    reason: lexical_alternative
lexical_decisions:
- source_word: ϭⲗⲙⲉⲉⲓ
  chosen: jar
  rationale: 'Crum 814b: ''jar, pitcher''.'
  lexicon: Crum
  alternatives:
  - pitcher
  entry: 814b
- source_word: ⲛⲟⲉⲓⲧ
  chosen: meal
  rationale: 'Crum 230a: ''flour, meal''.'
  lexicon: Crum
  alternatives:
  - flour
  entry: 230a
- source_word: ⲙⲁⲁϫⲉ
  chosen: handle
  rationale: 'Crum 211a: ''ear, handle''. The literal ''ear'' refers to the handle
    of the jar.'
  lexicon: Crum
  alternatives:
  - ear
  entry: 211a
- source_word: ⲟⲩⲱϭⲡ
  chosen: broke
  rationale: 'Crum 509b: ''break, be broken''.'
  lexicon: Crum
  alternatives:
  - snapped
  entry: 509b
- source_word: ϣⲟⲩⲟ
  chosen: emptied out
  rationale: 'Crum 600a: ''empty, pour out''.'
  lexicon: Crum
  alternatives:
  - spilled
  - poured out
  entry: 600a
- source_word: ϩⲓⲥⲉ
  chosen: trouble
  rationale: 'Crum 715b: ''toil, trouble, affliction''. In this context, it refers
    to the mishap or problem of the breaking jar.'
  lexicon: Crum
  alternatives:
  - problem
  - toil
  entry: 715b
theological_decisions:
- issue: Translation of ⲧⲙⲛ̄ⲧⲉⲣⲟ ⲙ̄ⲡⲉⲓⲱⲧ
  chosen_reading: The kingdom of the Father
  rationale: Preserved exactly as written, reflecting Thomas's specific phrasing rather
    than harmonizing to 'kingdom of God' or 'kingdom of heaven'.
  alternatives_noted: []
drafter_notes: This unique parable of the woman with the jar of meal has no canonical
  parallel. The translation preserves the straightforward narrative style of the Coptic,
  maintaining the literal imagery where possible while ensuring natural English flow
  (e.g., translating 'ear' as 'handle').
