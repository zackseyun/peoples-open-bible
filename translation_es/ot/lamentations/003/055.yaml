translation:
  language: es
  text: Invocé tu nombre[a], Yahvé, desde las profundidades del pozo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «desde las partes más bajas del pozo» o «desde las profundidades de abajo del pozo».'
    reason: lexical_alternative
lexical_decisions:
- source_word: קָרָאתִי
  english_pob_choice: I called on
  chosen_spanish: invocé
  alternatives_spanish:
  - llamé
  - clamé
  lexicon: HALOT
  rationale: En este contexto, con 'tu nombre' como objeto, el valor idiomático es de dirigirse a Dios en súplica. 'Invocé' comunica ese uso sin perder la relación con el verbo básico 'llamar'.
- source_word: שִׁמְךָ
  english_pob_choice: your name
  chosen_spanish: tu nombre
  alternatives_spanish:
  - tu nombre, es decir, a ti
  - tu nombre
  lexicon: HALOT
  rationale: Se conserva la expresión literal para mantener el hebraísmo de invocar el nombre como forma de llamar a la persona misma.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  - Jehová
  lexicon: HALOT
  rationale: El texto hebreo usa el Tetragrámaton. En español, la forma adoptada por el proyecto es 'Yahvé', que preserva el nombre propio divino en lugar de sustituirlo por un título.
- source_word: מִבּוֹר
  english_pob_choice: from the pit
  chosen_spanish: desde... el sepulcro
  alternatives_spanish:
  - desde el pozo
  - desde el foso
  - desde el abismo
  lexicon: HALOT
  rationale: '''Bo''r'' puede ser pozo, foso o sepulcro. En Lamentaciones el contexto es de extrema aflicción y cercanía de muerte; ''sepulcro'' comunica ese peso en español, aunque la imagen literal del pozo queda atenuada.'
- source_word: תַּחְתִּיּוֹת
  english_pob_choice: the depths
  chosen_spanish: las profundidades
  alternatives_spanish:
  - los lugares más bajos
  - las profundidades más hondas
  - los fondos
  lexicon: HALOT
  rationale: El término intensifica la idea de lo más bajo. 'Las profundidades' conserva la imagen y funciona naturalmente con 'sepulcro' en español.
theological_decisions:
- issue: Uso del nombre divino YHWH
  english_pob_reading: O Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Jehová
  - el Señor
  rationale: Se sigue la decisión del POB de no ocultar el nombre divino bajo un título. 'Yahvé' es la forma elegida para el Tetragrámaton en español.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
translation_notes:
  revision_awareness: La versión inglesa auditada quedó sin cambios en la última revisión; la presente redacción española sigue de cerca el mismo juicio léxico y no introduce nuevas variantes textuales.
  spanish_consistency_notes:
  - Se mantuvo 'Yahvé' como forma consistente para יְהוָה.
  - Se conservó la imagen de descenso extremo con 'las profundidades' y 'sepulcro', sin ampliar el sentido más allá de lo que permite el hebreo.
  - '''Invocé tu nombre'' preserva el hebraísmo de llamar al nombre como forma de dirigirse a Dios.'
