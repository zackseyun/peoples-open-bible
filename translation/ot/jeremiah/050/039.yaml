id: JER.50.39
reference: Jeremiah 50:39
source:
  edition: WLC
  text: לָ/כֵ֗ן יֵשְׁב֤וּ צִיִּים֙ אֶת אִיִּ֔ים וְ/יָ֥שְׁבוּ בָ֖/הּ בְּנ֣וֹת יַֽעֲנָ֑ה וְ/לֹֽא תֵשֵׁ֥ב עוֹד֙ לָ/נֶ֔צַח וְ/לֹ֥א תִשְׁכּ֖וֹן עַד דּ֥וֹר וָ/דֽוֹר־־־׃
translation:
  text: Therefore desert creatures will dwell there with hyenas[a], and ostriches will dwell in her; she will never again be inhabited forever[c][b], nor will she be lived in from generation to generation.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'with jackals' or 'with howling creatures'; the exact identification of the Hebrew terms for these desert animals is uncertain.
    reason: lexical_alternative
  - marker: b
    text: Literally 'daughters of the ostrich,' that is, ostriches. Older English versions sometimes render this as 'owls.'
    reason: lexical_alternative
  - marker: c
    text: 'The city is personified as feminine in Hebrew: ''in her,'' ''she will not be inhabited.'''
    reason: cultural_note
lexical_decisions:
- source_word: לָכֵן
  chosen: Therefore
  alternatives:
  - So
  - For this reason
  lexicon: HALOT
  rationale: Standard inferential particle introducing the consequence of Babylon's judgment.
- source_word: צִיִּים
  chosen: desert creatures
  alternatives:
  - wild desert animals
  - desert dwellers
  lexicon: HALOT
  rationale: The term denotes creatures associated with ruins/desert places. A generic rendering is preferable because the exact zoological identification is uncertain.
- source_word: אֶת
  chosen: with
  alternatives:
  - together with
  lexicon: Hebrew grammar
  rationale: Here אֶת functions in an associative sense ('with') rather than as the normal direct-object marker, linking two classes of desert fauna.
- source_word: אִיִּים
  chosen: hyenas
  alternatives:
  - jackals
  - howling creatures
  - wild animals of the coast/desert
  lexicon: HALOT
  rationale: The word is difficult and likely refers to wild scavenging animals inhabiting ruins. 'Hyenas' is a common specific proposal, but the identification is uncertain enough to preserve alternatives in a footnote.
- source_word: בְּנוֹת יַעֲנָה
  chosen: ostriches
  alternatives:
  - female ostriches
  - owls
  lexicon: HALOT
  rationale: The Hebrew idiom literally means 'daughters of the ostrich,' a known expression for ostriches. 'Owls' reflects older tradition but is less likely in light of Hebrew usage.
- source_word: בָהּ
  chosen: in her
  alternatives:
  - in it
  lexicon: Hebrew grammar
  rationale: The pronominal suffix is feminine singular, referring to Babylon/city. 'Her' preserves the personified-city imagery common in prophetic literature.
- source_word: לֹא תֵשֵׁב עוֹד לָנֶצַח
  chosen: she will never again be inhabited forever
  alternatives:
  - it will never again be inhabited
  - she will no longer be inhabited for ever
  lexicon: HALOT
  rationale: The verb is feminine singular and in context refers to the city. The sense is permanent desolation. English smoothness is difficult because the Hebrew combines 'not again' with 'forever'; the phrase is retained to reflect the emphatic permanence.
- source_word: לֹא תִשְׁכּוֹן
  chosen: nor will she be lived in
  alternatives:
  - nor will anyone dwell in her
  - nor will she be inhabited
  lexicon: HALOT
  rationale: The verb means 'dwell, reside.' Because the subject remains the city, English passive-like expression conveys the sense that no one will reside there.
- source_word: עַד דּוֹר וָדוֹר
  chosen: from generation to generation
  alternatives:
  - for generation after generation
  - through all generations
  lexicon: HALOT
  rationale: Idiomatic expression for enduring duration across successive generations; rendered with a natural English equivalent.
