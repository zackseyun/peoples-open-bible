revisions:
- from: 'Y entiérrame bien[a], y a tu madre conmigo, y no permanezcan ya más tiempo en Nínive. Hijo, mira lo que hizo Nadab a Ahikar, que lo había criado: cómo lo llevó de la luz a la oscuridad, y lo que le pagó. Pero Ahikar fue salvado, mientras que aquel hombre recibió el pago, y él mismo descendió a la oscuridad. Manasés hizo misericordia[b], y fue salvado de la trampa mortal que Nadab le había puesto; pero Nadab cayó en la trampa y pereció.'
  to: 'Y entiérrame bien, y a tu madre conmigo, y no permanezcas ya más tiempo en Nínive. Hijo, mira lo que hizo Nadab[a] a Ahikar, que lo había criado: cómo lo llevó de la luz a la oscuridad, y lo que le pagó. Pero Ahikar fue salvado, mientras que aquel hombre recibió el pago, y él mismo descendió a la oscuridad. Manasés practicó misericordia[b], y fue salvado de la trampa mortal que Nadab le había puesto; pero Nadab cayó en la trampa y pereció.'
  rationale: Se corrigió la segunda persona plural a singular para ajustarla al destinatario del discurso; se movió la nota textual de Ἀδὰμ al nombre 'Nadab'; se sustituyó 'hizo misericordia' por 'practicó misericordia' para un español más natural sin perder el valor amplio de ἐλεημοσύνη; y se tradujeron/adaptaron las notas al español con marcadores correctamente anclados.
