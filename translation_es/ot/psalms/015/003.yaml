translation:
  language: es
  text: No calumnia con su lengua[a], no hace mal a su prójimo[b], y no dirige reproche contra el que tiene cerca[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «no anda como chismoso con su lengua».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «no hace ningún mal a su amigo/compañero».'
    reason: lexical_alternative
  - marker: c
    text: 'Hebreo: «su cercano»; puede referirse a un pariente, un allegado o alguien próximo en su comunidad.'
    reason: lexical_alternative
lexical_decisions:
- source_word: רָגַל
  english_pob_choice: slander
  chosen_spanish: calumnia
  alternatives_spanish:
  - anda chismeando
  - va de chismoso
  - difama
  lexicon: HALOT
  rationale: El verbo hebreo en este giro con ‘su lengua’ describe hablar de modo dañino contra otro. ‘Calumnia’ conserva la fuerza ética del acto verbal y es natural en español bíblico actual. ‘Chismear’ comunica la idea de divulgación dañina, pero suena más coloquial; ‘difamar’ es posible, aunque algo más jurídico.
- source_word: עַל לְשֹׁנוֹ
  english_pob_choice: with his tongue
  chosen_spanish: con su lengua
  alternatives_spanish:
  - sobre su lengua
  - por su lengua
  lexicon: HALOT
  rationale: La preposición con ‘lengua’ funciona de manera instrumental/idiomática. ‘Con su lengua’ conserva el valor concreto y expresa bien el medio del habla sin sonar forzado en español.
- source_word: עָשָׂה ... רָעָה
  english_pob_choice: does not do evil
  chosen_spanish: no hace mal
  alternatives_spanish:
  - no hace maldad
  - no hace lo malo
  - no comete mal
  lexicon: HALOT
  rationale: La expresión hebrea es amplia, ‘hacer mal/daño’. ‘No hace mal’ es breve, natural y mantiene la amplitud moral del hebreo. ‘Maldad’ puede sonar más abstracta; ‘daño’ estrecha demasiado el sentido.
- source_word: לְרֵעֵהוּ
  english_pob_choice: to his neighbor
  chosen_spanish: a su prójimo
  alternatives_spanish:
  - a su vecino
  - a su amigo
  - a su compañero
  lexicon: HALOT
  rationale: רֵעַ puede ser prójimo, amigo o compañero. En un contexto ético general, ‘prójimo’ conserva la amplitud comunitaria y es claro para lectores de español sin restringirlo a vecindad física.
- source_word: חֶרְפָּה
  english_pob_choice: reproach
  chosen_spanish: oprobio
  alternatives_spanish:
  - afrenta
  - reproche
  - vergüenza
  lexicon: HALOT
  rationale: ‘Oprobio’ recoge bien la idea de deshonra o afrenta pública asociada a חֶרְפָּה. ‘Reproche’ sería más verbal que nominal; ‘afrenta’ es viable, pero ‘oprobio’ mantiene mejor la dimensión de vergüenza social.
- source_word: נָשָׂא ... עַל
  english_pob_choice: bear ... against
  chosen_spanish: levanta ... contra
  alternatives_spanish:
  - carga ... contra
  - lleva ... contra
  - toma ... contra
  lexicon: HALOT
  rationale: נָשָׂא significa literalmente ‘levantar/llevar’. En este contexto, junto con ‘oprobio’ y ‘contra’, ‘levanta’ permite conservar la imagen verbal del hebreo y su posible sentido de alzar una acusación o afrenta contra alguien.
- source_word: קְרֹבוֹ
  english_pob_choice: his close one
  chosen_spanish: su cercano
  alternatives_spanish:
  - su pariente
  - su allegado
  - el que le es cercano
  lexicon: HALOT
  rationale: El término puede abarcar pariente, allegado o alguien cercano en la comunidad. ‘Su cercano’ es sobrio y mantiene la indeterminación relacional del hebreo sin limitarlo a parentesco de sangre.
translation_notes:
  revision_awareness: 'La redacción sigue de cerca el audit trail inglés, pero adapta los tres miembros del versículo a un español bíblico natural: el primer miembro con un verbo de habla dañina; el segundo con una negación ética amplia; y el tercero con la imagen de ‘levantar oprobio’ para reflejar נָשָׂא sin perder claridad. Se preserva la indeterminación de רֵעַ y קָרוֹב mediante notas.'
  spanish_consistency_notes:
  - Se usa ‘Yahvé’ solo cuando aparezca el nombre divino; este versículo no lo contiene.
  - Se mantiene ‘prójimo’ para רֵעַ en un marco ético amplio, consistente con el uso POB.
  - ‘Con su lengua’ conserva la imagen concreta de la fuente, en paralelo con el inglés auditado.
  - ‘Su cercano’ evita sobretraducir a ‘pariente’, dejando abierta la gama semántica del hebreo.
