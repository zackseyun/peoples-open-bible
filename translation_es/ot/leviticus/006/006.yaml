review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja correctamente el sentido básico del hebreo: un fuego en el altar debe permanecer y no apagarse. Sin embargo, «arderá» no conserva del todo la fuerza pasiva/causativa-pasiva de תּוּקַד, que en este contexto normativo apunta a que el fuego debe ser mantenido encendido, no solo a que arde.'
  spanish_quality_summary: El español es claro y natural, pero puede mejorarse para reflejar mejor el matiz prescriptivo del hebreo sin perder legibilidad. «Será mantenido encendido» suena idiomático y comunica mejor la acción prescrita que «arderá».
  glossary_alignment: No hay conflictos con la terminología base del proyecto. «Fuego», «altar» y «no se apagará» están bien. La nota alternativa con «perpetuo» es apropiada. La principal corrección es léxica/sintáctica para תּוּקַד.
  issues:
  - severity: medium
    issue: «Arderá» atenúa el valor de תּוּקַד
    rationale: El hophal de יקד expresa que el fuego ha de ser mantenido ardiendo/encendido. «Arderá» describe el estado, pero no deja tan explícita la obligación de mantenimiento que el hebreo y el English POB preservan con «shall be kept burning».
  - severity: low
    issue: La nota alternativa repite la misma simplificación verbal
    rationale: «Arderá» en la alternativa con «perpetuo» tampoco refleja plenamente el matiz de mantenimiento. Conviene ajustar también la alternativa para coherencia con la evidencia fuente.
  revised_spanish_text: Un fuego continuo será mantenido encendido sobre el altar[a]; no se apagará.
  revised_footnotes:
  - marker: a
    text: O «Un fuego perpetuo será mantenido encendido sobre el altar; no se apagará».
    reason: lexical_alternative
  revision_rationale: Se revisa «arderá» a «será mantenido encendido» para representar mejor la fuerza pasiva/causativa-pasiva de תּוּקַד en un contexto cultual prescriptivo, en línea con el rastro de auditoría inglés. Se conserva la claridad del español y la alternativa léxica «perpetuo».
