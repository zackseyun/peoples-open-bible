translation:
  language: es
  text: Y cuando los judíos que estaban establecidos allí dieron testimonio de la buena voluntad que los habitantes de Escitópolis tenían hacia ellos[a], y de su trato amable en tiempos de desgracia,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «acogida amable» para «trato amable»; la frase griega habla literalmente de un «encuentro/recibimiento amable».
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀπομαρτυρησάντων
  english_pob_choice: testified
  chosen_spanish: testificaron
  alternatives_spanish:
  - dieron testimonio
  - atestiguaron
  lexicon: LSJ
  rationale: El participio aoristo introduce el testimonio de los judíos locales. «Testificaron» conserva el valor de dar testimonio sin recargar el estilo.
- source_word: τῶν ἐκεῖ καθεστώτων Ἰουδαίων
  english_pob_choice: the Jews who were settled there
  chosen_spanish: los judíos que estaban establecidos allí
  alternatives_spanish:
  - los judíos establecidos allí
  - los judíos residentes allí
  lexicon: LSJ
  rationale: καθεστώτων expresa estar colocados o establecidos en un lugar. «Estaban establecidos allí» comunica la residencia fija con naturalidad en español.
- source_word: οἱ Σκυθοπολεῖται
  english_pob_choice: the people of Scythopolis
  chosen_spanish: los habitantes de Escitópolis
  alternatives_spanish:
  - los escitopolitas
  lexicon: LSJ
  rationale: El etnónimo se refiere a los habitantes de la ciudad. «Habitantes de Escitópolis» es más claro para lectura pública que el demónimo menos familiar.
- source_word: εὔνοιαν
  english_pob_choice: goodwill
  chosen_spanish: buena voluntad
  alternatives_spanish:
  - benevolencia
  - favor
  lexicon: LSJ
  rationale: εὔνοια significa disposición favorable o benevolencia. «Buena voluntad» preserva ese matiz relacional y cívico en español.
- source_word: ἐν τοῖς τῆς ἀτυχίας καιροῖς
  english_pob_choice: in times of misfortune
  chosen_spanish: en tiempos de desgracia
  alternatives_spanish:
  - en tiempos de adversidad
  - en tiempos de calamidad
  lexicon: LSJ
  rationale: ἀτυχία designa mala fortuna o adversidad. «Desgracia» transmite el sentido general sin intensificarlo más de lo que exige el griego.
- source_word: ἥμερον ἀπάντησιν
  english_pob_choice: gentle treatment
  chosen_spanish: trato amable
  alternatives_spanish:
  - acogida amable
  - recibimiento bondadoso
  - trato benigno
  lexicon: LSJ
  rationale: 'La expresión es idiomática: ἥμερος añade suavidad/amabilidad y ἀπάντησις literalmente es «encuentro» o «recibimiento». En español, «trato amable» comunica de forma clara la manera en que fueron tratados.'
translation_notes:
  revision_awareness: El borrador sigue de cerca el texto griego de Swete 1909 y el audit trail inglés sin cambios de revisión reportados; se mantiene la equivalencia óptima ya aprobada por el control cruzado.
  spanish_consistency_notes:
  - Se conserva un registro neutral y eclesialmente legible en español latinoamericano.
  - Se evita sustituir el etnónimo por una forma tradicional opaca cuando el griego nombra claramente a los habitantes de la ciudad.
  - «Testificaron» y «buena voluntad» mantienen el tono documental del contexto narrativo.
  - La nota al pie preserva la alternativa semántica documentada para ἥμερον ἀπάντησιν.
