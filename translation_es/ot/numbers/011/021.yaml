translation:
  language: es
  text: 'Pero Moisés dijo: «El pueblo entre el cual estoy cuenta con seiscientos mil[a] que van a pie, y tú has dicho: “Yo les daré carne, y comerán por un mes de días[b]”».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «seiscientos mil hombres de a pie». El hebreo puede referirse a los contados como quienes iban a pie, o a gente de a pie en sentido más general.
    reason: alternative_reading
  - marker: b
    text: Hebreo literalmente, «un mes de días», un modismo que significa un mes completo.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר / וַיֹּאמֶר מֹשֶׁה
  english_pob_choice: But Moses said
  chosen_spanish: Pero Moisés dijo
  alternatives_spanish:
  - Y Moisés dijo
  - Entonces Moisés dijo
  lexicon: HALOT
  rationale: El waw consecutivo avanza la narración, pero aquí el contexto inmediato es de objeción de Moisés ante lo dicho por Yahvé; por eso «Pero» comunica mejor el contraste discursivo que «Y». «Dijo» conserva la forma narrativa simple y natural en español.
- source_word: שֵׁשׁ מֵאוֹת אֶלֶף
  english_pob_choice: six hundred thousand
  chosen_spanish: seiscientos mil
  alternatives_spanish:
  - seiscientos mil
  lexicon: HALOT
  rationale: La construcción numérica se traslada de manera directa, sin añadir ni omitir contenido.
- source_word: רַגְלִי הָעָם
  english_pob_choice: the people ... are six hundred thousand on foot
  chosen_spanish: hombres de a pie
  alternatives_spanish:
  - gente de a pie
  - hombres a pie
  - hombres de infantería
  lexicon: HALOT
  rationale: La expresión hebrea puede referirse a quienes van a pie; en español, «de a pie» reproduce la idea de tránsito a pie. Se explicita «hombres» para reflejar la posibilidad lexical del giro hebreo y evitar que la frase suene forzada con «pueblo» como sujeto de una cuantificación de desplazamiento. La decisión conserva la tensión documentada entre una lectura general («el pueblo») y una lectura más específica de personas contadas como caminantes.
- source_word: אֲשֶׁר אָנֹכִי בְּקִרְבּוֹ
  english_pob_choice: among whom I am
  chosen_spanish: entre el cual estoy
  alternatives_spanish:
  - entre quienes estoy
  - en medio del cual estoy
  - entre los cuales estoy
  lexicon: HALOT
  rationale: «בְּקִרְבּוֹ» expresa estar en medio/entre. En español, «entre el cual estoy» mantiene la relación espacial y el tono del hebreo con una formulación publicable y clara; además, preserva el referente colectivo singular «el pueblo».
- source_word: וְאַתָּה אָמַרְתָּ
  english_pob_choice: and yet you have said
  chosen_spanish: y tú has dicho
  alternatives_spanish:
  - pero tú has dicho
  - y has dicho tú
  lexicon: HALOT
  rationale: El hebreo trae el pronombre explícito y contrastivo. En español, «y tú has dicho» conserva esa explicitud y permite que el contraste lo aporte el contexto inmediato; no se fuerza un adversativo adicional que el hebreo no exige de forma obligatoria.
- source_word: בָּשָׂר
  english_pob_choice: meat
  chosen_spanish: carne
  alternatives_spanish:
  - carne
  - carne para comer
  lexicon: HALOT
  rationale: En español bíblico contemporáneo «carne» es el equivalente más estable y amplio de בָּשָׂר cuando habla de alimento. «Meat» en inglés puede ser natural, pero en español «carne» evita una restricción culinaria moderna más estrecha y conserva la resonancia léxica del hebreo.
- source_word: אֶתֵּן לָהֶם
  english_pob_choice: I will give them
  chosen_spanish: les daré
  alternatives_spanish:
  - les daré
  - yo les daré
  lexicon: HALOT
  rationale: Futuro simple normal en la promesa directa. El dativo se expresa naturalmente con clítico.
- source_word: וְאָכְלוּ
  english_pob_choice: and they will eat
  chosen_spanish: y comerán
  alternatives_spanish:
  - y comerán
  - para que coman
  lexicon: HALOT
  rationale: Se mantiene el valor de futuro coordinado con la promesa anterior, sin convertirlo en propósito.
- source_word: חֹדֶשׁ יָמִים
  english_pob_choice: for a month of days
  chosen_spanish: por un mes de días
  alternatives_spanish:
  - durante un mes
  - por un mes entero
  lexicon: HALOT
  rationale: Se preserva el giro idiomático literal «mes de días», que el POB inglés retuvo para no borrar la textura hebrea. En español suena algo marcado, pero sigue siendo inteligible y auditablese con el original.
translation_notes:
  revision_awareness: Se siguió la revisión más reciente del audit trail en la preferencia por «among whom I am» frente a una formulación más rígida. Para el español se eligió una equivalencia natural de esa relación espacial («entre el cual estoy») sin perder el referente colectivo. También se preservó la decisión revisada de mantener la imagen concreta de la cantidad de personas «de a pie» y la expresión idiomática «un mes de días», ambas ancladas en el hebreo.
  spanish_consistency_notes:
  - Se usó «Yahvé» en el marco terminológico del proyecto, aunque en este versículo no aparece explícitamente en el texto hebreo.
  - Se mantuvo «carne» para בָּשָׂר por consistencia con el valor alimentario y con el estilo POB.
  - Se conservó el registro bíblico sobrio sin arcaísmos innecesarios; «de a pie» funciona como equivalente idiomático contemporáneo de רַגְלִי.
  - La numeración y la sintaxis buscan ser publicables en español latinoamericano, sin neutralizar la textura semítica del pasaje.
