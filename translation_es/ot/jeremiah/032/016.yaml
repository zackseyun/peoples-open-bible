    issue: La nota al pie está anclada a «Baruc[a]» pero trata sobre יְהוָה / «Yahvé».
    rationale: Las notas deben aparecer en la palabra o frase relevante del texto. El contenido de la nota no corresponde a «Baruc», sino al nombre divino.
  - severity: low
    issue: La puntuación de «a Baruc, hijo de Nerías,» es menos natural de lo necesario.
    rationale: En este contexto narrativo, «a Baruc hijo de Nerías» fluye mejor y preserva el patronímico hebreo sin parentetizarlo con comas.
