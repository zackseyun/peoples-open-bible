review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien el sentido básico del hebreo y del paralelo griego: denuncia (''אוי''), destinatario plural, ''hombres'', maldad/impiedad, abandono deliberado, y ''la ley del Altísimo''. Sin embargo, la distribución de notas no preserva fielmente el rastro de auditoría inglés: la nota [a] está anclada en ''ustedes'' pero trata la variante textual sobre ''Dios Altísimo'', que corresponde a ''del Altísimo''; y la nota [b] está anclada en ''impíos'' pero explica ''ley/תורת'', por lo que debe anclarse en ''ley''. Además, ''impíos'' introduce un matiz más estrechamente griego que el ''wicked'' documentado como preferencia del hebreo base.'
  spanish_quality_summary: El texto es claro, natural y digno en español eclesial moderno. '¡Ay de ustedes, hombres impíos...!' suena bien, pero 'malvados' preserva mejor el alcance del hebreo base y evita sobredeterminar la impiedad religiosa. La sintaxis general es excelente. La principal reparación necesaria es la colocación correcta de las notas y un ajuste léxico menor para alinearse mejor con la decisión auditada.
  glossary_alignment: No hay conflicto con los términos globales del proyecto. 'el Altísimo' está bien y respeta la decisión teológica documentada de no añadir 'Dios' en el texto principal. 'la ley' también está bien. El punto a corregir es que 'impíos' se aparta de la elección inglesa auditada 'wicked' basada en el hebreo; en español, 'malvados' o 'perversos' se ajusta mejor. También deben preservarse las notas alternativas exactamente en los lugares relevantes del texto.
  issues:
  - severity: medium
    issue: Marcador [a] anclado en 'ustedes' aunque la nota trata 'la ley de Dios Altísimo' vs. 'la ley del Altísimo'.
    rationale: Las notas deben aparecer en la palabra o frase pertinente. Aquí la variante afecta al título divino dentro del complemento de 'ley', no al destinatario del 'ay'.
  - severity: medium
    issue: Marcador [b] anclado en 'impíos' aunque la nota explica el léxico de תורת / νόμον.
    rationale: La nota léxica sobre 'ley / instrucción / enseñanza' debe anclarse en 'ley' para que el lector identifique correctamente el término comentado.
  - severity: low
    issue: '''impíos'' estrecha el matiz frente a la decisión auditada ''wicked''.'
    rationale: El hebreo base רשע favorece una noción amplia de maldad; aunque el griego ἀσεβεῖς permite 'impíos', la auditoría inglesa prefirió no sobreespecificar ese matiz. 'malvados' mantiene mejor la primacía del hebreo sin perder fuerza.
  revised_spanish_text: ¡Ay de ustedes, hombres malvados, que han abandonado la ley[a] del Altísimo[b]!
