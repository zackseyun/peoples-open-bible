    issue: 'Marcador de nota inválido en el texto: [aa]'
    rationale: El texto contiene ‘esta[aa]’ pero no existe una nota con marcador ‘aa’. Además, la nota a ya está anclada en ‘dijo[a]’, no en ‘esta’, donde realmente pertenece la explicación del demostrativo femenino.
  - severity: medium
    issue: 'Concordancia verbal potencialmente incorrecta: ‘envíen’'
    rationale: La frase se dirige al asistente singular de Amnón. Aunque שִׁלְחוּ puede parecer plural en aislamiento, el contexto y el segundo imperativo singular וּנְעֹל favorecen una orden a un solo sirviente. En español, el singular evita confusión.
  - severity: medium
    issue: 'Expresión poco idiomática: ‘echen el cerrojo de la puerta’'
    rationale: En español natural se dice ‘echa el cerrojo a la puerta’ o ‘atranca la puerta’. La formulación actual suena mecánica.
