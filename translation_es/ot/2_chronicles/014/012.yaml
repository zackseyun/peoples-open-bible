revisions:
- from: Asa y el pueblo que estaba con él los persiguieron hasta Gerar[a], y los cusitas cayeron hasta que no les quedó vida, porque quedaron destrozados delante de Yahvé y delante de su campamento[b]. Entonces se llevaron un botín muy grande.
  to: Asa y el pueblo que estaba con él los persiguieron hasta Gerar[a], y los cusitas cayeron hasta que no quedó ninguno con vida, porque quedaron destrozados delante de Yahvé y delante de su campamento[b]. Entonces se llevaron una cantidad muy grande de botín.
  rationale: Se ajustó la frase de supervivencia a un español más natural y explícito («no quedó ninguno con vida»), se reforzó la abundancia final para reflejar mejor הַרְבֵּה מְאֹד («una cantidad muy grande de botín»), y se normalizó la nota léxica a «cusitas» para mantener consistencia terminológica.
