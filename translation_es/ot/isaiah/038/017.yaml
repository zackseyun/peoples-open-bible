translation:
  language: es
  text: He aquí[a], para mi paz tuve gran amargura; pero tú has retenido mi alma de la fosa de destrucción, porque has echado detrás de ti todos mis pecados.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «has amado mi alma sacándola de la fosa de destrucción». El verbo hebreo puede expresar apego profundo o amor.'
    reason: lexical_alternative
lexical_decisions:
- source_word: לְשָׁלוֹם
  english_pob_choice: for my peace
  chosen_spanish: para mi paz
  alternatives_spanish:
  - para mi bienestar
  - para mi bien
  - hacia la paz
  lexicon: HALOT
  rationale: לְ con שָׁלוֹם expresa orientación o relación con la paz. 'Para mi paz' conserva esa relación personal y sigue de cerca la decisión auditada del inglés, sin volverlo una paráfrasis amplia.
- source_word: מַר לִי מָר
  english_pob_choice: I had great bitterness
  chosen_spanish: tuve gran amargura
  alternatives_spanish:
  - fui lleno de amargura
  - había para mí gran amargura
  - estuve muy amargado
  lexicon: HALOT
  rationale: La repetición hebrea intensifica la idea de amargura. 'Tuve gran amargura' transmite la fuerza idiomática en español sin duplicación mecánica ni suavizar el efecto emocional.
- source_word: חָשַׁקְתָּ
  english_pob_choice: have held ... back
  chosen_spanish: has retenido
  alternatives_spanish:
  - has amado
  - te has aferrado a
  - has mostrado afecto por
  lexicon: HALOT
  rationale: El POB inglés opta por el resultado contextual de protección y rescate. 'Retenido' comunica ese acto de apartar o contener del peligro, mientras deja abierta la tensión lexical con el sentido de afecto que el verbo puede tener.
- source_word: נַפְשִׁי
  english_pob_choice: my soul
  chosen_spanish: mi alma
  alternatives_spanish:
  - mi vida
  - a mí mismo
  - mi ser
  lexicon: HALOT
  rationale: נֶפֶשׁ puede ser alma, vida o yo mismo. 'Mi alma' conserva la imagen hebrea y coincide con la decisión inglesa, manteniendo la profundidad personal del testimonio.
- source_word: מִשַּׁחַת בְּלִי
  english_pob_choice: from the pit of destruction
  chosen_spanish: de la fosa de destrucción
  alternatives_spanish:
  - del pozo de destrucción
  - de la fosa de ruina
  - del sepulcro de destrucción
  lexicon: HALOT
  rationale: שַׁחַת admite 'fosa', 'pozo' o 'sepulcro' según contexto. 'Fosa de destrucción' preserva la imagen concreta y el matiz de ruina sin estrecharlo solo a 'sepulcro'.
- source_word: הִשְׁלַכְתָּ אַחֲרֵי גֵוְךָ
  english_pob_choice: have cast all my sins behind your back
  chosen_spanish: has echado tras de tu espalda todos mis pecados
  alternatives_spanish:
  - has arrojado detrás de ti todos mis pecados
  - los has puesto fuera de tu vista
  - has lanzado tras de ti todos mis pecados
  lexicon: HALOT
  rationale: El hebreo usa un modismo de apartar de la consideración. 'Tras de tu espalda' reproduce la metáfora con naturalidad en español; 'espalda' mantiene la imagen corporal del texto sin perder su valor idiomático.
- source_word: חֲטָאַי
  english_pob_choice: my sins
  chosen_spanish: mis pecados
  alternatives_spanish:
  - mis ofensas
  - mis faltas
  - mi culpa
  lexicon: HALOT
  rationale: חטא en plural designa pecados. 'Pecados' es la opción más directa y transparente, en línea con el POB inglés y la claridad teológica requerida.
theological_decisions:
- issue: 'Cómo reflejar חָשַׁקְתָּ נַפְשִׁי מִשַּׁחַת בְּלִי: afecto divino o rescate divino'
  english_pob_reading: 'Rendered the clause as protective rescue: ''you have held my soul back from the pit of destruction.'' The English note preserves the love/attachment nuance in a footnote.'
  chosen_spanish_reading: has retenido mi alma de la fosa de destrucción
  alternative_spanish_readings:
  - has amado mi alma sacándola de la fosa de destrucción
  - te has aferrado a mi alma apartándola de la fosa
  rationale: 'La cláusula enfatiza el resultado salvífico inmediato: Dios aparta al orante de la muerte. La nota preserva la lectura alternativa de amor/afecto porque el verbo hebreo la permite y la tradición devocional la valora, sin imponerla como única.'
  doctrine_reference: Preservar la tensión léxica sin resolverla dogmáticamente
- issue: Cómo traducir la imagen de los pecados echados 'tras de tu espalda'
  english_pob_reading: you have cast all my sins behind your back
  chosen_spanish_reading: has echado tras de tu espalda todos mis pecados
  alternative_spanish_readings:
  - has puesto fuera de tu vista todos mis pecados
  - has arrojado detrás de ti todos mis pecados
  rationale: La imagen no solo indica olvido psicológico, sino remoción deliberada de la vista y la consideración divina. 'Tras de tu espalda' mantiene el carácter idiomático sin convertirlo en explicación abstracta.
  doctrine_reference: El lenguaje figurado de perdón y no-recuerdo divino
translation_notes:
  revision_awareness: 'Se siguió la revisión más reciente del POB en inglés, que ajusta la apertura a una estructura más directa: ''for my peace I had great bitterness''. Por eso el español evita una copulativa añadida y mantiene una relación preposicional compacta: ''para mi paz tuve gran amargura''.'
  spanish_consistency_notes:
  - Se conservó 'Yahvé' como término por defecto solo cuando aparezca el nombre divino; en este versículo no aparece explícitamente.
  - Se eligió 'alma' para נֶפֶשׁ conforme a la decisión inglesa y para mantener la imagen antropológica del texto.
  - Se evitó 'Señor' o 'SEÑOR' porque el hebreo aquí no usa el tetragrámaton, sino una referencia directa de segunda persona en el discurso.
  - '''Pecados'' se mantuvo como término estándar para חטאים en plural, sin suavizar a ''faltas'' o ''ofensas''.'
