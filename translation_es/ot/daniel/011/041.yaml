    reason: lexical_alternative
  - marker: c
    text: 'O ‘el principal de los amonitas’. Hebreo: ‘los más prominentes de los hijos de Amón’.'
    reason: lexical_alternative
  revision_rationale: Se corrige el anclaje de la nota sobre ‘muchos’ para que coincida con el término relevante; se mejora la frase final a ‘los más prominentes de los hijos de Amón’ para reflejar mejor רֵאשִׁית בְּנֵי עַמּוֹן en español natural y fiel; y se ajusta la puntuación de la enumeración.
