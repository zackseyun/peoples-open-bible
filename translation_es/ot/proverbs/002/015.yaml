lexical_decisions:
- source_word: אֲשֶׁר
  english_pob_choice: whose
  chosen_spanish: cuyos
  alternatives_spanish:
  - de quienes
  - que
  lexicon: HALOT
  rationale: La partícula relativa introduce una relación posesiva con «caminos»; en español, «cuyos» conserva esa posesión de modo natural y mantiene el enlace con el sustantivo siguiente.
- source_word: אָרְחֹתֵיהֶם
  english_pob_choice: paths
  chosen_spanish: caminos
  alternatives_spanish:
  - sendas
  - senderos
  - rutas
  lexicon: HALOT
  rationale: El hebreo designa caminos o modos de andar; «caminos» es natural en español bíblico actual y conserva el valor metafórico de conducta o curso de vida.
- source_word: עִקְּשִׁים
  english_pob_choice: crooked
  chosen_spanish: torcidos
  alternatives_spanish:
  - torcidos moralmente
  - perversos
  - retorcidos
  lexicon: HALOT
  rationale: La imagen de algo doblado o desviado se expresa bien con «torcidos», que mantiene el paralelo figurado con el camino y también el juicio moral implícito.
- source_word: וּנְלוֹזִים
  english_pob_choice: devious
  chosen_spanish: depravados
  alternatives_spanish:
  - desviados
  - torcidos
  - perversos
  lexicon: HALOT
  rationale: El término hebreo añade la idea de apartarse o desviarse con carga moral. «Depravados» comunica con fuerza esa desviación ética; se reconoce que otras opciones como «desviados» o «torcidos» son posibles, pero podrían debilitar el matiz moral.
- source_word: בְּמַעְגְּלוֹתָם
  english_pob_choice: in their ways
  chosen_spanish: en sus sendas
  alternatives_spanish:
  - en sus caminos
  - en sus rutas
  - en sus veredas
  lexicon: HALOT
  rationale: מַעְגָּל puede referirse a senderos o trayectorias. «Sendas» evita repetir «caminos» y conserva el paralelismo poético, sin perder el sentido de curso o manera de vivir.
translation_notes:
  revision_awareness: El texto inglés auditado pasó de «tracks» a «ways» para מַעְגְּלוֹתָם; la versión española sigue esa revisión evitando una imagen demasiado técnica o redundante, y mantiene el paralelismo con «caminos / sendas».
  spanish_consistency_notes:
  - Se preserva la metáfora del andar moral con vocabulario claro y publicable.
  - «Depravados» intensifica el matiz moral de נְלוֹזִים sin introducir una interpretación doctrinal ajena al verso.
  - La nota alternativa refleja el cruce posible de los dos miembros paralelos, como en el audit trail inglés.
