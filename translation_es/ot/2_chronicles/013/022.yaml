translation:
  language: es
  text: Ahora, el resto de los hechos de Abías, y sus caminos y sus dichos, están escritos en el midrash[a] del profeta Iddo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Midrash» puede entenderse también como «comentario», «exposición» o, más ampliamente, «registro». Aquí el término hebreo apunta a una obra escrita de interpretación o investigación, no necesariamente al género rabínico posterior ya desarrollado.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְיֶתֶר
  english_pob_choice: Now the rest of
  chosen_spanish: Ahora, el resto de
  alternatives_spanish:
  - Y el resto de
  - El resto de
  lexicon: HALOT
  rationale: יֶתֶר introduce el material restante sobre un rey. «Ahora, el resto de» conserva el valor de transición narrativa y suena natural en español historiográfico.
- source_word: דִּבְרֵי
  english_pob_choice: the acts of
  chosen_spanish: los hechos de
  alternatives_spanish:
  - las palabras de
  - los asuntos de
  lexicon: HALOT
  rationale: En fórmulas de resumen histórico, דברי puede abarcar asuntos, hechos o actuaciones. «Hechos» refleja bien el sentido historiográfico que el POB inglés captó con «acts».
- source_word: אֲבִיָּה
  english_pob_choice: Abijah
  chosen_spanish: Abías
  alternatives_spanish:
  - Abijá
  lexicon: Convención onomástica bíblica en español
  rationale: Se usa la forma bíblica española más reconocible y de lectura eclesial amplia.
- source_word: וּדְרָכָיו
  english_pob_choice: and his ways
  chosen_spanish: y sus caminos
  alternatives_spanish:
  - y su conducta
  - y sus maneras de vivir
  lexicon: HALOT
  rationale: דֶּרֶךְ en plural con sufijo puede denotar conducta o curso de vida. «Caminos» conserva la imagen hebrea sin perder claridad.
- source_word: וּדְבָרָיו
  english_pob_choice: and his sayings
  chosen_spanish: y sus dichos
  alternatives_spanish:
  - y sus palabras
  - y sus declaraciones
  lexicon: HALOT
  rationale: Aquí דבר parece referirse a sus palabras pronunciadas o registradas. «Dichos» mantiene esa especificidad mejor que el más amplio «palabras».
- source_word: כְּתוּבִים
  english_pob_choice: are written
  chosen_spanish: están escritos
  alternatives_spanish:
  - se hallan escritos
  - quedan escritos
  lexicon: HALOT
  rationale: El participio pasivo indica que esos materiales se encuentran por escrito. «Están escritos» es directo y fiel.
- source_word: בְּמִדְרַשׁ
  english_pob_choice: in the midrash
  chosen_spanish: en el midrash[a]
  alternatives_spanish:
  - en la exposición
  - en el comentario
  - en el registro
  lexicon: HALOT
  rationale: Se retiene el préstamo «midrash» porque designa aquí una obra escrita interpretativa o investigativa, y no conviene reducirlo de antemano a «comentario» o «registro».
- source_word: הַנָּבִיא עִדּוֹ
  english_pob_choice: of the prophet Iddo
  chosen_spanish: del profeta Iddo
  alternatives_spanish:
  - del profeta Iddó
  - del profeta Iddo
  lexicon: HALOT
  rationale: La frase constructa identifica la obra como perteneciente al profeta Iddo; en español es natural expresarlo como «del profeta Iddo».
translation_notes:
  revision_awareness: La revisión más reciente indicó que no hacía falta cambio alguno; este borrador mantiene la concordancia alta con el paquete fuente y con la traducción inglesa auditada, ajustando solo la redacción al español natural.
  spanish_consistency_notes:
  - 'Se mantiene el orden histórico-fórmula de resumen: «Ahora, el resto de…»'
  - 'Se conserva el nombre bíblico en forma española estándar: «Abías».'
  - Se evita sustituir «midrash» por un equivalente genérico que borre la tensión léxica documentada.
  - «Dichos» preserva mejor el contraste con «hechos» y «caminos» que una mera repetición de «palabras».
