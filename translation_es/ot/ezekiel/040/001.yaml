revisions:
- from: En el vigésimo quinto año de nuestro exilio[a], al principio del año, el décimo día del mes, en el año catorce después de que la ciudad había sido derribada[b], precisamente ese día la mano de Yahvé estuvo sobre mí, y me llevó allí.
  to: En el vigésimo quinto año de nuestro exilio[a], al principio del año, el décimo día del mes, en el decimocuarto año después de que la ciudad hubiera sido derribada[b], precisamente ese día la mano de Yahvé estuvo sobre mí, y me llevó allí.
  rationale: Se ajusta la cronología a un español más natural y fiel («en el decimocuarto año») y se corrige la subordinada temporal tras «después de que» para expresar anterioridad completada de manera idiomática («hubiera sido derribada»). Se conserva la terminología clave del proyecto, incluido «Yahvé» y el modismo «la mano de Yahvé».
  reviewer_model: gpt-5.4
