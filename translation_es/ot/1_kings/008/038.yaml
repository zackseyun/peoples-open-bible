translation:
  language: es
  text: cualquier oración, cualquier súplica, que se haga por cualquier hombre[a] o por todo tu pueblo Israel, si cada uno conoce la aflicción[b] de su propio corazón y extiende sus manos hacia esta casa[c],
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «para cualquier hombre»; la construcción hebrea con «a/para» puede entenderse de más de una manera aquí.
    reason: lexical_alternative
  - marker: b
    text: Literalmente, «la plaga de su corazón».
    reason: lexical_alternative
  - marker: c
    text: Es decir, el templo, llamado aquí «esta casa».
    reason: cultural_note
lexical_decisions:
- source_word: כָּל תְּפִלָּה
  english_pob_choice: whatever prayer
  chosen_spanish: cualquier oración
  alternatives_spanish:
  - toda oración
  - cualquier plegaria
  lexicon: HALOT
  rationale: כָּל introduce aquí una referencia indefinida y abarcadora; en español, «cualquier» conserva esa amplitud sin sonar rígido. «Oración» es el término más natural y fiel para תְּפִלָּה en este contexto.
- source_word: כָל תְּחִנָּה
  english_pob_choice: whatever plea
  chosen_spanish: cualquier súplica
  alternatives_spanish:
  - toda súplica
  - cualquier ruego
  lexicon: HALOT
  rationale: תְּחִנָּה tiene el matiz de ruego intenso o súplica. «Súplica» preserva ese énfasis mejor que un término más general, y mantiene el paralelismo con «oración».
- source_word: אֲשֶׁר תִהְיֶה
  english_pob_choice: may be made
  chosen_spanish: que se haga
  alternatives_spanish:
  - que pueda hacerse
  - que exista
  lexicon: HALOT
  rationale: El hebreo introduce cualquier instancia de oración o súplica. En español, «que se haga» refleja de forma natural la idea de una oración formulada o presentada, sin añadir contenido ajeno.
- source_word: לְכָל הָאָדָם
  english_pob_choice: by any man
  chosen_spanish: por cualquier hombre
  alternatives_spanish:
  - por cualquier persona
  - para cualquier hombre
  - para cualquier persona
  lexicon: HALOT
  rationale: La preposición ל en este marco puede entenderse en relación con el agente o destinatario de la oración. Siguiendo la lectura auditada del POB inglés, «por cualquier hombre» conserva el singular representativo y la fuerza lexical de אָדָם sin neutralizarla de manera no justificada por el contexto.
- source_word: לְכֹל עַמְּךָ יִשְׂרָאֵל
  english_pob_choice: or by all your people Israel
  chosen_spanish: o por todo tu pueblo Israel
  alternatives_spanish:
  - o para todo tu pueblo Israel
  - o por todo tu pueblo, Israel
  lexicon: HALOT
  rationale: Se mantiene el paralelismo con la frase anterior y la referencia pactual a Israel como «tu pueblo». «Por» reproduce la misma relación sintáctica elegida en la primera cola.
- source_word: אֲשֶׁר יֵדְעוּן אִישׁ
  english_pob_choice: each knowing
  chosen_spanish: cada uno conociendo
  alternatives_spanish:
  - cuando cada uno conozca
  - puesto que cada uno conoce
  - cada uno que conoce
  lexicon: HALOT
  rationale: El valor distributivo de אִישׁ se expresa de manera natural con «cada uno», conservando el sentido de singularidad dentro del conjunto.
- source_word: נֶגַע לְבָבוֹ
  english_pob_choice: the affliction of his own heart
  chosen_spanish: la aflicción de su propio corazón
  alternatives_spanish:
  - la plaga de su corazón
  - el golpe de su corazón
  - la herida de su corazón
  lexicon: HALOT
  rationale: נֶגַע puede significar plaga, golpe o aflicción. En español, «aflicción» comunica bien el padecimiento interior sin perder la metáfora de una herida o golpe interno. «Su propio corazón» hace explícita la referencia reflexiva del hebreo.
- source_word: וּפָרַשׂ כַּפָּיו
  english_pob_choice: and spreading out his hands
  chosen_spanish: y extendiendo sus manos
  alternatives_spanish:
  - y alzando sus manos
  - y abriendo sus manos
  - y tendiendo sus manos
  lexicon: HALOT
  rationale: El gesto de oración se expresa con claridad y naturalidad en español como «extender las manos». La forma participial mantiene la continuidad sintáctica del original.
- source_word: אֶל הַבַּיִת הַזֶּה
  english_pob_choice: toward this house
  chosen_spanish: hacia esta casa
  alternatives_spanish:
  - hacia este templo
  - a esta casa
  - al templo
  lexicon: HALOT
  rationale: Se conserva «casa» para respetar el sustantivo hebreo בַּיִת y su resonancia teológica, y «hacia» expresa la orientación direccional de אֶל. Aunque el referente sea el templo, la traducción mantiene el término de origen.
theological_decisions:
- issue: Renderización de אָדָם como singular representativo
  english_pob_reading: by any man
  chosen_spanish_reading: por cualquier hombre
  alternative_spanish_readings:
  - por cualquier persona
  - por cualquiera
  rationale: El hebreo usa un singular masculino representativo, en contraste con la mención colectiva de Israel. Mantener «hombre» conserva la forma del texto y la fuerza del singular genérico, sin perder inclusión contextual porque el versículo amplía luego a «todo tu pueblo Israel».
  doctrine_reference: DOCTRINE.md Translation philosophy §4
- issue: Mantenimiento de בַּיִת como «casa»
  english_pob_reading: this house
  chosen_spanish_reading: esta casa
  alternative_spanish_readings:
  - este templo
  rationale: Aunque el referente histórico es el templo, el hebreo dice literalmente «casa». Conservar «casa» preserva el vocabulario bíblico y la continuidad con el lenguaje del pacto, sin oscurecer el sentido contextual.
  doctrine_reference: DOCTRINE.md Translation philosophy §1, §5
translation_notes:
  revision_awareness: El pasaje muestra alto acuerdo en la revisión reciente; no se detectaron cambios sustantivos en el texto base. La presente versión sigue la lectura auditada del POB inglés, manteniendo el paralelismo, el singular representativo y la referencia literal a «casa» sin reinterpretarla como «templo» en el texto principal.
  spanish_consistency_notes:
  - Se usa «casa» de manera consistente para בַּיִת cuando el contexto templario ya está claro.
  - Se mantiene «hombre» para אָדָם en singular representativo, de acuerdo con la política de fidelidad lexical.
  - «Súplica» se emplea para תְּחִנָּה por su matiz más intenso que «oración».
  - La puntuación conserva una cadencia bíblica natural en español sin sobrecargar el verso con explicaciones dentro del cuerpo principal.
