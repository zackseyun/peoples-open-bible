translation:
  language: es
  text: 'Y le comunicó el asunto a Ragüel. Y Ragüel dijo a Tobías: «Come, bebe y alégrate, porque te corresponde tomar a mi hija[a][b]; pero yo te explicaré la verdad».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El griego dice literalmente «mi hijo» o «mi niño», pero aquí se refiere a Sara.
    reason: lexical_alternative
  - marker: b
    text: Es decir, «tomarla en matrimonio». El griego usa la expresión más literal «tomar».
    reason: lexical_alternative
lexical_decisions:
- source_word: μετέδωκεν
  english_pob_choice: conveyed
  chosen_spanish: comunicó
  alternatives_spanish:
  - transmitió
  - expuso
  - pasó
  lexicon: LSJ
  rationale: El verbo expresa que se dio a conocer o se transmitió el asunto a Ragüel. «Comunicó» mantiene el sentido de impartir la información sin sonar demasiado técnico ni demasiado literal.
- source_word: τὸν λόγον
  english_pob_choice: the matter
  chosen_spanish: el asunto
  alternatives_spanish:
  - la palabra
  - el mensaje
  - la propuesta
  lexicon: LSJ
  rationale: En este contexto λόγος no apunta a «palabra» en sentido aislado, sino al tema tratado. «El asunto» es natural en español y preserva la referencia contextual.
- source_word: ἡδέως γίνου
  english_pob_choice: be merry
  chosen_spanish: alégrate
  alternatives_spanish:
  - goza
  - ponte contento
  - sé alegre
  lexicon: LSJ
  rationale: La frase es una invitación idiomática a disfrutar la ocasión. En español, el imperativo reflexivo «alégrate» transmite bien el tono positivo y festivo, sin forzar un calco como «sé alegre».
- source_word: καθήκει
  english_pob_choice: it is fitting
  chosen_spanish: te corresponde
  alternatives_spanish:
  - es apropiado
  - conviene
  - es fitting
  lexicon: LSJ
  rationale: El verbo expresa conveniencia o correspondencia social y moral. En el contexto matrimonial, «te corresponde» comunica bien la idea de que la acción te pertenece legítimamente por derecho y arreglo.
- source_word: τὸ παιδίον μου
  english_pob_choice: my child
  chosen_spanish: mi hijo
  alternatives_spanish:
  - mi hija
  - mi niña
  - mi criatura
  lexicon: LSJ
  rationale: El griego dice literalmente «mi niño/mi hijo(a)». Como el referente es Sara, en español «mi hija» aclararía el sentido, pero el texto fuente preserva una expresión genérica. Para mantener la tensión documentada, se usa «mi hijo» en el texto principal y se anota la alternativa femenina.
- source_word: λαβεῖν
  english_pob_choice: to take
  chosen_spanish: tomar
  alternatives_spanish:
  - recibir
  - llevar
  - casarte con
  lexicon: LSJ
  rationale: El infinitivo es literalmente «tomar». En el contexto nupcial puede implicar tomar en matrimonio, pero el texto griego no lo expresa de forma explícita; por eso se conserva «tomar» y se aclara el matiz en nota.
- source_word: ὑποδείξω
  english_pob_choice: I will explain
  chosen_spanish: yo te explicaré
  alternatives_spanish:
  - te mostraré
  - te indicaré
  - te daré a conocer
  lexicon: LSJ
  rationale: Aquí Ragüel promete aclarar o exponer algo importante. «Yo te explicaré» reproduce con naturalidad la intención de revelar la verdad sin perder el matiz de explicación explícita.
- source_word: τὴν ἀλήθειαν
  english_pob_choice: the truth
  chosen_spanish: la verdad
  alternatives_spanish:
  - la realidad
  - el verdadero asunto
  lexicon: LSJ
  rationale: Es la traducción directa y más clara de ἀλήθεια. En este pasaje señala una revelación franca sobre la situación de Sara, por lo que «la verdad» es adecuado.
theological_decisions:
- issue: Expresión matrimonial de «tomar»
  english_pob_reading: That is, “to take in marriage.” The Greek uses the more literal expression “to take.”
  chosen_spanish_reading: «tomar» se mantiene de forma literal, con el matiz matrimonial implícito en el contexto
  alternative_spanish_readings:
  - «casarte con»
  - «tomarla en matrimonio»
  - «recibirla como esposa»
  rationale: 'El griego usa λαβεῖν, literalmente «tomar». El POB inglés preserva esa literalidad y añade en nota el sentido matrimonial. En español conviene hacer lo mismo: mantener el verbo literal en el texto y explicar el matiz en la nota, evitando sustituir el lenguaje fuente por una paráfrasis interpretativa.'
  doctrine_reference: No doctrinal; decisión de fidelidad léxica al contexto matrimonial.
- issue: Referente de «mi hijo» / «mi child»
  english_pob_reading: Or “my daughter.” The Greek says “my child,” with Sarah as the intended referent.
  chosen_spanish_reading: «mi hijo» en el texto, con nota alternativa «mi hija» por el referente Sara
  alternative_spanish_readings:
  - «mi hija»
  - «mi niña»
  - «mi criatura»
  rationale: 'La tensión del original es importante: el griego dice literalmente «mi child/mi niño», pero el referente es Sara. En español, «mi hija» aclara, pero borra la literalidad documentada. Se conserva la expresión más cercana al original y se registra la alternativa clara en la nota.'
  doctrine_reference: No doctrinal; decisión sobre el alcance semántico de τὸ παιδίον μου.
translation_notes:
  revision_awareness: 'El borrador sigue el estado revisado más reciente del POB en inglés: se mantiene «be merry» como tono festivo/convivial reflejado en español con «alégrate», y se conserva la literalidad de «take» con explicación en nota. No se introdujeron expansiones interpretativas fuera del tramo ya auditado.'
  spanish_consistency_notes:
  - Se usa «Yahvé» no aplica en este versículo; no hay sustitución por «SEÑOR».
  - «Tobías» y «Ragüel» se mantienen con grafía hispanizada habitual y consistente con el nombre propio griego.
  - Se conserva el registro bíblico sobrio y moderno, evitando arcaísmos innecesarios.
  - Las comillas angulares españolas se usan para el discurso directo.
  - Se mantiene la distinción entre literalidad del texto y aclaración en nota, siguiendo el patrón auditado del POB inglés.
