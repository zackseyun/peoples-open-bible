base_translation:
  language: en
  yaml_path: translation/deuterocanon/prayer_of_manasseh/001/013.yaml
  text: 'I beg you[a], pleading with you: forgive me, Lord, forgive me, and do not destroy me along with my lawless deeds, nor, being angry forever, keep my evils against me, nor condemn me in the lowest parts of the earth; for you, Lord[b], are the God of those who repent[c],'
  footnotes:
  - marker: a
    text: Or 'hold my evils against me.' The Greek phrase can be rendered more idiomatically this way.
    reason: lexical_alternative
  - marker: b
    text: Or 'in the depths of the earth.' The expression refers to the lowest regions beneath the earth.
    reason: lexical_alternative
  - marker: c
    text: Or 'condemn me in the lowest parts'.
    reason: previous_rendering
