translation:
  language: es
  text: Por la ira de Yahvé de los ejércitos[a] el país es abrasado, y el pueblo se ha vuelto como combustible para el fuego; ningún hombre tiene compasión de su hermano.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «el país es quemado» o «el país se oscurece». El verbo hebreo es raro y su matiz preciso se debate; la imagen inmediata del fuego respalda «es abrasado».
    reason: lexical_alternative
lexical_decisions:
- source_word: בְּעֶבְרַת
  english_pob_choice: By the wrath of
  chosen_spanish: Por la ira de
  alternatives_spanish:
  - En la ira de
  - A causa de la ira de
  lexicon: HALOT
  rationale: עֶבְרָה expresa ira/furia intensa; 'ira' comunica bien el campo semántico en español. 'Por' conserva el valor instrumental/causal del ב inicial sin volver la frase rígida.
- source_word: יְהוָה צְבָא֖וֹת
  english_pob_choice: the LORD of hosts
  chosen_spanish: Yahvé de los ejércitos
  alternatives_spanish:
  - Yahvé de los ejércitos celestiales
  - Yahvé de las huestes
  lexicon: HALOT
  rationale: Se conserva Yahvé para el nombre divino. צְבָאוֹת se vierte aquí como 'los ejércitos' para mantener la imagen de poder soberano; 'huestes' sería más tradicional, pero menos transparente para lector moderno.
- source_word: נֶעְתַּם
  english_pob_choice: is scorched
  chosen_spanish: es abrasada
  alternatives_spanish:
  - es quemada
  - es consumida
  - se oscurece
  lexicon: HALOT
  rationale: El verbo es raro y admite matiz de quemado/oscurecido. 'Abrasada' encaja con la imagen inmediata de fuego y conserva la dificultad léxica sin cerrar indebidamente el sentido.
- source_word: אָרֶץ
  english_pob_choice: the land
  chosen_spanish: la tierra
  alternatives_spanish:
  - el país
  - la región
  lexicon: HALOT
  rationale: Aquí אָרֶץ puede ser 'tierra' o 'país'; 'la tierra' es el equivalente más natural en español bíblico y mantiene amplitud referencial.
- source_word: וַיְהִי הָעָם
  english_pob_choice: and the people have become
  chosen_spanish: y el pueblo se ha vuelto
  alternatives_spanish:
  - y el pueblo se volvió
  - y el pueblo llegó a ser
  lexicon: HALOT
  rationale: '''Se ha vuelto'' expresa bien el resultado de la acción y su estado presente. ''Pueblo'' es una opción natural para הָעָם en este contexto colectivo.'
- source_word: כְּמַאֲכֹלֶת אֵשׁ
  english_pob_choice: like fuel for the fire
  chosen_spanish: como combustible para el fuego
  alternatives_spanish:
  - como leña para el fuego
  - como alimento para el fuego
  lexicon: HALOT
  rationale: La frase literalmente sugiere algo consumido por el fuego. 'Combustible para el fuego' transmite la idea de materia destinada a arder, sin perder la fuerza metafórica.
- source_word: אִישׁ
  english_pob_choice: no man
  chosen_spanish: ningún hombre
  alternatives_spanish:
  - nadie
  - ningún ser humano
  lexicon: HALOT
  rationale: אִישׁ es masculino singular con fuerza distributiva. 'Ningún hombre' preserva esa forma y el tono enfático del hebreo, mientras sigue siendo natural en español.
- source_word: אֶל אָחִיו
  english_pob_choice: his brother
  chosen_spanish: a su hermano
  alternatives_spanish:
  - a su prójimo
  - a su pariente
  lexicon: HALOT
  rationale: אָח normalmente significa 'hermano', y aquí intensifica el horror de la violencia interna. Se conserva la imagen familiar sin suavizarla.
- source_word: לֹא יַחְמֹלוּ
  english_pob_choice: no man spares his brother
  chosen_spanish: ningún hombre perdona a su hermano
  alternatives_spanish:
  - ningún hombre lo compadece
  - ningún hombre se apiada de su hermano
  lexicon: HALOT
  rationale: חמל implica no ahorrar/sparar por compasión. 'Perdona' aquí se usa en el sentido de 'no dar tregua' o 'no tener miramientos'; en español bíblico puede sonar más fuerte que 'apiada' y evita una lectura sentimental.
theological_decisions:
- issue: Nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahveh
  - el SEÑOR
  rationale: Se sigue el criterio del proyecto de no enmascarar el nombre divino con una sustitución litúrgica. 'Yahvé' es la forma española estándar en este proyecto y conserva el carácter pactual del Tetragrámaton.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: צְבָאוֹת
  english_pob_reading: hosts
  chosen_spanish_reading: de los ejércitos
  alternative_spanish_readings:
  - de las huestes
  - de los ejércitos celestiales
  rationale: '''Hosts'' en inglés equivale a un término de tropas/huestes. En español, ''ejércitos'' mantiene la fuerza militar y la idea de soberanía guerrera divina con mayor claridad contemporánea.'
  doctrine_reference: Lexical-theological rendering of divine sovereignty in OT judgment texts
- issue: Ámbito de אָרֶץ
  english_pob_reading: the land
  chosen_spanish_reading: la tierra
  alternative_spanish_readings:
  - la región
  - el país
  rationale: En el contexto profético de juicio, אָרֶץ no requiere limitarse a una entidad política moderna. 'La tierra' conserva la amplitud del juicio y la imagen cósmico-territorial del texto.
  doctrine_reference: Context-sensitive scope of ארץ in prophetic discourse
translation_notes:
  revision_awareness: El inglés POB reciente ajustó la clausula final de 'a man does not spare his brother' a 'no man spares his brother' por naturalidad idiomática; la presente traducción sigue esa misma fuerza distributiva con 'ningún hombre perdona a su hermano'. También se conserva la nota léxica sobre el verbo raro נֶעְתַּם mediante una nota al pie en español.
  spanish_consistency_notes:
  - Se mantiene Yahvé como nombre divino principal, conforme al estándar del proyecto.
  - Se evita 'Señor' como sustituto del Tetragrámaton para no ocultar el nombre propio hebreo.
  - '''Combustible para el fuego'' sigue el equivalente funcional del inglés POB, pero se eligió ''abrasada'' para el verbo por mejor naturalidad y cercanía al campo semántico del juicio por fuego.'
  - '''Ningún hombre'' conserva la distribución del hebreo אִישׁ sin convertirlo en un impersonal más abstracto.'
