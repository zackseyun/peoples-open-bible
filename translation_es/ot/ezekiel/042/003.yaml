translation:
  language: es
  text: Frente a los veinte codos que pertenecían al atrio interior, y frente al pavimento que pertenecía al atrio exterior, una galería[a] frente a otra en el tercer piso[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El hebreo «attiq» es un término arquitectónico raro; puede denotar una galería, columnata, pórtico u otra estructura superior semejante.
    reason: lexical_alternative
  - marker: b
    text: O «en el tercer nivel». El hebreo probablemente se refiere al tercer piso de la edificación.
    reason: lexical_alternative
lexical_decisions:
- source_word: נֶגֶד
  english_pob_choice: Opposite
  chosen_spanish: Frente a
  alternatives_spanish:
  - Enfrente de
  - Opuesto a
  lexicon: HALOT
  rationale: En el contexto arquitectónico expresa correspondencia espacial. «Frente a» suena natural en español y conserva la relación de ubicación sin volverlo artificial.
- source_word: הָעֶשְׂרִים
  english_pob_choice: the twenty cubits
  chosen_spanish: los veinte codos
  alternatives_spanish:
  - los veinte
  - los veinte codos de medida
  lexicon: HALOT
  rationale: El hebreo no dice «codos» de forma explícita en esta palabra aislada, pero el contexto de medidas arquitectónicas lo exige para que el español sea inteligible; por eso se mantiene la unidad implícita como hizo la POB en inglés.
- source_word: לֶחָצֵר הַפְּנִימִי
  english_pob_choice: that belonged to the inner court
  chosen_spanish: que pertenecían al atrio interior
  alternatives_spanish:
  - del atrio interior
  - en el atrio interior
  lexicon: HALOT
  rationale: Se conserva la relación posesiva/asociativa del lamed, evitando una simple localización que debilitaría el sentido de pertenencia o asociación con el atrio.
- source_word: רִצְפָה
  english_pob_choice: the pavement
  chosen_spanish: el pavimento
  alternatives_spanish:
  - la superficie pavimentada
  - el enlosado
  lexicon: HALOT
  rationale: En este pasaje de arquitectura del templo, el término designa una superficie pavimentada. «Pavimento» es claro y concreto en español.
- source_word: לֶחָצֵר הַחִיצוֹנָה
  english_pob_choice: that belonged to the outer court
  chosen_spanish: que pertenecía al atrio exterior
  alternatives_spanish:
  - del atrio exterior
  - en el atrio exterior
  lexicon: HALOT
  rationale: Se mantiene la misma solución relacional que en la primera mitad del verso, para respetar la simetría del hebreo y de la traducción inglesa auditada.
- source_word: אַתִּיק
  english_pob_choice: gallery
  chosen_spanish: galería
  alternatives_spanish:
  - colonnata
  - pórtico
  - terraza
  lexicon: HALOT
  rationale: Es un término arquitectónico raro y debatido. «Galería» conserva la idea de una estructura elevada o corredor superior y funciona bien en la repetición «galería frente a galería».
- source_word: אֶל פְּנֵי
  english_pob_choice: faced
  chosen_spanish: frente a
  alternatives_spanish:
  - mirando a
  - opuesta a
  lexicon: HALOT
  rationale: La locución expresa una orientación recíproca. En español, repetir «frente a» reproduce bien el paralelismo y la relación espacial.
- source_word: בַּשְּׁלִשִׁים
  english_pob_choice: in the third story
  chosen_spanish: en el tercer piso
  alternatives_spanish:
  - en el tercer nivel
  - en el tercer piso/altura
  lexicon: HALOT
  rationale: En este contexto arquitectónico, la referencia es al tercer nivel de la construcción. «Piso» comunica con claridad la idea de nivel superior sin apartarse del sentido del texto.
translation_notes:
  revision_awareness: 'Se siguió de cerca el audit trail en inglés y no se realizaron cambios de fondo respecto de la última revisión: la estructura espacial, la relación posesiva de los atrios y la interpretación arquitectónica de אַתִּיק y בַּשְּׁלִשִׁים se mantuvieron estables.'
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» como norma general del proyecto, pero este versículo no contiene el nombre divino.
  - Se eligió «atrio» para חָצֵר siguiendo el registro arquitectónico del templo en español bíblico moderno, en lugar de «patio», para conservar precisión terminológica.
  - Se mantuvo «galería» para אַתִּיק como equivalente principal por su neutralidad y su aptitud para un término arquitectónico raro y no totalmente seguro.
