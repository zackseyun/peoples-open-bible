revisions:
- from: 'Habla a Aarón y a sus hijos, diciendo: «Esta es la ley de la ofrenda por el pecado[a]: en el lugar donde se degüella el holocausto, allí será degollada la ofrenda por el pecado delante de Yahvé. Es cosa santísima».'
  to: 'Habla a Aarón y a sus hijos, diciendo: «Esta es la ley de la ofrenda por el pecado[a]: en el lugar donde se degüella el holocausto será degollada la ofrenda por el pecado delante de Yahvé. Es santísima»'
  rationale: Se elimina «allí» por ser una adición no necesaria respecto del hebreo, y se reemplaza «Es cosa santísima» por «Es santísima» para reflejar con más fidelidad y naturalidad la clasificación קֹדֶשׁ קָדָשִׁים sin añadir un sustantivo ausente del original. Se conserva la nota léxica sobre חַטָּאת y el uso de «Yahvé» según la política del proyecto.
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T21:27:28Z'
