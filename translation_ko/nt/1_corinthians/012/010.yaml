base_translation:
  language: en
  yaml_path: translation/nt/1_corinthians/012/010.yaml
  text: to another[a], workings of miracles; to another, prophecy; to another, discernments of spirits; to another, kinds of tongues; to another[b], interpretation of tongues.
  footnotes:
  - marker: a
    text: Or 'workings of powers' or 'workings of mighty deeds.'
    reason: lexical_alternative
  - marker: b
    text: Or 'kinds of languages' and 'interpretation of languages.' The Greek term can mean either 'tongues' or 'languages'; 'tongues' is retained here to preserve the ambiguity in Paul's discussion of spiritual gifts.
    reason: alternative_reading
translation:
  language: ko
  text: 또 어떤 사람에게는 능력의 역사들이, 또 어떤 사람에게는 예언이, 또 어떤 사람에게는 영들의 분별이, 또 어떤 사람에게는 여러 종류의 방언이, 또 어떤 사람에게는 방언 통역이 주어집니다.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 「방언(γλῶσσα)」은 「언어」로도 옮길 수 있다. 본문은 인간의 알려진 언어를 가리키는지, 영적으로 부여된 언어를 가리키는지 결정하지 않는다. 한국 교회의 정착 어휘를 따라 「방언」으로 옮긴다.
    reason: lexical_alternative
