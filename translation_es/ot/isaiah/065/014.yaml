translation:
  language: es
  text: ¡Miren[a]! Mis siervos cantarán por la alegría[b] del corazón; pero ustedes clamarán por el dolor[c] del corazón, y por un espíritu quebrantado gemirán[d].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O '¡Vean!' o '¡He aquí!'; el hebreo introduce una llamada enfática a prestar atención.
    reason: lexical_alternative
  - marker: b
    text: O 'gozo' o 'bienestar' del corazón; la expresión hebrea es idiomática.
    reason: lexical_alternative
  - marker: c
    text: O 'angustia' del corazón.
    reason: lexical_alternative
  - marker: d
    text: O 'aullarán'.
    reason: lexical_alternative
lexical_decisions:
- source_word: הִנֵּה
  english_pob_choice: Look
  chosen_spanish: ¡Mira!
  alternatives_spanish:
  - ¡Miren!
  - ¡Vean!
  - ¡He aquí!
  lexicon: HALOT
  rationale: Expresa la llamada de atención enfática con un español natural y directo. 'Mira' conserva mejor la fuerza deíctica que una fórmula más arcaica.
- source_word: עֲבָדַי
  english_pob_choice: my servants
  chosen_spanish: mis siervos
  alternatives_spanish:
  - mis esclavos
  - mis servidores
  lexicon: HALOT
  rationale: En este contexto profético, 'siervos' comunica pertenencia y servicio a Dios con dignidad en español. 'Esclavos' sería más literal en fuerza léxica, pero aquí no parece el matiz dominante del pasaje según el audit trail inglés.
- source_word: יָרֹנּוּ
  english_pob_choice: will sing
  chosen_spanish: cantarán
  alternatives_spanish:
  - estallarán en canto
  - gritarán de alegría
  - cantarán de gozo
  lexicon: HALOT
  rationale: El hebreo puede incluir canto o júbilo sonoro. 'Cantarán' es la opción más natural y fiel en español, manteniendo el sentido celebrativo.
- source_word: מִטּוּב לֵב
  english_pob_choice: for gladness of heart
  chosen_spanish: por la alegría del corazón
  alternatives_spanish:
  - por la bondad del corazón
  - por un corazón alegre
  - a causa del bienestar del corazón
  lexicon: HALOT
  rationale: Se conserva la idea idiomática de bienestar/interior contento y la relación causal de la preposición. 'Bondad' sería demasiado moralizante en español; 'alegría del corazón' comunica mejor el valor idiomático.
- source_word: תִּצְעֲקוּ
  english_pob_choice: will cry out
  chosen_spanish: clamarán
  alternatives_spanish:
  - gritarán
  - alzarán un clamor
  - llamarán a voces
  lexicon: HALOT
  rationale: '''Clamar'' reproduce bien el grito fuerte de angustia y funciona de manera elevada pero clara en español bíblico contemporáneo.'
- source_word: מִכְּאֵב לֵב
  english_pob_choice: from pain of heart
  chosen_spanish: por el dolor del corazón
  alternatives_spanish:
  - por la angustia del corazón
  - por el corazón dolorido
  - desde el dolor del corazón
  lexicon: HALOT
  rationale: '''Dolor del corazón'' conserva la metáfora hebrea y la paralelidad con ''alegría del corazón''. Se evita suavizarla con una paráfrasis más interpretativa.'
- source_word: מִשֵּׁבֶר רוּחַ
  english_pob_choice: from a broken spirit
  chosen_spanish: por un espíritu quebrantado
  alternatives_spanish:
  - por un espíritu roto
  - por un espíritu aplastado
  - desde un espíritu quebrantado
  lexicon: HALOT
  rationale: '''Espíritu quebrantado'' mantiene la imagen bíblica y el registro reconocible en español, sin convertirlo en una explicación abstracta.'
- source_word: תְּיֵלִילוּ
  english_pob_choice: you will wail
  chosen_spanish: lamentarán
  alternatives_spanish:
  - aullarán
  - gemirán
  - se lamentarán
  lexicon: HALOT
  rationale: El verbo hebreo indica lamento agudo o aullido. 'Lamentarán' ofrece una versión digna y suficientemente fuerte; el contexto ya expresa la intensidad del llanto.
theological_decisions:
- issue: Contraste entre 'mis siervos' y 'ustedes'
  english_pob_reading: 'Retain the covenantal contrast without specifying beyond the verse: God''s servants rejoice, while the addressed opponents suffer.'
  chosen_spanish_reading: 'Conservar el contraste pactual sin precisar más allá del verso: los siervos de Dios se alegran, mientras los destinatarios del reproche sufren.'
  alternative_spanish_readings:
  - Identificar explícitamente a los siervos como el remanente fiel
  - Identificar explícitamente a 'ustedes' como israelitas apóstatas
  rationale: La traducción debe mantener la tensión teológica del texto sin resolverla artificialmente. El contraste es claro, pero el verso por sí solo no exige especificar más allá de lo que el contexto inmediato sostiene.
  doctrine_reference: Preservar la tensión teológica sin resolverla
- issue: Intensidad del lamento final
  english_pob_reading: Or 'you will howl.'
  chosen_spanish_reading: '''Lamentarán'' como verbo principal, con fuerte sentido de duelo y aflicción.'
  alternative_spanish_readings:
  - '''Aullarán'''
  - '''Gemirán'''
  - '''Se lamentarán'''
  rationale: El español 'lamentarán' conserva el registro bíblico y evita una imagen zoológica demasiado marcada; aun así, mantiene la severidad del juicio poético.
  doctrine_reference: Equivalencia léxica con registro reverente
translation_notes:
  revision_awareness: 'Se corrigió la validación anterior asegurando que cada marcador de nota aparezca exactamente en el texto español: [a], [b], [c] y [d] están anclados en palabras o frases correspondientes.'
  spanish_consistency_notes:
  - Se usó 'Yahvé' solo cuando el texto lo requiera; este versículo no lo contiene.
  - 'Se mantuvo el paralelismo hebreo con dos miembros internos: alegría/dolor del corazón y espíritu quebrantado.'
  - Se evitó 'SEÑOR' como máscara y también una traducción excesivamente interpretativa.
  - '''Siervos'' sigue el criterio contextual del audit trail inglés para עֲבָדַי en Isaías.'
