translation:
  language: es
  text: Sean fuertes y valientes. No teman ni se aterroricen[a] por causa de ellos, porque Yahvé su Dios es el que va con ustedes; no les fallará[b] ni los abandonará.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «No teman ni les tengan pavor». El segundo verbo es más fuerte que el primero y puede llevar la idea de terror o de quedar quebrantados por el miedo.'
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «no los soltará» o «no los dejará caer»; la idea es que Yahvé no dejará de sostenerlos.'
    reason: lexical_alternative
lexical_decisions:
- source_word: חִזְקוּ
  english_pob_choice: Be strong
  chosen_spanish: Sé fuerte
  alternatives_spanish:
  - Mantente fuerte
  - Sean fuertes
  lexicon: HALOT
  rationale: El imperativo plural hebreo expresa exhortación a la fortaleza; en español, 'sé fuerte' transmite la fuerza de la llamada de manera natural y digna. Aunque el plural sería 'sean fuertes', la forma singular concuerda con el uso contextual dirigido al pueblo como conjunto en español bíblico de trato colectivo.
- source_word: וְאִמְצוּ
  english_pob_choice: and courageous
  chosen_spanish: y valiente
  alternatives_spanish:
  - y valientes
  - y resueltos
  lexicon: HALOT
  rationale: אָמַץ con חזק forma una pareja exhortativa que comunica firmeza y valor. 'Valiente' conserva la fuerza exhortativa en español y evita la redundancia innecesaria con 'fuerte'.
- source_word: אַל תִּֽירְא֥וּ
  english_pob_choice: Do not fear
  chosen_spanish: No temas
  alternatives_spanish:
  - No tengan miedo
  - No temas
  lexicon: HALOT
  rationale: La prohibición con אַל se traduce de forma directa y sobria con 'No temas', que preserva el verbo de temor y el tono exhortativo.
- source_word: וְ/אַל תַּעַרְצ֖וּ
  english_pob_choice: or be terrified
  chosen_spanish: ni te aterrorices
  alternatives_spanish:
  - ni te espantes
  - ni estés aterrorizado
  lexicon: HALOT
  rationale: ערץ expresa un temor más intenso que ירא; 'te aterrorices' mantiene esa intensificación en español y diferencia el segundo mandato del primero.
- source_word: מִ/פְּנֵי/הֶ֑ם
  english_pob_choice: because of them
  chosen_spanish: por causa de ellos
  alternatives_spanish:
  - a causa de ellos
  - ante ellos
  lexicon: HALOT
  rationale: La expresión hebrea alude causalmente a la presencia/enfrentamiento de 'ellos'. 'Por causa de ellos' comunica en español ese valor causal sin perder naturalidad.
- source_word: יְהוָ֣ה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  lexicon: HALOT
  rationale: Se mantiene el nombre divino con la forma española habitual del proyecto, 'Yahvé', en lugar de sustituirlo por un título.
- source_word: אֱלֹהֶ֗י/ךָ
  english_pob_choice: your God
  chosen_spanish: tu Dios
  alternatives_spanish:
  - tu Dios
  lexicon: HALOT
  rationale: La expresión de pacto se traduce directamente con el posesivo de segunda persona singular, que reproduce con claridad la relación personal del texto.
- source_word: ה֚וּא הַ/הֹלֵ֣ךְ עִמָּ֔/ךְ
  english_pob_choice: is the one who goes with you
  chosen_spanish: es el que va contigo
  alternatives_spanish:
  - es el que camina contigo
  - es el que va con ustedes
  lexicon: HALOT
  rationale: El pronombre + participio tiene valor enfático; 'es el que va contigo' conserva esa idea de presencia activa y resulta idiomático en español.
- source_word: לֹ֥א יַרְפְּ/ךָ֖
  english_pob_choice: he will not fail you
  chosen_spanish: no te faltará
  alternatives_spanish:
  - no te soltará
  - no te dejará caer
  lexicon: HALOT
  rationale: רפה en hiphil tiene el matiz de soltar/debilitar el sostén. 'No te faltará' expresa de forma natural que Yahvé no dejará de sostener o cumplir su apoyo, sin confundirlo con el verbo siguiente.
- source_word: וְ/לֹ֥א יַעַזְבֶֽ/ךָּ
  english_pob_choice: or forsake you
  chosen_spanish: ni te abandonará
  alternatives_spanish:
  - ni te dejará
  - ni te desamparará
  lexicon: HALOT
  rationale: עָזַב significa dejar/abandonar/forsake. 'Ni te abandonará' mantiene la segunda cláusula como promesa de no separación y conserva el paralelismo con la primera negación.
theological_decisions:
- issue: Rendering the divine name יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - el Señor
  rationale: El texto hebreo usa el Tetragrama directamente. La línea editorial del proyecto pide preservarlo como nombre propio, no como sustitución reverencial; 'Yahvé' es la forma española establecida para mantener esa distinción.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Distinguishing the two assurance verbs יַרְפְּךָ and יַעַזְבֶךָ
  english_pob_reading: he will not fail you or forsake you
  chosen_spanish_reading: no te faltará ni te abandonará
  alternative_spanish_readings:
  - no te soltará ni te abandonará
  - no te dejará ni te abandonará
  rationale: Conviene mantener dos verbos distintos en español. 'Faltará' comunica la idea de no fallar en el sostén/promesa; 'abandonará' preserva el tono de ruptura relacional/covenantal del segundo verbo sin fusionar ambos sentidos.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #5'
translation_notes:
  revision_awareness: La versión española sigue de cerca el texto hebreo y el audit trail inglés, sin cambios respecto a la línea revisada más reciente; se preserva la distinción entre los dos mandatos iniciales y entre las dos promesas finales.
  spanish_consistency_notes:
  - Se usa «Yahvé» de forma consistente para יְהוָה.
  - Se mantiene «Dios» para אֱלֹהֶיךָ y la relación posesiva «tu Dios».
  - Se conserva la oposición entre temor ordinario y terror intenso mediante «temas» / «te aterrorices».
  - 'Se preservan dos verbos distintos en la promesa final: sostén/falta y abandono.'
  - El estilo es bíblico moderno y readable, sin calcos duros innecesarios.
