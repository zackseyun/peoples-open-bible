translation:
  language: es
  text: Y a todos los hombres valientes[a], siete mil, y a los artesanos y herreros[b], mil; todos ellos, hombres fuertes[c] aptos para la guerra, el rey de Babilonia los llevó al exilio a Babilonia.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «hombres de valor».
    reason: lexical_alternative
  - marker: b
    text: O «los artesanos y los trabajadores del metal».
    reason: lexical_alternative
  - marker: c
    text: Literalmente, «hacedores de guerra», es decir, hombres capaces de servicio militar.
    reason: lexical_alternative
lexical_decisions:
- source_word: אַנְשֵׁי הַחַיִל
  english_pob_choice: men of valor
  chosen_spanish: hombres valientes
  alternatives_spanish:
  - hombres de valor
  - hombres esforzados
  - hombres guerreros
  lexicon: HALOT
  rationale: La expresión hebrea designa hombres fuertes y aptos para servicio militar. «Hombres valientes» conserva el matiz de fortaleza/capacidad bélica con español natural y público.
- source_word: שִׁבְעַת אֲלָפִים
  english_pob_choice: seven thousand
  chosen_spanish: siete mil
  alternatives_spanish:
  - 7,000
  lexicon: HALOT
  rationale: Equivale directamente al cardinal hebreo y se mantiene en forma escrita por estilo bíblico continuo.
- source_word: הֶחָרָשׁ
  english_pob_choice: the craftsmen
  chosen_spanish: los artesanos
  alternatives_spanish:
  - los oficiosos
  - los obreros especializados
  lexicon: HALOT
  rationale: El término puede abarcar trabajadores hábiles en distintos materiales. «Artesanos» conserva amplitud semántica sin especificar indebidamente un oficio.
- source_word: הַמַּסְגֵּר
  english_pob_choice: the smiths
  chosen_spanish: los herreros
  alternatives_spanish:
  - los metalurgos
  - los metalistas
  lexicon: HALOT
  rationale: En este contexto la referencia más probable es a trabajadores del metal. «Herreros» es la opción breve y clara en español, compatible con el sentido amplio de smiths.
- source_word: אֶלֶף
  english_pob_choice: one thousand
  chosen_spanish: mil
  alternatives_spanish:
  - 1,000
  lexicon: HALOT
  rationale: Sigue el valor numérico exacto del texto. En español bíblico, «mil» es natural y suficiente.
- source_word: הַכֹּל
  english_pob_choice: all of them
  chosen_spanish: a todos
  alternatives_spanish:
  - todos ellos
  - el total
  lexicon: HALOT
  rationale: El resumidor hebreo incluye la totalidad del grupo deportado. «A todos» expresa esa suma de manera fluida en la construcción española.
- source_word: גִּבּוֹרִים
  english_pob_choice: mighty men
  chosen_spanish: valientes
  alternatives_spanish:
  - guerreros
  - hombres poderosos
  lexicon: HALOT
  rationale: El sustantivo subraya fortaleza y prestigio militar. «Valientes» mantiene el valor heroico sin sobrecargar el verso con repeticiones innecesarias.
- source_word: עֹשֵׂי מִלְחָמָה
  english_pob_choice: fit for war
  chosen_spanish: capaces de hacer guerra
  alternatives_spanish:
  - aptos para la guerra
  - hechos para la guerra
  - entrenados para la guerra
  lexicon: HALOT
  rationale: La frase hebrea es literalmente «hacedores de guerra», pero en español una traducción demasiado literal sonaría extraña. «Capaces de hacer guerra» conserva la fuerza funcional y no borra la idea de aptitud militar.
- source_word: וַיְבִיאֵם
  english_pob_choice: brought
  chosen_spanish: los llevó cautivos
  alternatives_spanish:
  - los llevó
  - los condujo
  lexicon: HALOT
  rationale: En contexto de deportación, el verbo de «llevar» debe explicitar el resultado. «Los llevó cautivos» expresa la acción de traslado forzado sin perder el matiz narrativo.
- source_word: גּוֹלָה
  english_pob_choice: into exile
  chosen_spanish: cautivos
  alternatives_spanish:
  - al exilio
  - como exiliados
  lexicon: HALOT
  rationale: El sustantivo denota el estado de deportación. En español, «cautivos» integra naturalmente la idea de ser llevados en condición de exilio, aunque el texto final también explicita el destino con «a Babilonia».
- source_word: בָּבֶלָה
  english_pob_choice: to Babylon
  chosen_spanish: a Babilonia
  alternatives_spanish:
  - hacia Babilonia
  lexicon: HALOT
  rationale: La forma direccional hebrea indica movimiento hacia Babilonia. «A Babilonia» reproduce ese movimiento con normalidad idiomática.
translation_notes:
  revision_awareness: El texto español sigue de cerca el consenso del audio/English POB sin introducir cambios interpretativos adicionales. Mantiene la enumeración numérica, el sentido militar de אַנְשֵׁי הַחַיִל y גִּבּוֹרִים, y la deportación forzada implícita en וַיְבִיאֵם / גּוֹלָה. No hubo revisiones pendientes en el paquete de referencia.
  spanish_consistency_notes:
  - Se preservó «Babilonia» como topónimo invariable y no se añadió artículo innecesario.
  - Se evitó «SEÑOR» o terminología teológica no pertinente, dado que el versículo no contiene el Tetragrámaton ni una afirmación doctrinal explícita.
  - Se prefirió «herreros» sobre una transliteración o tecnicismo, para mantener inteligibilidad e integridad léxica.
  - La repetición de «valientes» refleja la duplicación enfática del hebreo entre אַנְשֵׁי הַחַיִל y גִּבּוֹרִים.
