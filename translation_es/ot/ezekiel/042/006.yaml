translation:
  language: es
  text: Porque estaban en tres pisos[a], y no tenían pilares como los pilares de los atrios; por tanto, los pisos superiores quedaban más retraídos que los inferiores y los intermedios con respecto al suelo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «estaban retraídos» o «retrocedían»; el verbo hebreo es raro aquí, y el matiz arquitectónico exacto es incierto.
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  lexicon: HALOT
  rationale: Introduce la explicación de la disposición arquitectónica. «Porque» conserva el valor causal/explanatorio de la oración sin sonar artificial en español.
- source_word: מְשֻׁלָּשׁוֹת
  english_pob_choice: in three stories
  chosen_spanish: en tres pisos
  alternatives_spanish:
  - de tres niveles
  - triplas
  - en tres plantas
  lexicon: HALOT
  rationale: En este contexto arquitectónico, el hebreo describe una estructura de tres estratos. «Pisos» comunica bien la idea de niveles superpuestos en español actual.
- source_word: וְאֵין לָהֶן עַמּוּדִים
  english_pob_choice: and they had no pillars
  chosen_spanish: y no tenían pilares
  alternatives_spanish:
  - y no había pilares para ellas
  - y carecían de columnas
  lexicon: HALOT
  rationale: La construcción expresa ausencia; en español, la forma posesiva con «tenían» es natural y mantiene el sentido arquitectónico de falta de soportes.
- source_word: כְּעַמּוּדֵי הַחֲצֵרוֹת
  english_pob_choice: like the pillars of the courts
  chosen_spanish: como los pilares de los atrios
  alternatives_spanish:
  - como las columnas de los patios
  - igual que los pilares de los recintos
  lexicon: HALOT
  rationale: «Atrios» es el término más apropiado en un contexto del templo. «Pilares» mantiene la correspondencia estructural con עַמּוּדִים.
- source_word: נֶאֱצַל
  english_pob_choice: were set back / receded
  chosen_spanish: se replegaban
  alternatives_spanish:
  - retrocedían
  - se retiraban
  - quedaban más retraídos
  lexicon: HALOT
  rationale: El verbo hebreo es raro y su matiz arquitectónico exacto es incierto. «Se replegaban» conserva la idea de un desplazamiento hacia adentro, evitando una interpretación demasiado específica.
- source_word: מֵהַתַּחְתּוֹנוֹת וּמֵהַתִּיכֹנוֹת
  english_pob_choice: more than the lower and middle ones
  chosen_spanish: más que los inferiores y los intermedios
  alternatives_spanish:
  - más que los pisos inferiores y medianos
  - más que los bajos y los medios
  lexicon: HALOT
  rationale: La comparación del hebreo indica que los niveles superiores estaban más retraídos respecto de los inferiores y medios. «Intermedios» reproduce el paralelo con «middle» sin perder claridad.
- source_word: מֵהָאָרֶץ
  english_pob_choice: from the ground
  chosen_spanish: desde el suelo
  alternatives_spanish:
  - desde la tierra
  - a nivel del suelo
  lexicon: HALOT
  rationale: En una descripción edilicia, «suelo» expresa mejor el punto de referencia físico que «tierra», sin añadir interpretación.
theological_decisions:
- issue: Tratamiento del término arquitectónico del templo sin suavizar la rareza del hebreo
  english_pob_reading: The upper stories receded more than the lower and middle ones from the ground.
  chosen_spanish_reading: los pisos superiores se replegaban más que los inferiores y los intermedios desde el suelo.
  alternative_spanish_readings:
  - los pisos superiores retrocedían más que los inferiores y los intermedios desde el suelo
  - los pisos superiores quedaban más retraídos que los inferiores y los intermedios desde el suelo
  rationale: 'No hay cuestión doctrinal directa, pero sí una tensión lexical: el verbo es raro y el audit trail inglés también señala incertidumbre. Se preserva esa cautela con un verbo espacial flexible que no fija indebidamente el detalle arquitectónico.'
  doctrine_reference: N/A
translation_notes:
  revision_awareness: Se tomó en cuenta la revisión más reciente del inglés POB, que sustituyó una formulación más interpretativa por «receded» para ajustarse mejor al plural femenino y evitar expansión explicativa. La versión española sigue esa línea, manteniendo el sujeto plural y una traducción espacial cauta del verbo raro.
  spanish_consistency_notes:
  - Se conserva «Yahvé» como terminología estándar del proyecto cuando corresponda; este versículo no contiene el nombre divino.
  - «Atrios» se usa por consistencia con el vocabulario arquitectónico del templo en español bíblico contemporáneo.
  - Se evitó «SEÑOR» y también se evitó forzar una equivalencia técnica demasiado cerrada para נֶאֱצַל.
