revisions:
- from: 'Cuando David supo que Saúl estaba secretamente tramando daño contra él[a], dijo a Abiatar el sacerdote[b]: «Trae aquí el efod».'
  to: 'Cuando David supo que Saúl estaba tramando en secreto daño contra él[a], dijo a Abiatar el sacerdote[b]: «Trae aquí el efod».'
  rationale: Se propone una reparación menor de estilo para lograr un español más natural sin alterar el sentido fuente ni las decisiones léxicas auditadas. «Tramando en secreto» expresa mejor el valor del participio hebreo con matiz de conspiración secreta, y la nota sobre el efod se ajusta a una redacción más idiomática.
