    rationale: El hebreo usa una partícula existencial elíptica. Aunque la POB inglesa la explicitó como «will this be», en español «estará en el corazón» suena rígido y menos claro. «Seguirá habiendo esto en el corazón...» expresa mejor la persistencia denunciada sin alejarse del sentido.
  - severity: low
    issue: La nota [b] presenta como alternativa «los que profetizan falsedad», que no mejora ni contrasta claramente con el texto principal
    rationale: Como el texto principal ya conserva la fuerza verbal, la nota útil en español es la alternativa compacta «falsos profetas», paralela a la nota inglesa.
  revised_spanish_text: ¿Hasta cuándo seguirá habiendo esto[a] en el corazón de los profetas que profetizan falsedad[b], y que profetizan el engaño de su propio corazón?
  revised_footnotes:
