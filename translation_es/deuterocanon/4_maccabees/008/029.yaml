translation:
  language: es
  text: 'Así que, cuando el tirano dejó de instarlos a comer comida que los profanara[a], todos juntos, con una sola voz, como si hablaran desde una misma alma[b], dijeron:'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O bien: «comer alimento impuro» o «comer alimento contaminado». El griego alude a comida cuya ingestión produciría profanación religiosa.'
    reason: lexical_alternative
  - marker: b
    text: 'Literalmente: «como si desde la misma alma», una imagen de unidad absoluta de resolución.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ὥστε
  english_pob_choice: So
  chosen_spanish: Así que
  alternatives_spanish:
  - por tanto
  - así pues
  - de modo que
  lexicon: LSJ
  rationale: La partícula introduce el resultado narrativo de lo anterior. «Así que» conserva la fuerza inferencial en un español natural y sobrio.
- source_word: ἅμα τῷ παύσασθαι
  english_pob_choice: when ... stopped
  chosen_spanish: cuando ... dejó de
  alternatives_spanish:
  - tan pronto como ... cesó
  - al mismo tiempo que ... dejó de
  lexicon: LSJ
  rationale: La construcción temporal con infinitivo se vierte de manera idiomática en español con «cuando ... dejó de», sin perder la simultaneidad del cese.
- source_word: τὸν τύραννον
  english_pob_choice: the tyrant
  chosen_spanish: el tirano
  alternatives_spanish:
  - el rey
  - el gobernante
  lexicon: LSJ
  rationale: τύραννος tiene carga peyorativa en el contexto; «tirano» preserva esa valoración retórica mejor que un título neutral.
- source_word: συμβουλεύοντα αὐτοῖς
  english_pob_choice: urging them
  chosen_spanish: instarlos
  alternatives_spanish:
  - aconsejarlos
  - exhortarlos
  - animarlos
  lexicon: LSJ
  rationale: En este contexto coercitivo, «instarlos» refleja mejor la presión del verbo que un simple «aconsejarlos». La versión inglesa revisada hacia «urging» respalda este matiz.
- source_word: μιεροφαγῆσαι
  english_pob_choice: to eat defiling food
  chosen_spanish: comer alimento profanador
  alternatives_spanish:
  - comer alimento impuro
  - comer alimento contaminado
  - comer alimento que los profanara
  lexicon: LSJ
  rationale: El compuesto raro apunta a comer algo que produce profanación ritual. «Alimento profanador» mantiene el efecto cultual sin imponer un término técnico posterior más explícito de lo que exige el griego.
- source_word: πάντες
  english_pob_choice: they all
  chosen_spanish: todos juntos
  alternatives_spanish:
  - todos ellos
  - todos
  lexicon: LSJ
  rationale: Expresa el sujeto colectivo y prepara la imagen de respuesta unánime.
- source_word: διὰ μιᾶς φωνῆς
  english_pob_choice: with one voice
  chosen_spanish: con una sola voz
  alternatives_spanish:
  - a una voz
  - en una sola voz
  lexicon: LSJ
  rationale: Es la equivalencia natural en español para la unidad de declaración.
- source_word: ὁμοῦ
  english_pob_choice: together
  chosen_spanish: juntos
  alternatives_spanish:
  - al mismo tiempo
  - unánimemente
  lexicon: LSJ
  rationale: Refuerza la acción conjunta sin duplicar innecesariamente la imagen de la voz única.
- source_word: ὥσπερ ἀπὸ τῆς αὐτῆς ψυχῆς
  english_pob_choice: as if from the same soul
  chosen_spanish: como si procedieran de una misma alma
  alternatives_spanish:
  - como de una misma alma
  - como si salieran de la misma alma
  - como si fueran de una sola alma
  lexicon: LSJ
  rationale: «Procedieran de una misma alma» conserva la metáfora de origen interior y sugiere unidad de resolución, mientras mantiene «alma» como equivalente de ψυχή en este pasaje.
- source_word: εἶπον
  english_pob_choice: said
  chosen_spanish: dijeron
  alternatives_spanish:
  - hablaron
  - respondieron
  lexicon: LSJ
  rationale: Verbo narrativo simple para introducir el discurso directo que sigue.
theological_decisions:
- issue: Fuerza cultual de μιεροφαγῆσαι
  english_pob_reading: to eat defiling food
  chosen_spanish_reading: comer alimento profanador
  alternative_spanish_readings:
  - comer alimento impuro
  - comer alimento contaminado
  - comer alimento profanado
  rationale: La idea no es solo higiene o dieta, sino contaminación religiosa. «Profanador» conserva el peso cultual del término sin cerrar la interpretación a una etiqueta técnica que el griego no explicita.
  doctrine_reference: Principio de primacía del texto original y preservación de la tensión léxico-teológica
- issue: Imagen antropológica de ψυχή
  english_pob_reading: as if from the same soul
  chosen_spanish_reading: como si procedieran de una misma alma
  alternative_spanish_readings:
  - como si vinieran de un mismo alma
  - como si salieran de una sola alma
  - como si fueran de la misma alma
  rationale: Se conserva la referencia a «alma» para mantener la fuerza retórica y antropológica de la frase. Traducirlo como «mente» reduciría la imagen a lo puramente cognitivo.
  doctrine_reference: Principio de conservar la tensión antropológica sin resolverla prematuramente
translation_notes:
  revision_awareness: 'La redacción sigue de cerca el griego y la auditoría inglesa: adopta «instarlos» siguiendo la revisión de συμβουλεύοντα, mantiene la nota cultual de μιεροφαγῆσαι y preserva la imagen de ψυχή como «alma» para no aplanar el antropologismo del texto.'
  spanish_consistency_notes:
  - Se usa «tirano» para τύραννος conforme al valor peyorativo del pasaje.
  - Se mantiene «alma» para ψυχή en vez de «mente» para respetar la imaginería del original.
  - La puntuación deja dos puntos al final porque el verbo «dijeron» introduce el discurso que continúa en el siguiente versículo.
  - El estilo es neutral latinoamericano, claro y digno, sin calco excesivo del inglés.
