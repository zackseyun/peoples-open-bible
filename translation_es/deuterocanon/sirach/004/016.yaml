translation:
  language: es
  text: Porque iré con él disfrazada[a], y al principio lo probaré con pruebas.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'El griego conserva una lectura distinta: «Si confías, la heredarás, y tus descendientes la poseerán».'
    reason: alternative_reading
lexical_decisions:
- source_word: ἐὰν ἐμπιστεύσῃς
  english_pob_choice: if he trusts
  chosen_spanish: si confías
  alternatives_spanish:
  - si deposita su confianza
  - si se confía
  lexicon: BDAG
  rationale: El verbo pide una condición de confianza. En español, «confiar en» expresa de forma natural esa idea de confiarse/fiarse de alguien o algo, sin añadir un objeto que el griego no explicita en la forma verbal.
- source_word: κατακληρονομήσεις
  english_pob_choice: he will inherit
  chosen_spanish: la heredarás
  alternatives_spanish:
  - la recibirás en herencia
  - la poseerás como herencia
  lexicon: BDAG
  rationale: La idea central es heredar, no simplemente obtener. «Heredar» conserva el matiz patrimonial y familiar/covenantal del verbo griego.
- source_word: αὐτήν
  english_pob_choice: her
  chosen_spanish: la
  alternatives_spanish:
  - a ella
  - esa
  lexicon: BDAG
  rationale: El pronombre femenino se mantiene en español para reflejar la personificación de la Sabiduría; «la» funciona de manera natural como objeto directo y preserva el referente femenino.
- source_word: ἐν κατασχέσει ἔσονται
  english_pob_choice: will possess
  chosen_spanish: poseerán
  alternatives_spanish:
  - tendrán en posesión
  - la retendrán
  lexicon: BDAG
  rationale: La expresión apunta a posesión/tenencia estable. «Poseerán» es breve y fiel al valor posesivo del giro griego, manteniendo el paralelo con la herencia.
- source_word: αἱ γενεαὶ αὐτοῦ
  english_pob_choice: his descendants
  chosen_spanish: sus descendientes
  alternatives_spanish:
  - sus generaciones
  - su descendencia
  lexicon: BDAG
  rationale: «Descendientes» comunica con claridad el sentido generacional del plural griego en español actual, sin el calco menos natural «sus generaciones».
theological_decisions:
- issue: Lectura base ante divergencia textual hebreo-griego
  english_pob_reading: Use the Greek parallel as the main basis for translation, while preserving the Hebrew as an alternative witness in a footnote.
  chosen_spanish_reading: Tomar el griego como base principal del texto, y señalar en nota la tradición hebrea divergente.
  alternative_spanish_readings:
  - 'Traducir directamente el hebreo: «Pues en extrañamiento iré con él, y al principio lo probaré con pruebas».'
  rationale: La evidencia proporcionada marca una discrepancia importante entre el hebreo y el griego. Para esta sección se sigue el griego como lectura principal, porque ofrece una frase coherente sobre heredar a la Sabiduría y la descendencia, mientras que la tradición hebrea parece corresponder a otro giro temático. La nota preserva honestamente esa tensión textual.
  doctrine_reference: 'PHILOSOPHY.md: en deuterocanónicos se usa el griego de Swete como fuente paralela cuando el hebreo es divergente o incierto; la incertidumbre textual debe preservarse.'
translation_notes:
  revision_awareness: Se corrigió el problema de validación anterior anclando la nota textual con el marcador [a] dentro de la traducción. La presente redacción sigue la lectura griega provista como base principal, en línea con el expediente de auditoría y la nota de divergencia textual.
  spanish_consistency_notes:
  - «Sabiduría» se entiende como el referente femenino implícito del pronombre αὐτήν; por eso se conserva el femenino en español.
  - Se prefirió «heredar»/«poseerán» para mantener el campo semántico de herencia y posesión, sin suavizarlo a un sentido meramente general de obtener.
  - La partícula condicional ἐὰν se refleja con «si», manteniendo la estructura sintáctica breve y directa del griego.
