id: REV.18.3
reference: Revelation 18:3
source:
  edition: SBLGNT
  text: ὅτι ἐκ τοῦ οἴνου τοῦ θυμοῦ τῆς πορνείας αὐτῆς ⸀πέπτωκαν πάντα τὰ ἔθνη, καὶ οἱ βασιλεῖς τῆς γῆς μετ’ αὐτῆς ἐπόρνευσαν, καὶ οἱ ἔμποροι τῆς γῆς ἐκ τῆς δυνάμεως τοῦ στρήνους αὐτῆς ἐπλούτησαν.
translation:
  text: For all the nations have drunk from the wine of the wrath of her sexual immorality[a], and the kings of the earth committed sexual immorality with her[c][b], and the merchants of the earth grew rich from the power of her luxury.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'from the wine of the passion of her sexual immorality.' The Greek genitives can be understood in more than one way, and θυμός may mean 'wrath' or 'passion' depending on how the metaphor is taken.
    reason: lexical_alternative
  - marker: b
    text: The language of 'sexual immorality' here likely functions metaphorically for corrupt, idolatrous, and exploitative alliance, but the translation keeps the sexual imagery of the Greek.
    reason: alternative_reading
  - marker: c
    text: Or 'self-indulgent luxury' for 'luxury.' The Greek term denotes decadent excess, not merely material comfort.
    reason: lexical_alternative
lexical_decisions:
- source_word: ὅτι
  chosen: For
  alternatives:
  - because
  lexicon: BDAG
  rationale: Introduces the reason for the preceding announcement of Babylon's fall. 'For' reads naturally in English while preserving the causal force.
- source_word: ἐκ τοῦ οἴνου
  chosen: from the wine
  alternatives:
  - of the wine
  - from the cup of wine
  lexicon: BDAG
  rationale: The preposition ἐκ marks source; 'from the wine' preserves the metaphor of intoxication proceeding from Babylon's influence.
- source_word: θυμοῦ
  chosen: wrath
  alternatives:
  - passion
  - fury
  lexicon: BDAG
  rationale: θυμός can denote strong passion or wrath. In Revelation's judgment-laden imagery, 'wrath' best preserves the severe, destructive force associated with the metaphor, while still allowing the phrase to function as a genitival chain.
- source_word: πορνείας
  chosen: sexual immorality
  alternatives:
  - fornication
  - prostitution
  lexicon: BDAG
  rationale: πορνεία in Revelation often carries both literal and metaphorical force, especially covenantal and idolatrous unfaithfulness. 'Sexual immorality' is the clearest modern English rendering and preserves the sexual metaphor without narrowing it to commercial prostitution alone.
- source_word: πέπτωκαν
  chosen: have drunk
  alternatives:
  - have fallen
  lexicon: BDAG
  rationale: Despite the morphology table's apparent mismatch, the context and standard text support the sense 'have drunk' (from πίνω), matching the established metaphor with wine. 'Have fallen' would disrupt the syntax and imagery. The perfect is rendered 'have drunk' to preserve completed action with present consequence.
- source_word: πάντα τὰ ἔθνη
  chosen: all the nations
  alternatives:
  - all the Gentiles
  - every nation
  lexicon: BDAG
  rationale: ἔθνη here refers to the nations collectively under Babylon's influence, not specifically Gentiles in contrast to Jews. 'All the nations' is the most natural and contextually accurate rendering.
- source_word: μετ’ αὐτῆς ἐπόρνευσαν
  chosen: committed sexual immorality with her
  alternatives:
  - committed fornication with her
  - were sexually immoral with her
  lexicon: BDAG
  rationale: The verb πορνεύω is rendered with the cognate phrase 'committed sexual immorality' for lexical transparency with πορνεία earlier in the verse. This also preserves Revelation's recurring metaphor of illicit alliance and idolatrous infidelity.
- source_word: ἔμποροι
  chosen: merchants
  alternatives:
  - traders
  lexicon: BDAG
  rationale: '''Merchants'' best fits the economic and luxury-trade context of Revelation 18.'
- source_word: ἐκ τῆς δυνάμεως
  chosen: from the power of
  alternatives:
  - from the wealth of
  - from the might of
  - by the power of
  lexicon: BDAG
  rationale: δύναμις normally denotes power, might, or capability. Retaining 'power' preserves the Greek term rather than interpreting it away as mere wealth; the sense is that her luxurious excess had potent, enriching force.
- source_word: στρήνους
  chosen: luxury
  alternatives:
  - sensuality
  - wantonness
  - self-indulgence
  lexicon: BDAG
  rationale: στρῆνος denotes arrogant luxury or self-indulgent excess. 'Luxury' is concise and fits the commercial setting, while the broader nuance of decadent excess can be preserved in a footnote.
- source_word: ἐπλούτησαν
  chosen: grew rich
  alternatives:
  - became wealthy
  - were enriched
  lexicon: BDAG
  rationale: '''Grew rich'' is idiomatic modern English and clearly expresses the aorist result of commercial enrichment.'
