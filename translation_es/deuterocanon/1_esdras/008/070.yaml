translation:
  language: es
  text: 'Y levantándose del ayuno, con sus vestidos y la santa vestidura[a] rasgados, dobló sus rodillas y extendió sus manos al Señor, diciendo[b]:'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «la vestidura sagrada». El griego no dice explícitamente «sacerdotal», aunque el contexto pueda sugerir una indumentaria sagrada.
    reason: lexical_alternative
  - marker: b
    text: El griego tiene una forma plural, literalmente «decían» o, según la explicación textual, posiblemente «decía». El contexto indica con fuerza que Esdras está introduciendo su oración, por eso aquí se vierte simplemente como «diciendo».
    reason: textual_variant
lexical_decisions:
- source_word: ἐξεγερθείς
  english_pob_choice: rising
  chosen_spanish: levantándose
  alternatives_spanish:
  - alzándose
  - poniéndose de pie
  lexicon: BDAG
  rationale: El participio aoristo introduce el paso de la práctica del ayuno a la oración. «Levantándose» es natural en español y conserva el valor de transición sin añadir interpretación.
- source_word: ἐκ τῆς νηστείας
  english_pob_choice: from the fasting
  chosen_spanish: del ayuno
  alternatives_spanish:
  - de la práctica del ayuno
  - de haber ayunado
  lexicon: BDAG
  rationale: La forma nominal señala el estado o periodo de ayuno. «Del ayuno» mantiene la concreción del sustantivo y suena más idiomático en español que una paráfrasis más explicativa.
- source_word: διερρηγμένα ἔχων
  english_pob_choice: with ... torn
  chosen_spanish: con ... rasgados
  alternatives_spanish:
  - con ... rotos
  - teniendo ... rasgados
  lexicon: BDAG
  rationale: La construcción perifrástica describe la condición visible de las prendas. «Con ... rasgados» conserva el estado resultante y permite una frase fluida en español.
- source_word: τὰ ἱμάτια
  english_pob_choice: garments
  chosen_spanish: sus vestidos
  alternatives_spanish:
  - sus ropas
  - sus prendas
  lexicon: BDAG
  rationale: ἱμάτια alude a prendas o vestidos en general. «Vestidos» es digno y suficientemente amplio; «sus» refleja la referencia posesiva implícita por el contexto.
- source_word: τὴν ἱερὰν ἐσθῆτα
  english_pob_choice: the holy robe
  chosen_spanish: la santa vestidura
  alternatives_spanish:
  - la vestidura sagrada
  - la santa ropa
  lexicon: BDAG
  rationale: Se conserva el calificativo explícito ἱερά como «santa». «Vestidura» refleja bien ἐσθῆτα y evita introducir «sacerdotal», que no aparece en el griego.
- source_word: κάμψας τὰ γόνατα
  english_pob_choice: he bent his knees
  chosen_spanish: dobló sus rodillas
  alternatives_spanish:
  - se arrodilló
  - hincó las rodillas
  lexicon: BDAG
  rationale: La imagen griega es corporal y concreta. «Dobló sus rodillas» sigue de cerca la forma verbal y mantiene la solemnidad del gesto de oración.
- source_word: ἐκτείνας τὰς χεῖρας
  english_pob_choice: stretched out his hands
  chosen_spanish: extendió sus manos
  alternatives_spanish:
  - alzò sus manos
  - alargó sus manos
  lexicon: BDAG
  rationale: Es una postura de súplica bien atestiguada. «Extendió sus manos» es el equivalente más directo y natural en español.
- source_word: πρὸς τὸν κύριον
  english_pob_choice: to the Lord
  chosen_spanish: hacia el Señor
  alternatives_spanish:
  - al Señor
  - ante el Señor
  lexicon: BDAG
  rationale: Con un gesto corporal y una oración, «hacia el Señor» conserva la dirección del movimiento de las manos; «Señor» sigue la convención reverencial para κύριος en este contexto de oración.
- source_word: ἔλεγον
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - y decía
  - y decían
  lexicon: BDAG
  rationale: El griego presenta una forma verbal con tensión de número que el texto inglés suaviza como introducción al discurso. «Diciendo» preserva esa función sin forzar una decisión de número en la línea española.
theological_decisions:
- issue: Cómo renderizar κύριος en una oración dirigida a Dios
  english_pob_reading: Lord
  chosen_spanish_reading: Señor
  alternative_spanish_readings:
  - Dueño
  - Maestro
  rationale: En este contexto κύριος funciona como título reverencial de Dios, no como simple superior humano. «Señor» es la opción española natural y doctrinalmente adecuada.
  doctrine_reference: 'DOCTRINE.md Contested terms: κύριος → Lord'
- issue: Si la vestidura debe explicitarse como sacerdotal
  english_pob_reading: the holy robe
  chosen_spanish_reading: la santa vestidura
  alternative_spanish_readings:
  - la vestidura sacerdotal
  - la prenda sagrada
  rationale: El griego dice que la vestidura es sagrada, pero no añade el término «sacerdotal». La traducción conserva esa precisión y evita ampliar indebidamente el contenido.
  doctrine_reference: DOCTRINE.md Translation philosophy §1, §5
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión auditada que prefirió una formulación más natural para la transición «from the fasting». En español se optó por «del ayuno», manteniendo la fidelidad al sustantivo griego y evitando calcar una expresión poco natural. También se preservó la ambigüedad controlada sobre la vestidura sagrada, sin convertirla en «priestly».
  spanish_consistency_notes:
  - Se mantiene «Señor» para κύριος conforme al estándar del proyecto en contextos de oración.
  - Se usa «santa» y no «sagrada» para ἱερὰν, siguiendo la cercanía léxica con el inglés auditado y el registro bíblico natural en español.
  - La frase final «diciendo» evita resolver el problema de número del griego, del mismo modo que el audit trail inglés lo suaviza.
