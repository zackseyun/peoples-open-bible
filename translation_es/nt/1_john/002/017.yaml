review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien el sentido del griego y del POB inglés: mantiene el contraste entre la transitoriedad del mundo y la permanencia del que hace la voluntad de Dios. «El mundo», «la voluntad de Dios», «permanece para siempre» y la estructura adversativa son fieles. La única desalineación relevante está en la nota [a], donde «pasa de largo» no corresponde bien al sentido contextual de παράγεται como desaparición/transitoriedad.'
  spanish_quality_summary: El texto principal es claro, natural y de registro bíblico contemporáneo. «Va pasando» suena idiomático y preserva el aspecto progresivo; «y también su deseo» es comprensible, aunque algo menos ceñido que «junto con su deseo». No exige cambio. La calidad del español es buena; la corrección necesaria es en la nota para evitar una alternativa engañosa.
  glossary_alignment: No hay conflictos con la terminología del proyecto. θεοῦ se vierte correctamente como «Dios». No aparecen términos sensibles como Yahvé/Mesías/esclavo. La decisión de «permanece» para μένει encaja bien con la práctica joánica documentada.
  issues:
  - severity: medium
    issue: La nota [a] ofrece «pasa de largo» como alternativa para παράγεται.
    rationale: «Pasa de largo» en español suele sugerir ‘seguir de largo’ o ‘no detenerse’, no la idea de desvanecerse o desaparecer. El inglés auditado habla de ‘passes away’ / ‘is passing away’; la nota debe reflejar transitoriedad o desaparición, no mero movimiento.
  - severity: low
    issue: La nota [b] omite la alternativa más directa «deseo».
    rationale: No es un error, porque «deseo» ya está en el texto principal, pero la nota podría sonar como si solo las alternativas más intensas fueran legítimas. Aun así, no requiere adjudicación ni rehacer el texto principal.
  revised_spanish_text: Y el mundo va pasando[a], y también su deseo[b]; pero el que hace la voluntad de Dios permanece para siempre.
  revised_footnotes:
  - marker: a
    text: 'O: «pasa» o «está pasando». El griego παράγεται presenta el proceso de desaparecer o irse acabando; «va pasando» intenta conservar ese sentido de transitoriedad continua.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «su codicia» o «su ansia». ἐπιθυμία puede abarcar deseo intenso y desordenado; aquí alude de manera amplia al deseo del mundo, no necesariamente a un matiz sexual.'
    reason: lexical_alternative
  revision_rationale: Se conserva el texto principal porque es fiel, claro y natural. Se corrige únicamente la nota [a] para eliminar una alternativa española engañosa («pasa de largo») que no representa bien el sentido de παράγεται en este contexto.
