  glossary_alignment: 'No hay conflictos con la terminología teológica del proyecto. Las decisiones geográficas son en general buenas: «Arabá» y «Néguev» están bien. Conviene realinear la nota de Shefelá con «la llanura baja» y ajustar מִדְבָּר a «la región desértica» o similar para reflejar mejor la rationale auditada sin caer en calco áspero.'
