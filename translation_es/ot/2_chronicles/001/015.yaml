translation:
  language: es
  text: El rey hizo que la plata y el oro en Jerusalén fueran tan abundantes como las piedras[a], e hizo que los cedros fueran tan abundantes como los árboles sicómoros que están en las tierras bajas[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: “como piedras”. El hebreo expresa una abundancia extraordinaria mediante comparación.'
    reason: lexical_alternative
  - marker: b
    text: “Las tierras bajas” traduce aquí la Shefela, la región de las colinas bajas de Judá, entre la zona montañosa y la llanura costera.
    reason: cultural_note
lexical_decisions:
- source_word: וַיִּתֵּן / נָתַן
  english_pob_choice: made ... as plentiful as / made
  chosen_spanish: hizo que ... fueran tan abundantes como / hizo que
  alternatives_spanish:
  - dio
  - puso
  - dejó
  lexicon: HALOT
  rationale: En este pasaje, נתן no significa simplemente ‘dar’, sino causar una gran abundancia en una comparación idiomática. En español, ‘hizo que... fueran tan abundantes como’ comunica mejor ese valor causativo/resultativo que un literal ‘dio’.
- source_word: הַמֶּלֶךְ
  english_pob_choice: the king
  chosen_spanish: el rey
  alternatives_spanish:
  - el monarca
  lexicon: HALOT
  rationale: Es el sustantivo definido normal y claro en español; el contexto identifica a Salomón sin necesidad de añadir su nombre en el texto base.
- source_word: הַכֶּסֶף
  english_pob_choice: the silver
  chosen_spanish: la plata
  alternatives_spanish:
  - la plata, el dinero
  lexicon: HALOT
  rationale: ‘כסף’ aquí designa el metal como riqueza o mercancía; en español ‘la plata’ preserva ese valor material y suena natural.
- source_word: הַזָּהָב
  english_pob_choice: the gold
  chosen_spanish: el oro
  alternatives_spanish:
  - oro
  lexicon: HALOT
  rationale: Se mantiene el nombre del metal en forma natural y fiel al hebreo.
- source_word: בִּירוּשָׁלִַם
  english_pob_choice: in Jerusalem
  chosen_spanish: en Jerusalén
  alternatives_spanish:
  - en la ciudad de Jerusalén
  lexicon: HALOT
  rationale: Equivalencia directa y estándar para el topónimo.
- source_word: כָּאֲבָנִים
  english_pob_choice: as plentiful as stones
  chosen_spanish: tan abundantes como las piedras
  alternatives_spanish:
  - como piedras
  - tan numerosas como piedras
  lexicon: HALOT
  rationale: El hebreo expresa comparación de abundancia, no identidad material. En español, ‘tan abundantes como las piedras’ explicita el sentido idiomático sin perder la imagen.
- source_word: הָאֲרָזִים
  english_pob_choice: the cedars
  chosen_spanish: los cedros
  alternatives_spanish:
  - la madera de cedro
  - los cedros del Líbano
  lexicon: HALOT
  rationale: Se conserva la forma nominal del hebreo. ‘Madera de cedro’ interpretaría más de lo que el texto dice.
- source_word: כַּשִּׁקְמִים
  english_pob_choice: as plentiful as the sycamore trees
  chosen_spanish: tan abundantes como los sicómoros
  alternatives_spanish:
  - como los sicómoros
  - tan abundantes como los sicómoros del campo
  lexicon: HALOT
  rationale: ‘שׁקמה’ corresponde al sicómoro de la región. ‘Sicómoros’ es claro en español y conserva la referencia botánica sin reemplazarla por otra especie.
- source_word: אֲשֶׁר בַּשְּׁפֵלָה
  english_pob_choice: that are in the lowland
  chosen_spanish: que están en la llanura
  alternatives_spanish:
  - que están en la Sefela
  - que están en el llano
  lexicon: HALOT
  rationale: ‘שְׁפֵלָה’ designa la región baja/foothills de Judá. ‘La llanura’ ofrece una solución natural en español; la alternativa técnica ‘Sefela’ puede explicarse en nota.
- source_word: לָרֹב
  english_pob_choice: as plentiful as
  chosen_spanish: tan abundantes
  alternatives_spanish:
  - en abundancia
  - muy numerosos
  lexicon: HALOT
  rationale: La idea de ‘abundancia’ ya queda absorbida en la construcción comparativa en español. ‘Tan abundantes’ reproduce con fluidez el efecto del hebreo.
translation_notes:
  revision_awareness: El audit trail inglés no requirió cambios de revisión sustantivos; se mantuvo la lectura idiomática de נתן como causativo/resultativo y la nota cultural sobre la Shephelah, adaptándolas al español con vocabulario natural y sin perder la imagen comparativa del hebreo.
  spanish_consistency_notes:
  - Se mantuvo ‘Yahvé’ fuera del texto porque este versículo no contiene el nombre divino.
  - Se evitó ‘Cristo’/‘Mesías’ porque no hay referencia cristológica en el pasaje.
  - ‘Sicómoros’ se usa en sentido botánico regional, no como el árbol moderno norteamericano.
  - La comparación de abundancia se expresa con ‘tan abundantes como’ para conservar la fuerza idiomática hebrea sin calco rígido.
