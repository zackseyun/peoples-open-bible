translation:
  language: es
  text: 'Por favor, acuérdate de la palabra que mandaste a tu siervo Moisés, diciendo: «Si ustedes actúan infielmente[a], yo los dispersaré entre los pueblos[b]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘si ustedes son infieles’ o ‘si ustedes quebrantan la fidelidad’.
    reason: lexical_alternative
  - marker: b
    text: O ‘entre las naciones’.
    reason: lexical_alternative
lexical_decisions:
- source_word: זְכָר נָא
  english_pob_choice: Please remember
  chosen_spanish: Por favor, recuerda
  alternatives_spanish:
  - Recuerda, por favor
  - Te ruego que recuerdes
  lexicon: HALOT
  rationale: זְכָר es un imperativo de ‘recordar’, y נָא añade ruego/cortesía. ‘Por favor, recuerda’ comunica bien la súplica respetuosa en un español natural y digno.
- source_word: הַדָּבָר
  english_pob_choice: the word
  chosen_spanish: la palabra
  alternatives_spanish:
  - el asunto
  - la promesa
  lexicon: HALOT
  rationale: דָּבָר puede ser ‘palabra’, ‘asunto’ o ‘cosa’. Aquí remite a la declaración/mandato dado por Dios mediante Moisés; ‘la palabra’ conserva el vínculo verbal sin perder claridad en español.
- source_word: צִוִּיתָ
  english_pob_choice: you commanded
  chosen_spanish: mandaste
  alternatives_spanish:
  - ordenaste
  - diste como mandato
  lexicon: HALOT
  rationale: צוה significa normalmente ‘mandar/ordenar’. ‘Mandaste’ es una forma natural en español y conserva la fuerza directiva del hebreo.
- source_word: עַבְדְּךָ
  english_pob_choice: your servant
  chosen_spanish: tu siervo
  alternatives_spanish:
  - tu servidor
  - tu esclavo
  lexicon: HALOT
  rationale: En referencia a Moisés como siervo de Dios, el sentido relacional/covenantal es ‘siervo’ más que esclavo. ‘Tu siervo’ es idiomático y fiel al contexto.
- source_word: לֵאמֹר
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - 'así:'
  - 'con estas palabras:'
  lexicon: HALOT
  rationale: La forma quotativa introduce la cita de manera directa; ‘diciendo’ es la equivalencia más transparente y estándar.
- source_word: תִּמְעָלוּ
  english_pob_choice: act unfaithfully
  chosen_spanish: actúan infielmente
  alternatives_spanish:
  - son infieles
  - quebrantan la fidelidad
  lexicon: HALOT
  rationale: מעל suele expresar infidelidad o ruptura de lealtad en contexto de pacto. ‘Actúan infielmente’ preserva el matiz verbal y la tensión pactual mejor que simplemente ‘pecan’.
- source_word: אָפִיץ
  english_pob_choice: I will scatter
  chosen_spanish: dispersaré
  alternatives_spanish:
  - esparciré
  - desparramaré
  lexicon: HALOT
  rationale: El hifil de פוץ significa dispersar/esparcir. ‘Dispersaré’ mantiene el tono de juicio pactual y funciona bien en español bíblico contemporáneo.
- source_word: בָּעַמִּים
  english_pob_choice: among the peoples
  chosen_spanish: entre los pueblos
  alternatives_spanish:
  - entre las naciones
  - entre los pueblos y las naciones
  lexicon: HALOT
  rationale: עַמִּים significa literalmente ‘pueblos’. ‘Entre los pueblos’ preserva la forma plural hebrea; ‘naciones’ es posible, pero no refleja tan directamente el término original.
theological_decisions:
- issue: Matiz pactual de מעל en la cláusula condicional
  english_pob_reading: If you act unfaithfully
  chosen_spanish_reading: Si ustedes actúan infielmente
  alternative_spanish_readings:
  - Si ustedes son infieles
  - Si ustedes quebrantan la fidelidad
  rationale: La referencia recuerda las sanciones del pacto dadas por medio de Moisés. ‘Actúan infielmente’ conserva la idea de ruptura de lealtad sin diluir el valor verbal del hebreo ni resolver la tensión con una paráfrasis más genérica.
  doctrine_reference: Conservar la tensión léxica y teológica del texto pactual; no suavizar מעל a un mero ‘pecar’.
translation_notes:
  revision_awareness: 'Coincide con el audit trail inglés de alta concordancia: se mantiene el ruego inicial, ‘la palabra’ para דָּבָר, el verbo de mandato, el título relacional ‘tu siervo’, la cita introductoria, la infidelidad pactual de מעל y el juicio de dispersión entre los pueblos. No se introdujeron cambios textuales respecto del sentido documentado.'
  spanish_consistency_notes:
  - Se usa ‘Yahvé’ solo cuando el texto fuente lo requiera explícitamente; aquí no aparece el tetragrámaton en la forma citada, por lo que no se añade.
  - ‘Pueblos’ conserva el plural hebreo עַמִּים mejor que ‘naciones’ en esta línea.
  - La elección de ‘actúan infielmente’ mantiene el paralelismo con el inglés POB y la ambigüedad pactual del hebreo.
