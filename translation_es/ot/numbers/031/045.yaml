lexical_decisions:
- source_word: וַ/חֲמֹרִים
  english_pob_choice: and the donkeys
  chosen_spanish: y los asnos
  alternatives_spanish:
  - y los burros
  - y los acémilas
  lexicon: HALOT
  rationale: חֲמֹרִים designa asnos; en español bíblico y moderno, 'asnos' conserva el referente preciso y también permite mantener la opción tradicional que el inglés POB marcó como alternativa ('asses'). 'Burros' sería más coloquial y menos adecuado para un registro bíblico; 'acémilas' no es equivalente léxico.
- source_word: שְׁלֹשִׁים אֶלֶף
  english_pob_choice: thirty thousand
  chosen_spanish: treinta mil
  alternatives_spanish:
  - treinta millares
  lexicon: HALOT
  rationale: La construcción cardinal hebrea se vierte de forma directa como 'treinta mil'. 'Treinta millares' es posible, pero en español actual suena menos natural y no aporta mayor precisión.
- source_word: וַ/חֲמֵשׁ מֵאֹת
  english_pob_choice: and five hundred
  chosen_spanish: y quinientos
  alternatives_spanish:
  - y cinco cientos
  lexicon: HALOT
  rationale: La adición final se expresa naturalmente en español como 'y quinientos'. Mantiene la suma total sin forzar una calca de la estructura numérica inglesa.
