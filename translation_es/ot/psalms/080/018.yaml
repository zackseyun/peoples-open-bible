- from: Sea tu mano sobre el hombre de tu mano derecha[a], sobre el hijo de hombre[b] que has fortalecido para ti.
  to: Sea tu mano sobre el hombre de tu derecha[a], sobre el hijo del hombre[b] que has fortalecido para ti.
  rationale: Se ajusta el español para reflejar mejor los idiomatismos hebreos y la decisión auditada en inglés sin perder ambigüedad teológica. 'Tu derecha' es más natural y fiel que 'tu mano derecha' en esta construcción, y 'hijo del hombre' es la forma bíblica e inteligible en español para בֶּן אָדָם.
