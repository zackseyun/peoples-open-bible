theological_decisions:
- issue: Subject of יָשִׁית ('he sets up')
  chosen_reading: An implicit singular subject, best understood as God, is retained as 'he' rather than being made explicit as 'the LORD.'
  alternative_readings:
  - An indefinite subject ('one sets up')
  - A more interpretive rendering making the city itself the subject
  rationale: The Hebrew verb is singular with no explicit subject. In context, God is the likely implied actor who establishes salvation as the city's defense, but the text does not name him here. To avoid importing more than the source states, the translation preserves the implicit subject with 'he.'
  doctrine_reference: 'Translation philosophy: preserve theological tension rather than resolve it; original-language primacy over translation tradition.'
