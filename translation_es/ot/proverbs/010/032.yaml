translation:
  language: es
  text: Los labios del justo conocen lo aceptable[a], pero la boca de los malvados dice perversidades[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: También puede traducirse «lo que agrada» o «favor»; el sustantivo hebreo puede denotar favor, buena voluntad o lo que es aceptable/apropiado.
    reason: lexical_alternative
  - marker: b
    text: 'El hebreo dice literalmente: «pero la boca de los malvados, perversidades»; se añade «dice» para que el español suene natural.'
    reason: lexical_alternative
lexical_decisions:
- source_word: שִׂפְתֵי
  english_pob_choice: the lips of
  chosen_spanish: los labios de
  alternatives_spanish:
  - la habla de
  - la expresión de
  lexicon: HALOT
  rationale: Conserva la imagen corporal y el paralelismo poético con «la boca» en el segundo hemistiquio. En español suena natural y mantiene el valor figurado sin diluirlo.
- source_word: צַדִּיק
  english_pob_choice: the righteous
  chosen_spanish: el justo
  alternatives_spanish:
  - los justos
  - una persona justa
  lexicon: HALOT
  rationale: El hebreo funciona de modo genérico/clasista. En singular con artículo, «el justo» preserva ese valor representativo y resulta idiomático en proverbios.
- source_word: יֵדְעוּן
  english_pob_choice: know
  chosen_spanish: conocen
  alternatives_spanish:
  - saben
  - disciernen
  lexicon: HALOT
  rationale: «Conocer» puede expresar aquí discernimiento práctico en el habla. «Saben» sería posible, pero «conocen» conserva mejor el enlace con el sustantivo siguiente sin añadir perífrasis.
- source_word: רָצוֹן
  english_pob_choice: what is acceptable
  chosen_spanish: lo agradable
  alternatives_spanish:
  - lo aceptable
  - lo que agrada
  - favor
  lexicon: HALOT
  rationale: El término puede denotar lo aceptable, lo grato o el favor. En español, «lo agradable» mantiene la amplitud semántica y suena natural en un proverbio; «lo aceptable» es más preciso pero algo más técnico.
- source_word: וּפִי
  english_pob_choice: but the mouth of
  chosen_spanish: pero la boca de
  alternatives_spanish:
  - y la boca de
  - mas la boca de
  lexicon: HALOT
  rationale: La conjunción contrastiva pide «pero». «Boca» preserva el paralelo con «labios» y evita una abstracción innecesaria.
- source_word: רְשָׁעִים
  english_pob_choice: the wicked
  chosen_spanish: los malvados
  alternatives_spanish:
  - los impíos
  - los perversos
  lexicon: HALOT
  rationale: «Malvados» comunica bien el contraste moral en español actual. «Impíos» es más tradicional, pero puede sonar más eclesial; «perversos» se reserva aquí para la cualidad del habla en el segundo colon.
- source_word: תַּהְפֻּכֽוֹת
  english_pob_choice: perversity
  chosen_spanish: perversidades
  alternatives_spanish:
  - perversidad
  - cosas perversas
  - torceduras
  lexicon: HALOT
  rationale: El plural hebreo se refleja mejor con un plural español. «Perversidades» conserva la fuerza del sustantivo abstracto y deja visible la idea de palabras/habla torcidas sin añadir un verbo explícito en el texto principal.
theological_decisions:
- issue: Valor de רָצוֹן en un contexto sapiencial
  english_pob_reading: what is acceptable / pleasing / favor
  chosen_spanish_reading: lo agradable
  alternative_spanish_readings:
  - lo aceptable
  - favor
  - lo que agrada
  rationale: 'No se reduce el término a «favor» divino, porque el contexto inmediato es la conducta verbal prudente. «Lo agradable» deja abierta la gama de sentido documentada por la POB inglesa: lo aceptable, lo placentero o lo conforme.'
  doctrine_reference: 'Proverbios sapienciales: discernimiento moral y prudencia en el habla, sin una afirmación doctrinal específica'
- issue: Cualidad del habla de los malvados en תַּהְפֻּכֽוֹת
  english_pob_reading: the mouth of the wicked speaks perversity
  chosen_spanish_reading: la boca de los malvados dice perversidades
  alternative_spanish_readings:
  - la boca de los malvados habla perversidad
  - la boca de los malvados pronuncia cosas perversas
  rationale: 'La POB inglesa señala que el verbo «speaks» está suplido para claridad. En español, «dice» cumple la misma función natural sin borrar la tensión lexical: el hebreo nombra directamente el contenido torcido del habla, no solo la acción de hablar.'
  doctrine_reference: 'Ética del lenguaje en Proverbios: contraste entre habla justa y habla perversa'
translation_notes:
  revision_awareness: Se siguió el texto hebreo consonante/vocalizado provisto y el audit trail inglés de la POB, que mantiene el paralelismo entre «lips/mouth» y resuelve רָצוֹן y תַּהְפֻּכוֹת con amplitud semántica. No se introdujeron elementos doctrinales ajenos ni se suavizó el contraste moral del proverbio.
  spanish_consistency_notes:
  - Se mantuvo el paralelismo corporal «labios/boca» para conservar la imaginería hebrea.
  - Se prefirió «el justo / los malvados» como clases morales genéricas, coherentes con el estilo sapiencial.
  - Se evitó «SEÑOR» o terminología litúrgica no pertinente, ya que el versículo no contiene el nombre divino.
  - El plural «perversidades» refleja mejor el plural hebreo que un abstracto singular en español.
