id: PHP.1.25
reference: Philippians 1:25
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: καὶ τοῦτο πεποιθὼς οἶδα ὅτι μενῶ καὶ ⸀παραμενῶ πᾶσιν ὑμῖν εἰς τὴν ὑμῶν προκοπὴν καὶ χαρὰν τῆς πίστεως,
base_translation:
  language: en
  yaml_path: translation/nt/philippians/001/025.yaml
  text: And convinced of this, I know that I will remain and continue with all of you for your progress and joy in the faith,
translation:
  language: ko
  text: 그리고 이것을 확신하기에, 나는 내가 머물러 여러분 모두와 함께 계속 있게 되리라는 것을 알고 있으니, 이는 여러분의 진보와 믿음 안에서의 기쁨[a]을 위함입니다.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 또는 「믿음의 기쁨」 또는 「믿음에서 오는 기쁨」.
    reason: alternative_reading
lexical_decisions:
- source_word: πεποιθὼς
  english_pob_choice: convinced
  chosen_korean: 확신하기에
  alternatives_korean:
  - 확신하여
  - 굳게 믿으며
  lexicon: BDAG
  rationale: 완료 분사로 굳어진 확신의 상태를 표현한다. 「확신하기에」가 인과 함의를 자연스럽게 살린다.
- source_word: μενῶ
  english_pob_choice: will remain
  chosen_korean: 머물러
  alternatives_korean:
  - 남아서
  - 머무를 것
  lexicon: BDAG
  rationale: μένω는 「머물다」를 의미한다. 다음 παραμενῶ와 연결하기 위해 「머물러」로 분사화한다.
- source_word: παραμενῶ
  english_pob_choice: continue with
  chosen_korean: 계속 있게 되리라
  alternatives_korean:
  - 함께 머물게 되리라
  - 곁에 있게 되리라
  lexicon: BDAG
  rationale: 합성동사 παραμένω는 「곁에 머물러 있음」의 함의를 가진다. μενῶ와 구별하여 「계속 있게 되리라」로 옮긴다.
- source_word: πᾶσιν ὑμῖν
  english_pob_choice: with all of you
  chosen_korean: 여러분 모두와 함께
  alternatives_korean:
  - 여러분 모두에게
  - 여러분 한 사람 한 사람과 함께
  lexicon: BDAG
  rationale: παραμενῶ의 여격을 관계적 「~와 함께」로 옮긴다. πᾶσιν을 「모두」로 명시한다.
- source_word: προκοπὴν
  english_pob_choice: progress
  chosen_korean: 진보
  alternatives_korean:
  - 발전
  - 나아감
  lexicon: BDAG
  rationale: προκοπή는 영적 전진을 가리킨다. 「진보」가 자연스럽다.
- source_word: χαρὰν τῆς πίστεως
  english_pob_choice: joy in the faith
  chosen_korean: 믿음 안에서의 기쁨
  alternatives_korean:
  - 믿음의 기쁨
  - 믿음에서 오는 기쁨
  lexicon: BDAG
  rationale: 속격이 다중 의미를 허용한다. 「믿음 안에서의 기쁨」이 그 모호성을 보존하면서 한국어로 자연스럽다.
- source_word: πίστεως
  english_pob_choice: faith
  chosen_korean: 믿음
  alternatives_korean:
  - 신뢰
  - 신실함
  lexicon: BDAG
  rationale: πίστις의 기본 등가어 「믿음」을 따른다.
