translation:
  language: es
  text: 'Pero el rey Joás no recordó la bondad[a] que Joadá, su padre[b], le había mostrado, y mató a su hijo. Mientras moría, dijo: «Que Yahvé vea y pida cuentas[c]»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El hebreo חֶסֶד también puede significar «lealtad» o «fidelidad pactal». Aquí se escogió «bondad» por ser la opción más natural en el contexto inmediato.
    reason: lexical_alternative
  - marker: b
    text: «Su padre» refleja el hebreo literal. Probablemente alude al papel paterno y protector de Joadá más que a paternidad biológica.
    reason: cultural_note
  - marker: c
    text: 'O: «que lo requiera» o «que lo investigue». El verbo hebreo puede expresar buscar un mal para exigir responsabilidad o pedir cuentas judicialmente.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הַחֶסֶד
  english_pob_choice: the kindness
  chosen_spanish: la bondad
  alternatives_spanish:
  - la bondad leal
  - la lealtad
  - la fidelidad pactal
  lexicon: HALOT
  rationale: חֶסֶד puede abarcar bondad, lealtad y fidelidad pactal. En este contexto humano inmediato, «bondad» conserva el sentido de un acto benéfico concreto sin cargar el texto con terminología más técnica de pacto que el pasaje no explicita.
- source_word: זָכַר
  english_pob_choice: did not remember
  chosen_spanish: no recordó
  alternatives_spanish:
  - no tuvo presente
  - no se acordó de
  - no guardó en la memoria
  lexicon: HALOT
  rationale: El verbo expresa recordar o tener presente, pero aquí implica una falla moral y relacional. «No recordó» sigue de cerca el hebreo y es natural en español.
- source_word: אָבִיו
  english_pob_choice: his father
  chosen_spanish: su padre
  alternatives_spanish:
  - su padre adoptivo
  - su protector
  - su benefactor
  lexicon: HALOT
  rationale: Aunque Joadá no era el padre biológico de Joás, el texto hebreo usa «su padre». Se conserva la expresión literal, dejando que el contexto muestre su sentido de padre en rol protector o formativo.
- source_word: וַיַּהֲרֹג אֶת־בְּנוֹ
  english_pob_choice: and he killed his son
  chosen_spanish: mató a su hijo
  alternatives_spanish:
  - lo hizo matar
  - le dio muerte a su hijo
  - mandó matar a su hijo
  lexicon: HALOT
  rationale: El hebreo presenta una acción directa de muerte. «Mató» es claro, directo y fiel, sin introducir un matiz judicial que el verbo por sí mismo no exige.
- source_word: וּכְמוֹתוֹ
  english_pob_choice: As he was dying
  chosen_spanish: Al morir
  alternatives_spanish:
  - Mientras moría
  - Cuando estaba muriendo
  - Y al morir
  lexicon: HALOT
  rationale: La forma temporal encaja con una cláusula breve en español. «Al morir» mantiene la simultaneidad de las últimas palabras de la víctima de manera natural y concisa.
- source_word: יֵרֶא יְהוָה
  english_pob_choice: May Yahweh see
  chosen_spanish: Que Yahvé vea
  alternatives_spanish:
  - Que Yahvé lo vea
  - Que Yahvé vea esto
  - Que Yahvé mire
  lexicon: HALOT
  rationale: El jussivo expresa una apelación o deseo. «Que Yahvé vea» reproduce esa fuerza exhortativa en español y preserva el nombre divino acordado para יְהוָה.
- source_word: וְיִדְרֹשׁ
  english_pob_choice: and require it
  chosen_spanish: y lo reclame
  alternatives_spanish:
  - y lo requiera
  - y pida cuentas
  - y lo investigue
  lexicon: HALOT
  rationale: דרש en contextos de culpa o sangre puede implicar exigir responsabilidad, investigar o reclamar. «Lo reclame» mantiene la brevedad del hebreo y el matiz de exigencia judicial sin estrechar el sentido a una sola opción técnica.
theological_decisions:
- issue: Cómo representar la apelación divina final de la víctima
  english_pob_reading: An appeal for Yahweh to observe and judicially reckon with the injustice
  chosen_spanish_reading: Una apelación para que Yahvé vea la injusticia y la reclame judicialmente
  alternative_spanish_readings:
  - Una súplica de venganza directa
  - Una simple afirmación de que Yahvé ve
  - Una petición para que Yahvé investigue y haga justicia
  rationale: 'El hebreo combina visión divina y demanda de responsabilidad. La traducción conserva esa tensión: no reduce el verso a mera observación, ni lo convierte en un ruego explícitamente vengativo. «Que Yahvé vea y lo reclame» mantiene el carácter judicial sin añadir más de lo que el texto dice.'
  doctrine_reference: Preservar la tensión teológica sin resolverla artificialmente.
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión más reciente del inglés POB, que ajustó la segunda cola a «require it» para mantener un tono más conciso y formal. La versión española refleja esa misma economía con «lo reclame», sin perder el matiz judicial de דרש.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» para יְהוָה, conforme al estándar del proyecto.
  - Se conserva el registro sobrio y formal del pasaje, evitando una paráfrasis devocional.
  - «Su padre» se deja literal en el texto principal, con nota para la relación de Joadá con Joás.
  - La construcción «Al morir» conserva la secuencia narrativa breve del hebreo.
  - El objeto pronominal «lo» en «lo reclame» evita repetir un referente implícito y mantiene fluidez en español.
