translation:
  language: es
  text: Él hará recaer sobre ellos su iniquidad[a], y en su maldad[b] los exterminará; Yahvé, nuestro Dios, los exterminará.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «ha hecho recaer sobre ellos su maldad» o «su iniquidad». En contexto poético, el verbo hebreo puede entenderse con fuerza de pasado o de futuro, y אוֹן también puede traducirse como «maldad» o «culpa».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «por su maldad» o «con su maldad». La preposición hebrea puede sugerir relación, medio o base del juicio.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּשֶׁב
  english_pob_choice: he will bring back
  chosen_spanish: hará volver
  alternatives_spanish:
  - lo traerá de vuelta sobre ellos
  - les hará recaer
  lexicon: HALOT
  rationale: El verbo en causativo expresa hacer retornar algo sobre alguien; en español, «hará volver sobre ellos» conserva la imagen de retribución sin sonar forzado. Mantiene la fuerza futura/declarativa que el contexto poético favorece.
- source_word: עֲלֵיהֶם
  english_pob_choice: on them
  chosen_spanish: sobre ellos
  alternatives_spanish:
  - contra ellos
  - en ellos
  lexicon: HALOT
  rationale: «Sobre ellos» reproduce la idea espacial/judicial del hebreo y preserva la imagen de que el mal vuelve a caer sobre los culpables.
- source_word: אֶת אוֹנָם
  english_pob_choice: their iniquity
  chosen_spanish: su iniquidad
  alternatives_spanish:
  - su maldad
  - su perversidad
  - su culpa
  lexicon: HALOT
  rationale: Aunque אוֹן puede abarcar daño, perversidad o iniquidad, el contexto de retribución favorece un sentido moral. «Iniquidad» conserva el valor fuerte y solemne que el inglés POB decidió.
- source_word: וּבְרָעָתָם
  english_pob_choice: and in their evil
  chosen_spanish: y por[a] su maldad
  alternatives_spanish:
  - y en su maldad
  - y con su maldad
  - y por su maldad
  lexicon: HALOT
  rationale: La preposición ב permite matiz locativo o instrumental. En español, «por su maldad» comunica de forma natural la idea de causa o base del juicio, sin cerrar indebidamente la ambigüedad; se marca la alternativa en nota.
- source_word: יַצְמִיתֵם
  english_pob_choice: he will wipe them out
  chosen_spanish: los exterminará
  alternatives_spanish:
  - los destruirá
  - los aniquilará
  - los arrancará
  lexicon: HALOT
  rationale: צמת en causativo implica destruir por completo. «Exterminará» refleja bien la intensidad del verbo. Se repite en la segunda mitad para conservar la repetición enfática del hebreo.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  lexicon: HALOT
  rationale: Se sigue la terminología del proyecto para el Tetragrámaton. «Yahvé» es la forma establecida en español para el nombre divino, en lugar de sustituirlo por un título.
- source_word: אֱלֹהֵינוּ
  english_pob_choice: our God
  chosen_spanish: nuestro Dios
  alternatives_spanish:
  - Dios nuestro
  lexicon: HALOT
  rationale: La forma posesiva simple comunica adecuadamente la relación de pacto y corresponde al uso natural del español bíblico contemporáneo.
theological_decisions:
- issue: Representación del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  rationale: El texto hebreo usa el Nombre propio, no un título. En español, el estándar del proyecto es «Yahvé», que preserva la referencia al nombre revelado sin sustituirlo por «SEÑOR».
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Valor verbal del primer imperfecto con waw consecutiva en poesía
  english_pob_reading: future-like declaration ('He will bring back')
  chosen_spanish_reading: futuro declarativo ('Él hará volver')
  alternative_spanish_readings:
  - Él ha hecho volver
  - Él hizo volver
  rationale: La estrofa finaliza una afirmación de juicio y los imperfectos siguientes refuerzan una expectativa segura. El español futuro mantiene el tono declarativo y la coherencia poética sin pretender una narración pasada.
  doctrine_reference: 'DOCTRINE.md: Translation philosophy — optimal equivalence'
- issue: Ambigüedad de בְּרָעָתָם
  english_pob_reading: and in their evil / and by their evil
  chosen_spanish_reading: y por su maldad
  alternative_spanish_readings:
  - y en su maldad
  - y con su maldad
  rationale: El hebreo puede ser locativo, instrumental o causal. «Por su maldad» comunica la base del juicio de manera clara en español, mientras la nota preserva la alternativa «en su maldad» como lectura más literal.
  doctrine_reference: 'DOCTRINE.md: Preserve lexical/theological tension'
translation_notes:
  revision_awareness: La redacción sigue de cerca el texto hebreo y la revisión del inglés POB que conserva el nombre divino como Yahweh/Yahvé. Se retiene la repetición final del verbo de destrucción para reflejar el paralelismo enfático del verso y se deja visible la ambigüedad de בְּרָעָתָם mediante una nota.
  spanish_consistency_notes:
  - Se usó «Yahvé» conforme al estándar español del proyecto para יְהוָה.
  - Se prefirió «exterminará» para conservar la fuerza de צמת y mantener la repetición del hebreo.
  - Se eligió «su iniquidad» para אוֹן, coherente con la lectura judicial del verso.
  - La preposición בְּרָעָתָם quedó resuelta como «por su maldad», con alternativa explícita en nota.
