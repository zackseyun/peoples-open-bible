revisions:
- from: Y se pusieron de pie los sacerdotes, vestidos ceremonialmente, con músicos y trompetas[a]; y los levitas, hijos de Asaf, con los címbalos, alabando al Señor y bendiciendo conforme a David, rey de Israel[b];
  to: Y se pusieron de pie los sacerdotes, ataviados, con músicos y trompetas[a]; y los levitas, hijos de Asaf, teniendo los címbalos, alabando a Yahvé y bendiciendo conforme a David, rey de Israel[b];
  rationale: Se corrige 'al Señor' a 'a Yahvé' para alinearlo con la terminología obligatoria del proyecto en referencia al Dios de Israel. También se refuerza la fidelidad sintáctica con 'teniendo los címbalos' para ἔχοντες τὰ κύμβαλα y se sustituye 'vestidos ceremonialmente' por 'ataviados' para un español más natural y digno.
  reviewer_model: gpt-5.4
