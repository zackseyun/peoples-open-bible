translation:
  language: es
  text: ¡Cómo ha sido escudriñado Esaú![a] ¡Sus tesoros escondidos han sido descubiertos![b]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Aquí «Esaú» se refiere colectivamente al pueblo o la tierra de Edom, los descendientes de Esaú.
    reason: cross_reference
  - marker: b
    text: 'O: «¡Cómo ha sido saqueado Esaú! ¡Sus depósitos secretos han quedado al descubierto!»'
    reason: lexical_alternative
lexical_decisions:
- source_word: אֵיךְ
  english_pob_choice: How
  chosen_spanish: ¡Cómo!
  alternatives_spanish:
  - ¡Cuán!
  - ¡Ay, cómo!
  lexicon: HALOT
  rationale: El hebreo introduce una exclamación de asombro, no una pregunta. «¡Cómo!» conserva bien el valor exclamativo y suena natural en español.
- source_word: נֶחְפְּשׂוּ
  english_pob_choice: has been searched out
  chosen_spanish: fue registrado
  alternatives_spanish:
  - ha sido buscado
  - ha sido examinado a fondo
  - ha sido saqueado
  lexicon: HALOT
  rationale: El pasivo nifal expresa que Esau/Edom ha sido objeto de una pesquisa o inspección exhaustiva. «Fue registrado» intenta reflejar esa idea de ser escudriñado o investigado, manteniendo el tono exclamativo sin añadir demasiado.
- source_word: עֵשָׂו
  english_pob_choice: Esau
  chosen_spanish: Esau
  alternatives_spanish:
  - Edom
  lexicon: HALOT
  rationale: Se conserva el nombre propio del texto hebreo. Aunque funciona metonímicamente por Edom, la forma principal debe seguir al hebreo; el sentido colectivo se explica en la nota.
- source_word: נִבְעוּ
  english_pob_choice: have been sought out
  chosen_spanish: han sido buscados
  alternatives_spanish:
  - han sido descubiertos
  - han sido escudriñados
  - han sido hallados
  lexicon: HALOT
  rationale: El paralelo verbal refuerza la idea de que lo oculto ha quedado expuesto o localizado. «Han sido buscados» mantiene el paralelismo con el primer verbo sin forzar un equivalente técnico.
- source_word: מַצְפֻּנָיו
  english_pob_choice: his hidden treasures
  chosen_spanish: sus tesoros escondidos
  alternatives_spanish:
  - sus cosas escondidas
  - sus depósitos secretos
  - sus bienes ocultos
  lexicon: HALOT
  rationale: El sustantivo designa cosas guardadas u ocultas, y en contexto alude a bienes valiosos almacenados. «Tesoros escondidos» conserva el matiz de valor y ocultamiento de forma clara en español.
theological_decisions:
- issue: Sentido metonímico de Esau como Edom
  english_pob_reading: Esau here refers collectively to the people or land of Edom, Esau's descendants.
  chosen_spanish_reading: «Esau» se mantiene como nombre propio en el texto, con sentido colectivo implícito de Edom.
  alternative_spanish_readings:
  - Sustituir por «Edom» en el texto principal
  - Añadir una paráfrasis colectiva dentro del versículo
  rationale: La lectura del hebreo y del audit trail en inglés favorece conservar el nombre original, sin perder la referencia colectiva. La nota explica la metonimia para no borrar el matiz textual.
  doctrine_reference: Uso profético de nombres ancestrales como representantes de pueblos descendientes.
translation_notes:
  revision_awareness: Se siguió el paquete fuente hebreo y el audit trail en inglés. La principal tensión léxica está en נֶחְפְּשׂוּ / נִבְעוּ, donde el inglés opta por dos verbos de búsqueda/registro; en español se conservó la exclamación y se eligieron verbos que mantienen la idea de pesquisa/exposición sin borrar la duplicación paralela.
  spanish_consistency_notes:
  - Se usa «Esau» sin tilde para respetar la transliteración simple del nombre propio en este proyecto.
  - Se prefirió un estilo profético claro y digno, con exclamación inicial.
  - Se evitó «SEÑOR» u otras convenciones no presentes en el versículo.
  - «Tesoros escondidos» mantiene el plural y el valor de bienes ocultos del hebreo.
