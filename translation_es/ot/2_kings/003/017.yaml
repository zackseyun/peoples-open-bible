  text: כִּֽי כֹ֣ה אָמַ֣ר יְהוָ֗ה לֹֽא תִרְא֥וּ ר֨וּחַ֙ וְ/לֹֽא תִרְא֣וּ גֶ֔שֶׁם וְ/הַ/נַּ֥חַל הַ/ה֖וּא יִמָּ֣לֵא מָ֑יִם וּ/שְׁתִיתֶ֛ם אַתֶּ֥ם וּ/מִקְנֵי/כֶ֖ם וּֽ/בְהֶמְתְּ/כֶֽם־׀־־׃
base_translation:
  language: en
  yaml_path: translation/ot/2_kings/003/017.yaml
  text: 'For thus says Yahweh: You will not see wind[a], nor will you see rain, yet that wadi will be filled with water, and you and your livestock and your animals will drink.'
  footnotes:
  - marker: a
    text: Or 'that valley' or 'that streambed.' The Hebrew נחל often refers to a wadi, a seasonal watercourse.
    reason: lexical_alternative
