revisions:
- from: Mía es la venganza[a] y la retribución, al tiempo en que resbalará su pie[b]; porque cercano está el día de su desastre, y se apresura lo que les ha sido preparado[c].
  to: Mía es la venganza[a] y la retribución, cuando su pie resbale[b]; porque cercano está el día de su desastre, y se apresura lo que les ha sido preparado[c].
  rationale: 'Se hizo una reparación menor para mejorar la naturalidad del español sin alterar el sentido ni las decisiones léxicas del POB: «cuando su pie resbale» expresa mejor la cláusula temporal hebrea que «al tiempo en que resbalará su pie». También se pulió la redacción de la nota [c].'
