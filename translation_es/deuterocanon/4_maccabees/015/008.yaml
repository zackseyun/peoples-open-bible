    rationale: La auditoría inglesa y el contexto dejan claro que se trata de seguridad/rescate físico temporal, no de salvación en sentido soteriológico. En español, «salvación» activa con mucha facilidad esa lectura y no preserva bien la decisión documentada.
  - severity: medium
