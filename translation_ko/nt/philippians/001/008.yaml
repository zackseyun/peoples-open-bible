id: PHP.1.8
reference: Philippians 1:8
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: μάρτυς γάρ ⸀μου ὁ θεός, ὡς ἐπιποθῶ πάντας ὑμᾶς ἐν σπλάγχνοις ⸂Χριστοῦ Ἰησοῦ⸃.
base_translation:
  language: en
  yaml_path: translation/nt/philippians/001/008.yaml
  text: For God is my witness, how I long for all of you with the affections of Messiah Jesus.
translation:
  language: ko
  text: 내가 메시아 예수의 심정으로[a] 여러분 모두를 얼마나 사모하는지, 하나님이 나의 증인이십니다.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 또는 「메시아 예수의 긍휼로」. 헬라어 σπλάγχνα는 본래 「창자」를 가리키며 깊은 정념의 자리를 의미한다. 「심정」이 그 정서적 깊이를 자연스럽게 담는다.
    reason: lexical_alternative
lexical_decisions:
- source_word: μάρτυς
  english_pob_choice: witness
  chosen_korean: 증인
  alternatives_korean:
  - 증언자
  lexicon: BDAG
  rationale: 「하나님이 나의 증인이시다」는 한국어 정형 표현으로 가장 자연스럽다.
- source_word: γάρ
  english_pob_choice: For
  chosen_korean: (생략, 문장 흐름으로 연결)
  alternatives_korean:
  - 곧
  - 참으로
  lexicon: BDAG
  rationale: γάρ의 연결 기능은 한국어 어순상 명시적 접속어 없이도 살릴 수 있으며, 문맥의 흐름으로 충분히 전달된다.
- source_word: ὡς
  english_pob_choice: how
  chosen_korean: 얼마나
  alternatives_korean:
  - 어떻게
  - 어찌
  lexicon: BDAG
  rationale: ὡς가 정도·강도를 묻는 의미로 기능하므로, 「얼마나 ~하는지」가 사모의 깊이를 자연스럽게 표현한다.
- source_word: ἐπιποθῶ
  english_pob_choice: long for
  chosen_korean: 사모하는
  alternatives_korean:
  - 그리워하는
  - 간절히 그리워하는
  lexicon: BDAG
  rationale: 「사모하다」는 한국어 성서 어법에서 인격적 그리움과 영적 갈망을 함께 담는 정립된 어휘이다.
- source_word: πάντας ὑμᾶς
  english_pob_choice: all of you
  chosen_korean: 여러분 모두
  alternatives_korean:
  - 여러분 한 사람 한 사람
  lexicon: BDAG
  rationale: πάντας의 분배적 강조를 「여러분 모두」로 자연스럽게 옮긴다.
- source_word: σπλάγχνοις
  english_pob_choice: affections
  chosen_korean: 심정
  alternatives_korean:
  - 긍휼
  - 마음
  - 정
  lexicon: BDAG
  rationale: σπλάγχνα는 깊은 정념의 자리를 가리키는 셈족적 비유이다. 「심정」이 그 정서적 깊이를 가장 자연스럽게 담아내며, 영어 POB의 「affections」 결정을 한국어로 충실히 반영한다.
- source_word: Χριστοῦ Ἰησοῦ
  english_pob_choice: Messiah Jesus
  chosen_korean: 메시아 예수
  alternatives_korean:
  - 그리스도 예수
  lexicon: BDAG
  rationale: 본 번역의 일관된 원칙에 따라 칭호 Χριστός를 「메시아」로 옮긴다.
