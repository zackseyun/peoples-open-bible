translation:
  language: es
  text: Pero Heliodoro, después de ofrecer un sacrificio a Dios y de hacer votos[a] muy grandes al que le había preservado la vida, y después de despedirse de Onías[b], regresó al rey[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'hacer las mayores oraciones'. La palabra griega puede significar 'oraciones' o 'votos', pero 'votos' encaja mejor en un contexto sacrificial.
    reason: lexical_alternative
  - marker: b
    text: O 'después de dar la despedida a Onías'. El verbo griego también puede significar 'recibir' o 'dar la bienvenida', pero aquí el contexto de partida favorece el sentido de despedida.
    reason: lexical_alternative
  - marker: c
    text: 'El verbo griego tiene un matiz militar: literalmente sugiere una marcha de regreso o levantar el campamento para volver.'
    reason: cultural_note
lexical_decisions:
- source_word: θυσίαν ἀνενέγκων
  english_pob_choice: after offering a sacrifice
  chosen_spanish: después de ofrecer un sacrificio
  alternatives_spanish:
  - habiendo ofrecido un sacrificio
  - después de haber ofrecido un sacrificio
  lexicon: LSJ
  rationale: ἀνενέγκων con θυσίαν expresa ofrecer un sacrificio; en español, la construcción temporal con 'después de' mantiene la secuencia del participio aoristo sin sonar forzada.
- source_word: τῷ θεῷ
  english_pob_choice: to God
  chosen_spanish: a Dios
  alternatives_spanish:
  - para Dios
  lexicon: LSJ
  rationale: El dativo marca el destinatario del sacrificio; 'a Dios' es la forma natural y fiel en español.
- source_word: εὐχὰς μεγίστας εὐξάμενος
  english_pob_choice: making very great vows
  chosen_spanish: de hacer votos muy grandes
  alternatives_spanish:
  - de hacer oraciones muy grandes
  - de hacer los votos más grandes
  lexicon: LSJ
  rationale: En este contexto sacrificial, εὐχή y εὔχομαι favorecen 'votos' más que 'oraciones'; 'muy grandes' conserva μεγίστας sin empujar el sentido más allá de lo que permite el griego.
- source_word: τῷ τὸ ζῆν περιποιήσαντι
  english_pob_choice: to the one who had preserved his life
  chosen_spanish: al que le había preservado la vida
  alternatives_spanish:
  - al que le había concedido la vida
  - al que le había salvado la vida
  lexicon: LSJ
  rationale: La frase identifica a Dios como quien aseguró la continuidad de su vida después del peligro; 'preservado la vida' refleja mejor esa conservación que una formulación más general.
- source_word: τὸν Ὀνίαν ἀποδεξάμενος
  english_pob_choice: after taking leave of Onias
  chosen_spanish: después de despedirse de Onías
  alternatives_spanish:
  - después de tomar licencia de Onías
  - después de recibir a Onías
  lexicon: LSJ
  rationale: ἀποδέχομαι puede implicar recibir o despedirse; por el movimiento narrativo de salida hacia el rey, 'despedirse de' es la opción española más clara y ajustada al contexto.
- source_word: ἀνεστρατοπέδευσεν
  english_pob_choice: returned to the king
  chosen_spanish: regresó al rey
  alternatives_spanish:
  - marchó de vuelta al rey
  - levantó el campamento y fue al rey
  lexicon: LSJ
  rationale: El verbo tiene sabor militar y puede sugerir reemprender la marcha o volver; 'regresó al rey' comunica con naturalidad el movimiento direccional sin perder totalmente esa fuerza.
- source_word: πρὸς τὸν βασιλέα
  english_pob_choice: to the king
  chosen_spanish: al rey
  alternatives_spanish:
  - hacia el rey
  - de vuelta al rey
  lexicon: LSJ
  rationale: πρός con acusativo indica movimiento hacia una persona; 'al rey' es el equivalente más natural en español.
theological_decisions:
- issue: Referencia de 'al que le había preservado la vida'
  english_pob_reading: The phrase refers to God as the one who preserved Heliodorus's life.
  chosen_spanish_reading: La frase se entiende como referencia a Dios, quien preservó la vida de Heliodoro.
  alternative_spanish_readings:
  - el que le había concedido la vida
  - el que le había salvado la vida
  rationale: El contexto inmediato es la liberación de Heliodoro de una muerte inminente; por eso 'preservado la vida' conserva la referencia a conservación providencial sin diluirla en una formulación más vaga.
  doctrine_reference: Preservar la tensión teológica sin añadir doctrinas ajenas; el contexto basta para identificar al referente.
translation_notes:
  revision_awareness: Se corrigió la validación anterior anclando cada nota al texto mediante marcadores visibles [a], [b] y [c] en las palabras o frases correspondientes. No se añadió ninguna nota sin ancla. La redacción general se mantuvo fiel al pasaje y al expediente auditado en inglés.
  spanish_consistency_notes:
  - Se mantiene 'Dios' para τῷ θεῷ conforme al estándar del proyecto.
  - Se usa 'votos' para εὐχάς por el contexto sacrificial, en línea con la decisión inglesa auditada.
  - Se conserva el nombre 'Onías' con acento español regularizado.
  - Se evita 'SEÑOR' porque el griego aquí dice θεῷ y no κύριος.
  - '''regresó al rey'' intenta conservar el movimiento de retorno del verbo militar sin sobrecargar el español.'
