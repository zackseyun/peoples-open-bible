    issue: «él solo queda de su madre» es poco natural en español
    rationale: Aunque intenta seguir la revisión inglesa «left of his mother», en español esa construcción resulta oscura. El sentido documentado es que él es el único hijo que le queda a su madre; eso debe expresarse de forma más idiomática en el texto principal.
  - severity: low
