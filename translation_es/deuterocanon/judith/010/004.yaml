review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien el sentido general del griego: Judith se calza, se adorna con una serie de joyas y se embellece con el propósito explícito de engañar a los hombres que la vean. Sin embargo, dos elecciones no preservan fielmente el detalle léxico auditado: χλιδῶνας se documentó en la POB inglesa como ''anklets'', pero el español usa ''brazaletes'', lo que desplaza la ubicación de la joya; además, ἔλαβεν ... σανδάλια no debe quedar en el texto principal como ''tomó sandalias para sus pies'', porque suena antinatural en español y no refleja bien el sentido idiomático contextual de calzarse.'
  spanish_quality_summary: El español es mayormente claro, pero 'tomó sandalias para sus pies' suena forzado y poco idiomático. También la secuencia 'brazaletes, las pulseras' introduce redundancia semántica. Una redacción más natural y fiel sería 'se puso sandalias en los pies' y 'tobilleras y pulseras'. 'Se hermoseó mucho' es comprensible, pero 'se hizo muy hermosa' refleja mejor el matiz resultativo de ἐκαλλωπίσατο σφόδρα y suena más natural en español bíblico moderno.
  glossary_alignment: No hay conflictos con la terminología teológica principal del proyecto. Sí hay un desajuste léxico con la auditoría POB en χλιδῶνας, que conviene alinear como 'tobilleras'. Para κόσμος, 'todo su adorno' es aceptable y además coincide con la nota inglesa que preserva alternativas más amplias que 'joyería'.
  issues:
  - severity: high
    issue: La frase principal 'tomó sandalias para sus pies' es antinatural y poco fiel al sentido contextual.
    rationale: Aunque ἔλαβεν es literalmente 'tomó', la propia auditoría inglesa establece que en este contexto de vestimenta significa 'put sandals on her feet'. El español principal debe reflejar esa acción idiomática, no una literalidad torpe.
  - severity: high
    issue: χλιδῶνας se tradujo como 'brazaletes' en vez de 'tobilleras'.
    rationale: 'La POB inglesa documentó una decisión concreta: ''anklets''. ''Brazaletes'' cambia el referente y además duplica la idea de ψέλια/pulseras en la misma lista.'
  - severity: medium
    issue: La nota [a] está anclada a una redacción principal defectuosa y no hace falta si el texto principal se corrige.
    rationale: Si el texto principal dice 'se puso sandalias en los pies', ya transmite naturalmente el sentido contextual. La alternativa puede omitirse sin pérdida.
  - severity: low
    issue: '''Se hermoseó mucho'' es menos natural que una formulación resultativa más directa.'
    rationale: ἐκαλλωπίσατο σφόδρα expresa que ella se embelleció notablemente. 'Se hizo muy hermosa' comunica mejor el resultado y mantiene el tono narrativo.
  revised_spanish_text: Y se puso sandalias en los pies, y se puso las tobilleras, las pulseras, los anillos, los pendientes y todo su adorno[a]; y se hizo muy hermosa, para engañar a los ojos de los hombres que pudieran verla.
  revised_footnotes:
  - marker: a
    text: 'O: «toda su joyería» o «todo su atavío». El griego κόσμος aquí significa adorno u ornamentación, no «mundo».'
    reason: lexical_alternative
  revision_rationale: 'Se corrige el texto principal para que suene natural en español y siga más de cerca las decisiones léxicas auditadas: ἔλαβεν ... σανδάλια se vierte idiomáticamente como ''se puso sandalias en los pies''; χλιδῶνας se alinea con ''tobilleras''; se mantiene ''todo su adorno'' para κόσμος con nota alternativa; y ''se hizo muy hermosa'' mejora la legibilidad y el matiz resultativo de ἐκαλλωπίσατο σφόδρα. No se requiere adjudicación adicional porque los cambios son claros y de bajo riesgo doctrinal.'
