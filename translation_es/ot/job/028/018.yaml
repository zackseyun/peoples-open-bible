    issue: «no se mencionan» no refleja plenamente el modismo comparativo de לֹא יִזָּכֵר
    rationale: El hebreo literal ‘no será recordado/mencionado’ en este contexto expresa insignificancia frente a la sabiduría. El POB inglés lo vierte idiomáticamente ‘are not worth mentioning’. En español, «no se mencionan» puede sonar descriptivo, no comparativo.
  - severity: high
    issue: La nota c está aplicada al elemento equivocado
    rationale: La nota inglesa c explica que el término hebreo traducido ‘coral’ también puede rendirse ‘rubies’. En el borrador español, el marcador [c] aparece al final de «mencionan» y el contenido de la nota sugiere una ambigüedad no vinculada correctamente al texto; debe anclarse con ‘coral’, junto con la nota a, no con la cláusula verbal ni con ‘perlas’.
  - severity: low
    issue: Falta de artículo en «Coral y cristal»
    rationale: En español bíblico y literario actual, «El coral y el cristal» suena más natural y definido en una lista de materiales preciosos.
  revised_spanish_text: El coral[a][c] y el cristal no valen la pena mencionarlos[b], y la adquisición de la sabiduría está por encima de las perlas.
