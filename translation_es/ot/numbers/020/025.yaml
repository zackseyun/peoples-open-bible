translation:
  language: es
  text: Toma a Aarón y a Eleazar su hijo, y hazlos subir al monte Hor[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «Hor, el monte»; convencionalmente se traduce «monte Hor».'
    reason: lexical_alternative
lexical_decisions:
- source_word: קַח
  english_pob_choice: Take
  chosen_spanish: Toma
  alternatives_spanish:
  - Toma contigo
  - Lleva
  lexicon: HALOT
  rationale: El imperativo qal de לקח pide una acción directa sobre personas; en español, «toma» mantiene la concisión y la fuerza del mandato sin sonar más pesado que el hebreo. «Lleva» podría sugerir más fuertemente traslado físico que la orden amplia de tomar consigo.
- source_word: אַהֲרֹן
  english_pob_choice: Aaron
  chosen_spanish: Aarón
  alternatives_spanish:
  - Aaron
  lexicon: Nombre propio bíblico
  rationale: 'Se conserva el nombre propio con la acentuación habitual en español bíblico: «Aarón».'
- source_word: אֶלְעָזָר
  english_pob_choice: Eleazar
  chosen_spanish: Eleazar
  lexicon: Nombre propio bíblico
  rationale: Transliteración estándar del nombre propio en español.
- source_word: בְּנוֹ
  english_pob_choice: his son
  chosen_spanish: su hijo
  alternatives_spanish:
  - el hijo de Aarón
  lexicon: HALOT
  rationale: El sufijo posesivo de 3ms se entiende naturalmente como referido a Aarón en este contexto; «su hijo» conserva la relación filial sin sobreexplicar. La alternativa explícita «el hijo de Aarón» aclara el referente, pero añade material no presente en el hebreo.
- source_word: וְהַעַל
  english_pob_choice: bring ... up
  chosen_spanish: llévalos ... al monte
  alternatives_spanish:
  - haz que suban
  - súbelos
  lexicon: HALOT
  rationale: El hiphil imperativo de עלה expresa causación de ascenso. En español, «llévalos ... al monte» reproduce de modo natural la idea de conducirlos hacia arriba, manteniendo el sentido causativo sin una construcción forzada.
- source_word: אֹתָם
  english_pob_choice: them
  chosen_spanish: los
  alternatives_spanish:
  - a ellos
  lexicon: HALOT
  rationale: El pronombre de objeto directo se integra de forma natural en español como «los», refiriéndose a Aarón y Eleazar.
- source_word: הֹר הָהָר
  english_pob_choice: Mount Hor
  chosen_spanish: el monte Hor
  alternatives_spanish:
  - Hor, el monte
  - monte Hor
  lexicon: HALOT
  rationale: El hebreo dice literalmente «Hor, el monte» / «Hor el monte», pero el español bíblico entiende bien la forma toponímica «el monte Hor». Se conserva la referencia tradicional al lugar sin borrar la estructura hebrea.
translation_notes:
  revision_awareness: 'El contexto auditado coincide estrechamente con la versión inglesa POB: no se registran revisiones aplicadas y el control cruzado indica acuerdo alto. La decisión principal en español es mantener la naturalidad sintáctica («llévalos») mientras se conserva la referencia toponímica tradicional («el monte Hor») y la relación posesiva explícita («su hijo»).'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma del proyecto solo cuando aparece el nombre divino; este versículo no lo contiene.
  - Se usa «monte Hor» con nota para reflejar la alternativa literal hebrea sin sacrificar claridad.
  - La forma verbal pluralizada «llévalos» expresa con naturalidad el objeto dual en español, equivalente al pronombre plural hebreo.
