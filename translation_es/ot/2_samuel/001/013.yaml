translation:
  language: es
  text: 'David dijo al joven que le había informado: «¿De dónde eres tú?». Y él dijo: «Yo soy hijo de un extranjero residente amalecita[a]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Yo soy hijo de un residente extranjero, un amalecita». La frase hebrea puede entenderse como una identificación de su padre como un amalecita que residía en tierra ajena, o más ampliamente como una vinculación del hablante por descendencia con un amalecita que vivía como residente foráneo.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הַנַּעַר
  english_pob_choice: the young man
  chosen_spanish: el joven
  alternatives_spanish:
  - el muchacho
  - el muchacho joven
  - el servidor
  lexicon: HALOT
  rationale: נַעַר puede denotar a un joven varón o a un ayudante/acompañante. En este contexto narrativo, 'el joven' comunica con naturalidad la referencia sin insinuar servidumbre, que el hebreo no exige aquí.
- source_word: הַמַּגִּיד לוֹ
  english_pob_choice: who told him
  chosen_spanish: que le había dado el informe
  alternatives_spanish:
  - que le dijo
  - que le informó
  - que se lo había comunicado
  lexicon: HALOT
  rationale: El participio de נגד señala al que transmite la noticia a David. 'Que le había dado el informe' conserva la función informativa del participio y evita una literalidad demasiado plana, manteniendo el enlace relativo del texto.
- source_word: אֵי מִזֶּה
  english_pob_choice: Where are you from?
  chosen_spanish: ¿De dónde eres tú?
  alternatives_spanish:
  - ¿De qué lugar eres?
  - ¿De dónde vienes?
  - ¿De qué parte eres?
  lexicon: HALOT
  rationale: La expresión interrogativa pregunta por procedencia u origen. '¿De dónde eres tú?' es la equivalencia española más natural y fiel al sentido idiomático.
- source_word: בֶּן אִישׁ
  english_pob_choice: the son of
  chosen_spanish: hijo de
  alternatives_spanish:
  - hijo de un hombre
  - descendiente de
  lexicon: HALOT
  rationale: El constructo funciona como identificación filial. 'Hijo de' preserva el valor relacional sin introducir un tono innecesariamente explicativo.
- source_word: גֵּר
  english_pob_choice: sojourner
  chosen_spanish: forastero
  alternatives_spanish:
  - forastero residente
  - extranjero residente
  - sojourner
  lexicon: HALOT
  rationale: גֵּר designa a una persona que vive fuera de su grupo o tierra de origen y, en muchos contextos, a un residente no nativo. 'Forastero' comunica la extrañeza de forma comprensible en español; el matiz de residencia queda abierto para la nota, siguiendo la tensión del inglés POB entre 'sojourner' y la alternativa explicativa.
- source_word: עֲמָלֵקִי
  english_pob_choice: Amalekite
  chosen_spanish: amalecita
  alternatives_spanish:
  - amalecita
  - de Amalec
  lexicon: HALOT
  rationale: El etnónimo se traduce con la forma española usual derivada de Amalec. 'Amalecita' mantiene la referencia étnica del hebreo.
- source_word: אָנֹכִי
  english_pob_choice: I am
  chosen_spanish: Yo soy
  alternatives_spanish:
  - Yo
  - Soy
  lexicon: HALOT
  rationale: אָנֹכִי introduce una autoidentificación enfática. En español, 'Yo soy' reproduce de manera natural y solemne esa identificación explícita.
translation_notes:
  revision_awareness: La redacción sigue de cerca el hebreo y toma como contexto auditado la elección inglesa reciente de mantener גֵּר en un registro formal. En español se optó por 'forastero' por claridad y naturalidad; la nota preserva la alternativa más técnica 'forastero residente' para no perder el matiz social del término.
  spanish_consistency_notes:
  - Se evitó 'SEÑOR' u otras sustituciones porque no aplica el Tetragrámaton en este versículo.
  - '''Forastero'' se usa aquí como equivalente funcional de גֵּר; en otros contextos del POB podría requerir una solución más técnica según el entorno legal o narrativo.'
  - La puntuación y comillas siguen el español moderno de publicación.
