source:
  edition: SBLGNT
  text: 'Γνοὺς δὲ ὁ Παῦλος ὅτι τὸ ἓν μέρος ἐστὶν Σαδδουκαίων τὸ δὲ ἕτερον Φαρισαίων ⸀ἔκραζεν ἐν τῷ συνεδρίῳ· Ἄνδρες ἀδελφοί, ἐγὼ Φαρισαῖός εἰμι, υἱὸς ⸀Φαρισαίων· περὶ ἐλπίδος καὶ ἀναστάσεως νεκρῶν ⸀ἐγὼ κρίνομαι.'
base_translation:
  language: en
  yaml_path: translation/nt/acts/023/006.yaml
  text: But Paul[a], knowing that one part were Sadducees and the other Pharisees, cried out in the council, “Men, brothers, I am a Pharisee, a son of Pharisees[c][b]. It is concerning the hope and resurrection of the dead that I am being judged.”
  footnotes:
  - marker: a
    text: Or “in the Sanhedrin.” The Greek word can refer specifically to the Jewish ruling council.
    reason: lexical_alternative
  - marker: b
    text: Or “a son of Pharisee parents” or “a descendant of Pharisees.”
    reason: alternative_reading
  - marker: c
    text: Or “for the hope of the resurrection of the dead I am being judged.”
    reason: alternative_reading
translation:
  language: ko
  text: 바울이 그들 가운데 한쪽이 사두개인이고 다른 쪽이 바리새인임을 알고는, 공의회에서 외쳤습니다. 「형제 여러분, 저는 바리새인이요, 바리새인의 아들입니다. 저는 죽은 자들의 소망과 부활 때문에 심판받고 있습니다.」
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ἀναστάσεως νεκρῶν
  english_pob_choice: resurrection of the dead
  chosen_korean: 죽은 자들의 부활
  alternatives_korean:
