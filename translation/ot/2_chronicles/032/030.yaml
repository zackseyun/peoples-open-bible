id: 2CH.32.30
reference: 2 Chronicles 32:30
source:
  edition: WLC
  text: וְ/ה֣וּא יְחִזְקִיָּ֗הוּ סָתַם֙ אֶת מוֹצָ֞א מֵימֵ֤י גִיחוֹן֙ הָֽ/עֶלְי֔וֹן וַֽ/יַּישְּׁרֵ֥/ם לְ/מַֽטָּה מַּעְרָ֖בָ/ה לְ/עִ֣יר דָּוִ֑יד וַ/יַּצְלַ֥ח יְחִזְקִיָּ֖הוּ בְּ/כָֽל מַעֲשֵֽׂ/הוּ־־־׃
translation:
  text: It was Hezekiah who stopped up the upper outlet of the waters of Gihon and directed them down to the west side of the city of David[b][a]. And Hezekiah prospered in all his work.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the upper spring of Gihon.' The Hebrew term can refer either to the place where the water emerges or, more broadly, to the spring/outflow itself.
    reason: lexical_alternative
  - marker: b
    text: Or 'channeled them' or 'made them flow straight.' The Hebrew verb suggests directing the waters in a straightened course.
    reason: lexical_alternative
lexical_decisions:
- source_word: סָתַם
  chosen: stopped up
  alternatives:
  - blocked
  - shut up
  lexicon: HALOT
  rationale: The verb denotes closing or blocking an opening. 'Stopped up' is idiomatic modern English and fits the hydraulic context better than the more wooden 'shut up.'
- source_word: מוֹצָא
  chosen: outlet
  alternatives:
  - source
  - outflow
  lexicon: HALOT
  rationale: In context of spring waters and engineering works, the noun refers to the point where water comes out. 'Outlet' best captures the physical water exit being obstructed. 'Source' is possible but can suggest the spring itself rather than its opening.
- source_word: מֵימֵי גִיחוֹן הָעֶלְיוֹן
  chosen: the upper outlet of the waters of Gihon
  alternatives:
  - the upper spring of Gihon
  - the upper outflow of the waters of Gihon
  lexicon: HALOT
  rationale: The construct chain is preserved with 'waters of Gihon,' and הָעֶלְיוֹן is rendered 'upper.' This keeps the topographical distinction without overinterpreting the exact hydraulic feature.
- source_word: וַיַּישְּׁרֵם
  chosen: directed them
  alternatives:
  - made them flow straight
  - channeled them
  lexicon: HALOT
  rationale: From ישר in a causative sense, the verb here refers to making the waters go in a directed course. 'Directed them' is clear and natural; 'channeled them' is also plausible but slightly more interpretive.
- source_word: לְמַטָּה מַּעְרָבָה
  chosen: down to the west side
  alternatives:
  - downward westward
  - down below, westward
  lexicon: HALOT
  rationale: The phrase combines downward movement with western direction. 'Down to the west side' communicates both topography and destination in readable English.
- source_word: לְעִיר דָּוִיד
  chosen: of the city of David
  alternatives:
  - to the city of David
  lexicon: HALOT
  rationale: 'Attached to ''west side,'' the phrase is best taken as a genitival specification: the west side belonging to the city of David. Rendering it as ''to the city of David'' would suggest motion into the city rather than location relative to it.'
- source_word: וַיַּצְלַח
  chosen: prospered
  alternatives:
  - succeeded
  - was successful
  lexicon: HALOT
  rationale: The verb denotes success or prosperity. 'Prospered' preserves the broader sense of flourishing in undertakings, not merely isolated success.
- source_word: מַעֲשֵׂהוּ
  chosen: his work
  alternatives:
  - his deeds
  - his undertakings
  lexicon: HALOT
  rationale: In this administrative and construction context, 'work' naturally summarizes Hezekiah's enterprises. 'Undertakings' is possible but less idiomatic.
- source_word: וְהוּא יְחִזְקִיָּהוּ
  chosen: It was Hezekiah who
  alternatives:
  - Now Hezekiah
  - Hezekiah himself
  lexicon: Hebrew grammar
  rationale: The pronoun plus proper name gives emphasis. 'It was Hezekiah who' brings out the emphatic subject in natural English better than a flat repetition of the name.
