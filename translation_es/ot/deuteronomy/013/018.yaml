translation:
  language: es
  text: Y nada de lo que ha sido consagrado a la destrucción[a] se pegará a tu mano, para que Yahvé se aparte del ardor de su ira[b] y te muestre misericordia, y tenga compasión de ti, y te multiplique, tal como juró a tus padres.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, en forma más tradicional, «nada de lo que está bajo el anatema» o «nada de lo que pertenece al anatema». El hebreo חֵרֶם se refiere a algo consagrado irrevocablemente a Dios, a menudo para destrucción.
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «del ardor de su nariz/ira», un modismo para expresar una ira intensa.'
    reason: cultural_note
lexical_decisions:
- source_word: יִדְבַּק
  english_pob_choice: shall cling
  chosen_spanish: se pegará
  alternatives_spanish:
  - se adherirá
  - quedará pegado
  lexicon: HALOT
  rationale: דבק expresa la imagen concreta de pegarse o adherirse. En español, "se pegará" conserva esa metáfora física con naturalidad y sin debilitarla.
- source_word: בְּיָדְךָ
  english_pob_choice: to your hand
  chosen_spanish: a tu mano
  alternatives_spanish:
  - en tu mano
  - sobre tu mano
  lexicon: HALOT
  rationale: El hebreo usa la preposición ב con "mano" en sentido idiomático de posesión o retención. "A tu mano" mantiene la imagen y funciona bien con "pegarse".
- source_word: מְאוּמָה
  english_pob_choice: nothing
  chosen_spanish: nada
  alternatives_spanish:
  - ninguna cosa
  - nada en absoluto
  lexicon: HALOT
  rationale: Con la negación, el sustantivo significa ausencia total. "Nada" es la forma más natural y exacta en español.
- source_word: הַחֵרֶם
  english_pob_choice: what is devoted to destruction
  chosen_spanish: lo que ha sido consagrado a la destrucción
  alternatives_spanish:
  - lo dedicado al anatema
  - lo que está bajo el anatema
  - lo consagrado al exterminio
  lexicon: HALOT
  rationale: חֵרֶם es un término técnico de consagración irrevocable, frecuentemente con destino a destrucción. "Consagrado a la destrucción" conserva la fuerza del concepto sin recurrir a "anatema", que sería más opaco para lectores modernos.
- source_word: לְמַעַן
  english_pob_choice: so that
  chosen_spanish: para que
  alternatives_spanish:
  - a fin de que
  - con el fin de que
  lexicon: HALOT
  rationale: Introduce propósito. "Para que" es la equivalencia más natural y clara en español.
- source_word: יָשׁוּב יְהוָה מֵחֲרוֹן אַפּוֹ
  english_pob_choice: the LORD may turn from the fierceness of his anger
  chosen_spanish: Yahvé se aparte del ardor de su ira
  alternatives_spanish:
  - Yahvé se vuelva del ardor de su ira
  - Yahvé se desvíe del ardor de su ira
  - Yahvé se aparte de la furia de su ira
  lexicon: HALOT
  rationale: שׁוּב con מִן expresa apartarse o volverse de algo. "Se aparte" comunica el movimiento relacional del texto. "Ardor de su ira" refleja חֲרוֹן אַף como imagen intensa de ira ardiente, sin suavizarla ni sobrecargarla.
- source_word: רַחֲמִים
  english_pob_choice: mercy
  chosen_spanish: misericordia
  alternatives_spanish:
  - compasión
  - misericordia entrañable
  lexicon: HALOT
  rationale: El plural puede denotar misericordia o compasión. "Misericordia" conserva el tono solemne y encaja bien con el verbo הבא "dar" en español, aun cuando el siguiente verbo ya desarrolle la compasión activamente.
- source_word: וְרִחַמְךָ
  english_pob_choice: have compassion on you
  chosen_spanish: tenga compasión de ti
  alternatives_spanish:
  - te compadezca
  - muestre compasión por ti
  lexicon: HALOT
  rationale: Se diferencia del sustantivo previo para no aplanar ambos términos. "Tenga compasión de ti" reproduce bien el sentido verbal y la relación personal.
- source_word: וְהִרְבֶּךָ
  english_pob_choice: multiply you
  chosen_spanish: te multiplique
  alternatives_spanish:
  - te haga numeroso
  - te aumente
  lexicon: HALOT
  rationale: El causativo de רבה conserva la resonancia del lenguaje pactal de multiplicación. "Te multiplique" es preciso y bíblicamente reconocible.
- source_word: כַּאֲשֶׁר נִשְׁבַּע לַאֲבֹתֶיךָ
  english_pob_choice: just as he swore to your fathers
  chosen_spanish: tal como lo juró a tus padres
  alternatives_spanish:
  - como lo juró a tus padres
  - según lo juró a tus padres
  - tal como juró a tus padres
  lexicon: HALOT
  rationale: כַאֲשֶׁר expresa comparación/ajuste; "tal como" preserva el matiz. "Tus padres" mantiene la referencia patriarcal específica del hebreo y del marco del pacto.
theological_decisions:
- issue: Rendering of the divine name יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahveh
  - SEÑOR
  rationale: El texto hebreo usa el Tetragrama directamente. La norma del proyecto es rendirlo como "Yahvé" en el texto principal, conservando el nombre del pacto en lugar de ocultarlo con una convención tipográfica.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Rendering of חֵרֶם
  english_pob_reading: what is devoted to destruction
  chosen_spanish_reading: lo que ha sido consagrado a la destrucción
  alternative_spanish_readings:
  - el anatema
  - lo dedicado al anatema
  - lo destinado al exterminio
  rationale: 'El término tiene una carga técnico-teológica importante: algo puesto irrevocablemente bajo juicio y destrucción. La formulación elegida expone esa tensión sin caer en un tecnicismo opaco ni en una paraphrase doctrinalmente cargada.'
  doctrine_reference: DOCTRINE.md Translation philosophy §§1, 6
- issue: Anthropopathic language for divine anger
  english_pob_reading: the fierceness of his anger
  chosen_spanish_reading: el ardor de su ira
  alternative_spanish_readings:
  - el ardor de su enojo
  - la ferocidad de su ira
  - el fuego de su ira
  rationale: La frase hebrea usa una imagen corporal e intensiva para la ira divina. "Ardor de su ira" conserva el carácter vívido y relacional del hebreo sin neutralizarlo ni volverlo excesivamente literal.
  doctrine_reference: DOCTRINE.md Translation philosophy §§1, 3, 6
- issue: Gender-accurate rendering of אֲבֹתֶיךָ
  english_pob_reading: your fathers
  chosen_spanish_reading: tus padres
  alternative_spanish_readings:
  - tus antepasados
  - tus ancestros
  rationale: El hebreo dice literalmente "tus padres". En español, "padres" puede resultar ambiguo; sin embargo, mantiene la forma patrimonial/covenantal y es aceptable en un registro bíblico sobrio.
  doctrine_reference: DOCTRINE.md Translation philosophy §4
translation_notes:
  revision_awareness: El texto sigue de cerca el sentido y las decisiones lexicales del POB inglés, pero ajusta la formulación al español para mantener naturalidad y precisión. Se conserva la tensión de חֵרֶם mediante una nota, y se mantiene el nombre divino Yahvé conforme a la norma editorial del proyecto. No se introdujeron revisiones textuales adicionales respecto del flujo auditado.
  spanish_consistency_notes:
  - Se usó «Yahvé» de forma consistente para יְהוָה, conforme a la terminología del proyecto.
  - «Lo que ha sido consagrado a la destrucción» mantiene la carga técnica de חֵרֶם sin sustituirla por un equivalente eclesiástico tradicional.
  - «Ardor de su ira» conserva el carácter idiomático de חֲרוֹן אַף y permite la nota explicativa sin redundancia excesiva en el cuerpo del texto.
  - Se diferenciaron «misericordia» y «compasión» para reflejar la distinción entre el sustantivo רַחֲמִים y el verbo וְרִחַמְךָ.
  - «Tus padres» retiene la referencia patriarcal explícita del hebreo y del lenguaje del pacto.
