revisions:
- from: Y hizo fructífero[a] a su pueblo[b] en gran manera, y lo hizo más poderoso que sus adversarios.
  to: Y hizo que su pueblo fuera muy fecundo[a], y lo hizo más poderoso[b] que sus adversarios.
  rationale: La revisión mantiene el mismo sentido y las mismas decisiones exegéticas del expediente inglés, pero mejora la naturalidad del español y alinea correctamente los marcadores de nota con los elementos hebreos pertinentes. «Hizo que su pueblo fuera muy fecundo» preserva la imagen de פרה mejor que «hizo fructífero a su pueblo», y la nota del singular colectivo se ubica donde realmente corresponde, en la segunda cláusula.
