    text: Aquí 'el Santo' se refiere a Dios en el contexto.
    reason: theological_note
  revision_rationale: 'Se ajusta el texto para mejorar la fidelidad al griego y la naturalidad del español: ''esposa'' funciona mejor que ''novia'' en el cuerpo principal; ''de la oración de ustedes'' evita la ambigüedad de ''su oración'' y conserva el singular griego; ''ante el Santo'' refleja mejor ἐνώπιον; e ''igualmente'' reproduce con más precisión ὡσαύτως que un simple ''también''. También se corrige ''estaban enterrando'' a ''estabas enterrando'', ya que el griego cambia de plural en la primera cláusula a singular σοι en la segunda, refiriéndose específicamente a Tobit.'
