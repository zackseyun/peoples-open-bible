translation:
  language: es
  text: ¡Pueblos, bendigan[a] a nuestro Dios, y hagan oír el sonido de su alabanza!
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Alaben a nuestro Dios».'
    reason: lexical_alternative
lexical_decisions:
- source_word: בָּרְכוּ
  english_pob_choice: Bless
  chosen_spanish: Bendigan
  alternatives_spanish:
  - Alaben
  - Bendiguen
  lexicon: HALOT
  rationale: El imperativo plural dirigido a múltiples pueblos conserva mejor su fuerza exhortativa con «Bendigan». En español bíblico, «bendecir» a Dios puede significar alabarlo; «alaben» sería una alternativa válida, pero «bendigan» mantiene más cerca el verbo hebreo sin perder intelligibilidad.
- source_word: עַמִּים
  english_pob_choice: O peoples
  chosen_spanish: pueblos
  alternatives_spanish:
  - naciones
  - pueblos,
  - ustedes, pueblos
  lexicon: HALOT
  rationale: El vocativo plural se expresa naturalmente con «pueblos». «Naciones» también es posible, pero «pueblos» conserva mejor el matiz colectivo y étnico del hebreo.
- source_word: אֱלֹהֵינוּ
  english_pob_choice: our God
  chosen_spanish: nuestro Dios
  alternatives_spanish:
  - el Dios nuestro
  lexicon: HALOT
  rationale: La forma con sufijo de 1ª plural se vierte directamente como «nuestro Dios», preservando la perspectiva comunitaria del salmista.
- source_word: וְהַשְׁמִיעוּ
  english_pob_choice: make ... heard
  chosen_spanish: hagan oír
  alternatives_spanish:
  - hagan que se oiga
  - proclamen
  - hagan sonar
  lexicon: HALOT
  rationale: 'El hiphil imperativo de שמע tiene valor causativo: «hacer oír». «Hagan oír» comunica esa causación de modo natural en español y evita una paráfrasis excesiva como «proclamen».'
- source_word: קוֹל
  english_pob_choice: the sound
  chosen_spanish: el sonido
  alternatives_spanish:
  - la voz
  lexicon: HALOT
  rationale: Aquí קול refiere al aspecto audible de la alabanza; «el sonido» es la opción más directa y coherente con el causativo de «hacer oír». «La voz» también es posible, pero en español puede sonar más personificante.
- source_word: תְּהִלָּתוֹ
  english_pob_choice: his praise
  chosen_spanish: su alabanza
  alternatives_spanish:
  - alabanza a él
  - su loor
  lexicon: HALOT
  rationale: El sufijo masculino singular permite entender la alabanza como perteneciente a Dios o dirigida a él. «Su alabanza» conserva esa ambigüedad productiva sin resolverla en exceso; «alabanza a él» explícita la dirección, pero va más allá de la forma del hebreo.
theological_decisions:
- issue: Valor del posesivo en תְּהִלָּתוֹ
  english_pob_reading: his praise
  chosen_spanish_reading: su alabanza
  alternative_spanish_readings:
  - alabanza a él
  - alabanza dirigida a él
  rationale: El hebreo admite tanto posesión/referencia («su alabanza») como un sentido dirigido a Dios. Mantener «su alabanza» preserva la tensión sin cerrarla, en línea con la política de la POB de no resolver dogmáticamente una ambigüedad que el texto permite.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: El inglés POB pasó por una revisión menor en la segunda cláusula para reflejar con más claridad el imperativo causativo de «make heard». La versión española refleja directamente ese causativo con «hagan oír», sin adoptar una forma permisiva.
  spanish_consistency_notes:
  - Se mantiene «Dios» para אֱלֹהֵינוּ conforme al criterio POB.
  - Se usa el plural vocativo sin pronombre explícito, porque el hebreo interpela a los pueblos de forma directa.
  - «Su alabanza» conserva la ambigüedad del sufijo hebreo sin convertirla en una paráfrasis interpretativa.
