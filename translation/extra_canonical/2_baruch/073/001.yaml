translation:
  text: |-
    1. And it shall be, after he has brought low all that is in the world, and has sat down in peace forever on the throne of his kingdom, then joy will be revealed, and rest will appear.[a]
    
    2. And then healing will descend in dew,[b] and anxiety will be quieted, and misery and disease and groanings will flee from the sons of men; and gladness will be in all the earth.
    
    3. And no one will again die before his time, nor will any sudden adversity come to pass.
    
    4. And judgments, and accusations, and contentions, and retaliations, and bloodshed, and cravings, and envy, and hatred, and everything like these will pass away into condemnation when they are removed.
    
    5. For these are the things that filled this world with evils, and because of these the life of mankind was greatly troubled.[c]
