translation:
  language: es
  text: Ciertamente he edificado para ti una casa exaltada[a], un lugar fijo para que habites[b] para siempre.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O “una morada elevada” o “una morada excelsa”. El hebreo זְבֻל designa una morada exaltada.
    reason: lexical_alternative
  - marker: b
    text: O “un lugar fijo para tu morada”.
    reason: lexical_alternative
lexical_decisions:
- source_word: בָּנֹה בָנִיתִי
  english_pob_choice: I have indeed built
  chosen_spanish: Ciertamente he edificado
  alternatives_spanish:
  - Sin duda he edificado
  - He edificado, sí, he edificado
  lexicon: HALOT
  rationale: La infinitiva absoluta antes del verbo finito intensifica la acción. En español, «ciertamente» transmite ese énfasis con naturalidad y dignidad, sin repetir de forma torpe el verbo.
- source_word: בֵּית
  english_pob_choice: house
  chosen_spanish: casa
  alternatives_spanish:
  - casa
  - templo
  lexicon: HALOT
  rationale: El hebreo dice literalmente «casa». «Casa» preserva la imagen básica y el valor teológico de la expresión, aunque el referente sea el templo. «Templo» explicita el referente, pero pierde la resonancia literal del hebreo.
- source_word: זְבֻל
  english_pob_choice: exalted
  chosen_spanish: exaltada
  alternatives_spanish:
  - elevada
  - majestuosa
  - morada exaltada
  lexicon: HALOT
  rationale: El sustantivo puede expresar una morada elevada o excelsa. En español, convertirlo en adjetivo unido a «casa» comunica bien la idea de altura/dignidad sin introducir una paráfrasis excesiva.
- source_word: לָךְ
  english_pob_choice: you
  chosen_spanish: para ti
  alternatives_spanish:
  - para ti
  - te
  lexicon: HALOT
  rationale: El complemento preposicional marca dirección y beneficio. «Para ti» conserva esa relación de destinatario de manera clara en español.
- source_word: מָכוֹן
  english_pob_choice: a settled place
  chosen_spanish: un lugar fijo
  alternatives_spanish:
  - un lugar establecido
  - un lugar asentado
  - un lugar permanente
  lexicon: HALOT
  rationale: El término indica un lugar establecido o firme. «Lugar fijo» comunica estabilidad y permanencia de forma natural; el matiz de morada queda reforzado por la cláusula siguiente.
- source_word: לְשִׁבְתְּךָ
  english_pob_choice: for you to dwell
  chosen_spanish: para que habites
  alternatives_spanish:
  - para tu morada
  - para que te sientes / para tu entronización
  lexicon: HALOT
  rationale: De ישׁב, «habitar» funciona bien en contexto de templo y evita decidir prematuramente entre «sentarse» y «dwell». «Para que habites» preserva el propósito verbal del hebreo.
- source_word: עוֹלָמִים
  english_pob_choice: forever
  chosen_spanish: para siempre
  alternatives_spanish:
  - por los siglos
  - perpetuamente
  - para siempre jamás
  lexicon: HALOT
  rationale: El plural intensifica la duración. «Para siempre» es la manera más natural en español moderno y transmite adecuadamente la permanencia.
theological_decisions:
- issue: Si el lenguaje del templo debe suavizarse hacia una paráfrasis funcional o mantenerse como casa/lugar de morada
  english_pob_reading: Retain the language of dwelling without qualifying it away
  chosen_spanish_reading: Mantener el lenguaje de «casa» y «habites», sin sustituirlo por una paráfrasis explicativa
  alternative_spanish_readings:
  - «un lugar donde seas adorado»
  - «una morada para tu nombre»
  - «un templo para tu presencia»
  rationale: El hebreo afirma de manera directa una casa y un lugar para que Dios habite. La traducción debe conservar ese lenguaje pactal del templo en esta misma frase, sin importar aclaraciones interpretativas posteriores al texto.
  doctrine_reference: Translation philosophy §1, §3
translation_notes:
  revision_awareness: No se registran revisiones aplicadas; el estado de revisión más reciente indica que no hubo cambios necesarios y la revisión cruzada mostró alta concordancia.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» solo cuando el texto fuente lo exija; aquí el versículo usa lenguaje directo de segunda persona dirigido a Dios, sin el nombre divino explícito.
  - Se conserva la metáfora de «casa» y no se reemplaza por «templo» en el cuerpo principal, siguiendo el valor literal del hebreo y la auditoría en inglés.
  - Se usa «habites» para reflejar el infinitivo de propósito y evitar una interpretación de entronización no explicitada por el verso.
