translation:
  language: es
  text: O si lo hirió con su mano, en enemistad, y murió[a], el que lo hirió ciertamente se le dará muerte; es un asesino[b]. El vengador de la sangre dará muerte al asesino cuando lo encuentre.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «con odio» o «por hostilidad» para «en enemistad».
    reason: lexical_alternative
  - marker: b
    text: O «el pariente-vengador de la sangre».
    reason: lexical_alternative
lexical_decisions:
- source_word: בְּאֵיבָה
  english_pob_choice: in enmity
  chosen_spanish: en enemistad
  alternatives_spanish:
  - con odio
  - por hostilidad
  lexicon: HALOT
  rationale: La preposición hebrea conserva la relación de estado o actitud hostil; «en enemistad» mantiene esa fuerza legal sin volverla más interpretativa de lo que exige el texto.
- source_word: הִכָּהוּ בְיָדוֹ
  english_pob_choice: struck him with his hand
  chosen_spanish: lo hirió con su mano
  alternatives_spanish:
  - lo golpeó con su mano
  - lo hirió con la mano
  lexicon: HALOT
  rationale: «Herir» funciona como verbo jurídico amplio para נכה y conserva el registro del caso legal. «Con su mano» mantiene el detalle corporal del medio de agresión.
- source_word: וַיָּמֹת
  english_pob_choice: and he died
  chosen_spanish: y murió
  alternatives_spanish:
  - y entonces murió
  - y así murió
  lexicon: HALOT
  rationale: La forma narrativa simple del hebreo se refleja mejor con una coordinación directa en español, sin añadir causalidad explícita que el texto no formula aquí.
- source_word: מוֹת יוּמַת
  english_pob_choice: must surely be put to death
  chosen_spanish: ciertamente debe morir
  alternatives_spanish:
  - será muerto ciertamente
  - debe ser ejecutado
  lexicon: HALOT
  rationale: La construcción enfática se conserva con «ciertamente» y un modal de obligación. Se evita «ejecutado» porque el hebreo formula la pena de muerte en términos legales directos, no técnicos modernos.
- source_word: הַמַּכֶּה
  english_pob_choice: the one who struck him
  chosen_spanish: el que lo hirió
  alternatives_spanish:
  - el que lo golpeó
  - el agresor
  lexicon: HALOT
  rationale: «El que lo hirió» mantiene la referencia al responsable del golpe sin introducir una abstracción excesiva; en español, esta expresión fluye de manera natural y sigue siendo transparente al verbo מקור.
- source_word: רֹצֵחַ הוּא
  english_pob_choice: he is a murderer
  chosen_spanish: es un homicida
  alternatives_spanish:
  - es un asesino
  - es un homicida intencional
  lexicon: HALOT
  rationale: En este contexto legal, el término español «homicida» comunica la responsabilidad penal y moral del acto sin sonar tan coloquial o tan cargado como «asesino». Mantiene la distinción con una muerte accidental.
- source_word: גֹּאֵל הַדָּם
  english_pob_choice: the avenger of blood
  chosen_spanish: El vengador de la sangre
  alternatives_spanish:
  - El vengador de sangre
  - El redentor de la sangre
  lexicon: HALOT
  rationale: Se conserva el título jurídico tradicional del pasaje, pero en una forma castellana clara. «Redentor» se evita en el texto principal porque aquí la función inmediata es vengar judicialmente, no solo rescatar.
- source_word: יָמִית
  english_pob_choice: shall put ... to death
  chosen_spanish: hará morir
  alternatives_spanish:
  - dará muerte
  - lo matará
  lexicon: HALOT
  rationale: «Hará morir» reproduce el valor causativo del verbo y mantiene el tono jurídico-legal del mandato sin reducirlo a un simple acto violento.
- source_word: בְּפִגְעוֹ בוֹ
  english_pob_choice: when he meets him
  chosen_spanish: cuando lo encuentre
  alternatives_spanish:
  - cuando lo halle
  - cuando se encuentre con él
  lexicon: HALOT
  rationale: La frase indica el momento del encuentro con el homicida. «Cuando lo encuentre» es natural en español y conserva la idea de topar con él en el contexto legal del pasaje.
theological_decisions:
- issue: Categoría legal del homicidio intencional
  english_pob_reading: murderer
  chosen_spanish_reading: homicida
  alternative_spanish_readings:
  - asesino
  - autor de homicidio
  rationale: El contexto de enemistad excluye la muerte accidental. «Homicida» conserva la fuerza legal y moral de la culpa sin cargar el texto con un matiz más coloquial o más interpretativo que «asesino».
  doctrine_reference: Ley de talión y distinción entre homicidio intencional y muerte accidental en Números 35
- issue: Título גֹּאֵל הַדָּם
  english_pob_reading: the avenger of blood
  chosen_spanish_reading: El vengador de la sangre
  alternative_spanish_readings:
  - El vengador de sangre
  - El vengador-sangrador
  rationale: Se mantiene la institución legal del go'el de sangre sin reemplazarla por lenguaje eclesiástico. «Vengador de la sangre» preserva la función inmediata del personaje en este contexto judicial.
  doctrine_reference: Institución del vengador de sangre en la legislación mosaica (Números 35; Deuteronomio 19; Josué 20)
translation_notes:
  revision_awareness: 'Se mantuvo la lectura revisada del inglés POB sin cambios sustanciales: la estructura legal, el paralelismo entre el golpe mortal y la pena, y el título del vengador de sangre coinciden con el último pase de revisión y con el acuerdo alto del control cruzado.'
  spanish_consistency_notes:
  - Se prefirió «Yahvé» en todo nombre divino, pero este versículo no lo contiene.
  - «Homicida» se reservó para el culpable de muerte intencional; no se usó «siervo» ni vocabulario ceremonial ajeno al contexto legal.
  - El título legal se tradujo de manera estable como «el vengador de la sangre» para conservar consistencia interna con la legislación de Números 35.
  - 'Se evitó suavizar la sanción penal: el hebreo legal exige una formulación fuerte de muerte obligatoria, reflejada con «ciertamente debe morir» y «hará morir».'
