translation:
  language: es
  text: El rey siguió negociando con los de Bethsura, dio y recibió garantías de buena fe[a], y se fue[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literalmente, “dio y recibió la diestra”, un modismo para intercambiar garantías o seguridades de acuerdo.
    reason: lexical_alternative
  - marker: b
    text: Bethsura también puede traducirse “Beth-zur”, reflejando el topónimo hebreo detrás de la forma griega.
    reason: alternative_reading
lexical_decisions:
- source_word: ἐδευτερολόγησεν
  english_pob_choice: negotiated further
  chosen_spanish: negoció más
  alternatives_spanish:
  - volvió a negociar
  - reabrió las negociaciones
  - habló por segunda vez
  lexicon: LSJ
  rationale: El verbo sugiere literalmente una acción “por segunda vez”, pero en este contexto político-militar el sentido natural es la continuación o reanudación de una negociación. “Negoció más” conserva la idea de prosecución sin volverlo demasiado interpretativo.
- source_word: τοῖς ἐν Βαθσούροις
  english_pob_choice: with those in Bethsura
  chosen_spanish: con los de Bet-sur
  alternatives_spanish:
  - con los que estaban en Bet-sur
  - con los habitantes de Bet-sur
  lexicon: LSJ
  rationale: La frase se refiere a los que estaban en ese lugar. “Los de Bet-sur” es natural en español y evita precisar más de lo que da el griego respecto de su condición.
- source_word: Βαθσούροις
  english_pob_choice: Bethsura
  chosen_spanish: Bet-sur
  alternatives_spanish:
  - Bethsura
  - Beth-zur
  lexicon: transliteración histórica del topónimo
  rationale: Se adopta la forma hebraizada/estándar en español bíblico para el nombre del lugar. La forma griega subyacente admite también otras transliteraciones, por eso se consigna la alternativa.
- source_word: δεξιὰν ἔδωκεν, ἔλαβεν
  english_pob_choice: gave and received pledges of good faith
  chosen_spanish: dio y recibió garantías de buena fe
  alternatives_spanish:
  - dio y recibió la diestra
  - intercambió juramentos de paz
  - dio y recibió garantías
  lexicon: LSJ
  rationale: 'La expresión es idiomática: literalmente “dio y recibió la diestra”. En español, “garantías de buena fe” comunica el valor pactal/político del gesto sin perder el carácter de acuerdo solemne.'
- source_word: ἀπῇει
  english_pob_choice: went away
  chosen_spanish: se fue
  alternatives_spanish:
  - partió
  - se retiró
  - marchó
  lexicon: LSJ
  rationale: Verbo narrativo simple de salida o partida. “Se fue” es claro, natural y suficientemente directo para el cierre de la escena.
translation_notes:
  revision_awareness: 'La versión sigue el griego de Swete 1909 y el aparato auditado en inglés de la POB, manteniendo la equivalencia óptima: conserva el desarrollo narrativo, explicita el valor idiomático de la “diestra” y adopta una forma española natural del topónimo sin borrar la alternativa griega/hebraizante.'
  spanish_consistency_notes:
  - Se mantiene “Bet-sur” como forma principal del topónimo, con nota de alternativa.
  - “Garantías de buena fe” traduce el gesto diplomático sin forzar un literalismo opaco.
  - No hay decisiones doctrinales en este versículo; el texto es puramente narrativo/político.
