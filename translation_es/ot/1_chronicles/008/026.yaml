lexical_decisions:
- source_word: שַׁמְשְׁרַי
  english_pob_choice: Shamshrai
  chosen_spanish: Shamshrai
  alternatives_spanish:
  - Shamsherai
  - Shamsharay
  lexicon: HALOT
  rationale: Es un nombre propio en una lista genealógica; en español se translitera, no se traduce. Mantengo la forma inglesa POB porque reproduce de manera directa y reconocible la secuencia consonántica hebrea y evita introducir una adaptación no atestiguada.
- source_word: שְׁחַרְיָה
  english_pob_choice: Sheharyah
  chosen_spanish: Sheharyah
  alternatives_spanish:
  - Shehariah
  - Shahariah
  lexicon: HALOT
  rationale: Nombre propio en contexto genealógico; la transliteración conserva el elemento final -yah y la transparencia del hebreo. La forma POB inglesa se conserva en español por fidelidad y consistencia onomástica.
- source_word: עֲתַלְיָה
  english_pob_choice: Athaliah
  chosen_spanish: Athaliah
  alternatives_spanish:
  - Ataliah
  lexicon: HALOT
  rationale: Nombre propio; la transliteración establecida en inglés es clara y ampliamente reconocible. En español se mantiene como nombre propio transliterado, sin sustituirlo por una forma tradicional distinta que no surge del texto hebreo.
- source_word: וְ / וּ / וַ
  english_pob_choice: and
  chosen_spanish: y
  alternatives_spanish:
  - e
  lexicon: HALOT
  rationale: Cada waw une nombres en una serie. En español, la conjunción normal es 'y'; no se requiere 'e' aquí porque la siguiente palabra no comienza con sonido /i/.
