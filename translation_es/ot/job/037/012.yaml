translation:
  language: es
  text: Va girando de un lado a otro[a] por su guía[b], para cumplir todo lo que les ordena sobre la faz del mundo habitado de la tierra[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘en círculos’ o ‘dando vueltas’; el hebreo subraya un movimiento repetido y circular.
    reason: lexical_alternative
  - marker: b
    text: O ‘por su dirección’ o ‘por su conducción’; el término hebreo sugiere guía hábil o control orientador.
    reason: lexical_alternative
  - marker: c
    text: 'Hebreo: ‘el mundo habitado, hacia la tierra/tierramente’; una expresión en capas para el mundo terrestre.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהוּא
  english_pob_choice: It
  chosen_spanish: Se mueve
  alternatives_spanish:
  - Él se mueve
  - Eso se mueve
  lexicon: HALOT
  rationale: El hebreo presenta un singular masculino, pero en el contexto inmediato se trata de un fenómeno meteorológico bajo el control de Dios. En español, un sujeto implícito impersonal con verbo pronominal suena natural y conserva la referencia contextual sin forzar una personificación.
- source_word: מְסִבּוֹת
  english_pob_choice: around and around
  chosen_spanish: de un lado a otro [a]
  alternatives_spanish:
  - en círculos
  - una y otra vez
  - dando vueltas
  lexicon: HALOT
  rationale: La forma expresa movimiento repetido y circular. ‘De un lado a otro’ reproduce la idea de desplazamiento reiterado en español natural; la nota preserva la alternativa más estrictamente circular del hebreo.
- source_word: מִתְהַפֵּךְ
  english_pob_choice: turns
  chosen_spanish: Se mueve
  alternatives_spanish:
  - da vueltas
  - gira
  - se vuelve
  lexicon: HALOT
  rationale: El hitpael indica girar o cambiar de dirección. Junto con el adverbio de movimiento repetido, ‘Se mueve’ comunica el proceso sin añadir violencia ni especificar un giro técnico.
- source_word: בְּתַחְבֻּלֹתוֹ
  english_pob_choice: by his guidance
  chosen_spanish: por su dirección
  alternatives_spanish:
  - por su guía
  - por su conducción
  - por su consejo
  lexicon: HALOT
  rationale: El término puede sugerir dirección sabia, gobierno o conducción hábil. ‘Dirección’ mantiene el matiz de control orientador y resulta transparente en español, sin reducirlo a una mera ‘guía’ informal.
- source_word: לְפָעֳלָם
  english_pob_choice: to accomplish
  chosen_spanish: para cumplir
  alternatives_spanish:
  - para hacer
  - para llevar a cabo
  - para realizar
  lexicon: HALOT
  rationale: 'La forma expresa finalidad: aquello para lo que se mueve. ‘Cumplir’ conserva la idea de ejecución de lo asignado y encaja bien con el mandato implícito.'
- source_word: כֹּל אֲשֶׁר
  english_pob_choice: all that
  chosen_spanish: todo lo que
  alternatives_spanish:
  - todo cuanto
  - todo aquello que
  lexicon: HALOT
  rationale: Es la correspondencia directa y natural del relativo comprehensivo.
- source_word: יְצַוֵּם
  english_pob_choice: he commands them
  chosen_spanish: les ordena
  alternatives_spanish:
  - les manda
  - les dispone
  - les encomienda
  lexicon: HALOT
  rationale: El verbo צוה en piel normalmente significa ordenar o mandar. ‘Les ordena’ preserva el mandato directo y evita una traducción demasiado suave.
- source_word: עַל־פְּנֵי
  english_pob_choice: over the face of
  chosen_spanish: sobre la faz de
  alternatives_spanish:
  - sobre
  - a través de
  - por encima de
  lexicon: HALOT
  rationale: La locución espacial se conserva con una forma bastante literal, válida y comprensible en español bíblico contemporáneo.
- source_word: תֵבֵל
  english_pob_choice: the inhabited world
  chosen_spanish: el mundo habitado
  alternatives_spanish:
  - la tierra habitada
  - el orbe habitado
  - la tierra poblada
  lexicon: HALOT
  rationale: ‘Mundo habitado’ reproduce el matiz de tierra habitada, no solo planeta físico, y mantiene la imagen del ámbito humano de la acción divina.
- source_word: אָרְצָה
  english_pob_choice: on the earth
  chosen_spanish: de la tierra [c]
  alternatives_spanish:
  - hacia la tierra
  - sobre la tierra
  - a la tierra
  lexicon: HALOT
  rationale: El sufijo direccional refuerza la referencia terrestre. Dado que sigue a ‘mundo habitado’, ‘de la tierra’ conserva la construcción sin recargarla con redundancia extraña; la nota deja constancia de la alternativa direccional.
theological_decisions:
- issue: Referente singular en un contexto meteorológico
  english_pob_reading: The verse describes weather phenomena/clouds under God's sovereign direction.
  chosen_spanish_reading: El verso describe un fenómeno del clima, probablemente nubes o masas de tormenta, bajo la dirección soberana de Dios.
  alternative_spanish_readings:
  - Describe específicamente una nube
  - Describe de manera más general sistemas de tormenta o viento
  rationale: El contexto inmediato de Job 37 trata de nubes, relámpagos y tormenta. La traducción mantiene el referente amplio y no impone una identificación más estrecha de la necesaria, respetando la ambigüedad útil del hebreo.
  doctrine_reference: Providencia y soberanía divina sobre la creación
translation_notes:
  revision_awareness: 'El borrador sigue la revisión más reciente del POB en inglés: se evita una repetición demasiado literal (‘around and around’) y se conserva la construcción final como referencia al ‘mundo habitado de la tierra’, en lugar de simplificarla a una frase plana. También se mantiene el tono meteorológico amplio del contexto de Job 37.'
  spanish_consistency_notes:
  - Se conserva ‘Dios’ implícito en ‘su dirección’ siguiendo el contexto, sin introducir el nombre divino porque el versículo no lo expresa de forma directa.
  - ‘Mundo habitado’ y ‘faz’ mantienen el registro bíblico con español actual y no dependen de un calco rígido.
  - 'La secuencia verbal busca naturalidad: movimiento repetido + causa/medio + propósito + extensión espacial, sin perder la tensión semántica del hebreo.'
