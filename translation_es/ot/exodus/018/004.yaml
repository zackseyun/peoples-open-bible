translation:
  language: es
  text: Y el nombre del otro fue Eliezer[a], porque el Dios de mi padre fue mi ayuda, y me libró de la espada de Faraón.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'El hebreo simplemente dice: «porque el Dios de mi padre fue mi ayuda, y me libró de la espada de Faraón», sin un «dijo» explícito.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְשֵׁם
  english_pob_choice: And the name
  chosen_spanish: Y el nombre
  alternatives_spanish:
  - Y el nombre de
  lexicon: HALOT
  rationale: Mantiene la fórmula narrativa de introducción del nombre y conserva la conjunción inicial del hebreo sin recargar el español.
- source_word: הָאֶחָד
  english_pob_choice: the other
  chosen_spanish: del otro
  alternatives_spanish:
  - del uno
  - del segundo
  lexicon: HALOT
  rationale: En contexto, después de haber sido nombrado el primer hijo en el versículo anterior, la expresión funciona idiomáticamente como 'el otro'. 'Del otro' suena natural en español y conserva la referencia contrastiva.
- source_word: אֱלִיעֶזֶר
  english_pob_choice: Eliezer
  chosen_spanish: Eliezer
  lexicon: HALOT
  rationale: Nombre propio transliterado de manera estándar.
- source_word: כִּי
  english_pob_choice: for
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  lexicon: HALOT
  rationale: Introduce la explicación causal del nombre. 'Porque' expresa con claridad la relación explicativa en español moderno y conserva el valor justificativo del hebreo.
- source_word: אֱלֹהֵי אָבִי
  english_pob_choice: The God of my father
  chosen_spanish: el Dios de mi padre
  alternatives_spanish:
  - mi padre Dios
  - el Dios de mi padre
  lexicon: HALOT
  rationale: Respeta la construcción de posesión y conserva el matiz de referencia al Dios del linaje paterno, importante en el contexto de pacto.
- source_word: בְּעֶזְרִי
  english_pob_choice: was my help
  chosen_spanish: fue mi ayuda
  alternatives_spanish:
  - estuvo en mi ayuda
  - me ayudó
  lexicon: HALOT
  rationale: El sustantivo עֵזֶר con sufijo de primera persona se rinde naturalmente como 'mi ayuda'; el pretérito 'fue' encaja con la rememoración retrospectiva del motivo del nombre.
- source_word: וַיַּצִּלֵנִי
  english_pob_choice: and he delivered me
  chosen_spanish: y me libró
  alternatives_spanish:
  - y me rescató
  - y me salvó
  lexicon: HALOT
  rationale: נצל puede significar 'librar' o 'rescatar'. 'Me libró' es una opción digna y precisa en español bíblico, sin forzar un registro arcaizante.
- source_word: מֵחֶרֶב פַּרְעֹה
  english_pob_choice: from Pharaoh’s sword
  chosen_spanish: de la espada de Faraón
  alternatives_spanish:
  - de la espada de Faraón
  - de la espada del Faraón
  lexicon: HALOT
  rationale: Se conserva la imagen concreta de la 'espada', que en hebreo puede representar el poder mortal de Faraón. 'Faraón' se mantiene como nombre/título reconocido en español bíblico.
theological_decisions:
- issue: Sujeto implícito en la explicación del nombre
  english_pob_reading: No explicit 'he said' in the source; the clause is simply the naming explanation
  chosen_spanish_reading: No se añade 'dijo'; la cláusula queda como explicación causal del nombre
  alternative_spanish_readings:
  - 'porque dijo: ...'
  - 'pues dijo: ...'
  rationale: El hebreo no contiene un verbo de decir. En español conviene evitar introducirlo, para no añadir un elemento narrativo que el texto no documenta.
  doctrine_reference: Fidelidad textual y economía exegética
- issue: Concreción de 'sword' como imagen del peligro de Faraón
  english_pob_reading: Literal 'Pharaoh’s sword' preserved as a lethal threat or power
  chosen_spanish_reading: '''la espada de Faraón'' conserva la imagen literal y su fuerza de amenaza'
  alternative_spanish_readings:
  - el poder de Faraón
  - la amenaza de Faraón
  rationale: La imagen de la espada es parte del énfasis narrativo. Mantenerla evita suavizar el peligro y respeta la metáfora concreta del hebreo.
  doctrine_reference: Preservación de imaginería bíblica
translation_notes:
  revision_awareness: La versión española sigue la revisión más reciente del POB en inglés, que eliminó 'he said' por no estar en el texto fuente. Por eso la frase se presenta solo como explicación causal del nombre, sin verbo de habla añadido.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' como norma general del proyecto, pero este versículo no contiene el nombre divino y por eso no aparece aquí.
  - Se usó 'Dios' para אֱלֹהֵי, en una construcción relacional/covenantal.
  - Se eligió 'me libró' para נצל por su tono sobrio y natural en español bíblico.
  - Se conserva 'Faraón' con mayúscula como designación propia/titular en el contexto narrativo.
