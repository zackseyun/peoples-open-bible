base_translation:
  language: en
  yaml_path: translation/ot/daniel/011/035.yaml
  text: And some of those who have insight will stumble[a], in order to refine them, to purify, and to make them white, until the time of the end[d][c][b]; for it is still for the appointed time.
  footnotes:
  - marker: a
    text: Or 'will fall.' The Hebrew verb keeps the image of stumbling and may refer to downfall through persecution or trial.
    reason: lexical_alternative
  - marker: b
    text: Or 'by them' or 'through them' for 'among them'; the Hebrew phrase is concise and may indicate the refining occurs within this group or through what happens to them.
    reason: lexical_alternative
  - marker: c
    text: '''Made white'' is a literal rendering of the Hebrew image, expressing cleansing or purification.'
    reason: lexical_alternative
  - marker: d
    text: Or 'for the appointed time is yet to come.'
    reason: alternative_reading
