  to: Por mi propia causa[a], por mi propia causa, actuaré; pues ¿cómo podría ser profanado? Y mi gloria no la daré a otro.
  rationale: 'Se hace una reparación menor de estilo y puntuación: ''pues'' refleja mejor el valor explicativo de כִּי en esta construcción retórica, y la nota se normaliza para español natural y correcto. Se conserva la ambigüedad deliberada del hebreo en ''¿cómo podría ser profanado?'' y el resto del texto permanece fiel al original y a la auditoría inglesa.'
