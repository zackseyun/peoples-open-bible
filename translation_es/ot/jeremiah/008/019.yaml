  revision_rationale: La revisión corrige el nombre divino al estándar español del proyecto («Yahvé»), hace el constructo hebreo más natural en español («el clamor») manteniendo la literalidad en nota, refuerza el matiz causativo de הִכְעִסוּנִי con «me provocaron a ira», y coloca «ídolos extranjeros» en el texto principal para conservar con claridad el referente de הבלי נכר, dejando «vanidades extranjeras» como alternativa explicativa. También se ajusta «su Rey» para reflejar mejor la decisión teológica documentada y se simplifica la puntuación para una lectura más natural.
