revisions:
- from: Porque no fija más tiempo a un hombre para ir a Dios en juicio[a].
  to: Porque no fija más tiempo a un hombre para ir ante Dios en juicio[a].
  rationale: Se ajusta «a Dios» a «ante Dios» para preservar el sentido forense documentado en la auditoría inglesa y mejorar la naturalidad del español. También se corrige y clarifica la nota al pie para reflejar mejor la lectura alternativa basada en עוֹד y la compresión del hebreo.
