translation:
  language: es
  text: 'Por eso Daniel fue a ver a Arioc[a], a quien el rey había nombrado para destruir a los sabios de Babilonia. Fue y le dijo así: «No destruyas a los sabios de Babilonia. Hazme entrar ante el rey, y yo mostraré al rey la interpretación[b]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «entró a ver a Arioc» o «se presentó ante Arioc». El verbo arameo puede referirse a ir a alguien o entrar en su presencia; aquí se entiende el acercamiento en un contexto de corte.
    reason: lexical_alternative
  - marker: b
    text: O «daré a conocer la interpretación al rey». El verbo arameo puede significar «mostrar» o «hacer saber».
    reason: lexical_alternative
lexical_decisions:
- source_word: כָּל קֳבֵל דְּנָה
  english_pob_choice: Therefore
  chosen_spanish: Por eso
  alternatives_spanish:
  - Por tanto
  - Así que
  lexicon: HALOT
  rationale: La expresión aramea marca consecuencia o enlace discursivo. «Por eso» comunica bien la relación lógica en español sin sonar rígido.
- source_word: עַל עַל־אַרְיוֹךְ
  english_pob_choice: went in to Arioch
  chosen_spanish: fue ante Arioc
  alternatives_spanish:
  - fue a Arioc
  - se presentó ante Arioc
  lexicon: HALOT
  rationale: El verbo puede implicar acercarse o entrar en audiencia. «Fue ante Arioc» mantiene la escena de corte y la idea de acceso formal, sin forzar un calco.
- source_word: דִּי מַנִּי מַלְכָּא
  english_pob_choice: whom the king had appointed
  chosen_spanish: a quien el rey había nombrado
  alternatives_spanish:
  - a quien el rey había asignado
  - a quien el rey había comisionado
  lexicon: HALOT
  rationale: «Nombrado» expresa con naturalidad la designación oficial de Arioch. Conserva la función administrativa del participio sin añadir más contenido del que da el texto.
- source_word: לְהוֹבָדָה
  english_pob_choice: to destroy
  chosen_spanish: para destruir
  alternatives_spanish:
  - para matar
  - para hacer perecer
  lexicon: HALOT
  rationale: Sigo la decisión léxica del POB inglés de mantener el valor amplio de «destruir». En el contexto del decreto de ejecución, el español permite esa amplitud sin estrecharlo solo a «matar».
- source_word: לְחַכִּימֵי בָבֶל
  english_pob_choice: the wise men of Babylon
  chosen_spanish: a los sabios de Babilonia
  alternatives_spanish:
  - a los sabios babilonios
  lexicon: HALOT
  rationale: «Sabios» es el equivalente natural para el grupo cortesano de Daniel. Se conserva la relación de pertenencia con Babilonia mediante «de Babilonia».
- source_word: אֲזַל וְכֵן אֲמַר לֵהּ
  english_pob_choice: He went and said this to him
  chosen_spanish: Fue y le dijo así
  alternatives_spanish:
  - Fue y le habló así
  - Fue y le dijo estas palabras
  lexicon: HALOT
  rationale: La secuencia de movimiento más habla se conserva de forma breve y fluida. «Así» refleja el valor de «then/thus» sin necesidad de expandir más.
- source_word: אַל תְּהוֹבֵד
  english_pob_choice: Do not destroy
  chosen_spanish: No destruyas
  alternatives_spanish:
  - No mates
  - No hagas perecer
  lexicon: HALOT
  rationale: Mantengo la misma raíz semántica que en la primera mención del verbo para conservar consistencia léxica. En español, «destruyas» funciona bien como imperativo negativo.
- source_word: הַעֵלְנִי
  english_pob_choice: Bring me in
  chosen_spanish: Hazme entrar
  alternatives_spanish:
  - Tráeme
  - Llévame ante
  lexicon: HALOT
  rationale: El causativo de על implica hacer pasar o introducir a alguien. «Hazme entrar» conserva la fuerza causativa y suena natural en español.
- source_word: קֳדָם מַלְכָּא
  english_pob_choice: before the king
  chosen_spanish: ante el rey
  alternatives_spanish:
  - en presencia del rey
  lexicon: HALOT
  rationale: «Ante el rey» expresa bien la relación de presencia/corte. Es idiomático y equivalente al uso arameo de «delante de».
- source_word: וּפִשְׁרָא
  english_pob_choice: the interpretation
  chosen_spanish: la interpretación
  alternatives_spanish:
  - la explicación
  lexicon: HALOT
  rationale: En Daniel, פשר es un término técnico para la interpretación de un sueño o misterio. «Interpretación» preserva ese uso especializado.
- source_word: אֲחַוֵּא
  english_pob_choice: I will show
  chosen_spanish: yo le mostraré
  alternatives_spanish:
  - yo haré saber
  - yo le daré a conocer
  lexicon: HALOT
  rationale: «Mostraré» sigue la decisión inglesa y funciona bien con el objeto «la interpretación». El complemento indirecto «le» mantiene la referencia al rey en español.
translation_notes:
  revision_awareness: Se siguió de cerca el audit trail inglés de la POB, conservando el valor discursivo de «therefore», la doble secuencia de movimiento y habla, y la repetición léxica de «destroy». La versión española ajusta el orden y la idiomaticidad para lectura natural, sin perder las tensiones léxicas del original arameo.
  spanish_consistency_notes:
  - Se usa «Yahvé» como término por defecto cuando aparezca el nombre divino; en este versículo no aparece.
  - Se mantiene «sabios de Babilonia» para el grupo cortesano, en continuidad con la terminología del pasaje.
  - «Interpretación» se conserva como término técnico de Daniel para פשר.
  - No se suavizó el imperativo negativo de destrucción; se mantuvo la repetición semántica con el primer miembro del versículo.
