revisions:
- from: 'Y para Coat: la familia de los amramitas, y la familia de los izharitas, y la familia de los hebronitas, y la familia de los uzielitas; estos son los linajes de los coatitas.'
  to: 'Y en cuanto a Coat: el clan de los amramitas, y el clan de los izharitas, y el clan de los hebronitas, y el clan de los uzielitas; estos son los clanes de los coatitas.'
  rationale: Se revisa para mantener una equivalencia léxica consistente de מִשְׁפָּחָה como 'clan' en todo el versículo, en línea con la decisión auditada y con el contexto genealógico-censal. También se ajusta el encabezamiento a una formulación más natural en español ('Y en cuanto a Coat') sin perder la fuerza clasificatoria del hebreo.
