translation:
  text: Jesus said, "The foxes have their holes, and the birds have their nest, but
    the Son of Man does not have a place to lay his head and rest."
  philosophy: formal
  drafter_model: gemini-3.1-pro-preview
  drafter_label: gemini_3_1_pro_thomas_redraft
  drafted_at: '2026-04-22T09:20:13Z'
  footnotes:
  - marker: holes
    text: The manuscript reads ⲛⲟⲩ[ⲃⲏ]ⲃ ('a hole/den'), but this is generally understood
      or emended as ⲛⲉⲩⲃⲏⲃ ('their holes') to parallel 'their nest' (ⲙⲡⲉⲩⲙⲁϩ) in the
      following clause.
    reason: textual_variant
  - marker: nest
    text: Thomas uses the singular 'nest' (ⲡⲉⲩⲙⲁϩ) and omits 'of the air', diverging
      from the canonical parallels (Matthew 8:20, Luke 9:58).
    reason: cross_reference
  - marker: and rest
    text: Thomas adds the phrase 'and rest' (ⲛϥⲙⲧⲟⲛ ⲙⲙⲟϥ), which is absent from the
      Synoptic versions of this saying.
    reason: cross_reference
lexical_decisions:
- source_word: ⲃⲁϣⲟⲣ
  chosen: foxes
  rationale: Plural noun with the plural definite article (ⲛ-ⲃⲁϣⲟⲣ). The previous
    draft incorrectly rendered this as singular.
  lexicon: Crum 46b
  alternatives:
  - fox
- source_word: ⲃⲏⲃ
  chosen: holes
  rationale: Means 'cave', 'hole', or 'den'. Kept as 'holes' to maintain the familiar
    aphoristic register, while allowing the Thomasine possessive ('their') to stand
    out.
  lexicon: Crum 29a
  alternatives:
  - dens
  - caves
- source_word: ϩⲁⲗⲁⲧⲉ
  chosen: birds
  rationale: Plural of ϩⲁⲗⲏⲧ. The Coptic simply says 'the birds', lacking the Synoptic
    modifier 'of the sky/air' (ⲛⲧⲡⲉ).
  lexicon: Crum 670b
  alternatives: []
- source_word: ⲙⲁϩ
  chosen: nest
  rationale: Means 'nest'. The Coptic uses a singular noun with a plural possessor
    (ⲡⲉⲩ-ⲙⲁϩ, 'their nest'), unlike the plural 'nests' in the Synoptic parallels.
  lexicon: Crum 208a
  alternatives:
  - lodging
- source_word: ⲣⲓⲕⲉ
  chosen: lay
  rationale: Literally 'to bend' or 'to incline'. 'Lay his head' is the standard English
    idiom for this action.
  lexicon: Crum 292a
  alternatives:
  - incline
  - rest
- source_word: ⲙⲧⲟⲛ
  chosen: rest
  rationale: Reflexive verb (ⲙⲧⲟⲛ ⲙⲙⲟ=) meaning 'to rest'. The previous draft misread
    the reflexive object ⲙⲙⲟϥ as a negative or emphatic particle.
  lexicon: Crum 188b
  alternatives:
  - rest himself
theological_decisions:
- issue: Capitalization of 'son of man'
  chosen_reading: son of man
  rationale: Kept lowercase to reflect Thomas's wisdom context, where the phrase often
    denotes the human being or the enlightened individual, rather than importing the
    apocalyptic title capitalization from the Synoptics.
  alternatives_noted:
  - Son of Man
drafter_notes: 'The previous draft contained several errors: it rendered ''foxes''
  as singular, hallucinated ''of the sky'' for the birds, mistranslated ''nest'' as
  ''lodging there'', and completely misread the reflexive pronoun ⲙⲙⲟϥ as a negative
  (''he does not''). This revision strictly follows the Coptic syntax while preserving
  Thomas''s distinct divergences from the Q-saying parallel.'
previous_drafts:
- archived_at: '2026-04-22T09:20:13Z'
  reason: redraft_coptic_strict
  english_text: Jesus said, The fox has its holes, and the birds of the sky have their
    lodging there; but the son of man does not have a place to lay his head and to
    rest—he does not.
  previous_translation_block:
    text: Jesus said, The fox has its holes, and the birds of the sky have their lodging
      there; but the son of man does not have a place to lay his head and to rest—he
      does not.
    philosophy: optimal-equivalence
    footnotes:
    - marker: a
      text: The opening phrase is reconstructed in places (Dilley brackets ⲛ̄ⲃⲁϣⲟⲣ
        ⲟⲩ-); the normalized reading ‘The fox has…’ is standard given the idiom.
      reason: lacuna_or_restoration
    - marker: b
      text: '‘Birds of the sky’: Coptic literally has ‘the birds and the sky,’ an
        elliptical construction typical of Sahidic; we supply ‘of’ for English readability.'
      reason: dialect_note
    - marker: c
      text: ⲙⲁϩ can denote ‘rest/lodging’; we avoid inserting ‘nests’ since the Coptic
        does not use a specific word for ‘nest’ here.
      reason: lexical_alternative
    - marker: d
      text: The final ‘ⲛⲛⲧⲟϥ’ is an editorial normalization from damaged ink; it likely
        functions as an emphatic negation echo. The translation reflects this with
        ‘—he does not.’
      reason: lacuna_or_restoration
