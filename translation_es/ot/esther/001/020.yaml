translation:
  language: es
  text: Y cuando se oiga el decreto del rey que emita en todo su reino —porque es muy grande—, todas las mujeres darán honor[a] a sus maridos[b], del más grande al más pequeño.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «mostrarán respeto». El hebreo admite la idea de «dar honor» o de «tratar con respeto».
    reason: lexical_alternative
  - marker: b
    text: O «esposos». El término hebreo se refiere al marido en el contexto doméstico.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְנִשְׁמַע
  english_pob_choice: And when ... is heard
  chosen_spanish: Y cuando se oiga
  alternatives_spanish:
  - Y cuando sea oído
  - Y cuando se escuche
  lexicon: HALOT
  rationale: 'El nifal tiene sentido pasivo: el texto introduce la circunstancia temporal en que se produce el efecto. «Se oiga» conserva la pasividad y suena natural en español.'
- source_word: פִּתְגָם
  english_pob_choice: decree
  chosen_spanish: decreto
  alternatives_spanish:
  - edicto
  - pronunciamiento real
  lexicon: HALOT
  rationale: En el contexto persa, el término designa una proclamación oficial. «Decreto» mantiene el carácter formal y público sin sonar arcaico; «edicto» es posible, pero menos natural para el lector moderno.
- source_word: אֲשֶׁר יַעֲשֶׂה
  english_pob_choice: that he makes
  chosen_spanish: que él emite
  alternatives_spanish:
  - que él hace
  - que él promulga
  lexicon: HALOT
  rationale: Aunque el verbo básico es «hacer», con פִּתְגָם la idea es producir o expedir una orden oficial. «Emite» expresa bien el acto de poner en circulación una disposición real.
- source_word: בְּכָל מַלְכוּתוֹ
  english_pob_choice: throughout all his kingdom
  chosen_spanish: en todo su reino
  alternatives_spanish:
  - por todo su reino
  - a través de todo su reino
  lexicon: HALOT
  rationale: La preposición y el sustantivo indican la extensión total del ámbito real. «En todo su reino» es una forma fluida y fiel al alcance global de la proclamación.
- source_word: כִּי רַבָּה הִיא
  english_pob_choice: for it is vast
  chosen_spanish: porque es muy grande
  alternatives_spanish:
  - porque es vasta
  - ya que es grande
  lexicon: HALOT
  rationale: El hebreo explica la extensión del reino. «Muy grande» comunica claramente la magnitud sin forzar un calco con «vasto», que en español puede sonar más literario o menos común.
- source_word: וְכָל הַנָּשִׁים
  english_pob_choice: all the women
  chosen_spanish: todas las mujeres
  alternatives_spanish:
  - todas las esposas
  - todas las señoras
  lexicon: HALOT
  rationale: El hebreo usa un plural genérico. «Mujeres» preserva el alcance literal; el contexto inmediato especifica la relación con sus maridos sin convertir el sustantivo en «esposas» en el texto principal.
- source_word: יִתְּנוּ יְקָר
  english_pob_choice: will give honor
  chosen_spanish: darán honor
  alternatives_spanish:
  - mostrarán respeto
  - darán respeto
  lexicon: HALOT
  rationale: La expresión verbal reproduce la idea de «dar valor/honor». «Dar honor» es cercana al hebreo y mantiene la dignidad formal del pasaje; «mostrar respeto» es una alternativa válida, pero más interpretativa.
- source_word: לְבַעְלֵיהֶן
  english_pob_choice: to their husbands
  chosen_spanish: a sus maridos
  alternatives_spanish:
  - a sus esposos
  - a sus señores
  lexicon: HALOT
  rationale: En este contexto doméstico, בעל significa claramente «marido». «Maridos» es la correspondencia más directa y evita introducir una relación de autoridad más fuerte que la del pasaje.
- source_word: לְמִגָּדוֹל וְעַד קָטָן
  english_pob_choice: from great to small
  chosen_spanish: desde la grande hasta la pequeña
  alternatives_spanish:
  - de grande a pequeña
  - desde la mayor hasta la menor
  lexicon: HALOT
  rationale: La expresión idiomática abarca todo el rango social o personal. Como el referente inmediato es «las mujeres», se mantiene la concordancia de género en español; la fórmula conserva el sentido totalizador del hebreo.
translation_notes:
  revision_awareness: 'Esta versión sigue de cerca el análisis lexical del texto hebreo y la auditoría inglesa: conserva el valor pasivo de וְנִשְׁמַע, el matiz de pronunciamiento oficial de פִּתְגָם, y la lectura doméstica de לְבַעְלֵיהֶן. Se adapta el final idiomático a la concordancia femenina del español («la grande... la pequeña») para mantener naturalidad sin alterar el alcance totalizador del hebreo.'
  spanish_consistency_notes:
  - Se usa «Yahvé» como norma del proyecto solo cuando el texto lo requiera; aquí no aparece el tetragrámaton.
  - Se mantiene «decreto» como equivalente funcional de פִּתְגָם siguiendo el audit trail, sin borrar la alternativa «edicto».
  - «Dar honor» conserva la fuerza lexical de יְקָר, mientras la nota permite la alternativa semántica «mostrar respeto».
  - La concordancia de género en «la grande... la pequeña» responde al referente explícito «las mujeres» y evita una literalidad extraña en español.
