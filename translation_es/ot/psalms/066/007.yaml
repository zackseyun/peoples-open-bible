translation:
  language: es
  text: Él gobierna para siempre con su poder; sus ojos vigilan a las naciones. Que no se enaltezcan[a] los rebeldes. Selah
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «se levanten» o «se alcen». El verbo hebreo puede denotar levantar(se), alzarse o enaltecerse.'
    reason: lexical_alternative
lexical_decisions:
- source_word: מֹשֵׁל
  english_pob_choice: He rules
  chosen_spanish: Él gobierna
  alternatives_spanish:
  - Él reina
  - Él rige
  - el que gobierna
  lexicon: HALOT
  rationale: El participio hebreo funciona aquí de manera verbal y describe una acción continua. «Gobierna» conserva el valor durativo y suena natural en español sin perder el matiz de soberanía.
- source_word: בִּגְבוּרָתוֹ
  english_pob_choice: by his might
  chosen_spanish: con su poder
  alternatives_spanish:
  - por su poder
  - en su poder
  - con su fuerza
  lexicon: HALOT
  rationale: גְּבוּרָה expresa fuerza/poder. La preposición ב puede tener sentido instrumental o de medio; «con su poder» comunica que su gobierno se ejerce mediante ese poder, en español idiomático.
- source_word: עוֹלָם
  english_pob_choice: forever
  chosen_spanish: para siempre
  alternatives_spanish:
  - eternamente
  - por toda la eternidad
  lexicon: HALOT
  rationale: En esta posición adverbial, עוֹלָם indica duración sin fin. «Para siempre» es la forma natural y clara en español.
- source_word: עֵינָיו
  english_pob_choice: his eyes
  chosen_spanish: sus ojos
  alternatives_spanish:
  - su mirada
  - él
  lexicon: HALOT
  rationale: Se conserva la imagen antropomórfica del hebreo. «Sus ojos» mantiene la fuerza poética de vigilancia divina sin reducirla a una paráfrasis.
- source_word: בַּגּוֹיִם
  english_pob_choice: the nations
  chosen_spanish: a las naciones
  alternatives_spanish:
  - sobre las naciones
  - entre las naciones
  - los pueblos
  lexicon: HALOT
  rationale: En combinación con el verbo de mirar/vigilar, el sentido apunta a las naciones como objeto de atención. «A las naciones» reproduce de forma natural ese valor de dirección/objeto en español.
- source_word: תִּצְפֶּינָה
  english_pob_choice: watch
  chosen_spanish: vigilan
  alternatives_spanish:
  - observan
  - velan
  - están al acecho de
  lexicon: HALOT
  rationale: צפה significa mirar atentamente, vigilar o hacer guardia. «Vigilan» conserva la idea de observación activa y sostenida con un verbo claro en español.
- source_word: הַסּוֹרְרִים
  english_pob_choice: the rebellious
  chosen_spanish: los rebeldes
  alternatives_spanish:
  - los rebeldes obstinados
  - los obstinados
  - los desobedientes
  lexicon: HALOT
  rationale: El participio de סרר describe a quienes se resisten obstinadamente. «Los rebeldes» es una equivalencia directa, fuerte y comprensible en español.
- source_word: אַל יָרִימוּ לָמוֹ
  english_pob_choice: Let not the rebellious exalt themselves
  chosen_spanish: No se enaltezcan los rebeldes
  alternatives_spanish:
  - No se levanten los rebeldes
  - No levanten la cabeza los rebeldes
  - No se exalten los rebeldes
  lexicon: HALOT
  rationale: El hebreo puede implicar levantar(se), subir o enaltecer(se), y el valor reflexivo es el que mejor refleja לָמוֹ. «No se enaltezcan» preserva esa idea de autoexaltación sin añadir una pasiva ajena al texto.
- source_word: סֶלָה
  english_pob_choice: Selah
  chosen_spanish: Selah
  alternatives_spanish:
  - Sela
  lexicon: HALOT
  rationale: Se translitera el marcador litúrgico/musical tradicionalmente, ya que no hay consenso seguro para traducirlo.
theological_decisions:
- issue: Lenguaje antropomórfico de la vigilancia divina
  english_pob_reading: Retain 'his eyes watch the nations'
  chosen_spanish_reading: Retener «sus ojos vigilan a las naciones»
  alternative_spanish_readings:
  - Dios vigila a las naciones
  - él observa a las naciones
  rationale: El hebreo usa explícitamente «sus ojos». Mantener la imagen preserva la poesía y la intensidad del texto sin sugerir limitaciones corporales literales.
  doctrine_reference: Translation philosophy §1, §6
- issue: Sentido de la prohibición dirigida a los rebeldes
  english_pob_reading: Render as self-exaltation ('Let not the rebellious exalt themselves')
  chosen_spanish_reading: Entenderla como prohibición de autoexaltación
  alternative_spanish_readings:
  - No se levanten los rebeldes
  - Que no sean exaltados los rebeldes
  rationale: El valor reflexivo del hebreo favorece una lectura de autoexaltación. Así se evita introducir una pasiva no presente y se conserva la amonestación contra la soberbia frente al gobierno divino.
  doctrine_reference: Translation philosophy §1, §5
translation_notes:
  revision_awareness: 'El texto español sigue de cerca el audit trail inglés y el hebreo, conservando el paralelismo: soberanía permanente, vigilancia divina y prohibición de la autoexaltación de los rebeldes. Se mantuvo Selah sin traducir, como marcador litúrgico.'
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando aparezca el nombre divino; aquí el versículo no lo contiene.
  - Se prefirió «vigilan» para transmitir observación activa y continua, coherente con la imagen de los ojos.
  - «No se enaltezcan» mantiene el matiz reflexivo y evita una lectura pasiva.
  - «Selah» se conserva como transliteración por consistencia con el tratamiento POB de marcadores musicales.
