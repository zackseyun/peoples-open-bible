  glossary_alignment: 'No hay términos teológicos sensibles aquí. La elección «jefes / jefe» concuerda con la decisión léxica documentada para אַלּוּף. «Hijos de» y «primogénito» también se alinean bien. La principal desalineación está en los nombres propios: conviene mantener «Zefo» sin nota y cambiar «Quenaz» a «Kenaz» para seguir mejor la transliteración de base documentada.'
