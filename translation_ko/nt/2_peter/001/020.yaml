  yaml_path: translation/nt/2_peter/001/020.yaml
  text: 'knowing this first: that every prophecy of Scripture does not come about from one''s own interpretation.'
translation:
  language: ko
  text: '무엇보다 먼저 이것을 아십시오: 성경의 모든 예언은 사사로이 해석되지 않습니다.'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ἰδίας ἐπιλύσεως οὐ γίνεται
  english_pob_choice: does not come about from one's own interpretation
  chosen_korean: 사사로이 해석되지 않다
  alternatives_korean:
  - 자기 마음대로 풀이되지 않다
  - 제멋대로 해석되지 않다
  lexicon: BDAG
  rationale: 한국 전통 번역의 「사사로이」 표현이 ἴδιος + ἐπίλυσις의 「자기 자신으로부터의 풀이」를 정확히 옮긴다. 본문은 예언의 기원이 사사로운 의지가 아님을 가리키며, 21절이 그 근거를 제시한다.
- source_word: προφητεία γραφῆς
  english_pob_choice: prophecy of Scripture
  chosen_korean: 성경의 예언
  lexicon: BDAG
  rationale: 표준 등가어.
theological_decisions:
- issue: ἰδίας ἐπιλύσεως의 정확한 의미 보존
  chosen_reading: 사사로이 해석되지 않다 (예언의 기원이 사사로운 풀이로부터 나지 않음)
  alternative_readings:
  - 독자가 마음대로 해석해서는 안 된다 (해석의 사사로움 금지)
  rationale: 21절은 명백히 예언의 기원을 사사로운 의지가 아닌 성령으로 돌린다. 따라서 20절도 예언이 사사로운 풀이로부터 발생하지 않는다는 기원의 진술로 읽는 것이 본문 흐름에 맞다. 다만 한국어 「사사로이 해석되지 않다」는 두 해석을 모두 포섭할 수 있는 정형 표현이므로 그대로 채택한다.
  doctrine_reference: Translation philosophy §3
