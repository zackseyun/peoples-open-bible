  - Se usa «máquinas de asedio» como equivalente contextual de μηχανάς, evitando el calco genérico «máquinas» en el cuerpo principal.
  - 'Se conserva el orden narrativo simple del griego: salida de la ciudad seguida por la quema de los artefactos.'
