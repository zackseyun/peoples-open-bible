theological_decisions:
- issue: Causation of Forgetfulness relative to the Father
  chosen_reading: '''on account of him'' (because he was unknown), not ''from him''
    (as though produced by him).'
  alternative_readings:
  - '''from the Father'' (origin in him)'
  - '''through him'' (instrumental)'
  rationale: 'The Coptic distinguishes origin (from) versus occasion (on account of).
    The treatise’s logic: Forgetfulness exists because the Father was unknown; when
    he is known, it ceases. This guards the Father’s nature from being the source
    of Forgetfulness.'
- issue: Status of Error’s 'beauty'
  chosen_reading: A counterfeit 'beauty' prepared as a substitute for the Truth.
  alternative_readings:
  - A genuine beauty misperceived
  rationale: The contrast between the untroubled, beyond-beauty Truth and the delusive
    preparation indicates a counterfeit aesthetic employed by Error.
