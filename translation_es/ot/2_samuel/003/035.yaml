translation:
  language: es
  text: 'Entonces toda la gente vino para instar a David a comer pan[a], mientras aún era de día; pero David juró, diciendo: «Así me haga Dios, y aun más[b], si antes de que se ponga el sol pruebo pan o cualquier cosa».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El hebreo dice literalmente ‘pan’; aquí puede funcionar de manera más amplia como alimento, pero se conserva el término concreto.
    reason: lexical_alternative
  - marker: b
    text: 'La fórmula del juramento es una autoimprecación convencional: ‘Así me haga Dios, y aun más’. El castigo concreto queda sin explicitar en hebreo.'
    reason: cultural_note
lexical_decisions:
- source_word: לְהַבְרוֹת
  english_pob_choice: to urge ... to eat
  chosen_spanish: exhortar a David a comer
  alternatives_spanish:
  - hacer que David comiera
  - llevarle comida a David
  - consolarlo con comida
  lexicon: HALOT
  rationale: En este contexto el verbo en hifil expresa la acción de animar o instar a David a tomar alimento. ‘Exhortar a David a comer’ conserva la fuerza del acto sin volverlo demasiado técnico o pesado en español.
- source_word: לֶחֶם
  english_pob_choice: eat bread
  chosen_spanish: pan
  alternatives_spanish:
  - alimento
  - comida
  lexicon: HALOT
  rationale: Se mantiene ‘pan’ para reflejar el término hebreo concreto y la elección auditada de POB, aunque en español la palabra puede abarcar el alimento de manera representativa en este escenario de duelo o ayuno.
- source_word: בְּעוֹד הַיּוֹם
  english_pob_choice: while it was still day
  chosen_spanish: mientras aún era de día
  alternatives_spanish:
  - durante el día
  - antes de que terminara el día
  lexicon: HALOT
  rationale: La expresión indica que aún no había concluido la jornada. ‘Mientras aún era de día’ es natural en español y prepara la referencia posterior al ocaso.
- source_word: וַיִּשָּׁבַע
  english_pob_choice: swore
  chosen_spanish: juró
  alternatives_spanish:
  - hizo un juramento
  - prestó juramento
  lexicon: HALOT
  rationale: Es el equivalente directo y solemne del verbo de jurar, adecuado para introducir la fórmula de autoimprecación que sigue.
- source_word: כֹּה יַעֲשֶׂה לִּי אֱלֹהִים וְכֹה יֹסִיף
  english_pob_choice: May God do so to me, and more also
  chosen_spanish: Así me haga Dios, y aun más
  alternatives_spanish:
  - Así haga Dios conmigo, y aun más
  - Que Dios me haga así y añada más
  lexicon: HALOT
  rationale: Se conserva la fórmula idiomática de juramento hebrea sin especificar un castigo implícito que el texto no explicita. ‘Así me haga Dios, y aun más’ reproduce bien la solemnidad y la imprecación convencional.
- source_word: כִּי אִם
  english_pob_choice: if
  chosen_spanish: si
  alternatives_spanish:
  - salvo que
  - a menos que
  lexicon: HALOT
  rationale: En el lenguaje de juramento introduce la condición del auto-maleficio; ‘si’ mantiene esa estructura de manera clara y fiel.
- source_word: לִפְנֵי בּוֹא הַשֶּׁמֶשׁ
  english_pob_choice: before the sun goes down
  chosen_spanish: antes de que se ponga el sol
  alternatives_spanish:
  - antes del ocaso
  - antes de que caiga el sol
  lexicon: HALOT
  rationale: La frase literalmente alude al ‘venir’ del sol, pero su sentido idiomático es el de antes del atardecer. ‘Antes de que se ponga el sol’ es la forma más natural y exacta en español.
- source_word: אֶטְעַם
  english_pob_choice: I taste
  chosen_spanish: pruebo
  alternatives_spanish:
  - como
  - tomo
  lexicon: HALOT
  rationale: ‘Probar’ refleja el verbo de ‘gustar/tomar una muestra’ y conserva la idea de que David no probará ni siquiera una pequeña porción.
- source_word: אוֹ כָל מְאֻמָה
  english_pob_choice: or anything at all
  chosen_spanish: o cualquier otra cosa
  alternatives_spanish:
  - o nada en absoluto
  - o cualquier cosa
  lexicon: HALOT
  rationale: La expresión amplía la prohibición más allá del pan a cualquier cosa. ‘Cualquier otra cosa’ comunica esa totalidad de modo natural en español.
theological_decisions:
- issue: Fórmula de juramento autoimprecatorio
  english_pob_reading: 'The oath formula is a conventional self-curse: ''May God do so to me, and more also.'' The specific punishment is left unstated in Hebrew.'
  chosen_spanish_reading: 'Se conserva la fórmula tradicional de autoimprecación: ‘Así me haga Dios, y aun más’, sin explicitar un castigo no dicho en el hebreo.'
  alternative_spanish_readings:
  - Dios me castigue, y aun más
  - Así me haga Dios, y aun peor
  rationale: El hebreo usa una fórmula fija de juramento que no nombra la pena; traducirla como una maldición explícita añadiría contenido no presente. La versión elegida preserva la tensión retórica y la vaguedad intencional del original.
  doctrine_reference: Uso bíblico de juramentos; lectura literal-convencional de fórmulas de autoimprecación.
translation_notes:
  revision_awareness: El contexto auditado coincide fuertemente con la versión inglesa POB y no muestra revisiones sustantivas recientes; se mantiene la solución óptima ya validada, con adaptación natural al español y preservación de las tensiones léxicas del hebreo.
  spanish_consistency_notes:
  - Se usa ‘Yahvé’ solo cuando el hebreo presenta el nombre divino; aquí el texto tiene אֱלֹהִים, por lo que se traduce ‘Dios’.
  - Se mantiene ‘pan’ para לֶחֶם, en continuidad con la elección auditada de POB y su valor concreto en este contexto.
  - La construcción de juramento se vierte en español con una fórmula idiomática equivalente, evitando una paráfrasis explicativa en el cuerpo del texto.
