base_translation:
  language: en
  yaml_path: translation/ot/2_chronicles/011/023.yaml
  text: And he acted wisely and dispersed some of all his sons throughout all the lands of Judah and Benjamin[a], to all the fortified cities[c][b]; and he gave them abundant provisions and sought many wives for them.
  footnotes:
  - marker: a
    text: Or 'He showed understanding' or 'He acted with discernment.'
    reason: lexical_alternative
  - marker: b
    text: The Hebrew likely means that he dispersed or stationed some of his sons throughout the fortified cities, not that every son was sent to every location.
    reason: lexical_alternative
  - marker: c
    text: That is, he arranged marriages for his sons; the Hebrew literally says 'and he sought a multitude of wives.'
    reason: lexical_alternative
