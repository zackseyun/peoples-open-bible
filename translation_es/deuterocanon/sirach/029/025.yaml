translation:
  language: es
  text: Darás hospedaje y darás de beber a los ingratos[a], y además de estas cosas oirás palabras amargas.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O "cosas amargas"; el griego deja implícito el objeto de "oirás", y "palabras" se suministra para que el español suene natural.
    reason: lexical_alternative
lexical_decisions:
- source_word: ξενιεῖς
  english_pob_choice: you will host
  chosen_spanish: darás hospedaje
  alternatives_spanish:
  - alojarás
  - recibirás como huésped
  - darás hospedaje como anfitrión
  lexicon: LSJ
  rationale: El futuro de ξενίζω aquí expresa recibir a alguien como huésped. En español, 'darás hospedaje' conserva la idea de hospitalidad y suena natural; 'alojarás' es posible, pero menos explícito sobre la relación de huésped/anfitrión.
- source_word: ποτιεῖς
  english_pob_choice: give drink
  chosen_spanish: bebida
  alternatives_spanish:
  - darás de beber
  - les darás de beber
  - proveerás bebida
  lexicon: LSJ
  rationale: El verbo griego significa dar de beber. En combinación con 'darás hospedaje', 'bebida' mantiene el paralelismo y evita una repetición excesivamente pesada; el sentido completo queda claro por el contexto verbal.
- source_word: εἰς ἀχάριστα
  english_pob_choice: to the ungrateful
  chosen_spanish: a los ingratos
  alternatives_spanish:
  - a los desagradecidos
  - para los ingratos
  - a los que no dan gracias
  lexicon: LSJ
  rationale: ἀχάριστος significa 'ingrato' o 'desagradecido'. 'A los ingratos' es directo, bíblico y preserva la valoración moral del sustantivo/adjetivo substantivado.
- source_word: πρὸς ἐπὶ τούτοις
  english_pob_choice: besides these things
  chosen_spanish: además de esto
  alternatives_spanish:
  - aparte de esto
  - además de estas cosas
  - encima de esto
  lexicon: LSJ
  rationale: La construcción es aditiva y algo redundante en griego. 'Además de esto' comunica la adición con naturalidad en español sin perder la acumulación retórica.
- source_word: πικρὰ
  english_pob_choice: bitter words
  chosen_spanish: palabras amargas
  alternatives_spanish:
  - cosas amargas
  - duras palabras
  - palabras acerbas
  lexicon: LSJ
  rationale: Aunque el griego deja el objeto de 'oirás' implícito, en español 'palabras amargas' es una explicitación sobria y natural. 'Amargas' conserva la metáfora del sabor y la dureza del trato; 'acerbas' sería más literaria.
- source_word: ἀκούσει
  english_pob_choice: you will hear
  chosen_spanish: oirás
  alternatives_spanish:
  - escucharás
  - serás obligado a oír
  - te tocará oír
  lexicon: LSJ
  rationale: El futuro de ἀκούω se traduce de forma simple como 'oirás'. La forma directa mantiene el tono de advertencia del dicho sapiencial.
translation_notes:
  revision_awareness: El texto griego y el audit trail inglés coinciden en lo esencial; la única expansión necesaria en español es explicitar el objeto implícito de 'oirás', como también hace la nota inglesa.
  spanish_consistency_notes:
  - Se mantuvo 'ingratos' para ἀχάριστα, en línea con la valoración moral del original.
  - Se evitó 'SEÑOR' u otro vocabulario teológico no pertinente al versículo.
  - La nota a pie de página marca la alternativa semántica de πικρὰ sin desplazar la lectura principal.
  - '''Darás hospedaje'' conserva el marco de hospitalidad mejor que una simple perífrasis de alojamiento.'
