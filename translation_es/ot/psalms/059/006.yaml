  text: וְ/אַתָּ֤ה יְהוָֽה אֱלֹהִ֥ים צְבָא֡וֹת אֱלֹ֘הֵ֤י יִשְׂרָאֵ֗ל הָקִ֗יצָ/ה לִ/פְקֹ֥ד כָּֽל הַ/גּוֹיִ֑ם אַל תָּחֹ֨ן כָּל בֹּ֖גְדֵי אָ֣וֶן סֶֽלָה־׀־־־׃
base_translation:
  language: en
  yaml_path: translation/ot/psalms/059/006.yaml
  text: But you[a], O Yahweh God of hosts, God of Israel, awake to punish all the nations; show no favor to any treacherous evildoers[c][b]. Selah
  footnotes:
  - marker: a
    text: Or “awake to visit/call to account all the nations.” The Hebrew verb פקד can mean “visit,” “attend to,” or “punish,” depending on context.
    reason: lexical_alternative
  - marker: b
    text: Or “have no mercy on any treacherous evildoers.” The Hebrew verb חנן is literally “show favor/be gracious.”
    reason: lexical_alternative
  - marker: c
    text: “Selah” is likely a musical or liturgical notation; its precise meaning is uncertain.
    reason: cultural_note
