translation:
  language: es
  text: Ahora, que Faraón busque[a] un hombre inteligente y sabio, y lo nombre sobre la tierra de Egipto.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «que Faraón vea» o «que Faraón escoja»; el verbo hebreo puede llevar el sentido de ver, hallar o seleccionar según el contexto.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְעַתָּה
  english_pob_choice: Now
  chosen_spanish: Ahora
  alternatives_spanish:
  - Y ahora
  lexicon: HALOT
  rationale: Introduce con naturalidad la transición del sueño a la acción. «Ahora» es idiomático en español y preserva el valor discursivo de la partícula.
- source_word: יֵרֶא
  english_pob_choice: let Pharaoh look for
  chosen_spanish: busque Faraón
  alternatives_spanish:
  - vea Faraón
  - elija Faraón
  lexicon: HALOT
  rationale: El hebreo puede implicar ver, buscar o seleccionar según el contexto. En español, «busque» conserva la idea de hallar/seleccionar a la persona adecuada y encaja con el mandato administrativo que sigue.
- source_word: פַרְעֹה
  english_pob_choice: Pharaoh
  chosen_spanish: Faraón
  lexicon: HALOT
  rationale: Título propio estándar en español bíblico.
- source_word: אִישׁ
  english_pob_choice: man
  chosen_spanish: un hombre
  alternatives_spanish:
  - una persona
  - alguien
  lexicon: HALOT
  rationale: El sustantivo hebreo es masculino singular y el contexto apunta a un funcionario varón. «Hombre» mantiene esa precisión léxica.
- source_word: נָבוֹן
  english_pob_choice: discerning
  chosen_spanish: inteligente
  alternatives_spanish:
  - prudente
  - entendido
  lexicon: HALOT
  rationale: En contexto administrativo, el término destaca capacidad de juicio práctico. «Inteligente» comunica esa aptitud con naturalidad en español; se mantiene junto a «sabio» para no perder el matiz doble.
- source_word: וְחָכָם
  english_pob_choice: wise
  chosen_spanish: sabio
  alternatives_spanish:
  - hábil
  - prudente
  lexicon: HALOT
  rationale: «Sabio» es la correspondencia más directa y natural para חכם y complementa bien a «inteligente» sin borrar la distinción entre ambos adjetivos.
- source_word: וִישִׁיתֵהוּ
  english_pob_choice: and appoint him
  chosen_spanish: y póngalo
  alternatives_spanish:
  - y establézcalo
  - y asigne
  lexicon: HALOT
  rationale: El verbo básico es «poner/colocar», y en este marco de gobierno implica designación para un cargo. «Póngalo» conserva la literalidad base sin perder la fuerza funcional de nombramiento.
- source_word: עַל אֶרֶץ מִצְרַיִם
  english_pob_choice: over the land of Egypt
  chosen_spanish: sobre la tierra de Egipto
  alternatives_spanish:
  - sobre el país de Egipto
  - sobre Egipto
  lexicon: HALOT
  rationale: Se conserva la expresión concreta «la tierra de Egipto», fiel al hebreo y al valor territorial-administrativo de עַל. «Tierra» refleja mejor la fórmula bíblica que «país».
translation_notes:
  revision_awareness: Coincide sustancialmente con la auditoría inglesa de POB (enfoque de equivalencia óptima) y no se registran revisiones posteriores que alteren el sentido. Se mantuvo la ambigüedad útil de יֵרֶא mediante una nota alternativa, y se conservó la fórmula territorial «la tierra de Egipto».
  spanish_consistency_notes:
  - Se evitó «SEÑOR» porque el versículo no contiene el nombre divino.
  - 'Se mantuvo la distinción entre los dos adjetivos hebreos mediante una pareja natural en español: «inteligente y sabio».'
  - «Póngalo» refleja el verbo básico de colocar/poner, pero en el contexto funciona como designación oficial, coherente con la lectura inglesa auditada.
