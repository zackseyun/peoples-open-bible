  lexicon: Layton, Coptic Grammar (usage); Crum
  rationale: Standard copular assertion introducing Thunder’s self-identifications;
    kept explicit to preserve voice.
- source_word: ⲛⲁⲕⲣⲟⲁⲧⲏⲥ
  chosen: hearers
  alternatives:
