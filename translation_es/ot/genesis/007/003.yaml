translation:
  language: es
  text: También de las aves del cielo[a], siete y siete, macho y hembra, para conservar viva la descendencia sobre la faz de toda la tierra.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «siete pares». El hebreo dice literalmente «siete, siete», una expresión distributiva que puede entenderse como siete de cada clase o como siete pares; el texto principal conserva más de cerca la forma hebrea.
    reason: lexical_alternative
lexical_decisions:
- source_word: גַּם
  english_pob_choice: Also
  chosen_spanish: También
  alternatives_spanish:
  - Y también
  - Además
  lexicon: HALOT
  rationale: Introduce la nueva categoría con una partícula natural en español y conserva la continuidad aditiva del hebreo sin añadir énfasis extra.
- source_word: מֵעֹוף הַשָּׁמַיִם
  english_pob_choice: from the birds of the sky
  chosen_spanish: de las aves del cielo
  alternatives_spanish:
  - de las aves de los cielos
  - de las aves del firmamento
  lexicon: HALOT
  rationale: עוֹף puede referirse a aves o criaturas voladoras; aquí 'aves' es natural y fiel. 'del cielo' reproduce הַשָּׁמַיִם de manera idiomática en español sin perder el sentido espacial.
- source_word: שִׁבְעָה שִׁבְעָה
  english_pob_choice: seven and seven
  chosen_spanish: siete y siete
  alternatives_spanish:
  - siete pares
  - por sietes
  lexicon: HALOT
  rationale: La repetición distributiva del hebreo se conserva con 'siete y siete', evitando decidir prematuramente entre 'siete pares' y otras lecturas posibles.
- source_word: זָכָר וּנְקֵבָה
  english_pob_choice: male and female
  chosen_spanish: macho y hembra
  alternatives_spanish:
  - varón y hembra
  - macho y mujer
  lexicon: HALOT
  rationale: En contexto animal, 'macho y hembra' comunica con precisión la pareja sexual indicada por el hebreo y evita la ambigüedad de términos humanos como 'varón'.
- source_word: לְחַיּוֹת
  english_pob_choice: to keep ... alive
  chosen_spanish: para mantener ... con vida
  alternatives_spanish:
  - para preservar ... con vida
  - para conservar ... con vida
  lexicon: HALOT
  rationale: El infinitivo causativo expresa finalidad de conservar vida; 'mantener ... con vida' es claro, natural y semánticamente cercano a la elección inglesa.
- source_word: זֶרַע
  english_pob_choice: offspring
  chosen_spanish: descendencia
  alternatives_spanish:
  - prole
  - semilla
  lexicon: HALOT
  rationale: En este contexto animal, 'descendencia' expresa la continuidad reproductiva con claridad y evita la posible rareza de 'semilla' en español moderno.
- source_word: עַל פְּנֵי כָל הָאָרֶץ
  english_pob_choice: on the face of all the earth
  chosen_spanish: sobre la faz de toda la tierra
  alternatives_spanish:
  - sobre la superficie de toda la tierra
  - por toda la tierra
  lexicon: HALOT
  rationale: Se conserva la imagen hebrea de 'faz' para respetar el giro idiomático y la cadencia bíblica, sin perder inteligibilidad en español.
translation_notes:
  revision_awareness: 'Se mantiene sin cambios sustanciales respecto al audit trail inglés: se preserva la expresión distributiva ''siete y siete'' en el texto principal y se ofrece en nota la alternativa interpretativa ''siete pares''.'
  spanish_consistency_notes:
  - Se evita 'SEÑOR' o cualquier máscara del nombre divino porque el versículo no contiene un nombre divino explícito.
  - '''aves'' se eligió por contexto zoológico; no se usó ''fowl'' ni un término arcaizante.'
  - '''macho y hembra'' se mantiene para reflejar la pareja sexual del texto, coherente con el uso técnico en animales.'
  - '''faz de toda la tierra'' conserva el hebraísmo del original y coincide con el registro bíblico del POB.'
