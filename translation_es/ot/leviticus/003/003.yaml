    issue: אִשֶּׁה se tradujo como 'ofrenda ígnea' en lugar de reflejar la decisión auditada 'food offering'.
    rationale: La evidencia y la auditoría favorecen un equivalente que comunique la categoría cultual como ofrenda de alimento/comida, dejando las alternativas centradas en fuego en nota. 'Ígnea' desplaza el foco semántico y suena menos natural en español bíblico contemporáneo.
  - severity: low
    issue: La nota al pie actual queda desbalanceada porque el texto principal ya adopta una opción de fuego.
    rationale: Si el texto principal mantiene 'ofrenda ígnea', la nota con 'ofrenda hecha por fuego' y 'ofrenda de fuego' apenas repite variantes cercanas. La nota funciona mejor si el texto principal dice 'ofrenda de alimento'.
