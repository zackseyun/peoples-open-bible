revisions:
- from: Contra una nación impía[a] lo envío, y contra el pueblo de mi ira lo mando[b], para que quite botín y arrebate despojo, y lo convierta en un pisoteo, como el lodo de las calles.
  to: Contra una nación impía[a] lo envío, y contra el pueblo de mi ira le ordeno, para saquear botín[b] y arrebatar despojo, y convertirlo[c] en pisoteo, como el lodo de las calles.
  rationale: Se corrige 'lo mando' a 'le ordeno' para reflejar con precisión אֲצַוֶּנּוּ. Se reubica la nota del hebreo intensificativo al segmento de saqueo, donde realmente corresponde. Se añade una nota sobre el sufijo singular colectivo en 'convertirlo', siguiendo la evidencia fuente y el precedente del POB inglés. El resto del verso se mantiene cercano al borrador original por su buena fidelidad y legibilidad.
  reviewer_model: gpt-5.4
