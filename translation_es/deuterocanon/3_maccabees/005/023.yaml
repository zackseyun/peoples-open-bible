  glossary_alignment: No hay términos teológicos sensibles en el versículo. «Bestias» concuerda con la decisión POB para τὰ θηρία. La transliteración «Hermón» es aceptable en español. La nota léxica sobre περιστύλιον está bien orientada, pero el texto principal debería reflejar mejor ese valor arquitectónico.
