translation:
  language: es
  text: 'Y estos estarán para la maldición en el monte Ebal: Rubén[a], Gad, Aser, Zabulón, Dan y Neftalí.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «para la pronunciación de la maldición» o «para maldecir».
    reason: lexical_alternative
lexical_decisions:
- source_word: וְאֵלֶּה
  english_pob_choice: And these
  chosen_spanish: Y estos
  alternatives_spanish:
  - Y éstos
  - Y estos hombres
  lexicon: HALOT
  rationale: La conjunción y el demostrativo introducen al grupo correspondiente en contraste con el versículo anterior. «Y estos» conserva la unión discursiva de manera natural en español.
- source_word: יַעַמְדוּ
  english_pob_choice: shall stand
  chosen_spanish: se pondrán
  alternatives_spanish:
  - estarán
  - han de ponerse
  lexicon: HALOT
  rationale: En español, «se pondrán» comunica la idea de colocarse o presentarse en un acto ceremonial sin sonar forzado. Mantiene el valor futuro/instructivo del imperfecto en este contexto ritual.
- source_word: עַל הַקְּלָלָה
  english_pob_choice: for the curse
  chosen_spanish: para la maldición
  alternatives_spanish:
  - para la pronunciación de la maldición
  - para maldecir
  - sobre la maldición
  lexicon: HALOT
  rationale: La preposición hebrea en este contexto indica asociación o asignación respecto del acto o contenido de la maldición. «Para la maldición» conserva la concisión del hebreo y el paralelismo con el versículo anterior, sin sobreespecificar el gesto ritual.
- source_word: בְּהַר עֵיבָל
  english_pob_choice: on Mount Ebal
  chosen_spanish: en el monte Ebal
  alternatives_spanish:
  - sobre el monte Ebal
  - en el monte Ébal
  lexicon: HALOT
  rationale: «En el monte Ebal» es el giro natural en español para ubicación sobre una montaña. Se mantiene la transliteración del nombre propio según el uso bíblico usual.
- source_word: רְאוּבֵן
  english_pob_choice: Reuben
  chosen_spanish: Rubén
  alternatives_spanish:
  - Rúben
  lexicon: N/A
  rationale: Nombre propio tribal en su forma española tradicional y ampliamente reconocible.
- source_word: גָּד
  english_pob_choice: Gad
  chosen_spanish: Gad
  lexicon: N/A
  rationale: Nombre propio tribal establecido en español bíblico.
- source_word: אָשֵׁר
  english_pob_choice: Asher
  chosen_spanish: Aser
  alternatives_spanish:
  - Asher
  lexicon: N/A
  rationale: Se usa la forma española tradicional del nombre tribal, más natural en español bíblico.
- source_word: זְבוּלֻן
  english_pob_choice: Zebulun
  chosen_spanish: Zabulón
  alternatives_spanish:
  - Zebulún
  lexicon: N/A
  rationale: Se elige la forma española bíblica más asentada y clara para lectores de español.
- source_word: דָּן
  english_pob_choice: Dan
  chosen_spanish: Dan
  lexicon: N/A
  rationale: Nombre propio tribal establecido en español bíblico.
- source_word: נַפְתָּלִי
  english_pob_choice: Naphtali
  chosen_spanish: Neftalí
  alternatives_spanish:
  - Neftalí
  lexicon: N/A
  rationale: Se usa la forma española tradicional del nombre tribal, con acentuación habitual en español.
theological_decisions:
- issue: Función ritual de las tribus respecto de la maldición
  english_pob_reading: for the curse
  chosen_spanish_reading: para la maldición
  alternative_spanish_readings:
  - para la pronunciación de la maldición
  - para maldecir
  rationale: El hebreo no añade un verbo como «pronunciar»; el contexto de los montes para bendición y maldición (vv. 12–13) sugiere participación ceremonial. La traducción conserva la brevedad del original y mantiene la tensión interpretativa sin resolverla de más.
  doctrine_reference: Mantener la tensión teológica del texto; equivalencia óptima
translation_notes:
  revision_awareness: No se registran revisiones en el paquete fuente; la redacción sigue de cerca el texto hebreo y la decisión inglesa auditada, sin cambios detectados en el último pase.
  spanish_consistency_notes:
  - Se emplea «Yahvé» solo cuando el texto fuente lo exige explícitamente; aquí no aparece.
  - Se prefieren formas españolas bíblicas consolidadas para los nombres tribales.
  - «Maldición» conserva el paralelismo semántico con el versículo anterior y la terminología ritual del pasaje.
