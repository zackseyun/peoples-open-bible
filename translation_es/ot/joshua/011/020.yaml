review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador conserva bien la agencia divina explícita, el movimiento hostil hacia la batalla contra Israel, la secuencia final de juicio y la referencia a Yahvé/Moisés. Sin embargo, dos puntos requieren ajuste para mayor fidelidad y naturalidad: 1) ''Porque de Yahvé fue endurecerles el corazón'' suena poco idiomático en español; el hebreo expresa origen/divina causación y puede verterse mejor como ''Porque venía de Yahvé el endurecerles el corazón'' o equivalente. 2) ''los dedicara al anatema'' no sigue de cerca la decisión auditada ''devote them to destruction''; en español bíblico general ''anatema'' puede desviar hacia excomunión o maldición eclesiástica. ''consagrarlos a la destrucción'' preserva mejor el valor técnico de חרם sin crear esa ambigüedad.'
  spanish_quality_summary: El texto es en general claro y digno, pero la primera cláusula es rígida y poco natural, y 'anatema' resulta menos transparente para un lector hispanohablante contemporáneo. También conviene mantener una sintaxis más fluida en la cadena final de propósitos.
  glossary_alignment: 'Acierta en usar ''Yahvé'' conforme al proyecto. ''Endurecerles el corazón'' está bien para לְחַזֵּק אֶת לִבָּם en este contexto. La principal desviación terminológica está en חרם: el razonamiento de POB favorece una formulación tipo ''consagrar/dedicar a la destrucción'' más que ''anatema''. ''Misericordia'' para תְּחִנָּה es aceptable por el audit trail, idealmente con nota que preserve la alternativa de ''favor/súplica''.'
  issues:
  - severity: medium
    issue: La cláusula inicial 'de Yahvé fue endurecerles el corazón' es poco idiomática en español.
    rationale: Aunque refleja literalmente el hebreo, en español suena forzada. 'venía de Yahvé el endurecerles el corazón' o 'provenía de Yahvé que se les endureciera el corazón' comunica mejor el origen divino sin suavizar la agencia.
  - severity: medium
    issue: '''los dedicara al anatema'' introduce una palabra potencialmente equívoca para חרם.'
    rationale: En español eclesial actual, 'anatema' suele asociarse con maldición o excomunión. La decisión auditada enfatiza 'devote to destruction' como categoría técnico-judicial; 'consagrarlos a la destrucción' preserva mejor ese sentido y es más inteligible.
  - severity: low
    issue: La nota sobre misericordia podría preservar con más precisión la alternativa de 'súplica/favor'.
    rationale: El hebreo תְּחִנָּה puede apuntar a misericordia, favor o súplica. La nota actual lo menciona, pero conviene formularla con mayor claridad lexical.
  revised_spanish_text: Porque venía de Yahvé el endurecerles el corazón para salir al encuentro de Israel en batalla,[a] para consagrarlos a la destrucción,[b] para que no hubiera para ellos misericordia,[c] sino para destruirlos, como Yahvé había mandado a Moisés.
  revised_footnotes:
  - marker: a
    text: O "fortalecerles el corazón". Aquí el sentido es hacerlos resueltos en su oposición, es decir, endurecerlos.
    reason: lexical_alternative
  - marker: b
    text: Hebreo "consagrarlos a la destrucción", un término técnico para poner algo bajo el juicio del exterminio; alternativamente, "destruirlos por completo" o "ponerlos bajo el anatema".
    reason: lexical_alternative
  - marker: c
    text: O "para que no tuvieran misericordia" o "para que no hubiera súplica por ellos". La expresión hebrea es compacta y puede referirse a la ausencia de cualquier petición o concesión de misericordia.
    reason: alternative_reading
