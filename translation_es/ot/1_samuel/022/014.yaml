translation:
  language: es
  text: 'Ahimelec respondió al rey y dijo: “¿Y quién entre todos tus siervos es tan fiel como David, el yerno del rey, que tiene acceso a tu consejo[a], y es honrado en tu casa[b]?”'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «uno que te obedece» / «uno que está a tu disposición» para la idea de «uno que se vuelve a tu mandato».
    reason: lexical_alternative
  - marker: b
    text: «Tu casa» puede referirse más específicamente a la casa real, la corte o el entorno del rey.
    reason: cultural_note
lexical_decisions:
- source_word: וַיַּעַן
  english_pob_choice: answered
  chosen_spanish: respondió
  alternatives_spanish:
  - contestó
  - respondió
  lexicon: HALOT
  rationale: El hebreo introduce una réplica narrativa normal. En español, «respondió» conserva el valor directo y natural de la fórmula sin añadir matiz interpretativo.
- source_word: אֲחִימֶלֶךְ
  english_pob_choice: Ahimelech
  chosen_spanish: Ahimelec
  alternatives_spanish:
  - Ahimelec
  - Ahimelek
  lexicon: transliteración
  rationale: Se translitera el nombre propio con la forma española más natural y difundida, manteniendo la identidad del personaje sin adaptar el contenido.
- source_word: הַמֶּלֶךְ
  english_pob_choice: the king
  chosen_spanish: el rey
  alternatives_spanish:
  - el rey
  lexicon: HALOT
  rationale: Título definido y claro en contexto; se conserva sin paráfrasis.
- source_word: עֲבָדֶיךָ
  english_pob_choice: your servants
  chosen_spanish: tus esclavos
  alternatives_spanish:
  - tus siervos
  - tus servidores
  lexicon: HALOT
  rationale: El término עֲבָדִים tiene fuerza lexical de dependencia/servicio. Dado el criterio POB de preservar esa fuerza cuando el inglés eligió «servants» por contexto, aquí «esclavos» mantiene la tensión social y cortesana sin suavizarla de antemano.
- source_word: נֶאֱמָן
  english_pob_choice: faithful
  chosen_spanish: fiel
  alternatives_spanish:
  - fidedigno
  - leal
  lexicon: HALOT
  rationale: «Fiel» transmite tanto confiabilidad como lealtad relacional, que es el valor central del término en este pasaje.
- source_word: וַחֲתַן הַמֶּלֶךְ
  english_pob_choice: the king’s son-in-law
  chosen_spanish: el yerno del rey
  alternatives_spanish:
  - el yerno del rey
  - el consuegro del rey
  lexicon: HALOT
  rationale: La relación familiar se expresa de forma directa y natural en español. «Yerno» es el equivalente exacto y preserva el sentido de linaje/casa real.
- source_word: וְסָר אֶל מִשְׁמַעְתֶּךָ
  english_pob_choice: who has access to your council
  chosen_spanish: que tiene acceso a tu consejo
  alternatives_spanish:
  - que se aparta para obedecerte
  - que está a tu disposición
  - que atiende a tu mandato
  lexicon: HALOT
  rationale: La revisión inglesa optó por «has access to your council» para captar mejor סָר + מִשְׁמַעַת. En español, «tiene acceso a tu consejo» conserva esa decisión auditada y evita reducir el hebreo a mera obediencia mecánica.
- source_word: וְנִכְבָּד בְּבֵיתֶךָ
  english_pob_choice: is honored in your house
  chosen_spanish: es honrado en tu casa
  alternatives_spanish:
  - es honrado en tu casa
  - es estimado en tu casa
  - goza de honor en tu casa
  lexicon: HALOT
  rationale: «Honrado» reproduce bien el valor de נכבד. «Casa» mantiene la imagen hebrea de hogar/corte sin expandirla innecesariamente.
theological_decisions:
- issue: Relación entre «esclavos/siervos» y la dignidad cortesana
  english_pob_reading: your servants
  chosen_spanish_reading: tus esclavos
  alternative_spanish_readings:
  - tus siervos
  - tus servidores
  rationale: No se atenúa la fuerza del hebreo con un término más honorífico. La tensión entre estatus social bajo y cercanía a la corte forma parte del peso retórico de la pregunta de Ahimelec.
  doctrine_reference: lexical force of עבד; context of royal court address
- issue: מִשְׁמַעַת as access/obedience
  english_pob_reading: who has access to your council
  chosen_spanish_reading: que tiene acceso a tu consejo
  alternative_spanish_readings:
  - que se aparta para obedecerte
  - que atiende a tu mandato
  rationale: Se preserva la revisión del POB que entiende una referencia a la esfera de acceso, audiencia o consejo, en vez de aplastar el hebreo en un simple «obedece».
  doctrine_reference: semantic range of מִשְׁמַעַת; courtly context
translation_notes:
  revision_awareness: Se incorporó la revisión inglesa que corrigió la frase de מִשְׁמַעַת desde una lectura demasiado mecánica de «obedecer» hacia una formulación de acceso/consejo más acorde con el contexto cortesano. El español refleja esa decisión y mantiene la fluidez narrativa del verso.
  spanish_consistency_notes:
  - Se conserva «Yahvé» en todo el proyecto como norma general, aunque este versículo no lo contiene.
  - Se usa «esclavos» para עֲבָדִים por fuerza léxica; no se suaviza a «siervos» sin razón contextual.
  - 'Se mantiene el nombre propio en forma española breve y estándar: «Ahimelec».'
  - El paralelismo del verso se resuelve en una sola oración con subordinadas para conservar claridad en español sin perder los elementos del hebreo.
