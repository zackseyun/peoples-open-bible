revisions:
- from: 'El que roba a su padre y a su madre y dice: «No es transgresión», es compañero[a] de un hombre destructor.'
  to: 'El que roba a su padre y a su madre y dice: «Esto no es transgresión», es compañero[a] de un hombre destructivo.'
