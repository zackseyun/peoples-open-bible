translation:
  language: es
  text: Y la palabra de Samuel llegó a todo Israel[a]. Entonces Israel salió al encuentro de los filisteos para la batalla, y acamparon en Ebenezer[b], mientras los filisteos acamparon en Afec.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'la noticia de Samuel llegó a todo Israel'. El hebreo puede entenderse como la palabra o mensaje de Samuel, y en este contexto probablemente se refiere a su palabra profética.
    reason: alternative_reading
  - marker: b
    text: Ebenezer significa 'piedra de ayuda'. Aquí funciona como nombre de lugar.
    reason: lexical_alternative
lexical_decisions:
- source_word: דְבַר שְׁמוּאֵל
  english_pob_choice: the word of Samuel
  chosen_spanish: la palabra de Samuel
  alternatives_spanish:
  - el mensaje de Samuel
  - la palabra/mensaje de Samuel
  lexicon: HALOT
  rationale: Conservo el sustantivo singular 'palabra' para mantener visible el vínculo profético-literario del hebreo, en línea con la opción inglesa. 'Mensaje' explicaría la idea, pero debilita esa conexión léxica.
- source_word: וַיְהִי ... לְכָל יִשְׂרָאֵל
  english_pob_choice: came to all Israel
  chosen_spanish: llegó a todo Israel
  alternatives_spanish:
  - vino a todo Israel
  - alcanzó a todo Israel
  lexicon: HALOT
  rationale: En español, 'llegó a' transmite naturalidad y la idea de que la palabra fue recibida por todo el pueblo. Mantiene el valor de alcance colectivo sin forzar una construcción literal poco idiomática.
- source_word: וַיֵּצֵא יִשְׂרָאֵל
  english_pob_choice: Israel went out
  chosen_spanish: Israel salió
  alternatives_spanish:
  - Israel marchó
  - Israel salió de
  lexicon: HALOT
  rationale: '''Salir'' representa היטב יצא sin añadir más de lo que el hebreo dice. El matiz militar queda reforzado por el contexto inmediato y por ''a enfrentar''.'
- source_word: לִקְרַאת פְּלִשְׁתִּים
  english_pob_choice: to meet the Philistines
  chosen_spanish: a enfrentar a los filisteos
  alternatives_spanish:
  - a encontrarse con los filisteos
  - para ir al encuentro de los filisteos
  lexicon: HALOT
  rationale: Aunque el hebreo literalmente sugiere 'al encuentro de', el contexto bélico permite 'enfrentar' en español, que comunica la intención hostil sin perder el movimiento hacia el encuentro.
- source_word: לַמִּלְחָמָה
  english_pob_choice: in battle
  chosen_spanish: en batalla
  alternatives_spanish:
  - para la batalla
  - para el combate
  lexicon: HALOT
  rationale: '''En batalla'' es una forma breve y natural que conserva el sentido militar del sintagma. ''Combate'' es posible, pero ''batalla'' mantiene mejor el eco narrativo.'
- source_word: וַיַּחֲנוּ
  english_pob_choice: they camped
  chosen_spanish: acamparon
  alternatives_spanish:
  - levantaron el campamento
  - se acamparon
  lexicon: HALOT
  rationale: '''Acamparon'' es el equivalente directo y natural para el acto militar de instalar el campamento. Evita el arcaísmo y conserva la acción concreta del texto.'
- source_word: עַל הָאֶבֶן הָעֵזֶר
  english_pob_choice: at Ebenezer
  chosen_spanish: en Ebenezer
  alternatives_spanish:
  - junto a Ebenezer
  - en la piedra de ayuda
  lexicon: HALOT
  rationale: Sigo la decisión auditada de tratar la expresión como nombre de lugar. 'En' funciona de modo locativo en español para campamentos y evita traducir indebidamente el topónimo por su etimología.
- source_word: בַאֲפֵק
  english_pob_choice: at Aphek
  chosen_spanish: en Afec
  alternatives_spanish:
  - en Apec
  - en Afec
  lexicon: HALOT
  rationale: Translitero el topónimo según una forma española legible y consistente. 'Afec' respeta la pronunciación aproximada y mantiene el carácter de nombre propio.
theological_decisions:
- issue: 'Sentido de דְבַר שְׁמוּאֵל: mensaje profético o reporte/fama de Samuel'
  english_pob_reading: prophetic word/message reaching all Israel
  chosen_spanish_reading: palabra profética de Samuel que llega a todo Israel
  alternative_spanish_readings:
  - el reporte de Samuel llegó a todo Israel
  - la fama de Samuel llegó a todo Israel
  rationale: 'Sigo la lectura contextual auditada: tras la revelación del capítulo 3, ''la palabra de Samuel'' se entiende mejor como su palabra profética, no como simple fama. Conservar ''palabra'' deja visible esa carga teológica y literaria.'
  doctrine_reference: Translation philosophy §1, §5
translation_notes:
  revision_awareness: La versión inglesa auditada permanece sin cambios en la revisión más reciente; el consenso del control cruzado es de alta concordancia y no se registraron revisiones aplicadas.
  spanish_consistency_notes:
  - Se conserva 'Yahvé' como norma del proyecto cuando aparezca el nombre divino; en este versículo no aparece.
  - '''Filisteos'' se mantiene como etnónimo bíblico estándar en español.'
  - Se usa 'Afec' como forma española coherente de 'Aphek' para mantener legibilidad y consistencia toponímica.
  - Se evita 'SEÑOR' porque el texto no contiene יהוה en este versículo.
