lexical_decisions:
- source_word: נִגְדְּעָה
  english_pob_choice: is cut off
  chosen_spanish: es cortado
  alternatives_spanish:
  - ha sido cortado
  - es derribado
  - es cortado de raíz
  lexicon: HALOT
  rationale: El niphal de גדע expresa que algo es cortado o derribado. En español, «es cortado» preserva la pasiva y la imagen sin añadir matices no presentes en el hebreo.
- source_word: קֶרֶן
  english_pob_choice: horn
  chosen_spanish: cuerno
  alternatives_spanish:
  - fuerza
  - poder
  - maleza
  lexicon: HALOT
  rationale: El hebreo dice literalmente «cuerno». Aunque funciona como metáfora de fuerza o poder, el texto poético permite conservar la imagen en el cuerpo principal.
- source_word: מוֹאָב
  english_pob_choice: Moab
  chosen_spanish: Moab
  alternatives_spanish:
  - Moab
  lexicon: HALOT
  rationale: Nombre propio estándar del territorio/nación.
- source_word: וּזְרֹעוֹ
  english_pob_choice: and his arm
  chosen_spanish: y su brazo
  alternatives_spanish:
  - y su brazo
  - y su fuerza
  - y su poder militar
  lexicon: HALOT
  rationale: זְרוֹעַ significa literalmente «brazo» y por extensión puede denotar fuerza o poder militar. En español, «su brazo» conserva la metáfora y funciona naturalmente con la personificación de Moab.
- source_word: נִשְׁבָּרָה
  english_pob_choice: is broken
  chosen_spanish: es quebrado
  alternatives_spanish:
  - es roto
  - ha sido quebrado
  - es destrozado
  lexicon: HALOT
  rationale: El niphal de שבר indica estar roto/quebrado. «Es quebrado» mantiene la paralelidad con la primera cláusula y su tono poético.
- source_word: נְאֻם יְהוָה
  english_pob_choice: declares Yahweh
  chosen_spanish: declara Yahvé
  alternatives_spanish:
  - dice Yahvé
  - oráculo de Yahvé
  - declara el Yahvé
  lexicon: HALOT
  rationale: La fórmula profética נְאֻם se vierte de forma solemne como «declara». Conforme al criterio del proyecto, יְהוָה se traduce «Yahvé» en el texto principal.
theological_decisions:
- issue: Rendering of the divine name יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahvé
  - Jehová
  - el SEÑOR
  rationale: El hebreo usa directamente el Tetragrámaton. El proyecto pide «Yahvé» en el texto principal para conservar el nombre del pacto y evitar el ocultamiento convencional.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
translation_notes:
  revision_awareness: Se corrigió el problema de validación anterior anclando la nota [a] directamente en el texto principal junto a «cuerno de Moab». No se introdujeron notas sin ancla.
  spanish_consistency_notes:
  - 'Se mantuvo el paralelismo pasivo del hebreo: «es cortado / es quebrado».'
  - Se conservó la metáfora corporal y animal del original en lugar de interpretarla como «fuerza» o «poder» en el cuerpo principal.
  - Se usó «Yahvé» conforme al criterio terminológico del proyecto.
