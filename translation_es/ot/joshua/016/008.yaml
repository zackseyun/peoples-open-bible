  text: מִ/תַּפּ֜וּחַ יֵלֵ֨ךְ הַ/גְּב֥וּל יָ֨מָּ/ה֙ נַ֣חַל קָנָ֔ה וְ/הָי֥וּ תֹצְאֹתָ֖י/ו הַ/יָּ֑מָּ/ה זֹ֗את נַחֲלַ֛ת מַטֵּ֥ה בְנֵי אֶפְרַ֖יִם לְ/מִשְׁפְּחֹתָֽ/ם־׃
base_translation:
  language: en
  yaml_path: translation/ot/joshua/016/008.yaml
  text: From Tappuah the border goes westward to the Brook of Kanah[a], and its end was at the sea[c][b]. This is the inheritance of the tribe of the sons of Ephraim according to their families.
  footnotes:
  - marker: a
    text: Or “to the sea,” with “westward” reflecting the common directional sense of the Hebrew in land-boundary descriptions.
    reason: lexical_alternative
  - marker: b
    text: “Brook” may also be rendered “wadi.”
    reason: lexical_alternative
  - marker: c
    text: Hebrew “sons of Ephraim,” a standard tribal designation.
    reason: lexical_alternative
