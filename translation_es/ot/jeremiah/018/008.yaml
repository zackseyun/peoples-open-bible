translation:
  language: es
  text: Y si aquella nación se vuelve[a] de su mal[b], contra la cual hablé, entonces yo desistiré[c] del desastre[d] que pensaba hacerle.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «regresa» o «se arrepiente». El verbo hebreo es literalmente «se vuelve / vuelve».
    reason: lexical_alternative
  - marker: b
    text: O «de su maldad». Aquí el hebreo se refiere al mal moral de la nación.
    reason: lexical_alternative
  - marker: c
    text: O «cambiaré de parecer». El hebreo expresa que Dios retira el juicio anunciado en respuesta al cambio de la nación, no arrepentimiento moral.
    reason: alternative_reading
  - marker: d
    text: El hebreo usa la misma familia de palabras tanto para el «mal» de la nación como para el «desastre» que Dios pensaba hacerle, pero aquí el sentido cambia de mal moral a calamidad o castigo.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְשָׁב
  english_pob_choice: And if ... turns
  chosen_spanish: Y si ... se vuelve
  alternatives_spanish:
  - Y si ... se regresa
  - Y si ... se aparta
  - Y si ... se arrepiente
  lexicon: HALOT
  rationale: שׁוּב expresa la idea concreta de volverse/retornar. En español, 'se vuelve' conserva la metáfora sin sonar forzado; 'si' expresa el valor condicional que el hebreo marca por contexto.
- source_word: הַגּוֹי הַהוּא
  english_pob_choice: that nation
  chosen_spanish: aquella nación
  alternatives_spanish:
  - ese pueblo
  - esa nación
  - aquel pueblo
  lexicon: HALOT
  rationale: גּוֹי suele referirse a una entidad nacional o colectiva. 'Aquella nación' refleja bien el demostrativo y mantiene el tono formal y corporativo del pasaje.
- source_word: מֵרָעָתוֹ
  english_pob_choice: from its evil
  chosen_spanish: de su mal
  alternatives_spanish:
  - de su maldad
  - de su perversidad
  - de su malicia
  lexicon: HALOT
  rationale: רָעָה aquí se contrasta con el mal/disaster posterior. 'Mal' preserva esa relación léxica en español y no sobreespecifica más de lo que el hebreo exige.
- source_word: אֲשֶׁר דִּבַּרְתִּי עָלָיו
  english_pob_choice: against which I spoke
  chosen_spanish: contra la cual hablé
  alternatives_spanish:
  - de la cual hablé
  - sobre la cual hablé
  - contra la que hablé
  lexicon: HALOT
  rationale: דִּבֵּר עַל puede tener matiz de hablar contra. 'Contra la cual hablé' conserva ese valor adversativo que el contexto de juicio requiere, sin añadir una formulación más interpretativa que la fuente.
- source_word: וְנִחַמְתִּי
  english_pob_choice: then I will relent
  chosen_spanish: entonces yo me arrepentiré
  alternatives_spanish:
  - entonces me desharé de la amenaza
  - entonces me aplacaré
  - entonces me retractaré
  lexicon: HALOT
  rationale: Aunque el inglés POB opta por 'relent' para evitar una lectura moralmente problemática, en español 'arrepentirme' aquí puede funcionar como término de relación/renuncia al juicio; sin embargo, esta elección conserva la tensión teológica del hebreo, que puede leerse como una respuesta divina al cambio humano. Se mantiene con nota para no borrar la alternativa de 'revelarse/relentir' en la discusión auditada.
- source_word: עַל הָרָעָה
  english_pob_choice: concerning the disaster
  chosen_spanish: del mal
  alternatives_spanish:
  - de la calamidad
  - del desastre
  - de la desgracia
  lexicon: HALOT
  rationale: El hebreo usa el mismo campo semántico de רָעָה para el mal de la nación y para el mal que Yahvé planeaba hacer, aunque el sentido cambia de mal moral a calamidad. Aquí se conserva la repetición léxica con 'mal' para no perder ese enlace documentado por el POB inglés.
- source_word: אֲשֶׁר חָשַׁבְתִּי
  english_pob_choice: that I planned
  chosen_spanish: que pensé
  alternatives_spanish:
  - que planeé
  - que me propuse
  - que había pensado
  lexicon: HALOT
  rationale: חָשַׁב puede significar pensar, planear o proponerse. Dado que el hebreo literal es 'pensé', se mantiene 'pensé' como opción fuente-directa; el contexto de acción futura permite leer intención sin forzar una paráfrasis.
- source_word: לַעֲשׂוֹת לוֹ
  english_pob_choice: to do to it
  chosen_spanish: hacerle
  alternatives_spanish:
  - hacerlo
  - obrar contra ella
  - hacerlo sobre ella
  lexicon: HALOT
  rationale: 'La construcción con ל más pronombre se vuelve naturalmente en español con objeto indirecto: ''hacerle''. El referente colectivo femenino singular sigue el género de ''nación'' y evita una calca torpe.'
theological_decisions:
- issue: Cómo traducir נִחַם cuando se aplica a Dios
  english_pob_reading: then I will relent
  chosen_spanish_reading: entonces yo me arrepentiré
  alternative_spanish_readings:
  - entonces yo me retractaré
  - entonces yo me desviaré de ello
  - entonces yo me aplacaré
  rationale: El pasaje presenta una respuesta divina condicionada al cambio humano. 'Me arrepentiré' es una forma española viable si se entiende como cesar o revocar el juicio anunciado, no como admisión de pecado. Se conserva así la tensión del texto y se evita suavizarla en exceso.
  doctrine_reference: Translation philosophy §3, §6
- issue: Mantener la repetición entre el mal de la nación y el mal anunciado por Dios
  english_pob_reading: the nation's 'evil' and the 'disaster' God planned
  chosen_spanish_reading: de su mal ... del mal
  alternative_spanish_readings:
  - de su mal ... del desastre
  - de su maldad ... de la calamidad
  - de su perversidad ... del castigo
  rationale: El hebreo repite la misma raíz léxica con cambio de sentido. Al conservar 'mal' en ambos lugares, la traducción española deja visible la tensión semántica que el POB inglés anotó con claridad.
  doctrine_reference: Translation philosophy §2, §5
translation_notes:
  revision_awareness: 'El borrador sigue de cerca el pasaje hebreo de Jeremías 18:8 y toma como guía el audit trail inglés revisado: mantiene la estructura condicional, conserva la repetición léxica de רָעָה para no borrar el contraste moral/calamitoso, y refleja el valor adversativo de דִּבַּרְתִּי עָלָיו. La decisión más sensible es נִחַם: el inglés POB prefiere ''relent'' por cautela teológica; en este borrador español se usa ''me arrepentiré'' con nota explícita para dejar abierta la tensión semántica sin moralizar el texto ni resolverla prematuramente.'
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' implícito solo donde corresponde al contexto general; en este versículo el sujeto divino está en primera persona, por lo que no se introduce un nombre adicional.
  - '''Nación'' se usa para גּוֹי, coherente con el registro bíblico y con el uso corporativo del contexto.'
  - Se preserva la relación de género con 'aquella nación' y el pronombre 'le' para evitar discordancias.
  - Las notas usan marcadores únicos y aparecen ancladas exactamente en el texto donde corresponde.
