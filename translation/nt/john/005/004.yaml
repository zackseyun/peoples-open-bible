id: JHN.5.4
reference: John 5:4
source:
  edition: robinson-pierpont-2005-byzantine
  text: Ἄγγελος γὰρ κατὰ καιρὸν κατέβαινεν ἐν τῇ κολυμβήθρᾳ, καὶ ἐτάρασσεν τὸ ὕδωρ·
    ὁ οὖν πρῶτος ἐμβὰς μετὰ τὴν ταραχὴν τοῦ ὕδατος, ὑγιὴς ἐγίνετο, ᾧ δήποτε κατείχετο
    νοσήματι.
  language: Greek
translation:
  text: For an angel would go down into the pool from time to time and stir up the
    water. Therefore, the first one to step in after the stirring of the water would
    become well from whatever disease afflicted him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: This verse (along with the latter half of verse 3) is absent from the earliest
      Greek papyri (such as the 3rd-century Papyrus 66 and Papyrus 75) and major 4th-century
      manuscripts (Sinaiticus and Vaticanus). It is present in the Byzantine majority
      tradition, as well as early Latin and Syriac translations. It is widely viewed
      by scholars as an early scribal addition to explain why the disabled gathered
      at the pool.
    reason: textual_critical
  - marker: b
    text: Or 'became well'.
    reason: previous_rendering
lexical_decisions:
- source_word: καταβαίνω
  chosen: would go down
  alternatives:
  - went down
  - descended
  lexicon: BDAG
  rationale: The imperfect tense (κατέβαινεν) indicates a customary, repeated action
    in the past, which is best expressed in English using 'would'.
- source_word: κατέχω
  chosen: afflicted
  alternatives:
  - held
  - bound
  - suffered from
  lexicon: BDAG
  rationale: While literally meaning 'to hold fast' or 'to restrain', when used with
    a disease (νοσήματι) in the passive voice, it idiomatically describes being afflicted
    by an illness.
- source_word: καιρός
  chosen: from time to time
  alternatives:
  - at a certain season
  - periodically
  lexicon: BDAG
  rationale: The prepositional phrase 'κατὰ καιρὸν' denotes an occasional or periodic
    occurrence rather than a strictly scheduled season.
theological_decisions: []
