translation:
  language: es
  text: Así dejó todo lo que tenía en la mano de José[a], y no atendía a nada con él[b], excepto la comida que comía[c]. Y José era de hermosa figura y de buen parecer.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «en la mano de José»; la imagen de «mano» expresa encargo o control.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «no sabía nada con él»; el hebreo usa una expresión idiomática que puede implicar que no se ocupaba de nada de lo suyo bajo la gestión de José.'
    reason: alternative_reading
  - marker: c
    text: 'Hebreo: «el pan que comía»; aquí «pan» probablemente significa comida en general.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּעֲזֹב
  english_pob_choice: he left
  chosen_spanish: dejó
  alternatives_spanish:
  - abandonó
  - entregó
  lexicon: HALOT 5800
  rationale: El verbo expresa dejar/soltar/poner aparte. En este contexto administrativo, «dejó» conserva la idea de delegación sin introducir una paráfrasis más interpretativa.
- source_word: כָּל אֲשֶׁר לוֹ
  english_pob_choice: all that he had
  chosen_spanish: todo lo que tenía
  alternatives_spanish:
  - todo lo que poseía
  - todas sus posesiones
  lexicon: HALOT 3605; 834
  rationale: La frase abarca de manera amplia los bienes y asuntos de Potifar. «Todo lo que tenía» es idiomático en español y mantiene el alcance general.
- source_word: בְּיַד יוֹסֵף
  english_pob_choice: in Joseph’s hand
  chosen_spanish: en la mano de José
  alternatives_spanish:
  - bajo el cuidado de José
  - bajo la autoridad de José
  lexicon: HALOT 3027
  rationale: Se conserva la imagen hebrea de «mano» como esfera de control o encargo. No se reemplaza por una abstracción, porque la metáfora es parte del texto fuente.
- source_word: וְלֹא יָדַע אִתּוֹ מְאוּמָה
  english_pob_choice: he knew nothing with him
  chosen_spanish: no sabía nada con él
  alternatives_spanish:
  - no se preocupaba de nada de lo suyo
  - no atendía a nada en su cargo
  lexicon: HALOT 3045; 854; 3972
  rationale: La construcción hebrea es idiomática y en la auditoría inglesa se decidió mantener la literalidad básica. En español, «no sabía nada con él» conserva la relación preposicional de אִתּוֹ sin forzar una interpretación más libre; el sentido contextual de no ocuparse de asuntos adicionales queda implícito por la frase siguiente y por el encargo previo.
- source_word: כִּי אִם
  english_pob_choice: except
  chosen_spanish: excepto
  alternatives_spanish:
  - salvo
  - más que
  lexicon: HALOT 3588; 518
  rationale: Marca una excepción directa y natural en español.
- source_word: הַלֶּחֶם אֲשֶׁר הוּא אֹכֵל
  english_pob_choice: the food that he ate
  chosen_spanish: el pan que comía
  alternatives_spanish:
  - la comida que comía
  - el alimento que comía
  lexicon: HALOT 3899; 398
  rationale: לֶחֶם literalmente es «pan», y la POB inglesa anotó la posibilidad de «food» como sentido general. Aquí se conserva «pan» para no perder la base léxica del hebreo, mientras que el imperfecto español «comía» refleja con naturalidad la acción habitual.
- source_word: יְפֵה תֹאַר
  english_pob_choice: handsome in form
  chosen_spanish: hermoso de figura
  alternatives_spanish:
  - bien proporcionado
  - de buena figura
  lexicon: HALOT 3303; 8389
  rationale: Se distingue la referencia a la constitución física o silueta. «Hermoso de figura» mantiene el paralelismo del hebreo y evita una simplificación meramente estética.
- source_word: וִיפֵה מַרְאֶה
  english_pob_choice: handsome in appearance
  chosen_spanish: hermoso de parecer
  alternatives_spanish:
  - hermoso en apariencia
  - de hermoso aspecto
  lexicon: HALOT 3303; 4758
  rationale: Se conserva el paralelismo con el miembro anterior y la distinción entre forma y apariencia visible. «Parecer» es una opción literaria y comprensible en español bíblico contemporáneo.
theological_decisions:
- issue: Representación de la metáfora de «mano» para autoridad o encargo
  english_pob_reading: in Joseph’s hand
  chosen_spanish_reading: en la mano de José
  alternative_spanish_readings:
  - bajo el cuidado de José
  - bajo la autoridad de José
  rationale: No hay carga doctrinal directa, pero sí una decisión hermenéutica sobre metáfora. Se conserva la imagen corporal del original para no borrar la forma semítica del texto.
  doctrine_reference: none
translation_notes:
  revision_awareness: La redacción sigue la última revisión inglesa en la que se mantuvo la literalidad de «he knew nothing with him» en vez de una paráfrasis explicativa. Se conserva también la distinción entre «handsome in form» y «handsome in appearance» mediante dos miembros paralelos en español.
  spanish_consistency_notes:
  - Se usa «José» sin transliteración alternativa para Ἰησοῦς/יוֹסֵף según la convención establecida.
  - Se mantiene «pan» en concordancia con el hebreo לֶחֶם, aunque el contexto admite el sentido ampliado de comida; por eso se añade nota.
  - «Figura» y «parecer» se emplean para reflejar el paralelismo hebreo sin repetir exactamente el mismo matiz.
  - El orden y la puntuación siguen el flujo narrativo natural del español, manteniendo la equivalencia fuente-texto sin exagerar la literalidad.
