translation:
  language: es
  text: 'Entonces le dijeron[a]: «Señor, danos siempre este pan».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «Señor» como tratamiento respetuoso. El griego κύριε puede funcionar tanto como forma cortés de dirigirse a alguien como también como «Señor».
    reason: alternative_reading
lexical_decisions:
- source_word: εἶπον
  english_pob_choice: they said
  chosen_spanish: le dijeron
  alternatives_spanish:
  - le hablaron
  - le dijeron ellos
  lexicon: λέγω
  rationale: El aoristo narrativo de λέγω se expresa naturalmente con «dijeron». El objeto indirecto «le» conserva la dirección del habla hacia Jesús sin añadir matices innecesarios.
- source_word: οὖν
  english_pob_choice: So
  chosen_spanish: Entonces
  alternatives_spanish:
  - Así que
  - Por tanto
  lexicon: οὖν
  rationale: «Entonces» reproduce la continuidad inferencial o discursiva de οὖν con un español natural y digno.
- source_word: πρὸς αὐτόν
  english_pob_choice: to him
  chosen_spanish: le
  alternatives_spanish:
  - a él
  - hacia él
  lexicon: πρός + acusativo en contexto de habla
  rationale: En español, el destinatario del discurso se expresa mejor con el clítico dativo «le»; el sentido de dirección del griego queda implícito en el acto de hablar.
- source_word: Κύριε
  english_pob_choice: Lord
  chosen_spanish: Señor
  alternatives_spanish:
  - Señor mío
  - Sir
  lexicon: κύριος
  rationale: Se mantiene «Señor» para κύριος, como equivalente reverente y públicamente reconocible en español. En este contexto el término puede funcionar como trato respetuoso y también conservar su posible alcance más alto.
- source_word: πάντοτε
  english_pob_choice: always
  chosen_spanish: siempre
  alternatives_spanish:
  - todo el tiempo
  - constantemente
  lexicon: πάντοτε
  rationale: «Siempre» es el equivalente directo y natural en español para la petición de provisión continua.
- source_word: δὸς
  english_pob_choice: give
  chosen_spanish: danos
  alternatives_spanish:
  - concédenos
  - dánoslo
  lexicon: δίδωμι
  rationale: 'El imperativo aoristo se traduce como una petición directa: «danos». Mantiene la inmediatez y no eleva el registro más allá de lo que exige el griego.'
- source_word: ἡμῖν
  english_pob_choice: us
  chosen_spanish: nos
  alternatives_spanish:
  - a nosotros
  lexicon: ἐγώ
  rationale: El dativo de destinatario se expresa con el clítico español «nos», más natural que una construcción analítica.
- source_word: τὸν ἄρτον τοῦτον
  english_pob_choice: this bread
  chosen_spanish: este pan
  alternatives_spanish:
  - este alimento
  - este pan mismo
  lexicon: ἄρτος
  rationale: Aunque ἄρτος puede abarcar más que una mera pieza de pan en ciertos contextos, aquí la equivalencia más natural y fiel en español es «pan». El demostrativo «este» conserva la referencia al pan ya mencionado.
theological_decisions:
- issue: Título κύριος en el diálogo con Jesús
  english_pob_reading: Lord
  chosen_spanish_reading: Señor
  alternative_spanish_readings:
  - Sir
  - Maestro
  rationale: Se preserva la decisión POB de traducir κύριος como «Señor», porque mantiene la amplitud semántica del término y evita reducirlo a una cortesía banal. En Juan, esa ambigüedad puede ser teológicamente significativa.
  doctrine_reference: 'DOCTRINE.md: κύριος → Lord / Señor'
translation_notes:
  revision_awareness: El texto griego y el audit trail inglés presentan alta concordancia y no registran revisiones aplicadas; esta versión española sigue de cerca la decisión inglesa final y conserva la ambigüedad respetuosa de κύριος sin forzar una lectura más estrecha.
  spanish_consistency_notes:
  - Se evitó «SEÑOR» en versalitas o como sustitución litúrgica, porque el proyecto pide «Yahvé» para יהוה y aquí el término es κύριος dirigido a Jesús.
  - Se eligió «pan» en lugar de «alimento» para ἄρτος, ya que el contexto inmediato y la auditoría inglesa confirman la referencia específica.
  - 'Se mantuvo el orden conversacional natural del español: «Entonces le dijeron: …»'
