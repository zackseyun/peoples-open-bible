translation:
  language: es
  text: Y el lado oriental irá entre Haurán y Damasco, y entre Galaad y la tierra de Israel, el Jordán, desde la frontera hasta el mar oriental[a]; medirán el lado oriental.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, más específicamente, «el mar Muerto»; el hebreo dice literalmente «el mar oriental».
    reason: lexical_alternative
lexical_decisions:
- source_word: פְאַת
  english_pob_choice: side
  chosen_spanish: lado
  alternatives_spanish:
  - costado
  - borde
  - extremo
  lexicon: HALOT
  rationale: En un contexto de delimitación territorial, פאה no se entiende como 'esquina' geométrica, sino como una parte o cara del territorio. 'Lado' conserva el valor direccional y resulta natural en español.
- source_word: קָדִים / קָדִימָה
  english_pob_choice: eastern
  chosen_spanish: oriental
  alternatives_spanish:
  - este
  - del este
  - oriental
  lexicon: HALOT
  rationale: El hebreo designa el lado oriental de la distribución territorial. 'Oriental' mantiene la referencia direccional con estilo bíblico sobrio; en la repetición final, se conserva la misma idea para reforzar la simetría del hebreo.
- source_word: מִבֵּין ... וּמִבֵּין ...
  english_pob_choice: from between ... and ...
  chosen_spanish: desde entre ... y ...
  alternatives_spanish:
  - entre ... y ...
  - desde la zona entre ... y ...
  lexicon: HALOT
  rationale: La construcción repetida expresa un límite trazado por puntos de referencia. 'Desde entre' sigue de cerca la estructura hebrea sin sonar forzado en español.
- source_word: חַוְרָן
  english_pob_choice: Hauran
  chosen_spanish: Haurán
  alternatives_spanish:
  - Hauran
  lexicon: transliteration
  rationale: Se usa la transliteración usual en español con acento gráfico para la pronunciación natural.
- source_word: דַּמֶּשֶׂק
  english_pob_choice: Damascus
  chosen_spanish: Damasco
  alternatives_spanish:
  - Damascus
  lexicon: transliteration
  rationale: Forma tradicional y transparente del topónimo en español.
- source_word: הַגִּלְעָד
  english_pob_choice: Gilead
  chosen_spanish: Galaad
  alternatives_spanish:
  - Gilead
  lexicon: transliteration
  rationale: Se prefiere la forma española bíblica habitual 'Galaad' por inteligibilidad y tradición de uso.
- source_word: אֶרֶץ יִשְׂרָאֵל
  english_pob_choice: the land of Israel
  chosen_spanish: la tierra de Israel
  alternatives_spanish:
  - la tierra de Israel
  - el país de Israel
  lexicon: HALOT
  rationale: El constructo incluye explícitamente 'tierra'; mantenerlo distingue el territorio de la entidad colectiva y reproduce con fidelidad la imagen geográfica.
- source_word: הַיַּרְדֵּן
  english_pob_choice: the Jordan
  chosen_spanish: el Jordán
  alternatives_spanish:
  - el río Jordán
  lexicon: transliteration
  rationale: El hebreo nombra el río de forma directa. 'El Jordán' es la forma breve y estándar en español bíblico.
- source_word: מִגְּבוּל
  english_pob_choice: from the border
  chosen_spanish: desde la frontera
  alternatives_spanish:
  - desde el límite
  - a partir de la frontera
  lexicon: HALOT
  rationale: '''Frontera'' expresa bien la idea de límite territorial en español moderno y suena natural en la secuencia descriptiva.'
- source_word: הַיָּם הַקַּדְמוֹנִי
  english_pob_choice: the eastern sea
  chosen_spanish: el mar oriental
  alternatives_spanish:
  - el mar del oriente
  - el mar oriental
  lexicon: HALOT
  rationale: Se conserva la designación descriptiva literal del hebreo. No se sustituye por el nombre identificativo posterior para no borrar la expresión original.
- source_word: תָּמֹדּוּ
  english_pob_choice: you shall measure
  chosen_spanish: ustedes medirán
  alternatives_spanish:
  - medirán
  - ustedes delimitarán
  lexicon: HALOT
  rationale: El verbo מדד significa 'medir'. 'Medirán' mantiene la fuerza verbal y el enlace con el lenguaje de medición del pasaje; se explicita el sujeto para claridad en español.
translation_notes:
  revision_awareness: Se atendió la validación previa asegurando que todo marcador de nota aparezca exactamente en el texto traducido. La nota [a] quedó anclada en 'Damasco[a]' como equivalente funcional del audit trail inglés, sin añadir notas sin anclaje.
  spanish_consistency_notes:
  - Se mantuvo un registro geográfico sobrio y coherente, con transliteraciones habituales en español bíblico.
  - Se preservó la estructura de delimitación territorial y la repetición final del lado oriental.
  - No se sustituyó 'mar oriental' por 'Mar Muerto' en el texto principal para no borrar la formulación hebrea; esa identificación queda solo en nota.
