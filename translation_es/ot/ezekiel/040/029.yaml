translation:
  language: es
  text: Y su cuarto de guardia[a], sus pilares laterales y su pórtico[b] eran conforme a estas medidas; y tenía ventanas, y su pórtico tenía ventanas, todo alrededor. La longitud era de cincuenta codos, y la anchura de veinticinco codos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «jambas», «pilastras» o «postes» para «pilares laterales».
    reason: lexical_alternative
  - marker: b
    text: O «vestíbulo» para «pórtico».
    reason: lexical_alternative
lexical_decisions:
- source_word: תָּא
  english_pob_choice: guardroom
  chosen_spanish: guardia
  alternatives_spanish:
  - cámara
  - cuarto de guardia
  - recinto
  lexicon: HALOT
  rationale: En este contexto de arquitectura del templo, el hebreo designa un espacio estructural asociado a la puerta. «Guardia» mantiene la relación funcional con el inglés POB («guardroom») y evita sobredeterminar la forma exacta cuando el texto no la explicita por sí solo.
- source_word: אַיִל
  english_pob_choice: side pillar
  chosen_spanish: pilares laterales
  alternatives_spanish:
  - jambas
  - pilastras
  - postes laterales
  lexicon: HALOT
  rationale: El referente es un elemento vertical estructural del acceso. «Pilares laterales» conserva el valor arquitectónico y es más claro en español que un préstamo técnico como «jambas», sin perder el sentido de soporte lateral.
- source_word: אֵילָם
  english_pob_choice: porch
  chosen_spanish: pórtico
  alternatives_spanish:
  - vestíbulo
  - portal
  - antecámara
  lexicon: HALOT
  rationale: «Pórtico» reproduce bien la idea de una parte de entrada proyectada y es suficientemente técnico para este contexto. Se prefiere aquí sobre «porche», que en español puede sonar más doméstico que arquitectónico.
- source_word: כַּמִּדּוֹת הָאֵלֶּה
  english_pob_choice: according to these measurements
  chosen_spanish: conforme a estas medidas
  alternatives_spanish:
  - según estas medidas
  - con las mismas dimensiones que estas
  lexicon: HALOT
  rationale: La frase indica conformidad con dimensiones ya dadas. «Conforme a estas medidas» reproduce con precisión la relación comparativa sin añadir matices interpretativos.
- source_word: חַלּוֹנוֹת
  english_pob_choice: windows
  chosen_spanish: ventanas
  alternatives_spanish:
  - aberturas
  - claraboyas
  - ventanillas
  lexicon: HALOT
  rationale: El sentido básico es «ventanas». No hay indicio suficiente para especificar otro tipo de abertura, así que se mantiene el término directo y transparente.
- source_word: סָבִיב סָבִיב
  english_pob_choice: all around
  chosen_spanish: todo alrededor
  alternatives_spanish:
  - en derredor
  - por todas partes
  - alrededor
  lexicon: HALOT
  rationale: La duplicación hebrea intensifica la idea de circunferencia. «Todo alrededor» transmite bien esa distribución completa sin sonar arcaico.
- source_word: חֲמִשִּׁים אַמָּה אֹרֶךְ
  english_pob_choice: The length was fifty cubits
  chosen_spanish: La longitud era de cincuenta codos
  alternatives_spanish:
  - Medía cincuenta codos de largo
  - Su longitud era de cincuenta codos
  lexicon: HALOT
  rationale: Se conserva la estructura dimensional del hebreo y del inglés POB. «Longitud» funciona bien en un contexto de medidas arquitectónicas y evita una paráfrasis excesiva.
- source_word: וְרֹחַב עֶשְׂרִים וְחָמֵשׁ אַמּוֹת
  english_pob_choice: and the width twenty-five cubits
  chosen_spanish: y la anchura de veinticinco codos
  alternatives_spanish:
  - y medía veinticinco codos de ancho
  - y el ancho era de veinticinco codos
  lexicon: HALOT
  rationale: «Anchura» sigue de cerca la formulación dimensional del hebreo y mantiene la simetría con «longitud». Se evita reescribirlo en una forma más libre para conservar el patrón de medición.
translation_notes:
  revision_awareness: 'El texto base inglés no requirió revisiones posteriores según el expediente: latest_revision_pass indica que no hubo cambios necesarios y cross_check_summary reporta acuerdo mayoritario con observaciones menores. Por ello, la versión española sigue de cerca el sentido estabilizado del POB inglés y el hebreo, sin incorporar ajustes no atestiguados.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma del proyecto solo cuando corresponda; este versículo no contiene el Tetragrámaton ni un equivalente directo.
  - Se preserva el registro arquitectónico y dimensional, evitando simplificaciones que borren la precisión técnica del pasaje.
  - Se usa «codos» para אַמּוֹת conforme a la terminología bíblica estándar del proyecto.
  - La coordinación de posesivos («su... sus... su...») refleja el hebreo pronominal sin forzar una estructura más literal que resulte poco natural en español.
