lexical_decisions:
- source_word: כַּמַּיִם
  english_pob_choice: like water
  chosen_spanish: como agua
  alternatives_spanish:
  - cual agua
  - como si fuera agua
  lexicon: HALOT
  rationale: La partícula כ marca comparación. «Como agua» conserva la imagen de derramamiento total con un español natural y directo.
- source_word: נִשְׁפַּכְתִּי
  english_pob_choice: I am poured out
  chosen_spanish: estoy derramado
  alternatives_spanish:
  - he sido derramado
  - me derramo
  lexicon: HALOT
  rationale: El nifal expresa el estado del hablante como alguien vaciado o derramado. «Estoy derramado» preserva el valor descriptivo presente sin forzar una perífrasis más rígida.
- source_word: וְהִתְפָּרְדוּ
  english_pob_choice: are out of joint
  chosen_spanish: se han dislocado
  alternatives_spanish:
  - se han separado
  - están fuera de lugar
  - se han desarticulado
  lexicon: HALOT
  rationale: Con «huesos», el verbo sugiere una imagen corporal de desunión o desplazamiento. «Se han dislocado» comunica de modo natural la fuerza física de la metáfora en español.
- source_word: כָּל עַצְמוֹתַי
  english_pob_choice: all my bones
  chosen_spanish: todos mis huesos
  alternatives_spanish:
  - cada uno de mis huesos
  lexicon: HALOT
  rationale: «Todos mis huesos» mantiene la totalidad expresada por כָּל y la concreción corporal del hebreo.
- source_word: הָיָה לִבִּי
  english_pob_choice: my heart has become
  chosen_spanish: mi corazón se ha vuelto
  alternatives_spanish:
  - mi corazón ha llegado a ser
  - mi corazón está
  lexicon: HALOT
  rationale: La cláusula indica un cambio de estado. «Se ha vuelto» preserva ese giro resultante mejor que un simple «está».
- source_word: כַּדּוֹנָג
  english_pob_choice: like wax
  chosen_spanish: como cera
  alternatives_spanish:
  - como la cera
  lexicon: HALOT
  rationale: דוֹנָג significa cera; la comparación se mantiene de forma transparente y fiel.
- source_word: נָמֵס
  english_pob_choice: melted
  chosen_spanish: derretida
  alternatives_spanish:
  - derretido
  - se derrite
  lexicon: HALOT
  rationale: El verbo מסס comunica derretimiento o deshacimiento. «Derretida» conserva la imagen del texto, coordinada con «como cera».
- source_word: בְּתוֹךְ מֵעָי
  english_pob_choice: within me
  chosen_spanish: dentro de mí
  alternatives_spanish:
  - en medio de mis entrañas
  - dentro de mis entrañas
  lexicon: HALOT
  rationale: מֵעִים nombra las entrañas o partes internas, pero el español puede sonar más natural con «dentro de mí». Se preserva así el sentido visceral sin volverlo abstracto.
theological_decisions:
- issue: Expresión antropológica visceral del dolor
  english_pob_reading: within me
  chosen_spanish_reading: dentro de mí
  alternative_spanish_readings:
  - dentro de mis entrañas
  - en medio de mis entrañas
  rationale: El hebreo emplea un término corporal para el centro del sufrimiento. La frase principal fluye en español, mientras la nota conserva la alternativa más literal para no borrar la concreción antropológica del original.
  doctrine_reference: Translation philosophy §6; preservar la tensión lexical y antropológica del original
- issue: Similitud corporal intensa sin suavizar la imagen
  english_pob_reading: are out of joint
  chosen_spanish_reading: se han dislocado
  alternative_spanish_readings:
  - se han separado
  - se han desarticulado
  rationale: El POB inglés opta por una imagen física intensa. «Se han dislocado» mantiene la corporeidad y el impacto del hebreo, evitando una abstracción menor.
  doctrine_reference: Translation philosophy §6; mantener la imaginería corporal del texto
translation_notes:
  revision_awareness: El contexto auditado muestra alta concordancia y sin revisiones aplicadas; se conserva el sentido del borrador inglés POB con adaptación idiomática al español y sin añadir elementos no sustentados por el hebreo.
  spanish_consistency_notes:
  - Se mantiene «Dios»/«Yahvé» fuera de este versículo, por no aparecer aquí.
  - 'Se conservan imágenes corporales concretas: agua, huesos, corazón, cera, entrañas.'
  - Se evita sustituir la metáfora por una explicación; la nota preserva la lectura más literal de מֵעָי.
