theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Degree of idiomatic smoothing in בְּיָדוֹ
  chosen_reading: retain 'in his hand' in the main text
  alternative_readings:
  - through his hand
  - under his direction
  rationale: The phrase is idiomatic, but not opaque in English. Retaining it preserves the concrete Hebrew imagery and avoids over-resolving whether the nuance is instrumentality, agency, or sphere of action.
  doctrine_reference: 'DOCTRINE.md Translation philosophy: optimal equivalence; preserve source-text sense without unnecessary paraphrase'
