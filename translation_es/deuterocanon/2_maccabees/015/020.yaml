translation:
  language: es
  text: Y cuando todos ya esperaban la decisión venidera[a], y los enemigos ya habían entablado combate, y el ejército había sido desplegado, y las bestias habían sido colocadas adecuadamente en una parte, y la caballería dispuesta en las alas[b],
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «la decisión inminente» o «la crisis que se acercaba»; también, con otro matiz posible, «el juicio venidero».
    reason: alternative_reading
  - marker: b
    text: Es decir, probablemente los elefantes de guerra en la formación de batalla.
    reason: cultural_note
lexical_decisions:
- source_word: προσδοκώντων
  english_pob_choice: were already expecting
  chosen_spanish: ya esperaban
  alternatives_spanish:
  - ya estaban esperando
  - ya aguardaban
  lexicon: LSJ
  rationale: El participio expresa una espera anticipada e intensa. «Ya esperaban» comunica bien la tensión narrativa sin sonar forzado en español.
- source_word: τὴν ἐσομένην κρίσιν
  english_pob_choice: the coming decision
  chosen_spanish: la decisión que iba a venir
  alternatives_spanish:
  - la decisión venidera
  - el juicio que se acercaba
  - la crisis que se acercaba
  lexicon: LSJ
  rationale: κρίσις en este contexto militar puede ser decisión, juicio o crisis. «Decisión» mantiene la idea del desenlace decisivo sin imponer más de lo que el griego exige; «que iba a venir» conserva el matiz de inminencia.
- source_word: προσμιξάντων τῶν πολεμίων
  english_pob_choice: the enemies had already engaged
  chosen_spanish: los enemigos ya habían entablado combate
  alternatives_spanish:
  - los enemigos ya habían entrado en combate
  - los enemigos ya se habían enfrentado
  lexicon: LSJ
  rationale: El verbo indica unirse o mezclarse en contexto bélico. «Entablado combate» es una expresión natural y fiel para la entrada efectiva en la pelea.
- source_word: τῆς στρατιᾶς ἐκταγείσης
  english_pob_choice: the army had been drawn up
  chosen_spanish: el ejército había sido desplegado
  alternatives_spanish:
  - el ejército había sido ordenado
  - el ejército había sido formado
  lexicon: LSJ
  rationale: La pasiva describe tropas dispuestas en orden. «Desplegado» es militarmente claro en español y conserva la idea de formación táctica.
- source_word: τῶν θηρίων
  english_pob_choice: the beasts
  chosen_spanish: las bestias
  alternatives_spanish:
  - los animales
  - los elefantes
  lexicon: LSJ
  rationale: El griego dice literalmente «bestias». Mantenerlo evita especificar más allá del texto, aunque el contexto histórico apunta a elefantes de guerra.
- source_word: ἐπὶ μέρος
  english_pob_choice: in one part
  chosen_spanish: en una parte
  alternatives_spanish:
  - a un lado
  - en un sector
  lexicon: LSJ
  rationale: La frase indica colocación en una zona determinada de la línea. «En una parte» sigue de cerca el griego sin sobreinterpretar la maniobra.
- source_word: εὐκαίρως ἀποκατασταθέντων
  english_pob_choice: had been suitably stationed
  chosen_spanish: habían sido colocadas oportunamente
  alternatives_spanish:
  - habían sido colocadas de manera adecuada
  - habían sido puestas en el momento y lugar apropiados
  lexicon: LSJ
  rationale: εὐκαίρως aporta oportunidad o adecuación, y ἀποκαθίστημι aquí implica colocar/restablecer en posición. «Oportunamente» conserva la idea de colocación acertada y oportuna.
- source_word: τῆς δὲ ἵππου
  english_pob_choice: the cavalry
  chosen_spanish: la caballería
  alternatives_spanish:
  - los jinetes
  - la tropa de caballería
  lexicon: LSJ
  rationale: Aunque literalmente dice «el caballo/la caballería de caballos», el sentido militar colectivo es «caballería», que es el equivalente idiomático natural en español.
- source_word: κατὰ κέρας τεταγμένης
  english_pob_choice: posted on the wings
  chosen_spanish: dispuesta en las alas
  alternatives_spanish:
  - dispuesta en los flancos
  - formada por los costados
  lexicon: LSJ
  rationale: κέρας en uso militar se refiere al ala de la formación. «Alas» conserva la imagen táctica más literal que el inglés POB decidió resaltar en su revisión final.
theological_decisions:
- issue: Valor de κρίσις en un contexto bélico con posible resonancia religiosa
  english_pob_reading: the coming decision
  chosen_spanish_reading: la decisión que iba a venir
  alternative_spanish_readings:
  - el juicio que se acercaba
  - la crisis que se acercaba
  - el desenlace que se acercaba
  rationale: Se evita fijar prematuramente un matiz exclusivamente forense o teológico. «Decisión» conserva la gravedad y el carácter de desenlace inminente, respetando la tensión documentada en el audit trail.
  doctrine_reference: Preservar la tensión léxica sin resolverla de forma dogmática.
translation_notes:
  revision_awareness: Seguí la revisión más reciente del audit trail inglés, que prefirió «decision» frente a «judgment» para κρίσις y «wings» para κατὰ κέρας. En español mantuve esa preferencia con «decisión» y «alas», sin perder la posibilidad alternativa de «juicio/crisis» en nota.
  spanish_consistency_notes:
  - Mantuve «Yahvé» como norma general del proyecto solo cuando aparezca el Tetragrámaton; este versículo no lo contiene.
  - Usé «caballería» como término militar colectivo y «alas» para la formación táctica, en línea con el cambio final del audit trail inglés.
  - Conservé «bestias» en el texto principal para no cerrar el sentido antes de tiempo; la nota identifica la probable referencia histórica.
