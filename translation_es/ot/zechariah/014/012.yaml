revisions:
- from: 'Y esta será la plaga con que Yahvé herirá a todos los pueblos[a] que hicieron guerra contra Jerusalén: mientras está de pie sobre sus pies, su carne se pudrirá; sus ojos se pudrirán en sus cuencas, y su lengua se pudrirá en su boca.'
  to: 'Y esta será la plaga con que Yahvé herirá a todos los pueblos[a] que hacen guerra contra Jerusalén: mientras aún está de pie, su carne se pudrirá; sus ojos se pudrirán en sus cuencas, y su lengua se pudrirá en su boca.'
  rationale: Se ajusta el verbo de guerra para reflejar mejor el sentido militar contextual de צָבְאוּ עַל en español natural, y se elimina el calco rígido «sobre sus pies» para producir una frase digna y clara sin perder la imagen de que el juicio ocurre mientras la persona sigue erguida. No se requieren cambios doctrinales ni notas adicionales.
  reviewer_model: gpt-5.4
