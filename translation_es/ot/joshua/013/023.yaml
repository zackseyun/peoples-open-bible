translation:
  language: es
  text: Y el límite de los hijos de Rubén era el Jordán y su límite. Esta fue la herencia de los hijos de Rubén, según sus clanes[a], las ciudades y sus aldeas.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «el Jordán como límite». La frase hebrea «el Jordán y límite» es compacta y puede entenderse como que el Jordán mismo funcionaba como la línea divisoria.'
    reason: lexical_alternative
lexical_decisions:
- source_word: גְּבוּל
  english_pob_choice: border
  chosen_spanish: límite
  alternatives_spanish:
  - frontera
  - borde
  - territorio
  lexicon: HALOT
  rationale: En español, «límite» expresa de manera natural la idea geográfica de demarcación. Evita la rigidez de «frontera» y conserva el sentido formal de una línea o extensión delimitadora.
- source_word: בְּנֵי רְאוּבֵן
  english_pob_choice: the sons of Reuben
  chosen_spanish: los hijos de Rubén
  alternatives_spanish:
  - los rubenitas
  - el pueblo de Rubén
  lexicon: HALOT
  rationale: Se mantiene la construcción genealógica/tribal del hebreo con «hijos de Rubén», más transparente para el texto fuente que una etnónimo más interpretativo como «rubenitas».
- source_word: הַיַּרְדֵּן
  english_pob_choice: the Jordan
  chosen_spanish: el Jordán
  alternatives_spanish:
  - el río Jordán
  lexicon: HALOT
  rationale: El nombre propio puede funcionar en español bíblico como «el Jordán» sin añadir «río», que no está explícito en el hebreo y resulta innecesario.
- source_word: וּגְבוּל
  english_pob_choice: and its border
  chosen_spanish: y su límite
  alternatives_spanish:
  - y su frontera
  - y como límite
  lexicon: HALOT
  rationale: El hebreo es compacto y admite la lectura de un segundo término que completa la idea de demarcación. «Su límite» conserva esa relación sin forzar un giro más interpretativo.
- source_word: נַחֲלַת
  english_pob_choice: the inheritance
  chosen_spanish: la herencia
  alternatives_spanish:
  - la posesión asignada
  - la heredad
  lexicon: HALOT
  rationale: En un contexto de repartición tribal, «herencia» transmite bien la porción asignada. Es claro para lectores modernos y sigue el valor patrimonial del término.
- source_word: לְמִשְׁפְּחֹתָם
  english_pob_choice: according to their clans
  chosen_spanish: según sus clanes
  alternatives_spanish:
  - según sus familias
  - por sus clanes
  lexicon: HALOT
  rationale: «Clanes» refleja con precisión el sentido de מִשְׁפָּחֹת en listas de distribución tribal. Es más técnico que «familias» y evita reducirlo al ámbito doméstico.
- source_word: הֶעָרִים
  english_pob_choice: the cities
  chosen_spanish: las ciudades
  alternatives_spanish:
  - los poblados
  - los pueblos
  lexicon: HALOT
  rationale: «Ciudades» sigue la convención bíblica habitual para עָרִים en inventarios territoriales, aun cuando algunas pudieran ser menores según categorías modernas.
- source_word: וְחַצְרֵיהֶן
  english_pob_choice: and their villages
  chosen_spanish: y sus aldeas
  alternatives_spanish:
  - y sus poblados
  - y sus asentamientos
  lexicon: HALOT
  rationale: «Aldeas» expresa con naturalidad los asentamientos dependientes o menores asociados a las ciudades. Es una opción clara en español y suficientemente cercana al rango semántico del hebreo.
translation_notes:
  revision_awareness: La redacción sigue de cerca el hebreo masorético y el tratamiento auditado en inglés. Se conserva la posible ambigüedad de גְּבוּל en la frase «el Jordán y su límite», análoga a la nota inglesa sobre si debe leerse como «el Jordán como frontera». No se introducen cambios textuales ni armonizaciones no atestiguadas.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como término por defecto en otros pasajes, pero este versículo no lo contiene.
  - Se usa «hijos de Rubén» para preservar la estructura tribal del hebreo.
  - Se conserva la fórmula de reparto territorial con terminología sobria y bíblicamente reconocible.
  - «Clanes» se emplea en el sentido técnico de subdivisiones tribales, no como simple sinónimo de familias.
