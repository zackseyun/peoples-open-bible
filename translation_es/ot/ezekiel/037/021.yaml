translation:
  language: es
  text: 'Entonces diles: «Así dice el Señor Yahvé: He aquí, yo voy a tomar a los hijos[a] de Israel de entre las naciones donde han ido, los reuniré de todos lados[b] y los traeré a su propia tierra».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «los hijos de Israel»; también puede entenderse «los descendientes de Israel».'
    reason: lexical_alternative
  - marker: b
    text: O «de todas partes».
    reason: lexical_alternative
lexical_decisions:
- source_word: וְדַבֵּר אֲלֵיהֶם
  english_pob_choice: Then say to them
  chosen_spanish: Entonces diles
  alternatives_spanish:
  - Y habla con ellos
  - Y diles
  lexicon: HALOT
  rationale: El imperativo profético continúa la instrucción divina; «entonces» conserva la secuencia, y «diles» suena natural en español sin perder el mandato directo.
- source_word: כֹּה אָמַר
  english_pob_choice: Thus says
  chosen_spanish: Así dice
  alternatives_spanish:
  - Esto dice
  - De este modo dice
  lexicon: HALOT
  rationale: La fórmula profética se mantiene en un registro solemne y reconocible; «así dice» es la equivalencia más directa y sobria en español.
- source_word: אֲדֹנָי יְהוִה
  english_pob_choice: the Lord GOD
  chosen_spanish: el Señor Yahvé
  alternatives_spanish:
  - el Señor Dios
  - el Señor Yahweh
  lexicon: HALOT
  rationale: Se conserva el valor del título compuesto con el nombre divino explícito en hebreo. La pauta del proyecto pide Yahvé para יְהוָה; «Señor Yahvé» preserva la distinción entre אֲדֹנָי y el nombre propio divino sin recurrir a la convención de enmascaramiento.
- source_word: הִנֵּה
  english_pob_choice: Behold
  chosen_spanish: Mira
  alternatives_spanish:
  - He aquí
  - Miren
  lexicon: HALOT
  rationale: La función de llamada de atención se expresa de forma natural en español; «mira» conserva la fuerza de anuncio solemne sin sonar excesivamente arcaico.
- source_word: לֹקֵחַ
  english_pob_choice: I am taking
  chosen_spanish: yo voy a tomar
  alternatives_spanish:
  - estoy tomando
  - tomaré
  lexicon: HALOT
  rationale: El participio con הִנֵּה comunica acción inminente y vívida. «Voy a tomar» mantiene esa inmediatez en español mejor que un futuro simple y evita una lectura demasiado estática.
- source_word: בְּנֵי יִשְׂרָאֵל
  english_pob_choice: the children of Israel
  chosen_spanish: los hijos de Israel
  alternatives_spanish:
  - los hijos/niños de Israel
  - el pueblo de Israel
  lexicon: HALOT
  rationale: Se conserva la expresión filial/covenantal del hebreo. «Hijos de Israel» refleja con precisión la forma idiomática y la elección del POB en inglés.
- source_word: מִבֵּין הַגּוֹיִם
  english_pob_choice: from among the nations
  chosen_spanish: de entre las naciones
  alternatives_spanish:
  - de entre los pueblos
  - de entre los gentiles
  lexicon: HALOT
  rationale: «Naciones» respeta el alcance contextual de גּוֹיִם y evita el matiz posterior de «gentiles». «De entre» conserva la idea de extracción desde dentro de un conjunto.
- source_word: אֲשֶׁר הָלְכוּ שָׁם
  english_pob_choice: where they have gone
  chosen_spanish: donde han ido
  alternatives_spanish:
  - a donde fueron
  - adonde han ido
  lexicon: HALOT
  rationale: La cláusula relativa identifica el lugar de dispersión. «Han ido» mantiene la relevancia presente de su estado disperso y resulta idiomático en español.
- source_word: וְקִבַּצְתִּי אֹתָם מִסָּבִיב
  english_pob_choice: and I will gather them from all around
  chosen_spanish: los reuniré de todos lados
  alternatives_spanish:
  - los reuniré de alrededor
  - los reuniré de todas partes
  lexicon: HALOT
  rationale: Se preserva la imagen de recolección completa alrededor, expresada en un español claro y natural. «De todos lados» comunica la totalidad sin añadir contenido.
- source_word: וְהֵבֵאתִי אוֹתָם אֶל אַדְמָתָם
  english_pob_choice: and bring them to their own land
  chosen_spanish: y los traeré a su propia tierra
  alternatives_spanish:
  - y los llevaré a su tierra
  - y los haré volver a su tierra
  lexicon: HALOT
  rationale: אַדְמָה aquí designa la tierra natal/homeland. «Su propia tierra» reproduce la posesión explícita del hebreo y sigue la revisión inglesa más cercana al preposición hebrea con un español natural.
theological_decisions:
- issue: Tratamiento del nombre divino יְהוָה dentro de אֲדֹנָי יְהוִה
  english_pob_reading: the Lord GOD / Lord Yahweh tension noted in audit trail
  chosen_spanish_reading: el Señor Yahvé
  alternative_spanish_readings:
  - el Señor Dios
  - el Señor Yahweh
  rationale: El hebreo contiene explícitamente el Tetragrámaton; por la norma del proyecto, se translitera como Yahvé. Al mantener «Señor» para אֲדֹנָי, el español preserva la doble capa de reverencia y nombre propio sin ocultar el término original.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Valor colectivo de בְּנֵי יִשְׂרָאֵל
  english_pob_reading: the children of Israel
  chosen_spanish_reading: los hijos de Israel
  alternative_spanish_readings:
  - el pueblo de Israel
  - los descendientes de Israel
  rationale: La frase conserva el vínculo pactual y familiar del hebreo. En este contexto, «hijos» es suficientemente natural en español y evita aplanar la metáfora a un mero etnónimo.
  doctrine_reference: Lexical note on covenantal kinship language in Hebrew narrative and prophecy
- issue: Sentido de אַדְמָתָם
  english_pob_reading: their own land
  chosen_spanish_reading: su propia tierra
  alternative_spanish_readings:
  - su tierra
  - su país
  rationale: אַדְמָה puede ser 'tierra' o 'suelo', pero aquí el contexto exige la tierra heredada/restaurada. «Su propia tierra» mantiene el sentido territorial y posesivo sin introducir un término moderno ajeno al pasaje.
  doctrine_reference: Lexical note on land/restoration language in prophetic texts
translation_notes:
  revision_awareness: Se siguió la revisión inglesa más reciente que ajustó la preposición final a «to their own land», y se reflejó en español como «a su propia tierra». También se mantuvo la tensión auditada entre el tratamiento reverente del título אֲדֹנָי y la transliteración exigida para יְהוָה.
  spanish_consistency_notes:
  - Se usó «Yahvé» para יְהוָה conforme a la terminología del proyecto, y «Señor» para אֲדֹנָי.
  - Se prefirió «los hijos de Israel» por ser la correspondencia más directa y connota filiación pactual.
  - «De entre las naciones» conserva la noción de extracción desde la dispersión sin introducir 'gentiles'.
  - «A su propia tierra» sigue el matiz posesivo del hebreo y la revisión auditada del inglés.
