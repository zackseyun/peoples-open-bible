  source_alignment_summary: 'El borrador conserva bien la estructura optativa del hebreo, el nombre divino «Yahvé», la repetición temática de «establecido/establecida», y el valor relacional de אֱלֹהִים לְיִשְׂרָאֵל con «Dios para Israel». Sin embargo, los anclajes de notas no siguen el rastro inglés: la nota existente se coloca sobre «establecido», cuando la nota del audit trail inglés pertenece a la cláusula «Dios ... Israel», y además falta la nota cultural sobre «casa» con sentido dinástico.'
  spanish_quality_summary: 'El español es claro y digno. Hay pequeños ajustes de naturalidad y precisión: en español bíblico moderno suena mejor «sea engrandecido tu nombre» sin repetir «sea» tras la conjunción, y conviene añadir artículo en «el Dios de Israel» para reflejar mejor la aposición hebrea y sonar más natural. «Delante de ti» funciona bien.'
  glossary_alignment: Alinea correctamente «Yahvé» para יהוה, «Dios» para אֱלֹהִים, «casa» para בַּיִת con posible nota dinástica, y mantiene el matiz documentado de לְיִשְׂרָאֵל con «para Israel». No hay conflicto terminológico mayor; el ajuste principal es reubicar y completar las notas conforme al audit trail.
  issues:
