id: LUK.22.44
reference: Luke 22:44
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: καὶ γενόμενος ἐν ἀγωνίᾳ ἐκτενέστερον προσηύχετο· ⸄καὶ ἐγένετο⸅ ὁ ἱδρὼς αὐτοῦ ὡσεὶ θρόμβοι αἵματος καταβαίνοντες ἐπὶ τὴν γῆν.⸃
base_translation:
  language: en
  yaml_path: translation/nt/luke/022/044.yaml
  text: And being in agony[a], he was praying more intensely[c][b]; and his sweat became like drops of blood falling to the ground.
  footnotes:
  - marker: a
    text: Or 'more earnestly' or 'more fervently.'
    reason: lexical_alternative
  - marker: b
    text: Greek 'like drops/clots of blood,' preserving a comparison rather than stating that the sweat itself was blood.
    reason: lexical_alternative
  - marker: c
    text: Some manuscripts omit Luke 22:43–44; others include them. The SBLGNT prints the verses in brackets to reflect this textual uncertainty.
    reason: textual_variant
translation:
  language: ko
  text: 그리고 그분께서는 고통 가운데 더욱 간절히 기도하셨고, 그분의 땀은 핏방울처럼 되어 땅에 떨어졌습니다.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 22:43-44는 시내사본·바티칸사본·P75 등 가장 이른 헬라어 사본에는 없으며, 후대 다수 사본 전통에는 있다. SBLGNT는 사본적 불확실을 반영하여 이 두 절을 대괄호로 인쇄한다.
    reason: textual_variant
theological_decisions:
- issue: 「핏방울처럼」 ― 비교인가 동일시인가
  chosen_reading: 핏방울처럼 되어
  alternative_readings:
  - 실제 피가 되어
  rationale: ὡσεὶ는 명백히 비교를 표지한다. 본문은 땀이 핏방울과 「같다」는 비교를 보존하며, 의학적·기적적 동일시로 환원하지 않는다. 누가 고유의 강렬한 정서적 묘사는 그대로 살린다.
  doctrine_reference: DOCTRINE.md §1; §5 textual variants documented
