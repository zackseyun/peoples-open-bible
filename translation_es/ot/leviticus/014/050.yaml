translation:
  language: es
  text: Entonces degollará la primera ave en un recipiente de barro sobre aguas vivas[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literalmente, «aguas vivas»; es decir, agua fresca o corriente.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְשָׁחַט
  english_pob_choice: Then he shall slaughter
  chosen_spanish: Entonces degollará
  alternatives_spanish:
  - Y degollará
  - Luego degollará
  - Entonces sacrificará
  lexicon: HALOT
  rationale: La forma narrativa con waw consecutiva expresa secuencia procedimental; en español, «entonces» conserva ese avance ritual. «Degollar» es más preciso que «matar» para una acción sacrificial/ritual.
- source_word: הַצִּפֹּר הָאֶחָת
  english_pob_choice: the one bird
  chosen_spanish: el ave una
  alternatives_spanish:
  - el ave una
  - la una ave
  - el ave única
  lexicon: HALOT
  rationale: El hebreo es definido y distingue esta ave de la otra mencionada en el contexto. «El ave una» mantiene la definitud y la idea de singularidad sin introducir un ordinal que el texto no da.
- source_word: אֶל
  english_pob_choice: into
  chosen_spanish: en
  alternatives_spanish:
  - dentro de
  - hacia
  - sobre
  lexicon: HALOT
  rationale: En español, el procedimiento ritual se entiende naturalmente con un recipiente donde cae la sangre; «en un recipiente» expresa la dirección funcional del acto sin forzar un calco.
- source_word: כְּלִי חֶרֶשׂ
  english_pob_choice: an earthenware vessel
  chosen_spanish: un recipiente de barro
  alternatives_spanish:
  - una vasija de barro
  - un vaso de barro
  - un recipiente de arcilla
  lexicon: HALOT
  rationale: «כְּלִי» es un contenedor general y «חֶרֶשׂ» especifica barro/loza. «Recipiente de barro» es claro y digno en español contemporáneo; evita tecnicismos innecesarios.
- source_word: עַל
  english_pob_choice: over
  chosen_spanish: sobre
  alternatives_spanish:
  - encima de
  - por encima de
  - sobre la superficie de
  lexicon: HALOT
  rationale: Con «aguas vivas», la preposición indica la acción realizada por encima del agua contenida; «sobre» comunica bien la relación espacial y ritual.
- source_word: מַיִם חַיִּים
  english_pob_choice: living water
  chosen_spanish: aguas vivas
  alternatives_spanish:
  - agua viva
  - aguas corrientes
  - agua fresca
  lexicon: HALOT
  rationale: «Aguas vivas» reproduce con fidelidad la imagen hebrea y conserva la tensión lexical que el POB inglés decidió mantener en la revisión más reciente. En español, el plural es idiomático para esta expresión de agua no estancada.
theological_decisions:
- issue: Valor de מַיִם חַיִּים en un contexto ritual de pureza
  english_pob_reading: living water
  chosen_spanish_reading: aguas vivas
  alternative_spanish_readings:
  - agua fresca
  - aguas corrientes
  rationale: Aquí la expresión describe el tipo de agua requerida para el rito, no una metáfora devocional. Se mantiene la forma literal «aguas vivas» para no borrar su resonancia bíblica ni resolver prematuramente su fuerza semántica.
  doctrine_reference: 'Translation philosophy: optimal equivalence; Preserve theological tension rather than resolve it'
translation_notes:
  revision_awareness: La versión inglesa fue revisada desde «fresh water» a «living water» para mayor precisión léxica; la versión española sigue esa revisión manteniendo el equivalente literal «aguas vivas» y conserva la explicación alternativa en nota.
  spanish_consistency_notes:
  - Se preserva el registro ritual y legal del texto.
  - «Aguas vivas» se usa de forma consistente con la decisión inglesa revisada y con el uso bíblico tradicional, sin sustituirla por una paráfrasis interpretativa.
  - «Degollar» mantiene la fuerza sacrificial del verbo hebreo.
  - Se evita introducir «Cristo», «SEÑOR» u այլ terminología no presente en el verso.
