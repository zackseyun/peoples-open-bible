translation:
  language: es
  text: Entonces David hizo esta lamentación por Saúl y por Jonatán su hijo[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «lamentó con este lamento». El hebreo usa un verbo y un sustantivo afines para expresar una lamentación funeraria formal.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְקֹנֵן
  english_pob_choice: lamented with this lament
  chosen_spanish: entonó este lamento
  alternatives_spanish:
  - lamentó con este lamento
  - compuso este lamento
  - entonó este canto fúnebre
  lexicon: HALOT
  rationale: El verbo קונן expresa el acto formal de pronunciar o entonar un lamento funerario. En español, «entonó este lamento» conserva ese carácter performativo y poético sin introducir una idea excesiva de composición o de canto explícito. «Lamentó con este lamento» sería más literal, pero suena forzado en español.
- source_word: הַקִּינָה
  english_pob_choice: lament
  chosen_spanish: lamento
  alternatives_spanish:
  - canto fúnebre
  - endecha
  - elegía
  lexicon: HALOT
  rationale: קִינָה designa una lamentación formal, a menudo por los muertos. «Lamento» es claro, natural y suficientemente amplio; «endecha» o «elegía» son más marcados o menos transparentes para un lector amplio.
- source_word: הַזֹּאת
  english_pob_choice: this
  chosen_spanish: este
  alternatives_spanish:
  - esta
  lexicon: HALOT
  rationale: El demostrativo modifica directamente a «lamento». En español debe concordar en género con «lamento», por eso se traduce «este».
- source_word: עַל
  english_pob_choice: over
  chosen_spanish: por
  alternatives_spanish:
  - sobre
  - acerca de
  lexicon: HALOT
  rationale: En contextos de duelo, עַל introduce la persona por la que se llora. En español, «por» comunica mejor el objeto del lamento que «sobre» o «acerca de».
- source_word: יְהוֹנָתָן
  english_pob_choice: Jonathan
  chosen_spanish: Jonatán
  alternatives_spanish:
  - Jonathan
  lexicon: Nombre propio hebreo
  rationale: Se usa la forma española habitual del nombre bíblico, «Jonatán», que es plenamente reconocible y natural en español.
- source_word: בְּנוֹ
  english_pob_choice: his son
  chosen_spanish: su hijo
  alternatives_spanish:
  - su propio hijo
  lexicon: HALOT
  rationale: El sufijo posesivo se refiere a Saúl. «Su hijo» transmite la relación filial sin añadir énfasis no explícito en el hebreo.
theological_decisions:
- issue: Relación entre el verbo y el sustantivo de duelo (קונן / קינה)
  english_pob_reading: The Hebrew verb and noun form a formal expression for taking up a funeral lament.
  chosen_spanish_reading: El hebreo expresa una fórmula formal de duelo funerario mediante verbo y sustantivo afines.
  alternative_spanish_readings:
  - David lloró por Saúl y por Jonatán
  - David cantó este lamento por Saúl y por Jonatán
  rationale: No se debe borrar la forma técnica del pasaje. «Entonó este lamento» comunica que David asume una pieza de duelo formal sin convertirla en mera emoción ni añadir la idea de música como hecho principal.
  doctrine_reference: Uso literario y ritual del lamento funerario en el AT
- issue: Marcación del destinatario del lamento con עַל
  english_pob_reading: over Saul and over Jonathan his son
  chosen_spanish_reading: por Saúl y por Jonatán, su hijo
  alternative_spanish_readings:
  - sobre Saúl y sobre Jonatán, su hijo
  - acerca de Saúl y de Jonatán, su hijo
  rationale: En español bíblico y moderno, «por» es la forma más natural para expresar el referente del duelo. Mantiene el sentido funerario sin desplazar el pasaje hacia un mero tema de discurso.
  doctrine_reference: Lenguaje de duelo en narraciones históricas del AT
translation_notes:
  revision_awareness: La versión inglesa revisada pasó de «sang this lament» a «lamented with this lament» para evitar añadir la idea de cantar. La redacción española sigue esa corrección al evitar «cantó» y mantener el valor formal del acto de lamento.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» en otros pasajes para el nombre divino, aunque aquí no aparece.
  - Se usa la forma española bíblica «Jonatán» para coherencia onomástica.
  - No se introduce puntuación interpretativa que altere el paralelismo de los dos complementos introducidos por «por».
