  text: וַ/יִּקְשָׁר קֶ֜שֶׁר הוֹשֵׁ֣עַ בֶּן אֵלָ֗ה עַל פֶּ֨קַח֙ בֶּן רְמַלְיָ֔הוּ וַ/יַּכֵּ֨/הוּ֙ וַ/יְמִיתֵ֔/הוּ וַ/יִּמְלֹ֖ךְ תַּחְתָּ֑י/ו בִּ/שְׁנַ֣ת עֶשְׂרִ֔ים לְ/יוֹתָ֖ם בֶּן עֻזִיָּֽה־־־־־׃
base_translation:
  language: en
  yaml_path: translation/ot/2_kings/015/030.yaml
  text: Then Hoshea son of Elah conspired against Pekah son of Remaliah[a], struck him down, put him to death, and reigned in his place[b], in the twentieth year of Jotham son of Uzziah.
  footnotes:
  - marker: a
    text: 'Hebrew: ''conspired a conspiracy,'' an emphatic expression for plotting against the king.'
    reason: lexical_alternative
  - marker: b
    text: The Hebrew reads 'in the twentieth year of Jotham son of Uzziah.' This creates a chronological difficulty in the regnal data; some interpreters attempt to harmonize it with Ahaz's reign, but the translation follows the Hebrew wording.
    reason: textual_variant
