  yaml_path: translation/ot/jeremiah/008/013.yaml
  text: I will surely gather them[a], declares Yahweh. There are no grapes on the vine, and no figs on the fig tree; even the leaf has withered[b], and what I gave them will pass away from them.
  footnotes:
