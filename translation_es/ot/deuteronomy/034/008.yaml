revisions:
- from: Y los hijos de Israel lloraron por Moisés en los llanos de Moab durante treinta días; y se cumplieron los días del llanto[a], el duelo por Moisés.
  to: Y los hijos de Israel lloraron por Moisés en los llanos de Moab durante treinta días; los días del llanto[a], el duelo por Moisés, llegaron a su fin.
  rationale: Se hizo una reparación menor para que el español suene más natural y apto para lectura pública, manteniendo el sentido fuente y la decisión del POB de conservar la relación appositiva entre 'los días del llanto' y 'el duelo por Moisés'. 'Llegaron a su fin' comunica mejor en español la terminación del período de duelo que 'se cumplieron' en este contexto.
