translation:
  language: es
  text: Apartarás para ti tres ciudades dentro de tu tierra que Yahvé tu Dios te da para poseer[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'para heredarla'. El verbo hebreo puede significar 'poseer' o 'heredar' en contextos de concesión de tierras.
    reason: lexical_alternative
lexical_decisions:
- source_word: שָׁל֥וֹשׁ עָרִ֖ים
  english_pob_choice: three cities
  chosen_spanish: tres ciudades
  alternatives_spanish:
  - tres poblados
  - tres villas
  lexicon: HALOT
  rationale: עִיר designa una ciudad o población urbana; en texto legal, 'ciudades' conserva el registro formal y la correspondencia directa con la función de las ciudades de refugio.
- source_word: תַּבְדִּ֣יל
  english_pob_choice: you shall set apart
  chosen_spanish: harás para ti
  alternatives_spanish:
  - separarás
  - designarás
  - apartarás
  lexicon: HALOT
  rationale: El hebreo hiphil de בדל implica separar o apartar. En castellano, 'harás para ti' conserva el matiz benefactivo/reflexivo de לָךְ y se integra de forma natural con el mandato legal; el sentido de apartar/designar queda contextualizado por 'tres ciudades' y el marco de la ley.
- source_word: לָ֑/ךְ
  english_pob_choice: for yourself
  chosen_spanish: para ti
  alternatives_spanish:
  - para ti mismo
  - para tu uso
  lexicon: HALOT
  rationale: La partícula con sufijo pronominal expresa beneficio o destinatario. 'Para ti' es la forma natural en español y preserva el valor dativo-reflexivo sin sobrecargar el verso.
- source_word: בְּ/ת֣וֹךְ אַרְצְ/ךָ֔
  english_pob_choice: within your land
  chosen_spanish: dentro de tu tierra
  alternatives_spanish:
  - en medio de tu tierra
  - en tu tierra
  lexicon: HALOT
  rationale: בְּתוֹךְ literalmente es 'en medio de'. 'Dentro de tu tierra' mantiene el sentido espacial y suena idiomático en español moderno; 'tierra' refleja el contexto de la porción territorial concedida.
- source_word: יְהוָ֣ה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  - el SEÑOR
  lexicon: HALOT
  rationale: Se conserva el nombre divino del Tetragrámaton como 'Yahvé', de acuerdo con el criterio del proyecto en español, evitando la sustitución por un título.
- source_word: אֱלֹהֶ֔י/ךָ
  english_pob_choice: your God
  chosen_spanish: tu Dios
  alternatives_spanish:
  - tu Dios y Señor
  lexicon: HALOT
  rationale: La forma constructa con sufijo de segunda persona masculina singular se expresa de manera estándar como 'tu Dios' en español, manteniendo el tono de alianza.
- source_word: נֹתֵ֥ן לְ/ךָ֖
  english_pob_choice: is giving you
  chosen_spanish: te da
  alternatives_spanish:
  - te está dando
  - te está concediendo
  lexicon: HALOT
  rationale: El participio puede comunicar acción continua o inminente. En español, 'te da' funciona con naturalidad en este contexto legal-promisorio y conserva la fuerza del don divino sin forzar una perífrasis.
- source_word: לְ/רִשְׁתָּֽ/הּ
  english_pob_choice: to possess
  chosen_spanish: para poseer
  alternatives_spanish:
  - para heredarla
  - para tomar posesión de ella
  lexicon: HALOT
  rationale: ירשׁ puede significar poseer o heredar en contextos de tierra. 'Poseer' sigue la decisión auditada de la POB en inglés, evita asociaciones teológicas ajenas en español y mantiene el sentido de tenencia legal de la tierra.
theological_decisions:
- issue: Nombre divino del Tetragrámaton
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - el SEÑOR
  rationale: El hebreo usa יְהוָה explícitamente. En español, 'Yahvé' preserva el nombre propio del pacto y evita la sustitución litúrgica por un título, en línea con la práctica terminológica del proyecto.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Verbo final לְרִשְׁתָּהּ en contexto de tierra prometida
  english_pob_reading: to possess
  chosen_spanish_reading: para poseer
  alternative_spanish_readings:
  - para heredarla
  - para tomar posesión de ella
  rationale: En este verso el verbo se refiere a la recepción y tenencia de la tierra concedida por Dios. 'Poseer' conserva la ambigüedad productiva entre herencia y posesión sin desplazar el foco jurídico del texto.
  doctrine_reference: HALOT; contexto de concesión territorial en Deuteronomio
translation_notes:
  revision_awareness: 'El versículo muestra alta concordancia con la revisión más reciente del testigo inglés: no se detectaron cambios necesarios. La decisión española sigue de cerca la auditoría léxica del inglés, pero adapta la sintaxis para que el mandato suene natural en español sin perder el matiz legal de apartar ciudades dentro de la tierra concedida.'
  spanish_consistency_notes:
  - Se mantuvo 'Yahvé' para יְהוָה, conforme al estándar del proyecto.
  - Se prefirió 'tierra' para אַרֶץ en un contexto de concesión territorial; 'tierra' es más natural que 'país' o 'territorio' aquí.
  - '''Poseer'' conserva el valor jurídico de ירשׁ y permite la nota alternativa ''heredar'' sin imponer una sola lectura.'
  - La estructura general del verso sigue el orden hebreo y la decisión inglesa, pero se ajusta a una sintaxis española fluida.
