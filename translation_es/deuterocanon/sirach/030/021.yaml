  - severity: medium
    issue: La nota al pie está mal anclada.
    rationale: El marcador [a] aparece en «des», pero la nota explica la diferencia entre la imagen hebrea de todo el versículo y la formulación griega paralela. Debe anclarse en una frase relevante del texto revisado, idealmente donde aparece «gimas» o al final de la cláusula principal.
  - severity: low
    issue: «en tu consejo» suena poco natural en español contemporáneo.
    rationale: Aunque proviene de βουλή, aquí además resulta innecesario porque esa cláusula no debe ir en el texto principal si se sigue la decisión auditada.
