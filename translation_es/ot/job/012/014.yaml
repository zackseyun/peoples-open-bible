translation:
  language: es
  text: Mira[a], si él derriba, no puede ser reconstruido; si encierra a un hombre[b], no se puede abrir.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «En verdad» o «He aquí» para la partícula inicial.
    reason: lexical_alternative
  - marker: b
    text: O «si encierra a un hombre dentro» o «si confina a un hombre».
    reason: lexical_alternative
lexical_decisions:
- source_word: הֵן
  english_pob_choice: Look
  chosen_spanish: ¡Mira!
  alternatives_spanish:
  - He aquí
  - Mira
  - ¡Miren!
  lexicon: HALOT
  rationale: La partícula introduce una afirmación enfática o un llamado de atención. «¡Mira!» conserva la fuerza discursiva de «Look» en un español moderno y natural; «He aquí» sería más arcaico.
- source_word: יַהֲרוֹס
  english_pob_choice: tears down
  chosen_spanish: derriba
  alternatives_spanish:
  - destruye
  - demuele
  - tumba
  lexicon: HALOT
  rationale: El verbo expresa derribar o demoler una estructura. «Derriba» es claro, breve y mantiene la imagen constructiva que sigue con «ser reconstruido».
- source_word: וְלֹא יִבָּנֶה
  english_pob_choice: it cannot be rebuilt
  chosen_spanish: no puede ser reconstruido
  alternatives_spanish:
  - no será reconstruido
  - no puede ser edificado de nuevo
  lexicon: HALOT
  rationale: 'El niphal de בנה es pasivo: ser edificado/reconstruido. «No puede ser reconstruido» reproduce la imposibilidad irreversible expresada por el inglés y conserva la relación con la imagen de demolición.'
- source_word: יִסְגֹּר עַל אִישׁ
  english_pob_choice: shuts a man in
  chosen_spanish: encierra a un hombre
  alternatives_spanish:
  - confi na a un hombre
  - lo cierra dentro
  - enciende a un hombre
  lexicon: HALOT
  rationale: סגר con עַל אִישׁ comunica encerrar o confinar a alguien. «Encierra a un hombre» mantiene la imagen concreta y evita sobreinterpretar con «prisión» formal, que el hebreo no exige.
- source_word: עַל אִישׁ
  english_pob_choice: a man in
  chosen_spanish: a un hombre
  alternatives_spanish:
  - a una persona
  - sobre un hombre
  lexicon: HALOT
  rationale: «אִישׁ» es masculino singular; por eso se conserva «hombre». En español, el complemento directo se integra naturalmente en «encierra a un hombre» sin añadir información ausente en el texto.
- source_word: וְלֹא יִפָּתֵחַ
  english_pob_choice: it cannot be opened
  chosen_spanish: no puede ser abierto
  alternatives_spanish:
  - no será abierto
  - no puede abrirse
  lexicon: HALOT
  rationale: 'El niphal de פתח es pasivo: «ser abierto». «No puede ser abierto» reproduce la idea de cierre irreversible y mantiene el paralelismo con «no puede ser reconstruido».'
theological_decisions:
- issue: Referencia del sujeto implícito divino
  english_pob_reading: he
  chosen_spanish_reading: él
  alternative_spanish_readings:
  - Dios
  - Yahvé
  - el Señor
  rationale: El hebreo usa verbos en tercera persona sin nombrar explícitamente a Dios en este versículo. «Él» preserva la fluidez del discurso y la referencia implícita al hablante divino sin introducir un título que el verso no expresa.
  doctrine_reference: Primacía del texto original; evitar añadir designaciones teológicas no explícitas en el versículo.
translation_notes:
  revision_awareness: El texto sigue de cerca el audit trail inglés y el hebreo masorético, sin cambios de revisión aplicados; se mantiene la imaginería de demolición y encierro con pasivos que expresan imposibilidad.
  spanish_consistency_notes:
  - Se conservó «hombre» para אִישׁ por su valor masculino singular en el hebreo.
  - Se evitó «SEÑOR» o «Yahvé» porque el versículo no contiene el nombre divino explícito; la referencia queda implícita en «él».
  - Se prefirió «ser reconstruido» y «ser abierto» para reflejar el pasivo del hebreo y el matiz de imposibilidad del contexto.
