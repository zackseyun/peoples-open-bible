translation:
  language: es
  text: No puede darse oro fino[a] a cambio de ella, ni puede pesarse plata[b] como su precio.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Oro fino» también puede entenderse como «oro puro».
    reason: lexical_alternative
  - marker: b
    text: Es decir, no puede pesarse plata para pagar su precio; el versículo habla del valor incalculable de la sabiduría en el contexto circundante.
    reason: cultural_note
lexical_decisions:
- source_word: יֻתַּן
  english_pob_choice: can be given
  chosen_spanish: puede darse
  alternatives_spanish:
  - puede ser dado
  - se puede dar
  lexicon: HALOT
  rationale: El pasivo permite una posibilidad/aptitud negada por לֹא; en español, «puede darse» comunica bien la imposibilidad comercial sin volver la frase torpe. Mantiene que el valor de la sabiduría no puede ser ofrecido como pago.
- source_word: סְגוֹר
  english_pob_choice: fine gold
  chosen_spanish: oro fino
  alternatives_spanish:
  - oro puro
  - oro refinado
  lexicon: HALOT
  rationale: En este contexto poético de valuación, el término apunta a oro refinado o de alta calidad. «Oro fino» preserva el matiz de metal precioso depurado y es natural en español bíblico moderno.
- source_word: תַּחְתֶּיהָ
  english_pob_choice: in exchange for it
  chosen_spanish: a cambio de ella
  alternatives_spanish:
  - en intercambio por ella
  - por ella
  lexicon: HALOT
  rationale: La preposición con sufijo expresa valor de sustitución o trueque, no posición espacial. «A cambio de ella» reproduce la idea de intercambio económico y conserva la referencia a la sabiduría del contexto inmediato.
- source_word: יִשָּׁקֵל
  english_pob_choice: can be weighed
  chosen_spanish: se pesará
  alternatives_spanish:
  - puede pesarse
  - sea pesada
  lexicon: HALOT
  rationale: El verbo alude al acto de pesar plata como medio de pago. En español, el futuro impersonal pasivo «se pesará» expresa adecuadamente la práctica monetaria antigua y la imposibilidad de fijar un precio suficiente.
- source_word: כֶּסֶף
  english_pob_choice: silver
  chosen_spanish: plata
  alternatives_spanish:
  - plata en dinero
  - dinero de plata
  lexicon: HALOT
  rationale: Aunque literalmente es «plata», en el contexto funciona como medio de pago. «Plata» conserva la imagen concreta de moneda/metal sin perder el sentido económico.
- source_word: מְחִירָהּ
  english_pob_choice: its price
  chosen_spanish: su precio
  alternatives_spanish:
  - su valor
  - su costo
  lexicon: HALOT
  rationale: מְחִיר designa precio o valor de compra. «Su precio» es directo y fiel al lenguaje comercial del verso.
translation_notes:
  revision_awareness: 'Se tuvo en cuenta la corrección del audit trail: el sujeto del primer hemistiquio es «oro fino», no la sabiduría. Por eso el español conserva la estructura donde lo que no puede darse es el oro fino «a cambio de ella».'
  spanish_consistency_notes:
  - Se mantuvo «ella» para la sabiduría, conforme al antecedente femenino del contexto poético inmediato.
  - Se prefirió «plata» en el segundo hemistiquio para reflejar el metal usado como medio de pago, sin añadir glosa explicativa al texto principal.
  - La negación doble del hebreo se reflejó con dos cláusulas negativas coordinadas en español.
