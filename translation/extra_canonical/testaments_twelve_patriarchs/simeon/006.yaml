  text: VI. Ἰδοὺ εἴρηκα¹ ὑμῖν πάντα², *ὅπως δικαιωθῶ ἀπὸ τῆς ἁμαρτίας ὑμῶν³. 2. Ἐὰν δὲ⁴ ἀφέλητε⁵ ἀφ᾽ ὑμῶν τὸν φθόνον καὶ πᾶσαν σκληροκαρδίαν⁶, Ὡς⁷ ῥόδον ἀνθήσει⁸ τὰ ὀστᾶ μου⁹ ἐν Ἰσραήλ, καὶ¹⁰ ὡς κρίνον *ἡ σάρξ μου¹⁰ ἐν Ἰακώβ, καὶ ἔσται¹¹ *ἡ ὀσμή μου ὡς¹² ὀσμὴ Λιβάνου,¹³ καὶ πληθυνθήσονται¹⁴ ἅγιοι¹⁵ *ἐξ ἐμοῦ¹⁶ *ἕως αἰῶνας¹⁷ αἰώνων¹⁷ καὶ *οἱ κλάδοι¹⁸ αὐτῶν¹⁹ εἰς μακρὰν ἔσονται. 3. Τότε ἀπολεῖται²⁰ τὸ²¹ σπέρμα Χαναάν *καὶ ἐγκατάλειμμα²² οὐκ ἔσται ἐν²³ τῷ ᾿Αμαλήκ, Γκαὶ ἀπολοῦνται πάντες οἱ Καππαδόκαι²⁴ *καὶ πάντες οἱ Χετταῖοι ἐξολοθρευθήσονται²⁵. 4. Τότε²⁶ ἐκλείψει²⁷ *ἡ γῆ²⁸ Χάμ, καὶ πᾶς ὁ²⁹ λαὸς ἀπολεῖται. Τότε καταπαύσει *πᾶσα ἡ γῆ³⁰ ἀπὸ ταραχῆς, *καὶ πᾶσα ἡ³¹ ὑπ᾿ οὐρανῶν³² ἀπὸ πολέμου. 5. Τότε³³ †σημεῖον³⁴ ἐνδοξασθήσεται³⁵ *μέγα τῷ Ἰσραήλ³⁶. 6. Τότε δοθήσεται⁴⁸ πάντα τὰ πνεύματα τῆς πλάνης⁴⁹ εἰς καταπάτησιν⁵⁰ καὶ οἱ⁵¹ ἄνθρωποι⁵² βασιλεύσουσιν⁵³ τῶν⁵⁴ πονηρῶν πνευμάτων⁵⁵. 7. Τότε ἀναστησόμαι⁵⁶ κἀγὼ⁵⁷ ἐν⁵⁸ εὐφροσύνῃ καὶ εὐλογήσω⁵⁹ τὸν ὕψιστον ἐπὶ⁶⁰ τοῖς θαυμασίοις αὐτοῦ [ὅτι ὁ⁶¹ Θεὸς σῶμα λαβών, καὶ⁶² συνεσθίων ἀνθρώποις *ἔσωσεν ἀνθρώπους⁶³].
