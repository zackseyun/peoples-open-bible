  to: 'greatness in parts from smallness.

    For they know smallness from greatness.

    Why do you curse me and honor me?

    You have wounded, and you have shown mercy.

    Do not cast out the first things,'
  rationale: The draft completely misparses the Coptic grammar and vocabulary across
    the entire block. `ⲉⲃⲟⲗ ϩⲛ` is the preposition 'from', not 'outlying' and 'in'.
    `ⲉϣⲁⲩⲥⲟⲩⲱⲛ` is the habitual prefix `ⲉϣⲁⲩ-` + `ⲥⲟⲩⲱⲛ` ('for they know'), not `ϣⲁⲩ`
    ('grows old'). `ⲉⲧⲕⲉ ⲟⲩ` is an OCR error for `ⲉⲧⲃⲉ ⲟⲩ` ('why'), introducing a
    question. `ⲧⲉⲧⲛⲥⲁϩⲟⲩ` means 'you curse' (Crum 384a), not 'forget'. `ⲧⲉⲧⲛⲧⲁⲉⲓⲟ`
    means 'you honor' (Crum 405b), not 'cast away'. `ⲁⲧⲉⲧⲛϣⲱϥ` is perfect tense `ⲁ-`
    + `ϣⲱϥ` ('you have wounded/laid waste'), not a negative imperative 'Do not gaze'.
    `ⲁⲧⲉⲧⲛⲛⲁ` is perfect tense `ⲁ-` + `ⲛⲁ` ('you have shown mercy'), not 'bring poverty'.
    `ⲙⲡⲣⲡⲟⲩϩⲧ ⲉⲃⲟⲗ` is 'do not pour/cast out' (or an OCR error for `ⲡⲱⲣϫ`, 'separate').
