translation:
  language: es
  text: Y pondrás la fuente[a] entre la tienda de reunión y el altar, y pondrás allí agua.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘lavacro’, término tradicional para este recipiente de lavado.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְנָתַתָּ
  english_pob_choice: And you shall place / and you shall put
  chosen_spanish: Y pondrás
  alternatives_spanish:
  - y colocarás
  - y pondrás en su lugar
  lexicon: HALOT
  rationale: נתן es un verbo amplio de ‘dar/poner/colocar’. En una instrucción de instalación cultual, ‘poner’ comunica bien la acción de situar un objeto en un lugar determinado, con un español natural y cercano al valor espacial del hebreo.
- source_word: הַכִּיּוֹר
  english_pob_choice: the basin
  chosen_spanish: el lavacro
  alternatives_spanish:
  - la pileta
  - la vasija para lavar
  lexicon: HALOT
  rationale: El hebreo designa el recipiente de lavado del tabernáculo. Se adopta ‘lavacro’ como término técnico reverente y relativamente transparente en español bíblico; se conserva la nota del POB inglés sobre la alternativa léxica, evitando ‘laver’ en inglés pero sin perder el sentido funcional.
- source_word: בֵּין אֹהֶל מוֹעֵד וּבֵין הַמִּזְבֵּחַ
  english_pob_choice: between the tent of meeting and the altar
  chosen_spanish: entre la tienda de reunión y el altar
  alternatives_spanish:
  - entre la Tienda de Reunión y el altar
  - entre el tabernáculo de reunión y el altar
  lexicon: HALOT
  rationale: בֵּין...וּבֵין expresa ubicación intermedia. ‘Tienda de reunión’ sigue de cerca אֹהֶל מוֹעֵד y mantiene la designación cultual transparente; se evita ‘tabernáculo’ por ser menos directo como equivalente del hebreo en este contexto.
- source_word: הַמִּזְבֵּחַ
  english_pob_choice: the altar
  chosen_spanish: el altar
  alternatives_spanish:
  - el altar de sacrificio
  lexicon: HALOT
  rationale: מִזְבֵּחַ significa simplemente ‘altar’. No hay en el verso una especificación adicional que obligue a estrechar el referente.
- source_word: וְנָתַתָּ שָׁם מָיִם
  english_pob_choice: and you shall put water there
  chosen_spanish: y pondrás allí agua
  alternatives_spanish:
  - y colocarás allí agua
  - y pondrás agua allí
  lexicon: HALOT
  rationale: Se conserva la secuencia hebrea con ‘allí’ para reflejar שָׁם. ‘Pondrás agua allí’ evita añadir explícitamente ‘en él’, que no aparece en el hebreo, aunque el sentido práctico se sobreentiende.
translation_notes:
  revision_awareness: 'El texto sigue de cerca el hebreo masorético de Éxodo 40:7 y alinea las decisiones léxicas con el audit trail inglés del POB: נתן como acción espacial de ‘poner’, כִּיּוֹר como recipiente de lavado, y שָׁם como indicador locativo conservado con ‘allí’.'
  spanish_consistency_notes:
  - Se evita la capitalización estilizada de ‘Tienda de Reunión’ para mantener un español sobrio y uniforme, aunque puede capitalizarse en otros contextos editoriales si el corpus lo decide.
  - ‘Lavacro’ se usa aquí por su claridad técnica; si el corpus POB prefiere un término más común, ‘lavabo’ o ‘vasija para lavar’ podrían evaluarse, pero no se adoptan sin justificación textual adicional.
