  text: A potter's vessel is tested in a furnace[c][b][a], and so a man is tested by his reasoning.
  footnotes:
  - marker: a
    text: 'The extant Hebrew line supplied in Zone 1 appears to be a mismatched or corrupt witness for this verse; the translation therefore follows the Greek parallel: ''Listen, child, and receive my judgment, and do not refuse my counsel.'''
    reason: textual_variant
  - marker: b
    text: Or 'my child' for 'my son'; Greek τέκνον is broader in sense, but the instructional idiom here is rendered gender-accurately.
    reason: lexical_alternative
  - marker: c
    text: Or 'receive my instruction/opinion' for 'accept my judgment'; Greek γνώμη can carry several nuances of considered thought or counsel.
    reason: lexical_alternative
