translation:
  language: es
  text: 'Y dijeron[a]: «¿Por qué, Yahvé, Dios de Israel, ha sucedido esto en Israel[b], que hoy falte una tribu de Israel?»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «ha sido esto en Israel», un modismo que significa «ha sucedido esto en Israel».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «que hoy falte una tribu de Israel».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמְרוּ
  english_pob_choice: And they said
  chosen_spanish: Y dijeron
  alternatives_spanish:
  - Entonces dijeron
  lexicon: HALOT
  rationale: El wayyiqtol introduce la siguiente acción narrativa; «Y dijeron» conserva la secuencia sin añadir una matización temporal no exigida por el hebreo.
- source_word: לָמָה
  english_pob_choice: Why
  chosen_spanish: ¿Por qué?
  alternatives_spanish:
  - ¿Para qué razón?
  lexicon: HALOT
  rationale: Interrogativo directo de lamento e indagación; «¿Por qué?» es el equivalente natural y solemne en español.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahveh
  - el SEÑOR
  lexicon: HALOT
  rationale: Se preserva el nombre divino en forma transliterada, conforme al criterio del proyecto, en vez de sustituirlo por un título. «Yahvé» es la forma más extendida y legible en español bíblico contemporáneo.
- source_word: אֱלֹהֵי יִשְׂרָאֵל
  english_pob_choice: God of Israel
  chosen_spanish: Dios de Israel
  alternatives_spanish:
  - el Dios de Israel
  - el Dios de Israel
  lexicon: HALOT
  rationale: La cadena constructa identifica a YHWH como el Dios vinculado con Israel; «Dios de Israel» es transparente y idiomático en español.
- source_word: הָיְתָה זֹּאת
  english_pob_choice: has this happened
  chosen_spanish: ha sucedido esto
  alternatives_spanish:
  - ha ocurrido esto
  - ha sido esto
  lexicon: HALOT
  rationale: El hebreo dice literalmente «ha sido esto», pero el sentido idiomático es de acontecimiento ocurrido; «ha sucedido esto» preserva el valor de evento sin volverlo mecánico.
- source_word: בְּיִשְׂרָאֵל
  english_pob_choice: in Israel
  chosen_spanish: en Israel
  alternatives_spanish:
  - entre Israel
  - entre los israelitas
  lexicon: HALOT
  rationale: El ב es locativo/corporativo; «en Israel» es la opción directa y natural, manteniendo la referencia nacional.
- source_word: לְהִפָּקֵד
  english_pob_choice: should be lacking
  chosen_spanish: falte
  alternatives_spanish:
  - sea contado como ausente
  - quede faltando
  - falte como ausente
  lexicon: HALOT
  rationale: El nifal de פקד expresa aquí quedar faltando/ausente dentro del total; en español, el subjuntivo «falte» comunica con precisión la carencia resultante.
- source_word: הַיּוֹם
  english_pob_choice: today
  chosen_spanish: hoy
  alternatives_spanish:
  - este día
  lexicon: HALOT
  rationale: «Hoy» mantiene el énfasis temporal inmediato del hebreo con español moderno y claro.
- source_word: מִיִּשְׂרָאֵל
  english_pob_choice: from Israel
  chosen_spanish: de Israel
  alternatives_spanish:
  - entre Israel
  - fuera de Israel
  lexicon: HALOT
  rationale: En español, «de Israel» expresa adecuadamente la separación del conjunto nacional; «de» aquí funciona de modo natural con la idea de pertenencia y ausencia del cuerpo total.
- source_word: שֵׁבֶט אֶחָד
  english_pob_choice: one tribe
  chosen_spanish: una tribu
  alternatives_spanish:
  - una sola tribu
  lexicon: HALOT
  rationale: La expresión designa una unidad tribal única; «una tribu» conserva la sencillez y el valor numérico del original.
theological_decisions:
- issue: Renderización del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahveh
  - el SEÑOR
  rationale: Se mantiene el nombre propio de Dios en forma transliterada, siguiendo la política del proyecto y preservando la distinción entre nombre divino y título.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Valor de הָיְתָה זֹּאת en una pregunta de lamentación
  english_pob_reading: has this happened
  chosen_spanish_reading: ha sucedido esto
  alternative_spanish_readings:
  - ha sido esto
  - ha ocurrido esto
  rationale: 'No se neutraliza la tensión idiomática del hebreo: la pregunta no describe solo un estado, sino un acontecimiento lamentado por la asamblea. «Ha sucedido esto» conserva ese peso narrativo y de aflicción.'
  doctrine_reference: 'DOCTRINE.md: Translation principles — preserve idiomatic force without flattening Hebrew event language'
translation_notes:
  revision_awareness: 'La redacción española sigue de cerca el estado revisado del POB inglés: se mantuvo «should be lacking» como noción de carencia/ausencia, no «missing», y se reflejó en español con «falte», evitando suavizar el matiz de falta tribal. También se preservó la lectura divina con el nombre propio de Yahvé/Yahvé.'
  spanish_consistency_notes:
  - Se usó «Yahvé» conforme al término proyectado para יְהוָה, no «SEÑOR».
  - Se eligió «una tribu» sin artículo enfático adicional, porque el hebreo destaca la singularidad numérica.
  - La pregunta se mantuvo en estilo de lamento/inquisición solemne, sin añadidos explicativos.
  - «En Israel» y «de Israel» reproducen la localización y la pertenencia/separación sin forzar el español.
  - Las comillas angulares se usan para la cita directa, de acuerdo con la puntuación española.
