base_translation:
  language: en
  yaml_path: translation/ot/ecclesiastes/004/008.yaml
  text: 'There is one man[a], and he has no second; he has neither son nor brother, and there is no end to all his labor[c][b]. His eyes also are not satisfied with wealth: “And for whom am I laboring and depriving myself of good?” This too is vanity and an unhappy business.'
  footnotes:
  - marker: a
    text: Or, 'There is one alone' or 'there is one, with no other.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'depriving my soul of good'; here 'soul' means the self or person.
    reason: lexical_alternative
  - marker: c
    text: The Hebrew word translated 'vanity' can also suggest 'vapor' or 'futility.'
    reason: lexical_alternative
