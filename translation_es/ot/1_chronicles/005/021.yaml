translation:
  language: es
  text: 'Capturaron su ganado: 50.000 camellos, 250.000 ovejas, 2.000 asnos y 100.000 personas[a].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literalmente, 'alma/persona humana' (נֶפֶשׁ אָדָם), es decir, 100.000 personas tomadas cautivas.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּשְׁבּוּ
  english_pob_choice: They captured
  chosen_spanish: Tomaron cautivos
  alternatives_spanish:
  - capturaron
  - se llevaron cautivos
  - hicieron cautivos
  lexicon: HALOT
  rationale: שׁבה expresa tomar como botín o cautivo. En español, 'tomaron cautivos' conserva el sentido de captura y se adapta bien tanto a animales como a personas en una lista de botín.
- source_word: מִקְנֵיהֶם
  english_pob_choice: their livestock
  chosen_spanish: sus bienes
  alternatives_spanish:
  - su ganado
  - sus animales
  - su hacienda
  lexicon: HALOT
  rationale: מִקְנֶה puede referir a ganado o propiedad adquirida, y aquí introduce la lista de animales. 'Sus bienes' mantiene el valor general sin forzar un término demasiado estrecho; la enumeración posterior aclara que se trata de animales.
- source_word: גְּמַלֵּיהֶם
  english_pob_choice: their camels
  chosen_spanish: camellos
  alternatives_spanish:
  - camellos de ellos
  - sus camellos
  lexicon: HALOT
  rationale: Término directo y transparente para גְּמַלֵּי־.
- source_word: וְצֹאן
  english_pob_choice: sheep
  chosen_spanish: ovejas
  alternatives_spanish:
  - ganado menor
  - rebaños
  lexicon: HALOT
  rationale: צֹאן es un colectivo para ganado menor; en una lista cuantitativa en español, 'ovejas' es la opción natural y fiel, aunque en sentido amplio pueda abarcar ovejas y cabras.
- source_word: וַחֲמוֹרִים
  english_pob_choice: donkeys
  chosen_spanish: asnos
  alternatives_spanish:
  - burros
  - borricos
  lexicon: HALOT
  rationale: '''Asnos'' es claro, digno y semánticamente exacto para חֲמוֹרִים; evita la ambigüedad regional de ''burros''.'
- source_word: וְנֶפֶשׁ אָדָם
  english_pob_choice: people
  chosen_spanish: personas
  alternatives_spanish:
  - seres humanos
  - vidas humanas
  - gente
  lexicon: HALOT
  rationale: La expresión literal 'alma/persona de hombre' funciona como conteo de cautivos humanos. 'Personas' preserva el valor referencial sin una calca extraña en español.
- source_word: מֵאָה אָלֶף
  english_pob_choice: 100,000
  chosen_spanish: '100.000'
  alternatives_spanish:
  - cien mil
  lexicon: HALOT
  rationale: Se mantiene la cifra en formato numérico por claridad y consistencia con el resto del versículo.
translation_notes:
  revision_awareness: El inglés auditado fue revisado solo para evitar la repetición innecesaria de 'of their' antes de 'camels'; la sustancia del versículo quedó estable. La versión española conserva esa misma estructura enumerativa y la lectura de cautivos humanos al final.
  spanish_consistency_notes:
  - Se conserva 'camellos', 'ovejas', 'asnos' y la cifra numérica para mantener paralelismo con la lista hebrea.
  - '''Tomaron cautivos'' funciona aquí como verbo de botín y evita alternar entre verbos distintos dentro del mismo enunciado.'
  - '''Personas'' refleja el valor idiomático de נֶפֶשׁ אָדָם sin perder claridad para lector contemporáneo.'
