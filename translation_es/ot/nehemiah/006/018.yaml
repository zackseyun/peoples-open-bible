translation:
  language: es
  text: Porque muchos en Judá estaban ligados por juramento[a] a él, pues era yerno de Secaías hijo de Arah, y Johanán su hijo había tomado[a][b] por esposa a la hija de Meseullam hijo de Berequías.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, más literalmente, «muchos en Judá eran poseedores de un juramento para con él», es decir, estaban obligados a él por juramento.
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «había tomado a la hija de Meseullam hijo de Berequías»; es un giro idiomático normal para decir que se casó con ella.'
    reason: lexical_alternative
lexical_decisions:
- source_word: רַבִּים בִּיהוּדָה
  english_pob_choice: many in Judah
  chosen_spanish: muchos en Judá
  alternatives_spanish:
  - muchos de Judá
  - muchos en Judea
  lexicon: HALOT
  rationale: רַבִּים expresa cantidad indefinida plural; בִּיהוּדָה funciona aquí locativamente, por lo que «en Judá» conserva mejor la referencia a personas dentro de la comunidad/provincia.
- source_word: בַּעֲלֵי שְׁבוּעָה ל֔וֹ
  english_pob_choice: were bound by oath to him
  chosen_spanish: estaban ligados por juramento a él
  alternatives_spanish:
  - estaban bajo juramento a él
  - eran poseedores de un juramento para con él
  - estaban obligados por juramento a él
  lexicon: HALOT
  rationale: La expresión hebrea es idiomática y literalmente significa algo como «poseedores de juramento»; en español, «ligados por juramento» comunica la obligación real sin perder la fuerza relacional y covenantal del giro.
- source_word: חָתָן הוּא לִשְׁכַנְיָה
  english_pob_choice: he was the son-in-law of Shecaniah
  chosen_spanish: era yerno de Secaías
  alternatives_spanish:
  - era el yerno de Secaías
  - era pariente por matrimonio de Secaías
  lexicon: HALOT
  rationale: חָתָן en contexto de parentesco designa una relación de afinidad; «yerno» es el equivalente natural en español y mantiene la precisión genealógica. Se conserva el nombre propio en forma castellana habitual sin alterar la relación descrita.
- source_word: וִיהוֹחָנָן בְּנוֹ
  english_pob_choice: and Jehohanan his son
  chosen_spanish: y Johanán su hijo
  alternatives_spanish:
  - y su hijo Johanán
  - y Jehohanán su hijo
  lexicon: HALOT
  rationale: Se conserva la identificación filial con orden natural en español. «Johanán» sigue una transliteración breve y clara; la forma con «Jeho-» queda como alternativa posible, pero no es necesaria para la inteligibilidad.
- source_word: לָקַח אֶת בַּת
  english_pob_choice: had taken the daughter ... as his wife
  chosen_spanish: había tomado por esposa a la hija
  alternatives_spanish:
  - había tomado a la hija por mujer
  - se había casado con la hija
  - había tomado a la hija como esposa
  lexicon: HALOT
  rationale: El hebreo usa un giro matrimonial idiomático. «Había tomado por esposa» comunica el sentido de matrimonio sin añadir más de lo que el texto dice, y conserva el paralelismo con la nota de lectura alternativa del POB inglés.
- source_word: בַּת מְשֻׁלָּם בֶּן בֶּרֶכְיָה
  english_pob_choice: the daughter of Meshullam son of Berechiah
  chosen_spanish: la hija de Meseullam hijo de Berequías
  alternatives_spanish:
  - la hija de Mesulam, hijo de Berequías
  - la hija de Meseullam, hijo de Berecías
  lexicon: HALOT
  rationale: La cadena patronímica se vierte de manera directa y transparente. Se opta por una transliteración española estable y legible de los nombres propios, preservando la relación genealógica exacta.
theological_decisions:
- issue: Sentido del juramento y obligación social/política
  english_pob_reading: were bound by oath to him
  chosen_spanish_reading: estaban ligados por juramento a él
  alternative_spanish_readings:
  - estaban bajo juramento a él
  - eran obligados por juramento a él
  rationale: 'No se suaviza la fuerza del texto: la frase señala una obligación real asumida mediante juramento. «Ligados por juramento» conserva esa tensión sin convertirla en una formulación meramente formal.'
  doctrine_reference: Integridad del juramento y obligación vinculante del pacto en el AT (cf. Nm 30; Ec 5:4-5)
translation_notes:
  revision_awareness: Se siguió de cerca el texto hebreo y el audit trail inglés del POB. La revisión inglesa más reciente no introdujo cambios sustanciales; por eso no se incorporan variantes textuales adicionales. Se mantuvo la doble función de כִּי con «Porque» y «pues», según su valor discursivo en el versículo.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» como término por defecto en otros contextos, pero este versículo no contiene el nombre divino.
  - Se empleó «Juramento» para שְׁבוּעָה y no «promesa», porque el contexto exige la fuerza vinculante de una obligación solemne.
  - Los nombres propios se transliteran con ortografía española sobria para facilitar lectura pública sin perder trazabilidad al hebreo.
