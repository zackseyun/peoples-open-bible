base_translation:
  language: en
  yaml_path: translation/deuterocanon/sirach/049/001.yaml
  text: The name of Josiah is like blended incense[a], the work of a perfumer; his memory is sweet as honey to the mouth[b], and like music at a banquet of wine.
  footnotes:
  - marker: a
    text: 'Greek: ''The remembrance of Josiah is for a blending of incense, prepared by the work of a perfumer; in every mouth it will be sweet as honey, and like music at a banquet of wine.'' The Hebrew foregrounds ''name'' in the first clause, while the Greek foregrounds ''remembrance.'''
    reason: alternative_reading
  - marker: b
    text: Or 'like a song at a banquet of wine.' The Hebrew מזמור can mean a song, but the Greek parallel supports the broader sense 'music.'
    reason: lexical_alternative
