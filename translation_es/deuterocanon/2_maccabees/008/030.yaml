translation:
  language: es
  text: Y después de quebrantar las fuerzas de Timoteo y de Báquides, mataron a más de veinte mil de ellos, se hicieron dueños de fortalezas muy altas, y repartieron el abundante botín, haciéndolos copartícipes por igual con los oprimidos, los huérfanos, las viudas, y aun los ancianos.[a]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «haciéndose ellos mismos copartícipes por igual con los oprimidos, los huérfanos, las viudas, y aun los ancianos». El pronombre griego puede entenderse de más de una manera.'
    reason: alternative_reading
lexical_decisions:
- source_word: συνερείσαντες
  english_pob_choice: after crushing the forces around
  chosen_spanish: después de quebrantar las fuerzas de
  alternatives_spanish:
  - después de derrotar a las fuerzas de
  - después de aplastar a las fuerzas de
  lexicon: LSJ
  rationale: En contexto bélico, el participio expresa una derrota contundente. «Quebrantar» comunica fuerza y resultado sin volverlo más interpretativo que el griego.
- source_word: τοὺς περὶ Τιμόθεον καὶ Βακχίδην
  english_pob_choice: the forces around Timothy and Bacchides
  chosen_spanish: las fuerzas de Timoteo y de Báquides
  alternatives_spanish:
  - los hombres de Timoteo y de Báquides
  - los que estaban con Timoteo y Báquides
  lexicon: LSJ
  rationale: La frase griega nombra al grupo asociado con estos dos líderes; en español, «las fuerzas de» es natural y mantiene el sentido militar sin añadir detalles no explícitos.
- source_word: ὑπὲρ τοὺς δισμυρίους
  english_pob_choice: more than twenty thousand
  chosen_spanish: más de veinte mil
  alternatives_spanish:
  - sobre veinte mil
  lexicon: LSJ
  rationale: La cifra y el comparativo se expresan de forma directa y corriente en español.
- source_word: ἀνεῖλον
  english_pob_choice: killed
  chosen_spanish: mataron
  alternatives_spanish:
  - dieron muerte a
  - mataron a
  lexicon: BDAG
  rationale: En narración de batalla, el verbo significa matar. «Mataron» es claro y fiel al registro del pasaje.
- source_word: ὀχυρωμάτων ὑψηλῶν εὖ μάλα ἐγκρατεῖς ἐγένοντο
  english_pob_choice: gained firm control of very high strongholds
  chosen_spanish: se hicieron dueños de fortalezas muy altas
  alternatives_spanish:
  - obtuvieron firme control de fortalezas muy altas
  - tomaron posesión de fortalezas muy altas
  lexicon: LSJ
  rationale: La construcción indica llegar a estar en posesión/control de fortalezas elevadas. «Se hicieron dueños de» conserva la idea de dominio efectivo con español natural.
- source_word: λάφυρα πλείονος
  english_pob_choice: the plentiful plunder
  chosen_spanish: el abundante botín
  alternatives_spanish:
  - el botín abundante
  - gran botín
  lexicon: LSJ
  rationale: «Botín» es el equivalente normal de λάφυρα; «abundante» refleja la cantidad sin exagerar ni suavizar el sustantivo de guerra.
- source_word: ἐμερίσαντο
  english_pob_choice: divided
  chosen_spanish: repartieron
  alternatives_spanish:
  - dividieron
  - distribuyeron
  lexicon: BDAG
  rationale: El verbo se refiere a dividir o distribuir el botín. «Repartieron» suena natural en español y conserva la acción de asignar porciones.
- source_word: ἰσομοίρους ... ποιήσαντες
  english_pob_choice: making them equal sharers with
  chosen_spanish: haciéndolos a la par con
  alternatives_spanish:
  - haciéndolos copartícipes por igual con
  - haciéndolos iguales partícipes con
  lexicon: LSJ
  rationale: La expresión griega presenta igualdad de parte o porción. «A la par con» evita una construcción demasiado literal y preserva la idea de igualdad en el reparto.
- source_word: τοῖς ἠκισμένοις
  english_pob_choice: the oppressed
  chosen_spanish: los oprimidos
  alternatives_spanish:
  - los maltratados
  - los afligidos
  lexicon: LSJ
  rationale: El término se refiere a quienes han sido tratados injustamente o aplastados; «oprimidos» encaja con el campo semántico y con el grupo social del contexto.
- source_word: ὀρφανοῖς
  english_pob_choice: orphans
  chosen_spanish: los huérfanos
  alternatives_spanish:
  - huérfanos
  lexicon: BDAG
  rationale: Término directo y estable en español.
- source_word: χήραις
  english_pob_choice: widows
  chosen_spanish: las viudas
  alternatives_spanish:
  - viudas
  lexicon: BDAG
  rationale: Término directo y estable en español.
- source_word: πρεσβυτέροις
  english_pob_choice: the elderly
  chosen_spanish: los ancianos
  alternatives_spanish:
  - las personas mayores
  - los mayores
  lexicon: BDAG
  rationale: Aquí no se trata de un cargo eclesial sino de personas de edad avanzada. «Ancianos» conserva brevedad y el valor social del listado, sin imponer un sentido técnico.
theological_decisions:
- issue: Referente de αὐτούς en ἰσομοίρους αὐτοὺς ... ποιήσαντες
  english_pob_reading: the fighters made themselves equal sharers with the oppressed, orphans, widows, and the elderly
  chosen_spanish_reading: los combatientes los hicieron a la par con los grupos vulnerables mencionados
  alternative_spanish_readings:
  - los combatientes se hicieron iguales partícipes con los grupos vulnerables mencionados
  - hicieron a esos grupos vulnerables iguales partícipes con ellos
  rationale: La redacción española preserva la ambigüedad del griego sin forzar un referente único. La forma con «los» permite entender que los combatientes distribuyeron el botín de manera igualitaria con los grupos vulnerables, sin borrar la posibilidad alternativa señalada en el audit trail.
  doctrine_reference: Preservar la ambigüedad sintáctica documentada; no resolverla sin necesidad.
translation_notes:
  revision_awareness: 'Se revisó el registro conforme al audit trail inglés más reciente: se evitó «alrededor de Timoteo y Báquides» por inexacto, se mantuvo el registro formal con «abundante», y se respetó la variación interpretativa del pronombre griego mediante una nota textual en lugar de resolverla de manera unilateral.'
  spanish_consistency_notes:
  - Se usó «Yahvé» como norma del proyecto solo cuando aparezca el nombre divino; en este versículo no aplica.
  - Se mantuvo «oprimidos» para ἠκισμένοις, coherente con el tono social del pasaje y con el uso POB en inglés.
  - «Ancianos» se entiende aquí como personas mayores, no como cargo eclesial.
  - La nota [a] está anclada en el texto para cumplir la ambigüedad documentada del original.
