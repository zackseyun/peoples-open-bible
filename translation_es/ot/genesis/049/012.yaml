translation:
  language: es
  text: Sus ojos son más oscuros que el vino[a], y sus dientes más blancos que la leche.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: ‘Sus ojos son rojos por el vino’ (o ‘brillantes por el vino’). El raro adjetivo hebreo חַכְלִילִי y la preposición מִן también pueden entenderse en sentido causal, conectando el color o brillo con el vino como causa en vez de como comparación.'
    reason: lexical_alternative
lexical_decisions:
- source_word: חַכְלִילִי
  english_pob_choice: darker
  chosen_spanish: más oscuros
  alternatives_spanish:
  - rojos
  - brillantes
  - oscuros
  lexicon: HALOT
  rationale: El hebreo es raro y admite matiz descriptivo del color o brillo. Para mantener el paralelo poético con la segunda cola y reflejar el sentido comparativo adoptado en el POB inglés, ‘más oscuros’ comunica una cualidad visual natural en español sin forzar una lectura de intoxicación.
- source_word: עֵינַיִם
  english_pob_choice: eyes
  chosen_spanish: ojos
  alternatives_spanish:
  - ojos
  lexicon: HALOT
  rationale: Equivale directamente al dual hebreo y es la forma natural en español.
- source_word: מִיָּיִן
  english_pob_choice: than wine
  chosen_spanish: que el vino
  alternatives_spanish:
  - del vino
  - por el vino
  lexicon: HALOT
  rationale: La lectura comparativa del מִן se expresa naturalmente con ‘que’ en español. Así se preserva el paralelismo con la segunda cola y se evita introducir causalidad no requerida por el texto fuente según el tramo inglés auditado.
- source_word: וּלְבֶן
  english_pob_choice: and ... whiter
  chosen_spanish: y ... más blancos
  alternatives_spanish:
  - y blancos
  - y más blancas
  lexicon: HALOT
  rationale: El hebreo usa un adjetivo en paralelo con el comparativo implícito; en español conviene explicitar la comparación con ‘más blancos’ para mantener la simetría poética.
- source_word: שִׁנַּיִם
  english_pob_choice: teeth
  chosen_spanish: dientes
  alternatives_spanish:
  - dientes
  lexicon: HALOT
  rationale: Renderización directa del dual hebreo con el sustantivo usual en español.
- source_word: מֵחָלָב
  english_pob_choice: than milk
  chosen_spanish: que la leche
  alternatives_spanish:
  - de la leche
  - por la leche
  lexicon: HALOT
  rationale: Se conserva la comparación explícita con ‘que’, como en la primera cola y en el texto inglés revisado. ‘Leche’ mantiene la imagen de blancura y abundancia sin añadir explicación.
theological_decisions:
- issue: Sentido de abundancia vs. causalidad en los complementos con מִן
  english_pob_reading: 'Comparative: eyes darker than wine, teeth whiter than milk.'
  chosen_spanish_reading: 'Comparative: ojos más oscuros que el vino, dientes más blancos que la leche.'
  alternative_spanish_readings:
  - ojos rojos por el vino, dientes blancos por la leche
  - ojos rojos del vino, dientes blancos de la leche
  rationale: 'Sigo el último estado del POB inglés y el paralelismo poético visible en el hebreo: dos comparaciones equilibradas, una con vino y otra con leche. La formulación española con ‘que’ conserva esa estructura sin decidir por una causalidad que el tramo auditado ya no sostiene como lectura principal.'
  doctrine_reference: Poética hebrea; decisión léxica, no doctrinal.
translation_notes:
  revision_awareness: He seguido el estado revisado más reciente del POB inglés (lectura comparativa) y no el pasaje anterior revertido a una lectura causal. La versión española ancla ambas notas al texto para que las alternativas queden auditablemente conectadas.
  spanish_consistency_notes:
  - Se mantiene ‘vino’ y ‘leche’ sin artículos de más para preservar la tersura poética.
  - La comparación se expresa con ‘más ... que’, que es la forma natural en español para el paralelismo hebreo aquí.
  - No se introduce ‘Cristo’, ‘SEÑOR’ ni otra terminología ajena al verso.
  - Las notas aparecen ancladas exactamente en los puntos de ambigüedad léxica relevantes.
