  verse: 1
translation:
  text: |-
    1 And it will happen after these things, when the time of the coming of the Messiah is completed and he returns with glory, then all those who sleep in hope of him will rise.
    
    2 And it will happen at that time that the storehouses will be opened in which the number of the souls of the righteous is kept, and they will come forth. And the multitudes of souls will be seen together in one gathering, of one mind. And the first will rejoice, and the last will not be grieved.
    
    3 For they know that the time has come of which it was said that it is the completion of the times.
    
    4 But the souls of the wicked will waste away even more when they see all these things.
    
    5 For they know that their torment has come, and that their destruction has arrived.
