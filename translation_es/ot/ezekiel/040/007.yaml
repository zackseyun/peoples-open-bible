base_translation:
  language: en
  yaml_path: translation/ot/ezekiel/040/007.yaml
  text: And each guardroom was one reed long and one reed wide[a], and between the guardrooms was five cubits[c][b]. And the threshold of the gate beside the portico of the gate on the inside was one reed.
  footnotes:
  - marker: a
    text: Or 'side room' or 'chamber' for 'guardroom' (Hebrew תָּא), an architectural term in Ezekiel's temple vision.
    reason: lexical_alternative
  - marker: b
    text: Or 'vestibule' or 'porch' for 'portico' (Hebrew אוּלָם).
    reason: lexical_alternative
  - marker: c
    text: The phrase 'toward the inside' renders Hebrew 'from the house,' likely indicating the inner side of the gate complex rather than a separate house.
    reason: cultural_note
