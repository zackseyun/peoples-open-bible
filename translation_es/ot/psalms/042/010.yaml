translation:
  language: es
  text: 'Digo a Dios, mi roca: «¿Por qué me has olvidado? ¿Por qué ando enlutado[a] bajo la opresión del enemigo?»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O «¿Por qué ando en tinieblas bajo la opresión del enemigo?»; hebreo: “oscuro/sombrío”, con posible sentido de duelo o desánimo.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אוֹמְרָה
  english_pob_choice: I say
  chosen_spanish: Yo digo
  alternatives_spanish:
  - Diré
  - estoy diciendo
  lexicon: HALOT
  rationale: La forma cohortativa/volitiva de 1cs en este lamento introduce una confesión inmediata. En español, «Yo digo» comunica el acto de hablar en presente y mantiene el tono directo sin convertirlo innecesariamente en futuro.
- source_word: לְאֵל
  english_pob_choice: to God
  chosen_spanish: a Dios
  alternatives_spanish:
  - al Dios
  - a El
  lexicon: HALOT
  rationale: Aquí אֵל funciona como título/nombre común para Dios, no como nombre propio. «A Dios» es natural en español y conserva el sentido de dirección del hebreo.
- source_word: סַלְעִי
  english_pob_choice: my rock
  chosen_spanish: mi roca
  alternatives_spanish:
  - mi peña
  - mi peñasco
  lexicon: HALOT
  rationale: סֶלַע designa roca/peñón; en español «mi roca» conserva la metáfora de firmeza y refugio de modo claro y bíblicamente reconocible, sin volverla demasiado geográfica.
- source_word: לָמָה
  english_pob_choice: Why
  chosen_spanish: ¿Por qué
  alternatives_spanish:
  - ¿Para qué
  lexicon: HALOT
  rationale: Interrogativo de queja/lamento. «¿Por qué» corresponde al valor directo de la partícula en este contexto.
- source_word: שְׁכַחְתָּנִי
  english_pob_choice: have you forgotten me
  chosen_spanish: me has olvidado
  alternatives_spanish:
  - me olvidaste
  - me has abandonado
  lexicon: HALOT
  rationale: 'El perfecto 2ms + objeto 1cs se rinde de forma natural en español con pretérito perfecto compuesto para expresar una queja actual: «me has olvidado». «Abandonado» sería una intensificación no exigida por el verbo.'
- source_word: קֹדֵר
  english_pob_choice: mourning
  chosen_spanish: enlutado
  alternatives_spanish:
  - en duelo
  - en tinieblas
  - con tristeza
  lexicon: HALOT
  rationale: El participio de קדר puede significar estar sombrío/oscurecido y, por extensión, en duelo. «Enlutado» conserva la carga emotiva y la idea de oscuridad/lamento de manera idiomática en español bíblico moderno. Dado que el POB inglés anotó la alternativa «in gloom», se preserva esa tensión semántica en nota.
- source_word: אֵלֵךְ
  english_pob_choice: do I go about
  chosen_spanish: ando
  alternatives_spanish:
  - camino
  - voy
  - ande
  lexicon: HALOT
  rationale: הָלַךְ aquí expresa una condición continuada de andar/ir. «Ando» reproduce bien el matiz de desplazamiento habitual o persistente, equivalente funcional de «go about» en el lamento.
- source_word: בְּלַחַץ
  english_pob_choice: under the oppression of
  chosen_spanish: bajo la opresión de
  alternatives_spanish:
  - bajo la presión de
  - por causa de la opresión de
  - en la opresión de
  lexicon: HALOT
  rationale: Con בְּ, לַחַץ marca circunstancia o carga hostil. «Bajo la opresión de» mantiene tanto la situación sufrida como la fuerza opresiva, en paralelo con el inglés auditado.
- source_word: אוֹיֵב
  english_pob_choice: the enemy
  chosen_spanish: el enemigo
  alternatives_spanish:
  - un enemigo
  - el adversario
  - el foe
  lexicon: HALOT
  rationale: Aunque el sustantivo está en singular, en poesía hebrea puede ser genérico/colectivo. «El enemigo» es la forma más natural en español y conserva el valor representativo de la hostilidad.
theological_decisions:
- issue: Metáfora divina סַלְעִי
  english_pob_reading: my rock
  chosen_spanish_reading: mi roca
  alternative_spanish_readings:
  - mi refugio
  - mi peña
  rationale: Se conserva la metáfora material del hebreo en lugar de sustituirla por una interpretación explicativa. Esto mantiene la imagen teológica de Dios como firmeza y amparo sin diluir la poesía.
  doctrine_reference: 'Translation philosophy: original-language primacy; preserve metaphor'
- issue: Queja de olvido divino
  english_pob_reading: Why have you forgotten me?
  chosen_spanish_reading: ¿Por qué me has olvidado?
  alternative_spanish_readings:
  - ¿Por qué me olvidaste?
  - ¿Por qué pareces haberme olvidado?
  rationale: 'La traducción preserva la tensión devocional del lamento: el salmista acusa la experiencia de olvido divino sin suavizarla doctrinalmente ni convertirla en una afirmación objetiva de abandono total.'
  doctrine_reference: 'Translation philosophy: preserve theological tension rather than resolve it'
- issue: Valor semántico de קֹדֵר
  english_pob_reading: mourning / in gloom
  chosen_spanish_reading: enlutado
  alternative_spanish_readings:
  - en luto
  - con luto
  - en tinieblas
  rationale: Se opta por un término que puede evocar tanto duelo como oscurecimiento interior. Así se conserva la ambigüedad poética señalada por la nota inglesa («mourning» / «in gloom») sin perder legibilidad.
  doctrine_reference: 'Translation philosophy: preserve lexical tension where the source permits'
translation_notes:
  revision_awareness: La revisión más reciente del POB inglés no introdujo cambios; el texto quedó estable tras la última pasada. La presente propuesta sigue ese estado estable y conserva la nota alternativa clave para קֹדֵר, que el audit trail inglés ya documentaba.
  spanish_consistency_notes:
  - Se usa «Dios» para אֵל en línea con el criterio del proyecto, no como transliteración ni como nombre propio técnico.
  - Se mantiene «mi roca» como metáfora sin explicar en el cuerpo del texto.
  - «Enlutado» intenta equilibrar luto y oscuridad para no borrar la ambigüedad de קֹדֵר.
  - Se conserva la primera persona con tono de lamento directo, acorde con la sintaxis hebrea.
  - No se introduce terminología eclesiástica tradicional innecesaria; el registro es bíblico moderno y claro.
