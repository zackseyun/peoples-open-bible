translation:
  language: es
  text: 'o como una flecha lanzada hacia un blanco: el aire, una vez cortado, se cerró inmediatamente sobre sí mismo, de modo que no se pudiera reconocer su rastro[a].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «su paso» o «su curso» para «su rastro».
    reason: lexical_alternative
lexical_decisions:
- source_word: βέλους
  english_pob_choice: arrow
  chosen_spanish: flecha
  alternatives_spanish:
  - saeta
  - dardo
  - proyectil
  lexicon: LSJ
  rationale: βέλος en este símil denota un proyectil, en particular una flecha. «Flecha» es el equivalente más natural y específico en español para conservar la imagen concreta del tiro con arco.
- source_word: βληθέντος
  english_pob_choice: shot
  chosen_spanish: lanzada
  alternatives_spanish:
  - arrojada
  - disparada
  - enviada
  lexicon: LSJ
  rationale: El participio de βάλλω describe la flecha enviada hacia un blanco. En español, «lanzada» mantiene la idea de un proyectil dirigido y suena natural; «disparada» sería posible, pero puede sonar más moderno o demasiado técnico según contexto.
- source_word: σκοπόν
  english_pob_choice: target
  chosen_spanish: blanco
  alternatives_spanish:
  - objetivo
  - meta
  - marca
  lexicon: LSJ
  rationale: Aquí σκοπός es el objeto al que se apunta. «Blanco» reproduce bien el sentido concreto de la imagen de arquería en español; «objetivo» sería más abstracto.
- source_word: τμηθεὶς
  english_pob_choice: cut through
  chosen_spanish: cortado
  alternatives_spanish:
  - partido
  - dividido
  - abierto
  lexicon: LSJ
  rationale: El participio describe cómo el aire queda seccionado por el paso de la flecha. «Cortado» conserva la fuerza física de la imagen sin sobrecargar la frase.
- source_word: ἀὴρ
  english_pob_choice: air
  chosen_spanish: aire
  alternatives_spanish:
  - atmósfera
  - cielo
  lexicon: LSJ
  rationale: Se trata del medio por el que pasa la flecha; «aire» es la traducción directa y más clara.
- source_word: εὐθέως
  english_pob_choice: immediately
  chosen_spanish: inmediatamente
  alternatives_spanish:
  - al instante
  - de inmediato
  - enseguida
  lexicon: LSJ
  rationale: Marca la rapidez con que el aire vuelve a cerrarse. «Inmediatamente» es claro, sobrio y exacto en español.
- source_word: εἰς ἑαυτὸν ἀνελύθη
  english_pob_choice: closed up on itself
  chosen_spanish: se cerró sobre sí mismo
  alternatives_spanish:
  - volvió sobre sí
  - se recomponía
  - volvió a unirse
  lexicon: LSJ
  rationale: La expresión griega sugiere que el aire se vuelve a reunir consigo mismo. «Se cerró sobre sí mismo» comunica la imagen de recomposición del aire de manera natural y fiel.
- source_word: ὡς ἀγνοῆσαι
  english_pob_choice: so that ... could not be known
  chosen_spanish: de modo que no se pudiera conocer
  alternatives_spanish:
  - para que no se pudiera saber
  - de suerte que no pudiera saberse
  - de modo que nadie pudiera conocer
  lexicon: LSJ
  rationale: La construcción expresa resultado. «De modo que no se pudiera conocer» mantiene el valor consecutivo sin añadir interpretaciones ajenas al texto.
- source_word: δίοδον
  english_pob_choice: path
  chosen_spanish: trayectoria
  alternatives_spanish:
  - paso
  - recorrido
  - camino
  lexicon: LSJ
  rationale: En el contexto de una flecha, δίοδος puede referirse al recorrido o curso por el aire. «Trayectoria» es una opción muy precisa en español moderno y preserva la idea del movimiento seguido.
translation_notes:
  revision_awareness: La versión española sigue de cerca el texto griego del Swete LXX 1909 y el audit trail inglés del POB, manteniendo la metáfora concreta de la flecha y el cierre inmediato del aire. Se conserva la alternativa semántica de δίοδος en una nota, porque en español «trayectoria» es precisa, pero «paso» o «curso» siguen siendo posibles según el matiz que se desee destacar.
  spanish_consistency_notes:
  - Se prefirió «blanco» para σκοπός por la imagen de arquería; no se usó «objetivo» para evitar una abstracción innecesaria.
  - Se eligió «trayectoria» para δίοδος por precisión contextual con flecha; la nota preserva alternativas léxicas válidas.
  - 'La sintaxis conserva el paralelismo del original: comparación inicial, cláusula de cierre del aire y resultado final.'
  - «Se cerró sobre sí mismo» intenta reflejar el movimiento de recomposición del aire sin forzar una literalidad extraña en español.
