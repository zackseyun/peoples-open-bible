translation:
  language: es
  text: Examinemos nuestros caminos y escudriñémoslos[a], y volvamos a Yahvé[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «investiguémoslos»; el verbo añade el matiz de indagar a fondo, además de examinar.
    reason: lexical_alternative
  - marker: b
    text: O «volvamos al SEÑOR»; el verbo también puede llevar el sentido de arrepentimiento.
    reason: alternative_reading
lexical_decisions:
- source_word: נַחְפְּשָׂה
  english_pob_choice: Let us examine
  chosen_spanish: Examinemos
  alternatives_spanish:
  - Busquemos
  - Investiguemos
  lexicon: HALOT
  rationale: El cohortativo exhortativo se expresa naturalmente en español con un subjuntivo exhortativo inclusivo. «Examinar» comunica bien la idea de revisar con cuidado la conducta propia, sin perder el matiz de autoexamen moral que el contexto exige.
- source_word: דְרָכֵינוּ
  english_pob_choice: our ways
  chosen_spanish: nuestros caminos
  alternatives_spanish:
  - nuestra conducta
  - nuestros senderos
  lexicon: HALOT
  rationale: «Caminos» conserva la metáfora hebrea de דרכים para el modo de vivir. «Conducta» aclara el sentido, pero atenúa la imagen concreta; «senderos» es posible, pero menos natural en este contexto.
- source_word: וְנַחְקֹרָה
  english_pob_choice: and search them out
  chosen_spanish: y escudriñémoslos
  alternatives_spanish:
  - e investiguémoslos
  - y busquémoslos
  lexicon: HALOT
  rationale: El segundo cohortativo añade el matiz de explorar/probar a fondo. «Escudriñar» preserva mejor esa intensificación que un simple repetido «examinar». El pronombre objeto retoma naturalmente «nuestros caminos».
- source_word: וְנָשׁוּבָה
  english_pob_choice: and let us return
  chosen_spanish: y volvamos
  alternatives_spanish:
  - y regresemos
  - y retornemos
  - y arrepintámonos
  lexicon: HALOT
  rationale: שׁוּב significa fundamentalmente volver/retornar. «Volvamos» mantiene la metáfora de retorno y deja abierta la dimensión de arrepentimiento sin reducirla a una sola formulación interior.
- source_word: עַד יְהוָה
  english_pob_choice: to Yahweh
  chosen_spanish: a Yahvé
  alternatives_spanish:
  - hasta Yahvé
  - hacia Yahvé
  lexicon: HALOT
  rationale: La preposición con שׁוּב aquí expresa movimiento de retorno hacia Dios; en español, «volver a Yahvé» es natural y fiel. Se conserva «Yahvé» para el Tetragrámaton según la terminología POB.
theological_decisions:
- issue: Nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Jehová
  rationale: El hebreo usa explícitamente el Tetragrámaton. La política POB en español pide «Yahvé» como transliteración del nombre divino, evitando la sustitución por un título y preservando el nombre de pacto.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Alcance de שׁוּב
  english_pob_reading: return
  chosen_spanish_reading: volver
  alternative_spanish_readings:
  - arrepentirse
  - volver atrás
  - convertirse
  rationale: El verbo significa primariamente volver/retornar. En este contexto de exhortación penitencial, la dimensión de arrepentimiento está implicada, pero no conviene cerrarla demasiado pronto en la traducción principal.
  doctrine_reference: DOCTRINE.md Translation philosophy §3, preserve theological tension rather than over-resolve
translation_notes:
  revision_awareness: El inglés POB pasó de «test them» a «search them out» para reflejar con mayor precisión la pareja verbal del hebreo. La versión española sigue ese ajuste con «escudriñémoslos», que conserva la idea de buscar/investigar a fondo y mantiene el paralelismo con «examinemos».
  spanish_consistency_notes:
  - Se mantiene «Yahvé» para יְהוָה de forma consistente con el estándar POB español.
  - «Caminos» conserva la metáfora hebrea y es preferible a una paráfrasis abstracta como «conducta».
  - La pareja verbal «examinemos / escudriñémoslos» reproduce la progresión semántica del hebreo sin caer en repetición plana.
