lexical_decisions:
- source_word: ἐπόρθησεν
  english_pob_choice: had subdued
  chosen_spanish: los hubo subyugado
  alternatives_spanish:
  - los había devastado
  - los había sojuzgado
  - los había sometido
  lexicon: LSJ
  rationale: El verbo griego puede implicar conquista destructiva o sometimiento militar. «Subyugado» mantiene la idea de dominación efectiva sin añadir más destrucción de la que el contexto exige.
- source_word: δόγμα ἔθετο
  english_pob_choice: issued a decree
  chosen_spanish: estableció un decreto
  alternatives_spanish:
  - promulgó un decreto
  - dictó un edicto
  - emitió un decreto
  lexicon: LSJ
  rationale: La construcción idiomática expresa una disposición oficial. «Estableció un decreto» conserva el tono formal y evita una traducción demasiado libre.
- source_word: φαίνοιεν
  english_pob_choice: were found
  chosen_spanish: eran hallados
  alternatives_spanish:
  - parecían
  - eran vistos
  - se descubría que
  lexicon: LSJ
  rationale: En un contexto administrativo-penal, el sentido práctico es que se los detecta o identifica en esa conducta. «Eran hallados» refleja ese valor judicial sin perder el matiz del griego.
- source_word: τῷ πατρίῳ ... νόμῳ
  english_pob_choice: the ancestral law
  chosen_spanish: la ley ancestral
  alternatives_spanish:
  - la ley de sus padres
  - la ley heredada de los padres
  - la ley ancestral de sus padres
  lexicon: LSJ
  rationale: «Ancestral» preserva el sentido de lo perteneciente a los padres/antepasados. «Ley ancestral» es natural en español y evita introducir terminología doctrinal posterior.
- source_word: πολιτευόμενοι
  english_pob_choice: living according to
  chosen_spanish: viviendo según
  alternatives_spanish:
  - conduciéndose según
  - rigiendo su vida por
  - observando
  lexicon: LSJ
  rationale: El participio describe una manera de vivir bajo una norma. «Viviendo según» comunica continuidad y evita un calco excesivamente cívico.
- source_word: θάνοιεν
  english_pob_choice: they should be put to death
  chosen_spanish: fueran muertos
  alternatives_spanish:
  - debían morir
  - se les diera muerte
  - fueran ejecutados
  lexicon: LSJ
  rationale: En una orden real de castigo, el pasivo penal en español se expresa de forma natural con «fueran muertos». Preserva la imposición judicial sin sobreespecificar el método.
theological_decisions:
- issue: Marcador de identidad de la ley heredada (πατρίῳ νόμῳ)
  english_pob_reading: ancestral law
  chosen_spanish_reading: ley ancestral
  alternative_spanish_readings:
  - ley de sus padres
  - ley heredada
  rationale: La frase señala la continuidad religiosa y étnica de la ley judía transmitida por los antepasados. «Ley ancestral» mantiene esa carga sin recurrir a vocabulario eclesiástico que no está en el texto.
