  text: Along the river[a], on its bank, on this side and on that side, every kind of tree for food will grow. Its leaf will not wither, and its fruit will not fail; every month it will bear fresh fruit, because its waters are coming out from the sanctuary. Its fruit will be for food[c][b], and its leaf for healing.
