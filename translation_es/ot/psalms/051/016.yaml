review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español acierta en la estructura general del verso y en varias decisiones clave: «Líbrame», «Dios de mi salvación», «mi lengua» y el sentido resultativo de «cantará». Sin embargo, no preserva fielmente dos decisiones centrales del expediente inglés ni del hebreo contextual: מִדָּמִים en este salmo penitencial se ha documentado como «bloodguilt», no como una ambigua «sangre» en el texto principal; y צִדְקָתֶךָ se auditó como «your righteousness», con «justice» solo en nota alternativa. El español actual invierte esa prioridad al poner «tu justicia» en texto y relegar «rectitud» a nota.'
  spanish_quality_summary: El español es legible y digno, pero «de la sangre» suena poco natural y demasiado indeterminado en este contexto penitencial; en español eclesial y claro, «de la culpa de sangre» comunica mejor el sentido idiomático. «Oh Dios» es aceptable, aunque «oh, Dios» puntuaría mejor; no es imprescindible. «Cantará con júbilo» funciona bien y «mi lengua» conserva la imagen poética.
  glossary_alignment: 'No hay conflicto con términos de proyecto como Yahvé/Mesías. Sí hay desalineación con la política de preservar la decisión léxica auditada: דמים debe reflejar «culpa de sangre» en el texto principal por el contexto; צדקה aquí debe priorizar «rectitud» o «justicia» según el expediente. Dado que el POB inglés escogió «righteousness» y dejó «justice» como alternativa, el español debe reflejar esa prioridad con «tu rectitud» en texto y «tu justicia» en nota.'
  issues:
  - severity: high
    issue: «de la sangre» no preserva la decisión auditada de מִדָּמִים como «bloodguilt».
    rationale: El hebreo דמים puede ser ambiguo léxicamente, pero el expediente ya resolvió que en Salmo 51 el contexto penitencial apunta a culpabilidad por derramamiento de sangre. La redacción española actual reabre indebidamente la ambigüedad y debilita la confesión.
  - severity: high
    issue: «tu justicia» en el texto principal invierte la prioridad de צִדְקָתֶךָ establecida en el POB inglés.
    rationale: El expediente eligió «your righteousness» para mantener el sentido amplio moral/covenantal, con «justice» como alternativa de nota. En español, «tu rectitud» refleja mejor esa prioridad; dejar «tu justicia» en texto principal desplaza el matiz.
  - severity: low
    issue: La puntuación de «oh Dios» podría ajustarse a «oh, Dios».
    rationale: Es una mejora estilística menor de puntuación vocativa en español, pero no afecta sustancialmente fidelidad ni claridad.
  revised_spanish_text: Líbrame de la culpa de sangre[a], oh, Dios, Dios de mi salvación, y mi lengua cantará con júbilo tu rectitud[b].
  revised_footnotes:
