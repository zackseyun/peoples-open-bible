review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura y el sentido general del griego: transición temporal (ὡς δὲ), imperfecto narrativo de movimiento (εἰσεπορεύετο), disposición militar de fuerzas (ἀπετάσσε τὰς δυνάμεις), y distribución en cada ciudad (ἐν ἑκάστῃ πόλει). También conserva correctamente la nota sobre la expresión comprimida εἰς τὰς πόλεις Πτολεμαΐς.'
  spanish_quality_summary: La redacción es comprensible, pero tiene dos puntos mejorables para fidelidad y naturalidad. Primero, «en las ciudades de Ptolemaida» debilita el sentido direccional de εἰς; «a las ciudades de Ptolemaida» o mejor «por las ciudades de Ptolemaida» sería más cercano al contexto de movimiento. Segundo, la nota dice «pertenecientes a Ptolemaida», lo cual es menos preciso que la explicación inglesa y puede sugerir dependencia de una ciudad, no de Ptolomeo/control ptolemaico. Además, «colocó fuerzas» es aceptable, pero «apostó fuerzas» o «dejó fuerzas de guarnición» suena más militar; aun así no es necesario forzar un cambio mayor.
  glossary_alignment: No hay términos teológicos del glosario mayor en juego. Militarmente, «guarnición» para φρουράν está bien. El nombre propio «Ptolemaida» es aceptable en español bíblico, pero la nota debe explicar mejor que Πτολεμαΐς aquí se entiende como referencia a ciudades bajo control de Ptolomeo/ptolemaico, no literalmente posesión de la ciudad Ptolemaida.
  issues:
  - severity: medium
    issue: Preposición direccional atenuada en «entraba en las ciudades de Ptolemaida»
    rationale: El griego εἰς con verbo de entrada expresa dirección/movimiento hacia o por dentro de las ciudades; «en» puede sonar más estático en español. «Entraba a» o «iba entrando en» preserva mejor el matiz verbal.
  - severity: medium
    issue: La nota al pie dice «pertenecientes a Ptolemaida»
    rationale: Eso puede malinterpretarse como relación con una ciudad concreta. La documentación inglesa aclara que se trata de ciudades pertenecientes a o controladas por Ptolomeo, es decir, ptolemaicas.
  - severity: low
    issue: «Colocó fuerzas» es algo genérico para contexto militar
    rationale: No es infiel, pero «apostó fuerzas» o «destacó fuerzas» suena más idiomático en un registro militar. Se puede mantener si se mejora el resto.
  revised_spanish_text: Y mientras entraba a las ciudades de Ptolemaida[a], apostó fuerzas como guarnición en cada ciudad.
  revised_footnotes:
  - marker: a
    text: Griego, literalmente, «a las ciudades Ptolemaida». La frase está sintácticamente comprimida; aquí se entiende como las ciudades pertenecientes a Ptolomeo o bajo control ptolemaico.
    reason: lexical_alternative
  revision_rationale: 'Se ajusta la preposición para reflejar mejor εἰς con verbo de movimiento, se mejora el verbo militar a «apostó», y se corrige la nota para alinearla con la explicación auditada: la referencia es a ciudades bajo Ptolomeo/control ptolemaico, no a posesión de una ciudad llamada Ptolemaida.'
