base_translation:
  language: en
  yaml_path: translation/ot/ecclesiastes/010/017.yaml
  text: Happy are you[a], O land, when your king is a son of nobles, and your princes eat at the proper time[c][b], for strength and not for drunkenness.
  footnotes:
  - marker: a
    text: Or 'Blessed are you, O land.' The Hebrew אַשְׁרֵי can also be rendered 'blessed' or 'fortunate.'
    reason: lexical_alternative
  - marker: b
    text: Or 'whose king is of noble birth' or, more literally, 'a son of nobles.'
    reason: lexical_alternative
  - marker: c
    text: Literally 'for strength and not for drinking'; the sense is eating for vigor rather than for intoxication.
    reason: lexical_alternative
