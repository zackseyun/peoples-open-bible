translation:
  language: es
  text: ¿No nos has rechazado[a], oh, Dios? ¿Y no sales con nuestros ejércitos?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «nos has desechado». El verbo hebreo puede expresar un rechazo enérgico o la idea de desechar por completo.
    reason: lexical_alternative
lexical_decisions:
- source_word: הֲלֹא
  english_pob_choice: Have you not
  chosen_spanish: ¿No ... has ...?
  alternatives_spanish:
  - ¿Acaso no ...?
  - ¿No es verdad que ...?
  lexicon: HALOT
  rationale: La partícula introduce una pregunta retórica que espera respuesta afirmativa. En español, la estructura interrogativa con «¿No ...?» conserva la fuerza retórica sin volverla pesada.
- source_word: אֱלֹהִים
  english_pob_choice: God
  chosen_spanish: Dios
  alternatives_spanish:
  - oh Dios
  - Dios mío
  lexicon: HALOT
  rationale: Aunque la forma hebrea es plural, aquí gobierna un verbo singular y funciona como vocativo singular del Dios de Israel. «Dios» es la equivalencia natural; se añade «oh» para reflejar el tono de dirección directa.
- source_word: זְנַחְתָּנוּ
  english_pob_choice: rejected us
  chosen_spanish: nos has rechazado
  alternatives_spanish:
  - nos has desechado
  - nos has apartado
  - nos has abandonado
  lexicon: HALOT
  rationale: זנח expresa rechazo fuerte, incluso de tipo pactual. «Nos has rechazado» preserva esa dureza mejor que opciones más suaves como «abandonado».
- source_word: וְלֹא
  english_pob_choice: And ... not
  chosen_spanish: ¿Y no ...?
  alternatives_spanish:
  - ¿y tampoco ...?
  - ¿y no ... todavía?
  lexicon: HALOT
  rationale: La conjunción + negación coordina la segunda queja con la primera. Mantener la pregunta evita debilitar el paralelismo y conserva el hilo de lamentación.
- source_word: תֵצֵא
  english_pob_choice: you do not go out
  chosen_spanish: sales
  alternatives_spanish:
  - saldrás
  - sales a combatir
  - marchas
  lexicon: HALOT
  rationale: El verbo básico es «salir». En este contexto militar, «sales» conserva la imagen sin añadir demasiado; el complemento «con nuestros ejércitos» deja claro el sentido bélico.
- source_word: בְּצִבְאֹתֵינוּ
  english_pob_choice: with our armies
  chosen_spanish: con nuestros ejércitos
  alternatives_spanish:
  - con nuestras huestes
  - con nuestras fuerzas
  lexicon: HALOT
  rationale: צָבָא puede significar ejército/hueste/fuerza. «Ejércitos» es claro y bíblicamente reconocible en español, y «con» refleja adecuadamente la idea de acompañamiento.
theological_decisions:
- issue: Lenguaje de rechazo divino en un lamento
  english_pob_reading: The verse is rendered as a direct lament that God has rejected his people and is not accompanying their armies.
  chosen_spanish_reading: El versículo se traduce como una queja directa de que Dios ha rechazado a su pueblo y no sale con sus ejércitos.
  alternative_spanish_readings:
  - Dios nos ha dejado
  - Dios ya no está con nosotros
  rationale: El hebreo usa un verbo fuerte de rechazo; conviene preservar la tensión teológica del lamento en vez de suavizarla. «Rechazado» mantiene la acusación pactual sin resolverla anticipadamente.
  doctrine_reference: Translation philosophy §3
translation_notes:
  revision_awareness: El texto inglés auditado pasó de una forma menos natural con «God» sin vocativo a «O God», y de una segunda cláusula declarativa a una interrogativa. La versión española sigue esa revisión al usar un vocativo explícito («oh Dios») y dos preguntas retóricas paralelas.
  spanish_consistency_notes:
  - Se mantiene «Dios» para אֱלֹהִים, acorde con el uso singular del verbo.
  - Se conserva el paralelismo de dos preguntas retóricas, importante para la lamentación.
  - No se sustituye el léxico de rechazo por términos más suaves que debiliten la tensión del hebreo.
