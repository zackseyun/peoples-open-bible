  text: וַ/יִּדַּ֥ר יַעֲקֹ֖ב נֶ֣דֶר לֵ/אמֹ֑ר אִם יִהְיֶ֨ה אֱלֹהִ֜ים עִמָּדִ֗/י וּ/שְׁמָרַ֨/נִי֙ בַּ/דֶּ֤רֶךְ הַ/זֶּה֙ אֲשֶׁ֣ר אָנֹכִ֣י הוֹלֵ֔ךְ וְ/נָֽתַן לִ֥/י לֶ֛חֶם לֶ/אֱכֹ֖ל וּ/בֶ֥גֶד לִ/לְבֹּֽשׁ־־׃
base_translation:
  language: en
  yaml_path: translation/ot/genesis/028/020.yaml
  text: Then Jacob made a vow[a], saying, “If God will be with me and will keep me on this way that I am going[d][c][b], and will give me bread to eat and clothing to wear,”
