revisions:
- from: Los ojos de Yahvé están sobre los que lo aman, protección de dominio y sostén de fuerza, resguardo contra el calor abrasador y resguardo contra el mediodía, guarda contra tropiezo y ayuda contra caída.
  to: El clamor del pobre atraviesa la nube, y hasta que llega a él no descansa. No cesa hasta que Dios atiende[a], y el Juez justo hace justicia[b].
  rationale: Se rehízo el versículo conforme al hebreo fuente y a la decisión textual del English POB, no al paralelo griego. 'Clamor' refleja bien שועת; 'atraviesa la nube' conserva la imagen vívida de ענן חלפה; 'llega a él' explicita el referente divino implícito, natural en español; 'atiende' mantiene el valor amplio de פקד sin sobredeterminarlo; y 'el Juez justo hace justicia' suena natural en español, mientras una nota conserva la alternativa más literal 'hace juicio'. También se trasladó la nota de incertidumbre textual, indispensable en este caso.
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T23:02:39Z'
review_pass:
  verdict: revise
  source_alignment_summary: El borrador español no sigue la evidencia fuente principal ni la pista auditada del English POB. La base hebrea dice que el clamor del pobre atraviesa la nube y no cesa hasta que Dios atiende; el borrador traduce en cambio el paralelo griego divergente sobre 'los ojos de Yahvé'. Dado que el English POB adopta explícitamente la lectura hebrea y conserva la divergencia griega en nota, el borrador actual no preserva el significado fuente ni la decisión textual documentada.
  spanish_quality_summary: El español del borrador es comprensible a nivel frase por frase, pero resulta forzado y nominalizado ('protección de dominio', 'sostén de fuerza') y además corresponde al testigo equivocado para este registro. Conviene rehacer el versículo según el hebreo auditado, con sintaxis natural y digna en español.
  glossary_alignment: 'No hay conflicto terminológico mayor con ''Yahvé'', pero el problema central es textual: se ignoró la lectura hebrea adoptada por POB. En la revisión se mantiene ''Dios'' para אל conforme al original hebreo y se conserva el matiz judicial de ''hace justicia'' / ''hace juicio'' mediante nota. No hay títulos mesiánicos ni otros términos sensibles aquí.'
  issues:
  - severity: high
    issue: Se tradujo el paralelo griego en lugar del texto hebreo adoptado por el English POB.
    rationale: 'La evidencia principal y la traducción auditada del proyecto para Sir 34:17 siguen el hebreo: ''El clamor del pobre...''. El borrador actual reproduce una lectura griega sustancialmente distinta, por lo que cambia completamente el contenido del versículo.'
  - severity: high
    issue: Se omitió la nota de variante textual necesaria.
    rationale: El English POB documenta que el griego paralelo difiere mucho del hebreo y que el versículo es textualmente incierto. Esa información debe preservarse en español, especialmente porque aquí la divergencia es mayor.
  - severity: medium
    issue: Se omitió la alternativa léxica para 'יעשה משפט'.
    rationale: El English POB conserva en nota la alternativa 'does justice' frente a la expresión literal 'does judgment'. En español corresponde reflejar esa alternativa para preservar la rationale léxica auditada.
  - severity: low
    issue: El español del borrador usa combinaciones poco naturales.
    rationale: Expresiones como 'protección de dominio' o 'guarda contra tropiezo' suenan rígidas en español; aunque esto sería secundario si el texto fuente fuera correcto, confirma que no está listo para aprobarse.
  revised_spanish_text: El clamor del pobre atraviesa la nube, y hasta que llega a él no descansa. No cesa hasta que Dios atiende[a], y el Juez justo hace justicia[b].
  revised_footnotes:
