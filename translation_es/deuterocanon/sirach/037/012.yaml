revisions:
- from: No consultes con tu suegro[a], y no ocultes un secreto de quien tiene celos.
  to: No consultes con tu suegro[a], y no reveles un secreto a una persona celosa.
  rationale: 'Se corrige la segunda cláusula para reflejar fielmente el sentido hebreo: el mandato es no divulgar un secreto a una persona celosa. «No reveles» expresa con naturalidad española la idea de mantenerlo oculto frente a esa persona. Se conserva la nota textual, con leve ajuste estilístico.'
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T23:08:55Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue correctamente el hebreo extante: una prohibición de consultar al suegro y otra de reservar/no revelar un secreto ante una persona celosa. También conserva bien la nota sobre la fuerte divergencia del paralelo griego. Sin embargo, la segunda cláusula en español no expresa fielmente la relación semántica de מן + מקנא con העלים סוד.'
  spanish_quality_summary: La primera cláusula es natural y clara. La segunda, «no ocultes un secreto de quien tiene celos», suena poco idiomática y además cambia el sentido hacia 'no ocultes un secreto procedente de alguien celoso' o crea ambigüedad. En español natural y fiel, debe decirse «oculta un secreto a un celoso» o mejor «no reveles un secreto a una persona celosa».
  glossary_alignment: No hay conflictos con la terminología base del proyecto. «Suegro» es correcto para חמיך. El problema está en la sintaxis de «de quien tiene celos», que no representa bien «from one who is jealous» en este contexto. La nota textual puede mantenerse con una leve mejora de fluidez.
  issues:
  - severity: high
    issue: La segunda cláusula invierte o enturbia el sentido de la prohibición.
    rationale: El hebreo וממקנא העלים סוד significa ocultar/mantener reservado un secreto a una persona celosa, no 'no ocultar un secreto de quien tiene celos'. La redacción actual contradice además el sentido positivo de העלים.
  - severity: medium
    issue: «de quien tiene celos» no es la mejor forma para מקנא en español.
    rationale: En español, «tener celos» suele pedir complemento o contexto, y aquí queda extraño. «Una persona celosa» o «un celoso» comunica mejor el valor adjetival del hebreo.
  revised_spanish_text: No consultes con tu suegro[a], y no reveles un secreto a una persona celosa.
  revised_footnotes:
  - marker: a
    text: 'El paralelo griego en Swete difiere notablemente aquí: habla, más bien, de acompañarse de un hombre piadoso que sabes que guarda los mandamientos. El texto hebreo conservado, en cambio, advierte contra consultar al suegro y contra revelar un secreto a una persona celosa.'
    reason: textual_variant
