translation:
  language: es
  text: 'Así los bendijo aquel día[a], diciendo: «Por medio de ti Israel bendecirá, diciendo: “Que Dios te haga como a Efraín y como a Manasés”». Y puso a Efraín delante de Manasés.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «En ti Israel bendecirá», es decir, Israel usará sus nombres como fórmula de bendición.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְבָרֲכֵם
  english_pob_choice: he blessed them
  chosen_spanish: los bendijo
  alternatives_spanish:
  - pronunció una bendición sobre ellos
  - los bendijo con una bendición
  lexicon: HALOT
  rationale: El piel de ברך expresa aquí la acción de bendecir; el objeto directo plural se refleja naturalmente con «los».
- source_word: בַּיּוֹם הַהוּא
  english_pob_choice: that day
  chosen_spanish: aquel día
  alternatives_spanish:
  - ese día
  - en aquel día
  lexicon: HALOT
  rationale: Es una expresión temporal idiomática; «aquel día» suena natural en español y conserva la referencia específica.
- source_word: לֵאמֹר
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - y dijo
  - con estas palabras
  lexicon: HALOT
  rationale: Marca introducción de discurso directo; «diciendo» reproduce bien la función quotativa.
- source_word: בְּךָ
  english_pob_choice: By you
  chosen_spanish: Por ti
  alternatives_spanish:
  - En ti
  - Con tu nombre
  lexicon: HALOT
  rationale: Se preserva el valor instrumental o de referencia de la preposición ב en esta fórmula de bendición. «Por ti» mantiene la idiomaticidad sin borrar la base hebrea.
- source_word: יְבָרֵךְ יִשְׂרָאֵל
  english_pob_choice: Israel will bless
  chosen_spanish: Israel bendecirá
  alternatives_spanish:
  - Israel pronunciará bendición
  - Israel usará tu nombre para bendecir
  lexicon: HALOT
  rationale: Se conserva «Israel» sin expandirlo, respetando la tensión entre el sentido ancestral y el corporativo/nacional documentada en el audit trail.
- source_word: יְשִׂמְךָ אֱלֹהִים
  english_pob_choice: May God make you
  chosen_spanish: Que Dios te haga
  alternatives_spanish:
  - Que Dios te ponga
  - Dios te hará
  lexicon: HALOT
  rationale: La forma de deseo/jussiva en contexto de bendición se expresa de modo natural en español con «Que Dios te haga»; recoge el sentido de שׂים como hacer/establecer en esta fórmula.
- source_word: כְּאֶפְרַיִם וְכִמְנַשֶּׁה
  english_pob_choice: like Ephraim and like Manasseh
  chosen_spanish: como a Efraín y como a Manasés
  alternatives_spanish:
  - como Efraín y como Manasés
  - igual que Efraín y Manasés
  lexicon: HALOT
  rationale: Se conserva el comparativo כ con «como», y se usa «a» ante nombres personales para fluidez española. El paralelismo repetido se mantiene.
- source_word: וַיָּשֶׂם אֶת אֶפְרַיִם לִפְנֵי מְנַשֶּׁה
  english_pob_choice: And he set Ephraim before Manasseh
  chosen_spanish: Y puso a Efraín delante de Manasés
  alternatives_spanish:
  - Y colocó a Efraín antes de Manasés
  - Y estableció a Efraín por delante de Manasés
  lexicon: HALOT
  rationale: שׂים con לִפְנֵי indica colocar en posición/prelación; «puso ... delante de» conserva la imagen y el orden de preferencia sin sobreinterpretar.
theological_decisions:
- issue: Referente de «Israel» en la fórmula de bendición
  english_pob_reading: Rendered as 'Israel' without expansion, allowing the term to carry both the ancestral and corporate-national sense.
  chosen_spanish_reading: Se mantiene «Israel» sin expansión, de modo que pueda abarcar tanto al patriarca como al pueblo descendiente.
  alternative_spanish_readings:
  - Jacob bendecirá
  - el pueblo de Israel bendecirá
  rationale: El hebreo dice simplemente «Israel». En el contexto, Jacob habla proféticamente del uso futuro de esta fórmula entre sus descendientes; conservar el término evita resolver demasiado pronto la ambigüedad textual.
  doctrine_reference: Translation philosophy §3 (preservar la tensión teológica en vez de resolverla)
- issue: Valor de la cláusula de bendición «Que Dios te haga como...»
  english_pob_reading: May God make you like Ephraim and like Manasseh.
  chosen_spanish_reading: Se traduce como fórmula desiderativa normal en español, sin cambiarla a una simple afirmación futura.
  alternative_spanish_readings:
  - Dios te hará como Efraín y como Manasés
  - Dios te haga como Efraín y como Manasés
  rationale: La construcción expresa bendición y deseo, no solo predicción; «Que Dios te haga...» comunica mejor ese matiz y mantiene la forma litúrgica de la bendición.
  doctrine_reference: Uso contextual de jussivo en bendiciones
translation_notes:
  revision_awareness: Se incorporó la revisión más reciente que sustituyó una conclusión explicativa por la conjunción simple «Y» para reflejar con mayor precisión el hebreo וַ. El texto español sigue esa decisión y mantiene la secuencia directa de la fuente.
  spanish_consistency_notes:
  - Se evita «SEÑOR» para יהוה porque este versículo usa אֱלֹהִים, que se traduce como «Dios».
  - Se mantiene «Efraín» y «Manasés» con ortografía española estándar y acentuación natural.
  - Se conserva el paralelismo de la fórmula de bendición y el orden final de precedencia entre los dos nombres.
