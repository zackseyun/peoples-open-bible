    issue: «saqueador» para מֵפִיץ
    rationale: El audit trail documenta un agente que dispersa o hace pedazos; «saqueador» introduce la idea de expolio, que no es la fuerza principal del término.
  - severity: high
    issue: Marcadores de notas desalineados
    rationale: La nota a explica מֵפִיץ pero está anclada tras «un»; la b explica el modismo «contra tu rostro» pero está anclada tras «saqueador»; la c explica מְצֻרָה pero está anclada tras «rostro». Esto incumple la disciplina de anclaje.
  - severity: medium
    issue: «alista mucho tu fuerza» es poco idiomático
    rationale: Aunque intenta reflejar אַמֵּץ כֹּחַ מְאֹד, en español suena forzado. Puede conservarse el sentido con una formulación más natural como «reúne toda tu fuerza».
  - severity: low
    issue: «Subió» puede sonar demasiado literal
    rationale: No es incorrecto, pero «Ha subido» o «Ha avanzado» comunica mejor el perfecto con matiz de avance militar ya efectuado. Aun así, no es un problema grave.
