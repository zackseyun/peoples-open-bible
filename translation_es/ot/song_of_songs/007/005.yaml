  yaml_path: translation/ot/song_of_songs/007/005.yaml
  text: Your neck is like a tower of ivory[a]; your eyes are pools in Heshbon, by the gate of Bath-rabbim. Your nose is like the tower of Lebanon[c][b], looking toward Damascus.
  footnotes:
