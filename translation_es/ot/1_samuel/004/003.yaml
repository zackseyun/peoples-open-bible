base_translation:
  language: en
  yaml_path: translation/ot/1_samuel/004/003.yaml
  text: When the people came into the camp[a], the elders of Israel said, “Why has Yahweh struck us down today before the Philistines? Let us bring here from Shiloh the ark of the covenant of Yahweh, so that it may come into our midst and save us from the hand of our enemies.”
  footnotes:
  - marker: a
    text: Or, “that he may come into our midst and save us,” taking the singular verbs as referring more directly to the LORD whose presence is associated with the ark.
