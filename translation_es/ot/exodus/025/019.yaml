translation:
  language: es
  text: Haz un querubín en un extremo y un querubín en el otro extremo[a]; del propiciatorio haréis los querubines sobre sus dos extremos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más explícitamente: «haréis los querubines de una sola pieza con el propiciatorio, en sus dos extremos». La preposición hebrea aquí indica procedencia o material: los querubines deben formarse del mismo propiciatorio, no hacerse por separado y añadirse después.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַעֲשֵׂה / תַּעֲשׂוּ
  english_pob_choice: Make / you shall make
  chosen_spanish: Haz / haréis
  alternatives_spanish:
  - Haz / harás
  - Haced / haréis
  - Harás / haréis
  lexicon: HALOT
  rationale: El hebreo combina una orden inicial singular con una instrucción plural posterior. En español, ‘haz’ conserva el imperativo directo de la primera cláusula, y ‘haréis’ refleja el plural dirigido a los artesanos en la segunda. Se mantiene el carácter instructivo sin volverlo excesivamente explicativo.
- source_word: כְּרוּב / הַכְּרֻבִים
  english_pob_choice: cherub / the cherubim
  chosen_spanish: querubín / los querubines
  alternatives_spanish:
  - querub / los querubines
  - querubín / los querubines
  lexicon: HALOT
  rationale: ‘Querubín’ es el término técnico más natural y reconocido en español bíblico para el ser celestial aludido. En la primera mitad se usa el singular para cada figura individual, y en la segunda el plural para el conjunto, como en el hebreo y en la POB inglesa.
- source_word: אֶחָד
  english_pob_choice: one
  chosen_spanish: un
  alternatives_spanish:
  - uno
  - uno de
  lexicon: HALOT
  rationale: En español, con sustantivos contables masculinos como ‘querubín’, ‘un’ expresa mejor la unidad individual que ‘uno’ aislado. Conserva la simetría de las dos instrucciones.
- source_word: מִקָּצָה מִזֶּה ... מִקָּצָה מִזֶּה
  english_pob_choice: on one end ... on the other end
  chosen_spanish: en un extremo ... en el otro extremo
  alternatives_spanish:
  - en uno de sus extremos ... en el otro
  - al extremo de este lado ... al extremo de aquel lado
  lexicon: HALOT
  rationale: La revisión inglesa prefirió una lectura locativa más natural (‘on one end... on the other end’) frente a una traducción más literal de ‘from’. En español, ‘en un extremo... en el otro extremo’ reproduce esa ubicación sin borrar que la expresión hebrea es idiomática y relativa al objeto mencionado.
- source_word: מִן הַכַּפֹּרֶת
  english_pob_choice: from the mercy seat
  chosen_spanish: de la cubierta del propiciatorio
  alternatives_spanish:
  - del propiciatorio
  - de la tapa expiatoria
  - de la cubierta
  lexicon: HALOT
  rationale: ‘כַּפֹּרֶת’ designa la pieza superior del arca y en la tradición bíblica puede llamarse ‘propiciatorio’. Para evitar una forma demasiado eclesiástica y a la vez conservar la referencia material, se eligió ‘cubierta del propiciatorio’, que deja visible la función de cubierta y el término técnico. La preposición ‘de’ mantiene la relación de origen/material señalada por el hebreo y por la nota inglesa.
- source_word: עַל שְׁנֵי קְצוֹתָיו
  english_pob_choice: on its two ends
  chosen_spanish: sobre sus dos extremos
  alternatives_spanish:
  - en sus dos extremos
  - a sus dos extremos
  lexicon: HALOT
  rationale: ‘Sobre’ expresa bien la colocación física de las figuras y mantiene cercanía con el hebreo עַל. ‘Sus’ remite al objeto precedente, la cubierta/propiciatorio, sin necesidad de añadir elementos ausentes del texto.
theological_decisions:
- issue: Sentido material de מִן en relación con la cubierta del propiciatorio
  english_pob_reading: The cherubim are to be formed from the mercy seat itself, not made separately and attached later.
  chosen_spanish_reading: Los querubines deben salir de la cubierta del propiciatorio, no fabricarse aparte para luego adherirse.
  alternative_spanish_readings:
  - los querubines serán de una sola pieza con la cubierta del propiciatorio
  - los querubines se harán sobre la cubierta del propiciatorio
  rationale: 'La POB inglesa conserva la tensión entre ubicación y origen material. En español, ‘de la cubierta del propiciatorio’ permite esa misma lectura: no solo indica lugar, sino también procedencia. La formulación evita resolver en exceso la imagen y deja abierta la idea de una sola pieza, conforme a la nota inglesa.'
  doctrine_reference: Éxodo 25:19; nota léxica inglesa sobre מִן
- issue: Terminología de כַּפֹּרֶת
  english_pob_reading: mercy seat
  chosen_spanish_reading: propiciatorio
  alternative_spanish_readings:
  - cubierta
  - asiento de misericordia
  rationale: ‘Propiciatorio’ es el equivalente bíblico tradicional para כַּפֹּרֶת y conserva su uso técnico en el contexto del arca. Se añadió ‘cubierta’ para hacer explícita la referencia física del objeto y ayudar a la claridad del español moderno sin sustituir el término técnico.
  doctrine_reference: Éxodo 25:17-22; uso técnico del propiciatorio en el tabernáculo
translation_notes:
  revision_awareness: 'Se tomó en cuenta la revisión inglesa más reciente, que prefirió una redacción locativa más natural en la primera mitad (‘on one end ... on the other end’) sin abandonar la nota sobre el origen material en la cláusula final. La versión española imita esa solución: mantiene la ubicación natural en la primera oración y conserva la relación de procedencia en ‘de la cubierta del propiciatorio’.'
  spanish_consistency_notes:
  - Se usa ‘querubín/querubines’ de modo consistente para el ser celestial técnico.
  - Se evita ‘SEÑOR’ porque el versículo no contiene el tetragrámaton.
  - ‘Propiciatorio’ se conserva como término técnico, pero se acompaña de ‘cubierta’ para claridad.
  - La sintaxis mantiene dos miembros paralelos, reflejando la simetría del hebreo.
