  to: Entonces el rey Roboam se fortaleció en Jerusalén y reinó[a]. Roboam tenía cuarenta y un años cuando comenzó a reinar, y reinó diecisiete años en Jerusalén, la ciudad que Yahvé había escogido de entre todas las tribus de Israel para poner su nombre allí. Y el nombre de su madre era Naamá la amonita[b].
