translation:
  language: es
  text: 'diciendo[a]: «A ti te daré la tierra de Canaán, la porción de vuestra herencia[b]»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «la cuerda de medición de vuestra herencia», donde «cuerda» se entiende por extensión como la porción de tierra asignada.
    reason: lexical_alternative
  - marker: b
    text: El hebreo pasa del singular «a ti» al plural explícito en «vuestra herencia», probablemente aludiendo a Abraham como representante de sus descendientes.
    reason: alternative_reading
lexical_decisions:
- source_word: לֵאמֹר
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - al decir
  - diciendo que
  lexicon: HALOT
  rationale: El infinitivo constructo introduce la cita previa de la promesa divina; «diciendo» conserva esa función introductoria de forma natural en español y evita una paráfrasis innecesaria.
- source_word: לְךָ
  english_pob_choice: to you
  chosen_spanish: a ti
  alternatives_spanish:
  - para ti
  - a usted
  lexicon: HALOT
  rationale: El dativo de dirección se expresa con naturalidad en español como «a ti». Mantiene el tratamiento directo singular del hebreo.
- source_word: אֶתֵּן
  english_pob_choice: I will give
  chosen_spanish: te daré
  alternatives_spanish:
  - yo daré
  - voy a darte
  lexicon: HALOT
  rationale: El imperfecto hebreo en contexto promesal se traduce mejor con futuro en español; el enclítico «te» integra el destinatario y evita repetir «a ti» innecesariamente.
- source_word: אֶרֶץ כְּנָעַן
  english_pob_choice: the land of Canaan
  chosen_spanish: la tierra de Canaán
  alternatives_spanish:
  - el país de Canaán
  - la tierra cananea
  lexicon: HALOT
  rationale: «Tierra de Canaán» conserva el referente geográfico y la fórmula bíblica habitual sin perder naturalidad en español.
- source_word: חֶבֶל
  english_pob_choice: portion
  chosen_spanish: la porción
  alternatives_spanish:
  - la medida
  - la línea de reparto
  - el lote
  lexicon: HALOT
  rationale: Aunque el término puede significar literalmente «cuerda/línea de medición», en contextos de repartición de tierra funciona metonímicamente como una parte asignada. «Porción» refleja ese uso con claridad y sigue la decisión auditada del POB inglés.
- source_word: נַחֲלַתְכֶם
  english_pob_choice: your inheritance
  chosen_spanish: de tu herencia
  alternatives_spanish:
  - de vuestra herencia
  - de su herencia
  lexicon: HALOT
  rationale: «Herencia» comunica la idea de posesión heredada y promesa pactal. Se conserva el singular «tu» en español, porque el hebreo pasa del singular al plural; esa tensión queda explicada en la nota.
theological_decisions:
- issue: Paso del singular al plural en el posesivo final
  english_pob_reading: Retain singular 'to you' and plural 'your inheritance' without harmonizing
  chosen_spanish_reading: Mantener «a ti» y «tu herencia» sin armonizar el cambio de número en el cuerpo del texto, con nota explicativa
  alternative_spanish_readings:
  - a ti ... la herencia de ustedes
  - a ti ... la herencia de tu descendencia
  - a ti ... vuestra herencia
  rationale: El hebreo conserva una tensión real entre el destinatario singular y el posesivo plural. En español, mantener el singular en el texto y explicitar el fenómeno en nota preserva esa observación sin suavizarla indebidamente.
  doctrine_reference: Translation philosophy §3, Preservar la tensión teológica en vez de resolverla.
translation_notes:
  revision_awareness: La redacción sigue la revisión más reciente del POB inglés, que prefirió «the portion of your inheritance» en aposición a una construcción comparativa. En español se refleja esa opción con «la porción de tu herencia», manteniendo el paralelismo y la formalidad del hebreo.
  spanish_consistency_notes:
  - Se usa «Yahvé» para el nombre divino en continuidad con el proyecto POB, aunque en este versículo no aparece explícitamente.
  - Se traduce el valor metonímico de חֶבֶל como «porción», evitando un calco literal que oscurecería el sentido.
  - Se conserva el tratamiento singular directo en la frase principal y se deja la tensión numérica para la nota, en línea con el audit trail inglés.
