  consult_excerpt: '33 Strengthen the feet of those who stumble, and reach out to
    those who are sick. Feed those who are hungry, and give rest to those who are
    weary. Raise up those who want to arise, and awaken those who sleep, because you’re
    the understanding that’s unsheathed. If strength is like this, it becomes stronger.

    Be concerned about yourselves. Don’t be concerned about other things which you’ve
    rejected from yourselves. Don’t return to eat your vomit. Don’t be eaten by worms,
    because you’ve already shaken it off. Don’t become a dwelling-place for the devil,
    because you’ve already brought him to naught. Don’t strengthen your obstacles
    which are collapsing, as though you’re a support. For the lawless one is nothing,
    to be treated more harshly than the just, doing his works among others.

    Do then the Father’s will, because you’re from him. For the Father is sweet, and
    goodness is in his will. He knows what’s yours, that you may find rest in them.
    For by the fruits they know what’s yours, because the children of the Father 34
    are his fragrance, since they’re from the grace of his expression. Because of
    this, the Father loves his fragrance, and reveals it in every place. And when
    it mixes with matter, it gives his fragrance to the light, and in tranquility
    he causes it to rise above every form and every sound. For it’s not the ears that
    smell the fragrance, but it’s the Spirit that smells, and draws the fragrance
    to itself, and sinks down into the Father’s fragrance. He shelters it, then, and
    takes it to the place from which it came, from the first fragrance which has grown
    cold. It’s something in a soul-endowed delusion, like cold water sunk into loose
    earth. Those who see it think that it’s just earth. Afterwards, it dissolves again.
    If a breath draws it, it becomes warm. So the fragrances which are cold are from
    the division. Because of this, faith came. It dissolved the division, and it brought
    the fullness that’s warm with love, so that the cold may not return, but rather
    the unitary thought of completion.'
translation:
  text: 'Make firm the feet of those who stumble[a]; stretch out a hand to the sick.
    Give food to those who are hungry, and give rest to those who are weary. Raise
    up those who wish to arise, and awaken those who sleep—for you are the Understanding
    that has been unsheathed. And if strength is of this sort, it grows stronger.


    Be concerned for yourselves; do not be concerned with other things that you have
    cast away from yourselves. Do not turn back to eat your vomit. Do not be moth-eaten,
    do not be worm-eaten, for you have already shaken it off. Do not become a house
    for the Devil, for you have already brought him to nothing. Do not prop up your
    stumbling-blocks that are collapsing, as though you were a support. For the lawless
    one is nothing, to be dealt with more severely than the just, while doing his
    works among others.


    Therefore do the Father’s will, because you are from him. For the Father is sweet,
    and goodness is in his will. He knows what is yours, so that you may find rest
    in them. For by the fruits they know what is yours, because the children of the
    Father are his fragrance, since they come from the grace of his Face. For this
    reason the Father loves his fragrance and reveals it in every place; and when
    it mingles with hylē, he gives his fragrance to the Light, and in his quiet he
    causes it to surpass every form and every sound. For it is not the ears that smell
    the fragrance, but the Spirit smells it, draws the fragrance to itself, and sinks
    down into the fragrance of the Father. Then he shelters it and leads it back to
    the place from which it came—from the first fragrance that had grown cold. It
    is something within a soul-endowed formation, like cold water sunk into a clod
    of loose earth[b]. Those who see it suppose it is only earth; afterward it is
    dissolved again. And if a breath draws it, it becomes warm. Thus the fragrances
    that are cold are from the division. Because of this, Faith came: it dissolved
    the division and brought the Pleroma that is warm with agapē, so that the cold
    would not return, but rather the unity (monad) of Thought of perfection[c]. This
    Logos made it manifest.'
