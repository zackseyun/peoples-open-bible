translation:
  language: es
  text: ¡Atiéndanme[a], pueblo mío; escúchenme, nación mía! Porque de mí saldrá la instrucción[b], y pondré[c] mi justicia[d] como luz para los pueblos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Presten atención a mí».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «ley» o «enseñanza» para תּוֹרָה.'
    reason: lexical_alternative
  - marker: c
    text: El verbo final también puede entenderse como «haré reposar» o «estableceré».
    reason: lexical_alternative
  - marker: d
    text: 'O: «mi juicio» para מִשְׁפָּטִי.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הַקְשִׁיבוּ
  english_pob_choice: Pay attention
  chosen_spanish: Atiéndanme
  alternatives_spanish:
  - Pónganme atención
  - Presten atención a mí
  - Escúchenme
  lexicon: HALOT
  rationale: El imperativo pide atención activa y no solo audición. "Atiéndanme" mantiene la fuerza apelativa en español natural y se ajusta al tono profético.
- source_word: עַמִּי
  english_pob_choice: my people
  chosen_spanish: pueblo mío
  alternatives_spanish:
  - mi pueblo
  - mi gente
  lexicon: HALOT
  rationale: '"Pueblo mío" conserva la relación de pertenencia del hebreo y fluye bien en español bíblico contemporáneo.'
- source_word: הַאֲזִינוּ
  english_pob_choice: give ear
  chosen_spanish: escúchenme
  alternatives_spanish:
  - préstemen oído
  - oiganme
  lexicon: HALOT
  rationale: La segunda orden paralela refuerza la primera. "Escúchenme" comunica el llamado solemne sin duplicar mecánicamente el primer verbo.
- source_word: וּלְאוּמִּי
  english_pob_choice: my nation
  chosen_spanish: nación mía
  alternatives_spanish:
  - mi nación
  - mi pueblo
  lexicon: HALOT
  rationale: '"Nación mía" conserva el paralelismo con עַמִּי y distingue ligeramente לְאוֹם de עַם, como hace el texto inglés de referencia.'
- source_word: תּוֹרָה
  english_pob_choice: instruction
  chosen_spanish: la instrucción
  alternatives_spanish:
  - la ley
  - la enseñanza
  lexicon: HALOT
  rationale: 'Se preserva el alcance amplio de תּוֹרָה en este contexto: no solo ley codificada, sino enseñanza autoritativa que procede de Yahvé. "Instrucción" evita una reducción a un sentido técnico-jurídico.'
- source_word: מֵאִתִּי
  english_pob_choice: from me
  chosen_spanish: de mí
  alternatives_spanish:
  - desde mí
  - procederá de mí
  lexicon: HALOT
  rationale: La preposición simple reproduce con naturalidad el origen de la instrucción en Yahvé.
- source_word: תֵצֵא
  english_pob_choice: will go out
  chosen_spanish: saldrá
  alternatives_spanish:
  - irá
  - vendrá
  lexicon: HALOT
  rationale: '"Saldrá" es la correspondencia más directa y natural de יצא en este movimiento de procedencia hacia afuera.'
- source_word: וּמִשְׁפָּטִי
  english_pob_choice: my justice
  chosen_spanish: mi justicia
  alternatives_spanish:
  - mi juicio
  - mi sentencia
  - mi derecho
  lexicon: HALOT
  rationale: Se conserva "justicia" para reflejar el orden recto y la actuación justa de Dios en paralelo con la instrucción. No se reduce a un acto de condena.
- source_word: לְאוֹר עַמִּים
  english_pob_choice: as a light for the peoples
  chosen_spanish: como luz para los pueblos
  alternatives_spanish:
  - como luz para las naciones
  - para ser luz de los pueblos
  lexicon: HALOT
  rationale: '"Como luz" mantiene la función comparativa/resultativa del hebreo. "Pueblos" preserva el plural universal y el eco con "pueblo mío".'
- source_word: אַרְגִּיעַ
  english_pob_choice: I will set
  chosen_spanish: pondré
  alternatives_spanish:
  - estableceré
  - haré descansar
  - asentaré
  lexicon: HALOT
  rationale: El verbo es difícil; siguiendo la revisión del POB inglés, "pondré" retiene la idea de colocar o fijar algo delante de los pueblos, sin sobreinterpretar el matiz exacto.
theological_decisions:
- issue: Alcance universal de la instrucción y la justicia de Yahvé
  english_pob_reading: The verse speaks of God's authoritative instruction and justice going forth universally to the peoples.
  chosen_spanish_reading: El versículo presenta la instrucción y la justicia de Yahvé como una realidad que sale hacia todos los pueblos.
  alternative_spanish_readings:
  - Se refiere solo a la ley para Israel.
  - Limita la justicia al juicio condenatorio.
  rationale: La mención explícita de "los pueblos" exige una apertura universal. La traducción evita estrechar el texto a un uso exclusivamente intra-israelita o a un sentido meramente punitivo.
  doctrine_reference: Translation philosophy §§1, 3, 6
- issue: Sentido de מִשְׁפָּטִי
  english_pob_reading: my justice
  chosen_spanish_reading: mi justicia
  alternative_spanish_readings:
  - mi juicio
  - mi sentencia
  - mi derecho
  rationale: '"Justicia" conserva la carga positiva del orden recto de Dios y su irradiación hacia las naciones, manteniendo la tensión del texto sin convertirlo en un simple veredicto.'
  doctrine_reference: Translation philosophy §§3, 5
translation_notes:
  revision_awareness: La redacción sigue de cerca el último estado del POB en inglés, incluyendo la revisión que prefirió "set" sobre "establish" para el verbo final. En español se optó por "pondré" para reflejar con naturalidad esa decisión y mantener la misma cautela exegética ante אַרְגִּיעַ.
  spanish_consistency_notes:
  - Se mantuvo Yahvé implícito por el contexto profético, siguiendo la práctica POB de no sustituir sistemáticamente el nombre divino por una glosa reverencial.
  - '"Pueblos" traduce עַמִּים en plural universal, en coherencia con "pueblo mío" y "nación mía".'
  - Se prefirió "instrucción" sobre "ley" para תּוֹרָה, acorde con el análisis contextual del audit trail.
  - '"Justicia" preserva la ambigüedad productiva entre orden recto y acto de juzgar, sin imponer una lectura doctrinal más estrecha.'
