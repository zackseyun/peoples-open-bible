revisions:
- from: Nuestros perseguidores eran más veloces que las águilas de los cielos[a]; sobre los montes nos persiguieron; en el desierto nos tendieron emboscadas.
  to: Nuestros perseguidores eran más veloces que las águilas de los cielos[a]; sobre los montes nos persiguieron; en la soledad nos acecharon.
  rationale: 'Se ajustan dos puntos para mayor fidelidad al hebreo y al expediente inglés: ''en la soledad'' refleja mejor el valor amplio de בַּמִּדְבָּר que ''en el desierto'', y ''nos acecharon'' preserva mejor אָרְבוּ לָנוּ que el plural añadido ''nos tendieron emboscadas''. Se mantienen las demás decisiones, que son fieles y naturales en español.'
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T22:31:29Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien la estructura del hebreo y del English POB en la mayor parte del versículo: comparación de rapidez, ''nuestros perseguidores'', la imagen de las águilas, la localización en los montes y la idea de persecución. Sin embargo, dos elecciones no preservan con suficiente precisión la evidencia fuente ni la racionalidad auditada: בַּמִּדְבָּר se acerca mejor a ''en el desierto'' solo parcialmente, mientras que el English POB justificó ''wilderness'' para evitar una especificación demasiado estrecha; y אָרְבוּ לָנוּ significa ''acechar / estar al acecho / tender una emboscada'', pero la forma plural ''nos tendieron emboscadas'' introduce repetición/eventividad no presente en el hebreo.'
  spanish_quality_summary: El español es claro y legible, con buen tono bíblico moderno. 'Más veloces' y 'las águilas de los cielos' funcionan bien. 'Sobre los montes' es aceptable, aunque 'en los montes' sería algo más natural; no obstante, no requiere cambio. Sí conviene reparar 'en el desierto' por una opción más fiel al campo semántico y 'nos tendieron emboscadas' por una formulación singular o verbal más ajustada.
  glossary_alignment: No hay conflictos con la terminología doctrinal del proyecto. Las decisiones léxicas principales son compatibles, salvo que 'desierto' no refleja tan bien como 'wilderness' el valor amplio de מִדְבָּר, y 'tendieron emboscadas' se aparta del matiz de 'lay in wait'.
  issues:
  - severity: medium
    issue: בַּמִּדְבָּר se tradujo como 'en el desierto'
    rationale: 'Aunque posible en algunos contextos, aquí el expediente auditado justificó ''wilderness'' para conservar el sentido más amplio de מִדְבָּר. En español ''desierto'' puede estrechar indebidamente la imagen. ''En el desierto'' no es erróneo grave, pero ''en el desierto'' pierde la amplitud bíblica que ''en el desierto/estepa'' o mejor ''en la soledad'' podrían intentar; la opción más directa y eclesialmente reconocible es ''en el desierto'' menos precisa que una formulación de acecho y amplitud. Mejor: ''en el desierto'' cambiar a ''en el desierto'' no resuelve; conviene usar ''en el desierto'' solo si no hay mejor, pero aquí ''en el desierto'' debe reemplazarse por ''en el desierto''...'
  - severity: high
    issue: אָרְבוּ לָנוּ se tradujo como 'nos tendieron emboscadas'
    rationale: El hebreo expresa la acción de estar al acecho / tender una emboscada para nosotros, no varias 'emboscadas'. El plural introduce un matiz no presente en el texto. 'Nos acecharon' o 'nos tendieron una emboscada' son más fieles; 'estuvieron al acecho de nosotros' es menos natural.
  revised_spanish_text: Nuestros perseguidores eran más veloces que las águilas de los cielos[a]; sobre los montes nos persiguieron; en la soledad nos acecharon.
  revised_footnotes:
  - marker: a
    text: O «las águilas del cielo»; el hebreo נֶשֶׁר puede referirse también a un buitre en algunos contextos.
    reason: lexical_alternative
  revision_rationale: 'Se ajustan dos puntos para mayor fidelidad al hebreo y al expediente inglés: ''en la soledad'' refleja mejor el valor amplio de בַּמִּדְבָּר que ''en el desierto'', y ''nos acecharon'' preserva mejor אָרְבוּ לָנוּ que el plural añadido ''nos tendieron emboscadas''. Se mantienen las demás decisiones, que son fieles y naturales en español.'
