translation:
  language: es
  text: 'Si digo[a]: «Olvidaré mi queja[b]; dejaré a un lado mi rostro triste[c] y me pondré alegre»,'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «si dijera». La construcción hebrea puede introducir una hipótesis con valor de discurso interno o supuesto.'
    reason: alternative_reading
  - marker: b
    text: Lit. «mi meditación» o «mi cavilación». En este lamento, «queja» expresa mejor el tono afligido del término hebreo.
    reason: lexical_alternative
  - marker: c
    text: Lit. «dejaré mi rostro y me animaré». Es un modismo hebreo para dejar de mostrar un semblante abatido e intentar verse alegre.
    reason: cultural_note
lexical_decisions:
- source_word: אִם
  english_pob_choice: If
  chosen_spanish: Si
  alternatives_spanish:
  - Cuando
  - En caso de que
  lexicon: HALOT
  rationale: Introduces a conditional or hypothetical statement; «si» conserva mejor la apertura de la proposición que una traducción más interpretativa.
- source_word: אָמְרִי
  english_pob_choice: I say
  chosen_spanish: digo
  alternatives_spanish:
  - dijera
  - diría
  lexicon: HALOT
  rationale: La forma hebrea en contexto introduce una hipótesis en primera persona; «digo» mantiene la formulación directa y natural en español dentro de la cita.
- source_word: אֶשְׁכְּחָה
  english_pob_choice: I will forget
  chosen_spanish: Olvidaré
  alternatives_spanish:
  - que olvide
  - olvidaría
  lexicon: HALOT
  rationale: El verbo expresa la intención propuesta por el hablante; el futuro simple en español reproduce bien ese valor volitivo/hypotético.
- source_word: שִׂיחִי
  english_pob_choice: my complaint
  chosen_spanish: mi queja
  alternatives_spanish:
  - mi meditación
  - mi cavilación
  - mi meditar
  lexicon: HALOT
  rationale: En el contexto de lamento de Job, el término denota el discurso interior afligido o la queja; «queja» es el equivalente más claro y fiel en español, sin perder la tonalidad de lamento.
- source_word: אֶעֶזְבָה
  english_pob_choice: I will put aside
  chosen_spanish: dejaré
  alternatives_spanish:
  - pondré a un lado
  - abandonaré
  lexicon: HALOT
  rationale: El verbo literalmente significa «dejar, abandonar»; aquí sigue el modismo con «rostro», así que «dejaré» conserva la imagen idiomática sin forzar una paráfrasis excesiva.
- source_word: פָנַי
  english_pob_choice: my sad face
  chosen_spanish: mi rostro entristecido
  alternatives_spanish:
  - mi cara triste
  - mi semblante
  lexicon: HALOT
  rationale: El hebreo dice literalmente «mi rostro»; en español, añadir «entristecido» hace explícita la función idiomática del gesto sin sustituir el sustantivo base.
- source_word: וְאַבְלִיגָה
  english_pob_choice: and be cheerful
  chosen_spanish: y me pondré alegre
  alternatives_spanish:
  - y alegraré mi semblante
  - y cobraré ánimo
  - y me animaré
  lexicon: HALOT
  rationale: El verbo sugiere aligerar la aflicción o adquirir un aspecto más luminoso; «me pondré alegre» comunica bien el cambio de disposición/semblante que el inglés auditado decidió expresar como «be cheerful».
translation_notes:
  revision_awareness: El inglés POB revisado pasó de «brighten up» a «be cheerful» y añadió «sad» con «face» para reflejar el modismo con más naturalidad. La versión española sigue esa revisión mediante «rostro entristecido» y «me pondré alegre», manteniendo el modismo y el tono de lamento sin perder claridad.
  spanish_consistency_notes:
  - Se conserva «rostro» para reflejar el hebreo פנים, con adjetivación contextual para hacer explícita la tristeza implícita en el modismo.
  - «Queja» se elige como término principal por el contexto de Job; se deja nota de alternativas de lectura interna/meditativa.
  - Se evita «SEÑOR» u otra terminología ajena porque no hay aquí léxico divino.
  - La puntuación con comillas españolas y la colocación de los marcadores [a] y [b] siguen un estilo publicable y auditable.
