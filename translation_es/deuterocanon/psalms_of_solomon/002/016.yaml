translation:
  language: es
  text: Yo te justificaré[a], oh Dios, con rectitud de corazón; porque en tus juicios está tu rectitud[b], oh Dios.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «te vindicaré»; o «te declararé justo».
    reason: lexical_alternative
  - marker: b
    text: O «justicia».
    reason: lexical_alternative
lexical_decisions:
- source_word: δικαιώσω
  english_pob_choice: justify you
  chosen_spanish: te justificaré
  alternatives_spanish:
  - te vindicaré
  - te declararé justo
  lexicon: BDAG
  rationale: El verbo griego está en futuro activo en primera persona singular y, con Dios como complemento directo, aquí conserva fuerza forense. En español, «justificaré» reproduce mejor la decisión final del POB inglés que «vindicaré», y mantiene la relación verbal con δικαιοσύνη sin suavizarla demasiado.
- source_word: ἐν εὐθύτητι καρδίας
  english_pob_choice: with uprightness of heart
  chosen_spanish: con rectitud de corazón
  alternatives_spanish:
  - con sinceridad de corazón
  - con integridad de corazón
  lexicon: LSJ
  rationale: La expresión describe el modo o la disposición interior del hablante. «Rectitud de corazón» es natural en español bíblico contemporáneo y preserva la imagen de moral recta e ինտgra del original.
- source_word: κρίμασιν
  english_pob_choice: judgments
  chosen_spanish: juicios
  alternatives_spanish:
  - decisiones judiciales
  - actos de juicio
  lexicon: BDAG
  rationale: El plural se refiere a los actos de juicio de Dios. «Juicios» es la forma más directa y comprensible en español, y mantiene el paralelo con la línea anterior.
- source_word: δικαιοσύνη
  english_pob_choice: righteousness
  chosen_spanish: justicia
  alternatives_spanish:
  - rectitud
  - justicia recta
  lexicon: BDAG
  rationale: Aunque el POB inglés conserva «righteousness», en español «justicia» expresa de forma más natural la cualidad moral y judicial de Dios en este contexto. Aquí no se pierde la tensión porque el mismo versículo ya usa «justificaré» y «juicios», reforzando el campo semántico legal.
theological_decisions:
- issue: Relación entre δικαιώσω y δικαιοσύνη aplicada a Dios
  english_pob_reading: I will justify you... for in your judgments is your righteousness
  chosen_spanish_reading: Yo te justificaré... porque en tus juicios está tu justicia
  alternative_spanish_readings:
  - Yo te vindicaré... porque en tus juicios está tu justicia
  - Yo te declararé justo... porque en tus juicios está tu justicia
  rationale: El verso presenta la tensión de afirmar algo de Dios que, en español, suena más natural como reconocimiento de su justicia que como una acción que lo haga justo. Se conserva la forma verbal «justificaré» para respetar el griego y el POB inglés, y se deja «justicia» como cualidad manifestada en sus juicios.
  doctrine_reference: Justicia divina; lenguaje forense aplicado a Dios
translation_notes:
  revision_awareness: Se siguió de cerca la revisión inglesa más reciente, que ajustó δικαιώσω a «justify you» y ἐν εὐθύτητι καρδίας a una forma más formal. La versión española refleja esa preferencia con «te justificaré» y «con rectitud de corazón», mientras que «justicia» mantiene el valor contextual de δικαιοσύνη sin forzar una traducción eclesiástica fija.
  spanish_consistency_notes:
  - Se usa «Dios» para θεός, conforme al estándar del proyecto.
  - Se evita «SEÑOR» porque el texto griego dice ὁ θεός y no κύριος.
  - Se mantiene el paralelismo del original con dos vocativos a Dios.
  - «Justificaré» se conserva como verbo forense, no como simple elogio moral.
