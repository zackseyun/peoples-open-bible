translation:
  language: es
  text: Y todo aquello en que se acueste en su impureza menstrual[a] será inmundo, y todo aquello en que se siente será inmundo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «en su menstruación». El término hebreo incluye la idea de impureza ritual asociada con la menstruación, no solo el ciclo físico.
    reason: lexical_alternative
lexical_decisions:
- source_word: נִדָּה
  english_pob_choice: menstrual impurity
  chosen_spanish: impureza menstrual
  alternatives_spanish:
  - menstruación
  - período menstrual
  - impureza
  lexicon: HALOT
  rationale: 'En este contexto levítico, נִדָּה no nombra solo el hecho biológico de la menstruación, sino el estado de impureza ritual asociado a ella. «Impureza menstrual» conserva ambos rasgos: el vínculo con la menstruación y la categoría legal de pureza/impureza.'
- source_word: תִּשְׁכַּב
  english_pob_choice: lies
  chosen_spanish: se acueste
  alternatives_spanish:
  - se tienda
  - duerma
  - se eche
  lexicon: HALOT
  rationale: El verbo hebreo describe recostarse o yacer sobre un objeto, no necesariamente dormir. «Se acueste» funciona bien en español legal y evita introducir la idea de sueño.
- source_word: תֵּשֵׁב
  english_pob_choice: sits
  chosen_spanish: se siente
  alternatives_spanish:
  - se siente sobre
  - permanezca sentada
  - se siente encima
  lexicon: HALOT
  rationale: Aquí el verbo indica sentarse sobre un objeto. «Se siente» es la forma más natural en español y conserva el paralelismo con el miembro anterior.
- source_word: עָלָיו
  english_pob_choice: on which
  chosen_spanish: sobre lo cual
  alternatives_spanish:
  - sobre el cual
  - sobre eso
  - encima de lo cual
  lexicon: HALOT
  rationale: La construcción relativa necesita en español un referente neutro para el objeto subyacente. «Sobre lo cual» mantiene la referencia espacial sin forzar un antecedente masculino o femenino.
- source_word: יִטְמָא
  english_pob_choice: shall be unclean
  chosen_spanish: será inmundo
  alternatives_spanish:
  - quedará inmundo
  - será impuro
  - contraerá impureza
  lexicon: HALOT
  rationale: En el lenguaje de pureza levítico, טמא expresa un estado ritual, no culpa moral. «Será inmundo» reproduce con claridad el valor legal del término y conserva el registro bíblico tradicional.
- source_word: וְכֹל אֲשֶׁר
  english_pob_choice: everything on which
  chosen_spanish: Y todo aquello sobre lo cual
  alternatives_spanish:
  - Y todo lo que
  - Y cualquier cosa sobre la cual
  - Y todo aquello en lo cual
  lexicon: HALOT
  rationale: La frase distributiva hebrea abarca cualquier objeto sobre el que ella se acueste o se siente. «Todo aquello sobre lo cual» preserva el alcance general y el carácter relativo de la construcción.
theological_decisions:
- issue: Impureza ritual versus inmundicia moral
  english_pob_reading: Render טמא/נִדָּה in ritual-purity terms without importing moral guilt
  chosen_spanish_reading: Traducir en términos de impureza ritual, sin sugerir pecado o culpa moral
  alternative_spanish_readings:
  - usar una formulación que sugiera suciedad moral
  - suavizarlo a una simple referencia biológica a la menstruación
  rationale: El texto pertenece al sistema de pureza de Levítico. La traducción debe conservar la categoría ritual y no convertirla en una valoración moral de la menstruación o de la mujer.
  doctrine_reference: 'Translation philosophy: original-language primacy; preserve the text''s plain sense without importing doctrinal claims the text does not make.'
translation_notes:
  revision_awareness: La revisión más reciente indicó que no se requerían cambios; el presente borrador mantiene ese alineamiento y conserva la lectura de pureza ritual del original hebreo y del POB inglés.
  spanish_consistency_notes:
  - Se mantiene «inmundo» para טמא, coherente con el léxico de pureza levítico y con la decisión inglesa de «unclean».
  - Se usa «impureza menstrual» para נִדָּה, evitando reducir el término a «menstruación» y preservando la tensión entre lo biológico y lo ritual.
  - La sintaxis con «todo aquello sobre lo cual» reproduce el alcance distributivo del hebreo sin caer en una traducción demasiado literal o antinatural.
