  glossary_alignment: No hay conflictos con la terminología base del proyecto. No aparecen Yahvé, Mesías, Cristo, δοῦλος, etc. La decisión sobre ὁ σωζόμενος está bien encaminada. La mejora propuesta se centra en idiomaticidad española y en trasladar la nota al término realmente ambiguo.
