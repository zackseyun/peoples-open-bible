translation:
  language: es
  text: Así que se acercaron al hombre que estaba al frente de la casa de José y le hablaron a la entrada de la casa[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «en la puerta de la casa».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּגְּשׁוּ
  english_pob_choice: approached
  chosen_spanish: se acercaron
  alternatives_spanish:
  - se aproximaron
  - vinieron cerca
  lexicon: HALOT / uso narrativo de נגשׁ
  rationale: El hebreo en forma narrativa expresa un movimiento hacia alguien. «Se acercaron» comunica de manera natural ese avance sin volverse arcaico, y conserva el sentido direccional del original.
- source_word: הָאִישׁ
  english_pob_choice: the man
  chosen_spanish: el hombre
  alternatives_spanish:
  - el hombre aquel
  - el varón
  lexicon: HALOT
  rationale: El texto hebreo dice simplemente «el hombre». Se conserva esa designación general, evitando introducir un oficio específico que el verso no explicita por sí mismo.
- source_word: אֲשֶׁר עַל בֵּית יוֹסֵף
  english_pob_choice: who was over Joseph’s household
  chosen_spanish: que estaba sobre la casa de José
  alternatives_spanish:
  - que estaba encargado de la casa de José
  - que estaba al frente de la casa de José
  lexicon: HALOT
  rationale: La preposición עַל indica supervisión o autoridad. «Estaba sobre la casa de José» refleja bien esa relación de gobierno o administración y sigue de cerca la construcción hebrea, mientras «casa» mantiene el matiz del establecimiento de José.
- source_word: וַיְדַבְּרוּ אֵלָיו
  english_pob_choice: and spoke to him
  chosen_spanish: y le hablaron
  alternatives_spanish:
  - y le hablaron a él
  - y le dijeron
  lexicon: HALOT
  rationale: דבר con אֶל significa hablar a alguien. «Le hablaron» es natural en español y conserva la escena de dirigirse a él, sin adelantar el contenido que aparecerá en el verso siguiente.
- source_word: פֶּתַח הַבָּיִת
  english_pob_choice: at the entrance of the house
  chosen_spanish: a la entrada de la casa
  alternatives_spanish:
  - en la puerta de la casa
  - al umbral de la casa
  lexicon: HALOT
  rationale: פֶּתַח designa una abertura, entrada o puerta. «A la entrada de la casa» es claro y fiel; mantiene el sentido espacial de hablar antes de entrar plenamente.
translation_notes:
  revision_awareness: 'El pasaje coincide plenamente con el texto hebreo base y con el audit trail inglés: no se requiere ajuste textual ni revisión doctrinal. La única variación relevante es la opción léxica de פֶּתַח, que en español admite «entrada» o «puerta/umbral»; se preservó la lectura principal y se anotó la alternativa.'
  spanish_consistency_notes:
  - Se mantuvo «José» para יוֹסֵף, conforme al nombre bíblico estándar en español.
  - Se evitó «señor» o «mayordomo» para הָאִישׁ, porque el hebreo solo dice «el hombre».
  - «Casa» se usa como equivalente de בֵּית en sentido de casa/hogar/establecimiento, sin forzar «hogar» o «palacio».
  - El orden sintáctico busca ser natural en español sin perder la secuencia narrativa del hebreo.
