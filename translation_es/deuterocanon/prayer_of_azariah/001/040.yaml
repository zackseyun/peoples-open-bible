translation:
  language: es
  text: Bendigan al Señor[a], estrellas del cielo; cántenle alabanzas y enaltrécenlo por siempre.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Señor» traduce aquí κύριον como título divino, no como un simple tratamiento de cortesía.
    reason: theological_note
lexical_decisions:
- source_word: εὐλογεῖτε
  english_pob_choice: Bless
  chosen_spanish: Bendigan
  alternatives_spanish:
  - Alaben
  - Bendiguen
  lexicon: BDAG
  rationale: El imperativo plural de εὐλογέω conserva aquí un tono litúrgico de bendición/alabanza dirigido a Dios. «Bendigan» mantiene esa fuerza ritual en español y evita reducirlo a una simple alabanza genérica.
- source_word: ἄστρα
  english_pob_choice: stars
  chosen_spanish: estrellas
  alternatives_spanish:
  - astros
  - luceros
  lexicon: LSJ
  rationale: ἄστρα nombra de forma directa a las estrellas. «Estrellas» es la correspondencia más textual y natural en español; «astros» sería más amplio de lo que el griego exige.
- source_word: τοῦ οὐρανοῦ
  english_pob_choice: of heaven
  chosen_spanish: del cielo
  alternatives_spanish:
  - de los cielos
  - del firmamento
  lexicon: LSJ
  rationale: El genitivo indica la esfera a la que pertenecen las estrellas. «Del cielo» comunica bien el registro elevado del himno en español y evita sonar forzado; la forma singular del griego puede reflejarse naturalmente así.
- source_word: τὸν κύριον
  english_pob_choice: the Lord
  chosen_spanish: el Señor
  alternatives_spanish:
  - el Maestro
  lexicon: BDAG
  rationale: La decisión inglesa entiende κύριος como título divino. En español, «el Señor» conserva esa referencia reverente y es la equivalencia litúrgica estándar, sin necesidad de introducir una paráfrasis.
- source_word: ὑμνεῖτε
  english_pob_choice: sing praise
  chosen_spanish: cántenle alabanzas
  alternatives_spanish:
  - canten un himno
  - alábenlo cantando
  lexicon: BDAG
  rationale: ὑμνεῖτε implica cantar un himno o alabanza. «Cántenle alabanzas» transmite el componente musical y doxológico de manera idiomática en español.
- source_word: ὑπερυψοῦτε
  english_pob_choice: highly exalt
  chosen_spanish: enaltrécenlo
  alternatives_spanish:
  - exáltenlo sobremanera
  - levántenlo en alto
  lexicon: LSJ
  rationale: El compuesto intensifica la idea de exaltar. «Enaltrécenlo» preserva esa elevación intensiva y mantiene un registro solemne apropiado para el canto; «sobremanera» sería más explicativo que verbal.
- source_word: εἰς τοὺς αἰῶνας
  english_pob_choice: forever
  chosen_spanish: por siempre
  alternatives_spanish:
  - para siempre
  - por los siglos
  lexicon: BDAG
  rationale: La expresión litúrgica denota perpetuidad. «Por siempre» es claro, natural y de tono doxológico; evita una literalidad pesada como «por los siglos» que puede sonar menos directa en español.
theological_decisions:
- issue: Rendering of κύριος as a divine title in a hymn
  english_pob_reading: the Lord
  chosen_spanish_reading: el Señor
  alternative_spanish_readings:
  - SEÑOR
  - el Maestro
  rationale: El griego presenta κύριον en una alabanza dirigida a Dios. La traducción «el Señor» preserva el valor de título divino sin importar la convención de máscara del nombre divino, que no corresponde imponer aquí; «el Maestro» diluiría la referencia teológica.
  doctrine_reference: 'DOCTRINE.md Contested terms: κύριος → Lord'
translation_notes:
  revision_awareness: El pasaje muestra alta concordancia entre el texto griego y el audio-trail inglés; no se requieren revisiones textuales ni alternativas manuscritas. La principal decisión auditada es mantener el tono litúrgico de imperativos plurales con vocabulario natural en español.
  spanish_consistency_notes:
  - 'Se mantuvo el imperativo plural coherente en toda la línea: «Bendigan», «cántenle», «enaltrécenlo».'
  - «del cielo» conserva el registro elevado sin volver la frase extraña en español.
  - Se eligió «el Señor» para κύριος, en línea con la lectura teológica auditada del POB, sin usar la convención tipográfica de máscara del nombre divino.
