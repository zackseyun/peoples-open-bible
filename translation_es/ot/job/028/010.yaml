  glossary_alignment: 'No hay conflictos con la terminología teológica del proyecto. Las decisiones léxicas principales son adecuadas: יְאֹרִים -> ''canales'', בִּקֵּעַ -> ''abre'', יְקָר -> ''cosa preciosa'', רָאֲתָה עֵינוֹ -> ''su ojo ve''. La única corrección importante es בַּצּוּרוֹת, que debe reflejar mejor ''through the rocks'' que ''entre las rocas''.'
