translation:
  language: es
  text: y enviaron a Jerusalén[a], a Joaquim hijo de Helcías, hijo de Salún, el sacerdote, y a los sacerdotes, y a todo el pueblo que fueron hallados con él en Jerusalén,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
