review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español sigue bien el sentido del hebreo y del POB inglés: mantiene los imperativos de lamento, la personificación «hijas de Rabbá», el cilicio, el duelo, el movimiento inquieto por la ciudad y la lectura principal «su rey» con nota para la alternativa Milcom/Malcam. Sin embargo, la nota al pie está mal anclada: el marcador [a] aparece al final de «sus oficiales» en vez de junto a «su rey», que es donde pertenece la alternativa textual/theológica. También conviene preferir «exilio» frente a «destierro» por alineación más directa con בַּגּוֹלָה y el POB inglés.'
  spanish_quality_summary: El español es claro, digno y mayormente natural. «Lamenta» funciona, aunque «gime» también sería posible; no exige cambio. «Vaguen entre las murallas» es legible y fiel. La única reparación necesaria es mover el marcador de nota al término relevante y ajustar levemente «irá al exilio» para reflejar mejor la fórmula de deportación.
  glossary_alignment: No hay conflictos con la terminología base del proyecto. No aparecen Yahvé/Mesías/etc. La decisión «su rey» con nota alternativa para «Milcom/Malcam» está bien documentada y debe preservarse, pero con anclaje correcto en «su rey[a]».
  issues:
  - severity: medium
    issue: Marcador de nota mal ubicado
    rationale: La nota explica la alternativa de מַלְכָּם («su rey» / «Milcom»), pero el marcador [a] está puesto al final de «sus oficiales», lo que induce a pensar que la variante afecta a «oficiales» y no a «su rey».
  - severity: low
    issue: «Destierro» menos alineado que «exilio»
    rationale: «Irá al destierro» es entendible, pero «irá al exilio» refleja más directamente la fórmula בַּגּוֹלָה יֵלֵךְ y mantiene mejor la alineación con el POB inglés «will go into exile».
  revised_spanish_text: Lamenta, Heshbón, porque Ai ha sido devastada. Clamen, hijas de Rabbá; vístanse de cilicio, hagan duelo y vaguen entre las murallas, porque su rey[a] irá al exilio, junto con sus sacerdotes y sus oficiales.
  revised_footnotes:
  - marker: a
    text: O «Milcom» o «Malcam», tomando el hebreo como el nombre del dios ammonita en lugar de «su rey».
    reason: alternative_reading
  revision_rationale: La revisión corrige el anclaje de la nota textual para que recaiga sobre «su rey», que es el elemento realmente discutido en hebreo (מַלְכָּם), y ajusta «destierro» a «exilio» para una correspondencia más directa con la fórmula fuente y el registro del POB. El resto del texto es fiel y natural, por lo que no requiere cambios adicionales.
