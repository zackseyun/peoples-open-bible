review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien el sentido básico del hebreo: condición al trabajar la tierra, cese de su productividad y estado de Caín como persona sin asentamiento. También conserva adecuadamente la distinción entre אֲדָמָה y אָרֶץ mediante el mismo término español con notas. Sin embargo, hay dos ajustes recomendables para mayor fidelidad e idiomaticidad: «Cuando trabajes» suena más subjuntivo-condicional de futuro que el inglés auditado y puede simplificarse a «Cuando trabajes la tierra» o mejor «Cuando trabajes el suelo/la tierra»; y sobre todo «sobre la tierra» para בָאָרֶץ suena menos natural en español bíblico contemporáneo que «en la tierra», mientras la amplitud semántica puede quedar en nota. Además, la nota a dice «Porque trabajes», formulación poco natural; debe ser «Porque trabajas» o «Porque trabajes» según reestructuración, pero lo más natural es «Porque trabajas la tierra» / «Si trabajas la tierra».'
  spanish_quality_summary: El texto es legible y digno, pero requiere pulido menor. «No volverá a darte su fuerza» es aceptable e idiomático. «Errante y fugitivo» funciona bien. El principal problema de estilo es «sobre la tierra», que en este contexto suena calcado; «en la tierra» es más natural y suficientemente fiel. En las notas, la redacción de la alternativa causal puede mejorarse para sonar español natural.
  glossary_alignment: No hay términos del glosario mayor comprometidos aquí. La elección de «tierra» para אֲדָמָה y אָרֶץ es defendible si se mantiene la distinción por contexto y nota. «Errante y fugitivo» preserva la duplicación hebrea. «Su fuerza» mantiene correctamente כֹּחָהּ sin reducirlo a mera productividad, aunque la nota puede explicar ese matiz.
  issues:
  - severity: medium
    issue: «sobre la tierra» suena poco natural para בָאָרֶץ en este contexto
    rationale: Aunque «sobre» puede sugerir deambular, en español bíblico y general «serás ... en la tierra» suena más idiomático y sigue cubriendo el sentido amplio de אָרֶץ. La nota ya puede preservar la alternativa.
  - severity: low
    issue: La nota [a] usa «Porque trabajes la tierra», formulación poco natural
    rationale: Como alternativa causal a «Cuando», el español natural pide mejor «Porque trabajas la tierra» o una reformulación equivalente. La nota debe sonar idiomática, no mecánica.
