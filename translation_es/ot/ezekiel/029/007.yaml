revisions:
- from: Cuando se apoderaron de ti por tu mano[a], fuiste aplastado, y les rompiste[b] cada hombro; y cuando se apoyaron en ti, fuiste quebrado, y pusiste inestables todos sus lomos.
  to: Cuando te agarraron por tu mano, fuiste aplastado, y les desgarraste cada hombro; y cuando se apoyaron en ti[a], fuiste quebrado, y pusiste inestables todos sus lomos[b].
  rationale: Se corrigió el anclaje de la nota sobre la alternativa «confiaron en ti» para que recaiga en «se apoyaron en ti», donde realmente corresponde. Se ajustó «les rompiste» a «les desgarraste» para reflejar mejor el sentido de בקע y la imagen de una caña que hiere al que la agarra. También se simplificó «se apoderaron de ti» a «te agarraron» para una imagen más natural y concreta en español. Se conserva «lomos» en el texto principal por fidelidad formal, con alternativa moderna en nota.
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T22:42:40Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador conserva bien la estructura temporal, el paralelismo y la metáfora física del junco: «cuando se apoyaron en ti», «cada hombro», «fuiste aplastado / fuiste quebrado». Sin embargo, hay dos fallas importantes frente a la evidencia fuente y al rastro de auditoría inglés: (1) la nota [a] está anclada en «por tu mano», pero su contenido explica una alternativa para «cuando se apoyaron en ti», por lo que el anclaje es incorrecto; (2) «les rompiste cada hombro» debilita y desplaza el matiz de וּבָקַעְתָּ + כָּל כָּתֵף, que en contexto es más bien «les abriste/rasgaste/desgarraste cada hombro».'
  spanish_quality_summary: El español es generalmente legible y digno, pero «se apoderaron de ti» suena algo más fuerte y menos concreto que el hebreo y que la imagen de agarrar una caña; «te agarraron» o «se agarraron de ti» sería más natural según la interpretación elegida. Además, «por tu mano» es comprensible pero algo rígido. La secuencia final «pusiste inestables todos sus lomos» es aceptable, aunque más natural sería «hiciste tambalear todos sus lomos» o «hiciste que todos sus lomos quedaran inestables»; no obstante, puede mantenerse con una leve mejora mínima.
  glossary_alignment: No hay conflictos con la terminología global del proyecto (no aparecen Yahvé, Mesías, etc.). Se preserva adecuadamente «lomos» para מָתְנַיִם, en línea con la decisión auditada. La metáfora física también se mantiene, pero la nota alternativa debe colocarse sobre «se apoyaron en ti», no sobre «tu mano».
  issues:
  - severity: high
    issue: La nota [a] está anclada en la frase equivocada.
    rationale: 'La nota dice «O: cuando confiaron en ti», que es alternativa de וּבְהִשָּׁעֲנָם עָלֶיךָ («cuando se apoyaron en ti»), no de בכפך («por tu mano»). Esto confunde al lector y rompe la disciplina de notas del proyecto.'
  - severity: medium
    issue: «les rompiste cada hombro» no refleja con suficiente precisión el valor de וּבָקַעְתָּ.
    rationale: בקע en este contexto de una caña astillada sugiere abrir, rajar o desgarrar, no simplemente «romper». «Desgarraste» o «abriste» conserva mejor la imaginería corporal violenta del texto fuente y del POB inglés («tore open»).
  - severity: low
    issue: «se apoderaron de ti» suena algo interpretativo y menos idiomático para la imagen concreta de agarrar.
    rationale: Aunque es defendible, en español de lectura bíblica general «te agarraron» o «se agarraron de ti» conserva mejor la imagen física inmediata del hebreo sin introducir matiz de dominación o conquista.
  revised_spanish_text: Cuando te agarraron por tu mano, fuiste aplastado, y les desgarraste cada hombro; y cuando se apoyaron en ti[a], fuiste quebrado, y pusiste inestables todos sus lomos[b].
  revised_footnotes:
  - marker: a
    text: 'O: «cuando confiaron en ti». El hebreo conserva la imagen física de «apoyarse en ti», continuando la metáfora de la caña.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «todas sus caderas».'
    reason: lexical_alternative
  revision_rationale: Se corrigió el anclaje de la nota sobre la alternativa «confiaron en ti» para que recaiga en «se apoyaron en ti», donde realmente corresponde. Se ajustó «les rompiste» a «les desgarraste» para reflejar mejor el sentido de בקע y la imagen de una caña que hiere al que la agarra. También se simplificó «se apoderaron de ti» a «te agarraron» para una imagen más natural y concreta en español. Se conserva «lomos» en el texto principal por fidelidad formal, con alternativa moderna en nota.
