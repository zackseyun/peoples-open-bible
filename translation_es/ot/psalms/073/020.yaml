translation:
  language: es
  text: Como un sueño cuando uno despierta[a], Señor, cuando te despiertes, despreciarás su imagen.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, menos probable: «en la ciudad despreciarás su imagen». Las consonantes hebreas permiten esa lectura, pero el contexto favorece claramente «cuando te despiertes» o «cuando te levantes para actuar».'
    reason: alternative_reading
lexical_decisions:
- source_word: כַּחֲלוֹם
  english_pob_choice: Like a dream
  chosen_spanish: Como un sueño
  alternatives_spanish:
  - Tal como un sueño
  lexicon: HALOT
  rationale: La comparación marcada por כ se expresa naturalmente con «como»; «sueño» conserva el sustantivo común y la imagen poética del hebreo.
- source_word: מֵהָקִיץ
  english_pob_choice: when one awakes
  chosen_spanish: cuando uno despierta
  alternatives_spanish:
  - al despertar
  - cuando despierta
  lexicon: HALOT
  rationale: El valor temporal del prefijo con el verbo de despertar se refleja bien con una cláusula temporal en español; «cuando uno despierta» mantiene la comparación de un sueño que desaparece al despertar.
- source_word: אֲדֹנָי
  english_pob_choice: Lord
  chosen_spanish: Señor
  alternatives_spanish:
  - Oh Señor
  - mi Señor
  lexicon: HALOT
  rationale: Como título divino, se traduce con el equivalente reverente «Señor» en español, sin convertirlo en una paráfrasis afectiva o posesiva.
- source_word: בָּעִיר
  english_pob_choice: when you rouse yourself
  chosen_spanish: cuando te despierte(s)
  alternatives_spanish:
  - cuando te rousas
  - cuando te levantas
  lexicon: HALOT
  rationale: Se sigue la lectura verbal contextual de עור/יקץ (‘despertar, rouse yourself’), que encaja con el paralelismo del versículo. En español, «te despierte(s)» conserva la idea de ponerse en acción/despertar; el paréntesis refleja la tensión formal del hebreo sin resolverla de manera excesiva.
- source_word: צַלְמָם
  english_pob_choice: their image
  chosen_spanish: su imagen
  alternatives_spanish:
  - su forma
  - su apariencia
  lexicon: HALOT
  rationale: צֶלֶם suele significar «imagen, forma, figura»; «imagen» preserva el enlace léxico y la fuerza poética del término.
- source_word: תִּבְזֶה
  english_pob_choice: you will despise
  chosen_spanish: despreciarás
  alternatives_spanish:
  - despreciarás con rechazo
  - tendrás en desprecio
  lexicon: HALOT
  rationale: El imperfecto se vierte naturalmente en futuro en este contexto; «despreciarás» reproduce con claridad el valor de בזה como ‘despreciar, tener en poco’.
theological_decisions:
- issue: Lectura de בָּעִיר
  english_pob_reading: 'verbal: ''when you arise/rouse yourself'''
  chosen_spanish_reading: 'verbal: ''cuando te despierte(s)'''
  alternative_spanish_readings:
  - 'locativa: ''en la ciudad'''
  rationale: La comparación con el sueño al despertar favorece con fuerza una lectura verbal y no la de un sustantivo locativo. La traducción española mantiene la tensión textual y sigue la lectura contextual más sólida sin introducir la opción 'ciudad' en el texto principal.
  doctrine_reference: Prioridad del sentido contextual del hebreo frente a la tradición de lectura; conservar la tensión textual documentada.
translation_notes:
  revision_awareness: 'Se corrigió el problema anterior de anclaje de nota: solo se incluye la nota [a], y el marcador aparece exactamente en el texto español. Se evitó cualquier nota sin ancla. La redacción sigue el audit trail inglés y la revisión que prefirió ''rouse yourself'' frente a ''arise''.'
  spanish_consistency_notes:
  - Se mantuvo «Señor» para אֲדֹנָי como título divino.
  - Se preservó «imagen» para צֶלֶם, evitando sustituirlo por términos más interpretativos.
  - Se eligió una cláusula temporal en español para reflejar el valor contextual de מֵהָקִיץ.
  - La forma entre paréntesis en «despierte(s)» intenta respetar la tensión del hebreo sin convertirla en una explicación excesiva.
