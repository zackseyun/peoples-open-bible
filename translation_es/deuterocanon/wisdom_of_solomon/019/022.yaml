translation:
  language: es
  text: Porque en toda manera[a], Señor, engrandeciste a tu pueblo y lo glorificaste, y no los pasaste por alto, estando junto a ellos en todo tiempo y lugar.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «no los descuidaste»; el griego dice literalmente «no los pasaste por alto», seguido de «estando junto a [ellos]».
    reason: lexical_alternative
lexical_decisions:
- source_word: Κατὰ πάντα
  english_pob_choice: in every way
  chosen_spanish: en todo
  alternatives_spanish:
  - de todas maneras
  - en todos los sentidos
  lexicon: LSJ
  rationale: La expresión con κατά + acusativo plural comunica totalidad o alcance completo. «En todo» mantiene la comprehensividad de forma natural en español y evita una expansión innecesaria.
- source_word: ἐμεγάλυνας
  english_pob_choice: magnified
  chosen_spanish: engrandeciste
  alternatives_spanish:
  - magnificaste
  - hiciste grande
  lexicon: LSJ
  rationale: El verbo significa hacer grande / engrandecer. «Engrandeciste» conserva el sentido y suena más natural en español bíblico actual que un calco más pesado.
- source_word: τὸν λαόν σου
  english_pob_choice: your people
  chosen_spanish: tu pueblo
  alternatives_spanish:
  - tu nación
  - tu gente
  lexicon: LSJ
  rationale: λαός en contexto bíblico designa al pueblo pactal. «Tu pueblo» es la equivalencia más fiel y reconocible en español.
- source_word: ἐδόξασας
  english_pob_choice: glorified
  chosen_spanish: glorificaste
  alternatives_spanish:
  - honraste
  - diste gloria a
  lexicon: LSJ
  rationale: El verbo está ligado a δόξα y conserva fuerza de honor/gloria. «Glorificaste» mantiene esa densidad mejor que «honraste».
- source_word: οὐχ ὑπερεῖδες
  english_pob_choice: you did not overlook
  chosen_spanish: no los pasaste por alto
  alternatives_spanish:
  - no los olvidaste
  - no los descuidaste
  - no los despreciaste
  lexicon: LSJ
  rationale: El sentido básico es no pasar por alto / no ignorar. En español, «no los pasaste por alto» comunica esa idea con claridad y permite la continuidad con el participio siguiente.
- source_word: παριστάμενος
  english_pob_choice: standing by them
  chosen_spanish: estando junto a ellos
  alternatives_spanish:
  - estando presente
  - estando a su lado
  - acompañándolos
  lexicon: LSJ
  rationale: El participio significa literalmente estar al lado / presente. «Estando junto a ellos» conserva la imagen espacial y la presencia auxiliadora sin añadir matices ajenos.
- source_word: ἐν παντὶ καιρῷ καὶ τόπῳ
  english_pob_choice: at every time and place
  chosen_spanish: en todo tiempo y lugar
  alternatives_spanish:
  - en cada tiempo y lugar
  - a toda hora y en todo lugar
  lexicon: LSJ
  rationale: La frase expresa alcance temporal y espacial total. «En todo tiempo y lugar» es una formulación idiomática, precisa y ampliamente comprensible.
theological_decisions:
- issue: Tratamiento de κύριε en vocativo dirigido a Dios
  english_pob_reading: Lord
  chosen_spanish_reading: Señor
  alternative_spanish_readings:
  - Oh Señor
  rationale: El vocativo griego se dirige a Dios. En español, «Señor» transmite reverencia de manera natural y no requiere el añadido «Oh» para ser fiel al llamado directo.
  doctrine_reference: 'DOCTRINE.md: κύριος → Lord / señor; Translation philosophy §6'
- issue: Objeto implícito con παριστάμενος
  english_pob_reading: standing by them
  chosen_spanish_reading: estando junto a ellos
  alternative_spanish_readings:
  - estando junto a tu pueblo
  - acompañándolos
  rationale: El participio carece de objeto explícito, pero el contexto remite a tu pueblo. Añadir «a ellos» sigue el sentido contextual sin introducir una interpretación doctrinal nueva.
  doctrine_reference: 'DOCTRINE.md: Translation philosophy §1, §6'
- issue: Intensidad de οὐχ ὑπερεῖδες frente a alternativas más fuertes
  english_pob_reading: you did not overlook
  chosen_spanish_reading: no los pasaste por alto
  alternative_spanish_readings:
  - no los descuidaste
  - no los ignoraste
  rationale: La elección evita debilitar el verbo a «ignorar» y conserva la idea de vigilancia cuidadosa. La frase también se integra bien con «estando junto a ellos».
  doctrine_reference: 'DOCTRINE.md: lexical precision and preservation of tension'
translation_notes:
  revision_awareness: El texto griego recibido coincide con el override de traducción adjudicado y no requiere enmiendas adicionales; se mantuvo la tensión entre «no los pasaste por alto» y el participio «estando junto a ellos», tal como refleja la auditoría inglesa.
  spanish_consistency_notes:
  - Se usó «Yahvé» para el nombre divino solo cuando aparece el Tetragrámaton; aquí el vocativo es κύριε, por lo que corresponde «Señor».
  - Se mantuvo un registro bíblico moderno y digno, evitando arcaísmos innecesarios.
  - «Tu pueblo» conserva el sentido pactal de λαός.
  - La nota [a] está anclada al segmento «en todo» para reflejar la alternativa del matiz de cobertura total.
