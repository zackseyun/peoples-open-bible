translation:
  language: es
  text: 'Jefté dijo a los ancianos de Galaad: «Si ustedes me hacen volver para combatir contra los amonitas, y Yahvé los entrega ante mí, yo seré su cabeza[a]»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «líder» o «jefe» para «cabeza».
    reason: lexical_alternative
lexical_decisions:
- source_word: מְשִׁיבִים
  english_pob_choice: bring me back
  chosen_spanish: me hacen volver
  alternatives_spanish:
  - me devuelven
  - me restauran
  lexicon: HALOT
  rationale: El hifil de שוב expresa hacer volver a alguien. En español, «me hacen volver» conserva bien la idea causativa y suena natural en el diálogo.
- source_word: לְהִלָּחֵם
  english_pob_choice: to fight
  chosen_spanish: para combatir
  alternatives_spanish:
  - para pelear
  - para hacer guerra
  lexicon: HALOT
  rationale: El infinitivo indica entrar en combate. «Combatir» mantiene el matiz militar y evita una paráfrasis demasiado libre.
- source_word: בִּבְנֵי עַמּוֹן
  english_pob_choice: against the Ammonites
  chosen_spanish: contra los amonitas
  alternatives_spanish:
  - contra los hijos de Amón
  - contra el pueblo de Amón
  lexicon: HALOT
  rationale: «Amonitas» es el etnónimo natural en español y expresa el adversativo de ב en este contexto bélico.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  lexicon: HALOT
  rationale: La política del proyecto pide traducir el Tetragrámaton como «Yahvé», preservando el nombre divino personal en vez de sustituirlo por un título.
- source_word: וְנָתַן יְהוָה אוֹתָם לְפָנַי
  english_pob_choice: and Yahweh gives them before me
  chosen_spanish: y Yahvé los pone delante de mí
  alternatives_spanish:
  - y Yahvé los entrega delante de mí
  - y Yahvé los pone ante mí
  lexicon: HALOT
  rationale: נתן + לפני es literalmente «dar/poner delante». «Los pone delante de mí» conserva la imagen sin introducir «mano» u otro elemento que no aparece en el hebreo.
- source_word: לְרֹאשׁ
  english_pob_choice: head
  chosen_spanish: jefe
  alternatives_spanish:
  - cabeza
  - líder
  - caudillo
  lexicon: HALOT
  rationale: «Cabeza» preserva el hebreo de forma más literal, pero en español puede sonar extraño para una función política. «Jefe» comunica el sentido con dignidad y sin forzar el registro.
- source_word: אָנֹכִי אֶהְיֶה לָכֶם לְרֹאשׁ
  english_pob_choice: I will be your head
  chosen_spanish: yo seré para ustedes jefe
  alternatives_spanish:
  - yo seré su jefe
  - yo seré para ustedes cabeza
  lexicon: HALOT
  rationale: El hebreo es una afirmación de estatus, no una pregunta. En español, «seré para ustedes jefe» reproduce mejor esa fuerza declarativa que una formulación interrogativa.
theological_decisions:
- issue: Representación del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Jehová
  rationale: Se sigue la norma del proyecto de usar el nombre divino transliterado en vez de la sustitución tradicional «SEÑOR».
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Fuerza de la cláusula final אָנֹכִי אֶהְיֶה לָכֶם לְרֹאשׁ
  english_pob_reading: 'a statement: ''I will be your head'''
  chosen_spanish_reading: 'una afirmación: «yo seré para ustedes jefe»'
  alternative_spanish_readings:
  - «¿seré para ustedes jefe?»
  - «yo seré su jefe»
  rationale: Aunque el contexto es negociador, el hebreo presenta una cláusula declarativa. Por fidelidad al texto, se evita convertirla en pregunta en la traducción principal.
  doctrine_reference: Cruce de sintaxis y discurso en el hebreo de Jueces 11:9
translation_notes:
  revision_awareness: 'El inglés POB pasó por una revisión importante en la cláusula final: primero se había entendido como pregunta, pero la revisión posterior la corrigió a una afirmación conforme al hebreo. La presente versión española sigue esa decisión revisada y también mantiene la política del proyecto para el nombre divino como «Yahvé».'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» para יְהוָה, conforme al estándar del proyecto.
  - Se prefirió «amonitas» como etnónimo natural en español.
  - Se evitó «SEÑOR» y «Cristo», no pertinentes en este versículo.
  - «Jefe» conserva la metáfora de רֹאשׁ sin perder inteligibilidad en español.
