translation:
  text: Jesus said to you, “I will choose you, one out of a thousand and two out of
    ten thousand, a single one; they will stand, and they will stand as a single one.”
  philosophy: formal
  drafter_model: gemini-3.1-pro-preview
  drafter_label: gemini_3_1_pro_thomas_redraft
  drafted_at: '2026-04-22T10:39:15Z'
  footnotes:
  - marker: you
    text: The Coptic uses the form ⲧⲏⲛⲉ, a Lycopolitan/regional variant of the standard
      Sahidic second-person plural pronoun ⲧⲏⲩⲧⲛ.
    reason: dialect_note
  - marker: they will stand
    text: The text shifts abruptly from the second person ('I will choose you') to
      the third person ('they will stand'). This grammatical shift is present in the
      Coptic and has been preserved.
    reason: textual_variant
  - marker: a single one
    text: Coptic ⲟⲩⲁ ⲟⲩⲱⲧ. A key theological concept in Thomas, referring to the spiritual
      integration of duality into unity.
    reason: theological_note
lexical_decisions:
- source_word: ⲥⲉⲧⲡ
  chosen: choose
  rationale: The verb ⲥⲱⲧⲡ (here in its pre-pronominal form ⲥⲉⲧⲡ-) means 'to choose'
    or 'elect'.
  lexicon: Crum 365a
  alternatives:
  - elect
  - select
- source_word: ϣⲟ
  chosen: thousand
  rationale: Standard Coptic numeral for 1,000.
  lexicon: Crum 546b
- source_word: ⲧⲃⲁ
  chosen: ten thousand
  rationale: Standard Coptic numeral for 10,000 (myriad).
  lexicon: Crum 398b
  alternatives:
  - myriad
- source_word: ⲱϩⲉ ⲉⲣⲁⲧⲟⲩ
  chosen: stand
  rationale: The compound verb ⲱϩⲉ ⲉⲣⲁⲧ= means 'to stand on one's feet' or simply
    'to stand'.
  lexicon: Crum 534a
- source_word: ⲉⲩⲟ
  chosen: as
  rationale: Circumstantial present of the qualitative ⲟ (from ⲉⲓⲣⲉ), literally 'they
    being'. Rendered 'as' for natural English flow while preserving the attributive
    state.
  lexicon: Crum 83a
  alternatives:
  - being
- source_word: ⲟⲩⲁ ⲟⲩⲱⲧ
  chosen: a single one
  rationale: A recurring Thomasine phrase denoting absolute unity or integration.
    It is translated literally to preserve its theological weight.
  lexicon: Crum 492b
  alternatives:
  - one and the same
  - united
theological_decisions:
- issue: Translation of ⲟⲩⲁ ⲟⲩⲱⲧ
  chosen_reading: a single one
  rationale: The concept of becoming 'one' or 'single' is central to Thomasine theology,
    distinct from but related to the Greek loanword 'monachos' (solitary). Paraphrasing
    this as 'united' or 'together' would obscure the specific terminology of the text.
  alternatives_noted:
  - united
  - one
drafter_notes: The translation preserves the abrupt grammatical shift from second
  person ('choose you') to third person ('they will stand') found in the Coptic text.
  The phrase 'a single one' (ⲟⲩⲁ ⲟⲩⲱⲧ) is maintained literally, as it represents a
  core Thomasine theological motif of overcoming division.
