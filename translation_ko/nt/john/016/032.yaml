  text: Behold[a], an hour is coming, and has come, when you will be scattered, each to his own, and will leave me alone. Yet I am not alone, because the Father is with me.
  footnotes:
  - marker: a
    text: Or 'each to his own home/place/things.' The Greek is broader than a specific location and can refer generally to what belongs to each one.
    reason: lexical_alternative
translation:
  language: ko
  text: 보십시오, 때가 오는데, 이미 왔습니다. 그때에 여러분은 각자 자기 곳으로 흩어지고, 나를 혼자 두고 갈 것입니다. 그러나 나는 혼자가 아닙니다. 아버지께서 나와 함께 계시기 때문입니다.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 또는 「각자 자기 집/자리/것들로」. 헬라어는 특정 장소보다 더 넓은 의미로, 각 사람에게 속한 것을 가리킬 수 있다.
    reason: lexical_alternative
