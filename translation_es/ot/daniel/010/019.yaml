translation:
  language: es
  text: 'Y dijo[a]: «No temas, hombre muy amado; paz sea contigo. Sé fuerte, sí, sé fuerte». Y cuando habló conmigo, fui fortalecido, y dije: «Hable mi señor, porque me has fortalecido».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «hombre muy estimado» o «hombre muy deseado». La expresión hebrea literalmente dice «hombre de deseos/preciosidades», un modismo de especial favor.
    reason: lexical_alternative
lexical_decisions:
- source_word: אִישׁ חֲמֻדוֹת
  english_pob_choice: man greatly beloved
  chosen_spanish: hombre muy amado
  alternatives_spanish:
  - hombre muy favorecido
  - hombre muy deseado
  - hombre de preciosidades
  lexicon: HALOT
  rationale: La expresión hebrea es idiomática y combina «hombre» con un sustantivo plural de deseabilidad/preciousness. «Muy amado» conserva el sentido de favor personal y evita una traducción demasiado mecánica. Mantengo «hombre» por la referencia masculina explícita a Daniel.
- source_word: שָׁלוֹם לָךְ
  english_pob_choice: peace be to you
  chosen_spanish: paz a ti
  alternatives_spanish:
  - paz sea contigo
  - que haya paz para ti
  - paz para ti
  lexicon: HALOT
  rationale: Aquí שָׁלוֹם funciona como fórmula benedictiva. «Paz a ti» conserva la brevedad y el valor de saludo/bendición en un español natural y digno.
- source_word: חֲזַק וַחֲזָק
  english_pob_choice: Be strong, yes, be strong
  chosen_spanish: Esfuérzate, sí, esfuérzate
  alternatives_spanish:
  - Sé fuerte, sí, sé fuerte
  - Fortalécete, sí, fortalécete
  - Ten ánimo, sí, ten ánimo
  lexicon: HALOT
  rationale: La repetición intensifica el imperativo. «Esfuérzate» comunica con naturalidad la exhortación a cobrar firmeza, y la repetición con «sí» reproduce el énfasis retórico sin sonar forzado en español.
- source_word: וּבְדַבְּרוֹ עִמִּי
  english_pob_choice: when he spoke with me
  chosen_spanish: mientras hablaba conmigo
  alternatives_spanish:
  - cuando habló conmigo
  - al hablar conmigo
  - mientras me hablaba
  lexicon: HALOT
  rationale: La construcción temporal hebrea se vierte bien con una cláusula de simultaneidad. «Mientras hablaba conmigo» fluye con el relato y mantiene la relación temporal con lo que sigue.
- source_word: הִתְחַזַּקְתִּי
  english_pob_choice: I was strengthened
  chosen_spanish: quedé fortalecido
  alternatives_spanish:
  - me fortalecí
  - fui fortalecido
  - cobré fuerzas
  lexicon: HALOT
  rationale: El hitpael expresa el ingreso en un estado de fortalecimiento. «Quedé fortalecido» conserva el resultado pasivo/reflexivo sin perder la conexión léxica con חזק que recorre el versículo.
- source_word: יְדַבֵּר אֲדֹנִי
  english_pob_choice: Let my lord speak
  chosen_spanish: Hable mi señor
  alternatives_spanish:
  - Que hable mi señor
  - Puede hablar mi señor
  - Diga mi señor
  lexicon: HALOT
  rationale: El imperfecto tiene valor de ruego cortés. «Hable mi señor» preserva esa fuerza jussiva en un español sobrio. Se usa «mi señor» como tratamiento respetuoso al interlocutor, no como referencia al Nombre divino.
- source_word: כִּי חִזַּקְתָּנִי
  english_pob_choice: for you have strengthened me
  chosen_spanish: porque tú me has fortalecido
  alternatives_spanish:
  - porque me has hecho fuerte
  - pues me has fortalecido
  - ya que me has fortalecido
  lexicon: HALOT
  rationale: «Fortalecido» mantiene el vínculo verbal con las demás ocurrencias de חזק en el versículo y expresa la causa de la disposición de Daniel para hablar.
theological_decisions:
- issue: Tratamiento de אֲדֹנִי en la boca de Daniel al dirigirse al mensajero
  english_pob_reading: my lord
  chosen_spanish_reading: mi señor
  alternative_spanish_readings:
  - Señor
  - mi maestro
  rationale: El contexto muestra un tratamiento respetuoso hacia el interlocutor, no una designación del Tetragrámaton. «Mi señor» preserva la cortesía y evita cargar el término con una identificación teológica no requerida por el pasaje.
  doctrine_reference: Translation philosophy §1, §3
translation_notes:
  revision_awareness: 'La redacción sigue el consenso del auditor inglés: mantiene la intensidad de חזק con una repetición enfática, conserva el valor benedictivo de שָׁלוֹם, y traduce el tratamiento אֲדֹנִי como cortesía humana. No se introdujeron cambios textuales ni variantes relevantes adicionales.'
  spanish_consistency_notes:
  - Se preserva el pronombre de segunda persona singular en todo el versículo para corresponder al hebreo.
  - «Yahvé» no aparece porque el texto no contiene el Tetragrámaton ni una cita directa de él.
  - Se mantuvo la repetición de la raíz de fortaleza en tres puntos del versículo para reflejar la cohesión léxica del hebreo.
