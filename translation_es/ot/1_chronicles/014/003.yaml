translation:
  language: es
  text: Y David tomó[a] más esposas en Jerusalén, y David engendró más hijos e hijas.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'se casó con más mujeres'; el hebreo literalmente dice 'tomó más esposas'.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּקַּח
  english_pob_choice: took
  chosen_spanish: tomó
  alternatives_spanish:
  - se casó con
  - tomó para sí
  lexicon: HALOT
  rationale: לקח significa literalmente 'tomar'. En este contexto de adquirir esposas, 'tomó' conserva la relación con el texto hebreo sin convertir el verbo en una formulación más interpretativa como 'se casó con'.
- source_word: נָשִׁים
  english_pob_choice: wives
  chosen_spanish: mujeres
  alternatives_spanish:
  - esposas
  - mujeres casadas
  lexicon: HALOT
  rationale: El hebreo puede significar 'mujeres' o 'esposas'. Siguiendo el texto fuente de manera transparente, 'mujeres' mantiene la literalidad básica y deja que el contexto matrimonial haga la precisión; en español, 'esposas' sería más explicativo pero menos cercano a la forma hebrea.
- source_word: בִּירוּשָׁלִָם
  english_pob_choice: in Jerusalem
  chosen_spanish: en Jerusalén
  alternatives_spanish:
  - en la ciudad de Jerusalén
  lexicon: HALOT
  rationale: La preposición ב indica ubicación sencilla, por lo que 'en Jerusalén' es directo y natural.
- source_word: וַיּוֹלֶד
  english_pob_choice: fathered
  chosen_spanish: engendró
  alternatives_spanish:
  - fue padre de
  - tuvo
  lexicon: HALOT
  rationale: El verbo ילד con sujeto masculino expresa que llegó a ser padre de descendencia. 'Engendró' preserva esa fuerza genealógica mejor que 'tuvo', que sería más vago, aunque es un término más formal que 'fue padre de'.
- source_word: בָּנִים וּבָנוֹת
  english_pob_choice: sons and daughters
  chosen_spanish: hijos e hijas
  alternatives_spanish:
  - hijos y hijas
  - varones y mujeres
  lexicon: HALOT
  rationale: El hebreo nombra explícitamente ambos sexos. En español, 'hijos e hijas' es la formulación más natural y a la vez mantiene esa especificidad.
- source_word: דָּוִיד
  english_pob_choice: David
  chosen_spanish: David
  alternatives_spanish:
  - —
  lexicon: nombre propio estándar
  rationale: Transliteración habitual del nombre propio.
theological_decisions:
- issue: Descripción de la poligamia de David sin juicio explícito
  english_pob_reading: Render the verse descriptively without moral qualification.
  chosen_spanish_reading: Traducir de manera descriptiva, sin añadir aprobación ni desaprobación moral.
  alternative_spanish_readings:
  - Añadir una nota valorativa sobre la práctica
  - Suavizar el hecho con un verbo más eufemístico
  rationale: El versículo informa que David tomó más mujeres y tuvo más hijos e hijas, pero no comenta la moralidad del acto. La traducción mantiene esa sobriedad narrativa y no introduce una evaluación que no está en el texto.
  doctrine_reference: Translation philosophy §1, §3
translation_notes:
  revision_awareness: El texto inglés auditado ya fue revisado y se mantuvo sin cambios; la versión española sigue esa lectura estable, conservando la literalidad controlada de ‘tomó’ y la especificidad de ‘hijos e hijas’.
  spanish_consistency_notes:
  - Se mantiene 'David' como nombre propio estándar.
  - Se conserva un tono narrativo sobrio, sin moralizar el hecho reportado.
  - La nota al pie preserva la alternativa matrimonial explícita que el inglés documenta.
