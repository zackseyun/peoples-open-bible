translation:
  language: es
  text: Porque ciertamente hay un futuro[a], y tu esperanza no será truncada.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «un fin», «un resultado» o «un desenlace». El hebreo אַחֲרִית puede denotar fin, último estado, resultado o futuro. Aquí se traduce «un futuro» porque el contexto expresa una expectativa positiva.
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי אִם
  english_pob_choice: For surely
  chosen_spanish: Porque ciertamente
  alternatives_spanish:
  - Ciertamente
  - Porque en verdad
  - Pues ciertamente
  lexicon: HALOT
  rationale: La expresión introduce aquí una afirmación enfática, no una condición simple. «Porque ciertamente» conserva el enlace con el versículo anterior y el matiz de seguridad sin volverlo pesado en español.
- source_word: יֵשׁ
  english_pob_choice: there is
  chosen_spanish: hay
  alternatives_spanish:
  - existe
  - hay ciertamente
  lexicon: HALOT
  rationale: El verbo existencial se expresa de manera natural con «hay» en español moderno, manteniendo la sencillez del hebreo.
- source_word: אַחֲרִית
  english_pob_choice: a future
  chosen_spanish: un futuro
  alternatives_spanish:
  - un fin
  - un resultado
  - un desenlace
  - un porvenir
  lexicon: HALOT
  rationale: «אַחֲרִית» puede significar fin, resultado, desenlace o futuro. En este contexto sapiencial de esperanza, «un futuro» comunica mejor la expectativa positiva que la frase sugiere, sin perder la amplitud semántica que la nota conserva.
- source_word: וְתִקְוָתְךָ
  english_pob_choice: and your hope
  chosen_spanish: y tu esperanza
  alternatives_spanish:
  - y tu expectativa
  - y tu perspectiva
  - y tu esperanza confiada
  lexicon: HALOT
  rationale: «תִקְוָה» corresponde de forma natural a «esperanza» en español, y aquí mantiene la resonancia de expectativa confiada que el contexto requiere.
- source_word: לֹא תִכָּרֵת
  english_pob_choice: will not be cut off
  chosen_spanish: no será cortada
  alternatives_spanish:
  - no será extinguida
  - no será quitada
  - no desaparecerá
  - no será destruida
  lexicon: HALOT
  rationale: Se conserva la imagen verbal de «cortar» para reflejar la metáfora hebrea de manera transparente. «No será cortada» resulta idiomático en español y mantiene la fuerza del pasivo.
translation_notes:
  revision_awareness: El texto sigue de cerca el sentido del hebreo masorético y la decisión inglesa auditada de leer אַחֲרִית como «future» en contexto de promesa. No se introdujeron cambios de contenido respecto del contexto fuente; se ajustó únicamente a una formulación española natural y publicable.
  spanish_consistency_notes:
  - Se mantuvo el registro sobrio y sapiencial.
  - Se conservó la metáfora de «cortar» para לֹא תִכָּרֵת, evitando una paráfrasis interpretativa.
  - Se usó «esperanza» en lugar de «expectativa» por ser la equivalencia más natural y teológicamente resonante en español.
  - El marcador de nota a aparece solo en el término que requiere alternativa lexical.
