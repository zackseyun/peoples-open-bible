translation:
  language: es
  text: 'No volverá a decirse de ti: «Abandonada», ni de tu tierra: «Desolada»; sino que se te llamará «Mi deleite está en ella»[a] y a tu tierra: «Casada»[b]; porque Yahvé se deleita en ti, y tu tierra será desposada.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: Hephzibá, que significa «Mi deleite está en ella».'
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: Beulá, que significa «Casada» o «Desposada».'
    reason: lexical_alternative
lexical_decisions:
- source_word: עֲזוּבָה
  english_pob_choice: Forsaken
  chosen_spanish: Abandonada
  alternatives_spanish:
  - Desamparada
  - Desierta
  lexicon: HALOT
  rationale: En el verso funciona como nombre/título de renombramiento; «Abandonada» conserva el valor pasivo de haber sido dejada, sin añadir matices pastorales que «desamparada» puede sugerir ni confundirse con el campo geográfico de «desierta».
- source_word: שְׁמָמָה
  english_pob_choice: Desolate
  chosen_spanish: Desolada
  alternatives_spanish:
  - Desolación
  - Yermo
  lexicon: HALOT
  rationale: Aquí también opera como apelativo de renombramiento para la tierra. «Desolada» mantiene el paralelismo con el inglés POB y la forma adjetival del hebreo; «desolación» sería más abstracto, y «yermo» sonaría menos natural en este contexto nominativo.
- source_word: חֶפְצִי בָהּ
  english_pob_choice: My Delight Is in Her
  chosen_spanish: Mi deleite está en ella
  alternatives_spanish:
  - Hephzibá
  - Mi placer está en ella
  lexicon: HALOT
  rationale: El hebreo es un nombre significativo, no solo una transliteración. Traducirlo preserva el sentido declarativo del nuevo nombre y su relación con חָפֵץ; «deleite» reproduce bien la fuerza semántica de la raíz y su registro digno.
- source_word: בְּעוּלָה
  english_pob_choice: Married
  chosen_spanish: Casada
  alternatives_spanish:
  - Desposada
  - Esposa
  lexicon: HALOT
  rationale: La forma denota estar unida a un esposo, y en la línea de renombramiento conviene una palabra breve y natural. «Casada» comunica con claridad el estado marital; «desposada» puede sonar más literaria, pero es menos directa.
- source_word: חָפֵץ
  english_pob_choice: delights in
  chosen_spanish: se deleita en
  alternatives_spanish:
  - se complace en
  - tiene agrado en
  lexicon: HALOT
  rationale: La forma verbal explica el nombre «Mi deleite está en ella». «Se deleita en» conserva el vínculo léxico con חֶפְצִי y mantiene una expresión idiomática y solemne en español.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: Se sigue el criterio doctrinal del proyecto para el nombre divino. «Yahvé» representa directamente יהוה y evita el reemplazo tradicional por una convención tipográfica; «SEÑOR» ocultaría el nombre propio.
- source_word: תִּבָּעֵל
  english_pob_choice: will be married
  chosen_spanish: será desposada
  alternatives_spanish:
  - será casada
  - será tomada por esposo
  lexicon: HALOT
  rationale: El nifal de בעל aquí mantiene la metáfora matrimonial. «Será desposada» conserva la pasiva y el tono poético; además, armoniza con el sustantivo «Casada» sin volver sexualizada la imagen.
- source_word: לָךְ / אַרצך
  english_pob_choice: you / your land
  chosen_spanish: de ti / tu tierra
  alternatives_spanish:
  - a ti / tu país
  - de ti / tu país
  lexicon: HALOT
  rationale: El hebreo distingue entre la mujer personificada (Sion) y la tierra. En español, «de ti» y «tu tierra» mantienen el paralelismo y la referencia doble sin diluir la personificación.
theological_decisions:
- issue: Renombramientos declarativos como parte de la restauración de Sion
  english_pob_reading: Translate the names as meaningful renamings in the main text
  chosen_spanish_reading: 'Traducir los nombres como apelativos declarativos: «Abandonada», «Desolada», «Mi deleite está en ella», «Casada»'
  alternative_spanish_readings:
  - Usar transliteraciones tradicionales como Hephzibá y Beulá
  - Parafrasear como simples frases de restauración
  rationale: El hebreo presenta nombres con sentido que funcionan retóricamente como proclamaciones de nueva identidad. Traducirlos en el texto principal preserva la fuerza semántica y la estructura poética; las formas tradicionales pueden conservarse solo como alternativas culturales, no como sustituto principal.
  doctrine_reference: Principio de transparencia del POB; prioridad del sentido original sobre la tradición de transliteración
- issue: Metáfora matrimonial aplicada a la tierra
  english_pob_reading: Retain the marriage imagery directly
  chosen_spanish_reading: 'Mantener directamente el lenguaje matrimonial: «Casada» y «será desposada»'
  alternative_spanish_readings:
  - Suavizarlo a una imagen general de restauración
  - Traducirlo como mera posesión territorial
  rationale: El hebreo usa deliberadamente imagen matrimonial para la tierra y para el nuevo nombre. Conservarla evita aplanar la tensión teológica entre restauración, pertenencia y alianza, y respeta el paralelismo del verso.
  doctrine_reference: Principio de preservar la tensión teológica en lugar de resolverla
- issue: Nombre divino יהוה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Jehová
  rationale: La elección mantiene visible el nombre divino en lugar de ocultarlo con una convención litúrgica. «Yahvé» es la forma del proyecto para representar יהוה de modo directo y auditable.
  doctrine_reference: Convención terminológica del proyecto para יהוה
translation_notes:
  revision_awareness: 'El borrador sigue el audit trail inglés actualizado: mantiene la traducción semántica de los nombres en el texto principal, conserva el paralelismo entre la persona personificada y su tierra, y refleja la revisión que sustituyó «the LORD» por el nombre divino directo. La solución española ajusta el inglés POB a un registro natural y fiel, sin desactivar la metáfora matrimonial ni la identidad renovada del versículo.'
  spanish_consistency_notes:
  - Se usa «Yahvé» para יהוה, conforme al estándar del proyecto.
  - Se traduce חֶפְצִי בָהּ como nombre significativo en el texto principal, con nota para la transliteración tradicional.
  - «Casada» y «será desposada» mantienen la metáfora matrimonial sin suavizarla.
  - La segunda persona femenina singular y el posesivo «tu tierra» preservan la personificación de Sion en el hebreo.
