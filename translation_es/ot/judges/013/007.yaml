translation:
  language: es
  text: 'Porque me dijo[a]: «Mira, concebirás y darás a luz un hijo. Ahora, pues, no bebas vino ni bebida fuerte, ni comas nada impuro, porque el niño será nazareo de Dios[b] desde el vientre hasta el día de su muerte.»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «Mira, estás encinta y darás a luz un hijo»; el contexto favorece entenderlo como anuncio predictivo: «concebirás y darás a luz un hijo».'
    reason: lexical_alternative
  - marker: b
    text: O «consagrado a Dios». El hebreo usa el término técnico «nazareo» para alguien especialmente consagrado a Dios.
    reason: alternative_reading
lexical_decisions:
- source_word: וַיֹּאמֶר לִי
  english_pob_choice: For he said to me
  chosen_spanish: Porque me dijo
  alternatives_spanish:
  - Y me dijo
  - Pues me dijo
  lexicon: HALOT
  rationale: El giro introduce la explicación del relato anterior; en español, «Porque» conserva bien esa relación discursiva. «Me dijo» reproduce de forma natural el verbo con objeto indirecto sin sobrecargar el estilo.
- source_word: הִנָּךְ הָרָה
  english_pob_choice: Look, you will conceive
  chosen_spanish: Mira, concebirás
  alternatives_spanish:
  - Mira, estás embarazada
  - Mira, vas a concebir
  lexicon: HALOT
  rationale: El hebreo tiene una forma que literalmente puede leerse como «mira, estás encinta», pero en el contexto narrativo es una anuncación predictiva. «Concebirás» conserva el valor de futuro y evita forzar un presente que en español podría sonar menos natural.
- source_word: וְיֹלַדְתְּ בֵּן
  english_pob_choice: and bear a son
  chosen_spanish: y darás a luz un hijo
  alternatives_spanish:
  - y parirás un hijo
  - y tendrás un hijo
  lexicon: HALOT
  rationale: «Darás a luz» es una equivalencia formal e idiomática para ילדה en este contexto. «Hijo» mantiene la especificidad masculina ya establecida por el texto.
- source_word: וְעַתָּה
  english_pob_choice: So now
  chosen_spanish: Ahora, pues
  alternatives_spanish:
  - Y ahora
  - Ahora
  lexicon: HALOT
  rationale: La transición entre anuncio e instrucción queda bien marcada con «Ahora, pues», que suena natural en español y conserva el paso discursivo.
- source_word: אַל תִּשְׁתִּי יַיִן וְשֵׁכָר
  english_pob_choice: do not drink wine or strong drink
  chosen_spanish: no bebas vino ni bebida fuerte
  alternatives_spanish:
  - no bebas vino ni licor
  - no bebas vino ni bebida fermentada
  lexicon: HALOT
  rationale: «Bebida fuerte» preserva la equivalencia tradicional para שֵׁכָר sin convertirlo en una categoría moderna demasiado precisa. Mantiene la distinción entre vino y otra bebida embriagante.
- source_word: וְאַל תֹּאכְלִי כָּל טֻמְאָה
  english_pob_choice: and do not eat anything unclean
  chosen_spanish: ni comas nada impuro
  alternatives_spanish:
  - ni comas cosa impura
  - ni comas nada inmundo
  lexicon: HALOT
  rationale: «Nada impuro» comunica bien la prohibición alimentaria y evita la abstracción de «impureza» como sustantivo. «Impuro» conserva la fuerza de טֻמְאָה en un español claro.
- source_word: נְזִיר אֱלֹהִים
  english_pob_choice: a Nazirite of God
  chosen_spanish: nazareo de Dios
  alternatives_spanish:
  - nazareo de Yahvé
  - consagrado a Dios
  lexicon: HALOT
  rationale: Se mantiene el término técnico con transliteración al español («nazareo») para no diluir la categoría legal y cultual. «De Dios» sigue de cerca el genitivo del hebreo y la opción auditada en inglés.
- source_word: הַנַּעַר
  english_pob_choice: the boy
  chosen_spanish: el muchacho
  alternatives_spanish:
  - el niño
  - el hijo
  lexicon: HALOT
  rationale: «Muchacho» encaja bien en un anuncio de nacimiento y conserva una referencia masculina natural en español. Evita tanto una infantilización excesiva como una traducción demasiado adulta.
- source_word: מִן הַבֶּטֶן
  english_pob_choice: from the womb
  chosen_spanish: desde el vientre
  alternatives_spanish:
  - desde el seno materno
  - desde el vientre materno
  lexicon: HALOT
  rationale: «Desde el vientre» es una fórmula clara y suficientemente literal. Preserva la imagen corporal y temporal del hebreo sin añadir glosas.
- source_word: עַד יוֹם מוֹתוֹ
  english_pob_choice: until the day of his death
  chosen_spanish: hasta el día de su muerte
  alternatives_spanish:
  - hasta el día en que muera
  - toda su vida
  lexicon: HALOT
  rationale: La frase reproduce de manera directa el límite temporal del texto. «Hasta el día de su muerte» mantiene la solemnidad y la correspondencia con el original.
theological_decisions:
- issue: Tratamiento del término técnico נְזִיר
  english_pob_reading: a Nazirite of God
  chosen_spanish_reading: nazareo de Dios
  alternative_spanish_readings:
  - consagrado a Dios
  - nazareo de Yahvé
  rationale: El pasaje usa un término técnico de dedicación ritual; por eso conviene conservarlo como categoría específica y no reemplazarlo por una explicación genérica. «Nazareo» en español mantiene la distinción legal y narrativa que el texto presupone.
  doctrine_reference: Translation philosophy §1, §5
- issue: Valor temporal de la concepción anunciada
  english_pob_reading: you will conceive and bear a son
  chosen_spanish_reading: concebirás y darás a luz un hijo
  alternative_spanish_readings:
  - estás embarazada y darás a luz un hijo
  - vas a concebir y darás a luz un hijo
  rationale: Aunque la forma hebrea puede sonar descriptiva, el contexto es una revelación anticipatoria. La lectura futura evita una impresión engañosa de embarazo ya visible y conserva la fuerza profética del anuncio.
  doctrine_reference: Translation philosophy §1, §6
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión más reciente del POB en inglés, que prefirió «Nazirite of God» sobre «Nazirite to God» por mayor correspondencia léxica y registro más formal. La versión española sigue esa misma decisión con «nazareo de Dios».
  spanish_consistency_notes:
  - Se mantuvo el nombre divino como «Dios» porque el hebreo aquí usa אֱלֹהִים, no el tetragrámaton.
  - Se conservó la expresión técnica «nazareo» para reflejar el valor cultual del término y no diluirlo en una paráfrasis.
  - La secuencia imperativa/prohibitiva se tradujo con un español fluido, pero sin perder el paralelismo de las prohibiciones del original.
  - Las notas al pie están ancladas exactamente en el texto con [a] y [b], y no se añadieron notas sin anclaje.
