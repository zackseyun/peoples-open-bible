translation:
  language: es
  text: y desde Bamot hasta el valle que está en el campo de Moab, hasta la cima de Pisgá, que domina la región desolada[a].[b]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «yeshimón», tratando el término hebreo como nombre regional más que como sustantivo descriptivo.
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «la faz de la región desolada», un modismo que significa la zona que da hacia la región desolada o la domina desde arriba.'
    reason: cultural_note
lexical_decisions:
- source_word: וּ/מִ/בָּמוֹת
  english_pob_choice: and from Bamoth
  chosen_spanish: y desde Bamot
  alternatives_spanish:
  - y desde Bamot
  - y desde los altos lugares
  lexicon: HALOT
  rationale: El contexto itinerario favorece tratar בָּמוֹת como topónimo. En español, “Bamot” conserva el nombre propio sin imponer el sentido común de “altos lugares”, que aquí sería menos probable.
- source_word: הַגַּיְא
  english_pob_choice: the valley
  chosen_spanish: el valle
  alternatives_spanish:
  - la quebrada
  - el barranco
  lexicon: HALOT
  rationale: גַּיְא designa un valle o hondonada. “Valle” es la opción más natural y clara en español dentro de una secuencia geográfica.
- source_word: אֲשֶׁר בִּשְׂדֵה מוֹאָב
  english_pob_choice: that is in the field of Moab
  chosen_spanish: que está en el campo de Moab
  alternatives_spanish:
  - que está en el territorio de Moab
  - que está en la llanura de Moab
  lexicon: HALOT
  rationale: שָׂדֶה literalmente es “campo”. “Campo de Moab” conserva la imagen hebrea y sigue siendo comprensible en español; “territorio” o “llanura” explicitan más, pero suavizan el vínculo léxico.
- source_word: רֹאשׁ הַפִּסגָּה
  english_pob_choice: to the top of Pisgah
  chosen_spanish: hasta la cima de Pisgá
  alternatives_spanish:
  - hasta la cabeza de Pisgá
  - hasta la cumbre de Pisgá
  lexicon: HALOT
  rationale: רֹאשׁ en contexto topográfico se rinde naturalmente como “cima”. “Pisgá” mantiene la transliteración del nombre propio; “cumbre” sería también posible, pero “cima” encaja mejor con el registro del pasaje.
- source_word: וְנִשְׁקָפָה
  english_pob_choice: which overlooks
  chosen_spanish: que mira hacia
  alternatives_spanish:
  - que domina
  - que se alza sobre
  lexicon: HALOT
  rationale: El verbo expresa la orientación visual/despejamiento desde un punto alto. En español, “que mira hacia” evita forzar una construcción demasiado literal y mantiene la relación con el complemento siguiente.
- source_word: עַל פְּנֵי
  english_pob_choice: the face of
  chosen_spanish: hacia el frente de
  alternatives_spanish:
  - frente a
  - sobre la superficie de
  lexicon: HALOT
  rationale: La expresión hebrea es idiomática. “Hacia el frente de” intenta conservar la idea de orientación/fachada sin caer en un calco rígido e ininteligible; también deja espacio para el matiz de mirar hacia una región.
- source_word: הַיְשִׁימֹן
  english_pob_choice: the wasteland
  chosen_spanish: el desierto
  alternatives_spanish:
  - el yeshimón
  - la región desolada
  lexicon: HALOT
  rationale: יְשִׁימוֹן denota una zona desolada o desierto. “Desierto” es la equivalencia más natural en español; no se adoptó “yeshimón” en el texto principal porque aquí la lectura descriptiva resulta más transparente.
theological_decisions:
- issue: Valor del topónimo frente al sustantivo común en בָּמוֹת
  english_pob_reading: Bamoth as a place name in the itinerary
  chosen_spanish_reading: Bamot como nombre propio dentro del recorrido
  alternative_spanish_readings:
  - los altos lugares
  - las alturas
  rationale: La lectura del contexto es geográfica, no cultual. Mantener el nombre propio evita introducir una interpretación litúrgica que el verso no exige.
  doctrine_reference: Números 21:20; uso contextual del topónimo en itinerarios
- issue: Sentido de הַיְשִׁימֹן como región desolada o nombre regional
  english_pob_reading: wasteland, with note that 'the Jeshimon' is an alternative
  chosen_spanish_reading: desierto en el texto principal, sin excluir que funcione como nombre regional
  alternative_spanish_readings:
  - yeshimón
  - la Jeshimón
  rationale: El español puede expresar con claridad la cualidad geográfica principal sin perder de vista la ambigüedad onomástica. La alternativa se conserva implícitamente en la nota.
  doctrine_reference: Números 21:20; nota lexical del POB
- issue: Tratamiento de la locución עַל פְּנֵי
  english_pob_reading: an idiom meaning the area facing or overlooking the wasteland
  chosen_spanish_reading: una orientación hacia el frente del desierto
  alternative_spanish_readings:
  - frente al desierto
  - sobre el desierto
  rationale: El hebreo usa una locución espacial idiomática, no una descripción anatómica. El español elegido intenta reflejar la direccionalidad y la relación visual sin volverla extraña.
  doctrine_reference: Números 21:20; nota cultural/idiomática
translation_notes:
  revision_awareness: La revisión más reciente indicó que no se requerían cambios; este borrador sigue de cerca el texto fuente y el audit trail inglés, manteniendo las decisiones léxicas ya estables.
  spanish_consistency_notes:
  - Se conserva la transliteración de Bamot y Pisgá como nombres propios del itinerario.
  - Se evita SEÑOR porque el verso no contiene el nombre divino.
  - Se usa un español neutral y publicable, con una sola oración coordinada que reproduce la progresión geográfica del hebreo.
  - Se mantiene la nota sobre yeshimón para respetar la tensión entre lectura descriptiva y posible nombre regional.
