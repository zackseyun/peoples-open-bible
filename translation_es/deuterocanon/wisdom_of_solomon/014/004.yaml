translation:
  language: es
  text: mostrando que eres capaz de salvar de cualquier peligro[a], para que aun alguien sin habilidad[b] pueda embarcarse.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «de todo peligro». El griego es más amplio que el contexto náutico inmediato; «de cualquier peligro» destaca el sentido contextual de peligro en el mar.
    reason: lexical_alternative
  - marker: b
    text: O «sin pericia», «sin técnica náutica». τέχνη aquí apunta a destreza práctica; la redacción elegida mantiene la amplitud del término.
    reason: lexical_alternative
lexical_decisions:
- source_word: δεικνὺς
  english_pob_choice: showing
  chosen_spanish: mostrando
  alternatives_spanish:
  - haciendo ver
  - demostrando
  lexicon: LSJ
  rationale: El participio mantiene una relación de continuidad con la frase anterior; «mostrando» conserva ese valor evidencial y resulta natural en español.
- source_word: δύνασαι
  english_pob_choice: you are able
  chosen_spanish: eres capaz de
  alternatives_spanish:
  - puedes
  - tienes poder para
  lexicon: LSJ
  rationale: «Eres capaz de» mantiene el tono solemne de capacidad real, más cercano al sentido de posibilidad/poder que un simple «puedes».
- source_word: ἐκ παντὸς
  english_pob_choice: from every peril
  chosen_spanish: de cualquier peligro
  alternatives_spanish:
  - de todo peligro
  - de cualquier peligroso trance
  lexicon: LSJ
  rationale: El griego es amplio («de todo»), pero en el contexto náutico la idea es liberación de cualquier peligro; «de cualquier peligro» hace explícita esa fuerza sin cerrarla demasiado.
- source_word: σώζειν
  english_pob_choice: to save
  chosen_spanish: salvar
  alternatives_spanish:
  - rescatar
  - librar
  lexicon: LSJ
  rationale: «Salvar» conserva la resonancia teológica del verbo y al mismo tiempo funciona en el contexto concreto de rescate.
- source_word: ἄνευ τέχνης
  english_pob_choice: without skill
  chosen_spanish: sin habilidad
  alternatives_spanish:
  - sin pericia
  - sin técnica náutica
  - sin seamanship
  lexicon: LSJ
  rationale: τέχνη aquí remite a destreza práctica; «sin habilidad» es claro y general, y evita sobreespecificar más allá de lo que exige el griego.
- source_word: ἐπιβῇ
  english_pob_choice: may embark
  chosen_spanish: pueda embarcarse
  alternatives_spanish:
  - pueda subir a bordo
  - pueda ir a bordo
  lexicon: LSJ
  rationale: En el contexto marítimo, el verbo significa subir a una nave; «embarcarse» es idiomático en español y conserva el sentido de ir a bordo.
theological_decisions:
- issue: Alcance de ἐκ παντὸς σώζειν
  english_pob_reading: Rendered as general rescue 'from every peril' while retaining 'save' for theological resonance.
  chosen_spanish_reading: «salvar de cualquier peligro» conserva la amplitud del griego y la resonancia de salvación.
  alternative_spanish_readings:
  - «salvar de todo peligro»
  - «rescatar de cualquier peligro»
  - «librar de cualquier peligro»
  rationale: El texto habla de una capacidad divina concreta en un marco marítimo, pero el griego es más amplio que una sola amenaza. La redacción española mantiene esa amplitud sin disolverla en una paráfrasis excesiva.
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve it; optimal equivalence'
translation_notes:
  revision_awareness: La redacción sigue la última revisión inglesa, que prefirió «peril» por un registro más formal y por el alcance amplio de ἐκ παντός; en español se conserva esa amplitud con «de cualquier peligro». También se mantiene la elección de un verbo de salvación y la idea náutica de «embarcarse» sin introducir una especificación excesiva.
  spanish_consistency_notes:
  - Se usa «salvar» en lugar de «rescatar» para conservar la resonancia teológica del verbo σώζειν.
  - Se evita «Señor» o cualquier sustituto devocional porque el texto griego no introduce un nombre divino aquí.
  - «Habilidad» se usa para τέχνη en sentido práctico, no como talento artístico.
  - «Embarcarse» mantiene el marco marítimo y el registro digno requerido para POB.
