translation:
  language: es
  text: 'Y los hijos de Israel[a] dijeron a Yahvé: «Hemos pecado. Haz con nosotros según todo lo que sea bueno a tus ojos[b]. Solo líbranos[c], por favor, en este día».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «los israelitas».
    reason: lexical_alternative
  - marker: b
    text: Lit. «según todo lo bueno en tus ojos»; es decir, todo lo que te parezca bueno.
    reason: lexical_alternative
  - marker: c
    text: O «sálvanos» o «rescátanos».
    reason: lexical_alternative
lexical_decisions:
- source_word: בְנֵי יִשְׂרָאֵל
  english_pob_choice: the sons of Israel
  chosen_spanish: los hijos de Israel
  alternatives_spanish:
  - los israelitas
  lexicon: HALOT
  rationale: Se conserva la expresión genealógica y étnica del hebreo sin neutralizarla. En español, «hijos de Israel» es claro, natural y fiel al término fuente.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: El texto fuente usa el nombre divino propio, no un título. En esta serie el equivalente español establecido es «Yahvé», que preserva el nombre personal del pacto.
- source_word: חָטָאנוּ
  english_pob_choice: We have sinned
  chosen_spanish: Hemos pecado
  alternatives_spanish:
  - Pecamos
  lexicon: HALOT
  rationale: El qatal expresa una confesión completa; «hemos pecado» comunica bien esa fuerza penitencial en español y mantiene el tono directo de la admisión.
- source_word: עֲשֵׂה אַתָּה לָנוּ
  english_pob_choice: Do to us
  chosen_spanish: Haz tú con nosotros
  alternatives_spanish:
  - Trata con nosotros
  - Actúa con nosotros
  lexicon: HALOT
  rationale: El hebreo pide que Dios obre sobre ellos; «haz tú con nosotros» reproduce la sencillez y la sumisión del ruego sin añadir matices no presentes.
- source_word: כְּכָל הַטּוֹב בְּעֵינֶיךָ
  english_pob_choice: according to all that is good in your eyes
  chosen_spanish: según todo lo que es bueno a tus ojos
  alternatives_spanish:
  - conforme a todo lo que te parezca bueno
  - según todo lo bueno que ves
  lexicon: HALOT
  rationale: Se mantiene la imagen idiomática hebrea de lo que es «bueno en tus ojos». «Según todo lo que es bueno a tus ojos» sigue de cerca la estructura fuente sin sonar forzado en español.
- source_word: אַךְ
  english_pob_choice: Only
  chosen_spanish: Solo
  alternatives_spanish:
  - Pero
  - Sin embargo
  lexicon: HALOT
  rationale: Aquí אַךְ restringe la petición después de la rendición. «Solo» expresa bien que, aceptando lo que Dios disponga, piden únicamente la liberación.
- source_word: הַצִּילֵנוּ
  english_pob_choice: deliver us
  chosen_spanish: líbranos
  alternatives_spanish:
  - sálvanos
  - rescátanos
  lexicon: HALOT
  rationale: El hifil de נצל puede significar librar, rescatar o salvar. «Líbranos» conserva la fuerza de liberación del peligro y es natural en español bíblico actual.
- source_word: נָא
  english_pob_choice: please
  chosen_spanish: por favor
  alternatives_spanish:
  - te rogamos
  - te pedimos
  lexicon: HALOT
  rationale: La partícula de ruego se expresa con una fórmula cortés y clara en español contemporáneo. «Por favor» mantiene la súplica sin añadir solemnidad artificial.
- source_word: הַיּוֹם הַזֶּה
  english_pob_choice: this day
  chosen_spanish: en este día
  alternatives_spanish:
  - hoy
  - este día
  lexicon: HALOT
  rationale: Se preserva la deixis solemne del hebreo. «En este día» es ligeramente más formal y mantiene la inmediatez del ruego.
theological_decisions:
- issue: Representación del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Jehová
  rationale: El texto no usa un sustituto honorífico sino el nombre propio de Dios. En español se mantiene «Yahvé» para conservar la transparencia del original y el testimonio del nombre del pacto.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Alcance de la petición en אַךְ הַצִּילֵנוּ
  english_pob_reading: Only please deliver us
  chosen_spanish_reading: Solo, por favor, líbranos
  alternative_spanish_readings:
  - Solo, por favor, sálvanos
  - Pero, por favor, líbranos
  rationale: La partícula restrictiva expresa que, aun sometidos a la voluntad divina, hacen una sola petición. «Solo» conserva esa limitación y no debilita el contraste implícito.
  doctrine_reference: DOCTRINE.md Translation philosophy §4
translation_notes:
  revision_awareness: Se siguió la última revisión inglesa que precisó «according to all that is good» para reflejar mejor כְּכָל הַטּוֹב. La redacción española conserva esa precisión con «según todo lo que es bueno a tus ojos», manteniendo el paralelismo idiomático y la súplica restrictiva marcada por אַךְ.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» de forma consistente para el Tetragrama.
  - Se usa «hijos de Israel» para reflejar la forma masculina plural del hebreo.
  - Se prefirió «líbranos» como equivalente principal de הַצִּילֵנוּ, dejando «sálvanos» y «rescátanos» como alternativas en nota.
  - La puntuación con comillas angulares y vocativo inicial sigue el registro bíblico en español actual.
