translation:
  language: es
  text: 'Entonces él dijo[a]: «Pongámonos en marcha y vayamos, y yo iré delante de ti».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'También puede traducirse: «y yo iré adelante de ti» o «frente a ti».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר
  english_pob_choice: Then he said
  chosen_spanish: Entonces él dijo
  alternatives_spanish:
  - Y él dijo
  - Luego dijo
  lexicon: HALOT
  rationale: El waw consecutivo marca avance narrativo; «Entonces» conserva esa progresión en español con naturalidad. Se mantiene el sujeto explícito para claridad idiomática en español, sin añadir interpretación.
- source_word: נִסְעָה
  english_pob_choice: Let us set out
  chosen_spanish: Pongámonos en marcha
  alternatives_spanish:
  - Salgamos de viaje
  - Partamos
  lexicon: HALOT
  rationale: La forma cohortativa de 1cp expresa una propuesta/exhortación de movimiento. «Pongámonos en marcha» comunica bien esa invitación a iniciar el viaje y suena natural en español, sin perder el matiz de iniciativa conjunta.
- source_word: וְנֵלֵכָה
  english_pob_choice: and go
  chosen_spanish: y vayamos
  alternatives_spanish:
  - y caminemos
  - y vayamos andando
  lexicon: HALOT
  rationale: הלך aquí sigue la idea de desplazarse. «Y vayamos» preserva la coordinación y el valor exhortativo del cohortativo previo, sin sobreespecificar el modo de desplazamiento.
- source_word: וְאֵלְכָה
  english_pob_choice: and I will go
  chosen_spanish: y yo iré
  alternatives_spanish:
  - y dejaré que vaya yo
  - y yo me iré
  lexicon: HALOT
  rationale: La forma de 1cs expresa la respuesta personal de Esau/Jacob al movimiento propuesto. «Yo iré» reproduce el valor futuro-volitivo de manera sobria y clara en español.
- source_word: לְנֶגְדֶּךָ
  english_pob_choice: before you
  chosen_spanish: delante de ti
  alternatives_spanish:
  - frente a ti
  - ante ti
  - antes de ti
  lexicon: HALOT
  rationale: נגד puede abarcar delante de, enfrente de o en posición correspondiente. En este contexto de viaje, la revisión inglesa decidió «before you»; en español «delante de ti» refleja esa relación espacial sin cargarlo con la idea de oposición. Mantiene abierta la lectura de ir en posición frontal o guía, que el hebreo permite.
translation_notes:
  revision_awareness: La revisión más reciente del texto inglés descartó «alongside you» y prefirió «before you» para לְנֶגְדֶּךָ. La propuesta española sigue esa adjudicación, usando «delante de ti» como equivalente natural; se conserva la nota alternativa por la amplitud semántica del hebreo y para reflejar el margen léxico reconocido en el audit trail.
  spanish_consistency_notes:
  - Se mantiene «Pongámonos en marcha» como equivalente idiomático de una exhortación cohortativa de movimiento, evitando arcaísmo.
  - «Delante de ti» se usa como renderización principal de לְנֶגְדֶּךָ por ajustarse al sentido espacial preferido en la revisión inglesa y por ser claro en español bíblico moderno.
  - La puntuación y las comillas siguen un estilo editorial claro y publicable en español.
  - No se introduce terminología teológica adicional, ya que el versículo es narrativo y de desplazamiento.
