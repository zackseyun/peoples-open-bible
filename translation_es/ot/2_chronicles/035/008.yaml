base_translation:
  language: en
  yaml_path: translation/ot/2_chronicles/035/008.yaml
  text: And his officials contributed a freewill offering for the people[a], for the priests, and for the Levites. Hilkiah, Zechariah, and Jehiel, the leaders of the house of God[b], gave to the priests 2,600 Passover offerings and 300 cattle.
  footnotes:
  - marker: a
    text: Or "for the Passover sacrifices." The Hebrew plural may refer to the animals used for the Passover observance.
    reason: lexical_alternative
  - marker: b
    text: Or 'gave to the priests for the Passover offerings 2,600 and 300 cattle'.
    reason: previous_rendering
