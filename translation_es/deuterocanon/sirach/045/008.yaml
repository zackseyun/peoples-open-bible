revisions:
- from: Lo vistió con completa gloria[a] y lo adornó con gloria y fuerza, con calzoncillos, túnicas y un manto[b]; y lo rodeó de campanillas.
  to: Lo vistió con esplendor completo[a] y lo adornó con gloria y fuerza, con prendas interiores, túnicas y una túnica exterior; y lo rodeó con campanillas.
  rationale: 'Se corrige el registro y la precisión léxica para ajustarse mejor al hebreo y a la auditoría inglesa: «esplendor completo» evita la repetición de «gloria» y refleja mejor כליל תפארת; «prendas interiores» reemplaza el coloquial «calzoncillos»; «túnica exterior» expresa mejor מעיל en contexto sacerdotal; y la nota se realinea con las dos funciones documentadas en inglés: variante textual y alternativa léxica del sintagma elevado inicial.'
