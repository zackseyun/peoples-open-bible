base_translation:
  language: en
  yaml_path: translation/ot/numbers/020/019.yaml
  text: And the sons of Israel said to him[a], “We will go up by the highway, and if I and my livestock drink your water, then I will pay its price. Let me only pass through on foot[c][b], nothing more.”
  footnotes:
