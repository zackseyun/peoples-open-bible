translation:
  language: es
  text: Su nobleza es glorificada al vivir con Dios[a], y el Soberano de todos la amó.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Su carácter noble es honrado por la convivencia con Dios». El griego συμβίωσις puede denotar vida compartida, convivencia o vivir juntos.'
    reason: lexical_alternative
lexical_decisions:
- source_word: εὐγένειαν
  english_pob_choice: nobility
  chosen_spanish: nobleza
  alternatives_spanish:
  - buen linaje
  - carácter noble
  - alta condición
  lexicon: LSJ
  rationale: El griego puede referirse a nobleza, excelencia o distinción. En este contexto personificado, 'nobleza' conserva la dignidad y amplitud del término sin reducirlo a linaje social literal.
- source_word: δοξάζει
  english_pob_choice: is glorified
  chosen_spanish: es glorificada
  alternatives_spanish:
  - glorifica
  - es honrada
  - se hace gloriosa
  lexicon: LSJ
  rationale: 'La relación sintáctica del griego expresa el resultado sobre la nobleza de Sabiduría: queda glorificada por la convivencia con Dios. El pasivo español reproduce bien ese efecto.'
- source_word: συμβίωσις
  english_pob_choice: living with
  chosen_spanish: vivir con
  alternatives_spanish:
  - compañía con
  - convivencia con
  - vida compartida con
  lexicon: LSJ
  rationale: El sustantivo apunta a vivir juntos o compartir vida. 'Vivir con' mantiene la fuerza concreta y la naturalidad en español, sin perder la referencia relacional.
- source_word: θεοῦ
  english_pob_choice: God
  chosen_spanish: Dios
  lexicon: LSJ
  rationale: 'Correspondencia directa del genitivo: la relación es con Dios, sin necesidad de matización adicional.'
- source_word: ἔχουσα
  english_pob_choice: by living with God
  chosen_spanish: al vivir con Dios
  alternatives_spanish:
  - teniendo convivencia con Dios
  - por vivir con Dios
  lexicon: LSJ
  rationale: El participio se integra de forma idiomática en español mediante una construcción temporal/causal breve. 'Al vivir con Dios' conserva la idea de acompañamiento o convivencia sin sonar forzado.
- source_word: ὁ πάντων δεσπότης
  english_pob_choice: the Master of all
  chosen_spanish: el Maestro de todos
  alternatives_spanish:
  - el Dueño de todos
  - el Soberano de todos
  - el Amo de todos
  lexicon: LSJ
  rationale: δεσπότης debe distinguirse de κύριος. 'Maestro' aquí intenta preservar la idea de autoridad suprema con un registro digno y más natural en español, evitando confusión con títulos eclesiásticos tradicionales.
- source_word: ἠγάπησεν
  english_pob_choice: loved
  chosen_spanish: amó
  alternatives_spanish:
  - amó profundamente
  - tuvo amor por
  - ha amado
  lexicon: LSJ
  rationale: El aoristo simple se expresa de manera directa con 'amó'. Mantiene la acción pasada sin añadir aspecto no explicitado por el griego.
- source_word: αὐτήν
  english_pob_choice: her
  chosen_spanish: la
  alternatives_spanish:
  - ella
  lexicon: LSJ
  rationale: Sabiduría está personificada y es femenina en el contexto. El clítico 'la' conserva esa referencia personal sin redundancia en español.
theological_decisions:
- issue: Personificación de la Sabiduría
  english_pob_reading: Retain feminine personal language for Wisdom ('her').
  chosen_spanish_reading: Conservar el lenguaje personal femenino para Sabiduría ('su', 'la').
  alternative_spanish_readings:
  - Tratarla como un concepto impersonal ('su nobleza' como abstracción sin personificación)
  - usar 'ello' o 'la cosa'
  rationale: El texto griego presenta a Sabiduría como figura personificada y usa formas femeninas. Mantener la personificación preserva la teología literaria del pasaje y evita resolver prematuramente una tensión que el texto mismo no resuelve.
  doctrine_reference: Preservar la personificación literaria y la tensión teológica; fidelidad al género del texto.
- issue: Traducción de δεσπότης
  english_pob_reading: Translate as 'Master' rather than 'Lord.'
  chosen_spanish_reading: Traducir como 'Maestro' en lugar de 'Señor'.
  alternative_spanish_readings:
  - Señor
  - Soberano
  - Dueño
  rationale: El griego no usa κύριος sino δεσπότης; por eso conviene no colapsar el término con 'Señor', que en español bíblico suele corresponder a otra palabra griega. 'Maestro' busca preservar la distinción léxica, aunque en español suene menos litúrgico.
  doctrine_reference: Consistencia terminológica y transparencia léxica en los títulos divinos.
translation_notes:
  revision_awareness: La redacción sigue el sentido del texto griego y toma en cuenta la revisión inglesa más reciente, que prefirió una expresión más natural para συμβίωσις sin perder su valor relacional. En español se optó por una solución igualmente natural ('al vivir con Dios') y se mantuvo la distinción de δεσπότης frente a κύριος.
  spanish_consistency_notes:
  - Se conserva la personificación femenina de Sabiduría mediante 'su' y 'la'.
  - Se evita 'SEÑOR' para δεσπότης, preservando la distinción léxica auditada en el inglés POB.
  - '''Dios'' se mantiene como traducción directa de θεοῦ sin añadir matices no presentes en el griego.'
  - El tono es sobrio y publicable, sin depender de formulaciones tradicionales que oculten el texto fuente.
