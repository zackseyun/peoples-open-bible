revisions:
- from: y pan sin levadura[a], y tortas sin levadura mezcladas con aceite, y hojuelas sin levadura esparcidas con aceite[b]; de flor de harina de trigo las harás.
  to: y pan sin levadura[a], y tortas sin levadura mezcladas con aceite, y obleas sin levadura untadas con aceite[b]; de flor de harina de trigo las harás.
  rationale: 'Se ajustan dos expresiones para mayor fidelidad semántica y mejor español: «hojuelas» se cambia por «obleas» para reflejar una preparación delgada tipo wafer dentro del léxico sacrificial, y «esparcidas con aceite» por «untadas con aceite» porque en español esa es la forma idiomática de describir la aplicación culinaria del aceite sobre las obleas. Se simplifica la nota a para alinearla mejor con la alternativa léxica documentada en la auditoría inglesa.'
