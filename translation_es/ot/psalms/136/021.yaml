review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura del hebreo: וְנָתַן = «y dio», אַרְצָם = «su tierra», y לְנַחֲלָה = «como herencia». También conserva el estribillo causal de כִּי. Sin embargo, la cláusula final no reproduce con naturalidad ni fidelidad el valor predicativo de חַסְדּוֹ + לְעוֹלָם: «porque para siempre es su amor leal» suena forzado en español y no expresa con claridad el matiz de duración continua que el inglés POB auditó como «endures forever».'
  spanish_quality_summary: 'La frase principal es clara, pero el estribillo queda poco idiomático y torpe en español. «Su tierra» es aceptable en contexto para plural posesivo colectivo. «Como herencia» funciona bien. La mejoría necesaria es en el refrán: en español bíblico moderno y digno, «porque su amor leal es para siempre» o «porque su amor leal permanece para siempre» resulta mucho más natural. Dado el énfasis del POB en la permanencia de חֶסֶד, «permanece para siempre» preserva mejor el sentido.'
  glossary_alignment: 'No hay conflicto con los glosarios principales del proyecto. La decisión «amor leal» para חֶסֶד es defendible, aunque algo menos estable que «amor constante» o «amor fiel»; no requiere cambio obligatorio porque está documentada en la nota. El problema principal no es terminológico sino sintáctico-semántico: falta un verbo que exprese duración continua.'
  issues:
