translation:
  language: es
  text: Tuyo, Yahvé, es la grandeza y el poder y el esplendor y la victoria[a] y la majestad; porque todo lo que está en los cielos y en la tierra es tuyo. Tuyo, Yahvé, es el reino, y eres exaltado como cabeza sobre todo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «la eternidad» o «la preeminencia» para «la victoria»; el hebreo נֵצַח aquí puede denotar supremacía perdurable además de triunfo.
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  - el SEÑOR
  lexicon: HALOT
  rationale: Se conserva el nombre propio del pacto, con la forma española ya fijada para el proyecto. No se sustituye por una máscara de título, porque el texto hebreo usa el Tetragrámaton directamente.
- source_word: לְךָ
  english_pob_choice: Yours / is yours
  chosen_spanish: Tuyo / es tuyo
  alternatives_spanish:
  - a ti pertenece
  - te pertenece
  lexicon: HALOT
  rationale: La construcción expresa pertenencia enfática. En español funciona mejor anteponer 'Tuyo' y repetir 'es tuyo' más adelante para mantener la simetría y el énfasis del hebreo.
- source_word: הַגְּדֻלָּה
  english_pob_choice: the greatness
  chosen_spanish: la grandeza
  alternatives_spanish:
  - la majestad
  - la grandeza
  lexicon: HALOT
  rationale: El sustantivo abstracto pide una equivalencia directa y natural. 'Grandeza' conserva el registro elevado del pasaje.
- source_word: הַגְּבוּרָה
  english_pob_choice: the power
  chosen_spanish: el poder
  alternatives_spanish:
  - la fuerza
  - la potencia
  lexicon: HALOT
  rationale: El término apunta a poder/might. 'Poder' es claro en español contemporáneo y encaja con la serie de atributos reales.
- source_word: הַתִּפְאֶרֶת
  english_pob_choice: the splendor
  chosen_spanish: el esplendor
  alternatives_spanish:
  - la gloria
  - la belleza
  - el honor
  lexicon: HALOT
  rationale: '''Esplendor'' comunica bien el valor estético-real del término sin duplicar ''gloria'' de manera innecesaria.'
- source_word: הַנֵּצַח
  english_pob_choice: the victory
  chosen_spanish: la victoria
  alternatives_spanish:
  - la eternidad
  - la preeminencia
  lexicon: HALOT
  rationale: Se sigue la decisión contextual de 'victory'. En esta doxología, 'victoria' expresa mejor la idea de supremacía triunfante y evita reducir el término a mera duración temporal.
- source_word: הַהוֹד
  english_pob_choice: the majesty
  chosen_spanish: la majestad
  alternatives_spanish:
  - la gloria
  - el honor
  lexicon: HALOT
  rationale: '''Majestad'' conserva el matiz regio y elevado del sustantivo, y evita redundar con ''esplendor''.'
- source_word: כִּי כֹל בַּשָּׁמַיִם וּבָאָרֶץ
  english_pob_choice: for everything in the heavens and on the earth
  chosen_spanish: porque todo lo que está en los cielos y en la tierra
  alternatives_spanish:
  - porque todo en los cielos y en la tierra
  - pues todo lo que hay en los cielos y en la tierra
  lexicon: HALOT
  rationale: Se conserva el valor causal de כִּי y el sentido comprehensivo de כֹל. 'Los cielos' refleja el plural hebreo y suena natural en español bíblico sin forzar calco.
- source_word: הַמַּמְלָכָה
  english_pob_choice: the kingdom
  chosen_spanish: el reino
  alternatives_spanish:
  - la realeza
  - el reinado
  - la soberanía
  lexicon: HALOT
  rationale: '''Reino'' es la equivalencia más directa y comprensible en español, manteniendo el campo semántico de dominio real.'
- source_word: וְהַמִּתְנַשֵּׂא
  english_pob_choice: and you are exalted
  chosen_spanish: y eres exaltado
  alternatives_spanish:
  - y te exaltas
  - y estás exaltado
  lexicon: HALOT
  rationale: El participio se vierte de modo predicativo en español para conservar la afirmación de exaltación divina. 'Eres exaltado' mantiene el sentido sin convertirlo en una construcción nominal artificial.
- source_word: לְכֹל לְרֹאשׁ
  english_pob_choice: as head over all
  chosen_spanish: como cabeza sobre todo
  alternatives_spanish:
  - como jefe sobre todo
  - como cabeza de todo
  lexicon: HALOT
  rationale: '''Cabeza'' reproduce la metáfora de supremacía con buena inteligibilidad en español. ''Sobre todo'' conserva la idea de autoridad universal.'
theological_decisions:
- issue: Renderización del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Jehová
  - el SEÑOR
  rationale: El texto hebreo usa el nombre del pacto directamente. Se mantiene la forma española del proyecto, 'Yahvé', en vez de ocultarlo tras un título.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Sentido de נֵצַח en la lista de atributos
  english_pob_reading: victory
  chosen_spanish_reading: victoria
  alternative_spanish_readings:
  - eternidad
  - preeminencia
  rationale: Se conserva la opción contextual que el audit trail defiende para esta doxología. 'Victoria' transmite bien la idea de supremacía triunfante y deja visible la tensión semántica del hebreo.
  doctrine_reference: DOCTRINE.md §3 Preserve theological tension rather than resolve it
translation_notes:
  revision_awareness: 'El pasaje coincide de forma alta con el audit trail inglés: no se registran revisiones aplicadas, y la redacción española sigue la misma decisión central para יְהוָה, לְךָ, נֵצַח y el cierre de supremacía real, preservando la tensión semántica donde el hebreo la presenta.'
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' de manera consistente para יְהוָה.
  - Se usa el paralelismo enfático 'Tuyo... es tuyo' para לְךָ.
  - Se conserva la secuencia acumulativa de atributos con artículos definidos.
  - '''Los cielos'' respeta el plural hebreo y la elevación poética del versículo.'
  - '''Cabeza sobre todo'' mantiene la metáfora de autoridad sin suavizarla.'
