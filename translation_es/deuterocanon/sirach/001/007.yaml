translation:
  language: es
  text: Él la examinó y la vio y la contó[a], y se la dio a los que lo aman.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Testigo paralelo griego: «Uno solo es sabio, temible en gran manera, sentado en su trono». El hebreo conservado aquí difiere sustancialmente de la tradición griega.'
    reason: textual_variant
lexical_decisions:
- source_word: בְחָנָהּ
  english_pob_choice: examined her
  chosen_spanish: la examinó
  alternatives_spanish:
  - la probó
  - la puso a prueba
  lexicon: HALOT
  rationale: בחן puede expresar probar o examinar. En español, «examinar» conserva la idea de evaluación cuidadosa sin forzar una metáfora distinta ni volver el verbo más interpretativo de lo que permite el hebreo.
- source_word: וְרָאָהּ
  english_pob_choice: saw her
  chosen_spanish: la vio
  alternatives_spanish:
  - la percibió
  - la contempló
  lexicon: HALOT
  rationale: ראה es el verbo directo «ver». «La vio» mantiene la secuencia breve y acumulativa de los verbos hebreos.
- source_word: וְסְפָרָהּ
  english_pob_choice: counted her
  chosen_spanish: la contó
  alternatives_spanish:
  - la numeró
  - la enumeró
  lexicon: HALOT
  rationale: ספר en este contexto admite la noción de contar o enumerar. «La contó» es fiel y natural en español, aunque conserva una aspereza deliberada que refleja la compacta cadena verbal del hebreo.
- source_word: וּנְתָנָהּ
  english_pob_choice: gave her
  chosen_spanish: la dio
  alternatives_spanish:
  - la entregó
  - la concedió
  lexicon: HALOT
  rationale: נתן es el verbo común «dar». «La dio» preserva la sencillez del original y evita añadir matices no sustentados por el texto.
- source_word: לְאֹהֲבָיו
  english_pob_choice: to those who love him
  chosen_spanish: a los que lo aman
  alternatives_spanish:
  - a los que le aman
  - a quienes lo aman
  lexicon: HALOT
  rationale: El sufijo masculino singular apunta más naturalmente a Dios que a la sabiduría personificada. En español, «lo aman» conserva ese referente masculino implícito y evita resolver la referencia hacia un sustantivo femenino por concordancia de estilo.
- source_word: הּ suffixes on feminine verbs/objects
  english_pob_choice: her
  chosen_spanish: la
  alternatives_spanish:
  - la sabiduría
  - ella
  lexicon: HALOT
  rationale: Los sufijos femeninos del hebreo se traducen con pronombres femeninos para preservar la personificación de la sabiduría. «La» mantiene la referencia anafórica sin expandir innecesariamente el texto.
theological_decisions:
- issue: Gran divergencia entre el hebreo conservado y el paralelo griego
  english_pob_reading: Translate the extant Hebrew as the primary text, while acknowledging the Greek as a major divergent witness
  chosen_spanish_reading: Traducir el hebreo conservado como texto principal y consignar el griego como testigo paralelo divergente importante
  alternative_spanish_readings:
  - 'Adoptar una versión basada en el griego: «Hay uno que es sabio, muy temible, sentado en su trono»'
  - Fusionar ambos testigos en el cuerpo del texto
  rationale: La política del proyecto da prioridad al hebreo conservado de Sirácida cuando existe, pero aquí el griego representa una tradición significativamente distinta. Por fidelidad auditada, el cuerpo principal sigue el hebreo y la variante griega queda registrada como nota textual.
  doctrine_reference: 'PHILOSOPHY.md: traducir desde el hebreo donde se conserva; preservar honestamente la incertidumbre textual.'
- issue: Referente masculino de «los que lo aman»
  english_pob_reading: The masculine singular pronoun refers to God, the implied subject
  chosen_spanish_reading: El pronombre masculino singular se refiere a Dios, sujeto implícito del pasaje
  alternative_spanish_readings:
  - Entender el pronombre como referido a la sabiduría por sentido, no por gramática
  - Neutralizar el pronombre para evitar la referencia masculina
  rationale: El hebreo tiene sufijo masculino singular, por lo que la lectura más sólida es referirlo a Dios. En español se conserva esa relación con «lo aman», sin suavizar la precisión gramatical del testimonio.
  doctrine_reference: 'Filosofía de traducción: mantener la tensión teológica y gramatical en vez de resolverla más allá de la fuente.'
translation_notes:
  revision_awareness: El texto español sigue la prioridad dada al hebreo conservado en la fuente principal, pero incorpora la advertencia del audit trail sobre la divergencia mayor con el griego. La redacción fue ajustada para sonar natural en español sin perder la cadena verbal breve ni la personificación femenina del objeto, y sin borrar la tensión del pronombre masculino final.
  spanish_consistency_notes:
  - Se usa «Dios» implícito en la nota teológica, pero en el texto se conserva la referencia pronominal masculina con «lo».
  - Se mantiene «la» para la sabiduría/personificación femenina, en correspondencia con los sufijos hebreos.
  - No se introduce «Cristo», «SEÑOR» ni otras convenciones no atestiguadas por la fuente.
  - La nota al pie se ancla en «contó[a]» para señalar la divergencia textual principal.
