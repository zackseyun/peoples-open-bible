revisions:
- from: Hay abundancia de alimento en la tierra[b] de los pobres[a], pero hay quien es arrasado por falta de justicia.
  to: Hay abundante alimento en el barbecho[a] de los pobres, pero hay quien es arrasado por falta de justicia.[b]
  rationale: Se reemplazó «la tierra» por «el barbecho» para conservar la especificidad de נִיר conforme a la evidencia fuente y la decisión auditada del POB. Se mantuvo «hay quien es arrasado por falta de justicia» porque reproduce bien la construcción contrastiva y la crítica social de בלא משפט. Se ajustaron las notas para reflejar las alternativas verdaderamente significativas del original y de la auditoría inglesa.
