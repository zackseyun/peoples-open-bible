revisions:
- from: Porque, aunque Moisés se enojó contra Datán y Abirón[a], no hizo nada contra ellos con ira[b], sino que con razón dominó la ira.
  to: Pues, aunque Moisés se enojó contra Datán y Abirón[a], no hizo nada contra ellos con ira, sino que por juicio racional dominó la ira[b].
  rationale: Se reemplazó «con razón» por «por juicio racional» para evitar la lectura idiomática de «justificadamente» y preservar con claridad el valor temático de λογισμῷ en 4 Macabeos. También se ajustó «Porque» a «Pues» para una conexión discursiva más natural en español. Se mantuvo «dominó la ira» como buena equivalencia de διήτησεν y se conservaron el nombre «Abirón» y su nota alternativa.
