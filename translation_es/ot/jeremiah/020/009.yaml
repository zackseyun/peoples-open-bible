review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la estructura del hebreo y la línea del POB en casi todo el versículo: mantiene la resolución hipotética (''Si digo''), conserva los pronombres sin explicitar ''Yahvé'', preserva ''en su nombre'', la imagen concreta del fuego en los huesos, y el cierre de imposibilidad. Sin embargo, falla en una decisión léxica significativa: אֶזְכְּרֶנּוּ fue escogido en el POB inglés como ''mention him'' por el paralelismo con ''speak'', mientras que el español principal pone ''recordaré'', relegando ''mencionaré'' a nota. Eso debilita la alineación con la evidencia fuente y con la rationale documentada. Además, ''hay como un fuego ardiente'' suena menos ceñido que una forma con referente implícito más natural en español.'
  spanish_quality_summary: 'El español es generalmente claro y digno, pero hay dos puntos mejorables: ''No lo recordaré'' no suena tan natural en este contexto profético como ''No lo mencionaré'', y ''entonces en mi corazón hay como un fuego ardiente'' resulta algo torpe; ''se vuelve/se convierte para mí como un fuego ardiente'' o ''es en mi corazón como un fuego ardiente'' reflejaría mejor la progresión. También la nota c contiene el error ''del Yahvé'', que en español debe ser simplemente ''de Yahvé''.'
  glossary_alignment: 'No hay conflicto mayor con la terminología base del proyecto: no aparece el nombre divino en el texto principal y eso está justificado por los pronombres del hebreo; cuando aparece en nota debe ser ''Yahvé''. No hay términos de Mesías/Cristo, esclavo, gracia, etc. Sí debe ajustarse la nota para decir ''mensaje de Yahvé''.'
  issues:
  - severity: high
    issue: Elección principal de 'recordaré' para אֶזְכְּרֶנּוּ
    rationale: 'La documentación inglesa y el paralelismo con ''hablaré más en su nombre'' favorecen claramente el sentido de habla: ''mencionaré''. Mantener ''recordaré'' en el texto principal no preserva la decisión léxica auditada.'
  - severity: medium
    issue: Construcción 'hay como un fuego ardiente'
    rationale: Aunque intenta conservar el referente implícito, en español suena menos natural y menos precisa que una formulación como 'es en mi corazón como un fuego ardiente', que mantiene la ambigüedad sin introducir 'hay'.
  - severity: low
    issue: Nota c dice 'del Yahvé'
    rationale: En español correcto debe ser 'de Yahvé'; el artículo es impropio aquí.
  revised_spanish_text: 'Si digo[a]: “No lo mencionaré, ni hablaré más en su nombre[b]”, entonces es en mi corazón como un fuego ardiente, encerrado en mis huesos; me canso de contenerlo[c], y no puedo.'
  revised_footnotes:
