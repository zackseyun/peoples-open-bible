base_translation:
  language: en
  yaml_path: translation/ot/isaiah/016/008.yaml
  text: For the fields of Heshbon languish[a], the vine of Sibmah as well. The lords of the nations have struck down its choice vines; they reached as far as Jazer, they wandered into the wilderness[c][b]; its shoots spread out and crossed the sea.
  footnotes:
  - marker: a
    text: Or 'its tendrils' for 'its choice vines' (שְׂרוּקֶיהָ); the Hebrew term may emphasize either select vine stock or the vine's branches/shoots.
    reason: lexical_alternative
  - marker: b
    text: Or 'its branches spread out'; the Hebrew behind 'spread out' is difficult and may be understood in more than one way.
    reason: lexical_alternative
  - marker: c
    text: '''The sea'' may refer specifically to the Dead Sea in the regional geography.'
    reason: cultural_note
