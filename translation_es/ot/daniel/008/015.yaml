translation:
  language: es
  text: Y aconteció[a], cuando yo, Daniel, había visto la visión y buscaba entendimiento, he aquí, uno que estaba delante de mí tenía la apariencia de un hombre.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «allí se puso delante de mí uno con la apariencia de un hombre»; la frase hebrea puede leerse con énfasis en la posición del que aparece.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְהִי
  english_pob_choice: And it happened
  chosen_spanish: Y aconteció
  alternatives_spanish:
  - Y sucedió
  - Y fue así
  lexicon: HALOT
  rationale: La fórmula narrativa hebrea introduce un desarrollo de la escena; «aconteció» conserva ese valor discursivo con tono digno y natural en español.
- source_word: בִּרְאֹתִי
  english_pob_choice: when I ... had seen
  chosen_spanish: cuando yo ... había visto
  alternatives_spanish:
  - cuando vi
  - al ver yo
  lexicon: HALOT
  rationale: La construcción temporal en hebreo señala el momento en que Daniel ya había tenido la visión antes de buscar entendimiento; el pluscuamperfecto español refleja bien esa anterioridad.
- source_word: אֲנִי דָנִיֵּאל
  english_pob_choice: I, Daniel
  chosen_spanish: yo, Daniel
  alternatives_spanish:
  - yo Daniel
  - yo, Daniel,
  lexicon: HALOT
  rationale: La mención explícita del pronombre y el nombre conserva el énfasis de autoidentificación; «yo, Daniel» es natural y resalta la voz del narrador.
- source_word: הֶחָזוֹן
  english_pob_choice: the vision
  chosen_spanish: la visión
  alternatives_spanish:
  - esta visión
  - la revelación
  lexicon: HALOT
  rationale: חזון en Daniel designa la visión recibida; «la visión» es la equivalencia directa y consistente con el contexto del libro.
- source_word: וָאֲבַקְשָׁה בִינָה
  english_pob_choice: and was seeking understanding
  chosen_spanish: y buscaba entendimiento
  alternatives_spanish:
  - y procuraba entender
  - y trataba de entender
  lexicon: HALOT
  rationale: בקש con בינה expresa un esfuerzo por alcanzar comprensión; «buscaba entendimiento» mantiene ese matiz de búsqueda continua sin sobreinterpretar.
- source_word: וְהִנֵּה
  english_pob_choice: behold
  chosen_spanish: he aquí
  alternatives_spanish:
  - y he aquí
  - mira
  lexicon: HALOT
  rationale: «He aquí» conserva la función de atención e inmediatez de הנה con un registro sobrio y bíblico en español.
- source_word: עֹמֵד לְנֶגְדִּי
  english_pob_choice: one standing before me
  chosen_spanish: uno que estaba delante de mí
  alternatives_spanish:
  - uno que se hallaba delante de mí
  - uno en pie frente a mí
  lexicon: HALOT
  rationale: La expresión describe posición visible ante Daniel; «estaba delante de mí» transmite la escena con fluidez y sin perder la relación espacial.
- source_word: כְּמַרְאֵה גָבֶר
  english_pob_choice: one with the appearance of a man
  chosen_spanish: tenía la apariencia de un hombre
  alternatives_spanish:
  - parecía un hombre
  - como de hombre
  lexicon: HALOT
  rationale: La frase es fenomenológica y compara la apariencia visible, no la identidad ontológica; «tenía la apariencia de un hombre» reproduce bien el hebreo y evita añadir más de lo dicho.
- source_word: גָבֶר
  english_pob_choice: man
  chosen_spanish: hombre
  alternatives_spanish:
  - varón
  - ser humano
  lexicon: HALOT
  rationale: Aquí el sustantivo remite a la forma humana masculina visible; «hombre» es la opción más directa y comprensible en español.
theological_decisions:
- issue: Identidad del ser visto por Daniel
  english_pob_reading: Render the phrase phenomenologically as 'one with the appearance of a man' without identifying the figure beyond the text.
  chosen_spanish_reading: 'Traducir fenomenológicamente: «uno que estaba delante de mí tenía la apariencia de un hombre», sin identificar al personaje más allá del versículo.'
  alternative_spanish_readings:
  - un ángel en forma humana
  - un hombre
  - una figura divina preencarnada
  rationale: El hebreo solo afirma la apariencia humana del ser. La traducción debe conservar esa descripción observacional y no resolver la identidad con inferencias del contexto más amplio.
  doctrine_reference: Preservar la tensión teológica sin decidirla anticipadamente.
translation_notes:
  revision_awareness: 'La redacción española sigue la revisión más reciente del audit trail: el sujeto se expresa como «uno que estaba delante de mí» y la cualidad visual se formula como «tenía la apariencia de un hombre», manteniendo el orden observacional del hebreo.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» para el nombre divino cuando aparezca en el contexto general del proyecto, aunque este versículo no lo contiene.
  - Se usa «entendimiento» para בינה, en línea con la opción auditada de POB; «comprensión» sería posible, pero aquí se conserva el valor nominal más cercano al hebreo.
  - No se introduce «Mesías» ni terminología cristológica, porque el versículo no lo requiere.
  - 'La puntuación sigue el español bíblico moderno: coma para la aposición «yo, Daniel» y para separar la cláusula temporal.'
