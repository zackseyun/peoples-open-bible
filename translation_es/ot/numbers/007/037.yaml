base_translation:
  language: en
  yaml_path: translation/ot/numbers/007/037.yaml
  text: His offering was one silver plate[a], its weight one hundred thirty shekels, one silver basin of seventy shekels, by the shekel of the sanctuary[c][b]; both of them were full of fine flour mixed with oil for a grain offering.
  footnotes:
  - marker: a
    text: Or 'dish' for 'plate' (Hebrew קַעֲרָה), a vessel term that may refer more broadly to a shallow bowl or dish.
    reason: lexical_alternative
  - marker: b
    text: Or 'sprinkling bowl' for 'basin' (Hebrew מִזְרָק), reflecting the vessel's cultic use in other contexts.
    reason: lexical_alternative
  - marker: c
    text: '''By the shekel of the sanctuary'' means according to the sanctuary''s standard weight.'
    reason: cultural_note
