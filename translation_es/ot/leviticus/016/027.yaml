  to: Y el toro para la ofrenda por el pecado y el macho cabrío para la ofrenda por el pecado[a], cuya sangre fue introducida en el santuario para hacer expiación, los sacará fuera del campamento, y quemarán[b] sus pieles[c], su carne y su estiércol[d] en el fuego.
  rationale: La revisión corrige un problema de naturalidad y concordancia en español ('lo sacará' > 'los sacará'), recupera mejor el matiz direccional de הוּבָא con 'fue introducida', mantiene el cambio singular/plural del hebreo mediante una nota explícita, y depura las notas léxicas para que solo conserven alternativas fieles al hebreo y al audit trail inglés.
