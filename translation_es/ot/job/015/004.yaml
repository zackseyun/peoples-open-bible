translation:
  language: es
  text: En efecto, tú anulas el temor[a] y disminuyes la meditación[b] delante de Dios.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebreo 'temor'; en contexto, probablemente 'el temor de Dios' o la reverencia dirigida a Dios.
    reason: lexical_alternative
  - marker: b
    text: O “oración”, “devoción” o “queja” delante de Dios; el término hebreo puede denotar habla reflexiva u oración meditativa.
    reason: lexical_alternative
lexical_decisions:
- source_word: אַף
  english_pob_choice: Indeed
  chosen_spanish: En efecto
  alternatives_spanish:
  - Ciertamente
  - Sí
  lexicon: HALOT
  rationale: אַף funciona aquí como partícula enfática. "En efecto" conserva la fuerza asertiva en un español natural y sobrio.
- source_word: תָּפֵר
  english_pob_choice: annul
  chosen_spanish: anulas
  alternatives_spanish:
  - anulas por completo
  - invalidas
  - frustras
  lexicon: HALOT
  rationale: El Hifil de פרר expresa hacer ineficaz o anular. "Anulas" transmite la acción causativa con claridad y sin añadir exceso interpretativo.
- source_word: יִרְאָה
  english_pob_choice: the fear of God
  chosen_spanish: el temor de Dios
  alternatives_spanish:
  - el miedo de Dios
  - la reverencia a Dios
  - el temor
  lexicon: HALOT
  rationale: El hebreo puede significar temor o reverencia religiosa. Dado el paralelismo con "delante de Dios", "el temor de Dios" preserva el sentido bíblico establecido y la referencia religiosa explícita.
- source_word: וְתִגְרַע
  english_pob_choice: and diminish
  chosen_spanish: y disminuyes
  alternatives_spanish:
  - y reduces
  - y rebajas
  - y aminoras
  lexicon: HALOT
  rationale: גרע en qal significa disminuir o reducir. "Disminuyes" es un equivalente natural que conserva la idea de recorte o mengua.
- source_word: שִׂיחָה
  english_pob_choice: meditation
  chosen_spanish: la meditación
  alternatives_spanish:
  - la oración
  - la reflexión
  - la devoción
  - el discurso
  lexicon: HALOT
  rationale: El término puede abarcar meditación, reflexión orante o incluso habla devocional. "La meditación" mantiene la amplitud contemplativa que el audit trail inglés privilegia, sin cerrarlo a una sola práctica.
- source_word: לִפְנֵי אֵל
  english_pob_choice: before God
  chosen_spanish: delante de Dios
  alternatives_spanish:
  - en la presencia de Dios
  - ante Dios
  - frente a Dios
  lexicon: HALOT
  rationale: לִפְנֵי indica posición o presencia. "Delante de Dios" es idiomático en español y conserva la relación espacial/devocional sin sobrecargar el verso.
theological_decisions:
- issue: Sentido religioso de יִרְאָה
  english_pob_reading: the fear of God
  chosen_spanish_reading: el temor de Dios
  alternative_spanish_readings:
  - el temor
  - la reverencia a Dios
  rationale: La expresión no se reduce a emoción genérica; en contexto acusa una alteración de la piedad. Mantener "el temor de Dios" preserva la categoría bíblica y el enlace con el segundo hemistiquio.
  doctrine_reference: Translation philosophy §§1, 5
- issue: Amplitud semántica de שִׂיחָה
  english_pob_reading: meditation
  chosen_spanish_reading: la meditación
  alternative_spanish_readings:
  - la oración
  - la devoción
  - la queja
  rationale: En poesía sapiencial y con "delante de Dios", el término puede abarcar reflexión orante. "La meditación" conserva la amplitud sin imponer una sola subclase de habla religiosa.
  doctrine_reference: Translation philosophy §3
translation_notes:
  revision_awareness: Se siguió de cerca el audit trail inglés y el hebreo directo. No se adoptó una transliteración o una fórmula eclesiástica fija donde el texto pide un matiz semántico más abierto, y se mantuvo la tensión lexical de שִׂיחָה con una nota breve en español.
  spanish_consistency_notes:
  - Se usó "Dios" para אֵל conforme al estándar del proyecto.
  - Se tradujo אַף con una partícula enfática natural, no como mera coordinación.
  - Se conservó el paralelismo verbal con dos verbos en segunda persona singular.
  - La nota al pie cubre la ambigüedad de שִׂיחָה sin desplazar el texto principal.
  - '"Temor de Dios" mantiene el registro bíblico y evita una simplificación psicológica.'
