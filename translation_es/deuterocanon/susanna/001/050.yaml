  to: 'Y todo el pueblo volvió con prisa. Y los ancianos le dijeron[a]: «Ven, siéntate en medio de nosotros y dinos, pues Dios te ha dado la dignidad de un anciano».'
  rationale: Se revisó «anúncianos» a «dinos» por naturalidad y fidelidad funcional en español. Se ajustó «porque» a «pues» por mejor tono formal. Se cambió «el rango de un anciano» por «la dignidad de un anciano» para expresar con más soltura en español el valor de τὸ πρεσβεῖον como rango honorífico o autoridad reconocida, manteniendo en nota las alternativas preservadas por el expediente inglés.
