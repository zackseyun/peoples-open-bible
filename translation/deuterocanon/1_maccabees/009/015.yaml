translation:
  text: And the right wing was crushed before them[b][a], and he pursued after them as far as the mountain of Azotus.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'the right horn'—a literal rendering of the military metaphor; here it refers to the right side or wing of the army.
    reason: lexical_alternative
  - marker: b
    text: Or, 'as far as Mount Azotus.' The Greek expression may refer either to a specific mountain or to the upland area associated with Azotus.
    reason: alternative_reading
lexical_decisions:
- source_word: συνετρίβη
  chosen: was crushed
  alternatives:
  - was broken
  - was shattered
  - was routed
  lexicon: LSJ
  rationale: The passive of συντρίβω denotes being broken or crushed. In battle context it can imply decisive defeat, but 'was crushed' preserves the vivid metaphor without over-paraphrasing into an interpretive military gloss like 'was routed'.
- source_word: τὸ δεξιὸν κέρας
  chosen: the right wing
  alternatives:
  - the right horn
  - the right flank
  lexicon: LSJ
  rationale: Although κέρας literally means 'horn,' in military arrangement it refers metaphorically to a wing or flank of an army. 'Wing' is the most natural English military equivalent here while retaining the image of a battle line's side.
- source_word: ἀπʼ αὐτῶν
  chosen: before them
  alternatives:
  - from them
  - by them
  lexicon: LSJ
  rationale: With a verb of collapse/defeat in battle, ἀπό can mark separation caused by pressure from the opposing force. 'Before them' idiomatically conveys that this wing gave way in the face of Judas's forces. 'From them' is too wooden in English.
- source_word: ἔδωκεν ὀπίσω αὐτῶν
  chosen: he pursued after them
  alternatives:
  - he pressed hard after them
  - he gave chase to them
  lexicon: LSJ
  rationale: This idiom literally involves 'giving behind/after them' and in context means pursuing the retreating enemy. Singular 'he' follows the Greek verb form; contextually it likely refers to Judas as leader, though English readers may understand it representatively of his force.
- source_word: ἕως Ἀζώτου ὄρους
  chosen: as far as the mountain of Azotus
  alternatives:
  - as far as Mount Azotus
  - as far as the hill-country of Azotus
  lexicon: LSJ
  rationale: The Greek is literally 'until/as far as Azotus mountain.' 'The mountain of Azotus' stays close to the source and avoids overconfidence about whether a specific named mount or the upland region near Azotus is intended. A smoother alternative is preserved in the alternatives.
