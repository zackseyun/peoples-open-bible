translation:
  language: es
  text: Entonces se acordaron de que Dios era su roca[a], y Dios, el Altísimo, era su redentor.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «y el Dios Altísimo era su redentor». El orden hebreo es literalmente «y Dios Altísimo su redentor».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּזְכְרוּ
  english_pob_choice: Then they remembered
  chosen_spanish: Entonces se acordaron
  alternatives_spanish:
  - Y se acordaron
  - Así se acordaron
  lexicon: HALOT
  rationale: La forma wayyiqtol marca avance narrativo; «Entonces» reproduce bien esa secuencia en español. «Acordarse de» expresa el acto de recordar con naturalidad y sin perder el sentido verbal del hebreo.
- source_word: כִּי
  english_pob_choice: that
  chosen_spanish: de que
  alternatives_spanish:
  - que
  - porque
  lexicon: HALOT
  rationale: Aquí introduce el contenido de lo recordado, no una causa. En español, «acordarse de que» comunica con claridad esa cláusula de contenido.
- source_word: אֱלֹהִים
  english_pob_choice: God
  chosen_spanish: Dios
  alternatives_spanish:
  - el Dios
  - Dios
  lexicon: HALOT
  rationale: Aunque el sustantivo es morfológicamente plural, aquí tiene sentido singular y designa al Dios de Israel. «Dios» conserva el valor directo y no necesita marca plural.
- source_word: צוּרָם
  english_pob_choice: their rock
  chosen_spanish: su roca
  alternatives_spanish:
  - su Roca
  - su peña
  lexicon: HALOT
  rationale: «Roca» preserva la metáfora de refugio y firmeza. No se capitaliza porque el hebreo no exige esa decisión interpretativa; el posesivo singular/plural del español se resuelve naturalmente con «su».
- source_word: וְאֵל עֶלְיוֹן
  english_pob_choice: and God Most High
  chosen_spanish: y Dios Altísimo
  alternatives_spanish:
  - y el Dios Altísimo
  - y El Altísimo
  lexicon: HALOT
  rationale: El hebreo presenta un título poético paralelo. Traducir אֵל como «Dios» evita transliteración innecesaria y mantiene el paralelismo con el versículo. «Altísimo» reproduce el epíteto divino עֶלְיוֹן con naturalidad en español.
- source_word: גֹּאֲלָם
  english_pob_choice: their redeemer
  chosen_spanish: su redentor
  alternatives_spanish:
  - el que los redimía
  - su libertador
  lexicon: HALOT
  rationale: El participio nominal de גאל se expresa bien como «redentor», que conserva el valor de agente/redentor y su resonancia teológica. «Su» es el equivalente natural del sufijo pronominal hebreo.
theological_decisions:
- issue: 'La doble designación divina: אֱלֹהִים ... וְאֵל עֶלְיוֹן'
  english_pob_reading: 'Use ''God'' in both cola: ''God was their rock, and God Most High was their redeemer.'''
  chosen_spanish_reading: 'Repetir «Dios» en ambas mitades: «Dios era su roca, y Dios Altísimo era su redentor.»'
  alternative_spanish_readings:
  - «Dios era su roca, y el Dios Altísimo era su redentor»
  - «Dios era su roca, y El Altísimo era su redentor»
  rationale: El verso usa paralelismo poético para el mismo referente divino. Repetir «Dios» evita sugerir dos seres distintos y mantiene la estructura retórica del hebreo. Traducir el título en vez de transliterarlo sigue la política de traducir títulos y no nombres.
  doctrine_reference: Poética hebrea; unidad del referente divino; política POB de traducir títulos.
translation_notes:
  revision_awareness: El texto inglés más reciente añadió 'was' antes de 'their redeemer' para completar la predicación; en español se refleja de forma natural con «era su redentor», sin alterar la estructura del hebreo ni el paralelismo.
  spanish_consistency_notes:
  - Se mantiene «Dios» como traducción de אֱלֹהִים y de אֵל en este contexto poético.
  - Se conserva la metáfora «roca» sin capitalización interpretativa.
  - «Altísimo» se usa como epíteto divino estándar y no como adjetivo común.
  - El posesivo singular/plural del español no distingue tanto como el hebreo; «su» cubre adecuadamente el referente plural del texto.
  - La puntuación refleja paralelismo y coordinación poética en una sola oración.
