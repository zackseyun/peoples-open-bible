translation:
  language: es
  text: No callaré acerca de sus miembros[a], ni del relato de su poderosa fuerza y la gracia de sus proporciones.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: "sus partes", o "del asunto de sus poderes y la belleza de su disposición".'
    reason: lexical_alternative
lexical_decisions:
- source_word: אַחֲרִישׁ
  english_pob_choice: I will not keep silent
  chosen_spanish: No callaré
  alternatives_spanish:
  - No guardaré silencio
  - No me quedaré en silencio
  lexicon: HALOT
  rationale: El hebreo expresa la resolución de no abstenerse de hablar. En español, «no callaré» es natural, directo y conserva el tono enfático de primera persona futura/volitiva del original.
- source_word: בַּדָּיו
  english_pob_choice: his limbs
  chosen_spanish: sus miembros
  alternatives_spanish:
  - sus partes
  - sus miembros del cuerpo
  - su estructura
  lexicon: HALOT
  rationale: בַּד puede referirse a partes o miembros del cuerpo. «Miembros» mantiene la referencia anatómica concreta sin forzar un tecnicismo ni sonar tan abstracto como «partes».
- source_word: דְבַר
  english_pob_choice: the account of
  chosen_spanish: la descripción de
  alternatives_spanish:
  - el asunto de
  - el relato de
  - la cuenta de
  lexicon: HALOT
  rationale: En este encadenamiento constructo, דְבַר introduce aquello de lo que se hablará. «Descripción» reproduce con naturalidad la función explicativa del contexto poético.
- source_word: גְּבוּרוֹת
  english_pob_choice: his mighty strength
  chosen_spanish: su poderosa fuerza
  alternatives_spanish:
  - sus poderosas hazañas
  - su fuerza poderosa
  - sus fuerzas
  lexicon: HALOT
  rationale: Aunque el sustantivo puede referirse a hazañas o poderío, aquí el contexto describe el cuerpo y la potencia del ser. «Poderosa fuerza» conserva el énfasis en vigor/poder sin convertirlo en acto heroico.
- source_word: חִין
  english_pob_choice: the grace
  chosen_spanish: la gracia
  alternatives_spanish:
  - la belleza
  - el encanto
  - la hermosura
  lexicon: HALOT
  rationale: El término hebreo abarca gracia, encanto y belleza. Se mantiene «gracia» porque preserva la raíz léxica y el POB inglés también la conservó, aun cuando en español el matiz es estético.
- source_word: עֶרְכּוֹ
  english_pob_choice: his proportions
  chosen_spanish: sus proporciones
  alternatives_spanish:
  - su arreglo
  - su disposición
  - su forma
  lexicon: HALOT
  rationale: עֶרֶךְ remite a orden, disposición o arreglo. «Proporciones» comunica en español la idea de forma ordenada y bien dispuesta, coherente con la descripción corporal.
translation_notes:
  revision_awareness: La revisión más reciente no introdujo cambios; el texto español sigue de cerca el hebreo y el consenso del audit trail inglés, preservando la tensión léxica entre descripción corporal, fuerza y gracia estética.
  spanish_consistency_notes:
  - Se mantiene «gracia» para חִין por consistencia con el criterio léxico del proyecto, aunque el español sugiere también belleza o encanto.
  - Se evita «SEÑOR» u այլ terminología teológica ajena porque el versículo no contiene el nombre divino ni una cita directa de יהוה.
  - «Miembros» funciona aquí como equivalente de בַּדָּיו en un contexto anatómico; el pie de nota preserva la alternativa más literal «partes».
  - «Proporciones» traduce el valor de orden/disposición de עֶרְכּוֹ sin perder inteligibilidad en español moderno.
