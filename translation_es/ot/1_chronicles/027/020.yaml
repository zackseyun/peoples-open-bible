review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien la estructura administrativa del hebreo: dos asignaciones tribales con sus respectivos encargados. «Para los hijos de Efraín» y «para la media tribu de Manasés» reflejan adecuadamente ל con sentido de asignación y preservan «hijos» como designación tribal. Sin embargo, el tratamiento de nombres propios se aparta innecesariamente del rastro léxico auditado en inglés, que documenta transliteraciones más cercanas al hebreo para הוֹשֵׁעַ, עֲזַזְיָהוּ y פְּדָיָהוּ.'
  spanish_quality_summary: El español es claro y legible, pero las adaptaciones «Oseas», «Azazías» y «Pedaías» introducen castellanizaciones no exigidas por el texto fuente y reducen la consistencia con el criterio de transliteración documentado. «Media tribu» es natural y adecuada. La nota al pie sobre «Oseas/Hoshea» está bien planteada, pero el texto principal debería alinearse con la forma principal auditada.
  glossary_alignment: 'No hay términos teológicos sensibles en este versículo. El punto principal de alineación es onomástico: conviene conservar «Hoshea», «Azaziah» y «Pedaiah» en el texto principal, con nota para la variante española habitual «Oseas» si se desea. «Efraín», «Manasés» y «Joel» están bien.'
  issues:
  - severity: medium
    issue: Nombre principal הוֹשֵׁעַ traducido como «Oseas» en lugar de «Hoshea».
    rationale: El inglés POB documenta explícitamente «Hoshea» como la forma principal por cercanía al hebreo, con «Hosea» solo como alternativa. En español, una nota puede explicar la forma tradicional «Oseas», pero el texto principal debería preservar la decisión auditada.
  - severity: medium
    issue: Castellanización de עֲזַזְיָהוּ como «Azazías».
    rationale: La decisión léxica auditada usa «Azaziah» como transliteración. «Azazías» no es incorrecto como adaptación, pero aquí introduce una normalización no respaldada por el expediente y reduce consistencia entre nombres menos conocidos.
  - severity: medium
    issue: Castellanización de פְּדָיָהוּ como «Pedaías».
    rationale: La decisión léxica auditada usa «Pedaiah». Mantener esa forma en español es viable y más fiel al criterio documental del proyecto en este contexto.
  revised_spanish_text: 'Para los hijos de Efraín: Hoshea[a] hijo de Azaziah; para la media tribu de Manasés: Joel hijo de Pedaiah.'
