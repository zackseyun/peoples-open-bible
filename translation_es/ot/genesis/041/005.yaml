  to: Entonces durmió y soñó por segunda vez[a]; y he aquí, siete espigas[b] subían en un solo tallo[c], llenas[d] y buenas.
  rationale: Se revisa «caña» a «tallo» por naturalidad y precisión agrícola en español, y «sanas» a «llenas» para reflejar mejor el sentido de בְּרִיאוֹת como espigas bien llenas/robustas. También se corrige y simplifica la nota correspondiente.
