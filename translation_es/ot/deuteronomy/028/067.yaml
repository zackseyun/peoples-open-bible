translation:
  language: es
  text: 'Por la mañana dirás[a]: «¡Ojalá fuera de noche!» y por la noche dirás: «¡Ojalá fuera de mañana!» a causa del pavor de tu corazón que temerás[b], y a causa de la vista de tus ojos que verás.[c]'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «¿Quién dará tarde/mañana?»; es un modismo que expresa deseo intenso, por eso se traduce «¡Ojalá fuera de noche/de mañana!»'
    reason: lexical_alternative
  - marker: b
    text: 'O: «a causa del temor de tu corazón...». El hebreo repite la misma raíz: «el pavor... que temerás».'
    reason: lexical_alternative
  - marker: c
    text: 'O: «y a causa de lo que verán tus ojos». El hebreo dice literalmente «la vista de tus ojos que verás».'
    reason: lexical_alternative
lexical_decisions:
- source_word: בַּבֹּקֶר
  english_pob_choice: In the morning
  chosen_spanish: Por la mañana
  alternatives_spanish:
  - En la mañana
  - Por la mañana
  lexicon: HALOT
  rationale: La expresión temporal fija se expresa de modo natural en español con un sintagma preposicional; «por la mañana» preserva el valor temporal sin forzar un calco.
- source_word: תֹּאמַר
  english_pob_choice: you will say
  chosen_spanish: dirás
  alternatives_spanish:
  - dirás
  - dirás tú
  lexicon: HALOT
  rationale: 'El imperfecto qal en este contexto de amenaza profética se vierte naturalmente como futuro: una declaración anticipada, no un mandato.'
- source_word: מִי יִתֵּן
  english_pob_choice: If only it were
  chosen_spanish: ¡Ojalá fuera!
  alternatives_spanish:
  - ¡Quién diera que fuera!
  - ¡Si tan solo fuera!
  lexicon: HALOT
  rationale: El hebreo es una fórmula de deseo, no una pregunta literal. «¡Ojalá fuera!» comunica ese anhelo con naturalidad en español y conserva el matiz optativo.
- source_word: עֶרֶב
  english_pob_choice: evening
  chosen_spanish: la tarde
  alternatives_spanish:
  - la noche
  - la tarde
  lexicon: HALOT
  rationale: Aunque el término básico es «evening», en español «la tarde» suele ser la correspondencia más natural en este paralelismo horaria y evita una formulación demasiado literal o poco idiomática.
- source_word: וּבָעֶרֶב
  english_pob_choice: and in the evening
  chosen_spanish: y por la tarde
  alternatives_spanish:
  - y en la tarde
  - y al atardecer
  lexicon: HALOT
  rationale: Se mantiene el paralelo temporal con la primera cola; «por la tarde» es la opción más fluida y de registro bíblico digno.
- source_word: בֹּקֶר
  english_pob_choice: morning
  chosen_spanish: la mañana
  alternatives_spanish:
  - la mañana
  - el amanecer
  lexicon: HALOT
  rationale: «Mañana» conserva el contraste antitético con «tarde» y el paralelismo del texto hebreo.
- source_word: מִפַּחַד
  english_pob_choice: because of the dread
  chosen_spanish: a causa del pavor
  alternatives_spanish:
  - por el temor
  - a causa del miedo
  lexicon: HALOT
  rationale: La preposición causal se expresa con «a causa de». «Pavor» intensifica adecuadamente el terror del contexto, más fuerte que el simple «miedo».
- source_word: לְבָבְךָ
  english_pob_choice: your heart
  chosen_spanish: tu corazón
  alternatives_spanish:
  - tu corazón
  - tu interior
  lexicon: HALOT
  rationale: Se conserva la imagen hebrea del órgano interior. En español «corazón» comunica de forma natural la sede de la vida interior y emocional.
- source_word: אֲשֶׁר תִּפְחָד
  english_pob_choice: that you will dread
  chosen_spanish: que te hará temblar
  alternatives_spanish:
  - que te llenará de pavor
  - que temerás
  lexicon: HALOT
  rationale: El verbo repite la raíz del sustantivo previo; en español, «te hará temblar» transmite el efecto corporal del pavor sin perder la intensidad del temor. Evita duplicar mecánicamente la misma familia léxica cuando suena forzada.
- source_word: וּמִמַּרְאֵה עֵינֶיךָ
  english_pob_choice: and because of the sight your eyes will see
  chosen_spanish: y a causa de lo que verán tus ojos
  alternatives_spanish:
  - y a causa de la visión de tus ojos
  - y por lo que verán tus ojos
  lexicon: HALOT
  rationale: 'La construcción hebrea es concreta: lo que las ojos perciben. «Lo que verán tus ojos» mantiene la vividez y evita una frase abstracta o redundante en español.'
- source_word: תִּרְאֶה
  english_pob_choice: you will see
  chosen_spanish: verán
  alternatives_spanish:
  - verás
  - verán
  lexicon: HALOT
  rationale: El audit trail inglés destaca el énfasis en «your eyes will see». En español se armoniza con «tus ojos» y se expresa con tercera persona plural para el sujeto explícito «tus ojos».
theological_decisions:
- issue: El tono del oráculo de juicio y la intensidad emocional del lenguaje
  english_pob_reading: The verse describes ongoing dread and longing for the opposite time of day because of fear and the sights seen.
  chosen_spanish_reading: El versículo describe un miedo continuo que lleva a desear que cambie la hora del día, a causa del pavor interior y de lo que se ve.
  alternative_spanish_readings:
  - El versículo describe temor continuo que lleva a desear la tarde o la mañana
  - El versículo describe angustia constante causada por el interior temeroso y por las visiones observadas
  rationale: Conviene conservar la fuerza de la maldición sin suavizarla. «Pavor» y «te hará temblar» mantienen la intensidad del hebreo y del POB inglés, sin añadir elementos doctrinales ajenos.
  doctrine_reference: Deuteronomio 28:15–68; especialmente el marco de las maldiciones del pacto.
translation_notes:
  revision_awareness: 'La versión inglesa fue revisada para hacer más explícitas las expresiones repetidas del hebreo: «the dread of your heart that you will dread» y «the sight of your eyes that you will see». La redacción española sigue esa tendencia de mayor explicitud, pero evita duplicaciones poco naturales; por eso se optó por «a causa del pavor de tu corazón, que te hará temblar» y «a causa de lo que verán tus ojos».'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como terminología general del proyecto, aunque este versículo no contiene el nombre divino.
  - Se usó «pavor» para reproducir la intensidad de פַּחַד sin recurrir siempre a «miedo».
  - Se prefirió una formulación española idiomática para el deseo optativo («¡Ojalá fuera!») en lugar de calcar la pregunta hebrea.
