base_translation:
  language: en
  yaml_path: translation/ot/proverbs/017/002.yaml
  text: A prudent slave will rule over a son who brings shame[b][a], and among brothers he will share the inheritance.
  footnotes:
  - marker: a
    text: Or “servant.” The Hebrew עֶבֶד can denote either, but “slave” is used here because the proverb’s force depends on the social reversal of a bonded person rising above a disgraceful son.
    reason: lexical_alternative
  - marker: b
    text: Or “siblings.” Hebrew “brothers” reflects the masculine familial term and likely refers to the family heirs.
    reason: lexical_alternative
