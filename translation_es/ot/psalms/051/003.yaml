translation:
  language: es
  text: Muéstrame tu favor[a], Dios, conforme a tu amor constante[b]; conforme a la abundancia de tus misericordias[c], borra mis transgresiones.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Ten misericordia de mí». El verbo hebreo puede expresarse con lenguaje de misericordia, pero el texto principal conserva una distinción respecto de los términos posteriores para amor constante y misericordias.'
    reason: lexical_alternative
  - marker: b
    text: «Amor constante» traduce el hebreo hesed, que a menudo se refiere al amor leal, de pacto.
    reason: lexical_alternative
  - marker: c
    text: 'O: «conforme a la grandeza» o «conforme a la multitud de tus misericordias».'
    reason: lexical_alternative
lexical_decisions:
- source_word: חָנֵּנִי
  english_pob_choice: Be gracious to me
  chosen_spanish: Sé clemente conmigo
  alternatives_spanish:
  - Ten gracia de mí
  - Ten misericordia de mí
  lexicon: HALOT
  rationale: El hebreo pide favor inmerecido. En español, "sé clemente conmigo" conserva el matiz verbal de una petición directa sin fundirlo con las otras expresiones de misericordia del versículo. "Ten misericordia" es posible, pero tiende a nivelar la distinción léxica que el texto mantiene entre חנן, חסד y רחמים.
- source_word: אֱלֹהִים
  english_pob_choice: God
  chosen_spanish: Dios
  alternatives_spanish:
  - oh Dios
  - Dios mío
  lexicon: HALOT
  rationale: Es el vocativo directo al Dios de Israel. "Dios" es la forma natural y fiel en español; se conserva "oh" solo en la cadencia devocional sin añadir contenido ajeno.
- source_word: כְּחַסְדֶּךָ
  english_pob_choice: according to your steadfast love
  chosen_spanish: conforme a tu amor constante
  alternatives_spanish:
  - según tu amor leal
  - conforme a tu misericordia fiel
  lexicon: HALOT
  rationale: חסד expresa amor leal, de pacto, constante. "Amor constante" comunica bien ese valor en español litúrgico moderno y evita que "misericordia" borre la relación de fidelidad implícita. "Conforme a" reproduce la fuerza comparativa del prefijo כְּ.
- source_word: כְּרֹב
  english_pob_choice: according to your abundant
  chosen_spanish: conforme a la abundancia de
  alternatives_spanish:
  - según la grandeza de
  - conforme a la multitud de
  lexicon: HALOT
  rationale: רֹב indica abundancia o multitud. En español, "la abundancia de" suena natural y mantiene el énfasis en la plenitud de lo que sigue. También preserva la paralelidad con la cláusula anterior.
- source_word: רַחֲמֶיךָ
  english_pob_choice: mercies
  chosen_spanish: tus misericordias
  alternatives_spanish:
  - tus compasiones
  - tus entrañas de misericordia
  lexicon: HALOT
  rationale: El plural hebreo transmite múltiples actos de compasión. "Misericordias" preserva el plural y encaja bien con la estructura del versículo; "compasiones" es posible, pero menos idiomático en este contexto poético.
- source_word: מְחֵה
  english_pob_choice: blot out
  chosen_spanish: borra
  alternatives_spanish:
  - borra de una vez
  - borra totalmente
  - elimina
  lexicon: HALOT
  rationale: מחה significa borrar, borrar por completo, borrar de un registro. "Borra" es un equivalente natural en español y conserva la metáfora de cancelación/erradicación sin sonar artificial.
- source_word: פְשָׁעַי
  english_pob_choice: my transgressions
  chosen_spanish: mis transgresiones
  alternatives_spanish:
  - mis rebeliones
  - mis ofensas
  lexicon: HALOT
  rationale: פשע implica transgresión o rebelión contra autoridad. "Transgresiones" mantiene el peso moral y legal del término mejor que "ofensas", y es suficientemente transparente para el lector contemporáneo.
theological_decisions:
- issue: 'Diferenciación de los términos relacionados con la misericordia divina: חנן / חסד / רחמים'
  english_pob_reading: 'The English POB keeps distinct expressions: ''Be gracious to me,'' ''steadfast love,'' and ''mercies.'''
  chosen_spanish_reading: La versión española distingue "sé clemente conmigo", "amor constante" y "misericordias".
  alternative_spanish_readings:
  - Usar "misericordia" para las tres expresiones
  - Usar un solo campo léxico de gracia para todo el verso
  rationale: 'El hebreo apila términos relacionados pero no idénticos. Mantener distintas elecciones en español evita aplanar la textura poética y la teología de la gracia: favor pedido, amor de pacto y compasiones abundantes. La solución elegida conserva esa tensión léxica sin caer en un calco rígido.'
  doctrine_reference: Principios de fidelidad léxica y diferenciación semántica en poesía hebrea
- issue: Tratamiento de כְּ con valor comparativo en dos miembros paralelos
  english_pob_reading: '''according to your steadfast love'' / ''according to your abundant mercies'''
  chosen_spanish_reading: '"conforme a tu amor constante" / "conforme a la abundancia de tus misericordias"'
  alternative_spanish_readings:
  - '"según tu amor constante" / "según la abundancia de tus misericordias"'
  - '"por tu amor constante" / "por la abundancia de tus misericordias"'
  rationale: 'En este contexto, כְּ expresa medida o correspondencia: el suplicante apela a la magnitud del amor y las misericordias de Dios. "Conforme a" mantiene bien esa relación sin sugerir causalidad mecánica ni suavizar la intensidad de la súplica.'
  doctrine_reference: Principios de equivalencia óptima y valor preposicional de כְּ
translation_notes:
  revision_awareness: 'Coincide con el último repaso del texto fuente: no se registraron revisiones posteriores ni observaciones pendientes; el borrador español sigue la misma lectura que el audit trail inglés, preservando la distinción entre חנן, חסד y רחמים.'
  spanish_consistency_notes:
  - Se mantiene el vocativo sencillo "oh Dios" para naturalidad devocional en español.
  - '"Misericordias" conserva el plural hebreo de רחמים.'
  - '"Transgresiones" refleja el peso moral-legal de פשע sin reblandecerlo.'
  - Se evita "SEÑOR" para el nombre divino porque aquí el hebreo fuente es אֱלֹהִים, no YHWH.
