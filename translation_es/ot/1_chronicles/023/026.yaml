translation:
  language: es
  text: Y también[a], los levitas ya no tienen que llevar el tabernáculo y todos sus utensilios para su servicio.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «ya no hay necesidad de que los levitas lleven el tabernáculo y todos sus utensilios para su servicio».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְגַם
  english_pob_choice: And also
  chosen_spanish: Y también
  alternatives_spanish:
  - También
  - Y además
  lexicon: HALOT
  rationale: La conjunción aditiva conserva el enlace con la afirmación previa y la partícula de énfasis; «Y también» suena natural en español y mantiene ambos valores.
- source_word: לַלְוִיִּם
  english_pob_choice: the Levites
  chosen_spanish: a los levitas
  alternatives_spanish:
  - los levitas
  - para los levitas
  lexicon: HALOT
  rationale: El ל prefijado marca aquí al grupo afectado por la afirmación; en español se expresa con la referencia indirecta «a los levitas», que conserva el matiz funcional sin forzar una estructura impersonal poco natural.
- source_word: אֵין לָשֵׂאת
  english_pob_choice: no longer need to carry
  chosen_spanish: ya no les toca llevar
  alternatives_spanish:
  - ya no necesitan llevar
  - no tienen que llevar
  - ya no deben llevar
  lexicon: HALOT
  rationale: El hebreo dice literalmente que «no hay» para llevar, pero en contexto administrativo-cultual significa que esa carga ya no les corresponde. «Ya no les toca llevar» comunica la fuerza práctica sin convertirlo en prohibición moral.
- source_word: הַמִּשְׁכָּן
  english_pob_choice: the tabernacle
  chosen_spanish: el tabernáculo
  alternatives_spanish:
  - la morada
  - la tienda del tabernáculo
  lexicon: HALOT
  rationale: «Tabernáculo» es el equivalente cultual preciso y estable en español para מִשְׁכָּן.
- source_word: כָּל כֵּלָיו
  english_pob_choice: all its utensils
  chosen_spanish: todos sus utensilios
  alternatives_spanish:
  - todos sus vasos
  - todos sus instrumentos
  - todos sus objetos
  lexicon: HALOT
  rationale: כֵּלִים abarca implementos/utensilios del servicio. «Utensilios» conserva bien el sentido funcional y el conjunto total indicado por כָּל.
- source_word: לַעֲבֹדָתוֹ
  english_pob_choice: for its service
  chosen_spanish: para su servicio
  alternatives_spanish:
  - para el servicio de él
  - para servirlo
  lexicon: HALOT
  rationale: El sufijo posesivo se refiere al tabernáculo y/o a su equipamiento cultual. «Para su servicio» mantiene la relación de finalidad de manera clara y sobria.
translation_notes:
  revision_awareness: 'Se corrigió la presentación de la nota para que el marcador [a] aparezca en el texto principal, evitando una nota sin anclaje. Además, se mantuvo la lectura de conjunto del hebreo: el verbo no expresa mera capacidad, sino cese de una obligación de carga en el marco de la reorganización levítica.'
  spanish_consistency_notes:
  - Se usa «levitas» en minúscula por tratarse de un gentilicio/denominación de grupo dentro del texto corrido.
  - Se mantiene «tabernáculo» y «utensilios» como terminología cultual consistente con el registro bíblico en español.
  - «Ya no les toca» refleja el valor contextual de la expresión hebrea de manera idiomática sin añadir contenido doctrinal.
