translation:
  language: es
  text: 'Y estos son los nombres de los jefes de Esaú, según sus clanes, según sus lugares, por sus nombres: Jefe Timna[a], Jefe Alva[b], Jefe Jetet.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Timna también puede transliterarse «Timnah».
    reason: lexical_alternative
  - marker: b
    text: Hebreo «Alva»; compárese la forma relacionada «Alía» en 1 Crónicas 1:51.
    reason: cross_reference
lexical_decisions:
- source_word: וְאֵלֶּה
  english_pob_choice: And these are
  chosen_spanish: Y estos son
  alternatives_spanish:
  - Estos son
  lexicon: HALOT
  rationale: La combinación introductoria con ו y el demostrativo funciona como enlace narrativo y de lista. «Y estos son» conserva esa continuidad en español sin volverlo más pesado de lo necesario.
- source_word: שְׁמוֹת
  english_pob_choice: the names of
  chosen_spanish: los nombres de
  alternatives_spanish:
  - nombres de
  lexicon: HALOT
  rationale: El sustantivo en constructo pide una relación posesiva clara. «Los nombres de» reproduce el valor del hebreo en un encabezado genealógico.
- source_word: אַלּוּפֵי
  english_pob_choice: chiefs
  chosen_spanish: jefes
  alternatives_spanish:
  - jefes de clan
  - líderes
  - duques
  lexicon: HALOT
  rationale: En Génesis 36 אַלּוּף designa a los jefes tribales o de clan de Edom. «Jefes» es natural en español y evita «duques», que sería históricamente engañoso. El marco de clan queda explícito en la frase siguiente.
- source_word: עֵשָׂו
  english_pob_choice: Esau
  chosen_spanish: Esaú
  lexicon: HALOT
  rationale: Nombre propio bíblico en su forma española estándar.
- source_word: לְמִשְׁפְּחֹתָם
  english_pob_choice: according to their clans
  chosen_spanish: según sus clanes
  alternatives_spanish:
  - por sus clanes
  - según sus familias
  lexicon: HALOT
  rationale: מִשְׁפָּחָה aquí pertenece al ámbito genealógico-tribal; «clanes» comunica mejor que «familias» en español. «Según» mantiene el valor clasificatorio del prefijo ל.
- source_word: לִמְקֹמֹתָם
  english_pob_choice: according to their places
  chosen_spanish: según sus lugares
  alternatives_spanish:
  - por sus lugares
  - según sus asentamientos
  lexicon: HALOT
  rationale: Se preserva la literalidad de מָקוֹם sin concretar más de lo que el texto dice. «Lugares» es más natural en español que calcar «places» con otra construcción rígida.
- source_word: בִּשְׁמֹתָם
  english_pob_choice: by their names
  chosen_spanish: por sus nombres
  alternatives_spanish:
  - según sus nombres
  - nombrados individualmente
  lexicon: HALOT
  rationale: La preposición ב cumple una función de clasificación/listado. «Por sus nombres» mantiene el orden del hebreo y su sentido enumerativo.
- source_word: אַלּוּף
  english_pob_choice: Chief
  chosen_spanish: jefe
  alternatives_spanish:
  - jefe de clan
  - líder
  - duque
  lexicon: HALOT
  rationale: Se mantiene una traducción consistente del título repetido ante cada nombre. «Jefe» es claro y evita una carga nobiliaria ajena al contexto.
- source_word: תִּמְנָע
  english_pob_choice: Timna
  chosen_spanish: Timna
  alternatives_spanish:
  - Timná
  lexicon: HALOT
  rationale: Se sigue la transliteración breve del hebreo consonántico, y se conserva la posibilidad tradicional como variante en nota.
- source_word: עַֽלְוָה
  english_pob_choice: Alvah
  chosen_spanish: Alvá
  alternatives_spanish:
  - Alva
  lexicon: HALOT
  rationale: Se translitera el nombre propio en forma hispana breve y transparente. Se mantiene la correspondencia con la forma hebrea del versículo, mientras la nota permite la relación con la forma afín de 1 Crónicas 1:51.
- source_word: יְתֵת
  english_pob_choice: Jetheth
  chosen_spanish: Jetet
  alternatives_spanish:
  - Yetet
  lexicon: HALOT
  rationale: Se conserva el nombre propio según la forma hebrea de este versículo, sin armonizarlo con nombres parecidos de otros pasajes.
translation_notes:
  revision_awareness: El inglés POB permanece sin cambios en la última revisión disponible; esta propuesta sigue el mismo contenido y decisiones léxicas, adaptadas al español con equivalencias naturales y sin añadir interpretaciones no sustentadas.
  spanish_consistency_notes:
  - Se usa «jefes» para אַלּוּף de manera uniforme, alineado con la función de título tribal en Génesis 36.
  - Se conserva «clanes» para מִשְׁפָּחֹתָם por su valor genealógico, evitando «familias» por posible reducción semántica.
  - Se mantiene la serie clasificatoria «según sus clanes, según sus lugares, por sus nombres» para reflejar la cadencia del hebreo.
  - Los nombres propios se transliteran de modo breve y publicable en español, con notas donde el audit trail documenta variantes relevantes.
