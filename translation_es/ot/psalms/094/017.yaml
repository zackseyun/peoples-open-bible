translation:
  language: es
  text: Si Yahvé no hubiera sido mi ayuda[a], mi alma pronto habría habitado en silencio[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «mi vida»; el hebreo נַפְשִׁי (néfesh) puede denotar la vida, el yo o la persona misma.
    reason: lexical_alternative
  - marker: b
    text: El «silencio» probablemente alude al silencio de la muerte o del Seol.
    reason: theological_note
lexical_decisions:
- source_word: לוּלֵי
  english_pob_choice: If ... had not
  chosen_spanish: Si ... no hubiera
  alternatives_spanish:
  - A menos que
  - De no haber
  lexicon: HALOT
  rationale: La partícula introduce una condición contrafactual pasada; en español, «Si ... no hubiera» comunica con naturalidad la irrealidad del hecho pasado sin perder el valor condicional del hebreo.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  - el SEÑOR
  lexicon: HALOT
  rationale: Se conserva el nombre divino propio del Tetragrama según la convención del proyecto, evitando la sustitución por un título y manteniendo la transparencia con el texto fuente.
- source_word: עֶזְרָתָה לִּי
  english_pob_choice: been my help
  chosen_spanish: mi ayuda
  alternatives_spanish:
  - mi socorro
  - mi asistencia
  lexicon: HALOT
  rationale: El sustantivo hebreo expresa la cualidad/acción de ayudar aplicada a Yahvé en relación posesiva con el hablante. «Mi ayuda» refleja bien la construcción breve y poética del hebreo; el auxiliar verbal español en la prótasis ya suple la fuerza contrafactual.
- source_word: כִּמְעַט
  english_pob_choice: soon
  chosen_spanish: pronto
  alternatives_spanish:
  - casi
  - casi enseguida
  - en poco tiempo
  lexicon: HALOT
  rationale: 'Aunque el hebreo puede sugerir proximidad o casi-ocurrencia, en esta construcción el sentido comunicativo es de inminencia: la muerte habría llegado muy cerca. «Pronto» suena natural y preserva esa cercanía temporal.'
- source_word: שָׁכְנָה
  english_pob_choice: would ... have dwelt
  chosen_spanish: habría habitado
  alternatives_spanish:
  - habría morado
  - habría vivido
  - habría habitado/estado
  lexicon: HALOT
  rationale: שׁכן significa habitar, morar o establecerse. «Habría habitado» conserva la imagen de residencia sin suavizarla a un mero «vivir».
- source_word: דוּמָה
  english_pob_choice: silence
  chosen_spanish: silencio
  alternatives_spanish:
  - el silencio
  - la quietud
  - el reino del silencio
  lexicon: HALOT
  rationale: El término nombra silencio y, en contextos salmódicos, puede sugerir la esfera de la muerte. Se mantiene el núcleo semántico «silencio» en el texto principal para no resolver de antemano la tensión interpretativa.
- source_word: נַפְשִׁי
  english_pob_choice: my soul
  chosen_spanish: mi alma
  alternatives_spanish:
  - mi vida
  - mi ser
  - yo
  lexicon: HALOT
  rationale: Aunque נֶפֶשׁ puede significar vida, ser o yo, «alma» es la forma tradicional y fiel en español para este registro poético. Se conserva la antropología hebrea sin trivializarla.
theological_decisions:
- issue: Implicación de muerte/Sheol en דוּמָה
  english_pob_reading: '''Silence'' likely refers to the silence of death or Sheol.'
  chosen_spanish_reading: «silencio» queda en el texto principal, con la posibilidad de una alusión a la muerte o al Seol implícita, no explicitada
  alternative_spanish_readings:
  - el reino del silencio
  - la muerte
  - el Seol
  rationale: El hebreo dice literalmente 'silencio'; la referencia a muerte/Seol es probable pero interpretativa. Mantener el término literal preserva la tensión teológica y deja que el contexto poético la sugiera sin imponerla.
  doctrine_reference: 'Translation philosophy #3: Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: 'El paquete de fuente y el audit trail en inglés muestran acuerdo alto y sin revisiones aplicadas; esta versión española sigue la lectura estable y conserva las dos tensiones principales: נֶפֶשׁ como «alma» y דוּמָה como «silencio» con posible alusión a la muerte.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» para el Tetragrama, conforme al estándar del proyecto.
  - «Alma» se usa aquí por el registro poético y por fidelidad a נַפְשִׁי, mientras la nota preserva la alternativa semántica «vida».
  - «Silencio» se conserva sin añadir «muerte» al texto principal para no cerrar la interpretación.
  - La puntuación y el orden sintáctico buscan una frase española natural, manteniendo la estructura condicional contrafactual del hebreo.
