    issue: «como cobertura» es poco natural en español
    rationale: Aunque semánticamente posible, «cobertura» suena técnica o abstracta en este contexto poético. El hebreo לְמָסָךְ denota una cobertura/pantalla funcional; «como cubierta» transmite mejor esa función en español digno y legible.
  - severity: low
    issue: La nota al pie puede ajustarse al cambio léxico principal
    rationale: Si se cambia el texto principal a «como cubierta», conviene que la nota conserve las alternativas sin generar desajuste con el ancla ni con la razón léxica del expediente.
