review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura de súplica, el perdón del pecado, la enseñanza del buen camino, la lluvia y la tensión teológica de ''tu tierra'' dada como herencia. Sin embargo, se aparta innecesariamente del POB auditado en dos puntos: traduce תִּשְׁמַע הַשָּׁמַיִם como ''desde el cielo'' cuando la decisión auditada prefería ''en el cielo'', y desplaza la nota alternativa inglesa a una nota española incorrectamente anclada en ''tu tierra'' en vez de la cláusula ''cuando les enseñes...''. Además, la nota [a] no corresponde a una ambigüedad fuente significativa en ese lugar.'
  spanish_quality_summary: 'El español es claro y digno, pero la puntuación y las notas pueden mejorarse. ''Que oigas en el cielo'' suena natural en registro bíblico y sigue mejor la decisión documentada. ''por el cual deben andar'' es aceptable, pero ''en el cual deben andar'' calca mejor la imagen del ''camino'' sin extrañeza. Las notas actuales introducen confusión: [a] comenta una aposición ya clara en el texto, y [b] afirma una alternativa idéntica al texto y no preserva la alternativa real documentada.'
  glossary_alignment: No hay conflicto con los términos del proyecto. 'siervos', 'pecado', 'tierra' y 'herencia' están bien elegidos en este contexto. No aparece el nombre divino en el versículo. La revisión propuesta alinea mejor la frase espacial con la decisión POB ('en el cielo') y recoloca la nota léxica donde corresponde.
  issues:
  - severity: medium
    issue: '''desde el cielo'' en lugar de la elección auditada ''en el cielo'''
    rationale: El hebreo es idiomático y permite suplir preposición, pero el POB inglés documentó y prefirió 'hear in heaven'. El español puede y debe seguir esa preferencia salvo necesidad fuerte, que aquí no existe.
  - severity: high
    issue: La nota [b] está anclada a 'tu tierra' pero la alternativa documentada corresponde a 'cuando les enseñes...'
    rationale: La nota inglesa b preserva una alternativa para כִּי תוֹרֵם / 'when you teach them', no para עַל אַרְצְךָ. La nota española actual desinforma sobre la evidencia fuente.
  - severity: medium
    issue: La nota [a] es innecesaria y comenta un punto no ambiguo
    rationale: '''Tu pueblo Israel'' ya está en el texto y la nota sobre el mismo grupo designado como ''tus siervos'' no preserva una variante ni aclara una ambigüedad relevante del original.'
  - severity: low
    issue: '''por el cual deben andar'' puede afinarse a ''en el cual deben andar'''
    rationale: Ambas opciones son inteligibles, pero 'andar en el camino' conserva más directamente la metáfora bíblica y se acerca mejor al audit trail 'in which they should walk'.
  revised_spanish_text: entonces, que oigas en el cielo[a] y perdones el pecado de tus siervos, tu pueblo Israel, cuando les enseñes el buen camino en el cual deben andar[b]. Y que des lluvia sobre tu tierra, que has dado a tu pueblo como herencia.
  revised_footnotes:
