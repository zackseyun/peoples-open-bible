    rationale: Aunque es defendible como reflejo del pleonasmo griego, «son poderosos» mantiene bien el sentido en español natural y digno sin pérdida significativa.
  revised_spanish_text: y que son poderosos. Le contaron sus guerras y las hazañas[a] que hicieron entre los gálatas[b], y que los habían sometido y los habían puesto bajo tributo.
