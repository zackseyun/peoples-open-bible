translation:
  language: es
  text: Reúnanse y vengan[a]; acérquense juntos, sobrevivientes de las naciones. No saben nada los que llevan la madera de su imagen tallada[b] y oran a un dios que no puede salvar[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Reúnanse y vengan; acérquense juntos».'
    reason: lexical_alternative
  - marker: b
    text: 'Literalmente: «la madera de su imagen tallada»; es decir, un ídolo de madera.'
    reason: lexical_alternative
  - marker: c
    text: 'O: «oran a un dios que no salva».'
    reason: alternative_reading
lexical_decisions:
- source_word: הִקָּבְצוּ
  english_pob_choice: Gather yourselves
  chosen_spanish: Congregaos
  alternatives_spanish:
  - Reuníos
  - Juntaos
  lexicon: HALOT
  rationale: El imperativo nifal plural llama a que se reúnan por sí mismos. «Congregaos» conserva ese matiz reflexivo/colectivo en un español bíblico claro y natural.
- source_word: וָבֹאוּ
  english_pob_choice: and come
  chosen_spanish: y venid
  alternatives_spanish:
  - y venid aquí
  - y acercaos
  lexicon: HALOT
  rationale: בוא expresa un llamado simple a venir; «venid» es directo y fiel al mandato del pasaje.
- source_word: הִתְנַגְּשׁוּ
  english_pob_choice: draw near
  chosen_spanish: acercaos
  alternatives_spanish:
  - aproximaos
  - acercaos juntos
  lexicon: HALOT
  rationale: En lenguaje de convocatoria, el hitpael de נגש comunica acercamiento. «Acercaos» es idiomático en español y mantiene la fuerza exhortativa.
- source_word: יַחְדָּו
  english_pob_choice: together
  chosen_spanish: juntos
  alternatives_spanish:
  - todos juntos
  - a una
  lexicon: HALOT
  rationale: El adverbio subraya acción colectiva; «juntos» es la equivalencia más natural y clara.
- source_word: פְּלִיטֵי הַגּוֹיִם
  english_pob_choice: you survivors of the nations
  chosen_spanish: survivientes de las naciones
  alternatives_spanish:
  - sobrevivientes de las naciones
  - fugitivos de las naciones
  - los escapados de las naciones
  lexicon: HALOT
  rationale: פְּלִיטִים indica los que escaparon o sobrevivieron. «Survivientes» comunica bien el sentido y funciona como vocativo dentro de la invocación profética.
- source_word: לֹא יָדְעוּ
  english_pob_choice: They have no knowledge
  chosen_spanish: No tienen conocimiento
  alternatives_spanish:
  - No saben
  - Nada saben
  lexicon: HALOT
  rationale: El perfecto plural se usa como caracterización general. «No tienen conocimiento» conserva el tono sentencioso y la idea de ignorancia culpable.
- source_word: הַנֹּשְׂאִים
  english_pob_choice: those who carry
  chosen_spanish: los que llevan
  alternatives_spanish:
  - los que cargan
  - los portadores de
  lexicon: HALOT
  rationale: El participio sustantivado describe una acción continua o habitual. «Los que llevan» suena natural y mantiene el valor descriptivo.
- source_word: עֵץ פִּסְלָם
  english_pob_choice: the wood of their carved image
  chosen_spanish: la madera de su imagen tallada
  alternatives_spanish:
  - la madera de su ídolo tallado
  - el madero de su imagen esculpida
  lexicon: HALOT
  rationale: La construcción hebrea es literalmente «madera de su imagen tallada». «Madera» y «imagen tallada» conservan la concreción polémica contra un objeto fabricado.
- source_word: וּמִתְפַּלְלִים
  english_pob_choice: and pray
  chosen_spanish: y oran
  alternatives_spanish:
  - y están orando
  - y ruegan
  lexicon: HALOT
  rationale: El participio hitpael describe una acción dirigida a una deidad. «Oran» es la forma más idiomática en español para este contexto.
- source_word: אֶל אֵל
  english_pob_choice: to a god
  chosen_spanish: a un dios
  alternatives_spanish:
  - a una deidad
  - a un dios falso
  lexicon: HALOT
  rationale: El hebreo usa אֵל en sentido irónico/polémico. «Un dios» preserva la forma del reproche sin convertirlo anticipadamente en explicación interpretativa.
- source_word: לֹא יוֹשִׁיעַ
  english_pob_choice: that cannot save
  chosen_spanish: que no puede salvar
  alternatives_spanish:
  - que no salva
  - incapaz de salvar
  lexicon: HALOT
  rationale: יושיע expresa salvar/liberar. «No puede salvar» resalta la impotencia del ídolo, siguiendo la fuerza del texto y la opción inglesa.
theological_decisions:
- issue: Forma del llamado profético a los sobrevivientes de las naciones
  english_pob_reading: Gather yourselves and come; draw near together, you survivors of the nations.
  chosen_spanish_reading: Congregaos y venid; acercaos juntos, sobrevivientes de las naciones.
  alternative_spanish_readings:
  - Reuníos y venid; acercaos juntos, sobrevivientes de las naciones.
  - Congregaos y venid; acercaos todos juntos, sobrevivientes de las naciones.
  rationale: El hebreo presenta una serie de imperativos enfáticos dirigidos a un grupo remanente. La traducción mantiene ese tono de desafío convocatorio sin suavizarlo.
  doctrine_reference: Translation philosophy §§1, 3, 6
- issue: Ironía teológica en אֵל לֹא יוֹשִׁיעַ
  english_pob_reading: a god that cannot save
  chosen_spanish_reading: a un dios que no puede salvar
  alternative_spanish_readings:
  - a un dios que no salva
  - a un ídolo que no puede salvar
  rationale: El texto nombra al objeto de culto con el término genérico «dios» de modo irónico, pero niega su capacidad de salvar. Se conserva esa tensión sin borrar la sátira profética ni sustituirla por una explicación más plana.
  doctrine_reference: Translation philosophy §§1, 3, 6
translation_notes:
  revision_awareness: 'El pasaje coincide sustancialmente con el audit trail inglés: se conserva la estructura de imperativos, la designación de los destinatarios como sobrevivientes de las naciones, la referencia concreta a la madera de la imagen tallada y la ironía de un dios incapaz de salvar. No se observaron revisiones textuales en el historial aplicado; la redacción española sigue la solución estable del registro inglés con ajuste idiomático mínimo.'
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» fuera de este versículo porque el hebreo aquí no contiene el nombre divino.
  - Se eligió «survivientes» para פְּלִיטֵי en coherencia con el sentido de los escapados que quedan tras juicio o catástrofe.
  - «Dios» en singular se usa con valor irónico, reflejando el hebreo אֵל sin añadir «falso» al texto principal.
  - Se preservó la concreción de «madera»/«imagen tallada» para no perder la crítica material contra la idolatría.
  - La puntuación reproduce la secuencia exhortativa y la cláusula final de reproche en una sola unidad discursiva.
