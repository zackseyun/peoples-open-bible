  text: מִן הַ/מַּמְלָכוֹת֙ תִּהְיֶ֣ה שְׁפָלָ֔ה וְ/לֹֽא תִתְנַשֵּׂ֥א ע֖וֹד עַל הַ/גּוֹיִ֑ם וְ/הִ֨מְעַטְתִּ֔י/ם לְ/בִלְתִּ֖י רְד֥וֹת בַּ/גּוֹיִֽם־־־׃
base_translation:
  language: en
  yaml_path: translation/ot/ezekiel/029/015.yaml
  text: It will be the lowliest of the kingdoms[a], and it will no longer exalt itself above the nations; and I will diminish them[d][c][b], so that they will not rule over the nations.
  footnotes:
  - marker: a
    text: Or 'among the kingdoms' for 'of the kingdoms.' The Hebrew construction marks Egypt as the most abased in comparison with the other kingdoms.
    reason: lexical_alternative
  - marker: b
    text: Or 'be lifted up' instead of 'exalt itself.' The Hebrew can express either passive elevation or reflexive self-exaltation; the context of national pride favors 'exalt itself.'
    reason: lexical_alternative
  - marker: c
    text: Literally 'I will make them few.' The pronoun is plural, referring to Egypt's people/power collectively.
    reason: lexical_alternative
  - marker: d
    text: Hebrew 'in/among the nations'; rendered 'over the nations' because the verb 'rule' in English normally takes 'over' for the object of dominion.
    reason: lexical_alternative
