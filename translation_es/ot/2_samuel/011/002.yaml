translation_notes:
  revision_awareness: El inglés POB revisó el verbo de movimiento de «was walking» a «walked» para reflejar mejor la secuencia wayyiqtol hebrea. En esta versión española se eligió un pasado simple («caminó») que corresponde a esa secuencia narrativa y se mantuvo la nota léxica sobre בית המלך como «casa del rey» con la alternativa contextual «palacio».
  spanish_consistency_notes:
  - Se usó «Dios/Yahvé» no aplica en este versículo; no hay nombres divinos.
  - Se mantuvo «casa del rey» en el texto principal por cercanía al hebreo y para respetar la alternativa contextual documentada.
  - «Bañándose» conserva el aspecto progresivo del participio hebreo sin sobrerreformular.
  - El cierre «muy hermosa de aspecto» preserva el énfasis en la apariencia física que marca מַרְאֶה.
