translation:
  language: es
  text: y ella olvida que un pie podría aplastarlos[a], y un animal salvaje[b] podría pisotearlos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Literalmente: ''un pie podría aplastarla o aplastarlo ... un animal salvaje podría pisotearla o pisotearlo''; el sufijo femenino singular probablemente remite de manera colectiva a los huevos o crías dejados atrás.'
    reason: lexical_alternative
  - marker: b
    text: O 'la bestia del campo', una traducción más formal de la expresión hebrea para un animal salvaje terrestre.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַתִּשְׁכַּח
  english_pob_choice: and she forgets
  chosen_spanish: y ella olvida
  alternatives_spanish:
  - y ella ha olvidado
  - y se le olvida
  lexicon: HALOT
  rationale: El wayyiqtol 3fs continúa la descripción vívida en presente narrativo. En español, el presente conserva mejor el flujo poético que un pretérito simple.
- source_word: כִּי
  english_pob_choice: that
  chosen_spanish: que
  alternatives_spanish:
  - porque
  - pues
  lexicon: HALOT
  rationale: Introduce el contenido de lo olvidado, no una causa; 'que' es la correspondencia natural en español.
- source_word: רֶגֶל
  english_pob_choice: a foot
  chosen_spanish: un pie
  alternatives_spanish:
  - el pie
  - un paso
  lexicon: HALOT
  rationale: El sustantivo es indefinido y concreto; 'un pie' conserva la imagen corporal sin volverla abstracta.
- source_word: תְּזוּרֶהָ
  english_pob_choice: may crush them
  chosen_spanish: podría aplastarlos
  alternatives_spanish:
  - podría prensarlos
  - podría pisarlos
  lexicon: HALOT
  rationale: El verbo expresa daño por la acción del pie; 'aplastar' comunica bien el resultado probable en español. El sufijo femenino singular se entiende colectivamente como referencia a lo dejado atrás (huevos o crías), por eso el objeto va en masculino plural idiomático.
- source_word: וְחַיַּת הַשָּׂדֶה
  english_pob_choice: and a wild animal
  chosen_spanish: y una bestia del campo
  alternatives_spanish:
  - y un animal salvaje
  - y la bestia del campo
  lexicon: HALOT
  rationale: La expresión hebrea literal 'animal/bestia del campo' puede mantenerse sin perder claridad. 'Bestia del campo' preserva mejor la textura de la imagen y la posible fórmula fija del hebreo.
- source_word: תְּדוּשֶׁהָ
  english_pob_choice: may trample them
  chosen_spanish: podría pisotearlos
  alternatives_spanish:
  - podría hollarlos
  - podría triturarlos
  lexicon: HALOT
  rationale: El verbo דושׁ significa pisar/trillar; en este contexto, 'pisotear' da una equivalencia natural y paralela a 'aplastar' en la primera cláusula.
translation_notes:
  revision_awareness: El pasaje coincide estrechamente con la versión inglesa auditada; no se identificaron revisiones aplicadas en el material de referencia, y la propuesta mantiene la misma decisión semántica central con equivalente natural en español.
  spanish_consistency_notes:
  - Se conservó el paralelismo verbal con dos futuros de posibilidad ('podría... podría...') para reflejar la fuerza modal del inglés 'may'.
  - Se mantuvo 'bestia del campo' como opción marcada en nota para respetar la expresión hebrea literal sin forzar solo una paráfrasis moderna.
  - Los objetos pronominales en español se pluralizan de forma idiomática para la referencia colectiva a huevos o crías, siguiendo la nota auditada del inglés.
