translation:
  language: es
  text: 'Entonces me dijo[a]: «¿Has visto esto[d][c][b], hijo de hombre?» Entonces me llevó y me hizo volver a la orilla del arroyo.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «¿Has visto?»'
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: vocativo tradicional «hijo de hombre».'
    reason: lexical_alternative
  - marker: c
    text: 'O: «el borde del arroyo»; hebreo literalmente «el labio del arroyo».'
    reason: lexical_alternative
  - marker: d
    text: 'O: «wadi» o «río», según el contexto.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר אֵלַי
  english_pob_choice: Then he said to me
  chosen_spanish: Entonces me dijo
  alternatives_spanish:
  - Y me dijo
  - Luego me dijo
  lexicon: WLC / uso narrativo del wayyiqtol
  rationale: El waw consecutivo avanza la narración; “Entonces” conserva la secuencia natural en español sin perder el valor de continuación narrativa.
- source_word: הֲרָאִיתָ
  english_pob_choice: Have you seen this
  chosen_spanish: ¿Has visto esto?
  alternatives_spanish:
  - ¿Has visto?
  - ¿Lo has visto?
  lexicon: WLC / interrogativa perfectiva
  rationale: La pregunta requiere un castellano idiomático y fiel al matiz de constatación. “Esto” explicita el objeto implícito en el contexto, como en la versión inglesa auditada.
- source_word: בֶן אָדָם
  english_pob_choice: son of man
  chosen_spanish: hijo de hombre
  alternatives_spanish:
  - ser humano
  - mortal
  lexicon: WLC / vocativo fijo profético
  rationale: Se conserva la fórmula vocativa recurrente de Ezequiel. “Hijo de hombre” refleja el hebreo de modo más transparente que una paráfrasis como “ser humano” o “mortal”.
- source_word: וַיּוֹלִכֵנִי
  english_pob_choice: he led me
  chosen_spanish: me llevó
  alternatives_spanish:
  - me condujo
  - me hizo ir
  lexicon: WLC / hiphil de הלך
  rationale: Aunque el valor causativo está presente, en español “me llevó” transmite con naturalidad el movimiento guiado sin volverse rígido.
- source_word: וַיְשִׁבֵנִי
  english_pob_choice: brought me back
  chosen_spanish: me hizo volver
  alternatives_spanish:
  - me trajo de vuelta
  - me devolvió
  lexicon: WLC / hiphil de שוב
  rationale: El sentido causativo de retorno se expresa bien con “me hizo volver”; mantiene la idea de regreso sin introducir una cercanía espacial que no exige el hebreo.
- source_word: שְׂפַת
  english_pob_choice: bank
  chosen_spanish: ribera
  alternatives_spanish:
  - orilla
  - borde
  - labio
  lexicon: WLC / sentido topográfico junto al agua
  rationale: “Ribera” es el equivalente más claro y digno en español para el borde de un curso de agua. Se evita “labio”, que sería demasiado literal para el texto principal.
- source_word: הַנָּחַל
  english_pob_choice: the stream
  chosen_spanish: del arroyo
  alternatives_spanish:
  - del torrente
  - del wadi
  - del río
  lexicon: WLC / נחל
  rationale: En este contexto visionario, נחל puede designar un cauce o corriente de agua. “Arroyo” es suficientemente natural en español y no fuerza el término hacia “río”.
theological_decisions:
- issue: Tratamiento del vocativo profético בֶן אָדָם
  english_pob_reading: son of man
  chosen_spanish_reading: hijo de hombre
  alternative_spanish_readings:
  - ser humano
  - mortal
  rationale: La fórmula funciona como título vocativo fijo en Ezequiel. Mantener “hijo de hombre” preserva la resonancia literaria y teológica del hebreo sin neutralizarla.
  doctrine_reference: 'DOCTRINE.md: fidelidad formal y conservación de títulos recurrentes'
translation_notes:
  revision_awareness: 'Se revisó la línea en línea con el audit trail inglés: se mantuvieron las equivalencias ya justificadas (vocativo fijo, causativos, topografía acuática) y se evitó una traducción mecánica; no fue necesario introducir cambios adicionales respecto del sentido del original hebreo.'
  spanish_consistency_notes:
  - Se conserva el tratamiento narrativo de sucesión con «Entonces».
  - Se mantiene la fórmula profética fija «hijo de hombre» en lugar de una paráfrasis.
  - «Ribera» + «arroyo» reproduce con naturalidad el borde de un curso de agua sin sobrerrepresentar נחל como «río».
  - Los marcadores de nota siguen el orden a, b, c, d y aparecen anclados en el texto principal.
