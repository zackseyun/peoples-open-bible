translation:
  language: es
  text: Están sobre su espada[a], cometen abominaciones y cada uno contamina a la esposa de su prójimo; ¿poseerán entonces la tierra?[b]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literalmente, «están sobre su espada». La expresión probablemente alude a la confianza en la violencia o en el poder armado.
    reason: lexical_alternative
  - marker: b
    text: 'O: «¿heredarán entonces la tierra?»'
    reason: lexical_alternative
lexical_decisions:
- source_word: עֲמַדְתֶּם עַל חַרְבְּכֶם
  english_pob_choice: You stand on your sword
  chosen_spanish: Se mantienen sobre su espada
  alternatives_spanish:
  - Se ponen sobre su espada
  - Se apoyan en su espada
  - Se mantienen en su espada
  lexicon: HALOT
  rationale: El hebreo es literalmente ‘estar de pie sobre la espada’, pero en contexto expresa una postura agresiva o de violencia confiada en las armas. ‘Se mantienen sobre su espada’ conserva la imagen verbal sin introducir una paráfrasis más interpretativa que el español no necesite.
- source_word: חַרְבְּכֶם
  english_pob_choice: your sword
  chosen_spanish: su espada
  alternatives_spanish:
  - su arma
  - sus espadas
  lexicon: HALOT
  rationale: חרב significa específicamente ‘espada’. En español, el singular genérico con valor colectivo funciona bien aquí y preserva la imagen concreta de violencia armada.
- source_word: עֲשִׂיתֶן תּוֹעֵבָה
  english_pob_choice: you commit abominations
  chosen_spanish: cometen abominaciones
  alternatives_spanish:
  - hacen una abominación
  - practican cosas detestables
  lexicon: HALOT
  rationale: תּוֹעֵבָה designa algo abominable o detestable, con fuerza moral y a menudo cultual. El plural español ‘abominaciones’ comunica el carácter reiterado o característico de la conducta, como en el audit trail inglés.
- source_word: וְאִישׁ
  english_pob_choice: and each of you
  chosen_spanish: y cada uno
  alternatives_spanish:
  - y cada hombre
  - y un hombre
  lexicon: HALOT
  rationale: אִישׁ tiene aquí valor distributivo. ‘Cada uno’ expresa naturalmente ese sentido en español y mantiene el segundo plural del contexto.
- source_word: אֵשֶׁת רֵעֵהוּ
  english_pob_choice: his neighbor’s wife
  chosen_spanish: la esposa de su prójimo
  alternatives_spanish:
  - la mujer de su prójimo
  - la esposa de su compañero
  lexicon: HALOT
  rationale: רֵעַ puede significar prójimo, compañero o vecino. ‘Prójimo’ conserva la dimensión relacional y comunitaria del delito, y ‘esposa’ evita la ambigüedad de ‘mujer’ en español.
- source_word: טִמֵּאתֶם
  english_pob_choice: defiles
  chosen_spanish: deshonra
  alternatives_spanish:
  - contamina
  - mancha
  - hace impuro
  lexicon: HALOT
  rationale: El verbo טמא significa contaminar o volver impuro. En este contexto sexual, ‘deshonra’ comunica bien el acto de profanación moral y social, sin perder del todo la idea de impureza; es una opción estilística que el español admite con naturalidad.
- source_word: וְהָאָרֶץ תִּירָשׁוּ
  english_pob_choice: Shall you then possess the land?
  chosen_spanish: ¿poseerán entonces la tierra?
  alternatives_spanish:
  - ¿heredarán entonces la tierra?
  - ¿tendrán entonces posesión de la tierra?
  lexicon: HALOT
  rationale: ירש puede significar ‘poseer’ o ‘heredar’. ‘Poseer’ encaja con la reivindicación territorial inmediata y mantiene la fuerza acusatoria de la pregunta retórica; ‘heredar’ quedaría como alternativa válida, pero menos directa en español moderno.
theological_decisions:
- issue: Valor interrogativo final
  english_pob_reading: 'Rendered as a rhetorical question: ''Shall you then possess the land?'''
  chosen_spanish_reading: ¿poseerán entonces la tierra?
  alternative_spanish_readings:
  - Y poseerán la tierra.
  - ¿heredarán entonces la tierra?
  rationale: El contexto es de reprensión profética, no de promesa. La pregunta retórica en español reproduce mejor la censura implícita del hebreo y la lectura del POB inglés.
  doctrine_reference: Translation philosophy §1, §3
- issue: Conservación de la violencia armada como imagen central
  english_pob_reading: '''You stand on your sword'' as a likely idiom of reliance on violent power'
  chosen_spanish_reading: Se mantienen sobre su espada
  alternative_spanish_readings:
  - Se apoyan en su espada
  - Se sostienen con su espada
  rationale: La expresión mantiene la imagen cruda del hebreo y permite que el lector perciba la denuncia de seguridad violenta, sin suavizarla en exceso con una interpretación explicativa.
  doctrine_reference: Translation philosophy §2
translation_notes:
  revision_awareness: 'He seguido el ajuste más reciente del audit trail al preferir una traducción más cercana al hebreo literal en la primera cláusula, pero sin adoptar una calca torpe: el español conserva la imagen de estar ‘sobre su espada’ y mantiene la pregunta retórica final. También he preservado la tensión léxica entre ‘defilar/contaminar’ mediante una solución de lectura idiomática en contexto.'
  spanish_consistency_notes:
  - He usado ‘Yahvé’ solo cuando el texto lo requiera; en este versículo no aparece el nombre divino.
  - He mantenido ‘espada’ y no un término genérico como ‘arma’, conforme a la imagen concreta del hebreo.
  - ‘Prójimo’ comunica mejor la relación social implicada que ‘vecino’ en este contexto jurídico-moral.
  - La puntuación conserva una secuencia acusatoria directa y termina con una pregunta retórica, como en el inglés POB.
