translation:
  language: es
  text: Y si Senaquerib el rey[a] mataba a alguno cuando vino huyendo de Judea, yo los sepulté a escondidas; porque en su ira mató a muchos, y los cuerpos fueron buscados por el rey, pero no fueron hallados.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El griego de Swete lee «Achreil el rey» (Ἀχρειλ ὁ βασιλεύς), forma entendida por el contexto como referencia a Senaquerib.
    reason: textual_variant
lexical_decisions:
- source_word: καὶ εἴ τινα
  english_pob_choice: And if ... any of them
  chosen_spanish: Y si ... a alguno
  alternatives_spanish:
  - Y si ... a cualquiera
  - Y si ... a alguien
  lexicon: BDAG
  rationale: La construcción condicional e indefinida se expresa de modo natural en español con «si ... a alguno». Mantiene el valor general sin introducir una paraprasis más amplia que el griego.
- source_word: ἀπέκτεινεν
  english_pob_choice: killed
  chosen_spanish: mató
  alternatives_spanish:
  - dio muerte a
  - dio muerte
  lexicon: BDAG
  rationale: «Mató» conserva el sentido directo y evita un tono excesivamente jurídico o arcaizante. Es fiel al acto de causar la muerte sin añadir matices.
- source_word: Ἀχρειλ ὁ βασιλεύς
  english_pob_choice: Sennacherib the king
  chosen_spanish: Senaquerib el rey
  alternatives_spanish:
  - Achreil el rey
  lexicon: LSJ
  rationale: El contexto narrativo identifica al rey asirio como Senaquerib. La forma griega de Swete se preserva en una nota, pero el texto principal usa el nombre histórico reconocido para no inducir a error.
- source_word: ὅτε ἦλθεν φεύγων
  english_pob_choice: when he came fleeing
  chosen_spanish: cuando vino huyendo
  alternatives_spanish:
  - cuando llegó huyendo
  - cuando huyó
  lexicon: BDAG
  rationale: «Vino huyendo» reproduce la combinación de movimiento y fuga del griego sin convertirla en una paráfrasis más libre.
- source_word: ἐκ τῆς Ἰουδαίας
  english_pob_choice: from Judea
  chosen_spanish: de Judea
  alternatives_spanish:
  - desde Judea
  - de Judá
  lexicon: BDAG
  rationale: «De Judea» es la equivalencia geográfica directa en español moderno. «Judá» podría sugerir la tribu o el territorio bíblico en otro sentido y sería menos claro aquí.
- source_word: ἔθαψα αὐτοὺς κλέπτων
  english_pob_choice: I buried them secretly
  chosen_spanish: yo los sepulté a escondidas
  alternatives_spanish:
  - los enterré en secreto
  - los sepulté secretamente
  lexicon: BDAG
  rationale: «A escondidas» comunica bien el valor adverbial de κλέπτων, preservando la idea de actuar ocultamente sin insinuar robo. «Sepulté» mantiene un registro digno y compatible con un entierro de cuerpos.
- source_word: ἐν τῷ θυμῷ αὐτοῦ
  english_pob_choice: in his anger
  chosen_spanish: en su ira
  alternatives_spanish:
  - en su enojo
  - en su furor
  lexicon: BDAG
  rationale: «Ira» conserva el peso emotivo del griego θυμός y encaja con un registro bíblico digno. «Enojo» sería más coloquial y «furor» más intenso de lo que el contexto requiere.
- source_word: ἐξητήθη
  english_pob_choice: were sought
  chosen_spanish: fueron buscados
  alternatives_spanish:
  - fueron buscados y requeridos
  - se buscó
  lexicon: BDAG
  rationale: El pasivo se expresa con naturalidad en español como «fueron buscados». Mantiene la acción bajo la esfera de la autoridad real sin forzar un término más técnico.
- source_word: τὰ σώματα
  english_pob_choice: the bodies
  chosen_spanish: los cuerpos
  alternatives_spanish:
  - los cadáveres
  - los cuerpos muertos
  lexicon: BDAG
  rationale: «Cuerpos» sigue de cerca el término griego y evita una dureza innecesaria. «Cadáveres» sería posible, pero más marcado y menos neutral.
- source_word: οὐχ εὑρέθη
  english_pob_choice: they were not found
  chosen_spanish: no fueron hallados
  alternatives_spanish:
  - no se encontraron
  - no aparecieron
  lexicon: BDAG
  rationale: 'Dado el sujeto neutro plural en griego, el plural español es idiomático: «no fueron hallados». Conserva la relación con la búsqueda real sin añadir explicaciones.'
theological_decisions:
- issue: Identificación del rey asirio
  english_pob_reading: Use the standard English historical name 'Sennacherib' in the main text, while preserving the Greek form as an alternative in a footnote.
  chosen_spanish_reading: Usar «Senaquerib» en el texto principal y preservar «Achreil» como variante textual en nota.
  alternative_spanish_readings:
  - Achreil el rey
  rationale: No es un problema doctrinal, sino de transparencia textual. La escena de Tobit identifica a este rey como Senaquerib; la forma griega inusual se mantiene visible en la nota para auditoría.
  doctrine_reference: Transparencia textual y onomástica; preservar la variante de fuente sin confundir al lector.
translation_notes:
  revision_awareness: 'La redacción española sigue la revisión más reciente del audio de referencia en inglés: se evita añadir «de ellos» porque no está representado en el griego, se conserva el sentido de κλέπτων con «a escondidas», y se mantiene la identificación contextual del rey como Senaquerib con nota de variante textual.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma general del proyecto, aunque este versículo no contiene el nombre divino.
  - Se usa «sepulté» para el acto de enterrar cuerpos con registro bíblico digno, coherente con el tono narrativo.
  - Se conserva el plural español «fueron hallados» para reflejar el plural neutro griego τὰ σώματα.
