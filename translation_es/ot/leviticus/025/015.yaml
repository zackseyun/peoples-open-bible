translation:
  language: es
  text: Según el número de años después del jubileo, comprarás a tu prójimo; según el número de años de cosechas[a], él te venderá.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literalmente, «según el número de años de cosechas». La idea es que el precio de venta se calcula por los años productivos que quedan hasta el próximo jubileo, no como una venta permanente de la tierra.
    reason: lexical_alternative
lexical_decisions:
- source_word: בְּמִסְפַּר שָׁנִים
  english_pob_choice: according to the number of years
  chosen_spanish: según el número de años
  alternatives_spanish:
  - conforme al número de años
  - de acuerdo con el número de años
  lexicon: HALOT
  rationale: La preposición ב con מִסְפָּר expresa medida o norma. En español, «según el número de años» conserva esa base de cálculo sin sonar forzado.
- source_word: אַחַר הַיּוֹבֵל
  english_pob_choice: after the Jubilee
  chosen_spanish: después del jubileo
  alternatives_spanish:
  - tras el jubileo
  - después del Año del Jubileo
  lexicon: HALOT
  rationale: «Jubileo» es el equivalente establecido de יוֹבֵל en Levítico 25. Se usa en minúscula por tratarse del término legal de la institución, no de un nombre propio.
- source_word: תִּקְנֶה
  english_pob_choice: you shall buy
  chosen_spanish: tú comprarás
  alternatives_spanish:
  - comprarás
  - deberás comprar
  lexicon: HALOT
  rationale: El imperfecto 2ms en una instrucción legal se expresa bien con futuro de mandato en español. Se conserva el sujeto explícito para claridad y simetría legal.
- source_word: מֵאֵת עֲמִיתֶךָ
  english_pob_choice: from your fellow
  chosen_spanish: de tu hermano
  alternatives_spanish:
  - de tu prójimo
  - de tu compañero
  lexicon: HALOT
  rationale: עָמִית indica un miembro del mismo ámbito comunitario o legal. Aquí «tu hermano» comunica bien la relación solidaria entre israelitas en una forma natural para el español bíblico, sin perder el sentido de pertenencia comunitaria. Se evita «prójimo» porque puede sonar más general y menos jurídico.
- source_word: שְׁנֵי תְבוּאֹת
  english_pob_choice: according to the number of years of crops
  chosen_spanish: según el número de años de cosechas
  alternatives_spanish:
  - según el número de años de fruto
  - según el número de años de producción
  lexicon: HALOT
  rationale: La expresión hebrea es literalmente «años de produce/harvests». «Años de cosechas» mantiene la referencia económica y agrícola, y en español es más natural que un calco como «años de producto».
- source_word: יִמְכָּר לָךְ
  english_pob_choice: he shall sell to you
  chosen_spanish: él te venderá
  alternatives_spanish:
  - te venderá
  - deberá vendértelo
  lexicon: HALOT
  rationale: Se conserva la acción recíproca del vendedor en paralelo con «tú comprarás». El futuro mantiene el carácter prescriptivo de la ley.
theological_decisions:
- issue: Valor jurídico-económico del jubileo y no transferencia permanente de la tierra
  english_pob_reading: The sale price is based on the number of crop-bearing years remaining until the next Jubilee, not on a permanent transfer of the land.
  chosen_spanish_reading: El precio de la venta se entiende según los años que quedan hasta el próximo jubileo, no como una transferencia permanente de la tierra.
  alternative_spanish_readings:
  - El precio se calcula por los años restantes hasta el jubileo
  - la venta se valora por el tiempo restante hasta el jubileo
  rationale: El hebreo regula el valor de la compraventa según el tiempo agrícola restante. La formulación española conserva esa tensión legal-económica sin añadir interpretaciones ajenas al texto.
  doctrine_reference: Levítico 25:14-17
- issue: Correspondencia comunitaria de עֲמִית
  english_pob_reading: from your fellow
  chosen_spanish_reading: de tu hermano
  alternative_spanish_readings:
  - de tu prójimo
  - de tu compatriota
  rationale: La palabra hebrea apunta a un asociado o miembro de la comunidad del pacto en contexto legal. «Hermano» es una equivalencia bíblica natural que subraya la solidaridad interna requerida por la ley, sin reducir el término a parentesco literal.
  doctrine_reference: Levítico 25:14-17
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión auditada del inglés POB que ajustó la última cola de la frase para reflejar con mayor precisión שְׁנֵי תְבוּאֹת como «years of crops». Por eso la versión española usa «años de cosechas», manteniendo la estructura formal y la base agrícola del cálculo.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma POB cuando el texto no contiene el Tetragrámaton explícito, no aplica aquí.
  - Se conserva el paralelismo legal entre comprador y vendedor con futuros de mandato en español.
  - «Jubileo» se escribe en minúscula por tratarse de una institución legal dentro de Levítico 25.
  - La relación social de עֲמִית se resuelve aquí con «hermano» por naturalidad y resonancia comunitaria, sin convertirlo en un tecnicismo excesivo.
