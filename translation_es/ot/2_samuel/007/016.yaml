translation:
  language: es
  text: Y tu casa[b] y tu reino serán firmes para siempre delante de mí[a]; tu trono será establecido para siempre.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «delante de ti»; algunos testigos textuales leen «delante de mí».'
    reason: textual_variant
  - marker: b
    text: «Casa» aquí probablemente lleva el sentido de casa real, es decir, dinastía.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְנֶאְמַן
  english_pob_choice: shall be made sure
  chosen_spanish: serán firmes
  alternatives_spanish:
  - serán establecidos
  - serán confirmados
  - permanecerán fieles
  lexicon: HALOT
  rationale: El nifal de אמן expresa ser hecho firme, seguro o estable. En español, «serán firmes» conserva la idea de solidez y permanencia sin confundirlo con נָכוֹן, que se traduce después con «establecido». Evita además una repetición demasiado plana de «establecido».
- source_word: בֵּיתְךָ
  english_pob_choice: your house
  chosen_spanish: tu casa
  alternatives_spanish:
  - tu dinastía
  - tu casa real
  lexicon: HALOT
  rationale: En contexto real, בַּיִת puede referirse a la casa dinástica. Se mantiene «casa» porque reproduce el término de fuente y permite que el sentido dinástico quede implícito, como en el audit trail inglés.
- source_word: וּמַמְלַכְתְּךָ
  english_pob_choice: and your kingdom
  chosen_spanish: y tu reino
  alternatives_spanish:
  - y tu reinado
  - y tu dominio real
  lexicon: HALOT
  rationale: מַמְלָכָה denota reino o soberanía real. «Reino» es la equivalencia directa y natural en español bíblico actual.
- source_word: עַד עוֹלָם
  english_pob_choice: forever
  chosen_spanish: para siempre
  alternatives_spanish:
  - por la eternidad
  - para toda la eternidad
  lexicon: HALOT
  rationale: La expresión señala duración perpetua. «Para siempre» es la forma más clara y natural en español, y conserva la repetición enfática del hebreo al aparecer dos veces en el versículo.
- source_word: לְפָנֶיךָ
  english_pob_choice: before me
  chosen_spanish: delante de mí
  alternatives_spanish:
  - en mi presencia
  - ante mí
  lexicon: HALOT
  rationale: Aunque el consonántico leído en el texto base es «delante de ti», el audit trail inglés adopta la lectura «before me» por la tradición textual revisada. En español se refleja esa lectura con «delante de mí», expresión idiomática que conserva la relación espacial/personal del hebreo.
- source_word: כִּסְאֲךָ
  english_pob_choice: your throne
  chosen_spanish: tu trono
  alternatives_spanish:
  - tu asiento real
  lexicon: HALOT
  rationale: «Trono» es la equivalencia estándar para el símbolo de realeza y autoridad. Mantiene el valor literal y metonímico del término.
- source_word: יִהְיֶה נָכוֹן
  english_pob_choice: shall be established
  chosen_spanish: será establecido
  alternatives_spanish:
  - quedará firme
  - permanecerá establecido
  lexicon: HALOT
  rationale: La secuencia verbal expresa firmeza/estabilidad establecida. Se traduce con «será establecido» para mantener la distinción con la primera cláusula y reflejar con precisión el matiz de נָכוֹן.
theological_decisions:
- issue: Promesa dinástica sin explicitar la interpretación mesiánica
  english_pob_reading: Retain 'house,' 'kingdom,' and 'throne' in their historical-dynastic sense without making the messianic implication explicit in the translation.
  chosen_spanish_reading: Mantener «casa», «reino» y «trono» en su sentido real-dinástico histórico, sin explicitar en el texto la lectura mesiánica.
  alternative_spanish_readings:
  - Usar «dinastía» para hacer explícito el sentido
  - Redactar de un modo que anticipe el cumplimiento mesiánico
  rationale: El hebreo habla primero de la continuidad de la línea real de David. La traducción no debe resolver esa tensión interpretativa añadiendo una lectura teológica que el texto no enuncia de manera directa. El lenguaje real conserva la amplitud del pasaje.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
- issue: Lectura textual de לְפָנֶיךָ / לְפָנַי
  english_pob_reading: Changed 'before you' to 'before me' to reflect the ketiv/qere-supported reading commonly represented in the tradition and the immediate divine speech context.
  chosen_spanish_reading: Adoptar «delante de mí» conforme a la lectura tradicional representada en el audit trail y al contexto de habla divina.
  alternative_spanish_readings:
  - delante de ti
  - en tu presencia
  rationale: El contexto de discurso de Yahvé favorece la lectura «de mí», aunque el texto consonántico disponible puede leerse como «de ti». La traducción española sigue la decisión editorial documentada y la hace natural en español.
  doctrine_reference: Texto crítico y tradición manuscrita; coherencia contextual del discurso divino.
translation_notes:
  revision_awareness: Se siguió la decisión revisada del audit trail inglés para לְפָנֶיךָ, adoptando «delante de mí» en lugar de la lectura consonántica literal «delante de ti». También se preservó la distinción léxica entre וְנֶאְמַן («serán firmes») y נָכוֹן («será establecido»), evitando que ambas cláusulas se aplanen con una sola palabra.
  spanish_consistency_notes:
  - Se mantiene el tratamiento de YHWH como «Yahvé» en el proyecto, aunque este versículo no lo nombra explícitamente.
  - «Casa», «reino» y «trono» conservan el registro real y permiten la lectura dinástica sin sobreexplicarla.
  - Se evita «SEÑOR» como sustituto del nombre divino, conforme a las normas del proyecto, aunque aquí no sea necesario por ausencia del tetragrámaton.
  - La puntuación usa punto y coma para reflejar la división natural de las dos cláusulas hebreas.
