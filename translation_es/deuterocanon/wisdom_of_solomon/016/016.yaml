base_translation:
  language: en
  yaml_path: translation/deuterocanon/wisdom_of_solomon/016/016.yaml
  text: For because the ungodly refused to know you[a], they were scourged by the might of your arm, pursued by unusual rains and hail and relentless storms[b], and consumed by fire.
  footnotes:
  - marker: a
    text: Or 'unusual rains'; the Greek literally speaks of 'strange/foreign rains,' emphasizing extraordinary weather sent in judgment.
    reason: lexical_alternative
  - marker: b
    text: Or 'inescapable storms' for 'relentless storms'; the adjective suggests something that cannot be turned aside or refused.
    reason: lexical_alternative
