translation:
  language: es
  text: Quemarán tus casas con fuego y ejecutarán juicios contra ti delante de los ojos de muchas mujeres[a]. Haré que cese tu prostitución[b], y ya no darás pago alguno[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'a la vista de muchas mujeres.'
    reason: lexical_alternative
  - marker: b
    text: Hebreo 'tu prostitución'; alternativamente, 'de ser prostituta'.
    reason: lexical_alternative
  - marker: c
    text: El término hebreo se refiere al pago asociado con la prostitución; algunos traducen 'pago de ramera' o 'tarifa'.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְשָׂרְפוּ
  english_pob_choice: they will burn
  chosen_spanish: Quemarán
  alternatives_spanish:
  - y quemarán
  - serán quemadas
  lexicon: HALOT
  rationale: El verbo qal wayyiqtol en contexto profético de juicio se expresa naturalmente en futuro en español. Se mantiene la acción concreta y el tono judicial sin volverlo pasivo.
- source_word: בָתַּיִךְ
  english_pob_choice: your houses
  chosen_spanish: tus casas
  alternatives_spanish:
  - tus edificios
  - tus viviendas
  lexicon: HALOT
  rationale: Casa es el sentido léxico básico y conserva la imagen de devastación urbana. 'Tus casas' es claro y fiel al plural hebreo.
- source_word: בָּאֵשׁ
  english_pob_choice: with fire
  chosen_spanish: con fuego
  alternatives_spanish:
  - por fuego
  - en el fuego
  lexicon: HALOT
  rationale: La preposición instrumental se vierte de manera idiomática como 'con fuego', manteniendo el medio de destrucción.
- source_word: וְעָשׂוּ בָךְ שְׁפָטִים
  english_pob_choice: execute judgments against you
  chosen_spanish: ejecutarán juicios contra ti
  alternatives_spanish:
  - harán juicios contra ti
  - llevarán a cabo juicios contra ti
  lexicon: HALOT
  rationale: La expresión hebrea denota castigos judiciales. 'Ejecutarán juicios' conserva la fuerza legal del original y evita reducirlo a una mera valoración moral.
- source_word: לְעֵינֵי נָשִׁים רַבּוֹת
  english_pob_choice: before the eyes of many women
  chosen_spanish: delante de los ojos de muchas mujeres
  alternatives_spanish:
  - a la vista de muchas mujeres
  - ante muchas mujeres
  lexicon: HALOT
  rationale: Se conserva el motivo de exposición pública y vergüenza. 'Delante de los ojos de' refleja con claridad la construcción hebrea y su valor visual.
- source_word: וְהִשְׁבַּתִּיךְ
  english_pob_choice: I will put a stop to your prostitution
  chosen_spanish: Haré que cese tu prostitución
  alternatives_spanish:
  - Haré cesar tu prostitución
  - Te haré dejar la prostitución
  lexicon: HALOT
  rationale: El hiphil de שׁבת significa causar que algo cese. En español suena más natural con una causativa explícita, preservando el objeto directo del texto inglés auditado.
- source_word: מִזּוֹנָה
  english_pob_choice: your prostitution
  chosen_spanish: tu prostitución
  alternatives_spanish:
  - que prostituyas
  - tu condición de prostituta
  lexicon: HALOT
  rationale: La forma hebrea apunta al acto/estado de prostitución. Se mantiene el término directo para no suavizar la metáfora sexual-profética que el texto exige.
- source_word: וְגַם
  english_pob_choice: and also
  chosen_spanish: y
  alternatives_spanish:
  - y además
  - también
  lexicon: HALOT
  rationale: El valor enfático se absorbe con una simple conjunción en español, sin añadir redundancia innecesaria.
- source_word: אֶתְנַן
  english_pob_choice: payment
  chosen_spanish: pago
  alternatives_spanish:
  - retribución
  - precio
  lexicon: HALOT
  rationale: El término se refiere al pago ligado a la prostitución. 'Pago' es breve, claro y mantiene la idea económica sin introducir un colorido ajeno al texto.
- source_word: לֹא תִתְּנִי עוֹד
  english_pob_choice: you will no longer give payment
  chosen_spanish: ya no darás pago
  alternatives_spanish:
  - no volverás a dar pago
  - ya no entregarás pago
  lexicon: HALOT
  rationale: La forma negativa con עוֹד expresa cese futuro. 'Ya no darás' reproduce bien la idea de interrupción, aunque suene un poco más sintética que el inglés auditado.
theological_decisions:
- issue: Metáfora sexual de infidelidad covenantal en el lenguaje profético
  english_pob_reading: Retain the prostitution metaphor explicitly
  chosen_spanish_reading: Mantener explícitamente la metáfora de prostitución
  alternative_spanish_readings:
  - Suavizarla como 'infidelidad'
  - Interpretarla como 'idolatría' en el texto principal
  rationale: Ezequiel usa deliberadamente lenguaje sexualizado para describir la infidelidad del pacto. La versión española conserva esa fuerza metafórica en vez de resolverla en una abstracción más piadosa o eclesial.
  doctrine_reference: Translation philosophy §§1, 3, 6
translation_notes:
  revision_awareness: El pasaje muestra alto acuerdo con la auditoría inglesa y no requiere cambios de revisión sustanciales; se preservan la imaginería de juicio público y la metáfora sexual explícita, con ajuste español para fluidez y claridad.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' solo cuando aparezca el nombre divino; aquí no aparece ningún término divino en el versículo.
  - '''Juicios'' conserva la fuerza forense del hebreo שְׁפָטִים en vez de neutralizarlo como simple ''castigos''.'
  - '''Prostitución'' se usa de forma consistente para זנה y evita reemplazos moralizantes más vagos.'
