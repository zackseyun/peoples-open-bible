translation:
  language: es
  text: Pero Simón[a], hermano de Judas, había llegado a un acuerdo con Nicanor, pero había fallado[b] a causa del súbito silencio[c] de sus adversarios.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «había hecho un acuerdo con Nicanor». El griego puede indicar tanto llegar a un arreglo como concertarlo.'
    reason: lexical_alternative
  - marker: b
    text: 'Lit.: «habiendo tropezado». El griego también puede expresar haber sufrido un revés o haber errado; además, βραδέως significa literalmente «lentamente» y aquí podría insinuar vacilación o resistencia, no solo demora temporal.'
    reason: lexical_alternative
  - marker: c
    text: 'La construcción griega es difícil: literalmente habla de «silencio» o «falta de habla» repentina de los adversarios, una imagen que puede apuntar a un desorden inesperado en el bando contrario.'
    reason: lexical_alternative
lexical_decisions:
- source_word: συμβεβληκὼς ἦν
  english_pob_choice: had come to an agreement with
  chosen_spanish: había llegado a un acuerdo con
  alternatives_spanish:
  - había hecho un acuerdo con
  - había entrado en arreglo con
  - había concertado un pacto con
  lexicon: LSJ
  rationale: El perfecto perifrástico expresa un estado resultante de una acción previa. En español, «haber llegado a un acuerdo» conserva la idea de arreglo ya establecido sin forzar una lectura militar ni introducir una formalidad que el griego no exige.
- source_word: βραδέως
  english_pob_choice: slowly / reluctantly
  chosen_spanish: lentamente
  alternatives_spanish:
  - con reluctancia
  - con vacilación
  - tardíamente
  lexicon: LSJ
  rationale: La forma griega puede modificar el modo en que se produjo el tropiezo o la falla. «Lentamente» conserva la fuerza adverbial literal y deja abierta la tensión interpretativa; en nota se puede reconocer la posible lectura de vacilación, pero no conviene fijarla sin más.
- source_word: ἐπταικώς
  english_pob_choice: having stumbled / had failed
  chosen_spanish: había tropezado
  alternatives_spanish:
  - había fallado
  - había errado
  - había quedado en desventaja
  lexicon: LSJ
  rationale: πταίω conserva metáfora de tropiezo, y en este contexto sugiere un revés o falla. «Había tropezado» preserva la imagen sin moralizar ni volver demasiado abstracto el resultado.
- source_word: ἀφασίαν
  english_pob_choice: speechlessness / silence
  chosen_spanish: silencio
  alternatives_spanish:
  - mudez
  - falta de palabra
  - incapacidad de hablar
  lexicon: LSJ
  rationale: Aunque el término puede significar speechlessness, en español «silencio» fluye mejor y mantiene la extrañeza de una interrupción repentina en el lado de los adversarios. No se debe convertir automáticamente en «mudez», que suena más clínico y menos narrativo.
- source_word: ἐφνίδιον
  english_pob_choice: sudden
  chosen_spanish: repentino
  alternatives_spanish:
  - súbito
  - inesperado
  - abrupto
  lexicon: LSJ
  rationale: «Repentino» es el equivalente natural y claro en español para el carácter inesperado de la circunstancia.
- source_word: τῶν ἀντιπάλων
  english_pob_choice: of his opponents
  chosen_spanish: de sus adversarios
  alternatives_spanish:
  - de sus opositores
  - del bando contrario
  - de los contrarios
  lexicon: LSJ
  rationale: ἀντίπαλοι son adversarios u oponentes. «Adversarios» funciona con dignidad bíblica y evita especificar de más una pertenencia posesiva que el griego no desarrolla explícitamente.
theological_decisions:
- issue: Relación entre el acuerdo y el tropiezo de Simón
  english_pob_reading: The clause is difficult Greek and likely describes Simon being thrown off balance by the opponents' sudden silence; the English revision also leaves the exact relation somewhat open.
  chosen_spanish_reading: 'La frase conserva la ambigüedad: Simón había llegado a un acuerdo, pero luego había tropezado a causa del silencio repentino de sus adversarios.'
  alternative_spanish_readings:
  - Simón había concertado un acuerdo y después falló por el silencio repentino de sus adversarios.
  - Simón había entrado en negociación con Nicanor, pero se vio frustrado por el silencio repentino del bando contrario.
  rationale: El griego y el audit trail inglés no permiten una reconstrucción completamente segura. La traducción española no debe resolver artificialmente si se trata de un tratado formal, una negociación o una desestabilización momentánea; por eso se mantiene el vínculo causal y el lenguaje de tropiezo sin sobredeterminar el episodio.
  doctrine_reference: Principio de prudencia textual y de no sobreinterpretación; cf. fidelidad al sentido probable cuando el sintagma es difícil.
translation_notes:
  revision_awareness: Se revisó el inglés POB más reciente y su pasaje anterior. La versión española evita depender mecánicamente de la revisión inglesa, pero también evita retroceder a una lectura excesivamente interpretativa. Por eso mantiene el acuerdo, el matiz de tropezar y la imagen extraña del silencio repentino, sin forzar una explicación única.
  spanish_consistency_notes:
  - Se usó «Yahvé» en lugar de «SEÑOR» solo cuando corresponda; este verso no contiene el nombre divino.
  - «Mesías/Cristo» no aplica aquí.
  - Se prefirió «adversarios» por concordancia con el tono narrativo y porque el griego habla de ἀντίπαλοι.
  - La puntuación conserva dos miembros coordinados con contraste para reflejar el flujo del griego y del audit trail inglés.
