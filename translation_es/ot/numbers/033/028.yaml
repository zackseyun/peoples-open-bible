lexical_decisions:
- source_word: וַיִּסְעוּ
  english_pob_choice: They set out
  chosen_spanish: Partieron
  alternatives_spanish:
  - Se pusieron en marcha
  - Salieron
  lexicon: HALOT
  rationale: En la fórmula itineraria del desierto, נסע expresa el movimiento de salir de una estación. «Partieron» conserva ese valor de desplazamiento inicial de manera natural en español, sin añadir matices ajenos al texto.
- source_word: מִתָּרַח
  english_pob_choice: from Terah
  chosen_spanish: de Teraj
  alternatives_spanish:
  - desde Teraj
  - de Téraj
  lexicon: Nombre propio transliterado
  rationale: El hebreo marca origen con מִן; por eso uso «de». El topónimo se translitera como nombre de lugar. El grafema final se ajusta a una forma española estable («Teraj») para mantener la pronunciación aproximada sin alterar el nombre.
- source_word: וַיַּחֲנוּ
  english_pob_choice: and camped
  chosen_spanish: acamparon
  alternatives_spanish:
  - y acamparon
  - e hicieron campamento
  lexicon: HALOT
  rationale: En este contexto, חנה significa establecer campamento. «Acamparon» transmite el acto concreto de detenerse y montar campamento con claridad y concisión en español.
- source_word: בְּמִתְקָה
  english_pob_choice: at Mithkah
  chosen_spanish: en Mitcá
  alternatives_spanish:
  - en Mítca
  - en Mithká
  lexicon: Nombre propio transliterado
  rationale: La preposición בְּ indica ubicación. En una secuencia de itinerario, «en» es el equivalente natural en español. El nombre se translitera como topónimo; «Mitcá» preserva la forma breve y legible en español.
