translation:
  language: es
  text: En sus días los justos[a] florecerán, y habrá abundancia de paz[b] hasta que no haya luna[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «el justo», posiblemente refiriéndose al rey mismo más que a los justos en conjunto.
    reason: alternative_reading
  - marker: b
    text: «Paz» (shalom) también puede incluir la idea de bienestar, plenitud o prosperidad.
    reason: lexical_alternative
  - marker: c
    text: Literalmente, «hasta que no haya luna», una expresión poética de duración perdurable.
    reason: cultural_note
lexical_decisions:
- source_word: יִפְרַח
  english_pob_choice: will flourish
  chosen_spanish: florecerá
  alternatives_spanish:
  - brotará
  - prosperará
  - florecerá
  lexicon: HALOT
  rationale: פרח expresa la imagen de brotar o florecer; en español, «florecerá» conserva la metáfora vegetal y el sentido de prosperar de forma natural y digna.
- source_word: בְּיָמָיו
  english_pob_choice: In his days
  chosen_spanish: En sus días
  alternatives_spanish:
  - Durante sus días
  - En su tiempo
  lexicon: HALOT
  rationale: La frase idiomática se mantiene casi literalmente en español, preservando el marco temporal del reinado sin expansión interpretativa.
- source_word: צַדִּיק
  english_pob_choice: the righteous
  chosen_spanish: el justo
  alternatives_spanish:
  - los justos
  - el justo
  lexicon: HALOT
  rationale: Aunque el hebreo puede funcionar colectivamente, en español la forma singular sustantivada «el justo» permite reflejar la tensión documentada entre lectura colectiva y posible referencia singular al rey o al justo ideal.
- source_word: וְרֹב
  english_pob_choice: and abundance of
  chosen_spanish: y habrá abundancia de
  alternatives_spanish:
  - y abundancia de
  - y habrá mucho
  lexicon: HALOT
  rationale: «רֹב» denota abundancia; en español, añadir «habrá» hace fluida la cláusula nominal sin perder el valor de plenitud del sustantivo.
- source_word: שָׁלוֹם
  english_pob_choice: peace
  chosen_spanish: paz
  alternatives_spanish:
  - bienestar
  - plenitud
  - paz
  lexicon: HALOT
  rationale: «Paz» es la equivalencia más transparente para shalom en el contexto real/poético, dejando su amplitud semántica como potencial implícito sin forzarla en el texto principal.
- source_word: עַד בְּלִי יָרֵחַ
  english_pob_choice: until the moon is no more
  chosen_spanish: hasta que no haya luna
  alternatives_spanish:
  - hasta que la luna no exista más
  - hasta que no haya luna
  lexicon: HALOT
  rationale: La expresión hebrea es poética y durativa; «hasta que no haya luna» mantiene la imagen de permanencia extrema con naturalidad en español.
theological_decisions:
- issue: Alcance de צַדִּיק en un salmo real/mesiánico
  english_pob_reading: collective 'the righteous'
  chosen_spanish_reading: singular sustantivado 'el justo' con posible resonancia colectiva en el contexto
  alternative_spanish_readings:
  - los justos
  - el justo (referido al rey)
  rationale: El hebreo admite una lectura colectiva o singular. El singular español conserva esa tensión y permite leer la frase como descripción del justo ideal sin cerrar la posibilidad de aplicación más amplia.
  doctrine_reference: Psalm 72 messianic/royal context
translation_notes:
  revision_awareness: Se atendió la validación previa asegurando que cada marca de nota aparezca exactamente en el texto español. Se evitó calcar el inglés de forma innecesaria y se mantuvo la tensión documentada sobre צַדִּיק y la imagen poética de la luna.
  spanish_consistency_notes:
  - Se usó «paz» para שָׁלוֹם conforme a la pauta proyectual, con nota sobre su amplitud semántica.
  - Se mantuvo «florecerá» para preservar la metáfora vegetal del hebreo.
  - Se evitó «SEÑOR» o terminología de máscara, pues el versículo no contiene el nombre divino.
  - La sintaxis española añade el verbo implícito en la segunda cláusula para claridad, sin alterar el sentido nominal del original.
