revisions:
- from: Él humilló los montes altos hasta dejarlos en terreno llano para ellos[a].
  to: Rebajó los montes altos en llano para ellos[a].
  rationale: Se reemplaza «humilló» por «rebajó» para reflejar mejor el abatimiento físico de ἐταπείνωσεν con montes como objeto. Se simplifica «hasta dejarlos en terreno llano» a «en llano» para ceñirse más al griego εἰς ὁμαλισμόν sin perder claridad. Se conserva en nota la alternativa con «humilló» y «en un llano», en línea con el rastro auditado en inglés.
