  text: וַ/יִּתְקַשֵּׁ֗ר יֵה֛וּא בֶּן יְהוֹשָׁפָ֥ט בֶּן נִמְשִׁ֖י אֶל יוֹרָ֑ם וְ/יוֹרָם֩ הָיָ֨ה שֹׁמֵ֜ר בְּ/רָמֹ֣ת גִּלְעָ֗ד ה֚וּא וְ/כָל יִשְׂרָאֵ֔ל מִ/פְּנֵ֥י חֲזָאֵ֖ל מֶֽלֶךְ אֲרָֽם־־־־־׃
base_translation:
  language: en
  yaml_path: translation/ot/2_kings/009/014.yaml
  text: So Jehu son of Jehoshaphat[a], son of Nimshi, conspired against Joram. Now Joram had been keeping watch at Ramoth-gilead, he and all Israel[c][b], because of Hazael king of Aram.
  footnotes:
  - marker: a
    text: Or 'was keeping watch at Ramoth-gilead.' The Hebrew verb can denote guarding, watching, or defending in a military setting.
    reason: lexical_alternative
  - marker: b
    text: That is, the kingdom/forces of Israel; the text literally says 'all Israel.'
    reason: cultural_note
  - marker: c
    text: 'Traditionally ''Syria''; Hebrew: ''Aram.'''
    reason: alternative_reading
