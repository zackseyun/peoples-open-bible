review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien el contenido hebreo y el rastro auditado en inglés: mantiene «Y dijo» sin importar «el ángel de Yahvé», conserva la identificación social de Hagar y traduce adecuadamente las dos preguntas y la huida en progreso. Sin embargo, hay un problema puntual en la nota a: el alternativo «la esclava mujer» no es español natural ni reproduce bien la alternativa inglesa documentada. Conviene reparar solo ese detalle.'
  spanish_quality_summary: El texto principal es claro, natural y digno en español. «Esclava de Sarai», «¿de dónde has venido y adónde vas?» y «Estoy huyendo de la presencia de Sarai, mi señora» son legibles y fieles. La única aspereza relevante está en la formulación de la nota léxica a, que suena antinatural.
  glossary_alignment: 'Hay buena alineación con la terminología del proyecto: no se suaviza שִׁפְחָה a «sierva», se mantiene «esclava»; los nombres propios están bien; no hay conflictos con términos teológicos de proyecto. «Mi señora» para גברתי funciona bien en español e integra el matiz de subordinación sin impropiedad.'
  issues:
  - severity: medium
    issue: La nota a usa «la esclava mujer» como alternativa.
    rationale: Esa frase no es español idiomático y no representa bien las alternativas auditadas («maidservant», «female servant», «female slave»). La nota debe ofrecer alternativas naturales en español, como «sierva», «criada» o «mujer esclava», sin introducir una formulación torpe.
  revised_spanish_text: 'Y dijo[a]: «Hagar, esclava de Sarai, ¿de dónde has venido y adónde vas?» Y ella dijo[b]: «Estoy huyendo de la presencia de Sarai, mi señora».'
  revised_footnotes:
  - marker: a
    text: O «sierva», «criada» o «mujer esclava»; el hebreo denota a una mujer en condición servil bajo Sarai.
    reason: lexical_alternative
  - marker: b
    text: 'Literalmente: «de la presencia de Sarai, mi señora».'
    reason: lexical_alternative
  revision_rationale: Se conserva el texto principal tal como está, porque es fiel y natural. Solo se corrige la nota a para reemplazar una alternativa española poco idiomática por opciones naturales y alineadas con la evidencia léxica auditada.
