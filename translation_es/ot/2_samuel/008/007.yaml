translation:
  language: es
  text: Y David tomó los escudos de oro que pertenecían a los siervos de Hadadézer y los llevó a Jerusalén[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «los escudos de oro»; el hebreo también puede entenderse más literalmente como «los escudos de oro». Una interpretación minoritaria propone «quiveras».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּקַּח
  english_pob_choice: took
  chosen_spanish: tomó
  alternatives_spanish:
  - se llevó
  - capturó
  lexicon: HALOT
  rationale: לקח en narrativa suele significar simplemente 'tomar'. 'Tomó' conserva la amplitud del hebreo sin añadir connotación más fuerte de violencia o botín forzado que el contexto no exige por sí solo.
- source_word: שִׁלְטֵי הַזָּהָב
  english_pob_choice: the shields of gold
  chosen_spanish: los escudos de oro
  alternatives_spanish:
  - los escudos dorados
  - las quiveras de oro
  lexicon: HALOT
  rationale: El hebreo constructo se rinde de forma directa como 'escudos de oro'. En español, esta forma es natural y mantiene la cercanía al original. 'Escudos dorados' es posible, pero menos literal; 'quiveras' corresponde a una propuesta minoritaria menos probable en este contexto militar.
- source_word: אֲשֶׁר הָיוּ אֶל
  english_pob_choice: that belonged to
  chosen_spanish: que pertenecían a
  alternatives_spanish:
  - que estaban con
  - que estaban sobre
  - que estaban para
  lexicon: HALOT
  rationale: La secuencia expresa pertenencia o asociación, no solo ubicación. 'Pertenecían a' comunica mejor la relación de posesión implícita en el contexto que una traducción espacial literal.
- source_word: עַבְדֵי הֲדַדְעָזֶר
  english_pob_choice: the servants of Hadadezer
  chosen_spanish: los siervos de Hadadézer
  alternatives_spanish:
  - los servidores de Hadadézer
  - los esclavos de Hadadézer
  lexicon: HALOT
  rationale: עבדים puede ser 'siervos', 'servidores', 'oficiales' o 'esclavos' según el contexto. Aquí la referencia más probable es a servidores/retenedores de la corte o administración real; 'siervos' conserva el campo semántico amplio y evita la carga demasiado específica de 'esclavos'.
- source_word: וַיְבִיאֵם
  english_pob_choice: and brought them
  chosen_spanish: y los llevó
  alternatives_spanish:
  - y los trajo
  - y los condujo
  lexicon: HALOT
  rationale: El verbo הביא en hiphil significa 'traer/llevar'. En español, 'los llevó' fluye de manera natural con el movimiento hacia Jerusalén y evita repetir innecesariamente el antecedente.
- source_word: יְרוּשָׁלִָם
  english_pob_choice: Jerusalem
  chosen_spanish: Jerusalén
  alternatives_spanish:
  - Jerusalem
  lexicon: HALOT
  rationale: Se usa la forma española estándar del topónimo.
translation_notes:
  revision_awareness: 'El texto sigue de cerca el hebreo de 2 Samuel 8:7 y mantiene la misma resolución léxica básica que el audit trail inglés: לקח = tomar, שלטי הזהב = escudos de oro, אשר היו אל = pertenecían a, עבדי הדדעזר = siervos de Hadadézer, הביא = llevar. No se detectaron revisiones aplicadas en el registro inglés; por eso no se introducen cambios interpretativos adicionales.'
  spanish_consistency_notes:
  - Se mantuvo «Y David» al inicio para reflejar la secuencia narrativa del hebreo.
  - Se eligió «siervos» como término amplio y consistente con el registro POB, evitando sustituirlo por «esclavos» sin una base contextual más fuerte.
  - La nota al pie preserva la alternativa léxica relevante sobre «escudos de oro» y la lectura minoritaria «quiveras», como en el auditor inglés.
