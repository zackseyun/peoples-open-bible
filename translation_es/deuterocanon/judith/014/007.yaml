review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la secuencia principal del griego: levantarlo, caer a los pies de Judit, expresar reverencia y pronunciar la bendición. También conserva adecuadamente las alternativas léxicas de σκηνώματι y ταραχθήσονται en notas. Sin embargo, «se postró ante su rostro» no es una buena representación idiomática ni fiel al sentido adoptado por el POB en contexto humano; suena a calco innecesario y puede distorsionar προσεκύνησεν τῷ προσώπῳ αὐτῆς, que aquí debe expresarse como reverencia ante ella, no literalmente “ante su rostro”.'
  spanish_quality_summary: El español es en general claro y digno, pero «ante su rostro» resulta poco natural en español bíblico contemporáneo y roza lo extraño. Además, «entre toda nación» es entendible pero menos idiomático que «entre todas las naciones», aunque la primera puede mantenerse por cercanía formal. Conviene reparar al menos la frase de reverencia para lograr legibilidad y naturalidad sin perder precisión.
  glossary_alignment: No hay conflicto con la terminología base del proyecto. «Judit», «Judá», «Bendita eres tú» y «morada» son apropiados. La decisión teológica de evitar adoración divina para προσκυνέω debe reflejarse mejor en el texto español con «se postró ante ella» o «se inclinó ante ella», no con «ante su rostro».
  issues:
  - severity: high
    issue: «se postró ante su rostro» es un calco poco natural y semánticamente defectuoso
    rationale: Aunque el griego contiene τῷ προσώπῳ αὐτῆς, el English POB revisado decidió no expandirlo como postura facial específica y lo tradujo simplemente como reverencia ante Judith. En español, «ante su rostro» suena forzado y puede sugerir una localización física extraña, no el acto de homenaje.
  - severity: low
    issue: «entre toda nación» es menos idiomático que «entre todas las naciones»
    rationale: La frase actual es comprensible y bastante cercana al singular distributivo griego, pero en español corriente suena algo rígida. No obstante, no constituye un error grave y puede dejarse si se prioriza cercanía formal.
