lexical_decisions:
- source_word: וְ/אֶת
  english_pob_choice: and
  chosen_spanish: y
  alternatives_spanish:
  - e
  - y también
  lexicon: HALOT
  rationale: El hebreo repite וְ con el marcador de objeto אֶת para continuar la lista iniciada en el versículo anterior. En español, el marcador de objeto no se expresa; basta con una coordinación natural con «y» para cada topónimo.
- source_word: בֵּית צ֥וּר
  english_pob_choice: Beth-zur
  chosen_spanish: Bet-sur
  alternatives_spanish:
  - Beth-zur
  - Bet Zur
  lexicon: HALOT
  rationale: Es un nombre propio de lugar. En español, «Bet» refleja de forma natural el elemento hebreo בֵּית sin cargar la forma inglesa «Beth»; se mantiene la transliteración del segundo elemento como «sur». La forma con guion conserva el carácter compuesto del topónimo.
- source_word: שׂוֹכ֖וֹ
  english_pob_choice: Soco
  chosen_spanish: Soco
  alternatives_spanish:
  - Socoh
  - Sokoh
  - Socho
  lexicon: HALOT
  rationale: Es un topónimo. La forma «Soco» sigue la decisión auditada del POB en inglés y resulta publicable en español sin añadir una traducción del nombre.
- source_word: עֲדֻלָּֽם
  english_pob_choice: Adullam
  chosen_spanish: Adulam
  alternatives_spanish:
  - Adullam
  lexicon: HALOT
  rationale: Es un nombre propio de lugar. En español, «Adulam» es una transliteración natural y transparente del hebreo, evitando una dependencia innecesaria de la grafía inglesa.
