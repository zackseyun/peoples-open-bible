translation:
  language: es
  text: Haz el bien al justo[a], y hallarás retribución; si no de él, será de Yahvé.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Griego: «si no de él, sino del Altísimo». El testimonio hebreo lee «de Yahvé».'
    reason: textual_variant
lexical_decisions:
- source_word: הֵיטִב / εὖ ποίησον
  english_pob_choice: Do good
  chosen_spanish: Haz el bien
  alternatives_spanish:
  - Haz bien
  - Obra el bien
  - Sé bondadoso
  lexicon: HALOT; LXX εὖ ποιέω
  rationale: La forma hebrea pide una acción benefactora concreta, y el griego paralelo también expresa hacer el bien. «Haz el bien» mantiene el mandato activo y suena natural en español bíblico contemporáneo.
- source_word: לַצַּדִּיק / εὐσεβεῖ
  english_pob_choice: to the righteous
  chosen_spanish: al justo
  alternatives_spanish:
  - al recto
  - al piadoso
  - al justo hombre
  lexicon: HALOT; LXX εὐσεβής
  rationale: El hebreo apunta al «justo», mientras que el griego ofrece un matiz de piedad. En español, «el justo» conserva la base hebrea y sigue siendo claro para el lector.
- source_word: תִּמְצָא / εὑρήσεις
  english_pob_choice: you will find
  chosen_spanish: hallarás
  alternatives_spanish:
  - encontrarás
  - recibirás
  - obtendrás
  lexicon: HALOT; LXX εὑρήσεις
  rationale: «Hallarás» preserva la idiomática verbal de «encontrar» del hebreo y del griego, sin perder la idea de consecuencia esperada.
- source_word: תַשְׁלוּמַת / ἀνταπόδομα
  english_pob_choice: repayment
  chosen_spanish: retribución
  alternatives_spanish:
  - recompensa
  - pago
  - retribución debida
  lexicon: HALOT; LXX ἀνταπόδομα
  rationale: El término expresa retorno o compensación. «Retribución» comunica bien la reciprocidad del término sin reducirlo a un mero pago económico.
- source_word: אִם לֹא מִמֶּנוּ / εἰ μὴ παρ' αὐτοῦ
  english_pob_choice: if not from him
  chosen_spanish: si no de él
  alternatives_spanish:
  - si no por él
  - si no de ese mismo
  - si no de su parte
  lexicon: HALOT; LXX παρ' αὐτοῦ
  rationale: La construcción conserva el referente singular masculino del hebreo y del griego. «De él» mantiene la relación de procedencia/partido implícita en la frase.
- source_word: מֵיְהֹוָה / Ὑψίστου
  english_pob_choice: from Yahweh / from the Most High
  chosen_spanish: de Yahvé
  alternatives_spanish:
  - del Altísimo
  - de Yahveh
  - del Señor
  lexicon: HALOT; LXX Ὑψίστου
  rationale: El testimonio hebreo preserva el nombre divino, por lo que el texto principal usa «Yahvé». La variante griega «el Altísimo» se documenta en la nota textual sin desplazar el testimonio hebreo.
theological_decisions:
- issue: Variante final entre el hebreo y el griego sobre el título divino
  english_pob_reading: 'from the LORD; footnote notes Greek: from the Most High'
  chosen_spanish_reading: de Yahvé
  alternative_spanish_readings:
  - del Altísimo
  - del Señor
  rationale: La prioridad del testimonio hebreo favorece mantener el nombre divino en el texto principal. La lectura griega se conserva como variante significativa, no armonizada silenciosamente.
  doctrine_reference: 'DOCTRINE.md: original-language primacy; contested terms for YHWH'
- issue: Referente singular masculino para el beneficiario
  english_pob_reading: him
  chosen_spanish_reading: de él
  alternative_spanish_readings:
  - de ese justo
  - de esa persona
  rationale: El hebreo y el griego usan un singular masculino; la traducción conserva esa precisión gramatical. No se neutraliza a plural ni se difumina el referente.
  doctrine_reference: 'DOCTRINE.md: gender-accurate over gender-neutral'
translation_notes:
  revision_awareness: 'El borrador sigue la revisión más reciente sin cambios sustantivos: el hebreo de Kahana y el paralelo griego concuerdan en la estructura del dicho; la única variación teológicamente relevante es el título divino final, que se documenta en la nota.'
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» en lugar de «SEÑOR» para reflejar el nombre divino hebreo, conforme al estándar del proyecto.
  - «Haz el bien» y «retribución» conservan la reciprocidad moral del dicho sin introducir un matiz excesivamente comercial.
  - La nota textual usa una formulación breve y transparente para que el lector distinga entre el testimonio hebreo y el griego.
