id: PSA.125.1
reference: Psalms 125:1
source:
  edition: WLC
  text: שִׁ֗יר הַֽ/מַּ֫עֲל֥וֹת הַ/בֹּטְחִ֥ים בַּ/יהוָ֑ה כְּֽ/הַר צִיּ֥וֹן לֹא יִ֝מּ֗וֹט לְ/עוֹלָ֥ם יֵשֵֽׁב־־׃
translation:
  text: A Song of Ascents. Those who trust in Yahweh are like Mount Zion[a], which cannot be shaken, but remains forever.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more formally, 'it will not be moved.'
    reason: lexical_alternative
lexical_decisions:
- source_word: שִׁיר הַמַּעֲלוֹת
  chosen: A Song of Ascents
  alternatives:
  - A song of goings up
  - A pilgrim song
  lexicon: HALOT
  rationale: Traditional superscription formula in Psalms 120–134. 'Ascents' preserves the lexical sense of מַעֲלוֹת and the established literary designation without over-paraphrasing.
- source_word: הַבֹּטְחִים
  chosen: Those who trust
  alternatives:
  - Those who are trusting
  - The ones trusting
  lexicon: HALOT
  rationale: The participle denotes a class of people characterized by trust. 'Those who trust' is natural English and preserves the ongoing/general force.
- source_word: בַּיהוָה
  chosen: in the LORD
  alternatives:
  - in Yahweh
  lexicon: HALOT
  rationale: Per doctrine, יְהוָה is rendered 'the LORD.' The preposition ב marks the object of trust, naturally expressed in English as 'trust in.'
- source_word: כְּהַר צִיּוֹן
  chosen: like Mount Zion
  alternatives:
  - as Mount Zion
  lexicon: HALOT
  rationale: כְּ marks comparison. 'Mount Zion' is the standard English transliteration of the place name and preserves the simile.
- source_word: לֹא יִמּוֹט
  chosen: it cannot be shaken
  alternatives:
  - it will not be moved
  - it will not totter
  lexicon: HALOT
  rationale: מוֹט in the Niphal commonly conveys being shaken, moved, or made to totter. 'Cannot be shaken' communicates the stability image in idiomatic modern English while preserving the force of negation.
- source_word: לְעוֹלָם יֵשֵׁב
  chosen: it remains forever
  alternatives:
  - it sits forever
  - it abides forever
  - it dwells forever
  lexicon: HALOT
  rationale: יָשַׁב literally means 'sit/dwell/remain.' With לְעוֹלָם, the sense is enduring permanence. 'Remains forever' best conveys the poetic point in clear English.
