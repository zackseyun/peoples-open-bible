translation:
  language: es
  text: ¿A quién superas en hermosura? Desciende, y yace[a] con los incircuncisos[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «y acuéstate con los incircuncisos» o «y yace con los incircuncisos».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «¿Más hermoso que quién eres?». El hebreo expresa una comparación retórica.'
    reason: lexical_alternative
lexical_decisions:
- source_word: מִמִּי / נָעָמְתָּ
  english_pob_choice: Whom do you surpass in beauty?
  chosen_spanish: ¿A quién superas en hermosura?
  alternatives_spanish:
  - ¿Más hermoso que quién eres?
  - ¿A quién eres más hermoso?
  - ¿A quién superas en belleza?
  lexicon: HALOT
  rationale: El hebreo usa una pregunta retórica comparativa; en español, «¿A quién superas en hermosura?» conserva la comparación sin volverla torpe. «Hermosura» comunica el campo de belleza/atractivo del contexto funerario-oracular.
- source_word: רְדָה
  english_pob_choice: Go down
  chosen_spanish: Desciende
  alternatives_spanish:
  - Baja
  - Ve abajo
  lexicon: HALOT
  rationale: El imperativo de ירד pide un movimiento de descenso. «Desciende» es natural en español bíblico y mantiene el tono solemne del anuncio de muerte y sepultura.
- source_word: וְהָשְׁכְּבָה
  english_pob_choice: and lie with
  chosen_spanish: y yace con
  alternatives_spanish:
  - y acuéstate con
  - y tiéndete con
  - y yacerás con
  lexicon: HALOT
  rationale: En este contexto, שכב funciona como imperativo de yacer en la muerte/sepultura. «Yace con» reproduce la forma breve y la relación de asociación indicada por el hebreo sin añadir la interpretación funeraria explícita de «ser puesto a reposar».
- source_word: עֲרֵלִים
  english_pob_choice: the uncircumcised
  chosen_spanish: los incircuncisos
  alternatives_spanish:
  - los no circuncidados
  - los incircuncisos hombres
  lexicon: HALOT
  rationale: Se mantiene el término covenantal y de afrenta ritual del hebreo. «Incircuncisos» es el equivalente bíblico directo en español y preserva la carga de vergüenza y exclusión del pacto.
theological_decisions:
- issue: Carga covenantal de עֲרֵלִים en un oráculo de juicio
  english_pob_reading: the uncircumcised
  chosen_spanish_reading: los incircuncisos
  alternative_spanish_readings:
  - los paganos
  - los impuros
  rationale: El hebreo nombra de forma concreta la falta de circuncisión; no conviene diluirlo en categorías más amplias. «Los incircuncisos» conserva el marcador del pacto y la vergüenza asociada en el oráculo.
  doctrine_reference: Translation philosophy §§1, 3, 5
- issue: Valor de la comparación retórica en מִמִּי נָעָמְתָּ
  english_pob_reading: Whom do you surpass in beauty?
  chosen_spanish_reading: ¿A quién superas en hermosura?
  alternative_spanish_readings:
  - ¿Más hermoso que quién eres?
  - ¿A quién eres más hermoso?
  rationale: La pregunta no solo informa belleza; confronta a Egipto/Faraón con otros en comparación retórica. El español elegido conserva la tensión sin convertirla en paráfrasis interpretativa.
  doctrine_reference: Translation philosophy §§1, 4
translation_notes:
  revision_awareness: La redacción española sigue la revisión más reciente del POB inglés, que prefirió «lie with» sobre una expansión como «be laid to rest», evitando añadir interpretación funeraria no exigida por el hebreo. Por eso se opta por «yace con», breve y directo, sin perder el contexto de descenso a la muerte.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma del proyecto, pero este versículo no contiene el tetragrámaton.
  - Se usa «incircuncisos» para preservar el lenguaje de pacto, no una generalización como «paganos».
  - «Hermosura» funciona aquí mejor que «belleza» por su tono bíblico y su adecuación a la pregunta retórica.
  - La puntuación sigue el interrogativo retórico del hebreo con dos imperativos coordinados.
