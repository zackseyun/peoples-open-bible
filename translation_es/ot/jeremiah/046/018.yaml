translation:
  language: es
  text: Vivo yo[a] —declara el Rey, cuyo nombre es Yahvé de los ejércitos—, ciertamente, como Tabor entre los montes y como Carmelo junto al mar[b], así vendrá.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Tan cierto como que vivo».'
    reason: alternative_reading
  - marker: b
    text: El sujeto implícito de «vendrá» no aparece expresado en hebreo; el contexto apunta al conquistador anunciado en los versículos circundantes.
    reason: cross_reference
lexical_decisions:
- source_word: חַי אָ֨נִי
  english_pob_choice: As I live
  chosen_spanish: Vivo yo
  alternatives_spanish:
  - Tan cierto como que vivo
  - ¡Vivo yo!
  lexicon: HALOT
  rationale: Es una fórmula de juramento divina. «Vivo yo» conserva la fuerza enfática y el orden natural en español bíblico sin volverse arcaico en exceso.
- source_word: נְאֻם
  english_pob_choice: declares
  chosen_spanish: declara
  alternatives_spanish:
  - dice
  - oráculo de
  lexicon: HALOT
  rationale: Funciona como marcador profético de enunciación solemne. «Declara» mantiene la solemnidad y evita la dureza de «oráculo de» en el texto principal.
- source_word: הַמֶּלֶךְ
  english_pob_choice: the King
  chosen_spanish: el Rey
  alternatives_spanish:
  - el rey
  lexicon: HALOT
  rationale: Aquí el título se refiere a Dios en aposición al nombre divino. En español, la mayúscula ayuda a preservar esa referencia reverente y titular.
- source_word: יְהוָה צְבָאוֹת
  english_pob_choice: Yahweh of Armies
  chosen_spanish: Yahvé de los Ejércitos
  alternatives_spanish:
  - Yahvé de Armies
  - Yahvé de los ejércitos
  - el SEÑOR de los ejércitos
  lexicon: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh; HALOT'
  rationale: Se mantiene «Yahvé» por la convención doctrinal del proyecto. «Ejércitos» traduce צְבָאוֹת de manera transparente y conserva la imagen militar sin recurrir al tradicional «de los ejércitos» como fórmula fija si no fuera necesaria; aquí sí resulta natural y clara.
- source_word: שְׁמוֹ
  english_pob_choice: whose name is
  chosen_spanish: cuyo nombre es
  alternatives_spanish:
  - y su nombre es
  - el cual tiene por nombre
  lexicon: HALOT
  rationale: 'La construcción relativa expresa bien la relación de identificación: el Rey es aquel cuyo nombre es Yahvé de los Ejércitos.'
- source_word: כִּי
  english_pob_choice: surely
  chosen_spanish: ciertamente
  alternatives_spanish:
  - seguramente
  - en verdad
  lexicon: HALOT
  rationale: Aquí introduce una aseveración enfática, no una causalidad. «Ciertamente» comunica el matiz de seguridad solemne.
- source_word: כְּתָבוֹר בֶּהָרִים
  english_pob_choice: as Tabor among the mountains
  chosen_spanish: como Tabor entre los montes
  alternatives_spanish:
  - como Tabor entre las montañas
  - como Tabor en medio de los montes
  lexicon: HALOT
  rationale: «Entre los montes» conserva la comparación de prominencia del monte Tabor dentro del paisaje montañoso y suena natural en español bíblico.
- source_word: וּכְכַרְמֶל בַּיָּם
  english_pob_choice: and like Carmel by the sea
  chosen_spanish: y como Carmelo junto al mar
  alternatives_spanish:
  - y como Carmelo a la orilla del mar
  - y como Carmelo por el mar
  lexicon: HALOT
  rationale: Se translitera el nombre como «Carmelo» en la forma más habitual del español bíblico. «Junto al mar» reproduce la ubicación costera sin sobreespecificar.
- source_word: יָבֹוא
  english_pob_choice: he will come
  chosen_spanish: así vendrá él
  alternatives_spanish:
  - así vendrá
  - así llegará él
  lexicon: HALOT
  rationale: El hebreo deja el sujeto implícito. En contexto, el referente es el conquistador anunciado en los versículos vecinos. «Él» conserva la referencia implícita sin añadir un nombre que el verso no dice.
theological_decisions:
- issue: Rendering of the divine name יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Jehová
  rationale: Se sigue la directriz del proyecto de no ocultar el nombre del pacto detrás de una sustitución. «Yahvé» mantiene la identificación explícita del Tetragrámaton.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Translation of צְבָאוֹת
  english_pob_reading: of Armies
  chosen_spanish_reading: de los Ejércitos
  alternative_spanish_readings:
  - de los ejércitos
  - de las huestes
  rationale: «Ejércitos» conserva la imaginería militar de manera transparente para lectores hispanohablantes y evita depender de la fórmula tradicional «huestes», menos transparente hoy.
  doctrine_reference: DOCTRINE.md Translation philosophy §1, §6
- issue: Implicit subject of יָבֹוא
  english_pob_reading: he will come
  chosen_spanish_reading: vendrá él
  alternative_spanish_readings:
  - vendrá
  - vendrá uno
  rationale: El verbo hebreo está en tercera persona singular masculina sin sujeto expreso. Dado el contexto inmediato, la traducción mantiene la referencia al invasor/conquistador sin convertirla en una generalidad impersonal.
  doctrine_reference: Contexto de Jeremías 46:17–19; revisión auditada de la POB inglesa
translation_notes:
  revision_awareness: 'La redacción sigue la revisión más reciente del POB inglés: conserva la estructura comparativa «como Tabor... y como Carmelo..., así vendrá él», mantiene el nombre divino como Yahvé, y no sustituye el sujeto implícito por un indefinido. La forma española busca reflejar esa misma decisión sin depender mecánicamente del inglés.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» conforme al criterio del proyecto para יְהוָה.
  - Se traduce צְבָאוֹת como «de los Ejércitos» para conservar la fuerza militar del término.
  - «El Rey» se capitaliza por su referencia divina en el contexto.
  - «Carmelo» sigue la forma habitual en español bíblico, en vez de una transliteración más estricta.
  - El cierre «así vendrá él» preserva la implicación del sujeto sin añadir un referente no presente en el verso.
