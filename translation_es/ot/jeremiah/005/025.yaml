revisions:
- from: Sus iniquidades han apartado estas[a], y sus pecados han retenido el bien[b] de ustedes.
  to: Sus iniquidades han apartado estas cosas[a], y sus pecados les han privado del bien[b].
  rationale: Se ajusta la segunda cláusula para expresar de manera idiomática y fiel la privación indicada por מָנְעוּ ... מִכֶּם. También se cambia «estas» por «estas cosas» para mejor legibilidad en español, conservando en nota la forma más literal y el referente implícito. La nota sobre הַטּוֹב se alinea mejor con la alternativa documentada en la auditoría inglesa.
