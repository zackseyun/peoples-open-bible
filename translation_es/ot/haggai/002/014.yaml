translation:
  language: es
  text: 'Entonces Hageo respondió y dijo[a]: «Así es este pueblo[b], y así es esta nación delante de mí», declara Yahvé, «y así es toda obra de sus manos; y lo que ofrecen allí es impuro».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Así es este pueblo ... y así es esta nación».'
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «este pueblo», una expresión marcada que puede sonar distante o reprochadora.'
    reason: cultural_note
lexical_decisions:
- source_word: כֵּן
  english_pob_choice: so is
  chosen_spanish: así es
  alternatives_spanish:
  - así es
  - tal es
  - de ese modo es
  lexicon: HALOT
  rationale: El hebreo repite כֵּן como fórmula comparativa y evaluativa. «Así es» conserva esa fuerza de juicio sin sonar forzado en español, y mantiene el paralelismo con la cláusula anterior.
- source_word: הָעָם הַזֶּה
  english_pob_choice: this people
  chosen_spanish: este pueblo
  alternatives_spanish:
  - este pueblo aquí
  - estos pueblos
  lexicon: HALOT
  rationale: «Pueblo» reproduce el singular colectivo del hebreo y el tono profético algo distanciado del demostrativo «este». «Este pueblo aquí» sería más marcado pero menos natural en español.
- source_word: הַגּוֹי הַזֶּה
  english_pob_choice: this nation
  chosen_spanish: esta nación
  alternatives_spanish:
  - este pueblo-nación
  - esta gente
  lexicon: HALOT
  rationale: «Nación» corresponde al valor normal de גּוֹי en este contexto y conserva el paralelismo con «este pueblo». No se añade «gentil» porque el contexto se refiere a la comunidad posexílica, no a naciones extranjeras.
- source_word: לְפָנַי
  english_pob_choice: before me
  chosen_spanish: delante de mí
  alternatives_spanish:
  - ante mí
  - en mi presencia
  lexicon: HALOT
  rationale: «Delante de mí» transmite bien la relación de evaluación/presencia judicial. «Ante mí» sería igualmente posible, pero «delante de mí» suena más transparente en español moderno.
- source_word: נְאֻם יְהוָה
  english_pob_choice: declares Yahweh
  chosen_spanish: declara Yahvé
  alternatives_spanish:
  - oráculo de Yahvé
  - dice Yahvé
  lexicon: HALOT
  rationale: Se conserva el nombre divino «Yahvé» según la convención del proyecto, y «declara» reproduce con solemnidad la fórmula profética. «Dice Yahvé» es posible, pero menos formal.
- source_word: כָּל מַעֲשֵׂה יְדֵיהֶם
  english_pob_choice: every work of their hands
  chosen_spanish: toda obra de sus manos
  alternatives_spanish:
  - toda la obra de sus manos
  - cada obra de sus manos
  lexicon: HALOT
  rationale: La expresión hebrea mantiene la idiomática «obra de sus manos». «Toda obra» preserva el distributivo de כָּל sin recargar la frase con una formulación más explicativa.
- source_word: וַאֲשֶׁר יַקְרִיבוּ
  english_pob_choice: what they offer
  chosen_spanish: y lo que ofrecen
  alternatives_spanish:
  - y lo que presentan
  - y lo que ofrecen en sacrificio
  lexicon: HALOT
  rationale: En contexto cultual, יַקְרִיבוּ significa ofrecer/presentar. «Lo que ofrecen» es fiel y natural; evita añadir «en sacrificio» porque el verso ya lo sugiere sin expresarlo explícitamente.
- source_word: שָׁם
  english_pob_choice: there
  chosen_spanish: allí
  alternatives_spanish:
  - ahí
  - en ese lugar
  lexicon: HALOT
  rationale: «Allí» conserva la referencia espacial deíctica sin especificar más de lo que dice el hebreo.
- source_word: טָמֵא הוּא
  english_pob_choice: is unclean
  chosen_spanish: es inmundo
  alternatives_spanish:
  - está impuro
  - es impuro
  lexicon: HALOT
  rationale: En lenguaje ritual bíblico, «inmundo» es una equivalencia tradicional y precisa para טָמֵא; mantiene el campo semántico de pureza/impureza. «Es impuro» también sería válido, pero «inmundo» refleja mejor el registro cultual.
theological_decisions:
- issue: Renderizado del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - el SEÑOR
  rationale: El texto hebreo contiene el Tetragrama de forma directa. Conforme a la convención del proyecto, se usa «Yahvé» para preservar el nombre pactual y evitar el reemplazo devocional tradicional por «SEÑOR».
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Alcance de «este pueblo / esta nación»
  english_pob_reading: refers to Judah/the returned covenant community corporately, not to foreign Gentile nations
  chosen_spanish_reading: se refiere a la comunidad del pacto restaurada, en conjunto, no a naciones extranjeras
  alternative_spanish_readings:
  - se refiere solo a Judá
  - se refiere a un pueblo cualquiera
  rationale: 'El contexto de Hageo es posexílico y sacerdotal: la acusación se dirige a la comunidad restaurada y a su condición ritual. Mantener «pueblo» y «nación» en paralelo ayuda a conservar el énfasis corporativo sin importar un sentido gentil que el texto no exige.'
  doctrine_reference: Contexto histórico-literario de Hageo 2:14; pureza ritual en relación con la comunidad del pacto
translation_notes:
  revision_awareness: Se siguió el pasaje base y el audit trail en inglés sin cambios sustantivos respecto a la revisión más reciente; la redacción española se ajustó para ser publicable y para conservar el paralelismo hebreo, el registro profético y la terminología ritual.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» para יְהוָה, coherente con la política terminológica del proyecto.
  - Se eligió «inmundo» para טָמֵא por su fuerza cultual y su correspondencia bíblica tradicional, sin perder inteligibilidad moderna.
  - Se preservó el paralelismo «este pueblo / esta nación» para reflejar la duplicación hebrea y su matiz retórico.
  - La nota [b] se ancla en «este pueblo» para señalar el tono marcado del hebreo sin alterar el texto principal.
