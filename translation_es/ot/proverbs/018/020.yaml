translation:
  language: es
  text: Del fruto de la boca del hombre su vientre se sacia[a]; del producto de sus labios se sacia.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Por el fruto de la boca de un hombre su vientre se llena; por el producto de sus labios él se llena».'
    reason: lexical_alternative
lexical_decisions:
- source_word: מִ/פְּרִי
  english_pob_choice: From the fruit of
  chosen_spanish: Del fruto de
  alternatives_spanish:
  - Por el fruto de
  - A partir del fruto de
  lexicon: HALOT
  rationale: מִן expresa origen o procedencia. «Del fruto de» conserva la imagen y el sentido de procedencia sin forzar una paráfrasis.
- source_word: פִי
  english_pob_choice: mouth
  chosen_spanish: boca
  alternatives_spanish:
  - labios
  - boca
  lexicon: HALOT
  rationale: Aunque el inglés POB usa «mouth», en español «boca» es la forma natural y directa para el órgano del habla, manteniendo la metáfora de la expresión verbal.
- source_word: אִישׁ
  english_pob_choice: a man's
  chosen_spanish: del hombre
  alternatives_spanish:
  - de una persona
  - de alguien
  lexicon: HALOT
  rationale: El hebreo es masculino singular y proverbialmente genérico. «Del hombre» conserva esa forma sin suavizar el rasgo gramatical.
- source_word: תִּשְׂבַּע
  english_pob_choice: is satisfied
  chosen_spanish: se sacia
  alternatives_spanish:
  - se satisface
  - queda satisfecho
  lexicon: HALOT
  rationale: שׂבע significa «saciarse, quedar satisfecho». «Se sacia» es idiomático en español y mantiene la fuerza del verbo con una construcción natural.
- source_word: בִּטְנוֹ
  english_pob_choice: his stomach
  chosen_spanish: su vientre
  alternatives_spanish:
  - su estómago
  - sus entrañas
  lexicon: HALOT
  rationale: בֶּטֶן puede referirse literalmente al vientre/estómago y, en contexto sapiencial, al interior de la persona. «Vientre» conserva el tono corporal y poético mejor que «estómago» en español bíblico contemporáneo.
- source_word: תְּבוּאַת
  english_pob_choice: the produce of
  chosen_spanish: el producto de
  alternatives_spanish:
  - la cosecha de
  - el rendimiento de
  lexicon: HALOT
  rationale: תְּבוּאָה denota producto, rendimiento o cosecha. «Producto» preserva la imagen agrícola y se corresponde con «fruto» en el primer hemistiquio.
- source_word: שְׂפָתָיו
  english_pob_choice: his lips
  chosen_spanish: sus labios
  alternatives_spanish:
  - su habla
  - lo que dice
  lexicon: HALOT
  rationale: שָׂפָה significa literalmente «labio» y aquí funciona metonímicamente para el habla. «Labios» conserva el paralelismo con «boca».
- source_word: יִשְׂבָּע
  english_pob_choice: he is satisfied
  chosen_spanish: se sacia
  alternatives_spanish:
  - queda satisfecho
  - se llena
  lexicon: HALOT
  rationale: Repetir «se sacia» reproduce la repetición léxica de שׂבע en ambos cola, reforzando la idea de consecuencia de las palabras.
translation_notes:
  revision_awareness: 'Base text aligned with the Hebrew word order and the English POB audit trail. Main adjustment for Spanish naturalness: English «mouth» rendered as «boca» and «stomach» as «vientre» to preserve the bodily metaphor in publication-ready Spanish. No applied revisions were noted in the source packet, and the cross-check status was high agreement.'
  spanish_consistency_notes:
  - Se mantiene la repetición de «se sacia» para reflejar el doble uso de שׂבע.
  - «Vientre» conserva la imagen corporal sin desplazar el sentido proverbial hacia una interioridad abstracta.
  - «Fruto» y «producto» conservan la paralela imaginería agrícola del hebreo.
