translation:
  language: es
  text: sobre el engaño con balanzas[a] y pesas[b], y sobre las medidas de un efa[c] y de una piedra de peso.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El griego paralelo dice más bien 'sobre la exactitud de la balanza y de las pesas', en lugar de 'sobre el engaño con balanzas y pesas'. El testimonio hebreo aquí es difícil y no coincide limpiamente con el griego.
    reason: alternative_reading
  - marker: b
    text: 'La segunda línea griega difiere considerablemente: dice ''sobre adquirir mucho y poco'' o ''sobre cantidades grandes y pequeñas'', mientras que el hebreo menciona un efa y una piedra de peso.'
    reason: textual_variant
  - marker: c
    text: Un efa era una antigua medida para secos; una 'piedra de peso' era una piedra usada como peso estándar en el comercio.
    reason: cultural_note
lexical_decisions:
- source_word: ἀκριβείας
  english_pob_choice: cheating / accuracy
  chosen_spanish: exactitud
  alternatives_spanish:
  - engaño
  - fraude
  - precisión
  lexicon: BDAG
  rationale: El griego apunta con naturalidad a la exactitud o precisión en el pesaje; en español, 'exactitud' conserva esa idea sin inclinarse innecesariamente a una acusación explícita de fraude que el griego no exige.
- source_word: ζυγοῦ
  english_pob_choice: scales
  chosen_spanish: balanza
  alternatives_spanish:
  - escala
  - balanzas
  lexicon: BDAG
  rationale: '''Balanza'' es el equivalente natural en español para el instrumento de pesaje; evita una forma menos idiomática y mantiene el campo semántico del comercio.'
- source_word: σταθμίων
  english_pob_choice: weights / balances
  chosen_spanish: pesas
  alternatives_spanish:
  - pesas de peso
  - ponderales
  - pesos
  lexicon: BDAG
  rationale: El término griego se refiere a pesas o pesos estándar. 'Pesas' es claro en español y conserva la función de medida comercial.
- source_word: κτήσεως
  english_pob_choice: acquiring
  chosen_spanish: obtención
  alternatives_spanish:
  - adquisición
  - compra
  - posesión
  lexicon: BDAG
  rationale: La secuencia griega sugiere adquisición u obtención; 'obtención' es suficientemente amplia y no fuerza una interpretación comercial más específica de la que el texto da.
- source_word: πολλῶν καὶ ὀλίγων
  english_pob_choice: much and little / quantities great and small
  chosen_spanish: de mucho y de poco
  alternatives_spanish:
  - de grandes y pequeñas cantidades
  - de mucho y de poco [en cantidad]
  lexicon: BDAG
  rationale: La binominal griega contrasta cantidad grande y pequeña. 'De mucho y de poco' reproduce el contraste con economía y sin añadir elementos ajenos al texto.
theological_decisions:
- issue: Divergencia textual entre el griego y el hebreo en la segunda mitad del versículo
  english_pob_reading: The Greek second line reads about acquiring much and little / quantities great and small, while the Hebrew mentions ephah and stone weight.
  chosen_spanish_reading: Se traduce el griego con 'obtención de mucho y de poco', dejando implícito que la tradición hebrea divergente no se incorpora al texto principal.
  alternative_spanish_readings:
  - sobre las medidas de un efa y de una piedra de peso
  - sobre adquirir mucho y poco
  rationale: Dado que el paquete fuente presenta el griego como paralelo y el hebreo como testimonio difícil, la redacción española principal sigue el griego y no borra la variante hebrea; esta se puede consignar como nota textual si se requiere en edición crítica.
  doctrine_reference: Sirach 42:4 textual criticism / fuente paralela griego-hebreo
translation_notes:
  revision_awareness: 'Se corrigió el problema de validación anterior: cada marcador de nota aparece ahora explícitamente en el texto español y no hay notas huérfanas. También se ajustó la base textual para evitar depender del hebreo aislado frente al griego paralelo, que el paquete fuente ofrece como respaldo principal del contenido semántico.'
  spanish_consistency_notes:
  - Se emplea 'balanza' y 'pesas' como lenguaje comercial natural en español.
  - Se evita 'SEÑOR' u այլ masking, porque no intervienen nombres divinos en este versículo.
  - '''Exactitud'' mantiene la tensión entre precisión legítima y posible manipulación sin sobrerrecrear una acusación moral que el griego no formula de modo explícito.'
  - La puntuación final conserva el encabalgamiento breve del original.
