translation:
  language: es
  text: El que siembra injusticia cosechará aflicción[a], y la vara de su furor[b] llegará a su fin.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «calamidad», «desastre» o «sufrimiento». El hebreo אָוֶן puede denotar la consecuencia dañina o la miseria resultante.
    reason: lexical_alternative
  - marker: b
    text: O «la vara de su ira». La expresión puede referirse al derrumbe del poder airado o coercitivo del malvado.
    reason: alternative_reading
lexical_decisions:
- source_word: זוֹרֵעַ
  english_pob_choice: Whoever sows
  chosen_spanish: El que siembra
  alternatives_spanish:
  - Quien siembra
  - El que siembra
  lexicon: WLC/HALOT
  rationale: El participio qal funciona de modo genérico y proverbial. «El que siembra» conserva la imagen agrícola y su fuerza sapiencial en español natural.
- source_word: עַוְלָה
  english_pob_choice: injustice
  chosen_spanish: injusticia
  alternatives_spanish:
  - maldad
  - iniquidad
  - injusticia
  lexicon: HALOT
  rationale: El término apunta a injusticia o proceder torcido. «Injusticia» es claro, moderno y mantiene el peso moral del original.
- source_word: יקצור
  english_pob_choice: will reap
  chosen_spanish: cosechará
  alternatives_spanish:
  - segará
  - recolectará
  - cosechará
  lexicon: HALOT
  rationale: El verbo de la metáfora agrícola se expresa con futuro natural en español. «Cosechará» preserva la relación siembra/cosecha y sugiere consecuencia segura.
- source_word: אָוֶן
  english_pob_choice: trouble
  chosen_spanish: trouble[a]
  alternatives_spanish:
  - calamidad
  - desastre
  - aflicción
  lexicon: HALOT
  rationale: Se conserva la tensión lexical del inglés POB porque el hebreo puede abarcar daño, desgracia o consecuencia dolorosa. Dado que «trouble» no es un equivalente idiomático natural en español, se marca la opción alternativa en nota para no perder la amplitud semántica.
- source_word: וְשֵׁבֶט
  english_pob_choice: and the rod
  chosen_spanish: la vara
  alternatives_spanish:
  - la vara
  - el cetro
  - el bastón
  lexicon: HALOT
  rationale: En contexto de poder punitivo o coercitivo, «vara» es el correlato español más claro y bíblico, sin forzar el matiz de «cetro».
- source_word: עֶבְרָתוֹ
  english_pob_choice: his fury
  chosen_spanish: su furor
  alternatives_spanish:
  - su ira
  - su furia
  - su furor
  lexicon: HALOT
  rationale: «Furor» reproduce bien el tono intenso de עֶבְרָה en español bíblico y conserva el matiz de violencia emocional o impetuosa fuerza.
- source_word: יִכְלֶה
  english_pob_choice: will come to an end
  chosen_spanish: llegará a su fin
  alternatives_spanish:
  - se acabará
  - llegará a su fin
  - será consumida
  lexicon: HALOT
  rationale: El verbo expresa quedar terminado, consumirse o acabar. «Llegará a su fin» refleja el valor de culminación sin cargar el verso con una interpretación demasiado específica.
theological_decisions:
- issue: Sentido de la frase final וְשֵׁבֶט עֶבְרָתוֹ יִכְלֶה
  english_pob_reading: 'The phrase refers to the eventual collapse of the wrongdoer''s angry power: ''the rod of his fury will come to an end.'''
  chosen_spanish_reading: 'La frase se entiende como el fin del poder coercitivo o agresivo del malvado: «la vara de su furor llegará a su fin».'
  alternative_spanish_readings:
  - «la vara de su ira llegará a su fin»
  - «la vara de su furia llegará a su fin»
  - «la vara de su furor se agotará»
  rationale: El hebreo permite entender una vara literal o figurada como instrumento de dominio. El contexto sapiencial favorece la idea de que ese poder violento termina. «Llegará a su fin» mantiene esa amplitud y coincide con el audit trail en inglés.
  doctrine_reference: Proverbios sapienciales; juicio retributivo en la literatura de sabiduría
translation_notes:
  revision_awareness: 'Este borrador sigue la revisión más reciente del inglés POB en la cláusula final: se prefirió una expresión equivalente a «will come to an end» frente a un verbo más general como «fallar». También conserva la amplitud semántica de אָוֶן mediante nota, porque el español requiere una decisión léxica más estrecha que el hebreo.'
  spanish_consistency_notes:
  - Se mantiene «injusticia» para עַוְלָה, en línea con el uso ético sapiencial.
  - Se traduce שֵׁבֶט como «vara» por su valor de instrumento de dominio o castigo.
  - Se usa «furor» para עֶבְרָה para conservar el tono intenso sin volver el verso arcaico.
  - Se evita «SEÑOR» u otra sustitución teológica porque no aparece el nombre divino en este versículo.
