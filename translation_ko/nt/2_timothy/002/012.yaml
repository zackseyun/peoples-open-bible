id: 2TI.2.12
reference: 2 Timothy 2:12
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: εἰ ὑπομένομεν, καὶ συμβασιλεύσομεν· εἰ ⸀ἀρνησόμεθα, κἀκεῖνος ἀρνήσεται ἡμᾶς·
base_translation:
  language: en
  yaml_path: translation/nt/2_timothy/002/012.yaml
  text: If we endure, we will also reign with him; if we deny him, he also will deny us.
translation:
  language: ko
  text: 우리가 견디면, 그분과 함께 다스릴 것입니다. 우리가 그분을 부인하면, 그분도 우리를 부인하실 것입니다.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ὑπομένομεν
  english_pob_choice: we endure
  chosen_korean: 견디면
  alternatives_korean:
  - 참으면
  - 인내하면
  lexicon: BDAG
  rationale: 2:10의 「견뎌 내다」(ὑπομένω)와 통일. 11-13절 찬가의 운율적 짝을 위해 간결하게 「견디면」으로 옮긴다.
- source_word: συμβασιλεύσομεν
  english_pob_choice: we will also reign with him
  chosen_korean: 그분과 함께 다스릴 것입니다
  alternatives_korean:
  - 함께 왕 노릇 할 것입니다
  - 그분과 더불어 통치할 것입니다
  lexicon: BDAG
  rationale: συν- 접두사의 「함께함」을 살린다. βασιλεύω의 「왕적 통치」를 한국어 「다스리다」로 옮긴다. 「왕 노릇」은 한국 전통 번역의 옛 어휘.
- source_word: ἀρνησόμεθα ... ἀρνήσεται
  english_pob_choice: we deny him ... he also will deny us
  chosen_korean: 부인하면 ... 부인하실 것입니다
  alternatives_korean:
  - 모른다 하면 ... 모른다 하실 것입니다
  - 부정하면 ... 부정하실 것입니다
  lexicon: BDAG
  rationale: 'ἀρνέομαι는 「부인·거부」를 뜻한다. 「부인하다」가 한국 성서 전통(예: 베드로의 부인)에서 굳어진 어휘이며 본문의 무게를 담는다.'
theological_decisions:
- issue: 2:11-13 찬가의 두 번째 짝 — 견딤과 부인의 대조
  chosen_reading: 우리가 견디면 그분과 함께 다스릴 것입니다; 우리가 그분을 부인하면 그분도 우리를 부인하실 것입니다
  alternative_readings:
  - 우리가 참으면 함께 왕 노릇 할 것이요, 우리가 부인하면 그도 우리를 부인하실 것이요
  rationale: 11절과 동일한 운율 구조(「~으면 ~ 것입니다」)를 유지한다. 부정형 짝(부인↔부인)이 그리스도의 신실하심에 대한 엄숙한 경고를 담으므로 약화시키지 않는다. 한국 전통 번역의 「왕 노릇」은 현대 합쇼체에 맞지 않으므로 「다스리다」로 옮긴다.
  doctrine_reference: 'DOCTRINE.md: preserve theological force and literary structure'
