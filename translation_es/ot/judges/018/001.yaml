revisions:
- from: En aquellos días no había rey en Israel[a]. Y en aquellos días la tribu de Dan[b] buscaba para sí una heredad para habitar, porque hasta aquel día no le había caído heredad en medio de las tribus de Israel.
  to: En aquellos días no había rey en Israel. Y en aquellos días la tribu de Dan[a] buscaba para sí una heredad para habitar, porque hasta aquel día no le había caído heredad[b] en medio de las tribus de Israel.
  rationale: Se corrigieron los anclajes de las notas para que correspondan a las expresiones relevantes del texto fuente y del audit trail inglés. También se reemplazó la nota sobre 'una heredad' por la explicación del modismo completo 'no le había caído heredad', que es el punto lexical significativo preservado en la evidencia inglesa. El texto base se mantiene sustancialmente igual porque es fiel y legible.
