translation:
  language: es
  text: Porque no encontrarán la profundidad del corazón de un hombre[a], ni discernirán las palabras de su mente; y cómo escudriñarán a Dios, que hizo todas estas cosas, y conocerán su mente, y entenderán su pensamiento. De ningún modo, hermanos[b], no provoquen al Señor nuestro Dios.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «la profundidad del corazón humano». El griego usa un singular masculino genérico («de un hombre») con valor representativo de la humanidad.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «hermanos y hermanas». El griego dice literalmente «hermanos», con posible valor inclusivo para el grupo.'
    reason: lexical_alternative
lexical_decisions:
- source_word: βάθος καρδίας
  english_pob_choice: the depths of a man's heart
  chosen_spanish: la profundidad del corazón de un hombre
  alternatives_spanish:
  - la profundidad del corazón humano
  - las profundidades del corazón de un hombre
  lexicon: LSJ
  rationale: βάθος expresa la idea de lo hondo o inaccesible; en español, «profundidad» comunica bien esa imagen sin forzar un plural innecesario. καρδία se rinde como «corazón» en sentido interior/íntimo. Se conserva el singular masculino representativo de ἀνθρώπου, siguiendo la política del POB de no neutralizar ese rasgo en el texto principal.
- source_word: εὑρήσετε
  english_pob_choice: you will find
  chosen_spanish: encontrarán
  alternatives_spanish:
  - podrán encontrar
  - descubrirán
  lexicon: LSJ
  rationale: El futuro indicativo conserva la afirmación retórica de imposibilidad. «Encontrarán» es directo y natural en español.
- source_word: λόγους τῆς διανοίας αὐτοῦ
  english_pob_choice: the words of his mind
  chosen_spanish: las palabras de su mente
  alternatives_spanish:
  - los pensamientos de su mente
  - las expresiones de su pensamiento
  lexicon: LSJ
  rationale: 'Se conserva la distinción entre λόγους y διανοίας: no se reduce a «pensamientos» a secas. «Palabras de su mente» mantiene la imagen de razonamientos internos articulados, aunque en español suena más natural que un calco más pesado.'
- source_word: διαλήμψεσθε
  english_pob_choice: you will discern
  chosen_spanish: discernirán
  alternatives_spanish:
  - comprenderán
  - percibirán claramente
  lexicon: LSJ
  rationale: El verbo implica captar o distinguir con claridad. «Discernirán» preserva bien ese matiz de penetración intelectual.
- source_word: ἐρευνήσετε
  english_pob_choice: search out
  chosen_spanish: buscarán
  alternatives_spanish:
  - investigarán
  - examinarán
  lexicon: LSJ
  rationale: El compuesto sugiere una búsqueda exhaustiva. En español, el contexto retórico ya expresa la imposibilidad, y «buscarán» es claro y suficientemente fuerte; no obstante, se conserva la idea de una búsqueda dirigida a penetrar lo oculto.
- source_word: ὃς ἐποίησεν τὰ πάντα ταῦτα
  english_pob_choice: who made all these things
  chosen_spanish: que hizo todas estas cosas
  alternatives_spanish:
  - que creó todas estas cosas
  - que hizo todo esto
  lexicon: LSJ
  rationale: «Hizo» corresponde de cerca a ἐποίησεν y evita introducir una decisión doctrinal no explicitada por el griego. «Todas estas cosas» conserva la acumulación de τὰ πάντα ταῦτα.
- source_word: νοῦν αὐτοῦ
  english_pob_choice: his mind
  chosen_spanish: su mente
  alternatives_spanish:
  - su entendimiento
  - su intelecto
  lexicon: LSJ
  rationale: νοῦς aquí designa la capacidad mental/intelectiva de Dios. «Mente» es la forma española más natural y coherente con «palabras de su mente» del hemistiquio anterior.
- source_word: λογισμὸν αὐτοῦ
  english_pob_choice: his thought
  chosen_spanish: su pensamiento
  alternatives_spanish:
  - su razonamiento
  - su designio
  lexicon: LSJ
  rationale: λογισμός puede ser pensamiento, razonamiento o designio. «Pensamiento» conserva la amplitud semántica sin estrecharlo a «plan» o «designio».
- source_word: κατανοήσετε
  english_pob_choice: understand
  chosen_spanish: entenderán
  alternatives_spanish:
  - comprenderán
  - captarán
  lexicon: LSJ
  rationale: El verbo implica comprensión profunda. «Entenderán» es idiomático y suficientemente fuerte para el paralelismo de la frase.
- source_word: μηδαμῶς
  english_pob_choice: By no means
  chosen_spanish: De ningún modo
  alternatives_spanish:
  - En absoluto
  - De ninguna manera
  lexicon: LSJ
  rationale: La locución española reproduce bien la fuerza enfática y solemne de la partícula prohibitiva.
- source_word: ἀδελφοί
  english_pob_choice: brothers
  chosen_spanish: hermanos
  alternatives_spanish:
  - hermanos y hermanas
  - amados hermanos
  lexicon: LSJ
  rationale: Se mantiene la forma masculina plural del griego, según el criterio de conservar la forma fuente cuando funciona como vocativo colectivo. «Hermanos» es natural y reverente en español eclesial.
- source_word: μὴ παροργίζετε
  english_pob_choice: do not provoke
  chosen_spanish: no provoquen
  alternatives_spanish:
  - no irriten
  - no enfurezcan
  lexicon: LSJ
  rationale: παροργίζω significa provocar a ira. «Provocar» conserva la fuerza causativa mejor que «enojar» o «irritar».
- source_word: κύριον θεὸν ἡμῶν
  english_pob_choice: the Lord our God
  chosen_spanish: al Señor nuestro Dios
  alternatives_spanish:
  - al Señor Dios nuestro
  - a nuestro Señor Dios
  lexicon: LSJ
  rationale: Se conserva «Señor» como equivalente de κύριος en este contexto de cita griega que habla de Dios; aquí no funciona como ocultamiento del nombre divino hebreo, sino como título griego ya presente en el texto fuente. El orden español sigue la sintaxis natural sin perder el paralelo con el original.
theological_decisions:
- issue: Renderización de κύριος θεὸς ἡμῶν al final de la exhortación
  english_pob_reading: the Lord our God
  chosen_spanish_reading: al Señor nuestro Dios
  alternative_spanish_readings:
  - a Yahvé nuestro Dios
  - al Señor Dios nuestro
  rationale: El griego de este versículo usa κύριος θεός ἡμῶν; aquí el POB inglés mantiene «Lord» porque la forma fuente es griega y no el tetragrámaton. En español, «Señor» comunica fielmente el título kyrios sin sustituir indebidamente el dato del texto fuente por «Yahvé».
  doctrine_reference: DOCTRINE.md §Nombre divino y equivalencias griegas
- issue: Vocativo colectivo ἀδελφοί
  english_pob_reading: brothers
  chosen_spanish_reading: hermanos
  alternative_spanish_readings:
  - hermanos y hermanas
  - hermanos/as
  rationale: El griego presenta un vocativo masculino plural. El POB conserva la forma masculina cuando el texto la usa de modo colectivo; en español, «hermanos» conserva ese dato y sigue siendo la forma eclesial natural sin introducir neutralización no atestiguada.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
- issue: Relación entre lo humano y lo divino en la serie de preguntas retóricas
  english_pob_reading: human inability to fathom the heart and mind of God
  chosen_spanish_reading: incapacidad humana para sondear el interior humano y, por contraste, a Dios
  alternative_spanish_readings:
  - imposibilidad de comprender al ser humano y a Dios
  - incapacidad de entender el corazón humano y la mente de Dios
  rationale: La construcción retórica contrapone lo inaccesible del interior humano con la imposibilidad aún mayor de sondear a Dios. La traducción mantiene ese contraste sin suavizar la tensión entre ambas escalas de conocimiento.
  doctrine_reference: DOCTRINE.md §Source transparency and rhetorical force
translation_notes:
  revision_awareness: 'Se siguió la evaluación de alta concordancia del audit trail inglés y no se introdujeron cambios sustantivos respecto al sentido base. Se ajustó el castellano para sonar natural y solemne, manteniendo las tensiones documentadas: singular masculino representativo en ἀνθρώπου, vocativo masculino plural en ἀδελφοί, y la serie verbal que expresa incapacidad humana ante el conocimiento divino.'
  spanish_consistency_notes:
  - Se mantuvo «Dios» para θεὸν y «Señor» para κύριον, coherente con el texto griego y con el término español eclesial estándar.
  - 'Se conservó la progresión retórica: no encontrar / no discernir / buscar / conocer / entender / no provocar.'
  - «Mente» y «pensamiento» se mantuvieron distintos para reflejar νοῦς y λογισμός sin colapsarlos en un solo término.
  - El vocativo «hermanos» queda marcado con nota para la alternativa inclusiva, conforme al estilo POB.
  - Se evitó introducir «Cristo» o «Yahvé» porque no aparecen en este versículo griego específico.
