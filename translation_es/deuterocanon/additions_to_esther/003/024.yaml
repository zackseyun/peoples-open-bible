revisions:
- from: Pero líbranos[a] con tu mano, y ayúdame, yo, que estoy sola y no tengo a nadie excepto a ti, Señor. Tú tienes conocimiento de todas las cosas,
  to: Pero líbranos[a] por tu mano, y ayúdame, pues estoy sola y no tengo a nadie fuera de ti, Señor. Tú tienes conocimiento de todas las cosas,
  rationale: Se ajusta «ἐν χειρί σου» a «por tu mano» para reflejar mejor la agencia divina; se reemplaza la construcción poco natural «yo, que estoy sola» por «pues estoy sola»; y se pule la expresión de exclusividad a «fuera de ti», que suena más idiomática en registro orante. También se corrige la alternativa verbal en la nota.
