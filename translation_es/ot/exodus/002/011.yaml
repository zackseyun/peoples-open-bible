translation:
  language: es
  text: Aconteció en aquellos días[a], cuando Moisés ya había crecido, que salió a ver a sus hermanos y vio sus cargas. Y vio a un hombre egipcio que golpeaba a un hombre hebreo, uno de sus hermanos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «parientes» o «su pueblo» para «hermanos» / «uno de sus hermanos»; el hebreo usa lenguaje de familia para expresar la solidaridad de Moisés con los hebreos.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְהִי בַּיָּמִים הָהֵם
  english_pob_choice: Now it happened in those days
  chosen_spanish: Aconteció en aquellos días
  alternatives_spanish:
  - Y aconteció en aquellos días
  - En aquellos días
  lexicon: HALOT
  rationale: La fórmula narrativa hebrea se conserva con un giro español natural y digno. «Aconteció» mantiene el movimiento de transición del waw consecutivo sin caer en un calco demasiado rígido; «en aquellos días» reproduce con claridad la referencia temporal.
- source_word: וַיִּגְדַּל
  english_pob_choice: had grown up
  chosen_spanish: ya había crecido
  alternatives_spanish:
  - creció
  - había crecido
  lexicon: HALOT
  rationale: En el contexto, el verbo señala que Moisés alcanzó madurez antes de salir. El pluscuamperfecto español ayuda a reflejar la secuencia narrativa indicada por el inglés POB y el hebreo.
- source_word: אֶל אֶחָיו
  english_pob_choice: to his brothers
  chosen_spanish: hacia sus hermanos
  alternatives_spanish:
  - a sus hermanos
  - hacia sus parientes
  - hacia su pueblo
  lexicon: HALOT
  rationale: Se conserva la metáfora de parentesco documentada por el POB. «Hermanos» traduce directamente el plural masculino hebreo y mantiene la solidaridad familiar/étnica del texto. «Hacia» expresa el movimiento de salida con naturalidad en español.
- source_word: בְּסִבְלֹתָם
  english_pob_choice: their burdens
  chosen_spanish: sus cargas
  alternatives_spanish:
  - sus pesadas cargas
  - sus trabajos forzados
  - sus sufrimientos
  lexicon: HALOT
  rationale: El sustantivo hebreo alude a cargas/opresión, y el POB opta por una forma amplia que no sobre-especifica. «Cargas» conserva la imagen concreta y permite incluir la dimensión de opresión sin añadir interpretaciones ajenas al texto.
- source_word: אִישׁ מִצְרִי
  english_pob_choice: an Egyptian man
  chosen_spanish: un hombre egipcio
  alternatives_spanish:
  - un egipcio
  - un cierto hombre egipcio
  lexicon: HALOT
  rationale: Se mantiene la construcción איש + gentilicio con «hombre», paralela a la siguiente frase. Esto preserva el balance retórico del verso y la precisión del hebreo.
- source_word: מַכֶּה
  english_pob_choice: striking
  chosen_spanish: que golpeaba
  alternatives_spanish:
  - que estaba golpeando
  - que hería
  - que pegaba
  lexicon: HALOT
  rationale: El participio describe una acción en curso de agresión física. «Golpeaba» es claro en español y comunica el acto continuo sin intensificarlo más de lo que el texto exige.
- source_word: אִישׁ עִבְרִי
  english_pob_choice: a Hebrew man
  chosen_spanish: un hombre hebreo
  alternatives_spanish:
  - un hebreo
  - un hombre de los hebreos
  lexicon: HALOT
  rationale: Se conserva el paralelismo con «un hombre egipcio» y el patrón איש + gentilicio. «Hebreo» traduce el término gentilicio de manera directa y comprensible.
- source_word: מֵאֶחָיו
  english_pob_choice: one of his brothers
  chosen_spanish: uno de sus hermanos
  alternatives_spanish:
  - uno de sus parientes
  - uno de los suyos
  - uno de su pueblo
  lexicon: HALOT
  rationale: La frase final identifica al hebreo como miembro del mismo grupo familiar/solidario de Moisés. «Uno de sus hermanos» conserva el enlace léxico con «sus hermanos» del verso y la misma carga de cercanía documentada en el audit trail.
theological_decisions:
- issue: Lenguaje de parentesco para אֶחָיו / מֵאֶחָיו
  english_pob_reading: brothers / one of his brothers
  chosen_spanish_reading: sus hermanos / uno de sus hermanos
  alternative_spanish_readings:
  - sus parientes / uno de sus parientes
  - su pueblo / uno de su pueblo
  rationale: Se conserva el lenguaje familiar masculino porque el hebreo usa deliberadamente ese campo semántico para expresar la identificación de Moisés con los hebreos. La alternativa más inclusiva o más colectiva es posible como interpretación, pero el texto no la requiere y el POB documenta explícitamente la solidaridad fraterna.
  doctrine_reference: DOCTRINE.md Translation philosophy §4
translation_notes:
  revision_awareness: 'Coincide con el último pase de revisión: no se documentaron cambios necesarios en el audit trail inglés, y la propuesta española sigue de cerca las decisiones léxicas y teológicas ya aprobadas.'
  spanish_consistency_notes:
  - Se mantiene un registro narrativo sobrio y natural, sin arcaísmos innecesarios.
  - «Hermanos» se usa de forma consistente en ambas ocurrencias para reflejar el paralelismo del hebreo.
  - La voz verbal elegida en la cláusula final evita ambigüedad temporal y conserva el valor aspectual de la acción en curso.
  - No se introduce terminología eclesiástica tradicional que oscurezca el sentido literal del hebreo.
