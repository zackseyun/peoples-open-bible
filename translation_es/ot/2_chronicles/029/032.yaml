  spanish_consistency_notes:
  - Se mantuvo el registro bíblico sobrio y actual, evitando arcaísmos innecesarios.
  - 'Se prefirió la terminología cultual consistente con el proyecto: «holocausto» y «Yahvé».'
  - 'La secuencia numérica sigue el orden del hebreo y del inglés auditado: setenta, cien, doscientos.'
