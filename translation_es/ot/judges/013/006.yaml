revisions:
- from: 'Entonces la mujer fue y dijo a su esposo: «Un hombre de Dios vino a mí, y su aspecto era como el aspecto de un[a] mensajero de Dios, muy temible[b]. No le pregunté de dónde era, y él no me dio a conocer su nombre».'
