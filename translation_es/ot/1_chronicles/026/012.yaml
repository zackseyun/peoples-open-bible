review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien la estructura básica del hebreo: «divisiones», «sus hermanos», «ministrar» y «casa de Yahvé» están bien encaminados. Sin embargo, la nota al pie está mal anclada: el marcador [a] aparece en «porteros», pero la propia nota explica una alternativa para מִשְׁמָרוֹת, no para הַשֹּׁעֲרִים. Además, «porteros» es comprensible, pero en español actual puede sonar demasiado doméstico; «guardianes de las puertas» refleja mejor הַשֹּׁעֲרִים en contexto templario. La secuencia «para los jefes de los hombres» sigue muy de cerca el hebreo, pero resulta algo dura; puede mantenerse con mínima reparación sintáctica.'
  spanish_quality_summary: La redacción es mayormente clara y digna, pero necesita una corrección menor de naturalidad y de ubicación de nota. «Funciones» es aceptable para מִשְׁמָרוֹת, aunque «turnos de servicio» también sería posible; aquí puede conservarse si se mantiene la nota léxica en el lugar correcto. «Guardianes de las puertas» mejora la legibilidad eclesial moderna frente a «porteros».
  glossary_alignment: 'Alinea correctamente «Yahvé» para יְהוָה y preserva «hermanos» y «ministrar». No hay conflicto doctrinal relevante. La principal desalineación es técnica/editorial: la nota léxica sobre מִשְׁמָרוֹת debe ir anclada a «funciones», no a «porteros».'
  issues:
  - severity: medium
    issue: Marcador de nota al pie anclado a la palabra equivocada
    rationale: La nota [a] explica alternativas de מִשְׁמָרוֹת ('turnos', 'guardias', 'asignaciones'), pero en el texto está puesta sobre «porteros», que corresponde a הַשֹּׁעֲרִים. Esto falsea la relación entre texto y nota.
  - severity: low
    issue: «Porteros» puede sonar demasiado débil o doméstico en este contexto
    rationale: Aunque tradicional, «porteros» en español contemporáneo puede evocar un conserje o encargado de entrada. «Guardianes de las puertas» comunica mejor la función cultual/templaria de הַשֹּׁעֲרִים.
  - severity: low
    issue: Sintaxis algo rígida en «para los jefes de los hombres»
    rationale: La frase reproduce la compacidad hebrea, pero conviene una puntuación mínima para que el español sea más legible sin perder literalidad.
  revised_spanish_text: 'Estas eran las divisiones de los guardianes de las puertas, para los jefes de los hombres: funciones[a] correspondientes a las de sus hermanos, para ministrar en la casa de Yahvé.'
  revised_footnotes:
  - marker: a
    text: O «turnos» o «guardias». El hebreo מִשְׁמָרוֹת es compacto y puede referirse a funciones de servicio, guardias o asignaciones de turno.
    reason: lexical_alternative
