translation:
  language: es
  text: Amontonaré desastres[a] sobre ellos; agotaré mis flechas contra ellos[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «calamidades»; literalmente «males» en el sentido de juicios dañinos, no de mal moral.
    reason: lexical_alternative
  - marker: b
    text: O «gastaré mis flechas en ellos».
    reason: lexical_alternative
lexical_decisions:
- source_word: אַסְפֶּה
  english_pob_choice: I will heap
  chosen_spanish: Acumularé
  alternatives_spanish:
  - Amontonaré
  - Amontonaré sobre
  - Aglomeraré
  lexicon: HALOT
  rationale: El verbo hebreo expresa hacer que algo se amontone o se concentre sobre un objeto. En español, «acumularé» conserva la idea de acumulación impuesta sobre ellos sin sonar forzado; «amontonaré» sería más literal, pero menos natural en este contexto poético.
- source_word: עָלֵימוֹ
  english_pob_choice: upon them
  chosen_spanish: sobre ellos
  alternatives_spanish:
  - contra ellos
  - en ellos
  lexicon: HALOT
  rationale: La preposición עַל con sufijo 3mp indica aquí dirección metafórica de descenso o imposición. «Sobre ellos» preserva mejor la imagen de algo que cae o se coloca encima; «contra ellos» es posible, pero desplaza el matiz espacial-poético.
- source_word: רָעוֹת
  english_pob_choice: disasters
  chosen_spanish: desastres
  alternatives_spanish:
  - males
  - calamidades
  - maldades
  lexicon: HALOT
  rationale: En este contexto de juicio, רָעוֹת no debe entenderse como mal moral en Dios, sino como calamidades o golpes punitivos. «Desastres» comunica ese valor concreto y severo en español moderno, manteniendo la advertencia judicial.
- source_word: חִצַּי
  english_pob_choice: my arrows
  chosen_spanish: mis flechas
  alternatives_spanish:
  - mis saetas
  lexicon: HALOT
  rationale: El hebreo es literal y el símil bélico debe conservarse. «Flechas» es claro y natural en español; «saetas» sería más tradicional, pero menos transparente para lectura pública contemporánea.
- source_word: אֲכַלֶּה
  english_pob_choice: I will use up
  chosen_spanish: agotaré
  alternatives_spanish:
  - consumiré
  - gastaré
  - emplearé
  lexicon: HALOT
  rationale: El sentido es gastar o consumir por completo. «Agotaré» mantiene la idea de uso total de las flechas y suena adecuado junto al campo semántico militar; además evita la ambigüedad de «consumiré» en español.
- source_word: בָּם
  english_pob_choice: against them
  chosen_spanish: contra ellos
  alternatives_spanish:
  - sobre ellos
  - en ellos
  lexicon: HALOT
  rationale: Con flechas como objeto, la construcción marca el blanco o el ámbito hostil de su empleo. «Contra ellos» expresa con claridad la dirección bélica en español y corresponde al matiz hostil del pasaje.
theological_decisions:
- issue: Rָעוֹת en un contexto de juicio divino
  english_pob_reading: disasters
  chosen_spanish_reading: desastres
  alternative_spanish_readings:
  - males
  - calamidades
  - maldades
  rationale: La tradición de traducción debe evitar que el lector concluya que Yahvé obra maldad moral. En este canto, el término designa calamidades judiciales, no pecado en Dios. «Desastres» conserva la severidad del juicio sin cargar al texto con una implicación doctrinal ajena.
  doctrine_reference: Distinción léxica entre mal moral y calamidad/jucio; fidelidad semántica del hebreo en contexto de pacto.
translation_notes:
  revision_awareness: El borrador sigue el alto grado de acuerdo del control cruzado y conserva la metáfora bélica y el valor judicial de רָעוֹת. Se prefirió un español más natural que el calco directo, sin perder la acumulación de calamidades sobre el pueblo ni la imagen de flechas agotadas contra ellos.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma del proyecto cuando el Tetragrámaton esté en el contexto inmediato; en este versículo no aparece explícitamente en el segmento hebreo suministrado.
  - Se eligió «flechas» en lugar de «saetas» por claridad pública; la imagen militar queda intacta.
  - «Desastres» evita traducir רָעוֹת como maldad moral, en línea con la nota auditada de la POB en inglés.
