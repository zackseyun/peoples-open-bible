translation:
  language: es
  text: Así que Moisés despojó a Aarón de sus vestiduras y vistió con ellas a Eleazar, su hijo[a]; y Aarón murió allí, en la cumbre del monte[b]. Luego Moisés y Eleazar descendieron del monte.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Es decir, las vestiduras sacerdotales oficiales de Aarón fueron transferidas a Eleazar, conforme a la sucesión descrita en el contexto inmediato.
    reason: cultural_note
  - marker: b
    text: 'O: «en la cima del monte».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּפְשֵׁט
  english_pob_choice: stripped
  chosen_spanish: despojó
  alternatives_spanish:
  - quitó
  - desnudó
  lexicon: HALOT
  rationale: El hifil de פשט expresa quitar prendas a alguien. En español, «despojó» comunica bien la acción concreta de quitarle a Aarón sus vestidos sin volver el tono innecesariamente áspero con «desnudó», ni debilitarlo con «quitó».
- source_word: בְּגָדָיו
  english_pob_choice: his garments
  chosen_spanish: sus vestidos
  alternatives_spanish:
  - sus ropas
  - sus prendas
  lexicon: HALOT
  rationale: «Vestidos» mantiene el sentido general de prendas sin sobreespecificar «vestiduras sacerdotales» en el texto principal, ya que el hebreo usa el sustantivo común para ropa. La elección conserva el registro formal y la conexión con la sucesión sacerdotal del contexto.
- source_word: וַיַּלְבֵּשׁ אֹתָם אֶת אֶלְעָזָר בְּנוֹ
  english_pob_choice: put them on Eleazar his son
  chosen_spanish: se los puso a Eleazar su hijo
  alternatives_spanish:
  - vistió a Eleazar su hijo con ellos
  - lo vistió con ellos
  lexicon: HALOT
  rationale: El hebreo presenta un verbo de vestir con el objeto directo de las prendas. En español, «se los puso a Eleazar su hijo» conserva el orden de la acción y resulta natural, sin perder la referencia a las prendas transferidas de Aarón a Eleazar.
- source_word: וַיָּמָת
  english_pob_choice: died
  chosen_spanish: murió
  alternatives_spanish:
  - falleció
  - pasó a mejor vida
  lexicon: HALOT
  rationale: מות es el verbo ordinario «morir». «Murió» es la versión más directa y fiel, evitando eufemismos.
- source_word: שָׁם
  english_pob_choice: there
  chosen_spanish: allí
  alternatives_spanish:
  - ahí
  - en ese lugar
  lexicon: HALOT
  rationale: El adverbio localiza la muerte de Aarón. «Allí» conserva esa referencia espacial de manera clara y natural en español.
- source_word: בְּרֹאשׁ הָהָר
  english_pob_choice: on the top of the mountain
  chosen_spanish: en la cumbre del monte
  alternatives_spanish:
  - en la cima del monte
  - en la parte alta del monte
  lexicon: HALOT
  rationale: ראשׁ significa literalmente «cabeza», y aquí funciona idiomáticamente como «cumbre/summit». «Cumbre del monte» preserva la imagen espacial y suena natural en español bíblico contemporáneo.
- source_word: וַיֵּרֶד
  english_pob_choice: came down
  chosen_spanish: descendieron
  alternatives_spanish:
  - bajaron
  - se bajaron
  lexicon: HALOT
  rationale: ירד significa «bajar/descender». «Descendieron» mantiene el movimiento desde el monte con un tono narrativo elevado, adecuado al contexto.
- source_word: מִן הָהָר
  english_pob_choice: from the mountain
  chosen_spanish: del monte
  alternatives_spanish:
  - desde el monte
  - de la montaña
  lexicon: HALOT
  rationale: «Del monte» reproduce de manera compacta la preposición de procedencia y mantiene el paralelo con «en la cumbre del monte».
theological_decisions:
- issue: Naturaleza de los vestidos transferidos a Eleazar
  english_pob_reading: Rendered as 'garments' without adding 'priestly' in the main text
  chosen_spanish_reading: «sus vestidos» sin añadir «sacerdotales» en el texto principal
  alternative_spanish_readings:
  - sus vestiduras sacerdotales
  - sus prendas sacerdotales
  rationale: El contexto cercano deja claro que se trata de las vestiduras sacerdotales de Aarón, pero este versículo usa el sustantivo general para ropa. Para no introducir en el cuerpo del texto un especificador que el hebreo no añade, se conserva la ambigüedad controlada y se deja la implicación al contexto.
  doctrine_reference: Principio de fidelidad léxica y no ampliación explicativa fuera del alcance del texto fuente.
translation_notes:
  revision_awareness: 'Coincide con la última pasada revisada: no se registran cambios sustanciales en el sentido, el orden narrativo ni el alcance léxico del versículo.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como forma reservada para el nombre divino cuando aparezca en el contexto; este versículo no lo contiene.
  - Se conserva «monte» en lugar de alternar con «montaña» para sostener la imagen del relato y la correspondencia con «cumbre del monte».
  - Se usa «descendieron» para reflejar el valor de ירד con un registro bíblico natural en español.
