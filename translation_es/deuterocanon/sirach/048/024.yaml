  glossary_alignment: 'No hay conflictos con la terminología principal del proyecto. La decisión ''espíritu'' está bien contextualizada. El problema principal no es glosario sino prioridad textual: el hebreo אבלי ציון debe gobernar el texto principal, con la lectura griega ''en Sión'' en nota.'
