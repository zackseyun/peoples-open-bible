translation:
  language: es
  text: Sobre las viñas estaba Simeí el ramatita; y sobre el producto de las viñas[a] para las bodegas[b] de vino estaba Zabdi el shipmita.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebreo literalmente, «lo que estaba en las viñas»; esto probablemente se refiere al producto o rendimiento de las viñas, no a las viñas mismas.
    reason: lexical_alternative
  - marker: b
    text: También puede entenderse «almacenes de vino» o «depósitos de vino».
    reason: lexical_alternative
lexical_decisions:
- source_word: וְעַל
  english_pob_choice: over
  chosen_spanish: sobre
  alternatives_spanish:
  - encargado de
  - al frente de
  lexicon: HALOT
  rationale: En esta lista administrativa, עַל expresa supervisión o responsabilidad. «Sobre» conserva la relación breve y jerárquica del hebreo y funciona de manera natural en español.
- source_word: הַכְּרָמִים
  english_pob_choice: the vineyards
  chosen_spanish: las viñas
  alternatives_spanish:
  - los viñedos
  lexicon: HALOT
  rationale: כֶּרֶם se refiere a una plantación de vid; en español «viñas» comunica bien el referente agrícola y mantiene concisión. «Viñedos» también es posible, pero suena menos directo en este contexto de administración.
- source_word: שִׁמְעִי
  english_pob_choice: Shimei
  chosen_spanish: Simeí
  alternatives_spanish:
  - Shimei
  lexicon: traducción de nombre propio
  rationale: Se translitera el nombre propio a una forma castellana legible. «Simeí» evita una grafía demasiado inglesa y mantiene reconocimiento bíblico en español.
- source_word: הָרָמָתִי
  english_pob_choice: the Ramathite
  chosen_spanish: el ramatita
  alternatives_spanish:
  - el de Ramá
  - el ramateo
  lexicon: HALOT
  rationale: El gentilicio se conserva como demónimo. «El ramatita» reproduce la función descriptiva del hebreo sin expandir especulativamente el topónimo.
- source_word: שֶׁבַּכְּרָמִים
  english_pob_choice: the produce of the vineyards
  chosen_spanish: el producto de las viñas
  alternatives_spanish:
  - lo que había en las viñas
  - el fruto de las viñas
  lexicon: HALOT
  rationale: La expresión hebrea significa literalmente «lo que estaba en las viñas», pero en contexto administrativo se refiere al rendimiento de la cosecha. «Producto» conserva esa tensión entre literalidad y función contextual.
- source_word: לְאֹצְרוֹת
  english_pob_choice: for the wine cellars
  chosen_spanish: para las bodegas
  alternatives_spanish:
  - para los almacenes
  - para los depósitos
  lexicon: HALOT
  rationale: אֹצָר puede ser almacén o depósito; con «vino» el sentido es un lugar de resguardo del vino. «Bodegas» expresa naturalmente esa función en español.
- source_word: הַיַּיִן
  english_pob_choice: the wine
  chosen_spanish: del vino
  alternatives_spanish:
  - del vino
  lexicon: HALOT
  rationale: יַיִן se traduce de forma directa como «vino». Aquí se integra en la construcción nominal «bodegas del vino» para reflejar que las bodegas estaban destinadas al vino.
- source_word: זַבְדִּי
  english_pob_choice: Zabdi
  chosen_spanish: Zabdi
  alternatives_spanish:
  - Zabdí
  lexicon: traducción de nombre propio
  rationale: Se mantiene el nombre propio en transliteración estándar, coherente con el resto de la obra.
- source_word: הַשִּׁפְמִי
  english_pob_choice: the Shiphmite
  chosen_spanish: el shipmita
  alternatives_spanish:
  - el de Sipma
  - el shifmita
  lexicon: HALOT
  rationale: Se conserva el valor gentilicio sin forzar una identificación geográfica incierta. La transliteración en español mantiene el carácter de nombre derivado de lugar sin añadir información no segura.
translation_notes:
  revision_awareness: Se siguió la revisión inglesa que eliminó la coma tras «vineyards» para reflejar que el sintagma apunta al producto de las viñas destinado a las bodegas, no a dos cargos separados por una pausa. La versión española mantiene esa misma relación sintáctica sin añadir separación innecesaria.
  spanish_consistency_notes:
  - Se prefirió «sobre» para reflejar la administración sobre un recurso, en paralelo con la estructura repetida del versículo.
  - «Viñas» y «bodegas» son términos naturales en español y preservan la distinción entre el lugar de producción y el lugar de resguardo.
  - Los nombres propios y gentilicios se transliteran de forma uniforme y legible para lector hispanohablante.
  - No se introdujo terminología eclesiástica no presente en el hebreo; se mantuvo el registro administrativo del texto.
