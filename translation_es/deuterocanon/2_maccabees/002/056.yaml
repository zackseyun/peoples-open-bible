base_translation:
  language: en
  yaml_path: translation/deuterocanon/2_maccabees/002/056.yaml
  text: For just as[a], in the case of a new house, the architect must take thought for the whole structure, but the one undertaking to decorate and paint it must consider the things suitable for adornment, so also, I think, it is with us.
  footnotes:
  - marker: a
    text: Or 'to furnish and paint it'; the Greek verb rendered 'decorate' can denote fitting out or preparing a house, not only ornamenting it.
    reason: lexical_alternative
