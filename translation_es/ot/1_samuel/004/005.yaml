translation:
  language: es
  text: Cuando el arca del pacto de Yahvé llegó al campamento, todo Israel lanzó un gran clamor, y la tierra resonó[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «y la tierra tembló». El verbo hebreo puede denotar tumulto o temblor; se eligió «resonó» para no dar a entender un terremoto definido cuando el texto puede describir simplemente la fuerza del clamor.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְהִי כְּבוֹא
  english_pob_choice: When ... came
  chosen_spanish: Cuando ... llegó
  alternatives_spanish:
  - Y aconteció que, al llegar ...
  - Y cuando ... vino
  lexicon: HALOT
  rationale: La construcción narrativa temporal introduce una acción principal en el marco de otra llegada. «Cuando ... llegó» expresa con naturalidad el valor temporal sin agregar el giro más pesado de «y aconteció». «Llegó» funciona bien para el movimiento de entrada al campamento.
- source_word: אֲרוֹן בְּרִית יְהוָה
  english_pob_choice: the ark of the covenant of Yahweh
  chosen_spanish: el arca del pacto de Yahvé
  alternatives_spanish:
  - el arca del pacto de Yahvé
  - el arca del pacto de Yahvé, el pacto de Yahvé
  lexicon: HALOT
  rationale: Se conserva la cadena constructa de forma clara en español. «Pacto» comunica בְּרִית con precisión jurídica y relacional, y «arca» mantiene el referente sacro concreto. Se usa «Yahvé» según la convención del proyecto para el nombre divino.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahveh
  lexicon: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
  rationale: La transliteración establecida para el español del proyecto es «Yahvé». Mantiene el nombre propio del pacto en vez de sustituirlo por un título, siguiendo la decisión doctrinal del POB.
- source_word: הַמַּחֲנֶה
  english_pob_choice: the camp
  chosen_spanish: el campamento
  alternatives_spanish:
  - el campamento
  - el campo
  lexicon: HALOT
  rationale: En contexto militar narrativo, «campamento» es la forma natural y precisa en español, más clara que un calco de «camp».
- source_word: וַיָּרִיעוּ
  english_pob_choice: shouted
  chosen_spanish: gritó
  alternatives_spanish:
  - clamó
  - lanzó un grito
  - dio un grito
  lexicon: HALOT
  rationale: El verbo expresa un grito fuerte o clamor colectivo. «Gritó» funciona idiomáticamente en español; aunque el sujeto es plural, se mantiene el sentido de acción colectiva con el complemento «todo Israel».
- source_word: תְּרוּעָה גְדוֹלָה
  english_pob_choice: with a great shout
  chosen_spanish: con un gran clamor
  alternatives_spanish:
  - con un gran grito
  - con un clamor grande
  - con una gran algarabía
  lexicon: HALOT
  rationale: «Clamor» preserva mejor la intensidad y el tono solemne del sustantivo intensificado que un simple «grito». Se evita «algarabía» por su matiz coloquial y menos reverente.
- source_word: וַתֵּהֹם
  english_pob_choice: resounded
  chosen_spanish: resonó
  alternatives_spanish:
  - retumbó
  - tembló
  - se estremeció
  lexicon: HALOT
  rationale: El verbo hebreo puede denotar tumulto, estruendo o conmoción. «Resonó» sigue la lectura audiblemente intensa de la POB inglesa y evita forzar una lectura sísmica específica, como también buscó el audit trail inglés.
- source_word: הָאָרֶץ
  english_pob_choice: the earth
  chosen_spanish: la tierra
  alternatives_spanish:
  - la tierra
  - el suelo
  - el terreno
  lexicon: HALOT
  rationale: «La tierra» reproduce de manera natural y amplia הָאָרֶץ en este contexto, dejando abierta la imagen de toda la creación/terreno afectado por el clamor sin precisar «terremoto».
theological_decisions:
- issue: Nombre divino יְהוָה en la traducción española
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Yahveh
  rationale: El POB inglés preserva el nombre personal divino y evita la sustitución por un título. En español, «Yahvé» es la forma coherente con la política del proyecto y mantiene la transparencia del texto fuente.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Interpretación de וַתֵּהֹם הָאָרֶץ
  english_pob_reading: and the earth resounded
  chosen_spanish_reading: y la tierra resonó
  alternative_spanish_readings:
  - y la tierra tembló
  - y la tierra se estremeció
  rationale: La POB inglesa escogió una traducción que no obliga a entender un terremoto literal. «Resonó» en español conserva el sentido de estruendo o conmoción auditiva y mantiene abierta la tensión lexical del hebreo.
  doctrine_reference: HALOT; nota lexical auditada en la POB inglesa
translation_notes:
  revision_awareness: 'Se siguió el audit trail inglés sin cambios sustantivos: la lectura de la nota sobre וַתֵּהֹם se mantuvo abierta, y la elección del nombre divino conserva la política doctrinal del proyecto para יְהוָה. No se detectaron revisiones aplicadas en el pasaje fuente.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» de forma consistente para יְהוָה.
  - Se prefirió «campamento» por claridad narrativa militar.
  - «Clamor» se usa para conservar la intensidad de תְּרוּעָה sin volver el registro coloquial.
  - La nota [a] corresponde a la alternativa léxica de וַתֵּהֹם y está anclada en el texto donde aparece «resonó».
