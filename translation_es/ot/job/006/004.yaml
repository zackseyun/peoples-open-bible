review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador conserva bien la estructura y la mayor parte del sentido del hebreo: las flechas, el veneno, el espíritu y la imagen militar final. También mantiene adecuadamente la alternativa de עִמָּדִי como ''conmigo'' en nota y la lectura concreta de חֲמָתָם como veneno. Sin embargo, falla en un punto fuente-importante y documentado por el POB: שַׁדַּי no es el nombre divino יהוה, sino el título ''el Todopoderoso''. Cambiarlo a ''Yahvé'' altera el término fuente y rompe la decisión teológica/lexical auditada.'
  spanish_quality_summary: El español es en general claro y digno. 'Porque' funciona, 'están en mí' y 'mi espíritu bebe su veneno' son naturales, y 'los terrores de Dios' suena bien. 'Se alinean contra mí' es comprensible, aunque 'se disponen contra mí' o 'se ponen en formación contra mí' reflejarían algo mejor la imagen de orden militar; no obstante, puede mantenerse con nota. Las notas actuales contienen pequeños problemas de redacción y comillas, y la nota b debe reflejar la alternativa 'su veneno'/'su ponzoña' o 'su ira' con más claridad.
  glossary_alignment: 'Desalineación principal: el proyecto usa ''Yahvé'' para יהוה, pero aquí el hebreo tiene שַׁדַּי, que según la evidencia y el rastro POB debe traducirse ''el Todopoderoso''. אֱלוֹהַּ como ''Dios'' está bien. רוּחִי como ''mi espíritu'' está bien. No hay motivo glosarial para sustituir un título distinto por ''Yahvé''.'
  issues:
  - severity: high
    issue: שַׁדַּי fue traducido como 'Yahvé'
    rationale: El término fuente no es el tetragrámaton sino el título divino שַׁדַּי. El inglés POB documenta explícitamente 'the Almighty'. Usar 'Yahvé' introduce un nombre que el hebreo no usa en este versículo y altera el paralelismo entre 'el Todopoderoso' y 'Dios'.
  - severity: medium
    issue: La fundamentación teológica del borrador para usar 'Yahvé' contradice la evidencia fuente
    rationale: La justificación apela a una pauta válida para יהוה, pero inaplicable aquí. Esto necesita corregirse para no dejar un precedente erróneo en el historial lexical/theological.
  - severity: low
    issue: Redacción y tipografía de notas mejorables
    rationale: Las notas tienen comillas duplicadas/anglicadas y formulaciones algo torpes. Conviene normalizarlas para legibilidad y consistencia editorial.
  revised_spanish_text: Porque las flechas del Todopoderoso[a] están en mí; mi espíritu bebe su veneno[b]; los terrores de Dios se alinean contra mí[c].
