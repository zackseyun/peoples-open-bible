translation:
  language: es
  text: 'Y a la nación, la carta del rey era como sigue: «Rey Antíoco, al consejo de ancianos[b] de los judíos y a los demás judíos[a], saludos».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'También puede entenderse: «a los otros judíos» o «al resto de los judíos».'
    reason: lexical_alternative
  - marker: b
    text: γερουσία designa un cuerpo oficial de ancianos; por eso se traduce «consejo de ancianos» en vez de transliterar el término griego.
    reason: cultural_note
lexical_decisions:
- source_word: Πρὸς
  english_pob_choice: to
  chosen_spanish: al
  alternatives_spanish:
  - para
  - a
  lexicon: BDAG
  rationale: En el encabezado epistolar con acusativo, la relación es de destinatario; en español, «al» expresa de manera natural la dirección de la carta hacia el pueblo.
- source_word: ἔθνος
  english_pob_choice: nation
  chosen_spanish: pueblo
  alternatives_spanish:
  - nación
  - gente
  lexicon: BDAG
  rationale: Aunque el inglés opta por «nation» para preservar el sentido corporativo-político, en español «pueblo» comunica con naturalidad al colectivo judío sin sonar rígido. Mantiene el referente nacional, pero con mejor fluidez idiomática.
- source_word: ἐπιστολή
  english_pob_choice: letter
  chosen_spanish: carta
  alternatives_spanish:
  - epístola
  - misiva
  lexicon: BDAG
  rationale: El contexto es correspondencia real formal; «carta» es el equivalente español más claro y natural, equivalente al inglés «letter».
- source_word: τοιαύδε
  english_pob_choice: as follows
  chosen_spanish: era así
  alternatives_spanish:
  - decía así
  - era del siguiente tenor
  lexicon: BDAG
  rationale: La fórmula introductoria a la cita se expresa de modo natural con «era así», conservando el valor de presentación sin sobrerrepresentar el griego.
- source_word: Βασιλεὺς Ἀντίοχος
  english_pob_choice: King Antiochus
  chosen_spanish: El rey Antíoco
  alternatives_spanish:
  - Rey Antíoco
  - Antíoco, rey
  lexicon: BDAG
  rationale: Se preserva el título real unido al nombre propio, como en el inglés POB, con una sintaxis natural en español.
- source_word: γερουσίᾳ
  english_pob_choice: council of elders
  chosen_spanish: consejo de ancianos
  alternatives_spanish:
  - gerusía
  - senado de ancianos
  - asamblea de ancianos
  lexicon: BDAG
  rationale: γερουσία designa un cuerpo institucional de ancianos. «Consejo de ancianos» transmite el sentido funcional claramente, siguiendo la decisión inglesa de no transliterar el término.
- source_word: τοῖς ἄλλοις Ἰουδαίοις
  english_pob_choice: the other Jews
  chosen_spanish: a los demás judíos
  alternatives_spanish:
  - a los otros judíos
  - al resto de los judíos
  lexicon: BDAG
  rationale: «Demás» conserva la distinción entre el consejo ya mencionado y el resto del grupo, y resulta idiomático en español.
- source_word: χαίρειν
  english_pob_choice: greetings
  chosen_spanish: salud
  alternatives_spanish:
  - saludos
  - greetings
  lexicon: BDAG
  rationale: En fórmulas epistolares griegas, χαίρειν funciona como saludo convencional. «Salud» reproduce bien la fórmula breve y formal en español, sin convertirla en una paráfrasis moderna.
translation_notes:
  revision_awareness: 'El texto griego muestra una fórmula epistolar introductoria seguida del encabezado de la carta. La versión inglesa POB ya resolvió τοιαύδε como «as follows», γερουσίᾳ como «council of elders» y χαίρειν como «greetings». La presente redacción sigue esas decisiones, pero las adapta a un español natural y publicable: «era así», «consejo de ancianos» y el saludo formal «salud».'
  spanish_consistency_notes:
  - Se mantiene el orden de la cita para reflejar el encabezado de la carta.
  - «Y al pueblo» conserva el valor colectivo de ἔθνος sin forzar una calca.
  - No se translitera γερουσία, siguiendo la lógica auditada del inglés POB.
  - «Salud» se usa como fórmula de saludo epistolar, no como exclamación religiosa.
