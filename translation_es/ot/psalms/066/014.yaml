lexical_decisions:
- source_word: אֲשֶׁר
  english_pob_choice: which
  chosen_spanish: lo que
  alternatives_spanish:
  - que
  - el cual
  lexicon: HALOT
  rationale: En español, la cláusula relativa exige una forma natural que retome el contenido del voto anterior. 'Lo que' conserva la referencia neutra al dicho/voto sin sonar forzado.
- source_word: פָּצוּ
  english_pob_choice: uttered
  chosen_spanish: abrieron
  alternatives_spanish:
  - abrieron mis labios
  - pronunciaron
  - dijeron
  lexicon: HALOT
  rationale: La imagen hebrea es literalmente 'abrir los labios'; el español mantiene esa metáfora con 'abrieron', mientras la nota explica que el sentido idiomático es hablar.
- source_word: שְׂפָתַי
  english_pob_choice: my lips
  chosen_spanish: mis labios
  alternatives_spanish:
  - los labios míos
  lexicon: HALOT
  rationale: Se conserva el paralelo corporal del hebreo con una expresión normal en español bíblico contemporáneo.
- source_word: וְדִבֶּר
  english_pob_choice: and ... spoke
  chosen_spanish: y ... habló
  alternatives_spanish:
  - y dijo
  - y habló
  lexicon: HALOT
  rationale: '''Habló'' reproduce el acto de habla y mantiene el paralelismo con la primera cola sin sobrecargar el verso.'
- source_word: פִּי
  english_pob_choice: my mouth
  chosen_spanish: mi boca
  alternatives_spanish:
  - mi boca
  lexicon: HALOT
  rationale: Se conserva la segunda imagen corporal del paralelismo hebreo con una forma directa y natural en español.
- source_word: בַּצַּר לִי
  english_pob_choice: when I was in distress
  chosen_spanish: cuando estaba en angustia
  alternatives_spanish:
  - en mi angustia
  - cuando tenía angustia
  - en tiempo de angustia
  lexicon: HALOT
  rationale: La expresión denota una situación de aflicción personal. 'Angustia' comunica bien el padecimiento y 'cuando estaba en' expresa el valor circunstancial/temporal observado en el texto inglés y en el hebreo.
translation_notes:
  revision_awareness: El contexto de revisión indica alta concordancia y sin cambios necesarios; este borrador sigue esa línea, preservando la metáfora hebrea y la equivalencia óptima del inglés POB sin introducir ampliaciones interpretativas.
  spanish_consistency_notes:
  - Se mantiene la duplicación poética 'mis labios / mi boca' para reflejar el paralelismo hebreo.
  - Se evita reemplazar la metáfora de 'abrir los labios' por un verbo de habla plano en el cuerpo principal, dejando la explicación en nota.
  - '''Angustia'' se usa como equivalente amplio de בַּצַּר לִי, sin añadir matices no presentes en el original.'
