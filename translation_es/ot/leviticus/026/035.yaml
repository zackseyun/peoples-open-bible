translation:
  language: es
  text: Todos los días de su desolación reposará[a]—el reposo que no tuvo durante sus sábados[b], mientras ustedes vivían en ella.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más formalmente: «reposará por lo que no reposó durante sus sábados». El hebreo repite el verbo «reposar» para dar énfasis.'
    reason: lexical_alternative
  - marker: b
    text: Aquí «sus sábados» se refiere a los reposos sabáticos debidos a la tierra, especialmente a los años sabáticos en el contexto inmediato.
    reason: cross_reference
lexical_decisions:
- source_word: כָּל יְמֵי
  english_pob_choice: All the days of
  chosen_spanish: Todos los días de
  alternatives_spanish:
  - Durante todos los días de
  - A lo largo de todos los días de
  lexicon: HALOT
  rationale: כָּל con יְמֵי forma una expresión temporal totalizante. «Todos los días de» conserva esa amplitud de manera natural en español.
- source_word: הָשַּׁמָּה
  english_pob_choice: its desolation
  chosen_spanish: su desolación
  alternatives_spanish:
  - su devastación
  - la desolación
  lexicon: HALOT
  rationale: El sustantivo describe el estado de ruina/desolación de la tierra; el sufijo femenino singular se refleja con «su».
- source_word: תִּשְׁבֹּת
  english_pob_choice: it shall rest
  chosen_spanish: reposará
  alternatives_spanish:
  - descansará
  - reposará en descanso
  lexicon: HALOT
  rationale: El verbo שׁבת se rinde aquí con «reposará», que comunica bien el descanso sabático de la tierra sin perder la fuerza verbal.
- source_word: אֵת אֲשֶׁר לֹא שָׁבְתָה
  english_pob_choice: the rest that it did not have
  chosen_spanish: el reposo que no tuvo
  alternatives_spanish:
  - lo que no reposó
  - el descanso que no tuvo
  lexicon: HALOT
  rationale: El hebreo repite la idea verbal de descansar/reposar. En español, «el reposo que no tuvo» preserva la relación semántica y el contraste con el reposo presente.
- source_word: בְּשַׁבְּתֹתֵיכֶם
  english_pob_choice: during your Sabbaths
  chosen_spanish: durante sus sábados
  alternatives_spanish:
  - durante sus días de reposo
  - durante sus años sabáticos
  lexicon: HALOT
  rationale: Se mantiene la referencia a שַׁבָּת con «sábados», como hace la POB en inglés con «Sabbaths», dejando que el contexto de Levítico aclare que alude a los reposos sabáticos debidos a la tierra.
- source_word: בְּשִׁבְתְּכֶם עָלֶיהָ
  english_pob_choice: while you were dwelling on it
  chosen_spanish: mientras habitabais en ella
  alternatives_spanish:
  - mientras vivíais en ella
  - cuando habitabais en ella
  lexicon: HALOT
  rationale: El infinitivo constructo de ישׁב con sufijo se expresa de forma natural con «mientras habitabais», conservando el sentido temporal y el referente femenino singular de la tierra.
theological_decisions:
- issue: Referencia de «sus sábados» y sentido sabático de la tierra
  english_pob_reading: '''Your Sabbaths'' here refers to the sabbath rests due to the land, especially the sabbatical years in the surrounding context.'
  chosen_spanish_reading: «sus sábados» se entiende como los reposos sabáticos debidos a la tierra, especialmente los años sabáticos del contexto inmediato.
  alternative_spanish_readings:
  - «sus sábados» podría entenderse como simples días de sábado
  - «sus sábados» podría reemplazarse por «sus años sabáticos» en el texto principal
  rationale: El texto hebreo y el contexto de Levítico 26 favorecen una referencia a los reposos sabáticos de la tierra, no solo al sábado semanal. Se conserva la expresión más cercana en el cuerpo y se deja la aclaración contextual en nota.
  doctrine_reference: Levítico 25–26; especialmente Lev 26:34-35
- issue: Repetición verbal de descanso/reposo
  english_pob_reading: The Hebrew repeats the verb 'rest' for emphasis.
  chosen_spanish_reading: Se conserva la repetición con «reposará... reposo» para reflejar el énfasis del hebreo.
  alternative_spanish_readings:
  - «descansará... descanso»
  - «reposará... el descanso»
  rationale: El hebreo repite la raíz שׁבת con valor enfático. La versión española mantiene esa redundancia significativa sin suavizarla en exceso.
  doctrine_reference: Principio de correspondencia léxica y énfasis retórico del texto hebreo
translation_notes:
  revision_awareness: La versión inglesa revisada reemplazó «shall have rest» por «shall rest» para ajustarse más de cerca al verbo hebreo y sonar más natural. La redacción española sigue esa revisión al usar «reposará» y conserva la repetición enfática del sustantivo «reposo».
  spanish_consistency_notes:
  - Se usa «Yahvé» por defecto en el proyecto, pero este versículo no contiene el nombre divino.
  - Se conserva «sábados» como equivalente formal de Sabbath/Sabbaths, con nota aclaratoria para el sentido sabático de la tierra.
  - Se evita «SEÑOR» como sustituto del nombre divino, en coherencia con la política del proyecto, aunque aquí no aparece el tetragrámaton.
  - El tono es publicable y sobrio, con sintaxis natural en español latinoamericano.
