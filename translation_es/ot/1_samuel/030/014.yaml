review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura básica del hebreo: incursión militar, repetición de los objetivos con preposición, referencia geográfica a «Neguev», y la quema de Siclag/Ziclag. Sin embargo, «prendimos fuego a Siclag» atenúa la formulación explícita שָׂרַפְנוּ בָאֵשׁ («quemamos ... con fuego») y pierde parte del énfasis verbal del original. También conviene ajustar «pertenecía» a presente gnómico («pertenece») para reflejar mejor la descripción del territorio en el relato.'
  spanish_quality_summary: El español es claro y natural, con buen registro bíblico moderno. «Hicimos una incursión en» suena bien y conserva el sentido militar. «Neguev» es legible y consistente. La frase «lo que pertenecía a Judá» es comprensible, pero «lo que pertenece a Judá» es más directa y menos interpretativa temporalmente. La principal mejora estilístico-fiel es reemplazar «prendimos fuego a» por «quemamos ... con fuego», aunque suene más literal, porque aquí el proyecto prioriza la fuerza de la fuente.
  glossary_alignment: No hay problemas con la terminología teológica del proyecto. Los nombres propios y términos geográficos están razonablemente alineados. La elección «cereteos» es aceptable en español, con nota de alternativa. «Siclag» es una forma española tradicional viable, aunque «Ziclag/Ziklag» también serían posibles. La decisión crítica es mantener la fuerza de שָׂרַפְנוּ בָאֵשׁ de manera más explícita.
  issues:
  - severity: medium
    issue: La frase «prendimos fuego a Siclag» debilita la explicitud de שָׂרַפְנוּ בָאֵשׁ.
    rationale: El hebreo dice literalmente «quemamos Ziklag con fuego». Aunque «prender fuego a» es natural en español, desplaza el verbo principal de «quemar» y omite el instrumento explícito «con fuego», que el inglés POB decidió preservar deliberadamente.
  - severity: low
    issue: «Lo que pertenecía a Judá» introduce un matiz temporal pasado no exigido por el hebreo.
    rationale: אֲשֶׁר לִיהוּדָה expresa pertenencia/adscripción territorial. En español, «lo que pertenece a Judá» comunica esa posesión de manera más directa y más cercana al valor descriptivo del original.
  revised_spanish_text: Hicimos una incursión en el Neguev de los cereteos[a], y en lo que pertenece a Judá, y en el Neguev de Caleb; y quemamos Siclag con fuego.
  revised_footnotes:
  - marker: a
    text: «Cereteos» refleja el nombre del pueblo; la tradición inglesa también conoce la forma «Cherethites».
    reason: lexical_alternative
  revision_rationale: Se ajusta la cláusula de Judá a «pertenece» para reflejar mejor la pertenencia territorial sin añadir pasado innecesario, y se cambia «prendimos fuego a Siclag» por «quemamos Siclag con fuego» para preservar la fuerza y explicitud de שָׂרַפְנוּ בָאֵשׁ, en línea con la decisión auditada del POB en inglés. Se conserva «cereteos» con su nota y el resto de la estructura del versículo.
