translation:
  language: es
  text: Samaria es destruida[a], su rey como espuma[b] sobre la superficie de las aguas.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «es exterminada»; el verbo hebreo puede denotar ser llevada a su fin, destruida o reducida al silencio.
    reason: lexical_alternative
  - marker: b
    text: O «como una astilla»; algunos entienden la imagen como un pequeño fragmento de madera o desecho flotando sin control.
    reason: lexical_alternative
lexical_decisions:
- source_word: נִדְמֶה
  english_pob_choice: is cut off
  chosen_spanish: es cortada
  alternatives_spanish:
  - es destruida
  - es acabada
  - es silenciada
  lexicon: HALOT
  rationale: El nifal de דמה aquí puede expresar ser puesto fin, ser destruido o quedar extinguido. «Es cortada» conserva la idea de terminación súbita y encaja bien con el paralelismo de la caída de Samaria y de su rey.
- source_word: שֹׁמְרוֹן
  english_pob_choice: Samaria
  chosen_spanish: Samaria
  alternatives_spanish:
  - Samaría
  lexicon: Nombre propio / uso bíblico
  rationale: Se mantiene el nombre propio tradicional de la capital del reino del norte, reconocible en español bíblico y directamente atestiguado por el hebreo.
- source_word: מַלְכָּהּ
  english_pob_choice: her king
  chosen_spanish: su rey
  alternatives_spanish:
  - su rey
  lexicon: Relación gramatical del sufijo posesivo
  rationale: En español, la posesión se expresa naturalmente con «su»; no es necesario forzar el femenino «su reina» porque el referente es el rey de Samaria. Se conserva la referencia al vínculo posesivo sin introducir ambigüedad innecesaria.
- source_word: כְּקֶצֶף
  english_pob_choice: like foam
  chosen_spanish: como espuma
  alternatives_spanish:
  - como froth
  - como espuma marina
  lexicon: HALOT
  rationale: קֶצֶף denota espuma o espuma superficial. «Como espuma» reproduce bien la imagen de algo inestable y pasajero. «Froth» sería menos natural en español y «espuma marina» añade un matiz no exigido por el hebreo.
- source_word: עַל פְּנֵי מָיִם
  english_pob_choice: on the surface of the waters
  chosen_spanish: sobre la superficie de las aguas
  alternatives_spanish:
  - sobre el rostro de las aguas
  - sobre las aguas
  lexicon: HALOT
  rationale: La locución hebrea equivale a «sobre la superficie de las aguas». Esa formulación mantiene la imagen completa con un español claro y digno.
theological_decisions:
- issue: Referencia del rey de Samaria como posesión de una ciudad personificada
  english_pob_reading: her king
  chosen_spanish_reading: su rey
  alternative_spanish_readings:
  - el rey de ella
  rationale: El hebreo personifica a Samaria con sufijo femenino. En español, «su rey» comunica la relación posesiva sin sobrecargar el verso con una construcción menos natural. No cambia la teología del pasaje, sino su forma idiomática.
  doctrine_reference: Personificación poética y juicio profético sobre el reino del norte
translation_notes:
  revision_awareness: 'La revisión inglesa más reciente eliminó «with» para hacer más directa la comparación y mantuvo «is cut off» junto con la imagen de espuma sobre las aguas. La redacción española sigue esa misma dirección: evita una inserción innecesaria, conserva el juicio de terminación y mantiene intacta la comparación.'
  spanish_consistency_notes:
  - Se preserva el contraste entre la terminación de Samaria y la imagen de inestabilidad del rey.
  - «Espuma» mantiene el campo semántico de קֶצֶף sin introducir una interpretación más específica de lo que el hebreo exige.
  - Se evita «SEÑOR» u otra sustitución teológica no pertinente; el verso no contiene el nombre divino.
  - La puntuación refleja la comparación directa del hebreo y de la revisión inglesa más reciente.
