translation:
  language: es
  text: Hasta que él recompense a un hombre por su obra[a], y la retribución de una persona conforme a su designio; hasta que defienda la causa de su pueblo y los alegre con su salvación.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'El texto griego conservado de Sirácides 34:19 dice en cambio: «El que sacrifica de la injusticia ofrece una ofrenda defectuosa, y los dones de los impíos no son aceptables». El testigo hebreo conservado aquí difiere sustancialmente del griego.'
    reason: alternative_reading
lexical_decisions:
- source_word: עד
  english_pob_choice: until
  chosen_spanish: Hasta que
  alternatives_spanish:
  - mientras
  - así que
  lexicon: HALOT
  rationale: Conserva la fuerza temporal-limitar del hebreo y funciona naturalmente al iniciar ambas cláusulas.
- source_word: ישיב
  english_pob_choice: he repays
  chosen_spanish: recompense
  alternatives_spanish:
  - devuelva
  - restaure
  lexicon: HALOT
  rationale: En este contexto judicial/moral, en español 'recompense' comunica mejor el sentido de retribución por acciones que un simple 'devuelva'.
- source_word: לאנוש
  english_pob_choice: a man
  chosen_spanish: a un hombre
  alternatives_spanish:
  - a una persona
  - al ser humano
  lexicon: HALOT
  rationale: Mantiene el singular representativo y la sintaxis directa del hebreo; 'hombre' aquí es genérico y comprensible en español bíblico moderno.
- source_word: פעלו
  english_pob_choice: his deed
  chosen_spanish: su hecho
  alternatives_spanish:
  - su obra
  - lo que hizo
  lexicon: HALOT
  rationale: '''Hecho'' preserva la referencia a una acción concreta bajo evaluación moral, sin cargarla con matices teológicos no explícitos.'
- source_word: וגמול אדם
  english_pob_choice: and a person's recompense
  chosen_spanish: y el pago de una persona
  alternatives_spanish:
  - y la recompensa de una persona
  - y el retribuir de un ser humano
  lexicon: HALOT
  rationale: '''Pago'' expresa bien la idea de retribución y mantiene la relación con justicia/recompensa; ''persona'' evita repetir ''hombre'' y conserva el sujeto humano genérico.'
- source_word: כמזימתו
  english_pob_choice: according to his scheme
  chosen_spanish: conforme a su plan
  alternatives_spanish:
  - según su propósito
  - según su designio
  lexicon: HALOT
  rationale: '''Plan'' es el equivalente español más natural y suficientemente amplio para מזמה, sin imponer una connotación necesariamente maligna que el contexto aquí no obliga a fijar.'
- source_word: יריב ריב עמו
  english_pob_choice: he pleads the case of his people
  chosen_spanish: defienda la causa de su pueblo
  alternatives_spanish:
  - pleitee la causa de su pueblo
  - sostenga el pleito de su pueblo
  lexicon: HALOT
  rationale: La construcción hebrea tiene fuerza forense; en español 'defienda la causa' conserva esa imagen jurídica y suena idiomático, más que una traducción rígida de 'pleads the case'.
- source_word: ושמחם
  english_pob_choice: and gladdens them
  chosen_spanish: y los alegre
  alternatives_spanish:
  - y los haga regocijarse
  - y les dé alegría
  lexicon: HALOT
  rationale: El causativo se expresa bien con 'alegre'; mantiene la idea de hacer alegres a otros sin sobreexplicar el mecanismo verbal.
- source_word: בישועתו
  english_pob_choice: with his salvation
  chosen_spanish: con su salvación
  alternatives_spanish:
  - por su salvación
  - mediante su salvación
  lexicon: HALOT
  rationale: '''Salvación'' preserva el alcance teológico amplio de ישועה y es la opción más estable en español bíblico contemporáneo.'
theological_decisions:
- issue: Gran divergencia entre el hebreo conservado y el paralelo griego extenso
  english_pob_reading: Translate the Hebrew text as the primary witness, while acknowledging the Greek as a substantially different reading in a footnote.
  chosen_spanish_reading: Traducir el hebreo como testigo principal y señalar en nota que el griego conservado ofrece una lectura completamente distinta.
  alternative_spanish_readings:
  - 'Traducir el griego: ''El que sacrifica de injusticia ofrece una ofrenda defectuosa, y los dones de los impíos no son para aceptación.'''
  rationale: El versículo hebreo de Kahana y el griego de Swete no coinciden de manera menor sino sustancial. Para la POB, el texto hebreo conservado debe traducirse como base, pero la lectura griega debe quedar registrada para transparencia textual.
  doctrine_reference: 'PHILOSOPHY.md: traducir del hebreo donde se conserva; documentar honestamente las divergencias textuales'
translation_notes:
  revision_awareness: El borrador sigue la última revisión indicada como sin cambios necesarios y mantiene la decisión ya auditada de traducir el hebreo como testigo principal, registrando la divergencia importante con el griego en una nota textual.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' no aplica aquí porque el versículo no contiene el nombre divino.
  - 'Se conserva un registro forense y moral coherente con la sintaxis hebrea: ''recompense'', ''defienda la causa'', ''salvación''.'
  - Se evita introducir lenguaje litúrgico cristiano ajeno al testigo fuente.
  - La nota al pie usa una cita española del griego para facilitar auditoría sin desplazar el texto hebreo base.
