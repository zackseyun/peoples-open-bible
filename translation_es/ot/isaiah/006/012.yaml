    text: O «la humanidad»; el hebreo אָדָם es un singular colectivo que se refiere a la población humana.
    reason: lexical_alternative
  - marker: b
    text: O «el abandono será grande» o «la desolación será grande» en medio de la tierra; el hebreo permite una lectura abstracta además de la concreta.
    reason: alternative_reading
  revision_rationale: Se reemplaza «al hombre» por «a la gente» para expresar con claridad el singular colectivo הָאָדָם en español contemporáneo y seguir la dirección del audit trail inglés hacia una referencia colectiva natural. Se reemplaza «las desolaciones» por «los lugares abandonados» porque representa mejor la lectura contextual concreta de הָעֲזוּבָה documentada en el POB, mientras que las posibilidades abstractas se conservan en nota. El resto del versículo se mantiene por fidelidad y buena legibilidad.
