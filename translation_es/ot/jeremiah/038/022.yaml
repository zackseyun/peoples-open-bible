review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español sigue en general la estructura y el sentido del hebreo y del POB inglés: conserva el marcador de atención inicial, las mujeres que permanecen en la casa real, la salida hacia los oficiales babilonios, el engaño, el prevalecer contra el rey, la imagen de los pies hundidos en el lodo y la retirada final. Sin embargo, suaviza indebidamente אַנְשֵׁי שְׁלֹמֶךָ al traducirlo como «Tus amigos», perdiendo la imagen idiomática de «los hombres de tu paz / los que estaban en paz contigo», que el POB inglés preserva expresamente. Además, «dieron la vuelta atrás» no refleja con naturalidad ni precisión נָסֹגוּ אָחוֹר.'
  spanish_quality_summary: 'El español es legible, pero hay dos puntos mejorables: «Tus amigos» es demasiado libre y menos fiel al matiz relacional-político del hebreo; y «dieron la vuelta atrás» suena poco idiomático en español bíblico moderno. También conviene ajustar la puntuación para que la cita fluya mejor con una formulación más natural como «se volvieron atrás».'
  glossary_alignment: No hay conflicto con la terminología teológica principal del proyecto. La principal cuestión léxica es mantener mejor el modismo hebreo אַנְשֵׁי שְׁלֹמֶךָ en el texto español, con apoyo de nota. Las demás elecciones («Y he aquí», «oficiales», «lodo») son aceptables en contexto.
  issues:
  - severity: medium
    issue: «Tus amigos» para אַנְשֵׁי שְׁלֹמֶךָ es demasiado interpretativo.
    rationale: El hebreo literalmente dice «los hombres de tu paz», un modismo para aliados o allegados en buenos términos contigo. El POB inglés preserva esa imagen con «The men at peace with you» y la documenta en nota. «Tus amigos» elimina el modismo y estrecha el campo semántico.
  - severity: medium
    issue: Falta una nota para preservar la literalidad idiomática de אַנְשֵׁי שְׁלֹמֶךָ.
    rationale: La justificación léxica del borrador afirma que la nota conserva la literalidad, pero en los datos no existe tal nota. Debe añadirse una nota anclada al sintagma correspondiente.
  - severity: low
    issue: «Dieron la vuelta atrás» es poco natural para נָסֹגוּ אָחוֹר.
    rationale: Aunque intenta conservar la direccionalidad, no es una formulación idiomática en español. «Se volvieron atrás» o «retrocedieron» comunica mejor la retirada de los supuestos aliados.
