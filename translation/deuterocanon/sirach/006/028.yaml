translation:
  text: For in the end you will find its rest[b][a], and it will turn for you into delight.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew 'afterward/back'; Greek parallel 'at the last.' The sense is that perseverance with wisdom leads eventually to rest and joy.
    reason: lexical_alternative
  - marker: b
    text: The feminine suffixes refer to wisdom personified in the surrounding passage; English 'its' is used here for smoother style.
    reason: lexical_alternative
lexical_decisions:
- source_word: לְאָחוֹר
  chosen: in the end
  alternatives:
  - afterward
  - later
  - at last
  lexicon: HALOT
  rationale: The Hebrew literally points to what comes afterward/back, and the Greek parallel ἐπ᾽ ἐσχάτων clarifies a temporal sense of eventual outcome. 'In the end' captures the idiom naturally in English while preserving the future-oriented promise.
- source_word: תִּמְצָא
  chosen: you will find
  alternatives:
  - you shall find
  lexicon: HALOT
  rationale: Straightforward future of מצא. 'You will find' is natural modern English and keeps the directness of the Hebrew.
- source_word: מְנוּחָתָהּ
  chosen: its rest
  alternatives:
  - her rest
  - rest from her
  - its repose
  lexicon: HALOT
  rationale: The suffix refers back to wisdom in the surrounding context, grammatically feminine in Hebrew and Greek. English can render the abstract referent as 'its' without over-personifying; 'rest' is the plain sense, supported by Greek ἀνάπαυσις.
- source_word: וְתֵהָפֵךְ
  chosen: it will turn
  alternatives:
  - it will be changed
  - it will become
  lexicon: HALOT
  rationale: 'From הפך, ''turn/change.'' In this construction with לְךָ לְתַעֲנוּג, the sense is resultative: wisdom''s discipline will turn into delight for the learner. ''It will turn'' preserves the verbal imagery better than the flatter ''become.'''
- source_word: לְךָ
  chosen: for you
  alternatives:
  - to you
  lexicon: HALOT
  rationale: The dative marks personal benefit or result. 'For you' communicates that what wisdom becomes is experienced beneficially by the addressee.
- source_word: לְתַעֲנוּג
  chosen: into delight
  alternatives:
  - for pleasure
  - into pleasure
  - into enjoyment
  lexicon: HALOT
  rationale: תענוג denotes delight/pleasure. 'Into delight' fits the resultative construction and keeps the elevated but readable tone of wisdom literature.
