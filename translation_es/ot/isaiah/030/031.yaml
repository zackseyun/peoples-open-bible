translation:
  language: es
  text: Porque a la voz de Yahvé, Asiria será quebrantada[a][b]; con una vara la golpeará.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «será aterrada» o «será quebrada»; el verbo hebreo puede denotar terror, derrumbe o quebrantamiento.
    reason: lexical_alternative
  - marker: b
    text: El hebreo no repite el sujeto de «golpeará»; lo más natural es entender que se refiere a Yahvé de la frase anterior.
    reason: alternative_reading
lexical_decisions:
- source_word: כִּי
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Porque
  lexicon: HALOT
  rationale: Introduce la relación explicativa o causal del versículo con el contexto previo; en español, «Porque» es natural y fiel al flujo discursivo.
- source_word: מִקּוֹל
  english_pob_choice: at the voice of
  chosen_spanish: al sonido de
  alternatives_spanish:
  - a la voz de
  - por el sonido de
  - ante la voz de
  lexicon: HALOT
  rationale: La construcción hebrea con מִן + ‘voz/sonido’ expresa causa u ocasión. «Al sonido de» conserva el matiz acústico y resulta idiomático en español.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  lexicon: HALOT
  rationale: 'Se mantiene el nombre divino según la convención del proyecto en español: «Yahvé».'
- source_word: יֵחַת
  english_pob_choice: will be shattered
  chosen_spanish: será quebrantada
  alternatives_spanish:
  - será aterrada
  - será dismayed
  - será quebrada
  lexicon: HALOT
  rationale: El verbo en nifal puede abarcar terror, derrumbe o quebrantamiento. «Será quebrantada» comunica bien el colapso militar y psicológico sin perder la fuerza del término.
- source_word: אַשּׁוּר
  english_pob_choice: Assyria
  chosen_spanish: Asiria
  alternatives_spanish:
  - Assur
  lexicon: HALOT
  rationale: El nombre propio designa al imperio/nación; la forma habitual y clara en español es «Asiria».
- source_word: בַּשֵּׁבֶט
  english_pob_choice: with a rod
  chosen_spanish: con vara
  alternatives_spanish:
  - con una vara
  - con cetro
  - con bastón
  lexicon: HALOT
  rationale: שֵׁבֶט puede ser vara, bastón o cetro. Aquí funciona como instrumento de golpe; «con vara» es claro en español y mantiene la imagen de juicio.
- source_word: יַכֶּה
  english_pob_choice: he will strike
  chosen_spanish: la golpeará
  alternatives_spanish:
  - la herirá
  - la castigará
  - golpeará
  lexicon: HALOT
  rationale: El verbo נכה en hifil significa golpear/herir/smitir. En este contexto de juicio, «la golpeará» preserva la fuerza concreta del hebreo.
theological_decisions:
- issue: Sujeto implícito de יַכֶּה
  english_pob_reading: 'The subject is the LORD: ''with a rod he will strike.'''
  chosen_spanish_reading: 'El sujeto implícito se entiende como Yahvé: «con vara la golpeará».'
  alternative_spanish_readings:
  - «con vara golpeará» (sujeto impersonal)
  - «con vara será golpeada» (lectura pasiva)
  rationale: El hebreo omite el sujeto del segundo verbo, pero el antecedente inmediato más natural es Yahvé, en continuidad con el juicio divino del contexto. La redacción española mantiene esa lectura sin añadir explicación innecesaria.
  doctrine_reference: Preservar la referencia implícita del sujeto según el contexto inmediato y la lectura auditada de POB.
translation_notes:
  revision_awareness: Se corrigió la validación anterior eliminando marcadores de nota no anclados. En esta versión no se usan notas al pie porque la redacción española puede expresar el sentido sin ambigüedad adicional.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» para el Tetragrama.
  - Se evita «SEÑOR» como sustitución editorial.
  - Se conserva la imagen concreta de golpe/vara propia del juicio del texto.
  - La concordancia de género se ajusta a «Asiria», por eso el predicado se formula en femenino singular en español.
