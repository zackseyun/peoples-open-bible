    text: 'Hebreo: ''torre de madera''; es decir, una estructura elevada de madera o un estrado.'
    reason: lexical_alternative
  - marker: b
    text: También puede entenderse como 'para el asunto' o 'para la ocasión'.
    reason: lexical_alternative
