translation:
  language: es
  text: 'por mano de Elasá, hijo de Safán, y de Gemarías, hijo de Hilquías[a], a quienes Sedequías, rey de Judá, envió a Nabucodonosor[b], rey de Babilonia, en Babilonia, diciendo:'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «por mano de», un giro idiomático que expresa mediación o instrumento; aquí indica que el mensaje fue llevado por estos mensajeros.'
    reason: lexical_alternative
  - marker: b
    text: La forma del nombre suele escribirse «Nabucodonosor» en español; una forma más cercana al hebreo de Jeremías sería «Nebucadrezar».
    reason: alternative_reading
lexical_decisions:
- source_word: בְּיַד
  english_pob_choice: by the hand of
  chosen_spanish: por mano de
  alternatives_spanish:
  - por medio de
  - por la mano de
  lexicon: HALOT
  rationale: El hebreo usa un giro idiomático de instrumentación/agency. En español, «por mano de» conserva la imagen de mediación sin sonar tan rígido como un calco absoluto; expresa bien que el mensaje va por medio de mensajeros.
- source_word: אֶלְעָשָׂה
  english_pob_choice: Elasah
  chosen_spanish: Elasá
  alternatives_spanish:
  - Eleasá
  lexicon: convention biblique española
  rationale: Nombre propio transliterado; «Elasá» es una forma española clara y breve, manteniendo la referencia nominal sin traducirla.
- source_word: בֶן
  english_pob_choice: son of
  chosen_spanish: hijo de
  alternatives_spanish:
  - hijo de
  lexicon: HALOT
  rationale: El marcador genealógico se expresa naturalmente como «hijo de» en español, con la misma relación filiatoria del hebreo.
- source_word: שָׁפָן
  english_pob_choice: Shaphan
  chosen_spanish: Safán
  alternatives_spanish:
  - Safán
  lexicon: convention bíblica española
  rationale: Transliteración del nombre propio adaptada a la ortografía española habitual, conservando la identidad del referente.
- source_word: וּגְמַרְיָה
  english_pob_choice: and Gemariah
  chosen_spanish: y de Gemarías
  alternatives_spanish:
  - y Gemarías
  lexicon: convention bíblica española
  rationale: La conjunción y el nombre propio se vierten de manera directa; se mantiene el paralelismo nominal del hebreo y el enlace genealógico con «de».
- source_word: חִלְקִיָּה
  english_pob_choice: Hilkiah
  chosen_spanish: Hilquías
  alternatives_spanish:
  - Hilkías
  lexicon: convention bíblica española
  rationale: Transliteración estándar española del nombre propio, conservando el nombre bíblico reconocible en castellano.
- source_word: אֲשֶׁר
  english_pob_choice: whom
  chosen_spanish: a quienes
  alternatives_spanish:
  - a los cuales
  - que
  lexicon: HALOT
  rationale: El relativo se ajusta al antecedente personal plural en español. «A quienes» preserva la función de complemento directo implícita del hebreo y su referencia a ambos mensajeros.
- source_word: שָׁלַח
  english_pob_choice: sent
  chosen_spanish: envió
  alternatives_spanish:
  - mandó
  - despachó
  lexicon: HALOT
  rationale: «Envió» es el equivalente directo y natural para la acción de remitir a mensajeros; mantiene la sobriedad del verbo hebreo sin intensificarlo innecesariamente.
- source_word: צִדְקִיָּה
  english_pob_choice: Zedekiah
  chosen_spanish: Sedequías
  alternatives_spanish:
  - Sedecías
  lexicon: convention bíblica española
  rationale: Forma española tradicional y ampliamente inteligible del nombre del rey de Judá.
- source_word: מֶלֶךְ יְהוּדָה
  english_pob_choice: king of Judah
  chosen_spanish: rey de Judá
  alternatives_spanish:
  - rey de Judá
  lexicon: HALOT
  rationale: Construcción posesiva/constructa vertida de forma directa y idiomática en español.
- source_word: אֶל
  english_pob_choice: to
  chosen_spanish: a
  alternatives_spanish:
  - hacia
  lexicon: HALOT
  rationale: La preposición direccional se expresa de forma simple con «a», natural en español para el destinatario del envío.
- source_word: נְבוּכַדְנֶאצַּר
  english_pob_choice: Nebuchadnezzar
  chosen_spanish: Nabucodonosor
  alternatives_spanish:
  - Nebucadnezar
  - Nebucodonosor
  lexicon: convention bíblica española
  rationale: Se adopta la forma española tradicional ampliamente reconocible. La variante hebrea más cercana puede conservarse en nota, pero el texto principal prioriza legibilidad bíblica en español.
- source_word: מֶלֶךְ בָּבֶל
  english_pob_choice: king of Babylon
  chosen_spanish: rey de Babilonia
  alternatives_spanish:
  - rey de Babilonia
  lexicon: HALOT
  rationale: La construcción se vierte de manera directa y natural, manteniendo el título real y el topónimo.
- source_word: בָּבֶלָה
  english_pob_choice: in Babylon
  chosen_spanish: en Babilonia
  alternatives_spanish:
  - en Babilonia
  lexicon: HALOT
  rationale: La terminación direccional se entiende en español como localización en contexto de la misión; «en Babilonia» respeta el ajuste revisado del audit trail inglés y conserva la duplicación hebrea de forma natural.
- source_word: לֵאמֹר
  english_pob_choice: 'saying:'
  chosen_spanish: 'diciendo:'
  alternatives_spanish:
  - 'diciendo:'
  lexicon: HALOT
  rationale: Fórmula introductoria estándar para presentar el contenido del mensaje. «Diciendo:» mantiene la conexión discursiva sin añadir contenido.
translation_notes:
  revision_awareness: El texto inglés revisado sustituyó el segundo “to Babylon” por “in Babylon” para reflejar con más naturalidad la terminación direccional hebrea. En español se siguió esa decisión con «en Babilonia», manteniendo la duplicación del topónimo y la secuencia del hebreo sin sobretraducirla.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» como norma del proyecto, pero este versículo no contiene el nombre divino.
  - Se preservó la repetición geográfica del hebreo («rey de Babilonia, en Babilonia») por transparencia textual.
  - Se usaron formas españolas bíblicas convencionales para nombres propios cuando son más legibles y reconocibles que transliteraciones más crudas.
