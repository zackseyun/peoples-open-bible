translation:
  language: es
  text: Tú perdonaste la iniquidad de tu pueblo[a]; cubriste todo su pecado[b]. Selah
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O más literalmente: «Tú llevaste» o «Tú cargaste con la iniquidad de tu pueblo». El hebreo expresa el perdón mediante la imagen de levantar o quitar la culpa.'
    reason: lexical_alternative
  - marker: b
    text: O «todo sus pecados». El hebreo emplea un sustantivo singular con sufijo plural, que puede rendirse de modo colectivo como «pecado» o de modo distributivo como «pecados».
    reason: alternative_reading
lexical_decisions:
- source_word: נָשָׂאתָ
  english_pob_choice: forgave
  chosen_spanish: perdonaste
  alternatives_spanish:
  - llevaste
  - cargaste
  - quitaste
  lexicon: HALOT
  rationale: El verbo hebreo נשׂא, con objeto de עָוֹן, expresa el modismo de cargar o llevar lejos la culpa; en español, «perdonaste» comunica con claridad el valor idiomático de remoción del pecado, sin perder la base semántica de la acción divina.
- source_word: עֲוֺן
  english_pob_choice: iniquity
  chosen_spanish: iniquidad
  alternatives_spanish:
  - culpa
  - maldad
  - pecado
  lexicon: HALOT
  rationale: «Iniquidad» preserva el peso moral y la distinción léxica frente al siguiente חטאת, igual que en la decisión inglesa de mantener «iniquity» en vez de colapsarlo con «sin».
- source_word: עַמֶּךָ
  english_pob_choice: your people
  chosen_spanish: tu pueblo
  alternatives_spanish:
  - tu nación
  - tu gente
  lexicon: HALOT
  rationale: עַם en contexto pactual y corporativo se rinde de manera natural como «pueblo». El posesivo de segunda persona mantiene la relación de pertenencia y elección implícita en el hebreo.
- source_word: כִּסִּיתָ
  english_pob_choice: covered
  chosen_spanish: cubriste
  alternatives_spanish:
  - encubriste
  - ocultaste
  lexicon: HALOT
  rationale: כסה significa literalmente «cubrir». En contexto de perdón, «cubriste» conserva la metáfora visible en el hebreo y corresponde al valor adoptado por la traducción inglesa POB.
- source_word: כָל
  english_pob_choice: all
  chosen_spanish: todo
  alternatives_spanish:
  - todos
  - cada
  lexicon: HALOT
  rationale: כָל expresa totalidad; con el sustantivo singular colectivo «pecado», «todo» suena natural en español y preserva la amplitud del original.
- source_word: חַטָּאתָם
  english_pob_choice: their sin
  chosen_spanish: su pecado
  alternatives_spanish:
  - sus pecados
  - su pecado
  lexicon: HALOT
  rationale: El hebreo usa un sustantivo singular con sufijo plural, que puede entenderse colectivamente. «Su pecado» preserva mejor la forma singular colectiva que «sus pecados», a la vez que mantiene el paralelismo con «iniquidad».
- source_word: סֶלָה
  english_pob_choice: Selah
  chosen_spanish: Selah
  alternatives_spanish:
  - Pausa
  - Interludio
  lexicon: HALOT
  rationale: El sentido preciso de סלה es incierto; la transliteración «Selah» evita imponer una glosa interpretativa no asegurada por la evidencia textual.
theological_decisions:
- issue: Cómo expresar el modismo hebreo נשׂא עון
  english_pob_reading: You forgave the iniquity of your people
  chosen_spanish_reading: Tú perdonaste la iniquidad de tu pueblo
  alternative_spanish_readings:
  - Tú llevaste la iniquidad de tu pueblo
  - Tú cargaste con la iniquidad de tu pueblo
  - Tú quitaste la iniquidad de tu pueblo
  rationale: El hebreo comunica perdón por la imagen de llevar o remover la culpa. La lectura elegida expresa el sentido teológico claro de absolución, mientras que las alternativas conservan la imaginería literal subyacente.
  doctrine_reference: Translation philosophy §1, §3
- issue: Si traducir חטאתם en singular o plural
  english_pob_reading: all their sin
  chosen_spanish_reading: todo su pecado
  alternative_spanish_readings:
  - todos sus pecados
  - todo su pecado
  rationale: La forma hebrea es singular con sufijo plural y puede funcionar colectivamente. El singular colectivo en español preserva mejor la estructura poética y evita diluir la correspondencia con עון.
  doctrine_reference: Translation philosophy §5
translation_notes:
  revision_awareness: La revisión más reciente no exigió cambios; el pasaje mantiene alta concordancia con la auditoría inglesa (0.98) y no presenta revisiones aplicadas.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma general del proyecto, pero este verso no contiene el tetragrámaton explícito.
  - «Iniquidad» y «pecado» se distinguen para reflejar la dobletes léxica del hebreo (עון / חטאת).
  - Se conserva «Selah» transliterado por incertidumbre semántica y por coherencia con la práctica del POB.
  - La puntuación reproduce la paralela poética del hebreo con dos cláusulas breves separadas por punto y coma.
