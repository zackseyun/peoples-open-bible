translation:
  language: es
  text: Partieron de Moserot y acamparon en Bene-jaacán[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebreo Bene-jaacán significa literalmente «hijos de Jaacán», pero aquí funciona como nombre de lugar.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּסְעוּ
  english_pob_choice: They set out
  chosen_spanish: Partieron
  alternatives_spanish:
  - Se pusieron en marcha
  - Salieron
  - Siguieron viaje
  lexicon: HALOT
  rationale: En la fórmula itinerante del desierto, נסע expresa el acto de levantar el campamento y continuar la marcha. «Partieron» comunica ese movimiento de manera natural y breve en español, sin perder el valor narrativo de secuencia.
- source_word: מִמֹּסֵרֹות
  english_pob_choice: from Moseroth
  chosen_spanish: de Moserot
  alternatives_spanish:
  - desde Moserot
  - de Moseroth
  lexicon: HALOT
  rationale: El nombre propio se translitera, no se traduce. Se usa «Moserot» para reflejar la forma hebrea plural del topónimo, manteniendo la referencia geográfica del itinerario.
- source_word: וַיַּחֲנוּ
  english_pob_choice: and camped
  chosen_spanish: acamparon
  alternatives_spanish:
  - y acamparon
  - y acamparon allí
  - y levantaron el campamento
  lexicon: HALOT
  rationale: חנה en listas de jornadas significa acampar o hacer campamento. «Acamparon» conserva el sentido directo y suena natural en español contemporáneo.
- source_word: בִּבְנֵי יַעֲקָן
  english_pob_choice: at Bene-jaakan
  chosen_spanish: en Bene-jaacán
  alternatives_spanish:
  - en Bene-jaakan
  - entre los hijos de Jaacán
  lexicon: HALOT
  rationale: Aunque literalmente significa «hijos de Jaacán», aquí funciona como nombre de lugar dentro del itinerario. Por eso se conserva como topónimo transliterado. Se usa «en» para expresar el destino del campamento de forma idiomática en español.
theological_decisions:
- issue: Tratamiento de topónimos en la lista de jornadas
  english_pob_reading: The verse is a straightforward itinerary notice with no doctrinal elaboration.
  chosen_spanish_reading: Verso itinerario sin carga doctrinal explícita; se conservan los nombres propios como lugares.
  alternative_spanish_readings:
  - Versión literal de los nombres como «hijos de Jaacán»
  - Normalización completa de los topónimos
  rationale: No hay una decisión teológica sustantiva en el versículo; la principal cuestión es si traducir literalmente o conservar el topónimo. La lectura de la POB en inglés favorece la transliteración por tratarse de un nombre de lugar.
  doctrine_reference: Ninguna; nota de toponimia y uso histórico-literario.
translation_notes:
  revision_awareness: La revisión inglesa más reciente no introdujo cambios, y el consenso de control cruzado fue de alta concordancia. La redacción española sigue esa decisión estable y conserva la misma solución toponímica.
  spanish_consistency_notes:
  - Se mantiene el tratamiento de nombres propios como topónimos transliterados.
  - Se evita una traducción más interpretativa como «se pusieron en marcha» porque «partieron» ya reproduce bien la fórmula de itinerario.
  - La nota aclara la tensión entre sentido literal y función de lugar sin resolverla a favor de una traducción ocultadora.
