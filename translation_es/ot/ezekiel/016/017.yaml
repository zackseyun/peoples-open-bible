translation:
  language: es
  text: Tomaste tus hermosas joyas[a] de mi oro y de mi plata, que yo te había dado, y te hiciste imágenes masculinas[b], y te prostituiste con ellas[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O bien, “tus espléndidos adornos” o “tus hermosas piezas”. El hebreo puede referirse de manera amplia a objetos o artículos, pero aquí probablemente son adornos hechos con metales preciosos.
    reason: lexical_alternative
  - marker: b
    text: O “imágenes de varón”, “ídolos varones” o “imágenes de hombres”.
    reason: alternative_reading
  - marker: c
    text: La expresión “te prostituiste” reproduce una metáfora profética recurrente para la infidelidad de pacto expresada mediante idolatría.
    reason: cultural_note
lexical_decisions:
- source_word: כְּלֵי תִפְאַרְתֵּךְ
  english_pob_choice: your beautiful jewels
  chosen_spanish: tus hermosas joyas
  alternatives_spanish:
  - tus hermosos objetos
  - tus hermosos adornos
  - tus espléndidas piezas
  lexicon: HALOT
  rationale: כְּלִי es un término amplio para objeto, utensilio o artículo; en este contexto, unido a oro y plata y a un contexto de adorno, “joyas” comunica de forma natural el sentido ornamental. תִפְאַרְתֵּךְ añade la idea de hermosura/esplendor, por eso “hermosas” conserva ambos matices.
- source_word: מִזְּהָבִי וּמִכַּסְפִּי
  english_pob_choice: from my gold and my silver
  chosen_spanish: de mi oro y de mi plata
  alternatives_spanish:
  - con mi oro y mi plata
  - hechas de mi oro y de mi plata
  - tomadas de mi oro y de mi plata
  lexicon: HALOT
  rationale: La preposición מִן indica aquí procedencia o materia. “De mi oro y de mi plata” mantiene la idea de que esos metales pertenecían al hablante y habían sido dados a Jerusalén.
- source_word: אֲשֶׁר נָתַתִּי לָךְ
  english_pob_choice: which I had given to you
  chosen_spanish: que yo te había dado
  alternatives_spanish:
  - que yo te di
  - que te había dado
  lexicon: HALOT
  rationale: El pasado pluscuamperfecto en español encaja con la acusación retrospectiva y resalta que eran dones previos del hablante. También se mantiene el sujeto explícito “yo” para conservar el énfasis posesivo.
- source_word: וַתַּעֲשִׂי לָךְ
  english_pob_choice: and made for yourself
  chosen_spanish: y te hiciste
  alternatives_spanish:
  - y te las hiciste
  - y te las fabricaste
  - y te las confeccionaste
  lexicon: HALOT
  rationale: 'El valor reflexivo de לָךְ es importante: el acto recae sobre la destinataria y para su propio uso ilícito. “Te hiciste” suena natural en español y conserva esa dirección hacia sí misma.'
- source_word: צַלְמֵי זָכָר
  english_pob_choice: male images
  chosen_spanish: imágenes de varón
  alternatives_spanish:
  - imágenes masculinas
  - ídolos varones
  - imágenes de hombres
  lexicon: HALOT
  rationale: צֶלֶם significa “imagen” o “figura”, y זָכָר especifica “macho/varón”. “Imágenes de varón” mantiene la literalidad de la expresión y sugiere el carácter sexualizado del ídolo sin introducir “ídolos” en el texto principal.
- source_word: וַתִּזְנִי בָם
  english_pob_choice: and you prostituted yourself with them
  chosen_spanish: y te prostituiste con ellas
  alternatives_spanish:
  - y fuiste infiel con ellas
  - y cometiste prostitución con ellas
  - y te entregaste sexualmente a ellas
  lexicon: HALOT
  rationale: זנה es un verbo profético clave para la infidelidad de pacto expresada con metáfora sexual. “Te prostituiste” conserva esa fuerza sin suavizarla; “con ellas” se refiere a las imágenes, concordando con el antecedente femenino plural en español.
theological_decisions:
- issue: Metáfora sexual profética aplicada a la idolatría
  english_pob_reading: Retain explicit sexualized language ('prostituted yourself') rather than soften to a generic statement of unfaithfulness.
  chosen_spanish_reading: Mantener “te prostituiste” en lugar de sustituirlo por una expresión genérica como “fuiste infiel”.
  alternative_spanish_readings:
  - fuiste infiel
  - cometiste idolatría
  - te apartaste
  rationale: Ezequiel usa deliberadamente una imagen fuerte para describir la ruptura de pacto. Conservar el lenguaje sexualizado respeta el impacto retórico y no diluye la carga teológica del texto.
  doctrine_reference: Translation philosophy §§1, 3, 6
- issue: Sentido de צַלְמֵי זָכָר
  english_pob_reading: Translate as 'male images' in the main text, leaving the idolatrous implication to context.
  chosen_spanish_reading: Traducir como “imágenes de varón” y dejar que el contexto identifique su uso idolátrico.
  alternative_spanish_readings:
  - ídolos varones
  - imágenes masculinas
  - imágenes de hombres usadas para idolatría
  rationale: El sustantivo básico es “imagen”, no “ídolo”. Mantener la forma más cercana al hebreo preserva la literalidad y permite que el lector perciba la unión entre sexualidad, imagen y culto que el contexto denuncia.
  doctrine_reference: Translation philosophy §§1, 5
translation_notes:
  revision_awareness: La revisión más reciente indicó que no había cambios necesarios; esta redacción sigue de cerca el texto hebreo y el mismo conjunto de decisiones del POB en inglés, sin introducir ajustes sustanciales.
  spanish_consistency_notes:
  - Se mantuvo “Yahvé” como forma estándar del proyecto cuando aparezca el nombre divino; en este versículo no ocurre.
  - Se prefirió “oro” y “plata” sin expandir a “metales preciosos”, porque el texto habla de materiales concretos dados al destinatario.
  - Se evitó “SEÑOR” como sustituto de nombre divino porque el versículo no contiene el Tetragrámaton.
  - 'La concordancia de género en “ellas” se ajusta al referente implícito en español: las imágenes.'
  - “Imágenes de varón” conserva una literalidad algo marcada, pero se eligió por fidelidad al hebreo y por mantener la tensión sexualizada del texto.
