translation:
  language: es
  text: 'Pero cuando ella llegó a mí, comenzó a gritar; y yo le dije: «¿De dónde es el cabrito[a]? ¿Está robado? Devuélvelo a sus dueños, porque no es lícito comer lo robado».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: ἔριφον puede rendirse también como «cabrita», es decir, una cría de cabra.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἤρξατο κράζειν
  english_pob_choice: began to cry out
  chosen_spanish: comenzó a gritar
  alternatives_spanish:
  - comenzó a clamar
  - comenzó a dar gritos
  - empezó a gritar
  lexicon: BDAG
  rationale: La construcción indica el inicio de una voz fuerte. «Gritar» conserva la intensidad sin precisar si el tono fue de dolor, protesta o sorpresa.
- source_word: Πόθεν τὸ ἔριφον;
  english_pob_choice: Where is the young goat from?
  chosen_spanish: ¿De dónde es la cabrita?
  alternatives_spanish:
  - ¿De dónde viene la cabrita?
  - ¿De dónde procede la cabrita?
  - ¿De dónde es el cabrito?
  lexicon: LSJ
  rationale: πόθεν pregunta por origen o procedencia. «¿De dónde es…?» refleja bien ese valor en español, y «cabrita» mantiene el sentido de un animal joven con naturalidad.
- source_word: ἔριφον
  english_pob_choice: young goat
  chosen_spanish: cabrita
  alternatives_spanish:
  - cabrito
  - cría de cabra
  - chivita
  lexicon: LSJ
  rationale: El griego designa una cabra joven. «Cabrita» es claro y natural en español; también preserva la idea de animal joven mejor que una mera paráfrasis.
- source_word: μὴ κλεμμάιον ἐστίν;
  english_pob_choice: Is it stolen?
  chosen_spanish: ¿Está robada?
  alternatives_spanish:
  - ¿Es robada?
  - ¿Es robado?
  - ¿No será robada?
  lexicon: LSJ
  rationale: La expresión se refiere a un bien robado. En español, la forma verbal «está robada» comunica naturalmente la sospecha de que el animal proviene de robo.
- source_word: ἀπόδος αὐτὸ τοῖς κυρίοις
  english_pob_choice: Give it back to its owners
  chosen_spanish: Devuélvela a sus dueños
  alternatives_spanish:
  - Devuélvelo a sus dueños
  - Entrégala a sus dueños
  - Devuélvela a sus propietarios
  lexicon: LSJ
  rationale: ἀπόδος es un mandato de devolver. «Dueños» expresa aquí mejor que «señores» o «dueños/propietarios» el poseedor del animal, sin forzar un matiz jerárquico.
- source_word: θεμιτὸν
  english_pob_choice: lawful
  chosen_spanish: lícito
  alternatives_spanish:
  - permitido
  - legal
  - justo
  lexicon: LSJ
  rationale: El término tiene fuerza moral y legal. «Lícito» conserva ese peso en español y suena natural en un registro bíblico digno.
- source_word: φαγεῖν κλεψιμαῖον
  english_pob_choice: to eat what is stolen
  chosen_spanish: comer lo robado
  alternatives_spanish:
  - comer algo robado
  - comer comida robada
  - comer lo que es robado
  lexicon: LSJ
  rationale: El giro griego señala el acto de comer algo obtenido por robo. «Comer lo robado» es idiomático en español y mantiene la amplitud del original.
theological_decisions:
- issue: Tono moral-jurídico de la objeción de Tobit
  english_pob_reading: for it is not lawful to eat what is stolen
  chosen_spanish_reading: porque no es lícito comer lo robado
  alternative_spanish_readings:
  - porque no está permitido comer lo robado
  - porque no es justo comer lo robado
  - porque no es legal comer lo robado
  rationale: La frase expresa una objeción moral en términos de licitud, no solo de preferencia personal. «Lícito» mantiene el registro ético-jurídico sin añadir un sistema legal ajeno al pasaje.
  doctrine_reference: 'Principio de traducción: preservar el peso moral y legal del texto fuente sin sobreinterpretación doctrinal.'
translation_notes:
  revision_awareness: El control cruzado de la versión inglesa señaló posibles problemas mayores. En español se mantuvo el sentido del griego de forma directa y clara, evitando depender de una traducción mecánica del inglés.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» como norma del proyecto, pero este versículo no contiene el nombre divino.
  - Se usó un registro bíblico claro y moderno, evitando arcaísmos innecesarios.
  - «Lícito» preserva mejor el matiz moral-jurídico que un simple «correcto» o «permitido».
