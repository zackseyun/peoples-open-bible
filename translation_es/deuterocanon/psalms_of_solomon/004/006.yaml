lexical_decisions:
- source_word: ταχὺς
  english_pob_choice: quick
  chosen_spanish: rápido
  alternatives_spanish:
  - pronto
  - listo
  lexicon: BDAG
  rationale: El adjetivo expresa prontitud o disposición para actuar. «Rápido» es natural en español y conserva la idea de prontitud sin volver la frase arcaica.
- source_word: εἰσόδῳ
  english_pob_choice: to enter
  chosen_spanish: para entrar
  alternatives_spanish:
  - al entrar
  - en entrar
  - para la entrada
  lexicon: BDAG
  rationale: El dativo con ταχύς apunta a la disposición respecto de la acción de entrar. «Para entrar» comunica bien esa relación en español y mantiene la sintaxis clara.
- source_word: πᾶσαν οἰκίαν
  english_pob_choice: every house
  chosen_spanish: toda casa
  alternatives_spanish:
  - cada casa
  - toda vivienda
  - todo hogar
  lexicon: BDAG
  rationale: «Toda casa» refleja de manera directa el distributivo griego sin añadir un matiz más interpretativo como «hogar».
- source_word: ἱλαρότητι
  english_pob_choice: with cheerfulness
  chosen_spanish: con alegría
  alternatives_spanish:
  - con gozo
  - con jovialidad
  - con un trato agradable
  lexicon: BDAG
  rationale: El sustantivo describe una disposición alegre o agradable. «Con alegría» es natural y conserva el tono moral del retrato.
- source_word: ὡς
  english_pob_choice: as one innocent
  chosen_spanish: como uno
  alternatives_spanish:
  - como alguien
  - cual uno
  lexicon: BDAG
  rationale: La revisión inglesa evita «as if» para no sugerir pura simulación. En español, «como uno» mantiene esa comparación directa y deja que el siguiente adjetivo complete el sentido.
- source_word: ἄκακος
  english_pob_choice: innocent
  chosen_spanish: inocente
  alternatives_spanish:
  - sin malicia
  - guileless / sin astucia
  - inculpable
  lexicon: BDAG
  rationale: «Inocente» es la equivalencia más clara y cercana al valor de ἄκακος en este contexto ético. Se conservan alternativas que podrían explicitar el matiz de ausencia de malicia si hiciera falta en nota.
translation_notes:
  revision_awareness: La versión inglesa revisó la última cláusula de «as if innocent» a «as one innocent» para reflejar más directamente ὡς ἄκακος y evitar la idea de simple apariencia. La redacción española sigue esa revisión con «como uno inocente».
  spanish_consistency_notes:
  - Se evita «SEÑOR» u այլ sustituciones porque el texto no contiene el nombre divino.
  - «Casa» se conserva en singular distributivo plural («toda casa»), siguiendo de cerca la estructura griega.
  - La puntuación pretende reflejar un enunciado breve y aforístico, sin introducir conectores no presentes en el original.
