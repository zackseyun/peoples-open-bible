translation:
  language: es
  text: 'Los cantores: los hijos[a] de Asaf, ciento cuarenta y ocho.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «los descendientes de Asaf». El hebreo «hijos de» puede denotar una línea familiar o la pertenencia a un gremio, no solo hijos inmediatos.
    reason: lexical_alternative
lexical_decisions:
- source_word: הַמְשֹׁרְרִים
  english_pob_choice: the singers
  chosen_spanish: los cantores
  alternatives_spanish:
  - los cantantes
  - los músicos
  lexicon: HALOT
  rationale: El participio hebreo de שׁיר designa a los que cantan. En un registro censal o levítico, «cantores» es natural en español bíblico y comunica con precisión la función sin ampliar indebidamente a «músicos».
- source_word: בְּנֵי
  english_pob_choice: the sons of
  chosen_spanish: los hijos de
  alternatives_spanish:
  - los descendientes de
  - los miembros de
  lexicon: HALOT
  rationale: En designaciones genealógicas o corporativas, בְּנֵי puede indicar descendencia o pertenencia a un grupo. Se conserva la expresión formal «los hijos de» porque refleja mejor la estructura del hebreo y el paralelo del POB en inglés.
- source_word: אָסָף
  english_pob_choice: Asaph
  chosen_spanish: Asaf
  alternatives_spanish:
  - Asaf
  lexicon: Transliteración estándar en español bíblico
  rationale: Se translitera el nombre propio según el uso bíblico español habitual. La forma «Asaf» es la equivalente natural de la transliteración inglesa «Asaph» y evita una adaptación interpretativa.
- source_word: מֵאָה אַרְבָּעִים וּשְׁמֹנָה
  english_pob_choice: one hundred forty-eight
  chosen_spanish: ciento cuarenta y ocho
  alternatives_spanish:
  - ciento cuarenta y ocho
  lexicon: HALOT
  rationale: La secuencia numérica hebrea es directa y se vierte con claridad en español moderno. Se mantiene la forma completa para un registro censal formal.
theological_decisions:
- issue: Sentido de בְּנֵי en una lista de cantores
  english_pob_reading: The sons of Asaph can denote a family line or guild membership, not only immediate sons.
  chosen_spanish_reading: «Los hijos de Asaf» puede indicar descendencia o pertenencia a un gremio/linaje, no solo hijos inmediatos.
  alternative_spanish_readings:
  - los descendientes de Asaf
  - los miembros del grupo de Asaf
  rationale: El hebreo en contextos genealógicos y cultuales admite un alcance colectivo. Se conserva la ambigüedad útil en español sin cerrarla a parentesco biológico estricto.
  doctrine_reference: Uso lexical y corporativo del lenguaje genealógico en listas levíticas
translation_notes:
  revision_awareness: El pasaje no presenta revisiones textuales ni cambios de edición relevantes en el paquete auditado; se sigue la lectura estable del texto hebreo y la solución inglesa aprobada.
  spanish_consistency_notes:
  - Se conserva el orden breve y enumerativo del hebreo, adecuado a una nota censal.
  - «Cantores» mantiene el valor funcional del participio hebreo sin sobredeterminar el oficio.
  - El nombre propio se estandariza como «Asaf» para coherencia con el español bíblico.
  - La nota explica la ambigüedad de «hijos de» sin sustituirla en el texto principal.
