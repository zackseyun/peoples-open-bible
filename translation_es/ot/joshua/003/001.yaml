    rationale: Aunque no es incorrecto, 'antes de que cruzaran' representa con mayor precisión el verbo plural יַעֲבֹרוּ y suena más completo en español narrativo.
  revised_spanish_text: Josué se levantó temprano por la mañana, y partieron de Sitim y llegaron al Jordán, él y todos los hijos de Israel[a], y pasaron la noche allí antes de que cruzaran.
