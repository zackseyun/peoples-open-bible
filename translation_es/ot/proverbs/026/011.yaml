translation:
  language: es
  text: Como un perro que vuelve a su vómito[a], así el necio repite su necedad.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más formalmente: «Como un perro vuelve a su vómito, así el necio vuelve a su necedad». El hebreo usa participios en ambas mitades, dando una imagen vívida de acción habitual.'
    reason: lexical_alternative
lexical_decisions:
- source_word: כְּכֶלֶב
  english_pob_choice: Like a dog
  chosen_spanish: Como perro
  alternatives_spanish:
  - Como un perro
  - Tal como un perro
  lexicon: HALOT
  rationale: El כ prefijado introduce comparación. En español, «Como perro» reproduce bien la imagen proverbial sin añadir determinación innecesaria; «como un perro» también sería posible, pero la forma breve conserva el golpe sentencioso del hebreo.
- source_word: שָׁב
  english_pob_choice: returning
  chosen_spanish: vuelve
  alternatives_spanish:
  - regresa
  - retorna
  lexicon: HALOT
  rationale: El participio presenta una acción característica y repetida. «Vuelve» comunica con naturalidad esa repetición habitual en español y mantiene el movimiento de retorno.
- source_word: עַל קֵאוֹ
  english_pob_choice: to its vomit
  chosen_spanish: a su vómito
  alternatives_spanish:
  - sobre su vómito
  - a lo que vomitó
  lexicon: HALOT
  rationale: Aunque עַל puede ser literalmente «sobre/en», el giro español más natural con «volver» es «a su vómito». «A» preserva la dirección del retorno sin perder claridad.
- source_word: כְּסִיל
  english_pob_choice: a fool
  chosen_spanish: el necio
  alternatives_spanish:
  - el insensato
  - el tonto
  lexicon: HALOT
  rationale: En Proverbios, כְּסִיל designa al necio moral y obstinado. «Neceo»/«el necio» conserva mejor esa carga que «tonto»; el artículo definido hace natural la sentencia general en español.
- source_word: שׁוֹנֶה
  english_pob_choice: repeats
  chosen_spanish: repite
  alternatives_spanish:
  - hace de nuevo
  - vuelve a hacer
  lexicon: HALOT
  rationale: El verbo expresa repetición. «Repite» es la equivalencia directa y clara para el sentido proverbial.
- source_word: בְאִוַּלְתּוֹ
  english_pob_choice: his folly
  chosen_spanish: su necedad
  alternatives_spanish:
  - su insensatez
  - su locura
  lexicon: HALOT
  rationale: אִוֶּלֶת/אִוַּלְתּוֹ denota necedad o insensatez, no simple falta de inteligencia. «Su necedad» preserva el valor moral del término y mantiene la correspondencia con כְּסִיל.
theological_decisions:
- issue: Si traducir el paralelismo con una forma más literal o más idiomática
  english_pob_reading: The Hebrew uses participles in both halves, giving a vivid picture of habitual action.
  chosen_spanish_reading: El español usa verbos en presente con valor habitual para conservar la imagen vívida de una acción repetida.
  alternative_spanish_readings:
  - Como perro que vuelve a su vómito, así el necio está repitiendo su necedad.
  - Como perro que regresa a su vómito, así el necio vuelve a su necedad.
  rationale: El hebreo presenta una escena característica y habitual, no un evento aislado. El presente simple en español transmite bien esa habitualidad sin volver la frase pesada.
  doctrine_reference: 'Proverbios sapienciales: observación moral general, no afirmación doctrinal específica.'
translation_notes:
  revision_awareness: No se detectaron revisiones aplicadas en el audit trail; el pasaje muestra alto acuerdo y solo una observación menor sobre la forma verbal participial en ambas mitades.
  spanish_consistency_notes:
  - Se mantuvo «necio/necedad» para conservar la correspondencia semántica entre כְּסִיל e אִוַּלְתּוֹ.
  - Se evitó «Cristo/SEÑOR» porque el versículo no contiene términos divinos ni mesiánicos.
  - La sintaxis española conserva el paralelismo proverbial con una simile inicial y una comparación final claramente equilibradas.
