translation:
  language: es
  text: La tierra y todos los que habitan en ella se desmoronan[a]; yo mismo he afirmado sus pilares[b]. Selah[c]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O “vacilan”, “se deshacen” o “son sacudidos” para la imagen de “se desmoronan”. El hebreo expresa inestabilidad o colapso.
    reason: lexical_alternative
  - marker: b
    text: O “he establecido sus pilares”.
    reason: lexical_alternative
  - marker: c
    text: “Selah” se translitera tradicionalmente; su sentido exacto es incierto.
    reason: cultural_note
lexical_decisions:
- source_word: נְמֹגִים
  english_pob_choice: melt away
  chosen_spanish: se derriten
  alternatives_spanish:
  - vacilan
  - se deshacen
  - se desvanecen
  lexicon: HALOT
  rationale: El participio expresa una imagen de inestabilidad, disolución o colapso. En español, "se derriten" conserva la metáfora vívida y el sentido de debilitamiento/collapse sin volverla explicativa en exceso.
- source_word: אֶרֶץ
  english_pob_choice: the earth
  chosen_spanish: la tierra
  alternatives_spanish:
  - el país
  - el mundo
  lexicon: HALOT
  rationale: En paralelo con "todos los que habitan en ella" y con "sus columnas", el sentido global/cósmico se comunica bien en español con "la tierra".
- source_word: יֹשְׁבֶיהָ
  english_pob_choice: all who dwell in it
  chosen_spanish: todos los que habitan en ella
  alternatives_spanish:
  - todos sus habitantes
  - todos los que viven en ella
  lexicon: HALOT
  rationale: La forma participial de ישב denota moradores o habitantes. "Habitan en ella" conserva el valor verbal y suena natural en español.
- source_word: אָנֹכִי
  english_pob_choice: I myself
  chosen_spanish: yo mismo
  alternatives_spanish:
  - yo
  - yo solo
  lexicon: HALOT
  rationale: El pronombre independiente es enfático. "Yo mismo" reproduce esa fuerza sin añadir la idea de exclusividad total que no está explicitada por el hebreo.
- source_word: תִכַּנְתִּי
  english_pob_choice: have set ... firm
  chosen_spanish: he afirmado
  alternatives_spanish:
  - he establecido
  - he fijado
  - he puesto firmes
  lexicon: HALOT
  rationale: כון en piel puede significar establecer, afirmar o hacer firme. Con "columnas", "he afirmado" comunica bien la idea de estabilizar y sostener, manteniendo la imagen poética.
- source_word: עַמּוּדֶיהָ
  english_pob_choice: its pillars
  chosen_spanish: sus columnas
  alternatives_spanish:
  - sus pilares
  - sus soportes
  lexicon: HALOT
  rationale: El sustantivo designa columnas o pilares. "Columnas" es claro en español y mantiene la metáfora arquitectónica/cosmológica del texto.
- source_word: סֶּלָה
  english_pob_choice: Selah
  chosen_spanish: Selah
  lexicon: HALOT
  rationale: El valor preciso del término es incierto; se translitera en el texto principal siguiendo la práctica POB y evitando imponer una glosa especulativa.
theological_decisions:
- issue: Imagen cosmológica de la tierra con columnas
  english_pob_reading: Retain the poetic image literally as 'its pillars' rather than reinterpret it scientifically or metaphorically in the main text.
  chosen_spanish_reading: Conservar la imagen como "sus columnas" en el texto principal, sin convertirla en una paráfrasis como "cimientos" o una explicación modernizada.
  alternative_spanish_readings:
  - sus cimientos
  - sus soportes
  - su fundamento
  rationale: El salmo emplea lenguaje poético antiguo para expresar la firmeza del orden sostenido por Dios. Mantener la imagen respeta la primacía del texto fuente y no atenúa la tensión poética.
  doctrine_reference: Principio de primacía del texto original; preservación del sentido llano poético sin armonización moderna
translation_notes:
  revision_awareness: La revisión auditada eliminó una conjunción temporal implícita en una versión anterior en inglés (“When”), dejando una afirmación directa. La presente redacción española sigue esa misma línea directa, con puntuación que separa dos miembros poéticos sin añadir conectores no presentes en el hebreo.
  spanish_consistency_notes:
  - Se mantuvo "Yahvé" como norma general del proyecto, pero este versículo no contiene el nombre divino.
  - Se prefirió "la tierra" por el alcance global del paralelismo; no se usó "el país" porque limitaría indebidamente el alcance.
  - '"Selah" quedó transliterado, conforme al patrón POB, y la nota aclara la incertidumbre semántica.'
  - Se conservó el orden poético de dos hemistiquios con punto y coma para reflejar la estructura del hebreo.
