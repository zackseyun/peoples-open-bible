translation:
  language: es
  text: 'Y sus siervos le dijeron: «Mira[a], hemos oído que los reyes de la casa de Israel son reyes misericordiosos. Pongamos, por favor, tela áspera de luto[b] sobre nuestras cinturas y sogas sobre nuestras cabezas[c], y salgamos al rey de Israel; tal vez él te deje vivir[d]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «He aquí, por favor». El hebreo combina una llamada de atención con cortesía o urgencia.'
    reason: lexical_alternative
  - marker: b
    text: El hebreo dice «sacos», es decir, la tela tosca usada como señal de duelo o humillación.
    reason: lexical_alternative
  - marker: c
    text: «Sogas sobre nuestras cabezas» probablemente señala un gesto público de rendición o sumisión.
    reason: cultural_note
  - marker: d
    text: 'O: «tal vez él te perdone la vida».'
    reason: lexical_alternative
lexical_decisions:
- source_word: עֲבָדָיו
  english_pob_choice: his servants
  chosen_spanish: sus siervos
  alternatives_spanish:
  - sus esclavos
  - sus servidores
  lexicon: HALOT
  rationale: En el contexto cortesano, עבד designa acompañantes o servidores del rey. «Siervos» comunica la relación de servicio sin cargar innecesariamente la idea de esclavitud, y es idiomático en español bíblico actual.
- source_word: הִנֵּה נָא
  english_pob_choice: Please behold
  chosen_spanish: Por favor, entiende
  alternatives_spanish:
  - Por favor, mira
  - Mira, por favor
  - Por favor, atiende
  lexicon: HALOT
  rationale: El hebreo combina una llamada de atención con cortesía/urgencia. En español, «Por favor, entiende» conserva el valor apelativo y suena natural y reverente; se evita el calco rígido «he aquí» en una intervención directa.
- source_word: מַלְכֵי חֶסֶד
  english_pob_choice: merciful kings
  chosen_spanish: reyes de misericordia
  alternatives_spanish:
  - reyes misericordiosos
  - reyes clementes
  lexicon: HALOT
  rationale: חֶסֶד aquí expresa clemencia/benignidad real. «Reyes de misericordia» mantiene la construcción nominal del hebreo y la tensión semántica del término, mientras que «misericordiosos» o «clementes» interpretan más libremente el adjetivo.
- source_word: שַׂקִּים בְּמָתְנֵינוּ
  english_pob_choice: sackcloth on our waists
  chosen_spanish: sacos sobre nuestras cinturas
  alternatives_spanish:
  - cilicio sobre nuestras cinturas
  - sacos en nuestras cinturas
  - sacos sobre nuestros lomos
  lexicon: HALOT
  rationale: מָתְנַיִם apunta a cintura/lomos. «Cinturas» es claro en español contemporáneo; «sacos» refleja el vestuario de duelo del hebreo, aunque en español bíblico también podría decirse «cilicio» si el contexto exigiera explicitar la tela.
- source_word: חֲבָלִים בְּרֹאשֵׁנוּ
  english_pob_choice: ropes on our heads
  chosen_spanish: sogas sobre nuestras cabezas
  alternatives_spanish:
  - cuerdas sobre nuestras cabezas
  - sogas en nuestras cabezas
  - lazos sobre nuestras cabezas
  lexicon: HALOT
  rationale: חבל puede significar cuerda o soga. «Sogas sobre nuestras cabezas» conserva la imagen verbal cercana al hebreo y evita suavizar el gesto de sumisión o rendición implícito.
- source_word: וְנֵצֵא אֶל מֶלֶךְ יִשְׂרָאֵל
  english_pob_choice: and let us go out to the king of Israel
  chosen_spanish: y salgamos al rey de Israel
  alternatives_spanish:
  - y vayamos al rey de Israel
  - y salgamos hacia el rey de Israel
  - y nos presentemos ante el rey de Israel
  lexicon: HALOT
  rationale: El cohortativo incluye propuesta y acción conjunta. «Salgamos al rey de Israel» reproduce el movimiento de yָצָא + אֶל con concisión y sin añadir una explicación que el hebreo no da.
- source_word: אוּלַי יְחַיֶּה אֶת נַפְשֶׁךָ
  english_pob_choice: perhaps he will let you live
  chosen_spanish: tal vez él te deje vivir
  alternatives_spanish:
  - quizá él te perdone la vida
  - tal vez él te preserve la vida
  - quizá él te mantenga con vida
  lexicon: HALOT
  rationale: El piel de חיה con נפש expresa preservar la vida. «Te deje vivir» es natural en español y mantiene la apertura de la posibilidad; las otras opciones son equivalentes válidas pero menos directas.
theological_decisions:
- issue: Reproducción del término חֶסֶד aplicado a la realeza
  english_pob_reading: merciful kings
  chosen_spanish_reading: reyes de misericordia
  alternative_spanish_readings:
  - reyes misericordiosos
  - reyes clementes
  rationale: No se borra la cualidad ética del término ni se reduce a mera amabilidad. «De misericordia» deja visible la carga de חֶסֶד como benevolencia fiel/clemente sin imponer una glosa doctrinal ajena al versículo.
  doctrine_reference: Clemencia real / benevolencia; cf. uso léxico de חֶסֶד en contextos de favor y lealtad.
- issue: Posible lectura del gesto con sogas sobre la cabeza
  english_pob_reading: Ropes on our heads likely signifies a public gesture of surrender or submission.
  chosen_spanish_reading: sogas sobre nuestras cabezas
  alternative_spanish_readings:
  - cuerdas sobre nuestras cabezas
  - lazos sobre nuestras cabezas
  rationale: La traducción principal conserva el gesto sin explicarlo dentro del texto. La carga de sumisión o rendición pertenece a la lectura cultural y debe mantenerse como posible sentido, no como paráfrasis incorporada al versículo.
  doctrine_reference: Nota cultural sobre gestos de humillación y sumisión en el antiguo Cercano Oriente.
translation_notes:
  revision_awareness: Se tomó en cuenta la revisión que elevó el registro de la apelación inicial y ajustó la preposición de «around» a una formulación más cercana al hebreo. En español se conservó la cortesía, el paralelismo y la imagen física del texto, evitando suavizar el gesto de rendición.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» como norma general del proyecto, pero aquí no aparece el nombre divino en el versículo.
  - Se eligió «siervos» por el contexto cortesano; no se usó «esclavos» porque el audit trail inglés no exigió esa fuerza léxica en este caso.
  - Se preservó la estructura de dos propuestas con cortesía («Por favor» / «tal vez») para reflejar la pragmática del hebreo.
  - Las notas al pie están ancladas en el texto con [a], [b] y [c], sin reutilizar marcadores.
