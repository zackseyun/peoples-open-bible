revisions:
- from: Ella descubrió sus prostituciones y descubrió su desnudez[a]; entonces mi alma fue repelida por ella[b][c], tal como mi alma había sido repelida por su hermana.
  to: Ella descubrió sus prostituciones y descubrió su desnudez[a]; entonces mi alma sintió repulsión hacia ella[c][b], tal como mi alma había sentido repulsión hacia su hermana.
  rationale: Se conserva toda la fuerza del hebreo y del POB inglés, pero se reemplaza una construcción pasiva poco natural en español por una expresión idiomática que mantiene el antropopatismo («mi alma») y la intensidad de la repulsión. También se ajusta la nota alternativa para que sea español natural y útil al lector.
