translation:
  language: es
  text: Y los sacerdotes no pudieron entrar en la casa de Yahvé[a], porque la gloria de Yahvé llenó la casa de Yahvé.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «casa de Yahweh»; es decir, el templo. La traducción conserva «casa» para reflejar la formulación hebrea.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְלֹא / יָכְלוּ
  english_pob_choice: were not able
  chosen_spanish: no pudieron
  alternatives_spanish:
  - no fueron capaces de
  - no lograron
  lexicon: HALOT
  rationale: El hebreo expresa incapacidad; en español, «no pudieron» comunica con naturalidad la misma idea sin añadir matiz físico o moral que el texto no especifica.
- source_word: הַכֹּהֲנִים
  english_pob_choice: the priests
  chosen_spanish: los sacerdotes
  alternatives_spanish:
  - los presbíteros
  lexicon: HALOT
  rationale: En este contexto del templo, כהנים corresponde de forma estándar a «sacerdotes». «Sacerdotes» es el término bíblico español más claro y ampliamente entendible.
- source_word: לָבוֹא אֶל
  english_pob_choice: to enter
  chosen_spanish: entrar
  alternatives_spanish:
  - ir a entrar en
  - venir a
  lexicon: HALOT
  rationale: El infinitivo con אֶל en este pasaje indica entrar en un lugar. «Entrar» es la forma más natural y fiel en español.
- source_word: בֵּית יְהוָה
  english_pob_choice: the house of Yahweh
  chosen_spanish: la casa de Yahvé
  alternatives_spanish:
  - el templo de Yahvé
  lexicon: HALOT
  rationale: Se mantiene «casa» para reflejar literalmente בית, como hace la POB en inglés, en lugar de sustituirlo por «templo». El nombre divino se rinde como «Yahvé» según la convención del proyecto.
- source_word: כִּי
  english_pob_choice: because
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  lexicon: HALOT
  rationale: Aquí introduce la causa de la imposibilidad de entrar; «porque» es el conector causal más directo y transparente.
- source_word: מָלֵא
  english_pob_choice: filled
  chosen_spanish: llenó
  alternatives_spanish:
  - había llenado
  - estaba lleno de
  lexicon: HALOT
  rationale: El verbo מלא indica que la gloria ocupó plenamente la casa. «Llenó» conserva la acción en pasado narrativo sin sobrecargar el aspecto.
- source_word: כְבוֹד יְהוָה
  english_pob_choice: the glory of Yahweh
  chosen_spanish: la gloria de Yahvé
  alternatives_spanish:
  - la gloria de Yahveh
  lexicon: HALOT
  rationale: «Gloria» es la equivalencia estándar de כבוד en este contexto teológico. Se preserva la relación constructa con «de Yahvé».
- source_word: אֶת בֵּית יְהוָה
  english_pob_choice: the house of Yahweh
  chosen_spanish: la casa de Yahvé
  alternatives_spanish:
  - el templo de Yahvé
  lexicon: HALOT
  rationale: La repetición del sintagma hebreo se conserva en español para reflejar la repetición enfática del texto fuente, tal como la POB inglesa mantuvo «house».
theological_decisions:
- issue: Tratamiento del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahveh
  - el SEÑOR
  rationale: La base inglesa decide transliterar el Tetragrama como Yahweh. En español, la forma estable del proyecto es «Yahvé», que preserva el nombre propio y evita la sustitución por un título.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Elección entre «casa» y «templo»
  english_pob_reading: house of Yahweh
  chosen_spanish_reading: casa de Yahvé
  alternative_spanish_readings:
  - templo de Yahvé
  rationale: El hebreo usa literalmente «casa», y la POB inglesa conserva esa forma para mantener la textura del original. En español se conserva igualmente, sin normalizarlo a «templo».
  doctrine_reference: POB translation philosophy — preserve source wording where the lexical choice has interpretive value
translation_notes:
  revision_awareness: El pasaje coincide con el texto hebreo y con la revisión inglesa más reciente; no se detectan cambios aplicados en la línea auditada. La versión española mantiene la misma decisión de conservar «casa» y el nombre divino en forma transliterada.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» de forma uniforme para יהוה.
  - Se conserva «casa» en ambos casos de בית para reflejar la repetición del hebreo.
  - «Sacerdotes» se usa aquí por claridad contextual en lugar de «sacerdotes del templo» o «levitas», que no están en el texto.
  - La puntuación sigue el estilo español y conserva el ritmo narrativo breve del original.
