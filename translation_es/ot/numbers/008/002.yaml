translation:
  language: es
  text: 'Habla a Aarón y dile[a]: «Cuando coloques las lámparas, las siete lámparas alumbrarán hacia el frente del lampario».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «Cuando enciendas las lámparas». El verbo hebreo literalmente significa «hacer subir» y, en este contexto, puede referirse tanto a encender las lámparas como a colocarlas de modo que iluminen hacia el frente.
    reason: lexical_alternative
lexical_decisions:
- source_word: דַּבֵּר
  english_pob_choice: Speak
  chosen_spanish: Habla
  alternatives_spanish:
  - Di
  - Dile
  lexicon: HALOT
  rationale: El imperativo introduce una instrucción formal de Yahvé a Moisés. En español, «Habla» conserva mejor el registro directo y solemne que «Di».
- source_word: וְאָמַרְתָּ אֵלָיו
  english_pob_choice: and say to him
  chosen_spanish: y dile
  alternatives_spanish:
  - y di a él
  - y háblale
  lexicon: HALOT
  rationale: La fórmula hebrea separa dos verbos de habla; en español, «y dile» mantiene la distinción natural sin sonar forzado.
- source_word: בְּהַעֲלֹתְךָ
  english_pob_choice: When you set up
  chosen_spanish: Cuando alces
  alternatives_spanish:
  - Cuando enciendas
  - Cuando pongas en su lugar
  lexicon: HALOT
  rationale: El verbo hifil de עלה literalmente es «hacer subir / alzar». El POB inglés opta por una solución funcional; en español, «alces» conserva la metáfora verbal y deja abierta la tensión entre encender y preparar/colocar las lámparas, conforme al dato lexical del texto.
- source_word: הַנֵּרֹת
  english_pob_choice: the lamps
  chosen_spanish: las lámparas
  alternatives_spanish:
  - las luces
  lexicon: HALOT
  rationale: נֵר designa una lámpara concreta, no la luz abstracta. «Lámparas» es el equivalente natural y preciso.
- source_word: אֶל מוּל פְּנֵי הַמְּנוֹרָה
  english_pob_choice: toward the front of the lampstand
  chosen_spanish: hacia el frente del candelabro
  alternatives_spanish:
  - hacia la parte frontal del candelabro
  - opuestas al frente del candelabro
  lexicon: HALOT
  rationale: La combinación de אֶל + מוּל + פְּנֵי expresa orientación hacia el frente/opuesto al frente. «Hacia el frente» reproduce bien la dirección sin la dureza de una traducción demasiado literal.
- source_word: יָאִירוּ
  english_pob_choice: shall give light
  chosen_spanish: alumbrarán
  alternatives_spanish:
  - darán luz
  - brillarán
  lexicon: HALOT
  rationale: El hifil de אור es causativo. «Alumbrarán» expresa de forma natural la acción de dar luz, preservando la fuerza verbal sin sobreexplicar.
- source_word: שִׁבְעַת הַנֵּרוֹת
  english_pob_choice: the seven lamps
  chosen_spanish: las siete lámparas
  alternatives_spanish:
  - los siete candeleros
  lexicon: HALOT
  rationale: La frase numérica se traduce de manera directa. «Lámparas» conserva el objeto concreto del pasaje.
- source_word: הַמְּנוֹרָה
  english_pob_choice: the lampstand
  chosen_spanish: candelabro
  alternatives_spanish:
  - menorá
  - soporte de lámparas
  lexicon: HALOT
  rationale: En este contexto cultual, «candelabro» comunica el objeto de forma clara en español. Se evita «menorá» porque sería transliteración innecesaria en el texto principal; «candelabro» es el equivalente tradicional y comprensible.
theological_decisions:
- issue: Orientación de las lámparas frente al candelabro
  english_pob_reading: The lamps shall give light toward the front of the lampstand.
  chosen_spanish_reading: Las lámparas alumbrarán hacia el frente del candelabro.
  alternative_spanish_readings:
  - Las lámparas darán luz hacia el frente del candelabro.
  - Las lámparas alumbrarán en dirección al frente del candelabro.
  rationale: 'No se resuelve una cuestión doctrinal, pero sí una tensión descriptiva del hebreo: la frase señala dirección/posición de la luz. La traducción conserva esa orientación sin convertirla en una interpretación más fuerte de la necesaria.'
  doctrine_reference: Precisión cultual del tabernáculo; fidelidad descriptiva al texto ritual.
translation_notes:
  revision_awareness: La redacción sigue el último ajuste del POB en inglés, que precisó la orientación de las lámparas como «toward the front of the lampstand». La versión española conserva esa dirección con «hacia el frente del candelabro» y mantiene la alternativa lexical del verbo hebreo en una nota.
  spanish_consistency_notes:
  - Se usó «Yahvé» implícitamente al hablar del mandato divino en el registro del texto, conforme a la terminología base del proyecto.
  - Se prefirió «candelabro» para הַמְּנוֹרָה en lugar de «menorá», por claridad y consistencia con un español bíblico amplio.
  - Se mantuvo el plural femenino «las lámparas» para reflejar con naturalidad שִׁבְעַת הַנֵּרוֹת.
