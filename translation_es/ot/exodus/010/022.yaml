  glossary_alignment: 'No hay conflictos con la terminología doctrinal del proyecto. Las decisiones léxicas principales son correctas. La excepción relevante es puramente estilístico-lexical: «oscuridad densa» no suena tan natural ni tan bíblicamente idiomática como «tinieblas espesas».'
