  text: כִּ֣י כֹ֣ה אָמַר֮ יְהוָ֣ה צְבָאוֹת֒ אַחַ֣ר כָּב֔וֹד שְׁלָחַ֕/נִי אֶל הַ/גּוֹיִ֖ם הַ/שֹּׁלְלִ֣ים אֶתְ/כֶ֑ם כִּ֚י הַ/נֹּגֵ֣עַ בָּ/כֶ֔ם נֹגֵ֖עַ בְּ/בָבַ֥ת עֵינֽ/וֹ־׃
base_translation:
  language: en
  yaml_path: translation/ot/zechariah/002/012.yaml
  text: 'For thus says Yahweh of hosts: After glory he sent me to the nations that plunder you[b][a], for whoever touches you touches the pupil of his eye.'
  footnotes:
  - marker: a
    text: Or 'For glory he has sent me to the nations that plunder you.' The Hebrew phrase 'After glory' is difficult and may express purpose, sequence, or relation to honor/glory.
    reason: alternative_reading
  - marker: b
    text: Or 'the apple of his eye.' The Hebrew idiom denotes the most sensitive and carefully protected part of the eye.
    reason: lexical_alternative
