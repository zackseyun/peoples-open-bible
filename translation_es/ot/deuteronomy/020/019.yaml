base_translation:
  language: en
  yaml_path: translation/ot/deuteronomy/020/019.yaml
  text: When you besiege a city for many days[a], fighting against it to capture it, you shall not destroy its trees by swinging an axe against them, for you may eat from them, and you shall not cut them down. For is the tree of the field a man, that it should come before you in the siege?
  footnotes:
  - marker: a
    text: Or, 'for man is the tree of the field,' or 'for the tree of the field is man's food.' The Hebrew of the final clause is difficult; the main text takes it as a rhetorical question contrasting a tree with a human enemy.
