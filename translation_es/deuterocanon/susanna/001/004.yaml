translation:
  language: es
  text: Joaquim[c] era muy rico[a], y tenía un jardín[b] contiguo a su casa; y los judíos[d] acudían a él porque era más estimado que todos ellos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «muy adinerado»; el griego intensifica con fuerza la idea de riqueza.
    reason: lexical_alternative
  - marker: b
    text: O «parque» o «huerto»; παράδεισος aquí designa un recinto cultivado o de recreo junto a la casa.
    reason: lexical_alternative
  - marker: c
    text: La forma griega aquí es Ἰωακείμ; «Joaquim» conserva mejor esa forma que la adaptación más tradicional «Joaquín».
    reason: lexical_alternative
  - marker: d
    text: O «los judeanos», si se toma el término en sentido geográfico más que étnico-religioso.
    reason: alternative_reading
lexical_decisions:
- source_word: πλούσιος σφόδρα
  english_pob_choice: exceedingly rich
  chosen_spanish: muy rico
  alternatives_spanish:
  - sumamente rico
  - extremadamente rico
  - muy adinerado
  lexicon: BDAG
  rationale: πλούσιος indica riqueza material, y σφόδρα intensifica fuertemente. En español, «muy rico» comunica con naturalidad la abundancia sin sobrerretorcer el tono; las opciones más intensas son posibles, pero pueden sonar menos fluidas en lectura pública.
- source_word: παράδεισος
  english_pob_choice: garden
  chosen_spanish: jardín
  alternatives_spanish:
  - parque
  - huerto
  - paraíso
  lexicon: LSJ
  rationale: Aquí παράδεισος designa un recinto cultivado y de recreo junto a la casa de un hombre rico, no el sentido escatológico de «paraíso». «Jardín» es la opción más clara y natural en español; «huerto» estrecha demasiado el campo semántico, y «parque» suena moderno.
- source_word: γειτνιῶν τῷ οἴκῳ αὐτοῦ
  english_pob_choice: adjoining his house
  chosen_spanish: contiguo a su casa
  alternatives_spanish:
  - adyacente a su casa
  - junto a su casa
  - colindante con su casa
  lexicon: LSJ
  rationale: El participio expresa contigüidad física. «Contiguo a su casa» mantiene la relación precisa sin perder dignidad estilística; «junto a» es posible, pero menos exacto; «colindante» suena más técnico.
- source_word: πρὸς αὐτὸν προσήγοντο
  english_pob_choice: would come to him
  chosen_spanish: acudían a él
  alternatives_spanish:
  - iban a él
  - solían venir a él
  - se acercaban a él
  lexicon: BDAG
  rationale: La forma medio/pasiva se entiende idiomáticamente como una llegada habitual de personas hacia él. «Acudían a él» comunica bien la idea de ir en busca de alguien por su relevancia social y evita una literalidad torpe.
- source_word: οἱ Ἰουδαῖοι
  english_pob_choice: the Jews
  chosen_spanish: los judíos
  alternatives_spanish:
  - los judeanos
  lexicon: BDAG
  rationale: En este relato deuterocanónico, el referente natural es el pueblo judío en sentido común y comunitario. Se conserva «los judíos» por ser la forma directa y contextual; la alternativa geográfica no es necesaria aquí.
- source_word: ἐνδοξότερον πάντων
  english_pob_choice: more esteemed than all of them
  chosen_spanish: más estimado que todos ellos
  alternatives_spanish:
  - más honrado que todos
  - más distinguido que todos
  - más célebre que todos
  lexicon: BDAG
  rationale: El comparativo de ἔνδοξος expresa reputación, estima y consideración pública. «Más estimado» reproduce mejor ese valor social que una lectura de gloria moral o espiritual; además encaja con la explicación de por qué la gente acudía a él.
- source_word: Ἰωακείμ
  english_pob_choice: Joakim
  chosen_spanish: Yoaquín
  alternatives_spanish:
  - Joakim
  - Joaquín
  lexicon: N/A (transliteración basada en la forma griega Ἰωακείμ)
  rationale: Se conserva la transliteración cercana a la forma griega, siguiendo la decisión inglesa de evitar la forma tradicional anglicizada. En español, «Yoaquín» refleja mejor Ἰωακείμ que la adaptación habitual «Joaquín», aunque esta última existe en uso tradicional.
theological_decisions:
- issue: 'Valor de ἐνδοξότερον πάντων: honor social, no excelencia espiritual'
  english_pob_reading: Rendered as social honor/esteem rather than moral or spiritual superiority.
  chosen_spanish_reading: Se vierte como «más estimado que todos ellos», entendiendo la frase en clave de prestigio social y reputación.
  alternative_spanish_readings:
  - más glorioso que todos
  - más ilustre que todos
  - más honrado que todos
  rationale: El contexto explica que la gente acudía a él por su posición reconocida. Por eso conviene preservar el matiz de estima pública, sin convertirlo en una afirmación doctrinal sobre santidad, gloria espiritual o superioridad moral.
  doctrine_reference: Evitar importar una lectura teológica que el texto no afirma; mantener la tensión semántica del honor social.
translation_notes:
  revision_awareness: La base inglesa revisada cambió de «more honored» a «more esteemed» para ἐνδοξότερον; la versión española sigue esa revisión con «más estimado», preservando el sentido de reputación pública. También se mantuvo la decisión inglesa de no usar «paradise» para παράδεισος en este contexto. No se adoptó una transliteración tradicionalizada del nombre, sino una forma cercana al griego.
  spanish_consistency_notes:
  - Se mantiene «Yoaquín» para Ἰωακείμ en coherencia con la transliteración griega.
  - «Judíos» se usa de manera estándar y coherente con el relato, sin introducir una distinción geográfica no necesaria en el texto principal.
  - «Jardín» conserva el valor de recinto cultivado/ornamental sin cargarlo con el sentido teológico de «paraíso».
  - «Más estimado» conserva el matiz social de ἐνδοξότερον y evita una lectura espiritualizante.
