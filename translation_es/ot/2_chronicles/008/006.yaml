translation:
  language: es
  text: y Baalat, y todas las ciudades de depósito[a] que pertenecían a Salomón, y todas las ciudades de carros, y las ciudades de los jinetes[b], y todo lo que Salomón deseó[c] construir en Jerusalén, en el Líbano y en toda la tierra de su dominio.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'ciudades de almacenamiento', 'ciudades de provisiones' o posiblemente 'ciudades del tesoro'.
    reason: lexical_alternative
  - marker: b
    text: O 'ciudades para caballos'; el hebreo más comúnmente se refiere a jinetes o caballería.
    reason: lexical_alternative
  - marker: c
    text: Hebreo 'todo el deseo de Salomón que él deseó construir', una expresión cognada que enfatiza el deseo o agrado de Salomón.
    reason: lexical_alternative
lexical_decisions:
- source_word: בַּעֲלָת
  english_pob_choice: Baalath
  chosen_spanish: Baalat
  alternatives_spanish:
  - Baalath
  lexicon: HALOT
  rationale: Nombre propio de lugar; se translitera en español para conservar el referente geográfico sin forzar una traducción.
- source_word: עָרֵי הַמִּסְכְּנוֹת
  english_pob_choice: storage cities
  chosen_spanish: ciudades de almacenes
  alternatives_spanish:
  - ciudades de depósito
  - ciudades de provisiones
  - ciudades del tesoro
  lexicon: HALOT
  rationale: La expresión apunta a ciudades destinadas al resguardo de suministros o reservas. 'Ciudades de almacenes' comunica esa función de almacenamiento con naturalidad en español y evita volverla más específica de lo que el hebreo exige.
- source_word: אֲשֶׁר הָיוּ לִשְׁלֹמֹה
  english_pob_choice: that belonged to Solomon
  chosen_spanish: que pertenecían a Salomón
  alternatives_spanish:
  - que eran de Salomón
  - que Salomón tenía
  lexicon: HALOT
  rationale: Se conserva la idea posesiva del hebreo en un registro natural; 'pertenecían a' refleja la relación de posesión/adscripción administrativa sin añadir matices.
- source_word: עָרֵי הָרֶכֶב
  english_pob_choice: the chariot cities
  chosen_spanish: las ciudades de carros
  alternatives_spanish:
  - las ciudades de carros de guerra
  - las ciudades de los carros
  lexicon: HALOT
  rationale: '''רֶכֶב'' aquí se entiende como carros de guerra o infraestructura asociada. ''Ciudades de carros'' mantiene la brevedad del hebreo y el paralelismo con la siguiente frase.'
- source_word: עָרֵי הַפָּרָשִׁים
  english_pob_choice: the cities of the horsemen
  chosen_spanish: las ciudades de los jinetes
  alternatives_spanish:
  - las ciudades de la caballería
  - las ciudades para jinetes
  lexicon: HALOT
  rationale: '''פָּרָשִׁים'' designa jinetes/caballería; ''jinetes'' preserva el sentido básico y sigue de cerca la revisión inglesa que prefirió la forma posesiva directa.'
- source_word: כָּל חֵשֶׁק שְׁלֹמֹה אֲשֶׁר חָשַׁק
  english_pob_choice: all that Solomon desired
  chosen_spanish: todo lo que Salomón deseó
  alternatives_spanish:
  - todo el deseo de Salomón
  - todo aquello en que Salomón se complació
  - todo lo que Salomón tuvo intención de construir
  lexicon: HALOT
  rationale: El hebreo emplea una construcción cognada que enfatiza el deseo. En español, 'todo lo que Salomón deseó' reproduce el contenido sin perder naturalidad ni borrar la repetición intensiva implícita.
- source_word: לִבְנוֹת
  english_pob_choice: to build
  chosen_spanish: construir
  alternatives_spanish:
  - edificar
  - edificar o construir
  lexicon: HALOT
  rationale: '''Construir'' es idiomático en español contemporáneo y conserva el valor básico del infinitivo sin introducir una carga eclesiástica innecesaria.'
- source_word: בִּירוּשָׁלִַם
  english_pob_choice: in Jerusalem
  chosen_spanish: en Jerusalén
  alternatives_spanish:
  - en Yerusalén
  lexicon: HALOT
  rationale: Nombre propio geográfico estándar en español bíblico.
- source_word: וּבַלְּבָנוֹן
  english_pob_choice: and in Lebanon
  chosen_spanish: en el Líbano
  alternatives_spanish:
  - y en Líbano
  lexicon: HALOT
  rationale: Se usa el nombre geográfico usual en español, con artículo por norma idiomática.
- source_word: בְכֹל אֶרֶץ מֶמְשַׁלְתּוֹ
  english_pob_choice: throughout all the land of his dominion
  chosen_spanish: en toda la tierra de su dominio
  alternatives_spanish:
  - en toda la tierra bajo su dominio
  - en todo el territorio de su dominio
  - en toda su tierra dominada
  lexicon: HALOT
  rationale: '''מֶמְשָׁלָה'' combina la idea de territorio y gobierno; ''tierra de su dominio'' preserva ambos elementos de manera formal y fiel al hebreo.'
theological_decisions:
- issue: Lugares asociados al reino de Salomón y lenguaje administrativo
  english_pob_reading: the storage cities, chariot cities, and cities of the horsemen are treated as part of Solomon's possessions and royal infrastructure
  chosen_spanish_reading: las ciudades de almacenes, de carros y de jinetes se presentan como parte de la organización real de Salomón
  alternative_spanish_readings:
  - como fortificaciones militares solamente
  - como ciudades dedicadas exclusivamente al comercio
  rationale: El versículo enumera infraestructura real y administrativa, no solo fines militares ni comerciales. La formulación española mantiene ese equilibrio y no reduce el alcance del hebreo.
  doctrine_reference: 2 Crónicas 8:6; cf. 1 Reyes 9:19
translation_notes:
  revision_awareness: El inglés POB revisado cambió 'the cities for horsemen' a 'the cities of the horsemen' para acercarse más al hebreo. La versión española sigue esa misma dirección con 'las ciudades de los jinetes', manteniendo la correspondencia estrecha y el paralelismo con 'las ciudades de carros'.
  spanish_consistency_notes:
  - Se conserva 'Yahvé' como norma general cuando aparezca el tetragrámaton; aquí no hay ocurrencia.
  - '''Mesías/Cristo'' no aplica a este versículo.'
  - Se mantiene el registro sobrio y administrativo del listado, sin ampliar el sentido de los términos militares o de abastecimiento.
  - 'Los nombres propios se transliteran de manera estándar en español bíblico: Salomón, Jerusalén, Líbano, Baalat.'
