translation:
  language: es
  text: Ahora, al tercer día, he aquí, un hombre vino del campamento, de junto a Saúl[a], con sus vestidos rasgados y tierra sobre su cabeza[b]. Y cuando llegó a David, cayó en tierra y se postró[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «desde estar con Saúl» / «desde el lado de Saúl». La expresión hebrea indica asociación con Saúl, no necesariamente envío directo por parte de él.'
    reason: lexical_alternative
  - marker: b
    text: Literalmente, «tierra sobre su cabeza»; es una señal convencional de duelo o luto.
    reason: cultural_note
  - marker: c
    text: 'O: «se inclinó profundamente». El verbo puede expresar respeto profundo, sumisión u homenaje según el contexto.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְהִי
  english_pob_choice: Now
  chosen_spanish: Ahora
  alternatives_spanish:
  - Y sucedió
  - Y aconteció
  lexicon: HALOT
  rationale: Como introductor narrativo de secuencia, «Ahora» funciona de manera natural en español moderno y conserva el cambio de escena sin volver la frase arcaica.
- source_word: בַּיּוֹם הַשְּׁלִישִׁי
  english_pob_choice: on the third day
  chosen_spanish: al tercer día
  alternatives_spanish:
  - en el tercer día
  - después de tres días
  lexicon: HALOT
  rationale: La expresión temporal es directa; «al tercer día» es una equivalencia idiomática clara y fiel al hebreo.
- source_word: וְהִנֵּה
  english_pob_choice: behold
  chosen_spanish: he aquí
  alternatives_spanish:
  - miren
  - mira
  lexicon: HALOT
  rationale: «He aquí» conserva la fuerza de presentación vívida del hebreo sin añadir la idea de sorpresa más de lo necesario.
- source_word: אִישׁ
  english_pob_choice: a man
  chosen_spanish: un hombre
  alternatives_spanish:
  - alguien
  lexicon: HALOT
  rationale: El sustantivo es masculino singular y se refiere a un individuo concreto; «un hombre» es preciso y mantiene la referencia personal.
- source_word: בָּא
  english_pob_choice: came
  chosen_spanish: vino
  alternatives_spanish:
  - llegó
  - estaba viniendo
  lexicon: HALOT
  rationale: En esta secuencia narrativa, «vino» reproduce bien la acción puntual del participio/predicación narrativa en español bíblico claro.
- source_word: מִן הַמַּחֲנֶה
  english_pob_choice: from the camp
  chosen_spanish: del campamento
  alternatives_spanish:
  - del ejército
  - del campamento militar
  lexicon: HALOT
  rationale: «Campamento» comunica el sentido básico de מַחֲנֶה sin sobreespecificar; el contexto militar ya está implícito.
- source_word: מֵעִם שָׁאוּל
  english_pob_choice: from Saul / from being with Saul / from Saul's side
  chosen_spanish: de parte de Saúl
  alternatives_spanish:
  - de con Saúl
  - desde la compañía de Saúl
  - de estar con Saúl
  lexicon: HALOT
  rationale: La preposición indica asociación o procedencia en relación con Saúl, no necesariamente envío directo. «De parte de Saúl» conserva esa relación sin resolverla demasiado; si se leyera como simple procedencia física, se perdería parte de la tensión del hebreo.
- source_word: וּבְגָדָיו קְרֻעִים
  english_pob_choice: with his clothes torn
  chosen_spanish: con sus vestidos rasgados
  alternatives_spanish:
  - con su ropa rasgada
  - y sus vestidos rasgados
  lexicon: HALOT
  rationale: «Vestidos» mantiene un registro más cercano al lenguaje bíblico sin ser excesivamente arcaico; «rasgados» expresa el estado visible de duelo.
- source_word: וַאֲדָמָה עַל רֹאשׁוֹ
  english_pob_choice: dirt on his head
  chosen_spanish: tierra sobre su cabeza[b]
  alternatives_spanish:
  - polvo sobre su cabeza
  - tierra en su cabeza
  lexicon: HALOT
  rationale: La frase es literalmente «tierra sobre su cabeza». En español, «tierra sobre su cabeza» preserva mejor la imagen ritual de luto que «dirt», y «sobre» refleja con más fidelidad el hebreo que «en».
- source_word: בְּבֹאוֹ אֶל־דָּוִד
  english_pob_choice: when he came to David
  chosen_spanish: cuando llegó a David
  alternatives_spanish:
  - al llegar a David
  - cuando vino a David
  lexicon: HALOT
  rationale: La construcción temporal se vierte de forma idiomática en español con «cuando llegó a David», que conserva el valor circunstancial sin sonar forzado.
- source_word: וַיִּפֹּל אַרְצָה
  english_pob_choice: he fell to the ground
  chosen_spanish: se postró en tierra[c]
  alternatives_spanish:
  - cayó en tierra
  - se arrojó al suelo
  lexicon: HALOT
  rationale: El movimiento no es solo una caída física; en el contexto, la postura expresa reverencia o sumisión. «Se postró en tierra» mantiene esa ambigüedad ritual que el hebreo permite.
- source_word: וַיִּשְׁתָּחוּ
  english_pob_choice: bowed down
  chosen_spanish: y se inclinó
  alternatives_spanish:
  - y se postró
  - y rindió homenaje
  lexicon: HALOT
  rationale: El verbo puede implicar inclinación profunda, postración u homenaje. Aquí, para no duplicar mecánicamente «se postró» del miembro anterior, «se inclinó» conserva el gesto de respeto sin cerrar prematuramente el sentido.
theological_decisions:
- issue: 'Valor del gesto final ante David: respeto, sumisión u homenaje'
  english_pob_reading: Or 'prostrated himself.' The verb can denote an act of deep respect, submission, or homage depending on context.
  chosen_spanish_reading: se postró en tierra y se inclinó
  alternative_spanish_readings:
  - se arrodilló
  - rindió homenaje
  - se postró y adoró
  rationale: El hebreo usa dos verbos de abatimiento corporal; el contexto favorece respeto o sumisión, no necesariamente adoración. Mantener ambos gestos en español conserva la intensidad sin introducir un sentido religioso no asegurado por el texto.
  doctrine_reference: Uso bíblico de postración como reverencia/sumisión; cf. interpretaciones contextuales del verbo הִשְׁתַּחֲוָה
- issue: Relación de מֵעִם שָׁאוּל con Saúl
  english_pob_reading: Or 'from being with Saul' / 'from Saul's side.' The Hebrew expression indicates association with Saul, not necessarily direct dispatch by Saul.
  chosen_spanish_reading: de parte de Saúl
  alternative_spanish_readings:
  - desde Saúl
  - de estar con Saúl
  - de la parte de Saúl
  rationale: La lectura escogida deja abierta la relación con Saúl como asociación/procedencia, sin afirmar que él lo envió. En español, «de parte de» comunica bien esa dependencia o vinculación relacional.
  doctrine_reference: No doctrinal; decisión semántica y pragmática del hebreo
- issue: Imagen de duelo en la cabeza
  english_pob_reading: Literally 'earth on his head,' a conventional sign of grief or mourning.
  chosen_spanish_reading: tierra sobre su cabeza
  alternative_spanish_readings:
  - polvo sobre su cabeza
  - tierra en su cabeza
  rationale: La imagen corporal debe mantenerse para reflejar el signo cultural de luto. «Tierra sobre su cabeza» resulta más literal y más claro que «polvo», aunque ambos apuntan al mismo gesto.
  doctrine_reference: Costumbre antigua de duelo expresada mediante polvo/tierra sobre la cabeza
translation_notes:
  revision_awareness: El inglés POB mantiene una traducción de equilibrio óptimo con notas que conservan la ambigüedad de מֵעִם שָׁאוּל, la imagen cultural de tierra sobre la cabeza y la posibilidad de que וַיִּשְׁתָּחוּ signifique prostración/homenaje. La presente versión española sigue esa misma línea, ajustando la fraseología para un español natural y manteniendo la tensión semántica sin resolverla de modo indebido.
  spanish_consistency_notes:
  - Se emplea «Yahvé» no aplica aquí; no hay tetragrámaton en el versículo.
  - Se conserva «Saúl» y «David» como nombres propios sin adaptación.
  - Se opta por «tierra» y no «polvo» para mantener la literalidad de אֲדָמָה y la imagen ritual.
  - Se evita «adoró», porque el contexto no requiere lectura cultual; la postración puede ser simple homenaje o sumisión.
  - Se mantiene registro bíblico sobrio con español moderno, evitando arcaísmos innecesarios.
