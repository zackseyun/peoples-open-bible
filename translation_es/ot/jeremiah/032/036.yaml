translation:
  language: es
  text: 'Ahora, por tanto, así dice Yahvé, el Dios de Israel, acerca de esta ciudad, de la cual ustedes dicen: «Ha sido entregada[a] en manos del rey de Babilonia, por la espada, por hambruna y por peste[b]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Es entregada» o «Ha sido dada en manos del rey de Babilonia». El hebreo puede entenderse como pasivo simple o como formulación más dinámica/progresiva.'
    reason: lexical_alternative
  - marker: b
    text: «Peste» también puede traducirse «plaga».
    reason: lexical_alternative
lexical_decisions:
- source_word: וְעַתָּה
  english_pob_choice: Now
  chosen_spanish: Ahora
  alternatives_spanish:
  - Y ahora
  lexicon: HALOT
  rationale: Marcador discursivo/temporal que introduce el siguiente tramo del oráculo. «Ahora» transmite con naturalidad el cambio de escena sin añadir énfasis innecesario.
- source_word: לָכֵן
  english_pob_choice: therefore
  chosen_spanish: por tanto
  alternatives_spanish:
  - por eso
  - así que
  lexicon: HALOT
  rationale: Expresa con claridad la inferencia o transición lógica del discurso profético. «Por tanto» preserva el valor argumentativo.
- source_word: כֹּה אָמַר
  english_pob_choice: thus says
  chosen_spanish: así dice
  alternatives_spanish:
  - esto dice
  - así ha dicho
  lexicon: HALOT
  rationale: Fórmula profética convencional. «Así dice» conserva el registro formal sin sonar anticuado en español moderno.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahveh
  lexicon: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
  rationale: Se sigue el principio del proyecto de transcribir el Nombre divino en lugar de ocultarlo tras un título. «Yahvé» es la forma establecida en español del transliterado del Tetragrámaton.
- source_word: אֱלֹהֵי יִשְׂרָאֵל
  english_pob_choice: the God of Israel
  chosen_spanish: el Dios de Israel
  alternatives_spanish:
  - el Dios de Israel
  lexicon: HALOT
  rationale: Construcción posesiva/covenantal directa; «el Dios de Israel» reproduce sin dificultad el vínculo identificador.
- source_word: אֶל הָעִיר הַזֹּאת
  english_pob_choice: concerning this city
  chosen_spanish: acerca de esta ciudad
  alternatives_spanish:
  - sobre esta ciudad
  - a esta ciudad
  lexicon: HALOT
  rationale: Con verbos de habla, אֶל introduce el tema del oráculo. «Acerca de» expresa bien el objeto del decir en español, evitando un «a» literal que suena menos natural.
- source_word: אֲשֶׁר אַתֶּם אֹמְרִים
  english_pob_choice: of which you say
  chosen_spanish: de la cual ustedes dicen
  alternatives_spanish:
  - sobre la cual ustedes dicen
  - la cual ustedes dicen
  lexicon: HALOT
  rationale: Se mantiene la relativa vinculada a «esta ciudad» y el sujeto plural explícito. «De la cual» es un equivalente idiomático aceptable y transparente.
- source_word: נִתְּנָה
  english_pob_choice: It has been given
  chosen_spanish: Ha sido entregada
  alternatives_spanish:
  - Fue entregada
  - Es entregada
  lexicon: HALOT
  rationale: La revisión inglesa favoreció el perfecto pasivo, y en español «ha sido entregada» recoge mejor el valor resultativo de la forma hebrea. «Entregada» conserva además el matiz de ser puesta en manos de otro.
- source_word: בְּיַד
  english_pob_choice: into the hand of
  chosen_spanish: en manos de
  alternatives_spanish:
  - en la mano de
  - bajo el poder de
  lexicon: HALOT
  rationale: La locución hebrea de control o dominio se reproduce con el equivalente español establecido «en manos de», más natural que una traducción demasiado anatómica.
- source_word: מֶלֶךְ בָּבֶל
  english_pob_choice: the king of Babylon
  chosen_spanish: el rey de Babilonia
  alternatives_spanish:
  - el rey de Babel
  lexicon: HALOT
  rationale: Título político directo. Se conserva «Babilonia» como forma castellana estándar del nombre propio.
- source_word: בַּחֶרֶב
  english_pob_choice: by the sword
  chosen_spanish: por espada
  alternatives_spanish:
  - a espada
  - mediante la espada
  lexicon: HALOT
  rationale: Mantiene el paralelismo de la tríada de juicio. En español, la elipsis del artículo puede sonar más sobria y fiel al hebreo enumerativo.
- source_word: וּבָרָעָב
  english_pob_choice: by famine
  chosen_spanish: por hambre
  alternatives_spanish:
  - por el hambre
  - por escasez
  lexicon: HALOT
  rationale: Aunque el inglés usa «famine», en español «hambre» comunica de manera directa el juicio por carencia extrema. Se preserva la fuerza del término sin perder inteligibilidad.
- source_word: וּבַדָּבֶר
  english_pob_choice: and by pestilence
  chosen_spanish: y por peste
  alternatives_spanish:
  - y por pestilencia
  - y por plaga
  lexicon: HALOT
  rationale: «דָּבֶר» suele referirse a una enfermedad epidémica o plaga devastadora. «Peste» es una forma breve y seria en español, suficientemente amplia para el campo semántico.
theological_decisions:
- issue: Tratamiento del Nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Jehová
  rationale: Se preserva el Nombre propio de Dios según la práctica doctrinal del proyecto, evitando la sustitución por un título. «Yahvé» es la transliteración usual en español bíblico y mantiene la referencia personal y pactual.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Valor de נִתְּנָה en contexto de juicio
  english_pob_reading: It has been given
  chosen_spanish_reading: Ha sido entregada
  alternative_spanish_readings:
  - Es entregada
  - Fue entregada
  rationale: La forma hebrea perfecta, en este contexto, presenta la ciudad como ya cedida/entregada desde la perspectiva del hablante. El perfecto pasivo español conserva mejor ese valor que un presente progresivo.
  doctrine_reference: 'English applied revision: changed ‘is being given’ to ‘has been given’ to better reflect the Hebrew perfect form'
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión más reciente del inglés POB, que corrigió la antigua lectura progresiva («is being given») a un perfecto pasivo («has been given») para reflejar mejor נִתְּנָה. La versión española adopta ese ajuste con «Ha sido entregada». También se preservó la tríada judicial tradicional del verso con un léxico natural en español.
  spanish_consistency_notes:
  - Se usa «Yahvé» de forma consistente para יְהוָה, conforme al estándar del proyecto.
  - «En manos de» reproduce el idiomático בְּיַד sin introducir una reinterpretación doctrinal.
  - 'La tríada de juicio se mantiene paralela: «por espada, por hambre y por peste».'
  - «Peste» se eligió como equivalente breve y grave para דָּבֶר; la nota admite «plaga» como alternativa válida.
