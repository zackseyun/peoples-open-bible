  glossary_alignment: 'No hay términos teológicos del glosario principal implicados. Sí hay un punto de política de nombres propios: conviene conservar ''Zattu'' en lugar de una castellanización no documentada. ''Los hijos de'' para בְּנֵי está bien en este contexto censal/genealógico.'
