revisions:
- from: Por la sangre que has derramado[a], te has hecho culpable, y por tus ídolos[b] que has hecho, te has contaminado. Has acercado tus días y has llegado a tus años[c]. Por eso te he hecho oprobio para las naciones y burla para todas las tierras.
  to: Por la sangre que has derramado, te has hecho culpable, y por tus ídolos[a] que has hecho, te has vuelto impura. Has acercado tus días y has llegado a tus años[b]. Por eso te he hecho oprobio para las naciones y burla para todas las tierras.
  rationale: 'La revisión corrige el problema principal de fidelidad editorial: los marcadores de notas ahora están anclados a las expresiones que realmente explican. También elimina una nota redundante y ajusta «te has contaminado» a «te has vuelto impura» para reflejar mejor el estado resultante de טָמֵאת y el paralelismo del hebreo, sin volver el español rígido ni más interpretativo de lo necesario.'
