translation:
  language: es
  text: Den gracias a Yahvé por su amor constante[a], y por sus obras maravillosas para los hijos del hombre.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, «a la humanidad». El hebreo dice literalmente «para los hijos del hombre», una expresión común para los seres humanos.
    reason: lexical_alternative
lexical_decisions:
- source_word: יוֹדוּ
  english_pob_choice: Let them give thanks
  chosen_spanish: Dén gracias
  alternatives_spanish:
  - Que den gracias
  - Alaben
  - Den gracias
  lexicon: HALOT
  rationale: El verbo hifil de ידה en este contexto litúrgico expresa dar gracias; en español, «Dén gracias» conserva el tono exhortativo del refrán poético sin volverlo demasiado explicativo.
- source_word: לַיהוָה
  english_pob_choice: to Yahweh
  chosen_spanish: a Yahvé
  alternatives_spanish:
  - a Yahweh
  - al SEÑOR
  lexicon: DOCTRINE.md contested term יְהוָה / YHWH
  rationale: Se mantiene el nombre divino como «Yahvé», según el criterio del proyecto para el Tetragrámaton, en lugar de ocultarlo con una sustitución genérica.
- source_word: חַסְדּוֹ
  english_pob_choice: his steadfast love
  chosen_spanish: su amor constante
  alternatives_spanish:
  - su amor leal
  - su misericordia
  - su amor firme
  lexicon: HALOT
  rationale: חֶסֶד comunica amor leal, duradero y comprometido. «Amor constante» preserva esa idea en español natural y evita reducirlo a «misericordia», que estrecha demasiado el campo semántico.
- source_word: וְנִפְלְאוֹתָיו
  english_pob_choice: and for his wondrous deeds
  chosen_spanish: y por sus obras maravillosas
  alternatives_spanish:
  - y por sus maravillas
  - y por sus hechos maravillosos
  - y por sus actos portentosos
  lexicon: HALOT
  rationale: נִפְלְאוֹת se refiere a actos/deeds sorprendentes y maravillosos. «Obras maravillosas» conserva el carácter activo y hecho-obrado mejor que un sustantivo más abstracto como «maravillas».
- source_word: לִבְנֵי אָדָם
  english_pob_choice: to the children of man
  chosen_spanish: para los hijos del hombre
  alternatives_spanish:
  - para la humanidad
  - para los seres humanos
  - para los hijos de Adán
  lexicon: HALOT
  rationale: La expresión hebrea es un giro colectivo para los seres humanos. «Hijos del hombre» mantiene la imagen semítica y el paralelismo con el texto hebreo; se evita neutralizarla en el texto principal, de acuerdo con la decisión auditada en inglés.
theological_decisions:
- issue: Tratamiento del nombre divino יהוה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - el SEÑOR
  rationale: El hebreo usa el Tetragrámaton directamente. Se conserva el nombre propio divino en español como «Yahvé», conforme a la política del proyecto y a la transparencia respecto de la fuente original.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Valor colectivo de בני אדם
  english_pob_reading: children of man
  chosen_spanish_reading: los hijos del hombre
  alternative_spanish_readings:
  - la humanidad
  - los seres humanos
  - los hijos de Adán
  rationale: Aunque la expresión se refiere de manera genérica a la humanidad, se conserva la forma masculina representativa del hebreo. «Los hijos del hombre» refleja la construcción original sin borrar la imagen poética.
  doctrine_reference: 'DOCTRINE.md Translation philosophy §4; Contested terms: אָדָם'
translation_notes:
  revision_awareness: 'Coincide con la revisión más reciente: no se requieren cambios respecto del consenso de alta concordancia; se conserva la misma estructura del refrán y la decisión de mantener el nombre divino y la imagen hebrea de בני אדם.'
  spanish_consistency_notes:
  - Se usa «Yahvé» de manera consistente para יהוה, en lugar de una máscara litúrgica.
  - «Amor constante» funciona como equivalente español de חֶסֶד sin perder la dimensión de lealtad pactal.
  - La nota al pie mantiene la alternativa semántica sin introducir una paráfrasis expansiva.
  - «Hijos del hombre» preserva el paralelismo poético y la referencia colectiva humana del hebreo.
