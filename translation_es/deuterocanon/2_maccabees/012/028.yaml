  yaml_path: translation/deuterocanon/2_maccabees/012/028.yaml
  text: But after calling on the Sovereign[a], who with judgments shatters the forces of the enemies, they took the city under their control[c][b], and struck down twenty-five thousand of those inside.
  footnotes:
