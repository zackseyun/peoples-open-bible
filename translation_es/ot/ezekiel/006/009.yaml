translation:
  language: es
  text: Entonces tus sobrevivientes me recordarán entre las naciones donde fueron llevados cautivos, cuando yo haya quebrantado[a] su corazón que se prostituye[b], que se apartó de mí, y sus ojos que se prostituyen[b] tras sus ídolos[c]; y se aborrecerán a sí mismos por las maldades que cometieron en todas sus abominaciones.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «cuando fui quebrantado por su corazón que se prostituye, que se apartó de mí». El verbo hebreo también puede entenderse así para algunos intérpretes, destacando el dolor de Yahvé por su infidelidad.'
    reason: alternative_reading
  - marker: b
    text: El hebreo usa imaginería de prostitución («corazón que se prostituye», «ojos que se prostituyen») como metáfora de la infidelidad del pacto y de la idolatría.
    reason: cultural_note
  - marker: c
    text: «Ídolos» traduce un término hebreo despectivo frecuente en Ezequiel; puede llevar un matiz peyorativo, como «ídolos inmundos» o «ídolos despreciables».
    reason: lexical_alternative
lexical_decisions:
- source_word: וְזָכְרוּ
  english_pob_choice: Then ... will remember
  chosen_spanish: Entonces ... recordarán
  alternatives_spanish:
  - Y ... recordarán
  lexicon: HALOT
  rationale: El waw consecutivo/argumentativo en contexto profético expresa avance o resultado; «Entonces» comunica bien esa secuencia en español sin perder el sentido básico de recordar.
- source_word: פְלִיטֵיכֶם
  english_pob_choice: your survivors
  chosen_spanish: tus sobrevivientes
  alternatives_spanish:
  - tus fugitivos
  - los que hayan escapado
  lexicon: HALOT
  rationale: El término apunta a quienes han escapado de la destrucción. «Sobrevivientes» es natural en español moderno y mantiene el matiz de remanente salvado del juicio.
- source_word: בַּגּוֹיִם
  english_pob_choice: among the nations
  chosen_spanish: entre las naciones
  alternatives_spanish:
  - en las naciones
  - entre los pueblos
  lexicon: HALOT
  rationale: «Entre las naciones» reproduce con claridad el marco de exilio entre pueblos extranjeros, sin imponer una carga interpretativa posterior a «gentiles».
- source_word: אֲשֶׁר נִשְׁבּוּ שָׁם
  english_pob_choice: where they were taken captive
  chosen_spanish: donde fueron llevados cautivos
  alternatives_spanish:
  - donde fueron hechos cautivos
  - donde fueron deportados
  lexicon: HALOT
  rationale: La forma pasiva indica haber sido tomado cautivo; «llevados cautivos» es idiomático y fiel al contexto de exilio.
- source_word: אֲשֶׁר נִשְׁבַּרְתִּי
  english_pob_choice: when I have broken
  chosen_spanish: cuando yo haya quebrantado
  alternatives_spanish:
  - cuando yo los haya quebrado
  - cuando yo haya roto
  lexicon: HALOT
  rationale: Se conserva la lectura activa atribuida a Dios en el texto hebreo auditado. «Quebrantar» comunica mejor en español la ruptura interior/metafórica que «romper», y mantiene la fuerza del juicio.
- source_word: לִבָּם הַזֹּנֶה
  english_pob_choice: their whoring heart
  chosen_spanish: su corazón infiel
  alternatives_spanish:
  - su corazón adúltero
  - su corazón prostituto
  - su corazón de fornicación
  lexicon: HALOT
  rationale: 'Aunque el hebreo literal usa imaginería sexual, en español «corazón infiel» preserva el sentido de pacto quebrantado con menos aspereza que un calco extraño. Se evita una suavización total: el contexto y la nota conservan la metáfora de infidelidad.'
- source_word: אֲשֶׁר סָר מֵעָלַי
  english_pob_choice: that turned away from me
  chosen_spanish: que se apartó de mí
  alternatives_spanish:
  - que se desvió de mí
  - que se volvió de mí
  lexicon: HALOT
  rationale: «Apartarse» expresa bien el movimiento relacional de alejamiento/apostasía y suena natural en español bíblico actual.
- source_word: עֵינֵיהֶם הַזֹּנוֹת אַחֲרֵי גִּלּוּלֵיהֶם
  english_pob_choice: their eyes that whored after their idols
  chosen_spanish: sus ojos infieles que siguieron a sus ídolos
  alternatives_spanish:
  - sus ojos que se prostituyeron tras sus ídolos
  - sus ojos adúlteros que fueron tras sus ídolos
  lexicon: HALOT
  rationale: La metáfora continúa con «ojos» como órgano del deseo. «Infieles» conserva la idea de deslealtad sexual/covenantal sin una formulación demasiado brusca para el flujo principal; «siguieron a sus ídolos» mantiene el sentido direccional de ir tras ellos. El término despectivo para ídolos se conserva como «ídolos» en el texto principal, con nota sobre el matiz peyorativo.
- source_word: גִּלּוּלֵיהֶם
  english_pob_choice: their idols
  chosen_spanish: sus ídolos
  alternatives_spanish:
  - sus ídolos inmundos
  - sus ídolos despreciables
  - sus ídolos de estiércol
  lexicon: HALOT
  rationale: El hebreo usa un término despectivo recurrente en Ezequiel. El texto principal mantiene el equivalente claro «ídolos» y deja el matiz pejorativo documentado en nota para no forzar un calco demasiado pesado.
- source_word: וְנָקֹטּוּ בִּפְנֵיהֶם
  english_pob_choice: they will loathe themselves
  chosen_spanish: se aborrecerán a sí mismos
  alternatives_spanish:
  - se sentirán asqueados de sí mismos
  - se avergonzarán de sí mismos
  - se detestarán a sí mismos
  lexicon: HALOT
  rationale: El idiomático hebreo expresa revulsión/rechazo de sí. «Se aborrecerán a sí mismos» comunica el valor reflexivo sin perder la intensidad moral y emocional.
- source_word: אֶל הָרָעוֹת
  english_pob_choice: for the evils
  chosen_spanish: por las maldades
  alternatives_spanish:
  - a causa de las maldades
  - por los males
  lexicon: HALOT
  rationale: «Por las maldades» funciona bien como causa/objeto de aborrecimiento en español. «Maldades» conserva el peso ético del término sin sonar técnico.
- source_word: לְכֹל תּוֹעֲבֹתֵיהֶם
  english_pob_choice: in all their abominations
  chosen_spanish: en todas sus abominaciones
  alternatives_spanish:
  - por todas sus abominables prácticas
  - en todas sus cosas detestables
  lexicon: HALOT
  rationale: «Abominaciones» preserva el valor teológico y retórico del término de pacto, especialmente en contexto de idolatría.
theological_decisions:
- issue: Lectura de «yo haya quebrantado» en vez de una lectura pasiva/reflexiva de dolor divino
  english_pob_reading: God is the subject who breaks their adulterous heart in judgment, leading to remembrance and self-loathing.
  chosen_spanish_reading: Dios es el sujeto que quebranta su corazón infiel en juicio, lo que conduce al recuerdo y al aborrecimiento propio.
  alternative_spanish_readings:
  - Dios dice que fue quebrantado por su corazón infiel
  - se podría entender como una expresión pasiva o reflexiva del dolor divino
  rationale: La vocalización masorética y la estructura con objeto directo favorecen la lectura activa. Se mantiene, no obstante, la tensión interpretativa mediante la nota, porque la lectura alternativa del dolor/grief divino es antigua y teológicamente significativa.
  doctrine_reference: Preservar la tensión interpretativa sin resolverla de forma reductiva.
- issue: Intensidad de la imaginería sexual para infidelidad del pacto
  english_pob_reading: The Hebrew uses prostitution imagery ('whoring heart,' 'eyes that whored') as a metaphor for covenant unfaithfulness and idolatry.
  chosen_spanish_reading: La traducción principal atenúa parcialmente la imaginería, pero conserva su sentido de infidelidad de pacto y de idolatría.
  alternative_spanish_readings:
  - mantener una traducción más literal como «corazón prostituto» y «ojos que se prostituyeron»
  - reemplazarlo por «corazón y ojos infieles»
  rationale: En español, un calco demasiado duro puede oscurecer la lectura pública sin añadir precisión sustancial. Se opta por «infiel» en el texto principal, pero se documenta que el hebreo utiliza imaginería sexual metafórica, para no borrar la tensión léxica.
  doctrine_reference: Conservar la metáfora bíblica sin sacrificar legibilidad eclesial.
translation_notes:
  revision_awareness: 'Coincido con la revisión más reciente en que no se requieren cambios sustanciales: la lectura activa de «yo haya quebrantado» sigue siendo la opción principal, y la nota conserva la alternativa interpretativa. La propuesta española intenta equilibrar fidelidad al hebreo, legibilidad pública y preservación del tono profético de Ezequiel.'
  spanish_consistency_notes:
  - Se usa «Yahvé» solo en la nota explicativa donde el hebreo subyacente refiere al nombre divino implícito; en el texto principal se mantiene la referencia pronominal «me/mí» por economía y porque el versículo no contiene el nombre explícito.
  - 'Se mantiene la terminología preferida de POB: «abominaciones», «ídolos», «cautivos», «sobrevivientes».'
  - Se evita «SEÑOR» como máscara del nombre divino, en consonancia con la política del proyecto.
  - La metáfora sexual se conserva atenuada en el cuerpo principal («infiel») y se documenta explícitamente en la nota para no borrar la tensión léxica del hebreo.
