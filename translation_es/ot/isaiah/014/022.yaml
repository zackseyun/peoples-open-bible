review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura y el sentido del hebreo: juicio activo de Yahvé contra Babilonia, fórmula profética repetida, y lista totalizante de erradicación. Sin embargo, וְהִכְרַתִּי está mejor servido por una forma española que preserve más claramente el valor de ''cortar/exterminar'' que ''arrancar'', y la referencia pronominal ''ellos'' puede mantenerse pero conviene reconocer que el foco siguiente es Babilonia.'
  spanish_quality_summary: 'El español es claro y digno. ''Yahvé de los ejércitos'' y ''declara Yahvé'' son naturales y alineados con el proyecto. La principal mejora es léxica: ''arrancaré de Babilonia'' suena menos preciso para כרת que ''exterminaré de Babilonia'' o ''cortaré de Babilonia''. Además, la nota b puede pulirse para sonar más idiomática en español e interpretar mejor la expresión como borrado de memoria y linaje superviviente.'
  glossary_alignment: 'Buena alineación general con los términos del proyecto: יְהוָה -> ''Yahvé''; צְבָאוֹת -> ''de los ejércitos''; שְׁאָר -> ''remanente''. La excepción problemática es וְהִכְרַתִּי, donde ''arrancaré'' se aparta innecesariamente de la racionalidad documentada de ''cut off''.'
  issues:
  - severity: medium
    issue: 'Verbo principal de juicio: ''arrancaré'''
    rationale: כרת en hiphil en contexto de juicio apunta a 'cortar/exterminar'. 'Arrancaré' introduce una imagen distinta, más vegetal o física, y preserva menos claramente el idiomario judicial que el inglés auditado quiso mantener.
  - severity: low
    issue: Redacción de la nota b
    rationale: '''Expresión integral'' y ''línea sobreviviente'' son comprensibles, pero ''expresión abarcadora'' y ''linaje superviviente'' suenan más naturales y precisos en español bíblico moderno.'
  revised_spanish_text: Y me levantaré contra ellos[a], declara Yahvé de los ejércitos, y exterminaré de Babilonia nombre y remanente, descendencia y posteridad[b], declara Yahvé.
  revised_footnotes:
  - marker: a
    text: 'O: «me alzaré contra ellos».'
    reason: lexical_alternative
  - marker: b
    text: «Nombre y remanente, descendencia y posteridad» es una expresión abarcadora para borrar por completo la memoria de Babilonia y su linaje superviviente.
    reason: cultural_note
  revision_rationale: Se revisa 'arrancaré' a 'exterminaré' para reflejar mejor el valor de הִכְרַתִּי en contexto de juicio y acercarse a la racionalidad léxica auditada sin perder naturalidad en español. También se pule la nota cultural para un español más idiomático y una explicación más precisa del merismo genealógico y memorial.
