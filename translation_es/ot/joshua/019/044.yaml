- source_word: בַעֲלָת
  english_pob_choice: Baalath
  chosen_spanish: Baalat
  alternatives_spanish:
  - Baalath
  lexicon: topónimo
  rationale: Es un nombre de lugar; la traducción no debe convertirlo en un sustantivo común. En español, 'Baalat' conserva mejor la forma semítica y evita una terminación inglesa no necesaria.
- source_word: וְ
  english_pob_choice: and
  chosen_spanish: y
  alternatives_spanish:
