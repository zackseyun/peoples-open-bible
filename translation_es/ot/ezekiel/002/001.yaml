translation:
  language: es
  text: 'Y me dijo[a]: «Hijo de hombre, ponte de pie y te hablaré».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «hablaré contigo». Con este verbo, el hebreo puede entenderse como «hablarte» o «hablar contigo».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר אֵלַי
  english_pob_choice: And he said to me
  chosen_spanish: Y me dijo
  alternatives_spanish:
  - Entonces me dijo
  - Y me habló
  lexicon: HALOT
  rationale: El wayyiqtol narrativo se vierte de forma natural en español con un pasado simple coordinado. «Dijo» conserva con precisión אמר; se evita «habló» porque amplía el matiz más allá del acto de decir.
- source_word: בֶּן אָדָם
  english_pob_choice: Son of man
  chosen_spanish: Hijo de hombre
  alternatives_spanish:
  - Ser humano
  - Mortal
  lexicon: HALOT
  rationale: En Ezequiel esta fórmula es una dirección profética fija y conviene mantener su forma literal, no neutralizarla. «Hijo de hombre» es el equivalente más directo y preserva la resonancia literaria del hebreo sin introducir interpretación adicional.
- source_word: עֲמֹד
  english_pob_choice: stand
  chosen_spanish: ponte de pie
  alternatives_spanish:
  - levántate
  - permanece en pie
  lexicon: HALOT
  rationale: El imperativo pide adoptar una postura erguida. «Ponte de pie» comunica el gesto corporal con naturalidad en español y evita la ambigüedad de «levántate», que puede sonar más a iniciar la acción de levantarse que a mantenerse de pie.
- source_word: עַל רַגְלֶיךָ
  english_pob_choice: on your feet
  chosen_spanish: de pie
  alternatives_spanish:
  - sobre tus pies
  - sobre tus piernas
  lexicon: HALOT
  rationale: La imagen hebrea es corporal e idiomática. En español, «de pie» transmite la misma postura sin forzar una construcción menos natural como «sobre tus pies»; el contenido físico se conserva en la frase completa «ponte de pie».
- source_word: וַאֲדַבֵּר
  english_pob_choice: and I will speak
  chosen_spanish: te hablaré
  alternatives_spanish:
  - hablaré contigo
  - te diré
  lexicon: HALOT
  rationale: El valor secuencial/propósito del verbo en este contexto se expresa mejor en español con futuro. «Hablaré» mantiene la cercanía del hebreo y es más preciso que «diré», que no refleja tan bien el acto de comunicación continua o discursiva.
- source_word: אֹתָךְ
  english_pob_choice: to you
  chosen_spanish: te
  alternatives_spanish:
  - a ti
  - contigo
  lexicon: HALOT
  rationale: Con דבר, el complemento pronominal indica el destinatario de la palabra. «Te» es la forma más natural y económica en español; «contigo» sugeriría una relación distinta y no corresponde tan bien al movimiento direccional del habla.
theological_decisions:
- issue: Conservación de la fórmula profética «Son of man» en Ezequiel
  english_pob_reading: Son of man
  chosen_spanish_reading: Hijo de hombre
  alternative_spanish_readings:
  - Ser humano
  - Mortal
  rationale: La traducción mantiene la fórmula fija del libro y evita borrar su función vocativa y literaria. No se introduce una lectura cristológica en este versículo; el término se conserva como título/dirigido profético con la misma cautela que el POB inglés.
  doctrine_reference: 'Translation philosophy §4; Contested terms: אָדָם'
translation_notes:
  revision_awareness: El texto español sigue la revisión inglesa más reciente al traducir la secuencia final con un destinatario directo («te hablaré») en lugar de una expresión más ambigua. También conserva la fórmula estable de Ezequiel «Hijo de hombre» y la orden corporal «ponte de pie» para reflejar con fidelidad el hebreo.
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el hebreo contiene el nombre divino; este versículo no lo contiene.
  - Se mantiene «Hijo de hombre» como fórmula técnica de Ezequiel, no como referencia cristológica.
  - Se evita «SEÑOR» porque no corresponde al texto hebreo presente.
  - El pronombre enclítico «te» reproduce con naturalidad el objeto del verbo de habla en español.
