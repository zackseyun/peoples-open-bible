translation:
  language: es
  text: 'Entonces Yahvé dijo a Moisés: «Corta[b] para ti dos tablas de piedra[a], como las primeras, y yo escribiré sobre las tablas las palabras que estaban sobre las primeras tablas, que quebraste».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «dos tablas de piedra».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «Talla» o «Labra» para ti dos tablas de piedra, como las primeras.'
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  - el SEÑOR
  lexicon: HALOT
  rationale: Se mantiene el nombre propio divino del Tetragrámaton, siguiendo la decisión del POB en inglés de no ocultarlo tras un título. 'Yahvé' es la forma tradicional y reconocible en español para la transliteración del nombre.
- source_word: וַיֹּאמֶר
  english_pob_choice: said
  chosen_spanish: dijo
  alternatives_spanish:
  - habló
  - le habló
  lexicon: HALOT
  rationale: El verbo narrativo estándar en español es 'dijo'; comunica con naturalidad la introducción del discurso sin añadir matices no presentes en el hebreo.
- source_word: פְּסָל
  english_pob_choice: Cut
  chosen_spanish: Corta
  alternatives_spanish:
  - Córtate
  - Hete
  - Talla
  lexicon: HALOT
  rationale: '''פְּסָל'' pide una acción concreta sobre piedra. En español, ''corta'' conserva la fuerza imperativa y la naturalidad moderna; ''talla'' o ''hije'' podrían sonar más marcados o arcaizantes según contexto. La nota textual inglesa ''Cut/Carve/Hew'' se refleja en el margen como alternativa semántica.'
- source_word: לְךָ
  english_pob_choice: for yourself
  chosen_spanish: para ti
  alternatives_spanish:
  - para tu cuenta
  - por tu parte
  lexicon: HALOT
  rationale: La preposición con sufijo se expresa de modo explícito para conservar el énfasis de que Moisés debe preparar las tablas personalmente.
- source_word: שְׁנֵי לֻחֹת אֲבָנִים
  english_pob_choice: two stone tablets
  chosen_spanish: dos tablas de piedra
  alternatives_spanish:
  - dos tablas de piedra
  - dos losas de piedra
  lexicon: HALOT
  rationale: '''Tablas de piedra'' es la equivalencia más natural y fiel en español para לֻחֹת אֲבָנִים. ''Losas'' es posible, pero ''tablas'' conserva el vínculo bíblico e intertextual con las tablas del pacto.'
- source_word: כָּרִאשֹׁנִים
  english_pob_choice: like the first ones
  chosen_spanish: como las primeras
  alternatives_spanish:
  - como las anteriores
  - igual que las primeras
  lexicon: HALOT
  rationale: La comparación señala semejanza con las tablas previas. 'Como las primeras' es la forma más breve y clara en español; evita sobreexplicar lo que el hebreo no explicita.
- source_word: וְכָתַבְתִּי
  english_pob_choice: and I will write
  chosen_spanish: y yo escribiré
  alternatives_spanish:
  - y escribiré
  - y escribiré yo
  lexicon: HALOT
  rationale: Se conserva el futuro promisorio divino. El pronombre explícito 'yo' refleja con claridad el sujeto enfático del hebreo sin forzar el estilo.
- source_word: עַל הַלֻּחֹת
  english_pob_choice: on the tablets
  chosen_spanish: sobre las tablas
  alternatives_spanish:
  - en las tablas
  - encima de las tablas
  lexicon: HALOT
  rationale: '''Sobre'' reproduce de forma natural la idea de inscripción en la superficie. ''Tablas'' mantiene la concordancia con la primera mitad del versículo.'
- source_word: הַדְּבָרִים
  english_pob_choice: the words
  chosen_spanish: las palabras
  alternatives_spanish:
  - los mandamientos
  - las cosas
  lexicon: HALOT
  rationale: El hebreo dice literalmente 'las palabras'. Se evita traducir por 'mandamientos' para no cerrar indebidamente el sentido ni añadir interpretación jurídica ausente del término.
- source_word: אֲשֶׁר הָיוּ עַל הַלֻּחֹת הָרִאשֹׁנִים
  english_pob_choice: that were on the first tablets
  chosen_spanish: que estaban sobre las primeras tablas
  alternatives_spanish:
  - que estaban en las primeras tablas
  - que había en las primeras tablas
  lexicon: HALOT
  rationale: Se mantiene la relación locativa del hebreo y la referencia a las tablas previas. 'Estaban sobre' evita una formulación más libre como 'contenían'.
- source_word: אֲשֶׁר שִׁבַּרְתָּ
  english_pob_choice: which you broke
  chosen_spanish: que quebraste
  alternatives_spanish:
  - que rompiste
  - que hiciste pedazos
  lexicon: HALOT
  rationale: '''Quebraste'' conserva la fuerza del verbo hebreo y suena adecuado en registro bíblico sin volverse excesivamente coloquial. ''Rompiste'' sería más llano, pero menos solemne.'
theological_decisions:
- issue: Rendering the divine name יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Jehová
  - el SEÑOR
  rationale: El texto hebreo usa el Tetragrámaton directamente. Siguiendo la decisión doctrinal del POB de preservar el nombre divino en vez de reemplazarlo por un título, se emplea 'Yahvé' en español.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
translation_notes:
  revision_awareness: 'Se ha seguido el consenso alto del expediente en inglés sin cambios sustantivos: se mantiene el nombre divino como transliteración, se conserva la literalidad de «las palabras» y se refleja la alternativa léxica de פְּסָל con una nota al pie. No se detectaron revisiones aplicadas en el pass más reciente.'
  spanish_consistency_notes:
  - Se usa 'Yahvé' de manera consistente para יְהוָה, conforme al estándar del proyecto.
  - '''Tablas'' se mantiene para לֻחֹת a fin de conservar cohesión terminológica con el resto del Pentateuco.'
  - Se evita 'mandamientos' para הַדְּבָרִים, porque el hebreo dice 'palabras' y el contexto inmediato no exige especificación adicional.
  - El verbo final 'quebraste' preserva el sentido de ruptura física sin intensificar más allá del hebreo.
