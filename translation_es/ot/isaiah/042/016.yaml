translation:
  language: es
  text: Y conduciré a los ciegos por un camino que no han conocido; por sendas que no han conocido los guiaré. Convertiré la oscuridad delante de ellos en luz[a], y los lugares torcidos en terreno llano. Estas son las cosas que he hecho, y no los he desamparado.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Estas son las cosas que haré, y no los desampararé». El hebreo usa verbos perfectos aquí, que pueden expresar acción vista como cumplida o certeza profética respecto de lo que Dios promete hacer.'
    reason: alternative_reading
lexical_decisions:
- source_word: וְהוֹלַכְתִּי
  english_pob_choice: And I will lead
  chosen_spanish: Y conduciré
  alternatives_spanish:
  - Y los guiaré
  - Y haré caminar
  lexicon: HALOT
  rationale: El hifil de הלך es causativo; en español, «conducir» comunica de modo natural la acción de guiar a otros por una ruta, manteniendo el sentido de dirección sin volverlo mecánico.
- source_word: עִוְרִים
  english_pob_choice: the blind
  chosen_spanish: a los ciegos
  alternatives_spanish:
  - a los invidentes
  - a los que no ven
  lexicon: HALOT
  rationale: El sustantivo/adjetivo plural funciona aquí de manera sustantiva. «Ciegos» conserva la imagen y es la forma más natural en español bíblico contemporáneo.
- source_word: בְּדֶרֶךְ
  english_pob_choice: in a way
  chosen_spanish: por un camino
  alternatives_spanish:
  - en un camino
  - por una senda
  lexicon: HALOT
  rationale: דרך puede ser camino, vía o manera. Como el versículo desarrolla una metáfora de conducción, «por un camino» expresa mejor la ruta concreta de la guía.
- source_word: לֹא יָדָעוּ
  english_pob_choice: they have not known
  chosen_spanish: que no conocían
  alternatives_spanish:
  - que no habían conocido
  - que no conocen
  lexicon: HALOT
  rationale: ידע incluye conocimiento por experiencia. El imperfecto español aquí fluye bien en la relativa y conserva la idea de una ruta ajena y no familiar.
- source_word: בִּנְתִיבוֹת
  english_pob_choice: on paths
  chosen_spanish: por sendas
  alternatives_spanish:
  - en sendas
  - por veredas
  lexicon: HALOT
  rationale: נתיבות es un plural poético de caminos/sendas. «Sendas» mantiene el paralelismo con «camino» y suena más literario sin perder claridad.
- source_word: אַדְרִיכֵם
  english_pob_choice: I will guide them
  chosen_spanish: los guiaré
  alternatives_spanish:
  - los dirigiré
  - los encaminaré
  lexicon: HALOT
  rationale: El hifil de דרך significa guiar o dirigir. «Guiar» conserva el campo semántico y evita redundancia excesiva con «conduciré».
- source_word: אָשִׂים
  english_pob_choice: I will make
  chosen_spanish: Haré
  alternatives_spanish:
  - Pondré
  - Convertiré
  lexicon: HALOT
  rationale: 'שים es amplio: poner, establecer, hacer. En cláusulas de transformación, «haré de» es la solución más natural y fiel al cambio descrito.'
- source_word: מַחְשָׁךְ
  english_pob_choice: the darkness
  chosen_spanish: de la oscuridad
  alternatives_spanish:
  - de la tiniebla
  - de lo oscuro
  lexicon: HALOT
  rationale: El término denota oscuridad; en español, «oscuridad» es claro y literario. Se evita forzar un calco innecesario.
- source_word: לִפְנֵיהֶם
  english_pob_choice: before them
  chosen_spanish: delante de ellos
  alternatives_spanish:
  - ante ellos
  - en frente de ellos
  lexicon: HALOT
  rationale: La expresión idiomática hebrea señala la posición espacial delante del sujeto. «Delante de ellos» es natural y preserva la imagen.
- source_word: לָאוֹר
  english_pob_choice: into light
  chosen_spanish: luz
  alternatives_spanish:
  - a luz
  - en luz
  lexicon: HALOT
  rationale: 'El sentido es resultativo: la oscuridad se transforma en luz. En español, «haré de X luz» expresa bien esa transformación sin sobrecargar la sintaxis.'
- source_word: וּמַעֲקַשִּׁים
  english_pob_choice: the crooked places
  chosen_spanish: de los lugares torcidos
  alternatives_spanish:
  - de los sitios torcidos
  - de los caminos torcidos
  lexicon: HALOT
  rationale: El término alude a lo torcido o desviado. Se traduce con una frase que conserva el paralelismo espacial del versículo y sugiere terreno difícil o irregular.
- source_word: לְמִישׁוֹר
  english_pob_choice: into level ground
  chosen_spanish: terreno llano
  alternatives_spanish:
  - llanura
  - terreno recto
  lexicon: HALOT
  rationale: מישור puede significar lugar llano, planicie o rectitud. «Terreno llano» comunica mejor la imagen de un trayecto hecho transitable.
- source_word: אֵלֶּה הַדְּבָרִים
  english_pob_choice: These are the things
  chosen_spanish: Estas son las cosas
  alternatives_spanish:
  - Estas son las palabras
  - Estos son los hechos
  lexicon: HALOT
  rationale: דברים puede abarcar cosas, asuntos o palabras según contexto. Aquí funciona como resumptivo enfático de las acciones de Yahvé; «cosas» mantiene amplitud y naturalidad.
- source_word: עֲשִׂיתִם
  english_pob_choice: I have done
  chosen_spanish: he hecho
  alternatives_spanish:
  - haré
  - he realizado
  lexicon: HALOT
  rationale: El perfecto hebreo puede expresar acción completa o certeza profética. Se conserva el valor perfectivo con «he hecho», sin borrar la tensión entre realizado y prometido.
- source_word: וְלֹא עֲזַבְתִּים
  english_pob_choice: and I have not forsaken them
  chosen_spanish: y no los he abandonado
  alternatives_spanish:
  - y no los he desamparado
  - y no los he dejado
  lexicon: HALOT
  rationale: עזב significa dejar, abandonar, forsake. «Abandonar» es claro en español; «desamparar» sería una opción más tradicional, pero menos neutral.
theological_decisions:
- issue: El valor de los perfectos finales en un contexto de promesa
  english_pob_reading: I have done ... I have not forsaken them
  chosen_spanish_reading: he hecho ... no los he abandonado
  alternative_spanish_readings:
  - haré ... no los abandonaré
  - hago ... no los abandono
  rationale: Se conserva el perfecto español para reflejar el hebreo perfecto y su posible función de certeza profética. Así no se aplana la oscilación entre promesa futura y afirmación de hecho cumplido.
  doctrine_reference: Translation philosophy §1, §3, §5
- issue: La metáfora de guía para los ciegos
  english_pob_reading: lead the blind ... guide them
  chosen_spanish_reading: conduciré a los ciegos ... los guiaré
  alternative_spanish_readings:
  - guiaré a los ciegos ... los dirigiré
  - encaminaré a los ciegos ... los guiaré
  rationale: La imagen de Yahvé como guía se mantiene explícita. Se evita espiritualizarla en exceso o sustituirla por una formulación más abstracta.
  doctrine_reference: Isaías 42:16; guía divina en lenguaje profético
translation_notes:
  revision_awareness: El texto español sigue de cerca la última revisión inglesa, que prefirió «in a way» por naturalidad y ajuste al hebreo. En español se resolvió con «por un camino» / «por sendas» para conservar la progresión poética sin perder la naturalidad idiomática. También se mantuvo el cierre en perfecto («he hecho», «he abandonado») para respetar la tensión aspectual documentada en el audit trail.
  spanish_consistency_notes:
  - Se usó «Yahvé» solo cuando el texto lo requiriera; en este versículo no aparece el Tetragrámaton en forma explícita en la superficie castellana, por lo que no fue necesario introducirlo.
  - Se prefirió «conduciré» / «guiaré» para distinguir los dos verbos de dirección y evitar redundancia en español.
  - «Oscuridad», «lugares torcidos» y «terreno llano» conservan la metáfora espacial y de camino propia del hebreo.
  - La nota [a] se ancla únicamente en la cláusula final, donde existe la alternativa documentada de traducir los perfectos como futuro profético.
