review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la estructura general del hebreo: condición de error no intencional, omisión por parte de la congregación, y la secuencia de sacrificios y ofrendas acompañantes. También preserva correctamente עֵדָה como “congregación”, עֹלָה como “holocausto”, el nombre divino como “Yahvé” y la especificidad de “macho cabrío”. Sin embargo, el principal desajuste está en לְחַטָּאת, donde el inglés auditado y la decisión léxico-teológica del POB mantienen “sin offering” en el texto principal con nota alternativa, mientras el borrador español lo cambió a “para expiación”, que deja de nombrar la ofrenda como sacrificio específico y desplaza el sentido hacia el efecto.'
  spanish_quality_summary: El español es claro y digno, pero conviene una pequeña reparación. “Pasó desapercibido para la congregación” es natural; la nota explicativa es aceptable aunque no estrictamente necesaria. “Un novillo del ganado” es legible, aunque “novillo” puede sonar algo menos alineado con el inglés auditado “one bull from the herd”; aun así no obliga por sí solo a corrección. La frase final sí necesita ajuste para mantener terminología sacrificial estable y más precisa en español bíblico.
  glossary_alignment: 'Buen alineamiento general con el glosario del proyecto: “Yahvé”, “congregación”, “holocausto”, “ofrenda de cereal”, “libación”. El punto conflictivo es חַטָּאת: el proyecto pide preservar la decisión documentada y sus alternativas en nota; por tanto debe ir en texto principal como “ofrenda por el pecado” (o muy posiblemente “sacrificio por el pecado”), no solo “expiación”.'
  issues:
  - severity: high
    issue: לְחַטָּאת fue traducido como “para expiación” en vez de nombrar la ofrenda.
    rationale: El hebreo designa una categoría sacrificial concreta. “Expiación” comunica un efecto teológico, pero no identifica la ofrenda como tal. Además contradice la decisión auditada del inglés POB, que conservó “sin offering” en el texto principal y reservó la alternativa ritual en nota.
  - severity: medium
    issue: La nota b invierte la relación principal/alternativa.
    rationale: Si el texto principal dice “expiación” y la nota ofrece “ofrenda por el pecado”, se pierde la prioridad dada por la auditoría a la terminología tradicional y reconocible de חַטָּאת.
  - severity: low
    issue: “Conforme al estatuto” es aceptable, pero “conforme al reglamento/prescripción” podría sonar algo más procedural.
    rationale: מִשְׁפָּט aquí apunta al procedimiento prescrito. No obstante, “estatuto” sigue siendo defendible y no requiere adjudicación.
  revised_spanish_text: Entonces, si se hizo inadvertidamente y pasó desapercibido[a] para la congregación, toda la congregación ofrecerá un novillo del ganado para holocausto, como aroma agradable a Yahvé, con su ofrenda de cereal y su libación, conforme al estatuto, y un macho cabrío para ofrenda por el pecado[b].
  revised_footnotes:
