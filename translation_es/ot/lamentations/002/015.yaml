    text: O «sisean»; el verbo hebreo puede indicar un sonido agudo de burla, ya se traduzca «silbar» o «sisear».
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «hija de Jerusalén», personificación poética de la ciudad.'
    reason: cultural_note
  - marker: c
    text: O «perfecta en belleza» o «la perfección de la belleza».
    reason: lexical_alternative
  revision_rationale: Se corrige el anclaje de la nota textual para que corresponda al verbo «silban», se reemplaza «aplauden contra ti» por una formulación más fiel y natural en español («baten palmas ante ti»), se fortalece el gesto de escarnio con «sacuden la cabeza», y se simplifica la cita final para mejorar la legibilidad sin perder el sentido del hebreo ni la lógica del POB inglés.
