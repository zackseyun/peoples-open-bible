review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura básica del hebreo: mandato a dirigirse a Tiro, participio femenino relativo, localización marítima, actividad comercial, fórmula profética y jactancia final. Sin embargo, hay dos desajustes importantes: (1) la nota [a] está anclada en «Tiro» cuando semánticamente corresponde a «muchas costas»; (2) «Yahvé, el Señor» invierte el orden del hebreo אֲדֹנָי יְהוִה y suena menos natural que una forma que mantenga título + nombre. Además, «hacia muchas costas» es comprensible, pero «a muchas costas» suena más natural en español con רכלת ... אל.'
  spanish_quality_summary: El español es claro y digno, pero la frase mejora con ajustes menores para mayor naturalidad y fidelidad. «Mercader de los pueblos» funciona, aunque «comerciante» también sería posible; no exige cambio. «Perfecta en hermosura» es buena y literaria. El principal problema de calidad es la colocación errónea de la nota y la fórmula «Yahvé, el Señor», que resulta algo forzada.
  glossary_alignment: Se cumple bien «Yahvé» para יהוה y se preserva la distinción con אֲדֹנָי, pero conviene expresarla como «el Señor Yahvé» para reflejar el orden y la relación del título divino compuesto. No hay otros choques relevantes con la terminología del proyecto.
  issues:
  - severity: high
    issue: La nota [a] está colocada en «Tiro» en vez de en la expresión correspondiente a אִיִּים רַבִּים.
    rationale: La nota explica la alternativa léxica «islas / tierras costeras marítimas», que pertenece a «muchas costas», no al nombre propio «Tiro». Tal como está, induce a error y no cumple la disciplina de anclaje de notas.
  - severity: medium
    issue: «Así dice Yahvé, el Señor» no refleja de la manera más fiel y natural el compuesto אֲדֹנָי יְהוִה.
    rationale: Aunque preserva ambos elementos, invierte el orden hebreo y suena marcado en español. «Así dice el Señor Yahvé» mantiene el título seguido del nombre divino y encaja mejor con la convención del proyecto.
  - severity: low
    issue: «hacia muchas costas» es menos natural que «a muchas costas» en este contexto comercial.
    rationale: El hebreo אֶל expresa dirección/destino, y en español comercial-geográfico «a muchas costas» fluye mejor sin pérdida semántica. La nota puede seguir aclarando la alternativa «islas».
  revised_spanish_text: 'Y di a Tiro, que habita en las entradas del mar, mercader de los pueblos a muchas costas[a]: Así dice el Señor Yahvé: Tiro, tú has dicho: «Yo soy perfecta en hermosura».'
  revised_footnotes:
  - marker: a
    text: O «a muchas islas». El término hebreo puede referirse a islas o, más ampliamente, a tierras costeras marítimas.
    reason: lexical_alternative
  revision_rationale: Se reubicó la nota al sintagma correcto para que corresponda a אִיִּים רַבִּים, se ajustó la fórmula divina a «el Señor Yahvé» para reflejar mejor אֲדֹנָי יְהוִה y la terminología del proyecto, y se sustituyó «hacia» por «a» para un español más natural sin alterar el sentido.
