    issue: Registro menos natural en «Acuérdense»
    rationale: Aunque es correcto, «Recuerden» funciona mejor como imperativo exhortativo en español neutral ampliamente legible y mantiene la fuerza de μνήσθητε.
  - severity: low
    issue: Relativa pesada en «las cuales hicieron»
    rationale: Para ἃ ἐποίησαν, «que hicieron» es más natural en español moderno y no reduce precisión.
  revised_spanish_text: Recuerden las obras de nuestros padres, que hicieron en sus generaciones, y reciban gran gloria y gloria eterna.
  revision_rationale: 'Se hizo una reparación pequeña de estilo y legibilidad: «Recuerden» ofrece mejor español neutral que «Acuérdense», y «que hicieron» evita una construcción rígida sin alterar el contenido griego. El resto del versículo se conserva por su fidelidad léxica y estructural.'
