translation:
  language: es
  text: Las canas son entendimiento para las personas[a], y una vida sin mancha es la madurez de la vejez.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «para los seres humanos». El dativo griego ἀνθρώποις es masculino en la forma, pero funciona de manera genérica.'
    reason: lexical_alternative
lexical_decisions:
- source_word: πολιὰ
  english_pob_choice: gray hair
  chosen_spanish: las canas
  alternatives_spanish:
  - cabello canoso
  - cabellos grises
  - la vejez
  lexicon: LSJ
  rationale: El griego alude concretamente al cabello gris o canoso, señal visible de la edad. "Las canas" conserva esa imagen sin convertirla en un mero sinónimo de edad.
- source_word: φρόνησις
  english_pob_choice: understanding
  chosen_spanish: entendimiento
  alternatives_spanish:
  - prudencia
  - sabiduría
  - buen juicio
  lexicon: LSJ
  rationale: El término apunta a comprensión sensata o discernimiento práctico. "Entendimiento" suena natural en español y mantiene el valor intelectual-moral de la afirmación.
- source_word: ἀνθρώποις
  english_pob_choice: for people
  chosen_spanish: para las personas
  alternatives_spanish:
  - para los hombres
  - para el ser humano
  - entre las personas
  lexicon: LSJ
  rationale: El dativo funciona de modo genérico. En español, "personas" comunica el sentido inclusivo sin perder la referencia general del griego, y evita la ambigüedad de un masculino genérico que el español moderno no siempre resuelve bien.
- source_word: ἡλικία
  english_pob_choice: maturity
  chosen_spanish: madurez
  alternatives_spanish:
  - edad
  - plenitud
  - estatura
  lexicon: LSJ
  rationale: Aquí ἡλικία no designa estatura física sino estado de madurez o edad cumplida. "Madurez" expresa mejor la idea de verdadera vejez como plenitud cualitativa.
- source_word: γήρως
  english_pob_choice: of old age
  chosen_spanish: de la vejez
  alternatives_spanish:
  - de edad avanzada
  - de senectud
  - de la ancianidad
  lexicon: LSJ
  rationale: 'El genitivo especifica el tipo de madurez en vista: la de la vejez. "De la vejez" es claro, natural y suficientemente cercano al griego.'
- source_word: βίος ἀκηλίδωτος
  english_pob_choice: an unblemished life
  chosen_spanish: una vida sin mancha
  alternatives_spanish:
  - una vida sin tacha
  - una vida inmaculada
  - una vida limpia
  lexicon: LSJ
  rationale: βίος es la vida como modo de vivir, y ἀκηλίδωτος señala ausencia de mancha o estigma moral. "Sin mancha" conserva la imagen ética sin sonar forzado en español.
theological_decisions:
- issue: Parallelismo proverbial que redefine la verdadera vejez
  english_pob_reading: 'The verse redefines true old age ethically: wisdom and a blameless life, not mere years, constitute genuine venerability.'
  chosen_spanish_reading: 'El verso redefine la verdadera vejez en términos éticos: lo venerable no son solo los años, sino el entendimiento y una vida sin mancha.'
  alternative_spanish_readings:
  - El verso solo compara rasgos de la vejez sin redefinirla de manera fuerte.
  - El verso contrapone edad cronológica y madurez moral de forma implícita, sin explicitarla.
  rationale: La estructura equativa del griego presenta una equivalencia llamativa entre canas, entendimiento y madurez de la vejez. La traducción mantiene esa tensión proverbial sin explicarla en exceso, pero la nota deja claro el valor interpretativo.
  doctrine_reference: DOCTRINE.md §Translation philosophy 3, 6
- issue: Tratamiento del genérico humano en ἀνθρώποις
  english_pob_reading: Rendered 'for people' in the main text.
  chosen_spanish_reading: Se traduce de manera genérica e inclusiva como "para las personas".
  alternative_spanish_readings:
  - para los hombres
  - para la gente
  - para los seres humanos
  rationale: El griego usa una forma masculina que funciona genéricamente. En español, "personas" transmite bien el sentido universal sin introducir un masculino que hoy puede sonar más marcado de lo necesario.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión del inglés POB que pasó de 'men' a 'people' y de 'the age of old age' a 'the maturity of old age'. La versión española sigue esa revisión al preferir una referencia genérica y al traducir ἡλικία como 'madurez', manteniendo a la vez la imagen proverbial de canas, entendimiento y vida sin mancha.
  spanish_consistency_notes:
  - Se mantuvo el registro sobrio y bíblico, evitando calcos ingleses innecesarios.
  - '"Canas" conserva la metáfora de signo visible de edad sin convertirla en abstracción.'
  - '"Vida sin mancha" preserva la imagen moral de ἀκηλίδωτος.'
  - Se evitó "Cristo/Mesías" u otra terminología no pertinente a este pasaje.
  - La nota al pie usa un único marcador y coincide exactamente con el anclaje en el texto.
