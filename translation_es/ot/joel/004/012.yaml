translation:
  language: es
  text: Que se despierten las naciones y suban al Valle de Josafat[a], porque allí me sentaré para juzgar a todas las naciones circundantes.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Josafat probablemente evoca el sentido «Yahvé juzga», reforzando la escena del juicio divino.
    reason: lexical_alternative
lexical_decisions:
- source_word: יֵעֹרוּ
  english_pob_choice: Let ... awaken
  chosen_spanish: Que se despierten
  alternatives_spanish:
  - Que sean despertadas
  - Que se alcen
  lexicon: HALOT
  rationale: El hebreo es un exhortativo/jusivo plural; en español, «que se despierten» conserva la imagen de ser sacudidos para actuar, con un tono natural y solemne. «Se alcen» perdería la metáfora del despertar.
- source_word: וְיַעֲלוּ
  english_pob_choice: and come up
  chosen_spanish: y suban
  alternatives_spanish:
  - y vayan arriba
  - y asciendan
  lexicon: HALOT
  rationale: עלה expresa movimiento ascendente hacia el lugar señalado. «Suban» mantiene la dirección sin sonar forzado en español.
- source_word: הַגּוֹיִם
  english_pob_choice: the nations
  chosen_spanish: las naciones
  alternatives_spanish:
  - los gentiles
  - los pueblos
  lexicon: HALOT
  rationale: Aquí גוים designa a las naciones convocadas para juicio; «las naciones» es la equivalencia más precisa y natural en español.
- source_word: עֵמֶק יְהוֹשָׁפָט
  english_pob_choice: the Valley of Jehoshaphat
  chosen_spanish: el Valle de Jehoshafat
  alternatives_spanish:
  - el valle de Yahvé juzga
  - el Valle de Yahvé juzga
  lexicon: HALOT
  rationale: Se translitera el nombre propio, como en la fuente inglesa, para conservar la forma toponímica. En español se mantiene la posible resonancia del nombre mediante la nota, no en el texto principal.
- source_word: אֵשֵׁב
  english_pob_choice: I will sit
  chosen_spanish: me sentaré
  alternatives_spanish:
  - me sentaré en juicio
  - tomaré mi asiento
  lexicon: HALOT
  rationale: El valor judicial de ישב con לִשְׁפֹּט sugiere tomar asiento para juzgar. «Me sentaré» preserva la imaginería de tribunal sin añadir glosa excesiva.
- source_word: לִשְׁפֹּט
  english_pob_choice: to judge
  chosen_spanish: para juzgar
  alternatives_spanish:
  - para dictar juicio
  - para pronunciar juicio
  lexicon: HALOT
  rationale: שפט aquí es acción judicial directa contra las naciones. «Juzgar» conserva la fuerza legal y es idiomático en español.
- source_word: כָּל הַגּוֹיִם מִסָּבִיב
  english_pob_choice: all the surrounding nations
  chosen_spanish: a todas las naciones de alrededor
  alternatives_spanish:
  - a todas las naciones circundantes
  - a todas las naciones que están alrededor
  lexicon: HALOT
  rationale: La construcción incluye tanto totalidad como ubicación periférica. «De alrededor» reproduce bien la relación espacial en un español claro y bíblico.
theological_decisions:
- issue: Sentido teológico del nombre propio יְהוֹשָׁפָט
  english_pob_reading: Transliterate as 'Jehoshaphat' in the main text while preserving the implied meaning in a footnote.
  chosen_spanish_reading: Transliterar como «Jehoshafat» en el texto principal y explicar en nota la posible resonancia «Yahvé juzga».
  alternative_spanish_readings:
  - traducir el nombre como «Yahvé juzga»
  - «el Valle de Yahvé juzga»
  rationale: El texto hebreo presenta un nombre propio; por fidelidad textual debe permanecer transliterado. A la vez, el juego de palabras con el juicio divino forma parte del efecto literario y se preserva en nota, sin reemplazar el nombre por una traducción interpretativa.
  doctrine_reference: 'DOCTRINE.md: Translate titles; transliterate names; preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: 'La revisión más reciente no introdujo cambios: el pasaje mostró alta concordancia y no requirió ajustes. Esta versión española sigue el mismo análisis de nombres propios, movimiento ascendente y lenguaje judicial, preservando la tensión entre transliteración y resonancia semántica en una nota.'
  spanish_consistency_notes:
  - Se usa «Yahvé» para el nombre divino en la nota, conforme al estándar del proyecto.
  - Se conserva la transliteración del topónimo propio en el texto principal, evitando una traducción que borre el juego de palabras.
  - «Juzgar» mantiene el valor forense del hebreo שפט.
  - La formulación «naciones de alrededor» refleja el matiz espacial de מִסָּבִיב sin añadir interpretaciones ajenas.
