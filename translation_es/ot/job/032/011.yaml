translation:
  language: es
  text: Miren, esperé sus palabras; escuché sus razonamientos[a], hasta que ustedes buscaron palabras[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «su comprensión» o «su discernimiento».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «hasta que examinaron o buscaron una respuesta en palabras». La frase final es compacta y algo idiomática en la poesía hebrea.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הֵן
  english_pob_choice: Look
  chosen_spanish: He aquí
  alternatives_spanish:
  - Mira
  - Miren
  - Observa
  lexicon: HALOT
  rationale: La partícula discursiva introduce atención y énfasis. «He aquí» conserva la fuerza deíctica con un registro digno y natural en español bíblico, sin volverse arcaizante en exceso.
- source_word: הוֹחַ֨לְתִּי
  english_pob_choice: I waited
  chosen_spanish: esperé
  alternatives_spanish:
  - esperé con paciencia
  - aguardé
  - tuve esperanza
  lexicon: HALOT
  rationale: El verbo puede abarcar esperar o esperar con expectativa. En el contexto de restricción paciente mientras otros hablaban, «esperé» comunica bien la espera efectiva sin añadir una interpretación más fuerte de la que el contexto exige.
- source_word: לְדִבְרֵיכֶם
  english_pob_choice: for your words
  chosen_spanish: sus palabras
  alternatives_spanish:
  - de sus palabras
  - por sus palabras
  - lo que ustedes decían
  lexicon: HALOT
  rationale: La preposición es idiomática; en español, «esperé sus palabras» expresa de forma natural la idea de aguardar a que hablaran, preservando el sentido relacional del hebreo.
- source_word: אָזִין
  english_pob_choice: I listened
  chosen_spanish: escuché
  alternatives_spanish:
  - presté oído
  - escuché atentamente
  - dediqué oído
  lexicon: HALOT
  rationale: El hiphil de אזן implica oír con atención. «Escuché» es claro y digno; la atención queda implícita por el contexto sin forzar una perífrasis.
- source_word: תְּבוּנֹתֵיכֶם
  english_pob_choice: your insights
  chosen_spanish: sus entendimientos
  alternatives_spanish:
  - su comprensión
  - sus razonamientos
  - su discernimiento
  lexicon: HALOT
  rationale: El término puede referirse a entendimiento, discernimiento o razonamientos. Aquí el énfasis recae en el contenido reflexivo de lo que decían; «entendimientos» mantiene esa amplitud semántica y conserva la tensión del original mejor que una sola paráfrasis interpretativa.
- source_word: תַּחְקְר֥וּן
  english_pob_choice: you searched out
  chosen_spanish: buscaron
  alternatives_spanish:
  - examinaron
  - investigaron
  - indagaron
  lexicon: HALOT
  rationale: חקר tiene la idea de buscar/indagar con cuidado. En la cola poética final, «buscaron palabras» refleja la investigación verbal de forma sobria y mantiene la compactación del hebreo.
- source_word: מִלִּין
  english_pob_choice: words
  chosen_spanish: palabras
  alternatives_spanish:
  - expresiones
  - argumentos
  - dichos
  lexicon: HALOT
  rationale: El plural poético arameizante alude a palabras o formulaciones verbales. «Palabras» conserva la correspondencia léxica más directa y evita estrechar indebidamente el sentido a «argumentos».
theological_decisions:
- issue: Valor de la espera paciente antes de reprender
  english_pob_reading: I waited for your words; I listened to your insights
  chosen_spanish_reading: esperé sus palabras; escuché sus entendimientos
  alternative_spanish_readings:
  - aguardé sus palabras; presté oído a su comprensión
  - tuve paciencia con sus palabras; escuché sus razonamientos
  rationale: El versículo presenta la postura de Eliú como espera deliberada y escucha atenta antes de intervenir. La traducción conserva ese matiz de paciencia y atención sin introducir censura anticipada ni suavizar el contraste retórico del discurso.
  doctrine_reference: Sabiduría y prudencia en el habla; cf. Proverbios 18:13; Santiago 1:19
translation_notes:
  revision_awareness: Se corrigió el anclaje de las notas al incluir los marcadores [a] y [b] exactamente en el texto español, de modo que cada nota tenga soporte visible en la traducción.
  spanish_consistency_notes:
  - Se evitó «SEÑOR» y cualquier sustitución de Yahvé, porque este versículo no contiene el tetragrámaton.
  - Se mantuvo un registro poético claro y moderno, con léxico bíblico comprensible en español neutral.
  - Se preservó el paralelismo entre esperar / escuchar / buscar, que estructura el versículo en hebreo.
