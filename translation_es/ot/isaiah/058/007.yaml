translation:
  language: es
  text: ¿No es más bien partir tu pan con el hambriento, y llevar a los pobres expulsados[a] a tu casa? Cuando veas al desnudo, cúbrelo, y no te escondas de tu propia carne[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «los pobres sin hogar». El hebreo probablemente se refiere a personas pobres que han sido expulsadas o quedaron sin refugio.
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «tu propia carne», un modismo que puede significar tus propios parientes y, por extensión, a quienes están unidos a ti en la humanidad compartida.'
    reason: lexical_alternative
lexical_decisions:
- source_word: פָרֹס
  english_pob_choice: share
  chosen_spanish: partir
  alternatives_spanish:
  - compartir
  - repartir
  lexicon: HALOT
  rationale: El verbo hebreo literalmente implica dividir o partir. En español, «partir tu pan» conserva esa imagen concreta y encaja naturalmente con el acto de dar al hambriento; «compartir» sería más interpretativo.
- source_word: לָרָעֵב
  english_pob_choice: with the hungry
  chosen_spanish: con el hambriento
  alternatives_spanish:
  - al hambriento
  - para el hambriento
  lexicon: HALOT
  rationale: El hebreo señala al hambriento como destinatario de la acción. «Con el hambriento» mantiene la relación idiomática y suena fluido en español después de «partir tu pan».
- source_word: לַחְמֶךָ
  english_pob_choice: your bread
  chosen_spanish: tu pan
  alternatives_spanish:
  - tu alimento
  - tu comida
  lexicon: HALOT
  rationale: «Pan» conserva el término concreto y bíblico del hebreo; en español también funciona como metonimia natural para el sustento, sin diluir la imagen.
- source_word: עֲנִיִּים
  english_pob_choice: the poor
  chosen_spanish: los pobres
  alternatives_spanish:
  - los necesitados
  - los afligidos
  lexicon: HALOT
  rationale: En este contexto social y exhortativo, «los pobres» es la equivalencia más natural y fiel, y mantiene el alcance comunitario del término hebreo.
- source_word: מְרוּדִים
  english_pob_choice: who are cast out
  chosen_spanish: expulsados
  alternatives_spanish:
  - echados fuera
  - desterrados
  - sin hogar
  lexicon: HALOT
  rationale: La forma hebrea sugiere personas desplazadas o arrojadas fuera. «Expulsados» preserva esa fuerza de exclusión sin concretar de más una categoría moderna.
- source_word: תָּבִיא בָיִת
  english_pob_choice: bring ... into your house
  chosen_spanish: llevar ... a tu casa
  alternatives_spanish:
  - traer ... a tu casa
  - meter ... en tu casa
  lexicon: HALOT
  rationale: El hebreo expresa introducir a alguien en la propia casa. «Llevar a tu casa» es natural en español y comunica hospitalidad de manera clara.
- source_word: כִּי תִרְאֶה
  english_pob_choice: When you see
  chosen_spanish: Cuando veas
  alternatives_spanish:
  - Si ves
  lexicon: HALOT
  rationale: Aquí la partícula marca la circunstancia esperada dentro de la serie de actos justos. «Cuando veas» reproduce mejor ese sentido que un hipotético «si».
- source_word: עָרֹם
  english_pob_choice: the naked
  chosen_spanish: al desnudo
  alternatives_spanish:
  - al que está desnudo
  - a la persona desnuda
  lexicon: HALOT
  rationale: El adjetivo funciona sustantivamente. «Al desnudo» es breve, idiomático y mantiene el valor representativo del hebreo.
- source_word: וְכִסִּיתוֹ
  english_pob_choice: to cover him
  chosen_spanish: cúbrelo
  alternatives_spanish:
  - y cúbrelo
  - vístelo
  - cúbrelo con ropa
  lexicon: HALOT
  rationale: El hebreo dice literalmente «cubrir». «Cúbrelo» conserva esa imagen sin forzar una especificación inexistente en el texto.
- source_word: וּמִבְּשָׂרְךָ
  english_pob_choice: from your own flesh
  chosen_spanish: de tu propia carne
  alternatives_spanish:
  - de tu propia familia
  - de tus propios parientes
  - de tu propia sangre
  lexicon: HALOT
  rationale: Se conserva la metáfora hebrea «carne», que puede incluir parentesco y solidaridad humana. «Tu propia carne» evita estrechar el alcance solo a la familia, manteniendo la tensión del original.
- source_word: לֹא תִתְעַלָּם
  english_pob_choice: not hide yourself
  chosen_spanish: no te escondas
  alternatives_spanish:
  - no te apartes
  - no ignores
  lexicon: HALOT
  rationale: El hitpael transmite la idea de ocultarse o sustraerse a la vista. «No te escondas» es la forma más directa en español y conserva la fuerza exhortativa.
theological_decisions:
- issue: Alcance de «tu propia carne»
  english_pob_reading: Retain the Hebrew idiom rather than narrowing it to family only.
  chosen_spanish_reading: Mantener «tu propia carne» como metáfora abierta de parentesco y solidaridad humana.
  alternative_spanish_readings:
  - de tu propia familia
  - de tus propios parientes
  rationale: El hebreo puede aludir especialmente a los parientes, pero la expresión «carne» tiene una carga ética más amplia. Conservarla evita resolver prematuramente la extensión y preserva la tensión profética.
  doctrine_reference: Preservar la tensión teológica y semántica en lugar de resolverla de antemano.
translation_notes:
  revision_awareness: Coincide sustancialmente con el audit trail inglés; no se observaron revisiones textuales posteriores que obliguen a modificar la lectura base. Se mantuvo la equivalencia óptima y la tensión semántica de «tu propia carne».
  spanish_consistency_notes:
  - Se mantuvo «Dios/Yahvé» según corresponda; este versículo no contiene el tetragrámaton.
  - Se eligió «carne» para מִבְּשָׂרְךָ por fidelidad metafórica y para no restringir indebidamente el alcance.
  - Se usó un registro moderno y digno, con sintaxis natural en español, sin perder la imaginería concreta del hebreo.
