theological_decisions:
- issue: Metaphorical setting of αὐλή/θύρα imagery
  chosen_reading: Render the imagery concretely as 'door' and 'sheepfold' without allegorical expansion.
  alternative_readings:
  - Use 'gate' and 'sheep pen' for a more explicitly pastoral image
  rationale: The verse introduces a metaphor that is explained in the surrounding context. The translation should preserve the image without importing interpretive conclusions about Jesus, leaders, or salvation beyond what this verse itself states.
  doctrine_reference: Translation philosophy §§1, 3, 6
- issue: Generic masculine substantival participle
  chosen_reading: Use 'the one who does not enter' and later 'that man' to reflect the singular masculine form while keeping readable English.
  alternative_readings:
  - Use 'he who does not enter' throughout
  - Use gender-neutral 'whoever does not enter'
  rationale: This follows the gender-accurate principle while avoiding archaic English. The Greek is singular masculine and representative, so the rendering preserves that force without flattening it into a plural or abstract statement.
  doctrine_reference: Translation philosophy §4
