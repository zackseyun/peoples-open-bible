translation:
  text: The surface of it covered the life of every living thing[b][a], and to it is their return.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literally, 'her face.' The Greek likely refers to the face or surface of the earth.
    reason: lexical_alternative
  - marker: b
    text: Or 'into her is their return.' The phrase points to living things returning to the earth.
    reason: alternative_reading
lexical_decisions:
- source_word: ψυχὴν
  chosen: the life
  alternatives:
  - the soul
  - the breath
  - the life-breath
  lexicon: BDAG
  rationale: In this context with παντὸς ζῴου ('of every living thing/animal'), ψυχή refers to animate life rather than an immaterial 'soul.' 'The life' best fits the cosmological description.
- source_word: παντὸς ζῴου
  chosen: of every living thing
  alternatives:
  - of every animal
  - of every creature
  lexicon: LSJ
  rationale: ζῷον can mean animal or living creature. 'Every living thing' preserves the broad scope without narrowing it only to animals.
- source_word: ἐκάλυψεν
  chosen: covered
  alternatives:
  - concealed
  - enveloped
  lexicon: LSJ
  rationale: The verb straightforwardly means 'covered.' A more interpretive gloss is unnecessary.
- source_word: τὸ πρόσωπον αὐτῆς
  chosen: her surface
  alternatives:
  - her face
  - its face
  - the face of it
  lexicon: LSJ
  rationale: Literally 'her face,' but in English this is opaque in reference to the earth/ground implied by the feminine pronoun. 'Surface' conveys the idiomatic sense of the visible face of the earth while preserving the feminine reference.
- source_word: καὶ εἰς αὐτὴν
  chosen: and to her
  alternatives:
  - and into her
  - and to it
  - and into it
  lexicon: LSJ
  rationale: The preposition εἰς can be 'into' or 'to.' Here it expresses movement back to the earth. 'To her' keeps the parallel with the feminine pronoun and avoids over-specifying burial imagery, though 'into her' is a viable alternative.
- source_word: ἡ ἀποστροφὴ αὐτῶν
  chosen: is their return
  alternatives:
  - is their turning back
  - is their reversal
  lexicon: LSJ
  rationale: ἀποστροφή here denotes turning back/return. 'Their return' is the clearest idiomatic English in the context of creatures coming back to the earth.
