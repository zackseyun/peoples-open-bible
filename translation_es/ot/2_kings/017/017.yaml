revisions:
- from: Hicieron pasar a sus hijos y a sus hijas por el fuego[a], practicaron adivinación e interpretaron presagios, y se vendieron para hacer lo malo a los ojos de Yahvé, provocándolo a ira.
  to: Hicieron pasar a sus hijos y a sus hijas por el fuego[a], practicaron adivinación e interpretaron presagios, y se vendieron para hacer el mal a los ojos de Yahvé, para provocarlo a ira.
  rationale: 'La revisión es menor y no cambia el sentido: mejora la naturalidad y dignidad del español con ''hacer el mal'' y alinea mejor la cláusula final con el infinitivo hebreo mediante ''para provocarlo a ira'', preservando el causativo y el objeto explícito. Se mantiene intacta la decisión clave de conservar el modismo ''pasar por el fuego'' y el nombre divino ''Yahvé''.'
