translation:
  language: es
  text: Porque eso es un acto vergonzoso[a], y es una iniquidad para los jueces.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «una iniquidad punible por los jueces».'
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  lexicon: HALOT
  rationale: Introduce la razón de la afirmación anterior en el contexto del juramento de Job. «Porque» comunica bien la relación causal/explicativa sin sonar forzado en español.
- source_word: זִמָּה
  english_pob_choice: a disgraceful act
  chosen_spanish: una acción vergonzosa
  alternatives_spanish:
  - una obra infame
  - una vileza
  - una deshonra
  lexicon: HALOT
  rationale: El término hebreo señala una acción moralmente repugnante, con frecuencia ligada a la inmoralidad sexual. «Acción vergonzosa» conserva el reproche moral y suena natural en español; evita estrechar indebidamente el sentido solo a lo sexual.
- source_word: עָוֺן
  english_pob_choice: an iniquity
  chosen_spanish: una iniquidad
  alternatives_spanish:
  - una culpa
  - un delito
  - una maldad
  lexicon: HALOT
  rationale: Mantengo «iniquidad» porque refleja bien la carga ética del hebreo y el paralelo judicial del verso. En español bíblico es suficientemente claro y conserva el peso moral del término.
- source_word: פְּלִילִים
  english_pob_choice: for the judges
  chosen_spanish: digna de juicio
  alternatives_spanish:
  - para los jueces
  - de los jueces
  - punible por los jueces
  lexicon: HALOT
  rationale: El sustantivo plural apunta al ámbito de la adjudicación judicial. En español, «digna de juicio» comunica la idea del asunto que cae bajo la jurisdicción de los jueces sin hacer la frase demasiado dura o artificial; también deja ver la posibilidad interpretativa de que sea materia judicial.
theological_decisions:
- issue: Carácter del acto como pecado moral y asunto judicial
  english_pob_reading: a disgraceful act ... an iniquity for the judges
  chosen_spanish_reading: una acción vergonzosa ... una iniquidad digna de juicio
  alternative_spanish_readings:
  - una acción vergonzosa ... una iniquidad para los jueces
  - una acción vergonzosa ... una iniquidad punible por los jueces
  rationale: 'El verso presenta dos aspectos en paralelo: el repudio moral del acto y su carácter de asunto judicial. «Digna de juicio» intenta conservar ambos sin endurecer más de lo que exige el texto hebreo. La alternativa «punible por los jueces» explicita la idea legal, pero es más interpretativa.'
  doctrine_reference: Job 31:11; juicio moral y judicial del adulterio/acto sexual ilícito en el marco del juramento de inocencia de Job
translation_notes:
  revision_awareness: 'La redacción sigue de cerca el sentido atestiguado por el hebreo y la auditoría inglesa. Se mantiene la doble carga del hebreo: repulsión moral y referencia al ámbito judicial, sin traducir mecánicamente ni perder la tensión lexical.'
  spanish_consistency_notes:
  - Se usa «iniquidad» para עָוֺן según el valor moral-jurídico del contexto.
  - Se evita «SEÑOR» porque no hay aquí un término divino.
  - «Digna de juicio» se eligió para expresar el campo judicial de פְּלִילִים con español natural, aunque la nota conserva la lectura más explícita.
