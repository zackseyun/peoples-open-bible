  text: Para el director del coro[a]. De los hijos de Coré[b]. Maskil[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Al director del coro».'
    reason: alternative_reading
  - marker: b
    text: 'O: «Para los hijos de Coré» o «Por los hijos de Coré»; la preposición hebrea puede indicar distintos tipos de relación en los encabezados de salmos.'
