  timestamp: '2026-05-07T21:27:41Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'La estructura general sigue bien el hebreo: בְּזֹאת = «Con esto», יָבֹא = «entrará», אֶל־הַקֹּדֶשׁ = «Lugar Santo», וְאַיִל לְעֹלָה = «y un carnero para holocausto». Sin embargo, hay dos desalineaciones importantes con la evidencia fuente y la auditoría inglesa: (1) בְּפַר בֶּן בָּקָר está mejor reflejado como «un toro del ganado» o «de la manada»; «de la vacada» suena regional y menos natural en español bíblico general. (2) לְחַטָּאת no debe reducirse en el texto principal a «expiación», porque el sustantivo nombra una categoría sacrificial, no una abstracción; la POB inglesa mantuvo «sin offering» y relegó «purification offering» a nota. En español conviene conservar «ofrenda por el pecado» en texto principal, con nota para «ofrenda de purificación».'
  spanish_quality_summary: El borrador es legible, pero «de la vacada» resulta poco idiomático para un registro bíblico panhispánico, y «para expiación» suena abstracto donde el contexto enumera sacrificios concretos. «Con un toro del ganado para ofrenda por el pecado» mejora precisión, naturalidad y paralelismo con «y un carnero para holocausto». «Lugar Santo» es aceptable como término cultual.
  glossary_alignment: No hay términos del glosario mayor comprometidos aquí salvo la consistencia sacrificial. «Holocausto» para עֹלָה es adecuado. Para חַטָּאת, el proyecto pide preservar decisiones léxicas documentadas; por eso debe alinearse con la auditoría inglesa usando «ofrenda por el pecado» como principal y mantener la alternativa de purificación en nota, no reemplazarla por «expiación».
  issues:
  - severity: high
    issue: «para expiación» no representa adecuadamente לְחַטָּאת en el texto principal
    rationale: El hebreo aquí designa una ofrenda sacrificial específica, no solo el efecto de expiar. La auditoría inglesa escogió «sin offering» y preservó «purification offering» como alternativa; el español debe reflejar esa misma decisión teológica y léxica.
  - severity: medium
    issue: «de la vacada» es poco natural y demasiado regional/inhabitual
    rationale: Aunque intenta reflejar בֶּן בָּקָר, no suena como español bíblico neutral y puede distraer. «del ganado» comunica mejor el sentido idiomático de bovino procedente del hato.
  - severity: low
    issue: La nota actual para חַטָּאת no corresponde bien al cambio necesario en el texto principal
    rationale: Si el texto principal usa «ofrenda por el pecado», la nota debe preservar la alternativa «ofrenda de purificación», en línea con la razón lexical/theological de la POB inglesa.
  revised_spanish_text: 'Con esto Aarón entrará en el Lugar Santo: con un toro del ganado para ofrenda por el pecado[a][b], y un carnero para holocausto.'
  revised_footnotes:
  - marker: a
    text: O «del ganado vacuno». El hebreo literalmente dice «un toro, hijo del ganado», una expresión idiomática para un toro del ganado.
    reason: lexical_alternative
  - marker: b
    text: O «para ofrenda de purificación». El término hebreo también puede enfatizar la purificación ritual además de su relación con el pecado.
    reason: alternative_reading
  revision_rationale: Se revisa «de la vacada» a «del ganado» para lograr un español más natural y fiel al idiomatismo hebreo בֶּן בָּקָר. Se reemplaza «para expiación» por «para ofrenda por el pecado» porque חַטָּאת nombra una categoría sacrificial concreta; la alternativa de purificación se conserva en nota, conforme a la auditoría inglesa y a la tensión léxica documentada.
