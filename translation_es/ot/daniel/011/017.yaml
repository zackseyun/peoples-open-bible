  yaml_path: translation/ot/daniel/011/017.yaml
  text: He will set his face to come with the strength of his whole kingdom[a], and upright terms will be with him; and he will act. He will give him the daughter of women to destroy it, but she will not stand[d][c][b], and she will not be for him.
  footnotes:
