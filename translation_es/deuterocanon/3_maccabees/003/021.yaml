translation:
  language: es
  text: Y en estos asuntos, después de dar a conocer a todos sus compatriotas nuestra falta de resentimiento[a], y por la alianza y las innumerables cosas que se les habían confiado desde el principio de buena fe, decidimos alterar su condición y juzgarlos dignos de la ciudadanía alejandrina, y hacerlos partícipes de[b] las cosas del santuario.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «nuestra falta de rencor» o «nuestro no guardar rencor»; el término griego denota no retener agravios contra alguien.
    reason: lexical_alternative
  - marker: b
    text: Literalmente, «las cosas del santuario»; esto puede aludir de manera amplia a privilegios o responsabilidades sagradas vinculadas con el templo.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀμνησικακίαν
  english_pob_choice: lack of resentment
  chosen_spanish: falta de resentimiento
  alternatives_spanish:
  - ausencia de rencor
  - no guardarles rencor
  - falta de rencor
  lexicon: LSJ
  rationale: El sustantivo expresa no recordar ni retener agravios. «Falta de resentimiento» conserva el matiz moral de no alimentar rencor y sigue de cerca la decisión inglesa sin sonar arcaico.
- source_word: ὁμοφύλους
  english_pob_choice: their fellow countrymen
  chosen_spanish: sus compatriotas
  alternatives_spanish:
  - sus paisanos
  - sus correligionarios de pueblo
  - sus conciudadanos
  lexicon: LSJ
  rationale: El término señala a los de la misma estirpe o pueblo. En español, «compatriotas» comunica mejor la relación étnico-política que una traducción demasiado biológica.
- source_word: συμμαχίαν
  english_pob_choice: alliance
  chosen_spanish: alianza
  alternatives_spanish:
  - amistad
  - tratado
  - asociación
  lexicon: LSJ
  rationale: En un contexto real y político, la palabra designa una alianza formal, no simple amistad.
- source_word: τὰ πεπιστευμένα
  english_pob_choice: the countless matters entrusted to them
  chosen_spanish: las innumerables cosas que se les habían confiado
  alternatives_spanish:
  - los muchos asuntos confiados a ellos
  - los encargos puestos en sus manos
  - las cosas encomendadas a ellos
  lexicon: LSJ
  rationale: El participio perfecto sustantivado apunta a responsabilidades o asuntos puestos en confianza. «Se les habían confiado» mantiene el valor de encomienda y el plural amplio de πράγματα.
- source_word: μετὰ ἁπλότητος
  english_pob_choice: in good faith
  chosen_spanish: con buena fe
  alternatives_spanish:
  - con sinceridad
  - con sencillez
  - con franqueza
  lexicon: LSJ
  rationale: Aquí ἁπλότης expresa rectitud, franqueza o integridad en el confiar algo. «Con buena fe» refleja bien el tono jurídico-moral del pasaje y coincide con la revisión inglesa.
- source_word: ἐξαλλοιῶσαι
  english_pob_choice: alter their status
  chosen_spanish: alterar su condición
  alternatives_spanish:
  - cambiar su estado
  - modificar su situación
  - transformar su condición
  lexicon: LSJ
  rationale: El infinitivo significa alterar o cambiar profundamente. «Alterar su condición» es neutral y conserva la idea de cambio de estatus sin añadir más de lo que el griego exige.
- source_word: πολιτίας ... Ἀλεξανδρέων
  english_pob_choice: Alexandrian citizenship
  chosen_spanish: la ciudadanía alejandrina
  alternatives_spanish:
  - la ciudadanía de los alejandrinos
  - el estatus cívico entre los alejandrinos
  - los derechos de ciudadanía alejandrina
  lexicon: LSJ
  rationale: πολιτεία aquí se refiere al estatus cívico o ciudadanía. «Ciudadanía alejandrina» es natural en español y mantiene la concreción política.
- source_word: καταξιῶσαι
  english_pob_choice: deem them worthy of
  chosen_spanish: juzgarlos dignos de
  alternatives_spanish:
  - considerarlos dignos de
  - tenerlos por dignos de
  - declararlos dignos de
  lexicon: LSJ
  rationale: El verbo tiene el sentido de considerar o declarar digno. «Juzgarlos dignos de» conserva esa evaluación sin volverlo meramente concesivo.
- source_word: μετόχους
  english_pob_choice: sharers
  chosen_spanish: partícipes
  alternatives_spanish:
  - participantes
  - copartícipes
  - compañeros
  lexicon: LSJ
  rationale: La palabra denota quienes comparten algo. «Partícipes» es natural y mantiene el matiz de participación en algo común.
- source_word: τῶν εἰς ἱερὸν
  english_pob_choice: the things of the sanctuary
  chosen_spanish: las cosas del santuario
  alternatives_spanish:
  - los asuntos del santuario
  - las cosas sagradas
  - las prerrogativas del templo
  lexicon: LSJ
  rationale: La expresión es comprimida y puede referirse ampliamente a privilegios o responsabilidades sagradas. «Las cosas del santuario» conserva esa amplitud sin restringirla prematuramente.
theological_decisions:
- issue: Alcance de la elevación cívica y de la participación cultual
  english_pob_reading: The verse describes proposed elevation in civic status and participation in sanctuary-related privileges without specifying full ethnic assimilation or later theological categories.
  chosen_spanish_reading: El versículo describe una elevación en el estatus cívico y una participación en cosas relacionadas con el santuario, sin precisar una asimilación étnica total ni categorías teológicas posteriores.
  alternative_spanish_readings:
  - El versículo implica incorporación plena al cuerpo político alejandrino.
  - El versículo se refiere solo a privilegios de servicio en el templo.
  rationale: El griego habla de ciudadanía alejandrina y de ser constituidos partícipes de las cosas del santuario, pero no define el alcance legal o cultual exacto. La traducción mantiene esa amplitud en vez de resolverla.
  doctrine_reference: Preservar la tensión interpretativa sin cerrarla.
translation_notes:
  revision_awareness: Se tuvo en cuenta el pasaje de revisión que afinó ὁμοφύλους como «fellow countrymen», πράγματα como «matters», μετὰ ἁπλότητος como «in good faith» y ἐξαλλοιῶσαι como un cambio neutral de estatus. La versión española sigue esas precisiones y evita tanto el calco rígido como la expansión innecesaria.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma general del proyecto, pero este versículo no contiene el nombre divino.
  - Se evita «Cristo» porque no aparece Χριστός en el texto fuente.
  - «Ciudadanía alejandrina» traduce πολιτεία en clave cívica, no eclesiástica.
  - «Las cosas del santuario» conserva la amplitud del original sin forzar «templo» donde el griego es más amplio.
  - La puntuación y el orden sintáctico buscan legibilidad en español sin romper la estructura causal y coordinada del griego.
