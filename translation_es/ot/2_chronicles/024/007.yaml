revisions:
- from: Porque Atalía[a], esa mujer malvada, y sus hijos habían irrumpido en la casa de Dios y también habían hecho todos los objetos sagrados de la casa de Yahvé[b] para los Baales.
  to: Pues Atalía[a], esa mujer malvada, y sus hijos varones habían irrumpido en la casa de Dios y también habían hecho[b] todos los objetos sagrados de la casa de Yahvé para los Baales.
  rationale: Se ajustó 'Porque' a 'Pues' por mejor valor explicativo en español bíblico-natural, se corrigió 'sus hijos' a 'sus hijos varones' para reflejar el hebreo 'sons', se eliminó la coma antinatural antes de 'y', y se reubicó la nota léxica al verbo 'habían hecho', que es donde corresponde la alternativa documentada.
