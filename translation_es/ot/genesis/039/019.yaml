base_translation:
  language: en
  yaml_path: translation/ot/genesis/039/019.yaml
  text: And it happened that when his master heard the words of his wife that she spoke to him[a], saying[b], “According to these words your slave did to me,” his anger burned.
  footnotes:
  - marker: a
    text: Or, more literally, “Like these things your slave did to me.” The Hebrew expression can mean “such things” or point demonstratively to the reported accusation.
    reason: lexical_alternative
  - marker: b
    text: Or “your servant.” The Hebrew עבד can denote either, but “slave” best fits Joseph’s status in this household context.
    reason: lexical_alternative
