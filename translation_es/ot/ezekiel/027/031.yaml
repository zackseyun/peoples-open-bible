translation:
  language: es
  text: Se raparán la cabeza por ti, se ceñirán de cilicio, y llorarán por ti con amargura de alma[a], con duelo amargo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «con amargura de alma»; la expresión señala una aflicción interior profunda.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהִקְרִיחוּ
  english_pob_choice: will make themselves bald
  chosen_spanish: se raparán la cabeza
  alternatives_spanish:
  - se harán calvos
  - se cortarán el cabello en señal de duelo
  lexicon: HALOT
  rationale: El hebreo qal/hiphil en contexto de luto describe una acción ritual de afligirse con la cabeza rasurada o rapada. En español, «raparse la cabeza» conserva el gesto concreto y el valor de duelo mejor que una formulación abstracta.
- source_word: אֵלַיִךְ
  english_pob_choice: for you
  chosen_spanish: por ti
  alternatives_spanish:
  - a causa de ti
  - sobre ti
  lexicon: HALOT
  rationale: En este lamento, la preposición expresa que el duelo es suscitado por la destinataria. «Por ti» comunica bien esa relación en español y funciona naturalmente con el verbo de duelo.
- source_word: קָרְחָה
  english_pob_choice: bald
  chosen_spanish: la cabeza
  alternatives_spanish:
  - calvicie
  - la desnudez de la cabeza
  lexicon: HALOT
  rationale: El sustantivo refuerza la idea de quedar sin cabello. En español, tras «raparán» es más natural expresar el objeto como «la cabeza» para evitar una repetición forzada, sin perder el sentido de baldness ritual.
- source_word: וְחָגְרוּ שַׂקִּים
  english_pob_choice: put on sackcloth
  chosen_spanish: se ceñirán de cilicio
  alternatives_spanish:
  - se vestirán de cilicio
  - se pondrán cilicio
  lexicon: HALOT
  rationale: El hebreo literalmente dice «ceñirse sacos/cilicio». «Ceñirse de cilicio» preserva la imagen y mantiene un registro bíblico claro en español. «Poner(se) cilicio» es más llano, pero menos preciso respecto del gesto corporal.
- source_word: וּבָכוּ
  english_pob_choice: they will weep
  chosen_spanish: llorarán
  alternatives_spanish:
  - se lamentarán
  - llorarán amargamente
  lexicon: HALOT
  rationale: בכה es el verbo común «llorar/llorar en duelo». «Llorarán» es directo y natural en español; el contexto de lamento ya aporta el matiz funerario.
- source_word: אֵלַיִךְ
  english_pob_choice: over you
  chosen_spanish: por ti
  alternatives_spanish:
  - sobre ti
  - a causa de ti
  lexicon: HALOT
  rationale: Con «llorar», el español suele preferir «llorar por alguien» para expresar lamento dirigido a la persona afectada. «Sobre ti» sería más literal, pero menos idiomático.
- source_word: בְּמַר נֶפֶשׁ
  english_pob_choice: with bitterness of soul
  chosen_spanish: con amargura de alma
  alternatives_spanish:
  - con amargura interior
  - con amarga congoja
  lexicon: HALOT
  rationale: La decisión inglesa conserva la expresión antropológica «soul»; en español, «alma» mantiene esa misma forma semítica sin neutralizarla en mera emoción. «Amargura de alma» es fiel y comprensible, aunque más formal.
- source_word: מִסְפֵּד מָר
  english_pob_choice: with bitter mourning
  chosen_spanish: con duelo amargo
  alternatives_spanish:
  - con lamento amargo
  - con duelo muy amargo
  lexicon: HALOT
  rationale: La construcción intensifica el duelo. «Duelo amargo» reproduce el paralelismo y el énfasis sin añadir interpretación excesiva; «lamento» también sería posible, pero «duelo» refleja mejor la situación de mourning.
theological_decisions:
- issue: Mantenimiento del lenguaje de duelo ritual sin suavizarlo
  english_pob_reading: 'The verse describes public mourning actions: baldness, sackcloth, weeping, bitterness of soul, bitter mourning.'
  chosen_spanish_reading: 'El versículo conserva las acciones rituales de duelo: raparse, ceñirse de cilicio y llorar con amargura.'
  alternative_spanish_readings:
  - Interpretarlo de forma más general como tristeza intensa
  - Reemplazar las señales externas por una paráfrasis emocional
  rationale: No se debe diluir el carácter visible y corporal del lamento. La traducción española mantiene los signos concretos de aflicción tal como aparecen en el hebreo y en el audit trail inglés.
  doctrine_reference: No aplica; decisión de fidelidad literaria y antropológica
- issue: Retención de la expresión hebrea de interioridad 'בְּמַר נֶפֶשׁ'
  english_pob_reading: with bitterness of soul
  chosen_spanish_reading: con amargura de alma
  alternative_spanish_readings:
  - con amarga tristeza
  - con profundo dolor
  rationale: El POB inglés opta por conservar la imagen del «soul». En español, «alma» preserva esa misma antropología bíblica y evita borrar la tensión entre emoción e interioridad semítica.
  doctrine_reference: No aplica; decisión semántica sobre antropología bíblica
translation_notes:
  revision_awareness: Se siguió la revisión más reciente del audit trail inglés, que ajustó la frase de בְּמַר נֶפֶשׁ desde una formulación menos natural a «bitterness of soul». La versión española refleja esa actualización con «amargura de alma», manteniendo el paralelismo con «duelo amargo».
  spanish_consistency_notes:
  - Se usó «cilicio» para שַׂקִּים, coherente con el registro bíblico y eclesial en español.
  - Se evitó «SEÑOR» u otra sustitución teológica porque el versículo no contiene el nombre divino.
  - Se mantuvo la estructura paralela de dos miembros de lamento para reflejar el hebreo y el inglés auditado.
