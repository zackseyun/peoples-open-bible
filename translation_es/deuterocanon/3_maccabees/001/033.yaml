translation:
  language: es
  text: Habían sido instruidos[a] para obtener apoyo, y aborrecían a los que se apartaban de ellos, juzgándolos como enemigos de la nación, y privándolos de la convivencia común y del provecho comunitario[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘ayuda’ o ‘asistencia’ para ἀντιλήψεως.
    reason: lexical_alternative
  - marker: b
    text: La expresión ‘convivencia común y provecho comunitario’ se refiere a la exclusión de las relaciones sociales ordinarias y de la participación beneficiosa en la vida común.
    reason: cultural_note
lexical_decisions:
- source_word: ἐνπαιδεῖς
  english_pob_choice: instructed
  chosen_spanish: instruidos
  alternatives_spanish:
  - educados
  - disciplinados
  lexicon: LSJ
  rationale: El adjetivo indica haber recibido formación o instrucción previa. En español, 'instruidos' reproduce bien esa idea en un registro digno y natural, sin forzar una lectura más pedagógica o disciplinaria de lo que el contexto exige.
- source_word: καθηστήκεισαν
  english_pob_choice: had been
  chosen_spanish: habían sido
  alternatives_spanish:
  - estaban
  - habían quedado
  lexicon: LSJ
  rationale: El pluscuamperfecto marca un estado ya establecido antes de la acción principal. En español se integra de forma natural con 'habían sido instruidos', manteniendo el valor resultativo sin literalidad pesada.
- source_word: ἀντιλήψεως
  english_pob_choice: support
  chosen_spanish: apoyo
  alternatives_spanish:
  - ayuda
  - asistencia
  - respaldo
  lexicon: LSJ
  rationale: ἀντίληψις puede abarcar ayuda, socorro o apoyo. 'Apoyo' es suficientemente amplio para el marco comunitario y conserva el sentido social sin especificar indebidamente una ayuda material concreta.
- source_word: τεύξεσθαι
  english_pob_choice: to obtain
  chosen_spanish: para obtener
  alternatives_spanish:
  - para alcanzar
  - para recibir
  lexicon: LSJ
  rationale: El infinitivo expresa el fin o resultado buscado. 'Para obtener' es claro y se ajusta al valor de lograr/recibir algo, como en la traducción inglesa auditada.
- source_word: ἀποχωροῦντας
  english_pob_choice: withdrew
  chosen_spanish: se apartaban
  alternatives_spanish:
  - se retiraban
  - se alejaban
  - se separaban
  lexicon: LSJ
  rationale: El participio describe a quienes se retiran o se separan del grupo. 'Se apartaban' preserva la dimensión relacional y social, no solo la espacial.
- source_word: ἐβδελύσσοντο
  english_pob_choice: loathed
  chosen_spanish: aborrecían
  alternatives_spanish:
  - detestaban
  - abominaban
  lexicon: LSJ
  rationale: El verbo expresa una aversión intensa. 'Aborrecían' transmite fuerza emocional fuerte y es idiomático en español, sin perder la severidad del griego.
- source_word: πολεμίους
  english_pob_choice: enemies
  chosen_spanish: enemigos
  alternatives_spanish:
  - hostiles
  - adversarios
  lexicon: LSJ
  rationale: El término designa enemigos en sentido directo. 'Enemigos' es la equivalencia más fiel y clara, y permite conservar la carga política del pasaje.
- source_word: ἔθνους
  english_pob_choice: nation
  chosen_spanish: nación
  alternatives_spanish:
  - pueblo
  - etnia
  lexicon: LSJ
  rationale: Aquí el sustantivo refiere a la colectividad del pueblo judío como cuerpo social-político. 'Nación' reproduce esa fuerza colectiva en español mejor que 'pueblo', que podría sonar más genérico.
- source_word: κοινῆς συναναστροφῆς
  english_pob_choice: common association
  chosen_spanish: la convivencia común
  alternatives_spanish:
  - la asociación común
  - la relación social común
  - la convivencia compartida
  lexicon: LSJ
  rationale: La frase apunta a la interacción social ordinaria y compartida. 'Convivencia común' comunica de forma natural la exclusión de relaciones sociales normales, evitando un tecnicismo eclesial como 'fellowship'.
- source_word: εὐχρηστίας
  english_pob_choice: serviceability
  chosen_spanish: del servicio útil
  alternatives_spanish:
  - de la utilidad común
  - de la utilidad práctica
  - del provecho común
  lexicon: LSJ
  rationale: εὐχρηστία denota utilidad, aptitud para servir o ser provechoso. 'Servicio útil' intenta mantener la referencia a la capacidad de contribuir al bien común, siguiendo la revisión inglesa hacia un registro más formal.
- source_word: ἐστέροῦν
  english_pob_choice: depriving
  chosen_spanish: privándolos de
  alternatives_spanish:
  - despojándolos de
  - excluyéndolos de
  lexicon: LSJ
  rationale: El verbo significa privar o despojar de algo. 'Privándolos de' conserva la estructura con complemento y expresa con claridad la exclusión social y funcional.
theological_decisions:
- issue: ἔθνος como identidad colectiva
  english_pob_reading: nation
  chosen_spanish_reading: nación
  alternative_spanish_readings:
  - pueblo
  - etnia
  rationale: El pasaje presenta una solidaridad colectiva y política dentro del grupo judío. 'Nación' preserva esa identidad corporativa sin introducir matices modernos ajenos al contexto.
  doctrine_reference: Translation philosophy §1, §6
- issue: Exclusión de la vida social común en κοινῆς συναναστροφῆς καὶ εὐχρηστίας
  english_pob_reading: common association and serviceability
  chosen_spanish_reading: la convivencia común y del servicio útil
  alternative_spanish_readings:
  - la asociación común y la utilidad
  - la convivencia compartida y el provecho común
  - la relación social común y la utilidad práctica
  rationale: La frase señala privación de relaciones ordinarias y de participación beneficiosa en la vida común. 'Convivencia común y servicio útil' mantiene tanto el aspecto social como el funcional, sin convertir el texto en lenguaje eclesiástico ajeno al griego.
  doctrine_reference: Translation philosophy §5, §6
translation_notes:
  revision_awareness: 'Se tuvo en cuenta la revisión inglesa más reciente, que prefirió ''instructed'' y ''serviceability'' para un registro más formal. La redacción española sigue esa orientación, pero adapta ''serviceability'' a una solución idiomática en español (''servicio útil'') para no sacrificar claridad. También se mantuvo la tensión social del texto: no solo exclusión emocional, sino privación de convivencia y de participación útil en la comunidad.'
  spanish_consistency_notes:
  - Se usó 'nación' para ἔθνος, conforme al audit trail inglés, y se evitó sustituirlo por 'pueblo' salvo en nota alternativa.
  - Se prefirió 'apoyo' como término amplio para ἀντίληψις, con nota sobre alternativas léxicas.
  - Se mantuvo un registro formal y público, evitando calcos demasiado rígidos.
  - '''Convivencia común'' traduce la dimensión social de κοινῆς συναναστροφῆς sin trasladarla a lenguaje confesional.'
