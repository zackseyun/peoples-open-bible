revisions:
- from: Pero Jonatán no había oído cuando su padre puso al pueblo bajo juramento[a], de modo que extendió la punta del bastón que tenía en su mano, la metió en el panal de miel y volvió su mano a su boca[b]; y sus ojos se reanimaron.
  to: Pero Jonatán no había oído cuando su padre puso al pueblo bajo juramento[a], así que extendió la punta del bastón que tenía en su mano, la mojó en el panal de miel y se llevó la mano a la boca[b], y sus ojos se iluminaron.
  rationale: Se ajustó el verbo de inmersión para reflejar mejor וַיִּטְבֹּל, se reemplazó una construcción rígida por una expresión española más natural para el movimiento hacia la boca, y se restauró la imagen idiomática de los ojos con una nota explicativa ya justificada por la auditoría inglesa.
