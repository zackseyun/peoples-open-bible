translation:
  language: es
  text: Metan la hoz[a], porque la mies está madura. Vengan, pisen, porque el lagar está lleno; las cubas rebosan, porque grande es su maldad[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «desciendan»; algunas traducciones ponen «pisen» porque el mandato probablemente imagina entrar al lagar para pisar las uvas.
    reason: lexical_alternative
  - marker: b
    text: O «su mal es grande».
    reason: lexical_alternative
lexical_decisions:
- source_word: שִׁלְחוּ
  english_pob_choice: Send in
  chosen_spanish: Pongan
  alternatives_spanish:
  - Envíen
  - Metan
  lexicon: HALOT
  rationale: El imperativo plural transmite la acción de aplicar el instrumento de siega. En español, «poner la hoz» reproduce con naturalidad la imagen agrícola sin forzar un calco poco idiomático como «enviad en».
- source_word: מַגָּל
  english_pob_choice: the sickle
  chosen_spanish: la hoz
  alternatives_spanish:
  - la podadera
  - la guadaña
  lexicon: HALOT
  rationale: El instrumento de segar aquí corresponde a una hoz. «Hoz» es el término usual y fiel al objeto agrícola del texto.
- source_word: בָשַׁל
  english_pob_choice: is ripe
  chosen_spanish: está madura
  alternatives_spanish:
  - está lista
  - ha madurado
  lexicon: HALOT
  rationale: Con «mies», el valor verbal es de madurez para la cosecha. «Está madura» conserva la imagen de readiness para la siega sin añadir explicación.
- source_word: קָצִיר
  english_pob_choice: the harvest
  chosen_spanish: la mies
  alternatives_spanish:
  - la cosecha
  - la siega
  lexicon: HALOT
  rationale: «Mies» mantiene el campo semántico agrícola y sugiere el grano listo para segar, con una sonoridad bíblica adecuada en español. «Cosecha» sería más general, pero menos precisa para esta imagen.
- source_word: בֹּאוּ
  english_pob_choice: Come
  chosen_spanish: Vengan
  alternatives_spanish:
  - Entren
  - Acérquense
  lexicon: HALOT
  rationale: El plural exhortativo se expresa naturalmente con «Vengan», que conserva el tono de llamada inmediata.
- source_word: רְדוּ
  english_pob_choice: tread
  chosen_spanish: pisen
  alternatives_spanish:
  - desciendan
  - bajen
  lexicon: HALOT
  rationale: La revisión inglesa optó por «tread» por el contexto del lagar. En español, «pisen» comunica de manera directa la acción de pisar las uvas y conserva la fuerza imagética; el posible matiz de «bajar» queda implícito en el contexto del lagar.
- source_word: גַּת
  english_pob_choice: the winepress
  chosen_spanish: el lagar
  alternatives_spanish:
  - el lagar de vino
  - la prensa
  lexicon: HALOT
  rationale: «Lagar» es el equivalente español tradicional y preciso para la instalación donde se pisan las uvas. Es más natural que un literalismo como «prensa».
- source_word: הֵשִׁיקוּ
  english_pob_choice: overflow
  chosen_spanish: rebosan
  alternatives_spanish:
  - se derraman
  - se desbordan
  lexicon: HALOT
  rationale: El verbo indica llegar al borde o rebosar. «Rebosan» reproduce bien el resultado visible y mantiene el paralelismo con «está lleno».
- source_word: יְקָבִים
  english_pob_choice: the vats
  chosen_spanish: las tinajas
  alternatives_spanish:
  - los lagares
  - las cubas
  lexicon: HALOT
  rationale: Aunque el término puede referir receptáculos del proceso del vino, «tinajas» es un equivalente claro y comprensible en español bíblico. «Cubas» también sería posible, pero menos solemne.
- source_word: רַבָּה
  english_pob_choice: is great
  chosen_spanish: grande es
  alternatives_spanish:
  - es mucha
  - es abundante
  lexicon: HALOT
  rationale: La inversión normal española «grande es su maldad» conserva el énfasis predicativo del hebreo sin resultar forzada.
- source_word: רָעָתָם
  english_pob_choice: their evil
  chosen_spanish: su maldad
  alternatives_spanish:
  - su mal
  - su perversidad
  lexicon: HALOT
  rationale: En este contexto de juicio, el sustantivo señala maldad moral. «Maldad» conserva la amplitud semántica y es más idiomática que «su mal».
theological_decisions:
- issue: Imagen de siega y lagar como juicio divino
  english_pob_reading: Retain the agricultural metaphors directly rather than interpret them in the main text as explicit judgment language.
  chosen_spanish_reading: Conservar las imágenes agrícolas sin explicarlas en el texto principal como juicio explícito.
  alternative_spanish_readings:
  - Reapten a las naciones en juicio
  - Expliquen el sentido como castigo divino
  rationale: El hebreo presenta metáforas proféticas de siega y lagar; la traducción española debe mantener esa tensión imaginativa sin convertirla en paráfrasis interpretativa.
  doctrine_reference: Principio de equivalencia óptima y preservación de la imagen profética.
- issue: Sentido de רָעָתָם
  english_pob_reading: Moral evil/wickedness
  chosen_spanish_reading: maldad moral
  alternative_spanish_readings:
  - calamidad
  - desgracia
  rationale: 'Aquí la cláusula causal explica por qué procede la escena de juicio: la maldad es grande. «Calamidad» trasladaría el foco al sufrimiento, alterando la relación causal del verso.'
  doctrine_reference: Lectura léxica contextual del sustantivo רָעָה en el marco profético.
translation_notes:
  revision_awareness: Se siguió la revisión más reciente del audit trail inglés que ajustó רְדוּ de «go down» a «tread» por el contexto del lagar. En español, se eligió «pisen» para reflejar esa misma decisión revisada sin perder la posibilidad semántica de descenso implícito en la escena. También se mantuvo la opción léxica de interpretar רָעָה como maldad moral, no como calamidad.
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el texto fuente lo requiera; este versículo no contiene el nombre divino explícito.
  - 'Se mantiene una terminología agrícola coherente: «hoz», «mies», «lagar», «tinajas».'
  - 'Se conserva el tono imperativo plural del hebreo con verbos en segunda persona plural: «Pongan», «Vengan», «pisen».'
