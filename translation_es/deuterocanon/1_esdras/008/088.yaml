translation:
  language: es
  text: He aquí[a], estamos delante de ti en nuestros actos de iniquidad[b], porque ya no hay manera de estar en pie delante de ti por estas cosas.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Mira». El griego ἰδοὺ introduce la confesión con fuerza deíctica y solemne; «He aquí» conserva mejor ese tono en este contexto.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «en nuestras iniquidades» o «en nuestra iniquidad». El griego ἀνομίαι puede referirse tanto a actos de transgresión como al estado de culpa que resulta de ellos.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἰδοὺ
  english_pob_choice: Behold
  chosen_spanish: ¡Mira!
  alternatives_spanish:
  - He aquí
  - Mira
  lexicon: BDAG
  rationale: La interjección introduce una confesión solemne. En español, «¡Mira!» conserva la fuerza deíctica y suena natural; «He aquí» sería más tradicional, pero más marcado y menos conversacional.
- source_word: ἐσμὲν ἐνώπιόν σου
  english_pob_choice: we are before you
  chosen_spanish: Estamos delante de ti
  alternatives_spanish:
  - Estamos en tu presencia
  - Estamos ante ti
  lexicon: BDAG
  rationale: «Delante de ti» reproduce la orientación relacional/judicial sin añadir el matiz de permanencia que podría sugerir «estamos de pie». Mantiene la simplicidad del griego.
- source_word: ἐν ταῖς ἀνομίαις ἡμῶν
  english_pob_choice: in our lawless deeds
  chosen_spanish: en nuestras iniquidades
  alternatives_spanish:
  - en nuestros actos de iniquidad
  - en nuestra impiedad
  - en nuestras acciones sin ley
  lexicon: BDAG
  rationale: Aunque el audit trail inglés opta por «lawless deeds», en español «iniquidades» transmite mejor el registro bíblico de confesión y conserva la ambigüedad entre actos culpables y estado de culpa. La alternativa más literal, «actos sin ley», suena forzada en español.
- source_word: οὐ γάρ ἐστιν στῆναι ἔτι ἔμπροσθέν σου ἐπὶ τούτοις
  english_pob_choice: for there is no longer any standing before you because of these things
  chosen_spanish: porque ya no hay posibilidad de estar en pie delante de ti por estas cosas
  alternatives_spanish:
  - porque ya no es posible permanecer delante de ti por estas cosas
  - pues ya no puede uno mantenerse en pie ante ti por causa de esto
  lexicon: BDAG
  rationale: La construcción infinitiva pide una solución natural en español. «Hay posibilidad de estar en pie» conserva el valor de στάναι y deja visible la imagen judicial/cultual de no poder mantenerse ante Dios. «Por estas cosas» reproduce la causalidad de ἐπὶ τούτοις.
theological_decisions:
- issue: Sentido penitencial de ἀνομίαις en una confesión ante Dios
  english_pob_reading: lawless deeds
  chosen_spanish_reading: iniquidades
  alternative_spanish_readings:
  - iniquidades / actos de iniquidad
  - iniquidad
  - acciones sin ley
  rationale: La escena es una confesión corporativa de culpa. «Iniquidades» preserva el peso moral y litúrgico de la frase sin convertirla en una explicación doctrinal estrecha. En nota se puede recordar que el griego también admite el matiz de «actos sin ley».
  doctrine_reference: 'DOCTRINE.md: original-language primacy; preserve lexical tension where warranted'
- issue: Cómo reflejar la imagen de «estar en pie» ante Dios
  english_pob_reading: there is no longer any standing before you
  chosen_spanish_reading: ya no hay posibilidad de estar en pie delante de ti
  alternative_spanish_readings:
  - ya no hay modo de permanecer delante de ti
  - ya no podemos sostenernos en tu presencia
  rationale: Se conserva la imagen judicial/cultual de comparecer ante Dios y quedar sin firmeza delante de él. No se la suaviza a un mero sentimiento de vergüenza, porque el griego expresa incapacidad objetiva de presentarse con derecho o sostén.
  doctrine_reference: 'PHILOSOPHY.md: maintain courtroom/cultic force of the source imagery'
translation_notes:
  revision_awareness: 'El draft sigue el giro final del audit trail inglés, pero vuelve al texto griego como fuente primaria: conserva la confesión de presencia delante de Dios, traduce ἀνομίαι con un término bíblico español estable («iniquidades») y mantiene la imagen de no poder estar en pie ante él por causa de esos pecados, sin expandirla hacia la destrucción total sugerida por el paralelo hebreo.'
  spanish_consistency_notes:
  - Se usó «delante de ti / delante de Dios» en sentido relacional y judicial, coherente con la terminología POB.
  - Se evitó «SEÑOR» para el nombre divino porque este versículo usa un pronombre de segunda persona dirigido a Dios.
  - «Iniquidades» se eligió por registro bíblico y porque el contexto penitencial lo vuelve más natural que una traducción demasiado técnica.
  - La expresión «estar en pie» se conservó para reflejar στῆναι sin perder naturalidad en español.
