revisions:
- from: Por tanto, el Creador del mundo[a], el que formó el origen del hombre y descubrió el origen de todas las cosas, les devolverá de nuevo con misericordia el espíritu y la vida[b], puesto que ahora ustedes se menosprecian a sí mismos por causa de sus leyes.
  to: Por tanto, el Creador del mundo, el que formó el origen del hombre[b] e ideó el origen de todas las cosas, les devolverá con misericordia el espíritu[a] y la vida, puesto que ahora ustedes desatienden su propia vida por causa de sus leyes.
  rationale: Se corrigió «descubrió» a «ideó» para ajustarse al sentido creador de ἐξευρὼν γένεσιν en el contexto. Se suavizó «se menosprecian a sí mismos» a «desatienden su propia vida», que expresa mejor el sentido martirial de ὑπερορᾶτε ἑαυτούς. Se eliminó la redundancia de «de nuevo» con «devolverá». También se recolocaron las notas para que el marcador de πνεῦμα aparezca en «espíritu» y el de ἀνθρώπου γένεσιν en «origen del hombre», conforme al contenido de cada nota y a las reglas del proyecto.
