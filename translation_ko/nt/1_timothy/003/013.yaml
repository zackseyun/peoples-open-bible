id: 1TI.3.13
reference: 1 Timothy 3:13
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: οἱ γὰρ καλῶς διακονήσαντες βαθμὸν ἑαυτοῖς καλὸν περιποιοῦνται καὶ πολλὴν παρρησίαν ἐν πίστει τῇ ἐν Χριστῷ Ἰησοῦ.
base_translation:
  language: en
  yaml_path: translation/nt/1_timothy/003/013.yaml
  text: For those who have served well obtain for themselves a good standing and great boldness in the faith that is in Messiah Jesus[a][b][c].
  footnotes:
  - marker: a
    text: Or 'great confidence'; the Greek word can denote boldness, confidence, or frankness.
    reason: lexical_alternative
  - marker: b
    text: Or 'in faithfulness that is in Messiah Jesus.' The Greek πίστις can mean 'faith,' 'trust,' or 'faithfulness'; the main text follows the project's default rendering.
    reason: alternative_reading
  - marker: c
    text: Greek 'Christ'; rendered 'Messiah' here because the term functions as a title.
    reason: lexical_alternative
translation:
  language: ko
  text: 잘 섬긴 자들은 자기를 위한 좋은 지위와 더불어, 메시아[c] 예수 안에 있는 믿음 안에서 큰 담대함[a][b]을 얻습니다.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 또는 「큰 확신」. 헬라어 παρρησία는 「담대함·확신·솔직함」의 폭을 가진다.
    reason: lexical_alternative
  - marker: b
    text: 또는 「메시아 예수 안에 있는 신실함」. πίστις는 「믿음·신뢰·신실함」으로 옮길 수 있으나, 본문은 기본값 「믿음」을 따른다.
    reason: alternative_reading
  - marker: c
    text: 헬라어 「그리스도」; 본 번역은 칭호의 무게를 살려 「메시아」로 옮긴다.
    reason: lexical_alternative
lexical_decisions:
- source_word: οἱ καλῶς διακονήσαντες
  english_pob_choice: those who have served well
  chosen_korean: 잘 섬긴 자들
  alternatives_korean:
  - 잘 봉사한 자들
  - 잘 집사 직무를 수행한 자들
  lexicon: BDAG
  rationale: διακονέω의 일반적 「섬김」과 직무적 「집사 사역」 모두 가능. 「잘 섬긴 자들」이 두 의미를 포용.
- source_word: βαθμὸν ἑαυτοῖς καλὸν περιποιοῦνται
  english_pob_choice: obtain for themselves a good standing
  chosen_korean: 자기를 위한 좋은 지위를 ~ 얻습니다
  alternatives_korean:
  - 좋은 자리를 얻습니다
  - 좋은 신분을 얻습니다
  lexicon: BDAG
  rationale: βαθμός는 「계단·지위」. 「좋은 지위」가 자연스럽다.
- source_word: πολλὴν παρρησίαν
  english_pob_choice: great boldness
  chosen_korean: 큰 담대함
  alternatives_korean:
  - 큰 확신
  - 큰 솔직함
  lexicon: BDAG
  rationale: παρρησία는 한국 신학 어휘 「담대함」.
- source_word: ἐν πίστει τῇ ἐν Χριστῷ Ἰησοῦ
  english_pob_choice: in the faith that is in Messiah Jesus
  chosen_korean: 메시아 예수 안에 있는 믿음 안에서
  alternatives_korean:
  - 메시아 예수 안의 그 믿음 가운데서
  - 메시아 예수께 대한 믿음 안에서
  lexicon: BDAG
  rationale: 두 차례의 ἐν을 살려 「~안에 있는 ~ 안에서」 구조를 보존한다.
