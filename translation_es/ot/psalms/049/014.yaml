translation:
  language: es
  text: Este es su camino—su necedad[a]; pero después de ellos, otros aprueban[b] sus palabras. Selah
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: "sus descendientes se deleitan en su boca", es decir, en lo que dicen.'
    reason: alternative_reading
  - marker: b
    text: 'Hebreo: "su boca"; se traduce "sus palabras" por naturalidad en español.'
    reason: lexical_alternative
lexical_decisions:
- source_word: זֶה
  english_pob_choice: This is
  chosen_spanish: Este es
  alternatives_spanish:
  - Este
  lexicon: HALOT
  rationale: El hebreo usa un pronombre demostrativo que introduce un juicio resumido. En español, 'Este es' conserva la deixis y produce una frase natural y completa.
- source_word: דַרְכָּם
  english_pob_choice: their way
  chosen_spanish: su camino
  alternatives_spanish:
  - su senda
  - su conducta
  lexicon: HALOT
  rationale: דֶּרֶךְ puede ser camino, senda o conducta. 'Su camino' mantiene la metáfora y también el sentido ético de manera de vivir.
- source_word: כֵּסֶל
  english_pob_choice: their folly
  chosen_spanish: su necedad
  alternatives_spanish:
  - su insensatez
  - su estupidez
  - su confianza
  lexicon: HALOT
  rationale: Aquí el contexto es evaluativo y crítico; el término puede significar necedad o, en otros pasajes, confianza. 'Necedad' conserva mejor esa valoración sin suavizarla.
- source_word: לָמוֹ
  english_pob_choice: their
  chosen_spanish: su
  alternatives_spanish:
  - para ellos
  - de ellos
  lexicon: HALOT
  rationale: El valor de לָמוֹ se integra idiomáticamente en español con el posesivo 'su', que expresa con claridad la relación sin forzar la sintaxis.
- source_word: וְאַחֲרֵיהֶם
  english_pob_choice: yet after them
  chosen_spanish: pero después de ellos
  alternatives_spanish:
  - y después de ellos
  - y quienes vienen después de ellos
  - y sus descendientes después de ellos
  lexicon: HALOT
  rationale: La frase hebrea puede referirse a sucesores en general o a descendientes. 'Pero después de ellos' conserva la secuencia temporal y el matiz irónico sin cerrar indebidamente el referente.
- source_word: בְּפִיהֶם
  english_pob_choice: their mouth
  chosen_spanish: sus palabras
  alternatives_spanish:
  - su boca
  - lo que dicen
  lexicon: HALOT
  rationale: Literalmente es 'en su boca'. En español, 'sus palabras' expresa con naturalidad el contenido del decir y refleja la decisión inglesa de evitar una literalidad torpe.
- source_word: יִרְצ֣וּ
  english_pob_choice: approve
  chosen_spanish: aprueban
  alternatives_spanish:
  - se complacen en
  - aceptan
  - se deleitan en
  lexicon: HALOT
  rationale: רצה en qal puede significar agradar, aceptar o mostrar favor. 'Aprueban' comunica de manera breve y clara la reacción favorable a sus dichos.
- source_word: סֶלָה
  english_pob_choice: Selah
  chosen_spanish: Selah
  lexicon: HALOT
  rationale: Se conserva la transliteración tradicional porque su función exacta es incierta y probablemente es una indicación litúrgica o musical.
theological_decisions:
- issue: Referencia de וְאַחֲרֵיהֶם
  english_pob_reading: later people who follow them or come after them approve their words
  chosen_spanish_reading: otros después de ellos aprueban sus palabras
  alternative_spanish_readings:
  - sus descendientes aprueban sus palabras
  - quienes vienen después de ellos aprueban sus palabras
  rationale: El hebreo permite tanto sucesores en general como descendientes. La redacción elegida mantiene la ambigüedad sin especificar más de lo que el texto garantiza, en línea con la lectura auditada.
  doctrine_reference: Preservar la tensión interpretativa en vez de resolverla
translation_notes:
  revision_awareness: 'El texto base y la auditoría inglesa muestran un consenso alto con observaciones menores: la posible ambigüedad de כֵּסֶל y el alcance de וְאַחֲרֵיהֶם. La versión española conserva ambas tensiones sin sobreinterpretarlas.'
  spanish_consistency_notes:
  - Se usa 'Selah' sin adaptar, como marcador litúrgico/musical incierto.
  - Se prefirió 'necedad' para כֵּסֶל por el tono evaluativo del verso.
  - '''Sus palabras'' traduce una metáfora corporal hebrea con naturalidad, siguiendo el criterio auditado.'
  - La frase 'otros después de ellos' mantiene abierta la referencia de וְאַחֲרֵיהֶם.
