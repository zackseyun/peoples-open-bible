translation:
  language: es
  text: antes de que el cordón de plata[a] se rompa, y el cuenco de oro sea hecho pedazos, y la jarra[b] se rompa junto al manantial, y la rueda[c] sea aplastada junto a la fosa[d].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «sea quitado», «sea cortado» o, tradicionalmente, «sea soltado»; el verbo hebreo aquí es difícil en contexto.
    reason: lexical_alternative
  - marker: b
    text: O «cántaro» para «jarra».
    reason: lexical_alternative
  - marker: c
    text: La «rueda» puede referirse más específicamente a una rueda de pozo o a una polea.
    reason: lexical_alternative
  - marker: d
    text: O «cisterna» o «pozo» en lugar de «fosa».
    reason: lexical_alternative
lexical_decisions:
- source_word: עַד אֲשֶׁר לֹא
  english_pob_choice: before
  chosen_spanish: antes de que
  alternatives_spanish:
  - hasta que no
  - antes de
  lexicon: HALOT
  rationale: En español, la construcción temporal natural para introducir el momento previo a la muerte es «antes de que». Conserva la fuerza de límite temporal del hebreo sin volverlo artificial.
- source_word: ירחק
  english_pob_choice: is snapped
  chosen_spanish: sea roto
  alternatives_spanish:
  - sea quitado
  - sea separado
  - sea desatado
  lexicon: HALOT
  rationale: El verbo hebreo es difícil en contexto; la POB inglesa preserva la incertidumbre con «snapped» y nota alternativa. En español, «sea roto» comunica la fractura o ruptura súbita sin resolver demasiado el valor exacto del verbo.
- source_word: חֶבֶל הַכֶּסֶף
  english_pob_choice: the silver cord
  chosen_spanish: el cordón de plata
  alternatives_spanish:
  - el cordón plateado
  - la cuerda de plata
  lexicon: HALOT
  rationale: «Cordón de plata» mantiene la imagen metálica y el valor constructo del hebreo. «Cordón» suena natural en español y conserva el símbolo poético.
- source_word: וְתָרֻץ
  english_pob_choice: is shattered
  chosen_spanish: sea hecha pedazos
  alternatives_spanish:
  - sea quebrada
  - sea triturada
  - sea destrozada
  lexicon: HALOT
  rationale: El verbo expresa quiebre violento. «Hecha pedazos» conserva la intensidad de fragmentación mejor que un simple «rota» y mantiene el paralelismo poético.
- source_word: גֻּלַּת הַזָּהָב
  english_pob_choice: the golden bowl
  chosen_spanish: la copa de oro
  alternatives_spanish:
  - el cuenco de oro
  - el tazón de oro
  lexicon: HALOT
  rationale: Aunque el término puede referir a una vasija o cuenco, «copa» es un equivalente natural y digno en español para un recipiente de valor, y preserva la imagen poética sin sobreespecificar su función.
- source_word: וְתִשָּׁבֶר כַּד
  english_pob_choice: the jar is broken
  chosen_spanish: la jarra sea rota
  alternatives_spanish:
  - la vasija sea rota
  - la tinaja sea rota
  lexicon: HALOT
  rationale: «Jarra» es claro y acorde al contexto de sacar agua. «Sea rota» sigue el paralelismo con los otros pasivos del verso y mantiene el tono poético.
- source_word: עַל הַמַּבּוּעַ
  english_pob_choice: at the spring
  chosen_spanish: junto al manantial
  alternatives_spanish:
  - en el manantial
  - a la fuente
  lexicon: HALOT
  rationale: «Manantial» comunica bien מַבּוּעַ en español moderno y «junto a» refleja mejor la relación espacial que un calco rígido. La imagen de agua se conserva con naturalidad.
- source_word: וְנָרֹץ
  english_pob_choice: is crushed
  chosen_spanish: sea aplastada
  alternatives_spanish:
  - sea rota
  - sea hecha pedazos
  - sea destrozada
  lexicon: HALOT
  rationale: Para la rueda, «aplastada» comunica destrucción violenta y distinta de la copa/jarra, evitando una repetición excesiva mientras mantiene la fuerza del hebreo.
- source_word: הַגַּלְגַּל
  english_pob_choice: the wheel
  chosen_spanish: la rueda
  alternatives_spanish:
  - la polea
  - la rueda del pozo
  lexicon: HALOT
  rationale: «Rueda» es la traducción directa y clara. El posible matiz de rueda de pozo o polea se conserva en nota, sin introducirlo de modo innecesario en el texto principal.
- source_word: אֶל הַבּוֹר
  english_pob_choice: at the pit
  chosen_spanish: junto al pozo
  alternatives_spanish:
  - al pozo
  - en el pozo
  - junto a la cisterna
  lexicon: HALOT
  rationale: La revisión inglesa prefirió reflejar la preposición de cercanía/ubicación más que movimiento. «Junto al pozo» mantiene esa precisión y encaja con la escena de extracción de agua, dejando abierta la posible acepción de pozo/cisterna.
theological_decisions:
- issue: Imagen poética de la muerte y el envejecimiento
  english_pob_reading: Retain the sequence of broken household/well objects as poetic metaphors for death without explicating body-part allegories in the main text.
  chosen_spanish_reading: Conservar la secuencia de objetos quebrados como metáforas poéticas de la muerte, sin desarrollar en el texto principal una alegoría detallada de partes del cuerpo.
  alternative_spanish_readings:
  - Hacer explícita una alegoría del cuerpo envejecido
  - Parafrasear la imagen como el deterioro físico general
  rationale: El hebreo admite varias lecturas y la POB inglesa preserva la tensión interpretativa. La versión española mantiene la imagen literal y poética para no resolver una ambigüedad que el texto no resuelve.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: La revisión inglesa más reciente corrigió la preposición final de “into the pit” a “at the pit”; por eso la versión española evita un movimiento direccional y usa «junto al pozo», manteniendo también la relación espacial del hebreo. Se conservó el resto del verso como imagen poética de ruina corporal/mortal sin explicitar alegorías.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» como preferencia general del proyecto, aunque este versículo no contiene el tetragrámaton.
  - Se eligió un registro moderno y digno, evitando arcaísmos innecesarios.
  - Se preservó la repetición de pasivos para reflejar el paralelismo del hebreo.
  - Las notas distinguen entre equivalencias léxicas posibles sin sobrecargar el texto principal.
