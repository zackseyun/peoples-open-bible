review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador capta bien la estructura general del versículo y la mayoría de las decisiones léxicas del hebreo: ''actos'', ''poder'', ''grandeza de Mardoqueo'', la fórmula archivística ''¿no están escritos...?'' y ''el libro de las crónicas de los reyes de Media y Persia'' reflejan adecuadamente el original. Sin embargo, introduce dos desviaciones importantes: (1) divide en dos preguntas una sola oración retórica continua del hebreo, y (2) ''su valentía'' para גבורתוֹ desplaza el sentido de ''might/mightiness'' hacia coraje personal, menos apto en un resumen regio.'
  spanish_quality_summary: El español es claro y digno, pero puede mejorarse para sonar más natural y más fiel al tono de registro histórico. 'Valentía' suena demasiado heroico-personal; 'poderío' o 'fuerza' encajan mejor en la pareja con 'poder'. También conviene evitar la repetición de dos preguntas separadas, ya que en español una sola pregunta larga reproduce mejor la fórmula hebrea.
  glossary_alignment: No hay términos del glosario principal en juego como Yahvé/Mesías. En léxico relevante del pasaje, el borrador sigue bien 'crónicas' y 'grandeza', pero no preserva adecuadamente la decisión inglesa documentada para גְבוּרָתוֹ ('might'), que en español debe evitar 'valentía'. También falta trasladar la nota inglesa sobre 'annals/anales'; la nota actual sobre 'poder' no corresponde a la nota del POB auditado.
  issues:
  - severity: high
    issue: '''su valentía'' para גְבוּרָתוֹ'
    rationale: גְבוּרָה junto a תָקְפּוֹ describe poderío/might real, no principalmente coraje o valentía. 'Valentía' reinterpreta el campo semántico hacia una virtud personal heroica.
  - severity: medium
    issue: La pregunta retórica hebrea fue dividida en dos preguntas
    rationale: הֲלוֹא הֵם כְּתוּבִים introduce una sola fórmula historiográfica que abarca todo lo anterior. Mantenerla como una única pregunta en español preserva mejor el flujo del original y del POB inglés.
  - severity: medium
    issue: La nota al pie no coincide con la alternativa preservada por el POB inglés
    rationale: La nota inglesa documenta una alternativa para סֵפֶר דִּבְרֵי הַיָּמִים ('the book of the annals...'), no para תָקְפּוֹ. La revisión debe trasladar esa alternativa léxica pertinente al español.
  revised_spanish_text: Y todos los actos de su poder y de su poderío, y la narración completa de la grandeza de Mardoqueo, a quien el rey engrandeció, ¿no están escritos en el libro de las crónicas[a] de los reyes de Media y Persia?
  revised_footnotes:
  - marker: a
    text: O 'el libro de los anales de los reyes de Media y Persia'.
    reason: lexical_alternative
  revision_rationale: Se reemplaza 'valentía' por 'poderío' para reflejar mejor גְבוּרָתוֹ en paralelo con 'poder'; se recompone la oración como una sola pregunta retórica, conforme al hebreo; y se mueve la nota al pie a 'crónicas' para preservar la alternativa documentada 'anales'.
