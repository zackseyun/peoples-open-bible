translation:
  language: es
  text: 'Él respondió y dijo[a]: «¡Mira! Veo cuatro hombres desatados, caminando en medio del fuego, y no hay daño en ellos; y el aspecto del cuarto es como un hijo de los dioses».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, siguiendo la interpretación cristiana tradicional, «como el Hijo de Dios». El arameo dice más literalmente «como un hijo de los dioses», reflejando la perspectiva del propio Nabucodonosor.
    reason: alternative_reading
lexical_decisions:
- source_word: הָא
  english_pob_choice: Look!
  chosen_spanish: ¡Mira!
  alternatives_spanish:
  - ¡Mira bien!
  - ¡Fíjate!
  - ¡He aquí!
  lexicon: HALOT
  rationale: La partícula aramea introduce una observación enfática y repentina. «¡Mira!» transmite bien esa deíxis inmediata en español moderno sin sonar arcaico.
- source_word: חָזֵה
  english_pob_choice: I see
  chosen_spanish: Veo
  alternatives_spanish:
  - Estoy viendo
  - Contemplo
  - Percibo
  lexicon: HALOT
  rationale: El presente simple en español expresa la percepción inmediata del rey con naturalidad y conserva el valor observacional del verbo.
- source_word: גֻּבְרִין
  english_pob_choice: men
  chosen_spanish: hombres
  alternatives_spanish:
  - personas
  - varones
  - mancebos
  lexicon: HALOT
  rationale: El término designa varones/hombres; «hombres» es fiel, claro y no diluye el rasgo lexical.
- source_word: שְׁרַיִן
  english_pob_choice: unbound
  chosen_spanish: desatados
  alternatives_spanish:
  - sueltos
  - libres
  - desligados
  lexicon: HALOT
  rationale: La idea es la de ligaduras quitadas, en contraste con haber sido atados antes. «Desatados» conserva esa imagen concreta mejor que «libres».
- source_word: מַהְלְכִין
  english_pob_choice: walking
  chosen_spanish: caminando
  alternatives_spanish:
  - andando
  - yendo
  - paseando
  lexicon: HALOT
  rationale: El participio describe acción continua; «caminando» suena natural y mantiene el movimiento visible dentro del fuego.
- source_word: בְּגֽוֹא נוּרָא
  english_pob_choice: in the midst of the fire
  chosen_spanish: en medio del fuego
  alternatives_spanish:
  - en el centro del fuego
  - dentro del fuego
  - en medio de las llamas
  lexicon: HALOT
  rationale: «En medio de» reproduce bien la fuerza locativa del arameo sin recargar el estilo.
- source_word: וַחֲבָל לָא אִיתַי בְּהוֹן
  english_pob_choice: and there is no harm on them
  chosen_spanish: y no hay daño en ellos
  alternatives_spanish:
  - y no tienen ningún daño
  - y no hay herida en ellos
  - y están ilesos
  lexicon: HALOT
  rationale: La construcción expresa ausencia de daño/injuria. «No hay daño en ellos» es cercano al arameo y claro en español.
- source_word: רֵוֵהּ
  english_pob_choice: appearance
  chosen_spanish: aspecto
  alternatives_spanish:
  - apariencia
  - semblante
  - forma
  lexicon: HALOT
  rationale: En este contexto visual, «aspecto» suena natural y conserva el valor perceptible sin sugerir identidad.
- source_word: דִּי רביעיא
  english_pob_choice: of the fourth
  chosen_spanish: del cuarto
  alternatives_spanish:
  - del cuarto hombre
  - del cuarto ser
  - del cuarto en número
  lexicon: HALOT
  rationale: El genitivo arameo señala al cuarto de los cuatro; en español, «del cuarto» es compacto y suficiente en contexto.
- source_word: דָּמֵה
  english_pob_choice: is like
  chosen_spanish: se parece al
  alternatives_spanish:
  - es como
  - es semejante a
  - se asemeja a
  lexicon: HALOT
  rationale: El verbo compara sin identificar. «Se parece al» preserva esa cautela fenomenológica del hablante.
- source_word: לְבַר אֱלָהִין
  english_pob_choice: like a son of the gods
  chosen_spanish: a un hijo de los dioses
  alternatives_spanish:
  - a un hijo de Dios
  - a un hijo de un dios
  - a un ser divino
  lexicon: HALOT
  rationale: La forma aramea es indefinida y plural («dioses»), por lo que la traducción debe reflejar la perspectiva de Nabucodonosor sin importar una identificación posterior. «Un hijo de los dioses» mantiene esa lectura original.
theological_decisions:
- issue: Identidad de la cuarta figura
  english_pob_reading: 'Render the king''s words phenomenologically and from his own perspective: ''like a son of the gods.'''
  chosen_spanish_reading: 'Traducir las palabras del rey desde su propia perspectiva: «a un hijo de los dioses».'
  alternative_spanish_readings:
  - a un hijo de Dios
  - al Hijo de Dios
  - a un ser divino
  rationale: El arameo usa un sintagma indefinido con plural, y el contexto presenta una observación del rey pagano. La traducción principal no debe convertir esa observación en una confesión cristológica explícita. La lectura tradicional puede preservarse aparte.
  doctrine_reference: Translation philosophy §§1, 3, 6; affirmations cristológicas sin sobreimponerlas al sentido literal del versículo
translation_notes:
  revision_awareness: 'Coincide con el pasaje fuente y con el audit trail inglés: se mantiene la lectura fenomenológica y la perspectiva pagana del hablante, sin cambios de revisión aplicados en el contexto auditado.'
  spanish_consistency_notes:
  - Se mantiene «Dios» para אֱלָהִין cuando el contexto es genérico/teológico, pero aquí el plural arameo exige «los dioses» por la perspectiva del rey.
  - Se evita «Cristo» como sustituto del sintagma original, porque el texto reporta una comparación y no una identificación explícita.
  - El estilo procura ser publicable y transparente, con correspondencia directa entre el texto español y las decisiones léxicas auditables.
