    issue: La nota [a] está anclada a 'diezmo' pero su contenido explica 'almacenes'.
    rationale: Las instrucciones requieren que cada nota aparezca en el lugar pertinente dentro del texto. Tal como está, el lector asociará erróneamente la nota con מַעְשַׂר en vez de con אוֹצָרוֹת.
  - severity: low
    issue: '''trajo'' con ''todo Judá'' es posible, pero ''trajeron'' refleja mejor el verbo hebreo plural y suena más natural en español actual.'
    rationale: הֵבִיאוּ es 3cp. Aunque el sujeto colectivo permite singular en español, aquí el plural mantiene mejor la concordancia semántica sin perder naturalidad.
  revised_spanish_text: Y todo Judá trajeron el diezmo del grano, del vino nuevo y del aceite, a los almacenes[a].
  revised_footnotes:
  - marker: a
    text: O 'depósitos'. El término hebreo puede designar cámaras de almacenamiento o tesorerías; aquí el contexto de grano, vino y aceite favorece 'almacenes'.
    reason: lexical_alternative
