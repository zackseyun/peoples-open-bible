base_translation:
  language: en
  yaml_path: translation/ot/2_chronicles/016/010.yaml
  text: Then Asa was angry with the seer and put him in the prison house[a], because he was enraged with him over this[b]. And Asa oppressed some of the people at that time.
  footnotes:
  - marker: a
    text: Or 'the house of the stocks'; the Hebrew expression likely refers to a place of confinement involving restraint.
    reason: lexical_alternative
  - marker: b
    text: Or 'crushed' or 'mistreated'; the Hebrew verb is literally violent and conveys harsh abuse.
    reason: lexical_alternative
