translation:
  language: es
  text: Alargó su mano hacia la estaca de la tienda, y su mano derecha hacia el martillo de los obreros[a]; entonces golpeó a Sísara, le destrozó la cabeza[b], le aplastó y le atravesó la sien[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «martillo de los trabajadores» / «mazo de los obreros». La expresión hebrea לְהַלְמוּת עֲמֵלִים es poco común y admite más de una manera de precisar el instrumento de golpeo.
    reason: lexical_alternative
  - marker: b
    text: O «le quebró la cabeza». El hebreo emplea una serie de verbos vigorosos para intensificar poéticamente la violencia.
    reason: lexical_alternative
  - marker: c
    text: O «le traspasó la sien» / «pasó a través de su sien». El verbo final probablemente sugiere una penetración completa.
    reason: lexical_alternative
lexical_decisions:
- source_word: יָדָהּ
  english_pob_choice: her hand
  chosen_spanish: su mano
  alternatives_spanish:
  - su brazo
  lexicon: HALOT
  rationale: El hebreo usa el sentido concreto de la extremidad; en español «mano» preserva el paralelismo con «su mano derecha» y la imagen corporal del acto.
- source_word: לַיָּתֵד
  english_pob_choice: for the tent peg
  chosen_spanish: hacia la estaca de la tienda
  alternatives_spanish:
  - para la estaca
  - hacia la clavija de la tienda
  lexicon: HALOT
  rationale: En el contexto de Jael, el objeto es la estaca de la tienda; «estaca de la tienda» hace explícito el referente sin añadir contenido ajeno.
- source_word: תִּשְׁלַחְנָה
  english_pob_choice: reached out
  chosen_spanish: extendió
  alternatives_spanish:
  - alargó
  - estiró
  lexicon: HALOT
  rationale: El verbo hebreo expresa extender o enviar la mano hacia algo. «Extendió» es idiomático y mantiene la dirección hacia el objeto.
- source_word: וִימִינָהּ
  english_pob_choice: her right hand
  chosen_spanish: su mano derecha
  alternatives_spanish:
  - su diestra
  lexicon: HALOT
  rationale: «Mano derecha» conserva el paralelismo anatómico y es plenamente natural en español; «diestra» sería más literario pero menos transparente.
- source_word: לְהַלְמוּת עֲמֵלִים
  english_pob_choice: for the workmen’s hammer
  chosen_spanish: hacia el martillo de los obreros
  alternatives_spanish:
  - hacia el martillo de los trabajadores
  - hacia el mazo de los obreros
  lexicon: HALOT
  rationale: La expresión es poco común y nombra un instrumento de golpeo; «martillo de los obreros» conserva la estructura genitiva sin forzar una precisión que el hebreo no garantiza.
- source_word: וְהָלְמָה
  english_pob_choice: then she struck
  chosen_spanish: entonces golpeó
  alternatives_spanish:
  - y golpeó
  - entonces lo hirió
  lexicon: HALOT
  rationale: El verbo significa golpear o dar un fuerte golpe. «Golpeó» comunica bien la acción violenta y el «entonces» refleja la secuencia narrativa.
- source_word: מָחֲקָה
  english_pob_choice: she shattered
  chosen_spanish: le destrozó
  alternatives_spanish:
  - le quebró
  - le aplastó
  lexicon: HALOT
  rationale: El verbo describe una destrucción violenta. «Destrozó» transmite el impacto con fuerza poética sin identificar de modo excesivo el resultado físico exacto.
- source_word: רֹאשׁוֹ
  english_pob_choice: his head
  chosen_spanish: la cabeza
  alternatives_spanish:
  - su cabeza
  lexicon: HALOT
  rationale: El posesivo se expresa con el clítico de objeto en la frase verbal; el referente sigue siendo Sísara, por lo que en contexto queda claro que es «su cabeza».
- source_word: וּמָחֲצָה
  english_pob_choice: she smashed
  chosen_spanish: le aplastó
  alternatives_spanish:
  - le machacó
  - le pulverizó
  lexicon: HALOT
  rationale: Se conserva un segundo verbo de violencia cercano al primero para reflejar la acumulación poética del hebreo; «aplastó» mantiene la intensidad sin sonar rebuscado.
- source_word: וְחָלְפָה
  english_pob_choice: pierced through
  chosen_spanish: le atravesó
  alternatives_spanish:
  - le traspasó
  - le perforó
  lexicon: HALOT
  rationale: El verbo probablemente indica pasar a través o perforar; «atravesó» es la forma más natural en español y no añade la glosa inglesa «through» en la superficie.
- source_word: רַקָּתוֹ
  english_pob_choice: his temple
  chosen_spanish: la sien
  alternatives_spanish:
  - el templo
  - la parte lateral de la cabeza
  lexicon: HALOT
  rationale: En español bíblico moderno «sien» comunica con precisión la parte lateral de la cabeza y evita ambigüedad con «templo» como edificio.
theological_decisions:
- issue: La secuencia de verbos violentos debe conservar su acumulación retórica sin suavizarla
  english_pob_reading: she shattered his head, she smashed and pierced his temple
  chosen_spanish_reading: le destrozó la cabeza, le aplastó y le atravesó la sien
  alternative_spanish_readings:
  - le quebró la cabeza, le machacó y le perforó la sien
  - le aplastó la cabeza y le atravesó la sien
  rationale: El hebreo acumula tres verbos de golpe y destrucción para intensificar la escena; la traducción mantiene esa progresión en español y evita reducirla a una sola idea.
  doctrine_reference: Poética hebrea; preservación del paralelismo intensivo
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión inglesa que eliminó la glosa explícita «through» de la superficie final para no añadir una dirección no expresada de manera inequívoca; por eso en español se eligió «le atravesó la sien», que comunica el resultado verbal sin duplicar una preposición innecesaria. También se respetó la alta concordancia del proceso de revisión y la conservación de la violencia acumulativa del hebreo.
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando corresponda; este versículo no contiene el nombre divino.
  - Se preserva la imaginería concreta de objetos y partes del cuerpo, evitando suavizaciones.
  - «Sísara» se mantiene con acento prosódico español para lectura bíblica estándar.
  - La solución «sien» evita el falso amigo de «templo» y es consistente con el léxico bíblico español moderno.
