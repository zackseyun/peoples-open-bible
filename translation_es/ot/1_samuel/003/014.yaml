revisions:
- from: 'Por eso he jurado a la casa de Elí: la culpa de la casa de Elí no será expiada jamás por sacrificio ni por ofrenda[a][b].'
  to: 'Por tanto he jurado a la casa de Elí: la iniquidad de la casa de Elí no será expiada jamás por sacrificio ni por ofrenda[a][b].'
  rationale: 'La revisión es menor pero conveniente: fortalece el registro formal con ''Por tanto'' y, sobre todo, restituye el peso semántico de עָוֹן con ''iniquidad'', en línea con la justificación léxica y teológica del expediente inglés. No cambia el sentido general ni las notas ya bien planteadas.'
