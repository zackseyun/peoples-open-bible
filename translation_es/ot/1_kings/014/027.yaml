translation:
  language: es
  text: Así el rey Roboam hizo escudos de bronce en lugar de ellos y los confió[a] a los comandantes de los corredores reales, que guardaban la entrada de la casa del rey[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, más interpretativamente, «los capitanes de la guardia»; el hebreo dice literalmente «los comandantes de los corredores», probablemente una guardia real o cuerpo de mensajeros.
    reason: lexical_alternative
  - marker: b
    text: «La casa del rey» se refiere al palacio real.
    reason: cultural_note
lexical_decisions:
- source_word: וַיַּעַשׂ
  english_pob_choice: made
  chosen_spanish: hizo
  alternatives_spanish:
  - fabricó
  - realizó
  lexicon: HALOT
  rationale: עָשָׂה en este contexto narrativo expresa fabricar o producir; en español, «hizo» conserva la naturalidad y la transparencia del acto de producción.
- source_word: הַמֶּלֶךְ רְחַבְעָם
  english_pob_choice: King Rehoboam
  chosen_spanish: el rey Roboam
  alternatives_spanish:
  - Roboam el rey
  - el rey Rehoboam
  lexicon: HALOT
  rationale: El español bíblico moderno suele anteponer el título al nombre. «El rey Roboam» mantiene el orden natural sin perder el sentido del hebreo.
- source_word: תַּחְתָּם
  english_pob_choice: in their place
  chosen_spanish: en lugar de ellos
  alternatives_spanish:
  - en su lugar
  - en vez de ellos
  lexicon: HALOT
  rationale: El sufijo retoma los escudos anteriores; «en lugar de ellos» expresa claramente la sustitución sin añadir interpretación.
- source_word: מָגִנֵּי נְחֹשֶׁת
  english_pob_choice: bronze shields
  chosen_spanish: escudos de bronce
  alternatives_spanish:
  - escudos de cobre
  - escudos broncíneos
  lexicon: HALOT
  rationale: נְחֹשֶׁת puede referirse a bronce o cobre, pero en este contexto metalúrgico antiguo «bronce» es la equivalencia más estable y natural en español.
- source_word: וְהִפְקִיד עַל יַד
  english_pob_choice: committed them into the hand of
  chosen_spanish: los puso en manos de
  alternatives_spanish:
  - los confió a
  - los entregó a la custodia de
  lexicon: HALOT
  rationale: 'La expresión hebrea es idiomática: literalmente «puso sobre la mano de». En español, «los puso en manos de» conserva la imagen de entrega bajo custodia sin sonar artificial.'
- source_word: שָׂרֵי הָרָצִים
  english_pob_choice: the commanders of the runners
  chosen_spanish: los comandantes de los corredores
  alternatives_spanish:
  - los capitanes de la guardia
  - los jefes de los mensajeros
  lexicon: HALOT
  rationale: POB preserva la literalidad de הָרָצִים como «runners» para no borrar la transparencia lexical. «Corredores» mantiene esa literalidad en español, aunque sugiere un cuerpo de servicio real más que una función moderna de mensajería.
- source_word: הַשֹּׁמְרִים
  english_pob_choice: who guarded
  chosen_spanish: los cuales guardaban
  alternatives_spanish:
  - que vigilaban
  - que custodiaban
  lexicon: HALOT
  rationale: El participio indica acción continua. «Guardaban» transmite bien la función de vigilancia sin forzar un tecnicismo.
- source_word: פֶּתַח בֵּית הַמֶּלֶךְ
  english_pob_choice: the entrance of the king’s house
  chosen_spanish: la entrada de la casa del rey
  alternatives_spanish:
  - el umbral de la casa del rey
  - la entrada del palacio real
  lexicon: HALOT
  rationale: «Casa del rey» mantiene la literalidad de בית המלך y conserva la transparencia del texto fuente; «entrada» refleja פֶּתַח con precisión.
theological_decisions:
- issue: בית המלך como referencia al palacio real
  english_pob_reading: '''The king’s house'' refers to the royal palace.'
  chosen_spanish_reading: «la casa del rey» mantiene la literalidad; en el uso contextual, refiere al palacio real.
  alternative_spanish_readings:
  - el palacio real
  - la residencia real
  rationale: El texto hebreo dice literalmente «casa del rey». La nota permite aclarar la referencia contextual sin reemplazar en el cuerpo la expresión fuente.
  doctrine_reference: none
translation_notes:
  revision_awareness: El borrador sigue la revisión inglesa más literal en וְהִפְקִיד עַל יַד, pero la vierte al español con una equivalencia idiomática transparente («los puso en manos de») para conservar tanto la imagen como la naturalidad. También mantiene la literalidad de «los corredores» para reflejar la decisión POB de no sustituir de forma prematura el término hebreo por una interpretación más funcional.
  spanish_consistency_notes:
  - Se mantiene «rey Roboam» en forma natural de español, con título antepuesto.
  - Se conserva «bronce» como término metalúrgico estándar, en paralelo con la decisión inglesa.
  - «Casa del rey» se deja en el texto principal para máxima transparencia, con nota aclaratoria sobre su valor contextual.
  - No se introduce «Señor» ni otras sustituciones no presentes en el versículo.
  - La frase «los puso en manos de» preserva la metáfora de autoridad/custodia del hebreo sin calco rígido.
