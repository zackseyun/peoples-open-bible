translation:
  language: es
  text: Sin dirección, un pueblo cae[a], pero en la abundancia de consejeros hay salvación.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Donde no hay dirección, un pueblo cae; pero en la multitud de consejeros hay seguridad o victoria».'
    reason: Preserva la alternativa léxica documentada para בְּ/אֵין, בְּ/רֹב y תְּשׁוּעָה en español más natural.
lexical_decisions:
- source_word: בְּ/אֵין
  english_pob_choice: Without
  chosen_spanish: Sin
  alternatives_spanish:
  - En ausencia de
  - Donde no hay
  lexicon: HALOT
  rationale: La construcción con ב + אֵין expresa ausencia o carencia circunstancial. «Sin» es natural en español y conserva el sentido de falta de dirección sin forzar una paráfrasis.
- source_word: תַּחְבֻּלוֹת
  english_pob_choice: guidance
  chosen_spanish: dirección
  alternatives_spanish:
  - guía
  - orientación
  - estrategia
  - consejo
  lexicon: HALOT
  rationale: El término puede abarcar guía, dirección o estrategia. «Dirección» comunica bien el matiz de conducción/rumbo y evita confundirlo con יוֹעֵץ, que en la segunda cola sí se refiere a consejeros.
- source_word: יִפָּל
  english_pob_choice: falls
  chosen_spanish: cae
  alternatives_spanish:
  - se derrumba
  - viene a ruina
  - es derribado
  lexicon: HALOT
  rationale: El verbo significa literalmente «caer». «Cae» preserva la imagen verbal del hebreo y deja abierta la implicación proverbial de ruina o colapso.
- source_word: עָם
  english_pob_choice: a people
  chosen_spanish: un pueblo
  alternatives_spanish:
  - la gente
  - una nación
  lexicon: HALOT
  rationale: Aunque el hebreo es anarthrous y puede funcionar genéricamente, en español «un pueblo» expresa con naturalidad el sujeto colectivo de la sentencia general.
- source_word: וּ/תְשׁוּעָה
  english_pob_choice: there is deliverance
  chosen_spanish: hay liberación
  alternatives_spanish:
  - hay salvación
  - hay victoria
  - hay rescate
  lexicon: HALOT
  rationale: תְּשׁוּעָה puede significar liberación, victoria o salvación. «Liberación» preserva el valor de rescate/auxilio en un contexto sapiencial sin restringirlo a victoria militar.
- source_word: בְּ/רֹב
  english_pob_choice: in an abundance of
  chosen_spanish: en la abundancia de
  alternatives_spanish:
  - en la multitud de
  - con muchos
  lexicon: HALOT
  rationale: La frase comunica abundancia o multiplicidad. «En la abundancia de» reproduce el peso del hebreo de manera natural en español.
- source_word: יוֹעֵץ
  english_pob_choice: counselors
  chosen_spanish: consejeros
  alternatives_spanish:
  - asesores
  - los que aconsejan
  lexicon: HALOT
  rationale: Aunque la forma es singular, el hebreo funciona colectivamente en la expresión. «Consejeros» refleja ese sentido plural de manera idiomática y distingue claramente este término de תַּחְבֻּלוֹת.
theological_decisions:
- issue: Sentido de תְּשׁוּעָה en un proverbio sapiencial
  english_pob_reading: deliverance
  chosen_spanish_reading: liberación
  alternative_spanish_readings:
  - salvación
  - victoria
  - rescate
  rationale: El contexto es sapiencial y proverbial, no explícitamente cultual o militar. «Liberación» conserva el campo semántico de rescate/auxilio que la English POB resumió como deliverance, sin cerrar el sentido a victoria bélica o a salvación en sentido técnico.
  doctrine_reference: Prov. 11:14; uso léxico de תְּשׁוּעָה en literatura sapiencial
- issue: Distinción entre תַּחְבֻּלוֹת y יוֹעֵץ
  english_pob_reading: guidance / counselors
  chosen_spanish_reading: dirección / consejeros
  alternative_spanish_readings:
  - guía / consejeros
  - estrategia / asesores
  rationale: 'Se mantiene la distinción léxica del audit trail inglés: el primer miembro habla de la falta de conducción o dirección, mientras el segundo destaca la multiplicidad de consejeros. Esto evita homogeneizar ambos términos con «consejo» y perder el contraste del proverbio.'
  doctrine_reference: Prov. 11:14; HALOT
translation_notes:
  revision_awareness: 'El paquete fuente muestra alta concordancia entre la traducción inglesa POB y la revisión más reciente (sin cambios sustantivos). Por eso la versión española sigue de cerca la lectura auditada: ausencia de dirección → caída del pueblo; abundancia de consejeros → liberación.'
  spanish_consistency_notes:
  - Se usa «Yahvé» como forma estándar del proyecto solo cuando el texto lo requiera; este versículo no contiene el nombre divino.
  - «Consejeros» se reserva para יוֹעֵץ, mientras «dirección» traduce תַּחְבֻּלוֹת para conservar el contraste lexical.
  - La nota alternativa preserva la tensión semántica de תְּשׁוּעָה entre liberación, seguridad y victoria sin escoger una sola equivalencia excluyente.
