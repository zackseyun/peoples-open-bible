translation:
  language: es
  text: Y de uno de ellos salió un cuerno pequeño[a], y creció sobremanera hacia el sur, hacia el oriente, y hacia la tierra hermosa[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «un pequeño cuerno».
    reason: lexical_alternative
  - marker: b
    text: O «la tierra gloriosa» o «la tierra agradable». El hebreo contiene un epíteto descriptivo que probablemente alude a la tierra de Israel.
    reason: alternative_reading
lexical_decisions:
- source_word: וּמִן הָאַחַת מֵהֶם
  english_pob_choice: And out of one of them
  chosen_spanish: Y de uno de ellos
  alternatives_spanish:
  - Y de entre ellos
  - Y de uno de éstos
  lexicon: HALOT
  rationale: La construcción con מן marca origen o procedencia. En español, «de uno de ellos» comunica con naturalidad la idea de surgir desde dentro del grupo, sin añadir interpretación.
- source_word: יָצָא
  english_pob_choice: came
  chosen_spanish: salió
  alternatives_spanish:
  - vino
  - salió afuera
  - surgió
  lexicon: HALOT
  rationale: El verbo expresa salida/emergencia. «Salió» conserva la imagen de procedencia y funciona bien con el complemento de origen.
- source_word: קֶרֶן אַחַת
  english_pob_choice: a small horn
  chosen_spanish: un cuerno pequeño
  alternatives_spanish:
  - un pequeño cuerno
  - un cuerno chico
  lexicon: HALOT
  rationale: Se preserva la imagen apocalíptica de «cuerno» sin explicarla como rey o poder. «Pequeño» reproduce la idea de tamaño sin sobreinterpretar.
- source_word: מִצְּעִירָה
  english_pob_choice: small
  chosen_spanish: pequeño
  alternatives_spanish:
  - chico
  - menor
  - insignificante
  lexicon: HALOT
  rationale: El adjetivo indica pequeñez. «Pequeño» es claro y neutral; evita matices no garantizados como «insignificante».
- source_word: וַתִּגְדַּל יֶתֶר
  english_pob_choice: it grew exceedingly great
  chosen_spanish: creció sobremanera
  alternatives_spanish:
  - creció muchísimo
  - se hizo sobremanera grande
  - creció en gran manera
  lexicon: HALOT
  rationale: גדל expresa crecimiento o hacerse grande, e יתר intensifica la medida. «Sobremanera» conserva la fuerza superlativa con estilo natural en español.
- source_word: אֶל הַנֶּגֶב
  english_pob_choice: toward the south
  chosen_spanish: hacia el sur
  alternatives_spanish:
  - al sur
  - hacia el Négueb
  lexicon: HALOT
  rationale: En esta secuencia direccional, נגב funciona con naturalidad como punto cardinal. «Hacia el sur» es más claro que mantener «Négueb» como topónimo.
- source_word: וְאֶל הַמִּזְרָח
  english_pob_choice: toward the east
  chosen_spanish: hacia el oriente
  alternatives_spanish:
  - hacia el este
  - al oriente
  - hacia la salida del sol
  lexicon: HALOT
  rationale: מזרח puede rendirse por «oriente» o «este». Se elige «oriente» por su registro bíblico y su fluidez en paralelo con las otras direcciones.
- source_word: וְאֶל הַצֶּבִי
  english_pob_choice: toward the Beautiful Land
  chosen_spanish: hacia la Tierra Hermosa
  alternatives_spanish:
  - hacia la Tierra Gloriosa
  - hacia la tierra hermosa
  - hacia la tierra agradable
  lexicon: HALOT
  rationale: El hebreo usa un epíteto descriptivo de valor/atractivo que probablemente alude a la tierra de Israel. «Tierra Hermosa» mantiene la cualidad descriptiva sin sustituirla de entrada por una interpretación más explícita.
theological_decisions:
- issue: Si el símbolo del cuerno debe interpretarse en el texto principal como un rey, poder o reino
  english_pob_reading: Preserve the symbol as 'horn' without interpretive expansion
  chosen_spanish_reading: Conservar el símbolo como «cuerno» sin expansión interpretativa
  alternative_spanish_readings:
  - un rey
  - un poder
  - un reino
  rationale: El hebreo presenta imaginería apocalíptica y no explicita aquí la identificación del símbolo. Traducirlo como «cuerno» respeta la tensión del texto y evita importar interpretación al versículo.
  doctrine_reference: Translation philosophy §§1, 3
- issue: 'Cómo rendir הַצֶּבִי: si conviene explicitar la referencia a la tierra de Israel/Judá o conservar el epíteto'
  english_pob_reading: Render as 'the Beautiful Land' and preserve 'the glorious land' in a footnote
  chosen_spanish_reading: Conservar el epíteto en el cuerpo con «Tierra Hermosa»
  alternative_spanish_readings:
  - la tierra gloriosa
  - la tierra agradable
  - la tierra hermosa
  rationale: El hebreo usa una designación descriptiva. En español, «Tierra Hermosa» conserva el valor metafórico y evita reemplazarlo por una interpretación más cerrada; la nota permite la alternativa tradicional «tierra gloriosa».
  doctrine_reference: Translation philosophy §§1, 3, 6
translation_notes:
  revision_awareness: 'El pasaje coincide con la última revisión disponible: no se requirieron cambios adicionales, y la redacción española sigue de cerca el análisis léxico y la preservación del simbolismo del hebreo.'
  spanish_consistency_notes:
  - Se mantiene «cuerno» en sentido simbólico, sin interpretarlo como rey o reino en el texto principal.
  - Se usa «oriente» para מִזְרָח con registro bíblico natural en español.
  - Se conserva el epíteto descriptivo de הַצֶּבִי con «Tierra Hermosa», evitando una paráfrasis interpretativa en el cuerpo del texto.
  - La puntuación y el flujo sintáctico buscan ser publicables en español bíblico moderno y sobrio.
