    rationale: El verbo transmite toma física, pero «asió» o «tomó firmemente» representa mejor la fuerza de ἐδράξατο y mantiene un tono más digno y bíblico legible.
  - severity: low
    issue: La secuencia participial puede sonar más natural en español narrativo
    rationale: «Y acercándose a la cama» es comprensible, pero «Entonces se acercó a la cama» evita una apertura algo calcada y mantiene el flujo narrativo sin apartarse del sentido.
