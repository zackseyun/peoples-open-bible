translation:
  language: es
  text: 'Así dice Yahvé: He aquí, yo entrego al faraón Hofra, rey de Egipto, en manos de sus enemigos y en manos de los que buscan su vida, así como entregué a Sedequías, rey de Judá, en manos de Nabucodrezar[a], rey de Babilonia, su enemigo y el que busca su vida.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «Nabucodrezar»; la forma convencional en español suele ser «Nabucodonosor».'
    reason: lexical_alternative
lexical_decisions:
- source_word: כֹּה אָמַר יְהוָה
  english_pob_choice: Thus says Yahweh
  chosen_spanish: Así dice Yahvé
  alternatives_spanish:
  - Esto es lo que dice Yahvé
  - Así ha dicho Yahvé
  lexicon: HALOT
  rationale: La fórmula profética se conserva con su tono solemne y directo. "Así dice" reproduce bien el presente profético y es natural en español; "Yahvé" sigue el criterio del proyecto para el Nombre divino.
- source_word: הִנְנִי
  english_pob_choice: Behold
  chosen_spanish: He aquí
  alternatives_spanish:
  - Miren
  - Vean
  - He aquí que
  lexicon: HALOT
  rationale: La partícula introduce una घोषणा solemne y deíctica. "He aquí" mantiene el valor anunciativo sin volverlo demasiado explicativo.
- source_word: נֹתֵן
  english_pob_choice: I am giving
  chosen_spanish: yo entrego
  alternatives_spanish:
  - yo estoy entregando
  - yo daré
  lexicon: HALOT
  rationale: En este contexto el verbo expresa la entrega de alguien al poder de otros. "Entrego" conserva la idea de poner en manos ajenas el destino del rey y resulta más natural en español que un calco progresivo.
- source_word: פַּרְעֹה חָפְרַע
  english_pob_choice: Pharaoh Hophra
  chosen_spanish: el faraón Hofra
  alternatives_spanish:
  - Faraón Hofra
  - el faraón Apries
  lexicon: HALOT
  rationale: Se conserva el nombre hebreo transliterado en forma española usual. "Hofra" evita sustituir el dato del hebreo por el equivalente grecolatino.
- source_word: בְּיַד
  english_pob_choice: into the hand of
  chosen_spanish: en mano de
  alternatives_spanish:
  - en poder de
  - entregado a
  lexicon: HALOT
  rationale: Se preserva el hebraísmo con su fuerza idiomática de dominio y entrega. "En mano de" es comprensible en español bíblico y evita suavizar el cuadro.
- source_word: אֹיְבָיו
  english_pob_choice: his enemies
  chosen_spanish: sus enemigos
  alternatives_spanish:
  - los que le son enemigos
  - sus hostiles
  lexicon: HALOT
  rationale: La pluralidad del sustantivo se expresa de forma directa y clara.
- source_word: מְבַקְשֵׁי נַפְשׁוֹ
  english_pob_choice: those seeking his life
  chosen_spanish: los que buscan su vida
  alternatives_spanish:
  - los que procuran quitarle la vida
  - los que buscan matarlo
  lexicon: HALOT
  rationale: Se mantiene el giro idiomático de "buscar la vida" para no perder la imagen hebrea. "Su vida" conserva el alcance semítico sin añadir una paráfrasis más explícita de lo que exige el texto.
- source_word: כַּאֲשֶׁר
  english_pob_choice: just as
  chosen_spanish: así como
  alternatives_spanish:
  - tal como
  - de la misma manera que
  lexicon: HALOT
  rationale: Marca con claridad la comparación entre ambos actos de entrega y su paralelo narrativo.
- source_word: צִדְקִיָּהוּ
  english_pob_choice: Zedekiah
  chosen_spanish: Sedequías
  alternatives_spanish:
  - Sedecías
  lexicon: HALOT
  rationale: Se adopta la forma española tradicional y ampliamente reconocible del nombre del rey de Judá.
- source_word: נְבוּכַדְרֶאצַּר
  english_pob_choice: Nebuchadnezzar
  chosen_spanish: Nabucodrezar
  alternatives_spanish:
  - Nabucodonosor
  - Nebucadrezar
  lexicon: HALOT
  rationale: El hebreo refleja más de cerca la forma con -r- y no la forma convencional griega/latina. Se conserva esa cercanía en español para no borrar la correspondencia con el original; la variante inglesa documentada también apunta a esta tensión.
- source_word: אֹיְבֹו וּמְבַקֵּשׁ נַפְשׁוֹ
  english_pob_choice: his enemy and the one seeking his life
  chosen_spanish: su enemigo y el que buscaba su vida
  alternatives_spanish:
  - su enemigo y el que busca su vida
  - su enemigo, el que buscaba su vida
  lexicon: HALOT
  rationale: El hebreo presenta una apposición que identifica a Nabucodonosor como enemigo y perseguidor de la vida de Sedequías. En español se mantiene la doble caracterización y el pasado narrativo que encaja con la cláusula de comparación.
theological_decisions:
- issue: Representación del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - SEÑOR
  rationale: Se sigue el criterio doctrinal del proyecto para el Tetragrama, evitando el reemplazo litúrgico por "SEÑOR". "Yahvé" es la forma establecida en la serie española de POB.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Valor idiomático de בְּיַד en contextos de juicio
  english_pob_reading: into the hand of
  chosen_spanish_reading: en mano de
  alternative_spanish_readings:
  - en poder de
  - entregado a
  rationale: La expresión hebrea comunica entrega al dominio del otro. Se preserva el hebraísmo para mantener la imaginería judicial y narrativa del pasaje.
  doctrine_reference: 'DOCTRINE.md: Hebrew idioms — idiomatic renderings should preserve force when intelligible'
- issue: Forma del nombre נְבוּכַדְרֶאצַּר
  english_pob_reading: Nebuchadnezzar
  chosen_spanish_reading: Nabucodrezar
  alternative_spanish_readings:
  - Nabucodonosor
  - Nebucadrezar
  rationale: La forma hebrea del nombre en este versículo tiene una consonancia más cercana con "Nabucodrezar". La elección evita nivelar la lectura al nombre tradicional cuando el testimonio hebreo señala una forma distinta.
  doctrine_reference: 'DOCTRINE.md: Proper names — preserve source-level distinctions where relevant'
translation_notes:
  revision_awareness: 'El pasaje coincide estrechamente con el texto hebreo y con el audit trail inglés: se mantiene la fórmula profética, el hebraísmo de "en mano de", la comparación "así como" y la tensión onomástica entre la forma hebrea de Nabucodrezar y la forma convencional más conocida. No se registran revisiones aplicadas en el contexto inglés.'
  spanish_consistency_notes:
  - Se usa «Yahvé» para יְהוָה, conforme al estándar del proyecto.
  - Se conserva «en mano de» como hebraísmo transparente para בְּיַד.
  - Se mantiene la distinción entre la forma hebrea «Nabucodrezar» y la forma española tradicional, señalada en nota.
  - «Los que buscan su vida» reproduce el modismo hebreo sin explicitarlo más allá de lo que el texto exige.
  - «Sus enemigos» y «el que buscaba su vida» reflejan la apposición final del hebreo.
