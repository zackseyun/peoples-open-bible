translation:
  language: es
  text: Y si andas en mis caminos, guardando mis estatutos y mis mandamientos, como anduvo David, tu padre, prolongaré tus días[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «prolongaré tu vida» / «prolongaré tus días».
    reason: lexical_alternative
lexical_decisions:
- source_word: וְאִם
  english_pob_choice: And if
  chosen_spanish: Y si
  alternatives_spanish:
  - Si
  lexicon: HALOT
  rationale: La conjunción más la partícula condicional introducen la continuación del discurso divino. «Y si» conserva mejor el enlace con la frase anterior que un simple «Si».
- source_word: תֵּלֵךְ
  english_pob_choice: you walk
  chosen_spanish: andas
  alternatives_spanish:
  - caminas
  - vas
  lexicon: HALOT
  rationale: En contextos de pacto, הלך expresa conducta o manera de vivir. «Andas» mantiene la metáfora de andar/caminar y suena natural en español bíblico contemporáneo.
- source_word: בִּדְרָכַי
  english_pob_choice: in my ways
  chosen_spanish: en mis caminos
  alternatives_spanish:
  - según mis caminos
  - por mis caminos
  lexicon: HALOT
  rationale: «Caminos» preserva la imagen hebrea de la conducta moral. «En mis caminos» reproduce el valor de la preposición y el giro idiomático sin sobreparafrasear.
- source_word: לִשְׁמֹר
  english_pob_choice: keeping
  chosen_spanish: guardando
  alternatives_spanish:
  - para guardar
  - observando
  lexicon: HALOT
  rationale: El infinitivo expresa la manera de andar en los caminos de Yahvé. «Guardando» mantiene la cercanía sintáctica y el matiz de obediencia vigilante.
- source_word: חֻקַּי
  english_pob_choice: my statutes
  chosen_spanish: mis estatutos
  alternatives_spanish:
  - mis decretos
  - mis ordenanzas
  lexicon: HALOT
  rationale: חוקים es un término legal/pactual. «Estatutos» distingue este término de «mandamientos» y conserva un registro bíblico preciso.
- source_word: וּמִצְוֺתַי
  english_pob_choice: and my commandments
  chosen_spanish: y mis mandamientos
  alternatives_spanish:
  - y mis órdenes
  - y mis preceptos
  lexicon: HALOT
  rationale: מצות se refiere a mandatos. «Mandamientos» mantiene el paralelo con «estatutos» y refleja el campo pactual/legal.
- source_word: כַּאֲשֶׁר
  english_pob_choice: as
  chosen_spanish: como
  alternatives_spanish:
  - tal como
  - así como
  lexicon: HALOT
  rationale: Introduce la comparación con la conducta de David. «Como» es breve, natural y fiel al sentido comparativo.
- source_word: הָלַךְ
  english_pob_choice: walked
  chosen_spanish: anduvo
  alternatives_spanish:
  - caminó
  - vivió
  lexicon: HALOT
  rationale: Repetir el verbo de movimiento/andadura conserva el eco hebreo con תֵּלֵךְ. «Anduvo» es natural en español bíblico y mantiene la metáfora ética.
- source_word: דָּוִיד אָבִיךָ
  english_pob_choice: David your father
  chosen_spanish: David, tu padre
  alternatives_spanish:
  - tu padre David
  - David, tu padre
  lexicon: HALOT
  rationale: El orden español más natural coloca el nombre seguido del vocativo explicativo. La coma ayuda a reflejar la aposición hebrea sin ambigüedad.
- source_word: וְהַאַרַכְתִּי
  english_pob_choice: then I will lengthen
  chosen_spanish: prolongaré
  alternatives_spanish:
  - alargaré
  - haré más largos
  lexicon: HALOT
  rationale: אַרך en hifil significa hacer largo/prolongar. «Prolongaré» es preciso y digno; el valor consecutivo queda implícito por la estructura condicional en español.
- source_word: אֶת יָמֶיךָ
  english_pob_choice: your days
  chosen_spanish: tus días
  alternatives_spanish:
  - los días de tu vida
  - tu vida
  lexicon: HALOT
  rationale: El hebreo usa un idiomático «tus días» para la duración de la vida. Se conserva la forma breve y transparente, con la posibilidad de entenderla como vida prolongada.
theological_decisions:
- issue: Promesa condicional de larga vida ligada a obediencia pactual
  english_pob_reading: Render the condition straightforwardly without softening or importing later theological categories.
  chosen_spanish_reading: Traducir la condición de manera directa, manteniendo que la promesa depende de andar en los caminos de Yahvé como David.
  alternative_spanish_readings:
  - Convertirla en bendición general sin condicionalidad
  - Leerla como promesa dinástica incondicional
  rationale: El hebreo presenta una condición explícita seguida de una promesa concreta. La versión española conserva esa dependencia causal sin suavizarla ni reconfigurarla teológicamente.
  doctrine_reference: Translation philosophy §1, §3
translation_notes:
  revision_awareness: 'El examen cruzado del texto hebreo, la tabla morfológica y el registro inglés POB coincide en lo esencial: condicionalidad, metáfora de caminar, doblet legal («estatutos» / «mandamientos») y promesa de prolongación de la vida. No hubo revisiones posteriores que alteraran estas decisiones.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» en el texto base cuando el contexto exige nombrar al referente divino; aquí la cláusula es de primera persona divina y no requiere sustitución nominal.
  - Se conserva la metáfora de caminar/andar para הלך, evitando paráfrasis como «vivir» salvo en la nota alternativa.
  - «Tus días» preserva el hebraísmo idiomático y deja abierta la equivalencia semántica con la duración de la vida.
