translation:
  language: es
  text: Porque un pueblo en Sion habitará en Jerusalén; no llorarás más[a]. Ciertamente te mostrará gracia[b] al sonido de tu clamor; cuando lo oiga, te responderá.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «llorando, no llorarás»; construcción enfática que significa «no llorarás más» o «ciertamente no llorarás».'
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «siendo clemente, te mostrará gracia»; construcción enfática que subraya la certeza de la gracia de Yahvé.'
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Porque entonces
  - Ciertamente
  lexicon: HALOT
  rationale: Introduce la base o razón de la promesa; «Porque» conserva la conexión discursiva natural en español sin añadir matiz causal indebido.
- source_word: עַם
  english_pob_choice: a people
  chosen_spanish: un pueblo
  alternatives_spanish:
  - un pueblo colectivo
  - gente
  lexicon: HALOT
  rationale: El sustantivo es colectivo; «un pueblo» preserva esa fuerza sin sobrecargar el español con una glosa explicativa.
- source_word: בְּצִיּוֹן
  english_pob_choice: in Zion
  chosen_spanish: en Sion
  alternatives_spanish:
  - en Zion
  - en el monte Sion
  lexicon: HALOT
  rationale: Se conserva el nombre propio bíblico en forma castellanizada tradicional y reconocible, manteniendo la referencia geográfica y teológica.
- source_word: יֵשֵׁב
  english_pob_choice: will dwell
  chosen_spanish: habitará
  alternatives_spanish:
  - vivirá
  - morará
  lexicon: HALOT
  rationale: En contexto de restauración, el sentido es residir/establecerse; «habitará» es natural en español y mantiene el valor de asentamiento.
- source_word: בִּירוּשָׁלִָם
  english_pob_choice: in Jerusalem
  chosen_spanish: en Jerusalén
  alternatives_spanish:
  - en Yerushaláyim
  lexicon: HALOT
  rationale: Nombre propio estándar en español; conserva el paralelismo con Sion y evita una transliteración menos inteligible para lectores bíblicos generales.
- source_word: בָּכוֹ לֹא תִבְכֶּה
  english_pob_choice: you will surely weep no more
  chosen_spanish: no llorarás más
  alternatives_spanish:
  - ciertamente no llorarás
  - no llorarás en absoluto
  - llorando no llorarás
  lexicon: HALOT
  rationale: El infinitivo absoluto más imperfecto intensifica la negación. En español, «no llorarás más» comunica el resultado seguro y evita una construcción forzada; la intensidad queda reforzada con la nota textual.
- source_word: חָנוֹן יָחְנְךָ
  english_pob_choice: He will surely be gracious to you
  chosen_spanish: tendrá piedad de ti
  alternatives_spanish:
  - será benigno contigo
  - te será favorable
  - te mostrará gracia
  lexicon: HALOT
  rationale: חנן puede rendirse como mostrar favor/gracia o tener piedad. Aquí se eligió «tendrá piedad» por su claridad y dignidad en español, manteniendo la idea de favor inmerecido; se evita «siervo»/«favor» técnico porque el contexto es de misericordia divina.
- source_word: לְקוֹל זַעֲקֶךָ
  english_pob_choice: at the sound of your cry
  chosen_spanish: al oír tu clamor
  alternatives_spanish:
  - al sonido de tu clamor
  - ante el clamor que tú lanzas
  - a la voz de tu clamor
  lexicon: HALOT
  rationale: La imagen hebrea es auditiva («al sonido de»); en español, «al oír tu clamor» conserva el vínculo entre el clamor y la respuesta divina de forma más idiomática sin perder el trasfondo sonoro.
- source_word: כְּשָׁמְעָתוֹ
  english_pob_choice: when he hears it
  chosen_spanish: cuando lo oiga
  alternatives_spanish:
  - cuando lo oiga escuchar
  - al oírlo
  - cuando lo escuche
  lexicon: HALOT
  rationale: El valor temporal se expresa naturalmente con futuro/subjuntivo en español. «Lo» retoma el clamor y evita repetición innecesaria.
- source_word: עָנָךְ
  english_pob_choice: he will answer you
  chosen_spanish: te responderá
  alternatives_spanish:
  - te contestará
  - te responderá a ti
  - te dará respuesta
  lexicon: HALOT
  rationale: ענה aquí es responder a un clamor divino. «Te responderá» conserva el paralelismo con la escucha previa y la relación personal entre Yahvé y el pueblo.
theological_decisions:
- issue: Identificación del sujeto divino implícito en las acciones finales
  english_pob_reading: Render the subject as 'He' referring to the LORD
  chosen_spanish_reading: Hacer explícito el sujeto implícito como «tendrá piedad...», «oiga» y «te responderá», con referencia contextual a Yahvé
  alternative_spanish_readings:
  - Dejar el sujeto implícito en español
  - usar «el Señor» como sujeto explícito
  rationale: El hebreo omite el sujeto porque es claro por el contexto; en español conviene hacer visible la agencia divina sin introducir una perífrasis nominal que sustituya el nombre divino. El verso sigue entendido como acción de Yahvé en favor de su pueblo.
  doctrine_reference: Contexto profético de restauración y misericordia divina (Isaías 30:18-19).
- issue: Valor intensivo de las construcciones enfáticas con infinitivo absoluto
  english_pob_reading: you will surely weep no more / He will surely be gracious to you
  chosen_spanish_reading: «no llorarás más» y «tendrá piedad de ti» con nota de intensidad
  alternative_spanish_readings:
  - «ciertamente no llorarás»
  - «te mostrará gracia con certeza»
  - reproducir una construcción literal en español
  rationale: El hebreo enfatiza certeza e intensidad, no solo tiempo futuro. El español idiomático transmite mejor esa fuerza con una formulación natural y una nota que explicita la redundancia enfática del original.
  doctrine_reference: Uso hebreo del infinitivo absoluto para intensificación aspectual/retórica.
translation_notes:
  revision_awareness: 'El borrador sigue de cerca el audit trail inglés y el hebreo: mantiene Sion/Jerusalén, reproduce el valor enfático de las duplicaciones verbales mediante un español natural, y conserva la referencia implícita a Yahvé sin sustituirla por una fórmula eclesiástica tradicional no requerida por la fuente.'
  spanish_consistency_notes:
  - Se usa «Yahvé» en la nota para el nombre divino según la convención del proyecto, pero el texto del versículo no nombra explícitamente a Dios.
  - «Sion» y «Jerusalén» se mantienen como topónimos bíblicos estándar en español.
  - Se eligió «tendrá piedad» para חנן por claridad y porque expresa favor misericordioso en un registro bíblico natural.
  - Las notas a y b preservan la tensión entre literalidad y equivalencia idiomática que el POB inglés ya documenta.
