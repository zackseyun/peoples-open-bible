translation:
  language: es
  text: 'Y el sacerdote ungido[a], de entre sus hijos, que lo suceda, la preparará. Es estatuto perpetuo[b] para Yahvé: será completamente consumida en humo[c].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «en su lugar»; literalmente, «bajo él».
    reason: lexical_alternative
  - marker: b
    text: O «estatuto permanente» o «ordenanza perpetua».
    reason: lexical_alternative
  - marker: c
    text: Literalmente, «será hecha fumar por completo»; es decir, la ofrenda será consumida enteramente sobre el altar.
    reason: lexical_alternative
lexical_decisions:
- source_word: הַכֹּהֵן
  english_pob_choice: the priest
  chosen_spanish: el sacerdote
  alternatives_spanish:
  - el presbítero
  lexicon: HALOT
  rationale: En contexto cultual, כֹּהֵן corresponde de manera natural a «sacerdote» en español; «presbítero» sería eclesiástico y no refleja el sistema levítico.
- source_word: הַמָּשִׁיחַ
  english_pob_choice: anointed
  chosen_spanish: ungido
  alternatives_spanish:
  - consagrado
  - mesías
  lexicon: HALOT
  rationale: Aquí el término califica al sacerdote en función de su unción para el cargo, no como título mesiánico; «ungido» conserva la relación con la unción sin introducir un sentido cristológico ajeno al pasaje.
- source_word: תַּחְתָּיו
  english_pob_choice: who succeeds him
  chosen_spanish: que lo suceda
  alternatives_spanish:
  - en su lugar
  - bajo él
  lexicon: HALOT
  rationale: El hebreo significa literalmente «bajo él» / «en su lugar»; en español, «que lo suceda» expresa con claridad la sucesión sacerdotal sin perder el valor de reemplazo.
- source_word: מִבָּנָיו
  english_pob_choice: from among his sons
  chosen_spanish: de entre sus hijos
  alternatives_spanish:
  - de sus hijos
  - entre sus hijos
  lexicon: HALOT
  rationale: «De entre» conserva la idea de selección dentro del grupo familiar. «Hijos» es un equivalente español natural para el hebreo, aunque el referente sea la descendencia masculina.
- source_word: יַעֲשֶׂה אֹתָהּ
  english_pob_choice: shall prepare it
  chosen_spanish: la hará
  alternatives_spanish:
  - la preparará
  - la ofrecerá
  lexicon: HALOT
  rationale: עָשָׂה es amplio y, en un contexto sacrificial, puede abarcar la acción ritual de disponer la ofrenda. «La hará» sigue de cerca el verbo hebreo y deja abierta la exacta fase cultual sin sobreespecificar.
- source_word: חָק עוֹלָם
  english_pob_choice: a permanent statute
  chosen_spanish: estatuto perpetuo
  alternatives_spanish:
  - estatuto permanente
  - ordenanza perpetua
  lexicon: HALOT
  rationale: «Estatuto perpetuo» reproduce bien la fórmula legal hebrea y es idiomático en español bíblico moderno. «Permanente» sería posible, pero «perpetuo» capta mejor la fórmula jurídica tradicional sin volverla arcaica en exceso.
- source_word: לַיהוָה
  english_pob_choice: for Yahweh
  chosen_spanish: para Yahvé
  alternatives_spanish:
  - de Yahvé
  - a Yahvé
  lexicon: 'DOCTRINE.md Contested terms: יהוה YHWH'
  rationale: 'Se sigue el estándar del proyecto para el Tetragrámaton: «Yahvé». La preposición «para» expresa adecuadamente la dedicación cultual y la relación de pertenencia del estatuto/ofrenda con Yahvé.'
- source_word: כָּלִיל
  english_pob_choice: completely
  chosen_spanish: enteramente
  alternatives_spanish:
  - completamente
  - totalmente
  - por completo
  lexicon: HALOT
  rationale: El término indica totalidad; «enteramente» suena natural en español bíblico y conserva la idea de consumación completa sin añadir interpretación.
- source_word: תָּקְטָר
  english_pob_choice: shall be turned into smoke
  chosen_spanish: será convertida en humo
  alternatives_spanish:
  - será hecha humo
  - será quemada
  lexicon: HALOT
  rationale: El hifil de קטר denota hacer subir humo en el altar. «Convertida en humo» mantiene la imagen cultual y evita reducirla a un simple «quemar», que pierde el matiz técnico del sacrificio.
theological_decisions:
- issue: Identidad del «sacerdote ungido»
  english_pob_reading: the priest anointed for office, i.e., the succeeding high priest
  chosen_spanish_reading: el sacerdote ungido que ocupa el cargo, es decir, el sumo sacerdote sucesor
  alternative_spanish_readings:
  - un sacerdote ungido en sentido general
  - una figura mesiánica
  rationale: El contexto de sucesión («de entre sus hijos, que lo suceda») muestra que se trata de la oficina sacerdotal transmitida, no de un uso mesiánico. «Ungido» debe conservarse porque el hebreo lo dice explícitamente, pero en español conviene explicitar en la nota que se trata del sucesor en el cargo.
  doctrine_reference: Levítico 6:15 en su contexto cultual; cf. la sucesión sacerdotal en la Torá
- issue: Valor de חָק עוֹלָם
  english_pob_reading: a permanent statute
  chosen_spanish_reading: estatuto perpetuo
  alternative_spanish_readings:
  - ordenanza perpetua
  - estatuto para siempre
  rationale: La fórmula legal hebrea expresa una disposición de validez continua. «Estatuto perpetuo» conserva la fuerza jurídica sin depender de una glosa más libre. Se evita suavizarlo a un mero «reglamento» o convertirlo en lenguaje devocional.
  doctrine_reference: Usos de חֹק/חָק en la legislación levítica
- issue: Tratamiento del nombre divino YHWH
  english_pob_reading: the LORD
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Jehová
  rationale: 'Se mantiene la terminología del proyecto: la traducción española debe mostrar el nombre divino en lugar de ocultarlo tras una sustitución convencional. «Yahvé» es el estándar adoptado y corresponde al mandato editorial dado.'
  doctrine_reference: 'DOCTRINE.md Contested terms: יהוה YHWH'
translation_notes:
  revision_awareness: 'El borrador sigue de cerca el texto fuente hebreo y el tramo inglés auditado. No introduce cambios respecto del último pase revisado, y conserva las decisiones clave: el sacerdote ungido como sucesor en el cargo, el estatuto perpetuo y la imagen sacrificial de ser convertido en humo por completo.'
  spanish_consistency_notes:
  - Se evita «SEÑOR» como máscara para יהוה y se usa «Yahvé» según la norma del proyecto.
  - «Ungido» se conserva por el valor léxico de מָשִׁיחַ en el contexto sacerdotal, sin convertirlo en un título mesiánico.
  - La estructura verbal se mantiene simple y bíblica para reflejar el hebreo sin volverla artificiosa en español.
  - «Enteramente convertida en humo» preserva el matiz técnico del rito de consumo total en el altar.
