    rationale: «Pertecerá» está mal escrito; debe ser «Pertenecerá». Es un error visible en el texto bíblico principal.
  - severity: medium
    issue: «Ofrendas encendidas» no es la mejor equivalencia principal para אִשֵּׁי
    rationale: La frase resulta poco natural y semánticamente imprecisa en español. El expediente inglés documenta como elección principal «food offerings», dejando «fire offerings» como alternativa en nota; conviene alinear el español con esa decisión y dejar la opción de fuego en la nota.
  - severity: low
