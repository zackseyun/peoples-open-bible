revisions:
- from: Las primicias[a] de los primeros frutos[b] de tu suelo traerás a la casa de Yahvé, tu Dios. No cocerás un cabrito[c] en la leche de su madre.
  to: Las primeras primicias de tu suelo[a] traerás a la casa de Yahvé, tu Dios. No hervirás un cabrito[b] en la leche de su madre.
  rationale: 'Se revisa la primera cláusula para evitar la redundancia artificial de ''primicias de los primeros frutos'' y reflejar mejor el valor conjunto de רֵאשִׁית בִּכּוּרֵי en un español natural y culto. Se corrigen las notas para que coincidan con las alternativas reales documentadas: ''tu tierra'' como variante de ''tu suelo'' y una nota precisa para גדי. También se ajusta ''cocerás'' a ''hervirás'' por mayor precisión léxica respecto al hebreo y al expediente inglés.'
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T21:26:34Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador conserva bien la estructura básica del hebreo: mandato sobre las primicias, referencia a la casa de Yahvé, y prohibición de hervir/cocer un cabrito en la leche de su madre. Sin embargo, la apertura ''Las primicias de los primeros frutos de tu suelo'' sobrerrepresenta el doblete hebreo de manera poco natural y menos fiel al sentido unitario de רֵאשִׁית בִּכּוּרֵי, que en contexto significa ''lo primero de las primicias'' o más naturalmente en español ''las primeras primicias''. Además, las notas a y b no corresponden bien a las alternativas documentadas en el inglés: la alternativa de אַדְמָתְךָ (''tu tierra'') fue anclada erróneamente en ''primicias'', y la nota sobre גְּדִי introduce una glosa incorrecta (''hijo de cabra'') no respaldada por la evidencia.'
  spanish_quality_summary: El español es generalmente claro y digno, pero 'Las primicias de los primeros frutos' suena redundante y algo forzado. 'No cocerás' es aceptable, aunque 'No hervirás' refleja mejor el valor específico de תבשל y armoniza mejor con 'en la leche'. 'Cabrito' es natural y adecuado. La puntuación con 'Yahvé, tu Dios' es legible, aunque sin coma también sería natural.
  glossary_alignment: 'Se respeta correctamente ''Yahvé'' para יְהוָה. No hay conflictos con terminología doctrinal mayor. El problema principal está en la representación léxica de רֵאשִׁית + בִּכּוּרֵי y en notas léxicas mal alineadas con el expediente inglés. Conviene conservar ''suelo'' en el texto y poner ''tierra'' como alternativa en nota, y mantener ''cabrito'' con nota correcta de alternativa ''Hebreo: "un cabrito"; es decir, un cabrito/una cría de cabra joven'' solo si realmente añade valor; aquí basta una nota breve que refleje que el hebreo es literalmente ''un cabrito'' o ''un kid/young goat'' según el expediente.'
  issues:
  - severity: high
    issue: 'Frase inicial redundante y poco fiel: ''Las primicias de los primeros frutos'''
    rationale: רֵאשִׁית בִּכּוּרֵי no requiere dos sustantivos plenos independientes en español. La formulación actual suena duplicativa y no reproduce bien el sentido unitario de 'the first of the firstfruits'.
  - severity: high
    issue: Nota [a] mal anclada y semánticamente incorrecta
    rationale: La alternativa inglesa 'the firstfruits of your land' corresponde a la combinación con אַדְמָתְךָ ('tu tierra'), no a 'primicias' aislado. La nota actual induce una lectura distinta.
  - severity: medium
    issue: 'Nota [c] contiene una explicación lexical no respaldada: ''un hijo de cabra'''
    rationale: גְּדִי significa 'cabrito/kid/young goat', no 'hijo de cabra' como formulación léxica útil o precisa en español.
  - severity: low
    issue: '''Cocerás'' es menos específico que ''hervirás'''
    rationale: Aunque 'cocer' puede cubrir el sentido, el hebreo בשל y el expediente inglés favorecen la precisión de 'boil' en esta construcción legal.
  revised_spanish_text: Las primeras primicias de tu suelo[a] traerás a la casa de Yahvé, tu Dios. No hervirás un cabrito[b] en la leche de su madre.
  revised_footnotes:
  - marker: a
    text: O, 'de tu tierra'.
    reason: lexical_alternative
  - marker: b
    text: Hebreo 'un cabrito'; es decir, una cría joven de cabra.
    reason: lexical_alternative
  revision_rationale: 'Se revisa la primera cláusula para evitar la redundancia artificial de ''primicias de los primeros frutos'' y reflejar mejor el valor conjunto de רֵאשִׁית בִּכּוּרֵי en un español natural y culto. Se corrigen las notas para que coincidan con las alternativas reales documentadas: ''tu tierra'' como variante de ''tu suelo'' y una nota precisa para גדי. También se ajusta ''cocerás'' a ''hervirás'' por mayor precisión léxica respecto al hebreo y al expediente inglés.'
