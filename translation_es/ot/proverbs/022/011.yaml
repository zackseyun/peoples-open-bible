translation:
  language: es
  text: El que ama la pureza de corazón[a], y cuyo hablar es amable[b]—el rey es su amigo[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «un corazón puro».
    reason: lexical_alternative
  - marker: b
    text: O, más literalmente, «sus labios tienen gracia».
    reason: lexical_alternative
  - marker: c
    text: O «un rey es su amigo».
    reason: alternative_reading
lexical_decisions:
- source_word: אֹהֵב
  english_pob_choice: He who loves
  chosen_spanish: El que ama
  alternatives_spanish:
  - El que ama
  - Quien ama
  - Amante de
  lexicon: HALOT
  rationale: El participio hebreo funciona de manera sustantiva y proverbial. «El que ama» conserva el sentido personal y general sin añadir lectura doctrinal o estilística ajena al texto.
- source_word: טהור לֵב
  english_pob_choice: purity of heart
  chosen_spanish: la pureza de corazón
  alternatives_spanish:
  - un corazón puro
  - la limpieza de corazón
  lexicon: HALOT
  rationale: La relación adjetival expresa una cualidad interna moral. «Pureza de corazón» mantiene el sustantivo abstracto y su fuerza ética; en español resulta natural y fiel al hebreo.
- source_word: חֵן
  english_pob_choice: gracious
  chosen_spanish: graciosas
  alternatives_spanish:
  - llenas de gracia
  - agradables
  - amables
  lexicon: HALOT
  rationale: Aquí חֵן califica el habla/labios, no «gracia» como sustantivo teológico. «Graciosas» traslada el valor adjetival con un registro natural para palabras o expresiones, aunque conserva una leve amplitud semántica.
- source_word: שְׂפָתָיו
  english_pob_choice: whose speech
  chosen_spanish: cuyas palabras
  alternatives_spanish:
  - cuyos labios
  - su habla
  - sus palabras
  lexicon: HALOT
  rationale: Literalmente es «sus labios», pero en español «cuyas palabras» comunica mejor la metonimia del habla procedente de los labios sin perder cercanía con el hebreo.
- source_word: רֵעֵהוּ
  english_pob_choice: his friend
  chosen_spanish: su amigo
  alternatives_spanish:
  - su amigo
  - su compañero
  - su allegado
  lexicon: HALOT
  rationale: El sustantivo expresa cercanía relacional. «Su amigo» es el equivalente más directo y natural en español.
- source_word: מֶלֶךְ
  english_pob_choice: the king
  chosen_spanish: el rey
  alternatives_spanish:
  - un rey
  lexicon: HALOT
  rationale: El sustantivo sin artículo en el hebreo proverbial puede ser genérico; en español la forma definida «el rey» reproduce bien el valor proverbial y la persona soberana como sujeto del refrán.
theological_decisions:
- issue: 'Lectura del sintagma final: «el rey es su amigo» o «un rey es su amigo»'
  english_pob_reading: the king is his friend
  chosen_spanish_reading: el rey es su amigo
  alternative_spanish_readings:
  - un rey es su amigo
  rationale: Se sigue la lectura principal del audit trail inglés, que toma el proverbio como una afirmación proverbial sobre el rey. En español, el artículo definido conserva esa fuerza sentenciosa y la referencia natural al soberano.
  doctrine_reference: Sapiential proverb; no doctrinal claim
translation_notes:
  revision_awareness: Se ha seguido el estado revisado más reciente del audit trail inglés, que permanece sin cambios y con alta concordancia. No se detectan revisiones aplicadas; la redacción española se ajusta al texto hebreo y a las decisiones léxicas auditadas en inglés.
  spanish_consistency_notes:
  - Se mantuvo «rey» con artículo definido para reflejar el valor proverbial señalado en el inglés.
  - Se evitó «SEÑOR» u otra sustitución teológica porque no hay Tetragrámaton ni equivalente directo en este versículo.
  - «Graciosas» se usa en sentido cualitativo de habla amable o favorecida por gracia, no en el sentido moderno de humorístico.
  - Se prefirió «cuyas palabras» para naturalidad española, sin abandonar la metáfora de labios del hebreo.
