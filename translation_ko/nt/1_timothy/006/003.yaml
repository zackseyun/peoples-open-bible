  text: εἴ τις ἑτεροδιδασκαλεῖ καὶ μὴ προσέρχεται ὑγιαίνουσι λόγοις, τοῖς τοῦ κυρίου ἡμῶν Ἰησοῦ Χριστοῦ, καὶ τῇ κατ’ εὐσέβειαν διδασκαλίᾳ,
base_translation:
  language: en
  yaml_path: translation/nt/1_timothy/006/003.yaml
  text: If anyone teaches a different doctrine and does not agree with sound words[a], those of our Lord Jesus Messiah, and with the teaching that accords with godliness[b],
