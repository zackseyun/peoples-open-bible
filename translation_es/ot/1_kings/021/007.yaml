base_translation:
  language: en
  yaml_path: translation/ot/1_kings/021/007.yaml
  text: Then Jezebel his wife said to him[a], “Do you now govern Israel as king? Get up, eat bread, and let your heart be cheerful[b]; I will give you the vineyard of Naboth the Jezreelite.”
  footnotes:
  - marker: a
    text: Or, 'You are now exercising kingship over Israel'—the Hebrew can be read as an assertion or taunt rather than a question.
    reason: alternative_reading
  - marker: b
    text: '''Eat bread'' is a Hebrew idiom for taking a meal.'
    reason: cultural_note
