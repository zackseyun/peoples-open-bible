translation:
  language: es
  text: 'Y cuando los hijos de tu pueblo te digan[a]: «¿No nos dirás qué son estas cosas para ti?»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Literalmente: «¿qué son estas cosas para ti?». El hebreo usa un modismo que pregunta por el significado de la acción simbólica de Ezequiel.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְכַאֲשֶׁר
  english_pob_choice: And when
  chosen_spanish: Y cuando
  alternatives_spanish:
  - Ahora cuando
  - Y al cuando
  lexicon: HALOT
  rationale: La conjunción temporal introduce la siguiente etapa de la acción profética; «Y cuando» conserva la conexión narrativa y el valor temporal sin añadir interpretación.
- source_word: יֹאמְרוּ אֵלֶיךָ
  english_pob_choice: say to you
  chosen_spanish: te digan
  alternatives_spanish:
  - te hablen
  - te pregunten
  lexicon: HALOT
  rationale: אָמַר se traduce de forma básica como «decir». Aunque el contenido es una pregunta, el hebreo usa un verbo de decir, no de preguntar; por eso «te digan» es más transparente.
- source_word: בְּנֵי עַמְּךָ
  english_pob_choice: the sons of your people
  chosen_spanish: los hijos de tu pueblo
  alternatives_spanish:
  - tu pueblo
  - los hijos de tu gente
  - la gente de tu pueblo
  lexicon: HALOT
  rationale: Se conserva la construcción masculina y explícita del hebreo («hijos de tu pueblo») en vez de nivelarla a «tu pueblo», manteniendo la forma de la fuente sin perder claridad en español.
- source_word: הֲלוֹא
  english_pob_choice: Will you not
  chosen_spanish: ¿No ...?
  alternatives_spanish:
  - ¿Acaso no ...?
  - ¿No es que ...?
  lexicon: HALOT
  rationale: La partícula introduce una pregunta retórica con expectativa. En español, «¿No ...?» comunica esa fuerza sin sobrecargar la frase.
- source_word: תַגִּיד לָנוּ
  english_pob_choice: tell us
  chosen_spanish: nos dirás
  alternatives_spanish:
  - nos harás saber
  - nos declararás
  lexicon: HALOT
  rationale: נגד en hiphil puede significar «decir, declarar, dar a conocer». «Nos dirás» es natural en la pregunta directa y mantiene la idea de comunicar algo.
- source_word: מָה אֵלֶּה לָּךְ
  english_pob_choice: what these things are to you
  chosen_spanish: qué son estas cosas para ti
  alternatives_spanish:
  - qué significan estas cosas para ti
  - qué son estas cosas para ti
  lexicon: HALOT
  rationale: Se conserva la estructura más literal del hebreo («qué son estas cosas para ti») y no se amplía a una explicación interpretativa; el contexto ya sugiere el valor simbólico de la acción.
translation_notes:
  revision_awareness: Se corrigió la falta de anclaje del marcador de nota al incluir [a] en el texto principal. Además, se mantuvo una traducción literal del modismo hebreo para reflejar la revisión auditada del inglés POB, que volvió de una paráfrasis explicativa a la forma más literal.
  spanish_consistency_notes:
  - Se usa «hijos» para reflejar la forma masculina explícita del hebreo, coherente con el patrón de la POB en decisiones de género marcado.
  - Se evita «SEÑOR» porque este versículo no contiene el nombre divino ni una cita directa del Tetragrámaton.
  - Se mantiene «qué son estas cosas para ti» para conservar la tensión idiomática del hebreo sin resolverla en exceso.
