translation:
  language: es
  text: Cada mujer pedirá[a] de su vecina y de la mujer que vive en su casa[b] artículos de plata y artículos de oro, y ropa; y los pondréis sobre vuestros hijos y sobre vuestras hijas. Así despojaréis[c] a Egipto.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'solicitará'; tradicionalmente, algunas versiones ponen 'pedirá prestado', pero el verbo hebreo significa más básicamente 'pedir' o 'solicitar'.
    reason: lexical_alternative
  - marker: b
    text: O 'de la mujer residente/forastera en su casa'.
    reason: lexical_alternative
  - marker: c
    text: O 'saquearéis' o 'desvestiréis/despojaréis por completo' a Egipto.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְשָׁאֲלָה
  english_pob_choice: shall ask
  chosen_spanish: pedirá
  alternatives_spanish:
  - pedirá prestado
  - solicitará
  lexicon: HALOT
  rationale: El hebreo שׁאל significa básicamente 'pedir/preguntar'. En español, 'pedir' conserva el valor de solicitud sin introducir la idea de devolución que sí sugeriría 'pedir prestado'.
- source_word: אִשָּׁה
  english_pob_choice: Each woman
  chosen_spanish: Cada mujer
  alternatives_spanish:
  - Una mujer
  - Toda mujer
  lexicon: HALOT
  rationale: El singular hebreo tiene fuerza distributiva; 'Cada mujer' transmite mejor esa distribución natural en español.
- source_word: מִשְּׁכֶנְתָּהּ
  english_pob_choice: from her neighbor
  chosen_spanish: de su vecina
  alternatives_spanish:
  - de su vecina mujer
  - de su vecina cercana
  lexicon: HALOT
  rationale: El sustantivo es femenino y el contexto doméstico permite explicitar 'vecina' en femenino. En español suena natural y mantiene el matiz del texto.
- source_word: וּמִגָּרַת בֵּיתָהּ
  english_pob_choice: from the woman staying in her house
  chosen_spanish: de la mujer que habita en su casa
  alternatives_spanish:
  - de la residente en su casa
  - de la extranjera en su casa
  - de la mujer que vive en su casa
  lexicon: HALOT
  rationale: La forma de גור señala a una persona que reside como forastera o residente temporal. 'Que habita en su casa' conserva la idea de residencia sin forzar un tecnicismo.
- source_word: כְּלֵי כֶסֶף
  english_pob_choice: articles of silver
  chosen_spanish: artículos de plata
  alternatives_spanish:
  - objetos de plata
  - vasijas de plata
  lexicon: HALOT
  rationale: כְּלִי es amplio ('objeto, utensilio, recipiente'). 'Artículos de plata' mantiene la amplitud del término mejor que una especificación más estrecha.
- source_word: וּכְלֵי זָהָב
  english_pob_choice: articles of gold
  chosen_spanish: artículos de oro
  alternatives_spanish:
  - objetos de oro
  - vasijas de oro
  lexicon: HALOT
  rationale: Se mantiene el paralelismo con el miembro anterior y la amplitud semántica del hebreo.
- source_word: וּשְׂמָלֹת
  english_pob_choice: clothing
  chosen_spanish: vestidos
  alternatives_spanish:
  - ropa
  - prendas
  - vestiduras
  lexicon: HALOT
  rationale: El término es general para prendas/vestidos. 'Vestidos' es suficientemente amplio y natural en español bíblico contemporáneo.
- source_word: וְשַׂמְתֶּם עַל
  english_pob_choice: you shall put them on
  chosen_spanish: los pondréis sobre
  alternatives_spanish:
  - los colocaréis sobre
  - los pondréis en
  lexicon: HALOT
  rationale: La construcción con שׂים + על se expresa de forma bastante directa. 'Poner sobre' conserva la imagen y funciona bien en español.
- source_word: בְּנֵיכֶם ... בְּנֹתֵיכֶם
  english_pob_choice: your sons ... your daughters
  chosen_spanish: vuestros hijos ... vuestras hijas
  alternatives_spanish:
  - vuestros hijos varones ... vuestras hijas
  - vuestros hijos ... vuestras hijas
  lexicon: HALOT
  rationale: En español, 'hijos' puede incluir ambos sexos, pero aquí el hebreo distingue explícitamente entre hijos y hijas. Se opta por conservar la distinción mediante 'hijos' y 'hijas' sin perder naturalidad.
- source_word: וְנִצַּלְתֶּם אֶת מִצְרָיִם
  english_pob_choice: So you will plunder Egypt
  chosen_spanish: Así despojaréis a Egipto
  alternatives_spanish:
  - Así saquearéis a Egipto
  - Así despojaréis Egipto
  lexicon: HALOT
  rationale: El piel de נצל aquí tiene el sentido de despojar/saquear. 'Despojaréis a Egipto' refleja la fuerza del verbo sin suavizarlo ni adoptar el eufemismo de 'pedir prestado'.
theological_decisions:
- issue: Cómo expresar el acto sobre Egipto sin atenuar su fuerza moral ni sugerir engaño indebido
  english_pob_reading: So you will plunder Egypt
  chosen_spanish_reading: Así despojaréis a Egipto
  alternative_spanish_readings:
  - Así saquearéis a Egipto
  - Así despojaréis Egipto
  rationale: El texto presenta una inversión de la opresión y un acto de despojo permitido por Dios. 'Despojaréis' conserva la contundencia del hebreo y evita la lectura errónea de 'pedir prestado'.
  doctrine_reference: Translation philosophy §1, §3
translation_notes:
  revision_awareness: Se corrigió la validación anterior eliminando el marcador no anclado [b] y dejando solo [a], que sí aparece en el texto español. La redacción mantiene la distinción distributiva, el matiz femenino del vecino y el sentido fuerte de נצל sin introducir 'prestar'.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' no aplicable en este versículo.
  - '''Artículos de plata/oro'' conserva la amplitud de כְּלִי sin especificar vasijas o joyas.'
  - '''Despojaréis'' se usa consistentemente para נצל en contexto de Egipto, conforme al audit trail inglés.'
