lexical_decisions:
- source_word: κατήρξατο
  english_pob_choice: he began
  chosen_spanish: comenzó
  alternatives_spanish:
  - se puso a
  - empezó
  lexicon: LSJ
  rationale: El aoristo medio aquí introduce el inicio de una acción violenta. «Comenzó» conserva esa incepción sin añadir matices innecesarios.
- source_word: χειρῶν ἀδίκων
  english_pob_choice: lawless hands
  chosen_spanish: manos inicuas
  alternatives_spanish:
  - manos sin ley
  - manos injustas
  - manos impías
  lexicon: LSJ
  rationale: El griego usa un genitivo difícil y comprimido para expresar acción violenta o culpable. «Inicuas» reproduce la fuerza moral negativa de ἀδίκων y mantiene el vínculo con «manos».
- source_word: προηγησαμένου
  english_pob_choice: taking the lead
  chosen_spanish: al frente
  alternatives_spanish:
  - tomando la iniciativa
  - guiando la acción
  - yendo delante
  lexicon: LSJ
  rationale: La cláusula en genitivo absoluto indica que esta persona iba delante en la acción. «Al frente» es una solución idiomática breve que conserva la idea de liderazgo en el ataque.
- source_word: τινὸς Αὐρανοῦ
  english_pob_choice: a certain Auranus
  chosen_spanish: cierto Auranos
  alternatives_spanish:
  - un Auranos
  - un tal Auranos
  lexicon: LSJ
  rationale: τινός con nombre propio suele equivaler a «cierto / un tal». Se translitera el nombre como Auranos para mantener la referencia personal sin domesticarla.
- source_word: προβεβηκότος τὴν ἡλικίαν
  english_pob_choice: advanced in age
  chosen_spanish: avanzado en edad
  alternatives_spanish:
  - ya entrado en años
  - de edad avanzada
  - bien entrado en edad
  lexicon: LSJ
  rationale: La frase participial describe vejez o senectud. «Avanzado en edad» es natural en español y conserva la idea de haber avanzado mucho en años.
- source_word: οὐδὲν δὲ ἧττον καὶ τὴν ἄγνοιαν
  english_pob_choice: but no less in ignorance
  chosen_spanish: pero no menos en ignorancia
  alternatives_spanish:
  - pero igualmente en ignorancia
  - aunque no menos ignorante
  - y no menos por su ignorancia
  lexicon: LSJ
  rationale: Se conserva la comparación retórica entre edad e ignorancia. «No menos en ignorancia» mantiene la dureza del contraste y evita suavizar la acusación.
theological_decisions:
- issue: Tratamiento de ἀδίκων como calificación moral de la violencia
  english_pob_reading: lawless hands
  chosen_spanish_reading: manos inicuas
  alternative_spanish_readings:
  - manos sin ley
  - manos injustas
  rationale: 'No hay una cuestión doctrinal explícita, pero sí una tensión lexical: el griego puede leerse como «sin ley» o como «injustas». «Inicuas» permite conservar ambos aspectos, moral y legal, sin forzar una formulación eclesiástica tradicional.'
  doctrine_reference: N/A
translation_notes:
  revision_awareness: La redacción sigue de cerca el griego de Swete y toma en cuenta la revisión inglesa más reciente, que simplificó la cláusula inicial y eliminó el appositivo innecesario. En español se conserva la densidad del original sin añadir explicaciones que el texto no ofrece.
  spanish_consistency_notes:
  - Se mantiene Auranos como nombre propio transliterado, en coherencia con el tratamiento estándar de nombres personales.
  - «Ignorancia» se conserva literalmente para reflejar ἄγνοιαν y el contraste retórico del versículo.
  - La puntuación separa con comas la cláusula principal y el genitivo absoluto para facilitar la lectura sin perder la compresión griega.
