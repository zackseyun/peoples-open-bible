revisions:
- from: Y cuando Daniel supo que el documento[a] había sido firmado, fue a su casa. Y como las ventanas de su aposento alto[b] estaban abiertas hacia Jerusalén, tres veces al día se arrodillaba sobre sus rodillas[c], oraba y daba gracias delante de su Dios, tal como había hecho antes de esto.
  to: Y cuando Daniel supo que el documento[a] había sido firmado, fue a su casa. Ahora bien, las ventanas de su aposento alto[b] estaban abiertas hacia Jerusalén, y tres veces al día se arrodillaba[c], oraba y daba gracias delante de su Dios, tal como lo había estado haciendo antes de esto.
  rationale: La revisión mantiene todas las decisiones léxicas principales del borrador, pero mejora la fidelidad al aspecto verbal final y la naturalidad del español. Se evita un calco torpe en la descripción de la postura sin perder la información, ya preservada en nota, y se clarifica que Daniel continuaba una práctica habitual previa.
