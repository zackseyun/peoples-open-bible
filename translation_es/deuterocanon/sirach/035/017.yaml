  rationale: Se reemplaza «cuello» por «garganta» para ajustarse al sentido de גרגרת y al audit trail inglés («throat/gullet»). Se simplifica «se come» a «come» para una personificación proverbial más natural en español. Se separan la alternativa léxica y la nota de variante textual en dos notas distintas, preservando mejor la documentación del POB.
