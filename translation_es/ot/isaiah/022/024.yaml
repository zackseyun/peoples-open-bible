    text: O «toda la gloria de la casa de su padre».
    reason: lexical_alternative
  - marker: b
    text: El hebreo probablemente distingue los descendientes principales y las líneas menores de la familia.
    reason: cultural_note
  - marker: c
    text: O «desde los cuencos hasta todos los odres».
    reason: lexical_alternative
  revision_rationale: Se ajusta «las ramas» a «las ramificaciones» para mantener la idea de líneas familiares secundarias sin una imagen demasiado literal o tosca en español. Se cambia «todos los utensilios pequeños» por «todo utensilio pequeño» para reflejar mejor el singular colectivo del hebreo y del audit trail inglés. Se simplifica la nota b para explicar la distinción familiar probable sin imponer una metáfora específica en el texto principal.
