revisions:
- from: Serán como [a] poderosos, pisoteando el cieno de las calles en batalla; pelearán, porque Yahvé está con ellos, y pondrán en vergüenza a los jinetes de caballos.
  to: Serán como hombres poderosos[a], pisoteando el cieno de las calles en batalla; pelearán, porque Yahvé está con ellos, y pondrán en vergüenza a los jinetes.
  rationale: Se ajusta גִּבֹּרִים a «hombres poderosos[a]» para preservar mejor la imagen masculina y marcial documentada por el POB y mejorar la naturalidad del español. Se corrige la colocación de la nota y se simplifica רֹכְבֵי סוּסִים a «jinetes», más idiomático en español sin pérdida de sentido. El resto del versículo puede mantenerse por ser fiel y claro.
