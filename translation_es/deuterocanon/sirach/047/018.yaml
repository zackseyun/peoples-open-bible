review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el sentido general del hebreo y del paralelo griego: segunda persona dirigida a Salomón, nombre honroso asociado con Israel, y acumulación abundante de oro y plata. Sin embargo, la primera cláusula pierde la pasiva verbal de נקראת (''fuiste llamado'') al decir ''Con el nombre honrado'', que en español queda elíptico y menos fiel. Además, el segmento ''el que fue llamado sobre Israel'' queda incompleto si no se explicita que se refiere al nombre.'
  spanish_quality_summary: El español es mayormente claro, pero la apertura 'Con el nombre honrado' no forma una oración natural ni corresponde bien a la sintaxis del original. 'Amontonaste' es posible, pero 'acumulaste' suena más natural y digno en registro bíblico moderno sin perder fuerza. Conviene también evitar el punto y coma tras una frase inicial sintácticamente truncada y restaurar una oración completa.
  glossary_alignment: No hay conflicto fuerte con la terminología del proyecto. Aquí no aparece explícitamente Yahvé en el texto fuente, así que no es necesario introducirlo. 'Nombre honrado' puede mantenerse; 'plata' y 'plomo' están bien. La nota léxica sobre 'llamado sobre Israel' está bien orientada y preserva la ambigüedad documentada.
  issues:
  - severity: high
    issue: La frase inicial 'Con el nombre honrado' omite el verbo pasivo central.
    rationale: נקראת בשם הנכבד significa 'fuiste llamado por/con el nombre honrado', no simplemente una frase preposicional suelta. El borrador pierde la predicación principal y resulta menos fiel y menos natural en español.
  - severity: medium
    issue: El relativo 'el que fue llamado sobre Israel' deja ambiguo el antecedente de manera torpe.
    rationale: 'En español conviene hacer explícito que se refiere al nombre: ''el nombre llamado sobre Israel'' o ''el que es llamado sobre Israel'' unido a ''nombre''. Así se preserva el hebraísmo sin sonar truncado.'
  - severity: low
    issue: '''Amontonaste'' es algo tosco para el registro.'
    rationale: Aunque semánticamente válido, 'acumulaste' encaja mejor en español bíblico moderno y conserva la idea de amasar riquezas.
  revised_spanish_text: Fuiste llamado por el nombre honrado[a], el nombre llamado sobre Israel; acumulaste oro como hierro, y multiplicaste la plata como plomo.
  revised_footnotes:
  - marker: a
    text: 'O: «el nombre llamado sobre Israel». El hebreo puede expresar un nombre invocado sobre, perteneciente a, o reposando sobre alguien; el paralelo griego también apoya este sentido.'
    reason: lexical_alternative
  revision_rationale: Se restituye la estructura verbal del hebreo con 'Fuiste llamado por', se aclara que la segunda cláusula modifica a 'nombre', y se suaviza 'amontonaste' a 'acumulaste' para un español más natural sin perder el sentido de acumulación abundante. La nota existente sigue siendo adecuada y su marcador permanece correctamente anclado.
