revisions:
- from: 'El uno salió de mí, y yo dije: «Ciertamente fue despedazado[a]»; y no lo he visto hasta ahora.'
  to: 'Uno salió de mí, y yo dije: «Ciertamente ha sido despedazado[a]», y no lo he visto hasta ahora.'
  rationale: Se revisa «El uno» a «Uno» para un español más natural sin perder la referencia elíptica del hebreo. Se cambia «fue despedazado» por «ha sido despedazado» para reflejar mejor la decisión aspectual documentada en el POB inglés y armonizar con «no lo he visto hasta ahora». También se suaviza la puntuación para una lectura más natural.
