translation:
  language: es
  text: Los pastizales se visten de rebaños[a], y los valles se cubren de grano; gritan de alegría, sí[b], cantan.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Los prados se visten de rebaños». El sustantivo hebreo puede referirse a pastizales o praderas en este contexto.'
    reason: lexical_alternative
  - marker: b
    text: 'El hebreo personifica vívidamente el paisaje: los valles y los pastizales actúan como si pudieran vestirse, gritar y cantar.'
    reason: cultural_note
lexical_decisions:
- source_word: לָבְשׁוּ
  english_pob_choice: are clothed
  chosen_spanish: están cubiertos
  alternatives_spanish:
  - se visten
  - han sido vestidos
  lexicon: HALOT
  rationale: El verbo hebreo literalmente significa 'vestir / poner ropa'. En poesía, la imagen es que la tierra queda cubierta; 'están cubiertos' comunica el pasivo visual con naturalidad en español, sin perder la metáfora.
- source_word: כָרִים
  english_pob_choice: pastures
  chosen_spanish: pastizales
  alternatives_spanish:
  - praderas
  - mejores
  - campos
  lexicon: HALOT
  rationale: En este contexto de paisaje y rebaños, el término apunta a terreno de pasto. 'Pastizales' expresa bien la zona cubierta por la imagen poética y evita una traducción demasiado específica o anticuada.
- source_word: הַצֹּאן
  english_pob_choice: flocks
  chosen_spanish: rebaños
  alternatives_spanish:
  - el rebaño
  - ovejas
  - ganados menores
  lexicon: HALOT
  rationale: El sustantivo es colectivo y denota animales de ganado menor. 'Rebaños' conserva el sentido colectivo y suena natural después de 'pastizales están cubiertos de'.
- source_word: וַעֲמָקִים
  english_pob_choice: and the valleys
  chosen_spanish: y los valles
  alternatives_spanish:
  - y las hondonadas
  - y los valles profundos
  lexicon: HALOT
  rationale: La equivalencia directa 'valles' es clara y mantiene el paralelismo del paisaje.
- source_word: יַעַטְפוּ
  english_pob_choice: wrap themselves in
  chosen_spanish: se visten
  alternatives_spanish:
  - se envuelven en
  - se cubren de
  lexicon: HALOT
  rationale: El verbo expresa envolver/cubrir. 'Se visten' conserva la personificación poética del hebreo y enlaza con el verbo previo 'estar cubiertos' sin sonar rígido en español.
- source_word: בָר
  english_pob_choice: grain
  chosen_spanish: grano
  alternatives_spanish:
  - cereal
  - trigo
  - cosecha
  lexicon: HALOT
  rationale: El sustantivo es general para producto cereal. 'Grano' es el equivalente amplio y no restringe indebidamente la imagen a una sola especie.
- source_word: יִתְרוֹעֲעוּ
  english_pob_choice: they shout for joy
  chosen_spanish: prorrumpen en gritos de júbilo
  alternatives_spanish:
  - gritan de alegría
  - exultan
  - alzan un grito
  lexicon: HALOT
  rationale: El verbo implica levantar un clamor jubiloso o triunfal. 'Prorrumpen en gritos de júbilo' comunica ese estallido sonoro con dignidad poética.
- source_word: אַף
  english_pob_choice: 'yes'
  chosen_spanish: sí
  alternatives_spanish:
  - también
  - incluso
  - verdaderamente
  lexicon: HALOT
  rationale: 'Aquí la partícula intensifica la cláusula anterior. ''Sí'' reproduce bien la continuación enfática: ''prorrumpen en gritos de júbilo, sí, cantan''.'
- source_word: יָשִׁירוּ
  english_pob_choice: they sing
  chosen_spanish: cantan
  alternatives_spanish:
  - entonan cantos
  - cantan alabanzas
  lexicon: HALOT
  rationale: El verbo básico es 'cantar'. 'Cantan' mantiene la sencillez y el paralelo poético final.
translation_notes:
  revision_awareness: 'La versión inglesa POB vigente traduce con alta concordancia el hebreo masorético: ''The pastures are clothed with flocks, and the valleys wrap themselves in grain; they shout for joy, yes, they sing.'' No se detectaron revisiones posteriores que alteren la lectura base. La redacción española sigue esa misma estructura poética y conserva la personificación del paisaje.'
  spanish_consistency_notes:
  - Se evita 'SEÑOR' porque este versículo no contiene el Tetragrámaton.
  - '''Rebaños'' se usa para el colectivo hebreo צֹּאן, en línea con la decisión inglesa de ''flocks''.'
  - '''Grano'' preserva la amplitud semántica de בָר sin especificar trigo.'
  - La partícula enfática אַף se rinde con 'sí' para mantener el valor intensificador observado en la auditoría inglesa.
