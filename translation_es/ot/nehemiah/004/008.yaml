translation:
  language: es
  text: 'Entonces miré[a], me levanté y dije a los nobles, a los oficiales y al resto del pueblo: «No tengan miedo de ellos. Recuerden al Señor, grande y temible[b], y peleen por sus hermanos[c], por sus hijos, por sus hijas, por sus esposas y por sus casas».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Miré» reproduce el valor observacional y deliberado de ראה en la secuencia narrativa; también podría traducirse «vi».
    reason: lexical_alternative
  - marker: b
    text: O «grande e imponente». El adjetivo hebreo puede denotar lo que inspira asombro reverente o temor; «temible» se usa aquí para preservar ese sentido más fuerte.
    reason: lexical_alternative
  - marker: c
    text: «Hermanos» traduce un sustantivo masculino plural de parentesco. El versículo luego nombra por separado a los hijos, las hijas, las esposas y las casas.
    reason: lexical_alternative
lexical_decisions:
- source_word: וָאֵרֶא
  english_pob_choice: Then I looked
  chosen_spanish: Entonces miré
  alternatives_spanish:
  - Entonces vi
  - Cuando vi
  lexicon: HALOT
  rationale: El verbo en la secuencia narrativa expresa la reacción inmediata de Nehemías. «Miré» conserva el gesto activo de observación antes de levantarse y hablar, de modo más vivo que un simple «vi», sin alejarse del sentido básico de ראה.
- source_word: וָאָקוּם
  english_pob_choice: rose up
  chosen_spanish: me levanté
  alternatives_spanish:
  - me puse de pie
  - me alcé
  lexicon: HALOT
  rationale: קום en este contexto marca una acción decidida. «Me levanté» es natural en español y comunica la transición a la acción con la misma fuerza narrativa.
- source_word: הַחֹרִים
  english_pob_choice: the nobles
  chosen_spanish: los nobles
  alternatives_spanish:
  - los aristócratas
  - los notables
  lexicon: HALOT
  rationale: El término designa a los dirigentes de rango. «Nobles» es la equivalencia más clara y estable en español para este contexto administrativo.
- source_word: הַסְּגָנִים
  english_pob_choice: the officials
  chosen_spanish: los oficiales
  alternatives_spanish:
  - los jefes
  - los gobernantes
  - los funcionarios
  lexicon: HALOT
  rationale: El término se refiere a administradores o subordinados con autoridad. «Oficiales» mantiene la idea de personas investidas de cargo y resulta comprensible para el lector actual.
- source_word: יֶתֶר הָעָם
  english_pob_choice: the rest of the people
  chosen_spanish: el resto del pueblo
  alternatives_spanish:
  - el resto de la gente
  - los demás del pueblo
  lexicon: HALOT
  rationale: La frase distingue al conjunto general del pueblo de los líderes ya mencionados. «El resto del pueblo» conserva esa oposición de manera directa y natural.
- source_word: אַל תִּירְא֖וּ מִפְּנֵיהֶם
  english_pob_choice: Do not be afraid of them
  chosen_spanish: No tengan miedo de ellos
  alternatives_spanish:
  - No les teman
  - No se asusten de ellos
  lexicon: HALOT
  rationale: La construcción hebrea prohíbe el temor ante la presencia del enemigo. «No tengan miedo de ellos» es idiomático en español y mantiene el tono exhortativo sin volverlo excesivamente literal.
- source_word: אֶת אֲדֹנָי
  english_pob_choice: the Lord
  chosen_spanish: al Señor
  alternatives_spanish:
  - al Señor soberano
  - al Dueño
  lexicon: HALOT
  rationale: Aquí אֲדֹנָי funciona como título divino. En español, «Señor» comunica ese uso reverencial de forma estándar y reconocible; se evita «Yahvé» porque el hebreo no usa el Tetragrámaton en este versículo.
- source_word: הַגָּדוֹל וְהַנּוֹרָא
  english_pob_choice: who is great and fearsome
  chosen_spanish: grande y temible
  alternatives_spanish:
  - grande y asombroso
  - grande y terrible
  lexicon: HALOT
  rationale: נורא expresa una grandeza que inspira temor reverente o sobrecogimiento. «Temible» conserva mejor esa tensión que «asombroso», cuyo valor puede sonar debilitado en español contemporáneo.
- source_word: זְכֹרוּ
  english_pob_choice: Remember
  chosen_spanish: Recuerden
  alternatives_spanish:
  - Acuérdense
  - Tengan presente
  lexicon: HALOT
  rationale: El imperativo convoca a la memoria con peso exhortativo y covenantal. «Recuerden» es la forma más directa y natural en este contexto.
- source_word: וְהִלָּחֲמוּ עַל
  english_pob_choice: and fight for
  chosen_spanish: y peleen por
  alternatives_spanish:
  - y luchen por
  - y combatan por
  lexicon: HALOT
  rationale: La forma verbal, con עַל en contexto, comunica luchar en defensa de otros. «Peleen por» expresa con claridad la idea de combate en favor de la familia y del pueblo.
- source_word: אֲחֵיכֶם
  english_pob_choice: your brothers
  chosen_spanish: sus hermanos[a]
  alternatives_spanish:
  - sus hermanos
  - sus parientes masculinos
  lexicon: HALOT
  rationale: El término es masculino plural y el contexto continúa con hijos, hijas, esposas y casas. Se conserva «hermanos» para mantener la especificidad del hebreo y la progresión del listado.
- source_word: בְּנֵיכֶם וּבְנֹתֵיכֶם נְשֵׁיכֶם וּבָתֵּיכֶם
  english_pob_choice: your sons, your daughters, your wives, and your houses
  chosen_spanish: sus hijos, sus hijas, sus esposas y sus casas
  alternatives_spanish:
  - sus hijos, sus hijas, sus mujeres y sus hogares
  - sus hijos e hijas, sus esposas y sus casas
  lexicon: HALOT
  rationale: La lista concreta enumera descendencia, cónyuges y casas. «Casas» conserva la amplitud semítica de la expresión, que puede abarcar vivienda y hogar familiar; «esposas» es más preciso y digno en español que un término más ambiguo como «mujeres».
theological_decisions:
- issue: Tono reverencial del nombre/título divino en אֲדֹנָי
  english_pob_reading: the Lord
  chosen_spanish_reading: al Señor
  alternative_spanish_readings:
  - al Dueño
  - al Señor soberano
  rationale: El versículo usa el título divino אֲדֹנָי, no el Tetragrámaton. En español, «Señor» comunica mejor ese título reverencial y evita introducir «Yahvé», que aquí no está en el hebreo.
  doctrine_reference: 'Contested terms: אֲדֹנָי / κύριος → Señor / Lord'
- issue: Intensidad de הַנּוֹרָא como motivo para no temer a los enemigos
  english_pob_reading: fearsome
  chosen_spanish_reading: temible
  alternative_spanish_readings:
  - asombroso
  - terrible
  rationale: El hebreo enfatiza una grandeza que inspira temor reverente y sobrecogimiento. «Temible» conserva esa fuerza mejor que «asombroso», que en español puede sonar suavizado o banalizado.
  doctrine_reference: 'Translation philosophy: preservar el peso reverente y la tensión lexical cuando el original apunta a temor reverencial'
translation_notes:
  revision_awareness: 'La redacción sigue de cerca la lectura aprobada del texto inglés POB y mantiene sin cambios las decisiones de fondo: secuencia narrativa con mirar/levantarse/hablar, destinatarios sociales en tres grupos, exhortación a no temer, memoria del Señor grande y temible, y combate en favor de la familia. No se detectaron revisiones posteriores que alteren el sentido o requieran reajustes en español.'
  spanish_consistency_notes:
  - Se mantiene «Señor» para אֲדֹנָי como título divino, en coherencia con el tratamiento del hebreo en este pasaje.
  - Se conserva la distinción entre «nobles», «oficiales» y «resto del pueblo» para reflejar la estructura social del versículo.
  - «Temible» preserva la intensidad reverente del adjetivo hebreo sin recurrir a una paráfrasis explicativa.
  - 'La lista familiar se traduce de manera concreta y acumulativa: hijos, hijas, esposas y casas.'
  - El marcador [a] se coloca en «miré» por la nota alternativa de traducción; [b] se coloca en «hermanos» por la precisión del sustantivo masculino plural.
