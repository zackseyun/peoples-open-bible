review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el sentido general del griego: los objetos gloriosos son llevados al cautiverio, los niños pequeños son muertos en las calles y los jóvenes caen por la espada del enemigo. Conserva correctamente los posesivos femeninos sin explicitar el antecedente y mantiene la nota léxica sobre αἰχμάλωτα ἀπήχθη. La única desviación relevante es que «sus jóvenes» pierde el matiz masculino explícito de οἱ νεανίσκοι, que el inglés auditado preserva como “young men”.'
  spanish_quality_summary: El español es claro y digno. «Los vasos de su gloria» suena aceptablemente bíblico, y las notas están bien formuladas. Sin embargo, «fueron muertos» es menos natural y elegante que «fueron abatidos» o «fueron asesinados»; aun así, no constituye un error grave de fidelidad. La reparación necesaria es precisar el referente masculino de νεανίσκοι con «sus jóvenes varones» o mejor «sus hombres jóvenes» para preservar el contraste con «infantes» sin ambigüedad de género.
  glossary_alignment: 'No hay conflictos con la terminología base del proyecto. No aparecen términos sensibles como Yahvé, Mesías, esclavo, etc. La decisión principal a corregir es léxica-contextual: νεανίσκοι debe conservar su referencia a varones jóvenes, no un grupo mixto potencialmente implícito en «jóvenes».'
  issues:
  - severity: medium
    issue: «sus jóvenes» no preserva el matiz masculino de οἱ νεανίσκοι
    rationale: El griego especifica varones jóvenes, y el English POB lo conserva con “young men”. En español, «jóvenes» puede entenderse como mixto; conviene explicitar «hombres jóvenes» para mantener la distinción semántica.
  - severity: low
    issue: «fueron muertos» suena menos natural en español que otras opciones solemnes
    rationale: Aunque es comprensible y fiel en sentido básico, «fueron muertos» resulta algo rígido. «Fueron abatidos» mantiene tono elevado y tragedia sin añadir demasiado; no obstante, esto es una mejora estilística más que una corrección obligatoria.
  revised_spanish_text: Los vasos de su gloria fueron llevados cautivos[a]; sus infantes fueron abatidos en sus calles[b], sus hombres jóvenes por la espada del enemigo.
  revised_footnotes:
  - marker: a
    text: O «fueron conducidos como cautivos». El griego expresa un traslado forzoso al cautiverio.
    reason: lexical_alternative
  - marker: b
    text: El posesivo femenino se refiere a la ciudad personificada en el contexto circundante, probablemente Jerusalén/Sion.
    reason: cross_reference
  revision_rationale: Se ajusta «sus jóvenes» a «sus hombres jóvenes» para conservar el matiz masculino de νεανίσκοι, en línea con la evidencia griega y el audit trail inglés. También se mejora «fueron muertos» a «fueron abatidos» para lograr un español más natural y solemne sin alterar el sentido básico de ἀπεκτάθη.
