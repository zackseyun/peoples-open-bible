base_translation:
  language: en
  yaml_path: translation/ot/jeremiah/016/007.yaml
  text: No one will break bread for them in mourning[a], to comfort them for the dead[b], and no one will give them the cup of consolation to drink for their father or for their mother.
  footnotes:
  - marker: a
    text: Or 'share food with them in mourning.' The Hebrew verb literally means 'break/divide' and likely refers to the customary mourning meal.
    reason: lexical_alternative
  - marker: b
    text: '''The cup of consolation'' likely refers to a customary drink offered to comfort mourners after a death.'
    reason: cultural_note
