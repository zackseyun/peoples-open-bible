translation:
  language: es
  text: Y salieron los saqueadores[a] del campamento de los filisteos en tres compañías[b]. Una compañía se dirigió hacia el camino a Ofra, hacia la tierra de Shual.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebreo literalmente, «el destructor» o «la fuerza destructora»; aquí designa una partida de incursión del campamento filisteo.
    reason: lexical_alternative
  - marker: b
    text: Hebreo literalmente, «tres cabezas» ... «una cabeza»; es un modismo para divisiones o bandas militares.
    reason: lexical_alternative
lexical_decisions:
- source_word: הַמַּשְׁחִית
  english_pob_choice: raiders
  chosen_spanish: saqueadores
  alternatives_spanish:
  - el destructor
  - la fuerza destructora
  - el saqueador
  lexicon: HALOT
  rationale: En este contexto militar, el sustantivo singular con artículo funciona de manera colectiva para una fuerza que sale a hacer incursiones. «Saqueadores» comunica naturalmente ese valor colectivo en español y evita una traducción demasiado literal como «el destructor».
- source_word: שְׁלֹשָׁה רָאשִׁים
  english_pob_choice: in three companies
  chosen_spanish: en tres compañías
  alternatives_spanish:
  - en tres cabezas
  - en tres bandas
  - en tres destacamentos
  lexicon: HALOT
  rationale: La expresión hebrea es idiomática y alude a divisiones militares. «Compañías» conserva el sentido de agrupaciones armadas sin sonar forzado en español.
- source_word: הָרֹאשׁ אֶחָד
  english_pob_choice: one company
  chosen_spanish: una compañía
  alternatives_spanish:
  - una cabeza
  - una banda
  - un destacamento
  lexicon: HALOT
  rationale: La misma locución idiomática reaparece en singular. «Una compañía» mantiene la correspondencia estructural con el hebreo y resulta clara para el lector español.
- source_word: יִפְנֶה
  english_pob_choice: turned
  chosen_spanish: se dirigió
  alternatives_spanish:
  - giró
  - se volvió
  - tomó
  lexicon: HALOT
  rationale: Aquí el verbo describe la dirección tomada por el grupo. «Se dirigió» expresa bien el movimiento hacia una ruta concreta y suena natural en narrativa española.
- source_word: דֶּרֶךְ עָפְרָה
  english_pob_choice: the road to Ophrah
  chosen_spanish: el camino de Ofra
  alternatives_spanish:
  - el camino hacia Ofra
  - la vía de Ofra
  - el camino a Ofra
  lexicon: HALOT
  rationale: דֶּרֶךְ puede significar camino o ruta. «El camino de Ofra» conserva el vínculo del hebreo con un trayecto identificado por el destino, sin sobrecargar la frase.
- source_word: אֶרֶץ שׁוּעָל
  english_pob_choice: the land of Shual
  chosen_spanish: la tierra de Shual
  alternatives_spanish:
  - el territorio de Shual
  - la región de Shual
  lexicon: HALOT
  rationale: אֶרֶץ admite «tierra» o «territorio». «La tierra de Shual» sigue de cerca el valor geográfico y coincide con el registro bíblico usual en español.
- source_word: פְלִשְׁתִּים
  english_pob_choice: the Philistines
  chosen_spanish: los filisteos
  alternatives_spanish:
  - los filisteos
  lexicon: HALOT
  rationale: Nombre étnico estándar en español bíblico, claro y consistente con la tradición de transliteración adaptada.
- source_word: עָפְרָה
  english_pob_choice: Ophrah
  chosen_spanish: Ofra
  alternatives_spanish:
  - Ofrá
  lexicon: HALOT
  rationale: Nombre propio transliterado al uso español bíblico, manteniendo la forma reconocible del topónimo.
- source_word: שׁוּעָל
  english_pob_choice: Shual
  chosen_spanish: Shual
  alternatives_spanish:
  - Shuál
  lexicon: HALOT
  rationale: Nombre regional transliterado, sin intentar traducir el topónimo.
translation_notes:
  revision_awareness: El texto español sigue de cerca el paquete fuente hebreo y el criterio auditado de la POB inglesa, conservando la lectura militar idiomática de הַמַּשְׁחִית y la estructura paralela de «tres cabezas / una cabeza» mediante equivalentes naturales en español. No se registran revisiones aplicadas en el contexto inglés, por lo que no se introducen cambios de crítica textual ni de sentido.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como término base del proyecto cuando aparezca el Tetragrámaton; en este versículo no aparece.
  - Se preserva la transliteración de topónimos y etnónimos con adaptación española usual.
  - «Compañías» se usa como equivalente funcional de la división militar hebrea, sin perder el carácter colectivo del texto.
