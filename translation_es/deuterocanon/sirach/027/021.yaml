translation:
  language: es
  text: Porque una herida puede ser vendada, y después de los insultos puede haber reconciliación; pero el que revela secretos[a] ha perdido la esperanza.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «está más allá de toda esperanza» o «ha desesperado». El griego no explicita qué esperanza se pierde; en el contexto, probablemente se trata de la esperanza de recuperar la confianza tras traicionar una confidencia.'
    reason: lexical_alternative
lexical_decisions:
- source_word: τραῦμά
  english_pob_choice: a wound
  chosen_spanish: una herida
  alternatives_spanish:
  - un daño
  - una lesión
  lexicon: LSJ
  rationale: El griego designa una herida o lesión concreta; «herida» conserva la imagen física que sostiene el proverbio y deja el paralelo con el daño relacional de la segunda cláusula.
- source_word: καταδῆσαι
  english_pob_choice: be bound up
  chosen_spanish: ser vendada
  alternatives_spanish:
  - ser curada
  - ser embendada
  lexicon: LSJ
  rationale: El infinitivo expresa vendar o ligar una herida. En español, «ser vendada» comunica de modo natural la acción terapéutica sin perder el matiz pasivo e impersonal del griego.
- source_word: λοιδορίας
  english_pob_choice: insults
  chosen_spanish: los insultos
  alternatives_spanish:
  - los ultrajes
  - las ofensas
  - los reproches
  lexicon: LSJ
  rationale: El plural apunta al habla ofensiva o injuriosa. «Insultos» es claro y actual, y mantiene el sentido interpersonal del proverbio.
- source_word: διαλλαγή
  english_pob_choice: reconciliation
  chosen_spanish: reconciliación
  alternatives_spanish:
  - restablecimiento
  - paz
  - restauración
  lexicon: LSJ
  rationale: El término alude a la restauración de relaciones tras el conflicto. «Reconciliación» es la equivalencia más directa en español y preserva esa reparación relacional.
- source_word: ἀποκαλύψας
  english_pob_choice: has revealed / reveals
  chosen_spanish: revela
  alternatives_spanish:
  - ha revelado
  - da a conocer
  - descubre
  lexicon: LSJ
  rationale: Aunque formalmente es participio aoristo, en un dicho proverbial se expresa con presente gnómico en español. «Revela» suena natural y conserva el valor sentencioso del griego.
- source_word: μυστήρια
  english_pob_choice: secrets
  chosen_spanish: secretos
  alternatives_spanish:
  - confidencias
  - asuntos ocultos
  - misterios
  lexicon: LSJ
  rationale: En este contexto sapiencial no se trata de «misterios» doctrinales, sino de asuntos confiados en secreto. «Secretos» es la opción más directa y transparente.
- source_word: ἀφήλπισεν
  english_pob_choice: has lost hope
  chosen_spanish: ha perdido la esperanza
  alternatives_spanish:
  - está sin esperanza
  - ha desesperado
  - está más allá de toda esperanza
  lexicon: LSJ
  rationale: El verbo indica quedar sin esperanza o abandonar la esperanza. «Ha perdido la esperanza» conserva el sentido verbal y deja abierto, como en el griego, qué esperanza se ha perdido exactamente.
theological_decisions:
- issue: Sentido de ἀφήλπισεν al final del proverbio
  english_pob_reading: The one who reveals secrets has forfeited hope of restored relationship/trust.
  chosen_spanish_reading: El que revela secretos ha perdido la esperanza de restaurar la confianza o la relación.
  alternative_spanish_readings:
  - El que revela secretos ha caído personalmente en la desesperación.
  - El que revela secretos está moralmente más allá de toda esperanza.
  rationale: En el contexto, la sentencia contrapone heridas e insultos, que todavía pueden repararse, con la traición de confidencias, que destruye la posibilidad de restauración. Sin embargo, el griego es breve y no explicita el objeto de la esperanza; por eso la traducción principal mantiene una formulación abierta y la nota aclara el probable matiz relacional.
  doctrine_reference: Preservar la tensión semántica sin resolverla de manera excesiva.
translation_notes:
  revision_awareness: La redacción sigue el texto griego de Swete y el cierre revisado del audit trail inglés, que cambió «has revealed» por una forma proverbial en presente. En español, el presente gnómico «revela» refleja mejor ese valor sentencioso y evita un pretérito innecesario.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma del proyecto solo cuando corresponda; este versículo no la requiere.
  - Se prefirió «reconciliación» y no «restauración» para conservar la fuerza relacional del sustantivo griego.
  - «Secretos» se usa en sentido sapiencial de confidencias, no de «misterios» religiosos.
