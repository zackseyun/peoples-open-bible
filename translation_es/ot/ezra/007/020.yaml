translation:
  language: es
  text: Y cualquier otra necesidad de la casa de tu Dios que te corresponda suplir[a], la suplirás de la casa de los tesoros del rey.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'También puede expresarse más suavemente: "del tesoro del rey". El arameo dice más literalmente: "de la casa de los tesoros del rey".'
    reason: lexical_alternative
lexical_decisions:
- source_word: וּשְׁאָר
  english_pob_choice: And whatever other
  chosen_spanish: Y cualquier otra
  alternatives_spanish:
  - Y el resto de
  - Y cualquier adicional
  lexicon: HALOT
  rationale: El sustantivo con la conjunción introduce algo adicional a lo ya mencionado. En español, "cualquier otra" comunica bien la idea de provisión adicional sin sonar rígido.
- source_word: חַשְׁחוּת
  english_pob_choice: need
  chosen_spanish: necesidad
  alternatives_spanish:
  - necesidad
  - requerimiento
  - gasto
  lexicon: HALOT
  rationale: El término arameo expresa necesidad o requerimiento material. "Necesidad" es natural en español y conserva la amplitud del hebreo/arameo mejor que "gasto", que sería más estrecho.
- source_word: בֵּית אֱלָהָךְ
  english_pob_choice: the house of your God
  chosen_spanish: la casa de tu Dios
  alternatives_spanish:
  - el templo de tu Dios
  - la casa de tu Dios
  lexicon: HALOT
  rationale: Se conserva el giro bíblico "casa de tu Dios" como equivalente directo y transparente de la expresión del original, sin sustituirlo por una formulación interpretativa como "templo".
- source_word: יִפֶּל לָךְ
  english_pob_choice: falls to you
  chosen_spanish: te corresponda
  alternatives_spanish:
  - te caiga
  - te toque
  - te incumba
  lexicon: HALOT
  rationale: El idiomatismo indica obligación o asignación. "Te corresponda" mantiene la idea de encargo sin forzar una imagen demasiado literal en español.
- source_word: לְמִנְתַּן
  english_pob_choice: to provide
  chosen_spanish: proveer
  alternatives_spanish:
  - dar
  - suministrar
  lexicon: HALOT
  rationale: En este contexto administrativo, "proveer" expresa bien el suministro de lo necesario y se ajusta al valor funcional del infinitivo.
- source_word: תִּנְתֵּן
  english_pob_choice: you shall provide it
  chosen_spanish: la proveerás
  alternatives_spanish:
  - la darás
  - la suministrarás
  lexicon: HALOT
  rationale: Se mantiene el paralelismo con el verbo anterior y se hace explícita la obligación con un futuro de mandato natural en español.
- source_word: מִן בֵּית גִּנְזֵי מַלְכָּא
  english_pob_choice: from the house of the king’s treasuries
  chosen_spanish: de la casa de los tesoros del rey
  alternatives_spanish:
  - del tesoro del rey
  - de la casa del tesoro real
  - de la casa de los tesoros del rey
  lexicon: HALOT
  rationale: Se conserva la estructura de "casa de los tesoros" porque refleja más de cerca el arameo; "del tesoro del rey" sería más fluido, pero suaviza la forma plural y la imagen institucional del original.
translation_notes:
  revision_awareness: El borrador sigue de cerca el sentido del arameo y coincide con el auditable English POB en la estructura general; se conserva la imagen administrativa de "la casa de los tesoros del rey" y se mantiene la obligación implícita con un español natural.
  spanish_consistency_notes:
  - Se usa "tu Dios" porque el texto se dirige directamente al destinatario en segunda persona singular.
  - Se evita "SEÑOR" porque aquí el término fuente es "Dios" y no un sustituto del nombre divino.
  - Se conserva "casa" para reflejar la metáfora institucional del original y la decisión inglesa.
  - No se añade puntuación interpretativa que altere la sintaxis acumulativa del arameo.
