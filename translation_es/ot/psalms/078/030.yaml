translation:
  language: es
  text: Todavía no se habían apartado de su deseo[a]; su comida aún estaba en sus bocas.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Todavía no se habían vuelto extraños a su deseo». El verbo hebreo también puede traducirse de manera más formal; aquí se escogió una expresión más natural que comunica el sentido contextual de no haberse apartado aún de ese deseo.'
    reason: lexical_alternative
lexical_decisions:
- source_word: זָרוּ
  english_pob_choice: turned away
  chosen_spanish: se habían apartado
  alternatives_spanish:
  - se habían desviado
  - se habían alejado
  - se habían separado
  lexicon: HALOT
  rationale: El verbo hebreo transmite la idea de apartarse o desviarse de algo. En este contexto, con מִן + תַּאֲוָה, el sentido es que no habían dejado atrás su deseo desordenado. «Se habían apartado» conserva la fuerza verbal sin sonar tan forzado como una traducción más literal.
- source_word: מִתַּאֲוָתָם
  english_pob_choice: from their craving
  chosen_spanish: de su antojo
  alternatives_spanish:
  - de su deseo
  - de su apetito
  - de su codicia
  lexicon: HALOT
  rationale: תַּאֲוָה puede significar deseo, anhelo, apetito o craving. En el contexto de Salmo 78, donde se describe una demanda voraz de comida, «antojo» comunica un deseo insistente e inapropiado sin cargarlo de manera excesiva hacia lo sexual, como podría ocurrir con «codicia» o «lujuria».
- source_word: עוֹד
  english_pob_choice: still
  chosen_spanish: todavía
  alternatives_spanish:
  - aún
  - todavía no
  - aún entonces
  lexicon: HALOT
  rationale: 'La partícula marca continuidad temporal: en ese momento la comida seguía en su boca. «Todavía» expresa bien esa simultaneidad en español y encaja con el paralelismo poético.'
- source_word: אָכְלָם
  english_pob_choice: their food
  chosen_spanish: la comida
  alternatives_spanish:
  - su alimento
  - lo que comían
  - su comida
  lexicon: HALOT
  rationale: El sustantivo se refiere a la comida/alimento que tenían. «La comida» suena natural y mantiene el valor colectivo sin añadir una precisión innecesaria.
- source_word: בְּפִיהֶם
  english_pob_choice: in their mouths
  chosen_spanish: en su boca
  alternatives_spanish:
  - en sus bocas
  - dentro de su boca
  - en la boca
  lexicon: HALOT
  rationale: Aunque el sufijo es plural, en español la expresión colectiva «en su boca» es idiomática y fluida. La imagen no pierde fuerza en singular colectivo y evita una redundancia poco natural en el verso.
translation_notes:
  revision_awareness: 'El texto hebreo describe una acción aún en curso: el pueblo no se había apartado de su deseo, y la comida seguía en su boca. La versión española conserva la progresión temporal y la imagen concreta sin introducir explicaciones ajenas al verso.'
  spanish_consistency_notes:
  - Se mantuvo un registro bíblico claro y moderno, sin recurrir a equivalentes eclesiásticos tradicionales no requeridos por el hebreo.
  - Se prefirió una expresión colectiva en singular («su boca») para preservar naturalidad en español, dado que el hebreo usa plural posesivo pero la imagen funciona idiomáticamente de forma colectiva.
  - «Antojo» se usa aquí como equivalente contextual de תַּאֲוָה; no pretende suavizar el matiz de deseo intenso, sino hacerlo inteligible en español sin sexualizarlo.
