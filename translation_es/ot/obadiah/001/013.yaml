base_translation:
  language: en
  yaml_path: translation/ot/obadiah/001/013.yaml
  text: Do not enter the gate of my people in the day of their disaster[a]; do not look on his calamity, even you, in the day of his disaster[b]; and do not lay hands on his wealth in the day of his disaster.
  footnotes:
  - marker: a
    text: Or 'look on'; the Hebrew verb is literally 'see,' but here likely carries the sense of looking with malicious satisfaction.
    reason: lexical_alternative
  - marker: b
    text: Or 'his army,' 'his strength,' or 'his resources'; the Hebrew word can denote military force or wealth. Here it is rendered 'wealth' because the context is plundering after disaster.
    reason: lexical_alternative
