  yaml_path: translation/deuterocanon/2_maccabees/015/030.yaml
  text: And he ordered that the head of Nikanor[a], and the hand with the shoulder, be cut off and carried to Jerusalem—he who with his whole body and soul had fought in the forefront for the citizens, and who had preserved from youth his goodwill toward his fellow countrymen.
