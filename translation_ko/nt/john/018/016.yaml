source:
  edition: SBLGNT
  text: ὁ δὲ Πέτρος εἱστήκει πρὸς τῇ θύρᾳ ἔξω. ἐξῆλθεν οὖν ὁ μαθητὴς ὁ ἄλλος ⸀ὁ γνωστὸς ⸂τοῦ ἀρχιερέως⸃ καὶ εἶπεν τῇ θυρωρῷ καὶ εἰσήγαγεν τὸν Πέτρον.
base_translation:
  language: en
  yaml_path: translation/nt/john/018/016.yaml
  text: But Peter was standing outside at the door[a]. So the other disciple, who was known to the high priest[b], went out and spoke to the doorkeeper and brought Peter in.
  footnotes:
  - marker: a
    text: Or 'an acquaintance of the high priest' for 'known to the high priest.' The Greek leaves the exact closeness of the relationship unspecified.
    reason: lexical_alternative
  - marker: b
    text: Or 'gatekeeper' for 'doorkeeper.' The Greek term refers to the person stationed at the entrance.
    reason: lexical_alternative
translation:
  language: ko
  text: 그러나 베드로는 바깥 문 앞에 서 있었습니다. 그래서 대제사장에게 알려진 그 다른 제자가 나가서, 문 지키는 여자에게 말하고 베드로를 데리고 들어왔습니다.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 또는 「대제사장의 지인」. 헬라어는 관계의 친밀도를 명시하지 않는다.
    reason: lexical_alternative
  - marker: b
    text: 또는 「문지기」. 본 헬라어는 입구를 지키는 사람을 가리킨다.
    reason: lexical_alternative
