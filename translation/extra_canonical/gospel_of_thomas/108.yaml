translation:
  text: Jesus said[a], “Whoever drinks from my mouth will become like me. I myself
    shall become he[e][d][c][b], and the hidden things will be revealed to him.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: ‘Drink from my mouth’ preserves the Coptic idiom; mouth often metonymically
      signifies teaching/utterance. The translation does not paraphrase this as ‘drink
      my words.’
    reason: cultural_note
  - marker: b
    text: ‘My equal’ renders ⲛ ⲡⲁϩⲉ; many English versions soften to ‘like me.’ Both
      are possible; ‘equal’ follows the stronger equative force of ⲡⲁϩⲉ (Crum).
    reason: lexical_alternative
  - marker: c
    text: '‘I myself shall become he’: the Coptic uses an emphatic pronoun (ϩⲱⲱ) and
      a compact copular construction (ⲉⲣⲉ … ⲡⲉ). Alternative, slightly smoother English
      is ‘I shall be he.’'
    reason: lexical_alternative
  - marker: d
    text: The phrase-joined layer shows ⲛⲉⲑⲏⲡ, normalized as the relative ⲡⲉⲧⲉⲣⲉϩⲱⲡ
      ‘what is hidden’; the sense is the same.
    reason: textual_variant
  - marker: e
    text: Or 'my equal'.
    reason: previous_rendering
lexical_decisions:
- source_word: ⲡⲉⲧⲉⲣⲉⲛⲁ– (relative future)
  chosen: whoever (drinks)
  alternatives:
  - the one who will (drink)
  lexicon: Layton; Lambdin
  rationale: Relative future construction used gnomicly; English ‘whoever’ best captures
    the indefinite relative sense without awkward future stacking (‘whoever will drink’).
- source_word: ⲥⲱ
  chosen: drink
  alternatives:
  - imbibe
  lexicon: Crum
  rationale: Basic verbal meaning ‘to drink’; the idiom with ⲉⲃⲟⲗ ϩⲛ marks source
    (‘drink from’).
- source_word: ϩⲛ ⲡⲁⲧⲁⲡⲣⲟ
  chosen: from my mouth
  alternatives:
  - out of my mouth
  - from my lips
  lexicon: Crum (ϩⲛ, ⲡⲣⲟ ‘mouth’); Layton (governing prepositions)
  rationale: ϩⲛ with ⲉⲃⲟⲗ indicates source. ⲡⲁⲧⲁⲡⲣⲟ is the possessed form ‘my mouth’;
    the -t- reflects a bound/orthographic feature in this manuscript tradition, but
    the sense is straightforward.
- source_word: ϣⲱⲡⲉ
  chosen: become
  alternatives:
  - come to be
  - be made
  lexicon: Crum; Lambdin
  rationale: Common in Thomas as copulative ‘become’; future marked by ⲛⲁ.
- source_word: ⲛ ⲡⲁϩⲉ
  chosen: my equal
  alternatives:
  - equal to me
  - like me
  lexicon: Crum (ⲡⲁϩⲉ ‘equal, peer’); Layton (equative with ⲛ)
  rationale: Equative construction with ⲛ + ⲡⲁϩⲉ expresses equality; ‘my equal’ preserves
    the force better than the softer ‘like me.’
- source_word: ϩⲱⲱ (emphatic)
  chosen: I myself
  alternatives:
  - indeed I
  - I, yes I
  lexicon: Layton (emphatic pronoun/particle)
  rationale: ϩⲱⲱ adds emphatic focus to ⲁⲛⲟⲕ; ‘I myself’ is idiomatic and preserves
    emphasis.
- source_word: ⲁⲛⲟⲕ ⲛⲁϣⲱⲡⲉ ⲉⲣⲉ ⲛⲧⲟϥ ⲡⲉ
  chosen: I myself shall become he
  alternatives:
  - I shall be he
  - I shall become he (so that he is [me])
  lexicon: Layton (ⲉⲣⲉ as complementizer; copular ⲡⲉ)
  rationale: Periphrastic identity statement; the English preserves the striking reciprocity
    without over-explaining the syntax.
- source_word: ⲡⲉⲧⲉⲣⲉϩⲱⲡ
  chosen: the hidden things
  alternatives:
  - what is hidden
  - the hidden (things)
  lexicon: Crum (ϩⲱⲡ ‘hide’); Layton (relative ⲡⲉⲧⲉⲣⲉ-)
  rationale: Relative clause substantivized; number is generic in Coptic. Rendering
    as ‘the hidden things’ conveys the collective sense.
- source_word: ⲟⲩⲱⲛϩ ⲉⲛⲧⲟϥ
  chosen: will be revealed to him
  alternatives:
  - will appear to him
  - will be made manifest to him
  lexicon: Crum (ⲟⲩⲱⲛϩ ‘appear, be manifest’); Layton (ⲉ + pronominal object = indirect
    object)
  rationale: ⲟⲩⲱⲛϩ in Thomas regularly means ‘become manifest’; ⲉⲛⲧⲟϥ marks the recipient
    (‘to him’).
textual_note: No lacunae in NH II for Saying 108. Dilley’s normalized reading has
  ⲡⲁⲧⲁⲡⲣⲟ (‘my mouth’); the phrase-joined layer shows the same sequence with an internal
  -t- that likely reflects a bound/orthographic feature in this Sahidic text with
  Lycopolitan influence. The printed layer shows ⲛⲉⲑⲏⲡ at line end, normalized to
  the relative construction ⲡⲉⲧⲉⲣⲉϩⲱⲡ ‘what is hidden.’ The clause ⲁⲛⲟⲕ ϩⲱⲱ ⲁⲛⲟⲕ ⲛⲁϣⲱⲡⲉ
  ⲉⲣⲉⲛⲧⲟϥ ⲡⲉ is syntactically compact; ⲉⲣⲉ introduces a predicative complement (‘…become—he
  it is’), yielding the sense ‘I myself shall become he.’
