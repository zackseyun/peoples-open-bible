translation:
  language: es
  text: Y Jesé engendró a su primogénito Eliab[a], Abinadab el segundo y Simea el tercero.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «Simea»; la lista paralela en 1 Samuel 16:9 tiene «Sama».'
    reason: cross_reference
lexical_decisions:
- source_word: וְאִישַׁי
  english_pob_choice: And Jesse
  chosen_spanish: Y Jesé
  alternatives_spanish:
  - Ahora Jesé
  - Jesé
  lexicon: HALOT
  rationale: La conjunción simple וְ en una genealogía funciona como enlace continuo; «Y» conserva esa continuidad. El nombre propio se adapta a la forma usual en español, Jesé, sin añadir matices no presentes en el hebreo.
- source_word: הוֹלִיד
  english_pob_choice: fathered
  chosen_spanish: engendró
  alternatives_spanish:
  - fue padre de
  - engendró a
  lexicon: HALOT
  rationale: El hifil de ילד en contexto genealógico expresa la acción de engendrar o ser padre de. «Engendró» preserva la fuerza genealógica y es más natural en español bíblico que una paráfrasis explicativa.
- source_word: בְּכֹרוֹ
  english_pob_choice: his firstborn
  chosen_spanish: su primogénito
  alternatives_spanish:
  - su primer hijo
  - su hijo primogénito
  lexicon: HALOT
  rationale: בְּכוֹר con sufijo posesivo significa «primogénito». En español, «su primogénito» comunica la relación posesiva y la prioridad de nacimiento sin agregar «hijo», que el contexto ya hace claro.
- source_word: אֱלִיאָב
  english_pob_choice: Eliab
  chosen_spanish: Eliab
  alternatives_spanish:
  - Eliab
  lexicon: HALOT
  rationale: Nombre propio transliterado directamente. No hay razón para adaptar la forma.
- source_word: וַאֲבִינָדָב הַשֵּׁנִי
  english_pob_choice: Abinadab the second
  chosen_spanish: a Abinadab el segundo
  alternatives_spanish:
  - a Abinadab, el segundo
  - Abinadab el segundo
  lexicon: HALOT
  rationale: El hebreo continúa la lista genealógica de modo elíptico. En español, repetir la preposición «a» hace explícita la coordinación de los hijos sin introducir un verbo ausente; «el segundo» mantiene el ordinal.
- source_word: וְשִׁמְעָא הַשְּׁלִישִׁי
  english_pob_choice: and Shimea the third
  chosen_spanish: y a Simea el tercero
  alternatives_spanish:
  - y a Simea, el tercero
  - y Simea el tercero
  lexicon: HALOT
  rationale: La forma hebrea de Crónicas es שִׁמְעָא, por lo que se traduce como «Simea»; se evita armonizar con la forma paralela de Samuel («Shammah») porque el texto base aquí es Chronicles. «El tercero» refleja el ordinal sin añadir contenido.
translation_notes:
  revision_awareness: Se corrigió la validación anterior integrando el marcador de nota [a] directamente en el texto español junto al nombre propio correspondiente, para que la nota cruzada quede anclada al término al que se refiere.
  spanish_consistency_notes:
  - Se mantuvo la secuencia genealógica elíptica del hebreo sin insertar puntuación pesada que rompa la lista.
  - Se prefirió la forma «Jesé» para el nombre propio en español bíblico estándar.
  - Se preservó el valor ordinal de los tres hijos sin expandir el enunciado con elementos no presentes en el hebreo.
