translation:
  language: es
  text: Entonces Ciro, rey de los persas, los[a] sacó y se los entregó a Mitrídates, su tesorero[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Es decir, los utensilios del templo mencionados en el versículo anterior.
    reason: cross_reference
  - marker: b
    text: 'O: «su guardián del tesoro».'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐξήνεγκεν
  english_pob_choice: brought ... out
  chosen_spanish: los sacó
  alternatives_spanish:
  - los hizo salir
  - los sacó afuera
  lexicon: BDAG
  rationale: El griego expresa sacar o llevar hacia afuera. «Los sacó» es natural en español y conserva la idea de extracción/traslado oficial sin añadir matices ajenos.
- source_word: Κῦρος ὁ βασιλεὺς Περσῶν
  english_pob_choice: Cyrus king of the Persians
  chosen_spanish: Ciro, rey de los persas
  alternatives_spanish:
  - Ciro, el rey de Persia
  - el rey Ciro de Persia
  lexicon: LSJ
  rationale: Se mantiene la estructura transparente del griego y el plural étnico «de los persas», en lugar de normalizarlo a «de Persia».
- source_word: παρέδωκεν
  english_pob_choice: handed ... over
  chosen_spanish: se los entregó
  alternatives_spanish:
  - los entregó
  - se los dio
  lexicon: BDAG
  rationale: «Entregó» preserva el acto formal de transferencia a cargo de otra persona. El clítico «se» refleja la relación indirecta implícita en la entrega a Mithridates.
- source_word: Μιθριδάτῃ
  english_pob_choice: Mithridates
  chosen_spanish: Mitrídates
  alternatives_spanish:
  - Mitradates
  lexicon: LSJ
  rationale: Se usa la transliteración habitual al español para el nombre propio griego.
- source_word: τῷ ἑαυτοῦ γαζοφύλακι
  english_pob_choice: his treasurer
  chosen_spanish: su tesorero
  alternatives_spanish:
  - su guardián del tesoro
  - su custodio del tesoro
  lexicon: BDAG
  rationale: γᾳζοφύλαξ designa un funcionario del tesoro. «Tesorero» expresa bien la función administrativa en español contemporáneo y conserva la idea de cargo oficial del reino.
- source_word: αὐτά
  english_pob_choice: them
  chosen_spanish: los
  alternatives_spanish:
  - ellas
  - estas cosas
  lexicon: BDAG
  rationale: El pronombre retoma los objetos del versículo anterior; en español es más natural omitir la repetición nominal y usar el objeto directo clítico «los».
theological_decisions:
- issue: Referencia implícita a los utensilios del templo en el antecedente inmediato
  english_pob_reading: That is, the temple vessels mentioned in the preceding verse.
  chosen_spanish_reading: Los pronombres «los» y «se los» remiten a los utensilios del templo mencionados en el versículo anterior.
  alternative_spanish_readings:
  - los utensilios del templo
  - los vasos del templo
  rationale: El versículo griego usa solo el pronombre αὐτά; la identificación proviene del contexto inmediato. En el texto principal se conserva la referencia pronominal sin explicitarla, y la nota aclara el antecedente sin ampliar indebidamente el versículo.
  doctrine_reference: Contexto literario inmediato; cf. 1 Esdras 2:9-10
translation_notes:
  revision_awareness: 'El pasaje coincide plenamente con el texto griego de Swete (1909) y con el paralelo hebreo aproximado en la secuencia de acciones: sacar los utensilios y entregarlos a un funcionario del tesoro. No se detectaron revisiones necesarias.'
  spanish_consistency_notes:
  - Se mantiene «Ciro» como forma española habitual del nombre.
  - Se evita «SEÑOR» porque el texto no contiene el nombre divino en esta línea.
  - «Tesorero» se usa como cargo administrativo, no como término eclesiástico.
