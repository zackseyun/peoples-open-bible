review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien el sentido básico del griego: un proceso continuo de destrucción/perecer, el temblor, la negativa a mirar el aire y la imposibilidad de escapar. Sin embargo, «aunque no había por dónde huir de él» introduce una concesiva algo más interpretativa y menos directa que el inglés auditado; además, el conjunto suena un poco pesado en español con «estaban siendo destruidos».'
  spanish_quality_summary: El texto es comprensible y bastante fiel, pero puede mejorarse en naturalidad y fluidez sin perder fuerza. «Estaban siendo destruidos» es gramatical, aunque rígido en español bíblico natural; «se iban destruyendo» sería menos preciso en voz. Mejor mantener la pasiva perifrástica por fidelidad, pero pulir el resto. «Negándose incluso» suena algo calcado; «negándose siquiera a mirar» o «rehusando siquiera mirar» expresa mejor la intensidad. También conviene ajustar la cláusula final para una relación más natural con «el aire».
  glossary_alignment: No hay conflictos con la terminología base del proyecto. «El aire» para ἀέρα es correcto. No aparecen términos sensibles como Yahvé, Mesías, esclavo, etc. La nota léxica sobre διώλλυντο se conserva adecuadamente.
  issues:
  - severity: medium
    issue: «Negándose incluso a mirar» suena ligeramente forzado y menos idiomático en español.
    rationale: 'ἀρνούμενοι con el matiz intensivo de «even» se expresa más naturalmente con «siquiera» en este contexto: «negándose siquiera a mirar». Esto preserva mejor la extremidad sin sonar calcado del inglés.'
  - severity: low
    issue: La cláusula «aunque no había por dónde huir de él» es entendible, pero la concesiva «aunque» puede sentirse algo débil o poco natural aquí.
    rationale: El inglés revisado usa «though» para enlazar con naturalidad, pero en español puede sonar más claro «pues no había de dónde huir» o «ya que no había adónde huir de él», dependiendo de cómo se vincule con «el aire». Se busca mantener la idea de inescapabilidad sin torpeza.
  - severity: low
    issue: «Estaban siendo destruidos» es fiel pero pesado.
    rationale: No es incorrecto, y conserva bien la pasividad y el aspecto. Se puede conservar por fidelidad al audit trail, pero el resto de la oración debe aligerarse para que el versículo suene más natural en español.
  revised_spanish_text: Estaban siendo destruidos[a], temblando y negándose siquiera a mirar el aire, pues no había adónde huir de él.
