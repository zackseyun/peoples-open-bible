id: MAT.1.23
reference: Matthew 1:23
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: Ἰδοὺ ἡ παρθένος ἐν γαστρὶ ἕξει καὶ τέξεται υἱόν, καὶ καλέσουσιν τὸ ὄνομα αὐτοῦ Ἐμμανουήλ· ὅ ἐστιν μεθερμηνευόμενον Μεθ’ ἡμῶν ὁ θεός.
base_translation:
  language: en
  yaml_path: translation/nt/matthew/001/023.yaml
  text: Behold[a], the virgin will conceive and bear a son, and they will call his name Immanuel—which is translated[d][c][b], 'God with us.'
  footnotes:
  - marker: a
    text: Or 'young woman.' In Matthew's context, however, the Greek παρθένος and the surrounding birth narrative support 'virgin.'
    reason: lexical_alternative
  - marker: b
    text: Greek 'they will call,' an indefinite plural expression.
    reason: lexical_alternative
  - marker: c
    text: Also transliterated 'Emmanuel.'
    reason: lexical_alternative
  - marker: d
    text: Or 'which translated means'.
    reason: previous_rendering
translation:
  language: ko
  text: 「보라, 처녀가 잉태하여 아들을 낳을 것이요, 그의 이름을 임마누엘이라 부를 것이다.」 이는 번역하면 「하나님께서 우리와 함께 계시다」라는 뜻입니다.
  philosophy: optimal-equivalence
