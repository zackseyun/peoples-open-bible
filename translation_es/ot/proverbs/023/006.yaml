translation:
  language: es
  text: No comas el pan de un hombre de mal ojo[a], ni codicies sus manjares.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo literalmente: “el pan de un mal ojo”. La expresión se refiere a una persona avara, mezquina o poco generosa.'
    reason: lexical_alternative
lexical_decisions:
- source_word: תִּלְחַם
  english_pob_choice: eat
  chosen_spanish: comas
  alternatives_spanish:
  - comas de
  - partícipes
  - ingieras
  lexicon: HALOT
  rationale: En la expresión con לֶחֶם, el verbo comunica comer el pan/comida; en español, 'comer' es la forma natural y precisa. El imperativo negativo 'No comas' conserva el valor exhortativo de la prohibición.
- source_word: לֶחֶם
  english_pob_choice: bread
  chosen_spanish: pan
  alternatives_spanish:
  - alimento
  - comida
  lexicon: HALOT
  rationale: '''Pan'' conserva la imagen literal del hebreo y funciona bien en español bíblico sin sonar arcaico. También puede abarcar metonímicamente una comida.'
- source_word: רַע עָיִן
  english_pob_choice: a man with an evil eye
  chosen_spanish: un hombre de mal ojo
  alternatives_spanish:
  - un hombre avaro
  - un hombre mezquino
  - un hombre envidioso
  lexicon: HALOT
  rationale: Se mantiene la expresión figurada de manera transparente, como hace el POB en inglés. En español 'de mal ojo' preserva la tensión idiomática del hebreo, mientras que las opciones interpretativas quedan implícitas.
- source_word: תתאו
  english_pob_choice: crave
  chosen_spanish: codicies
  alternatives_spanish:
  - desees
  - ansíes
  - apeteces
  lexicon: HALOT
  rationale: El verbo expresa deseo intenso; 'codiciar' comunica mejor la fuerza del impulso que un simple 'desear'. Además, encaja con el tono exhortativo del proverbio.
- source_word: לְמַטְעַמֹּתָיו
  english_pob_choice: his delicacies
  chosen_spanish: sus manjares
  alternatives_spanish:
  - sus delicias
  - sus comidas sabrosas
  - sus bocados
  lexicon: HALOT
  rationale: '''Manjares'' transmite la idea de alimentos especialmente apetecibles y conserva un registro digno y bíblico. Es más natural que una calca demasiado técnica, y más preciso que el genérico ''comida''.'
translation_notes:
  revision_awareness: La revisión automática indicó que no eran necesarios cambios sustantivos; la presente versión mantiene la estructura semántica del original y resuelve la imagen idiomática con un castellano natural pero transparente.
  spanish_consistency_notes:
  - Se mantiene 'pan' para לֶחֶם conforme al valor literal y metonímico del hebreo.
  - '''Mal ojo'' conserva la expresión idiomática del original; la nota aclara su sentido interpretativo sin sustituirla en el texto principal.'
  - '''Codicies'' refleja la intensidad de תתאו mejor que un verbo más débil como ''desees''.'
  - '''Manjares'' ofrece un equivalente elegante para לְמַטְעַמֹּתָיו sin perder el matiz de alimentos delicados o sabrosos.'
