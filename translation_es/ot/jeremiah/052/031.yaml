    issue: Nombre propio יְהוֹיָכִין traducido como 'Jeconías'
    rationale: En Jeremías 52:31 el hebreo nombra a Jehoiachin/יְהוֹיָכִין. Aunque 'Jeconías' aparece en tradición bíblica para el mismo rey en otros contextos, aquí no es la forma más directa ni la más fiel al nombre fuente específico. 'Joaquín' es la forma española bíblica más natural.
  - severity: medium
    issue: Marcador de nota [a] colocado en el nombre en vez del modismo
    rationale: La nota explica 'levantó la cabeza de', no el nombre del rey. El anclaje actual puede confundir al lector sobre qué elemento se está aclarando.
  - severity: low
