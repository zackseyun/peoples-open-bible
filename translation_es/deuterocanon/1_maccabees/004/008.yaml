translation:
  language: es
  text: 'Y dijo Judas a los hombres que estaban con él: «No teman a su multitud, ni se aterroricen por su ataque[a][b]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «su ataque» traduce ὅρμημα en sentido militar; también puede verterse «su embestida», «su arremetida» o «su acometida».
    reason: lexical_alternative
  - marker: b
    text: O «no pierdan el ánimo» para μὴ δειλωθῆτε.
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἰούδας
  english_pob_choice: Judas
  chosen_spanish: Judas
  alternatives_spanish:
  - Judas Macabeo
  lexicon: nombre propio
  rationale: El griego nombra simplemente a Judas; el contexto de 1 Macabeos identifica al líder sin necesidad de añadir el epíteto. Mantengo el nombre breve y reconocible en español.
- source_word: τοῖς ἀνδράσιν τοῖς μετʼ αὐτοῦ
  english_pob_choice: to the men with him
  chosen_spanish: a los hombres que estaban con él
  alternatives_spanish:
  - a sus hombres
  - a los hombres con él
  lexicon: BDAG
  rationale: ἀνδράσιν es masculino plural y en contexto militar. 'Los hombres que estaban con él' conserva el referente humano y la relación inmediata sin forzar una posesión no explícita en el griego.
- source_word: Μὴ φοβεῖσθε
  english_pob_choice: Do not fear
  chosen_spanish: No teman
  alternatives_spanish:
  - No tengan miedo
  - No teman a
  lexicon: BDAG
  rationale: El imperativo prohibitivo expresa una orden directa contra el temor. 'No teman' es natural en español y reproduce la fuerza breve del griego.
- source_word: τὸ πλῆθος αὐτῶν
  english_pob_choice: their multitude
  chosen_spanish: su multitud
  alternatives_spanish:
  - su gran número
  - la multitud de ellos
  lexicon: LSJ
  rationale: πλῆθος apunta a una gran cantidad. 'Su multitud' mantiene la idea de superioridad numérica y conserva la sustantivación del original.
- source_word: τὸ ὅρμημα αὐτῶν
  english_pob_choice: their attack
  chosen_spanish: su ataque
  alternatives_spanish:
  - su embestida
  - su arremetida
  - su acometida
  lexicon: LSJ
  rationale: ὅρμημα puede indicar ímpetu, acometida o ataque. Dado el contexto militar, 'ataque' es claro en español; no obstante, las alternativas conservan mejor la idea de impulso o embestida.
- source_word: μὴ δειλωθῆτε
  english_pob_choice: do not be terrified
  chosen_spanish: ni se aterroricen
  alternatives_spanish:
  - ni pierdan el ánimo
  - ni se acobarden
  - ni se espanten
  lexicon: BDAG
  rationale: δειλόω expresa quedar amedrentado o perder el valor. 'Se aterroricen' comunica bien la reacción emocional fuerte y mantiene la continuidad con 'No teman'. La alternativa 'pierdan el ánimo' conserva la lectura de desánimo/cobardía.
translation_notes:
  revision_awareness: El texto griego y el audit trail inglés muestran alta concordancia y no requieren revisiones sustantivas; se mantiene la doble prohibición con un paralelismo claro en español.
  spanish_consistency_notes:
  - Se conserva el nombre propio «Judas» sin añadir epíteto, siguiendo el griego.
  - Se traduce el mandato negativo con un español directo y sobrio.
  - Se evita suavizar ὅρμημα a un término demasiado genérico; 'ataque' mantiene el contexto militar documentado en el POB inglés.
  - Se usa 'multitud' para reflejar la superioridad numérica sin convertirlo en 'gente' o 'muchedumbre'.
