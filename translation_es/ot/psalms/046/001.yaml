translation:
  language: es
  text: Al director del coro. De los hijos de Coré. Según Alamot[a]. Cántico.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O posiblemente «según muchachas», es decir, para voces femeninas o agudas; el término hebreo «Alamot» probablemente es una indicación musical o el nombre de una melodía.
    reason: lexical_alternative
lexical_decisions:
- source_word: לַמְנַצֵּחַ
  english_pob_choice: For the choir director
  chosen_spanish: Al director del coro
  alternatives_spanish:
  - Para el director del coro
  - Al maestro de coro
  - Para el músico encargado
  lexicon: HALOT
  rationale: En los superscritos de los Salmos, el término señala al responsable de la ejecución musical. 'Director del coro' comunica esa función de manera natural en español contemporáneo sin forzar una interpretación distinta.
- source_word: לִבְנֵי קֹרַח
  english_pob_choice: Of the sons of Korah
  chosen_spanish: De los hijos de Coré
  alternatives_spanish:
  - Para los hijos de Coré
  - Perteneciente a los hijos de Coré
  lexicon: HALOT
  rationale: El lamed en este encabezado puede indicar asociación, atribución o dedicación. 'De los hijos de Coré' conserva esa ambigüedad de forma breve y fiel, sin resolver indebidamente si ellos son autores, intérpretes o destinatarios.
- source_word: עַל
  english_pob_choice: According to
  chosen_spanish: Según
  alternatives_spanish:
  - Con arreglo a
  - Sobre
  - Con referencia a
  lexicon: HALOT
  rationale: En estas inscripciones musicales, עַל suele introducir una indicación de tono, melodía o modo de ejecución. 'Según' reproduce esa función de manera idiomática y evita el calco 'sobre'.
- source_word: עֲלָמוֹת
  english_pob_choice: Alamoth
  chosen_spanish: Alamot
  alternatives_spanish:
  - muchachas
  - voces agudas
  - soprano
  lexicon: HALOT
  rationale: La forma es incierta y probablemente técnica. Se mantiene una transliteración cercana al hebreo para no fijar prematuramente un significado discutido, aunque la nota reconoce la posible referencia a voces femeninas o agudas.
- source_word: שִׁיר
  english_pob_choice: A song
  chosen_spanish: Cántico
  alternatives_spanish:
  - Canción
  - Un cántico
  - Un canto
  lexicon: HALOT
  rationale: En un encabezado salmódico, 'cántico' es una forma natural y digna en español para identificar el tipo de composición. Preserva el valor nominal sin añadir información inexistente en el hebreo.
translation_notes:
  revision_awareness: El texto inglés auditado mantiene la ambigüedad del término técnico עֲלָמוֹת mediante transliteración y nota; la versión española conserva esa decisión con una transliteración equivalente y una nota alternativa que no resuelve indebidamente el sentido.
  spanish_consistency_notes:
  - Se mantiene el tono de superscripción poética y litúrgica del hebreo, con frases breves y nominales.
  - Se preserva la ambigüedad funcional de לִבְנֵי קֹרַח sin explicitar autoría.
  - '''Alamot'' se translitera con adaptación ortográfica española mínima, coherente con el carácter técnico del término.'
