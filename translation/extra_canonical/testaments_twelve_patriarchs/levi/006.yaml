id: T12P.LEV.06
reference: Testament of Levi 6
source:
  edition: Charles 1908 Greek Versions (Levi source-fix v2)
  text: VI. Καὶ¹ ὡς ἠρχόμην πρὸς τὸν πατέρα μου εὗρον ἀσπίδα χαλκῆν *διὸ καὶ τὸ ὄνομα τοῦ ὄρους Ἄσπις² *ὅ ἐστιν³ ἐγγὺς Γεβάλ, ἐκ δεξιῶν Ἀβιμά⁴. 2. Καὶ συνετήρουν τοὺς λόγους τούτους ἐν τῇ καρδίᾳ μου. 3. *Μετὰ δὲ τοῦτο συνεβούλευσα⁵ *τῷ πατρί μου καὶ⁶ τῷ⁷ Ῥουβὴμ⁸ ἵνα εἴπῃ⁹ *τοῖς υἱοῖς¹⁰ Ἐμμώρ¹¹ τοῦ¹² μὴ¹³ *περιτμηθῆναι αὐτούς¹⁴, ὅτι¹⁵ ἐζήλωσα *διὰ τὸ βδέλυγμα¹⁶, *ὃ ἐποίησαν¹⁷ *ἐπὶ τῇ ἀδελφῇ μου¹⁸. 4. Κἀγὼ¹⁹ ἀνεῖλον τὸν Συχὲμ ἐν πρώτοις *καὶ Συμεὼν²⁰ τὸν Ἐμμώρ²¹. 5. Καὶ μετὰ ταῦτα ἐλθόντες²² οἱ ἀδελφοί μου²³ ἐπάταξαν τὴν πόλιν ⌈ἐκείνην⌉²⁴ ἐν στόματι μαχαίρας²⁵. 6. Καὶ ἤκουσεν²⁶ ὁ πατήρ *μου ⌈ταῦτα⌉²⁷ *καὶ ὀργισθεὶς²⁸ ἐλυπήθη²⁹ ὅτι κατεδέξαντο³⁰ τὴν περιτομὴν καὶ³¹ ἀπέθανον³², *καὶ ἐν ταῖς εὐλογίαις³³ †παρεῖδεν ἡμῖν³⁴. 7. *Διότι ἡμάρτομεν ἐπειδὴ³⁵ παρὰ γνώμην αὐτοῦ τοῦτο πεποιήκαμεν³⁶, καίγε ἐμαλακίσθη³⁷ ἐν τῇ ἡμέρᾳ ἐκείνῃ. 8. *Ἀλλ᾿ ἐγὼ εἶδον ὅτι ἀπόφασις θεοῦ ἦν εἰς κακὰ³⁸ διότι ἤθελον ἐποίησεν *καὶ τὴν Σαρρὰ³⁹ ⌈καὶ τὴν Ῥεβέκκα⌉⁴⁰ ποιῆσαι ⌈ὃν τρόπον ἐποίησαν *τὴν Δείναν⁴¹ *τὴν ἀδελφὴν ἡμῶν⁴²⌉, καὶ ὁ⁴³ Κύριος ἐκώλυσεν αὐτούς. 9. Καὶ⁴⁴ ἐδίωξαν Ἀβραὰμ τὸν πατέρα ἡμῶν ξένον ὄντα⁴⁵ καὶ κατεπόνησαν⁴⁶ τὰ ποίμνια⁴⁷ ὀγκούμενα⁴⁸ ὄντα⁴⁹, καὶ Ἐβλαὴν⁵⁰ τὸν οἰκογενῆ⁵¹ αὐτοῦ⁵² σφόδρα⁵³ ἠκίσαντο⁵⁴. 10. *Καίγε οὕτως⁵⁵ ἐποίουν *πᾶσι τοῖς ξένοις⁵⁶, *ἐν δυναστείᾳ ἁρπάζοντες⁵⁷ *τὰς ξένας⁵⁸ καὶ †ἐξενηλάτουν⁵⁹ αὐτάς⁶⁰. 11. *Ἔφθασε δὲ αὐτοὺς ἡ ὀργὴ τοῦ θεοῦ εἰς τέλος⁶¹.
