translation:
  language: es
  text: 'En aquel tiempo, Tatenai, gobernador de Más Allá del Río[a], y Setar-Bosnai y sus asociados vinieron a ellos y les dijeron así: «¿Quién les dio un decreto[b] para edificar esta casa y para completar esta estructura[c]?».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Más Allá del Río» es el nombre administrativo persa de la región al oeste del Éufrates.
    reason: cultural_note
  - marker: b
    text: También puede entenderse «orden» o «mandato»; el arameo טְעֵם puede denotar una disposición oficial, un decreto o una orden.
    reason: lexical_alternative
  - marker: c
    text: El término puede referirse más específicamente a la obra del templo; algunos lo entienden como «muro» o «armazón».
    reason: lexical_alternative
lexical_decisions:
- source_word: בֵּהּ זִמְנָא
  english_pob_choice: At that time
  chosen_spanish: En aquel tiempo
  alternatives_spanish:
  - Entonces
  - A esa sazón
  lexicon: HALOT
  rationale: La expresión aramea es temporal e idiomática; «En aquel tiempo» conserva el valor narrativo con español natural y digno.
- source_word: תַּתְּנַי
  english_pob_choice: Tattenai
  chosen_spanish: Tatenai
  alternatives_spanish:
  - Tattenai
  lexicon: Transliteración propia a partir del hebreo/arameo
  rationale: Se translitera el nombre propio con adaptación gráfica al español, manteniendo la forma reconocible sin añadir interpretación.
- source_word: פַּחַת עֲבַר נַהֲרָה
  english_pob_choice: the governor of Beyond the River
  chosen_spanish: gobernador de Más Allá del Río
  alternatives_spanish:
  - gobernador de Trans-Eufrates
  - gobernador de la provincia de Más Allá del Río
  lexicon: HALOT
  rationale: פַּחַת indica un gobernador provincial. «Más Allá del Río» reproduce el título administrativo persa de modo transparente; se evita el reemplazo por una formulación eclesiástica o explicativa que ocultaría el valor oficial del nombre.
- source_word: וּשְׁתַר בּוֹזְנַי
  english_pob_choice: Shethar-bozenai
  chosen_spanish: Setar-Bosnai
  alternatives_spanish:
  - Shetar-Bozenai
  lexicon: Transliteración propia a partir del hebreo/arameo
  rationale: Se conserva el nombre propio compuesto con ortografía española legible, sin alterar su identidad.
- source_word: וּכְנָוָתְהוֹן
  english_pob_choice: their associates
  chosen_spanish: sus asociados
  alternatives_spanish:
  - sus compañeros
  - sus colegas
  lexicon: HALOT
  rationale: El término refiere a quienes estaban vinculados con ellos; «asociados» mantiene la amplitud del original y su tono administrativo.
- source_word: וְכֵן אָמְרִין לְהֹם
  english_pob_choice: and spoke thus to them
  chosen_spanish: les dijeron así
  alternatives_spanish:
  - les hablaron así
  - y les dijeron de este modo
  lexicon: HALOT
  rationale: La fórmula introduce discurso directo; «les dijeron así» es natural en español y conserva el registro formal del relato.
- source_word: מַן שָׂם לְכֹם טְעֵם
  english_pob_choice: Who gave you a decree
  chosen_spanish: ¿Quién les dio un decreto
  alternatives_spanish:
  - ¿Quién les dio una orden
  - ¿Quién les dio una disposición
  lexicon: HALOT
  rationale: Se sigue la revisión del POB inglés que entendió טְעֵם como decreto/orden oficial. «Dio un decreto» refleja con fidelidad la idea de una autorización formal, preservando la tensión entre orden y decreto sin diluirla.
- source_word: בַּיְתָא דְנָה
  english_pob_choice: this house
  chosen_spanish: esta casa
  alternatives_spanish:
  - este templo
  lexicon: HALOT
  rationale: «Casa» reproduce el término del texto y permite que el contexto de Esdras identifique el templo sin introducir una glosa interpretativa en el cuerpo principal.
- source_word: וְאֻשַּׁרְנָא דְנָה
  english_pob_choice: this structure
  chosen_spanish: esta estructura
  alternatives_spanish:
  - este edificio
  - esta obra
  lexicon: HALOT
  rationale: El término es algo incierto y puede referirse al conjunto de la obra edificada. «Estructura» mantiene la amplitud semántica y la cautela del POB inglés.
- source_word: לְשַׁכְלָלָה
  english_pob_choice: to complete
  chosen_spanish: para completar
  alternatives_spanish:
  - para terminar
  - para llevar a cabo hasta el final
  lexicon: HALOT
  rationale: El verbo expresa llevar algo a su conclusión; «completar» conserva la fuerza de завершamiento sin añadir matices ajenos.
translation_notes:
  revision_awareness: El inglés POB revisó recientemente la cláusula de טְעֵם desde 'set a decree for you' a 'gave you a decree' por ser más natural y exacta. La redacción española sigue esa decisión revisada con «les dio un decreto».
  spanish_consistency_notes:
  - Se mantiene el nombre divino y los títulos administrativos sin ocultarlos tras fórmulas litúrgicas tradicionales.
  - «Casa» y «estructura» conservan la distinción del texto entre el edificio principal y la obra asociada.
  - La puntuación y el encadenamiento de nombres siguen el ritmo narrativo del hebreo/arameo, con estilo publicable en español bíblico moderno.
