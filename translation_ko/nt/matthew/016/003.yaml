  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: καὶ πρωΐ· Σήμερον χειμών, πυρράζει γὰρ στυγνάζων ὁ οὐρανός. ⸀τὸ μὲν πρόσωπον τοῦ οὐρανοῦ γινώσκετε διακρίνειν, τὰ δὲ σημεῖα τῶν καιρῶν οὐ δύνασθε.⸃
base_translation:
  language: en
  yaml_path: translation/nt/matthew/016/003.yaml
  text: 'And in the morning[a], ''Today, stormy weather, for the sky is red and overcast.'' You know how to discern the appearance of the sky[b], but you are not able to discern the signs of the times.'
translation:
  language: ko
  text: '「그리고 아침에는 ‘오늘 폭풍우가 오겠다, 하늘이 붉고 흐리다’ 하고 말한다. 너희는 하늘의 모양은 분별할 줄 알면서, 시대의 표적들은 분별할 수 없는 것이다.」'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 또는 「하늘의 얼굴」. 헬라어는 문자적으로 「하늘의 얼굴」이다.
    reason: lexical_alternative
  - marker: b
    text: 「시대의 표적」은 예수의 메시아적 사역을 포함하여 현재 시점의 영적으로 의미 있는 성격을 가리킬 수 있다.
    reason: cultural_note
lexical_decisions:
- source_word: τὸ ... πρόσωπον τοῦ οὐρανοῦ
  english_pob_choice: the appearance of the sky
  chosen_korean: 하늘의 모양
  alternatives_korean:
  - 하늘의 얼굴
  lexicon: BDAG
  rationale: 문자적 「얼굴(πρόσωπον)」은 한국어에서 부자연스러우므로 「모양」으로 의역하되 각주로 직역을 보존한다.
- source_word: τὰ ... σημεῖα τῶν καιρῶν
  english_pob_choice: the signs of the times
  chosen_korean: 시대의 표적들
  lexicon: BDAG
  rationale: καιρός의 「결정적 시기」 함의를 「시대」로 옮긴다. 「표적」은 정착어이다.
