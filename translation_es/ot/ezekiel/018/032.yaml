    rationale: El texto principal dice «declara el Señor Yahvé[b]», pero la nota b afirma «alternativamente, “el Señor Yahvé”». Eso no es una alternativa; es la misma lectura. Debe conservar la alternativa documentada de manera real, por ejemplo «el Señor Dios».
  - severity: medium
    issue: «Conviértanse» es algo más interpretativo que el hebreo שוב en este lugar.
    rationale: El rastro de auditoría inglés privilegia «turn back / return» sobre una formulación más doctrinal. «Vuélvanse» o «regresen» preserva mejor el movimiento de retorno sin sobreinterpretar.
