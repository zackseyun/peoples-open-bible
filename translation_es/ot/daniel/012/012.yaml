translation:
  language: es
  text: Bienaventurado el que espera y llegue a los 1.335 días[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Dichoso el que espera y llega a los 1.335 días».'
    reason: lexical_alternative
lexical_decisions:
- source_word: אַשְׁרֵי
  english_pob_choice: Blessed is
  chosen_spanish: Bienaventurado es
  alternatives_spanish:
  - Dichoso es
  - Feliz es
  lexicon: HALOT
  rationale: אַשְׁרֵי expresa una beatitud/envidiable dicha. «Bienaventurado» conserva el tono elevado y bíblico sin reducirlo a mera emoción subjetiva.
- source_word: הַמְחַכֶּה
  english_pob_choice: the one who waits
  chosen_spanish: el que espera
  alternatives_spanish:
  - el que aguarda
  - el que sigue esperando
  lexicon: HALOT
  rationale: El participio comunica espera con expectativa. «El que espera» es natural en español y mantiene el valor de proceso continuo.
- source_word: וְיַגִּיעַ
  english_pob_choice: and reaches
  chosen_spanish: y alcanza
  alternatives_spanish:
  - y llega a
  - y arriba a
  lexicon: HALOT
  rationale: El hifil de נגע aquí indica llegar a un punto temporal. «Alcanza» conserva la idea de llegar a una meta o límite numérico de días.
- source_word: לְיָמִים
  english_pob_choice: the days
  chosen_spanish: los días
  alternatives_spanish:
  - a los días
  lexicon: HALOT
  rationale: Con el verbo anterior, la expresión marca el arribo a un número de días determinado. En español, «los días» fluye de manera idiomática sin perder el sentido temporal.
- source_word: אֶלֶף שְׁלֹשׁ מֵאוֹת שְׁלֹשִׁים וַחֲמִשָּׁה
  english_pob_choice: 1,335
  chosen_spanish: '1.335'
  alternatives_spanish:
  - mil trescientos treinta y cinco
  lexicon: HALOT
  rationale: La secuencia numérica hebrea totaliza 1.335. Se conserva en cifra para claridad moderna y para respetar el valor exacto del marcador temporal.
theological_decisions:
- issue: Sentido de la bienaventuranza en un cronograma apocalíptico
  english_pob_reading: Retain the temporal statement without interpreting the 1,335 days symbolically or literally in the translation itself.
  chosen_spanish_reading: Mantener la declaración temporal sin decidir en la traducción si los 1.335 días son un período literal o simbólico.
  alternative_spanish_readings:
  - Interpretarlo como cronología estrictamente literal
  - Interpretarlo como número simbólico o estilizado
  rationale: El hebreo declara bienaventuranza sobre quien persevera hasta ese hito, pero no explica su valor escatológico. La traducción debe preservar esa tensión sin resolverla.
  doctrine_reference: Preservar la tensión teológica en lugar de resolverla
translation_notes:
  revision_awareness: El borrador anterior fue corregido para anclar la nota [a] dentro del texto principal, evitando una nota huérfana y manteniendo coherencia entre el marcador y el pie de página.
  spanish_consistency_notes:
  - Se prefirió «Bienaventurado» por su registro bíblico y por reflejar la fuerza beatífica de אַשְׁרֵי.
  - Se usó cifra con punto como separador de miles conforme a la convención tipográfica española.
  - Se mantuvo el paralelo entre «espera» y «alcanza» para reflejar el participio y el verbo de llegada temporal del hebreo.
