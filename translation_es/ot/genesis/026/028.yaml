  to: 'Y dijeron: «Hemos visto claramente que Yahvé ha estado contigo. Entonces dijimos: “Por favor, que haya un juramento[a] entre nosotros, entre tú y nosotros[b], y hagamos un pacto contigo”».'
  rationale: Se corrigió la ubicación de la nota léxica para que recaiga sobre ‘juramento’, que es el término hebreo relevante (אָלָה), y se mejoró la naturalidad del español cambiando ‘haya’ por ‘que haya’ después de ‘Por favor’. El resto del texto se mantiene por ser fiel al hebreo y a las decisiones auditadas del POB.
