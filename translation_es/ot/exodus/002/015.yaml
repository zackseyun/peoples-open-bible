    rationale: La imagen de «delante de» está presente en hebreo, pero en español esta construcción suena forzada. «Huyó del faraón» transmite el sentido narrativo normal; si se desea conservar el matiz literal, puede explicarse en la decisión léxica o nota, pero no conviene mantener el calco en el texto principal.
