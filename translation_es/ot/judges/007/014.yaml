translation:
  language: es
  text: 'Su compañero respondió y dijo[a]: «Esto no es otra cosa que la espada de Gedeón hijo de Joás, un hombre de Israel. Dios ha entregado a Madián y a todo el campamento en su mano[b]»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Esto no es sino la espada de Gedeón hijo de Joás».'
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «en su mano», un modismo que significa en su poder o dominio.'
    reason: cultural_note
lexical_decisions:
- source_word: וַיַּעַן
  english_pob_choice: answered
  chosen_spanish: respondió
  alternatives_spanish:
  - contestó
  - respondió y dijo
  lexicon: HALOT
  rationale: En fórmula narrativa de diálogo, «respondió» reproduce con naturalidad el valor de ענה y mantiene el paralelo con וַיֹּאמֶר sin sonar redundante en español.
- source_word: רֵעֵהוּ
  english_pob_choice: his companion
  chosen_spanish: su compañero
  alternatives_spanish:
  - su amigo
  - su camarada
  lexicon: HALOT
  rationale: «Compañero» conserva el sentido relacional de רֵעֵהוּ en un contexto de campamento militar, sin cargar una intimidad que «amigo» podría sugerir en español.
- source_word: וַיֹּאמֶר
  english_pob_choice: and said
  chosen_spanish: y dijo
  alternatives_spanish:
  - y dijo además
  - diciendo
  lexicon: HALOT
  rationale: La secuencia narrativa hebrea se vierte con la fórmula natural «y dijo», que preserva la coordinación del original.
- source_word: אֵין זֹאת בִּלְתִּי אִם
  english_pob_choice: This is nothing other than
  chosen_spanish: No hay otra cosa que
  alternatives_spanish:
  - No es sino
  - Esto no es más que
  lexicon: HALOT
  rationale: La construcción hebrea expresa exclusión enfática. «No hay otra cosa que» mantiene ese valor decisivo sin sonar forzado en español.
- source_word: חֶרֶב
  english_pob_choice: the sword
  chosen_spanish: la espada
  alternatives_spanish:
  - una espada
  lexicon: HALOT
  rationale: «Espada» reproduce el objeto de forma directa. En esta identificación visionaria no conviene suavizarla a un abstracto, porque el texto dice literalmente חֶרֶב.
- source_word: גִּדְעוֹן בֶּן יוֹאָשׁ
  english_pob_choice: Gideon son of Joash
  chosen_spanish: Gedeón hijo de Joás
  alternatives_spanish:
  - Gedeón, hijo de Joás
  lexicon: HALOT
  rationale: Se conserva el patronímico en forma concisa y natural en español, con la transliteración estándar bíblica «Gedeón» y «Joás».
- source_word: אִישׁ יִשְׂרָאֵל
  english_pob_choice: a man of Israel
  chosen_spanish: un hombre de Israel
  alternatives_spanish:
  - un israelita
  - un varón de Israel
  lexicon: HALOT
  rationale: Se preserva el singular masculino explícito אִישׁ y la identificación étnico-nacional. «Hombre de Israel» evita borrar el rasgo gramatical marcado por el hebreo.
- source_word: נָתַן הָאֱלֹהִים
  english_pob_choice: God has given
  chosen_spanish: Dios ha entregado
  alternatives_spanish:
  - Dios dio
  - Dios ha dado
  lexicon: HALOT
  rationale: En este contexto de interpretación segura de un sueño, «ha entregado» comunica mejor la idea de poner a disposición o entregar al enemigo, que es la fuerza idiomática de נָתַן aquí.
- source_word: בְּיָדוֹ
  english_pob_choice: into his hand
  chosen_spanish: en su mano
  alternatives_spanish:
  - en su poder
  - bajo su control
  lexicon: HALOT
  rationale: Se mantiene la imagen hebrea de «mano» como idiomática de poder o dominio, sin sustituirla en el texto principal por una explicación.
- source_word: אֶת מִדְיָן
  english_pob_choice: Midian
  chosen_spanish: a Madián
  alternatives_spanish:
  - a Madián
  lexicon: HALOT
  rationale: Se conserva el nombre propio del pueblo enemigo con la forma española bíblica «Madián».
- source_word: וְאֶת כָּל הַמַּחֲנֶה
  english_pob_choice: and the whole camp
  chosen_spanish: y a todo el campamento
  alternatives_spanish:
  - y a todo el ejército
  - y al campamento entero
  lexicon: HALOT
  rationale: «Campamento» refleja mejor מחנה en este escenario militar que «ejército», y «todo» preserva el total marcado por כָּל.
theological_decisions:
- issue: Tratamiento de אִישׁ יִשְׂרָאֵל con género gramatical explícito
  english_pob_reading: a man of Israel
  chosen_spanish_reading: un hombre de Israel
  alternative_spanish_readings:
  - un israelita
  rationale: El hebreo usa el masculino singular אִישׁ, y la línea auditada de la POB mantiene esa marca. En español conviene conservarla para no borrar un rasgo presente en el texto fuente.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
- issue: Valor de נָתַן y el marco de certeza interpretativa
  english_pob_reading: God has given
  chosen_spanish_reading: Dios ha entregado
  alternative_spanish_readings:
  - Dios dio
  - Dios ha dado
  rationale: El contexto no es una narración neutra del pasado, sino una interpretación segura del sueño. «Ha entregado» conserva la decisividad de la acción y el matiz de poner al enemigo en poder de otro.
  doctrine_reference: DOCTRINE.md §Translation philosophy 1, 6
- issue: Preservación de la metáfora de la mano
  english_pob_reading: into his hand
  chosen_spanish_reading: en su mano
  alternative_spanish_readings:
  - en su poder
  - bajo su control
  rationale: La metáfora bíblica de la mano como poder o dominio está claramente documentada en la auditoría inglesa. Se mantiene en el texto principal y no se explica dentro del versículo para no perder la fuerza idiomática.
  doctrine_reference: DOCTRINE.md §Translation philosophy 2, 6
translation_notes:
  revision_awareness: La auditoría inglesa indica que no hubo revisiones posteriores al borrador y que el pasaje quedó con alta concordancia; esta versión española sigue de cerca esas decisiones sin añadir matices no sustentados por el hebreo o por la nota auditada.
  spanish_consistency_notes:
  - Se usa «Yahvé» como forma estándar del proyecto solo cuando aparece el nombre divino; aquí el hebreo tiene אֱלֹהִים, por lo que corresponde «Dios».
  - Se conserva «Gedeón» y «Joás» con ortografía bíblica española habitual, coherente con el resto del proyecto.
  - «Madián» se mantiene como nombre propio geográfico/étnico tradicional en español bíblico, sin alterar el referente.
  - La metáfora de «mano» se preserva en el texto y se explica en nota, siguiendo el tratamiento auditado en inglés.
  - El tono es formal y bíblico, pero con sintaxis española natural para lectura pública.
