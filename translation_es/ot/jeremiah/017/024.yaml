    issue: La nota [b] está aplicada al término equivocado.
    rationale: En el audit trail inglés, la nota [b] explica מַשָּׂא ('load/burden'), no מְלָאכָה. En español debe conservarse esa alternativa léxica anclada en 'carga', no trasladarse al final del versículo.
  - severity: medium
    issue: '''Ninguna obra'' suena menos natural que ''ningún trabajo'' en este contexto sabático.'
    rationale: מְלָאכָה aquí se refiere a labor/trabajo en el sábado. 'Obra' es posible, pero en español contemporáneo de lectura bíblica suena menos idiomático y puede sugerir matices innecesarios.
  - severity: low
    issue: '''Día de reposo'' es correcto pero menos natural que ''sábado'' en la repetición del versículo.'
    rationale: El hebreo dice שַׁבָּת; en español ampliamente legible, 'sábado' comunica el referente con mayor fluidez sin pérdida de significado. No es un error grave, pero mejora la legibilidad.
