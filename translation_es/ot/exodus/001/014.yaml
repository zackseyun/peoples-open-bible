translation:
  language: es
  text: 'Y les amargaron la vida con trabajo duro en mortero y ladrillos, y en toda clase de trabajo del campo: todo el trabajo que les impusieron con dureza[a].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'con crueldad' o 'con brutalidad' para 'con dureza'. El hebreo denota una opresión severa y aplastante.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְמָרְרוּ
  english_pob_choice: made their lives bitter
  chosen_spanish: les amargaron la vida
  alternatives_spanish:
  - hicieron amarga su vida
  - amargaron sus vidas
  lexicon: HALOT
  rationale: El hebreo usa el verbo מרר en sentido metafórico de 'hacer amargo'. En español, 'amargaron la vida' conserva bien la imagen y suena natural sin suavizar el daño expresado en el original.
- source_word: חַיֵּיהֶם
  english_pob_choice: their lives
  chosen_spanish: la vida
  alternatives_spanish:
  - sus vidas
  - su vida
  lexicon: HALOT
  rationale: Aunque el hebreo está en plural con sufijo, en español 'la vida' funciona de modo idiomático con el posesivo implícito en 'les amargaron'. También podría decirse 'sus vidas', pero 'la vida' mantiene fluidez y el sentido colectivo del hebreo.
- source_word: בַּעֲבֹדָה קָשָׁה
  english_pob_choice: with hard labor
  chosen_spanish: con duro trabajo
  alternatives_spanish:
  - con trabajo سختo
  - con labor dura
  lexicon: HALOT
  rationale: עֲבֹדָה cubre 'trabajo/labor/servicio' y קָשָׁה aporta la idea de dureza. 'Duro trabajo' comunica la opresión laboral de manera clara y natural en español.
- source_word: בְּחֹמֶר
  english_pob_choice: in mortar
  chosen_spanish: en mortero
  alternatives_spanish:
  - con mortero
  - en barro
  lexicon: HALOT
  rationale: En este contexto de construcción, חֹמֶר se refiere al material de unión o mezcla de albañilería. 'Mortero' es la correspondencia más clara junto con 'ladrillos'.
- source_word: וּבִלְבֵנִים
  english_pob_choice: and brick
  chosen_spanish: y ladrillos
  alternatives_spanish:
  - y adobes
  - y piezas de ladrillo
  lexicon: HALOT
  rationale: El sustantivo plural designa ladrillos como producto de construcción. En español, 'ladrillos' comunica el paralelo con 'mortero' sin necesidad de explicitar el proceso de fabricación.
- source_word: וּבְכָל עֲבֹדָה בַּשָּׂדֶה
  english_pob_choice: and in every kind of field work
  chosen_spanish: y en toda clase de trabajo del campo
  alternatives_spanish:
  - y en todo trabajo en el campo
  - y en cualquier labor del campo
  lexicon: HALOT
  rationale: La frase amplía el alcance más allá de la obra de construcción. 'Toda clase de trabajo del campo' expresa bien la totalidad y mantiene el registro bíblico sin sonar artificioso.
- source_word: אֵת כָּל עֲבֹדָתָם אֲשֶׁר עָבְדוּ בָהֶם
  english_pob_choice: All their labor that they imposed on them
  chosen_spanish: todo el trabajo que les impusieron
  alternatives_spanish:
  - toda la labor que los hicieron hacer
  - todo su trabajo que les hicieron realizar
  lexicon: HALOT
  rationale: La construcción hebrea es resumptiva y pesada; en español conviene aclarar el sentido causal/opresivo. 'Les impusieron' recoge bien la fuerza de que otros les hicieron cargar con ese trabajo.
- source_word: בְּפָרֶךְ
  english_pob_choice: with harshness
  chosen_spanish: con dureza
  alternatives_spanish:
  - con rudeza
  - con crueldad
  - con brutalidad
  lexicon: HALOT
  rationale: פָרֶךְ comunica severidad opresiva y trato aplastante. 'Con dureza' es sobrio y fiel; conserva la tensión sin exagerar más allá de lo que el término exige.
theological_decisions:
- issue: El alcance del maltrato y la opresión en la esclavitud de Israel
  english_pob_reading: with harshness / with ruthlessness as severe, crushing oppression
  chosen_spanish_reading: con dureza
  alternative_spanish_readings:
  - con crueldad
  - con brutalidad
  - con rudeza
  rationale: 'No se atenúa la opresión: ''dureza'' funciona como equivalente sobrio de פָרֶךְ. Se evita ''ruthlessness'' como lectura principal porque en español sería más interpretativa y menos natural en el verso; la gravedad del acto queda clara por el contexto completo.'
  doctrine_reference: Éxodo 1:11-14; opresión del pueblo de Dios bajo servidumbre forzada
- issue: La relación entre el material de construcción y la enumeración del trabajo
  english_pob_reading: in mortar and brick and in every kind of field work
  chosen_spanish_reading: en mortero y ladrillos, y en toda clase de trabajo del campo
  alternative_spanish_readings:
  - en barro y ladrillos
  - en mortero y en ladrillos
  - en mortero y ladrillo
  rationale: Se conserva la lista concreta del hebreo sin convertirla en una paráfrasis general. 'Mortero y ladrillos' mantiene la imagen de trabajos de construcción y el contraste con el trabajo del campo.
  doctrine_reference: Éxodo 1:11-14; trabajos impuestos por el poder opresor
translation_notes:
  revision_awareness: La traducción inglesa revisó 'bricks' a 'brick' para una pareja más natural con 'mortar' y ajustó la cláusula final para reflejar mejor la construcción hebrea. En español se mantiene el plural 'ladrillos' porque la coordinación con 'mortero' y la enumeración de labores concretas resulta más natural y fiel al campo semántico del texto; la última cláusula se ha condensado con 'les impusieron con dureza' para preservar la fuerza resumptiva del hebreo.
  spanish_consistency_notes:
  - Se usa 'Yahvé' solo cuando el texto lo requiera explícitamente; este versículo no contiene el nombre divino.
  - Se mantiene 'trabajo'/'labor' en vez de 'servicio' porque el contexto es de trabajo forzado, no de servicio voluntario.
  - '''Con dureza'' preserva la severidad de פָרֶךְ sin introducir una explicación doctrinal ajena al verso.'
  - La elipsis de 'la vida' en la primera cláusula es una decisión estilística española para evitar una repetición forzada y conservar naturalidad.
  - El texto evita calco excesivo del inglés y se apoya directamente en la secuencia hebrea de opresión, materiales de construcción y trabajo del campo.
