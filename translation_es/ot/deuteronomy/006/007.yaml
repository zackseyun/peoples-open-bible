review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien la estructura del hebreo y del POB inglés: inculcar/enseñar, hablar de ellas, en casa, en el camino, al acostarse y al levantarse. Sin embargo, el primer verbo está formulado de manera poco natural en español (''Las enseñarás diligentemente''), y la nota existente no preserva la alternativa léxica principal documentada por el POB inglés para שׁנן (''impress them on'' / metáfora de afilar).'
  spanish_quality_summary: La redacción general es clara y de registro bíblico legible. No obstante, 'Las enseñarás diligentemente' suena incorrecto o al menos muy forzado en español, porque normalmente se enseña algo a alguien, no 'se enseñan' directamente 'ellas'. 'Se las enseñarás diligentemente' sería posible pero sigue siendo menos natural que 'se las inculcarás diligentemente' o 'las inculcarás cuidadosamente'. También conviene ajustar la nota para que refleje la razón lexical principal y no solo la extensión doméstica de 'hijos'.
  glossary_alignment: No hay conflicto con la terminología principal del proyecto. 'Hijos' conserva adecuadamente לְבָנֶיךָ según la política de precisión de género. 'Ellas' es defendible por el referente implícito 'estas palabras'.
  issues:
  - severity: high
    issue: '''Las enseñarás diligentemente'' es una construcción poco idiomática en español.'
    rationale: El hebreo שׁנן aquí significa inculcar/enseñar repetidamente. En español, decir 'enseñar algo a alguien' requiere un objeto indirecto expreso; sin él, la frase resulta torpe. 'Las inculcarás diligentemente a tus hijos' o 'se las enseñarás diligentemente a tus hijos' comunica mejor el sentido.
  - severity: medium
    issue: La nota [a] está anclada en 'hijos', pero la principal alternativa léxica documentada por el POB inglés corresponde al verbo שׁנן.
    rationale: El POB inglés conserva una nota sobre el sentido literal de 'afilar' y la alternativa 'impress them on'. La nota española actual solo comenta 'hijos', perdiendo una decisión léxica significativa del verbo fuente.
  - severity: low
    issue: Se pierde la nota inglesa sobre la extensión doméstica de 'your sons'.
    rationale: Aunque 'hijos' en español ya puede funcionar genéricamente y el texto principal es aceptable, conviene preservar en nota la observación de aplicación más amplia del hogar, ya que forma parte del rastro de auditoría del POB.
  revised_spanish_text: Las inculcarás diligentemente[a] a tus hijos[b], y hablarás de ellas cuando te sientes en tu casa, cuando andes por el camino, cuando te acuestes y cuando te levantes.
  revised_footnotes:
  - marker: a
    text: 'O: ''se las grabarás'' o ''se las imprimirás''. El verbo hebreo literalmente tiene el sentido de afilar, usado aquí metafóricamente para instrucción repetida y cuidadosa.'
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: ''tus hijos''. Por extensión, esta instrucción se aplica más ampliamente dentro del hogar.'
    reason: lexical_alternative
  revision_rationale: 'La revisión corrige una formulación española poco natural en el verbo principal y restituye las dos notas significativas del rastro de auditoría inglés: la metáfora léxica de שׁנן y la extensión doméstica de ''tus hijos''. El resto del versículo puede mantenerse tal como está por ser fiel y claro.'
