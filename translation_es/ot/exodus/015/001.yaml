translation:
  language: es
  text: 'Entonces Moisés y los hijos de Israel cantaron este cántico a Yahvé, y dijeron: «Cantaré a Yahvé, porque ha triunfado gloriosamente[a]; caballo y su jinete ha arrojado al mar»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «se ha exaltado grandemente»; la repetición hebrea intensifica el verbo.
    reason: lexical_alternative
lexical_decisions:
- source_word: אָז
  english_pob_choice: Then
  chosen_spanish: Entonces
  alternatives_spanish:
  - Luego
  - Entonces mismo
  lexicon: HALOT
  rationale: Marca temporal que introduce el canto después del cruce del mar; «Entonces» es natural en español y conserva la secuencia narrativa.
- source_word: יָשִׁיר
  english_pob_choice: sang
  chosen_spanish: cantaron
  alternatives_spanish:
  - cantarán
  - comenzaron a cantar
  lexicon: HALOT
  rationale: Aunque la forma hebrea es imperfecta, en este contexto narrativo funciona con valor pasado. En español, el pretérito plural expresa mejor el hecho relatado.
- source_word: וּבְנֵי יִשְׂרָאֵל
  english_pob_choice: the sons of Israel
  chosen_spanish: los hijos de Israel
  alternatives_spanish:
  - los israelitas
  - los hijos de Jacob
  lexicon: HALOT
  rationale: Mantiene la expresión hebrea de descendencia y pertenencia al pueblo, sin suavizarla a una denominación más general.
- source_word: הַשִּׁירָה הַזֹּאת
  english_pob_choice: this song
  chosen_spanish: este cántico
  alternatives_spanish:
  - esta canción
  - este himno
  lexicon: HALOT
  rationale: «Cántico» comunica mejor el registro solemne y litúrgico del pasaje que «canción», sin añadir contenido ajeno al texto.
- source_word: לַיהוָה
  english_pob_choice: to Yahweh
  chosen_spanish: a Yahvé
  alternatives_spanish:
  - para Yahvé
  - al SEÑOR
  lexicon: HALOT
  rationale: Se conserva el nombre divino en la forma de proyecto «Yahvé», conforme al criterio del POB en español, y la preposición se ajusta al español natural.
- source_word: וַיֹּאמְרוּ
  english_pob_choice: and they said
  chosen_spanish: y dijeron
  alternatives_spanish:
  - y dijeron, diciendo
  - y pronunciaron
  lexicon: HALOT
  rationale: La introducción del discurso se expresa con una fórmula simple y natural en español; el hebreo repetitivo no requiere duplicación literal.
- source_word: לֵאמֹר
  english_pob_choice: (omitted as redundant in English revision)
  chosen_spanish: —
  alternatives_spanish:
  - diciendo
  - para decir
  lexicon: HALOT
  rationale: La partícula introductoria queda implícita en español y no necesita sobrecargarse con un gerundio redundante.
- source_word: אָשִׁירָה
  english_pob_choice: I will sing
  chosen_spanish: Cantaré
  alternatives_spanish:
  - Cantaré yo
  - Voy a cantar
  lexicon: HALOT
  rationale: La cohortativa expresa determinación; el futuro simple español reproduce bien ese matiz de resolución y voz poética.
- source_word: כִּי
  english_pob_choice: for
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  lexicon: HALOT
  rationale: Introduce la razón del canto. «Porque» es claro y directo en español.
- source_word: גָאֹה גָּאָה
  english_pob_choice: he has triumphed gloriously
  chosen_spanish: se ha engrandecido gloriosamente
  alternatives_spanish:
  - ha triunfado gloriosamente
  - se ha exaltado grandemente
  lexicon: HALOT
  rationale: La intensificación del verbo con repetición se conserva mediante una expresión que recoge la idea de exaltación/engrandecimiento; se evita reducirlo solo a triunfo militar, aunque ese contexto esté presente.
- source_word: סוּס וְרֹכְבוֹ
  english_pob_choice: horse and its rider
  chosen_spanish: caballo y su jinete
  alternatives_spanish:
  - el caballo y su jinete
  - caballo y jinete
  lexicon: HALOT
  rationale: Se conserva la pareja poética del hebreo y el possessivo singular. «Jinete» comunica el valor funcional de רֹכֵב de manera natural en español.
- source_word: רָמָה
  english_pob_choice: he has thrown
  chosen_spanish: ha arrojado
  alternatives_spanish:
  - ha lanzado
  - ha echado
  lexicon: HALOT
  rationale: Verbo fuerte y natural para el acto de arrojar al mar; mantiene el movimiento violento implícito en el contexto.
- source_word: בַיָּם
  english_pob_choice: into the sea
  chosen_spanish: al mar
  alternatives_spanish:
  - en el mar
  - dentro del mar
  lexicon: HALOT
  rationale: Con «arrojar» el español admite el complemento «al mar» con la misma direccionalidad que la versión inglesa y el valor contextual del hebreo.
theological_decisions:
- issue: Nombre divino יהוה en español
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Jehová
  rationale: El texto hebreo usa el Tetragrámaton directamente. Conforme al criterio del POB en español, se preserva el nombre propio divino como «Yahvé» en vez de ocultarlo tras una convención litúrgica.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יהוה YHWH → Yahweh / Spanish project default for YHWH → Yahvé'
- issue: Valor intensivo de גָאֹה גָּאָה
  english_pob_reading: he has triumphed gloriously; Or 'he is highly exalted'
  chosen_spanish_reading: se ha engrandecido gloriosamente
  alternative_spanish_readings:
  - ha triunfado gloriosamente
  - se ha exaltado grandemente
  rationale: Se conserva la tensión entre exaltación y victoria sin cerrar prematuramente el matiz; el español «engrandecido gloriosamente» permite oír la intensificación del hebreo y su posible doble valor.
  doctrine_reference: POB lexical note on infinitive absolute + finite verb intensification
translation_notes:
  revision_awareness: El audio inglés revisado eliminó la redundancia de «saying» tras «they said», pero mantuvo intacto el resto. En español se refleja esa simplificación con «y dijeron» sin equivalente redundante de לֵאמֹר, preservando la introducción del discurso sin calco innecesario. También se tuvo en cuenta que la decisión final inglesa privilegia «Yahweh» y una nota para la intensificación de גָאֹה גָּאָה.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como forma estándar del proyecto en español para el Tetragrámaton.
  - Se evita «SEÑOR» para no borrar el nombre propio divino que el hebreo presenta explícitamente.
  - «Cántico» conserva el tono poético y solemne de la unidad.
  - Se traduce la secuencia verbal con pretérito narrativo español para claridad y fidelidad discursiva.
  - La voz singular de la cita poética queda preservada con «Cantaré».
