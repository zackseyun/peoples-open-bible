  text: גַּ֤ם מִ/זֵּדִ֨ים חֲשֹׂ֬ךְ עַבְדֶּ֗/ךָ אַֽל יִמְשְׁלוּ בִ֣/י אָ֣ז אֵיתָ֑ם וְ֝/נִקֵּ֗יתִי מִ/פֶּ֥שַֽׁע רָֽב׀־־׃
base_translation:
  language: en
  yaml_path: translation/ot/psalms/019/014.yaml
  text: Also keep your servant back from presumptuous sins[a]; do not let them rule over me[d][c][b]. Then I will be blameless and be cleared from great transgression.
  footnotes:
  - marker: a
    text: Or 'from the arrogant' / 'from proud ones.' The Hebrew can refer either to arrogant people or to presumptuous sins; the main text follows the moral parallel with the previous verse.
    reason: alternative_reading
  - marker: b
    text: Or 'I will be innocent' or 'I will be complete.' The Hebrew term can carry the sense of integrity or wholeness.
    reason: lexical_alternative
  - marker: c
    text: Or 'from great rebellion.'
    reason: lexical_alternative
  - marker: d
    text: Or 'I will be blameless, and I will be cleared'.
    reason: previous_rendering
