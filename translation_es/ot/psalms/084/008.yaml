translation:
  language: es
  text: Van de fuerza en fuerza[a]; cada uno se presenta ante Dios en Sión[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «de tropa en tropa» o «de victoria en victoria»; el hebreo para «fuerza» también puede denotar fuerza, valor o ejército.
    reason: lexical_alternative
  - marker: b
    text: Literalmente, «a Dios»; en este contexto, la idea probable es «ante Dios», es decir, presentarse delante de él en adoración.
    reason: lexical_alternative
lexical_decisions:
- source_word: יֵ֭לְכוּ
  english_pob_choice: They go
  chosen_spanish: Van
  alternatives_spanish:
  - Caminan
  - Van avanzando
  lexicon: HALOT
  rationale: El imperfecto qal plural de הלך expresa movimiento continuo. «Van» conserva el avance progresivo y suena natural en español sin agregar matices no presentes en el hebreo.
- source_word: מֵ/חַ֣יִל אֶל חָ֑יִל
  english_pob_choice: from strength to strength
  chosen_spanish: de fuerza en fuerza
  alternatives_spanish:
  - de vigor en vigor
  - de poder en poder
  - de victoria en victoria
  lexicon: HALOT
  rationale: 'חַיִל tiene un rango semántico amplio: fuerza, valor, ejército, riqueza. En este contexto de peregrinación, «fuerza» conserva la imagen idiomática principal y permite la misma ambigüedad productiva que el hebreo, sin forzar una sola lectura.'
- source_word: יֵרָאֶ֖ה
  english_pob_choice: appears
  chosen_spanish: se presenta
  alternatives_spanish:
  - aparece
  - comparece
  - se deja ver
  lexicon: HALOT
  rationale: El nifal de ראה en contexto cultual puede significar «presentarse» ante Dios. «Se presenta» refleja mejor ese valor idiomático que un pasivo literal, y en español comunica claramente la acción de comparecer en adoración.
- source_word: אֶל אֱלֹהִים
  english_pob_choice: before God
  chosen_spanish: ante Dios
  alternatives_spanish:
  - delante de Dios
  - a Dios
  lexicon: HALOT
  rationale: Aunque la preposición es literalmente «a/toward», en el giro de presentarse en adoración el español natural es «ante Dios», que conserva la relación cultual sin perder el sentido direccional del hebreo.
- source_word: בְּ/צִיּוֹן
  english_pob_choice: in Zion
  chosen_spanish: en Sion
  alternatives_spanish:
  - en Zion
  - en Sión
  lexicon: HALOT
  rationale: Se conserva el nombre propio bíblico tradicional en español, «Sion», como forma estable y reconocible para el lector de iglesia, equivalente funcional de Zion.
theological_decisions:
- issue: Sentido cultual de 'aparece' / 'se presenta' ante Dios
  english_pob_reading: The line describes worshipers presenting themselves before God in Zion.
  chosen_spanish_reading: La línea describe a los peregrinos que se presentan ante Dios en Sion para adorarlo.
  alternative_spanish_readings:
  - La línea dice que cada uno es visto por Dios en Sion.
  - La línea afirma simplemente que aparecen en Sion.
  rationale: El nifal de ראה en este contexto de peregrinación y culto admite el sentido de comparecer ante la deidad. «Se presenta» conserva esa lectura sin convertirla en un pasivo teológico que el hebreo no exige.
  doctrine_reference: Translation philosophy §1, §3
translation_notes:
  revision_awareness: El contexto crítico y el audit trail inglés muestran acuerdo alto y ninguna revisión reciente con cambios. Se conservó la lectura optimizada del inglés, pero se ajustó la sintaxis española para naturalidad y para mantener la ambigüedad léxica de חַיִל y el valor cultual de יֵרָאֶה.
  spanish_consistency_notes:
  - Se usa «Dios» para אֱלֹהִים y «Sion» para צִיּוֹן conforme al estilo bíblico español del proyecto.
  - Se evitó «SEÑOR» porque el versículo no contiene יהוה ni una cita directa del Nombre divino.
  - «Fuerza» mantiene la amplitud semántica de חַיִל sin cerrar la referencia a valor, ejército o victoria.
  - «Se presenta» preserva la fuerza cultual del verbo sin caer en un pasivo rígido.
