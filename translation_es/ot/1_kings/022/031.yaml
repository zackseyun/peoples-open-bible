revisions:
- from: 'Ahora el rey de Aram había ordenado a los treinta y dos comandantes[a] de los carros que eran suyos, diciendo: «No peleen con ni pequeños ni grandes, sino solo con el rey de Israel, él solo».'
  to: 'Ahora bien, el rey de Aram había ordenado a los treinta y dos comandantes[a] de carros que eran suyos, diciendo: «No peleen ni con pequeños ni con grandes, sino solo con el rey de Israel».'
  rationale: Se corrigió una construcción no idiomática del español («con ni pequeños ni grandes») a «ni con pequeños ni con grandes», que conserva el modismo hebreo sin perder claridad. También se eliminó la redundancia de «él solo», ya suficientemente expresada por «sino solo con el rey de Israel». Finalmente, se ajustó «de los carros» a «de carros» por mayor naturalidad militar en español.
