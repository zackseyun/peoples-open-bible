revisions:
- from: Así que amen al forastero[a], porque ustedes fueron forasteros en la tierra de Egipto.
  to: Así que amen al extranjero[a], porque ustedes fueron extranjeros en la tierra de Egipto.
  rationale: Se cambia «forastero» por «extranjero» en el texto principal para representar mejor el sentido social de גֵּר como no nativo residente y vulnerable, en consonancia con la documentación del POB. Se mantiene la cohesión léxica en singular y plural. La nota se ajusta a alternativas idiomáticas en español y se elimina el anglicismo «sojourner».
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T21:36:39Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español transmite correctamente el sentido básico del hebreo: un mandato de amar al גֵר fundamentado en la experiencia de Israel como גֵרִים en Egipto. También preserva bien la relación inferencial de וַאֲהַבְתֶּם con el contexto previo y mantiene «en la tierra de Egipto» por בְאֶרֶץ מִצְרָיִם. Sin embargo, la elección «forastero» no refleja tan bien como «extranjero» o una opción equivalente la idea documentada en el expediente POB de un no nativo residente entre Israel; en español común, «forastero» puede sonar más a alguien de fuera o de paso, y debilita el matiz de residente vulnerable.'
  spanish_quality_summary: El texto es legible y natural. «Así que amen» funciona bien, y «porque ustedes fueron… en la tierra de Egipto» es claro. La principal debilidad de calidad está en «forastero», que suena menos preciso para un registro bíblico amplio y puede sugerir simplemente alguien de otro lugar, no necesariamente un residente extranjero. La nota también incluye «sojourner» en inglés, lo cual no es adecuado en una nota española destinada a lectores hispanohablantes.
  glossary_alignment: 'No hay conflicto con la terminología teológica principal del proyecto. La cuestión clave es léxico-social: para גֵּר, el expediente inglés privilegia «foreigner» con alternativas como «sojourner» y «resident alien». En español, «extranjero» comunica mejor ese campo semántico que «forastero», y la nota debe ofrecer alternativas idiomáticas en español sin dejar un anglicismo sin traducir.'
  issues:
  - severity: medium
    issue: «forastero» no representa con suficiente precisión גֵּר en este contexto
    rationale: Aunque no es erróneo, «forastero» en español suele sugerir alguien de fuera o visitante, mientras que גֵּר aquí se refiere a un no nativo que reside entre Israel en situación vulnerable. «Extranjero» preserva mejor ese valor social general y se alinea más estrechamente con la documentación del POB.
  - severity: medium
    issue: La nota al pie contiene el anglicismo «sojourner»
    rationale: Las notas del texto español deben ser plenamente comprensibles en español. Si se preserva esa alternativa del expediente inglés, debe verterse como «peregrino» o mejor omitirse si introduce ambigüedad; dejarla en inglés no es apropiado.
  - severity: low
    issue: «residente foráneo» suena poco idiomático
    rationale: Como alternativa explicativa, resulta algo forzado en español. «residente extranjero» o «inmigrante residente» serían más naturales, aunque una nota breve con «forastero» y «peregrino» ya puede bastar.
  revised_spanish_text: Así que amen al extranjero[a], porque ustedes fueron extranjeros en la tierra de Egipto.
  revised_footnotes:
