  text: וְ/עָשָׂ֞ה לְ/מִבְצְרֵ֤י מָֽעֻזִּים֙ עִם אֱל֣וֹהַּ נֵכָ֔ר אֲשֶׁ֥ר הכיר יַרְבֶּ֣ה כָב֑וֹד וְ/הִמְשִׁילָ/ם֙ בָּֽ/רַבִּ֔ים וַ/אֲדָמָ֖ה יְחַלֵּ֥ק בִּ/מְחִֽיר־׃
base_translation:
  language: en
  yaml_path: translation/ot/daniel/011/039.yaml
  text: And he will act against the strongest fortresses with a foreign god[a]. Those whom he acknowledges, he will increase with honor, and he will make them rule over many[d][c][b], and he will divide land for a price.
  footnotes:
  - marker: a
    text: Or 'with fortified strongholds' / 'for the fortresses of strongholds'; the Hebrew phrase is compressed and may be understood slightly differently.
    reason: lexical_alternative
  - marker: b
    text: Or 'by means of a foreign god.' The preposition 'with' may express either accompaniment or instrumentality.
    reason: lexical_alternative
  - marker: c
    text: Or 'those who acknowledge him.' The Hebrew could be taken differently, though 'those whom he acknowledges' best fits the verbal form and following pronoun.
    reason: alternative_reading
  - marker: d
    text: Or 'he will apportion land for payment' or 'as a reward.' The phrase indicates a transactional distribution of land.
    reason: lexical_alternative
