translation:
  language: es
  text: Y los haré un horror[a] para todos los reinos de la tierra, por causa de Manasés, hijo de Ezequías, rey de Judá, por causa de lo que hizo en Jerusalén.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «un objeto de horror» o «un terror». El sustantivo hebreo indica algo que provoca estremecimiento, pavor u horror.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּנְתַתִּים
  english_pob_choice: And I will make them
  chosen_spanish: Y los convertiré
  alternatives_spanish:
  - Y los haré
  - Y los entregaré
  lexicon: HALOT
  rationale: En este contexto, נתן con complemento predicativo expresa un cambio de estado, no solo 'dar'. En español, 'convertiré' comunica mejor la idea de hacerlos llegar a ser algo visible para las naciones, manteniendo la fuerza del resultado.
- source_word: לְזַוֲעָה
  english_pob_choice: a horror
  chosen_spanish: un horror
  alternatives_spanish:
  - un objeto de horror
  - un terror
  - algo que cause espanto
  lexicon: HALOT
  rationale: El sustantivo hebreo denota algo que produce estremecimiento, pavor u horror. 'Un horror' es natural en español y conserva la noción de algo que causa repulsión y temor; el matiz alternativo queda reflejado en la nota.
- source_word: לְכֹל מַמְלְכוֹת הָאָרֶץ
  english_pob_choice: to all the kingdoms of the earth
  chosen_spanish: para todos los reinos de la tierra
  alternatives_spanish:
  - ante todos los reinos de la tierra
  - para las miradas de todos los reinos de la tierra
  lexicon: HALOT
  rationale: El lamed aquí marca relación hacia los observadores/naciones. 'Para todos los reinos de la tierra' suena natural en español y conserva la idea de que Israel/Judá queda como objeto visible ante las naciones.
- source_word: בִּגְלַל
  english_pob_choice: because of
  chosen_spanish: por causa de
  alternatives_spanish:
  - a causa de
  - por motivo de
  lexicon: HALOT
  rationale: Es una causalidad directa. 'Por causa de' es claro, formal y apto para repetir el valor causal que aparece también en la cláusula siguiente.
- source_word: מְנַשֶּׁה בֶן יְחִזְקִיָּהוּ
  english_pob_choice: Manasseh son of Hezekiah
  chosen_spanish: Manasés, hijo de Ezequías
  alternatives_spanish:
  - Manasés, hijo de Ezequías
  - Manasés, el hijo de Ezequías
  lexicon: HALOT
  rationale: Los nombres propios se transliteran según uso español bíblico común, sin sustituirlos por equivalentes eclesiásticos distintos del nombre hebreo. La relación filial se expresa de forma directa y sobria.
- source_word: מֶלֶךְ יְהוּדָה
  english_pob_choice: king of Judah
  chosen_spanish: rey de Judá
  alternatives_spanish:
  - monarca de Judá
  lexicon: HALOT
  rationale: Título real estándar; no requiere expansión. 'Rey de Judá' preserva exactamente el rango y el territorio.
- source_word: עַל אֲשֶׁר עָשָׂה
  english_pob_choice: for what he did
  chosen_spanish: por lo que hizo
  alternatives_spanish:
  - a causa de lo que hizo
  - por cuanto hizo
  lexicon: HALOT
  rationale: La construcción explica el fundamento causal de la sentencia. 'Por lo que hizo' es idiomático en español y conserva el enlace retrospectivo con los actos de Manasés.
- source_word: בִּירוּשָׁלִָם
  english_pob_choice: in Jerusalem
  chosen_spanish: en Jerusalén
  alternatives_spanish:
  - en la ciudad de Jerusalén
  lexicon: HALOT
  rationale: Topónimo directo y usual; se mantiene sin expansión.
theological_decisions:
- issue: Juicio corporativo de Judá vinculado explícitamente al pecado de Manasés
  english_pob_reading: Retain the text's explicit causal linkage without softening it
  chosen_spanish_reading: Conservar el vínculo causal explícito sin suavizarlo
  alternative_spanish_readings:
  - Interpretarlo solo como trasfondo histórico
  - Reformularlo para atenuar la responsabilidad colectiva
  rationale: El hebreo afirma de manera directa que la calamidad vendrá por Manasés y por lo que hizo en Jerusalén. La traducción española conserva esa tensión teológica sin resolverla ni diluirla, en consonancia con el texto fuente y la lectura auditada en inglés.
  doctrine_reference: Preservar la tensión teológica en lugar de resolverla
translation_notes:
  revision_awareness: La redacción sigue la revisión final auditada en inglés, que reforzó la consistencia causal al repetir 'because of'. En español se mantuvo esa doble causalidad con 'por causa de' y 'por lo que hizo', sin perder la relación explícita entre la sentencia y los actos de Manasés.
  spanish_consistency_notes:
  - Se usa 'Judá' y 'Jerusalén' con la ortografía española estándar.
  - '''Yahvé'' no aparece en este versículo.'
  - Se evita 'SEÑOR' porque el hebreo aquí no contiene el tetragrama; el versículo trata de Manasés y del juicio anunciado, no de una cita directa del nombre divino.
  - El tono es sobrio y bíblico, con sintaxis natural para lectura pública.
