id: 1PE.2.14
reference: 1 Peter 2:14
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: εἴτε ἡγεμόσιν ὡς δι’ αὐτοῦ πεμπομένοις εἰς ἐκδίκησιν κακοποιῶν ἔπαινον δὲ ἀγαθοποιῶν
base_translation:
  language: en
  yaml_path: translation/nt/1_peter/002/014.yaml
  text: 'or to governors, as those sent by him for the punishment of evildoers and the praise of those who do good.'
translation:
  language: ko
  text: '아니면 그분이 보내신 자들로서, 행악자들을 처벌하고 선을 행하는 자들을 칭찬하기 위한 총독들에게든지 그러하십시오.'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ἡγεμόσιν
  english_pob_choice: governors
  chosen_korean: 총독들
  alternatives_korean:
  - 지방관들
  - 지도자들
  lexicon: BDAG
  rationale: 로마 행정 맥락의 ἡγεμών을 「총독」으로 옮긴다 (복음서의 빌라도 어휘와 동일).
- source_word: δι’ αὐτοῦ πεμπομένοις
  english_pob_choice: those sent by him
  chosen_korean: 그분이 보내신 자들
  alternatives_korean:
  - 그를 통하여 보냄을 받는 자들
  lexicon: BDAG
  rationale: αὐτοῦ의 지시 대상은 왕(2:13)이거나 주(2:13)일 수 있는데 문맥상 왕이 자연스러우나 모호하므로 「그분」으로 옮긴다.
- source_word: ἐκδίκησιν κακοποιῶν
  english_pob_choice: punishment of evildoers
  chosen_korean: 행악자들을 처벌
  alternatives_korean:
  - 악행자에 대한 보복
  - 악을 행하는 자들의 징계
  lexicon: BDAG
  rationale: ἐκδίκησις의 「공적 처벌」 의미를 「처벌」로 평이하게 옮긴다.
- source_word: ἔπαινον ἀγαθοποιῶν
  english_pob_choice: praise of those who do good
  chosen_korean: 선을 행하는 자들을 칭찬
  alternatives_korean:
  - 선행자들의 칭찬
  lexicon: BDAG
  rationale: ἀγαθοποιός를 「선을 행하는 자」로 풀어 옮긴다.
