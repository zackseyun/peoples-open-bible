review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la estructura básica del hebreo: vocativo directo, imperativos de duelo, comparación con el duelo por un hijo único, intensificación del lamento, y el cierre en primera persona plural ''sobre nosotros''. Sin embargo, omite una nota equivalente a la alternativa léxica de וְהִתְפַּלְּשִׁי בָאֵפֶר (''revuélcate / cúbrete / revuélcate en ceniza'') preservada en el rastro inglés, y la nota [b] está anclada en ''duelo'' aunque explica אֵבֶל יָחִיד más propiamente en la frase comparativa.'
  spanish_quality_summary: El español es generalmente claro y digno. No obstante, 'revuélcate en ceniza' suena menos natural en singular incontable; 'revuélcate en cenizas' fluye mejor en español bíblico actual. Además, conviene reubicar la nota sobre 'hijo único' al sintagma correspondiente para mayor precisión. El resto del registro es adecuado y legible.
  glossary_alignment: No hay conflictos con la terminología base del proyecto. 'Hija de mi pueblo', 'cilicio', 'hijo único', 'destructor' y 'sobre nosotros' están bien alineados con las decisiones auditadas. La conservación del cambio pronominal final también es correcta.
  issues:
  - severity: medium
    issue: Falta una nota para la alternativa léxica de וְהִתְפַּלְּשִׁי בָאֵפֶר
    rationale: El inglés POB preserva una nota importante sobre el acto físico de duelo en cenizas ('revolcarse', 'cubrirse'). El español debería conservar esa alternativa/documentación.
  - severity: low
    issue: La nota [b] está anclada en 'duelo' en lugar de en 'hijo único' o la frase comparativa
    rationale: La explicación corresponde a אֵבֶל יָחִיד ('como por un hijo único'), no al verbo 'haz duelo' por sí solo.
  - severity: low
    issue: '''Revuélcate en ceniza'' es menos natural que ''revuélcate en cenizas'''
    rationale: Aunque el hebreo usa singular colectivo, en español la expresión idiomática de luto suena más natural en plural sin pérdida de sentido.
  revised_spanish_text: Hija de mi pueblo[a], cíñete de cilicio y revuélcate[b] en cenizas; haz duelo como por un hijo único[c], un lamento muy amargo, porque de repente vendrá sobre nosotros el destructor.
  revised_footnotes:
