translation:
  language: es
  text: 'Cuando Yahvé tu Dios ensanche tu territorio, como te lo ha prometido, y digas: «Comeré carne», porque tu alma desea comer carne, podrás comer carne conforme a todo el deseo de tu alma[a].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, de manera más idiomática: «a tu corazón le apetezca». El hebreo dice literalmente «conforme a todo el deseo de tu alma».'
    reason: lexical_alternative
lexical_decisions:
- source_word: יַרְחִיב
  english_pob_choice: enlarges
  chosen_spanish: ensanche
  alternatives_spanish:
  - agrande
  - extienda
  lexicon: HALOT
  rationale: El hiphil de רחב expresa hacer más amplio o expandir. «Ensanche» conserva la acción causativa y suena natural en español bíblico contemporáneo.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  - el SEÑOR
  lexicon: HALOT
  rationale: Se preserva el nombre propio del Tetragrámaton, siguiendo la norma del proyecto, en lugar de sustituirlo por un título.
- source_word: גְּבוּלְךָ
  english_pob_choice: your territory
  chosen_spanish: tu territorio
  alternatives_spanish:
  - tu límite
  - tu frontera
  lexicon: HALOT
  rationale: Aunque literalmente es «límite/frontera», aquí se refiere a la extensión del territorio concedido. «Territorio» comunica el sentido contextual con claridad.
- source_word: כַּאֲשֶׁר דִּבֶּר לָךְ
  english_pob_choice: as he has promised you
  chosen_spanish: como te lo ha prometido
  alternatives_spanish:
  - como te habló
  - como te dijo
  lexicon: HALOT
  rationale: En contexto de pacto y bendición futura, «prometido» transmite bien la fuerza del hebreo sin perder el vínculo con דבר («hablar/decir»).
- source_word: וְאָמַרְתָּ אֹכְלָה בָשָׂר
  english_pob_choice: and you say, “I will eat meat,”
  chosen_spanish: 'y digas: «Comeré carne»'
  alternatives_spanish:
  - 'y digas: «Quiero comer carne»'
  - 'y digas: «De comer carne»'
  lexicon: HALOT
  rationale: La forma cohortativa expresa intención o determinación. «Comeré carne» mantiene el valor volitivo sin añadir una paráfrasis más fuerte de la necesaria.
- source_word: בָשָׂר
  english_pob_choice: meat
  chosen_spanish: carne
  alternatives_spanish:
  - carne animal
  - carne para comer
  lexicon: HALOT
  rationale: En este contexto alimentario, «carne» es la equivalencia natural y fiel; no se requiere «flesh»/«flesh» en español ni una glosa explicativa.
- source_word: תְאַוֶּה נַפְשְׁךָ
  english_pob_choice: your soul desires
  chosen_spanish: tu alma desea
  alternatives_spanish:
  - tu alma anhela
  - tú deseas
  lexicon: HALOT
  rationale: Se conserva el lenguaje antropológico de נֶפֶשׁ como «alma», porque la repetición de la frase en el versículo importa. «Desea» refleja el verbo de anhelar/desear sin borrar el sujeto interno.
- source_word: בְּכָל אַוַּת נַפְשְׁךָ
  english_pob_choice: according to all the desire of your soul
  chosen_spanish: conforme a todo el deseo de tu alma
  alternatives_spanish:
  - según todo el deseo de tu alma
  - a todo el deseo de tu alma
  - a tu entero deseo
  lexicon: HALOT
  rationale: La frase hebrea es literalmente «según/con todo el deseo de tu alma». «Conforme a todo el deseo de tu alma» conserva la estructura y el paralelismo con la primera cláusula.
- source_word: תֹּאכַל בָּשָׂר
  english_pob_choice: you may eat meat
  chosen_spanish: podrás comer carne
  alternatives_spanish:
  - puedes comer carne
  - comerás carne
  lexicon: HALOT
  rationale: La construcción es permisiva, no mandatoria. «Podrás» expresa autorización; se evita una obligación que el hebreo no exige.
theological_decisions:
- issue: Nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Jehová
  - el SEÑOR
  rationale: El texto hebreo usa directamente el nombre del pacto. Se evita la sustitución por un título y se mantiene la decisión doctrinal del proyecto de transliterarlo en español.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Anthropología de נַפְשְׁךָ
  english_pob_reading: your soul desires
  chosen_spanish_reading: tu alma desea
  alternative_spanish_readings:
  - tu ser desea
  - tú deseas
  rationale: Se conserva el lenguaje del alma para no aplanar la repetición de נֶפֶשׁ en el versículo. Esto mantiene la tensión antropológica del hebreo entre deseo interno y acto permitido.
  doctrine_reference: 'Lexical anthropology: נֶפֶשׁ / soul'
- issue: Carácter permisivo de la ley
  english_pob_reading: you may eat meat
  chosen_spanish_reading: podrás comer carne
  alternative_spanish_readings:
  - puedes comer carne
  - deberás comer carne
  rationale: El contexto es de permiso legal, no de mandato. «Podrás» refleja la concesión normativa del pasaje y evita endurecer el sentido.
  doctrine_reference: Torah legal register
translation_notes:
  revision_awareness: 'Se incorporó la revisión reciente del audit trail que favorece una formulación más literal y consistente: se mantuvo la intención volitiva de «Comeré carne», se preservó el paralelismo con «tu alma desea» y se tradujo el permiso final con valor autorizativo.'
  spanish_consistency_notes:
  - Se usa «Yahvé» para יְהוָה, conforme al estándar del proyecto.
  - Se mantiene «alma» para נֶפֶשׁ a fin de conservar la repetición semántica del versículo.
  - «Carne» traduce בָשָׂר en su sentido alimentario.
  - El marcador [a] aparece en el texto y corresponde a una única nota al pie.
