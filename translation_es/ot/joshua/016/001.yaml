review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español conserva bien la secuencia básica del hebreo: la suerte para los hijos de José, el punto de partida en el Jordán junto a Jericó, las aguas de Jericó al oriente, y el ascenso desde Jericó hacia la serranía de Betel. Sin embargo, dos elecciones requieren ajuste: 1) הַמִּדְבָּר fue auditado en POB como ''the wilderness'', y ''desierto'' introduce una especificidad geográfica más fuerte que el hebreo no exige; 2) la nota [a] no presenta realmente una alternativa, sino una repetición casi idéntica del texto. También conviene mejorar ''en Jericó'' a ''junto a Jericó'' para reflejar mejor la asociación geográfica de מִיַּרְדֵּן יְרִיחוֹ en español natural.'
  spanish_quality_summary: El texto es generalmente claro y digno, pero 'desierto' suena más estrecho que 'wilderness' y menos acorde con la decisión léxica documentada. 'Región montañosa' es comprensible, aunque 'zona montañosa' o 'serranía' podrían sonar más naturales; no obstante, no es un problema grave. La fluidez general es buena. La nota [a] necesita corregirse para que ofrezca una alternativa útil y no repita la redacción principal.
  glossary_alignment: 'No hay términos teológicos sensibles del glosario mayor en este versículo. ''Betel'' está bien. ''La suerte'' para הַגּוֹרָל y ''los hijos de José'' para לִבְנֵי יוֹסֵף son adecuados. La principal desalineación es הַמִּדְבָּר: debe preferirse ''la región desértica'' o ''el desierto'' solo con justificación contextual; aquí, por fidelidad al POB y al hebreo, conviene ''el desierto'' evitarlo en favor de ''el desierto'' no, mejor ''la región desértica'' o ''el desierto'' sería menos preciso. La mejor opción aquí es ''por el territorio silvestre'' no suena bíblico; por ello se recomienda ''por la región desértica'' como compromiso natural y fiel al sentido de ''wilderness''.'
  issues:
  - severity: medium
    issue: '''el desierto'' para הַמִּדְבָּר'
    rationale: El hebreo מדבר y la auditoría inglesa prefieren 'wilderness', no necesariamente 'desierto' en sentido estricto. 'Desierto' puede estrechar indebidamente el referente geográfico. 'Región desértica' mantiene mejor la amplitud semántica y suena natural en español bíblico moderno.
  - severity: low
    issue: '''en Jericó'' para מִיַּרְדֵּן יְרִיחוֹ'
    rationale: Aunque comprensible, 'desde el Jordán en Jericó' puede sugerir que el Jordán está dentro de la ciudad. 'Junto a Jericó' o 'a la altura de Jericó' expresa mejor la relación geográfica.
  - severity: medium
    issue: La nota [a] no da una alternativa real útil
    rationale: 'La nota dice ''O: «la suerte salió para los hijos de José»'', que es prácticamente igual al texto principal y no refleja la alternativa auditada (''cayó la suerte''). Debe reformularse para aportar valor exegético real.'
  revised_spanish_text: Y salió la suerte para los hijos de José desde el Jordán junto a Jericó, hasta las aguas de Jericó al oriente, por la región desértica[a], subiendo desde Jericó a la región montañosa de Betel[b].
  revised_footnotes:
  - marker: a
    text: 'O: «por el desierto». El hebreo puede referirse a una zona de soledad o estepa, no necesariamente a un desierto arenoso en sentido estricto.'
    reason: lexical_alternative
  - marker: b
    text: «Las aguas de Jericó» puede referirse específicamente al manantial o a la fuente de agua de Jericó.
    reason: cultural_note
  revision_rationale: Se ajustó 'en Jericó' a 'junto a Jericó' para una geografía más natural en español; se reemplazó 'desierto' por 'región desértica' para reflejar mejor הַמִּדְבָּר según la auditoría POB; y se rehízo el sistema de notas para que la nota léxica aporte una alternativa real, manteniendo la nota cultural sobre las aguas de Jericó con anclaje visible en el texto. También se movió el anclaje [b] a 'Betel' por proximidad textual, ya que la nota quedó como la única nota restante aplicable al tramo sobre 'las aguas de Jericó'.
