translation:
  language: es
  text: He aquí[a], he hecho conforme a tus palabras. He aquí, te he dado un corazón sabio y entendido, de modo que no ha habido antes de ti nadie como tú, ni después de ti se levantará nadie como tú.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'corazón con discernimiento'. En hebreo 'corazón' incluye la facultad interior de pensamiento, juicio y discernimiento, no solo la emoción.
    reason: lexical_alternative
lexical_decisions:
- source_word: הִנֵּה
  english_pob_choice: Behold
  chosen_spanish: Mira
  alternatives_spanish:
  - Mira bien
  - He aquí
  lexicon: HALOT
  rationale: Se conserva la fuerza discursiva de atención y solemnidad sin sonar artificial en español. 'Mira' comunica la misma apertura enfática que 'Behold' en un registro más natural para el lector actual.
- source_word: עָשִׂיתִי
  english_pob_choice: I have done
  chosen_spanish: he hecho
  alternatives_spanish:
  - he actuado
  - he realizado
  lexicon: HALOT
  rationale: El perfecto expresa una acción ya completada. 'He hecho' sigue de cerca el hebreo עשה y funciona bien con la expresión siguiente 'conforme a tus palabras'.
- source_word: כִּדְבָרֶיךָ
  english_pob_choice: according to your words
  chosen_spanish: conforme a tus palabras
  alternatives_spanish:
  - según tus palabras
  - de acuerdo con tus palabras
  - conforme a tu petición
  lexicon: HALOT
  rationale: '''Tus palabras'' mantiene la forma explícita del hebreo sin reducirla a ''petición''. ''Conforme a'' reproduce la relación normativa/ajustada del original con buen español bíblico actual.'
- source_word: נָתַתִּי לְךָ
  english_pob_choice: I have given you
  chosen_spanish: te he dado
  alternatives_spanish:
  - te he concedido
  - te he otorgado
  lexicon: HALOT
  rationale: '''Dar'' refleja directamente נתן. ''Te he dado'' es natural en español y conserva la idea de un don ya conferido.'
- source_word: לֵב
  english_pob_choice: heart
  chosen_spanish: corazón
  alternatives_spanish:
  - mente
  - interior
  lexicon: HALOT
  rationale: El POB inglés preserva 'heart' para mantener la antropología hebrea; en español 'corazón' también puede abarcar pensamiento, juicio y discernimiento. Se evita 'mente' para no estrechar el campo semántico.
- source_word: חָכָם
  english_pob_choice: wise
  chosen_spanish: sabio
  alternatives_spanish:
  - prudente
  - hábil
  lexicon: HALOT
  rationale: En este contexto real y judicial, 'sabio' es la correspondencia más directa y reconocible para חָכָם.
- source_word: וְנָבוֹן
  english_pob_choice: discerning
  chosen_spanish: discerniente
  alternatives_spanish:
  - entendido
  - con discernimiento
  - perspicaz
  lexicon: HALOT
  rationale: '''Discerniente'' conserva la relación con discernimiento/entendimiento y se empareja con ''sabio'' sin duplicarlo. Se prefiere esta forma para no sustituir el matiz por un sinónimo demasiado general.'
- source_word: אֲשֶׁר כָּמוֹךָ לֹא הָיָה לְפָנֶיךָ
  english_pob_choice: such that no one like you has been before you
  chosen_spanish: de modo que no ha habido antes de ti nadie como tú
  alternatives_spanish:
  - tal que no ha habido antes de ti nadie como tú
  - de manera que antes de ti no hubo nadie como tú
  lexicon: HALOT
  rationale: Se mantiene la relación de resultado observacional, no de propósito. 'Antes de ti' reproduce la ubicación temporal y evita una paráfrasis más interpretativa.
- source_word: וְאַחֲרֶיךָ לֹא יָקוּם כָּמוֹךָ
  english_pob_choice: and no one like you shall arise after you
  chosen_spanish: ni después de ti se levantará nadie como tú
  alternatives_spanish:
  - ni después de ti surgirá nadie como tú
  - ni después de ti aparecerá nadie como tú
  lexicon: HALOT
  rationale: '''Se levantará'' reproduce la imagen de יקום como surgir/levantarse en la historia, sin perder la futura promesa. ''Nadie como tú'' mantiene el paralelismo comparativo del hebreo.'
theological_decisions:
- issue: Alcance de la superioridad prometida a Salomón
  english_pob_reading: The verse promises unparalleled wisdom and discernment to Solomon in context, not an absolute superiority in every respect.
  chosen_spanish_reading: El versículo promete una sabiduría y discernimiento sin igual para Salomón en su contexto, no una superioridad absoluta en todos los aspectos.
  alternative_spanish_readings:
  - Afirma una grandeza general sin comparación.
  - Presenta a Salomón como superior en todo sentido.
  rationale: El foco inmediato está en el 'corazón sabio y discerniente' concedido por Dios. La redacción española conserva esa tensión y no amplía el alcance más allá de lo que el hebreo dice.
  doctrine_reference: Preservar la tensión textual; no extender la afirmación más allá del contexto inmediato.
translation_notes:
  revision_awareness: Se siguió la revisión más reciente del POB inglés al usar una construcción de resultado ('de modo que') en lugar de finalidad, para evitar implicar propósito donde el hebreo describe consecuencia. También se mantuvo el paralelismo y la comparación absoluta del texto sin ampliar su alcance.
  spanish_consistency_notes:
  - Se conservó un término antropológico hebreo amplio con 'corazón' y no 'mente'.
  - Se evitó 'Cristo/SEÑOR' porque el pasaje no contiene esos términos; el nombre divino no aparece en este versículo.
  - Se mantuvo el paralelismo de 'antes de ti / después de ti' y la comparación 'nadie como tú'.
  - Se prefirió un español bíblico moderno, claro y digno, sin caer en calcos duros.
