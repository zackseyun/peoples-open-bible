translation:
  language: es
  text: 'Entonces David le dijo[a]: «Tu sangre está sobre tu propia cabeza, porque tu propia boca ha dado testimonio contra ti, diciendo[b]: “Yo mismo maté al ungido de Yahvé”».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más formalmente: «Tu sangre recaiga sobre tu cabeza». El modismo hebreo atribuye a él mismo la responsabilidad de su muerte.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «tu boca ha testificado contra ti».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר אֵלָיו
  english_pob_choice: Then David said to him
  chosen_spanish: Entonces David le dijo
  alternatives_spanish:
  - Y David le dijo
  lexicon: HALOT
  rationale: El waw consecutivo marca avance narrativo; «Entonces» conserva la secuencia natural en español. «Le dijo» expresa de forma explícita el destinatario de la խոսa, equivalente a אֵלָיו.
- source_word: דָּמֶיךָ עַל רֹאשֶׁךָ
  english_pob_choice: Your blood is on your own head
  chosen_spanish: Tu sangre recaiga sobre tu propia cabeza
  alternatives_spanish:
  - Tu sangre está sobre tu propia cabeza
  - Tu sangre sea sobre tu cabeza
  - Tu culpabilidad de sangre recaiga sobre tu cabeza
  lexicon: HALOT
  rationale: Se mantiene la imagen judicial del hebreo. En español, el subjuntivo optativo/judicial «recaiga» conserva mejor la fórmula de imputación de responsabilidad que un simple presente. «Tu propia cabeza» refleja el valor reflexivo de la expresión idiomática.
- source_word: כִּי
  english_pob_choice: for
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  lexicon: HALOT
  rationale: Introduce la razón del veredicto; «porque» es claro y natural en español sin perder el tono forense.
- source_word: פִּיךָ
  english_pob_choice: your own mouth
  chosen_spanish: tu propia boca
  alternatives_spanish:
  - tu boca
  - tus propias palabras
  lexicon: HALOT
  rationale: Se conserva la metonimia del órgano del habla. «Tu propia» refuerza la implicación reflexiva que el hebreo subraya.
- source_word: עָנָה בְךָ
  english_pob_choice: has testified against you
  chosen_spanish: ha dado testimonio contra ti
  alternatives_spanish:
  - ha testificado contra ti
  - ha respondido contra ti
  - ha sido testigo contra ti
  lexicon: HALOT
  rationale: En este contexto legal, ענה con ב tiene fuerza de testimonio incriminatorio. «Ha dado testimonio contra ti» comunica bien el sentido forense en español sin perder la textura judicial.
- source_word: לֵאמֹר
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - al decir
  - con estas palabras
  lexicon: HALOT
  rationale: Introducción estándar de la cita directa; «diciendo» es el equivalente más directo y transparente.
- source_word: אָנֹכִי
  english_pob_choice: I myself
  chosen_spanish: Yo mismo
  alternatives_spanish:
  - Yo
  lexicon: HALOT
  rationale: El pronombre independiente es enfático. «Yo mismo» conserva el énfasis de autorreconocimiento culpable.
- source_word: מֹתַתִּי
  english_pob_choice: killed
  chosen_spanish: maté
  alternatives_spanish:
  - di muerte a
  - causé la muerte de
  lexicon: HALOT
  rationale: En esta confesión, «maté» es la equivalencia natural y directa de causar la muerte, sin diluir la fuerza del verbo.
- source_word: מְשִׁיחַ יְהוָה
  english_pob_choice: the LORD’s anointed
  chosen_spanish: el ungido de Yahvé
  alternatives_spanish:
  - el Mesías de Yahvé
  - el consagrado de Yahvé
  lexicon: HALOT
  rationale: Se traduce מְשִׁיחַ como «ungido» en este contexto real, para evitar asociaciones cristológicas ajenas al pasaje. Se mantiene «Yahvé» para el nombre divino según la convención del proyecto; «de Yahvé» conserva la relación posesiva del hebreo.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  lexicon: HALOT
  rationale: Se adopta la forma de proyecto «Yahvé» para el Tetragrámaton, que preserva el nombre propio divino en español.
theological_decisions:
- issue: Imputación de culpa por el derramamiento de sangre
  english_pob_reading: Your blood is on your own head
  chosen_spanish_reading: Tu sangre recaiga sobre tu propia cabeza
  alternative_spanish_readings:
  - Tu sangre está sobre tu propia cabeza
  - Tu sangre sea sobre tu cabeza
  rationale: 'La formulación española conserva la función judicial del modismo: asigna responsabilidad al culpable por su propia muerte. El subjuntivo refleja mejor la fuerza sentenciosa/performativa del hebreo que un enunciado meramente descriptivo.'
  doctrine_reference: 'DOCTRINE.md: mantener fórmulas idiomáticas judiciales cuando expresan imputación de culpa'
- issue: Título real de מְשִׁיחַ en contexto narrativo
  english_pob_reading: the LORD’s anointed
  chosen_spanish_reading: el ungido de Yahvé
  alternative_spanish_readings:
  - el Mesías de Yahvé
  - el consagrado de Yahvé
  rationale: En este contexto, el término refiere a Saúl como rey apartado por Dios. «Ungido» preserva el sentido histórico-teológico del título sin introducir una carga mesiánica posterior.
  doctrine_reference: 'DOCTRINE.md Translation philosophy: translate titles; preserve context-specific nuance'
translation_notes:
  revision_awareness: Se revisó la preferencia anterior por una traducción más estrictamente idiomática del modismo de sangre, y se ajustó el anclaje de notas para que ambos marcadores aparezcan explícitamente en el texto español.
  spanish_consistency_notes:
  - Se usa «Yahvé» de manera uniforme para יְהוָה.
  - Se mantiene «ungido» en vez de «Mesías» por el contexto real de Saúl.
  - Se preserva la estructura forense del versículo con términos claros y no arcaizantes.
  - Los marcadores de nota [a] y [b] están anclados en el texto y corresponden exactamente a las observaciones léxicas indicadas.
