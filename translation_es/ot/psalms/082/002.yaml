translation:
  language: es
  text: ¿Hasta cuándo juzgan con injusticia y muestran parcialidad a los malvados? Selah[a]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo literalmente: «levantar el rostro de los malvados», un modismo que significa mostrar favor o parcialidad.'
    reason: lexical_alternative
lexical_decisions:
- source_word: עַד מָתַי
  english_pob_choice: How long
  chosen_spanish: ¿Hasta cuándo
  alternatives_spanish:
  - ¿Hasta cuándo será?
  - ¿Hasta qué tiempo?
  lexicon: HALOT
  rationale: La expresión hebrea es una pregunta temporal idiomática de reprensión. «¿Hasta cuándo» reproduce de manera natural en español la fuerza de protesta y censura, mejor que una versión más literal pero menos idiomática.
- source_word: תִּשְׁפְּטוּ
  english_pob_choice: will you judge
  chosen_spanish: juzgarán
  alternatives_spanish:
  - juzgan
  - estarán juzgando
  lexicon: HALOT
  rationale: El imperfecto 2mp en una pregunta retórica puede sonar modal o habitual. En español, «juzgarán» conserva el tono de acusación continua y resulta natural en un registro bíblico contemporáneo.
- source_word: עָוֶל
  english_pob_choice: unjustly
  chosen_spanish: con injusticia
  alternatives_spanish:
  - injustamente
  - con maldad
  - de forma injusta
  lexicon: HALOT
  rationale: El sustantivo funciona adverbialmente después de «juzgar». «Con injusticia» preserva el sustantivo hebreo y el sentido forense; «injustamente» sería posible, pero aquí la forma sustantivada mantiene mejor el sabor del original.
- source_word: וּפְנֵי
  english_pob_choice: and show partiality to
  chosen_spanish: y mostrarán parcialidad a
  alternatives_spanish:
  - y levantarán el rostro de
  - y favorecerán a
  lexicon: HALOT
  rationale: El hebreo dice literalmente «levantar el rostro de», un modismo de favoritismo. Como el POB inglés ya explicó el modismo con «show partiality to», en español se opta por la equivalencia explicativa «mostrarán parcialidad a» para conservar la carga judicial.
- source_word: תִּשְׂאוּ
  english_pob_choice: show partiality
  chosen_spanish: mostrarán parcialidad
  alternatives_spanish:
  - levantarán el rostro
  - favorecerán
  lexicon: HALOT
  rationale: El verbo נשׂא forma parte del modismo «levantar el rostro». No se traduce de manera aislada, sino por el valor idiomático completo, que en español se expresa con claridad mediante «mostrar parcialidad».
- source_word: רְשָׁעִים
  english_pob_choice: the wicked
  chosen_spanish: los malvados
  alternatives_spanish:
  - los impíos
  - los culpables
  lexicon: HALOT
  rationale: «רְשָׁעִים» designa personas moralmente culpables. «Los malvados» es una opción bíblica comprensible y más directa para lectores generales; «los impíos» sería posible, pero más tradicional y menos transparente para algunos lectores.
- source_word: סֶלָה
  english_pob_choice: Selah
  chosen_spanish: Selah
  alternatives_spanish:
  - Pausa
  - Interludio
  lexicon: HALOT
  rationale: Se conserva la transliteración porque su función exacta sigue siendo incierta. Traducirla como «Pausa» o «Interludio» impondría una interpretación no asegurada por el texto.
theological_decisions:
- issue: Favoritismo judicial hacia los malvados
  english_pob_reading: show partiality to the wicked
  chosen_spanish_reading: mostrar parcialidad a los malvados
  alternative_spanish_readings:
  - favorecer a los malvados
  - hacer acepción de personas a favor de los malvados
  rationale: El salmo denuncia corrupción en el juicio. «Mostrar parcialidad» preserva el sentido jurídico-moral sin introducir una formulación eclesiástica específica que podría estrechar innecesariamente el alcance del texto.
  doctrine_reference: Translation philosophy §1, §3, §6
translation_notes:
  revision_awareness: 'El texto sigue de cerca el paquete fuente hebreo y coincide con la solución auditada en inglés: interrogativo temporal idiomático, verbo judicial en segunda persona plural, adverbialidad de עָוֶל y explicación idiomática de «levantar el rostro» como parcialidad. No se detectaron revisiones posteriores que alteren esta línea de traducción.'
  spanish_consistency_notes:
  - Se mantiene el tono de reprensión retórica del hebreo con una pregunta inicial natural en español.
  - «Malvados» conserva la categoría moral de רְשָׁעִים sin sobrecargar con terminología técnica.
  - «Selah» se deja transliterado por la misma razón que en el POB inglés, con nota explicativa.
  - La frase verbal se ha ajustado para que la españolización del modismo no oculte la injusticia judicial denunciada por el original.
