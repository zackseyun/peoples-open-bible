translation:
  language: es
  text: Cántico de las subidas[a]. De Salomón. A menos que Yahvé construya la casa[c], en vano trabajan sus constructores; a menos que Yahvé guarde la ciudad[b], en vano vela el centinela.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘Para Salomón’ o ‘Perteneciente a Salomón’; el superscrito hebreo puede indicar autoría, dedicación o asociación.
    reason: alternative_reading
  - marker: b
    text: ‘Casa’ también puede abarcar en hebreo el sentido más amplio de ‘hogar’ o ‘dinastía’.
    reason: lexical_alternative
  - marker: c
    text: O ‘sus constructores trabajan en vano en ella’.
    reason: previous_rendering
lexical_decisions:
- source_word: שִׁיר הַמַּעֲלוֹת
  english_pob_choice: A Song of Ascents
  chosen_spanish: Cántico de ascensos
  alternatives_spanish:
  - Cántico de subidas
  - Cántico de peregrinación
  lexicon: HALOT
  rationale: Conserva el título tradicional de la colección y el sentido lexical de ‘ascensos’. ‘Cántico’ es natural en español bíblico y transmite el género del superscrito sin añadir interpretación devocional.
- source_word: לִשְׁלֹמֹה
  english_pob_choice: Of Solomon
  chosen_spanish: De Salomón
  alternatives_spanish:
  - Para Salomón
  - Perteneciente a Salomón
  lexicon: HALOT
  rationale: La preposición hebrea permite autoría, dedicación o asociación. ‘De Salomón’ preserva esa amplitud sin decidirla de antemano.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  lexicon: HALOT
  rationale: Se mantiene el nombre divino como transliteración del Tetragrámaton, conforme al criterio del proyecto, en vez de reemplazarlo por un título como ‘SEÑOR’.
- source_word: יִבְנֶה בַיִת
  english_pob_choice: builds the house
  chosen_spanish: construya la casa
  alternatives_spanish:
  - edifique la casa
  - construya una casa
  lexicon: HALOT
  rationale: ‘Casa’ es la equivalencia más directa aquí. El contexto poético permite también la resonancia ampliada de casa/familia/dinastía, pero la imagen inmediata es la de una casa concreta, que el español puede conservar sin forzar la metáfora.
- source_word: שָׁוְא
  english_pob_choice: in vain
  chosen_spanish: en vano
  alternatives_spanish:
  - para nada
  - vanamente
  lexicon: HALOT
  rationale: Expresa bien la idea de futilidad y preserva el paralelismo repetido del verso con una fórmula natural y solemne en español.
- source_word: עָמְלוּ
  english_pob_choice: labor
  chosen_spanish: trabajan
  alternatives_spanish:
  - se afanan
  - laboran
  lexicon: HALOT
  rationale: Aunque el término hebreo sugiere esfuerzo intenso, en español ‘trabajan’ comunica claramente la acción de los constructores sin sonar forzado. El matiz de fatiga queda reforzado por ‘en vano’.
- source_word: בוֹנָיו
  english_pob_choice: its builders
  chosen_spanish: sus constructores
  alternatives_spanish:
  - los que la construyen
  - sus albañiles
  lexicon: HALOT
  rationale: ‘Constructores’ evita una lectura demasiado literal y conserva el vínculo con la casa. ‘Sus’ reproduce el sufijo posesivo del hebreo.
- source_word: יִשְׁמָר עִיר
  english_pob_choice: guards the city
  chosen_spanish: guarde la ciudad
  alternatives_spanish:
  - vigile la ciudad
  - custodie la ciudad
  lexicon: HALOT
  rationale: ‘Guardar’ corresponde bien al hebreo שׁמר en sentido de protección vigilante. ‘Ciudad’ mantiene el objeto concreto del paralelo.
- source_word: שָׁקַד שׁוֹמֵר
  english_pob_choice: stays awake ... the watchman
  chosen_spanish: vela el centinela
  alternatives_spanish:
  - permanece despierto el vigilante
  - está despierto el guardia
  lexicon: HALOT
  rationale: Se opta por una formulación natural en español que une la idea de vigilia y el agente humano. ‘Centinela’ es más idiomático y solemne que una traducción demasiado mecánica de ‘watchman’.
theological_decisions:
- issue: Transliteración del nombre divino
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Jehová
  rationale: El texto hebreo usa directamente el Tetragrámaton. Mantenerlo como ‘Yahvé’ preserva el nombre propio de Dios y evita la sustitución litúrgica por un título.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Alcance de בַיִת en contexto sapiencial/poético
  english_pob_reading: house
  chosen_spanish_reading: casa
  alternative_spanish_readings:
  - hogar
  - familia
  - dinastía
  rationale: La lectura principal sigue la imagen inmediata del poema. Aunque ‘casa’ puede extenderse a hogar o dinastía, no se impone esa ampliación en el texto base; se deja como posible resonancia interpretativa.
  doctrine_reference: DOCTRINE.md Translation philosophy §1, §3
translation_notes:
  revision_awareness: La base inglesa pasó por revisión automática para suavizar ‘its builders labor in vain in it’ a ‘its builders labor in vain’; el hebreo conserva el complemento preposicional בּוֹ (‘en ella / en él’), por lo que la nota c mantiene la alternativa literal sin recargar la línea principal. No hubo cambios en la última pasada de revisión.
  spanish_consistency_notes:
  - Se usa ‘Yahvé’ de forma consistente para יְהוָה.
  - Se mantiene ‘casa’ en el texto principal y se reserva la ampliación semántica para nota.
  - El paralelismo de ‘en vano’ se conserva en ambos miembros.
  - ‘Centinela’ y ‘vela’ forman una combinación idiomática en español que refleja la vigilancia del hebreo sin perder solemnidad.
