translation:
  language: es
  text: Hizo el candelabro y todos sus utensilios[a] con un talento de oro puro.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «todos sus vasos» o «todos sus implementos». El hebreo כֵּלִים es un término amplio para los objetos o utensilios asociados con el candelabro.
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּכָּר
  english_pob_choice: a talent
  chosen_spanish: un talento
  alternatives_spanish:
  - un talento de peso
  - un talento-ponderal
  lexicon: HALOT
  rationale: En el contexto de la construcción del tabernáculo, כִּכָּר funciona como unidad de peso. En español, «talento» comunica esa medida de manera natural y fiel, sin añadir explicación innecesaria al texto principal.
- source_word: זָהָב טָהוֹר
  english_pob_choice: pure gold
  chosen_spanish: oro puro
  alternatives_spanish:
  - oro refinado
  - oro limpio
  lexicon: HALOT
  rationale: La combinación describe la calidad/materialidad del oro. «Oro puro» es la forma más natural y precisa en español, y conserva la idea de material sin aleación o impureza.
- source_word: עָשָׂה
  english_pob_choice: He made
  chosen_spanish: Lo hizo
  alternatives_spanish:
  - Lo fabricó
  - Lo elaboró
  lexicon: HALOT
  rationale: El verbo básico עשה se expresa de forma directa con «hacer». En español, para evitar la repetición pesada de «él» en una secuencia narrativa, se usa «lo hizo», manteniendo la referencia al objeto antecedente.
- source_word: אֹתָהּ
  english_pob_choice: it
  chosen_spanish: lo
  alternatives_spanish:
  - la
  lexicon: HALOT
  rationale: El sufijo femenino singular remite a la pieza mencionada antes en el contexto. Como en español la concordancia depende del antecedente implícito y el referente inmediato es una pieza concreta del mobiliario, se opta por un pronombre átono breve en la oración; la forma exacta queda guiada por el antecedente contextual.
- source_word: וְאֵת כָּל כֵּלֶיהָ
  english_pob_choice: and all its utensils
  chosen_spanish: y todos sus utensilios
  alternatives_spanish:
  - y todas sus vasijas
  - y todos sus implementos
  - y todos sus artículos
  lexicon: HALOT
  rationale: כֵּלִים es un término amplio para objetos/implementos asociados con la lámpara. «Utensilios» conserva esa amplitud en un registro bíblico claro y evita restringir innecesariamente el sentido a vasos o piezas específicas.
translation_notes:
  revision_awareness: El texto sigue de cerca el hebreo masorético y coincide con el audit trail inglés, sin cambios de revisión pendientes; se mantiene la medida, la cualidad del oro y el alcance amplio de כֵּלִים.
  spanish_consistency_notes:
  - Se conserva el término de medida «talento» por su valor técnico en el contexto del tabernáculo.
  - «Utensilios» mantiene la amplitud semántica de כֵּלִים y armoniza con el registro de mobiliario sagrado.
  - No se introduce «Señor» ni terminología teológica no presente en este versículo.
