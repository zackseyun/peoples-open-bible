  verdict: revise
  source_alignment_summary: 'El borrador sigue bien la estructura y el sentido general del hebreo: imperativos plurales, movimiento por el campamento, mandato al pueblo, preparación de provisiones, cruce del Jordán, entrada para poseer la tierra, y uso correcto de «Yahvé». Sin embargo, hay dos problemas de fidelidad fina: (1) la nota al pie anclada en «pueblo[a]» está mal ubicada, porque la variante documentada corresponde a la expresión temporal «dentro de tres días»; y (2) «ustedes cruzarán» pierde parte de la vividez/imminencia del participio עֹבְרִים, que el inglés auditado preserva mejor con «you are crossing».'
  spanish_quality_summary: El español es claro y natural, de registro digno y eclesialmente legible. «Pasen por en medio del campamento» y «Preparen provisiones para ustedes» funcionan bien. No obstante, conviene mejorar la colocación de la nota y ajustar el verbo a una forma más inmediata en español. «Van a cruzar» suena más natural que «están cruzando» en este contexto prospectivo y preserva mejor la inminencia que el futuro simple.
  glossary_alignment: Buen alineamiento con la terminología del proyecto en «Yahvé», «Dios», «provisiones» y «poseer». No hay conflicto doctrinal. La única desviación relevante frente al rastro POB está en el tratamiento aspectual de עֹבְרִים y en la implementación formal de la nota léxica.
  issues:
  - severity: high
    issue: La nota al pie [a] está anclada en «pueblo» en vez de la expresión temporal.
    rationale: La nota explica alternativas para כִּי בְּעוֹד שְׁלֹשֶׁת יָמִים («dentro de tres días» / «al cabo de tres días»), no para הָעָם («pueblo»). Esto rompe la trazabilidad del aparato y puede confundir al lector.
  - severity: medium
    issue: «Ustedes cruzarán» atenúa la fuerza aspectual del participio hebreo עֹבְרִים.
    rationale: Aunque es comprensible, el futuro simple expresa más bien futuridad que inminencia vívida. En español, «van a cruzar» conserva mejor la cercanía del evento sin sonar forzado.
  - severity: low
    issue: La nota ofrece «dentro de tres días» como alternativa idéntica a la lectura principal.
    rationale: Una nota de alternativas no debe repetir sin necesidad la misma formulación principal; conviene ofrecer solo alternativas reales o reformular la nota de manera explicativa.
