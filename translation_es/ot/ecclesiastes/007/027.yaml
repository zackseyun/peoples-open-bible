translation:
  language: es
  text: Mira[a], esto es lo que hallé, dice Qohelet[c], añadiendo una cosa a otra para encontrar la explicación[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «una por una» o «una tras otra». El hebreo parece describir un proceso de investigación paso a paso o acumulativo.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «la cuenta», «el cálculo», «la razón» o «el esquema». El término hebreo denota un acto o resultado de cálculo o recuento, y su alcance es más amplio que una sola palabra española.'
    reason: lexical_alternative
  - marker: c
    text: «Qohelet» es la designación hebrea tradicionalmente traducida como «el Predicador» o «el Maestro».
    reason: lexical_alternative
lexical_decisions:
- source_word: רְאֵה
  english_pob_choice: See
  chosen_spanish: Mira
  alternatives_spanish:
  - Mira bien
  - Observa
  - Mira esto
  lexicon: HALOT
  rationale: El imperativo funciona como marcador discursivo que llama la atención sobre la conclusión. «Mira» es natural en español y conserva la fuerza directa sin el tono arcaizante de «He aquí».
- source_word: זֶה
  english_pob_choice: this
  chosen_spanish: esto
  alternatives_spanish:
  - esta cosa
  - este asunto
  - esto mismo
  lexicon: HALOT
  rationale: El demostrativo introduce la observación que sigue. «Esto» es la forma más natural y fiel en español contemporáneo.
- source_word: מָצָאתִי
  english_pob_choice: I found
  chosen_spanish: hallé
  alternatives_spanish:
  - encontré
  - he hallado
  - descubrí
  lexicon: HALOT
  rationale: El perfecto qal expresa una constatación retrospectiva. «Hallé» mantiene el registro literario y refleja bien el resultado de la búsqueda sin añadir matiz interpretativo.
- source_word: אָמְרָה קֹהֶלֶת
  english_pob_choice: says Qoheleth
  chosen_spanish: dice Qohelet
  alternatives_spanish:
  - dijo Qohelet
  - declara Qohelet
  - dice el Predicador
  lexicon: HALOT
  rationale: Se conserva «Qohelet» como designación hebrea distintiva, siguiendo la decisión inglesa de transliterar el término en lugar de sustituirlo por un título interpretativo. El presente de cita «dice» refleja la fórmula literaria y suena natural en español.
- source_word: אַחַת לְאַחַת
  english_pob_choice: adding one thing to another
  chosen_spanish: añadiendo una cosa a otra
  alternatives_spanish:
  - una por una
  - una tras otra
  - una cosa tras otra
  lexicon: HALOT
  rationale: El hebreo expresa un proceso acumulativo o paso a paso. «Añadiendo una cosa a otra» conserva ese movimiento iterativo y evita fijar prematuramente una sola equivalencia idiomática.
- source_word: לִמְצֹא
  english_pob_choice: to find
  chosen_spanish: para encontrar
  alternatives_spanish:
  - para hallar
  - a fin de encontrar
  lexicon: HALOT
  rationale: El infinitivo con ל expresa finalidad. «Para encontrar» es idiomático en español y conserva la relación de propósito.
- source_word: חֶשְׁבּוֹן
  english_pob_choice: the explanation
  chosen_spanish: la explicación
  alternatives_spanish:
  - el cálculo
  - la cuenta
  - el razonamiento
  - la razón
  lexicon: HALOT
  rationale: El término puede referirse a cuenta, cálculo, resultado de una ponderación o explicación. En este contexto, y siguiendo la revisión inglesa que prefirió «the explanation», «la explicación» comunica el resultado del proceso de indagación sin reducir indebidamente la amplitud semántica.
translation_notes:
  revision_awareness: La traducción inglesa auditada pasó de «the sum» a «the explanation» para captar mejor חֶשְׁבּוֹן en este contexto. El español sigue esa revisión y conserva la apertura semántica mediante nota.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» en el proyecto según la norma general, pero este versículo no contiene el nombre divino.
  - Se preservó «Qohelet» como transliteración consistente con el tratamiento inglés auditado.
  - Se evitó el calco «behold»/«he aquí» porque el mandato hebreo funciona aquí como llamada discursiva directa, mejor expresada por «Mira».
