id: HAG.2.19
reference: Haggai 2:19
source:
  edition: WLC
  text: הַ/ע֤וֹד הַ/זֶּ֨רַע֙ בַּ/מְּגוּרָ֔ה וְ/עַד הַ/גֶּ֨פֶן וְ/הַ/תְּאֵנָ֧ה וְ/הָ/רִמּ֛וֹן וְ/עֵ֥ץ הַ/זַּ֖יִת לֹ֣א נָשָׂ֑א מִן הַ/יּ֥וֹם הַ/זֶּ֖ה אֲבָרֵֽךְ־־׃ס
translation:
  text: Is the seed still in the storehouse? Even the vine[a], the fig tree, the pomegranate, and the olive tree have not borne fruit. From this day on I will bless you.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''I will bless,'' with the object implied by context; English supplies ''you'' for clarity.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הַעֹוד
  chosen: still
  alternatives:
  - yet
  - again
  lexicon: HALOT
  rationale: 'In this interrogative setting, עוֹד marks continuance up to the present: ''still/yet.'' ''Still'' is the most natural modern English in the question ''Is the seed still in the storehouse?'''
- source_word: הַזֶּרַע
  chosen: the seed
  alternatives:
  - seed grain
  - grain
  lexicon: HALOT
  rationale: זֶרַע can denote seed generally or grain for sowing. 'The seed' preserves the Hebrew wording and fits the agricultural context without over-specifying.
- source_word: בַּמְּגוּרָה
  chosen: in the storehouse
  alternatives:
  - in the granary
  - in the barn
  lexicon: HALOT
  rationale: מְגוּרָה denotes a storage place for grain/produce. 'Storehouse' is clear modern English and broad enough to fit the term.
- source_word: וְעַד
  chosen: And as for
  alternatives:
  - and even
  - and up to
  lexicon: HALOT
  rationale: Here עַד introduces an extension from the seed to the listed trees/crops. A wooden 'and up to' is awkward in English; 'And as for' captures the discourse move while remaining close to the sense.
- source_word: הַגֶּפֶן וְהַתְּאֵנָה וְהָרִמּוֹן וְעֵץ הַזַּיִת
  chosen: the vine, the fig tree, the pomegranate, and the olive tree
  alternatives:
  - the grapevine, the fig, the pomegranate tree, and the olive
  lexicon: HALOT
  rationale: These are standard agricultural terms. 'Vine' here naturally means grapevine in context; 'fig tree' and 'olive tree' make the arboreal sense explicit in English, matching עֵץ הַזַּיִת for the last item.
- source_word: לֹא נָשָׂא
  chosen: has not borne fruit
  alternatives:
  - has not produced
  - has not yielded
  lexicon: HALOT
  rationale: נָשָׂא literally means 'has not carried/borne,' but with fruit trees the idiomatic English equivalent is 'has not borne fruit.' 'Fruit' is supplied because the agricultural idiom requires it and the referents are fruit-bearing plants.
- source_word: מִן הַיּוֹם הַזֶּה
  chosen: From this day on
  alternatives:
  - from this day
  - starting today
  lexicon: HALOT
  rationale: This phrase marks the turning point beginning at the present day. 'From this day on' communicates the prospective force naturally in English.
- source_word: אֲבָרֵךְ
  chosen: I will bless you
  alternatives:
  - I will bless
  - I am blessing
  lexicon: HALOT
  rationale: The Piel imperfect 1cs of ברך is best rendered as a future promise here. Although the Hebrew object is unstated, the context from the surrounding oracle makes the people the implied object; English requires the object for natural clarity, so 'you' is supplied.
