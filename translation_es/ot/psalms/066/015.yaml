translation:
  language: es
  text: Te ofreceré holocaustos de animales engordados, con el humo[a] de carneros; ofreceré reses[b] con machos cabríos. Selah[c]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «con el aroma de carneros»; el término hebreo puede referirse al humo o al olor producido por la quema del sacrificio.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «toros»; el hebreo puede entenderse más específicamente como bovinos o reses.'
    reason: lexical_alternative
  - marker: c
    text: Término tradicionalmente dejado sin traducir porque su sentido exacto es incierto, quizá una indicación musical o litúrgica.
    reason: cultural_note
lexical_decisions:
- source_word: עֹלוֹת
  english_pob_choice: burnt offerings
  chosen_spanish: holocaustos
  alternatives_spanish:
  - ofrendas quemadas
  - ofrendas totalmente quemadas
  lexicon: HALOT
  rationale: En español bíblico, "holocausto" comunica bien la ofrenda que se quema por completo; conserva la fuerza cultual del hebreo sin añadir explicaciones ajenas al verso.
- source_word: מֵחִים
  english_pob_choice: fattened animals
  chosen_spanish: animales engordados
  alternatives_spanish:
  - animales cebados
  - animales gordos
  lexicon: HALOT
  rationale: El término apunta a animales bien alimentados, aptos para un sacrificio costoso. "Engordados" preserva esa idea de forma clara y digna en español.
- source_word: אַעֲלֶה לָּךְ
  english_pob_choice: I will offer to you
  chosen_spanish: Ofreceré a ti
  alternatives_spanish:
  - haré subir para ti
  - te ofreceré
  lexicon: HALOT
  rationale: El Hifil de עלה en contexto sacrificial significa "ofrecer". Se mantiene el destinatario directo con "a ti" para reflejar el hebreo, aunque en español sea más marcado que "te".
- source_word: קְטֹרֶת
  english_pob_choice: incense / smoke
  chosen_spanish: humo
  alternatives_spanish:
  - incienso
  - aroma
  lexicon: HALOT
  rationale: La POB inglesa distingue la posible referencia al humo producido por la ofrenda. En español, "humo" evita limitar el sentido a incienso perfumado y conserva la imagen sacrificial.
- source_word: אֵילִים
  english_pob_choice: rams
  chosen_spanish: carneros
  alternatives_spanish:
  - ramos
  - borregos adultos
  lexicon: HALOT
  rationale: '"Carneros" es el equivalente natural y preciso en español para los machos ovinos adultos del texto.'
- source_word: אֶעֱשֶׂה
  english_pob_choice: I will offer / I will prepare
  chosen_spanish: ofreceré
  alternatives_spanish:
  - prepararé
  - haré
  lexicon: HALOT
  rationale: Aunque el verbo básico es "hacer", aquí funciona sacrificialmente. En español, repetir "ofreceré" evita una caída de tono y mantiene la coherencia ritual del versículo.
- source_word: בָקָר
  english_pob_choice: bulls / cattle
  chosen_spanish: ganado
  alternatives_spanish:
  - toros
  - reses
  lexicon: HALOT
  rationale: El hebreo puede funcionar como colectivo para bovinos. "Ganado" preserva ese valor colectivo y evita forzar una especificación que el contexto no exige con total certeza.
- source_word: עַתּוּדִים
  english_pob_choice: goats / male goats
  chosen_spanish: machos cabríos
  alternatives_spanish:
  - cabras
  - chivos
  lexicon: HALOT
  rationale: El hebreo nombra específicamente machos cabríos; la traducción conserva esa precisión, que en español distingue mejor el matiz masculino que "cabras".
- source_word: סֶלָה
  english_pob_choice: Selah
  chosen_spanish: Selah
  lexicon: HALOT
  rationale: Se translitera por la incertidumbre de su función exacta; mantenerla sin traducir conserva la señal litúrgica o musical del texto.
translation_notes:
  revision_awareness: El contexto de revisión inglés osciló entre traducir קְטֹרֶת como 'smoke' o 'incense' y entre leer בָקָר como 'cattle', 'bulls' o un colectivo más general. La versión española conserva esa tensión con 'humo' y 'ganado', evitando una especificación más fuerte de la que el hebreo garantiza, pero manteniendo el carácter sacrificial del verso.
  spanish_consistency_notes:
  - 'Se mantuvo el paralelismo verbal con dos futuros en primera persona: ''Ofreceré... ofreceré...''.'
  - Se prefirió 'holocaustos' por su correspondencia cultual estable en español bíblico.
  - '''machos cabríos'' preserva la especificidad masculina de עַתּוּדִים.'
  - '''Selah'' se deja sin traducir por la incertidumbre semántica y por consistencia con la práctica POB.'
