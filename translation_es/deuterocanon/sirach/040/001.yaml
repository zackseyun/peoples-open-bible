base_translation:
  language: en
  yaml_path: translation/deuterocanon/sirach/040/001.yaml
  text: Great toil is allotted[c][b][a], and a heavy burden is upon the children of man.
  footnotes:
  - marker: a
    text: 'Greek: ''a heavy yoke upon the sons of Adam.'' The Hebrew is more compressed here; ''heavy burden'' reflects the sense without forcing the exact metaphor into the main text.'
    reason: lexical_alternative
  - marker: b
    text: 'The Greek parallel expands the verse: ''from the day they come forth from their mother’s womb until the day of burial in the mother of all.'' The Hebrew witness here is shorter.'
    reason: alternative_reading
  - marker: c
    text: '''The mother of all'' is a figurative way of referring to the earth as the common destination of burial.'
    reason: cultural_note
