id: PHP.1.3
reference: Philippians 1:3
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: Εὐχαριστῶ τῷ θεῷ μου ἐπὶ πάσῃ τῇ μνείᾳ ὑμῶν
base_translation:
  language: en
  yaml_path: translation/nt/philippians/001/003.yaml
  text: I thank my God at every remembrance of you,[a]
  footnotes:
  - marker: a
    text: Or 'I give thanks to my God for every remembrance of you.'
    reason: lexical_alternative
translation:
  language: ko
  text: 나는 여러분을 기억할 때마다 나의 하나님께 감사드립니다.[a]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 또는 「여러분을 기억하는 일마다 나의 하나님께 감사드린다」. 헬라어 ἐπί + 여격은 감사의 정황·계기를 가리키며, 단순한 인과(「~때문에」)보다 시간·계기적 의미가 본문 흐름에 더 잘 맞는다.
    reason: lexical_alternative
lexical_decisions:
- source_word: Εὐχαριστῶ
  english_pob_choice: I thank
  chosen_korean: 감사드립니다
  alternatives_korean:
  - 감사합니다
  - 감사를 드립니다
  lexicon: BDAG
  rationale: 현재 능동 직설법 1인칭 단수. 합쇼체 격식과 하나님을 대상으로 한 경어 어감을 함께 살리기 위해 「감사드립니다」를 택한다.
- source_word: τῷ θεῷ μου
  english_pob_choice: my God
  chosen_korean: 나의 하나님께
  alternatives_korean:
  - 내 하나님께
  lexicon: BDAG
  rationale: 헬라어 여격을 한국어 「께」로 표시하여 대상 경의를 살린다. 「나의」는 바울의 개인적 친밀함을 보존한다.
- source_word: ἐπὶ πάσῃ τῇ μνείᾳ ὑμῶν
  english_pob_choice: at every remembrance of you
  chosen_korean: 여러분을 기억할 때마다
  alternatives_korean:
  - 여러분에 대한 모든 기억마다
  - 여러분을 생각할 때마다
  lexicon: BDAG
  rationale: ἐπί + 여격이 감사의 정황·계기를 가리키므로, 명사적 직역(「모든 기억마다」)보다 한국어로 자연스러운 시간 종속절(「~때마다」)로 옮긴다. 분배의 πᾶσῃ는 「때마다」로 보존된다.
- source_word: μνείᾳ
  english_pob_choice: remembrance
  chosen_korean: 기억
  alternatives_korean:
  - 회상
  - 추억
  lexicon: BDAG
  rationale: 묵상적·기도적 어감을 가진 「기억」이 가장 자연스럽다. 「언급」은 본문 맥락에 맞지 않는다.
