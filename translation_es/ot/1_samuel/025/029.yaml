base_translation:
  language: en
  yaml_path: translation/ot/1_samuel/025/029.yaml
  text: Though a man has risen to pursue you and to seek your life[a], yet the life of my lord shall be bound in the bundle of the living with Yahweh your God[b], and the lives of your enemies he shall sling out from the hollow of the sling.
  footnotes:
  - marker: a
    text: Or 'shall be tied up in the bundle of life.' The Hebrew image is of something securely wrapped or bound for safekeeping.
    reason: lexical_alternative
  - marker: b
    text: Or 'he will hurl away.' The verb specifically evokes the action of a sling, forming a deliberate contrast with 'bound in the bundle of the living.'
    reason: lexical_alternative
