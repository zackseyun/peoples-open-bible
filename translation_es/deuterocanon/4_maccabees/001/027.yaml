translation:
  language: es
  text: y[a], en relación con el cuerpo, comer de todo y glotonería y comer solo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «una dieta de un solo tipo de comida» / «comer un solo alimento». El griego μονοφαγία puede entenderse más literalmente por sus componentes, aunque «comer solo» encaja bien en el contexto de una lista de vicios.
    reason: lexical_alternative
lexical_decisions:
- source_word: κατὰ
  english_pob_choice: in relation to
  chosen_spanish: en relación con
  alternatives_spanish:
  - con respecto a
  - según
  - en cuanto a
  lexicon: LSJ
  rationale: Κατά con acusativo introduce la esfera o respecto en que se clasifican los vicios; «en relación con» conserva ese valor clasificatorio sin sonar artificial en español.
- source_word: σῶμα
  english_pob_choice: the body
  chosen_spanish: el cuerpo
  alternatives_spanish:
  - cuerpo
  - lo corporal
  - la parte física
  lexicon: LSJ
  rationale: El artículo y el contexto apuntan a una referencia concreta al ámbito corporal; «el cuerpo» mantiene el término antropológico sin ampliar indebidamente el sentido.
- source_word: παντοφαγία
  english_pob_choice: omnivorousness
  chosen_spanish: omnivoracidad
  alternatives_spanish:
  - comer de todo
  - indiscriminación al comer
  - voracidad
  lexicon: LSJ
  rationale: El compuesto sugiere comer toda clase de alimentos. «Omnivoracidad» conserva la formación nominal y el tono de lista de vicios, sin reducirlo solo a cantidad.
- source_word: λαμαργία
  english_pob_choice: gluttony
  chosen_spanish: glotonería
  alternatives_spanish:
  - voracidad
  - avaricia al comer
  - gula
  lexicon: LSJ
  rationale: Designa apetito o consumo excesivo; «glotonería» es el equivalente español claro y convencional para este vicio.
- source_word: μονοφαγία
  english_pob_choice: eating alone
  chosen_spanish: comer solo
  alternatives_spanish:
  - comer en soledad
  - alimentarse de un solo alimento
  - dieta de un solo tipo de comida
  lexicon: LSJ
  rationale: La lectura contextual más probable en esta lista ética es la de comer sin compañía. «Comer solo» reproduce esa conducta socialmente aislada en español.
theological_decisions:
- issue: Sentido de μονοφαγία
  english_pob_reading: eating alone
  chosen_spanish_reading: comer solo
  alternative_spanish_readings:
  - alimentarse de un solo alimento
  - dieta de un solo tipo de comida
  rationale: No se trata de una decisión doctrinal, sino léxica y contextual. En una lista de excesos corporales, «comer solo» encaja mejor con el vicio social sugerido por la traducción inglesa; la posibilidad morfológica de «un solo tipo de comida» se preserva en nota para no borrar la ambigüedad real del griego.
  doctrine_reference: Preservar la tensión léxica sin resolverla de forma artificial.
translation_notes:
  revision_awareness: La revisión más reciente indica que no hubo cambios necesarios; se mantiene la opción inglesa auditada para κατὰ, σῶμα, παντοφαγία, λαμαργία y μονοφαγία, con la ambigüedad de μονοφαγία preservada en nota.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma general del proyecto, pero este versículo no contiene el tetragrámaton.
  - Se conserva el paralelismo nominal de la lista de vicios con sustantivos en español.
  - «Omnivoracidad» es una formación poco común pero transparente y adecuada al registro del catálogo ético.
