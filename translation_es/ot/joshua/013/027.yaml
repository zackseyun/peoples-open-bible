  glossary_alignment: No hay términos del glosario teológico principal en juego. Los nombres propios y la geografía se manejan de manera coherente con el proyecto. «Zafón» como topónimo evita confusión con «norte». «Quinéret» preserva el nombre hebreo en lugar de un nombre posterior.
