translation:
  language: es
  text: Y cuando yo estaba en mi país[a], en la tierra de Israel, siendo aún joven, toda la tribu de mi padre Neftalí se apartó de la casa de Jerusalén, que había sido elegida de entre todas las tribus de Israel para que todas las tribus ofrecieran allí sacrificios; y el templo, la morada del Altísimo, fue consagrado y edificado para todas las generaciones[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El griego distingue «mi país» de «la tierra de Israel»; se conserva esa distinción porque no son simples repeticiones.
    reason: lexical_alternative
  - marker: b
    text: 'El final griego es difícil y queda abrupto en la forma transmitida; se sigue la solución auditada que entiende una referencia duradera: «para todas las generaciones».'
    reason: textual_variant
lexical_decisions:
- source_word: χώρα
  english_pob_choice: country
  chosen_spanish: país
  alternatives_spanish:
  - tierra
  - región
  lexicon: LSJ
  rationale: En ἐν τῇ χώρᾳ μου, la idea es la de patria o territorio propio. «País» comunica bien el sentido personal de pertenencia y evita el tono más técnico de «región». La frase siguiente ya especifica «la tierra de Israel».
- source_word: νεωτέρου μου ὄντος
  english_pob_choice: while I was still young
  chosen_spanish: siendo aún joven
  alternatives_spanish:
  - cuando era más joven
  - en mi juventud
  lexicon: LSJ
  rationale: La construcción de genitivo absoluto indica una referencia temporal a la juventud de Tobit. «Siendo aún joven» es natural en español y conserva la idea de edad temprana sin añadir matices no presentes.
- source_word: ἀπέστη
  english_pob_choice: fell away
  chosen_spanish: se apartó
  alternatives_spanish:
  - apostató
  - rebeló
  - se desvió
  lexicon: LSJ
  rationale: El verbo expresa separación o defección. «Se apartó» preserva esa distancia religiosa y comunitaria sin cargar el texto con terminología doctrinal más fuerte de la necesaria.
- source_word: οἶκος Ἱεροσολύμων
  english_pob_choice: house of Jerusalem
  chosen_spanish: casa de Jerusalén
  alternatives_spanish:
  - casa en Jerusalén
  - templo de Jerusalén
  lexicon: LSJ
  rationale: Se conserva la expresión literal del griego, distinta de ναός («templo») más adelante. «Casa de Jerusalén» evita fusionar prematuramente ambas referencias y mantiene la tensión lexical documentada.
- source_word: ἐκλεγείσης
  english_pob_choice: had been chosen
  chosen_spanish: había sido elegida
  alternatives_spanish:
  - había sido escogida
  - fue elegida
  lexicon: LSJ
  rationale: El participio pasivo señala una elección previa de Jerusalén por parte de Dios. «Había sido elegida» refleja bien el valor retrospectivo y la pasiva sin añadir elementos interpretativos.
- source_word: εἰς τὸ θυσιάζειν
  english_pob_choice: for ... to sacrifice there
  chosen_spanish: para que todas las tribus ofrecieran allí sacrificios
  alternatives_spanish:
  - para sacrificar allí
  - como lugar para ofrecer sacrificios
  lexicon: LSJ
  rationale: La forma griega expresa propósito. En español, una subordinada final fluye mejor y mantiene el sentido locativo de «allí» implícito en el contexto.
- source_word: ναός
  english_pob_choice: temple
  chosen_spanish: templo
  alternatives_spanish:
  - santuario
  - morada sagrada
  lexicon: LSJ
  rationale: ναός se traduce de manera directa por «templo», especialmente porque el verso contrasta la casa/casa de Jerusalén con el edificio sagrado explícito. Es la opción más clara y estable.
- source_word: κατασκήνωσις
  english_pob_choice: dwelling place
  chosen_spanish: morada
  alternatives_spanish:
  - habitación
  - tabernáculo
  lexicon: LSJ
  rationale: La expresión τῆς κατασκηνώσεως τοῦ ὑψίστου presenta la idea de la habitación de Dios. «Morada» conserva la dignidad del título sin imponer «tabernáculo», que podría sonar demasiado técnico en este contexto.
- source_word: ὑψίστου
  english_pob_choice: the Most High
  chosen_spanish: el Altísimo
  alternatives_spanish:
  - el Más Alto
  lexicon: LSJ
  rationale: Título bíblico habitual para Dios; «el Altísimo» mantiene solemnidad y reconocimiento litúrgico sin perder claridad.
- source_word: ἡγιάσθη
  english_pob_choice: was consecrated
  chosen_spanish: fue consagrado
  alternatives_spanish:
  - fue santificado
  - quedó consagrado
  lexicon: LSJ
  rationale: El verbo indica ser puesto aparte como santo. «Fue consagrado» conserva ese valor cultual con buena naturalidad en español moderno.
- source_word: ᾠκοδομήθη
  english_pob_choice: was built
  chosen_spanish: fue edificado
  alternatives_spanish:
  - fue construido
  - se edificó
  lexicon: LSJ
  rationale: El verbo es arquitectónico. «Fue edificado» mantiene un registro reverente y fiel al acto de construcción del templo.
- source_word: εἰς πάσας
  english_pob_choice: for all generations
  chosen_spanish: para todas las generaciones
  alternatives_spanish:
  - por todas las generaciones
  - para siempre
  lexicon: LSJ
  rationale: El texto griego transmitido termina de modo difícil. La traducción sigue la solución auditada en inglés y vuelve explícita en español la referencia durativa/generacional que el contexto exige.
theological_decisions:
- issue: Separación de la tribu de Neftalí respecto del culto de Jerusalén
  english_pob_reading: fell away
  chosen_spanish_reading: se apartó
  alternative_spanish_readings:
  - apostató
  - se rebeló
  rationale: El pasaje describe una defección cultual y covenantal sin necesidad de introducir un término más técnico o polémico. «Se apartó» conserva la gravedad religiosa con mayor neutralidad y sigue el sentido del griego.
  doctrine_reference: DOCTRINE.md §Translation philosophy 6
- issue: Elección de Jerusalén como lugar de sacrificio para todas las tribus
  english_pob_reading: which had been chosen from all the tribes of Israel for all the tribes to sacrifice there
  chosen_spanish_reading: que había sido elegida de entre todas las tribus de Israel para que todas las tribus ofrecieran allí sacrificios
  alternative_spanish_readings:
  - elegida para el sacrificio de todas las tribus
  - escogida para que allí sacrificaran todas las tribus
  rationale: La frase conserva la afirmación teológica de elección centralizadora del lugar de culto. No se suaviza ni se amplía más allá del griego; sólo se vuelve natural en español.
  doctrine_reference: DOCTRINE.md §Translation philosophy 1, 3
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión auditada que ajustó el orden a «la tribu de mi padre Neftalí» y alineó mejor la secuencia verbal con el aoristo griego. También se conservó la distinción léxica entre «casa de Jerusalén» y «templo», y se resolvió el final textual difícil de forma coherente con la tradición griega larga y el audit trail en inglés.
  spanish_consistency_notes:
  - Se usa «Yahvé» como convención general del proyecto solo cuando aparezca el nombre divino explícito; aquí el texto usa «el Altísimo».
  - Se mantuvo una distinción entre «casa de Jerusalén» y «templo» para reflejar dos expresiones griegas distintas.
  - «Morada» se emplea para κατασκήνωσις por claridad; no se sustituyó por «tabernáculo» porque podría oscurecer el sentido en este contexto.
  - Se prefirió un registro bíblico actual pero sobrio, evitando arcaísmos innecesarios.
