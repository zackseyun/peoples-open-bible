translation:
  language: es
  text: Enseñaré a los transgresores tus caminos[a], y los pecadores volverán a ti.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «se volverán a ti» o «volverán a ti de nuevo». El verbo hebreo puede expresar tanto volverse como volver.
    reason: lexical_alternative
lexical_decisions:
- source_word: אֲלַמְּדָה
  english_pob_choice: I will teach
  chosen_spanish: Yo instruiré
  alternatives_spanish:
  - Yo enseñaré
  - Permíteme instruir
  lexicon: HALOT
  rationale: La forma verbal hifil 1cs con matiz cohortativo expresa intención o resolución. En español, 'instruiré' comunica bien el propósito activo del hablante y suena natural en un registro bíblico digno; 'enseñaré' también es posible, pero 'instruir' resalta mejor el acto formativo.
- source_word: פֹשְׁעִים
  english_pob_choice: transgressors
  chosen_spanish: los transgresores
  alternatives_spanish:
  - los rebeldes
  - los que se rebelan
  lexicon: HALOT
  rationale: '''Transgresores'' preserva el sentido moral y de ruptura de pacto del hebreo פשע sin reducirlo a una mera falta ética general. Mantiene la correspondencia con la opción inglesa documentada.'
- source_word: דְּרָכֶיךָ
  english_pob_choice: your ways
  chosen_spanish: tus caminos
  alternatives_spanish:
  - tu camino
  - tus maneras de actuar
  lexicon: HALOT
  rationale: דרך en plural, aplicado a Dios, suele referirse a su modo de actuar, conducir y enseñar. 'Caminos' es la expresión española más bíblica y transparente para conservar la metáfora.
- source_word: חַטָּאִים
  english_pob_choice: sinners
  chosen_spanish: los pecadores
  alternatives_spanish:
  - los que pecan
  - los culpables
  lexicon: HALOT
  rationale: '''Pecadores'' es el equivalente natural de חַטָּאִים y mantiene el paralelismo con ''transgresores''. ''Los que pecan'' explicita el sentido, pero pierde concisión.'
- source_word: אֵלֶיךָ
  english_pob_choice: to you
  chosen_spanish: a ti
  alternatives_spanish:
  - hacia ti
  - de vuelta a ti
  lexicon: HALOT
  rationale: La preposición indica dirección hacia la segunda persona; 'a ti' es la forma más directa y fiel. No se añade 'de vuelta' en el texto principal porque esa idea ya puede estar implicada por el verbo siguiente.
- source_word: יָשׁוּבוּ
  english_pob_choice: will return
  chosen_spanish: volverán
  alternatives_spanish:
  - retornarán
  - se volverán
  - volverán de nuevo
  lexicon: HALOT
  rationale: שוב puede significar 'volver', 'retornar' o 'volver atrás'. En este contexto penitencial, 'volverán' conserva tanto el movimiento de regreso como la resonancia relacional de arrepentimiento sin fijarla en una sola teoría de conversión.
theological_decisions:
- issue: Matiz de arrepentimiento en שוב
  english_pob_reading: will return to you
  chosen_spanish_reading: volverán a ti
  alternative_spanish_readings:
  - se volverán a ti
  - volverán hacia ti
  - volverán de nuevo a ti
  rationale: El hebreo permite tanto la imagen de girarse como la de regresar. En el Salmo 51, donde se describe la restauración del pecador, 'volverán a ti' preserva la tensión semántica sin imponer una formulación doctrinal más estrecha. La traducción deja abierta la dimensión de retorno relacional a Dios.
  doctrine_reference: Preservar la tensión léxica y teológica en שוב; no reducirla a un solo esquema de conversión.
translation_notes:
  revision_awareness: La versión inglesa auditada mantiene 'return' como opción principal y nota el rango semántico de שוב. La redacción española conserva ese rango con 'volverán', sin añadir explicaciones interpretativas en el cuerpo del texto.
  spanish_consistency_notes:
  - Se conservó 'Yahvé' no porque aparezca explícitamente en este versículo, sino porque aquí el hebreo usa el sufijo de segunda persona ('tus', 'a ti') dirigido a Dios.
  - Se prefirió 'caminos' frente a soluciones más explicativas para mantener la imagen poética y la coherencia terminológica.
  - Se evitó 'siervos' u otras sustituciones tradicionales porque el versículo no lo exige y la POB busca transparencia léxica.
