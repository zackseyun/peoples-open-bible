translation:
  language: es
  text: Pero esto fue obra de Dios[a], que gobierna sobre todo, al haber implantado el olvido en la mente de quienes antes habían tramado contra él.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «al haber puesto el olvido en la mente». El griego presenta a Dios como quien introduce ese olvido en el interior mental de los que habían tramado contra él.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐνέργεια
  english_pob_choice: working
  chosen_spanish: obra
  alternatives_spanish:
  - acción
  - operación
  - actividad
  lexicon: LSJ
  rationale: ἐνέργεια expresa una acción eficaz u operativa. En español, «obra» comunica una actuación efectiva de Dios sin sonar técnico o forzado, y mantiene el énfasis en que algo fue producido por su actuar.
- source_word: τοῦ πάντα δεσποτεύοντος θεοῦ
  english_pob_choice: of God, who rules over all
  chosen_spanish: de Dios, que domina sobre todo
  alternatives_spanish:
  - de Dios, que gobierna sobre todo
  - de Dios, soberano sobre todo
  - de Dios, que es señor de todo
  lexicon: LSJ
  rationale: δεσποτεύω expresa ejercer dominio o señorío. «Domina sobre todo» preserva la idea de soberanía universal con un registro claro y sobrio en español, sin sustituirla por un término eclesiástico menos directo.
- source_word: τῶν πρὶν αὐτῷ μεμηχανημένων
  english_pob_choice: of those who had previously plotted against him
  chosen_spanish: de quienes antes habían tramado contra él
  alternatives_spanish:
  - de quienes antes habían maquinado contra él
  - de quienes antes habían conspirado contra él
  - de quienes antes habían ideado planes contra él
  lexicon: LSJ
  rationale: μεμηχανημένων, de μηχανάομαι, apunta a idear o tramar planes hostiles. «Tramado» conserva la intención maliciosa y suena natural en español; «contra él» sigue el referente singular del griego αὐτῷ, como en la revisión inglesa más reciente.
- source_word: λήθην
  english_pob_choice: a forgetfulness
  chosen_spanish: el olvido
  alternatives_spanish:
  - un olvido
  - olvido
  - la falta de memoria
  lexicon: LSJ
  rationale: λήθη significa olvido o desmemoria. En español, «el olvido» es la forma más natural y fiel; evita una construcción artificial como «un olvido» y mantiene el efecto de algo implantado en la mente.
- source_word: κατὰ διάνοιαν
  english_pob_choice: in the minds
  chosen_spanish: en la mente
  alternatives_spanish:
  - en sus pensamientos
  - en su mente
  - en el entendimiento
  lexicon: LSJ
  rationale: διάνοια puede referirse a mente, pensamiento o entendimiento. «En la mente» reproduce bien el interior mental donde se introduce el olvido y resulta idiomático en español.
- source_word: ἐντεθεικότος
  english_pob_choice: having implanted
  chosen_spanish: al haber implantado
  alternatives_spanish:
  - al haber puesto
  - al haber introducido
  - al haber colocado
  lexicon: LSJ
  rationale: ἐντεθεικότος, de ἐντίθημι, literalmente implica poner dentro o implantar. «Al haber implantado» conserva la imagen de una inserción interna y refleja mejor la agencia divina que una simple paráfrasis.
theological_decisions:
- issue: Agencia divina directa en el olvido de los enemigos
  english_pob_reading: God actively caused forgetfulness in the minds of those plotting harm
  chosen_spanish_reading: Dios actuó directamente al implantar el olvido en la mente de los que tramaban mal contra él
  alternative_spanish_readings:
  - Dios simplemente permitió que olvidaran
  - Dios providencialmente produjo confusión sin causarla directamente
  rationale: El participio ἐντεθεικότος presenta una acción directa de poner/implantar, y ἡ ἐνέργεια τοῦ... θεοῦ atribuye el hecho a la obra de Dios. La traducción mantiene esa causalidad sin atenuarla.
  doctrine_reference: DOCTRINE.md §Translation philosophy 3
- issue: Referente de αὐτῷ
  english_pob_reading: contextually rendered as 'him' referring to the targeted Jewish people / narrative referent
  chosen_spanish_reading: se conserva como «él», siguiendo el singular del griego y la revisión inglesa más reciente
  alternative_spanish_readings:
  - «ellos», si se explicitara el referente colectivo
  - una formulación impersonal
  rationale: El griego usa un dativo singular; aunque el contexto narrativo puede abarcar una colectividad, el texto visible habla con singularidad. En español se puede mantener «él» sin forzar el sentido, y así se preserva la tensión del referente tal como aparece en el original.
  doctrine_reference: DOCTRINE.md §Translation philosophy 3
translation_notes:
  revision_awareness: 'La redacción sigue la revisión inglesa más reciente en dos puntos: (1) mantiene el referente singular de αὐτῷ/«él» en vez de expandirlo a un colectivo; y (2) evita añadir contenido interpretativo como «de su propósito», limitándose a «el olvido», que corresponde más de cerca al griego λήθην. También conserva la idea de acción divina directa mediante un verbo de implantación.'
  spanish_consistency_notes:
  - Se usó «Dios» para θεός, conforme al estándar del proyecto.
  - Se prefirió «domina sobre todo» para δεσποτεύοντος, evitando «Señor» como sustituto genérico de soberanía.
  - Se mantuvo «tramar» para μεμηχανημένων por su fuerza hostil y planificada.
  - Se eligió «olvido» para λήθην, porque en español transmite mejor el sustantivo simple del original que «un olvido».
  - Se conservó «él» para αὐτῷ siguiendo el singular del texto griego; el contexto narrativo queda reflejado sin sobreinterpretación.
