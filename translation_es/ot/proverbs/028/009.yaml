    issue: 'Fraseo poco natural: «su oído de oír»'
    rationale: Aunque formalmente cercano al hebreo, en español eclesial general «aparta su oído de oír» suena duro y poco idiomático. Conviene una formulación que preserve la metáfora corporal y el rechazo voluntario a escuchar sin calco innecesario.
  - severity: low
    issue: Nota al pie con «instrucción autorizada»
    rationale: «Autorizada» puede sonar administrativa o derivada del inglés. «Autoritativa» o una reformulación equivalente expresa mejor la idea teológica de torah como instrucción divina con autoridad.
