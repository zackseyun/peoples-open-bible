translation:
  language: es
  text: Después de que murió Hezrón en Caleb-Efrata[b], la esposa de Hezrón, Abías, le dio un hijo, Ashhur, padre[a] de Tecoa.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'fundador de Tecoa'. En las genealogías, 'padre de' puede designar al fundador o a un antepasado principal de una población o clan, no solo al padre biológico inmediato.
    reason: lexical_alternative
  - marker: b
    text: 'O ''Caleb Efrata''. La expresión hebrea es difícil: puede referirse a un lugar o a una designación de clan, y se conserva sin decidir entre esas posibilidades.'
    reason: alternative_reading
lexical_decisions:
- source_word: וְאַחַר מוֹת
  english_pob_choice: After ... died
  chosen_spanish: Después de la muerte de...
  alternatives_spanish:
  - Y después de que ... murió
  - Tras la muerte de...
  lexicon: HALOT
  rationale: El hebreo expresa una secuencia temporal; en español, ‘después de la muerte de’ conserva el valor temporal de forma natural y fiel, sin introducir una paráfrasis más fuerte que el texto.
- source_word: חֶצְרוֹן
  english_pob_choice: Hezron
  chosen_spanish: Hezrón
  alternatives_spanish:
  - Jezrón
  lexicon: Transliteración tradicional hispana / consonantal
  rationale: Se mantiene el nombre propio con adaptación habitual al español bíblico, conservando la referencia al personaje y la continuidad genealógica.
- source_word: בְּכָלֵב אֶפְרָתָה
  english_pob_choice: in Caleb-ephrathah
  chosen_spanish: en Caleb-efrata
  alternatives_spanish:
  - en Caleb Efrata
  - en Caleb-Efrata
  lexicon: HALOT
  rationale: La construcción es difícil y puede funcionar como designación de lugar o clan. Se conserva la ambigüedad con una transliteración unida por guion o sin él; aquí se prefiere una forma fluida en español, manteniendo el conjunto como nombre compuesto sin resolverlo interpretativamente en el texto principal.
- source_word: וְאֵשֶׁת חֶצְרוֹן
  english_pob_choice: Hezron’s wife
  chosen_spanish: la esposa de Hezrón
  alternatives_spanish:
  - y la esposa de Hezrón
  - la mujer de Hezrón
  lexicon: HALOT
  rationale: El constructo hebreo se vierte de manera natural como relación posesiva; ‘esposa’ es preciso y claro en este contexto genealógico.
- source_word: אֲבִיָּה
  english_pob_choice: Abijah
  chosen_spanish: Abías
  alternatives_spanish:
  - Abía
  lexicon: Transliteración bíblica española
  rationale: Se adopta la forma más reconocible en español bíblico, sin forzar una transliteración menos idiomática.
- source_word: וַתֵּלֶד לוֹ
  english_pob_choice: bore to him
  chosen_spanish: le dio a luz a
  alternatives_spanish:
  - dio a luz para él
  - le dio a luz
  lexicon: HALOT
  rationale: El hebreo indica nacimiento con objeto indirecto; ‘le dio a luz a’ conserva la relación personal y es natural en español, mientras que ‘bore to him’ en inglés señalaba esa estructura sin reducirla a un simple ‘engendró’.
- source_word: אַשְׁחוּר
  english_pob_choice: Ashhur
  chosen_spanish: Ashhur
  alternatives_spanish:
  - Ashur
  lexicon: Transliteración del nombre propio
  rationale: Se conserva la transliteración que refleja mejor la forma consonántica y evita confundirlo con otros nombres parecidos.
- source_word: אֲבִי תְקוֹעַ
  english_pob_choice: the father of Tekoa
  chosen_spanish: padre de Tecoa
  alternatives_spanish:
  - fundador de Tecoa
  - antepasado de Tecoa
  lexicon: HALOT
  rationale: En genealogías, ‘padre de’ puede señalar fundador o antepasado principal. Se mantiene la fórmula literal en español, dejando la posibilidad genealógica amplia sin decidirla en el texto principal.
theological_decisions:
- issue: Valor genealógico de ‘padre de’
  english_pob_reading: the father of Tekoa
  chosen_spanish_reading: padre de Tecoa
  alternative_spanish_readings:
  - fundador de Tecoa
  - antepasado de Tecoa
  rationale: La frase hebrea puede designar un jefe, fundador o antecesor de una población/clan. En la traducción principal se preserva la ambigüedad histórica y genealógica, como hace el inglés POB con la nota alternativa.
  doctrine_reference: Uso genealógico y onomástico en narraciones bíblicas; cf. genealogías del AT donde אָב puede indicar linaje, jefatura o fundación.
- issue: Topónimo complejo ‘Caleb-ephrathah’
  english_pob_reading: in Caleb-ephrathah
  chosen_spanish_reading: en Caleb-efrata
  alternative_spanish_readings:
  - en Caleb Efrata
  - en Caleb-Efrata
  - en la región de Caleb-Efrata
  rationale: El hebreo presenta una secuencia difícil cuya relación sintáctica no debe sobreespecificarse. La traducción conserva el compuesto y evita resolverlo como localidad o clan más allá de lo que el texto permite.
  doctrine_reference: Criterio de sobriedad exegética en pasajes genealógicos difíciles; no se fuerza una lectura donde el hebreo admite varias posibilidades.
translation_notes:
  revision_awareness: La versión española sigue de cerca el texto hebreo y el criterio auditado del POB en inglés, conservando la ambigüedad de בְּכָלֵב אֶפְרָתָה y la amplitud genealógica de אֲבִי תְקוֹעַ. No se introdujeron cambios respecto del pasaje base más allá de la adaptación idiomática al español.
  spanish_consistency_notes:
  - Se usa ‘Yahvé’ solo cuando el texto lo requiera; este versículo no contiene el Tetragrámaton.
  - 'Se prefieren nombres propios bíblicos en forma española habitual: Hezrón, Abías, Tecoa.'
  - Se mantiene el registro sobrio y genealógico propio del pasaje, sin expandir el contenido narrativo.
