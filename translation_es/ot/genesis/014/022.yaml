translation:
  language: es
  text: 'Pero Abram dijo al rey de Sodoma: «He alzado mi mano[a] a Yahvé, Dios Altísimo[b], poseedor de cielo y tierra».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Alzar la mano: un gesto hebreo de juramento; es decir, Abram está haciendo un juramento.'
    reason: cultural_note
  - marker: b
    text: También puede entenderse como «creador de cielo y tierra». El participio hebreo puede abarcar las ideas de «poseedor», «dueño» o, según el contexto, «creador».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר
  english_pob_choice: But ... said
  chosen_spanish: Pero ... dijo
  alternatives_spanish:
  - Y ... dijo
  - Entonces ... dijo
  lexicon: HALOT
  rationale: El waw consecutivo avanza la narración y, por el contexto inmediato, tiene un matiz contrastivo adecuado en español con «Pero». «Dijo» conserva el verbo simple de habla sin sobreinterpretar.
- source_word: אַבְרָם
  english_pob_choice: Abram
  chosen_spanish: Abram
  lexicon: Convención onomástica
  rationale: Nombre propio transliterado de forma estándar y consistente con el texto fuente.
- source_word: מֶלֶךְ סְדֹם
  english_pob_choice: the king of Sodom
  chosen_spanish: el rey de Sodoma
  alternatives_spanish:
  - rey de Sodoma
  lexicon: HALOT
  rationale: Cadena constructa normal; en español se expresa de manera natural con artículo definido por el contexto narrativo.
- source_word: הֲרִימֹתִי יָדִי
  english_pob_choice: I have raised my hand
  chosen_spanish: He alzado mi mano
  alternatives_spanish:
  - Levanto mi mano
  - He jurado
  lexicon: HALOT
  rationale: Se conserva la imagen corporal concreta del hebreo. El sentido de juramento queda implícito por la expresión idiomática y se explica en nota, en lugar de reemplazarla por una paráfrasis.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - SEÑOR
  - Jehová
  lexicon: HALOT / convención del proyecto
  rationale: Se mantiene el nombre propio divino conforme a la norma del proyecto, evitando la sustitución por un título. «Yahvé» es la forma principal en el texto español.
- source_word: אֵל עֶלְיוֹן
  english_pob_choice: God Most High
  chosen_spanish: Dios Altísimo
  alternatives_spanish:
  - Dios el Altísimo
  - El Elyón
  lexicon: HALOT
  rationale: Se traduce el título para una lectura natural en español. «Altísimo» reproduce bien el valor superlativo de עֶלְיוֹן.
- source_word: קֹנֵה
  english_pob_choice: possessor of
  chosen_spanish: poseedor de
  alternatives_spanish:
  - dueño de
  - creador de
  - propietario de
  lexicon: HALOT
  rationale: «Poseedor de» preserva el núcleo semántico de posesión/propiedad sin resolver en exceso la amplitud posible del participio. Mantiene la tensión léxica señalada por la POB inglesa.
- source_word: שָׁמַ֥יִם וָאָֽרֶץ
  english_pob_choice: heaven and earth
  chosen_spanish: cielo y tierra
  alternatives_spanish:
  - los cielos y la tierra
  - cielo y la tierra
  lexicon: HALOT
  rationale: Se conserva el merismo con una formulación natural en español. «Cielo y tierra» comunica la totalidad de la creación sin añadir determinación innecesaria.
theological_decisions:
- issue: Traducción del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Jehová
  rationale: El texto hebreo usa el Tetragrámaton directamente. En consonancia con la política del proyecto, se preserva el nombre personal de Dios en español como «Yahvé» en lugar de sustituirlo por un título.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Alcance de קֹנֵה שָׁמַיִם וָאָרֶץ
  english_pob_reading: possessor of heaven and earth
  chosen_spanish_reading: poseedor de cielo y tierra
  alternative_spanish_readings:
  - creador de cielo y tierra
  - dueño de cielo y tierra
  - poseedor/creador de cielo y tierra
  rationale: Se mantiene la lectura principal de posesión para no cerrar indebidamente el debate semántico del participio. La alternativa de «creador» sigue siendo posible, pero queda fuera del texto principal y puede quedar sugerida por nota si se desea.
  doctrine_reference: DOCTRINE.md Translation philosophy §3
- issue: Sentido idiomático de «alzar la mano»
  english_pob_reading: I have raised my hand
  chosen_spanish_reading: He alzado mi mano
  alternative_spanish_readings:
  - He jurado
  - He levantado mi mano
  rationale: Se conserva la metáfora hebrea del juramento sin convertirla en paráfrasis. La nota explica el valor cultural de la acción, evitando perder la concreción del original.
  doctrine_reference: 'Translation philosophy: preserve concrete idiom with contextual note'
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión más reciente del inglés POB, que corrigió la puntuación final de la cita para cerrar con punto dentro de las comillas. En español se refleja esa misma conclusión con una cita completa que termina en punto. No se incorporaron cambios sustantivos adicionales porque el pasaje y la evaluación posterior indicaron alta concordancia.
  spanish_consistency_notes:
  - Se usa «Yahvé» de manera consistente para יְהוָה, conforme a la política del proyecto.
  - Se mantiene la distinción entre título divino («Dios Altísimo») y nombre divino («Yahvé»).
  - «Poseedor de» conserva la tensión semántica de קֹנֵה sin resolverla prematuramente.
  - La puntuación de la cita en español cierra como oración completa, en coherencia con la revisión inglesa.
