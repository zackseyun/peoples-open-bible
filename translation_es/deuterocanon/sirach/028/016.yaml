    issue: Pronombre «le» ambiguo en «Quien le presta atención»
    rationale: Aunque el dativo clítico puede funcionar, aquí el referente es una cosa/persona gramatical femenina del contexto y el español queda menos claro que con «a eso» o «a ello». La claridad inmediata pesa más en un texto bíblico corrido.
  - severity: high
    issue: 'Nota al pie defectuosa: «dwellerá»'
    rationale: Contiene una palabra inexistente y mezcla inglés/español, lo cual la hace inaceptable editorialmente.
  - severity: low
    issue: La nota al pie no formula con suficiente claridad la alternativa léxica
    rationale: El inglés documenta la literalidad de «camp/dwell with quietness». La nota española debe expresar esa alternativa de modo idiomático y correcto.
  revised_spanish_text: Quien presta atención a eso nunca hallará descanso, ni acampará con quietud[a].
