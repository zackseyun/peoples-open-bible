translation:
  language: es
  text: Todos estos fueron honrados en sus generaciones[a], y en sus días fueron una gloria.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El hebreo presenta una cláusula nominal compacta, literalmente «y en sus días, su gloria». El paralelo griego dice «y en sus días [fue] una jactancia/gloria». La traducción expresa el sentido en español idiomático.
    reason: lexical_alternative
lexical_decisions:
- source_word: כל אלה
  english_pob_choice: All these
  chosen_spanish: Todos estos
  alternatives_spanish:
  - Todos estos hombres
  - Todos esos
  lexicon: HALOT
  rationale: El hebreo es una suma demostrativa directa de las figuras ya enumeradas. «Todos estos» conserva la referencia inmediata sin añadir «hombres», que no está explícito en la frase.
- source_word: בדורם
  english_pob_choice: in their generations
  chosen_spanish: en sus generaciones
  alternatives_spanish:
  - en su generación
  - entre sus generaciones
  - en su propio tiempo
  lexicon: HALOT
  rationale: «דור» se mantiene con el valor de «generaciones» para conservar la forma idiomática del texto fuente; el plural está apoyado además por el paralelo griego ἐν γενεαῖς.
- source_word: ומימיהם
  english_pob_choice: and in their days
  chosen_spanish: y en sus días
  alternatives_spanish:
  - y desde sus días
  - y durante su vida
  lexicon: HALOT
  rationale: La construcción temporal se expresa naturalmente en español como «en sus días». El paralelo griego ἐν ταῖς ἡμέραις αὐτῶν confirma el sentido temporal y no el de procedencia.
- source_word: תפארתם
  english_pob_choice: they were a glory
  chosen_spanish: fueron una gloria
  alternatives_spanish:
  - fueron su gloria
  - fueron un honor
  - fueron su esplendor
  lexicon: HALOT
  rationale: El sustantivo hebreo admite «gloria» o «esplendor», y la cláusula nominal es compacta. «Fueron una gloria» preserva el valor honorífico y evita volver la frase demasiado explicativa; «gloria» también armoniza con el paralelo griego καύχημα, entendido aquí en sentido elogioso.
translation_notes:
  revision_awareness: La redacción sigue de cerca el hebreo de Kahana y toma en cuenta el paralelo griego de Swete. Se mantiene la simetría temporal y el matiz honorífico sin introducir contenido nuevo.
  spanish_consistency_notes:
  - Se conserva «gloria» para תפארת/καύχημα en sentido honorífico, evitando oscilar entre «esplendor» y «gloria» dentro del mismo versículo.
  - «Generaciones» mantiene el plural del paralelo griego y la forma idiomática del hebreo.
  - La puntuación refleja dos miembros poéticos coordinados por «y».
