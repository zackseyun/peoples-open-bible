- from: Después de algunos días volvió para tomarla[a], y se apartó para ver el cadáver del león; y he aquí, una bandada de abejas estaba en el cuerpo del león, y había miel.
  to: Después de algunos días volvió para tomarla[a], y se apartó para ver el cadáver del león, y he aquí, un enjambre de abejas estaba en el cuerpo del león, y había miel.
  rationale: Se corrige «bandada» a «enjambre» para reflejar con precisión el hebreo עֲדַת דְּבוֹרִים y el español idiomático. También se suaviza la puntuación para una lectura más natural, sin alterar el sentido. Se conserva «tomarla» con nota por fidelidad a לְקַחְתָּהּ y a la auditoría inglesa.
