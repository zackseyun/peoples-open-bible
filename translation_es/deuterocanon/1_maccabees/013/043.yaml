translation:
  language: es
  text: En aquellos días acampó frente a Gaza y la rodeó con campamentos, e hizo una máquina de asedio[a] y la acercó a la ciudad, y golpeó una torre y la capturó.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘helepólis’, un tipo específico de máquina de asedio; el término griego es más preciso que la expresión general ‘máquina de asedio’.
    reason: lexical_alternative
lexical_decisions:
- source_word: παρενέβαλεν
  english_pob_choice: encamped against
  chosen_spanish: acampó contra
  alternatives_spanish:
  - acampar contra
  - puso su campamento contra
  - acampar frente a
  lexicon: LSJ
  rationale: El verbo expresa un acto militar de poner el campamento frente al objetivo hostil. 'Acampó contra' conserva la relación de hostilidad de ἐπί y suena natural en español bíblico contemporáneo.
- source_word: ἐκύκλωσεν
  english_pob_choice: surrounded
  chosen_spanish: la rodeó
  alternatives_spanish:
  - la cercó
  - la cercó por completo
  - la rodeó de cerca
  lexicon: LSJ
  rationale: '''Rodeó'' comunica el sentido básico de envolver la ciudad sin añadir tecnicismo interpretativo. El objeto directo femenino mantiene la referencia a Gaza.'
- source_word: παρεμβολαῖς
  english_pob_choice: with encampments
  chosen_spanish: con campamentos
  alternatives_spanish:
  - con encampamentos
  - con campamentos de guerra
  - con tiendas militares
  lexicon: LSJ
  rationale: El plural designa campamentos militares; 'campamentos' es claro en español y mantiene el vínculo con el verbo previo. 'Encampamentos' es más literal pero menos natural.
- source_word: ἑλέπολιν
  english_pob_choice: a siege engine
  chosen_spanish: una máquina de asedio
  alternatives_spanish:
  - una torre de asedio
  - un ariete
  - una helepólis
  lexicon: LSJ
  rationale: El término apunta a una máquina de sitio usada contra ciudades. 'Máquina de asedio' es comprensible y suficientemente general; evita la transliteración opaca y no especifica indebidamente el tipo exacto.
- source_word: προσήγαγεν τῇ πόλει
  english_pob_choice: brought it up to the city
  chosen_spanish: la acercó a la ciudad
  alternatives_spanish:
  - la llevó hasta la ciudad
  - la presentó ante la ciudad
  - la avanzó hacia la ciudad
  lexicon: LSJ
  rationale: La frase describe el movimiento de la máquina hasta su posición ante la ciudad. 'La acercó a la ciudad' es idiomático en español y conserva la dirección del movimiento.
- source_word: ἐπάταξεν
  english_pob_choice: struck
  chosen_spanish: golpeó
  alternatives_spanish:
  - hirió
  - atacó
  - derribó
  lexicon: LSJ
  rationale: '''Golpeó'' reproduce el valor básico del verbo sin arcaísmo. En este contexto militar, no obliga a inferir destrucción completa antes de que el texto la explicite.'
- source_word: πύργον ἕνα
  english_pob_choice: one tower
  chosen_spanish: una torre
  alternatives_spanish:
  - una sola torre
  - una de las torres
  - cierta torre
  lexicon: LSJ
  rationale: El griego dice literalmente 'una torre'. En español, 'una torre' conserva la referencia directa sin añadir el matiz partitivo de 'una de las torres'.
- source_word: κατελάβετο
  english_pob_choice: captured it
  chosen_spanish: la capturó
  alternatives_spanish:
  - la tomó
  - la apresó
  - se apoderó de ella
  lexicon: LSJ
  rationale: En contexto, el objeto retomado es la torre mencionada. 'La capturó' expresa conquista militar con claridad y mantiene la referencia femenina del referente implícito en español.
translation_notes:
  revision_awareness: 'El contexto griego y la auditoría inglesa coinciden estrechamente. Se preserva la secuencia militar: acampar, rodear, construir la máquina de asedio, acercarla, golpear una torre y capturarla. No se introdujeron cambios textuales ni interpretaciones doctrinales.'
  spanish_consistency_notes:
  - Se mantuvo Gaza como topónimo sin artículo.
  - Se eligió 'máquina de asedio' por claridad, con nota sobre la posibilidad técnica de 'helepólis'.
  - Se evitó 'SEÑOR' o terminología teológica irrelevante, dado que el versículo es narrativo militar.
  - '''La'' en los últimos miembros retoma implícitamente la torre mencionada; el antecedente es claro en español.'
