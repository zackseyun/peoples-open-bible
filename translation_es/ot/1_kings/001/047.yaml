base_translation:
  language: en
  yaml_path: translation/ot/1_kings/001/047.yaml
  text: And the king’s servants also came to bless our lord King David[a], saying, ‘May your God make Solomon’s name better than your name[b], and may he make his throne greater than your throne.’ And the king bowed himself on the bed.
  footnotes:
  - marker: a
    text: Or, 'the king worshiped on the bed.' The Hebrew verb can mean either 'bowed himself' or 'worshiped,' depending on context.
    reason: alternative_reading
  - marker: b
    text: '''Name'' here carries the sense of reputation or renown.'
    reason: lexical_alternative
