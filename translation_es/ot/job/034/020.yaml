  to: En un momento mueren; a medianoche un pueblo es sacudido[a] y desaparece; los poderosos son apartados, no por mano humana.
  rationale: Se ajusta «y pasa» a «y desaparece» para reflejar mejor el sentido contextual de desaparición/muerte de וְיַעֲבֹרוּ. Se cambia «no por mano» a «no por mano humana» para lograr español natural y claro, manteniendo la implicación teológica documentada de ausencia de agencia humana. También se refunde la nota para preservar la alternativa sobre la sacudida/agitación y el literal hebreo de la frase final.
