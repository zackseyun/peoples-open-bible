revisions:
- from: Así los repartieron por sorteo[a], unos con otros[b], porque había jefes del santuario y jefes de Dios entre los hijos de Eleazar y entre los hijos de Itamar.
  to: Así los repartieron por suertes[a], éstos con aquéllos[b], porque había oficiales del santuario y oficiales de Dios entre los hijos de Eleazar y entre los hijos de Itamar.
  rationale: Se ajusta «jefes» a «oficiales» para seguir mejor el valor de שָׂרִים y el audit trail inglés, evitando una expresión española torpe en «jefes de Dios». Se cambia «unos con otros» por «éstos con aquéllos» para preservar el matiz demostrativo de אֵלֶּה עִם אֵלֶּה. También se prefiere «por suertes» para reflejar con más transparencia el plural hebreo, manteniendo «por sorteo» como alternativa en nota.
