translation:
  language: es
  text: Mi aliento es extraño a mi mujer, y soy repulsivo a los hijos de mi propio cuerpo[a][b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, siguiendo otra comprensión del hebreo difícil: «y mi ruego es para los hijos de mi cuerpo» o «imploro favor a los hijos de mi cuerpo».'
    reason: alternative_reading
  - marker: b
    text: 'Hebreo, literalmente: «a los hijos de mi cuerpo». La expresión puede referirse a los propios hijos de Job o, de manera más general, a sus parientes consanguíneos cercanos.'
    reason: cultural_note
lexical_decisions:
- source_word: ר֭וּחִי
  english_pob_choice: my breath
  chosen_spanish: mi aliento
  alternatives_spanish:
  - mi respiración
  - mi espíritu
  - mi viento
  lexicon: HALOT
  rationale: 'רוּחַ puede significar aliento, viento o espíritu. Aquí el contexto es corporal y relacional: Job describe una afección que hace desagradable su presencia a su esposa. En español, «aliento» comunica mejor esa realidad física que «espíritu», aunque se mantiene la posibilidad semántica amplia de רוּחַ.'
- source_word: זָרָה
  english_pob_choice: is strange
  chosen_spanish: es extraño
  alternatives_spanish:
  - es ajeno
  - es ofensivo
  - es repulsivo
  lexicon: HALOT
  rationale: El verbo de זוּר expresa extrañeza, ajenidad o rechazo. Siguiendo la revisión inglesa, «extraño» refleja con más cercanía la idea de algo que se vuelve ajeno o fuera de lugar, sin endurecerlo innecesariamente con un término más interpretativo.
- source_word: לְאִשְׁתִּי
  english_pob_choice: to my wife
  chosen_spanish: para mi mujer
  alternatives_spanish:
  - a mi esposa
  - para mi esposa
  lexicon: HALOT
  rationale: El ל señala a la persona afectada; en español, con un predicado de valoración o reacción, «para» resulta natural. «Mujer» conserva el tono bíblico directo sin añadir un matiz eclesiástico o sentimental que no está en el hebreo.
- source_word: וְחַנֹּתִי
  english_pob_choice: and I am repulsive
  chosen_spanish: y soy repulsivo
  alternatives_spanish:
  - y soy ofensivo
  - y soy aborrecible
  - y pido favor
  lexicon: HALOT
  rationale: La forma es difícil y admite una lectura relacionada con rechazo/repugnancia o, alternativamente, con una petición de favor. En paralelo con la primera cola y con el lenguaje de rechazo social, «soy repulsivo» comunica bien la lectura preferida por el POB inglés, mientras que la lectura alternativa se preserva en nota.
- source_word: לִבְנֵי
  english_pob_choice: to the sons of
  chosen_spanish: para los hijos de
  alternatives_spanish:
  - a los hijos de
  - para los descendientes de
  - a los hijos de mi cuerpo
  lexicon: HALOT
  rationale: בנים significa literalmente «hijos». En español, «hijos» mantiene la transparencia textual. Se evita suavizarlo a «descendientes» para no perder la concreción del hebreo.
- source_word: בִטְנִי
  english_pob_choice: my own body
  chosen_spanish: mi propio cuerpo
  alternatives_spanish:
  - mi vientre
  - mi vientre materno
  - mi vientre/cuerpo
  lexicon: HALOT
  rationale: בטן puede significar vientre o vientre/cuerpo, y la expresión idiomática apunta a la descendencia de la propia carne. «Mi propio cuerpo» hace inteligible la relación de parentesco biológico en español sin borrar la imagen física del hebreo.
translation_notes:
  revision_awareness: La redacción toma en cuenta la revisión inglesa más reciente, que prefirió reflejar más directamente el sentido de זָרָה como «strange/extraño» y mantener para וְחַנֹּתִי una lectura de rechazo/repulsión, sin borrar la alternativa tradicional de «ruego/favor» documentada en la nota.
  spanish_consistency_notes:
  - Se mantiene la terminología bíblica directa («hijos», «cuerpo») en lugar de una paráfrasis explicativa más amplia.
  - Se evita «SEÑOR» o equivalentes no pertinentes porque el versículo no contiene el Tetragrámaton.
  - Se preserva la tensión semántica de וְחַנֹּתִי mediante una nota de lectura alternativa, ya que el hebreo es difícil y el audit trail la documenta.
  - El tono es sobrio y publicable en español latinoamericano, sin arcaísmos innecesarios.
