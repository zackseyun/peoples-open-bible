translation:
  language: es
  text: Son invencibles por la virtud[a]. Mientras todavía decía estas cosas, echaron más fuego, y, al hacer girar la rueda[b] con más violencia, la apretaron todavía más[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «por causa de la virtud». La frase griega ὑπὲρ ἀρετῆς puede indicar actuar o sufrir por la virtud o por causa de la virtud.'
    reason: lexical_alternative
  - marker: b
    text: Es decir, la rueda de tortura.
    reason: cultural_note
  - marker: c
    text: El verbo final es difícil; expresa aumentar la tensión o apretar más a la víctima en la rueda.
    reason: lexical_alternative
lexical_decisions:
- source_word: ὑπὲρ ἀρετῆς
  english_pob_choice: for the sake of virtue
  chosen_spanish: por causa de la virtud
  alternatives_spanish:
  - por la virtud
  - por amor a la virtud
  lexicon: LSJ
  rationale: ὑπέρ con genitivo expresa motivo o causa; en este contexto martirial, la frase señala el motivo por el cual permanecen inconquistables. «Virtud» conserva el campo moral-filosófico de ἀρετή en 4 Macabeos.
- source_word: ἀνίκητοι
  english_pob_choice: unconquerable
  chosen_spanish: invencibles
  alternatives_spanish:
  - inconquistables
  - no vencidos
  lexicon: LSJ
  rationale: El adjetivo indica que no pueden ser vencidos o conquistados. «Invencibles» comunica bien la fuerza del griego en español natural y digno.
- source_word: ταῦτα λέγων ἔτι
  english_pob_choice: while he was still saying these things
  chosen_spanish: mientras todavía decía estas cosas
  alternatives_spanish:
  - mientras aún hablaba
  - mientras seguía diciendo estas cosas
  lexicon: LSJ
  rationale: La construcción participial con ἔτι expresa una acción en curso interrumpida por la siguiente. «Estas cosas» refleja el plural ταῦτα.
- source_word: πῦρ ἐπέστρωσαν
  english_pob_choice: they piled on more fire
  chosen_spanish: echaron más fuego
  alternatives_spanish:
  - apilaron más fuego
  - pusieron más fuego
  lexicon: LSJ
  rationale: ἐπιστρώννυμι significa literalmente «extender» o «esparcir»; en este contexto de tortura se refiere a añadir fuego para intensificar el tormento. «Echaron más fuego» suena natural en español y preserva la idea de aumento.
- source_word: διερεθίζοντες
  english_pob_choice: by turning the wheel more violently
  chosen_spanish: al agitar más violentamente
  alternatives_spanish:
  - al intensificar
  - al provocar más
  lexicon: LSJ
  rationale: El participio denota aumentar la excitación, la presión o la violencia de la acción. En relación con la rueda de tortura, «agitar más violentamente» comunica el incremento de la crueldad sin añadir más de lo que el griego asegura.
- source_word: τὸν τροχόν
  english_pob_choice: the wheel
  chosen_spanish: la rueda
  alternatives_spanish:
  - la rueda de tortura
  - el torno
  lexicon: LSJ
  rationale: τροχός es «rueda»; el contexto deja claro que se trata de un instrumento de tortura. En el texto principal se mantiene el término literal para respetar la transparencia del original.
- source_word: προσεπικατέτεινον
  english_pob_choice: they tightened it further
  chosen_spanish: la apretaron todavía más
  alternatives_spanish:
  - la tensaron todavía más
  - la estiraron todavía más
  lexicon: LSJ
  rationale: El verbo compuesto es difícil, pero en contexto indica aumentar la tensión o el apriete de la víctima en la rueda. «La apretaron todavía más» conserva la intensificación sin fingir una precisión que el griego no da con total claridad.
theological_decisions:
- issue: ἀρετή en un contexto martirial de tono filosófico
  english_pob_reading: virtue
  chosen_spanish_reading: virtud
  alternative_spanish_readings:
  - excelencia moral
  - excelencia
  rationale: 4 Macabeos usa lenguaje moral-filosófico helenístico. «Virtud» preserva ese registro y evita introducir terminología doctrinal ajena al texto.
  doctrine_reference: Translation philosophy §1, §5
- issue: Identificación del τροχός como instrumento de tortura sin sobreexplicarlo
  english_pob_reading: the wheel
  chosen_spanish_reading: la rueda
  alternative_spanish_readings:
  - la rueda de tortura
  rationale: El griego dice solo «la rueda». Mantener el término literal preserva la transparencia; el contexto de la escena aporta la función torturadora.
  doctrine_reference: Translation philosophy §1, §6
- issue: Relación entre el aumento del fuego y el incremento de la violencia sobre la rueda
  english_pob_reading: they piled on more fire ... by turning the wheel more violently
  chosen_spanish_reading: echaron más fuego ... al agitar más violentamente la rueda
  alternative_spanish_readings:
  - pusieron más fuego ... al hacer girar la rueda con más violencia
  rationale: 'La versión española intenta mantener ambas acciones como escaladas paralelas: más fuego y más violencia sobre la rueda. Así se conserva la doble intensificación del griego y del audit trail inglés.'
  doctrine_reference: Translation philosophy §1, §6
translation_notes:
  revision_awareness: La redacción sigue el último pasaje revisado del audit trail inglés, que ajustó ὑπὲρ ἀρετῆς hacia una causalidad más natural, intensificó la imagen de añadir fuego y mantuvo la idea de incrementar la violencia sobre la rueda antes de apretar aún más. La versión española procura reflejar esas decisiones sin copiar mecánicamente el inglés, sino volviendo al griego para sostener la transparencia del texto.
  spanish_consistency_notes:
  - Se mantiene «virtud» para ἀρετή, conforme al registro filosófico-moral de 4 Macabeos.
  - Se prefiere «rueda» como término literal, con nota explicativa para el contexto de tortura.
  - «Invencibles» se elige por naturalidad en español, sin perder la fuerza de ἀνίκητοι.
  - Se evita introducir «Cristo», «SEÑOR» u otra terminología no presente en el pasaje.
  - 'El texto conserva la secuencia de dos acciones: añadir fuego y aumentar la violencia/apriete sobre la rueda.'
