    rationale: La decisión inglesa documenta ‘faithlessness’ en sentido ético-relacional amplio, no ‘unbelief’. En español, «infidelidad» frecuentemente se entiende primero como infidelidad matrimonial, lo que puede desviar el sentido de la lista de males sociales.
