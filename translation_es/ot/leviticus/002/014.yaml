review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador conserva bien la estructura básica del hebreo: condición inicial, doble ''presentar'', ''primicias'', y el nombre divino ''Yahvé''. También refleja adecuadamente אָבִיב + קָלוּי בָּאֵשׁ como grano fresco tostado al fuego. Sin embargo, la frase final no representa con suficiente precisión גֶּרֶשׂ כַּרְמֶל: ''granos triturados, de la cosecha fresca'' suena añadido/appositivo y desplaza el sentido desde el material inmediato (''grano fresco'') hacia una abstracción agrícola (''cosecha'').'
  spanish_quality_summary: El español es generalmente claro y digno, pero 'granos triturados, de la cosecha fresca' resulta algo torpe y menos natural que una formulación unificada. 'De la cosecha fresca' no suena idiomático en este contexto litúrgico; 'del grano fresco' o 'de la cosecha nueva' sería mejor. Conviene además armonizar el núcleo semántico con la nota alternativa inglesa, que mantiene la referencia al grano mismo, no a la cosecha en abstracto.
  glossary_alignment: 'Buena alineación general con la terminología del proyecto: ''Yahvé'' para יהוה, ''primicias'' para בִּכּוּרִים, y ''ofrenda'' para מִנְחַת son correctos. La principal excepción es כַּרְמֶל, donde ''de la cosecha fresca'' se aleja de la decisión auditada ''from the fresh grain''; en español debe preservarse mejor como ''del grano fresco'' o equivalente cercano.'
  issues:
  - severity: medium
    issue: La traducción de כַּרְמֶל como 'de la cosecha fresca' no preserva bien el referente inmediato.
    rationale: En contexto, כַּרְמֶל describe produce/grano fresco, y junto con גֶּרֶשׂ forma una descripción material más concreta. 'Cosecha fresca' suena abstracto y poco idiomático en español.
  - severity: low
    issue: La secuencia 'granos triturados, de la cosecha fresca' es estilísticamente rígida.
    rationale: La coma parte una unidad descriptiva que en hebreo y en la auditoría inglesa funciona como expresión continua. Una formulación más compacta mejora la legibilidad sin perder precisión.
  revised_spanish_text: Y si presentas a Yahvé una ofrenda de primicias[a], presentarás tu ofrenda de primicias como grano fresco tostado al fuego, granos triturados del grano fresco.
  revised_footnotes:
  - marker: a
    text: 'O: «espigas verdes tostadas al fuego, grano quebrado de la cosecha nueva».'
    reason: lexical_alternative
  revision_rationale: Se ajusta la frase final para reflejar con mayor precisión גֶּרֶשׂ כַּרְמֶל como una descripción del grano mismo ('granos triturados del grano fresco') en vez de la abstracción 'cosecha fresca'. Se mantiene el resto, que ya preservaba bien el sentido fuente, la terminología del proyecto y la legibilidad en español.
