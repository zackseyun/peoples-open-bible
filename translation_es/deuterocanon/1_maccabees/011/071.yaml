translation:
  language: es
  text: Y Jonatán rasgó sus vestidos, y echó tierra[a] sobre su cabeza[b], y oró.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Echar tierra o polvo sobre la cabeza era un signo habitual de dolor, angustia o lamento.
    reason: cultural_note
  - marker: b
    text: O «polvo sobre su cabeza». El griego dice literalmente «tierra» (γῆ), aunque en este contexto español también puede expresarse como «polvo».
    reason: lexical_alternative
lexical_decisions:
- source_word: διέρρηξεν
  english_pob_choice: tore
  chosen_spanish: rasgó
  alternatives_spanish:
  - rompió
  - desgarró
  lexicon: LSJ
  rationale: El verbo aoristo expresa el gesto de duelo de rasgar la ropa. «Rasgó» comunica bien la acción ritual en español sin sonar tan coloquial como «rompió» ni tan marcado como «desgarró».
- source_word: τὰ ἱμάτια αὐτοῦ
  english_pob_choice: his clothes
  chosen_spanish: sus vestidos
  alternatives_spanish:
  - sus ropas
  - sus prendas
  lexicon: LSJ
  rationale: ἱμάτια abarca prendas de vestir. «Vestidos» es una forma natural y reverente en español bíblico; evita reducir el alcance a una sola pieza de ropa.
- source_word: ἐπέθετο γῆν ἐπὶ τὴν κεφαλὴν αὐτοῦ
  english_pob_choice: put earth on his head
  chosen_spanish: echó tierra sobre su cabeza
  alternatives_spanish:
  - puso tierra sobre su cabeza
  - echó polvo sobre su cabeza
  lexicon: LSJ
  rationale: γῆ significa literalmente «tierra»; por eso se mantiene ese término en el texto principal. «Echó» reproduce de modo natural el gesto de poner o derramar algo sobre la cabeza en señal de duelo.
- source_word: προσηύξατο
  english_pob_choice: prayed
  chosen_spanish: oró
  alternatives_spanish:
  - oró a Dios
  - hizo oración
  lexicon: LSJ
  rationale: El aoristo medio de προσεύχομαι se traduce de forma directa con «oró». En español bíblico es claro y fiel sin añadir objeto explícito que el griego no da.
- source_word: Ἰωνάθαν
  english_pob_choice: Jonathan
  chosen_spanish: Jonatán
  alternatives_spanish:
  - Jonathan
  lexicon: tradición transliteratoria española
  rationale: Se usa la forma habitual en español bíblico «Jonatán», que es la adaptación estándar del nombre propio.
theological_decisions:
- issue: Señal de duelo al echar tierra sobre la cabeza
  english_pob_reading: Rendered the actions in straightforward narrative form without expanding their cultural meaning in the main text.
  chosen_spanish_reading: Se conserva la acción concreta sin explicar en el texto principal su valor cultural, dejando esa precisión para nota.
  alternative_spanish_readings:
  - Añadir «en señal de duelo» al texto principal
  - sustituir «tierra» por «polvo» para enfatizar el lamento
  rationale: El versículo narra gestos reconocibles de lamento. La versión española mantiene la secuencia simple del relato y no introduce una glosa interpretativa en el cuerpo del texto.
  doctrine_reference: Translation philosophy §§1, 6
translation_notes:
  revision_awareness: 'Coincide con la última revisión: no se requirieron cambios textuales respecto del seguimiento de auditoría. Se respetó la lectura griega directa y la decisión inglesa de mantener «earth» como término base, reflejándola en español con «tierra».'
  spanish_consistency_notes:
  - 'Se mantuvo la estructura narrativa simple: acción, gesto de duelo, oración.'
  - Se evitó el calco de «vestiduras» porque «vestidos» comunica bien ἱμάτια sin sobreformalidad.
  - Se conservó «tierra» en el texto principal para reflejar γῆ de manera más literal que «polvo», dejando la variante en nota.
