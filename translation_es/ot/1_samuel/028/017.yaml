base_translation:
  language: en
  yaml_path: translation/ot/1_samuel/028/017.yaml
  text: 'And Yahweh has done for you just as he spoke by my hand: Yahweh has torn the kingdom out of your hand and given it to your neighbor[b][a], to David.'
  footnotes:
  - marker: a
    text: 'Hebrew: ''has done for himself.'' Many translations read ''has done to you'' or ''for you,'' smoothing the sense toward Saul; the Masoretic Text here reads ''for him/for himself.'''
    reason: alternative_reading
  - marker: b
    text: Or 'just as he spoke through me.'
    reason: lexical_alternative
