revisions:
- from: Entonces Eliú, hijo de Barakel el buzita[a], de la familia de Ram, se encendió en ira contra Job; su ira se encendió porque se justificaba a sí mismo[b] más bien que a Dios.
  to: Entonces Eliú, hijo de Barakel el buzita, de la familia de Ram, se encendió de ira contra Job; su ira se encendió porque se justificó a sí mismo[a] en vez de a Dios.
  rationale: 'Se hicieron ajustes menores de estilo y precisión: se mejoró la naturalidad idiomática (''de ira''), se alineó mejor el aspecto verbal con la narración hebrea (''se justificó''), se suavizó una construcción comparativa rígida (''en vez de a Dios'') sin perder el contraste teológico, y se eliminó una nota redundante mientras se conservó la alternativa interpretativa importante documentada por la POB inglesa.'
