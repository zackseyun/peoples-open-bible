translation:
  language: es
  text: Entonces degollará el macho cabrío del sacrificio por el pecado, que es para el pueblo[a], y llevará su sangre dentro del velo, y hará con su sangre como hizo con la sangre del becerro; y la rociará sobre el propiciatorio y delante del propiciatorio.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, tradicionalmente, «propiciatorio».
    reason: lexical_alternative
lexical_decisions:
- source_word: וְשָׁחַט
  english_pob_choice: Then he shall slaughter
  chosen_spanish: Entonces degollará
  alternatives_spanish:
  - y degollará
  - entonces sacrificará
  lexicon: HALOT
  rationale: En este contexto ritual, שׁחט es degollar/abatir sacrificialmente. «Degollará» conserva el acto de muerte ritual sin borrar su concreción física. «Sacrificará» sería más interpretativo y menos preciso.
- source_word: שְׂעִיר הַחַטָּאת
  english_pob_choice: the goat of the sin offering
  chosen_spanish: el macho cabrío del sacrificio por el pecado
  alternatives_spanish:
  - el macho cabrío del sacrificio por el pecado
  - el macho cabrío de la ofrenda por el pecado
  lexicon: HALOT
  rationale: La relación de constructo indica el animal asociado a la ofrenda por el pecado. «Macho cabrío» distingue la especie y sugiere el macho adulto; «sacrificio por el pecado» mantiene la función ritual. «Ofrenda» es posible, pero «sacrificio» refleja mejor el campo cultual del pasaje.
- source_word: אֲשֶׁר לָעָם
  english_pob_choice: that is for the people
  chosen_spanish: que es para el pueblo
  alternatives_spanish:
  - que pertenece al pueblo
  - para el pueblo
  lexicon: HALOT
  rationale: La frase distingue este macho cabrío del becerro de Aarón. «Que es para el pueblo» conserva el valor relacional sin añadir pertenencia jurídica explícita que el hebreo no exige.
- source_word: וְהֵבִיא אֶת־דָּמוֹ
  english_pob_choice: and bring its blood
  chosen_spanish: y llevará su sangre
  alternatives_spanish:
  - y traerá su sangre
  - y conducirá su sangre
  lexicon: HALOT
  rationale: En español, «llevar» comunica bien la idea de introducir la sangre hacia el santuario interior. «Traerá» es posible, pero en este giro suena menos natural; «conducirá» resulta demasiado pesado.
- source_word: אֶל מִבֵּית לַפָּרֹכֶת
  english_pob_choice: inside the veil
  chosen_spanish: dentro del velo
  alternatives_spanish:
  - dentro del velo
  - al interior del velo
  - tras el velo
  lexicon: HALOT
  rationale: El hebreo apunta al espacio interior respecto del velo. «Dentro del velo» es claro y suficientemente literal en español; evita tanto la paráfrasis como un calco torpe.
- source_word: וְעָשָׂה אֶת־דָּמוֹ כַּאֲשֶׁר עָשָׂה לְדַם הַפָּר
  english_pob_choice: and do with its blood as he did with the blood of the bull
  chosen_spanish: y hará con su sangre como hizo con la sangre del becerro
  alternatives_spanish:
  - y hará con su sangre como hizo con la sangre del toro
  - y tratará su sangre como trató la sangre del becerro
  lexicon: HALOT
  rationale: El hebreo es elíptico; «hará con su sangre» reproduce la estructura de acción ritual. «Becerro» es la elección más natural para הַפָּר en este contexto de Levítico 16, donde el animal sacrificial previo es el de Aarón. «Toro» sería aceptable, pero menos específico aquí.
- source_word: הַפָּר
  english_pob_choice: the bull
  chosen_spanish: el becerro
  alternatives_spanish:
  - el toro
  - el novillo
  lexicon: HALOT
  rationale: Aunque el inglés POB usa 'bull', en este contexto levítico el referente sacrificial previo se expresa con naturalidad en español como «becerro». Mantiene la conexión ritual sin sobredimensionar el tamaño adulto que «toro» podría sugerir.
- source_word: וְהִזָּה אֹתוֹ
  english_pob_choice: and sprinkle it
  chosen_spanish: y la rociará
  alternatives_spanish:
  - y la asperjará
  - y la salpicará
  lexicon: HALOT
  rationale: En español litúrgico, «rociar» expresa bien el gesto sacrificial de נזה. «Asperjar» es muy técnico y «salpicar» suena demasiado coloquial. El objeto pronominal se refiere a la sangre.
- source_word: עַל הַכַּפֹּרֶת
  english_pob_choice: on the mercy seat
  chosen_spanish: sobre el propiciatorio
  alternatives_spanish:
  - sobre el asiento de misericordia
  - sobre la cubierta expiatoria
  lexicon: HALOT
  rationale: Se adopta «propiciatorio» como término tradicional y preciso para כַּפֹּרֶת en español bíblico. Aunque el audit trail inglés optó por una glosa más transparente, en español «propiciatorio» es la forma más estable y fiel en este registro.
- source_word: וְלִפְנֵי הַכַּפֹּרֶת
  english_pob_choice: and before the mercy seat
  chosen_spanish: y delante del propiciatorio
  alternatives_spanish:
  - y ante el propiciatorio
  - y frente al propiciatorio
  lexicon: HALOT
  rationale: לִפְנֵי indica posición delante/de frente a. «Delante de» conserva la relación espacial ritual y mantiene el paralelismo con «sobre».
theological_decisions:
- issue: Renderizar כַּפֹּרֶת sin oscurecer su función ritual ni imponer una sola tradición terminológica
  english_pob_reading: mercy seat
  chosen_spanish_reading: propiciatorio
  alternative_spanish_readings:
  - propiciatorio
  - sede de misericordia
  - cubierta del arca
  rationale: El inglés POB preserva una nota sobre la lectura tradicional 'mercy seat'. En español, «propiciatorio» es el término bíblico y teológico más establecido para la pieza del arca y su función en el Día de la Expiación. Evita una expresión explicativa demasiado larga y mantiene la tensión entre objeto físico y sentido cultual.
  doctrine_reference: Éxodo 25:17-22; Levítico 16; traducción POB §6
translation_notes:
  revision_awareness: El audit trail inglés muestra una revisión reciente que sustituyó 'atonement cover' por 'mercy seat' para la redacción final. He respetado esa decisión de superficie en el contenido semántico, pero en español he optado por el equivalente tradicional y técnico «propiciatorio», que corresponde mejor al uso bíblico castellano y preserva la función ritual del término hebreo.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como convención del proyecto solo cuando el texto lo requiera; este versículo no contiene el nombre divino.
  - Se usa «propiciatorio» de manera consistente para כַּפֹּרֶת dentro de este pasaje, con nota sobre la alternativa tradicional en inglés del POB.
  - 'Se conserva el paralelismo verbal del hebreo con dos acciones sucesivas: llevar la sangre y rociarla.'
  - «Becerro» se eligió para הַפָּר por coherencia contextual con el sacrificio de Aarón en Levítico 16, sin perder el sentido de animal bovino sacrificial.
