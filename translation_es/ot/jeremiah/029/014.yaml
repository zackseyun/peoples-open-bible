  to: Y me dejaré hallar por ustedes —declara Yahvé—, y restauraré su fortuna[a] y los reuniré de entre todas las naciones y de todos los lugares adonde los he expulsado, declara Yahvé, y los haré volver al lugar de donde los envié al exilio.
  rationale: 'La revisión corrige el problema principal de conformidad: mover la nota [a] a «restauraré su fortuna», que es la frase que realmente comenta. Además, se pulen dos expresiones para mejorar la naturalidad y precisión en español: «he expulsado» refleja bien el juicio de destierro, y «los envié al exilio» expresa con más claridad el sentido de הִגְלֵיתִי que la formulación más forzada «los hice ir al exilio». No se requieren cambios doctrinales ni adjudicación adicional.'
