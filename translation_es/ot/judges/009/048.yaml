translation:
  language: es
  text: 'Entonces Abimélec subió al monte Zalmón[a], él y todo el pueblo que estaba con él. Abimélec tomó las hachas en su mano, cortó un manojo de ramas[b], lo levantó y lo puso sobre su hombro. Luego dijo al pueblo que estaba con él: «Lo que me han visto hacer, apresúrense y hagan como yo he hecho».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O “monte Salmón”.
    reason: alternative_reading
  - marker: b
    text: O “una rama de árboles”, “un boscaje”, “una espesura de madera” o “un montón de ramaje”; el término hebreo es raro y se refiere a una masa de ramas o matorral.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּעַל
  english_pob_choice: went up
  chosen_spanish: subió
  alternatives_spanish:
  - ascendió
  - subió hacia
  lexicon: HALOT
  rationale: עלה en narrativa expresa movimiento ascendente; en español bíblico contemporáneo, «subió» es natural y conserva el sentido direccional sin volver la frase artificiosa.
- source_word: הַר צַלְמוֹן
  english_pob_choice: Mount Zalmon
  chosen_spanish: el monte Zalmón
  alternatives_spanish:
  - el monte Salmon
  - el monte Zalmon
  lexicon: HALOT
  rationale: El sustantivo común הַר con un nombre propio se vierte de forma natural como «el monte ...». Se translitera el topónimo; se mantiene «Zalmón» para reflejar la forma usual hispana del nombre.
- source_word: הוּא וְכָל־הָעָם אֲשֶׁר אִתּוֹ
  english_pob_choice: he and all the people who were with him
  chosen_spanish: él y todo el pueblo que estaba con él
  alternatives_spanish:
  - él y toda la gente que estaba con él
  - él y todos los que estaban con él
  lexicon: HALOT
  rationale: Se conserva la estructura enfática del hebreo con el pronombre explícito. «Pueblo» refleja bien עָם sin restringir innecesariamente a «hombres» o «tropas».
- source_word: הַקַּרְדֻּמּוֹת
  english_pob_choice: the axes
  chosen_spanish: los hachones
  alternatives_spanish:
  - los hachazos
  - las hachas
  lexicon: HALOT
  rationale: El término hebreo es plural y designa herramientas de corte. «Hachones» permite conservar el plural y sugiere herramientas de tala; «hachas» también sería posible, pero puede sonar más genérico o moderno que el contexto de cortar ramas.
- source_word: בְּיָדוֹ
  english_pob_choice: in his hand
  chosen_spanish: en su mano
  alternatives_spanish:
  - con su mano
  - en la mano
  lexicon: HALOT
  rationale: La preposición con «mano» conserva el matiz instrumental/posesivo del hebreo y enlaza bien con la secuencia de acciones.
- source_word: וַיִּכְרֹת שׂוֹכַת עֵצִים
  english_pob_choice: cut down a bundle of branches
  chosen_spanish: cortó un manojo de ramas
  alternatives_spanish:
  - cortó un bulto de ramas
  - cortó un conjunto de ramas
  - cortó un boscaje
  lexicon: HALOT
  rationale: שׂוֹכָה es un término raro para una masa de ramas, boughs o brushwood. «Manojo de ramas» comunica bien algo atado/compacto y transportable sin añadir una idea ajena como «árboles» en español.
- source_word: וַיִּשָּׂאֶהָ
  english_pob_choice: lifted it
  chosen_spanish: lo levantó
  alternatives_spanish:
  - lo alzó
  - lo cargó
  lexicon: HALOT
  rationale: נשא aquí es el paso previo a colocar el objeto sobre el hombro; «lo levantó» mantiene el movimiento sin adelantar el sentido de carga.
- source_word: וַיָּשֶׂם עַל שִׁכְמוֹ
  english_pob_choice: put it on his shoulder
  chosen_spanish: lo puso sobre su hombro
  alternatives_spanish:
  - lo colocó sobre su hombro
  - lo puso en su hombro
  lexicon: HALOT
  rationale: La expresión idiomática se vierte de manera directa y clara en español, preservando la imagen física del hebreo.
- source_word: מָה רְאִיתֶם עָשִׂיתִי
  english_pob_choice: What you have seen me do
  chosen_spanish: Lo que me han visto hacer
  alternatives_spanish:
  - Lo que ustedes me han visto hacer
  - Lo que vieron que hice
  lexicon: HALOT
  rationale: El hebreo es compacto y exige cierta naturalización en español. Esta formulación conserva el valor de ejemplo observado por los oyentes y evita una construcción demasiado literal o torpe.
- source_word: מַהֲרוּ
  english_pob_choice: hurry
  chosen_spanish: apresúrense
  alternatives_spanish:
  - dense prisa
  - rápido
  lexicon: HALOT
  rationale: El imperativo plural exige un verbo en español. «Apresúrense» mantiene el tono urgente y la referencia directa a varios destinatarios.
- source_word: עֲשׂוּ כָמוֹנִי
  english_pob_choice: do as I have done
  chosen_spanish: hagan como yo he hecho
  alternatives_spanish:
  - hagan lo mismo que yo
  - háganlo como yo
  lexicon: HALOT
  rationale: El sentido del hebreo es imitativo y toma como norma la acción recién vista. «Como yo he hecho» explicita la comparación implícita sin perder fidelidad.
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión más reciente del inglés POB, que prefirió «a bundle of branches» frente a «a branch of trees» para reflejar mejor שׂוֹכַת עֵצִים. La redacción española adopta esa misma decisión semántica con «un manojo de ramas», manteniendo la secuencia verbal y la claridad narrativa.
  spanish_consistency_notes:
  - Se mantiene «Abimélec» como forma hispana estable del nombre propio, coherente con el registro bíblico en español.
  - Se usa «monte» para el topónimo montañoso, y no una paráfrasis geográfica.
  - 'Se preserva el paralelismo narrativo de acciones encadenadas: subir, tomar, cortar, levantar, poner y hablar.'
  - «Pueblo» traduce עָם de manera amplia, sin restringir indebidamente el grupo.
  - La nota sobre el término raro שׂוֹכַת עֵצִים se conserva porque la expresión tiene un rango semántico amplio y el español también admite más de una solución.
