translation:
  language: es
  text: y mantengan con vida a mi padre y a mi madre[a], a mis hermanos y a mis hermanas, y a todos los que les pertenecen[b]; y libren nuestras vidas de la muerte.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «dejen vivir a mi padre y a mi madre ... y rescátennos de la muerte».'
    reason: lexical_alternative
  - marker: b
    text: La frase probablemente se refiere al resto de su casa o a sus dependientes; algunos la vierten más ampliamente como «todo lo que les pertenece» o «todo lo que tienen».
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהַחֲיִתֶם
  english_pob_choice: keep alive
  chosen_spanish: mantengan con vida
  alternatives_spanish:
  - dejen vivir
  - conserven con vida
  - mantengan vivos
  lexicon: HALOT
  rationale: El verbo hifil de חיה expresa causar que viva o mantener con vida. En español, «mantengan con vida» comunica bien la acción causativa y suena natural en un ruego solemne.
- source_word: אָבִי ... אִמִּי ... אַחַי ... אחותי
  english_pob_choice: my father and my mother, and my brothers and my sisters
  chosen_spanish: mi padre y mi madre, a mis hermanos y a mis hermanas
  alternatives_spanish:
  - mi padre, mi madre, mis hermanos y mis hermanas
  - mi padre y mi madre, y mis hermanos y hermanas
  lexicon: HALOT
  rationale: Se conserva la secuencia de parentescos del hebreo y el énfasis individual de cada miembro de la familia. «Hermanas» se mantiene en plural, como en el sentido colectivo del contexto.
- source_word: כָּל אֲשֶׁר לָהֶם
  english_pob_choice: all who belong to them
  chosen_spanish: todo lo que les pertenece
  alternatives_spanish:
  - todos los que les pertenecen
  - todo lo suyo
  - todo lo que tienen
  lexicon: HALOT
  rationale: La frase hebrea puede abarcar personas y bienes; el contexto de rescate de una casa permite una referencia amplia. «Todo lo que les pertenece» conserva esa amplitud sin limitarla solo a posesiones ni forzar exclusivamente a dependientes.
- source_word: וְהִצַּלְתֶּם
  english_pob_choice: deliver
  chosen_spanish: libren
  alternatives_spanish:
  - rescaten
  - salven
  - liberen
  lexicon: HALOT
  rationale: נצל en hifil significa librar o rescatar. «Libren» conserva el tono formal y el valor de sacar de peligro, sin cargar de más el español religioso de «salven».
- source_word: נַפְשֹׁתֵינוּ
  english_pob_choice: our lives
  chosen_spanish: nuestras vidas
  alternatives_spanish:
  - nuestras almas
  - a nosotros
  - nuestras personas
  lexicon: HALOT
  rationale: נפש aquí designa vida/persona en peligro mortal, no una entidad inmaterial. «Nuestras vidas» refleja bien el sentido concreto del hebreo.
- source_word: מִמָּוֶת
  english_pob_choice: from death
  chosen_spanish: de la muerte
  alternatives_spanish:
  - de morir
  - de muerte
  lexicon: HALOT
  rationale: La preposición con muerte se vierte de manera directa y solemne como «de la muerte», preservando la fuerza de la amenaza.
translation_notes:
  revision_awareness: El borrador sigue de cerca el último ajuste del POB en inglés, que prefirió «keep alive» por mayor precisión causal frente a «let ... live». En español se reflejó con «mantengan con vida», manteniendo además la distinción entre «deliver» y «save» mediante «libren».
  spanish_consistency_notes:
  - Se evitó «SEÑOR» o referencias teológicas ajenas al texto, porque este versículo no contiene el Nombre divino ni citas explícitas.
  - Se prefirió «vidas» para נַפְשֹׁתֵינוּ, en línea con el valor concreto de nefesh en contexto de peligro mortal.
  - Se mantuvo un registro formal pero natural, apto para lectura eclesial contemporánea.
