translation:
  language: es
  text: Y ahora he oído que tienes esquiladores. Ahora tus pastores, que estaban con nosotros, no los avergonzamos[a], y no les faltó nada todos los días que estuvieron en Carmel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, más literalmente, «no los avergonzamos». El hebreo puede denotar causar vergüenza o deshonra; en este contexto se refiere a no dañarlos ni abusar de ellos.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְעַתָּה
  english_pob_choice: And now
  chosen_spanish: Y ahora
  alternatives_spanish:
  - Ahora
  lexicon: HALOT
  rationale: Conserva el giro discursivo de apertura y la transición temporal inmediata sin endurecer el español.
- source_word: שָׁמַעְתִּי
  english_pob_choice: I have heard
  chosen_spanish: he oído
  alternatives_spanish:
  - he escuchado
  - oí
  lexicon: HALOT
  rationale: El perfecto español expresa bien la relevancia presente del informe recibido en el discurso directo.
- source_word: כִּי גֹזְזִים לָךְ
  english_pob_choice: that you have shearers
  chosen_spanish: que tienes esquiladores
  alternatives_spanish:
  - que están esquilando para ti
  - que tus ovejas están siendo esquiladas
  lexicon: HALOT
  rationale: El participio apunta al tiempo de esquila de Nabal; 'esquiladores' comunica de forma natural el evento sin perder el referente pastoral.
- source_word: עַתָּה
  english_pob_choice: Now
  chosen_spanish: Ahora
  alternatives_spanish:
  - En este momento
  lexicon: HALOT
  rationale: Mantiene la segunda marca discursiva como aplicación inmediata del dato recién mencionado.
- source_word: הָרֹעִים אֲשֶׁר לְךָ
  english_pob_choice: your shepherds
  chosen_spanish: tus pastores
  alternatives_spanish:
  - los pastores que son tuyos
  - los pastores que te pertenecen
  lexicon: HALOT
  rationale: '''Pastores'' es la forma natural en español para el oficio pastoril; la relación posesiva se conserva con ''tus''.'
- source_word: הָיוּ עִמָּנוּ
  english_pob_choice: who were with us
  chosen_spanish: que estaban con nosotros
  alternatives_spanish:
  - que estuvieron con nosotros
  - que permanecieron con nosotros
  lexicon: HALOT
  rationale: '''Estaban con nosotros'' refleja la convivencia o acompañamiento sin añadir matices de duración no explícitos.'
- source_word: לֹא הֶכְלַמְנוּם
  english_pob_choice: we did not dishonor them
  chosen_spanish: no los avergonzamos
  alternatives_spanish:
  - no los deshonramos
  - no los humillamos
  lexicon: HALOT
  rationale: El verbo hebreo puede denotar causar vergüenza o deshonra; 'avergonzamos' mantiene más de cerca la raíz de 'vergüenza' y preserva la tensión lexical.
- source_word: וְלֹא נִפְקַד לָהֶם מְאוּמָה
  english_pob_choice: and nothing was missing to them
  chosen_spanish: y no les faltó nada
  alternatives_spanish:
  - y nada les faltó
  - y ninguna cosa les faltó
  lexicon: HALOT
  rationale: Expresa en español natural la idea pasiva de carencia o ausencia de pérdida, sin añadir objeto posesivo implícito.
- source_word: כָּל יְמֵי הֱיוֹתָם
  english_pob_choice: all the days they were
  chosen_spanish: todos los días que estuvieron
  alternatives_spanish:
  - durante todos los días que estuvieron
  - mientras estuvieron
  lexicon: HALOT
  rationale: Conserva el idiomático temporal hebreo con una construcción clara y fluida en español.
- source_word: בַּכַּרְמֶל
  english_pob_choice: in Carmel
  chosen_spanish: en Carmel
  alternatives_spanish:
  - en el Carmelo
  lexicon: HALOT
  rationale: Se mantiene el nombre propio del lugar; 'Carmel' evita confusión con el término común y sigue de cerca el topónimo del texto.
translation_notes:
  revision_awareness: 'El borrador sigue de cerca la revisión final del POB en inglés: usa una equivalencia más cercana para הֶכְלַמְנוּם como ‘no los avergonzamos’, pero mantiene una expresión española natural para נִפְקַד לָהֶם מְא֔וּמָה como ‘no les faltó nada’. También conserva la repetición retórica de עַתָּה con ‘Ahora’ para reflejar el impulso del discurso.'
  spanish_consistency_notes:
  - Se usa ‘Yahvé’ solo cuando el versículo lo requiera; aquí no aparece el tetragrámaton.
  - Se mantiene ‘Carmel’ como topónimo propio, no como ‘el Carmelo’, para no introducir una ambigüedad léxica no presente en el contexto.
  - Se preserva la tensión entre ‘avergonzar’ y ‘deshonrar’ mediante nota, porque el hebreo puede abarcar ambas ideas y el contexto apunta a trato protector más que a mera etiqueta social.
