translation:
  language: es
  text: 'y el resto de los pueblos que el gran y noble Osnappar deportó y estableció en la ciudad de Samaria[a], y al resto que estaba en Más Allá del Río[b], y ahora[c]:'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Osnappar suele identificarse con el rey asirio Asurbanipal, pero aquí se conserva la forma aramea del nombre transmitida por el texto.
    reason: cross_reference
  - marker: b
    text: ‘Más Allá del Río’ traduce el término administrativo persa para la región al occidente del Éufrates.
    reason: cultural_note
  - marker: c
    text: Fórmula epistolar aramea; también puede entenderse como ‘y así sucesivamente’ o ‘en este momento’.
    reason: lexical_alternative
lexical_decisions:
- source_word: שְׁאָר
  english_pob_choice: the rest
  chosen_spanish: el resto
  alternatives_spanish:
  - lo restante
  - los demás
  lexicon: HALOT
  rationale: En este contexto listativo, expresa bien el grupo remanente de personas mencionado antes; mantiene la continuidad sin añadir matices no presentes en el arameo.
- source_word: אֻמַּיָּא
  english_pob_choice: the peoples
  chosen_spanish: los pueblos
  alternatives_spanish:
  - las naciones
  - los grupos étnicos
  lexicon: HALOT
  rationale: ‘Pueblos’ conserva el sentido colectivo humano/étnico del término en arameo imperial y es natural en español bíblico moderno.
- source_word: דִּי
  english_pob_choice: whom
  chosen_spanish: que
  alternatives_spanish:
  - a quienes
  - los cuales
  lexicon: HALOT
  rationale: La partícula relativa aquí introduce la cláusula modificando ‘los pueblos’; en español, ‘que’ es la forma más natural y fiel en una relativa especificativa.
- source_word: הַגְלִי
  english_pob_choice: deported
  chosen_spanish: deportó
  alternatives_spanish:
  - desterró
  - llevó al exilio
  lexicon: HALOT
  rationale: ‘Deportó’ reproduce la acción de traslado forzado propia de una política imperial, como en el inglés POB, y evita diluir la fuerza histórica del verbo.
- source_word: אָסְנַפַּר
  english_pob_choice: Osnappar
  chosen_spanish: Osnappar
  alternatives_spanish:
  - Asurbanipal
  lexicon: HALOT
  rationale: Se conserva la forma aramea del nombre en el texto principal; la identificación histórica con Asurbanipal queda como posible referencia, no como sustitución del nombre transmitido.
- source_word: רַבָּא וְיַקִּירָא
  english_pob_choice: the great and noble
  chosen_spanish: el grande y noble
  alternatives_spanish:
  - el grande y honorable
  - el grande y ilustre
  lexicon: HALOT
  rationale: Los adjetivos funcionan como honores cortesanos. ‘Grande y noble’ mantiene el tono elevado y sigue de cerca la expresión del texto fuente.
- source_word: וְהוֹתֵב
  english_pob_choice: settled
  chosen_spanish: estableció
  alternatives_spanish:
  - asentó
  - hizo habitar
  lexicon: HALOT
  rationale: El causativo indica acción administrativa de reubicación; ‘estableció’ transmite con claridad el asentamiento impuesto, sin sonar rígido en español.
- source_word: הִמּוֹ
  english_pob_choice: them
  chosen_spanish: los
  alternatives_spanish:
  - a ellos
  - a esos pueblos
  lexicon: HALOT
  rationale: El pronombre retoma a los pueblos deportados; en español, el objeto directo masculino plural ‘los’ es suficiente y conciso.
- source_word: בְּקִרְיָה דִּי שָׁמְרָיִן
  english_pob_choice: in the city of Samaria
  chosen_spanish: en la ciudad de Samaria
  alternatives_spanish:
  - en Samaria, ciudad
  - en las ciudades de Samaria
  lexicon: HALOT
  rationale: La forma singular ‘ciudad’ refleja el texto consonántico y coincide con el criterio del audit trail inglés de preservar la singularidad presente.
- source_word: עֲבַר נַהֲרָה
  english_pob_choice: Beyond the River
  chosen_spanish: Más Allá del Río
  alternatives_spanish:
  - allende el río
  - Transrío
  lexicon: HALOT
  rationale: Se conserva como nombre administrativo persa mediante mayúsculas, siguiendo el valor propio señalado en el inglés POB. ‘Más Allá del Río’ es transparente y comprensible en español.
- source_word: וּכְעֶנֶת
  english_pob_choice: 'and now:'
  chosen_spanish: 'y ahora:'
  alternatives_spanish:
  - 'y entonces:'
  - 'y así:'
  - etc.
  lexicon: HALOT
  rationale: Es una fórmula epistolar aramea que introduce el cuerpo de la carta. ‘Y ahora:’ preserva la función discursiva señalada por el audit trail inglés sin expandirla más de lo debido.
theological_decisions:
- issue: Designación administrativa persa 'Beyond the River' / 'Más Allá del Río'
  english_pob_reading: Beyond the River as a Persian administrative term for the region west of the Euphrates.
  chosen_spanish_reading: Más Allá del Río como término administrativo persa, no solo como descripción geográfica.
  alternative_spanish_readings:
  - allende el río
  - al otro lado del río
  - Trans-Eufrates
  rationale: La expresión funciona como nombre de provincia/satrapía en el contexto imperial. Mantenerla con mayúsculas evita reducirla a una simple indicación espacial y conserva el valor histórico-administrativo del texto.
  doctrine_reference: Contexto histórico-administrativo de los libros de Esdras/Nehemías; uso de topónimos imperiales en la historiografía bíblica
translation_notes:
  revision_awareness: El audit trail inglés revisó la cláusula final para conservar mejor la repetición locativa (‘and in the rest of Beyond the River’). La versión española refleja esa duplicación con ‘y el resto de Más Allá del Río’, manteniendo la locución administrativa y la transición epistolar final.
  spanish_consistency_notes:
  - Se conserva ‘Yahvé’ por norma del proyecto, pero este versículo no contiene el nombre divino.
  - ‘Osnappar’ permanece sin sustituir por la identificación histórica, siguiendo la pauta del texto base.
  - Se eligió ‘pueblos’ y no ‘naciones’ para preservar el matiz colectivo étnico sin sobredeterminarlo políticamente.
  - ‘Más Allá del Río’ se capitaliza como término propio administrativo, coherente con el inglés POB.
  - La puntuación con dos puntos al final de ‘y ahora:’ refleja la función de fórmula de transición del arameo.
