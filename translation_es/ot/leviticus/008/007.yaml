base_translation:
  language: en
  yaml_path: translation/ot/leviticus/008/007.yaml
  text: And he put the tunic on him[a], and girded him with the sash, and clothed him with the robe, and put the ephod on him, and girded him with the skillfully woven band of the ephod[b], and bound it to him with it.
  footnotes:
  - marker: a
    text: Or 'the decorated band of the ephod' or 'the waistband of the ephod.'
    reason: lexical_alternative
  - marker: b
    text: The Hebrew verb here likely means that the ephod was secured to Aaron by means of its woven band.
    reason: cultural_note
