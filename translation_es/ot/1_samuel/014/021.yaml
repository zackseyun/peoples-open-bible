translation:
  language: es
  text: Ahora bien, los hebreos que antes habían estado con los filisteos[a], que habían subido con ellos al campamento de los alrededores[c], hasta ellos también vinieron a estar con Israel[b], los que estaban con Saúl y Jonatán.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebreo literalmente, «como ayer, anteayer», un modismo que significa «antes» o «anteriormente».
    reason: lexical_alternative
  - marker: b
    text: O «vinieron a estar con Israel»; el hebreo dice «estar con Israel», lo que sugiere un cambio de lealtad.
    reason: alternative_reading
  - marker: c
    text: La frase «al campamento de los alrededores» representa un hebreo difícil; probablemente se refiere a los hebreos que habían acompañado a los filisteos en su campamento en la zona circundante.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהָעִבְרִים
  english_pob_choice: Now the Hebrews
  chosen_spanish: Ahora bien, los hebreos
  alternatives_spanish:
  - Y los hebreos
  - Los hebreos
  lexicon: HALOT
  rationale: Conservo «hebreos» porque el hebreo usa עִבְרִים, que nombra a este grupo de forma social o externa, no simplemente «israelitas». «Ahora bien» reproduce con naturalidad la función narrativa del וְ inicial en español.
- source_word: הָיוּ לַפְּלִשְׁתִּים
  english_pob_choice: had previously been with the Philistines
  chosen_spanish: habían estado con los filisteos
  alternatives_spanish:
  - estaban con los filisteos
  - pertenecían a los filisteos
  lexicon: HALOT
  rationale: «Estar con» refleja la relación/alineación expresada por לַפְּלִשְׁתִּים sin forzar pertenencia. El pluscuamperfecto en español ayuda a expresar que esa situación era anterior al cambio narrado.
- source_word: כְּאֶתְמוֹל שִׁלְשׁוֹם
  english_pob_choice: previously
  chosen_spanish: habían estado
  alternatives_spanish:
  - antes
  - antiguamente
  - como ayer y anteayer
  lexicon: HALOT
  rationale: La locución hebrea es idiomática y literalmente alude a «ayer, anteayer». En español, el valor temporal ya queda suficientemente expresado por el contexto y el pluscuamperfecto; por eso no se añade una glosa literal en el texto principal.
- source_word: אֲשֶׁר עָלוּ עִמָּם
  english_pob_choice: who had gone up with them
  chosen_spanish: que habían subido con ellos
  alternatives_spanish:
  - que subieron con ellos
  - que habían ido con ellos
  lexicon: HALOT
  rationale: «Subir» conserva el verbo hebreo עלה, frecuente con sentido de desplazamiento. «Con ellos» mantiene la referencia a los filisteos y a su movimiento conjunto.
- source_word: בַּמַּחֲנֶה סָבִיב
  english_pob_choice: into the camp all around
  chosen_spanish: al campamento alrededor
  alternatives_spanish:
  - en el campamento alrededor
  - al campamento que rodeaba el lugar
  - al campamento, por todas partes
  lexicon: HALOT
  rationale: La construcción es difícil. Opto por una solución sobria que preserve la idea espacial sin explicar de más. «Al campamento alrededor» mantiene la rareza del hebreo mejor que una paráfrasis extensa.
- source_word: וְגַם הֵמָּה
  english_pob_choice: even they also
  chosen_spanish: aun ellos también
  alternatives_spanish:
  - ellos también
  - incluso ellos
  lexicon: HALOT
  rationale: La combinación refuerza inclusión enfática. «Aun ellos también» conserva ese valor sin sonar excesivamente coloquial.
- source_word: לִהְיוֹת עִם יִשְׂרָאֵל
  english_pob_choice: came to be with Israel
  chosen_spanish: vinieron a estar con Israel
  alternatives_spanish:
  - llegaron a estar con Israel
  - vinieron a ser parte de Israel
  - se pusieron con Israel
  lexicon: HALOT
  rationale: El infinitivo «ser/estar con» sugiere un cambio de bando o alineación. «Vinieron a estar» refleja el giro sin imponer una lectura más interpretativa como «se unieron». El matiz de transición queda preservado.
- source_word: אֲשֶׁר עִם שָׁאוּל וְיוֹנָתָן
  english_pob_choice: who were with Saul and Jonathan
  chosen_spanish: los que estaban con Saúl y Jonatán
  alternatives_spanish:
  - que estaban con Saúl y Jonatán
  - quienes estaban con Saúl y Jonatán
  lexicon: HALOT
  rationale: 'El relativo final aclara qué Israel se tiene en vista: los que estaban alineados con Saúl y Jonatán. En español, «los que» hace esa referencia más clara y natural que un relativo más abstracto.'
theological_decisions:
- issue: Cambio de lealtad/alineación implícito en לִהְיוֹת עִם יִשְׂרָאֵל
  english_pob_reading: came to be with Israel, implying a shift of allegiance
  chosen_spanish_reading: vinieron a estar con Israel
  alternative_spanish_readings:
  - se pasaron a Israel
  - se unieron a Israel
  - pasaron a estar con Israel
  rationale: Mantengo la idea de transición sin convertirla en una paráfrasis más fuerte de lo que el hebreo dice. La frase española conserva la tensión entre mera presencia y cambio de bando que el contexto sugiere.
  doctrine_reference: N/A (narrative allegiance shift)
- issue: Identificación de «Israel» en el cierre como grupo vinculado a Saúl y Jonatán
  english_pob_reading: who were with Saul and Jonathan
  chosen_spanish_reading: los que estaban con Saúl y Jonatán
  alternative_spanish_readings:
  - el Israel que estaba con Saúl y Jonatán
  - los israelitas que estaban con Saúl y Jonatán
  rationale: El hebreo delimita el referente por la cláusula final. La versión española deja claro que no se trata de todo Israel indiscriminadamente, sino del grupo asociado con Saúl y Jonatán en ese momento.
  doctrine_reference: N/A (referential clarity)
translation_notes:
  revision_awareness: 'La redacción sigue de cerca el sentido final del texto hebreo y el audit trail inglés: se conserva la referencia social «hebreos», la relación previa con los filisteos, la dificultad espacial de «al campamento alrededor», y el matiz de transición en «vinieron a estar con Israel». Se evita una mecanización del inglés, pero también una paráfrasis que suavice la tensión del original.'
  spanish_consistency_notes:
  - Se usa «Yahvé» en lugar de «SEÑOR» cuando aparezca el nombre divino, conforme al estándar del proyecto; no aplica en este versículo.
  - Se mantiene «filisteos», «Saúl» y «Jonatán» como formas estándar en español bíblico.
  - «Hebreos» se conserva como etnónimo distinto de «israelitas», acorde con el hebreo עִבְרִים.
  - La construcción «vinieron a estar» refleja una transición sin sobreinterpretarla como una conversión o adhesión formal explícita.
