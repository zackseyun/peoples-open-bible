translation:
  language: es
  text: Porque comerás el trabajo de tus manos[a]; bienaventurado eres[b], y te irá bien.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literalmente, «el trabajo de tus manos».
    reason: lexical_alternative
  - marker: b
    text: O «dichoso eres».
    reason: lexical_alternative
lexical_decisions:
- source_word: יְגִיעַ
  english_pob_choice: labor
  chosen_spanish: trabajo
  alternatives_spanish:
  - fatiga
  - esfuerzo
  - fruto del trabajo
  lexicon: HALOT
  rationale: El sustantivo alude al producto o resultado del esfuerzo humano, con la idea de algo ganado con trabajo. En español, "trabajo de tus manos" conserva la imagen concreta sin sonar forzado; "fruto" expresaría bien la idea, pero el audit trail inglés revisado prefirió una formulación más cercana al hebreo.
- source_word: כַּפֶּיךָ
  english_pob_choice: your hands
  chosen_spanish: de tus manos
  alternatives_spanish:
  - de tus palmas
  - hecho por ti
  lexicon: HALOT
  rationale: 'El hebreo dice literalmente "de tus manos/palmas". Se conserva la referencia corporal en español con una construcción natural: "el trabajo de tus manos".'
- source_word: כִּי
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  - Cuando
  lexicon: HALOT
  rationale: Aquí la conjunción introduce la base o razón de la bienaventuranza; "Porque" comunica bien ese valor explicativo en español.
- source_word: תֹאכֵל
  english_pob_choice: you will eat
  chosen_spanish: comerás
  alternatives_spanish:
  - comerás de
  - comerás y disfrutarás
  lexicon: HALOT
  rationale: Se mantiene el verbo concreto de comer en futuro, siguiendo la imagen hebrea de disfrutar el fruto del propio trabajo.
- source_word: אַשְׁרֶיךָ
  english_pob_choice: blessed are you
  chosen_spanish: dichoso eres
  alternatives_spanish:
  - bienaventurado eres
  - feliz eres
  - afortunado eres
  lexicon: HALOT
  rationale: El término de beatitud puede significar feliz/dichoso/afortunado, pero "dichoso" preserva bien el tono sapiencial sin perder naturalidad en español. Se evita imponer una fórmula litúrgica si no es necesaria.
- source_word: וְטוֹב לָךְ
  english_pob_choice: it will be well with you
  chosen_spanish: te irá bien
  alternatives_spanish:
  - te irá bien a ti
  - será para tu bien
  - te irá en bien
  lexicon: HALOT
  rationale: La frase expresa bienestar y buen resultado. "Te irá bien" es idiomático en español y mantiene el sentido de prosperidad/florecimiento personal.
theological_decisions:
- issue: 'Beatitud sapiencial: blessed vs. happy/dichoso'
  english_pob_reading: blessed are you
  chosen_spanish_reading: dichoso eres
  alternative_spanish_readings:
  - bienaventurado eres
  - feliz eres
  - afortunado eres
  rationale: En este contexto sapiencial, el término no describe solo un estado emocional, sino una condición de favor y florecimiento bajo la bendición divina. "Dichoso" conserva ese rango semántico sin volver la frase artificial en español.
  doctrine_reference: Translation philosophy §§1, 6
- issue: Imagen concreta de sustento ganado por el propio trabajo
  english_pob_reading: the labor of your hands
  chosen_spanish_reading: el trabajo de tus manos
  alternative_spanish_readings:
  - la labor de tus manos
  - el fruto de tu trabajo
  - lo que has trabajado
  rationale: La revisión inglesa más reciente priorizó la cercanía al hebreo y mantuvo la imagen de las manos. El español conserva esa concreción y no la sustituye por una abstracción más interpretativa.
  doctrine_reference: Source transparency and lexical audibility
translation_notes:
  revision_awareness: La versión inglesa auditada fue revisada desde «the fruit of your labor» a «the labor of your hands» para acercarse más al hebreo. El español sigue esa decisión al conservar la imagen concreta de las manos, sin expandirla a una paráfrasis más libre.
  spanish_consistency_notes:
  - Se usó «Yahvé» como terminología general del proyecto, pero este versículo no contiene el tetragrámaton.
  - 'Se mantuvo el paralelismo hebreo con dos miembros: sustento propio y bienaventuranza/florecimiento.'
  - «Dichoso» evita una traducción excesivamente eclesiástica y deja abierta la cercanía con «bienaventurado» indicada en la nota.
