translation:
  language: es
  text: ¿Qué haréis en el día de la asamblea señalada[a], y en el día de la fiesta de Yahvé?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «tiempo señalado» o «fiesta» para «asamblea señalada». El hebreo מוֹעֵד puede referirse de manera amplia a un tiempo fijado o, de forma específica, a una convocatoria sagrada.
    reason: lexical_alternative
lexical_decisions:
- source_word: מַה
  english_pob_choice: What
  chosen_spanish: ¿Qué
  alternatives_spanish:
  - ¿Cómo?
  lexicon: HALOT
  rationale: Interrogativo directo que introduce una pregunta retórica; «¿Qué» es la forma natural y fiel en español.
- source_word: תַּעֲשׂוּ
  english_pob_choice: will you do
  chosen_spanish: haréis
  alternatives_spanish:
  - harán ustedes
  - van a hacer
  lexicon: HALOT
  rationale: El imperfecto en contexto futuro se expresa de manera natural con «haréis»; conserva la fuerza prospectiva de la pregunta.
- source_word: לְיוֹם מוֹעֵד
  english_pob_choice: on the day of appointed assembly
  chosen_spanish: en el día de la reunión señalada
  alternatives_spanish:
  - en el día de la cita señalada
  - en el día de la asamblea señalada
  - en el día del tiempo señalado
  lexicon: HALOT
  rationale: מוֹעֵד puede ser «tiempo señalado» o una reunión/santa convocatoria. Aquí, por el paralelismo con la fiesta y el contexto cultual, «reunión señalada» preserva la idea de ocasión sagrada sin reducirla solo a tiempo abstracto.
- source_word: חַג
  english_pob_choice: the feast
  chosen_spanish: la fiesta
  alternatives_spanish:
  - la fiesta solemne
  - el festival
  lexicon: HALOT
  rationale: «Fiesta» comunica bien el sentido cultual y es natural en español. Mantiene la distinción con מוֹעֵד, que ya fue vertido como «reunión señalada».
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  lexicon: HALOT
  rationale: Se preserva el nombre divino con la forma española de uso común en este proyecto, conforme a la decisión doctrinal de no sustituir el Tetragrámaton por un título.
theological_decisions:
- issue: Distinción entre מוֹעֵד y חַג
  english_pob_reading: '''appointed assembly'' and ''feast'' are distinguished'
  chosen_spanish_reading: «reunión señalada» y «fiesta» se distinguen
  alternative_spanish_readings:
  - «fiesta» y «fiesta»
  - «tiempo señalado» y «fiesta»
  rationale: El hebreo usa dos términos cultuales relacionados pero no idénticos. En español conviene mantener la diferencia para no aplanar el paralelismo ni perder el matiz de convocatoria sagrada.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #5: Consistency of key terms, or documented exception'
- issue: Representación del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - el SEÑOR
  rationale: Se conserva el nombre propio divino en vez de reemplazarlo por un título. «Yahvé» es la forma española establecida en el marco terminológico del proyecto.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
translation_notes:
  revision_awareness: La revisión más reciente no introdujo cambios; el texto coincide con el acuerdo alto del control cruzado y mantiene la distinción cultual del hebreo sin cambios necesarios adicionales.
  spanish_consistency_notes:
  - Se usó «Yahvé» en el texto principal para el Tetragrámaton, de acuerdo con la terminología del proyecto.
  - «Reunión señalada» conserva el matiz cultual de מוֹעֵד sin confundirlo con חַג, vertido como «fiesta».
  - La pregunta retórica se expresó con futuro simple («haréis») para reflejar el valor prospectivo del hebreo.
