  text: 'so that the crowd marveled as they saw the mute speaking, the crippled made well, the lame walking, and the blind seeing; and they glorified the God of Israel.'
translation:
  language: ko
  text: '그래서 무리는 말 못 하는 자들이 말하고, 손발 굽은 자들이 온전해지고, 다리 저는 자들이 걷고, 눈먼 자들이 보는 것을 보고 놀랐습니다. 그리고 그들은 이스라엘의 하나님께 영광을 돌렸습니다.'
