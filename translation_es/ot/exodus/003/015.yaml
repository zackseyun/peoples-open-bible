translation:
  language: es
  text: 'Dios también dijo a Moisés: «Así dirás a los hijos de Israel: Yahvé[a], el Dios de sus padres, el Dios de Abraham, el Dios de Isaac y el Dios de Jacob, me ha enviado a ustedes. Este es mi nombre para siempre, y este es mi memorial[b] de generación en generación».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «YHWH».'
    reason: source_note
  - marker: b
    text: 'O: «mi recuerdo», o «el nombre por el cual soy recordado».'
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  - el SEÑOR
  lexicon: HALOT
  rationale: Se mantiene el nombre propio divino del Tetragrámaton y se adapta a la forma española ya establecida en el proyecto. No se sustituye por un título como «el SEÑOR», porque el texto subraya el nombre revelado, no un simple apelativo.
- source_word: בְּנֵי יִשְׂרָאֵל
  english_pob_choice: the sons of Israel
  chosen_spanish: los hijos de Israel
  alternatives_spanish:
  - los hijos varones de Israel
  - los israelitas
  - el pueblo de Israel
  lexicon: HALOT
  rationale: El hebreo es literalmente masculino plural. «Hijos de Israel» conserva la forma del original y el tono bíblico sin cambiar a una abstracción colectiva que atenúe la referencia formal.
- source_word: אֱלֹהֵי אֲבֹתֵיכֶם
  english_pob_choice: the God of your fathers
  chosen_spanish: el Dios de sus padres
  alternatives_spanish:
  - el Dios de sus antepasados
  lexicon: HALOT
  rationale: «Padres» refleja el sustantivo hebreo explícito y sigue el criterio del POB de mantener la expresión masculina representativa cuando el contexto no exige una neutralización.
- source_word: שְׁלָחַנִי
  english_pob_choice: has sent me
  chosen_spanish: me ha enviado
  alternatives_spanish:
  - me envió
  lexicon: HALOT
  rationale: El perfecto hebreo se vierte con perfecto compuesto español para expresar una acción cumplida con vigencia actual en el discurso de envío divino.
- source_word: זֶה שְּׁמִי לְעֹלָם
  english_pob_choice: This is my name forever
  chosen_spanish: Este es mi nombre para siempre
  alternatives_spanish:
  - Este es mi nombre por siempre
  - Este es mi nombre eternamente
  lexicon: HALOT
  rationale: «Para siempre» comunica bien la duración indefinida de לְעֹלָם en español moderno y mantiene el valor covenantal del texto.
- source_word: זִכְרִי
  english_pob_choice: my memorial
  chosen_spanish: mi memoria
  alternatives_spanish:
  - mi memorial
  - mi recuerdo
  lexicon: HALOT
  rationale: El sustantivo deriva de la raíz de recordar/rememorar. «Memoria» conserva la idea de ser recordado de manera estable; se evita «memorial» por sonar más institucional en español actual. Se conserva la tensión con la nota sobre «recuerdo/rememoración».
- source_word: לְדֹר דֹּר
  english_pob_choice: from generation to generation
  chosen_spanish: de generación en generación
  alternatives_spanish:
  - de una generación a otra
  - a través de las generaciones
  lexicon: HALOT
  rationale: Es el equivalente idiomático natural en español para la continuidad intergeneracional del hebreo.
- source_word: כֹּה תֹאמַר
  english_pob_choice: Thus you shall say
  chosen_spanish: Así dirás
  alternatives_spanish:
  - De esta manera dirás
  - Esto dirás
  lexicon: HALOT
  rationale: La fórmula introductoria de mandato divino se conserva de forma concisa y solemne en español, sin perder el matiz imperativo.
- source_word: עוֹד
  english_pob_choice: also
  chosen_spanish: también
  alternatives_spanish:
  - además
  - aún
  lexicon: HALOT
  rationale: Aquí עוֹד marca continuación de la palabra divina; «también» es el equivalente natural en español.
theological_decisions:
- issue: Representación del Nombre divino YHWH
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - el SEÑOR
  rationale: La lectura auditada del POB preserva el Nombre propio del pacto y evita la sustitución por un título. En español, «Yahvé» es la forma estándar del proyecto para comunicar ese mismo valor reverencial y nominativo.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Alcance de la memoria/nombre en la cláusula final
  english_pob_reading: my memorial
  chosen_spanish_reading: mi memoria
  alternative_spanish_readings:
  - mi memorial
  - mi recuerdo
  - la manera en que soy recordado
  rationale: 'Se conserva la ambigüedad lexical: el hebreo puede referirse al ‘recordatorio’ o a lo ‘recordado’. «Mi memoria» suena natural y deja abierta la alternativa semántica preservada en la nota.'
  doctrine_reference: HALOT / nota lexical POB sobre זִכְרִי
translation_notes:
  revision_awareness: 'Se siguió el pasaje conforme al texto hebreo WLC y al audit trail inglés; no se aplicaron revisiones posteriores. La versión española mantiene las decisiones claves del POB: nombre divino explícito, kinship terms masculinos cuando el hebreo los usa, y la ambigüedad de זִכְרִי en nota.'
  spanish_consistency_notes:
  - Se usa «Yahvé» para יְהוָה, coherente con el sistema terminológico del proyecto.
  - Se conserva «hijos de Israel» y «padres» por fidelidad formal al hebreo masculino representativo.
  - «Mi memoria» se eligió en el cuerpo del texto para sonar natural en español; la nota preserva las alternativas semánticas.
  - La puntuación española usa comillas angulares y coloca las notas únicamente donde hay anclaje en el texto.
