translation:
  language: es
  text: Y sucedió que, cuando la congregación se reunió contra Moisés y contra Aarón, se volvieron hacia la tienda de reunión; y he aquí, la nube la cubrió[a], y la gloria de Yahvé apareció.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «la nube lo cubrió»; el sufijo es masculino singular y se refiere de manera más natural a «la tienda de reunión». En español se expresa como «la cubrió» por concordancia con «tienda».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְהִי
  english_pob_choice: And it happened
  chosen_spanish: Y sucedió
  alternatives_spanish:
  - Y aconteció
  - Y ocurrió
  lexicon: HALOT
  rationale: La forma waw-consecutiva introduce el siguiente evento narrativo. «Y sucedió» conserva ese enlace narrativo en español con tono natural y digno, sin forzar una locución arcaica.
- source_word: בְּהִקָּהֵל
  english_pob_choice: when ... assembled
  chosen_spanish: cuando ... se reunió
  alternatives_spanish:
  - cuando ... se congregó
  - al reunirse
  lexicon: HALOT
  rationale: El infinitivo constructo con ב expresa circunstancia temporal. «Cuando ... se reunió» comunica bien el valor temporal y evita una construcción demasiado literal en español.
- source_word: הָעֵדָה
  english_pob_choice: the congregation
  chosen_spanish: la congregación
  alternatives_spanish:
  - la comunidad
  - la asamblea
  lexicon: HALOT
  rationale: עֵדָה designa al pueblo reunido como cuerpo. «Congregación» es la equivalencia natural y establecida en este contexto pentateucal.
- source_word: עַל
  english_pob_choice: against
  chosen_spanish: contra
  alternatives_spanish:
  - sobre
  - respecto de
  lexicon: HALOT
  rationale: Aquí el contexto es hostil, no meramente direccional. «Contra» conserva la oposición explícita de la reunión del pueblo frente a Moisés y Aarón.
- source_word: וַיִּפְנוּ
  english_pob_choice: they turned
  chosen_spanish: se volvieron
  alternatives_spanish:
  - se dirigieron
  - giraron
  lexicon: HALOT
  rationale: פנה indica orientación física hacia un punto. «Se volvieron hacia» reproduce ese movimiento sin añadir una interpretación más fuerte que la del hebreo.
- source_word: אֹהֶל מוֹעֵד
  english_pob_choice: the tent of meeting
  chosen_spanish: el tabernáculo de reunión
  alternatives_spanish:
  - la tienda de reunión
  - el tabernáculo del encuentro
  lexicon: HALOT
  rationale: La expresión hebrea nombra el santuario portátil. «Tabernáculo de reunión» es comprensible en español e integra la función cultual del lugar; se mantiene la referencia tradicional del espacio sagrado sin ocultar el término de «reunión».
- source_word: וְהִנֵּה
  english_pob_choice: and behold
  chosen_spanish: y he aquí
  alternatives_spanish:
  - y mira
  - y de pronto
  lexicon: HALOT
  rationale: הִנֵּה introduce una escena repentina y solemne. «Y he aquí» conserva la fuerza deíctica y el tono bíblico que el POB preserva en inglés con «and behold».
- source_word: כִסָּהוּ
  english_pob_choice: covered it
  chosen_spanish: lo cubrió
  alternatives_spanish:
  - la cubrió
  - lo había cubierto
  lexicon: HALOT
  rationale: El sufijo pronominal masculino singular se entiende de manera más natural referido al «tabernáculo de reunión», que en español puede tratarse como masculino. Por eso se traduce «lo cubrió», manteniendo la referencia implícita del hebreo.
- source_word: הֶעָנָן
  english_pob_choice: the cloud
  chosen_spanish: la nube
  alternatives_spanish:
  - la nube de la presencia
  - el nublado
  lexicon: HALOT
  rationale: Se trata de la nube visible asociada a la manifestación divina. «La nube» es la traducción directa y suficiente; no se añade explicación que el texto no ofrece.
- source_word: וַיֵּרָא
  english_pob_choice: appeared
  chosen_spanish: apareció
  alternatives_spanish:
  - fue vista
  - se manifestó
  lexicon: HALOT
  rationale: El nifal de ראה expresa manifestación visible. «Apareció» es el equivalente español más natural para una teofanía.
- source_word: כְּבוֹד יְהוָה
  english_pob_choice: the glory of Yahweh
  chosen_spanish: la gloria de Yahvé
  alternatives_spanish:
  - la gloria de Yahveh
  - la gloria de Yahvéh
  lexicon: HALOT
  rationale: Se mantiene «Yahvé» conforme al criterio del proyecto para el Tetragrámaton. «Gloria» conserva el peso teológico de la presencia manifiesta de Dios.
theological_decisions:
- issue: Renderización del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahveh
  - el SEÑOR
  rationale: El hebreo usa el nombre propio divino, no un título sustitutivo. «Yahvé» preserva esa decisión doctrinal y la continuidad con el texto fuente, evitando ocultar el nombre detrás de un título.
  doctrine_reference: 'DOCTRINE.md: contested terms — יְהוָה / YHWH → Yahvé'
- issue: Referente del pronombre en כִסָּהוּ
  english_pob_reading: the cloud covered it; the pronoun most naturally refers to the tent of meeting
  chosen_spanish_reading: la nube lo cubrió, referido naturalmente al tabernáculo de reunión
  alternative_spanish_readings:
  - la nube la cubrió, referido a la tienda
  - la nube cubrió la escena
  rationale: El hebreo presenta un sufijo masculino singular. En español, el antecedente más natural y cercano es el santuario/tabernáculo, que además encaja con el patrón narrativo de la nube que cubre el lugar de encuentro divino.
  doctrine_reference: Nota textual y semántica del pasaje; coherente con la observación auditada de la POB en inglés
- issue: Naturaleza de «gloria de Yahvé»
  english_pob_reading: the glory of Yahweh appeared
  chosen_spanish_reading: la gloria de Yahvé apareció
  alternative_spanish_readings:
  - apareció la gloria de Yahvé
  - se manifestó la gloria de Yahvé
  rationale: Se mantiene el lenguaje bíblico de manifestación visible de la presencia divina, sin reducirlo a una mera luz o esplendor físico. «Apareció» conserva la visibilidad y el carácter teofánico del hebreo.
  doctrine_reference: Patrón teofánico bíblico; continuidad con la lectura auditada de la POB
translation_notes:
  revision_awareness: 'Se siguió la lectura auditada más reciente del inglés POB, sin cambios respecto del último pase: se mantuvieron la temporalidad narrativa de וַיְהִי, la oposición de עַל como «contra», la equivalencia de אֹהֶל מוֹעֵד como «tabernáculo de reunión», el referente implícito de כִסָּהוּ y la transliteración doctrinal del nombre divino como Yahvé.'
  spanish_consistency_notes:
  - Se evita «SEÑOR» como sustituto del nombre divino, conforme al estándar del proyecto.
  - «Congregación» y «tabernáculo de reunión» conservan el registro bíblico sin arcaizar innecesariamente.
  - La nota de pie de página marca la única ambigüedad relevante del pronombre hebreo.
  - No se añadieron glosas doctrinales al texto principal; la aclaración del referente se reservó para la nota, como en el audit trail inglés.
