translation:
  language: es
  text: ¡Oh Yahvé! En la angustia te buscaron[a]; derramaron una súplica susurrada[b] cuando tu disciplina[c] estaba sobre ellos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «se volvieron a ti» o «te visitaron»; el verbo hebreo también puede tener el sentido de atender a alguien o acudir a él.
    reason: lexical_alternative
  - marker: b
    text: O «un susurro» o «pronunciaron un murmullo»; el hebreo es compacto y puede describir una súplica en voz baja bajo la aflicción.
    reason: lexical_alternative
  - marker: c
    text: «Tu disciplina» también puede traducirse «tu corrección» o «tu instrucción».
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  english_pob_choice: O Yahweh
  chosen_spanish: ¡Oh Yahvé!
  alternatives_spanish:
  - Yahvé
  - Oh Yahvé
  - SEÑOR
  lexicon: HALOT
  rationale: El Tetragrámaton se conserva como el nombre divino propio, siguiendo la política del POB. En español, «¡Oh Yahvé!» mantiene el valor vocativo y la referencia al nombre revelado, sin sustituirlo por un título.
- source_word: בַּצַּר
  english_pob_choice: in distress
  chosen_spanish: en la angustia
  alternatives_spanish:
  - en la aflicción
  - en la tribulación
  - en la angustia
  lexicon: HALOT
  rationale: צַר expresa una situación de presión o aflicción; «angustia» comunica bien esa constricción emocional y circunstancial en español natural, sin perder el matiz de apuro.
- source_word: פְּקָדוּךָ
  english_pob_choice: they sought you
  chosen_spanish: te buscaron
  alternatives_spanish:
  - te buscaron con empeño
  - te acudieron
  - te visitaron
  lexicon: HALOT
  rationale: En este contexto de clamor bajo disciplina, el verbo admite el sentido de buscar/recurrir a Dios. «Te buscaron» es la forma más natural en español y conserva la fuerza de acudir al Señor en aflicción.
- source_word: צָקוּן
  english_pob_choice: they poured out
  chosen_spanish: derramaron
  alternatives_spanish:
  - vertieron
  - desahogaron
  - derramaron
  lexicon: HALOT
  rationale: El hebreo sugiere una efusión o derramamiento de la voz/plegaria. «Derramaron» conserva la imagen verbal en español y funciona bien con el complemento siguiente.
- source_word: לַחַשׁ
  english_pob_choice: a whispered prayer
  chosen_spanish: una súplica susurrada
  alternatives_spanish:
  - un susurro
  - una oración susurrada
  - una súplica en voz baja
  lexicon: HALOT
  rationale: לַחַשׁ puede ser susurro, murmullo o expresión baja. «Súplica susurrada» mantiene el tono de oración humilde y evita cargar el término con un sentido ocultista que el contexto no exige.
- source_word: מוּסָרְךָ
  english_pob_choice: your discipline
  chosen_spanish: tu disciplina
  alternatives_spanish:
  - tu corrección
  - tu castigo disciplinario
  - tu instrucción
  lexicon: HALOT
  rationale: מוּסָר tiene un campo semántico que incluye disciplina, corrección e instrucción. «Disciplina» conserva el sentido correctivo y la ambigüedad útil del término, como en el POB inglés.
- source_word: לָמוֹ
  english_pob_choice: upon them
  chosen_spanish: sobre ellos
  alternatives_spanish:
  - a ellos
  - para ellos
  - sobre ellos
  lexicon: HALOT
  rationale: La relación de la preposición con el sufijo se entiende naturalmente como algo que cae o recae sobre el grupo. «Sobre ellos» expresa esa llegada de la disciplina de forma idiomática en español.
theological_decisions:
- issue: Tratamiento del nombre divino YHWH
  english_pob_reading: O Yahweh
  chosen_spanish_reading: ¡Oh Yahvé!
  alternative_spanish_readings:
  - Yahvé
  - SEÑOR
  rationale: Se mantiene el nombre personal de Dios en lugar de sustituirlo por un título. Esto sigue la decisión doctrinal y textual del POB de transparentar el Tetragrámaton.
  doctrine_reference: Translation philosophy §3; POB name policy
- issue: Sentido de מוּסָר en el contexto
  english_pob_reading: your discipline
  chosen_spanish_reading: tu disciplina
  alternative_spanish_readings:
  - tu corrección
  - tu instrucción
  - tu castigo
  rationale: El versículo presenta la aflicción como un trato correctivo de Dios que lleva al pueblo a buscarlo. «Disciplina» conserva esa lectura sin forzar exclusivamente el matiz punitivo ni el pedagógico.
  doctrine_reference: Translation philosophy §3, §6
- issue: Sentido de לַחַשׁ
  english_pob_reading: a whispered prayer
  chosen_spanish_reading: una súplica susurrada
  alternative_spanish_readings:
  - un susurro
  - una oración susurrada
  - una súplica en voz baja
  rationale: El contexto es una apelación a Yahvé en la angustia; por eso se evita cualquier lectura de connotación mágica u oculta. «Súplica susurrada» preserva el carácter bajo y afligido de la petición.
  doctrine_reference: Translation philosophy §1, §6
translation_notes:
  revision_awareness: 'El pasaje coincide en sustancia con el audit trail inglés (high agreement; sin revisiones aplicadas en la última pasada). Se mantuvo la misma línea interpretativa: YHWH como nombre propio, בַּצַּר como aflicción/angustia, פְּקָדוּךָ como buscar/recurrir, צָקוּן como derramar, לַחַשׁ como susurro de súplica, y מוּסָר como disciplina correctiva.'
  spanish_consistency_notes:
  - Se usó «Yahvé» coherentemente para יְהוָה.
  - Se prefirió «angustia» por naturalidad bíblica en español, sin diluir la idea de presión o estrechez.
  - «Te buscaron» conserva el sentido relacional y devocional de פְּקָדוּךָ.
  - «Súplica susurrada» reproduce el tono de voz baja del hebreo sin introducir lecturas extrañas.
  - «Disciplina» deja abierta la tensión entre corrección, instrucción y castigo, como en el POB inglés.
