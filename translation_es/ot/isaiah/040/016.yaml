translation:
  language: es
  text: El Líbano no basta para alimentar el fuego[a], ni sus animales para un holocausto[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El Líbano probablemente evoca sus famosos bosques; el sentido es que ni toda su madera bastaría para el fuego.
    reason: cultural_note
  - marker: b
    text: 'O: «sus bestias»; el hebreo puede sugerir específicamente los animales del Líbano como víctimas sacrificiales.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וּלְבָנוֹן
  english_pob_choice: Lebanon
  chosen_spanish: el Líbano
  alternatives_spanish:
  - los bosques del Líbano
  lexicon: HALOT
  rationale: Se conserva el nombre geográfico como en el texto fuente, porque el hebreo nombra directamente al Líbano. En español, el artículo definido es natural y mantiene la referencia metonímica a sus bosques sin explicitarla en el cuerpo del versículo.
- source_word: אֵין דֵּי
  english_pob_choice: is not enough
  chosen_spanish: no basta
  alternatives_spanish:
  - no es suficiente
  - no alcanza
  lexicon: HALOT
  rationale: La combinación expresa insuficiencia de manera cuantitativa. 'No basta' es idiomático en español y preserva el valor de carencia sin añadir explicaciones.
- source_word: בָּעֵר
  english_pob_choice: to burn
  chosen_spanish: quemar
  alternatives_spanish:
  - para arder
  - para hacer fuego
  lexicon: HALOT
  rationale: El infinitivo se refiere al uso de madera como combustible para fuego sacrificial. 'Quemar' comunica de forma natural esa función en español y evita una construcción más pesada.
- source_word: וְחַיָּתוֹ
  english_pob_choice: its animals
  chosen_spanish: sus animales
  alternatives_spanish:
  - sus bestias
  - sus animales salvajes
  lexicon: HALOT
  rationale: חַיָּה puede referirse a animal o bestia; el sufijo lo vincula con el Líbano. 'Sus animales' es amplio y no fuerza la idea de 'salvajes' más de lo que exige el hebreo.
- source_word: עוֹלָה
  english_pob_choice: a burnt offering
  chosen_spanish: un holocausto
  alternatives_spanish:
  - una ofrenda quemada
  - un sacrificio completamente quemado
  lexicon: HALOT
  rationale: Para el sacrificio técnico עוֹלָה, 'holocausto' es el equivalente tradicional y preciso en español bíblico. Aunque puede sonar eclesiástico, aquí conserva el sentido de sacrificio totalmente consumido por el fuego.
theological_decisions:
- issue: Alcance de la imagen sacrificial
  english_pob_reading: Even Lebanon's vast timber and animal life are insufficient for an offering proportionate to God's majesty.
  chosen_spanish_reading: Incluso toda la madera y toda la vida animal asociadas con el Líbano resultarían insuficientes ante la grandeza implícita en el contexto.
  alternative_spanish_readings:
  - Una afirmación más general sobre la insuficiencia de los recursos humanos para adorar a Dios
  - Una lectura que explicite solo la imposibilidad material del sacrificio
  rationale: El versículo usa lenguaje sacrificial para afirmar insuficiencia, pero el contexto inmediato subraya la incomparable grandeza de Dios sin desarrollar una doctrina aparte. La traducción conserva esa tensión sin ampliarla más allá de lo que el hebreo dice.
  doctrine_reference: Isaías 40:12–17; preservar la tensión teológica sin resolverla de modo explicativo
translation_notes:
  revision_awareness: La revisión más reciente indicó que no eran necesarios cambios sustantivos. Se mantuvo el sentido del original hebreo y la lectura auditada en inglés, ajustando únicamente la formulación española para lograr naturalidad y precisión.
  spanish_consistency_notes:
  - Se mantiene 'Líbano' como topónimo, con nota para la implicación metonímica de sus bosques.
  - '''No basta'' conserva la fuerza de insuficiencia de אֵין דֵּי.'
  - '''Holocausto'' se usa como término sacrificial técnico, coherente con עוֹלָה.'
  - 'El orden de las frases sigue el paralelismo hebreo: madera/fuego y animales/ofrenda.'
  - Las notas preservan la alternativa lexical documentada en la auditoría inglesa.
