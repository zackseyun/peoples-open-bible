id: 2TI.3.6
reference: 2 Timothy 3:6
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: ἐκ τούτων γάρ εἰσιν οἱ ἐνδύνοντες εἰς τὰς οἰκίας καὶ ⸀αἰχμαλωτίζοντες γυναικάρια σεσωρευμένα ἁμαρτίαις, ἀγόμενα ἐπιθυμίαις ποικίλαις,
base_translation:
  language: en
  yaml_path: translation/nt/2_timothy/003/006.yaml
  text: For among these are those who slip into households and capture little women burdened with sins, led along by various desires,
translation:
  language: ko
  text: 이런 자들 가운데 남의 집에 슬쩍 들어가, 죄에 짓눌리고 온갖 욕망에 끌려다니는 어리석은 여자들을[a] 사로잡는 자들이 있습니다.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 직역하면 「작은 여자들」. 헬라어 γυναικάριον은 축소형으로, 본 문맥에서는 영적으로 미성숙하고 쉽게 휘둘리는 여성들을 비하조로 가리키는 표현이다.
    reason: lexical_alternative
lexical_decisions:
- source_word: οἱ ἐνδύνοντες εἰς τὰς οἰκίας
  english_pob_choice: those who slip into households
  chosen_korean: 남의 집에 슬쩍 들어가
  alternatives_korean:
  - 가정에 잠입하여
  - 집 안으로 파고들어가
  lexicon: BDAG
  rationale: ἐνδύνω는 「몰래 들어감·잠입함」. 「슬쩍 들어가다」가 그 은밀한 침입을 자연스럽게 담는다.
- source_word: αἰχμαλωτίζοντες
  english_pob_choice: capture
  chosen_korean: 사로잡는
  alternatives_korean:
  - 포로로 끌어가는
  - 휘어잡는
  lexicon: BDAG
  rationale: αἰχμαλωτίζω는 「전쟁 포로로 잡음」. 「사로잡다」가 한국어로 자연스러우며 정신적 종속의 비유에도 적합하다.
- source_word: γυναικάρια
  english_pob_choice: little women
  chosen_korean: 어리석은 여자들
  alternatives_korean:
  - 미성숙한 여자들
  - 어린 여자들
  - 연약한 여자들
  lexicon: BDAG
  rationale: γυναικάριον의 축소형이 가져오는 비하·연약함의 뉘앙스를 「어리석은」으로 옮겨 그 영적 미성숙 함의를 살린다. 직역(작은 여자들)은 각주에 둔다.
- source_word: σεσωρευμένα ἁμαρτίαις
  english_pob_choice: burdened with sins
  chosen_korean: 죄에 짓눌리고
  alternatives_korean:
  - 죄에 짓눌려 있고
  - 죄에 가득 차 있고
  lexicon: BDAG
  rationale: σωρεύω는 「쌓아 올림」. 완료 수동 분사로 「쌓인 짐 아래 짓눌린 상태」를 가리킨다. 「짓눌리다」가 그 짐의 무게를 자연스럽게 담는다.
- source_word: ἀγόμενα ἐπιθυμίαις ποικίλαις
  english_pob_choice: led along by various desires
  chosen_korean: 온갖 욕망에 끌려다니는
  alternatives_korean:
  - 가지가지 정욕에 이끌리는
  - 여러 욕망에 휘둘리는
  lexicon: BDAG
  rationale: ποικίλαις의 「가지각색」을 「온갖」으로, ἄγω의 「이끌림」을 「끌려다니다」로 옮겨 자기 통제력 상실의 이미지를 살린다.
