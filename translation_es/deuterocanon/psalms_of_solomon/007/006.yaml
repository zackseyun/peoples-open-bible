  text: y ninguna nación prevalecerá contra nosotros, porque tú eres nuestro defensor.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: οὐκ ἰσχύσει
  english_pob_choice: will prevail
  chosen_spanish: prevalecerá
  alternatives_spanish:
  - será fuerte
  - tendrá poder
  - logrará imponerse
  lexicon: LSJ
  rationale: ἰσχύω aquí expresa capacidad o fuerza para imponerse; en español, «prevalecerá» transmite de manera natural la idea de que una nación no logrará imponerse contra el pueblo, sin reducirlo a mera fortaleza abstracta.
- source_word: πρὸς ἡμᾶς
  english_pob_choice: against us
  chosen_spanish: contra nosotros
  alternatives_spanish:
  - hacia nosotros
  - en relación con nosotros
  lexicon: LSJ
  rationale: Con un verbo de oposición o fuerza, πρός con acusativo funciona de modo adversativo; «contra nosotros» conserva ese valor relacional y polémico en español.
- source_word: ἔθνος
  english_pob_choice: nation
  chosen_spanish: nación
  alternatives_spanish:
  - pueblo
  - nación gentil
  lexicon: LSJ
  rationale: El singular griego probablemente tiene valor colectivo. «Nación» es la traducción más directa y natural en español, sin añadir la especificación «gentil» que el contexto inmediato no exige.
- source_word: ὑπερασπιστής
  english_pob_choice: defender
  chosen_spanish: defensor
  alternatives_spanish:
  - protector
  - campeón
  - el que nos protege
  lexicon: LSJ
  rationale: El sustantivo nombra a quien defiende y ampara. «Defensor» conserva el valor nominal y confesional del griego con un giro natural en español, equivalente al «our defender» del audit trail.
theological_decisions:
- issue: Poder protector atribuido a Dios en forma nominal
  english_pob_reading: because you are our defender
  chosen_spanish_reading: porque tú eres nuestro defensor
  alternative_spanish_readings:
  - porque tú eres nuestro protector
  - porque tú eres el que nos defiende
  rationale: El griego presenta un predicado nominal aplicado a Dios. «Porque tú eres nuestro defensor» preserva esa fuerza de título y la relación de amparo sin convertirla innecesariamente en una frase verbalizada.
  doctrine_reference: Divina protección / cuidado providencial
translation_notes:
  revision_awareness: El texto griego y la auditoría inglesa están en alto acuerdo; no hubo revisiones aplicadas y la redacción española sigue de cerca la estructura y la fuerza nominal del original.
  spanish_consistency_notes:
  - Se mantiene «nación» para ἔθνος por coherencia con el valor colectivo directo del griego.
  - Se usa «defensor» para ὑπερασπιστής, en línea con el audit trail inglés y con un registro bíblico claro en español.
  - Se conserva el paralelismo sencillo de causa («porque») y predicación nominal, sin amplificación interpretativa.
