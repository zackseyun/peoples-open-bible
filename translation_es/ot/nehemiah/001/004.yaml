base_translation:
  language: en
  yaml_path: translation/ot/nehemiah/001/004.yaml
  text: And when I heard these words[a], I sat down and wept and mourned for days[b], and I was fasting and praying before the God of heaven.
  footnotes:
  - marker: a
    text: Or 'these things.' The Hebrew דְּבָרִים can mean 'words,' 'matters,' or 'things.'
    reason: lexical_alternative
  - marker: b
    text: Or 'I fasted and prayed.' The Hebrew form can be rendered more simply, but 'I was fasting and praying' reflects the ongoing sense of היה with participles.
    reason: lexical_alternative
