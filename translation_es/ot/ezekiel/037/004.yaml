  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el hebreo: mantiene la secuencia narrativa, el mandato de profetizar sobre los huesos, el vocativo ''Huesos secos'' y ''la palabra de Yahvé''. Sin embargo, hay un problema formal importante con las notas: el mismo marcador [a] se usa dos veces en el texto para dos funciones distintas, mientras solo existe una nota al pie. Además, la nota sobre YHWH debe anclarse únicamente en ''Yahvé'', no en ''me dijo''.'
  spanish_quality_summary: El español es claro, natural y digno. 'Entonces me dijo', 'Profetiza sobre estos huesos' y 'Huesos secos, oigan la palabra de Yahvé' son lecturas fieles y fluidas. 'Oigan' funciona bien en registro bíblico moderno. La única reparación necesaria es la disciplina de notas al pie.
  glossary_alignment: 'La terminología del proyecto está bien aplicada: יהוה → ''Yahvé''; דבר → ''palabra''; הִנָּבֵא → ''Profetiza''. No hay conflictos léxicos de fondo. La excepción necesaria es solo de marcado de nota, no de glosario.'
  issues:
  - severity: medium
    issue: Marcador de nota [a] reutilizado dos veces en el texto
    rationale: Las instrucciones exigen marcadores únicos y no reutilizados para notas distintas en el mismo registro. Aquí [a] aparece tras 'dijo' y tras 'Yahvé', pero solo hay una nota y su contenido corresponde al nombre divino.
  - severity: medium
    issue: Anclaje incorrecto de la nota sobre YHWH
    rationale: 'La nota ''Hebreo: «YHWH»; tradicionalmente se traduce «el SEÑOR»'' debe anclarse en ''Yahvé'', que es donde aparece la decisión terminológica relevante. Anclarla también en ''me dijo'' crea ambigüedad y rompe la correspondencia exacta entre texto y nota.'
  revised_spanish_text: 'Entonces me dijo: “Profetiza sobre estos huesos, y diles: ‘Huesos secos, oigan la palabra de Yahvé[a].’”'
  revised_footnotes:
