- from: Y será guardado por ustedes hasta el día catorce de este mes[a], y toda la asamblea de la congregación de Israel lo sacrificará entre las dos tardes.
  to: Y será guardado por ustedes hasta el día catorce de este mes, y toda la asamblea de la congregación de Israel lo sacrificarán entre las dos tardes[a].
