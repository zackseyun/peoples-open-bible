translation:
  language: es
  text: Y Báquides se enteró de ello, y buscaba matarlo.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: Καὶ ἔγνω
  english_pob_choice: learned of it
  chosen_spanish: se enteró de ello
  alternatives_spanish:
  - lo supo
  - llegó a saberlo
  - se informó de ello
  lexicon: BDAG
  rationale: El aoristo de γινώσκω aquí indica que Bacquides llegó a saber la noticia o información. ‘Se enteró de ello’ comunica ese descubrimiento en español natural sin sugerir solo conocimiento general.
- source_word: ἐζήτει
  english_pob_choice: was seeking
  chosen_spanish: andaba buscando
  alternatives_spanish:
  - buscaba
  - estaba procurando
  - trataba de buscar
  lexicon: BDAG
  rationale: El imperfecto marca una acción en curso. ‘Andaba buscando’ conserva bien esa continuidad narrativa y evita un perfecto puntual que debilitaría el aspecto.
- source_word: ἀποκτεῖναι
  english_pob_choice: to kill
  chosen_spanish: matarlo
  alternatives_spanish:
  - darle muerte
  - quitarle la vida
  - ponerlo a muerte
  lexicon: BDAG
  rationale: El infinitivo expresa simplemente ‘matar’. ‘Matarlo’ es la opción más directa y fiel en español; no introduce la idea de ejecución formal.
- source_word: Βακχίδης
  english_pob_choice: Bacchides
  chosen_spanish: Bacquides
  alternatives_spanish:
  - Bacides
  lexicon: convención onomástica
  rationale: Se translitera el nombre propio conforme a uso castellano, manteniendo la identidad del personaje. ‘Bacquides’ evita una adaptación excesiva y conserva la forma histórica del nombre.
- source_word: αὐτόν
  english_pob_choice: him
  chosen_spanish: lo
  alternatives_spanish:
  - a él
  lexicon: BDAG
  rationale: El pronombre masculino singular retoma al referente masculino del contexto. ‘Lo’ es el objeto directo natural en español y preserva la referencia inmediata.
translation_notes:
  revision_awareness: 'La redacción sigue el sentido ya revisado en el audit trail inglés: ἔγνω se toma como ‘llegó a saber / se enteró’, ἐζήτει como acción continua (‘was seeking’), y ἀποκτεῖναι como ‘to kill’ sin añadir matiz de ejecución judicial. No se detectan tensiones teológicas específicas en este versículo.'
  spanish_consistency_notes:
  - Se mantiene un registro sobrio y narrativo, acorde con una sección histórica breve.
  - ‘Se enteró de ello’ y ‘andaba buscando’ equilibran naturalidad española con fidelidad aspectual al griego.
  - No se introducen notas al pie porque el texto no presenta variantes relevantes ni alternativas teológicas documentadas en el paquete de audit trail.
