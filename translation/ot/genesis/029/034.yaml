id: GEN.29.34
reference: Genesis 29:34
source:
  edition: WLC
  text: וַ/תַּ֣הַר עוֹד֮ וַ/תֵּ֣לֶד בֵּן֒ וַ/תֹּ֗אמֶר עַתָּ֤ה הַ/פַּ֨עַם֙ יִלָּוֶ֤ה אִישִׁ/י֙ אֵלַ֔/י כִּֽי יָלַ֥דְתִּי ל֖/וֹ שְׁלֹשָׁ֣ה בָנִ֑ים עַל כֵּ֥ן קָרָֽא שְׁמ֖/וֹ לֵוִֽי־־־׃
translation:
  text: And she conceived again and bore a son[a], and said, “Now this time my husband will be attached to me, because I have borne him three sons.” Therefore his name was called Levi.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “my husband will be joined to me.” The Hebrew verb sounds like the name Levi.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַתַּהַר עוֹד
  chosen: And she conceived again
  alternatives:
  - And she became pregnant again
  lexicon: HALOT
  rationale: הרה denotes becoming pregnant/conceiving. 'Conceived' is concise and natural in narrative English; עוֹד adds the sense 'again' or 'yet again.'
- source_word: וַתֵּלֶד בֵּן
  chosen: and bore a son
  alternatives:
  - and gave birth to a son
  lexicon: HALOT
  rationale: ילד in the Qal with בן is the standard idiom for bearing/giving birth to a son. 'Bore a son' is slightly more formal but still readable and fits the repetitive birth-naming formula in this context.
- source_word: עַתָּה הַפַּעַם
  chosen: Now this time
  alternatives:
  - This time
  - Now at last, this time
  lexicon: HALOT
  rationale: The paired adverbs intensify Leah's statement. 'Now this time' preserves both elements without over-paraphrasing.
- source_word: יִלָּוֶה
  chosen: will become attached
  alternatives:
  - will be joined
  - will be attached
  - will accompany
  lexicon: HALOT
  rationale: The Niphal of לוה here is wordplay with the name Levi and expresses Leah's hope that her husband will be joined/attached to her. 'Become attached' communicates relational closeness in idiomatic English while preserving the etymological link better than a looser rendering.
- source_word: אִישִׁי
  chosen: my husband
  alternatives:
  - my man
  lexicon: HALOT
  rationale: Although איש literally means 'man,' with 1cs suffix in marital context it means 'my husband.' This is the natural and contextually accurate English rendering.
- source_word: אֵלַי
  chosen: to me
  alternatives:
  - with me
  lexicon: HALOT
  rationale: The preposition אל marks direction toward Leah; 'to me' preserves the Hebrew construction and fits the idiom 'become attached to me.'
- source_word: כִּי יָלַדְתִּי לוֹ שְׁלֹשָׁה בָנִים
  chosen: because I have borne him three sons
  alternatives:
  - for I have borne him three sons
  - because I bore him three sons
  lexicon: HALOT
  rationale: כִּי gives the reason for Leah's hope. The perfect can be rendered with English present perfect here to express the present relevance of completed action. 'Him' reflects לוֹ, and 'three sons' is literal.
- source_word: עַל כֵּן
  chosen: Therefore
  alternatives:
  - For this reason
  - That is why
  lexicon: HALOT
  rationale: This formula introduces the naming explanation. 'Therefore' is concise and suitably formal for the etiological statement.
- source_word: קָרָא שְׁמוֹ
  chosen: his name was called
  alternatives:
  - he called his name
  - she called his name
  - his name was named
  lexicon: HALOT
  rationale: The Hebrew uses a 3ms singular verb without explicit subject. English commonly uses a passive here to avoid supplying an uncertain subject and to preserve the formulaic naming style. This also reflects that the text emphasizes the resulting name more than the namer.
- source_word: לֵוִי
  chosen: Levi
  lexicon: HALOT
  rationale: Personal names are transliterated by standard convention per project philosophy. The name also preserves the Hebrew wordplay with יִלָּוֶה/לוה.
