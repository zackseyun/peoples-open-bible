revisions:
- from: Y los llevaban, con amarga coerción, al día mensual de cumpleaños del rey, para el banquete sacrificial[a]; y cuando llegaba la fiesta de Dionisio, eran obligados, llevando coronas de hiedra[b], a participar en la procesión en honor de Dionisio.
  to: Y los llevaban, bajo amarga coacción, a la conmemoración mensual del cumpleaños del rey, para el banquete sacrificial[a]; y cuando llegaba una fiesta de Dionisio, eran obligados, con coronas de hiedra[b], a participar en la procesión en honor de Dionisio.
  rationale: Se corrige la frase central para un español más natural y fiel al carácter de observancia recurrente del griego («conmemoración mensual del cumpleaños del rey»). También se mejora la expresión de la coerción («bajo amarga coacción») y del atavío ritual con hiedra («con coronas de hiedra»), evitando la posible idea de simplemente llevarlas en la mano. Se conserva «banquete sacrificial» con nota, porque transmite bien la participación forzada en el rito pagano sin oscurecer el texto principal.
