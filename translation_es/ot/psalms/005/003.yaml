translation:
  language: es
  text: Presta atención[a] al sonido de mi clamor por ayuda, mi Rey y mi Dios, porque a ti oro[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Presta atención» traduce el imperativo hebreo con un valor de escucha enfocada; también puede entenderse como «escucha».
    reason: lexical_alternative
  - marker: b
    text: O «oraré». La forma verbal hebrea puede expresar acción presente, continua o futura según el contexto.
    reason: lexical_alternative
lexical_decisions:
- source_word: הַקְשִׁיבָה
  english_pob_choice: Pay attention
  chosen_spanish: Presta atención
  alternatives_spanish:
  - Escucha
  - Da oído
  lexicon: HALOT
  rationale: El imperativo pide una escucha atenta y enfocada. «Presta atención» conserva esa fuerza en español actual mejor que una fórmula más arcaica.
- source_word: לְקוֹל
  english_pob_choice: to the sound of
  chosen_spanish: al sonido de
  alternatives_spanish:
  - a la voz de
  - al clamor de
  lexicon: HALOT
  rationale: קול puede ser «sonido» o «voz». Como aquí rige a שַׁוְעִי, «al sonido de» mantiene la construcción hebrea sin volverla forzada en español.
- source_word: שַׁוְעִי
  english_pob_choice: my cry for help
  chosen_spanish: mi clamor por ayuda
  alternatives_spanish:
  - mi clamor
  - mi súplica de ayuda
  lexicon: HALOT
  rationale: El término expresa una llamada de auxilio o angustia, no solo un grito cualquiera. «Clamor por ayuda» conserva el sentido petitionario y solemne.
- source_word: מַלְכִּי
  english_pob_choice: my King
  chosen_spanish: mi Rey
  alternatives_spanish:
  - mi rey
  lexicon: HALOT
  rationale: Se conserva el título vocativo dirigido a Dios. «Rey» es el equivalente natural en español; la mayúscula en el texto refleja el trato reverente del habla litúrgica sin cambiar el sentido del hebreo.
- source_word: וֵאלֹהָי
  english_pob_choice: and my God
  chosen_spanish: y mi Dios
  alternatives_spanish:
  - y mi dios
  lexicon: HALOT
  rationale: Traducción directa del título divino con sufijo de primera persona. «Dios» comunica de forma clara y estándar la referencia al Dios de Israel.
- source_word: כִּי
  english_pob_choice: for
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  lexicon: HALOT
  rationale: Introducen la razón de la súplica. «Porque» es natural en español y preserva el valor causal del hebreo.
- source_word: אֵלֶיךָ
  english_pob_choice: to you
  chosen_spanish: a ti
  alternatives_spanish:
  - hacia ti
  lexicon: HALOT
  rationale: La preposición marca dirección de la oración. «A ti» es la manera más idiomática de expresar ese movimiento en español.
- source_word: אֶתְפַּלָּל
  english_pob_choice: I pray
  chosen_spanish: oraré
  alternatives_spanish:
  - oro
  - estoy orando
  lexicon: HALOT
  rationale: El imperfecto hebreo puede reflejar acción presente, futura o habitual según el contexto. Aquí se preserva la posibilidad futura/volitiva del verbo con «oraré», sin perder el carácter de oración directa.
theological_decisions:
- issue: Títulos divinos en vocativo
  english_pob_reading: my King and my God
  chosen_spanish_reading: mi Rey y mi Dios
  alternative_spanish_readings:
  - mi rey y mi Dios
  - mi rey y mi dios
  rationale: 'El verso dirige la oración a Yahvé con dos títulos complementarios: soberanía real y deidad. La traducción mantiene ambos sin sustituirlos por un término más interpretativo.'
  doctrine_reference: Salmos 5:3; afirmaciones de traducción directa del nombre y títulos divinos
- issue: Valor aspectual de אֶתְפַּלָּל
  english_pob_reading: I pray
  chosen_spanish_reading: oraré
  alternative_spanish_readings:
  - oro
  - estoy orando
  rationale: El hebreo imperfecto admite matiz presente o futuro. Dado que el contexto es una petición inmediata, el español puede reflejar la apertura aspectual con un futuro natural en la súplica; esto conserva la tensión temporal sin cerrarla a un solo valor.
  doctrine_reference: Filología verbal hebrea; Salmos 5:3
- issue: Tratamiento reverente del destinatario
  english_pob_reading: my King and my God
  chosen_spanish_reading: mi Rey y mi Dios
  alternative_spanish_readings:
  - mi rey y mi Dios
  rationale: La capitalización de «Rey» en el texto español no añade contenido doctrinal nuevo; solo comunica reverencia y mantiene la dirección devocional del salmo.
  doctrine_reference: Convención estilística de traducción reverente
translation_notes:
  revision_awareness: El pasaje presenta alto acuerdo entre los controles de revisión y no requiere cambios adicionales; la presente redacción conserva el consenso principal del audit trail en español natural.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» para el nombre divino cuando no aparece explícitamente en este versículo, evitando sustituir títulos por fórmulas de máscara.
  - Se conserva «Dios» y no «dios» porque el contexto es oración dirigida al Dios de Israel.
  - La combinación «mi Rey y mi Dios» reproduce el paralelismo del hebreo sin ampliar el contenido.
  - El estilo es bíblico sobrio, pero con sintaxis moderna para lectura pública.
