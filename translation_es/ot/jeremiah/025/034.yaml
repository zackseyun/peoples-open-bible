base_translation:
  language: en
  yaml_path: translation/ot/jeremiah/025/034.yaml
  text: Wail[a], you shepherds, and cry out; roll in the dust, you lords of the flock, for the days of your slaughter are fulfilled[b], and your dispersions have come[e][d][c], and you will fall like a precious vessel.
  footnotes:
  - marker: a
    text: Or 'Howl, shepherds.' The Hebrew verb denotes loud lamentation.
    reason: lexical_alternative
  - marker: b
    text: Or 'wallow yourselves'; the Hebrew likely refers to a mourning gesture of rolling in dust or ashes.
    reason: cultural_note
  - marker: c
    text: Or 'leaders/nobles of the flock' for 'lords of the flock.'
    reason: lexical_alternative
  - marker: d
    text: The Hebrew of 'your dispersions have come' is difficult; it may refer to your being scattered.
    reason: alternative_reading
  - marker: e
    text: Or 'like a desirable/choice vessel.' The image is of something valued yet liable to be shattered.
    reason: lexical_alternative
