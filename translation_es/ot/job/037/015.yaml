revisions:
- from: ¿Sabes cómo Dios los coloca sobre ellos[a] y hace resplandecer la luz de su nube[b]?
  to: ¿Sabes cómo Dios pone estas cosas sobre ellos[a] y hace resplandecer la luz de su nube[b]?
  rationale: Se reemplaza «los coloca sobre ellos» por «pone estas cosas sobre ellos» para lograr un español más natural y, a la vez, reflejar mejor la estrategia del inglés POB de hacer visible un objeto contextual sin especificarlo en exceso. Se ajusta la nota [a] a femenino plural para concordar con «estas cosas». La segunda mitad se mantiene, pues es fiel al hebreo y buena en español.
