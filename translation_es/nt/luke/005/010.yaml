  source_alignment_summary: 'El borrador refleja bien la estructura del griego: incluye a Jacobo y Juan como hijos de Zebedeo, conserva κοινωνοί como relación de trabajo mediante «socios», traduce ἀπὸ τοῦ νῦν como transición vocacional («desde ahora») y mantiene ἀνθρώπους con sentido inclusivo («personas»). También evita armonizar con Mateo/Marcos. Sin embargo, «estarás pescando personas» suena aspectualmente extraño en español y debilita la fuerza prospectiva de ἔσῃ + participio; además, la nota de referencia cruzada está anclada en «No tengas miedo», cuando en realidad explica la diferencia de la metáfora final con los pasajes paralelos.'
