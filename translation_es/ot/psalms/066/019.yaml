translation:
  language: es
  text: Ciertamente, Dios ha oído[a]; ha escuchado la voz de mi oración.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «a la voz de mi oración». El hebreo dice más literalmente «con/mediante la voz de mi oración».'
    reason: lexical_alternative
lexical_decisions:
- source_word: אָכֵן
  english_pob_choice: Surely
  chosen_spanish: Ciertamente
  alternatives_spanish:
  - Sin duda
  - Verdaderamente
  lexicon: HALOT
  rationale: Expresa la fuerza afirmativa y confirmatoria del hebreo sin sonar anticuado; «ciertamente» funciona bien en español bíblico moderno.
- source_word: שָׁמַע
  english_pob_choice: has heard
  chosen_spanish: ha oído
  alternatives_spanish:
  - ha escuchado
  - ha escuchado y respondido
  lexicon: HALOT
  rationale: El perfecto hebreo presenta una acción realizada con vigencia actual; «ha oído» es natural en español y conserva el carácter testimonial del verso.
- source_word: אֱלֹהִים
  english_pob_choice: God
  chosen_spanish: Dios
  alternatives_spanish:
  - el Dios
  lexicon: HALOT
  rationale: El singular semántico del término con verbo singular se expresa de forma estándar como «Dios».
- source_word: הִקְשִׁיב
  english_pob_choice: has listened
  chosen_spanish: ha escuchado
  alternatives_spanish:
  - ha prestado atención
  - ha dado oído
  lexicon: HALOT
  rationale: El hifil de קשׁב implica atención deliberada; «ha escuchado» preserva esa idea en español natural sin perder el matiz de atención.
- source_word: בְּקוֹל
  english_pob_choice: to the voice of
  chosen_spanish: la voz de
  alternatives_spanish:
  - el sonido de
  lexicon: HALOT
  rationale: קוֹל puede ser «voz» o «sonido»; aquí, con oración, «la voz de» mantiene la correspondencia lexical con la revisión inglesa y suena idiomático en español.
- source_word: תְּפִלָּתִי
  english_pob_choice: my prayer
  chosen_spanish: mi oración
  alternatives_spanish:
  - mi plegaria
  lexicon: HALOT
  rationale: Corresponde de manera directa al sustantivo con sufijo posesivo; «oración» es la opción más clara y ampliamente comprensible.
translation_notes:
  revision_awareness: La revisión inglesa más reciente prefirió «voice» frente a «sound» para בְּקוֹל; la versión española sigue esa decisión con «la voz de». Además, se corrigió la nota al pie para anclarla explícitamente en el texto mediante [a].
  spanish_consistency_notes:
  - Se mantuvo «Dios» como traducción de אֱלֹהִים con verbo singular, coherente con el uso POB.
  - Se evitó «SEÑOR» porque el versículo no contiene el Tetragrámaton ni una cita directa que requiera ese tratamiento.
  - 'La cadencia del hemistiquio se conserva con una estructura breve y paralela: afirmación + oído/escuchado + complemento preposicional.'
