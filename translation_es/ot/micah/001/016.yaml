translation:
  language: es
  text: Hazte calva y rápate la cabeza por los hijos de tu deleite; agranda tu calva como el águila[a], porque han ido al destierro de ti.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «como el buitre». El hebreo נשר puede referirse a un ave carroñera grande, no necesariamente a un águila; en cualquier caso, la imagen es la de una calva muy visible.
    reason: lexical_alternative
lexical_decisions:
- source_word: קָרְחִי
  english_pob_choice: Make yourself bald
  chosen_spanish: Hazte calva
  alternatives_spanish:
  - Hazte calvo
  - Rádate la cabeza
  - Hazte baldía
  lexicon: HALOT
  rationale: Es un imperativo femenino singular con valor idiomático de duelo. «Hazte calva» conserva el mandato directo y el sentido de luto sin volverlo más explicativo de lo que exige el hebreo.
- source_word: וָגֹזִּי
  english_pob_choice: and shave your head
  chosen_spanish: y rástate la cabeza
  alternatives_spanish:
  - y córtate el cabello
  - y esquílate la cabeza
  - y trasquila tu cabeza
  lexicon: HALOT
  rationale: El verbo גזז implica cortar o esquilar; en el paralelo inmediato, «rástate la cabeza» comunica de modo natural la acción concreta y mantiene la fuerza del duelo.
- source_word: עַל
  english_pob_choice: for
  chosen_spanish: por
  alternatives_spanish:
  - a causa de
  - por causa de
  - sobre
  lexicon: HALOT
  rationale: Aquí introduce el motivo del lamento. «Por» es la forma más natural en español y conserva la relación causal con lo que sigue.
- source_word: בְּנֵי תַּעֲנוּגָיִךְ
  english_pob_choice: the children of your delight
  chosen_spanish: los hijos de tu deleite
  alternatives_spanish:
  - tus hijos queridos
  - los hijos de tus delicias
  - tus hijos de deleite
  lexicon: HALOT
  rationale: Mantiene el giro constructo «hijos de…» y el sustantivo abstracto «deleite», preservando el matiz relacional y la posible carga afectiva sin reducirlo a una simple paráfrasis.
- source_word: הַרְחִבִי
  english_pob_choice: enlarge
  chosen_spanish: agranda
  alternatives_spanish:
  - ensancha
  - amplía
  - haz más grande
  lexicon: HALOT
  rationale: El imperativo de רחב en este contexto se refiere a hacer más extensa la calva. «Agranda» funciona bien en español y conserva la imagen física sin añadir explicación.
- source_word: קָרְחָתֵךְ
  english_pob_choice: your baldness
  chosen_spanish: tu calva
  alternatives_spanish:
  - tu calvicie
  - tu calva cabeza
  - tu baldura
  lexicon: HALOT
  rationale: «Calva» es más natural y visible en español que «calvicie» en una imagen concreta de duelo. Mantiene el sustantivo de la zona afeitada o desnuda.
- source_word: כַּנֶּשֶׁר
  english_pob_choice: like the eagle
  chosen_spanish: como el águila
  alternatives_spanish:
  - como el buitre
  - como un ave de rapiña grande
  - como el águila o el buitre
  lexicon: HALOT
  rationale: Se conserva la elección principal del POB inglés. La nota a pie preserva la alternativa léxica documentada para נשר, sin imponerla en el texto principal.
- source_word: כִּי גָלוּ
  english_pob_choice: for they have gone ... into exile
  chosen_spanish: porque han ido al destierro
  alternatives_spanish:
  - porque fueron llevados al destierro
  - pues han sido desterrados
  - porque han ido al exilio
  lexicon: HALOT
  rationale: «Ir al destierro» reproduce bien גלה en este contexto de deportación/exilio y mantiene la razón del lamento.
- source_word: מִמֵּךְ
  english_pob_choice: from you
  chosen_spanish: lejos de ti
  alternatives_spanish:
  - de ti
  - apartándose de ti
  - desde ti
  lexicon: HALOT
  rationale: El hebreo marca separación. «Lejos de ti» hace explícita esa distancia en un español fluido, sin alterar el sentido básico de procedencia o alejamiento.
translation_notes:
  revision_awareness: La revisión más reciente indica que no hubo cambios necesarios y que la concordancia con el texto fuente es alta; por ello, el borrador mantiene la estructura y las imágenes principales sin introducir variaciones no atestiguadas.
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando aparece el nombre divino; este versículo no lo contiene.
  - Se conserva «destierro» para גלה en línea con la lectura de exilio/deportación del POB inglés.
  - «Hijos» traduce בנים en sentido inclusivo de descendencia/offspring según el contexto, sin masculinizar indebidamente la imagen.
  - La nota sobre כַּנֶּשֶׁר preserva la tensión léxica águila/buitre sin resolverla artificialmente en el texto principal.
