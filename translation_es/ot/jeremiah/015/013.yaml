review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la estructura básica del hebreo: bienes/tesoros entregados como botín, sin compensación, por causa de los pecados, con alcance territorial. Sin embargo, «por todo tu territorio» suena menos natural y menos preciso que una formulación distributiva más idiomática para וּבְכָל גְּבוּלֶיךָ. También conviene ajustar la nota para que explique la alternativa literal exacta del hebreo y evitar introducir «rescate», que no es el matiz principal de בִמְחִיר.'
  spanish_quality_summary: El texto es claro y digno, pero «Tu riqueza y tus tesoros los daré» resulta algo marcado; puede leerse mejor como «Entregaré tu riqueza y tus tesoros». Además, «a lo largo de todo tu territorio» o «por todo tu territorio» es comprensible, pero «en todo tu territorio» reproduce mejor el alcance distributivo en español bíblico natural. La nota actual es entendible, pero «sin compensación ni pago» es más fiel que «ni rescate».
  glossary_alignment: No hay conflictos con la terminología base del proyecto. «riqueza», «tesoros», «botín» y «pecados» son adecuados. La decisión causal de וּבְכָל חַטֹּאותֶיךָ como «por causa de todos tus pecados» está bien alineada con el rastro de auditoría inglés. La mejora propuesta afecta principalmente naturalidad española y precisión de la nota léxica.
  issues:
  - severity: medium
    issue: «por todo tu territorio» es menos natural y algo impreciso para וּבְכָל גְּבוּלֶיךָ
    rationale: El hebreo apunta al alcance dentro de todos los límites/territorio. En español, «en todo tu territorio» comunica mejor la extensión distributiva que «por todo tu territorio», que puede sonar a movimiento o recorrido.
  - severity: low
    issue: «Tu riqueza y tus tesoros los daré» suena algo rígido
    rationale: Aunque gramatical, el doblado con «los» después de dos objetos frontados puede sentirse pesado. «Entregaré tu riqueza y tus tesoros como botín» conserva el sentido con mejor fluidez.
  - severity: low
    issue: La nota usa «rescate», matiz no explicitado por לֹא בִמְחִיר
    rationale: El inglés auditado explica «without compensation or payment». «Rescate» introduce una noción más específica que no es necesaria aquí.
  revised_spanish_text: Entregaré tu riqueza y tus tesoros como botín[a], sin precio, por causa de todos tus pecados, en todo tu territorio.
  revised_footnotes:
  - marker: a
    text: O «sin pago»; literalmente, «no por precio», es decir, sin compensación ni pago.
    reason: lexical_alternative
  revision_rationale: 'Se hicieron ajustes menores de estilo y precisión: se cambió el orden verbal para mayor naturalidad en español, se afinó la frase territorial a «en todo tu territorio» para reflejar mejor el alcance distributivo del hebreo, y se corrigió la nota para ceñirse al matiz léxico documentado sin añadir «rescate». No se requiere nueva adjudicación, pues son reparaciones editoriales menores dentro de decisiones ya establecidas por la auditoría inglesa.'
