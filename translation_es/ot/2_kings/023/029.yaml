translation:
  language: es
  text: En sus días, el faraón Necao, rey de Egipto, subió contra el rey de Asiria hasta el río Éufrates[a]. Y el rey Josías fue a su encuentro[b][c], y lo mató en Meguido cuando lo vio.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: Necao; tradicionalmente, Necho.'
    reason: lexical_alternative
  - marker: b
    text: 'O, más explícitamente por interpretación: «el faraón Necao lo mató en Meguido cuando Josías fue a su encuentro». El hebreo usa pronombres de tercera persona ambiguos.'
    reason: alternative_reading
  - marker: c
    text: Véase también 2 Crónicas 35:20–24 para el relato paralelo de la muerte de Josías.
    reason: cross_reference
lexical_decisions:
- source_word: בְּיָמָיו
  english_pob_choice: In his days
  chosen_spanish: En sus días
  alternatives_spanish:
  - Durante su reinado
  - En su tiempo
  lexicon: HALOT
  rationale: La expresión hebrea es un giro temporal idiomático. «En sus días» conserva la estructura y el valor narrativo sin volverlo artificial en español.
- source_word: פַרְעֹה נְכֹה
  english_pob_choice: Pharaoh Neco
  chosen_spanish: el faraón Necao
  alternatives_spanish:
  - el faraón Neceo
  lexicon: HALOT
  rationale: Se mantiene el título y el nombre propio. «Necao» es una forma española inteligible y estable; la variante tradicional se conserva como alternativa de transliteración.
- source_word: עָלָה ... עַל
  english_pob_choice: went up against
  chosen_spanish: subió contra
  alternatives_spanish:
  - marchó contra
  - avanzó contra
  lexicon: HALOT
  rationale: עלה en contexto militar conserva el valor de ascender/ir hacia un objetivo hostil. «Subió contra» reproduce la imagen hebrea con naturalidad en español.
- source_word: עַל נְהַר פְּרָת
  english_pob_choice: to the Euphrates River
  chosen_spanish: hasta el río Éufrates
  alternatives_spanish:
  - al río Éufrates
  - hacia el río Éufrates
  lexicon: HALOT
  rationale: La segunda preposición עַל marca destino o alcance. «Hasta» comunica el movimiento y el límite alcanzado sin perder la referencia geográfica.
- source_word: מֶלֶךְ אַשּׁוּר
  english_pob_choice: the king of Assyria
  chosen_spanish: el rey de Asiria
  alternatives_spanish:
  - el rey asirio
  lexicon: HALOT
  rationale: Se mantiene el título regnal y el nombre del reino con la forma habitual en español bíblico contemporáneo.
- source_word: לִקְרָאתוֹ
  english_pob_choice: to meet him
  chosen_spanish: fue a su encuentro
  alternatives_spanish:
  - fue a reunirse con él
  - salió a su encuentro
  lexicon: HALOT
  rationale: El valor de לקראת puede ser neutral o confrontativo. «Fue a su encuentro» preserva esa amplitud sin añadir una motivación explícita que el hebreo no formula.
- source_word: וַיְמִיתֵהוּ
  english_pob_choice: he killed him
  chosen_spanish: lo mató
  alternatives_spanish:
  - lo hizo morir
  - le dio muerte
  lexicon: HALOT
  rationale: Aunque el binyán tiene fuerza causativa, en español «lo mató» expresa el hecho de manera directa y fiel al sentido narrativo, como en la revisión del POB en inglés.
- source_word: בִּמְגִדּוֹ
  english_pob_choice: at Megiddo
  chosen_spanish: en Meguido
  alternatives_spanish:
  - en Megido
  lexicon: HALOT
  rationale: Se usa la forma bíblica usual en español, manteniendo el topónimo como lugar de acontecimiento.
- source_word: כִּרְאֹתוֹ אֹתוֹ
  english_pob_choice: when he saw him
  chosen_spanish: cuando lo vio
  alternatives_spanish:
  - al verlo
  - cuando lo encontró
  lexicon: HALOT
  rationale: La secuencia pronominal hebrea es ambigua respecto al sujeto y al objeto. «Cuando lo vio» conserva la ambigüedad sintáctica sin resolverla interpretativamente.
theological_decisions:
- issue: Ambigüedad de los pronombres finales y del sujeto de la muerte
  english_pob_reading: Retain the Hebrew ambiguity with repeated 'he/him' rather than specifying the subject by interpretation.
  chosen_spanish_reading: Mantener la ambigüedad del hebreo sin especificar si Josías o Necao es el sujeto del último tramo.
  alternative_spanish_readings:
  - Y el faraón Necao lo mató en Meguido cuando Josías fue a su encuentro
  - Y lo mató en Meguido cuando lo vio
  rationale: El hebreo permite más de una lectura en la cláusula final, y la tradición paralela de 2 Crónicas 35:20–24 influye en algunas interpretaciones. La traducción principal no armoniza ni resuelve la ambigüedad más allá de lo que exige la gramática.
  doctrine_reference: Preservar la tensión textual y evitar una resolución interpretativa no explicitada por el hebreo.
translation_notes:
  revision_awareness: La versión inglesa más reciente simplificó «put him to death» a «killed him» para mayor naturalidad y correspondencia léxica. En español se siguió esa línea con «lo mató», manteniendo además la ambigüedad pronominal documentada en el aparato.
  spanish_consistency_notes:
  - Se usa «Yahvé» como norma general del proyecto, pero aquí el versículo no contiene el tetragrámaton ni una cita del nombre divino.
  - «Mesías/Cristo» no aplica en este versículo.
  - Se conserva la transliteración bíblica «Meguido» para uniformidad con el español del proyecto.
  - «Asiria» y «Egipto» se mantienen como nombres históricos establecidos en español bíblico.
  - La puntuación reproduce dos oraciones como en el flujo narrativo del hebreo y del POB inglés.
