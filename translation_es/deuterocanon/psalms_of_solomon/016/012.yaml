revisions:
- from: Pero establece mi alma con favor y alegría[a]; cuando fortalezcas mi alma[b], me bastará lo que ha sido dado.
  to: Pero afirma mi alma con favor y alegría[a]; cuando fortalezcas mi alma, me bastará lo dado[b].
  rationale: Se ajusta «establece» a «afirma» para reflejar mejor στήρισον en un español más natural y devocional, preservando la distinción con «fortalezcas» en la cláusula siguiente. Se sustituye «lo que ha sido dado» por «lo dado» para mantener la amplitud de τὸ δοθέν con mejor fluidez. La nota [b] permanece anclada en «me bastará», que es donde recae la alternativa léxica documentada.
