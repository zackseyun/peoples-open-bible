revisions:
- from: No prosperes en la herencia de un hombre malvado[a], no sea que seas quemado por las chispas de su fuego.
  to: No prosperes por la herencia de un hombre malvado[a], no sea que termines quemado por las chispas de su fuego.
  rationale: Se hizo una reparación menor para que el español exprese con mayor naturalidad la advertencia hebrea sin perder su fuerza léxica. «Por la herencia» comunica mejor la idea de prosperar mediante o a costa del patrimonio del malvado, y «termines quemado» mejora la fluidez manteniendo la imagen de sufrir daño por su fuego. También se pulió ligeramente la nota para un español más natural.
