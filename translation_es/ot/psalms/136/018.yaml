review_pass:
  verdict: revise
  source_alignment_summary: 'La base semántica está bien conservada: וַיַּהֲרֹג = «mató», מְלָכִים = «reyes», אַדִּירִים = «poderosos», y el refrán con כִּי ... לְעוֹלָם חַסְדּוֹ está representado. Sin embargo, la redacción española del estribillo no refleja con naturalidad el sentido verbal implícito de la fórmula repetida («endures forever») y queda sintácticamente forzada.'
  spanish_quality_summary: «y mató a reyes poderosos» es natural y claro. El problema está en «porque para siempre es su amor leal», que suena poco idiomático en español bíblico moderno y rompe la cadencia litúrgica. Una formulación como «porque su amor leal permanece para siempre» o «porque su amor leal es para siempre» mejora mucho la legibilidad; la primera refleja mejor el inglés auditado «endures forever».
  glossary_alignment: No hay conflicto con la terminología de proyecto. «amor leal» para חַסְדּוֹ es defendible como equivalente de «steadfast love». Conviene conservarlo aquí, pero en una construcción española más natural. También falta trasladar la nota léxica inglesa sobre «mighty/powerful» si se desea preservar la alternativa significativa ya documentada.
  issues:
  - severity: high
    issue: El estribillo «porque para siempre es su amor leal» es poco natural en español.
    rationale: Aunque cada término individual es defendible, el orden y la cópula producen una frase torpe y poco litúrgica. No comunica con claridad el valor durativo implícito de לְעוֹלָם en el refrán.
  - severity: medium
    issue: No se preservó la nota léxica documentada para אַדִּירִים.
    rationale: El English POB conserva la alternativa «powerful kings». En español conviene mantener una nota equivalente («O «reyes fuertes» / «reyes poderosos»») solo si hay contraste real con la opción elegida; aquí, como la opción principal ya es «poderosos», la nota debe reformularse a otra alternativa válida como «reyes fuertes» o puede omitirse. La nota sobre hesed tampoco es obligatoria, pero sí útil para mantener el rastro léxico documentado.
  revised_spanish_text: y mató a reyes poderosos[a], porque su amor leal[b] permanece para siempre.
  revised_footnotes:
  - marker: a
    text: O «reyes fuertes».
    reason: lexical_alternative
  - marker: b
    text: Hebreo hesed; también puede traducirse «misericordia», «amor constante» o «fidelidad de pacto».
    reason: lexical_alternative
  revision_rationale: Se conserva el sentido del hebreo y la decisión léxica principal, pero se corrige el estribillo para que suene natural en español y exprese mejor la duración continua implícita en la fórmula repetida del salmo. Se añaden notas léxicas útiles para reflejar alternativas documentadas sin sobrecargar el texto principal.
