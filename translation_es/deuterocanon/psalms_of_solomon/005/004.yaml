    reason: previous_rendering
lexical_decisions:
- source_word: λήψεται
  english_pob_choice: will take
  chosen_spanish: tomará
  alternatives_spanish:
  - recibirá
  - se apoderará de
  lexicon: BDAG
  rationale: El futuro medio de λαμβάνω aquí expresa la acción de tomar/adquirir botín. En español, "tomará" reproduce de forma natural la acción futura sin añadir un matiz que el griego no exige.
- source_word: σκῦλα
  english_pob_choice: plunder
  chosen_spanish: despojos
  alternatives_spanish:
  - plunder
  - botín
  lexicon: BDAG
  rationale: '"Despojos" transmite la idea de bienes tomados como botín y conserva un registro bíblico claro en español. "Botín" también sería posible, pero "despojos" refleja bien el valor de saqueo sin sonar demasiado moderno o demasiado coloquial.'
- source_word: παρὰ
  english_pob_choice: from
  chosen_spanish: de
  alternatives_spanish:
  - de parte de
  - desde
  lexicon: BDAG
  rationale: Con genitivo, παρά señala origen o procedencia; en español, "de" es la manera más directa y idiomática de expresar esa relación sin sobrecargar el verso.
- source_word: ἀνδρὸς δυνατοῦ
  english_pob_choice: a mighty man
  chosen_spanish: un hombre poderoso
  alternatives_spanish:
  - un hombre fuerte
  - un hombre valiente
  - un varón poderoso
  lexicon: BDAG
  rationale: ἀνήρ especifica "hombre" y δυνατός implica fuerza/poder. "Poderoso" conserva la amplitud del griego y suena natural en español. "Hombre fuerte" sería más físico; "varón" sería más marcado y menos idiomático aquí.
theological_decisions:
- issue: Valor indefinido del sujeto verbal
  english_pob_reading: For no one will take plunder from a mighty man.
  chosen_spanish_reading: Porque nadie tomará despojos de un hombre poderoso.
  alternative_spanish_readings:
  - Porque él no tomará despojos de un hombre poderoso.
  - Porque nadie recibirá despojos de un hombre poderoso.
  rationale: El griego presenta λήψεται sin sujeto explícito; la revisión inglesa lo trató como indefinido ('no one'). En español, "nadie" expresa mejor esa lectura proverbial y evita introducir un "él" sin antecedente. "Recibirá" sería posible, pero no captura tan directamente la idea de tomar botín.
  doctrine_reference: Cohesión sintáctica del texto; lectura proverbial del sujeto indefinido.
translation_notes:
  revision_awareness: La versión inglesa pasó de "For he will not take plunder from a mighty man." a "For no one will take plunder from a mighty man." para resolver un sujeto implícito ambiguo en λήψεται. La redacción española sigue esa revisión y mantiene el sujeto indefinido "nadie".
  spanish_consistency_notes:
  - He evitado "SEÑOR" o terminología no presente en el verso.
  - '"Despojos" preserva el campo semántico de botín/plunder sin volver el verso arcaizante.'
  - La estructura "Porque nadie tomará..." mantiene el paralelismo con la lectura proverbial del contexto inmediato.
