lexical_decisions:
- source_word: וְ/כָל
  english_pob_choice: And all
  chosen_spanish: Y todos
  alternatives_spanish:
  - Ahora todos
  lexicon: HALOT
  rationale: La coordinación hebrea simple se conserva con «Y», y כָּל se expresa naturalmente como «todos» para el sujeto colectivo.
- source_word: הַ/נְּבִאִים
  english_pob_choice: the prophets
  chosen_spanish: los profetas
  lexicon: HALOT
  rationale: Rendering directo y natural del sustantivo definido.
- source_word: נִבְּאִים
  english_pob_choice: were prophesying
  chosen_spanish: estaban profetizando
  alternatives_spanish:
  - profetizaban
  lexicon: HALOT
  rationale: El participio hebreo sugiere acción en curso; en español, el progresivo comunica mejor la simultaneidad de la escena.
- source_word: כֵּן
  english_pob_choice: thus
  chosen_spanish: así
  alternatives_spanish:
  - de este modo
  - de esta manera
  lexicon: HALOT
  rationale: «Así» preserva el adverbio de modo de forma breve y natural en español.
- source_word: לֵ/אמֹר
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - y diciendo
  lexicon: HALOT
  rationale: Fórmula estándar para introducir discurso directo; en español fluye con el resto de la oración.
- source_word: עֲלֵה
  english_pob_choice: Go up
  chosen_spanish: Sube
  alternatives_spanish:
  - Ve hacia arriba
  - Marcha
  lexicon: HALOT
  rationale: Se conserva el valor literal de עלה sin añadir una interpretación militar explícita que el hebreo no expresa aquí de manera directa.
- source_word: רָמֹת גִּלְעָד
  english_pob_choice: Ramoth-gilead
  chosen_spanish: Ramot-galaad
  alternatives_spanish:
  - Ramot de Galaad
  - Ramot Gilead
  lexicon: HALOT
  rationale: Topónimo transliterado en forma comprensible para español, manteniendo el compuesto sin traducirlo.
- source_word: וְ/הַצְלַח
  english_pob_choice: and succeed / and prosper
  chosen_spanish: y ten éxito
  alternatives_spanish:
  - y prospera
  - y prosperes
  lexicon: HALOT
  rationale: La raíz צלח admite «suceder» o «prosperar»; en español, «ten éxito» comunica con claridad el resultado deseado sin arcaísmo.
- source_word: וְ/נָתַ֥ן יְהוָ֖ה בְּ/יַ֥ד הַ/מֶּֽלֶךְ
  english_pob_choice: and Yahweh will give it into the hand of the king
  chosen_spanish: y Yahvé entregará en mano del rey
  alternatives_spanish:
  - y Yahvé lo pondrá en mano del rey
  - y Yahvé lo dará en mano del rey
  lexicon: HALOT
  rationale: Se mantiene la imagen hebrea de entrega «en mano» para preservar el modismo; el objeto implícito se omite como en el español puede quedar recuperado por contexto.
theological_decisions:
- issue: Renderización del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  rationale: La política del proyecto pide usar «Yahvé» en el texto principal para el Tetragrámaton, manteniendo el nombre divino en lugar de una sustitución titular.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Fuerza semántica de צלח en la exhortación
  english_pob_reading: succeed / prosper
  chosen_spanish_reading: ten éxito
  alternative_spanish_readings:
  - prospera
  - sé exitoso
  rationale: La forma imperativa pide una expresión exhortativa natural en español; «ten éxito» comunica la idea de éxito/resultado favorable sin perder la tensión lexical entre éxito y prosperidad.
  doctrine_reference: HALOT צלח
translation_notes:
  revision_awareness: 'Se corrigió la validación anterior: el marcador de nota [a] ahora aparece anclado en «éxito[a]», evitando notas sin referencia en el texto. También se ajustó el nombre divino a la terminología española del proyecto («Yahvé»).'
  spanish_consistency_notes:
  - Se mantiene la coordinación hebrea con «Y» al inicio.
  - «En mano del rey» conserva el modismo hebreo sin expandirlo a una paráfrasis explicativa.
  - El topónimo se translitera de modo estable como «Ramot-galaad».
