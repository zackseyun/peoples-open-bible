translation:
  language: es
  text: Unos eran acosados por apariciones aterradoras[a], y otros eran paralizados por la traición de su alma[b]; porque un temor súbito e inesperado cayó sobre ellos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «fantasmas» o «visiones». El griego se refiere a apariciones espantosas, probablemente espectrales o ilusorias.
    reason: lexical_alternative
  - marker: b
    text: Literalmente, «eran paralizados por la traición del alma». La frase puede indicar un derrumbe interior en el que el propio ser interno parece volverse contra la persona.
    reason: alternative_reading
lexical_decisions:
- source_word: τέρασιν
  english_pob_choice: terrifying
  chosen_spanish: aterradoras
  alternatives_spanish:
  - terribles
  - espantosas
  - monstruosas
  lexicon: LSJ
  rationale: τερασιν, en este contexto junto con φαντασμάτων, describe el carácter espantoso y ominoso de las apariciones, no «milagros» ni necesariamente «monstruos». «Aterradoras» comunica bien el matiz de terror y evita una lectura demasiado literal o técnica.
- source_word: ἠλαύνοντο
  english_pob_choice: were driven
  chosen_spanish: los impulsaban
  alternatives_spanish:
  - eran impulsados
  - los acosaban
  - los llevaban
  lexicon: LSJ
  rationale: El verbo pasivo/imperfectivo expresa ser empujados o acuciados por algo externo. «Los impulsaban» conserva la fuerza de una presión que los mueve, con un español natural y dinámico.
- source_word: φαντασμάτων
  english_pob_choice: apparitions
  chosen_spanish: apariciones
  alternatives_spanish:
  - fantasmas
  - visiones
  - manifestaciones fantasmales
  lexicon: LSJ
  rationale: φαντασμάτων puede ser «apariciones», «fantasmas» o «visiones». «Apariciones» mantiene el campo semántico de lo espectral sin comprometerse a que sean fantasmas literales.
- source_word: παρελύοντο
  english_pob_choice: were paralyzed
  chosen_spanish: los paralizaba
  alternatives_spanish:
  - los debilitaba
  - los anulaba
  - los desmayaba
  lexicon: LSJ
  rationale: El verbo indica aflojar, incapacitar o paralizar. «Paralizaba» reproduce la idea de incapacidad interior y física causada por el terror.
- source_word: προδοσίᾳ
  english_pob_choice: the betrayal
  chosen_spanish: la traición
  alternatives_spanish:
  - la perfidia
  - la deslealtad
  - el abandono
  lexicon: LSJ
  rationale: La traducción conserva el sustantivo fuerte «traición», como en el inglés POB, porque el griego mantiene una metáfora difícil que no conviene suavizar.
- source_word: τῆς ψυχῆς
  english_pob_choice: of their soul
  chosen_spanish: de su alma
  alternatives_spanish:
  - de su vida interior
  - de su interior
  - de su ser
  lexicon: LSJ
  rationale: ψυχή puede significar alma, vida o interior. Aquí se preserva «alma» porque la construcción con προδοσίᾳ apunta a un colapso interior expresado de manera antropológica.
- source_word: αἰφνίδιος ... καὶ ἀπροσδόκητος φόβος
  english_pob_choice: sudden and unexpected fear
  chosen_spanish: un temor súbito e inesperado
  alternatives_spanish:
  - un miedo repentino e imprevisto
  - un temor repentino y no esperado
  - un miedo súbito e insólito
  lexicon: LSJ
  rationale: La pareja de adjetivos intensifica la irrupción del miedo. «Temor súbito e inesperado» conserva la doble fuerza y mantiene un registro digno.
- source_word: ἐπῆλθεν
  english_pob_choice: came upon
  chosen_spanish: cayó sobre ellos
  alternatives_spanish:
  - vino sobre ellos
  - los sobrevino
  - los asaltó
  lexicon: LSJ
  rationale: La fórmula idiomática griega admite un verbo de irrupción. «Cayó sobre ellos» comunica con claridad la llegada repentina del temor y su peso opresivo.
theological_decisions:
- issue: 'τὰ δὲ τῆς ψυχῆς παρελύοντο προδοσίᾳ: mantener la imagen difícil del «colapso traicionero» interior'
  english_pob_reading: others were paralyzed by the betrayal of their soul
  chosen_spanish_reading: a otros los paralizaba la traición de su alma
  alternative_spanish_readings:
  - a otros los paralizaba una traición interior
  - a otros los paralizaba la deslealtad de su alma
  - a otros los paralizaba el abandono de su propia alma
  rationale: La frase griega es comprimida y metafórica. La versión española conserva la tensión sin resolverla en una explicación psicológica más concreta. Así se mantiene la imagen de un interior que, bajo el terror, parece volverse contra la persona.
  doctrine_reference: DOCTRINE.md §3 Preserve theological tension rather than resolve it
- issue: 'τέρασιν φαντασμάτων: evitar una lectura de ''señales'' o ''portentos'' demasiado positiva'
  english_pob_reading: terrifying apparitions
  chosen_spanish_reading: apariciones aterradoras
  alternative_spanish_readings:
  - visiones aterradoras
  - fantasmas aterradores
  - apariciones monstruosas
  rationale: El conjunto describe fenómenos aterradores, no prodigios benéficos. En español, «apariciones aterradoras» conserva el tono ominoso y evita una connotación positiva de 'portentos' o 'wonders'.
  doctrine_reference: DOCTRINE.md §3 Preserve theological tension rather than resolve it
translation_notes:
  revision_awareness: El texto español sigue la última revisión del inglés POB en el tono de «terrifying apparitions» y no en una lectura más fuerte como «monstruous»; además conserva la ambigüedad de la frase difícil sobre προδοσίᾳ τῆς ψυχῆς, sin explicitarla como simple miedo psicológico.
  spanish_consistency_notes:
  - Se mantuvo «alma» para ψυχή por coherencia antropológica con el inglés POB y por la fuerza de la metáfora.
  - Se evitó «Cristo»/«Mesías» porque no hay terminología cristológica en este versículo.
  - «Apariciones» se eligió como término base; «fantasmas» y «visiones» quedan como alternativas de nota, no como reemplazo en el texto principal.
  - «Temor» se prefirió a «miedo» por registro más solemne y por la repetición bíblica natural del sustantivo en español.
