revisions:
- from: 'Entonces Jonadab hijo de Simea[a], hermano de David, respondió y dijo: «No diga mi señor: “Han matado a todos los jóvenes, los hijos del rey”, porque Amnón solo[b] ha muerto. Pues por orden de Absalón esto había sido determinado desde el día en que humilló a Tamar, su hermana».'
  to: 'Entonces Jonadab hijo de Simea, hermano de David, respondió y dijo: «No diga mi señor: “Han matado a todos los jóvenes, los hijos del rey”, porque solo Amnón ha muerto. Pues esto había quedado determinado por orden de Absalón desde el día en que humilló[a] a Tamar, su hermana».'
  rationale: Se elimina la nota innecesaria sobre «Simea» y se reubica la nota léxica al verbo correcto («humilló»), en línea con el audit trail inglés y el hebreo ענה en este contexto. También se suaviza ligeramente la redacción de «había sido determinado» a «había quedado determinado» para mejor naturalidad sin perder el sentido resultativo de la cláusula.
