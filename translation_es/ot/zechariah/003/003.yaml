translation:
  language: es
  text: Y Josué estaba vestido con vestiduras[a] inmundas[b] y estaba de pie delante del ángel[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «ropas». El hebreo usa un término general para prendas de vestir; «vestiduras» mantiene un tono más digno en este contexto.
    reason: lexical_alternative
  - marker: b
    text: O «sucias»; el hebreo señala una condición intensamente inmunda. «Inmundas» preserva mejor esa fuerza que una expresión más débil.
    reason: lexical_alternative
  - marker: c
    text: O «el mensajero». En esta visión, «ángel» es la traducción más natural.
    reason: alternative_reading
lexical_decisions:
- source_word: וִ/יהוֹשֻׁעַ
  english_pob_choice: Now Joshua
  chosen_spanish: Y Josué
  alternatives_spanish:
  - Ahora Josué
  - Entonces Josué
  lexicon: HALOT
  rationale: El waw inicial aquí continúa la escena visionaria; en español, 'Y Josué' conserva esa progresión discursiva sin forzar un adverbio como 'Ahora' que suena más interpretativo.
- source_word: הָיָה
  english_pob_choice: was
  chosen_spanish: estaba
  alternatives_spanish:
  - fue
  - era
  lexicon: HALOT
  rationale: El verbo expresa estado continuo, no cambio de estado. 'Estaba' comunica de modo natural la condición de Josué en la escena.
- source_word: לָבֻשׁ
  english_pob_choice: clothed
  chosen_spanish: vestido
  alternatives_spanish:
  - clothed
  - puesto
  lexicon: HALOT
  rationale: En español, 'vestido' conserva el sentido estativo de 'clothed' y resulta natural. 'Puesto' sería demasiado coloquial y 'clothed' no es idiomático.
- source_word: בְּגָדִים
  english_pob_choice: garments
  chosen_spanish: ropas
  alternatives_spanish:
  - vestiduras
  - vestidos
  lexicon: HALOT
  rationale: '''Ropas'' es amplio y no especifica más de lo que el hebreo indica. ''Vestiduras'' sería más elevado, pero aquí no es necesario ni más preciso por sí mismo.'
- source_word: צוֹאִים
  english_pob_choice: filthy
  chosen_spanish: sucias
  alternatives_spanish:
  - inmundas
  - mugrientas
  - contaminadas
  lexicon: HALOT
  rationale: El término hebreo señala suciedad intensa y repulsiva. En español, 'sucias' comunica esa condición sin añadir una carga moral que el sustantivo por sí solo no exige; la dureza se puede explicar en nota si hace falta.
- source_word: וְ/עֹמֵד
  english_pob_choice: and was standing
  chosen_spanish: y estaba de pie
  alternatives_spanish:
  - y permanecía de pie
  - y estaba parado
  lexicon: HALOT
  rationale: El participio expresa una postura continua. 'Estaba de pie' es natural y solemne; 'parado' suena demasiado coloquial para este contexto visionario.
- source_word: לִ/פְנֵי
  english_pob_choice: before
  chosen_spanish: delante de
  alternatives_spanish:
  - en presencia de
  - ante
  lexicon: HALOT
  rationale: '''Delante de'' reproduce bien la relación espacial/personal y funciona con fluidez en español bíblico contemporáneo.'
- source_word: הַ/מַּלְאָךְ
  english_pob_choice: the angel
  chosen_spanish: el ángel
  alternatives_spanish:
  - el mensajero
  lexicon: HALOT
  rationale: En este contexto visionario, 'ángel' es la opción natural y más transparente para el lector español. 'Mensajero' es posible lexicalmente, pero menos idiomático aquí.
theological_decisions:
- issue: Identidad de הַמַּלְאָךְ en el contexto visionario
  english_pob_reading: the angel
  chosen_spanish_reading: el ángel
  alternative_spanish_readings:
  - el mensajero
  - el ángel de Yahvé
  rationale: El versículo nombra simplemente a 'el ángel' sin identificarlo más. La traducción evita introducir en el texto principal una identificación teológica más fuerte que la que el hebreo aquí expresa, preservando la tensión interpretativa del pasaje.
  doctrine_reference: Preservar la tensión teológica en lugar de resolverla prematuramente.
translation_notes:
  revision_awareness: 'La revisión más reciente no introdujo cambios: el texto inglés quedó sin modificaciones tras la verificación cruzada, con alto acuerdo entre revisores.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como forma de referencia al nombre divino en todo el proyecto, pero este versículo no lo contiene explícitamente.
  - Se evita «SEÑOR» como sustituto del nombre divino porque no aparece en el hebreo de este versículo.
  - «Ángel» se usa como equivalente contextual de מלאך en visión celestial, sin cerrar la posible identificación teológica.
  - 'El ritmo de la cláusula conserva la progresión descriptiva del hebreo: nombre + estado + vestimenta + postura + localización.'
