translation:
  language: es
  text: Ahora los filisteos llegaron y asaltaron[a] el Valle de Refaím.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «se desplegaron en el Valle de Refaím». El verbo hebreo puede denotar desplegarse o hacer una incursión; el contexto favorece una entrada militar hostil.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּ/פְלִשְׁתִּים
  english_pob_choice: Now the Philistines
  chosen_spanish: Ahora los filisteos
  alternatives_spanish:
  - Y los filisteos
  - Pero los filisteos
  lexicon: HALOT
  rationale: פְלִשְׁתִּים designa al pueblo filisteo; en español se traduce de forma natural como «los filisteos». El ו conjuntivo, como en el inglés POB con «Now», funciona aquí como avance narrativo y se vierte con «Ahora» para conservar fluidez sin perder la secuencia del relato.
- source_word: בָּאוּ
  english_pob_choice: came
  chosen_spanish: llegaron
  alternatives_spanish:
  - vinieron
  - habían llegado
  lexicon: HALOT
  rationale: El perfecto qal 3cp de בוא expresa llegada simple en la narración. «Llegaron» reproduce bien el movimiento de entrada sin añadir una relación temporal más fuerte que la del hebreo.
- source_word: וַיִּפְשְׁטוּ
  english_pob_choice: raided
  chosen_spanish: asaltaron
  alternatives_spanish:
  - se desplegaron
  - hicieron una incursión
  - invadieron
  lexicon: HALOT
  rationale: En este contexto militar, פשט no es solo ‘extenderse’ espacialmente, sino efectuar una incursión hostil. «Asaltaron» conserva el carácter ofensivo y narrativo de la acción. Se mantiene la tensión lexicográfica documentada entre una lectura de despliegue y una de incursión.
- source_word: בְּעֵמֶק
  english_pob_choice: the Valley of
  chosen_spanish: el Valle de
  alternatives_spanish:
  - en el valle de
  - en la llanura de
  lexicon: HALOT
  rationale: עֵמֶק significa ‘valle’. En español, con el nombre propio siguiente, la forma más natural y fiel es «el Valle de...», integrando la preposición ב de manera idiomática.
- source_word: רְפָאִים
  english_pob_choice: Rephaim
  chosen_spanish: Refaím
  alternatives_spanish:
  - los refaítas
  - Refaim
  lexicon: HALOT
  rationale: Aquí רְפָאִים funciona como topónimo en la expresión fija «Valle de Rephaim». Se translitera como «Refaím» para respetar el nombre propio y la tradición de transliteración usada en español bíblico cuando el término es un lugar.
translation_notes:
  revision_awareness: La versión inglesa auditada no requirió cambios en la última revisión; se mantuvo la decisión de traducir וַיִּפְשְׁטוּ con un verbo de incursión hostil, preservando la alternativa semántica de ‘desplegarse’ en nota.
  spanish_consistency_notes:
  - Se evita «SEÑOR» o cualquier sustitución no pertinente, porque el verso no contiene el nombre divino.
  - «Refaím» se conserva como topónimo y no como etnónimo, en línea con la lectura auditada del Valle de Rephaim.
  - La puntuación y el orden buscan un español bíblico claro sin calcar la sintaxis hebrea de forma artificial.
