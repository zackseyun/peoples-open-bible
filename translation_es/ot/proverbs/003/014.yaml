translation:
  language: es
  text: porque su ganancia[a] es mejor que la ganancia de la plata, y su rendimiento que el oro[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «su mercancía» / «su provecho» para סַחְרָהּ; el hebreo usa lenguaje comercial para expresar el valor que aporta la sabiduría.
    reason: lexical_alternative
  - marker: b
    text: O «oro fino»; חָרוּץ puede denotar oro especialmente precioso o refinado.
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  english_pob_choice: for
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  lexicon: HALOT
  rationale: Introduce la razón de la afirmación previa; en español, «porque» comunica bien la función explicativa sin sonar arcaico.
- source_word: טוֹב
  english_pob_choice: better
  chosen_spanish: mejor
  alternatives_spanish:
  - bueno
  - más valioso
  lexicon: HALOT
  rationale: En la construcción comparativa hebrea, «mejor» reproduce de forma natural el valor comparativo de טוֹב.
- source_word: סַחְרָהּ
  english_pob_choice: her profit
  chosen_spanish: su ganancia
  alternatives_spanish:
  - su mercancía
  - su comercio
  - su provecho
  lexicon: HALOT
  rationale: Conserva el campo comercial que el texto hebreo usa para hablar de lo que la sabiduría produce; «ganancia» funciona en español sin perder la metáfora.
- source_word: מִסְּחַר כָּסֶף
  english_pob_choice: than the profit of silver
  chosen_spanish: que la ganancia de la plata
  alternatives_spanish:
  - que el comercio de la plata
  - que la ganancia del dinero
  - que la plata
  lexicon: HALOT
  rationale: Mantiene el paralelismo con «ganancia» y deja visible la comparación comercial. «Plata» es la designación natural del metal precioso en español.
- source_word: כָּסֶף
  english_pob_choice: silver
  chosen_spanish: la plata
  alternatives_spanish:
  - la plata fina
  - la plata refinada
  lexicon: HALOT
  rationale: «Plata» es la equivalencia directa y clara para el metal mencionado.
- source_word: וּמֵחָרוּץ
  english_pob_choice: than gold
  chosen_spanish: que el oro
  alternatives_spanish:
  - que el oro fino
  - que el oro puro
  lexicon: HALOT
  rationale: El término puede referirse a oro especialmente fino o refinado; el texto principal usa «oro» por claridad, dejando abierta la matización en nota.
- source_word: תְּבוּאָתָהּ
  english_pob_choice: her yield
  chosen_spanish: su rendimiento
  alternatives_spanish:
  - su fruto
  - su producto
  - su cosecha
  lexicon: HALOT
  rationale: Preserva la idea de lo que la sabiduría produce o da como resultado. «Rendimiento» comunica el valor productivo sin reducirlo solo a agricultura.
translation_notes:
  revision_awareness: 'Se corrigió el problema de validación anterior: ahora ambos marcadores de nota, [a] y [b], aparecen exactamente en el texto español junto a las palabras correspondientes.'
  spanish_consistency_notes:
  - Se mantuvo el paralelismo comercial del hebreo con «ganancia» en ambos miembros.
  - Se eligió «plata» y «oro» como equivalentes claros y sobrios, dejando la posible intensificación de חָרוּץ en una nota.
  - El pronombre posesivo femenino «su» refleja que el sujeto implícito es la sabiduría personificada.
