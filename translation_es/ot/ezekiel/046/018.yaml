revisions:
- from: El príncipe no tomará ninguna de la herencia del pueblo[a], despojándolos de su propiedad. De su propia propiedad dará herencia a sus hijos, para que mi pueblo no sea dispersado[b], cada hombre de su propiedad.
  to: El príncipe no tomará nada de la herencia del pueblo[a], despojándolos de su propiedad. De su propia propiedad dará herencia a sus hijos, para que mi pueblo no sea dispersado[b], cada hombre lejos de su propiedad.
  rationale: Se ajustó «ninguna de la herencia» a «nada de la herencia» por naturalidad y fidelidad semántica en español. Se mantuvo «despojándolos de su propiedad» porque expresa bien la desposesión forzada del contexto. En la cláusula final se añadió «lejos de» para que el distributivo «cada hombre» tenga una relación sintáctica clara con la idea de dispersión desde su propiedad. También se simplificó la nota a para hacerla más clara y más cercana a las alternativas léxicas documentadas.
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T22:27:41Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura del hebreo: prohibición al príncipe de tomar de la herencia del pueblo, contraste con dar herencia a sus hijos de su propia propiedad, y propósito de evitar la dispersión del pueblo de sus posesiones. Sin embargo, hay dos puntos de fidelidad/claridad que requieren ajuste: «no tomará ninguna de la herencia» es español poco natural y mejor expresa el sentido distributivo como «no tomará nada de la herencia» o «no tomará parte alguna»; y «mi pueblo no sea dispersado, cada hombre de su propiedad» queda sintácticamente incompleto en español, donde conviene explicitar «alejado/expulsado/dispersado de su propiedad» para reflejar el hebreo distributivo final.'
  spanish_quality_summary: 'La redacción es generalmente clara y digna, pero presenta construcciones poco idiomáticas: «ninguna de la herencia» suena forzado, y la clausula final «cada hombre de su propiedad» no funciona bien en español corriente. Además, la nota a usa demasiadas alternativas y una glosa algo confusa; conviene simplificarla y alinearla mejor con el expediente inglés. Con pequeños ajustes, el versículo queda natural, preciso y coherente.'
  glossary_alignment: «El príncipe» está bien alineado con נָשִׂיא. «Herencia» y «propiedad» preservan correctamente נַחֲלָה / אֲחֻזָּה en este contexto legal-territorial. «Despojándolos de su propiedad» es una buena solución contextual para לְהוֹנֹתָם + מֵאֲחֻזָּתָם, en línea con la revisión inglesa hacia la idea de desposesión. «Cada hombre» preserva adecuadamente אִישׁ como distributivo masculino, pero debe integrarse mejor en la sintaxis española.
  issues:
  - severity: medium
    issue: «no tomará ninguna de la herencia del pueblo» es poco idiomático en español
    rationale: Aunque intenta reflejar el valor distributivo de «any», en español suena antinatural. «No tomará nada de la herencia del pueblo» o «no tomará parte alguna» comunica mejor el sentido sin pérdida de precisión.
  - severity: high
    issue: La frase final «cada hombre de su propiedad» queda gramatical y semánticamente incompleta
    rationale: El hebreo expresa que el pueblo no sea dispersado, cada uno de su propiedad. En español hace falta una formulación que conecte claramente la dispersión con la salida forzada de la propiedad, por ejemplo «cada hombre lejos de su propiedad» o «cada hombre de su propiedad» precedido por «apartado/expulsado».
  - severity: low
    issue: La nota a está sobrecargada y no reproduce con claridad la lógica de alternativas del expediente inglés
    rationale: El inglés conserva alternativas como «wronging them» o «defrauding them» para el sentido de opresión. La nota española puede simplificarse a alternativas léxicas directas y claras.
  revised_spanish_text: El príncipe no tomará nada de la herencia del pueblo[a], despojándolos de su propiedad. De su propia propiedad dará herencia a sus hijos, para que mi pueblo no sea dispersado[b], cada hombre lejos de su propiedad.
  revised_footnotes:
  - marker: a
    text: O «haciéndoles injusticia» o «defraudándolos».
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «cada hombre»; la expresión es distributiva y se refiere a cada individuo entre el pueblo.'
    reason: lexical_alternative
  revision_rationale: Se ajustó «ninguna de la herencia» a «nada de la herencia» por naturalidad y fidelidad semántica en español. Se mantuvo «despojándolos de su propiedad» porque expresa bien la desposesión forzada del contexto. En la cláusula final se añadió «lejos de» para que el distributivo «cada hombre» tenga una relación sintáctica clara con la idea de dispersión desde su propiedad. También se simplificó la nota a para hacerla más clara y más cercana a las alternativas léxicas documentadas.
