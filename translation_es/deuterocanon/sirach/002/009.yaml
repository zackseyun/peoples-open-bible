  glossary_alignment: 'Buena alineación con la terminología del proyecto: יְהוָה → ‘Yahvé’; חֶסֶד → ‘misericordia’ con alternativas señaladas; no hay conflictos teológicos mayores. La decisión de mantener ‘el bien’ en vez de ‘cosas buenas’ respeta la primacía del hebreo y el rastro de auditoría inglés.'
