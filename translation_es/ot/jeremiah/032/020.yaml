revisions:
- from: que puso señales y prodigios en la tierra de Egipto, y en Israel y entre la humanidad hasta este día; y te hiciste un nombre, como en este día.
  to: que puso señales y prodigios en la tierra de Egipto, y en Israel y entre la humanidad[a] hasta este día, y te hiciste un nombre, como sucede hasta hoy.
  rationale: Se corrige la frase final para expresar con español natural el sentido de כַּיּוֹם הַזֶּה como estado presente resultante (‘como sucede hasta hoy’). Se añade una nota léxica sobre אָדָם para conservar la justificación del English POB respecto al valor colectivo del término. También se suaviza la puntuación para mejor fluidez.
