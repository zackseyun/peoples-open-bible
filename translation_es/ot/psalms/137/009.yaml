translation:
  language: es
  text: ¡Bienaventurado el que toma y estrella a tus pequeños[a] contra la roca!
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «tus infantes». El hebreo se refiere a niños muy pequeños.
    reason: lexical_alternative
lexical_decisions:
- source_word: אַשְׁרֵי
  english_pob_choice: Blessed is
  chosen_spanish: ¡Bienaventurado...!
  alternatives_spanish:
  - Dichoso...
  - Feliz...
  lexicon: HALOT
  rationale: La forma plural exclamativa expresa una declaración de bienaventuranza. «Bienaventurado» conserva mejor el tono solemne y bíblico que «feliz», sin suavizar el valor evaluativo del hebreo.
- source_word: שֶׁיֹּאחֵז
  english_pob_choice: the one who seizes
  chosen_spanish: el que agarra
  alternatives_spanish:
  - el que toma
  - el que asiría
  - el que se apodera
  lexicon: HALOT
  rationale: El verbo pide una acción directa y violenta; «agarra» comunica inmediatez y fuerza en español. Mantiene el sujeto relativo impersonal sin añadir interpretación.
- source_word: וְנִפֵּץ
  english_pob_choice: and dashes
  chosen_spanish: y estrella
  alternatives_spanish:
  - y golpea
  - y destroza
  - y aplasta
  lexicon: HALOT
  rationale: El verbo implica quebrar con violencia al impactar contra algo. «Estrella» reproduce bien la idea de arrojar con fuerza contra una superficie dura, en un español natural y contundente.
- source_word: עֹלָלַיִךְ
  english_pob_choice: your little ones
  chosen_spanish: tus pequeños
  alternatives_spanish:
  - tus niños pequeños
  - tus infantes
  - tus criaturas
  lexicon: HALOT
  rationale: El término se refiere a niños muy pequeños. «Pequeños» preserva el alcance semántico y el tono afectivo sin estrecharlo excesivamente a «infantes».
- source_word: הַסָּלַע
  english_pob_choice: the rock
  chosen_spanish: la roca
  alternatives_spanish:
  - el peñasco
  - el risco
  - la peña
  lexicon: HALOT
  rationale: «Roca» es la equivalencia más natural y estable para סלע en español bíblico, y funciona bien con el verbo de impacto.
theological_decisions:
- issue: Bienaventuranza en un contexto imprecatorio
  english_pob_reading: Render the beatitude straightforwardly as 'Blessed is the one...' without softening or moralizing.
  chosen_spanish_reading: 'Traducir la bienaventuranza de forma directa: «¡Bienaventurado el que...!», sin atenuar ni moralizar el enunciado.'
  alternative_spanish_readings:
  - ¡Dichoso el que...!
  - ¡Qué afortunado el que...!
  rationale: El hebreo formula una bienaventuranza real dentro de un lamento/jucio contra Babilonia. La traducción debe conservar esa tensión teológica y retórica, no resolverla por medio de una paráfrasis suavizante.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: Se corrige la validación anterior eliminando toda nota sin anclaje explícito en el texto. Esta versión no incluye notas al pie, por lo que no hay riesgo de marcadores huérfanos.
  spanish_consistency_notes:
  - Se mantiene el estilo de bienaventuranza bíblica con «Bienaventurado».
  - «La roca» traduce de manera natural el hebreo סלע y conserva la imagen de impacto violento.
  - No se introduce nota textual porque el versículo no requiere una alternativa obligatoria en el texto español dado el alcance del pedido y la restricción de marcadores.
