review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador capta bien el sentido general del verso: Sabiduría beneficia a quienes la aman con bienes y llena sus depósitos. Sin embargo, «para heredar bienes» desajusta el valor causativo de לְהַנְחִיל, porque en español hace que «los que me aman» parezcan los agentes de heredar en vez de los receptores a quienes Sabiduría hace poseer o da en herencia. La nota también refleja ese mismo problema. El resto del paralelismo con «llenar» y la referencia a bienes/tesoros está sustancialmente alineado con el hebreo y con el POB inglés.'
  spanish_quality_summary: El español es claro y legible, pero «para heredar bienes a los que me aman» suena algo forzado y poco natural. Una formulación como «para dar bienes en herencia a los que me aman» o «para hacer que los que me aman hereden bienes» expresa mejor el sentido y mejora la fluidez. «Sus tesoros» es entendible, aunque «sus tesoros» puede sonar más al contenido que al lugar; aun así, en español poético funciona aceptablemente.
  glossary_alignment: No hay conflictos con la terminología base del proyecto. Las decisiones para «bienes» y «tesoros» son aceptables dentro del campo semántico documentado, aunque para לְהַנְחִיל conviene una formulación española que preserve explícitamente el matiz de ‘hacer heredar / dar en herencia’ documentado en la auditoría inglesa.
  issues:
  - severity: high
    issue: לְהַנְחִיל está mal reflejado por «para heredar»
    rationale: 'El hiphil de נחל es causativo/benefactivo: ‘hacer heredar’, ‘dar en posesión’, ‘dar en herencia’. «Para heredar» en español cambia la relación semántica y omite el agente implícito de Sabiduría como quien concede.'
  - severity: medium
    issue: La nota [a] repite el mismo problema verbal
    rationale: «para heredar sustancia» no preserva la alternativa inglesa «to cause those who love me to inherit substance». La nota debe reflejar el causativo, no solo el infinitivo simple.
  - severity: low
    issue: «sus tesoros» podría leerse más como riquezas que como depósitos/tesorerías
    rationale: El hebreo אוֹצָר puede referirse a tesorerías, almacenes o tesoros. En poesía española «tesoros» es viable, pero conviene mantener conciencia de la imagen concreta del plural.
  revised_spanish_text: para dar bienes[a] en herencia a los que me aman, y para llenar sus tesoros.
  revised_footnotes:
  - marker: a
    text: 'O: «para hacer que los que me aman hereden sustancia»; el hebreo יֵשׁ también puede entenderse como «sustancia», «posesiones» o «bienes».'
    reason: lexical_alternative
  revision_rationale: 'Se corrigió לְהַנְחִיל para reflejar su sentido causativo/benefactivo en español natural: Sabiduría da bienes en herencia, no simplemente ‘hereda’. Se mantuvo «bienes» para יֵשׁ y «tesoros» para conservar el paralelismo poético y la claridad. La nota se ajustó para preservar la alternativa léxica documentada por el POB inglés sin introducir un español antinatural.'
