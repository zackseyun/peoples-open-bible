lexical_decisions:
- source_word: Ἰούδας
  english_pob_choice: Judas
  chosen_spanish: Judas
  alternatives_spanish:
  - Judá
  lexicon: LSJ
  rationale: Es un nombre propio personal, no el territorio ni el patriarca en función nominal aquí. En español, "Judas" conserva la forma transliterada de uso común y sigue de cerca el valor del texto griego.
- source_word: ὁ καλούμενος
  english_pob_choice: who was called
  chosen_spanish: que era llamado
  alternatives_spanish:
  - el llamado
  - llamado
  lexicon: BDAG
  rationale: La frase participial articular identifica un epíteto conocido. "Que era llamado" mantiene la relación descriptiva del griego y suena natural en español bíblico moderno.
- source_word: Μακκαβαῖος
  english_pob_choice: Maccabeus
  chosen_spanish: Macabeo
  alternatives_spanish:
  - Maccabeo
  - Maccabeus
  lexicon: LSJ
  rationale: El griego ofrece Μακκαβαῖος como forma nominal del sobrenombre. "Macabeo" es la adaptación española más inteligible y fiel al epíteto; se conserva el valor propio del nombre sin sustituirlo por una explicación interpretativa.
translation_notes:
  revision_awareness: El texto griego transmitido para 1 Macabeos 2:4 es breve y coincide plenamente con el registro auditado en inglés; no se observan revisiones textuales ni variantes relevantes para este versículo. La decisión principal recae en la forma española del epíteto Μακκαβαῖος.
  spanish_consistency_notes:
  - Se mantuvo "Judas" como nombre propio establecido en español bíblico, en paralelo con la decisión inglesa.
  - Se conservó la estructura identificadora del griego con "que era llamado", evitando una paráfrasis más libre.
  - Se prefirió "Macabeo" como forma española natural del sobrenombre, con nota de alternativa para reflejar la transliteración griega.
