    reason: alternative_reading
  - marker: c
    text: O “tu esplendor” o “tu belleza”.
    reason: lexical_alternative
  revision_rationale: Se corrigió la frase inicial para un español más natural ('luz durante el día'), se reubicó la nota léxica [a] al segmento correspondiente a וּלְנֹגַהּ, y se anclaron las demás notas en las palabras relevantes ('Yahvé' y 'gloria'). No fue necesario cambiar el sentido principal ni la terminología doctrinal.
