    text: 'O: «La culpa es mía, señor mío». El hebreo es una fórmula breve de autoasunción de culpa: literalmente, «sobre mí, señor mío, la culpa».'
    reason: lexical_alternative
  - marker: b
    text: Lit., «en tus oídos»; es un hebraísmo para decir que hable de modo que la oigas.
    reason: lexical_alternative
  revision_rationale: Se ajusta el hebraísmo «a tus oídos» a un español natural que preserva el sentido idiomático del original y del inglés POB auditado, dejando la literalidad en nota. También se mejora levemente la cadencia de la autoasunción de culpa sin alterar el significado.
