    issue: «estas cosas» es innecesariamente pesado para אֶת אֵלֶּה
    rationale: El hebreo solo requiere el demostrativo «estas». Añadir «cosas» introduce una literalidad torpe y menos idiomática en español; el inglés auditado también eligió simplemente «these».
  - severity: medium
