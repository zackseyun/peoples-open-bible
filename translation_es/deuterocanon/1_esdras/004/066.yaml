  - marker: c
    text: Lit. «enviar allí»; el español explicita el objeto («los objetos») para que la frase sea clara.
    reason: lexical_alternative
  revision_rationale: Se revisa para reflejar con más fidelidad la repetición de ηὔξατο en el griego y en el rastro POB, mejorando además la naturalidad de 'hizo un voto' y reemplazando 'utensilios' por 'objetos', que suena más adecuado en contexto de objetos del templo sin sobreespecificar.
