  text: וַ/יֹּ֣אמֶר אֲלֵ/הֶ֗ם יְהִ֨י כֵ֤ן יְהוָה֙ עִמָּ/כֶ֔ם כַּ/אֲשֶׁ֛ר אֲשַׁלַּ֥ח אֶתְ/כֶ֖ם וְ/אֶֽת טַפְּ/כֶ֑ם רְא֕וּ כִּ֥י רָעָ֖ה נֶ֥גֶד פְּנֵי/כֶֽם־׃
base_translation:
  language: en
  yaml_path: translation/ot/exodus/010/010.yaml
  text: And he said to them[a], “May Yahweh indeed be with you, if I ever send you and your little ones out! See[b], for evil is before your faces.”
  footnotes:
  - marker: a
    text: Or, “The LORD be with you when I send you and your little ones,” likely spoken sarcastically.
    reason: alternative_reading
  - marker: b
    text: 'Hebrew is ambiguous: this may mean “disaster is before you” or “you have evil in view / in mind.”'
    reason: lexical_alternative
