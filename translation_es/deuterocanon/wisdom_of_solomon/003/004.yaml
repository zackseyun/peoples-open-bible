translation:
  language: es
  text: Porque aun si son castigados[a] a la vista de los hombres, su esperanza está llena de inmortalidad.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «si son disciplinados» o «si son corregidos». El griego puede denotar sufrimiento punitivo o correctivo; aquí la expresión «a la vista de los hombres» subraya la perspectiva humana antes que la realidad definitiva.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐν ὄψει ἀνθρώπων
  english_pob_choice: in the sight of men
  chosen_spanish: a la vista de los hombres
  alternatives_spanish:
  - ante los hombres
  - a los ojos de los hombres
  - en la opinión de los hombres
  lexicon: LSJ
  rationale: La expresión griega señala una perspectiva observacional humana, no solo ubicación física. «A la vista de los hombres» conserva ese matiz de apariencia externa y su contraste con la realidad última.
- source_word: ἐὰν κολασθῶσιν
  english_pob_choice: if they are punished
  chosen_spanish: si son castigados
  alternatives_spanish:
  - si son disciplinados
  - si son corregidos
  - si son castigados o corregidos
  lexicon: BDAG
  rationale: κολάζω puede implicar castigo o corrección disciplinaria. En español, «castigados» preserva la fuerza léxica principal sin decidir indebidamente entre retribución y disciplina correctiva; el contexto de la visión humana mantiene la tensión.
- source_word: ἡ ἐλπὶς αὐτῶν
  english_pob_choice: their hope
  chosen_spanish: su esperanza
  alternatives_spanish:
  - la esperanza de ellos
  lexicon: BDAG
  rationale: El posesivo natural en español comunica de forma directa la esperanza que les pertenece a ellos.
- source_word: ἀθανασίας
  english_pob_choice: of immortality
  chosen_spanish: de inmortalidad
  alternatives_spanish:
  - de imperishabilidad
  - para inmortalidad
  lexicon: LSJ
  rationale: «Inmortalidad» es la forma más clara y estable en español para ἀθανασία, y conserva el contenido del genitivo como cualidad o plenitud de la esperanza.
- source_word: πλήρης
  english_pob_choice: is full of
  chosen_spanish: está llena de
  alternatives_spanish:
  - está colmada de
  - está repleta de
  lexicon: BDAG
  rationale: La construcción española idiomática más natural es «está llena de». Mantiene la idea de plenitud predicada de la esperanza, no solo su orientación hacia la inmortalidad.
theological_decisions:
- issue: El sufrimiento de los justos frente a la apariencia humana
  english_pob_reading: Rendered κολασθῶσιν as 'are punished' while allowing the verse's contrast to show that this is the appearance from a human perspective, not necessarily a divine verdict of guilt.
  chosen_spanish_reading: Se traduce «si son castigados» y se conserva «a la vista de los hombres» para mantener que el juicio es aparente desde la perspectiva humana, sin afirmar que Dios los condene.
  alternative_spanish_readings:
  - si son disciplinados
  - si son corregidos
  rationale: La frase griega explícitamente sitúa la acción «a la vista de los hombres». Por eso la traducción debe mantener la tensión entre el sufrimiento visible y la esperanza real, sin resolverla doctrinalmente.
  doctrine_reference: Preservar la tensión teológica entre apariencia humana y realidad última.
translation_notes:
  revision_awareness: La revisión más reciente no introdujo cambios; el texto inglés quedó confirmado como equivalente óptimo y la formulación española sigue de cerca esa decisión sin añadir interpretaciones no atestiguadas.
  spanish_consistency_notes:
  - Se usa «Dios» solo donde el texto lo requiera; aquí no aparece el nombre divino.
  - «Castigados» conserva la fuerza de κολασθῶσιν sin cerrar la ambigüedad entre castigo y corrección.
  - «A la vista de los hombres» mantiene el contraste entre apariencia humana y esperanza verdadera.
  - «Inmortalidad» se usa como término doctrinalmente claro y lingüísticamente natural en español.
