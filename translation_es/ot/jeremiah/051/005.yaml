translation:
  language: es
  text: Porque Israel y Judá no han quedado viudos[a] de su Dios, de Yahvé de los Ejércitos[b], aunque su tierra está llena de culpa contra el Santo de Israel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «desamparados». El hebreo usa la imagen de quedar sin esposo, aplicada aquí a Israel y Judá como pueblo colectivo.
    reason: lexical_alternative
  - marker: b
    text: 'Traducción tradicional: «el Señor de los Ejércitos».'
    reason: lexical_alternative
lexical_decisions:
- source_word: אַלְמָן
  english_pob_choice: widowed
  chosen_spanish: huérfanos
  alternatives_spanish:
  - viudos
  - desamparados
  - abandonados
  lexicon: HALOT
  rationale: El hebreo expresa la imagen de quedar sin esposo; en español, «huérfanos» comunica la idea relacional de desamparo, pero como también puede sonar menos preciso para un colectivo nacional, se conserva la tensión con una nota alternativa. «Viudos» sería más literal, pero suena menos natural aplicado a Israel y Judá como entidades corporativas.
- source_word: מֵאֱלֹהָיו מֵיְהוָה צְבָאוֹת
  english_pob_choice: from their God, from Yahweh of Armies
  chosen_spanish: de su Dios, de Yahvé de los Ejércitos
  alternatives_spanish:
  - de su Dios, de Yahvé de los Ejércitos
  - de su Dios, de Yahvé de los Ejércitos
  - de su Dios, de Yahvé de los Ejércitos
  lexicon: HALOT
  rationale: La preposición de separación se refleja con «de», y el nombre divino se mantiene como «Yahvé» según el criterio del proyecto. «De los Ejércitos» conserva el valor militar/cósmico de צבאות de manera transparente.
- source_word: אַרְצָם
  english_pob_choice: their land
  chosen_spanish: su tierra
  alternatives_spanish:
  - su país
  - su territorio
  lexicon: HALOT
  rationale: «Tierra» es el equivalente bíblico natural para אֶרֶץ en este contexto territorial y teológico; «país» moderniza demasiado, y «territorio» suena técnico.
- source_word: מָלְאָה אָשָׁם
  english_pob_choice: is full of guilt
  chosen_spanish: está llena de culpa
  alternatives_spanish:
  - está llena de pecado
  - está llena de culpabilidad
  - está colmada de culpa
  lexicon: HALOT
  rationale: אָשָׁם puede designar culpa o culpa-ofrenda; aquí el sentido moral exige «culpa». «Llena de culpa» conserva la carga de responsabilidad sin convertirla en un término sacrificial.
- source_word: מִקְּדֹשׁ יִשְׂרָאֵל
  english_pob_choice: against the Holy One of Israel
  chosen_spanish: contra el Santo de Israel
  alternatives_spanish:
  - ante el Santo de Israel
  - delante del Santo de Israel
  - frente al Santo de Israel
  lexicon: HALOT
  rationale: La revisión inglesa favorece la lectura de ofensa dirigida hacia Dios; en español, «contra» expresa mejor esa dirección. «Santo de Israel» mantiene el título profético fijo con un registro bíblico claro.
theological_decisions:
- issue: Valor concesivo de la segunda כִּי
  english_pob_reading: though their land is full of guilt against the Holy One of Israel
  chosen_spanish_reading: aunque su tierra está llena de culpa contra el Santo de Israel
  alternative_spanish_readings:
  - porque su tierra está llena de culpa contra el Santo de Israel
  - ya que su tierra está llena de culpa contra el Santo de Israel
  rationale: «Aunque» preserva la tensión teológica entre la fidelidad continua de Dios y la culpa real de Judá e Israel. Un valor causal suavizaría indebidamente esa tensión.
  doctrine_reference: Translation philosophy §3 (Preserve theological tension rather than resolve it)
translation_notes:
  revision_awareness: 'La redacción sigue la revisión más reciente del audit trail: se adopta la lectura de culpa dirigida «contra» el Santo de Israel, y se mantiene la fuerza concesiva de la segunda כִּי. También se conserva el nombre divino como Yahvé, en coherencia con el criterio del proyecto y sin recurrir a una sustitución por «SEÑOR».'
  spanish_consistency_notes:
  - Se usa «Yahvé» para יהוה, no «SEÑOR».
  - Se mantiene «Santo de Israel» como título fijo.
  - «Cupla»/«culpa» se usa en sentido moral, no sacrificial.
  - Se procura un español bíblico claro, sin depender de giros tradicionales que oculten el sentido del hebreo.
