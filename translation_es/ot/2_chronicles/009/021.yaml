translation:
  language: es
  text: Pues el rey tenía naves que iban a Tarsis con los siervos de Huram; una vez cada tres años solían llegar las naves de Tarsis, trayendo oro y plata, marfil, monos y pavos reales[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'loros' para el último elemento de la lista del cargamento; el nombre hebreo del animal es incierto.
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Porque
  - Ya que
  lexicon: HALOT
  rationale: Introduce una explicación causal o justificativa en español. 'Porque' conserva bien la relación discursiva del hebreo y suena natural al inicio de una oración explicativa.
- source_word: אֳנִיּוֹת
  english_pob_choice: ships
  chosen_spanish: naves
  alternatives_spanish:
  - barcos
  - navíos
  - naves
  lexicon: HALOT
  rationale: '''Naves'' es una equivalencia digna y plenamente válida en español para embarcaciones de este contexto, con un registro bíblico sin sonar arcaizante de manera excesiva.'
- source_word: לַמֶּלֶךְ
  english_pob_choice: the king had
  chosen_spanish: el rey tenía
  alternatives_spanish:
  - del rey
  - para el rey
  - el rey poseía
  lexicon: HALOT
  rationale: El hebreo expresa literalmente 'para/al rey', pero el contexto narrativo permite posesión. 'Tenía' reproduce esa posesión de manera idiomática en español sin añadir más que el sentido contextual.
- source_word: הֹלְכוֹת תַּרְשִׁישׁ
  english_pob_choice: going to Tarshish
  chosen_spanish: que iban a Tarsis
  alternatives_spanish:
  - que se dirigían a Tarsis
  - naves de Tarsis
  - de Tarsis
  lexicon: HALOT
  rationale: Se conserva el valor verbal del participio, como en el inglés POB, porque aquí la construcción apunta al destino o ruta. 'Tarsis' es la forma española usual del topónimo.
- source_word: עִם עַבְדֵי חוּרָם
  english_pob_choice: with Huram’s servants
  chosen_spanish: con los siervos de Huram
  alternatives_spanish:
  - con los servidores de Huram
  - con los hombres de Huram
  - con los siervos de Juram
  lexicon: HALOT
  rationale: '''עבדים'' puede ser ''siervos'' o ''esclavos''; aquí el contexto de personal real al servicio de Huram favorece ''siervos'' como el equivalente más natural en español, evitando introducir una dureza social que el pasaje no enfatiza.'
- source_word: אַחַת לְשָׁלֹשׁ שָׁנִים
  english_pob_choice: once every three years
  chosen_spanish: una vez cada tres años
  alternatives_spanish:
  - una vez en tres años
  - cada tres años
  - de tres en tres años
  lexicon: HALOT
  rationale: Expresa la frecuencia distributiva habitual del hebreo de forma clara y natural en español.
- source_word: תָּבֹאנָה
  english_pob_choice: would come
  chosen_spanish: llegaban
  alternatives_spanish:
  - venían
  - arribaban
  - solían llegar
  lexicon: HALOT
  rationale: El imperfecto hebreo describe una acción habitual repetida en el pasado. 'Llegaban' transmite ese valor habitual sin forzar el futuro o la modalidad en español.
- source_word: אֳנִיּוֹת תַּרְשִׁישׁ
  english_pob_choice: the ships of Tarshish
  chosen_spanish: las naves de Tarsis
  alternatives_spanish:
  - las naves que iban a Tarsis
  - las naves de Tarshish
  - las naves tarsis
  lexicon: HALOT
  rationale: Aquí se mantiene la expresión nominal tradicional en español, equivalente a la forma constructa hebrea. No se resuelve como si fuera sólo destino verbal, porque el texto repite la expresión nominal al final.
- source_word: נֹשְׂאוֹת
  english_pob_choice: carrying
  chosen_spanish: trayendo
  alternatives_spanish:
  - llevando
  - transportando
  - portando
  lexicon: HALOT
  rationale: '''Trayendo'' comunica bien el transporte de mercancías en español narrativo y conserva el sentido de carga que el participio expresa.'
- source_word: זָהָב וָכֶסֶף
  english_pob_choice: gold and silver
  chosen_spanish: oro y plata
  alternatives_spanish:
  - oro y plata
  - oro y dinero
  - oro y metal precioso
  lexicon: HALOT
  rationale: Equivalencia directa de los términos de mercancía preciosos.
- source_word: שֶׁנְהַבִּים
  english_pob_choice: ivory
  chosen_spanish: marfil
  alternatives_spanish:
  - marfil
  - colmillos de elefante
  lexicon: HALOT
  rationale: '''Marfil'' es el equivalente comercial y natural en español para el hebreo, que designa el material.'
- source_word: וְקוֹפִים
  english_pob_choice: monkeys
  chosen_spanish: monos
  alternatives_spanish:
  - monos
  - simios
  - monos o simios
  lexicon: HALOT
  rationale: '''Monos'' es el equivalente más común y directo en español, conservando la lista de mercancías exóticas sin sobrerinterpretar la especie.'
- source_word: וְתוּכִּיִּים
  english_pob_choice: peacocks
  chosen_spanish: pavos reales
  alternatives_spanish:
  - pavos reales
  - loros
  - aves exóticas
  lexicon: HALOT
  rationale: Se sigue la decisión tradicional del inglés POB, que deja constancia de la identificación principal. El español usa la forma establecida 'pavos reales' para el valor convencional del término.
theological_decisions:
- issue: Expresión de la posesión en la cláusula inicial
  english_pob_reading: the king had ships going to Tarshish
  chosen_spanish_reading: el rey tenía naves que iban a Tarsis
  alternative_spanish_readings:
  - las naves pertenecían al rey y iban a Tarsis
  - el rey disponía de naves que iban a Tarsis
  rationale: No hay una cuestión doctrinal fuerte, pero sí una decisión de sintaxis con efecto interpretativo. Se opta por una posesión idiomática que reproduce el sentido contextual sin convertir la preposición hebrea en una relación meramente abstracta.
  doctrine_reference: none
- issue: Posible tensión léxica en el término para los tripulantes de Huram
  english_pob_reading: Huram’s servants
  chosen_spanish_reading: los siervos de Huram
  alternative_spanish_readings:
  - los esclavos de Huram
  - los servidores de Huram
  rationale: Se preserva la tensión entre 'siervo' y 'esclavo' sin borrar el trasfondo. Aquí el contexto de servicio cortesano inclina a 'siervos', mientras que 'esclavos' sería demasiado específico y potencialmente engañoso para el lector español.
  doctrine_reference: none
translation_notes:
  revision_awareness: El inglés POB reciente permanece sin cambios y la evaluación cruzada indica alto acuerdo. La presente propuesta sigue de cerca ese audit trail, manteniendo la misma decisión de sentido para la expresión final incierta y trasladando al español la misma cautela léxica mediante nota.
  spanish_consistency_notes:
  - Se conserva 'Yahvé' como término por defecto en este proyecto, pero este versículo no contiene el nombre divino.
  - Se usa 'Tarsis' como topónimo español estándar, coherente con el uso bíblico habitual en español.
  - Se mantiene un registro bíblico natural sin arcaísmos innecesarios.
  - La nota sobre 'pavos reales' preserva la incertidumbre léxica del hebreo, paralela a la nota inglesa sobre 'parrots'.
