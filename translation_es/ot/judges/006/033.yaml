translation:
  language: es
  text: Entonces todo Madián y Amalec y los pueblos del oriente se reunieron[a], cruzaron y acamparon en el valle de Jezreel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «hijos del oriente», un modismo para referirse a pueblos orientales.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְ/כָל מִדְיָן
  english_pob_choice: all Midian
  chosen_spanish: todo Madián
  alternatives_spanish:
  - todos los madianitas
  - todo el territorio de Madián
  lexicon: HALOT
  rationale: El hebreo usa un colectivo étnico-territorial. Mantengo la forma breve y fuente-cercana «todo Madián», que conserva el valor colectivo sin añadir un sufijo interpretativo que el texto no exige.
- source_word: וַ/עֲמָלֵק
  english_pob_choice: and Amalek
  chosen_spanish: y Amalec
  alternatives_spanish:
  - y los amalecitas
  lexicon: HALOT
  rationale: Como en el inglés POB, el nombre funciona de modo colectivo. «Amalec» preserva la forma hebrea y evita expandir a un plural étnico que no está explícito en el hebreo.
- source_word: וּ/בְנֵי קֶדֶם
  english_pob_choice: and the people of the East
  chosen_spanish: y los pueblos del oriente
  alternatives_spanish:
  - y los hijos del oriente
  - y la gente del oriente
  lexicon: HALOT
  rationale: בני קדם es un modismo para pueblos orientales. «Pueblos del oriente» transmite el sentido colectivo y geográfico en español moderno mejor que la calca «hijos del oriente», que suena menos natural.
- source_word: נֶאֶסְפ֣וּ יַחְדָּ֑ו
  english_pob_choice: gathered together
  chosen_spanish: se reunieron juntos
  alternatives_spanish:
  - se juntaron juntos
  - fueron reunidos juntos
  lexicon: HALOT
  rationale: El nifal de אסף expresa reunión/agrupación. «Se reunieron juntos» refleja la idea de asamblea y el יחדו adverbial; aunque es algo redundante en español, preserva el énfasis del original sin suavizarlo demasiado.
- source_word: וַ/יַּעַבְר֥וּ
  english_pob_choice: crossed over
  chosen_spanish: cruzaron
  alternatives_spanish:
  - pasaron
  - atravesaron
  lexicon: HALOT
  rationale: עָבַר en contexto militar indica avance o cruce. «Cruzaron» es breve y natural, y mantiene el movimiento geográfico implícito del hebreo, como en el inglés POB.
- source_word: וַֽ/יַּחֲנ֖וּ
  english_pob_choice: camped
  chosen_spanish: acamparon
  alternatives_spanish:
  - acamparon allí
  - plantaron su campamento
  lexicon: HALOT
  rationale: חנה en narrativa militar significa instalar campamento. «Acamparon» es la equivalencia directa y clara en español contemporáneo.
- source_word: בְּ/עֵ֥מֶק יִזְרְעֶֽאל
  english_pob_choice: in the Valley of Jezreel
  chosen_spanish: en el valle de Jezreel
  alternatives_spanish:
  - en el valle de Esdrelón
  - en la llanura de Jezreel
  lexicon: HALOT
  rationale: עֵמֶק denota valle/depresión. «Valle de Jezreel» es la designación geográfica estándar y legible en español, manteniendo el nombre propio sin reinterpretarlo como llanura.
translation_notes:
  revision_awareness: El texto sigue de cerca el hebreo masorético y coincide sustancialmente con el audit trail inglés; no se identificaron revisiones aplicadas ni variantes textuales relevantes para este versículo.
  spanish_consistency_notes:
  - Se usa «Yahvé» como convención del proyecto solo cuando el tetragrámaton aparece explícitamente; aquí no aparece.
  - Se conservan los nombres propios «Madián», «Amalec» y «Jezreel» como formas transliteradas habituales y reconocibles en español.
  - La repetición de «juntos» refleja יחדו; aunque puede sentirse enfática, evita diluir el énfasis de reunirse como un solo cuerpo.
