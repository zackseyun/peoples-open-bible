translation:
  language: es
  text: para que lleguen a ser hijos de su Padre de ustedes, que está en los cielos, porque hace salir su sol sobre malos y buenos, y hace llover sobre justos e injustos.
  philosophy: optimal-equivalence
  footnotes: []
lexical_decisions:
- source_word: ὅπως
  english_pob_choice: so that
  chosen_spanish: para que
  alternatives_spanish:
  - a fin de que
  - para que así
  lexicon: BDAG
  rationale: Introduce una cláusula de propósito/resulto. «Para que» es natural en español y conserva el valor final sin endurecer el estilo.
- source_word: γένησθε
  english_pob_choice: you may become
  chosen_spanish: lleguen a ser
  alternatives_spanish:
  - sean
  - lleguen a ser
  lexicon: BDAG
  rationale: El verbo γίνομαι pide un matiz de llegar a ser o entrar en una condición. «Lleguen a ser» conserva la fuerza verbal mejor que un simple «sean».
- source_word: υἱοὶ
  english_pob_choice: sons
  chosen_spanish: hijos
  alternatives_spanish:
  - hijos
  - hijos varones
  lexicon: BDAG
  rationale: Aunque el griego dice literalmente «hijos varones/sones», en español «hijos» puede reproducir la filiación sin sonar forzado o excluir al oyente general. Se preserva la relación filial; la nota explica el plural masculino del original.
- source_word: τοῦ πατρὸς ὑμῶν
  english_pob_choice: of your Father
  chosen_spanish: de su Padre
  alternatives_spanish:
  - de vuestro Padre
  - de su Padre
  lexicon: BDAG
  rationale: En español bíblico actual, el posesivo de tratamiento reverente suele expresarse mejor con «su» en lugar de «vuestro» para un registro más amplio y natural, sin perder la relación filial.
- source_word: τοῦ ἐν οὐρανοῖς
  english_pob_choice: in heaven
  chosen_spanish: que está en los cielos
  alternatives_spanish:
  - en el cielo
  - que está en el cielo
  lexicon: BDAG
  rationale: El griego usa el plural οὐρανοῖς. «Que está en los cielos» refleja mejor la forma plural y la circunlocución mateana, evitando aplanarla sin necesidad.
- source_word: τὸν ἥλιον αὐτοῦ
  english_pob_choice: his sun
  chosen_spanish: su sol
  alternatives_spanish:
  - el sol de él
  - su sol
  lexicon: BDAG
  rationale: Se conserva el posesivo explícito. «Su sol» es el equivalente natural y mantiene la idea de pertenencia y providencia divina.
- source_word: ἀνατέλλει
  english_pob_choice: makes ... rise
  chosen_spanish: hace salir
  alternatives_spanish:
  - hace que salga
  - levanta
  lexicon: BDAG
  rationale: Con «sol» como objeto, el español exige una formulación causativa. «Hace salir» reproduce la agencia divina con naturalidad.
- source_word: ἐπὶ πονηροὺς καὶ ἀγαθοὺς
  english_pob_choice: on evil and good
  chosen_spanish: sobre malos y buenos
  alternatives_spanish:
  - sobre el malvado y el bueno
  - sobre malos y buenos
  lexicon: BDAG
  rationale: Los adjetivos funcionan sustantivamente. «Malos y buenos» es breve, equilibrado y conserva el paralelismo sentencioso.
- source_word: βρέχει
  english_pob_choice: sends rain
  chosen_spanish: hace llover
  alternatives_spanish:
  - envía lluvia
  - llueve
  lexicon: BDAG
  rationale: Aunque el verbo literalmente significa «llover», en español «hace llover» expresa la agencia divina de manera clara y idiomática.
- source_word: ἐπὶ δικαίους καὶ ἀδίκους
  english_pob_choice: on righteous and unrighteous
  chosen_spanish: sobre justos e injustos
  alternatives_spanish:
  - sobre los justos y los injustos
  - sobre rectos e injustos
  lexicon: BDAG
  rationale: «Justos e injustos» reproduce bien el par moral tradicional para δίκαιος/ἄδικος y conserva el ritmo paralelo del versículo.
theological_decisions:
- issue: Lenguaje filial masculino en υἱοὶ
  english_pob_reading: sons of your Father
  chosen_spanish_reading: hijos de su Padre
  alternative_spanish_readings:
  - hijos varones de su Padre
  - hijas e hijos de su Padre
  rationale: El original usa υἱοὶ, un término filial masculino. En español, «hijos» transmite la filiación sin introducir una expresión torpe o demasiado marcada, mientras la nota conserva la observación sobre la forma griega. No se sustituye por un genérico que borre el dato textual, pero se prioriza la fluidez del castellano.
  doctrine_reference: DOCTRINE.md Translation philosophy §4
- issue: Relación entre γένησθε y la identidad de los discípulos
  english_pob_reading: may become
  chosen_spanish_reading: lleguen a ser
  alternative_spanish_readings:
  - sean
  - proven a ser
  rationale: La forma verbal conserva el matiz de llegar a una condición visible o manifestada por la conducta. No se añade una afirmación doctrinal sobre el mecanismo de adopción; se mantiene el valor ético del dicho de Jesús.
  doctrine_reference: DOCTRINE.md Affirmations; Translation philosophy §3
- issue: Circunlocución de 'los cielos'
  english_pob_reading: in heaven
  chosen_spanish_reading: que está en los cielos
  alternative_spanish_readings:
  - en el cielo
  - en los cielos
  rationale: Mateo usa con frecuencia una expresión reverente plural. En español, «en los cielos» conserva mejor esa forma que reducirla a un singular idiomático. La redacción final integra la circunlocución en forma natural.
  doctrine_reference: DOCTRINE.md Translation philosophy §2
translation_notes:
  revision_awareness: Este borrador sigue de cerca el texto griego SBLGNT y el audit trail inglés POB. Se conservó el valor final de ὅπως, la fuerza verbal de γένησθε, el posesivo de τὸν ἥλιον αὐτοῦ y el paralelismo moral de πονηροὺς/ἀγαθοὺς y δικαίους/ἀδίκους. Frente al inglés, se optó por una solución española que refleja mejor el plural de οὐρανοῖς mediante «los cielos», manteniendo la lectura mateana sin recurrir a una paráfrasis.
  spanish_consistency_notes:
  - Se usa «Yahvé» como norma general en la serie, pero este versículo no contiene el nombre divino explícito.
  - Se preserva el lenguaje filial sin introducir «Cristo» ni terminología eclesiástica ajena al versículo.
  - «Hijos» en la nota explica la forma griega; el texto principal privilegia naturalidad idiomática en español.
  - «Justos e injustos» mantiene el par moral tradicional y el paralelismo retórico del griego.
  - La decisión de «que está en los cielos» responde a la forma plural de οὐρανοῖς y a la costumbre mateana.
