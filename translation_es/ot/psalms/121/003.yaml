translation:
  language: es
  text: No permitirá que tu pie resbale[a][b]; el que te guarda no dormitará.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Puede leerse también: «Que no permita que tu pie resbale; que el que te guarda no dormite». El hebreo admite tanto una lectura de súplica como una de afirmación.'
    reason: alternative_reading
  - marker: b
    text: 'O: «sea movido», «tambalee» o «tropiece» por «resbale».'
    reason: lexical_alternative
lexical_decisions:
- source_word: אַֽל יִתֵּן לַמּוֹט
  english_pob_choice: He will not let your foot slip
  chosen_spanish: No permitirá que tu pie resbale
  alternatives_spanish:
  - No dejará que tu pie resbale
  - No permitirá que tu pie se mueva
  - No permitirá que tu pie tropiece
  lexicon: HALOT
  rationale: En este giro, נתן con ל + infinitivo funciona como ‘permitir/dejar’. En español, ‘permitirá que’ comunica bien ese valor permisivo sin perder el tono poético. ‘Resbale’ conserva la imagen concreta de perder apoyo; ‘mueva/tropiece’ quedan como alternativas válidas porque el hebreo incluye la idea de inestabilidad, no solo de deslizamiento.
- source_word: רַגְלֶךָ
  english_pob_choice: your foot
  chosen_spanish: tu pie
  alternatives_spanish:
  - tus pies
  lexicon: HALOT
  rationale: El singular hebreo con sufijo de segunda persona singular se mantiene como singular en español. ‘Pie’ preserva la imagen concreta y sigue el uso idiomático natural del texto.
- source_word: יָנוּם
  english_pob_choice: will slumber
  chosen_spanish: se adormecerá
  alternatives_spanish:
  - se dormirá
  - se dormitará
  - cabeceará
  lexicon: HALOT
  rationale: נוּם expresa adormecerse o dormitar más que el sueño pleno. ‘Se adormecerá’ conserva mejor ese matiz que ‘dormirá’, manteniendo además el registro poético. La forma reflexiva refleja el estado del vigilante sin añadir un sujeto distinto.
- source_word: שֹׁמְרֶךָ
  english_pob_choice: your keeper
  chosen_spanish: tu guardián
  alternatives_spanish:
  - tu protector
  - el que te guarda
  - tu centinela
  lexicon: HALOT
  rationale: שמר se refiere a guardar, vigilar, proteger. ‘Guardián’ es breve, claro y mantiene la idea de vigilancia continua; también conserva la repetición temática de ‘guardar’ en el salmo. ‘Protector’ explicita la función, pero pierde algo del eco lexical del hebreo.
theological_decisions:
- issue: 'Fuerza de las negativas con imperfecto: promesa o deseo'
  english_pob_reading: 'Declarative assurance: ''He will not... your keeper will not...'''
  chosen_spanish_reading: 'Afirmación de seguridad: ‘No permitirá... no se adormecerá...’'
  alternative_spanish_readings:
  - Que no permita que tu pie resbale; que tu guardián no se adormezca
  - No permita que tu pie resbale; no se adormezca tu guardián
  rationale: El hebreo puede oírse como súplica o como certeza. Siguiendo la lectura de la POB inglesa, el español principal opta por una afirmación confiada, apta para el contexto del salmo. Las alternativas preservan la tensión jussiva sin resolverla de modo excesivo.
  doctrine_reference: Translation philosophy §3 (preserve tension rather than resolve it)
- issue: ¿‘Guardián’ o ‘el que guarda’ para שֹׁמֵר?
  english_pob_reading: your keeper
  chosen_spanish_reading: tu guardián
  alternative_spanish_readings:
  - el que te guarda
  - tu protector
  rationale: ‘Guardián’ mantiene el papel activo de vigilancia y evita suavizar el término con una paráfrasis demasiado interpretativa. Sin embargo, se reconoce que ‘el que te guarda’ expresa con más transparencia la raíz verbal; por eso queda como alternativa.
  doctrine_reference: Lexical consistency with Psalm 121 theme of divine keeping
translation_notes:
  revision_awareness: Consulta concordada con el texto hebreo masorético (WLC) y con la auditoría inglesa POB. La versión inglesa reciente permanece sin cambios; el español conserva esa decisión, pero ajusta la dicción para que ‘permitirá que’ y ‘se adormecerá’ reflejen mejor el valor idiomático hebreo sin perder el tono de certeza del salmo.
  spanish_consistency_notes:
  - Se mantiene ‘tu’ singular para רַגְלֶךָ y שֹׁמְרֶךָ.
  - Se preserva el campo semántico de vigilancia con ‘guardián’ para שֹׁמֵר.
  - No se usa ‘SEÑOR’ ni un equivalente de máscara, porque este versículo no contiene el tetragrámaton.
  - La ambigüedad entre promesa y súplica queda señalada en la nota, no borrada del texto principal.
  - ‘Resbale’ conserva la imagen física de pérdida de firmeza sin añadir un tropiezo no explicitado como lectura principal.
