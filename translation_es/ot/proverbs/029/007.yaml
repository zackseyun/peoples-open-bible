base_translation:
  language: en
  yaml_path: translation/ot/proverbs/029/007.yaml
  text: A righteous man knows the case of the poor[b][a]; a wicked man does not understand knowledge.
  footnotes:
  - marker: a
    text: Or 'A righteous man knows the rights/justice of the poor.' The Hebrew דִּין can mean 'case,' 'cause,' or 'justice.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew simply 'does not understand knowledge'; the translation 'such knowledge' makes explicit the implied connection to the previous clause.
    reason: lexical_alternative
