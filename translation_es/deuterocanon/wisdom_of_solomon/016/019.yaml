translation:
  language: es
  text: Pero a veces[a], aun en medio del agua, el fuego arde más allá de su poder, para destruir el producto injusto[b] de la tierra.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, ‘más allá del poder del fuego’; es decir, el fuego actúa más allá de su fuerza normal aun rodeado de agua.
    reason: lexical_alternative
  - marker: b
    text: Literalmente, ‘el producto/descendencia injusto(a) de la tierra’. La frase probablemente se refiere al rendimiento de la tierra en conexión con los injustos.
    reason: lexical_alternative
lexical_decisions:
- source_word: ποτὲ δὲ
  english_pob_choice: But at times
  chosen_spanish: Pero a veces
  alternatives_spanish:
  - Y en cierta ocasión
  - A veces
  lexicon: LSJ
  rationale: Conserva el matiz ocasional y el giro contrastivo de la partícula, con una conjunción natural en español.
- source_word: μεταξὺ ὕδατος
  english_pob_choice: in the midst of water
  chosen_spanish: aun en medio del agua
  alternatives_spanish:
  - en medio del agua
  - entre las aguas
  lexicon: LSJ
  rationale: ‘En medio del agua’ preserva la imagen paradójica; ‘aun’ refuerza la tensión del contraste sin añadir sentido ajeno al griego.
- source_word: ὑπὲρ τὴν πυρὸς δύναμιν
  english_pob_choice: beyond its power
  chosen_spanish: más allá de su poder
  alternatives_spanish:
  - más allá del poder del fuego
  - por encima de su fuerza
  lexicon: LSJ
  rationale: ὑπέρ con acusativo expresa superación/exceso. ‘Más allá de su poder’ sigue de cerca la revisión inglesa y mantiene la idea de que el fuego actúa fuera de su capacidad ordinaria.
- source_word: φλέγει
  english_pob_choice: fire burns
  chosen_spanish: el fuego arde
  alternatives_spanish:
  - arde
  - el fuego se consume
  lexicon: LSJ
  rationale: El verbo expresa arder/quemar; se explicita el sujeto implícito por claridad española y por contexto.
- source_word: ἵνα
  english_pob_choice: so that it may
  chosen_spanish: para
  alternatives_spanish:
  - a fin de que
  - para que
  lexicon: LSJ
  rationale: En español, la finalidad se expresa de manera natural con ‘para’ sin perder la relación final/resultativa.
- source_word: ἄδικον
  english_pob_choice: unrighteous
  chosen_spanish: injusto
  alternatives_spanish:
  - impío
  - malvado
  - injusto
  lexicon: LSJ
  rationale: ‘Injusto’ mantiene el valor moral-jurídico de ἄδικος; evita resolver la tensión hacia una paráfrasis más confesional que el griego no exige por sí mismo.
- source_word: γῆς γέννημα
  english_pob_choice: produce of the earth
  chosen_spanish: producto de la tierra
  alternatives_spanish:
  - fruto de la tierra
  - producción de la tierra
  - lo que la tierra produce
  lexicon: LSJ
  rationale: γέννημα designa lo producido o engendrado. ‘Producto de la tierra’ es claro y conserva la referencia agrícola/generativa sin interpretar en exceso.
- source_word: διαφθείρῃ
  english_pob_choice: destroy
  chosen_spanish: destruir
  alternatives_spanish:
  - arruinar
  - consumir
  - corromper
  lexicon: LSJ
  rationale: ‘Destruir’ comunica bien el efecto devastador del juicio y coincide con la lectura auditada.
theological_decisions:
- issue: El referente moral de ἄδικον aplicado a γῆς γέννημα
  english_pob_reading: the produce is described as 'unrighteous' because it belongs to or serves the unjust, not because vegetation is morally agentive
  chosen_spanish_reading: el producto es llamado 'injusto' por su asociación con los injustos, no porque la vegetación actúe moralmente
  alternative_spanish_readings:
  - ‘producto malvado de la tierra’ como adaptación más idiomática
  - ‘offspring injusto de la tierra’ como versión más literal
  rationale: 'La formulación española conserva la tensión del griego: el adjetivo recae directamente sobre el producto, pero la lectura debe entenderse por su vínculo con los injustos. No se suaviza ni se moraliza indebidamente el sustantivo.'
  doctrine_reference: Preservar la tensión lexical y teológica; equivalencia óptima
translation_notes:
  revision_awareness: La redacción sigue la revisión más reciente del audit trail, que prefirió una forma más directa para ὑπὲρ τὴν πυρὸς δύναμιν (‘beyond its power’) y mantiene la elección de un sujeto explícito para φλέγει. También conserva la tensión de ἄδικον γῆς γέννημα sin diluirla en una paráfrasis interpretativa.
  spanish_consistency_notes:
  - Se usa ‘Dios/Yahvé’ no aplica en este versículo; no se introduce terminología teológica ajena.
  - ‘Injusto’ se mantiene como equivalente de ἄδικον para coherencia con el registro sapiencial-jurídico.
  - ‘Producto de la tierra’ conserva el valor de γέννημα sin imponer ‘fruto’ donde podría sonar más restringido.
  - Se mantiene un estilo formal y publicable, con una sintaxis clara y cercana al orden del original.
