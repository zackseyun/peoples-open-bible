    reason: alternative_reading
  revision_rationale: Se ajustó el título divino a la decisión revisada del POB inglés ('Dios de la verdad'), preservando en nota las alternativas ligadas a אָמֵן. También se mejoró la naturalidad del español en la cláusula final y se afinó 'former troubles' como 'calamidades anteriores'. Se mantuvo 'en la tierra' con nota alternativa por tratarse de una reparación menor, aunque el rastro inglés principal favorece 'land'.
