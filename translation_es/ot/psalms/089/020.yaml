source:
  edition: WLC
  text: אָ֤ז דִּבַּ֥רְתָּֽ בְ/חָ֡זוֹן לַֽ/חֲסִידֶ֗י/ךָ וַ/תֹּ֗אמֶר שִׁוִּ֣יתִי עֵ֭זֶר עַל גִּבּ֑וֹר הֲרִימ֖וֹתִי בָח֣וּר מֵ/עָֽם־־׃
base_translation:
  language: en
  yaml_path: translation/ot/psalms/089/020.yaml
  text: Then you spoke in a vision to your faithful ones and said[a], “I have set help upon a mighty one[d][c][b]; I have exalted one chosen from the people.”
  footnotes:
  - marker: a
    text: Or, according to another reading reflected in some versions, “to your faithful one.”
    reason: textual_variant
  - marker: b
    text: “Mighty man” could also be rendered “warrior,” “hero,” or “mighty one.”
    reason: lexical_alternative
  - marker: c
    text: “One chosen” may also be understood as “young man,” but here the context of divine selection favors “chosen.”
    reason: lexical_alternative
  - marker: d
    text: Or 'I have set help upon a mighty man'.
    reason: previous_rendering
