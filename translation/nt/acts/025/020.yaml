id: ACT.25.20
reference: Acts 25:20
source:
  edition: SBLGNT
  text: ἀπορούμενος δὲ ἐγὼ τὴν περὶ ⸀τούτων ζήτησιν ἔλεγον εἰ βούλοιτο πορεύεσθαι εἰς ⸀Ἱεροσόλυμα κἀκεῖ κρίνεσθαι περὶ τούτων.
translation:
  text: And since I was at a loss about the investigation concerning these matters[b][a], I asked whether he wanted to go to Jerusalem and be judged there concerning them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'being perplexed about the dispute concerning these matters.'
    reason: lexical_alternative
  - marker: b
    text: Or 'whether he was willing to go to Jerusalem and be tried there concerning these matters.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀπορούμενος
  chosen: since I was at a loss
  alternatives:
  - being perplexed
  - being uncertain
  - being at a loss
  lexicon: BDAG
  rationale: The participle conveys uncertainty or perplexity. 'At a loss' is idiomatic modern English that preserves Festus's claimed uncertainty without sounding overly formal. Rendering it with 'since' captures the participle's causal force in context.
- source_word: ζήτησιν
  chosen: investigation
  alternatives:
  - dispute
  - question
  - inquiry
  lexicon: BDAG
  rationale: In this legal setting, Festus refers to the matter under examination. 'Investigation' fits the judicial-administrative context better than the more abstract 'question' or the more adversarial 'dispute,' while still reflecting the noun's sense of inquiry.
- source_word: περὶ τούτων
  chosen: concerning these matters
  alternatives:
  - about these things
  - concerning these things
  lexicon: BDAG
  rationale: '''These matters'' is natural English in a legal context and avoids wooden repetition while preserving the demonstrative reference to the charges under discussion.'
- source_word: ἔλεγον
  chosen: I asked
  alternatives:
  - I was saying
  - I said
  lexicon: BDAG
  rationale: Although the verb is literally 'I was saying,' the following indirect question introduced by εἰ shows the functional sense is 'I asked.' This is a standard optimal-equivalence adjustment for clear English.
- source_word: εἰ βούλοιτο
  chosen: whether he wanted
  alternatives:
  - whether he was willing
  - whether he wished
  lexicon: BDAG
  rationale: The optative after εἰ in indirect discourse expresses the content of Festus's question. 'Wanted' is clear modern English; 'was willing' is possible but slightly narrower, emphasizing consent more than desire.
- source_word: πορεύεσθαι
  chosen: to go
  alternatives:
  - to travel
  - to proceed
  lexicon: BDAG
  rationale: The verb commonly means to go or travel. 'Go' is the most natural and sufficient rendering here.
- source_word: Ἱεροσόλυμα
  chosen: Jerusalem
  lexicon: BDAG
  rationale: Standard English transliteration of the place name, in keeping with the translation philosophy of transliterating names.
- source_word: κἀκεῖ
  chosen: and be judged there
  alternatives:
  - and there be judged
  - and be tried there
  lexicon: BDAG
  rationale: The adverb means 'and there.' In English, placing 'there' after the passive infinitive yields natural word order. 'Judged' preserves the broader judicial sense of κρίνεσθαι without narrowing it to a formal trial only.
- source_word: κρίνεσθαι
  chosen: be judged
  alternatives:
  - be tried
  - have his case decided
  lexicon: BDAG
  rationale: The passive infinitive in this context refers to legal adjudication. 'Be judged' is closer to the Greek and broad enough to include formal legal proceedings.
- source_word: περὶ τούτων
  chosen: concerning them
  alternatives:
  - about these matters
  - concerning these charges
  lexicon: BDAG
  rationale: The second occurrence refers back to the same disputed matters. 'Concerning them' avoids awkward repetition while preserving the referent.
