base_translation:
  language: en
  yaml_path: translation/ot/1_samuel/020/025.yaml
  text: The king sat in his seat[a], as at other times, by the wall; and Jonathan rose, and Abner sat beside Saul, but David’s place was empty.
  footnotes:
  - marker: a
    text: Or “David’s place was missing,” that is, his assigned place at the meal was unoccupied.
    reason: lexical_alternative
