translation:
  language: es
  text: Porque él subyugará la tierra[a] para siempre[b] con la palabra de su boca[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Tierra» también puede entenderse como «país» o «territorio».
    reason: lexical_alternative
  - marker: b
    text: 'O: «Porque él herirá la tierra con la palabra de su boca para siempre».'
    reason: previous_rendering
  - marker: c
    text: Esta línea probablemente evoca Isaías 11:4, donde el rey ideal juzga y hiere con la palabra de su boca.
    reason: cross_reference
lexical_decisions:
- source_word: κατάξει
  english_pob_choice: will subdue
  chosen_spanish: subyugará
  alternatives_spanish:
  - abatirá
  - domará
  - someterá
  lexicon: LSJ
  rationale: El griego futuro activo expresa una acción real de dominio sobre adversarios. «Subyugará» conserva la fuerza de control/derrota que el inglés POB finalmente prefirió, sin introducir la imagen más específica de «golpear» ni una parafrasis excesiva.
- source_word: γῆν
  english_pob_choice: earth
  chosen_spanish: la tierra
  alternatives_spanish:
  - el país
  - la región
  lexicon: LSJ
  rationale: γῆ puede ser «tierra» o «país/territorio». Aquí la amplitud del contexto real-mesiánico favorece «la tierra», que en español mantiene el alcance global sin forzar un sentido local.
- source_word: τῷ λόγῳ τοῦ στόματος αὐτοῦ
  english_pob_choice: with the word of his mouth
  chosen_spanish: con la palabra de su boca
  alternatives_spanish:
  - por la palabra de su boca
  - mediante la palabra de su boca
  lexicon: LSJ
  rationale: La construcción instrumental se vierte de manera natural con «con» en español. «Palabra de su boca» conserva la imagen bíblica de la eficacia de la խոսة/λόγος como medio de juicio, sin diluirla en «mandato» o «decreto».
- source_word: εἰς αἰῶνα
  english_pob_choice: forever
  chosen_spanish: para siempre
  alternatives_spanish:
  - por siempre
  - eternamente
  lexicon: LSJ
  rationale: «Para siempre» es la forma española más natural y solemne para expresar duración indefinida/perpetua, equivalente al inglés POB y al sentido idiomático del griego.
theological_decisions:
- issue: Imagen de juicio ejercido por la palabra del rey ideal
  english_pob_reading: Retain the direct image 'subdue the earth ... with the word of his mouth' without softening it into mere command language.
  chosen_spanish_reading: 'Mantener la imagen directa: «subyugará la tierra ... con la palabra de su boca».'
  alternative_spanish_readings:
  - gobernará la tierra por su mandato
  - dominará la tierra con su decreto
  rationale: El texto presenta autoridad real/judicial ejercida por la palabra, no solo una orden abstracta. En español conviene conservar esa fuerza imagética y la resonancia con el eco profético de Isaías 11:4 sin volverla paráfrasis.
  doctrine_reference: Isaías 11:4; juicio mesiánico por la palabra
translation_notes:
  revision_awareness: Se siguió el texto griego impreso de Swete («κατάξει») y no la emendación que subyacía a una traducción anterior con «strike». La revisión reciente del inglés POB optó por «subdue», y la versión española refleja ese ajuste con un verbo de dominio que encaja mejor con el griego transmitido.
  spanish_consistency_notes:
  - Se usó «la tierra» para γῆν, preservando la amplitud del alcance y manteniendo la alternancia posible con «país/territorio» en nota.
  - Se prefirió «palabra de su boca» para conservar la metáfora bíblica y la sintaxis natural del español.
  - «Para siempre» traduce εἰς αἰῶνα con un registro claro y solemne.
