id: JHN.17.2
reference: 'John 17:2'
language:
  code: ko
  name: Korean
  variant: '표준어 / modern formal-polite (합쇼체)'
source:
  edition: SBLGNT
  text: καθὼς ἔδωκας αὐτῷ ἐξουσίαν πάσης σαρκός, ἵνα πᾶν ὃ δέδωκας αὐτῷ ⸀δώσῃ αὐτοῖς ζωὴν αἰώνιον.
base_translation:
  language: en
  yaml_path: translation/nt/john/017/002.yaml
  text: just as you gave him authority over all flesh[a], so that to all whom you have given him[b], he may give eternal life.
  footnotes:
  - marker: a
    text: Or 'over all humanity.' The Greek reads 'over all flesh,' a biblical idiom for human beings.
    reason: lexical_alternative
  - marker: b
    text: Literally 'all that you have given him'; the Greek uses a neuter singular collective expression for the people given to the Son.
    reason: lexical_alternative
translation:
  language: ko
  text: 아버지께서 그에게 모든 육체를 다스릴 권세를 주신 것과 같이, 아버지께서 그에게 주신 모든 사람에게 그가 영원한 생명을 주게 하시려는 것입니다.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 또는 「모든 인류에 대한 권세」. 헬라어는 「모든 육체에 대한」으로, 사람을 가리키는 성경적 관용어이다.
    reason: lexical_alternative
  - marker: b
    text: 문자적 「아버지께서 그에게 주신 모든 것」. 헬라어는 아들에게 주신 사람들을 중성 단수 집합 표현으로 가리킨다.
    reason: lexical_alternative
