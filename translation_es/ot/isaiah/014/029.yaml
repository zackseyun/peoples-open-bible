  text: אַֽל תִּשְׂמְחִ֤י פְלֶ֨שֶׁת֙ כֻּלֵּ֔/ךְ כִּ֥י נִשְׁבַּ֖ר שֵׁ֣בֶט מַכֵּ֑/ךְ כִּֽי מִ/שֹּׁ֤רֶשׁ נָחָשׁ֙ יֵ֣צֵא צֶ֔פַע וּ/פִרְי֖/וֹ שָׂרָ֥ף מְעוֹפֵֽף־־׃
base_translation:
  language: en
  yaml_path: translation/ot/isaiah/014/029.yaml
  text: Do not rejoice[a], all of you in Philistia, because the rod that struck you is broken; for from the serpent’s root will come forth a viper[b], and its fruit will be a flying fiery serpent.
  footnotes:
