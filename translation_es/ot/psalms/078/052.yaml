translation:
  language: es
  text: Entonces sacó a su pueblo como ovejas, y los guió como un rebaño en el desierto.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: וַיַּסַּע
  english_pob_choice: led out
  chosen_spanish: los sacó
  alternatives_spanish:
  - los hizo salir
  - los condujo fuera
  - los llevó fuera
  lexicon: HALOT
  rationale: El hebreo en causativo expresa hacer que el pueblo se ponga en marcha. En español, «sacar» comunica bien la acción de hacer salir al pueblo sin perder la dirección causal del verbo, y mantiene el tono natural de la imagen exódica.
- source_word: כַּצֹּאן
  english_pob_choice: like sheep
  chosen_spanish: como ovejas
  alternatives_spanish:
  - como rebaño
  - como ganado menor
  lexicon: HALOT
  rationale: צֹאן designa ganado menor, especialmente ovejas y cabras. En este símil, «ovejas» conserva la imagen pastoral de forma clara y bíblicamente reconocible en español.
- source_word: עַמּוֹ
  english_pob_choice: his people
  chosen_spanish: a su pueblo
  alternatives_spanish:
  - a su gente
  - a su nación
  lexicon: HALOT
  rationale: עַם en este contexto es el pueblo del pacto, Israel. «Su pueblo» reproduce bien la relación posesiva y colectiva sin añadir matices ajenos.
- source_word: וַיְנַהֲגֵם
  english_pob_choice: guided them
  chosen_spanish: los guió
  alternatives_spanish:
  - los condujo
  - los pastoreó
  lexicon: HALOT
  rationale: נהג puede significar conducir o guiar. «Los guió» mantiene la continuidad del paralelismo con el primer hemistiquio y preserva el matiz de dirección cuidadosa.
- source_word: כָּעֵדֶר
  english_pob_choice: like a flock
  chosen_spanish: como un rebaño
  alternatives_spanish:
  - como un hato
  - como un redil
  lexicon: HALOT
  rationale: עֵדֶר designa un rebaño o manada. Como el versículo ya usa «ovejas», «rebaño» es la equivalencia más natural y coherente en español.
- source_word: בַּמִּדְבָּר
  english_pob_choice: in the wilderness
  chosen_spanish: en el desierto
  alternatives_spanish:
  - en el desierto inhóspito
  - en la estepa
  lexicon: HALOT
  rationale: מִדְבָּר puede abarcar desierto, y en el contexto del Éxodo el español «desierto» comunica bien el escenario de travesía. «Desierto» es más idiomático para lectores hispanohablantes que «wilderness» traducido literalmente.
theological_decisions:
- issue: Imaginería pastoral aplicada a Dios en el Éxodo
  english_pob_reading: 'Retained the pastoral similes straightforwardly: God led his people like sheep and guided them like a flock.'
  chosen_spanish_reading: 'Se conserva sin atenuación la imagen pastoral: Dios sacó a su pueblo como ovejas y los guió como un rebaño.'
  alternative_spanish_readings:
  - Dios los hizo salir como ovejas y los condujo como rebaño
  - Dios los pastoreó como a un rebaño
  rationale: El texto presenta a Dios actuando con cuidado de pastor sobre Israel. La traducción preserva la metáfora sin introducir explicaciones doctrinales ni suavizarla con términos menos concretos.
  doctrine_reference: Translation philosophy §§1, 3, 6
translation_notes:
  revision_awareness: El texto hebreo y el audit trail inglés muestran una construcción paralela de salida y conducción, con similes pastorales repetidos. No hay variantes textuales ni notas previas que obliguen a un desdoblamiento; la versión española conserva el paralelismo, la metáfora y el registro sobrio del original.
  spanish_consistency_notes:
  - Se mantiene la correspondencia pastoral de ovejas/rebaño para reflejar el paralelismo hebreo.
  - Se evita «SEÑOR» y cualquier sustitución del nombre divino porque este versículo no contiene el Tetragrámaton.
  - «Desierto» se usa por claridad bíblica y naturalidad en español, sin perder el sentido de מִדְבָּר como región de travesía.
