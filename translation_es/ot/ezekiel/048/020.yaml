review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue en gran medida la lectura revisada del POB inglés: תְּרוּמָה como «contribución», las dimensiones «veinticinco mil por veinticinco mil», רְבִיעִית con sentido geométrico principal («como un cuadrado»), y אֲחֻזַּת הָעִיר como posesión/propiedad de la ciudad. Sin embargo, hay un problema claro en la nota [a]: «si se suplanta aquí la unidad» no corresponde al sentido de supply/supplied; debe ser «si aquí se suple la unidad…» o equivalente. También conviene pulir levemente el imperativo plural futuro para mayor naturalidad y claridad.'
  spanish_quality_summary: El español es generalmente claro y digno. «La contribución total» y «junto con la posesión de la ciudad» son legibles. No obstante, la nota [a] contiene un uso incorrecto de «suplanta», que en español significa reemplazar/usurpar, no suplir/completar. Además, «apartarán» puede sonar algo abrupto; «ustedes apartarán» no es necesario, pero el resto de la frase funciona bien. El texto principal solo requiere una mejora menor opcional de fluidez; la reparación obligatoria está en la nota.
  glossary_alignment: 'La terminología está alineada con el proyecto y con el audit trail: «contribución» para תְּרוּמָה, «santa» para הַקֹּדֶשׁ, y «posesión» para אֲחֻזַּת הָעִיר. No hay conflictos con los términos teológicos principales del proyecto. La excepción interpretativa de רְבִיעִית como forma cuadrada sigue correctamente la revisión inglesa, manteniendo la alternativa en nota.'
  issues:
  - severity: medium
    issue: La nota [a] usa «se suplanta» en lugar de «se suple».
    rationale: «Suplantar» significa sustituir o usurpar, y falsea el sentido de la nota inglesa («if the unit ... is supplied»). Es un error léxico claro que debe corregirse para fidelidad y buen español.
  - severity: low
    issue: La nota [b] podría sonar más natural con «como una cuarta parte» en vez de «para una cuarta parte».
    rationale: La formulación actual refleja de cerca una posible lectura de relación, pero en español la alternativa interpretativa se entiende con más claridad como predicación («como una cuarta parte...»).
  - severity: low
    issue: El texto principal es fiel, pero «apartarán la contribución santa» puede mejorarse con «apartarán como santa la contribución» solo si se quisiera evitar una posible lectura atributiva rígida.
    rationale: No es un error; la redacción actual es aceptable. Se menciona solo como matiz estilístico, no como corrección necesaria.
  revised_spanish_text: La contribución total será de veinticinco mil por veinticinco mil[a]; apartarán la contribución santa como un cuadrado[b], junto con la posesión de la ciudad.
  revised_footnotes:
  - marker: a
    text: 'O: «veinticinco mil codos por veinticinco mil codos», si aquí se suple la unidad de medida del contexto circundante.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «apartarán la contribución santa como una cuarta parte de la posesión de la ciudad».'
    reason: alternative_reading
  revision_rationale: Se conserva el texto principal porque refleja fielmente la lectura fuente y la revisión del POB inglés. Se corrige la nota [a] por un error léxico evidente en español («suplanta» → «se suple») y se ajusta la nota [b] para expresar con mejor naturalidad la lectura alternativa fraccional sin cambiar su sentido.
