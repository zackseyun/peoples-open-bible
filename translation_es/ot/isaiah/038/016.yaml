translation:
  language: es
  text: Señor[a], por estas cosas vive el hombre, y en todas ellas está la vida de mi espíritu; por tanto, restáurame la salud[b] y déjame vivir[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «mi Señor». El hebreo puede leerse como una forma posesiva, pero en oración a Dios el español común usa «Señor».
    reason: lexical_alternative
  - marker: b
    text: O «sáname». El verbo puede expresar hacer sano o devolver la salud.
    reason: lexical_alternative
  - marker: c
    text: O «revíveme» o «preserva mi vida». El verbo puede significar hacer vivir, mantener con vida o dar nueva vida.
    reason: lexical_alternative
lexical_decisions:
- source_word: אֲדֹנָי
  english_pob_choice: Lord
  chosen_spanish: Señor
  alternatives_spanish:
  - Mi Señor
  lexicon: HALOT
  rationale: En español, el tratamiento reverente y natural para la dirección a Dios es «Señor». Aunque la forma hebrea puede leerse como «mi Señor», en una plegaria a Dios el español bíblico y contemporáneo entiende mejor la vocación directa sin posesivo explícito.
- source_word: עֲלֵיהֶם
  english_pob_choice: by these things
  chosen_spanish: por estas cosas
  alternatives_spanish:
  - a causa de estas cosas
  - por medio de estas cosas
  - con ellas
  lexicon: HALOT
  rationale: La preposición עַל con sufijo tiene aquí un valor idiomático de medio o base sustentadora. «Por estas cosas» conserva la relación instrumental/sustentadora en un español natural y breve.
- source_word: יִחְיוּ
  english_pob_choice: men live
  chosen_spanish: vive el hombre
  alternatives_spanish:
  - viven
  - se vive
  - vive la gente
  lexicon: HALOT
  rationale: El verbo está en 3.ª plural sin sujeto expreso. «El hombre» reproduce de forma general y genérica la fuerza del hebreo, manteniendo el sentido universal sin introducir una abstracción poco natural en español.
- source_word: וּלְכָל בָּהֶן
  english_pob_choice: and in all these
  chosen_spanish: y en todas ellas
  alternatives_spanish:
  - y en todas estas cosas
  - y en ellas todas
  lexicon: HALOT
  rationale: La frase resume de modo comprehensivo lo anterior. «En todas ellas» conserva la referencia colectiva y la esfera o ámbito en que se encuentra la vida.
- source_word: חַיֵּי רוּחִי
  english_pob_choice: the life of my spirit
  chosen_spanish: la vida de mi espíritu
  alternatives_spanish:
  - la vida de mi aliento
  - la vida de mi aliento vital
  lexicon: HALOT
  rationale: רוּחַ puede significar espíritu, aliento o viento. En este contexto de recuperación y vitalidad interior, «espíritu» comunica mejor la vida interior del orante sin reducirlo solo a respiración física.
- source_word: וְתַחֲלִימֵנִי
  english_pob_choice: so restore me to health
  chosen_spanish: restáurame la salud
  alternatives_spanish:
  - sáname
  - hazme recobrar la salud
  - restáurame a la salud
  lexicon: HALOT
  rationale: El causativo de חלה apunta a hacer sano o devolver la salud. «Restáurame la salud» expresa claramente la idea de recuperar la salud perdida, coherente con el contexto de enfermedad.
- source_word: וְהַחֲיֵנִי
  english_pob_choice: and let me live
  chosen_spanish: y déjame vivir
  alternatives_spanish:
  - y hazme vivir
  - y revíveme
  - y preserva mi vida
  lexicon: HALOT
  rationale: El causativo de חיה es hacer vivir o mantener con vida. «Déjame vivir» funciona como súplica idiomática y evita precisar indebidamente si se trata de revivificación, preservación o mera continuación de la vida.
theological_decisions:
- issue: Sujeto genérico implícito en יִחְיוּ
  english_pob_reading: Rendered generically as 'men live'
  chosen_spanish_reading: «vive el hombre» como genérico humano
  alternative_spanish_readings:
  - «viven»
  - «vive la gente»
  - «uno vive»
  rationale: El hebreo usa una forma verbal plural masculina sin sujeto explícito. «El hombre» mantiene el valor genérico y preserva el paralelo poético sin forzar una solución más abstracta que el original.
  doctrine_reference: Translation philosophy §4 (Gender-accurate over gender-neutral)
- issue: Valor de רוּחִי en un contexto de sanidad y vida
  english_pob_reading: the life of my spirit
  chosen_spanish_reading: «la vida de mi espíritu»
  alternative_spanish_readings:
  - «la vida de mi aliento»
  - «mi fuerza vital»
  rationale: Aquí no conviene reducir רוּחַ a simple respiración ni sustituirlo por una paráfrasis más amplia. «Espíritu» preserva la tensión entre vitalidad interior y vida recibida de Dios.
  doctrine_reference: Translation philosophy §2 (source transparency and lexical tension)
- issue: Alcance de וְתַחֲלִימֵנִי y וְהַחֲיֵנִי
  english_pob_reading: restore me to health / let me live
  chosen_spanish_reading: «restáurame la salud y déjame vivir»
  alternative_spanish_readings:
  - «sáname y hazme vivir»
  - «restitúyeme la salud y mantén mi vida»
  rationale: La secuencia puede abarcar tanto sanidad como preservación de la vida. La traducción conserva ambas peticiones sin decidir en exceso por una de ellas.
  doctrine_reference: Translation philosophy §2 (source transparency and lexical tension)
translation_notes:
  revision_awareness: 'El borrador sigue el acuerdo alto del último repaso: no requiere cambios respecto al sentido base. Se conserva la estructura poética y la triple secuencia de vida/salud/vivir, con ajustes mínimos para un español bíblico claro.'
  spanish_consistency_notes:
  - Se usó «Señor» para la dirección a Dios, conforme al uso reverente estándar y a la transparencia del texto fuente.
  - Se mantuvo «espíritu» para רוּחַ por ser la opción más fiel en este contexto de vitalidad interior.
  - «Restáurame la salud» y «déjame vivir» preservan la doble petición del hebreo sin sobreinterpretarla.
  - La nota de pie sobre «Señor» se ancla en el texto porque la forma hebrea admite lectura posesiva; las demás notas explican alternativas léxicas reales del verbo.
