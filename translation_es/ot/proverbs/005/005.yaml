  to: Sus pies descienden a la muerte; sus pasos se aferran a Seol[a].
  rationale: Se conserva el texto principal casi sin cambios porque es fiel al hebreo y al rastro de auditoría inglés. Solo se corrige el anclaje de la nota para que recaiga sobre «Seol», que es el término al que pertenecen las alternativas léxicas documentadas, y se normaliza la presentación de la nota en español.
