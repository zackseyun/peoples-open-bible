review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura temporal, el contexto cultual, el uso de Yahvé para יְהוָה, y conserva las dos notas léxicas del inglés POB. Sin embargo, pierde precisión en dos puntos: (1) ''quemará incienso regular'' suena poco natural y no refleja bien que תָּמִיד modifica la ofrenda como práctica establecida; (2) ''por todas sus generaciones'' cambia indebidamente la persona de 2mp (''vuestras/sus'' según tratamiento) a 3pl en un contexto de instrucción directa a Israel.'
  spanish_quality_summary: El español es generalmente claro, pero 'incienso regular' es una colocación torpe; en registro bíblico natural suena mejor 'incienso regularmente' o 'un incienso regular'. Además, 'por todas sus generaciones' puede leerse ambiguamente y no reproduce con naturalidad לְדֹרֹתֵיכֶם. Una formulación más fiel y legible es 'a lo largo de sus generaciones'.
  glossary_alignment: Alinea bien con la terminología del proyecto en 'Yahvé', 'lámparas' e 'incienso'. No hay conflicto doctrinal. La revisión propuesta mantiene 'Yahvé' y mejora la expresión de תָּמִיד y לְדֹרֹתֵיכֶם sin apartarse de las decisiones léxicas auditadas.
  issues:
  - severity: medium
    issue: '''quemará incienso regular'' es español poco idiomático'
    rationale: Aunque intenta reflejar 'regular incense', en español suena forzado. El hebreo תָּמִיד califica la ofrenda por su regularidad cultual; conviene expresarlo de manera natural sin perder ese matiz.
  - severity: medium
    issue: '''por todas sus generaciones'' no refleja bien לְדֹרֹתֵיכֶם'
    rationale: El hebreo lleva sufijo de segunda persona plural ('sus/vuestras generaciones' según convención de tratamiento al destinatario), no una referencia genérica de tercera persona. 'A lo largo de sus generaciones' conserva el tratamiento de 'ustedes' y suena natural en español neutral.
  revised_spanish_text: Y cuando Aarón coloque las lámparas al atardecer[a], quemará incienso regularmente[b] delante de Yahvé, a lo largo de sus generaciones.
  revised_footnotes:
  - marker: a
    text: 'Hebreo: “entre las tardes”, un modismo para el período del atardecer.'
    reason: lexical_alternative
  - marker: b
    text: O “incienso continuo”. El hebreo puede poner el acento en la regularidad prescrita o en la perpetuidad de la ofrenda.
    reason: lexical_alternative
  revision_rationale: Se ajusta la redacción para que el español sea natural y fiel al hebreo y al audit trail. 'quemará incienso regularmente' expresa mejor el valor cultual de תָּמִיד que 'incienso regular' en español. 'a lo largo de sus generaciones' reproduce con claridad לְדֹרֹתֵיכֶם en tratamiento neutral de ustedes. Se mantienen Yahvé y las notas léxicas existentes.
