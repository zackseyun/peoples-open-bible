translation:
  language: es
  text: Y aconteció[a], antes de que terminara de hablar, y he aquí, Rebeca salía, la que le había nacido[b] a Betuel, hijo de Milca, esposa de Nacor, hermano de Abraham, con su cántaro sobre su hombro.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: La expresión hebrea marca entrada narrativa; también puede traducirse «Y sucedió».
    reason: lexical_alternative
  - marker: b
    text: Lit. «había sido nacida a Betuel»; el hebreo usa una forma pasiva para identificar a Rebeca por su linaje. En español se expresa de manera más natural como «le había nacido a Betuel».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְהִי
  english_pob_choice: And it happened
  chosen_spanish: Y aconteció
  alternatives_spanish:
  - Y sucedió
  - Y pasó
  lexicon: HALOT
  rationale: La fórmula narrativa de wayyiqtol introduce un nuevo evento. «Aconteció» preserva bien el tono bíblico y la función discursiva sin sonar arcaico de forma excesiva.
- source_word: טֶרֶם כִּלָּה לְדַבֵּר
  english_pob_choice: before he had finished speaking
  chosen_spanish: antes de que terminara de hablar
  alternatives_spanish:
  - antes de que hubiera terminado de hablar
  - antes de acabar de hablar
  lexicon: HALOT
  rationale: «טֶרֶם» expresa anterioridad y la combinación con כִּלָּה + infinitivo comunica finalización de la acción. En español, la subordinada con subjuntivo expresa naturalmente esa anterioridad sin forzar un pluperfecto pesado.
- source_word: וְהִנֵּה
  english_pob_choice: behold
  chosen_spanish: he aquí
  alternatives_spanish:
  - mira
  - y he aquí
  lexicon: HALOT
  rationale: «He aquí» conserva la fuerza deíctica y de sorpresa narrativa. «Y he aquí» también sería posible, pero en español resulta más fluido integrarlo con la estructura de la frase.
- source_word: יֹצֵאת
  english_pob_choice: was coming out
  chosen_spanish: salía
  alternatives_spanish:
  - venía saliendo
  - estaba saliendo
  lexicon: HALOT
  rationale: El participio femenino singular presenta la acción en curso. «Salía» comunica esa simultaneidad con naturalidad en español y evita una perífrasis demasiado pesada.
- source_word: אֲשֶׁר יֻלְּדָה לִבְתוּאֵל
  english_pob_choice: she who had been born to Bethuel
  chosen_spanish: la que había sido nacida a Betuel
  alternatives_spanish:
  - la que había nacido de Betuel
  - la que le había nacido a Betuel
  lexicon: HALOT
  rationale: Se preserva el pasivo del hebreo, que identifica a Rebeca por su descendencia. Aunque «había sido nacida a» suena menos usual que otras opciones, refleja mejor la pasiva del texto fuente y mantiene la tensión lexical de la construcción.
- source_word: בֶּן מִלְכָּה אֵשֶׁת נָחוֹר אֲחִי אַבְרָהָם
  english_pob_choice: son of Milcah, the wife of Nahor, Abraham’s brother
  chosen_spanish: hijo de Milca, la esposa de Nacor, hermano de Abraham
  alternatives_spanish:
  - hijo de Milca, mujer de Nacor, hermano de Abraham
  - hijo de Milca, esposa de Nacor, hermano de Abraham
  lexicon: HALOT
  rationale: Se conserva la apposición genealógica completa del hebreo. «Esposa de Nacor» comunica la relación marital sin añadir explicación extra.
- source_word: כַּד
  english_pob_choice: jar
  chosen_spanish: cántaro
  alternatives_spanish:
  - jarra
  - jarro
  lexicon: HALOT
  rationale: En contexto de acarreo de agua, «cántaro» es claro y natural en español bíblico y mantiene el objeto de uso cotidiano sin precisar indebidamente el material o forma.
- source_word: עַל שִׁכְמָהּ
  english_pob_choice: on her shoulder
  chosen_spanish: sobre su hombro
  alternatives_spanish:
  - en su hombro
  - a su hombro
  lexicon: HALOT
  rationale: La preposición hebrea indica apoyo/posición sobre el hombro. «Sobre su hombro» es la equivalencia más directa y natural.
translation_notes:
  revision_awareness: 'La redacción inglesa auditada pasó por ajustes menores: se mantuvo la estructura introductoria con «that behold» para reflejar mejor el hebreo y la escena narrativa. En español, se optó por una solución equivalente más natural, conservando tanto la anterioridad («antes de que terminara de hablar») como el giro de presentación («he aquí»).'
  spanish_consistency_notes:
  - Se usa «Yahvé» como norma general en el proyecto, pero este versículo no contiene el nombre divino.
  - Se evita «SEÑOR» porque no aparece en el texto fuente.
  - Se mantiene la genealogía completa sin armonizarla con formulaciones tradicionales no presentes en el hebreo.
  - «Cántaro» se eligió por claridad contextual; no se añadió «de agua» porque el contexto ya lo implica.
