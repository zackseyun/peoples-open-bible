revisions:
- from: Y cuando los hombres de la ciudad los vieron en la cima del monte, tomaron sus armas y salieron de la ciudad hacia la cima del monte; y todo[a] hondero entre ellos detuvo su ascenso y les arrojaba piedras.
  to: Y cuando los hombres de la ciudad los vieron en la cima del monte, tomaron sus armas y salieron de la ciudad hacia la cima del monte; y todos los honderos[a] entre ellos les impedían subir y les seguían arrojando piedras.
  rationale: 'Se ajustó la segunda mitad del versículo para reflejar mejor la sintaxis y el aspecto del griego: acción colectiva de los honderos, resistencia al ascenso, y ataque continuo con piedras. También se movió la nota al término léxico pertinente, «honderos». No se requieren cambios doctrinales ni adjudicación adicional.'
