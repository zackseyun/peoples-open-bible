translation:
  language: es
  text: Atarán el pectoral[a] por sus anillos a los anillos del efod con un cordón azul[b], para que esté sobre el cinto tejido artísticamente del efod, y el pectoral no se desprenda del efod[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «la pieza del pecho». El hebreo se refiere a la pieza sacerdotal que se fija al efod, no a una coraza.
    reason: lexical_alternative
  - marker: b
    text: O «con un cordón de hilo azul». תְּכֵלֶת alude al material teñido de azul usado en los textiles del tabernáculo y del sacerdocio.
    reason: lexical_alternative
  - marker: c
    text: O «no se desplace del efod».
    reason: lexical_alternative
lexical_decisions:
- source_word: וְיִרְכְּסוּ
  english_pob_choice: they shall bind
  chosen_spanish: Atarán
  alternatives_spanish:
  - sujetarán
  - asegurarán
  - atarán
  lexicon: HALOT
  rationale: El verbo expresa la acción de fijar o asegurar las piezas entre sí. «Atarán» comunica con naturalidad la sujeción por medio de anillos y cordón sin sobreespecificar el mecanismo.
- source_word: הַחֹשֶׁן
  english_pob_choice: the breastpiece
  chosen_spanish: el pectoral
  alternatives_spanish:
  - la pieza del pecho
  - el breastpiece
  lexicon: HALOT
  rationale: En el contexto sacerdotal, el término no alude a una coraza, sino a la pieza ornamental del pecho. «Pectoral» es la equivalencia española más clara y tradicionalmente inteligible; en notas puede aclararse que se trata de la pieza sacerdotal, no de una armadura.
- source_word: מִטַּבְּעֹתָיו
  english_pob_choice: by its rings
  chosen_spanish: por sus anillos
  alternatives_spanish:
  - con sus anillos
  - desde sus anillos
  lexicon: HALOT
  rationale: La preposición marca el medio o punto de fijación. «Por sus anillos» conserva la relación instrumental/medial sin perder naturalidad en español.
- source_word: טַבְּעֹת הָאֵפֹד
  english_pob_choice: the rings of the ephod
  chosen_spanish: los anillos del efod
  alternatives_spanish:
  - las argollas del efod
  - los aros del efod
  lexicon: HALOT
  rationale: Se mantiene la cadena constructa de manera transparente. «Anillos» refleja bien el elemento de sujeción; «efod» se conserva como término técnico ya establecido.
- source_word: בִּפְתִיל תְּכֵלֶת
  english_pob_choice: with a cord of blue yarn
  chosen_spanish: con un cordón de azul
  alternatives_spanish:
  - con un cordón azul
  - con un cordón de hilo azul
  lexicon: HALOT
  rationale: פְּתִיל es cordón o hilo; תְּכֵלֶת designa el tinte azul-púrpura de los textiles del tabernáculo. «Cordón de azul» preserva la referencia al material tintado sin forzar una equivalencia moderna como «lana» o «hilo».
- source_word: לִהְיוֹת עַל
  english_pob_choice: so that it may be on
  chosen_spanish: para que esté sobre
  alternatives_spanish:
  - para que quede sobre
  - para que esté encima de
  lexicon: HALOT
  rationale: El infinitivo expresa propósito/resultado. «Para que esté sobre» es fiel y natural en español, sin añadir la idea de «descansar» que no está explícita en el hebreo.
- source_word: חֵשֶׁב הָאֵפֹד
  english_pob_choice: the skillfully woven band of the ephod
  chosen_spanish: el cinturón tejido con arte del efod
  alternatives_spanish:
  - la banda tejida del efod
  - el cinto tejido del efod
  lexicon: HALOT
  rationale: חֵשֶׁב aquí designa la banda o cinturón del efod y lleva una cualidad de trabajo hábil. «Cinturón tejido con arte» comunica la función y la elaboración cuidadosa; «cinturón» es más natural para lectores modernos que «banda».
- source_word: וְלֹא יִזַּח
  english_pob_choice: shall not come loose
  chosen_spanish: no se desprenda
  alternatives_spanish:
  - no se afloje
  - no se desplace
  - no se suelte
  lexicon: HALOT
  rationale: El nifal expresa separación o desplazamiento del lugar fijado. «No se desprenda» conserva el sentido de no soltarse ni separarse del efod, en un español claro y sobrio.
- source_word: מֵעַל הָאֵפֹד
  english_pob_choice: from the ephod
  chosen_spanish: del efod
  alternatives_spanish:
  - de sobre el efod
  - de encima del efod
  lexicon: HALOT
  rationale: La frase indica separación respecto de la prenda. «Del efod» es conciso; el contexto ya deja claro que se trata de desprenderse de su posición sobre el efod.
translation_notes:
  revision_awareness: El contexto inglés revisó «so that it may rest on» a «so that it may be on» para adherirse más de cerca al hebreo sin añadir matiz. La redacción española sigue ese ajuste con «para que esté sobre», evitando una expansión interpretativa.
  spanish_consistency_notes:
  - Se conserva «efod» como término técnico, coherente con el registro sacerdotal del pasaje.
  - «Pectoral» se usa para חֹשֶׁן por precisión contextual; la nota preserva la alternativa «pieza del pecho» para lectores que prefieran una glosa más descriptiva.
  - «Cordón de azul» mantiene el color/tinte sin introducir material no explicitado por el hebreo.
  - «No se desprenda» refleja el valor de separación o soltura del verbo, en paralelo con la alternativa inglesa documentada «shall not be displaced».
