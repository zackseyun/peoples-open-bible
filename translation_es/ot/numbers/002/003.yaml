translation:
  language: es
  text: Los que acampan en el lado oriental[a], hacia la salida del sol, serán el estandarte[b] del campamento de Judá, según sus divisiones[c]; y el jefe de los hijos de Judá será Nahsón hijo de Amminadab.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «al este, hacia el amanecer». El hebreo usa dos expresiones direccionales para énfasis y precisión.'
    reason: lexical_alternative
  - marker: b
    text: «Estandarte» también puede traducirse «bandera».
    reason: lexical_alternative
  - marker: c
    text: 'O: «según sus compañías» o «según sus ejércitos».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהַחֹנִים
  english_pob_choice: Those who camp
  chosen_spanish: Los que acampen
  alternatives_spanish:
  - Los que acampan
  - Los acampados
  lexicon: HALOT
  rationale: El participio hebreo funciona como sustantivo colectivo para el grupo ubicado en esa posición. ‘Los que acampen’ conserva el valor de acción/estado y suena natural en español sin perder la referencia al campamento en curso.
- source_word: קֵדְמָה מִזְרָחָה
  english_pob_choice: on the east side, toward the sunrise
  chosen_spanish: al lado oriental, hacia el nacimiento del sol
  alternatives_spanish:
  - al este, hacia el amanecer
  - hacia el oriente, hacia el nacimiento del sol
  lexicon: HALOT
  rationale: Las dos expresiones direccionales se refuerzan mutuamente; por eso conviene conservar ambas. ‘Lado oriental’ da la ubicación del campamento y ‘hacia el nacimiento del sol’ reproduce la imagen de מִזְרָחָה sin aplanarla.
- source_word: דֶּגֶל
  english_pob_choice: standard
  chosen_spanish: estandarte
  alternatives_spanish:
  - bandera
  - señal
  - insignia
  lexicon: HALOT
  rationale: En contexto militar/tribal, דֶּגֶל señala un distintivo de agrupación. ‘Estandarte’ mantiene el registro formal y la idea de insignia de marcha o reunión mejor que ‘bandera’.
- source_word: מַחֲנֵה יְהוּדָה
  english_pob_choice: the camp of Judah
  chosen_spanish: el campamento de Judá
  alternatives_spanish:
  - el campamento de Judá
  - el campamento judío
  lexicon: HALOT
  rationale: La construcción posesiva se conserva de forma directa. ‘Campamento de Judá’ respeta el vínculo formal del hebreo y el contexto de organización tribal.
- source_word: לְצִבְאֹתָם
  english_pob_choice: by their divisions
  chosen_spanish: según sus divisiones
  alternatives_spanish:
  - por sus divisiones
  - según sus cuerpos
  - según sus ejércitos
  lexicon: HALOT
  rationale: צָבָא aquí designa agrupaciones organizadas para el ordenamiento del campamento. ‘Según sus divisiones’ comunica la distribución ordenada sin obligar al lector a pensar en un ejército moderno.
- source_word: וְנָשִׂיא
  english_pob_choice: and the leader
  chosen_spanish: y el jefe
  alternatives_spanish:
  - y el líder
  - y el príncipe
  - y el principal
  lexicon: HALOT
  rationale: נָשִׂיא en este contexto es un jefe tribal. ‘Jefe’ es claro y fiel; evita las connotaciones monárquicas de ‘príncipe’ y suena más natural en español bíblico contemporáneo.
- source_word: לִבְנֵי יְהוּדָה
  english_pob_choice: of the sons of Judah
  chosen_spanish: de los hijos de Judá
  alternatives_spanish:
  - de los hijos de Judá
  - de los descendientes de Judá
  - de la tribu de Judá
  lexicon: HALOT
  rationale: Se conserva la fórmula genealógica y tribal ‘hijos de Judá’, que es la base formal del hebreo. Esta decisión mantiene la precisión de linaje sin neutralizar la referencia masculina documentada.
- source_word: נַחְשׁוֹן בֶּן עַמִּינָדָב
  english_pob_choice: Nahshon son of Amminadab
  chosen_spanish: Nahsón hijo de Amminadab
  alternatives_spanish:
  - Najsón hijo de Amminadab
  - Nahshón, hijo de Amminadab
  lexicon: HALOT
  rationale: Los nombres propios se transliteran. ‘Nahsón’ refleja de manera razonable el hebreo נַחְשׁוֹן en español, y ‘hijo de’ reproduce la relación filial de forma directa.
theological_decisions:
- issue: 'Referencia direccional doble: קֵדְמָה / מִזְרָחָה'
  english_pob_reading: The Hebrew uses two directional expressions for emphasis and specificity.
  chosen_spanish_reading: 'La traducción conserva ambas expresiones: ‘al lado oriental, hacia el nacimiento del sol’.'
  alternative_spanish_readings:
  - al este
  - hacia el oriente
  rationale: No se debe reducir la repetición hebrea a una sola dirección, porque el texto enfatiza tanto la ubicación como la orientación. La duplicación en español preserva esa intensificación sin sonar innecesariamente artificial.
  doctrine_reference: DOCTRINE.md §Fidelidad al texto fuente y especificidad léxica
- issue: Designación tribal masculina en לִבְנֵי יְהוּדָה
  english_pob_reading: of the sons of Judah
  chosen_spanish_reading: de los hijos de Judá
  alternative_spanish_readings:
  - de los descendientes de Judá
  - del pueblo de Judá
  rationale: Se mantiene la fórmula de descendencia masculina porque es la forma estable del hebreo y no hay base textual para neutralizarla. Esto preserva la estructura genealógica del pasaje.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
translation_notes:
  revision_awareness: La redacción sigue la revisión más reciente del POB inglés, que prefirió 'standard' sobre 'banner' para דֶּגֶל. En español, se adoptó 'estandarte' por su registro formal y su correspondencia más natural con el sentido revisado, manteniendo la alternativa 'bandera' en nota. También se preservó la doble dirección del hebreo y la fórmula genealógica masculina de 'hijos de Judá'.
  spanish_consistency_notes:
  - Se usa 'Yahvé' solo cuando aparezca el nombre divino; aquí no aparece.
  - Se conservó el orden sintáctico natural del español sin perder la estructura coordinada del hebreo.
  - ‘Estandarte’ se usa de manera consistente con el valor militar/tribal de דֶּגֶל.
  - ‘Hijos de Judá’ mantiene la terminología tribal estable y coherente con el POB en otros pasajes.
  - Los nombres propios se presentaron en forma española sobria y reconocible.
