translation:
  language: es
  text: ¡Vuelvan[a], hijos descarriados! Yo sanaré sus desvíos[b]. Aquí estamos; venimos a ti, porque tú eres Yahvé nuestro Dios.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «hijos rebeldes», «hijos apóstatas» o «hijos descarriados». El hebreo repite la idea de apartarse y volver.
    reason: lexical_alternative
  - marker: b
    text: O «sus apostasías» o «su apartamiento». El hebreo usa un sustantivo de la misma familia que «vuelvan» y «descarriados».
    reason: lexical_alternative
lexical_decisions:
- source_word: שׁוּבוּ
  english_pob_choice: Return
  chosen_spanish: Vuélvanse
  alternatives_spanish:
  - Regresen
  - Vuelvan
  - Arrepiéntanse
  lexicon: HALOT
  rationale: El imperativo plural de שוב convoca a volver al pacto. «Vuélvanse» mantiene la idea relacional de retorno y suena natural en español; «arrepiéntanse» sería más interpretativo y estrecharía el alcance del verbo.
- source_word: בָּנִים
  english_pob_choice: children
  chosen_spanish: hijos
  alternatives_spanish:
  - niños
  - hijos e hijas
  - descendientes
  lexicon: HALOT
  rationale: Aunque el inglés POB revisó a «children», el hebreo conserva el plural masculino בָּנִים. En español, «hijos» refleja esa forma masculina y sigue funcionando como apelación corporativa al pueblo.
- source_word: שׁוֹבָבִים
  english_pob_choice: backsliding
  chosen_spanish: rebeldes
  alternatives_spanish:
  - apóstatas
  - descarriados
  - rebeldes que se apartan
  lexicon: HALOT
  rationale: La palabra hebrea describe a quienes se han apartado y conserva el juego con שוב. «Rebeldes» comunica bien la condición de apartamiento y es idiomática; el matiz de retorno queda reforzado por el verbo inicial y por «rebeliones» más adelante.
- source_word: אֶרְפָּה
  english_pob_choice: I will heal
  chosen_spanish: sanaré
  alternatives_spanish:
  - curaré
  - restauraré
  - sanaré de nuevo
  lexicon: HALOT
  rationale: El verbo רפא es literalmente «sanar». «Sanaré» preserva la imagen concreta de restauración moral y espiritual sin volverla abstracta.
- source_word: מְשׁוּבֹתֵיכֶם
  english_pob_choice: your backslidings
  chosen_spanish: sus rebeliones
  alternatives_spanish:
  - sus apostasías
  - sus desvíos
  - su apartamiento
  lexicon: HALOT
  rationale: El sustantivo proviene del mismo campo semántico de «volver/alejarse». «Rebeliones» transmite la idea de apartamiento culpable en español y evita una repetición demasiado pesada de «rebeldías». Mantiene el sentido de conducta desviada que necesita ser sanada.
- source_word: הִנְנוּ
  english_pob_choice: Behold
  chosen_spanish: ¡Miren!
  alternatives_spanish:
  - Aquí estamos
  - He aquí
  - Miren ustedes
  lexicon: HALOT
  rationale: La partícula deíctica introduce una respuesta inmediata. «¡Miren!» suena natural y conserva el tono enfático del hebreo; en español puede funcionar como llamado exclamativo equivalente a «Behold».
- source_word: אָתָנוּ
  english_pob_choice: we come
  chosen_spanish: nosotros venimos
  alternatives_spanish:
  - hemos venido
  - venimos
  - nos acercamos
  lexicon: HALOT
  rationale: El perfecto hebreo en este contexto expresa movimiento/comienzo de acción hacia Dios. «Nosotros venimos» conserva la respuesta presente e inmediata; añadir el pronombre enfatiza la aceptación comunitaria.
- source_word: לָךְ
  english_pob_choice: to you
  chosen_spanish: a ti
  alternatives_spanish:
  - hacia ti
  - a ti mismo
  lexicon: HALOT
  rationale: La preposición con sufijo marca dirección hacia Yahvé. «A ti» es la forma más directa y natural en español.
- source_word: יְהֹוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahveh
  - Jehová
  lexicon: HALOT
  rationale: 'Se sigue la convención del proyecto para el Tetragrámaton: «Yahvé». Esto conserva el nombre del pacto y evita sustituirlo por un título.'
- source_word: אֱלֹהֵינוּ
  english_pob_choice: our God
  chosen_spanish: nuestro Dios
  alternatives_spanish:
  - el Dios nuestro
  - nuestro Dios y Señor
  lexicon: HALOT
  rationale: La construcción posesiva del hebreo se expresa de forma natural como «nuestro Dios», manteniendo el vínculo de alianza.
theological_decisions:
- issue: Uso del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahveh
  - Jehová
  rationale: El texto hebreo contiene el nombre propio del Dios del pacto, no un título genérico. La forma española elegida preserva esa distinción, conforme a la política del proyecto.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Alcance de בָּנִים en un llamado corporativo
  english_pob_reading: children
  chosen_spanish_reading: hijos
  alternative_spanish_readings:
  - hijos e hijas
  - descendientes
  rationale: Aunque el término puede abarcar al pueblo en conjunto, la forma hebrea es masculina plural. En español se mantiene «hijos» para respetar el dato gramatical, sin negar su uso corporativo.
  doctrine_reference: 'DOCTRINE.md Translation philosophy §4: Gender-accurate over gender-neutral'
translation_notes:
  revision_awareness: 'La redacción sigue el tramo revisado del audit trail: se evita «SEÑOR» para יהוה, se conserva la fuerza del llamado de retorno, y se mantiene la repetición conceptual entre volver/sanar/rebelión. También se reconoce que el inglés POB revisó בנים hacia «children»; en español se opta por «hijos» por fidelidad gramatical al masculino plural hebreo y por lectura corporativa natural.'
  spanish_consistency_notes:
  - Se usa «Yahvé» de manera consistente para יהוה, conforme al estándar del proyecto.
  - Se preserva la relación léxica entre volver, sanar y rebeliones, sin suavizar el contraste moral del versículo.
  - Se mantiene un registro bíblico moderno y digno, evitando arcaísmos innecesarios.
  - El pronombre explícito «nosotros» refuerza la respuesta comunitaria implícita en el hebreo.
