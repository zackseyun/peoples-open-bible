  to: Él rededicará a Yahvé los días de su voto nazareo[a], y traerá un cordero macho de un año como sacrificio por la culpa. Pero los días anteriores quedarán anulados[b], porque su voto nazareo fue profanado.
  rationale: Se mantiene casi todo el borrador por su buena fidelidad al hebreo y a las decisiones del POB. Se corrige únicamente «fue contaminado» a «fue profanado» para un español más natural y teológicamente adecuado al hablar de un voto/estado consagrado que ha sido ritualmente impurificado, y se normaliza levemente el estilo de las notas.
