revisions:
- from: Por esto nuestro corazón se ha enfermado[a]; por estas cosas nuestros ojos se han oscurecido.
  to: Por esto nuestro corazón está enfermo[a]; por estas cosas nuestros ojos se han oscurecido.
  rationale: Se reemplaza «se ha enfermado» por «está enfermo» para expresar de manera más natural en español el estado resultante de הָיָה דָוֶה, manteniendo la fuerza metafórica corporal. Se conserva «se han oscurecido» como traducción fiel del segundo colon, y se suaviza la nota alternativa para que su español sea más idiomático.
