revisions:
- from: Yo también no seguiré expulsando de delante de ellos a ninguno de las naciones que Josué dejó cuando murió[a].
  to: Yo también ya no expulsaré de delante de ellos a ninguna de las naciones que Josué dejó cuando murió[a].
  rationale: Se corrigió la gramática («ninguna de las naciones»), se mejoró la naturalidad y fidelidad aspectual de לֹא אוֹסִיף con «ya no expulsaré», y se ajustó la nota para reflejar un español correcto y el contraste entre la forma más literal «y murió» y la traducción temporal idiomática «cuando murió».
