translation:
  language: es
  text: Porque la sabiduría es un refugio[a], así como el dinero es un refugio; pero la ventaja del conocimiento es que la sabiduría preserva la vida de sus poseedores[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Literalmente: «en la sombra de la sabiduría, en la sombra del dinero». El hebreo usa «sombra» como imagen de protección o amparo.'
    reason: lexical_alternative
  - marker: b
    text: 'También puede traducirse: «pero la ventaja del conocimiento es que la sabiduría da vida a sus poseedores» o «... mantiene con vida a sus poseedores». El verbo hebreo admite el matiz de dar vida o conservarla.'
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ciertamente
  lexicon: HALOT
  rationale: Introduce la razón o explicación de la afirmación anterior. «Porque» reproduce bien ese valor explicativo en español y mantiene el flujo discursivo sin añadir énfasis no requerido.
- source_word: בְּצֵל
  english_pob_choice: is a shelter
  chosen_spanish: en la sombra ... está su protección
  alternatives_spanish:
  - es un refugio
  - está bajo la sombra de
  lexicon: HALOT
  rationale: El hebreo dice literalmente «en la sombra de». En este dicho sapiencial la imagen comunica amparo o cobijo. Se conserva la metáfora de «sombra» y se explicita el valor de resguardo con «protección» para que el español sea natural y a la vez transparente.
- source_word: הַחָכְמָה
  english_pob_choice: wisdom
  chosen_spanish: sabiduría
  alternatives_spanish:
  - prudencia
  lexicon: HALOT
  rationale: «Sabiduría» es la equivalencia estándar y mantiene el sentido sapiencial del libro. «Prudencia» estrecharía indebidamente el campo semántico.
- source_word: הַכָּסֶף
  english_pob_choice: money is a shelter
  chosen_spanish: dinero
  alternatives_spanish:
  - plata
  - riquezas
  lexicon: HALOT
  rationale: כֶּסֶף puede significar «plata» o por extensión «dinero/riqueza». Dado el paralelismo con una ventaja práctica y no metalúrgica, «dinero» comunica mejor el valor económico para el lector actual.
- source_word: וְיִתְרוֹן
  english_pob_choice: but the advantage
  chosen_spanish: pero la ventaja
  alternatives_spanish:
  - y el provecho
  - y el beneficio
  - y la ventaja
  lexicon: HALOT
  rationale: 'יִתְרוֹן en Eclesiastés denota ganancia, provecho o ventaja. Aquí introduce un contraste: la sabiduría y el dinero ofrecen resguardo, pero la sabiduría añade un beneficio superior. «Pero la ventaja» conserva ese contraste.'
- source_word: דַּעַת
  english_pob_choice: of knowledge
  chosen_spanish: del conocimiento
  alternatives_spanish:
  - del saber
  - de la comprensión
  lexicon: HALOT
  rationale: «Conocimiento» reproduce el sustantivo cognitivo con claridad. En este contexto funciona como cualidad relacionada con la sabiduría, sin forzar una interpretación más estrecha.
- source_word: תְּחַיֶּה
  english_pob_choice: preserves the life of
  chosen_spanish: preserva la vida de
  alternatives_spanish:
  - da vida a
  - mantiene con vida a
  - guarda la vida de
  lexicon: HALOT
  rationale: La forma piel de חיה puede significar «mantener vivo», «preservar la vida» o «dar vida». En el contexto proverbial, la idea es de sostén y conservación de la vida, por lo que «preserva la vida de» es fiel y natural.
- source_word: בְעָלֶיהָ
  english_pob_choice: its possessors
  chosen_spanish: sus poseedores
  alternatives_spanish:
  - sus dueños
  - quienes la poseen
  lexicon: HALOT
  rationale: «Poseedores» conserva la relación de pertenencia sin sugerir dominio absoluto ni un matiz jurídico que el contexto no exige. Además, suena sobrio y adecuado en español bíblico moderno.
translation_notes:
  revision_awareness: Se siguió de cerca el audit trail inglés, manteniendo la imagen de «sombra» y el valor de יִתְרוֹן como «ventaja». La principal adaptación al español fue hacer explícita la relación posesiva y el sentido de protección con una sintaxis natural, sin perder la estructura comparativa del hebreo.
  spanish_consistency_notes:
  - Se mantuvo «sabiduría» para חָכְמָה de forma consistente con el uso sapiencial del libro.
  - «Dinero» se eligió por claridad contemporánea, aunque «plata» permanece como alternativa léxica posible según el contexto.
  - Se preservó la tensión entre imagen literal («sombra») y función idiomática («protección/amparo») mediante traducción y nota.
  - «Poseedores» conserva el matiz de בְעָלֶיהָ sin recurrir a vocabulario eclesiástico no sustentado por el texto.
