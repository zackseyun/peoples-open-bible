translation:
  language: es
  text: Son como un espantapájaros en un campo de pepinos[a], y no pueden hablar; deben ser llevados, porque no pueden caminar. No les teman, porque no pueden hacer daño[b], ni pueden hacer bien.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «como un poste en un melonar». La imagen hebrea es difícil; muchos la entienden como un espantapájaros o un objeto vertical colocado en un huerto de verduras.'
    reason: lexical_alternative
  - marker: b
    text: 'O simplemente: «ni pueden hacer bien».'
    reason: lexical_alternative
lexical_decisions:
- source_word: כְּתֹמֶר מִקְשָׁה
  english_pob_choice: like a scarecrow in a cucumber field
  chosen_spanish: como un espantapájaros en un sembrado de pepinos
  alternatives_spanish:
  - como un poste en un melonar
  - como una palmera en un sembrado de pepinos
  lexicon: HALOT
  rationale: La imagen hebrea es difícil e idiomática. En español, 'espantapájaros' comunica con naturalidad la idea de una figura erguida e inerte en un campo, que encaja con el contexto de ídolos incapaces de hablar o moverse. 'Sembrado de pepinos' refleja מִקְשָׁה como huerto o campo de cucurbitáceas sin volverla excesivamente técnica.
- source_word: וְלֹא יְדַבֵּרוּ
  english_pob_choice: and they cannot speak
  chosen_spanish: y no pueden hablar
  alternatives_spanish:
  - y no hablan
  - y no pueden hablar
  lexicon: HALOT
  rationale: El verbo negado expresa incapacidad en el contexto, no solo falta de acción momentánea. 'No pueden hablar' preserva la fuerza de impotencia del texto y suena natural en español.
- source_word: נָשׂוֹא יִנָּשׂוּא
  english_pob_choice: they must be carried
  chosen_spanish: hay que cargarlos
  alternatives_spanish:
  - deben ser cargados
  - tienen que ser llevados
  lexicon: HALOT
  rationale: El infinitivo absoluto con el verbo finito intensifica la necesidad de ser transportados. 'Hay que cargarlos' comunica bien esa imposición y mantiene un registro claro y bíblico sin volverse rígido.
- source_word: כִּי לֹא יִצְעָדוּ
  english_pob_choice: because they cannot walk
  chosen_spanish: porque no pueden caminar
  alternatives_spanish:
  - porque no pueden andar
  - porque no marchan
  lexicon: HALOT
  rationale: צעד aquí expresa andar o caminar. 'No pueden caminar' es la forma más directa y transparente para el lector español, manteniendo la idea de impotencia física.
- source_word: אַל תִּירְא֤וּ מֵ/הֶם
  english_pob_choice: Do not fear them
  chosen_spanish: No les teman
  alternatives_spanish:
  - No tengan miedo de ellos
  - No teman a ellos
  lexicon: HALOT
  rationale: La imperativa profética se expresa de manera natural en español con el clítico dativo 'les'. 'No les teman' conserva el tono exhortativo y evita una construcción menos idiomática.
- source_word: כִּי לֹ֣א יָרֵ֔עוּ
  english_pob_choice: for they cannot do harm
  chosen_spanish: porque no pueden hacer daño
  alternatives_spanish:
  - porque no pueden hacer mal
  - porque no pueden dañar
  lexicon: HALOT
  rationale: El Hiphil de רעע expresa causar daño o hacer mal. 'Hacer daño' es una equivalencia clara y precisa para el español contemporáneo, sin perder el contraste con la impotencia de los ídolos.
- source_word: וְגַם הֵיטֵב אֵין אוֹתָם
  english_pob_choice: nor can they do good
  chosen_spanish: ni pueden hacer bien
  alternatives_spanish:
  - ni hay en ellos capacidad de hacer bien
  - ni pueden obrar bien
  lexicon: HALOT
  rationale: La cláusula niega capacidad para bienhacer. 'Ni pueden hacer bien' sigue de cerca la revisión del POB inglés y mantiene el paralelismo con 'hacer daño' en un español natural. Se evita una formulación más abstracta que oscurezca la simetría del verso.
theological_decisions:
- issue: Impotencia total de los ídolos
  english_pob_reading: 'Render the verse as emphasizing the total impotence of idols: they cannot speak, walk, harm, or do good.'
  chosen_spanish_reading: 'El verso se traduce subrayando la impotencia total de los ídolos: no pueden hablar, caminar, hacer daño ni hacer bien.'
  alternative_spanish_readings:
  - Una versión más neutra con simples negaciones de acción
  - Una versión más literal que deje implícita la incapacidad
  rationale: El contexto profético presenta una burla a los ídolos como objetos inertes hechos por manos humanas. El español debe comunicar explícitamente esa impotencia, porque es el énfasis teológico del pasaje y coincide con la lectura auditada del POB inglés.
  doctrine_reference: Translation philosophy §1, §3
translation_notes:
  revision_awareness: 'La redacción sigue la revisión más reciente del POB inglés, que prefirió una cláusula final directa: ''nor can they do good'' en lugar de una formulación más abstracta. En español se reflejó esa decisión con ''ni pueden hacer bien'', manteniendo el paralelismo y la naturalidad del registro.'
  spanish_consistency_notes:
  - Se usó 'Yahvé' solo cuando corresponda al nombre divino; en este versículo no aparece.
  - Se evitó 'SEÑOR' y también 'ídolo' como expansión interpretativa, porque el verso habla de objetos idolátricos de manera implícita mediante la ironía del contexto.
  - '''No les teman'' respeta el imperativo plural y el clítico dativo natural del español latinoamericano.'
  - Se mantuvo la simetría verbal 'hacer daño / hacer bien' para conservar el contraste del hebreo y del POB inglés.
