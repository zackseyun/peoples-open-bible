revisions:
- from: 'Y habló Dios a Abraham: «En cuanto a ti, guardarás mi pacto, tú y tu descendencia[a] después de ti, por sus generaciones».'
  to: 'Y Dios dijo a Abraham: «En cuanto a ti, guardarás mi pacto, tú y tu descendencia[a] después de ti, a lo largo de sus generaciones».'
  rationale: Se ajusta «habló» a «dijo» para reflejar con mayor precisión וַיֹּאמֶר y la decisión auditada del POB. También se mejora «por sus generaciones» a «a lo largo de sus generaciones» para expresar mejor la continuidad durativa de לְדֹרֹתָם en español natural. Se mantiene «pacto» y «descendencia» con nota léxica por el singular colectivo hebreo.
