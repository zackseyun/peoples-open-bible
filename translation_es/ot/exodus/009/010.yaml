translation:
  language: es
  text: Así que tomaron el hollín[a] del horno y se pusieron delante de Faraón, y Moisés lo arrojó hacia el cielo, y se convirtió en llagas con ampollas que brotaban sobre el hombre y sobre la bestia.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «ceniza del horno». El hebreo sugiere más específicamente hollín o polvo negro fino, no ceniza genérica.
    reason: lexical_alternative
lexical_decisions:
- source_word: פִּיחַ
  english_pob_choice: soot
  chosen_spanish: hollín
  alternatives_spanish:
  - ceniza
  - hollín del horno
  lexicon: HALOT
  rationale: פִּיחַ apunta más específicamente a polvo negro fino o hollín que a ceniza general. En español, ‘hollín’ comunica mejor ese material combustible y oscuro; se añade ‘del horno’ en el flujo de la frase para mantener la conexión con el origen del material.
- source_word: הַכִּבְשָׁן
  english_pob_choice: the kiln
  chosen_spanish: el horno
  alternatives_spanish:
  - el horno de fundición
  - el horno/kiln
  - el horno de cocción
  lexicon: HALOT
  rationale: כִּבְשָׁן puede referirse a horno o kilne; en español ‘horno’ es la opción más natural y ampliamente inteligible. ‘Horno’ conserva la referencia a un aparato de combustión sin introducir una precisión industrial que el contexto español no exige.
- source_word: לִפְנֵי פַרְעֹה
  english_pob_choice: before Pharaoh
  chosen_spanish: delante de Faraón
  alternatives_spanish:
  - en presencia de Faraón
  lexicon: HALOT
  rationale: La expresión idiomática indica estar ante la presencia de Faraón. ‘Delante de Faraón’ reproduce bien la escena de manera breve y natural en español.
- source_word: וַיִּזְרֹק אֹתוֹ מֹשֶׁה
  english_pob_choice: and Moses threw it
  chosen_spanish: Moisés lo arrojó
  alternatives_spanish:
  - Moisés lo lanzó
  - Moisés lo echó
  lexicon: HALOT
  rationale: El verbo describe una acción simple de lanzar/arrojAR el material. ‘Arrojó’ mantiene la fuerza del gesto y suena sobrio en español bíblico moderno.
- source_word: הַשָּׁמָיְמָה
  english_pob_choice: toward the sky
  chosen_spanish: hacia el cielo
  alternatives_spanish:
  - hacia el cielo
  - hacia arriba
  - hacia los cielos
  lexicon: HALOT
  rationale: La terminación direccional indica movimiento ascendente. ‘Hacia el cielo’ conserva la orientación vertical y, en español bíblico, puede abarcar el sentido físico inmediato sin forzar una explicación teológica adicional.
- source_word: שְׁחִין
  english_pob_choice: boils
  chosen_spanish: una llaga
  alternatives_spanish:
  - forúnculos
  - boils
  - una inflamación
  lexicon: HALOT
  rationale: שְׁחִין se refiere a una afección cutánea dolorosa; en español, ‘llaga’ comunica la lesión visible con dignidad y naturalidad. Se evita ‘boils’ por no ser español corriente.
- source_word: אֲבַעְבֻּעֹת
  english_pob_choice: with blisters
  chosen_spanish: de úlceras
  alternatives_spanish:
  - con ampollas
  - con vesículas
  - con llagas
  lexicon: HALOT
  rationale: El hebreo añade una idea de abultamientos/vesículas asociadas a la erupción. ‘De úlceras’ no es una traducción literal de ‘blisters’, pero en español puede expresar una lesión abierta y supurante; aun así, la combinación con ‘llaga’ busca reflejar la gravedad del cuadro cutáneo sin afirmar más de lo que el texto dice.
- source_word: פֹּרֵחַ
  english_pob_choice: breaking out
  chosen_spanish: que brotaba
  alternatives_spanish:
  - que estallaba
  - que surgía
  - que se extendía
  lexicon: HALOT
  rationale: El participio expresa una erupción activa. ‘Que brotaba’ conserva la imagen de salida/expansión de la afección y funciona bien con el sustantivo precedente.
- source_word: בָּאָדָם
  english_pob_choice: on man
  chosen_spanish: sobre el hombre
  alternatives_spanish:
  - sobre las personas
  - sobre la humanidad
  lexicon: HALOT
  rationale: Se mantiene la forma singular colectiva del hebreo. ‘El hombre’ preserva el paralelo con ‘la bestia’ y refleja el contraste humano/animal del texto fuente.
- source_word: וּבַבְּהֵמָה
  english_pob_choice: and on beast
  chosen_spanish: y sobre la bestia
  alternatives_spanish:
  - y sobre los animales
  - y sobre el ganado
  lexicon: HALOT
  rationale: בְּהֵמָה funciona aquí como singular colectivo contrastado con אָדָם. ‘La bestia’ mantiene esa simetría formal y la dureza del contraste bíblico.
theological_decisions:
- issue: 'Campo semántico de la afección cutánea: mantener la fuerza del hebreo sin medicalizar en exceso'
  english_pob_reading: boils with blisters breaking out
  chosen_spanish_reading: una llaga de úlceras que brotaba
  alternative_spanish_readings:
  - boils con blisters brotando
  - boils con ampollas que brotaban
  - forúnculos con vesículas
  rationale: El POB en inglés evitó una simple glosa médica y mantuvo la imagen de una erupción severa. En español, ‘llaga de úlceras que brotaba’ intenta preservar la gravedad visible del texto sin imponer un diagnóstico clínico más preciso del que el hebreo garantiza.
  doctrine_reference: 'DOCTRINE.md: principio de no sobreinterpretar términos patológicos; Translation philosophy §4'
- issue: Contraste humano/animal en אָדָם / בְּהֵמָה
  english_pob_reading: on man and on beast
  chosen_spanish_reading: sobre el hombre y sobre la bestia
  alternative_spanish_readings:
  - sobre las personas y sobre los animales
  - sobre la humanidad y sobre el ganado
  rationale: Se conserva el paralelismo singular colectivo del hebreo. El contraste no pretende definir sexo biológico, sino abarcar a los seres humanos frente a los animales; por eso se evita pluralizar innecesariamente.
  doctrine_reference: 'DOCTRINE.md: Contested terms table for אָדָם; Translation philosophy §4'
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión inglesa más reciente, que corrigió una redacción interpretativa de ‘festering boils’ a ‘boils with blisters’ para ajustarse mejor a שְׁחִין אֲבַעְבֻּעֹת. En español, el borrador evita añadir ‘festering’ y busca mantener la misma cautela, reflejando la erupción cutánea sin ampliar el diagnóstico. También se siguió la decisión estable de conservar el contraste singular colectivo ‘man/beast’.
  spanish_consistency_notes:
  - Se usa ‘Yahvé’ por norma del proyecto, pero en este versículo no aparece el Tetragrámaton.
  - ‘Faraón’ conserva la forma habitual española del nombre/título.
  - Se prefiere vocabulario bíblico claro y digno, evitando calcos innecesarios del inglés cuando el español requiere otra solución.
  - Se mantuvo el paralelo sintáctico entre ‘sobre el hombre’ y ‘sobre la bestia’ para reflejar la estructura del hebreo.
