id: 1PE.4.6
reference: 1 Peter 4:6
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: εἰς τοῦτο γὰρ καὶ νεκροῖς εὐηγγελίσθη ἵνα κριθῶσι μὲν κατὰ ἀνθρώπους σαρκὶ ζῶσι δὲ κατὰ θεὸν πνεύματι.
base_translation:
  language: en
  yaml_path: translation/nt/1_peter/004/006.yaml
  text: 'For this is why the gospel was also proclaimed to the dead: so that, though judged according to men in the flesh, they might live according to God in the spirit.'
translation:
  language: ko
  text: '이것을 위하여 죽은 자들에게도 좋은 소식이 전해졌습니다.[a] 곧 그들이 비록 육체로는 사람들을 따라 심판을 받지만, 영으로는 하나님을 따라 살게 하려는 것입니다.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: |
      4:6은 3:18-22와 함께 베드로전서에서 해석이 가장 갈리는 절이다. 본문은 어느 해석도 강요하지 않는다.

      주요 해석:
      (1) 「죽은 자들」을 「지금은 죽었으나 살아 있을 때 복음을 들은 자들」로 봄 — 4:5의 산 자와 죽은 자의 심판에 비추어, 이미 죽은 신자들도 결국 영으로 하나님 안에서 살게 된다는 위로.
      (2) 「죽은 자들」을 「영적으로 죽은 자들」(엡 2:1)로 봄 — 비유적.
      (3) 3:19와 연결하여, 그리스도가 죽은 자들에게도 (예컨대 음부에서) 직접 복음을 선포하셨다는 해석.

      한국어 번역은 「죽은 자들에게도 좋은 소식이 전해졌다」고 직역하고, 해석 옵션을 본문에 박지 않는다.
    reason: alternative_reading
lexical_decisions:
- source_word: καὶ νεκροῖς εὐηγγελίσθη
  english_pob_choice: the gospel was also proclaimed to the dead
  chosen_korean: 죽은 자들에게도 좋은 소식이 전해졌습니다
  alternatives_korean:
  - 죽은 자들에게도 복음이 선포되었습니다
  - 죽은 자에게도 복음이 전파되었습니다
  lexicon: BDAG
  rationale: εὐαγγελίζω의 신적 수동을 「전해졌다」로 살린다. 1:12·1:25와 통일하여 「좋은 소식」 사용.
- source_word: κατὰ ἀνθρώπους σαρκί ... κατὰ θεὸν πνεύματι
  english_pob_choice: according to men in the flesh ... according to God in the spirit
  chosen_korean: 육체로는 사람들을 따라 ... 영으로는 하나님을 따라
  alternatives_korean:
  - 사람의 표준으로 육체로는 ... 하나님의 표준으로 영으로는
  lexicon: BDAG
  rationale: 3:18의 σαρκὶ / πνεύματι 대조와 동일 구조. 어휘 일관성 유지.
theological_decisions:
- issue: 「죽은 자들에게 복음이 전해졌다」의 해석
  chosen_reading: '직역으로 보존; 세 해석을 각주에 명시'
  alternative_readings:
  - 지금은 죽은 (생전에 복음을 들은) 신자들
  - 영적으로 죽은 자들 (비유)
  - 음부의 죽은 자들에게 그리스도가 직접 선포
  rationale: 3:18-22와 함께 해석이 가장 갈리는 절. 본문의 모호성을 한국어에서도 그대로 보존하고, 옵션을 각주에 명시.
  doctrine_reference: 'DOCTRINE.md: 본문의 모호성 보존; 해석을 본문에 박지 말 것'
