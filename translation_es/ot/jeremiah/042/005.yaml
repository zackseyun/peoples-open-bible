    rationale: Con לְעֵד en esta fórmula, el contexto apunta a que Yahvé sea testigo contra ellos si no obedecen. «Para nosotros» puede leerse como beneficio o simple relación, no como testimonio condenatorio.
  - severity: medium
    issue: La nota [a] invierte la relación entre texto principal y alternativa
    rationale: La nota presenta «contra nosotros» como mera alternativa, cuando esa es precisamente la lectura contextual preferible y la adoptada por el audit trail inglés.
  - severity: medium
    issue: La nota [b] da una literalidad incorrecta
    rationale: Dice «que Yahvé tu Dios nos envíe a ti», pero el hebreo literalmente corresponde a «que Yahvé tu Dios te envíe a nosotros».
