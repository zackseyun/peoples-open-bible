translation:
  language: es
  text: Y miré[a], y he aquí, venía del norte un viento de tempestad, una gran nube con fuego centelleante[c], y resplandor todo alrededor de ella; y desde en medio de ella había algo como el aspecto de metal reluciente[b], desde en medio del fuego.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘vi’. El hebreo puede entenderse como una observación visionaria directa; ambas opciones son naturales en español.
    reason: lexical_alternative
  - marker: b
    text: Hebreo hashmal, término raro de significado incierto; quizá un resplandor metálico o una aleación brillante.
    reason: lexical_alternative
  - marker: c
    text: 'O ‘fuego que se envolvía sobre sí mismo’ (traducción tradicional: ‘fuego que se infoldaba sobre sí mismo’). La expresión hebrea es difícil y puede describir un fuego en movimiento continuo o autointensificado.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וָאֵרֶא
  english_pob_choice: And I looked
  chosen_spanish: Y miré
  alternatives_spanish:
  - Y vi
  lexicon: HALOT
  rationale: En una escena visionaria, ‘miré’ conserva el acto de dirigir la vista y evita la redundancia que produciría ‘vi’ junto con ‘he aquí’. Además, mantiene el tono narrativo inmediato del hebreo.
- source_word: וְהִנֵּה
  english_pob_choice: and behold
  chosen_spanish: y he aquí
  alternatives_spanish:
  - y mira
  - y allí
  lexicon: HALOT
  rationale: ‘He aquí’ reproduce bien la fuerza deíctica y de sorpresa de הִנֵּה en español bíblico y sigue siendo claro en registro moderno y reverente.
- source_word: רוּחַ סְעָרָה
  english_pob_choice: a storm wind
  chosen_spanish: un viento de tempestad
  alternatives_spanish:
  - un viento tempestuoso
  - un torbellino
  lexicon: HALOT
  rationale: ‘Viento de tempestad’ comunica la violencia del término hebreo sin obligar a la imagen más específica de un ‘torbellino’, que en español puede sugerir un remolino concreto. Mantiene la amplitud semántica del original.
- source_word: בָּאָה מִן הַצָּפוֹן
  english_pob_choice: was coming from the north
  chosen_spanish: venía del norte
  alternatives_spanish:
  - venía desde el norte
  - iba viniendo del norte
  lexicon: HALOT
  rationale: En español, ‘venía’ transmite bien la escena en desarrollo y la inmediatez de la visión. ‘Del norte’ es natural y conserva la dirección geográfica sin sobreexplicar.
- source_word: עָנָן גָּדוֹל
  english_pob_choice: a great cloud
  chosen_spanish: una gran nube
  alternatives_spanish:
  - una nube grande
  - una nube inmensa
  lexicon: HALOT
  rationale: ‘Gran nube’ es directo, solemne y fiel al hebreo. ‘Gran’ preserva el valor de magnitud sin añadir intensidad interpretativa.
- source_word: אֵשׁ מִתְלַקַּחַת
  english_pob_choice: fire flashing continually
  chosen_spanish: con fuego centelleante
  alternatives_spanish:
  - con fuego que centelleaba continuamente
  - con fuego que se encendía sin cesar
  - con fuego que flameaba
  lexicon: HALOT
  rationale: El hebreo describe un fuego activo y difícil de precisar; ‘centelleante’ conserva el movimiento luminoso y evita resolver la ambigüedad de forma excesiva. Se opta por una expresión natural en español que mantiene el efecto visual.
- source_word: וְנֹגַהּ ל֖וֹ סָבִיב
  english_pob_choice: and brightness all around it
  chosen_spanish: y resplandor todo alrededor de ella
  alternatives_spanish:
  - y resplandor alrededor de ella
  - y brillo todo alrededor de ella
  lexicon: HALOT
  rationale: ‘Resplandor’ reproduce bien נֹגַהּ como luminosidad intensa y digna. Se conserva ‘todo alrededor’ para reflejar סָבִיב con la misma plenitud que en la revisión inglesa.
- source_word: וּמִתּוֹכָהּ
  english_pob_choice: and from its midst
  chosen_spanish: y en medio de ella
  alternatives_spanish:
  - y desde su interior
  - y desde en medio de ella
  lexicon: HALOT
  rationale: ‘En medio de ella’ es un español más natural para introducir el segundo plano de la visión. Aunque el hebreo repite la idea de ‘en medio’, la construcción española evita pesadez sin perder la estructura espacial.
- source_word: כְּעֵין
  english_pob_choice: something like the appearance of
  chosen_spanish: como apariencia de
  alternatives_spanish:
  - como algo parecido a la apariencia de
  - como semejanza de
  lexicon: HALOT
  rationale: La expresión comparativa hebrea es cautelosa; ‘como apariencia de’ mantiene esa reserva visionaria. En español suena formal pero comprensible, y no identifica la sustancia más allá de lo que el texto permite.
- source_word: הַחַשְׁמַל
  english_pob_choice: glowing metal
  chosen_spanish: metal reluciente
  alternatives_spanish:
  - metal brillante
  - metal incandescente
  - ámbar
  lexicon: HALOT
  rationale: Se conserva la incertidumbre léxica con una traducción visual y sobria. ‘Metal reluciente’ evita precisar indebidamente el referente, pero comunica la impresión luminosa del término raro.
- source_word: מִתּוֹךְ הָאֵשׁ
  english_pob_choice: from the midst of the fire
  chosen_spanish: desde en medio del fuego
  alternatives_spanish:
  - desde el medio del fuego
  - desde dentro del fuego
  lexicon: HALOT
  rationale: ‘Desde en medio del fuego’ reproduce la repetición espacial del hebreo y el surgimiento de la figura desde el centro de la visión. Aunque poco común, en este contexto es claro y fiel a la estructura original.
theological_decisions:
- issue: Conservar la ambigüedad visual del término חַשְׁמַל sin fijar una identificación material precisa
  english_pob_reading: Descriptive, phenomenological language ('something like the appearance of glowing metal')
  chosen_spanish_reading: Lenguaje descriptivo y fenomenológico ('como apariencia de metal reluciente')
  alternative_spanish_readings:
  - ámbar
  - electro
  - aleación brillante
  rationale: El hebreo ofrece una comparación visionaria, no una identificación segura. La versión española conserva la tensión textual y evita resolver la imagen con un término demasiado definido o doctrinalmente cargado.
  doctrine_reference: Translation philosophy §3 (Preserve theological tension rather than resolve it)
translation_notes:
  revision_awareness: 'La redacción española sigue la revisión más reciente del texto inglés: sin dos puntos después de ‘norte’, con ‘todo alrededor’ para reflejar סָבִיב, y manteniendo el lenguaje fenomenológico en lugar de una identificación material precisa.'
  spanish_consistency_notes:
  - Se mantiene ‘Yahvé’ como norma del proyecto, pero este versículo no contiene el tetragrámaton.
  - ‘Espíritu’ no aparece aquí; se traduce רוּחַ como ‘viento’ por el contexto de סערה.
  - Se preserva la repetición espacial (‘en medio’, ‘desde en medio’) para reflejar la estructura del hebreo.
  - El registro es sobrio y visionario, evitando ampliaciones interpretativas no sustentadas por el texto.
