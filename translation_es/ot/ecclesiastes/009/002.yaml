translation:
  language: es
  text: 'Todo es igual para todos: una misma suerte[a] les sobreviene al justo y al malvado, al bueno y al limpio y al inmundo, al que sacrifica y al que no sacrifica; como el bueno, así el pecador; el que jura es como el que teme un juramento[b].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «un mismo acontecimiento» o «un solo destino».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «como el que teme jurar» o «como el que reverencia un juramento».'
    reason: alternative_reading
lexical_decisions:
- source_word: הַכֹּל
  english_pob_choice: All
  chosen_spanish: Todo
  alternatives_spanish:
  - Todo ello
  - Todo en conjunto
  lexicon: HALOT
  rationale: En español, "Todo" abre la afirmación con la misma amplitud inclusiva que el hebreo y mantiene la concisión proverbial del versículo.
- source_word: כַּאֲשֶׁר לַכֹּל
  english_pob_choice: as it is for all / the same for all
  chosen_spanish: es igual para todos
  alternatives_spanish:
  - es lo mismo para todos
  - así ocurre con todos
  lexicon: HALOT
  rationale: La construcción hebrea es elíptica; "es igual para todos" transmite la idea general del POB en inglés de manera natural en español sin perder la comparación colectiva.
- source_word: מִקְרֶה אֶחָד
  english_pob_choice: one fate
  chosen_spanish: una misma suerte
  alternatives_spanish:
  - un mismo acontecimiento
  - un solo destino
  lexicon: HALOT
  rationale: '"Suerte" comunica el resultado que sobreviene a todos en el contexto de Qohelet, sin volver la expresión demasiado técnica ni introducir una formulación más rígida de lo que el hebreo exige.'
- source_word: לַצַּדִּיק
  english_pob_choice: to the righteous
  chosen_spanish: al justo
  alternatives_spanish:
  - al recto
  lexicon: HALOT
  rationale: '"Justo" es el equivalente bíblico natural de צַדִּיק y conserva el contraste moral central del versículo.'
- source_word: וְלָרָשָׁע
  english_pob_choice: and to the wicked
  chosen_spanish: y al malo
  alternatives_spanish:
  - y al impío
  - y al perverso
  lexicon: HALOT
  rationale: '"Malo" mantiene el paralelismo sencillo del hebreo y el contraste inmediato con "justo"; otras opciones son más fuertes o más teológicas de lo necesario aquí.'
- source_word: לַטּוֹב
  english_pob_choice: to the good
  chosen_spanish: al bueno
  alternatives_spanish:
  - al bueno de corazón
  lexicon: HALOT
  rationale: Se conserva la categoría distinta de "bueno" sin colapsarla en "justo", tal como hace el hebreo al acumular contrastes parciales y superpuestos.
- source_word: וְלַטָּהוֹר
  english_pob_choice: and to the clean
  chosen_spanish: y al limpio
  alternatives_spanish:
  - y al puro
  - y al ceremonialmente limpio
  lexicon: HALOT
  rationale: '"Limpio" preserva en español la oposición con "inmundo" y puede abarcar la dimensión ritual del hebreo sin resolverla demasiado pronto en una sola categoría moral.'
- source_word: וְלַטָּמֵא
  english_pob_choice: and to the unclean
  chosen_spanish: y al inmundo
  alternatives_spanish:
  - y al impuro
  lexicon: HALOT
  rationale: '"Inmundo" conserva la antítesis ritual tradicional y mantiene la correspondencia con "limpio" de modo claro para el lector bíblico en español.'
- source_word: וְלַזֹּבֵחַ
  english_pob_choice: to the one who sacrifices
  chosen_spanish: al que sacrifica
  alternatives_spanish:
  - al oferente
  - al que ofrece sacrificio
  lexicon: HALOT
  rationale: El participio se vierte con una relativa natural en español; "sacrifica" mantiene visible la acción cultual sin recargar la frase.
- source_word: וְלַאֲשֶׁר אֵינֶנּוּ זֹבֵחַ
  english_pob_choice: and to the one who does not sacrifice
  chosen_spanish: y al que no sacrifica
  alternatives_spanish:
  - y al que no ofrece sacrificio
  - y al que deja de sacrificar
  lexicon: HALOT
  rationale: Se conserva el contraste directo y simétrico con la cláusula anterior, tal como en el hebreo.
- source_word: כַּטּוֹב כַּחֹטֶא
  english_pob_choice: as the good one, so the sinner
  chosen_spanish: como el bueno, así el pecador
  alternatives_spanish:
  - como el bueno, así el que peca
  - igual que el bueno, el pecador
  lexicon: HALOT
  rationale: '"Pecador" es el equivalente bíblico asentado para חֹטֶא y conserva el paralelismo proverbial del original.'
- source_word: הַנִּשְׁבָּע
  english_pob_choice: the one who swears
  chosen_spanish: el que jura
  alternatives_spanish:
  - el que hace juramento
  - el jurante
  lexicon: HALOT
  rationale: '"Jura" es breve, natural y fiel al participio del hebreo; además enlaza bien con la cláusula final sobre el juramento.'
- source_word: כַּאֲשֶׁר שְׁבוּעָה יָרֵא
  english_pob_choice: as the one who fears an oath
  chosen_spanish: como el que teme un juramento
  alternatives_spanish:
  - como el que teme jurar
  - como el que reverencia un juramento
  lexicon: HALOT
  rationale: La frase hebrea es comprimida y ambigua; "teme un juramento" preserva esa ambigüedad en español y mantiene abierta la opción de temor al jurar o de cautela reverente ante el juramento.
theological_decisions:
- issue: Sentido de מִקְרֶה אֶחָד en Qohelet
  english_pob_reading: one fate
  chosen_spanish_reading: una misma suerte
  alternative_spanish_readings:
  - un mismo acontecimiento
  - un solo destino
  rationale: 'La formulación española sigue la lectura existencial del POB: un mismo desenlace les sobreviene a todos. "Suerte" evita una afirmación filosófica demasiado rígida y conserva la observación de Qohelet sobre lo común que acontece a los distintos grupos.'
  doctrine_reference: Translation philosophy §1, §3
- issue: Categorías rituales de limpio/inmundo
  english_pob_reading: retain ritual categories as 'clean' and 'unclean'
  chosen_spanish_reading: limpio / inmundo
  alternative_spanish_readings:
  - puro / impuro
  - ceremonialmente limpio / ceremonialmente inmundo
  rationale: El hebreo mantiene el contraste ritual junto con otros contrastes éticos. Se conserva esa tensión en español con "limpio" e "inmundo" en vez de moralizar o espiritualizar de más las categorías.
  doctrine_reference: Translation philosophy §3
- issue: Ambigüedad final sobre jurar y temer el juramento
  english_pob_reading: preserve ambiguity with 'fears an oath' in main text
  chosen_spanish_reading: como el que teme un juramento
  alternative_spanish_readings:
  - como el que teme jurar
  - como el que reverencia un juramento
  rationale: El hebreo permite entender temor a jurar o una actitud reverente frente al juramento. La redacción principal conserva esa ambigüedad, en paralelo con el texto inglés auditado.
  doctrine_reference: Translation philosophy §3
translation_notes:
  revision_awareness: El inglés auditado pasó de «All is as it is for all» a «All is the same for all» para hacer más natural la apertura. La versión española refleja esa misma claridad con «Todo es igual para todos», sin perder la idea de una suerte común que alcanza a todos los grupos mencionados.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma general cuando aparezca el nombre divino; este versículo no lo contiene.
  - Se conservan los pares bíblicos "justo/malo", "bueno/limpio/inmundo" y el tono proverbial del hebreo, sin fusionar las categorías.
  - '"Pecador" se usa como término bíblico estándar para חֹטֶא, en coherencia con el estilo del proyecto.'
