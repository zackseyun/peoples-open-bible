translation:
  language: es
  text: 'En el primer año de Ciro, rey de Persia, para que se cumpliera[a] la palabra de Yahvé por boca[b] de Jeremías, Yahvé despertó el espíritu de Ciro, rey de Persia, e hizo circular una proclamación[c] por todo su reino, y también por escrito, diciendo:'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, más literalmente, ‘para completar la palabra de Yahvé’. El texto principal usa ‘se cumpliera’ porque el contexto es la realización de la profecía.
    reason: lexical_alternative
  - marker: b
    text: Literalmente, ‘por boca de Jeremías’. Este modismo hebreo indica que Jeremías fue el portavoz humano por medio del cual vino la palabra de Yahvé.
    reason: lexical_alternative
  - marker: c
    text: O, ‘emitió una proclamación’ / ‘hizo pasar una proclamación’. El modismo hebreo se refiere a difundir públicamente un anuncio oficial.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּבִשְׁנַת אַחַת
  english_pob_choice: Now in the first year
  chosen_spanish: En el primer año
  alternatives_spanish:
  - Ahora, en el primer año
  - Y en el primer año
  lexicon: HALOT
  rationale: La fórmula cronológica abre la nueva escena narrativa. En español, ‘En el primer año’ comunica con naturalidad el marco temporal; ‘Ahora’ no es necesario para mantener la transición discursiva.
- source_word: לְכוֹרֶשׁ מֶלֶךְ פָּרַס
  english_pob_choice: of Cyrus king of Persia
  chosen_spanish: de Ciro, rey de Persia
  alternatives_spanish:
  - de Ciro rey de Persia
  - de Ciro, el rey de Persia
  lexicon: HALOT
  rationale: Se conserva el nombre propio en forma española habitual y el título real de manera directa, siguiendo la estructura genitiva del hebreo.
- source_word: לִכְלוֹת דְּבַר יְהוָה
  english_pob_choice: so that the word of Yahweh ... might be fulfilled
  chosen_spanish: para que se cumpliera la palabra de Yahvé
  alternatives_spanish:
  - para completar la palabra de Yahvé
  - para que la palabra de Yahvé llegara a su cumplimiento
  lexicon: HALOT
  rationale: לִכְלוֹת expresa consumación/terminación, pero en contexto profético la equivalencia natural es ‘cumplirse’. ‘Palabra’ mantiene el idiomático דְּבַר יְהוָה sin sustituirlo por ‘promesa’.
- source_word: מִפִּי יִרְמְיָה
  english_pob_choice: from the mouth of Jeremiah
  chosen_spanish: por boca de Jeremías
  alternatives_spanish:
  - de la boca de Jeremías
  - dicho por Jeremías
  lexicon: HALOT
  rationale: Se mantiene la metáfora profética de mediación oral. ‘Por boca de’ es una expresión española estable que conserva el sentido literal sin sonar forzada.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  - el SEÑOR
  lexicon: HALOT
  rationale: Se aplica la terminología del proyecto para el Tetragrámaton. ‘Yahvé’ preserva el nombre propio divino en vez de sustituirlo por un título.
- source_word: הֵעִיר
  english_pob_choice: stirred up
  chosen_spanish: movió
  alternatives_spanish:
  - despertó
  - incitó
  - impulsó
  lexicon: HALOT
  rationale: El hifil de עור indica provocar un impulso interno hacia la acción. ‘Movió’ es breve y natural en español, y conserva la iniciativa divina sin especificar un mecanismo psicológico.
- source_word: אֶת רוּחַ כֹּרֶשׁ
  english_pob_choice: the spirit of Cyrus
  chosen_spanish: el espíritu de Ciro
  alternatives_spanish:
  - la disposición de Ciro
  - el ánimo de Ciro
  - el espíritu interior de Ciro
  lexicon: HALOT
  rationale: רוּחַ puede significar espíritu, ánimo o disposición. Se conserva ‘espíritu’ para mantener la amplitud semántica y la resonancia teológica del hebreo.
- source_word: וַיַּעֲבֶר קוֹל
  english_pob_choice: he sent a proclamation
  chosen_spanish: hizo que se promulgara un pregón
  alternatives_spanish:
  - emitió un pregón
  - hizo circular una proclamación
  - publicó un pregón
  lexicon: HALOT
  rationale: El hebreo expresa hacer pasar una voz/mensaje públicamente. ‘Promulgara un pregón’ refleja el acto oficial de publicación y conserva el carácter público del anuncio; ‘pregón’ evita reducirlo solo a un documento.
- source_word: בְּכָל מַלְכוּתוֹ
  english_pob_choice: throughout all his kingdom
  chosen_spanish: por todo su reino
  alternatives_spanish:
  - en todo su reino
  - a través de todo su reino
  lexicon: HALOT
  rationale: La expresión señala extensión territorial completa. ‘Por todo su reino’ comunica bien la difusión general del anuncio.
- source_word: וְגַם בְּמִכְתָּב
  english_pob_choice: and also in writing
  chosen_spanish: y también por escrito
  alternatives_spanish:
  - y también en escrito
  - y además en una carta
  lexicon: HALOT
  rationale: Se conserva la adición de una forma escrita junto al anuncio oral. ‘Por escrito’ es la formulación más natural en español.
- source_word: לֵאמֹר
  english_pob_choice: '''saying:'''
  chosen_spanish: 'diciendo:'
  alternatives_spanish:
  - 'así:'
  - 'con estas palabras:'
  lexicon: HALOT
  rationale: Fórmula estándar para introducir el discurso directo; ‘diciendo:’ es transparente y fiel.
theological_decisions:
- issue: Nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - el SEÑOR
  rationale: El texto hebreo usa explícitamente el Tetragrámaton. La forma española del proyecto es ‘Yahvé’, que preserva el nombre propio sin sustituirlo por un título genérico.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Relación entre profecía y cumplimiento en לִכְלוֹת דְּבַר יְהוָה מִפִּי יִרְמְיָה
  english_pob_reading: so that the word of Yahweh from the mouth of Jeremiah might be fulfilled
  chosen_spanish_reading: para que se cumpliera la palabra de Yahvé por boca de Jeremías
  alternative_spanish_readings:
  - para completar la palabra de Yahvé por boca de Jeremías
  - para que la palabra de Yahvé llegara a su cumplimiento por boca de Jeremías
  rationale: La frase presenta a Ciro como instrumento para que se realice la palabra profética. ‘Se cumpliera’ conserva la dimensión histórica-teológica sin añadir contenido ajeno al hebreo.
  doctrine_reference: DOCTRINE.md Translation philosophy §1, §3
- issue: Mediación profética de מִפִּי יִרְמְיָה
  english_pob_reading: from the mouth of Jeremiah
  chosen_spanish_reading: por boca de Jeremías
  alternative_spanish_readings:
  - de la boca de Jeremías
  - por medio de Jeremías
  rationale: La expresión mantiene el carácter idiomático de transmisión oral del mensaje divino mediante el profeta, sin convertirlo en una simple autoría humana.
  doctrine_reference: DOCTRINE.md Translation philosophy §2
translation_notes:
  revision_awareness: La redacción sigue de cerca la revisión más reciente del POB inglés, que ajustó מִפִּי יִרְמְיָה a ‘from the mouth of Jeremiah’ para reflejar con mayor precisión el hebreo idiomático. En español se preservó esa mediación profética con ‘por boca de Jeremías’ y se mantuvo la lógica de cumplimiento profético, la iniciativa divina y la difusión pública del decreto.
  spanish_consistency_notes:
  - Se usa ‘Yahvé’ de forma consistente para יְהוָה, conforme al estándar del proyecto.
  - Se conserva ‘espíritu’ para רוּחַ, sin reducirlo a ‘ánimo’ o ‘disposición’, porque el contexto admite una amplitud que conviene no estrechar.
  - ‘Pregón’ se eligió para sostener el carácter proclamativo y público del hebreo קוֹל; en nota se aclara la alternativa más literal.
  - La puntuación introduce comas naturales en español sin alterar la relación sintáctica del hebreo.
