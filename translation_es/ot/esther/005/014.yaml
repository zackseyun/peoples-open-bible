translation:
  language: es
  text: 'Entonces Zarés, su esposa, y todos sus amigos le dijeron[a]: «Que se haga un madero[b] de cincuenta codos de alto, y por la mañana dile al rey que cuelguen a Mardoqueo en él[c]. Luego ve con el rey al banquete, gozoso». Y el asunto agradó a Amán, y él hizo el madero.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «los que lo amaban». El participio hebreo puede ser literal, pero en este contexto se refiere a sus asociados o amigos cercanos.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «poste», «palo» o «árbol». El hebreo עֵץ puede designar madera, árbol o una estructura de madera para ejecución; la forma exacta no es segura.'
    reason: lexical_alternative
  - marker: c
    text: 'O: «que lo impalen en él». La expresión hebrea permite entender una suspensión o exposición sobre un madero, pero el modo preciso de ejecución es debatido.'
    reason: alternative_reading
lexical_decisions:
- source_word: אֹהֲבָיו
  english_pob_choice: his friends
  chosen_spanish: sus amigos
  alternatives_spanish:
  - los que lo amaban
  - sus allegados
  - sus partidarios
  lexicon: HALOT
  rationale: El participio de אהב es literalmente «los que aman», pero en este contexto cortesano funciona como un grupo de asociados de Amán. «Sus amigos» es natural en español y conserva el sentido relacional sin exagerar el matiz afectivo.
- source_word: יַעֲשׂוּ
  english_pob_choice: Let a gallows ... be made
  chosen_spanish: Que se haga un madero
  alternatives_spanish:
  - Que hagan un madero
  - Que se construya un madero
  lexicon: HALOT
  rationale: El hebreo expresa una propuesta/jussivo de forma impersonal. En español, «Que se haga» conserva bien esa fuerza hortativa sin especificar innecesariamente a los agentes.
- source_word: עֵץ
  english_pob_choice: gallows
  chosen_spanish: madero
  alternatives_spanish:
  - patíbulo
  - horca
  - poste
  lexicon: HALOT
  rationale: En Ester, עֵץ puede referirse a una estructura de madera para ejecución/exhibición, pero su forma exacta no es segura. «Madero» mantiene la referencia a madera y deja abierta la ambigüedad documentada mejor que «horca», que sugeriría una forma más precisa de la que el hebreo no da certeza.
- source_word: גָּבֹהַּ חֲמִשִּׁים אַמָּה
  english_pob_choice: fifty cubits high
  chosen_spanish: de cincuenta codos de alto
  alternatives_spanish:
  - de unos setenta y cinco pies de alto
  - de unos veintitrés metros de alto
  lexicon: HALOT
  rationale: Se conserva la unidad antigua «codos» para no perder la medida del texto fuente. La altura aproximada puede expresarse aparte, pero no debe reemplazar el dato original en el cuerpo principal.
- source_word: וּבַבֹּקֶר
  english_pob_choice: in the morning
  chosen_spanish: por la mañana
  alternatives_spanish:
  - en la mañana
  - mañana por la mañana
  lexicon: HALOT
  rationale: «Por la mañana» es la forma más natural en español y no añade explícitamente «mañana» como si fuera una glosa interpretativa no presente en el hebreo.
- source_word: אֱמֹר לַמֶּלֶךְ
  english_pob_choice: tell the king
  chosen_spanish: dile al rey
  alternatives_spanish:
  - háblale al rey
  - avísale al rey
  - dile al rey que
  lexicon: HALOT
  rationale: El imperativo directo en español conserva el gesto de comunicarle al rey el asunto. En contexto, la frase implica una solicitud a la corona, pero el verbo básico del hebreo es «decir».
- source_word: וְיִתְלוּ אֶת־מָרְדֳּכַי עָלָיו
  english_pob_choice: to have Mordecai hanged on it
  chosen_spanish: que cuelguen a Mardoqueo en él
  alternatives_spanish:
  - que ahorquen a Mardoqueo en él
  - que lo crucifiquen en él
  - que lo impalen en él
  lexicon: HALOT
  rationale: El texto hebreo permite un castigo por suspensión/exhibición sobre un madero; el método exacto es debatido. «Cuelguen a Mardoqueo en él» refleja la ambigüedad sin imponer «ahorquen» o «impalen» como si el hebreo lo precisara.
- source_word: וּבֹא עִם הַמֶּלֶךְ אֶל הַמִּשְׁתֶּה שָׂמֵחַ
  english_pob_choice: Then go with the king to the banquet rejoicing
  chosen_spanish: Luego ve con el rey al banquete, gozoso
  alternatives_spanish:
  - Luego ve con el rey al banquete, alegre
  - y ve con el rey al banquete, contento
  lexicon: HALOT
  rationale: «Gozoso» conserva el matiz adverbial y el tono festivo de שָׂמֵחַ. «Banquete» reproduce bien el contexto real de מִשְׁתֶּה.
- source_word: וַיִּיטַב הַדָּבָר לִפְנֵי הָמָן
  english_pob_choice: The matter pleased Haman
  chosen_spanish: la cosa agradó a Amán
  alternatives_spanish:
  - la propuesta le pareció bien a Amán
  - el asunto agradó a Amán
  lexicon: HALOT
  rationale: La expresión hebrea es idiomática. «La cosa agradó a Amán» conserva la sencillez y el sentido de aceptación del plan, sin cargar el verbo con una interpretación más fuerte.
- source_word: וַיַּעַשׂ הָעֵץ
  english_pob_choice: he made the gallows
  chosen_spanish: mandó hacer el madero
  alternatives_spanish:
  - hizo el madero
  - hizo construir el madero
  - mandó construir el madero
  lexicon: HALOT
  rationale: El hebreo puede entenderse como que Amán lo hizo/dispuso que se hiciera. «Mandó hacer» en español transmite bien la noción de encargar la fabricación sin obligar a atribuirle el trabajo manual.
theological_decisions:
- issue: Método de ejecución implícito en עֵץ / עָלָיו
  english_pob_reading: Or 'to have Mordecai impaled on it.' The Hebrew wording can refer to suspension on a wooden structure, and the precise execution method is debated.
  chosen_spanish_reading: que cuelguen a Mardoqueo en él
  alternative_spanish_readings:
  - que lo impalen en él
  - que lo cuelguen de él
  - que lo ahorquen en él
  rationale: La fuente no determina con total certeza la mecánica exacta. El español mantiene la ambigüedad al evitar fijar «impalen» o «ahorquen», pero conserva la idea de suspensión/exhibición sobre el madero.
  doctrine_reference: none
translation_notes:
  revision_awareness: La versión inglesa auditada pasó de «Let them make» a una forma impersonal («Let a gallows ... be made») para reflejar mejor el jussivo hebreo. La redacción española sigue esa revisión con una construcción impersonal equivalente («Que se haga...»), y conserva la ambigüedad de עֵץ documentada en la nota textual.
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el texto fuente lo requiera; este versículo no lo contiene.
  - Se mantiene «Amán», «Mardoqueo» y «Zarés» según la transliteración habitual en español bíblico del proyecto.
  - «Banquete» se emplea para מִשְׁתֶּה por ser natural y fiel al contexto real; no se usa «fiesta» para no diluir el matiz de comida solemne.
  - Se conserva la unidad «codos» en el texto principal para respetar la medida antigua.
