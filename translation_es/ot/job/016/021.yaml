translation:
  language: es
  text: que él arbitre entre un hombre y Dios,[a] como un hijo del hombre con su prójimo.[b][c]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «abogue por un hombre ante Dios»; el verbo hebreo puede tener sentido legal de decidir, arbitrar o llevar una causa.
    reason: lexical_alternative
  - marker: b
    text: Hebreo «hijo de hombre», aquí un modismo para un ser humano, no necesariamente un título mesiánico.
    reason: lexical_alternative
  - marker: c
    text: O «con su amigo».
    reason: lexical_alternative
lexical_decisions:
- source_word: וְיוֹכַח
  english_pob_choice: would arbitrate
  chosen_spanish: arbitre
  alternatives_spanish:
  - pleitee
  - decida
  - argumente el caso
  lexicon: HALOT
  rationale: El verbo hebreo en hifil puede expresar decidir, probar, reprender o arbitrar una causa. En este contexto, la idea jurídica de mediar entre dos partes se comunica bien con «arbitre», que conserva el valor forense sin reducirlo a una simple reprensión.
- source_word: לְגֶבֶר
  english_pob_choice: for a man
  chosen_spanish: entre un hombre
  alternatives_spanish:
  - para un hombre
  - por un hombre
  - para una persona
  lexicon: HALOT
  rationale: El sustantivo designa aquí a un ser humano masculino de forma genérica. En español, «un hombre» mantiene esa referencia y, unido a «entre», refleja mejor el marco de arbitraje entre dos partes que la preposición literal por sí sola.
- source_word: עִם אֱלֹהַּ
  english_pob_choice: with God
  chosen_spanish: entre un hombre y Dios
  alternatives_spanish:
  - con Dios
  - contra Dios
  - delante de Dios
  lexicon: HALOT
  rationale: 'Aunque עִם significa básicamente «con», en este contexto jurídico la relación es bilateral: el arbitraje se sitúa entre el humano y Dios. «Entre un hombre y Dios» expresa con claridad en español la tensión procesal que el hebreo sugiere.'
- source_word: וּבֶן אָדָם
  english_pob_choice: as a son of man
  chosen_spanish: como un hijo de hombre
  alternatives_spanish:
  - como un ser humano
  - y un hijo de hombre
  - como un hombre
  lexicon: HALOT
  rationale: Se conserva la expresión hebrea casi literal para no borrar la fórmula idiomática. «Hijo de hombre» es la forma más transparente en español para בן אדם y ayuda a mantener la paralelía poética sin convertirla en un título teológico.
- source_word: לְרֵעֵהוּ
  english_pob_choice: for his neighbor
  chosen_spanish: con su prójimo
  alternatives_spanish:
  - para su amigo
  - con su amigo
  - con su vecino
  lexicon: HALOT
  rationale: רֵעַ puede significar vecino, amigo o compañero. «Prójimo» es natural en español bíblico y suficientemente amplio para la relación cercana/comunitaria que el texto presupone; el valor de «con» reproduce la comparación relacional del final del versículo.
theological_decisions:
- issue: Posible lectura mesiánica de «hijo de hombre»
  english_pob_reading: Render the Hebrew idiom in its immediate human sense, not as a christological title.
  chosen_spanish_reading: Mantener «hijo de hombre» como modismo humano, no como título cristológico.
  alternative_spanish_readings:
  - «ser humano» para evitar toda asociación titulística
  - «Hijo de Hombre» con mayúsculas
  rationale: En Job 16:21 la expresión בן אדם funciona en paralelo con גבר como designación de una persona humana. Capitalizarla o volverla título introduciría una lectura posterior no exigida por el texto; conservar la forma literal preserva la tensión literaria y semántica.
  doctrine_reference: Preservar la tensión teológica sin resolverla; no importar afirmaciones doctrinales ajenas al pasaje.
translation_notes:
  revision_awareness: 'La redacción sigue el pasaje revisado del audit trail: se privilegió «entre un hombre y Dios» para reflejar mejor la mediación entre dos partes, y se mantuvo la construcción paralela con «como un hijo de hombre con su prójimo».'
  spanish_consistency_notes:
  - Se mantuvo «Dios» para אֱלֹהַּ y no se introdujo «SEÑOR», porque el hebreo aquí no contiene el nombre divino.
  - Se conservó la expresión idiomática «hijo de hombre» para respetar la forma hebrea y evitar una traducción excesivamente explicativa.
  - «Prójimo» se eligió como equivalente amplio y bíblicamente reconocible de רֵעַ, sin restringirlo a «amigo» únicamente.
