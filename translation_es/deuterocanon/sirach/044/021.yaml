base_translation:
  language: en
  yaml_path: translation/deuterocanon/sirach/044/021.yaml
  text: Therefore he confirmed to him with an oath that nations would be blessed in his offspring[a], to give them as an inheritance from sea to sea[b], and from the River to the ends of the earth.
  footnotes:
