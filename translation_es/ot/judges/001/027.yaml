  text: But Manasseh did not dispossess Beth-shean and its daughter towns[a], or Taanach and its daughter towns, or the inhabitants of Dor and its daughter towns, or the inhabitants of Ibleam and its daughter towns, or the inhabitants of Megiddo and its daughter towns[b]; and the Canaanites persisted in dwelling in this land.
  footnotes:
