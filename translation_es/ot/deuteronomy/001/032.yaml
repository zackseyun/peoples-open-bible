translation:
  language: es
  text: Sin embargo, en este asunto no creyeron en Yahvé su Dios[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «no confiaron en Yahvé su Dios»; también posible: «no creyeron a Yahvé su Dios».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וּ/בַ/דָּבָר הַ/זֶּה
  english_pob_choice: Yet in this matter
  chosen_spanish: Sin embargo, en este asunto
  alternatives_spanish:
  - Y en este asunto
  - Pero en este asunto
  - Aun en este asunto
  lexicon: HALOT
  rationale: דָּבָר aquí significa 'asunto' o 'tema', no 'palabra'. El enlace con ו más ב admite un matiz adversativo; 'Sin embargo' comunica bien la reprensión de Moisés en español sin perder el vínculo con lo anterior.
- source_word: אֵינְ/כֶם מַאֲמִינִים
  english_pob_choice: you did not believe
  chosen_spanish: no creían
  alternatives_spanish:
  - no creyeron
  - no estaban creyendo
  - no confiaban
  lexicon: HALOT
  rationale: El participio con negación expresa una postura de incredulidad en la situación narrada. En español, el imperfecto plural 'no creían' transmite mejor esa actitud continuada que un pasado puntual.
- source_word: בַּ/יהוָה
  english_pob_choice: the LORD / Yahweh
  chosen_spanish: en Yahvé
  alternatives_spanish:
  - en el SEÑOR
  - en Yahvé
  lexicon: HALOT
  rationale: Siguiendo la política del proyecto, el nombre divino se rinde como 'Yahvé' y no se oculta tras una convención tipográfica. Con אמן + ב, el español natural es 'creer en'.
- source_word: אֱלֹהֵי/כֶם
  english_pob_choice: your God
  chosen_spanish: su Dios
  alternatives_spanish:
  - vuestro Dios
  - su Dios
  lexicon: HALOT
  rationale: El sufijo de 2mp se expresa naturalmente en español con 'su' cuando el referente ya es plural y el registro es bíblico-formal. Mantiene la relación pactual sin sonar forzado.
theological_decisions:
- issue: Valor de אמן con la preposición ב aplicada a Yahvé
  english_pob_reading: believe in the LORD your God
  chosen_spanish_reading: creer en Yahvé su Dios
  alternative_spanish_readings:
  - creer a Yahvé su Dios
  - confiar en Yahvé su Dios
  rationale: El hebreo puede implicar creer, confiar o adherirse a la palabra dada. En este contexto la reprensión acusa incredulidad frente al Dios del pacto; 'creer en' conserva la relación personal y la negativa a aceptar su palabra sin borrar la tensión semántica.
  doctrine_reference: 'Translation philosophy §§1, 3, 5; Contested terms: יהוה → Yahvé'
translation_notes:
  revision_awareness: La redacción española sigue el último ajuste del POB inglés que añadió 'in' para reflejar la construcción hebrea con ב. Aquí se conserva ese matiz con 'creer en' y se evita una paráfrasis que suavice la acusación de incredulidad.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' conforme a la terminología base del proyecto.
  - Se usa 'creer en' para reflejar la relación de fe/confianza implicada por אמן + ב.
  - '''Su Dios'' conserva el vínculo pactual con el sujeto plural del pasaje.'
  - El tono adversativo de וּבַדָּבָר הַזֶּה se expresa con 'Sin embargo' para enlazar con el contexto inmediato.
