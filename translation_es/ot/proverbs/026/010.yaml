  text: Like an archer who wounds everyone is one who hires a fool or hires passersby[a][b].
  footnotes:
  - marker: a
    text: Hebrew text is notoriously difficult. 'Like an archer who wounds everyone' follows a long-standing interpretation. Other renderings take the opening more literally, such as 'A great man brings forth all things' or similar, but these are less coherent in context.
    reason: alternative_reading
  - marker: b
    text: Or 'hires a fool and hires any passerby.' The point is indiscriminate hiring that causes harm.
    reason: lexical_alternative
