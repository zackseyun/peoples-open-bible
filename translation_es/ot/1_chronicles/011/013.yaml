translation:
  language: es
  text: Estaba con David en Pas-Dammim[a], donde los filisteos se habían reunido para la batalla. La parcela del campo estaba llena de cebada, y el pueblo huyó de delante de los filisteos.[b]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Pas-Dammim es un nombre de lugar; compárese el relato paralelo de 1 Samuel 17:1, donde el sitio se llama Efes-Dammim.
    reason: cross_reference
  - marker: b
    text: O «huyó ante los filisteos». El hebreo dice literalmente «huyó de delante de los filisteos».
    reason: lexical_alternative
lexical_decisions:
- source_word: בַּפַּס דַּמִּים
  english_pob_choice: at Pas-dammim
  chosen_spanish: en Pas-Dammim
  alternatives_spanish:
  - en Efes-Dammim
  - en el límite de derramamiento de sangre
  lexicon: HALOT
  rationale: En Crónicas el contexto trata el término como nombre propio de lugar. En español conviene transliterar como topónimo, manteniendo la referencia histórica y el vínculo con el relato paralelo de 1 Samuel 17:1. La opción etimológica literal se reserva para nota porque oscurecería el valor locativo.
- source_word: נֶאֱסְפוּ
  english_pob_choice: had gathered
  chosen_spanish: se habían reunido
  alternatives_spanish:
  - se reunieron
  - habían sido reunidos
  lexicon: HALOT
  rationale: El nifal de אסף expresa aquí una reunión o concentración previa al combate. El pluscuamperfecto español comunica bien la acción ya consumada antes del evento principal sin introducir pasividad innecesaria.
- source_word: לַמִּלְחָמָה
  english_pob_choice: for battle
  chosen_spanish: para la batalla
  alternatives_spanish:
  - para la guerra
  - para combatir
  lexicon: HALOT
  rationale: «Batalla» es el equivalente natural en español para un enfrentamiento militar concreto. «Guerra» sería más amplio y menos preciso en este contexto narrativo.
- source_word: חֶלְקַת הַשָּׂדֶה
  english_pob_choice: the plot of the field
  chosen_spanish: la parcela del campo
  alternatives_spanish:
  - el terreno del campo
  - la porción del campo
  lexicon: HALOT
  rationale: חלקה designa una parcela o porción delimitada de tierra. «Parcela» conserva ese valor concreto y agrario en un español claro; «del campo» refleja el sustantivo siguiente sin volverlo abstracto.
- source_word: מְלֵאָה שְׂעוֹרִים
  english_pob_choice: was full of barley
  chosen_spanish: estaba lleno de cebada
  alternatives_spanish:
  - estaba lleno de cebada
  - estaba colmado de cebada
  lexicon: HALOT
  rationale: El hebreo nombra específicamente cebada, no grano en general. Se traduce con una construcción sencilla y fiel al detalle agrícola.
- source_word: וְהָעָם
  english_pob_choice: the people
  chosen_spanish: el pueblo
  alternatives_spanish:
  - la gente
  - el pueblo
  lexicon: HALOT
  rationale: Aunque el sustantivo puede abarcar más que combatientes, en español «el pueblo» refleja bien el colectivo mencionado sin restringirlo solo a soldados. En este contexto mantiene el tono comunitario del hebreo.
- source_word: נָסוּ מִפְּנֵי פְלִשְׁתִּים
  english_pob_choice: fled from before the Philistines
  chosen_spanish: huyó de delante de los filisteos
  alternatives_spanish:
  - huyó ante los filisteos
  - huyó de los filisteos
  lexicon: HALOT
  rationale: La expresión hebrea es literalmente «de delante de». En español «de delante de» conserva el matiz idiomático del original y comunica con claridad la retirada frente al enemigo.
translation_notes:
  revision_awareness: El texto inglés de POB y el paquete hebreo muestran alto acuerdo; no se requieren cambios sustanciales. La única tensión relevante es el topónimo בַּפַּס דַּמִּים, que se conserva como nombre propio en español y se aclara con nota de cruce. También se mantiene el giro idiomático מִפְּנֵי con una formulación española suficientemente literal pero natural.
  spanish_consistency_notes:
  - Se usa «Yahvé» como forma por defecto solo cuando el hebreo contiene el nombre divino; este versículo no lo contiene.
  - Se mantiene la transliteración de topónimos cuando el texto los presenta como nombres propios.
  - «Filisteos» se conserva como etnónimo histórico estándar en español bíblico.
  - 'La estructura verbal busca reflejar la sucesión narrativa: reunión previa, estado del campo, y huida posterior.'
