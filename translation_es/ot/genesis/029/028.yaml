- from: Y Jacob hizo así[a], y completó esta semana; entonces Labán le dio a Raquel, su hija, por mujer.
  to: Y Jacob hizo así[a], y completó esta semana; entonces Labán le dio a su hija Raquel como esposa.
  rationale: Se hace una reparación pequeña pero importante para eliminar ambigüedad sintáctica y mejorar la naturalidad del español, manteniendo intacto el sentido del hebreo y la lógica del audit trail inglés. La nota cultural se conserva con redacción más limpia.
