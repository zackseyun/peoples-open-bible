translation:
  language: es
  text: Entonces cavaron otro pozo, y también riñeron por él; por eso le puso el nombre de Sitna[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Sitna refleja el hebreo שִׂטְנָה, un nombre relacionado con oposición u hostilidad.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּחְפְּרוּ
  english_pob_choice: they dug
  chosen_spanish: cavaron
  alternatives_spanish:
  - excavaron
  - abrieron
  lexicon: HALOT
  rationale: El verbo básico es 'dig'. En español, 'cavar' comunica de manera natural la acción de hacer un pozo y mantiene el progreso narrativo sin volverse técnico o rebuscado.
- source_word: בְּאֵר אַחֶרֶת
  english_pob_choice: another well
  chosen_spanish: otro pozo
  alternatives_spanish:
  - un pozo diferente
  - un segundo pozo
  lexicon: HALOT
  rationale: '''Pozo'' es la forma idiomática en español. ''Otro'' conserva la distinción respecto del pozo anterior, como en el inglés POB.'
- source_word: וַיָּרִיבוּ גַּם עָלֶיהָ
  english_pob_choice: they also quarreled over it
  chosen_spanish: también riñeron por él
  alternatives_spanish:
  - también contendieron por él
  - también disputaron por él
  lexicon: HALOT
  rationale: ריב expresa contienda o riña. 'Reñir' mantiene el conflicto interpersonal en un español claro. Se usa 'por él' para reflejar la referencia al pozo, implícitamente masculino en español.
- source_word: וַיִּקְרָא שְׁמָהּ
  english_pob_choice: he called its name
  chosen_spanish: le puso por nombre
  alternatives_spanish:
  - lo llamó
  - puso su nombre
  lexicon: HALOT
  rationale: Aunque la hebrea dice literalmente 'llamó su nombre', en español bíblico y contemporáneo 'poner por nombre' expresa con naturalidad la fórmula nominal sin perder el valor formal del acto de nombrar.
- source_word: שִׂטְנָה
  english_pob_choice: Sitnah
  chosen_spanish: Sitná
  alternatives_spanish:
  - Sitna
  - Hostilidad
  lexicon: HALOT
  rationale: Se conserva el nombre propio con transliteración adaptada al español. La forma con tilde ayuda a la lectura castellana, y el nombre mantiene el juego semántico con oposición/hostilidad sin traducirlo en el texto principal.
translation_notes:
  revision_awareness: El contexto auditado en inglés no requirió cambios sustantivos; la decisión principal fue adaptar la fórmula de nombrar y la transliteración del topónimo para español, sin borrar el matiz semántico documentado en la nota.
  spanish_consistency_notes:
  - Se preserva el nombre propio como Sitná, en lugar de traducirlo como 'Hostilidad', para seguir la política de mantener los nombres transliterados y documentar su sentido en nota.
  - '''Otro pozo'' y ''riñeron por él'' conservan el paralelismo narrativo del original sin calcar la sintaxis hebrea.'
  - Se evita 'SEÑOR' u otro término teológico no pertinente; el verso no contiene el nombre divino.
