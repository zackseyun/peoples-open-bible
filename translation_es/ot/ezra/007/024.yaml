  text: וּ/לְ/כֹ֣ם מְהוֹדְעִ֗ין דִּ֣י כָל כָּהֲנַיָּ֣/א וְ֠/לֵוָיֵ/א זַמָּ֨רַיָּ֤/א תָרָֽעַיָּ/א֙ נְתִ֣ינַיָּ֔/א וּ/פָ֣לְחֵ֔י בֵּ֖ית אֱלָהָ֣/א דְנָ֑ה מִנְדָּ֤ה בְלוֹ֙ וַ/הֲלָ֔ךְ לָ֥א שַׁלִּ֖יט לְ/מִרְמֵ֥א עֲלֵי/הֹֽם־׃
base_translation:
  language: en
  yaml_path: translation/ot/ezra/007/024.yaml
  text: And we make known to you that it is not permitted to impose tribute[a], tax, or toll on any of the priests, Levites, singers, gatekeepers, temple servants[b], or servants of this house of God.
  footnotes:
  - marker: a
    text: Or 'Nethinim,' a traditional transliteration of נְתִינַיָּא.
    reason: lexical_alternative
  - marker: b
    text: 'The three fiscal terms likely distinguish different kinds of imperial levy: ''tribute, tax, or toll'' could also be rendered ''tribute, custom, or transit duty.'''
    reason: lexical_alternative
