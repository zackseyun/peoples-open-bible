theological_decisions:
- issue: 7:23의 νόμος 다중 사용 분별
  chosen_reading: 세 νόμος 모두 「법」(작동 원리)으로 옮김 — 모세 율법과 구별
  alternative_readings:
  - 전부 「율법」으로 통일
  rationale: '본 절은 어휘 유희(word-play): 같은 단어 νόμος가 다른 의미들로 충돌한다. 「죄의 법」을 「죄의 율법」으로 옮기면 모세 율법과 혼동될 수 있다. 본 과제 정책에 따라 모세 율법 외의 νόμος는 「법/원리」로 분별.'
  doctrine_reference: 본 과제 용어집
