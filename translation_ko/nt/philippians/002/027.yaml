id: PHP.2.27
reference: Philippians 2:27
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: καὶ γὰρ ἠσθένησεν παραπλήσιον ⸀θανάτῳ· ἀλλὰ ὁ θεὸς ⸂ἠλέησεν αὐτόν⸃, οὐκ αὐτὸν δὲ μόνον ἀλλὰ καὶ ἐμέ, ἵνα μὴ λύπην ἐπὶ λύπην σχῶ.
base_translation:
  language: en
  yaml_path: translation/nt/philippians/002/027.yaml
  text: 'For indeed he was sick, nearly to death; but God had mercy on him, and not on him only but also on me, so that I might not have sorrow upon sorrow.'
translation:
  language: ko
  text: 실로 그는 거의 죽기까지[a] 병들었습니다. 그러나 하나님께서 그에게 긍휼을 베푸셨고, 그에게뿐만 아니라 나에게도 베푸셔서, 내가 슬픔 위에 슬픔[b]을 더 갖지 않게 하셨습니다.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 또는 「죽음에 가까이」, 「죽음에 이를 정도로」.
    reason: lexical_alternative
  - marker: b
    text: 문자적으로 「슬픔 위에 슬픔」 — 거듭된 슬픔을 표현하는 관용 표현.
    reason: cultural_note
lexical_decisions:
- source_word: ἠσθένησεν
  english_pob_choice: was sick
  chosen_korean: 병들다
  alternatives_korean:
  - 병이 들다
  - 앓다
  - 쇠약해지다
  lexicon: BDAG
  rationale: 본 문맥에서 ἀσθενέω는 신체적 병을 가리킨다. 「병들다」가 자연스럽다.
- source_word: παραπλήσιον θανάτῳ
  english_pob_choice: nearly to death
  chosen_korean: 거의 죽기까지
  alternatives_korean:
  - 죽음에 이를 정도로
  - 죽음에 가까이
  lexicon: BDAG
  rationale: 죽음에 근접함을 표시. 「거의 죽기까지」가 그 강도를 자연스럽게 표현하면서 실제 죽음에 이르지 않았음을 분명히 한다.
- source_word: ἠλέησεν
  english_pob_choice: had mercy on
  chosen_korean: 긍휼을 베풀다
  alternatives_korean:
  - 자비를 베풀다
  - 불쌍히 여기다
  lexicon: BDAG
  rationale: 신적 긍휼의 신학적 무게를 보존하기 위해 「긍휼을 베풀다」를 택한다. 단순 「불쌍히 여기다」보다 무게가 있다.
- source_word: οὐκ αὐτὸν δὲ μόνον ἀλλὰ καὶ ἐμέ
  english_pob_choice: and not on him only but also on me
  chosen_korean: 그에게뿐만 아니라 나에게도
  alternatives_korean:
  - 단지 그에게만이 아니라 나에게도
  lexicon: BDAG
  rationale: 헬라어의 강조와 이전 절의 긍휼의 대상을 명시적으로 이어 받는다. 「베푸셔서」를 보충해 한국어 흐름을 자연스럽게 한다.
- source_word: ἵνα μὴ
  english_pob_choice: so that I might not
  chosen_korean: ~지 않게 하시다
  alternatives_korean:
  - ~하지 않도록
  - ~하지 않게 하려고
  lexicon: BDAG
  rationale: 부정 목적을 자연스럽게 표현. 한국어 「~지 않게 하셨다」가 합쇼체에 부합한다.
- source_word: λύπην ἐπὶ λύπην
  english_pob_choice: sorrow upon sorrow
  chosen_korean: 슬픔 위에 슬픔
  alternatives_korean:
  - 슬픔에 슬픔
  - 슬픔이 잇따라
  lexicon: BDAG
  rationale: 반복 명사와 ἐπί는 수사적·누적적 표현. 직역으로 그 반복과 강조를 보존한다.
- source_word: σχῶ
  english_pob_choice: have
  chosen_korean: 갖다
  alternatives_korean:
  - 겪다
  - 견디다
  lexicon: BDAG
  rationale: ἔχω의 폭넓은 의미. 「슬픔을 갖다」가 가장 직접적이고 해석적 개입이 적다.
