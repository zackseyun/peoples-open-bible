  verdict: revise
  source_alignment_summary: 'El borrador sigue bien el hebreo base: imperativo negativo, proximidad personal, consecuencia de desplazamiento y ocupación del lugar del destinatario. También conserva correctamente la nota de lectura alternativa griega. Sin embargo, la formulación española puede ajustarse mejor al matiz de desplazamiento implícito en יֶהְדָּפְךָ y al paralelo con ''stand in your place''.'
  spanish_quality_summary: 'El español es claro y natural, pero ''te empuje'' queda algo incompleto en español sin un complemento de desplazamiento, y ''se ponga en tu lugar'' suena un poco menos idiomático que ''ocupe tu lugar'' o ''esté en tu lugar''. Para mantener mayor cercanía con la imagen hebrea y buena legibilidad, conviene explicitar el apartamiento: ''te haga a un lado y ocupe tu lugar''.'
  glossary_alignment: No hay términos del glosario teológico principal en juego. La nota sobre el griego está bien formulada. La elección de base hebrea frente al paralelo griego está correctamente preservada.
  issues:
  - severity: medium
    issue: יֶהְדָּפְךָ se vierte solo como 'te empuje'
    rationale: En español, 'empujar' sin complemento puede sonar físico pero no deja tan claro el desplazamiento social/posicional que exige el contexto con 'en tu lugar'. 'Te haga a un lado' o equivalente comunica mejor el sentido contextual documentado en el POB.
  - severity: low
    issue: '''se ponga en tu lugar'' es menos natural en este contexto'
    rationale: Aunque es comprensible, en advertencia sapiencial suena más idiomático 'ocupe tu lugar'. Esto además enlaza mejor con la consecuencia de reemplazo implícita en תחתיך.
  revised_spanish_text: No lo pongas junto a ti[a], no sea que te haga a un lado y ocupe tu lugar.
