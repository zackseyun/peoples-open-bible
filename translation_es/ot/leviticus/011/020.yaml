revisions:
- from: Todo ser alado[a] que se arrastra y anda sobre cuatro patas[b] es repugnante para ustedes[c].
  to: Toda criatura alada[a] que pulula y anda sobre cuatro patas[b] es detestable para ustedes[c].
  rationale: Se corrige שֶׁרֶץ para reflejar el sentido de 'pulular' en vez de 'arrastrarse', se repara la nota léxica para que preserve la alternativa auditada sobre עוֹף, y se sustituye 'repugnante' por 'detestable' para alinearse con la decisión POB sobre שֶׁקֶץ. La redacción resultante es más fiel al hebreo y más coherente en español.
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T21:29:17Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador conserva la estructura legal general del hebreo, pero altera de forma importante שֶׁרֶץ הָעוֹף al invertir las categorías: el hebreo habla de una ''criatura pululante/alimaña alada o voladora'', no de ''ser alado que se arrastra''. La nota a además contradice el sentido de עוֹף al sugerir como alternativa ''ser que se arrastra''. También לָכֶם se expresa mejor con dativo de relación (''para ustedes'' o ''para vosotros''); eso está aceptable, aunque ''para ustedes'' suena un poco menos directo que ''para ustedes les es''.'
  spanish_quality_summary: 'El español es legible, pero ''que se arrastra'' introduce una imagen incorrecta y poco natural junto con ''alado''. ''Repugnante'' es comprensible, aunque ''detestable'' refleja mejor la decisión auditada y evita un matiz de asco físico más que de detestabilidad ritual. La frase mejora con una formulación más directa y congruente: ''Toda criatura alada que pulula y anda sobre cuatro patas es detestable para ustedes''.'
  glossary_alignment: 'No hay términos de proyecto mayores en juego como Yahvé o Mesías. Sí hay desalineación con la decisión léxica auditada: שֶׁרֶץ debe reflejar ''criatura que pulula / criatura pululante / insecto pululante'' más que ''se arrastra''; שֶׁקֶץ debe preferir ''detestable'' sobre ''repugnante'' para mantener la racionalidad POB sobre detestabilidad ritual. עוֹף como ''alado'' está bien y debe conservarse.'
  issues:
  - severity: high
    issue: שֶׁרֶץ está mal representado como 'que se arrastra' en el texto principal.
    rationale: El hebreo describe una categoría de criaturas pequeñas que pululan/abundan; 'arrastrarse' estrecha y distorsiona el referente, especialmente en combinación con insectos alados de los vv. 20–23.
  - severity: high
    issue: 'La nota [a] ofrece una alternativa equivocada: ''ser que se arrastra''.'
    rationale: Esa alternativa no corresponde al inglés auditado ('Every swarming flying creature') ni al hebreo עוֹף; además crea confusión al borrar el componente 'alada/voladora'.
  - severity: medium
    issue: '''Repugnante'' no sigue la preferencia léxica auditada para שֶׁקֶץ.'
    rationale: Aunque posible, 'repugnante' enfatiza asco subjetivo. 'Detestable' preserva mejor la fuerza ritual-tabú documentada en la POB.
  revised_spanish_text: Toda criatura alada[a] que pulula y anda sobre cuatro patas[b] es detestable para ustedes[c].
  revised_footnotes:
  - marker: a
    text: O «Toda criatura voladora que pulula». El hebreo עוֹף puede denotar criaturas voladoras en sentido amplio, no solo aves.
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «anda sobre cuatro». Es un modismo de locomoción cuadrúpeda; los versículos siguientes introducen una excepción para ciertos insectos saltadores.'
    reason: cultural_note
  - marker: c
    text: O «es una abominación para ustedes». Aquí el término expresa detestabilidad ritual en el marco de las leyes alimentarias.
    reason: lexical_alternative
  revision_rationale: Se corrige שֶׁרֶץ para reflejar el sentido de 'pulular' en vez de 'arrastrarse', se repara la nota léxica para que preserve la alternativa auditada sobre עוֹף, y se sustituye 'repugnante' por 'detestable' para alinearse con la decisión POB sobre שֶׁקֶץ. La redacción resultante es más fiel al hebreo y más coherente en español.
