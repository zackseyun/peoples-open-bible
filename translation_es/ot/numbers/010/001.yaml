review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja fielmente la fórmula hebrea: וַיְדַבֵּר = «habló», אֶל = «a», מֹשֶׁה = «Moisés», לֵאמֹר = «diciendo». El sentido global del versículo está bien conservado.'
  spanish_quality_summary: 'El texto principal es natural, claro y digno en español bíblico contemporáneo. Sin embargo, la nota al pie introduce una inconsistencia: presenta «YHWH» como si fuera una alternativa a «Yahvé», cuando en realidad «Yahvé» ya es la traducción principal española del Tetragrámaton. La nota debe explicar el hebreo subyacente sin sugerir erróneamente que «Yahvé» es solo una transliteración alternativa del mismo texto español.'
  glossary_alignment: El uso de «Yahvé» en el texto principal cumple correctamente la política terminológica del proyecto para יהוה / YHWH. «Habló», «Moisés» y «diciendo» también concuerdan con las decisiones léxicas auditadas. La única desalineación está en la formulación de la nota, no en el texto bíblico principal.
  issues:
  - severity: medium
    issue: Nota al pie mal formulada sobre el nombre divino
    rationale: 'La nota actual dice: «Hebreo: “YHWH”; alternativamente, se translitera “Yahvé”». Esto es confuso porque «Yahvé» ya aparece en el texto principal y es precisamente la forma española elegida para representar יהוה. La nota debe describir el hebreo subyacente y, si se conserva la estructura del audit trail inglés, presentar «Yahweh» como alternativa de transliteración, no «Yahvé».'
  revised_spanish_text: Yahvé habló a Moisés[a], diciendo,
  revised_footnotes:
  - marker: a
    text: 'Hebreo: «YHWH»; alternativamente, «Yahweh».'
    reason: alternative_reading
  revision_rationale: Se conserva intacto el texto principal porque es fiel al hebreo y natural en español. Solo se corrige la nota al pie para que explique con precisión el nombre divino subyacente sin crear una falsa alternativa frente a «Yahvé», que ya es la forma principal establecida por el proyecto en español.
