translation:
  language: es
  text: Sé propicio conmigo[a], Dios, sé propicio conmigo, porque mi alma se refugia en ti[b]; y a la sombra de tus alas me refugiaré hasta que pase la destrucción[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Ten misericordia de mí» o «Muéstrame tu favor». El hebreo expresa una súplica de favor o gracia.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «mi vida se refugia en ti» o simplemente «me refugio en ti». El hebreo «mi alma» puede significar «alma», «vida» o la persona entera.'
    reason: lexical_alternative
  - marker: c
    text: Hebreo «destrucciones» o «calamidades» (plural), probablemente una expresión colectiva para peligros ruinosos.
    reason: lexical_alternative
lexical_decisions:
- source_word: חָנֵּנִי
  english_pob_choice: Be gracious to me
  chosen_spanish: Ten gracia de mí
  alternatives_spanish:
  - Ten misericordia de mí
  - Concédeme gracia
  lexicon: HALOT
  rationale: El hebreo es una súplica verbal de favor/gracia. «Ten gracia de mí» conserva ese valor imperativo y la relación personal de ruego mejor que una paráfrasis explicativa. Se evita «misericordia» como opción principal porque desplaza el matiz de gracia/favor que el POB inglés quiso preservar.
- source_word: אֱלֹהִים
  english_pob_choice: God
  chosen_spanish: Dios
  alternatives_spanish:
  - Dios mío
  lexicon: HALOT
  rationale: Es el vocativo directo normal para אֱלֹהִים aquí. No hay indicio inmediato para sustituirlo por el nombre del pacto o por una formulación más específica.
- source_word: בְךָ
  english_pob_choice: in you
  chosen_spanish: en ti
  alternatives_spanish:
  - contigo
  lexicon: HALOT
  rationale: La preposición ב con חסה expresa el lugar o ámbito de refugio; «en ti» reproduce mejor la metáfora y el sentido relacional que «contigo».
- source_word: חָסָיָה נַפְשִׁי
  english_pob_choice: my soul takes refuge
  chosen_spanish: se refugia mi alma
  alternatives_spanish:
  - mi alma se refugia
  - me refugio
  lexicon: HALOT
  rationale: «Mi alma» conserva la imagen hebrea de נַפְשִׁי sin reducirla de entrada a un simple pronombre. «Se refugia» refleja el estado de confianza ya asentado; mantiene la fuerza perfecta del hebreo y la cohesión con el verbo posterior.
- source_word: נַפְשִׁי
  english_pob_choice: my soul
  chosen_spanish: mi alma
  alternatives_spanish:
  - mi vida
  - yo mismo
  lexicon: HALOT
  rationale: נֶפֶשׁ puede referirse a alma, vida, yo mismo o la persona entera. En español bíblico, «alma» es la opción más transparente y literaria, pero no se pretende estrechar el sentido antropológico; esa amplitud queda señalada en nota.
- source_word: וּבְצֵל כְּנָפֶיךָ
  english_pob_choice: and in the shadow of your wings
  chosen_spanish: y a la sombra de tus alas
  alternatives_spanish:
  - y bajo la sombra de tus alas
  - y en la sombra de tus alas
  lexicon: HALOT
  rationale: «A la sombra de» es una construcción natural y fiel para la imagen de protección. «Alas» reproduce el símbolo bíblico habitual; se evita «plumas» o una explicación no presente en el texto.
- source_word: אֶחְסֶה
  english_pob_choice: I will take refuge
  chosen_spanish: me refugiaré
  alternatives_spanish:
  - tomaré refugio
  - me ampararé
  lexicon: HALOT
  rationale: El imperfecto 1cs expresa continuidad/proyección; «me refugiaré» suena natural en español y conserva el valor prospectivo. «Amparar» es viable, pero «refugiarse» mantiene mejor la repetición con el verbo de la primera hemistiquio.
- source_word: יַעֲבֹר
  english_pob_choice: passes by
  chosen_spanish: pase
  alternatives_spanish:
  - pase de largo
  - haya pasado
  lexicon: HALOT
  rationale: 'En la construcción con עד, el español natural es una subordinada temporal: «hasta que pase». El verbo retiene la idea de movimiento de peligro o desastre que se aleja.'
- source_word: הַוּוֹת
  english_pob_choice: destruction
  chosen_spanish: la destrucción
  alternatives_spanish:
  - las destrucciones
  - las calamidades
  - la ruina
  lexicon: HALOT
  rationale: El plural hebreo puede funcionar colectivamente para males ruinosos. «La destrucción» ofrece un español fluido y solemne, mientras que las alternativas preservan el matiz plural si se desea explicitarlo.
theological_decisions:
- issue: Alcance antropológico de נַפְשִׁי
  english_pob_reading: my soul
  chosen_spanish_reading: mi alma
  alternative_spanish_readings:
  - mi vida
  - yo mismo
  rationale: Se conserva «alma» por su transparencia poética y por corresponder al audit trail del POB inglés. A la vez, se reconoce que נֶפֶשׁ puede significar la persona, la vida o el ser entero; por eso la traducción no debe leerse como una afirmación filosófica estrecha sobre una parte inmaterial del ser humano.
  doctrine_reference: 'Affirmations; Translation philosophy #1 and #3'
- issue: Imágenes protectoras de la sombra de las alas
  english_pob_reading: metaphorical divine protection
  chosen_spanish_reading: metáfora de protección divina
  alternative_spanish_readings:
  - imagen antropomórfica literalizada
  - protección
  rationale: Se mantiene la imagen bíblica sin convertirla en una paráfrasis abstracta. La expresión conserva su fuerza poética y su tensión teológica, mientras el lector entiende el sentido protector sin borrar el símbolo.
  doctrine_reference: 'Translation philosophy #1 and #3'
translation_notes:
  revision_awareness: La revisión más reciente indicó que no se requerían cambios y el pasaje quedó en alta concordancia con la auditoría inglesa; por eso el borrador español sigue de cerca las decisiones léxicas documentadas, sin introducir paráfrasis nuevas.
  spanish_consistency_notes:
  - Se mantiene «Dios» para אֱלֹהִים, en coherencia con el POB inglés.
  - Se conserva el paralelismo verbal entre «ten gracia» y «me refugiaré», reflejando la repetición hebrea.
  - «Destrucción» traduce el plural hebreo de modo colectivo; la nota preserva el posible matiz plural.
  - La puntuación y el orden sintáctico buscan un español publicable sin perder la estructura poética del hebreo.
