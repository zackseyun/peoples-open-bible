id: EZK.47.17
reference: Ezekiel 47:17
source:
  edition: WLC
  text: וְ/הָיָ֨ה גְב֜וּל מִן הַ/יָּ֗ם חֲצַ֤ר עֵינוֹן֙ גְּב֣וּל דַּמֶּ֔שֶׂק וְ/צָפ֥וֹן צָפ֖וֹנָ/ה וּ/גְב֣וּל חֲמָ֑ת וְ/אֵ֖ת פְּאַ֥ת צָפֽוֹן־׀׃
translation:
  text: So the border shall be from the sea to Hazar-enon[a], at the border of Damascus; and on the north, northward, with the border of Hamath[b]. This shall be the north side.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''from the sea.'' In context this is the Mediterranean Sea, but the text does not explicitly repeat ''Great Sea'' here.'
    reason: cross_reference
  - marker: b
    text: 'Hazar-enon: traditionally also rendered ''Hazar-enan.'''
    reason: alternative_reading
lexical_decisions:
- source_word: וְהָיָה
  chosen: So ... shall be
  alternatives:
  - And ... shall be
  - And it shall be
  lexicon: HALOT
  rationale: Introduces the specification of the boundary. English uses a future-like modal ('shall be') to express the descriptive legal/topographical force of the Hebrew perfect with waw in this context.
- source_word: גְּבוּל
  chosen: border
  alternatives:
  - boundary
  lexicon: HALOT
  rationale: '''Border'' is natural modern English for a territorial limit and fits the repeated usage in this passage.'
- source_word: מִן הַיָּם
  chosen: from the sea
  alternatives:
  - from the Great Sea
  - from the western sea
  lexicon: HALOT
  rationale: The Hebrew here reads simply 'from the sea.' In the immediate context this refers to the Mediterranean, but the text itself does not repeat 'Great,' so the main text keeps the simpler wording.
- source_word: חֲצַר עֵינוֹן
  chosen: Hazar-enon
  alternatives:
  - Hazar-enan
  lexicon: HALOT
  rationale: This is a place-name, so it is transliterated rather than translated, following the project's policy for names. The vocalization supports a form like 'Hazar-enon,' though English tradition often has 'Hazar-enan.'
- source_word: גְּבוּל דַּמֶּשֶׂק
  chosen: at the border of Damascus
  alternatives:
  - the border of Damascus
  - Damascus border
  lexicon: HALOT
  rationale: The construct phrase identifies Hazar-enon in relation to Damascus. 'At the border of Damascus' makes the geographic relation clear in idiomatic English.
- source_word: וְצָפוֹן צָפוֹנָה
  chosen: to the north
  alternatives:
  - northward
  - on the north
  lexicon: HALOT
  rationale: The doubled north term with directional ending expresses northern orientation. 'To the north' is concise and natural.
- source_word: וּגְבוּל חֲמָת
  chosen: with the border of Hamath
  alternatives:
  - and the border of Hamath
  - Hamath border
  lexicon: HALOT
  rationale: This phrase further defines the northern extent. 'With' reflects the connective force smoothly in English while keeping the appositional/topographical style.
- source_word: וְאֵת פְּאַת צָפוֹן
  chosen: this shall be the north side
  alternatives:
  - and the north side
  - namely, the north side
  lexicon: HALOT
  rationale: The direct-object marker plus 'side/edge of north' functions resumptively, concluding the description of the northern boundary. English requires some smoothing; 'this shall be the north side' captures the summarizing force.
