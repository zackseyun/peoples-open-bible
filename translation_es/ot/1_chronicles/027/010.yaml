translation:
  language: es
  text: 'El séptimo[a], para el séptimo mes: Helez el pelonita, de los hijos de Efraín; y su división tenía veinticuatro mil.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O posiblemente ‘el paltita’, reflejando otra identificación tradicional del designativo de clan de Helez.
    reason: alternative_reading
lexical_decisions:
- source_word: הַשְּׁבִיעִי
  english_pob_choice: The seventh
  chosen_spanish: El séptimo
  alternatives_spanish:
  - El séptimo comandante
  - El séptimo jefe de división
  lexicon: HALOT
  rationale: En este listado militar, el ordinal funciona de manera elíptica para identificar al séptimo turno o jefe de la serie. En español, ‘El séptimo’ conserva esa concisión y evita añadir un sustantivo no explícito en el hebreo.
- source_word: לַחֹדֶשׁ הַשְּׁבִיעִי
  english_pob_choice: for the seventh month
  chosen_spanish: para el séptimo mes
  alternatives_spanish:
  - para el mes séptimo
  - para el servicio del séptimo mes
  lexicon: HALOT
  rationale: La preposición ל con חֹדֶשׁ aquí marca asignación por mes. ‘Para el séptimo mes’ reproduce bien la relación funcional y resulta natural en español.
- source_word: חֶלֶץ
  english_pob_choice: Helez
  chosen_spanish: Helez
  alternatives_spanish:
  - —
  lexicon: Transliteración propia
  rationale: Es un nombre אישי; se conserva transliterado en español como en el inglés POB.
- source_word: הַפְּלוֹנִי
  english_pob_choice: the Pelonite
  chosen_spanish: el pelonita
  alternatives_spanish:
  - el paltita
  lexicon: HALOT
  rationale: Se mantiene la designación gentilicia/etnónima con la forma que sigue el hebreo consonántico en este versículo. ‘Paltita’ queda como alternativa textual/tradicional reflejada en la nota.
- source_word: מִן בְּנֵי אֶפְרָיִם
  english_pob_choice: from the sons of Ephraim
  chosen_spanish: de los hijos de Efraín
  alternatives_spanish:
  - de los efraimitas
  - del pueblo de Efraín
  lexicon: HALOT
  rationale: ‘Hijos de Efraín’ conserva el idioma tribal literal del hebreo, que el inglés POB también preserva. ‘Efraimitas’ sería posible, pero pierde el paralelismo más directo con el original.
- source_word: וְעַל מַחֲלֻקְתּוֹ
  english_pob_choice: and over his division were
  chosen_spanish: y sobre su división había
  alternatives_spanish:
  - y su división tenía
  - y en su división había
  lexicon: HALOT
  rationale: מַחֲלֻקָה en este capítulo designa una unidad o división militar. ‘Sobre su división había’ conserva la idea de autoridad/responsabilidad y se adapta al español sin forzar una traducción demasiado literal del orden hebreo.
- source_word: עֶשְׂרִים וְאַרְבָּעָה אָלֶף
  english_pob_choice: twenty-four thousand
  chosen_spanish: veinticuatro mil
  alternatives_spanish:
  - '24.000'
  - veinte y cuatro mil
  lexicon: HALOT
  rationale: El cardinal se expresa en forma plena, según el estilo bíblico literario y la práctica del POB en inglés.
theological_decisions:
- issue: Identificación textual de הַפְּלוֹנִי
  english_pob_reading: 'the Pelonite; footnote: Or possibly ''the Paltite,'' reflecting a different traditional identification of Helez''s clan designation.'
  chosen_spanish_reading: 'el pelonita; nota: ‘Posiblemente, ‘el paltita’, reflejando otra identificación tradicional del designativo de clan de Helez.’'
  alternative_spanish_readings:
  - el paltita
  - el pelonita (sin nota)
  rationale: El testimonio masorético apoya la forma consonántica que corresponde a ‘pelonita’, pero la tradición alternativa ‘paltita’ merece preservarse como variante documentada, no borrada. La nota mantiene la tensión textual sin resolverla artificialmente.
  doctrine_reference: Principio de crítica textual y transparencia de variantes; no doctrinal en sentido estricto.
translation_notes:
  revision_awareness: 'El pasaje en inglés POB fue revisado y quedó sin cambios (latest_revision_pass: unchanged=true; changes_summary: No changes needed). La versión española sigue el mismo trazado auditado, manteniendo la estructura breve del versículo, la transliteración de nombres propios y la nota de variante para הַפְּלוֹנִי.'
  spanish_consistency_notes:
  - Se conserva ‘Yahvé’ como norma general del proyecto, pero este versículo no contiene el nombre divino.
  - Se mantiene ‘hijos de Efraín’ para respetar el idiomático tribal del hebreo.
  - ‘División’ se usa en sentido militar/administrativo, coherente con el capítulo.
  - La nota de variante se ancla en el término ‘pelonita’ para preservar la alternativa textual documentada.
