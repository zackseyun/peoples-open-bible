id: 1TH.1.3
reference: 1 Thessalonians 1:3
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: μνημονεύοντες ὑμῶν τοῦ ἔργου τῆς πίστεως καὶ τοῦ κόπου τῆς ἀγάπης καὶ τῆς ὑπομονῆς τῆς ἐλπίδος τοῦ κυρίου ἡμῶν Ἰησοῦ Χριστοῦ ἔμπροσθεν τοῦ θεοῦ καὶ πατρὸς ἡμῶν,
base_translation:
  language: en
  yaml_path: translation/nt/1_thessalonians/001/003.yaml
  text: remembering your work of faith and labor of love and steadfastness of hope in our Lord Jesus Messiah before our God and Father[b][a],
  footnotes:
  - marker: a
    text: Or 'faithfulness' or 'trust' for 'faith.'
    reason: lexical_alternative
  - marker: b
    text: Greek 'Christ'; translated 'Messiah' here because Χριστός functions as a title.
    reason: alternative_reading
translation:
  language: ko
  text: 우리 아버지 하나님 앞에서 여러분의 믿음[a]의 일과 사랑의 수고와 우리 주 예수 메시아[b]를 향한 소망의 인내를 기억하고 있습니다.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 또는 「신실함」, 「신뢰」. 헬라어 πίστις는 「믿음」을 기본값으로 옮긴다.
    reason: lexical_alternative
  - marker: b
    text: 헬라어 「그리스도」. 본 번역은 칭호로 기능하는 Χριστός를 「메시아」로 옮긴다.
    reason: alternative_reading
lexical_decisions:
- source_word: μνημονεύοντες
  english_pob_choice: remembering
  chosen_korean: 기억하고 있습니다
  alternatives_korean:
  - 떠올리며
  - 마음에 두며
  lexicon: BDAG
  rationale: 현재 분사. 2절의 「기억하고 있습니다」와 연결되는 흐름을 합쇼체 종결로 자연스럽게 풀어낸다.
- source_word: τοῦ ἔργου τῆς πίστεως
  english_pob_choice: work of faith
  chosen_korean: 믿음의 일
  alternatives_korean:
  - 믿음에서 나온 일
  - 믿음의 행위
  lexicon: BDAG
  rationale: 속격을 단순 「~의」로 옮겨 바울의 삼중 구조(일—수고—인내)를 보존한다. 의미 풀이(「믿음에서 나온」)는 피한다.
- source_word: τοῦ κόπου τῆς ἀγάπης
  english_pob_choice: labor of love
  chosen_korean: 사랑의 수고
  alternatives_korean:
  - 사랑에서 비롯된 수고
  - 사랑으로 인한 노고
  lexicon: BDAG
  rationale: κόπος는 단순 「일」보다 노고·고된 수고의 어감을 담는다. 한국어 「수고」는 그 무게를 자연스럽게 표현한다.
- source_word: τῆς ὑπομονῆς τῆς ἐλπίδος
  english_pob_choice: steadfastness of hope
  chosen_korean: 소망의 인내
  alternatives_korean:
  - 소망에서 비롯된 인내
  - 소망이 낳은 견딤
  lexicon: BDAG
  rationale: ὑπομονή는 압박 아래에서의 끈기·견딤을 가리키며, 「인내」가 가장 표준적인 한국어 등가어이다.
- source_word: τοῦ κυρίου ἡμῶν Ἰησοῦ Χριστοῦ
  english_pob_choice: in our Lord Jesus Messiah
  chosen_korean: 우리 주 예수 메시아를 향한
  alternatives_korean:
  - 우리 주 예수 메시아 안에 있는
  - 우리 주 예수 메시아의
  lexicon: BDAG
  rationale: 속격은 「소망」의 대상·지향을 가리킨다. 한국어 「~을 향한」이 소망의 방향성을 분명히 살리며, 칭호 Χριστός는 일관되게 「메시아」로 옮긴다.
- source_word: ἔμπροσθεν τοῦ θεοῦ καὶ πατρὸς ἡμῶν
  english_pob_choice: before our God and Father
  chosen_korean: 우리 아버지 하나님 앞에서
  alternatives_korean:
  - 우리 하나님과 아버지 앞에서
  - 우리 하나님 곧 아버지 앞에서
  lexicon: BDAG
  rationale: 두 명사가 한 관사 아래 동격으로 묶이므로 「하나님—곧 아버지」로 읽는다. 한국어로는 「아버지 하나님」 어순이 자연스럽고 친밀하다.
theological_decisions:
- issue: πίστις의 의미를 「믿음」으로 옮기는 결정
  chosen_reading: 믿음
  alternative_readings:
  - 신실함
  - 신뢰
  rationale: 본문에서 「믿음의 일」은 믿음에서 비롯된 행위를 가리킬 가능성이 가장 크다. 본 번역의 기본값(πίστις → 믿음)을 따르되, 「신실함」의 가능성을 각주에 둔다.
  doctrine_reference: 'DOCTRINE.md: Contested terms — πίστις → faith'
