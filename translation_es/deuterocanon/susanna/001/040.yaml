translation:
  language: es
  text: 'Pero, tras sujetarla, la interrogamos: «¿Quién era el hombre?». Pero ella no nos dijo quién era; de esto damos testimonio.'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ἐπιλαβόμενοι
  english_pob_choice: after seizing
  chosen_spanish: al apoderarnos de
  alternatives_spanish:
  - después de tomarla
  - tras sujetarla
  lexicon: BDAG
  rationale: El participio aoristo medio de ἐπιλαμβάνομαι indica una captura o aprehensión física. En español, «al apoderarnos de» conserva la fuerza de la acción sin sonar tan áspero como una calca literal, y encaja con el contexto forense.
- source_word: ἐπηρώτωμεν
  english_pob_choice: we questioned
  chosen_spanish: la interrogamos
  alternatives_spanish:
  - la cuestionamos
  - le preguntamos
  lexicon: BDAG
  rationale: El imperfecto de ἐπερωτάω sugiere una acción sostenida en un contexto judicial. «Interrogamos» preserva mejor el registro legal que «preguntamos», mientras sigue siendo natural en español.
- source_word: Τίς ὁ ἄνθρωπος;
  english_pob_choice: Who was the man?
  chosen_spanish: ¿Quién era el hombre?
  alternatives_spanish:
  - ¿Quién es el hombre?
  - ¿Quién era ese hombre?
  lexicon: BDAG
  rationale: La pregunta identifica a un varón concreto dentro de un testimonio retrospectivo; por eso el imperfecto «era» refleja el tiempo narrativo del relato y mantiene el valor identificador del artículo ὁ.
- source_word: οὐκ ἀπήγγειλεν ἡμῖν
  english_pob_choice: she did not tell us
  chosen_spanish: no nos reveló
  alternatives_spanish:
  - no nos dijo
  - no nos informó
  lexicon: BDAG
  rationale: ἀπαγγέλλω puede significar 'informar/relatar', pero aquí el punto es que ella no identificó al hombre. «Reveló» comunica esa negativa a dar a conocer la identidad sin volver la frase excesivamente técnica.
- source_word: τίς ἦν
  english_pob_choice: who he was
  chosen_spanish: quién era
  alternatives_spanish:
  - quién había sido
  - de quién se trataba
  lexicon: BDAG
  rationale: La cláusula precisa identidad, no carácter. En español, «quién era» reproduce con claridad la referencia personal del griego y evita añadir matices no presentes.
- source_word: ταῦτα μαρτυροῦμεν
  english_pob_choice: These things we testify
  chosen_spanish: de esto damos testimonio
  alternatives_spanish:
  - esto testificamos
  - de estas cosas damos testimonio
  lexicon: BDAG
  rationale: μαρτυρέω conserva un tono forense; «dar testimonio» mantiene el lenguaje jurídico y suena más natural en español que una traducción más rígida como «esto testificamos». La forma singular «de esto» recoge el conjunto de los hechos previos.
theological_decisions:
- issue: Registro forense de la acusación
  english_pob_reading: Retain explicit legal/testimonial wording in the final clause
  chosen_spanish_reading: Mantener explícitamente el lenguaje de testimonio en la cláusula final
  alternative_spanish_readings:
  - usar una formulación más narrativa como 'esto es lo que decimos'
  - reducirlo a 'esta es nuestra declaración'
  rationale: La escena pertenece a un proceso de acusación. Conservar «dar testimonio» preserva la fuerza jurídica del griego y evita desdibujar la naturaleza testimonial de la afirmación.
  doctrine_reference: Translation philosophy §§1, 5, 6
translation_notes:
  revision_awareness: El pasaje coincide ampliamente con el texto griego proporcionado y con la lectura inglesa auditada; no se observan revisiones aplicadas ni variantes textuales relevantes para este versículo en el paquete suministrado.
  spanish_consistency_notes:
  - Se mantiene el registro judicial del pasaje mediante «interrogamos» y «dar testimonio».
  - Se evita «SEÑOR» o terminología teológica ajena porque este versículo no contiene referencias divinas explícitas.
  - La puntuación respeta el discurso directo y la coordinación adversativa del griego.
