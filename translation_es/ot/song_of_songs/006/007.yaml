translation:
  language: es
  text: Tus mejillas son como un gajo de granada detrás de tu velo[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «detrás de tus mechones» o «a través de tu cabello», si לְצַמָּתֵךְ se entiende como una referencia al cabello y no a un velo.
    reason: lexical_alternative
lexical_decisions:
- source_word: כְּפֶלַח
  english_pob_choice: like a slice
  chosen_spanish: como una rebanada
  alternatives_spanish:
  - como una porción
  - como un gajo
  lexicon: HALOT
  rationale: El prefijo כ expresa comparación, y פֶלַח denota una pieza cortada o segmentada. «Rebanada» comunica bien en español la imagen de un corte visible y mantiene el valor comparativo sin volver la frase artificiosa.
- source_word: הָרִמּוֹן
  english_pob_choice: of pomegranate
  chosen_spanish: de granada
  alternatives_spanish:
  - de la granada
  lexicon: HALOT
  rationale: El referente es la fruta «granada». En español natural, «una rebanada de granada» conserva la imagen poética sin añadir un artículo que no aporta claridad en este contexto.
- source_word: רַקָּתֵךְ
  english_pob_choice: your cheeks
  chosen_spanish: tus mejillas
  alternatives_spanish:
  - tu sien
  - tu temple
  lexicon: HALOT
  rationale: Aunque רַקָּה puede referirse a la sien o al lado de la cabeza, el contexto poético de belleza visible favorece una referencia facial en plural en español. «Mejillas» transmite mejor el efecto estético que se describe.
- source_word: מִבַּעַד
  english_pob_choice: behind
  chosen_spanish: detrás de
  alternatives_spanish:
  - a través de
  - desde detrás de
  lexicon: HALOT
  rationale: La preposición indica una visión con algo interpuesto. «Detrás de» es la opción más natural con «velo» y preserva la idea de una belleza parcialmente oculta.
- source_word: לְצַמָּתֵךְ
  english_pob_choice: your veil
  chosen_spanish: tu velo
  alternatives_spanish:
  - tu cabello
  - tus mechones
  lexicon: HALOT
  rationale: La POB inglesa adopta «veil» como lectura principal, aunque reconoce la alternativa de cabello/locks. En español, «velo» mantiene esa decisión principal y hace inteligible la escena, dejando la ambigüedad del hebreo para la nota.
translation_notes:
  revision_awareness: La revisión más reciente del material fuente indica alto acuerdo y sin cambios necesarios; por eso se conserva la lectura principal de la POB inglesa, incluyendo la nota de ambigüedad léxica sobre לְצַמָּתֵךְ.
  spanish_consistency_notes:
  - Se mantuvo el paralelismo poético con una sola comparación principal y una nota breve para la ambigüedad léxica.
  - Se prefirió «velo» en el texto principal porque coincide con la decisión auditada de la POB inglesa.
  - Se usó español contemporáneo y natural, sin rebajar el tono poético del hebreo.
