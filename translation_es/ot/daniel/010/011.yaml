translation:
  language: es
  text: 'Y él me dijo: «Daniel, hombre muy amado, entiende las palabras que te hablo[a], y quédate en tu lugar[b], porque ahora he sido enviado a ti». Y cuando me habló[c] esta palabra, me quedé de pie temblando.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «estoy diciéndote» o «te estoy hablando». El hebreo usa un participio, que puede expresar acción en curso o inmediata.
    reason: lexical_alternative
  - marker: b
    text: O «ponte en tu puesto» o «ponte de pie en tu puesto». La expresión hebrea dice literalmente «sobre tu estar / tu lugar de pie».
    reason: lexical_alternative
  - marker: c
    text: O «cuando me dijo este mensaje». El hebreo dice literalmente «esta palabra», que también puede significar «mensaje» o «asunto».
    reason: lexical_alternative
lexical_decisions:
- source_word: אִישׁ חֲמֻדוֹת
  english_pob_choice: man greatly beloved
  chosen_spanish: hombre muy amado
  alternatives_spanish:
  - hombre de gran estima
  - hombre altamente estimado
  - hombre precioso
  lexicon: HALOT
  rationale: La expresión hebrea funciona como un honorífico afectuoso. «Muy amado» conserva el matiz relacional y el valor de favor sin volverlo demasiado abstracto. «Hombre precioso» sería más literal, pero menos natural en español.
- source_word: הָבֵן
  english_pob_choice: understand
  chosen_spanish: entiende
  alternatives_spanish:
  - considera
  - discierne
  lexicon: HALOT
  rationale: El imperativo pide captar el sentido de lo que sigue. «Entiende» es claro, natural y suficientemente formal en español.
- source_word: בַּדְּבָרִים
  english_pob_choice: the words
  chosen_spanish: las palabras
  alternatives_spanish:
  - los asuntos
  - las cosas
  - el mensaje
  lexicon: HALOT
  rationale: Aquí el contexto inmediato es de habla directa, por lo que el sentido de «palabras» es primario. «Asuntos» o «mensaje» son posibles, pero suavizan la referencia al discurso mismo.
- source_word: דֹבֵר אֵלֶיךָ
  english_pob_choice: I am speaking to you
  chosen_spanish: estoy hablando contigo
  alternatives_spanish:
  - te hablo
  - estoy diciéndote
  lexicon: HALOT
  rationale: El participio hebreo indica habla en curso o inmediata. «Estoy hablando contigo» reproduce bien esa progresividad en español natural.
- source_word: וַעֲמֹד עַל עָמְדֶךָ
  english_pob_choice: stand in your place
  chosen_spanish: ponte en tu lugar
  alternatives_spanish:
  - mantente en tu puesto
  - ponte de pie en tu puesto
  - quédate en tu lugar
  lexicon: HALOT
  rationale: Se conserva la idea idiomática de tomar o retomar la posición correspondiente sin forzar una lectura meramente física. «Ponte en tu lugar» mantiene la tensión entre postura corporal y posición asignada.
- source_word: שֻׁלַּחְתִּי אֵלֶיךָ
  english_pob_choice: I have been sent to you
  chosen_spanish: he sido enviado a ti
  alternatives_spanish:
  - fui enviado a ti
  - he sido mandado a ti
  lexicon: HALOT
  rationale: El pasivo perfecto puede sonar en español como pretérito perfecto o simple pasado. «He sido enviado» conserva la relevancia inmediata de la comisión en la escena.
- source_word: וּבְדַבְּרוֹ עִמִּי אֶת הַדָּבָר הַזֶּה
  english_pob_choice: when he spoke this word to me
  chosen_spanish: Y mientras me hablaba esta palabra
  alternatives_spanish:
  - Y cuando me habló esta palabra
  - Y mientras me decía esta palabra
  - Y cuando me habló este mensaje
  lexicon: HALOT
  rationale: La construcción señala acción simultánea. «Mientras» refleja bien la simultaneidad. Se mantiene «palabra» para respetar el hebreo, aunque en español «mensaje» sería una alternativa interpretativa viable.
- source_word: מַרְעִיד
  english_pob_choice: trembling
  chosen_spanish: temblando
  alternatives_spanish:
  - tiemblando
  - quebrándome de miedo
  - tembloroso
  lexicon: HALOT
  rationale: El participio expresa temblor físico. «Temblando» es el equivalente más natural y conciso en español.
theological_decisions:
- issue: Honorífico angélico dirigido a Daniel
  english_pob_reading: man greatly beloved
  chosen_spanish_reading: hombre muy amado
  alternative_spanish_readings:
  - hombre muy estimado
  - hombre altamente favorecido
  rationale: La frase comunica favor y aprecio divino sin añadir categorías doctrinales externas. Se evita una formulación demasiado eclesiástica para mantener el tono honorífico del hebreo.
  doctrine_reference: Translation philosophy §§1, 6
- issue: La fuerza idiomática de וַעֲמֹד עַל עָמְדֶךָ
  english_pob_reading: stand in your place
  chosen_spanish_reading: ponte en tu lugar
  alternative_spanish_readings:
  - mantente en tu puesto
  - ponte de pie en tu puesto
  rationale: La traducción preserva la tensión entre la postura física y la posición asignada. No se reduce a un simple mandato de erguirse, porque el hebreo parece abarcar más que lo corporal.
  doctrine_reference: Translation philosophy §3
translation_notes:
  revision_awareness: 'Se siguió el audit trail inglés con la revisión más reciente: se mantuvo la lectura de ''to me'' como ''a ti'' en la comisión inicial y se reflejó la simultaneidad de la cláusula final con una construcción temporal en español. También se preservó la tensión del hebreo en la idiomática de ''stand in your place'' sin resolverla demasiado.'
  spanish_consistency_notes:
  - Se usó «Yahvé» no aplica en este versículo.
  - Se prefirió «hombre muy amado» para mantener el honorífico afectuoso del hebreo.
  - «Palabra» se conservó donde el hebreo dice דָּבָר, aunque en español moderno podría leerse como «mensaje»; la nota lo aclara.
  - La construcción final «me quedé de pie temblando» evita sobreinterpretar el participio y conserva el matiz físico del temblor.
