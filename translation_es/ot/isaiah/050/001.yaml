revisions:
- from: 'Así dice Yahvé: ¿Dónde está el certificado de divorcio[a] de vuestra madre, con el cual yo la envié[b] fuera? ¿O a cuál de mis acreedores la vendí? Mirad: por causa de vuestras iniquidades fuisteis vendidos[c], y por causa de vuestras transgresiones fue enviada fuera vuestra madre.'
  to: 'Así dice Yahvé: «¿Dónde está el certificado de divorcio[a] de su madre[b], con el cual la envié? ¿O a cuál de mis acreedores los vendí a ustedes? Miren: por causa de sus iniquidades ustedes fueron vendidos, y por causa de sus transgresiones su madre fue enviada[c]».'
  rationale: 'Se corrige el error de sentido más importante (''la vendí'' → ''los vendí a ustedes'') para ajustarse a אֶתְכֶם y al audit trail inglés. También se normaliza el registro al español latinoamericano neutral (''su / ustedes / fueron / miren''), y se reorganizan las notas para que coincidan con el contenido y el anclaje pertinentes: alternativa legal en ''certificado de divorcio'', nota cultural en ''su madre'' y alternativa léxica en ''fue enviada''. El resultado preserva mejor el hebreo, la filosofía POB y la legibilidad eclesial en español.'
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T23:34:18Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue de cerca el hebreo y el rastro POB en varios puntos clave: usa ''Yahvé'', conserva la fórmula profética, mantiene la imagen legal de divorcio y la metáfora de venta por deuda, y distingue ''iniquidades'' de ''transgresiones''. Sin embargo, altera un elemento importante de sentido en la segunda pregunta: el hebreo y el inglés auditado dicen ''¿a cuál de mis acreedores los/ os vendí?'', con objeto de segunda persona plural (אֶתְכֶם), no ''la vendí''. Ese cambio desplaza la referencia desde ''ustedes'' a ''la'' (aparente singular femenino, tomado de ''madre'') y mezcla indebidamente las dos metáforas. Además, las notas al pie están desancladas o mal ancladas respecto de las decisiones inglesas: la nota sobre ''fue enviada fuera / fue divorciada'' debe ir en la segunda ocurrencia verbal, no en ''vendidos''; y falta la nota cultural sobre ''vuestra madre'' como metáfora corporativa.'
  spanish_quality_summary: 'El español es generalmente claro, digno y legible, pero presenta inconsistencia de registro pronominal: ''vuestra / fuisteis / mirad'' es peninsular, no neutral latinoamericano como pide el proyecto. También ''envié fuera'' y ''fue enviada fuera'' suenan algo calcados; ''despedí'' sería peor, pero ''la envié'' / ''fue enviada'' basta para naturalidad sin perder el vínculo léxico, o bien puede mantenerse ''envié'' con nota. Conviene ajustar todo a ''su / ustedes / fueron / miren'' o a otra solución latinoamericana coherente. La puntuación y estructura general son buenas.'
  glossary_alignment: 'Alinea bien con los términos del proyecto en ''Yahvé'', ''iniquidades'', ''transgresiones'' y la preservación de la metáfora. No hay conflicto con la terminología teológica central. La excepción necesaria es corregir el objeto de ''vendí'' a segunda persona plural y reubicar/restaurar las notas para reflejar el audit trail inglés: alternativa para ''certificado de divorcio'', nota cultural para ''madre'', y alternativa léxica para ''fue enviada''.'
  issues:
  - severity: high
    issue: Objeto incorrecto en '¿O a cuál de mis acreedores la vendí?'
    rationale: El hebreo tiene אֶתְכֶם ('a ustedes / os'), y el inglés POB auditado dice 'did I sell you'. 'La vendí' introduce un singular femenino ausente y confunde la metáfora comercial aplicada al pueblo con la metáfora maternal de Sion/Jerusalén.
  - severity: medium
    issue: Registro pronominal no neutro latinoamericano
    rationale: El borrador usa 'vuestra, fuisteis, mirad', formas asociadas al español peninsular. El encargo pide español neutral latinoamericano / ampliamente legible en iglesias. Debe normalizarse a 'su / ustedes / fueron / miren' o equivalente.
  - severity: medium
    issue: Notas al pie no siguen bien el rastro POB ni su anclaje
    rationale: La nota cultural sobre 'su madre' presente en el inglés POB falta en español. La nota que ofrece 'fue enviada fuera / fue divorciada' está marcada en 'vendidos', lo cual no corresponde al texto fuente ni al audit trail. Los marcadores deben aparecer exactamente donde aplica cada nota.
  - severity: low
    issue: '''envié fuera'' / ''fue enviada fuera'' suena algo forzado en español'
    rationale: Aunque refleja literalmente el verbo, en español neutral puede sonar calco. 'La envié' y 'fue enviada' conservan el paralelismo suficiente; la alternativa más literal puede preservarse en nota.
  revised_spanish_text: 'Así dice Yahvé: «¿Dónde está el certificado de divorcio[a] de su madre[b], con el cual la envié? ¿O a cuál de mis acreedores los vendí a ustedes? Miren: por causa de sus iniquidades ustedes fueron vendidos, y por causa de sus transgresiones su madre fue enviada[c]».'
  revised_footnotes:
  - marker: a
    text: O 'libelo de divorcio'. El hebreo se refiere a un documento legal formal de divorcio.
    reason: lexical_alternative
  - marker: b
    text: La expresión 'su madre' es una metáfora corporativa de Sion/Jerusalén o del pueblo del pacto representado como una madre.
    reason: cultural_note
  - marker: c
    text: O 'fue enviada fuera' o 'fue divorciada'. El hebreo dice literalmente 'fue enviada', en paralelo con la imagen de divorcio en el verso.
    reason: lexical_alternative
  revision_rationale: 'Se corrige el error de sentido más importante (''la vendí'' → ''los vendí a ustedes'') para ajustarse a אֶתְכֶם y al audit trail inglés. También se normaliza el registro al español latinoamericano neutral (''su / ustedes / fueron / miren''), y se reorganizan las notas para que coincidan con el contenido y el anclaje pertinentes: alternativa legal en ''certificado de divorcio'', nota cultural en ''su madre'' y alternativa léxica en ''fue enviada''. El resultado preserva mejor el hebreo, la filosofía POB y la legibilidad eclesial en español.'
