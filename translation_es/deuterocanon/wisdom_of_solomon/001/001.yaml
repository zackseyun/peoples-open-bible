translation:
  language: es
  text: Amen la rectitud[a], ustedes que juzgan la tierra[b]; piensen en el Señor con bondad, y búsquenlo con sinceridad de corazón[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'También: «la justicia». δικαιοσύνη puede abarcar rectitud y justicia; aquí «justicia» encaja bien por el contexto de quienes juzgan.'
    reason: lexical_alternative
  - marker: b
    text: O «ustedes, gobernantes de la tierra». Literalmente, «ustedes que juzgan la tierra».
    reason: lexical_alternative
  - marker: c
    text: 'También: «con un corazón indiviso». La expresión griega sugiere un corazón sin doblez, íntegro y no dividido.'
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἀγαπήσατε
  english_pob_choice: Love
  chosen_spanish: Amen
  alternatives_spanish:
  - Amen mucho
  - Amen profundamente
  lexicon: LSJ
  rationale: El imperativo aoristo de ἀγαπάω pide un mandato directo. En español, «amen» comunica con naturalidad la fuerza exhortativa sin añadir contenido que el griego no expresa.
- source_word: δικαιοσύνην
  english_pob_choice: righteousness
  chosen_spanish: la justicia
  alternatives_spanish:
  - la rectitud
  - la justicia / rectitud
  lexicon: LSJ
  rationale: El inglés POB preserva la alternativa «justice» por el contexto judicial del verso. En español, «justicia» es la correspondencia más directa y mantiene mejor la tensión contextual para quienes juzgan la tierra.
- source_word: οἱ κρίνοντες τὴν γῆν
  english_pob_choice: you who judge the earth
  chosen_spanish: ustedes que juzgan la tierra
  alternatives_spanish:
  - ustedes que gobiernan la tierra
  - ustedes, los jueces de la tierra
  lexicon: LSJ
  rationale: Se conserva el participio «juzgan» en vez de interpretar solo «gobiernan» o «rigen», porque el griego dice literalmente «los que juzgan la tierra». «Ustedes» hace explícito el destinatario en español.
- source_word: φρονήσατε
  english_pob_choice: think about
  chosen_spanish: piensen en
  alternatives_spanish:
  - piensen acerca de
  - tengan en mente
  lexicon: LSJ
  rationale: φρονέω aquí implica orientar la mente o la disposición. «Piensen en» suena natural en español y refleja la atención reflexiva pedida al sujeto.
- source_word: περὶ τοῦ κυρίου
  english_pob_choice: about the Lord
  chosen_spanish: en el Señor
  alternatives_spanish:
  - acerca del Señor
  - sobre el Señor
  lexicon: LSJ
  rationale: Aunque περί con genitivo puede ser «acerca de», en español «pensar en el Señor» es más idiomático y conserva el foco de la reflexión. Se mantiene «Señor» conforme al patrón doctrinal para κύριος.
- source_word: ἐν ἀγαθότητι
  english_pob_choice: with goodness
  chosen_spanish: con bondad
  alternatives_spanish:
  - con bondad de corazón
  - con benignidad
  lexicon: LSJ
  rationale: Ἀγαθότης denota bondad o benevolencia de disposición. «Con bondad» transmite el modo de pensar sin sobrecargar el verso con abstracciones.
- source_word: ἐν ἁπλότητι καρδίας
  english_pob_choice: with singleness of heart
  chosen_spanish: con sencillez de corazón
  alternatives_spanish:
  - con sinceridad de corazón
  - con un corazón sencillo
  lexicon: LSJ
  rationale: Ἁπλότης admite «sencillez», «sinceridad» o «singularidad/indivisión». «Sencillez de corazón» conserva la metáfora y, en español bíblico, puede abarcar sinceridad y una intención no dividida.
- source_word: ζητήσατε αὐτόν
  english_pob_choice: seek him
  chosen_spanish: búsquenlo
  alternatives_spanish:
  - busquen a él
  - háganlo objeto de su búsqueda
  lexicon: LSJ
  rationale: ζητέω se traduce naturalmente como «buscar»; con pronombre enclítico, «búsquenlo» resulta idiomático y directo, manteniendo el mandato de búsqueda activa.
theological_decisions:
- issue: Rendering of δικαιοσύνη
  english_pob_reading: righteousness
  chosen_spanish_reading: la justicia
  alternative_spanish_readings:
  - la rectitud
  rationale: El POB inglés deja abierta la alternativa «justice» porque δικαιοσύνη puede abarcar justicia/rectitud. En esta frase dirigida a quienes juzgan la tierra, «justicia» es la opción más fuerte en español y preserva la tensión judicial del contexto.
  doctrine_reference: 'DOCTRINE.md Contested terms: δικαιοσύνη → righteousness; alternatives preserved where relevant'
- issue: Referent nuance of οἱ κρίνοντες τὴν γῆν
  english_pob_reading: you who judge the earth
  chosen_spanish_reading: ustedes que juzgan la tierra
  alternative_spanish_readings:
  - ustedes que gobiernan la tierra
  rationale: Se evita resolver el participio a un título más interpretativo como «gobiernan». La traducción conserva la forma del griego y deja abierta la posible referencia a magistrados o gobernantes.
  doctrine_reference: DOCTRINE.md Translation philosophy 1, 3, 5
- issue: Rendering of κύριος
  english_pob_reading: the Lord
  chosen_spanish_reading: el Señor
  alternative_spanish_readings:
  - el amo
  rationale: Se mantiene «Señor», el equivalente doctrinal habitual para κύριος en este corpus. No hay indicio contextual inmediato para desviarse a otro valor lexical.
  doctrine_reference: 'DOCTRINE.md Contested terms: κύριος → Lord'
