translation:
  language: ko
  text: 하나님께서 우리 구주 예수 메시아[b]를 통하여 우리 위에 그분[a]을 풍성히 부어 주셨습니다.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 또는 「그것을 우리 위에 풍성히 부어 주셨습니다」 — 관계대명사를 비인격적으로 옮기는 경우. 선행사는 앞 절의 성령이다.
    reason: lexical_alternative
  - marker: b
    text: 헬라어 「예수 그리스도」를 칭호로 옮긴 「예수 메시아」. Χριστός는 본래 칭호이다.
    reason: lexical_alternative
lexical_decisions:
- source_word: οὗ ἐξέχεεν ἐφ’ ἡμᾶς
  english_pob_choice: whom he poured out on us
  chosen_korean: 우리 위에 그분을 ~ 부어 주셨습니다
  alternatives_korean:
  - 우리 위에 그것을 부어 주셨습니다
  - 우리에게 풍성히 부어 주셨습니다
  lexicon: BDAG
  rationale: 관계대명사 οὗ의 선행사는 5절의 성령. ἐκχέω는 「쏟아붓다」. 5절을 「성령의 새롭게 하심」으로 옮긴 흐름에서 인격적 「그분」으로 자연스럽게 받는다. 비인격적 「그것」은 각주.
- source_word: πλουσίως
  english_pob_choice: richly
  chosen_korean: 풍성히
  alternatives_korean:
  - 후하게
  - 넘치도록
  lexicon: BDAG
  rationale: 「풍성히」가 표준 한국어 등가어.
- source_word: διὰ Ἰησοῦ Χριστοῦ τοῦ σωτῆρος ἡμῶν
  english_pob_choice: through Jesus Messiah our Savior
  chosen_korean: 우리 구주 예수 메시아를 통하여
  alternatives_korean:
  - 우리의 구주이신 예수 메시아를 통하여
  - 예수 그리스도 우리 구주를 통하여
  lexicon: BDAG
  rationale: 1:4와 평행. σωτήρ→구주, Χριστός→메시아.
