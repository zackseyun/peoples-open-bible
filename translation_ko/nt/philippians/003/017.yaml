id: PHP.3.17
reference: Philippians 3:17
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: Συμμιμηταί μου γίνεσθε, ἀδελφοί, καὶ σκοπεῖτε τοὺς οὕτω περιπατοῦντας καθὼς ἔχετε τύπον ἡμᾶς·
base_translation:
  language: en
  yaml_path: translation/nt/philippians/003/017.yaml
  text: Brothers[a], join in imitating me, and keep your eyes on those who walk this way[b], just as you have us as a pattern.
  footnotes:
  - marker: a
    text: Or "brothers and sisters"; the Greek form is masculine plural but likely addresses the whole congregation.
    reason: cultural_note
  - marker: b
    text: Or "example."
    reason: lexical_alternative
translation:
  language: ko
  text: 형제 여러분[a], 함께 나를 본받는 자가 되십시오. 또 우리를 본보기[b]로 삼은 그대로 그렇게 걷는 자들을 눈여겨보십시오.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 또는 「형제자매 여러분」. 헬라어 호격은 남성 복수이나 회중 전체를 부르는 정형으로 쓰인다.
    reason: cultural_note
  - marker: b
    text: 또는 「본」 또는 「모범」. 헬라어 τύπος는 따라야 할 규범적 모범을 가리킨다.
    reason: lexical_alternative
lexical_decisions:
- source_word: Συμμιμηταί
  english_pob_choice: join in imitating
  chosen_korean: 함께 ~ 본받는 자
  alternatives_korean:
  - 동료 본받는 자
  - 더불어 본받는 자
  lexicon: BDAG
  rationale: σύν-의 「함께」 의미를 살린다. 「함께 본받는 자」가 개별이 아닌 공동의 본받음을 자연스럽게 표현한다.
- source_word: γίνεσθε
  english_pob_choice: join in imitating (idiomatic absorption)
  chosen_korean: 되십시오
  alternatives_korean:
  - 이 되십시오
  - 으로 사십시오
  lexicon: BDAG
  rationale: 명령형 γίνομαι를 합쇼체 「되십시오」로 옮긴다. 「~한 자가 되십시오」 구문이 자연스럽다.
- source_word: ἀδελφοί
  english_pob_choice: Brothers
  chosen_korean: 형제 여러분
  alternatives_korean:
  - 형제자매 여러분
  - 형제들이여
  lexicon: BDAG
  rationale: 1·13절과 일관된 호칭. 남성 복수형을 보존하고 포괄적 함의는 각주에.
- source_word: σκοπεῖτε
  english_pob_choice: keep your eyes on
  chosen_korean: 눈여겨보십시오
  alternatives_korean:
  - 주목하십시오
  - 지켜보십시오
  lexicon: BDAG
  rationale: 지속적이고 주의 깊은 관찰. 「눈여겨보다」가 「유심히 살피다」의 함의를 자연스럽게 담는다.
- source_word: οὕτω περιπατοῦντας
  english_pob_choice: those who walk this way
  chosen_korean: 그렇게 걷는 자들
  alternatives_korean:
  - 그렇게 살아가는 자들
  - 그러한 방식으로 행하는 자들
  lexicon: BDAG
  rationale: 바울의 흔한 비유 περιπατέω(삶의 방식)를 「걷다」로 보존하며, οὕτω를 「그렇게」로 옮긴다. 한국 성서 전통의 「행하다」도 가능하나 「걷다」가 원어의 비유를 더 잘 살린다.
- source_word: τύπον
  english_pob_choice: pattern
  chosen_korean: 본보기
  alternatives_korean:
  - 본
  - 모범
  - 본받을 자
  lexicon: BDAG
  rationale: 「본보기」가 따라야 할 규범적 모형을 가장 자연스럽게 담는다. 한국 성서 전통의 「본」도 가능하나 다소 짧고 추상적이다.
- source_word: ἡμᾶς
  english_pob_choice: us
  chosen_korean: 우리
  alternatives_korean:
  - 나
  - 우리의 본
  lexicon: BDAG
  rationale: 복수 대명사를 보존한다. 바울은 자신과 동역자들을 함께 포함한다.
- source_word: καθὼς
  english_pob_choice: just as
  chosen_korean: ~ 그대로
  alternatives_korean:
  - 마치 ~처럼
  - ~한 대로
  lexicon: BDAG
  rationale: 비교·동등 표지. 「~ 그대로」가 자연스럽고 격식에 맞는다.
theological_decisions:
- issue: ἀδελφοί의 포괄적 의미
  chosen_reading: 본문에 「형제 여러분」 유지, 회중 전체에 대한 함의는 각주.
  alternative_readings:
  - 본문에 「형제자매 여러분」으로 옮김
  rationale: 헬라어 형태는 남성 복수이므로 본문은 그 형태를 반영한다. 문맥상 포괄적이라는 사실은 각주에 둠으로써 원어 형태를 흐리지 않는다.
  doctrine_reference: 'Gender-accurate over gender-neutral.'
