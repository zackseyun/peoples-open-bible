translation:
  language: es
  text: Quien extrae piedras puede resultar herido por ellas[a]; y quien parte madera puede ponerse en peligro con ella[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Quien mueve o remueve piedras puede resultar herido por ellas». El verbo hebreo puede denotar más ampliamente desplazar o sacar piedras, no solo extraerlas de una cantera.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «leña» en vez de «madera». El hebreo puede referirse de manera general a madera o árboles; aquí probablemente alude a trozos de madera que se parten.'
    reason: lexical_alternative
lexical_decisions:
- source_word: מַסִּיעַ
  english_pob_choice: quarries
  chosen_spanish: saca
  alternatives_spanish:
  - remueve
  - desplaza
  - extrae
  lexicon: HALOT
  rationale: El hebreo puede abarcar la acción de mover, dislodar o sacar piedras. «Saca» comunica de forma natural la acción concreta sin imponer una imagen demasiado técnica como «canterear», y mantiene la posibilidad de riesgo por el acto mismo.
- source_word: אֲבָנִים
  english_pob_choice: stones
  chosen_spanish: piedras
  alternatives_spanish:
  - rocas
  lexicon: HALOT
  rationale: «Piedras» es la equivalencia más directa y natural en español para אֲבָנִים. Conserva el referente literal del proverbio y funciona bien en paralelo con la segunda mitad.
- source_word: יֵעָצֵב
  english_pob_choice: may be hurt
  chosen_spanish: puede resultar herido
  alternatives_spanish:
  - puede ser lastimado
  - puede sufrir daño
  - puede dolerle
  lexicon: HALOT
  rationale: El nifal de עצב puede expresar dolor, daño o lesión. En este contexto de trabajo manual, «resultar herido» preserva el sentido físico sin especificar más de lo que el hebreo exige.
- source_word: בָּהֶם
  english_pob_choice: by them
  chosen_spanish: por ellas
  alternatives_spanish:
  - con ellas
  - a causa de ellas
  lexicon: HALOT
  rationale: La preposición ב con sufijo aquí funciona de modo instrumental/causal. En español, «por ellas» expresa bien que las piedras son el medio o la causa del daño.
- source_word: בּוֹקֵעַ
  english_pob_choice: splits
  chosen_spanish: parte
  alternatives_spanish:
  - abre
  - corta
  - hende
  lexicon: HALOT
  rationale: בקע significa dividir o partir. «Parte» es la forma más natural y fiel en español para la acción de dividir leña.
- source_word: עֵצִים
  english_pob_choice: wood
  chosen_spanish: leña
  alternatives_spanish:
  - madera
  - madera para quemar
  - troncos
  lexicon: HALOT
  rationale: Aunque עֵצִים puede referirse a madera o árboles en general, en este contexto el verbo «partir» sugiere piezas de madera preparadas para uso práctico. «Leña» comunica con claridad esa imagen sin forzar el texto.
- source_word: יִסָּכֶן
  english_pob_choice: may be endangered
  chosen_spanish: puede quedar en peligro
  alternatives_spanish:
  - puede estar en peligro
  - puede verse expuesto al peligro
  - puede ser puesto en peligro
  lexicon: HALOT
  rationale: El nifal de סכן expresa estar expuesto al peligro o ser puesto en riesgo. «Quedar en peligro» conserva esa amplitud y mantiene el paralelismo con la primera cola, donde el daño es más directo.
- source_word: בָּם
  english_pob_choice: by it
  chosen_spanish: por ella
  alternatives_spanish:
  - con ella
  - a causa de ella
  lexicon: HALOT
  rationale: Como en la primera cola, la preposición funciona instrumentalmente o causalmente. En español se puede referir de manera natural a «leña» como sustantivo colectivo/femenino, de ahí «por ella».
translation_notes:
  revision_awareness: 'Se siguió de cerca el auditable sentido del inglés POB, pero se ajustó el léxico al español natural: el primer colon conserva la imagen de mover/sacar piedras sin asumir demasiado la técnica de cantería, y el segundo hace explícita la referencia probable a leña como material partido. Se mantuvo el paralelismo y la relación instrumental de los pronombres mediante «por ellas/por ella».'
  spanish_consistency_notes:
  - Se evitó «SEÑOR» u այլ sustituciones reverenciales porque no aparecen en este versículo.
  - «Piedras» y «leña» mantienen el contraste concreto del proverbio mejor que términos más abstractos.
  - La alternancia de plural y singular en los pronombres sigue el uso natural del español con los sustantivos correspondientes, sin perder el valor instrumental del hebreo.
