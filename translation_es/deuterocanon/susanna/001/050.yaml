translation:
  language: es
  text: 'Y todo el pueblo volvió con prisa. Y los ancianos le dijeron[a]: «Ven, siéntate en medio de nosotros y dinos, pues Dios te ha dado la dignidad de un anciano».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «Dios te ha dado el rango de un anciano», «Dios te ha dado la preeminencia» o «Dios te ha dado el ancianato». El griego τὸ πρεσβεῖον denota senioridad o rango honorífico; aquí se refiere a autoridad reconocida más que a edad literal.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀνέστρεψεν
  english_pob_choice: returned
  chosen_spanish: volvió
  alternatives_spanish:
  - regresó
  - retornó
  lexicon: LSJ
  rationale: En este contexto narrativo, el verbo indica que el pueblo cambió de rumbo y regresó; «volvió» es natural en español y conserva el movimiento de retorno.
- source_word: μετὰ σπουδῆς
  english_pob_choice: with haste
  chosen_spanish: con prisa
  alternatives_spanish:
  - rápidamente
  - con diligencia
  - con empeño
  lexicon: LSJ
  rationale: Aquí σπουδή expresa urgencia en la acción. «Con prisa» comunica bien la rapidez del regreso sin añadir un matiz de diligencia moral que el contexto no exige.
- source_word: οἱ πρεσβύτεροι
  english_pob_choice: the elders
  chosen_spanish: los ancianos
  alternatives_spanish:
  - los mayores
  - los líderes ancianos
  - los presbíteros
  lexicon: LSJ
  rationale: Aunque el contexto judicial sugiere autoridad reconocida, en español «ancianos» mantiene la relación con πρεσβύτεροι y evita el tecnicismo eclesiástico de «presbíteros», que no está motivado por el pasaje.
- source_word: Δεῦρο
  english_pob_choice: Come
  chosen_spanish: Ven
  alternatives_spanish:
  - Come
  - Ven acá
  lexicon: LSJ
  rationale: El imperativo es una invitación inmediata. «Ven» es la forma natural y breve en español para este llamado directo.
- source_word: ἐν μέσῳ ἡμῶν
  english_pob_choice: in our midst
  chosen_spanish: en medio de nosotros
  alternatives_spanish:
  - entre nosotros
  - en nuestro medio
  lexicon: LSJ
  rationale: La expresión tiene fuerza espacial y social. «En medio de nosotros» preserva esa centralidad de la escena con un español claro y fiel.
- source_word: ἀνάγγειλον ἡμῖν
  english_pob_choice: tell us
  chosen_spanish: anúncianos
  alternatives_spanish:
  - cuéntanos
  - decláranos
  - repórtanos
  lexicon: LSJ
  rationale: ἀναγγέλλω es anunciar o comunicar formalmente. «Anúncianos» conserva ese tono más solemne que «cuéntanos», aunque sigue siendo natural en diálogo directo.
- source_word: τὸ πρεσβεῖον
  english_pob_choice: eldership / senior standing / preeminence / the rank of an elder
  chosen_spanish: el rango de un anciano
  alternatives_spanish:
  - la ancianidad
  - la primacía
  - la dignidad de anciano
  - el rango de presbítero
  lexicon: LSJ
  rationale: El griego denota senioridad o rango honorífico, no edad literal. «El rango de un anciano» intenta preservar el valor de estatus reconocido que el English POB destacó, evitando la lectura engañosa de que Dios le dio edad avanzada.
theological_decisions:
- issue: Sentido de que Dios dio a Daniel τὸ πρεσβεῖον
  english_pob_reading: God has granted Daniel honored authority/senior standing recognized by the assembly, not literal old age.
  chosen_spanish_reading: Dios le ha dado a Daniel un rango reconocido de autoridad y honor, no ancianidad biológica.
  alternative_spanish_readings:
  - Dios te ha dado eldership
  - Dios te ha dado preeminencia
  - Dios te ha dado la dignidad de un anciano
  rationale: 'La escena presenta a Daniel como joven, por lo que el texto debe conservar la tensión: no se trata de edad, sino de honor y autoridad concedidos por Dios. «El rango de un anciano» refleja esa distinción sin borrar la ironía narrativa.'
  doctrine_reference: Preservar la tensión textual y no resolverla por armonización indebida; coherencia terminológica con el valor lexical de πρεσβεῖον.
translation_notes:
  revision_awareness: Se siguió el pasaje griego de Swete y el audit trail inglés. Se evitó traducir mecánicamente «eldership» como término eclesiástico fijo en el cuerpo, pero se conservó su fuerza de rango honorífico en la nota. También se corrigió la falta de anclaje de la nota al incorporar el marcador [a] en el texto principal.
  spanish_consistency_notes:
  - Se usó «Yahvé» solo cuando aparece el nombre divino YHWH; aquí el griego dice ὁ θεός, por eso se tradujo «Dios».
  - Se prefirió «ancianos» para οἱ πρεσβύτεροι en un contexto judicial/narrativo, evitando imponer terminología eclesiástica posterior.
  - «Con prisa» mantiene el valor adverbial de μετὰ σπουδῆς sin añadir una interpretación de fervor o diligencia.
  - La nota preserva la tensión lexical de τὸ πρεσβεῖον entre rango, honor y senioridad sin convertirla en una referencia a edad literal.
