translation:
  language: es
  text: Cuando te acerques a una ciudad para combatir contra ella, le proclamarás paz[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más idiomáticamente: «le proclamarás términos de paz» u «ofrecerás paz a esa ciudad».'
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  english_pob_choice: When
  chosen_spanish: Cuando
  alternatives_spanish:
  - Si
  lexicon: HALOT
  rationale: En esta instrucción legal, כִּי introduce una situación esperada/temporal. «Cuando» conserva mejor ese valor que una condicional pura como «si».
- source_word: תִקְרַב
  english_pob_choice: you draw near
  chosen_spanish: te acerques
  alternatives_spanish:
  - te aproximas
  - llegues cerca
  lexicon: HALOT
  rationale: El verbo קרב expresa acercamiento concreto. «Te acerques» mantiene la imagen de movimiento hacia la ciudad y encaja con el registro normativo.
- source_word: עִיר
  english_pob_choice: a city
  chosen_spanish: una ciudad
  lexicon: HALOT
  rationale: Traducción directa del sustantivo en singular con sentido indefinido, natural en español.
- source_word: לְהִלָּחֵם
  english_pob_choice: to fight
  chosen_spanish: para combatir
  alternatives_spanish:
  - para pelear
  - para hacer guerra
  lexicon: HALOT
  rationale: En español, «combatir» conserva la fuerza bélica del infinitivo y suena digno y claro; «hacer guerra» sería más amplio, y «pelear» más coloquial.
- source_word: עָלֶיהָ
  english_pob_choice: against it
  chosen_spanish: contra ella
  alternatives_spanish:
  - contra esto
  lexicon: HALOT
  rationale: El sufijo femenino singular se refiere a «ciudad». Se mantiene la referencia gramatical con «ella», sin neutralizarla como «it» en inglés.
- source_word: וְקָרָאתָ
  english_pob_choice: you shall call out
  chosen_spanish: le harás saber
  alternatives_spanish:
  - le llamarás
  - proclamarás a ella
  lexicon: HALOT
  rationale: קרא puede abarcar llamar, proclamar o anunciar. En este contexto militar-diplomático, «le harás saber» comunica bien la acción de dirigirse a la ciudad con una oferta verbal, sin imponer de antemano una formulación demasiado técnica.
- source_word: אֵלֶיהָ
  english_pob_choice: to it
  chosen_spanish: a ella
  alternatives_spanish:
  - contra ella
  - para ella
  lexicon: HALOT
  rationale: Se conserva el referente femenino de la ciudad. En español «a ella» funciona de modo natural con el verbo de comunicación implícito.
- source_word: לְשָׁלוֹם
  english_pob_choice: for peace
  chosen_spanish: palabras de paz
  alternatives_spanish:
  - propuesta de paz
  - términos de paz
  - oferta de paz
  lexicon: HALOT
  rationale: שָׁלוֹם aquí no solo describe ausencia de guerra, sino una proposición de paz. «Palabras de paz» preserva la literalidad básica del sintagma y deja abierta la lectura idiomática documentada en la nota.
theological_decisions:
- issue: Tratamiento del femenino singular referido a la ciudad
  english_pob_reading: against it / to it
  chosen_spanish_reading: contra ella / a ella
  alternative_spanish_readings:
  - contra la ciudad / a la ciudad
  rationale: El hebreo usa sufijos femeninos para la ciudad. Se conservó el referente personal gramatical «ella» para no borrar ese rasgo del texto; «la ciudad» sería más explícito, pero menos cercano a la forma hebrea.
  doctrine_reference: Fidelidad gramatical al referente del texto fuente; no implica personificación teológica.
- issue: Sentido de לְשָׁלוֹם
  english_pob_reading: for peace
  chosen_spanish_reading: palabras de paz
  alternative_spanish_readings:
  - para paz
  - con paz
  - términos de paz
  rationale: El hebreo puede entenderse como una oferta o propuesta de paz, no solo un estado pacífico. La formulación escogida conserva la ambigüedad útil entre literalidad y sentido idiomático, acorde con la nota inglesa.
  doctrine_reference: Uso contextual de שָׁלוֹם en fórmulas de acercamiento diplomático/hostil.
translation_notes:
  revision_awareness: 'La revisión inglesa eliminó «then» por innecesario y mantuvo la estructura normativa. La versión española sigue esa línea: no añade partículas discursivas extra, conserva el orden instructivo y expresa la oferta de paz con una fórmula breve pero no mecánica.'
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» en línea con el estándar POB, pero este versículo no contiene el nombre divino.
  - Se evitó «SEÑOR» como sustituto, porque el verso no presenta el tetragrámaton ni una cita directa del nombre divino.
  - «Combatir» se eligió por claridad formal; no se suavizó a un término civilista.
  - La nota al pie conserva la alternativa idiomática documentada en el audit trail inglés.
