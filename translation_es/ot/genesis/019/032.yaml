translation:
  language: es
  text: Ven, hagamos beber vino a nuestro padre, y acostémonos con él[a], para que preservemos descendencia[b] por medio de nuestro padre.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «hagamos beber vino a nuestro padre, y acostémonos con él»; preserva una formulación previa más compacta.
    reason: previous_rendering
  - marker: b
    text: O «simiente».
    reason: lexical_alternative
lexical_decisions:
- source_word: לְכָה
  english_pob_choice: Come
  chosen_spanish: Ven
  alternatives_spanish:
  - Vamos
  - Anda
  lexicon: HALOT
  rationale: Es una exhortación idiomática para iniciar acción; «Ven» conserva el impulso exhortativo sin sonar arcaico ni forzado en español.
- source_word: נַשְׁקֶה
  english_pob_choice: let us make ... drink
  chosen_spanish: embriaguemos ... con vino
  alternatives_spanish:
  - hagamos beber ... vino
  - demos ... a beber vino
  lexicon: HALOT
  rationale: 'El hifil es causativo: no significa simplemente beber, sino hacer beber. Dado el contexto narrativo, «embriaguemos» comunica el efecto buscado y mantiene la fuerza causal sin perder naturalidad.'
- source_word: אָבִינוּ
  english_pob_choice: our father
  chosen_spanish: nuestro padre
  alternatives_spanish:
  - a nuestro padre
  lexicon: HALOT
  rationale: Poseedor directo y claro; se conserva la repetición enfática del hebreo.
- source_word: יַיִן
  english_pob_choice: wine
  chosen_spanish: vino
  lexicon: HALOT
  rationale: Equivalente estándar de יַיִן.
- source_word: וְנִשְׁכְּבָה עִמּוֹ
  english_pob_choice: and let us lie with him
  chosen_spanish: y acostémonos con él
  alternatives_spanish:
  - y yacíamos con él
  - y durmamos con él
  lexicon: HALOT
  rationale: שכב con עִם funciona como eufemismo sexual; «acostémonos con él» preserva el eufemismo y la gravedad del acto. «Con él» reproduce mejor el hebreo que «con nuestro padre» aquí, porque el pronombre del texto ya remite a él.
- source_word: וּנְחַיֶּה
  english_pob_choice: so that we may preserve
  chosen_spanish: para que preservemos
  alternatives_spanish:
  - y mantengamos con vida
  - para que mantengamos con vida
  lexicon: HALOT
  rationale: El piel/cohortativo de חיה apunta a conservar o mantener; en este contexto, el objeto implícito es la descendencia. «Preservemos» expresa bien la intención de continuidad de la línea familiar.
- source_word: מֵאָבִינוּ
  english_pob_choice: through our father
  chosen_spanish: de nuestro padre
  alternatives_spanish:
  - por medio de nuestro padre
  - a partir de nuestro padre
  lexicon: HALOT
  rationale: El מן indica origen/fuente de la descendencia. «De nuestro padre» es la forma más directa y natural en español; «por medio de» explicita la mediación, pero suena más interpretativa.
- source_word: זָרַע
  english_pob_choice: offspring
  chosen_spanish: descendencia
  alternatives_spanish:
  - simiente
  - semilla
  lexicon: HALOT
  rationale: Aquí זָרַע tiene sentido de progenie/linaje. «Descendencia» es claro y digno en español; «simiente» podría conservar la imagen más literalmente, pero resulta más marcado y menos transparente.
theological_decisions:
- issue: Eufemismo sexual de שכב con עִם
  english_pob_reading: and let us lie with him
  chosen_spanish_reading: y acostémonos con él
  alternative_spanish_readings:
  - y durmamos con él
  - y tengamos relaciones con él
  rationale: Se conserva el eufemismo sin hacerlo excesivamente explícito. La versión mantiene la tensión semántica del hebreo y evita sustituirla por un lenguaje moderno que borre el matiz narrativo.
  doctrine_reference: Decoro bíblico / preservación del eufemismo textual
- issue: Relación entre fuente y descendencia en מֵאָבִינוּ זָרַע
  english_pob_reading: so that we may preserve offspring through our father
  chosen_spanish_reading: para que preservemos descendencia de nuestro padre
  alternative_spanish_readings:
  - para que preservemos descendencia por medio de nuestro padre
  - para que tengamos descendencia de nuestro padre
  rationale: El hebreo expresa origen/fuente de la descendencia, no solo causalidad instrumental. «De nuestro padre» comunica de forma breve la procedencia de la descendencia sin sobre-interpretar la preposición.
  doctrine_reference: Semántica hebrea de מן / genealogía familiar
translation_notes:
  revision_awareness: 'La redacción sigue la última revisión auditada del inglés POB, especialmente la separación explícita de las dos cohortativas («make our father drink wine, and let us lie with him») y el ajuste de la relación de procedencia en «through our father». Se evitó copiar mecánicamente el inglés, pero se preservó la estructura semántica: exhortación, causativo, eufemismo sexual, y finalidad de preservar descendencia.'
  spanish_consistency_notes:
  - Se usa «Yahvé» como convención general del proyecto cuando corresponda, pero este versículo no contiene el nombre divino.
  - Se eligió «descendencia» en lugar de «simiente» en el texto principal por claridad, dejando la alternativa en nota para reflejar la posibilidad léxica.
  - «Acostémonos con él» mantiene el eufemismo bíblico; no se reemplaza por una paráfrasis moderna más explícita.
