  to: Al director del coro[a]. De David[b]. Un salmo. Yahvé, me has escudriñado y me has conocido.
  rationale: Se ajusta חֲקַרְתַּנִי a «me has escudriñado» para reflejar mejor el valor de escrutinio profundo del hebreo y del POB inglés. También se elimina «tú» para un español más natural y fluido, sin alterar el sentido. Se conservan intactos el nombre divino «Yahvé» y las notas del encabezado.
