translation:
  language: es
  text: 'Este es el asunto que le dije a Faraón: lo que Dios está haciendo se lo ha mostrado a Faraón[a].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «lo que Dios hace». El participio hebreo puede denotar acción presente o inminente; en este contexto de interpretación de sueños, «está haciendo» comunica bien la idea.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הוּא
  english_pob_choice: This is
  chosen_spanish: Esta es
  alternatives_spanish:
  - Es
  - Esto es
  lexicon: HALOT
  rationale: El pronombre independiente introduce una identificación explicativa. En español, «Esta es» transmite de forma natural la equivalencia enfática sin volver la frase artificial.
- source_word: הַדָּבָר
  english_pob_choice: the matter
  chosen_spanish: la cosa
  alternatives_spanish:
  - el asunto
  - la materia
  - la palabra
  lexicon: HALOT
  rationale: דָּבָר puede significar 'palabra', 'cosa' o 'asunto'. Aquí Joseph explica el contenido del sueño; «la cosa» conserva la amplitud semántica y suena natural en español, sin imponer un tecnicismo no presente en el hebreo.
- source_word: אֲשֶׁר דִּבַּרְתִּי
  english_pob_choice: that I spoke
  chosen_spanish: que hablé
  alternatives_spanish:
  - que dije
  - que hablé de
  lexicon: HALOT
  rationale: דִּבַּרְתִּי expresa habla formulada; «hablé» mantiene el valor verbal de דבר y funciona bien en una cláusula relativa directa.
- source_word: אֶל פַּרְעֹה
  english_pob_choice: to Pharaoh
  chosen_spanish: a Faraón
  alternatives_spanish:
  - a Paró
  - para Faraón
  lexicon: HALOT
  rationale: La preposición אֶל se rinde con «a» en español. Se usa «Faraón» como equivalente convencional del nombre/título, con mayúscula por tratarse de la designación del rey egipcio en este contexto.
- source_word: אֲשֶׁר
  english_pob_choice: what
  chosen_spanish: lo que
  alternatives_spanish:
  - aquello que
  - eso que
  lexicon: HALOT
  rationale: La segunda relativa introduce el contenido de la revelación. «Lo que» reproduce bien el valor de 'what' y evita una estructura pesada.
- source_word: הָאֱלֹהִים
  english_pob_choice: God
  chosen_spanish: Dios
  alternatives_spanish:
  - el Dios
  lexicon: HALOT
  rationale: Aunque el hebreo lleva artículo, aquí se refiere al Dios verdadero; en español, el uso normal y fiel es «Dios».
- source_word: עֹשֶׂה
  english_pob_choice: is doing
  chosen_spanish: está haciendo
  alternatives_spanish:
  - hace
  - va a hacer
  lexicon: HALOT
  rationale: El participio puede expresar acción presente o inminente. Dado el ajuste revisionista del POB inglés hacia 'is doing', «está haciendo» preserva la fuerza aspectual sin adelantar innecesariamente el futuro.
- source_word: הֶרְאָה
  english_pob_choice: he has shown
  chosen_spanish: se lo ha mostrado
  alternatives_spanish:
  - lo ha mostrado
  - le ha mostrado
  lexicon: HALOT
  rationale: הִרְאָה significa 'mostrar, hacer ver'. En español, «se lo ha mostrado» expresa con claridad que Dios ha revelado algo a Faraón, manteniendo el perfecto que refleja la fuerza explicativa del texto.
- source_word: אֶת פַּרְעֹה
  english_pob_choice: to Pharaoh
  chosen_spanish: a Faraón
  alternatives_spanish:
  - a él
  lexicon: HALOT
  rationale: El complemento con אֶת marca el destinatario de la acción de mostrar. En español, «a Faraón» preserva la referencia explícita y evita ambigüedad pronominal.
theological_decisions:
- issue: Valor del participio divino עֹשֶׂה en contexto interpretativo
  english_pob_reading: what God is doing
  chosen_spanish_reading: lo que Dios está haciendo
  alternative_spanish_readings:
  - lo que Dios hace
  - lo que Dios va a hacer
  rationale: La frase se pronuncia en el marco de la interpretación del sueño y de eventos venideros ya revelados. «Está haciendo» conserva la lectura de acción en curso o inminente sin convertir el texto en una paráfrasis futurizante.
  doctrine_reference: Gramática verbal hebrea; preferencia del POB revisada hacia mayor exactitud aspectual.
- issue: Referencia de הָאֱלֹהִים en la boca de José
  english_pob_reading: God
  chosen_spanish_reading: Dios
  alternative_spanish_readings:
  - el Dios
  rationale: No se introduce un matiz doctrinal extra; se mantiene la referencia al único Dios verdadero con el sustantivo español normal y reverente.
  doctrine_reference: Monoteísmo bíblico; uso estándar de traducción para אֱלֹהִים cuando refiere al Dios de Israel.
translation_notes:
  revision_awareness: El inglés del POB pasó de «is about to do» a «is doing» para acercarse más al participio hebreo עֹשֶׂה. La versión española refleja esa revisión con «está haciendo» y evita una futurización excesiva. También se resolvió el marcador de nota [a] anclándolo explícitamente en el texto.
  spanish_consistency_notes:
  - Se mantiene «Dios» para הָאֱלֹהִים, coherente con el proyecto.
  - Se usa «Faraón» como forma estable y readable en español.
  - Se conserva la ambigüedad aspectual del participio con una nota alternativa.
  - No se traduce mecánicamente como calco de 'matter'; se opta por el equivalente español más natural dentro del campo semántico de דָבָר.
