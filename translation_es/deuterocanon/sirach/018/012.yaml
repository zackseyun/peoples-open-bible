  glossary_alignment: No hay términos del glosario maestro en juego como Yahvé, Mesías o δοῦλος. La decisión «expiación» para ἐξιλασμός está bien fundamentada y es natural en español bíblico. Debe evitarse introducir pseudoequivalentes como «atonación» o «atonamiento», que no corresponden al español objetivo del proyecto.
  issues:
