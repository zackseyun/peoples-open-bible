translation:
  language: es
  text: ¿Hasta cuándo seguirá habiendo esto[a] en el corazón de los profetas que profetizan falsedad[b], y que profetizan el engaño de su propio corazón?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más literalmente: «¿Hay en el corazón de los profetas...?» El hebreo es elíptico, y la traducción hace explícito en español el sentido implícito.'
    reason: lexical_alternative
  - marker: b
    text: 'También podría decirse más compactamente: «falsos profetas».'
    reason: lexical_alternative
lexical_decisions:
- source_word: עַד מָתַי
  english_pob_choice: How long
  chosen_spanish: ¿Hasta cuándo
  alternatives_spanish:
  - ¿Hasta cuándo será
  - ¿Hasta cuándo permanecerá
  lexicon: HALOT
  rationale: La pregunta temporal idiomática se expresa con naturalidad en español como «¿Hasta cuándo?», manteniendo el tono de exasperación profética sin añadir contenido ajeno.
- source_word: הֲיֵשׁ
  english_pob_choice: will this be
  chosen_spanish: estará
  alternatives_spanish:
  - hay
  - está
  lexicon: HALOT
  rationale: El hebreo es elíptico y la POB inglesa hace explícita la situación implícita. En español, «estará» conserva esa explicitación mínima y encaja con la pregunta sobre una condición persistente en el interior de los profetas.
- source_word: בְּלֵב
  english_pob_choice: in the heart
  chosen_spanish: en el corazón
  alternatives_spanish:
  - en la mente
  - dentro de
  lexicon: HALOT
  rationale: «Corazón» preserva el valor antropológico bíblico de לֵב como centro de pensamiento, voluntad e ինտención, no solo emoción.
- source_word: הַנְּבִאִים
  english_pob_choice: the prophets
  chosen_spanish: los profetas
  lexicon: HALOT
  rationale: Equivalencia directa y natural al plural hebreo.
- source_word: נִבְּאֵי הַשָּׁקֶר
  english_pob_choice: those who prophesy falsehood
  chosen_spanish: que profetizan falsedad
  alternatives_spanish:
  - profetas de falsedad
  - falsos profetas
  lexicon: HALOT
  rationale: 'Se conserva el valor verbal del participio: no solo una etiqueta categorial, sino la acción de profetizar falsedad. «Falsedad» transmite bien el contenido falso del oráculo.'
- source_word: וּנְבִיאֵי
  english_pob_choice: and who prophesy
  chosen_spanish: y que profetizan
  alternatives_spanish:
  - y profetas de
  - y los que profetizan
  lexicon: HALOT
  rationale: El paralelismo favorece una lectura verbal; por eso se mantiene «que profetizan» en vez de comprimirlo a un sustantivo adjetival.
- source_word: תַּרְמִת
  english_pob_choice: the deceit
  chosen_spanish: el engaño
  alternatives_spanish:
  - la falsedad
  - la traición
  lexicon: HALOT
  rationale: «Engaño» es una equivalencia clara y natural en español para la idea de deceit/treachery, y conserva la acusación moral contra el origen del mensaje.
- source_word: לִבָּם
  english_pob_choice: of their own heart
  chosen_spanish: de su propio corazón
  alternatives_spanish:
  - desde su propio corazón
  - de su corazón
  lexicon: HALOT
  rationale: Se explicita «propio» como en la POB inglesa para marcar que la fuente del engaño es interna a ellos; «corazón» mantiene el sentido hebreo de centro interior.
theological_decisions:
- issue: Sentido antropológico de לֵב
  english_pob_reading: heart
  chosen_spanish_reading: corazón
  alternative_spanish_readings:
  - mente
  - interior
  rationale: «Corazón» conserva la antropología bíblica del hebreo, donde el corazón incluye pensamiento, intención y voluntad. Evita reducir el texto a una psicología moderna.
  doctrine_reference: DOCTRINE.md Translation philosophy §4, §6
- issue: Mantener el valor verbal de נִבְּאֵי הַשָּׁקֶר
  english_pob_reading: those who prophesy falsehood
  chosen_spanish_reading: que profetizan falsedad
  alternative_spanish_readings:
  - falsos profetas
  - profetas de falsedad
  rationale: 'La forma verbal del hebreo es importante: el texto denuncia la actividad de profetizar falsamente, no solo un rótulo fijo. Por eso no se reduce a una designación tradicional.'
  doctrine_reference: DOCTRINE.md Translation philosophy §1, §5
- issue: Texto elíptico de הֲיֵשׁ
  english_pob_reading: will this be
  chosen_spanish_reading: estará
  alternative_spanish_readings:
  - hay
  - es
  rationale: La POB inglesa explicita el sentido implícito de la pregunta. En español, «estará» ofrece una solución sobria y gramatical sin perder la elipsis del hebreo.
  doctrine_reference: DOCTRINE.md Translation philosophy §2, §5
translation_notes:
  revision_awareness: "La versión inglesa más reciente suavizó la puntuación tras «prophets» para reflejar mejor el paralelismo sin cambiar el sentido. En español se sigue ese mismo paralelismo directo: una pregunta inicial breve, seguida de dos cláusulas coordinadas con «y que profetizan».\0"
  spanish_consistency_notes:
  - Se mantiene «corazón» para לֵב y no «mente», en coherencia con la antropología bíblica del proyecto.
  - Se conserva el verbo «profetizan» para נִבְּאֵי / נְבִיאֵי, evitando comprimir la acusación en una sola etiqueta.
  - «Falsedad» y «engaño» distinguen contenido falso y origen engañoso, respetando el paralelismo hebreo.
  - Se usa «Dios» y «Yahvé» como norma del proyecto cuando corresponda; este versículo no las contiene.
