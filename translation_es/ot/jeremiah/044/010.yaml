translation:
  language: es
  text: No han sido humillados[a] hasta el día de hoy, y no han temido, y no han andado en mi ley y en mis estatutos que puse delante de ellos y delante de sus padres[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: ''no han sido quebrantados'', ''no han sido contritos''; interpretivamente, ''no se han arrepentido''.'
    reason: lexical_alternative
  - marker: b
    text: '''Sus padres'' se refiere a las generaciones anteriores a quienes también se dieron la misma ley y los mismos estatutos; alternativamente, ''sus antepasados''.'
    reason: lexical_alternative
lexical_decisions:
- source_word: דֻכְּאוּ
  english_pob_choice: have not been humbled
  chosen_spanish: no han sido humillados
  alternatives_spanish:
  - no han sido quebrantados
  - no han sido contritos
  - no se han arrepentido
  lexicon: HALOT
  rationale: El pasivo de דכא puede expresar ser quebrantado, humillado o abatido. En este contexto de resistencia persistente a la corrección, 'no han sido humillados' conserva el sentido moral-espiritual sin convertir el verbo en una paráfrasis doctrinal explícita como 'se han arrepentido'.
- source_word: עַד הַיּוֹם הַזֶּה
  english_pob_choice: to this day
  chosen_spanish: hasta el día de hoy
  alternatives_spanish:
  - hasta hoy
  - hasta este día
  lexicon: HALOT
  rationale: Es un modismo temporal estándar. 'Hasta el día de hoy' es natural en español y conserva la idea de continuidad presente.
- source_word: יָרְאוּ
  english_pob_choice: have not feared
  chosen_spanish: no han temido
  alternatives_spanish:
  - no han tenido temor
  - no han reverenciado
  lexicon: HALOT
  rationale: Aquí ירא conserva la fuerza de temor reverente/covenantal. 'Temido' mantiene la conexión léxica y no reduce el verbo a simple miedo físico; 'reverenciado' sería más interpretativo.
- source_word: הָלְכוּ
  english_pob_choice: have not walked
  chosen_spanish: no han andado
  alternatives_spanish:
  - no han vivido
  - no han seguido
  lexicon: HALOT
  rationale: Con ב y lenguaje de Torá, הלך funciona como un modismo de conducta. 'Andado' preserva la metáfora hebrea con naturalidad en español bíblico contemporáneo.
- source_word: בְתּוֹרָתִי
  english_pob_choice: in my law
  chosen_spanish: en mi ley
  alternatives_spanish:
  - en mi instrucción
  - según mi enseñanza
  lexicon: HALOT
  rationale: Aunque תורה puede significar 'instrucción', el paralelo con 'estatutos' y el marco pactual-legal favorecen 'ley' como equivalente más conciso y claro en español.
- source_word: וּבְחֻקֹּתַי
  english_pob_choice: and in my statutes
  chosen_spanish: y en mis estatutos
  alternatives_spanish:
  - y en mis decretos
  - y en mis ordenanzas
  lexicon: HALOT
  rationale: '''Estatutos'' mantiene el registro jurídico-pactual de חקים y se corresponde bien con ''ley'' en la primera cola.'
- source_word: אֲשֶׁר נָתַתִּי לִפְנֵיכֶם
  english_pob_choice: that I set before them
  chosen_spanish: que puse delante de ellos
  alternatives_spanish:
  - que di delante de ellos
  - que coloqué delante de ellos
  lexicon: HALOT
  rationale: El hebreo usa נתן con לפני en un sentido idiomático de presentar o poner delante. 'Puse delante de ellos' conserva el valor de obligación presentada sin calcar 'set' de modo forzado.
- source_word: וְלִפְנֵי אֲבוֹתֵיכֶם
  english_pob_choice: and before their fathers
  chosen_spanish: y delante de sus padres
  alternatives_spanish:
  - y delante de sus antepasados
  lexicon: HALOT
  rationale: אבותיכם es literalmente 'sus padres'. Se mantiene el masculino plural, como en el hebreo, en lugar de neutralizarlo a 'antepasados'; 'padres' es fiel y comprensible en español bíblico.
theological_decisions:
- issue: Si דֻכְּאוּ debe traducirse como arrepentimiento explícito
  english_pob_reading: They have not been humbled
  chosen_spanish_reading: No han sido humillados
  alternative_spanish_readings:
  - No se han arrepentido
  - No han sido contritos
  rationale: El verbo describe una respuesta interior y moral insuficiente ante el juicio, pero no dice literalmente 'arrepentirse'. Traducirlo como 'humillados' preserva la tensión textual y evita imponer una formulación doctrinal más fuerte que la del hebreo.
  doctrine_reference: 'Principio POB: primacía del original y preservación de la tensión teológica.'
- issue: Cómo manejar אֲבוֹתֵיכֶם en español contemporáneo
  english_pob_reading: their fathers
  chosen_spanish_reading: sus padres
  alternative_spanish_readings:
  - sus antepasados
  rationale: El hebreo es masculino plural y se refiere a generaciones anteriores de Israel/Judá. Se conserva 'padres' para respetar la forma del texto; 'antepasados' sería una aclaración posible pero más neutralizada.
  doctrine_reference: 'Principio POB: exactitud de género cuando el original lo marca explícitamente.'
translation_notes:
  revision_awareness: Se siguió el cierre contextual del audit trail en tercera persona ('ellos / sus padres'), y se mantuvo la equivalencia óptima del inglés POB para דֻכְּאוּ, יָרְאוּ, הלכו, תורה, חוקים y נתן לפני en un español natural y auditable.
  spanish_consistency_notes:
  - Se conservó 'Yahvé' implícito solo donde aparece en el contexto mayor; en este versículo no está presente el Tetragrámaton.
  - Se mantuvo 'ley' / 'estatutos' como pareja jurídica-pactual coherente con el registro del pasaje.
  - '''Sus padres'' mantiene la referencia generacional masculina del hebreo sin neutralización.'
