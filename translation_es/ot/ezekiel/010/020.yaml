translation:
  language: es
  text: Esta era la criatura viviente que vi debajo del Dios de Israel junto al canal de Kebar[a], y supe que eran querubines.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «al río Kebar»; el término hebreo puede referirse a un río o a un canal. «Kebar» sigue la forma transliterada del nombre.
    reason: lexical_alternative
lexical_decisions:
- source_word: הִיא
  english_pob_choice: This was
  chosen_spanish: Esta era
  alternatives_spanish:
  - Era
  - Esto era
  lexicon: HALOT
  rationale: El pronombre femenino singular retoma a la figura visionaria ya descrita. En español, «Esta era» identifica con naturalidad a un referente ya presentado y conserva el tiempo pasado narrativo.
- source_word: הַחַיָּה
  english_pob_choice: the living creature
  chosen_spanish: la criatura viviente
  alternatives_spanish:
  - el ser viviente
  - la criatura
  - el animal
  lexicon: HALOT
  rationale: En el contexto de la visión de Ezequiel no se trata de un animal ordinario, sino de un ser viviente sobrenatural. «Criatura viviente» mantiene ese sentido y evita reducir el término a una especie zoológica.
- source_word: אֲשֶׁר רָאִיתִי
  english_pob_choice: that I saw
  chosen_spanish: que vi
  alternatives_spanish:
  - la cual vi
  - que había visto
  lexicon: HALOT
  rationale: Es una relativa sencilla y directa. «Que vi» reproduce el vínculo retrospectivo del relato sin añadir matices no exigidos por el hebreo.
- source_word: תַּחַת
  english_pob_choice: beneath
  chosen_spanish: debajo de
  alternatives_spanish:
  - bajo
  - debajo
  - bajo de
  lexicon: HALOT
  rationale: «Debajo de» expresa bien la relación espacial en español y suena natural en un relato visionario. Mantiene la imagen de ubicación inferior sin volverla demasiado técnica.
- source_word: אֱלֹהֵי יִשְׂרָאֵל
  english_pob_choice: the God of Israel
  chosen_spanish: el Dios de Israel
  alternatives_spanish:
  - Dios de Israel
  lexicon: HALOT
  rationale: La expresión es un título pactal definido por el contexto. «El Dios de Israel» conserva la referencia singular y la fuerza relacional del constructo hebreo.
- source_word: בִּנְהַר כְּבָר
  english_pob_choice: by the Kebar Canal
  chosen_spanish: junto al canal de Kebar
  alternatives_spanish:
  - junto al río Kebar
  - en el canal de Kebar
  - a la orilla del Kebar
  lexicon: HALOT
  rationale: נְהַר puede significar río o canal. En el trasfondo babilónico, «canal» es una opción más precisa; «junto al» refleja adecuadamente el valor locativo. Se conserva «Kebar» como forma transliterada del nombre propio.
- source_word: וָאֵדַע
  english_pob_choice: and I knew
  chosen_spanish: y supe
  alternatives_spanish:
  - y conocí
  - y llegué a saber
  - y comprendí
  lexicon: HALOT
  rationale: El verbo ידע aquí expresa reconocimiento o constatación. «Supe» comunica de forma natural el momento de identificación visionaria sin añadir una explicación interpretativa.
- source_word: כִּי
  english_pob_choice: that
  chosen_spanish: que
  alternatives_spanish:
  - porque
  - pues
  lexicon: HALOT
  rationale: Introduce el contenido de lo que Ezequiel llegó a saber. «Que» es la equivalencia española más directa y clara en este caso.
- source_word: כְרוּבִים
  english_pob_choice: cherubim
  chosen_spanish: querubines
  alternatives_spanish:
  - querubines celestiales
  - querubes
  lexicon: HALOT
  rationale: «Querubines» es el préstamo ya asentado en español bíblico y conserva el registro visionario. Evita la pérdida de identificación formal que produciría una paráfrasis como «seres alados».
- source_word: הֵמָּה
  english_pob_choice: they were
  chosen_spanish: eran
  alternatives_spanish:
  - ellos eran
  - éstos eran
  lexicon: HALOT
  rationale: Aunque el antecedente inmediato es singular colectivo, el hebreo pasa al plural para la identificación. En español, «eran» reproduce esa pluralidad sin forzar un sujeto explícito.
theological_decisions:
- issue: Identificación de las criaturas visionarias
  english_pob_reading: Render חַיָּה as 'living creature' and כְרוּבִים as 'cherubim,' preserving Ezekiel's recognition that the beings seen earlier are cherubim.
  chosen_spanish_reading: Traducir חַיָּה como «criatura viviente» y כְרוּבִים como «querubines», preservando que Ezequiel reconoce que lo visto era de hecho querubines.
  alternative_spanish_readings:
  - «seres vivientes» sin marcar la identificación
  - «querubes»
  rationale: La frase final del versículo expresa una identificación, no solo una descripción. Conviene conservar tanto el término de la visión como la conclusión de Ezequiel, sin diluirla en términos más genéricos ni sustituir el vocabulario técnico bíblico por una forma menos establecida.
  doctrine_reference: Ezequiel 10:20; visión del carro/trono y querubines
translation_notes:
  revision_awareness: 'El pasaje muestra alta concordancia con la revisión más reciente: no se documentaron cambios sustanciales en el flujo de la traducción inglesa ni en la identificación de los términos clave. La versión española mantiene esa estabilidad, conservando la lectura visionaria y la decisión léxica sobre נְהַר como un término geográficamente flexible.'
  spanish_consistency_notes:
  - Se usa «Dios» para אֱלֹהֵי conforme al título «Dios de Israel».
  - Se conserva «Kebar» como transliteración consistente con el audit trail inglés, con nota de alternativa río/canal.
  - «Querubines» mantiene el término técnico bíblico sin domesticación.
  - La secuencia narrativa pasada se refleja con «era / vi / supe / eran» para mantener la fluidez del relato.
