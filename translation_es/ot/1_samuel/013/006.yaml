  rationale: Se corrigieron los marcadores de notas para que coincidan exactamente con las palabras relevantes del texto; se mejoró la naturalidad de «porque el pueblo estaba bajo mucha presión» para reflejar נִגַּשׂ en contexto militar; y se cambió «pozos» por «hoyos» para mantener el sentido amplio de בֹּרוֹת, añadiendo la alternativa «cisternas» en nota, en línea con el rastro auditado del POB inglés.
