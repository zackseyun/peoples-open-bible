translation:
  language: es
  text: Has mostrado favor a tu tierra[a], oh Yahvé; restauraste la suerte de Jacob.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «restauraste el cautiverio de Jacob» / «restauraste a los cautivos de Jacob». El modismo hebreo puede señalar la restauración desde el exilio o una restauración más amplia de la situación.'
    reason: alternative_reading
lexical_decisions:
- source_word: רָצִיתָ
  english_pob_choice: have shown favor
  chosen_spanish: has mostrado favor
  alternatives_spanish:
  - te complaciste en
  - fuiste favorable a
  lexicon: HALOT
  rationale: El verbo en qal expresa estar complacido o mostrar favor. En español, «has mostrado favor» comunica de manera natural y fiel el sentido benévolo hacia la tierra, sin endurecerlo con un calco menos idiomático.
- source_word: יְהוָה
  english_pob_choice: O Yahweh
  chosen_spanish: oh Yahvé
  alternatives_spanish:
  - oh Yahveh
  - oh el SEÑOR
  lexicon: HALOT
  rationale: Se mantiene el nombre divino como «Yahvé», conforme al criterio del proyecto para el Tetragrámaton, y se conserva la apelación vocativa con «oh» en español natural.
- source_word: אַרְצְךָ
  english_pob_choice: your land
  chosen_spanish: tu tierra
  alternatives_spanish:
  - tu país
  - tu tierra
  lexicon: HALOT
  rationale: «Tierra» reproduce mejor el valor bíblico de אֶרֶץ en este contexto pactal que «país», que suena moderno y político. El posesivo de segunda persona conserva la relación directa con Dios.
- source_word: שַׁבְתָּ שבות
  english_pob_choice: restored the fortunes
  chosen_spanish: restauraste las fortunas
  alternatives_spanish:
  - restauraste el cautiverio
  - trajiste de vuelta la cautividad
  lexicon: HALOT
  rationale: La expresión hebrea es un modismo que puede abarcar una restauración general de la situación, no solo el regreso físico del exilio. «Fortunas» preserva ese alcance idiomático, aunque en español puede sonar menos usual; por eso se documenta la alternativa más literal relacionada con cautiverio.
- source_word: יַעֲקֹב
  english_pob_choice: Jacob
  chosen_spanish: Jacob
  alternatives_spanish:
  - Israel
  lexicon: HALOT
  rationale: Se conserva el nombre «Jacob», porque el texto hebreo usa la forma poética/covenantal y no una equivalencia interpretativa.
theological_decisions:
- issue: Sentido del modismo שׁוּב שְׁבוּת יַעֲקֹב
  english_pob_reading: restored the fortunes of Jacob
  chosen_spanish_reading: restauraste las fortunas de Jacob
  alternative_spanish_readings:
  - restauraste el cautiverio de Jacob
  - restauraste a los cautivos de Jacob
  rationale: 'Se preserva la tensión semántica del modismo: puede referirse a una reversión amplia de la situación o, en ciertos contextos, al retorno del exilio. La redacción elegida no estrecha el sentido más de lo que exige el hebreo, y la nota conserva la lectura relacionada con cautiverio.'
  doctrine_reference: Preservar tensión lexical/documentada en lugar de resolverla por anticipado.
translation_notes:
  revision_awareness: 'La revisión más reciente no introdujo cambios: el pasaje quedó en alta concordancia y sin ajustes necesarios. Se mantuvo la solución idiomática para שׁוּב שְׁבוּת y la distinción entre «tierra» y «fortunas» conforme al audit trail en inglés.'
  spanish_consistency_notes:
  - Se usa «Yahvé» para יְהוָה, en continuidad con la norma del proyecto.
  - Se evita «SEÑOR» como sustitución del nombre divino.
  - «Tierra» conserva el matiz bíblico de אֶרֶץ.
  - «Fortunas» mantiene la amplitud del modismo hebreo, aunque se documenta la alternativa vinculada a cautiverio.
  - La puntuación vocativa «oh Yahvé» corresponde al español reverente y claro.
