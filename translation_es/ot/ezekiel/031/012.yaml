translation:
  language: es
  text: Extranjeros[a], los despiadados de las naciones, lo cortaron y lo dejaron. Sus ramas cayeron sobre los montes y en todo valle, y su ramaje[b] fue quebrado en todos los cauces[c] de la tierra. Entonces todos los pueblos de la tierra descendieron de su sombra y lo dejaron.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'forasteros' para זָרִים. 'Extranjeros' comunica con más claridad el sentido de gente de fuera en un contexto internacional.
    reason: lexical_alternative
  - marker: b
    text: '''''''Ramaje'''' traduce פֹארֹתָיו para distinguirlo de ''''ramas'''' (דָלִיּוֹתָיו); también puede entenderse como ''''gajos'''' o ''''grandes ramas'''' en sentido arbóreo.'
    reason: lexical_alternative
  - marker: c
    text: '''''''Cauces de la tierra'''' también puede traducirse como ''''canales de la tierra'''', ''''cauces de agua de la tierra'''' o ''''quebradas de la tierra''''.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּכְרְתֻהוּ
  english_pob_choice: cut it down
  chosen_spanish: lo cortaron
  alternatives_spanish:
  - lo derribaron
  - lo talaron
  lexicon: HALOT
  rationale: כרת en esta metáfora arbórea significa cortar/derribar un árbol. Mantengo el objeto masculino singular 'lo' para conservar el referente del árbol en español, como hace el inglés con 'it'.
- source_word: זָרִים
  english_pob_choice: Foreigners
  chosen_spanish: Forasteros
  alternatives_spanish:
  - Extranjeros
  - Gente ajena
  lexicon: HALOT
  rationale: זרים puede ser 'forasteros' o 'extranjeros'. 'Forasteros' suena natural en español y conserva la idea de gente de fuera sin cargar demasiado un matiz político moderno.
- source_word: עָרִיצֵי גוֹיִם
  english_pob_choice: the ruthless of the nations
  chosen_spanish: los impiadosos de las naciones
  alternatives_spanish:
  - los crueles de las naciones
  - los tiranos de las naciones
  lexicon: HALOT
  rationale: עָרִיץ expresa violencia, dureza o crueldad. 'Impiadosos' comunica la falta de piedad y encaja bien con la fuerza moral del término sin forzar un superlativo que no está en el hebreo.
- source_word: וַיִּטְּשֻׁהוּ
  english_pob_choice: left it
  chosen_spanish: lo dejaron
  alternatives_spanish:
  - lo abandonaron
  - lo desecharon
  lexicon: HALOT
  rationale: נטש significa dejar/abandonar. Conservo 'lo dejaron' para reflejar la repetición del verbo en la segunda ocurrencia y mantener la sobriedad del hebreo.
- source_word: אֶל הֶהָרִים
  english_pob_choice: on the mountains
  chosen_spanish: sobre los montes
  alternatives_spanish:
  - en los montes
  - hacia los montes
  lexicon: HALOT
  rationale: Aunque אֶל suele ser 'a/hacia', el contexto de ramas que caen exige ubicación resultante. 'Sobre los montes' expresa mejor la caída sobre la superficie.
- source_word: גֵּאָיוֹת
  english_pob_choice: valley
  chosen_spanish: valle
  alternatives_spanish:
  - barranco
  - hondonada
  lexicon: HALOT
  rationale: El término denota valles o hondonadas. 'Valle' es la opción más clara y amplia en español; el plural se expresa con 'en todo valle'.
- source_word: דָלִיּוֹתָיו
  english_pob_choice: branches
  chosen_spanish: ramas
  alternatives_spanish:
  - renuevos
  - ramillas
  lexicon: HALOT
  rationale: El sustantivo alude a ramas colgantes. 'Ramas' comunica bien la imagen sin sonar artificioso; no intento forzar una distinción técnica demasiado fina en español.
- source_word: פֹארֹתָיו
  english_pob_choice: boughs
  chosen_spanish: ramas principales
  alternatives_spanish:
  - brazos
  - brazadas
  lexicon: HALOT
  rationale: El término designa ramas grandes o frondosas. 'Ramas principales' conserva la diferencia con דליותיו y evita el arcaísmo de 'boughs' en español.
- source_word: אֲפִיקֵי הָאָרֶץ
  english_pob_choice: the channels of the land
  chosen_spanish: los canales de la tierra
  alternatives_spanish:
  - los cauces de la tierra
  - los lechos de la tierra
  - las quebradas de la tierra
  lexicon: HALOT
  rationale: אפיקים puede referirse a canales, cauces o lechos de corrientes. 'Canales' es suficientemente literal y claro; 'tierra' mantiene el alcance topográfico amplio del texto.
- source_word: וַיֵּרְדוּ מִצִּלּוֹ
  english_pob_choice: went down from its shade
  chosen_spanish: descendieron de su sombra
  alternatives_spanish:
  - bajaron de su sombra
  - se apartaron de su sombra
  lexicon: HALOT
  rationale: ירד significa descender. 'Descendieron de su sombra' preserva el movimiento y la metáfora de protección; en español 'sombra' es una forma natural de expresar amparo, igual que en el contexto del árbol.
- source_word: כָּל עַמֵּי הָאָרֶץ
  english_pob_choice: all the peoples of the earth
  chosen_spanish: todos los pueblos de la tierra
  alternatives_spanish:
  - todas las naciones de la tierra
  - todos los pueblos del país
  lexicon: HALOT
  rationale: עַמִּים es 'pueblos'. 'La tierra' traduce mejor el alcance amplio que 'el país' y mantiene el paralelismo con el inglés POB.
- source_word: וַיִּטְּשֻׁהוּ
  english_pob_choice: left it
  chosen_spanish: lo dejaron
  alternatives_spanish:
  - lo abandonaron
  - lo desampararon
  lexicon: HALOT
  rationale: Repito la misma traducción para la segunda ocurrencia del verbo, como en el inglés POB, a fin de conservar la reiteración literaria del hebreo.
theological_decisions:
- issue: Referente del sufijo masculino singular en la metáfora del árbol
  english_pob_reading: Render with neuter 'it' to maintain the cedar/tree imagery in English
  chosen_spanish_reading: Mantener 'lo' para sostener la imagen del árbol, aunque el referente simbólico sea Asiria y su rey
  alternative_spanish_readings:
  - lo derribaron y lo dejaron
  - lo cortaron y lo abandonaron
  - él fue cortado y dejado
  rationale: El hebreo usa sufijos masculinos singulares; en la metáfora inmediata el objeto es el árbol, mientras que el trasfondo histórico apunta a Asiria. En español, 'lo' permite conservar esa tensión sin forzar un 'él' que desplazaría demasiado pronto la imagen arbórea.
  doctrine_reference: Metáfora profética / referencia histórica en la poesía bíblica
translation_notes:
  revision_awareness: Tomé en cuenta la revisión más reciente del inglés POB que afinó 'the most ruthless' a 'the ruthless' por mayor precisión con el hebreo. Por eso elegí 'impiadosos de las naciones' en lugar de una forma superlativa, y mantuve la repetición final de 'lo dejaron' como reflejo de la estructura del verso. También preservé la metáfora arbórea y su tensión con el referente histórico, siguiendo el audit trail inglés.
  spanish_consistency_notes:
  - Conservo 'lo' para el objeto del árbol de manera consistente en ambos verbos transitivos.
  - Mantengo 'pueblos' para עמים y 'tierra' para הארץ en todo el verso.
  - Uso 'sombra' para צל, siguiendo la metáfora de amparo del árbol.
  - No introduzco terminología eclesiástica tradicional que altere la metáfora oculte el referente histórico.
