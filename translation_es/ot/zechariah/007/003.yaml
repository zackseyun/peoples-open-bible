translation:
  language: es
  text: 'para decir a los sacerdotes de la casa de Yahvé de los Ejércitos[a], y a los profetas, diciendo: «¿Debo llorar en el quinto mes, absteniéndome[b] como lo he hecho desde hace tantos años?»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O «Yahvé de las Huestes»; traducción tradicional: «el SEÑOR de los Ejércitos».'
    reason: lexical_alternative
  - marker: b
    text: O «apartándome» o «separándome»; el término hebreo puede denotar abstinencia o apartamiento ritual más ampliamente que el ayuno estricto.
    reason: lexical_alternative
lexical_decisions:
- source_word: לֵאמֹר
  english_pob_choice: to say
  chosen_spanish: para decir
  alternatives_spanish:
  - diciendo
  lexicon: HALOT
  rationale: El infinitivo constructo introduce el contenido del mensaje. «Para decir» conserva con naturalidad en español la función de finalidad/introducción del discurso, sin borrar la estructura hebrea.
- source_word: הַכֹּהֲנִים
  english_pob_choice: the priests
  chosen_spanish: los sacerdotes
  alternatives_spanish:
  - los presbíteros
  lexicon: HALOT
  rationale: «Sacerdotes» es el equivalente directo y más transparente para el oficio cultual del texto.
- source_word: אֲשֶׁר לְבֵית יְהוָה צְבָאוֹת
  english_pob_choice: of the house of Yahweh of Armies
  chosen_spanish: de la casa de Yahvé de los Ejércitos
  alternatives_spanish:
  - que pertenecen a la casa de Yahvé de los Ejércitos
  - de la casa de Yahvé de los Ejércitos
  lexicon: HALOT
  rationale: El hebreo modifica a «los sacerdotes» con una relación posesiva/locativa vinculada al templo. «De la casa de» preserva esa relación sin imponer una lectura más fuerte de pertenencia personal. Se mantiene «Yahvé» para יהוה y se vierte צְבָאוֹת como «de los Ejércitos» siguiendo la política española del proyecto.
- source_word: וְאֶל הַנְּבִיאִים
  english_pob_choice: and to the prophets
  chosen_spanish: y a los profetas
  alternatives_spanish:
  - y a los profetas
  lexicon: HALOT
  rationale: «Profetas» es la traducción directa del término reconocido en el contexto profético.
- source_word: הַאֶבְכֶּה
  english_pob_choice: Should I weep
  chosen_spanish: ¿Debo llorar?
  alternatives_spanish:
  - ¿He de llorar?
  - ¿Debiera llorar?
  lexicon: HALOT
  rationale: La forma imperfecta en primera singular funciona como pregunta deliberativa. «¿Debo llorar?» expresa bien la consulta sobre la continuación de una práctica ritual.
- source_word: בַּחֹדֶשׁ הַחֲמִשִׁי
  english_pob_choice: in the fifth month
  chosen_spanish: en el quinto mes
  alternatives_spanish:
  - durante el quinto mes
  lexicon: HALOT
  rationale: Se conserva la referencia temporal exacta sin introducir un nombre de mes que el texto no da.
- source_word: הִנָּזֵר
  english_pob_choice: abstaining
  chosen_spanish: absteniéndome
  alternatives_spanish:
  - separándome
  - guardándome aparte
  lexicon: HALOT
  rationale: El nifal de נזר puede abarcar abstinencia o apartamiento ritual. «Absteniéndome» mantiene la amplitud semántica sin reducirlo solo a ayuno.
- source_word: כַּאֲשֶׁר עָשִׂיתִי
  english_pob_choice: as I have done
  chosen_spanish: como lo he hecho
  alternatives_spanish:
  - como hice
  - tal como lo he hecho
  lexicon: HALOT
  rationale: El presente perfecto español refleja una práctica que se prolonga hasta el presente de la consulta.
- source_word: זֶה כַּמֶּה שָׁנִים
  english_pob_choice: these many years
  chosen_spanish: por estos muchos años
  alternatives_spanish:
  - desde hace muchos años
  - por tantos años
  lexicon: HALOT
  rationale: La expresión idiomática se vierte de modo natural en español manteniendo el valor de duración prolongada y el deíctico de זֶה.
theological_decisions:
- issue: Traducción del Tetragrámaton יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahveh
  - el SEÑOR
  rationale: El texto hebreo usa directamente el nombre divino. Siguiendo la terminología base del proyecto en español, se conserva como «Yahvé» en lugar de ocultarlo mediante un título sustitutivo.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: כְּבָאוֹת / צְבָאוֹת como título divino
  english_pob_reading: Armies
  chosen_spanish_reading: los Ejércitos
  alternative_spanish_readings:
  - de los Ejércitos
  - de los ejércitos
  rationale: El inglés auditado prefiere «Armies» por fuerza semántica. En español, «los Ejércitos» comunica mejor el título divino y mantiene el matiz militar/cósmico sin recurrir al tradicional «de los ejércitos» como simple calco devocional.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
translation_notes:
  revision_awareness: El inglés POB revisó la relación de la frase hebrea desde una paráfrasis de pertenencia («who belong to») hacia una construcción más directa («of the house of...»), y ajustó «for these many years» para fluidez. La versión española refleja esa misma decisión con «de la casa de...» y «por estos muchos años», evitando sobreinterpretar la relación y manteniendo la duración continua.
  spanish_consistency_notes:
  - Se conserva «Yahvé» según el criterio del proyecto para יְהוָה.
  - Se vierte צְבָאוֹת como «los Ejércitos» para mantener el título divino con claridad en español.
  - «Absteniéndome» preserva la amplitud de הִנָּזֵר frente a una reducción exclusiva a «ayuno».
  - La puntuación con comillas angulares respeta el registro bíblico en español y separa claramente el discurso directo.
