review_pass:
  verdict: revise
  source_alignment_summary: El borrador conserva bien la estructura causal y la referencia indirecta de הָאִישׁ como «el hombre», con una nota adecuada sobre «mi marido». Sin embargo, «por un largo viaje» no refleja bien el hebreo idiomático הָלַךְ בְּדֶרֶךְ מֵרָחוֹק, que indica que se ha ido de viaje a un lugar lejano / por largo tiempo. En español, «por un largo viaje» suena poco natural y puede sugerir medio o trayecto más que estado de ausencia.
  spanish_quality_summary: El español es generalmente claro, pero «en su casa» y sobre todo «se ha ido por un largo viaje» suenan menos naturales que alternativas disponibles. «No está en casa» es más idiomático y sigue siendo fiel. «Se ha ido de viaje» o «se ha ido a un viaje largo» mejora mucho la legibilidad; la primera, con «lejos» o equivalente, conserva mejor el matiz de distancia.
  glossary_alignment: No hay términos del glosario mayor en juego. La decisión de mantener «el hombre» en vez de «mi marido» concuerda con la filosofía POB de preservar la expresión indirecta del hebreo en el texto principal y relegar la interpretación contextual a nota.
  issues:
  - severity: medium
    issue: «por un largo viaje» es un giro poco natural en español
    rationale: Con «irse», la construcción normal es «irse de viaje», no «irse por un viaje». La preposición «por» aquí suena forzada y puede introducir un matiz no presente en el hebreo.
  - severity: medium
    issue: Se pierde parcialmente el valor de distancia de מֵרָחוֹק
    rationale: Traducirlo solo como «largo» puede funcionar idiomáticamente, pero en español conviene una formulación que retenga con más claridad la idea de lejanía o ausencia prolongada.
  - severity: low
    issue: «en su casa» es menos idiomático que «en casa» en este contexto
    rationale: Aunque fiel al posesivo hebreo, el inglés auditado ya optó por la equivalencia idiomática «at home». En español, «no está en casa» comunica mejor la ausencia residencial sin pérdida sustancial.
  revised_spanish_text: Porque el hombre no está en casa[a]; se ha ido de viaje lejos.
  revised_footnotes:
  - marker: a
    text: 'O: «mi marido no está en casa». El hebreo dice más literalmente «el hombre no está en su casa», usando una expresión indirecta para referirse a su esposo.'
    reason: lexical_alternative
  revision_rationale: Se ajusta «en su casa» a «en casa» para un español más natural y acorde con la equivalencia idiomática auditada. Se reemplaza «se ha ido por un largo viaje» por «se ha ido de viaje lejos» para corregir la sintaxis española y recuperar de forma más explícita el matiz de distancia de מֵרָחוֹק, sin borrar la naturalidad del conjunto.
