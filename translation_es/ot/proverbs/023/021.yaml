translation:
  language: es
  text: Porque el borracho y el glotón llegarán a la pobreza[a], y la somnolencia vestirá de harapos a uno.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «el letargo vestirá a una persona de harapos». El sustantivo hebreo נוּמָה también puede traducirse «letargo».
    reason: lexical_alternative
lexical_decisions:
- source_word: סֹבֵא
  english_pob_choice: drunkard
  chosen_spanish: borracho
  alternatives_spanish:
  - ebrio
  - bebedor habitual
  lexicon: HALOT
  rationale: El hebreo nombra a una persona caracterizada por beber en exceso, no solo a alguien momentáneamente ebrio. «Borracho» conserva esa caracterización moral con naturalidad en español actual.
- source_word: זוֹלֵל
  english_pob_choice: glutton
  chosen_spanish: glotón
  alternatives_spanish:
  - gorrón
  - dado a los excesos
  - derrochador
  lexicon: HALOT
  rationale: En literatura sapiencial el término apunta a quien se entrega a la gula o la autoindulgencia. «Glotón» preserva el paralelo con «borracho» y la fuerza viciosa del dicho.
- source_word: יִוָּרֵשׁ
  english_pob_choice: will come to poverty
  chosen_spanish: caerán en pobreza
  alternatives_spanish:
  - se volverán pobres
  - serán empobrecidos
  - serán desposeídos
  lexicon: HALOT
  rationale: El nifal expresa el resultado de llegar a la indigencia. «Caerán en pobreza» transmite el desenlace proverbial sin forzar una imagen de desposesión territorial.
- source_word: קְרָעִים
  english_pob_choice: rags
  chosen_spanish: harapos
  alternatives_spanish:
  - trapos
  - andrajos
  - ropas rotas
  lexicon: HALOT
  rationale: El plural designa ropa desgarrada o miserable. «Harapos» es un equivalente idiomático y vívido en español que conserva la imagen de pobreza vergonzosa.
- source_word: תַּלְבִּישׁ
  english_pob_choice: will clothe
  chosen_spanish: vestirá de
  alternatives_spanish:
  - vestirá
  - cubrirá con
  - pondrá
  lexicon: HALOT
  rationale: El hiphil expresa ‘hacer vestir’ o ‘vestir’. «Vestirá de harapos» mantiene la metáfora directa y resulta natural en español.
- source_word: נוּמָה
  english_pob_choice: drowsiness
  chosen_spanish: somnolencia
  alternatives_spanish:
  - sueño
  - cansancio
  - modorra
  - sopor
  lexicon: HALOT
  rationale: El sustantivo admite la idea de somnolencia o de sueño ligero. «Somnolencia» conserva el matiz de adormecimiento perezoso que conduce al descuido; «sopor» sería más fuerte y «sueño» menos preciso.
translation_notes:
  revision_awareness: El texto sigue de cerca el hebreo masorético y el audit trail inglés. Se conserva la ambigüedad léxica de נוּמָה mediante una nota, sin introducir interpretaciones ajenas al proverbio. No se documentaron revisiones textuales relevantes en el expediente inglés.
  spanish_consistency_notes:
  - Se usó «borracho» para סֹבֵא por su fuerza lexical habitual en español, manteniendo el tono proverbial.
  - Se optó por «glotón» para זוֹלֵל como paralelo vicioso de «borracho».
  - «Pobreza» traduce el resultado verbal de יִוָּרֵשׁ con un giro natural en español.
  - «Harapos» conserva la imagen de vestiduras rotas de קְרָעִים.
  - «Somnolencia» evita tanto una paráfrasis excesiva como la pérdida del doble sentido posible de נוּמָה.
