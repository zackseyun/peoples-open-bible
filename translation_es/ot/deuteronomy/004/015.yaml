translation:
  language: es
  text: Por tanto, cuídense muy bien[b], ya que no vieron ninguna forma[a] el día que Yahvé les habló en Horeb, de en medio del fuego.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Forma» también puede traducirse «semejanza» o «imagen».
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «guárdense mucho por sus almas»; es un modismo que significa cuidarse o guardarse con sumo cuidado.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְנִשְׁמַרְתֶּם
  english_pob_choice: watch yourselves
  chosen_spanish: Cuídate mucho
  alternatives_spanish:
  - Guárdense mucho
  - Vigílense muy cuidadosamente
  lexicon: HALOT
  rationale: El nifal con valor reflexivo expresa la idea de estar en guardia o cuidarse. En español, «cuídate mucho» transmite la advertencia de manera natural; el plural implícito del hebreo puede expresarse en lectura comunitaria sin volverlo rígido o mecánico. El verbo «guardar» también es posible, pero «cuidarse» suena más idiomático en este contexto exhortativo.
- source_word: מְאֹד
  english_pob_choice: very carefully
  chosen_spanish: mucho
  alternatives_spanish:
  - muy cuidadosamente
  - grandemente
  lexicon: HALOT
  rationale: מְאֹד intensifica la exhortación. En español, unido a «cuídate» funciona bien como intensificador; «muy cuidadosamente» sería más explícito pero más pesado, y «grandemente» no suena natural.
- source_word: לְנַפְשֹׁתֵיכֶם
  english_pob_choice: yourselves
  chosen_spanish: Cuídate
  alternatives_spanish:
  - Cuida tu alma
  - Cuídense ustedes mismos
  lexicon: HALOT
  rationale: Aquí נֶפֶשׁ funciona idiomáticamente en una construcción reflexiva. Por eso se vierte con un reflexivo español, evitando imponer en el texto principal una antropología de «alma» que el hebreo no está destacando aquí.
- source_word: כִּי
  english_pob_choice: since
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  lexicon: HALOT
  rationale: Introduce la razón de la advertencia. «Porque» es claro y natural en español contemporáneo.
- source_word: לֹא רְאִיתֶם כָּל תְּמוּנָה
  english_pob_choice: you saw no form
  chosen_spanish: no visteis forma alguna
  alternatives_spanish:
  - no visteis ninguna semejanza
  - no visteis ninguna imagen
  lexicon: HALOT
  rationale: תְּמוּנָה puede ser «forma», «semejanza» o «imagen». «Forma alguna» conserva la amplitud del término y la negación total, sin reducirlo sólo a una imagen esculpida.
- source_word: בְּיוֹם
  english_pob_choice: on the day
  chosen_spanish: el día
  alternatives_spanish:
  - cuando
  - en el día
  lexicon: HALOT
  rationale: La expresión temporal se conserva de manera natural en español sin sobrecargarla con una calca.
- source_word: דִּבֶּר יְהוָה אֲלֵיכֶם
  english_pob_choice: Yahweh spoke to you
  chosen_spanish: Yahvé habló con vosotros
  alternatives_spanish:
  - Yahvé os habló
  - Yahvé les habló
  lexicon: HALOT
  rationale: Se mantiene el nombre divino «Yahvé» según la pauta del proyecto. «Habló con vosotros» sigue el valor relacional del encuentro en Horeb y conserva el plural del destinatario.
- source_word: בְּחֹרֵב
  english_pob_choice: at Horeb
  chosen_spanish: en Horeb
  alternatives_spanish:
  - en el Horeb
  - a Horeb
  lexicon: HALOT
  rationale: La preposición española natural en este contexto es «en», que ubica el acontecimiento sin alterar el sentido.
- source_word: מִתּוֹךְ הָאֵשׁ
  english_pob_choice: from the midst of the fire
  chosen_spanish: de en medio del fuego
  alternatives_spanish:
  - del seno del fuego
  - desde el interior del fuego
  lexicon: HALOT
  rationale: «De en medio del fuego» preserva la imagen espacial hebrea de manera clara y bíblica. No se reduce a «del fuego», porque el texto enfatiza que Yahvé habló desde dentro de él.
theological_decisions:
- issue: Valor de נֶפֶשׁ en לְנַפְשֹׁתֵיכֶם
  english_pob_reading: 'idiomatic reflexive: ''watch yourselves'''
  chosen_spanish_reading: 'reflexivo idiomático: «Cuídate mucho»'
  alternative_spanish_readings:
  - «Cuida tu alma»
  - «Guárdense mucho»
  rationale: El hebreo usa una expresión idiomática de autoprotección, no una afirmación doctrinal aislada sobre el alma. El español debe conservar esa tensión sin desplazar el foco hacia una antropología técnica que el verso no desarrolla.
  doctrine_reference: Mantener la tensión textual sin imponer antropología sistemática ajena al pasaje.
- issue: Sentido de תְּמוּנָה en el contexto de Horeb
  english_pob_reading: '''form'''
  chosen_spanish_reading: «forma»
  alternative_spanish_readings:
  - «semejanza»
  - «imagen»
  rationale: El contexto subraya que Israel oyó la voz de Yahvé pero no vio una representación visible. «Forma» conserva la amplitud del término y evita estrecharlo prematuramente a una estatua o a una sola clase de imagen.
  doctrine_reference: El pasaje fundamenta la prohibición de fabricar representaciones de Dios en la ausencia de una manifestación visible en Horeb.
- issue: Uso del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Jehová
  rationale: Se sigue la convención del proyecto de renderizar el Tetragrámaton como «Yahvé», preservando el nombre propio revelado en el texto fuente en vez de sustituirlo por un título.
  doctrine_reference: Transparencia textual y fidelidad al nombre divino revelado.
translation_notes:
  revision_awareness: El texto sigue la lectura de la revisión más reciente, que no requirió cambios respecto del estado de alta concordancia. Se mantuvo la equivalencia óptima del audit trail inglés, con ajuste natural al español y conservación de las tensiones léxicas principales.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» para el Tetragrámaton, conforme a la norma del proyecto.
  - Se evitó «alma» en el texto principal para לְנַפְשֹׁתֵיכֶם, porque el uso es idiomático y reflexivo.
  - «Forma» se conservó como traducción base de תְּמוּנָה, dejando «semejanza» e «imagen» como alternativas.
  - La sintaxis española busca ser pública y litúrgicamente readable sin perder la estructura causal del hebreo.
