id: GEN.30.1
reference: Genesis 30:1
source:
  edition: WLC
  text: וַ/תֵּ֣רֶא רָחֵ֗ל כִּ֣י לֹ֤א יָֽלְדָה֙ לְ/יַעֲקֹ֔ב וַ/תְּקַנֵּ֥א רָחֵ֖ל בַּ/אֲחֹתָ֑/הּ וַ/תֹּ֤אמֶר אֶֽל יַעֲקֹב֙ הָֽבָ/ה לִּ֣/י בָנִ֔ים וְ/אִם אַ֖יִן מֵתָ֥ה אָנֹֽכִי־־־׃
translation:
  text: When Rachel saw that she had borne no children to Jacob[a], she became jealous of her sister, and she said to Jacob, “Give me children[b], or I will die!”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew 'sons'; here rendered 'children' because the context is Rachel's desire to bear offspring generally, not necessarily to specify male children.
    reason: lexical_alternative
  - marker: b
    text: Or 'Rachel became jealous'.
    reason: previous_rendering
lexical_decisions:
- source_word: וַתֵּרֶא
  chosen: When Rachel saw
  alternatives:
  - Rachel saw
  - Now Rachel saw
  lexicon: HALOT
  rationale: The waw-consecutive advances the narrative. Rendering with 'When' smoothly conveys the temporal sense in English and links Rachel's perception to her ensuing reaction.
- source_word: כִּי לֹא יָלְדָה לְיַעֲקֹב
  chosen: that she had borne no children for Jacob
  alternatives:
  - that she had not borne to Jacob
  - that she had not given birth for Jacob
  lexicon: HALOT
  rationale: יָלַד in the Qal of a woman means 'to bear/give birth.' 'Borne no children' is idiomatic English and makes explicit the implied object from context. 'For Jacob' preserves the lamed relation without awkwardness.
- source_word: וַתְּקַנֵּא
  chosen: became jealous
  alternatives:
  - envied
  - was jealous
  lexicon: HALOT
  rationale: קנא here denotes jealousy/envy in response to her sister's fertility. 'Became jealous' captures the inceptive narrative force and emotional movement.
- source_word: בַּאֲחֹתָהּ
  chosen: of her sister
  alternatives:
  - at her sister
  - toward her sister
  lexicon: HALOT
  rationale: The preposition with קנא is naturally rendered in English as 'jealous of.' This is Leah, but the Hebrew uses the relational term rather than the proper name.
- source_word: הָבָה לִּי בָנִים
  chosen: Give me children
  alternatives:
  - Give me sons
  - Grant me children
  lexicon: HALOT
  rationale: בנים is formally 'sons,' but in contexts of childbearing it can function more broadly for offspring/children. 'Children' best fits natural English and the context of Rachel's barrenness without over-specifying male offspring.
- source_word: וְאִם אַיִן
  chosen: or else
  alternatives:
  - and if not
  - if not
  lexicon: HALOT
  rationale: The idiom introduces the dire alternative to her demand. 'Or else' is concise, natural English that preserves the force of the ultimatum.
- source_word: מֵתָה אָנֹכִי
  chosen: I will die
  alternatives:
  - I am dying
  - I am dead
  lexicon: HALOT
  rationale: The participial/adjectival form with pronoun expresses an intense, imminent outcome. In idiomatic English, 'I will die' best conveys the force of Rachel's desperate statement. It may be hyperbolic, but the translation should preserve the directness rather than paraphrase it psychologically.
