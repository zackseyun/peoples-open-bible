- from: No están en el trabajo de mortal[a] hombre, ni son castigados junto con la humanidad.
  to: No están en la aflicción del hombre mortal[a], ni son afligidos junto con la humanidad.
  rationale: Se ajusta בַּעֲמַל a 'aflicción' para reflejar mejor el sentido contextual de penuria/trouble; se cambia 'castigados' por 'afligidos' para evitar introducir la idea de castigo; se mejora la naturalidad con 'hombre mortal'; y se corrige la nota al pie para que preserve la alternativa lexical documentada sin mezclar vocablos distintos.
