base_translation:
  language: en
  yaml_path: translation/ot/daniel/004/029.yaml
  text: And you will be driven away from men[a], and your dwelling will be with the beasts of the field. You will be made to eat grass like oxen, and seven times will pass over you[b], until you know that the Most High rules in the kingdom of men and gives it to whomever he wills.
  footnotes:
