- from: Ellos vieron[a], y así quedaron asombrados; fueron aterrados; huyeron apresuradamente.
  to: Ellos vieron[a], y así quedaron asombrados; quedaron aterrados; huyeron apresuradamente.
  rationale: Se corrige «fueron aterrados» a «quedaron aterrados» para reflejar con fidelidad y naturalidad el estado resultante expresado en hebreo sin insinuar un agente externo. También se limpia la nota al pie eliminando el error editorial en hebreo y manteniendo la alternativa léxica documentada.
