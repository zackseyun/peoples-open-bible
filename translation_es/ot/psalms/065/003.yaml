translation:
  language: es
  text: Oh, tú que escuchas la oración[a], a ti vendrán toda carne.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «toda la humanidad» o «todas las personas»; el hebreo «toda carne» es una expresión poética para la humanidad en su totalidad.
    reason: lexical_alternative
lexical_decisions:
- source_word: שֹׁמֵעַ
  english_pob_choice: who hear
  chosen_spanish: que escuchas
  alternatives_spanish:
  - que oyes
  - oyente de
  lexicon: HALOT
  rationale: El participio qal funciona aquí con valor vocativo aplicado a Dios. En español, la relativa «que escuchas» mantiene la acción continua y el tono directo de invocación mejor que un sustantivo como «oyente de».
- source_word: תְּפִלָּה
  english_pob_choice: prayer
  chosen_spanish: la oración
  alternatives_spanish:
  - oración
  - ruego
  lexicon: HALOT
  rationale: El sustantivo singular se usa de modo genérico. «Oración» expresa naturalmente la categoría de oración y evita la impresión de una oración específica, preservando el sentido colectivo del hebreo.
- source_word: עָדֶיךָ
  english_pob_choice: to you
  chosen_spanish: a ti
  alternatives_spanish:
  - para ti
  - hacia ti
  lexicon: HALOT
  rationale: La preposición con sufijo de 2ms señala dirección hacia el destinatario. En español, con el verbo de movimiento siguiente, «a ti» es la forma más clara y natural.
- source_word: כָּל בָּשָׂר
  english_pob_choice: all flesh
  chosen_spanish: toda carne
  alternatives_spanish:
  - toda la humanidad
  - todas las personas
  lexicon: HALOT
  rationale: Se conserva la imagen poética literal «toda carne», que en español bíblico comunica la amplitud universal del hebreo sin reducirla prematuramente a una paráfrasis interpretativa.
- source_word: יָבֹאוּ
  english_pob_choice: will come
  chosen_spanish: vendrá
  alternatives_spanish:
  - vendrán
  - vendrá(n)
  lexicon: HALOT
  rationale: El imperfecto expresa acción futura. En español, el singular colectivo «toda carne» concuerda de manera natural con el singular verbal «vendrá».
theological_decisions:
- issue: Alcance de כָּל בָּשָׂר
  english_pob_reading: universal human scope expressed as 'all flesh'
  chosen_spanish_reading: alcance universal expresado como «toda carne»
  alternative_spanish_readings:
  - toda la humanidad
  - todas las personas
  rationale: La frase hebrea abarca a la humanidad en general. Mantener la forma literal conserva la amplitud poética y teológica del texto, mientras que las alternativas más explicativas quedarían bien para una nota, no para el cuerpo principal.
  doctrine_reference: Translation philosophy §§3, 5, 6
translation_notes:
  revision_awareness: El texto y las decisiones siguen de cerca el paquete fuente hebreo y el audit trail inglés; no se registran revisiones aplicadas en la fuente inglesa, y el borrador español conserva esa lectura estable.
  spanish_consistency_notes:
  - Se mantiene el tuteo reverente «tú / a ti» para reflejar el vocativo directo al hablante divino.
  - «Oración» se usa en sentido genérico y no como una instancia concreta.
  - «Toda carne» se conserva por su valor poético, con aclaración en nota de alternativas interpretativas.
