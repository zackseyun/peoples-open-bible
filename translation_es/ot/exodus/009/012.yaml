  source_alignment_summary: 'El borrador español refleja fielmente el hebreo: mantiene a Yahvé como sujeto explícito de וַיְחַזֵּק, conserva la agencia divina directa en «endureció el corazón de Faraón», traduce שָׁמַע אֲלֵהֶם de forma natural como «no los escuchó», y reproduce la cláusula de cumplimiento כַּאֲשֶׁר דִּבֶּר יְהוָה אֶל מֹשֶׁה con «tal como Yahvé había dicho a Moisés». La nota léxica sobre חזק también preserva correctamente las alternativas documentadas.'
