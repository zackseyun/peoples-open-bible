  spanish_quality_summary: 'El español es claro y natural en general. ''Un toro de la manada'' resulta algo impreciso y poco idiomático en una lista sacrificial; ''un toro del ganado'' suena más natural y mantiene mejor la especificación bovina. El resto de la frase está bien: ''carnero'', ''cordero macho de un año'' y ''para holocausto'' funcionan con dignidad y claridad.'
