translation:
  language: es
  text: Todo diezmo[a] de la tierra, de la semilla de la tierra y del fruto del árbol, pertenece a Yahvé; es santo para Yahvé.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más formalmente: «Todo diezmo de la tierra, de la semilla de la tierra y del fruto del árbol, es de Yahvé»'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְכָל
  english_pob_choice: Every
  chosen_spanish: Todo
  alternatives_spanish:
  - Cada
  - Todo y cada
  lexicon: HALOT
  rationale: En este contexto distributivo, español natural pide un cuantificador general. «Todo» conserva la amplitud de כָּל sin añadir un matiz demasiado individualizante como podría sugerir «Cada».
- source_word: מַעְשַׂר
  english_pob_choice: tithe
  chosen_spanish: diezmo
  alternatives_spanish:
  - tithe
  - décima parte
  lexicon: HALOT
  rationale: El término cultual establecido en español es «diezmo». Mantiene la referencia a la décima parte consagrada sin volver la frase artificial con una perífrasis.
- source_word: הָאָרֶץ
  english_pob_choice: of the land
  chosen_spanish: de la tierra
  alternatives_spanish:
  - de la tierra/terreno
  - del suelo
  lexicon: HALOT
  rationale: Aquí אֶרֶץ designa el ámbito agrícola de producción. «Tierra» es el equivalente más natural en español y preserva la concreción agraria del pasaje.
- source_word: מִזֶּרַע הָאָרֶץ
  english_pob_choice: from the seed of the land
  chosen_spanish: de la semilla de la tierra
  alternatives_spanish:
  - del grano de la tierra
  - de la semilla sembrada en la tierra
  - de la producción de la tierra
  lexicon: HALOT
  rationale: 'La imagen hebrea es literal y concreta: «semilla» retiene la metáfora del origen del producto agrícola. Se evita paraphrasear a «producción» para no borrar la forma del hebreo.'
- source_word: מִפְּרִי הָעֵץ
  english_pob_choice: from the fruit of the tree
  chosen_spanish: del fruto del árbol
  alternatives_spanish:
  - del fruto de los árboles
  lexicon: HALOT
  rationale: Se conserva el singular colectivo del hebreo con «árbol», que en español suena natural y reproduce la forma de la expresión fuente.
- source_word: לַיהוָה
  english_pob_choice: belongs to Yahweh
  chosen_spanish: pertenece a Yahvé
  alternatives_spanish:
  - es de Yahvé
  - está consagrado a Yahvé
  lexicon: HALOT
  rationale: La preposición ל expresa pertenencia/dedicación. «Pertenece a» hace explícita la relación de propiedad o dedicación sin perder la tensión ritual del texto.
- source_word: הוּא
  english_pob_choice: it is
  chosen_spanish: es
  alternatives_spanish:
  - ello es
  - esto es
  lexicon: HALOT
  rationale: El hebreo retoma el sujeto implícito con una cláusula nominal. En español basta «es»; no hace falta pronombre explícito para que la frase sea idiomática.
- source_word: קֹדֶשׁ
  english_pob_choice: holy
  chosen_spanish: santo
  alternatives_spanish:
  - sagrado
  - consagrado
  lexicon: HALOT
  rationale: En fórmula cultual, «santo» comunica mejor la cualidad de estar apartado para Dios. «Consagrado» expresa la dedicación, pero aquí el predicado nominal del hebreo apunta más directamente a la condición de santidad.
- source_word: קֹדֶשׁ לַיהוָה
  english_pob_choice: holy to Yahweh
  chosen_spanish: santo es para Yahvé
  alternatives_spanish:
  - santo para Yahvé
  - es santo para Yahvé
  lexicon: HALOT
  rationale: Se conserva la fórmula de dedicación al mismo tiempo que se ajusta el orden para el español. La repetición de Yahvé al final refleja el hebreo y mantiene el énfasis cultual.
theological_decisions:
- issue: Renderización del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - el SEÑOR
  rationale: El texto fuente usa explícitamente el Tetragrámaton. En la política terminológica del proyecto, el nombre divino se vierte como «Yahvé» para preservar el nombre personal de Dios, en lugar de sustituirlo por un título.
  doctrine_reference: 'DOCTRINE.md: יְהוָה / YHWH → Yahvé'
- issue: Relación entre pertenencia y consagración en לַיהוָה
  english_pob_reading: belongs to Yahweh
  chosen_spanish_reading: pertenece a Yahvé
  alternative_spanish_readings:
  - es de Yahvé
  - está consagrado a Yahvé
  rationale: La preposición ל puede señalar pertenencia y también dedicación. «Pertenece a» deja abierto el matiz de propiedad cultual que el contexto explica con «santo es para Yahvé», sin borrar la tensión semántica.
  doctrine_reference: 'Leviticus 27 context: cultic dedication and ownership'
- issue: Valor de קֹדֶשׁ en predicación nominal
  english_pob_reading: holy
  chosen_spanish_reading: santo
  alternative_spanish_readings:
  - sagrado
  - consagrado
  rationale: «Santo» conserva el valor cultual-teológico del término más que una simple etiqueta de objeto religioso. La expresión final mantiene tanto la consagración como la santidad inherente al diezmo.
  doctrine_reference: Leviticus 27 cultic holiness language
translation_notes:
  revision_awareness: La versión española sigue de cerca el sentido y la forma del hebreo, alineada con la lectura inglesa auditada. Se preservó la duplicación de Yahvé al final, la estructura nominal de «santo es para Yahvé» y la imaginería agrícola («semilla», «fruto del árbol») sin suavizarla hacia un equivalente más genérico. No se detectaron revisiones pendientes del texto base que requirieran ajuste adicional.
  spanish_consistency_notes:
  - Se usa «Yahvé» de forma consistente para יְהוָה, conforme a la terminología del proyecto.
  - «diezmo» se mantiene como término cultual estándar en español.
  - Se conserva el paralelismo agrícola del hebreo con «semilla» y «fruto del árbol» sin pluralizar innecesariamente «árbol».
  - La puntuación española separa las dos cláusulas con punto y coma para reflejar la transición entre pertenencia y santidad.
