translation:
  language: es
  text: diciendo que la tierra en la que entran para heredar[a] es una tierra contaminada por la contaminación de los extranjeros de la tierra[c][b], y la han llenado con su impureza.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «para recibirla en herencia». El griego conserva el lenguaje de herencia y posesión recibida.'
    reason: lexical_alternative
  - marker: b
    text: O, siguiendo el giro hebreo paralelo, «de los pueblos de la tierra». El griego dice más específicamente «de los extranjeros de la tierra».
    reason: alternative_reading
  - marker: c
    text: «Impureza» y la familia de «contaminada/contaminación» aquí pueden tener fuerza tanto ritual como moral; el texto no obliga a escoger solo un sentido.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἡ γῆ
  english_pob_choice: the land
  chosen_spanish: la tierra
  alternatives_spanish:
  - el país
  - la tierra prometida
  lexicon: LSJ
  rationale: En este contexto de entrada e herencia, γῆ se refiere al territorio concreto, no a la tierra en sentido general. «La tierra» conserva esa referencia sin añadir una glosa no exigida por el griego.
- source_word: εἰς ἣν εἰσέρχεσθε
  english_pob_choice: into which you are entering
  chosen_spanish: en la que entráis
  alternatives_spanish:
  - en la cual estáis entrando
  - a la que entráis
  lexicon: BDAG
  rationale: El griego expresa dirección e inminencia. «En la que entráis» mantiene el movimiento hacia dentro y suena natural en español, sin perder el valor del presente griego.
- source_word: κληρονομῆσαι
  english_pob_choice: to inherit
  chosen_spanish: para heredar
  alternatives_spanish:
  - para tomar posesión
  - para recibir en herencia
  lexicon: BDAG
  rationale: El verbo conserva un matiz de herencia y derecho de pacto. «Para heredar» es fiel, breve y mantiene esa fuerza teológica.
- source_word: μεμολυσμένη
  english_pob_choice: defiled
  chosen_spanish: profanada
  alternatives_spanish:
  - contaminada
  - manchada
  lexicon: LSJ
  rationale: El participio perfecto exige un estado resultante. «Profanada» comunica bien la mezcla de impureza ritual y corrupción moral que el contexto sugiere; se acompaña con la cognada «profanación» para reflejar la repetición enfática del griego.
- source_word: μολυσμῷ
  english_pob_choice: by the defilement
  chosen_spanish: por la profanación
  alternatives_spanish:
  - por la contaminación
  - con profanación
  lexicon: LSJ
  rationale: La repetición del campo léxico se preserva con un sustantivo cognado. «Profanación» mantiene el tono cultual y ético sin reducir el sentido a una sola esfera.
- source_word: τῶν ἀλλογενῶν τῆς γῆς
  english_pob_choice: of the foreigners of the land
  chosen_spanish: de los extranjeros de la tierra
  alternatives_spanish:
  - de los pueblos de la tierra
  - de los forasteros de la tierra
  lexicon: LSJ
  rationale: ἀλλογενῶν marca alteridad étnica/foránea. «Extranjeros» refleja mejor el griego primario que la alternativa hebrea-paralela «pueblos de la tierra».
- source_word: τῆς ἀκαθαρσίας αὐτῶν
  english_pob_choice: with their uncleanness
  chosen_spanish: con su impureza
  alternatives_spanish:
  - con su inmundicia
  - con su contaminación
  lexicon: BDAG
  rationale: ἀκαθαρσία puede abarcar impureza ritual y moral. «Impureza» es la opción española más natural y amplia; preserva la ambigüedad sin volverla moderna o técnica en exceso.
- source_word: ἐνέπλησαν αὐτήν
  english_pob_choice: they have filled it
  chosen_spanish: la han llenado
  alternatives_spanish:
  - la llenaron
  - la colmaron
  lexicon: BDAG
  rationale: El verbo significa ‘llenar’. El perfecto perifrástico en español comunica el estado resultante que el griego enfatiza.
theological_decisions:
- issue: Si la impureza debe leerse sólo en clave ritual o sólo en clave moral
  english_pob_reading: Preserved broad defilement/uncleanness language without narrowing it to either ceremonial impurity or merely moral corruption.
  chosen_spanish_reading: Se conserva un lenguaje amplio de profanación e impureza, sin reducirlo ni a una impureza meramente ritual ni a una corrupción exclusivamente moral.
  alternative_spanish_readings:
  - una tierra contaminada por la contaminación de las naciones
  - una tierra hecha impura por la impureza de los pueblos de la tierra
  rationale: Los términos griegos μολυσμός y ἀκαθαρσία admiten ambas dimensiones. La traducción mantiene esa tensión en vez de resolverla de antemano.
  doctrine_reference: DOCTRINE.md § Translation philosophy 3
- issue: Cómo reflejar τῶν ἀλλογενῶν frente a la tradición paralela hebrea
  english_pob_reading: foreigners of the land, while noting the Hebrew-parallel idiom 'peoples of the land' as an alternative.
  chosen_spanish_reading: «Extranjeros de la tierra», con nota sobre la alternativa «pueblos de la tierra».
  alternative_spanish_readings:
  - pueblos de la tierra
  - pueblos extranjeros de la tierra
  rationale: Dado que el texto primario aquí es el griego, ἀλλογενῶν debe notarse como alteridad/foraneidad. La alternativa paralela hebrea se conserva sólo como posibilidad documentada.
  doctrine_reference: DOCTRINE.md § Translation philosophy 1
translation_notes:
  revision_awareness: La revisión más reciente no pidió cambios y el control cruzado señaló acuerdo alto con cuestiones menores; se ha mantenido el sentido principal del griego, ajustando la formulación española para que suene natural y conserve la repetición cognada defilement/profanation.
  spanish_consistency_notes:
  - Se mantiene Yahvé no aplicable aquí; no hay nombres divinos en el verso.
  - «Profanada/profanación» conserva el paralelismo léxico del griego μεμολυσμένη μολυσμῷ.
  - «Extranjeros» se prioriza sobre «pueblos» por fidelidad al griego, dejando la variante hebrea sólo en nota.
  - «Impureza» permite la amplitud ritual y moral de ἀκαθαρσία sin forzar una sola lectura.
