translation:
  language: es
  text: No salgas apresuradamente a una disputa[a], no sea que al final, cuando tu vecino[b] te avergüence, no sepas qué hacer.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'El hebreo es elíptico: literalmente, «no sea que ¿qué harás en su final?». La traducción expresa el sentido implícito de la advertencia: «no sepas qué hacer».'
    reason: lexical_alternative
  - marker: b
    text: O «No salgas rápidamente a contender» o, con un matiz más legal, «No salgas apresuradamente al pleito».
    reason: alternative_reading
lexical_decisions:
- source_word: אַל תֵּצֵא
  english_pob_choice: Do not go out
  chosen_spanish: No salgas
  alternatives_spanish:
  - No vayas
  - No te metas
  lexicon: HALOT
  rationale: יצא mantiene la imagen de salir o lanzarse a una situación; en español, «salgas» conserva ese movimiento inicial sin endurecerlo con un giro más interpretativo como «te metas».
- source_word: לָרִיב
  english_pob_choice: to a dispute
  chosen_spanish: a una disputa
  alternatives_spanish:
  - a un pleito
  - a una querella
  - a litigio
  lexicon: HALOT
  rationale: ריב puede abarcar contienda personal y disputa legal. «Disputa» preserva esa amplitud mejor que opciones más estrechas como «pleito» o «litigio».
- source_word: מַהֵר
  english_pob_choice: hastily
  chosen_spanish: apresuradamente
  alternatives_spanish:
  - de prisa
  - rápidamente
  - con prisa
  lexicon: HALOT
  rationale: El adverbio subraya la imprudencia de actuar con rapidez; «apresuradamente» comunica velocidad con el matiz de falta de reflexión.
- source_word: פֶּן
  english_pob_choice: lest
  chosen_spanish: no sea que
  alternatives_spanish:
  - para que no
  - o no vaya a ser que
  lexicon: HALOT
  rationale: En español, «no sea que» expresa de modo natural la advertencia preventiva de פֶּן.
- source_word: בְּאַחֲרִיתָהּ
  english_pob_choice: in the end
  chosen_spanish: al final
  alternatives_spanish:
  - al cabo
  - en su desenlace
  - en el final
  lexicon: HALOT
  rationale: אַחֲרִית señala el desenlace o resultado de la disputa. «Al final» es idiomático y conserva la idea de resultado terminal.
- source_word: בְּהַכְלִים
  english_pob_choice: when ... puts you to shame
  chosen_spanish: cuando ... te avergüence
  alternatives_spanish:
  - cuando ... te humille
  - cuando ... te deshonre
  - cuando ... te cubra de vergüenza
  lexicon: HALOT
  rationale: כלם en esta forma expresa la acción de avergonzar o humillar. «Te avergüence» mantiene la dimensión honor-vergüenza sin añadir un giro demasiado explicativo.
- source_word: רֵעֶךָ
  english_pob_choice: your neighbor
  chosen_spanish: tu prójimo
  alternatives_spanish:
  - tu vecino
  - tu compañero
  - tu amigo
  lexicon: HALOT
  rationale: רֵעַ puede ser amigo, compañero o vecino/projimo. Aquí «prójimo» comunica la relación social amplia en un registro bíblico claro, sin restringirla a amistad íntima.
- source_word: מַה תַּעֲשֶׂה
  english_pob_choice: you not know what to do
  chosen_spanish: no sepas qué hacer
  alternatives_spanish:
  - no sepas qué harás
  - qué harás
  - qué puedes hacer
  lexicon: HALOT
  rationale: El hebreo es elíptico y el POB inglés explicita la idea práctica de la incapacidad para responder. En español, «no sepas qué hacer» conserva esa fuerza sin exceder el texto.
translation_notes:
  revision_awareness: Se tomó en cuenta la revisión inglesa que eliminó el guion largo para una puntuación más fluida; el español sigue la misma preferencia por una sintaxis continua y clara, sin alterar el sentido. También se respetó la decisión auditada de mantener la amplitud de ריב y la elipsis final del hebreo, explicitándola solo en la medida necesaria para el español natural.
  spanish_consistency_notes:
  - Se mantuvo «disputa» para ריב, en línea con el alcance semántico documentado.
  - Se evitó «SEÑOR» porque no hay aquí el Tetragrámaton ni un caso de κύριος.
  - «Prójimo» se eligió por naturalidad bíblica y amplitud relacional; la nota preserva la alternativa más literal «vecino».
  - La elipsis final se resolvió con una frase verbal idiomática en español, sin convertirla en una paráfrasis amplia.
