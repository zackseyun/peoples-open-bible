    text: La expresión «no habrá resurrección a vida» puede implicar exclusión de una resurrección bendita, más que negar explícitamente toda resurrección.
    reason: alternative_reading
  revision_rationale: Se corrige el singular del destinatario para ajustarlo al griego. Se suavizan dos calcos duros del inglés/griego («esperar las esperanzas», «uno será resucitado de nuevo por él») con formulaciones más naturales en español, sin perder el plural de las esperanzas ni la agencia divina en la resurrección. También se afina «para vida» a «a vida» por claridad y fluidez.
