translation:
  language: es
  text: Y abandonaron la casa de Yahvé, el Dios de sus padres, y sirvieron a los aserim[a] y a los ídolos. Así vino la ira sobre Judá y Jerusalén por esta culpa suya.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O “los postes de Asera”. El término hebreo se refiere a objetos cultuales de Asera y también puede evocar a la diosa Asera.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּעַזְבוּ
  english_pob_choice: abandoned
  chosen_spanish: abandonaron
  alternatives_spanish:
  - dejaron
  - desampararon
  - abandonaron
  lexicon: HALOT
  rationale: עזב puede significar dejar o abandonar. 'Abandonaron' comunica bien la deslealtad pactal con naturalidad en español moderno, sin perder el sentido de ruptura.
- source_word: בֵּית יְהוָה
  english_pob_choice: the house of Yahweh
  chosen_spanish: la casa de Yahvé
  alternatives_spanish:
  - el templo de Yahvé
  - la casa de Yahvé
  lexicon: HALOT
  rationale: '''Casa'' conserva la expresión hebrea literal y el vínculo con el santuario; en español resulta clara y fiel sin reemplazarla por una equivalencia más interpretativa como ''templo''.'
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahvé
  - Jehová
  lexicon: HALOT
  rationale: Se sigue el valor editorial del proyecto para el nombre divino. 'Yahvé' mantiene el referente del tetragrámaton sin ocultarlo bajo una sustitución genérica.
- source_word: אֱלֹהֵי אֲבוֹתֵיהֶם
  english_pob_choice: the God of their fathers
  chosen_spanish: el Dios de sus padres
  alternatives_spanish:
  - su Dios ancestral
  - el Dios de sus antepasados
  lexicon: HALOT
  rationale: La fórmula hebrea es una expresión covenantal estable. 'El Dios de sus padres' es la versión más directa y reconocible en español, preservando el matiz histórico y pactal.
- source_word: וַיַּעַבְד֥וּ
  english_pob_choice: served
  chosen_spanish: sirvieron
  alternatives_spanish:
  - adoraron
  - rindieron culto
  lexicon: HALOT
  rationale: עבד puede abarcar servicio y culto. 'Sirvieron' es más cercano al verbo hebreo y evita decidir demasiado pronto por 'adoraron', que sería más interpretativo.
- source_word: הָאֲשֵׁרִים
  english_pob_choice: the Asherim
  chosen_spanish: los aserim
  alternatives_spanish:
  - los asherim
  - los postes de Asera
  lexicon: HALOT
  rationale: Se conserva el término hebreo en forma hispanizada para no sobre-resolver si se trata de objetos de culto, postes rituales o una asociación con la deidad Asera; así se mantiene la tensión léxica documentada.
- source_word: הָעֲצַבִּים
  english_pob_choice: the idols
  chosen_spanish: los ídolos
  alternatives_spanish:
  - las imágenes
  - los ídolos
  lexicon: HALOT
  rationale: El término denota ídolos o imágenes talladas con carga polémica. 'Ídolos' expresa bien la fuerza religiosa y despectiva del hebreo en español corriente.
- source_word: וַיְהִי קֶצֶף
  english_pob_choice: So wrath came
  chosen_spanish: Así vino la ira
  alternatives_spanish:
  - Y hubo ira
  - Entonces vino la ira
  lexicon: HALOT
  rationale: La secuencia narrativa hebrea presenta un resultado. 'Así vino la ira' es natural en español y mantiene la idea de consecuencia sin añadir explícitamente al sujeto de la ira en el texto principal.
- source_word: עַל יְהוּדָה וִירוּשָׁלִַם
  english_pob_choice: upon Judah and Jerusalem
  chosen_spanish: sobre Judá y Jerusalén
  alternatives_spanish:
  - contra Judá y Jerusalén
  - sobre Judá y Jerusalén
  lexicon: HALOT
  rationale: '''Sobre'' reproduce bien la imagen de juicio que cae encima de ellos y encaja con el giro ''vino la ira sobre''. ''Contra'' explicitaría más la dirección hostil, pero es menos literal aquí.'
- source_word: בְּאַשְׁמָתָם זֹאת
  english_pob_choice: because of this guilt of theirs
  chosen_spanish: por esta culpa de ellos
  alternatives_spanish:
  - a causa de esta culpa suya
  - por este pecado de ellos
  lexicon: HALOT
  rationale: אַשְׁמָה señala culpa o culpabilidad; en este contexto causal, 'culpa' es el equivalente más claro en español. 'De ellos' conserva el posesivo enfático del hebreo sin suavizarlo.
theological_decisions:
- issue: Naturaleza de la ira
  english_pob_reading: understood as divine wrath without adding 'God's' explicitly to the main text
  chosen_spanish_reading: la ira queda implícitamente como juicio divino, sin añadir 'de Dios' en el cuerpo del versículo
  alternative_spanish_readings:
  - la ira de Dios
  - la ira del Señor
  rationale: El hebreo dice solo 'vino la ira', y el contexto deja claro que es juicio de Yahvé. Mantener la formulación implícita respeta la sobriedad del texto y evita introducir palabras no presentes.
  doctrine_reference: Principios de traducción 1 y 3
- issue: Identificación de הָאֲשֵׁרִים
  english_pob_reading: retain the Hebrew-derived term 'Asherim' in the main text
  chosen_spanish_reading: retener 'aserim' en el texto principal
  alternative_spanish_readings:
  - postes de Asera
  - los asherim
  rationale: El término es culturalmente específico y su referente exacto se debate entre objetos de culto y la asociación con Asera. La forma hispanizada preserva esa tensión y deja la aclaración para la nota.
  doctrine_reference: Principios de traducción 1, 3 y 6
translation_notes:
  revision_awareness: 'Se respetó el auditable trail del inglés: abandono de la casa de Yahvé, servicio a los aserim e ídolos, y la cláusula causal de culpa. No se agregó sujeto explícito a la ira, y se preservó la ambigüedad léxica de הָאֲשֵׁרִים mediante nota.'
  spanish_consistency_notes:
  - Se usa 'Yahvé' de manera consistente con el estándar del proyecto para el tetragrámaton.
  - '''Casa de Yahvé'' conserva la metáfora hebrea y resulta idiomática en español.'
  - '''Aserim'' se mantiene como transliteración hispanizada para no resolver de más el referente cultual.'
  - '''Ira'' traduce קֶצֶף de forma directa, manteniendo el tono judicial del contexto.'
  - '''Culpa de ellos'' conserva el valor causal de בְּאַשְׁמָתָם זֹאת.'
