base_translation:
  language: en
  yaml_path: translation/ot/genesis/006/006.yaml
  text: And Yahweh grieved over having made man on the earth[c][b][a], and he was pained in his heart.
  footnotes:
  - marker: a
    text: Or 'humankind' or 'humanity.' Hebrew 'adam' here refers collectively to the human race.
    reason: lexical_alternative
  - marker: b
    text: Or 'was sorry that he had made' or 'regretted that he had made.' The Hebrew נחם (Niphal) expresses divine sorrow over a prior action — not moral repentance and not cognitive surprise.
    reason: lexical_alternative
  - marker: c
    text: Or 'to his heart'.
    reason: previous_rendering
