revisions:
- from: Y en el día de su alegría[a], y en sus tiempos señalados, y en los comienzos de sus meses, tocarán las trompetas sobre sus holocaustos y sobre los sacrificios de sus ofrendas de paz, y les serán como memorial delante de su Dios[b]. Yo soy Yahvé, su Dios.
  to: Y en el día de su alegría, y en sus tiempos señalados, y en los comienzos[a] de sus meses, tocarán las trompetas sobre sus holocaustos y sobre los sacrificios de sus ofrendas de paz, y serán para ustedes como memorial delante de su Dios[b]. Yo soy Yahvé, su Dios.
  rationale: Se reubica la nota [a] al sintagma correcto que traduce רָאשֵׁי חָדְשֵׁיכֶם y se ajusta «y les serán» a «y serán para ustedes» para reflejar mejor וְהָיוּ לָכֶם y sonar más natural en español. Se conserva el resto de la terminología sacrificial y el uso de «Yahvé» conforme al proyecto.
