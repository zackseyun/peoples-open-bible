translation:
  language: es
  text: para que los hijos de Israel[a] traigan sus sacrificios que están sacrificando en el campo abierto, y los traigan a Yahvé a la entrada de la tienda de reunión, al sacerdote, y los sacrifiquen como ofrendas de paz[b] a Yahvé.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'los israelitas' por 'los hijos de Israel'.
    reason: lexical_alternative
  - marker: b
    text: O 'ofrendas de comunión' u 'ofrendas de bienestar' por 'ofrendas de paz'.
    reason: lexical_alternative
lexical_decisions:
- source_word: בְּנֵי יִשְׂרָאֵל
  english_pob_choice: the sons of Israel
  chosen_spanish: los hijos de Israel
  alternatives_spanish:
  - los israelitas
  - los hijos de Israel
  lexicon: HALOT
  rationale: Conserva la expresión familiar hebrea sin neutralizarla, pero en un español natural y publicable. 'Hijos de Israel' mantiene la transparencia formal mejor que 'israelitas'.
- source_word: יָבִיאוּ
  english_pob_choice: may bring
  chosen_spanish: traigan
  alternatives_spanish:
  - puedan traer
  - traigan
  lexicon: HALOT
  rationale: En una cláusula de propósito con 'para que', el subjuntivo español expresa bien la intención del texto sin añadir modalización innecesaria.
- source_word: זִבְחֵיהֶם
  english_pob_choice: their sacrifices
  chosen_spanish: sus sacrificios
  alternatives_spanish:
  - sus ofrendas sacrificadas
  - sus sacrificios
  lexicon: HALOT
  rationale: '''Sacrificios'' es la equivalencia más directa y clara para el sustantivo sacrificial, conservando el vínculo léxico con זבח.'
- source_word: אֲשֶׁר הֵם זֹבְחִים
  english_pob_choice: that they are sacrificing
  chosen_spanish: que están sacrificando
  alternatives_spanish:
  - que sacrifican
  - que están sacrificando
  lexicon: HALOT
  rationale: El participio hebreo sugiere acción en curso o habitual; el progresivo español lo refleja de forma natural.
- source_word: עַל פְּנֵי הַשָּׂדֶה
  english_pob_choice: in the open field
  chosen_spanish: en el campo abierto
  alternatives_spanish:
  - en el campo abierto
  - al aire libre
  lexicon: HALOT
  rationale: Mantiene la idea idiomática de un lugar expuesto, fuera del ámbito del santuario, con un español claro y no literalista.
- source_word: וְהֱבִיאֻם
  english_pob_choice: and bring them
  chosen_spanish: y los traigan
  alternatives_spanish:
  - y los traigan
  - y los lleven
  lexicon: HALOT
  rationale: El sufijo pronominal plural se expresa con 'los'; el verbo mantiene la secuencia de acciones orientadas al santuario.
- source_word: לַיהוָה
  english_pob_choice: to Yahweh
  chosen_spanish: a Yahvé
  alternatives_spanish:
  - a Yahvé
  - al SEÑOR
  lexicon: HALOT
  rationale: Sigue el estándar del proyecto para el Tetragrámaton en español. Se conserva el nombre propio divino, no una sustitución eclesiástica.
- source_word: פֶּתַח אֹהֶל מוֹעֵד
  english_pob_choice: the entrance of the tent of meeting
  chosen_spanish: la entrada de la tienda de reunión
  alternatives_spanish:
  - la entrada de la tienda de reunión
  - la entrada del tabernáculo de reunión
  lexicon: HALOT
  rationale: '''Tienda de reunión'' reproduce el constructo clásico de forma fiel y comprensible en español bíblico actual.'
- source_word: אֶל הַכֹּהֵן
  english_pob_choice: to the priest
  chosen_spanish: al sacerdote
  alternatives_spanish:
  - al sacerdote
  - al sacerdote oficiate
  lexicon: HALOT
  rationale: En español, 'sacerdote' comunica con claridad la función cultual del artículo definido hebreo, sin perder especificidad contextual.
- source_word: וְזָבְחוּ
  english_pob_choice: and sacrifice
  chosen_spanish: y sacrifiquen
  alternatives_spanish:
  - y sacrifiquen
  - y ofrezcan
  lexicon: HALOT
  rationale: Se preserva el verbo raíz 'sacrificar' para mantener la relación léxica con זבח y evitar una generalización excesiva.
- source_word: זִבְחֵי שְׁלָמִים
  english_pob_choice: peace offerings
  chosen_spanish: ofrendas de paz
  alternatives_spanish:
  - ofrendas de paz
  - ofrendas de comunión
  - ofrendas de bienestar
  lexicon: HALOT
  rationale: '''Ofrendas de paz'' refleja la categoría sacrificial tradicional y conserva el término relacional/holístico sin forzar una paráfrasis.'
- source_word: אוֹתָם
  english_pob_choice: them
  chosen_spanish: los
  alternatives_spanish:
  - los
  - a ellos
  lexicon: HALOT
  rationale: Retoma de manera natural el objeto plural masculino ya mencionado, en concordancia con el español del sintagma final.
theological_decisions:
- issue: Rendering of יהוה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahvé
  - SEÑOR
  rationale: Se sigue la convención del proyecto para el nombre divino revelado, preservándolo como nombre propio auditable en lugar de ocultarlo bajo un título.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Sacrificial category זִבְחֵי שְׁלָמִים
  english_pob_reading: peace offerings
  chosen_spanish_reading: ofrendas de paz
  alternative_spanish_readings:
  - ofrendas de paz
  - ofrendas de comunión
  - ofrendas de bienestar
  rationale: Se mantiene la terminología sacrificial reconocible y a la vez se deja abierta la carga semántica de bienestar/totalidad inherente a שְׁלָמִים.
  doctrine_reference: DOCTRINE.md Translation philosophy §4
translation_notes:
  revision_awareness: 'Revisado contra el pasaje hebreo y el audit trail inglés: se mantuvo la secuencia purposiva, el nombre divino como Yahvé, y la categoría sacrificial final como ofrendas de paz. No se introdujeron lecturas adicionales ni cambios de sentido respecto del original.'
  spanish_consistency_notes:
  - Se usó 'tienda de reunión' para mantener coherencia con el término cultual estándar del pasaje.
  - Se conservó la distinción entre 'sacrificios' y 'ofrendas de paz' para reflejar el hebreo זבח / שְׁלָמִים.
  - El plural masculino 'hijos de Israel' sigue la forma hebrea sin neutralización.
  - La puntuación y las mayúsculas siguen normas editoriales del español bíblico contemporáneo.
