translation:
  language: es
  text: 'Y Eliseo le dijo: «Ve, dile: “Ciertamente sanarás[a]”; pero Yahvé me ha mostrado que ciertamente morirá».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo literalmente: «Ciertamente no vivirás». El texto hebreo aquí es difícil; muchos entienden el sentido como «Ciertamente sanarás», en contraste con la revelación siguiente de que en realidad morirá.'
    reason: alternative_reading
lexical_decisions:
- source_word: וַיֹּאמֶר אֵלָיו אֱלִישָׁע
  english_pob_choice: And Elisha said to him
  chosen_spanish: Y Eliseo le dijo
  alternatives_spanish:
  - Entonces Eliseo le dijo
  - Y dijo Eliseo
  lexicon: HALOT
  rationale: El hebreo nombra explícitamente al sujeto con אֱלִישָׁע; en español natural conviene poner el nombre delante del verbo para claridad y fluidez, sin perder la atribución directa.
- source_word: לֵךְ אֱמָר
  english_pob_choice: Go, say to him
  chosen_spanish: Ve, dile
  alternatives_spanish:
  - Ve, di a él
  - Anda, dile
  lexicon: HALOT
  rationale: Se conservan los dos imperativos. 'Dile' comunica en español el valor directo de אמר en un registro natural; 'decirle' evita una construcción más pesada que 'di a él'.
- source_word: לא חָיֹה תִחְיֶה
  english_pob_choice: You will certainly recover
  chosen_spanish: Sanarás ciertamente
  alternatives_spanish:
  - Ciertamente vivirás
  - No vivirás ciertamente
  lexicon: HALOT
  rationale: La POB inglesa adopta la lectura contextual de recuperación frente a la forma hebrea difícil. En español, 'sanarás ciertamente' preserva el contexto de enfermedad y la fuerza enfática del infinitivo absoluto + imperfecto. Se evita ocultar la dificultad del hebreo, que queda reflejada en la nota.
- source_word: וְהִרְאַנִי יְהוָה
  english_pob_choice: but Yahweh has shown me
  chosen_spanish: pero Yahvé me ha mostrado
  alternatives_spanish:
  - y Yahvé me ha mostrado
  - sin embargo Yahvé me ha mostrado
  lexicon: HALOT
  rationale: '''Pero'' transmite mejor el contraste discursivo entre el mensaje que debe comunicarse y la revelación profética inmediata. ''Yahvé'' sigue el estándar del proyecto para el nombre divino.'
- source_word: מ֥וֹת יָמֽוּת
  english_pob_choice: that he will certainly die
  chosen_spanish: que ciertamente morirá
  alternatives_spanish:
  - que morirá ciertamente
  - que sin duda morirá
  lexicon: HALOT
  rationale: La construcción מות + imperfecto expresa certeza enfática. 'Ciertamente morirá' mantiene esa fuerza en un español sobrio y fiel.
theological_decisions:
- issue: Tratamiento del nombre divino YHWH en este versículo
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Jehová
  rationale: Se sigue el mandato del proyecto de traducir יהוה como 'Yahvé' en el texto principal, manteniendo transparencia respecto del nombre divino y evitando la sustitución por un título.
  doctrine_reference: Terminología del proyecto para יהוה / YHWH
- issue: Lectura de לא חָיֹה תִחְיֶה
  english_pob_reading: Translate the main text as an instruction to report recovery, while preserving the literal negative reading in a footnote.
  chosen_spanish_reading: 'El texto principal presenta ''Sanarás ciertamente'' y la nota conserva la lectura literal difícil: ''No vivirás ciertamente''.'
  alternative_spanish_readings:
  - No vivirás ciertamente
  - Vivirás ciertamente
  rationale: La consonancia masorética con לא produce una lectura negativa problemática en el contexto inmediato. La POB inglesa opta por el sentido contextual de recuperación sin borrar la tensión textual; en español se mantiene la misma solución, con nota transparente para no suprimir la dificultad.
  doctrine_reference: Philosophy §§1, 3, 5; criterio de transparencia textual
translation_notes:
  revision_awareness: Se revisó el antecedente inglés con alta concordancia y sin cambios recientes; no se identificaron revisiones aplicadas que alteren la decisión de fondo. La redacción española sigue la misma solución contextual que la POB inglesa, preservando en nota la lectura literal difícil del hebreo.
  spanish_consistency_notes:
  - Se mantuvo 'Yahvé' conforme al estándar del proyecto para יהוה.
  - Se evitó 'SEÑOR' como sustituto del nombre divino.
  - Se preservó la tensión textual de לא חָיֹה תִחְיֶה mediante nota al pie.
  - Se usó 'sanarás' para expresar recuperación en contexto de enfermedad, coherente con la equivalencia óptima de la POB inglesa.
  - La puntuación y comillas siguen el uso español estándar, con cita interna anidada de forma legible.
