- from: Porque soy más bruto[a] que nadie, y no tengo entendimiento humano.
  to: Porque soy más insensato[a] que nadie, y no tengo entendimiento humano.
  rationale: Se reemplaza «más bruto» por «más insensato» para lograr un español más digno y eclesialmente legible, manteniendo la fuerte autodepreciación del hebreo. Se conserva «que nadie» y «entendimiento humano», que comunican bien la comparación intensiva y el valor genérico de אָדָם. La nota se corrige para reflejar con mayor fidelidad la alternativa auditada relacionada con «hombre».
