translation:
  language: es
  text: No ames el sueño[a], no sea que te empobrezcas; abre tus ojos[b], y tendrás pan en abundancia.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «llegues a la pobreza» o «quedes empobrecido». El verbo hebreo puede dar la idea de volverse pobre o quedar desposeído; aquí se refiere a caer en pobreza por la pereza.
    reason: lexical_alternative
  - marker: b
    text: Literalmente, «abre tus ojos; sé saciado de pan». La cláusula final se vierte como resultado para expresar con claridad el sentido del proverbio en español.
    reason: lexical_alternative
lexical_decisions:
- source_word: אַל
  english_pob_choice: Do not
  chosen_spanish: 'No'
  alternatives_spanish:
  - No seas
  - No vayas a
  lexicon: HALOT
  rationale: La partícula negativa prohibitiva se expresa naturalmente con «No» en español, manteniendo el tono de mandato sapiencial.
- source_word: תֶּאֱהַב
  english_pob_choice: love
  chosen_spanish: ames
  alternatives_spanish:
  - te guste
  - delites
  lexicon: HALOT
  rationale: «Amar» conserva la fuerza directa del verbo אָהַב y evita suavizar la prohibición moral del proverbio.
- source_word: שֵׁנָה
  english_pob_choice: sleep
  chosen_spanish: sueño
  alternatives_spanish:
  - dormir
  - sueño profundo
  lexicon: HALOT
  rationale: El sustantivo hebreo significa «sueño»; se preserva la imagen concreta en español sin convertirla en un verbo.
- source_word: פֶּן
  english_pob_choice: lest
  chosen_spanish: para que no
  alternatives_spanish:
  - no sea que
  - lest
  lexicon: HALOT
  rationale: «Para que no» expresa en español la relación de consecuencia negativa sin forzar un anglicismo o un giro arcaizante.
- source_word: תִּוָּרֵשׁ
  english_pob_choice: you become poor
  chosen_spanish: te empobrezcas
  alternatives_spanish:
  - te vuelvas pobre
  - quedes en pobreza
  - te veas desposeído
  lexicon: HALOT
  rationale: El nifal de ירשׁ puede implicar empobrecimiento o quedar desposeído. «Empobrecerse» conserva la fuerza práctica del proverbio y admite la ambigüedad documentada entre pobreza y pérdida de bienes.
- source_word: פְּקַח
  english_pob_choice: open
  chosen_spanish: abre
  alternatives_spanish:
  - mantén abiertos
  - despierta
  lexicon: HALOT
  rationale: El imperativo literal es «abre»; en contexto sapiencial conserva la imagen de los ojos abiertos como señal de diligencia y vigilancia.
- source_word: עֵינֶיךָ
  english_pob_choice: your eyes
  chosen_spanish: tus ojos
  alternatives_spanish:
  - los ojos tuyos
  lexicon: HALOT
  rationale: Se mantiene la metáfora concreta del original con el posesivo de segunda persona en español natural.
- source_word: שְׂבַע
  english_pob_choice: you will have your fill
  chosen_spanish: quedarás satisfecho
  alternatives_spanish:
  - te saciarás
  - tendrás tu lleno
  lexicon: HALOT
  rationale: 'Aunque el hebreo es imperativo en forma, el sentido funcional es resultativo: al abrir los ojos, habrá suficiente. «Quedarás satisfecho» comunica ese resultado con claridad y conserva la idea de saciedad.'
- source_word: לָחֶם
  english_pob_choice: bread
  chosen_spanish: de pan
  alternatives_spanish:
  - de alimento
  - de comida
  lexicon: HALOT
  rationale: «Pan» preserva la imagen hebrea literal y su valor metonímico de sustento, sin generalizar a «alimento».
translation_notes:
  revision_awareness: 'El texto inglés POB es de alta concordancia con el hebreo y no requiere revisión sustancial. Se ha mantenido la misma tensión léxica documentada: el verbo de empobrecerse frente a la lectura resultativa de la última cláusula, con una solución española que conserva imagen y sentido.'
  spanish_consistency_notes:
  - Se mantiene «pan» en lugar de «alimento» para conservar la imaginería sapiencial y el paralelo con el hebreo.
  - Se usa «empobrezcas» para reflejar el valor contextual del nifal de ירשׁ sin introducir una explicación interpretativa excesiva en el cuerpo del texto.
  - El registro es sobrio y proverbial, compatible con una edición pública bíblica en español.
