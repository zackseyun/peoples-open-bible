revisions:
- from: 'Entonces Eliseo oró y dijo[a]: “Yahvé, por favor abre sus ojos para que vea”. Entonces Yahvé abrió los ojos del joven, y vio; y he aquí[b] que el monte estaba lleno de caballos y carros de fuego alrededor de Eliseo.'
  to: 'Entonces Eliseo oró y dijo[a]: «Yahvé, por favor, abre sus ojos para que vea». Entonces Yahvé abrió los ojos del joven, y vio; y he aquí[b], el monte estaba lleno de caballos y carros de fuego alrededor de Eliseo.'
  rationale: 'La revisión hace solo ajustes menores: mejora la naturalidad y puntuación del español, conserva el marcador discursivo «he aquí», y corrige la nota sobre YHWH para que refleje fielmente el dato fuente y la política terminológica del proyecto en español.'
