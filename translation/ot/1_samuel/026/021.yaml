id: 1SA.26.21
reference: 1 Samuel 26:21
source:
  edition: WLC
  text: וַ/יֹּאמֶר֩ שָׁא֨וּל חָטָ֜אתִי שׁ֣וּב בְּנִֽ/י דָוִ֗ד כִּ֠י לֹֽא אָרַ֤ע לְ/ךָ֙ ע֔וֹד תַּ֠חַת אֲשֶׁ֨ר יָקְרָ֥ה נַפְשִׁ֛/י בְּ/עֵינֶ֖י/ךָ הַ/יּ֣וֹם הַ/זֶּ֑ה הִנֵּ֥ה הִסְכַּ֛לְתִּי וָ/אֶשְׁגֶּ֖ה הַרְבֵּ֥ה מְאֹֽד־־׃
translation:
  text: Then Saul said[a], “I have sinned. Return, my son David, for I will not harm you again, because my life was precious in your eyes this day. Look[b], I have acted foolishly and have gone badly astray.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'my soul was precious in your eyes.' Here 'soul' (נֶפֶשׁ) refers to Saul's life or person in context.
    reason: lexical_alternative
  - marker: b
    text: Or, 'and erred greatly.'
    reason: lexical_alternative
lexical_decisions:
- source_word: חָטָאתִי
  chosen: I have sinned
  alternatives:
  - I sinned
  lexicon: HALOT
  rationale: Qal perfect 1cs of חטא, a straightforward confession of wrongdoing. Present perfect in English fits the immediate admission better than simple past.
- source_word: שׁוּב
  chosen: Return
  alternatives:
  - Come back
  - Turn back
  lexicon: HALOT
  rationale: Imperative of שוב. 'Return' preserves the direct summons without over-specifying destination.
- source_word: בְּנִי דָוִד
  chosen: my son David
  alternatives:
  - my son, David
  lexicon: HALOT
  rationale: Vocative expression of Saul addressing David. 'My son David' preserves both the relational language and the name.
- source_word: לֹא אָרַע לְךָ עוֹד
  chosen: I will not harm you again
  alternatives:
  - I will do you no evil anymore
  - I will not do wrong to you again
  lexicon: HALOT
  rationale: Hiphil of רעע here means to do harm or evil to someone. 'Harm' is idiomatic modern English and captures the hostile intent.
- source_word: תַּחַת אֲשֶׁר
  chosen: because
  alternatives:
  - since
  - in return for the fact that
  lexicon: HALOT
  rationale: In this context the construction introduces the reason for Saul's promise. 'Because' gives the causal force naturally in English.
- source_word: יָקְרָה נַפְשִׁי בְּעֵינֶיךָ
  chosen: my life was precious in your eyes
  alternatives:
  - my life was valued in your sight
  - my soul was precious in your eyes
  lexicon: HALOT
  rationale: נֶפֶשׁ here refers to Saul's life, not specifically his immaterial soul. יקר in this idiom means to be precious/valuable in someone's estimation.
- source_word: הַיּוֹם הַזֶּה
  chosen: this day
  alternatives:
  - today
  - on this day
  lexicon: HALOT
  rationale: Traditional but still natural rendering that fits the solemn tone and the Hebrew demonstrative phrase.
- source_word: הִנֵּה
  chosen: Look
  alternatives:
  - Behold
  - See
  lexicon: HALOT
  rationale: Discourse marker drawing attention to Saul's concluding admission. 'Look' is readable modern English without archaic tone.
- source_word: הִסְכַּלְתִּי
  chosen: I have acted foolishly
  alternatives:
  - I have been foolish
  - I have acted like a fool
  lexicon: HALOT
  rationale: Hiphil of שכל in this context conveys behaving foolishly rather than merely lacking intelligence. The verbal nuance is preserved with 'acted foolishly.'
- source_word: וָאֶשְׁגֶּה
  chosen: and have gone badly astray
  alternatives:
  - and erred greatly
  - and have made a great mistake
  lexicon: HALOT
  rationale: From שגה, to stray or err. 'Gone badly astray' preserves the metaphorical sense of serious error better than the flatter 'made a mistake.'
- source_word: הַרְבֵּה מְאֹד
  chosen: badly
  alternatives:
  - greatly
  - very much
  lexicon: HALOT
  rationale: The adverbial intensifier modifies Saul's erring. In English, 'badly astray' conveys both intensity and idiomatic flow; the stronger literal alternatives are preserved as options.
