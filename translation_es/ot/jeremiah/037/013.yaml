revisions:
- from: 'Y cuando él estaba en la Puerta de Benjamín, allí había un jefe de la guardia, cuyo nombre era Irijías[a], hijo de Slemeyías, hijo de Hananías; y él prendió al profeta Jeremías, diciendo: «Tú te estás pasando a los caldeos[b]».'
