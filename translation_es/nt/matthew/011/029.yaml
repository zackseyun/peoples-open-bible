translation:
  language: es
  text: Tomad mi yugo sobre vosotros y aprended de mí[a], porque soy manso y humilde de corazón, y hallaréis descanso para vuestras almas.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «manso y de corazón humilde».
    reason: lexical_alternative
lexical_decisions:
- source_word: ἄρατε
  english_pob_choice: Take
  chosen_spanish: Tomad
  alternatives_spanish:
  - Tomad sobre vosotros
  - Recibid
  lexicon: BDAG
  rationale: El imperativo aoristo plural de αἴρω, con el sustantivo 'yugo', exige una orden de asumir/aceptar la carga. 'Tomad' conserva bien la fuerza del mandato y es natural en español bíblico sin perder el sentido del acto de aceptar el yugo.
- source_word: ζυγόν
  english_pob_choice: yoke
  chosen_spanish: yugo
  alternatives_spanish:
  - yugo de esclavitud
  - carga
  lexicon: BDAG
  rationale: Se conserva la imagen literal de 'yugo' porque es central en la metáfora de discipulado y autoridad; traducirlo como 'carga' diluiría la imagen original.
- source_word: ἐφ’ ὑμᾶς
  english_pob_choice: upon you
  chosen_spanish: sobre vosotros
  alternatives_spanish:
  - encima de vosotros
  - en vosotros
  lexicon: BDAG
  rationale: La preposición con acusativo mantiene la imagen concreta de colocar el yugo encima de la persona. 'Sobre vosotros' reproduce bien esa relación espacial y metafórica en español.
- source_word: μάθετε ἀπ’ ἐμοῦ
  english_pob_choice: learn from me
  chosen_spanish: aprended de mí
  alternatives_spanish:
  - aprended de mí y seguidme
  - aprended acerca de mí
  lexicon: BDAG
  rationale: '''Aprended de mí'' es la equivalencia directa y natural para μάθετε ἀπ’ ἐμοῦ. Conserva el sentido de recibir instrucción y formación de Jesús sin recurrir a una perífrasis innecesaria.'
- source_word: ὅτι
  english_pob_choice: because
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  lexicon: BDAG
  rationale: Introduce la razón de por qué Jesús es un maestro adecuado. 'Porque' expresa con claridad la relación causal en español contemporáneo.
- source_word: πραΰς
  english_pob_choice: gentle
  chosen_spanish: manso
  alternatives_spanish:
  - amable
  - gentil
  - apacible
  lexicon: BDAG
  rationale: Aunque el inglés POB eligió 'gentle' para evitar la posible debilidad de 'meek', en español 'manso' conserva mejor el campo semántico bíblico tradicional de πραΰς y mantiene la tensión positiva de mansedumbre sin sobreinterpretar.
- source_word: ταπεινὸς τῇ καρδίᾳ
  english_pob_choice: humble in heart
  chosen_spanish: humilde de corazón
  alternatives_spanish:
  - humilde en el corazón
  - humilde de corazón y mente
  - bajo de corazón
  lexicon: BDAG
  rationale: '''Humilde de corazón'' reproduce de manera idiomática la cualidad interior expresada por el adjetivo y el dativo. Mantiene la referencia al centro interior de la persona, como en el griego.'
- source_word: εὑρήσετε
  english_pob_choice: you will find
  chosen_spanish: hallaréis
  alternatives_spanish:
  - encontraréis
  - hallaréis descanso
  lexicon: BDAG
  rationale: El futuro directo se expresa de forma natural con 'hallaréis'. Frente a 'encontraréis', 'hallaréis' conserva un registro más bíblico y solemne sin ser arcaizante en exceso.
- source_word: ἀνάπαυσιν
  english_pob_choice: rest
  chosen_spanish: descanso
  alternatives_spanish:
  - reposo
  - alivio
  lexicon: BDAG
  rationale: '''Descanso'' es la equivalencia más clara y ampliamente entendible en español para ἀνάπαυσις. Mantiene la resonancia bíblica de reposo sin desplazar el sentido hacia simple alivio físico.'
- source_word: ταῖς ψυχαῖς ὑμῶν
  english_pob_choice: for your souls
  chosen_spanish: para vuestras almas
  alternatives_spanish:
  - para vuestras vidas
  - a vuestras almas
  lexicon: BDAG
  rationale: Se conserva 'almas' porque ψυχή aquí apunta a la vida interior/persona y no conviene reducirlo a 'vidas' o 'seres'. 'Para' traduce idiomáticamente el dativo de beneficio/resultado en español.
theological_decisions:
- issue: Descripción del carácter de Jesús en πραΰς ... καὶ ταπεινὸς τῇ καρδίᾳ
  english_pob_reading: I am gentle and humble in heart
  chosen_spanish_reading: soy manso y humilde de corazón
  alternative_spanish_readings:
  - soy gentil y humilde de corazón
  - soy manso y bajo de corazón
  rationale: La traducción mantiene la autodescripción de Jesús sin suavizarla doctrinalmente. 'Manso' conserva la virtud bíblica de πραΰς y 'humilde de corazón' expresa la disposición interior de ταπεινὸς τῇ καρδίᾳ. No se introduce una interpretación adicional más allá del texto.
  doctrine_reference: Translation philosophy §§5–6
translation_notes:
  revision_awareness: 'El texto español sigue de cerca el griego SBLGNT y toma en cuenta el audit trail inglés: conserva la metáfora de ''yugo'', reproduce la relación causal de ὅτι con ''porque'', y mantiene la alternativa lexical de πραΰς documentada por la POB inglesa. No se requirieron revisiones respecto del pasaje base.'
  spanish_consistency_notes:
  - Se usa 'yugo' de forma literal para mantener la metáfora disciplinar.
  - Se elige 'manso' en vez de 'gentil' para reflejar mejor la textura bíblica de πραΰς en español.
  - '''Almas'' conserva el valor de ψυχαῖς sin reducirlo a una mera metáfora psicológica.'
  - 'Se mantiene el registro reverente y natural con imperativos plurales: ''Tomad'' y ''aprended''.'
