translation:
  language: es
  text: Y acabaron por arruinar todo su esplendor[a], y él llevó a los sobrevivientes[b] con la espada a Babilonia.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: La expresión también puede entenderse más literalmente como «hicieron inútil todo su esplendor» o «volvieron sin valor todo su esplendor».
    reason: lexical_alternative
  - marker: b
    text: «Con la espada» también puede entenderse en estrecha relación con la devastación anterior, con la idea de que los restantes fueron llevados bajo una conquista violenta; compárese el paralelo hebreo, que enfatiza la matanza por la espada.
    reason: alternative_reading
lexical_decisions:
- source_word: συνετέλεσαν
  english_pob_choice: they brought ... to ruin
  chosen_spanish: acabaron por arruinar
  alternatives_spanish:
  - lo llevaron a su fin
  - lo terminaron de arruinar
  lexicon: LSJ
  rationale: El verbo expresa llevar algo a su consumación o término; en este contexto, la consumación es la devastación de la ciudad. «Acabaron por arruinar» conserva la idea de finalización con un verbo natural en español sin perder el valor de completar la destrucción.
- source_word: πάντα τὰ ἔνδοξα αὐτῆς
  english_pob_choice: all her splendor
  chosen_spanish: todo su esplendor
  alternatives_spanish:
  - todas sus cosas gloriosas
  - todas sus cosas espléndidas
  lexicon: LSJ
  rationale: ἔνδοξα puede referirse a lo glorioso o espléndido en conjunto. En español, «todo su esplendor» comunica bien la pérdida total de aquello que la hacía gloriosa, con un tono natural y fiel al alcance colectivo.
- source_word: ἀχρειῶσαι
  english_pob_choice: to ruin
  chosen_spanish: arruinar
  alternatives_spanish:
  - dejar inútil
  - hacer valer nada
  lexicon: LSJ
  rationale: El verbo significa hacer inútil, sin valor o arruinar. «Arruinar» recoge el efecto final en español y evita una formulación demasiado abstracta, manteniendo la relación directa con la devastación del objeto descrito.
- source_word: τοὺς ἐπιλοίπους
  english_pob_choice: the survivors
  chosen_spanish: los sobrevivientes
  alternatives_spanish:
  - los que quedaron
  - el remanente
  lexicon: LSJ
  rationale: La frase designa a los que quedaron con vida después de la destrucción. «Los sobrevivientes» es claro y evita el matiz más cargado de «remanente», que en español puede sonar más teológico que histórico en este contexto.
- source_word: ἀπήγαγεν
  english_pob_choice: he carried ... away
  chosen_spanish: llevó ...
  alternatives_spanish:
  - arrastró ...
  - deportó ...
  lexicon: LSJ
  rationale: El verbo denota llevarse a alguien por la fuerza. «Llevó» funciona de manera natural en español con la idea de exilio forzado; «deportó» sería más técnico y menos congruente con el ritmo narrativo del verso.
- source_word: μετὰ ῥομφαίας
  english_pob_choice: with the sword
  chosen_spanish: con la espada
  alternatives_spanish:
  - por la espada
  - bajo la espada
  lexicon: LSJ
  rationale: La expresión es compacta y puede oírse unida a la violencia de la conquista. «Con la espada» preserva el valor literal y permite la ambigüedad del modo violento sin forzar una relación sintáctica única.
- source_word: εἰς Βαβυλῶνα
  english_pob_choice: to Babylon
  chosen_spanish: a Babilonia
  alternatives_spanish:
  - hacia Babilonia
  - hasta Babilonia
  lexicon: LSJ
  rationale: La dirección geográfica se expresa de forma natural en español con «a Babilonia».
theological_decisions:
- issue: Cambio de plural a singular entre los dos verbos del verso
  english_pob_reading: The subject is the Babylonian king acting after the unnamed plural agents completed the devastation.
  chosen_spanish_reading: El plural «acabaron» se conserva para la acción de devastar, y el singular «llevó» se refiere al rey babilonio como ejecutor del destierro.
  alternative_spanish_readings:
  - El singular podría entenderse como una referencia genérica al ejército invasor.
  - Podría suavizarse la alternancia verbal con un plural uniforme.
  rationale: El griego pasa del plural al singular. Mantener esa alternancia en español respeta el texto y ayuda a distinguir entre la devastación colectiva y el acto de traslado al exilio, sin introducir una lectura doctrinal ajena.
  doctrine_reference: Translation philosophy §5 (consistencia de términos clave o excepción documentada)
- issue: Valor de τοὺς ἐπιλοίπους sin cargarlo teológicamente
  english_pob_reading: the survivors
  chosen_spanish_reading: los sobrevivientes
  alternative_spanish_readings:
  - el remanente
  - los restantes
  rationale: Aunque «remanente» es posible, aquí el contexto inmediato habla de quienes quedaron vivos tras el desastre. «Los sobrevivientes» conserva el sentido histórico y evita importar un matiz teológico no explícito en el pasaje.
  doctrine_reference: Translation philosophy §1 (primacía del original sobre la tradición de traducción)
translation_notes:
  revision_awareness: 'La redacción sigue la revisión más reciente del POB inglés, que optó por «brought all her splendor to ruin» en lugar de una formulación más literal pero menos natural. En español, «acabaron por arruinar todo su esplendor» mantiene esa mejora estilística y conserva la estructura de dos movimientos: devastación plural y exilio singular.'
  spanish_consistency_notes:
  - Se mantiene «Babilonia» como topónimo estándar.
  - Se usa «espada» en forma literal, sin convertirla en una mera metáfora.
  - «Sobrevivientes» se eligió por claridad histórica y por coherencia con el audit trail inglés.
  - No se introduce «remanente» para evitar una carga teológica no requerida por el contexto.
