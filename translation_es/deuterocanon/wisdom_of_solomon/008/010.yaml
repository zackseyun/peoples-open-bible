translation:
  language: es
  text: Y siendo joven, tendré gloria entre las multitudes[a], y honor ante los ancianos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «renombre entre las multitudes, y estima de los ancianos, aunque joven». La frase griega con ὁ νέος es condensada y puede entenderse como «el joven» o adverbialmente, «como joven / aunque joven».'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἕξω
  english_pob_choice: I will have
  chosen_spanish: tendré
  alternatives_spanish:
  - tendré como posesión
  - habré de tener
  lexicon: LSJ
  rationale: El futuro de ἔχω expresa posesión o adquisición futura. «Tendré» es natural en español y conserva la primera persona del hablante, sin añadir una idea de posesión más fuerte de la que el griego exige.
- source_word: δόξαν
  english_pob_choice: glory
  chosen_spanish: gloria
  alternatives_spanish:
  - renombre
  - reputación
  lexicon: LSJ
  rationale: δόξα puede abarcar fama, honor o gloria. «Gloria» mantiene el registro elevado del libro y deja que el contexto social sea aclarado por la referencia a las multitudes.
- source_word: ἐν ὄχλοις
  english_pob_choice: among crowds
  chosen_spanish: entre las multitudes
  alternatives_spanish:
  - entre la gente
  - en medio de las multitudes
  lexicon: LSJ
  rationale: ὄχλοι designa multitudes o muchedumbres. «Entre las multitudes» conserva el matiz público y colectivo, y suena natural en español bíblico contemporáneo.
- source_word: τιμήν
  english_pob_choice: honor
  chosen_spanish: honra
  alternatives_spanish:
  - honor
  - estima
  lexicon: LSJ
  rationale: τιμή es honor, estima o consideración. Se eligió «honra» para distinguirla levemente de «gloria» y mantener un tono digno y bíblico en español sin perder la fuerza social del término.
- source_word: παρὰ πρεσβυτέροις
  english_pob_choice: before elders
  chosen_spanish: ante los ancianos
  alternatives_spanish:
  - delante de los ancianos
  - en presencia de los ancianos
  lexicon: LSJ
  rationale: παρά con dativo puede señalar presencia o evaluación junto a alguien. «Ante los ancianos» expresa bien la escena pública de reconocimiento y deja abierta la idea de juicio o valoración por parte de ellos.
- source_word: ὁ νέος
  english_pob_choice: as a young man
  chosen_spanish: como joven
  alternatives_spanish:
  - siendo joven
  - aunque joven
  lexicon: LSJ
  rationale: La construcción griega es comprimida y puede leerse de manera adverbial o nominal. «Como joven» refleja la función contextual sin forzar una expansión interpretativa; además preserva la tensión documentada entre edad y honor.
theological_decisions:
- issue: Relación entre gloria pública y honra otorgada por los ancianos
  english_pob_reading: I will have glory among crowds, and honor before elders, though I am young.
  chosen_spanish_reading: Tendré gloria entre las multitudes, y honra ante los ancianos, como joven.
  alternative_spanish_readings:
  - Tendré gloria entre las multitudes, y honra ante los ancianos, aunque soy joven.
  - Tendré gloria entre las multitudes, y honra ante los ancianos, siendo joven.
  rationale: 'El verso presenta una afirmación paradójica: reconocimiento público y honor de los mayores pese a la juventud del hablante. «Como joven» conserva la compresión del griego y evita cerrar la ambigüedad entre valor adverbial y concesivo que el audit trail inglés preserva.'
  doctrine_reference: Sabiduría 8:10; sabiduría y honor concedidos por Dios incluso en juventud, sin dependencia de edad avanzada.
translation_notes:
  revision_awareness: Se siguió la lectura griega directa ἕξω… δόξαν… ἐν ὄχλοις… τιμὴν παρὰ πρεσβυτέροις ὁ νέος, tomando en cuenta la nota auditada en inglés sobre la compresión de ὁ νέος y su posible valor nominal o adverbial. No se introdujeron elementos no presentes en el texto fuente.
  spanish_consistency_notes:
  - Se mantuvo «gloria» para δόξα y «honra» para τιμή, distinguiendo ambos términos en lugar de colapsarlos en un solo vocablo.
  - «Ancianos» traduce πρεσβυτέροις por su valor de mayores/ancianos respetados, coherente con el contexto social.
  - Se usó «multitudes» para ὄχλοι a fin de conservar el plural colectivo sin volverlo eclesiástico ni técnico.
