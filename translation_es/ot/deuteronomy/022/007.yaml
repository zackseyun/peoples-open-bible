review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el sentido hebreo general: mantiene el mandato enfático de soltar a la madre, el permiso de tomar la descendencia, y la fórmula de bendición/resultando en bienestar y larga vida. Sin embargo, «los polluelos» estrecha más de lo debido הַבָּנִים, que en el contexto puede abarcar las crías en general y, por el v. 6, no conviene limitar innecesariamente a aves ya nacidas. También conviene mejorar la naturalidad de la colocación verbal en español.'
  spanish_quality_summary: El español es claro y digno, pero «tomar para ti a los polluelos» suena algo rígido, y «polluelos» es más específico de lo que pide el original y la auditoría inglesa. «Las crías» resulta más natural y más fiel al alcance contextual. El resto del versículo está bien logrado y es plenamente legible.
  glossary_alignment: No hay conflictos con la terminología doctrinal del proyecto en este versículo. Las decisiones sobre «la madre», «para que te vaya bien» y «prolongues tus días» están alineadas con la auditoría. La principal desviación léxica es הַבָּנִים -> «los polluelos» en lugar de una opción más amplia como «las crías».
  issues:
  - severity: medium
    issue: «los polluelos» limita en exceso הַבָּנִים
    rationale: El hebreo dice literalmente «los hijos/los hijos varones», y en contexto significa la descendencia de la madre ave. La auditoría inglesa escogió «the young» precisamente para no restringirlo a «chicks». En español, «las crías» conserva mejor esa amplitud contextual.
  - severity: low
    issue: «tomar para ti a...» suena algo forzado
    rationale: Aunque es comprensible y formalmente cercano a לָךְ, en español fluye mejor «tomar las crías para ti» o «llevarte las crías». Esto mejora la legibilidad sin perder contenido.
  revised_spanish_text: Debes dejar ir sin falta a la madre[a], pero puedes tomar las crías para ti[b], para que te vaya bien y prolongues tus días[c].
  revised_footnotes:
  - marker: a
    text: O, más literalmente, «dejarás ir sin falta a la madre».
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «los hijos»; en el contexto de un nido de aves, se refiere a las crías.'
    reason: lexical_alternative
  - marker: c
    text: O, más literalmente, «y prolongues días».
    reason: lexical_alternative
  revision_rationale: Se reemplaza «los polluelos» por «las crías» para preservar mejor el alcance contextual de הַבָּנִים y alinearse con la decisión inglesa «the young». También se ajusta el orden a «tomar las crías para ti» para un español más natural sin perder לָךְ.
