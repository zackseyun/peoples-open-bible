base_translation:
  language: en
  yaml_path: translation/ot/numbers/023/013.yaml
  text: Then Balak said to him[a], “Please come with me to another place, from where you may see him. You will see only the outskirts of him, and you will not see all of him[b]; then curse him for me from there.”
  footnotes:
  - marker: a
    text: 'Hebrew: ''You will see only his edge'' or ''only the farthest part of him,'' referring to seeing only a partial view of Israel.'
    reason: lexical_alternative
  - marker: b
    text: The Hebrew uses singular pronouns ('him,' 'all of him') for Israel as a collective people; English could also render these as 'them.'
    reason: alternative_reading
