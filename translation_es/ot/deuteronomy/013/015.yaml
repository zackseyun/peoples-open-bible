revisions:
- from: y investigarás[a], y escudriñarás, y preguntarás con diligencia; y he aquí, si es verdad y está confirmado[b] que esta abominación ha sido hecha en medio de ti,
  to: y investigarás[a], y escudriñarás, y preguntarás con diligencia; y he aquí, si es verdad y es cierto el asunto[b] que esta abominación se ha cometido en medio de ti,
  rationale: Se revisa la fórmula judicial para reflejar explícitamente הַדָּבָר (‘el asunto’) y evitar una construcción española incompleta. También se reemplaza «ha sido hecha» por «se ha cometido», que es más natural y precisa con «abominación» en este contexto legal-cultual, sin apartarse del sentido del hebreo ni del razonamiento documentado en la auditoría inglesa.
  reviewer_model: gpt-5.4
