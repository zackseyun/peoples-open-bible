base_translation:
  language: en
  yaml_path: translation/deuterocanon/tobit/001/006.yaml
  text: But I alone would often go to Jerusalem for the feasts[a], as it is written for all Israel in an everlasting ordinance[b], bringing the firstfruits and the tithes of the produce and the first shearings.
  footnotes:
