translation:
  language: es
  text: Porque toda bota del guerrero que avanza en el tumulto[a], y toda vestidura enrollada en sangre, serán para la quema, combustible para el fuego.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «toda bota que avanza en el tumulto». El hebreo es raro y difícil; también puede entenderse de modo más abstracto en términos del ruido de guerra, en lugar del calzado mismo.'
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  lexicon: HALOT
  rationale: Introduce la explicación causal o justificativa del contexto previo; en español, «Porque» conserva bien el valor explicativo sin forzar un orden artificial.
- source_word: כָל
  english_pob_choice: every
  chosen_spanish: todo / toda
  alternatives_spanish:
  - cada
  - todos los
  lexicon: HALOT
  rationale: El hebreo distribuye la referencia a los dos sustantivos singulares. «Todo» / «toda» reproduce esa distribución de manera natural en español.
- source_word: סְאוֹן
  english_pob_choice: boot
  chosen_spanish: calzado
  alternatives_spanish:
  - bota
  - botín
  - calzado de guerra
  lexicon: HALOT
  rationale: El término es raro y difícil. La imagen apunta a un elemento de calzado militar o de marcha; «calzado» mantiene la referencia concreta sin sobredeterminar el tipo exacto de zapato.
- source_word: סֹאֵן
  english_pob_choice: of the tramping warrior
  chosen_spanish: del que pisa con estruendo
  alternatives_spanish:
  - del que trampa
  - del que marcha con estruendo
  - del pisador
  lexicon: HALOT
  rationale: El participio describe la acción de pisar o golpear con fuerza. En español, una frase verbal conserva el movimiento y evita añadir explícitamente «guerrero», que no está en el hebreo de forma directa.
- source_word: בְּרַעַשׁ
  english_pob_choice: in the tumult
  chosen_spanish: en el tumulto
  alternatives_spanish:
  - con estruendo
  - en el ruido
  - en la conmoción
  lexicon: HALOT
  rationale: «Tumulto» expresa bien la idea de agitación ruidosa o conmoción. Se evita ampliar a «guerra» o «batalla», porque no está explícito en el término hebreo.
- source_word: וְשִׂמְלָה
  english_pob_choice: every garment
  chosen_spanish: toda vestidura
  alternatives_spanish:
  - todo vestido
  - toda ropa
  - todo manto
  lexicon: HALOT
  rationale: El término es general para ropa o vestimenta. «Vestidura» conserva el tono elevado y puede abarcar la imagen militar o de combate sin perder naturalidad.
- source_word: מְגוֹלָלָה
  english_pob_choice: rolled
  chosen_spanish: enrollada
  alternatives_spanish:
  - arrollada
  - envuelta
  - rodada
  lexicon: HALOT
  rationale: El participio pasivo indica algo enrollado o arrollado. «Enrollada» es claro en español y mantiene la imagen de una prenda manchada y recogida sobre sí misma.
- source_word: בְדָמִים
  english_pob_choice: in blood
  chosen_spanish: en sangre
  alternatives_spanish:
  - con sangre
  - en sangre derramada
  - en sangre derramada
  lexicon: HALOT
  rationale: Aunque el hebreo usa el plural «sangres», en español la forma natural es «sangre». Se conserva la imagen de una prenda manchada por la sangre de la violencia.
- source_word: וְהָיְתָה
  english_pob_choice: will be
  chosen_spanish: será
  alternatives_spanish:
  - llegará a ser
  - será para
  - vendrá a ser
  lexicon: HALOT
  rationale: La construcción expresa un resultado futuro. «Será» mantiene la sencillez del hebreo y la relación con lo que sigue.
- source_word: לִשְׂרֵפָה
  english_pob_choice: for burning
  chosen_spanish: para ser quemada
  alternatives_spanish:
  - para quemarse
  - para el fuego
  - para la quema
  lexicon: HALOT
  rationale: El hebreo señala destino o finalidad hacia la quema. «Para ser quemada» conserva ese valor resultativo sin convertirlo demasiado pronto en una formulación más libre.
- source_word: מַאֲכֹלֶת אֵשׁ
  english_pob_choice: fuel for the fire
  chosen_spanish: combustible para el fuego
  alternatives_spanish:
  - alimento del fuego
  - leña para el fuego
  - presa del fuego
  lexicon: HALOT
  rationale: La expresión literalmente significa algo así como «alimento del fuego». «Combustible para el fuego» comunica la metáfora con claridad en español moderno y mantiene la imagen de consumo por el fuego.
translation_notes:
  revision_awareness: 'La redacción sigue la revisión más reciente del inglés POB al mantener «tumulto» sin añadir «batalla», y al reflejar la estructura hebrea con una formulación de finalidad/resulto: «será para ser quemada, combustible para el fuego».'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma del proyecto cuando aparezca el nombre divino; este versículo no lo contiene.
  - Se evita «SEÑOR» como sustituto del nombre divino porque no aparece en el texto de este verso.
  - «Sangre» se usa como equivalente idiomático natural del plural hebreo «sangres», sin perder la imagen de violencia.
  - La ambigüedad lexical principal se conserva mediante nota, en lugar de resolverla de forma excesivamente interpretativa.
