  source_review: state/reviews/gemini/vertex_gap_closure_2026_04/extra_canonical/2_baruch/075/007.job-75762.json
  category: lexical
  from: we who remain
  to: we who live
  rationale: The Syriac verb 'ḥya' means 'to live', not 'to remain'. 'We who live'
    or 'we who are living' is the standard and more accurate rendering.
- timestamp: '2026-04-28T07:48:00Z'
  adjudicator: claude-opus-4-7
  reviewer_model: gemini-3.1-pro-preview
  source_review: state/reviews/gemini/vertex_gap_closure_2026_04/extra_canonical/2_baruch/075/007.job-75762.json
  category: grammar
  from: have subjected ourselves
  to: submit ourselves
  rationale: The Syriac uses a participle ('mšaʿbdînan') parallel to 'know' ('yâdʿînan').
    Translating it as a present tense 'submit ourselves' better captures the ongoing
    condition parallel to 'if we know', rather than a completed past action.
- timestamp: '2026-04-28T09:36:33Z'
  adjudicator: claude-opus-4-7
  reviewer_model: gemini-3.1-pro-preview
  source_review: state/reviews/gemini/vertex_full_book_qc_2026_04/extra_canonical/2_baruch/075/007.job-77417.json
  category: lexical
  from: brought us up
  to: brought us out
  rationale: The Syriac verb 'appeq' (from 'npaq') means 'to bring out' or 'lead out',
    whereas 'bring up' would typically translate 'assaq' (from 'sleq'). 'Brought us
    out' is the more precise rendering for the Exodus context here.
