    text: O «Oh razón, tirano sobre las pasiones de los hijos»; el genitivo «de los hijos» puede unirse más estrechamente con «pasiones», aunque el sentido sigue siendo que la razón gobierna las pasiones y que la devoción a Dios supera incluso el apego de una madre a sus hijos.
    reason: lexical_alternative
  - marker: b
    text: O «la piedad es más deseable para una madre que sus hijos»; aquí εὐσέβεια expresa fidelidad reverente hacia Dios, no simple religiosidad externa.
    reason: alternative_reading
