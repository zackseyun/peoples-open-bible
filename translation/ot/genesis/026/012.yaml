id: GEN.26.12
reference: Genesis 26:12
source:
  edition: WLC
  text: וַ/יִּזְרַ֤ע יִצְחָק֙ בָּ/אָ֣רֶץ הַ/הִ֔וא וַ/יִּמְצָ֛א בַּ/שָּׁנָ֥ה הַ/הִ֖וא מֵאָ֣ה שְׁעָרִ֑ים וַֽ/יְבָרֲכֵ֖/הוּ יְהוָֽה׃
translation:
  text: Isaac sowed in that land[a], and in that year he found a hundredfold, and Yahweh blessed him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'he found/obtained a hundred measures'; the Hebrew literally says 'he found a hundred שְׁעָרִים,' an idiom for exceptionally abundant yield.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּזְרַע
  chosen: sowed
  alternatives:
  - planted
  lexicon: HALOT
  rationale: The verb זרע in agricultural context means to sow seed. 'Sowed' is the most direct English equivalent and preserves the farming imagery better than the broader 'planted'.
- source_word: בָּאָרֶץ הַהִוא
  chosen: in that land
  alternatives:
  - in that country
  lexicon: HALOT
  rationale: אֶרֶץ can mean 'land' or 'country.' Here 'land' is slightly more literal and fits the immediate territorial setting without overstating political sense.
- source_word: וַיִּמְצָא
  chosen: he reaped
  alternatives:
  - he found
  - he obtained
  - he got
  lexicon: HALOT
  rationale: Although the basic sense of מצא is 'find,' in this harvest context with the object 'a hundred שערים' it idiomatically refers to obtaining produce from the field. 'He reaped' communicates the agricultural result naturally in English while staying close to the contextual sense.
- source_word: בַּשָּׁנָה הַהִוא
  chosen: in that year
  alternatives:
  - that same year
  lexicon: HALOT
  rationale: A straightforward temporal phrase. 'In that year' is clear and formally close to the Hebrew.
- source_word: מֵאָה שְׁעָרִים
  chosen: a hundredfold
  alternatives:
  - a hundred measures
  - a hundred times as much
  lexicon: HALOT
  rationale: שְׁעָרִים here is an agricultural yield expression traditionally understood as a measure of return on seed sown. 'A hundredfold' is idiomatic English for crop yield and best conveys the sense without forcing a specific ancient unit.
- source_word: וַיְבָרֲכֵהוּ
  chosen: blessed him
  alternatives:
  - prospered him
  lexicon: HALOT
  rationale: ברך is the standard verb 'bless.' Since the verse explicitly attributes Isaac's prosperity to divine blessing, 'blessed him' preserves the theological wording rather than reducing it to mere material success.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
