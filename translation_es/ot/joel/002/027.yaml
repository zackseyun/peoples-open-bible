translation:
  language: es
  text: Entonces sabrán que yo estoy en medio de Israel, y que yo soy Yahvé su Dios, y no hay otro; y mi pueblo no volverá a ser avergonzado[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más literalmente: «mi pueblo no será avergonzado para siempre».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וִידַעְתֶּם
  english_pob_choice: Then you will know
  chosen_spanish: Entonces sabrán
  alternatives_spanish:
  - Y sabrán
  - Y conocerán
  lexicon: HALOT
  rationale: En discurso profético, la forma con prefijo y contexto de restauración expresa resultado futuro. «Entonces» conserva la fuerza consecuente de la promesa sin volverla más interpretativa de lo necesario.
- source_word: בְּקֶרֶב
  english_pob_choice: in the midst of
  chosen_spanish: en medio de
  alternatives_spanish:
  - en medio de
  - en el centro de
  - entre
  lexicon: HALOT
  rationale: «En medio de» comunica bien la presencia inmanente y relacional del hebreo. Es más natural en español que «en el centro de» y mantiene el matiz de presencia real entre su pueblo.
- source_word: יִשְׂרָאֵל
  english_pob_choice: Israel
  chosen_spanish: Israel
  alternatives_spanish:
  - Israel
  lexicon: HALOT
  rationale: Nombre propio sin adaptación.
- source_word: אָ֔נִי
  english_pob_choice: I am
  chosen_spanish: yo estoy
  alternatives_spanish:
  - yo soy
  - yo estoy
  lexicon: HALOT
  rationale: El hebreo usa pronombre enfático con valor copulativo; en español, «yo estoy» enlaza naturalmente con «en medio de» y evita una repetición torpe.
- source_word: יְהוָ֥ה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahvé
  - Yahveh
  lexicon: HALOT
  rationale: Se conserva el nombre divino explícito, conforme al criterio POB. «Yahvé» es la forma estándar de esta línea editorial en español y corresponde al Tetragrámaton.
- source_word: אֱלֹהֵי/כֶ֖ם
  english_pob_choice: your God
  chosen_spanish: su Dios
  alternatives_spanish:
  - su Dios
  - vuestro Dios
  lexicon: HALOT
  rationale: El sufijo 2mp exige segunda persona plural. En español bíblico contemporáneo, «su Dios» evita el arcaísmo de «vuestro» y se entiende como tratamiento plural reverente/neutral según el contexto litúrgico del texto.
- source_word: וְאֵין עוֹד
  english_pob_choice: and there is no other
  chosen_spanish: y no hay otro
  alternatives_spanish:
  - y no hay otro
  - y no existe otro
  - y no hay nadie más
  lexicon: HALOT
  rationale: La fórmula afirma exclusividad de Yahvé. «No hay otro» reproduce con concisión la negación absoluta del hebreo sin añadir explícitos innecesarios.
- source_word: וְלֹא יֵבֹשׁוּ
  english_pob_choice: will never again be put to shame
  chosen_spanish: nunca más será avergonzado
  alternatives_spanish:
  - nunca más serán avergonzados
  - no volverán a ser avergonzados
  - nunca serán avergonzados
  lexicon: HALOT
  rationale: El verbo puede significar «avergonzarse» o «ser avergonzado/puesto en vergüenza». En este contexto de restauración, «ser avergonzado» expresa la vergüenza pública removida. Se mantiene el valor futuro irrepetible con «nunca más».
- source_word: עַמִּי
  english_pob_choice: my people
  chosen_spanish: mi pueblo
  alternatives_spanish:
  - mi pueblo
  lexicon: HALOT
  rationale: Expresión pactual directa con sufijo de primera persona.
- source_word: לְעוֹלָם
  english_pob_choice: forever / never again
  chosen_spanish: nunca más
  alternatives_spanish:
  - para siempre
  - eternamente
  - nunca más
  lexicon: HALOT
  rationale: Aunque el sentido literal es «para siempre», en español el enlace con la negación anterior se expresa con naturalidad como «nunca más», preservando la fuerza de permanencia del cambio prometido. La alternativa más literal queda reflejada en la nota.
theological_decisions:
- issue: Nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahvé
  - Yahveh
  rationale: El texto hebreo usa el nombre propio del pacto, no un título sustituido. Mantener «Yahvé» preserva la distinción teológica y sigue el criterio editorial POB de no ocultar el Tetragrámaton.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Afirmación de exclusividad וְאֵין עוֹד
  english_pob_reading: and there is no other
  chosen_spanish_reading: y no hay otro
  alternative_spanish_readings:
  - y no existe otro
  - y no hay nadie más
  rationale: La frase afirma la unicidad de Yahvé como Dios de Israel sin expandirse a formulaciones posteriores. «No hay otro» conserva el alcance monoteísta y covenantal del hebreo.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #1 and #3'
- issue: Promesa de ausencia de vergüenza לֹא יֵבֹשׁוּ עַמִּי לְעוֹלָם
  english_pob_reading: my people will never again be put to shame
  chosen_spanish_reading: mi pueblo nunca más será avergonzado
  alternative_spanish_readings:
  - mi pueblo nunca más será avergonzado
  - mi pueblo nunca será avergonzado
  - mi pueblo no volverá a ser avergonzado
  rationale: La expresión describe reversión permanente de deshonra pública. «Ser avergonzado» mantiene el matiz de vergüenza social/vindicación mejor que un simple «avergonzarse», y «nunca más» transmite la duración escatológica del compromiso.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #6'
translation_notes:
  revision_awareness: El pasaje mostró acuerdo alto y quedó sin cambios en la última revisión; la redacción española sigue de cerca la lectura final inglesa, ajustando solo la naturalidad sintáctica del español y preservando las decisiones teológicas sobre el nombre divino y la promesa de no-vergüenza.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como forma estándar para יהוה, coherente con el proyecto.
  - Se evita «Señor» como sustituto del nombre divino.
  - «Nunca más» se usa para reflejar la fuerza de לְעוֹלָם en contexto de restauración, con la nota que conserva la literalidad alternativa.
  - La cláusula «yo estoy en medio de Israel» conserva la presencia inmanente del hebreo sin perder fluidez en español.
