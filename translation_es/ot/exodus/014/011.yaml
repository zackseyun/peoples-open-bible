    text: 'O, más formalmente: «¿Fue por falta de sepulcros en Egipto que nos llevaste para morir en el desierto?»'
    reason: lexical_alternative
  revision_rationale: 'Se hace una reparación menor de estilo y fidelidad funcional: «nos llevaste» comunica mejor en español el traslado implícito en לְקַחְתָּנוּ, evita una frase rígida («nos tomaste») y mantiene la distinción con לְהוֹצִיאָנוּ, que sigue traduciéndose como «sacarnos». No se requieren cambios doctrinales ni estructurales adicionales.'
