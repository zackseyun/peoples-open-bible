revisions:
- from: 'Y él dijo[a]: «Ve». Así la despachó por dos meses; y ella fue, ella y sus compañeras, y lloró por su virginidad en los montes.'
  to: 'Y él dijo[a]: «Ve». Así la dejó ir por dos meses; y ella fue, ella y sus compañeras, y lloró por su virginidad en los montes.'
  rationale: Se ajusta «la despachó» a «la dejó ir» para reflejar con más precisión el permiso de partida temporal sin connotación de rechazo. Se corrige la nota para que contenga alternativas léxicas reales y preserve mejor el expediente inglés sobre el objeto explícito del lamento. No se requiere adjudicación adicional porque el sentido fuente es claro y la reparación es menor.
