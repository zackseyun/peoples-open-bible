  to: Y con el pan[a] presentarás siete corderos machos de un año, sin defecto, y un toro del ganado, y dos carneros; serán holocausto para Yahvé, con su ofrenda de cereal y sus libaciones, ofrenda por fuego[b], de aroma agradable para Yahvé.
