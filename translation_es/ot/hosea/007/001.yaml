- from: Cuando yo quisiera sanar a Israel[a], se descubre la iniquidad de Efraín y las maldades de Samaria; porque practican la falsedad. Entra un ladrón; una banda saquea afuera.
  to: Cuando yo sanaba a Israel[a], se descubre la iniquidad de Efraín y las maldades de Samaria; porque practican la falsedad.[b] Entra un ladrón; una banda saquea fuera.[c]
  rationale: Se reemplaza «Cuando yo quisiera sanar» por «Cuando yo sanaba» para evitar una lectura hipotética o volitiva no presente en el hebreo y para reflejar mejor el marco temporal permitido y documentado por la auditoría inglesa. También se añaden las notas léxicas alternativas preservadas por la POB inglesa para esta cláusula y para la imagen final. «Fuera» mejora el registro sin cambiar el sentido.
