translation:
  language: es
  text: Tenía rebaños, ganado vacuno y una casa numerosa[a], y los filisteos le envidiaban[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «y abundante servicio/trabajo»; la expresión probablemente alude a una casa con gran número de personas a su servicio o dependencia.'
    reason: lexical_alternative
  - marker: b
    text: O «le tenían celos».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְהִי לוֹ
  english_pob_choice: He had
  chosen_spanish: Tenía
  alternatives_spanish:
  - Y tenía
  - Y le había
  lexicon: HALOT
  rationale: La construcción hebrea de היה con ל expresa posesión o pertenencia; en español, «tenía» comunica de manera natural ese sentido posesivo sin sobrecargar la frase con una calca.
- source_word: מִקְנֵה צֹאן
  english_pob_choice: flocks
  chosen_spanish: flocks
  alternatives_spanish:
  - rebaños
  - ganado menor
  - ovejas y cabras
  lexicon: HALOT
  rationale: «מִקְנֶה» con צֹאן denota ganado pequeño adquirido o poseído. Mantengo «flocks» en el texto por coherencia con el encargo de un solo registro, pero la opción equivalente en español es «rebaños»; se entiende como ganado menor, especialmente ovejas y cabras.
- source_word: וּמִקְנֵה בָקָר
  english_pob_choice: herds
  chosen_spanish: rebaños
  alternatives_spanish:
  - manadas
  - ganado vacuno
  - hatos
  lexicon: HALOT
  rationale: Con בָקָר el sentido es ganado bovino. «Rebaños» acompasa el paralelismo con el primer miembro y expresa bien la idea colectiva; otras opciones como «ganado vacuno» son más explicativas pero menos fluidas.
- source_word: וַעֲבֻדָּה רַבָּה
  english_pob_choice: a large household
  chosen_spanish: una casa numerosa
  alternatives_spanish:
  - mucho servicio
  - gran cantidad de servidores
  - gran hogar
  lexicon: HALOT
  rationale: La frase hebrea puede apuntar a una masa de servicio/trabajo o al conjunto de personas dependientes de la casa. Sigo la revisión inglesa «a large household» y elijo «una casa numerosa» para conservar la referencia concreta al entorno doméstico y laboral sin reducirla solo a «servidores».
- source_word: וַיְקַנְאוּ אֹתוֹ
  english_pob_choice: envied him
  chosen_spanish: le envidiaron
  alternatives_spanish:
  - fueron celosos de él
  - lo celaron
  lexicon: HALOT
  rationale: קנא en este contexto expresa envidia dirigida hacia Isaac por su prosperidad. «Le envidiaron» es la equivalencia más natural y mantiene la dirección del dativo/objeto implícito del hebreo.
- source_word: פְּלִשְׁתִּים
  english_pob_choice: the Philistines
  chosen_spanish: los filisteos
  alternatives_spanish:
  - los pǝlishtim
  - los filisteos
  lexicon: HALOT
  rationale: Nombre étnico estándar en español bíblico moderno; «los filisteos» es claro y fiel al grupo designado por el hebreo.
theological_decisions:
- issue: Sentido de עֲבֻדָּה רַבָּה
  english_pob_reading: a large household
  chosen_spanish_reading: una casa numerosa
  alternative_spanish_readings:
  - mucho servicio
  - gran cantidad de servidores
  - mucha labor
  rationale: No conviene fijar el término solo en «servidores», porque el hebreo puede abarcar el conjunto de personal y dependencia de la casa, y la revisión inglesa optó por una formulación más amplia. «Casa numerosa» preserva esa amplitud socioeconómica sin introducir una interpretación más estrecha.
  doctrine_reference: No aplica; decisión léxica y sociohistórica, no doctrinal.
translation_notes:
  revision_awareness: La versión inglesa revisada cambió «many servants» por «a large household» para reflejar mejor עֲבֻדָּה רַבָּה como un conjunto amplio de servicio/trabajo o dependencia doméstica. La versión española sigue esa revisión y evita reducir el término a «sirvientes» exclusivamente.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como forma normal para el nombre divino cuando aparezca; en este versículo no aplica.
  - Se conserva el paralelismo de bienes materiales seguido de la reacción de los filisteos.
  - Se evita «celos» en favor de «envidia» porque el hebreo קנא aquí apunta a rivalidad motivada por prosperidad.
  - «Casa numerosa» intenta sostener la amplitud semántica de עֲבֻדָּה sin forzar un tecnicismo.
