    rationale: En este mandato militar, junto con «a todos sus varones» y «con el filo de la espada», el verbo implica dar muerte, no meramente herir. «Herirás» introduce ambigüedad no presente en el original.
  revised_spanish_text: Yahvé tu Dios lo entregará en tu mano[a], y matarás a todos sus varones con el filo de la espada.
