revisions:
- from: Pero tú, ponte[a] aquí conmigo, y yo te hablaré todo el mandamiento y los estatutos y los juicios que tú les enseñarás, para que ellos los hagan en la tierra que yo les doy para poseerla[b].
  to: Pero tú, quédate de pie[a] aquí conmigo, y yo te hablaré todo el mandamiento y los estatutos y los juicios que tú les enseñarás, para que ellos los hagan en la tierra que yo les doy para poseerla[b].
  rationale: Se ajusta עֲמֹד para conservar la postura concreta de estar de pie en presencia de Dios, y se enfoca la nota [b] en las alternativas léxicas documentadas para לְרִשְׁתָּהּ. El resto del borrador puede mantenerse porque refleja bien la sintaxis, la tríada legal y el singular de "mandamiento".
