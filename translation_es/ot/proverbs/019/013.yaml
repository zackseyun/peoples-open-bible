review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el sentido general del hebreo: un hijo necio trae ruina/calamidad al padre y las disputas de la esposa se comparan con un goteo persistente. Sin embargo, «son como un goteo continuo» añade «como», que no está en el texto y debilita la identificación metafórica directa. Además, «para su padre» es aceptable, pero «de su padre» suena más natural con «ruina» en español.'
  spanish_quality_summary: El español es claro y legible, pero puede mejorarse para mayor naturalidad y precisión proverbial. «Las contiendas de una esposa son como un goteo continuo» resulta algo menos idiomático que «las contiendas de una esposa son un goteo continuo». También conviene ajustar la nota para mantener la alternativa inglesa «contentions ... a constant dripping» sin comillas innecesarias ni formulación torpe.
  glossary_alignment: 'No hay conflictos con la terminología doctrinal del proyecto. «Insensato»/«necio» para כְּסִיל y «esposa» para אִשָּׁה encajan bien. «Contiendas» es una opción válida para מִדְיְנֵי, aunque menos natural que «pleitos»; no requiere cambio. La principal corrección es estilístico-semántica: preservar la metáfora nominal directa del hebreo.'
  issues:
  - severity: medium
    issue: Se añade «como» en la segunda mitad.
    rationale: 'El hebreo presenta una ecuación metafórica directa: «y las contiendas de una esposa [son] un goteo continuo», no una comparación explícita con «como».'
  - severity: low
    issue: «Ruina para su padre» suena menos natural que «ruina de su padre».
    rationale: La relación de perjuicio expresada por לְ puede verterse en español con una construcción más idiomática después de «ruina», sin pérdida del sentido.
  - severity: low
    issue: La nota alternativa puede pulirse.
    rationale: 'Conviene mantener una formulación española más natural y consistente con la revisión principal: «una gotera constante» o «un goteo constante».'
  revised_spanish_text: El hijo insensato es la ruina de su padre[a], y las contiendas de una esposa son un goteo continuo.
  revised_footnotes:
  - marker: a
    text: 'O: «El hijo insensato es calamidad para su padre, y las contiendas de una esposa son una gotera constante»'
    reason: lexical_alternative
