translation:
  language: es
  text: jefes de las naciones en sus planes, y gobernantes en su discernimiento[a]; sabios en el discurso en sus escritos[b], y gobernantes en sus guardias.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El paralelo griego se aparta algo del hebreo en la segunda frase, al poner el acento en un entendimiento vinculado con la administración de escribas del pueblo. La traducción sigue el hebreo como testigo principal, manteniendo a la vista el griego.
    reason: alternative_reading
  - marker: b
    text: 'El hebreo de los testigos de Kahana difiere ligeramente en esta tercera frase: el texto de la Geniza de El Cairo lee ''en su escritura/escritos'', mientras que el rollo de Masada apoya una lectura estrechamente relacionada, ''en sus libros''. Ambas apuntan a una sabiduría escrita o literaria.'
    reason: textual_variant
lexical_decisions:
- source_word: שרי גוים
  english_pob_choice: leaders of nations
  chosen_spanish: jefes de las naciones
  alternatives_spanish:
  - líderes de las naciones
  - príncipes de las naciones
  - jefes de los pueblos
  lexicon: HALOT
  rationale: שׂרים designa funcionarios principales, jefes o príncipes; en español, 'jefes' conserva el valor de autoridad sin sonar demasiado monárquico. גוים se vierte mejor como 'naciones' para mantener el alcance político amplio del hebreo y del paralelo griego.
- source_word: במזמתם
  english_pob_choice: in their planning
  chosen_spanish: en su planificación
  alternatives_spanish:
  - en su consejo
  - en su estrategia
  - en sus planes
  lexicon: HALOT
  rationale: מזמה puede implicar plan, consejo o designio. En este elogio, 'planificación' comunica una actividad deliberada y ordenada, en línea con el sentido positivo-neutral del hebreo y con el griego ἐν διαβουλίοις ('en deliberaciones').
- source_word: ורוזנים
  english_pob_choice: and rulers
  chosen_spanish: y gobernantes
  alternatives_spanish:
  - y nobles
  - y dignatarios
  - y magistrados
  lexicon: HALOT
  rationale: רוזנים alude a altos oficiales o potentados. 'Gobernantes' conserva el matiz de autoridad pública y evita repetir 'jefes' de manera innecesaria.
- source_word: במחקרותם
  english_pob_choice: in their understanding
  chosen_spanish: en su discernimiento
  alternatives_spanish:
  - en su entendimiento
  - en su investigación
  - en su sabiduría
  lexicon: HALOT
  rationale: El hebreo sugiere búsqueda/investigación, pero el contexto y la revisión inglesa reciente favorecen una idea de discernimiento o comprensión administrativa. 'Discernimiento' permite mantener la cualidad intelectual sin reducir el término a actividad investigativa literal.
- source_word: חכמי שיח
  english_pob_choice: wise in discourse
  chosen_spanish: sabios en el discurso
  alternatives_spanish:
  - sabios en la palabra
  - sabios al hablar
  - sagaces en la conversación
  lexicon: HALOT
  rationale: La expresión hebrea significa literalmente 'sabios de discurso/speech'. 'Sabios en el discurso' es una formulación digna y transparente que preserva el énfasis en la habilidad verbal o deliberativa.
- source_word: בספרתם
  english_pob_choice: in their writings
  chosen_spanish: en sus escritos
  alternatives_spanish:
  - en sus libros
  - en su escritura
  - por medio de sus escritos
  lexicon: HALOT
  rationale: El hebreo apunta a actividad literaria o scribal; la variante en la tradición de Masada y el paralelo griego apoyan esa dirección. 'Escritos' es natural en español y conserva el vínculo con la producción textual.
- source_word: ומושלים
  english_pob_choice: and governors
  chosen_spanish: y administradores
  alternatives_spanish:
  - y gobernadores
  - y regidores
  - y quienes gobiernan
  lexicon: HALOT
  rationale: El participio de משל expresa ejercicio de gobierno. 'Administradores' amplía el matiz funcional y evita duplicar 'gobernantes', aunque conserva la idea de autoridad institucional.
- source_word: במשמרותם
  english_pob_choice: in their watches
  chosen_spanish: en sus guardias
  alternatives_spanish:
  - en sus turnos
  - en sus cargos
  - en sus vigilias
  lexicon: HALOT
  rationale: משמרת puede significar guardia, turno de servicio o cargo asignado. 'Guardias' retiene la imagen concreta del servicio/turno y deja abierta la lectura administrativa o militar.
theological_decisions:
- issue: Relación entre el hebreo y el paralelo griego en la segunda mitad del verso
  english_pob_reading: The translation follows the Hebrew as the primary witness here while keeping the Greek in view.
  chosen_spanish_reading: Se sigue principalmente el hebreo, pero sin ignorar el matiz del griego sobre discernimiento y administración letrada.
  alternative_spanish_readings:
  - Seguir únicamente el hebreo sin referencia al griego.
  - Ajustar el verso al griego y hablar de la administración letrada del pueblo.
  rationale: No hay una tensión doctrinal, pero sí textual y semántica. El hebreo habla de busca/entendimiento y de escritos; el griego introduce una formulación distinta sobre la sabiduría administrativa y la γραμματεία del pueblo. La redacción española conserva el sentido hebreo principal y permite percibir el trasfondo del paralelo griego sin fusionarlo artificialmente.
  doctrine_reference: Textual criticism / source pluralism in deuterocanonical translation
- issue: Valor de términos de liderazgo y servicio en un poema sapiencial
  english_pob_reading: leaders... rulers... governors
  chosen_spanish_reading: jefes... gobernantes... administradores
  alternative_spanish_readings:
  - líderes... rulers... gobernadores
  - príncipes... nobles... gobernadores
  rationale: El verso enumera cargos de autoridad en una poesía de elogio. En español, 'jefes', 'gobernantes' y 'administradores' permiten distinguir funciones sin forzar una jerarquía eclesiástica ajena al texto. Se evita introducir vocabulario de tradición religiosa que no está sustentado por el hebreo.
  doctrine_reference: Lexical sobriety; no ecclesial recontextualization
translation_notes:
  revision_awareness: La redacción revisa el valor de במחקרותם a 'discernimiento' para reflejar mejor la comprensión que la simple actividad investigativa, en armonía con la revisión inglesa más reciente. También opta por 'en sus escritos' para בספרתם, siguiendo la corrección del audit trail inglés que prefirió una formulación más directa y formal. El resto conserva la estructura enumerativa y el paralelismo del versículo.
  spanish_consistency_notes:
  - Se mantiene un registro formal y bíblico, pero con español moderno y claro.
  - No se emplea 'SEÑOR' ni terminología eclesial anacrónica, porque el verso no contiene el Tetragrámaton ni un título cristológico.
  - '''Escritos'' y ''guardias'' se eligen como soluciones de amplitud semántica, dejando abiertas las lecturas de libro/registro y guardia/turno de servicio.'
  - La puntuación conserva el paralelismo poético con dos miembros principales y una segunda pareja coordinada.
