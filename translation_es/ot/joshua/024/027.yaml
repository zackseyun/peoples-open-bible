revisions:
- from: 'Entonces Josué dijo a todo el pueblo: «Miren, esta piedra será entre nosotros un testigo[a], porque ella oyó todas las palabras de Yahvé que él habló con nosotros. Y será entre ustedes un testigo, para que no nieguen a su Dios[c][b]».'
  to: 'Entonces Josué dijo a todo el pueblo: «Miren, esta piedra será testigo contra nosotros[a], porque ella oyó todas las palabras de Yahvé que él habló con nosotros. Y será testigo contra ustedes, no sea que nieguen a su Dios[c][b]».'
  rationale: 'La revisión alinea el español con la decisión léxica y teológica ya documentada por el POB: la piedra actúa como testigo adversativo en un contexto de pacto, por lo que «contra nosotros / contra ustedes» es más fiel al sentido y mucho más natural en español que «entre nosotros / entre ustedes». También se ajusta פֶּן con «no sea que» para reflejar mejor la advertencia preventiva del hebreo.'
  reviewer_model: gpt-5.4
