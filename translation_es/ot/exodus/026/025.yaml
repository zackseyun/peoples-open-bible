translation:
  language: es
  text: 'Habrá ocho tablones[a], con sus bases de plata: dieciséis bases[b], dos bases debajo de un tablón y dos bases debajo del otro tablón.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «tablas». El hebreo se refiere aquí a los elementos estructurales verticales del tabernáculo.
    reason: lexical_alternative
  - marker: b
    text: O «zócalos» para «bases».
    reason: lexical_alternative
lexical_decisions:
- source_word: קְרָשִׁים
  english_pob_choice: frames
  chosen_spanish: marcos
  alternatives_spanish:
  - tablas
  - tablones
  lexicon: HALOT
  rationale: En este contexto de construcción del tabernáculo, el término designa los elementos estructurales verticales. «Marcos» comunica bien su función arquitectónica en español actual sin limitarlo a la imagen tradicional de «tablas».
- source_word: אַדְנֵי/הֶם ... אֲדָנִים
  english_pob_choice: bases
  chosen_spanish: bases
  alternatives_spanish:
  - zócalos
  - encajes
  - zócalos de apoyo
  lexicon: HALOT
  rationale: El hebreo se refiere a los soportes bajo los marcos. «Bases» mantiene el sentido estructural y coincide con la decisión auditada en inglés; «zócalos» o «encajes» suenan más específicos o menos naturales aquí.
- source_word: כֶּסֶף
  english_pob_choice: silver
  chosen_spanish: plata
  alternatives_spanish:
  - de plata
  - plateadas
  lexicon: HALOT
  rationale: La construcción hebrea indica material. En español, «de plata» es la formulación más natural para este tipo de inventario técnico; «plata» en aposición también sería posible, pero suena menos fluido.
- source_word: שִׁשָּׁה עָשָׂר
  english_pob_choice: sixteen
  chosen_spanish: dieciséis
  alternatives_spanish:
  - '16'
  lexicon: HALOT
  rationale: Número cardinal estándar en español, sin necesidad de conservar la forma analítica.
- source_word: תַּחַת
  english_pob_choice: under
  chosen_spanish: debajo de
  alternatives_spanish:
  - bajo
  - debajo
  lexicon: HALOT
  rationale: «Debajo de» expresa con claridad la relación espacial de soporte en una instrucción de montaje. «Bajo» sería más breve, pero aquí menos transparente.
- source_word: הַקֶּרֶשׁ הָאֶחָד
  english_pob_choice: one frame / the other frame
  chosen_spanish: un marco / el otro marco
  alternatives_spanish:
  - el primer marco / el segundo marco
  - un marco / el siguiente marco
  lexicon: HALOT
  rationale: El hebreo distribuye dos bases por cada uno de dos marcos, sin introducir secuencia. «El otro marco» reproduce mejor esa distribución que «el siguiente», que sugeriría orden temporal o posicional no presente en el original.
- source_word: וְהָיוּ
  english_pob_choice: There shall be
  chosen_spanish: Habrá
  alternatives_spanish:
  - Y habrá
  - Y serán
  lexicon: HALOT
  rationale: En español, la forma existencial «Habrá» suena natural en este tipo de especificación técnica. El valor conjuntivo inicial no requiere repetirse si la cláusula funciona como enunciado de inventario.
translation_notes:
  revision_awareness: El texto inglés auditado pasó de «the next frame» a «the other frame» para evitar una idea de secuencia. La redacción española sigue esa revisión con «el otro marco», manteniendo la distribución hebrea sin sugerir orden temporal.
  spanish_consistency_notes:
  - Se mantiene «marcos» para קְרָשִׁים en coherencia con la decisión del inglés auditado de usar un término arquitectónico funcional.
  - Se conserva «bases» para אֲדָנִים, evitando sustituciones tradicionales que oculten la imagen constructiva del texto.
  - «Habrá» adapta la fórmula existencial de inventario a un español natural sin añadir contenido.
  - No se introduce «SEÑOR» ni otros equivalentes cultuales, porque el versículo no contiene el Tetragrámaton ni lenguaje divino explícito.
