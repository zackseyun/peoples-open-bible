    issue: La nota al pie [a] está en inglés, no en español.
    rationale: Las notas del registro español deben estar en español y ser aptas para publicación; además, el contenido duplica parcialmente [b], por lo que conviene armonizarla.
  - severity: medium
    issue: «No solo salir en campaña» no expresa con suficiente claridad el matiz de μὴ στρατεύεσθαι como «no meramente hacer campaña».
    rationale: El griego, según la auditoría inglesa, no niega la acción militar sino que contrasta una campaña ordinaria con una ofensiva decisiva. En español, la formulación actual puede sonar como simple adición («no solo X sino Y») sin transmitir bien el sentido de «no limitarse a».
  - severity: low
    issue: «Tan nobles» es menos natural que «muy nobles» en este contexto.
    rationale: No es un error de fidelidad, pero «muy nobles» fluye mejor en español eclesial general.
