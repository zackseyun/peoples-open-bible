translation:
  language: es
  text: 'Pero el tirano interrumpió y dijo[a]: «Jóvenes, teman, y la justicia[b] que ustedes reverencian les mostrará misericordia si, bajo compulsión, quebrantan la ley».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «tomó la palabra». El griego ὑπολαβών puede indicar que el tirano intervino o respondió abruptamente en el diálogo.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «la pena / el juicio que ustedes reverencian les será favorable». El griego δίκη puede significar justicia, juicio o pena.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ὑπολαβών
  english_pob_choice: interrupted
  chosen_spanish: interrumpió
  alternatives_spanish:
  - tomó la palabra
  - respondió
  lexicon: LSJ
  rationale: En contexto narrativo-dialogal, el verbo introduce al tirano tomando la palabra de manera abrupta. «Interrumpió» conserva ese matiz de corte en la conversación y sigue de cerca la decisión auditada en inglés.
- source_word: τύραννος
  english_pob_choice: tyrant
  chosen_spanish: tirano
  alternatives_spanish:
  - rey
  - gobernante
  lexicon: LSJ
  rationale: El término es valorativo y no neutral. «Tirano» mantiene la caracterización moral negativa del original y del POB inglés.
- source_word: Μειράκια
  english_pob_choice: Young men
  chosen_spanish: Jóvenes
  alternatives_spanish:
  - muchachos
  - jóvenes varones
  lexicon: LSJ
  rationale: Es un vocativo dirigido a los hermanos en su condición de jóvenes. «Jóvenes» es natural en español y evita la posible connotación infantil de opciones como «muchachos» en algunos registros.
- source_word: φοβήθητε
  english_pob_choice: be afraid
  chosen_spanish: teman
  alternatives_spanish:
  - tengan miedo
  - tengan temor
  lexicon: LSJ
  rationale: El imperativo exhortativo puede expresarse en español con «teman», que conserva fuerza directa y solemne. También permite cierta amplitud entre miedo y temor reverente, sin añadir explicación ajena al texto.
- source_word: δίκην
  english_pob_choice: justice
  chosen_spanish: justicia
  alternatives_spanish:
  - pena
  - juicio
  - castigo
  lexicon: LSJ
  rationale: Aunque δίκη puede significar pena o juicio, el contexto de «la que reverencian» favorece una realidad moral o jurídica reverenciada. «Justicia» preserva esa tensión y sigue la lectura auditada del POB inglés.
- source_word: σέβεσθε
  english_pob_choice: you revere
  chosen_spanish: reverencian
  alternatives_spanish:
  - veneran
  - honran
  lexicon: LSJ
  rationale: El verbo expresa respeto reverente, no simple admiración. «Reverencian» mantiene el tono religioso-moral del griego y se ajusta al español eclesial contemporáneo.
- source_word: ἵλεως
  english_pob_choice: merciful
  chosen_spanish: favorable
  alternatives_spanish:
  - misericordiosa
  - benigna
  - propicia
  lexicon: LSJ
  rationale: Aunque el inglés POB usa «merciful», en español «favorable» comunica mejor la idea de disposición benigna sin forzar un atributo personal que recae sobre «la justicia». Además mantiene abierta la ambigüedad semántica de ἵλεως, tal como la nota inglesa lo permite.
- source_word: διʼ ἀνάγκην
  english_pob_choice: under compulsion
  chosen_spanish: bajo compulsión
  alternatives_spanish:
  - por necesidad
  - a causa de la fuerza
  lexicon: LSJ
  rationale: La frase explica que la transgresión ocurre bajo presión externa. «Bajo compulsión» es preciso y conserva la fuerza coercitiva del griego con un registro natural en español.
- source_word: παρανομήσασιν
  english_pob_choice: you break the law
  chosen_spanish: quebrantan la ley
  alternatives_spanish:
  - transgreden la ley
  - obran contra la ley
  lexicon: LSJ
  rationale: El participio de παρανομέω expresa actuar contra la ley. «Quebrantan la ley» es idiomático, claro y conserva el sentido jurídico-moral del original.
theological_decisions:
- issue: Sentido de δίκη en la apelación del tirano
  english_pob_reading: Rendered as 'justice' rather than 'penalty' or 'vengeance.'
  chosen_spanish_reading: Se traduce como «justicia» y se deja abierta la posibilidad de una lectura alternativa de «pena/juicio» en nota.
  alternative_spanish_readings:
  - pena
  - juicio
  - castigo
  - venganza
  rationale: El sintagma con σέβεσθε sugiere un objeto de reverencia, no solo una sanción temida. «Justicia» conserva el peso moral del término sin resolver en exceso la ambigüedad del griego, y la nota preserva la alternativa semántica documentada.
  doctrine_reference: Preservar la tensión léxica sin cerrar interpretaciones; consistencia terminológica con el POB inglés.
translation_notes:
  revision_awareness: 'Se siguió el estado más reciente del archivo: no hubo cambios en la pasada de revisión más reciente y el texto inglés final mantiene la decisión de traducir δίκη como ''justice'' con nota de alternativa.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma general del proyecto cuando el texto lo requiera; en este versículo no aparece el nombre divino.
  - Se preserva «tirano» como término evaluativo, en consonancia con la lectura auditada del POB inglés.
  - Se evitó «SEÑOR» como sustitución automática, porque el pasaje no contiene κύριος ni una alusión directa al nombre divino.
