review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien el sentido general del hebreo y sigue el rastro del POB inglés en puntos clave: «Yahvé», «de delante de ustedes», y el modismo final explicado por nota. Sin embargo, en la cláusula «לֹא עָמַד אִישׁ בִּפְנֵיכֶם» el texto principal se aleja innecesariamente de la forma fuente y del POB auditado al introducir «ha podido» y «mantenerse en pie», que explican el modismo dentro del texto en vez de preservarlo y dejar la explicación a la nota. También la nota b cita como “Hebreo” una formulación ya interpretativa, no la más cercana al original.'
  spanish_quality_summary: 'El español es claro, natural y digno. «Porque Yahvé ha expulsado de delante de ustedes a naciones grandes y poderosas» suena bien y es fiel. La secuencia «y en cuanto a ustedes» es aceptable para el énfasis contrastivo. La principal mejora necesaria es devolver al texto una formulación más cercana al idiomatismo hebreo: «ni un hombre se ha mantenido firme delante de ustedes» o similar. Eso preserva mejor la fuerza literaria y evita sobreexplicar en el cuerpo del versículo.'
  glossary_alignment: 'Buena alineación con la terminología del proyecto: יְהוָה → «Yahvé» correctamente; ירשׁ → «ha expulsado» es defendible y coincide con la decisión inglesa principal; no hay conflictos con términos doctrinales mayores. La única desalineación relevante es metodológica: el POB inglés preserva el idiomático «not a man has stood before you» en el texto principal y explica el sentido en nota; el español debería hacer lo mismo.'
  issues:
  - severity: medium
    issue: El texto principal sobreexplica el modismo לֹא עָמַד אִישׁ
    rationale: «nadie ha podido mantenerse en pie» introduce interpretación («ha podido») en lugar de preservar más de cerca el hebreo singular idiomático y la decisión del POB inglés, que mantiene la forma en el texto y la explica en nota.
  - severity: medium
    issue: La nota b no refleja con precisión la forma hebrea citada
    rationale: Presenta como “Hebreo” la frase «nadie ha podido mantenerse en pie delante de ustedes», que ya es una paráfrasis interpretativa. La nota debería citar algo más cercano al original, por ejemplo «ni un hombre ha estado/se ha mantenido firme delante de ustedes», y luego explicar que significa que nadie ha podido resistirles.
  revised_spanish_text: Porque Yahvé ha expulsado de delante de ustedes a naciones grandes y poderosas[a]; y en cuanto a ustedes, ni un hombre[b] se ha mantenido firme delante de ustedes hasta el día de hoy.
  revised_footnotes:
