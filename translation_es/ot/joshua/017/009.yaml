  text: וְ/יָרַ֣ד הַ/גְּבוּל֩ נַ֨חַל קָנָ֜ה נֶ֣גְבָּ/ה לַ/נַּ֗חַל עָרִ֤ים הָ/אֵ֨לֶּה֙ לְ/אֶפְרַ֔יִם בְּ/ת֖וֹךְ עָרֵ֣י מְנַשֶּׁ֑ה וּ/גְב֤וּל מְנַשֶּׁה֙ מִ/צְּפ֣וֹן לַ/נַּ֔חַל וַ/יְהִ֥י תֹצְאֹתָ֖י/ו הַ/יָּֽמָּ/ה׃
base_translation:
  language: en
  yaml_path: translation/ot/joshua/017/009.yaml
  text: Then the border went down to the Brook of Kanah[a], south of the brook. These cities belonged to Ephraim among the cities of Manasseh, and the border of Manasseh was on the north side of the brook[c][b], and its end was at the sea.
  footnotes:
  - marker: a
    text: Or 'Wadi Kanah.' The Hebrew נחל can refer to a seasonal streambed or ravine as well as a brook.
    reason: lexical_alternative
  - marker: b
    text: That is, Ephraim had cities situated within the territory assigned to Manasseh.
    reason: cultural_note
  - marker: c
    text: '''The sea'' here refers to the Mediterranean Sea.'
    reason: cultural_note
