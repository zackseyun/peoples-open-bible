id: 1PE.4.17
reference: 1 Peter 4:17
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: ὅτι ὁ καιρὸς τοῦ ἄρξασθαι τὸ κρίμα ἀπὸ τοῦ οἴκου τοῦ θεοῦ· εἰ δὲ πρῶτον ἀφ’ ἡμῶν, τί τὸ τέλος τῶν ἀπειθούντων τῷ τοῦ θεοῦ εὐαγγελίῳ;
base_translation:
  language: en
  yaml_path: translation/nt/1_peter/004/017.yaml
  text: 'For it is time for judgment to begin from the household of God; and if it begins first from us, what will be the outcome for those who disobey the gospel of God?'
translation:
  language: ko
  text: '심판이 하나님의 집에서부터 시작될 때가 되었기 때문입니다. 그것이 우리에게서 먼저 시작된다면, 하나님의 복음에 순종하지 아니하는 자들의 마지막은 어떻게 되겠습니까?'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ὁ καιρὸς τοῦ ἄρξασθαι τὸ κρίμα
  english_pob_choice: it is time for judgment to begin
  chosen_korean: 심판이 ... 시작될 때가 되었기
  alternatives_korean:
  - 심판이 시작될 시기
  - 심판이 개시될 시점
  lexicon: BDAG
  rationale: 「때가 되었다」는 한국어 자연 표현. καιρός의 결정적 시점을 살린다.
- source_word: τοῦ οἴκου τοῦ θεοῦ
  english_pob_choice: the household of God
  chosen_korean: 하나님의 집
  alternatives_korean:
  - 하나님의 권속
  - 하나님의 가족
  lexicon: BDAG
  rationale: οἶκος는 「집·가속」 둘 다 가능. 「하나님의 집」이 평이하다 (2:5의 οἶκος πνευματικός와 동일 어휘 — 신령한 집/하나님의 집의 연결).
- source_word: τὸ τέλος τῶν ἀπειθούντων
  english_pob_choice: the outcome for those who disobey
  chosen_korean: 순종하지 아니하는 자들의 마지막
  alternatives_korean:
  - 불순종자들의 결국
  lexicon: BDAG
  rationale: 1:9의 τέλος(결국)와 어휘 일관성. 여기서는 「마지막」으로 옮겨 종말적 운명 강조.
- source_word: τῷ τοῦ θεοῦ εὐαγγελίῳ
  english_pob_choice: the gospel of God
  chosen_korean: 하나님의 복음
  alternatives_korean:
  - 하나님의 좋은 소식
  lexicon: BDAG
  rationale: εὐαγγέλιον의 명사형은 한국 성서 전통의 「복음」 사용. 1:12·1:25의 동사 εὐαγγελίζω는 「좋은 소식을 전하다」로 옮긴 것과 명사/동사 구별.
