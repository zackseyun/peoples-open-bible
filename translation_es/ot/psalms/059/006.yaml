translation:
  language: es
  text: Pero tú, Yahvé, Dios de los ejércitos, Dios de Israel, despierta[a] para castigar a todas las naciones; no muestres favor[b] a ningún malhechor traicionero. Selah[c]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O “despierta para visitar / pedir cuentas a todas las naciones”. El verbo hebreo פקד puede significar “visitar”, “atender a” o “castigar”, según el contexto.
    reason: lexical_alternative
  - marker: b
    text: O “no tengas misericordia”. El verbo hebreo חנן significa literalmente “mostrar favor” o “ser gracious”.
    reason: lexical_alternative
  - marker: c
    text: “Selah” probablemente es una indicación musical o litúrgica; su sentido exacto es incierto.
    reason: cultural_note
lexical_decisions:
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  lexicon: Nombre divino tetragramático
  rationale: Se mantiene el nombre propio divino en español, conforme al principio del proyecto de no enmascarar YHWH como 'SEÑOR'. 'Yahvé' es la forma base elegida para el texto principal.
- source_word: אֱלֹהִים צְבָאוֹת
  english_pob_choice: God of hosts
  chosen_spanish: Dios de los ejércitos
  alternatives_spanish:
  - Dios de los ejércitos celestiales
  - Dios de los huestes
  lexicon: HALOT
  rationale: '''צְבָאוֹת'' tiene fuerza de ''ejércitos/huestes''. En español, ''Dios de los ejércitos'' conserva el título tradicional y la amplitud militar/cósmica sin forzar una paráfrasis más interpretativa.'
- source_word: אֱלֹהֵי יִשְׂרָאֵל
  english_pob_choice: God of Israel
  chosen_spanish: Dios de Israel
  alternatives_spanish:
  - el Dios de Israel
  lexicon: Construct chain
  rationale: La cadena constructa se traduce de manera directa y reverente, preservando el título pactual sin añadir explicaciones.
- source_word: הָקִיצָה
  english_pob_choice: awake
  chosen_spanish: despierta
  alternatives_spanish:
  - despiértate
  - despierta y actúa
  - levántate
  lexicon: HALOT
  rationale: '''Despierta'' reproduce el imperativo poético sin sobrecargarlo; en español suena natural como súplica dirigida a Dios. La metáfora de despertar se conserva.'
- source_word: לִפְקֹד
  english_pob_choice: to punish
  chosen_spanish: para castigar
  alternatives_spanish:
  - para visitar
  - para tomar cuenta de
  - para llamar a cuentas
  lexicon: HALOT
  rationale: En este contexto judicial e imprecatorio, 'castigar' expresa la fuerza de פקד con claridad. Se conserva en nota la alternativa de 'visitar/tomar cuenta' para no borrar la amplitud semántica.
- source_word: כָּל הַגּוֹיִם
  english_pob_choice: all the nations
  chosen_spanish: a todas las naciones
  alternatives_spanish:
  - a todos los pueblos
  - a los gentiles
  lexicon: HALOT
  rationale: '''Naciones'' refleja el colectivo político-ético del hebreo en este salmo; evita introducir una distinción religiosa posterior que el texto no explicita.'
- source_word: אַל תָּחֹן
  english_pob_choice: show no favor
  chosen_spanish: no muestres favor
  alternatives_spanish:
  - no tengas misericordia
  - no seas gracioso
  - no concedas gracia
  lexicon: HALOT
  rationale: '''חנן'' significa mostrar favor o ser gracioso. ''No muestres favor'' conserva la relación léxica con la gracia/favor mejor que una equivalencia más interpretativa, y mantiene el tono imprecatorio.'
- source_word: בֹּגְדֵי אָוֶן
  english_pob_choice: treacherous evildoers
  chosen_spanish: los traidores malvados
  alternatives_spanish:
  - los traidores de iniquidad
  - los que obran traicioneramente en maldad
  - los pérfidos malhechores
  lexicon: HALOT
  rationale: '''בֹגְדֵי'' apunta a traición/falta de fidelidad; ''אָוֶן'' a maldad/iniquidad. ''Los traidores malvados'' comunica ambas ideas de forma idiomática en español sin perder la tensión moral y relacional del hebreo.'
- source_word: סֶלָה
  english_pob_choice: Selah
  chosen_spanish: Selah
  lexicon: Tradicional transliteración
  rationale: Se conserva la transliteración porque su función precisa es incierta y el texto fuente la presenta como nota litúrgica o musical.
theological_decisions:
- issue: Alcance de 'כָּל הַגּוֹיִם' en una súplica imprecatoria
  english_pob_reading: all the nations
  chosen_spanish_reading: a todas las naciones
  alternative_spanish_readings:
  - a todos los pueblos
  - a los gentiles
  rationale: Se mantiene el sentido colectivo y político de 'naciones' sin convertir el texto en una oposición étnico-religiosa más específica de la que el hebreo exige. Esto preserva la fuerza judicial del pasaje.
  doctrine_reference: Principio de primacía del idioma original; no resolver innecesariamente la tensión imprecatoria.
- issue: Valor de חנן en una petición negativa
  english_pob_reading: show no favor
  chosen_spanish_reading: no muestres favor
  alternative_spanish_readings:
  - no tengas misericordia
  - no concedas gracia
  rationale: '''Favor'' permite conservar el vínculo semántico con la idea de gracia/favor, evitando que el español borre el eco léxico del verbo hebreo. En un contexto de juicio, la negación vuelve la petición claramente imprecatoria.'
  doctrine_reference: Preservar la tensión léxica entre favor/gracia y juicio sin suavizarla.
translation_notes:
  revision_awareness: 'La versión española sigue de cerca el estado final del audit trail inglés: mantiene Yahweh/YHWH como nombre divino, conserva el título ''God of hosts'' con un equivalente natural en español, y reproduce las dos alternativas léxicas clave (פקד y חנן) mediante notas breves. No se incorporaron revisiones posteriores porque el registro inglés indica ''No changes needed''.'
  spanish_consistency_notes:
  - Se usa 'Yahvé' de forma consistente para יהוה, conforme a la terminología base del proyecto.
  - '''Dios de los ejércitos'' conserva el matiz de צְבָאוֹת sin sustituirlo por un calco artificial.'
  - '''Despierta'' mantiene el tono poético de la súplica y evita un giro demasiado coloquial.'
  - '''No muestres favor'' conserva la relación semántica con gracia/favor mejor que una paráfrasis más libre.'
  - '''Selah'' se deja sin traducir por fidelidad al signo litúrgico y para no resolver su función incierta.'
