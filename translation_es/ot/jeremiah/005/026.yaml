base_translation:
  language: en
  yaml_path: translation/ot/jeremiah/005/026.yaml
  text: For wicked men are found among my people[a]; they lie in wait like fowlers. They set a trap[b]; they catch men.
  footnotes:
  - marker: a
    text: Or 'like bird-catchers lurking' / 'like the crouching of fowlers.' The Hebrew phrase is difficult, but the sense is of concealed hunters waiting to ensnare prey.
    reason: lexical_alternative
  - marker: b
    text: Or 'a snare.' The Hebrew noun denotes something destructive; in context it refers to a device laid to capture people.
    reason: lexical_alternative
