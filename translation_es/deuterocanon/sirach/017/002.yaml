  rationale: Se corrige la concordancia para reflejar el plural αὐτοῖς en ambas cláusulas y se ajusta la frase final para acercarla un poco más a ἐπ᾿ αὐτῆς, manteniendo un español natural y fiel al razonamiento léxico documentado.
