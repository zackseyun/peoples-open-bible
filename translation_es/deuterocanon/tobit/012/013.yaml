translation:
  language: es
  text: Y cuando no vacilaste en levantarte y dejar tu comida[b] para ir a envolver al muerto[a], no me pasó inadvertido tu hacer el bien, sino que estuve contigo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «preparar al muerto para el entierro». El verbo griego puede referirse a envolver o disponer el cadáver para sepultura.'
    reason: lexical_alternative
  - marker: b
    text: El griego usa un término para «comida» que puede designar una comida principal; aquí no se precisa la hora del día.
    reason: cultural_note
lexical_decisions:
- source_word: οὐκ ὤκνησας
  english_pob_choice: you did not hesitate
  chosen_spanish: no vacilaste
  alternatives_spanish:
  - no te demoraste
  - no fuiste lento
  - no te retraíste
  lexicon: LSJ
  rationale: ὀκνέω puede expresar vacilación, tardanza o resistencia. «No vacilaste» suena natural en español y conserva la idea de una respuesta pronta y dispuesta.
- source_word: ἀναστῆναι
  english_pob_choice: to rise
  chosen_spanish: levantarte
  alternatives_spanish:
  - ponerte de pie
  - alzarte
  - levantarte y salir
  lexicon: LSJ
  rationale: El infinitivo indica levantarse desde la mesa; «levantarte» comunica el movimiento concreto con español claro y no demasiado literal.
- source_word: καταλιπεῖν τὸ ἄριστόν σου
  english_pob_choice: leave your meal
  chosen_spanish: dejar tu comida
  alternatives_spanish:
  - dejar tu comida principal
  - dejar tu comida de mediodía
  - dejar tu mesa
  lexicon: LSJ
  rationale: Ἄριστον puede referirse a una comida principal, sin precisar hora exacta. «Tu comida» preserva la referencia concreta sin sobreespecificar el momento del día.
- source_word: ὅπως ἀπελθὼν
  english_pob_choice: so that you might go
  chosen_spanish: para que fueras
  alternatives_spanish:
  - a fin de que fueras
  - para ir
  - con el fin de ir
  lexicon: LSJ
  rationale: La construcción expresa propósito; «para que fueras» refleja bien la finalidad en español y mantiene la subordinación del griego.
- source_word: περιστείλῃς τὸν νεκρόν
  english_pob_choice: wrap the dead man
  chosen_spanish: envolvieras al muerto
  alternatives_spanish:
  - prepararas al muerto para el entierro
  - cuidaras del cadáver
  - cubrieras al muerto
  lexicon: LSJ
  rationale: περιστέλλω puede significar envolver o preparar un cadáver. «Envolver» sigue de cerca el verbo griego y evita introducir más de lo que el texto dice.
- source_word: οὐκ ἔλαθές με ἀγαθοποιῶν
  english_pob_choice: your doing good did not escape me
  chosen_spanish: no me pasó inadvertido tu hacer el bien
  alternatives_spanish:
  - no me ocultó tu hacer el bien
  - no pasó desapercibido para mí tu bienhacer
  - no se me escapó tu buena obra
  lexicon: LSJ
  rationale: El idiomático λανθάνω indica que la acción no quedó oculta ni inadvertida. «No me pasó inadvertido» conserva el sentido y suena natural; «tu hacer el bien» mantiene la fuerza verbal del participio.
- source_word: σὺν σοὶ ἤμην
  english_pob_choice: I was with you
  chosen_spanish: estuve contigo
  alternatives_spanish:
  - estaba contigo
  - estuve a tu lado
  - estuve junto a ti
  lexicon: LSJ
  rationale: La afirmación de presencia se expresa con sencillez. «Estuve contigo» preserva la cercanía narrativa sin añadir matices no presentes en el griego.
theological_decisions:
- issue: Observación de Raphael sobre el acto de Tobit y su presencia con él
  english_pob_reading: The verse states plainly that Raphael observed Tobit's righteous act and was with him during it, without expanding into a broader doctrinal claim.
  chosen_spanish_reading: El versículo afirma de manera directa que Rafael vio la buena acción de Tobit y estuvo con él durante ella, sin ampliar el texto a una afirmación doctrinal más amplia.
  alternative_spanish_readings:
  - Rafael vigiló la obra de Tobit en sentido providencial.
  - El pasaje implica una protección angélica especial más allá de la escena.
  rationale: El griego solo dice que la acción no le pasó inadvertida al hablante y que estuvo con Tobit. La traducción mantiene esa afirmación narrativa sin importar conclusiones teológicas adicionales sobre omnisciencia o mediación angélica.
  doctrine_reference: Mantener la tensión teológica sin resolverla; no importar afirmaciones doctrinales que el texto no formula.
translation_notes:
  revision_awareness: 'La redacción sigue de cerca el griego de Swete y el auditorio inglés de POB: mantiene el valor aspectual de ὀκνέω, la finalidad de ὅπως + participio, el sentido concreto pero flexible de ἄριστον, la ambigüedad léxica de περιστέλλω respecto del cadáver, y el giro idiomático de λανθάνω sin sobrerinterpretar la escena.'
  spanish_consistency_notes:
  - Se usa «Rafael» para el nombre propio del ángel, en línea con la tradición española y la forma del texto griego subyacente.
  - Se evita «Señor» o fórmulas de sustitución no presentes en el versículo; no hay aquí un caso de YHWH.
  - «Muerto» y «muerto»/«cadáver» quedan deliberadamente abiertos en nota para reflejar la alternativa léxica del verbo griego.
  - La puntuación separa la cláusula de propósito y la cláusula de contraste para hacer visible la estructura del griego.
