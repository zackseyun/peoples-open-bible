  glossary_alignment: 'Alineado en lo esencial con la terminología del proyecto: יהוה -> «Yahvé»; עוֹלָה -> «holocausto»; dedicación expresada con «será de Yahvé». No hay conflicto con otras pautas glosariales. La revisión propuesta fortalece la fidelidad a la decisión inglesa sobre la ambigüedad de «whatever».'
