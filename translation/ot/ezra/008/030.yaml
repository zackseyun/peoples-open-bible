id: EZR.8.30
reference: Ezra 8:30
source:
  edition: WLC
  text: וְ/קִבְּלוּ֙ הַ/כֹּהֲנִ֣ים וְ/הַ/לְוִיִּ֔ם מִשְׁקַ֛ל הַ/כֶּ֥סֶף וְ/הַ/זָּהָ֖ב וְ/הַ/כֵּלִ֑ים לְ/הָבִ֥יא לִ/ירוּשָׁלִַ֖ם לְ/בֵ֥ית אֱלֹהֵֽי/נוּ׃פ
translation:
  text: So the priests and the Levites received the weighed amount of the silver[a], the gold, and the vessels, to bring them to Jerusalem[b], to the house of our God.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the weight of the silver, the gold, and the vessels.' The Hebrew term can denote either the measured weight itself or the weighed amount.
    reason: lexical_alternative
  - marker: b
    text: Or 'to the temple of our God.' Literally, 'to the house of our God.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְקִבְּלוּ
  chosen: received
  alternatives:
  - accepted
  - took charge of
  lexicon: HALOT
  rationale: Qal perfect 3cp of קבל here denotes receiving into custody from Ezra and the others. 'Received' is the most natural English rendering and fits the transfer-of-responsibility context.
- source_word: הַכֹּהֲנִים
  chosen: the priests
  lexicon: HALOT
  rationale: Straightforward rendering of the definite plural noun כהנים.
- source_word: וְהַלְוִיִּם
  chosen: and the Levites
  lexicon: HALOT
  rationale: Standard rendering of לויים with conjunction and article preserved.
- source_word: מִשְׁקַל
  chosen: the weighed amount
  alternatives:
  - the weight
  - the weighing
  lexicon: HALOT
  rationale: מִשְׁקַל refers to weight/amount by weight. In this context of entrusted valuables, 'the weighed amount' communicates that the silver, gold, and vessels had been weighed out, preserving the administrative precision of the passage better than the bare 'weight.'
- source_word: הַכֶּסֶף וְהַזָּהָב וְהַכֵּלִים
  chosen: of the silver, the gold, and the vessels
  alternatives:
  - of the silver, the gold, and the articles
  - of the silver, the gold, and the utensils
  lexicon: HALOT
  rationale: כסף and זהב are literal precious metals. כלים is a broad term for objects/implements; here 'vessels' fits temple-related items and traditional usage without becoming overly technical.
- source_word: לְהָבִיא
  chosen: to bring them
  alternatives:
  - for bringing them
  - to carry them
  lexicon: HALOT
  rationale: 'Infinitive construct of בוא with ל expresses purpose: the priests and Levites received the items in order to bring them. ''Them'' is supplied naturally in English from the object already named.'
- source_word: לִירוּשָׁלַם
  chosen: to Jerusalem
  lexicon: HALOT
  rationale: Standard rendering of the place name with directional preposition.
- source_word: לְבֵית אֱלֹהֵינוּ
  chosen: to the house of our God
  alternatives:
  - to our God's house
  - to the temple of our God
  lexicon: HALOT
  rationale: בית אלהינו is literally 'the house of our God.' This preserves the Hebrew expression while remaining clear. 'Temple' is interpretive and therefore left as an alternative rather than the main text.
