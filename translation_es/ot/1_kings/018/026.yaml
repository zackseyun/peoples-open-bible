translation:
  language: es
  text: 'Así que tomaron el toro que se les había dado, lo prepararon e invocaron el nombre de Baal desde la mañana hasta el mediodía, diciendo: «¡Baal, respóndenos!». Pero no había voz, ni quien respondiera. Y andaban renqueando[a] alrededor del altar que se había hecho.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «danzando alrededor» o «saltando alrededor». El verbo hebreo probablemente denota un movimiento ritual de rengueo o salto, y quizá también hace eco intencional del mismo verbo que Elías usa después en el versículo 21.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּקְחוּ
  english_pob_choice: they took
  chosen_spanish: tomaron
  alternatives_spanish:
  - recibieron
  lexicon: HALOT
  rationale: לקח expresa la acción narrativa básica de tomar/recibir; en español «tomaron» es la equivalencia natural y mantiene el avance de la escena.
- source_word: הַפָּר
  english_pob_choice: the bull
  chosen_spanish: el toro
  alternatives_spanish:
  - el novillo
  - el becerro
  lexicon: HALOT
  rationale: פָּר designa un bovino para sacrificio; «toro» es un equivalente claro y digno en español. «Novillo» o «becerro» pueden sonar más específicos o desviar el matiz según contexto.
- source_word: אֲשֶׁר נָתַן לָהֶם
  english_pob_choice: that had been given to them
  chosen_spanish: que se les había dado
  alternatives_spanish:
  - que él les había dado
  - que les fue dado
  lexicon: HALOT
  rationale: La cláusula relativa conserva la idea pasiva del hebreo y evita introducir un sujeto explícito no presente en este versículo, en línea con la revisión inglesa.
- source_word: וַיַּעֲשׂוּ
  english_pob_choice: prepared it
  chosen_spanish: lo prepararon
  alternatives_spanish:
  - lo ofrecieron
  - lo hicieron listo
  lexicon: HALOT
  rationale: En este contexto sacrificial, עשה es elíptico y apunta a preparar la víctima para el rito. «Lo prepararon» comunica el sentido sin adelantar el ofrecimiento total.
- source_word: וַיִּקְרְאוּ בְשֵׁם הַבַּעַל
  english_pob_choice: called on the name of Baal
  chosen_spanish: invocaron el nombre de Baal
  alternatives_spanish:
  - clamaron al nombre de Baal
  - llamaron en nombre de Baal
  lexicon: HALOT
  rationale: קרא בשם es un modismo de invocación cultual. «Invocaron el nombre de Baal» preserva el giro hebreo y su fuerza religiosa sin suavizarlo a una simple llamada.
- source_word: מֵהַבֹּקֶר וְעַד הַצָּהֳרַיִם
  english_pob_choice: from morning until noon
  chosen_spanish: desde la mañana hasta el mediodía
  alternatives_spanish:
  - desde la mañana hasta el mediodía exacto
  - desde la aurora hasta el mediodía
  lexicon: HALOT
  rationale: La franja temporal se expresa de modo natural en español con «desde la mañana hasta el mediodía», conservando la progresión narrativa.
- source_word: הַבַּעַל עֲנֵנוּ
  english_pob_choice: O Baal, answer us!
  chosen_spanish: ¡Baal, respóndenos!
  alternatives_spanish:
  - ¡Oh Baal, respóndenos!
  - ¡Baal, contéstanos!
  lexicon: HALOT
  rationale: ענה en contexto de súplica se traduce mejor como «responder». La vocación implícita se mantiene con la exclamación directa en español.
- source_word: וְאֵין קוֹל וְאֵין עֹנֶה
  english_pob_choice: there was no voice, and no one answered
  chosen_spanish: no había voz, ni quien respondiera
  alternatives_spanish:
  - no había voz, y nadie respondía
  - no hubo voz, ni respuesta
  lexicon: HALOT
  rationale: La doble negación hebrea se reproduce con una forma natural y sobria en español. «Ni quien respondiera» conserva el efecto impersonal de עֹנֶה sin perder fluidez.
- source_word: וַיְפַסְּחוּ
  english_pob_choice: they limped around
  chosen_spanish: cojeaban
  alternatives_spanish:
  - saltaban
  - danzaban
  - renqueaban
  lexicon: HALOT
  rationale: פסח probablemente alude a un movimiento ritual de cojera/salto. «Cojeaban» retiene la ironía y el vínculo léxico con el mismo tema en el capítulo; se evita domesticarlo como «danzaban».
- source_word: עַל הַמִּזְבֵּחַ
  english_pob_choice: around the altar
  chosen_spanish: alrededor del altar
  alternatives_spanish:
  - sobre el altar
  - junto al altar
  lexicon: HALOT
  rationale: Con פסח, עַל comunica el movimiento en torno al altar. «Alrededor del altar» expresa mejor la escena ritual que un literal «sobre».
- source_word: אֲשֶׁר עָשָׂה
  english_pob_choice: that had been made
  chosen_spanish: que había sido hecho
  alternatives_spanish:
  - que estaba hecho
  - que se había hecho
  lexicon: HALOT
  rationale: El hebreo usa un verbo singular sin sujeto explícito; la pasiva en español evita suplir un agente y sigue la revisión inglesa que corrigió una sobreespecificación.
theological_decisions:
- issue: Invocación a Baal con el modismo קרא בשם
  english_pob_reading: called on the name of Baal
  chosen_spanish_reading: invocaron el nombre de Baal
  alternative_spanish_readings:
  - llamaron en nombre de Baal
  - clamaron a Baal
  rationale: Se conserva el carácter cultual del modismo sin insinuar aprobación; el relato mismo presenta la impotencia de Baal. El giro también mantiene continuidad con otros usos bíblicos de invocación.
  doctrine_reference: Translation philosophy §1, §3
- issue: Sentido de וַיְפַסְּחוּ
  english_pob_reading: they limped around the altar
  chosen_spanish_reading: cojeaban alrededor del altar
  alternative_spanish_readings:
  - danzaban alrededor del altar
  - saltaban alrededor del altar
  rationale: La opción preserva la posible alusión de cojera/salto y la ironía literaria del capítulo. Traducirlo como «danzaban» borraría esa tensión semántica.
  doctrine_reference: Translation philosophy §1, §5
- issue: Pasiva sin sujeto explícito en la última cláusula
  english_pob_reading: that had been made
  chosen_spanish_reading: que había sido hecho
  alternative_spanish_readings:
  - que estaba hecho
  - que se había hecho
  rationale: Como en la revisión inglesa, se evita añadir un agente no presente. La pasiva mantiene la ambigüedad del hebreo y no fuerza una identificación doctrinal o narrativa.
  doctrine_reference: Translation philosophy §1, §2
translation_notes:
  revision_awareness: Esta versión sigue la revisión inglesa más reciente al conservar la pasiva sin sujeto en la última cláusula («que había sido hecho») y mantiene la decisión del POB de no suavizar וַיְפַסְּחוּ como simple «danzaron». También respeta el modismo de invocación cultual y la negación enfática hebrea con una formulación natural en español.
  spanish_consistency_notes:
  - Se usó «Yahvé» como forma normal del nombre divino cuando corresponda, pero este versículo no lo contiene.
  - Se prefirió «Baal» como nombre propio fijo; no se añadió artículo innecesario.
  - 'La secuencia verbal conserva el orden narrativo del hebreo: tomar, preparar, invocar, respuesta inexistente, movimiento ritual.'
  - El registro es sobrio y bíblico, evitando arcaísmos innecesarios y evitando también una paráfrasis excesiva.
