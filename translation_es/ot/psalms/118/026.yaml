base_translation:
  language: en
  yaml_path: translation/ot/psalms/118/026.yaml
  text: Blessed is the one who comes in the name of Yahweh[c][b][a]; we bless you from the house of Yahweh.
  footnotes:
  - marker: a
    text: Or 'Blessed is he who comes in the name of the LORD.' The Hebrew participle is masculine singular and can be rendered more formally with 'he who comes.'
    reason: lexical_alternative
  - marker: b
    text: '''In the name of'' can also mean ''with the authority of'' or ''as the representative of.'''
    reason: lexical_alternative
  - marker: c
    text: This verse is later quoted in the New Testament in connection with Jesus' entry into Jerusalem (e.g., Matt 21:9; Mark 11:9; Luke 19:38; John 12:13), but the Psalm's wording itself is left untranslated without importing that later application.
    reason: cross_reference
