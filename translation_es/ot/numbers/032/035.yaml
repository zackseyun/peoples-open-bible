lexical_decisions:
- source_word: וְאֶת
  english_pob_choice: and
  chosen_spanish: y
  alternatives_spanish:
  - y [con el marcador de objeto directo omitido]
  lexicon: HALOT
  rationale: En una lista simple de nombres de lugares, el hebreo וְ se expresa naturalmente con «y». El marcador אֶת señala objeto directo definido, pero en español no se representa de forma explícita aquí.
- source_word: עַטְרֹת שׁוֹפָן
  english_pob_choice: Atroth-shophan
  chosen_spanish: Atrot-shofán
  alternatives_spanish:
  - Atarot-shofán
  - Atrot de Shofán
  lexicon: HALOT
  rationale: Es un nombre compuesto de lugar; conviene transliterarlo, no traducirlo. Se mantiene la forma reconocible del nombre con adaptación ortográfica al español y acentuación para lectura natural.
- source_word: יַעְזֵר
  english_pob_choice: Jazer
  chosen_spanish: Jazer
  alternatives_spanish:
  - Yaazer
  - Yazer
  lexicon: HALOT
  rationale: Es un topónimo. Se conserva la forma habitual en español bíblico y fácil de reconocer para lectores de la tradición bíblica.
- source_word: יָגְבֳּהָה
  english_pob_choice: Jogbehah
  chosen_spanish: Jogbehá
  alternatives_spanish:
  - Jogbeha
  - Yogbehá
  lexicon: HALOT
  rationale: También es un nombre de lugar y se translitera. La adaptación con acento final ayuda a la pronunciación en español sin alterar la identidad del topónimo.
