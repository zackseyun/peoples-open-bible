review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien el hebreo primario y conserva la cláusula final ausente del griego, en línea con el rastro POB. Sin embargo, dos elecciones españolas debilitan la fidelidad semántica: «regalo» suena demasiado cotidiano y voluntario para מַתָּן en contexto de ayuda al necesitado, y «a tu pobre» resulta poco natural para מִמִּסְכֵּנֶךָ y puede sonar posesivo de manera extraña en español.'
  spanish_quality_summary: La redacción es generalmente clara, pero «No niegues un regalo a tu pobre» no suena idiomática ni digna en español bíblico moderno. «Dádiva» y «al pobre que depende de ti» mejoran tanto la naturalidad como la precisión ética del verso. El resto del versículo fluye bien.
  glossary_alignment: No hay términos del glosario maestro directamente en juego. La revisión propuesta mantiene la política de traducir desde el hebreo cuando existe y de conservar la variante griega en nota. También preserva la fuerza moral de «despreciar» y «maldecirte».
  issues:
  - severity: medium
    issue: «un regalo» para מַתָּן
    rationale: Aunque literalmente posible, «regalo» en español suele sugerir obsequio informal o festivo. En este contexto sapiencial de socorro al necesitado, «dádiva» expresa mejor un don dado al pobre sin estrecharlo a «limosna».
  - severity: medium
    issue: «a tu pobre» para מִמִּסְכֵּנֶךָ
    rationale: La forma intenta conservar el sufijo posesivo, pero en español suena poco natural y puede implicar posesión impropia. Una formulación como «al pobre que depende de ti» comunica mejor la relación de responsabilidad indicada por el hebreo y por la explicación léxica inglesa.
  - severity: low
    issue: La nota dice «sobre dar ocasión para una maldición»
    rationale: No es incorrecto, pero «para que te maldiga» conecta más directamente con la cláusula hebrea y con el texto principal revisado.
  revised_spanish_text: No retengas una dádiva[a] al pobre que depende de ti, y no desprecies la petición del pobre, ni le des ocasión para que te maldiga.
  revised_footnotes:
