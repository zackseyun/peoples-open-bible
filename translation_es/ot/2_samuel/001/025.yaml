translation:
  language: es
  text: ¡Cómo han caído los valientes en medio de la batalla! Jonatán yace muerto sobre tus alturas[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «tus lugares altos». El hebreo puede referirse a terreno elevado; aquí probablemente alude, en forma poética, a las alturas de Israel.
    reason: lexical_alternative
lexical_decisions:
- source_word: אֵיךְ
  english_pob_choice: How
  chosen_spanish: ¡Cómo!
  alternatives_spanish:
  - ¡Ay, cómo!
  - ¡Cómo ha sido!
  lexicon: HALOT
  rationale: En un lamento poético, la partícula expresa exclamación de dolor, no pregunta. El español mantiene la fuerza elegíaca con «¡Cómo!»; el valor lamentoso queda reforzado por la puntuación exclamativa.
- source_word: נָפְל֣וּ
  english_pob_choice: have fallen
  chosen_spanish: han caído
  alternatives_spanish:
  - cayeron
  lexicon: HALOT
  rationale: El perfecto hebreo en este contexto se vierte naturalmente con pretérito perfecto compuesto en español para conservar el sentido de resultado presente del lamento.
- source_word: גִבֹּרִים
  english_pob_choice: the mighty
  chosen_spanish: los poderosos
  alternatives_spanish:
  - los valientes
  - los héroes
  lexicon: HALOT
  rationale: «Poderosos» transmite la fuerza y la categoría de combatientes valientes sin restringir demasiado el matiz; evita una elección más interpretativa como «héroes».
- source_word: בְּתוֹךְ הַמִּלְחָמָה
  english_pob_choice: in the midst of the battle
  chosen_spanish: en medio de la batalla
  alternatives_spanish:
  - en plena batalla
  - en la mitad de la batalla
  lexicon: HALOT
  rationale: «En medio de» conserva la idea de estar dentro del espesor del combate. «Batalla» mantiene el registro militar concreto del hebreo.
- source_word: יְהוֹנָתָן
  english_pob_choice: Jonathan
  chosen_spanish: Jonatán
  alternatives_spanish:
  - Jonathan
  lexicon: Nombre propio estándar
  rationale: Se usa la forma española usual del nombre bíblico, legible para una audiencia amplia, sin alterar la identidad del referente.
- source_word: עַל
  english_pob_choice: 'on'
  chosen_spanish: sobre
  alternatives_spanish:
  - en
  - encima de
  lexicon: HALOT
  rationale: «Sobre» reproduce la relación locativa de manera natural en español y funciona bien con la imagen del cuerpo y las alturas.
- source_word: בָּמוֹתֶיךָ
  english_pob_choice: your heights
  chosen_spanish: tus alturas
  alternatives_spanish:
  - tus montes
  - tus lugares altos
  lexicon: HALOT
  rationale: La decisión prioriza el sentido topográfico de בָּמוֹת sin cargar el término con el uso cultual de «lugares altos». En español, «alturas» conserva la imagen poética y la ambigüedad del hebreo. El posesivo se entiende como dirigido al paisaje personificado, no a Jonatán.
- source_word: חָלָל
  english_pob_choice: lies slain
  chosen_spanish: yace muerto
  alternatives_spanish:
  - yace caído
  - yace degollado
  - está herido de muerte
  lexicon: HALOT
  rationale: El adjetivo sustantivado designa a un hombre muerto en combate. «Yace muerto» comunica de forma idiomática el estado resultante, sin introducir detalles no presentes en el hebreo.
theological_decisions:
- issue: Sentido del sufijo de segunda persona en בָּמוֹתֶיךָ
  english_pob_reading: A poetic address to Israel/the mountains of Israel rather than to Jonathan personally
  chosen_spanish_reading: Una apostrofe poética a las alturas de Israel como paisaje personificado, no a Jonatán como poseedor literal
  alternative_spanish_readings:
  - Tus alturas, dirigidas a Jonatán
  - Tus lugares altos, con posible matiz cultual
  rationale: La lectura poética concuerda con el lamento y con la manera en que el hebreo personifica el paisaje. La traducción conserva el posesivo para no borrar la ambigüedad, pero evita una lectura que haga del antecedente de «tus» a Jonatán mismo.
  doctrine_reference: Poética bíblica y personificación del territorio en el lamento (cf. 2 Samuel 1:19-27)
- issue: Valor de גִבֹּרִים en el marco del lamento
  english_pob_reading: ‘the mighty’ conveying valiant fighters without over-specifying military rank
  chosen_spanish_reading: ‘los poderosos’ como designación amplia de los combatientes valientes caídos
  alternative_spanish_readings:
  - ‘los valientes’
  - ‘los héroes’
  rationale: No se introduce una categoría técnica ni un tono épico excesivo; se mantiene el lamento por caídos de renombre y fuerza, en continuidad con la repetición del motivo en el pasaje.
  doctrine_reference: Poética elegíaca y semántica de גִבּוֹרִים en el Antiguo Testamento
translation_notes:
  revision_awareness: El texto coincide sustancialmente con el análisis auditado en inglés. Se mantiene la misma resolución principal de la ambigüedad de בָּמוֹתֶיךָ como referencia topográfica poética, y se preserva el valor exclamativo de אֵיךְ en un lamento. No se requirieron revisiones adicionales respecto del pasaje auditado.
  spanish_consistency_notes:
  - Se usa «Yahvé» como norma del proyecto cuando corresponda, pero este versículo no contiene el tetragrámaton.
  - Se mantiene «Jonatán» como forma española estándar del nombre propio.
  - Se conserva el tono elegíaco sin ampliar el contenido del hebreo ni introducir glosas interpretativas en el cuerpo del texto.
  - La nota al pie marca la única alternativa léxica relevante para ‘tus alturas’/‘tus alturas’ topográficas, siguiendo el audit trail inglés.
