  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: ἢ τοῦ πλούτου τῆς χρηστότητος αὐτοῦ καὶ τῆς ἀνοχῆς καὶ τῆς μακροθυμίας καταφρονεῖς, ἀγνοῶν ὅτι τὸ χρηστὸν τοῦ θεοῦ εἰς μετάνοιάν σε ἄγει;
base_translation:
  language: en
  yaml_path: translation/nt/romans/002/004.yaml
  text: Or do you despise the riches of his kindness and forbearance and patience[a], not knowing that God's kindness is leading you to repentance?
  footnotes:
  - marker: a
    text: Or "goodness" for both occurrences of "kindness."
    reason: lexical_alternative
translation:
  language: ko
  text: 혹은 너는 하나님의 인자하심의 풍성함과 관용과 오래 참으심을 멸시하면서, 그분의 인자하심이 너를 회개로 이끌고 있음을 모르느냐?
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: χρηστότητος
  english_pob_choice: kindness
  chosen_korean: 인자하심
  alternatives_korean:
  - 선하심
  - 친절하심
  lexicon: BDAG
  rationale: 하나님의 속성으로서의 χρηστότης를 한국어 신학 전통 「인자하심」으로 옮긴다.
- source_word: ἀνοχῆς
  english_pob_choice: forbearance
  chosen_korean: 관용
  alternatives_korean:
  - 참으심
  - 견디심
  lexicon: BDAG
  rationale: 심판을 늦추는 함의를 「관용」으로 옮긴다.
- source_word: μακροθυμίας
  english_pob_choice: patience
  chosen_korean: 오래 참으심
  alternatives_korean:
  - 인내
  - 길이 참으심
  lexicon: BDAG
  rationale: 어원적 「긴 분노」의 의미를 한국어 「오래 참다」로 보존한다.
- source_word: μετάνοιαν
  english_pob_choice: repentance
  chosen_korean: 회개
  alternatives_korean:
  - 돌이킴
  lexicon: BDAG
  rationale: 한국 교회 전통 용어 「회개」를 유지한다.
