id: MRK.12.30
reference: Mark 12:30
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: καὶ ἀγαπήσεις κύριον τὸν θεόν σου ἐξ ὅλης ⸀τῆς καρδίας σου καὶ ἐξ ὅλης τῆς ψυχῆς σου καὶ ἐξ ὅλης τῆς διανοίας σου καὶ ἐξ ὅλης τῆς ἰσχύος ⸀σου.
base_translation:
  language: en
  yaml_path: translation/nt/mark/012/030.yaml
  text: And you shall love the Lord your God with all your heart and with all your soul and with all your mind and with all your strength[a][b][c].
  footnotes:
  - marker: a
    text: Or 'with all your life' for 'with all your soul' (ψυχῆς).
    reason: lexical_alternative
  - marker: b
    text: Or 'with all your understanding' for 'with all your mind' (διανοίας).
    reason: lexical_alternative
  - marker: c
    text: Or 'with all your might' for 'with all your strength' (ἰσχύος).
    reason: lexical_alternative
translation:
  language: ko
  text: 그리고 너는 너의 하나님 야훼를 네 마음을 다하고 네 목숨을 다하고 네 생각을 다하고 네 힘을 다하여 사랑하여라.」
  philosophy: optimal-equivalence
theological_decisions:
- issue: 12:30 셰마 인용 안의 κύριος를 「야훼」로 옮김
  chosen_reading: 야훼
  alternative_readings:
  - 주
  - 여호와
  rationale: 12:29과 일관되게, 신명기 6:5 인용의 κύριος도 직접 יהוה를 번역하므로 「야훼」로 옮긴다. 두 절은 셰마의 통일된 본문으로, 한 번은 「야훼」로 한 번은 「주」로 옮기면 본문의 단일성이 깨진다.
  doctrine_reference: 'DOCTRINE.md: Glossary — κύριος (= YHWH) → 야훼'
