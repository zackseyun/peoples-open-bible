  to: Y contigo destrozaré[a] al hombre y a la mujer; y contigo destrozaré al anciano y al muchacho; y contigo destrozaré al joven y a la virgen[b].
  rationale: Se cambia «haré pedazos» por «destrozaré» para un español más natural con objeto humano y con fuerza semántica comparable a נפץ. Se diferencia נַעַר como «muchacho» y בָּחוּר como «joven» para evitar aplanar dos lexemas hebreos distintos, manteniendo a la vez una lectura clara y no sobreespecificada. Se corrige además la nota b en su presentación.
