lexical_decisions:
- source_word: πολλὰ
  english_pob_choice: much
  chosen_spanish: mucho
  alternatives_spanish:
  - en gran manera
  - largamente
  - repetidamente
  lexicon: LSJ
  rationale: El acusativo adverbial expresa intensidad o extensión del ruego; «mucho» comunica bien en español la insistencia sin añadir contenido no explicitado.
- source_word: παραινέσαντος
  english_pob_choice: had urged
  chosen_spanish: haberla instado
  alternatives_spanish:
  - haberla exhortado
  - haberla aconsejado
  - haberla animado
  lexicon: LSJ
  rationale: El participio genitivo absoluto de παραινέω implica una apelación insistente. «Instar» conserva mejor la fuerza de presión que «aconsejar» o «animar».
- source_word: ἐπεδέξατο
  english_pob_choice: agreed
  chosen_spanish: aceptó
  alternatives_spanish:
  - acordó
  - consintió
  - se comprometió a
  lexicon: LSJ
  rationale: El verbo medio expresa que recibió la propuesta y la asumió. «Aceptó» funciona de manera natural en español y mantiene la idea de asentimiento a la petición.
- source_word: πεῖσειν
  english_pob_choice: to persuade
  chosen_spanish: persuadir
  alternatives_spanish:
  - convencer
  - ganar para
  lexicon: LSJ
  rationale: El infinitivo futuro de πείθω señala la acción que ella se comprometió a realizar. «Persuadir» es el equivalente directo y más sobrio en este contexto.
- source_word: τὸν υἱόν
  english_pob_choice: her son
  chosen_spanish: a su hijo
  alternatives_spanish:
  - a su hijo varón
  - al hijo
  lexicon: LSJ
  rationale: El griego dice simplemente «el hijo», pero el contexto narrativo exige explicitar la relación materna. El posesivo en español evita ambigüedad y sigue la referencia contextual del texto.
translation_notes:
  revision_awareness: 'La redacción sigue el ajuste del audit trail inglés: el participio se refiere a la mujer, no al hombre, y el valor genitivo absoluto se vierte como una secuencia temporal simple («Y después de haberla instado mucho») sin introducir contraste que el griego no expresa. También se conserva la decisión de traducir el acto con un verbo de presión insistente, no meramente de consejo.'
  spanish_consistency_notes:
  - Se mantiene «hijo» con posesivo explícito «su» por claridad contextual, aunque el griego solo dice «el hijo».
  - Se evita «Cristo», «SEÑOR» u otra terminología no presente en el versículo.
  - La puntuación y el orden buscan sonar naturales en español sin debilitar la relación causal/temporal del genitivo absoluto griego.
