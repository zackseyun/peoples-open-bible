source:
  edition: SBLGNT
  text: ἐν παντὶ εὐχαριστεῖτε· τοῦτο γὰρ θέλημα θεοῦ ἐν Χριστῷ Ἰησοῦ εἰς ὑμᾶς.
base_translation:
  language: en
  yaml_path: translation/nt/1_thessalonians/005/018.yaml
  text: Give thanks in everything[b][a], for this is God's will in Messiah Jesus for you.
  footnotes:
  - marker: a
    text: 'Or: “in every circumstance.” The Greek says “in everything,” referring to the circumstances in which believers are to give thanks, not necessarily to thanking God for evil itself.'
    reason: lexical_alternative
  - marker: b
    text: 'Traditional rendering: “in Christ Jesus.”'
    reason: alternative_reading
translation:
  language: ko
  text: 모든 일 가운데서[a] 감사하십시오. 이것이 메시아 예수[b] 안에서 여러분을 향한 하나님의 뜻이기 때문입니다.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 또는 「모든 정황에서」. 헬라어는 「모든 것에서」를 말하며, 이는 신자가 감사해야 할 정황을 가리킬 뿐 악 자체에 대한 감사를 가리키지 않는다.
    reason: lexical_alternative
  - marker: b
    text: 전통적 옮김은 「그리스도 예수」.
    reason: alternative_reading
lexical_decisions:
- source_word: ἐν παντὶ εὐχαριστεῖτε
  english_pob_choice: Give thanks in everything
  chosen_korean: 모든 일 가운데서 감사하십시오
  alternatives_korean:
  - 모든 정황에서 감사하십시오
  - 매사에 감사하십시오
  lexicon: BDAG
  rationale: 「모든 일 가운데서」가 한국어로 자연스럽고 감사가 모든 정황 가운데 일어남을 분명히 한다.
- source_word: θέλημα θεοῦ ἐν Χριστῷ Ἰησοῦ εἰς ὑμᾶς
  english_pob_choice: God's will in Messiah Jesus for you
  chosen_korean: 메시아 예수 안에서 여러분을 향한 하나님의 뜻
  alternatives_korean:
  - 메시아 예수 안에서 여러분에게 향한 하나님의 의지
  - 그리스도 예수 안에서 여러분을 위한 하나님의 뜻
  lexicon: BDAG
  rationale: 4:3과 일관된 「하나님의 뜻」 어휘. εἰς의 「향한」을 보존한다.
