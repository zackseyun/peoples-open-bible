  text: תְּהִ֣י נָ֣א אָזְנְ/ךָֽ קַשֶּׁ֣בֶת וְֽ/עֵינֶ֪י/ךָ פְתֻוּח֟וֹת לִ/שְׁמֹ֣עַ אֶל תְּפִלַּ֣ת עַבְדְּ/ךָ֡ אֲשֶׁ֣ר אָנֹכִי֩ מִתְפַּלֵּ֨ל לְ/פָנֶ֤י/ךָ הַ/יּוֹם֙ יוֹמָ֣ם וָ/לַ֔יְלָה עַל בְּנֵ֥י יִשְׂרָאֵ֖ל עֲבָדֶ֑י/ךָ וּ/מִתְוַדֶּ֗ה עַל חַטֹּ֤אות בְּנֵֽי יִשְׂרָאֵל֙ אֲשֶׁ֣ר חָטָ֣אנוּ לָ֔/ךְ וַ/אֲנִ֥י וּ/בֵית אָבִ֖/י חָטָֽאנוּ־־־־־־׃
base_translation:
  language: en
  yaml_path: translation/ot/nehemiah/001/006.yaml
  text: Please let your ear be attentive and your eyes be open to hear the prayer of your servant that I am praying before you today[a], day and night, for the children of Israel, your servants, and confessing the sins of the children of Israel that we have sinned against you. Even I and my father's house have sinned.
  footnotes:
  - marker: a
    text: Or 'the people of Israel' / 'the Israelites.' The Hebrew reads 'the sons of Israel,' preserving the familial covenant expression.
    reason: lexical_alternative
