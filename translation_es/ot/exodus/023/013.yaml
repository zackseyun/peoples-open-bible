review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien el sentido general del hebreo: alcance total de la instrucción, llamado a guardarse, prohibición de mencionar el nombre de otros dioses y clausura que prohíbe que tal nombre sea oído en la boca del destinatario. Sin embargo, presenta dos desajustes importantes: añade un pronombre objeto («lo») que no está en el hebreo y mezcla número de destinatario («les» / «tu»), además de una frase final poco natural en español («sobre tu boca»).'
  spanish_quality_summary: La redacción es mayormente comprensible, pero «no lo mencionarán» suena innecesariamente marcado y «no se oirá sobre tu boca» es poco idiomático en español. También conviene uniformar la segunda persona en plural, ya que el versículo se dirige al pueblo en plural. Una formulación más natural y fiel sería «no se oirá en sus labios».
  glossary_alignment: No hay conflicto con la terminología principal del proyecto; «otros dioses» y el tratamiento del verbo «mencionar» siguen el audit trail. El problema no es terminológico sino de precisión sintáctica y naturalidad española. Se conserva correctamente evitar una interpretación más estrecha como «invocar» en el texto principal, dejando esa opción en nota.
  issues:
  - severity: medium
    issue: Pronombre objeto añadido en «no lo mencionarán».
    rationale: El hebreo dice simplemente «no mencionarán» con «el nombre de otros dioses» como objeto expreso; el «lo» no es necesario y entorpece el flujo.
  - severity: high
    issue: 'Cambio inconsistente de persona/número: «les» y luego «tu boca».'
    rationale: El pasaje se dirige en plural (2mp) en los mandatos principales. Aunque el hebreo final lleva sufijo singular, en español una mezcla así suena inconsistente; conviene armonizar con el destinatario colectivo como «sus labios», que además refleja el inglés POB auditado.
  - severity: high
    issue: Expresión poco natural «no se oirá sobre tu boca».
    rationale: Aunque עַל־פִּיךָ es literalmente «sobre tu boca», en español esa literalidad resulta torpe. «En sus labios» preserva el sentido de habla pronunciada y coincide con la decisión auditada de usar una expresión idiomática.
  - severity: low
    issue: La nota a en el borrador no aporta una alternativa significativa.
    rationale: «lo que les he dicho» repite esencialmente el texto y no refleja una verdadera variante léxica útil. Puede omitirse sin pérdida.
  revised_spanish_text: En todo lo que les he dicho, tengan cuidado[a]; y el nombre de otros dioses no mencionarán[b]; no se oirá en sus labios[c].
