  rationale: 'Se corrige la distinción entre סְבָא y שְׁבָא usando «Seba» para el primero y «Sheba» para el segundo, con nota sobre la forma tradicional española «Saba». También se reparan las notas para reflejar con mayor fidelidad las alternativas documentadas en el audit trail inglés: «Sabtah», «Raamah» con advertencia sobre «Rama», y «Sabtechah». La sintaxis española principal se mantiene por ser natural y fiel al hebreo.'
