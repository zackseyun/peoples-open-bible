revisions:
- from: Y aconteció al día siguiente que tomó la manta[a], la sumergió en agua, la extendió sobre su rostro, y murió[b]. Entonces reinó Hazael en su lugar.
  to: Y sucedió que al día siguiente tomó la tela de cubrir[a], la sumergió en agua, la extendió sobre su rostro, y murió[b]. Entonces Hazael reinó en su lugar.
  rationale: Se ajusta la redacción para un español más natural, se cambia «manta» por «tela de cubrir» para reflejar mejor la cautela léxica documentada, y se corrige la nota b para describir con precisión la ambigüedad del sujeto en el hebreo.
