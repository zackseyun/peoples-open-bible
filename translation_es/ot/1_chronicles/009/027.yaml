translation:
  language: es
  text: Pasaban la noche alrededor de la casa de Dios, porque la vigilancia estaba a su cargo, y estaban encargados de abrirla[a] mañana tras mañana.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, más literalmente, «estaban sobre la llave»; el hebreo puede referirse tanto a la custodia de la llave como a la responsabilidad de abrir la casa de Dios.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּסְבִיבוֹת
  english_pob_choice: around
  chosen_spanish: alrededor de
  alternatives_spanish:
  - en la cercanía de
  - todo alrededor de
  lexicon: HALOT
  rationale: El adverbio indica la zona circundante; «alrededor de» expresa con naturalidad la idea espacial sin forzar el español.
- source_word: בֵּית הָאֱלֹהִים
  english_pob_choice: the house of God
  chosen_spanish: la casa de Dios
  alternatives_spanish:
  - el templo de Dios
  lexicon: HALOT
  rationale: La expresión hebrea es literalmente «casa de Dios». Mantenerla conserva el giro del original y evita introducir un término más específico que el hebreo no usa aquí.
- source_word: יָלִינוּ
  english_pob_choice: spent the night
  chosen_spanish: pasaban la noche
  alternatives_spanish:
  - se alojaban
  - dormían
  lexicon: HALOT
  rationale: El verbo denota pasar la noche o alojarse. «Pasaban la noche» comunica bien la permanencia nocturna y suena más natural que una traducción más dura o más estrecha.
- source_word: כִּי
  english_pob_choice: because
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  lexicon: HALOT
  rationale: Introduce la razón de su permanencia; «porque» conserva claramente el valor causal.
- source_word: עֲלֵיהֶם מִשְׁמֶרֶת
  english_pob_choice: the duty of guarding it was upon them
  chosen_spanish: sobre ellos estaba la responsabilidad de guardarla
  alternatives_spanish:
  - tenían el deber de guardarla
  - la vigilancia recaía sobre ellos
  lexicon: HALOT
  rationale: La construcción hebrea expresa una carga o cargo impuesto. «Responsabilidad» conserva la idea de obligación asignada, y «sobre ellos» mantiene la imagen de algo puesto encima de ellos.
- source_word: מִשְׁמֶרֶת
  english_pob_choice: the duty of guarding
  chosen_spanish: la responsabilidad de guardarla
  alternatives_spanish:
  - la guardia
  - el cargo de guardia
  lexicon: HALOT
  rationale: En este contexto, el sustantivo apunta a la custodia o vigilancia como deber. «Responsabilidad de guardarla» explicita la función sin perder la noción de encargo.
- source_word: וְהֵם עַל הַמַּפְתֵּחַ
  english_pob_choice: they were in charge of opening it
  chosen_spanish: y ellos estaban encargados de abrirla
  alternatives_spanish:
  - y ellos estaban sobre la llave
  - y ellos eran responsables de la llave
  lexicon: HALOT
  rationale: Aunque מַפְתֵּחַ suele significar «llave», el contexto de la apertura diaria favorece un sentido funcional. «Estaban encargados de abrirla» conserva la posibilidad metonímica de la llave sin volverse extraño en español.
- source_word: הַמַּפְתֵּחַ
  english_pob_choice: opening it
  chosen_spanish: abrirla
  alternatives_spanish:
  - la llave
  - su apertura
  lexicon: HALOT
  rationale: La referencia parece apuntar a la acción de abrir la casa/las puertas más que al objeto en sí. «Abrirla» refleja el sentido contextual y deja la alternativa lexical implícita.
- source_word: וְלַבֹּקֶר לַבֹּקֶר
  english_pob_choice: morning by morning
  chosen_spanish: mañana tras mañana
  alternatives_spanish:
  - cada mañana
  - de mañana en mañana
  lexicon: HALOT
  rationale: La repetición hebrea expresa regularidad. «Mañana tras mañana» conserva bien el matiz iterativo y el ritmo del original en español.
translation_notes:
  revision_awareness: Se mantuvo el sentido del hebreo sin depender mecánicamente de la redacción inglesa. La decisión clave fue conservar la ambigüedad funcional de מַפְתֵּחַ mediante una formulación natural en español, con nota de alternativa literal.
  spanish_consistency_notes:
  - Se usó «casa de Dios» en vez de «templo» para seguir de cerca el hebreo.
  - Se prefirió «responsabilidad» para מִשְׁמֶרֶת, evitando reducirlo solo a una vigilancia física.
  - Se evitó «SEÑOR» porque el texto habla de אֱלֹהִים, no del tetragrámaton.
  - La referencia al acto de abrir se mantuvo en singular femenino («abrirla») por concordar con «la casa de Dios» y su función contextual.
