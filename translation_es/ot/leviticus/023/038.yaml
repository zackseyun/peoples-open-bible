translation:
  language: es
  text: aparte de los sábados de Yahvé[a], aparte de sus dones, aparte de todas las promesas hechas por voto de ustedes, y aparte de todas sus ofrendas voluntarias, que ustedes dan a Yahvé.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: También puede traducirse «además de» o «fuera de» en cada repetición de esta expresión.
    reason: lexical_alternative
lexical_decisions:
- source_word: מִלְּבַד
  english_pob_choice: besides
  chosen_spanish: aparte de
  alternatives_spanish:
  - además de
  - fuera de
  lexicon: HALOT
  rationale: La expresión marca exclusión o adición respecto de lo ya ordenado. «Aparte de» es natural en español, conserva la repetición hebrea y refleja bien el valor de 'besides / apart from / in addition to' sin volver la frase pesada.
- source_word: שַׁבְּתֹת יְהוָה
  english_pob_choice: the Sabbaths of Yahweh
  chosen_spanish: los sábados de Yahvé
  alternatives_spanish:
  - los sábados de Yahvé
  - los sábados de Yahvé
  lexicon: HALOT
  rationale: Se mantiene el plural hebreo y el vínculo posesivo/construccional con el nombre divino. «Sábados» reproduce la forma plural del original; no se suaviza a singular porque el texto enumera categorías cultuales plurales.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: Se sigue el estándar del proyecto para el nombre divino. «Yahvé» preserva el nombre del pacto y evita el reemplazo litúrgico por un título.
- source_word: מַתְּנֽוֹתֵיכֶם
  english_pob_choice: your gifts
  chosen_spanish: sus dones
  alternatives_spanish:
  - sus regalos
  - sus ofrendas
  lexicon: HALOT
  rationale: El sustantivo puede abarcar dones u obsequios ofrecidos a Dios. «Dones» mantiene amplitud y es más natural que un calco como «regalos»; no se especifica «ofrendas» porque el hebreo no lo dice aquí.
- source_word: כָּל נִדְרֵיכֶם
  english_pob_choice: all your vows
  chosen_spanish: todos sus votos
  alternatives_spanish:
  - todos sus votos
  - todo lo prometido por ustedes
  lexicon: HALOT
  rationale: «Votos» conserva el valor de נֶדֶר como promesa votiva. En español bíblico puede sonar formal, pero es claro y no añade «ofrendas» que el hebreo no expresa explícitamente.
- source_word: כָּל נִדְבֹתֵיכֶם
  english_pob_choice: all your freewill offerings
  chosen_spanish: todas sus ofrendas voluntarias
  alternatives_spanish:
  - todas sus ofrendas libres
  - todos sus dones voluntarios
  lexicon: HALOT
  rationale: En contexto sacrificial, נְדָבָה se refiere a una ofrenda hecha voluntariamente. «Ofrendas voluntarias» comunica bien ese valor cultual en español y conserva la distinción respecto de «dones» y «votos».
- source_word: אֲשֶׁר תִּתְּנוּ לַיהוָה
  english_pob_choice: which you give to Yahweh
  chosen_spanish: que ustedes den a Yahvé
  alternatives_spanish:
  - que ustedes den a Yahvé
  - que ustedes ofrezcan a Yahvé
  lexicon: HALOT
  rationale: «Dar» reproduce el sentido básico de נָתַן y permite que la cláusula relativa abarque la serie anterior de dones, votos y ofrendas voluntarias. Se evita restringirlo con «ofrezcan» porque el hebreo usa un verbo más general.
theological_decisions:
- issue: Tratamiento del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: El texto hebreo emplea directamente el Tetragrámaton. Conforme al criterio del proyecto, se lo vierte como «Yahvé» para preservar el nombre propio del Dios del pacto, en vez de ocultarlo tras un título.
  doctrine_reference: 'DOCTRINE.md: יְהוָה / YHWH'
- issue: Valor de שַׁבְּתֹת en contexto cultual
  english_pob_reading: the Sabbaths of Yahweh
  chosen_spanish_reading: los sábados de Yahvé
  alternative_spanish_readings:
  - los sábados de Yahvé
  - los sábados de Yahvé
  rationale: Se conserva la pluralidad del hebreo y la relación posesiva con Yahvé. No se interpreta de antemano como una referencia abstracta a 'descansos' o a un solo 'sábado', porque el contexto enumera observancias y ofrendas distintas dentro del calendario sagrado.
  doctrine_reference: N/A
translation_notes:
  revision_awareness: La revisión más reciente reporta alta concordancia y ningún cambio necesario; esta propuesta mantiene la estructura repetida del hebreo y las decisiones léxicas principales del audit trail inglés, ajustándolas a un español natural y publicable.
  spanish_consistency_notes:
  - Se usa «Yahvé» de manera uniforme para el nombre divino.
  - Se conserva la repetición de «aparte de» para reflejar la estructura enumerativa del hebreo.
  - Se mantiene la distinción entre «dones», «votos» y «ofrendas voluntarias» sin fusionarlos.
  - La cláusula final se deja amplia con «que ustedes den» para abarcar todos los elementos previos.
