translation:
  language: es
  text: Galaad es una ciudad de malhechores[a], marcada con sangre.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'manchada con sangre', 'señalada por sangre', o más literalmente 'con huellas de sangre'. La expresión hebrea es rara y difícil.
    reason: lexical_alternative
lexical_decisions:
- source_word: גִּלְעָד
  english_pob_choice: Gilead
  chosen_spanish: Galaad
  alternatives_spanish:
  - Gilead
  - Gilad
  lexicon: HALOT
  rationale: Es un nombre propio geográfico; en español bíblico es natural y auditable usar la forma tradicional 'Galaad', que conserva la referencia sin introducir traducción interpretativa.
- source_word: קִרְיַת
  english_pob_choice: city of
  chosen_spanish: ciudad de
  alternatives_spanish:
  - ciudad
  - poblado de
  lexicon: HALOT
  rationale: 'El constructo hebreo introduce una relación nominal: ''ciudad de''. En español, ''ciudad de'' reproduce bien esa construcción y mantiene la fluidez.'
- source_word: פֹּעֲלֵי אָוֶן
  english_pob_choice: evildoers
  chosen_spanish: malhechores
  alternatives_spanish:
  - hacedores de mal
  - obradores de iniquidad
  - hombres de maldad
  lexicon: HALOT
  rationale: El participio con אָוֶן expresa personas que practican el mal. 'Malhechores' es idiomático en español y conserva la fuerza moral del compuesto sin volverlo excesivamente arcaico.
- source_word: אָוֶן
  english_pob_choice: evil
  chosen_spanish: mal
  alternatives_spanish:
  - iniquidad
  - maldad
  - perversidad
  lexicon: HALOT
  rationale: En este compuesto, אָוֶן refiere a maldad/evil moral. En español, 'mal' es conciso y compatible con 'malhechores'.
- source_word: עֲקֻבָּה
  english_pob_choice: tracked
  chosen_spanish: rastreada
  alternatives_spanish:
  - marcada
  - manchada
  - seguida por huellas
  lexicon: HALOT
  rationale: La forma rara es difícil; el contexto con מִדָּם permite una imagen de marcas o huellas de sangre. 'Rastreada' conserva la imagen de rastro/trazo sin fijar indebidamente una sola solución interpretativa.
- source_word: מִדָּם
  english_pob_choice: with blood
  chosen_spanish: con sangre
  alternatives_spanish:
  - desde sangre
  - por sangre
  - de sangre
  lexicon: HALOT
  rationale: La preposición מִן con esta forma es ambigua. 'Con sangre' comunica de manera natural la idea de una ciudad caracterizada por sangre derramada, y deja espacio para la imagen de rastros o marcas sangrientas.
theological_decisions:
- issue: La frase final es semánticamente difícil y admite varias imágenes relacionadas (rastros, marcas, manchas, proveniencia).
  english_pob_reading: tracked with blood
  chosen_spanish_reading: rastreada con sangre
  alternative_spanish_readings:
  - manchada con sangre
  - marcada con sangre
  - rastreada desde sangre
  rationale: Mantengo la tensión semántica documentada sin suavizarla. 'Rastreada con sangre' preserva la imagen de rastros/huellas y sigue siendo comprensible; las alternativas quedan reconocidas por la dificultad del hebreo.
  doctrine_reference: Ninguna; decisión léxica/poética
translation_notes:
  revision_awareness: 'El contexto auditado en inglés no muestra cambios de revisión: la traducción inglesa más reciente se mantuvo sin cambios y el revisor externo marcó alto acuerdo. La versión española sigue esa misma línea de resolución léxica, preservando la dificultad del final del verso y sin añadir lectura doctrinal no respaldada.'
  spanish_consistency_notes:
  - Se mantiene el nombre propio bíblico 'Galaad' como forma española natural y reconocible.
  - Se evita el calco mecánico 'obradores de iniquidad' porque en español suena más arcaico que 'malhechores' y no aporta mayor precisión.
  - La ambigüedad de עֲקֻבָּה + מִדָּם se conserva con una nota, sin decidir de forma excesiva por 'manchada' o 'marcada'.
  - El texto es breve y poético, acorde con la estructura del hebreo.
  - Se usa puntuación española y se conserva el tono profético condenatorio del original.
