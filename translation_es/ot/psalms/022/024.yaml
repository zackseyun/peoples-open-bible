translation:
  language: es
  text: Los que temen a Yahvé, alábenlo; todos los descendientes de Jacob, hónrenlo; queden sobrecogidos ante él[a], todos los descendientes de Israel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'témanle' o 'reveréncienlo'. El verbo hebreo expresa temor reverente.
    reason: lexical_alternative
lexical_decisions:
- source_word: יִרְאֵי יְהוָה
  english_pob_choice: You who fear Yahweh
  chosen_spanish: Tú, los que temen a Yahvé
  alternatives_spanish:
  - Los que temen a Yahvé
  - Ustedes que temen a Yahvé
  lexicon: HALOT
  rationale: 'La forma constructa funciona como vocativo: se dirige a quienes son caracterizados por temer a Yahvé. En español, la llamada directa se expresa de manera natural con una forma vocativa explicativa; se preserva el valor de temor reverente sin convertirlo en una mera descripción impersonal.'
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  - SEÑOR
  lexicon: HALOT
  rationale: El texto hebreo usa el nombre divino propio, no un título. Se conserva la transliteración establecida en el proyecto, 'Yahvé', para mantener la identidad del nombre del pacto y la transparencia hacia el original.
- source_word: הַלְלוּהוּ
  english_pob_choice: praise him
  chosen_spanish: alábenlo
  alternatives_spanish:
  - práisenlo
  - denle alabanza
  lexicon: HALOT
  rationale: El imperativo plural con sufijo de tercera persona masculina singular pide alabanza dirigida a él. 'Alábenlo' es el equivalente natural y digno en español; evita importar la forma hebrea y conserva el mandato verbal directo.
- source_word: כָּל זֶרַע יַעֲקֹב
  english_pob_choice: All offspring of Jacob
  chosen_spanish: todos los descendientes de Jacob
  alternatives_spanish:
  - toda la descendencia de Jacob
  - todo el linaje de Jacob
  lexicon: HALOT
  rationale: זֶרַע es un sustantivo colectivo; en español, 'descendientes' comunica bien la idea de conjunto y mantiene claridad poética. Se evita 'simiente' por ser menos natural en español contemporáneo.
- source_word: כַּבְּדֻהוּ
  english_pob_choice: honor him
  chosen_spanish: honrenlo
  alternatives_spanish:
  - glorifíquenlo
  - denle honor
  lexicon: HALOT
  rationale: El piel imperativo implica dar peso, honra o reconocimiento debido. En español, 'honrar' reproduce con sobriedad la idea central sin cargar el verso con una glosa interpretativa.
- source_word: וְגוּרוּ מִמֶּנּוּ
  english_pob_choice: Stand in awe of him
  chosen_spanish: y estén sobrecogidos de él
  alternatives_spanish:
  - y teman de él
  - y reveréncienlo
  lexicon: HALOT
  rationale: גוּר expresa temor reverente, una mezcla de sobrecogimiento y reverencia. 'Estén sobrecogidos de él' intenta preservar esa tensión semántica sin reducirla a solo 'temer' ni a solo 'reverenciar'.
- source_word: כָּל זֶרַע יִשְׂרָאֵל
  english_pob_choice: all offspring of Israel
  chosen_spanish: todos los descendientes de Israel
  alternatives_spanish:
  - toda la descendencia de Israel
  - todo el linaje de Israel
  lexicon: HALOT
  rationale: Se mantiene la simetría con el segundo colon y el sentido colectivo de זֶרַע. 'Descendientes' ofrece una correspondencia clara y natural en español para la repetición poética.
theological_decisions:
- issue: Nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - SEÑOR
  rationale: La decisión conserva el nombre personal de Dios revelado a Israel y evita la sustitución litúrgica por un título. Esto mantiene visible el vínculo del salmo con el pacto y la adoración dirigida al nombre propio.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Tensión entre temor y alabanza en el versículo
  english_pob_reading: fear / praise / stand in awe
  chosen_spanish_reading: temen / alábenlo / estén sobrecogidos de él
  alternative_spanish_readings:
  - teman / alábenlo / reveréncienlo
  - temen / alábenlo / ténganle reverencia
  rationale: 'El hebreo acumula imperativos que no deben aplanarse: temor reverente, alabanza y sobrecogimiento. ''Sobrecogidos de él'' conserva la fuerza afectiva y el matiz de reverencia temblorosa, manteniendo la tensión teológica del texto.'
  doctrine_reference: DOCTRINE.md Translation philosophy §3, preserve theological tension rather than flatten ambiguity
translation_notes:
  revision_awareness: Se corrigió la validación anterior anclando la nota [a] en el texto español. El verso mantiene la estructura poética de tres llamados sucesivos y conserva la distinción semántica entre temor, alabanza y reverente sobrecogimiento.
  spanish_consistency_notes:
  - Se usa 'Yahvé' de manera consistente con el estándar del proyecto para el tetragrámaton.
  - Se mantuvo un registro formal y eclesialmente legible, evitando calcos rígidos.
  - '''Descendientes'' se emplea coherentemente para זֶרַע en ambos paralelismos.'
  - La nota [a] está anclada exactamente en la frase que contiene la ambigüedad semántica principal.
