translation:
  language: es
  text: Ninguna ciudad sitiada jamás resistió tantos y tan variados ingenios de guerra como aquel santísimo[a], quien, mientras su alma sagrada era quemada con torturas y la rueda[b], agitó a los que lo sitiaban por medio de la razón que defiende la piedad.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'sumamente santo' o 'totalmente santo'. El griego πανάγιος expresa una santidad intensiva y superlativa.
    reason: lexical_alternative
  - marker: b
    text: O 'racks' o, más generalmente, 'instrumentos de tortura' para στρέβλαις. El dispositivo exacto es difícil de precisar, aunque claramente alude a medios de suplicio.
    reason: lexical_alternative
lexical_decisions:
- source_word: πόλις
  english_pob_choice: city
  chosen_spanish: ciudad
  alternatives_spanish:
  - urbe
  - población
  lexicon: LSJ
  rationale: En el contexto de asedio militar, πόλις se entiende naturalmente como una entidad urbana; 'ciudad' es la opción española más clara y directa.
- source_word: μηχανήμασιν
  english_pob_choice: siege engines
  chosen_spanish: ingenios de guerra
  alternatives_spanish:
  - máquinas de asedio
  - artefactos de guerra
  lexicon: LSJ
  rationale: El griego, en un marco de πολιορκουμένη, apunta a instrumentos militares de asedio. 'Ingenios de guerra' conserva el campo bélico sin sonar excesivamente técnico o moderno.
- source_word: ἀντέσχεν
  english_pob_choice: held out against
  chosen_spanish: resistió
  alternatives_spanish:
  - se mantuvo firme contra
  - sostuvo el asedio
  lexicon: LSJ
  rationale: En español, 'resistió' comunica bien la idea de soportar un asedio y preserva la imagen de endurance sin sobrecargar la frase.
- source_word: πανάγιος
  english_pob_choice: most holy
  chosen_spanish: santísimo
  alternatives_spanish:
  - totalmente santo
  - all-santo
  lexicon: LSJ
  rationale: El superlativo reverencial se expresa de forma natural con 'santísimo', manteniendo el tono elevado del original.
- source_word: ἱερὰν ψυχὴν
  english_pob_choice: sacred soul
  chosen_spanish: alma sagrada
  alternatives_spanish:
  - alma santa
  - vida sagrada
  lexicon: LSJ
  rationale: '''ψυχή'' aquí tiene fuerza moral y anímica; ''alma'' funciona bien en español y ''sagrada'' preserva el matiz cultual de ἱεράν.'
- source_word: αἰκισμοῖς
  english_pob_choice: tortures
  chosen_spanish: torturas
  alternatives_spanish:
  - tormentos
  - maltratos crueles
  lexicon: LSJ
  rationale: El sustantivo denota abuso cruel; 'torturas' es el equivalente más directo e idiomático en el contexto del martirio.
- source_word: στρέβλαις
  english_pob_choice: the wheel
  chosen_spanish: la rueda
  alternatives_spanish:
  - racks
  - instrumentos de tortura
  lexicon: LSJ
  rationale: La referencia exacta del dispositivo es discutida, pero el audit trail inglés opta por 'the wheel'. 'La rueda' mantiene esa concreción y deja abierta la dificultad lexical.
- source_word: πυρπολούμενος
  english_pob_choice: was being burned
  chosen_spanish: era quemada
  alternatives_spanish:
  - era abrasada
  - era consumida por el fuego
  lexicon: LSJ
  rationale: El participio pasivo indica sujeción al fuego; 'era quemada' es una traducción simple y fiel en español.
- source_word: ἐκίνησεν
  english_pob_choice: stirred up
  chosen_spanish: conmovió
  alternatives_spanish:
  - agitó
  - movió
  - despertó
  lexicon: LSJ
  rationale: El efecto sobre los sitiadores es que quedaron afectados o sacudidos interiormente; 'conmovió' captura ese impacto sin reducirlo a mera emoción sentimental.
- source_word: τοὺς πολιορκοῦντας
  english_pob_choice: those besieging him
  chosen_spanish: a los que lo sitiaban
  alternatives_spanish:
  - a sus sitiadores
  - a quienes lo asediaban
  lexicon: LSJ
  rationale: Mantiene el paralelismo militar del texto y adapta el participio al español natural.
- source_word: λογισμόν
  english_pob_choice: reason
  chosen_spanish: razón
  alternatives_spanish:
  - juicio
  - reflexión
  - razonamiento
  lexicon: LSJ
  rationale: En 4 Macabeos λογισμός es un término central para la facultad racional; 'razón' es la equivalencia más concisa y doctrinalmente sensible en español.
- source_word: ὑπερασπίζοντα τῆς εὐσεβείας
  english_pob_choice: that defends godliness
  chosen_spanish: que defiende la piedad
  alternatives_spanish:
  - que defiende la devoción a Dios
  - que protege la piedad
  lexicon: LSJ
  rationale: εὐσέβεια puede rendirse como 'piedad' o 'piedad/devoción a Dios'. Aquí 'piedad' conserva la resonancia reverente y el carácter ético-religioso del término.
theological_decisions:
- issue: Rendering εὐσέβεια
  english_pob_reading: godliness
  chosen_spanish_reading: piedad
  alternative_spanish_readings:
  - devoción a Dios
  - godliness
  rationale: El inglés POB eligió 'godliness' por su naturalidad contemporánea y peso moral. En español, 'piedad' transmite reverencia y conducta devota de modo claro y tradicional, sin introducir una fórmula eclesiástica ajena al contexto.
  doctrine_reference: Translation philosophy §6 (readable modern Spanish, not archaic or overly technical)
- issue: Rendering λογισμός as the operative cause
  english_pob_reading: through the reason that defends godliness
  chosen_spanish_reading: por medio de la razón que defiende la piedad
  alternative_spanish_readings:
  - a través de la razón que defiende la piedad
  - mediante la razón que defiende la piedad
  rationale: La construcción διὰ + acusativo pide un español instrumental natural. 'Por medio de' conserva la función de medio/mediación y evita convertir la frase en mera causalidad.
  doctrine_reference: Translation philosophy §5 (consistency of key terms, or documented exception)
- issue: Preserving the martyrdom imagery of torture devices
  english_pob_reading: tortures and the wheel
  chosen_spanish_reading: torturas y la rueda
  alternative_spanish_readings:
  - tormentos y la rueda
  - torturas y instrumentos de tortura
  rationale: El texto griego mantiene una alusión concreta a medios de suplicio. 'La rueda' conserva la tensión lexical del pasaje y no la diluye en una generalidad interpretativa.
  doctrine_reference: Translation philosophy §4 (do not erase documented lexical tension)
translation_notes:
  revision_awareness: El borrador sigue la revisión reciente del inglés POB al traducir διὰ + acusativo de forma instrumental ('por medio de') y al mantener el participio presente como una relación activa de medio/causa. También preserva la tensión textual sobre στρέβλαις con una solución concreta ('la rueda') y nota alternativa en pie de página, en paralelo al audit trail inglés.
  spanish_consistency_notes:
  - Se mantiene 'razón' para λογισμός, siguiendo el valor técnico del término en 4 Macabeos.
  - Se traduce εὐσέβεια como 'piedad' en el cuerpo principal, con la posibilidad de 'devoción a Dios' indicada en la decisión léxica.
  - El tono elevado se conserva con 'santísimo' y 'alma sagrada', en coherencia con el registro retórico del libro.
  - Se preserva el paralelismo militar de 'ciudad sitiada' / 'los que lo sitiaban' para reflejar la metáfora del asedio.
