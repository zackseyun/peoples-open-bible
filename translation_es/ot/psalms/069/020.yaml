translation:
  language: es
  text: Tú conoces mi reproche, mi vergüenza y mi humillación; todos mis adversarios[a] están delante de ti.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «todos mis enemigos están delante de ti».'
    reason: lexical_alternative
lexical_decisions:
- source_word: יָדַעְתָּ
  english_pob_choice: You know
  chosen_spanish: Tú conoces
  alternatives_spanish:
  - Tú has conocido
  - Tú sabías
  lexicon: HALOT
  rationale: El perfecto 2ms de ידע en una oración dirigida a Dios expresa conocimiento pleno y vigente. En español, «tú conoces» transmite mejor esa actualidad que un perfecto más pesado, manteniendo el valor resultativo sin perder naturalidad.
- source_word: חֶרְפָּתִי
  english_pob_choice: my reproach
  chosen_spanish: mi reproche
  alternatives_spanish:
  - mi oprobio
  - mi afrenta
  lexicon: HALOT
  rationale: חרפה puede abarcar reproche, afrenta o deshonra. «Reproche» conserva el componente de insulto público y mantiene el registro bíblico, sin desdibujarlo con un término demasiado general.
- source_word: בָשְׁתִּי
  english_pob_choice: my shame
  chosen_spanish: mi vergüenza
  alternatives_spanish:
  - mi deshonra
  - mi pudor herido
  lexicon: HALOT
  rationale: בשת designa vergüenza/deshonra. «Vergüenza» es la correspondencia más directa y natural en español contemporáneo, fiel al paralelo poético del versículo.
- source_word: כְלִמָּתִי
  english_pob_choice: my humiliation
  chosen_spanish: mi humillación
  alternatives_spanish:
  - mi deshonra
  - mi oprobio
  lexicon: HALOT
  rationale: כלמה intensifica la idea de vergüenza con matiz de humillación pública. «Humillación» preserva esa progresión semántica y evita reducir el tercer término al mismo campo exacto de los dos anteriores.
- source_word: נֶגְדְּךָ
  english_pob_choice: before you
  chosen_spanish: delante de ti
  alternatives_spanish:
  - en tu presencia
  - ante ti
  lexicon: HALOT
  rationale: נגד + sufijo indica estar frente a alguien. «Delante de ti» es una fórmula clara y reverente en español; conserva la imagen espacial de estar expuesto a la mirada divina.
- source_word: צוֹרְרָי
  english_pob_choice: my adversaries
  chosen_spanish: mis adversarios
  alternatives_spanish:
  - mis enemigos
  - los que me hostigan
  lexicon: HALOT
  rationale: De צרר, el término apunta a hostilidad activa. «Adversarios» conserva ese matiz formal y evita repetir «enemigos» cuando la poesía acumula términos afines para los que se le oponen.
translation_notes:
  revision_awareness: 'La versión española sigue el audit trail del POB inglés: conserva la acumulación poética de tres sustantivos cercanos (reproche/vergüenza/humillación) y la clausula final en sentido locativo-relacional («delante de ti») sin suavizar la exposición del salmista ante Dios. No se introdujeron cambios textuales ni decisiones doctrinales adicionales; el ajuste principal fue la naturalidad del aspecto verbal en español («Tú conoces»).'
  spanish_consistency_notes:
  - Se mantiene el paralelismo de tres términos de deshonra con diferencias semánticas reconocibles.
  - «Delante de ti» conserva la imagen de presencia expuesta frente a Dios.
  - El marcador [a] queda anclado en «reproche» porque ahí surge la alternativa léxica documentada.
  - Se evita «SEÑOR» para no ocultar el lenguaje directo del texto, que aquí se dirige a Dios de forma explícita.
