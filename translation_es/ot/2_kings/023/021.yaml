translation:
  language: es
  text: 'Entonces el rey ordenó a todo el pueblo[a], diciendo: «Celebren la Pascua a Yahvé su Dios, conforme a lo que está escrito en este libro del pacto[b]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «Observen la Pascua». El hebreo dice literalmente «hagan la Pascua».
    reason: lexical_alternative
  - marker: b
    text: O «libro de este pacto». Aunque el hebreo dice literalmente «sobre», en español esta fórmula se expresa naturalmente como «en» o «en este libro del pacto».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְצַו
  english_pob_choice: commanded
  chosen_spanish: ordenó
  alternatives_spanish:
  - mandó
  - dio la orden
  lexicon: HALOT
  rationale: צוה expresa dar una orden; en español, «ordenó» comunica con naturalidad la acción real y conserva el tono narrativo de mando.
- source_word: הַמֶּלֶךְ
  english_pob_choice: the king
  chosen_spanish: el rey
  alternatives_spanish:
  - el monarca
  lexicon: HALOT
  rationale: Referencia definida al rey Josías en el contexto; «el rey» es la forma directa y natural.
- source_word: כָּל הָעָם
  english_pob_choice: all the people
  chosen_spanish: todo el pueblo
  alternatives_spanish:
  - toda la gente
  - toda la nación
  lexicon: HALOT
  rationale: עם se refiere al conjunto del pueblo reunido; «todo el pueblo» conserva el sentido colectivo y el registro bíblico sin volverlo abstracto.
- source_word: עֲשׂוּ פֶסַח
  english_pob_choice: Keep the Passover
  chosen_spanish: Celebren la Pascua
  alternatives_spanish:
  - Observen la Pascua
  - Hagan la Pascua
  lexicon: HALOT
  rationale: El hebreo dice literalmente «hagan/realicen Pascua», un modismo para observar la festividad. En español, «Celebren la Pascua» expresa la acción cultual de forma idiomática y fiel sin sonar forzado. Se conserva la tensión lexical del hebreo en la nota.
- source_word: לַיהוָה
  english_pob_choice: to Yahweh
  chosen_spanish: para Yahvé
  alternatives_spanish:
  - a Yahvé
  - para el Señor
  lexicon: HALOT
  rationale: Se mantiene el nombre divino conforme al estándar del proyecto («Yahvé»). La preposición ל aquí expresa dedicación/destino del acto cultual, por lo que «para» es natural en español.
- source_word: אֱלֹהֵיכֶם
  english_pob_choice: your God
  chosen_spanish: su Dios
  alternatives_spanish:
  - vuestro Dios
  - su Dios de ustedes
  lexicon: HALOT
  rationale: El sufijo de segunda persona plural se conserva en español con «su» en una dirección de respeto/neutralidad latinoamericana; el referente es el Dios del pueblo al que el rey habla.
- source_word: כַּכָּתוּב
  english_pob_choice: as it is written
  chosen_spanish: conforme a lo que está escrito
  alternatives_spanish:
  - como está escrito
  - según lo escrito
  lexicon: HALOT
  rationale: La fórmula indica conformidad con un texto escrito; «conforme a lo que está escrito» conserva el matiz normativo sin endurecer el castellano.
- source_word: עַל סֵפֶר הַבְּרִית הַזֶּה
  english_pob_choice: in this Book of the Covenant
  chosen_spanish: en este Libro del Pacto
  alternatives_spanish:
  - en este libro del pacto
  - sobre este Libro del Pacto
  lexicon: HALOT
  rationale: Aunque עַל es literalmente «sobre/upon», en fórmulas de escritura en español lo normal es «en». «Libro del Pacto» refleja el valor de בְּרִית como pacto/covenio; se prefirió «Pacto» por claridad litúrgica y consistencia bíblica.
theological_decisions:
- issue: Representación del nombre divino יהוה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Yahweh
  rationale: El texto hebreo usa el Tetragrámaton directamente. Conforme a la política del proyecto, se traduce como «Yahvé» para preservar el nombre del pacto y no ocultarlo bajo una convención de sustitución.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Valor del sintagma עֲשׂוּ פֶסַח
  english_pob_reading: Keep the Passover
  chosen_spanish_reading: Celebren la Pascua
  alternative_spanish_readings:
  - Observen la Pascua
  - Hagan la Pascua
  rationale: El hebreo es un modismo ritual literalmente «hacer Pascua». La traducción elegida comunica la observancia festiva en español, mientras la nota preserva la alternativa literal para no borrar la tensión lexical.
  doctrine_reference: Lexical/ritual usage in Exodus/Pentateuchal Passover legislation
translation_notes:
  revision_awareness: Se revisó el contexto auditado en inglés y no se detectaron cambios de sentido en la última pasada. La versión española sigue la decisión establecida de mantener el nombre divino como «Yahvé» y de reflejar el modismo ritual de פֶסַח sin mecanicismo.
  spanish_consistency_notes:
  - Se mantuvo el tratamiento reverente y neutral latinoamericano con «su Dios» para el sufijo plural.
  - «Pascua» conserva el término bíblico usual en español, mientras la nota explica el modismo hebreo.
  - «Libro del Pacto» sigue la terminología del documento covenantal sin introducir una glosa doctrinal ajena al texto.
