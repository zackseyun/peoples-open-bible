    rationale: בְּעֵינָיו es literalmente "en sus ojos" / "a sus ojos" en sentido idiomático de autoevaluación. En esta construcción con "sabio", el español más fiel y legible es "sabio en sus propios ojos"; el borrador actual suena calco poco natural.
  - severity: low
