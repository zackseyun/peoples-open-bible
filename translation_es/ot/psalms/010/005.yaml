  text: יָ֘חִ֤ילוּ דרכ/ו בְּ/כָל עֵ֗ת מָר֣וֹם מִ֭שְׁפָּטֶי/ךָ מִ/נֶּגְדּ֑/וֹ כָּל צ֝וֹרְרָ֗י/ו יָפִ֥יחַ בָּ/הֶֽם׀־־׃
base_translation:
  language: en
  yaml_path: translation/ot/psalms/010/005.yaml
  text: His ways prosper at all times[a]; your judgments are on high, out of his sight; as for all his adversaries[b], he snorts at them.
  footnotes:
  - marker: a
    text: Or 'His ways are firm at all times.' The Hebrew verb is difficult and has also been understood in a sense related to writhing or travail, but the context favors the idea of ongoing success or security.
    reason: lexical_alternative
  - marker: b
    text: Literally 'he puffs/snorts at them,' a vivid image of contempt.
    reason: lexical_alternative
