translation:
  language: es
  text: Y yo fortaleceré los brazos del rey de Babilonia[a], y pondré mi espada en su mano; pero quebraré los brazos de Faraón, y él gemirá delante de él con los gemidos de un hombre caído.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «delante de mí», si el pronombre final se entiende como referido a Yahvé y no al rey de Babilonia.'
    reason: alternative_reading
lexical_decisions:
- source_word: חִזַּקְתִּי
  english_pob_choice: I will strengthen
  chosen_spanish: fortaleceré
  alternatives_spanish:
  - haré fuerte
  - daré fuerza a
  lexicon: HALOT
  rationale: El verbo hebreo expresa reforzar o dar fuerza; en español, 'fortaleceré' comunica bien la acción divina y conserva la imagen de habilitar para el poder militar.
- source_word: זְרֹעוֹת
  english_pob_choice: arms
  chosen_spanish: brazos
  alternatives_spanish:
  - brazos/poder
  - fuerza
  lexicon: HALOT
  rationale: '''Brazos'' mantiene la metáfora corporal concreta del hebreo y permite conservar el contraste con ''quebraré los brazos'' en la segunda mitad del versículo.'
- source_word: מֶלֶךְ בָּבֶל
  english_pob_choice: the king of Babylon
  chosen_spanish: el rey de Babilonia
  alternatives_spanish:
  - el rey babilonio
  lexicon: HALOT
  rationale: La construcción posesiva se traduce de forma directa y natural en español, sin añadir un nombre propio que el hebreo no da.
- source_word: נָתַתִּי אֶת חַרְבִּי בְּיָדוֹ
  english_pob_choice: I will put my sword into his hand
  chosen_spanish: pondré mi espada en su mano
  alternatives_spanish:
  - meteré mi espada en su mano
  - daré mi espada en su mano
  lexicon: HALOT
  rationale: '''Pondré... en su mano'' reproduce la imagen idiomática de otorgar a Babilonia el instrumento del juicio divino con español natural.'
- source_word: חַרְבִּי
  english_pob_choice: my sword
  chosen_spanish: mi espada
  alternatives_spanish:
  - la espada mía
  lexicon: HALOT
  rationale: El posesivo es importante porque la guerra de Babilonia se presenta como instrumento de Yahvé; 'mi espada' preserva esa relación.
- source_word: שָׁבַרְתִּי
  english_pob_choice: I will break
  chosen_spanish: quebraré
  alternatives_spanish:
  - romperé
  - destrozaré
  lexicon: HALOT
  rationale: '''Quebraré'' conserva la imagen de ''broken arm'' y suena más bíblico sin perder claridad.'
- source_word: זְרֹע֣וֹת פַּרְעֹה
  english_pob_choice: the arms of Pharaoh
  chosen_spanish: los brazos de Faraón
  alternatives_spanish:
  - la fuerza de Faraón
  - los brazos del Faraón
  lexicon: HALOT
  rationale: Mantener 'brazos' conserva la simetría con la primera cláusula y la metáfora de poder físico/militar.
- source_word: נָאַק
  english_pob_choice: he will groan
  chosen_spanish: gemirá
  alternatives_spanish:
  - gimoteará
  - clamará
  lexicon: HALOT
  rationale: '''Gemirá'' expresa dolor intenso y resulta idiomático en español, manteniendo el matiz de queja angustiada.'
- source_word: נַאֲקוֹת
  english_pob_choice: with the groanings
  chosen_spanish: con los gemidos
  alternatives_spanish:
  - con quejidos
  - con los lamentos
  lexicon: HALOT
  rationale: La construcción nominal intensifica el verbo previo; 'con los gemidos' reproduce bien la reiteración semítica sin sonar artificial.
- source_word: חָלָל
  english_pob_choice: of a slain man
  chosen_spanish: de un herido de muerte
  alternatives_spanish:
  - de un muerto
  - de un caído
  lexicon: HALOT
  rationale: Aunque el audit trail inglés fija 'slain man', en español 'herido de muerte' comunica mejor la idea de alguien abatido en combate y evita una posible ambigüedad de 'muerto'.
- source_word: לְפָנָיו
  english_pob_choice: before him
  chosen_spanish: delante de él
  alternatives_spanish:
  - en su presencia
  - ante él
  lexicon: HALOT
  rationale: '''Delante de él'' conserva la ambigüedad relevante del referente pronominal y funciona naturalmente en español.'
theological_decisions:
- issue: Referente del pronombre final en לְפָנָיו
  english_pob_reading: The pronoun refers to the king of Babylon, so Pharaoh groans before him.
  chosen_spanish_reading: El pronombre se mantiene ambiguo en español, de modo que puede leerse que Faraón gime delante del rey de Babilonia.
  alternative_spanish_readings:
  - Faraón gime delante de Yahvé.
  rationale: El hebreo admite una ambigüedad real; conservarla en español evita cerrar prematuramente la referencia y respeta el auditable tensionamiento señalado en el POB inglés.
  doctrine_reference: Preservar ambigüedad textual cuando el antecedente del pronombre es debatible.
translation_notes:
  revision_awareness: La versión inglesa revisada cambió 'mortally wounded man' por 'slain man' para ajustar חָלָל con más precisión. En español se optó por 'herido de muerte' para conservar el matiz de abatimiento mortal de forma natural, sin borrar la lectura de muerte/caída en combate que el contexto exige.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' para el nombre divino cuando la lectura alternativa lo implica.
  - Se conserva la metáfora corporal de 'brazos' en ambas mitades del versículo para reflejar el paralelismo hebreo.
  - '''Gemirá con los gemidos'' reproduce el paralelismo cognado del hebreo sin volverlo redundante en exceso.'
  - La nota alternativa de la referencia pronominal se ancla en 'delante de él' para reflejar la tensión textual documentada.
