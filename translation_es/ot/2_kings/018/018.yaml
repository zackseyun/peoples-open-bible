translation:
  language: es
  text: Y llamaron al rey, y Eliaquim hijo de Hilquías, el encargado de la casa[b], salió a su encuentro[a], junto con Sebna el escriba[c] y Joaj hijo de Asaf, el registrador.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «salió hacia ellos».'
    reason: lexical_alternative
  - marker: b
    text: Título administrativo; también puede entenderse como «el encargado del palacio».
    reason: cultural_note
  - marker: c
    text: 'O: «el secretario».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּקְרְאוּ אֶל הַמֶּלֶךְ
  english_pob_choice: they called to the king
  chosen_spanish: llamaron al rey
  alternatives_spanish:
  - llamaron al rey
  - llamaron hacia el rey
  - mandaron llamar al rey
  lexicon: BDB/HALOT
  rationale: El hebreo con קרא + אֶל puede expresar dirigirse a alguien, llamarlo o pedir su presencia. En español, "llamaron al rey" transmite de manera natural la acción sin añadir una formalidad de "mandaron llamar" que el hebreo no obliga.
- source_word: וַיֵּצֵא אֲלֵהֶם
  english_pob_choice: came out to them
  chosen_spanish: salieron hacia ellos
  alternatives_spanish:
  - salió hacia ellos
  - fue hacia ellos
  - salió a su encuentro
  lexicon: BDB/HALOT
  rationale: 'Aunque el inglés POB eligió un singular narrativo desde la perspectiva del relato, el hebreo presenta un verbo plural: "salieron". El sentido es que los oficiales se acercaron al grupo que los había llamado, por eso "hacia ellos" conserva el movimiento sin forzar una equivalencia demasiado interpretativa.'
- source_word: אֶלְיָקִים בֶּן חִלְקִיָּהוּ
  english_pob_choice: Eliakim son of Hilkiah
  chosen_spanish: Eliaquim hijo de Hilquías
  alternatives_spanish:
  - Eliacim hijo de Hilquías
  - Eliaquim hijo de Hilcías
  lexicon: Transliteración bíblica estándar
  rationale: Se conserva el nombre propio con transliteración española tradicional y clara. "Hijo de" mantiene el patronímico hebreo sin añadir interpretación.
- source_word: אֲשֶׁר עַל הַבָּיִת
  english_pob_choice: who was over the household
  chosen_spanish: el encargado de la casa
  alternatives_spanish:
  - el que estaba sobre la casa
  - el mayordomo
  - el encargado del palacio
  lexicon: HALOT
  rationale: El título es administrativo. "Encargado de la casa" conserva la imagen de בית y evita importar "mayordomo" o "palacio" como equivalentes más estrechos o más cargados de tradición. Es una solución natural en español y suficientemente literal.
- source_word: הַסֹּפֵר
  english_pob_choice: the scribe
  chosen_spanish: el escriba
  alternatives_spanish:
  - el secretario
  - el escribiente
  lexicon: HALOT
  rationale: '"Scribe" se rinde mejor como "escriba", término transparente y cercano al valor administrativo del hebreo. "Secretario" sería posible, pero desplaza el matiz de oficio de escritura/registro.'
- source_word: וְיוֹאָח בֶּן אָסָף הַמַּזְכִּיר
  english_pob_choice: Joah son of Asaph, the recorder
  chosen_spanish: Joaj hijo de Asaf, el registrador
  alternatives_spanish:
  - Joaj hijo de Asaf, el secretario
  - Joaj hijo de Asaf, el cronista
  lexicon: HALOT
  rationale: הַמַּזְכִּיר designa un oficial de corte encargado de recordar, registrar o llevar memorias administrativas. "Registrador" comunica mejor la función oficial en español contemporáneo sin perder el componente documental. Se mantiene el nombre propio en transliteración española usual.
theological_decisions:
- issue: Títulos administrativos cortesanos
  english_pob_reading: Administrative title rendered as 'who was over the household' and 'the recorder'
  chosen_spanish_reading: '"el encargado de la casa" y "el registrador"'
  alternative_spanish_readings:
  - '"el mayordomo" y "el secretario"'
  - '"el encargado del palacio" y "el cronista"'
  rationale: 'No hay una cuestión doctrinal directa, pero sí una decisión de fidelidad terminológica: el texto presenta cargos de corte, no meros oficios domésticos o literarios. Las opciones elegidas conservan el carácter oficial y la posible amplitud semántica de los títulos hebreos.'
  doctrine_reference: N/A
translation_notes:
  revision_awareness: 'El borrador sigue la revisión inglesa más cercana a אֶל: "called to the king". A la vez, respeta el plural hebreo en וַיֵּצֵא אֲלֵהֶם con "salieron hacia ellos". No se introduce una lectura doctrinal nueva; solo se afinan los títulos y el movimiento verbal según el hebreo.'
  spanish_consistency_notes:
  - Se mantiene "Yahvé" fuera de este versículo porque no aparece el nombre divino.
  - Se usa "escriba" para סֹפֵר y "registrador" para הַמַּזְכִּיר, preservando la distinción entre ambos cargos.
  - 'Los nombres propios se transliteran de forma española estándar: Eliaquim, Hilquías, Sebna, Joaj, Asaf.'
