translation:
  language: es
  text: Y el resto de los hechos de Yoram[a], y todo lo que hizo, ¿no están escritos en el Libro de las Crónicas[b] de los reyes de Judá?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebreo Yoram; tradicionalmente, Jehoram.
    reason: alternative_reading
  - marker: b
    text: 'O: «de los anales».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְיֶתֶר
  english_pob_choice: Now the rest of
  chosen_spanish: Y el resto de
  alternatives_spanish:
  - Y lo restante de
  - Y los demás de
  lexicon: HALOT
  rationale: יֶתֶר expresa 'resto' o 'remanente'. En esta fórmula historiográfica, 'el resto de' comunica bien la referencia al conjunto de datos regios que no se consignan aquí. Conservo la coordinación inicial con 'Y' por el וְ del hebreo.
- source_word: דִּבְרֵי
  english_pob_choice: acts
  chosen_spanish: los hechos
  alternatives_spanish:
  - las acciones
  - los actos
  - los asuntos
  lexicon: HALOT
  rationale: Aunque literalmente puede significar 'palabras' o 'asuntos', en esta fórmula regnal apunta a las acciones o acontecimientos de un rey. 'Hechos' es natural en español y preserva el sentido historiográfico sin perder formalidad.
- source_word: יוֹרָם
  english_pob_choice: Yoram
  chosen_spanish: Joram
  alternatives_spanish:
  - Yoram
  lexicon: Conventional Spanish biblical name form
  rationale: El hebreo presenta יוֹרָם. En español bíblico, 'Joram' es la forma asentada y más reconocible para este rey, aunque 'Yoram' sería más cercano al hebreo consonántico. Aquí se adopta la forma tradicional por inteligibilidad e identificación canónica.
- source_word: וְכָל אֲשֶׁר עָשָׂה
  english_pob_choice: and all that he did
  chosen_spanish: y todo lo que hizo
  alternatives_spanish:
  - y cuanto hizo
  - y todo cuanto hizo
  lexicon: HALOT
  rationale: La cláusula relativa es directa. 'Todo lo que hizo' conserva la amplitud del hebreo וְכָל אֲשֶׁר עָשָׂה con sintaxis natural en español.
- source_word: הֲלוֹא
  english_pob_choice: are they not
  chosen_spanish: ¿no están
  alternatives_spanish:
  - ¿acaso no están
  - ¿no es verdad que están
  lexicon: HALOT
  rationale: הֲלוֹא introduce una pregunta retórica que espera respuesta afirmativa. En español, '¿no están...?' reproduce de manera natural esa fuerza interrogativa.
- source_word: הֵם כְּתוּבִים
  english_pob_choice: are they not written
  chosen_spanish: están escritos
  alternatives_spanish:
  - están registrados
  - están anotados
  lexicon: HALOT
  rationale: כְּתוּבִים significa literalmente 'escritos'. En esta construcción, el español puede omitir la repetición del pronombre explícito sin perder el sentido retórico; 'están escritos' mantiene la imagen de un registro escrito.
- source_word: עַל סֵפֶר
  english_pob_choice: in the Book
  chosen_spanish: en el Libro
  alternatives_spanish:
  - en el rollo
  - en el libro
  lexicon: HALOT
  rationale: La preposición עַל con סֵפֶר funciona aquí como referencia a un documento/registro escrito. 'En el Libro' sigue la convención de citar un registro oficial y suena natural en español bíblico.
- source_word: סֵפֶר דִּבְרֵי הַיָּמִים
  english_pob_choice: the Book of the Chronicles
  chosen_spanish: de las Crónicas
  alternatives_spanish:
  - de los anales
  - de los hechos de los días
  lexicon: HALOT
  rationale: דִּבְרֵי הַיָּמִים es la fórmula del registro cronístico real. En español, 'Crónicas' conserva el valor convencional y el carácter de documento histórico, tal como lo hace la POB en inglés con 'Chronicles'.
- source_word: לְמַלְכֵי יְהוּדָה
  english_pob_choice: of the Kings of Judah
  chosen_spanish: de los reyes de Judá
  alternatives_spanish:
  - para los reyes de Judá
  - perteneciente a los reyes de Judá
  lexicon: HALOT
  rationale: El לְ aquí marca pertenencia/título del registro. 'De los reyes de Judá' es la formulación más idiomática en español para este encabezado documental.
translation_notes:
  revision_awareness: La revisión auditada indica alta concordancia y no registra cambios sustantivos; por eso se mantiene la fórmula regnal estándar sin ajustes de sentido.
  spanish_consistency_notes:
  - Se conserva la estructura retórica de pregunta esperada afirmativa.
  - Se usa 'Libro de las Crónicas' como título documental convencional, sin ocultar el matiz de registro histórico.
  - Se adopta 'Joram' por la forma española tradicional, con nota sobre el hebreo.
  - '''Hechos'' traduce el valor historiográfico de דִּבְרֵי dentro de la fórmula regnal.'
