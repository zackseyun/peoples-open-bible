base_translation:
  language: en
  yaml_path: translation/ot/1_samuel/017/054.yaml
  text: David took the head of the Philistine and brought it to Jerusalem[b][a], and he put his weapons in his tent.
  footnotes:
  - marker: a
    text: Or 'his gear' or 'his equipment'; the Hebrew term is broad and can include weapons, armor, or military articles.
    reason: lexical_alternative
  - marker: b
    text: Some readers see a chronological tension in 'brought it to Jerusalem,' since Jerusalem was not yet fully under Israelite control at this point in the broader narrative. The translation preserves the Hebrew wording rather than harmonizing it.
    reason: cultural_note
