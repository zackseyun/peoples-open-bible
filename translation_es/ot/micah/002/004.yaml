review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura general del hebreo y las principales decisiones del POB en cuanto a ruina, porción, remoción y la ambigüedad de לְשׁוֹבֵב. Sin embargo, en dos puntos se aparta innecesariamente del sentido auditado: מָשָׁל en este contexto de juicio dirigido ''contra ustedes'' debe ir como burla/dicho de reproche, no como ''parábola'', que en español moderno introduce un género distinto y puede desorientar; y שָׂדֵינוּ יְחַלֵּק con לְשׁוֹבֵב se expresa mejor como ''divide/reparte nuestros campos para/al que se aparta'', no ''le reparte nuestros campos'' sin nota, porque el pronombre dativo singular suena algo trabado y no preserva la alternativa documentada.'
  spanish_quality_summary: El español es mayormente claro y digno, pero 'se levantará contra ustedes una parábola' resulta poco natural y semánticamente engañoso para lectores hispanos. 'Se lamentará una lamentación' conserva la repetición, aunque una formulación activa como 'se entonará un lamento' sería más idiomática; aun así puede mantenerse por transparencia formal. La frase final necesita una nota para conservar la ambigüedad difícil ya documentada en inglés.
  glossary_alignment: No hay conflicto con la terminología principal del proyecto. Las decisiones sobre 'porción', 'mi pueblo' y 'al que se aparta/desvía' son compatibles con el rastro inglés. La principal desalineación léxica es usar 'parábola' para מָשָׁל aquí, donde el POB inglés escogió 'taunt' por contexto judicial y burlesco.
  issues:
  - severity: high
    issue: '''parábola'' para מָשָׁל en este versículo'
    rationale: Aunque מָשָׁל puede abarcar proverbio/parábola en otros contextos, aquí el audit trail fijó el valor de dicho de burla/taunt contra ustedes. En español, 'parábola' activa otro género literario y pierde el matiz de reproche público.
  - severity: medium
    issue: Falta nota para לְשׁוֹבֵב
    rationale: El inglés POB preserva explícitamente la ambigüedad de este término difícil. El español principal puede decir 'al que se aparta', pero debe conservar alternativas como 'al rebelde' o 'al captor/al que vuelve atrás' en nota.
  - severity: low
    issue: '''le reparte nuestros campos'' suena menos natural y menos transparente'
    rationale: La construcción con dativo singular sin apoyo de nota puede sentirse abrupta. 'divide nuestros campos para/al que se aparta' o 'reparte nuestros campos al que se aparta' comunica mejor la relación sintáctica y el acto de despojo.
  revised_spanish_text: 'En aquel día se levantará contra ustedes una burla[a], y se lamentará una lamentación[b], diciendo: «¡Estamos totalmente arruinados! Él cambia la porción de mi pueblo. ¡Cómo me la quita! Al que se aparta[c] le reparte nuestros campos».

    '
