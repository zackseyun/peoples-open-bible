translation:
  language: es
  text: Pero alégrense todos los que se refugian en ti; para siempre griten de alegría[a]. Extiende tu protección sobre ellos[b], para que se regocijen en ti los que aman tu nombre.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'También: "canten con júbilo para siempre". El verbo hebreo puede denotar gritos jubilosos y también puede incluir canto.'
    reason: lexical_alternative
  - marker: b
    text: 'También: "cúbrelos" o "ampáralos". La imagen hebrea es la de una cobertura protectora.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְיִשְׂמְחוּ
  english_pob_choice: let ... rejoice
  chosen_spanish: alégrense
  alternatives_spanish:
  - que se alegren
  - que regocíjense
  lexicon: HALOT
  rationale: En este contexto de oración, el imperfecto hebreo funciona como deseo/petición. El español exhortativo 'alégrense' preserva esa fuerza volitiva sin convertirlo en una simple predicción futura.
- source_word: חוֹסֵי בָךְ
  english_pob_choice: who take refuge in you
  chosen_spanish: los que se refugian en ti
  alternatives_spanish:
  - los que buscan refugio en ti
  - los que confían en ti
  lexicon: HALOT
  rationale: חסה expresa la imagen concreta de buscar protección. 'Refugiarse' conserva mejor el matiz físico y relacional que 'confiar'.
- source_word: לְעוֹלָם
  english_pob_choice: forever
  chosen_spanish: para siempre
  alternatives_spanish:
  - eternamente
  - por siempre
  lexicon: HALOT
  rationale: La idea es de duración continua. 'Para siempre' es natural en español bíblico y mantiene la amplitud temporal del hebreo.
- source_word: יְרַנֵּנוּ
  english_pob_choice: let them shout for joy
  chosen_spanish: canten con júbilo
  alternatives_spanish:
  - griten de alegría
  - entonen cantos de alegría
  lexicon: HALOT
  rationale: El verbo רנן incluye gritos jubilosos y puede implicar canto. 'Canten con júbilo' preserva ese gozo sonoro sin estrecharlo solo a 'cantar' ni endurecerlo solo como 'gritar'.
- source_word: וְתָסֵךְ עָלֵימוֹ
  english_pob_choice: Spread your protection over them
  chosen_spanish: Extiende tu protección sobre ellos
  alternatives_spanish:
  - cúbrelos
  - protégelos
  lexicon: HALOT
  rationale: סכך lleva la imagen de cubrir/sombrear con protección. El español 'Extiende tu protección sobre ellos' expresa la metáfora de cobertura protectora sin perder claridad.
- source_word: וְיַעְלְצוּ בְךָ
  english_pob_choice: may exult in you
  chosen_spanish: se llenen de gozo en ti
  alternatives_spanish:
  - se regocijen en ti
  - exulten en ti
  lexicon: HALOT
  rationale: עלץ denota un gozo exuberante. 'Se llenen de gozo' comunica alegría intensa en español sobrio; la alternativa 'exulten' es válida pero menos natural para lectura pública.
- source_word: אֹהֲבֵי שְׁמֶךָ
  english_pob_choice: those who love your name
  chosen_spanish: los que aman tu nombre
  alternatives_spanish:
  - los amantes de tu nombre
  - los que te aman
  lexicon: HALOT
  rationale: El hebreo dice explícitamente 'tu nombre', expresión del carácter y reputación revelada de Dios. No se reduce a 'te aman' para no borrar ese matiz covenantal.
theological_decisions:
- issue: Valor volitivo de los verbos imperfectos en una oración poética
  english_pob_reading: Render the imperfects/jussive-like forms as petitions ('let...,' 'may...') rather than simple future statements.
  chosen_spanish_reading: Usar formas exhortativas/petitivas ('alégrense', 'canten con júbilo', 'se llenen de gozo') en vez de futuros simples.
  alternative_spanish_readings:
  - se alegrarán... cantarán... exultarán
  rationale: El salmo es una súplica bendicional. Traducirlos como futuros perdería la fuerza de deseo dirigida a Dios y el tono litúrgico del verso.
  doctrine_reference: Translation philosophy §3 (preserve tension where ambiguity exists)
- issue: Alcance de 'tu nombre' como expresión teológica
  english_pob_reading: those who love your name
  chosen_spanish_reading: los que aman tu nombre
  alternative_spanish_readings:
  - los que te aman
  rationale: '''Nombre'' en hebreo no es un mero rótulo, sino una forma de hablar del carácter, fama y revelación de Dios. Mantenerlo evita aplanar el sentido.'
  doctrine_reference: Uso bíblico del 'nombre' divino en el AT
translation_notes:
  revision_awareness: 'La redacción sigue de cerca el texto hebreo y el audit trail inglés: mantiene el tono de oración, conserva la imagen de refugio y cobertura, y respeta la ambigüedad verbal entre júbilo sonoro y canto. No se introdujeron cambios textuales respecto al último pase auditado.'
  spanish_consistency_notes:
  - Se usa 'Dios' implícito mediante el pronombre 'ti/tu' siguiendo el hebreo dirigido a Yahvé en oración.
  - '''Para siempre'' mantiene la duración indefinida de לְעוֹלָם sin convertirla en una explicación interpretativa.'
  - '''Tu nombre'' se conserva de forma consistente como expresión teológica del carácter revelado de Dios.'
  - La puntuación separa las dos peticiones principales y conserva el paralelismo poético del versículo.
