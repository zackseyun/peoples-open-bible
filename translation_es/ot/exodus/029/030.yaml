review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el sentido del hebreo: duración temporal, sucesión sacerdotal dentro de los hijos de Aarón, entrada en la tienda de reunión y servicio en el lugar santo. Sin embargo, hay un detalle léxico en la nota [a] que no preserva con precisión la alternativa inglesa/auditada para ילבשם.'
  spanish_quality_summary: El español es claro, natural y de registro digno. 'Durante siete días', 'de entre sus hijos', 'tienda de reunión' y 'lugar santo' funcionan bien. La única reparación necesaria es en la nota [a], porque 'se las vestirá' suena poco natural y además desplaza el contraste correcto entre 'ponerse' y 'llevar/usar puesto'.
  glossary_alignment: 'No hay conflictos con la terminología base del proyecto. La terminología cultual está bien resuelta: ''sacerdote'', ''tienda de reunión'', ''ministrar'', ''lugar santo''.'
  issues:
  - severity: medium
    issue: La nota [a] usa «se las vestirá» como alternativa de ילבשם.
    rationale: El inglés auditado preserva la alternativa 'shall wear them', no 'dress them'. En español, «vestirse algo» es marginal y «vestirlas» suele significar vestir a otra persona o poner ropa sobre algo. La alternativa fiel y natural es «las llevará puestas» o «las usará»; «las llevará puestas» conserva mejor el contraste con «se las pondrá».
  - severity: low
    issue: La nota [b] comienza con una comilla/apóstrofo innecesario.
    rationale: Hay una marca inicial extra antes de 'Literalmente'. Es un detalle de puntuación menor, pero conviene corregirlo para pulcritud editorial.
  revised_spanish_text: Durante siete días el sacerdote de entre sus hijos, que lo suceda, se las pondrá[a][b], cuando entre en la tienda de reunión para ministrar en el lugar santo[c].
  revised_footnotes:
  - marker: a
    text: O «las llevará puestas». El verbo hebreo puede significar tanto «ponerse» como «llevar puesto», según el contexto.
    reason: lexical_alternative
  - marker: b
    text: 'Literalmente: «el sacerdote debajo de él de entre sus hijos», es decir, el sacerdote que lo sucede.'
    reason: lexical_alternative
  - marker: c
    text: O «en el santuario».
    reason: lexical_alternative
  revision_rationale: El texto principal puede mantenerse. Solo se corrige la nota lexical de ילבשם para reflejar con precisión la alternativa fuente ('wear them') en español natural, y se limpia una pequeña anomalía de puntuación en la nota [b].
