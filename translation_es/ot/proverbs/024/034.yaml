translation:
  language: es
  text: y tu pobreza vendrá como un merodeador[a], y tu necesidad como un hombre armado.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «como un hombre con escudo».
    reason: lexical_alternative
lexical_decisions:
- source_word: וּבָא
  english_pob_choice: and ... will come
  chosen_spanish: vendrá
  alternatives_spanish:
  - y vendrá
  - vendrá entonces
  lexicon: HALOT
  rationale: El hebreo une la consecuencia proverbial con ו־ y un verbo de venir. En español, el futuro simple expresa bien la advertencia proverbial sin forzar una estructura extraña; el sentido consecutivo queda implícito en el contexto.
- source_word: מִתְהַלֵּךְ
  english_pob_choice: prowler
  chosen_spanish: merodeador
  alternatives_spanish:
  - que merodea
  - deambulante
  - rondador
  lexicon: HALOT
  rationale: El participio hitpael de הלך describe movimiento repetido o de ronda. En español, "merodeador" conserva la idea de alguien que se mueve acechando o rondando, y funciona mejor que un calco como "caminando de un lado a otro".
- source_word: רֵישֶׁךָ
  english_pob_choice: your poverty
  chosen_spanish: tu pobreza
  alternatives_spanish:
  - tu penuria
  - tu destitución
  lexicon: HALOT
  rationale: רֵישׁ denota pobreza o empobrecimiento. "Pobreza" es la equivalencia más natural y clara en español moderno, manteniendo el tono proverbial.
- source_word: וּמַחְסֹרֶיךָ
  english_pob_choice: and your need
  chosen_spanish: tu escasez
  alternatives_spanish:
  - tu necesidad
  - tu falta
  lexicon: HALOT
  rationale: מַחְסֹר expresa falta, carencia o necesidad. "Escasez" reproduce bien la idea de carencia persistente en español y evita repetir "necesidad" junto a "pobreza" de manera demasiado plana.
- source_word: כְּאִישׁ מָגֵן
  english_pob_choice: like an armed man
  chosen_spanish: como un hombre armado
  alternatives_spanish:
  - como un hombre con escudo
  - como un hombre con armas
  lexicon: HALOT
  rationale: La expresión literal se refiere a un hombre equipado con escudo, pero en español "hombre armado" comunica con fuerza la imagen de amenaza y está suficientemente respaldado por el valor idiomático del hebreo. Se preserva la alternativa más literal en la nota.
theological_decisions:
- issue: Imagen proverbial de amenaza personificada
  english_pob_reading: poverty will come like a prowler, and your need like an armed man
  chosen_spanish_reading: tu pobreza vendrá como un merodeador, y tu escasez como un hombre armado
  alternative_spanish_readings:
  - tu pobreza vendrá como un ladrón, y tu necesidad como un hombre armado
  - tu pobreza vendrá rondando, y tu escasez como un hombre con escudo
  rationale: 'No hay un asunto doctrinal disputado, pero sí una decisión imagética: el hebreo personifica la pobreza y la carencia como figuras amenazantes. "Merodeador" mantiene el carácter inquietante sin suavizar la advertencia; "hombre armado" conserva la segunda comparación como imagen de peligro directo.'
  doctrine_reference: Proverbios sapienciales; no aplica una doctrina específica
translation_notes:
  revision_awareness: La versión inglesa auditada pasó de "come stalking" a "come like a prowler" para reflejar con más naturalidad la construcción hebrea. La redacción española sigue esa misma decisión al elegir "vendrá como un merodeador", evitando un calco verbal y manteniendo la imagen de amenaza progresiva.
  spanish_consistency_notes:
  - Se usó "Yahvé" solo cuando el texto lo exija; este versículo no contiene el nombre divino.
  - Se evitó "SEÑOR" y también traducciones eclesiásticas innecesarias que no corresponden al hebreo de este proverbio.
  - '"Hombre armado" conserva el peso idiomático de איש מגן; la nota ofrece la opción literal con "escudo".'
  - 'El paralelismo hebreo se reflejó con dos miembros coordinados por "y" y con possessivos explícitos: "tu pobreza" / "tu escasez".'
