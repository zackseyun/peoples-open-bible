translation:
  language: es
  text: 'Alzó la vista y vio a Benjamín[a], su hermano, hijo de su madre, y dijo: «¿Es este su hermano menor, del que me hablaron?» Luego dijo: «Dios te muestre gracia, hijo mío».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más literalmente: «su hermano, hijo de su madre», subrayando que Benjamín era hermano pleno de José por la misma madre.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּשָּׂא עֵינָיו
  english_pob_choice: He lifted up his eyes
  chosen_spanish: Alzó sus ojos
  alternatives_spanish:
  - Levantó sus ojos
  - Alzó la vista
  lexicon: HALOT
  rationale: La expresión hebrea es idiomática; en español, «alzó sus ojos» conserva el giro narrativo y su fuerza visual sin sonar forzado.
- source_word: וַיַּרְא
  english_pob_choice: and saw
  chosen_spanish: y vio
  alternatives_spanish:
  - y miró
  - y contempló
  lexicon: HALOT
  rationale: El verbo ראה aquí significa ver de manera directa; «vio» es la equivalencia más simple y fiel.
- source_word: אֶת בִּנְיָמִין
  english_pob_choice: Benjamin
  chosen_spanish: a Benjamín
  alternatives_spanish:
  - a Benjamin
  lexicon: HALOT
  rationale: Se conserva el nombre propio en forma española común, Benjamín.
- source_word: אָחִיו בֶּן אִמּוֹ
  english_pob_choice: his brother, his mother's son
  chosen_spanish: su hermano, hijo de su madre
  alternatives_spanish:
  - su hermano, el hijo de su madre
  - su hermano carnal
  lexicon: HALOT
  rationale: Se mantiene la aposición literal para no borrar el énfasis textual en que era hijo de la misma madre. «Hermano carnal» sería interpretativo y más cerrado que el hebreo.
- source_word: הֲזֶה
  english_pob_choice: Is this
  chosen_spanish: ¿Es este
  alternatives_spanish:
  - ¿Es éste
  lexicon: HALOT
  rationale: Interrogativo demostrativo natural en español; la forma con artículo demostrativo es idiomática y suficiente.
- source_word: אֲחִיכֶם הַקָּטֹן
  english_pob_choice: your youngest brother
  chosen_spanish: vuestro hermano menor
  alternatives_spanish:
  - vuestro hermano más pequeño
  - vuestro hermano menor de edad
  lexicon: HALOT
  rationale: En el contexto narrativo se refiere al menor de los hermanos; «menor» comunica el orden familiar sin añadir «joven» como rasgo de edad física. Se mantiene el plural de segunda persona como en el hebreo y en la POB inglesa.
- source_word: אֲשֶׁר אֲמַרְתֶּם אֵלָי
  english_pob_choice: of whom you spoke to me
  chosen_spanish: del que me hablasteis
  alternatives_spanish:
  - de quien me hablasteis
  - del cual me hablasteis
  lexicon: HALOT
  rationale: El hebreo literalmente dice «del que me dijisteis / hablasteis», y el español natural aquí es «me hablasteis». Se conserva el tono formal sin desfigurarlo con una paráfrasis más amplia.
- source_word: אֱלֹהִים
  english_pob_choice: God
  chosen_spanish: Dios
  alternatives_spanish:
  - Dios mismo
  lexicon: HALOT
  rationale: El término hebreo se refiere aquí inequívocamente a Dios; se traduce con el nombre común español sin introducir el nombre divino donde el hebreo no lo usa.
- source_word: יָחְנְךָ
  english_pob_choice: be gracious to you
  chosen_spanish: te conceda gracia
  alternatives_spanish:
  - te sea propicio
  - te muestre favor
  lexicon: HALOT
  rationale: El verbo חנן expresa favor/gracia. En español, «te conceda gracia» preserva la fuerza benedictoria sin reducirla a mera amabilidad o favor social.
- source_word: בְּנִי
  english_pob_choice: my son
  chosen_spanish: hijo mío
  alternatives_spanish:
  - mi hijo
  lexicon: HALOT
  rationale: «Hijo mío» suena más natural en la apelación directa y mantiene el afecto paternal del hebreo. Se evita neutralizar la relación con un vocativo menos íntimo.
theological_decisions:
- issue: Fórmula de bendición con אֱלֹהִים en subjuntivo/jusivo
  english_pob_reading: May God be gracious to you, my son
  chosen_spanish_reading: Dios te conceda gracia, hijo mío
  alternative_spanish_readings:
  - Que Dios te sea propicio, hijo mío
  - Dios sea gracioso contigo, hijo mío
  rationale: El hebreo expresa un deseo/bendición. En español, el subjuntivo «te conceda» comunica con claridad ese valor optativo sin añadir un «que» obligatorio. Se mantiene la referencia a Dios como sujeto de la bendición y no se sustituye por una fórmula eclesiástica no presente en el texto.
  doctrine_reference: 'Translation philosophy: optimal equivalence; preserve source sense without paraphrastic expansion.'
- issue: Énfasis en la maternidad compartida de Benjamín y José
  english_pob_reading: his brother, his mother's son
  chosen_spanish_reading: su hermano, hijo de su madre
  alternative_spanish_readings:
  - su hermano de madre
  - su hermano carnal
  rationale: La expresión hebrea destaca la misma madre. En español se conserva la tensión lexical sin convertirla en una glosa interpretativa cerrada; esto preserva el valor narrativo del detalle.
  doctrine_reference: Lexical transparency and source-grounded precision.
translation_notes:
  revision_awareness: 'El audit trail inglés revisó la clausula relativa para preferir una forma más formal y cercana: «of whom you spoke to me». En español se reflejó con «del que me hablasteis», manteniendo la relación formal y sin ampliar el sentido. También se conservó el matiz de bendición con un subjuntivo natural en español.'
  spanish_consistency_notes:
  - Se emplea Benjamín con tilde, forma usual en español bíblico.
  - Se preserva el tratamiento de segunda persona plural («hablasteis») porque el hebreo es plural.
  - No se usó «SEÑOR» para יהוה porque aquí aparece אֱלֹהִים, y la bendición se dirige explícitamente a Dios.
  - La nota al pie marca la alternativa lexical importante sin duplicar el sentido en el texto principal.
