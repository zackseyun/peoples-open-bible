translation:
  text: |-
    1. And the tenth bright waters that you saw—these are the purity of the generation of Josiah king of Judah, who alone at that time submitted himself to the Mighty One with all his heart and with all his soul.
    
    2. And he cleansed the land from idols, and sanctified the vessels that had been defiled, and restored the offerings to the altar, and exalted the righteous, and honored those beloved ones who were wise in understanding. He also brought the priests back to their service, and removed the sorcerers, diviners, and sinners from the land.
    
    3. And not only did he kill the impious who were living, but they also brought out from the graves the bones of the dead and burned them with fire.
    
    4. 1. And the bright tenth waters that you saw—these are the purity of the generation of Josiah king of Judah, who alone at that time submitted himself to the Mighty One with all his heart and with all his soul.
    
    2. And he cleansed the land from idols, and sanctified the vessels that had been defiled, and restored the offerings to the altar, and exalted the righteous, and honored those beloved ones who were wise in understanding. He also brought the priests back to their service, and removed the sorcerers, diviners, and sinners from the land.
    
    3. And not only did he kill the impious who were living, but they also brought out from the graves the bones of the dead and burned them with fire.
    
    4. And the workers of magic he burned with fire; and the lying prophets who were leading the people astray, these also he gave over to burning. And the people who had listened to them while they were alive, he cast into the brook.; and the lying prophets who were leading the people astray, these also he gave over to burning. And the people who had listened to them while they were alive, he cast into the brook.
