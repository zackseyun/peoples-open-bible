base_translation:
  language: en
  yaml_path: translation/ot/ezekiel/010/011.yaml
  text: When they went[a], they would go toward any of their four directions; they did not turn as they went, for to the place where the head faced, they would go after it[b]; they did not turn as they went.
  footnotes:
