translation:
  language: es
  text: Y por el precio de rescate de los 273 que exceden a los levitas, de entre los primogénitos de los hijos de Israel.[a]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «los rescatados de los 273»; la forma hebrea puede entenderse de manera más literal, pero el contexto inmediato se refiere al pago exigido por el excedente de los primogénitos (vv. 47–48), así que «precio de rescate» expresa mejor el sentido.
    reason: lexical_alternative
lexical_decisions:
- source_word: פְּדוּיֵי
  english_pob_choice: the redemption price of
  chosen_spanish: el precio de rescate de
  alternatives_spanish:
  - los rescatados de
  - los rescatados por
  - el rescate de
  lexicon: HALOT
  rationale: 'El contexto inmediato (vv. 47–48) habla del pago debido por los primogénitos en exceso, no solo del grupo de personas. Por eso, como en el POB inglés, conviene expresar el valor resultante del rescate como cantidad exigida: «precio de rescate».'
- source_word: הַשְּׁלֹשָׁה וְהַשִּׁבְעִים וְהַמָּאתָיִם
  english_pob_choice: '273'
  chosen_spanish: los 273
  alternatives_spanish:
  - los doscientos setenta y tres
  - los tres, los setenta y los doscientos
  lexicon: HALOT
  rationale: El hebreo presenta el número de forma aditiva; en español, el numeral arábigo comunica con claridad la cifra exacta sin perder precisión.
- source_word: הָעֹדְפִים
  english_pob_choice: who exceed
  chosen_spanish: que exceden
  alternatives_spanish:
  - que sobran
  - que están de más
  - que quedan en exceso
  lexicon: HALOT
  rationale: El participio expresa los que están en exceso respecto del número de levitas. «Exceden» mantiene la relación comparativa de forma natural en español.
- source_word: עַל הַלְוִיִּם
  english_pob_choice: the Levites
  chosen_spanish: a los levitas
  alternatives_spanish:
  - sobre los levitas
  - por encima de los levitas
  - respecto de los levitas
  lexicon: HALOT
  rationale: Con עֹדְפִים, la preposición עַל señala exceso en relación con los levitas. En español, la relación queda más clara y fluida con «a los levitas» dentro de la construcción verbal «exceden a».
- source_word: מִבְּכוֹר בְּנֵי יִשְׂרָאֵל
  english_pob_choice: from among the firstborn of the sons of Israel
  chosen_spanish: de entre los primogénitos de los hijos de Israel
  alternatives_spanish:
  - de entre los primogénitos de Israel
  - de entre los primogénitos de los israelitas
  - entre los primogénitos de los hijos de Israel
  lexicon: HALOT
  rationale: «Primogénitos» traduce בְּכוֹר con naturalidad bíblica y precisión. «Hijos de Israel» preserva la fórmula formal בני ישראל y «de entre» refleja bien el valor partitivo de מִ.
translation_notes:
  revision_awareness: Sin cambios respecto al control más reciente del POB en inglés; el presente borrador sigue la lectura aprobada y conserva la tensión léxica entre una traducción más literal de פְּדוּיֵי y la referencia contextual al pago de rescate.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» como norma del proyecto, pero este versículo no contiene el Tetragrámaton.
  - Se evitó «señor»/«Señor» porque no corresponde al texto hebreo aquí.
  - «Levitas» y «primogénitos» se conservaron por su valor técnico bíblico y por coherencia con el contexto inmediato.
