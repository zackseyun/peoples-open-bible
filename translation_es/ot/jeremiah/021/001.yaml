translation:
  language: es
  text: 'La palabra que llegó a Jeremías de parte de Yahvé, cuando el rey Sedequías le envió a Pasjur hijo de Malquías y a Sofonías hijo de Maasías el sacerdote, diciendo:'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: הַדָּבָר
  english_pob_choice: The word
  chosen_spanish: La palabra
  alternatives_spanish:
  - El mensaje
  - La palabra
  lexicon: HALOT
  rationale: דָּבָר puede significar 'palabra' o 'mensaje'. En las fórmulas proféticas, 'la palabra que llegó' conserva bien el valor técnico de revelación y es natural en español.
- source_word: אֲשֶׁר הָיָה אֶל
  english_pob_choice: that came to
  chosen_spanish: que llegó a
  alternatives_spanish:
  - que vino a
  - que fue a
  lexicon: HALOT
  rationale: La expresión profética indica la llegada de un mensaje divino a Jeremías. 'Llegó a' mantiene el sentido idiomático sin rigidizar el español.
- source_word: מֵאֵת יְהוָה
  english_pob_choice: from Yahweh
  chosen_spanish: de parte de Yahvé
  alternatives_spanish:
  - de Yahvé
  - de parte de Yahveh
  lexicon: HALOT
  rationale: Yְהוָה se vierte como 'Yahvé' según el estándar del proyecto. 'De parte de' expresa con claridad el origen personal/autoritativo del mensaje.
- source_word: בִּשְׁלֹחַ
  english_pob_choice: when ... sent
  chosen_spanish: cuando ... le envió
  alternatives_spanish:
  - al enviar ...
  - mientras ... enviaba
  lexicon: HALOT
  rationale: El infinitivo constructo con בְּ tiene valor temporal. 'Cuando' reproduce ese matiz de marco narrativo de modo natural.
- source_word: אֵלָיו
  english_pob_choice: to him
  chosen_spanish: le
  alternatives_spanish:
  - a él
  - a Jeremías
  lexicon: HALOT
  rationale: El pronombre retoma a Jeremías; en español el dativo clítico 'le' es natural y evita la repetición innecesaria.
- source_word: הַמֶּלֶךְ צִדְקִיָּהוּ
  english_pob_choice: King Zedekiah
  chosen_spanish: el rey Sedequías
  alternatives_spanish:
  - el rey Zedequías
  - Sedequías, rey
  lexicon: HALOT
  rationale: El título sigue al nombre como en hebreo; en español la anteposición del título ('el rey') es clara y digna. Se usa la forma tradicional hispana 'Sedequías'.
- source_word: פַּשְׁחוּר בֶּן מַלְכִּיָּה
  english_pob_choice: Pashhur son of Malchiah
  chosen_spanish: Pasjur hijo de Malquías
  alternatives_spanish:
  - Pashjur hijo de Malquías
  - Pasjur, hijo de Malquías
  lexicon: HALOT
  rationale: Los nombres propios se transliteran con una forma española reconocible. 'Hijo de' refleja בֶּן de manera directa y transparente.
- source_word: צְפַנְיָה בֶן מַעֲשֵׂיָה הַכֹּהֵן
  english_pob_choice: Zephaniah son of Maaseiah, the priest
  chosen_spanish: Sofonías hijo de Maasías, el sacerdote
  alternatives_spanish:
  - Sofonías hijo de Maaseías, el sacerdote
  - Sofonías, hijo de Maasías, el sacerdote
  lexicon: HALOT
  rationale: Se conserva la identificación genealógica y se vierte הַכֹּהֵן como apposición al mismo referente, siguiendo el ajuste auditado del inglés para no separar indebidamente el sintagma.
- source_word: לֵאמֹר
  english_pob_choice: saying,
  chosen_spanish: 'diciendo:'
  alternatives_spanish:
  - diciendo,
  - 'para decir:'
  lexicon: HALOT
  rationale: Es la partícula quotativa estándar que introduce el contenido del mensaje siguiente. Los dos puntos preparan naturalmente la continuación en español.
theological_decisions:
- issue: Traducción del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - Jehová
  rationale: El texto hebreo contiene el Tetragrámaton. Conforme al estándar del proyecto, se preserva el nombre propio divino como 'Yahvé' en lugar de ocultarlo con una sustitución genérica.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יהוה / YHWH → Yahvé'
- issue: Función de הַכֹּהֵן
  english_pob_reading: the priest
  chosen_spanish_reading: el sacerdote
  alternative_spanish_readings:
  - sacerdote
  - el sacerdote
  rationale: En hebreo, el sustantivo con artículo funciona como identificación del mismo individuo mencionado, no como un título separado con gran énfasis. 'El sacerdote' conserva esa identificación sin alterar la estructura.
  doctrine_reference: Jeremiah 21:1 syntax and POB revision note on apposition
translation_notes:
  revision_awareness: El inglés auditado fue revisado para dejar 'the priest' unido a Zephaniah sin coma previa; la versión española refleja esa misma relación sintáctica al mantener 'Sofonías hijo de Maasías, el sacerdote' como una sola identificación. También se siguió la decisión doctrinal actual de usar 'Yahvé' para יְהוָה.
  spanish_consistency_notes:
  - Se mantiene el nombre divino como 'Yahvé' de forma consistente con el estándar del proyecto.
  - Se usa 'el rey' antes del nombre propio para fluidez natural en español sin perder la referencia al hebreo.
  - Los nombres propios se presentan en formas españolas ampliamente reconocibles y sin añadir elementos interpretativos.
