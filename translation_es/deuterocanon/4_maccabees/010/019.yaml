translation:
  language: es
  text: ¡Mira! Mi lengua ha sido quebrada; córtala[a]. Porque ni aun por esto extirparás nuestro juicio razonado[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'El verbo final es un término vívido de cortar la lengua, usado aquí de modo figurado: mutilar la lengua no puede eliminar ni silenciar la resolución racional de los fieles.'
    reason: lexical_alternative
  - marker: b
    text: El griego dice «nuestro juicio razonado», no «mi»; el plural puede expresar solidaridad con los hermanos del hablante, aunque algunos lectores esperarían un singular por el contexto inmediato.
    reason: alternative_reading
lexical_decisions:
- source_word: ἰδοὺ
  english_pob_choice: Look
  chosen_spanish: ¡Mira!
  alternatives_spanish:
  - ¡Mira aquí!
  - ¡Mira bien!
  - ¡He aquí!
  lexicon: BDAG
  rationale: Como interjección de atención, «Mira» comunica con naturalidad el gesto de señalar del griego y conserva la inmediatez del original sin la solemnidad más arcaica de «He aquí».
- source_word: κέχλασται
  english_pob_choice: has been broken
  chosen_spanish: ha sido quebrada
  alternatives_spanish:
  - ha sido rota
  - ha sido destrozada
  - ha sido quebrantada
  lexicon: LSJ
  rationale: El perfecto pasivo presenta la acción ya consumada y el estado resultante de la lengua. «Ha sido quebrada» mantiene la violencia y el estado completado con español claro y digno.
- source_word: ἡ γλῶσσα
  english_pob_choice: my tongue
  chosen_spanish: mi lengua
  alternatives_spanish:
  - la lengua
  - mi lengua propia
  lexicon: BDAG
  rationale: Aunque el griego tiene artículo, el contexto exige referencia posesiva al hablante. En español, «mi lengua» es idiomático y evita una ambigüedad innecesaria.
- source_word: τέμνε
  english_pob_choice: cut it off
  chosen_spanish: córtala
  alternatives_spanish:
  - córtala de una vez
  - sezáchala
  - córtala del todo
  lexicon: BDAG
  rationale: El imperativo dirigido al torturador requiere una forma directa y breve. «Córtala» transmite el mandato violento; añadir «off» no es necesario en español para que la referencia a la lengua siga clara.
- source_word: οὐ γὰρ παρὰ τοῦτο
  english_pob_choice: For not even by this
  chosen_spanish: Porque ni aun por esto
  alternatives_spanish:
  - Porque ni siquiera por esto
  - Porque no por esto
  lexicon: LSJ
  rationale: 'La construcción con παρά + acusativo expresa medio o instrumento. «Ni aun por esto» conserva el énfasis de insuficiencia: aun con esa mutilación no se logrará el efecto buscado.'
- source_word: τὸν λογισμὸν
  english_pob_choice: reasoned judgment
  chosen_spanish: nuestra razón deliberada
  alternatives_spanish:
  - nuestra razón
  - nuestro juicio razonado
  - nuestra reflexión racional
  lexicon: BDAG
  rationale: En 4 Macabeos λογισμός funciona como término clave para la razón moral y disciplinada frente a las pasiones. «Razón deliberada» mantiene el matiz de razonamiento firme y resuelto sin reducirlo a intelecto abstracto.
- source_word: ἡμῶν
  english_pob_choice: our
  chosen_spanish: nuestra
  alternatives_spanish:
  - mi
  - nuestra propia
  lexicon: BDAG
  rationale: 'Se preserva el plural del testimonio griego transmitido, aun cuando el hablante inmediato sea singular. En español, el femenino singular concuerda naturalmente con «razón». '
- source_word: γλωσσοτομήσεις
  english_pob_choice: will you cut out
  chosen_spanish: cortarás
  alternatives_spanish:
  - extirparás
  - cortarás la lengua de
  - amputarás
  lexicon: LSJ
  rationale: El verbo compuesto conserva la imagen corporal de cortar la lengua y se usa de modo figurado respecto de λογισμός. En español, «cortarás» deja viva la metáfora sin forzar un neologismo poco transparente.
theological_decisions:
- issue: Cómo verter λογισμός en el marco ético-filosófico de 4 Macabeos
  english_pob_reading: reasoned judgment
  chosen_spanish_reading: razón deliberada
  alternative_spanish_readings:
  - razón
  - juicio razonado
  - resolución racional
  rationale: El libro subraya una razón piadosa y disciplinada que gobierna el sufrimiento y las pasiones. «Razón deliberada» conserva el componente racional y el de firme determinación, sin importar terminología filosófica ajena al texto.
  doctrine_reference: DOCTRINE.md §Translation philosophy 1, 5, 6
- issue: Mantener el plural de ἡμῶν pese al hablante singular inmediato
  english_pob_reading: our reasoned judgment
  chosen_spanish_reading: nuestra razón deliberada
  alternative_spanish_readings:
  - mi razón deliberada
  - nuestro juicio razonado
  rationale: La forma griega transmitida es plural y la traducción debe quedarse anclada en ese testimonio, pues el plural puede expresar solidaridad con los hermanos o con la comunidad de fieles. No se normaliza en singular para no borrar esa tensión documentada.
  doctrine_reference: DOCTRINE.md §Translation philosophy 1, 3, 5
translation_notes:
  revision_awareness: Se revisó el pasaje a la luz del griego de Swete y del audit trail en inglés. La versión previa en inglés fue considerada estable; aun así, se preservó la tensión documentada entre el singular inmediato y el plural transmitido en ἡμῶν, y se mantuvo la metáfora corporal del verbo final sin suavizarla en exceso.
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando aparezca el nombre divino; este versículo no lo contiene.
  - Se conserva el tono martirial y la imagen corporal del texto griego sin sustituirla por una paráfrasis abstracta.
  - «Razón deliberada» se eligió para mantener el valor técnico-ético de λογισμός en 4 Macabeos.
  - Se preserva el plural de la fuente («nuestra») como decisión textual documentada, no como armonización estilística.
