translation:
  language: es
  text: Y seguían buscando y registrando a los amigos[a] de Judas, y los llevaban a Bacquides, y él tomaba venganza[b] de ellos, y se burlaban de ellos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Amigos» puede incluir también «partidarios» o «aliados» en un contexto político y militar.
    reason: lexical_alternative
  - marker: b
    text: El verbo griego puede significar «castigar», «exigir justicia de» o «tomar venganza de». Se mantiene el matiz hostil del contexto.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐξεζήτουν
  english_pob_choice: kept seeking out
  chosen_spanish: seguían buscando
  alternatives_spanish:
  - buscaban continuamente
  - no cesaban de buscar
  lexicon: BDAG
  rationale: El imperfecto griego expresa acción շարունակada o repetida; «seguían buscando» conserva ese matiz de persistencia sin sonar forzado en español.
- source_word: ἐξηραύνων
  english_pob_choice: searching for
  chosen_spanish: registrando
  alternatives_spanish:
  - investigando
  - rebuscando
  lexicon: BDAG
  rationale: Junto con ἐξεζήτουν intensifica la persecución activa. «Registrando» comunica una búsqueda minuciosa e incluso oficial; se mantiene el carácter de rastreo sin añadir más de lo que el contexto permite.
- source_word: τοὺς φίλους Ἰούδου
  english_pob_choice: the friends of Judas
  chosen_spanish: los amigos de Judas
  alternatives_spanish:
  - los partidarios de Judas
  - los aliados de Judas
  lexicon: LSJ
  rationale: Se conserva la literalidad de φίλοι como «amigos», porque el texto griego no usa aquí un término técnico distinto. En contexto puede abarcar adherentes o aliados, pero el texto base no exige abandonar la forma literal en la línea principal.
- source_word: ἦγον
  english_pob_choice: they were bringing
  chosen_spanish: los llevaban
  alternatives_spanish:
  - los traían
  - los conducían
  lexicon: BDAG
  rationale: El imperfecto sugiere acción repetida o en curso. «Los llevaban» es natural en español y refleja el traslado de cautivos hacia Bacquides.
- source_word: πρὸς Βακχίδην
  english_pob_choice: to Bacchides
  chosen_spanish: ante Bacquides
  alternatives_spanish:
  - a Bacquides
  - delante de Bacquides
  lexicon: BDAG
  rationale: Con πρός + acusativo el movimiento es hacia una persona; en este contexto judicial/punitivo, «ante Bacquides» hace explícita la comparecencia sin cambiar el sentido básico.
- source_word: ἐξεδίκα
  english_pob_choice: he took vengeance on
  chosen_spanish: se vengaba de
  alternatives_spanish:
  - los castigaba
  - hacía justicia contra ellos
  lexicon: LSJ
  rationale: El verbo puede significar castigar, exigir justicia o vengarse. Dado el contexto hostil, «se vengaba de» reproduce la fuerza retributiva que la versión inglesa destacó.
- source_word: ἐνέπαιζον αὐτοῖς
  english_pob_choice: mocked them
  chosen_spanish: se burlaban de ellos
  alternatives_spanish:
  - se mofaban de ellos
  - hacían burla de ellos
  lexicon: BDAG
  rationale: El verbo denota escarnio o trato despectivo. «Se burlaban de ellos» es idiomático, claro y conserva la humillación implícita.
translation_notes:
  revision_awareness: La redacción sigue de cerca el griego de Swete 1909 y el rastro de auditoría inglés. No se introdujeron cambios respecto del sentido documentado; solo se ajustó la dicción española para mantener el paralelismo de los imperfectos y la carga punitiva del segundo hemistiquio.
  spanish_consistency_notes:
  - Se conservó «Y» inicial para reflejar la coordinación narrativa del griego.
  - Se eligió «Bacquides» como forma española habitual del nombre propio, manteniendo la referencia al personaje histórico.
  - Se evitó suavizar ἐξεδίκα con un término meramente jurídico, porque el contexto es represivo y retaliatorio.
  - «Amigos» se deja en el texto principal por fidelidad literal; la nota recoge el posible valor de «partidarios/aliados».
