  yaml_path: translation/ot/ezekiel/043/008.yaml
  text: When they set their threshold beside my threshold and their doorposts beside my doorposts[a], with only the wall between me and them, they defiled my holy name by the abominations that they committed[c][b]; so I consumed them in my anger.
  footnotes:
