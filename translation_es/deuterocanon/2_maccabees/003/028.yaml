revisions:
- from: Al que acababa de entrar en el tesoro[a] con mucho alboroto y toda su escolta, lo sacaron sin ayuda, completamente abatido[b], habiendo reconocido claramente el poder soberano[c].
  to: Al que acababa de entrar en el tesoro[a] con mucho alboroto y toda su escolta, lo sacaron indefenso, totalmente incapacitado[b], habiendo reconocido claramente el poder soberano.
  rationale: Se reemplazó ‘sin ayuda’ por ‘indefenso’ para evitar ambigüedad sintáctica y reflejar correctamente ἀβοήθητον como estado de Heliodoro. Se ajustó ‘completamente abatido’ a ‘totalmente incapacitado’ para alinearlo mejor con el valor idiomático de τοῖς ὅλοις καθεστῶτα documentado en el POB. Se eliminó la nota teológica innecesaria para no sobrecargar el texto cuando ‘poder soberano’ ya preserva la reserva del griego.
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T22:57:19Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador conserva bien el sentido general del griego: Heliodoro, que acababa de entrar con despliegue y escolta, es sacado en condición de total postración tras reconocer el poder soberano. Sin embargo, hay dos ajustes importantes. Primero, ἀβοήθητον se vierte mejor como ‘indefenso’ o ‘sin auxilio’ que como ‘sin ayuda’, porque en español ‘lo sacaron sin ayuda’ puede leerse adverbialmente como que ellos lo sacaron sin recibir ayuda, no como estado de Heliodoro. Segundo, la nota [c] no corresponde a una alternativa preservada ni a una ambigüedad nueva necesaria, y además el giro principal puede afinarse para reflejar mejor la secuencia griega.'
  spanish_quality_summary: El español es claro y digno, pero ‘sin ayuda’ introduce ambigüedad sintáctica poco natural en este contexto. ‘Completamente abatido’ es comprensible, aunque ‘totalmente incapacitado’ o ‘completamente postrado’ refleja mejor el valor idiomático documentado por el POB. También conviene mantener la puntuación de modo que la cadena participial resulte fluida y nítida.
  glossary_alignment: No hay conflicto con los glosarios mayores del proyecto. ‘Poder soberano’ está bien alineado con δυναστεία. La revisión solo corrige la expresión de ἀβοήθητον y afina τοῖς ὅλοις καθεστῶτα para mayor fidelidad semántica y claridad española.
  issues:
  - severity: high
    issue: ‘sin ayuda’ es ambiguo y no transmite bien ἀβοήθητον como predicado del hombre
    rationale: En español, ‘lo sacaron sin ayuda’ se entiende fácilmente como que los portadores no recibieron ayuda, no como que él estaba desamparado/indefenso. El griego califica al hombre, no la manera de cargarlo.
  - severity: medium
    issue: ‘completamente abatido’ debilita el matiz de incapacidad total de τοῖς ὅλοις καθεστῶτα
    rationale: El audit trail inglés documenta una expresión idiomática de incapacidad completa, no solo desánimo o abatimiento. ‘Totalmente incapacitado’ o ‘completamente postrado’ se acercan más al sentido resultativo.
  - severity: low
    issue: La nota [c] teológica no es necesaria en el texto español revisado
    rationale: El inglés no exigía una nota teológica obligatoria aquí; la ambigüedad queda bien preservada por ‘poder soberano’. Añadir una nota puede sobreexplicar donde el texto principal ya cumple.
  revised_spanish_text: Al que acababa de entrar en el tesoro[a] con mucho alboroto y toda su escolta, lo sacaron indefenso, totalmente incapacitado[b], habiendo reconocido claramente el poder soberano.
  revised_footnotes:
