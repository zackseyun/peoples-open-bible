review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español conserva bien la estructura y la tensión del hebreo: abundancia de agua sobre montes y collados, en el contexto del día de gran matanza y caída de torres. «Habrá», «monte alto», «en el día de gran matanza» y «cuando caigan las torres» reflejan adecuadamente el sentido fuente y el rastro auditado en inglés.'
  spanish_quality_summary: 'La frase es generalmente clara y digna, pero «quebradas» no es la mejor opción en español neutro general para פְּלָגִים aquí: en muchos contextos hispanos se entiende primariamente como accidente geográfico, no como corriente de agua, y además se solapa mal con «cauces de aguas». También conviene ajustar la nota para que corresponda al segundo término raro documentado por el inglés, no al primero.'
  glossary_alignment: No hay conflictos con la terminología doctrinal del proyecto. La revisión propuesta mantiene un español eclesial legible y preserva la distinción entre los dos términos hidráulicos mediante «arroyos» y «cauces de agua[a]».
  issues:
  - severity: high
    issue: «quebradas» para פְּלָגִים es demasiado regional/ambiguo
    rationale: Aunque en algunas regiones puede referirse a corrientes o cauces, en español amplio suele evocar una hondonada o quebrada geográfica. Aquí el contexto pide una imagen hídrica inmediata y natural en registro panhispánico.
  - severity: medium
    issue: La nota al pie está anclada al término equivocado
    rationale: El inglés POB pone la nota de alternativa en «channels of water» (יִבְלֵי מָיִם), no en «streams» (פְּלָגִים). En español conviene conservar esa misma distribución léxica y no trasladar la incertidumbre al primer término.
  - severity: low
    issue: «cauces de aguas» suena algo rígido
    rationale: «Cauces de agua» es más natural en español moderno y sigue siendo suficientemente formal. El plural «aguas» no es incorrecto, pero aquí no aporta claridad.
  revised_spanish_text: Y en todo monte alto y en todo collado encumbrado habrá arroyos, cauces de agua[a], en el día de gran matanza, cuando caigan las torres.
  revised_footnotes:
