translation:
  language: es
  text: Él construyó Elot y la devolvió a Judá[a], después de que el rey durmió con sus padres[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «la trajo de vuelta a Judá».'
    reason: lexical_alternative
  - marker: b
    text: «Durmió con sus padres» es un modismo hebreo para decir que murió.
    reason: cultural_note
lexical_decisions:
- source_word: בָּנָה
  english_pob_choice: built
  chosen_spanish: edificó
  alternatives_spanish:
  - construyó
  - levantó
  lexicon: HALOT
  rationale: El verbo básico expresa construir/edificar. En español, «edificó» conserva el sentido de establecer una obra o población y suena natural en un contexto histórico-regio; «construyó» también sería válido, pero «edificó» mantiene un registro un poco más literario sin añadir interpretación.
- source_word: אֵיל֔וֹת
  english_pob_choice: Eloth
  chosen_spanish: Elot
  alternatives_spanish:
  - Eloth
  - Eilat
  lexicon: HALOT
  rationale: Se trata de un nombre propio de lugar. En español conviene transliterar; «Elot» conserva la forma hebrea más cercana y evita una modernización ajena al texto bíblico.
- source_word: וַיְשִׁיבֶהָ
  english_pob_choice: restored it
  chosen_spanish: la devolvió
  alternatives_spanish:
  - la restauró
  - la hizo volver
  lexicon: HALOT
  rationale: 'El verbo en hifil de שוב es causativo: hacer volver, devolver. «La devolvió» expresa bien el movimiento de retorno a la esfera de Judá sin forzar la idea de reconstrucción. «Restauró» es posible, pero puede sugerir reparación material que el hebreo no explicita.'
- source_word: לִיהוּדָה
  english_pob_choice: to Judah
  chosen_spanish: a Judá
  alternatives_spanish:
  - para Judá
  lexicon: HALOT
  rationale: La preposición marca dirección/beneficiario. «A Judá» es la correspondencia más directa y natural en español; «para Judá» explicita destinatario, pero altera levemente el matiz direccional.
- source_word: אַחֲרֵי שְׁכַב
  english_pob_choice: after ... slept
  chosen_spanish: después que ... durmió
  alternatives_spanish:
  - después de que ... se durmió
  - tras ... dormir
  lexicon: HALOT
  rationale: Se preserva el giro idiomático hebreo de «dormir» como eufemismo de muerte, en lugar de traducirlo interpretativamente por «murió». La construcción española mantiene la fórmula narrativa sin perder claridad.
- source_word: הַמֶּלֶךְ
  english_pob_choice: the king
  chosen_spanish: el rey
  alternatives_spanish:
  - el monarca
  lexicon: HALOT
  rationale: El hebreo dice literalmente «el rey»; se mantiene esa forma y no se identifica por nombre propio para respetar la redacción del texto fuente.
- source_word: עִם אֲבֹתָיו
  english_pob_choice: with his fathers
  chosen_spanish: con sus padres
  alternatives_spanish:
  - con sus antepasados
  - con sus padres ancestrales
  lexicon: HALOT
  rationale: Se conserva el modismo funerario hebreo. En español bíblico, «con sus padres» suena natural y reproduce la fórmula sin explicarla dentro del verso.
theological_decisions:
- issue: Eufemismo hebreo de muerte en la fórmula real
  english_pob_reading: '"Slept with his fathers" is a Hebrew idiom for death.'
  chosen_spanish_reading: «durmió con sus padres» conserva el eufemismo hebreo de muerte.
  alternative_spanish_readings:
  - «murió»
  - «falleció»
  rationale: La POB inglesa preserva la imagen idiomática; el español también puede hacerlo sin perder comprensibilidad. Mantener la fórmula evita borrar el recurso semítico y su tono reverente. Se entiende por contexto que alude a la muerte del rey.
  doctrine_reference: No doctrinal issue; idiomatic death formula
- issue: Destino político de Elot hacia Judá
  english_pob_reading: restored it to Judah
  chosen_spanish_reading: «la devolvió a Judá»
  alternative_spanish_readings:
  - «la restauró para Judá»
  - «la hizo volver a Judá»
  rationale: La decisión evita sobreinterpretar la restitución como reconstrucción física o reforma interna. El foco del hebreo está en la transferencia de control/posesión, no en un acto doctrinal. «La devolvió a Judá» conserva la tensión política del texto.
  doctrine_reference: No doctrinal issue; historical-lexical nuance
translation_notes:
  revision_awareness: El contexto auditado coincide plenamente con la versión inglesa existente (alta concordancia; sin revisiones aplicadas). La formulación española sigue esa lectura, conservando el nombre de lugar transliterado, el matiz causativo de שוב en hifil y el eufemismo funerario hebreo.
  spanish_consistency_notes:
  - Se usa «Yahvé» como forma predeterminada en este proyecto cuando aparezca el Tetragrámaton; en este versículo no aparece.
  - Se mantiene el nombre propio de lugar como transliteración («Elot») para conservar la forma bíblica.
  - Se preserva el modismo de muerte sin normalizarlo a «murió», en consonancia con la POB inglesa.
