translation:
  language: es
  text: Restáuranos a ti[a], oh Yahvé, para que volvamos; renueva nuestros días como antes[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Tráenos de vuelta a ti, oh Yahvé».'
    reason: alternative_reading
  - marker: b
    text: 'Hebreo: «como antiguamente» o «como en tiempos pasados».'
    reason: lexical_alternative
lexical_decisions:
- source_word: הֲשִׁיבֵנוּ
  english_pob_choice: Restore us
  chosen_spanish: Restáuranos
  alternatives_spanish:
  - Tráenos de vuelta
  - Vuélvenos
  lexicon: HALOT
  rationale: El imperativo causativo de שוב pide una acción divina de hacer volver o restaurar. «Restáuranos» comunica bien la petición relacional y de renovación, y mantiene la fuerza de súplica sin sonar mecánico.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  - el SEÑOR
  lexicon: HALOT
  rationale: Se conserva el nombre propio divino con la forma española estable del proyecto, evitando sustituirlo por un título. Esto sigue la decisión doctrinal de transliterar el Tetragrámaton.
- source_word: אֵלֶיךָ
  english_pob_choice: to yourself
  chosen_spanish: a ti
  alternatives_spanish:
  - hacia ti
  - a tu presencia
  lexicon: HALOT
  rationale: El hebreo significa literalmente «a ti». En español, «a ti» es natural y fiel; la relación implícita de retorno queda expresada por el contexto de «restáuranos» y por la cláusula siguiente.
- source_word: וְנָשׁוּב
  english_pob_choice: that we may return
  chosen_spanish: para que volvamos
  alternatives_spanish:
  - y volveremos
  - así volveremos
  lexicon: HALOT
  rationale: La forma puede leerse como resultado o propósito. «Para que volvamos» refleja bien la dependencia del retorno humano respecto de la restauración divina, sin resolver indebidamente la tensión del hebreo.
- source_word: חַדֵּשׁ
  english_pob_choice: renew
  chosen_spanish: renueva
  alternatives_spanish:
  - haz nuevo
  - restaura
  lexicon: HALOT
  rationale: El piel de חדש expresa renovar/hacer nuevo. «Renueva» es directo, natural y conserva la petición poética sobre el estado de los días.
- source_word: יָמֵינוּ
  english_pob_choice: our days
  chosen_spanish: nuestros días
  alternatives_spanish:
  - nuestra vida
  - nuestros tiempos
  lexicon: HALOT
  rationale: Se mantiene la concreción literal «días», como en el hebreo, sin convertirlo demasiado pronto en una abstracción.
- source_word: כְּקֶדֶם
  english_pob_choice: as of old
  chosen_spanish: como en otro tiempo
  alternatives_spanish:
  - como antes
  - como en tiempos pasados
  lexicon: HALOT
  rationale: La expresión hebrea significa «como antes / en tiempos anteriores». «Como en otro tiempo» suena natural en español y preserva el matiz temporal sin forzar un registro arcaico.
theological_decisions:
- issue: Relación entre el restablecimiento divino y el retorno humano en וְנָשׁוּב
  english_pob_reading: 'Render the clause as dependent result/purpose: ''that we may return.'''
  chosen_spanish_reading: «para que volvamos»
  alternative_spanish_readings:
  - «y volveremos»
  - «así volveremos»
  rationale: El hebreo permite una lectura de propósito o resultado tras el imperativo. La versión elegida expresa mejor que el retorno humano depende de la acción restauradora de Dios, sin exagerar la sistematización doctrinal. Se conserva la tensión textual.
  doctrine_reference: Preservar la tensión teológica entre la iniciativa divina y la respuesta humana.
translation_notes:
  revision_awareness: 'Coincide con el cierre de revisión más reciente: no se requieren cambios respecto del análisis auditado; se mantiene alta concordancia con el texto fuente y la decisión inglesa de entender וְנָשׁוּב como resultado o propósito.'
  spanish_consistency_notes:
  - Se usa «Yahvé» según la terminología del proyecto para יהוה.
  - Se conserva el paralelismo poético con verbos en imperativo y una cláusula final de petición.
  - Se mantiene «días» en plural para reflejar el hebreo, sin expandirlo a una paráfrasis como «tiempos» en el texto principal.
  - La nota sobre la traducción alternativa de וְנָשׁוּב se incluye porque el español también permite la lectura coordinada «y volveremos».
