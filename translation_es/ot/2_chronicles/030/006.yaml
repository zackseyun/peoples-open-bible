    text: 'Hebreo: «Israel», no el más familiar «Jacob».'
    reason: alternative_reading
  - marker: b
    text: 'O: «el remanente que ha escapado, que queda para ustedes».'
    reason: alternative_reading
  revision_rationale: 'Se corrigen los anclajes de las notas para que correspondan a las expresiones que explican. También se mejora la naturalidad del español con cambios menores y fieles al hebreo auditado: «los correos» por «los corredores» en contexto administrativo, «de mano del rey» para conservar la imagen idiomática sin calco duro, y «mandato» por «mandamiento» para una directiva real más natural en español contemporáneo. No se altera el sentido teológico ni textual principal.'
