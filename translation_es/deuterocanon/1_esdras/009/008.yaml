translation:
  language: es
  text: Y ahora den confesión y gloria a Yahvé, Dios de nuestros padres[a][b],
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «reconocimiento». El griego ὁμολογία puede significar confesión o reconocimiento; aquí se prefiere «confesión» por el tono penitencial del contexto.
    reason: lexical_alternative
  - marker: b
    text: La fuente griega de este versículo es más breve que el paralelo hebreo completo en Esdras; esta traducción sigue la redacción griega y usa el hebreo solo como comprobación contextual.
    reason: textual_variant
lexical_decisions:
- source_word: καὶ νῦν
  english_pob_choice: And now
  chosen_spanish: Y ahora
  alternatives_spanish:
  - Así que ahora
  - Ahora bien
  lexicon: LSJ
  rationale: Mantiene el enlace discursivo y el matiz temporal sin sobrerinterpretar el giro del exhorto.
- source_word: δότε
  english_pob_choice: give
  chosen_spanish: den
  alternatives_spanish:
  - ofrezcan
  - rindan
  lexicon: LSJ
  rationale: El imperativo plural en español exige un verbo natural y directo; 'den' conserva la fuerza de 'give' y encaja con el complemento doble.
- source_word: ὁμολογίαν
  english_pob_choice: confession
  chosen_spanish: confesión
  alternatives_spanish:
  - reconocimiento
  - acknowledgment
  lexicon: LSJ
  rationale: En el contexto penitencial, 'confesión' preserva mejor el peso moral y religioso que 'reconocimiento'.
- source_word: δόξαν
  english_pob_choice: glory
  chosen_spanish: gloria
  alternatives_spanish:
  - honor
  lexicon: LSJ
  rationale: '''Gloria'' mantiene el paralelismo bíblico habitual de ''dar gloria'' y el registro litúrgico del griego.'
- source_word: τῷ κυρίῳ
  english_pob_choice: to the Lord
  chosen_spanish: al Yahvé
  alternatives_spanish:
  - al Señor
  lexicon: LSJ / project terminology
  rationale: Aunque κύριος suele ser 'Señor', aquí el contexto bíblico judío designa al Dios de Israel; conforme a la terminología del proyecto, se traduce el nombre divino como 'Yahvé' en el texto principal.
- source_word: θεῷ
  english_pob_choice: God
  chosen_spanish: Dios
  alternatives_spanish:
  - Dios
  lexicon: LSJ
  rationale: '''Dios'' es el equivalente directo y mantiene el título divino del sintagma.'
- source_word: τῶν πατέρων ἡμῶν
  english_pob_choice: of our fathers
  chosen_spanish: de nuestros padres
  alternatives_spanish:
  - de nuestros antepasados
  lexicon: LSJ
  rationale: Se conserva la fórmula bíblica tradicional y la referencia masculina explícita del original; 'antepasados' suaviza el genérico pero diluye la literalidad.
theological_decisions:
- issue: κύριος aplicado al Dios de Israel
  english_pob_reading: to the Lord God of our fathers
  chosen_spanish_reading: al Yahvé, Dios de nuestros padres
  alternative_spanish_readings:
  - al Señor, Dios de nuestros padres
  - al Yahvé, Dios de nuestros antepasados
  rationale: El griego combina κύριος con θεός dentro de una fórmula de alianza. Dado el marco judío de 1 Esdras y la política del proyecto para el nombre divino, 'Yahvé' evita el ocultamiento del nombre y conserva la identificación con el Dios de los padres.
  doctrine_reference: DOCTRINE.md §Translation philosophy; project terminology defaults
- issue: ὁμολογίαν en contexto penitencial
  english_pob_reading: confession
  chosen_spanish_reading: confesión
  alternative_spanish_readings:
  - reconocimiento
  - alabanza
  rationale: El contexto inmediato es de arrepentimiento y admisión de culpa; 'confesión' retiene esa tensión moral. 'Reconocimiento' es posible, pero más débil; 'alabanza' perdería el peso penitencial.
  doctrine_reference: DOCTRINE.md §Translation philosophy 1, 3, 4
translation_notes:
  revision_awareness: Se mantuvo la lectura griega como texto base primario, con el paralelo hebreo usado solo como control contextual. No se introdujeron expansiones del paralelo ni se suavizó la fuerza penitencial de ὁμολογίαν.
  spanish_consistency_notes:
  - Se emplea «Yahvé» para יהוה / el nombre divino según la terminología del proyecto, evitando «SEÑOR» como máscara editorial.
  - Se conserva la fórmula bíblica «Dios de nuestros padres» por su valor covenantal y por fidelidad al griego.
  - La puntuación y el orden siguen un estilo bíblico moderno y publicable en español sin sobreparáfrasis.
