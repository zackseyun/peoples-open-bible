revisions:
- from: Moisés hizo[a] como Yahvé le había mandado, y la congregación se reunió a la entrada del tabernáculo de reunión.
  to: Y Moisés hizo como Yahvé le mandó, y la congregación se reunió[a] a la entrada de la tienda de reunión.
  rationale: Se corrige «tabernáculo de reunión» a «tienda de reunión» para seguir más de cerca אֹהֶל מוֹעֵד y la decisión auditada del POB. Se simplifica «había mandado» a «mandó» para ajustarse mejor a la secuencia narrativa hebrea. Se reubica la nota al pie al verbo «se reunió», que es donde realmente existe la alternativa léxica documentada.
