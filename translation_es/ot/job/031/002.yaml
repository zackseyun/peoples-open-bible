revisions:
- from: ¿Y cuál es la porción de Dios[a] desde lo alto, y la herencia del Todopoderoso desde las alturas?
  to: ¿Y cuál es la porción que viene de Dios[a] desde lo alto, y la herencia del Todopoderoso desde las alturas?
  rationale: Se revisa para eliminar la ambigüedad del genitivo «de Dios», expresar con claridad la procedencia marcada por מִן en ambos hemistiquios, y corregir la nota al pie para que no afirme erróneamente que la porción es algo asignado a Dios. Se conserva el paralelismo poético y la terminología divina aprobada por el proyecto.
