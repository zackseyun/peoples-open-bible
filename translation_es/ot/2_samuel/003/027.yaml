base_translation:
  language: en
  yaml_path: translation/ot/2_samuel/003/027.yaml
  text: When Abner returned to Hebron[a], Joab took him aside into the middle of the gate to speak with him privately, and there he struck him in the stomach, and he died, for the blood of Asahel his brother.
  footnotes:
