id: 2TI.4.18
reference: 2 Timothy 4:18
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: ⸀ῥύσεταί με ὁ κύριος ἀπὸ παντὸς ἔργου πονηροῦ καὶ σώσει εἰς τὴν βασιλείαν αὐτοῦ τὴν ἐπουράνιον· ᾧ ἡ δόξα εἰς τοὺς αἰῶνας τῶν αἰώνων, ἀμήν.
base_translation:
  language: en
  yaml_path: translation/nt/2_timothy/004/018.yaml
  text: The Lord will rescue me from every evil deed and will bring me safely into his heavenly kingdom. To him be the glory forever and ever. Amen.
translation:
  language: ko
  text: 주께서 나를 모든 악한 일에서 건져 주시고, 그분의 하늘 나라로 안전히 이끌어 주실 것입니다.[a] 그분께 영광이 영원무궁토록 있기를 빕니다. 아멘.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 직역하면 「그분의 하늘 나라 안으로 구원하실 것입니다」. 헬라어 σώζω는 종말의 구원을 가리킨다.
    reason: lexical_alternative
lexical_decisions:
- source_word: ῥύσεταί με ὁ κύριος ἀπὸ παντὸς ἔργου πονηροῦ
  english_pob_choice: The Lord will rescue me from every evil deed
  chosen_korean: 주께서 나를 모든 악한 일에서 건져 주시고
  alternatives_korean:
  - 주께서 나를 모든 악한 일로부터 구해 주시고
  - 주께서 나를 온갖 악한 일에서 구원하시고
  lexicon: BDAG
  rationale: 3:11, 4:17의 ῥύομαι(건지다)와 어휘 통일. 미래형의 「건져 주실 것」을 합쇼체로 자연스럽게 옮긴다.
- source_word: σώσει εἰς τὴν βασιλείαν αὐτοῦ τὴν ἐπουράνιον
  english_pob_choice: will bring me safely into his heavenly kingdom
  chosen_korean: 그분의 하늘 나라로 안전히 이끌어 주실 것입니다
  alternatives_korean:
  - 그분의 하늘 나라 안으로 구원해 주실 것입니다
  - 그분의 하늘에 속한 나라로 무사히 이끄실 것입니다
  lexicon: BDAG
  rationale: σώζω는 종말의 「구원」을 가리키나, εἰς(~ 안으로)와 결합되어 「~로 안전히 이끌다」의 함의가 강해진다. 「안전히 이끌어 주다」가 한국어로 자연스러우며, 본 절의 종말 구원 의미를 각주로 보완한다. 4:1의 「그분의 나라」와 호응한다.
- source_word: ᾧ ἡ δόξα εἰς τοὺς αἰῶνας τῶν αἰώνων
  english_pob_choice: To him be the glory forever and ever
  chosen_korean: 그분께 영광이 영원무궁토록 있기를 빕니다
  alternatives_korean:
  - 그분께 세세토록 영광이 있을지어다
  - 그분께 영광이 영원토록 있을 것입니다
  lexicon: BDAG
  rationale: 「세세에 세세토록」의 직역(아이온의 아이온)을 한국어 자연스러운 송영 「영원무궁토록」으로 옮긴다. 합쇼체 마감 「있기를 빕니다」가 자연스럽다.
- source_word: ἀμήν
  english_pob_choice: Amen
  chosen_korean: 아멘
  alternatives_korean: []
  lexicon: BDAG
  rationale: 한국 성서 전통의 음역 「아멘」을 보존한다.
