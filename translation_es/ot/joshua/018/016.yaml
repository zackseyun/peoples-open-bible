translation:
  language: es
  text: Entonces el límite descendió hasta el extremo del monte que está frente al valle de Ben-hinom[a], que está en el extremo norte del valle de Refaim. Después descendió por el valle de Hinom hasta la ladera sur[b] del jebuseo, y descendió hasta En-rogel[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Ben-hinom es un nombre de lugar; literalmente, «valle del hijo de Hinom».
    reason: lexical_alternative
  - marker: b
    text: También puede entenderse «hombro» o «costado»; el hebreo usa un término topográfico para el lado o la ladera de una elevación.
    reason: lexical_alternative
  - marker: c
    text: En-rogel es un nombre de lugar; literalmente, «fuente de Rogel».
    reason: lexical_alternative
lexical_decisions:
- source_word: וְיָרַד / הַגְּבוּל
  english_pob_choice: Then the border went down
  chosen_spanish: Entonces el límite descendía
  alternatives_spanish:
  - y el límite descendía
  - entonces la frontera descendía
  lexicon: HALOT
  rationale: ירד expresa movimiento hacia abajo; en una descripción de fronteras, «descendía» conserva el sentido topográfico. Se eligió «límite» para גְּבוּל porque en español mantiene con naturalidad la idea de línea territorial descrita.
- source_word: קְצֵה הָהָר
  english_pob_choice: the end of the mountain
  chosen_spanish: el extremo del monte
  alternatives_spanish:
  - el borde del monte
  - la extremidad del monte
  lexicon: HALOT
  rationale: קָצֶה indica un extremo o terminación. «Extremo» es natural en español y evita una calca rígida. «Monte» puede ser más idiomático que «montaña» en este contexto geográfico, sin apartarse materialmente del hebreo.
- source_word: אֲשֶׁר עַל־פְּנֵי גֵּי בֶן־הִנֹּם
  english_pob_choice: that faces the Valley of Ben-hinnom
  chosen_spanish: que está frente al valle de Ben-hinom
  alternatives_spanish:
  - que da al valle de Ben-hinom
  - que está opuesto al valle de Ben-hinom
  lexicon: HALOT
  rationale: עַל־פְּנֵי expresa relación espacial de frente/oposición. «Está frente a» reproduce bien ese valor. «Ben-hinom» se conserva como nombre de lugar, siguiendo el tratamiento del POB en inglés.
- source_word: גֵּי בֶן־הִנֹּם
  english_pob_choice: the Valley of Ben-hinnom
  chosen_spanish: el valle de Ben-hinom
  alternatives_spanish:
  - el valle del hijo de Hinom
  lexicon: HALOT
  rationale: La secuencia funciona como topónimo. Se mantiene transliterada como nombre propio, en lugar de traducirla literalmente, para conservar la identificación geográfica.
- source_word: אֲשֶׁר בְּעֵמֶק רְפָאִים צָפוֹנָה
  english_pob_choice: which is at the northern end of the Valley of Rephaim
  chosen_spanish: que está al norte del valle de Refaim
  alternatives_spanish:
  - que está en el extremo norte del valle de Refaim
  - que está hacia el norte en el valle de Refaim
  lexicon: HALOT
  rationale: צָפוֹנָה aporta dirección norte. En español, «al norte de» comunica con claridad la localización relativa; la formulación evita sobrecargar la frase con una explicación topográfica que el hebreo no explicita de forma completa.
- source_word: גֵּי הִנֹּם
  english_pob_choice: the Valley of Hinnom
  chosen_spanish: el valle de Hinom
  alternatives_spanish:
  - el valle de Hinnom
  lexicon: HALOT
  rationale: Es un topónimo distinto, conservado en transliteración. Se usa «Hinom» para mantener coherencia con «Ben-hinom» y evitar duplicación gráfica innecesaria.
- source_word: אֶל כֶּתֶף הַיְבוּסִי נֶגְבָּה
  english_pob_choice: to the southern slope of the Jebusite
  chosen_spanish: hasta el costado meridional del jebuseo
  alternatives_spanish:
  - hasta la ladera meridional del jebuseo
  - hasta el hombro meridional del jebuseo
  lexicon: HALOT
  rationale: כֶּתֶף literalmente es «hombro», pero en topografía designa el lado o ladera de una elevación. «Costado meridional» conserva la imagen espacial sin forzar un equivalente técnico. Se mantiene «jebuseo» porque el hebreo usa el gentilicio sustantivado, y el contexto no obliga a añadir «ciudad».
- source_word: עֵין רֹגֵל
  english_pob_choice: En-rogel
  chosen_spanish: En-rogel
  alternatives_spanish:
  - la fuente de Rogel
  - el manantial de Rogel
  lexicon: HALOT
  rationale: Es un nombre de lugar; se translitera. No se explicita «fuente/manantial» en el cuerpo del texto porque la expresión funciona como topónimo fijo.
