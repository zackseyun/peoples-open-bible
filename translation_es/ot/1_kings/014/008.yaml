  text: וָ/אֶקְרַ֤ע אֶת הַ/מַּמְלָכָה֙ מִ/בֵּ֣ית דָּוִ֔ד וָ/אֶתְּנֶ֖/הָ לָ֑/ךְ וְ/לֹֽא הָיִ֜יתָ כְּ/עַבְדִּ֣/י דָוִ֗ד אֲשֶׁר֩ שָׁמַ֨ר מִצְוֺתַ֜/י וַ/אֲשֶׁר הָלַ֤ךְ אַחֲרַ/י֙ בְּ/כָל לְבָב֔/וֹ לַ/עֲשׂ֕וֹת רַ֖ק הַ/יָּשָׁ֥ר בְּ/עֵינָֽ/י־־־־׃
base_translation:
  language: en
  yaml_path: translation/ot/1_kings/014/008.yaml
  text: and I tore the kingdom away from the house of David and gave it to you[a]. But you have not been like my servant David, who kept my commandments and who walked after me with all his heart[b], to do only what was right in my eyes.
  footnotes:
  - marker: a
    text: Or 'followed me.' The Hebrew literally says 'walked after me.'
    reason: lexical_alternative
  - marker: b
    text: '''House of David'' is a dynastic expression, that is, David''s royal line.'
    reason: cultural_note
