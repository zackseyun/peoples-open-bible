translation:
  language: es
  text: Así hay esperanza para el pobre, y la injusticia[a] cierra su boca.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «la maldad cierra su boca»; más literalmente, «su boca se cierra».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַתְּהִי
  english_pob_choice: there is
  chosen_spanish: Así hay
  alternatives_spanish:
  - Entonces hay
  - Y hay
  - Así existe
  lexicon: HALOT
  rationale: El wayyiqtol introduce una conclusión resultativa. «Así hay» conserva el valor de consecuencia sin volver la frase artificial en español.
- source_word: לַדַּל
  english_pob_choice: for the poor
  chosen_spanish: para el pobre
  alternatives_spanish:
  - para el débil
  - para el necesitado
  - para el humilde
  lexicon: HALOT
  rationale: דַּל puede abarcar pobreza y debilidad social; «el pobre» es la opción más natural y suficientemente amplia en español, manteniendo el matiz de vulnerabilidad.
- source_word: תִּקְוָה
  english_pob_choice: hope
  chosen_spanish: esperanza
  alternatives_spanish:
  - expectativa
  lexicon: HALOT
  rationale: «Esperanza» reproduce el sentido normal del sustantivo y encaja con el contraste del verso.
- source_word: וְעֹלָתָה
  english_pob_choice: injustice
  chosen_spanish: la injusticia
  alternatives_spanish:
  - la maldad
  - el agravio
  - la iniquidad
  lexicon: HALOT
  rationale: עֹלָה/עַוְלָה aquí expresa injusticia o agravio. «La injusticia» conserva el peso ético y social que muestra el contexto.
- source_word: קָפְצָה פִּיהָ
  english_pob_choice: shuts its mouth
  chosen_spanish: le cierra la boca
  alternatives_spanish:
  - le ha cerrado la boca
  - la silencia
  - le cierra la boca
  lexicon: HALOT
  rationale: 'La imagen hebrea es idiomática: literalmente «cerró su boca». En español, «le cierra la boca» mantiene la fuerza figurada de ser silenciada y fluye con naturalidad.'
translation_notes:
  revision_awareness: El inglés POB adoptó una equivalencia optimal con «there is hope for the poor, and injustice shuts its mouth». Se preservó esa línea semántica, pero se ajustó la segunda cola para evitar una construcción demasiado literal en español y mantener el paralelismo poético.
  spanish_consistency_notes:
  - Se conserva un registro bíblico claro y moderno, sin recurrir a «SEÑOR» ni a fórmulas eclesiásticas no presentes en el hebreo.
  - «Esperanza» y «injusticia» siguen la elección léxica auditada del texto fuente.
  - Se mantiene el paralelismo breve y proverbial del hebreo en una sola oración española.
