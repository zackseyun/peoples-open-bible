translation:
  language: es
  text: y contra todos los cedros del Líbano, altos y levantados, y contra todas las encinas de Basán[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'terebintos de Basán'. El término hebreo puede referirse a una especie de árbol grande identificada ya sea como encina o terebinto.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְעַל
  english_pob_choice: and against
  chosen_spanish: y contra
  alternatives_spanish:
  - y sobre
  - y aun contra
  lexicon: HALOT
  rationale: En este contexto de juicio, עַל tiene valor hostil; 'contra' comunica mejor la idea de visita adversa que un simple sentido espacial. Conservo la conjunción 'y' para mantener la estructura enumerativa del verso.
- source_word: כָּל
  english_pob_choice: all
  chosen_spanish: todos / todas
  alternatives_spanish:
  - cada
  - todo
  lexicon: HALOT
  rationale: El hebreo usa el cuantificador inclusivo en una serie poética. En español, 'todos' y 'todas' reproducen naturalmente la amplitud colectiva del catálogo.
- source_word: אַרְזֵי הַלְּבָנוֹן
  english_pob_choice: the cedars of Lebanon
  chosen_spanish: los cedros del Líbano
  alternatives_spanish:
  - los cedros de لبنان
  - los cedros en el Líbano
  lexicon: HALOT
  rationale: La construcción en genitivo se rinde de manera natural con 'del Líbano'. 'Cedros' mantiene la imagen de árboles emblemáticos y majestuosos asociada al lugar.
- source_word: הָרָמִים
  english_pob_choice: lofty
  chosen_spanish: altos
  alternatives_spanish:
  - elevados
  - loftos
  lexicon: HALOT
  rationale: '''Altos'' es la forma más clara y digna en español para la altura física descrita. ''Loftos'' sería más marcado y menos natural.'
- source_word: וְהַנִּשָּׂאִים
  english_pob_choice: lifted up
  chosen_spanish: levantados
  alternatives_spanish:
  - alzados
  - exaltados
  lexicon: HALOT
  rationale: '''Levantados'' conserva la imagen verbal de נשׂא sin convertirla de entrada en un término honorífico abstracto. ''Exaltados'' podría sonar más interpretativo.'
- source_word: אַלּוֹנֵי הַבָּשָׁן
  english_pob_choice: the oaks of Bashan
  chosen_spanish: las encinas de Basán
  alternatives_spanish:
  - los robles de Basán
  - las terebintos de Basán
  lexicon: HALOT
  rationale: אַלּוֹן puede referirse a roble, encina o terebinto según el contexto. Aquí preservo la alternativa lexical con 'encinas', que es una opción española legítima para un árbol grande y majestuoso; la nota mantiene abierta la identificación botánica.
theological_decisions:
- issue: Imagen de árboles majestuosos en un oráculo de juicio
  english_pob_reading: Retain the literal tree imagery while allowing its metaphorical association with the proud to emerge from context.
  chosen_spanish_reading: Mantener la imagen literal de los árboles, sin convertirlos en una glosa explícita sobre gobernantes o naciones.
  alternative_spanish_readings:
  - Traducirlos directamente como símbolos de soberbios
  - Parafrasearlos como grandes poderes humanos
  rationale: La poesía profética funciona mejor si la imagen natural permanece visible. El contexto ya sugiere el valor simbólico de lo alto y lo levantado, por lo que no conviene sobreexplicar en el texto principal.
  doctrine_reference: Translation philosophy §§1, 3, 6
translation_notes:
  revision_awareness: 'El pasaje coincide con la revisión más reciente: no se requieren cambios sustanciales respecto del audit trail en inglés. Se preserva la estructura poética, la repetición de ''contra'', y la ambigüedad botánica documentada para אַלּוֹן.'
  spanish_consistency_notes:
  - Se usa 'contra' para עַל en un contexto de juicio, en coherencia con otros pasajes proféticos semejantes.
  - Se mantiene 'Líbano' y 'Basán' como topónimos transliterados estándar en español bíblico.
  - '''Altos y levantados'' refleja el paralelismo hebreo de dos descriptores cercanos sin forzar sinonimia exacta.'
  - La nota al pie conserva la alternativa lexical documentada sin introducir términos técnicos innecesarios en el cuerpo del texto.
