id: 1TI.3.3
reference: 1 Timothy 3:3
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: μὴ πάροινον, μὴ ⸀πλήκτην, ἀλλὰ ἐπιεικῆ, ἄμαχον, ἀφιλάργυρον,
base_translation:
  language: en
  yaml_path: translation/nt/1_timothy/003/003.yaml
  text: not given to drunkenness[a], not violent, but gentle, peaceable, free from the love of money[d][c][b],
  footnotes:
  - marker: a
    text: Or 'not addicted to wine' for πάροινον.
    reason: lexical_alternative
  - marker: b
    text: Or 'not a striker' for πλήκτην, emphasizing physical aggressiveness.
    reason: lexical_alternative
  - marker: c
    text: Or 'not quarrelsome' for ἄμαχον.
    reason: lexical_alternative
  - marker: d
    text: Or 'not a lover of money' for ἀφιλάργυρον.
    reason: lexical_alternative
translation:
  language: ko
  text: 술에 빠지지 않고[a], 손찌검하지 않고[b], 도리어 관대하며, 다투지 않고[c], 돈을 사랑하지 않으며[d],
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 또는 「술에 중독되지 않고」. 헬라어 πάροινος.
    reason: lexical_alternative
  - marker: b
    text: 또는 「때리는 자가 아니라」. 헬라어 πλήκτης는 신체적 공격성을 강조한다.
    reason: lexical_alternative
  - marker: c
    text: 또는 「다투기를 좋아하지 않고」. 헬라어 ἄμαχος.
    reason: lexical_alternative
  - marker: d
    text: 또는 「돈의 사랑이 없으며」. 헬라어 ἀφιλάργυρος.
    reason: lexical_alternative
lexical_decisions:
- source_word: μὴ πάροινον
  english_pob_choice: not given to drunkenness
  chosen_korean: 술에 빠지지 않고
  alternatives_korean:
  - 술 가까이 하지 않고
  - 술에 취하지 않고
  lexicon: BDAG
  rationale: πάροινος는 「술에 곁들여 있는·술 취해 난동을 부리는」. 「술에 빠지지 않고」가 자연스럽다.
- source_word: μὴ πλήκτην
  english_pob_choice: not violent
  chosen_korean: 손찌검하지 않고
  alternatives_korean:
  - 폭력적이지 않고
  - 때리는 자가 아니며
  lexicon: BDAG
  rationale: πλήκτης는 「때리는 자」. 신체적 공격을 자연스럽게 가리키는 「손찌검」 사용.
- source_word: ἐπιεικῆ
  english_pob_choice: gentle
  chosen_korean: 관대하며
  alternatives_korean:
  - 온유하며
  - 양보하며
  lexicon: BDAG
  rationale: ἐπιεικής는 엄격한 권리 주장을 누그러뜨리는 「관대·양보」의 어감. 「관대」가 자연스럽다.
- source_word: ἄμαχον
  english_pob_choice: peaceable
  chosen_korean: 다투지 않고
  alternatives_korean:
  - 평화로우며
  - 싸우지 않고
  lexicon: BDAG
  rationale: μάχη(싸움)의 부정 합성. 「다투지 않고」가 본의에 가장 가깝다.
- source_word: ἀφιλάργυρον
  english_pob_choice: free from the love of money
  chosen_korean: 돈을 사랑하지 않으며
  alternatives_korean:
  - 탐욕적이지 않으며
  - 돈의 사랑이 없으며
  lexicon: BDAG
  rationale: 「돈 사랑」의 부정 합성. 6:10의 「돈 사랑」 주제와 어휘적 연결을 살린다.
