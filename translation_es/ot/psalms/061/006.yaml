translation:
  language: es
  text: Porque tú, oh Dios, has oído mis votos; has dado la herencia de los que temen tu nombre[a][b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: ‘me has dado la herencia de los que temen tu nombre’. El hebreo no expresa explícitamente ‘me’, aunque algunos lo entienden por el contexto.'
    reason: alternative_reading
  - marker: b
    text: ‘Los que temen tu nombre’ significa los que viven en reverente temor de Dios.
    reason: cultural_note
lexical_decisions:
- source_word: כִּי
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  lexicon: HALOT
  rationale: En español, ‘Porque’ conserva con naturalidad el valor causal o fundacional que introduce la razón de la confianza o la petición anterior.
- source_word: אֱלֹהִים
  english_pob_choice: O God
  chosen_spanish: oh Dios
  alternatives_spanish:
  - Dios
  - oh, Dios
  lexicon: HALOT
  rationale: El hebreo está en vocativo; ‘oh Dios’ refleja la apelación directa de manera natural en español litúrgico y conserva la fuerza orante.
- source_word: שָׁמַעְתָּ
  english_pob_choice: have heard
  chosen_spanish: has escuchado
  alternatives_spanish:
  - has oído
  - escuchaste
  lexicon: HALOT
  rationale: El perfecto hebreo expresa acción cumplida con relevancia presente; ‘has escuchado’ reproduce bien ese valor y suena idiomático en español.
- source_word: לִנְדָרַי
  english_pob_choice: my vows
  chosen_spanish: mis votos
  alternatives_spanish:
  - mis promesas
  - mis votos ofrecidos
  lexicon: HALOT
  rationale: נדר designa ‘votos’ más que meras promesas. ‘Mis votos’ es la opción más directa y eclesialmente comprensible sin perder precisión.
- source_word: נָתַתָּ
  english_pob_choice: you have given
  chosen_spanish: me has dado
  alternatives_spanish:
  - has dado
  - me diste
  - has concedido
  lexicon: HALOT
  rationale: La revisión inglesa añadió un objeto implícito (‘me’) para reflejar el sentido pronominal inferido del contexto. En español, ‘me has dado’ permite esa misma lectura sin borrar la tensión del hebreo.
- source_word: יְרֻשַּׁת
  english_pob_choice: the inheritance
  chosen_spanish: la herencia
  alternatives_spanish:
  - la heredad
  - la posesión heredada
  lexicon: HALOT
  rationale: ‘Herencia’ es la forma más clara y natural en español moderno para una posesión recibida por derecho de heredad, manteniendo el matiz pactal.
- source_word: יִרְאֵי שְׁמֶךָ
  english_pob_choice: those who fear your name
  chosen_spanish: de los que temen tu nombre
  alternatives_spanish:
  - de los que reverencian tu nombre
  - de los que viven en reverente temor de tu nombre
  lexicon: HALOT
  rationale: ‘Temen’ preserva la fuerza teológica de ירא mejor que ‘reverencian’. ‘Tu nombre’ mantiene el hebraísmo sin suavizarlo en exceso.
theological_decisions:
- issue: Objeto implícito en ‘you have given’
  english_pob_reading: The Hebrew lacks an explicit indirect object in the base line; the English audit trail first left it implicit, then a later revision supplied ‘me.’
  chosen_spanish_reading: me has dado la herencia de los que temen tu nombre
  alternative_spanish_readings:
  - has dado la herencia de los que temen tu nombre
  - me has concedido la herencia de los que temen tu nombre
  rationale: El hebreo permite inferir un beneficiario, y la revisión inglesa optó por hacerlo explícito para completar la cláusula. En español, incluir ‘me’ comunica naturalmente esa inferencia sin ocultar que el dato no está expresado de modo abierto en el texto base.
  doctrine_reference: Principio de primacía del original con claridad sintáctica en la lengua meta.
- issue: Sentido de ‘los que temen tu nombre’
  english_pob_reading: Those who fear your name means those who live in reverent awe of God.
  chosen_spanish_reading: los que temen tu nombre
  alternative_spanish_readings:
  - los que reverencian tu nombre
  - los que viven en temor reverente de tu nombre
  rationale: ‘Temen’ conserva la densidad bíblica de ירא y evita diluir la frase en un simple respeto cultural. La explicación del sentido reverente puede quedar en nota, pero no conviene vaciar el verbo principal.
  doctrine_reference: Teología bíblica del temor de Yahvé / reverencia pactal.
translation_notes:
  revision_awareness: La revisión inglesa reciente añadió ‘me’ para reflejar el objeto pronominal inferible en el hebreo. La versión española sigue esa adjudicación sintáctica, pero conserva el sentido original de herencia dada a los que temen el nombre de Dios sin sobreexplicar el beneficiario implícito más allá de lo necesario.
  spanish_consistency_notes:
  - Se usó ‘Dios’ en vocativo, no ‘SEÑOR’, porque el hebreo aquí es אֱלֹהִים.
  - Se prefirió ‘temen’ sobre ‘reverencian’ para sostener el peso lexical de ירא.
  - ‘Herencia’ mantiene el campo semántico pactal y jurídico de יְרֻשַּׁת.
