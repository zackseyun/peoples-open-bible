review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la estructura y el sentido del hebreo: condición hipotética, existencia de un mediador celestial, rareza de la figura y propósito de declarar al hombre su rectitud/lo recto para él. También conserva adecuadamente las alternativas léxicas documentadas en el audit trail inglés.'
  spanish_quality_summary: 'El texto es claro y fiel, pero «para él» tras «hay» suena algo forzado en español bíblico-natural. «Hay para él» es comprensible, aunque «hay junto a él» introduciría un matiz espacial no explicitado. La reparación mínima recomendada es estilística y de naturalidad: mantener la sintaxis pero ajustar la nota b para que suene más idiomática en español. El resto del verso es legible y digno.'
  glossary_alignment: No hay conflictos con la terminología base del proyecto. «Ángel», «mediador», «hombre» y «rectitud» se alinean con las decisiones léxicas auditadas. Las notas preservan correctamente «intérprete/mensajero» y la alternativa de sentido para יָשְׁרוֹ.
  issues:
  - severity: low
    issue: La nota b usa «para declarar al hombre lo que es recto para él», que en español puede sonar algo pesada por la repetición de «para».
    rationale: No afecta la fidelidad, pero una formulación más natural como «para hacer saber al hombre lo que es recto para él» preserva mejor la alternativa idiomática documentada.
  revised_spanish_text: Si hay para él un ángel[a], un mediador, uno entre mil, para declarar al hombre su rectitud[b],
  revised_footnotes:
  - marker: a
    text: O «un ángel, un intérprete» o «un mensajero, un mediador».
    reason: alternative_reading
  - marker: b
    text: O «para hacer saber al hombre lo que es recto para él».
    reason: alternative_reading
  revision_rationale: Se conserva el texto principal porque es fiel al hebreo y al audit trail inglés. Solo se ajusta la nota b para mejorar la naturalidad del español sin cambiar el sentido ni la ambigüedad léxica preservada por la traducción inglesa.
