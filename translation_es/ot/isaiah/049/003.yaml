translation:
  language: es
  text: 'Y me dijo: «Tú eres mi siervo, Israel, en ti[a] seré glorificado».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «en quien seré glorificado». El hebreo dice más literalmente «en ti», y el verbo también puede expresar un matiz reflexivo: «me glorificaré en ti» o «mostraré mi gloria en ti».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר
  english_pob_choice: And he said
  chosen_spanish: Y dijo
  alternatives_spanish:
  - Entonces dijo
  lexicon: HALOT
  rationale: El wayyiqtol introduce la acción siguiente en secuencia narrativa. «Y dijo» conserva ese avance sin añadir matiz temporal que el hebreo no exige.
- source_word: לִי
  english_pob_choice: to me
  chosen_spanish: a mí
  alternatives_spanish:
  - me
  lexicon: HALOT
  rationale: La preposición ל con sufijo de primera persona marca complemento indirecto; en español, «a mí» es claro y mantiene el destinatario explícito.
- source_word: עַבְדִּי
  english_pob_choice: my servant
  chosen_spanish: mi siervo
  alternatives_spanish:
  - mi esclavo
  lexicon: HALOT
  rationale: En Isaías, el término pertenece al lenguaje del Siervo y aquí expresa servicio comisionado. «Siervo» comunica mejor ese valor en español bíblico que «esclavo», que sería demasiado duro para este contexto.
- source_word: אָתָּה
  english_pob_choice: you are
  chosen_spanish: tú eres
  alternatives_spanish:
  - eres tú
  lexicon: HALOT
  rationale: El pronombre independiente es enfático; en español la forma natural es explicitar el sujeto con «tú eres».
- source_word: יִשְׂרָאֵל
  english_pob_choice: Israel
  chosen_spanish: Israel
  lexicon: HALOT
  rationale: Nombre propio conservado. Se mantiene la relación apposicional con «mi siervo» sin resolver en la traducción si se trata de la nación, del remanente o del siervo representativo.
- source_word: אֲשֶׁר בְּךָ
  english_pob_choice: in whom
  chosen_spanish: en ti
  alternatives_spanish:
  - en quien
  - por medio de ti
  lexicon: HALOT
  rationale: El hebreo tiene literalmente «en ti». En español, la construcción directa «en ti» conserva mejor el valor básico de בְּךָ y evita imponer una formulación relativa que el texto no requiere. El sentido de esfera o medio queda implícito en el contexto.
- source_word: אֶתְפָּאָר
  english_pob_choice: I will be glorified
  chosen_spanish: seré glorificado
  alternatives_spanish:
  - me glorificaré
  - mostraré mi gloria
  lexicon: HALOT
  rationale: El hitpael de פאר puede expresar la idea de ser/mostrarse glorioso o de recibir gloria. «Seré glorificado» sigue de cerca la lectura adoptada en el audit trail inglés, mantiene el registro formal y conserva la ambigüedad reflexiva sin hacerla más explícita de lo que permite el hebreo.
theological_decisions:
- issue: Identidad de «Israel» dentro del canto del Siervo
  english_pob_reading: Render the text straightforwardly as direct address... without resolving whether Israel refers to the nation, remnant, or representative servant.
  chosen_spanish_reading: 'Traducir de manera directa: «Tú eres mi siervo, Israel», sin decidir en la traducción si Israel designa a la nación, al remanente fiel o al Siervo representativo/Mesías.'
  alternative_spanish_readings:
  - «Tú eres mi siervo, el Israel fiel»
  - «Tú eres mi siervo, el pueblo de Israel»
  rationale: El versículo presenta una tensión interpretativa real que el texto mismo no resuelve. La versión española debe preservarla en vez de armonizarla doctrinalmente.
  doctrine_reference: 'Translation philosophy §3: preservar la tensión teológica en lugar de resolverla.'
translation_notes:
  revision_awareness: La redacción sigue la revisión más reciente del audit trail inglés, que prefirió «I will be glorified» frente a «I will display my glory» para reflejar con más cercanía el verbo hebreo y conservar el registro formal. La versión española adopta esa misma decisión y ajusta la sintaxis para que suene natural en español.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma general cuando aparezca el nombre divino; este versículo no lo contiene.
  - Se usa «siervo» para עבד en coherencia con el uso establecido en Isaías, no «esclavo».
  - Se conserva la tensión interpretativa sobre «Israel» sin introducir aclaraciones doctrinales en el texto principal.
  - La nota al pie recoge la alternativa verbal señalada en el audit trail inglés para reflejar la ambigüedad del hebreo.
