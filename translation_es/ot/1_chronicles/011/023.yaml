    issue: La nota [c] está anclada a «lanza» pero su contenido no corresponde al término hebreo de «lanza».
    rationale: El hebreo חֲנִית significa «lanza» y el audit trail inglés no registra alternativa aquí como «vara» o «bastón». Esas alternativas pertenecen a בַּשָּׁבֶט. La nota actual desinforma al lector sobre el texto fuente.
  - severity: medium
    issue: Las notas [c] y [d] duplican de forma confusa el campo semántico de בַּשָּׁבֶט.
    rationale: Solo debe haber una nota lexical alternativa para «con un bastón» si se desea preservar las opciones «vara» o «palo/garrote». Mantener otra nota sobre «lanza» crea redundancia y error.
  - severity: low
    issue: La puntuación con punto y coma antes de «y descendió hacia él» es algo pesada.
    rationale: No es incorrecta, pero una coma mantiene mejor el flujo narrativo del español moderno y sigue la coordinación simple del hebreo.
  revised_spanish_text: Y él hirió al egipcio[a], un hombre de cinco codos[b] de estatura. En la mano del egipcio había una lanza como el rodillo de un telar, y descendió hacia él con un bastón[c], le arrebató la lanza de la mano del egipcio y lo mató con su propia lanza.
