revisions:
- from: 'Y él dijo[a]: «Tú tomarás estas siete ovejas de mi mano, para que sirvan como testimonio para mí de que cavé este pozo».'
  to: 'Y él dijo[a]: «Tomarás estas siete corderas de mi mano, para que sean un testimonio para mí de que cavé este pozo».'
  rationale: Se ajusta «ovejas» a «corderas» para reflejar mejor כְּבָשֹׂת y el inglés auditado «ewe lambs». Se simplifica «sirvan como testimonio» a «sean un testimonio», más directo y más cercano a la construcción evidencial del original y del POB. Se omite «Tú» por naturalidad del español sin pérdida de sentido. La nota se conserva y se adapta al nuevo sustantivo.
