    issue: Uso de 'oh Señor' en lugar de 'Yahvé'
    rationale: La política del proyecto establece 'Yahvé' en el texto principal para el nombre divino, y la explicación del borrador apela a la fluidez litúrgica más que a una excepción documentada. En este contexto de invocación al Dios de Israel, 'Yahvé' debe preferirse.
  - severity: medium
