translation:
  language: es
  text: Pero Nadab y Abiú murieron cuando ofrecieron fuego extraño delante de Yahvé[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «fuego extraño» o «fuego ajeno». El hebreo se refiere a un fuego que no había sido autorizado para ofrecerse delante de Yahvé.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּמָת
  english_pob_choice: died
  chosen_spanish: murieron
  alternatives_spanish:
  - y murió
  - murió
  lexicon: HALOT
  rationale: El hebreo presenta un verbo singular con sujeto compuesto («Nadab y Abiú»). En español natural se expresa con plural para concordar con el sujeto compuesto y conservar el sentido narrativo sin dureza literal innecesaria.
- source_word: נָדָב וַאֲבִיהוּא
  english_pob_choice: Nadab and Abihu
  chosen_spanish: Nadab y Abiú
  alternatives_spanish:
  - Nadab y Abihú
  lexicon: Convención onomástica bíblica
  rationale: Se transliteran los nombres propios de forma estándar en español bíblico. «Abiú» es la forma más habitual y legible en español para el segundo nombre.
- source_word: בְּהַקְרִיבָם
  english_pob_choice: when they offered
  chosen_spanish: cuando ofrecieron
  alternatives_spanish:
  - al ofrecer
  - en su ofrecer
  lexicon: HALOT
  rationale: La construcción con ב + infinitivo constructo y sufijo expresa aquí temporalidad. «Cuando ofrecieron» reproduce de manera natural y precisa el valor temporal en español.
- source_word: אֵשׁ זָרָה
  english_pob_choice: strange fire
  chosen_spanish: fuego extraño
  alternatives_spanish:
  - fuego ajeno
  - fuego no autorizado
  lexicon: HALOT
  rationale: Se mantiene la correspondencia léxica más cercana al hebreo («extraño») sin perder el sentido cultual. «No autorizado» explicita la interpretación, pero el texto base conserva una expresión más directa y tradicional.
- source_word: לִפְנֵי יְהוָה
  english_pob_choice: before Yahweh
  chosen_spanish: delante de Yahvé
  alternatives_spanish:
  - en presencia de Yahvé
  - ante Yahvé
  lexicon: HALOT
  rationale: «Delante de» conserva el valor espacial/cultual de לִפְנֵי. Se usa «Yahvé» conforme al criterio del proyecto para el nombre divino.
theological_decisions:
- issue: Traducción del nombre divino יְהוָה
  english_pob_reading: Yahweh / the LORD in the English audit trail
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Yahveh
  rationale: El hebreo usa el Tetragrámaton directamente. Conforme al criterio del proyecto, se preserva el nombre divino con «Yahvé» en vez de sustituirlo por una forma de máscara litúrgica.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Sentido de אֵשׁ זָרָה
  english_pob_reading: strange fire / foreign fire; fire not authorized for offering before the LORD
  chosen_spanish_reading: fuego extraño
  alternative_spanish_readings:
  - fuego ajeno
  - fuego no autorizado
  rationale: La expresión hebrea admite un campo semántico de extrañeza, ajenidad e impropiedad cultual. «Fuego extraño» mantiene esa tensión sin resolverla demasiado; la nota explica la implicación de no haber sido autorizado.
  doctrine_reference: HALOT; nota auditada en la POB inglesa
translation_notes:
  revision_awareness: La versión española sigue la revisión más reciente del audit trail inglés, que prefirió «strange fire» por mayor cercanía léxica y registro formal frente a una explicación más interpretativa. Por eso el texto mantiene «fuego extraño» y añade una nota breve para aclarar la fuerza cultual de la expresión.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» para יְהוָה en concordancia con el estándar del proyecto.
  - Se usa «delante de» para לִפְנֵי, evitando una paráfrasis más libre.
  - «Murieron» adapta correctamente el verbo hebreo singular con sujeto compuesto sin alterar el sentido.
  - No se sustituye «fuego extraño» por una explicación larga en el cuerpo del verso, para preservar la concisión del original.
