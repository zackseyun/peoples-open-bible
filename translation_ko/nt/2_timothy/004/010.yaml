source:
  edition: SBLGNT
  text: Δημᾶς γάρ με ⸀ἐγκατέλιπεν ἀγαπήσας τὸν νῦν αἰῶνα, καὶ ἐπορεύθη εἰς Θεσσαλονίκην, Κρήσκης εἰς Γαλατίαν, Τίτος εἰς Δαλματίαν·
base_translation:
  language: en
  yaml_path: translation/nt/2_timothy/004/010.yaml
  text: For Demas deserted me, having loved the present age, and went to Thessalonica; Crescens to Galatia, Titus to Dalmatia.
translation:
  language: ko
  text: 데마는 이 세상[a]을 사랑하여 나를 버리고 데살로니가로 떠나갔습니다. 그레스게는 갈라디아로, 디도는 달마디아로 갔습니다.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 직역하면 「지금의 시대」. 헬라어 αἰών은 신학적으로 영적·도덕적 차원을 함의한 「시대」를 가리킨다.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐγκατέλιπεν
  english_pob_choice: deserted me
  chosen_korean: 나를 버리고
  alternatives_korean:
  - 나를 떠나
  - 나를 저버리고
  lexicon: BDAG
  rationale: ἐγκαταλείπω는 「내버려 두고 떠남·저버림」. 「버리다」가 본 절의 배신적 무게를 담는다(4:16에서 동일 어휘 재사용).
- source_word: ἀγαπήσας τὸν νῦν αἰῶνα
  english_pob_choice: having loved the present age
  chosen_korean: 이 세상을 사랑하여
  alternatives_korean:
  - 지금 이 시대를 사랑하여
  - 현세를 사랑하여
  lexicon: BDAG
  rationale: 「이 세상」은 한국 성서 전통의 익숙한 표현. 직역(지금의 시대)은 각주에 둔다.
- source_word: Δημᾶς ... Κρήσκης ... Τίτος ... Δαλματίαν
  english_pob_choice: Demas ... Crescens ... Titus ... Dalmatia
  chosen_korean: 데마 ... 그레스게 ... 디도 ... 달마디아
  alternatives_korean:
  - 데마스 ... 크레스켄스 ... 티토 ... 달마티아
  lexicon: BDAG
  rationale: 글로사리 지침 및 한국 성서 전통(개역개정)을 따른다.
