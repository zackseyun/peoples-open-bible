  timestamp: '2026-05-07T23:44:29Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español acierta en la fórmula de datación, en «vio un sueño» y en la secuencia narrativa general. Sin embargo, no preserva bien el sentido idiomático de la cláusula final: «dijo el resumen de las palabras» suena forzado y no refleja adecuadamente el valor de רֵאשׁ מִלִּין como suma/sustancia del asunto. Además, «visiones de su cabeza» es demasiado extraño en español dentro del texto principal; conviene una formulación natural con nota que preserve la literalidad.'
  spanish_quality_summary: 'El texto es mayormente claro, pero dos giros resultan poco naturales para español bíblico legible: «visiones de su cabeza» y especialmente «dijo el resumen de las palabras». «Mientras estaba en su cama» es comprensible, aunque «estando en su cama» o «sobre su cama» sería más ceñido. La revisión propuesta mejora fidelidad y fluidez sin perder el trasfondo arameo.'
  glossary_alignment: No hay conflictos con la terminología doctrinal del proyecto. Los nombres propios y términos clave están bien. La principal corrección es idiomática/lexical en la frase final, donde el inglés auditado ya explica que el arameo significa el sumario o sustancia del asunto.
  issues:
  - severity: medium
    issue: «visiones de su cabeza» en el texto principal
    rationale: Aunque refleja de cerca el inglés revisado, en español suena opaco y poco idiomático. El propio rastro léxico reconoce que el arameo es idiomático para visiones interiores/mentales; «visiones en su cabeza» comunica mejor el sentido sin sobreinterpretar, y la nota puede conservar la alternativa más literal.
  - severity: high
    issue: «dijo el resumen de las palabras» no comunica bien רֵאשׁ מִלִּין אֲמַר
    rationale: La expresión española es poco natural y no transmite el sentido de ‘contó/dijo la suma del asunto’. La auditoría inglesa culmina en «told the sum of the matter», no en una construcción literal con «palabras». En español, «expuso la suma del asunto» o «dijo la sustancia del asunto» refleja mejor el idiomatismo.
  - severity: low
    issue: Falta una nota para la cláusula final idiomática
    rationale: El inglés POB preserva una nota lexical_alternative sobre la literalidad de «head of the words». Dado que la revisión española debe alejarse de una forma demasiado rígida para sonar natural, conviene conservar esa alternativa en nota.
