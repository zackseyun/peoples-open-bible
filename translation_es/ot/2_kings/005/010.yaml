    issue: Los marcadores de notas al pie están colocados en palabras equivocadas.
    rationale: La nota [a] explica la alternativa de «tu carne volverá a ti», no «mensajero»; y la nota [b] explica «quedarás limpio / serás limpiado», no «volverá a ti». Esto crea un error de documentación y de lectura.
  - severity: low
    issue: La puntuación con punto y coma antes de la promesa es estilísticamente opcional.
    rationale: No es incorrecta, pero una coma también funcionaría. No requiere cambio obligatorio.
