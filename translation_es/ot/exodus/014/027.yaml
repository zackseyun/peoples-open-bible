base_translation:
  language: en
  yaml_path: translation/ot/exodus/014/027.yaml
  text: So Moses stretched out his hand over the sea[a], and toward morning the sea returned to its usual place, while the Egyptians were fleeing toward it[b]. And Yahweh threw the Egyptians into the midst of the sea.
  footnotes:
  - marker: a
    text: Or 'to its full force' or 'to its former state.' The Hebrew expression indicates that the sea resumed its enduring, normal condition.
    reason: lexical_alternative
  - marker: b
    text: The Hebrew verb literally means 'shook off' or 'shook out,' a vivid image for the LORD's casting the Egyptians into the sea.
    reason: lexical_alternative
