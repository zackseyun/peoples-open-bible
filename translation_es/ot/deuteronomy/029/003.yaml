review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien el hebreo y las decisiones del POB en los puntos principales: mantiene el contraste inicial con «Pero», conserva «Yahvé», retiene la imaginería de «corazón / ojos / oídos», y expresa la persistencia temporal con «hasta este día». También preserva adecuadamente la atribución directa a Yahvé de no haber dado esa capacidad. Sin embargo, la nota al pie no preserva la alternativa inglesa completa, porque omite la variante inicial «Y...» y no reproduce la coordinación alternativa de toda la cláusula.'
  spanish_quality_summary: 'El español principal es natural, claro y digno: «Pero Yahvé no les ha dado un corazón para conocer, ni ojos para ver, ni oídos para oír, hasta este día». La sintaxis negativa con «ni... ni...» es idiomática y fiel. No obstante, la nota actual queda incompleta y algo defectuosa, porque empieza después de «ha dado» y por tanto no ofrece una alternativa real de lectura para toda la oración.'
  glossary_alignment: 'Alineación buena con la glosa del proyecto: יהוה -> «Yahvé» correctamente; לֵב conservado como «corazón»; las expresiones sensoriales se mantienen literales y legibles; no hay conflictos terminológicos relevantes. La única corrección necesaria es en la nota alternativa, no en la terminología principal.'
  issues:
  - severity: medium
    issue: La nota al pie alternativa está incompleta y no corresponde a la alternativa auditada en inglés.
    rationale: 'La nota inglesa preserva una lectura alternativa de toda la oración: «And ... until this day» con coordinación positiva repetida. La nota española actual («O ''un corazón para conocer...''») omite el arranque verbal y el contraste/conjunción, así que no representa fielmente la alternativa documentada.'
  revised_spanish_text: Pero Yahvé no les ha dado[a] un corazón para conocer, ni ojos para ver, ni oídos para oír, hasta este día.
  revised_footnotes:
  - marker: a
    text: O «Y Yahvé no les ha dado un corazón para conocer, y ojos para ver, y oídos para oír, hasta este día»; o «hasta el día de hoy».
    reason: Preserva la alternativa documentada de la conjunción inicial («Y» en vez de «Pero»), la coordinación repetida («y... y...») y la variante temporal equivalente a «until/to this day» en español.
  revision_rationale: Se conserva intacto el texto principal porque es fiel, natural y teológicamente adecuado. Solo se corrige la nota al pie para que refleje de manera completa la alternativa registrada en la auditoría inglesa y no deje una cita fragmentaria.
