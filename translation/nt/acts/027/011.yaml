id: ACT.27.11
reference: Acts 27:11
source:
  edition: SBLGNT
  text: ὁ δὲ ἑκατοντάρχης τῷ κυβερνήτῃ καὶ τῷ ναυκλήρῳ ⸂μᾶλλον ἐπείθετο⸃ ἢ τοῖς ⸀ὑπὸ Παύλου λεγομένοις.
translation:
  text: But the centurion paid more attention to the pilot and the shipowner than to what was being said by Paul[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'was more persuaded by the pilot and the shipowner than by what Paul said.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἑκατοντάρχης
  chosen: centurion
  alternatives:
  - Roman officer in charge of a hundred soldiers
  lexicon: BDAG
  rationale: Standard historical term for a Roman military officer; 'centurion' is precise and natural in English.
- source_word: κυβερνήτῃ
  chosen: pilot
  alternatives:
  - helmsman
  - captain
  lexicon: BDAG
  rationale: In this maritime context the term refers to the one who steers or navigates the vessel. 'Pilot' is concise and idiomatic; 'captain' could blur the distinction from ναύκληρος.
- source_word: ναυκλήρῳ
  chosen: shipowner
  alternatives:
  - captain
  - master of the ship
  lexicon: BDAG
  rationale: The term commonly denotes the owner or principal operator of the ship. Since κυβερνήτης has already been rendered distinctly, 'shipowner' preserves the likely difference between the two roles.
- source_word: μᾶλλον ἐπείθετο
  chosen: paid more attention to
  alternatives:
  - was more persuaded by
  - trusted more
  - listened more to
  lexicon: BDAG
  rationale: The imperfect middle/passive of πείθω here conveys being persuaded or giving credence. 'Paid more attention to' fits the decision-making context in natural English without overstating internal conviction; it also captures the comparative force of μᾶλλον.
- source_word: τοῖς ὑπὸ Παύλου λεγομένοις
  chosen: what was being said by Paul
  alternatives:
  - the things spoken by Paul
  - what Paul said
  lexicon: BDAG
  rationale: The articular participial construction refers to Paul's spoken words or advice. 'What was being said by Paul' preserves the passive participial form and the focus on his counsel rather than merely a past speech act.
- source_word: δὲ
  chosen: But
  alternatives:
  - Now
  - And
  lexicon: BDAG
  rationale: Marks contrast with the preceding warning from Paul; 'But' best signals that contrast in English.
- source_word: ἢ
  chosen: than
  alternatives:
  - rather than
  lexicon: BDAG
  rationale: Standard comparative marker paired with μᾶλλον; 'than' is the most direct rendering.
