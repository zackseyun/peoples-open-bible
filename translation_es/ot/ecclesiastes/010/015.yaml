translation:
  language: es
  text: El trabajo de los necios[a] los agota, porque no sabe ir a una ciudad.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «El trabajo de los necios los agota, porque no saben ir a una ciudad». El hebreo admite un sentido más colectivo, pero la lectura singular sigue la vinculación gramatical más directa.'
    reason: alternative_reading
lexical_decisions:
- source_word: עֲמַל
  english_pob_choice: labor
  chosen_spanish: trabajo
  alternatives_spanish:
  - fatiga
  - afán
  - labor
  lexicon: HALOT
  rationale: עֲמַל denota esfuerzo penoso o laboriosa fatiga. En español, «trabajo» comunica el esfuerzo concreto sin volverlo demasiado abstracto; «labor» también es posible, pero aquí «trabajo» suena más natural y conserva la idea de esfuerzo oneroso.
- source_word: הַכְּסִילִים
  english_pob_choice: fools
  chosen_spanish: necios
  alternatives_spanish:
  - fools
  - insensatos
  - los necios
  lexicon: HALOT
  rationale: En la literatura sapiencial, כְּסִיל es una categoría moral e intelectual; «necio» es el equivalente español más estable y respetuoso del matiz sapiencial. Mantiene el plural del hebreo.
- source_word: תְּיַגְּעֶנּוּ
  english_pob_choice: wearies them
  chosen_spanish: los agota
  alternatives_spanish:
  - los cansa
  - los fatiga
  - los desgaste
  lexicon: HALOT
  rationale: El verbo expresa causar cansancio o agotamiento. «Los agota» transmite bien la fuerza del piel y funciona en español con naturalidad; además, concuerda con el sujeto plural previo, como en la revisión inglesa más reciente.
- source_word: לֹא יָדַע
  english_pob_choice: does not know
  chosen_spanish: no sabe
  alternatives_spanish:
  - no conoce
  - no entiende
  - no ha sabido
  lexicon: HALOT
  rationale: En este proverbio, ידע expresa incapacidad o falta de destreza para orientarse. «No sabe» conserva la lectura proverbial y la sencillez del hebreo mejor que una paráfrasis más explicativa.
- source_word: לָלֶכֶת
  english_pob_choice: how to go
  chosen_spanish: cómo ir
  alternatives_spanish:
  - cómo caminar
  - cómo hacerse camino
  - a ir
  lexicon: HALOT
  rationale: לֶכֶת con ידע forma una expresión idiomática de saber ir o saber abrirse paso. «Cómo ir» es breve, fiel y natural; no fuerza una ampliación que el hebreo no exige.
- source_word: אֶל עִיר
  english_pob_choice: to the city
  chosen_spanish: a la ciudad
  alternatives_spanish:
  - a una ciudad
  - a una población
  - a la ciudad
  lexicon: HALOT
  rationale: Aunque el hebreo es genérico, la referencia a una ciudad concreta o típica puede expresarse con artículo definido en español sin traicionar el sentido proverbial. «A la ciudad» sigue la revisión inglesa final y suena más idiomático que un indefinido demasiado frío.
theological_decisions:
- issue: Lectura colectiva o singular del cierre
  english_pob_reading: for he does not know how to go to the city
  chosen_spanish_reading: porque no sabe cómo ir a la ciudad
  alternative_spanish_readings:
  - porque no saben cómo ir a la ciudad
  - porque quien no sabe cómo ir a la ciudad
  rationale: El hebreo admite una lectura más colectiva por los sufijos y la cláusula relativa, pero la vinculación gramatical más directa es singular. El español principal sigue esa lectura, mientras que la forma plural se conserva como posibilidad alternativa en la nota.
  doctrine_reference: Ninguna; decisión gramatical y de sentido proverbial.
translation_notes:
  revision_awareness: La redacción española sigue la revisión inglesa más reciente en el plural del complemento («los agota») y mantiene el cierre proverbial con artículo definido («a la ciudad»), mientras conserva en nota la alternativa colectiva reconocida por el aparato inglés.
  spanish_consistency_notes:
  - He usado «necios» para כְּסִילִים, en coherencia con la terminología sapiencial bíblica en español.
  - He evitado «SEÑOR» o cualquier sustitución innecesaria porque el versículo no contiene el nombre divino.
  - El pronombre y los verbos se han ajustado al plural de «los necios», aunque el relativo final permanezca singular por seguir la lectura gramatical más directa del hebreo.
  - «Ir» mantiene el valor básico de הלך en este contexto proverbial, sin añadir matices no exigidos por el texto.
