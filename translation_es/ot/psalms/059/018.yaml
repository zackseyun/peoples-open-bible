review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura básica del hebreo: vocativo inicial, dirección de la alabanza, causa introducida por כִּי, y las dos designaciones de Dios como baluarte y como ‘Dios de mi…’. Sin embargo, hay dos problemas de fidelidad fina: ‘Oh mi fortaleza’ suena poco natural en español y no es la mejor forma de marcar el vocativo; y la nota al pie a mezcla indebidamente una alternativa para עֻזִּי con una explicación que en realidad corresponde a אֱלֹהֵי חַסְדִּי.'
  spanish_quality_summary: El texto es generalmente claro, pero ‘Oh mi fortaleza’ resulta forzado; en español bíblico natural conviene ‘Oh, fuerza mía’ o simplemente ‘Mi fuerza’. Además, ‘amor leal’ es defendible, pero ‘amor fiel’ suele sonar más natural y digno en español eclesial amplio sin perder la carga de חֶסֶד. La nota actual no corresponde al anclaje textual y por eso debe corregirse o eliminarse.
  glossary_alignment: No hay conflicto con los términos base del proyecto. ‘Dios’ está bien para אֱלֹהִים. ‘Baluarte’ es una buena opción para מִשְׂגַּבִּי. La decisión sobre חֶסֶד debe preservar la tensión del hebreo; ‘el Dios de mi amor fiel’ lo hace mejor en español natural que ‘amor leal’, aunque ambas son posibles.
  issues:
  - severity: medium
    issue: Vocativo español poco natural en ‘Oh mi fortaleza’
    rationale: Aunque el inglés usa ‘O my strength’, en español ‘Oh mi fortaleza’ suena calcado. ‘Oh, fuerza mía’ expresa mejor el vocativo poético y preserva el sentido de עֻזִּי.
  - severity: high
    issue: La nota [a] está mal anclada y mezcla dos problemas distintos
    rationale: El marcador está sobre ‘mi fortaleza’, pero el contenido incluye ‘El hebreo dice literalmente “el Dios de mi amor leal”’, lo cual corresponde a אֱלֹהֵי חַסְדִּי, no a עֻזִּי. Esto confunde al lector y no respeta la disciplina de notas.
  - severity: low
    issue: ‘Amor leal’ es aceptable pero menos idiomático que ‘amor fiel’
    rationale: Para חֶסֶד en esta construcción comprimida, ‘amor fiel’ suena más natural en español general y mantiene la idea de constancia/covenantalidad sin paráfrasis.
  revised_spanish_text: Oh, fuerza mía, a ti cantaré alabanzas, porque Dios es mi baluarte, el Dios de mi amor fiel.[a]
  revised_footnotes:
  - marker: a
    text: O «mi Dios misericordioso» o «el Dios que me muestra amor fiel». El hebreo dice literalmente «el Dios de mi amor fiel».
    reason: alternative_reading
  revision_rationale: Se corrige el vocativo para que suene natural en español poético, se mueve la nota al lugar correcto para reflejar la alternativa documentada de אֱלֹהֵי חַסְדִּי, y se ajusta חֶסֶד a una formulación más idiomática en español sin resolver la tensión teológica del hebreo.
