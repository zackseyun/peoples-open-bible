revisions:
- from: Lo mejor de ellos es como un espino; el recto es peor que una cerca de espinos. El día de tus atalayas[a], tu visitación, ha llegado; ahora será su confusión.
  to: Lo mejor de ellos es como un espino; el recto es peor que una cerca de espinos. El día de tus vigilantes, tu castigo[a], ha llegado; ahora será su confusión.
  rationale: Se corrige la lectura principal de פְּקֻדָּתְךָ a 'tu castigo' para alinearla con la decisión auditada del POB, y se conserva 'tu visitación' como alternativa en nota. También se mueve correctamente el marcador de nota al término pertinente y se sustituye 'tus atalayas' por 'tus vigilantes' para mayor naturalidad y precisión en español. El resto del versículo conserva bien el sentido y la imaginería del hebreo.
