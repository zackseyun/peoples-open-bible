  - Se preservó el estilo de lista con comas y una sola ‘y’ antes del último miembro, conforme al español editorial.
  - Se optó por ‘Ariarates’ como forma española del nombre histórico, en continuidad con la decisión inglesa de identificar el referente convencionalmente.
