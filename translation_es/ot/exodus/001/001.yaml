- from: Ahora bien, estos son los nombres de los hijos de Israel que vinieron a Egipto con Jacob[a], cada uno con su casa.
  to: Ahora bien, estos son los nombres de los hijos de Israel que vinieron a Egipto con Jacob[a], cada uno con los de su casa.
  rationale: Se mantiene la buena estructura general del borrador, pero se ajusta אִישׁ וּבֵיתוֹ a «cada uno con los de su casa» para expresar con naturalidad española la idea de household/unidad familiar, evitando que «su casa» se entienda principalmente como edificio. No se requieren más cambios.
