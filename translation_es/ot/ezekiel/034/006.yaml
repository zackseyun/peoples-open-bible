translation:
  language: es
  text: Mis ovejas anduvieron extraviadas por todos los montes y sobre todo collado alto[a]; mis ovejas fueron esparcidas por toda la superficie de la tierra[b], y no hay quien las busque ni quien las procure.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «se extraviaron» para «anduvieron extraviadas».'
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «sobre toda la faz de la tierra»; «tierra» también puede entenderse como «país» o «territorio», según el alcance del pasaje.'
    reason: lexical_alternative
lexical_decisions:
- source_word: יִשְׁגּוּ
  english_pob_choice: wandered
  chosen_spanish: anduvieron
  alternatives_spanish:
  - anduvieron extraviadas
  - se descarriaron
  - andaban errantes
  lexicon: HALOT
  rationale: El hebreo de שׁגה expresa desviarse o errar del camino debido a extravío. «Anduvieron» conserva el movimiento y, con el contexto pastoril, comunica el extravío sin introducir una paráfrasis demasiado interpretativa. No se eligió «se descarriaron» como texto principal porque suena más explícitamente moral que la imagen aquí.
- source_word: צֹאנִי
  english_pob_choice: my sheep
  chosen_spanish: mis ovejas
  alternatives_spanish:
  - mi rebaño
  - mis ovejas
  lexicon: HALOT
  rationale: El hebreo dice literalmente «mi ovejas/mi rebaño». «Mis ovejas» mantiene la imagen concreta y se ajusta al paralelismo plural del versículo. «Mi rebaño» sería posible, pero suaviza la referencia a las ovejas individuales.
- source_word: בְּכָל הֶהָרִים
  english_pob_choice: on all the mountains
  chosen_spanish: por todos los montes
  alternatives_spanish:
  - sobre todos los montes
  - entre todos los montes
  - por todos los cerros
  lexicon: HALOT
  rationale: La preposición hebrea con el sustantivo plural se vuelve más natural en español como «por». «Montes» conserva el relieve elevado del original y es un término bíblico claro en español. «Por todos los cerros» bajaría demasiado el registro.
- source_word: וְעַל כָּל גִּבְעָה רָמָה
  english_pob_choice: and on every high hill
  chosen_spanish: sobre todo collado alto
  alternatives_spanish:
  - sobre todo cerro alto
  - en todo collado elevado
  - sobre todo monte alto
  lexicon: HALOT
  rationale: 'גִּבְעָה רָמָה intensifica la idea de altura: «collado alto» preserva el paralelismo con «montes» sin repetir exactamente el mismo sustantivo. «Todo collado alto» refleja bien el hebreo, y el artículo implícito se ajusta por fluidez en español.'
- source_word: וְעַל כָּל פְּנֵי הָאָרֶץ
  english_pob_choice: over the whole face of the earth
  chosen_spanish: por toda la superficie de la tierra
  alternatives_spanish:
  - sobre toda la faz de la tierra
  - por toda la faz de la tierra
  - sobre toda la superficie de la tierra
  lexicon: HALOT
  rationale: פְּנֵי הָאָרֶץ es literalmente «la faz/superficie de la tierra». Se prefirió «superficie» para una publicación española moderna y clara, manteniendo la amplitud del hebreo. «Faz» sería más literal, pero menos natural en el español actual.
- source_word: נָפֹצוּ
  english_pob_choice: were scattered
  chosen_spanish: fueron esparcidas
  alternatives_spanish:
  - fueron dispersadas
  - se dispersaron
  - quedaron dispersas
  lexicon: HALOT
  rationale: El niphal de פוץ indica ser esparcido o dispersado. «Fueron esparcidas» conserva el sentido pasivo y la imagen de dispersión del rebaño. «Fueron dispersadas» también es posible, pero «esparcidas» es más idiomático en español para un rebaño.
- source_word: וְאֵין דּוֹרֵשׁ
  english_pob_choice: with no one searching
  chosen_spanish: y no hay quien las busque
  alternatives_spanish:
  - y no hay nadie que las busque
  - y no existe quien las busque
  - sin que nadie las busque
  lexicon: HALOT
  rationale: דָּרַשׁ aquí tiene la fuerza de buscar/inquirir con atención. «No hay quien las busque» reproduce bien la cláusula negativa hebrea y mantiene el paralelismo con la siguiente expresión.
- source_word: וְאֵין מְבַקֵּשׁ
  english_pob_choice: or seeking for them
  chosen_spanish: ni quien las pregunte
  alternatives_spanish:
  - ni quien las busque
  - ni quien las procure
  - ni quien las requiera
  lexicon: HALOT
  rationale: בָּקַשׁ también significa buscar, procurar, requerir. Elegir «pregunte» permite distinguirlo de דּוֹרֵשׁ en español sin perder el campo semántico de inquirir/indagar por alguien. Se evita repetir «busque» para conservar la pareja de near-synonyms del hebreo, aunque el matiz de «preguntar» es menos literal y funciona como búsqueda de información por las ovejas perdidas.
theological_decisions:
- issue: Referencia de «mis ovejas»
  english_pob_reading: The speaker is God, lamenting the neglect and scattering of his people under failed shepherds.
  chosen_spanish_reading: Dios habla de su propio rebaño, es decir, de su pueblo, y lamenta que haya quedado disperso sin cuidado.
  alternative_spanish_readings:
  - una imagen pastoral genérica sin referencia pactal
  - solamente ovejas literales
  rationale: En Ezequiel 34 el rebaño es una metáfora del pueblo de Dios bajo pastores infieles. La traducción conserva la metáfora sin sobreexplicarla, pero la formulación española no la vuelve genérica ni meramente zoológica.
  doctrine_reference: Ezequiel 34; metáfora del pastoreo aplicado al pueblo de Yahvé.
- issue: Diferenciación de los dos verbos de búsqueda
  english_pob_reading: ‘searching’ and ‘seeking’ preserve two near-synonyms distinctly.
  chosen_spanish_reading: «buscar» y «preguntar» distinguen dos matices relacionados, uno de búsqueda activa y otro de inquirir por alguien.
  alternative_spanish_readings:
  - repetir dos veces «buscar»
  - «buscar» y «procurar»
  rationale: 'El hebreo usa dos participios distintos: דּוֹרֵשׁ y מְבַקֵּשׁ. En español, repetir «buscar» borraría la duplicación retórica, mientras que «preguntar» mantiene la idea de indagar por ellas y ayuda a preservar la tensión estilística del original.'
  doctrine_reference: Paralelismo hebreo y recursos retóricos del texto profético.
translation_notes:
  revision_awareness: La redacción sigue el estado revisado del inglés POB, que distingue dos verbos finales —«searching» y «seeking for them»— sin fusionarlos. En español se conservó esa duplicación funcional mediante «buscar» y «preguntar», y se mantuvo la amplitud de «whole face of the earth» con una nota que deja abierta la alternativa «faz/tierra/territorio».
  spanish_consistency_notes:
  - Se usó «Yahvé» como término de referencia divina cuando corresponda en el contexto del libro, aunque este versículo no lo explicite en la línea principal.
  - Se evitó «SEÑOR» como sustituto automático del nombre divino; la elección de este versículo no requiere inserción adicional.
  - «Mis ovejas» conserva la imagen pastoral y la posesión divina implícita del hebreo.
  - La pareja verbal final intenta preservar el paralelismo de dos sinónimos próximos sin volverlos idénticos.
