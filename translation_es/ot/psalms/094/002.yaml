    rationale: Las notas deben anclarse exactamente a la palabra o frase relevante. Aquí la nota [b] corresponde a «paga… lo que merecen», no a «tierra».
  - severity: low
    issue: «Paga a los soberbios lo que merecen» es comprensible, pero algo menos natural en español bíblico moderno que una formulación con «dar» o «retribuir».
    rationale: «Pagar a alguien» puede sonar más coloquial o económico; «dales… lo que merecen» conserva la claridad idiomática del inglés auditado sin perder el sentido judicial.
  - severity: low
    issue: La nota [a] usa «Alzate» sin tilde.
    rationale: 'La forma imperativa con pronombre enclítico requiere tilde: «Álzate».'
