    issue: גידים se tradujo como 'tendones'
    rationale: Aunque posible, 'tendones' suena más anatómico y restringido. En español bíblico y poético, 'nervios' suele comunicar mejor el tejido conectivo/sinews del hebreo sin tecnicismo excesivo.
  - severity: low
    issue: La nota alternativa usa 'tendones' y añade 'envolver'
    rationale: 'Conviene armonizar la nota con la mejor elección léxica en español y ceñirse más de cerca a la alternativa auditada: ''cubrir'' o ''cercar/encerrar'' bastan para expresar el rango semántico pertinente.'
