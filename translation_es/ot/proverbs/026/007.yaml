translation:
  language: es
  text: Como las piernas que cuelgan sin fuerza de un cojo[a], así es un proverbio en la boca de los necios.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Las piernas de un cojo cuelgan sin fuerza; así cuelga un proverbio en la boca de los necios».'
    reason: lexical_alternative
lexical_decisions:
- source_word: דַּלְיוּ
  english_pob_choice: hang limp
  chosen_spanish: cuelgan flácidas
  alternatives_spanish:
  - cuelgan sin fuerza
  - cuelgan lánguidas
  - penden flácidas
  lexicon: HALOT
  rationale: El verbo hebreo expresa una imagen de colgar o caer sin vigor. «Cuelgan flácidas» conserva la fuerza visual y el matiz de laxitud física sin sonar artificial en español.
- source_word: שֹׁקַיִם
  english_pob_choice: legs
  chosen_spanish: piernas
  alternatives_spanish:
  - piernas inferiores
  - pantorrillas
  - muslos
  lexicon: HALOT
  rationale: Aunque el término hebreo puede referir con más precisión las extremidades inferiores, «piernas» es natural en español y mantiene bien la comparación proverbial.
- source_word: מִפִּסֵּחַ
  english_pob_choice: from a lame man
  chosen_spanish: de un cojo
  alternatives_spanish:
  - de un lisiado
  - de una persona coja
  - de un inválido
  lexicon: HALOT
  rationale: 'La preposición y el sustantivo/adjetivo describen pertenencia o procedencia en la imagen: unas piernas que pertenecen a alguien cojo. «De un cojo» preserva la metáfora directa sin añadir explicación.'
- source_word: וּמָשָׁל
  english_pob_choice: so is a proverb
  chosen_spanish: así es un proverbio
  alternatives_spanish:
  - y un proverbio
  - asimismo un proverbio
  - también un proverbio
  lexicon: HALOT
  rationale: El hebreo introduce la segunda mitad de la comparación. En español conviene explicitar la correlación con «así es» para que el paralelismo quede claro y fluido.
- source_word: מָשָׁל
  english_pob_choice: proverb
  chosen_spanish: proverbio
  alternatives_spanish:
  - parábola
  - dicho
  - sentencia
  lexicon: HALOT
  rationale: En el contexto sapiencial de Proverbios, מָשָׁל denota con mayor naturalidad un «proverbio» o dicho sapiencial; «proverbio» es la opción más fiel al género.
- source_word: בְּפִי
  english_pob_choice: in the mouth of
  chosen_spanish: en la boca de
  alternatives_spanish:
  - en los labios de
  - en el habla de
  - en la palabra de
  lexicon: HALOT
  rationale: La expresión hebrea es concreta y metafórica. «En la boca de» conserva la imagen corporal y el valor idiomático del original.
- source_word: כְסִילִים
  english_pob_choice: fools
  chosen_spanish: los necios
  alternatives_spanish:
  - los insensatos
  - los tontos
  - los faltos de entendimiento
  lexicon: HALOT
  rationale: «Necios» es un equivalente bíblico y sapiencial sólido en español para כְּסִילִים, con el matiz moral e intelectual propio de Proverbios; «fools» en inglés POB se corresponde bien con esta opción.
translation_notes:
  revision_awareness: El texto inglés auditado mantiene una comparación vívida y ofrece una variante léxica sobre la primera cola. La versión española conserva esa tensión imagética y la alternativa en nota, sin suavizar la metáfora ni depender de una paráfrasis.
  spanish_consistency_notes:
  - Se mantiene «proverbio» para מָשָׁל por coherencia con el género sapiencial.
  - Se evita «SEÑOR» u otras sustituciones no pertinentes; el versículo no contiene el Tetragrámaton ni referencias directas al nombre divino.
  - «Necios» se usa como término sapiencial estable, coherente con el registro de Proverbios.
