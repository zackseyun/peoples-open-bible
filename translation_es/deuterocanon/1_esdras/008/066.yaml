revisions:
- from: Los gobernantes, los sacerdotes y los levitas no se habían separado de las naciones extranjeras de la tierra[a], de sus impurezas[b] —de los cananeos, los hititas, los ferezeos, los jebuseos, los moabitas, los egipcios y los edomitas.
  to: 'Los gobernantes, los sacerdotes y los levitas no se separaron de las naciones extranjeras de la tierra[a], de sus impurezas: de los cananeos, los hititas, los ferezeos, los jebuseos, los moabitas, los egipcios y los edomitas.'
  rationale: Se reemplaza el pluscuamperfecto por pretérito para reflejar mejor el aoristo griego sin añadir anterioridad no explícita. Se simplifica la anotación a una sola nota que conserva la alternativa léxica relevante y explica la compresión sintáctica del original. También se pule la puntuación para una lectura más natural en español.
