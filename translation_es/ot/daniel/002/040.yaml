    text: Or 'And a fourth kingdom.' The Aramaic lacks the English definite article, though in context the kingdom is clearly the fourth in sequence.
    reason: lexical_alternative
  - marker: b
    text: '''All these things'' likely refers to the earlier kingdoms represented in the statue vision.'
    reason: cross_reference
