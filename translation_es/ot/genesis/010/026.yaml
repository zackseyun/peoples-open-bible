translation:
  language: es
  text: Joctán[a] engendró a Almodad, a Sélef, a Hazarmávet y a Jéraj.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «Y Joctán engendró a Almodad y a Sélef y a Hazarmávet y a Jéraj». Se suavizó en español la repetición de «y» antes de cada nombre para una lectura más natural.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְיָקְטָן
  english_pob_choice: Joktan
  chosen_spanish: Yoqtán
  alternatives_spanish:
  - Joktán
  - Yoktán
  lexicon: HALOT
  rationale: Nombre propio; se translitera, pero en español conviene una forma readable y cercana al hebreo. Mantengo la yod inicial con Y y adapto la vocalización a una grafía natural en español.
- source_word: יָלַד
  english_pob_choice: fathered
  chosen_spanish: engendró
  alternatives_spanish:
  - engendró a
  - fue padre de
  lexicon: HALOT
  rationale: En genealogías, יָלַד expresa paternidad/descendencia. 'Engendró' preserva el valor genealógico y es idiomático en español bíblico sin depender del arcaísmo 'engendró' en un sentido doctrinal distinto.
- source_word: אַלְמוֹדָד
  english_pob_choice: Almodad
  chosen_spanish: Almodad
  alternatives_spanish:
  - Almodad
  lexicon: HALOT
  rationale: Nombre propio; se conserva transliterado por tratarse de un antropónimo sin significado traducible en el contexto.
- source_word: שָׁלֶף
  english_pob_choice: Sheleph
  chosen_spanish: Shelef
  alternatives_spanish:
  - Sheleph
  - Shelef
  lexicon: HALOT
  rationale: Nombre propio; en español puede reproducirse la forma más cercana al hebreo consonántico. 'Shelef' evita una grafía excesivamente anglicada y mantiene la secuencia consonántica del original.
- source_word: חֲצַרְמָוֶת
  english_pob_choice: Hazarmaveth
  chosen_spanish: Hazarmavet
  alternatives_spanish:
  - Hazarmaveth
  lexicon: HALOT
  rationale: Nombre propio; se translitera. En español se prefiere una terminación más cercana al hebreo leído, sin añadir una -h final propia de la convención inglesa.
- source_word: יָרַח
  english_pob_choice: Jerah
  chosen_spanish: Jeraj
  alternatives_spanish:
  - Yeraj
  - Jerah
  lexicon: HALOT
  rationale: Nombre propio; se translitera. 'Jeraj' conserva la jota aspirada/velar que suele representar ח en transliteración española bíblica y resulta más transparente que la forma inglesa.
translation_notes:
