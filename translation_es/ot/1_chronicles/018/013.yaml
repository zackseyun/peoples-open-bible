revisions:
- from: Puso guarniciones en Edom[a], y todo Edom quedó sometido a David[b]. Y Yahvé dio la victoria a David en todo lo que fue adonde iba.
  to: Puso guarniciones en Edom[a], y todos los edomitas quedaron sometidos a David[b]. Y Yahvé dio la victoria a David dondequiera que iba[c].
  rationale: Se corrige la cláusula final para reflejar con fidelidad e idiomaticidad el hebreo («dondequiera que iba»). Se mejora la naturalidad de la metonimia «todo Edom» haciéndola explícita como «todos los edomitas», sin perder el sentido colectivo. Se conservan «Yahvé» y «guarniciones» conforme al proyecto. Las notas se rehacen para que ofrezcan alternativas reales y para documentar la tensión léxica de עֲבָדִים y וַיּוֹשַׁע.
