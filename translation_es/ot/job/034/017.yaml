revisions:
- from: ¿Podrá gobernar[a] uno que odia la justicia? ¿Y condenarías tú al Justo Poderoso[b]?
  to: ¿Podrá gobernar[a] uno que odia la justicia? ¿Y condenarías tú al justo Poderoso?[b]
  rationale: Se conserva el sentido del original y del POB inglés, pero se mejora la naturalidad española quitando la capitalización rígida de «Justo» como parte de un título compuesto. La nota b se corrige para reflejar con mayor fidelidad las alternativas documentadas («just mighty one» / «righteous great one») sin añadir coordinación interpretativa. También se afina la nota a para acercarla mejor a las alternativas inglesas auditadas.
