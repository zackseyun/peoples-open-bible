translation:
  language: es
  text: Pero aquel profeta[a], o aquel soñador de sueños, será ejecutado, porque ha hablado rebelión contra Yahvé, el Dios de ustedes, que los sacó de la tierra de Egipto y te redimió de la casa de esclavitud[b], para apartarte del camino en el que Yahvé, tu Dios, te mandó andar. Así eliminarás el mal de en medio de ti.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «apostasía». La expresión hebrea «ha hablado rebelión» denota apartamiento o defección de la fidelidad al pacto hacia Yahvé.
    reason: lexical_alternative
  - marker: b
    text: Literalmente, «casa de esclavos». Se mantiene aquí la forma «casa de esclavitud» por ser más natural en español, sin perder la dureza social del hebreo.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהַנָּבִיא הַהוּא
  english_pob_choice: But that prophet
  chosen_spanish: Pero aquel profeta
  alternatives_spanish:
  - Y aquel profeta
  - Ahora bien, aquel profeta
  lexicon: HALOT
  rationale: El hebreo retoma el caso previo con valor adversativo/resuntivo; en español, «Pero» comunica mejor esa relación que un simple «Y». «Aquel» preserva el énfasis demostrativo de הַהוּא.
- source_word: א֣וֹ חֹלֵם הַחֲלֹם הַהוּא
  english_pob_choice: or that dreamer of dreams
  chosen_spanish: o aquel soñador de sueños
  alternatives_spanish:
  - o aquel que sueña sueños
  - o el soñador de aquel sueño
  lexicon: HALOT
  rationale: La construcción hebrea es idiomática; «soñador de sueños» conserva la forma y el paralelo con «profeta» sin volverla torpe en español.
- source_word: יוּמָת
  english_pob_choice: shall be put to death
  chosen_spanish: morirá
  alternatives_spanish:
  - será condenado a muerte
  - será ejecutado
  lexicon: HALOT
  rationale: El hebreo expresa una muerte judicial. En español, «morirá» es más sobrio y natural en un contexto legal; la idea de ejecución queda implícita por el marco judicial, aunque la formulación sea menos explícita que en inglés.
- source_word: כִּי דִבֶּר סָרָה
  english_pob_choice: because he has spoken rebellion
  chosen_spanish: porque ha hablado rebelión
  alternatives_spanish:
  - porque ha hablado apostasía
  - porque ha expresado rebelión
  lexicon: HALOT
  rationale: 'Se conserva la tensión léxica del hebreo: דִבֶּר + סָרָה no es solo «decir algo malo», sino hablar en apartamiento/rebelión. «Rebelión» mantiene el sentido de ruptura de lealtad pactal.'
- source_word: עַל יְהוָה אֱלֹהֵיכֶם
  english_pob_choice: against Yahweh your God
  chosen_spanish: contra Yahvé, su Dios
  alternatives_spanish:
  - acerca de Yahvé, su Dios
  - en contra de Yahvé, su Dios
  lexicon: HALOT
  rationale: En este contexto hostil, עַל se entiende como oposición verbal contra Yahvé. Se mantiene «Yahvé» según la norma del proyecto, y «su Dios» reproduce el sufijo plural del hebreo.
- source_word: הַמּוֹצִיא אֶתְכֶם מֵאֶרֶץ מִצְרַיִם
  english_pob_choice: who brought you out from the land of Egypt
  chosen_spanish: que los sacó de la tierra de Egipto
  alternatives_spanish:
  - que los hizo salir de la tierra de Egipto
  - que los sacó de la tierra de Egipto
  lexicon: HALOT
  rationale: «Sacar de» es la forma natural en español para la fórmula del éxodo. «Los» mantiene el destinatario plural como en el hebreo.
- source_word: וְהַפֹּדְךָ מִבֵּית עֲבָדִים
  english_pob_choice: and redeemed you from the house of slavery
  chosen_spanish: y los redimió de la casa de esclavitud
  alternatives_spanish:
  - y los redimió de la casa de servidumbre
  - y los rescató de la casa de esclavos
  lexicon: HALOT
  rationale: פָּדָה se traduce mejor con «redimió» o «rescató»; se conserva «redimió» por coherencia con la teología del texto. בֵּית עֲבָדִים se vierte como «casa de esclavitud» para preservar el valor concreto del hebreo sin recurrir al eufemismo tradicional «servidumbre».
- source_word: לְהַדִּיחֲךָ
  english_pob_choice: to drive you
  chosen_spanish: para apartarte
  alternatives_spanish:
  - para desviarte
  - para empujarte
  lexicon: HALOT
  rationale: El verbo hifil de נדה/נדח expresa apartar o desviar del camino de fidelidad. «Apartarte» suena natural en español y conserva la idea de desplazamiento fuera del camino.
- source_word: מִן הַדֶּרֶךְ
  english_pob_choice: from the way
  chosen_spanish: del camino
  alternatives_spanish:
  - de la senda
  - de la vía
  lexicon: HALOT
  rationale: «Camino» mantiene la metáfora de conducta pactal propia de Deuteronomio.
- source_word: אֲשֶׁר צִוְּךָ יְהוָה אֱלֹהֶיךָ לָלֶכֶת בָּהּ
  english_pob_choice: in which Yahweh your God commanded you to walk
  chosen_spanish: que Yahvé, tu Dios, te mandó andar
  alternatives_spanish:
  - en el que Yahvé, tu Dios, te mandó caminar
  - que Yahvé, tu Dios, te ordenó seguir
  lexicon: HALOT
  rationale: «Andar» es un equivalente bíblico claro y natural para לָלֶכֶת; conserva mejor la imagen de conducta continua que «caminar» en este contexto legal.
- source_word: וּבִעַרְתָּ הָרָע מִקִּרְבֶּךָ
  english_pob_choice: So you shall purge the evil from your midst
  chosen_spanish: Así eliminarás el mal de en medio de ti
  alternatives_spanish:
  - Así purgarás el mal de tu medio
  - Eliminarás así el mal de en medio de ti
  lexicon: HALOT
  rationale: El verbo בער en esta fórmula legal deuteronómica puede ser «eliminar/erradicar». «Eliminarás el mal» evita un calco demasiado técnico y mantiene el sentido de expulsar decisivamente el mal de la comunidad.
theological_decisions:
- issue: Nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Yahweh
  rationale: 'Se sigue la convención del proyecto para el Tetragrámaton: «Yahvé» en el texto principal. Esto preserva el nombre del pacto y evita el disfraz litúrgico «SEÑOR».'
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Casa de esclavitud / esclavitud
  english_pob_reading: house of slavery
  chosen_spanish_reading: casa de esclavitud
  alternative_spanish_readings:
  - casa de servidumbre
  - casa de esclavos
  rationale: La expresión hebrea es concreta y socialmente dura. «Casa de esclavitud» conserva esa fuerza mejor que «servidumbre», que suena más abstracta y tradicional.
  doctrine_reference: DOCTRINE.md Translation philosophy §1
- issue: Valor jurídico de יוּמָת
  english_pob_reading: shall be put to death
  chosen_spanish_reading: morirá
  alternative_spanish_readings:
  - será ejecutado
  - será condenado a muerte
  rationale: Aunque el hebreo implica ejecución judicial, en español «morirá» puede funcionar bien en una norma legal si el contexto ya establece la sanción. Se mantiene la sobriedad sin añadir perífrasis excesiva.
  doctrine_reference: DOCTRINE.md Translation philosophy §1
translation_notes:
  revision_awareness: El audit trail inglés revisó «house of slaves» a «house of slavery» para mayor naturalidad; en español se siguió esa misma línea con «casa de esclavitud». También se atendió la decisión teológica de mantener el Nombre divino como «Yahvé».
  spanish_consistency_notes:
  - Se mantiene «Yahvé» para יְהוָה de forma consistente con el estándar del proyecto.
  - Se usa «redimió» para פָּדָה, coherente con la terminología bíblica de rescate/redención.
  - «Camino» conserva la metáfora de conducta deuteronómica sin modernizarla en exceso.
  - Se evitó «SEÑOR» como sustituto del Nombre divino, en fidelidad al marco del POB.
  - La construcción «casa de esclavitud» conserva la dureza del hebreo y armoniza con la revisión inglesa más reciente.
