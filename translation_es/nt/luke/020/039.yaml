translation:
  language: es
  text: 'Entonces algunos de los escribas respondieron: «Maestro, has hablado bien[a]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'También puede entenderse: «Maestro, has dicho bien» o «Maestro, has dicho correctamente».'
