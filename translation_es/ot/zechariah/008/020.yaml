translation:
  language: es
  text: 'Así dice Yahvé de los ejércitos: todavía vendrán pueblos[a], y los habitantes de muchas ciudades,'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «naciones» para עַמִּים.
    reason: lexical_alternative
lexical_decisions:
- source_word: כֹּה אָמַר
  english_pob_choice: Thus says
  chosen_spanish: Así dice
  alternatives_spanish:
  - Así ha dicho
  - De esta manera dice
  lexicon: HALOT
  rationale: La fórmula profética en español fluye de modo natural como «Así dice», conservando el valor declarativo solemne del hebreo sin forzar un pasado narrativo.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  lexicon: HALOT
  rationale: Se conserva el nombre divino como transliteración del Tetragrámaton, según el criterio de la POB en español. «Yahvé» es la forma más establecida y legible en español e identifica el nombre personal del pacto.
- source_word: צְבָאוֹת
  english_pob_choice: of hosts
  chosen_spanish: de los ejércitos
  alternatives_spanish:
  - de los ejércitos celestiales
  - de las huestes
  lexicon: HALOT
  rationale: En español, «de los ejércitos» comunica con claridad el sentido de צְבָאוֹת y mantiene el registro bíblico; «huestes» sería más literario pero menos transparente.
- source_word: עֹד
  english_pob_choice: Yet
  chosen_spanish: todavía
  alternatives_spanish:
  - aún
  - sin embargo
  lexicon: HALOT
  rationale: 'Aquí marca continuación de la promesa: no es una oposición fuerte, sino que algo más sigue por venir. «Todavía» reproduce bien ese matiz prospectivo.'
- source_word: יָבֹאוּ
  english_pob_choice: shall come
  chosen_spanish: vendrán
  alternatives_spanish:
  - habrán de venir
  - vendrán a
  lexicon: HALOT
  rationale: El verbo futuro plural expresa movimiento hacia el cumplimiento. «Vendrán» es natural en español y conserva el valor profético.
- source_word: עַמִּים
  english_pob_choice: peoples
  chosen_spanish: pueblos
  alternatives_spanish:
  - naciones
  - gentes
  lexicon: HALOT
  rationale: «Pueblos» mantiene la pluralidad étnica/colectiva del hebreo sin restringirlo de antemano a unidades políticas; refleja bien la alternativa documental «nations» sin perder el matiz de grupos humanos distintos.
- source_word: וְיֹשְׁבֵי
  english_pob_choice: and the inhabitants of
  chosen_spanish: y los habitantes de
  alternatives_spanish:
  - y los moradores de
  - y quienes habitan en
  lexicon: HALOT
  rationale: El participio constructo se expresa de forma natural como «los habitantes de», siguiendo el ajuste del audit trail inglés que añadió el artículo para mayor naturalidad.
- source_word: עָרִים רַבּוֹת
  english_pob_choice: many cities
  chosen_spanish: muchas ciudades
  alternatives_spanish:
  - ciudades numerosas
  - grandes ciudades
  lexicon: HALOT
  rationale: רַבּוֹת aquí cuantifica, no necesariamente magnitud. «Muchas ciudades» es la forma más clara y fiel en español.
theological_decisions:
- issue: Tratamiento del Nombre divino YHWH
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - SEÑOR
  rationale: Se preserva el nombre propio de Dios en lugar de sustituirlo por un título. Esto sigue la decisión doctrinal de la POB y evita ocultar el Tetragrámaton; «SEÑOR» se descarta por ser una convención de reemplazo, no una transliteración.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh / Yahvé'
- issue: Valor colectivo de עַמִּים
  english_pob_reading: peoples
  chosen_spanish_reading: pueblos
  alternative_spanish_readings:
  - naciones
  - gentes
  rationale: Se mantiene la apertura semántica del hebreo plural. «Pueblos» conserva la idea de grupos humanos diferenciados sin imponer una lectura exclusivamente geopolítica.
  doctrine_reference: HALOT / contexto profético de Zacarías 8
translation_notes:
  revision_awareness: 'La redacción sigue el audit trail inglés en sus dos ajustes principales: mantiene la fórmula profética en presente («Así dice»), conserva el Nombre divino explícito, y refleja el añadido de naturalidad sintáctica en «los habitantes de». También conserva la decisión semántica de «many cities» como cuantificación, no magnitud.'
  spanish_consistency_notes:
  - Se usa «Yahvé» de forma consistente para יְהוָה según el estándar del proyecto en español.
  - Se prefirió un español sobrio y publicable, evitando calcos como «muchos pueblos» donde «pueblos» en español puede sonar más natural y fiel.
  - La coma final deja la frase abierta, como en el texto fuente transmitido, sin añadir contenido no presente en este versículo.
