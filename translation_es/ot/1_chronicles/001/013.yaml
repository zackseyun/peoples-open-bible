  - Se eligieron formas españolas comunes para los nombres propios, pero se preservó el valor onomástico del hebreo en las notas.
  - «Engendró» se emplea como equivalente genealógico de יָלַד, coherente con el tono bíblico y sin introducir paráfrasis.
