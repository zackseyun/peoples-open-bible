translation:
  language: es
  text: Mantente en guardia delante de él, y escucha su voz. No te rebeles contra él, porque no perdonará tu transgresión, pues mi nombre está en él[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'También puede entenderse: «mi nombre está dentro de él», «mi nombre está sobre él» o, más interpretativamente, «él lleva mi nombre». La frase señala autoridad divina delegada, pero el texto no define explícitamente la naturaleza exacta del mensajero.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הִשָּׁמֶר
  english_pob_choice: Be on your guard
  chosen_spanish: Mantente en guardia
  alternatives_spanish:
  - Estate atento
  - Guárdate
  - Ten cuidado
  lexicon: HALOT
  rationale: El imperativo nifal expresa vigilancia seria y continua. «Mantente en guardia» conserva la fuerza de advertencia y suena natural en español moderno sin rebajar el tono a una simple precaución.
- source_word: מִפָּנָיו
  english_pob_choice: before him
  chosen_spanish: delante de él
  alternatives_spanish:
  - en su presencia
  - ante él
  lexicon: HALOT
  rationale: «Delante de él» refleja bien el valor relacional y posicional de la expresión hebrea sin sonar demasiado técnico. Mantiene la idea de estar frente al mensajero en actitud de atención.
- source_word: וּשְׁמַע בְּקֹלוֹ
  english_pob_choice: and listen to his voice
  chosen_spanish: y escucha su voz
  alternatives_spanish:
  - y oye su voz
  - y atiende a su voz
  - y obedece su voz
  lexicon: HALOT
  rationale: «Escucha su voz» sigue de cerca el hebreo y preserva la ambigüedad entre oír y atender/obedecer que el contexto ya refuerza. Se evita explicitar «obedece» para no cerrar demasiado el matiz.
- source_word: אַל תַּמֵּר בּוֹ
  english_pob_choice: Do not rebel against him
  chosen_spanish: No te rebeles contra él
  alternatives_spanish:
  - No le resistas
  - No seas defiante con él
  - No lo provoques
  lexicon: HALOT
  rationale: El verbo מרה en este contexto denota rebelión o desafío frente a autoridad. «No te rebeles contra él» transmite bien la gravedad del mandato y la relación de autoridad delegada.
- source_word: לֹא יִשָּׂא לְפִשְׁעֲכֶם
  english_pob_choice: he will not pardon your transgression
  chosen_spanish: no perdonará tu transgresión
  alternatives_spanish:
  - no absolverá tu transgresión
  - no quitará tu culpa
  - no llevará tu transgresión
  lexicon: HALOT
  rationale: נשא con pecado o transgresión puede implicar cargar/quitar/perdonar. «Perdonará» comunica con claridad la remisión judicial en español; se conserva el singular colectivo «tu transgresión» para seguir de cerca el hebreo y el sentido colectivo.
- source_word: פִשְׁעֲכֶם
  english_pob_choice: your transgression
  chosen_spanish: tu transgresión
  alternatives_spanish:
  - tu rebelión
  - tu ofensa
  - tu delito
  lexicon: HALOT
  rationale: «Transgresión» preserva el peso legal y covenantal de פשע sin confundirse con el verbo previo «rebelarse». Aunque el hebreo es plural en forma pronominal, el singular colectivo español resulta natural y fiel.
- source_word: שְׁמִי בְּקִרְבּוֹ
  english_pob_choice: my name is within him
  chosen_spanish: mi nombre está dentro de él
  alternatives_spanish:
  - mi nombre está en él
  - mi nombre está sobre él
  - él lleva mi nombre
  lexicon: HALOT
  rationale: «Dentro de él» refleja de manera directa בְּקִרְבּוֹ y conserva la densidad de la afirmación sin resolver de antemano la relación exacta entre el nombre divino y el mensajero. Se deja abierta la tensión teológica documentada en el texto.
theological_decisions:
- issue: Identidad y estatus del mensajero con el nombre de Yahvé en él
  english_pob_reading: Retain the wording without resolving whether the figure is a created angel uniquely authorized by God or a more direct manifestation of God's own presence.
  chosen_spanish_reading: Conservar la formulación sin definir si se trata de un ángel creado con autoridad delegada o de una manifestación más directa de la presencia de Dios.
  alternative_spanish_readings:
  - Es un mensajero plenamente autorizado que porta el nombre divino
  - Es una manifestación teofánica de la presencia de Yahvé
  rationale: El hebreo afirma una relación muy fuerte entre el mensajero y el nombre de Yahvé, pero no especifica aquí su ontología. La redacción española mantiene esa tensión en vez de resolverla doctrinalmente.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: La revisión más reciente indica alta concordancia y no introduce cambios; por tanto, el borrador español sigue de cerca la decisión inglesa ya auditada, especialmente en la tensión de «mi nombre está dentro de él» y en la conservación del mandato de obediencia sin paráfrasis expansiva.
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el nombre divino aparece explícitamente; aquí el versículo habla de «mi nombre», por lo que no se introduce una sustitución innecesaria.
  - Se mantiene «transgresión» para פשע y no se sustituye por un vocabulario eclesiástico más tradicional.
  - «Escucha su voz» preserva la forma bíblica sin convertirla en una paráfrasis moralizante.
  - La nota al pie marca las alternativas relevantes sin resolver la identidad del mensajero.
