- from: Las ranas vendrán sobre ti[a], sobre tu pueblo y sobre todos tus servidores.
  to: Las ranas subirán sobre ti[a], sobre tu pueblo y sobre todos tus servidores.
  rationale: Se reemplaza «vendrán» por «subirán» para preservar el sentido de יַעֲלוּ en el contexto de la plaga, manteniendo a la vez la repetición de «sobre» que refleja la preposición hebrea y el énfasis de aflicción.
