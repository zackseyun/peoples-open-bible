theological_decisions:
- issue: Purity warning tied to priestly descendants
  chosen_reading: The warning is rendered as a real concern that sexual immorality will defile sacred things through Levi's offspring.
  alternative_readings:
  - A more generalized moral warning with no specific priestly-descendant focus
  rationale: The Greek explicitly links the danger to 'your offspring' and 'the holy things,' so the translation preserves the hereditary-priestly concern rather than broadening it into generic ethics.
- issue: Cultic term σωτηρίου
  chosen_reading: Rendered as 'peace offerings' in the main text.
  alternative_readings:
  - offerings of salvation
  - well-being offerings
  rationale: The sacrificial list strongly suggests a technical offering category. 'Peace offerings' is familiar and serviceable, while the broader semantic possibilities are noted in lexical documentation.
