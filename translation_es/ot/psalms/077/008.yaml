translation:
  language: es
  text: ¿Desechará el Señor para siempre[a], y nunca más mostrará favor?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «¿Desechará el Señor para siempre, y no volverá a ser propicio?»'
    reason: lexical_alternative
lexical_decisions:
- source_word: הַלְעוֹלָמִים
  english_pob_choice: Will ... forever
  chosen_spanish: para siempre
  alternatives_spanish:
  - por siempre
  - para edades eternas
  - por todas las edades
  lexicon: HALOT
  rationale: La partícula interrogativa con לְעוֹלָמִים introduce una pregunta retórica sobre duración indefinida. «Para siempre» es la opción natural en español y conserva el alcance durativo sin volver la frase rígida o arcaizante.
- source_word: יִזְנַח
  english_pob_choice: reject
  chosen_spanish: desechará
  alternatives_spanish:
  - rechazará
  - abandonará
  - rechazará de sí
  lexicon: HALOT
  rationale: El verbo expresa apartar, rechazar o echar fuera. «Desechará» conserva la fuerza relacional de repudiar o apartar, y encaja bien en el tono de lamento; «rechazará» también sería posible, pero puede sonar más abstracto en español.
- source_word: אֲדֹנָי
  english_pob_choice: the Lord
  chosen_spanish: el Señor
  alternatives_spanish:
  - el Señor Yahvé
  - el Amo
  lexicon: HALOT
  rationale: Aquí aparece el título divino אֲדֹנָי, no el nombre YHWH. Por eso se traduce como título reverente en español. En el verso, «el Señor» comunica el valor titular con naturalidad y sin introducir un marcador del nombre divino que el hebreo no usa aquí.
- source_word: וְלֹא
  english_pob_choice: and never
  chosen_spanish: y no
  alternatives_spanish:
  - ni
  - y nunca
  lexicon: HALOT
  rationale: La negación enlaza estrechamente la segunda cola con la primera. En español, «y no» mantiene la estructura coordinada de la pregunta sin sobrecargarla con adverbios interpretativos.
- source_word: יֹסִיף
  english_pob_choice: again
  chosen_spanish: volverá a
  alternatives_spanish:
  - seguirá
  - hará de nuevo
  - añadirá
  lexicon: HALOT
  rationale: El verbo en esta construcción expresa la idea de repetir o continuar la acción. «Volverá a» reproduce con naturalidad la noción de reiteración que el inglés POB captó con «again».
- source_word: לִרְצוֹת
  english_pob_choice: show favor
  chosen_spanish: mostrar favor
  alternatives_spanish:
  - estar favorable
  - ser favorable
  - ser propicio
  lexicon: HALOT
  rationale: רצה aquí expresa disposición favorable, no meramente «agrado» subjetivo. «Mostrar favor» conserva la relación personal y el matiz de benevolencia que el contexto exige, siguiendo de cerca la decisión del POB en inglés.
- source_word: עוֹד
  english_pob_choice: never again
  chosen_spanish: volverá a
  alternatives_spanish:
  - todavía
  - aún
  - nunca más
  lexicon: HALOT
  rationale: Con la negación y יֹסִיף, עוֹד intensifica la idea de repetición o continuidad. En español, esa fuerza se plasma idiomáticamente con «volverá a», y el conjunto negativo de la cláusula deja claro el sentido de «no volverá a mostrar favor».
theological_decisions:
- issue: Traducción del título divino אֲדֹנָי
  english_pob_reading: the Lord
  chosen_spanish_reading: el Señor
  alternative_spanish_readings:
  - Señor
  - el Amo
  rationale: El texto hebreo usa el título Adonai. La convención del proyecto es traducir títulos divinos, no transliterarlos ni sustituirlos por el nombre YHWH. «El Señor» es la forma española natural y reverente para este título.
  doctrine_reference: 'DOCTRINE.md: Translate titles; transliterate names; keep title/name distinctions clear'
- issue: Fuerza de la pregunta retórica de lamento
  english_pob_reading: Will ... forever, and never again show favor?
  chosen_spanish_reading: ¿Desechará el Señor para siempre, y no volverá a mostrar favor?
  alternative_spanish_readings:
  - ¿Rechazará el Señor para siempre, y no volverá a ser favorable?
  - ¿Abandonará el Señor para siempre, y ya no mostrará favor?
  rationale: La pregunta expresa angustia y duda, no una afirmación doctrinal sobre el abandono definitivo. La traducción conserva el valor retórico del hebreo y del POB inglés, sin suavizar la tensión ni convertirla en una declaración.
  doctrine_reference: 'DOCTRINE.md: Preserve rhetorical force and lament register'
translation_notes:
  revision_awareness: 'Coincide con el último paso de revisión: no hubo cambios necesarios y el consenso de revisión fue alto. La redacción española se ajusta al hebreo y al rastro auditado en inglés, manteniendo la tensión léxica entre «desechar» y «mostrar favor».'
  spanish_consistency_notes:
  - Se preserva la distinción entre el título divino «el Señor» y el nombre Yahvé, porque el hebreo aquí usa אֲדֹנָי.
  - «Mostrar favor» se mantiene como opción relacional y benévola para רצה, en línea con el audit trail inglés.
  - La construcción negativa final se formula de modo natural en español sin perder la pregunta retórica de lamento.
  - El marcador de nota [a] aparece en el punto donde se ofrece una alternativa léxica real.
