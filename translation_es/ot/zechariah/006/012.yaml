translation:
  language: es
  text: 'Y le dirás: «Así dice Yahvé de los Ejércitos: “He aquí un hombre: Rama es su nombre; y desde su lugar[a] brotará, y edificará el templo de Yahvé”».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, más literalmente, «desde debajo de él brotará»; el hebreo es comprimido e idiomático.
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  lexicon: HALOT
  rationale: El Tetragrámaton se vierte en la serie del POB como el nombre propio divino, no como sustituto titulado. En español, "Yahvé" conserva ese nombre personal revelado y evita la máscara litúrgica "SEÑOR".
- source_word: צְבָאוֹת
  english_pob_choice: of Armies
  chosen_spanish: de los Ejércitos
  alternatives_spanish:
  - de los ejércitos celestiales
  - de las huestes
  lexicon: HALOT
  rationale: Se traduce con un sustantivo concreto y transparente en español. "Ejércitos" comunica el plural intensivo y el matiz de poder/huestes sin depender del arcaísmo "huestes".
- source_word: הִנֵּה
  english_pob_choice: Behold
  chosen_spanish: Mira
  alternatives_spanish:
  - He aquí
  - Mira bien
  lexicon: HALOT
  rationale: Se conserva la fuerza deíctica e imperativa del hebreo en un español natural. "Mira" mantiene el tono profético solemne sin sonar forzado.
- source_word: אִישׁ
  english_pob_choice: a man
  chosen_spanish: un hombre
  alternatives_spanish:
  - una persona
  lexicon: HALOT
  rationale: El hebreo es masculino singular y el contexto presenta una figura concreta. "Un hombre" es la correspondencia directa y clara.
- source_word: צֶמַח
  english_pob_choice: Branch
  chosen_spanish: Rama
  alternatives_spanish:
  - Renuevo
  - Vástago
  - Brote
  lexicon: HALOT
  rationale: La serie inglesa documenta el valor titular del término. En español, "Rama" mantiene el campo vegetal y el valor apelativo sin introducir una glosa interpretativa como "el Mesías".
- source_word: שְׁמוֹ
  english_pob_choice: is his name
  chosen_spanish: es su nombre
  alternatives_spanish:
  - se llama así
  - tal es su nombre
  lexicon: HALOT
  rationale: Se preserva la fórmula nominal hebrea de manera directa. La versión española acompaña la apposición sin expandirla innecesariamente.
- source_word: וּמִתַּחְתָּיו
  english_pob_choice: from his place
  chosen_spanish: desde su lugar
  alternatives_spanish:
  - desde debajo de él
  - de debajo de él
  - desde abajo
  lexicon: HALOT
  rationale: La traducción auditada en inglés opta por una equivalencia dinámica para un hebreo comprimido. En español, "desde su lugar" mantiene esa naturalidad y deja constancia de la alternativa literal en nota.
- source_word: יִצְמָח
  english_pob_choice: he will branch out
  chosen_spanish: brotará
  alternatives_spanish:
  - ramificará
  - echará brotes
  - crecerá
  lexicon: HALOT
  rationale: Para conservar la imagen vegetal del nombre sin producir una expresión poco natural en español, se usa "brotará". Esta opción mantiene el paralelismo semántico con צֶמַח y la idea de surgir/crecer.
- source_word: וּבָנָה
  english_pob_choice: and build
  chosen_spanish: y edificará
  alternatives_spanish:
  - y construirá
  - y levantará
  lexicon: HALOT
  rationale: '"Edificar" es un verbo bíblico y digno en español que corresponde bien al acto de levantar un templo. Conserva el futuro profético implícito del hebreo.'
- source_word: הֵיכַל
  english_pob_choice: the temple
  chosen_spanish: el templo
  alternatives_spanish:
  - el santuario
  - el palacio
  lexicon: HALOT
  rationale: En este contexto, הֵיכַל יְהוָה designa claramente el templo de Yahvé. "Templo" es la equivalencia contextual más transparente.
theological_decisions:
- issue: Titulación mesiánica de צֶמַח
  english_pob_reading: Render צֶמַח as the title-like 'Branch' in the main text without making the messianic interpretation more explicit than the Hebrew states.
  chosen_spanish_reading: Verter צֶמַח como "Rama" en el cuerpo del texto, con valor apelativo/titular, sin explicitar "Mesías".
  alternative_spanish_readings:
  - '"Renuevo" como título más interpretativo'
  - '"brote" o "vástago" como sustantivo común'
  rationale: El hebreo presenta un nombre/apelativo con resonancia profética, pero no añade una identificación explícita. "Rama" conserva la ambigüedad productiva y el eco vegetal sin resolver el referente interpretativamente.
  doctrine_reference: Affirmations; Translation philosophy §§1, 3, 6
- issue: Ambigüedad del sujeto que edificará el templo
  english_pob_reading: Keep the pronouns as in the Hebrew and do not specify beyond 'he.'
  chosen_spanish_reading: 'Mantener "él" implícito en el verbo: "edificará el templo de Yahvé".'
  alternative_spanish_readings:
  - '"Jesús/Mesías edificará..."'
  - '"Josué edificará..."'
  rationale: La profecía no identifica de forma explícita al constructor; la traducción debe respetar esa ambigüedad y no adelantar una solución interpretativa.
  doctrine_reference: Translation philosophy §3
translation_notes:
  revision_awareness: 'La redacción sigue de cerca la evaluación auditada: se conservan el nombre divino, el título vegetal de צֶמַח y la ambigüedad del sujeto constructor. Se ajustó el español para que suene publicable sin perder la tensión léxica documentada, especialmente en וּמִתַּחְתָּיו y יִצְמָח.'
  spanish_consistency_notes:
  - Se mantiene "Yahvé" para יְהוָה conforme al estándar del proyecto.
  - '"Ejércitos" traduce צְבָאוֹת con transparencia y sin el tradicional "SEÑOR de los ejércitos".'
  - '"Rama" se usa como término titular en coherencia con el inglés POB "Branch".'
  - Se preserva la literalidad suficiente en la cláusula final mediante el futuro "edificará".
  - Las notas marcan únicamente alternativas reales documentadas por el audit trail; no se añaden glosas doctrinales externas.
