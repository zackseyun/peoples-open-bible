id: 2CO.9.5
reference: '2 Corinthians 9:5'
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: ἀναγκαῖον οὖν ἡγησάμην παρακαλέσαι τοὺς ἀδελφοὺς ἵνα προέλθωσιν ⸀εἰς ὑμᾶς καὶ προκαταρτίσωσι τὴν ⸀προεπηγγελμένην εὐλογίαν ὑμῶν, ταύτην ἑτοίμην εἶναι οὕτως ὡς εὐλογίαν καὶ μὴ ὡς πλεονεξίαν.
base_translation:
  language: en
  yaml_path: translation/nt/2_corinthians/009/005.yaml
  text: Therefore I considered it necessary to urge the brothers to go on ahead to you and prepare in advance your previously promised blessing[c][b][a], so that it might be ready in this way as a blessing
    and not as greed.
translation:
  language: ko
  text: 그러므로 내가 형제들에게 권면하여 먼저 여러분에게 가서, 여러분이 전에 약속한 복[a]을 미리 준비해 두는 것이 필요하다고 여겼습니다. 이는 그 복이 인색함이 아니라 복답게 준비되어 있게 하려는 것입니다.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 곧 헌금. 본문은 헌금을 「복」(εὐλογία)으로 부른다. 인색하게 짜낸 것이 아니라 너그럽게 흘러나오는 복으로서의 헌금을 가리킨다.
    reason: lexical_alternative
lexical_decisions:
- source_word: εὐλογία
  english_pob_choice: blessing
  chosen_korean: 복
  lexicon: BDAG
  rationale: 여기서 εὐλογία는 헌금을 「복」으로 표현하는 바울의 어휘. 단순한 인사어가 아니므로 「복」으로 옮긴다.
  alternatives_korean:
  - 축복
- source_word: προεπηγγελμένην
  english_pob_choice: previously promised
  chosen_korean: 전에 약속한
  lexicon: BDAG
  rationale: 완료 수동분사. 「약속된 분량」.
- source_word: πλεονεξία
  english_pob_choice: greed
  chosen_korean: 인색함
  lexicon: BDAG
  rationale: 여기서 πλεονεξία는 본래 「탐욕」이지만 문맥상 「아쉬워 짜내는 인색함」을 가리킨다. 영어 POB의 「greed」와 같은 대비를 한국어에서는 「인색함」으로 옮긴다.
  alternatives_korean:
  - 탐욕
  - 아쉬워하며 내놓는 것
