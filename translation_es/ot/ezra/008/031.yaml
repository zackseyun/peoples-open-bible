translation:
  language: es
  text: Entonces salimos del río Ahava el día doce del primer mes, para ir a Jerusalén, y la mano de nuestro Dios estaba sobre nosotros, y nos libró de la mano del enemigo y de las emboscadas[a] en el camino.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El participio hebreo puede referirse al que acecha o, por extensión idiomática, a la amenaza de emboscada. Por eso aquí se traduce «emboscadas».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַנִּסְעָה
  english_pob_choice: Then we set out
  chosen_spanish: Entonces salimos
  alternatives_spanish:
  - Entonces partimos
  - Entonces nos pusimos en camino
  lexicon: HALOT
  rationale: נסע en este contexto de viaje expresa la acción de levantar campamento y partir. «Salimos» es natural en español y conserva el avance narrativo indicado por el waw consecutivo con «Entonces».
- source_word: מִנְּהַר אֲהֲוָא
  english_pob_choice: from the river Ahava
  chosen_spanish: del río Ahava
  alternatives_spanish:
  - del río de Ahava
  - del Ahava
  lexicon: HALOT
  rationale: נָהָר significa claramente «río». El nombre propio se translitera como «Ahava» para mantener la referencia geográfica del texto fuente.
- source_word: בִּשְׁנֵים עָשָׂר לַחֹדֶשׁ הָרִאשׁוֹן
  english_pob_choice: on the twelfth day of the first month
  chosen_spanish: el día doce del primer mes
  alternatives_spanish:
  - el doce del primer mes
  - el duodécimo día del primer mes
  lexicon: HALOT
  rationale: El hebreo usa una forma idiomática donde «día» queda sobrentendido; en español conviene explicitarlo para claridad y fluidez.
- source_word: לָלֶכֶת יְרוּשָׁלִָם
  english_pob_choice: to go to Jerusalem
  chosen_spanish: para ir a Jerusalén
  alternatives_spanish:
  - para viajar a Jerusalén
  - para dirigimos a Jerusalén
  lexicon: HALOT
  rationale: El infinitivo expresa propósito. «Para ir a Jerusalén» es la forma más directa y fiel, sin sobrecargar el sentido con matices no exigidos por el hebreo.
- source_word: וְיַד אֱלֹהֵינוּ הָיְתָה עָלֵינוּ
  english_pob_choice: and the hand of our God was upon us
  chosen_spanish: y la mano de nuestro Dios estuvo sobre nosotros
  alternatives_spanish:
  - y la mano de nuestro Dios estaba sobre nosotros
  - y nuestro Dios nos protegió
  lexicon: HALOT
  rationale: Se conserva la imagen idiomática de la «mano» divina, porque en Esdras comunica protección y favor activos. «Estuvo sobre nosotros» mantiene el valor perfectivo del hebreo.
- source_word: וַיַּצִּילֵנוּ
  english_pob_choice: and he delivered us
  chosen_spanish: y nos libró
  alternatives_spanish:
  - y nos rescató
  - y nos salvó
  lexicon: HALOT
  rationale: נצל significa liberar o rescatar de peligro. «Nos libró» funciona bien en español bíblico contemporáneo y conserva el registro narrativo formal.
- source_word: מִכַּף אוֹיֵב
  english_pob_choice: from the hand of the enemy
  chosen_spanish: de la mano del enemigo
  alternatives_spanish:
  - del poder del enemigo
  - del agarre del enemigo
  lexicon: HALOT
  rationale: כַּף literalmente es «palma/mano» y en este giro denota poder o control. Se mantiene «mano» para guardar el paralelo con la mano de Dios.
- source_word: וְאוֹרֵב
  english_pob_choice: and the ambushes
  chosen_spanish: y de las emboscadas
  alternatives_spanish:
  - y del que acecha
  - y de los que estaban al acecho
  lexicon: HALOT
  rationale: El participio puede señalar al que acecha o, por extensión idiomática, el peligro de emboscada. En español, el plural «emboscadas» refleja bien el valor colectivo que la revisión inglesa prefirió.
- source_word: עַל הַדָּרֶךְ
  english_pob_choice: along the way
  chosen_spanish: en el camino
  alternatives_spanish:
  - a lo largo del camino
  - sobre el camino
  lexicon: HALOT
  rationale: La expresión hebrea es literalmente «sobre el camino/road». «En el camino» suena natural en español y conserva la referencia al trayecto vulnerable.
theological_decisions:
- issue: Imagen antropomórfica de la mano de Dios como protección
  english_pob_reading: Retain the literal expression 'the hand of our God was upon us' in the main text
  chosen_spanish_reading: Mantener «la mano de nuestro Dios estuvo sobre nosotros» en el texto principal
  alternative_spanish_readings:
  - nuestro Dios nos protegió
  - Dios nos guardó
  rationale: Es una imagen recurrente en Esdras-Nehemías para expresar favor y protección divinos. Mantenerla preserva la continuidad literaria y teológica sin ocultar el idioma figurado del hebreo.
  doctrine_reference: 'Esdras-Nehemías: favor y protección providencial de Yahvé; filosofía de traducción POB'
- issue: 'Doble objeto de la liberación: enemigo y emboscadas'
  english_pob_reading: and the ambushes along the way
  chosen_spanish_reading: y de las emboscadas en el camino
  alternative_spanish_readings:
  - y del que acechaba en el camino
  - y de toda emboscada en el camino
  rationale: La revisión inglesa entiende el segundo término como peligro de emboscada, y el hebreo permite tanto el agente como la amenaza abstracta. El plural español conserva el alcance colectivo y evita estrechar demasiado el sentido.
  doctrine_reference: Esdras 8:31; revisión auditada del POB
translation_notes:
  revision_awareness: La versión inglesa auditada fue revisada de «from ambush along the way» a «the ambushes along the way» para reflejar más de cerca el plural del hebreo. Esta decisión se incorporó al español con «las emboscadas en el camino».
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como forma estándar del nombre divino en el proyecto, pero aquí no aparece el tetragrámaton; el texto usa «nuestro Dios» siguiendo el hebreo.
  - Se conserva la imagen de «la mano» tanto para Dios como para el enemigo, para reflejar el paralelismo léxico del hebreo.
  - «Emboscadas» preserva mejor que una paráfrasis general el matiz de peligro concreto durante el trayecto.
  - El estilo es formal y público, evitando arcaísmos innecesarios pero respetando la sintaxis bíblica del pasaje.
