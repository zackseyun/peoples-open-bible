  glossary_alignment: Se mantiene «sabiduría» para σοφίαν y «consejo» para βουλήν, ambos adecuados. Para τὸ ἅγιόν σου πνεῦμα, el borrador se aparta del razonamiento POB al capitalizar «Espíritu» en el texto principal; dado que la auditoría inglesa prefirió la forma no interpretativamente capitalizada y relegó «Holy Spirit» a nota, la mejor alineación en español es «tu espíritu santo» con nota alternativa «tu Espíritu Santo».
