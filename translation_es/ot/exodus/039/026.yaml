translation:
  language: es
  text: una campanilla y una granada, una campanilla y una granada, alrededor del dobladillo del manto, todo alrededor, para ministrar[a], tal como Yahvé había mandado a Moisés.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «para servicio» o «para servir». El infinitivo hebreo expresa el propósito de la prenda en el ministerio sacerdotal.
    reason: lexical_alternative
lexical_decisions:
- source_word: פַּעֲמֹן
  english_pob_choice: bell
  chosen_spanish: campanilla
  alternatives_spanish:
  - campana
  lexicon: HALOT
  rationale: El término denota un pequeño objeto sonoro; en este contexto del vestido sacerdotal, «campanilla» comunica mejor que «campana» el tamaño y la función ornamental-litúrgica, sin añadir información no explícita en el verso.
- source_word: רִמּוֹן
  english_pob_choice: pomegranate
  chosen_spanish: granada
  alternatives_spanish:
  - ornamento de granada
  - pomo en forma de granada
  lexicon: HALOT
  rationale: La palabra básica significa «granada». Aunque el contexto tabernacular sugiere una forma ornamental, el texto hebreo usa el sustantivo literal, y el español puede mantener esa literalidad sin perder claridad.
- source_word: עַל שׁוּלֵי הַמְּעִיל
  english_pob_choice: around the hem of the robe
  chosen_spanish: alrededor del dobladillo del manto
  alternatives_spanish:
  - sobre el borde del manto
  - en el dobladillo del manto
  lexicon: HALOT
  rationale: שׁוּלֵי expresa el borde inferior o dobladillo, y מְעִיל es una prenda exterior de tipo manto. «Dobladillo» conserva la imagen del borde textil y «manto» evita una traducción demasiado moderna o ambigua.
- source_word: סָבִיב
  english_pob_choice: all around
  chosen_spanish: todo alrededor
  alternatives_spanish:
  - alrededor
  - en torno
  lexicon: HALOT
  rationale: La adverbialidad distributiva pide conservar la idea de circunferencia completa. «Todo alrededor» refuerza esa repetición sin sonar excesivamente arcaico.
- source_word: לְשָׁרֵת
  english_pob_choice: for ministering
  chosen_spanish: para ministrar
  alternatives_spanish:
  - para servir
  - para el ministerio
  lexicon: HALOT
  rationale: El infinitivo indica propósito en el servicio sacerdotal. «Ministrar» preserva el matiz cultual y litúrgico que el inglés POB intenta mantener con «ministering», sin reducirlo a un «servir» más genérico.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  lexicon: HALOT
  rationale: 'Se sigue el criterio del proyecto para el Tetragrámaton: usar «Yahvé» como nombre divino propio, en vez de sustituirlo por un título. Es una transliteración adaptada al español y coherente con el audit trail en inglés.'
- source_word: צִוָּה ... אֶת מֹשֶׁה
  english_pob_choice: had commanded Moses
  chosen_spanish: había mandado a Moisés
  alternatives_spanish:
  - había ordenado a Moisés
  - mandó a Moisés
  lexicon: HALOT
  rationale: El perfecto בעברית señala una orden previa cumplida fielmente. «Había mandado» refleja con naturalidad en español esa anterioridad; «mandado» conserva mejor el eco bíblico que un simple «ordenado».
theological_decisions:
- issue: Uso del nombre divino YHWH
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Jehová
  - el SEÑOR
  rationale: El hebreo presenta el Tetragrámaton de forma explícita. En español se mantiene el nombre propio divino «Yahvé», siguiendo el principio del proyecto de no enmascararlo con una sustitución titulativa.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
translation_notes:
  revision_awareness: El texto inglés auditado no muestra cambios sustantivos en la revisión más reciente; la versión española sigue de cerca el sentido del hebreo y conserva la nota sobre el valor de finalidad de לְשָׁרֵת.
  spanish_consistency_notes:
  - Se emplea «Yahvé» conforme al estándar del proyecto para יְהוָה.
  - Se evita «Cristo» porque el versículo no contiene lenguaje mesiánico.
  - «Ministrar» se usa aquí en sentido cultual, no eclesiástico moderno.
  - La imagen de «granada» se mantiene literal, ya que el hebreo no especifica explícitamente «ornamento» en este versículo.
