id: 1PE.1.13
reference: 1 Peter 1:13
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: Διὸ ἀναζωσάμενοι τὰς ὀσφύας τῆς διανοίας ὑμῶν, νήφοντες τελείως, ἐλπίσατε ἐπὶ τὴν φερομένην ὑμῖν χάριν ἐν ἀποκαλύψει Ἰησοῦ Χριστοῦ.
base_translation:
  language: en
  yaml_path: translation/nt/1_peter/001/013.yaml
  text: 'Therefore, having girded up the loins of your mind, being fully clear-minded, set your hope completely on the grace being brought to you at the revelation of Jesus Messiah.'
translation:
  language: ko
  text: '그러므로 여러분의 마음의 허리를 동이고, 완전히 정신을 차려, 메시아 예수께서 나타나실 때에 여러분에게 가져다주실 은혜에 온전히 소망을 두십시오.'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ἀναζωσάμενοι τὰς ὀσφύας τῆς διανοίας
  english_pob_choice: having girded up the loins of your mind
  chosen_korean: 마음의 허리를 동이고
  alternatives_korean:
  - 너희 생각의 허리를 동여매고
  - 정신적 허리띠를 매고
  lexicon: BDAG
  rationale: 출애굽 유월절의 「허리를 동임」(출 12:11) 비유를 그대로 보존하여 행동 준비의 셈어적 심상을 살린다.
- source_word: νήφοντες τελείως
  english_pob_choice: being fully clear-minded
  chosen_korean: 완전히 정신을 차려
  alternatives_korean:
  - 온전히 깨어
  - 끝까지 정신을 차리며
  lexicon: BDAG
  rationale: νήφω는 술 취하지 않은 명료한 정신을, τελείως는 완전성을 가리킨다. 「완전히 정신을 차려」가 두 의미를 모두 살린다.
- source_word: ἐλπίσατε
  english_pob_choice: set your hope
  chosen_korean: 소망을 두십시오
  alternatives_korean:
  - 바라보십시오
  - 희망을 두십시오
  lexicon: BDAG
  rationale: 부정 과거 명령. 합쇼체 명령형 「~십시오」를 사용.
- source_word: τὴν φερομένην ὑμῖν χάριν
  english_pob_choice: the grace being brought to you
  chosen_korean: 여러분에게 가져다주실 은혜
  alternatives_korean:
  - 너희에게 가져오시는 은혜
  - 너희에게 임할 은혜
  lexicon: BDAG
  rationale: 현재 수동분사의 진행성과 종말적 도래의 의미를 살린다.
- source_word: ἐν ἀποκαλύψει Ἰησοῦ Χριστοῦ
  english_pob_choice: at the revelation of Jesus Messiah
  chosen_korean: 메시아 예수께서 나타나실 때에
  alternatives_korean:
  - 메시아 예수의 계시 때에
  lexicon: BDAG
  rationale: 1:7과 통일.
