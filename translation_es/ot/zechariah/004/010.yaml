base_translation:
  language: en
  yaml_path: translation/ot/zechariah/004/010.yaml
  text: For who has despised the day of small things? For these seven will rejoice and will see the plumb stone in the hand of Zerubbabel—these are the eyes of Yahweh[a], ranging through all the earth.
  footnotes:
