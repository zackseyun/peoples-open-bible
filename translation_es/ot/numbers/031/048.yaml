translation:
  language: es
  text: Entonces se acercaron a Moisés los oficiales[a] que estaban al frente de los millares del ejército, los comandantes de millares y los comandantes de centenas[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «vinieron cerca de Moisés».
    reason: lexical_alternative
  - marker: b
    text: El término hebreo traducido «oficiales» se refiere a hombres designados sobre unidades militares; la frase siguiente los especifica como comandantes de millares y de centenas.
    reason: cultural_note
lexical_decisions:
- source_word: וַיִּקְרְבוּ
  english_pob_choice: came near
  chosen_spanish: se acercaron
  alternatives_spanish:
  - se aproximaron
  - vinieron cerca
  lexicon: HALOT
  rationale: El hebreo indica movimiento hacia Moisés. «Se acercaron» conserva el sentido concreto y suena natural en español, en línea con el inglés POB «came near».
- source_word: הַפְּקֻדִים
  english_pob_choice: the officers
  chosen_spanish: los oficiales
  alternatives_spanish:
  - los nombrados
  - los hombres designados
  - los supervisores
  lexicon: HALOT
  rationale: El término se refiere aquí a personas designadas para cargos militares, no a tropa común. «Oficiales» comunica la función de autoridad de manera clara en español.
- source_word: אֲשֶׁר לְאַלְפֵי הַצָּבָא
  english_pob_choice: who were over the thousands of the army
  chosen_spanish: que estaban sobre los millares del ejército
  alternatives_spanish:
  - que estaban al frente de los millares del ejército
  - que eran responsables de los millares del ejército
  - que estaban asignados a los millares del ejército
  lexicon: HALOT
  rationale: La relación expresada por לְ aquí es de responsabilidad o supervisión. «Estaban sobre» mantiene esa función jerárquica; «millares» refleja el sentido militar del término en este contexto.
- source_word: שָׂרֵי הָאֲלָפִים
  english_pob_choice: the commanders of thousands
  chosen_spanish: los comandantes de millares
  alternatives_spanish:
  - los capitanes de millares
  - los jefes de millares
  lexicon: HALOT
  rationale: שָׂרֵי denota jefes o líderes militares. «Comandantes» preserva el rango y evita un arcaísmo innecesario, igual que en la decisión inglesa.
- source_word: וְשָׂרֵי הַמֵּאוֹת
  english_pob_choice: and the commanders of hundreds
  chosen_spanish: y los comandantes de centenas
  alternatives_spanish:
  - y los capitanes de centenas
  - y los jefes de centenas
  lexicon: HALOT
  rationale: La estructura paralela exige la misma solución terminológica. «Centenas» conserva el paralelismo militar con «millares» y refleja la jerarquía del texto.
translation_notes:
  revision_awareness: La redacción sigue de cerca el hebreo masorético y coincide sustancialmente con la decisión inglesa auditada. No se introdujeron cambios textuales ni reinterpretaciones; solo se ajustó la idiomaticidad del español manteniendo la jerarquía militar explícita en el verso.
  spanish_consistency_notes:
  - Se mantuvo «Moisés» como nombre propio sin artículo.
  - Se usó «millares» y «centenas» para conservar la estructura militar del hebreo; no se normalizó a cifras modernas.
  - «Oficiales» se reservó para הַפְּקֻדִים según la función contextual militar.
  - El marcador de nota [a] aparece junto a «oficiales» para recoger la alternativa verbal de movimiento.
