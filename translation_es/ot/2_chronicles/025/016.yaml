    rationale: חֲדַל significa ‘deja/cesa/para’. En contexto interrumpe el discurso del profeta, pero no se limita léxicamente a ‘callar’. «¡Deja ya!» o «¡Basta!» conservan mejor la amplitud y el tono.
  - severity: low
    issue: «Y aconteció» suena innecesariamente rígido en español actual.
    rationale: Aunque fiel, «Y sucedió» mantiene el valor narrativo de וַיְהִי con mejor fluidez en español neutro contemporáneo.
