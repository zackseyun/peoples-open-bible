translation:
  language: es
  text: Mira[a], estas mujeres fueron las que, por la palabra de Balaam, hicieron que los hijos de Israel[b] actuaran infielmente contra Yahvé en el asunto de Peor, y así vino la plaga sobre la congregación de Yahvé.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «por el consejo de Balaam» o «por la indicación de Balaam». El hebreo dice literalmente «por la palabra de Balaam».'
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «los hijos de Israel». Se conserva esa formulación literal en el texto principal.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הֵן הֵנָּה
  english_pob_choice: Look, these women were the ones
  chosen_spanish: Mira, estas mujeres fueron las que
  alternatives_spanish:
  - Mira, estas
  - Mira, estas mujeres
  lexicon: HALOT
  rationale: La construcción enfática con demostrativo duplicado pide una apertura deíctica y resaltada. «Mira» transmite el valor de llamada atencional; «estas mujeres fueron las que» explicita el referente femenino plural del contexto sin añadir contenido ajeno.
- source_word: לִבְנֵי יִשְׂרָאֵל
  english_pob_choice: the sons of Israel
  chosen_spanish: los hijos de Israel
  alternatives_spanish:
  - los israelitas
  - los hijos de Israel
  lexicon: HALOT
  rationale: Se conserva la metáfora filial del hebreo en vez de nivelarla a «israelitas», porque el texto fuente dice literalmente «hijos de Israel» y el contexto narrativo mantiene esa forma.
- source_word: בִּדְבַר בִּלְעָם
  english_pob_choice: at Balaam’s word
  chosen_spanish: por la palabra de Balaam
  alternatives_spanish:
  - por el consejo de Balaam
  - por la indicación de Balaam
  lexicon: HALOT
  rationale: דבר puede abarcar «palabra» y, por extensión contextual, «mandato/counsel». En español, «por la palabra de Balaam» preserva el vínculo léxico con «palabra» y permite la fuerza causal sin forzar una paráfrasis.
- source_word: לִמְסָר
  english_pob_choice: caused
  chosen_spanish: hicieron que
  alternatives_spanish:
  - causaron que
  - llevaron a que
  lexicon: HALOT
  rationale: El infinitivo constructo expresa agencia resultante. «Hicieron que» es natural en español y conserva la idea de inducción eficaz sin perder el matiz causal.
- source_word: מַעַל
  english_pob_choice: to act unfaithfully
  chosen_spanish: cometieran infidelidad
  alternatives_spanish:
  - actuaran con infidelidad
  - fueran infieles
  lexicon: HALOT
  rationale: מעל denota traición o quiebra de lealtad, frecuentemente en marco pactual. «Cometer infidelidad» mantiene esa gravedad y se entiende bien en español bíblico contemporáneo.
- source_word: בַּיהוָה
  english_pob_choice: against Yahweh
  chosen_spanish: contra Yahvé
  alternatives_spanish:
  - contra Yahvé
  - contra el pacto con Yahvé
  lexicon: HALOT
  rationale: Se conserva el nombre divino «Yahvé» según la convención del proyecto. La preposición con מעל indica ofensa dirigida contra Yahvé, no solo desacato general.
- source_word: עַל דְּבַר פְּעוֹר
  english_pob_choice: in the matter of Peor
  chosen_spanish: en el asunto de Peor
  alternatives_spanish:
  - por el asunto de Peor
  - con respecto a Peor
  lexicon: HALOT
  rationale: La expresión hebrea señala el episodio o caso de Peor. «En el asunto de Peor» reproduce con precisión la referencia sin expandirla innecesariamente.
- source_word: וַתְּהִי הַמַּגֵּפָה
  english_pob_choice: and so the plague came
  chosen_spanish: y así vino la plaga
  alternatives_spanish:
  - y vino la plaga
  - y de ese modo vino la plaga
  lexicon: HALOT
  rationale: La secuencia waw-consecutiva con היה introduce resultado. «Y así vino la plaga» conserva la relación consecuencial con fluidez española.
- source_word: בַּעֲדַת יְהוָה
  english_pob_choice: upon the congregation of Yahweh
  chosen_spanish: sobre la congregación de Yahvé
  alternatives_spanish:
  - sobre la asamblea de Yahvé
  - sobre la congregación de Yahvé
  lexicon: HALOT
  rationale: עֵדָה se traduce mejor aquí como «congregación», término bíblico comprensible y suficientemente formal. «Sobre» preserva la imagen de juicio que recae sobre el pueblo.
theological_decisions:
- issue: Cómo traducir el Tetragrámaton יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahvé
  - Jehová
  rationale: Se sigue la convención doctrinal del proyecto de usar «Yahvé» como representación directa del nombre divino revelado, en vez de ocultarlo con un título sustitutivo.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Valor pactual de מַעַל con בַּיהוָה
  english_pob_reading: act unfaithfully against Yahweh
  chosen_spanish_reading: cometieran infidelidad contra Yahvé
  alternative_spanish_readings:
  - actuaran infielmente contra Yahvé
  - cometieran traición contra Yahvé
  rationale: El verbo/nombre hebreo expresa ruptura de fidelidad en un marco relacional y pactual. «Infidelidad» comunica mejor esa carga que un mero incumplimiento técnico, y evita a la vez rebajar el término a una infidelidad solo emocional.
  doctrine_reference: DOCTRINE.md Translation philosophy §5-6 (lexical tension and readable modern Spanish)
translation_notes:
  revision_awareness: La redacción española sigue la última revisión del audit trail inglés, que ajustó la cláusula consecutiva a un encadenamiento causal más natural («and so») sin alterar el contenido. La versión española refleja ese mismo valor consecutivo con «y así», manteniendo la relación de resultado y la referencia explícita a Yahvé.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» en concordancia con la política del proyecto para יְהוָה.
  - Se preserva «los hijos de Israel» en vez de generalizar a «los israelitas», por fidelidad al hebreo.
  - «Congregación» se usa para עֵדָה siguiendo el registro bíblico y la coherencia terminológica del POB.
  - La frase «en el asunto de Peor» conserva el giro referencial del hebreo sin explicar más de lo que el verso dice.
