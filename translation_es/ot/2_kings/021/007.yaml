translation:
  language: es
  text: 'Y puso la imagen tallada de Aserá[a] que había hecho en la casa acerca de la cual Yahvé había dicho a David y a Salomón su hijo: «En esta casa y en Jerusalén, que he escogido de entre todas las tribus de Israel, pondré mi nombre para siempre».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «la imagen de Aserá». El hebreo combina «imagen tallada» con «Aserá», lo que indica un ídolo o imagen asociada con Aserá; algunas versiones traducen más específicamente «poste de Aserá», pero eso es menos preciso aquí porque el texto dice explícitamente «imagen tallada».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּשֶׂם
  english_pob_choice: And he set
  chosen_spanish: Y puso
  alternatives_spanish:
  - Y colocó
  - Y colocó allí
  lexicon: HALOT
  rationale: El verbo narrativo simple de poner/colocar transmite bien la acción de situar el objeto en un lugar sagrado. 'Puso' es natural en español y no agrega matices ajenos al hebreo.
- source_word: פֶּסֶל
  english_pob_choice: the carved image
  chosen_spanish: la imagen tallada
  alternatives_spanish:
  - el ídolo tallado
  - la imagen esculpida
  lexicon: HALOT
  rationale: פֶּסֶל denota una imagen hecha por talla o escultura. 'Imagen tallada' conserva el sentido concreto sin cargarlo con un término más interpretativo como 'ídolo'.
- source_word: הָאֲשֵׁרָה
  english_pob_choice: of Asherah
  chosen_spanish: de Aserá
  alternatives_spanish:
  - de Ashera
  - de la Aserá
  lexicon: HALOT
  rationale: En español conviene mantener el nombre propio del referente cultual como 'Aserá'. Al traducir 'image of Asherah' como 'imagen tallada de Aserá', se conserva la relación genitiva sin forzar 'poste de Aserá', que no corresponde bien con פֶּסֶל.
- source_word: אֲשֶׁר עָשָׂה
  english_pob_choice: that he had made
  chosen_spanish: que había hecho
  alternatives_spanish:
  - que hizo
  - que había fabricado
  lexicon: HALOT
  rationale: El pluscuamperfecto español refleja que la fabricación antecede a la colocación. 'Había hecho' es fiel y natural en el relato.
- source_word: בַּבַּיִת
  english_pob_choice: in the house
  chosen_spanish: en la casa
  alternatives_spanish:
  - en el templo
  lexicon: HALOT
  rationale: Se conserva 'casa' para reflejar el vocabulario del juramento citado y la repetición del hebreo, aunque el referente sea el templo.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  - Yahweh
  lexicon: HALOT
  rationale: El proyecto pide 'Yahvé' como forma principal para יְהוָה. Se evita la sustitución por un título para preservar el nombre divino.
- source_word: בְנוֹ
  english_pob_choice: his son
  chosen_spanish: su hijo
  alternatives_spanish:
  - el hijo de él
  lexicon: HALOT
  rationale: La referencia a Salomón como hijo de David queda clara en español con el posesivo natural 'su hijo'.
- source_word: בַּבַּיִת הַזֶּה
  english_pob_choice: In this house
  chosen_spanish: En esta casa
  alternatives_spanish:
  - En este templo
  lexicon: HALOT
  rationale: La repetición de 'casa' preserva la continuidad léxica con el fragmento anterior y la formulación de la promesa divina.
- source_word: וּבִירוּשָׁלִַם
  english_pob_choice: and in Jerusalem
  chosen_spanish: y en Jerusalén
  lexicon: HALOT
  rationale: Se mantiene el topónimo sin cambios y con la conjunción explícita para la coordinación del lugar doble de elección divina.
- source_word: אֲשֶׁר בָּחַרְתִּי
  english_pob_choice: which I have chosen
  chosen_spanish: que he escogido
  alternatives_spanish:
  - que elegí
  lexicon: HALOT
  rationale: '''Escogido'' comunica el sentido electivo del verbo בחר con tono bíblico claro en español moderno. El presente perfecto mantiene la vigencia de la elección.'
- source_word: מִכֹּל שִׁבְטֵי יִשְׂרָאֵל
  english_pob_choice: out of all the tribes of Israel
  chosen_spanish: de entre todas las tribus de Israel
  alternatives_spanish:
  - de todas las tribus de Israel
  lexicon: HALOT
  rationale: '''De entre'' expresa mejor la selección desde un conjunto, evitando la pérdida de la idea de elección entre varias tribus.'
- source_word: אָשִׂים אֶת שְׁמִי
  english_pob_choice: I will put my name
  chosen_spanish: pondré mi nombre
  alternatives_spanish:
  - colocaré mi nombre
  - estableceré mi nombre
  lexicon: HALOT
  rationale: La expresión conserva la metáfora de presencia/nombre en el lugar elegido por Dios. 'Pondré mi nombre' es idiomático y fiel al lenguaje de pacto y templo.
- source_word: לְעוֹלָם
  english_pob_choice: forever
  chosen_spanish: para siempre
  alternatives_spanish:
  - eternamente
  - por siempre
  lexicon: HALOT
  rationale: '''Para siempre'' comunica la duración indefinida y solemne del compromiso divino con claridad natural en español.'
theological_decisions:
- issue: Objeto cultual asociado con Aserá
  english_pob_reading: the carved image of Asherah
  chosen_spanish_reading: la imagen tallada de Aserá
  alternative_spanish_readings:
  - la imagen de Aserá
  - la imagen tallada de la Aserá
  rationale: El hebreo une פֶּסֶל con הָאֲשֵׁרָה, por lo que conviene reflejar una imagen tallada vinculada a Aserá, sin reducirlo a 'poste de Aserá' ni a una glosa más específica que el texto no exige.
  doctrine_reference: Lexical precision on cult objects in the Hebrew text; avoid over-specifying beyond the source.
- issue: Representación del nombre divino
  english_pob_reading: the LORD
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Yahweh
  rationale: Aunque el audit trail inglés usa 'the LORD', el estándar del proyecto español exige 'Yahvé' para יְהוָה. Esta decisión preserva la transparencia del nombre divino frente a una sustitución titulada.
  doctrine_reference: Project-level terminology default for יהוה / YHWH
translation_notes:
  revision_awareness: El texto fuente y el audit trail inglés muestran alta concordancia, sin revisiones aplicadas en la última pasada. La única decisión que requiere ajuste respecto del inglés es el tratamiento de יְהוָה, que en este proyecto español se traduce como Yahvé por norma terminológica.
  spanish_consistency_notes:
  - Se mantuvo la repetición de 'casa' para בַּבַּיִת y בַּבַּיִת הַזֶּה, evitando alternar con 'templo' para no perder la continuidad léxica del versículo.
  - '''Aserá'' se translitera de forma consistente como nombre propio cultual, y la nota preserva la alternativa ''imagen de Aserá'' sin imponer una lectura más técnica de lo que el hebreo exige.'
  - El uso de 'para siempre' conserva el valor durativo de לְעוֹלָם en español moderno y es suficientemente solemne para el registro bíblico.
