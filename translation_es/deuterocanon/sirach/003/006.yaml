review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue correctamente el hebreo como texto principal y conserva en nota la divergencia sustancial del paralelo griego. «El que honra a su padre» y «el que honra a su madre» reflejan bien מְכַבֵּד ... אָבִיו / אִמּוֹ. «tendrá muchos días» transmite adecuadamente יִרְבּוּ יָמָיו, aunque podría también formularse «vivirá largos días»; la opción elegida es fiel. El único problema significativo de alineación es «repaga a Dios» para וּגְמוּל אֱלֹהִים עַל: intenta preservar la aspereza del hebreo, pero en español «repagar» suena poco natural y puede sugerir un matiz impropio. «retribuye a Dios» conserva mejor la idea de retribución dirigida a Dios sin apartarse del sentido fuente.'
  spanish_quality_summary: El español es claro y mayormente digno, pero «repaga a Dios» resulta marcado y poco idiomático para lectura bíblica eclesial amplia. «Retribuye a Dios» es más natural, comprensible y conserva la tensión del original. La nota al pie está bien redactada y usa «Señor» correctamente porque refleja κύριος del paralelo griego, no el nombre divino hebreo del texto principal.
  glossary_alignment: No hay conflicto con la glosa principal del proyecto. «Dios» para אֱלֹהִים es correcto. «Señor» en la nota es aceptable al traducir el paralelo griego κύριος citado explícitamente. No aparecen otros términos de glosario sensibles. La revisión propuesta mejora la naturalidad sin alterar la decisión teológica documentada de seguir el hebreo.
  issues:
  - severity: medium
    issue: «repaga a Dios» es poco natural en español bíblico general
    rationale: Aunque intenta seguir de cerca la compresión del hebreo, «repagar» no es la mejor opción en español neutral y puede sonar forzado o no idiomático. «retribuye a Dios» preserva la noción de retribución dirigida a Dios con mejor legibilidad.
  - severity: low
    issue: Las alternativas léxicas repiten entradas duplicadas
    rationale: En las decisiones léxicas aparecen alternativas repetidas como «a su padre» / «a su padre». No afecta el texto, pero refleja descuido editorial menor.
  revised_spanish_text: El que honra a su padre tendrá muchos días[a], y el que honra a su madre retribuye a Dios.
  revised_footnotes:
