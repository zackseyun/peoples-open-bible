review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura básica del griego y mantiene la ambigüedad de ἐν ἐπισκοπῇ mediante nota, pero pierde dos matices importantes del audit trail: παρά con genitivo apunta primariamente a origen (''del Altísimo''), no a agente (''por el Altísimo''); y μὴ δῷς ... τὴν καρδίαν σου se documentó deliberadamente como ''no des tu corazón'', no como la reformulación más interpretativa ''no pongas tu corazón''. Además, ''si no'' es comprensible, pero ''a menos que'' reproduce mejor el valor de ἐὰν μὴ = ''unless''.'
  spanish_quality_summary: El español es legible y digno, pero 'en visita' suena algo corto/coloquial en registro bíblico; 'en visitación' preserva mejor la densidad semántica y teológica, con nota aclaratoria para opciones más idiomáticas. 'En ello' también debilita el plural anafórico del contexto; 'a ellas' o mejor 'a esas cosas' sería más claro, pero el audit trail ya resolvió dejar pronombre con nota alternativa. La mejor solución española es conservar el pronombre con nota explicativa.
  glossary_alignment: No hay conflicto con la terminología principal del proyecto. 'el Altísimo' está bien. La revisión propuesta alinea mejor las decisiones léxicas documentadas para παρά, μὴ δῷς y ἐν ἐπισκοπῇ, y conserva la metáfora bíblica de 'corazón'.
  issues:
  - severity: medium
    issue: '''por el Altísimo'' desplaza el sentido de fuente/origen de παρὰ Ὑψίστου'
    rationale: El audit trail inglés justificó 'from the Most High'; en español 'del Altísimo' preserva mejor la procedencia que 'por', que suena más a agente instrumental de la pasiva.
  - severity: medium
    issue: '''no pongas tu corazón'' reemplaza la metáfora verbal escogida en el POB'
    rationale: Aunque es idiomático, el inglés documentó la decisión de conservar 'do not give' precisamente para no volverla interpretativa. 'No des tu corazón' es natural y más fiel.
  - severity: low
    issue: '''Si no'' es menos preciso que ''A menos que'' para ἐὰν μὴ'
    rationale: La construcción griega tiene fuerza de excepción negativa ('unless'). 'A menos que' la refleja con mayor exactitud en español moderno.
  - severity: low
    issue: '''en visita'' suena demasiado llano para ἐν ἐπισκοπῇ'
    rationale: La expresión griega es teológicamente cargada y algo técnica. 'En visitación' mantiene mejor esa amplitud, mientras la nota puede ofrecer 'al tiempo de la visitación' o 'en inspección/observación divina'.
  - severity: low
    issue: Orden y contenido de notas podrían ajustarse mejor al texto revisado
    rationale: Si se conserva una nota en 'visitación' y otra en el pronombre, conviene anclarlas exactamente en esos lugares y mantener marcadores únicos en orden.
  revised_spanish_text: A menos que sea enviado del Altísimo en visitación[a], no des tu corazón a ellas[b].
  revised_footnotes:
  - marker: a
    text: O «al tiempo de la visitación» o «en inspección/observación divina».
    reason: alternative_reading
  - marker: b
    text: O «a esas cosas», refiriéndose a los sueños y experiencias semejantes mencionados en el contexto inmediato.
    reason: lexical_alternative
  revision_rationale: 'La revisión sigue más de cerca las decisiones léxicas ya auditadas: ἐὰν μὴ → «A menos que»; παρὰ Ὑψίστου → «del Altísimo»; μὴ δῷς → «no des»; y ἐν ἐπισκοπῇ se conserva con la formulación más cargada «en visitación», aclarada por nota. También se mantiene el pronombre plural con nota para la referencia contextual.'
