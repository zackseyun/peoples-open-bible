base_translation:
  language: en
  yaml_path: translation/ot/2_kings/008/015.yaml
  text: And it happened on the next day that he took the covering cloth[a], dipped it in water, and spread it over his face, and he died[b]. Then Hazael reigned in his place.
  footnotes:
  - marker: a
    text: Or 'the bedcover,' 'the quilt,' or 'the woven/netted cloth'; the Hebrew term is rare, so the exact kind of cloth is uncertain.
    reason: lexical_alternative
  - marker: b
    text: The Hebrew does not explicitly name who performed these actions. In context, many understand the subject to be Hazael, but the text itself states only 'he' until Hazael is named in the final clause.
    reason: alternative_reading
