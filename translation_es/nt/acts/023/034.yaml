translation:
  language: es
  text: Después de leerlo y de preguntar de qué provincia era[a], y al enterarse de que era de Cilicia,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más formalmente: «habiendo leído y habiendo preguntado de qué provincia era, y habiéndose enterado de que era de Cilicia».'
