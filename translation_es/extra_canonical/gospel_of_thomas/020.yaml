base_translation:
  language: en
  yaml_path: translation/extra_canonical/gospel_of_thomas/020.yaml
  text: The disciples said to Jesus[a], “Tell us what the kingdom of the heavens is like.” He said to them, “It is like a mustard seed—the smallest of all seeds; but when it falls upon worked soil[f][e][d][c][b], it produces a great branch and becomes a shelter for the birds of the sky.”
  footnotes:
  - marker: a
    text: Literally “Tell us like-what the kingdom of the heavens [is].” ⲉⲛⲓⲙ is an interrogative “how/like what.”
    reason: dialect_note
  - marker: b
    text: Literally “a grain of mustard.” The Coptic noun ⲃⲗⲃⲓⲗⲉ is a kernel or grain.
    reason: lexical_alternative
  - marker: c
    text: “Worked soil” renders the relative clause “which they work (ⲣϩⲱⲃ) at it,” an agricultural idiom for tilled ground.
    reason: cultural_note
  - marker: d
    text: ⲥⲕⲉⲡⲏ can also mean “shade” or “covering.”
    reason: lexical_alternative
  - marker: e
    text: Unlike the Synoptic phrasing “kingdom of God,” the Coptic here reads “kingdom of the heavens” (ⲡⲡⲉ).
    reason: cross_reference
  - marker: f
    text: Or 'it produces a great plant'.
    reason: previous_rendering
