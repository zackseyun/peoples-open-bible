review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el sentido del hebreo y sigue de cerca la auditoría inglesa: ''Dios, tú eres mi Dios'', ''te busco al amanecer'', ''mi alma... mi carne'', y ''sin agua'' están bien alineados con las decisiones léxicas. También respeta correctamente que la frase final describa el contexto total del anhelo. Sin embargo, la nota al pie introducida para ''te anhela'' no corresponde a las alternativas preservadas por el POB inglés y desplaza indebidamente la nota del verbo ''buscar al amanecer'', que sí estaba documentada en la auditoría.'
  spanish_quality_summary: El español es claro, natural y digno. No obstante, 'tierra seca y agotada' suena algo menos idiomático que 'tierra seca y árida' o una formulación equivalente, y la nota actual sobre 'te anhela' resulta innecesaria y algo interpretativa. Conviene restaurar la nota lexical sobre 'al amanecer' y mantener el cuerpo del verso sin sobrecarga explicativa.
  glossary_alignment: No hay conflicto con la terminología del proyecto. 'Dios', 'mi alma' y 'mi carne' están bien escogidos. La decisión 'te busco al amanecer' coincide con la racionalidad léxica documentada para אֲשַׁחֲרֶךָּ. La excepción necesaria es que la única nota al pie debe anclarse ahí, no en 'te anhela'.
  issues:
  - severity: medium
    issue: La nota al pie está anclada a 'te anhela' en lugar de 'te busco al amanecer'.
    rationale: La auditoría inglesa preserva explícitamente alternativas para אֲשַׁחֲרֶךָּ ('seek you early/diligently/earnestly'), no para כָּמַהּ. Mantener la nota en 'te anhela' altera el foco documental del POB.
  - severity: medium
    issue: La nota actual sobre 'te desea intensamente' introduce una explicación no respaldada por las notas del POB inglés.
    rationale: Aunque 'anhela' es una buena traducción, la nota añade una glosa interpretativa nueva ('no solo apetito físico') que no proviene del rastro auditado ni es necesaria para resolver una ambigüedad española.
  - severity: low
    issue: '''Tierra seca y agotada'' es comprensible pero algo menos natural en español para describir el terreno.'
    rationale: '''Agotada'' conserva la personificación, pero en español puede sonar más aplicada a personas que a una tierra. ''Árida'' o ''reseca'' leen con más fluidez; aun así, no es un error grave. Dado que la revisión principal ya es necesaria, conviene pulirlo.'
  revised_spanish_text: Dios, tú eres mi Dios; te busco al amanecer[a]. Mi alma tiene sed de ti, mi carne te anhela, en una tierra seca y árida, sin agua.
