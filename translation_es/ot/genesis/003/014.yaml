translation:
  language: es
  text: 'Entonces Yahvé Dios dijo a la serpiente[a]: «Porque has hecho esto, maldito seas más que todo el ganado y más que toda bestia del campo. Sobre tu vientre irás, y polvo comerás[b] todos los días de tu vida».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «la culebra».
    reason: lexical_alternative
  - marker: b
    text: La expresión «comer polvo» también puede funcionar como imagen de humillación y derrota, no necesariamente como una afirmación sobre una dieta literal solamente.
    reason: cultural_note
lexical_decisions:
- source_word: יְהֹוָה
  english_pob_choice: the LORD / Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: Se mantiene el nombre divino con la forma española de proyecto, sin ocultarlo detrás de una máscara litúrgica. En esta fórmula con אֱלֹהִים, «Yahvé Dios» conserva el par nominal del hebreo y su tono solemne.
- source_word: אֱלֹהִים
  english_pob_choice: God
  chosen_spanish: Dios
  alternatives_spanish:
  - el Dios
  lexicon: HALOT
  rationale: En español, «Dios» reproduce naturalmente el título y mantiene la construcción «Yahvé Dios» sin añadir artículo innecesario.
- source_word: הַנָּחָשׁ
  english_pob_choice: the serpent
  chosen_spanish: la serpiente
  alternatives_spanish:
  - la culebra
  lexicon: HALOT
  rationale: «Serpiente» conserva el registro literario y la resonancia narrativa del pasaje. «Culebra» es posible, pero suena menos formal y más coloquial.
- source_word: כִּי עָשִׂיתָ זֹּאת
  english_pob_choice: Because you have done this
  chosen_spanish: Porque has hecho esto
  alternatives_spanish:
  - Ya que has hecho esto
  - Puesto que has hecho esto
  lexicon: HALOT
  rationale: «Porque» expresa con claridad la causalidad del juicio. Se mantiene la proximidad al hebreo sin expandir el motivo más allá de lo que el texto dice.
- source_word: אָרוּר אַתָּה
  english_pob_choice: cursed are you
  chosen_spanish: maldito seas
  alternatives_spanish:
  - maldito eres
  - serás maldito
  lexicon: HALOT
  rationale: Se conserva la fuerza judicial y el énfasis del predicado hebreo en una forma natural en español. «Maldito seas» refleja bien el tono de sentencia.
- source_word: מִכָּל הַבְּהֵמָה
  english_pob_choice: above all livestock
  chosen_spanish: entre todo el ganado
  alternatives_spanish:
  - más que todo el ganado
  - por encima de todo el ganado
  lexicon: HALOT
  rationale: «Entre»/«por encima de» expresa el comparativo de מִן de manera idiomática. «Ganado» funciona como equivalente amplio y natural de animales domésticos/ganado en este contexto.
- source_word: וּמִכֹּל חַיַּת הַשָּׂדֶה
  english_pob_choice: and above every beast of the field
  chosen_spanish: y entre todos los animales del campo
  alternatives_spanish:
  - y entre todas las fieras del campo
  - y entre todas las bestias del campo
  lexicon: HALOT
  rationale: «Animales del campo» conserva el contraste con el ganado y evita que «bestias» suene demasiado arcaico o restrictivo. La imagen sigue siendo la de animales silvestres del campo.
- source_word: עַל גְּחֹנְךָ תֵלֵךְ
  english_pob_choice: On your belly you shall go
  chosen_spanish: Sobre tu vientre caminarás
  alternatives_spanish:
  - Sobre tu vientre irás
  - Sobre tu vientre te arrastrarás
  lexicon: HALOT
  rationale: «Caminarás» respeta el verbo general del hebreo (ir/caminar) sin añadir «arrastrarás», que interpretaría más de lo necesario. «Sobre tu vientre» traduce de manera directa la imagen corporal.
- source_word: וְעָפָר תֹּאכַל
  english_pob_choice: and dust you shall eat
  chosen_spanish: y polvo comerás
  alternatives_spanish:
  - y comerás polvo
  lexicon: HALOT
  rationale: Se conserva la imagen breve y contundente del hebreo. «Polvo comerás» mantiene la metáfora con suficiente naturalidad en español y deja abierta la posible carga de humillación sin explicitarla en el texto principal.
- source_word: כָּל יְמֵי חַיֶּיךָ
  english_pob_choice: all the days of your life
  chosen_spanish: todos los días de tu vida
  alternatives_spanish:
  - durante toda tu vida
  lexicon: HALOT
  rationale: La forma completa preserva el ritmo y la explicitud del hebreo, más que una simplificación idiomática.
theological_decisions:
- issue: Identidad de la serpiente y alcance interpretativo del juicio
  english_pob_reading: Translate the curse in straightforward creaturely terms without importing later theological identification into the main text.
  chosen_spanish_reading: Se traduce la sentencia en términos concretos de la serpiente, sin introducir en el cuerpo del versículo una identificación doctrinal posterior con Satanás.
  alternative_spanish_readings:
  - 'Interpretar y ampliar: «...dijo a Satanás/diablo»'
  - Mantener «serpiente» pero añadir explicativamente la referencia demoníaca en el texto principal
  rationale: El hebreo inmediato nombra a la serpiente y describe su castigo en lenguaje directo. La traducción conserva esa referencia narrativa primaria y deja la tensión teológica para notas o referencias cruzadas, no para el texto base.
  doctrine_reference: Principio de primacía del texto original; preservar la tensión teológica sin resolverla prematuramente.
- issue: Valor de la comparación con מִן en las frases de superioridad
  english_pob_reading: above all livestock / above every beast of the field
  chosen_spanish_reading: entre todo el ganado / entre todos los animales del campo
  alternative_spanish_readings:
  - más que todo el ganado / más que todos los animales del campo
  - por encima de todo el ganado / por encima de todos los animales del campo
  rationale: El hebreo expresa una comparación de rango o estado. «Entre» y «por encima de» son formas posibles en español; aquí se elige una construcción breve y natural que conserva la idea de excepción y degradación sin sobrecargar el verso.
  doctrine_reference: Semántica comparativa de מִן en contexto de juicio.
translation_notes:
  revision_awareness: 'La redacción sigue el texto hebreo de WLC y toma como guía el audit trail inglés: se conserva «serpiente» en el cuerpo del texto, se mantiene la sentencia directa sin expansión teológica, y se refleja el comparativo de מִן con una solución española natural. Se evita la paráfrasis interpretativa de «arrastrar» en favor de «caminar» sobre el vientre, en línea con la revisión más reciente del POB inglés que prefirió un registro más formal y cercano al hebreo.'
  spanish_consistency_notes:
  - Se usa «Yahvé» de manera consistente para יְהֹוָה, conforme al estándar del proyecto.
  - Se prefiere «serpiente» en el texto principal por su registro literario; se ofrece «culebra» solo como alternativa.
  - «Polvo comerás» conserva la imagen literal y permite la lectura idiomática de humillación sin explicitarla en el versículo.
  - No se introducen términos de interpretación posterior en el cuerpo del texto; la nota mantiene la alternativa lexical sin alterar la lectura base.
