translation:
  language: es
  text: Porque una necesidad merecida[a] los arrastró a este fin, y echó sobre ellos el olvido de lo que había sucedido, para que completaran de antemano el castigo que faltaba[b] en sus tormentos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «la necesidad que merecían» o «una necesidad adecuada». El griego combina lo que es moralmente digno o merecido (ἀξία) con la idea de compulsión (ἀνάγκη).
    reason: lexical_alternative
  - marker: b
    text: O «el castigo restante», es decir, la pena que aún no se había consumado con sus tormentos previos.
    reason: lexical_alternative
lexical_decisions:
- source_word: εἷλκεν
  english_pob_choice: dragged
  chosen_spanish: arrastró
  alternatives_spanish:
  - trajo
  - jaló
  lexicon: LSJ
  rationale: El verbo griego expresa una compulsión fuerte, no una conducción suave. «Arrastró» conserva esa fuerza en español y comunica bien la idea de ser llevados contra su voluntad hacia un desenlace inevitable.
- source_word: ἡ ἀξία ... ἀνάγκη
  english_pob_choice: a deserved necessity
  chosen_spanish: una necesidad merecida
  alternatives_spanish:
  - la necesidad que merecían
  - una necesidad justa
  - una necesidad fitting/deserved
  lexicon: LSJ
  rationale: «ἀξία» aporta la idea de lo que corresponde o es merecido, mientras que «ἀνάγκη» expresa necesidad o compulsión. «Una necesidad merecida» mantiene ambos elementos sin resolver la tensión moral en una sola noción más explicativa.
- source_word: ἐπὶ τοῦτο πέρας
  english_pob_choice: to this end
  chosen_spanish: a este fin
  alternatives_spanish:
  - a este resultado
  - a este término
  lexicon: LSJ
  rationale: «πέρας» señala un término o desenlace; «a este fin» es natural en español y conserva la idea de una conclusión hacia la cual son llevados.
- source_word: τῶν συμβεβηκότων
  english_pob_choice: what had happened
  chosen_spanish: lo que había sucedido
  alternatives_spanish:
  - los acontecimientos que habían ocurrido
  - lo que les había acontecido
  lexicon: LSJ
  rationale: La referencia es a hechos previos ya acaecidos. «Lo que había sucedido» es claro y suficientemente amplio sin forzar un matiz más específico que el griego no exige.
- source_word: ἀμνηστίαν ἐνέβαλεν
  english_pob_choice: cast forgetfulness upon them
  chosen_spanish: echó sobre ellos el olvido
  alternatives_spanish:
  - les infundió olvido
  - les impuso olvido
  lexicon: LSJ
  rationale: El verbo tiene imagen de «arrojar/poner sobre». «Echó sobre ellos el olvido» conserva la vividez figurada del griego y evita una paráfrasis psicológica excesiva.
- source_word: προαναπληρώσωσιν
  english_pob_choice: might beforehand complete
  chosen_spanish: antes completaran
  alternatives_spanish:
  - completaran de antemano
  - llenaran previamente
  lexicon: LSJ
  rationale: El compuesto incluye la idea de completar con antelación. «Antes completaran» mantiene el valor temporal sin volver la frase pesada; en contexto, el matiz de anticipación sigue siendo visible por la construcción completa del verso.
- source_word: τὴν λείπουσαν ... κόλασιν
  english_pob_choice: the punishment lacking
  chosen_spanish: el castigo que faltaba
  alternatives_spanish:
  - el castigo restante
  - el castigo aún pendiente
  lexicon: LSJ
  rationale: «λείπουσαν» expresa lo que falta o queda pendiente. «El castigo que faltaba» reproduce esa noción de insuficiencia o falta pendiente con naturalidad en español.
- source_word: ταῖς βασάνοις
  english_pob_choice: their torments
  chosen_spanish: sus tormentos
  alternatives_spanish:
  - sus sufrimientos
  - sus torturas
  lexicon: LSJ
  rationale: «βάσανοι» denota dolores o tormentos intensos en un contexto punitivo. «Tormentos» es fiel y sostiene el tono judicial del pasaje.
theological_decisions:
- issue: Agencia detrás de la compulsión y el olvido
  english_pob_reading: The verse states that a morally deserved necessity drove them and brought forgetfulness upon them, without explicitly naming God as grammatical subject.
  chosen_spanish_reading: El verso dice que una necesidad merecida los arrastró y les echó el olvido, sin nombrar explícitamente a Dios como sujeto gramatical.
  alternative_spanish_readings:
  - Dios los arrastró providencialmente a este fin
  - su propio destino los arrastró impersonalmente
  rationale: La construcción griega personifica la necesidad y el olvido sin atribuir de manera directa la acción a Dios. La traducción conserva esa tensión literaria y teológica en vez de resolverla de antemano con un sujeto explícito.
  doctrine_reference: Mantener la tensión teológica en lugar de resolverla interpretativamente.
translation_notes:
  revision_awareness: 'Esta redacción sigue el texto griego de Swete 1909 y el criterio del POB en inglés: mantiene la fuerza de εἷλκεν con un verbo de compulsa fuerte, conserva la tensión entre mérito y necesidad en ἀξία ... ἀνάγκη, y refleja la imagen de ἀμνηστίαν ἐνέβαλεν sin diluirla en una explicación abstracta. También respeta la revisión reciente del inglés que ajustó el orden para naturalidad, acomodando el español a un orden igualmente fluido sin perder la relación entre los miembros de la oración.'
  spanish_consistency_notes:
  - Se usa «Yahvé» no aplica en este versículo.
  - Se conserva «tormentos» para βάσανοι por coherencia con el campo punitivo del pasaje.
  - «Castigo» se mantiene para κόλασιν, evitando suavizar el matiz judicial.
  - Las notas a y b preservan las alternativas relevantes que el inglés POB documenta y adaptan su forma al español sin introducir nuevas lecturas.
