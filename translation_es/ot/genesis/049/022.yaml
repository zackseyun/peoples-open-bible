translation:
  language: es
  text: José es un hijo[a] fructífero, un hijo fructífero junto a una fuente[b]; las hijas[c] pasan por encima del muro.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «José es una rama fructífera, una rama fructífera junto a una fuente». El hebreo es poético y condensado; la traducción tradicional «rama» hace la imagen más explícita.'
    reason: lexical_alternative
  - marker: b
    text: 'Lit.: «junto a un ojo». Aquí se entiende «fuente» o «manantial» por el contexto de fertilidad.'
    reason: lexical_alternative
  - marker: c
    text: 'Lit.: «hijas». Puede entenderse metafóricamente de brotes o ramas que pasan por encima del muro.'
    reason: lexical_alternative
lexical_decisions:
- source_word: בֵּן
  english_pob_choice: son
  chosen_spanish: hijo
  alternatives_spanish:
  - rama
  - sarmiento
  lexicon: HALOT
  rationale: El hebreo בֵּן significa primariamente 'hijo'. En español, 'hijo' conserva el valor léxico básico y permite mantener la concisión poética del hebreo sin resolver de antemano la imagen metafórica.
- source_word: פֹּרָת
  english_pob_choice: fruitful
  chosen_spanish: fructífero
  alternatives_spanish:
  - fecundo
  - fructuoso
  lexicon: HALOT
  rationale: La forma procede de la raíz פרה, 'ser fructífero'. 'Fructífero' expresa bien la cualidad de dar fruto y suena natural en español bíblico moderno; evita convertir la expresión en una explicación interpretativa.
- source_word: בֵּן פֹּרָת
  english_pob_choice: a fruitful son
  chosen_spanish: un hijo fructífero
  alternatives_spanish:
  - un sarmiento fructífero
  - un hijo de fertilidad
  lexicon: HALOT
  rationale: La secuencia es poética y comprimida. 'Un hijo fructífero' sigue de cerca los dos elementos léxicos y conserva la tensión del hebreo, mientras que 'sarmiento' o 'rama' introducirían una interpretación que el hebreo no explicita.
- source_word: עֲלֵי עָיִן
  english_pob_choice: by a spring
  chosen_spanish: junto a una fuente
  alternatives_spanish:
  - junto a un manantial
  - sobre un ojo
  lexicon: HALOT
  rationale: עָיִן puede significar 'fuente/manantial' o 'ojo'. En este contexto de bendición y fertilidad, 'fuente' es la lectura más natural. 'Junto a' reproduce de forma idiomática la relación espacial del hebreo.
- source_word: בָּנוֹת
  english_pob_choice: daughters
  chosen_spanish: las hijas
  alternatives_spanish:
  - los brotes
  - las ramas
  lexicon: HALOT
  rationale: Léxicamente significa 'hijas'. Mantener 'las hijas' preserva el giro poético tal como está en el hebreo y deja abierta la posibilidad metafórica sin forzarla en el texto principal.
- source_word: צָעֲדָה
  english_pob_choice: step
  chosen_spanish: se extienden
  alternatives_spanish:
  - avanzan
  - pisan
  lexicon: HALOT
  rationale: El verbo expresa la idea de dar pasos o avanzar. En español, 'se extienden' comunica mejor el movimiento expansivo de la imagen poética en plural y evita una literalidad que sonaría extraña en el cierre del verso.
- source_word: עֲלֵי שׁוּר
  english_pob_choice: over the wall
  chosen_spanish: sobre el muro
  alternatives_spanish:
  - por encima del muro
  - sobre la muralla
  lexicon: HALOT
  rationale: שׁוּר se entiende aquí como 'muro'. 'Sobre el muro' mantiene la imagen de superación del límite con un registro bíblico claro y natural en español.
theological_decisions:
- issue: Mantener la metáfora comprimida sin resolverla del todo
  english_pob_reading: Joseph is a fruitful son, a fruitful son by a spring; daughters step over the wall.
  chosen_spanish_reading: José es un hijo fructífero, un hijo fructífero junto a una fuente; las hijas se extienden sobre el muro.
  alternative_spanish_readings:
  - José es una rama fructífera junto a una fuente; sus ramas pasan el muro.
  - José es un sarmiento fecundo junto a un manantial; las hijas saltan el muro.
  rationale: 'La POB inglesa preserva la compresión poética del hebreo en vez de cerrar la metáfora con ''bough''. La versión española sigue esa decisión: conserva el lenguaje básico del texto y deja la imagen abierta, evitando añadir una interpretación agrícola que no esté explícita en el hebreo.'
  doctrine_reference: Poética bíblica y principio de fidelidad al texto fuente; no hay doctrina en disputa, sino una decisión hermenéutica sobre metáfora.
translation_notes:
  revision_awareness: 'El último pase indicó que no eran necesarios cambios; sin embargo, el control cruzado marcó el versículo como needing_review con issues mayores, así que esta redacción busca atender la tensión principal señalada por la POB: conservar el hebreo léxico (''hijo'', ''hijas'') sin perder la inteligibilidad poética en español.'
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' como norma general POB, pero este versículo no contiene el nombre divino.
  - '''Hijo'' y ''hijas'' preservan la literalidad léxica que la POB inglesa defendió frente a las lecturas interpretativas de ''bough'' y ''branches''.'
  - '''Fuente'' se usa en sentido de manantial; no se neutraliza la posible ambigüedad de עָיִן más allá de lo que el contexto permite.'
