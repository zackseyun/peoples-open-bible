translation:
  language: es
  text: 'Yahvé ha jurado y no cambiará de parecer: «Tú eres sacerdote para siempre, según la manera de Melquisedec[a]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más literalmente: «según mi palabra/decreto, Melquisedec»; la frase hebrea es difícil, y algunos la entienden como «según la manera de Melquisedec».'
    reason: alternative_reading
lexical_decisions:
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: Se sigue el estándar del proyecto para el nombre divino, conservando la referencia explícita al nombre del pacto y evitando la sustitución por una forma de máscara.
- source_word: נִשְׁבַּע
  english_pob_choice: has sworn
  chosen_spanish: ha jurado
  alternatives_spanish:
  - juró
  - ha hecho un juramento
  lexicon: HALOT
  rationale: El perfecto hebreo expresa un juramento ya realizado; en español, «ha jurado» conserva bien la solemnidad y el valor aspectual del acto cumplido.
- source_word: וְלֹא יִנָּחֵם
  english_pob_choice: and will not change his mind
  chosen_spanish: y no cambiará de parecer
  alternatives_spanish:
  - y no se arrepentirá
  - y no se retractará
  lexicon: HALOT
  rationale: נחם en este contexto indica no revocar o no alterar la decisión jurada. «Cambiar de parecer» comunica ese valor sin introducir la carga penitencial de «arrepentirse».
- source_word: אַתָּה
  english_pob_choice: You
  chosen_spanish: Tú
  alternatives_spanish:
  - Usted
  lexicon: HALOT
  rationale: Se mantiene la segunda persona directa del discurso divino. La tilde diacrítica ayuda a la lectura clara dentro de la cita.
- source_word: כֹהֵן
  english_pob_choice: a priest
  chosen_spanish: sacerdote
  alternatives_spanish:
  - un sacerdote
  - un ministro cultual
  lexicon: HALOT
  rationale: El hebreo funciona como predicado nominal en una declaración de oficio. En español, el artículo es opcional; aquí se omite para una formulación más natural y solemne, sin perder el sentido de oficio.
- source_word: לְעוֹלָם
  english_pob_choice: forever
  chosen_spanish: para siempre
  alternatives_spanish:
  - eternamente
  - por toda la eternidad
  lexicon: HALOT
  rationale: Es la equivalencia más idiomática y precisa en español para duración indefinida o permanente en este contexto de juramento.
- source_word: עַל דִּבְרָתִי מַלְכִּי־צֶדֶק
  english_pob_choice: after the manner of Melchizedek
  chosen_spanish: según la manera de Melquisedec
  alternatives_spanish:
  - de acuerdo con mi palabra/decreto, Melquisedec
  - tras el modelo de Melquisedec
  - según el orden de Melquisedec
  lexicon: HALOT
  rationale: La frase hebrea es difícil y admite varias lecturas. Se elige una formulación que preserve la idea de patrón o modo asociado a Melquisedec, en línea con la lectura canónica destacada por la POB inglesa, sin resolver artificialmente la ambigüedad del hebreo.
- source_word: מַלְכִּי צֶדֶק
  english_pob_choice: Melchizedek
  chosen_spanish: Melquisedec
  alternatives_spanish:
  - Malki-cedec
  lexicon: HALOT
  rationale: Nombre propio transliterado en su forma establecida en español bíblico, manteniendo la identificación del personaje.
theological_decisions:
- issue: La frase hebrea difícil עַל דִּבְרָתִי מַלְכִּי צֶדֶק
  english_pob_reading: after the manner of Melchizedek
  chosen_spanish_reading: según la manera de Melquisedec
  alternative_spanish_readings:
  - según el orden de Melquisedec
  - de acuerdo con mi palabra/decreto, Melquisedec
  - tras el modelo de Melquisedec
  rationale: La sintaxis hebrea permite más de una comprensión, y el audit trail inglés retiene esa tensión. La versión española conserva una lectura de patrón o semejanza sin borrar las alternativas posibles ni imponer una solución donde el texto es discutido.
  doctrine_reference: Translation philosophy §3 (Preserve theological tension rather than resolve it)
translation_notes:
  revision_awareness: Se tomó como base la revisión más reciente del audit trail inglés, que prefirió una formulación equivalente a «after the manner of Melchizedek» frente a «according to the order of Melchizedek», para reflejar con más cercanía la frase hebrea עַל־דִּבְרָתִי sin perder naturalidad. La versión española sigue esa decisión interpretativa con un equivalente idiomático.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como forma principal del nombre divino, coherente con el estándar del proyecto.
  - Se usa «Melquisedec» en lugar de «Melchizedek» o una transliteración híbrida, por consistencia con el español bíblico.
  - No se introduce «Cristo» ni lenguaje cristológico ajeno al versículo; el texto permanece en su formulación salmódica directa.
  - La puntuación respeta la cita directa y la pausa discursiva que corresponde al juramento divino.
