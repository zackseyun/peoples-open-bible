translation:
  language: es
  text: Cuando Atalía oyó el ruido de los guardias y del pueblo[a][b], fue hacia el pueblo en la casa de Yahvé[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘los corredores’, probablemente en referencia a la guardia real o cuerpo de escolta.
    reason: lexical_alternative
  - marker: b
    text: O ‘el sonido’ o ‘la voz’ de los guardias y del pueblo.
    reason: lexical_alternative
  - marker: c
    text: 'Hebreo: ‘la casa de Yahvé’; es decir, el recinto del templo.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַתִּשְׁמַע
  english_pob_choice: heard
  chosen_spanish: oyó
  alternatives_spanish:
  - escuchó
  lexicon: HALOT
  rationale: El perfecto narrativo indica percepción auditiva simple; en español, 'oyó' expresa de manera natural ese hecho sin añadir la idea de prestar atención.
- source_word: עֲתַלְיָה
  english_pob_choice: Athaliah
  chosen_spanish: Atalía
  alternatives_spanish:
  - Atalía
  lexicon: Convención onomástica bíblica
  rationale: Se usa la forma bíblica asentada en español, breve y reconocible, equivalente al transliterado inglés 'Athaliah'.
- source_word: קוֹל
  english_pob_choice: noise
  chosen_spanish: ruido
  alternatives_spanish:
  - sonido
  - voz
  lexicon: HALOT
  rationale: קוֹל puede significar 'voz', 'sonido' o 'ruido'. En este contexto de agitación pública, 'ruido' comunica mejor la conmoción audible que una sola voz.
- source_word: הָרָצִין
  english_pob_choice: the guards
  chosen_spanish: los guardias
  alternatives_spanish:
  - los corredores
  - los mensajeros
  lexicon: HALOT
  rationale: Aunque la forma puede relacionarse literalmente con 'corredores', el contexto real apunta a una guardia o escolta real; 'guardias' preserva el sentido funcional y evita una traducción demasiado literal e incomprensible.
- source_word: הָעָם
  english_pob_choice: the people
  chosen_spanish: el pueblo
  alternatives_spanish:
  - la gente
  - la multitud
  lexicon: HALOT
  rationale: עָם designa al pueblo reunido; 'el pueblo' conserva la correspondencia léxica y el tono bíblico sin perder naturalidad.
- source_word: וַתָּבֹא אֶל
  english_pob_choice: she came to
  chosen_spanish: vino a
  alternatives_spanish:
  - fue a
  - llegó a
  lexicon: HALOT
  rationale: בוא con אֶל expresa movimiento hacia un lugar o grupo. 'Vino a' es una equivalencia directa y natural en español bíblico contemporáneo.
- source_word: בֵּית יְהוָה
  english_pob_choice: the house of Yahweh
  chosen_spanish: la casa de Yahvé
  alternatives_spanish:
  - el templo de Yahvé
  - la casa de Yahvé
  lexicon: HALOT
  rationale: La frase hebrea literalmente significa 'casa de Yahvé'. Se mantiene 'casa' para preservar el vínculo formal con el original, y 'Yahvé' según el criterio terminológico del proyecto.
theological_decisions:
- issue: Renderización del Tetragrámaton יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahveh
  - SEÑOR
  rationale: El texto hebreo usa el nombre divino directo. Conforme al criterio del proyecto, en español se vierte como 'Yahvé' en lugar de ocultarlo con 'SEÑOR'.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
translation_notes:
  revision_awareness: La revisión inglesa agregó la coordinación explícita 'of the people' para aclarar la relación entre los dos colectivos; en español se refleja de forma natural con 'de los guardias y del pueblo'.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' conforme a la terminología del proyecto y no 'SEÑOR'.
  - Se conserva la diferencia entre 'guardias' y 'pueblo' sin fusionarlos en una sola multitud.
  - '''Casa de Yahvé'' se mantiene literal para reflejar בית יהוה, con nota explicativa sobre el recinto del templo.'
