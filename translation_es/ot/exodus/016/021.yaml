translation:
  language: es
  text: Y lo recogieron mañana tras mañana[a], cada uno según lo que podía comer; pero cuando el sol calentaba, se derretía.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «cada uno según la boca de su comer», es decir, en proporción a lo que cada uno podía comer.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּלְקְטוּ
  english_pob_choice: they gathered
  chosen_spanish: recogían
  alternatives_spanish:
  - juntaban
  - recolectaban
  lexicon: HALOT
  rationale: לָקַט expresa recoger o juntar lo que está disperso, especialmente alimento. En español, «recogían» conserva la acción concreta y la repetición distributiva del imperfecto en este contexto narrativo.
- source_word: אֹתוֹ
  english_pob_choice: it
  chosen_spanish: eso
  alternatives_spanish:
  - lo
  - el maná
  lexicon: HALOT
  rationale: El pronombre retoma el maná del contexto previo. «Eso» evita introducir un sustantivo ausente en el versículo y mantiene la referencia anafórica sin forzar el objeto directo.
- source_word: בַּבֹּקֶר בַּבֹּקֶר
  english_pob_choice: morning by morning
  chosen_spanish: mañana tras mañana
  alternatives_spanish:
  - cada mañana
  - mañana a mañana
  lexicon: HALOT
  rationale: La repetición hebrea es iterativa y distributiva. «Mañana tras mañana» preserva esa repetición de forma natural en español y evita suavizarla demasiado.
- source_word: אִישׁ
  english_pob_choice: each
  chosen_spanish: cada uno
  alternatives_spanish:
  - cada persona
  - cada hombre
  lexicon: HALOT
  rationale: Aunque אִישׁ es formalmente masculino singular, aquí funciona distributivamente. «Cada uno» conserva el valor inclusivo en español sin perder la correspondencia con el uso idiomático hebreo y evita masculinizar innecesariamente.
- source_word: כְּפִי אָכְלוֹ
  english_pob_choice: according to what he could eat
  chosen_spanish: según lo que podía comer
  alternatives_spanish:
  - conforme a su comida
  - según su comer
  - en proporción a lo que comía
  lexicon: HALOT
  rationale: La expresión literal, «según la boca de su comer», es un hebraísmo idiomático que señala proporción/capacidad de consumo. «Según lo que podía comer» comunica esa idea de manera clara y fiel en español.
- source_word: וְחַם הַשֶּׁמֶשׁ
  english_pob_choice: when the sun grew hot
  chosen_spanish: cuando el sol se calentaba
  alternatives_spanish:
  - cuando el sol estaba caliente
  - cuando el sol se ponía caliente
  - cuando el sol ardía
  lexicon: HALOT
  rationale: El verbo expresa que el sol llegaba a estar caliente. «Se calentaba» reproduce la idea de devenir en caliente con fluidez narrativa, sin imponer una metáfora ajena.
- source_word: וְנָמָס
  english_pob_choice: it melted
  chosen_spanish: se derretía
  alternatives_spanish:
  - se fundía
  - se derretía y desaparecía
  - se disolvía
  lexicon: HALOT
  rationale: נמס significa derretirse o disolverse. «Se derretía» es la equivalencia más natural para el efecto del calor sobre el maná y conserva la imagen física del texto.
translation_notes:
  revision_awareness: El texto inglés auditado pasó de «each man» a «each» para reflejar mejor el valor distributivo de אִישׁ sin cargarlo de manera marcada. La versión española sigue esa revisión con «cada uno», manteniendo la fuerza idiomática del hebreo y la naturalidad del español.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma del proyecto cuando corresponda; este versículo no contiene el tetragrámaton.
  - Se evita «Cristo» o terminología cristológica porque el pasaje es narrativo y no presenta ese campo léxico.
  - «Cada uno» conserva el distributivo hebreo de אִישׁ sin introducir una generalización doctrinal.
  - La nota al pie preserva el hebraísmo explícito del original y su sentido de proporcionalidad.
