  yaml_path: translation/ot/2_samuel/019/001.yaml
  text: Then the king was deeply shaken[a], and he went up to the chamber over the gate and wept. As he went, he said, “My son Absalom! My son, my son Absalom! If only I had died instead of you, Absalom, my son[b], my son!”
  footnotes:
