translation:
  language: es
  text: 'Al director del coro: «No destruyas»[b]. De David. Un miktam[c], cuando Saúl envió[a] hombres[d], y vigilaron la casa para matarlo.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más formalmente: «cuando Saúl envió, y vigilaron la casa para matarlo». El hebreo no dice explícitamente «hombres», pero el verbo plural lo implica.'
    reason: lexical_alternative
  - marker: b
    text: Probablemente es el nombre de una melodía o una indicación musical en el encabezado del salmo.
    reason: cultural_note
  - marker: c
    text: El sentido de miktam es incierto; por eso se translitera en vez de traducirse.
    reason: lexical_alternative
  - marker: d
    text: 'O: «cuando Saúl envió hombres y vigilaron la casa».'
    reason: previous_rendering
lexical_decisions:
- source_word: לַמְנַצֵּחַ
  english_pob_choice: For the choir director
  chosen_spanish: Al director del coro
  alternatives_spanish:
  - Al maestro de coro
  - Para el director musical
  lexicon: HALOT
  rationale: La fórmula de superscripción señala al responsable musical. «Director del coro» comunica bien la función en español moderno sin perder el sentido de dirección litúrgica o musical.
- source_word: אַל־תַּשְׁחֵת
  english_pob_choice: Do Not Destroy
  chosen_spanish: No destruyas
  alternatives_spanish:
  - No destruyas
  - No destruyas esto
  lexicon: HALOT
  rationale: Se conserva como título o indicación musical, no como mandato del cuerpo del salmo. El imperativo en segunda persona singular refleja el valor verbal del hebreo, mientras las comillas señalan su posible función como nombre de tono o indicación de ejecución.
- source_word: לְדָוִד
  english_pob_choice: Of David
  chosen_spanish: De David
  alternatives_spanish:
  - Para David
  - Por David
  lexicon: HALOT
  rationale: «De David» mantiene la ambigüedad tradicional de atribución, asociación o dedicación sin precisar más de lo que el hebreo indica.
- source_word: מִכְתָּם
  english_pob_choice: miktam
  chosen_spanish: miktam
  alternatives_spanish:
  - inscripción
  - salmo
  - canto de oro
  lexicon: HALOT
  rationale: El término es oscuro; se translitera para no imponer una glosa especulativa. Así se preserva la transparencia del dato léxico.
- source_word: בִּשְׁלֹחַ
  english_pob_choice: when Saul sent men
  chosen_spanish: cuando Saúl envió hombres
  alternatives_spanish:
  - cuando Saúl envió
  - al enviar Saúl
  lexicon: HALOT
  rationale: La construcción temporal con infinitivo se vierte naturalmente con «cuando». Se explicita «hombres» porque el verbo plural siguiente lo implica, siguiendo la solución auditable del POB inglés.
- source_word: וַיִּשְׁמְרוּ
  english_pob_choice: they watched
  chosen_spanish: ellos vigilaban
  alternatives_spanish:
  - ellos velaban
  - ellos custodiaban
  lexicon: HALOT
  rationale: Aquí שׁמר tiene el matiz de vigilancia hostil, no de protección. «Vigilaban» comunica la observación intencional y encaja bien con el propósito hostil que sigue.
- source_word: אֶת הַבַּיִת
  english_pob_choice: the house
  chosen_spanish: la casa
  alternatives_spanish:
  - su casa
  - el domicilio
  lexicon: HALOT
  rationale: Se mantiene el objeto definido sin añadir posesivo que el hebreo no expresa explícitamente. El contexto permite entender la referencia a la casa de David sin sobretraducción.
- source_word: לַהֲמִיתוֹ
  english_pob_choice: to kill him
  chosen_spanish: para matarlo
  alternatives_spanish:
  - para darle muerte
  - a fin de matarlo
  lexicon: HALOT
  rationale: La finalidad se expresa de forma directa y natural en español. «Matarlo» conserva la fuerza inmediata del hebreo sin suavizarla.
translation_notes:
  revision_awareness: 'Se tomó en cuenta el aviso de revisión sobre la estructura temporal y la cláusula principal: el español separa con coma la introducción temporal («cuando Saúl envió hombres») de la cláusula principal («y ellos vigilaban la casa para matarlo»), reflejando la relación sintáctica del hebreo. También se preserva la ambigüedad del encabezado y la incertidumbre de miktam, sin añadir interpretaciones no sustentadas.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma general del proyecto, pero este versículo no contiene el tetragrámaton.
  - «Mesías/Cristo» no aplica aquí.
  - Se conserva el estilo de superscripción con dos puntos y comillas para la indicación musical.
  - La traducción evita volver «el house» posesivo sin base explícita, aunque el contexto sugiere la casa de David.
  - El término oscuro miktam se translitera de manera consistente con la práctica del POB.
