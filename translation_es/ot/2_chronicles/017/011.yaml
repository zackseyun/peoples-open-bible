translation:
  language: es
  text: 'Y algunos[a] de los filisteos llevaban a Josafat tributo y plata[b], una carga; y los arabios también le llevaban rebaños: 7.700 carneros y 7.700 machos cabríos.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «de los filisteos»; el hebreo puede enfatizar la procedencia más que un sentido partitivo.
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «plata, una carga»; es decir, plata llevada como tributo.'
    reason: cultural_note
lexical_decisions:
- source_word: וּ/מִן פְּלִשְׁתִּים
  english_pob_choice: And some of the Philistines
  chosen_spanish: Y algunos de los filisteos
  alternatives_spanish:
  - Y de los filisteos
  - Y los filisteos
  lexicon: HALOT
  rationale: La preposición con מִן y etnónimo puede marcar fuente o un sentido partitivo. En español, «algunos de» comunica bien la lectura partitiva sin borrar la posibilidad de origen implícita.
- source_word: מְבִיאִים
  english_pob_choice: were bringing
  chosen_spanish: llevaban
  alternatives_spanish:
  - traían
  - estaban llevando
  lexicon: HALOT
  rationale: El participio expresa acción repetida o continua. «Llevaban» conserva ese valor durativo en un español natural y sobrio.
- source_word: מִנְחָה
  english_pob_choice: tribute
  chosen_spanish: tributo
  alternatives_spanish:
  - presente
  - ofrenda
  - regalo
  lexicon: HALOT
  rationale: En contexto político y diplomático, el término designa un tributo para un rey, no una ofrenda cultual ni un regalo genérico.
- source_word: וְ/כֶסֶף מַשָּׂא
  english_pob_choice: and silver, a burden
  chosen_spanish: plata, una carga
  alternatives_spanish:
  - plata como carga
  - plata, un peso
  - plata como tributo
  lexicon: HALOT
  rationale: «כֶסֶף» puede funcionar como plata o dinero, y «מַשָּׂא» es literalmente carga/peso. «Plata, una carga» preserva la expresión concreta y la nota de tributo transportado sin suavizarla.
- source_word: גַּם הָ/עַרְבִיאִים
  english_pob_choice: the Arabians also
  chosen_spanish: y los arabios también
  alternatives_spanish:
  - también los árabes
  - los arabios asimismo
  lexicon: HALOT
  rationale: «Arabios» mantiene el etnónimo histórico con un registro bíblico comprensible; «también» reproduce la fuerza aditiva de גַּם.
- source_word: ל/וֹ צֹאן
  english_pob_choice: him flocks
  chosen_spanish: le llevaban rebaños
  alternatives_spanish:
  - le llevaban ganado menor
  - le llevaban ovejas y cabras
  lexicon: HALOT
  rationale: «צֹאן» es un colectivo de ganado menor. Como los animales se especifican después, «rebaños» funciona bien como encabezado colectivo.
- source_word: אֵילִים
  english_pob_choice: rams
  chosen_spanish: carneros
  alternatives_spanish:
  - ramos
  - machos ovinos
  lexicon: HALOT
  rationale: El sentido léxico es el del macho adulto de oveja. «Carneros» es una equivalencia natural y precisa en español.
- source_word: וּ/תְיָשִׁים
  english_pob_choice: male goats
  chosen_spanish: machos cabríos
  alternatives_spanish:
  - cabros
  - hechos cabríos
  lexicon: HALOT
  rationale: El término denota cabras macho; «machos cabríos» es claro, fiel y de registro bíblico aceptable.
- source_word: שִׁבְעַת אֲלָפִים וּ/שְׁבַע מֵא֔וֹת
  english_pob_choice: 7,700
  chosen_spanish: '7.700'
  alternatives_spanish:
  - siete mil setecientos
  lexicon: HALOT
  rationale: Se conserva la cifra con formato decimal español. La conversión a numerales facilita la lectura sin alterar el valor numérico.
translation_notes:
  revision_awareness: Se corrigió el problema de validación anclando la nota [a] directamente en el texto. La redacción sigue la lectura revisada del POB en inglés («silver, a burden») y conserva el matiz concreto de carga/tributo sin diluirlo.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» como terminología por defecto del proyecto, pero este versículo no contiene el Tetragrámaton.
  - Se eligieron «filisteos», «arabios», «tributo», «plata» y «carneros/machos cabríos» por correspondencia léxica directa con el hebreo y con el audit trail en inglés.
  - La puntuación separa la apposición «plata, una carga» de modo equivalente a la revisión inglesa.
