base_translation:
  language: en
  yaml_path: translation/ot/proverbs/006/029.yaml
  text: So is the one who goes in to his neighbor’s wife[b][a]; everyone who touches her will not go unpunished.
  footnotes:
  - marker: a
    text: Or 'will not be acquitted' / 'will not be held guiltless.'
    reason: lexical_alternative
  - marker: b
    text: '''Touches her'' likely refers here to illicit sexual contact, not merely incidental physical touch.'
    reason: cultural_note
