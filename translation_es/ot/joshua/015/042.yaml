lexical_decisions:
- source_word: לִבְנָה
  english_pob_choice: Libnah
  chosen_spanish: Libna
  alternatives_spanish:
  - Libnah
  lexicon: HALOT
  rationale: Es un nombre propio de lugar en una lista geográfica, por lo que se translitera en lugar de traducirse. En español, «Libna» conserva mejor la forma breve del hebreo y sigue la adaptación usual de topónimos bíblicos.
- source_word: וָ/עֶתֶר
  english_pob_choice: Ether
  chosen_spanish: Éter
  alternatives_spanish:
  - Ether
  lexicon: HALOT
  rationale: La conjunción se traduce con «y» y el nombre propio עתר se translitera como topónimo. Se eligió «Éter» para adaptarlo a la ortografía y acentuación natural del español, sin cambiar su identidad como nombre de lugar.
- source_word: וְ/עָשָׁן
  english_pob_choice: Ashan
  chosen_spanish: Asán
  alternatives_spanish:
  - Ashan
  lexicon: HALOT
  rationale: Aquí el contexto exige un topónimo, no el sustantivo común «humo». Por eso se translitera como nombre de lugar. «Asán» mantiene la referencia geográfica y evita la traducción semántica indebida.
translation_notes:
  revision_awareness: El texto fuente no presenta variantes textuales ni revisiones en el expediente auditado; la traducción sigue el texto masorético recibido y conserva la lista de nombres propios con transliteración consistente.
  spanish_consistency_notes:
  - Se mantiene el orden de la lista nominal del hebreo.
  - Se usa una sola nota para aclarar el caso de Asán, porque el riesgo interpretativo en español es confundirlo con el sustantivo común «humo».
  - Se prefirió la forma española breve de los topónimos para una lectura más natural y eclesialmente publicable.
