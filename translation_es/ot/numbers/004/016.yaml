  text: וּ/פְקֻדַּ֞ת אֶלְעָזָ֣ר בֶּן אַהֲרֹ֣ן הַ/כֹּהֵ֗ן שֶׁ֤מֶן הַ/מָּאוֹר֙ וּ/קְטֹ֣רֶת הַ/סַּמִּ֔ים וּ/מִנְחַ֥ת הַ/תָּמִ֖יד וְ/שֶׁ֣מֶן הַ/מִּשְׁחָ֑ה פְּקֻדַּ֗ת כָּל הַ/מִּשְׁכָּן֙ וְ/כָל אֲשֶׁר בּ֔/וֹ בְּ/קֹ֖דֶשׁ וּ/בְ/כֵלָֽי/ו׀־־־־׃ס
base_translation:
  language: en
  yaml_path: translation/ot/numbers/004/016.yaml
  text: And the oversight of Eleazar son of Aaron the priest shall be the oil for the light[a], the fragrant incense, the regular grain offering, and the anointing oil—the oversight of the whole tabernacle and all that is in it[d][c][b], the sanctuary and its furnishings.
  footnotes:
  - marker: a
    text: Or 'charge' or 'responsibility' for פְקֻדַּת; the Hebrew term denotes assigned supervision.
    reason: lexical_alternative
  - marker: b
    text: '''The regular grain offering'' could also be rendered ''the continual grain offering.'''
    reason: lexical_alternative
  - marker: c
    text: '''In the sanctuary'' may also be rendered ''in the holy place,'' though here it likely refers more broadly to the holy area and its sacred objects.'
    reason: lexical_alternative
  - marker: d
    text: '''Furnishings'' may also be translated ''vessels'' or ''utensils.'''
    reason: lexical_alternative
