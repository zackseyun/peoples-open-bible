lexical_decisions:
- source_word: וַיְדַבֵּר
  english_pob_choice: spoke
  chosen_spanish: habló
  alternatives_spanish:
  - dijo
  lexicon: HALOT
  rationale: El hebreo marca una nueva acción narrativa con el verbo de hablar. En español, «habló» conserva el valor de acto de comunicación y suena natural antes de la fórmula introductoria «diciendo». «Dijo» también sería posible, pero «habló» refleja mejor el matiz de verbo de habla del original y la decisión inglesa.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  - el SEÑOR
  lexicon: HALOT
  rationale: Se conserva el nombre divino propio del tetragrámaton como «Yahvé», en línea con la política del POB y no como sustitución titulativa. «El SEÑOR» ocultaría el nombre; «Jehová» es una forma tradicional menos preferida aquí.
- source_word: אֶל
  english_pob_choice: to
  chosen_spanish: a
  alternatives_spanish:
  - para
  lexicon: HALOT
  rationale: La preposición introduce al destinatario del discurso. En español, «a» es la equivalencia natural y directa para marcar dirección del habla.
- source_word: מֹשֶׁה
  english_pob_choice: Moses
  chosen_spanish: Moisés
  lexicon: HALOT
  rationale: Nombre propio bíblico estándar en español.
- source_word: לֵאמֹר
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - y dijo
  lexicon: HALOT
  rationale: La fórmula infinitiva introduce la cita directa. «Diciendo» preserva la estructura hebrea de modo natural en español y prepara la palabra siguiente, como en la decisión inglesa.
theological_decisions:
- issue: Traducción del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Jehová
  - el SEÑOR
  rationale: El texto hebreo usa explícitamente el tetragrámaton. Se mantiene el nombre personal de Dios como «Yahvé» para no sustituirlo por un título y para reflejar la lectura doctrinal del POB.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
translation_notes:
  revision_awareness: La revisión más reciente indicó que no se requerían cambios y que el acuerdo con el control cruzado fue alto; este borrador mantiene esa lectura estable, trasladando al español la misma decisión sobre el nombre divino y la estructura verbal.
  spanish_consistency_notes:
  - Se conserva el orden breve de la cláusula hebrea con una sintaxis natural en español.
  - «Yahvé» se usa consistentemente para יְהוָה, en lugar de una sustitución tipográfica.
  - La coma antes de «diciendo» reproduce la fórmula introductoria de habla sin añadir contenido interpretativo.
