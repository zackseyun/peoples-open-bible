translation:
  language: es
  text: Ahora bien, el resto de los hechos de Manasés[a], y su oración a su Dios, y las palabras de los videntes que le hablaron en el nombre de Yahvé, el Dios de Israel—he aquí, están escritos entre los registros de los reyes de Israel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘en el libro/anales de los reyes de Israel’. La fórmula de citación hebrea remite a una fuente real escrita.
    reason: lexical_alternative
lexical_decisions:
- source_word: יֶתֶר / דִּבְרֵי
  english_pob_choice: the rest of the acts
  chosen_spanish: el resto de los hechos
  alternatives_spanish:
  - el resto de las acciones
  - lo demás acerca de los hechos
  - el resto de los actos
  lexicon: HALOT
  rationale: En esta fórmula cronística, דִּבְרֵי abarcan más que ‘palabras’; el sentido historiográfico es de hechos o registros. ‘Hechos’ mantiene amplitud y suena natural en español bíblico moderno.
- source_word: מְנַשֶּׁה
  english_pob_choice: Manasseh
  chosen_spanish: Manasés
  alternatives_spanish:
  - Manasés
  lexicon: nombre propio bíblico
  rationale: Se usa la forma española establecida para el rey de Judá.
- source_word: תְפִלָּתוֹ אֶל אֱלֹהָיו
  english_pob_choice: his prayer to his God
  chosen_spanish: su oración a su Dios
  alternatives_spanish:
  - su oración a Dios
  - su plegaria a su Dios
  lexicon: HALOT
  rationale: Se conserva el posesivo en ‘su Dios’ para reflejar el hebreo y el movimiento personal de la oración. ‘Oración’ es el equivalente más natural y fiel en español.
- source_word: הַחֹזִים
  english_pob_choice: the seers
  chosen_spanish: los videntes
  alternatives_spanish:
  - los videntes proféticos
  - los profetas
  - los videntes
  lexicon: HALOT
  rationale: ‘חֹזִים’ nombra una designación profética específica; ‘videntes’ preserva ese término sin nivelarlo a ‘profetas’. En español bíblico es inteligible y mantiene el matiz del original.
- source_word: הַמְדַבְּרִים אֵלָיו
  english_pob_choice: who spoke to him
  chosen_spanish: que le hablaron
  alternatives_spanish:
  - que estaban hablándole
  - que le hablaban
  lexicon: HALOT
  rationale: El participio hebreo funciona de modo atributivo; en español, la relativa simple en pasado comunica bien la acción de hablar dirigida a él.
- source_word: בְּשֵׁם יְהוָה
  english_pob_choice: in the name of Yahweh
  chosen_spanish: en el nombre de Yahvé
  alternatives_spanish:
  - por el nombre de Yahvé
  - en nombre de Yahvé
  - con la autoridad de Yahvé
  lexicon: HALOT
  rationale: Se conserva la fórmula profética/autoritaria con la preposición más directa en español. ‘Yahvé’ sigue la terminología POB para el Tetragrámaton.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahveh
  - Yahwé
  lexicon: HALOT
  rationale: La forma fijada para el nombre divino en español POB es ‘Yahvé’, manteniendo la transliteración del Nombre y evitando la sustitución por un título.
- source_word: אֱלֹהֵי יִשְׂרָאֵל
  english_pob_choice: the God of Israel
  chosen_spanish: el Dios de Israel
  alternatives_spanish:
  - Dios de Israel
  lexicon: HALOT
  rationale: ‘Dios de Israel’ es la formulación natural y exacta para el constructo hebreo, conservando el vínculo de pacto con Israel.
- source_word: הִנָּם
  english_pob_choice: behold, they are
  chosen_spanish: he aquí, están
  alternatives_spanish:
  - he aquí que están
  - miren, están
  lexicon: HALOT
  rationale: ‘He aquí’ conserva la fuerza deíctica y solemne de הִנָּם sin sonar artificial en español.
- source_word: עַל דִּבְרֵי מַלְכֵי יִשְׂרָאֵל
  english_pob_choice: among the records of the kings of Israel
  chosen_spanish: entre los registros de los reyes de Israel
  alternatives_spanish:
  - en los registros de los reyes de Israel
  - entre los anales de los reyes de Israel
  - en los anales de los reyes de Israel
  lexicon: HALOT
  rationale: La preposición עַל en esta fórmula apunta a la localización en una fuente escrita. ‘Entre los registros’ refleja el valor adoptado por la revisión inglesa (‘among’) y preserva la idea de inserción en una colección documental.
theological_decisions:
- issue: Traducción del Tetragrámaton יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: La línea POB sigue la transliteración del Nombre divino, no una sustitución titulada. En español, ‘Yahvé’ preserva esa decisión y mantiene la coherencia terminológica del proyecto.
  doctrine_reference: 'DOCTRINE.md: contested terms — יְהוָה/YHWH → Yahvé'
- issue: 'Identidad de la fuente citada: ''los reyes de Israel'''
  english_pob_reading: retain 'the kings of Israel' as written
  chosen_spanish_reading: los reyes de Israel
  alternative_spanish_readings:
  - los reyes de Judá
  rationale: Aunque el contexto histórico podría sugerir Judá, el hebreo dice ‘Israel’. La traducción mantiene la lectura del texto fuente y no armoniza con expectativas históricas.
  doctrine_reference: DOCTRINE.md Translation philosophy §1, original-language primacy over translation tradition
translation_notes:
  revision_awareness: La base inglesa fue revisada de ‘in the records’ a ‘among the records’ para ajustarse mejor a la preposición hebrea. La versión española sigue esa revisión con ‘entre los registros’, conservando naturalidad y la referencia documental implícita.
  spanish_consistency_notes:
  - Se mantiene ‘Yahvé’ de forma consistente para יְהוָה.
  - ‘Vidente’ se usa para הַחֹזִים para preservar el matiz profético específico.
  - La fórmula final conserva el carácter archivístico de la cita sin reinterpretarla como mero comentario general.
  - La puntuación con dos puntos antes de ‘he aquí’ refleja la transición a la cláusula de localización documental.
