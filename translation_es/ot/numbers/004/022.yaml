translation:
  language: es
  text: Haz un censo de los hijos de Gersón[a], ellos también, por sus casas paternas, por sus clanes.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo literalmente: «levanta la cabeza de los hijos de Gersón»; es un modismo que significa contarlos o hacer un censo.'
    reason: lexical_alternative
lexical_decisions:
- source_word: נָשֹׂא אֶת רֹאשׁ
  english_pob_choice: Take a census
  chosen_spanish: Haz el censo
  alternatives_spanish:
  - Cuenta
  - Levanta el total
  lexicon: HALOT
  rationale: El hebreo usa un modismo administrativo que literalmente dice «levantar la cabeza», pero aquí el sentido es contar a un grupo. En español, «haz el censo» comunica de manera natural la acción ordenada por el texto sin perder el valor oficial del mandato.
- source_word: בְּנֵי גֵרְשׁוֹן
  english_pob_choice: the sons of Gershon
  chosen_spanish: los hijos de Gersón
  alternatives_spanish:
  - los descendientes de Gersón
  - los gersonitas
  lexicon: HALOT
  rationale: Se conserva la construcción filial explícita del hebreo. «Hijos de» refleja mejor la formulación genealógica del original que un gentilicio más interpretativo como «gersonitas».
- source_word: גַּם הֵם
  english_pob_choice: also
  chosen_spanish: también ellos
  alternatives_spanish:
  - también
  - ellos también
  - incluso ellos
  lexicon: HALOT
  rationale: El hebreo añade un énfasis inclusivo. «También ellos» mantiene ese matiz mejor que un simple «también», y conserva la referencia explícita al grupo añadido.
- source_word: לְבֵית אֲבֹתָם
  english_pob_choice: by their fathers' houses
  chosen_spanish: por sus casas paternas
  alternatives_spanish:
  - según sus casas paternas
  - por sus casas de padres
  - por sus casas ancestrales
  lexicon: HALOT
  rationale: «Casas paternas» reproduce con claridad la unidad de parentesco/linaje propia del hebreo y suena natural en español bíblico contemporáneo. «Casas de padres» sería menos idiomático.
- source_word: לְמִשְׁפְּחֹתָם
  english_pob_choice: by their clans
  chosen_spanish: por sus clanes
  alternatives_spanish:
  - según sus familias
  - por sus familias
  lexicon: HALOT
  rationale: En este contexto, מִשְׁפָּחָה designa una subdivisión tribal o de linaje, no solo la familia nuclear moderna. «Clanes» conserva mejor esa estructura social que «familias».
translation_notes:
  revision_awareness: El audit trail inglés confirma una lectura idiomática de נָשֹׂא אֶת־רֹאשׁ como acción de censar, con acuerdo alto y sin revisiones aplicadas; la versión española conserva esa decisión y mantiene el énfasis inclusivo de גַּם הֵם.
  spanish_consistency_notes:
  - Se mantiene «Gersón» para el nombre propio, siguiendo la forma habitual en español y la transliteración del hebreo.
  - «Casas paternas» y «clanes» preservan la distinción social del texto entre linaje doméstico y subdivisión tribal.
  - El marcador de nota [a] se coloca en «Gersón» para anclar la observación idiomática sobre el verbo hebreo en la frase completa.
