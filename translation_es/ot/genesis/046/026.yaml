base_translation:
  language: en
  yaml_path: translation/ot/genesis/046/026.yaml
  text: All the persons belonging to Jacob who came to Egypt[a], who came from his loins, besides the wives of Jacob’s sons[b], were sixty-six persons in all.
  footnotes:
  - marker: a
    text: Hebrew literally, 'those coming out of his thigh,' an idiom for biological descendants.
    reason: lexical_alternative
  - marker: b
    text: Or 'all the souls ... sixty-six.' Here 'soul' is a Hebrew way of counting persons.
    reason: lexical_alternative
