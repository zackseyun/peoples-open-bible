review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el sentido general del hebreo y sigue de cerca la auditoría inglesa: responsabilidad individual, preservación de ''llevar la iniquidad'' y paralelismo justo/malvado. Sin embargo, hay dos desajustes importantes. Primero, la nota [a] no preserva la alternativa documentada del inglés, porque repite ''persona'' en vez de ofrecer la opción más literal ''alma''. Segundo, la nota [b] está anclada en ''justicia'', pero su contenido explica el modismo ''llevar la iniquidad''; por lo tanto, el anclaje en el texto está mal ubicado. Además, ''esa morirá'' es defendible, pero suena algo rígido en español bíblico natural; ''esa misma morirá'' conserva el énfasis sin rareza.'
  spanish_quality_summary: El español es claro y digno, con buena legibilidad general. 'La persona que peca' funciona bien. 'Será sobre él' es aceptable y fiel, aunque ligeramente literal; no requiere cambio. Los mayores problemas son de aparato crítico y precisión editorial más que de fluidez. La colocación correcta de la nota jurídica mejora la comprensión.
  glossary_alignment: 'Alineación buena con las pautas del proyecto: נֶפֶשׁ como ''persona'' en el texto principal es adecuada; צִדְקָה como ''justicia'' y רִשְׁעָה como ''maldad'' son razonables en contexto; el idiomático יִשָּׂא בַּעֲוֺן se conserva correctamente como ''llevar la iniquidad''. No hay términos del glosario mayor en conflicto. La única corrección necesaria es que la nota lexical sobre נֶפֶשׁ debe incluir la alternativa ''alma'', tal como en la auditoría inglesa.'
  issues:
  - severity: high
    issue: La nota [a] no conserva la alternativa léxica documentada para נֶפֶשׁ.
    rationale: La auditoría inglesa preserva explícitamente la opción más literal 'The soul who sins, it shall die.' En español, la nota debe reflejar esa alternativa con 'alma', no repetir 'persona', para mantener la trazabilidad de la decisión léxica.
  - severity: high
    issue: La nota [b] está anclada en el lugar equivocado del texto.
    rationale: El contenido de la nota [b] explica el modismo 'llevar la iniquidad', pero el marcador aparece en 'justicia'. Esto rompe la correspondencia exigida entre ancla y nota y puede confundir al lector.
  - severity: low
    issue: '''Esa morirá'' suena algo brusco en español.'
    rationale: Aunque es fiel al énfasis pronominal hebreo, 'esa misma morirá' suena más natural y conserva la fuerza enfática sin perder precisión.
  revised_spanish_text: La persona que peca[a]—esa misma morirá. El hijo no llevará[b] la iniquidad del padre, ni el padre llevará[b] la iniquidad del hijo. La justicia del justo será sobre él, y la maldad del malvado será sobre él.
  revised_footnotes:
