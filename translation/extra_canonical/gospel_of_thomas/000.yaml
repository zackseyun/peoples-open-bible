translation:
  text: These are the hidden sayings which the living Jesus spoke[4][3][2][1], and
    Didymos Judas Thomas wrote them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: '1'
    text: ϩⲏⲡ may be rendered “hidden” or “secret.” “Hidden” is chosen to preserve
      the Coptic sense of concealment without importing later esoteric connotations.
    reason: lexical_alternative
  - marker: '2'
    text: Didymos is a Greek loan meaning “Twin.” The full designation “Didymos Judas
      Thomas” likely apposes Greek and Semitic forms of “Twin.”
    reason: cultural_note
  - marker: '3'
    text: The particle ⲛϭⲓ can function to identify an agent after a verb; here it
      is rendered “by” rather than “namely,” to reflect agency in English.
    reason: dialect_note
  - marker: '4'
    text: The printed line shows ⲧⲟⲛϩ for ⲱⲛϩ. This is an orthographic/dialectal variation;
      meaning is “living/being alive.”
    reason: textual_variant
lexical_decisions:
- source_word: ⲛ̄ϣⲁϫⲉ
  chosen: sayings
  alternatives:
  - words
  - teachings
  - discourses
  lexicon: Crum, s.v. ϣⲁϫⲉ
  rationale: The printed text shows the plural; rendering as “sayings” preserves Thomas’s
    terse genre marker and avoids over-interpretation.
- source_word: ϩⲏⲡ
  chosen: hidden
  alternatives:
  - secret
  - concealed
  lexicon: Crum, s.v. ϩⲏⲡ
  rationale: ϩⲏⲡ regularly means hidden/secret; “hidden” keeps the strangeness without
    implying esoteric initiation beyond the Coptic nuance.
- source_word: ⲱⲛϩ (printed ⲧⲟⲛϩ)
  chosen: living
  alternatives:
  - alive
  lexicon: Crum, s.v. ⲟⲛϩ
  rationale: Attributive relative (“Jesus who is living”). “Living” is concise and
    preserves the likely titular feel without harmonizing to canonical phrasing.
- source_word: ϫⲱⲛⲧⲟⲟⲩ / ϫⲟⲟⲩ
  chosen: spoke them
  alternatives:
  - said them
  - uttered them
  lexicon: Lambdin, §75; Crum, s.v. ϫⲱ
  rationale: Direct, transitive rendering matches the object pronoun in the text and
    Thomas’s sharp diction.
- source_word: ⲥϩⲁⲓ
  chosen: wrote
  alternatives:
  - wrote down
  - recorded
  lexicon: Crum, s.v. ⲥϩⲁⲓ
  rationale: Plain past of the writing verb with object suffix; “wrote” keeps the
    terseness of the incipit.
- source_word: ⲛϭⲓ
  chosen: by
  alternatives:
  - namely
  - of
  lexicon: Layton, Coptic Grammar (agent/identifying particle); Crum, s.v. ⲛϭⲓ
  rationale: Here ⲛϭⲓ identifies the agent named after the verb. “By” captures the
    function more naturally in English than “namely,” without adding content.
- source_word: ⲇⲓⲇⲩⲙⲟⲥ
  chosen: Didymos
  alternatives:
  - the Twin
  lexicon: Crum, s.v. ⲇⲓⲇⲩⲙⲟⲥ (from Gk δίδυμος)
  rationale: Kept as the Greek loan-name present in the manuscript; a note clarifies
    its meaning (“Twin”).
- source_word: ⲓⲟⲩⲇⲁⲥ
  chosen: Judas
  alternatives:
  - Judah
  lexicon: Crum, s.v. ⲓⲟⲩⲇⲁⲥ
  rationale: Standard rendering of the Greek loan name; “Judah” would over-semitize
    against the manuscript’s form.
- source_word: ⲑⲱⲙⲁⲥ
  chosen: Thomas
  alternatives: []
  lexicon: Crum, s.v. ⲑⲱⲙⲁⲥ
  rationale: Conventional rendering of the proper name as in the manuscript.
- source_word: ⲛⲁⲉⲓ ⲛⲉ
  chosen: These are
  alternatives:
  - This is (sg.)
  lexicon: Lambdin, §23 (demonstratives)
  rationale: Plural demonstrative matches the printed text, setting up a collection
    of logia.
textual_note: NH II, p. 32 (lb 1–3). The printed text reads the plural demonstrative
  ⲛⲁⲉⲓ ⲛⲉ and plural ⲛ̄ϣⲁϫⲉ (“sayings”). Dilley’s normalized stream gives relative
  chains (ⲉⲧⲉⲣⲉϩⲱⲡ … ⲉⲧⲉⲣⲉⲁⲓⲏⲥⲟⲩⲥ … ⲉⲧⲉⲣⲉⲱⲛϩ) corresponding to “which [the living
  Jesus] spoke them.” Orthographically, ⲱⲛϩ (“living”) appears in a Lycopolitan-influenced
  spelling ⲧⲟⲛϩ in the printed line; object pronouns vary as ϫⲟⲟⲩ / ⲛⲧⲟⲟⲩ for “them.”
  The particle ⲛϭⲓ marks the named agent (“by Didymos Judas Thomas”). No lacunae or
  conjectural restorations are noted in Dilley for this incipit.
