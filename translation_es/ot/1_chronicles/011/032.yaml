  text: Hurai, de los torrentes de Gaas[a], Abiel el arbatita[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «de los valles de Gaas» o «de los arroyos de Gaas». El hebreo נחל puede referirse a un wadi, valle, cauce o lecho torrentoso.'
