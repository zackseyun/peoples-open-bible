review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la estructura y el sentido del hebreo: Yahvé como sujeto, entrega a derrota ante los enemigos, salida por un camino y huida por siete, y resultado de ser objeto de espanto ante los reinos. También sigue correctamente la revisión auditada que normaliza los pronombres al plural. Sin embargo, la colocación de la nota [a] en ‘derrotado’ es incorrecta: la nota inglesa y la evidencia léxica se refieren a לְזַעֲוָה (‘horror’), no a נִגָּף (‘derrotado’).'
  spanish_quality_summary: El español es claro, digno y mayormente natural. ‘Yahvé te entregará derrotado delante de tus enemigos’ suena algo comprimido, pero sigue siendo inteligible y fiel. El resto del verso fluye bien. Conviene reubicar la nota al término ‘horror’ para evitar confusión semántica. También una ligera mejora estilística es insertar ‘como’ en ‘te entregará como derrotado’, que expresa mejor la construcción hebrea de entrega a un estado, aunque no es indispensable.
  glossary_alignment: 'El borrador cumple bien con la terminología del proyecto: יהוה → ‘Yahvé’; mantiene ‘horror’ para זַעֲוָה con alternativa en nota; conserva el paralelismo ‘un camino / siete caminos’; y no introduce paráfrasis teológicas. La única desalineación formal es el anclaje de la nota léxica en la palabra equivocada.'
  issues:
  - severity: medium
    issue: La nota [a] está anclada en ‘derrotado’ en lugar de ‘horror’.
    rationale: La nota documenta la alternativa de זַעֲוָה (‘objeto de horror’), no de נִגָּף (‘derrotado’). Tal como está, induce al lector a pensar que la alternativa léxica corresponde a ‘derrotado’.
  - severity: low
    issue: ‘Te entregará derrotado’ es menos natural que ‘te entregará como derrotado’.
    rationale: El español puede interpretar mejor la idea de entrega a un estado o condición con ‘como derrotado’, sin apartarse del sentido del hebreo ni de la decisión inglesa ‘give you over as defeated’.
  revised_spanish_text: Yahvé te entregará como derrotado delante de tus enemigos. Saldrás contra ellos por un camino, y por siete caminos huirás delante de ellos; y serás horror[a] para todos los reinos de la tierra.
  revised_footnotes:
  - marker: a
    text: 'O: ‘objeto de horror’. El término hebreo puede señalar algo que causa horror o espanto.'
    reason: lexical_alternative
  revision_rationale: Se corrigió el anclaje de la nota para que corresponda a ‘horror’, que es el término hebreo comentado en la evidencia y en el POB en inglés. Además, se hizo una leve mejora de naturalidad en ‘te entregará como derrotado’, que expresa mejor la idea de ser entregado a una condición de derrota.
