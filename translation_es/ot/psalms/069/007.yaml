  text: אַל יֵ֘בֹ֤שׁוּ בִ֨/י קֹוֶי/ךָ֮ אֲדֹנָ֥/י יְהוִ֗ה צְבָ֫א֥וֹת אַל יִכָּ֣לְמוּ בִ֣/י מְבַקְשֶׁ֑י/ךָ אֱ֝לֹהֵ֗י יִשְׂרָאֵֽל־׀־׃
base_translation:
  language: en
  yaml_path: translation/ot/psalms/069/007.yaml
  text: Let not those who hope in you be put to shame because of me[a], Lord Yahweh of hosts; let not those who seek you be humiliated because of me[b], God of Israel.
  footnotes:
