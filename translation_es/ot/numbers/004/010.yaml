translation:
  language: es
  text: Pondrán el candelabro y todos sus utensilios dentro de una cubierta de cuero fino[a], y lo colocarán sobre el armazón de transporte.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebreo תַּחַשׁ (tachash) es incierto; puede referirse a un tipo particular de piel o a un cuero duradero de alta calidad. Las traducciones tradicionales incluyen 'piel de marsopa' o identificaciones semejantes.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְנָתְנוּ
  english_pob_choice: they shall put / they shall place
  chosen_spanish: lo pondrán / lo colocarán
  alternatives_spanish:
  - lo pondrán
  - lo colocarán
  - lo pondrán y lo colocarán
  lexicon: HALOT
  rationale: 'El hebreo repite el mismo verbo en dos pasos sucesivos; en español conviene distinguir levemente las acciones sin perder el paralelismo: primero introducir el objeto en la cubierta, luego situarlo para el traslado. ''Pondrán'' y ''colocarán'' conservan el valor procedimental.'
- source_word: אֹתָהּ
  english_pob_choice: it
  chosen_spanish: lo
  alternatives_spanish:
  - la
  - eso
  lexicon: HALOT
  rationale: Aunque el referente inmediato es femenino en hebreo, en español el objeto anterior nombrado en el contexto puede traducirse con pronombre neutro de objeto directo 'lo' para evitar forzar género y mantener naturalidad referencial en una construcción impersonal.
- source_word: כָּל כֵּלֶיהָ
  english_pob_choice: all its utensils
  chosen_spanish: todos sus utensilios
  alternatives_spanish:
  - todos sus utensilios
  - todos sus objetos
  - todos sus implementos
  lexicon: HALOT
  rationale: '''Utensilios'' comunica bien el conjunto de piezas o accesorios del objeto del tabernáculo y mantiene la amplitud semántica de כֵּלִים sin volverse demasiado técnico.'
- source_word: אֶל מִכְסֵה
  english_pob_choice: into a covering
  chosen_spanish: dentro de una cubierta
  alternatives_spanish:
  - en una cubierta
  - dentro de una cobertura
  - en una cobertura
  lexicon: HALOT
  rationale: La preposición hebrea aquí expresa introducción/colocación dentro de algo. 'Dentro de una cubierta' expresa mejor la envoltura física que un simple 'en'.
- source_word: עוֹר תָּחַשׁ
  english_pob_choice: fine leather
  chosen_spanish: cuero fino
  alternatives_spanish:
  - cuero fino
  - cuero de tahas
  - piel de tahas
  - cuero resistente
  lexicon: HALOT
  rationale: El término תָּחַשׁ es lexicográficamente incierto; el POB inglés opta por una descripción funcional ('fine leather') en vez de una identificación especulativa. 'Cuero fino' preserva esa decisión sin imponer una especie animal. Se evita 'tahas' en el texto principal para no introducir una transliteración opaca.
- source_word: וְנָתְנוּ עַל הַמּוֹט
  english_pob_choice: they shall place it on the carrying frame
  chosen_spanish: lo colocarán sobre el armazón de transporte
  alternatives_spanish:
  - lo colocarán sobre el armazón de transporte
  - lo pondrán sobre el armazón de transporte
  - lo colocarán sobre el travesaño de transporte
  lexicon: HALOT
  rationale: El término מּוֹט designa un elemento para cargar/transportar. El POB inglés revisó 'carrying pole' a 'carrying frame' para reflejar mejor el sentido colectivo/singular del término en este pasaje. 'Armazón de transporte' comunica la función sin reducirlo indebidamente a una sola vara.
translation_notes:
  revision_awareness: Se tomó en cuenta la revisión más reciente del POB inglés, que ajustó 'carrying pole' a 'carrying frame' para reflejar mejor el sentido singular/colectivo de הַמּוֹט. La versión española sigue esa decisión y evita una imagen demasiado estrecha de una sola vara. También se preserva la cautela lexicográfica respecto de תָּחַשׁ mediante una nota al pie en lugar de fijar una identificación especulativa.
  spanish_consistency_notes:
  - Se usó 'Yahvé' por norma general cuando corresponda, pero este versículo no lo contiene.
  - Se evitó 'SEÑOR' por no haber aquí un sustituto del nombre divino.
  - '''Cuero fino'' mantiene la decisión funcional del inglés POB frente a una identificación zoológica incierta.'
  - '''Armazón de transporte'' sigue la revisión del inglés ''carrying frame'' y suena natural en español bíblico contemporáneo.'
