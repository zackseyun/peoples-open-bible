translation:
  language: es
  text: El deseo que él tiene[a] prospera, y no hay obstáculo para su salvación.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Lo que él desea prospera»; el paralelo griego dice: «En su mandato está todo buen deseo, y no hay quien disminuya su salvación».'
    reason: lexical_alternative
lexical_decisions:
- source_word: תאות רצונו
  english_pob_choice: The desire of his will
  chosen_spanish: El deseo de su voluntad
  alternatives_spanish:
  - Lo que él desea
  - Su deseo
  - El objeto de su deseo
  lexicon: HALOT
  rationale: La cadena hebrea une תאות con רצונו; en español, «el deseo de su voluntad» conserva la relación posesiva y el matiz de voluntad divina sin sonar tan mecánico como una traducción literal rígida. Mantiene la tensión semántica entre deseo y voluntad que también reflejan el hebreo y el paralelo griego.
- source_word: צליח
  english_pob_choice: succeeds
  chosen_spanish: prospera
  alternatives_spanish:
  - tiene éxito
  - se cumple
  - sale adelante
  lexicon: HALOT
  rationale: El hifil de צלח suele expresar prosperar o tener éxito. «Prospera» es una equivalencia natural en español bíblico moderno y conserva la idea de eficacia real del designio divino; «tiene éxito» sería más cotidiano, pero menos digno.
- source_word: מעצור
  english_pob_choice: hindrance
  chosen_spanish: obstáculo
  alternatives_spanish:
  - impedimento
  - restricción
  - freno
  lexicon: HALOT
  rationale: מעצור designa algo que estorba o bloquea. «Obstáculo» comunica bien la idea de que nada puede impedir la acción salvadora de Dios, y funciona con claridad en español sin estrechar el sentido a una mera restricción legal o física.
- source_word: תשועתו
  english_pob_choice: his salvation
  chosen_spanish: su salvación
  alternatives_spanish:
  - su liberación
  - su acto salvador
  - su rescate
  lexicon: HALOT
  rationale: תשועה y el griego σωτήριον apoyan «salvación» como traducción directa y amplia. En este contexto sapiencial, el término apunta al poder salvador eficaz de Dios, sin necesidad de reducirlo a una sola categoría doctrinal posterior.
theological_decisions:
- issue: Cómo rendir תשועה/σωτήριον sin reducir el alcance bíblico del término
  english_pob_reading: his salvation
  chosen_spanish_reading: su salvación
  alternative_spanish_readings:
  - su liberación
  - su acto salvador
  rationale: '«Salvación» preserva el campo semántico compartido por el hebreo y el griego y deja abierta la amplitud del término: rescate, liberación y acción salvadora. Evita estrechar el pasaje a una sola formulación sistemática.'
  doctrine_reference: 'POB translation philosophy: preserve theological tension rather than resolve it; readable modern Spanish without flattening biblical terminology.'
translation_notes:
  revision_awareness: 'El borrador sigue la última revisión inglesa en cuanto a formalidad y a la relación entre תאות y רצונו, pero la expresa en español con un giro más natural: «El deseo de su voluntad». También conserva la opción de lectura alternativa reflejada en la nota del texto inglés y en el paralelo griego.'
  spanish_consistency_notes:
  - Se mantiene «salvación» para תשועה/σωτήριον en coherencia con el vocabulario POB y con el paralelo griego.
  - Se evita «Señor» o equivalentes porque el verso no contiene el tetragrámaton ni una cita directa de κύριος.
  - «Prospera» se usa aquí por su valor bíblico y no económico, en línea con el hebreo צלח.
  - El marcador [a] aparece solo en el sintagma al que corresponde la nota alternativa.
