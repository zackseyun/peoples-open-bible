    text: Or 'She wept before him' or 'She cried to him.' The Hebrew idiom literally says she 'wept on him,' conveying sustained emotional pressure.
    reason: lexical_alternative
  - marker: b
    text: '''The sons of her people'' may refer more specifically to the men of her own people, likely the Philistine companions in the immediate context.'
    reason: lexical_alternative
