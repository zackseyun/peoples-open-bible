    issue: Número gramatical incorrecto en 'es aquel que clamó a Dios y fue salvado'
    rationale: El griego οἱ βοηθήσαντες ... καὶ σωθέντες es plural participial ('los que ... y fueron salvados'), y el POB inglés también lo refleja en plural. El singular 'aquel... fue salvado' reduce indebidamente el referente colectivo de Israel.
  - severity: medium
    issue: Marcador de nota [a] colocado en 'mi pueblo' en vez de la frase difícil sobre pedir ayuda a Dios
    rationale: La nota explica una alternativa para οἱ βοηθήσαντες πρὸς τὸν θεόν, no para ἔθνος/mi pueblo. El anclaje actual puede confundir al lector sobre qué expresión está siendo comentada.
  - severity: low
    issue: La nota comienza con comillas innecesarias y puede pulirse
    rationale: La formulación actual funciona, pero 'O:' sin comilla inicial espuria y con una redacción más natural mejora la presentación editorial.
