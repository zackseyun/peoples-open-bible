translation:
  language: es
  text: Muchos son altos y renombrados; pero a los apacibles[a] se les revelan misterios.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «los mansos» o «los humildes». El griego πραέσιν puede denotar a quienes son apacibles, mansos o humildes de disposición.
    reason: lexical_alternative
lexical_decisions:
- source_word: πολλοὶ
  english_pob_choice: Many
  chosen_spanish: Muchos
  alternatives_spanish:
  - Muchas personas
  - Hay muchos
  lexicon: LSJ
  rationale: Es un plural indefinido sustantivado; «Muchos» conserva la brevedad proverbial del griego sin añadir un sustantivo como «personas».
- source_word: ὑψηλοὶ
  english_pob_choice: lofty
  chosen_spanish: los altos
  alternatives_spanish:
  - los elevados
  - los exaltados
  - los grandes
  lexicon: LSJ
  rationale: El sentido literal es «altos», y aquí alude a la elevación de rango o estatus. En español, «los altos» preserva esa imagen con naturalidad y permite el contraste con los mansos.
- source_word: ἐπίδοξοι
  english_pob_choice: renowned
  chosen_spanish: los renombrados
  alternatives_spanish:
  - los distinguidos
  - los notables
  - los célebres
  lexicon: LSJ
  rationale: El término expresa ser tenido en estima o con fama pública; «renombrados» recoge bien ese matiz de reputación sin sobrecargar el verso.
- source_word: πραέσιν
  english_pob_choice: the gentle
  chosen_spanish: los mansos
  alternatives_spanish:
  - los gentiles
  - los humildes
  lexicon: LSJ
  rationale: La alternativa inglesa mantenía la tensión entre mansedumbre, gentileza y humildad. En español, «mansos» es la equivalencia más directa y bíblicamente reconocible para πραΰς, sin perder la idea de una disposición no altiva.
- source_word: ἀποκαλύπτεται
  english_pob_choice: are revealed
  chosen_spanish: se les revelan
  alternatives_spanish:
  - son revelados
  - se revelan
  lexicon: LSJ
  rationale: 'El pasivo debe conservarse, pero en español resulta más natural expresar el destinatario indirecto: «se les revelan». Así se mantiene la voz pasiva sin especificar revelador.'
- source_word: μυστήρια
  english_pob_choice: mysteries
  chosen_spanish: misterios
  alternatives_spanish:
  - cosas ocultas
  - secretos
  lexicon: LSJ
  rationale: «Misterios» es la correspondencia más directa y solemne para μυστήρια, conservando el peso del plural griego sin explicitarlo de más.
theological_decisions:
- issue: 'Cómo traducir πραέσιν: «gentiles», «mansos» o «humildes»'
  english_pob_reading: the gentle
  chosen_spanish_reading: los mansos
  alternative_spanish_readings:
  - los gentiles
  - los humildes
  rationale: La lectura inglesa privilegia una disposición apacible y no autoafirmada. En español, «mansos» mantiene mejor la tradición bíblica y el contraste con los altos y renombrados; «gentiles» podría confundirse con «paganos», y «humildes» desplaza ligeramente el énfasis hacia la condición social o moral.
  doctrine_reference: 'DOCTRINE.md: preservar decisiones léxicas de forma explícita; mantener el contraste ético del proverbio'
- issue: 'Pasividad de ἀποκαλύπτεται: si conviene explicitar el sujeto revelador'
  english_pob_reading: are revealed
  chosen_spanish_reading: se les revelan
  alternative_spanish_readings:
  - son revelados
  - son dadas a conocer
  rationale: El griego no nombra al agente. «Se les revelan» conserva la pasividad impersonal y, a la vez, hace fluida la construcción en español.
  doctrine_reference: 'DOCTRINE.md: no añadir agentes no expresados por el texto'
translation_notes:
  revision_awareness: El texto griego y el audit trail inglés están en alto acuerdo y no muestran revisiones pendientes; se ha mantenido la equivalencia óptima sin introducir cambios no sustentados.
  spanish_consistency_notes:
  - Se conserva «misterios» para μυστήρια, en paralelo con la decisión inglesa.
  - Se usa «Yahvé» solo cuando el texto fuente lo requiera; aquí no aparece el tetragrámaton ni κύριος.
  - Se evita «Cristo» y otras terminologías no presentes en el versículo.
  - La nota textual/lexical se ancla en [a] porque el español introduce ambigüedad similar a la que preservó el inglés.
