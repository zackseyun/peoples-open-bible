    rationale: El expediente inglés documenta que, en este contexto arquitectónico, la expresión se entiende como base/repisa/borde a nivel del suelo, no como una imagen literal en el texto principal. Dejar 'seno' en el cuerpo del versículo oscurece el sentido estructural.
  - severity: medium
    issue: El español principal resulta menos natural por la literalidad de 'seno de la tierra' en un pasaje técnico.
    rationale: En español eclesial general, 'seno de la tierra' no comunica con claridad una parte del altar. Una formulación concreta mejora la legibilidad sin perder la nota explicativa.
  - severity: low
