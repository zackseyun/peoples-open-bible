review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la estructura y el sentido general del hebreo: la doble exclamación חָלִילָה, la acción rechazada, el contraste entre justo e impío, y la pregunta retórica final. También conserva adecuadamente la alternativa léxica de מִשְׁפָּט en nota. Sin embargo, «matar» debilita ligeramente la fuerza causativa de לְהָמִית frente al audit trail inglés («to put ... to death»), y el anclaje de la nota al segundo «¡Lejos de ti!» no corresponde al lugar más natural de la alternativa final.'
  spanish_quality_summary: 'El español es claro, natural y de registro bíblico digno. «Lejos de ti» funciona bien para חָלִילָה, y «el Juez de toda la tierra» / «hará justicia» son muy buenos. La mejora principal es estilístico-semántica: «dar muerte al justo junto con el impío» suena más preciso en contexto judicial y conserva mejor el matiz del hebreo/POB que «matar al justo con el impío». También conviene mover la nota al tramo final, donde pertenece la alternativa.'
  glossary_alignment: No hay conflictos con la terminología base del proyecto. «Justo», «Dios» implícito, y «Juez» están bien. «Impío» es aceptable y de buen registro bíblico para רָשָׁע en este contexto, aunque «malvado» también sería posible; no requiere cambio. La decisión sobre מִשְׁפָּט como «justicia» está alineada con el rationale documentado.
  issues:
  - severity: medium
    issue: «matar» no refleja tan claramente el matiz causativo/judicial de לְהָמִית
    rationale: El audit trail inglés escogió «to put ... to death» precisamente para conservar la fuerza causativa del hiphil. En español, «dar muerte a» reproduce mejor ese matiz que «matar», especialmente en un contexto forense.
  - severity: low
    issue: «con el impío» puede sonar menos preciso que «junto con el impío»
    rationale: Aunque no es incorrecto, «junto con» expresa más claramente la idea de que el justo sufre el mismo destino que el impío, que es el punto del reproche de Abraham.
  - severity: low
    issue: La nota [a] está anclada en un lugar poco natural
    rationale: La nota ofrece una alternativa para la cláusula final («do justice / do what is just»), por lo que debe anclarse en «hará justicia» o en la pregunta final, no en el segundo «¡Lejos de ti!».
  revised_spanish_text: 'Lejos de ti hacer tal cosa: dar muerte al justo junto con el impío, de modo que el justo sea como el impío. ¡Lejos de ti! ¿No hará justicia[a] el Juez de toda la tierra?'
  revised_footnotes:
  - marker: a
    text: 'O: «¿No hará el Juez de toda la tierra lo que es justo?»'
    reason: lexical_alternative
  revision_rationale: Se ajusta «matar» a «dar muerte» para reflejar mejor לְהָמִית y la decisión léxica documentada en inglés; se cambia «con» por «junto con» para mayor claridad semántica; y se reubica la nota en la cláusula final, que es donde corresponde la alternativa de מִשְׁפָּט.
