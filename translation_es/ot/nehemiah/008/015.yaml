  text: and that they should proclaim and spread the message through all their cities and in Jerusalem[a], saying, “Go out to the hill country and bring branches of olive, oil tree, myrtle, palm, and other leafy trees, to make booths[b], as it is written.”
  footnotes:
  - marker: a
    text: 'Or ''oil tree'' or ''oleaster'' for ''wild olive'' (Hebrew: עֵץ שֶׁמֶן). The exact species identification is uncertain.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew literally 'leaves of olive ... leaves of myrtle ...' The translation uses 'branches' where English more naturally expresses the construction material gathered for the booths.
    reason: lexical_alternative
