translation:
  language: es
  text: Josué despidió al pueblo, cada hombre[a] a su heredad.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «cada uno a su heredad». El hebreo usa el singular masculino אִישׁ de modo distributivo.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְשַׁלַּח
  english_pob_choice: sent ... away
  chosen_spanish: despidió
  alternatives_spanish:
  - envió
  - mandó irse
  lexicon: HALOT
  rationale: El piel de שׁלח en este contexto expresa hacer que la asamblea se retire. En español, «despidió» comunica de manera natural la idea de dar por terminada la reunión y dejar partir al pueblo, sin perder el matiz de despedida/dismissal que el inglés POB preserva con «sent ... away».
- source_word: יְהוֹשֻׁעַ
  english_pob_choice: Joshua
  chosen_spanish: Josué
  alternatives_spanish:
  - Yehoshúa
  lexicon: convención onomástica bíblica
  rationale: El nombre propio se adapta a la convención castellana estándar «Josué», que es transparente para lectores bíblicos en español y mantiene la identificación directa del personaje.
- source_word: הָעָם
  english_pob_choice: the people
  chosen_spanish: el pueblo
  alternatives_spanish:
  - la gente
  - la nación
  lexicon: HALOT
  rationale: En este contexto colectivo de Israel reunido, «el pueblo» reproduce bien עָם sin sobrerrepresentar «nación» ni volverlo informal como «gente».
- source_word: אִישׁ
  english_pob_choice: each man
  chosen_spanish: cada hombre
  alternatives_spanish:
  - cada uno
  - cada persona
  lexicon: HALOT
  rationale: El hebreo usa el singular masculino distributivo אִישׁ. «Cada hombre» conserva esa forma y su fuerza distributiva; «cada uno» suaviza el género, pero el texto hebreo es marcadamente masculino y representativo.
- source_word: לְנַחֲלָתוֹ
  english_pob_choice: to his inheritance
  chosen_spanish: a su heredad
  alternatives_spanish:
  - a su herencia
  - a su posesión
  lexicon: HALOT
  rationale: נַחֲלָה en Josué se refiere a la porción de tierra asignada por herencia. «Heredad» mantiene mejor en español bíblico el sentido de lote territorial recibido, más preciso que la abstracción de «herencia» o «posesión».
translation_notes:
  revision_awareness: El texto hebreo y la auditoría inglesa están en alto acuerdo; no se registran revisiones textuales o de sentido que afecten esta línea. La redacción española sigue de cerca la construcción hebrea y conserva la fuerza distributiva de אִישׁ.
  spanish_consistency_notes:
  - Se usa «Josué» como forma castellana estándar del nombre propio.
  - «Heredad» se conserva para mantener el valor técnico de la porción territorial heredada en Josué.
  - La nota al pie distingue la lectura distributiva del singular hebreo sin introducir una paráfrasis más amplia.
