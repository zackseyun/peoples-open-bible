translation:
  language: es
  text: Entregó su fuerza al cautiverio[a][c], y su esplendor[b] en manos del enemigo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Entregó su fuerza al cautiverio». La expresión puede aludir al arca como señal de la fuerza de Dios entre Israel.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «su gloria». El hebreo puede denotar esplendor, gloria o belleza.'
    reason: lexical_alternative
  - marker: c
    text: Es decir, en manos del enemigo; o, al poder del enemigo.
    reason: cultural_note
lexical_decisions:
- source_word: וַיִּתֵּן
  english_pob_choice: He gave
  chosen_spanish: Él entregó
  alternatives_spanish:
  - Él dio
  - Él entregó en manos de
  lexicon: HALOT
  rationale: El verbo נתן en esta construcción narrativa puede traducirse de forma simple como 'dio', pero en el contexto de juicio y pérdida 'entregó' comunica mejor la idea de dejar algo en poder ajeno sin añadir más de lo que el hebreo dice. Mantiene la compactación del original y evita sobreexplicar.
- source_word: לַשְּׁבִי
  english_pob_choice: to captivity
  chosen_spanish: a cautiverio
  alternatives_spanish:
  - a la cautividad
  - al cautiverio
  lexicon: HALOT
  rationale: שְׁבִי denota el estado o destino de cautiverio. 'A cautiverio' reproduce el sentido de destino/dirección y suena más natural en español bíblico moderno que una formulación demasiado abstracta. Se evita 'cautividad' por sonar menos idiomático aquí.
- source_word: עֻזּוֹ
  english_pob_choice: his strength
  chosen_spanish: su fuerza
  alternatives_spanish:
  - su poder
  - su vigor
  - su fortaleza
  lexicon: HALOT
  rationale: עֹז significa fuerza o poder. 'Fuerza' es claro y conserva la amplitud semántica sin resolver en el texto principal si se trata del arca, del santuario o de la presencia divina simbolizada. Se mantiene la tensión literaria del pasaje.
- source_word: וְתִפְאַרְתּוֹ
  english_pob_choice: and his splendor
  chosen_spanish: y su esplendor
  alternatives_spanish:
  - y su gloria
  - y su hermosura
  lexicon: HALOT
  rationale: תִּפְאֶרֶת puede ser esplendor, gloria o belleza. 'Esplendor' ofrece un equivalente natural y solemne en español, alineado con el tono poético del versículo. 'Gloria' es posible, pero en este contexto puede sonar más interpretativo.
- source_word: בְיַד
  english_pob_choice: into the hand of
  chosen_spanish: en manos de
  alternatives_spanish:
  - en la mano de
  - al poder de
  lexicon: HALOT
  rationale: La locución hebrea 'en la mano de' es un hebraísmo para indicar control o dominio. 'En manos de' mantiene la imagen bíblica y resulta natural en español; además comunica la idea de quedar sometido al poder del otro.
- source_word: צָר
  english_pob_choice: the foe
  chosen_spanish: el enemigo
  alternatives_spanish:
  - el adversario
  - el opresor
  - el foe
  lexicon: HALOT
  rationale: צָר significa enemigo/hostil/adversario. 'Enemigo' es la opción más transparente y estándar en español, sin perder el matiz de oposición hostil. 'Foe' no es idiomático en español, y 'adversario' sería más general.
theological_decisions:
- issue: Si identificar explícitamente la 'fuerza' y el 'esplendor' con el arca, el santuario o la presencia gloriosa de Dios
  english_pob_reading: Retain the poetic expressions 'his strength' and 'his splendor' without explicit identification in the main text
  chosen_spanish_reading: Conservar 'su fuerza' y 'su esplendor' sin identificar explícitamente el referente en el texto principal
  alternative_spanish_readings:
  - Interpretar 'su fuerza' como el arca
  - Interpretar ambas expresiones como referencia al santuario o a la presencia gloriosa de Dios
  rationale: El hebreo usa términos poéticos que sugieren una referencia teológica profunda, pero no la nombra directamente. La traducción debe preservar esa ambigüedad significativa en vez de resolverla. Las notas pueden señalar la posible alusión al arca o al poder representativo de Dios entre Israel.
  doctrine_reference: Preservar la tensión teológica y literaria del texto sin cerrarla prematuramente.
translation_notes:
  revision_awareness: La versión inglesa fue revisada de 'into captivity' a 'to captivity' para ajustarse mejor a la construcción hebrea. En español se reflejó ese ajuste con 'a cautiverio', manteniendo además la lectura de juicio/sometimiento que el contexto exige. También se preservó la tensión teológica sobre una posible alusión al arca sin explicitarla en el cuerpo del texto.
  spanish_consistency_notes:
  - Se usa 'Yahvé' solo cuando el texto fuente lo exija explícitamente; este versículo no contiene el nombre divino.
  - Se mantiene 'enemigo' como término claro y natural para צָר, en armonía con el tono poético del salmo.
  - '''Esplendor'' conserva la gama semántica de תִּפְאֶרֶת sin desplazarla a un lenguaje litúrgico más fijo como ''gloria'' en el texto principal.'
