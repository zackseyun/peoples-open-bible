translation:
  language: es
  text: Ahora bien, Jacob estaba cocinando un guiso[a][b], y Esaú vino del campo, y estaba agotado[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Jacob hervía un guiso». El verbo hebreo indica cocinar por ebullición.'
    reason: lexical_alternative
  - marker: b
    text: 'Traducción tradicional: «potaje» en vez de «guiso».'
    reason: lexical_alternative
  - marker: c
    text: 'O: «cansado» o «débil».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּזֶד
  english_pob_choice: was cooking
  chosen_spanish: estaba cocinando
  alternatives_spanish:
  - coció
  - estaba hirviendo
  - hirvió
  lexicon: HALOT
  rationale: El verbo hebreo señala la acción concreta de preparar comida por cocción/ebullición. En español, «estaba cocinando» comunica de manera natural la escena doméstica sin perder la acción culinaria específica que el inglés POB preserva con «was cooking».
- source_word: נָזִיד
  english_pob_choice: a stew
  chosen_spanish: un guiso
  alternatives_spanish:
  - un potaje
  - un estofado
  - una comida cocida
  lexicon: HALOT
  rationale: נָזִיד designa un plato cocido, especialmente un guiso. «Guiso» es claro y natural en español; «potaje» conserva el sentido tradicional pero suena más arcaico, y «estofado» podría restringir indebidamente el matiz.
- source_word: וַיָּבֹא
  english_pob_choice: came in
  chosen_spanish: vino
  alternatives_spanish:
  - entró
  - llegó
  - vino adentro
  lexicon: HALOT
  rationale: El hebreo simplemente expresa que Esaú vino/entró desde afuera. Dado que el contexto ya sugiere el movimiento desde el campo, «vino del campo» es suficiente en español y evita una redundancia artificial como «vino adentro».
- source_word: מִן הַשָּׂדֶה
  english_pob_choice: from the field
  chosen_spanish: del campo
  alternatives_spanish:
  - del campo abierto
  - de la llanura
  - del campo de labor
  lexicon: HALOT
  rationale: שָׂדֶה se traduce de forma directa y concreta como «campo». Mantener «del campo» preserva la imagen narrativa sin ampliar el texto más allá de la evidencia léxica.
- source_word: עָיֵף
  english_pob_choice: exhausted
  chosen_spanish: exhausto
  alternatives_spanish:
  - cansado
  - fatigado
  - agotado
  lexicon: HALOT
  rationale: עָיֵף expresa cansancio intenso. «Exhausto» comunica mejor la fuerza del término y conserva la intensidad narrativa que prepara la petición de Esaú en el versículo siguiente.
- source_word: וְהוּא
  english_pob_choice: and he was
  chosen_spanish: y estaba
  alternatives_spanish:
  - y era
  - mientras estaba
  - y se hallaba
  lexicon: HALOT
  rationale: La combinación pronominal con adjetivo forma una predicación simple. «Y estaba» reproduce bien la estructura hebrea y suena natural en español.
translation_notes:
  revision_awareness: 'El texto sigue de cerca el audit trail inglés y el hebreo: conserva la acción culinaria concreta de וַיָּזֶד, la imagen de campo de מִן הַשָּׂדֶה y el matiz intenso de עָיֵף, sin introducir ampliaciones doctrinales o estilísticas ajenas al versículo. No se documentan revisiones textuales relevantes en el paquete provisto.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como convención general del proyecto, pero este versículo no contiene el tetragrámaton.
  - Se usa «guiso» por ser transparente y contemporáneo; «potaje» queda como alternativa histórica reflejada en la nota.
  - No se introduce «Cristo», «Mesías» ni terminología doctrinal ajena al texto narrativo.
