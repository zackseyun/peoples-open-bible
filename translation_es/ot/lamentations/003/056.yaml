translation:
  language: es
  text: Has oído mi voz; no escondas tu oído[a] ante mi súplica por alivio, ante mi clamor por ayuda.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «no cierres tu oído a mi súplica por alivio, a mi clamor por ayuda». Las frases preposicionales hebreas son difíciles, y algunos traductores las entienden con valor de «a/para» en lugar de «de/ante».'
    reason: lexical_alternative
lexical_decisions:
- source_word: קוֹלִי
  english_pob_choice: my voice
  chosen_spanish: mi voz
  alternatives_spanish:
  - mi sonido
  lexicon: HALOT
  rationale: קוֹל suele significar «voz» o «sonido»; en una súplica directa, «mi voz» conserva el tono personal y es la equivalencia más natural en español.
- source_word: שָׁמָעְתָּ
  english_pob_choice: you heard
  chosen_spanish: has oído
  alternatives_spanish:
  - oíste
  - has escuchado
  lexicon: HALOT
  rationale: El perfecto hebreo expresa una acción ya realizada; en español, el pretérito perfecto «has oído» mantiene la relación con la súplica presente y suena natural en registro bíblico contemporáneo.
- source_word: אַל
  english_pob_choice: do not
  chosen_spanish: 'no'
  alternatives_spanish:
  - no quieras
  - que no
  lexicon: HALOT
  rationale: אַל introduce una petición negativa/prohibición; «no» seguido del imperativo es la forma más clara y directa en español.
- source_word: תַּעְלֵם
  english_pob_choice: hide
  chosen_spanish: ocultes
  alternatives_spanish:
  - cierres
  - ignores
  lexicon: HALOT
  rationale: El hifil de עלם implica ocultar/esconder; «ocultes» preserva la metáfora del texto sin diluirla en un sentido meramente psicológico como «ignores».
- source_word: אָזְנְךָ
  english_pob_choice: your ear
  chosen_spanish: tu oído
  alternatives_spanish:
  - tu oreja
  - tu escucha
  lexicon: HALOT
  rationale: «Oído» conserva la imagen hebrea de manera digna y comprensible en español. «Oreja» resulta demasiado física; «escucha» borra la metáfora del órgano.
- source_word: לְרַוְחָתִי
  english_pob_choice: for my plea for relief
  chosen_spanish: de mi clamor por alivio
  alternatives_spanish:
  - para mi alivio
  - de mi alivio
  lexicon: HALOT
  rationale: La expresión es difícil y la preposición con valor semántico no es totalmente transparente. Siguiendo la cautela del POB inglés, «clamor por alivio» comunica la idea de una súplica orientada a obtener alivio, sin forzar una lectura demasiado concreta.
- source_word: לְשַׁוְעָתִי
  english_pob_choice: my cry for help
  chosen_spanish: de mi clamor de ayuda
  alternatives_spanish:
  - de mi grito de auxilio
  - de mi clamor por socorro
  lexicon: HALOT
  rationale: שַׁוְעָה denota un clamor o grito de auxilio; «clamor de ayuda» es natural en español y mantiene el paralelismo con la segunda mitad del versículo.
theological_decisions:
- issue: Valor de las preposiciones en las dos frases finales
  english_pob_reading: do not hide your ear from my plea for relief, from my cry for help
  chosen_spanish_reading: no ocultes tu oído de mi clamor por alivio, de mi clamor de ayuda
  alternative_spanish_readings:
  - no ocultes tu oído a mi clamor por alivio, a mi clamor de ayuda
  - no cierres tu oído a mi clamor por alivio, a mi clamor de ayuda
  rationale: El hebreo permite una relación difícil de las preposiciones; el POB inglés conservó la ambigüedad y notó la posibilidad de entenderlas con valor de «to/for» en vez de «from». En español se mantiene la lectura principal con «de», que reproduce la negatividad de apartar el oído de la súplica, sin eliminar la tensión textual.
  doctrine_reference: Ninguna; decisión de sintaxis y semántica del hebreo poético.
translation_notes:
  revision_awareness: El texto inglés auditado fue revisado de «my relief» a «my plea for relief» para reflejar mejor la expresión hebrea. La versión española sigue esa revisión con «clamor por alivio», evitando la lectura demasiado literal de «alivio» como objeto directo y manteniendo la súplica implícita.
  spanish_consistency_notes:
  - Se conserva «Yahvé» como término por defecto cuando aparezca el nombre divino; aquí no aplica.
  - Se mantiene un registro bíblico moderno y digno, evitando arcaísmos innecesarios.
  - Se usa «oído» para preservar la metáfora corporal del hebreo.
  - Se traduce el paralelismo final con dos miembros cercanos para respetar la poesía del versículo.
