review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la secuencia y el sentido del griego: Esdras se levanta, sale del área del templo y va al aposento de Jona hijo de Naseib. También sigue correctamente la revisión auditada del inglés, que volvió a los nombres propios griegos en vez del paralelo hebreo. Sin embargo, «corte del templo» no es una opción natural ni clara en español e introduce una ambigüedad innecesaria que no está en el original.'
  spanish_quality_summary: El español es en general claro y digno, pero «la corte del templo» suena poco idiomático y puede sugerir una corte real o judicial. En este contexto arquitectónico-cultual, «atrio del templo» o «patio del templo» funciona mucho mejor. «Cámara» es aceptable, aunque «aposento» también sería natural; no exige cambio. La nota actual intenta rescatar «corte», pero el problema debe resolverse en el texto principal, no solo en nota.
  glossary_alignment: 'No hay conflictos con la terminología teológica del proyecto. Los nombres propios se alinean correctamente con el griego principal: «Jona, hijo de Naseib». La decisión léxica que requiere ajuste es αὐλή: en español bíblico legible conviene «atrio» más que «corte».'
  issues:
  - severity: medium
    issue: «corte del templo» es poco natural y potencialmente engañoso en español
    rationale: Aunque αὐλή puede equivaler a 'court' en inglés, en español «corte» suele entenderse como corte real o judicial. En un contexto de templo, «atrio» o «patio» transmite mejor el sentido espacial del griego sin necesidad de nota aclaratoria.
  revised_spanish_text: Entonces Esdras se levantó del atrio del templo y fue a la cámara de Jona, hijo de Naseib.
  revision_rationale: Se reemplaza «corte» por «atrio» para reflejar de forma más natural y precisa αὐλή en contexto del templo. El resto del versículo se conserva porque está bien alineado con el griego y con la auditoría inglesa, incluidos los nombres Jona y Naseib.
