translation:
  language: es
  text: Desde el día en que saqué a mi pueblo de la tierra de Egipto[a], no he escogido una ciudad de entre cualquiera de las tribus de Israel para edificar una casa[b] para que mi nombre estuviera allí, ni he escogido un hombre para que fuera gobernante[c] sobre mi pueblo Israel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Desde el día en que saqué a mi pueblo de la tierra de Egipto, no escogí...». El hebreo permite un pasado simple; el presente perfecto en español conserva mejor la continuidad desde ese momento inicial.'
    reason: alternative_reading
  - marker: b
    text: «Casa» traduce literalmente el hebreo בַּיִת y alude al templo sin reemplazarlo por un término más interpretativo.
    reason: lexical_alternative
  - marker: c
    text: 'O: «líder» o «príncipe» para «gobernante».'
    reason: lexical_alternative
lexical_decisions:
- source_word: מִן הַיּוֹם אֲשֶׁר
  english_pob_choice: From the day that
  chosen_spanish: Desde el día en que
  alternatives_spanish:
  - Desde el tiempo en que
  - Desde el día que
  lexicon: HALOT
  rationale: La expresión hebrea marca un punto de partida temporal que sigue teniendo alcance en las acciones negadas. «Desde el día en que» es natural en español y conserva bien ese valor de inicio continuo.
- source_word: הוֹצֵאתִי
  english_pob_choice: I brought ... out
  chosen_spanish: saqué ... de
  alternatives_spanish:
  - hice salir ... de
  - llevé ... fuera de
  lexicon: HALOT
  rationale: El hifil de יצא expresa hacer salir. En español, «saqué» comunica con claridad la acción del éxodo sin perder el sentido causativo.
- source_word: עַמִּי
  english_pob_choice: my people
  chosen_spanish: mi pueblo
  alternatives_spanish:
  - mi gente
  - mi pueblo, es decir, mi gente
  lexicon: HALOT
  rationale: «Mi pueblo» refleja el lenguaje de pacto del hebreo y coincide con la formulación de la POB en inglés.
- source_word: מֵאֶרֶץ מִצְרַיִם
  english_pob_choice: out of the land of Egypt
  chosen_spanish: de la tierra de Egipto
  alternatives_spanish:
  - fuera de la tierra de Egipto
  - de la tierra de Egipto, Egipto
  lexicon: HALOT
  rationale: Con «saqué», el complemento en español fluye de forma natural como «de la tierra de Egipto». Mantiene la expresión geográfica formal sin añadir interpretaciones.
- source_word: לֹא בָחַרְתִּי
  english_pob_choice: I have not chosen
  chosen_spanish: no he escogido
  alternatives_spanish:
  - no escogí
  - no elegí
  lexicon: HALOT
  rationale: El perfecto hebreo, enmarcado por «desde el día en que», sugiere una negación con continuidad hasta el presente. «No he escogido» reproduce bien ese valor, siguiendo la lectura de la POB inglesa.
- source_word: בְעִיר
  english_pob_choice: a city
  chosen_spanish: una ciudad
  alternatives_spanish:
  - una ciudad entre
  - una ciudad de
  lexicon: HALOT
  rationale: Con בחר, el valor es el objeto elegido; en español conviene expresar directamente «escogido una ciudad» y no mantener la preposición de forma rígida.
- source_word: מִכֹּל שִׁבְטֵי יִשְׂרָאֵל
  english_pob_choice: from any of the tribes of Israel
  chosen_spanish: de entre ninguna de las tribus de Israel
  alternatives_spanish:
  - de entre todas las tribus de Israel
  - de ninguna de las tribus de Israel
  lexicon: HALOT
  rationale: En la negación, la fuerza distributiva se expresa mejor con «de entre ninguna de...», equivalente funcional de «from any of». Evita la ambigüedad de una lectura meramente colectiva.
- source_word: לִבְנוֹת בַּיִת
  english_pob_choice: to build a house
  chosen_spanish: para edificar una casa
  alternatives_spanish:
  - para construir una casa
  - para edificar un templo
  lexicon: HALOT
  rationale: «Casa» conserva el término literal del hebreo y su resonancia teológica; «edificar» corresponde bien al registro bíblico y evita reducirlo prematuramente a «templo».
- source_word: לִהְיוֹת שְׁמִי שָׁם
  english_pob_choice: for my name to be there
  chosen_spanish: para que allí estuviera mi nombre
  alternatives_spanish:
  - para que mi nombre estuviera allí
  - para que allí habitara mi nombre
  lexicon: HALOT
  rationale: El hebreo habla literalmente de que el nombre esté allí. «Para que allí estuviera mi nombre» preserva esa formulación y su teología de la presencia del nombre sin introducir «habitar».
- source_word: וְלֹא בָחַרְתִּי בְאִישׁ
  english_pob_choice: nor have I chosen a man
  chosen_spanish: ni he escogido un hombre
  alternatives_spanish:
  - ni he escogido a un hombre
  - ni he escogido a nadie
  lexicon: HALOT
  rationale: אִישׁ es masculino singular; «un hombre» respeta esa forma y mantiene la referencia histórica concreta. «Ni» expresa con naturalidad la negación paralela.
- source_word: נָגִיד
  english_pob_choice: ruler
  chosen_spanish: gobernante
  alternatives_spanish:
  - líder
  - príncipe
  - ruler
  lexicon: HALOT
  rationale: «Gobernante» comunica la idea de autoridad establecida por encima del pueblo. En español resulta claro y evita las connotaciones arcaicas o ambiguas de «príncipe».
- source_word: עַל עַמִּי יִשְׂרָאֵל
  english_pob_choice: over my people Israel
  chosen_spanish: sobre mi pueblo Israel
  alternatives_spanish:
  - sobre Israel, mi pueblo
  - encima de mi pueblo Israel
  lexicon: HALOT
  rationale: «Sobre» expresa correctamente la relación de autoridad. Se conserva la frase de pacto «mi pueblo Israel» en un orden natural para el español.
theological_decisions:
- issue: Lenguaje del nombre divino y de la presencia en el santuario
  english_pob_reading: Retain 'house' and 'for my name to be there' rather than interpretive expansions such as 'temple' or 'for my presence to dwell there.'
  chosen_spanish_reading: Mantener «casa» y «para que allí estuviera mi nombre» en vez de expandirlo a «templo» o a una paráfrasis sobre la presencia divina.
  alternative_spanish_readings:
  - para edificar un templo para que allí morara mi presencia
  - para construir una casa para que mi nombre habitara allí
  rationale: El hebreo usa בַּיִת («casa») y la fórmula del nombre, no una ampliación interpretativa. La redacción española conserva esas categorías para no resolver de antemano la teología del lugar santo.
  doctrine_reference: Translation philosophy §§1, 3, 6
- issue: Valor temporal del perfecto hebreo en una negación que se extiende desde el éxodo
  english_pob_reading: The Hebrew perfects can be rendered with simple past, but the English present perfect better conveys the continuing force from that past point.
  chosen_spanish_reading: 'Usar presente perfecto: «no he escogido», porque en español también puede expresar una acción negada que se extiende desde un punto pasado hasta el presente.'
  alternative_spanish_readings:
  - no escogí
  - no elegí
  rationale: La elección del perfecto ayuda a reflejar la fuerza continua del marco temporal introducido por «desde el día en que», sin perder naturalidad en español.
  doctrine_reference: Translation philosophy §§2, 5
- issue: Conservación del masculino singular אִישׁ
  english_pob_reading: Render אִישׁ as 'a man.'
  chosen_spanish_reading: Traducir אִישׁ como «un hombre».
  alternative_spanish_readings:
  - una persona
  - alguien
  rationale: El hebreo es masculino singular y el pasaje alude a un individuo concreto para gobernar. Mantener «un hombre» preserva la forma y evita neutralizar indebidamente el referente.
  doctrine_reference: Translation philosophy §4
translation_notes:
  revision_awareness: 'Coincide con el audit trail inglés en la evaluación más reciente: no se registraron revisiones aplicadas y el verificador señaló alto acuerdo. La redacción española sigue las mismas decisiones principales: perfecto con valor continuo, conservación de «casa», fórmula del nombre, y masculino singular para אִישׁ.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma del proyecto cuando el texto no usa el Tetragrámaton explícitamente; aquí el versículo no lo contiene, así que no aparece.
  - Se conserva «mi pueblo Israel» como frase de pacto, evitando reformularla como «mi pueblo, Israel» para no dividir innecesariamente la construcción.
  - «Gobernante» se usa como equivalente moderno y claro de נָגִיד, siguiendo la preferencia del proyecto por evitar tradicionalismos ambiguos cuando el texto pide una función de autoridad.
