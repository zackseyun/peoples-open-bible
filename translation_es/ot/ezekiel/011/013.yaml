    text: Or, 'are you making a complete end of the remnant of Israel?' The Hebrew can be read with present or imminent force.
    reason: alternative_reading
  - marker: b
    text: Hebrew 'Lord GOD' represents אֲדֹנָי יְהוִה, literally 'Lord YHWH.'
    reason: lexical_alternative
