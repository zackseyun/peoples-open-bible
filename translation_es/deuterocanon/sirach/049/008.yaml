review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español sigue bien el hebreo breve: וחזקאל = Ezequiel, ראה = vio, מראה = visión, ויגד = describió, זני = clases/tipos, מרכבה = carro. También conserva correctamente en nota la expansión griega sobre la visión de gloria y los querubines. Sin embargo, ''una visión'' suena algo redundante tras ''vio'' y resulta menos natural en español que ''una visión'' con verbo más marcado o, mejor, ''tuvo una visión''; pero aquí debe preservarse el valor de ראה. Un ajuste menor mejora la naturalidad sin apartarse del original.'
  spanish_quality_summary: 'La frase es clara y fiel, pero ''vio una visión'' es algo pesada en español. ''Contempló una visión'' sería demasiado interpretativo; por eso conviene mantener ''vio'' y aceptar la literalidad, aunque la nota y el conjunto quedarían mejor con una leve mejora estilística en la nota: ''que se le mostró'' suena más natural que ''que le fue mostrada''. Además, ''quien vio'' en la cita griega es correcto pero algo menos natural que ''el que vio''.'
  glossary_alignment: No hay términos del glosario mayor en juego salvo mantener 'querubines' y evitar expandir a 'gloria' o 'carro de querubines' en el texto principal. 'Carro' alinea bien con מרכבה y con la decisión inglesa de no importar 'carro-trono'.
  issues:
  - severity: low
    issue: Ligera aspereza idiomática en 'vio una visión'
    rationale: Es una reproducción muy cercana del hebreo y del inglés POB, pero en español suena redundante. Aun así, no amerita una reescritura amplia; puede mantenerse por fidelidad.
  - severity: low
    issue: Redacción de la nota mejorable
    rationale: En la nota, 'quien vio' y 'le fue mostrada' son comprensibles, pero 'el que vio' y 'se le mostró' suenan más naturales en español eclesial contemporáneo sin cambiar el sentido.
  revised_spanish_text: Ezequiel vio una visión[a], y describió las clases del carro.
  revised_footnotes:
  - marker: a
    text: 'Griego: “Ezequiel, el que vio una visión de gloria que se le mostró sobre un carro de querubines”. El hebreo es más breve y quizá preserve una redacción comprimida o incierta en “las clases del carro”.'
    reason: alternative_reading
  revision_rationale: El texto principal puede conservarse tal como está porque refleja fielmente el hebreo y el razonamiento documentado del POB. Solo se pule la nota para un español más natural y fluido, sin alterar su función ni su contenido.
