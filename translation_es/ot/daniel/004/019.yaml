revisions:
- from: Tú eres el rey[a], que has crecido y te has fortalecido; tu grandeza ha crecido y ha llegado hasta el cielo, y tu dominio hasta el fin de la tierra.
  to: Tú eres el rey, que te has engrandecido y te has hecho fuerte; tu grandeza ha crecido y ha llegado hasta el cielo, y tu dominio hasta el fin de la tierra[a].
  rationale: Se ajusta la primera cláusula para reflejar mejor el sentido de engrandecimiento real de רְבַית y el aumento de fuerza de וּתְקֵפְתְּ en un español más idiomático y menos físico. También se reubica la nota al sintagma pertinente al final del verso, donde pertenece la alternativa léxica.
