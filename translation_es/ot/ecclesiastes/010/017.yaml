    issue: 'Apertura española algo calcada: «¡Feliz eres tú, oh tierra!»'
    rationale: Aunque fiel, suena menos natural en español bíblico moderno que «Dichosa tú, oh tierra» o «Bienaventurada tú, oh tierra». La revisión mejora la legibilidad sin alterar el sentido.
  - severity: medium
    issue: La nota b repite el texto principal como si fuera alternativa
    rationale: 'Si el texto principal dice «hijo de nobles», esa misma frase no debe presentarse en la nota como alternativa. Debe invertirse: el texto principal puede conservar la forma literal y la nota ofrecer «de noble linaje», o viceversa.'
  - severity: low
    issue: Orden de marcadores en el texto español no refleja claramente el punto anotado
    rationale: En el inglés, los marcadores múltiples aparecen sobre la frase pertinente. En español es más limpio anclar [b] a «hijo de nobles» y [c] a «a su debido tiempo».
  revised_spanish_text: Dichosa tú[a], oh tierra, cuando tu rey es hijo de nobles[b], y tus príncipes comen a su debido tiempo[c], para fuerza y no para embriaguez.
