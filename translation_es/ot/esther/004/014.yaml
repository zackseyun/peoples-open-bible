revisions:
- from: Porque si callas en este tiempo[a], alivio y liberación surgirán para los judíos de otro lugar; pero tú y la casa de tu padre perecerán. ¿Y quién sabe si has llegado al reino[b] para un tiempo como este?
  to: Porque si callas en este tiempo, alivio y liberación surgirán para los judíos de otro lugar; pero tú y la casa de tu padre perecerán. ¿Y quién sabe si has llegado a la realeza[a] para un tiempo como este?
  rationale: Se corrigió «al reino» a «a la realeza» para reflejar mejor לַמַּלְכוּת como estatus u oficio real, en línea con el expediente auditado y el contexto de Ester. También se reubicó la nota al segmento correcto de la frase final y se eliminó la nota que defendía una lectura menos fiel. Se añadió una coma para mejorar la fluidez en español.
