revisions:
- from: En cuanto al pueblo[a], lo trasladó a las ciudades, desde un extremo de la tierra de Egipto hasta el otro.
  to: En cuanto al pueblo[a], lo trasladó a las ciudades, desde un extremo del territorio de Egipto hasta el otro.
  rationale: Se ajusta 'tierra' a 'territorio' para reflejar mejor גְבוּל según la justificación léxica auditada, y se simplifica la nota para eliminar una alternativa redundante en español mientras se conserva la información interpretativa importante sobre la lectura de esclavización. El resto del texto es fiel, natural y no requiere adjudicación adicional.
