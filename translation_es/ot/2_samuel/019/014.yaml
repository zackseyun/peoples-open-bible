translation:
  language: es
  text: 'Y díganle a Amasa[a]: «¿No eres tú mi hueso y mi carne? Así me haga Dios, y aun más, si no serás comandante del ejército a mi servicio todos los días, en lugar de Joab».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «todos los días», un modismo para una permanencia o servicio continuo.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְלַעֲמָשָׂא תֹּמְרוּ
  english_pob_choice: And say to Amasa
  chosen_spanish: Y dirán a Amasa
  alternatives_spanish:
  - 'Y dirán a Amasa:'
  - Y le dirán a Amasa
  - Y hablen a Amasa
  lexicon: HALOT
  rationale: La forma con conjunción y el imperfecto de segunda plural funciona como instrucción dirigida a los mensajeros. «Dirán a Amasa» conserva el mandato sin volverlo demasiado literal ni perder naturalidad en español.
- source_word: הֲלוֹא
  english_pob_choice: Are you not
  chosen_spanish: ¿No eres tú
  alternatives_spanish:
  - ¿Acaso no eres tú
  - ¿No es verdad que eres tú
  lexicon: HALOT
  rationale: Se mantiene la pregunta retórica que espera afirmación. En español, «¿No eres tú...?» reproduce bien el tono de apelación personal.
- source_word: עַצְמִי וּבְשָׂרִי
  english_pob_choice: my bone and my flesh
  chosen_spanish: mi hueso y mi carne
  alternatives_spanish:
  - mi propio hueso y carne
  - mi pariente
  lexicon: HALOT
  rationale: Se conserva el idioma hebreo de parentesco en forma literal, porque tiene fuerza retórica y no conviene sustituirlo por una interpretación más abstracta como «pariente».
- source_word: כֹּה יַעֲשֶׂה לִּי אֱלֹהִים וְכֹה יוֹסִיף
  english_pob_choice: May God do so to me, and more also
  chosen_spanish: Así me haga Dios, y así añada más
  alternatives_spanish:
  - Así me haga Dios, y más también
  - Que Dios me haga así, y aun más
  lexicon: HALOT
  rationale: Es una fórmula de juramento. «Así me haga Dios, y así añada más» conserva el valor solemne sin explicar en exceso la maldición implícita. «Dios» se entiende en singular por el contexto idiomático.
- source_word: אִם לֹא
  english_pob_choice: if ... not
  chosen_spanish: si no
  alternatives_spanish:
  - a menos que
  - ciertamente no
  lexicon: HALOT
  rationale: En este contexto de juramento, la estructura se mantiene visible en español. «Si no» permite conservar la forma hebrea sin perder claridad.
- source_word: שַׂר צָבָא
  english_pob_choice: commander of the army
  chosen_spanish: comandante del ejército
  alternatives_spanish:
  - jefe del ejército
  - capitán del ejército
  lexicon: HALOT
  rationale: La expresión designa al principal líder militar. «Comandante del ejército» es formal, clara y fiel al rango.
- source_word: תִּהְיֶה לְפָנַי
  english_pob_choice: you are not commander of the army before me
  chosen_spanish: delante de mí
  alternatives_spanish:
  - en mi presencia
  - bajo mi autoridad
  lexicon: HALOT
  rationale: «Delante de mí» conserva el modismo hebreo de estar en presencia o servicio de alguien, y en este contexto comunica adecuadamente la subordinación y cercanía de función.
- source_word: כָּל הַיָּמִים
  english_pob_choice: all the days
  chosen_spanish: todos los días
  alternatives_spanish:
  - permanentemente
  - por todos los días
  lexicon: HALOT
  rationale: La expresión literal se mantiene para reflejar el hebreo y su sentido de duración continua. «Todos los días» es fiel y transparente en español.
- source_word: תַּחַת יוֹאָב
  english_pob_choice: in place of Joab
  chosen_spanish: en lugar de Joab
  alternatives_spanish:
  - en vez de Joab
  - sustituyendo a Joab
  lexicon: HALOT
  rationale: Aquí תַּחַת indica reemplazo, no subordinación. «En lugar de» comunica la sucesión con claridad natural.
theological_decisions:
- issue: El uso de אֱלֹהִים en la fórmula de juramento
  english_pob_reading: God
  chosen_spanish_reading: Dios
  alternative_spanish_readings:
  - dioses
  rationale: Aunque la forma hebrea es plural, el contexto exige entender una referencia singular al Dios de Israel dentro de la fórmula juramentaria. «Dios» mantiene la lectura contextual sin introducir ambigüedad doctrinal.
  doctrine_reference: Gramática y uso idiomático del AT; cf. juramentos formulaicos en textos narrativos hebreos.
translation_notes:
  revision_awareness: Se corrigió la ancla de nota al incluir [a] directamente en el nombre de Amasa, respetando la nota del hebreo «todos los días» como modismo de duración continua y evitando cualquier nota huérfana. La redacción principal sigue de cerca el texto hebreo y el juicio auditado del POB en inglés.
  spanish_consistency_notes:
  - Se mantuvo «Dios» en singular por el valor idiomático de אֱלֹהִים en juramentos.
  - Se conservó la imagen de parentesco «mi hueso y mi carne» por su fuerza retórica.
  - 'Se tradujo תַּחַת como reemplazo: «en lugar de», no como subordinación.'
  - Se usó «todos los días» para reflejar el modismo hebreo de duración continua.
