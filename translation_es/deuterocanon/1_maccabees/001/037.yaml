    issue: '''Profanaron'' no es el equivalente más literal de ἐμόλυναν.'
    rationale: El griego enfatiza contaminación/impureza cultual; sin embargo, en este contexto de sacrilegio contra un lugar santo, 'profanaron' comunica bien esa contaminación en español y resulta estilísticamente más fuerte y natural.
