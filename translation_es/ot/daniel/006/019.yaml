translation:
  language: es
  text: Entonces el rey fue a su palacio y pasó la noche ayunando; no llevaron ante él diversiones[a], y el sueño huyó de él.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «músicos» o «entretenimientos». El término arameo es incierto y puede referirse más específicamente a músicos o a otras diversiones.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אֱדַיִן
  english_pob_choice: Then
  chosen_spanish: Entonces
  alternatives_spanish:
  - Después
  - En seguida
  lexicon: HALOT
  rationale: Adverbio narrativo de secuencia; «Entonces» marca naturalmente el paso al siguiente acontecimiento en español sin añadir contenido.
- source_word: אֲזַל
  english_pob_choice: went
  chosen_spanish: fue
  alternatives_spanish:
  - se fue
  - partió
  lexicon: HALOT
  rationale: Verbo básico de movimiento. En este contexto, «fue» comunica con naturalidad que el rey regresó a su residencia.
- source_word: לְהֵיכְלֵהּ
  english_pob_choice: to his palace
  chosen_spanish: a su palacio
  alternatives_spanish:
  - a su residencia
  - a su palacio real
  lexicon: HALOT
  rationale: הֵיכַל puede ser palacio o templo; aquí el contexto de un rey que vuelve a dormir favorece «palacio».
- source_word: וּבָת טְוָת
  english_pob_choice: spent the night fasting
  chosen_spanish: pasó la noche ayunando
  alternatives_spanish:
  - pasó la noche en ayuno
  - permaneció la noche ayunando
  lexicon: HALOT
  rationale: La construcción adverbial se expresa con naturalidad en español como «pasó la noche ayunando», conservando el modo de la acción.
- source_word: וְדַחֲוָן
  english_pob_choice: diversions
  chosen_spanish: diversiones
  alternatives_spanish:
  - entretenimientos
  - músicos
  lexicon: HALOT
  rationale: Sigo la decisión revisada del POB inglés («diversions»). El término arameo es incierto; «diversiones» mantiene amplitud semántica sin fijar indebidamente una lectura específica.
- source_word: לָא הַנְעֵל קָדָמוֹהִי
  english_pob_choice: no diversions were brought before him
  chosen_spanish: no se le llevaron diversiones
  alternatives_spanish:
  - no se presentaron diversiones ante él
  - no le llevaron diversiones
  lexicon: HALOT
  rationale: La forma pasiva/eventiva del contexto se refleja con una construcción impersonal en español. «Se le llevaron» mantiene la idea de que no fueron introducidas ante la presencia del rey.
- source_word: וְשִׁנְתֵּהּ נַדַּת עֲלוהִי
  english_pob_choice: and sleep fled from him
  chosen_spanish: y el sueño huyó de él
  alternatives_spanish:
  - y el sueño se apartó de él
  - y no pudo dormir
  lexicon: HALOT
  rationale: Conservo la personificación del arameo y la imagen del POB inglés. «Sueño» funciona naturalmente como sujeto en español.
theological_decisions:
- issue: El significado de הֵיכַל en contexto
  english_pob_reading: to his palace
  chosen_spanish_reading: a su palacio
  alternative_spanish_readings:
  - a su templo
  - a su sala
  rationale: No hay una carga teológica especial aquí, pero la decisión evita leer «templo» sin apoyo contextual, dado que el sujeto es un rey volviendo a su residencia.
  doctrine_reference: Contexto histórico-literario
- issue: La ambigüedad de וְדַחֲוָן
  english_pob_reading: no diversions were brought before him
  chosen_spanish_reading: no se le llevaron diversiones
  alternative_spanish_readings:
  - no se le llevaron músicos
  - no se le llevaron entretenimientos
  rationale: El arameo es incierto y el POB inglés preserva esa incertidumbre con «diversions». La traducción española mantiene la amplitud para no cerrar indebidamente el sentido.
  doctrine_reference: Crítica textual / semántica léxica
translation_notes:
  revision_awareness: La redacción sigue la revisión más reciente del POB inglés, que sustituyó «entertainment» por «diversions» para captar mejor la amplitud del término arameo y mantener un registro más formal. La versión española refleja esa misma decisión, evitando especificar más de lo que el original permite.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma general en el proyecto, pero este versículo no contiene el nombre divino.
  - «Diversiones» conserva la incertidumbre léxica del arameo y evita el giro demasiado concreto «músicos» salvo en nota.
  - La estructura verbal en español busca ser natural sin perder la imagen personificada del sueño que huye.
