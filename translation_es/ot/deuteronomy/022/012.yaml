translation:
  language: es
  text: Harás borlas[a] para ti en las cuatro esquinas de tu cobertor[b] con el que te cubres.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'cordones trenzados' o 'franjas' para 'borlas'.
    reason: lexical_alternative
  - marker: b
    text: Hebreo 'tu cobertura'; alternativamente, 'tu vestidura', 'tu manto' o 'tu prenda'.
    reason: lexical_alternative
lexical_decisions:
- source_word: גְּדִלִים
  english_pob_choice: tassels
  chosen_spanish: borlas
  alternatives_spanish:
  - tassels
  - franjas
  - cordones trenzados
  lexicon: HALOT
  rationale: El término hebreo designa adornos colgantes prescritos para la prenda. En español, 'borlas' comunica con naturalidad la idea de un adorno colgante, aunque 'franjas' y 'cordones trenzados' reflejan otras posibilidades léxicas. Se evita 'tassels' por ser anglicismo innecesario.
- source_word: תַּעֲשֶׂה
  english_pob_choice: you shall make
  chosen_spanish: Harás
  alternatives_spanish:
  - Debes hacer
  - Harás para ti
  lexicon: HALOT
  rationale: La forma qal imperfecto en contexto legal funciona como mandato. 'Harás' preserva la fuerza injuntiva de manera natural en español; la idea de beneficio personal queda expresada en 'para ti'.
- source_word: לָּךְ
  english_pob_choice: for yourself
  chosen_spanish: para ti
  alternatives_spanish:
  - para usted
  - por tu cuenta
  lexicon: HALOT
  rationale: El sufijo pronominal marca interés personal. 'Para ti' transmite de manera directa y sobria la orientación al destinatario sin sobreinterpretar la construcción.
- source_word: אַרְבַּע כַּנְפוֹת
  english_pob_choice: the four corners
  chosen_spanish: las cuatro esquinas
  alternatives_spanish:
  - los cuatro bordes
  - las cuatro puntas
  lexicon: HALOT
  rationale: En contexto de vestimenta, כָּנָף se refiere a las extremidades o esquinas de la tela. 'Esquinas' es la equivalencia española más clara y natural.
- source_word: כְּסוּתְךָ
  english_pob_choice: your covering
  chosen_spanish: tu cobertura
  alternatives_spanish:
  - tu vestidura
  - tu manto
  - tu prenda
  lexicon: HALOT
  rationale: La POB inglesa conserva la amplitud semántica de 'covering'. 'Cobertura' mantiene esa amplitud y evita restringir innecesariamente a 'manto' o 'vestidura', aunque 'prenda' sería más idiomático pero menos literal.
- source_word: אֲשֶׁר תְּכַסֶּה בָּהּ
  english_pob_choice: with which you cover yourself
  chosen_spanish: con la que te cubres
  alternatives_spanish:
  - con la que te vistes
  - en la que te envuelves
  lexicon: HALOT
  rationale: Se conserva la relación verbal entre כְּסוּת y כסה mediante 'cubres'. La opción mantiene la referencia funcional del objeto sin especificar más de lo que el hebreo dice.
translation_notes:
  revision_awareness: El pasaje presenta alto acuerdo en la revisión más reciente y no requiere cambios sustantivos. La redacción española mantiene el paralelismo del hebreo y la ambigüedad controlada de כְּסוּתְךָ sin forzar una prenda concreta.
  spanish_consistency_notes:
  - Se evitó 'Señor' o fórmulas litúrgicas porque el verso no las contiene.
  - Se mantuvo el valor injuntivo futuro en español, acorde con la forma legal del hebreo.
  - '''Cobertura'' conserva la amplitud semántica de כְּסוּת, aunque en uso común podría entenderse como ''prenda'' o ''manto''.'
