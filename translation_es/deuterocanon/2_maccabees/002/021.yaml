lexical_decisions:
- source_word: Οἱ δὲ
  english_pob_choice: And
  chosen_spanish: Y
  alternatives_spanish:
  - Ahora bien
  - Pero
  lexicon: LSJ
  rationale: δέ funciona aquí como un conector narrativo suave; en español, «Y» conserva la continuidad del relato sin introducir una oposición más fuerte de la que el griego exige.
- source_word: ἱερεῖς
  english_pob_choice: the priests
  chosen_spanish: los sacerdotes
  alternatives_spanish:
  - sacerdotes
  lexicon: LSJ
  rationale: El artículo definido está presente en griego y se refleja naturalmente con «los sacerdotes» para un grupo identificable en la escena.
- source_word: ἐπέαλλον
  english_pob_choice: were singing
  chosen_spanish: cantaban
  alternatives_spanish:
  - estaban cantando
  - entonaban
  lexicon: LSJ
  rationale: El imperfecto expresa acción շարունակada. «Cantaban» transmite esa duración de forma natural en español y mantiene el sentido litúrgico del verbo sin sobrecargar la frase.
- source_word: τοὺς ὕμνους
  english_pob_choice: the hymns
  chosen_spanish: los himnos
  alternatives_spanish:
  - los cantos de alabanza
  - los salmos
  lexicon: LSJ
  rationale: ὕμνοι designa himnos o cantos de alabanza; «los himnos» conserva el sustantivo concreto y el artículo, en línea con el texto griego.
translation_notes:
  revision_awareness: La revisión inglesa pasó de «were chanting» a «were singing» por naturalidad; la versión española sigue esa decisión semántica, pero conserva el valor aspectual del imperfecto con «cantaban», que comunica acción continua de manera idiomática.
  spanish_consistency_notes:
  - Se mantiene «sacerdotes» para ἱερεῖς, siguiendo el referente cultual del pasaje.
  - «Himnos» refleja el término griego ὕμνους sin sustituirlo por una paráfrasis más amplia.
  - El uso de «Y» respeta el conector narrativo débil de δέ.
