revisions:
- from: Además del holocausto del mes y su ofrenda vegetal[a], y del holocausto regular y su ofrenda vegetal, y de sus libaciones, conforme a su norma, como aroma agradable[b], ofrenda que se quema para Yahvé.
  to: Además del holocausto del mes[b] y su ofrenda vegetal, y del holocausto regular y su ofrenda vegetal, y de sus libaciones, conforme a su ordenanza, como aroma agradable, una ofrenda de alimento[a] para Yahvé.
  rationale: Se corrigen las notas para que coincidan con el rastro auditado y con sus anclajes en el texto. Se reemplaza 'ofrenda que se quema' por 'ofrenda de alimento' para reflejar la decisión POB sobre אִשֶּׁה y se preserva la alternativa tradicional en nota. Se ajusta 'norma' a 'ordenanza' por mayor precisión cultual. El resto del borrador se mantiene por ser fiel, claro y bien alineado con la terminología del proyecto.
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T21:48:44Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien la estructura del hebreo: adición de sacrificios previos, holocausto del mes, su ofrenda, holocausto regular, su ofrenda, libaciones, prescripción ritual, fórmula de aroma y dedicación a Yahvé. Sin embargo, invierte las notas del rastro inglés: la nota [a] en inglés corresponde a אִשֶּׁה (''food offering'' / ''offering by fire''), mientras que la nota sobre ''del mes'' corresponde a [b]. Además, ''ofrenda que se quema'' debilita el tecnicismo cultual de אִשֶּׁה frente al inglés auditado.'
  spanish_quality_summary: 'El español es claro y legible, pero requiere pequeños ajustes de precisión y de estilo cultual. ''Conforme a su norma'' suena menos formal que el contexto ritual; ''conforme a su ordenanza'' o similar encaja mejor. ''Ofrenda que se quema'' es comprensible, pero algo perifrástica; ''ofrenda de alimento'' refleja mejor la decisión POB auditada, y la alternativa tradicional debe preservarse en nota. También conviene alinear el régimen preposicional final con el dativo hebreo: ''para Yahvé'' es aceptable.'
  glossary_alignment: 'Se alinea bien con ''Yahvé''. ''Holocausto'', ''ofrenda vegetal'' y ''libaciones'' son adecuados. La principal desalineación es אִשֶּׁה: el proyecto auditó ''food offering'' con nota tradicional; en español conviene mantener ''ofrenda de alimento'' y trasladar la alternativa ''ofrenda por fuego / ofrenda ígnea'' a nota. También deben corregirse los marcadores de notas para corresponder a las decisiones documentadas.'
  issues:
  - severity: high
    issue: Los marcadores y contenidos de las notas [a] y [b] no corresponden al rastro auditado.
    rationale: En el inglés POB, [a] anota אִשֶּׁה con la alternativa tradicional 'offering by fire', mientras [b] aclara 'the burnt offering of the month'. El español puso [a] en 'ofrenda vegetal' con la nota del mes, y [b] en 'aroma agradable' con una nota nueva no auditada.
  - severity: medium
    issue: '''Ofrenda que se quema'' no refleja con suficiente fidelidad la decisión léxica auditada para אִשֶּׁה.'
    rationale: El inglés eligió 'a food offering' como término técnico moderno, preservando en nota la opción tradicional. La perífrasis española describe el proceso, pero pierde el carácter terminológico y no conserva la alternativa documentada.
  - severity: low
    issue: '''Conforme a su norma'' suena algo débil para כְּמִשְׁפָּטָם en contexto cultual.'
    rationale: El hebreo apunta a prescripción/ordenanza ritual. 'Ordenanza' conserva mejor la formalidad cultual y armoniza con la decisión inglesa 'ordinance'.
  revised_spanish_text: Además del holocausto del mes[b] y su ofrenda vegetal, y del holocausto regular y su ofrenda vegetal, y de sus libaciones, conforme a su ordenanza, como aroma agradable, una ofrenda de alimento[a] para Yahvé.
  revised_footnotes:
