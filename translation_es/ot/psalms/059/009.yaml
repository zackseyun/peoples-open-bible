  text: Pero tú, Yahvé, te ríes de ellos[a]; te burlas de todas las naciones.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Y tú, Yahvé, te ríes de ellos; escarneces a todas las naciones» o «Pero tú, Yahvé, te ríes de ellos; te mofas de todas las naciones».'
