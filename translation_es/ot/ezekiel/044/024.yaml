revisions:
- from: En un pleito[a], ellos se pondrán de pie para juzgar; lo juzgarán conforme a mis juicios. Guardarán mis leyes y mis estatutos en todos mis tiempos señalados[b], y santificarán mis sábados.
  to: En un pleito[a], ellos estarán de pie para juzgar; lo juzgarán conforme a mis juicios. Guardarán mis leyes y mis estatutos en todos mis tiempos señalados[b], y santificarán mis sábados.
  rationale: 'Se hizo una reparación mínima: «estarán de pie» refleja mejor la imagen judicial de יַעַמְדוּ que «se pondrán de pie», sin perder literalidad. Se conservaron las demás decisiones clave —«pleito», «juicios», «leyes», «estatutos», «tiempos señalados», «sábados»— por su buena alineación con el hebreo y con la auditoría inglesa. Se pulió además la nota b para un español más natural.'
