translation:
  language: es
  text: En mi angustia invoco a Yahvé[a]; invoco a mi Dios. Él oye mi voz desde su templo[b], y mi clamor por ayuda llega a sus oídos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'También puede traducirse: «oyó»; la forma verbal hebrea es narrativa pasada.'
    reason: alternative_reading
  - marker: b
    text: «Templo» también puede entenderse como «palacio» o «santuario», aludiendo a la morada celestial de Dios.
    reason: lexical_alternative
lexical_decisions:
- source_word: בַּצַּר
  english_pob_choice: In my distress
  chosen_spanish: En mi angustia
  alternatives_spanish:
  - En mi aflicción
  - En mi apuro
  - En mi tribulación
  lexicon: HALOT
  rationale: צַר en esta construcción expresa una situación de opresión, estrechez o angustia. 'Angustia' comunica bien el estado de apremio en español y conserva la fuerza situacional del hebreo sin sobredramatizarlo.
- source_word: אֶקְרָא
  english_pob_choice: I call on / I call to
  chosen_spanish: invoco
  alternatives_spanish:
  - llamo a
  - clamo a
  - invoco a
  lexicon: HALOT
  rationale: El verbo קרא puede significar llamar, clamar o invocar. Dado que el contexto es dirigirse a Dios en súplica, 'invoco' resulta natural y digno en español, y preserva el acto de llamada reverente del original.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  lexicon: HALOT
  rationale: Se conserva el nombre divino del Tetragrámaton como 'Yahvé', conforme al criterio POB para el nombre propio de Dios y no como sustitución por un título.
- source_word: אֱלֹהַי
  english_pob_choice: my God
  chosen_spanish: mi Dios
  alternatives_spanish:
  - mi Dios
  - Dios mío
  lexicon: HALOT
  rationale: La forma con sufijo de primera persona singular se traduce de modo directo como 'mi Dios'. Se evita 'Dios mío' porque en español puede sonar más exclamativo que posesivo en este contexto.
- source_word: וַיִּשְׁמַע
  english_pob_choice: He hears
  chosen_spanish: oye
  alternatives_spanish:
  - oyó
  - escucha
  lexicon: HALOT
  rationale: 'Aunque la forma narrativa es pasado, el español poético fluye mejor en presente gnómico: ''oye''. Mantiene la vividez de la respuesta divina y sigue la opción inglesa de presente estilístico.'
- source_word: מֵהֵיכָלוֹ
  english_pob_choice: from his temple
  chosen_spanish: desde su templo
  alternatives_spanish:
  - desde su palacio
  - desde su santuario
  lexicon: HALOT
  rationale: הֵיכָל puede significar palacio, templo o santuario. Aquí 'templo' es la equivalencia más natural en español bíblico y conserva la resonancia cultual del contexto, sin excluir la posible connotación de morada celestial.
- source_word: קוֹלִי
  english_pob_choice: my voice
  chosen_spanish: mi voz
  alternatives_spanish:
  - la voz mía
  - el sonido de mi voz
  lexicon: HALOT
  rationale: קוֹל con sufijo de primera persona singular se vierte directamente como 'mi voz', la opción más transparente y natural en español.
- source_word: שַׁוְעָתִי
  english_pob_choice: my cry for help
  chosen_spanish: mi clamor por ayuda
  alternatives_spanish:
  - mi grito de auxilio
  - mi súplica de ayuda
  - mi clamor
  lexicon: HALOT
  rationale: שַׁוְעָה denota un clamor o grito de auxilio en necesidad. 'Clamor por ayuda' explicita el componente implícito de petición sin alejarse del campo semántico del hebreo.
- source_word: בְּאָזְנָיו
  english_pob_choice: reaches his ears
  chosen_spanish: llega a sus oídos
  alternatives_spanish:
  - entra en sus oídos
  - es oído por él
  lexicon: HALOT
  rationale: El hebreo expresa literalmente 'en sus oídos', un modismo para ser escuchado. 'Llega a sus oídos' reproduce bien la imagen idiomática en español sin perder claridad.
theological_decisions:
- issue: Traducción del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  rationale: Se mantiene el nombre propio divino en vez de una sustitución por 'el Señor' o un equivalente litúrgico. Esto conserva la transparencia del texto fuente y la intención doctrinal de distinguir el nombre de Yahvé de un título.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה / YHWH → Yahvé'
- issue: Sentido de הֵיכָל aplicado a Dios
  english_pob_reading: temple
  chosen_spanish_reading: templo
  alternative_spanish_readings:
  - palacio
  - santuario
  rationale: '''Templo'' conserva la tradición bíblica y la lectura cultual del término, a la vez que permite la posible referencia a la morada celestial de Dios. No se neutraliza la ambigüedad porque el contexto poético la permite.'
  doctrine_reference: HALOT / uso bíblico de הֵיכָל
- issue: Tiempo verbal de וַיִּשְׁמַע
  english_pob_reading: He hears
  chosen_spanish_reading: oye
  alternative_spanish_readings:
  - oyó
  - escucha
  rationale: La forma hebrea es narrativamente pasada, pero el presente en español funciona como presente poético o gnómico. Se conserva así la vivacidad de la respuesta de Dios sin imponer una secuencia temporal rígida.
  doctrine_reference: 'POB audit trail: formal past-tense rendering acknowledged, but poetic present retained'
translation_notes:
  revision_awareness: La versión inglesa más reciente no introdujo cambios sustantivos tras la revisión; se conservan las decisiones auditadas sobre el nombre divino, el valor de הֵיכָל y el presente poético para וַיִּשְׁמע.
  spanish_consistency_notes:
  - Se mantiene Yahvé para YHWH conforme al estándar del proyecto.
  - Se evita 'Señor' como sustituto del nombre divino.
  - Se usa 'mi Dios' con posesivo directo para אֱלֹהַי.
  - El par 'invoco / invoco' conserva la repetición del hebreo sin forzar variación innecesaria.
  - '''Templo'' se conserva por su valor cultual y su aceptabilidad en español bíblico.'
