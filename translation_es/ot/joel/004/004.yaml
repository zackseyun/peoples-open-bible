translation:
  language: es
  text: Y también[a], ¿qué son ustedes para mí, Tiro y Sidón, y todas las regiones[b] de Filistea? ¿Me están retribuyendo? Y si me están retribuyendo, con rapidez y prontitud haré volver su retribución sobre su propia cabeza.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «¿Qué tienen ustedes que ver conmigo?». El modismo hebreo es un desafío confrontativo.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «distritos» o «territorios» de Filistea.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְגַם מָה אַתֶּם לִי
  english_pob_choice: And also, what are you to me
  chosen_spanish: Y también, ¿qué sois para mí
  alternatives_spanish:
  - Y también, ¿qué tenéis que ver conmigo?
  - ¿Qué sois para mí?
  lexicon: HALOT
  rationale: La expresión hebrea es un desafío confrontativo. «¿Qué sois para mí?» conserva mejor la forma y la tensión retórica que una paráfrasis más idiomática; «Y también» refleja el valor enfático de וְגַם.
- source_word: צֹר וְצִידוֹן
  english_pob_choice: Tyre and Sidon
  chosen_spanish: Tiro y Sidón
  alternatives_spanish:
  - Tiro y Sidón
  lexicon: Transliteración estándar
  rationale: Se mantienen los nombres propios tradicionales en español, que son transparentes y reconocibles, sin alterar el referente geográfico.
- source_word: וְכֹל גְּלִילוֹת פְּלָשֶׁת
  english_pob_choice: and all the regions of Philistia
  chosen_spanish: y todos los distritos de Filistea
  alternatives_spanish:
  - y todas las regiones de Filistea
  - y todos los territorios de Filistea
  - y todos los distritos de los filisteos
  lexicon: HALOT
  rationale: גְּלִילוֹת indica regiones o distritos. «Distritos» conserva esa referencia administrativa/geográfica. «Filistea» sigue la forma de país o territorio sugerida por פְּלָשֶׁת, mejor que convertirlo en un mero nombre de pueblo.
- source_word: הַגְּמוּל
  english_pob_choice: recompense
  chosen_spanish: pago
  alternatives_spanish:
  - recompensa
  - retribución
  - repago
  lexicon: HALOT
  rationale: En este contexto la palabra introduce el motivo de retribución. «Pago» ayuda a sostener el juego verbal con los verbos de pagar/devolver, aunque «recompensa» y «retribución» permanecen como alternativas válidas.
- source_word: מְשַׁלְּמִים
  english_pob_choice: repaying
  chosen_spanish: estáis pagando
  alternatives_spanish:
  - estáis repagando
  - estáis retribuyendo
  - estáis pagando de vuelta
  lexicon: HALOT
  rationale: El piel de שלם significa pagar, pagar de vuelta o retribuir. «Estáis pagando» es natural en español y mantiene el sentido de devolución implícito por el contexto y el paralelismo con גמל/גמול.
- source_word: וְאִם גֹּמְלִים אַתֶּם עָלַי
  english_pob_choice: And if you are repaying me
  chosen_spanish: Y si me estáis pagando
  alternatives_spanish:
  - Y si me estáis retribuyendo
  - Y si me estáis devolviendo el pago
  lexicon: HALOT
  rationale: גמל continúa el campo semántico de retribución y pago. «Me estáis pagando» conserva la repetición léxica natural en español y deja visible que se trata de un pago hostil o retributivo por el contexto.
- source_word: קַל מְהֵרָה
  english_pob_choice: swiftly and quickly
  chosen_spanish: con rapidez y prontitud
  alternatives_spanish:
  - rápidamente y sin demora
  - con presteza y prontitud
  lexicon: HALOT
  rationale: Los dos adverbios intensifican la inmediatez. «Con rapidez y prontitud» reproduce la duplicación enfática sin sonar forzado.
- source_word: אָשִׁיב
  english_pob_choice: I will return
  chosen_spanish: devolveré
  alternatives_spanish:
  - haré volver
  - restituiré
  lexicon: HALOT
  rationale: El hifil de שוב puede expresar hacer volver o devolver. «Devolveré» comunica bien la idea de retornar sobre ellos lo que han hecho, y funciona de manera natural con el sustantivo siguiente.
- source_word: גְּמֻלְכֶם
  english_pob_choice: your repayment
  chosen_spanish: vuestro pago
  alternatives_spanish:
  - vuestra retribución
  - vuestro repago
  - vuestra recompensa
  lexicon: HALOT
  rationale: Se mantiene el vínculo verbal con los términos de pago/retribución del verso. «Vuestro pago» conserva la repetición y el juego léxico con menos extrañeza que una opción más abstracta.
- source_word: בְּרֹאשְׁכֶם
  english_pob_choice: on your own head
  chosen_spanish: sobre vuestra propia cabeza
  alternatives_spanish:
  - sobre vuestra cabeza
  - a vuestra propia cabeza
  lexicon: HALOT
  rationale: Es un modismo hebreo de consecuencias que recaen sobre el culpable. «Sobre vuestra propia cabeza» transmite bien la imagen y su fuerza judicial.
theological_decisions:
- issue: Lenguaje de retribución judicial divina
  english_pob_reading: The verse is rendered in judicial-retributive terms without softening the threat formula.
  chosen_spanish_reading: El verso se mantiene en términos judiciales y retributivos, sin suavizar la fórmula de amenaza.
  alternative_spanish_readings:
  - El verso se podría generalizar como mera consecuencia
  - Se podría atenuar la imagen a una advertencia impersonal
  rationale: La repetición de las raíces de pago/retribución y el modismo de la cabeza expresan retribución directa. La traducción conserva esa tensión teológica en lugar de diluirla en una idea genérica de consecuencia.
  doctrine_reference: Preservar la tensión teológica sin resolverla artificialmente.
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión más reciente del POB en inglés, que eliminó una expansión redundante sobre el sustantivo de retribución y redujo la frase a un paralelismo más ceñido. La redacción española sigue ese ajuste, manteniendo la repetición léxica de pago/retribución y la cadencia breve del verso.
  spanish_consistency_notes:
  - Se conservó «Yahvé» como norma general del proyecto, pero este verso no contiene el Tetragrámaton.
  - «Tiro» y «Sidón» se mantienen como nombres propios usuales en español.
  - Se eligió una solución que preserva el campo semántico de pagar/retribuir sin borrar la repetición intencional del hebreo.
  - El modismo final se vertió de forma literal-inteligible para mantener su fuerza judicial.
