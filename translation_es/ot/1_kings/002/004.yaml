  - marker: b
    text: «En verdad» también puede traducirse «fielmente» o «con integridad».
    reason: lexical_alternative
  - marker: c
    text: 'Más literalmente: «no será cortado para ti un hombre de sobre el trono de Israel». Más idiomáticamente: «no te faltará un hombre en el trono de Israel».'
    reason: lexical_alternative
  revision_rationale: 'Se corrigió el anclaje de la nota [c], se cambió «sobre el trono» por el español más natural «en el trono», y se suavizó «para andar delante de mí» a «andando delante de mí» para mantener el sentido hebreo con mejor fluidez. No fue necesario escalar la revisión: los ajustes son editoriales y de fidelidad fina, no de incertidumbre doctrinal o textual grave.'
