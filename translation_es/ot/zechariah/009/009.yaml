base_translation:
  language: en
  yaml_path: translation/ot/zechariah/009/009.yaml
  text: Rejoice greatly[a], daughter Zion! Shout, daughter Jerusalem! Look, your king is coming to you—righteous and having salvation is he, humble and riding on a donkey, on a colt[c][b], the foal of a she-donkey.
  footnotes:
  - marker: a
    text: Or 'righteous and saved is he,' or 'righteous and having salvation.' The Hebrew term can describe one who has been delivered by God and therefore comes in victory.
    reason: alternative_reading
  - marker: b
    text: Or 'lowly,' 'poor,' or 'afflicted.' The Hebrew word can denote humble status or condition as well as demeanor.
    reason: lexical_alternative
  - marker: c
    text: The phrase 'on a donkey, on a colt, the foal of a she-donkey' is likely poetic parallelism describing one animal from two angles.
    reason: cultural_note
