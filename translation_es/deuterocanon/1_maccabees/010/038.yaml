translation:
  language: es
  text: Y los tres distritos añadidos a Judá del territorio de Samaria[a], sean incorporados a Judá, para ser considerados como una sola unidad[b], para no obedecer a ninguna otra autoridad sino a la del sumo sacerdote.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'los tres nomos', usando el término administrativo helenístico para 'distritos'.
    reason: lexical_alternative
  - marker: b
    text: Literalmente, 'para llegar a estar bajo uno'; es decir, para ser tratados como una sola unidad administrativa.
    reason: lexical_alternative
lexical_decisions:
- source_word: νομοὺς
  english_pob_choice: districts
  chosen_spanish: distritos
  alternatives_spanish:
  - nomos
  - regiones administrativas
  - territorios
  lexicon: LSJ
  rationale: En este contexto helenístico, νόμος no significa 'ley' sino una división administrativa. 'Distritos' comunica bien el valor geográfico-administrativo en español moderno y conserva el sentido público del pasaje.
- source_word: προστεθέντας / προστεθήτω
  english_pob_choice: added / let them be attached
  chosen_spanish: añadidos / sean incorporados
  alternatives_spanish:
  - anexados / sean anexados
  - unidos / sean unidos
  - asignados / sean asignados
  lexicon: LSJ
  rationale: La forma participial y el imperativo expresan la idea de agregar o incorporar territorio. 'Añadidos' y 'sean incorporados' preservan la distinción verbal y suenan naturales en español jurídico-administrativo.
- source_word: χώρας
  english_pob_choice: territory
  chosen_spanish: territorio
  alternatives_spanish:
  - tierra
  - región
  - país
  lexicon: LSJ
  rationale: Aquí χώρα se refiere al ámbito territorial de Samaria. 'Territorio' es la opción más clara y precisa en un marco administrativo.
- source_word: πρὸς τὸ λογισθῆναι
  english_pob_choice: so as to be reckoned
  chosen_spanish: para ser considerados
  alternatives_spanish:
  - para ser contados
  - a fin de ser estimados
  lexicon: LSJ
  rationale: La construcción expresa propósito. 'Ser considerados' mantiene la idea de contar/considerar administrativamente sin sonar forzado en español.
- source_word: τοῦ γενέσθαι ὑφʼ ἕνα
  english_pob_choice: as one
  chosen_spanish: como uno
  alternatives_spanish:
  - bajo uno
  - en una sola unidad
  lexicon: LSJ
  rationale: La frase griega es compacta y alude a una unidad administrativa. 'Como uno' comunica esa unidad de forma breve; no se pierde la noción de subordinación, que se explicita en la cláusula siguiente sobre la autoridad.
- source_word: ὑπακοῦσαι
  english_pob_choice: to obey
  chosen_spanish: obedecer
  alternatives_spanish:
  - someterse a
  - estar sujetos a
  lexicon: LSJ
  rationale: El infinitivo significa 'obedecer'. 'Obedecer' es la forma más directa y adecuada para el ámbito legal del pasaje.
- source_word: ἄλλης ἐξουσίας
  english_pob_choice: any other authority
  chosen_spanish: otra autoridad
  alternatives_spanish:
  - cualquier otra jurisdicción
  - otro poder
  lexicon: LSJ
  rationale: ἐξουσία denota autoridad o jurisdicción gobernante. 'Otra autoridad' preserva la amplitud del término y su tono formal.
- source_word: ἀλλʼ ἢ τοῦ ἀρχιερέως
  english_pob_choice: except that of the high priest
  chosen_spanish: sino a la del sumo sacerdote
  alternatives_spanish:
  - excepto la del sumo sacerdote
  - salvo la del sumo sacerdote
  lexicon: LSJ
  rationale: El genitivo está vinculado con la idea de autoridad. 'Sino a la del sumo sacerdote' hace explícito que la excepción recae en la autoridad, no solo en la persona, y resulta idiomático en español.
theological_decisions:
- issue: Alcance de la autoridad del sumo sacerdote
  english_pob_reading: The verse is rendered in administrative-political terms, indicating jurisdiction under the high priest rather than importing broader theological claims.
  chosen_spanish_reading: El versículo se traduce en términos administrativos y políticos, indicando jurisdicción bajo la autoridad del sumo sacerdote sin ampliar indebidamente su alcance.
  alternative_spanish_readings:
  - Podría leerse como una sumisión religiosa y civil más amplia al sumo sacerdote.
  - Podría interpretarse como una subordinación total a la autoridad sacerdotal.
  rationale: El griego habla de anexión territorial y obediencia a una autoridad concreta. La traducción conserva ese sentido jurídico-administrativo y evita convertir el decreto en una afirmación doctrinal más amplia que la que el texto expresa.
  doctrine_reference: Preservar la tensión interpretativa; primacía del texto original sobre la tradición de traducción.
translation_notes:
  revision_awareness: 'Se tuvo en cuenta la revisión final que añadió un segundo matiz final de propósito en la construcción griega, reflejado en español con dos cláusulas finales paralelas: ''para ser considerados como uno'' y ''para no obedecer...''.'
  spanish_consistency_notes:
  - Se mantuvo 'Yahvé' como norma general del proyecto, pero este versículo no contiene el tetragrámaton.
  - '''Sumo sacerdote'' se usa como equivalente directo de ἀρχιερεύς, coherente con el contexto institucional del pasaje.'
  - '''Distritos'' conserva la decisión del POB inglés para νόμος en sentido administrativo helenístico.'
  - La sintaxis española conserva la acumulación de cláusulas finales del griego sin simplificar la relación de propósito.
