translation:
  language: es
  text: El que recoge[a] en verano es un hijo[b] prudente, pero el que duerme durante la siega es un hijo que avergüenza.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «acopia en verano».
    reason: lexical_alternative
  - marker: b
    text: En Proverbios, «hijo» conserva el singular masculino del hebreo y su forma didáctica, aunque a menudo tiene fuerza representativa.
    reason: cultural_note
lexical_decisions:
- source_word: אֹגֵר
  english_pob_choice: gathers
  chosen_spanish: recoge
  alternatives_spanish:
  - junta
  - acopia
  - reúne
  lexicon: HALOT
  rationale: El participio describe la acción de juntar provisiones o producto agrícola. «Recoge» comunica bien la acción concreta y suena natural en español sin añadir la idea de almacenamiento más allá de lo que el hebreo exige.
- source_word: בַּקַּיִץ
  english_pob_choice: in summer
  chosen_spanish: en verano
  alternatives_spanish:
  - durante el verano
  lexicon: HALOT
  rationale: La preposición temporal se mantiene de forma directa. «En verano» es la forma más natural y breve en español para el tiempo oportuno de recolección.
- source_word: בֵּן
  english_pob_choice: son
  chosen_spanish: hijo
  alternatives_spanish:
  - muchacho
  - hijo varón
  lexicon: HALOT
  rationale: Se conserva el término filial masculino explícito del hebreo, que corresponde al marco didáctico de Proverbios. «Hijo» mantiene el tono instruccional sin neutralizar el género.
- source_word: מַשְׂכִּיל
  english_pob_choice: prudent
  chosen_spanish: prudente
  alternatives_spanish:
  - sabio
  - que actúa con prudencia
  lexicon: HALOT
  rationale: El participio expresa sensatez práctica visible en la conducta. «Prudente» conserva mejor que «sabio» la idea de actuar con discernimiento en el momento adecuado.
- source_word: נִרְדָּם
  english_pob_choice: sleeps
  chosen_spanish: duerme
  alternatives_spanish:
  - se queda dormido
  - está durmiendo
  lexicon: HALOT
  rationale: El participio niphal describe a quien se halla dormido cuando no conviene. «Duerme» es la forma más directa y natural en español para este contraste proverbial.
- source_word: בַּקָּצִיר
  english_pob_choice: during harvest
  chosen_spanish: durante la siega
  alternatives_spanish:
  - en la cosecha
  - en tiempo de siega
  lexicon: HALOT
  rationale: «Siega» refleja bien el campo semántico agrícola del hebreo y conserva el paralelismo temporal con «verano». Es más idiomático y preciso que una mera repetición de «cosecha» en este contexto.
- source_word: מֵבִישׁ
  english_pob_choice: who brings shame
  chosen_spanish: que avergüenza
  alternatives_spanish:
  - que trae vergüenza
  - que causa vergüenza
  - vergonzoso
  lexicon: HALOT
  rationale: El participio causativo se vierte como una acción que produce vergüenza. «Que avergüenza» conserva la fuerza causal del hebreo mejor que un adjetivo como «vergonzoso».
translation_notes:
  revision_awareness: El texto sigue de cerca el hebreo y el auditable inglés de la POB. No hay revisiones aplicadas en el paquete de auditoría, y la versión española mantiene el paralelismo entre la acción oportuna en verano y la negligencia en la siega.
  spanish_consistency_notes:
  - Se mantuvo la metáfora agrícola con vocabulario natural en español.
  - «hijo» se conservó para reflejar el masculino singular del hebreo y el marco proverbial.
  - La cláusula final preserva el valor causativo de מֵבִישׁ con una construcción verbal en español.
