revisions:
- from: Su abundante fruto va a los reyes que tú has puesto sobre nosotros por causa de nuestros pecados[a]. Ellos gobiernan sobre nuestros cuerpos y sobre nuestro ganado, según su voluntad[b], y nosotros estamos en gran angustia.
  to: Su abundante cosecha va a los reyes que tú has puesto sobre nosotros por causa de nuestros pecados[a]. Ellos gobiernan sobre nuestros cuerpos y sobre nuestro ganado, como quieren[b], y estamos en gran angustia.
  rationale: Se ajusta «fruto» a «cosecha» para representar mejor תְבוּאָה en contexto agrícola y tributario. Se cambia «según su voluntad» por «como quieren» para reflejar con más naturalidad y fuerza el matiz de כִּרְצוֹנָם. Se simplifica «y nosotros estamos» a «y estamos» para mejorar la fluidez del español sin pérdida de sentido.
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T22:57:17Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien el sentido global del hebreo: el producto de la tierra va a los reyes puestos por Dios sobre el pueblo a causa de sus pecados; esos reyes ejercen dominio sobre sus cuerpos y su ganado; y el pueblo está en gran aflicción. También conserva adecuadamente la agencia divina documentada en el expediente inglés.'
  spanish_quality_summary: 'La redacción es clara y digna, pero requiere un ajuste menor para mayor fidelidad léxica y naturalidad: «fruto» puede sonar algo estrecho o ambiguo en español para תְבוּאָה en este contexto agrícola-tributario; «cosecha» comunica mejor el rendimiento de la tierra. Además, «según su voluntad» es correcto, pero «como quieren» o «como les place» refleja más directamente el matiz de arbitrariedad de כִּרְצוֹנָם; no obstante, no es imprescindible cambiarlo si se prefiere el tono más formal. Conviene simplificar también «y nosotros estamos» a «y estamos», salvo que se quiera mantener expresamente el énfasis pronominal.'
  glossary_alignment: No hay conflictos con la terminología base del proyecto. No aparecen Yahvé/Mesías u otros términos controlados. «Cuerpos» preserva bien גויותינו, con nota alternativa adecuada. «Ganado» para בבהמתנו es apropiado.
  issues:
  - severity: medium
    issue: «Su abundante fruto» para וּתְבוּאָתָהּ מַרְבָּה
    rationale: Aunque no es incorrecto, «fruto» en español puede sugerir fruto individual o resultado general, mientras que תְבוּאָה aquí se refiere específicamente al producto/cosecha de la tierra. «Su abundante cosecha» o «su abundante producción» alinea mejor con el contexto agrícola y con las alternativas documentadas en la nota.
  - severity: low
    issue: «Según su voluntad» suaviza un poco el matiz idiomático de כִּרְצוֹנָם
    rationale: La frase hebrea apunta al ejercicio del poder conforme a su propio querer, con matiz de arbitrariedad. «Como quieren» o «como les place» lo expresa más directamente, aunque «según su voluntad» sigue siendo aceptable.
  - severity: low
    issue: Énfasis pronominal en «y nosotros estamos»
    rationale: Es fiel al hebreo, pero en español suena algo pesado. «Y estamos en gran angustia» mantiene el sentido con mejor fluidez. Si se desea conservar el énfasis, podría hacerse en nota o aceptarse la forma actual.
  revised_spanish_text: Su abundante cosecha va a los reyes que tú has puesto sobre nosotros por causa de nuestros pecados[a]. Ellos gobiernan sobre nuestros cuerpos y sobre nuestro ganado, como quieren[b], y estamos en gran angustia.
  revised_footnotes:
  - marker: a
    text: O «su rendimiento» o «su fruto»; el sufijo se refiere a la tierra mencionada en el versículo anterior.
    reason: lexical_alternative
  - marker: b
    text: O «nuestras personas»; hebreo «nuestros cuerpos».
    reason: lexical_alternative
  revision_rationale: Se ajusta «fruto» a «cosecha» para representar mejor תְבוּאָה en contexto agrícola y tributario. Se cambia «según su voluntad» por «como quieren» para reflejar con más naturalidad y fuerza el matiz de כִּרְצוֹנָם. Se simplifica «y nosotros estamos» a «y estamos» para mejorar la fluidez del español sin pérdida de sentido.
