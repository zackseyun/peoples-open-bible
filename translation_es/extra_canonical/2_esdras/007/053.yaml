lexical_decisions:
- source_word: ad numerum eorum
  english_pob_choice: by their number
  chosen_spanish: según su número
  alternatives_spanish:
  - por su número
  - de acuerdo con su número
  lexicon: número
  rationale: La construcción latina expresa correspondencia o distribución conforme a un conteo. «Según su número» conserva esa relación sin añadir la idea de selección arbitraria.
- source_word: compones eos tibi
  english_pob_choice: you will sort them for yourself
  chosen_spanish: los ordenarás para ti
  alternatives_spanish:
  - los clasificarás para ti
  - los dispondrás para ti
  lexicon: componer
  rationale: Compones, futuro de componere, aquí pide una acción de ordenar/disponer. «Ordenar» es natural en español y mantiene la idea de arreglar conforme al número, sin suavizar la fuerza verbal.
- source_word: plumbum
  english_pob_choice: lead
  chosen_spanish: el plomo
  alternatives_spanish:
  - plomo
  lexicon: plomo
  rationale: Se mantiene el metal específico del latín. No hay motivo para generalizarlo.
- source_word: fictile
  english_pob_choice: clay
  chosen_spanish: el barro
  alternatives_spanish:
  - la arcilla
  - lo de barro
  lexicon: fictile
  rationale: Fictile alude a material modelable de barro/arcilla. «Barro» es claro en español y conserva la imagen material del texto.
- source_word: abundat
  english_pob_choice: are abundant
  chosen_spanish: abundan
  alternatives_spanish:
  - hay abundancia
  - son abundantes
  lexicon: abundar
  rationale: El verbo latino en presente indica abundancia general. «Abundan» reproduce esa concisión.
theological_decisions:
- issue: Sentido de la lista de materiales valiosos y comunes
  english_pob_reading: but lead and clay are abundant
  chosen_spanish_reading: pero el plomo y el barro abundan
  alternative_spanish_readings:
  - pero abundan el plomo y el barro
  - pero el plomo y la arcilla abundan
  rationale: No hay carga doctrinal directa; se preserva la oposición implícita entre lo escaso/contado y lo abundante/común, sin reinterpretarla.
  doctrine_reference: none
translation_notes:
  revision_awareness: 'El inglés auditado fue corregido respecto de una desalineación previa: la frase «And I said, “Lord, how can that be?”» pertenece al versículo siguiente, no a este. Por eso la versión española sigue el contenido latino real de 2 Esdras 7:53 y no reproduce esa lectura errónea.'
  spanish_consistency_notes:
  - Se conserva el tratamiento de segunda persona singular con futuro («ordenarás»), acorde al latín.
  - No se introduce «SEÑOR» ni otras fórmulas no presentes en el segmento fuente.
  - «Barro» se usa como equivalente natural y reverente de fictile en este contexto material.
