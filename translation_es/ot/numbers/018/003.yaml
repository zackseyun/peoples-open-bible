translation:
  language: es
  text: Ellos guardarán tu encargo y el encargo de toda la tienda, pero no se acercarán a los utensilios sagrados[a] ni al altar,[b] no sea que mueran tanto ellos como tú.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «los objetos sagrados» o «los muebles sagrados» para כְּלֵי הַקֹּדֶשׁ.
    reason: lexical_alternative
  - marker: b
    text: El hebreo dice literalmente «y al altar», pero en español, dentro de una prohibición, «ni al altar» expresa naturalmente que no deben acercarse ni a una cosa ni a la otra.
    reason: spanish_style_note
lexical_decisions:
- source_word: וְשָׁמְרוּ
  english_pob_choice: They shall keep
  chosen_spanish: guardarán
  alternatives_spanish:
  - mantendrán
  - cumplirán
  lexicon: HALOT
  rationale: שׁמר en contexto de deber sagrado expresa custodiar o guardar una responsabilidad asignada. «Guardarán» conserva la idea de custodia activa y el vínculo con el encargo.
- source_word: מִשְׁמַרְתְּךָ
  english_pob_choice: your charge
  chosen_spanish: tu encargo
  alternatives_spanish:
  - tu cargo
  - tu deber
  - tu responsabilidad
  lexicon: HALOT
  rationale: מִשְׁמֶרֶת denota una obligación o función confiada. «Encargo» comunica bien la idea de una tarea encomendada y evita reducirlo a un oficio meramente administrativo.
- source_word: וּמִשְׁמֶרֶת כָּל הָאֹהֶל
  english_pob_choice: and the charge of the whole tent
  chosen_spanish: y el encargo de toda la tienda
  alternatives_spanish:
  - y el deber de toda la tienda
  - y la responsabilidad de toda la tienda
  lexicon: HALOT
  rationale: Se mantiene la repetición de מִשְׁמֶרֶת como «encargo» para conservar la cohesión léxica. הָאֹהֶל se traduce por «tienda» según su sentido básico, con «toda» para reflejar כָּל.
- source_word: הָאֹהֶל
  english_pob_choice: tent
  chosen_spanish: tienda
  alternatives_spanish:
  - tienda de reunión
  - tabernáculo
  lexicon: HALOT
  rationale: El hebreo dice «tienda»; «tabernáculo» explicita el referente cultual pero añade interpretación. «Tienda» es más directo y fiel al lexema.
- source_word: אֶל כְּלֵי הַקֹּדֶשׁ
  english_pob_choice: the holy vessels
  chosen_spanish: los utensilios sagrados
  alternatives_spanish:
  - los vasos sagrados
  - los objetos sagrados
  - los utensilios del santuario
  lexicon: HALOT
  rationale: כְּלֵי son implementos o utensilios. «Utensilios sagrados» conserva la concreción del término y evita una expresión demasiado eclesiástica. «Sagrados» refleja la pertenencia al ámbito santo.
- source_word: וְאֶל הַמִּזְבֵּחַ
  english_pob_choice: or the altar
  chosen_spanish: ni al altar
  alternatives_spanish:
  - o al altar
  - y al altar
  lexicon: HALOT
  rationale: En una prohibición negativa, el español natural une los dos elementos con «ni». Así se preserva el alcance de la restricción sobre ambos objetos sin perder claridad.
- source_word: לֹא יִקְרָבוּ
  english_pob_choice: they shall not come near
  chosen_spanish: no se acercarán
  alternatives_spanish:
  - no se aproximarán
  - no vendrán cerca
  lexicon: HALOT
  rationale: קרב en este contexto es acercarse a un espacio u objeto restringido. «No se acercarán» es natural en español y mantiene la fuerza espacial del verbo.
- source_word: וְלֹא יָמֻתוּ
  english_pob_choice: lest both they and you die
  chosen_spanish: para que no mueran
  alternatives_spanish:
  - para que no mueran ellos y ustedes
  - no sea que mueran
  lexicon: HALOT
  rationale: La construcción final expresa una finalidad negativa o prevención del castigo. «Para que no mueran» funciona bien en español, aunque el hebreo incluye explícitamente a ambos grupos en el resultado evitado.
- source_word: גַם הֵם גַּם אַתֶּם
  english_pob_choice: neither they nor you
  chosen_spanish: ni ellos ni ustedes
  alternatives_spanish:
  - tanto ellos como ustedes
  - ellos y ustedes
  lexicon: HALOT
  rationale: En contexto negativo, גַּם...גַּם se vierte de modo idiomático como «ni...ni». Aquí se conserva la inclusión de ambos grupos en la advertencia.
theological_decisions:
- issue: Distinción entre la carga de Aarón y la de los levitas
  english_pob_reading: The verse addresses Aaron ('your charge') and speaks of the Levites' duty while restricting them from the holier objects reserved to the priests.
  chosen_spanish_reading: El versículo mantiene la distinción entre el encargo confiado a Aarón y el de los levitas, y limita el acceso a los utensilios sagrados y al altar.
  alternative_spanish_readings:
  - Una referencia general a los sacerdotes sin distinguir a Aarón
  - Una lectura en que todo el servicio del santuario queda igualado entre ambos grupos
  rationale: El sufijo de 2 ms en מִשְׁמַרְתְּךָ exige conservar la dirección personal a Aarón. La traducción preserva la diferenciación funcional sin suavizarla.
  doctrine_reference: Números 18:1-7; distinción sacerdotal-levítica
- issue: Alcance del aviso de muerte
  english_pob_reading: The warning includes both the Levites and Aaron/priests as liable if sacred boundaries are violated.
  chosen_spanish_reading: 'La advertencia abarca a ambos grupos: si se viola el límite santo, la consecuencia de muerte recae sobre ellos.'
  alternative_spanish_readings:
  - Solo los levitas estarían en peligro
  - La frase final es meramente retórica
  rationale: גַם הֵם גַּם אַתֶּם incluye explícitamente a ambos. La versión española preserva esa seriedad corporativa y el carácter de advertencia real.
  doctrine_reference: Números 18:3; santidad y límites del santuario
translation_notes:
  revision_awareness: El texto sigue la revisión más reciente del audit trail inglés, que reforzó la correspondencia léxica con «holy vessels» y ajustó la última cláusula a una advertencia directa («lest both they and you die»). En español, se optó por una solución idiomática equivalente que conserva la inclusión de ambos grupos y el tono preventivo del hebreo.
  spanish_consistency_notes:
  - Se mantiene «encargo» para מִשְׁמֶרֶת en ambas apariciones, conservando cohesión léxica.
  - Se evita «SEÑOR» porque el versículo no contiene el nombre divino.
  - «Tienda» se usa para הָאֹהֶל siguiendo el sentido básico del hebreo, sin introducir «tabernáculo» en el texto principal.
  - La coordinación negativa «ni...ni» refleja mejor la prohibición doble que una simple «o» en español.
  - «Utensilios sagrados» conserva la concreción de כְּלֵי y la cualidad de קֹדֶשׁ sin sobretraducirlo como institución cultual.
