translation:
  language: es
  text: Demolieron las ciudades, y sobre cada buena parcela de tierra[a] cada hombre arrojó su piedra y la llenó. Taparon cada manantial de agua y derribaron todo árbol bueno[b], hasta que solo quedaron sus piedras en Quir-Jareset[c]; entonces los honderos la rodearon y la golpearon[d].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «cada buen campo». El hebreo חֶלְקָה designa una porción o parcela de tierra.
    reason: lexical_alternative
  - marker: b
    text: Literalmente, «árbol bueno»; puede referirse más específicamente a árboles valiosos o productivos.
    reason: lexical_alternative
  - marker: c
    text: Quir-Jareset es un nombre de lugar, probablemente la principal ciudad fortificada de Moab en este contexto.
    reason: cultural_note
  - marker: d
    text: O «la golpearon». El verbo hebreo significa literalmente «golpear», aquí usado para el asalto militar contra la ciudad.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהֶעָרִים
  english_pob_choice: the cities
  chosen_spanish: las ciudades
  alternatives_spanish:
  - las poblaciones
  - los poblados
  lexicon: HALOT
  rationale: עִיר suele designar una ciudad o centro urbano; en un contexto militar de devastación, «las ciudades» conserva bien el alcance y la fuerza del verbo.
- source_word: יַהֲרֹסוּ
  english_pob_choice: they demolished
  chosen_spanish: demolieron
  alternatives_spanish:
  - derribaron
  - destruyeron
  lexicon: HALOT
  rationale: הרס expresa derribar o demoler estructuras. «Demolieron» mantiene el sentido concreto mejor que «destruyeron».
- source_word: חֶלְקָה טוֹבָה
  english_pob_choice: good piece of land
  chosen_spanish: buena parcela de tierra
  alternatives_spanish:
  - buena porción de tierra
  - buen campo
  lexicon: HALOT
  rationale: חֶלְקָה es una porción o parcela de terreno. «Parcela de tierra» reproduce el valor distributivo de la frase sin forzarla a «campo», que en español podría sonar más específico de lo que el hebreo exige.
- source_word: יַשְׁלִיכוּ אִישׁ אַבְנוֹ
  english_pob_choice: each man threw his stone
  chosen_spanish: cada hombre arrojó su piedra
  alternatives_spanish:
  - cada uno arrojó su piedra
  - cada hombre lanzó su piedra
  lexicon: HALOT
  rationale: 'El hebreo presenta un distributivo: cada soldado aporta una piedra para arruinar el terreno. «Cada hombre» y «su piedra» conservan esa repetición individual.'
- source_word: וּמִלְאוּהָ
  english_pob_choice: and filled it
  chosen_spanish: y la llenó
  alternatives_spanish:
  - y la llenaron
  - hasta llenarla
  lexicon: HALOT
  rationale: El sufijo femenino se refiere a la parcela de tierra. En español, aunque el sujeto implícito es plural, «la llenó» permite una construcción distributiva compatible con «cada hombre» y mantiene el resultado del acto de arrojar piedras.
- source_word: מַעְיַן מַיִם
  english_pob_choice: spring of water
  chosen_spanish: manantial de agua
  alternatives_spanish:
  - fuente de agua
  - surgente de agua
  lexicon: HALOT
  rationale: מַעְיַן designa un manantial o surgente. «Manantial de agua» es natural y transparente en español.
- source_word: יִסְתֹּמוּ
  english_pob_choice: they stopped up
  chosen_spanish: taparon
  alternatives_spanish:
  - obstruyeron
  - sellaron
  lexicon: HALOT
  rationale: En este contexto, סתם se refiere a obstruir fuentes de agua. «Taparon» es idiomático en español para este tipo de acción.
- source_word: עֵץ טוֹב
  english_pob_choice: good tree
  chosen_spanish: árbol bueno
  alternatives_spanish:
  - árbol valioso
  - árbol productivo
  lexicon: HALOT
  rationale: El hebreo dice literalmente «árbol bueno». Se conserva esa literalidad porque el texto no especifica aquí si son frutales; «bueno» puede implicar valor o utilidad sin precisar más de lo que el hebreo da.
- source_word: יַפִּילוּ
  english_pob_choice: felled
  chosen_spanish: derribaron
  alternatives_spanish:
  - cortaron
  - tumbaron
  lexicon: HALOT
  rationale: En relación con árboles, נפל en Hifil significa hacer caer. «Derribaron» refleja bien la imagen de abatir árboles.
- source_word: עַד הִשְׁאִיר אֲבָנֶיהָ
  english_pob_choice: until only its stones were left
  chosen_spanish: hasta que solo quedaron sus piedras
  alternatives_spanish:
  - hasta dejar solo sus piedras
  - hasta que quedaron sus piedras
  lexicon: HALOT
  rationale: El hebreo tiene una forma singular impersonal/colectiva. En español, «solo quedaron sus piedras» expresa con claridad el resultado sin perder la tensión numérica del original.
- source_word: בַּקִּיר חֲרָשֶׂת
  english_pob_choice: Kir-hareseth
  chosen_spanish: Quir-Jareset
  alternatives_spanish:
  - Kir-Jareset
  - Quir-Hareset
  lexicon: HALOT
  rationale: Se translitera el topónimo según la política del proyecto. «Quir-Jareset» mantiene una forma readable en español y distingue el nombre propio de la descripción narrativa.
- source_word: הַקַּלָּעִים
  english_pob_choice: the slingers
  chosen_spanish: los honderos
  alternatives_spanish:
  - los slingueros
  - los que tiraban con honda
  lexicon: HALOT
  rationale: El sustantivo designa a los combatientes que usan honda. «Honderos» es el término militar natural en español.
- source_word: וַיָּסֹבּוּ
  english_pob_choice: surrounded
  chosen_spanish: la rodearon
  alternatives_spanish:
  - la cercaron
  - la encircled
  lexicon: HALOT
  rationale: En contexto militar, סבב significa rodear o cercar. «La rodearon» es claro y directo en español.
- source_word: וַיַּכּוּהָ
  english_pob_choice: struck it
  chosen_spanish: la golpearon
  alternatives_spanish:
  - la hirieron
  - la atacaron
  lexicon: HALOT
  rationale: נכה significa golpear/azotar/atacar. El POB inglés optó por «struck it» para mantener literalidad; en español «la golpearon» conserva esa fuerza verbal, aunque el contexto sea de asalto militar.
theological_decisions:
- issue: Referencia al nombre de la ciudad final y su transliteración
  english_pob_reading: Kir-hareseth is a place name, likely the principal fortified city of Moab in this context.
  chosen_spanish_reading: Quir-Jareset se mantiene como nombre propio de lugar, sin traducirlo ni explicarlo dentro del verso.
  alternative_spanish_readings:
  - Quir-Hareset
  - Kir-Jareset
  - la ciudad de Quir-Jareset
  rationale: No hay una tensión doctrinal, sino de identificación geográfica y convencionalidad de transliteración. Se conserva el topónimo como nombre propio siguiendo la práctica del POB.
  doctrine_reference: N/A
- issue: Sentido militar del verbo final
  english_pob_reading: Or 'struck it.' The Hebrew verb is literally 'hit/strike,' here used for military assault on the city.
  chosen_spanish_reading: «La golpearon» conserva la literalidad del verbo y permite que el contexto militar haga explícito el sentido de asalto.
  alternative_spanish_readings:
  - la atacaron
  - la hirieron
  - la asaltaron
  rationale: No se suaviza el verbo hacia una interpretación demasiado libre. Se mantiene la tensión entre la literalidad de «golpear» y el valor militar del contexto, como hace el inglés auditado.
  doctrine_reference: N/A
translation_notes:
  revision_awareness: 'El inglés POB revisó la primera mitad para expresar de manera más directa la secuencia hebrea «arrojó... y llenó», y ajustó la última cláusula de «attacked it» a «struck it» para mayor literalidad. La versión española sigue esa línea: mantiene la secuencia concreta de devastación agrícola y conserva la literalidad del verbo final sin perder el sentido militar del contexto.'
  spanish_consistency_notes:
  - Se usa «Yahvé» para el nombre divino cuando aparezca; en este versículo no aparece.
  - Se evita sustituir «honderos» por un término eclesiástico o más interpretativo.
  - «Manantial de agua» preserva la imagen física de la fuente hídrica.
  - La construcción «cada hombre» conserva el distributivo del hebreo y coordina con la acción de llenar la parcela.
  - Se mantiene «árbol bueno» en el cuerpo para reflejar la literalidad del hebreo y se explica la posible referencia a árboles útiles en la nota.
