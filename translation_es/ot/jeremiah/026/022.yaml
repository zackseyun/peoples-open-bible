translation:
  language: es
  text: 'Entonces el rey Joacim envió hombres a Egipto: Elnatán hijo de Acbor[a], y hombres con él, a Egipto.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El hebreo repite «a Egipto» al final para marcar el destino de Elnatán y de los hombres que iban con él; la traducción conserva esa repetición.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּשְׁלַח
  english_pob_choice: sent
  chosen_spanish: envió
  alternatives_spanish:
  - mandó
  - despachó
  lexicon: HALOT
  rationale: El verbo qal consecutivo de שׁלח expresa la acción de enviar; en español, «envió» conserva bien la secuencia narrativa y suena natural en el registro bíblico contemporáneo.
- source_word: הַמֶּלֶךְ יְהוֹיָקִים
  english_pob_choice: King Jehoiakim
  chosen_spanish: el rey Joaquim
  alternatives_spanish:
  - el rey Jehoiaquim
  - el rey Yehoyaqim
  lexicon: HALOT
  rationale: Se conserva el título real con el nombre propio en forma castellana estándar. «Joaquim» es la transliteración histórica más reconocible en español y mantiene la identificación del personaje.
- source_word: אֲנָשִׁים
  english_pob_choice: men
  chosen_spanish: hombres
  alternatives_spanish:
  - personas
  - gente
  lexicon: HALOT
  rationale: Aquí el plural de אִישׁ designa agentes varones enviados en una misión oficial; «hombres» preserva esa precisión y evita diluir el matiz con «personas» o «gente».
- source_word: מִצְרַיִם
  english_pob_choice: Egypt
  chosen_spanish: Egipto
  alternatives_spanish:
  - la tierra de Egipto
  lexicon: HALOT
  rationale: Nombre geográfico estándar en español bíblico. Se mantiene la forma breve porque el contexto ya identifica el destino.
- source_word: אֵת
  english_pob_choice: ':'
  chosen_spanish: ':'
  alternatives_spanish:
  - —
  - es decir
  lexicon: HALOT
  rationale: En este contexto, אֵת introduce la identificación específica de los hombres enviados. Los dos puntos reproducen la función explicativa sin añadir interpretación.
- source_word: אֶלְנָתָן בֶּן עַכְבּוֹר
  english_pob_choice: Elnathan son of Achbor
  chosen_spanish: Elnatán, hijo de Acbor
  alternatives_spanish:
  - Elnatán, hijo de Akbor
  - Elnatán, hijo de Acbor
  lexicon: HALOT
  rationale: Los nombres propios se transliteran; se usa acentuación española natural en Elnatán. «Hijo de» traduce de forma directa el patronímico בֶּן.
- source_word: וַאֲנָשִׁים אִתּוֹ
  english_pob_choice: and men with him
  chosen_spanish: y hombres con él
  alternatives_spanish:
  - y otros hombres con él
  - y hombres que iban con él
  lexicon: HALOT
  rationale: La expresión hebrea dice literalmente «y hombres con él». Se conserva sin añadir «otros», que es posible pero no explícito en el texto.
- source_word: אֶל מִצְרַיִם
  english_pob_choice: to Egypt
  chosen_spanish: a Egipto
  alternatives_spanish:
  - hacia Egipto
  - hasta Egipto
  lexicon: HALOT
  rationale: La preposición אֶל se vierte naturalmente como «a» para indicar destino. Se mantiene la repetición final porque el hebreo la repite enfáticamente.
translation_notes:
  revision_awareness: El texto fuente y el aparato inglés no muestran cambios textuales ni revisiones relevantes; se siguió la lectura estable del WLC y la decisión inglesa de preservar la repetición final de «to Egypt».
  spanish_consistency_notes:
  - Se prefirió «Egipto» en lugar de «la tierra de Egipto» por naturalidad y porque el hebreo ya funciona como destino.
  - Se mantuvo la repetición final de destino con una nota, en paralelo al POB inglés.
  - Se evitó «despachó» por sonar más marcado que el simple envío narrativo.
  - Se unificó la transliteración de nombres propios en una forma usual y publicable en español.
