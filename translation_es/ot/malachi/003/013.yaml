    issue: Inconsistencia de tratamiento pronominal en «Tus palabras»
    rationale: El hebreo דִּבְרֵיכֶם es segunda persona plural («sus/vuestras palabras»), pero el borrador usa «Tus palabras», que es singular. Además, el resto del versículo usa «ustedes dicen», creando mezcla de sistemas de tratamiento.
  - severity: medium
    issue: Racional léxico incorrecto para justificar «tus palabras»
    rationale: La nota de decisión afirma que conviene el tuteo por el singular dirigido a Yahvé en la réplica, pero ese singular aparece en «contra ti» y se dirige a Dios; no autoriza convertir el posesivo del pueblo en singular.
