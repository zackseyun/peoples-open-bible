translation:
  language: es
  text: 'Y dijeron[a]: «No nos has oprimido, ni nos has maltratado, ni has tomado nada de la mano de ningún hombre».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «de la mano de ningún hombre». La frase probablemente alude a tomar cualquier pago, regalo o soborno de alguien.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמְרוּ
  english_pob_choice: And they said
  chosen_spanish: Y dijeron
  alternatives_spanish:
  - Entonces dijeron
  - Y respondieron
  lexicon: HALOT
  rationale: El wayyiqtol narra la secuencia de acción; «Y dijeron» conserva el flujo narrativo natural en español sin añadir matiz temporal excesivo.
- source_word: עֲשַׁקְתָּנוּ
  english_pob_choice: you have not oppressed us
  chosen_spanish: no nos has oprimido
  alternatives_spanish:
  - no nos has explotado
  - no nos has defraudado
  lexicon: HALOT
  rationale: עָשַׁק expresa opresión, extorsión o trato injusto. «Oprimido» mantiene la amplitud semántica y encaja bien en el contexto de justicia pública.
- source_word: רַצּוֹתָנוּ
  english_pob_choice: you have not mistreated us
  chosen_spanish: ni nos has maltratado
  alternatives_spanish:
  - ni nos has hecho daño
  - ni nos has agraviado
  lexicon: HALOT
  rationale: La raíz expresa tratamiento abusivo o lesivo; «maltratado» refleja el valor de conducta injusta sin sugerir necesariamente violencia física concreta.
- source_word: לָקַחְתָּ מִיַּד אִישׁ מְאוּמָה
  english_pob_choice: you have not taken anything from any man's hand
  chosen_spanish: ni has tomado nada de la mano de ningún hombre
  alternatives_spanish:
  - ni has recibido nada de la mano de ningún hombre
  - ni has aceptado nada de ningún hombre
  lexicon: HALOT
  rationale: La expresión idiomática «de la mano de» conserva la concreción del hebreo y puede implicar recepción, cobro o aceptación indebida; «tomado nada» sigue de cerca la fuerza del original sin perder claridad.
- source_word: אִישׁ
  english_pob_choice: any man's
  chosen_spanish: de ningún hombre
  alternatives_spanish:
  - de nadie
  - de ninguna persona
  lexicon: HALOT
  rationale: Aunque el hebreo usa el singular masculino, en español «de ningún hombre» suena más idiomático que una calca rígida, y conserva la referencia representativa masculina del original.
- source_word: מְאוּמָה
  english_pob_choice: anything
  chosen_spanish: nada
  alternatives_spanish:
  - cosa alguna
  - algo
  lexicon: HALOT
  rationale: En una cláusula negativa, «nada» expresa con naturalidad la indefinición total del hebreo מְאוּמָה.
translation_notes:
  revision_awareness: La versión inglesa revisó «crushed us» a «mistreated us» por mayor precisión; en español se siguió esa revisión con «maltratado», evitando una imagen física de aplastamiento que el hebreo aquí no exige. También se mantuvo la lectura idiomática de «from any man's hand» como posible referencia a pago, regalo o soborno.
  spanish_consistency_notes:
  - Se conservó el paralelismo negativo triple del hebreo con «no... ni... ni...».
  - Se evitó traducir mecánicamente «any man's» por una forma artificial; la nota preserva la alternativa semántica relevante.
  - «Hombre» se mantiene como reflejo del singular masculino del hebreo, sin convertirlo automáticamente en un genérico abstracto.
