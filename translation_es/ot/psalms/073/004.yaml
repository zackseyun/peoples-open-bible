  source_alignment_summary: 'El borrador sigue bien la estructura del hebreo y del POB inglés: causal inicial, ausencia de sufrimiento hasta la muerte como lectura principal, y prosperidad corporal en la segunda cola. Conserva correctamente las dos notas del inglés sobre la dificultad de לְמוֹתָם y la imagen concreta de אוּלָם/בָּרִיא. Sin embargo, ''angustias'' desplaza חַרְצֻבּוֹת hacia aflicción interior o emocional, mientras que el expediente inglés justificó un sentido más corporal como ''pangs/pains''.'
