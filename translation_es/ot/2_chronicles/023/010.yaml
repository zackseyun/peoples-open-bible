translation:
  language: es
  text: Y colocó a todo el pueblo, cada hombre con su arma en la mano, desde el lado derecho[a] de la casa[b] hasta el lado izquierdo de la casa, junto al altar y junto a la casa, alrededor del rey.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «desde el lado derecho de la casa hasta el lado izquierdo de la casa»; en este contexto, esos lados corresponden al sur y al norte, respectivamente, pero aquí se conserva el lenguaje literal del hebreo.'
    reason: lexical_alternative
  - marker: b
    text: «La casa» aquí se refiere al complejo del templo.
    reason: cultural_note
lexical_decisions:
- source_word: וַיַּעֲמֵד
  english_pob_choice: he stationed
  chosen_spanish: colocó
  alternatives_spanish:
  - estacionó
  - puso en posición
  - hizo tomar posición
  lexicon: HALOT
  rationale: El causativo de עמד expresa que alguien hace ocupar una posición. En español, «colocó» comunica esa acción de disponer al grupo para resguardo sin sonar rígido.
- source_word: כָּל הָעָם
  english_pob_choice: all the people
  chosen_spanish: todo el pueblo
  alternatives_spanish:
  - todo el pueblo reunido
  - toda la gente
  - todas las personas
  lexicon: HALOT
  rationale: עָם normalmente significa «pueblo». Aunque el contexto es militar/guardia, el hebreo no restringe el grupo a soldados, así que se conserva el alcance amplio.
- source_word: וְאִישׁ
  english_pob_choice: each man
  chosen_spanish: cada hombre
  alternatives_spanish:
  - cada uno
  - cada varón
  lexicon: HALOT
  rationale: La fuerza distributiva es clara. Se mantiene el masculino singular para respetar la forma hebrea y la política de precisión de género del texto base.
- source_word: שִׁלְחוֹ
  english_pob_choice: his weapon
  chosen_spanish: su arma
  alternatives_spanish:
  - su lanza
  - su arma arrojadiza
  - su arma de combate
  lexicon: HALOT
  rationale: El término puede ser más específico, pero el contexto no obliga a identificar una clase concreta de arma. «Su arma» preserva la amplitud semántica sin sobreinterpretar.
- source_word: בְיָדוֹ
  english_pob_choice: in his hand
  chosen_spanish: en la mano
  alternatives_spanish:
  - en su mano
  - a la mano
  lexicon: HALOT
  rationale: La expresión hebrea es idiomática y se conserva con una formulación natural en español.
- source_word: מִכֶּתֶף ... עַד כֶּתֶף
  english_pob_choice: from the right side ... to the left side
  chosen_spanish: desde el lado derecho ... hasta el lado izquierdo ...
  alternatives_spanish:
  - desde el costado derecho ... hasta el costado izquierdo ...
  - desde el lado derecho ... hasta el lado izquierdo ...
  lexicon: HALOT
  rationale: כֶּתֶף en uso arquitectónico/topográfico se refiere a un lado o flanco. «Lado» es más claro y natural en español que «hombro».
- source_word: הַבַּיִת
  english_pob_choice: the house
  chosen_spanish: la casa
  alternatives_spanish:
  - el templo
  - el edificio
  lexicon: HALOT
  rationale: Aunque en Crónicas suele aludir al complejo del templo, aquí se conserva el sustantivo básico «casa» para mantener la correspondencia con el hebreo y la estructura del verso. Una nota aclara el referente.
- source_word: הַיְמָנִית
  english_pob_choice: right side
  chosen_spanish: lado derecho
  alternatives_spanish:
  - lado sur
  - costado derecho
  lexicon: HALOT
  rationale: Se conserva la literalidad «derecho» en lugar de expandirla a «sur», porque el auditorial inglés revisó esa decisión para evitar una interpretación direccional no explicitada por el hebreo.
- source_word: הַשְּׂמָאלִית
  english_pob_choice: left side
  chosen_spanish: lado izquierdo
  alternatives_spanish:
  - lado norte
  - costado izquierdo
  lexicon: HALOT
  rationale: Se mantiene la correlación literal con «derecho». Aunque topográficamente puede corresponder al norte, el texto base no lo explicita y no se amplía en la línea principal.
- source_word: לַמִּזְבֵּחַ
  english_pob_choice: by the altar
  chosen_spanish: junto al altar
  alternatives_spanish:
  - al lado del altar
  - cerca del altar
  - junto al altar
  lexicon: HALOT
  rationale: La preposición indica ubicación adyacente dentro de la línea de guardia. «Junto al altar» comunica bien la proximidad.
- source_word: וְלַבָּיִת
  english_pob_choice: and by the house
  chosen_spanish: y junto a la casa
  alternatives_spanish:
  - y junto al templo
  - y junto al edificio
  lexicon: HALOT
  rationale: Se conserva el mismo término «casa» por consistencia con הַבַּיִת y con el audit trail inglés, que retuvo «house» para no ocultar el vocablo fuente.
- source_word: עַל הַמֶּלֶךְ סָבִיב
  english_pob_choice: around the king
  chosen_spanish: alrededor del rey
  alternatives_spanish:
  - en torno al rey
  - rodeando al rey
  - alrededor del rey
  lexicon: HALOT
  rationale: La expresión indica una disposición protectora/circundante. «Alrededor del rey» es natural y fiel, sin añadir matices interpretativos que el hebreo no requiera.
translation_notes:
  revision_awareness: La decisión de la base inglesa revisó «south side / north side» a «right side / left side» para reflejar más literalmente el hebreo y evitar expansión direccional. La versión española sigue esa revisión y conserva el binomio literal, con nota explicativa para el contexto espacial del templo.
  spanish_consistency_notes:
  - Se usa «Yahvé» para el nombre divino solo cuando aparezca explícitamente; este verso no lo contiene.
  - Se conserva «casa» para הַבַּיִת por fidelidad al hebreo, aunque el contexto señala el complejo del templo.
  - Se evita traducir el arma con mayor precisión que la permitida por el texto; «arma» mantiene la amplitud semántica.
  - El marcaje de nota [a] aparece solo en «casa», porque la aclaración sobre la orientación pertenece al mismo grupo sintáctico.
