translation:
  language: es
  text: 'Por tanto, esto dice Yahvé: Mira, estoy planeando un desastre contra esta familia[a], de la que no podrán librar su cuello[b], ni caminarán con soberbia[c], porque es un tiempo malo[d].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «linaje» o «clan». El hebreo מִשְׁפָּחָה puede denotar un hogar, una familia extensa o un grupo de parentesco más amplio.
    reason: lexical_alternative
  - marker: b
    text: Literalmente, «de allí no apartarán sus cuellos». La imagen sugiere un yugo o carga de la que no podrán zafarse.
    reason: cultural_note
  - marker: c
    text: O «con la cabeza en alto» o «altivamente». El hebreo expresa una postura elevada que aquí comunica arrogancia.
    reason: lexical_alternative
  - marker: d
    text: O «tiempo de desastre». Se mantiene la repetición de la raíz hebrea רָעָה con el anuncio anterior.
    reason: source_note
lexical_decisions:
- source_word: לָכֵן
  english_pob_choice: Therefore
  chosen_spanish: Por tanto
  alternatives_spanish:
  - Por eso
  - Entonces
  lexicon: HALOT
  rationale: Conserva el valor inferencial del conector y su tono profético sin sonar mecánico en español.
- source_word: כֹּה אָמַר יְהוָה
  english_pob_choice: this is what Yahweh says
  chosen_spanish: esto dice Yahvé
  alternatives_spanish:
  - así dice Yahvé
  - esto es lo que dice Yahvé
  lexicon: HALOT
  rationale: Reproduce la fórmula profética con fluidez natural; se mantiene Yahvé conforme al criterio doctrinal del proyecto.
- source_word: הִנְנִי
  english_pob_choice: Look, I am
  chosen_spanish: Mira, estoy
  alternatives_spanish:
  - He aquí que estoy
  - Mira, yo estoy
  lexicon: HALOT
  rationale: Preserva el valor deíctico y enfático de la proclamación divina con un español claro y actual.
- source_word: חֹשֵׁב
  english_pob_choice: planning
  chosen_spanish: planeando
  alternatives_spanish:
  - maquinando
  - pensando
  lexicon: HALOT
  rationale: Retiene la idea de intención deliberada. 'Planeando' es idiomático y puede reflejar tanto diseño como determinación.
- source_word: עַל הַמִּשְׁפָּחָה הַזֹּאת
  english_pob_choice: against this family
  chosen_spanish: contra esta familia
  alternatives_spanish:
  - contra este linaje
  - contra este clan
  - contra este grupo familiar
  lexicon: HALOT
  rationale: '''Familia'' sigue la revisión inglesa más reciente y mantiene la amplitud semántica de מִשְׁפָּחָה sin forzar un tecnicismo en español.'
- source_word: רָעָה
  english_pob_choice: disaster
  chosen_spanish: desastre
  alternatives_spanish:
  - calamidad
  - mal
  - ruina
  lexicon: HALOT
  rationale: En el contexto judicial, la palabra designa calamidad y no mal moral. 'Desastre' comunica bien esa carga y deja visible el contraste con el otro uso de la raíz.
- source_word: אֲשֶׁר לֹא תָמִישׁוּ מִשָּׁם צַוְּארֹתֵיכֶם
  english_pob_choice: from which you will not remove your necks
  chosen_spanish: de la cual no quitarán sus cuellos
  alternatives_spanish:
  - de la cual no apartarán sus cuellos
  - de la cual no librarán sus cuellos
  - de donde no sacarán sus cuellos
  lexicon: HALOT
  rationale: Mantiene la imagen corporal del yugo o carga impuesta. 'Quitar sus cuellos' sigue de cerca el hebreo y conserva la fuerza figurada.
- source_word: וְלֹא תֵלְכוּ רוֹמָה
  english_pob_choice: you will not walk haughtily
  chosen_spanish: ni caminarán con soberbia
  alternatives_spanish:
  - ni caminarán altivamente
  - ni andarán con la cabeza en alto
  - ni caminarán orgullosamente
  lexicon: HALOT
  rationale: '''רוֹמָה'' expresa elevación/altivez; ''con soberbia'' comunica la postura arrogante de manera natural en español.'
- source_word: כִּי עֵת רָעָה הִיא
  english_pob_choice: for it is an evil time
  chosen_spanish: porque es un tiempo malo
  alternatives_spanish:
  - porque es un tiempo de desastre
  - pues es un tiempo malo
  - porque es una época mala
  lexicon: HALOT
  rationale: Se conserva la repetición de רָעָה con un término español que puede abarcar el juicio inminente. 'Malo' deja cierta literalidad sin atribuir mal moral a Dios.
theological_decisions:
- issue: Cómo rendir רָעָה cuando Dios anuncia juicio
  english_pob_reading: Rendered as 'disaster' in the first occurrence and 'evil time' at the end, preserving wordplay while avoiding a moral claim about God's character.
  chosen_spanish_reading: '''desastre'' para el juicio anunciado y ''tiempo malo'' al final, preservando el juego verbal sin sugerir que Dios haga mal moral.'
  alternative_spanish_readings:
  - '''mal'' en ambos lugares'
  - '''calamidad'' en ambos lugares'
  - '''desastre'' y ''tiempo de desastre'''
  rationale: El hebreo repite la misma raíz para la acción divina y el estado venidero. El español debe conservar la relación léxica sin confundir calamidad con maldad ética.
  doctrine_reference: Translation philosophy §3; historic orthodoxy
- issue: Alcance de מִשְׁפָּחָה
  english_pob_reading: family
  chosen_spanish_reading: familia
  alternative_spanish_readings:
  - clan
  - linaje
  - grupo familiar
  rationale: '''Familia'' es la opción más estable y ampliamente comprensible en español, y puede abarcar el sentido colectivo sin introducir una carga sociológica demasiado técnica.'
  doctrine_reference: HALOT / contextual semantics
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión más reciente del inglés POB, que prefirió 'family' frente a 'clan' para מִשְׁפָּחָה, y el estado de alta concordancia del control cruzado. La redacción española sigue esa actualización y mantiene el juego verbal de רָעָה sin sacrificar claridad ni precisión teológica.
  spanish_consistency_notes:
  - Se usa 'Yahvé' según el criterio base del proyecto.
  - '''desastre'' conserva la distinción entre calamidad y mal moral.'
  - La imagen de 'cuellos' se deja literal para que la nota aclare el trasfondo del yugo.
  - '''soberbia'' comunica el matiz de altivez de רוֹמָה de manera natural en español.'
  - La puntuación y el orden siguen un registro bíblico moderno, sin arcaísmos innecesarios.
