revisions:
- from: 'Y Finees, hijo de Eleazar, hijo de Aarón, estaba de pie[a] delante de él en aquellos días, diciendo: «¿Volveré todavía a salir a la guerra contra los hijos de Benjamín, mi hermano, o dejaré de hacerlo?» Y Yahvé dijo: «Suban, porque mañana lo entregaré en tu mano».'
  to: 'Y Finees, hijo de Eleazar, hijo de Aarón, estaba delante de él[a] en aquellos días, diciendo: «¿Volveré otra vez a salir a la guerra contra los hijos de Benjamín, mi hermano, o dejaré de hacerlo?». Y Yahvé dijo: «Sube, porque mañana lo entregaré en tu mano».'
  rationale: Se corrige la nota para reflejar fielmente la alternativa documentada sobre el referente del pronombre; se mejora la naturalidad de «estaba delante de él»; se ajusta «Volveré otra vez» para expresar mejor la repetición de הַאוֹסִף עוֹד; y se cambia «Suban» por «Sube» para lograr un mandato más natural y coherente con «tu mano» en el discurso español. No se requiere adjudicación adicional porque los cambios son menores y están bien sustentados por el expediente.
