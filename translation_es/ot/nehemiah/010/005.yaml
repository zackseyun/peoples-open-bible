    issue: La nota al pie está anclada al nombre incorrecto.
    rationale: La nota inglesa explica una variante de מַלּוּךְ ('Malluch'), pero en el borrador español el marcador [a] aparece en 'Hatús'. Esto desinforma al lector y rompe la correspondencia con la evidencia léxica.
  - severity: medium
    issue: Transliteración excesivamente adaptada de los nombres propios.
    rationale: '''Hatús'', ''Sebanías'' y ''Maluc'' no son errores graves, pero se apartan innecesariamente de la forma fuente y de la trazabilidad con ''Hattush, Shebaniah, Malluk''. En una lista onomástica, la fidelidad formal debe pesar más que la naturalización.'
  - severity: low
    issue: El contenido de la nota menciona versiones inglesas en vez de presentar simplemente la variante tradicional relevante para el lector español.
    rationale: Puede conservarse la información de que 'Malluch' es una variante tradicional, pero no hace falta centrarla en las versiones inglesas. Es más claro indicar la variante tradicional del nombre.
