  lexicon: HALOT
  rationale: בְּנֵי significa literalmente «hijos de». Aquí la enumeración inmediata de dos varones favorece la traducción específica «hijos»; «Gersón» sigue la forma hispana usual del nombre propio.
- source_word: לְמִשְׁפְּחֹתָם
  english_pob_choice: by their clans
  chosen_spanish: según sus clanes
  alternatives_spanish:
  - por sus clanes
  - de acuerdo con sus familias
  lexicon: HALOT
  rationale: En contextos genealógicos y censales, מִשְׁפָּחָה apunta a una unidad de clan/familia. «Según sus clanes» conserva el sentido organizativo del hebreo y suena idiomático en español.
- source_word: לִבְנִי
  english_pob_choice: Libni
  chosen_spanish: Libni
