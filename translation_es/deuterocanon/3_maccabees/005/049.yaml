review_pass:
  verdict: revise
  source_alignment_summary: El borrador conserva en general la secuencia y la carga emocional del griego, pero presenta varios problemas de fidelidad léxica y de español natural. "Esperanza más miserable" debilita el sentido de προσδοκία como espera/expectativa angustiosa; "al compasión" es incorrecto y además γόοι se expresa mejor como "lamentos" que como simple "llanto"; "cayendo sobre sus cuellos" necesita mejor ajuste idiomático en español, idealmente conservando la nota cultural; y "estaban sacando su última leche" atribuye la acción de modo torpe y poco natural, cuando el griego describe a los bebés mamando/extra­yendo la última leche. También conviene mejorar "jóvenes hijas" a "hijas jóvenes" y "junto a sus pechos" a "contra sus pechos".
  spanish_quality_summary: 'La legibilidad actual es irregular: hay error gramatical evidente ("al compasión"), varias expresiones calcadas o poco idiomáticas ("giro de la vida", "cayendo sobre sus cuellos", "sacando su última leche") y una footnote desordenada respecto al anclaje semántico. El verso puede mantenerse cercano al griego con español más digno y natural: "punto final de la vida" o similar, "pena y lamentos", "echándose al cuello" con nota, y "mamaban por última vez" para cerrar con fuerza emocional clara.'
  glossary_alignment: No hay términos del glosario doctrinal principal en juego. Las decisiones relevantes son narrativas y léxicas. Debe respetarse la alternativa documentada para προσδοκία mediante nota, y conservar la nota cultural del modismo "sobre los cuellos" mediante un anclaje español idiomático. No se requiere adjudicación teológica.
  issues:
  - severity: high
    issue: Error gramatical en "se volvieron al compasión"
    rationale: '"Compasión" es femenino; la forma actual es incorrecta y además el giro entero suena antinatural en español.'
  - severity: high
    issue: '"esperanza más miserable" no refleja bien προσδοκία'
    rationale: En contexto no se trata de esperanza positiva sino de expectativa/espera angustiosa ante la muerte; la nota inglesa ya documenta esta alternativa.
  - severity: medium
    issue: '"cayendo sobre sus cuellos" es calco rígido'
    rationale: Aunque literal, en español resulta torpe. Conviene usar una forma idiomática como "echándose al cuello" y conservar la literalidad en nota cultural.
  - severity: high
    issue: '"estaban sacando su última leche" es poco natural y asigna mal la acción'
    rationale: El participio describe a los bebés extrayendo/mamando la leche del pecho. En español bíblico-natural, "mamaban por última vez" comunica mejor el sentido.
  - severity: medium
    issue: '"jóvenes hijas" suena forzado'
    rationale: '"Hijas jóvenes" es más idiomático y mantiene el sentido relacional documentado en la auditoría inglesa.'
  - severity: low
    issue: Distribución de notas mejorable
    rationale: La nota sobre προσδοκία debe anclarse a la frase correspondiente, y la nota cultural del cuello al giro idiomático que la representa en español.
