translation:
  language: es
  text: Porque tu esposo es tu Hacedor; Yahvé de los Ejércitos[a] es su nombre. Y tu Redentor es el Santo de Israel; es llamado[b] el Dios de toda la tierra.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, tradicionalmente, «el SEÑOR de los Ejércitos».
    reason: lexical_alternative
  - marker: b
    text: 'O: «será llamado el Dios de toda la tierra».'
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  lexicon: HALOT
  rationale: Introduce la razón o fundamento de la afirmación anterior. En español, «Porque» comunica con naturalidad la relación explicativa sin añadir un matiz causal más fuerte que el del hebreo.
- source_word: בֹעֲלַיִךְ
  english_pob_choice: your husband
  chosen_spanish: tu esposo
  alternatives_spanish:
  - tu marido
  - tu señor
  lexicon: HALOT
  rationale: El contexto de Sion como figura femenina hace primaria la relación marital. «Esposo» preserva esa metáfora de manera digna y clara en español, sin desplazarla a un sentido de dominio.
- source_word: עֹשַׂיִךְ
  english_pob_choice: your Maker
  chosen_spanish: tu Hacedor
  alternatives_spanish:
  - el que te hizo
  - tu Creador
  lexicon: HALOT
  rationale: La forma participial funciona como título divino. «Hacedor» conserva la concisión y el paralelismo con «tu esposo»; «Creador» sería posible, pero introduce una equivalencia más interpretativa.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  lexicon: HALOT
  rationale: Se mantiene la transliteración del nombre divino en la línea del proyecto. «Yahvé» es la forma española establecida aquí y evita la sustitución por un título como «Señor».
- source_word: צְבָאוֹת
  english_pob_choice: of Armies
  chosen_spanish: de los Ejércitos
  alternatives_spanish:
  - de los Armados
  - de las Huestes
  lexicon: HALOT
  rationale: La imagen subyacente es la de fuerzas organizadas y numerosas. En español, «de los Ejércitos» conserva la fuerza del título y resulta más transparente que «de los Ejércitos» en una lectura litúrgica o que «de las Huestes», que es tradicional pero menos claro.
- source_word: שְׁמוֹ
  english_pob_choice: is his name
  chosen_spanish: es su nombre
  alternatives_spanish:
  - tal es su nombre
  - ese es su nombre
  lexicon: HALOT
  rationale: La fórmula nominal hebrea se expresa con naturalidad en español como una afirmación de identidad. «Es su nombre» mantiene la cadencia titular sin forzar el orden sintáctico.
- source_word: וְגֹאֲלֵךְ
  english_pob_choice: your Redeemer
  chosen_spanish: tu Redentor
  alternatives_spanish:
  - el que te redime
  - tu rescatador
  lexicon: HALOT
  rationale: «Redentor» preserva el término teológico y relacional que la tradición bíblica reconoce para גאל. «El que te redime» explicita el verbo, pero pierde el valor titular concentrado del hebreo.
- source_word: קְדוֹשׁ יִשְׂרָאֵל
  english_pob_choice: the Holy One of Israel
  chosen_spanish: el Santo de Israel
  alternatives_spanish:
  - el Santo de Israel
  lexicon: HALOT
  rationale: Se conserva el título fijo de Isaías en forma literal y reverente. «Santo de Israel» es la equivalencia española estable y más fiel.
- source_word: אֱלֹהֵי כָל הָאָרֶץ
  english_pob_choice: the God of all the earth
  chosen_spanish: el Dios de toda la tierra
  alternatives_spanish:
  - el Dios de toda la tierra
  - el Dios de toda la tierra habitable
  lexicon: HALOT
  rationale: La construcción de dominio universal se expresa de forma directa. «Toda la tierra» mantiene la amplitud total del hebreo sin añadir especificaciones.
- source_word: יִקָּרֵא
  english_pob_choice: he is called
  chosen_spanish: será llamado
  alternatives_spanish:
  - es llamado
  - será proclamado
  lexicon: HALOT
  rationale: El nifal imperfecto puede entenderse aquí como una designación reconocida o como una referencia futura. «Será llamado» conserva la ambigüedad temporal presente en el hebreo y evita cerrar la lectura a un presente gnómico.
theological_decisions:
- issue: Metáfora matrimonial aplicada a Sion y su relación con Dios
  english_pob_reading: 'Retain the explicit marital metaphor: ''your husband is your Maker.'''
  chosen_spanish_reading: 'Conservar la metáfora explícita: «tu esposo es tu Hacedor».'
  alternative_spanish_readings:
  - tu señor es tu Hacedor
  - tu dueño es tu Hacedor
  rationale: El hebreo presenta a Dios mediante lenguaje marital, no simplemente de autoridad. Mantener «esposo» preserva la imagen pactal y relacional sin diluirla en un término de dominio más genérico.
  doctrine_reference: Translation philosophy §§1, 3, 6
- issue: Traducción del título divino יהוה צְבָאוֹת
  english_pob_reading: Yahweh of Armies
  chosen_spanish_reading: Yahvé de los Ejércitos
  alternative_spanish_readings:
  - Yahvé de los Hosts
  - el SEÑOR de los Ejércitos
  rationale: Se prioriza la transparencia del nombre divino y del título militar. «Ejércitos» comunica el sentido léxico de צְבָאוֹת mejor que «Huestes», y evita la convención de ocultar el nombre con un sustituto.
  doctrine_reference: 'DOCTRINE.md: Contested terms table for יְהוָה; Translation philosophy §§1, 6'
- issue: Valor temporal y pasivo de יִקָּרֵא
  english_pob_reading: he is called / he will be called
  chosen_spanish_reading: será llamado
  alternative_spanish_readings:
  - es llamado
  - será proclamado
  rationale: El hebreo admite una lectura de designación reconocida y también una proyección futura. «Será llamado» permite conservar esa tensión sin decidir indebidamente entre presente y futuro.
  doctrine_reference: HALOT; Translation philosophy §§2, 5
translation_notes:
  revision_awareness: No hubo revisiones aplicadas en el pasaje de referencia; el último pase indicó que el texto quedó sin cambios necesarios, con alta concordancia entre los controles de auditoría.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» para el Tetragrámaton, conforme al estándar del proyecto.
  - Se conserva «Ejércitos» para צְבָאוֹת por transparencia semántica en español.
  - Se usa «Redentor» como título bíblico estable para גֹאֵל.
  - La metáfora matrimonial se mantiene explícita con «esposo», sin suavizarla a un término abstracto.
  - «Será llamado» preserva la ambigüedad del nifal hebreo entre designación presente y futura.
