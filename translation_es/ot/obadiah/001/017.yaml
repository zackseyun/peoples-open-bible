translation:
  language: es
  text: Pero en el monte Sión habrá los que escapen[a], y será santo[c][b], y la casa de Jacob poseerá sus propias posesiones.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «habrá sobrevivientes»; el sustantivo hebreo puede denotar tanto liberación o escape como a los que escapan.
    reason: lexical_alternative
  - marker: b
    text: O «heredará su herencia».
    reason: lexical_alternative
  - marker: c
    text: 'Posiblemente: «la casa de Jacob despojará a los que la despojaron», si el término final se toma en sentido agentivo.'
    reason: alternative_reading
lexical_decisions:
- source_word: וּ/בְ/הַר צִיּוֹן
  english_pob_choice: But on Mount Zion
  chosen_spanish: Pero en el monte Sión
  alternatives_spanish:
  - Y en el monte Sión
  - Mas en el monte Sión
  lexicon: HALOT
  rationale: El prefijo conjuntivo aquí marca contraste con el juicio sobre Edom en el contexto inmediato; por eso 'Pero' comunica mejor el giro discursivo. 'Monte Sión' es la forma clara y natural para el topónimo.
- source_word: תִּהְיֶה פְלֵיטָה
  english_pob_choice: there will be those who escape
  chosen_spanish: habrá escape
  alternatives_spanish:
  - habrá los que escapen
  - habrá salvación
  - habrá sobrevivientes
  lexicon: HALOT
  rationale: פְלֵיטָה puede designar escape, liberación o el conjunto de los que escapan. El español 'escape' preserva la ambigüedad entre evento y resultado, sin forzar 'salvación' ni convertirlo solo en personas. Se deja abierta la tensión lexical documentada.
- source_word: וְ/הָיָה קֹדֶשׁ
  english_pob_choice: and it will be holy
  chosen_spanish: y será santo
  alternatives_spanish:
  - y será santidad
  - y será un lugar santo
  lexicon: HALOT
  rationale: El verbo singular con קֹדֶשׁ apunta naturalmente al monte Sión como sujeto implícito. 'Será santo' mantiene la consagración del lugar en un español claro y digno, sin ampliar innecesariamente a 'lugar santo'.
- source_word: וְ/יָרְשׁוּ
  english_pob_choice: will possess
  chosen_spanish: poseerá
  alternatives_spanish:
  - heredará
  - tomará posesión
  lexicon: HALOT
  rationale: Aunque el hebreo es plural, en español el sujeto colectivo 'la casa de Jacob' puede ir con singular coordinado por estilo natural en algunas construcciones; aquí, no obstante, la forma final mantiene el sentido de posesión/restauración. El verbo 'poseer' evita reducirlo solo a herencia legal o a despojo.
- source_word: בֵּית יַעֲקֹב
  english_pob_choice: the house of Jacob
  chosen_spanish: la casa de Jacob
  alternatives_spanish:
  - la casa de Jacob
  - la familia de Jacob
  lexicon: HALOT
  rationale: Se conserva la expresión pactal y profética tradicional, que en español comunica la descendencia de Jacob/Israel sin explicarla en exceso.
- source_word: אֵת מוֹרָשֵׁיהֶם
  english_pob_choice: their own possessions
  chosen_spanish: sus propias posesiones
  alternatives_spanish:
  - su herencia
  - sus posesiones
  - lo que les pertenecía
  lexicon: HALOT
  rationale: מוֹרָשִׁים/מוֹרָשָׁה puede significar posesión o herencia. 'Sus propias posesiones' reproduce el sufijo y la idea de recuperación de lo que les corresponde, sin cerrar la lectura alternativa de 'herencia'.
theological_decisions:
- issue: Alcance de פְלֵיטָה (escape/deliverance/survivors)
  english_pob_reading: The verse speaks of real deliverance/restoration centered on Mount Zion without specifying here whether the emphasis is on surviving people, the act of rescue, or the restored holy status of the place.
  chosen_spanish_reading: El versículo habla de un escape/restauración real centrado en el monte Sión, sin definir aquí si el énfasis recae en los que escapan, en el acto de rescate o en el estado santo del lugar.
  alternative_spanish_readings:
  - El versículo enfatiza principalmente a los sobrevivientes en Sión
  - El versículo enfatiza principalmente a Sión como lugar santo
  rationale: El hebreo permite un solapamiento de sentidos. La traducción conserva esa tensión profética en vez de resolverla de modo estrecho.
  doctrine_reference: Preservar la tensión teológica en lugar de resolverla unilateralmente.
- issue: Sentido de קֹדֶשׁ aplicado a Sión
  english_pob_reading: and it will be holy
  chosen_spanish_reading: y será santo
  alternative_spanish_readings:
  - y será santidad
  - y será un lugar santo
  rationale: La santidad puede describir tanto el estado del monte como su consagración cultual. 'Será santo' mantiene ambas posibilidades sin imponer una paráfrasis interpretativa.
  doctrine_reference: La santidad de Sión se expresa como estado consagrado, no solo como cualidad moral.
translation_notes:
  revision_awareness: Se tuvo en cuenta la última revisión inglesa, que prefirió una formulación más concreta para פְלֵיטָה y mantuvo la apertura interpretativa de מוֹרָשֵׁיהֶם. El español conserva esa misma tensión, pero con una redacción natural para lectura pública.
  spanish_consistency_notes:
  - Se usó 'Yahvé' como norma del proyecto solo cuando el texto lo exigiera; este versículo no contiene el tetragrámaton.
  - Se preservó 'casa de Jacob' como expresión nacional/covenantal estándar.
  - Se evitó 'Cristo' o terminología litúrgica ajena al pasaje.
  - '''Santo'' se eligió por claridad y fidelidad al estado de consagración de Sión.'
