translation:
  language: es
  text: 'Entonces él le dijo[a]: «Si tu presencia no va con nosotros, no nos hagas subir de aquí».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literalmente, «tu rostro». En hebreo, «rostro» suele funcionar como una manera de hablar de la presencia personal.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר
  english_pob_choice: Then he said
  chosen_spanish: Entonces él le dijo
  alternatives_spanish:
  - Y él le dijo
  - Luego le dijo
  lexicon: HALOT
  rationale: El waw consecutivo avanza la narración; «Entonces» conserva la secuencia de forma natural en español. Se mantiene el sujeto explícito para claridad en una frase breve y dialogal.
- source_word: אֵלָיו
  english_pob_choice: to him
  chosen_spanish: le
  alternatives_spanish:
  - a él
  lexicon: HALOT
  rationale: El dativo pronominal se expresa de manera natural con clítico indirecto en español. «Le» evita pesadez sin perder la dirección del habla.
- source_word: אִם אֵין
  english_pob_choice: If ... does not
  chosen_spanish: Si ... no
  alternatives_spanish:
  - Si ... no está
  - Si ... no va
  lexicon: HALOT
  rationale: La combinación condicional-negativa introduce una condición real. En español, «Si ... no» comunica el valor del hebreo sin añadir una cópula innecesaria.
- source_word: פָּנֶיךָ
  english_pob_choice: your presence
  chosen_spanish: tu presencia
  alternatives_spanish:
  - tu rostro
  - tu cara
  lexicon: HALOT
  rationale: Aunque el hebreo dice literalmente «tu rostro/cara», el contexto refiere la presencia personal de Dios acompañando a su pueblo. «Presencia» conserva el sentido idiomático y la fuerza relacional; «rostro» queda como alternativa literal implicada por la base hebrea.
- source_word: הֹלְכִים
  english_pob_choice: does not go
  chosen_spanish: no va
  alternatives_spanish:
  - no va andando
  - no está yendo
  lexicon: HALOT
  rationale: El participio expresa acción acompañante continua. En español, con «presencia» como sujeto, «va» es la forma más natural y fiel a la idea de acompañamiento en curso.
- source_word: אַל
  english_pob_choice: do not
  chosen_spanish: 'no'
  alternatives_spanish:
  - no hagas
  - que no
  lexicon: HALOT
  rationale: Con prohibición o ruego urgente, el negativo español directo reproduce el valor del hebreo sin sobrecargar la frase.
- source_word: תַּעֲלֵנוּ
  english_pob_choice: bring us up
  chosen_spanish: nos hagas subir
  alternatives_spanish:
  - nos subas
  - nos lleves arriba
  lexicon: HALOT
  rationale: 'El hifil de עלה es causativo: «hacer subir» refleja mejor la idea de causar el ascenso o avance del pueblo. Se conserva el plural de primera persona y el movimiento desde el lugar actual.'
- source_word: מִזֶּה
  english_pob_choice: from here
  chosen_spanish: de aquí
  alternatives_spanish:
  - desde aquí
  - de este lugar
  lexicon: HALOT
  rationale: La referencia espacial inmediata se expresa con una frase idiomática y breve. «De aquí» es natural en español y mantiene la deixis del hebreo.
theological_decisions:
- issue: פָּנֶיךָ referido a Yahvé
  english_pob_reading: your presence
  chosen_spanish_reading: tu presencia
  alternative_spanish_readings:
  - tu rostro
  - tu cara
  rationale: La elección evita reducir el hebreo a un rasgo corporal literal y comunica la presencia personal de Dios con Israel. Se preserva, sin embargo, la tensión lexical subyacente en la alternativa literal implícita del hebreo.
  doctrine_reference: Translation philosophy §3, §6
translation_notes:
  revision_awareness: 'La revisión inglesa más reciente prefirió «does not go» sobre «is not going» por naturalidad formal, sin cambiar el sentido. En español, «no va» cumple la misma función: expresa continuidad de acompañamiento sin forzar una perífrasis progresiva innecesaria.'
  spanish_consistency_notes:
  - Se usa «Yahvé» en la obra cuando el hebreo contiene el nombre divino; aquí el verso habla a Dios mediante el pronombre posesivo, por lo que no aparece el nombre.
  - «Presencia» se mantiene como término técnico consistente para פָּנִים en este contexto cuando se refiere al acompañamiento divino.
  - La prohibición se formula con español sobrio y natural, evitando arcaísmos no necesarios.
  - Se preserva el movimiento causativo de עלה con «hacer subir», en línea con el valor del hifil.
