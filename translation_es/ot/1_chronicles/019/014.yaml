translation:
  language: es
  text: Así que Joab y el pueblo[a] que estaba con él avanzó a la batalla contra Aram, y huyeron delante de él.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «delante de Aram» / «ante Aram». El hebreo dice literalmente «delante de Aram», con un nombre propio y un modismo espacial en contexto de batalla.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּגַּשׁ
  english_pob_choice: advanced
  chosen_spanish: avanzaron
  alternatives_spanish:
  - se acercaron
  - se aproximaron
  lexicon: HALOT
  rationale: En contexto militar, נגשׁ expresa un movimiento de acercamiento hacia el combate. «Avanzaron» conserva la idea de movimiento hacia el enemigo con naturalidad en español, sin debilitar el sentido bélico.
- source_word: וְהָעָם אֲשֶׁר עִמּוֹ
  english_pob_choice: and the people who were with him
  chosen_spanish: y el pueblo que estaba con él
  alternatives_spanish:
  - y la gente que estaba con él
  - y las tropas que estaban con él
  lexicon: HALOT
  rationale: הָעָם es literalmente «el pueblo». En este contexto designa a la fuerza de combate de Joab, pero «el pueblo que estaba con él» permanece cercano al hebreo y sigue siendo claro en español.
- source_word: לִפְנֵי אֲרָם
  english_pob_choice: before Aram
  chosen_spanish: contra Aram
  alternatives_spanish:
  - delante de Aram
  - ante Aram
  - frente a Aram
  lexicon: HALOT
  rationale: La POB inglesa trató la expresión como un modismo espacial en contexto de batalla y luego la revisó hacia una formulación más natural. En español, «contra Aram» expresa el valor bélico del movimiento sin ocultar que el hebreo dice literalmente «delante de Aram».
- source_word: אֲרָם
  english_pob_choice: Aram
  chosen_spanish: Aram
  alternatives_spanish:
  - los arameos
  - Siria
  lexicon: HALOT
  rationale: Se conserva el nombre propio «Aram», coherente con el tratamiento de nombres del proyecto y más fiel al texto que una etnificación interpretativa o una equivalencia histórica posterior.
- source_word: לַמִּלְחָמָה
  english_pob_choice: for battle
  chosen_spanish: para la batalla
  alternatives_spanish:
  - a la batalla
  - para combatir
  - para guerra
  lexicon: HALOT
  rationale: El sintagma indica propósito. «Para la batalla» reproduce bien la finalidad del avance y mantiene el tono narrativo.
- source_word: וַיָּנ֖וּסוּ
  english_pob_choice: they fled
  chosen_spanish: huyeron
  alternatives_spanish:
  - fueron puestos en fuga
  - se retiraron
  lexicon: HALOT
  rationale: נוס significa «huir». «Huyeron» es la correspondencia directa y conserva la idea de desbandada implicada por el verbo.
- source_word: מִפָּנָיו
  english_pob_choice: before him
  chosen_spanish: delante de él
  alternatives_spanish:
  - de su presencia
  - ante él
  - frente a él
  lexicon: HALOT
  rationale: Literalmente, la frase significa «de delante de su rostro/presencia». En español, «delante de él» comunica de forma natural la huida en su presencia y mantiene la referencia singular a Joab.
translation_notes:
  revision_awareness: La versión inglesa revisada pasó de «advanced before Aram for battle» a «advanced to battle against Aram». La redacción española sigue esa revisión, evitando una calca de «before» y expresando el sentido bélico con «para la batalla contra Aram», mientras la nota conserva la alternativa más literal del hebreo.
  spanish_consistency_notes:
  - Se mantiene «Aram» como nombre propio, no «Siria» ni «los arameos», para respetar el valor onomástico del hebreo.
  - Se usa «pueblo» para הָעָם, aunque en contexto militar refiera a combatientes, porque conserva mejor la cercanía léxica al hebreo que una explicitación interpretativa.
  - «Delante de él» se reserva para מִפָּנָיו en sentido de huida en presencia de Joab; la nota aclara la alternativa más literal respecto de «Aram».
