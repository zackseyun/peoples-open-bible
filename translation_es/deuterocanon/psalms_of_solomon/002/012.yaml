review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el sentido básico del griego: γῆ = «la tierra», γνώσεται = «conocerá», κρίματα = «juicios», y ὁ θεός como vocativo = «oh Dios». Sin embargo, la nota léxica no preserva correctamente la alternativa inglesa documentada, porque repite la lectura principal en vez de ofrecer una verdadera variante para τὰ δίκαια.'
  spanish_quality_summary: El español principal es natural y claro. «Y la tierra conocerá todos tus juicios justos, oh Dios» es legible y digno. Solo conviene reparar la nota al pie para evitar redundancia y mejorar precisión. El vocativo «oh Dios» es aceptable en registro bíblico.
  glossary_alignment: No hay conflictos con la terminología base del proyecto. «Dios» para θεός y «juicios» para κρίματα son adecuados. «Justos» funciona bien, con «rectos» o «justos» como alternativas contextuales; la nota debe reflejar una alternativa real, preferiblemente «juicios rectos».
  issues:
  - severity: medium
    issue: La nota al pie repite la lectura principal en vez de ofrecer una alternativa léxica real.
    rationale: El inglés documenta como alternativa «all your just judgments». En español, si el texto principal ya dice «juicios justos», la nota no debe repetir exactamente esa misma formulación; debe preservar una opción distintiva como «todos tus juicios rectos» o, si se invierte el principal, «todos tus justos juicios».
  revised_spanish_text: Y la tierra conocerá todos tus juicios justos[a], oh Dios.
  revised_footnotes:
  - marker: a
    text: 'O: «todos tus juicios rectos».'
    reason: lexical_alternative
  revision_rationale: Se conserva el texto principal porque es fiel, natural y bien alineado con el griego y con el POB inglés. Solo se corrige la nota para que aporte una alternativa léxica real para τὰ δίκαια, en lugar de repetir la lectura principal.
