revisions:
- from: Ella será llevada ante la asamblea[a], y habrá escrutinio de sus hijos.
  to: Ella será llevada ante la asamblea[a], y habrá una investigación sobre sus hijos.
  rationale: Se ajusta ἐπισκοπή a 'investigación' para un español más natural y para preservar mejor la amplitud semántica del griego en combinación con ἐπὶ τὰ τέκνα αὐτῆς. Se mantiene 'asamblea' y la nota de alternativa más fuerte, pero con una redacción más idiomática en español.
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T23:00:27Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el sentido general del griego: exposición pública de la mujer ante la comunidad y una acción oficial respecto de sus hijos. ''Asamblea'' para ἐκκλησίαν está bien alineado, y la nota conserva la alternativa más fuerte para ἐπισκοπή. Sin embargo, ''escrutinio de sus hijos'' en español puede sugerir que los hijos mismos son examinados como sujetos directos, mientras que el griego con ἐπὶ τὰ τέκνα αὐτῆς deja mejor espacio para ''sobre/acerca de/con respecto a sus hijos''.'
  spanish_quality_summary: 'El español es claro y digno, pero ''escrutinio'' suena algo poco natural en este contexto jurídico-sapiencial. ''Habrá una inspección sobre sus hijos'' sería demasiado literal; una formulación más natural y fiel es ''habrá una investigación sobre sus hijos''. También conviene mantener la nota, pero con redacción más idiomática: ''visita sobre sus hijos'' no es natural en español; ''visita sobrevendrá a sus hijos'' o mejor ''habrá una visitación sobre sus hijos'' preserva el matiz técnico, aunque ''visitación'' puede sonar elevado. Dado el uso de la nota como alternativa formal, ''visitación'' es aceptable.'
  glossary_alignment: No hay conflicto con las directrices terminológicas del proyecto. 'Asamblea' evita correctamente un sentido eclesial posterior. No intervienen términos como Yahvé, Mesías, esclavo, etc. La decisión principal pendiente es estilístico-lexical para ἐπισκοπή, no de glosario doctrinal.
  issues:
  - severity: medium
    issue: La frase 'escrutinio de sus hijos' estrecha indebidamente la relación de ἐπισκοπὴ con ἐπὶ τὰ τέκνα αὐτῆς.
    rationale: El griego no necesariamente afirma que los hijos sean el objeto directo del escrutinio en sentido moderno, sino que habrá una revisión/investigación/visitación respecto de ellos. En español, 'de sus hijos' puede sonar demasiado directo y menos flexible que el original.
  - severity: low
    issue: La nota 'habrá una visita sobre sus hijos' suena poco idiomática en español.
    rationale: Aunque reproduce la preposición de forma cercana, 'visita sobre' no es natural en español bíblico actual. Conviene una alternativa que conserve el matiz de ἐπισκοπή sin sonar torpe.
  revised_spanish_text: Ella será llevada ante la asamblea[a], y habrá una investigación sobre sus hijos.
  revised_footnotes:
  - marker: a
    text: 'O: ''habrá una visitación sobre sus hijos'', quizá con la implicación de un castigo judicial más que de una simple investigación.'
    reason: alternative_reading
  revision_rationale: Se ajusta ἐπισκοπή a 'investigación' para un español más natural y para preservar mejor la amplitud semántica del griego en combinación con ἐπὶ τὰ τέκνα αὐτῆς. Se mantiene 'asamblea' y la nota de alternativa más fuerte, pero con una redacción más idiomática en español.
