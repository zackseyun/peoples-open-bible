revisions:
- from: 'Entonces Amasías[a], el sacerdote de Betel, envió mensaje a Jeroboam, rey de Israel, diciendo: «Amós se ha conspirado[b] contra ti en medio de la casa de Israel[c]; la tierra no puede soportar todas sus palabras».'
  to: 'Entonces Amasías[a], el sacerdote de Betel, envió mensaje a Jeroboam, rey de Israel, diciendo: «Amós ha conspirado[b] contra ti en medio de la casa de Israel[c]; la tierra no puede soportar[d] todas sus palabras»'
  rationale: Se corrige la forma no idiomática «se ha conspirado» a «ha conspirado», que es la equivalencia natural y fiel de קָשַׁר עָלֶיךָ. También se reorganizan las notas para que documenten alternativas reales del hebreo en lugar de compensar un error del texto principal. Conviene anclar las notas exactamente en las palabras pertinentes y conservar la lectura profética «casa de Israel».
