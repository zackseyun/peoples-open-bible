  to: para que todos los árboles junto a las aguas no crezcan en altura, ni pongan su copa entre las nubes[a], ni que ninguno de los que beben agua se yerga por encima de ellos en su altura[b]; porque todos han sido entregados a la muerte, a la tierra de abajo, entre los hijos de Adán, con los que descienden a la fosa.
