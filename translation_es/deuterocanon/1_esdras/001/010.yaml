base_translation:
  language: en
  yaml_path: translation/deuterocanon/1_esdras/001/010.yaml
  text: And when these things had taken place[a], the priests and the Levites stood in proper order, holding the unleavened bread, according to the tribes and according to the family divisions of the fathers, before the people, to offer to the Lord according to what is written in the book of Moses[b]; and so they did in the morning.
  footnotes:
  - marker: a
    text: Or 'according to the ancestral-house divisions' or 'according to their fathers' houses.'
    reason: lexical_alternative
  - marker: b
    text: The Greek here differs notably from the approximate Hebrew parallel in 2 Chronicles 35:10, which speaks of Levite leaders providing Passover animals; this translation follows the Greek text of 1 Esdras.
    reason: textual_variant
