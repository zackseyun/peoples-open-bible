translation:
  language: es
  text: Esta es la ley para aquel en quien hay una afección de enfermedad cutánea[a], y cuyos recursos no alcanzan para lo requerido en su purificación[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebreo צָרָעַת, tradicionalmente vertido «lepra», pero en Levítico designa de manera más amplia una serie de afecciones cutáneas graves y la impureza ritual relacionada.
    reason: lexical_alternative
  - marker: b
    text: Literalmente, «cuya mano no alcanza en su purificación», un modismo que expresa que no tiene medios suficientes para la ofrenda o los requisitos de purificación.
    reason: lexical_alternative
lexical_decisions:
- source_word: תּוֹרַת
  english_pob_choice: law
  chosen_spanish: ley
  alternatives_spanish:
  - instrucción
  - norma
  lexicon: HALOT
  rationale: En el contexto sacerdotal, תּוֹרָה introduce una disposición legal o ritual concreta. «Ley» es natural en español bíblico y conserva el valor normativo del hebreo sin sonar excesivamente técnico.
- source_word: בּוֹ
  english_pob_choice: in whom there is
  chosen_spanish: en quien hay
  alternatives_spanish:
  - que tiene
  - en él hay
  lexicon: HALOT
  rationale: La construcción hebrea con preposición y pronombre expresa que la afección está presente en la persona. «En quien hay» sigue de cerca esa estructura y funciona de manera idiomática en español.
- source_word: נֶגַע צָרָעַת
  english_pob_choice: an infection of skin disease
  chosen_spanish: una afección de sarna
  alternatives_spanish:
  - una aflicción de enfermedad de la piel
  - un caso de enfermedad cutánea
  - una infección de sarna
  lexicon: HALOT
  rationale: צָרָעַת no equivale de forma precisa a la lepra moderna. «Sarna» aquí funciona como término tradicional amplio para una afección cutánea, pero se mantiene con «afección» para reflejar נֶגַע como impacto/lesión y no borrar la ambigüedad del término hebreo.
- source_word: לֹא תַשִּׂיג יָדוֹ
  english_pob_choice: whose means cannot afford
  chosen_spanish: cuyos recursos no alcanzan
  alternatives_spanish:
  - a quien no le alcanzan los recursos
  - cuyo sustento no alcanza
  - cuya mano no alcanza
  lexicon: HALOT
  rationale: El hebreo es un modismo de insuficiencia económica. «Cuyos recursos no alcanzan» comunica el sentido económico de modo claro en español y preserva la idea de falta de medios sin traducir mecánicamente la imagen de la mano.
- source_word: בְּטָהֳרָתוֹ
  english_pob_choice: what is required for his cleansing
  chosen_spanish: para su purificación
  alternatives_spanish:
  - para su limpieza ritual
  - en su purificación
  - para lo que se requiere en su purificación
  lexicon: HALOT
  rationale: El contexto ritual exige «purificación» más que una limpieza material. La expansión inglesa «what is required for his cleansing» explica el sentido; en español, «para su purificación» expresa el proceso ritual sin añadir contenido no sustentado por el texto.
theological_decisions:
- issue: צָרָעַת como término ritual no equivalente a lepra moderna
  english_pob_reading: infection of skin disease
  chosen_spanish_reading: afección de sarna
  alternative_spanish_readings:
  - enfermedad de la piel
  - aflicción cutánea
  - sarna
  rationale: La nota del POB inglés advierte que el término tradicional «leprosy» puede inducir a error. En español, mantener una designación amplia evita identificar indebidamente la condición con la lepra clínica moderna, mientras que «afección» conserva el sentido de impureza/lesión ritual.
  doctrine_reference: Levítico 13–14; nota lexical sobre צָרָעַת
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión inglesa que sustituyó «whose hand cannot afford» por «whose means cannot afford», manteniendo el sentido idiomático de insuficiencia económica. La formulación española evita una traducción calcada de «mano» y conserva el valor ritual de «purificación».
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el texto hebreo lo exija explícitamente; este versículo no lo contiene.
  - Se mantiene «purificación» por el contexto levítico ritual, no «limpieza» ordinaria.
  - Se evita «lepra» en el cuerpo principal para no estrechar indebidamente צָרָעַת a una enfermedad moderna específica.
  - La sintaxis busca ser bíblica y clara en español, sin depender de una calca del inglés auditado.
