    issue: 'Construcción no idiomática: ''porque casa rebelde son'''
    rationale: Aunque intenta reflejar el orden enfático del hebreo, en español resulta forzado. 'Porque son una casa rebelde' conserva el sentido y la metáfora sin sacrificar legibilidad.
  - severity: medium
    issue: '''Hubo un profeta entre ellos'' reduce el matiz de presencia en medio de ellos'
    rationale: הָיָה בְתוֹכָם apunta a que un profeta estuvo/persistió entre ellos, no simplemente a que existió uno. 'Ha habido un profeta entre ellos' o 'ha estado entre ellos' comunica mejor el valor testimonial con relevancia presente.
  - severity: low
