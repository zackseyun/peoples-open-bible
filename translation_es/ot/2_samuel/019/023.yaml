translation:
  language: es
  text: 'Y David dijo[a]: «¿Qué tengo yo que ver con ustedes, hijos de Sarvia, para que hoy sean un adversario para mí? ¿Será ejecutado hoy algún hombre en Israel? Pues ¿no sé yo que hoy soy rey sobre Israel?»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «un satán para mí», es decir, «un adversario/opositor para mí».'
    reason: lexical_alternative
lexical_decisions:
- source_word: מַה לִּי וְלָכֶם
  english_pob_choice: What have I to do with you
  chosen_spanish: ¿Qué tengo yo que ver con ustedes?
  alternatives_spanish:
  - ¿Qué hay entre ustedes y yo?
  - ¿Qué tengo en común con ustedes?
  lexicon: HALOT
  rationale: La expresión hebrea es idiomática y marca separación/reprensión. El español natural conserva la fuerza sin calco rígido.
- source_word: בְּנֵי צְרוּיָה
  english_pob_choice: sons of Zeruiah
  chosen_spanish: hijos de Sarvia
  alternatives_spanish:
  - hijos de Zeruía
  - ustedes, hijos de Sarvia
  lexicon: HALOT
  rationale: Se mantiene el designio familiar concreto del hebreo. «Sarvia» es una forma castellana clara y breve para el nombre propio.
- source_word: לְשָׂטָן
  english_pob_choice: an adversary to me
  chosen_spanish: un adversario
  alternatives_spanish:
  - un opositor
  - un satanás
  lexicon: HALOT
  rationale: Aquí שָׂטָן funciona como sustantivo común con sentido de oposición. «Adversario» conserva el valor léxico sin introducir asociaciones demonológicas ajenas al contexto.
- source_word: יּוּמַת אִישׁ
  english_pob_choice: Shall any man be put to death
  chosen_spanish: ¿Habrá de morir hoy algún hombre?
  alternatives_spanish:
  - ¿Se hará morir hoy a algún hombre?
  - ¿Será ejecutado hoy algún hombre?
  lexicon: HALOT
  rationale: La forma hebrea tiene matiz de muerte provocada/judicial. En español, la pasiva perifrástica puede sonar dura; la formulación mantiene la pregunta retórica y la idea de muerte causada, con fluidez pública.
- source_word: אִישׁ
  english_pob_choice: man
  chosen_spanish: algún hombre
  alternatives_spanish:
  - alguna persona
  - alguien
  lexicon: HALOT
  rationale: Se conserva el singular genérico del hebreo, que aquí funciona representativamente.
- source_word: הֲלוֹא יָדַעְתִּי
  english_pob_choice: do I not know
  chosen_spanish: ¿no sé yo?
  alternatives_spanish:
  - ¿acaso no sé?
  - bien sé yo
  lexicon: HALOT
  rationale: La pregunta retórica se expresa de modo natural en español y preserva el énfasis afirmativo implícito.
- source_word: מֶלֶךְ עַל יִשְׂרָאֵל
  english_pob_choice: king over Israel
  chosen_spanish: rey sobre Israel
  alternatives_spanish:
  - rey de Israel
  - rey acerca de Israel
  lexicon: HALOT
  rationale: «Sobre» reproduce mejor el עַל del hebreo y conserva la idea de autoridad real ejercida sobre el pueblo.
theological_decisions:
- issue: Sentido de שָׂטָן como término común y no nombre propio
  english_pob_reading: common noun 'adversary' rather than the proper name Satan
  chosen_spanish_reading: «adversario» como sustantivo común, no como «Satanás»
  alternative_spanish_readings:
  - Satanás
  - enemigo
  rationale: El contexto narrativo inmediato describe oposición humana concreta. Traducir con nombre propio introduciría una lectura teológica no exigida por el hebreo.
  doctrine_reference: Primacía del sentido inmediato del texto original; evitar importación de doctrinas por tradición de traducción.
translation_notes:
  revision_awareness: La versión inglesa auditada pasó de «become an adversary» a «be an adversary» por mayor naturalidad y directitud. La redacción española adopta esa misma decisión semántica, evitando verbos de cambio innecesarios y manteniendo la tensión retórica del hebreo.
  spanish_consistency_notes:
  - Se usa «Yahvé» como norma general del proyecto, pero este versículo no contiene el tetragrámaton.
  - Se prefiere «adversario» para שָׂטָן en contexto histórico narrativo, no «Satanás».
  - Se mantiene el singular genérico «hombre» para אִישׁ, sin convertirlo en plural o término abstracto.
  - La puntuación y el trato directo siguen el tono de reprensión y la interrogación retórica del hebreo.
