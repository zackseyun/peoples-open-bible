  yaml_path: translation/ot/jeremiah/037/010.yaml
  text: For even if you were to strike down the whole army of the Chaldeans who are fighting against you[a], and only wounded men remained among them, each in his tent[b], they would rise up and burn this city with fire.
  footnotes:
