  rationale: Se revisa el verbo para reflejar mejor el matiz solemne-formal de צוה en este contexto jurídico, en línea con la decisión inglesa 'charged'. Se mueve el marcador léxico al verbo, donde corresponde. También se pule el modismo a «ante sus ojos» para una expresión más natural y digna en español, sin perder la literalidad ni la nota explicativa.
