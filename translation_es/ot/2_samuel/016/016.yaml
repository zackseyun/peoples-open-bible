translation:
  language: es
  text: 'Y cuando Husai el arquita llegó a Absalón, Husai dijo a Absalón: «¡Viva[a] el rey! ¡Viva el rey!»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «¡Que viva el rey!». El hebreo es una aclamación real.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְהִי כַּאֲשֶׁר
  english_pob_choice: And when
  chosen_spanish: Y cuando
  alternatives_spanish:
  - Ahora cuando
  - Y aconteció que cuando
  lexicon: HALOT
  rationale: La fórmula narrativa hebrea introduce el siguiente evento; en español, «Y cuando» conserva la secuencia y suena natural sin añadir palabras interpretativas.
- source_word: בָּא
  english_pob_choice: came
  chosen_spanish: llegó
  alternatives_spanish:
  - vino
  - entró
  - arribó
  lexicon: HALOT
  rationale: En este contexto de arribo a Absalón, «llegó» expresa con claridad la llegada de Hushai sin sonar demasiado literal ni técnico.
- source_word: חוּשַׁי הָאַרְכִּי
  english_pob_choice: Hushai the Archite
  chosen_spanish: Hushai el arquita
  alternatives_spanish:
  - Husai el arquita
  - Hushai el arquita de Arca
  lexicon: HALOT
  rationale: Se conserva el nombre propio y el gentilicio en forma transparente. «Arquita» sigue el valor étnico/toponímico del hebreo הָאַרְכִּי sin sustituirlo por una equivalencia eclesiástica o explicativa no atestiguada.
- source_word: רֵעֶה דָוִד
  english_pob_choice: David’s friend
  chosen_spanish: amigo de David
  alternatives_spanish:
  - amigo de David
  - compañero de David
  lexicon: HALOT
  rationale: La relación constructa se expresa de forma directa y natural en español. «Amigo» preserva el vínculo personal/político sin sobrecargar el texto.
- source_word: אֶל אַבְשָׁלֹם
  english_pob_choice: to Absalom
  chosen_spanish: a Absalón
  alternatives_spanish:
  - ante Absalón
  - hacia Absalón
  lexicon: HALOT
  rationale: «A Absalón» reproduce la dirección/encuentro del hebreo y funciona bien tanto con la llegada como con la declaración directa.
- source_word: וַיֹּאמֶר
  english_pob_choice: said
  chosen_spanish: dijo
  alternatives_spanish:
  - habló
  - respondió
  lexicon: HALOT
  rationale: La fórmula estándar de introducción de discurso directo en español es «dijo»; mantiene la simplicidad del hebreo.
- source_word: יְחִי הַמֶּלֶךְ
  english_pob_choice: Long live the king!
  chosen_spanish: ¡Viva el rey!
  alternatives_spanish:
  - ¡Que viva el rey!
  - ¡Viva el rey, el rey!
  lexicon: HALOT
  rationale: El jussivo en contexto de aclamación real se expresa idiomáticamente como «¡Viva el rey!», equivalente natural de la fórmula ceremonial hebrea.
- source_word: יְחִי הַמֶּלֶךְ (repeated)
  english_pob_choice: Long live the king!
  chosen_spanish: ¡Viva el rey!
  alternatives_spanish:
  - ¡Que viva el rey!
  lexicon: HALOT
  rationale: Se conserva la repetición para reflejar el énfasis del hebreo y la ironía narrativa del contexto sin explicitarla en la traducción.
theological_decisions:
- issue: Aclamación real ambigua de Hushai frente a Absalón
  english_pob_reading: Retain the literal royal acclamation without interpretive expansion
  chosen_spanish_reading: Conservar la aclamación real sin explicitar la ironía o el engaño
  alternative_spanish_readings:
  - Aclarar que es una fórmula irónica
  - Añadir una nota dentro del texto sobre la intención estratégica
  rationale: El versículo presenta una aclamación real normal; la tensión narrativa queda en el contexto, no en la formulación. Por eso conviene no resolverla dentro del versículo ni adelantar la intención de Hushai.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: El texto sigue de cerca el WLC y el audit trail en inglés POB. Se mantiene la repetición de la aclamación, la relación «amigo de David» y la fórmula narrativa breve, sin introducir explicaciones sobre la intención de Hushai que el versículo no expresa explícitamente.
  spanish_consistency_notes:
  - Se usó «Yahvé» solo cuando el texto fuente lo requiera; aquí no aparece.
  - Se evitó «SEÑOR» por convención de máscara porque el versículo no contiene el nombre divino.
  - Se mantuvo «Hushai» como transliteración estable del nombre propio, siguiendo el contexto dado.
  - Se conservó la aclamación como fórmula ceremonial, no como comentario interpretativo.
