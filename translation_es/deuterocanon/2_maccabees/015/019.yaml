translation:
  language: es
  text: Y para los que estaban confinados en la ciudad, la angustia no era asunto menor, pues estaban turbados por el ataque en campo abierto[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «del asalto en campo abierto». La frase griega contrasta a los que estaban en la ciudad con la lucha que ocurría fuera de ella.
    reason: lexical_alternative
lexical_decisions:
- source_word: κατειλημμένοις
  english_pob_choice: confined
  chosen_spanish: confinados
  alternatives_spanish:
  - encerrados
  - ceñidos
  - retenidos
  lexicon: LSJ
  rationale: El participio perfecto pasivo expresa a personas bajo restricción o presionadas dentro de la ciudad; «confinados» conserva ese matiz de estar limitados por las circunstancias sin sonar demasiado coloquial.
- source_word: οὐ πάρεργος
  english_pob_choice: no small matter
  chosen_spanish: no era asunto menor
  alternatives_spanish:
  - no era cosa secundaria
  - no era algo incidental
  - no era cosa de poca importancia
  lexicon: LSJ
  rationale: La expresión intensifica ἀγωνία y niega que fuera algo secundario. «No era asunto menor» comunica bien la fuerza idiomática en español natural y formal.
- source_word: ἀγωνία
  english_pob_choice: anxiety
  chosen_spanish: angustia
  alternatives_spanish:
  - ansiedad
  - aflicción
  - angustia intensa
  lexicon: LSJ
  rationale: El término designa lucha interior, tensión y aflicción mental. «Angustia» transmite mejor la carga emocional que «ansiedad» en este contexto bélico, sin perder la idea de inquietud.
- source_word: ταρασσομένοις
  english_pob_choice: as they were troubled
  chosen_spanish: estaban turbados
  alternatives_spanish:
  - estaban perturbados
  - estaban inquietos
  - se hallaban agitados
  lexicon: LSJ
  rationale: El participio explica la condición emocional de los de la ciudad. «Turbados» mantiene un registro digno y refleja la agitación interna con fidelidad.
- source_word: τῆς ἐν ὑπαίθρῳ προσβολῆς
  english_pob_choice: about the attack in the open country
  chosen_spanish: por el ataque en campo abierto
  alternatives_spanish:
  - por el asalto en campo abierto
  - por el ataque en la llanura
  - por el asalto en el campo abierto
  lexicon: LSJ
  rationale: προσβολή aquí es un ataque militar; ἐν ὑπαίθρῳ contrasta con la ciudad y apunta al espacio abierto fuera de ella. «Campo abierto» conserva el contraste espacial y suena natural en español.
translation_notes:
  revision_awareness: 'El texto griego y el audit trail inglés concuerdan de forma alta. La principal decisión española fue elegir un registro formal-natural: «confinados»/«angustia»/«turbados», manteniendo el contraste entre la ciudad y el combate exterior. Se preservó la alternativa léxica de προσβολή mediante nota, como en el inglés POB.'
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» como norma del proyecto solo cuando aparezca el nombre divino; este versículo no lo contiene.
  - Se evitó «SEÑOR» y «Cristo» por no corresponder al texto.
  - «Confinados» conserva mejor el matiz pasivo de restricción que un mero «estaban en la ciudad».
  - «Campo abierto» reproduce la oposición ciudad/exterior sin introducir una connotación agrícola innecesaria.
