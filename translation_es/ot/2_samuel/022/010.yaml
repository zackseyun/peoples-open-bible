translation:
  language: es
  text: Inclinó los cielos y descendió; espesa oscuridad[a] estaba bajo sus pies.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: También puede traducirse 'nube oscura'; el hebreo עֲרָפֶל puede denotar una densa oscuridad asociada con la aparición divina.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֵּט
  english_pob_choice: bent
  chosen_spanish: Extendió
  alternatives_spanish:
  - inclinó
  - dobló
  lexicon: HALOT
  rationale: נטה aquí toma como objeto a 'los cielos' y expresa una acción poética de hacerlos ceder o curvarse hacia abajo. 'Extendió' conserva el movimiento amplio y solemne en español, sin perder la imagen cósmica; 'inclinó' y 'dobló' son posibles, pero 'extendió' comunica mejor la acción en una línea poética breve.
- source_word: שָׁמַיִם
  english_pob_choice: the heavens
  chosen_spanish: los cielos
  alternatives_spanish:
  - el cielo
  - los cielos
  lexicon: HALOT
  rationale: El plural hebreo normalmente designa 'los cielos' en un registro cosmológico. En español, el plural mantiene mejor la amplitud poética y la escala teofánica que 'el cielo', que puede sonar más reducido o meteorológico.
- source_word: וַיֵּרַד
  english_pob_choice: came down
  chosen_spanish: descendió
  alternatives_spanish:
  - bajó
  - vino abajo
  lexicon: HALOT
  rationale: ירד señala movimiento hacia abajo. 'Descendió' conserva el valor formal y solemne del poema, mientras que 'bajó' sería más coloquial; 'vino abajo' no resulta natural aquí.
- source_word: וַעֲרָפֶל
  english_pob_choice: thick darkness
  chosen_spanish: espesa oscuridad
  alternatives_spanish:
  - oscuridad densa
  - oscuro nubarrón
  - nube oscura
  lexicon: HALOT
  rationale: עֲרָפֶל denota oscuridad densa o bruma tenebrosa asociada con la manifestación divina. 'Espesa oscuridad' conserva la densidad física y la atmósfera teofánica sin forzar una paráfrasis como 'nube oscura'.
- source_word: תַּחַת
  english_pob_choice: under
  chosen_spanish: bajo
  alternatives_spanish:
  - debajo de
  - bajo
  lexicon: HALOT
  rationale: La preposición espacial se expresa de manera natural y sobria con 'bajo' en español poético. Mantiene la relación concreta con los pies sin sobrecargar la línea.
- source_word: רַגְלָיו
  english_pob_choice: his feet
  chosen_spanish: sus pies
  alternatives_spanish:
  - sus pies
  - sus pasos
  lexicon: HALOT
  rationale: El hebreo dice literalmente 'sus pies'. Se conserva la imagen corporal concreta, evitando 'sus pasos', que suavizaría la materialidad del texto.
theological_decisions:
- issue: Imaginería antropomórfica de la teofanía
  english_pob_reading: 'Retain the bodily and spatial imagery literally: ''came down'' and ''under his feet.'''
  chosen_spanish_reading: 'Conservar literalmente el movimiento corporal y espacial: ''descendió'' y ''bajo sus pies''.'
  alternative_spanish_readings:
  - Se manifestó desde el cielo
  - apareció en la oscuridad
  rationale: El hebreo presenta una teofanía poética con lenguaje corporal. La traducción debe preservar esa tensión entre la trascendencia divina y la imagen corporal, en vez de suavizarla con una explicación abstracta.
  doctrine_reference: Translation philosophy §3
translation_notes:
  revision_awareness: 'Coincide con el pasaje hebreo y con el audit trail inglés: la línea conserva la teofanía antropomórfica, la relación espacial descendente y la ambigüedad lexical de עֲרָפֶל, sin introducir revisiones posteriores.'
  spanish_consistency_notes:
  - Se usa 'Yahvé' en la nota para mantener la terminología POB cuando se alude a la aparición divina.
  - Se evita 'SEÑOR' como máscara del nombre divino, conforme a las directrices del proyecto.
  - '''Los cielos'' conserva el plural cosmológico del hebreo en un registro poético elevado.'
  - '''Sus pies'' mantiene la imagen corporal explícita del texto fuente.'
