- from: Porque ellos son mis esclavos[a], a quienes saqué de la tierra de Egipto[b]; no serán vendidos como se vende a un esclavo.
  to: Porque ellos son mis esclavos[a], a quienes saqué de la tierra de Egipto; no serán vendidos como se venden los esclavos[b].
  rationale: Se corrige el anclaje de la nota [b] para que corresponda a מִמְכֶּרֶת עָבֶד, se elimina la referencia confusa a 'de la tierra de Egipto' dentro de esa nota, y se ajusta la cláusula final a una formulación española más natural y mejor alineada con el audit trail inglés, manteniendo la fuerza legal del hebreo.
