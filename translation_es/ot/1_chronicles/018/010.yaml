translation:
  language: es
  text: Y envió a Hadoram, su hijo, al rey David para preguntar por su bienestar[a] y para bendecirlo[b], porque había combatido contra Hadadézer y lo había derrotado, pues Hadadézer había estado en guerra con Tou[c]; y le envió toda clase de objetos de oro, de plata y de bronce[d].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «para preguntarle por su paz». El hebreo usa «paz» en sentido idiomático de bienestar, no solo de ausencia de guerra.
    reason: lexical_alternative
  - marker: b
    text: O «para felicitarlo». El verbo literalmente significa «bendecirlo», aquí en un contexto diplomático tras la victoria.
    reason: lexical_alternative
  - marker: c
    text: Literalmente, «porque Hadadézer era un hombre de guerras con Tou»; es un modismo que significa que Hadadézer había estado en guerra con Tou.
    reason: lexical_alternative
  - marker: d
    text: El hebreo termina con «y todos los objetos de oro, plata y bronce»; en español se suple «le envió» por el contexto.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּשְׁלַח
  english_pob_choice: So he sent
  chosen_spanish: Así envió
  alternatives_spanish:
  - Y envió
  - Entonces envió
  lexicon: HALOT
  rationale: El wayyiqtol narrativo introduce la secuencia de acciones; «Así» conserva la continuidad narrativa y suena natural en español sin perder el valor consecutivo.
- source_word: הֲדוֹרָם בְּנוֹ
  english_pob_choice: Hadoram his son
  chosen_spanish: Hadoram, su hijo
  alternatives_spanish:
  - Hadoram su hijo
  lexicon: HALOT
  rationale: Se translitera el nombre propio y se mantiene la aposición filial de forma clara y directa.
- source_word: לִשְׁאוֹל לוֹ לְשָׁלוֹם
  english_pob_choice: to ask about his welfare
  chosen_spanish: para preguntar por su bienestar
  alternatives_spanish:
  - para informarse de su paz
  - para preguntarle por su paz
  lexicon: HALOT
  rationale: El hebreo usa «paz» en sentido idiomático de bienestar, no solo ausencia de guerra. «Bienestar» preserva ese valor semántico y evita una traducción demasiado literal o ambigua en español.
- source_word: וּלְבָרֲכוֹ
  english_pob_choice: and to bless him
  chosen_spanish: y para bendecirlo
  alternatives_spanish:
  - y para felicitarlo
  - y para saludarlo con bendición
  lexicon: HALOT
  rationale: Se conserva el verbo «bendecir» como equivalente básico de ברך. Aunque el contexto es diplomático y puede implicar felicitación, no se elimina la fuerza lexical principal.
- source_word: עַל אֲשֶׁר נִלְחַם בַּהֲדַדְעֶזֶר וַיַּכֵּהוּ
  english_pob_choice: because he had fought against Hadadezer and struck him down
  chosen_spanish: porque había combatido contra Hadadézer y lo había derrotado
  alternatives_spanish:
  - porque había peleado contra Hadadézer y lo había abatido
  - porque había guerreado contra Hadadézer y lo había vencido
  lexicon: HALOT
  rationale: «Combatido contra» expresa bien la oposición marcada por נלחם ב. «Derrotado» comunica el resultado militar sin sugerir más de lo que el texto afirma. Se evita cargar el verbo con la idea de muerte.
- source_word: כִּי אִישׁ מִלְחֲמוֹת תֹּעוּ הָיָה הֲדַדְעָזֶר
  english_pob_choice: for Hadadezer had been at war with Tou
  chosen_spanish: pues Hadadézer había estado en guerra con Tou
  alternatives_spanish:
  - porque Hadadézer era hombre de guerras con Tou
  - pues Hadadézer había sido enemigo de Tou en la guerra
  lexicon: HALOT
  rationale: Se resuelve el hebraísmo «hombre de guerras» con una equivalencia idiomática clara. «Había estado en guerra con Tou» preserva el sentido relacional y bélico que el POB inglés también explicitó.
- source_word: וְכֹל כְּלֵי זָהָב וָכֶסֶף וּנְחֹשֶׁת
  english_pob_choice: and he sent all kinds of articles of gold and silver and bronze
  chosen_spanish: y con toda clase de objetos de oro, de plata y de bronce
  alternatives_spanish:
  - y con toda clase de utensilios de oro, plata y bronce
  - y con toda clase de vasos de oro, plata y bronce
  lexicon: HALOT
  rationale: El hebreo final es nominal y el inglés suplió el verbo por contexto. En español, «con» comunica la carga acompañante de la embajada sin inventar un verbo no explícito. «Objetos» traduce כְּלֵי de forma amplia y sobria; «bronce» sigue la preferencia del POB inglés para נְחֹשֶׁת.
theological_decisions:
- issue: Sentido de שָׁלוֹם en un contexto diplomático
  english_pob_reading: to ask about his welfare
  chosen_spanish_reading: para preguntar por su bienestar
  alternative_spanish_readings:
  - para preguntarle por su paz
  - para informarse de su paz
  rationale: No se reduce שָׁלוֹם a la ausencia de conflicto; aquí funciona como fórmula de cortesía diplomática sobre la condición de David. «Bienestar» comunica ese alcance sin perder la base léxica.
  doctrine_reference: Semántica bíblica de שָׁלוֹם
- issue: Naturaleza de וּלְבָרֲכוֹ en una misión política
  english_pob_reading: and to bless him
  chosen_spanish_reading: y para bendecirlo
  alternative_spanish_readings:
  - y para felicitarlo
  - y para saludarlo con bendición
  rationale: Se mantiene «bendecir» porque el texto hebreo usa ברך; aunque el acto sea diplomático y pueda acercarse a felicitación, no conviene reemplazarlo por una paráfrasis que borre la elección verbal del original.
  doctrine_reference: Léxico bíblico de bendición
- issue: Expresión idiomática «hombre de guerras»
  english_pob_reading: for Hadadezer had been at war with Tou
  chosen_spanish_reading: pues Hadadézer había estado en guerra con Tou
  alternative_spanish_readings:
  - pues Hadadézer era hombre de guerras con Tou
  - pues Hadadézer era enemigo de Tou en la guerra
  rationale: 'La frase hebrea es idiomática y no debe trasladarse de manera rígida. La formulación elegida conserva la tensión: el texto literalmente habla de «hombre de guerras», pero su sentido claro es una hostilidad bélica sostenida.'
  doctrine_reference: Idiomatismo hebreo y traducción por sentido
translation_notes:
  revision_awareness: 'El texto español sigue de cerca el hebreo WLC y la solución ya auditada en inglés POB, sin cambios respecto del sentido aprobado por la revisión más reciente. Se han conservado las tensiones léxicas documentadas: שָׁלוֹם como bienestar, ברך como bendecir en contexto diplomático, y el hebraísmo de «hombre de guerras» como guerra sostenida.'
  spanish_consistency_notes:
  - Se usa «Hadadézer» con tilde para adaptación gráfica consistente en español.
  - Se mantiene la transliteración «Tou» conforme al nombre propio en el paquete fuente y al POB inglés.
  - «Bronce» se conserva como metal antiguo preferible a «latón» o «bronce/latón» en este contexto.
  - La puntuación sigue un flujo narrativo natural en español, sin añadir contenido interpretativo no sustentado por el texto.
