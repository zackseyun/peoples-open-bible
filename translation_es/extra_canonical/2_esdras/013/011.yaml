  text: And all these were mixed together—the wave of fire, the breath of flame, and the great storm—and it fell upon the assault of the multitude that had prepared to fight, and burned them all up, so that suddenly nothing could be seen of the innumerable multitude except only the dust of ashes and the smell of smoke. And I saw it and was astonished.
