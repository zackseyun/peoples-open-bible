    issue: «habrá» para יִהְיֶה
    rationale: El inglés auditado fue revisado a «shall be for» para acercarse más al hebreo. En español, «será para» preserva mejor esa estructura que «habrá para», que introduce un matiz existencial menos directo.
  - severity: low
    issue: Repetición «extranjero residente que reside»
    rationale: Es inteligible, pero estilísticamente pesada. «Que vive» o «que habita» mantiene el sentido del participio הַגָּר y mejora la fluidez.
  - severity: low
    issue: «entre ustedes» frente a «en medio de ustedes»
    rationale: «Entre ustedes» es correcto, pero בְּתוֹכְכֶם expresa más literalmente la idea de estar dentro de la comunidad. «En medio de ustedes» suena natural y ligeramente más fiel en este contexto bíblico.
  revised_spanish_text: Una sola ley será para el nativo y para el extranjero residente que vive en medio de ustedes[a].
