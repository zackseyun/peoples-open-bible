translation:
  language: es
  text: y su ofrenda vegetal y sus libaciones, para los toros, para los carneros y para los corderos, según su número, según la ordenanza[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘según la manera prescrita’. El hebreo כַּמִּשְׁפָּט se refiere a la regla establecida para cómo debían presentarse estas ofrendas.
    reason: lexical_alternative
lexical_decisions:
- source_word: מִנְחָתָם
  english_pob_choice: their grain offering
  chosen_spanish: su ofrenda vegetal
  alternatives_spanish:
  - su ofrenda de grano
  - su ofrenda cereal
  - su oblación
  lexicon: HALOT
  rationale: מִנְחָה en contexto sacrificial designa la ofrenda de cereal o vegetal, no una ofrenda genérica. ‘Ofrenda vegetal’ comunica esa clase de ofrenda en español moderno y mantiene la especificidad cultual.
- source_word: נִסְכֵּיהֶם
  english_pob_choice: their drink offerings
  chosen_spanish: sus libaciones
  alternatives_spanish:
  - sus ofrendas derramadas
  - sus ofrendas de bebida
  lexicon: HALOT
  rationale: נֶסֶךְ se refiere a ofrendas derramadas de bebida. ‘Libaciones’ es un término español preciso y tradicional para este rito, sin perder el sentido sacrificial.
- source_word: לַפָּרִים
  english_pob_choice: for the bulls
  chosen_spanish: para los toros
  alternatives_spanish:
  - para los toros jóvenes
  - para los bueyes
  lexicon: HALOT
  rationale: פָּר puede referirse al toro destinado al sacrificio. ‘Toros’ es natural en español y conserva la referencia animal sin añadir ‘joven’, que no está explícito en el hebreo.
- source_word: לָאֵילִם
  english_pob_choice: for the rams
  chosen_spanish: para los carneros
  alternatives_spanish:
  - para los machos carneros
  lexicon: HALOT
  rationale: אַיִל significa ‘carnero’. En español bíblico y común, ‘carneros’ es claro y fiel al animal sacrificial indicado.
- source_word: וְלַכְּבָשִׂים
  english_pob_choice: and for the lambs
  chosen_spanish: y para los corderos
  alternatives_spanish:
  - y para los corderos machos
  lexicon: HALOT
  rationale: כֶּבֶשׂ se traduce de forma natural como ‘cordero’. ‘Corderos’ mantiene la referencia sacrificial sin sobreespecificar sexo, como permite el hebreo aquí.
- source_word: בְּמִסְפָּרָם
  english_pob_choice: according to their number
  chosen_spanish: según su número
  alternatives_spanish:
  - de acuerdo con su número
  - conforme a su número
  lexicon: HALOT
  rationale: La frase marca correspondencia con la cantidad prescrita. ‘Según su número’ es idiomático en español y conserva la relación cuantitativa.
- source_word: כַּמִּשְׁפָּט
  english_pob_choice: according to the ordinance
  chosen_spanish: conforme al rito
  alternatives_spanish:
  - conforme al orden establecido
  - según el precepto
  - según la ordenanza
  lexicon: HALOT
  rationale: מִשְׁפָּט en este contexto cultual señala la norma prescrita para presentar las ofrendas. ‘Rito’ comunica bien la idea procedimental en español, aunque ‘ordenanza’ o ‘precepto’ también son posibles. Se evita ‘costumbre’ porque debilita el carácter normativo.
translation_notes:
  revision_awareness: Se corrigió el problema de validación eliminando la nota a no anclada. La traducción mantiene el sentido cultual del hebreo y la equivalencia funcional del audit trail inglés sin introducir glosas innecesarias.
  spanish_consistency_notes:
  - 'Se mantuvo la secuencia de ofrendas en el orden del hebreo: ofrenda vegetal, libaciones, toros, carneros y corderos.'
  - Se evitó ‘SEÑOR’ u otras sustituciones no presentes porque el versículo no contiene el nombre divino.
  - ‘Rito’ se usó como equivalente breve y natural para el valor normativo de כַּמִּשְׁפָּט en este contexto sacrificial.
