  to: ¡Alaben a Yah![a] Den gracias a Yahvé, porque él es bueno, porque su amor fiel permanece para siempre.
  rationale: Se mantiene la fidelidad al hebreo y a la terminología del proyecto, pero se repara la última cláusula para lograr un español natural y una mejor correspondencia con la decisión auditada de expresar duración continua («endures forever»).
