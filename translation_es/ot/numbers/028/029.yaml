lexical_decisions:
- source_word: עִשָּׂרוֹן עִשָּׂרוֹן
  english_pob_choice: a tenth
  chosen_spanish: una décima
  alternatives_spanish:
  - un décimo
  - una décima parte
  lexicon: HALOT
  rationale: 'La repetición hebrea expresa una medida distributiva: una porción de décimo para cada animal. En español, “una décima” comunica de forma breve y natural la misma medida sin añadir “de un efa”, ya que ese dato no está en el hebreo de este versículo y la revisión inglesa lo retiró.'
- source_word: לַכֶּבֶשׂ הָאֶחָד
  english_pob_choice: for each lamb
  chosen_spanish: por cada cordero
  alternatives_spanish:
  - para cada cordero
  - para el cordero uno
  lexicon: HALOT
  rationale: El hebreo dice literalmente “para el cordero uno”, pero la construcción distributiva pide en español una formulación natural. “Por cada cordero” preserva el sentido de asignación individual sin perder la fuerza distributiva.
- source_word: לְשִׁבְעַת הַכְּבָשִׂים
  english_pob_choice: for the seven lambs
  chosen_spanish: para los siete corderos
  alternatives_spanish:
  - para siete corderos
  - para los siete corderos ya mencionados
  lexicon: HALOT
  rationale: Se mantiene el artículo implícito del hebreo y la referencia al conjunto concreto de siete animales. “Los siete corderos” suena natural en español y conserva el enlace contextual con la prescripción anterior.
translation_notes:
  revision_awareness: La revisión inglesa reciente eliminó “of an ephah” porque no está presente en este versículo; por eso la versión española no lo añade. También se mantuvo el valor distributivo de la expresión hebrea repetida עִשָּׂרוֹן עִשָּׂרוֹן mediante una nota breve.
  spanish_consistency_notes:
  - Se evita “de un efa” para no introducir un dato ausente en el texto base.
  - “Cordero” se usa para כֶּבֶשׂ siguiendo el registro sacrificial y la equivalencia ya establecida por el audit trail inglés.
  - La nota[a] conserva la tensión entre literalidad y sentido distributivo, como en el inglés POB.
