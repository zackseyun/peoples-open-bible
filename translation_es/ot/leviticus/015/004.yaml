review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien el hebreo en la estructura legal y en la referencia masculina explícita: ''Todo ... sobre el cual ... quedará impuro''. También preserva adecuadamente la idea de impureza ritual con ''impuro''. Sin embargo, ''vasija'' no representa bien הַכְּלִי en este contexto, porque en español sugiere principalmente un recipiente, mientras que aquí se trata de cualquier artículo u objeto sobre el cual alguien pueda sentarse. El inglés auditado ya señaló esa amplitud con una nota alternativa, y el español actual introduce una imagen demasiado estrecha.'
  spanish_quality_summary: El español es generalmente claro y digno. 'Lecho' funciona bien para הַמִּשְׁכָּב y mejora la amplitud semántica frente a 'cama'. 'Varón con flujo' es comprensible, aunque algo rígido; no requiere cambio. La principal dificultad de legibilidad y precisión está en 'vasija', que suena poco natural para un objeto de asiento. 'Objeto' o 'artículo' encajan mejor en español moderno y en el contexto. Además, al cambiar a 'objeto', debe ajustarse la concordancia relativa al masculino.
  glossary_alignment: 'No hay conflictos con la terminología base del proyecto. No aparecen Yahvé, Mesías, δοῦλος, etc. La decisión ''impuro'' concuerda con la rationale teológica auditada. La referencia masculina explícita también está bien mantenida. La única desviación importante es léxica-contextual: הַכְּלִי no debe limitarse a ''vasija'' en español aquí.'
  issues:
  - severity: high
    issue: '''Vasija'' estrecha indebidamente הַכְּלִי'
    rationale: כְּלִי es un término amplio para artículo, utensilio, vaso/recipiente u objeto. En este versículo designa algo sobre lo cual el hombre se sienta; 'vasija' en español suele evocar un recipiente y no un objeto de asiento, por lo que distorsiona el referente contextual.
  - severity: low
    issue: La nota sobre 'lecho' no corresponde a una alternativa preservada por el inglés ni resuelve una ambigüedad nueva necesaria
    rationale: El inglés auditado no añadió nota para 'bed'. En español, 'lecho' ya expresa bien la amplitud semántica; la nota no es errónea, pero no hace falta. En cambio, sí conviene conservar una nota para el término amplio כְּלִי si se traduce con 'objeto'.
  revised_spanish_text: Todo lecho sobre el cual se acueste el varón con flujo quedará impuro, y todo objeto[a] sobre el cual se siente quedará impuro.
  revised_footnotes:
  - marker: a
    text: O 'artículo' o 'utensilio'. El hebreo puede referirse de manera amplia a un objeto, utensilio o recipiente.
    reason: lexical_alternative
  revision_rationale: Se reemplaza 'vasija' por 'objeto' para reflejar mejor la amplitud de כְּלִי en este contexto y evitar la imagen demasiado estrecha de un recipiente. Se ajusta la concordancia a 'todo objeto ... impuro'. Se elimina la nota de 'lecho' por innecesaria y se conserva una sola nota léxica donde sí hay una amplitud significativa que el español podría estrechar.
