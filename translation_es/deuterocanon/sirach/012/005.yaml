translation:
  language: es
  text: No le des tu pan[a], no sea que por él se ponga contra ti[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo difícil: literalmente algo como «vasijas/cosas de pan»; el paralelo griego apoya más claramente el sentido de «pan» o «alimento».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «para que no te domine por él». El griego refuerza más fuertemente la idea de dominio hostil.'
    reason: alternative_reading
lexical_decisions:
- source_word: כְּלֵי לָחֶם
  english_pob_choice: your bread
  chosen_spanish: pan
  alternatives_spanish:
  - alimento
  - provisiones
  - tu pan
  lexicon: HALOT
  rationale: El hebreo transmitido es difícil y la versión griega apoya claramente la idea de pan o alimento. En español, «pan» conserva la imagen concreta y permite una lectura natural; «alimento» sería más explicativo, pero menos cercano a la metáfora concreta del texto.
- source_word: אַל תִּתֵּן לוֹ
  english_pob_choice: Do not give him
  chosen_spanish: No des
  alternatives_spanish:
  - No le des
  - No lo des
  - No le des a él
  lexicon: HALOT
  rationale: Es una prohibición directa. En español, la forma imperativa negativa breve es natural y fiel al mandato.
- source_word: לָמָּה
  english_pob_choice: lest
  chosen_spanish: para que no
  alternatives_spanish:
  - no sea que
  - a fin de que no
  - para que
  lexicon: HALOT
  rationale: La partícula hebrea es problemática; el paralelo griego expresa una finalidad negativa preventiva. «Para que no» comunica esa advertencia sin forzar un giro ajeno al sentido del conjunto.
- source_word: בָם
  english_pob_choice: by it
  chosen_spanish: por medio de él
  alternatives_spanish:
  - por ellos
  - por ello
  - por él
  lexicon: HALOT
  rationale: El hebreo tiene un pronombre plural, pero el referente concreto en español queda mejor representado como la acción de dar pan/alimento. «Por medio de él» conserva la idea instrumental y evita una pluralidad artificial en español.
- source_word: יַקְבִּיל אֵלֶיךָ
  english_pob_choice: he set himself against you
  chosen_spanish: te domine
  alternatives_spanish:
  - se ponga contra ti
  - te haga frente
  - te prevalezca
  lexicon: HALOT
  rationale: El hebreo sugiere venir contra o enfrentarse, mientras que el griego usa δυναστεύσῃ, «dominar/tiranizar». Dado el apoyo del paralelo griego y la advertencia del proverbio, «te domine» comunica la fuerza hostil sin exagerar más allá del testimonio textual.
theological_decisions:
- issue: Relación entre el hebreo difícil y el paralelo griego en Sirácides
  english_pob_reading: Translate primarily from the extant Hebrew, but allow the Greek parallel to clarify the awkward clause and the hostile-result sense.
  chosen_spanish_reading: Traducir desde el hebreo conservando la advertencia, pero dejando que el griego ilumine el sentido final de dominio hostil.
  alternative_spanish_readings:
  - No des su pan al impío, para que no se enfrente contigo por medio de él.
  - No des pan al impío, para que no te haga frente por medio de él.
  rationale: El hebreo de Kahana presenta una expresión difícil y el estado crítico señala desajuste menor; el griego aporta claridad en la finalidad y en la amenaza resultante. Por eso la versión española retiene el mandato contra el impío y expresa el peligro como dominio, que es el valor más fuerte atestiguado por el paralelo griego.
  doctrine_reference: 'PHILOSOPHY.md: translate from Hebrew where it survives; use parallel Greek as actual translation input.'
translation_notes:
  revision_awareness: 'El registro revisado mantiene sin cambios sustantivos la línea de la traducción inglesa auditada: texto breve, advertencia preventiva y apoyo explícito del paralelo griego para resolver la dificultad del hebreo.'
  spanish_consistency_notes:
  - Se mantiene «impío» para ἀσεβής, en coherencia con el léxico bíblico tradicional y el valor ético del término.
  - Se evita «Señor» o terminología eclesiástica no presente en el verso.
  - La nota a pie conserva la tensión textual entre hebreo y griego sin resolverla de forma excesiva.
  - «Domine» se eligió por su fuerza semántica y porque en español actual puede expresar tanto control abusivo como sometimiento hostil.
