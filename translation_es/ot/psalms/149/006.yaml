translation:
  language: es
  text: Las altas alabanzas de Dios están en sus gargantas[a], y una espada de dos filos está en sus manos[c][b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «exaltaciones de Dios». Literalmente, «en sus gargantas»; el hebreo usa «en su garganta» con sentido colectivo.
    reason: lexical_alternative
  - marker: b
    text: O «espada de doble filo». Literalmente, una espada de dos filos.
    reason: lexical_alternative
  - marker: c
    text: Hebreo «en su mano»; el singular puede funcionar colectivamente, por eso también es posible «en sus manos».
    reason: lexical_alternative
lexical_decisions:
- source_word: רוֹמְמֹת
  english_pob_choice: high praises
  chosen_spanish: altas alabanzas
  alternatives_spanish:
  - alabanzas excelsas
  - loftas alabanzas
  - exaltaciones
  lexicon: HALOT
  rationale: El plural sustantivo expresa alabanzas elevadas o exaltadas. «Altas alabanzas» conserva el matiz de elevación y suena natural en español; «exaltaciones» es posible, pero en español puede sonar más abstracto o menos idiomático en contexto poético.
- source_word: אֵל
  english_pob_choice: God
  chosen_spanish: Dios
  alternatives_spanish:
  - el Poderoso
  lexicon: HALOT
  rationale: Aquí אֵל funciona como título divino referido al Dios de Israel. «Dios» es la traducción más natural y clara en el contexto.
- source_word: בִּגְרוֹנָם
  english_pob_choice: are in their throat
  chosen_spanish: están en su garganta
  alternatives_spanish:
  - están en su garganta
  - están en su garganta y boca
  lexicon: HALOT
  rationale: גרון significa literalmente «garganta». Mantener el sentido corporal preserva la imagen vívida del texto; «boca» suavizaría innecesariamente el hebreo. Se usa el singular colectivo «su» con valor distributivo para reflejar el sentido poético.
- source_word: וְחֶרֶב
  english_pob_choice: and a sword
  chosen_spanish: y una espada
  alternatives_spanish:
  - y la espada
  lexicon: HALOT
  rationale: El sustantivo es indefinido en sentido; «una espada» conserva esa indefinición y el paralelismo poético.
- source_word: פִּיפִיּוֹת
  english_pob_choice: two-edged
  chosen_spanish: de dos filos
  alternatives_spanish:
  - de doble filo
  - doble filo
  lexicon: HALOT
  rationale: El término designa una espada con dos filos. «De dos filos» es idiomático, claro y conserva el registro poético sin perder la fuerza lexical.
- source_word: בְּיָדָם
  english_pob_choice: is in their hand
  chosen_spanish: está en su mano
  alternatives_spanish:
  - está en sus manos
  - está en la mano de ellos
  lexicon: HALOT
  rationale: Aunque la forma hebrea es singular con sufijo plural, en poesía puede funcionar de manera colectiva. «Su mano» refleja bien el hebreo y mantiene el paralelismo con la primera línea; «sus manos» también sería posible, pero se aleja más de la forma recibida.
theological_decisions:
- issue: Juxtaposition of praise and weaponry
  english_pob_reading: Retain the psalm's juxtaposition of praise and weaponry without softening either image.
  chosen_spanish_reading: Conservar la yuxtaposición entre alabanza y arma sin espiritualizar ni suavizar ninguna de las dos imágenes.
  alternative_spanish_readings:
  - Interpretar la espada como metáfora en el texto principal
  - Reemplazar la espada por una lectura figurada de la palabra
  rationale: El hebreo presenta una imagen poética de alabanza y guerra en paralelo. La traducción debe preservar esa tensión, no resolverla interpretativamente.
  doctrine_reference: Preservar la tensión teológica del poema en lugar de armonizarla artificialmente.
translation_notes:
  revision_awareness: 'La revisión más reciente no introdujo cambios: el pasaje quedó sin modificaciones tras la última pasada, y el cotejo cruzado señaló solo cuestiones menores. Se mantiene, por tanto, la lectura poética literal con leves ajustes de naturalidad en español.'
  spanish_consistency_notes:
  - Se mantiene «Dios» para אֵל, conforme al estándar del proyecto.
  - Se conserva la imagen corporal de «garganta» y «mano» para no borrar el paralelismo hebreo.
  - Se traduce פִּיפִיּוֹת como «de dos filos» para reflejar el valor lexical, no como una paráfrasis abstracta.
  - Se preserva la singularidad morfológica de «su mano» con nota sobre el posible valor colectivo.
