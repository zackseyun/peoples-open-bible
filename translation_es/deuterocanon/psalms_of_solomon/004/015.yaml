translation:
  language: es
  text: Fue lleno de esta injusticia, y sus ojos estaban puestos en otra casa[a], para destruirla con palabras implacables[b]; su alma no se sacia, como el Hades[c], con todas estas cosas.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «otra casa» en sentido de hogar o ámbito familiar. El griego οἶκος puede referirse tanto a una casa física como a la esfera doméstica o familiar.
    reason: lexical_alternative
  - marker: b
    text: La expresión griega ἐν λόγοις ἀνυπερθέσεως es difícil; también puede entenderse como «con palabras sin demora» o «con palabras sin vacilación».
    reason: alternative_reading
  - marker: c
    text: «Hades» expresa la imagen de insaciabilidad del mundo de los muertos; «el sepulcro» o «el Seol» serían alternativas interpretativas.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐπλήσθη
  english_pob_choice: was filled
  chosen_spanish: fue llenado
  alternatives_spanish:
  - estaba lleno
  - se llenó
  lexicon: BDAG
  rationale: El pasivo expresa que la persona queda saturada por la conducta descrita; «fue llenado» conserva ese valor sin convertirlo en una simple descripción estática.
- source_word: παρανομίᾳ
  english_pob_choice: lawlessness
  chosen_spanish: iniquidad
  alternatives_spanish:
  - ilegalidad
  - transgresión
  - maldad
  lexicon: BDAG
  rationale: «Iniquidad» mantiene el peso moral y de desorden contra la norma, y suena natural en español bíblico sin reducirlo a mera ilegalidad civil.
- source_word: ἐν ταύτῃ
  english_pob_choice: this
  chosen_spanish: de esta
  alternatives_spanish:
  - en esta
  - con esta
  lexicon: BDAG
  rationale: La referencia apunta a la iniquidad recién nombrada; «de esta» permite ligar la frase de manera directa con el sustantivo anterior.
- source_word: οἱ ὀφθαλμοὶ αὐτοῦ
  english_pob_choice: his eyes were on
  chosen_spanish: sus ojos estaban puestos en
  alternatives_spanish:
  - sus ojos estaban en
  - miraba hacia
  lexicon: BDAG
  rationale: La imagen no es solo visual sino intencional. «Estaban puestos en» conserva la fijación o intención implícita en el giro griego.
- source_word: οἶκον ἕτερον
  english_pob_choice: another house
  chosen_spanish: otra casa
  alternatives_spanish:
  - otro hogar
  - otra familia
  - otro hogar doméstico
  lexicon: BDAG
  rationale: El griego dice literalmente οἶκον; «casa» es la correspondencia más directa. Se deja abierta la posible resonancia de ámbito doméstico o familiar sin forzarla.
- source_word: ὀλοθρεύσαι
  english_pob_choice: to destroy it
  chosen_spanish: para destruirla
  alternatives_spanish:
  - para arruinarla
  - para devastarla
  lexicon: BDAG
  rationale: El infinitivo expresa propósito hostil; «destruirla» reproduce con fuerza adecuada el verbo sin sobreinterpretarlo.
- source_word: ἐν λόγοις ἀνυπερθέσεως
  english_pob_choice: with relentless words
  chosen_spanish: con palabras implacables
  alternatives_spanish:
  - con palabras sin demora
  - con palabras sin vacilación
  - con palabras insistentes
  lexicon: LSJ
  rationale: La expresión es difícil. «Implacables» comunica mejor en español la dureza y la presión de palabras que no se detienen, manteniendo la tensión del original.
- source_word: οὐκ ἐμπίπλαται
  english_pob_choice: is not satisfied
  chosen_spanish: no se sacia
  alternatives_spanish:
  - no queda satisfecho
  - no se satisface
  lexicon: BDAG
  rationale: En español, «saciarse» refleja mejor la idea de apetito insaciable, especialmente por la comparación posterior con el Hades.
- source_word: ψυχὴ
  english_pob_choice: soul
  chosen_spanish: alma
  alternatives_spanish:
  - vida
  - ser
  lexicon: BDAG
  rationale: «Alma» sigue de cerca el valor de ψυχὴ y preserva la imagen antropológica del texto.
- source_word: ᾅδης
  english_pob_choice: Hades
  chosen_spanish: el Hades
  alternatives_spanish:
  - el Seol
  - la tumba
  - el sepulcro
  lexicon: BDAG
  rationale: El griego nombra ᾅδης; se conserva «el Hades» para transparencia textual. Las alternativas interpretativas quedan abiertas por el propio contexto comparativo de insaciabilidad.
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión del inglés POB que prefirió «house» sobre «household» para οἶκον, y se siguió esa correspondencia con «casa». También se mantuvo la decisión de traducir el giro de ἐν λόγοις ἀνυπερθέσεως con una fórmula que conserve la dificultad semántica del original.
  spanish_consistency_notes:
  - Se usó «Yahvé» por defecto solo cuando corresponda; este versículo no lo requiere.
  - Se prefirió «Hades» como transliteración transparente, coherente con el audit trail inglés.
  - «Otra casa» sigue de cerca οἶκον y evita expandir innecesariamente a «hogar» o «familia».
  - Se mantuvo una sintaxis bíblica moderna, pero natural en español, sin depender de calcos ingleses.
