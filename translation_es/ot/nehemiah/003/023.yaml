translation:
  language: es
  text: Después de él, Benjamín y Hasub[a] hicieron reparaciones frente a la casa de ellos. Después de él, Azarías hijo de Maaseías, hijo de Ananías, hizo reparaciones junto a su casa.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: También puede transcribirse «Hashub».
    reason: lexical_alternative
lexical_decisions:
- source_word: אַחֲרָיו
  english_pob_choice: After him
  chosen_spanish: Después de él
  alternatives_spanish:
  - Luego de él
  - Tras él
  lexicon: HALOT
  rationale: La construcción marca sucesión en la lista de los reparadores, no solo orden temporal; ‘Después de él’ conserva ese valor narrativo de secuencia y es natural en español.
- source_word: הֶחֱזִיק
  english_pob_choice: made repairs
  chosen_spanish: hicieron reparaciones / hizo reparaciones
  alternatives_spanish:
  - repararon
  - fortalecieron
  lexicon: HALOT
  rationale: En Nehemías 3 el hifil de חזק funciona como término idiomático para la obra de reparación del muro. ‘Hicieron reparaciones’ preserva la acción concreta mejor que ‘fortalecieron’.
- source_word: בִּנְיָמִן
  english_pob_choice: Benjamin
  chosen_spanish: Benjamín
  alternatives_spanish:
  - Benjamin
  lexicon: standard transliteration
  rationale: Nombre propio transliterado según el uso español común y bíblico.
- source_word: חַשּׁוּב
  english_pob_choice: Hasshub
  chosen_spanish: Hasub
  alternatives_spanish:
  - Jasub
  - Hasub
  lexicon: standard transliteration
  rationale: Se adopta una transliteración española clara del nombre hebreo. La nota conserva la alternativa documentada por la tradición auditada en inglés.
- source_word: נֶגֶד
  english_pob_choice: opposite
  chosen_spanish: frente a
  alternatives_spanish:
  - enfrente de
  - opuesto a
  lexicon: HALOT
  rationale: ‘Frente a’ expresa con naturalidad la ubicación topográfica directamente en oposición a la casa, sin perder la relación espacial del hebreo.
- source_word: בֵּיתָם
  english_pob_choice: their house
  chosen_spanish: su casa
  alternatives_spanish:
  - su hogar
  - su casa de ellos
  lexicon: HALOT
  rationale: El sufijo plural hebreo se refiere a la casa asociada con los nombrados; en español la forma natural es singular posesivo ‘su casa’, sin forzar un plural.
- source_word: עֲזַרְיָה
  english_pob_choice: Azariah
  chosen_spanish: Azarías
  alternatives_spanish:
  - Azarías
  lexicon: standard transliteration
  rationale: Nombre propio en forma española usual.
- source_word: בֶן מַעֲשֵׂיָה בֶּן עֲנָנְיָה
  english_pob_choice: son of Maaseiah, son of Ananiah
  chosen_spanish: hijo de Maaseías, hijo de Ananías
  alternatives_spanish:
  - hijo de Maaseya, hijo de Ananías
  lexicon: standard transliteration
  rationale: Se mantiene la estructura patronímica del hebreo de modo formal y transparente, con nombres propios en transliteración española.
- source_word: אֵצֶל
  english_pob_choice: beside
  chosen_spanish: junto a
  alternatives_spanish:
  - al lado de
  - junto a
  lexicon: HALOT
  rationale: La preposición indica cercanía física. ‘Junto a’ es idiomática en español y distingue este cierre del marcador secuencial ‘Después de él’.
- source_word: בֵּיתוֹ
  english_pob_choice: his house
  chosen_spanish: su casa
  alternatives_spanish:
  - su hogar
  - su casa
  lexicon: HALOT
  rationale: Se conserva la referencia concreta al punto de trabajo en la lista topográfica, evitando una paráfrasis abstracta.
translation_notes:
  revision_awareness: Se corrigió la validación anterior anclando la nota de variante léxica al nombre propio marcado en el texto (‘Hasub[a]’). La redacción general permanece alineada con el informe inglés auditado, sin cambios sustantivos de sentido.
  spanish_consistency_notes:
  - Se mantiene ‘hacer reparaciones’ para הֶחֱזִיק, coherente con la decisión inglesa del pasaje.
  - ‘Después de él’ reproduce el patrón repetido de secuencia en Nehemías 3.
  - ‘Frente a’ y ‘junto a’ distinguen claramente נֶגֶד y אֵצֶל sin superponerlos.
  - Los nombres propios siguen una transliteración española consistente y legible.
