    text: O «tu simiente». El hebreo usa un sustantivo colectivo singular.
    reason: lexical_alternative
  revision_rationale: Se corrige el anclaje de la nota para que recaiga sobre «descendencia», se elimina la duplicación de notas, y se mejora la naturalidad del español con «le dijo» y «no cruzarás allá» sin apartarse del significado hebreo ni de las decisiones léxicas auditadas.
