  to: Y el santo templo, que antes había saqueado, lo adornaría con las más hermosas ofrendas votivas[a], y restituiría todos los utensilios sagrados multiplicados muchas veces[b], y de sus propios ingresos costearía los gastos necesarios para los sacrificios.
