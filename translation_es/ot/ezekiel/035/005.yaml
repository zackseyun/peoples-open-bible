translation:
  language: es
  text: Porque tuviste enemistad perpetua y entregaste a los hijos de Israel al poder de la espada, en el tiempo de su desastre[a], en el tiempo del castigo del fin[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «en el tiempo de su calamidad» o «en el tiempo de su ruina». El hebreo אֵיד puede significar desastre, calamidad o ruina.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «en el tiempo del castigo final», «en el tiempo de la iniquidad del fin» o «en el tiempo en que la culpa llegó a su fin». La expresión hebrea es difícil y puede referirse al pecado/culpa o a su castigo.'
    reason: alternative_reading
lexical_decisions:
- source_word: יַעַן
  english_pob_choice: Because
  chosen_spanish: Porque
  alternatives_spanish:
  - Ya que
  - Puesto que
  lexicon: HALOT
  rationale: Introduce la causa del juicio de forma natural en español y conserva el valor causal del hebreo.
- source_word: הֱיוֹת לְךָ אֵיבַת עוֹלָם
  english_pob_choice: you had an everlasting enmity
  chosen_spanish: tuviste enemistad perpetua
  alternatives_spanish:
  - había para ti enemistad perpetua
  - poseías odio antiguo
  lexicon: HALOT
  rationale: '"Enemistad" mantiene אֵיבָה como hostilidad duradera, y "perpetua" comunica עוֹלָם con un registro fiel y claro en español.'
- source_word: וַתַּגֵּר
  english_pob_choice: delivered over
  chosen_spanish: entregaste
  alternatives_spanish:
  - entregaste al poder de
  - entregaste por completo
  - devolviste
  lexicon: HALOT
  rationale: El verbo en contexto expresa poner a Israel en manos de la violencia; "entregaste" conserva la fuerza de dar en poder ajeno, en paralelo con la decisión inglesa de evitar una literalidad oscura.
- source_word: אֶת בְּנֵי יִשְׂרָאֵל
  english_pob_choice: the sons of Israel
  chosen_spanish: los hijos de Israel
  alternatives_spanish:
  - los israelitas
  - el pueblo de Israel
  lexicon: HALOT
  rationale: Se conserva la expresión filial/corporativa del hebreo. En español, "los hijos de Israel" es transparente y mantiene la forma del original sin neutralizarla.
- source_word: עַל יְדֵי חָרֶב
  english_pob_choice: to the power of the sword
  chosen_spanish: al poder de la espada
  alternatives_spanish:
  - a la espada
  - en manos de la espada
  - bajo el filo de la espada
  lexicon: HALOT
  rationale: El hebreo literalmente dice "sobre las manos de la espada", un modismo de ser entregado a violencia mortal. "Al poder de la espada" comunica el sentido idiomático en español y sigue de cerca la solución inglesa.
- source_word: בְּעֵת אֵידָם
  english_pob_choice: at the time of their disaster
  chosen_spanish: en el tiempo de su desastre
  alternatives_spanish:
  - en el tiempo de su calamidad
  - en el tiempo de su ruina
  lexicon: HALOT
  rationale: אֵיד expresa calamidad o desastre; "desastre" es claro y adecuado al contexto de juicio profético.
- source_word: בְּעֵת עֲוֺן קֵץ
  english_pob_choice: at the time of the punishment of the end
  chosen_spanish: en el tiempo del castigo del fin
  alternatives_spanish:
  - en el tiempo del castigo final
  - en el tiempo de la iniquidad del fin
  - en el tiempo en que culminó la culpa
  lexicon: HALOT
  rationale: La frase hebrea es comprimida y difícil. Se mantiene la lectura inglesa de עֲוֺן como castigo en este contexto, con "del fin" para reflejar קֵץ sin explicitar más de lo que el hebreo permite.
theological_decisions:
- issue: Renderizado de בְּנֵי יִשְׂרָאֵל
  english_pob_reading: the sons of Israel
  chosen_spanish_reading: los hijos de Israel
  alternative_spanish_readings:
  - los israelitas
  - el pueblo de Israel
  rationale: La forma hebrea es explícitamente filial y corporativa. Se preserva en el texto principal por transparencia formal, sin sustituirla por un etnónimo más general.
  doctrine_reference: DOCTRINE.md §Translation philosophy, point 4
- issue: Sentido de עֲוֺן en בְּעֵת עֲוֺן קֵץ
  english_pob_reading: punishment
  chosen_spanish_reading: castigo
  alternative_spanish_readings:
  - iniquidad
  - culpa
  - castigo final
  rationale: El sustantivo puede aludir a culpa/iniquidad o a su castigo. En este contexto profético de juicio, "castigo" produce una lectura coherente con la violencia y el desastre mencionados, manteniendo abierta la tensión semántica del hebreo.
  doctrine_reference: DOCTRINE.md §Translation philosophy, point 3
translation_notes:
  revision_awareness: 'El borrador sigue la revisión más reciente del audit trail inglés: mantiene el registro formal de "delivered over" reflejado en español como "entregaste" y preserva la solución prudente para la frase קשה בְּעֵת עֲוֺן קֵץ. También conserva la estructura causal y temporal del versículo sin suavizar la acusación profética.'
  spanish_consistency_notes:
  - Se mantiene "Yahvé" como terminología predeterminada del proyecto cuando corresponda; este versículo no contiene el tetragrámaton.
  - '"Espada" se usa para חָרֶב siguiendo el español bíblico actual y la fuerza metafórica del hebreo.'
  - '"Tiempo" traduce repetidamente בְּעֵת para conservar el paralelismo.'
  - No se introdujo puntuación explicativa adicional fuera de la necesaria para la lectura en español.
