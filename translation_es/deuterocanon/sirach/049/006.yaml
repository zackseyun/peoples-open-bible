    reason: alternative_reading
  - marker: b
    text: Literalmente, «sus caminos» o «sus sendas»; en contexto urbano, «calles» expresa mejor la idea.
    reason: lexical_alternative
  - marker: c
    text: Alude al llamado de Jeremías desde el vientre; compárese Jeremías 1:5.
    reason: cross_reference
  revision_rationale: Se corrige «la ciudad escogida del santuario» a «la ciudad santa» para seguir el hebreo primario y la decisión auditada del POB. También se reubica el marcador [a] al sintagma «por mano de Jeremías», que es donde corresponde la nota alternativa. El resto del texto puede mantenerse.
