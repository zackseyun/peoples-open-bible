translation:
  language: es
  text: El pobre habla con súplicas[a], pero el rico responde con dureza.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «El pobre habla con ruegos, pero el rico responde con palabras duras».
    reason: lexical_alternative

lexical_decisions:
- source_word: תַּחֲנוּנִים
  english_pob_choice: with pleas
  chosen_spanish: con súplicas
  alternatives_spanish:
  - con ruegos
  - con plegarias
  - con entreatas
  lexicon: HALOT
  rationale: El sustantivo plural expresa peticiones insistentes de favor o misericordia. «Súplicas» conserva ese matiz de petición humilde y urgente, y funciona de modo natural en español sin perder la fuerza del original.
- source_word: יְדַבֶּר
  english_pob_choice: speaks
  chosen_spanish: habla
  alternatives_spanish:
  - dice
  - pronuncia
  - habla con
  lexicon: HALOT
  rationale: El piel de דבר se usa normalmente como «hablar/decir». En un proverbio, «habla» es idiomático y permite que el complemento «con súplicas» exprese el modo del habla, como en el hebreo.
- source_word: רָשׁ
  english_pob_choice: the poor man
  chosen_spanish: el pobre
  alternatives_spanish:
  - el pobre hombre
  - el necesitado
  - un pobre
  lexicon: HALOT
  rationale: El sustantivo/adjetivo designa a una persona pobre; en español, «el pobre» transmite bien la fuerza representativa proverbial y evita una formulación más pesada. No se añade «hombre» porque el español ya puede usar el sustantivo genérico con naturalidad.
- source_word: וְעָשִׁיר
  english_pob_choice: but the rich man
  chosen_spanish: pero el rico
  alternatives_spanish:
  - y el rico
  - mientras que el rico
  - pero un rico
  lexicon: HALOT
  rationale: Aunque la conjunción hebrea es literalmente «y», el paralelismo contrasta a pobre y rico; por eso «pero» expresa mejor el sentido adversativo en español. «El rico» conserva el singular representativo.
- source_word: יַעֲנֶה
  english_pob_choice: answers
  chosen_spanish: responde
  alternatives_spanish:
  - contesta
  - replica
  - responde
  lexicon: HALOT
  rationale: ענה en qal significa responder/contestar. «Responde» es natural en el castellano actual y mantiene el valor de réplica dentro del contraste sapiencial.
- source_word: עַזּוֹת
  english_pob_choice: harshly
  chosen_spanish: con dureza
  alternatives_spanish:
  - ásperamente
  - con rudeza
  - con palabras duras
  lexicon: HALOT
  rationale: 'La forma plural funciona adverbialmente y describe la manera de responder: no es valentía positiva, sino aspereza o severidad verbal. «Con dureza» recoge bien ese matiz sin forzar el texto.'
translation_notes:
  revision_awareness: 'La versión española sigue de cerca el sentido hebreo y el audit trail inglés: mantiene el contraste entre el hablar humilde del pobre y la respuesta áspera del rico, sin suavizar la fuerza adverbial de עַזּוֹת ni convertir תַּחֲנוּנִים en una simple fórmula devocional.'
  spanish_consistency_notes:
  - Se mantuvo el tono proverbial conciso y antitético.
  - Se prefirió un español natural («habla», «responde») sin perder el paralelismo semántico.
  - No se usó «SEÑOR» ni terminología litúrgica ajena al versículo.
  - «Con dureza» refleja el valor de adverbio de la forma hebrea final.
