translation:
  language: es
  text: Judá ha ido al destierro[a] por causa de aflicción y por causa de gran servidumbre; habita entre las naciones y no encuentra descanso. Todos los que la persiguen la han alcanzado entre las angosturas[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «en el destierro»; el hebreo puede apuntar al exilio como condición de expulsión y desplazamiento.
    reason: lexical_alternative
  - marker: b
    text: O «entre los lugares estrechos»; la expresión hebrea también puede insinuar aflicción o encierro, no solo un lugar físicamente estrecho.
    reason: lexical_alternative
lexical_decisions:
- source_word: גָּֽלְתָ֨ה
  english_pob_choice: has gone into exile
  chosen_spanish: ha ido al destierro
  alternatives_spanish:
  - ha sido desterrada
  - ha ido en cautiverio
  lexicon: HALOT
  rationale: El verbo expresa la idea de ir al exilio o ser llevada fuera; en español, «ha ido al destierro» conserva el motivo del exilio con una formulación natural. «Destierro» evita reducir el sentido solo a cautiverio físico.
- source_word: יְהוּדָ֤ה
  english_pob_choice: Judah
  chosen_spanish: Judá
  alternatives_spanish:
  - Judea
  lexicon: HALOT
  rationale: Se mantiene el nombre propio bíblico y la personificación poética de Judá como sujeto femenino.
- source_word: מֵ/עֹ֨נִי֙
  english_pob_choice: because of affliction
  chosen_spanish: por causa de aflicción
  alternatives_spanish:
  - a causa de miseria
  - por aflicción
  lexicon: HALOT
  rationale: La preposición aquí se entiende causalmente en paralelo con la frase siguiente. «Aflicción» comunica el sufrimiento amplio sin limitarlo a pobreza material.
- source_word: וּ/מֵ/רֹ֣ב עֲבֹדָ֔ה
  english_pob_choice: and because of great servitude
  chosen_spanish: y por causa de gran servidumbre
  alternatives_spanish:
  - y por causa de mucha labor
  - y por causa de dura esclavitud
  lexicon: HALOT
  rationale: La revisión inglesa prefería «servitude» sobre «slavery» por ser más natural y contextual. En español, «servidumbre» conserva la opresión y la idea de servicio forzado sin sonar tan mecánico como «esclavitud» en esta línea poética.
- source_word: הִ֚יא יָשְׁבָ֣ה בַ/גּוֹיִ֔ם
  english_pob_choice: she dwells among the nations
  chosen_spanish: ella habita entre las naciones
  alternatives_spanish:
  - ella vive entre las naciones
  - ella se sienta entre las naciones
  lexicon: HALOT
  rationale: «Habita» preserva el valor de residir/vivir del verbo, y «entre las naciones» sigue el uso contextual de גּוֹיִם para pueblos extranjeros.
- source_word: לֹ֥א מָצְאָ֖ה מָנ֑וֹחַ
  english_pob_choice: finds no rest
  chosen_spanish: no encuentra descanso
  alternatives_spanish:
  - no halla reposo
  - no ha encontrado descanso
  lexicon: HALOT
  rationale: «Descanso» comunica de manera idiomática la ausencia de reposo; mantiene el sentido existencial y físico de מָנוֹחַ.
- source_word: כָּל רֹדְפֶ֥י/הָ
  english_pob_choice: All her pursuers
  chosen_spanish: Todos sus perseguidores
  alternatives_spanish:
  - Todos los que la perseguían
  - Todos sus acosadores
  lexicon: HALOT
  rationale: El participio designa a quienes la persiguen hostilmente. «Perseguidores» conserva la imagen concreta del acoso y del seguimiento.
- source_word: הִשִּׂיג֖וּ/הָ
  english_pob_choice: have overtaken her
  chosen_spanish: la alcanzaron
  alternatives_spanish:
  - la han alcanzado
  - la alcanzaron y la dominaron
  lexicon: HALOT
  rationale: El verbo comunica alcanzar/coger al perseguido. En este contexto poético, el pretérito «la alcanzaron» fluye bien en español y mantiene la fuerza de la persecución.
- source_word: בֵּ֥ין הַ/מְּצָרִֽים
  english_pob_choice: in the narrow places
  chosen_spanish: entre los lugares estrechos
  alternatives_spanish:
  - entre los estrechos
  - en los lugares de angustia
  - entre las angosturas
  lexicon: HALOT
  rationale: Se conserva la imagen espacial de «entre» y de lugares angostos. «Lugares estrechos» es una forma clara en español que deja abierta la posible resonancia de angustia o atrapamiento.
translation_notes:
  revision_awareness: La redacción española sigue la revisión inglesa más reciente al preferir un término que exprese la servidumbre opresiva sin forzar una equivalencia demasiado rígida con «slavery». También preserva la nota sobre la ambigüedad de בֵּין הַמְּצָרִים, manteniendo en el texto principal la imagen espacial y explicando la posible resonancia de angustia/encierro en nota.
  spanish_consistency_notes:
  - Se conservó «Judá» como sujeto personificado femenino, en paralelo con el hebreo y la traducción inglesa auditada.
  - «Naciones» traduce גּוֹיִם en sentido de pueblos extranjeros, no como una categoría teológica abstracta.
  - El registro es poético, digno y de uso eclesial amplio, sin depender de formulaciones tradicionales que oculten el exilio o la servidumbre.
