translation:
  language: es
  text: Da poco y lanza muchos reproches[a], y abre su boca como un heraldo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Da poco y reprocha mucho»; los futuros griegos también pueden traducirse más literalmente, pero aquí probablemente expresan un patrón general de conducta en estilo proverbial.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ὀλίγα
  english_pob_choice: little
  chosen_spanish: poco
  alternatives_spanish:
  - pocas cosas
  - algo poco
  lexicon: LSJ
  rationale: El neutro plural con δώσει funciona adverbialmente con sentido de dar en escasa medida. «Poco» conserva la brevedad proverbial y evita una construcción pesada en español.
- source_word: δώσει
  english_pob_choice: he gives
  chosen_spanish: da
  alternatives_spanish:
  - dará
  lexicon: LSJ
  rationale: Aunque el griego está en futuro, en estilo sapiencial puede expresar hábito o patrón general. El presente español transmite mejor ese valor gnómico, como en la decisión inglesa.
- source_word: πολλὰ
  english_pob_choice: many
  chosen_spanish: muchas
  alternatives_spanish:
  - muchas cosas
  - en gran número
  lexicon: LSJ
  rationale: Con ὀνειδίσει, el plural neutro apunta a reprensiones/insultos numerosos. «Muchas» mantiene la cuantificación y concuerda con «reprensiones».
- source_word: ὀνειδίσει
  english_pob_choice: heaps on many reproaches
  chosen_spanish: echa muchas reprensiones
  alternatives_spanish:
  - lanza muchas reprensiones
  - reprende mucho
  - echa muchos reproches
  lexicon: LSJ
  rationale: ὀνειδίζω tiene el campo de reprochar, increpar, insultar. «Echa» conserva la imagen de arrojar o acumular reproches, y «reprensiones» evita una simple repetición del sustantivo «reproches» sin perder la fuerza del griego.
- source_word: ἀνοίξει τὸ στόμα αὐτοῦ
  english_pob_choice: he opens his mouth
  chosen_spanish: abre su boca
  alternatives_spanish:
  - abre la boca
  - empieza a hablar
  lexicon: LSJ
  rationale: Es un giro idiomático común para comenzar a hablar. Se mantiene de forma bastante literal porque el español lo entiende bien y prepara la comparación siguiente.
- source_word: ὡς κῆρυξ
  english_pob_choice: like a herald
  chosen_spanish: como un heraldo
  alternatives_spanish:
  - como un pregonero
  - como un portavoz público
  lexicon: LSJ
  rationale: κῆρυξ designa a un heraldo o anunciante público. «Heraldo» conserva el tono formal y la imagen de proclamación pública mejor que opciones más coloquiales.
translation_notes:
  revision_awareness: 'El texto griego es estable y el contexto de auditoría en inglés marca solo una cuestión menor de equivalencia estilística: el futuro griego puede leerse gnómicamente. La versión española sigue esa decisión y conserva el paralelismo proverbial sin sobrerrepresentar el tiempo verbal.'
  spanish_consistency_notes:
  - Se evita «SEÑOR» y cualquier terminología divina, pues el pasaje no contiene referencia explícita a יהוה/θεός.
  - «Heraldo» se mantiene para κῆρυξ en coherencia con la elección inglesa y para conservar la imagen pública y solemne.
  - «Reprensiones» refleja el peso de ὀνειδίζω sin introducir un tono eclesiástico ajeno al proverbio.
