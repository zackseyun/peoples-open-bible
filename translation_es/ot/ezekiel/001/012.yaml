translation:
  language: es
  text: Y cada uno iba de frente[a]. Adonde el espíritu[b] había de ir, iban; no se volvían mientras iban.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literalmente, 'hacia la dirección de su rostro'.
    reason: lexical_alternative
  - marker: b
    text: O 'el viento'; posiblemente 'el Espíritu'. La palabra hebrea רוּחַ puede significar 'espíritu', 'viento' o 'aliento', y el versículo no identifica explícitamente el referente.
    reason: alternative_reading
lexical_decisions:
- source_word: וְאִישׁ
  english_pob_choice: And each one
  chosen_spanish: Y cada uno
  alternatives_spanish:
  - Y cada hombre
  - Y cada ser
  lexicon: HALOT
  rationale: אִישׁ puede ser 'hombre' o 'individuo'; en este contexto visionario se refiere distributivamente a cada uno de los seres vivientes, por lo que 'cada uno' preserva el valor distributivo sin introducir innecesariamente la idea de humanidad.
- source_word: אֶל עֵבֶר פָּנָיו
  english_pob_choice: straight ahead
  chosen_spanish: iba derecho
  alternatives_spanish:
  - iba en línea recta
  - iba hacia la dirección de su rostro
  lexicon: HALOT
  rationale: La expresión hebrea literalmente apunta a la dirección del rostro; en español, 'iba derecho' comunica naturalmente el sentido de avance directo sin perder la idea de movimiento frontal.
- source_word: הָרוּחַ
  english_pob_choice: the spirit
  chosen_spanish: el espíritu
  alternatives_spanish:
  - el viento
  - el Espíritu
  lexicon: HALOT
  rationale: רוּחַ puede significar 'espíritu', 'viento' o 'aliento'. El contexto no obliga a identificarlo con el Espíritu Santo; por eso se mantiene 'el espíritu' en minúscula para conservar la ambigüedad presente en el hebreo.
- source_word: לֹא יִסַּבּוּ
  english_pob_choice: they did not turn
  chosen_spanish: no se volvían
  alternatives_spanish:
  - no se desviaban
  - no giraban
  lexicon: HALOT
  rationale: El verbo expresa dar vuelta o cambiar de dirección. 'No se volvían' es una forma natural en español y conserva el énfasis en que no cambiaban su rumbo al moverse.
- source_word: בְּלֶכְתָּן
  english_pob_choice: as they went
  chosen_spanish: al ir
  alternatives_spanish:
  - mientras iban
  - cuando iban
  lexicon: HALOT
  rationale: El infinitivo con prefijo temporal indica acción concurrente; 'al ir' comunica esa simultaneidad de manera breve y fluida en español.
theological_decisions:
- issue: Si רוּחַ debe entenderse como referencia directa al Espíritu Santo
  english_pob_reading: the spirit
  chosen_spanish_reading: el espíritu
  alternative_spanish_readings:
  - el Espíritu
  - el viento
  rationale: El hebreo no identifica explícitamente el referente como el Espíritu Santo. Para preservar la tensión teológica y no resolverla artificialmente, el texto principal usa minúscula.
  doctrine_reference: 'Translation philosophy §3: preservar la tensión teológica en lugar de resolverla.'
translation_notes:
  revision_awareness: La redacción sigue el consenso del audit trail inglés (sin cambios en la última revisión), conservando la ambigüedad de רוּחַ y la imagen direccional de movimiento frontal. Se adapta a español natural sin abandonar el valor literal relevante del hebreo.
  spanish_consistency_notes:
  - Se mantiene 'el espíritu' en minúscula para no sobreresolver el referente.
  - '''Cada uno'' conserva la fuerza distributiva de אִישׁ sin masculinizar innecesariamente.'
  - '''Iba derecho'' evita un calco pesado y sigue la idea de avance frontal.'
  - '''No se volvían'' reproduce la negación de cambio de dirección con estilo idiomático.'
  - Los marcadores de nota se usan solo donde hay ambigüedad relevante en español.
