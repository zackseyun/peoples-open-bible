translation:
  language: es
  text: Y para el príncipe habrá tierra a ambos lados del distrito santo[a] y de la posesión de la ciudad, junto al distrito santo y junto a la posesión de la ciudad, desde el lado occidental hacia el occidente y desde el lado oriental hacia el oriente; y en longitud, correspondiente a una de las porciones tribales, desde el límite occidental hasta el límite oriental[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebreo «contribución santa» o «porción sagrada»; aquí se refiere a un tramo de tierra apartado, por eso se traduce «distrito santo».
    reason: lexical_alternative
  - marker: b
    text: Hebreo literalmente «desde el lado del mar» y «hasta el límite hacia el este»; en las descripciones territoriales de Ezequiel, «mar» funciona como «occidente».
    reason: cultural_note
lexical_decisions:
- source_word: לַנָּשִׂיא
  english_pob_choice: for the prince
  chosen_spanish: para el príncipe
  alternatives_spanish:
  - para el gobernante
  - para el líder
  lexicon: HALOT
  rationale: נָשִׂיא en Ezequiel suele designar al gobernante civil, no a un líder genérico. «Príncipe» conserva el uso establecido en este libro y sigue la lectura auditada del inglés POB.
- source_word: מִזֶּה וּמִזֶּה
  english_pob_choice: on both sides
  chosen_spanish: a ambos lados
  alternatives_spanish:
  - de este lado y de aquel lado
  - por ambos lados
  lexicon: HALOT
  rationale: La expresión indica tierra distribuida a un lado y al otro del tramo sagrado y de la ciudad. «A ambos lados» es natural en español y conserva el sentido distributivo.
- source_word: תְּרוּמַת הַקֹּדֶשׁ
  english_pob_choice: the holy district
  chosen_spanish: la porción santa
  alternatives_spanish:
  - la contribución santa
  - la porción consagrada
  - el distrito santo
  lexicon: HALOT
  rationale: En este contexto de repartición territorial, תְּרוּמָה no es una ofrenda monetaria sino una porción apartada de tierra. «Porción santa» mantiene la idea de apartado/consagrado sin imponer una terminología más técnica que la del hebreo.
- source_word: אֲחֻזַּת הָעִיר
  english_pob_choice: the property of the city
  chosen_spanish: la posesión de la ciudad
  alternatives_spanish:
  - la propiedad de la ciudad
  - la heredad de la ciudad
  - el terreno de la ciudad
  lexicon: HALOT
  rationale: אֲחֻזָּה designa una posesión o propiedad hereditaria. «Posesión» conserva el valor de tenencia territorial y evita modernizar excesivamente a «propiedad» si no es necesario.
- source_word: אֶל־פְּנֵי ... וְאֶל־פְּנֵי
  english_pob_choice: adjoining ... and adjoining
  chosen_spanish: frente a ... y frente a
  alternatives_spanish:
  - junto a ... y junto a
  - colindante con ... y colindante con
  - enfrente de ... y enfrente de
  lexicon: HALOT
  rationale: La fórmula hebrea literalmente apunta hacia la «faz» de algo y, en una descripción de lindes, puede indicar vecindad o correspondencia. «Frente a» conserva la relación espacial sin introducir un término jurídico más interpretativo que el texto no exige.
- source_word: מִפְּאַת יָם יָמָּה
  english_pob_choice: from the west side westward
  chosen_spanish: desde el lado del mar hacia el occidente
  alternatives_spanish:
  - desde el lado occidental hacia el occidente
  - desde el lado del mar hacia el oeste
  - desde el oeste hacia el occidente
  lexicon: HALOT
  rationale: יַם puede significar «mar» o, en descripciones territoriales, la dirección «occidente». Se preserva aquí el término «mar» en el primer miembro para reflejar el hebreo, y «occidente» para aclarar la orientación direccional en español.
- source_word: וּמִפְּאַת קֵדְמָה קָדִימָה
  english_pob_choice: from the east side eastward
  chosen_spanish: desde el lado oriental hacia el oriente
  alternatives_spanish:
  - desde el lado del este hacia el oriente
  - desde el lado oriental hacia el este
  lexicon: HALOT
  rationale: La fórmula paralela mantiene el movimiento direccional del hebreo. «Oriental/oriente» transmite bien la simetría y evita una repetición demasiado pesada de «este».
- source_word: וְאֹרֶךְ
  english_pob_choice: and in length
  chosen_spanish: y en longitud
  alternatives_spanish:
  - y su longitud
  - y de largo
  lexicon: HALOT
  rationale: El sustantivo introduce la medida longitudinal del terreno. «En longitud» sigue de cerca el hebreo y funciona bien en un contexto de mensura territorial.
- source_word: לְעֻמּוֹת אַחַד הַחֲלָקִים
  english_pob_choice: corresponding to one of the tribal portions
  chosen_spanish: correspondiente a una de las porciones
  alternatives_spanish:
  - en correspondencia con una de las porciones
  - igual a una de las porciones
  - a la altura de una de las porciones
  lexicon: HALOT
  rationale: לְעֻמּוֹת expresa correspondencia o alineación. El contexto aclara que se trata de las porciones territoriales; en español puede dejarse implícito «tribales» para no añadir una palabra que el versículo no nombra explícitamente.
- source_word: מִגְּבוּל יָם אֶל־גְּבוּל קָדִימָה
  english_pob_choice: from the western border to the eastern border
  chosen_spanish: desde el límite del mar hasta el límite del oriente
  alternatives_spanish:
  - desde el límite occidental hasta el límite oriental
  - desde el límite del mar hasta el límite oriental
  lexicon: HALOT
  rationale: La fórmula hebrea usa «mar» como punto cardinal occidental en descripciones de territorio. Se conserva «mar» para ser fiel al texto base y «oriente» para mantener el paralelismo direccional.
translation_notes:
  revision_awareness: El pasaje presenta alta concordancia con la revisión inglesa más reciente; no se detectaron cambios sustantivos pendientes. La versión española sigue esa lectura auditada y mantiene la imaginería territorial y direccional del hebreo sin suavizarla.
  spanish_consistency_notes:
  - Se usa «Yahvé» en el proyecto cuando aparezca el nombre divino; este versículo no lo contiene.
  - «Príncipe» conserva la terminología de Ezequiel para נָשִׂיא.
  - Se mantiene el lenguaje territorial de «porción», «posesión» y «límite» para reflejar el marco legal/catastral del contexto.
  - Se conserva la correspondencia oeste/mar y este/oriente sin sustituirla por una normalización geográfica ajena al texto.
