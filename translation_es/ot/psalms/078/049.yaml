translation:
  language: es
  text: Él envió contra ellos su ardiente ira[a], furor, indignación, y angustia, una compañía de mensajeros destructores.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «una compañía de ángeles de desastre»; tradicionalmente, «ángeles malos». El hebreo puede referirse a mensajeros caracterizados por una calamidad destructiva, no necesariamente a seres moralmente malos.
    reason: alternative_reading
lexical_decisions:
- source_word: יְשַׁלַּח
  english_pob_choice: He sent
  chosen_spanish: Él envió
  alternatives_spanish:
  - Él despachó
  - Él soltó
  lexicon: HALOT
  rationale: El piʿel de שלח expresa acción dirigida y activa. «Envió» mantiene ese valor narrativo de manera natural en español y conserva el avance del relato.
- source_word: בָּם
  english_pob_choice: against them
  chosen_spanish: contra ellos
  alternatives_spanish:
  - sobre ellos
  - en ellos
  lexicon: HALOT
  rationale: En un contexto hostil de juicio, la preposición se entiende mejor como dirección adversa. «Contra ellos» comunica el sentido idiomático sin perder la intención del hebreo.
- source_word: חֲרוֹן אַפּוֹ
  english_pob_choice: his burning anger
  chosen_spanish: su ardiente ira
  alternatives_spanish:
  - el ardor de su ira
  - su ira encendida
  - su furor ardiente
  lexicon: HALOT
  rationale: La imagen hebrea alude al calor/ardor de la ira. «Ardiente ira» conserva la metáfora y su intensidad, a la vez que suena natural en español.
- source_word: עֶבְרָה
  english_pob_choice: fury
  chosen_spanish: furor
  alternatives_spanish:
  - furia
  - ira
  - cólera
  lexicon: HALOT
  rationale: Este término añade un matiz de violencia desbordada. «Furor» distingue bien este elemento del anterior y evita repetir «ira».
- source_word: וָזַעַם
  english_pob_choice: and indignation
  chosen_spanish: indignación
  alternatives_spanish:
  - y enojo
  - y cólera
  - y furia
  lexicon: HALOT
  rationale: זעם puede tener un matiz de reprensión airada o indignación. «Indignación» preserva esa cualidad y ayuda a reflejar la acumulación de términos cercanos.
- source_word: וְצָרָה
  english_pob_choice: and distress
  chosen_spanish: y angustia
  alternatives_spanish:
  - y aflicción
  - y calamidad
  - y tribulación
  lexicon: HALOT
  rationale: El término denota aflicción/trabajo opresivo que cae sobre los destinatarios. «Angustia» comunica bien esa presión y funciona de forma natural en la serie.
- source_word: מִשְׁלַחַת
  english_pob_choice: a band of
  chosen_spanish: una partida de
  alternatives_spanish:
  - un envío de
  - un destacamento de
  - una comitiva de
  lexicon: HALOT
  rationale: El sustantivo remite a un grupo enviado o despachado. «Partida de» traduce esa idea de conjunto enviado con fluidez castellana.
- source_word: מַלְאֲכֵי
  english_pob_choice: messengers
  chosen_spanish: mensajeros
  alternatives_spanish:
  - ángeles
  - enviados
  lexicon: HALOT
  rationale: מלאך puede designar mensajeros humanos o celestiales. En este contexto de juicio, «mensajeros» preserva la amplitud léxica sin imponer de entrada una ontología específica.
- source_word: רָעִים
  english_pob_choice: destructive
  chosen_spanish: destructores
  alternatives_spanish:
  - malos
  - perniciosos
  - funestos
  lexicon: HALOT
  rationale: En este contexto, el adjetivo describe el efecto calamitoso de los mensajeros. «Destructores» mantiene la fuerza del juicio y evita que el lector entienda necesariamente «malvados» en sentido moral.
theological_decisions:
- issue: Si מַלְאֲכֵי רָעִים debe sugerir ángeles moralmente malos o agentes de destrucción enviados en juicio
  english_pob_reading: a band of destructive messengers
  chosen_spanish_reading: una partida de mensajeros destructores
  alternative_spanish_readings:
  - ángeles malos
  - ángeles de desgracia
  - mensajeros dañinos
  rationale: La lectura principal conserva el sentido de juicio destructivo sin afirmar que Dios envía seres moralmente malos. Se preserva la tensión del hebreo y la ambigüedad de מלאך, mientras que la opción tradicional se deja como alternativa viable.
  doctrine_reference: Primacía del original y preservación de la tensión teológica sin resolverla por tradición.
translation_notes:
  revision_awareness: 'La versión española sigue la revisión del texto inglés que separa claramente la serie nominal con comas: ira ardiente, furor, indignación y angustia, y mantiene la expresión final como un grupo enviado de mensajeros destructores. Se ha conservado la tensión interpretativa de מַלְאֲכֵי רָעִים en una nota, en lugar de resolverla en el cuerpo del texto.'
  spanish_consistency_notes:
  - Se usó «Yahvé» como norma general del proyecto cuando aparezca el nombre divino; en este versículo no aparece.
  - Se mantuvo una serie de sustantivos con ritmo paralelo para reflejar el hebreo acumulativo.
  - «Mensajeros» conserva la amplitud léxica de מלאך y evita imponer «ángeles» en el texto principal.
  - Se prefirió un español digno y moderno, con puntuación que reproduzca la acumulación enfática del original.
