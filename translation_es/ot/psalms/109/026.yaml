translation:
  language: es
  text: Ayúdame, Yahvé, mi Dios; sálvame conforme a tu amor leal[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «según tu amor constante». El hebreo חֶסֶד puede expresar amor leal, fidelidad de pacto o bondad firme.'
    reason: lexical_alternative
lexical_decisions:
- source_word: עָזְרֵנִי
  english_pob_choice: Help me
  chosen_spanish: ¡Ayúdame!
  alternatives_spanish:
  - Ven en mi ayuda
  - Asísteme
  lexicon: HALOT
  rationale: El imperativo de עזר con sufijo de primera persona expresa una súplica directa por auxilio. «Ayúdame» es natural en español, conserva la urgencia del ruego y evita una expansión innecesaria.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  - Yahweh
  lexicon: HALOT
  rationale: El texto hebreo usa el nombre propio del pacto, no un título. En el español del proyecto, la forma establecida es «Yahvé», que preserva la referencia al Tetragrámaton sin sustituirlo por una convención tipográfica.
- source_word: אֱלֹהָי
  english_pob_choice: my God
  chosen_spanish: mi Dios
  alternatives_spanish:
  - mi Dios
  - oh Dios mío
  lexicon: HALOT
  rationale: La forma con sufijo de primera persona funciona como vocativo en aposición a Yahvé. «Mi Dios» comunica la dirección personal del llamado con claridad y fidelidad.
- source_word: הוֹשִׁיעֵנִי
  english_pob_choice: save me
  chosen_spanish: sálvame
  alternatives_spanish:
  - líbrame
  - rescátame
  lexicon: HALOT
  rationale: El imperativo hifil de ישׁע pide rescate/salvación. «Sálvame» mantiene la conexión léxica con el verbo bíblico y es la equivalencia más directa y natural en español.
- source_word: כְחַסְדֶּךָ
  english_pob_choice: according to your steadfast love
  chosen_spanish: conforme a tu amor leal
  alternatives_spanish:
  - según tu misericordia
  - en fidelidad a tu amor de pacto
  lexicon: HALOT
  rationale: 'כ indica medida o norma: la petición se fundamenta en la cualidad de חסד. «Amor leal» conserva en español el valor relacional y de pacto de חֶסֶד mejor que «misericordia», y «conforme a» refleja bien la relación de estándar expresada por כ.'
theological_decisions:
- issue: Cómo verter el nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Yahweh
  rationale: Se preserva el nombre personal de Dios revelado a Israel, conforme a la línea del proyecto. No se reemplaza por un título genérico ni por una convención de ocultamiento del nombre.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Cómo traducir חֶסֶד en una súplica poética
  english_pob_reading: steadfast love
  chosen_spanish_reading: amor leal
  alternative_spanish_readings:
  - misericordia
  - amor constante
  - fidelidad de pacto
  rationale: El contexto pide una cualidad de amor fiel y comprometido, no solo compasión emocional. «Amor leal» transmite la dimensión relacional y covenantal sin sobreexplicar el hebreo.
  doctrine_reference: Lexical/theological note on חֶסֶד in the POB audit trail
translation_notes:
  revision_awareness: 'El pasaje coincide sustancialmente con el audit trail inglés: se mantuvo el paralelismo de dos imperativos y la cláusula final con כ + חֶסֶד. La única decisión con carga interpretativa es חֶסֶד, donde se eligió una equivalencia española que preserve tanto la lealtad como el trasfondo de pacto. No se requirieron revisiones textuales adicionales.'
  spanish_consistency_notes:
  - Se mantuvo el orden sintáctico breve y suplicante del hebreo, con dos imperativos seguidos de un vocativo y una cláusula final de norma/medida.
  - Se prefirió «Yahvé» en coherencia con la terminología del proyecto para יְהוָה.
  - Se evitó «Señor» para no ocultar el nombre divino.
  - «Amor leal» se usa como solución española estable para חֶסֶד cuando el contexto enfatiza fidelidad comprometida.
