  - severity: medium
    issue: La nota [a] está anclada en «te» en vez de en el hebraísmo «tu mano halle»
    rationale: La nota explica la expresión idiomática «lo que tu mano halle», no el pronombre «te». Según las instrucciones, el marcador debe aparecer en la palabra o frase relevante.
  revised_spanish_text: Y cuando estas señales te vengan, haz lo que tu mano halle que hacer[a], porque Dios está contigo.
