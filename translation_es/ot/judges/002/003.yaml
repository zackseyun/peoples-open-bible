    issue: La nota al pie conserva «sides» en inglés
    rationale: La instrucción exige legibilidad en español y decisiones léxicas explicadas para el lector hispano. Debe decir «costados» o equivalente, no dejar el término inglés sin traducir.
  - severity: low
    issue: «Adversarios para ustedes» es poco idiomático
    rationale: Aunque comprensible, en español bíblico-natural suena más fluido «serán sus adversarios» o «serán adversarios contra ustedes». Esto preserva el sentido hostil de לְצִדִּים mejor en español.
  revised_spanish_text: 'Así también dije[a]: «No los expulsaré de delante de ustedes; serán sus adversarios, y sus dioses serán una trampa para ustedes».'
  revised_footnotes:
  - marker: a
    text: 'Hebreo: «costados». Algunas versiones antiguas y pasajes paralelos leen o interpretan esto como «espinas en sus costados».'
    reason: alternative_reading
  revision_rationale: Se ajusta la nota al pie para que esté completamente en español y refleje la lectura hebrea documentada. También se mejora «adversarios para ustedes» a «sus adversarios», que suena más natural en español y conserva el sentido contextual de hostilidad adoptado por el POB inglés revisado. No se requiere una relectura doctrinal ni textual adicional.
