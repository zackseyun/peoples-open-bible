revisions:
- from: Por lo tanto[a], habiendo reconocido que esta nación sola está continuamente puesta en oposición a todo pueblo, introduciendo un modo de vida ajeno al alterar las leyes, y siendo mal dispuesta para con nuestros asuntos, realizando los peores males, de modo que el reino no llegue a tener estabilidad[b],
  to: Por lo tanto, habiendo reconocido que esta nación sola está continuamente puesta en oposición a todo pueblo[a], introduciendo un modo de vida ajeno al alterar las leyes, y estando mal dispuesta hacia nuestros asuntos, provocando los peores males, de modo que el reino no llegue a tener estabilidad[b],
  rationale: Se corrige la nota [a] para ajustarla a la evidencia griega y al rastro del POB inglés; se mejora «siendo mal dispuesta para con» a «estando mal dispuesta hacia» por naturalidad española; y se reemplaza «realizando los peores males» por «provocando los peores males» para expresar mejor el sentido causal acusatorio del griego. El resto del texto se mantiene por fidelidad al original y al tono hostil de la carta real.
