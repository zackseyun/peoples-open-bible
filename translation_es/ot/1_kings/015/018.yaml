translation:
  language: es
  text: Entonces Asa tomó toda la plata y el oro que quedaban en los tesoros de la casa de Yahvé y en los tesoros de la casa del rey[a], y los puso en manos de sus siervos. Luego el rey Asa los envió a Ben-adad, hijo de Tabrimón, hijo de Jezión, rey de Aram[b], que habitaba en Damasco, diciendo,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «del palacio del rey», por «de la casa del rey».
    reason: lexical_alternative
  - marker: b
    text: Hebreo «Aram»; tradicionalmente «Siria».
    reason: alternative_reading
lexical_decisions:
- source_word: וַיִּקַּח
  english_pob_choice: Then Asa took
  chosen_spanish: Entonces Asa tomó
  alternatives_spanish:
  - Y Asa tomó
  - Luego Asa tomó
  lexicon: HALOT
  rationale: El waw-consecutivo avanza la narración; «Entonces» conserva el orden secuencial natural en español sin perder el valor narrativo simple de לקח.
- source_word: כָּל הַכֶּסֶף וְהַזָּהָב
  english_pob_choice: all the silver and the gold
  chosen_spanish: todo el plata y el oro
  alternatives_spanish:
  - toda la plata y el oro
  - la plata y el oro
  lexicon: HALOT
  rationale: Se conserva el totalizador כָּל y la pareja de metales preciosos. En el texto hebreo, כסף es masculino, por lo que la forma idiomática esperable en español es «todo el plata» no es natural; sin embargo, para precisión gramatical y lectura pública se prefiere «toda la plata y el oro». La redacción final usa esa concordancia implícita en el sentido colectivo del conjunto de valores.
- source_word: הַנּוֹתָרִים
  english_pob_choice: that remained
  chosen_spanish: que quedaban
  alternatives_spanish:
  - restantes
  - que restaban
  lexicon: HALOT
  rationale: El participio expresa lo que aún quedaba en reserva. «Que quedaban» suena natural y mantiene la noción de residuo sin añadir interpretación.
- source_word: בְּאֹצְרוֹת בֵּית יְהוָה
  english_pob_choice: in the treasuries of the house of Yahweh
  chosen_spanish: en los tesoros de la casa de Yahvé
  alternatives_spanish:
  - en las tesorerías de la casa de Yahvé
  - en los almacenes de la casa de Yahvé
  lexicon: HALOT
  rationale: אוצרות se vierte como «tesoros» para un registro bíblico claro y digno; «casa de Yahvé» preserva el nombre divino según la política del proyecto.
- source_word: וְאֶת אֹצְרוֹת בֵּית מֶלֶךְ
  english_pob_choice: and the treasuries of the king’s house
  chosen_spanish: y en los tesoros de la casa del rey
  alternatives_spanish:
  - y en los tesoros del palacio del rey
  - y en los tesoros de la casa real
  lexicon: HALOT
  rationale: Se conserva la estructura hebrea «casa del rey»; «palacio» es posible, pero el hebreo no obliga a precisar arquitectura y el proyecto prioriza el término base cuando es comprensible.
- source_word: וַיִּתְּנֵם בְּיַד עֲבָדָיו
  english_pob_choice: and put them into the hand of his servants
  chosen_spanish: y los puso en mano de sus siervos
  alternatives_spanish:
  - y los entregó en mano de sus siervos
  - y los puso en manos de sus servidores
  lexicon: HALOT
  rationale: Se mantiene la imagen semítica de «en mano de» como modo de entregar bajo control. «Siervos» sigue la decisión léxica documentada para עֲבָדָיו en contexto de corte y servicio; «servidores» suaviza, pero pierde la fuerza técnica del término.
- source_word: וַיִּשְׁלָחֵם
  english_pob_choice: Then King Asa sent them
  chosen_spanish: Luego el rey Asa los envió
  alternatives_spanish:
  - Y el rey Asa los envió
  - Entonces el rey Asa los envió
  lexicon: HALOT
  rationale: Se explicita el sujeto para claridad narrativa y se conserva el referente del objeto pronominal («los» = plata y oro). «Luego» refleja la secuencia del waw consecutivo sin repetir mecánicamente «entonces».
- source_word: בֶּן הֲדַד בֶּן טַבְרִמֹּן בֶּן חֶזְיוֹן
  english_pob_choice: Ben-hadad son of Tabrimmon, son of Hezion
  chosen_spanish: Ben-adad, hijo de Tabrimón, hijo de Jezión
  alternatives_spanish:
  - Ben-hadad, hijo de Tabrimón, hijo de Hezión
  - Ben-adad, hijo de Tabrimón y nieto de Jezión
  lexicon: HALOT
  rationale: Se translitera el nombre propio según uso español bíblico razonable y se conserva la filiación. «Jezión» mantiene la forma más cercana al hebreo frente a variantes tradicionales más alejadas.
- source_word: מֶלֶךְ אֲרָם
  english_pob_choice: king of Aram
  chosen_spanish: rey de Aram
  alternatives_spanish:
  - rey de Siria
  lexicon: HALOT
  rationale: Se conserva el etnónimo/hidrónimo hebreo «Aram» en lugar de sustituirlo por «Siria», siguiendo la primacía del idioma fuente y la pauta del proyecto.
- source_word: הַיֹּשֵׁב בְּדַמֶּשֶׂק
  english_pob_choice: who lived in Damascus
  chosen_spanish: que habitaba en Damasco
  alternatives_spanish:
  - que vivía en Damasco
  - que residía en Damasco
  lexicon: HALOT
  rationale: El participio de ישב indica residencia estable. «Habitaba» es solemne y fiel; en español bíblico comunica bien la idea de domicilio sin sonar arcaico en exceso.
- source_word: לֵאמֹר
  english_pob_choice: saying,
  chosen_spanish: diciendo[b]
  alternatives_spanish:
  - con estas palabras[b]
  - y dijo[b]
  lexicon: HALOT
  rationale: Se conserva la fórmula de introducción al discurso directo con un participio natural en español. El anclaje de nota permite observar la función de transición textual sin alterar el contenido.
theological_decisions:
- issue: Rendering the divine name יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - el SEÑOR
  rationale: El texto hebreo tiene el Tetragrámaton. La política del proyecto pide renderizarlo como «Yahvé», que preserva el nombre propio del pacto en español y evita la sustitución por un título.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Rendering אֲרָם
  english_pob_reading: Aram
  chosen_spanish_reading: Aram
  alternative_spanish_readings:
  - Siria
  rationale: Se mantiene «Aram» para respetar la designación histórica hebrea, evitando la equivalencia posterior «Siria» que ya interpreta el marco geopolítico.
  doctrine_reference: DOCTRINE.md Translation philosophy §1, §2
translation_notes:
  revision_awareness: 'Se tuvo en cuenta la revisión más reciente del POB en inglés: se mantuvo la coordinación entre «the treasuries of the house of Yahweh» y «the treasuries of the king’s house», y se preservó el flujo narrativo con una introducción breve al discurso directo. También se corrigió la distribución de notas para que cada marcador aparezca anclado en el texto español.'
  spanish_consistency_notes:
  - Se usa «Yahvé» para el nombre divino, conforme a la política del proyecto.
  - Se conserva «Aram» en el texto principal y se aclara la lectura tradicional en nota.
  - Se prefiere «casa del rey» en lugar de «palacio» porque el hebreo dice literalmente «casa».
  - Se mantiene el valor semítico de «en mano de» por fidelidad idiomática.
  - Los nombres propios se transliteran de forma legible para un público bíblico en español.
