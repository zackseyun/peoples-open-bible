translation:
  language: es
  text: Preparen una matanza para sus hijos por la culpa de sus padres[a], no sea que se levanten y posean la tierra[b], y llenen la faz del mundo con ciudades[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «por la iniquidad de sus padres»; עון puede denotar culpa, iniquidad o la consecuencia/punición resultante de la culpa.
    reason: lexical_alternative
  - marker: b
    text: O «hereden la tierra»; el verbo hebreo puede significar «heredar», «tomar posesión de» o «poseer».
    reason: lexical_alternative
  - marker: c
    text: Literalmente, «llenen la faz del mundo con ciudades».
    reason: lexical_alternative
lexical_decisions:
- source_word: הָכִינוּ
  english_pob_choice: Prepare
  chosen_spanish: Preparen
  alternatives_spanish:
  - Preparad
  - Hagan listo
  lexicon: HALOT
  rationale: El imperativo plural en hebreo pide una orden directa; «Preparen» es natural en español moderno y conserva la fuerza exhortativa.
- source_word: לְבָנָיו
  english_pob_choice: for his sons
  chosen_spanish: para sus hijos
  alternatives_spanish:
  - para sus hijos varones
  - para sus descendientes
  lexicon: HALOT
  rationale: «בנים» con sufijo puede traducirse literalmente como «hijos»; en español evita la repetición torpe de «hijos varones» sin perder la referencia filial.
- source_word: מַטְבֵּחַ
  english_pob_choice: slaughter
  chosen_spanish: una matanza
  alternatives_spanish:
  - degüello
  - sacrificio de matanza
  lexicon: HALOT
  rationale: El sustantivo denota matanza violenta. «Matanza» transmite la severidad sin introducir un lugar o un matadero que el hebreo no exige aquí.
- source_word: בַּעֲוֺן
  english_pob_choice: because of the guilt of
  chosen_spanish: por la culpa de
  alternatives_spanish:
  - por la iniquidad de
  - por el castigo de la culpa de
  lexicon: HALOT
  rationale: El valor causal con ב se expresa de forma natural con «por la culpa de». Mantiene la dimensión moral de עון y no decide de antemano si el énfasis recae en culpa o en pena.
- source_word: אֲבוֹתָם
  english_pob_choice: their fathers
  chosen_spanish: sus padres
  alternatives_spanish:
  - sus antepasados
  lexicon: HALOT
  rationale: Aunque el hebreo dice literalmente «sus padres», en español «sus padres» suena más directo que «sus padres varones» y conserva el vínculo intergeneracional.
- source_word: בַּל
  english_pob_choice: lest
  chosen_spanish: para que no
  alternatives_spanish:
  - no sea que
  - a fin de que no
  lexicon: HALOT
  rationale: En español contemporáneo, «para que no» comunica la cláusula de propósito negativo con claridad. «No sea que» también sería posible, pero menos natural aquí.
- source_word: יָקֻמוּ
  english_pob_choice: they rise up
  chosen_spanish: se levanten
  alternatives_spanish:
  - se alcen
  - se pongan en pie
  lexicon: HALOT
  rationale: El verbo puede sugerir levantarse o alzarse a la acción/poder. «Se levanten» conserva ambas posibilidades sin cargar demasiado el sentido político.
- source_word: וְיָרְשׁוּ אָרֶץ
  english_pob_choice: and possess the land
  chosen_spanish: y posean la tierra
  alternatives_spanish:
  - y hereden la tierra
  - y tomen posesión de la tierra
  lexicon: HALOT
  rationale: «ירש» puede significar heredar o poseer. Se eligió «posean la tierra» para no restringir el sentido a herencia pactual y mantener la amenaza territorial.
- source_word: תֵבֵל
  english_pob_choice: world
  chosen_spanish: mundo
  alternatives_spanish:
  - mundo habitado
  - tierra habitada
  lexicon: HALOT
  rationale: «תֵבֵל» designa el mundo habitado. «Mundo» es el equivalente español más natural y mantiene el paralelismo con «la tierra» de אָרֶץ.
- source_word: עָרִים
  english_pob_choice: with cities
  chosen_spanish: con ciudades
  alternatives_spanish:
  - de ciudades
  - lleno de ciudades
  lexicon: HALOT
  rationale: El plural «ciudades» conserva la imagen de expansión urbana. «Con ciudades» sigue de cerca la construcción hebrea y resulta comprensible en español.
theological_decisions:
- issue: Juicio intergeneracional ligado a la culpa de los padres
  english_pob_reading: Retain the text's statement of judgment on sons in connection with their fathers' guilt without softening or resolving the tension.
  chosen_spanish_reading: Conservar la afirmación de juicio sobre los hijos vinculada con la culpa de sus padres, sin suavizar ni resolver la tensión.
  alternative_spanish_readings:
  - Interpretarlo como castigo sólo de hijos que continúan los pecados paternos
  - Entender עון principalmente como castigo y no como culpa
  rationale: El versículo enlaza explícitamente la matanza de los hijos con la culpa de los padres. La redacción española conserva esa tensión, y «culpa» mantiene la dimensión moral sin cerrar el sentido a una sola explicación.
  doctrine_reference: Preservar la tensión teológica sin armonizarla artificialmente.
translation_notes:
  revision_awareness: 'Se atendió la revisión del flujo POB: se mantuvo la distinción entre אָרֶץ y תֵבֵל, evitando igualarlos. Por eso se traduce אָרֶץ como «la tierra» y תֵבֵל como «el mundo».'
  spanish_consistency_notes:
  - Se preservó el paralelismo semántico entre «la tierra» y «el mundo».
  - Se evitó «SEÑOR» y otras convenciones de ocultamiento porque este versículo no contiene el tetragrámaton.
  - «Matanza» se eligió para respetar la fuerza del sustantivo hebreo sin convertirlo en un lugar o institución.
