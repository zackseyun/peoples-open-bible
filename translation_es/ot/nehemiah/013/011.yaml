base_translation:
  language: en
  yaml_path: translation/ot/nehemiah/013/011.yaml
  text: So I contended with the officials and said[b][a], “Why has the house of God been neglected?” Then I gathered them and stationed them at their posts.
  footnotes:
  - marker: a
    text: Or 'Why has the house of God been abandoned?' The Hebrew passive verb can denote being left or forsaken; here the context favors 'neglected' because Nehemiah is addressing failure to maintain temple service and support.
    reason: lexical_alternative
  - marker: b
    text: Or 'set them in their place.' The phrase refers to restoring the Levites and related personnel to their assigned duties.
    reason: lexical_alternative
