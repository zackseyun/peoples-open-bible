    reason: cultural_note
  revision_rationale: 'Se ajusta el español para que suene natural y fiel: «apartándonos de seguir a nuestro Dios» expresa mejor el hebreo idiomático de dejar de seguir; «rebelión» refleja mejor וְסָרָה que «revuelta» en este contexto; y se ancla correctamente la nota [b] en «desde el corazón», tal como exige la disciplina de notas del proyecto.'
