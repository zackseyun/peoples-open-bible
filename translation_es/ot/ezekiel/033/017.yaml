review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el sentido general del hebreo: el pueblo acusa al camino de Dios de no ser justo, y el versículo revierte la acusación sobre ellos mismos. También conserva la repetición de לֹא יִתָּכֵן / «no es justo». Sin embargo, hay un problema importante de alineación léxica: el hebreo dice אֲדֹנָי, no יהוה, por lo que «Yahvé» no preserva con fidelidad la forma fuente en este versículo.'
  spanish_quality_summary: El español es claro y legible, pero «aunque el que no es justo es su propio camino» suena algo forzado. Una formulación más natural y igualmente fiel es «pero su propio camino no es justo». Además, la nota con «no es correcto» debilita el matiz forense mejor que «no es recto» o «no es equitativo».
  glossary_alignment: Buen manejo de «justo» y de «su propio camino». No obstante, la política general de usar «Yahvé» no debe imponerse contra la evidencia cuando el texto fuente tiene אֲדֹנָי; aquí corresponde «el Señor».
  issues:
  - severity: high
    issue: Se traduce אֲדֹנָי como «Yahvé».
    rationale: La política del proyecto distingue יהוה / YHWH -> «Yahvé», pero este versículo usa אֲדֹנָי. Cambiarlo a «Yahvé» borra una diferencia real del texto fuente y contradice el propio expediente inglés, que correctamente traduce «the Lord». No hay aquí cita griega ni razón contextual que justifique la sustitución.
  - severity: medium
    issue: 'La segunda cláusula española es poco natural: «aunque el que no es justo es su propio camino».'
    rationale: Aunque transmite el contraste, la construcción resulta pesada en español. El hebreo enfatiza el pronombre y la inversión retórica; eso puede expresarse naturalmente con «pero su propio camino no es justo», sin pérdida de sentido.
  - severity: low
    issue: La nota alternativa usa «no es correcto», que es menos precisa teológicamente.
    rationale: «Correcto» suena más amplio o coloquial y pierde parte del matiz jurídico-moral de יִתָּכֵן. «Recto» o «equitativo» representan mejor las alternativas documentadas por el expediente inglés («right» / «fair»).
  revised_spanish_text: 'Sin embargo, los hijos de tu pueblo dicen[a]: «El camino del Señor no es justo», pero su propio camino no es justo.'
  revised_footnotes:
  - marker: a
    text: También puede traducirse «no es recto» o «no es equitativo» en ambas ocurrencias de «no es justo».
    reason: lexical_alternative
  revision_rationale: Se cambia «Yahvé» por «el Señor» para reflejar fielmente אֲדֹנָי en la fuente hebrea. Se alisa la segunda cláusula para un español más natural, manteniendo la misma inversión retórica y la repetición deliberada de «no es justo». Se ajusta la nota léxica para ofrecer alternativas más cercanas al rango semántico y al expediente inglés.
