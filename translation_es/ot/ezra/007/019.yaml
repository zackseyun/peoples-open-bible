    reason: lexical_alternative
  revision_rationale: La revisión conserva el sentido y la estructura del original y de la POB inglesa, pero mejora la naturalidad del español y elimina una alternativa interpretativa no documentada («vasos sagrados»). «Entrégalos íntegramente» expresa mejor la idea de entregar todo plenamente delante de Dios.
