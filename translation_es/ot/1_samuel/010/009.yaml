base_translation:
  language: en
  yaml_path: translation/ot/1_samuel/010/009.yaml
  text: And it happened[a], when he turned his back to go from Samuel, that God gave him another heart[b], and all these signs came to pass on that day.
  footnotes:
  - marker: a
    text: Or 'when he turned his back to leave.' The Hebrew literally says 'turned his shoulder,' an idiom for departing.
    reason: lexical_alternative
  - marker: b
    text: Or 'God gave him a different heart.' The Hebrew is literally 'God changed for him another heart.'
    reason: alternative_reading
