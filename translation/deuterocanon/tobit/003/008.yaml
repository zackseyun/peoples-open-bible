id: TOB.3.8
reference: Tobit 3:8
source:
  edition: lxx-swete-1909
  text: ὅτι ἦν δεδομένη ἀνδράσιν ἑπτά, καὶ Ἀσμοδαῖος τὸ πονηρὸν δαιμόνιον ἀπέκτεινεν αὐτοὺς πρὶν ἢ γενέσθαι αὐτοὺς μετʼ αὐτῆς ὡς ἐν γυναιξίν. καὶ εἶπαν αὐτῇ Οὐ συνιεῖς ἀποπνίγουσά σου τοὺς ἄνδρας; ἤδη ἑπτὰ ἔσχες, καὶ ἑνὸς αὐτῶν οὐκ ὠνάσθης.
  language: Greek
