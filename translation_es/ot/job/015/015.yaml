translation:
  language: es
  text: Mira[a], no confía en sus santos, y los cielos no son puros ante sus ojos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «sus santos seres». El hebreo dice «sus santos» o «sus santos/consagrados», probablemente refiriéndose aquí a seres celestiales.
    reason: lexical_alternative
lexical_decisions:
- source_word: הֵן
  english_pob_choice: Look
  chosen_spanish: Mira
  alternatives_spanish:
  - Mira, pues
  - Mira bien
  - He aquí
  lexicon: HALOT
  rationale: La partícula introduce una atención enfática. «Mira» conserva ese llamado directo en un español natural y digno, sin sonar arcaico.
- source_word: בְּקְדֹשָׁיו
  english_pob_choice: in his holy ones
  chosen_spanish: sus seres santos
  alternatives_spanish:
  - sus santos
  - sus santos seres
  - sus seres celestiales
  lexicon: HALOT
  rationale: El hebreo dice literalmente «sus santos/seres santos». En Job el referente probablemente es celestial; «seres santos» mantiene la amplitud léxica y evita la carga eclesiástica de «santos» en español. Se evita cerrar demasiado el referente en el texto principal.
- source_word: לֹא יַאֲמִין
  english_pob_choice: he puts no trust
  chosen_spanish: no pone confianza
  alternatives_spanish:
  - no confía
  - no deposita confianza
  - no tiene confianza
  lexicon: HALOT
  rationale: El valor verbal es poner/depositar confianza. «No pone confianza» refleja la acción relacional del verbo sin forzar «creer» ni «tener fe», que podrían desviar el sentido.
- source_word: וְשָׁמַיִם
  english_pob_choice: and the heavens
  chosen_spanish: y los cielos
  alternatives_spanish:
  - y el cielo
  - y los cielos mismos
  lexicon: HALOT
  rationale: El hebreo está en plural. «Los cielos» preserva esa forma y encaja con el paralelismo poético frente a «sus seres santos».
- source_word: לֹא זַכּוּ
  english_pob_choice: are not pure
  chosen_spanish: no son puros
  alternatives_spanish:
  - no están limpios
  - no son limpios
  - no son inocentes
  lexicon: HALOT
  rationale: En este contexto זכה expresa pureza/limpieza. «No son puros» es claro en español y conserva el contraste moral-poético sin introducir un matiz judicial no requerido.
- source_word: בְּעֵינָיו
  english_pob_choice: in his eyes
  chosen_spanish: ante sus ojos
  alternatives_spanish:
  - a sus ojos
  - en sus ojos
  - en su نظر
  lexicon: HALOT
  rationale: La imagen idiomática comunica evaluación divina. «Ante sus ojos» suena natural en español y mantiene la perspectiva evaluativa del hebreo.
theological_decisions:
- issue: Referente de «sus seres santos»
  english_pob_reading: heavenly holy beings/angels rather than human saints
  chosen_spanish_reading: seres santos celestiales, sin especificar ángeles en el texto principal
  alternative_spanish_readings:
  - ángeles
  - santos humanos
  - seres celestiales
  rationale: El paralelismo con «los cielos» apunta a seres celestiales. Sin embargo, el hebreo no nombra explícitamente ángeles, así que el español conserva la indeterminación de «seres santos» y deja la aclaración en nota.
  doctrine_reference: 'Translation philosophy §3: preservar la tensión interpretativa en vez de resolverla prematuramente'
translation_notes:
  revision_awareness: 'Se tuvo en cuenta el pasaje y el aparato inglés: la decisión de «Mira» para הֵן, «seres santos» para בְּקְדֹשָׁיו, y «los cielos» para וְשָׁמַיִם sigue la lectura auditada; no se detectaron revisiones ulteriores que alteraran el sentido.'
  spanish_consistency_notes:
  - Se mantiene «cielos» en plural para reflejar el hebreo.
  - Se evita «señor»/«SEÑOR» porque no aparece el nombre divino en este versículo.
  - «Sus seres santos» conserva la tensión entre traducción literal y posible referencia celestial.
  - La nota al pie usa una alternativa lexical permitida por el audit trail inglés y no añade especulación doctrinal más allá de lo indicado.
