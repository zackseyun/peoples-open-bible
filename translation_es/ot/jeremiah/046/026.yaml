revisions:
- from: Y los entregaré en manos de los que buscan su vida[a], y en manos de Nabucodonosor, rey de Babilonia, y en manos de sus siervos. Pero después habitará como en los días de antaño, declara Yahvé.
  to: Y los entregaré en manos de los que buscan la vida de ellos[a], y en manos de Nabucodonosor, rey de Babilonia, y en manos de sus siervos. Pero después habitará como en los días de antaño, declara Yahvé.
  rationale: Se ajusta la frase idiomática para mayor claridad en español manteniendo la cercanía al hebreo, y se rehace la nota para reflejar correctamente la alternativa léxica preservada en el rastro POB. No se requieren cambios doctrinales ni estructurales adicionales.
