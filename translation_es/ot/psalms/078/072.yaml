revisions:
- from: Así pastoreó[a] con integridad de corazón, y los guió con la destreza de sus manos.
  to: Así los pastoreó con integridad de corazón[a], y los guió con la destreza[b] de sus manos.
  rationale: Se añade «los» para reflejar explícitamente el sufijo plural del hebreo y mejorar la naturalidad sintáctica. Se reubica la nota [a] al sintagma que realmente varía. Se añade la nota [b] para conservar la alternativa léxica documentada por el POB inglés respecto de תבונות כפּיו, mientras se mantiene «destreza» como la mejor opción principal en español.
