translation:
  language: es
  text: No tendrás en tu bolsa[a] pesas desiguales, una grande y una pequeña.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literalmente, «una piedra y una piedra», es decir, pesas de piedra usadas para medir en el comercio.
    reason: lexical_alternative
lexical_decisions:
- source_word: לֹא
  english_pob_choice: not
  chosen_spanish: 'No'
  alternatives_spanish:
  - No debes
  - No tendrás
  lexicon: HALOT
  rationale: La prohibición hebrea se vierte naturalmente con negación directa en español. 'No' conserva el tono legal del mandato.
- source_word: יִהְיֶה
  english_pob_choice: shall have
  chosen_spanish: tendrás
  alternatives_spanish:
  - habrá
  - deberás tener
  lexicon: HALOT
  rationale: 'La construcción hebrea ''no habrá para ti'' se expresa con una fórmula idiomática y jurídica en español: ''No tendrás''. Mantiene el sentido de posesión ilícita prohibida.'
- source_word: בְּכִיסְךָ
  english_pob_choice: in your bag
  chosen_spanish: en tu bolsa
  alternatives_spanish:
  - en tu saco
  - en tu bolsa de dinero
  - en tu morral
  lexicon: HALOT
  rationale: כִּיס denota bolsa o pouch, especialmente de dinero o pesas. 'Bolsa' es claro, natural y suficientemente amplio para el contexto comercial.
- source_word: אֶבֶן וָאָבֶן
  english_pob_choice: differing weights
  chosen_spanish: pesas desiguales
  alternatives_spanish:
  - pesas distintas
  - una pesa y otra pesa
  - pesas diferentes
  lexicon: HALOT
  rationale: La expresión literal 'piedra y piedra' alude a pesas de piedra usadas en el comercio. 'Pesas desiguales' comunica el sentido idiomático sin perder la denuncia de fraude; además conserva la idea de diferencia denunciada por la revisión inglesa.
- source_word: גְּדוֹלָה וּקְטַנָּה
  english_pob_choice: a large and a small
  chosen_spanish: una grande y una pequeña
  alternatives_spanish:
  - una mayor y una menor
  - una grande y otra pequeña
  lexicon: HALOT
  rationale: Los adjetivos femeninos describen el par de pesas implícito. 'Grande' y 'pequeña' refleja bien la contraposición hebrea y resulta natural en español.
translation_notes:
  revision_awareness: La versión inglesa más reciente sustituyó 'two kinds of weights' por 'differing weights' para reflejar con mayor formalidad el modismo hebreo 'una piedra y una piedra'. La redacción española adopta esa misma decisión semántica con 'pesas desiguales', y conserva la oposición final 'una grande y una pequeña'.
  spanish_consistency_notes:
  - Se usa 'bolsa' para כִּיס, en línea con el valor de bolsa/pouch y con un registro moderno y digno.
  - '''Pesas desiguales'' evita calcar literalmente ''piedra y piedra'' en el texto principal, pero la nota preserva la metáfora original y su referencia comercial.'
  - Se mantiene el paralelismo de los adjetivos finales con género femenino, acorde con el sustantivo implícito 'pesas'.
