translation:
  language: es
  text: En un monte alto y elevado pusiste tu cama; allí también[a] subiste para sacrificar un sacrificio.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'También: «incluso allí».'
    reason: lexical_alternative
lexical_decisions:
- source_word: עַל
  english_pob_choice: 'On'
  chosen_spanish: En
  alternatives_spanish:
  - Sobre
  - En lo alto de
  lexicon: HALOT
  rationale: La preposición introduce el lugar de la acción. En español, 'en' comunica naturalmente ubicación sin forzar una construcción menos idiomática.
- source_word: הַר
  english_pob_choice: mountain
  chosen_spanish: monte
  alternatives_spanish:
  - montaña
  - cerro
  lexicon: HALOT
  rationale: '''הַר'' puede referirse a una elevación montañosa o a un monte/hill-country en contexto de culto pagano. ''Monte'' suena natural en español bíblico y conserva el valor topográfico.'
- source_word: גָּבֹהַּ וְנִשָּׂא
  english_pob_choice: high and lofty
  chosen_spanish: alto y encumbrado
  alternatives_spanish:
  - alto y elevado
  - alto y exaltado
  lexicon: HALOT
  rationale: El par adjetival intensifica la altura. 'Encumbrado' preserva el matiz de elevación marcada sin cargar necesariamente un tono teológico ajeno al contexto.
- source_word: שַׂמְתְּ
  english_pob_choice: you set
  chosen_spanish: pusiste
  alternatives_spanish:
  - colocaste
  - pusiste
  lexicon: HALOT
  rationale: El perfecto 2fs de שׂים admite 'poner/colocar'. 'Pusiste' es claro, directo y natural en español.
- source_word: מִשְׁכָּבֵךְ
  english_pob_choice: your bed
  chosen_spanish: tu cama
  alternatives_spanish:
  - tu lecho
  - tu lugar de acostarte
  lexicon: HALOT
  rationale: '''מִשְׁכָּב'' puede ser cama/lecho/lugar de reposo; en este contexto profético conserva además una carga sexual e idolátrica. ''Cama'' mantiene la imagen concreta y la ambigüedad acusatoria.'
- source_word: גַּם שָׁם
  english_pob_choice: there too
  chosen_spanish: allí también
  alternatives_spanish:
  - también allí
  - incluso allí
  lexicon: HALOT
  rationale: La locución añade que la misma conducta ocurrió en ese lugar. 'Allí también' es idiomático y mantiene el énfasis.
- source_word: עָלִית
  english_pob_choice: you went up
  chosen_spanish: subiste
  alternatives_spanish:
  - ascendiste
  - subiste
  lexicon: HALOT
  rationale: El verbo literalmente significa 'subir/ascender'. 'Subiste' es la forma más natural en español y preserva la escena del monte.
- source_word: לִזְבֹּחַ זָבַח
  english_pob_choice: to sacrifice a sacrifice
  chosen_spanish: para sacrificar sacrificio
  alternatives_spanish:
  - para ofrecer sacrificio
  - para sacrificar un sacrificio
  lexicon: HALOT
  rationale: El infinitivo con el sustantivo cognado intensifica la acción cultual. Se conserva la repetición formal del hebreo, sin neutralizarla con una paráfrasis más interpretativa.
theological_decisions:
- issue: Imagen de 'tu cama' en un contexto de idolatría y adulterio espiritual
  english_pob_reading: Retain the concrete image 'your bed' without explicating the metaphor in the main text.
  chosen_spanish_reading: Conservar 'tu cama' sin explicitar en el texto principal la metáfora de idolatría sexual.
  alternative_spanish_readings:
  - tu lecho
  - tu lecho idolátrico
  - tu lugar de prostitución cultual
  rationale: El hebreo presenta la imagen concreta y deja que la acusación profética funcione por sí misma. Explicitarla en la línea principal sería interpretación, no traducción.
  doctrine_reference: Translation philosophy §§1, 3, 6
- issue: Reproducción del cognado verbal-sustantivo en זבח
  english_pob_reading: 'Render with sacrificial terminology: ''sacrifice a sacrifice.'''
  chosen_spanish_reading: 'Mantener la redundancia formal: ''sacrificar sacrificio.'''
  alternative_spanish_readings:
  - ofrecer sacrificio
  - realizar un sacrificio
  - sacrificar una ofrenda
  rationale: La repetición enfatiza el acto sacrificial ilícito. En español, una formulación literal pero legible conserva mejor la fuerza retórica que una normalización interpretativa.
  doctrine_reference: Translation philosophy §§1, 6
translation_notes:
  revision_awareness: Se corrigió la validación anterior asegurando que el marcador de nota [a] aparezca exactamente en el texto español. También se retiró la nota [b] no anclada y se consolidó la decisión lexical del final para reflejar la repetición hebrea.
  spanish_consistency_notes:
  - Se mantiene 'monte' para הַר y 'alto y encumbrado' para el par adjetival, evitando una armonización que borre la intensificación.
  - '''Tu cama'' conserva la ambigüedad profética de imagen sexual/idolátrica sin explicitarla en el cuerpo del verso.'
  - La cláusula final reproduce la redundancia de זבח con 'sacrificar sacrificio' para no perder el eco cognado del hebreo.
  - El adverbio 'allí también' preserva la función enfática de גַּם שָׁם de manera natural en español.
