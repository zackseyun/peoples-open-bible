    text: O «viene sobre»; literalmente, «pasa sobre él».
    reason: lexical_alternative
  - marker: b
    text: O «todo este procedimiento» o «todo este rito».
    reason: lexical_alternative
  revision_rationale: Se corrige «mandamiento» a «ley» para reflejar mejor תּוֹרָה en este contexto ritual-legal y para alinearse con la revisión inglesa auditada. También se mueve la nota [b] a la frase correcta y se simplifica la nota [a] para que corresponda con mayor precisión al valor lexical documentado.
