revisions:
- from: No tomarán para sí como esposas a una viuda ni a una mujer divorciada[a], sino solamente vírgenes de la descendencia de la casa de Israel; pero podrán tomar una viuda que sea viuda de sacerdote.
  to: No tomarán para sí como esposas a una viuda ni a una mujer divorciada, sino solamente vírgenes de la descendencia de la casa de Israel; sin embargo, podrán tomar a una viuda que haya quedado viuda de un sacerdote[a].
  rationale: Se corrigió el anclaje de la nota para que corresponda a la cláusula final, en conformidad con el audit trail inglés y el hebreo. También se reformuló la excepción final a un español más natural («haya quedado viuda de un sacerdote») sin perder el sentido legal ni el doble énfasis del original. La nota ahora preserva la alternativa más literal documentada en inglés.
