translation:
  language: es
  text: 'Mi pueblo: sus opresores son niños, y mujeres gobiernan sobre ellos. Mi pueblo: tus guías[a] te extravían y se tragan el camino de tus sendas[b].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «tus bendictores» o «los que te llaman bienaventurado»; la forma hebrea puede llevar ese sentido, pero aquí probablemente se refiere a dirigentes o guías que desvían al pueblo.'
    reason: lexical_alternative
  - marker: b
    text: 'El hebreo literalmente dice: «devoran el camino de tus sendas», una metáfora vívida de borrar o consumir el curso correcto del pueblo.'
    reason: lexical_alternative
lexical_decisions:
- source_word: נֹגְשָׂיו
  english_pob_choice: his oppressors
  chosen_spanish: sus opresores
  alternatives_spanish:
  - sus taskmasters
  - los que lo oprimen
  lexicon: HALOT
  rationale: En contexto profético, נגשׂ designa a quienes oprimen o exigen con dureza. «Opresores» conserva ese valor social y judicial con naturalidad en español. El posesivo plural «sus» sigue el sentido colectivo de «mi pueblo» como grupo.
- source_word: מְעוֹלֵל
  english_pob_choice: are children
  chosen_spanish: son niños
  alternatives_spanish:
  - es un niño
  - son inmaduros
  - se comportan como niños
  lexicon: HALOT
  rationale: La forma es difícil, pero la lectura más probable en el contexto es la imagen de gobernantes/oprimidores infantiles o inmaduros. «Son niños» mantiene la metáfora sin explicarla de más.
- source_word: וְנָשִׁים מָשְׁלוּ בוֹ
  english_pob_choice: and women rule over him
  chosen_spanish: y mujeres gobiernan sobre ellos
  alternatives_spanish:
  - y mujeres gobiernan sobre él
  - y mujeres mandan sobre ellos
  - y mujeres rigen sobre ellos
  lexicon: HALOT
  rationale: El hebreo dice literalmente «mujeres». En español, «gobiernan sobre» comunica היטב el verbo משל. Se usa «sobre ellos» para concordar con el colectivo «mi pueblo», siguiendo la revisión del POB en inglés.
- source_word: מְאַשְּׁרֶיךָ
  english_pob_choice: your guides
  chosen_spanish: tus guías
  alternatives_spanish:
  - los que te guían
  - tus bendictores
  - los que te llaman bienaventurado
  lexicon: HALOT
  rationale: Aunque אשר puede significar «declarar feliz/bendito», el paralelismo con «te extravían» favorece la idea de quienes dirigen o guían al pueblo. «Guías» recoge esa función en forma natural. La alternativa lexical se preserva en la nota.
- source_word: מַתְעִים
  english_pob_choice: lead you astray
  chosen_spanish: te extravían
  alternatives_spanish:
  - te desvían
  - te hacen errar
  - te hacen andar perdidamente
  lexicon: HALOT
  rationale: El causativo de תעה expresa hacer errar o desviar. «Te extravían» es idiomático en español y mantiene la imagen de desorientación.
- source_word: דֶרֶךְ אֹרְחֹתֶיךָ
  english_pob_choice: the course of your paths
  chosen_spanish: el camino de tus sendas
  alternatives_spanish:
  - la senda de tus caminos
  - el curso de tus caminos
  - tus sendas
  lexicon: HALOT
  rationale: El hebreo acumula dos términos de camino para intensificar la idea. «El camino de tus sendas» conserva ambos elementos y el efecto enfático, sin reducirlo a un solo término.
- source_word: בִּלֵּעוּ
  english_pob_choice: they swallow up
  chosen_spanish: se tragan
  alternatives_spanish:
  - devoran
  - engullen
  - destruyen
  lexicon: HALOT
  rationale: בלע es literalmente «tragar, engullir, devorar». «Se tragan» preserva la metáfora vívida en español. Se evita una abstracción como «destruyen» para no perder el color del hebreo.
theological_decisions:
- issue: Referencia literal a «mujeres» gobernando
  english_pob_reading: Retain the literal 'women rule over him' as a prophetic image of social inversion/disorder in context, without softening or expanding into a doctrinal statement about women generally.
  chosen_spanish_reading: Mantener la referencia literal a «mujeres gobiernan sobre ellos» como imagen profética de inversión y desorden social, sin convertirla en una afirmación doctrinal general sobre las mujeres.
  alternative_spanish_readings:
  - neutralizar como «los débiles gobiernan sobre ellos»
  - cambiar por una lectura emendada no atestiguada
  rationale: El hebreo explícitamente menciona «mujeres». La traducción debe respetar esa forma para no borrar el tropo retórico del juicio. Al mismo tiempo, el español no debe ampliar la frase a una tesis universal sobre el género femenino.
  doctrine_reference: Translation philosophy §§1, 4
translation_notes:
  revision_awareness: Conforme a la revisión más reciente del POB inglés, el plural de referencia se mantiene de manera colectiva («sus opresores ... sobre ellos») y la última cláusula se presenta como continuación coordinada sin pausa fuerte. La traducción española refleja ese ajuste.
  spanish_consistency_notes:
  - Se conservó el plural colectivo para mi pueblo, coherente con el ajuste editorial del inglés.
  - Se mantuvo la metáfora fuerte de «tragar/devorar» en lugar de suavizarla.
  - Se preservó el contraste entre «niños» y «mujeres» sin reinterpretación doctrinal.
  - Se usó «guías» para מְאַשְּׁרֶיךָ por el paralelismo con «te extravían», dejando la alternativa lexical en nota.
