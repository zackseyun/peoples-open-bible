translation:
  language: es
  text: Pondrás el velo debajo de los corchetes, y allí, dentro del velo, traerás el arca del testimonio[a]; y el velo hará separación para ustedes entre el Lugar Santo y el Lugar Santísimo[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'el arca del pacto'. El hebreo aquí dice 'testimonio'.
    reason: lexical_alternative
  - marker: b
    text: Literalmente, 'Santo de los Santos'.
    reason: lexical_alternative
lexical_decisions:
- source_word: פָּרֹכֶת
  english_pob_choice: veil
  chosen_spanish: velo
  alternatives_spanish:
  - cortina
  lexicon: HALOT
  rationale: En el contexto del tabernáculo, פָּרֹכֶת designa la pieza que cubre y separa el acceso al santuario interior. 'Velo' conserva la función de barrera sagrada con un término bíblico natural en español; 'cortina' es posible, pero suena menos preciso en este marco cultual.
- source_word: קְרָסִים
  english_pob_choice: clasps
  chosen_spanish: corchetes
  alternatives_spanish:
  - ganchos
  - broches
  lexicon: HALOT
  rationale: El término señala los elementos de unión de las cortinas del tabernáculo. 'Corchetes' comunica en español la idea de piezas que enlazan o sujetan sin fijar indebidamente un mecanismo moderno más específico; se mantiene la función constructiva del original.
- source_word: מִבֵּית לַפָּרֹכֶת
  english_pob_choice: within the veil
  chosen_spanish: dentro del velo
  alternatives_spanish:
  - dentro del velo
  - al otro lado del velo
  - desde el interior del velo
  lexicon: HALOT
  rationale: La expresión indica el espacio del lado interior del velo. 'Dentro del velo' es claro en español y preserva la relación espacial sin forzar una paráfrasis.
- source_word: אֲרוֹן הָעֵדוּת
  english_pob_choice: the ark of the testimony
  chosen_spanish: el arca del testimonio
  alternatives_spanish:
  - el arca del pacto
  lexicon: HALOT
  rationale: La fuente hebrea dice literalmente 'testimonio', no 'pacto'. Por eso se conserva 'testimonio' en el texto principal, respetando la primacía del original sobre la tradición de traducción.
- source_word: וְהִבְדִּילָה
  english_pob_choice: shall separate
  chosen_spanish: separará
  alternatives_spanish:
  - hará separación
  - dividirá
  - separará
  lexicon: HALOT
  rationale: La forma causativa expresa la función de separar. 'Separará' es natural y fiel en español; mantiene la idea de delimitación sagrada entre dos ámbitos.
- source_word: לָכֶם
  english_pob_choice: for you
  chosen_spanish: para ustedes
  alternatives_spanish:
  - para vosotros
  - para ti
  lexicon: HALOT
  rationale: El pronombre plural se conserva. 'Para ustedes' ofrece español neutro latinoamericano y refleja con claridad la referencia comunitaria del mandato.
- source_word: הַקֹּדֶשׁ
  english_pob_choice: the Holy Place
  chosen_spanish: el Lugar Santo
  alternatives_spanish:
  - el Santo Lugar
  - el santuario
  lexicon: HALOT
  rationale: En este contexto tabernacular se trata de la cámara exterior sagrada. 'Lugar Santo' comunica bien la distinción técnica y evita confusión con el santuario en general.
- source_word: קֹדֶשׁ הַקֳּדָשִׁים
  english_pob_choice: the Most Holy Place
  chosen_spanish: el Lugar Santísimo
  alternatives_spanish:
  - el Santo de los Santos
  - el Lugar Mostísimo
  lexicon: HALOT
  rationale: La construcción hebrea es superlativa. 'Lugar Santísimo' expresa de forma clara y reverente la distinción del recinto interior, conservando el valor técnico del original.
theological_decisions:
- issue: Nombre técnico del recinto interior del tabernáculo
  english_pob_reading: the Most Holy Place
  chosen_spanish_reading: el Lugar Santísimo
  alternative_spanish_readings:
  - el Santo de los Santos
  rationale: Se eligió una forma española reverente y clara para el espacio interior más sagrado. 'Lugar Santísimo' transmite la superlación del hebreo sin depender de una fórmula eclesiástica fija.
  doctrine_reference: Translation philosophy §6 (readable modern Spanish, not archaic or overly traditional)
- issue: Elección de 'testimonio' en el nombre del arca
  english_pob_reading: the ark of the testimony
  chosen_spanish_reading: el arca del testimonio
  alternative_spanish_readings:
  - el arca del pacto
  rationale: La lectura principal sigue el sustantivo hebreo presente en el versículo. Aunque 'arca del pacto' es una expresión conocida, aquí sería una armonización no exigida por el texto.
  doctrine_reference: Translation philosophy §1 (primacía del original sobre la tradición de traducción)
translation_notes:
  revision_awareness: La redacción sigue la última revisión del POB inglés, que prefirió 'within the veil' por claridad y formalidad. En español se reflejó con 'dentro del velo', manteniendo la ubicación interior sin añadir glosa innecesaria. También se conservó la distinción terminológica entre 'testimonio' y la lectura tradicional 'pacto' en el nombre del arca.
  spanish_consistency_notes:
  - Se mantuvo 'velo' para פָּרֹכֶת en armonía con el valor cultual del término.
  - Se evitó 'SEÑOR' porque este versículo no contiene el Tetragrámaton.
  - Se preservó la distinción técnica entre 'Lugar Santo' y 'Lugar Santísimo'.
  - Se usó español neutro 'para ustedes' para reflejar el plural hebreo לָכֶם.
