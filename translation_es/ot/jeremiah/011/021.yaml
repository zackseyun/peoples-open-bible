base_translation:
  language: en
  yaml_path: translation/ot/jeremiah/011/021.yaml
  text: Therefore[a], this is what Yahweh says concerning the men of Anathoth who are seeking your life, saying, “Do not prophesy in the name of Yahweh[c][b], lest you die by our hand.”
  footnotes:
  - marker: a
    text: Or, more formally, 'Thus says the LORD.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'who are seeking your life,' an idiom meaning they are trying to kill you.
    reason: lexical_alternative
  - marker: c
    text: Or, 'lest you die by our hand.' The Hebrew wording is literally negative, but in context it functions as a threat.
    reason: lexical_alternative
