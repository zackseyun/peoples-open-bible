revisions:
- from: Pero Josaba[a], hija del rey Joram, hermana de Ocozías, tomó a Joás, hijo de Ocozías, y lo escondió[b] de entre los hijos del rey que eran asesinados, junto con su nodriza, en el cuarto de las camas; y ellos lo ocultaron[c] de Atalía, para que no fuera muerto.
  to: Pero Josaba[a], hija del rey Joram, hermana de Ocozías, tomó a Joás, hijo de Ocozías, y se lo robó[b] de entre los hijos del rey que estaban siendo ejecutados, junto con su nodriza, en la alcoba; y ellos lo ocultaron[c] de Atalía, de modo que no lo mataron.
  rationale: Se corrige el verbo principal para reflejar fielmente גנב ('robó/sustrajo') en vez de 'escondió'. Se mejora la naturalidad del español con 'en la alcoba' en el texto principal, dejando la forma más literal en nota, en línea con el audit trail inglés. También se reemplaza 'para que no fuera muerto' por 'de modo que no lo mataron', que expresa claramente el resultado del ocultamiento en español natural. Se conserva el plural 'ellos lo ocultaron' por fidelidad al hebreo masorético.
