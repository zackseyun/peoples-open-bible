base_translation:
  language: en
  yaml_path: translation/deuterocanon/1_esdras/005/054.yaml
  text: And in the second year[a], when they had come to the house of God in Jerusalem, in the second month, Zerubbabel son of Shealtiel and Jeshua son of Jozadak began, along with their brothers, the priests, the Levites, and all who had come from the captivity to Jerusalem[b],
  footnotes:
  - marker: a
    text: Or 'the temple of God' or 'the sanctuary of God.' The Greek term can refer to the sacred complex more broadly, but 'house of God' preserves the restoration-era idiom.
    reason: lexical_alternative
  - marker: b
    text: Or 'all who had returned from exile.' The Greek says more literally 'from the captivity.'
    reason: lexical_alternative
