    issue: La nota [a] no refleja una alternativa real distinta del texto principal.
    rationale: El texto ya dice «al oriente de Ain», y la nota ofrece «O “al oriente de Ain”», lo cual no añade información útil. La auditoría inglesa preserva una alternativa como «east of Ain» y explica la localización más literal respecto de Ain.
  - severity: medium
