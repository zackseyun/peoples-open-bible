review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien la estructura del hebreo: contraste inicial («Pero»), referencia a «estos pueblos», conservación de Yahvé para יְהוָה, y «como herencia» para נַחֲלָה. También refleja adecuadamente el causativo de לֹא תְחַיֶּה con «no dejarás con vida». Sin embargo, «ninguna cosa que respire» no representa bien כָּל נְשָׁמָה en español bíblico-natural: «cosa» suena impropio para personas/seres vivientes en este contexto y debilita la referencia a todo ser con aliento.'
  spanish_quality_summary: La frase es mayormente clara y digna, pero «ninguna cosa que respire» resulta poco idiomática y algo torpe en español eclesial general. «Ningún ser que respire» conserva la imagen concreta del hebreo y mejora mucho la legibilidad sin perder fuerza. El resto del versículo lee con naturalidad.
  glossary_alignment: 'Alineación buena con la terminología del proyecto: יְהוָה → «Yahvé», נַחֲלָה → «herencia». La nota alternativa debe ajustarse para acompañar la mejora principal: si el texto dice «ningún ser que respire», la nota puede preservar «todo ser que respira» o «cosa que respire» como alternativa más literal del inglés auditado, pero conviene que el texto principal no use «cosa».'
  issues:
  - severity: medium
    issue: «ninguna cosa que respire» es una elección léxica poco natural para כָּל נְשָׁמָה
    rationale: Aunque intenta conservar la imagen de «lo que respira», en español «cosa» normalmente despersonaliza de manera impropia y suena extraña en un mandato sobre seres vivientes. «ser» mantiene el referente animado y la imaginería de respiración.
  - severity: low
    issue: La nota al pie repite prácticamente la redacción problemática del texto principal
    rationale: Si se corrige el texto principal a «ningún ser que respire», la nota debe presentar la alternativa de forma útil y no redundante, preservando la literalidad hebrea («todo ser que respira»).
  revised_spanish_text: Pero de las ciudades de estos pueblos que Yahvé tu Dios te da como herencia[a], no dejarás con vida a ningún ser que respire.
  revised_footnotes:
  - marker: a
    text: 'O «cualquier cosa que respire». Hebreo: «todo ser que respira».'
    reason: lexical_alternative
  revision_rationale: Se cambia «ninguna cosa que respire» por «ningún ser que respire» para lograr un español más natural y fiel al sentido de כָּל נְשָׁמָה en contexto, sin perder la imagen concreta de la respiración. Se conserva «Yahvé» y «como herencia» por fidelidad al proyecto y al hebreo. La nota al pie mantiene la alternativa más literal y documenta el hebreo subyacente.
