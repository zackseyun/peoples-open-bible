translation:
  text: 'Jesus said[1], "Perhaps people think that I have come to cast peace upon
    the world, and they do not know that I have come to cast divisions upon the earth:
    fire, sword, war. For there will be five in a house: there will be three against
    two, and two against three, father against son, and son against father[3][2].
    And they will stand as solitary ones."'
  philosophy: formal
  drafter_model: gemini-3.1-pro-preview
  drafter_label: gemini_3_1_pro_thomas_redraft
  drafted_at: '2026-04-22T09:57:16Z'
  footnotes:
  - marker: '1'
    text: The manuscript spells the infinitive 'to cast' as ⲁⲛⲟⲩϫⲉ instead of the
      standard Sahidic ⲉⲛⲟⲩϫⲉ, a common vowel interchange in this text.
    reason: dialect_note
  - marker: '2'
    text: Compare with Luke 12:51-53 and Matthew 10:34-35. Thomas shares the Synoptic
      themes of division and the sword but uniquely concludes with the fractured family
      members standing as 'solitary ones' (monachos).
    reason: cross_reference
  - marker: '3'
    text: Greek loanword monachos. In Thomas, this denotes not a later Christian monk,
      but a 'single one' or 'solitary'—one who has achieved spiritual unity and stands
      undivided, even when earthly family is fractured.
    reason: theological_note
lexical_decisions:
- source_word: ⲧⲁⲭⲁ
  chosen: Perhaps
  rationale: Greek loanword (τάχα) meaning 'perhaps' or 'quickly'. In this context,
    'perhaps' fits the speculative thought of the people.
  lexicon: BDAG 992
- source_word: ⲛⲟⲩϫⲉ
  chosen: cast
  rationale: Standard verb for 'to cast' or 'to throw'. Preserved literally to maintain
    the Thomasine idiom of 'casting' peace or divisions.
  lexicon: Crum 240a
- source_word: ⲡⲱⲣϫ
  chosen: divisions
  rationale: Plural noun (ϩⲛ̄ⲡⲱⲣϫ) meaning 'divisions' or 'separations'.
  lexicon: Crum 269a
- source_word: ⲱϩⲉ ⲉⲣⲁⲧⲟⲩ
  chosen: stand
  rationale: Idiom 'to stand on one's feet', meaning simply 'to stand'.
  lexicon: Crum 514b
- source_word: ⲙⲟⲛⲁⲭⲟⲥ
  chosen: solitary ones
  rationale: Greek loanword (μοναχός). In Thomas, it refers to a spiritually integrated,
    'single' or 'solitary' person, not a later Christian monk.
  lexicon: BDAG 656
theological_decisions:
- issue: Translation of ⲙⲟⲛⲁⲭⲟⲥ (monachos)
  chosen_reading: solitary ones
  rationale: Translated as 'solitary ones' rather than 'monks' to reflect the early
    Thomasine concept of spiritual singleness and undividedness, avoiding anachronistic
    monastic associations.
  alternatives_noted:
  - monks
  - single ones
drafter_notes: 'This saying parallels the Synoptic tradition of Jesus bringing division
  rather than peace, but Thomas adds a distinctive conclusion: the divided family
  members will ultimately ''stand as solitary ones'' (monachos). The translation preserves
  the punchy, aphoristic style of the Coptic, including the literal ''cast peace''
  and the staccato ''fire, sword, war''.'
