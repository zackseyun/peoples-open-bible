    text: 'O: «en el límite de su heredad». El hebreo puede designar el borde o el territorio delimitado por él; aquí probablemente se refiere al área de la heredad asignada a Josué.'
    reason: lexical_alternative
  revision_rationale: Se ajusta la frase principal para mayor naturalidad en español (‘en el territorio’ en vez de ‘dentro del territorio’) sin perder el valor semántico de גְּבוּל como área delimitada. Se corrige además el formato de la nota al pie para que sea legible y editorialmente consistente.
