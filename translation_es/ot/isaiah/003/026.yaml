revisions:
- from: Y sus puertas lamentarán y harán duelo[a], y será despojada hasta quedar vacía, y se sentará en la tierra.
  to: Y sus puertas lamentarán y harán duelo, y ella será despojada[a] y se sentará en el suelo.
  rationale: Se reubica la nota al verbo correcto (וְנִקָּתָה), se ajusta la cláusula principal para reflejar mejor la decisión léxica del POB inglés sin incorporar la alternativa al cuerpo del texto, y se cambia «en la tierra» por «en el suelo» para reproducir con mayor fidelidad la postura concreta de humillación. Se añade «ella» para mantener explícito el sujeto femenino personificado, en línea con la revisión inglesa auditada.
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T23:31:44Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura básica del hebreo: las puertas personificadas lamentan y hacen duelo, y la ciudad femenina se sienta abatida. Sin embargo, dos decisiones debilitan la fidelidad fina al original y al rastro POB en inglés: (1) la nota [a] está anclada en «duelo», pero el contenido de la nota corresponde a וְנִקָּתָה («será despojada/queda vacía»), no a «harán duelo»; y (2) «en la tierra» para לָאָרֶץ es menos preciso que «en el suelo» en esta escena de humillación física, donde el inglés auditado eligió específicamente ''on the ground''. Además, «será despojada hasta quedar vacía» añade una explicitación interpretativa más amplia que el inglés principal, que prefirió dejar la alternativa de ''emptied/left bare'' en nota.'
  spanish_quality_summary: El español es mayormente claro y digno, pero la ubicación de la nota crea confusión lectora. «Harán duelo» es inteligible aunque algo menos natural que «estarán de duelo»; aun así puede mantenerse para conservar el paralelismo verbal. «En el suelo» suena más natural y exacto que «en la tierra» para una postura corporal concreta. La cláusula central se beneficia de una formulación más directa y menos expandida.
  glossary_alignment: 'No hay conflictos con los términos teológicos por defecto del proyecto. La personificación femenina se preserva correctamente sin sobreexplicitar ''Sion''. La principal cuestión léxica es וְנִקָּתָה: conviene una forma principal española equivalente a ''será despojada'' o ''quedará despojada'', con la alternativa ''vaciada/dejada vacía'' en nota, como en el POB inglés.'
  issues:
  - severity: high
    issue: La nota [a] está anclada en la frase equivocada.
    rationale: El contenido de la nota explica וְנִקָּתָה ('despojada/vaciada/dejada vacía'), pero en el borrador el marcador [a] aparece junto a «harán duelo», que traduce וְאָבְלוּ. Esto desinforma al lector y rompe la trazabilidad léxica.
  - severity: medium
    issue: «En la tierra» no reproduce con suficiente precisión la imagen de humillación física de לָאָרֶץ con תֵשֵׁב.
    rationale: En este contexto, la escena es sentarse en el suelo/sobre el polvo; «en la tierra» puede sonar más cósmico o territorial. El POB inglés auditado justificó específicamente 'on the ground'.
  - severity: medium
    issue: «Será despojada hasta quedar vacía» sobreexplicita el verbo principal.
    rationale: El hebreo permite la idea de quedar vacía, pero el texto principal auditado prefirió una formulación equivalente a 'stripped bare' y dejó 'emptied/left bare' en nota. La expansión «hasta quedar vacía» mueve una alternativa interpretativa al cuerpo del texto.
  revised_spanish_text: Y sus puertas lamentarán y harán duelo, y ella será despojada[a] y se sentará en el suelo.
  revised_footnotes:
  - marker: a
    text: O «vaciada» o «dejada al descubierto». El verbo hebreo puede comunicar ser vaciado o quedar despojado.
    reason: lexical_alternative
  revision_rationale: Se reubica la nota al verbo correcto (וְנִקָּתָה), se ajusta la cláusula principal para reflejar mejor la decisión léxica del POB inglés sin incorporar la alternativa al cuerpo del texto, y se cambia «en la tierra» por «en el suelo» para reproducir con mayor fidelidad la postura concreta de humillación. Se añade «ella» para mantener explícito el sujeto femenino personificado, en línea con la revisión inglesa auditada.
