translation:
  language: es
  text: Y la primera porción de todos los primeros frutos de todo[a], y toda contribución de todas sus contribuciones, pertenecerá a los sacerdotes. Darán al sacerdote la primera porción de su masa[b], para hacer descansar una bendición[c] sobre tu casa.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «toda ofrenda de todas sus ofrendas». El término hebreo se refiere a una porción apartada y entregada para uso sagrado.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «la primera porción de su masa amasada»; el término hebreo puede referirse a la masa o, por extensión, a la porción amasada.'
    reason: lexical_alternative
  - marker: c
    text: Es decir, para que la bendición descanse sobre tu casa.
    reason: lexical_alternative
lexical_decisions:
- source_word: רֵאשִׁית
  english_pob_choice: the first / the first of
  chosen_spanish: primogénito / primicia
  alternatives_spanish:
  - lo primero
  - la primera porción
  - el comienzo
  lexicon: HALOT
  rationale: 'En la primera cláusula, רֵאשִׁית funciona junto con בִּכּוּרֵי para reforzar la idea de la porción inicial; por eso se conservó la doblez con una formulación natural en español: ''el primogénito de todos los primeros frutos''. En la segunda aparición, con עֲרִסוֹתֵיכֶם, la idea es la primera porción de la masa, por lo que ''primicia'' expresa bien la porción inicial ofrecida.'
- source_word: בִּכּוּרֵי
  english_pob_choice: firstfruits
  chosen_spanish: primeros frutos
  alternatives_spanish:
  - primicias
  - primeros productos
  - primero de la cosecha
  lexicon: HALOT
  rationale: Es el término cultual estándar para el primer rendimiento ofrecido a Dios. 'Primeros frutos' es claro y fiel en español; en la segunda mitad la idea se concreta con 'primicia de su masa'.
- source_word: תְּרוּמַת / תְּרוּמוֹתֵיכֶם
  english_pob_choice: contribution / your contributions
  chosen_spanish: contribución / contribuciones
  alternatives_spanish:
  - ofrenda
  - aportación
  - ofrenda alzada
  lexicon: HALOT
  rationale: 'תְּרוּמָה es una porción apartada para uso sagrado. ''Contribución'' conserva la idea de una porción dedicada sin imponer el tecnicismo tradicional ''ofrenda mecida/alzada''. Se mantuvo el contraste singular/plural: ''toda contribución de todas sus contribuciones''.'
- source_word: לַכֹּהֲנִים יִהְיֶה
  english_pob_choice: shall belong to the priests
  chosen_spanish: pertenecerá a los sacerdotes
  alternatives_spanish:
  - será de los sacerdotes
  - quedará para los sacerdotes
  - será propiedad de los sacerdotes
  lexicon: HALOT
  rationale: La forma expresa asignación o derecho de posesión. 'Pertenecerá a los sacerdotes' es natural en español y conserva la fuerza jurídica del hebreo.
- source_word: עֲרִסוֹתֵיכֶם
  english_pob_choice: your dough
  chosen_spanish: su masa
  alternatives_spanish:
  - su masa amasada
  - su masa para amasar
  - su pasta
  lexicon: HALOT
  rationale: El sustantivo puede referirse a la masa o, por extensión, a la porción amasada. En este contexto cultual, 'masa' comunica bien la ofrenda de la primera porción que se da al sacerdote.
- source_word: תִּתְּנוּ לַכֹּהֵן
  english_pob_choice: You shall give ... to the priest
  chosen_spanish: Darán al sacerdote
  alternatives_spanish:
  - entregarán al sacerdote
  - ofrecerán al sacerdote
  - le darán al sacerdote
  lexicon: HALOT
  rationale: Se mantiene el mandato legal en segunda persona plural mediante un futuro exhortativo en español, y el singular 'el sacerdote' refleja el hebreo colectivo-singular del destinatario.
- source_word: לְהָנִיחַ
  english_pob_choice: to cause ... to rest
  chosen_spanish: para hacer descansar
  alternatives_spanish:
  - para hacer reposar
  - para que repose
  - para hacer venir a descansar
  lexicon: HALOT
  rationale: El hifil de נוח expresa causar reposo o asentamiento. 'Hacer descansar' reproduce esa causalidad con naturalidad en español, aplicada a 'bendición'.
- source_word: בְּרָכָה
  english_pob_choice: a blessing
  chosen_spanish: una bendición
  alternatives_spanish:
  - bendición
  - favor
  - prosperidad
  lexicon: HALOT
  rationale: El sustantivo conserva su amplitud covenantal. 'Una bendición' es la forma más directa y no restringe el alcance a prosperidad material.
- source_word: אֶל בֵּיתֶךָ
  english_pob_choice: on your house
  chosen_spanish: sobre tu casa
  alternatives_spanish:
  - sobre tu hogar
  - sobre tu familia
  - a tu casa
  lexicon: HALOT
  rationale: Con לְהָנִיחַ y בְּרָכָה, אֶל expresa el destino de la bendición que descansa sobre el hogar. 'Casa' se mantiene por su concreción, sin perder el sentido de familia/hogar.
theological_decisions:
- issue: Naturaleza de la bendición prometida a la casa
  english_pob_reading: The verse states that giving the first portion to the priest results in blessing resting on the giver's house, without specifying the exact form of that blessing.
  chosen_spanish_reading: El versículo afirma que dar la primera porción al sacerdote resulta en que una bendición descanse sobre la casa, sin precisar si esa bendición es material, covenantal o de otro tipo.
  alternative_spanish_readings:
  - una promesa de prosperidad material
  - un favor general sobre la familia
  rationale: El hebreo habla simplemente de 'bendición'. La traducción conserva esa amplitud y evita estrechar el sentido a prosperidad, aunque tampoco lo espiritualiza de manera abstracta.
  doctrine_reference: Preservar la tensión teológica sin resolverla.
translation_notes:
  revision_awareness: Se siguió de cerca el audit trail inglés de POB, especialmente la doble referencia a רֵאשִׁית, la amplitud de תְּרוּמָה, y la nota sobre לְהָנִיחַ בְּרָכָה. No se detectaron revisiones posteriores que obligaran a ajustar el borrador base; el estado de alta concordancia se reflejó en una traducción estable, con adaptación natural al español.
  spanish_consistency_notes:
  - Se mantuvo el término 'bendición' sin explicitar prosperidad para respetar la amplitud semántica del hebreo.
  - '''Sacerdote/sacerdotes'' se conservó como término cultual estándar, correspondiente al hebreo כֹּהֵן/כֹּהֲנִים.'
  - Las notas al pie preservan las alternativas léxicas relevantes sin sobrecargar el texto principal.
  - Se evitó 'SEÑOR' y otras sustituciones que oculten el nombre divino, porque este versículo no contiene el tetragrámaton.
