translation:
  language: es
  text: Y todo el que cargue alguna de sus carcasas[a] lavará sus ropas y será impuro hasta la tarde.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «de sus carcasas». La construcción hebrea puede expresarse de manera más formal así, pero «alguna de sus carcasas» transmite mejor el sentido distributivo en español natural.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְ/כָל
  english_pob_choice: And everyone
  chosen_spanish: Y cualquiera
  alternatives_spanish:
  - Y todo el que
  - Y cualquiera que
  lexicon: HALOT
  rationale: El hebreo introduce una norma general y distributiva. «Cualquiera» conserva el alcance universal de כָל en una forma natural para el español bíblico contemporáneo.
- source_word: הַ/נֹּשֵׂא
  english_pob_choice: who carries
  chosen_spanish: que cargue
  alternatives_spanish:
  - que lleva
  - que porte
  - que cargue con
  lexicon: HALOT
  rationale: נשא aquí se refiere a tomar o transportar un cadáver animal en un contexto de pureza ritual. «Cargar» expresa bien la acción física sin forzar un matiz técnico adicional.
- source_word: מִ/נִּבְלָתָ/ם
  english_pob_choice: any of their carcasses
  chosen_spanish: alguno de sus cadáveres
  alternatives_spanish:
  - alguno de sus cuerpos muertos
  - alguno de sus carroños
  - de sus cadáveres
  lexicon: HALOT
  rationale: נְבֵלָה en Levítico designa el cadáver animal en una legislación de pureza, no un cadáver humano. «Cadáveres» comunica el estado de muerte con naturalidad; «alguno de» preserva el sentido distributivo que el inglés POB resalta con «any».
- source_word: יְכַבֵּס
  english_pob_choice: shall wash
  chosen_spanish: lavará
  alternatives_spanish:
  - deberá lavar
  - lavará sus ropas
  - se lavará
  lexicon: HALOT
  rationale: El imperfecto legal expresa obligación/consecuencia. En español, el futuro simple mantiene el tono normativo sin introducir una perífrasis más pesada.
- source_word: בְּגָדָי/ו
  english_pob_choice: his clothes
  chosen_spanish: sus vestidos
  alternatives_spanish:
  - sus ropas
  - sus prendas
  - sus vestiduras
  lexicon: HALOT
  rationale: «Vestidos»/«vestiduras» es una forma bíblica y clara en español; se evita depender de «clothes» como calco. El posesivo singular se mantiene por fidelidad al hebreo representativo.
- source_word: וְ/טָמֵ֥א
  english_pob_choice: and be unclean
  chosen_spanish: y será impuro
  alternatives_spanish:
  - y quedará impuro
  - y estará impuro
  - y será inmundo
  lexicon: HALOT
  rationale: טמא en este contexto es impurificación ritual, no pecado moral. «Impuro» es preciso y comprensible en español actual; se evita «inmundo», que suena más arcaico o valorativo.
- source_word: עַד הָ/עָרֶב
  english_pob_choice: until the evening
  chosen_spanish: hasta la tarde
  alternatives_spanish:
  - hasta el anochecer
  - hasta la noche
  - hasta la puesta del sol
  lexicon: HALOT
  rationale: La expresión hebrea señala el término temporal de la impureza. «Tarde» es una equivalencia natural y bíblicamente reconocible en español; «anochecer» sería más interpretativo.
theological_decisions:
- issue: Naturaleza de la impureza en la legislación levítica
  english_pob_reading: and be unclean
  chosen_spanish_reading: y será impuro
  alternative_spanish_readings:
  - y quedará impuro
  - y será inmundo
  rationale: La traducción conserva la impureza ritual como categoría cultual, sin moralizarla. «Impuro» mantiene la tensión lexical del hebreo טמא y evita confundir la norma con culpa ética.
  doctrine_reference: Levítico 11; distinción entre pureza ritual y pecado moral en la Torá
- issue: Valor distributivo de מִן + נְבֵלָה
  english_pob_reading: any of their carcasses
  chosen_spanish_reading: alguno de sus cadáveres
  alternative_spanish_readings:
  - de sus cadáveres
  - cualquiera de sus cadáveres
  rationale: El inglés POB señala que el hebreo puede leerse de forma más formal como «from their carcasses», pero prefiere el sentido distributivo. El español sigue ese mismo criterio con «alguno de», preservando la aplicación a cualquier caso individual.
  doctrine_reference: POB audit trail on lexical distributive sense
translation_notes:
  revision_awareness: El pasaje presenta alto acuerdo con la revisión auditada en inglés y no requiere cambios sustanciales; se conserva el mismo valor normativo, la misma referencia a la impureza ritual y el mismo sentido distributivo del hebreo.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como nombre divino por defecto, aunque este versículo no lo contiene.
  - Se conserva el singular masculino representativo del hebreo, reflejado en «cualquiera que cargue» y «sus vestidos».
  - Se usa «impuro» en lugar de «inmundo» para preservar el registro técnico-ritual del texto.
  - Se evita «SEÑOR» y se evita una paráfrasis que diluya la norma legal.
