translation:
  language: es
  text: Y Salomón tenía cuarenta mil establos[a] de caballos para sus carros, y doce mil jinetes.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «puestos» o «compartimentos» para caballos; el hebreo se refiere con más precisión a lugares individuales de estabulación o alimentación, no necesariamente al edificio entero.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְהִי / לִשְׁלֹמֹה
  english_pob_choice: And Solomon had
  chosen_spanish: Y tenía Salomón
  alternatives_spanish:
  - Y había para Salomón
  - Y estaban para Salomón
  lexicon: HALOT
  rationale: El giro hebreo ויהי ל expresa posesión o pertenencia. En español, «tenía» comunica de manera natural esa relación de posesión sin perder el matiz de que los recursos pertenecían a Salomón.
- source_word: אַרְבָּעִים אֶלֶף
  english_pob_choice: forty thousand
  chosen_spanish: cuarenta mil
  alternatives_spanish:
  - '40.000'
  lexicon: HALOT
  rationale: La cifra se rinde de forma directa y clara en español, manteniendo el valor numérico exacto del hebreo.
- source_word: אֻרְוֺת
  english_pob_choice: stalls
  chosen_spanish: pesebres
  alternatives_spanish:
  - establos
  - estancias para caballos
  lexicon: HALOT
  rationale: El hebreo se refiere más precisamente a lugares de alimentación/alojamiento de caballos, no solo al complejo entero. «Pesebres» conserva la imagen concreta de lugar de comida/alojamiento, con un tono bíblico comprensible en español.
- source_word: סוּסִים
  english_pob_choice: horses
  chosen_spanish: caballos
  alternatives_spanish:
  - yeguas
  - corceles
  lexicon: HALOT
  rationale: «Caballos» es la equivalencia normal y directa del plural hebreo.
- source_word: לְמֶרְכָּבוֹ
  english_pob_choice: for his chariots
  chosen_spanish: para sus carros
  alternatives_spanish:
  - para su carro de guerra
  - para su carroza
  lexicon: HALOT
  rationale: El sustantivo colectivo con sufijo se refiere al establecimiento de carros de guerra de Salomón. «Carros» mantiene el sentido militar y es natural en español bíblico contemporáneo.
- source_word: וּשְׁנֵים עָשָׂר אֶלֶף
  english_pob_choice: and twelve thousand
  chosen_spanish: y doce mil
  alternatives_spanish:
  - y 12.000
  lexicon: HALOT
  rationale: La frase numérica se traduce literalmente y sin añadidos.
- source_word: פָּרָשִׁים
  english_pob_choice: horsemen
  chosen_spanish: jinetes
  alternatives_spanish:
  - hombres de a caballo
  - caballería
  lexicon: HALOT
  rationale: «Jinetes» es la opción natural en español para hombres montados a caballo en contexto militar. «Caballería» sería más colectiva; «hombres de a caballo» es más explicativo pero menos ágil.
translation_notes:
  revision_awareness: El pasaje coincide de manera alta con el texto base y el audit trail inglés; no se detectaron revisiones aplicadas en la versión de referencia, así que la traducción sigue la lectura estable sin cambios textuales relevantes.
  spanish_consistency_notes:
  - Se mantiene «Salomón» como sujeto explícito, conforme a la posesión expresada por ויהי ל.
  - Se preserva la distinción entre los caballos de los carros y los doce mil jinetes, sin fusionar las dos unidades militares.
  - Se usa «carros» en vez de una expresión más técnica para conservar claridad y fluidez en español bíblico.
  - La nota al pie se ancla en «pesebres» para conservar la alternativa léxica documentada en el audit trail.
