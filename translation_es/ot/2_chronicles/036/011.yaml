translation:
  language: es
  text: Cincuenta y un[a] años tenía Zedequías cuando comenzó a reinar, y reinó once años en Jerusalén.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Algunas tradiciones de lectura y cronologías históricas esperan ‘veintiún años’; se conserva aquí la forma del testimonio hebreo aportado, que presenta una tensión numérica.
    reason: textual_variant
lexical_decisions:
- source_word: בֶּן עֶשְׂרִים וְאַחַת שָׁנָה
  english_pob_choice: was twenty-one years old
  chosen_spanish: Cincuenta y un[a] años tenía
  alternatives_spanish:
  - Tenía veintiún años
  - Era de veintiún años
  lexicon: HALOT
  rationale: La fórmula hebrea de edad se expresa de manera idiomática en español con 'tenía X años'. Aunque el sentido básico del hebreo es 'de veintiún años', la lectura directa del texto fuente ofrece una aparente tensión numérica con el resto de la tradición; por eso se conserva una nota textual en lugar de armonizarla en el cuerpo del texto.
- source_word: צִדְקִיָּהוּ
  english_pob_choice: Zedekiah
  chosen_spanish: Zedequías
  alternatives_spanish:
  - Sedecías
  lexicon: N/A (nombre propio)
  rationale: Se adopta la forma española usual de nombre bíblico, cercana al hebreo y reconocible para lectores hispanos, en vez de una transliteración más cruda.
- source_word: בְמָלְכוֹ
  english_pob_choice: when he became king
  chosen_spanish: cuando comenzó a reinar
  alternatives_spanish:
  - cuando llegó a ser rey
  - en su reinado
  lexicon: HALOT
  rationale: La construcción con ב + infinitivo/verbal sustantivo marca el tiempo de acceso al trono. 'Comenzó a reinar' conserva ese valor temporal con naturalidad en español y evita una formulación demasiado literal.
- source_word: וְאַחַת עֶשְׂרֵה שָׁנָה
  english_pob_choice: eleven years
  chosen_spanish: once años
  alternatives_spanish:
  - once años de duración
  - durante once años
  lexicon: HALOT
  rationale: El hebreo expresa duración de reinado con un cardinal y 'años'; 'once años' reproduce el valor numérico de forma directa y natural.
- source_word: מָלַךְ
  english_pob_choice: he reigned
  chosen_spanish: reinó
  alternatives_spanish:
  - gobernó como rey
  - fue rey
  lexicon: HALOT
  rationale: '''Reinó'' es el equivalente español directo del verbo de reinar y conserva el matiz real sin añadir explicaciones.'
- source_word: בִּירוּשָׁלִָם
  english_pob_choice: in Jerusalem
  chosen_spanish: en Jerusalén
  lexicon: N/A (topónimo)
  rationale: Topónimo estándar en español bíblico.
theological_decisions:
- issue: Tensión numérica del dato de edad
  english_pob_reading: twenty-one years old
  chosen_spanish_reading: Cincuenta y un años tenía
  alternative_spanish_readings:
  - Tenía veintiún años
  - Cincuenta y un años tenía Zedequías cuando comenzó a reinar
  rationale: El texto hebreo masorético leído con las consonantes dadas produce 'veintiún años', mientras que la tradición cronológica conocida en otros pasajes suele asociar a Zedequías con un acceso al trono a los veintiún años. Dado que el paquete fuente presentado aquí no incluye una variante textual alternativa explícita, se conserva la forma más cercana a la lectura fuente y se señala la opción alternativa en la nota para no borrar la tensión documental.
  doctrine_reference: Crítica textual y coherencia cronológica interna de 2 Reyes/2 Crónicas
translation_notes:
  revision_awareness: El contexto inglés POB ya había fijado la estructura idiomática del versículo sin notas. Para el español, se ajustó la edad a una formulación natural, pero se añadió una nota textual porque el testimonio hebreo proporcionado crea una tensión numérica que no debe ocultarse en una edición transparente.
  spanish_consistency_notes:
  - Se usa 'Zedequías' de manera uniforme como nombre propio bíblico.
  - Se prefiere 'reinó'/'comenzó a reinar' para mantener el registro real del hebreo.
  - '''Jerusalén'' conserva la forma estándar en español bíblico.'
  - La nota textual se ancla en la cifra de edad para hacer visible la tensión sin alterar la línea principal.
