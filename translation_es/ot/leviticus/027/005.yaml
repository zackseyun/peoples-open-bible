  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura del hebreo: conserva la conexión condicional (''Y si''), el rango de edad, el valor prescriptivo de וְהָיָה, y la unidad histórica ''siclos''. Sin embargo, no preserva con suficiente precisión la clasificación sexual/legal de הַזָּכָר ... וְלַנְּקֵבָה, porque ''varón ... mujer'' desplaza categorías biológicas/jurídicas a términos más sociales o de edad. Además, el borrador tiene una inconsistencia interna entre la decisión léxica (''y de la mujer'') y el texto (''para la mujer'').'
  spanish_quality_summary: El español es claro y legible, pero puede afinarse para mayor fidelidad y simetría legal. 'Desde los cinco años hasta los veinte años' suena natural, y 'tu valoración será' funciona bien. La mejoría principal es usar 'el varón ... la hembra' para mantener la pareja categorial del original en un registro formal y comprensible. También conviene evitar la mezcla interpretativa de 'varón' con 'mujer'.
  glossary_alignment: No hay conflictos con la terminología principal del proyecto. 'Siclos' está bien para שְׁקָלִים. El punto clave es alinear la decisión teológica del inglés POB ('the male ... the female') con un español igualmente categorial; 'el varón ... la hembra' preserva mejor esa intención que 'el varón ... la mujer'.
  issues:
  - severity: high
    issue: '''la mujer'' no corresponde con precisión a וְלַנְּקֵבָה'
    rationale: El hebreo clasifica por sexo en una tabla legal/cúltica ('el macho/varón ... la hembra'), no por rol social adulto. 'Mujer' puede sugerir una categoría humana social o adulta, mientras que el contexto incluye edades de cinco a veinte años.
  - severity: medium
    issue: 'Pareja categorial asimétrica: ''el varón ... la mujer'''
    rationale: La combinación mezcla un término más biológico/categorial ('varón') con otro más social ('mujer'). Una pareja simétrica mejora la fidelidad y la claridad jurídica del texto.
  - severity: low
    issue: Inconsistencia entre metadatos y texto final
    rationale: La decisión léxica registra 'y de la mujer', pero el texto dice 'para la mujer'. Aunque menor, indica falta de coherencia editorial.
  revised_spanish_text: Y si es desde los cinco años hasta los veinte años, tu valoración será de veinte siclos para el varón y de diez siclos para la hembra.
  revision_rationale: Se revisa únicamente la categoría final para reflejar con más precisión el hebreo וְלַנְּקֵבָה y mantener una pareja legal simétrica con 'el varón'. El resto del versículo es fiel, claro y natural en español.
