translation:
  language: es
  text: Quince codos de colgaduras había para un lado; sus columnas eran tres, y sus basas[a] eran tres.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «sus bases eran tres».
    reason: lexical_alternative
lexical_decisions:
- source_word: קְלָעִים
  english_pob_choice: hangings
  chosen_spanish: colgaduras
  alternatives_spanish:
  - cortinas
  - hangas
  lexicon: HALOT
  rationale: En el contexto del atrio del tabernáculo, el término se refiere a paños colgantes de cerramiento, no a cortinajes domésticos. «Colgaduras» conserva el valor arquitectónico y suena natural en español bíblico contemporáneo.
- source_word: חֲמֵשׁ עֶשְׂרֵה אַמָּה
  english_pob_choice: fifteen cubits
  chosen_spanish: Quince codos
  alternatives_spanish:
  - quince codos de longitud
  - quince codos de largo
  lexicon: HALOT
  rationale: El hebreo da una medida simple sin ampliar la frase; «Quince codos» reproduce con fidelidad la cantidad y deja que el contexto determine que se trata de extensión.
- source_word: אֶל הַכָּתֵף
  english_pob_choice: for one side
  chosen_spanish: para un lado
  alternatives_spanish:
  - para el lado
  - hacia un lado
  - en un lado
  lexicon: HALOT
  rationale: כָּתֵף puede significar «hombro» o, por extensión, «lado/flanco». En esta sección arquitectónica, la lectura espacial es la adecuada. «Para un lado» sigue de cerca la construcción hebrea y evita una expresión demasiado libre.
- source_word: עַמּוּדֵיהֶם
  english_pob_choice: their pillars
  chosen_spanish: sus columnas
  alternatives_spanish:
  - sus pilares
  - sus postes
  lexicon: HALOT
  rationale: En español, «columnas» comunica bien la función estructural y es idiomático en descripciones del tabernáculo. «Pilares» también es posible, pero «columnas» resulta más claro para lectores actuales.
- source_word: אַדְנֵיהֶם
  english_pob_choice: their bases
  chosen_spanish: sus basas
  alternatives_spanish:
  - sus bases
  - sus zócalos
  - sus sockets
  lexicon: HALOT
  rationale: El término designa los soportes o zócalos en que se asentaban las columnas. «Basas» conserva un matiz técnico y arquitectónico que corresponde bien al objeto descrito; «bases» sería una alternativa más general.
theological_decisions:
- issue: Término arquitectónico sin carga doctrinal explícita
  english_pob_reading: No theological note; only a lexical alternative for bases/sockets.
  chosen_spanish_reading: No se añade nota doctrinal; solo se deja la alternativa léxica entre «basas» y «bases» en la nota.
  alternative_spanish_readings:
  - No se añade nota.
  - Usar solo «bases» sin matiz técnico.
  rationale: 'El versículo es descriptivo y no plantea una decisión doctrinal. La única tensión es léxica: el término puede traducirse de manera más técnica o más general. La nota preserva esa posibilidad sin sobrecargar el texto.'
  doctrine_reference: None
translation_notes:
  revision_awareness: La redacción sigue el último estado revisado del texto fuente inglés, que ajustó «were on one side» a «were for one side» para reflejar con más precisión la construcción hebrea. En español, «para un lado» conserva esa relación más directamente que una formulación meramente locativa.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como convención general del proyecto, pero este versículo no contiene el nombre divino.
  - Se usa «codos» para אַמָּה en coherencia con la terminología bíblica estándar en español.
  - «Colgaduras» se eligió para sostener el sentido de elemento textil de cerramiento en un contexto tabernacular.
  - «Basas» responde al valor técnico del soporte; la nota ofrece «bases» como alternativa más llana.
