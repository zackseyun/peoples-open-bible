translation:
  language: es
  text: y la tierra abrió su boca[a] y los tragó a ellos y a Coré[b], cuando la congregación murió, cuando el fuego consumió a doscientos cincuenta hombres; y llegaron a ser una señal[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'el suelo abrió su boca'.
    reason: lexical_alternative
  - marker: b
    text: Hebreo 'a ellos y a Coré'. Este versículo expresa el juicio de esa manera; compárese el relato más amplio en Números 16 para los detalles circundantes.
    reason: cross_reference
  - marker: c
    text: O simplemente 'un signo'. El hebreo נֵס puede denotar signo, señal o estandarte.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַתִּפְתַּח הָאָרֶץ אֶת־פִּיהָ
  english_pob_choice: the earth opened its mouth
  chosen_spanish: la tierra abrió su boca
  alternatives_spanish:
  - la tierra abrió su boca
  - el suelo abrió su boca
  lexicon: HALOT
  rationale: אַרֶץ puede referirse a 'tierra' o 'suelo'; 'tierra' mantiene la imagen concreta y es natural en español. 'Boca' conserva la personificación vívida del hebreo, sin suavizarla.
- source_word: וַתִּבְלַע
  english_pob_choice: swallowed
  chosen_spanish: los tragó
  alternatives_spanish:
  - los tragó
  - los engulló
  - los devoró
  lexicon: HALOT
  rationale: '''Tragó'' expresa en español la acción concreta de tragar/engullir y conserva el efecto visual del hebreo sin añadir más intensidad que la del texto.'
- source_word: אֹתָם וְאֶת־קֹרַח
  english_pob_choice: them and Korah
  chosen_spanish: a ellos y a Coré
  alternatives_spanish:
  - a ellos y a Coré
  - a ellos, junto con Coré
  lexicon: HALOT
  rationale: Se conserva la coordinación explícita del hebreo. 'Coré' es la forma española habitual del nombre propio. No se armoniza con otros pasajes para mantener la sintaxis inmediata del texto.
- source_word: בְּמוֹת הָעֵדָה
  english_pob_choice: when the congregation died
  chosen_spanish: cuando la congregación murió
  alternatives_spanish:
  - cuando la congregación murió
  - al morir la congregación
  - en la muerte de la congregación
  lexicon: HALOT
  rationale: La construcción temporal del infinitivo con ב se rinde naturalmente con 'cuando'. 'Congregación' refleja עֵדָה en el uso característico de Números para el grupo reunido.
- source_word: בַּאֲכֹל הָאֵשׁ
  english_pob_choice: when the fire consumed
  chosen_spanish: cuando el fuego consumió
  alternatives_spanish:
  - cuando el fuego consumió
  - mientras el fuego consumía
  - cuando el fuego devoró
  lexicon: HALOT
  rationale: Aunque אכל literalmente puede ser 'comer', con el fuego como sujeto el español idiomático es 'consumió'. La temporalidad del hebreo se conserva con 'cuando'.
- source_word: חֲמִשִּׁים וּמָאתַיִם אִישׁ
  english_pob_choice: two hundred and fifty men
  chosen_spanish: doscientos cincuenta hombres
  alternatives_spanish:
  - doscientos cincuenta hombres
  - doscientos y cincuenta hombres
  lexicon: HALOT
  rationale: Se traduce el número cardinal de forma natural en español. 'Hombres' corresponde al singular colectivo אִישׁ en este contexto, manteniendo el valor de género del hebreo.
- source_word: וַיִּהְיוּ לְנֵס
  english_pob_choice: and they became a sign
  chosen_spanish: y llegaron a ser un signo
  alternatives_spanish:
  - y llegaron a ser un signo
  - y fueron un signo
  - y quedaron como un signo
  lexicon: HALOT
  rationale: נֵס puede significar 'signo', 'señal' o 'estandarte'. Se elige 'signo' para mantener la amplitud léxica del hebreo sin interpretarlo excesivamente como 'advertencia'; 'llegaron a ser' conserva el valor resultativo del verbo.
theological_decisions:
- issue: Referencia del plural final y del antecedente de 'llegaron a ser un signo'
  english_pob_reading: The judged rebels/the event of their judgment became a warning sign.
  chosen_spanish_reading: Los juzgados, o el conjunto de su juicio, llegaron a ser un signo.
  alternative_spanish_readings:
  - Sólo los doscientos cincuenta hombres llegaron a ser un signo
  - Todo el episodio, incluyendo a Coré y la congregación, llegó a ser un signo
  rationale: El hebreo permite cierta ambigüedad en el antecedente del plural. La traducción mantiene el plural implícito en 'llegaron' y no estrecha el referente más de lo que el texto exige, conservando la tensión narrativa.
  doctrine_reference: Preservar la ambigüedad textual y no resolverla sin necesidad.
- issue: Relación de Coré con el acto de ser tragado en este versículo
  english_pob_reading: Retain the verse's wording 'them and Korah' without harmonizing to other passages.
  chosen_spanish_reading: Conservar 'a ellos y a Coré' sin armonizar con otros pasajes.
  alternative_spanish_readings:
  - Separar interpretativamente a Coré de los tragados
  - Reformular para acomodar una armonización narrativa
  rationale: La redacción sigue la sintaxis inmediata del hebreo y no importa una conciliación desde otros textos. La fidelidad al versículo visible al lector es prioritaria aquí.
  doctrine_reference: Primacía del original sobre la harmonización traductora.
translation_notes:
  revision_awareness: 'Se siguió el último pass de revisión del audit trail: se mantuvo ''signo'' en lugar de una expansión interpretativa como ''señal de advertencia'', y se preservó la cifra en forma plena y formal ''doscientos cincuenta''. También se respetó la coordinación hebrea ''a ellos y a Coré'' sin harmonización narrativa.'
  spanish_consistency_notes:
  - Se usa 'Yahvé' como norma cuando aparezca el tetragrámaton; este versículo no lo contiene.
  - '''Coré'' sigue la forma española habitual del nombre propio bíblico.'
  - '''Conservó un registro bíblico formal, moderno y legible, evitando calcos innecesarios.'
