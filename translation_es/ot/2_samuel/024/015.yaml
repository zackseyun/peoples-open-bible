translation:
  language: es
  text: Así que Yahvé envió una plaga[a] sobre Israel desde la mañana hasta el tiempo señalado, y murieron setenta mil hombres del pueblo, desde Dan hasta Beerseba.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «hasta el tiempo fijado». La expresión hebrea puede designar un tiempo appointed o establecido; en este contexto, es menos probable «hasta el tiempo de reunión».
    reason: alternative_reading
lexical_decisions:
- source_word: וַיִּתֵּן
  english_pob_choice: sent
  chosen_spanish: envió
  alternatives_spanish:
  - dio
  - infligió
  lexicon: HALOT
  rationale: En contexto de juicio divino con דֶּבֶר, «envió» transmite de forma natural la acción de Yahvé sin perder su agencia directa. «Dio» sería demasiado literal en español; «infligió» enfatiza el efecto, pero no conserva tan bien el matiz de iniciativa.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: 'Se sigue la convención del proyecto para el Tetragrámaton: «Yahvé» como nombre divino, no un sustituto titular. Esto mantiene la referencia explícita al nombre personal revelado en hebreo.'
- source_word: דֶּבֶר
  english_pob_choice: plague
  chosen_spanish: plaga
  alternatives_spanish:
  - peste
  - pestilencia
  lexicon: HALOT
  rationale: «Plaga» es claro en español moderno y comunica bien una calamidad mortal enviada por Dios. «Peste» o «pestilencia» son posibles, pero resultan menos naturales o más arcaizantes.
- source_word: בְּיִשְׂרָאֵל
  english_pob_choice: on Israel
  chosen_spanish: sobre Israel
  alternatives_spanish:
  - en Israel
  - contra Israel
  lexicon: HALOT
  rationale: «Sobre Israel» conserva el sentido de juicio que cae sobre el pueblo y suena natural en español; evita tanto una localización meramente interna («en») como una formulación excesivamente interpretativa («contra»).
- source_word: מֵהַבֹּקֶר
  english_pob_choice: from the morning
  chosen_spanish: desde la mañana
  alternatives_spanish:
  - a partir de la mañana
  lexicon: HALOT
  rationale: La preposición temporal se expresa bien con «desde la mañana», que marca el punto de inicio de la acción con claridad y sin rigidez.
- source_word: וְעַד עֵת מוֹעֵד
  english_pob_choice: until the appointed time
  chosen_spanish: hasta el tiempo señalado
  alternatives_spanish:
  - hasta el tiempo appointed
  - hasta el tiempo fijado
  - hasta la hora señalada
  lexicon: HALOT
  rationale: La expresión hebrea admite la idea de un tiempo fijado o designado. «Tiempo señalado» preserva esa ambigüedad de forma natural y deja abierto el matiz de «apuntado/apartado» sin imponer una glosa interpretativa.
- source_word: וַיָּמָת
  english_pob_choice: died
  chosen_spanish: murieron
  alternatives_spanish:
  - perecieron
  - muere
  lexicon: HALOT
  rationale: Aunque el verbo está en singular con sentido colectivo/resultativo, en español el plural concuerda mejor con el sujeto implícito expresado por la frase siguiente. «Murieron» comunica el hecho sin forzar una construcción impersonal.
- source_word: מִן הָעָם
  english_pob_choice: of the people
  chosen_spanish: del pueblo
  alternatives_spanish:
  - de la gente
  - entre el pueblo
  lexicon: HALOT
  rationale: «Del pueblo» refleja la pertenencia o pertenencia colectiva de los muertos al conjunto del pueblo, con buen español y sin perder el valor distributivo.
- source_word: מִדָּן וְעַד בְּאֵר שֶׁבַע
  english_pob_choice: from Dan to Beersheba
  chosen_spanish: desde Dan hasta Beerseba
  alternatives_spanish:
  - de Dan hasta Beerseba
  - de Dan a Beerseba
  lexicon: HALOT
  rationale: Se conserva el idiomatismo territorial tradicional en una forma española clara. «Desde… hasta…» expresa el alcance total del territorio de Israel de manera natural.
- source_word: שִׁבְעִים אֶלֶף אִישׁ
  english_pob_choice: seventy thousand men
  chosen_spanish: setenta mil hombres
  alternatives_spanish:
  - setenta mil personas
  lexicon: HALOT
  rationale: «Hombres» respeta el valor masculino del hebreo אִישׁ tras el numeral, manteniendo la precisión léxica del original. «Personas» suavizaría la forma gramatical hebrea.
theological_decisions:
- issue: Agencia divina en la calamidad
  english_pob_reading: So Yahweh sent a plague on Israel
  chosen_spanish_reading: Así que Yahvé envió una plaga sobre Israel
  alternative_spanish_readings:
  - Así que Yahvé permitió una plaga sobre Israel
  - Así que Yahvé infligió una plaga sobre Israel
  rationale: El hebreo atribuye la acción directamente a Yahvé sin atenuantes. «Envió» preserva esa agencia explícita, mientras que «permitió» debilitaría el enunciado y «infligió» desplazaría ligeramente el foco al efecto.
  doctrine_reference: Translation philosophy §1, §3
- issue: Sentido de עֵת מוֹעֵד
  english_pob_reading: until the appointed time
  chosen_spanish_reading: hasta el tiempo señalado
  alternative_spanish_readings:
  - hasta el tiempo fijado
  - hasta el tiempo de reunión
  rationale: La frase puede significar un tiempo designado o fijado; el contexto narrativo favorece un límite temporal. «Tiempo señalado» conserva la ambigüedad sin cerrar innecesariamente el sentido. La opción «tiempo de reunión» queda demasiado marcada y es menos probable aquí.
  doctrine_reference: Translation philosophy §3
translation_notes:
  revision_awareness: La versión española se ajusta al audit trail inglés sin depender mecánicamente de él. Se mantiene el nombre divino «Yahvé», la agencia directa en el juicio, el idiomatismo territorial «desde Dan hasta Beerseba» y la ambigüedad controlada de עֵת מוֹעֵד mediante «tiempo señalado», con nota alternativa anclada en el texto.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como forma estándar del proyecto para יְהוָה.
  - «Plaga» conserva el valor de juicio calamitoso del contexto.
  - «Hombres» refleja el hebreo אִישׁ tras el numeral sin neutralizar el género gramatical.
  - La nota [a] está anclada correctamente en «plaga» y no introduce texto no señalado.
