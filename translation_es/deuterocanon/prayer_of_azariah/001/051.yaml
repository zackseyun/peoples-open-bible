translation:
  language: es
  text: Que la tierra bendiga al Señor; que le cante alabanzas y lo exalte grandemente para siempre.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: εὐλογείτω
  english_pob_choice: let ... bless
  chosen_spanish: Que ... bendiga
  alternatives_spanish:
  - Que ... alabe
  - Que ... diga bien de
  lexicon: BDAG
  rationale: El verbo está en un imperativo exhortativo litúrgico. «Bendiga» conserva el registro bíblico de bendecir dirigido a Dios y evita aplanar el matiz relacional que tiene en la doxología.
- source_word: ἡ γῆ
  english_pob_choice: the earth
  chosen_spanish: la tierra
  alternatives_spanish:
  - la tierra habitada
  - el mundo
  lexicon: BDAG
  rationale: En este himno cósmico, γῆ designa la creación terrestre en conjunto, no una región particular. «La tierra» es natural en español y mantiene el alcance cósmico.
- source_word: τὸν κύριον
  english_pob_choice: the Lord
  chosen_spanish: el Señor
  alternatives_spanish:
  - el Maestro
  lexicon: BDAG
  rationale: Se sigue el valor litúrgico estándar de κύριος en este contexto doxológico. En español «el Señor» es la forma natural y reverente para el título divino.
- source_word: ὑμνείτω
  english_pob_choice: let it sing praise
  chosen_spanish: que le cante alabanzas
  alternatives_spanish:
  - que cante himnos
  - que lo alabe con cánticos
  lexicon: BDAG
  rationale: El verbo ὑμνέω implica cantar himnos o alabanzas. «Cante alabanzas» expresa la dimensión musical sin sonar rígido o técnico en español.
- source_word: ὑπερυψούτω
  english_pob_choice: let it highly exalt
  chosen_spanish: lo exalte en gran manera
  alternatives_spanish:
  - lo exalte altamente
  - lo ensalce sobremanera
  lexicon: BDAG
  rationale: El compuesto intensifica la acción de exaltar. «En gran manera» conserva esa intensidad de forma idiomática y transparente en español.
- source_word: αὐτὸν
  english_pob_choice: him
  chosen_spanish: lo
  alternatives_spanish:
  - a él
  lexicon: BDAG
  rationale: El pronombre retoma al Señor como objeto directo. «Lo» es la forma natural y concisa en español.
- source_word: εἰς τοὺς αἰῶνας
  english_pob_choice: forever
  chosen_spanish: por los siglos
  alternatives_spanish:
  - para siempre
  - por los siglos de los siglos
  lexicon: BDAG
  rationale: La fórmula tiene valor durativo y doxológico. «Por los siglos» mantiene el tono bíblico y deja explícita la permanencia temporal sin añadir una expansión no atestiguada por el griego.
theological_decisions:
- issue: Uso de κύριος en una doxología griega deuterocanónica
  english_pob_reading: the Lord
  chosen_spanish_reading: el Señor
  alternative_spanish_readings:
  - el Maestro
  rationale: No hay indicación contextual para apartarse del tratamiento reverencial y teológico habitual de κύριος. En español, «el Señor» preserva el título sin introducir una glosa interpretativa.
  doctrine_reference: 'DOCTRINE.md Contested terms: κύριος → Lord'
- issue: Alcance cósmico de «ἡ γῆ»
  english_pob_reading: the earth
  chosen_spanish_reading: la tierra
  alternative_spanish_readings:
  - el país
  - la región
  rationale: El himno convoca a la creación entera, no a un territorio específico. «La tierra» mantiene la amplitud cosmológica y evita restringir indebidamente el sujeto.
  doctrine_reference: 'Lexical context: creation praise in the Song of the Three'
translation_notes:
  revision_awareness: La redacción inglesa auditada pasó de «sing hymns» a «sing praise» para mayor naturalidad, manteniendo la idea musical de ὑμνείτω. La versión española sigue esa decisión con una formulación igualmente natural («cante alabanzas») y conserva la intensificación de ὑπερυψούτω mediante «en gran manera».
  spanish_consistency_notes:
  - Se usa «Señor» para κύριος, conforme al tratamiento litúrgico del término en el proyecto.
  - Se evita «Cristo» porque el versículo no contiene Χριστός ni una fórmula cristológica que lo exija.
  - «Por los siglos» conserva el sentido de duración indefinida de εἰς τοὺς αἰῶνας sin sobretraducir.
  - La puntuación reproduce la estructura exhortativa en dos miembros del griego.
