translation:
  language: es
  text: Entonces David y la gente que estaba con él alzaron la voz[a] y lloraron hasta que no les quedó fuerza para llorar.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, más literalmente, «levantaron su voz y lloraron».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּשָּׂא
  english_pob_choice: raised
  chosen_spanish: alzaron
  alternatives_spanish:
  - levantaron
  - alzaron la voz
  lexicon: HALOT
  rationale: 'La expresión hebrea נָשָׂא + קוֹל es idiomática: significa elevar la voz. ''Alzaron'' conserva el giro sin volverlo pesado, y ''alzaron la voz'' quedaría demasiado explícito en español si se intentara repetir el complemento del hebreo de manera rígida.'
- source_word: קוֹלָם
  english_pob_choice: their voices
  chosen_spanish: su voz
  alternatives_spanish:
  - sus voces
  - la voz de ellos
  lexicon: HALOT
  rationale: Aunque el hebreo usa el singular colectivo קוֹל en una construcción idiomática, el español natural suele preferir singular con sentido colectivo en este contexto. 'Su voz' refleja el acto conjunto sin forzar un plural innecesario.
- source_word: וְהָעָם אֲשֶׁר אִתּוֹ
  english_pob_choice: the people who were with him
  chosen_spanish: el pueblo que estaba con él
  alternatives_spanish:
  - la gente que estaba con él
  - los hombres que estaban con él
  lexicon: HALOT
  rationale: עָם es amplio y no especifica 'hombres' ni 'tropas'. 'Pueblo' mantiene esa amplitud y coincide con el valor genérico del hebreo; el verbo singular 'estaba' ayuda al español natural con sujeto colectivo.
- source_word: וַיִּבְכּוּ
  english_pob_choice: wept
  chosen_spanish: lloraron
  alternatives_spanish:
  - sollozaron
  - lloraron amargamente
  lexicon: HALOT
  rationale: בכה puede expresarse como 'llorar' o 'lloraron'. En español, 'lloraron' comunica con claridad el lamento intenso del pasaje sin añadir matices no presentes en el hebreo. 'Sollozaron' sería más interpretativo.
- source_word: עַד אֲשֶׁר אֵין בָּהֶם כֹּחַ
  english_pob_choice: until they had no strength left
  chosen_spanish: hasta que no les quedó fuerza
  alternatives_spanish:
  - hasta que no tenían fuerza
  - hasta que se les acabó la fuerza
  lexicon: HALOT
  rationale: La cláusula expresa agotamiento total. 'No les quedó fuerza' transmite de forma natural la pérdida completa de vigor y conserva el sentido de depletion física del hebreo.
- source_word: לִבְכּוֹת
  english_pob_choice: to weep
  chosen_spanish: para llorar
  alternatives_spanish:
  - para llorar más
  - para seguir llorando
  lexicon: HALOT
  rationale: Se mantiene la repetición léxica del verbo de llanto con el infinitivo 'llorar'. 'Para llorar' es la forma más directa y sobria de reproducir el cierre enfático del versículo.
translation_notes:
  revision_awareness: Se siguió el sentido idiomático del hebreo para נָשָׂא + קוֹל, manteniendo la lectura de agotamiento total al final del versículo. La versión inglesa auditada no introdujo variantes textuales ni decisiones teológicas, y el español conserva esa estabilidad.
  spanish_consistency_notes:
  - Se preservó el paralelismo entre 'lloraron' y 'llorar' para reflejar la reiteración del hebreo.
  - '''Pueblo'' se usa en sentido colectivo amplio, sin concretar ''hombres'' o ''tropas''.'
  - La puntuación y el orden verbal buscan sonar naturales en español sin perder la secuencia narrativa del original.
