id: JOS.22.14
reference: Joshua 22:14
source:
  edition: WLC
  text: וַ/עֲשָׂרָ֤ה נְשִׂאִים֙ עִמּ֔/וֹ נָשִׂ֨יא אֶחָ֜ד נָשִׂ֤יא אֶחָד֙ לְ/בֵ֣ית אָ֔ב לְ/כֹ֖ל מַטּ֣וֹת יִשְׂרָאֵ֑ל וְ/אִ֨ישׁ רֹ֧אשׁ בֵּית אֲבוֹתָ֛/ם הֵ֖מָּה לְ/אַלְפֵ֥י יִשְׂרָאֵֽל־׃
translation:
  text: and with him ten leaders[a], one leader for each ancestral house from all the tribes of Israel; and each of them was the head of his ancestral house among the thousands of Israel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew 'for the thousands of Israel'; here 'thousands' likely refers to clan divisions or larger family groupings within Israel.
    reason: lexical_alternative
lexical_decisions:
- source_word: נְשִׂאִים / נָשִׂיא
  chosen: leaders
  alternatives:
  - chiefs
  - princes
  - tribal leaders
  lexicon: HALOT
  rationale: נָשִׂיא denotes a lifted-up person, i.e., a leader/chieftain. In this administrative-tribal context, 'leaders' is clear modern English and avoids the archaic feel of 'princes' while preserving official status.
- source_word: עִמּוֹ
  chosen: with him
  lexicon: HALOT
  rationale: Straightforward preposition + pronominal suffix referring back to Phinehas in the prior verse.
- source_word: נָשִׂיא אֶחָד נָשִׂיא אֶחָד
  chosen: one leader for each
  alternatives:
  - one leader, one leader
  - one chief apiece
  lexicon: HALOT
  rationale: The repetition is distributive, indicating one representative from each unit. English idiom is best captured by 'one leader for each' rather than woodenly repeating the phrase.
- source_word: לְבֵית אָב
  chosen: for each ancestral house
  alternatives:
  - for each father's house
  - for each family house
  lexicon: HALOT
  rationale: בֵּית אָב is a standard kinship-administrative term. 'Ancestral house' preserves the patriarchal clan structure more naturally than the overly literal 'father's house' in this census/tribal setting.
- source_word: לְכֹל מַטּוֹת יִשְׂרָאֵל
  chosen: from all the tribes of Israel
  alternatives:
  - for all the tribes of Israel
  - belonging to all the tribes of Israel
  lexicon: HALOT
  rationale: The phrase identifies the ten leaders as representing the tribes. 'From all the tribes of Israel' communicates source/representation naturally in English.
- source_word: וְאִישׁ
  chosen: each of them
  alternatives:
  - and each man
  - and each one
  lexicon: HALOT
  rationale: Although אִישׁ is formally 'man,' here it functions distributively for the ten male representatives. 'Each of them' preserves the distributive sense in natural English without obscuring that actual male leaders are in view from context.
- source_word: רֹאשׁ בֵּית אֲבוֹתָם
  chosen: the head of his ancestral house
  alternatives:
  - chief of his fathers' house
  - head of his father's house
  lexicon: HALOT
  rationale: רֹאשׁ is 'head/chief.' 'Head of his ancestral house' preserves both the leadership role and the kinship structure in readable English.
- source_word: לְאַלְפֵי יִשְׂרָאֵל
  chosen: among the clans of Israel
  alternatives:
  - for the thousands of Israel
  - among the thousands of Israel
  lexicon: HALOT
  rationale: אֶלֶף in such social-military contexts can denote a clan/subdivision, not merely the numeral thousand. 'Among the clans of Israel' best fits the administrative sense here and avoids misleading readers into hearing a literal number.
