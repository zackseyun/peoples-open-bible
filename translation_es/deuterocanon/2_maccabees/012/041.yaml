translation:
  language: es
  text: Entonces todos bendijeron al Juez justo[a], al Señor, que hace manifiestas las cosas ocultas.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «las obras del Señor, el Juez justo». La expresión griega es elíptica; literalmente, «las cosas del Señor, el Juez justo».'
    reason: alternative_reading
lexical_decisions:
- source_word: εὐλογήσαντες
  english_pob_choice: blessed
  chosen_spanish: bendijeron
  alternatives_spanish:
  - alabaron
  - dijeron bien de
  lexicon: BDAG
  rationale: El participio aoristo de εὐλογέω aquí conserva un sentido de bendición dirigida a Dios; en español, «bendijeron» mantiene el valor religioso formal sin reducirlo a una simple alabanza.
- source_word: δικαιοκρίτου
  english_pob_choice: righteous judge
  chosen_spanish: Juez justo
  alternatives_spanish:
  - Juez recto
  - justo Juez
  lexicon: LSJ
  rationale: El compuesto remite a alguien que juzga con justicia. «Juez justo» conserva el contenido de δικαιο- y suena natural en español bíblico contemporáneo.
- source_word: κυρίου
  english_pob_choice: Lord
  chosen_spanish: Señor
  alternatives_spanish:
  - Soberano
  - Dueño
  lexicon: BDAG
  rationale: Siguiendo el uso doctrinal del proyecto para κύριος cuando se refiere a Dios, «Señor» comunica el título reverencial sin introducir una matización ajena al contexto.
- source_word: τὰ κεκρυμμένα
  english_pob_choice: the hidden things
  chosen_spanish: las cosas ocultas
  alternatives_spanish:
  - lo oculto
  - las cosas escondidas
  lexicon: LSJ
  rationale: El participio perfecto pasivo sustantivado funciona como plural neutro. «Las cosas ocultas» conserva esa pluralidad y resulta claro en español.
- source_word: φανερὰ ποιοῦντος
  english_pob_choice: makes the hidden things manifest
  chosen_spanish: hace manifiestas
  alternatives_spanish:
  - revela
  - pone en claro
  lexicon: BDAG
  rationale: La expresión verbal causa que algo pase a ser visible o patente. «Hace manifiestas» reproduce bien la fuerza causativa y evita un verbo demasiado libre.
theological_decisions:
- issue: Uso de κύριος para Dios
  english_pob_reading: Lord
  chosen_spanish_reading: Señor
  alternative_spanish_readings:
  - Dueño
  - Soberano
  rationale: El texto trata κύριος como título divino. En español, «Señor» es la correspondencia más estable y reverente dentro del registro bíblico del proyecto.
  doctrine_reference: 'DOCTRINE.md Contested terms: κύριος → Lord'
- issue: Expresión elíptica τὰ τοῦ δικαιοκρίτου κυρίου
  english_pob_reading: the righteous Judge, the Lord
  chosen_spanish_reading: al Juez justo, al Señor
  alternative_spanish_readings:
  - las obras del Señor, el Juez justo
  - los hechos del Señor, el Juez justo
  rationale: La frase griega es elíptica y deja implícito el sustantivo. La redacción española sigue la revisión más reciente del audit trail y mantiene la identificación titula/divina sin resolver en exceso la elipsis.
  doctrine_reference: DOCTRINE.md §3 Preserve theological tension rather than resolve it
translation_notes:
  revision_awareness: 'El borrador sigue la revisión más reciente del audit trail, que pasó de una lectura más explicativa («los caminos del Señor») a una más cercana a la construcción griega: «el Juez justo, el Señor». También adopta «hace manifiestas» para φανερὰ ποιοῦντος, alineado con la última actualización del inglés POB.'
  spanish_consistency_notes:
  - Se mantiene «Señor» para κύριος por consistencia doctrinal del proyecto.
  - Se conserva la tensión de la elipsis griega mediante una nota alternativa, sin convertirla en una paráfrasis interpretativa.
  - «Manifiestas» respeta el registro formal y evita una traducción excesivamente libre como «revela» cuando el griego resalta hacer visible/patente.
