translation:
  language: es
  text: 'Esta es la ley: cuando una persona muera en una carpa[a], todo el que entre en la carpa y todo el que esté en la carpa quedará impuro durante siete días.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «todo lo que está en la carpa». La expresión hebrea puede ser más amplia, pero el contexto y el verbo singular aquí favorecen referirla a las personas presentes; los utensilios se tratan explícitamente en el versículo siguiente.
    reason: lexical_alternative
lexical_decisions:
- source_word: זֹאת הַתּוֹרָה
  english_pob_choice: This is the law
  chosen_spanish: Esta es la ley
  alternatives_spanish:
  - Esta es la instrucción
  - Esta es la norma
  lexicon: HALOT
  rationale: En este contexto ritual-jurídico, תּוֹרָה introduce una regulación vinculante. «Ley» comunica con naturalidad ese carácter normativo en español y conserva la fuerza legal del pasaje mejor que una paráfrasis más general como «instrucción».
- source_word: אָדָם
  english_pob_choice: a man
  chosen_spanish: un hombre
  alternatives_spanish:
  - una persona
  - alguien
  - ser humano
  lexicon: HALOT
  rationale: El hebreo usa un singular masculino genérico. «Un hombre» refleja más de cerca la forma del original, sin impedir que funcione de modo inclusivo en el sentido genérico del caso legal.
- source_word: כִּי יָמוּת
  english_pob_choice: when a man dies
  chosen_spanish: cuando un hombre muere
  alternatives_spanish:
  - si un hombre muere
  lexicon: HALOT
  rationale: Aquí כִּי introduce una situación típica de caso legal; «cuando» expresa mejor el marco circunstancial que «si» en español, evitando matices de mera posibilidad.
- source_word: בְּאֹהֶל
  english_pob_choice: in a tent
  chosen_spanish: en una tienda
  alternatives_spanish:
  - en un tienda
  - dentro de una tienda
  lexicon: HALOT
  rationale: «Ohel» puede referirse a una tienda o carpa. «Tienda» es el equivalente natural en español y preserva el sentido de una morada portátil, sin perder el valor indefinido del primer uso.
- source_word: כָּל הַבָּא אֶל הָאֹהֶל
  english_pob_choice: everyone who enters the tent
  chosen_spanish: todo el que entra en la tienda
  alternatives_spanish:
  - todo el que entra a la tienda
  - quien entra en la tienda
  lexicon: HALOT
  rationale: El participio con כָּל expresa a cualquier persona que entra. «Todo el que entra» mantiene el valor general y el ritmo jurídico del hebreo con un español natural.
- source_word: וְכָל אֲשֶׁר בָּאֹהֶל
  english_pob_choice: and everyone who is in the tent
  chosen_spanish: y todo el que está en la tienda
  alternatives_spanish:
  - y todo lo que está en la tienda
  - y todo lo que hay en la tienda
  lexicon: HALOT
  rationale: Aunque אֲשֶׁר puede abarcar personas o cosas, el paralelo inmediato con «todo el que entra» y el verbo singular favorecen entender principalmente a las personas presentes. Por eso se mantiene «todo el que está», con una nota para la alternativa amplia.
- source_word: יִטְמָא
  english_pob_choice: shall be unclean
  chosen_spanish: quedará impuro
  alternatives_spanish:
  - será impuro
  - quedará ritualmente impuro
  lexicon: HALOT
  rationale: En español, «impuro» comunica la categoría ritual del hebreo. «Quedará» refleja el estado resultante del contacto con la muerte; se evita «será» porque puede sonar menos preciso para un estado adquirido en este contexto legislativo.
- source_word: שִׁבְעַת יָמִים
  english_pob_choice: seven days
  chosen_spanish: por siete días
  alternatives_spanish:
  - siete días
  - durante siete días
  lexicon: HALOT
  rationale: La duración es simple y directa. «Por siete días» suena natural en español y conserva el alcance temporal de la impureza ritual.
theological_decisions:
- issue: 'Alcance de אֲשֶׁר בָּאֹהֶל: personas presentes o cualquier cosa en la tienda'
  english_pob_reading: The English POB renders it as 'everyone who is in the tent' and footnotes the broader possibility 'everyone/everything that is in the tent,' while favoring persons because of the singular verb and the next verse.
  chosen_spanish_reading: «Todo el que está en la tienda», entendido primariamente de las personas presentes.
  alternative_spanish_readings:
  - «Todo lo que está en la tienda»
  - «Todo lo que hay en la tienda»
  rationale: La construcción hebrea permite amplitud, pero el contexto inmediato, el paralelismo con la entrada de personas y la forma verbal singular favorecen una referencia humana principal. La alternativa más amplia se preserva en nota para no borrar la tensión léxica.
  doctrine_reference: Pureza ritual en la Torá; correlación contextual con Números 19:15.
translation_notes:
  revision_awareness: Se siguió de cerca el audit trail en inglés y no se introdujeron cambios de sentido. La única tensión relevante es el alcance de אֲשֶׁר בָּאֹהֶל, que se mantiene abierta en nota como en el texto base inglés. No hubo revisiones aplicadas en el material fuente.
  spanish_consistency_notes:
  - Se mantuvo «ley» para תּוֹרָה en un contexto normativo ritual.
  - Se eligió «impuro» en lugar de «inmundo» para un registro más claro y actual, sin perder el sentido ritual.
  - «Tienda» traduce consistentemente אֹהֶל en este versículo.
  - Se conservó la correspondencia genérica singular de אָדָם con «un hombre» siguiendo la decisión auditada del texto base.
