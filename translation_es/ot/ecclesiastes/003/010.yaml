    issue: «para ocuparse en ella» es poco idiomático en español general
    rationale: Aunque entendible, la construcción habitual es «ocuparse de algo». La opción actual suena calcada y reduce la legibilidad sin ganar precisión frente al hebreo difícil.
  - severity: low
    issue: La nota al pie usa «ser cargados por ella», expresión poco natural
    rationale: La idea de burden puede mantenerse con una formulación más fluida en español. No es un error grave de sentido, pero sí una mejora de estilo y claridad.
