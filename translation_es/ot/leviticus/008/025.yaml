translation:
  language: es
  text: Entonces tomó la grasa, la cola gorda, toda la grasa que estaba sobre las entrañas, el lóbulo[a] del hígado, los dos riñones con su grasa, y el muslo derecho.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «el apéndice del hígado»; el hebreo designa una parte específica retirada en el procedimiento sacrificial.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּקַּח
  english_pob_choice: Then he took
  chosen_spanish: Entonces tomó
  alternatives_spanish:
  - Y tomó
  - Tomó
  lexicon: HALOT
  rationale: La forma consecutiva avanza la narración; «Entonces tomó» conserva el sentido secuencial con naturalidad en español.
- source_word: הַחֵלֶב
  english_pob_choice: the fat
  chosen_spanish: la grasa
  alternatives_spanish:
  - el sebo
  - la gordura sacrificial
  lexicon: HALOT
  rationale: En el contexto sacrificial, el término apunta a la porción grasa reservada; «grasa» comunica el valor léxico sin introducir tecnicismos innecesarios.
- source_word: הָאַלְיָה
  english_pob_choice: the fat tail
  chosen_spanish: la cola gorda
  alternatives_spanish:
  - la cola grasa
  - la cola de grasa
  lexicon: HALOT
  rationale: El hebreo designa la cola adiposa característica de ciertas ovejas sacrificiales. «Cola gorda» conserva el referente anatómico y la cualidad grasa, evitando una paráfrasis más larga.
- source_word: כָּל הַחֵלֶב אֲשֶׁר עַל הַקֶּרֶב
  english_pob_choice: all the fat that was on the entrails
  chosen_spanish: toda la grasa que estaba sobre las entrañas
  alternatives_spanish:
  - toda la grasa que estaba sobre los intestinos
  - toda la grasa que estaba sobre las partes internas
  lexicon: HALOT
  rationale: קֶרֶב aquí se refiere a las vísceras/entrañas en la anatomía sacrificial. «Entrañas» es una equivalencia española clara y suficientemente concreta.
- source_word: יֹתֶרֶת הַכָּבֵד
  english_pob_choice: the lobe of the liver
  chosen_spanish: el lóbulo del hígado
  alternatives_spanish:
  - el apéndice del hígado
  - la porción del hígado
  lexicon: HALOT
  rationale: La expresión señala una parte específica del hígado retirada en el rito. «Lóbulo del hígado» refleja con precisión la decisión auditada en inglés.
- source_word: שְׁתֵּי הַכְּלָיֹת
  english_pob_choice: the two kidneys
  chosen_spanish: los dos riñones
  alternatives_spanish:
  - las dos vísceras renales
  lexicon: HALOT
  rationale: Equivalente anatómico directo y transparente en español.
- source_word: חֶלְבְּהֶן
  english_pob_choice: with their fat
  chosen_spanish: con su grasa
  alternatives_spanish:
  - y su grasa
  - con la grasa de ellos
  lexicon: HALOT
  rationale: El posesivo plural se integra de forma natural en español con «su grasa», manteniendo la relación entre los riñones y la grasa asociada.
- source_word: שׁוֹק הַיָּמִין
  english_pob_choice: the right thigh
  chosen_spanish: el muslo derecho
  alternatives_spanish:
  - la pierna derecha
  - el cuarto trasero derecho
  lexicon: HALOT
  rationale: שׁוֹק designa la parte superior de la pierna en el contexto sacrificial. «Muslo» conserva la precisión anatómica y la claridad litúrgica en español.
theological_decisions:
- issue: Terminología sacrificial de partes animales reservadas
  english_pob_reading: A list of specified sacrificial portions is rendered with concrete anatomical terms.
  chosen_spanish_reading: Una lista de porciones sacrificiales específicas se expresa con términos anatómicos concretos y directos.
  alternative_spanish_readings:
  - Una lista de piezas del sacrificio se expresa con términos más generales.
  - Se podría usar terminología ritual más abstracta.
  rationale: El versículo enumera partes precisas del animal. Mantener vocabulario anatómico evita diluir la estructura cultual del texto y sigue la auditable precisión del inglés.
  doctrine_reference: Levítico 8:25; Levítico 3:3-4; Levítico 7:3-4
translation_notes:
  revision_awareness: La versión española sigue el estado revisado más reciente del tramo inglés (gpt-5.4, sin cambios) y conserva la misma resolución léxico-anatómica general, con adaptación natural al español y sin introducir variaciones doctrinales nuevas.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» fuera del versículo porque no aparece el tetragrámaton aquí.
  - Se prefirió «grasa» frente a «sebo» para mantener el paralelo más directo con la solución inglesa auditada.
  - «Cola gorda» busca reflejar el término técnico sin forzar una glosa excesiva en el texto principal.
  - Se conservó la enumeración seriada del hebreo para respetar la cadencia ritual del pasaje.
