  verdict: revise
  source_alignment_summary: El borrador transmite bien la estructura posesiva de לְ...הָיָה con «tenía» y mantiene el contraste narrativo con «el hombre rico». También refleja adecuadamente צֹאן y בָקָר como dos clases de ganado. Sin embargo, omite de forma insuficiente la intensificación de הַרְבֵּה מְאֹד, ya que «muchas» no preserva bien «very many / a great many».
  spanish_quality_summary: 'El español es claro y natural, pero puede mejorarse con una cuantificación más fuerte: «muchísimas» o «muchas... en gran cantidad». Además, las notas actuales no están bien enfocadas: la nota [a] no refleja con precisión la alternativa inglesa documentada, y la nota [b] introduce explicación innecesaria para un término bien resuelto en el texto principal.'
  glossary_alignment: No hay conflictos con la terminología base del proyecto. «El hombre rico» y «tenía» son adecuados. «Ovejas y ganado» es aceptable, aunque «ganado» ya cubre un campo semántico amplio; sigue siendo una solución válida para בָקָר en contraste con צֹאן. La principal corrección es reforzar הַרְבֵּה מְאֹד en español.
  issues:
  - severity: medium
    issue: La frase «muchas ovejas» debilita הַרְבֵּה מְאֹד.
    rationale: El hebreo intensifica claramente la abundancia. «Muchas» por sí sola no conserva bien el énfasis de «very many / a great many» documentado en la auditoría inglesa.
  - severity: low
    issue: La nota [a] no presenta con precisión la alternativa documentada.
    rationale: La alternativa inglesa es sobre la cláusula completa («a rich man had a great many...»), no solo sobre «ovejas». La nota española debería reflejar esa alternativa de manera más fiel y natural.
  - severity: low
    issue: La nota [b] es explicativa en exceso y mezcla español con inglés.
    rationale: «cattle»/ganado mayor no debe aparecer así en una nota española, y la explicación no es necesaria si el texto principal ya resuelve bien el sentido.
  revised_spanish_text: El hombre rico tenía muchísimas ovejas y ganado[a].
  revised_footnotes:
  - marker: a
    text: 'O: «Un hombre rico tenía muchísimas ovejas y ganado».'
    reason: lexical_alternative
