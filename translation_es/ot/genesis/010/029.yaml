theological_decisions:
- issue: Valor genealógico de בְּנֵי ('sons of')
  english_pob_reading: The Hebrew 'sons of' can sometimes function more broadly in genealogies, but here it most naturally refers to the named sons just listed.
  chosen_spanish_reading: '''hijos de'' se entiende como hijos varones nombrados en la lista, sin ampliar innecesariamente a ''descendientes'' en el texto principal.'
  alternative_spanish_readings:
  - descendientes de Jactán
  - hijos de Jactán
  rationale: No hay tensión doctrinal; la decisión afecta el alcance genealógico. Se conserva la lectura más inmediata del hebreo y la nota cubre la posibilidad más amplia si el lector la necesita.
  doctrine_reference: Génesis 10; genealogías patriarcales en la Escritura
- issue: Conservación de nombres propios en la Tabla de las Naciones
  english_pob_reading: Proper names are transliterated by standard convention.
  chosen_spanish_reading: Se conservan los nombres propios como transliteraciones bíblicas españolas sin traducirlos.
  alternative_spanish_readings:
  - traducirlos descriptivamente
  - normalizarlos al castellano moderno sin transliteración
  rationale: La fidelidad al género genealógico exige mantener los nombres como nombres. Traducirlos borraría la estructura onomástica del pasaje.
  doctrine_reference: 'Génesis 10: la Tabla de las Naciones'
