theological_decisions:
- issue: Whether to render צְדָקָה with the more ethical 'righteousness/justice' from the Hebrew or the more charitable 'almsgiving' reflected in the Greek parallel
  chosen_reading: Use 'righteousness' in the main text, with a footnote noting the Greek 'almsgiving/merciful deed' nuance.
  alternative_readings:
  - almsgiving
  - charity
  - justice
  rationale: The project gives primacy to the most original available witness; here that is the surviving Hebrew. Yet the Greek parallel is an actual translation input and may preserve an interpretive tradition or variant Vorlage. Preserving the Greek alternative in a footnote maintains transparency without collapsing the witnesses into one.
  doctrine_reference: 'DOCTRINE.md: Original-language primacy over translation tradition; Preserve theological tension rather than resolve it.'
- issue: Whether to include the Greek final clause not present in the extant Hebrew line
  chosen_reading: Include the clause 'each person will find it according to his works' in the main text, with a footnote explaining that the extant Hebrew line is shorter and the Greek appears fuller.
  alternative_readings:
  - 'Translate only the shorter Hebrew line: ''Everyone who does righteousness has a reward.'''
  rationale: The Hebrew witness is marked 'minor_mismatch,' and the Greek parallel appears to preserve a fuller bicola structure typical of wisdom sayings. Including the Greek-supported second clause best represents the available evidence while honestly documenting the divergence.
  doctrine_reference: 'PHILOSOPHY.md: use parallel source as actual translation input; preserve source uncertainty honestly.'
