    rationale: El hebreo dice literalmente 'y ningún hombre no sabía', con el objeto implícito. El inglés POB documentó esta explicitación con nota; la versión española debería hacer lo mismo si mantiene 'lo'.
  - severity: low
    issue: '''Y aconteció'' es aceptable, pero ''Y sucedió'' suena más natural en español contemporáneo.'
    rationale: No es un error de fidelidad, pero el proyecto pide español moderno pero digno, evitando formulaciones innecesariamente rígidas.
