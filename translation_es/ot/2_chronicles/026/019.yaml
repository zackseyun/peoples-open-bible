translation:
  language: es
  text: Entonces Uzías se enojó[a], con un incensario en la mano para quemar incienso; y mientras estaba enojado con los sacerdotes, la lepra[b] le brotó en la frente, en presencia de los sacerdotes, en la casa de Yahvé, junto al altar del incienso.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'se irritó'. El verbo hebreo puede abarcar enojo, indignación o irritación; aquí se traduce de manera natural sin perder la fuerza del pasaje.
    reason: lexical_alternative
  - marker: b
    text: O 'una afección cutánea'. El hebreo צָרַעַת puede referirse de manera más amplia a una enfermedad grave o impureza de la piel, no necesariamente a la lepra moderna.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּזְעַף
  english_pob_choice: became angry
  chosen_spanish: se enojó
  alternatives_spanish:
  - se irritó
  - se enfureció
  lexicon: HALOT
  rationale: El verbo expresa enojo o indignación; en español, 'se enojó' conserva bien el valor ingressivo del wayyiqtol sin exagerar la intensidad.
- source_word: עֻזִּיָּהוּ
  english_pob_choice: Uzziah
  chosen_spanish: Uzías
  alternatives_spanish:
  - Uzzía
  lexicon: Transliteración bíblica estándar
  rationale: Nombre propio del rey; 'Uzías' es la forma usual y clara en español bíblico.
- source_word: מִקְטֶרֶת
  english_pob_choice: censer
  chosen_spanish: incensario
  alternatives_spanish:
  - brasero de incienso
  - vasija para incienso
  lexicon: HALOT
  rationale: Designa el recipiente para ofrecer incienso; 'incensario' es el equivalente natural y preciso en español.
- source_word: לְהַקְטִיר
  english_pob_choice: to burn incense
  chosen_spanish: ofrecer incienso
  alternatives_spanish:
  - quemar incienso
  - hacer humo de incienso
  lexicon: HALOT
  rationale: La forma infinitiva expresa propósito ritual; 'ofrecer incienso' comunica de modo digno y claro la acción cultual.
- source_word: וּבְזַעְפּוֹ עִם הַכֹּהֲנִים
  english_pob_choice: while he was angry with the priests
  chosen_spanish: mientras estaba enojado con los sacerdotes
  alternatives_spanish:
  - en su enojo contra los sacerdotes
  - mientras se enfurecía con los sacerdotes
  lexicon: HALOT
  rationale: La construcción indica circunstancia temporal mientras ocurre lo siguiente; 'mientras estaba enojado con los sacerdotes' mantiene el matiz sin sobrerreaccionar.
- source_word: הַצָּרַעַת
  english_pob_choice: leprosy
  chosen_spanish: la lepra
  alternatives_spanish:
  - la enfermedad de la piel
  - una afección cutánea
  lexicon: HALOT
  rationale: Siguiendo la revisión POB en inglés, aquí se conserva el término tradicional 'lepra' por correspondencia léxica más directa, con la ambigüedad semántica ya señalada en la nota.
- source_word: זָרְחָה
  english_pob_choice: broke out
  chosen_spanish: brotó
  alternatives_spanish:
  - apareció
  - irrumpió
  lexicon: HALOT
  rationale: Literalmente puede ser 'resplandeció' o 'salió'; en este contexto, 'brotó' expresa la aparición repentina y visible de la afección.
- source_word: בְמִצְחוֹ
  english_pob_choice: on his forehead
  chosen_spanish: en la frente
  alternatives_spanish:
  - sobre la frente
  lexicon: HALOT
  rationale: Referencia anatómica directa; 'en la frente' es la forma natural en español.
- source_word: לִפְנֵי הַכֹּהֲנִים
  english_pob_choice: before the priests
  chosen_spanish: en presencia de los sacerdotes
  alternatives_spanish:
  - delante de los sacerdotes
  lexicon: HALOT
  rationale: La frase indica que el hecho ocurrió ante los sacerdotes; 'en presencia de' lo expresa con claridad y solemnidad.
- source_word: בְּבֵית יְהוָה
  english_pob_choice: in the house of Yahweh
  chosen_spanish: en la casa de Yahvé
  alternatives_spanish:
  - en el templo de Yahvé
  - en la casa de Yahveh
  lexicon: YHWH rendering
  rationale: Se conserva el nombre divino 'Yahvé' según la convención del proyecto, y 'casa' refleja fielmente בַּיִת sin forzar 'templo'.
- source_word: מֵעַל לְמִזְבַּח הַקְּטֹרֶת
  english_pob_choice: beside the altar of incense
  chosen_spanish: junto al altar del incienso
  alternatives_spanish:
  - al lado del altar del incienso
  - junto al altar de incienso
  lexicon: HALOT
  rationale: La combinación preposicional es compacta; 'junto al altar del incienso' da un sentido espacial claro y fiel en español.
theological_decisions:
- issue: Renderización de צָרַעַת
  english_pob_reading: leprosy
  chosen_spanish_reading: lepra
  alternative_spanish_readings:
  - enfermedad de la piel
  - afección cutánea
  rationale: Aunque el hebreo puede abarcar más que la lepra moderna, la revisión POB en inglés optó por 'leprosy'. En español, 'lepra' mantiene la correspondencia tradicional y la fuerza narrativa del juicio, mientras la nota preserva la advertencia semántica.
  doctrine_reference: Translation philosophy §1 (primacía de la fuente original con transparencia lexical)
- issue: Nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  rationale: El texto hebreo usa el Tetragrama directamente. Se emplea 'Yahvé' conforme al estándar del proyecto para preservar el nombre propio del pacto, en vez de sustituirlo por un título.
  doctrine_reference: 'Contested terms table: יְהוָה / YHWH'
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión inglesa más reciente, que volvió de 'the skin disease' a 'leprosy' por correspondencia léxica más estrecha con צָרַעַת. La versión española sigue esa decisión, pero conserva una nota explicativa para no borrar la amplitud semántica documentada. También se preservó la decisión POB de traducir יְהוָה como Yahvé/Yahvé y de mantener un registro culto pero claro.
  spanish_consistency_notes:
  - Se usa 'Yahvé' de forma consistente para יְהוָה.
  - '''Sacerdotes'' se mantiene para הַכֹּהֲנִים; no se sustituye por formas más tradicionales sin necesidad.'
  - '''Incensario'' expresa el recipiente cultual sin perder naturalidad en español.'
  - La nota de 'lepra' resuelve la tensión entre la correspondencia léxica y la amplitud semántica de צָרַעַת.
