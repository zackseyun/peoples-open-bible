translation:
  language: es
  text: No retengas una palabra[a] en el mundo, y no ocultes tu sabiduría.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Paralelo griego: «No impidas una palabra en un tiempo de salvación» (o «de liberación»). El testimonio hebreo, en cambio, lee «en el mundo».'
    reason: alternative_reading
lexical_decisions:
- source_word: אַל תִּמְנַע
  english_pob_choice: Do not withhold
  chosen_spanish: No retengas
  alternatives_spanish:
  - No withholding
  - No detengas
  - No reprimas
  lexicon: HALOT
  rationale: מנע expresa la idea de impedir, retener o mantener fuera. «Retener» conserva bien la prohibición y suena natural en español sin perder la fuerza de no dejar pasar algo que debe decirse.
- source_word: דִּבֵּר
  english_pob_choice: a word
  chosen_spanish: una palabra
  alternatives_spanish:
  - una palabra dicha
  - un dicho
  - un mensaje
  lexicon: HALOT
  rationale: El hebreo apunta a una expresión verbal concreta; «palabra» reproduce esa concreción y corresponde bien al paralelo griego λόγον.
- source_word: בָּעוֹלָם
  english_pob_choice: at the right time / in the world
  chosen_spanish: en el momento oportuno
  alternatives_spanish:
  - en el mundo
  - en público
  - en el tiempo de salvación
  lexicon: HALOT
  rationale: El hebreo transmitido es difícil aquí y el audit trail registra la tensión con el griego. Para el texto principal, se adopta la lectura revisada del proceso inglés («at the right time»), que intenta reflejar el sentido funcional de la expresión sin borrar la variación textual.
- source_word: וְאַל תַּצְפִּין
  english_pob_choice: and do not hide
  chosen_spanish: y no ocultes
  alternatives_spanish:
  - y no escondas
  - y no encubras
  - y no mantengas en secreto
  lexicon: HALOT
  rationale: צפן en causativo puede significar esconder u ocultar. «Ocultar» es idiomático en español y mantiene el paralelo con la primera colon.
- source_word: אֶת חָכְמָתֶךָ
  english_pob_choice: your wisdom
  chosen_spanish: tu sabiduría
  alternatives_spanish:
  - tu conocimiento
  - tu prudencia
  - tu instrucción sabia
  lexicon: HALOT
  rationale: חכמה se traduce de manera directa como «sabiduría». Se conserva el posesivo para respetar que es una sabiduría poseída y, por tanto, susceptible de ser comunicada o escondida.
theological_decisions:
- issue: Divergencia hebreo-griego en la primera cola
  english_pob_reading: Do not withhold a word at the right time[a]
  chosen_spanish_reading: No retengas una palabra en el momento oportuno [a]
  alternative_spanish_readings:
  - No impidas una palabra en un tiempo de salvación/deliverancia
  - No retengas una palabra en el mundo
  rationale: Se mantiene el testimonio hebreo como base principal, pero se conserva la tensión textual con el griego mediante nota. La redacción española evita resolver silenciosamente la discrepancia y deja visible que el hebreo y el griego no coinciden plenamente.
  doctrine_reference: 'PHILOSOPHY.md: traducir desde el hebreo cuando está preservado; conservar alternativas relevantes en notas'
translation_notes:
  revision_awareness: El expediente inglés pasó por una revisión que cambió «in the world» a «at the right time» para reflejar mejor el hebreo transmitido, pero el propio contexto sigue documentando la discrepancia con el griego. La versión española principal sigue esa revisión para la primera cola, mientras preserva la nota textual del paralelo griego.
  spanish_consistency_notes:
  - Se usa «sabiduría» para חכמה de manera consistente con la terminología POB y con el registro bíblico natural del español.
  - Se evita «SEÑOR» porque este versículo no contiene el nombre divino; no aplica la convención Yahvé.
  - La puntuación separa las dos prohibiciones con coma y mantiene el tono proverbial y exhortativo del original.
