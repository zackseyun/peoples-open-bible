translation:
  language: es
  text: Y ahora llamamos bienaventurados[a] a los arrogantes; hasta los que hacen maldad prosperan[b]; hasta ponen a prueba a Dios[c] y escapan.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «los soberbios» para «los arrogantes».
    reason: lexical_alternative
  - marker: b
    text: Lit. «son edificados» o «son establecidos»; es decir, prosperan.
    reason: lexical_alternative
  - marker: c
    text: O «ponen a Dios a prueba».
    reason: lexical_alternative
lexical_decisions:
- source_word: וְ/עַתָּה
  english_pob_choice: So now
  chosen_spanish: Así que ahora
  alternatives_spanish:
  - Y ahora
  - Ahora pues
  lexicon: HALOT
  rationale: La partícula introduce una conclusión inferida y de continuidad con el contexto; «Así que ahora» conserva ese valor discursivo sin sonar rígido.
- source_word: מְאַשְּׁרִים
  english_pob_choice: we call ... blessed
  chosen_spanish: llamamos bienaventurados
  alternatives_spanish:
  - consideramos felices
  - declaramos afortunados
  lexicon: HALOT
  rationale: El verbo expresa una valoración declarativa; «llamamos bienaventurados» refleja el acto de considerar/atribuir dicha condición, manteniendo el matiz evaluativo.
- source_word: זֵדִים
  english_pob_choice: the arrogant
  chosen_spanish: los arrogantes
  alternatives_spanish:
  - los soberbios
  - los presuntuosos
  lexicon: HALOT
  rationale: El hebreo apunta a personas insolentes o presuntuosas. «Arrogantes» es natural en español y conserva la carga moral negativa.
- source_word: נִבְנוּ
  english_pob_choice: are ... built up
  chosen_spanish: son incluso levantados
  alternatives_spanish:
  - son prosperados
  - son establecidos
  lexicon: HALOT
  rationale: Se preserva la metáfora pasiva de «ser construidos/levantados», que en contexto significa ser afirmados o prosperar. «Levantados» mantiene esa imagen sin perder inteligibilidad.
- source_word: עֹשֵׂי רִשְׁעָה
  english_pob_choice: evildoers
  chosen_spanish: los que hacen maldad
  alternatives_spanish:
  - los malhechores
  - los que practican la maldad
  lexicon: HALOT
  rationale: La frase participial describe a quienes practican la maldad. Se opta por una construcción explícita y fiel al hebreo, evitando una abstracción excesiva.
- source_word: בָּחֲנ֛וּ אֱלֹהִ֖ים
  english_pob_choice: test God
  chosen_spanish: ponen a prueba a Dios
  alternatives_spanish:
  - tientan a Dios
  - prueban a Dios
  lexicon: HALOT
  rationale: El verbo tiene sentido de examinar/desafiar. «Ponen a prueba a Dios» es la formulación más precisa y natural para el contexto de irreverencia.
- source_word: וַ/יִּמָּלֵטוּ
  english_pob_choice: and escape
  chosen_spanish: y escapan
  alternatives_spanish:
  - y se libran
  - y salen indemnes
  lexicon: HALOT
  rationale: El nifal expresa librarse o escapar. «Escapan» conserva el sentido de quedar sin castigo, en línea con la queja del versículo.
theological_decisions:
- issue: Renderización de אֱלֹהִים como nombre/título divino en un reproche humano
  english_pob_reading: God
  chosen_spanish_reading: Dios
  alternative_spanish_readings:
  - el Dios verdadero
  - su Dios
  rationale: Aquí אֱלֹהִים funciona como nombre común/título del Dios de Israel, no como el tetragrámaton. Por eso se traduce simplemente «Dios», sin mayúsculas especiales ni sustitución por Yahvé.
  doctrine_reference: 'DOCTRINE.md: original-language primacy; contested terms table for אֱלֹהִים'
- issue: Valor del pasivo נִבְנוּ dentro de una queja moral
  english_pob_reading: are built up / prosper / are established
  chosen_spanish_reading: son incluso levantados
  alternative_spanish_readings:
  - prosperan
  - son establecidos
  rationale: La lectura inglesa mantiene la metáfora de construcción. En español se conserva con «levantados» para no borrar la imagen, aunque el sentido contextual sea prosperidad/afianzamiento.
  doctrine_reference: 'DOCTRINE.md: preserve lexical tensions; avoid flattening metaphor'
translation_notes:
  revision_awareness: El control de revisión más reciente no introdujo cambios; la cruz de verificación indicó alta concordancia con solo cuestiones menores, así que se mantuvieron las decisiones léxicas principales del audit trail en una formulación española natural y auditable.
  spanish_consistency_notes:
  - Se mantiene «Dios» para אֱלֹהִים, conforme al uso del texto fuente y al criterio del proyecto para este término común.
  - Se preserva la metáfora de «ser levantados» para נִבְנוּ, en vez de reducirla únicamente a «prosperar» o «estar establecidos».
  - «Bienaventurados» traduce la valoración declarativa de מְאַשְּׁרִים con tono bíblico pero inteligible en español.
  - Las notas al pie usan marcadores únicos y se anclan en el texto en los puntos de ambigüedad léxica relevantes.
