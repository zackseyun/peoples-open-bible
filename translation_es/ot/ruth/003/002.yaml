translation:
  language: es
  text: Y ahora[a], ¿no es Booz nuestro pariente, con cuyas jóvenes[b] has estado? Mira, esta noche está aventando cebada en la era.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘nuestro pariente cercano’. El hebreo puede indicar relación de parentesco o de clan, no solo una simple cercanía social.
    reason: lexical_alternative
  - marker: b
    text: O ‘con cuyas siervas has estado’. El hebreo puede referirse a las trabajadoras o asistentes de Booz.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְעַתָּה
  english_pob_choice: And now
  chosen_spanish: Y ahora
  alternatives_spanish:
  - Ahora
  lexicon: HALOT
  rationale: Mantiene el valor conjuntivo de ו y el marcador temporal עתה. 'Y ahora' conserva la transición discursiva de Naomi con naturalidad en español.
- source_word: הֲלֹא
  english_pob_choice: is not
  chosen_spanish: ¿no es... ?
  alternatives_spanish:
  - ¿acaso no es...?
  - ¿no será...?
  lexicon: HALOT
  rationale: Es una pregunta retórica que espera asentimiento. En español, '¿no es...?' expresa mejor esa fuerza que una traducción más literal y rígida.
- source_word: מֹדַעְתָּנוּ
  english_pob_choice: our relative
  chosen_spanish: nuestro pariente
  alternatives_spanish:
  - nuestro pariente cercano
  - nuestro familiar
  - nuestro pariente de clan
  lexicon: HALOT
  rationale: El término apunta a relación de parentesco o vínculo de clan en este contexto. 'Pariente' comunica bien la relación sin introducir un matiz meramente social como 'conocido'.
- source_word: אֲשֶׁר הָיִית אֶת נַעֲרוֹתָיו
  english_pob_choice: with whose young women you have been
  chosen_spanish: con cuyas jóvenes has estado
  alternatives_spanish:
  - con cuyas muchachas has estado
  - con cuyas siervas has estado
  - con cuyas muchachas de servicio has estado
  lexicon: HALOT
  rationale: La expresión puede referirse a las trabajadoras o asistentes femeninas de Booz. 'Jóvenes' preserva la amplitud del hebreo sin imponer demasiado pronto un sentido servil; la nota aclara la alternativa.
- source_word: הִנֵּה
  english_pob_choice: Look
  chosen_spanish: Mira
  alternatives_spanish:
  - Mira bien
  - Fíjate
  lexicon: HALOT
  rationale: '''Mira'' reproduce la fuerza deíctica e inmediata de הִנֵּה en un español actual y natural.'
- source_word: זֹרֶה
  english_pob_choice: is winnowing
  chosen_spanish: está aventando
  alternatives_spanish:
  - está trillando
  - está venteando
  lexicon: HALOT
  rationale: '''Aventar'' expresa el acto de separar el grano con el viento, equivalente funcional de ''winnowing'' y ampliamente comprensible en español bíblico.'
- source_word: גֹּרֶן הַשְּׂעֹרִים
  english_pob_choice: barley at the threshing floor
  chosen_spanish: cebada en la era
  alternatives_spanish:
  - cebada en la era de trillar
  - cebada en la era de la trilla
  - cebada en el lugar de la trilla
  lexicon: HALOT
  rationale: El hebreo indica el producto que se está aventando en la era, no una 'era de cebada' como sustantivo compuesto. 'Cebada en la era' es claro, fiel y natural en español.
- source_word: הַלָּיְלָה
  english_pob_choice: tonight
  chosen_spanish: esta noche
  alternatives_spanish:
  - anoche
  - en esta noche
  lexicon: HALOT
  rationale: Equivale de modo idiomático al adverbio temporal hebreo y suena natural en español moderno.
theological_decisions:
- issue: Relación de Booz con Rut y el matiz de parentesco
  english_pob_reading: our relative / our kinsman
  chosen_spanish_reading: nuestro pariente
  alternative_spanish_readings:
  - nuestro pariente cercano
  - nuestro familiar
  rationale: El pasaje enfatiza la vinculación de clan/familia que hace significativa la estrategia de Noemí. 'Pariente' mantiene esa fuerza sin convertir el término en mera amistad o conocimiento social.
  doctrine_reference: Rut 3:2; cf. Rut 2:1-3
- issue: Sentido de נַעֲרוֹתָיו
  english_pob_reading: young women / servant girls
  chosen_spanish_reading: jóvenes
  alternative_spanish_readings:
  - muchachas
  - siervas
  - muchachas de servicio
  rationale: El hebreo puede abarcar trabajadoras, asistentes o muchachas jóvenes. 'Jóvenes' conserva la ambigüedad útil del original y evita fijar demasiado el estatus social sin necesidad textual.
  doctrine_reference: Rut 3:2; cf. Rut 2:8-9
- issue: Imagen agrícola de זֹרֶה
  english_pob_reading: winnowing
  chosen_spanish_reading: aventando
  alternative_spanish_readings:
  - trillando
  - aventando el grano
  rationale: La imagen no es teológica sino narrativa, pero conviene preservar la escena concreta. 'Aventando' comunica el proceso de separar grano y paja con un registro comprensible para lectores contemporáneos.
  doctrine_reference: Rut 3:2
translation_notes:
  revision_awareness: 'Se tuvo en cuenta la revisión inglesa que corrigió una formulación demasiado literal en la cláusula final: el hebreo indica que Booz está aventando cebada en la era, no una ''era de cebada''. Por eso el español evita una construcción posesiva engañosa y traduce la escena de manera directa y fiel.'
  spanish_consistency_notes:
  - Se conservó 'Yahvé' como norma del proyecto solo cuando aparezca el nombre divino; este verso no lo contiene.
  - Se usó 'pariente' para מֹדַעְתָּנוּ en continuidad con la decisión inglesa 'relative/kinsman'.
  - Se mantuvo la metáfora agrícola concreta ('aventando', 'era', 'cebada') sin explicitar más de lo que el hebreo dice.
  - Las notas al pie preservan la alternativa lexical importante para נַעֲרוֹתָיו y מֹדַעְתָּנוּ.
