revisions:
- from: Así que hagan imágenes de sus tumores[a] e imágenes de sus ratones que están devastando la tierra, y den gloria al Dios de Israel. Quizá él aligere su mano de sobre ustedes, de sobre sus dioses y de sobre su tierra.
  to: Así que hagan imágenes de sus tumores[a] y imágenes de sus ratones que están devastando la tierra, y den gloria al Dios de Israel. Quizá él aligere su mano de encima de ustedes, de encima de sus dioses y de encima de su tierra.
  rationale: 'Se hacen ajustes menores de estilo y fidelidad funcional al español: se sustituye el calco rígido ''de sobre'' por ''de encima de'' en las tres repeticiones, preservando la metáfora de la mano pesada que se retira, y se normaliza la conjunción a ''y imágenes''. No se cambia el contenido semántico ni las decisiones teológicas/lexicales principales.'
