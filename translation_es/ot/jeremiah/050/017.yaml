translation:
  language: es
  text: Israel es una oveja[a] dispersa; leones lo han ahuyentado. Primero el rey de Asiria lo devoró, y este último—Nabucodonosor[b], rey de Babilonia—ha roído sus huesos[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O también «un cordero disperso».
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «Nebucadrezar», una forma más cercana a la grafía hebrea aquí; en español se usa tradicionalmente «Nabucodonosor».'
    reason: lexical_alternative
  - marker: c
    text: El verbo hebreo puede significar «ha roído sus huesos», «ha dejado sus huesos pelados» o, más generalmente, «lo ha aplastado».
    reason: lexical_alternative
lexical_decisions:
- source_word: שֶׂה
  english_pob_choice: sheep
  chosen_spanish: oveja
  alternatives_spanish:
  - cordero
  lexicon: HALOT
  rationale: El hebreo puede referirse a una cría o a una oveja pequeña; en este símil de vulnerabilidad colectiva, «oveja» suena natural en español y preserva la imagen pastoral mejor que «cordero», que estrecharía demasiado el matiz.
- source_word: פְזוּרָה
  english_pob_choice: scattered
  chosen_spanish: dispersa
  alternatives_spanish:
  - esparcida
  - desparramada
  lexicon: HALOT
  rationale: El participio pasivo describe a Israel como separado en distintos lugares. «Dispersa» comunica bien la idea de esparcimiento de un rebaño y mantiene un registro digno.
- source_word: יִשְׂרָאֵל
  english_pob_choice: Israel
  chosen_spanish: Israel
  lexicon: uso estándar
  rationale: Nombre propio nacional conservado sin transliteración adicional en español.
- source_word: אֲרָיוֹת
  english_pob_choice: lions
  chosen_spanish: leones
  lexicon: HALOT
  rationale: Plural directo que sostiene el contraste depredador con «oveja».
- source_word: הִדִּיחוּ
  english_pob_choice: have driven him away
  chosen_spanish: han expulsado
  alternatives_spanish:
  - lo han echado
  - lo han ahuyentado
  lexicon: HALOT
  rationale: El causativo expresa hacer huir o apartar. «Han expulsado» transmite bien la fuerza del verbo y la imagen de presa arrojada fuera, sin perder naturalidad en español.
- source_word: הָרִאשׁוֹן
  english_pob_choice: the first
  chosen_spanish: Primero
  alternatives_spanish:
  - el primero
  lexicon: HALOT
  rationale: Aquí funciona como marcador de secuencia frente al opresor posterior; en español, «Primero» permite una construcción más fluida y cercana al orden hebreo.
- source_word: אֲכָלוֹ
  english_pob_choice: has devoured him
  chosen_spanish: lo devoró
  alternatives_spanish:
  - lo comió
  - lo consumió
  lexicon: HALOT
  rationale: Aunque el sentido literal es «comer», «devorar» conserva la violencia metafórica de la imagen imperial. Se usa pretérito simple para reflejar el paralelo narrativo del verso.
- source_word: מֶלֶךְ אַשּׁוּר
  english_pob_choice: the king of Assyria
  chosen_spanish: el rey de Asiria
  lexicon: uso constructo natural en español
  rationale: Se vierte de manera directa e idiomática la cadena constructa con artículo para claridad.
- source_word: וְזֶה הָאַחֲרוֹן
  english_pob_choice: and this last one
  chosen_spanish: y este último
  alternatives_spanish:
  - y el último de ellos
  - y este último opresor
  lexicon: HALOT
  rationale: La combinación del demostrativo y el adjetivo señala al agresor posterior. «Este último» conserva la referencia deíctica y el contraste con «Primero».
- source_word: עִצְּמוֹ
  english_pob_choice: has gnawed his bones
  chosen_spanish: ha roído sus huesos
  alternatives_spanish:
  - ha devorado sus huesos
  - ha descarnado sus huesos
  - ha quebrado sus huesos
  lexicon: HALOT
  rationale: El verbo tiene la imagen de roer o dejar los huesos pelados. «Ha roído sus huesos» preserva la crudeza del hebreo mejor que una versión más general como «lo ha destruido».
- source_word: נְבוּכַדְרֶאצַּר
  english_pob_choice: Nebuchadnezzar
  chosen_spanish: Nabucodrézar
  alternatives_spanish:
  - Nabucodonosor
  - Nebucodrezar
  lexicon: transliteración histórica cercana
  rationale: Se prefiere una forma cercana a la grafía hebrea del texto fuente y a la nota auditada del inglés POB. Se mantiene como nombre propio reconocible en español, con la opción tradicional como alternativa implícita por uso eclesial.
- source_word: מֶלֶךְ בָּבֶל
  english_pob_choice: king of Babylon
  chosen_spanish: rey de Babilonia
  lexicon: uso constructo natural en español
  rationale: Renderización directa y clara de la cadena constructa.
theological_decisions:
- issue: Israel personificado como presa singular
  english_pob_reading: Israel is a scattered sheep; lions have driven him away, with singular pronouns maintained.
  chosen_spanish_reading: Israel es una oveja dispersa; leones lo han expulsado, manteniendo el singular pronominal.
  alternative_spanish_readings:
  - Israel es un rebaño disperso; los leones lo han expulsado
  - Israel es ovejas dispersas; leones las han expulsado
  rationale: El hebreo trata a Israel como un sustantivo colectivo singular con pronombres singulares. Mantener «lo» conserva la personificación profética y la tensión entre entidad nacional singular e imagen de una presa indefensa.
  doctrine_reference: Lectura profética del pueblo como unidad corporativa en el AT
translation_notes:
  revision_awareness: 'La redacción sigue de cerca la última revisión auditada del inglés POB: se conserva la secuencia «Primero... y este último...», y se mantiene la imagen intensa del verbo final con una solución española igualmente concreta. La forma hebrea de Nebucadrezar/Nabucodrézar se reconoce en nota y se adopta una forma española cercana y legible.'
  spanish_consistency_notes:
  - Se preserva el singular de Israel y los pronombres masculinos singulares del verso, como en el hebreo y en el inglés auditado.
  - «Dispersa» se usa para el estado de Israel; «expulsado» y «devoró» sostienen la metáfora depredatoria sin suavizarla.
  - Se evita «SEÑOR» o sustituciones litúrgicas porque aquí no aparece el nombre divino.
  - «Ha roído sus huesos» mantiene la violencia metafórica documentada por el inglés POB y su nota sobre posibles matices alternativos.
