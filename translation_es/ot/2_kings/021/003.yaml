translation:
  language: es
  text: Y reconstruyó los lugares altos que había destruido Ezequías su padre, erigió altares para Baal, e hizo una Asera[a], como había hecho Acab rey de Israel; y se postró ante todo el ejército del cielo y les sirvió.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «un poste de Asera»; el hebreo אֲשֵׁרָה puede referirse a un objeto de culto asociado con Asera y, en algunos contextos, también puede evocar a la diosa misma.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּשָׁב וַיִּבֶן
  english_pob_choice: he rebuilt
  chosen_spanish: reconstruyó
  alternatives_spanish:
  - volvió a edificar
  - edificó de nuevo
  lexicon: HALOT
  rationale: La secuencia hebrea expresa retomó la acción de edificar sobre lo ya destruido; en español, «reconstruyó» comunica de forma natural y fiel esa restauración sin añadir explicación innecesaria.
- source_word: הַבָּמוֹת
  english_pob_choice: the high places
  chosen_spanish: los lugares altos
  alternatives_spanish:
  - los altos lugares
  - los santuarios en los lugares altos
  lexicon: HALOT
  rationale: «Lugares altos» es la equivalencia tradicional y precisa para los sitios de culto señalados por בָּמוֹת; mantiene el valor cultual del término sin cargarlo con una paráfrasis mayor.
- source_word: אִבַּד
  english_pob_choice: had destroyed
  chosen_spanish: había destruido
  alternatives_spanish:
  - había arrasado
  - había eliminado
  lexicon: HALOT
  rationale: El verbo refiere a la eliminación destructiva de esos sitios por Ezequías. «Había destruido» conserva el contraste histórico y el tono concreto del hebreo.
- source_word: וַיָּקֶם מִזְבְּחֹת
  english_pob_choice: he erected altars
  chosen_spanish: erigió altares
  alternatives_spanish:
  - levantó altares
  - estableció altares
  lexicon: HALOT
  rationale: El causativo de קום en este contexto cultual significa establecer o levantar. «Erigió» refleja bien la acción deliberada y mantiene el registro bíblico sin sonar arcaico de más.
- source_word: לַבַּעַל
  english_pob_choice: for Baal
  chosen_spanish: para Baal
  alternatives_spanish:
  - a Baal
  - en honor de Baal
  lexicon: HALOT
  rationale: La preposición expresa dedicación. «Para Baal» sigue la decisión auditada en inglés y suena natural en español para altares dedicados a esa deidad.
- source_word: אֲשֵׁרָה
  english_pob_choice: an Asherah
  chosen_spanish: una Asera
  alternatives_spanish:
  - un poste de Asera
  - una imagen de Asera
  lexicon: HALOT
  rationale: El término hebreo puede aludir a un objeto de culto asociado con Asera o, en ciertos contextos, a la divinidad misma. «Una Asera» preserva esa ambigüedad mejor que especificar «poste» en el texto principal.
- source_word: כַּאֲשֶׁר עָשָׂה אַחְאָב
  english_pob_choice: as Ahab king of Israel had done
  chosen_spanish: como había hecho Ahab rey de Israel
  alternatives_spanish:
  - como hizo Ahab rey de Israel
  - como había hecho Acab rey de Israel
  lexicon: HALOT
  rationale: Se conserva el paralelismo con el hebreo y la lectura auditada en inglés. Se mantiene «Ahab» por ser el nombre propio consagrado en la tradición del proyecto fuente y para evitar introducir una variante no documentada aquí.
- source_word: וַיִּשְׁתַּחוּ
  english_pob_choice: he bowed down
  chosen_spanish: se postró
  alternatives_spanish:
  - se inclinó
  - se arrodilló
  lexicon: HALOT
  rationale: El verbo denota postración física. «Se postró» comunica esa postura con claridad en español y preserva la distinción respecto del verbo siguiente.
- source_word: לְכָל צְבָא הַשָּׁמַיִם
  english_pob_choice: to all the host of heaven
  chosen_spanish: ante todo el ejército del cielo
  alternatives_spanish:
  - ante todo el ejército de los cielos
  - ante toda la hueste celestial
  lexicon: HALOT
  rationale: «צבא» puede ser «ejército/hueste». «Ejército del cielo» conserva la imagen bíblica y evita aplanar la frase a una mera designación astronómica.
- source_word: וַיַּעֲבֹד אֹתָם
  english_pob_choice: and served them
  chosen_spanish: y les sirvió
  alternatives_spanish:
  - y los sirvió
  - y les rindió culto
  lexicon: HALOT
  rationale: En contexto cultual, עבד implica servicio religioso. «Les sirvió» mantiene la distinción léxica con «se postró»; el dativo español encaja bien con el objeto humano/divino implícito.
theological_decisions:
- issue: Ambigüedad de אֲשֵׁרָה
  english_pob_reading: Render as 'an Asherah' in the main text, preserving ambiguity between cult object and associated deity.
  chosen_spanish_reading: Mantener «una Asera» en el cuerpo del texto, sin especificar «poste» en la línea principal.
  alternative_spanish_readings:
  - un poste de Asera
  - Asera (la diosa)
  rationale: El hebreo permite más de una referencia posible; la decisión auditada en inglés preserva esa tensión. El español también puede hacerlo con «una Asera», sin cerrar prematuramente la identificación.
  doctrine_reference: Translation philosophy §1, §3, §5
- issue: 'Doble verbo cultual: postración y servicio'
  english_pob_reading: Differentiate 'bowed down' and 'served' rather than collapsing both into 'worshiped'.
  chosen_spanish_reading: Diferenciar «se postró» y «les sirvió» en vez de resumir ambos como «adoró».
  alternative_spanish_readings:
  - se postró y los adoró
  - se inclinó y los adoró
  rationale: El hebreo distingue postura física y servicio cultual. Mantener ambos verbos conserva la fuerza retórica y la transparencia léxica del texto fuente.
  doctrine_reference: Translation philosophy §1, §5
translation_notes:
  revision_awareness: Se siguió la revisión auditada del inglés que prefirió «for Baal» por sobre «to Baal», y se mantuvo la diferenciación entre «bowed down» y «served». También se preservó la ambigüedad de אֲשֵׁרָה en el texto principal, con nota alternativa equivalente en español.
  spanish_consistency_notes:
  - Se usa «Yahvé» como forma por defecto del proyecto cuando aparezca el nombre divino; en este versículo no aparece.
  - Se mantiene un registro bíblico claro y contemporáneo, evitando tanto calcos excesivos como paráfrasis interpretativas.
  - «Ahab» se conserva como forma propia del proyecto fuente en este registro; si el corpus español estándar exige «Acab», esa decisión debe tratarse de forma consistente a nivel de serie, no solo de verso.
