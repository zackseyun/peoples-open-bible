lexical_decisions:
- source_word: הֶהָרִים
  english_pob_choice: mountains
  chosen_spanish: montañas
  alternatives_spanish:
  - las montañas
  lexicon: HALOT
  rationale: הָרִים significa 'montañas'. En español poético y enumerativo, el artículo repetido no es necesario para conservar la naturalidad, aunque puede añadirse si se prefiere mayor explicitud.
- source_word: וְכָל
  english_pob_choice: and all
  chosen_spanish: y todas
  alternatives_spanish:
  - y todos
  - y cada una de
  lexicon: HALOT
  rationale: Con sustantivos femeninos plurales como גְּבָעוֹת, 'y todas' comunica bien la idea inclusiva de כָּל en una lista de creación convocada a alabar.
- source_word: גְּבָעוֹת
  english_pob_choice: hills
  chosen_spanish: colinas
  alternatives_spanish:
  - lomas
  - montes bajos
  lexicon: HALOT
  rationale: גְּבָעוֹת designa elevaciones menores que montañas. 'Colinas' es el equivalente español más claro y natural; mantiene el contraste topográfico con 'montañas'.
- source_word: עֵץ פְּרִי
  english_pob_choice: fruit trees
  chosen_spanish: árboles frutales
  alternatives_spanish:
  - árboles de fruto
  - árboles fructíferos
  lexicon: HALOT
  rationale: La expresión hebrea es literalmente 'árbol de fruto', usada colectivamente. En español, 'árboles frutales' comunica esa categoría colectiva de forma idiomática sin perder el sentido botánico del original.
- source_word: אֲרָזִים
  english_pob_choice: cedars
  chosen_spanish: cedros
  alternatives_spanish:
  - árboles de cedro
  lexicon: HALOT
  rationale: אֲרָזִים se refiere a cedros. 'Cedros' es breve, natural y suficiente en el paralelismo con 'árboles frutales'.
