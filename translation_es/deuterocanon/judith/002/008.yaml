review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien el sentido básico del griego: los heridos llenan barrancos y cauces estacionales, y el río queda lleno de muertos. Sin embargo, «un río desbordado» desplaza ligeramente el valor activo de ἐπικλύζων («que inunda / desbordante») hacia un estado resultante («desbordado»). Además, el préstamo «wadis» es defendible por el audit trail inglés, pero en español general eclesial suena menos natural; conviene conservarlo con nota, pero sin anteponer «sus» si se busca una coordinación más limpia con el griego.'
  spanish_quality_summary: El español es generalmente claro, pero «sus wadis» suena poco idiomático en español y mezcla un posesivo natural con un préstamo menos asentado. También «un río desbordado se llenará con sus muertos» puede leerse como si el río ya estuviera desbordado antes de llenarse, en vez de presentar un río desbordante. Una pequeña revisión mejora la naturalidad y la precisión sin apartarse del audit trail.
  glossary_alignment: No hay términos de glosario principal en juego. «Heridos», «barrancos» y «muertos» están bien elegidos. Se puede mantener «wadis» por la decisión léxica documentada, con nota explicativa. Para ποταμὸς ἐπικλύζων conviene preferir «un río desbordante» o «un río que se desborda» frente a «desbordado».
  issues:
  - severity: medium
    issue: «un río desbordado» no refleja con suficiente precisión ποταμὸς ἐπικλύζων
    rationale: El participio presente describe un río que está desbordándose o inundando, no meramente un río en estado de haber sido desbordado. «Desbordante» conserva mejor la imagen dinámica.
  - severity: low
    issue: «sus wadis» suena menos natural en español eclesial general
    rationale: Aunque el griego repite el posesivo con ambos accidentes geográficos, en español el segundo posesivo con un préstamo poco común resulta algo tosco. Omitir el segundo posesivo mejora la fluidez sin pérdida real de sentido.
  revised_spanish_text: Y sus heridos llenarán sus barrancos y los wadis[a], y un río desbordante se llenará de sus muertos;
  revised_footnotes:
  - marker: a
    text: O «los torrentes invernales» o «los lechos de torrente». El término griego se refiere a un cauce torrencial estacional.
    reason: lexical_alternative
  revision_rationale: Se ajusta «desbordado» a «desbordante» para reflejar mejor el participio griego ἐπικλύζων, y se cambia «sus wadis» por «los wadis» para un español más natural sin alterar el sentido básico ni la decisión léxica documentada de conservar el préstamo con nota.
