translation:
  language: es
  text: Vinieron reyes; pelearon. Entonces pelearon los reyes de Canaán en Taanac[a], junto a las aguas de Meguidó; no tomaron botín de plata.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «ganancia de plata» o «provecho de plata». La expresión hebrea puede señalar ganancia material en general, pero en este contexto de batalla «botín de plata» es la opción más adecuada.
    reason: lexical_alternative
lexical_decisions:
- source_word: בָּאוּ
  english_pob_choice: came
  chosen_spanish: Vinieron
  alternatives_spanish:
  - Llegaron
  lexicon: HALOT
  rationale: El sentido básico de בוא en qatal plural aquí es entrada o llegada al escenario de la acción. «Vinieron» conserva la brevedad poética del hebreo y suena natural en español.
- source_word: מְלָכִים
  english_pob_choice: Kings
  chosen_spanish: reyes
  alternatives_spanish:
  - los reyes
  lexicon: HALOT
  rationale: El plural anarthro del hebreo se refleja mejor con un sustantivo simple en español. En la poesía, «reyes» preserva la concisión del original.
- source_word: נִלְחָמוּ
  english_pob_choice: they fought
  chosen_spanish: pelearon
  alternatives_spanish:
  - combatieron
  - hicieron guerra
  lexicon: HALOT
  rationale: El nifal de לחם expresa aquí combate/batalla. «Pelearon» es idiomático, breve y fiel al tono poético.
- source_word: אָז
  english_pob_choice: Then
  chosen_spanish: Entonces
  alternatives_spanish:
  - Luego
  - En ese momento
  lexicon: HALOT
  rationale: אָז marca el avance secuencial del poema. «Entonces» mantiene esa transición sin sobreexplicar.
- source_word: מַלְכֵי כְנַעַן
  english_pob_choice: the kings of Canaan
  chosen_spanish: los reyes de Canaán
  alternatives_spanish:
  - reyes cananeos
  lexicon: HALOT
  rationale: El constructo se vierte de manera transparente como relación posesiva. «Los reyes de Canaán» conserva la cadencia formal y la estructura del hebreo.
- source_word: בְּתַעְנַךְ
  english_pob_choice: at Taanach
  chosen_spanish: en Taanac
  alternatives_spanish:
  - en Taanaque
  - en Taanacá
  lexicon: HALOT
  rationale: La preposición ב en un contexto de batalla puede indicar ubicación. «En Taanac» sigue de cerca el topónimo y funciona de manera natural en español.
- source_word: עַל מֵי מְגִדּוֹ
  english_pob_choice: by the waters of Megiddo
  chosen_spanish: junto a las aguas de Meguido
  alternatives_spanish:
  - por las aguas de Meguido
  - cerca de las aguas de Meguido
  lexicon: HALOT
  rationale: עַל con un rasgo geográfico aquí comunica proximidad. «Junto a las aguas de Meguido» preserva el matiz topográfico y la imaginería del texto.
- source_word: בֶּצַע כֶּסֶף
  english_pob_choice: plunder of silver
  chosen_spanish: botín de plata
  alternatives_spanish:
  - ganancia de plata
  - provecho de plata
  - saqueo de plata
  lexicon: HALOT
  rationale: בצע puede denotar ganancia material o botín. En este contexto bélico, «botín de plata» expresa bien la idea de despojo sin perder la ambigüedad material del hebreo.
- source_word: לֹא לָקָחוּ
  english_pob_choice: they took no
  chosen_spanish: no tomaron
  alternatives_spanish:
  - no llevaron
  - no recibieron
  lexicon: HALOT
  rationale: La negación del perfecto simple se traduce con naturalidad por «no tomaron», conservando el énfasis en la ausencia de botín.
translation_notes:
  revision_awareness: La revisión más reciente indicó que no hacía falta ningún cambio; se mantiene el sentido y la estructura del texto base con una traducción española directa y auditable.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma del proyecto solo cuando aparezca el Tetragrámaton; aquí no hay uso.
  - «Canaán» y «Meguido» se adaptan a la grafía española corriente para topónimos bíblicos.
  - La frase final preserva la tensión léxica de בצע con una nota alternativa, siguiendo el auditor inglés.
