translation:
  language: es
  text: 'Ahora, que mi señor el rey no tome este asunto a pecho[a], diciendo: «Todos los hijos del rey han muerto»; porque solo Amnón ha muerto.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo literalmente: «no ponga esta palabra/asunto en su corazón».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְעַתָּה
  english_pob_choice: Now
  chosen_spanish: Ahora
  alternatives_spanish:
  - Y ahora
  - Pues ahora
  lexicon: HALOT
  rationale: Marca transición discursiva y corrección inmediata; «Ahora» es natural en español y conserva el giro introductorio sin añadir énfasis indebido.
- source_word: אַל יָשֵׂם ... אֶל לִבּוֹ
  english_pob_choice: let not ... take ... to heart
  chosen_spanish: no ponga ... en su corazón
  alternatives_spanish:
  - no lo tome a pecho
  - no lo tenga en su corazón
  - no lo considere demasiado
  lexicon: HALOT
  rationale: La imagen hebrea literalmente es «poner» algo «en el corazón». Mantengo la metáfora con una construcción española clara; «a pecho» sería más idiomático, pero aquí se conserva mejor la forma fuente y la tensión lexical.
- source_word: אֲדֹנִי הַמֶּלֶךְ
  english_pob_choice: my lord the king
  chosen_spanish: mi señor el rey
  alternatives_spanish:
  - mi señor, el rey
  - mi amo el rey
  lexicon: HALOT
  rationale: «Señor» expresa la deferencia cortesana en español actual; «amo» sonaría demasiado duro o esclavista en este registro. Se mantiene el orden honorífico natural.
- source_word: דָּבָר
  english_pob_choice: this matter
  chosen_spanish: este asunto
  alternatives_spanish:
  - esta cosa
  - esta palabra
  - este hecho
  lexicon: HALOT
  rationale: En este contexto se refiere al contenido reportado, no a una «palabra» aislada. «Asunto» recoge bien el alcance amplio de la noticia/falsa conclusión.
- source_word: כָּל בְּנֵי הַמֶּלֶךְ
  english_pob_choice: All the king’s sons
  chosen_spanish: todos los hijos del rey
  alternatives_spanish:
  - todos los hijos varones del rey
  - todos los hijos del rey
  lexicon: HALOT
  rationale: «Hijos» traduce literalmente בְּנֵי y es natural en español; el contexto ya restringe el referente a los varones presentes, sin necesidad de explicitarlo en el texto principal.
- source_word: מֵתוּ
  english_pob_choice: are dead
  chosen_spanish: han muerto
  alternatives_spanish:
  - están muertos
  - murieron
  lexicon: HALOT
  rationale: En español, el pretérito perfecto compuesto comunica mejor la conclusión reportada y la situación resultante. No se fuerza un valor más narrativo que el del hebreo en la cita directa.
- source_word: כִּי אִם
  english_pob_choice: for ... alone
  chosen_spanish: porque solo
  alternatives_spanish:
  - sino que solo
  - excepto que solo
  - pero solo
  lexicon: HALOT
  rationale: 'La construcción es correctiva/exclusiva: no todos murieron, sino Amnón solamente. «Porque solo» mantiene la corrección de manera clara y fluida en español.'
- source_word: לְבַדּוֹ
  english_pob_choice: alone
  chosen_spanish: solo
  alternatives_spanish:
  - por sí solo
  - solamente
  - él solo
  lexicon: HALOT
  rationale: Refuerza la exclusividad sin sobrecargar el estilo. Evita duplicar innecesariamente la idea ya expresada en «solo».
- source_word: מֵת
  english_pob_choice: is dead
  chosen_spanish: ha muerto
  alternatives_spanish:
  - está muerto
  - murió
  lexicon: HALOT
  rationale: La forma resultante en español debe concordar con la cláusula correctiva y la referencia específica a Amnón; «ha muerto» conserva el valor perfecto/stative en un español natural.
translation_notes:
  revision_awareness: Se siguió el corte auditado sin cambios sustantivos del flujo inglés; la revisión más reciente indicó que no hacían falta ajustes. En español se preservó la corrección exclusiva del hebreo, manteniendo la metáfora del corazón y una formulación cortesana natural.
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando aparece el nombre divino explícito; aquí no aplica.
  - Se mantiene «hijos» para בְּנֵי en concordancia con el contexto narrativo y el uso auditado de «sons».
  - Se evita una calca rígida de «set ... on his heart», pero se conserva la imagen del corazón en nota.
  - «Amnón» se mantiene como nombre propio establecido en español bíblico.
  - El tono es cortesano y sobrio, adecuado para diálogo narrativo antiguo sin arcaizar en exceso.
