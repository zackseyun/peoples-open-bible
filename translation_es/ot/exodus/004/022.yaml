translation:
  language: es
  text: 'Entonces dirás a Faraón[a]: «Así dice Yahvé: Israel es mi hijo, mi primogénito.»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, siguiendo más formalmente el orden hebreo: «Israel es mi hijo, mi primogénito».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְ/אָמַרְתָּ
  english_pob_choice: Then you shall say
  chosen_spanish: Entonces dirás
  alternatives_spanish:
  - Y dirás
  - Y deberás decir
  lexicon: HALOT
  rationale: La forma verbal con waw consecutiva en este mandato tiene valor injuntivo y secuencial; «Entonces» conserva la transición narrativa, y «dirás» expresa la instrucción directa a Moisés sin sonar arcaico.
- source_word: אֶל
  english_pob_choice: to
  chosen_spanish: a
  alternatives_spanish:
  - para con
  - hacia
  lexicon: HALOT
  rationale: La preposición introduce al destinatario del mensaje; en español «a» es la forma más natural y fiel en este contexto.
- source_word: פַּרְעֹה
  english_pob_choice: Pharaoh
  chosen_spanish: Faraón
  alternatives_spanish:
  - Faraón
  lexicon: HALOT
  rationale: Título propio convencional en español bíblico; se mantiene como nombre/título histórico reconocible.
- source_word: כֹּה אָמַר
  english_pob_choice: Thus says
  chosen_spanish: Así dice
  alternatives_spanish:
  - Así ha dicho
  - Esto dice
  lexicon: HALOT
  rationale: La fórmula profética mensajera en español suena natural con presente histórico «dice», conservando solemnidad y el valor de cita autorizada.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  - Jehová
  lexicon: HALOT
  rationale: Se sigue el criterio del proyecto de verter el Tetragrámaton como «Yahvé», preservando el nombre divino personal en lugar de sustituirlo por un título.
- source_word: בְּנִי
  english_pob_choice: my son
  chosen_spanish: mi hijo
  alternatives_spanish:
  - mi hijo
  - mi niño
  lexicon: HALOT
  rationale: El sustantivo filial se traduce literalmente; «hijo» mantiene la metáfora de filiación y la relación de pacto.
- source_word: בְכֹרִי
  english_pob_choice: my firstborn
  chosen_spanish: mi primogénito
  alternatives_spanish:
  - mi primero nacido
  - mi hijo primogénito
  lexicon: HALOT
  rationale: «Primogénito» preserva el matiz de prioridad y dignidad inherentes al término, y funciona bien en español bíblico sin añadir explicaciones ajenas al texto.
- source_word: יִשְׂרָאֵל
  english_pob_choice: Israel
  chosen_spanish: Israel
  alternatives_spanish:
  - Israel
  lexicon: HALOT
  rationale: Nombre propio conservado sin adaptación; en la cláusula nominal se entiende como sujeto del predicado metafórico.
theological_decisions:
- issue: Nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - Jehová
  - el SEÑOR
  rationale: El texto hebreo usa directamente el Tetragrámaton. La opción «Yahvé» sigue la convención del proyecto y evita la sustitución por un título, manteniendo el nombre del pacto.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Relación filial aplicada a Israel
  english_pob_reading: Israel is my firstborn son
  chosen_spanish_reading: Israel es mi hijo, mi primogénito
  alternative_spanish_readings:
  - Israel es mi primogénito hijo
  - Israel es mi hijo, el primogénito
  rationale: Se preserva la tensión del hebreo entre filiación y primogenitura. La redacción española mantiene ambas ideas en apposición, sin resolverlas del todo en una sola etiqueta.
  doctrine_reference: 'DOCTRINE.md Translation philosophy: preserve theological tension rather than resolve it; readable modern Spanish'
translation_notes:
  revision_awareness: El paquete fuente y el audit trail inglés muestran alta concordancia y sin cambios recientes sustantivos; la presente versión española busca mantener esa estabilidad, conservando la fórmula profética y la tensión hebrea entre «hijo» y «primogénito».
  spanish_consistency_notes:
  - Se mantiene «Yahvé» para el Tetragrámaton, conforme al criterio del proyecto.
  - Se evita «SEÑOR» como sustitución del nombre divino.
  - «Primogénito» se usa para bĕkôrî por fidelidad semántica y naturalidad bíblica en español.
  - La nota a pie de página conserva la alternativa formal del orden hebreo, igual que el audit trail inglés.
  - El tono es reverente y moderno, sin arcaísmos innecesarios.
