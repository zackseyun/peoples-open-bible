  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura y el sentido general del griego: transición recíproca (κατὰ τὰ αὐτὰ), contingencia de guerra para los judíos, ayuda militar romana como aliados, y la cláusula final que limita esa ayuda según las circunstancias. Sin embargo, la cláusula final en español suena algo forzada e imprecisa con «según el momento se lo indique»; «las circunstancias» comunica mejor ὁ καιρός en este contexto de tratado y hace más natural el sentido de ὑπογράφῃ.'
  spanish_quality_summary: El español es claro y digno, con buen nivel de legibilidad. «Asimismo» y «combatirán como aliados» funcionan bien. «De todo corazón» es comprensible, aunque en contexto diplomático-militar «con plena entrega» suena un poco más preciso; aun así, no es un error. El principal ajuste necesario es la naturalidad y precisión de la última cláusula.
  glossary_alignment: No hay términos del glosario mayor en disputa. Las decisiones léxicas siguen adecuadamente el expediente inglés. Se preserva bien «la nación de los judíos» para ἔθνει Ἰουδαίων y el sentido militar de συμμαχήσουσιν. Se mantiene la alternativa léxica de ἐκ ψυχῆς en nota, y conviene añadir nota para la cláusula final, ya que el inglés auditado preserva alternativas significativas allí.
  issues:
  - severity: medium
    issue: La cláusula final «según el momento se lo indique» es poco natural y reduce indebidamente ὁ καιρός a «momento».
    rationale: En este contexto, ὁ καιρός apunta más a la ocasión/circunstancias oportunas que al mero instante temporal. Además, «se lo indique» resulta algo rígido en español. «Según las circunstancias se lo indiquen» o similar preserva mejor el matiz abierto del griego y la racionalidad del tratado.
  - severity: low
    issue: Falta una nota para la cláusula final, pese a que el expediente inglés conserva alternativas léxicas importantes.
    rationale: El inglés POB documenta variantes como «as circumstances may suggest to them» y «as the time may prescribe to them». Dado que en español esa cláusula admite varias soluciones válidas, conviene preservarlas en nota para transparencia auditiva.
  revised_spanish_text: Asimismo[a], si a la nación de los judíos le sobreviene primero la guerra, los romanos combatirán como aliados de todo corazón[b], según las circunstancias se lo indiquen[c].
  revised_footnotes:
