review_pass:
  verdict: revise
  source_alignment_summary: El borrador español sigue el texto principal inglés revisado, que aquí refleja la línea hebrea de «lágrima / mejilla / gemido», no el paralelo griego exhortativo. La imagen básica está preservada, pero la frase final «por la causa de ella» no corresponde bien ni al hebreo מרודיה («sus destructores/rebeldes») ni al inglés auditado «over the one who causes it».
  spanish_quality_summary: La redacción es comprensible, pero «un gemido por la causa de ella» suena poco natural y semánticamente imprecisa en español. «por la mejilla» también puede mejorarse a «por la mejilla» o «baja por la mejilla»; el verbo actual es aceptable, aunque «baja»/«cae» encaja mejor con una lágrima. Conviene además ajustar la nota para que no sugiera que el principal sigue el griego cuando el texto principal actual no lo hace.
  glossary_alignment: 'No hay términos doctrinales mayores en juego. El problema principal es de alineación textual: las decisiones léxicas y teológicas del expediente inglés hablan del griego, pero la revisión aplicada y el borrador español usan la línea hebrea. La nota debe describir con honestidad esa divergencia sin afirmar erróneamente que el texto principal sigue el griego.'
  issues:
  - severity: high
    issue: La cláusula final española no refleja fielmente el sentido auditado
    rationale: «y un gemido por la causa de ella» no transmite «over the one who causes it» y tampoco representa con claridad el hebreo alternativo «sobre sus destructores/rebeldes».
  - severity: high
    issue: La nota textual contradice el texto principal actual
    rationale: La nota dice que «el texto principal sigue el paralelo griego», pero el texto principal español presente sigue la imagen hebrea de la lágrima y el gemido, no la exhortación griega.
  - severity: medium
    issue: Naturalidad española mejorable en la imagen poética
    rationale: Para una lágrima, «baja/cae por la mejilla» suena más idiomático que «corre», y evita una sensación algo mecánica.
  revised_spanish_text: ¿No baja una lágrima por la mejilla[a], y un gemido por quien la causa?
  revised_footnotes:
  - marker: a
    text: 'El testimonio hebreo conservado (Kahana / Geniza de El Cairo) para este versículo es incierto y difiere del paralelo griego. El griego dice: «Considera lo del prójimo a partir de ti mismo, y en todo asunto piensa con cuidado». El hebreo atestigua una línea muy distinta, del tipo: «¿No cae una lágrima por la mejilla, y un suspiro por sus destructores/rebeldes?»'
    reason: alternative_reading
  revision_rationale: Se corrige la frase final a un español natural y fiel al sentido del texto principal auditado («por quien la causa»), y se reescribe la nota para reflejar honestamente la divergencia entre el hebreo y el griego sin afirmar erróneamente que el principal sigue el griego. También se mejora levemente la imagen poética con «baja una lágrima».
