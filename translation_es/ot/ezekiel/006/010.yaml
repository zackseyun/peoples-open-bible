  rationale: 'Se revisa la segunda mitad del versículo para reflejar mejor la sintaxis y el sentido del hebreo: Yahvé no habló en vano, sino que anunció efectivamente el juicio que traería. «Cuando dije que traería sobre ellos» es natural en español y conserva la fuerza del infinitivo ligado a «hablé». Se eliminó la nota sobre «Yahvé» por innecesaria y se corrigió la nota sobre הָרָעָה para que esté plenamente en español y más precisa.'
