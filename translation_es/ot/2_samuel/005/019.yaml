base_translation:
  language: en
  yaml_path: translation/ot/2_samuel/005/019.yaml
  text: And David inquired of Yahweh[a], saying, “Should I go up against the Philistines? Will you give them into my hand?” And Yahweh said to David, “Go up, for I will certainly give the Philistines into your hand.”
  footnotes:
