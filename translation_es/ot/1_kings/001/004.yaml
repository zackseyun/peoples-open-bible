translation:
  language: es
  text: La joven era muy hermosa[a], y llegó a ser la encargada de atender al rey y le servía, pero el rey no la conoció.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «no tuvo relaciones sexuales con ella». El hebreo «conocer» aquí es un eufemismo para las relaciones sexuales.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הַנַּעֲרָה
  english_pob_choice: the young woman
  chosen_spanish: la joven
  alternatives_spanish:
  - la muchacha
  - la muchacha joven
  - la joven mujer
  lexicon: HALOT
  rationale: נַעֲרָה designa a una mujer joven; en español, 'la joven' transmite esa referencia de manera natural y digna. Evita tanto el posible matiz infantil de 'muchacha' como el tono más pesado de 'joven mujer'.
- source_word: יָפָה עַד מְאֹד
  english_pob_choice: was very beautiful
  chosen_spanish: era muy hermosa
  alternatives_spanish:
  - era sumamente hermosa
  - era extremadamente hermosa
  - era muy bella
  lexicon: HALOT
  rationale: La expresión intensifica fuertemente la belleza. 'Muy hermosa' mantiene la fuerza del hebreo con español fluido y no excesivamente literario; 'sumamente' o 'extremadamente' suenan más marcados o menos naturales en este contexto narrativo.
- source_word: סֹכֶנֶת
  english_pob_choice: attendant
  chosen_spanish: la asistente
  alternatives_spanish:
  - la acompañante
  - la encargada
  - la servidora
  lexicon: HALOT
  rationale: El término describe a una persona adscrita al rey en una función de apoyo y servicio. 'Asistente' comunica esa función sin introducir connotaciones modernas demasiado técnicas ni insinuaciones relacionales ajenas al contexto.
- source_word: וַתְּשָׁרְתֵהוּ
  english_pob_choice: and served him
  chosen_spanish: y le servía
  alternatives_spanish:
  - y le servía como ayudante
  - y le atendía
  - y lo servía
  lexicon: HALOT
  rationale: שרת expresa servicio personal. 'Le servía' reproduce bien el valor verbal en castellano; el imperfecto narrativo 'servía' refleja adecuadamente la acción continuada o habitual en el relato.
- source_word: יְדָעָהּ
  english_pob_choice: did not know her
  chosen_spanish: no la conoció
  alternatives_spanish:
  - no tuvo relaciones sexuales con ella
  - no se acostó con ella
  - no la conoció sexualmente
  lexicon: HALOT
  rationale: ידע aquí es un eufemismo sexual. Se conserva la fórmula hebrea 'no la conoció' en el cuerpo del texto para respetar el giro idiomático, y la nota aclara el sentido para no oscurecer el pasaje. En español, 'no la conoció' es comprensible y relativamente transparente en estilo bíblico.
theological_decisions:
- issue: Eufemismo sexual en la clausula final
  english_pob_reading: Retain the idiomatic expression 'did not know her' in the main text, with explanatory footnote.
  chosen_spanish_reading: Mantener 'no la conoció' en el texto principal, con nota explicativa del sentido sexual.
  alternative_spanish_readings:
  - no tuvo relaciones sexuales con ella
  - no se acostó con ella
  rationale: La traducción conserva el idioma del hebreo y la sobriedad narrativa, sin ocultar el sentido explícito del verbo. La nota preserva la transparencia exegética y evita que el lector pierda el matiz semítico del original.
  doctrine_reference: Translation philosophy §§1, 3, 6
translation_notes:
  revision_awareness: La revisión más reciente indica que no hubo cambios necesarios; esta propuesta sigue el acuerdo alto del audit trail inglés y no introduce novedades textuales.
  spanish_consistency_notes:
  - Se usa 'Yahvé' solo cuando corresponda al Tetragrama; en este versículo no aparece.
  - Se prefiere 'la joven' y 'la asistente' para mantener neutralidad de registro y evitar arcaísmos innecesarios.
  - La nota a pie de página preserva la tensión entre el eufemismo hebreo y la claridad del sentido sexual, tal como en el POB inglés.
