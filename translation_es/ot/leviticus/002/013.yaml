  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien el sentido general del hebreo: cada ofrenda de la minjá debe llevar sal, no debe faltar la sal del pacto de Dios, y toda ofrenda debe ofrecerse con sal. Conserva correctamente la expresión pactal de forma literal. Sin embargo, el orden de la segunda cláusula en español suena forzado (''No dejarás que falte de tu ofrenda vegetal la sal...'') y conviene alinearlo mejor con la relación sintáctica hebrea/española natural: que la sal no falte de la ofrenda. Además, falta en español la nota cultural correspondiente al inglés sobre ''la sal del pacto de tu Dios''.'
  spanish_quality_summary: El texto es claro y bastante legible, con buen registro bíblico moderno. 'Ofrenda vegetal' es aceptable, aunque algo menos específico que 'ofrenda de cereal/grano'; no exige cambio. La principal mejora necesaria es estilística-sintáctica en la segunda oración para que suene natural y digna en español. También conviene preservar la nota explicativa sobre la expresión covenantal, ya que el expediente inglés la documenta explícitamente.
  glossary_alignment: 'Se alinea bien con la terminología del proyecto: אֱלֹהֶיךָ -> ''tu Dios''; no hay conflicto con Yahvé en este versículo. קָרְבָּן -> ''ofrenda'' y מִנְחָה -> ''ofrenda vegetal'' son defendibles en contexto. La expresión מֶלַח בְּרִית אֱלֹהֶיךָ se mantiene literalmente como ''la sal del pacto de tu Dios'', en conformidad con la decisión teológica auditada. Las notas deben reflejar tanto la alternativa lexical como la nota cultural del inglés.'
