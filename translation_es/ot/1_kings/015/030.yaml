translation:
  language: es
  text: a causa de los pecados de Jeroboam que cometió y por los cuales hizo pecar a Israel, y a causa de su provocación[a] por la cual provocó a Yahvé, el Dios de Israel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: También puede entenderse «por su enojo»; el sustantivo hebreo puede denotar enojo o provocación, pero aquí «provocación» encaja mejor con el verbo «provocó».
    reason: lexical_alternative
lexical_decisions:
- source_word: עַל
  english_pob_choice: because of
  chosen_spanish: a causa de
  alternatives_spanish:
  - por
  - debido a
  lexicon: HALOT
  rationale: En este contexto causal, עַל introduce la razón del juicio narrado. «A causa de» comunica bien la relación causal sin sonar forzado en español.
- source_word: חַטֹּאות
  english_pob_choice: sins
  chosen_spanish: pecados
  alternatives_spanish:
  - faltas
  - ofensas
  lexicon: HALOT
  rationale: El plural hebreo señala acciones concretas y múltiples. «Pecados» preserva esa pluralidad y mantiene el valor moral fuerte del término.
- source_word: חָטָא
  english_pob_choice: committed
  chosen_spanish: cometió
  alternatives_spanish:
  - pecó
  lexicon: HALOT
  rationale: Dado que ya aparece «pecados», traducir el verbo como «cometió» evita repetición torpe y conserva el sentido de realización efectiva del mal.
- source_word: הֶחֱטִיא
  english_pob_choice: caused Israel to sin
  chosen_spanish: hizo pecar a Israel
  alternatives_spanish:
  - causó que Israel pecara
  - llevó a Israel a pecar
  lexicon: HALOT
  rationale: El verbo hiphil es causativo. «Hizo pecar a Israel» conserva con claridad esa fuerza causal en un español natural y breve.
- source_word: בְּכַעְסוֹ
  english_pob_choice: by his provocation
  chosen_spanish: por su provocación
  alternatives_spanish:
  - por su enojo
  - a causa de su provocación
  lexicon: HALOT
  rationale: El sustantivo puede abarcar enojo o provocación, pero aquí el paralelo con el verbo siguiente «provocó» favorece «provocación», como en el audit trail inglés.
- source_word: הִכְעִיס
  english_pob_choice: provoked
  chosen_spanish: provocó
  alternatives_spanish:
  - irritó
  - exasperó
  lexicon: HALOT
  rationale: El verbo hiphil significa provocar a ira. «Provocó» es idiomático y reproduce bien la relación con el objeto divino que sigue.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  lexicon: HALOT
  rationale: 'Se sigue el criterio del proyecto para el Tetragrámaton: «Yahvé» preserva el nombre divino revelado, en lugar de sustituirlo por un título.'
- source_word: אֱלֹהֵי יִשְׂרָאֵל
  english_pob_choice: the God of Israel
  chosen_spanish: el Dios de Israel
  alternatives_spanish:
  - el Dios de Israel
  lexicon: HALOT
  rationale: La construcción de estado constructo se vierte de manera transparente y convencional como «el Dios de Israel», manteniendo la identificación pactual.
theological_decisions:
- issue: Nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: El texto hebreo usa directamente el Tetragrámaton. En español del proyecto se conserva el nombre propio divino como «Yahvé» para no ocultarlo tras una sustitución litúrgica.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
translation_notes:
  revision_awareness: 'Se ajustó la segunda construcción causal para reflejar la repetición del hebreo: primero la causalidad de los pecados de Jeroboam y luego la causalidad de su provocación, sin fusionarlas en una sola frase. La nota anterior sobre el matiz de כעס se preserva en español, pero con anclaje correcto en el texto.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» para יְהוָה según la política del proyecto.
  - Se conserva la repetición causal del hebreo con dos miembros coordinados por «y a causa de».
  - «Hizo pecar» reproduce la fuerza causativa del hiphil sin sobreexplicar el mecanismo.
  - El anclaje [a] aparece exactamente en el punto donde se discute el matiz léxico de כעס.
