base_translation:
  language: en
  yaml_path: translation/ot/1_chronicles/024/004.yaml
  text: 'The sons of Eleazar were found to be more numerous[a], as heads of the men, than the sons of Ithamar, and they divided them thus: for the sons of Eleazar, sixteen heads of fathers’ houses, and for the sons of Ithamar, according to their fathers’ houses[b], eight.'
  footnotes:
  - marker: a
    text: Or 'as heads of the warriors' for 'as heads of the mighty men.' The Hebrew גְּבָרִים can denote strong or valiant men, not merely adult males.
    reason: lexical_alternative
  - marker: b
    text: '''Fathers’ houses'' refers to ancestral family clans or households, a standard kinship-administrative unit in Israel.'
    reason: cultural_note
