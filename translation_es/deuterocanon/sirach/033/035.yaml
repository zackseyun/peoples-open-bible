translation:
  language: es
  text: Aloja a un extraño contigo, y te arrojará al tumulto, y te apartará de lo tuyo[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: '«de lo tuyo» conserva la amplitud de τῶν ἰδίων σου: puede aludir a tu casa, tus bienes o tu esfera propia; el griego no especifica «familia» ni «gente».'
    reason: lexical_alternative
lexical_decisions:
- source_word: παροίκισον
  english_pob_choice: Settle ... with you
  chosen_spanish: Aloja ... contigo
  alternatives_spanish:
  - Instala ... contigo
  - Haz que more contigo
  - Recibe ... en tu casa
  lexicon: LSJ
  rationale: El imperativo pide causar que alguien resida cerca o dentro de tu esfera. «Aloja» comunica de forma natural la acción de recibir y dar residencia sin volverla más suave de lo que el contexto sapiencial advierte.
- source_word: ἀλλότριον
  english_pob_choice: a stranger
  chosen_spanish: un extraño
  alternatives_spanish:
  - un forastero
  - un extranjero
  - un foráneo
  lexicon: LSJ
  rationale: El adjetivo significa ajeno, perteneciente a otro, extraño. En este contexto de sabiduría se refiere de manera amplia a alguien que no pertenece al propio círculo; «extraño» conserva esa amplitud sin precisar de más.
- source_word: διαστρέψει
  english_pob_choice: will throw you into turmoil
  chosen_spanish: te meterá en turbación
  alternatives_spanish:
  - te trastornará
  - te pondrá en confusión
  - te arruinará
  lexicon: LSJ
  rationale: διαστρέφω puede significar torcer, trastornar o arruinar. Aquí, con ἐν ταραχαῖς, el énfasis es el desorden práctico; «meterá en turbación» mantiene la fuerza del verbo y el resultado de perturbación.
- source_word: ἐν ταραχαῖς
  english_pob_choice: into turmoil
  chosen_spanish: en turbación
  alternatives_spanish:
  - en problemas
  - en disturbios
  - en confusión
  lexicon: LSJ
  rationale: ταραχαί son perturbaciones, alborotos o turbación. «En turbación» conserva el sentido de trastorno sin sonar forzado en español.
- source_word: ἀπαλλοτριώσει
  english_pob_choice: estrange
  chosen_spanish: te apartará
  alternatives_spanish:
  - te enajenará
  - te alienará
  - te separará
  lexicon: LSJ
  rationale: El verbo significa hacer ajeno, apartar o enajenar. «Te apartará» expresa la separación relacional de manera clara; aunque «enajenará» es posible, en español puede sonar más abstracto o jurídico.
- source_word: τῶν ἰδίων σου
  english_pob_choice: from your own
  chosen_spanish: de lo tuyo
  alternatives_spanish:
  - de tus bienes
  - de tu casa
  - de los tuyos
  lexicon: LSJ
  rationale: La expresión griega es amplia y puede abarcar lo propio, la casa, el círculo cercano o los bienes. Dado que la revisión inglesa eliminó «people» por no estar en el griego, «de lo tuyo» conserva la amplitud literal sin añadir un referente no explícito.
translation_notes:
  revision_awareness: La base inglesa fue revisada desde «your own people» a «your own» para ajustarse con más literalidad a τῶν ἰδίων σου. En español se evitó añadir «familia», «casa» o «gente» como sentido principal, aunque se deja nota de la amplitud semántica del griego.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» cuando el texto no usa κύριος ni el nombre divino; aquí no aplica.
  - Se prefirió un equivalente español natural para el imperativo causativo de παροίκισον sin perder el matiz de advertencia sapiencial.
  - «de lo tuyo» evita una especificación indebida y refleja la amplitud de τῶν ἰδίων σου.
