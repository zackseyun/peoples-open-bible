translation:
  language: es
  text: El consejo de Yahvé permanece para siempre[a]; los planes de su corazón, de generación en generación.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «propósito» para «consejo», y «pensamientos» o «propósitos» para «planes».
    reason: lexical_alternative
lexical_decisions:
- source_word: עֲצַת
  english_pob_choice: counsel
  chosen_spanish: consejo
  alternatives_spanish:
  - plan
  - propósito
  lexicon: HALOT
  rationale: עֵצָה/עֲצָה expresa consejo, deliberación o propósito. «Consejo» conserva el matiz de designio deliberado y encaja bien con el paralelismo de «planes» sin forzar una paráfrasis.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  lexicon: HALOT
  rationale: Se mantiene el nombre propio del pacto en español como «Yahvé», conforme al criterio del POB para יְהוָה, en vez de sustituirlo por un título como «Señor».
- source_word: לְעוֹלָם
  english_pob_choice: forever
  chosen_spanish: para siempre
  alternatives_spanish:
  - por siempre
  - por la eternidad
  lexicon: HALOT
  rationale: La expresión comunica permanencia continua y naturalidad en español moderno, sin perder el sentido de duración indefinida.
- source_word: תַּעֲמֹד
  english_pob_choice: stands
  chosen_spanish: permanece
  alternatives_spanish:
  - se mantiene
  - estará en pie
  lexicon: HALOT
  rationale: 'El imperfecto tiene valor gnómico: una verdad general y estable. «Permanece» transmite continuidad duradera en español con buena fluidez, sin necesidad de futuro.'
- source_word: מַחְשְׁבוֹת
  english_pob_choice: plans
  chosen_spanish: planes
  alternatives_spanish:
  - pensamientos
  - propósitos
  lexicon: HALOT
  rationale: En paralelo con «consejo» y aplicado al designio divino, «planes» expresa intención ordenada. Se conserva la alternativa semántica de «pensamientos» en nota, porque el hebreo también puede referirse a pensamientos o designios.
- source_word: לִבּוֹ
  english_pob_choice: his heart
  chosen_spanish: su corazón
  alternatives_spanish:
  - su mente
  - su ser interior
  lexicon: HALOT
  rationale: Se retiene «corazón» para reflejar el hebreo antropológico, donde el corazón es el centro de pensamiento y voluntad; no se sustituye por «mente» para evitar una interpretación reductiva.
- source_word: לְדֹר וָדֹר
  english_pob_choice: from generation to generation
  chosen_spanish: de generación en generación
  alternatives_spanish:
  - para todas las generaciones
  - generación tras generación
  lexicon: HALOT
  rationale: Es el equivalente idiomático natural en español y conserva la idea distributiva de continuidad a través de sucesivas generaciones.
theological_decisions:
- issue: Representación del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Señor
  - Jehová
  rationale: El texto hebreo usa directamente el Tetragrámaton. Siguiendo la línea auditada del POB, se preserva el nombre propio divino en español como «Yahvé» para no ocultar el nombre del pacto tras un título.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה / YHWH → Yahvé'
translation_notes:
  revision_awareness: 'La redacción sigue el pasaje hebreo con alta concordancia respecto del audit trail inglés: mantiene el paralelismo entre עֲצַת y מַחְשְׁבוֹת, conserva el nombre divino como Yahvé/Yahvé en español, y vierte la locución temporal como una afirmación gnómica de permanencia sin añadir elementos no presentes en el original.'
  spanish_consistency_notes:
  - Se eligió «Yahvé» de forma consistente con la convención POB para יְהוָה.
  - «Conjunto» no se usó porque debilitaría el paralelismo y no refleja bien עֲצָה/מַחְשָׁבוֹת.
  - «Permanece» funciona mejor que un futuro explícito, porque el hebreo expresa una verdad general atemporal.
  - Se mantuvo «corazón» y no «mente» para respetar el antropologismo hebreo del texto.
