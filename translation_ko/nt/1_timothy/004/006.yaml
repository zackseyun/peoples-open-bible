id: 1TI.4.6
reference: 1 Timothy 4:6
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: Ταῦτα ὑποτιθέμενος τοῖς ἀδελφοῖς καλὸς ἔσῃ διάκονος ⸂Χριστοῦ Ἰησοῦ⸃, ἐντρεφόμενος τοῖς λόγοις τῆς πίστεως καὶ τῆς καλῆς διδασκαλίας ᾗ παρηκολούθηκας,
base_translation:
  language: en
  yaml_path: translation/nt/1_timothy/004/006.yaml
  text: By putting these things before the brothers[a], you will be a good servant of Messiah Jesus[c][b], being nourished by the words of the faith and of the good teaching that you have followed.
  footnotes:
  - marker: a
    text: Or 'Christ Jesus.' The Greek title Χριστός is rendered 'Messiah' here to preserve its meaning.
    reason: alternative_reading
  - marker: b
    text: '''Brothers'' may refer to fellow believers generally, including women, depending on context.'
    reason: cultural_note
  - marker: c
    text: Or 'the words of faith'; 'the faith' likely refers to the recognized content of Christian belief.
    reason: lexical_alternative
translation:
  language: ko
  text: 그대가 이러한 것들을 형제자매들[b] 앞에 제시한다면, 그대가 따라온 믿음의 말씀과 선한 가르침[c]으로 양육받는 메시아[a] 예수의 좋은 일꾼이 될 것입니다.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 또는 「그리스도」. 본 번역은 칭호의 무게를 살려 「메시아」로 옮긴다.
    reason: alternative_reading
  - marker: b
    text: 「형제자매」는 헬라어 ἀδελφοί의 일반적 의미로, 문맥에 따라 여자를 포함한 동료 신자 전체를 가리킬 수 있다.
    reason: cultural_note
  - marker: c
    text: 또는 「믿음의 말씀」 그 자체. 「그 믿음」은 그리스도교 신앙의 정립된 내용을 가리키는 것으로 보인다.
    reason: lexical_alternative
lexical_decisions:
- source_word: Ταῦτα ὑποτιθέμενος
  english_pob_choice: By putting these things before
  chosen_korean: 이러한 것들을 ~ 앞에 제시한다면
  alternatives_korean:
  - 이런 것들을 ~에게 일깨워 준다면
  - 이러한 것들을 ~에게 알려 준다면
  lexicon: BDAG
  rationale: ὑποτίθημι의 「제시하다·알려 주다」 어감.
- source_word: τοῖς ἀδελφοῖς
  english_pob_choice: the brothers
  chosen_korean: 형제자매들
  alternatives_korean:
  - 형제들
  - 동료 신자들
  lexicon: BDAG
  rationale: ἀδελφοί의 공동체 전체(여자 포함) 어감을 「형제자매」로 옮긴다.
- source_word: καλὸς ἔσῃ διάκονος Χριστοῦ Ἰησοῦ
  english_pob_choice: you will be a good servant of Messiah Jesus
  chosen_korean: 메시아 예수의 좋은 일꾼이 될 것입니다
  alternatives_korean:
  - 메시아 예수의 선한 종이 될 것입니다
  - 그리스도 예수의 훌륭한 일꾼이 될 것입니다
  lexicon: BDAG
  rationale: διάκονος의 일반적 「섬기는 자」를 본 절에서는 직무가 아니라 디모데의 사역적 정체성으로 보아 「일꾼」으로 옮긴다(3:8 「집사」와 구분).
- source_word: ἐντρεφόμενος τοῖς λόγοις τῆς πίστεως
  english_pob_choice: being nourished by the words of the faith
  chosen_korean: 믿음의 말씀과 ~으로 양육받는
  alternatives_korean:
  - 신앙의 말씀으로 자라난
  lexicon: BDAG
  rationale: ἐντρέφομαι의 「양육·자라남」을 「양육받다」로 옮긴다.
- source_word: τῆς καλῆς διδασκαλίας ᾗ παρηκολούθηκας
  english_pob_choice: the good teaching that you have followed
  chosen_korean: 선한 가르침
  alternatives_korean:
  - 좋은 교훈
  - 선한 교훈
  lexicon: BDAG
  rationale: διδασκαλία를 1:3·1:10 일관으로 「가르침」.
