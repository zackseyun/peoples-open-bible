  - marker: b
    text: O, «daré hombres a cambio de ti, y pueblos en lugar de tu vida». El verbo hebreo puede leerse con fuerza futura en este contexto profético.
    reason: lexical_alternative
  revision_rationale: Se ajusta «honrado» a «estimado» para reflejar mejor el sentido de ser tenido en honor en español natural, y «en trueque por ti» a «a cambio de ti» para expresar la sustitución de manera más idiomática y clara, manteniendo la decisión léxica documentada por la POB inglesa.
