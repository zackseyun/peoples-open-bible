revisions:
- from: Y aconteció[a] que, cuando Moisés descendía del monte Sinaí con las dos tablas del testimonio en la mano de Moisés, mientras descendía del monte[b], Moisés no sabía que la piel de su rostro resplandecía[c] porque había hablado con él[d].
  to: Y aconteció[a] que, cuando Moisés descendió del monte Sinaí con las dos tablas del testimonio en la mano de Moisés, al bajar del monte, Moisés no sabía que la piel de su rostro resplandecía[b] porque había hablado con él[c][d].
  rationale: Se ajustó la sintaxis española para reflejar mejor el marco temporal del hebreo con una formulación más natural («descendió ... al bajar»), y se restauró la nota fuente importante sobre la ambigüedad temporal/causal de בְּדַבְּרוֹ. También se reordenaron los anclajes de notas para que correspondan exactamente a los puntos relevantes del texto.
