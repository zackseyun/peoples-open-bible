lexical_decisions:
- source_word: וַיֹּאמֶר
  english_pob_choice: And he said
  chosen_spanish: Y dijo
  alternatives_spanish:
  - Entonces dijo
  - Y les dijo
  lexicon: HALOT
  rationale: La forma narrativa wayyiqtol se reproduce con una secuencia simple en español. «Y dijo» conserva el flujo del relato sin añadir una relación temporal más fuerte que la del hebreo.
- source_word: בָּנָיו
  english_pob_choice: his sons
  chosen_spanish: sus hijos
  alternatives_spanish:
  - sus hijos varones
  - sus hijos
  lexicon: HALOT
  rationale: Aunque el hebreo es masculino plural, en español «hijos» puede funcionar de modo natural para hijos varones sin forzar una expresión arcaica. Mantiene la referencia familiar del contexto y evita una redundancia incómoda con «hijos varones».
- source_word: חִבְשׁוּ לִי הַחֲמוֹר
  english_pob_choice: Saddle the donkey for me
  chosen_spanish: Aparéjenme el asno
  alternatives_spanish:
  - Ensíllenme el asno
  - Atenme el asno para mí
  lexicon: HALOT
  rationale: חבש aquí expresa preparar el animal para montar, no literalmente «vendar». «Aparar» comunica bien la acción de dejar listo el animal en español; «asno» conserva el término bíblico para חמור y evita un registro demasiado coloquial.
- source_word: הַחֲמוֹר
  english_pob_choice: the donkey
  chosen_spanish: el asno
  alternatives_spanish:
  - el burro
  - el asno
  lexicon: HALOT
  rationale: «Asno» es un equivalente directo y bíblico para חמור. Aunque «burro» es posible, «asno» preserva mejor el registro literario del pasaje.
- source_word: וַיַּחְבְּשׁוּ לוֹ הַחֲמוֹר
  english_pob_choice: So they saddled the donkey for him
  chosen_spanish: Y ellos le aparejaron el asno
  alternatives_spanish:
  - Y le ensillaron el asno
  - Y aparejaron el asno para él
  lexicon: HALOT
  rationale: Se mantiene el mismo campo léxico que en el mandato, pero en español «le aparejaron» fluye con naturalidad y conserva la idea de cumplir la orden. «Le» refleja el dativo hebreo לוֹ.
- source_word: וַיִּרְכַּב עָלָיו
  english_pob_choice: and he rode on it
  chosen_spanish: y montó sobre él
  alternatives_spanish:
  - y cabalgó sobre él
  - y se montó sobre él
  lexicon: HALOT
  rationale: «Montó sobre él» expresa de forma natural la acción de montar un animal. El pronombre masculino «él» conserva el referente gramatical del hebreo, aunque en español también podría entenderse como una referencia al animal.
translation_notes:
  revision_awareness: El texto hebreo es breve y narrativo, y el inglés POB no introduce diferencias textuales ni tensiones teológicas. La revisión más relevante está en la elección de vocabulario español para חבש / חמור y en cómo reflejar el pronombre final de forma idiomática sin perder la referencia del original.
  spanish_consistency_notes:
  - Se usó «asno» de forma consistente para חמור, en línea con un registro bíblico claro y sobrio.
  - Se evitó «SEÑOR» u otras convenciones no presentes en el versículo.
  - La nota al pie conserva la alternativa formal documentada por el POB inglés, adaptada al español.
  - No se añadió puntuación explicativa fuera de lo que requiere la fluidez narrativa del verso.
