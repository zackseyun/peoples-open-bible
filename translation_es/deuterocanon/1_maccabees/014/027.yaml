translation:
  language: es
  text: 'Y esta es la copia del escrito: el dieciocho de Elul[a], en el año ciento setenta y dos, y este fue el tercer año bajo Simón, el sumo sacerdote,'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «la copia de la escritura». El griego puede traducirse más literalmente como «escritura» o «escrito», pero aquí se refiere a un texto oficial por escrito.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀντίγραφον
  english_pob_choice: copy
  chosen_spanish: copia
  alternatives_spanish:
  - duplicado
  - transcripción
  lexicon: LSJ
  rationale: ἀντίγραφον designa un ejemplar o copia de un escrito. «Copia» es natural en español y conserva el valor documental del término sin sobreinterpretarlo.
- source_word: γραφῆς
  english_pob_choice: writing
  chosen_spanish: escritura
  alternatives_spanish:
  - escrito
  - escritura oficial
  - documento
  lexicon: LSJ
  rationale: Aquí γραφή no significa «Escritura» en sentido bíblico, sino un escrito/registro oficial. «Escritura» mantiene la cercanía léxica y funciona en este contexto administrativo.
- source_word: Ὀκτωκαιδεκάτῃ
  english_pob_choice: eighteenth
  chosen_spanish: el dieciocho
  alternatives_spanish:
  - el día dieciocho
  - a los dieciocho
  lexicon: LSJ
  rationale: 'La fecha en español se expresa con número cardinal en una fórmula natural: «el dieciocho de Elul». Refleja el ordinal griego sin sonar forzado.'
- source_word: Ἐλοὺλ
  english_pob_choice: Elul
  chosen_spanish: Elul
  alternatives_spanish:
  - Elúl
  lexicon: LSJ
  rationale: Los nombres de mes se transliteran. Se conserva el calendario judío del texto fuente.
- source_word: ἔτους δευτέρου ἑβδομηκοστοῦ καὶ ἑκατοστοῦ
  english_pob_choice: in the one hundred seventy-second year
  chosen_spanish: en el año ciento setenta y dos
  alternatives_spanish:
  - en el año ciento setenta y dos
  - en el año ciento setenta y segundo
  lexicon: LSJ
  rationale: La fórmula griega expresa un año absoluto de era. En español, «en el año ciento setenta y dos» es claro y fiel; no se impone un ordinal artificial donde el patrón idiomático es cardinal.
- source_word: τοῦτο τρίτον ἔτος
  english_pob_choice: this was the third year
  chosen_spanish: este fue el tercer año
  alternatives_spanish:
  - y este era el tercer año
  - y este fue el año tercero
  lexicon: LSJ
  rationale: La construcción explicativa se vierte de forma finita y natural en español. «Tercer año» conserva la relación cronológica con el gobierno de Simón.
- source_word: ἐπὶ Σίμωνος
  english_pob_choice: under Simon
  chosen_spanish: bajo Simón
  alternatives_spanish:
  - en tiempo de Simón
  - durante Simón
  lexicon: LSJ
  rationale: ἐπί con genitivo en fórmulas de datación indica la época o el período de una autoridad. «Bajo Simón» reproduce bien esa relación temporal y administrativa.
- source_word: τοῦ ἀρχιερέως
  english_pob_choice: the high priest
  chosen_spanish: el sumo sacerdote
  alternatives_spanish:
  - el alto sacerdote
  - el jefe de los sacerdotes
  lexicon: LSJ
  rationale: ἀρχιερεύς es el título técnico judío de «high priest». En español, «sumo sacerdote» es la equivalencia estable, precisa y reverente.
theological_decisions:
- issue: Naturaleza de γραφή en este aviso cronológico
  english_pob_reading: writing
  chosen_spanish_reading: escritura
  alternative_spanish_readings:
  - escrito
  - documento
  rationale: Aunque el término puede ser traducido como «escrito» o «documento», el contexto aquí es un aviso formal sobre una copia de un texto oficial. «Escritura» conserva la referencia cercana al original sin sugerir indebidamente «Escritura» en sentido canónico bíblico.
  doctrine_reference: Principio de primacía del texto fuente y de conservación de la ambigüedad léxica cuando el contexto la resuelve.
translation_notes:
  revision_awareness: El pasaje griego y el contexto auditado coinciden en un registro administrativo-cronológico. La elección española sigue de cerca la formulación del original, conserva la datación judía (Elul) y evita introducir una paráfrasis que suavice el valor documental de ἀντίγραφον y γραφῆς.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma del proyecto cuando corresponda, pero este versículo no contiene el nombre divino.
  - «Sumo sacerdote» se usa por ser el título técnico español para ἀρχιερεύς.
  - La nota al pie se ancla en «Elul» para reflejar la alternativa léxica sobre γραφή sin recargar el texto principal.
