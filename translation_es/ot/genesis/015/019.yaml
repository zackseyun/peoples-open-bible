translation:
  language: es
  text: los ceneos, los cenezeos y los cadmoneos[a]—
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebreo קַדְמֹנִי (qadmoni) está relacionado con 'oriente' o 'oriental'; aquí se vierte como nombre étnico 'cadmoneos' porque aparece en una lista de pueblos.
    reason: lexical_alternative
lexical_decisions:
- source_word: אֶת
  english_pob_choice: '[not translated separately]'
  chosen_spanish: '[no se traduce de forma separada]'
  lexicon: HALOT
  rationale: En hebreo marca el objeto directo y no tiene equivalente independiente en español; se refleja sintácticamente dentro de la serie de nombres sin añadir una palabra artificial.
- source_word: הַקֵּינִי
  english_pob_choice: the Kenites
  chosen_spanish: los queneos
  alternatives_spanish:
  - los kenitas
  - los queneos
  lexicon: HALOT
  rationale: Se trata de un etnónimo colectivo con artículo; en español es natural expresarlo en plural. Se elige 'queneos' para reflejar el nombre étnico como grupo, manteniendo la fuerza de nombre propio.
- source_word: הַקְּנִזִּי
  english_pob_choice: the Kenizzites
  chosen_spanish: los quenizitas
  alternatives_spanish:
  - los kenezitas
  - los quenizitas
  lexicon: HALOT
  rationale: También es un etnónimo colectivo en una lista de pueblos. El plural español comunica mejor el grupo humano que una forma singular.
- source_word: הַקַּדְמֹנִי
  english_pob_choice: the Kadmonites
  chosen_spanish: los kadmonitas
  alternatives_spanish:
  - los orientales
  - los habitantes del oriente
  - los kadmonitas
  lexicon: HALOT
  rationale: Aunque el raíz se relaciona con 'este/oriente', en este contexto funciona como nombre étnico en paralelo con los demás. Se conserva la forma propia transliterada en plural para no diluir la lista de pueblos.
translation_notes:
  revision_awareness: El texto hebreo y el audit trail inglés muestran una simple lista de tres pueblos con etnónimos colectivos. No hay revisiones aplicadas ni tensiones textuales relevantes en esta unidad; por eso la versión española conserva la estructura nominal y una nota solo para el último término, donde existe la alternativa semántica del campo 'este/oriente'.
  spanish_consistency_notes:
  - Se mantiene el plural para los tres etnónimos, en paralelo con el inglés POB y con el uso colectivo del hebreo.
  - Se evita traducir el marcador אֶת como palabra independiente.
  - Se conserva el guion final largo en conformidad con el cierre abrupto del verso en el texto fuente.
