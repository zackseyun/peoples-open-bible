    text: O «desafiar» o «burlarse de» al Dios vivo.
    reason: lexical_alternative
  revision_rationale: 'Se aprueba el texto base con una reparación menor del aparato crítico: se elimina la nota secundaria sobre ''oído/oreja'' y se añade la nota léxica pertinente sobre לְחָרֵף, en línea con el audit trail inglés. No se requiere cambio sustantivo de redacción.'
