translation:
  language: es
  text: 'Pero yo dije: «En vano he trabajado; he consumido mi fuerza para vaciedad y vanidad. Sin embargo, ciertamente mi justicia[a] está con Yahvé, y mi recompensa[b] está con mi Dios».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «mi causa» o «mi vindicación».
    reason: lexical_alternative
  - marker: b
    text: O «mi retribución» o «mi salario».
    reason: lexical_alternative
lexical_decisions:
- source_word: לְרִיק
  english_pob_choice: in vain
  chosen_spanish: en vano
  alternatives_spanish:
  - para nada
  - sin resultado
  - vacíamente
  lexicon: HALOT
  rationale: לְרִיק expresa la idea de algo sin efecto o sin resultado. «En vano» es la equivalencia española más natural y fiel al tono de lamento del verso, y preserva bien la revisión inglesa que volvió a una formulación más directa del paralelismo.
- source_word: יָגַעְתִּי
  english_pob_choice: I have labored
  chosen_spanish: he trabajado
  alternatives_spanish:
  - he fatigado
  - me he fatigado trabajando
  - he toilado
  lexicon: HALOT
  rationale: El verbo yָגַע comunica esfuerzo intenso hasta el cansancio. En español, «he trabajado» transmite bien el hecho de haber empleado esfuerzo sostenido sin sonar forzado; el matiz de agotamiento queda reforzado por el contexto y por «he consumido mi fuerza».
- source_word: לְתֹהוּ וְהֶבֶל
  english_pob_choice: for emptiness and vanity
  chosen_spanish: para vaciedad y vanidad
  alternatives_spanish:
  - para vacío y vapor
  - para nulidad y fugacidad
  - para desolación y vanidad
  lexicon: HALOT
  rationale: Se preserva la pareja hebrea con dos términos distintos. «תֹהוּ» apunta a vaciedad, desorden o falta de realidad efectiva; «הֶבֶל» a vapor, fugacidad y vanidad. «Vaciedad y vanidad» mantiene esa distinción mejor que una sola paráfrasis general.
- source_word: כֹּחִי כִלֵּיתִי
  english_pob_choice: I have spent my strength
  chosen_spanish: he consumido mi fuerza
  alternatives_spanish:
  - he agotado mi fuerza
  - he gastado mi fuerza
  - he malgastado mi fuerza
  lexicon: HALOT
  rationale: כִלֵּיתִי con כוחי expresa la fuerza como algo gastado o consumido. «He consumido mi fuerza» conserva la imagen de energía agotada por el esfuerzo y corresponde bien al uso intensivo del verbo.
- source_word: אָכֵן
  english_pob_choice: Yet surely
  chosen_spanish: Sin embargo, ciertamente
  alternatives_spanish:
  - Pero ciertamente
  - No obstante, ciertamente
  - Sin duda
  lexicon: HALOT
  rationale: 'אָכֵן introduce un giro fuerte de contraste con la queja anterior y una afirmación de confianza. «Sin embargo, ciertamente» refleja ambos matices: oposición y convicción.'
- source_word: מִשְׁפָּטִי
  english_pob_choice: my justice
  chosen_spanish: mi justicia
  alternatives_spanish:
  - mi causa
  - mi vindicación
  - mi juicio
  lexicon: HALOT
  rationale: Se mantiene «justicia» para conservar la amplitud semántica del hebreo sin resolverla prematuramente en una sola lectura legal. En este contexto incluye la idea de causa justa/vindicación ante Dios, pero el texto hebreo permite sostener la tensión.
- source_word: אֶת יְהוָה
  english_pob_choice: with Yahweh
  chosen_spanish: con Yahvé
  alternatives_spanish:
  - junto a Yahvé
  - en poder de Yahvé
  - ante Yahvé
  lexicon: HALOT
  rationale: La construcción comunica que la causa del hablante está depositada o resguardada junto a Dios. Conforme al estándar del proyecto, יְהוָה se rinde como «Yahvé» en el texto principal, sin mascarlo como «SEÑOR».
- source_word: וּפְעֻלָּתִי
  english_pob_choice: my reward
  chosen_spanish: mi recompensa
  alternatives_spanish:
  - mi paga
  - mi retribución
  - mi salario
  lexicon: HALOT
  rationale: פְעֻלָּה puede aludir a trabajo, paga, recompensa o retribución. «Mi recompensa» preserva el sentido de lo esperado y recibido de Dios, y encaja con el paralelismo del verso.
- source_word: אֶת אֱלֹהָי
  english_pob_choice: with my God
  chosen_spanish: está con mi Dios
  alternatives_spanish:
  - está junto a mi Dios
  - está en manos de mi Dios
  - viene de mi Dios
  lexicon: HALOT
  rationale: Como en la primera mitad del versículo, la idea es de custodia o pertenencia relacional más que de simple movimiento. «Está con mi Dios» mantiene el paralelismo y no introduce una dirección que el hebreo no exige.
theological_decisions:
- issue: Renderización del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - SEÑOR
  rationale: El hebreo usa el Tetragrámaton directamente. Para el español del proyecto, la forma establecida es «Yahvé», que preserva el nombre del pacto y evita la sustitución reverencial por un título.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Sentido de מִשְׁפָּטִי en la voz del siervo
  english_pob_reading: my justice
  chosen_spanish_reading: mi justicia
  alternative_spanish_readings:
  - mi causa
  - mi vindicación
  - mi juicio
  rationale: El verso expresa la confianza del siervo en que su caso justo permanece con Dios. «Mi justicia» conserva la amplitud del término y no aplana la tensión entre causa, rectitud y vindicación.
  doctrine_reference: DOCTRINE.md §3 Preserve theological tension rather than resolve it
translation_notes:
  revision_awareness: La redacción sigue de cerca la revisión más reciente del audit trail inglés, especialmente el retorno de «in vain» para לְרִיק y la conservación de la tensión semántica en מִשְׁפָּטִי. También respeta la decisión teológica actual de traducir יְהוָה como «Yahvé» en el texto principal.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» conforme al estándar del proyecto para יְהוָה.
  - Se preservó el paralelismo con dos miembros negativos («en vano» / «para vaciedad y vanidad») y dos afirmaciones de pertenencia («con Yahvé» / «con mi Dios»).
  - «Justicia» se usó de forma deliberadamente amplia para no eliminar la posible lectura de causa o vindicación.
  - El tono es sobrio y literario, evitando calcos excesivamente anglófonos o fórmula eclesiástica tradicional que no surge del hebreo.
