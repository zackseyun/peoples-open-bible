translation:
  language: es
  text: Yahvé me retribuyó conforme a mi justicia[a], conforme a mi limpieza delante de sus ojos[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «rectitud». El hebreo צדקה puede abarcar justicia, rectitud o derecho moral.
    reason: lexical_alternative
  - marker: b
    text: Es decir, «a su vista» o «en su presencia».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּשֶׁב
  english_pob_choice: repaid
  chosen_spanish: retribuyó
  alternatives_spanish:
  - pagó
  - recompensó
  - retribuyó
  lexicon: HALOT
  rationale: El hebreo expresa idea de retribución/repago divino. En español, «retribuyó» conserva el valor de correspondencia sin sonar tan comercial como «pagó» ni tan interpretativo como «recompensó». Frente a un calco como «devolvió», mantiene naturalidad y la relación de requital.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - SEÑOR
  - Jehová
  lexicon: doctrinal name rendering
  rationale: Se sigue la convención POB para el Tetragrámaton como nombre propio divino transliterado. «Yahvé» preserva el nombre personal revelado a Israel y evita la sustitución por un título.
- source_word: כְּצִדְקָתִי
  english_pob_choice: according to my righteousness
  chosen_spanish: conforme a mi justicia
  alternatives_spanish:
  - según mi justicia
  - conforme a mi rectitud
  - según mi rectitud
  lexicon: HALOT
  rationale: צדקה puede abarcar justicia, rectitud o righteousness. En español, «justicia» es la opción más natural y suficientemente amplia para mantener la tensión moral/covenantal del texto. «Conforme a» conserva el valor comparativo de כְּ.
- source_word: כְּבֹרִי
  english_pob_choice: according to my cleanness
  chosen_spanish: conforme a mi limpieza
  alternatives_spanish:
  - conforme a mi pureza
  - conforme a mi limpieza ritual
  lexicon: HALOT
  rationale: בֹּר aquí comunica limpieza/pureza. «Limpieza» es la forma más directa y no introduce un matiz ritual que el verso no explicita. «Pureza» es posible, pero menos concreta en español contemporáneo.
- source_word: לְנֶגֶד עֵינָיו
  english_pob_choice: before his eyes
  chosen_spanish: delante de sus ojos
  alternatives_spanish:
  - en su presencia
  - a su vista
  lexicon: HALOT
  rationale: 'La imagen hebrea es concreta: «ante/sobre frente a sus ojos». «Delante de sus ojos» conserva el paralelismo imagético con el inglés auditado y sigue siendo idiomático en español. Se evita suavizarlo a «en su vista» por sonar más abstracto.'
theological_decisions:
- issue: Afirmación de justicia y limpieza atribuida a David
  english_pob_reading: Retain the straightforward first-person claim without softening or doctrinal qualification.
  chosen_spanish_reading: Mantener la afirmación en primera persona sin atenuarla ni explicarla dentro del versículo.
  alternative_spanish_readings:
  - interpretar como justicia relativa del pacto
  - parafrasear para evitar la tensión con los pecados de David
  rationale: El hebreo afirma de forma directa que Yahvé retribuyó a David conforme a su justicia y limpieza. La traducción debe preservar esa tensión teológica en vez de resolverla en el texto principal. La posible lectura de integridad del pacto o de vindicación en un caso concreto pertenece a la interpretación, no a una paráfrasis traductora.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: 'La redacción sigue el estado revisado más reciente del POB inglés: conserva la conjunción inicial, mantiene el paralelismo de dos cláusulas con «conforme a», y evita expandir el verso más allá de la evidencia hebrea.'
  spanish_consistency_notes:
  - Se usa «Yahvé» de manera consistente para יְהוָה.
  - Se mantiene la distinción entre «justicia» y «limpieza» para reflejar dos lexemas hebreos distintos.
  - La puntuación reproduce el paralelismo del original con una coma entre las dos medidas de retribución.
  - Los marcadores de nota aparecen solo en las palabras con ambigüedad léxica real.
