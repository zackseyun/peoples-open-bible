translation:
  language: es
  text: Te daré gracias para siempre, porque has hecho esto; esperaré por tu nombre, porque es bueno[a], delante de tus fieles.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «porque tu nombre es bueno».'
    reason: alternative_reading
lexical_decisions:
- source_word: אוֹדְךָ
  english_pob_choice: I will give thanks to you
  chosen_spanish: Te daré gracias
  alternatives_spanish:
  - Te alabaré
  - Te daré gracias y alabaré
  lexicon: HALOT
  rationale: El hifil de ידה expresa agradecer y también alabar. En español, «dar gracias» comunica de manera natural la respuesta agradecida a la acción de Dios, sin perder la posibilidad de alabanza implícita.
- source_word: לְעוֹלָם
  english_pob_choice: forever
  chosen_spanish: para siempre
  alternatives_spanish:
  - por siempre
  - eternamente
  lexicon: HALOT
  rationale: עוֹלָם denota duración continua. «Para siempre» es la forma más idiomática y clara en español moderno para conservar el sentido de permanencia.
- source_word: כִּי
  english_pob_choice: because
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  lexicon: HALOT
  rationale: La primera כִּי introduce la base de la gratitud. «Porque» expresa con claridad la relación causal en español.
- source_word: עָשִׂיתָ
  english_pob_choice: you have done it
  chosen_spanish: has hecho esto
  alternatives_spanish:
  - has actuado
  - has obrado
  lexicon: HALOT
  rationale: 'עשה es amplio: hacer, obrar, actuar. El objeto implícito del hebreo se explicita de modo natural con «esto», evitando una frase incompleta en español y manteniéndose cerca del sentido del texto.'
- source_word: וַאֲקַוֶּה
  english_pob_choice: I will wait
  chosen_spanish: esperaré
  alternatives_spanish:
  - esperaré con confianza
  - aguardaré
  lexicon: HALOT
  rationale: קוה puede significar esperar con confianza o esperar en esperanza. «Esperaré» conserva el verbo y el tono expectante; la lectura de confianza queda en el contexto y se resguarda en la decisión teológica/nota.
- source_word: שִׁמְךָ
  english_pob_choice: your name
  chosen_spanish: tu nombre
  alternatives_spanish:
  - tu reputación
  - tu nombre revelado
  lexicon: HALOT
  rationale: En hebreo, «nombre» puede referirse al carácter revelado de la persona. Se conserva la forma literal «tu nombre» para mantener el idioma bíblico y su carga teológica.
- source_word: כִּי טוֹב
  english_pob_choice: for it is good
  chosen_spanish: porque es bueno
  alternatives_spanish:
  - porque tu nombre es bueno
  - pues es bueno
  lexicon: HALOT
  rationale: El hebreo es breve y algo elíptico. «Porque es bueno» conserva la tersura del verso y deja abierta la referencia implícita al nombre de Dios, como en la base hebrea.
- source_word: נֶגֶד
  english_pob_choice: in the presence of
  chosen_spanish: delante de
  alternatives_spanish:
  - en presencia de
  - ante
  lexicon: HALOT
  rationale: נגד indica estar delante, en presencia o a la vista de. «Delante de» es natural en español y preserva la idea pública/comunitaria del acto.
- source_word: חֲסִידֶיךָ
  english_pob_choice: your faithful ones
  chosen_spanish: tus fieles
  alternatives_spanish:
  - tus piadosos
  - tus santos
  lexicon: HALOT
  rationale: חסידִים designa a los leales/piadosos del pacto. «Tus fieles» comunica bien la lealtad devota sin cargar el término con el uso eclesiástico técnico de «santos».
theological_decisions:
- issue: Cómo traducir חֲסִידֶיךָ sin imponer una categoría eclesial posterior
  english_pob_reading: your faithful ones
  chosen_spanish_reading: tus fieles
  alternative_spanish_readings:
  - tus santos
  - tus devotos
  rationale: El término señala a los leales de Dios dentro del pueblo del pacto. «Tus fieles» mantiene esa referencia sin desplazarla a una categoría teológica posterior que podría sugerir otro marco doctrinal.
  doctrine_reference: Relación pacto-comunidad en el Salterio; consistencia terminológica POB
- issue: Si explicitar que «bueno» se refiere al nombre de Dios
  english_pob_reading: for it is good
  chosen_spanish_reading: porque es bueno
  alternative_spanish_readings:
  - porque tu nombre es bueno
  - pues tu nombre es bueno
  rationale: El hebreo deja la frase compacta y algo elíptica. La línea principal conserva esa tersura, sin sobreexplicar; la alternativa explícita se preserva en nota como lectura posible.
  doctrine_reference: Principio de no eliminar tensiones léxicas y sintácticas del original
- issue: 'La fuerza de וַאֲקַוֶּה: esperar o esperar con esperanza'
  english_pob_reading: I will wait for your name
  chosen_spanish_reading: esperaré tu nombre
  alternative_spanish_readings:
  - esperaré en tu nombre
  - esperaré con esperanza tu nombre
  rationale: «Esperaré» refleja más directamente el verbo. En español, el matiz de confianza/esperanza puede oírse en el contexto y no requiere reemplazar el verbo por una explicación interpretativa.
  doctrine_reference: Consistencia con el valor verbal de קוה y la revisión auditada
translation_notes:
  revision_awareness: El texto inglés auditado osciló entre «I will hope in your name» y «I will wait for your name» por la revisión del valor de קוה; la versión española sigue la decisión final de preservar el verbo de espera, pero mantiene en nota la alternativa de esperanza. También se conservó la ambigüedad de טוב, dejando la lectura explícita del antecedente en nota.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como término predeterminado en el proyecto cuando aparezca el tetragrámaton; aquí no ocurre.
  - Se usa «fieles» para חֲסִידֶיךָ en coherencia con el valor de lealtad del pacto y con el inglés POB «faithful ones».
  - «Para siempre» traduce לְעוֹלָם de forma idiomática y reverente en español.
  - La puntuación conserva dos miembros principales unidos por punto y coma, reflejando la estructura poética breve del hebreo.
