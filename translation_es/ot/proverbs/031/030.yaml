revisions:
- from: Engañosa es la gracia[a], y vana es la hermosura[b]; pero la mujer que teme a Yahvé será alabada[c].
  to: Engañoso es el encanto, y la belleza[a] es pasajera; pero la mujer[b] que teme a Yahvé será alabada[c].
  rationale: Se corrigen los anclajes de notas para que correspondan al término fuente pertinente, se ajusta הַחֵן a «encanto» para seguir mejor la decisión auditada y evitar ambigüedad con «gracia», y se cambia «vana» por «pasajera» para reflejar la elección principal de הֶבֶל como transitoriedad, dejando la imagen más literal «vapor» en nota.
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T22:15:49Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador transmite bien la estructura y el sentido general del hebreo: contrasta el atractivo externo con la mujer que teme a Yahvé, y preserva correctamente יְהוָה como «Yahvé» y תִתְהַלָּל como pasivo principal «será alabada». Sin embargo, hay desajustes en la gestión de notas y una elección léxica principal que no sigue tan fielmente la decisión auditada: הַחֵן aquí se documentó como «charm», y en español «encanto» es más preciso que «gracia», que puede sugerir gracia teológica o donaire ambiguo.'
  spanish_quality_summary: 'El español es legible y digno, pero las notas están ancladas incorrectamente: [a] aparece sobre «gracia» aunque la nota trata de הֶבֶל/«vapor, fugacidad»; [b] aparece sobre «hermosura» aunque la nota trata de אִשָּׁה/«mujer, esposa»; [c] aparece al final, lo cual sí corresponde al verbo final. Además, «vana es la hermosura» suena tradicional pero menos claro y menos alineado con la decisión documentada que «la belleza es pasajera».'
  glossary_alignment: 'Alineación buena en «Yahvé», «mujer» y «será alabada». Mejorable en הַחֵן: el proyecto auditó «charm», y «encanto» encaja mejor que «gracia» en español contemporáneo eclesial neutral. Para הֶבֶל, «pasajera» refleja mejor la decisión principal «fleeting», mientras que «vana» puede reservarse a la nota como alternativa más literal/tradicional.'
  issues:
  - severity: high
    issue: Las notas [a] y [b] están ancladas a palabras equivocadas.
    rationale: La nota a explica la imagen de הֶבֶל aplicada a la belleza, no הַחֵן/«gracia». La nota b explica la ambigüedad de אִשָּׁה («mujer/esposa»), no «hermosura». Esto rompe la trazabilidad del audit trail.
  - severity: medium
    issue: «gracia» para הַחֵן es menos preciso que «encanto» en este contexto.
    rationale: Aunque «gracia» puede funcionar en registro bíblico, el audit trail eligió «charm» por atractivo externo/winsomeness. «Encanto» evita confusión con gracia teológica y suena natural en español neutral.
  - severity: medium
    issue: «vana es la hermosura» no refleja tan bien la decisión principal auditada para הֶבֶל.
    rationale: La decisión inglesa principal fue «fleeting», con «vapor» preservado en nota. En español, «la belleza es pasajera» comunica con más claridad la transitoriedad, mientras la nota puede conservar «vapor»/vaciedad como alternativa.
  revised_spanish_text: Engañoso es el encanto, y la belleza[a] es pasajera; pero la mujer[b] que teme a Yahvé será alabada[c].
  revised_footnotes:
  - marker: a
    text: O, más literalmente, «la belleza es vapor»; la imagen hebrea puede destacar tanto la transitoriedad como la vaciedad.
    reason: lexical_alternative
