translation:
  language: es
  text: 'Hoy llegué al manantial[a] y dije: «Yahvé, Dios de mi señor Abraham, si ahora estás haciendo prosperar mi camino[b] por el que voy—»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «el pozo». El hebreo עָיִן denota más específicamente una fuente de agua o manantial.
    reason: lexical_alternative
  - marker: b
    text: Hebreo «mi camino»; aquí se refiere al viaje o misión del siervo.
    reason: lexical_alternative
lexical_decisions:
- source_word: וָאָבֹא הַיּוֹם
  english_pob_choice: Today I came
  chosen_spanish: Hoy llegué
  alternatives_spanish:
  - Y llegué hoy
  - Llegué este día
  lexicon: HALOT
  rationale: El hebreo expresa una acción pasada con énfasis temporal en הַיּוֹם. En español, «Hoy llegué» conserva esa inmediatez natural y sigue de cerca el valor adverbial de «today» sin calco innecesario.
- source_word: הָעָיִן
  english_pob_choice: the spring
  chosen_spanish: el manantial
  alternatives_spanish:
  - el pozo
  - la fuente
  lexicon: HALOT
  rationale: עַיִן designa más propiamente una fuente de agua o manantial. En este contexto, el español «manantial» refleja mejor el matiz lexical que «pozo», aunque «pozo» sea tradicional en la narrativa bíblica.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  lexicon: HALOT
  rationale: Se conserva el nombre divino del Tetragrámaton como «Yahvé», conforme al criterio del proyecto para preservar el nombre propio en vez de sustituirlo por un título.
- source_word: אֱלֹהֵי אֲדֹנִי אַבְרָהָם
  english_pob_choice: God of my master Abraham
  chosen_spanish: Dios de mi amo Abraham
  alternatives_spanish:
  - Dios de mi señor Abraham
  - Dios de mi maestro Abraham
  lexicon: HALOT
  rationale: אֲדֹנִי aquí se refiere a la relación de siervo con Abraham, no a un título divino. «Amo» preserva la fuerza relacional y evita suavizar el vínculo a «señor» o «maestro».
- source_word: אִם יֶשְׁךָ נָּא מַצְלִיחַ
  english_pob_choice: if now you are prospering
  chosen_spanish: si ahora estás prosperando
  alternatives_spanish:
  - si te ruego que prosperes
  - si estás haciendo prosperar
  lexicon: HALOT
  rationale: La construcción es una súplica compacta. «Si ahora estás prosperando» mantiene la forma petitoria sin explicitar más de lo que el hebreo dice; «ahora» puede reflejar el valor de נָּא en esta invocación.
- source_word: דַּרְכִּי
  english_pob_choice: my way
  chosen_spanish: mi camino
  alternatives_spanish:
  - mi manera
  - mi senda
  lexicon: HALOT
  rationale: El hebreo dice literalmente «mi camino»; aunque el contexto es un viaje/encargo, el poseído debe conservarse. «Mi camino» refleja mejor el paralelismo con el texto fuente que «mi viaje».
- source_word: אֲשֶׁר אָנֹכִי הֹלֵךְ עָלֶיהָ
  english_pob_choice: on which I am going
  chosen_spanish: por el cual voy
  alternatives_spanish:
  - en el que voy
  - que estoy siguiendo
  lexicon: HALOT
  rationale: 'La expresión hebrea es idiomática: «caminar sobre» algo equivale a emprender un curso o ruta. «Por el cual voy» suena natural en español y conserva la idea de una trayectoria o misión en curso.'
theological_decisions:
- issue: Renderizar el Nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Jehová
  rationale: Se mantiene la transliteración del Nombre propio divino, según la línea editorial del proyecto, para no ocultar el Tetragrámaton detrás de una sustitución litúrgica.
  doctrine_reference: 'DOCTRINE.md: יְהוָה / YHWH'
- issue: Relación entre Abraham y el hablante en אֱלֹהֵי אֲדֹנִי אַבְרָהָם
  english_pob_reading: God of my master Abraham
  chosen_spanish_reading: Dios de mi amo Abraham
  alternative_spanish_readings:
  - Dios de mi señor Abraham
  - Dios de mi maestro Abraham
  rationale: La elección de «amo» conserva la relación de subordinación del siervo y evita atenuar el matiz social del hebreo. No se trata de un título reverencial aplicado a Abraham en este contexto, sino de una relación de pertenencia/servicio.
  doctrine_reference: 'DOCTRINE.md: δοῦλος / slave vs. servant terminology'
translation_notes:
  revision_awareness: La revisión inglesa más reciente volvió de «the journey» a «my way» para reflejar con mayor precisión דַּרְכִּי. La línea española sigue esa corrección conservando el posesivo («mi camino») y, al mismo tiempo, mantiene el valor idiomático del hebreo con una expresión natural («por el cual voy»).
  spanish_consistency_notes:
  - Se usa «Yahvé» para יְהוָה de forma consistente con el proyecto.
  - Se conserva «amo» para אֲדֹנִי en este contexto de siervo, en vez de «señor», por fidelidad lexical.
  - «Manantial» se prefiere aquí por el valor más específico de עָיִן, aunque «pozo» permanece como alternativa válida en nota.
  - Se mantiene la puntuación con raya final para reflejar que el enunciado hebreo continúa sin clausura en el versículo.
