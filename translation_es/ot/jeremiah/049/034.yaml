translation:
  language: es
  text: 'La palabra de Yahvé que vino a Jeremías el profeta acerca de Elam[a], al comienzo del reinado de Sedequías, rey de Judá, diciendo:'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'contra Elam'. La preposición hebrea puede introducir un oráculo dirigido a una nación y, según el contexto, puede verterse como 'acerca de' o 'contra'.
    reason: alternative_reading
lexical_decisions:
- source_word: דְבַר יְהוָה
  english_pob_choice: The word of Yahweh
  chosen_spanish: la palabra de Yahvé
  alternatives_spanish:
  - el mensaje de Yahvé
  lexicon: HALOT
  rationale: En la fórmula profética, דָּבָר introduce una revelación u oráculo; en español, 'palabra' conserva la fórmula tradicional y el peso solemne del enunciado. Se mantiene 'Yahvé' para reflejar el nombre divino sin sustituirlo por un título.
- source_word: הָיָה
  english_pob_choice: came
  chosen_spanish: vino
  alternatives_spanish:
  - fue
  - sucedió
  lexicon: HALOT
  rationale: Aunque literalmente puede ser 'fue/estuvo', en esta construcción profética la equivalencia natural en español es 'vino', que expresa la llegada de la palabra de Yahvé al profeta sin rigidizar la sintaxis.
- source_word: אֲשֶׁר
  english_pob_choice: that
  chosen_spanish: que
  alternatives_spanish:
  - el cual
  - la cual
  lexicon: HALOT
  rationale: Es un relativo simple de enlace; 'que' es la forma idiomática y sobria en español.
- source_word: אֶל יִרְמְיָהוּ הַנָּבִיא
  english_pob_choice: to Jeremiah the prophet
  chosen_spanish: a Jeremías el profeta
  alternatives_spanish:
  - a Jeremías, el profeta
  lexicon: HALOT
  rationale: אֶל marca destinatario; 'a' conserva ese valor. Se mantiene el título apposicional 'el profeta' para reflejar el hebreo y la función de la identificación.
- source_word: אֶל עֵילָם
  english_pob_choice: concerning Elam
  chosen_spanish: acerca de Elam
  alternatives_spanish:
  - contra Elam
  - sobre Elam
  lexicon: HALOT
  rationale: En encabezamientos proféticos, אֶל con nombre de nación puede leerse como 'acerca de' o 'contra'. 'Acerca de' preserva la cautela semántica del POB en inglés y no decide de antemano el matiz de hostilidad que se desplegará en el oráculo.
- source_word: עֵילָם
  english_pob_choice: Elam
  chosen_spanish: Elam
  lexicon: HALOT
  rationale: Nombre propio transliterado de manera estándar.
- source_word: בְּרֵאשִׁית
  english_pob_choice: at the beginning of
  chosen_spanish: al comienzo de
  alternatives_spanish:
  - al principio de
  lexicon: HALOT
  rationale: La frase temporal marca el inicio del reinado; 'al comienzo de' es natural en español y conserva el valor inicial sin sonar arcaico.
- source_word: מַלְכוּת
  english_pob_choice: the reign of
  chosen_spanish: el reinado de
  alternatives_spanish:
  - la realeza de
  - el reino de
  lexicon: HALOT
  rationale: Aquí el sustantivo apunta al período del gobierno real, no al territorio. 'Reinado' es la equivalencia más precisa en español.
- source_word: צִדְקִיָּה מֶלֶךְ יְהוּדָה
  english_pob_choice: Zedekiah king of Judah
  chosen_spanish: Sedequías, rey de Judá
  alternatives_spanish:
  - Sedequías rey de Judá
  lexicon: HALOT
  rationale: Se sigue la forma española establecida del nombre propio y la aposición regia. La coma facilita la lectura en español sin alterar la relación sintáctica.
- source_word: לֵאמֹר
  english_pob_choice: 'saying:'
  chosen_spanish: 'diciendo:'
  alternatives_spanish:
  - 'así diciendo:'
  lexicon: HALOT
  rationale: La partícula introduce la palabra citada; 'diciendo:' es la equivalencia directa y transparente en español.
theological_decisions:
- issue: Renderización del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - SEÑOR
  rationale: La política del proyecto en español pide transliterar el Tetragrámaton como 'Yahvé' en el texto principal. Esto preserva el nombre personal de Dios sin sustituirlo por un título en mayúsculas, y mantiene coherencia con la línea auditable del POB.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Valor de אֶל con un destinatario nacional en el encabezamiento
  english_pob_reading: concerning Elam
  chosen_spanish_reading: acerca de Elam
  alternative_spanish_readings:
  - contra Elam
  - a Elam
  rationale: El POB inglés dejó abierta la tensión entre un oráculo 'concerning' y uno 'against'. 'Acerca de' conserva esa ambigüedad controlada en español y evita endurecer el sentido antes de leer el resto del oráculo.
  doctrine_reference: Jeremiah oracle headings; Hebrew preposition אֶל in prophetic superscriptions
translation_notes:
  revision_awareness: El registro inglés auditado muestra alta concordancia y sin revisiones aplicadas; por tanto, el borrador español sigue de cerca la lectura estable del POB, manteniendo la única tensión interpretativa relevante en אֶל עֵילָם mediante nota.
  spanish_consistency_notes:
  - Se usa 'Yahvé' de forma consistente para el nombre divino, conforme al estándar del proyecto en español.
  - '''Reinado'' se reserva aquí para מַלְכוּת en sentido temporal, evitando ''reino'' por su posible lectura territorial.'
  - Se conserva la aposición 'Jeremías el profeta' y 'Sedequías, rey de Judá' para reflejar la estructura nominal del hebreo con puntuación natural en español.
  - La nota al pie se ancla solo en 'acerca de Elam' para reflejar la alternativa textual/semántica del hebreo sin duplicar marcadores.
