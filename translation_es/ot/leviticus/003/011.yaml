review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura básica del hebreo: sujeto sacerdotal, quema sacrificial sobre el altar, idiomática de לֶחֶם y dedicación a Yahvé. Sin embargo, la redacción española introduce dos problemas: duplica con ''como ... como'' una construcción que en el original funciona de manera más compacta, y ''ofrenda encendida'' no representa con suficiente precisión el tecnicismo cultual de אִשֶּׁה, que en este contexto conviene expresar como ''ofrenda hecha por fuego'' o equivalente más transparente.'
  spanish_quality_summary: 'El texto es legible, pero suena algo forzado por la repetición de ''como''. Además, la nota [a] está mal anclada: corresponde al sintagma ''alimento'' o a la expresión cultual, no a ''sobre el altar''. Una leve revisión mejora fidelidad y naturalidad sin perder dignidad.'
  glossary_alignment: 'Se cumple correctamente Yahvé para יהוה y sacerdote para כֹּהֵן. ''Alimento'' para לֶחֶם está bien justificado con nota. La principal desalineación terminológica está en אִשֶּׁה: ''ofrenda encendida'' es menos clara que ''ofrenda hecha por fuego'', que preserva mejor la decisión léxica auditada en inglés.'
  issues:
  - severity: medium
    issue: Anclaje incorrecto de la nota [a]
    rationale: La nota explica el hebreo 'pan de una ofrenda encendida' y la función idiomática de לֶחֶם, pero el marcador aparece en 'altar' en vez de en 'alimento' o la frase cultual pertinente.
  - severity: medium
    issue: '''Ofrenda encendida'' traduce de manera imprecisa אִשֶּׁה'
    rationale: El término técnico sacrificial apunta a una ofrenda presentada por fuego; 'encendida' puede sonar a estado físico más que a categoría ritual. 'Ofrenda hecha por fuego' es más fiel y suficientemente natural.
  - severity: low
    issue: Repetición poco natural de 'como ... como'
    rationale: El hebreo no exige dos 'como'. En español, 'como alimento[a], una ofrenda hecha por fuego' fluye mejor y preserva la aposición cultual.
  - severity: low
    issue: Redacción mejorable de la nota textual
    rationale: La nota actual cita 'pan de una ofrenda encendida', pero la formulación más exacta y útil para el lector es 'pan de una ofrenda hecha por fuego'.
  revised_spanish_text: El sacerdote lo quemará sobre el altar, como alimento[a], una ofrenda hecha por fuego para Yahvé.
  revised_footnotes:
