id: JHN.1.33
reference: John 1:33
source:
  edition: SBLGNT
  text: κἀγὼ οὐκ ᾔδειν αὐτόν, ἀλλ’ ὁ πέμψας με βαπτίζειν ἐν ὕδατι ἐκεῖνός μοι εἶπεν· Ἐφ’ ὃν ἂν ἴδῃς τὸ πνεῦμα καταβαῖνον καὶ μένον ἐπ’ αὐτόν, οὗτός ἐστιν ὁ βαπτίζων ἐν πνεύματι ἁγίῳ·
translation:
  text: And I did not know him[a], but the one who sent me to baptize in water said to me, ‘The one on whom you see the Spirit descending and remaining on him[c][b], this is he who baptizes in the Holy Spirit.’
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'to baptize with water' ... 'baptizes with the Holy Spirit.' The Greek uses the same preposition ('in') in both phrases, and the main text preserves that parallel.
    reason: lexical_alternative
  - marker: b
    text: Or 'did not recognize him.' The Greek can denote lack of acquaintance or lack of recognition in context.
    reason: lexical_alternative
  - marker: c
    text: '''Remaining'' translates a key Johannine verb often rendered ''abiding.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: κἀγὼ
  chosen: And I
  alternatives:
  - I also
  - And I also
  lexicon: BDAG
  rationale: The crasis joins καί + ἐγώ, giving an emphatic/continuative 'and I' or 'I also.' In context, 'And I' reads naturally in English while preserving the discourse connection and John's self-reference.
- source_word: οὐκ ᾔδειν
  chosen: did not know
  alternatives:
  - had not known
  - did not recognize
  lexicon: BDAG
  rationale: οἶδα in the imperfect here expresses prior lack of knowledge/recognition. 'Did not know' is the most direct rendering; 'recognize' is interpretive and therefore left as an alternative.
- source_word: αὐτόν
  chosen: him
  lexicon: BDAG
  rationale: Personal pronoun referring to Jesus; standard masculine singular object pronoun.
- source_word: ὁ πέμψας με
  chosen: the one who sent me
  alternatives:
  - he who sent me
  - the one having sent me
  lexicon: BDAG
  rationale: The substantival aorist participle is naturally rendered in English as 'the one who sent me.' This preserves the definite reference without archaic style.
- source_word: βαπτίζειν ἐν ὕδατι
  chosen: to baptize in water
  alternatives:
  - to baptize with water
  lexicon: BDAG
  rationale: The infinitive expresses purpose after 'sent me.' For ἐν ὕδατι, 'in water' is more formally aligned with the Greek and preserves the parallel with 'in the Holy Spirit' later in the verse; 'with water' is idiomatic but less consistent.
- source_word: ἐκεῖνός μοι εἶπεν
  chosen: said to me
  alternatives:
  - that one said to me
  lexicon: BDAG
  rationale: ἐκεῖνος is resumptive/emphatic, but English does not require repeating 'that one' here. The sense is preserved by the clause as a whole.
- source_word: Ἐφ’ ὃν ἂν ἴδῃς
  chosen: The one on whom you see
  alternatives:
  - Whoever it is that you see
  - He on whom you see
  lexicon: BDAG
  rationale: This construction introduces the identifying sign. 'The one on whom you see' is natural English and preserves the relative force without overcomplicating the syntax.
- source_word: τὸ πνεῦμα
  chosen: the Spirit
  alternatives:
  - the spirit
  lexicon: BDAG
  rationale: In Johannine context this refers to the Holy Spirit, as confirmed by the later phrase 'in the Holy Spirit.' Capitalization in English signals the personal divine referent without adding content absent from the text.
- source_word: καταβαῖνον
  chosen: descending
  alternatives:
  - coming down
  lexicon: BDAG
  rationale: The participle denotes downward movement. 'Descending' is slightly more formal and matches the revelatory sign language of the passage.
- source_word: καὶ μένον
  chosen: and remaining
  alternatives:
  - and staying
  - and abiding
  lexicon: BDAG
  rationale: μένω is a significant Johannine verb often rendered 'remain' or 'abide.' 'Remaining' is chosen for accessible modern English while preserving Johannine verbal consistency better than 'staying.' 'Abiding' is possible but more traditional/churchly.
- source_word: ἐπ’ αὐτόν
  chosen: on him
  alternatives:
  - upon him
  lexicon: BDAG
  rationale: Simple prepositional phrase indicating the Spirit's resting upon Jesus. 'On him' is idiomatic modern English.
- source_word: οὗτός ἐστιν
  chosen: this is
  alternatives:
  - this one is
  - he is
  lexicon: BDAG
  rationale: Demonstrative identification formula. 'This is' preserves the force of explicit identification.
- source_word: ὁ βαπτίζων
  chosen: the one who baptizes
  alternatives:
  - he who baptizes
  - the baptizer
  lexicon: BDAG
  rationale: The substantival present participle denotes characteristic action. 'The one who baptizes' is clear and preserves the ongoing/defining sense.
- source_word: ἐν πνεύματι ἁγίῳ
  chosen: in the Holy Spirit
  alternatives:
  - with the Holy Spirit
  - in Holy Spirit
  lexicon: BDAG
  rationale: As with 'in water,' ἐν is rendered 'in' for consistency and to preserve the parallelism of the verse. The article is supplied in English for naturalness and because the referent is definite. 'With the Holy Spirit' is common but less formally parallel to the Greek structure.
