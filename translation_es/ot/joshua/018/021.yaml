translation:
  language: es
  text: Y las ciudades que pertenecían a la tribu de los hijos de Benjamín, según sus clanes, fueron Jericó, Bet-Hogla y Émec-Queziz[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O posiblemente 'Valle de Queziz', si el nombre se entiende como un topónimo descriptivo más que como un nombre propio transliterado.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהָיוּ
  english_pob_choice: And ... were
  chosen_spanish: Y ... fueron
  alternatives_spanish:
  - Y ... eran
  - Y hubo
  lexicon: HALOT
  rationale: El verbo en contexto de lista de ciudades introduce una enumeración con valor copulativo en el español natural. 'Fueron' conserva la relación de pertenencia/listado sin forzar un existencial ajeno al hebreo.
- source_word: הֶעָרִים
  english_pob_choice: the cities
  chosen_spanish: las ciudades
  alternatives_spanish:
  - estas eran las ciudades
  - los pueblos
  lexicon: HALOT
  rationale: El sustantivo definido plural se traduce de forma directa y transparente. 'Ciudades' mantiene el alcance administrativo del reparto territorial.
- source_word: לְמַטֵּה
  english_pob_choice: belonging to the tribe of
  chosen_spanish: que pertenecían a la tribu de
  alternatives_spanish:
  - para la tribu de
  - de la tribu de
  lexicon: HALOT
  rationale: La ל de asignación en contextos de repartición territorial expresa pertenencia o adscripción. En español, 'que pertenecían a' comunica mejor esa relación que una preposición más ambigua.
- source_word: בְּנֵי בִנְיָמִן
  english_pob_choice: the sons of Benjamin
  chosen_spanish: los hijos de Benjamín
  alternatives_spanish:
  - los benjaminitas
  - la gente de Benjamín
  lexicon: HALOT
  rationale: Se conserva la expresión genealógica del hebreo. 'Hijos de Benjamín' es más transparente que una etnónimo más libre y mantiene la forma del texto fuente.
- source_word: לְמִשְׁפְּחֹתֵיהֶם
  english_pob_choice: according to their clans
  chosen_spanish: según sus clanes
  alternatives_spanish:
  - según sus familias
  - por sus familias
  lexicon: HALOT
  rationale: En repartos tribales, מִשְׁפָּחָה denota una subdivisión menor que 'familia' en español general; 'clanes' preserva mejor la estructura socioterritorial.
- source_word: יְרִיחוֹ
  english_pob_choice: Jericho
  chosen_spanish: Jericó
  alternatives_spanish:
  - Jericó
  lexicon: HALOT
  rationale: Se usa la forma castellana estable del topónimo.
- source_word: בֵית חָגְלָה
  english_pob_choice: Beth-hoglah
  chosen_spanish: Bet‑Hogla
  alternatives_spanish:
  - Beth‑Hogla
  - Bet Hogla
  lexicon: HALOT
  rationale: Se translitera el nombre propio del lugar; 'Bet' refleja el componente בית sin calcarlo como 'casa' dentro del topónimo. La forma con guion responde al uso habitual en nombres compuestos.
- source_word: עֵמֶק קְצִיץ
  english_pob_choice: Emek-keziz
  chosen_spanish: Emec‑Queziz
  alternatives_spanish:
  - Valle de Queziz
  - Emek‑Queziz
  lexicon: HALOT
  rationale: Dado que el contexto del POB inglés trata esta secuencia como posible topónimo, se mantiene como nombre propio transliterado. 'Emec' conserva el valor formal de עֵמֶק dentro del topónimo, y 'Queziz' adapta la transliteración al español.
translation_notes:
  revision_awareness: El contexto de revisión indica alta concordancia y ausencia de cambios textuales respecto del tramo inglés auditado; por eso la versión española sigue de cerca la estructura de la fuente, con ajustes mínimos de naturalidad y una nota para la alternativa toponímica documentada.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' como norma general del proyecto, pero este versículo no contiene el nombre divino.
  - Se conserva la distinción entre topónimo transliterado y frase descriptiva en 'Emec‑Queziz' con nota alternativa.
  - Se usa 'clanes' para reflejar la unidad socioterritorial de מִשְׁפָּחָה en el contexto de reparto tribal.
