revisions:
- from: Cuando los hombres de Israel vieron que Abimelec había muerto[a], cada uno se fue a su lugar.
  to: Cuando los hombres de Israel vieron que Abimelec estaba muerto[a], cada uno se fue a su lugar.
  rationale: Se cambia «había muerto» por «estaba muerto» para reflejar con mayor precisión el valor estativo de מֵת, en línea con la justificación léxica documentada en el POB inglés. Se conserva «los hombres de Israel» y «cada uno ... a su lugar» por fidelidad al hebreo y a la filosofía de traducción. La nota se mantiene como apoyo al distributivo singular.
