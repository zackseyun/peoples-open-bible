translation:
  language: es
  text: Lo sepultaron[a], y todo Israel hizo duelo por él, conforme a la palabra de Yahvé, que había hablado por medio de su siervo Ahías el profeta.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «por mano de su siervo Ahías el profeta», un modismo que significa «por medio de su siervo Ahías el profeta».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּקְבְּרוּ
  english_pob_choice: They buried
  chosen_spanish: Lo sepultaron
  alternatives_spanish:
  - Lo enterraron
  lexicon: HALOT
  rationale: El verbo קבר aquí describe el acto narrativo simple de dar sepultura. «Sepultar» conserva un registro digno y bíblico en español, equivalente a «bury» sin sonar arcaico. Se evita repetir una conjunción inicial innecesaria para fluidez española.
- source_word: אֹתוֹ
  english_pob_choice: him
  chosen_spanish: lo
  alternatives_spanish:
  - a él
  lexicon: HALOT
  rationale: Es un objeto directo masculino singular referido al difunto. «Lo» es la forma natural y concisa en español; mantiene el referente personal sin sobrecargar la frase.
- source_word: וַיִּסְפְּדוּ לוֹ
  english_pob_choice: mourned for him
  chosen_spanish: hicieron duelo por él
  alternatives_spanish:
  - lo lamentaron
  - lo plañieron
  lexicon: HALOT
  rationale: ספד denota duelo público y lamento fúnebre. «Hicieron duelo por él» expresa bien el sentido de luto comunitario sin reducirlo a mera tristeza privada ni forzar una imagen exclusivamente de llanto audible.
- source_word: כָּל יִשְׂרָאֵל
  english_pob_choice: all Israel
  chosen_spanish: todo Israel
  alternatives_spanish:
  - todo el Israel
  - la totalidad de Israel
  lexicon: HALOT
  rationale: La expresión colectiva se mantiene como totalidad nacional. «Todo Israel» es idiomático en español bíblico y conserva la amplitud del sujeto colectivo.
- source_word: כִּדְבַר יְהוָה
  english_pob_choice: according to the word of Yahweh
  chosen_spanish: conforme a la palabra de Yahvé
  alternatives_spanish:
  - según la palabra de Yahvé
  - de acuerdo con la palabra de Yahvé
  lexicon: HALOT
  rationale: כִּדְבַר expresa conformidad con lo dicho. «Conforme a la palabra de Yahvé» preserva la fórmula profética de cumplimiento y mantiene el nombre divino según la convención del proyecto.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahveh
  - el SEÑOR
  lexicon: HALOT
  rationale: El Tetragrámaton se vierte como el nombre propio «Yahvé», siguiendo la política del proyecto de no sustituirlo por un título. Se prefiere la grafía «Yahvé» por su uso extendido y legibilidad en español.
- source_word: אֲשֶׁר דִּבֶּר
  english_pob_choice: that he had spoken
  chosen_spanish: que había hablado
  alternatives_spanish:
  - que habló
  - que él habló
  lexicon: HALOT
  rationale: El relativo remite a la palabra ya pronunciada antes del evento narrado. El pluscuamperfecto «había hablado» aclara la anterioridad temporal implícita en la secuencia narrativa española.
- source_word: בְּיַד
  english_pob_choice: through
  chosen_spanish: por medio de
  alternatives_spanish:
  - por la mano de
  - mediante
  lexicon: HALOT
  rationale: La expresión hebrea es un idiomа de agencia mediada. «Por medio de» comunica naturalmente la intermediación profética sin perder el matiz instrumental de la frase original.
- source_word: עַבְדּוֹ
  english_pob_choice: his servant
  chosen_spanish: su siervo
  alternatives_spanish:
  - su esclavo
  - su servidor
  lexicon: HALOT
  rationale: En fórmulas proféticas y de servicio divino, «siervo» preserva la relación de comisión y fidelidad. «Esclavo» sería demasiado fuerte en español para este contexto y podría oscurecer la función profética.
- source_word: אֲחִיָּהוּ
  english_pob_choice: Ahijah
  chosen_spanish: Ahías
  alternatives_spanish:
  - Ajías
  lexicon: HALOT
  rationale: Se adopta la transliteración española común del nombre profético como «Ahías», más natural y reconocible en la tradición bíblica en español que la forma inglesa.
- source_word: הַנָּבִיא
  english_pob_choice: the prophet
  chosen_spanish: el profeta
  alternatives_spanish:
  - el nabi
  - el vidente
  lexicon: HALOT
  rationale: El título definido identifica a Ahías como profeta; se mantiene de forma directa y transparente en español.
theological_decisions:
- issue: Traducción del nombre divino יהוה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahveh
  - el SEÑOR
  rationale: La línea doctrinal del proyecto exige preservar el nombre propio del pacto. «Yahvé» mantiene la referencia al Tetragrámaton sin ocultarlo tras una sustitución titulativa.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Fórmula de mediación profética בְּיַד עַבְדּוֹ
  english_pob_reading: through his servant
  chosen_spanish_reading: por medio de su siervo
  alternative_spanish_readings:
  - por la mano de su siervo
  - mediante su siervo
  rationale: La frase debe conservar la idea de agencia mediada sin añadir interpretaciones doctrinales. «Por medio de» expresa de modo natural que la palabra de Yahvé llegó a través de Ahías.
  doctrine_reference: DOCTRINE.md Translation philosophy §1, §6
translation_notes:
  revision_awareness: 'El texto coincide sustancialmente con la lectura final auditada en inglés: se mantiene la estructura narrativa simple, la colectividad de Israel, la fórmula de cumplimiento profético y la mediación «por medio de». No se registran revisiones textuales relevantes en el expediente inglés, y la versión española sigue esa estabilidad sin introducir cambios interpretativos.'
  spanish_consistency_notes:
  - Se usa «Yahvé» de manera consistente para יהוה, conforme a la política del proyecto.
  - «Siervo» se reserva para la fórmula profética; no se emplea «esclavo» porque el contexto es de comisión ministerial.
  - «Hicieron duelo» conserva el matiz funerario comunitario de ספד sin exagerar vocalización específica.
  - La nota a pie de página marca la alternativa idiomática del hebreo para la mediación profética.
