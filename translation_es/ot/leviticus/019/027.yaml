translation:
  language: es
  text: No redondearán el cabello de los lados de la cabeza[a][b], ni dañarán los bordes de la barba[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «el borde del cabello»; el término hebreo puede significar «borde», «lado» o «esquina».
    reason: lexical_alternative
  - marker: b
    text: Probablemente se refiere a afeitar o recortar el cabello de los lados de la cabeza en forma redondeada.
    reason: cultural_note
  - marker: c
    text: O «dañar», «arruinar» o «desfigurar» los bordes de la barba.
    reason: lexical_alternative
lexical_decisions:
- source_word: תַקִּפוּ
  english_pob_choice: round off
  chosen_spanish: afeitarán en redondo
  alternatives_spanish:
  - recortarán en redondo
  - cortarían en círculo
  lexicon: HALOT
  rationale: El hebreo expresa un corte en forma circular alrededor del borde de la cabeza; «afeitarán en redondo» conserva la acción concreta y suena natural en español legal.
- source_word: פְּאַת
  english_pob_choice: side hair / edge
  chosen_spanish: el cabello de los lados
  alternatives_spanish:
  - las esquinas
  - el borde
  - el cabello lateral
  lexicon: HALOT
  rationale: פֵּאָה significa «borde», «lado» o «extremo». En la primera cláusula, «el cabello de los lados» hace explícito el referente capilar sin perder la noción de borde.
- source_word: רֹאשְׁכֶם
  english_pob_choice: your heads
  chosen_spanish: de la cabeza
  alternatives_spanish:
  - de sus cabezas
  - de su cabeza
  lexicon: HALOT
  rationale: Aunque el hebreo tiene plural posesivo, en español la referencia colectiva queda bien expresada con singular genérico («la cabeza») en un mandato legal dirigido al pueblo.
- source_word: תַשְׁחִית
  english_pob_choice: mar / ruin
  chosen_spanish: dañarán
  alternatives_spanish:
  - destruirán
  - desfigurarán
  - arruinarán
  lexicon: HALOT
  rationale: El verbo Hifil de שׁחת puede significar dañar, arruinar o destruir. «Dañarán» comunica el deterioro prohibido sin sonar excesivo para una barba.
- source_word: זְקָנֶךָ
  english_pob_choice: your beard
  chosen_spanish: su barba
  alternatives_spanish:
  - su barba
  - tu barba
  lexicon: HALOT
  rationale: El singular posesivo se mantiene como singular en español. Dado que el mandato es colectivo, «su barba» funciona como singular colectivo y mantiene el tono jurídico.
- source_word: לֹא ... וְלֹא
  english_pob_choice: You shall not ... and you shall not ...
  chosen_spanish: No se ... ni ...
  alternatives_spanish:
  - No harán ... ni harán ...
  - No deben ... ni deben ...
  lexicon: Grammar / covenant-law style
  rationale: La prohibición legal en español bíblico suena natural con futuro/mandato negativo impersonal («No se ...»), preservando el carácter normativo del hebreo.
theological_decisions:
- issue: Naturaleza concreta de la prohibición
  english_pob_reading: A concrete prohibition against specific hair and beard cutting practices, without importing a full explanation of motive into the main text.
  chosen_spanish_reading: Una prohibición concreta contra ciertas prácticas de corte o afeitado del cabello y la barba, sin insertar en el texto principal una explicación ampliada del motivo.
  alternative_spanish_readings:
  - Una prohibición ligada específicamente a ritos de duelo paganos
  - Una norma general contra estilos de arreglo asociados con las naciones vecinas
  rationale: El hebreo nombra las acciones prohibidas, pero no explicita aquí el motivo. Se preserva la concreción del mandato y se evita cargar el versículo con una interpretación que el texto no formula directamente.
  doctrine_reference: Translation philosophy §1, §3
translation_notes:
  revision_awareness: 'La redacción sigue la última revisión del POB inglés: «round off» pasó a una forma más natural en español («afeitarán en redondo»), y «mar the edges of your beard» se reflejó con «dañarán el borde de su barba», manteniendo la restricción concreta y el registro legal.'
  spanish_consistency_notes:
  - Se mantiene el tono jurídico con una prohibición impersonal en futuro/negativo.
  - «Barba» y «cabeza» se usan en singular genérico para expresar el mandato colectivo.
  - Los matices de פֵּאָה y שׁחת se preservan mediante notas para no perder la tensión léxica documentada.
