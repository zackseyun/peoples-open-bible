  text: And I will set my vengeance on Edom by the hand of my people Israel[a], and they will deal with Edom according to my anger and according to my wrath; and they will know my vengeance[c][b], declares the Lord GOD.
  footnotes:
  - marker: a
    text: Or 'against Edom' for 'on Edom.' The Hebrew preposition can be rendered either way in a hostile context.
    reason: lexical_alternative
  - marker: b
    text: Literally 'by the hand of my people Israel,' an idiom meaning 'through my people Israel.'
    reason: lexical_alternative
  - marker: c
    text: 'Or ''they will act against Edom.'' The Hebrew verb is broad: ''do, make, act.'''
    reason: lexical_alternative
