translation:
  language: es
  text: Pero no pienses que nuestra nación ha sido abandonada por Dios. Pero tú, resiste[a] y mira su gran poder, cómo te torturará a ti y a tu descendencia.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «persevera»; καρτέρει puede expresar firmeza, resistencia o perseverancia. Aquí se eligió «resiste» por el tono retórico del contexto.'
    reason: lexical_alternative
lexical_decisions:
- source_word: μὴ δόκει
  english_pob_choice: do not think
  chosen_spanish: no pienses
  alternatives_spanish:
  - no supongas
  - no imagines
  lexicon: LSJ
  rationale: El presente imperativo con μή funciona como prohibición directa. «No pienses» conserva el reproche inmediato y es natural en español contemporáneo.
- source_word: τὸ γένος ἡμῶν
  english_pob_choice: our nation
  chosen_spanish: nuestra nación
  alternatives_spanish:
  - nuestro pueblo
  - nuestra raza
  - nuestra estirpe
  lexicon: LSJ
  rationale: γένος puede significar linaje, estirpe, pueblo o grupo étnico. En este contexto martirial, se refiere al conjunto del pueblo judío; «nuestra nación» comunica bien ese sentido colectivo en español.
- source_word: ὑπὸ τοῦ θεοῦ καταλελεῖφθαι
  english_pob_choice: has been abandoned by God
  chosen_spanish: ha sido abandonada por Dios
  alternatives_spanish:
  - ha sido dejada por Dios
  - ha sido desamparada por Dios
  - ha sido desamparada/abandonada por Dios
  lexicon: LSJ
  rationale: El infinitivo perfecto expresa un estado resultante de haber sido dejado atrás. «Abandonada por Dios» reproduce con claridad la fuerza teológica de la afirmación y mantiene la pasiva.
- source_word: σὺ δὲ καρτέρει
  english_pob_choice: endure
  chosen_spanish: tú, resiste
  alternatives_spanish:
  - tú, persevera
  - tú, soporta
  - tú, mantente firme
  lexicon: LSJ
  rationale: καρτερέω puede abarcar permanecer firme, soportar y resistir. Dado que va seguido de θεώρει, aquí funciona como desafío retórico; «resiste» conserva ese tono exhortativo/taunt sin perder la idea de firmeza.
- source_word: θεώρει
  english_pob_choice: see
  chosen_spanish: mira
  alternatives_spanish:
  - ve
  - observa
  - contempla
  lexicon: LSJ
  rationale: θεωρέω implica mirar/observar. «Mira» es breve, idiomático y encaja con la secuencia imperativa.
- source_word: τὸ μεγαλεῖον αὐτοῦ κράτος
  english_pob_choice: his great power
  chosen_spanish: su gran poder
  alternatives_spanish:
  - su gran fuerza
  - el poder de su majestad
  - su majestuoso poder
  lexicon: LSJ
  rationale: μεγαλεῖον aporta la idea de grandeza/majestad y κράτος la de poder/fuerza. «Su gran poder» es una equivalencia sobria y fiel; evita sobrecargar el sintagma con una formulación más interpretativa.
- source_word: ὡς σὲ καὶ τὸ σπέρμα σου βασανιεῖ
  english_pob_choice: how it will torture you and your offspring
  chosen_spanish: cómo te torturará a ti y a tu descendencia
  alternatives_spanish:
  - cómo te atormentará a ti y a tu descendencia
  - cómo te afligirá a ti y a tu descendencia
  - cómo te torturará a ti y a tu linaje
  lexicon: LSJ
  rationale: βασανίζω en este contexto judicial/punitivo significa torturar o atormentar. «Torturará» conserva la fuerza del verbo. «Tu descendencia» traduce τὸ σπέρμα σου de manera natural, sin perder la referencia genealógica.
theological_decisions:
- issue: Sujeto implícito de βασανιεῖ
  english_pob_reading: The subject is the immediately preceding expression of God's power ('his majestic power'), rendered as 'it will torture you and your offspring.'
  chosen_spanish_reading: El sujeto inmediato puede entenderse como «su gran poder», de modo que la frase dice «cómo te torturará a ti y a tu descendencia».
  alternative_spanish_readings:
  - cómo te torturará Dios a ti y a tu descendencia
  - cómo te torturará su poder a ti y a tu descendencia
  rationale: El griego permite que τὸ μεγαλεῖον αὐτοῦ κράτος funcione como antecedente neutro singular del futuro βασανιεῖ. En español, el verbo con sujeto neutro no es natural, así que la redacción conserva la referencia al poder divino sin resolver del todo si el sujeto personal es Dios o su poder. Esto preserva la tensión textual documentada en la auditoría inglesa.
  doctrine_reference: Preservar la tensión teológica/documental sin eliminarla.
translation_notes:
  revision_awareness: La base inglesa revisó 'keep waiting' a 'endure' para καρτέρει, y 'his majestic power' a 'his great power'. La versión española sigue esa revisión con «resiste» y «su gran poder», pero mantiene el matiz retórico del contexto y la posibilidad interpretativa del sujeto de βασανιεῖ documentada en la auditoría.
  spanish_consistency_notes:
  - Se usa «Dios» para θεός conforme al criterio del proyecto.
  - Se conserva «nación» para γένος en sentido colectivo, no como biología o linaje doméstico.
  - «Descendencia» traduce σπέρμα de forma natural en español bíblico contemporáneo.
  - La puntuación separa las dos cláusulas con «Pero» para reflejar δέ en ambos miembros de la oración.
