translation:
  language: es
  text: Los que están cerca y los que están lejos de ti se burlarán de ti, manchada de nombre[a], llena de tumulto[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘impura en reputación’, ‘de nombre impuro’ o, más literalmente, ‘manchada de nombre’. La frase hebrea es compacta y puede aludir a la reputación contaminada de Jerusalén.
    reason: lexical_alternative
  - marker: b
    text: O ‘llena de confusión’, ‘llena de alboroto’ o ‘abundante en desorden’.
    reason: lexical_alternative
lexical_decisions:
- source_word: הַקְּרֹבוֹת
  english_pob_choice: those who are near
  chosen_spanish: los que están cerca
  alternatives_spanish:
  - los cercanos
  - los que están próximos
  lexicon: HALOT
  rationale: El adjetivo sustantivado en plural femenino se refiere a los pueblos o ciudades cercanos. En español, “los que están cerca” conserva el valor relacional y el paralelismo con el término opuesto.
- source_word: וְהָרְחֹקוֹת
  english_pob_choice: and those who are far
  chosen_spanish: y los que están lejos
  alternatives_spanish:
  - y los lejanos
  - y los que están apartados
  lexicon: HALOT
  rationale: Mantiene la pareja retórica cerca/lejos y el sentido espacial de separación desde Jerusalén.
- source_word: מִמֵּךְ
  english_pob_choice: from you
  chosen_spanish: de ti
  alternatives_spanish:
  - desde ti
  lexicon: HALOT
  rationale: El מן expresa separación; “de ti” es el español natural y conserva la referencia directa a la ciudad personificada.
- source_word: יִתְקַלְּסוּ
  english_pob_choice: will mock
  chosen_spanish: se burlarán de
  alternatives_spanish:
  - se mofarán de
  - se reirán de
  lexicon: HALOT
  rationale: El hitpael de קלס expresa burla o escarnio. “Se burlarán de” es idiomático y comunica bien la acción despectiva.
- source_word: בָךְ
  english_pob_choice: you
  chosen_spanish: de ti
  alternatives_spanish:
  - contra ti
  - a ti
  lexicon: HALOT
  rationale: Con el verbo de burlarse, el español prefiere un complemento con de/contra; “de ti” mantiene la relación directa sin forzar la sintaxis.
- source_word: טְמֵאַת
  english_pob_choice: defiled one
  chosen_spanish: manchada
  alternatives_spanish:
  - contaminada
  - impura
  lexicon: HALOT
  rationale: La forma construida funciona como descripción apposicional de la ciudad. “Manchada” conserva la idea de contaminación/impureza y suena natural en español para un reproche profético.
- source_word: הַשֵּׁם
  english_pob_choice: of name
  chosen_spanish: de nombre
  alternatives_spanish:
  - en nombre
  - de reputación
  lexicon: HALOT
  rationale: La expresión es comprimida y apunta a la fama o reputación. “De nombre” preserva la literalidad y deja visible la tensión semántica.
- source_word: רַבַּת
  english_pob_choice: full of
  chosen_spanish: llena de
  alternatives_spanish:
  - abundante en
  - plena de
  lexicon: HALOT
  rationale: Introduce la cualidad que sigue con sentido de abundancia. “Llena de” es la solución española más clara y cercana al valor constructo.
- source_word: הַמְּהוּמָה
  english_pob_choice: turmoil
  chosen_spanish: tumulto
  alternatives_spanish:
  - confusión
  - alboroto
  - desorden
  lexicon: HALOT
  rationale: El sustantivo puede expresar tumulto, confusión o desorden. “Tumulto” retiene la carga de agitación pública y encaja bien con el contexto de juicio y escarnio.
theological_decisions:
- issue: Cómo reflejar la frase comprimida טְמֵאַת הַשֵּׁם
  english_pob_reading: '"defiled of name" / appositional description of Jerusalem''s polluted reputation'
  chosen_spanish_reading: '"manchada de nombre" como descripción apposicional comprimida de la reputación de Jerusalén'
  alternative_spanish_readings:
  - '"de nombre manchado"'
  - '"cuya fama está manchada"'
  - '"manchada en reputación"'
  rationale: El hebreo es elíptico y la POB inglesa decidió no expandirlo demasiado. En español, “manchada de nombre” conserva la brevedad y la tensión semántica entre pureza ritual y reputación pública, sin añadir una explicación que no está en el texto.
  doctrine_reference: Translation philosophy §1, §3, §6
- issue: Si explicitar Jerusalén como destinataria
  english_pob_reading: keep second-person 'you' without adding 'Jerusalem' or 'city'
  chosen_spanish_reading: mantener el segundo singular (“ti”) sin añadir “Jerusalén” ni “ciudad”
  alternative_spanish_readings:
  - '"tú, Jerusalén"'
  - '"tú, ciudad"'
  rationale: El contexto inmediato ya identifica a la ciudad. Añadir el nombre aquí rompería la concisión del verso y excedería el alcance del hebreo.
  doctrine_reference: Translation philosophy §1, §6
translation_notes:
  revision_awareness: 'La redacción sigue de cerca la revisión más reciente del inglés POB: se evita una vocación explícita, se conserva la concisión de los epítetos y se mantiene el peso despectivo de la frase nominal comprimida. En español se optó por una solución natural (“manchada de nombre”) que preserva la ambigüedad controlada del original sin expandirla en paráfrasis.'
  spanish_consistency_notes:
  - Se conserva el tratamiento de segunda persona singular implícita para reflejar el hebreo.
  - “Tumulto” se usa de forma consistente para הַמְּהוּמָה, evitando suavizar el matiz de desorden agitado.
  - La elección “manchada” mantiene el campo semántico de impureza/defilement, coherente con la terminología POB de contaminación moral o ritual.
