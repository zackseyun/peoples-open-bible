translation:
  language: es
  text: 'Y dirán: «Porque abandonaron a Yahvé su Dios, que sacó a sus padres de la tierra de Egipto, y se aferraron a otros dioses, se postraron ante ellos y les sirvieron; por eso Yahvé trajo sobre ellos todo este desastre[a]»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «toda esta calamidad». El hebreo dice literalmente «todo este mal», pero aquí se refiere al desastre o calamidad traídos como juicio sobre ellos.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְאָמְרוּ
  english_pob_choice: And they will say
  chosen_spanish: Y dirán
  alternatives_spanish:
  - Y dirán entonces
  - Y dirán así
  lexicon: WLC / HALOT
  rationale: El hebreo introduce una respuesta reportada en forma futura/discursiva. «Dirán» conserva ese valor predictivo de la escena sin volverlo innecesariamente perifrástico en español.
- source_word: עַל אֲשֶׁר
  english_pob_choice: Because
  chosen_spanish: porque
  alternatives_spanish:
  - a causa de que
  - por cuanto
  lexicon: HALOT
  rationale: La construcción causal explica la razón del juicio. «Porque» es la forma más natural y fiel en español para esta relación causal.
- source_word: עָזְבוּ
  english_pob_choice: abandoned
  chosen_spanish: abandonaron
  alternatives_spanish:
  - dejaron
  - desertaron
  lexicon: HALOT
  rationale: «Abandonaron» transmite la idea de deserción del pacto mejor que «dejaron» y evita el tono arcaico de «desertaron».
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  - el SEÑOR
  lexicon: DOCTRINE.md Contested terms — יְהוָה / YHWH
  rationale: Se mantiene el nombre divino revelado, no un sustituto titulado. «Yahvé» es el equivalente español del criterio POB para el Tetragrámaton.
- source_word: אֱלֹהֵיהֶם
  english_pob_choice: their God
  chosen_spanish: su Dios
  alternatives_spanish:
  - su dios
  - sus Dios
  lexicon: HALOT
  rationale: Aquí el referente es Yahvé, por lo que el singular es necesario. En español, «su Dios» conserva esa relación de pacto sin introducir ambigüedad.
- source_word: הוֹצִיא ... מֵאֶרֶץ מִצְרַיִם
  english_pob_choice: brought their fathers out of the land of Egypt
  chosen_spanish: sacó a sus padres de la tierra de Egipto
  alternatives_spanish:
  - sacó a sus antepasados de la tierra de Egipto
  - los sacó de la tierra de Egipto
  lexicon: HALOT
  rationale: «Sacó» sigue de cerca el verbo causativo hebreo. «Sus padres» conserva el término genealógico masculino documentado por el texto y mantiene la fórmula del éxodo.
- source_word: אֲבֹתָם
  english_pob_choice: their fathers
  chosen_spanish: a sus padres
  alternatives_spanish:
  - a sus antepasados
  lexicon: HALOT
  rationale: El hebreo usa un plural masculino con fuerza genealógica. En español, «padres» mantiene esa forma sin neutralizarla; el complemento preposicional evita una repetición pesada.
- source_word: וַיַּחֲזִקוּ בֵּאלֹהִים אֲחֵרִים
  english_pob_choice: held fast to other gods
  chosen_spanish: se aferraron a otros dioses
  alternatives_spanish:
  - se mantuvieron firmes junto a otros dioses
  - se adhirieron a otros dioses
  lexicon: HALOT
  rationale: El hebreo expresa una adhesión deliberada. «Se aferraron» comunica la fuerza de la sujeción personal y cultual sin perder naturalidad en español.
- source_word: וַיַּעַבְדֻם
  english_pob_choice: served them
  chosen_spanish: les sirvieron
  alternatives_spanish:
  - los sirvieron
  - les rindieron culto
  lexicon: HALOT
  rationale: «Servir» preserva la distinción léxica respecto a la postración anterior. En este contexto puede implicar servicio cultual, pero el español debe conservar el verbo base sin sobrerresolverlo.
- source_word: הֵבִיא יְהוָה ... אֵת כָּל הָרָעָה הַזֹּאת
  english_pob_choice: therefore Yahweh brought all this disaster on them
  chosen_spanish: por eso Yahvé trajo sobre ellos todo este mal
  alternatives_spanish:
  - por eso Yahvé les trajo todo este desastre
  - por eso Yahvé hizo venir sobre ellos toda esta calamidad
  lexicon: HALOT
  rationale: «Trajo sobre ellos» reproduce la dirección del juicio. «Mal» refleja el sustantivo hebreo, dejando abierto que se trata de mal/calamidad en el plano del juicio histórico.
theological_decisions:
- issue: Nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Jehová
  - el SEÑOR
  rationale: El versículo usa explícitamente el Tetragrámaton; el proyecto POB lo translitera para no ocultar el nombre del pacto. La forma española estándar dentro de este marco es «Yahvé».
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Sentido de הָרָעָה הַזֹּאת
  english_pob_reading: all this disaster
  chosen_spanish_reading: todo este mal
  alternative_spanish_readings:
  - todo este desastre
  - toda esta calamidad
  rationale: En el contexto de juicio, el término apunta a calamidad sobrevenida, pero el hebreo dice literalmente «mal». La traducción principal conserva esa tensión semántica, mientras la nota aclara el valor de desastre/calamidad.
  doctrine_reference: HALOT; nota de la POB en inglés sobre רָעָה
- issue: Terminología para אֲבֹתָם
  english_pob_reading: their fathers
  chosen_spanish_reading: sus padres
  alternative_spanish_readings:
  - sus antepasados
  rationale: El texto hebreo es masculino plural y la tradición POB lo conserva por precisión lexical. En español, «padres» mantiene la referencia genealógica sin borrar la forma del original.
  doctrine_reference: DOCTRINE.md Translation philosophy §4
translation_notes:
  revision_awareness: 'Se siguió la última revisión auditada del inglés POB, que prefirió «held fast to» como una traducción más formal y consistente. En español se reflejó con «se aferraron a», manteniendo la progresión del texto: abandono de Yahvé, adhesión a otros dioses, postración y servicio, y luego el juicio divino.'
  spanish_consistency_notes:
  - Se conservó «Yahvé» para el nombre divino conforme al estándar del proyecto.
  - Se mantuvo el masculino plural genealógico en «padres», sin neutralización.
  - «Se aferraron» se eligió para reflejar la fuerza de adhesión del hebreo עָזַק/חזק con ב, evitando suavizarlo a una simple referencia mental o emocional.
  - «Mal» se deja en el texto principal por fidelidad al hebreo, con nota aclaratoria para su valor judicial en este contexto.
