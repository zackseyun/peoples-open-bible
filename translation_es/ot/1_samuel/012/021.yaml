translation:
  language: es
  text: Y no se aparten tras cosas sin valor[a], que no pueden beneficiar ni rescatar[b], porque no valen nada.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'También: “cosas vacías”, “cosas vanas” o “ídolos”. El hebreo tohu designa lo vacío, fútil o insustancial.'
    reason: lexical_alternative
  - marker: b
    text: O “salvar” o “librar”.
    reason: lexical_alternative
lexical_decisions:
- source_word: תָּסוּרוּ
  english_pob_choice: turn aside
  chosen_spanish: se aparten
  alternatives_spanish:
  - se desvíen
  - se aparten del camino
  lexicon: HALOT
  rationale: El verbo expresa desviar(se) o apartar(se) de una dirección correcta. En español, 'se aparten' conserva la idea de desviación y suena natural en un llamado exhortativo.
- source_word: אַחֲרֵי
  english_pob_choice: after
  chosen_spanish: tras
  alternatives_spanish:
  - después de
  - siguiendo a
  lexicon: HALOT
  rationale: '''Tras'' reproduce bien la idea relacional de ir detrás de algo, con un español más fluido que una calca rígida.'
- source_word: הַתֹּהוּ / תֹהוּ
  english_pob_choice: worthless things / worthless
  chosen_spanish: cosas sin valor
  alternatives_spanish:
  - cosas vanas
  - cosas vacías
  - cosas inútiles
  - cosas de nada
  lexicon: HALOT
  rationale: תֹהוּ denota vaciedad, futilidad o insustancialidad. 'Sin valor' comunica tanto la vacuidad como la inutilidad práctica sin identificar explícitamente 'ídolos' donde el hebreo aquí es más amplio.
- source_word: אֲשֶׁר לֹא יוֹעִילוּ
  english_pob_choice: that cannot profit
  chosen_spanish: que no pueden aprovechar
  alternatives_spanish:
  - que no benefician
  - que no pueden servir
  lexicon: HALOT
  rationale: '''Aprovechar'' en español transmite utilidad/beneficio y conserva el sentido funcional del verbo sin volverlo técnico o arcaizante.'
- source_word: וְלֹא יַצִּילוּ
  english_pob_choice: or deliver
  chosen_spanish: ni rescatar
  alternatives_spanish:
  - ni salvar
  - ni librar
  lexicon: HALOT
  rationale: El verbo incluye rescatar, librar o salvar. 'Rescatar' mantiene el sentido de sacar del peligro y evita cargar la frase con asociaciones teológicas posteriores que no están explícitas aquí.
- source_word: הֵמָּה
  english_pob_choice: they
  chosen_spanish: ellas
  alternatives_spanish:
  - ellos
  - éstas
  lexicon: HALOT
  rationale: El pronombre retoma las 'cosas' anteriores. 'Ellas' es la concordancia más natural en español con 'cosas' y preserva el referente colectivo.
theological_decisions:
- issue: Referente de 'cosas sin valor'
  english_pob_reading: A general reference to idols or empty objects of misplaced trust, rendered non-specifically as 'worthless things.'
  chosen_spanish_reading: Referencia general a objetos vacíos o falsos apoyos, sin explicitar 'ídolos' en el texto principal.
  alternative_spanish_readings:
  - ídolos
  - cosas vanas
  - cosas vacías
  rationale: El contexto sugiere falsas seguridades o ídolos, pero el hebreo usa un término más amplio para vaciedad e insustancialidad. Mantener la generalidad evita imponer una especificación que el texto no dice explícitamente.
  doctrine_reference: 'Principio de fidelidad semántica: no añadir especificidad doctrinal o interpretativa más allá del alcance léxico del original.'
translation_notes:
  revision_awareness: La revisión más reciente indicó alto acuerdo y no requirió cambios sustantivos; se mantuvo la lectura del hebreo con una formulación española más natural, preservando la repetición retórica de 'sin valor'.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' fuera de este versículo porque el hebreo aquí no contiene el nombre divino.
  - Se evitó 'Cristo' porque no hay lenguaje mesiánico en el versículo.
  - '''Sin valor'' se usa de manera consistente para תֹהוּ, preservando la repetición enfática del original.'
  - '''Rescatar'' traduce el matiz de libramiento sin sobrecargarlo con terminología doctrinal posterior.'
