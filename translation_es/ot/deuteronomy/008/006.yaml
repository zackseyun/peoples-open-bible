translation:
  language: es
  text: Por tanto,[a] guardarás los mandamientos de Yahvé tu Dios, andando en sus caminos y temiéndolo.[b]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «Y guardarás»; la conjunción hebrea puede leerse como coordinación simple, aunque aquí probablemente tiene un sentido inferencial por el contexto precedente.
    reason: lexical_alternative
  - marker: b
    text: «Temiéndolo» conserva el sentido de temor reverente ante Dios; alternativamente, «reverenciándolo».
    reason: lexical_alternative
lexical_decisions:
- source_word: וְשָׁמַרְתָּ
  english_pob_choice: So you shall keep
  chosen_spanish: Así que guardarás
  alternatives_spanish:
  - Y guardarás
  - Entonces guardarás
  - Por tanto, guardarás
  - Observarás
  lexicon: HALOT
  rationale: שׁמר en contexto de pacto expresa guardar/obedecer mandamientos. «Guardarás» conserva el valor normativo y «Así que» refleja la fuerza inferencial que el audit trail inglés marcó con «So», sin reducirlo a una mera suma coordinante.
- source_word: מִצְוֺת
  english_pob_choice: the commandments
  chosen_spanish: los mandamientos
  alternatives_spanish:
  - los preceptos
  - los mandatos
  - los mandamientos
  lexicon: HALOT
  rationale: El plural constructo de מִצְוָה señala obligaciones ordenadas por Dios. «Mandamientos» mantiene mejor el matiz pactal y jurídico que opciones más débiles como «mandatos» o «preceptos».
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  - Jehová
  lexicon: HALOT
  rationale: La instrucción del proyecto pide «Yahvé» como forma española principal para el Tetragrámaton. Se preserva el nombre propio del pacto y no se sustituye por un título.
- source_word: אֱלֹהֶיךָ
  english_pob_choice: your God
  chosen_spanish: tu Dios
  alternatives_spanish:
  - tu Dios
  lexicon: HALOT
  rationale: La forma con sufijo de segunda persona singular es posesiva directa. «Tu Dios» es la equivalencia natural y fiel en español.
- source_word: לָלֶכֶת
  english_pob_choice: walking
  chosen_spanish: andando
  alternatives_spanish:
  - caminando
  - andando
  lexicon: HALOT
  rationale: El infinitivo expresa el modo de guardar los mandamientos. «Andando» comunica el valor de desarrollo continuo y suena más natural en español bíblico contemporáneo que un calco como «caminando» o una perífrasis demasiado literal.
- source_word: בִּדְרָכָיו
  english_pob_choice: in his ways
  chosen_spanish: en sus caminos
  alternatives_spanish:
  - en sus sendas
  - según sus caminos
  - en sus vías
  lexicon: HALOT
  rationale: דֶּרֶךְ en este modismo alude a la conducta o modo de obrar divino. «Caminos» conserva la imagen bíblica estándar y es idiomático en español.
- source_word: וּלְיִרְאָה אֹתוֹ
  english_pob_choice: fearing him
  chosen_spanish: temiéndolo
  alternatives_spanish:
  - y temiéndolo
  - y reverenciándolo
  - y temiéndole
  lexicon: HALOT
  rationale: Se mantiene el verbo «temer» para no diluir la fuerza léxica de ירא. «Temiéndolo» conserva la tensión reverente del texto; «reverenciándolo» aclararía la devoción, pero suavizaría el temor bíblico que la POB inglesa decidió preservar.
theological_decisions:
- issue: Nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - Jehová
  rationale: La fuente hebrea contiene explícitamente el Tetragrámaton. En español, la forma editorial de este proyecto es «Yahvé», para preservar el nombre del pacto y evitar la sustitución por un título genérico.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Lenguaje de temor hacia Dios
  english_pob_reading: fearing him
  chosen_spanish_reading: temiéndolo
  alternative_spanish_readings:
  - reverenciándolo
  - teniéndole reverencia
  rationale: La decisión mantiene el verbo «temer» para reflejar ירא sin resolver la tensión teológica. En este contexto el temor es reverente, pero el texto sigue expresándolo como temor, no solo como respeto.
  doctrine_reference: DOCTRINE.md Translation philosophy §3, preserve theological tension rather than resolve it
translation_notes:
  revision_awareness: El inglés final revisado eliminó el «by» repetido y dejó «walking in his ways and fearing him» como forma más natural. La versión española sigue esa revisión con dos participios coordinados («andando... y temiéndolo») sin añadir marcadores innecesarios de modo.
  spanish_consistency_notes:
  - Se usa «Yahvé» de manera consistente para el Tetragrámaton, conforme al estándar del proyecto.
  - «Mandamientos» conserva el registro covenantal/jurídico del plural hebreo.
  - «Andando» y «temiéndolo» forman una coordinación de modo paralela al inglés auditado, evitando una paráfrasis explicativa.
  - No se introduce «Cristo» ni terminología eclesiástica ajena al versículo.
