  to: Cuando Josué y todo Israel vieron que la emboscada había capturado la ciudad y que el humo de la ciudad había subido[a], se volvieron y derribaron a los hombres de Hai.
  rationale: Se corrige la concordancia con el sujeto plural ('vieron') para reflejar fielmente el hebreo y el buen español. Se sustituye 'golpearon' por 'derribaron' para conservar mejor la fuerza militar de וַיַּכּוּ sin sobreinterpretar más allá del texto. La nota se mantiene con una formulación ligeramente más natural en español.
