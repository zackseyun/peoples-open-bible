  text: ὃς δʼ ἂν σκεπάσῃ τινα τῶν Ἰουδαίων ἀπὸ γεραιοῦ μέχρι νηπίου καὶ μέχρι ὑπομαστιγίων, ἐχθίσταις βασάνοις ὑποτυμπανισθήσεται πανοικίᾳ·
