translation:
  language: es
  text: En los labios de un hombre prudente se halla la sabiduría[a], pero la vara es para la espalda del que carece de entendimiento.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literalmente, “falto de corazón”, un modismo hebreo para decir que carece de sentido o entendimiento.
    reason: lexical_alternative
lexical_decisions:
- source_word: בְּ/שִׂפְתֵי
  english_pob_choice: On the lips of
  chosen_spanish: En los labios de
  alternatives_spanish:
  - Sobre los labios de
  - En boca de
  lexicon: HALOT
  rationale: El hebreo usa la preposición ב con “labios” para indicar el ámbito o la expresión del habla. “En los labios de” conserva la imagen y suena natural en español bíblico contemporáneo; “en boca de” sería más idiomático, pero desplaza la metáfora de la superficie de los labios.
- source_word: נָבוֹן
  english_pob_choice: a discerning man
  chosen_spanish: un hombre prudente
  alternatives_spanish:
  - un hombre entendido
  - una persona prudente
  - un hombre discernidor
  lexicon: HALOT
  rationale: נָבוֹן designa a alguien con entendimiento/discernimiento. “Prudente” comunica bien esa capacidad en proverbios en español y mantiene el tono sapiencial. Se conserva el masculino singular, como en el hebreo y en la decisión inglesa.
- source_word: תִּמָּצֵא
  english_pob_choice: is found
  chosen_spanish: se halla
  alternatives_spanish:
  - es encontrada
  - será hallada
  - se encuentra
  lexicon: HALOT
  rationale: El nifal imperfecto expresa aquí una verdad proverbial general, no un futuro estricto. “Se halla” reproduce bien el valor gnómico pasivo en español y evita un calco pesado.
- source_word: חָכְמָה
  english_pob_choice: wisdom
  chosen_spanish: sabiduría
  alternatives_spanish:
  - prudencia
  - entendimiento
  lexicon: HALOT
  rationale: Es el equivalente normal y fiel en Proverbios. No hay motivo contextual para variar el término.
- source_word: וְ/שֵׁבֶט
  english_pob_choice: but a rod
  chosen_spanish: pero la vara
  alternatives_spanish:
  - y la vara
  - mas la vara
  - pero un palo
  lexicon: HALOT
  rationale: La conjunción introduce un contraste fuerte entre el sabio y el insensato; “pero” expresa claramente el matiz adversativo. שֵׁבֶט puede ser “vara” o “cetro” según contexto; aquí, por el paralelismo con corrección/castigo, “vara” es la mejor opción.
- source_word: לְ/גֵו
  english_pob_choice: is for the back
  chosen_spanish: es para la espalda
  alternatives_spanish:
  - para la espalda
  - es para el cuerpo
  - es para el lomo
  lexicon: HALOT
  rationale: גֵו se refiere al dorso/espalda como lugar golpeado por la vara. “Espalda” es claro y natural para el lector moderno; “lomo” sería más tradicional, pero menos transparente.
- source_word: חֲסַר לֵב
  english_pob_choice: one who lacks sense
  chosen_spanish: del que carece de entendimiento
  alternatives_spanish:
  - del que carece de corazón
  - del hombre sin entendimiento
  - del falto de juicio
  lexicon: HALOT
  rationale: El hebreo dice literalmente “falto de corazón”, un modismo donde “corazón” es la sede del juicio y la comprensión. En español, “carece de entendimiento” comunica la fuerza idiomática sin perder el trasfondo semántico.
theological_decisions:
- issue: Modismo hebreo “falto de corazón” y su alcance antropológico sapiencial
  english_pob_reading: Literally, 'lacking heart,' a Hebrew idiom for lacking sense or understanding.
  chosen_spanish_reading: “carece de entendimiento” con la fuerza implícita de la idiomática hebrea “falto de corazón”
  alternative_spanish_readings:
  - “carece de corazón”
  - “no tiene juicio”
  - “le falta sentido”
  rationale: La nota debe conservar la tensión entre literalidad e idiomatización. En Proverbios, “corazón” no es solo emoción sino centro de discernimiento; por eso la traducción principal explicita el sentido, mientras la nota preserva la imagen hebrea.
  doctrine_reference: Antropología bíblica sapiencial; el corazón como sede del entendimiento y del juicio.
translation_notes:
  revision_awareness: 'El texto sigue el consenso alto del audit trail inglés y mantiene las decisiones clave: imagen de los labios, valor gnómico de la forma verbal, contraste adversativo con la vara y traducción idiomática de “lacking heart”. No se introdujeron cambios respecto al sentido base auditado.'
  spanish_consistency_notes:
  - Se mantuvo el singular genérico masculino (“un hombre”, “del que”) de acuerdo con el hebreo y la decisión inglesa.
  - “Vara” se eligió por su valor disciplinario/punitivo en el paralelismo sapiencial.
  - La nota al pie conserva la tensión literal/idiomática sin sustituir el sentido principal del verso.
  - Se evitó “Señor” u otros términos no presentes; no aplica nomenclatura divina en este versículo.
