revisions:
- from: No te apresures con tu boca[a], ni permita tu corazón darse prisa para sacar una palabra delante de Dios, porque Dios está en el cielo, y tú en la tierra. Por tanto, sean pocas tus palabras.
  to: No te apresures con tu boca[a], ni tu corazón se apresure a pronunciar palabra delante de Dios, porque Dios está en el cielo y tú en la tierra. Por tanto, sean pocas tus palabras.
  rationale: Se corrige una falla gramatical seria en la segunda cláusula y se mejora la naturalidad del español sin perder el sentido del hebreo ni la decisión teológica de mantener una referencia amplia a la palabra hablada delante de Dios. Se conserva la alternativa más literal en nota.
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T22:21:19Z'
review_pass:
  verdict: revise
  source_alignment_summary: El borrador refleja bien el sentido del hebreo y sigue la decisión de no restringir el versículo a votos. Conserva correctamente «boca», «corazón», «delante de Dios», el contraste cielo/tierra y la exhortación final a pocas palabras. La nota también preserva la alternativa léxica inglesa.
  spanish_quality_summary: 'La calidad general es buena, pero hay un problema gramatical importante: «ni permita tu corazón» no concuerda con la negación exhortativa previa ni suena natural; debe ser «ni tu corazón se apresure» o equivalente. Además, «sacar una palabra» es aceptable por literalidad, pero en español requiere una formulación más natural en la cláusula completa. Conviene ajustar la nota para español más idiomático («sacar palabras» no es habitual).'
  glossary_alignment: 'No hay conflicto con la terminología del proyecto: «Dios» es correcto para הָאֱלֹהִים; no aparecen Yahvé/Mesías/otros términos controlados. Se preserva adecuadamente «corazón» y no se introduce indebidamente «voto».'
  issues:
  - severity: high
    issue: Construcción verbal incorrecta en «ni permita tu corazón darse prisa»
    rationale: El hebreo tiene una segunda prohibición/jusivo negativo paralelo a la primera. En español, «ni permita tu corazón» resulta gramaticalmente defectuoso y semánticamente torpe; además cambia el foco a un corazón que permite algo, en vez de un corazón que se apresura.
  - severity: medium
    issue: Frase «sacar una palabra» demasiado literal en español corriente
    rationale: Aunque refleja bien לְהוֹצִיא דָבָר, en español la combinación completa suena forzada. Puede mantenerse el matiz concreto con «pronunciar palabra» o «proferir palabra», dejando la literalidad alternativa en nota si se desea.
  - severity: low
    issue: 'Redacción de la nota poco natural: «sacar la palabra delante de Dios»'
    rationale: En español no se habla de «sacar la palabra». La nota debe explicar la alternativa léxica con una formulación idiomática, por ejemplo «pronunciar una palabra» y «presentar/hablar palabras delante de Dios».
  revised_spanish_text: No te apresures con tu boca[a], ni tu corazón se apresure a pronunciar palabra delante de Dios, porque Dios está en el cielo y tú en la tierra. Por tanto, sean pocas tus palabras.
  revised_footnotes:
  - marker: a
    text: O «sacar una palabra»; en contexto esto puede incluir votos apresurados, pero el hebreo aquí habla de manera más amplia de pronunciar palabras delante de Dios.
    reason: lexical_alternative
