    rationale: La nota sigue bien la función adverbial de צֶדֶק, pero conviene simplificarla para no presentar dos equivalentes principales a la vez si el texto ya eligió «rectitud».
  revised_spanish_text: Porque has defendido mi justicia y mi causa[a]; te has sentado en el trono, juzgando con rectitud[b].
