translation:
  language: es
  text: Yahvé será rey sobre toda la tierra. En aquel día Yahvé será uno[a], y su nombre uno[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «Yahvé será solo» o «Yahvé será único»; el hebreo dice «uno», que puede expresar exclusividad o singularidad además de unidad.
    reason: lexical_alternative
  - marker: b
    text: O «y su nombre solo» o «y su nombre único».
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  - el SEÑOR
  lexicon: HALOT
  rationale: El texto hebreo usa el nombre propio divino YHWH, no un título. En español, el equivalente estandarizado del proyecto es «Yahvé», que preserva el nombre personal y evita la sustitución por un título como «el SEÑOR».
- source_word: לְמֶלֶךְ
  english_pob_choice: king
  chosen_spanish: rey
  alternatives_spanish:
  - como rey
  - para rey
  lexicon: HALOT
  rationale: La construcción con לְ expresa función o estado resultante; en español natural y fiel, «será rey» comunica mejor la realeza ejercida por Yahvé que una forma más literal pero menos idiomática.
- source_word: עַל כָּל הָאָרֶץ
  english_pob_choice: over all the earth
  chosen_spanish: sobre toda la tierra
  alternatives_spanish:
  - sobre toda la tierra
  - sobre el mundo entero
  lexicon: HALOT
  rationale: «Sobre» refleja la relación de dominio de עַל, y «toda la tierra» conserva el alcance global del hebreo en este contexto escatológico mejor que «la tierra» sin intensificador.
- source_word: בַּיּוֹם הַהוּא
  english_pob_choice: On that day
  chosen_spanish: En aquel día
  alternatives_spanish:
  - En ese día
  - Aquel día
  lexicon: HALOT
  rationale: La fórmula profética estándar se mantiene con un español bíblico claro y actual. «En aquel día» conserva el valor escatológico y la distancia deíctica del hebreo.
- source_word: אֶחָד
  english_pob_choice: one
  chosen_spanish: uno
  alternatives_spanish:
  - solo
  - único
  - uno solo
  lexicon: HALOT
  rationale: Se preserva la palabra «uno» para no resolver la tensión teológica del hebreo entre unidad, exclusividad y singularidad. «Uno» es la opción más cercana y compacta para ambas apariciones.
- source_word: וּשְׁמוֹ
  english_pob_choice: his name
  chosen_spanish: su nombre
  alternatives_spanish:
  - su nombre
  - el nombre de él
  lexicon: HALOT
  rationale: El posesivo simple en español reproduce la referencia pronominal del hebreo sin añadir explicaciones. Mantiene además el paralelismo del verso.
theological_decisions:
- issue: Valor teológico de אֶחָד en «Yahvé será uno»
  english_pob_reading: Preserve the wording 'one' in the main text
  chosen_spanish_reading: Conservar «uno» en el texto principal
  alternative_spanish_readings:
  - será solo
  - será único
  - estará solo
  rationale: El hebreo permite matices de unidad, exclusividad y unicidad; el proyecto inglés optó por no cerrar la ambigüedad. En español, «uno» conserva esa tensión y evita imponer una interpretación más estrecha que el texto no obliga a resolver.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #3: Preserve theological tension rather than resolve it'
- issue: Traducción del nombre divino YHWH
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Jehová
  - el SEÑOR
  rationale: El nombre propio del pacto aparece dos veces en el versículo. Traducirlo como «Yahvé» sigue la decisión doctrinal del proyecto y mantiene visible el tetragrama en lugar de ocultarlo tras un título.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
translation_notes:
  revision_awareness: Se respetó el pasaje sin cambios respecto del último pase de revisión, que registró alta concordancia y no propuso modificaciones.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» de forma consistente para יְהוָה, en lugar de «el SEÑOR».
  - Se conservó «uno» para אֶחָד en ambas cláusulas para reflejar el paralelismo hebreo.
  - «Tierra» se usó en sentido global, coherente con el alcance eschatológico del versículo.
  - La puntuación separa claramente las dos cláusulas temporales y conserva el paralelismo del original.
