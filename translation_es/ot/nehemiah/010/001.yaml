translation:
  language: es
  text: Y por causa de todo esto[a], nosotros hacemos un pacto firme por escrito, y sobre el documento sellado[b] están nuestros oficiales, nuestros levitas y nuestros sacerdotes.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Y en todo esto estamos cortando un pacto firme y escribiéndolo». El hebreo usa literalmente el lenguaje de «cortar» un pacto; el sentido idiomático aquí es hacer o establecer un compromiso solemne.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «sobre el documento sellado» / «sobre la escritura sellada». El hebreo probablemente se refiere al instrumento escrito que ha sido sellado formalmente.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וּבְכָל זֹאת
  english_pob_choice: And because of all this
  chosen_spanish: Y por causa de todo esto
  alternatives_spanish:
  - Y en todo esto
  - Y por todo esto
  lexicon: HALOT
  rationale: La construcción con ב + כָּל זֹאת expresa referencia retrospectiva y motivo. «Por causa de todo esto» comunica bien la fuerza causal en español sin perder el enlace con lo anterior.
- source_word: כֹּרְתִים
  english_pob_choice: are making
  chosen_spanish: estamos haciendo
  alternatives_spanish:
  - estamos cortando
  - estamos sellando
  lexicon: HALOT
  rationale: El hebreo usa el modismo de «cortar» un pacto, pero el sentido idiomático es «hacer/establecer». En español, «hacer» mantiene la naturalidad y preserva la idea de un pacto formal.
- source_word: אֲמָנָה
  english_pob_choice: a binding agreement
  chosen_spanish: un pacto firme
  alternatives_spanish:
  - un acuerdo vinculante
  - un pacto fiel
  - un compromiso firme
  lexicon: HALOT
  rationale: אֲמָנָה denota una obligación confiable, solemne y vinculante. «Pacto firme» conserva la solemnidad y la fuerza obligatoria sin introducir un matiz técnico excesivo.
- source_word: וְכֹתְבִים
  english_pob_choice: in writing
  chosen_spanish: por escrito
  alternatives_spanish:
  - y escribiéndolo
  - y poniéndolo por escrito
  lexicon: HALOT
  rationale: El participio indica que el pacto queda consignado por escrito. «Por escrito» es la forma española más natural y precisa.
- source_word: וְעַל הֶחָתוּם
  english_pob_choice: and on the sealed document
  chosen_spanish: sobre el documento sellado
  alternatives_spanish:
  - sobre el pacto sellado
  - sobre el documento con sello
  lexicon: HALOT
  rationale: La frase se refiere al instrumento escrito y formalmente sellado. «Documento sellado» comunica ese valor jurídico/formal sin forzar una paráfrasis.
- source_word: שָׂרֵינוּ
  english_pob_choice: our officials
  chosen_spanish: nuestros oficiales
  alternatives_spanish:
  - nuestros príncipes
  - nuestros líderes
  - nuestros jefes
  lexicon: HALOT
  rationale: שָׂרִים puede abarcar príncipes, jefes u কর্মকর্তas. En el contexto administrativo posexílico, «oficiales» evita una connotación monárquica que el contexto no exige.
- source_word: לְוִיֵּינוּ
  english_pob_choice: our Levites
  chosen_spanish: nuestros levitas
  alternatives_spanish:
  - nuestros levitas
  lexicon: HALOT
  rationale: Nombre del grupo tribal/cultual. Se conserva la forma habitual en español bíblico.
- source_word: כֹּהֲנֵינוּ
  english_pob_choice: our priests
  chosen_spanish: nuestros sacerdotes
  alternatives_spanish:
  - nuestros sacerdotes
  lexicon: HALOT
  rationale: Equivalente directo del grupo sacerdotal, con terminología estándar y clara en español.
translation_notes:
  revision_awareness: No se aplicaron revisiones posteriores; se mantiene alta concordancia con el texto fuente y con el audit trail inglés, con una sola decisión principal de estilo para naturalidad del español.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé»/«Mesías» fuera del versículo porque no aparecen en el texto fuente.
  - Se eligió «pacto firme» para conservar la fuerza de אֲמָנָה sin desplazar el lenguaje bíblico de pacto.
  - 'Se respetó la distinción entre oficiales civiles/cultuales: «oficiales», «levitas» y «sacerdotes».'
  - La nota [a] preserva la tensión entre la metáfora hebrea de «cortar» y la traducción idiomática «hacer un pacto».
  - La nota [b] preserva la posible ambigüedad legal del objeto sellado sin sobreespecificarlo.
