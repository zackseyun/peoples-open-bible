revisions:
- from: Los ríos han alzado su voz[a], oh Yahvé; los ríos han alzado su voz[b]; los ríos alzan sus aguas estruendosas.
  to: Los ríos[a] han alzado, oh Yahvé; los ríos han alzado su voz; los ríos alzan sus olas golpeantes[b].
