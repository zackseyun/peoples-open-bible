translation:
  language: es
  text: Cuando la noticia llegó al rey de Nínive[a], se levantó de su trono, se quitó su manto[b], se cubrió de cilicio y se sentó en la ceniza[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘el mensaje’, ‘el asunto’ o ‘el reporte’ llegó al rey de Nínive.
    reason: lexical_alternative
  - marker: b
    text: O ‘su capa’. El término hebreo puede referirse a una prenda exterior distinguida.
    reason: lexical_alternative
  - marker: c
    text: Lit. ‘sobre la ceniza’ o ‘sobre las cenizas’.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּגַּע הַדָּבָר
  english_pob_choice: the message reached
  chosen_spanish: la noticia llegó
  alternatives_spanish:
  - el asunto llegó
  - el mensaje llegó
  - la palabra llegó
  lexicon: HALOT
  rationale: דָּבָר abarca ‘palabra’, ‘asunto’, ‘mensaje’ o ‘noticia’ según el contexto. Aquí se trata de la comunicación que afecta al rey, y ‘la noticia llegó’ transmite bien la llegada del contenido al destinatario sin sonar forzado en español.
- source_word: מֶלֶךְ נִינְוֵה
  english_pob_choice: the king of Nineveh
  chosen_spanish: el rey de Nínive
  alternatives_spanish:
  - Nínive, su rey
  lexicon: HALOT
  rationale: Es una relación constructa directa y en español la forma natural y clara es ‘el rey de Nínive’.
- source_word: וַיָּקָם מִכִּסְאוֹ
  english_pob_choice: he rose from his throne
  chosen_spanish: se levantó de su trono
  alternatives_spanish:
  - se alzó de su asiento
  - se puso de pie desde su trono
  lexicon: HALOT
  rationale: כִּסֵּא puede ser ‘asiento’ o ‘trono’; por tratarse de un rey, ‘trono’ preserva el matiz real y el gesto de humillación.
- source_word: וַיַּעֲבֵר אַדַּרְתּוֹ מֵעָלָיו
  english_pob_choice: removed his robe
  chosen_spanish: se quitó su manto
  alternatives_spanish:
  - se quitó su capa
  - se quitó su vestidura
  lexicon: HALOT
  rationale: אַדֶּרֶת designa un manto o prenda exterior distinguida. ‘Manto’ es más fiel que ‘ropa’ y más natural en español bíblico que una calca del hebreo.
- source_word: אַדַּרְתּוֹ
  english_pob_choice: his robe
  chosen_spanish: su manto
  alternatives_spanish:
  - su capa
  - su vestidura
  lexicon: HALOT
  rationale: Se conserva el valor de una prenda exterior notable, apropiada para el contexto real.
- source_word: וַיְכַס שַׂק
  english_pob_choice: covered himself with sackcloth
  chosen_spanish: se cubrió de cilicio
  alternatives_spanish:
  - se vistió de cilicio
  - se cubrió con saco
  lexicon: HALOT
  rationale: שַׂק es el tejido áspero asociado con duelo y arrepentimiento; ‘cilicio’ es la equivalencia tradicional y entendible en español eclesiástico, y ‘se cubrió de’ refleja el verbo sin añadir más de lo que el texto dice.
- source_word: שַׂק
  english_pob_choice: sackcloth
  chosen_spanish: cilicio
  alternatives_spanish:
  - tela áspera
  - saco
  lexicon: HALOT
  rationale: ‘Cilicio’ comunica la prenda penitencial tradicionalmente asociada con el hebreo שַׂק. Se prefiere por claridad litúrgica y bíblica en español.
- source_word: וַיֵּשֶׁב עַל הָאֵפֶר
  english_pob_choice: sat in the ashes
  chosen_spanish: se sentó sobre la ceniza
  alternatives_spanish:
  - se sentó en las cenizas
  - se sentó sobre las cenizas
  lexicon: HALOT
  rationale: El hebreo dice literalmente ‘sobre la ceniza’. En español, ‘ceniza’ en singular puede funcionar como sustantivo colectivo o material, manteniendo cercanía al hebreo y la imagen de humillación.
theological_decisions:
- issue: Imagen de humillación pública y arrepentimiento implícito
  english_pob_reading: Rendered the king's actions in straightforward narrative terms without intensifying them into explicit theological conclusions beyond the text.
  chosen_spanish_reading: Se narran las acciones simbólicas del rey sin convertirlas en una afirmación doctrinal explícita que el versículo no formule.
  alternative_spanish_readings:
  - se arrepintió públicamente
  - mostró su arrepentimiento con actos de humillación
  rationale: El texto presenta gestos de duelo y humillación con fuerte carga penitencial, pero la traducción no debe adelantarse a formular una conclusión teológica que el versículo mismo no enuncia de manera directa.
  doctrine_reference: 'Principio de traducción POB: no introducir conclusiones doctrinales que el texto no expresa; conservar el sentido llano de la narración.'
translation_notes:
  revision_awareness: El audit trail inglés pasó por una revisión menor que eliminó ‘from himself’ por ser innecesario en inglés. En español se optó directamente por ‘se quitó su manto’, que evita esa redundancia y sigue fielmente el hebreo.
  spanish_consistency_notes:
  - Se mantiene ‘Nínive’ con acento conforme al uso español.
  - 'Se preserva la imagen penitencial sin suavizarla: trono, manto, cilicio y ceniza.'
  - Se usa ‘manto’ para אַדֶּרֶת por su valor de prenda exterior distinguida, y ‘cilicio’ para שַׂק por ser la equivalencia bíblica más estable en español.
