translation:
  language: es
  text: Aún ahora, he aquí, mi testigo está en los cielos, y el que da testimonio por mí[a] está en las alturas[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «mi testigo está en los cielos, y mi testigo está en las alturas». El segundo término es un cuasi-sinónimo de «testigo» y puede traducirse de manera más literal para conservar el paralelismo.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «en lo alto» para «en las alturas».'
    reason: lexical_alternative
lexical_decisions:
- source_word: גַּם עַתָּה
  english_pob_choice: Even now
  chosen_spanish: Aun ahora
  alternatives_spanish:
  - Todavía ahora
  - Incluso ahora
  lexicon: HALOT
  rationale: La combinación temporal expresa énfasis inmediato sobre la situación presente; «Aun ahora» conserva la fuerza enfática sin sonar forzado en español.
- source_word: הִנֵּה
  english_pob_choice: behold
  chosen_spanish: he aquí
  alternatives_spanish:
  - mira
  - mira, pues
  - véase
  lexicon: HALOT
  rationale: La partícula deíctica llama la atención sobre la afirmación. «He aquí» mantiene el tono solemne y la función de señalamiento del original.
- source_word: בַשָּׁמַיִם
  english_pob_choice: in heaven
  chosen_spanish: en los cielos
  alternatives_spanish:
  - en el cielo
  - en los cielos
  lexicon: HALOT
  rationale: Aquí שָׁמַיִם apunta al ámbito celestial, no al cielo físico. «En los cielos» conserva el plural y el ámbito trascendente con naturalidad bíblica en español.
- source_word: עֵדִי
  english_pob_choice: my witness
  chosen_spanish: mi testigo
  alternatives_spanish:
  - mi testigo legal
  - el que me testifica
  lexicon: HALOT
  rationale: עֵד es un testigo en sentido forense. «Mi testigo» es directo y conserva la imaginería legal del pasaje.
- source_word: וְשָׂהֲדִי
  english_pob_choice: he who testifies for me
  chosen_spanish: el que da testimonio por mí
  alternatives_spanish:
  - el que testifica por mí
  - mi testigo
  lexicon: HALOT
  rationale: Se evita un equivalente demasiado interpretativo como «abogado» y se refleja de modo más directo el valor de testificar del término arameizante, preservando la cercanía semántica con עֵדִי.
- source_word: בַּמְּרוֹמִים
  english_pob_choice: in the heights
  chosen_spanish: en las alturas
  alternatives_spanish:
  - en lo alto
  - en las alturas
  lexicon: HALOT
  rationale: מְרוֹמִים denota alturas elevadas, en paralelo con «los cielos». «En las alturas» mantiene la imagen espacial y la solemnidad del pasaje.
theological_decisions:
- issue: Identidad del testigo celestial de Job
  english_pob_reading: Render the figure functionally without specifying whether Job means God himself, an angelic mediator, or a poetic legal witness.
  chosen_spanish_reading: 'Se deja la figura abierta: «mi testigo» y «el que da testimonio por mí».'
  alternative_spanish_readings:
  - Dios es mi testigo
  - un mediador celestial da testimonio por mí
  - mi testimonio está en los cielos
  rationale: El hebreo nombra a un testigo en el ámbito celestial pero no lo identifica explícitamente. La traducción mantiene la tensión teológica y la imaginería forense sin resolverla de antemano.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: La redacción sigue la revisión más reciente del audit trail al preferir una fórmula directa para שָׂהֲדִי («el que da testimonio por mí») en vez de una interpretación más amplia como «abogado», y al usar una marca solemne para הִנֵּה. También conserva la posibilidad alternativa de traducir el segundo miembro de forma más literal para preservar el paralelismo semántico.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» fuera del versículo porque el hebreo aquí no contiene el tetragrámaton ni una referencia directa al nombre divino.
  - «Cielos» y «alturas» distinguen el ámbito celestial y la elevación espacial sin reducir ambos a una sola expresión fija.
  - La duplicación funcional de testimonio/testigo se conserva en la nota para no borrar la tensión léxica del hebreo.
