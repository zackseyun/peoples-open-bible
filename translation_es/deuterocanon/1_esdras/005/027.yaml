translation:
  language: es
  text: los hijos de los cantores del templo[a], los hijos de Asaf, ciento veintiocho.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «cantores sagrados». El griego designa a cantores vinculados al culto del templo.
    reason: lexical_alternative
lexical_decisions:
- source_word: υἱοὶ
  english_pob_choice: the sons of
  chosen_spanish: los hijos de
  alternatives_spanish:
  - los descendientes de
  lexicon: LSJ
  rationale: Es una fórmula genealógica/lista censal; «los hijos de» conserva mejor el registro enumerativo y la repetición del griego que «los descendientes de».
- source_word: ἱεροψάλται
  english_pob_choice: temple singers
  chosen_spanish: los cantores del templo
  alternatives_spanish:
  - los cantores sagrados
  - los cantores para el templo
  lexicon: LSJ
  rationale: El compuesto griego une la idea de lo sagrado/templo con el acto de cantar. «Cantores del templo» comunica claramente la función cultual en español y mantiene la referencia institucional sin sobreinterpretar.
- source_word: υἱοὶ Ἀσάφ
  english_pob_choice: the sons of Asaph
  chosen_spanish: los hijos de Asaf
  alternatives_spanish:
  - los descendientes de Asaf
  lexicon: LSJ
  rationale: Se conserva el nombre propio transliterado como Asaf y la repetición de la fórmula «los hijos de», porque el griego vuelve a identificar el gremio por linaje.
- source_word: ἑκατὸν εἴκοσι ὀκτώ
  english_pob_choice: one hundred twenty-eight
  chosen_spanish: ciento veintiocho
  alternatives_spanish:
  - ciento y veintiocho
  lexicon: LSJ
  rationale: Número cardinal en español moderno estándar, equivalente directo y natural en una lista censal.
translation_notes:
  revision_awareness: El texto griego es breve y estable; la principal decisión revisable es ἱεροψάλται, donde la POB inglesa optó por «temple singers» y señaló en nota la alternativa «sacred singers». Se reflejó esa tensión en español con una nota de alternativa léxica.
  spanish_consistency_notes:
  - Se mantuvo el orden de la enumeración y la repetición de «los hijos de» para reproducir el tono de lista del original.
  - Se evitó «SEÑOR» u otras convenciones no pertinentes, porque el versículo no contiene el nombre divino ni un título teológico equivalente.
  - Se prefirió «cantores del templo» sobre un calco más duro como «sacres cantores» para lograr legibilidad sin perder la referencia cultual.
