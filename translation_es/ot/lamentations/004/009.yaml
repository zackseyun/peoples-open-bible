translation:
  language: es
  text: Mejor les fue a los muertos por espada que a los muertos por hambre[a], que se consumen, traspasados por falta del fruto del campo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «que se desvanecen, traspasados, porque no hay fruto del campo». El hebreo de esta cláusula es difícil, sobre todo el verbo traducido «se consumen» y el valor de la preposición en «de/por falta de».'
    reason: lexical_alternative
lexical_decisions:
- source_word: טוֹבִים הָיוּ
  english_pob_choice: Better were
  chosen_spanish: Mejor fueron
  alternatives_spanish:
  - Mejores fueron
  - Más afortunados fueron
  lexicon: HALOT
  rationale: La construcción comparativa expresa estado relativo, no bondad moral. «Mejor fueron» conserva el comparativo y el tono de lamentación sin forzar una locución más idiomática pero menos sobria.
- source_word: חַלְלֵי חֶרֶב
  english_pob_choice: those slain by the sword
  chosen_spanish: los heridos de espada
  alternatives_spanish:
  - los muertos por espada
  - los traspasados por espada
  lexicon: HALOT
  rationale: חָלָל puede abarcar a quien ha caído/herido mortalmente; en español «heridos de espada» mantiene la fuerza de la imagen y evita una redundancia demasiado explícita. «De espada» reproduce bien el genitivo instrumental.
- source_word: מֵחַלְלֵי רָעָב
  english_pob_choice: than those slain by hunger
  chosen_spanish: que los heridos de hambre
  alternatives_spanish:
  - que los muertos de hambre
  - que los heridos por hambre
  lexicon: HALOT
  rationale: El מ comparativo se expresa naturalmente con «que». רָעָב puede ser «hambre» o «hambre/famine»; aquí «hambre» mantiene la oposición vivida con espada y preserva el contraste del poema.
- source_word: יָזוּבוּ
  english_pob_choice: waste away
  chosen_spanish: se consumen
  alternatives_spanish:
  - se desvanecen
  - se derraman
  - se agotan
  lexicon: HALOT
  rationale: El verbo es difícil y admite la idea de deshacerse o languidecer. «Se consumen» comunica el desgaste progresivo del hambre sin imponer una imagen demasiado física que oscurezca el sentido.
- source_word: מְדֻקָּרִים
  english_pob_choice: pierced through
  chosen_spanish: traspasados
  alternatives_spanish:
  - perforados
  - heridos de muerte
  - atravesados
  lexicon: HALOT
  rationale: El participio pasivo de דקר significa «perforar/traspasar». «Traspasados» conserva la vividez del término y funciona bien como complemento descriptivo de la desolación causada por la privación.
- source_word: מִתְּנוּבוֹת שָׂדָי
  english_pob_choice: for lack of the produce of the field
  chosen_spanish: por falta del producto del campo
  alternatives_spanish:
  - a causa de la cosecha del campo
  - por no haber fruto del campo
  - por carecer del producto del campo
  lexicon: HALOT
  rationale: La preposición מ se entiende aquí en sentido privativo/causal según el contexto; por eso «por falta de» expresa el motivo de su consumirse. «Producto del campo» refleja con naturalidad תְּנוּבוֹת שָׂדָי sin cargar el verso con tecnicismos agrarios.
translation_notes:
  revision_awareness: Se siguió de cerca el texto hebreo masorético y el criterio de la POB inglesa en el tratamiento del comparativo, de חָלָל, del verbo difícil יָזוּבוּ y de la preposición privativa en מִתְּנוּבוֹת. También se atendió al ajuste de registro de la revisión inglesa («Better were»), reflejado en un español sobrio y publicable.
  spanish_consistency_notes:
  - Se mantuvo «espada» sin artículo para reproducir el valor genitivo de חֶרֶב.
  - Se optó por «hambre» en vez de «hambre/famine» para conservar el contraste poético con la espada, como en la POB inglesa.
  - «Producto del campo» evita un literalismo pesado y sigue la equivalencia funcional del audit trail.
  - La nota al pie conserva la tensión textual/lexical del verbo difícil sin resolverla de forma excesiva.
