translation:
  language: es
  text: No des tu gloria[a] a otro, ni lo que te beneficia[b] a una nación extranjera.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «tu honor» para «tu gloria». El griego δόξα puede llevar aquí cualquiera de esos sentidos.
    reason: lexical_alternative
  - marker: b
    text: O «tu bienestar» o «tus ventajas» para «lo que te beneficia».
    reason: lexical_alternative
lexical_decisions:
- source_word: μὴ δῷς
  english_pob_choice: Do not give
  chosen_spanish: No des
  alternatives_spanish:
  - No entregues
  - No cedas
  - No pongas
  lexicon: BDAG
  rationale: El aoristo subjuntivo prohibitivo con μή se expresa naturalmente en español con una prohibición breve y directa. «No des» conserva la sencillez del mandato sin cargarlo con una intensificación que el griego no exige.
- source_word: ἑτέρῳ
  english_pob_choice: to another
  chosen_spanish: a otro
  alternatives_spanish:
  - a otro distinto
  - a alguien más
  lexicon: BDAG
  rationale: «ἕτερος» aquí marca alteridad sin necesidad de especificar más. «A otro» reproduce esa brevedad y mantiene el contraste formal del texto.
- source_word: τὴν δόξαν σου
  english_pob_choice: your glory
  chosen_spanish: tu gloria
  alternatives_spanish:
  - tu honor
  - tu honra
  - tu esplendor
  lexicon: BDAG
  rationale: Se conserva «gloria» porque el audito inglés de POB retiene la amplitud semántica de δόξα y no la restringe a «honor». En español, «gloria» preserva mejor el peso elevado del término y su resonancia teológica, aun cuando pueda incluir también el matiz de honra.
- source_word: τὰ συμφέροντά σοι
  english_pob_choice: what benefits you
  chosen_spanish: lo que te beneficia
  alternatives_spanish:
  - tu bienestar
  - tus ventajas
  - lo que te conviene
  lexicon: BDAG
  rationale: El plural neutro con el dativo σοι tiene sentido general de aquello que resulta ventajoso o provechoso. «Lo que te beneficia» es una equivalencia natural en español que conserva esa amplitud sin concretarla indebidamente.
- source_word: ἔθνει ἀλλοτρίῳ
  english_pob_choice: to a foreign nation
  chosen_spanish: a una nación extranjera
  alternatives_spanish:
  - a una nación ajena
  - a un pueblo extranjero
  - a una nación de otro pueblo
  lexicon: BDAG
  rationale: «ἔθνος» se rinde mejor aquí como «nación» que como «gentil», porque el contexto es político-identitario. «Extranjera» expresa el valor de ἀλλότριος como perteneciente a otro, sin introducir una connotación adicional no exigida por el griego.
theological_decisions:
- issue: Sentido de «tu gloria»
  english_pob_reading: Retain the broader phrase 'your glory' without narrowing it to covenant privilege, honor, or worship.
  chosen_spanish_reading: Conservar «tu gloria» sin reducirla a una sola idea como honra, privilegio de pacto o culto.
  alternative_spanish_readings:
  - tu honra
  - la gloria que Dios te dio
  - tu privilegio de pacto
  rationale: El griego no define explícitamente el referente de δόξα. Mantener «gloria» preserva la amplitud del texto y evita cerrar prematuramente su alcance teológico.
  doctrine_reference: DOCTRINE.md §Translation philosophy 3
- issue: Sentido de τὰ συμφέροντά σοι
  english_pob_reading: Render generally as 'what benefits you' rather than specifying material prosperity or spiritual good.
  chosen_spanish_reading: Traducir de manera general como «lo que te beneficia», sin precisar si se trata de bienestar material, prosperidad o bien espiritual.
  alternative_spanish_readings:
  - tu bienestar
  - tus ventajas
  - lo que te conviene
  rationale: La frase es semánticamente amplia. Una traducción general permite que el lector perciba tanto el posible matiz práctico como el comunitario o pactual, sin imponer una especificación doctrinal no presente en el verso.
  doctrine_reference: DOCTRINE.md §Translation philosophy 3
translation_notes:
  revision_awareness: 'El texto español sigue la última revisión inglesa sin cambios sustantivos: mantiene la prohibición directa, conserva «gloria» para δόξα, y traduce τὰ συμφέροντά σοι con una expresión general equivalente a «what benefits you».'
  spanish_consistency_notes:
  - Se usa «gloria» como término principal para δόξα, en consonancia con el audit trail inglés.
  - Se prefiere «nación extranjera» para ἔθνει ἀλλοτρίῳ, evitando «gentil» por no ser el valor contextual dominante.
  - La nota a pie de página para δόξα ofrece la alternativa «honor», que es la misma tensión léxica documentada en inglés.
  - «Lo que te beneficia» mantiene el alcance semántico amplio de τὰ συμφέροντά σοι sin concretarlo en términos de bienestar material.
