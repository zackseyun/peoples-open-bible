translation:
  language: es
  text: 'Muchos[a] dicen de mí: «No hay salvación[b] para él en Dios». Selah[c]'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebreo literalmente, «a mi alma»; aquí la expresión es un modismo que significa «de mí» o «acerca de mí».
    reason: lexical_alternative
  - marker: b
    text: O «liberación».
    reason: lexical_alternative
  - marker: c
    text: «Selah» probablemente es un término musical o litúrgico; su significado preciso es incierto.
    reason: cultural_note
lexical_decisions:
- source_word: רַבִּים
  english_pob_choice: Many
  chosen_spanish: Muchos
  alternatives_spanish:
  - Mucha gente
  - Multitudes
  lexicon: HALOT
  rationale: El adjetivo sustantivado expresa un grupo numeroso e indefinido. «Muchos» conserva esa fuerza plural sin sobrecargar el español.
- source_word: אֹמְרִים
  english_pob_choice: are saying
  chosen_spanish: dicen
  alternatives_spanish:
  - están diciendo
  - van diciendo
  lexicon: HALOT
  rationale: El participio sugiere una acción en curso o repetida; en español, «dicen» puede expresar adecuadamente ese valor colectivo y continuo en un estilo natural y sobrio.
- source_word: לְנַפְשִׁי
  english_pob_choice: of me
  chosen_spanish: de mí
  alternatives_spanish:
  - a mi alma
  - acerca de mí
  lexicon: HALOT
  rationale: El hebreo dice literalmente «a mi alma», pero aquí נֶפֶשׁ funciona idiomáticamente por la persona misma. «De mí» reproduce el sentido idiomático que el POB inglés también documenta, evitando un calco opaco.
- source_word: אֵין
  english_pob_choice: There is no
  chosen_spanish: No hay
  alternatives_spanish:
  - No existe
  - No hay ninguna
  lexicon: HALOT
  rationale: Es la negación existencial normal en español y mantiene la estructura directa del enunciado.
- source_word: יְשׁוּעָתָה
  english_pob_choice: salvation
  chosen_spanish: salvación
  alternatives_spanish:
  - liberación
  - ayuda
  - victoria
  lexicon: HALOT
  rationale: «Salvación» conserva el peso léxico y teológico del sustantivo derivado de ישׁע, como en la decisión inglesa. «Liberación» sería un equivalente contextual válido, pero estrecha algo el campo semántico.
- source_word: לּוֹ
  english_pob_choice: for him
  chosen_spanish: para él
  alternatives_spanish:
  - para sí
  - a él
  lexicon: HALOT
  rationale: El sufijo de tercera persona se refiere al hablante citado por sus adversarios. «Para él» es la correspondencia directa y natural en español.
- source_word: בֵאלֹהִים
  english_pob_choice: in God
  chosen_spanish: en Dios
  alternatives_spanish:
  - de Dios
  - con Dios
  - por Dios
  lexicon: HALOT
  rationale: 'La preposición ב se traduce de forma básica como «en». Aquí preserva la afirmación de los hablantes: no hay salvación disponible para él en Dios.'
- source_word: סֶלָה
  english_pob_choice: Selah
  chosen_spanish: Selah
  alternatives_spanish:
  - pausa
  - interludio
  lexicon: HALOT
  rationale: Se translitera para respetar la transparencia textual y porque su sentido preciso sigue siendo incierto; no conviene imponer una interpretación especulativa.
theological_decisions:
- issue: 'Renderización de יְשׁוּעָה: «salvación» versus un término más general como «liberación»'
  english_pob_reading: salvation
  chosen_spanish_reading: salvación
  alternative_spanish_readings:
  - liberación
  - ayuda
  rationale: En los Salmos, el término puede referirse al rescate concreto, pero «salvación» mantiene mejor la resonancia teológica y lexical amplia. La frase se entiende como la acusación de que Dios no lo salvará.
  doctrine_reference: Principio de consistencia léxica y peso teológico sin sobreinterpretar el texto.
- issue: 'Valor idiomático de לְנַפְשִׁי: traducción literal o natural'
  english_pob_reading: of me
  chosen_spanish_reading: de mí
  alternative_spanish_readings:
  - a mi alma
  - acerca de mí
  rationale: Aunque la forma literal es «a mi alma», en este contexto la expresión denota a la persona entera. «De mí» es natural en español y conserva el sentido idiomático sin sugerir un foco psicológico indebido.
  doctrine_reference: Equivalencia óptima; claridad moderna sin perder la fuente hebrea.
translation_notes:
  revision_awareness: El borrador sigue el estado de revisión más reciente sin cambios sustanciales respecto al expediente inglés auditado; no se detectan revisiones aplicadas adicionales. Se mantiene la equivalencia óptima con atención a la transparencia del hebreo y a la terminología teológica clave.
  spanish_consistency_notes:
  - Se conserva «salvación» para יְשׁוּעָה por coherencia con el valor teológico del Salterio.
  - Se usa «Dios» para אֱלֹהִים, sin máscara reverencial.
  - «Selah» se translitera para no decidir indebidamente su función.
  - La puntuación respeta el discurso citado y la cadencia poética del versículo.
