translation:
  language: es
  text: 'Alza tus ojos alrededor y mira: todos ellos se reúnen; vienen a ti. Vivo yo, declara Yahvé, que todos ellos te los pondrás como un adorno[a] y te los atarás como una esposa.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O "como joyería"; el término hebreo se refiere a adorno o joyas.
    reason: lexical_alternative
lexical_decisions:
- source_word: שְׂאִי
  english_pob_choice: Lift up
  chosen_spanish: Alza
  alternatives_spanish:
  - Levanta
  - Eleva
  lexicon: HALOT
  rationale: Imperativo femenino singular dirigido a Sion/Jerusalén personificada. En español, "alza" conserva el mandato y suena natural con "tus ojos".
- source_word: סָבִיב
  english_pob_choice: all around
  chosen_spanish: alrededor
  alternatives_spanish:
  - en derredor
  - por todas partes
  lexicon: HALOT
  rationale: Expresa la mirada en todas direcciones sin volver la frase pesada.
- source_word: עֵינַיִךְ
  english_pob_choice: your eyes
  chosen_spanish: tus ojos
  alternatives_spanish:
  - tus ojos alrededor
  lexicon: HALOT
  rationale: La forma dual/plural con sufijo de 2fs se refleja de manera directa y natural en español.
- source_word: וּרְאִי
  english_pob_choice: and see
  chosen_spanish: y mira
  alternatives_spanish:
  - y ve
  lexicon: HALOT
  rationale: '"Mira" conserva el segundo imperativo y suena más idiomático en español en paralelo con "alza tus ojos".'
- source_word: כֻּלָּם
  english_pob_choice: they all
  chosen_spanish: todos ellos
  alternatives_spanish:
  - todos
  - todos los que
  lexicon: HALOT
  rationale: Mantiene la idea colectiva y totalizadora del hebreo, con referencia al grupo reunido que vuelve a Sion.
- source_word: נִקְבְּצוּ
  english_pob_choice: gather together
  chosen_spanish: se han reunido
  alternatives_spanish:
  - se congregan
  - están reunidos
  lexicon: HALOT
  rationale: El nifal perfecto puede leerse con vividez profética; "se han reunido" preserva el aspecto de reunión ya lograda.
- source_word: בָאוּ לָךְ
  english_pob_choice: they come to you
  chosen_spanish: vinieron a ti
  alternatives_spanish:
  - han venido a ti
  - vienen a ti
  lexicon: HALOT
  rationale: La secuencia verbal hebrea permite una lectura profética de hecho consumado; "vinieron" transmite esa llegada vista como realizada. Se mantiene el destinatario femenino con "a ti".
- source_word: חַי אָנִי
  english_pob_choice: As I live
  chosen_spanish: Vivo yo
  alternatives_spanish:
  - Tan ciertamente como vivo
  - Por mi vida
  lexicon: HALOT
  rationale: Fórmula solemne de juramento divino. Se conserva el orden enfático del hebreo y el sentido de juramento sin ocultarlo tras una sustitución titulada.
- source_word: נְאֻם יְהוָה
  english_pob_choice: declares Yahweh
  chosen_spanish: dice Yahvé
  alternatives_spanish:
  - declara Yahvé
  - oráculo de Yahvé
  lexicon: HALOT
  rationale: Se mantiene el nombre divino Yahvé según la terminología del proyecto; "dice" reproduce de forma clara la fórmula profética de declaración.
- source_word: כִּי
  english_pob_choice: surely
  chosen_spanish: que
  alternatives_spanish:
  - ciertamente
  - porque
  lexicon: HALOT
  rationale: Aquí introduce el contenido del juramento. En español, la estructura "Vivo yo... que" comunica adecuadamente la cláusula juramentada, y el énfasis se refuerza con "ciertamente" más adelante.
- source_word: כֻלָּם
  english_pob_choice: all of them
  chosen_spanish: a todos ellos
  alternatives_spanish:
  - a todos
  - a todos los
  lexicon: HALOT
  rationale: La repetición intensifica la totalidad del grupo. El complemento preposicional se adapta al régimen español de la construcción verbal.
- source_word: כָּעֲדִי
  english_pob_choice: like an ornament
  chosen_spanish: como un adorno
  alternatives_spanish:
  - como una alhaja
  - como una joya
  lexicon: HALOT
  rationale: עֲדִי puede referirse a adorno o joyería. Se elige el singular "un adorno" para seguir de cerca el hebreo y evitar reducirlo demasiado a una pieza específica de joyería.
- source_word: תִלְבָּשִׁי
  english_pob_choice: you will put ... on
  chosen_spanish: te los pondrás
  alternatives_spanish:
  - los vestirás
  - los llevarás puestos
  lexicon: HALOT
  rationale: לבשׁ con objeto de adorno puede expresarse como "ponerse" algo en español. El clítico reflexivo mantiene la imagen de vestirse/adornarse.
- source_word: וּתְקַשְּׁרִים
  english_pob_choice: and bind them on
  chosen_spanish: y los atarás
  alternatives_spanish:
  - y los ceñirás
  - y los sujetarás
  lexicon: HALOT
  rationale: El verbo קשר conserva la idea de atar o sujetar. "Atarás" reproduce la acción física sin sobreexplicar la metáfora.
- source_word: כַּכַּלָּה
  english_pob_choice: like a bride
  chosen_spanish: como una novia
  alternatives_spanish:
  - como una desposada
  - como una esposa
  lexicon: HALOT
  rationale: Se opta por "novia" como equivalente natural y comprensible en español para la figura nupcial femenina del hebreo, manteniendo la imagen de esplendor nupcial.
theological_decisions:
- issue: Renderización del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Jehová
  rationale: El texto hebreo contiene explícitamente el Tetragrama. Siguiendo la terminología del proyecto, se traduce con el nombre propio Yahvé en vez de sustituirlo por un título.
  doctrine_reference: 'DOCTRINE.md — Contested terms: יְהוָה / YHWH'
- issue: Fórmula de juramento divino חַי אָנִי
  english_pob_reading: As I live
  chosen_spanish_reading: Vivo yo
  alternative_spanish_readings:
  - Tan ciertamente como vivo
  - Por mi vida
  rationale: La fórmula expresa un juramento solemne de Dios. "Vivo yo" conserva el énfasis y evita suavizar la carga retórica del hebreo.
  doctrine_reference: Uso bíblico de juramento divino en fórmula profética
- issue: Imagen de adornar con los hijos reunidos
  english_pob_reading: you will surely put them all on like an ornament and bind them on like a bride
  chosen_spanish_reading: a todos ellos ciertamente te los pondrás como un adorno y los atarás como una novia
  alternative_spanish_readings:
  - te los pondrás como adorno y los atarás como una novia
  - los llevarás como un adorno y los sujetarás como una novia
  rationale: El hebreo compara la reunión de los hijos con una ornamentación nupcial. Se conserva la metáfora sin sustituirla por explicación, y "como una novia" mantiene la imagen femenina de la comparación.
  doctrine_reference: Metáfora poética de restauración de Sion en Isaías 49
translation_notes:
  revision_awareness: El audit trail inglés revisó la metáfora final de 'jewelry' a 'an ornament' para reflejar mejor el singular hebreo עֲדִי. La versión española sigue esa revisión con "un adorno" y conserva la doble imagen de vestirse y atarse en paralelo al texto hebreo.
  spanish_consistency_notes:
  - Se usa Yahvé de manera consistente con la política del proyecto para יְהוָה.
  - Se evita "SEÑOR" como sustituto del nombre divino.
  - '"Novia" se usa aquí como equivalente poético de כַּלָּה, manteniendo la imagen nupcial natural en español.'
  - La cláusula de juramento se formula con "Vivo yo" para preservar la solemnidad del hebreo.
  - La nota al pie marca la alternativa semántica de עֲדִי sin introducir terminología eclesiástica ajena al texto.
