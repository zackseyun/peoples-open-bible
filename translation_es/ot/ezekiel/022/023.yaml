  text: 'Y la palabra de Yahvé vino a mí[a], diciendo:'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: “Y fue la palabra de Yahvé a mí, diciendo”, una fórmula profética estándar que significa “la palabra de Yahvé vino a mí”.'
