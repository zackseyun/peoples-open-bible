translation:
  text: 'And besides all these[a], there is an eighth spirit, the spirit of sleep, with which were created the trance of nature and the image of death.


    With these spirits are mixed the spirits of error. First, the spirit of sexual immorality is lodged in the nature and in the senses. Second, a spirit of insatiableness of the belly. Third, a spirit of fighting in the liver and in the gall. Fourth, a spirit of self-display and sorcery, so that through excessive meddling one may appear attractive. Fifth, a spirit of pride, so that one boasts and thinks grand thoughts. Sixth, a spirit of falsehood in destruction and jealousy, for shaping words and hiding one''s words from one''s own kin and household. Seventh, a spirit of injustice, with which come thefts and acts of greed[b], so that it may satisfy the pleasures of his heart. For injustice works together with the other spirits through taking and giving.


    And over all these the spirit of sleep is joined, which is the eighth spirit of error and fantasy. And so every young man is destroyed, darkening his mind from the truth and not understanding the law of God, nor listening to the instruction of his fathers, just as I also suffered in my youth.


    And now, my children, love the truth, and it will keep you safe. Hear the words of Reuben your father, as I teach you. Do not pay attention to a woman''s appearance, nor keep company with a married woman[c], nor pry into the affairs of women.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The Greek text in this line is difficult and likely corrupt in places; the sense appears to be a spirit of falsehood associated with jealousy, deceptive speech, and concealment from one’s own family.
    reason: textual_variant
    anchor_ref: '3:5'
  - marker: b
    text: The rare term rendered 'acts of greed' is uncertain in this witness; alternatives such as 'graspings' or 'extortions' are possible.
    reason: lexical_alternative
    anchor_ref: '3:6'
  - marker: c
    text: This verse appears to restate and expand the mention of the 'eighth spirit' in verse 1. Some readers may judge it a secondary duplication, but it is translated here as present in the Greek witness.
    reason: textual_variant
    anchor_ref: '3:7'
lexical_decisions:
- source_word: πορνεία
  chosen: sexual immorality
  alternatives:
  - fornication
  - sexual vice
  lexicon: BDAG
  rationale: Broad vice term in paraenetic context; 'sexual immorality' is clear modern English without narrowing the scope to premarital sex alone.
- source_word: αἰσθήσεις
  chosen: senses
  alternatives:
  - sensations
  - perceptions
  lexicon: LSJ
  rationale: Keeps the anthropological sense that lust operates through bodily perception.
- source_word: ἀπληστεία γαστρός
  chosen: insatiableness of the belly
  alternatives:
  - greed of the belly
  - gluttony
  lexicon: LSJ
  rationale: Retains the vivid bodily idiom of the Greek rather than flattening to the more interpretive 'gluttony'.
- source_word: μάχη
  chosen: fighting
  alternatives:
  - strife
  - combat
  lexicon: LSJ
  rationale: Simple, forceful term that fits the vice catalogue and preserves the active sense.
- source_word: ἀρέσκεια
  chosen: self-display
  alternatives:
  - vanity
  - desire to please
  lexicon: LSJ
  rationale: In this context, paired with beautifying manipulation and appearing attractive, the sense is not generic pleasing but performative self-presentation.
- source_word: μαγγανεία
  chosen: sorcery
  alternatives:
  - trickery
  - magic arts
  lexicon: LSJ
  rationale: The term commonly denotes magical arts; 'sorcery' preserves the moral-religious force.
- source_word: περιεργεία
  chosen: excessive meddling
  alternatives:
  - curiosity
  - busybodiness
  lexicon: BDAG
  rationale: Captures intrusive, morally suspect over-involvement rather than neutral curiosity.
- source_word: ὑπερηφανία
  chosen: pride
  alternatives:
  - arrogance
  - haughtiness
  lexicon: BDAG
  rationale: Standard rendering; concise and fitting in the vice list.
- source_word: μεγαλοφρονέω
  chosen: thinks grand thoughts
  alternatives:
  - is high-minded
  - is arrogant
  lexicon: LSJ
  rationale: Preserves the mental posture implied by the verb and avoids collapsing it into the previous term for pride.
- source_word: ψεύδους
  chosen: falsehood
  alternatives:
  - lying
  - deceit
  lexicon: BDAG
  rationale: 'Abstract noun matches the catalogue structure: ''a spirit of falsehood.'''
- source_word: πλάττειν λόγους
  chosen: shaping words
  alternatives:
  - fabricating speeches
  - devising words
  lexicon: LSJ
  rationale: Keeps the image of molding speech, suggesting contrived or deceptive utterance.
- source_word: ἀδικία
  chosen: injustice
  alternatives:
  - wrongdoing
  - unrighteousness
  lexicon: BDAG
  rationale: Best broad ethical term here; it also allows the following explanation of exploitative exchange to remain concrete.
- source_word: κλοπαί
  chosen: thefts
  alternatives:
  - stealings
  - acts of theft
  lexicon: LSJ
  rationale: Direct plural noun matching the list form.
- source_word: γρηπίσματα
  chosen: acts of greed
  alternatives:
  - graspings
  - extortions
  lexicon: LSJ
  rationale: The OCR/form is difficult, but the context points to acquisitive acts alongside thefts; 'acts of greed' preserves the likely sense without overclaiming precision.
- source_word: φιληδονία
  chosen: the pleasures
  alternatives:
  - love of pleasure
  - sensual desire
  lexicon: BDAG
  rationale: Here the noun functions concretely with 'of his heart'; 'the pleasures' keeps the appetitive sense in idiomatic English.
- source_word: δοσοληψία
  chosen: taking and giving
  alternatives:
  - transactions
  - dealings
  lexicon: LSJ
  rationale: A literal rendering preserves the morally charged sense of reciprocal dealings by which injustice cooperates with other vices.
- source_word: πλάνη
  chosen: error
  alternatives:
  - deception
  - wandering
  lexicon: BDAG
  rationale: Fits the moral-intellectual context and pairs naturally with 'fantasy.'
- source_word: φαντασία
  chosen: fantasy
  alternatives:
  - delusion
  - appearance
  lexicon: LSJ
  rationale: Preserves the imagistic, deceptive quality of the term in this vice anthropology.
- source_word: νεώτερος
  chosen: young man
  alternatives:
  - younger person
  - youth
  lexicon: LSJ
  rationale: The warning is directed to sons and framed by Reuben's own youthful failure; 'young man' keeps the gendered and admonitory force.
- source_word: νουθεσία
  chosen: instruction
  alternatives:
  - admonition
  - warning
  lexicon: BDAG
  rationale: Readable and suitable in a father-to-sons testamentary context.
- source_word: ὄψις γυναικεία
  chosen: a woman’s appearance
  alternatives:
  - female beauty
  - the sight of a woman
  lexicon: LSJ
  rationale: The warning concerns visual allure; 'appearance' is natural English while preserving the focus on sight.
- source_word: θηλεία ὕπανδρος
  chosen: a married woman
  alternatives:
  - another man's wife
  - a woman under a husband
  lexicon: LSJ
  rationale: Idiomatic English for the Greek expression, preserving the marital status central to the warning.
- source_word: περιεργάζεσθε πρᾶξιν γυναικῶν
  chosen: pry into the affairs of women
  alternatives:
  - busy yourselves with women's matters
  - investigate women's activities
  lexicon: BDAG
  rationale: Captures the intrusive force of the verb and the practical sphere denoted by πρᾶξις.
