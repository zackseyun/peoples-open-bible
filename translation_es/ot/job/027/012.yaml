translation:
  language: es
  text: Miren[a], todos ustedes lo han visto; ¿por qué entonces se vuelven vacíos?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «¿por qué entonces actúan vanamente?». El hebreo usa un sustantivo y un verbo cognados de la raíz הבל («vanidad», «vaciedad», «futilidad»), creando un juego de palabras enfático difícil de reproducir plenamente en español.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הֵן
  english_pob_choice: Look
  chosen_spanish: Miren
  alternatives_spanish:
  - Vean
  - Miren ustedes
  - He aquí
  lexicon: HALOT
  rationale: La partícula introduce una llamada enfática a prestar atención. 'Miren' conserva ese impulso directo en español moderno y suena más natural que 'He aquí'.
- source_word: אַתֶּם כֻּלְּכֶם
  english_pob_choice: all of you
  chosen_spanish: todos ustedes
  alternatives_spanish:
  - ustedes todos
  - todos vosotros
  - todos ustedes mismos
  lexicon: HALOT
  rationale: El hebreo usa el pronombre plural más un refuerzo de totalidad. 'Todos ustedes' transmite claramente la totalidad del grupo en español neutro y conserva el énfasis.
- source_word: חֲזִיתֶם
  english_pob_choice: have seen
  chosen_spanish: lo han visto
  alternatives_spanish:
  - han visto
  - lo han percibido
  - lo vieron
  lexicon: HALOT
  rationale: El verbo sugiere haber observado directamente. 'Lo han visto' comunica el perfecto resultativo y mantiene la referencia implícita del objeto en el contexto.
- source_word: וְלָמָּה
  english_pob_choice: why then
  chosen_spanish: ¿por qué entonces?
  alternatives_spanish:
  - ¿y por qué?
  - ¿por qué, pues?
  - ¿entonces por qué?
  lexicon: HALOT
  rationale: La secuencia introduce una inferencia de reproche a partir de lo ya visto. '¿Por qué entonces?' reproduce bien ese avance argumentativo.
- source_word: הֶבֶל
  english_pob_choice: vain
  chosen_spanish: vanos
  alternatives_spanish:
  - vacíos
  - fútiles
  - vanidad
  lexicon: HALOT
  rationale: El sustantivo hebreo denota vaciedad, futilidad y vanidad. En español, 'vanos' funciona naturalmente como predicativo y preserva la carga semántica del campo 'hebel'.
- source_word: תֶּהְבָּלוּ
  english_pob_choice: do you become
  chosen_spanish: se vuelven
  alternatives_spanish:
  - se hacen
  - actúan con vanidad
  - se hacen vanos
  lexicon: HALOT
  rationale: El verbo cognado con הבל presenta una acción o estado de volverse vano/fútil. 'Se vuelven' evita sobreespecificar si la vanidad está en el hablar, pensar o actuar, y conserva la tensión del hebreo.
translation_notes:
  revision_awareness: Se tomó en cuenta la revisión del texto inglés que eliminó 'altogether' porque no está explícito en el hebreo. En español se evitó cualquier intensificación añadida, manteniendo solo el contraste inferencial de '¿por qué entonces?' y la predicación de 'vanos'.
  spanish_consistency_notes:
  - Se mantiene 'ustedes' para la segunda persona plural en español neutral.
  - Se conserva 'Yahvé' como norma general del proyecto, pero este versículo no contiene el nombre divino.
  - Se traduce el juego de palabras de הבל con una nota, sin forzar una equivalencia artificial en el texto principal.
