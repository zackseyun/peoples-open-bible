translation:
  language: es
  text: Y Shabetai y Jozabad[a], de entre los jefes de los levitas, estaban a cargo de la obra exterior de la casa de Dios.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘la obra de afuera para la casa de Dios’. La frase hebrea también puede entenderse como trabajo hecho fuera del templo propiamente dicho, en contraste con las tareas internas.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְשַׁבְּתַי
  english_pob_choice: And Shabbethai
  chosen_spanish: Y Shabetai
  alternatives_spanish:
  - Y Sabetai
  - Y Shabbetai
  lexicon: nombre propio
  rationale: Se translitera el nombre propio; en español se adapta la grafía para lectura natural, conservando la forma reconocible del hebreo. La conjunción inicial se mantiene como ‘Y’ para preservar la estructura coordinada de la lista.
- source_word: וְיוֹזָבָד
  english_pob_choice: and Jozabad
  chosen_spanish: y Jozabad
  alternatives_spanish:
  - y Jehozabad
  - y Josabad
  lexicon: nombre propio
  rationale: Se conserva el nombre propio con transliteración habitual. La forma ‘Jozabad’ sigue de cerca la tradición transliterada y evita introducir una equivalencia interpretativa.
- source_word: עַל
  english_pob_choice: were over
  chosen_spanish: estaban sobre
  alternatives_spanish:
  - estaban a cargo de
  - eran responsables de
  lexicon: HALOT
  rationale: En este contexto administrativo, עַל expresa supervisión o responsabilidad. ‘Estaban sobre’ mantiene la relación preposicional del hebreo y su valor de autoridad sin sobreparafrasear.
- source_word: הַמְּלָאכָה
  english_pob_choice: the work
  chosen_spanish: la obra
  alternatives_spanish:
  - el trabajo
  - la labor
  - el servicio
  lexicon: HALOT
  rationale: מְלָאכָה puede ser ‘obra’, ‘trabajo’ o ‘labor’. ‘Obra’ funciona bien en un contexto de tareas asignadas del templo y suena más natural en español eclesial que un calco rígido.
- source_word: הַחִיצֹנָה
  english_pob_choice: outside work
  chosen_spanish: exterior
  alternatives_spanish:
  - de afuera
  - externa
  - fuera
  lexicon: HALOT
  rationale: El adjetivo apunta a lo exterior o externo. En español, ‘obra exterior’ comunica el contraste con deberes internos del templo, manteniendo la ambigüedad útil del hebreo entre ‘trabajo de afuera’ y ‘trabajo exterior’.
- source_word: לְבֵית הָאֱלֹהִים
  english_pob_choice: of the house of God
  chosen_spanish: de la casa de Dios
  alternatives_spanish:
  - para la casa de Dios
  - en la casa de Dios
  lexicon: HALOT
  rationale: La construcción indica pertenencia o relación con la casa de Dios. ‘De la casa de Dios’ conserva la relación genitiva de manera formal y transparente.
- source_word: מֵרָאשֵׁי הַלְוִיִּם
  english_pob_choice: from the heads of the Levites
  chosen_spanish: de entre los jefes de los levitas
  alternatives_spanish:
  - de los jefes de los levitas
  - entre los principales levitas
  lexicon: HALOT
  rationale: מִן introduce procedencia o extracción. ‘De entre’ expresa mejor que eran tomados del grupo de los principales levitas, sin borrar la idea de procedencia que el hebreo conserva.
translation_notes:
  revision_awareness: 'La redacción sigue de cerca el hebreo y el audit trail inglés: se conservó la coordinación nominal, la noción de supervisión de עַל, la relación de pertenencia de לְבֵית, y la ambigüedad funcional de הַחִיצֹנָה entre ‘obra exterior’ y ‘obra de afuera’.'
  spanish_consistency_notes:
  - Se usa ‘Dios’ para הָאֱלֹהִים conforme al estándar del proyecto.
  - Se evita ‘Señor’ porque no aparece en el texto hebreo.
  - ‘Levitas’ se mantiene como término estable para הַלְוִיִּם.
  - La mayúscula en ‘Dios’ y la forma nominalizada ‘casa de Dios’ siguen el registro bíblico español moderno.
  - El nombre propio ‘Shabetai’ se adapta a la ortografía española, mientras ‘Jozabad’ se conserva en forma transliterada reconocible.
