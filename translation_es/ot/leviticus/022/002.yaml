    rationale: Aunque el hebreo permite cierta tensión en la secuencia, la decisión documentada del POB entiende אֲשֶׁר הֵם מַקְדִּשִׁים לִי como referido a «las cosas santas». En español, «mi santo nombre, el cual...» prácticamente fija el referente en «nombre», oscureciendo la lectura preferida.
  - severity: low
