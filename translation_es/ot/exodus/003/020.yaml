- from: Y yo extenderé mi mano y heriré a Egipto con todas mis maravillas que haré en medio de él[a]; y después de eso él los dejará salir[b].
  to: Y yo extenderé mi mano y heriré a Egipto con todas mis maravillas que haré en medio de Egipto[a]; y después de eso los enviará fuera[b].
  rationale: La revisión corrige la principal desviación semántica del borrador al restaurar en la cláusula final el verbo de «enviar/sacar fuera», en línea con el hebreo y con la decisión léxica auditada por el English POB. También mejora la naturalidad del español al cambiar «en medio de él» por «en medio de Egipto», conservando en nota la observación sobre el sufijo singular.
