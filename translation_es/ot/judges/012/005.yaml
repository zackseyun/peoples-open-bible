translation:
  language: es
  text: 'Y Galaad capturó los vados[a] del Jordán contra Efraín. Y siempre que los fugitivos de Efraín decían: «Déjame cruzar», los hombres de Galaad le decían: «¿Eres un efraimita?». Si él decía: «No»,'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Vados» traduce con precisión los pasos poco profundos para cruzar un río; la alternativa más literal sería «lugares de cruce».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּלְכֹּד
  english_pob_choice: captured
  chosen_spanish: capturó
  alternatives_spanish:
  - tomó
  - se apoderó de
  lexicon: HALOT
  rationale: לכד en contexto militar expresa tomar por fuerza o apoderarse de un punto estratégico; «capturó» conserva la acción bélica y la concisión del pasaje.
- source_word: מַעְבְּרוֹת
  english_pob_choice: fords
  chosen_spanish: los vados
  alternatives_spanish:
  - los lugares de paso
  - los cruces
  lexicon: HALOT
  rationale: El hebreo se refiere a los pasos poco profundos del río para cruzarlo. En español, «vados» es el equivalente técnico y natural para ese lugar de cruce.
- source_word: לְאֶפְרָיִם
  english_pob_choice: against Ephraim
  chosen_spanish: contra Efraín
  alternatives_spanish:
  - para Efraín
  - hacia Efraín
  lexicon: HALOT
  rationale: 'La preposición ל aquí tiene fuerza hostil o de referencia adversativa en el contexto: Gilead ocupó los pasos para bloquear el acceso de Efraín. «Contra» comunica esa relación mejor que una versión direccional neutra.'
- source_word: וְהָיָה כִּי
  english_pob_choice: And whenever
  chosen_spanish: Y cuando
  alternatives_spanish:
  - Y siempre que
  - Y sucedía que cuando
  lexicon: HALOT
  rationale: La construcción introduce una situación repetida. «Y cuando» mantiene la continuidad narrativa; el valor iterativo queda reforzado por el contexto, sin volver la frase pesada.
- source_word: פְּלִיטֵי אֶפְרַיִם
  english_pob_choice: the fugitives of Ephraim
  chosen_spanish: los fugitivos de Efraín
  alternatives_spanish:
  - los escapados de Efraín
  - los supervivientes de Efraín
  lexicon: HALOT
  rationale: פּליט designa a quienes escaparon, a menudo de la derrota o del combate. «Fugitivos» conserva esa fuerza y encaja con la escena de hombres intentando huir.
- source_word: אֶעֱבֹרָה
  english_pob_choice: Let me cross over
  chosen_spanish: Déjame cruzar
  alternatives_spanish:
  - Permíteme cruzar
  - Voy a cruzar
  lexicon: HALOT
  rationale: El cohortativo de primera persona expresa petición o deseo. En español, «Déjame cruzar» transmite bien el valor requestivo y suena natural en el diálogo.
- source_word: הַאֶפְרָתִי
  english_pob_choice: an Ephraimite
  chosen_spanish: un efraimita
  alternatives_spanish:
  - el efraimita
  lexicon: HALOT
  rationale: 'El gentilicio pregunta por identidad tribal. En pregunta directa, el español suele preferir el predicado indefinido: «¿Eres un efraimita?»; aquí se mantiene la forma breve y natural «¿Eres un efraimita?» pero en una fórmula más fluida dentro del diálogo.'
- source_word: וַיֹּאמְרוּ לוֹ ... אַתָּה
  english_pob_choice: would say to him, “Are you an Ephraimite?”
  chosen_spanish: 'le decían: «¿Eres un efraimita?»'
  alternatives_spanish:
  - 'le dirían: «¿Eres un efraimita?»'
  - 'le preguntaban: «¿Eres un efraimita?»'
  lexicon: HALOT
  rationale: El hebreo narra una acción repetida en secuencia. En español, «le decían» mantiene la iteración y la forma interrogativa expresa el contenido directo del dicho sin sobrecargar la frase.
- source_word: וַיֹּאמֶר לֹא
  english_pob_choice: If he said, “No,”
  chosen_spanish: 'Y si él respondía: «No»,'
  alternatives_spanish:
  - 'Y si decía: «No»,'
  - 'Si él decía: «No»,'
  lexicon: HALOT
  rationale: La forma verbal funciona condicionalmente dentro del procedimiento narrativo. «Y si él respondía» preserva esa lógica secuencial y el valor de réplica breve del rechazo.
translation_notes:
  revision_awareness: 'Se ha seguido de cerca el sentido del hebreo y el trazado auditado en inglés: 1) se conserva el matiz militar de «capturó»; 2) se explicita la relación hostil de ל con «contra»; 3) se mantiene el valor iterativo del relato con «Y cuando» y «le decían»; 4) se traduce el cohortativo como petición natural en español; 5) se elige «vados» como equivalente técnico de מַעְבְּרוֹת, dejando constancia de la alternativa «lugares de cruce».'
  spanish_consistency_notes:
  - Se usa «Gilead» y «Efraín» de manera consistente con los nombres propios del texto fuente.
  - Se mantiene el tono narrativo sobrio y bíblico, sin arcaísmos innecesarios.
  - La interrogación «¿Eres un efraimita?» conserva la identidad tribal como predicado nominal natural en español.
  - La cláusula final queda abierta con la coma, siguiendo el encadenamiento procedimental del verso.
