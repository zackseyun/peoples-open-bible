id: NAM.3.15
reference: Nahum 3:15
source:
  edition: WLC
  text: שָׁ֚ם תֹּאכְלֵ֣/ךְ אֵ֔שׁ תַּכְרִיתֵ֣/ךְ חֶ֔רֶב תֹּאכְלֵ֖/ךְ כַּ/יָּ֑לֶק הִתְכַּבֵּ֣ד כַּ/יֶּ֔לֶק הִֽתְכַּבְּדִ֖י כָּ/אַרְבֶּֽה׃
translation:
  text: There the fire will devour you; the sword will cut you off; it will devour you like the locust[a]. Multiply yourself like the locust; multiply yourself like the swarming locust.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew uses two related insect terms here: one often rendered a kind or stage of locust (יֶלֶק), and another the common term for locust (אַרְבֶּה). The main text renders them as ''locust'' and ''swarming locust'' for clarity.'
    reason: lexical_alternative
lexical_decisions:
- source_word: שָׁם
  chosen: There
  alternatives:
  - There, in that place
  lexicon: HALOT
  rationale: Locative adverb pointing to the very place Nineveh thinks secure; simple 'There' preserves the force without expansion.
- source_word: תֹּאכְלֵךְ ... אֵשׁ
  chosen: the fire will devour you
  alternatives:
  - fire will consume you
  - fire will eat you
  lexicon: HALOT
  rationale: אָכַל literally means 'eat/devour.' With fire as subject, 'devour' is idiomatic English and preserves the vivid destructive imagery better than the flatter 'consume.'
- source_word: תַּכְרִיתֵךְ חֶרֶב
  chosen: the sword will cut you off
  alternatives:
  - the sword will destroy you
  - the sword will exterminate you
  lexicon: HALOT
  rationale: Hiphil of כרת commonly carries the sense 'cut off, destroy.' 'Cut you off' preserves the lexical image and covenant-judgment resonance while remaining natural English.
- source_word: תֹּאכְלֵךְ
  chosen: it will devour you
  alternatives:
  - it will consume you
  lexicon: HALOT
  rationale: The repeated verb is retained with the same English gloss for consistency. The implied subject is the sword/judgment just mentioned; 'it' reflects the Hebrew repetition without over-specifying.
- source_word: כַּיָּלֶק
  chosen: like the locust
  alternatives:
  - like the licking locust
  - like the young locust
  lexicon: HALOT
  rationale: יֶלֶק denotes a locust/caterpillar-like devouring insect. Because English readers generally do not distinguish the specific locust stages clearly, 'locust' communicates the image accessibly. The more specific nuance is preserved in a footnote.
- source_word: הִתְכַּבֵּד
  chosen: Multiply yourself
  alternatives:
  - Make yourself many
  - Make yourself heavy
  - Increase yourself
  lexicon: HALOT
  rationale: Hitpael imperative of כבד literally relates to becoming heavy/numerous. In this taunting context, the sense is to increase in number like locusts. 'Multiply yourself' best conveys the ironic summons in idiomatic English.
- source_word: כַּיֶּלֶק
  chosen: like the locust
  alternatives:
  - like the young locust
  lexicon: HALOT
  rationale: The repeated comparison is kept parallel in English. Although the Hebrew form may suggest a particular locust type or stage, consistency and readability favor 'locust' in the main text.
- source_word: הִתְכַּבְּדִי
  chosen: multiply yourself
  alternatives:
  - increase yourself
  - make yourself many
  lexicon: HALOT
  rationale: Second imperative, feminine singular, matching the addressee city. Lowercase after semicolon follows English punctuation, while preserving the repeated taunt.
- source_word: כָּאַרְבֶּה
  chosen: like the swarming locust
  alternatives:
  - like the locust
  - like the grasshopper
  lexicon: HALOT
  rationale: אַרְבֶּה is the common term for locust, often emphasizing the massed swarm. Rendering it 'swarming locust' differentiates it from יֶלֶק and preserves the intensification of the imagery.
