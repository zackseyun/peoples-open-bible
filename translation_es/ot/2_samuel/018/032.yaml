base_translation:
  language: en
  yaml_path: translation/ot/2_samuel/018/032.yaml
  text: Then the king said to the Cushite[a], “Is it well with the young man Absalom?” And the Cushite said, “May the enemies of my lord the king, and all who rise up against you for evil[b], be like that young man.”
  footnotes:
  - marker: a
    text: Or “Is the young man Absalom safe?” The Hebrew asks literally about his ‘peace/well-being’ (shalom), a broader term than mere survival.
    reason: lexical_alternative
  - marker: b
    text: 'The Cushite answers indirectly: his words imply that Absalom has met the fate appropriate to the king’s enemies, rather than stating the death explicitly.'
    reason: cultural_note
