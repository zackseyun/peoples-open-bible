translation:
  language: es
  text: Entonces, Zorobabel hijo de Salatiel y Jesúa hijo de Josedec se levantaron y comenzaron a edificar la casa de Yahvé en Jerusalén[a], mientras los profetas de Yahvé estaban con ellos[c][b], ayudándolos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «se alzaron». El participio griego puede marcar el iniciar una acción, no solo el acto físico de ponerse de pie.
    reason: lexical_alternative
  - marker: b
    text: El griego Ἰησοῦς es la misma forma que suele verterse «Jesús» en contextos griegos; aquí se refiere al sumo sacerdote postexílico, no a Jesús de Nazaret.
    reason: lexical_alternative
  - marker: c
    text: El paralelo hebreo menciona a Hageo y Zacarías entre los profetas que apoyaban la reconstrucción, aunque este versículo griego los nombra solo como «los profetas de Yahvé».
    reason: cross_reference
lexical_decisions:
- source_word: τότε
  english_pob_choice: Then
  chosen_spanish: Entonces
  alternatives_spanish:
  - Luego
  - En aquel tiempo
  lexicon: LSJ
  rationale: Marca la secuencia narrativa inmediata; «Entonces» es natural en español y conserva el valor temporal del conector.
- source_word: στάς
  english_pob_choice: stood up
  chosen_spanish: se levantaron
  alternatives_spanish:
  - se pusieron de pie
  - se alzaron
  lexicon: LSJ
  rationale: El participio aoristo de ἵστημι puede expresar iniciar acción. En español, «se levantaron» comunica bien el inicio de la acción sin forzar una imagen demasiado literal.
- source_word: Ζοροβαβὲλ ὁ τοῦ Σαλαθιὴλ
  english_pob_choice: Zerubbabel son of Salathiel
  chosen_spanish: Zerobabel hijo de Salatiel
  alternatives_spanish:
  - Zorobabel hijo de Salatiel
  - Zerubbabel hijo de Salatiel
  lexicon: LSJ
  rationale: Se conserva el nombre bíblico conocido en español con forma transparente; «Salatiel» sigue la forma griega del texto fuente.
- source_word: Ἰησοῦς ὁ τοῦ Ἰωσεδὲκ
  english_pob_choice: Jeshua son of Josedek
  chosen_spanish: Jesúa hijo de Josadac
  alternatives_spanish:
  - Jeshúa hijo de Josadac
  - Jesús hijo de Josadac
  - Josué hijo de Josadac
  lexicon: LSJ
  rationale: El griego usa Ἰησοῦς, pero aquí refiere al sumo sacerdote postexílico. «Jesúa» evita confusión con Jesús de Nazaret y conserva la referencia histórica; «Josadac» refleja la forma griega del nombre.
- source_word: ἤρξαντο οἰκοδομεῖν
  english_pob_choice: began to build
  chosen_spanish: comenzaron a edificar
  alternatives_spanish:
  - comenzaron a construir
  - empezaron a edificar
  lexicon: LSJ
  rationale: La construcción inceptiva se expresa con claridad en español. «Edificar» mantiene el registro bíblico y se ajusta bien al objeto sagrado.
- source_word: τὸν οἶκον τοῦ κυρίου
  english_pob_choice: the house of the Lord
  chosen_spanish: la casa de Yahvé
  alternatives_spanish:
  - la casa del Señor
  - el templo de Yahvé
  lexicon: LSJ
  rationale: Se sigue la directriz del proyecto de usar «Yahvé» para el nombre divino. «Casa» refleja el sustantivo del original y evita sustituirlo prematuramente por «templo».
- source_word: τὸν ἐν Ἰερουσαλήμ
  english_pob_choice: in Jerusalem
  chosen_spanish: en Jerusalén
  alternatives_spanish:
  - que estaba en Jerusalén
  - la cual estaba en Jerusalén
  lexicon: LSJ
  rationale: La frase atributiva se integra de forma natural en español como localización simple.
- source_word: συνόντων
  english_pob_choice: while the prophets of the Lord were with them
  chosen_spanish: mientras los profetas de Yahvé estaban con ellos
  alternatives_spanish:
  - con los profetas de Yahvé junto a ellos
  - mientras acompañaban a los profetas de Yahvé
  lexicon: LSJ
  rationale: La idea de circunstancia concomitante se vierte con «mientras ... estaban con ellos», que en español suena fluido y mantiene la presencia de apoyo.
- source_word: τῶν προφητῶν τοῦ κυρίου
  english_pob_choice: the prophets of the Lord
  chosen_spanish: los profetas de Yahvé
  alternatives_spanish:
  - los profetas del Señor
  - los profetas de Dios
  lexicon: LSJ
  rationale: Como κυρίου remite al nombre divino en este contexto bíblico, se usa «Yahvé» conforme a la norma del proyecto, preservando la relación posesiva del texto griego.
- source_word: βοηθούντων αὐτοῖς
  english_pob_choice: helping them
  chosen_spanish: ayudándolos
  alternatives_spanish:
  - asistiéndolos
  - apoyándolos
  lexicon: LSJ
  rationale: Participio presente de ayuda práctica y sostenida. «Ayudándolos» es claro, natural y suficientemente cercano al valor del original.
theological_decisions:
- issue: Render de κύριος en un contexto del templo con referencia al Dios de Israel
  english_pob_reading: Lord
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Señor
  - el Señor
  rationale: Aunque la POB inglesa usa «Lord» para κύριος, la directriz del proyecto en español pide «Yahvé» cuando el griego κύριος cita o alude al nombre divino. Aquí el sintagma «del Señor»/«de Yahvé» identifica claramente al Dios de Israel, no a un título humano.
  doctrine_reference: 'DOCTRINE.md Contested terms: κύριος → Yahvé / Lord in Spanish context'
- issue: Identidad de Ἰησοῦς en el período postexílico
  english_pob_reading: Jeshua son of Josedek
  chosen_spanish_reading: Jesúa hijo de Josadac
  alternative_spanish_readings:
  - Jesús hijo de Josadac
  - Josué hijo de Josadac
  rationale: Se conserva la persona histórica del sumo sacerdote postexílico evitando una lectura cristológica accidental. La forma española tradicional «Jesúa» reduce ambigüedad sin traicionar el nombre griego.
  doctrine_reference: 'PHILOSOPHY.md: deuterocanonical Greek source; context governs historical referent'
- issue: Presencia de los profetas en la reconstrucción
  english_pob_reading: while the prophets of the Lord were with them, helping them
  chosen_spanish_reading: mientras los profetas de Yahvé estaban con ellos, ayudándolos
  alternative_spanish_readings:
  - con los profetas de Yahvé ayudándolos
  - mientras los profetas de Yahvé los ayudaban
  rationale: La formulación mantiene tanto la compañía como la asistencia activa de los profetas. No se introducen nombres propios del paralelo hebreo en el texto principal, porque el griego aquí los deja genéricos.
  doctrine_reference: 'PHILOSOPHY.md: Greek source primary; parallel MT as cross-check only'
translation_notes:
  revision_awareness: 'Se siguió el estado revisado más reciente del audit trail: la cláusula final se entendió como una circunstancia concomitante («mientras ... estaban con ellos, ayudándolos») y no como una redundancia literal. Se mantuvo la prioridad del griego como fuente principal, usando el paralelo hebreo solo para la nota de contexto profético.'
  spanish_consistency_notes:
  - Se usó «Yahvé» conforme a la terminología por defecto del proyecto para el nombre divino.
  - Se evitó «Cristo» y se mantuvo el nombre histórico «Jesúa» para no confundir al lector con Jesús de Nazaret.
  - «Casa» se conservó para reflejar οἶκος y no reemplazarlo por una interpretación más explícita como «templo».
  - La puntuación sigue el español estándar y conserva una sola oración principal con la estructura subordinada del original.
