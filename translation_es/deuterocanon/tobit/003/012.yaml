translation:
  language: es
  text: Y ahora, Señor, he puesto mis ojos y mi rostro hacia ti.[a]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O más literalmente: «he dado mis ojos y mi rostro a ti». El griego usa lenguaje corporal de modo idiomático para expresar la orientación del orante hacia Dios.'
    reason: lexical_alternative
lexical_decisions:
- source_word: καὶ νῦν
  english_pob_choice: And now
  chosen_spanish: Y ahora
  alternatives_spanish:
  - Y ahora bien
  - Y ahora mismo
  lexicon: LSJ
  rationale: Expresa el giro inmediato de la oración con una transición natural en español, sin añadir énfasis no presente en el griego.
- source_word: Κύριε
  english_pob_choice: Lord
  chosen_spanish: Señor
  alternatives_spanish:
  - Oh Señor
  lexicon: LSJ
  rationale: En vocativo dirigido a Dios, 'Señor' reproduce la función reverencial de Κύριε y se ajusta al uso litúrgico y bíblico en español; se omite 'Oh' por naturalidad, como hace la POB en inglés.
- source_word: τοὺς ὀφθαλμούς μου
  english_pob_choice: my eyes
  chosen_spanish: mis ojos
  alternatives_spanish:
  - mi mirada
  lexicon: LSJ
  rationale: Se conserva la imagen corporal concreta de los 'ojos', que prepara el paralelismo con 'rostro' y evita abstraer el lenguaje de la oración.
- source_word: τὸ πρόσωπόν μου
  english_pob_choice: my face
  chosen_spanish: mi rostro
  alternatives_spanish:
  - mi semblante
  - mi presencia
  lexicon: LSJ
  rationale: '''Rostro'' es el equivalente español más directo y digno para πρόσωπον en este paralelismo con ''ojos''; mantiene la orientación física de la plegaria mejor que una paráfrasis como ''presencia''.'
- source_word: εἰς σὲ
  english_pob_choice: toward you
  chosen_spanish: hacia ti
  alternatives_spanish:
  - a ti
  - para ti
  lexicon: LSJ
  rationale: '''Hacia ti'' conserva la dirección espacial implícita en εἰς y refleja mejor la orientación del orante que un simple dativo español como ''a ti''.'
- source_word: δέδωκα
  english_pob_choice: I have set
  chosen_spanish: he puesto
  alternatives_spanish:
  - he dado
  - he dirigido
  - he vuelto
  lexicon: LSJ
  rationale: Aunque el perfecto de δίδωμι es literalmente 'he dado', en este contexto idiomático de ojos y rostro hacia Dios, 'he puesto' expresa la acción deliberada de orientar el cuerpo en oración sin perder la fuerza perfecta del griego.
theological_decisions:
- issue: Tratamiento de Κύριε como vocativo en una oración dirigida a Dios
  english_pob_reading: Lord
  chosen_spanish_reading: Señor
  alternative_spanish_readings:
  - Oh Señor
  rationale: La escena es una súplica directa a Dios; por eso se traduce el vocativo con 'Señor' sin convertirlo en un título encubierto ni introducir una mayúscula devocional añadida. 'Señor' sigue la equivalencia establecida para κύριος en el proyecto.
  doctrine_reference: 'DOCTRINE.md: Contested terms table, κύριος → Lord'
translation_notes:
  revision_awareness: La revisión inglesa más reciente indica que no se requieren cambios; esta versión española sigue la misma lectura de alta concordancia y conserva la tensión idiomática entre la literalidad ('he dado') y la equivalencia dinámica ('he puesto') mediante una nota textual.
  spanish_consistency_notes:
  - Se mantiene 'Señor' para Κύριε, conforme al uso del proyecto para el vocativo de κύριος.
  - Se conserva el paralelismo corporal 'ojos' / 'rostro' para no diluir la imaginería del texto griego.
  - '''Hacia ti'' reproduce la direccionalidad de εἰς σὲ sin volverla pesada en español.'
