translation:
  language: es
  text: 'Entonces José dijo a sus hermanos: «Yo soy José. ¿Todavía vive mi padre?». Pero sus hermanos no pudieron responderle, porque estaban consternados ante su presencia[a].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literalmente, «desde delante de él/su rostro», una expresión hebrea que indica el efecto de estar en la presencia de alguien. También puede entenderse «delante de él» o «al verlo».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר
  english_pob_choice: Then ... said
  chosen_spanish: Entonces ... dijo
  alternatives_spanish:
  - Y ... dijo
  lexicon: HALOT
  rationale: La partícula narrativa con waw consecutiva avanza la escena; «Entonces» mantiene la secuencia natural en español sin perder el valor narrativo.
- source_word: אֶל אֶחָיו
  english_pob_choice: to his brothers
  chosen_spanish: a sus hermanos
  alternatives_spanish:
  - a sus hermanos varones
  lexicon: HALOT
  rationale: En este contexto el referente son los hermanos de José; «a sus hermanos» es natural y fiel al destinatario del discurso.
- source_word: אֲנִי יוֹסֵף
  english_pob_choice: I am Joseph
  chosen_spanish: Yo soy José
  alternatives_spanish:
  - Yo soy Yosef
  lexicon: HALOT
  rationale: La autoidentificación exige una forma clara y directa; «José» es la forma usual en español y conserva la identificación personal sin transliteración innecesaria.
- source_word: הַעוֹד ... חָי
  english_pob_choice: Is my father still alive?
  chosen_spanish: ¿Sigue vivo todavía mi padre?
  alternatives_spanish:
  - ¿Está todavía vivo mi padre?
  - ¿Mi padre sigue vivo?
  lexicon: HALOT
  rationale: El hebreo pregunta si una condición continúa; «sigue vivo todavía» refleja el sentido aspectual de continuidad. Se mantiene «vivo» por ser la equivalencia natural de חָי en esta construcción.
- source_word: וְלֹא יָכְלוּ
  english_pob_choice: could not
  chosen_spanish: no pudieron
  alternatives_spanish:
  - no fueron capaces de
  - no les fue posible
  lexicon: HALOT
  rationale: «Pudieron»/«pudieron» expresa correctamente la incapacidad para responder y suena más idiomático que una construcción más pesada.
- source_word: לַעֲנוֹת אֹתוֹ
  english_pob_choice: to answer him
  chosen_spanish: responderle
  alternatives_spanish:
  - contestarle
  - darle respuesta
  lexicon: HALOT
  rationale: ענה aquí es responder en conversación; «responderle» es conciso, claro y mantiene el valor comunicativo del verbo.
- source_word: כִּי נִבְהֲלוּ
  english_pob_choice: because they were dismayed
  chosen_spanish: porque estaban consternados
  alternatives_spanish:
  - porque estaban turbados
  - porque se habían atemorizado
  - porque estaban desconcertados
  lexicon: HALOT
  rationale: נבהל indica una fuerte perturbación/consternación; «consternados» preserva la intensidad sin exagerarla a «aterrorizados», acorde con la revisión inglesa que evitó sobretraducir el verbo.
- source_word: מִפָּנָיו
  english_pob_choice: at his presence
  chosen_spanish: ante su presencia
  alternatives_spanish:
  - delante de él
  - por su presencia
  - a causa de su presencia
  lexicon: HALOT
  rationale: La expresión hebrea literalmente alude a estar «delante de su faz/presencia»; «ante su presencia» conserva el giro idiomático y su efecto causal/escénico en español.
translation_notes:
  revision_awareness: La versión inglesa más reciente cambió «were not able to answer» por «could not answer» y «were terrified» por «were dismayed» para ajustar el inglés al hebreo sin exagerar. En español, la elección «no pudieron responderle» y «consternados» sigue esa misma moderación y evita intensificar el verbo מעבר a un miedo mayor que el texto no exige.
  spanish_consistency_notes:
  - Se mantiene «José» como forma española convencional del nombre.
  - Se usa «responderle» en lugar de «contestarle» por fluidez, sin alterar el sentido.
  - «Ante su presencia» conserva la imagen hebrea de מִפָּנָיו sin volverla explicativa en exceso.
