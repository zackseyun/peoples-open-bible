translation:
  language: es
  text: Y los hijos de Aarón lo quemarán sobre el altar, sobre el holocausto que está sobre la leña que está sobre el fuego. Es una ofrenda presentada por fuego[a], un aroma agradable para Yahvé.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, «una ofrenda de fuego».
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהִקְטִירוּ
  english_pob_choice: shall burn
  chosen_spanish: lo quemarán
  alternatives_spanish:
  - lo harán humear
  - lo ofrecerán en humo
  lexicon: HALOT
  rationale: En contexto sacrificial, el verbo describe la acción de quemar la porción sobre el altar para que suba en humo. En español, «quemarán» comunica con claridad esa acción ritual sin forzar un calco técnico poco natural.
- source_word: בְנֵי אַהֲרֹן
  english_pob_choice: Aaron’s sons
  chosen_spanish: los hijos de Aarón
  alternatives_spanish:
  - los hijos de Aarón
  - los descendientes de Aarón
  lexicon: HALOT
  rationale: «Hijos de Aarón» reproduce de manera directa y natural la relación genealógica y sacerdotal del hebreo, y evita una paráfrasis más amplia que diluiría el enlace con el linaje sacerdotal.
- source_word: הַמִּזְבֵּחָה
  english_pob_choice: on the altar
  chosen_spanish: sobre el altar
  alternatives_spanish:
  - en el altar
  - encima del altar
  lexicon: HALOT
  rationale: La imagen es locativa y ritual; «sobre el altar» conserva la dirección y la colocación del acto sacrificial en un español claro y digno.
- source_word: עַל הָעֹלָה
  english_pob_choice: on top of the burnt offering
  chosen_spanish: sobre el holocausto
  alternatives_spanish:
  - encima del holocausto
  - sobre la ofrenda quemada
  lexicon: HALOT
  rationale: 'El hebreo indica superposición: la porción se quema sobre la ofrenda ya colocada. «Holocausto» es el término tradicional y preciso en español bíblico para עֹלָה; se mantiene por fidelidad y legibilidad.'
- source_word: אֲשֶׁר עַל הָעֵצִים אֲשֶׁר עַל הָאֵשׁ
  english_pob_choice: that is on the wood that is on the fire
  chosen_spanish: que está sobre la leña que está sobre el fuego
  alternatives_spanish:
  - que está sobre la madera que está sobre el fuego
  - que está sobre los leños que están sobre el fuego
  lexicon: HALOT
  rationale: «Leña» expresa bien עֵצִים en el contexto del altar. La cadena repetida de relaciones «que está sobre...» conserva la estructura escalonada del hebreo sin volverla oscura en español.
- source_word: אִשֵּׁה
  english_pob_choice: a food offering
  chosen_spanish: una ofrenda
  alternatives_spanish:
  - una ofrenda hecha por fuego
  - una ofrenda de fuego
  lexicon: HALOT
  rationale: El POB inglés opta por «food offering» para el valor cultual del término, pero en español esa solución sería menos transparente y podría sonar extraña. Aquí se conserva el sentido sacrificial general en el cuerpo del texto y se explicita la alternativa técnica en nota.
- source_word: רֵיחַ נִיחֹחַ
  english_pob_choice: a pleasing aroma
  chosen_spanish: de aroma agradable
  alternatives_spanish:
  - de aroma placentero
  - de aroma suave
  lexicon: HALOT
  rationale: La fórmula fija comunica aceptación y deleite ritual. «Aroma agradable» es natural en español y preserva el valor idiomático sin interpretar más de lo que el hebreo dice.
- source_word: לַיהוָה
  english_pob_choice: to Yahweh
  chosen_spanish: para Yahvé
  alternatives_spanish:
  - a Yahvé
  - para el SEÑOR
  lexicon: HALOT
  rationale: Se mantiene el nombre divino como «Yahvé» conforme al criterio del proyecto. La preposición «para» expresa bien la orientación/dedicación del sacrificio dentro de la fórmula cultual.
theological_decisions:
- issue: Valor sacrificial de אִשֵּׁה en la fórmula cultual
  english_pob_reading: food offering
  chosen_spanish_reading: ofrenda
  alternative_spanish_readings:
  - ofrenda hecha por fuego
  - ofrenda de fuego
  rationale: El término hebreo es técnico y su sentido está ligado al rito del altar. En español, «ofrenda» mantiene la función cultual sin introducir un calco poco idiomático; la alternativa más técnica queda disponible en nota para no borrar la tensión léxica.
  doctrine_reference: DOCTRINE.md Translation philosophy §§1, 6
- issue: Nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - el SEÑOR
  rationale: El texto hebreo usa el Tetragrámaton de forma explícita. Siguiendo el principio del proyecto, se lo translitera como «Yahvé» para conservar el nombre del pacto y evitar el ocultamiento convencional.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
translation_notes:
  revision_awareness: El texto inglés auditado no requirió cambios en la última revisión; la formulación española mantiene el contenido semántico y la estructura ritual del hebreo, con una adaptación idiomática mínima para publicar en español.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» de forma consistente para יהוה.
  - Se conserva «holocausto» para עֹלָה por ser el término bíblico español más asentado en este contexto ritual.
  - Se usa «leña» para עֵצִים porque en español suena más natural que «madera» dentro de la escena del altar.
  - La secuencia repetida «que está sobre...» reproduce la progresión espacial del hebreo sin omitir ninguno de los niveles descritos.
