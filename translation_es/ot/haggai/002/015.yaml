translation:
  language: es
  text: 'Y ahora[a], por favor, presten atención a esto: desde hoy en adelante, antes de que se pusiera una piedra sobre otra en el templo de Yahvé,'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, de manera más literal, «pongan su corazón en esto». También puede traducirse de manera más interpretativa: «consideren desde hoy en adelante».'
