translation:
  language: es
  text: El que practica el engaño[a] no habitará dentro de mi casa; el que habla mentiras no estará[b] delante de mis ojos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «el que hace engaño». El hebreo dice literalmente «el que hace engaño», una forma participial que señala conducta habitual.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «no se afirmará delante de mis ojos». El verbo hebreo puede significar «ser establecido» o «estar firme»; aquí probablemente expresa que tal persona no será permitida permanecer en la presencia del hablante.'
    reason: lexical_alternative
lexical_decisions:
- source_word: יֵשֵׁב
  english_pob_choice: will not dwell
  chosen_spanish: habitará
  alternatives_spanish:
  - se sentará
  - permanecerá
  - residirá
  lexicon: HALOT
  rationale: En este contexto, יֵשֵׁב expresa residencia o permanencia admitida en la casa. "Habitará" comunica esa idea de manera natural en español y mantiene la noción de presencia continua, mejor que un calco como "se sentará".
- source_word: בְּקֶרֶב בֵּיתִי
  english_pob_choice: within my house
  chosen_spanish: dentro de mi casa
  alternatives_spanish:
  - en medio de mi casa
  - en el interior de mi casa
  - en mi casa
  lexicon: HALOT
  rationale: בְּקֶרֶב significa "en medio de / dentro de". "Dentro de mi casa" conserva la interioridad y suena idiomático en español sin perder el matiz de pertenencia y acceso al ámbito del hablante.
- source_word: עֹשֵׂה רְמִיָּה
  english_pob_choice: one who practices deceit
  chosen_spanish: el que practica el engaño
  alternatives_spanish:
  - el que hace engaño
  - el engañador
  - el que obra con engaño
  lexicon: HALOT
  rationale: La construcción participial indica conducta habitual. "Practica el engaño" preserva el valor verbal y caracterológico; "engaño" rinde רְמִיָּה con un sustantivo natural en español, sin suavizar la idea de conducta engañosa.
- source_word: דֹּבֵר שְׁקָרִים
  english_pob_choice: one who speaks lies
  chosen_spanish: el que habla mentiras
  alternatives_spanish:
  - el que dice mentiras
  - el mentiroso
  - el que habla falsedades
  lexicon: HALOT
  rationale: דֹּבֵר mantiene la forma verbal, por lo que "el que habla mentiras" reproduce mejor el paralelismo con la cláusula anterior que un simple sustantivo como "mentiroso". El plural שְׁקָרִים se refleja con "mentiras".
- source_word: יִכּוֹן
  english_pob_choice: will not stand
  chosen_spanish: no permanecerá
  alternatives_spanish:
  - no se afirmará
  - no estará firme
  - no se mantendrá
  lexicon: HALOT
  rationale: Aunque el verbo puede significar "estar firme / ser establecido / permanecer", aquí la frase "delante de mis ojos" pide un sentido de permanencia o admisión en la presencia del hablante. "No permanecerá" conserva la idea sin introducir una imagen judicial demasiado específica.
- source_word: לְנֶגֶד עֵינַי
  english_pob_choice: before my eyes
  chosen_spanish: delante de mis ojos
  alternatives_spanish:
  - ante mis ojos
  - frente a mis ojos
  - en mi presencia
  lexicon: HALOT
  rationale: La expresión hebrea es literalmente "frente a / delante de mis ojos". "Delante de mis ojos" mantiene la imagen visual y la evaluación personal del hablante con un español claro y solemne.
theological_decisions:
- issue: Ámbito de la exclusión del engañoso
  english_pob_reading: The verse is a personal/royal commitment about who may remain in the psalmist's household and presence, not a generalized claim about God's house.
  chosen_spanish_reading: 'Se conserva el compromiso personal del salmista: habla de su casa y de sus ojos, no de la casa de Dios ni de una afirmación doctrinal universal.'
  alternative_spanish_readings:
  - No habitará en la casa de Dios
  - No permanecerá en la presencia de Dios
  - No se trata de una mera metáfora moral interior
  rationale: Los posesivos de primera persona en hebreo son decisivos. La traducción evita espiritualizar o universalizar el texto más allá de lo que el verso dice, preservando el marco real/personal del salmo.
  doctrine_reference: 'Translation philosophy: original-language primacy over translation tradition; preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: 'El pasaje coincide de cerca con el análisis auditado del inglés POB: se preserva el paralelismo entre conducta engañosa y discurso falso, y se mantiene la decisión de traducir יִכּוֹן con un verbo de permanencia/presencia en español, sin convertirlo en una afirmación doctrinal más amplia.'
  spanish_consistency_notes:
  - Se mantuvo "engaño" para רְמִיָּה y "mentiras" para שְׁקָרִים, respetando la diferencia semántica entre conducta y discurso.
  - Se evitó "SEÑOR" o referencias a Yahvé porque el verso no contiene el nombre divino.
  - Se preservó la primera persona posesiva ('mi casa', 'mis ojos') para reflejar el alcance personal del compromiso del hablante.
