translation:
  language: es
  text: Y él mismo los aplastará delante de nosotros; pero ustedes no les teman.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: συντρίψει
  english_pob_choice: will crush
  chosen_spanish: los aplastará
  alternatives_spanish:
  - los quebrará
  - los hará pedazos
  lexicon: LSJ
  rationale: El futuro de συντρίβω expresa una acción violenta de romper o destrozar. «Aplastar» conserva la fuerza bélica y suena natural en español; «quebrar» puede sonar más débil o más genérico, y «hacer pedazos» es más expresivo pero menos sobrio.
- source_word: πρὸ προσώπου ἡμῶν
  english_pob_choice: before us
  chosen_spanish: delante de nosotros
  alternatives_spanish:
  - ante nosotros
  - frente a nosotros
  lexicon: LSJ
  rationale: La expresión idiomática comunica que la derrota ocurrirá en nuestra presencia o ante nuestra vista. «Delante de nosotros» mantiene esa cercanía espacial y la naturalidad en español sin forzar un calco.
- source_word: μὴ φοβηθῆτε ἀπʼ αὐτῶν
  english_pob_choice: do not fear them
  chosen_spanish: no teman a causa de ellos
  alternatives_spanish:
  - no les teman
  - no tengan miedo de ellos
  lexicon: LSJ
  rationale: El verbo con μή forma una prohibición. En español, «no teman a causa de ellos» conserva el matiz de temor provocado por el enemigo y evita sonar demasiado coloquial; «no les teman» y «no tengan miedo de ellos» también serían posibles, pero la primera es más directa y la segunda más explicativa.
- source_word: αὐτὸς
  english_pob_choice: he himself
  chosen_spanish: él mismo
  alternatives_spanish:
  - él
  - él personalmente
  lexicon: LSJ
  rationale: El pronombre es enfático. «Él mismo» preserva la idea de que la acción decisiva no proviene de la fuerza humana, sino del actor señalado con énfasis.
theological_decisions:
- issue: Énfasis del sujeto implícitamente divino en αὐτὸς
  english_pob_reading: The subject is rendered emphatically as 'he himself,' referring to God as the one who will defeat the enemies.
  chosen_spanish_reading: Se mantiene «él mismo» para conservar el énfasis del sujeto que vencerá a los enemigos, sin explicitar más de lo que el griego dice.
  alternative_spanish_readings:
  - los aplastará
  - Dios los aplastará
  rationale: El contexto presenta una exhortación de confianza; la traducción debe conservar la fuerza del énfasis sin añadir un referente explícito que el versículo no nombra. Así se preserva la tensión teológica documentada por el audit trail.
  doctrine_reference: Preservar la tensión textual; primacía del original sobre la explicitación interpretativa.
translation_notes:
  revision_awareness: El pasaje muestra alta concordancia entre el griego y el control inglés, sin revisiones aplicadas en el audit trail. Por ello, la versión española sigue de cerca la estructura del original y solo ajusta el orden para fluidez natural.
  spanish_consistency_notes:
  - Se usa «él mismo» para reflejar el énfasis de αὐτὸς.
  - Se prefiere «aplastará» para el vigor de συντρίψει.
  - Se traduce la prohibición con «no teman» en forma sobria y contemporánea.
  - Se evita introducir «SEÑOR» o una explicitación no presente en el texto griego.
