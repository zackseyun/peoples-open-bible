source:
  edition: SBLGNT
  text: συμβουλεύω σοι ἀγοράσαι ⸂παρ’ ἐμοῦ χρυσίον⸃ πεπυρωμένον ἐκ πυρὸς ἵνα πλουτήσῃς, καὶ ἱμάτια λευκὰ ἵνα περιβάλῃ καὶ μὴ φανερωθῇ ἡ αἰσχύνη τῆς γυμνότητός σου, καὶ κολλούριον ⸀ἐγχρῖσαι τοὺς ὀφθαλμούς σου ἵνα βλέπῃς.
base_translation:
  language: en
  yaml_path: translation/nt/revelation/003/018.yaml
  text: 'I counsel you to buy from me gold refined by fire so that you may become rich[a], and white garments so that you may clothe yourself and the shame of your nakedness may not be exposed[c][b], and eye salve to anoint your eyes so that you may see.'
  footnotes:
  - marker: a
    text: Or 'purified by fire' or 'tested in fire.'
    reason: lexical_alternative
  - marker: b
    text: Or 'white clothes' or, more specifically in some contexts, 'white robes.'
    reason: lexical_alternative
  - marker: c
    text: The term rendered 'eye salve' refers to a medicinal preparation applied to the eyes.
    reason: cultural_note
translation:
  language: ko
  text: '내가 너에게 권하노니, 너는 내게서 불로 정련된 금을 사서 부요하게 되라. 또 흰옷을 사서 입어 네 벌거벗은 수치가 드러나지 않게 하라. 또 안약[a]을 사서 네 눈에 발라 보게 하라.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 헬라어는 눈에 바르는 약을 가리키는 의약 용어이다.
    reason: cultural_note
