review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien el sentido básico del hebreo: imperativo dirigido a Edom, cuidado divino de los hijos sin padre, y confianza de las viudas en Dios. Sin embargo, dos elecciones no preservan tan fielmente el matiz del original ni el rastro POB en inglés: «yo les daré vida» suaviza/desplaza el sentido de preservación de אֲחַיֶּה, y «Y tus viudas confiarán en mí» pierde el matiz yusivo/exhortativo de תִּבְטָחוּ mejor representado por «que... confíen» o «confíen».'
  spanish_quality_summary: El español es claro y natural, pero puede mejorarse para sonar más preciso y más alineado con el hebreo sin volverse rígido. «Hijos sin padre» es legible y fiel; «los mantendré con vida» suena más exacto que «les daré vida» en este contexto. La segunda cláusula también gana naturalidad y fidelidad con «y que tus viudas confíen en mí».
  glossary_alignment: No hay conflicto con la terminología principal del proyecto. No aparece Yahvé en el verso, aunque el contexto presupone que habla Yahvé. La decisión «hijos sin padre» concuerda bien con la nota léxica del inglés sobre יָתוֹם. No hay otros términos-glosario sensibles en este versículo.
  issues:
  - severity: medium
    issue: «yo les daré vida» para אֲחַיֶּה
    rationale: El piʿel de חיה aquí se entiende mejor como «mantener con vida / preservar vivos» que como «dar vida», que en español puede sugerir otorgar vida en sentido originario o más teológico de lo que exige el contexto.
  - severity: medium
    issue: «Y tus viudas confiarán en mí» debilita el matiz exhortativo/yusivo
    rationale: 'תִּבְטָחוּ con el contexto y la coordinación con וְאַלְמְנֹתֶיךָ se vierte mejor como exhortación o invitación: «y que tus viudas confíen en mí» o «que... pongan su confianza en mí». El futuro indicativo español puede leerse solo como predicción.'
  - severity: low
    issue: La decisión teológica interna usa «huérfanos» mientras el texto aprobado usa «hijos sin padre»
    rationale: No afecta directamente el texto del versículo, pero conviene coherencia terminológica dentro del expediente para no reintroducir la ambigüedad que la nota intenta evitar.
  revised_spanish_text: Deja a tus hijos sin padre[a]; yo los mantendré con vida. Y que tus viudas confíen en mí.
