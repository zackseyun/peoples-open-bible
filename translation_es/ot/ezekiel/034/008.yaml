review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la estructura y el sentido general del hebreo: fórmula de juramento, causa del juicio, vulnerabilidad del rebaño por falta de pastor, negligencia de los pastores y contraste entre su auto-beneficio y el descuido del rebaño. Sin embargo, hay dos ajustes necesarios para una fidelidad más precisa: (1) la nota [b] se ancla en «buscaron», pero la alternativa que ofrece («no se interesaron por») corresponde mejor a una glosa interpretativa de דָרְשׁוּ y no al lugar más significativo de ambigüedad documentada por el POB; (2) la nota léxica preservada en el POB inglés sobre וַיִּרְעוּ הָרֹעִים אוֹתָם debe trasladarse al español, porque allí está la principal decisión exegética: el hebreo puede entenderse literalmente como «se pastorearon a sí mismos / se apacentaron a sí mismos», con sentido idiomático de velar por sus propios intereses.'
  spanish_quality_summary: El texto es claro, digno y generalmente natural. «Vivo yo» y «declara el Señor Yahvé» funcionan bien. «Entregado al despojo» y «puesto como alimento» son comprensibles, aunque algo pesados; «ha llegado a ser despojo» sería más cercano al hebreo, pero no es imprescindible. La secuencia final con «se apacentaron a sí mismos» suena bíblica y fiel, aunque requiere nota para asegurar legibilidad. En conjunto, la calidad es buena con una reparación menor de notas y anclaje.
  glossary_alignment: 'Buen alineamiento con la terminología del proyecto: YHWH como «Yahvé», צֹאן como «rebaño», y mantenimiento del campo semántico pastoral con «apacentar». No hay conflicto doctrinal relevante. La única mejora necesaria es alinear las notas españolas con la racionalidad léxica del POB inglés, especialmente en la cláusula reflexiva de los pastores.'
  issues:
