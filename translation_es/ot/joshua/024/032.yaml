translation:
  language: es
  text: Y los huesos[a] de José, que los hijos de Israel habían sacado de Egipto, los sepultaron en Siquem, en la parcela[b] del campo que Jacob había comprado a los hijos de Hamor, padre de Siquem[c], por cien qesitás[d]; y llegó a ser heredad para los hijos de José.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'restos'. El hebreo usa un término literal para 'huesos'.
    reason: lexical_alternative
  - marker: b
    text: O 'porción del campo'. El hebreo puede referirse a una parcela o porción de terreno.
    reason: lexical_alternative
  - marker: c
    text: O posiblemente 'el antepasado/fundador de Siquem', si 'padre' se usa en un sentido más amplio.
    reason: lexical_alternative
  - marker: d
    text: '''Qesitás'' designa una antigua unidad de valor o de dinero; su equivalente exacto es incierto.'
    reason: cultural_note
lexical_decisions:
- source_word: עַצְמוֹת
  english_pob_choice: bones
  chosen_spanish: huesos
  alternatives_spanish:
  - restos
  lexicon: HALOT
  rationale: El término hebreo denota literalmente huesos. 'Huesos' conserva la concreción del texto y mantiene la referencia a la tradición del entierro de José. 'Restos' es posible, pero suaviza la imagen y pierde precisión léxica.
- source_word: הֶעֱלוּ
  english_pob_choice: had brought up
  chosen_spanish: habían subido
  alternatives_spanish:
  - subieron
  - habían traído
  lexicon: HALOT
  rationale: עלה en hifil significa 'subir / hacer subir'. En este contexto, 'habían subido' refleja bien la acción previa desde Egipto. Se evita 'habían traído' porque desplaza el matiz de ascenso/salida que el hebreo conserva.
- source_word: בְנֵי יִשְׂרָאֵל
  english_pob_choice: the sons of Israel
  chosen_spanish: los hijos de Israel
  alternatives_spanish:
  - los israelitas
  - los hijos de Jacob
  lexicon: HALOT
  rationale: Se mantiene la expresión familiar y pactal del hebreo. 'Hijos de Israel' es natural en español bíblico y conserva mejor la forma del original que la etiqueta étnica 'israelitas'.
- source_word: קָבְרוּ
  english_pob_choice: they buried
  chosen_spanish: los sepultaron
  alternatives_spanish:
  - lo enterraron
  - sepultaron
  lexicon: HALOT
  rationale: El verbo hebreo expresa un entierro formal. 'Sepultar' mantiene dignidad estilística y corresponde bien al acto descrito. Se explicita el objeto con 'los' para referir a los huesos.
- source_word: בִּשְׁכֶם
  english_pob_choice: at Shechem
  chosen_spanish: en Siquem
  alternatives_spanish:
  - en Shequem
  lexicon: HALOT
  rationale: Se usa la forma castellana más asentada del topónimo, 'Siquem'. 'En' es más natural que 'a' para el lugar del entierro en español.
- source_word: בְּחֶלְקַת הַשָּׂדֶה
  english_pob_choice: in the portion of the field
  chosen_spanish: en la parcela del campo
  alternatives_spanish:
  - en la porción del campo
  - en el terreno del campo
  lexicon: HALOT
  rationale: חלקה designa una porción o parcela de terreno. 'Parcela' conserva la precisión territorial y la nota auditada del inglés sobre el posible sentido de 'plot/portion of land'.
- source_word: קָנָה
  english_pob_choice: had bought
  chosen_spanish: había comprado
  alternatives_spanish:
  - había adquirido
  - compró
  lexicon: HALOT
  rationale: El verbo indica una compra real; 'había comprado' refleja adecuadamente la anterioridad respecto al entierro. 'Adquirido' es más genérico y pierde la concreción comercial del contexto.
- source_word: בְּנֵי חֲמוֹר
  english_pob_choice: the sons of Hamor
  chosen_spanish: los hijos de Hamor
  alternatives_spanish:
  - los descendientes de Hamor
  lexicon: HALOT
  rationale: Se conserva la formulación literal del hebreo. 'Descendientes' interpreta más de lo necesario y borra la transparencia del parentesco expresado en el texto.
- source_word: אֲבִי שְׁכֶם
  english_pob_choice: the father of Shechem
  chosen_spanish: padre de Siquem
  alternatives_spanish:
  - el padre de Siquem
  - fundador de Siquem
  lexicon: HALOT
  rationale: En español bíblico, tras mencionar ya 'Siquem', la forma abreviada 'padre de Siquem' resulta clara y fluida. Se evita 'fundador' en el texto principal porque introduce una interpretación que el hebreo solo sugiere como posible matiz.
- source_word: בְּמֵאָה קְשִׂיטָה
  english_pob_choice: for a hundred qesitahs
  chosen_spanish: por cien qesitás
  alternatives_spanish:
  - por cien piezas de dinero
  - por cien kesitás
  lexicon: HALOT
  rationale: Se translitera el término monetario antiguo para no falsear su valor exacto. 'Cien qesitás' mantiene la transparencia auditiva y evita una equivalencia moderna especulativa.
- source_word: וַיִּהְיוּ
  english_pob_choice: it became
  chosen_spanish: y vino a ser
  alternatives_spanish:
  - y fue
  - y se convirtió
  lexicon: HALOT
  rationale: Aunque el verbo hebreo es plural, el referente contextual es la parcela/campo. 'Vino a ser' suena natural en español y conserva el sentido resultativo de la frase.
- source_word: לְנַחֲלָה
  english_pob_choice: an inheritance
  chosen_spanish: heredad
  alternatives_spanish:
  - herencia
  - posesión hereditaria
  lexicon: HALOT
  rationale: '''Heredad'' es un término bíblico claro en español y traduce bien la idea de posesión hereditaria. Se prefiere frente a ''herencia'' para evitar un matiz demasiado moderno o abstracto.'
theological_decisions:
- issue: Mantenimiento de la identidad pactal en בְנֵי יִשְׂרָאֵל
  english_pob_reading: the sons of Israel
  chosen_spanish_reading: los hijos de Israel
  alternative_spanish_readings:
  - los israelitas
  - los hijos de Jacob
  rationale: No hay disputa doctrinal, pero la traducción conserva la expresión familiar del hebreo para mantener su carga identitaria y pactal. 'Los israelitas' sería más idiomático, pero menos transparente como eco del original.
  doctrine_reference: Translation philosophy 1, 5
- issue: Tratamiento del término monetario antiguo קְשִׂיטָה
  english_pob_reading: qesitahs
  chosen_spanish_reading: qesitás
  alternative_spanish_readings:
  - piezas de dinero
  - kesitás
  rationale: Se preserva el término antiguo sin fingir un equivalente exacto desconocido. Esta cautela respeta la humildad del texto y evita una falsa precisión económica.
  doctrine_reference: Translation philosophy 1, 6
- issue: Posible sentido ampliado de אֲבִי שְׁכֶם
  english_pob_reading: the father of Shechem
  chosen_spanish_reading: padre de Siquem
  alternative_spanish_readings:
  - el padre de Siquem
  - el fundador de Siquem
  rationale: El hebreo puede llevar una resonancia de antepasado o fundador, pero el texto principal conserva la lectura literal. La ambigüedad se mantiene en la forma 'padre de Siquem' sin imponer una interpretación no requerida.
  doctrine_reference: Translation philosophy 1, 2
translation_notes:
  revision_awareness: 'El texto español sigue la última revisión auditada del inglés POB, sin cambios sustantivos en el sentido. Se conservaron las decisiones de transparencia léxica: ''bones/qesitahs/father of Shechem'' y la estructura resultativa final. La principal adaptación fue volver natural el español bíblico con ''hijos de Israel'', ''sepultaron'' y ''vino a ser'', sin abandonar la fidelidad al hebreo.'
  spanish_consistency_notes:
  - Se mantuvo 'Siquem' como forma castellana estándar del topónimo.
  - Se prefirió 'hijos de Israel' por consistencia con el registro bíblico del proyecto.
  - Se usó 'heredad' para mantener continuidad con lenguaje de posesión territorial en español bíblico.
  - Se evitó 'SEÑOR' o sustituciones teológicas no presentes en este versículo.
  - Se transliteró 'qesitás' para sostener la cautela del audit trail sobre la unidad monetaria antigua.
