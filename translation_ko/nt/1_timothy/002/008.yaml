id: 1TI.2.8
reference: 1 Timothy 2:8
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: Βούλομαι οὖν προσεύχεσθαι τοὺς ἄνδρας ἐν παντὶ τόπῳ, ἐπαίροντας ὁσίους χεῖρας χωρὶς ὀργῆς καὶ ⸀διαλογισμοῦ.
base_translation:
  language: en
  yaml_path: translation/nt/1_timothy/002/008.yaml
  text: Therefore I want the men in every place to pray[a], lifting up holy hands without anger or quarreling.
  footnotes:
  - marker: a
    text: Or 'without anger or doubt.' The Greek word can refer to inward reasoning or doubt, but here likely points to contentious disputing in the assembly.
    reason: lexical_alternative
translation:
  language: ko
  text: 그러므로 나는 남자들이 각처에서 분노와 다툼[a] 없이 거룩한 손을 들고 기도하기를 원합니다.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 또는 「분노와 의심 없이」. 헬라어 διαλογισμός는 속생각·의심·논쟁을 가리킬 수 있으나, 본 문맥은 회중 안의 다툼을 지칭하는 것으로 보인다.
    reason: lexical_alternative
lexical_decisions:
- source_word: Βούλομαι
  english_pob_choice: I want
  chosen_korean: 원합니다
  alternatives_korean:
  - 바랍니다
  - 뜻합니다
  lexicon: BDAG
  rationale: 사도적 의지의 어감을 「원합니다」로 자연스럽게 담는다.
- source_word: τοὺς ἄνδρας
  english_pob_choice: the men
  chosen_korean: 남자들
  alternatives_korean:
  - 그 남자들
  - 남성들
  lexicon: BDAG
  rationale: ἀνήρ는 성인 남자(여자와 구분). 9절에서 γυναῖκας(여자들)와 짝을 이루므로 성별을 명시.
- source_word: ἐν παντὶ τόπῳ
  english_pob_choice: in every place
  chosen_korean: 각처에서
  alternatives_korean:
  - 모든 곳에서
  - 어디서나
  lexicon: BDAG
  rationale: 「각처에서」가 회중·예배 장소 폭을 자연스럽게 담는다.
- source_word: ἐπαίροντας ὁσίους χεῖρας
  english_pob_choice: lifting up holy hands
  chosen_korean: 거룩한 손을 들고
  alternatives_korean:
  - 정결한 손을 들어
  - 경건한 손을 들고
  lexicon: BDAG
  rationale: ὅσιος는 신성을 향한 의식적 거룩함. 「거룩한 손」이 자연스럽고 직접적.
- source_word: χωρὶς ὀργῆς καὶ διαλογισμοῦ
  english_pob_choice: without anger or quarreling
  chosen_korean: 분노와 다툼 없이
  alternatives_korean:
  - 분노와 의심 없이
  - 노여움과 변론 없이
  lexicon: BDAG
  rationale: διαλογισμός의 「논쟁·다툼」 어감을 「다툼」으로 옮긴다. 회중 내 분쟁 문맥에 맞다.
