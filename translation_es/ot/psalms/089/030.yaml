translation:
  language: es
  text: Estableceré su descendencia para siempre[a], y su trono como los días del cielo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más idiomáticamente: «mientras dure el cielo».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְשַׂמְתִּי
  english_pob_choice: I will establish
  chosen_spanish: Estableceré
  alternatives_spanish:
  - Pondré
  - Haré firme
  - Fijaré
  lexicon: HALOT
  rationale: En este contexto promesal y dinástico, שׂים no se limita a 'poner'; expresa la acción de dejar firmemente asentada o asegurada la descendencia. 'Estableceré' conserva esa fuerza sin sonar forzado en español.
- source_word: לָעַד
  english_pob_choice: forever
  chosen_spanish: para siempre
  alternatives_spanish:
  - por la eternidad
  - para perpetuidad
  - para siempre jamás
  lexicon: HALOT
  rationale: La preposición con עַד comunica duración continua. 'Para siempre' es el equivalente natural y digno en español, y preserva el peso de perpetuidad del texto.
- source_word: זַרְעוֹ
  english_pob_choice: his offspring
  chosen_spanish: su descendencia
  alternatives_spanish:
  - su simiente
  - su linaje
  - sus descendientes
  lexicon: HALOT
  rationale: זֶרַע tiene fuerza colectiva y puede abarcar posteridad/descendencia. 'Descendencia' mantiene esa amplitud con lenguaje actual; 'simiente' sería más literal pero más arcaico, y 'descendientes' puede sonar demasiado distributivo.
- source_word: וְכִסְאוֹ
  english_pob_choice: and his throne
  chosen_spanish: y su trono
  alternatives_spanish:
  - y su silla real
  - y su asiento real
  lexicon: HALOT
  rationale: כִּסֵּא significa de manera directa 'trono'. No hace falta expansión; 'su trono' reproduce el referente real y dinástico.
- source_word: כִּימֵי
  english_pob_choice: as the days of
  chosen_spanish: como los días de
  alternatives_spanish:
  - igual que los días de
  - cual los días de
  lexicon: HALOT
  rationale: El prefijo כ expresa comparación. 'Como los días de' conserva la estructura hebrea y deja abierta la imagen poética sin interpretarla de más.
- source_word: שָׁמַיִם
  english_pob_choice: heaven
  chosen_spanish: el cielo
  alternatives_spanish:
  - los cielos
  - el firmamento
  lexicon: HALOT
  rationale: Aunque la forma hebrea es plural, el audit trail inglés revisado optó por 'heaven' para una expresión más idiomática. En español, 'el cielo' transmite bien el mismo valor comparativo y suena natural; 'los cielos' sería más literal pero menos idiomático aquí.
theological_decisions:
- issue: Duración de la promesa davídica
  english_pob_reading: Render the promise in straightforward perpetuity language without softening or systematizing its theological implications.
  chosen_spanish_reading: Traducir la promesa con lenguaje directo de perpetuidad, sin reducirla ni convertirla en una formulación explicativa.
  alternative_spanish_readings:
  - interpretar 'para siempre' como 'por muchas generaciones'
  - suavizar a 'mientras dure el cielo'
  rationale: El versículo presenta una promesa real y poética de duración continua. El español debe conservar esa tensión, evitando domesticarla con paráfrasis cronológicas o teológicas que no están en el texto.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: El borrador sigue el sentido del hebreo y el ajuste de la revisión inglesa más reciente, que prefirió una expresión idiomática más natural para la comparación final. En español se optó por 'el cielo' en singular para reflejar esa misma naturalidad, sin perder el paralelo poético con la duración de la descendencia y del trono.
  spanish_consistency_notes:
  - Se preservó el paralelismo entre 'descendencia' y 'trono' como dos elementos duraderos de la promesa.
  - Se evitó 'SEÑOR' o terminología no presente en el versículo.
  - '''Para siempre'' se mantuvo sin explicitar una duración menor o más concreta.'
  - La nota al pie conserva la alternativa idiomática que el audit trail inglés también documenta.
