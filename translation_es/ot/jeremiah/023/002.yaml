base_translation:
  language: en
  yaml_path: translation/ot/jeremiah/023/002.yaml
  text: 'Therefore this is what Yahweh[a], the God of Israel, says concerning the shepherds who shepherd my people: You have scattered my flock and driven them away, and you have not attended to them. Behold, I am about to attend to you for the evil of your deeds[b], declares Yahweh.'
  footnotes:
  - marker: a
    text: Or 'against the shepherds'; the preposition can introduce an oracle directed hostilely toward them.
    reason: lexical_alternative
  - marker: b
    text: 'The Hebrew repeats the verb ''attend to/visit'' in both clauses: ''you have not attended to them ... I am attending to you,'' creating a deliberate reversal.'
    reason: lexical_alternative
