base_translation:
  language: en
  yaml_path: translation/ot/deuteronomy/021/016.yaml
  text: And on the day he gives his inheritance to his sons[a], he may not treat the son of the loved wife as the firstborn over the son of the hated wife, who is the firstborn.
  footnotes:
  - marker: a
    text: Or 'the son of the unloved wife' or 'the less loved wife.' The Hebrew literally contrasts 'loved' and 'hated,' but in family-law contexts the latter can denote one who is comparatively less favored rather than actively detested.
    reason: lexical_alternative
