translation:
  language: es
  text: Por la violencia contra tu hermano Jacob[a], la vergüenza te cubrirá, y serás cortado para siempre.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «A causa de la violencia hecha a tu hermano Jacob».'
    reason: lexical_alternative
lexical_decisions:
- source_word: מֵ/חֲמַס
  english_pob_choice: Because of the violence done to
  chosen_spanish: A causa de la violencia hecha a
  alternatives_spanish:
  - Por la violencia contra
  - A causa de la violencia contra
  lexicon: HALOT
  rationale: La partícula con מִן aquí expresa causa u origen de la acción, no solo separación. En español, 'A causa de' comunica bien ese valor causal. 'Hecha a' conserva la dirección hostil implícita en el contexto sin forzar una paráfrasis más amplia que el hebreo.
- source_word: אָחִי/ךָ
  english_pob_choice: your brother
  chosen_spanish: tu hermano
  alternatives_spanish:
  - tu pariente
  - tu consanguíneo
  lexicon: HALOT
  rationale: אָח significa literalmente 'hermano'. 'Tu hermano' preserva el lenguaje familiar directo del hebreo y su fuerza moral y covenantal en el contexto de Edom y Jacob.
- source_word: יַעֲקֹב
  english_pob_choice: Jacob
  chosen_spanish: Jacob
  alternatives_spanish:
  - Israel
  lexicon: HALOT
  rationale: El hebreo nombra a Jacob, no a Israel. Mantener 'Jacob' respeta la formulación original y conserva el encuadre patriarcal y fraternal del reproche profético.
- source_word: תְּכַסְּ/ךָ
  english_pob_choice: will cover you
  chosen_spanish: te cubrirá
  alternatives_spanish:
  - te envolverá
  - te abarcará
  lexicon: HALOT
  rationale: כסה significa 'cubrir' y con 'vergüenza' forma una imagen idiomática clara en español. 'Te cubrirá' reproduce la metáfora con naturalidad y sin añadir interpretaciones.
- source_word: בוּשָׁה
  english_pob_choice: shame
  chosen_spanish: la vergüenza
  alternatives_spanish:
  - la vergüenza pública
  - la deshonra
  lexicon: HALOT
  rationale: בוּשָׁה denota vergüenza o deshonra. 'Vergüenza' es directo y comprensible; aquí mantiene el matiz de humillación pública y pérdida de honor.
- source_word: וְ/נִכְרַ֖תָּ
  english_pob_choice: and you will be cut off
  chosen_spanish: serás cortado
  alternatives_spanish:
  - serás eliminado
  - serás arrancado
  lexicon: HALOT
  rationale: El nifal de כרת conserva la imagen de 'ser cortado'. En español, 'serás cortado' preserva el idiolecto bíblico y la severidad del juicio sin sustituirlo prematuramente por una interpretación explicativa.
- source_word: לְ/עוֹלָם
  english_pob_choice: forever
  chosen_spanish: para siempre
  alternatives_spanish:
  - por siempre
  - eternamente
  lexicon: HALOT
  rationale: עוֹלָם expresa duración indefinida o permanente según el contexto. 'Para siempre' es idiomático en español contemporáneo y mantiene el alcance duradero del juicio.
theological_decisions:
- issue: Referente de 'Jacob' y sentido fraternal de la acusación
  english_pob_reading: '''Jacob'' se mantiene como el hermano nombrado, representando al pueblo descendiente de Jacob/Israel.'
  chosen_spanish_reading: '''Jacob'' permanece en el texto principal como el hermano aludido, sin sustituirlo por ''Israel''.'
  alternative_spanish_readings:
  - Sustituir 'Israel' para mayor claridad inmediata
  rationale: El hebreo dice 'tu hermano Jacob'. Mantener ese nombre conserva la acusación fraternal concreta contra Edom y evita borrar el eco patriarcal del original. La referencia nacional se entiende por el contexto.
  doctrine_reference: Principio de primacía del texto original; traducir nombres propios, no sustituirlos por glosas interpretativas.
translation_notes:
  revision_awareness: El pasaje coincide con el texto hebreo WLC y con el audit trail inglés de la POB en la lectura y el alcance de los términos clave; no se requirieron revisiones posteriores en el registro base.
  spanish_consistency_notes:
  - Se mantiene 'Jacob' para respetar el nombre del hebreo y la acusación fraternal.
  - '''Vergüenza'' traduce el sustantivo hebreo sin suavizar el matiz de deshonra.'
  - '''Serás cortado para siempre'' conserva la imagen verbal del juicio y su duración irreversible.'
  - El tono es formal y bíblico, pero en español contemporáneo natural.
