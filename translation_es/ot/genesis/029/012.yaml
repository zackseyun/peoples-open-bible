translation:
  language: es
  text: Jacob le contó a Raquel que él era pariente de su padre[a] y que era hijo de Rebeca. Entonces ella corrió y se lo contó a su padre.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El hebreo dice literalmente «hermano de su padre», usando «hermano» como idiomatismo de parentesco amplio. Aquí se vierte como «pariente» para evitar una lectura literal engañosa; Jacob era sobrino de Labán.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּגֵּד
  english_pob_choice: told
  chosen_spanish: le contó
  alternatives_spanish:
  - le dijo
  - le informó
  lexicon: HALOT
  rationale: La forma causativa narrativa de נגד aquí pide un verbo natural de comunicación. En español, «contó» conserva el sentido de narrar o comunicar algo de manera directa, con un registro fluido y bíblico sin sonar arcaico.
- source_word: כִּי
  english_pob_choice: that
  chosen_spanish: que
  alternatives_spanish:
  - porque
  - pues
  lexicon: HALOT
  rationale: Introduce contenido reportado después de un verbo de decir; «que» refleja bien la función subordinante del hebreo en este contexto.
- source_word: אֲחִי אָבִיהָ
  english_pob_choice: her father's relative
  chosen_spanish: pariente de su padre
  alternatives_spanish:
  - hermano de su padre
  - familiar de su padre
  lexicon: HALOT
  rationale: El hebreo usa «hermano» en sentido amplio de parentesco. Como Jacob no era hermano literal de Labán, sino sobrino, «pariente» preserva el valor relacional sin imponer una literalidad falsa.
- source_word: בֶן רִבְקָה
  english_pob_choice: Rebekah's son
  chosen_spanish: hijo de Rebeca
  alternatives_spanish:
  - el hijo de Rebeca
  lexicon: HALOT
  rationale: Expresión filial directa y natural en español; mantiene la identificación de Jacob mediante su madre.
- source_word: וַתָּרָץ
  english_pob_choice: she ran
  chosen_spanish: ella corrió
  alternatives_spanish:
  - ella se apresuró
  lexicon: HALOT
  rationale: רץ indica correr; «corrió» conserva el movimiento narrativo fuerte del hebreo.
- source_word: וַתַּגֵּד
  english_pob_choice: told
  chosen_spanish: se lo contó
  alternatives_spanish:
  - lo contó
  - se lo informó
  lexicon: HALOT
  rationale: Se mantiene la naturalidad narrativa en español y el contraste con el primer verbo de decir. El pronombre «lo» resume el mensaje comunicado a su padre.
- source_word: לְאָבִיהָ
  english_pob_choice: her father
  chosen_spanish: a su padre
  alternatives_spanish:
  - a su padre Labán
  lexicon: HALOT
  rationale: La frase preposicional se traduce de manera directa e idiomática; el antecedente es claro por el contexto inmediato.
translation_notes:
  revision_awareness: Se corrigió la validación anterior asegurando que la marca de nota [a] aparezca explícitamente en el texto español, anclada en la frase correspondiente. La redacción mantiene el sentido del texto hebreo y del audit trail inglés, con la misma decisión semántica de parentesco amplio.
  spanish_consistency_notes:
  - Se usó «Yahvé» no corresponde en este versículo porque el nombre divino no aparece.
  - Se mantuvo «Rebeca» como forma estándar en español bíblico.
  - Se prefirió «pariente» para reflejar el idiomatismo hebreo sin perder claridad.
  - La repetición de un verbo de decir se resolvió con variación natural en español («le contó» / «se lo contó») sin alterar la secuencia narrativa.
