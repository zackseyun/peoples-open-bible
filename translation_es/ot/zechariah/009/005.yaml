    rationale: El inglés documenta como alternativa 'Gaza will writhe greatly', es decir, una lectura que hace de Gaza el sujeto de 'will writhe greatly'. El borrador español ya usa esa lectura en el texto principal, pero la nota repite casi lo mismo en vez de reflejar una alternativa real. Lo mejor es reformular la nota para explicar que el hebreo también puede leerse haciendo de Gaza el sujeto de 'se retorcerá mucho'.
  - severity: low
    issue: '''Su esperanza ha sido avergonzada'' es comprensible pero algo rígido en español.'
    rationale: Aunque formalmente cercano al inglés, en español bíblico natural suena mejor 'su esperanza ha quedado avergonzada' o 'su esperanza ha sido defraudada' para expresar el colapso de su expectativa sin perder el matiz de vergüenza.
