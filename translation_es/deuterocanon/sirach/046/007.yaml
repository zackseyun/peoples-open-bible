translation:
  language: es
  text: También[a], porque siguió plenamente a Dios, y en los días de Moisés mostró lealtad[b]—él y Caleb, hijo de Jefuné—, al mantenerse firme cuando la asamblea se rebeló.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «al mantenerse firme en la rebelión de la asamblea»; la redacción está comprimida y es algo incierta. El griego paralelo dice más ampliamente: «oponerse al enemigo, impedir que el pueblo pecara y hacer cesar la murmuración malvada».'
    reason: textual_variant
  - marker: b
    text: O «mostró misericordia». Tanto el hebreo como el griego pueden expresar misericordia, pero aquí el contexto favorece la idea de acción fiel o leal.
    reason: lexical_alternative
lexical_decisions:
- source_word: מלא אחרי אל
  english_pob_choice: fully followed God
  chosen_spanish: siguió plenamente a Dios
  alternatives_spanish:
  - fue totalmente fiel a Dios
  - siguió a Dios por completo
  lexicon: HALOT
  rationale: La expresión hebrea es idiomática y no conviene volverla literal en español. «Siguió plenamente a Dios» conserva la idea de adhesión total sin perder fluidez ni añadir explicaciones ajenas al texto.
- source_word: עשה חסד / ἔλεος
  english_pob_choice: showed loyalty
  chosen_spanish: mostró lealtad
  alternatives_spanish:
  - mostró misericordia
  - actuó con fidelidad
  - mostró amor leal
  lexicon: HALOT; BDAG
  rationale: Aquí el contexto apunta a una acción fiel y leal en el marco de Moisés, más que a misericordia en sentido emocional. «Lealtad» recoge bien el valor de fidelidad pactal que el POB inglés documenta.
- source_word: להתיצב
  english_pob_choice: by standing firm
  chosen_spanish: al ponerse firme
  alternatives_spanish:
  - al mantenerse firme
  - al tomar posición
  - al estar firme
  lexicon: HALOT
  rationale: La forma verbal expresa decisión y resistencia. «Ponerse firme» transmite la postura resuelta de modo natural en español.
- source_word: בפרע קהל
  english_pob_choice: when the assembly rebelled
  chosen_spanish: cuando la asamblea se rebeló
  alternatives_spanish:
  - cuando la asamblea se amotinó
  - cuando la congregación se rebeló
  - en la rebelión de la asamblea
  lexicon: HALOT
  rationale: 'Dado el estado comprimido del hebreo, la lectura más directa y transparente en español es temporal y narrativa: «cuando la asamblea se rebeló». Evita sobreinterpretar el sustantivo y refleja el conflicto comunitario.'
- source_word: Χαλέβ υἱὸς Ἰεφοννή
  english_pob_choice: Caleb son of Jephunneh
  chosen_spanish: Caleb, hijo de Jefuné
  alternatives_spanish:
  - Caleb, hijo de Yefuné
  - Caleb, hijo de Jephunneh
  lexicon: Transliteración estándar
  rationale: Se usa una transliteración española estable y legible. «Jefuné» es preferible para lectores bíblicos en español y mantiene el nombre propio sin anglicizarlo.
theological_decisions:
- issue: Relación entre el hebreo conservado y el paralelo griego
  english_pob_reading: The Hebrew is primary where extant, but the Greek helps confirm the sense; the latest revision removed Greek-only expansions not present in the Hebrew source.
  chosen_spanish_reading: La traducción principal sigue el hebreo conservado y no incorpora expansiones exclusivas del griego; solo refleja el sentido que el hebreo permite con claridad.
  alternative_spanish_readings:
  - Incluir en el texto las cláusulas griegas sobre impedir el pecado del pueblo y silenciar el murmullo impío
  - Traducir el pasaje con un énfasis griego en «el enemigo»
  rationale: El expediente de revisión indica que las cláusulas griegas amplias fueron retiradas por no estar en el hebreo proporcionado. Para mantener fidelidad fuente-auditable, el español debe seguir la forma breve del hebreo, sin importar material no testimoniado en ese texto base.
  doctrine_reference: 'PHILOSOPHY.md: primacía del hebreo donde está conservado; conservar la tensión textual y no resolverla con expansión indebida.'
- issue: Sentido de חסד / ἔλεος en el contexto
  english_pob_reading: showed loyalty rather than mercy
  chosen_spanish_reading: mostró lealtad, no «mostró misericordia» en el texto principal
  alternative_spanish_readings:
  - mostró misericordia
  - mostró amor leal
  - actuó con fidelidad
  rationale: Aunque ἔλεος y חסד pueden abarcar misericordia, la escena describe la acción fiel de Caleb y Moisés frente a la rebelión. «Lealtad» evita desplazar el foco hacia compasión y preserva la tensión semántica documentada por el POB inglés.
  doctrine_reference: HALOT; BDAG; principio POB de preservar matices semánticos relevantes.
translation_notes:
  revision_awareness: 'El texto español sigue la última revisión del expediente: se eliminan las expansiones tomadas solo del griego («impedir que el pueblo pecara» y «silenciar el murmullo impío»), y se adopta una formulación más directa para להתיצב בפרע קהל. El marcador textual conserva la observación sobre la variante hebreo-griega sin reintroducir material retirado en la revisión.'
  spanish_consistency_notes:
  - Se mantiene «Dios» para אל, conforme al estándar del proyecto.
  - Se usa «Caleb» y «Jefuné» como formas españolas legibles y consistentes con la tradición bíblica en español.
  - «Lealtad» se reserva aquí como equivalente contextual de חסד / ἔλεος en un marco de fidelidad narrativa, no como traducción general de misericordia.
  - No se usa «SEÑOR» ni «Cristo» porque no aparecen en este versículo.
