    text: Hebrew 'they are in turmoil'; the plural verb likely expresses humanity in general after the singular 'man.'
    reason: lexical_alternative
  - marker: c
    text: Hebrew 'who will gather them,' referring to the possessions he has accumulated.
    reason: lexical_alternative
