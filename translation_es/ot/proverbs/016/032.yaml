  text: ט֤וֹב אֶ֣רֶךְ אַ֭פַּיִם מִ/גִּבּ֑וֹר וּ/מֹשֵׁ֥ל בְּ֝/רוּח֗/וֹ מִ/לֹּכֵ֥ד עִֽיר׃
base_translation:
  language: en
  yaml_path: translation/ot/proverbs/016/032.yaml
  text: Better is one who is slow to anger than a mighty man[b][a], and one who rules his spirit than one who captures a city.
  footnotes:
  - marker: a
    text: Or 'patient'; literally 'long of nostrils,' a Hebrew idiom for being slow to anger.
    reason: lexical_alternative
  - marker: b
    text: Or 'his temper' or 'himself' for 'his spirit.'
    reason: lexical_alternative
