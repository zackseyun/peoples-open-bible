translation:
  text: '1[a]. Therefore, my children, do not pay attention to the beauty of women, nor dwell on their deeds; but walk in simplicity of heart, in the fear of the Lord, laboring in good works, and in learning, and in your flocks, until the Lord gives you a wife whom he himself chooses, so that you may not suffer as I did.


    2[b]. For until my father''s death I did not have the boldness to look my father in the face.


    3. And because of the reproach of my sin, my mind was continually consumed within me.


    4. For seven months I was sick unto death, and after I had repented with purpose of soul before the Lord, the spirit of jealousy departed from me. Until now I have kept myself on guard, and I have not sinned.


    5. Therefore, my children, I tell you: keep everything that I command you, and you will certainly not sin.


    6. For the sin of sexual immorality is a pit for the soul, separating it from God and bringing it near to idols; for it is this that leads the mind and understanding astray, and brings young men down to Hades before their time.


    7. For sexual immorality has destroyed many. Whether a man is old, or noble, or rich, or poor, he brings reproach on himself before the sons of men and a stumbling block to Beliar.


    8. For you have heard about Joseph, how he guarded himself from a woman and cleansed his thoughts from every kind of sexual immorality, and found favor before God and men.


    9. For the Egyptian woman did many things against him, and called in magicians and brought him potions; but Joseph guarded himself from every evil desire and did not accept the counsel of his soul toward wicked lust.


    10[c][d]. Therefore the God of your fathers delivered him from every hidden evil and from death.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The Greek text at this point is damaged or compressed in the OCR layer. The sense is that Reuben, because of his sin, lacked the confidence to look his father in the face until his father's death.
    reason: textual_variant
    anchor_ref: '4:2'
  - marker: b
    text: The line about seven months of sickness and the departure of the spirit of jealousy reflects the transmitted chapter sequence known from this section of Reuben; the source layer is compressed here, so this rendering follows the extant Greek sense cautiously.
    reason: textual_variant
    anchor_ref: '4:4'
  - marker: d
    text: '''A stumbling block to Beliar'' is a difficult phrase. The Greek is preserved closely rather than paraphrased away.'
    reason: lexical_alternative
    anchor_ref: '4:7'
  - marker: c
    text: φάρμακα can mean 'drugs,' 'potions,' or magical preparations. The context of seduction and magicians supports 'potions.'
    reason: lexical_alternative
    anchor_ref: '4:9'
lexical_decisions:
- source_word: προσέχετε
  chosen: pay attention to
  alternatives:
  - give heed to
  - fix your attention on
  lexicon: BDAG
  rationale: The warning is against directing attention toward seductive beauty. 'Pay attention to' is natural English while preserving the imperative force.
- source_word: κάλλος
  chosen: beauty
  alternatives:
  - comeliness
  - attractiveness
  lexicon: LSJ
  rationale: '''Beauty'' is the plain sense and fits the moral warning without archaic coloring.'
- source_word: ἐννοεῖσθε
  chosen: dwell on
  alternatives:
  - think about
  - set your mind on
  lexicon: LSJ
  rationale: The context warns not merely against noticing but against inward mental preoccupation with women's actions.
- source_word: ἁπλότης καρδίας
  chosen: simplicity of heart
  alternatives:
  - singleness of heart
  - sincerity of heart
  lexicon: BDAG
  rationale: This phrase is a key virtue term in testamentary exhortation. 'Simplicity of heart' preserves the moral texture and contrast with divided desire.
- source_word: φόβῳ κυρίου
  chosen: fear of the Lord
  alternatives:
  - reverence for the Lord
  lexicon: BDAG
  rationale: This is standard biblical moral language and should remain recognizable rather than being softened.
- source_word: μοχθοῦντες
  chosen: laboring
  alternatives:
  - toiling
  - working hard
  lexicon: LSJ
  rationale: The participle conveys strenuous effort in a disciplined life; 'laboring' preserves that seriousness.
- source_word: γράμμασι
  chosen: learning
  alternatives:
  - letters
  - writings
  - study
  lexicon: LSJ
  rationale: Literally 'letters,' but in context it likely refers to instruction or study. 'Learning' communicates the sense without wooden obscurity.
- source_word: σύζυγον
  chosen: wife
  alternatives:
  - spouse
  - marriage partner
  lexicon: LSJ
  rationale: In this paternal exhortation to sons, 'wife' is the most direct and contextually appropriate rendering.
- source_word: παρρησίαν
  chosen: boldness
  alternatives:
  - confidence
  - freedom
  lexicon: BDAG
  rationale: The term expresses frank confidence or freedom of approach; here Reuben lacked the courage to meet his father openly.
- source_word: φυλάξατε
  chosen: keep
  alternatives:
  - guard
  - observe
  lexicon: BDAG
  rationale: '''Keep'' works idiomatically with commands and preserves covenantal-exhortational tone.'
- source_word: πορνεία
  chosen: sexual immorality
  alternatives:
  - fornication
  - unchastity
  lexicon: BDAG
  rationale: This is the clearest contemporary rendering for the vice term in a broad moral sense, without narrowing it too much.
- source_word: βόθρος
  chosen: pit
  alternatives:
  - ditch
  - abyss
  lexicon: LSJ
  rationale: 'The metaphor is vivid and should remain concrete: sexual sin is a ''pit for the soul.'''
- source_word: χωρίζουσα ἀπὸ θεοῦ
  chosen: separating it from God
  alternatives:
  - cutting it off from God
  lexicon: BDAG
  rationale: The participle describes the alienating effect of the vice; 'separating' is direct and theologically weighty.
- source_word: προσεγγίζουσα τοῖς εἰδώλοις
  chosen: bringing it near to idols
  alternatives:
  - drawing it toward idols
  lexicon: BDAG
  rationale: The Greek links sexual sin with idolatrous proximity; the translation preserves that moral-theological association.
- source_word: νοῦν καὶ τὴν διάνοιαν
  chosen: the mind and understanding
  alternatives:
  - mind and thought
  - reason and understanding
  lexicon: BDAG
  rationale: The paired terms emphasize inner rational faculties being led astray; the English keeps the dual expression.
- source_word: κατάγει ... εἰς ᾅδην
  chosen: brings ... down to Hades
  alternatives:
  - drives ... down to the grave
  - leads ... to the underworld
  lexicon: BDAG
  rationale: ᾅδης is best kept as 'Hades' in this Jewish-Greek testament context rather than flattened to 'hell' or generalized as 'death'.
- source_word: οὐκ ἐν καιρῷ αὐτῶν
  chosen: before their time
  alternatives:
  - not in their proper season
  lexicon: LSJ
  rationale: This idiom refers to premature ruin or death; 'before their time' is idiomatic and forceful.
- source_word: ὀνειδισμός
  chosen: reproach
  alternatives:
  - disgrace
  - shame
  lexicon: BDAG
  rationale: The term denotes public dishonor; 'reproach' preserves the moral-social dimension.
- source_word: πρόσκομμα τῷ Βελίαρ
  chosen: a stumbling block to Beliar
  alternatives:
  - an offense to Beliar
  - a cause of downfall for Beliar
  lexicon: LSJ
  rationale: The phrase is difficult, but the Greek reads literally as a 'stumbling block to Beliar.' I preserve the wording and note the difficulty rather than over-resolving it.
- source_word: ἐφύλαξεν ἑαυτόν
  chosen: guarded himself
  alternatives:
  - kept himself
  - protected himself
  lexicon: BDAG
  rationale: This reflexive moral vigilance is central to the chapter's exhortation.
- source_word: ἐκαθάρισεν
  chosen: cleansed
  alternatives:
  - purified
  lexicon: BDAG
  rationale: The verb carries moral purification language and should remain strong.
- source_word: μάγους
  chosen: magicians
  alternatives:
  - sorcerers
  lexicon: LSJ
  rationale: The term refers to practitioners of occult arts; 'magicians' is the broadest accessible rendering.
- source_word: φάρμακα
  chosen: potions
  alternatives:
  - drugs
  - charms
  - love-potions
  lexicon: LSJ
  rationale: The word can denote drugs or magical potions. 'Potions' fits the immediate context of attempted seduction with magical means.
- source_word: διαβούλιον τῆς ψυχῆς αὐτοῦ
  chosen: the counsel of his soul
  alternatives:
  - the resolve of his inner self
  - the inward scheme of his soul
  lexicon: LSJ
  rationale: The phrase points to inward deliberation or consent. A relatively literal rendering preserves the anthropological texture of the Greek.
- source_word: ἐπιθυμίαν πονηράν
  chosen: wicked lust
  alternatives:
  - evil desire
  - corrupt craving
  lexicon: BDAG
  rationale: In this context of sexual temptation, 'wicked lust' makes the moral force explicit.
- source_word: ἐρρύσατο
  chosen: delivered
  alternatives:
  - rescued
  - saved
  lexicon: BDAG
  rationale: A standard biblical verb for divine rescue; 'delivered' suits the elevated register.
