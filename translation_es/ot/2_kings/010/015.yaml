  to: 'Siguió desde allí y encontró a Jonadab, hijo de Recab, que venía a su encuentro. Lo saludó[a] y le dijo: «¿Está tu corazón recto, como mi corazón está con tu corazón?[b]» Jonadab respondió: «Sí, sí[c]». Entonces él dijo: «Dame tu mano». Y él le dio su mano, y lo hizo subir junto a sí al carro.'
