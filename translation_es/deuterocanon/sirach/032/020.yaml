translation:
  language: es
  text: No camines por un camino lleno de obstáculos[b][a], y no tropieces dos veces con el mismo obstáculo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El hebreo de esta línea habla de ‘un camino de מוקשות’, término que puede sugerir trampas, lazos u obstáculos que hacen tropezar. Se eligió ‘obstáculos’ para conservar el sentido colectivo y el paralelismo con ‘tropezar’.
    reason: lexical_alternative
  - marker: b
    text: El paralelo griego en Swete difiere sustancialmente aquí (‘El que sirve con favor será aceptado, y su súplica llegará hasta las nubes’), lo que indica una divergencia importante en la tradición textual. El texto principal sigue el testimonio hebreo conservado, que es la fuente primaria de Sirácida donde se preserva.
    reason: textual_variant
lexical_decisions:
- source_word: בדרך
  english_pob_choice: on a path
  chosen_spanish: por un camino
  alternatives_spanish:
  - en un camino
  - por una senda
  lexicon: HALOT
  rationale: דרך puede significar ‘camino, senda, ruta’. En este contexto sapiencial, ‘camino’ conserva la imagen concreta y también la idea moral de conducta o curso de vida.
- source_word: מוקשות
  english_pob_choice: full of obstacles
  chosen_spanish: lleno de obstáculos
  alternatives_spanish:
  - lleno de trampas
  - lleno de escollos
  - lleno de tropiezos
  lexicon: HALOT
  rationale: La forma alude a cosas que enredan o hacen caer. ‘Obstáculos’ mantiene la amplitud semántica sin limitarse solo a ‘trampas’, y encaja con el paralelismo de tropezar.
- source_word: אל תלך
  english_pob_choice: Do not walk
  chosen_spanish: No camines
  alternatives_spanish:
  - No vayas
  - No andes
  lexicon: HALOT
  rationale: הלך expresa ‘ir/caminar’. ‘Camines’ conserva el valor de conducta figurada y suena natural en español bíblico moderno.
- source_word: ואל תתקל
  english_pob_choice: and do not stumble
  chosen_spanish: y no tropieces
  alternatives_spanish:
  - y no caigas
  - y no choques
  lexicon: HALOT
  rationale: El hitpael de תקל aquí comunica venir a caer por tropiezo. ‘Tropezar’ es la equivalencia más idiomática y mantiene la imagen de caída.
- source_word: בנגף
  english_pob_choice: over the same hazard
  chosen_spanish: con el mismo peligro
  alternatives_spanish:
  - con el mismo tropiezo
  - con el mismo obstáculo
  - ante el mismo golpe
  lexicon: HALOT
  rationale: נגף puede abarcar golpe, calamidad o aquello que hace caer. ‘Peligro’ es suficientemente amplio en español para conservar la fuerza del aviso sin fijar indebidamente un solo matiz.
- source_word: פעמים
  english_pob_choice: twice
  chosen_spanish: dos veces
  alternatives_spanish:
  - repetidamente
  - dos ocasiones
  lexicon: HALOT
  rationale: El adverbio es numérico y directo. ‘Dos veces’ mantiene la repetición explícita y la fuerza proverbial del cierre.
translation_notes:
  revision_awareness: Se siguió el testimonio hebreo preservado en la fuente principal. La paralela griega de Sirácides 32:20 difiere de manera sustancial, pero aquí la redacción española sigue el hebreo extante por ser el testimonio primario cuando está conservado.
  spanish_consistency_notes:
  - Se usa ‘camino’ para דרך en sentido sapiencial, manteniendo la imagen de conducta.
  - Se usa ‘tropezar’ para תתקל por su naturalidad en español y por conservar la metáfora de caída.
  - Se evita ‘SEÑOR’ u otra convención sustitutiva porque este versículo no contiene el Tetragrámaton ni lenguaje divino explícito.
