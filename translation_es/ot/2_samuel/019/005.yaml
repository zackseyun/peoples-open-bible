translation:
  language: es
  text: 'Y el rey cubrió su rostro[a], y el rey clamó a gran voz: «¡Hijo mío, Absalón! ¡Absalón, hijo mío, hijo mío!»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «envolvió su rostro» o «veló su rostro». El verbo hebreo sugiere cubrir el rostro en señal de duelo.
    reason: lexical_alternative
lexical_decisions:
- source_word: לָאַט / וְהַמֶּלֶךְ לָאַט אֶת פָּנָיו
  english_pob_choice: covered his face
  chosen_spanish: cubrió su rostro
  alternatives_spanish:
  - veló su rostro
  - envolvió su rostro
  lexicon: HALOT
  rationale: El hebreo describe una acción de cubrir aplicada concretamente al rostro en un contexto de duelo. «Cubrió su rostro» conserva la imagen básica sin añadir más de lo que el texto exige. «Rostro» es natural en español bíblico y evita una calca pesada.
- source_word: פָּנָיו
  english_pob_choice: his face
  chosen_spanish: su rostro
  alternatives_spanish:
  - su cara
  - su presencia
  lexicon: HALOT
  rationale: La referencia es física y concreta; no se trata de «presencia». «Rostro» mantiene dignidad y claridad en español contemporáneo.
- source_word: וַיִּזְעַק
  english_pob_choice: cried out
  chosen_spanish: clamó
  alternatives_spanish:
  - gritó
  - exclamó
  - sollozó
  lexicon: HALOT
  rationale: El verbo expresa un grito fuerte. «Clamó» conserva la intensidad y funciona bien en un lamento, sin introducir necesariamente el matiz de llanto de «sollozó».
- source_word: קוֹל גָּדוֹל
  english_pob_choice: with a loud voice
  chosen_spanish: con gran voz
  alternatives_spanish:
  - en alta voz
  - con voz muy fuerte
  - con un gran clamor
  lexicon: HALOT
  rationale: La expresión hebrea es idiomática y literalmente «voz grande». «Con gran voz» preserva mejor la forma y la solemnidad que un adverbio como «fuertemente».
- source_word: בְּנִי
  english_pob_choice: my son
  chosen_spanish: hijo mío
  alternatives_spanish:
  - mi hijo
  - hijo querido
  lexicon: HALOT
  rationale: En español, «hijo mío» suena más natural como exclamación de duelo y conserva el valor afectivo y relacional del hebreo. No se suaviza a «querido» porque el texto no lo añade.
- source_word: אַבְשָׁלוֹם
  english_pob_choice: Absalom
  chosen_spanish: Absalón
  alternatives_spanish:
  - Absalom
  lexicon: standard proper-name transliteration
  rationale: Se usa la forma habitual en español bíblico, «Absalón», por inteligibilidad y tradición lectora en español.
theological_decisions:
- issue: Intensidad del lamento real de David
  english_pob_reading: The repetition and loud cry are preserved as an intense grief-lament.
  chosen_spanish_reading: La repetición y el clamor se conservan como lamento intensísimo de duelo.
  alternative_spanish_readings:
  - suavizar la repetición para hacerla más idiomática
  - reducir el grito a una simple exclamación
  rationale: El hebreo repite deliberadamente «Absalón» y «hijo mío»; esa insistencia debe mantenerse porque forma parte del sentido del pasaje y no solo del estilo. La puntuación en español busca reproducir ese desgarro sin explicar de más.
  doctrine_reference: Narrative theology; fidelity to the lament motif in the David cycle
translation_notes:
  revision_awareness: 'El borrador sigue la lectura alta en acuerdo del audit trail inglés: mantener la acción concreta de cubrir el rostro, el grito fuerte y la repetición afectiva del lamento, sin introducir una interpretación más específica que la del hebreo. No se documentaron revisiones posteriores que alteren esta decisión.'
  spanish_consistency_notes:
  - Se mantiene un registro bíblico claro y moderno, evitando calcos innecesarios.
  - Se conserva la repetición del hebreo para reflejar la intensidad emocional del verso.
  - «Rostro» y «con gran voz» sostienen un español digno y publicable sin perder cercanía al original.
