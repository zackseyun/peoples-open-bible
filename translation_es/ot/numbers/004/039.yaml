revisions:
- from: desde los treinta años y en adelante, hasta los cincuenta años, todo el que entra[a] al servicio para la obra en el tabernáculo de reunión—
  to: desde los treinta años y en adelante, hasta los cincuenta años, todo el que se presenta[a] al servicio para la obra en la tienda de reunión—
  rationale: Se ajusta «entra» a «se presenta» para un español más natural en contexto censal y de deber levítico; se cambia «tabernáculo» por «tienda» para reflejar más directamente אֹהֶל y alinearse mejor con la auditoría inglesa; y se corrige la nota alternativa para que corresponda mejor a las opciones léxicas documentadas sin expansión innecesaria.
