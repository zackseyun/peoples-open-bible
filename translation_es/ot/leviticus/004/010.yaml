  - severity: medium
    issue: '''altar del holocausto'' para מִזְבַּח הָעֹלָה'
    rationale: Es comprensible y tradicional, pero 'holocausto' en español moderno puede resultar menos transparente y con asociaciones ajenas. 'Altar de la ofrenda quemada' preserva mejor el valor de עֹלָה como término sacrificial técnico.
  - severity: low
    issue: Redacción de la nota al pie
    rationale: La nota actual es básicamente correcta, pero puede formularse con español más limpio y conectarse mejor con la acción ritual de remover/elevar las porciones.
