    issue: לְבוֹנָה fue traducido como 'incienso' en vez de un término específico.
    rationale: El hebreo designa específicamente frankincense, no incienso genérico. El English POB documenta esta precisión como decisión léxica importante. En español, 'franquincienso' es el equivalente más directo; 'olíbano' también sería posible, pero debe mantenerse la especificidad.
  - severity: high
