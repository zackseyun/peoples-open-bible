source:
  edition: SBLGNT
  text: ⸀πῶς δύνασαι λέγειν τῷ ἀδελφῷ σου· Ἀδελφέ, ἄφες ἐκβάλω τὸ κάρφος τὸ ἐν τῷ ὀφθαλμῷ σου, αὐτὸς τὴν ἐν τῷ ὀφθαλμῷ σοῦ δοκὸν οὐ βλέπων; ὑποκριτά, ἔκβαλε πρῶτον τὴν δοκὸν ἐκ τοῦ ὀφθαλμοῦ σοῦ, καὶ τότε διαβλέψεις ⸂τὸ κάρφος τὸ ἐν τῷ ὀφθαλμῷ τοῦ ἀδελφοῦ σου ἐκβαλεῖν⸃.
base_translation:
  language: en
  yaml_path: translation/nt/luke/006/042.yaml
  text: How can you say to your brother[a], ‘Brother, let me take out the speck that is in your eye,’ while you yourself do not see the beam that is in your own eye? Hypocrite, first take the beam out of your own eye[c][b], and then you will see clearly to take out the speck that is in your brother’s eye.
  footnotes:
  - marker: a
    text: Or “splinter” for “speck”; the Greek κάρφος denotes a very small bit of dry material.
    reason: lexical_alternative
  - marker: b
    text: Or “log” or “plank” for “beam”; the Greek δοκός refers to a large piece of timber.
    reason: lexical_alternative
  - marker: c
    text: “Brother” translates Greek ἀδελφός, a masculine singular kinship term; the instruction may apply more broadly, but the Greek wording is masculine.
    reason: cultural_note
translation:
  language: ko
  text: 너의 눈에 들보가 있는데도 보지 못하면서, 어떻게 네 형제에게 『형제여, 너의 눈에 있는 티끌을 빼게 해 다오』 하고 말할 수 있느냐? 위선자여, 먼저 네 자신의 눈에서 들보를 빼라. 그러면 네가 또렷이 보고 네 형제의 눈에 있는 티끌을 빼낼 수 있을 것이다.
  philosophy: optimal-equivalence
