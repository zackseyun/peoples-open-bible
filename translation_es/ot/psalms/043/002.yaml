review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien el hebreo y el rastro POB en casi todo: conserva el valor causal de כִּי, la tensión del lamento en «¿por qué me has rechazado?», la imagen protectora de אֱלֹהֵי מָעוּזִּי y el sentido de opresión en בְּלַחַץ אוֹיֵב. Sin embargo, la nota [b] no preserva con suficiente fidelidad la alternativa inglesa completa, que no solo ofrece «in gloom» sino también explica la construcción literal como ‘go about darkened’; en español conviene mantener la alternativa verbal completa ligada a «ando».'
  spanish_quality_summary: El español es natural, claro y digno. «Porque tú eres el Dios de mi refugio» y «bajo la opresión del enemigo» leen bien. «Ando en luto» es comprensible, pero la nota asociada debería reflejar mejor la relación entre קֹדֵר y אֶתְהַלֵּךְ para evitar que parezca una alternativa aislada solo para el adjetivo/estado.
  glossary_alignment: No hay conflictos con la terminología base del proyecto. «Dios» corresponde bien a אֱלֹהֵי; no aparece el nombre divino ni otros términos sensibles del glosario. La elección «refugio» para מָעוּז es coherente con la decisión inglesa y con la nota de alternativas.
  issues:
  - severity: medium
    issue: La nota [b] no reproduce plenamente la alternativa/documentación auditada para קֹדֵר אֶתְהַלֵּךְ.
    rationale: El POB inglés conserva como alternativa «Why do I walk in gloom because of the oppression of the enemy?» y además explica el literal ‘go about darkened’. La nota española actual («O “en oscuridad”») deja incompleta la alternativa porque no se integra con el verbo «ando/camino», y puede sonar menos precisa que el hebreo y la auditoría inglesa.
  revised_spanish_text: Porque tú eres el Dios de mi refugio[a]; ¿por qué me has rechazado? ¿Por qué ando en luto[b] bajo la opresión del enemigo?
  revised_footnotes:
  - marker: a
    text: O «el Dios de mi fortaleza» o «el Dios de mi baluarte». El sustantivo hebreo puede denotar refugio, fortaleza o fuerza según el contexto.
    reason: lexical_alternative
  - marker: b
    text: O «¿Por qué camino en oscuridad a causa de la opresión del enemigo?». El hebreo literalmente habla de andar «oscurecido», un modismo de duelo.
    reason: lexical_alternative
  revision_rationale: Se conserva el texto principal, que es fiel y natural, y se ajusta solo la nota [b] para reflejar con mayor exactitud la alternativa y la explicación documentadas en la auditoría inglesa, manteniendo el vínculo entre el estado de duelo y el verbo de movimiento.
