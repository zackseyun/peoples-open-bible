revisions:
- from: Estos fueron los hombres contados de las familias de los qehatitas[a], todos los que servían en la tienda de reunión, a quienes Moisés y Aarón contaron conforme al mandato de Yahvé, por mano de Moisés.
  to: Estos fueron los hombres contados de las familias de los coatitas, todos los que servían en la tienda de reunión, a quienes Moisés y Aarón contaron conforme al mandato de Yahvé, por medio de Moisés[a].
  rationale: Se corrige el gentilicio a una forma española natural y reconocible ('coatitas'). Se reubica y reescribe la nota al pie para que corresponda al modismo בְּיַד מֹשֶׁה y preserve la alternativa literal documentada. Se adopta 'por medio de Moisés' en el texto principal por claridad idiomática, manteniendo el hebraísmo en la nota. No se requiere adjudicación adicional porque las correcciones son claras y no doctrinalmente controvertidas.
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T21:29:14Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura y el sentido del hebreo: פְקוּדֵי como personas contadas, מִשְׁפְּחֹת הַקְּהָתִי como familias del grupo de Coat/Qohat, servicio en la tienda de reunión, conteo hecho por Moisés y Aarón conforme al mandato de Yahvé, y el modismo בְּיַד מֹשֶׁה preservado. Sin embargo, hay problemas formales y léxicos menores que requieren corrección.'
  spanish_quality_summary: 'El español es generalmente claro y digno, pero ''qehatitas'' no es una forma española e introduce una transliteración innecesaria frente a la forma establecida y comprensible ''coatitas''. Además, la nota al pie está mal anclada y es internamente errónea: aparece sobre ''qehatitas'' aunque comenta ''por mano de Moisés'', y repite la misma frase sin alternativa real. Conviene también ajustar ''por mano de Moisés'' a ''por medio de Moisés'' en texto principal para mejor naturalidad, preservando el hebraísmo en nota.'
  glossary_alignment: 'Se alinea correctamente con la política de ''Yahvé'' para יְהוָה. No hay conflicto con otros términos doctrinales. La principal desviación es onomástica/estilística: ''qehatitas'' contradice la legibilidad esperada del español bíblico general; ''coatitas'' expresa mejor el gentilicio tradicional sin pérdida de fidelidad.'
  issues:
  - severity: medium
    issue: Uso de 'qehatitas' en lugar de una forma española establecida
    rationale: Aunque busca cercanía al hebreo, no es una forma natural en español e introduce aspereza innecesaria. 'Coatitas' es ampliamente reconocible y fiel a קהת en tradición bíblica española.
  - severity: high
    issue: Nota al pie mal ubicada y con contenido defectuoso
    rationale: La marca [a] está en 'qehatitas', pero la nota trata 'por mano de Moisés'. Además, el texto de la nota dice 'O por mano de Moisés para por mano de Moisés', lo cual no ofrece variante real y no cumple la función lexical_alternative del inglés.
  - severity: low
    issue: '''Por mano de Moisés'' es fiel pero menos natural como texto principal en español'
    rationale: El hebraísmo puede mantenerse mejor en nota, mientras que 'por medio de Moisés' comunica con naturalidad la agencia/mediación. Dado que el inglés conservó la alternativa 'through Moses', el español puede invertir principal/nota sin pérdida de sentido.
  revised_spanish_text: Estos fueron los hombres contados de las familias de los coatitas, todos los que servían en la tienda de reunión, a quienes Moisés y Aarón contaron conforme al mandato de Yahvé, por medio de Moisés[a].
  revised_footnotes:
  - marker: a
    text: Lit. 'por mano de Moisés'.
    reason: lexical_alternative
  revision_rationale: Se corrige el gentilicio a una forma española natural y reconocible ('coatitas'). Se reubica y reescribe la nota al pie para que corresponda al modismo בְּיַד מֹשֶׁה y preserve la alternativa literal documentada. Se adopta 'por medio de Moisés' en el texto principal por claridad idiomática, manteniendo el hebraísmo en la nota. No se requiere adjudicación adicional porque las correcciones son claras y no doctrinalmente controvertidas.
