translation:
  language: es
  text: El cedro en el interior de la casa estaba tallado con calabazas[a] y flores abiertas. Todo era de cedro[b]; no se veía ninguna piedra.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Alternativa léxica: «brotes» o «capullos» para פְּקָעִים. El inglés POB optó por «gourds» por la probable forma ornamental redondeada; en español se mantiene «calabazas» por claridad visual.'
    reason: lexical_alternative
  - marker: b
    text: 'O «Todo estaba revestido de cedro». La redacción breve conserva el sentido totalizador del hebreo: toda la superficie visible era de cedro.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אֶרֶז
  english_pob_choice: cedar
  chosen_spanish: cedro
  alternatives_spanish:
  - madera de cedro
  - cedro (madera de cedro)
  lexicon: HALOT
  rationale: En este contexto arquitectónico, el sustantivo designa el material de revestimiento. 'Cedro' es natural en español y conserva el valor material sin añadir explicaciones innecesarias.
- source_word: אֶל הַבַּיִת פְּנִימָה
  english_pob_choice: on the inside of the house
  chosen_spanish: en el interior de la casa
  alternatives_spanish:
  - dentro de la casa
  - en la parte interior de la casa
  lexicon: HALOT
  rationale: La frase sitúa el trabajo de cedro en la superficie interior del edificio. 'En el interior de la casa' refleja bien la ubicación espacial y suena natural en español.
- source_word: מִקְלַעַת
  english_pob_choice: carved with
  chosen_spanish: tallado con
  alternatives_spanish:
  - grabado con
  - ornamentado con
  lexicon: HALOT
  rationale: El término describe labor decorativa hecha sobre la madera o paneles. 'Tallado con' preserva la idea de trabajo escultórico/ornamental y es idiomático.
- source_word: פְּקָעִים
  english_pob_choice: gourds
  chosen_spanish: calabazas
  alternatives_spanish:
  - gourdes
  - frutos redondos ornamentales
  - brotes
  lexicon: HALOT
  rationale: El audit trail en inglés entiende aquí una forma redondeada ornamental. En español, 'calabazas' comunica esa forma de manera más natural; no se debe entender como horticultura literal sino como motivo ornamental.
- source_word: וּפְטוּרֵי צִצִּים
  english_pob_choice: and open flowers
  chosen_spanish: y flores abiertas
  alternatives_spanish:
  - y flores en flor
  - y capullos abiertos
  - y flores de relieve
  lexicon: HALOT
  rationale: La construcción apunta a motivos florales tallados. 'Flores abiertas' mantiene la imagen de floración desplegada y conserva la posible tensión entre 'flores' y 'brotes' sin resolverla de forma excesiva.
- source_word: הַכֹּל אֶרֶז
  english_pob_choice: Everything was cedar
  chosen_spanish: Todo era cedro
  alternatives_spanish:
  - Todo era de cedro
  - Todo estaba revestido de cedro
  lexicon: HALOT
  rationale: La formulación resume que todo el interior visible era de cedro. 'Todo era cedro' es concisa y mantiene la fuerza totalizadora del hebreo.
- source_word: אֵין אֶבֶן נִרְאָה
  english_pob_choice: no stone was visible
  chosen_spanish: no se veía piedra
  alternatives_spanish:
  - no se veía ninguna piedra
  - no era visible piedra
  lexicon: HALOT
  rationale: La cláusula dice que la piedra quedó oculta por el revestimiento. 'No se veía piedra' reproduce el pasivo de manera natural y breve, sin perder el sentido de ocultamiento completo.
translation_notes:
  revision_awareness: El borrador sigue de cerca la última revisión inglesa, que no introdujo cambios adicionales y mantiene el acuerdo alto con la fuente. Se conservan las dos imágenes ornamentales del texto hebreo y la clausula final sobre la piedra visible.
  spanish_consistency_notes:
  - Se usó «cedro» para אֶרֶז conforme al valor material del revestimiento.
  - 'Se preservó la doble imagen ornamental con dos sustantivos distintos: «calabazas» y «flores abiertas».'
  - Se evitó «SEÑOR» o cualquier sustitución teológica porque el versículo no contiene el nombre divino ni un título equivalente.
  - Se optó por un español bíblico moderno, sin arcaísmos innecesarios, pero sin suavizar la imaginería arquitectónica.
