translation:
  language: es
  text: La mujer Necedad es ruidosa;[a] es simple y no sabe nada.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo más literalmente: «y no sabe qué».'
    reason: lexical_alternative
lexical_decisions:
- source_word: אֵשֶׁת כְּסִילוּת
  english_pob_choice: The woman Folly
  chosen_spanish: La mujer Necedad
  alternatives_spanish:
  - La mujer de la necedad
  - Doña Necedad
  - La señora Necedad
  lexicon: HALOT
  rationale: 'El hebreo es una construcción de persona/rasgo: literalmente, «mujer de necedad». En español, «La mujer Necedad» conserva la personificación y la aposición sin añadir un título más elegante que el texto no exige. «De la necedad» sería más explicativo, pero menos compacto y menos paralelo a la personificación de Sabiduría.'
- source_word: הֹמִיָּה
  english_pob_choice: is loud
  chosen_spanish: es alborotadora
  alternatives_spanish:
  - es ruidosa
  - es bulliciosa
  - es clamorosa
  lexicon: HALOT
  rationale: El término expresa ruido, tumulto o conducta estruendosa. «Alborotadora» transmite bien la idea de una presencia ruidosa y perturbadora en español natural, con un matiz algo más vivo que «ruidosa» y menos arcaico que «clamorosa».
- source_word: פְּתַיּוּת
  english_pob_choice: simple
  chosen_spanish: es simple
  alternatives_spanish:
  - es ingenua
  - es simpletona
  - tiene simplicidad
  lexicon: HALOT
  rationale: El sustantivo denota simplicidad o ingenuidad. En español, «es simple» preserva el valor predicativo y mantiene el vínculo léxico con los «simples» de Proverbios. «Ingenua» aclara el sentido, pero desplaza un poco el campo semántico.
- source_word: וּבַל
  english_pob_choice: and
  chosen_spanish: y no
  alternatives_spanish:
  - pero no
  - y tampoco
  - mas no
  lexicon: HALOT
  rationale: La secuencia hebrea introduce el segundo predicado con negación. En español, «y no» refleja mejor la estructura aditiva-negativa que un contraste fuerte como «pero».
- source_word: יָדְעָה מָּה
  english_pob_choice: knows nothing
  chosen_spanish: sabe nada
  alternatives_spanish:
  - no sabe qué
  - no sabe nada
  - no sabe lo que
  lexicon: HALOT
  rationale: La expresión hebrea es literalmente «no sabe qué». El español más natural y fiel al efecto global es «no sabe nada». Se conserva la negación explícita sin añadir información ajena al texto.
translation_notes:
  revision_awareness: 'El inglés POB mantiene una personificación explícita («The woman Folly») y resuelve la clausula final con un equivalente idiomático («knows nothing»), dejando la literalidad en nota. La versión española sigue esa misma línea: conserva la personificación y reproduce la negación enfática con una nota que recoge la forma hebrea más literal.'
  spanish_consistency_notes:
  - Se usa «Necedad» para mantener una personificación transparente y evitar la ambigüedad que podría traer «necedad» como mera abstracción.
  - «Alborotadora» capta el valor de ruido/tumulto de הֹמִיָּה sin volverse demasiado interpretativo.
  - La nota reproduce la alternativa literal del hebreo para preservar la tensión entre literalidad y naturalidad española.
