translation:
  language: es
  text: y todas las ciudades de Sihón, rey de los amorreos, que reinó en Hesbón, hasta la frontera de los hijos de Amón.[a]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O «los amonitas». Hebreo: «los hijos de Amón».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְ/כֹל
  english_pob_choice: and all
  chosen_spanish: y todas
  alternatives_spanish:
  - todas
  lexicon: HALOT
  rationale: La conjunción וְ enlaza este versículo con la descripción territorial anterior, por lo que en español conviene conservar el valor coordinante con «y». כֹל expresa totalidad, bien reflejada con «todas».
- source_word: עָרֵי
  english_pob_choice: the cities of
  chosen_spanish: las ciudades de
  alternatives_spanish:
  - ciudades de
  - los poblados de
  lexicon: HALOT
  rationale: Es el constructo plural de עִיר. «Ciudades» preserva con claridad el sentido territorial y la relación posesiva/construida del hebreo.
- source_word: סִיחוֹן
  english_pob_choice: Sihon
  chosen_spanish: Sihón
  alternatives_spanish:
  - Sihon
  lexicon: Transliteración propia
  rationale: Se translitera el nombre personal al español. Se usa tilde para adecuación gráfica al español y para reflejar la acentuación natural.
- source_word: מֶלֶךְ הָאֱמֹרִי
  english_pob_choice: king of the Amorites
  chosen_spanish: rey de los amorreos
  alternatives_spanish:
  - rey del amorreo
  - el rey amorreo
  lexicon: HALOT
  rationale: El constructo se vierte con una relación genitiva natural en español. «Amorreos» mantiene el etnónimo plural del original y evita una reformulación más interpretativa.
- source_word: אֲשֶׁר מָלַךְ
  english_pob_choice: who reigned
  chosen_spanish: que reinó
  alternatives_spanish:
  - que gobernó
  - que fue rey
  lexicon: HALOT
  rationale: מָלַךְ indica el ejercicio real del reinado. «Reinó» conserva mejor el matiz monárquico que «gobernó».
- source_word: בְּחֶשְׁבּוֹן
  english_pob_choice: in Heshbon
  chosen_spanish: en Hesbón
  alternatives_spanish:
  - en Heshbón
  - en Heshbon
  lexicon: HALOT
  rationale: La preposición בְ seguida de un topónimo se expresa naturalmente con «en». Se adopta una forma castellana del topónimo para lectura pública clara.
- source_word: עַד גְּבוּל
  english_pob_choice: as far as the border of
  chosen_spanish: hasta el borde de
  alternatives_spanish:
  - hasta la frontera de
  - hasta el límite de
  lexicon: HALOT
  rationale: עַד marca extensión hasta un límite. «Borde» reproduce la imagen espacial de manera directa; «límite» o «frontera» son posibles, pero «borde» mantiene la concreción del recorrido territorial.
- source_word: בְּנֵי עַמּוֹן
  english_pob_choice: the sons of Ammon
  chosen_spanish: los hijos de Amón
  alternatives_spanish:
  - los amonitas
  - los hijos de Ammon
  lexicon: HALOT
  rationale: Se conserva la forma filiar del hebreo, como en el texto fuente. «Amonitas» sería el equivalente étnico más idiomático, pero aquí se mantiene la construcción literal del original.
translation_notes:
  revision_awareness: El testigo inglés indica alta concordancia y ningún cambio en la última revisión; por eso se mantiene una formulación directa y estable, sin introducir ajustes no respaldados por el paquete fuente.
  spanish_consistency_notes:
  - Se mantiene la transliteración de nombres propios y topónimos de forma consistente con el español bíblico moderno.
  - Se conserva la formulación filial «hijos de Amón» en el texto principal, con la alternativa étnica en nota, siguiendo el patrón auditado del inglés POB.
  - No se añade ninguna nota teológica porque el versículo es puramente descriptivo y el paquete fuente no documenta tensiones doctrinales.
