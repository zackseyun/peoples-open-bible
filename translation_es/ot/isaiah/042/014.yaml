translation:
  language: es
  text: He guardado silencio desde hace mucho tiempo[a]; he estado callado y me he contenido. Como una mujer en trabajo de parto, gritaré[b]; jadearé y resollaré a la vez.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'desde antiguo' o 'por mucho tiempo' para 'desde hace mucho tiempo'.
    reason: lexical_alternative
  - marker: b
    text: La última cláusula también puede traducirse como 'jadearé y resollaré todo a la vez'.
    reason: lexical_alternative
lexical_decisions:
- source_word: הֶחֱשֵׁיתִי
  english_pob_choice: I have kept silent
  chosen_spanish: He guardado silencio
  alternatives_spanish:
  - He estado en silencio
  - He callado
  lexicon: HALOT
  rationale: El hebreo en primera persona expresa la acción de hacerse/sostenerse en silencio; el perfecto español conserva el valor retrospectivo y la idea de una pausa prolongada sin endurecerla innecesariamente.
- source_word: מֵעוֹלָם
  english_pob_choice: from long ago
  chosen_spanish: desde hace mucho tiempo
  alternatives_spanish:
  - desde antiguo
  - desde tiempos remotos
  - desde siempre
  lexicon: HALOT
  rationale: El contexto apunta a una duración larga en el pasado, no a eternidad absoluta. 'Desde hace mucho tiempo' es natural en español y mantiene ese alcance temporal.
- source_word: אַחֲרִישׁ
  english_pob_choice: I have been quiet
  chosen_spanish: he estado callado
  alternatives_spanish:
  - he estado quieto
  - he guardado silencio
  lexicon: HALOT
  rationale: Para evitar una repetición mecánica, 'callado' conserva el campo semántico de silencio/quietud y refleja el paralelismo con el verbo anterior.
- source_word: אֶתְאַפָּק
  english_pob_choice: restrained myself
  chosen_spanish: me he contenido
  alternatives_spanish:
  - me he refrenado
  - me he contenido a mí mismo
  lexicon: HALOT
  rationale: El hitpael expresa autocontención o retenerse. 'Me he contenido' comunica bien la fuerza reflexiva y el matiz de postergar la acción.
- source_word: כַּיּוֹלֵדָה
  english_pob_choice: Like a woman in labor
  chosen_spanish: Como una mujer en trabajo de parto
  alternatives_spanish:
  - Como una mujer que da a luz
  - Como una mujer de parto
  lexicon: HALOT
  rationale: La imagen es la de parto/labor; 'trabajo de parto' es idiomático, claro y conserva la intensidad del símil.
- source_word: אֶפְעֶה
  english_pob_choice: I will cry out
  chosen_spanish: gritaré
  alternatives_spanish:
  - clamaré
  - daré un grito
  lexicon: HALOT
  rationale: El verbo implica una exclamación o grito de dolor/aflicción. 'Gritaré' reproduce con naturalidad la irrupción sonora previa a los verbos de respiración.
- source_word: אֶשֹּׁם
  english_pob_choice: I will gasp
  chosen_spanish: jadearé
  alternatives_spanish:
  - resollaré
  - tomaré aire jadeando
  lexicon: HALOT
  rationale: En este contexto de parto y respiración forzada, el valor audible de la raíz se entiende mejor como jadeo/respiración entrecortada que como otra acepción menos pertinente.
- source_word: וְאֶשְׁאַף
  english_pob_choice: and pant
  chosen_spanish: y resoplaré
  alternatives_spanish:
  - y jadearé
  - y aspiraré con fuerza
  lexicon: HALOT
  rationale: '''Resoplaré'' mantiene la idea de aspirar/expeler el aliento con fuerza. Se distingue de ''jadearé'' para conservar el paralelismo de dos verbos respiratorios intensos.'
- source_word: יָחַד
  english_pob_choice: together
  chosen_spanish: a la vez
  alternatives_spanish:
  - juntos
  - simultáneamente
  - todo a la vez
  lexicon: HALOT
  rationale: El adverbio marca simultaneidad. 'A la vez' suena natural en español y conserva el sentido de acciones que ocurren conjuntamente.
theological_decisions:
- issue: Imagen divina de parto y respiración intensa
  english_pob_reading: Retain the simile 'Like a woman in labor' without softening or allegorizing it.
  chosen_spanish_reading: Conservar el símil 'Como una mujer en trabajo de parto' sin suavizarlo ni convertirlo en una imagen genérica.
  alternative_spanish_readings:
  - Reemplazarlo por una imagen general de angustia
  - Explicarlo solo en nota o comentario
  rationale: El hebreo presenta una comparación explícita; mantenerla preserva la fuerza retórica y la tensión teológica del pasaje sin negar la intención figurada del texto.
  doctrine_reference: Preservar la tensión teológica en vez de resolverla artificialmente.
translation_notes:
  revision_awareness: La revisión más reciente del audit trail no introdujo cambios; el consenso de revisión indica alta concordancia y solo observaciones menores. Se mantuvo el sentido temporal de מֵעוֹלָם como duración larga pasada, y el final se tradujo con dos verbos respiratorios intensos en paralelo, conservando la simultaneidad de יָחַד.
  spanish_consistency_notes:
  - Se usó 'Yahvé' no aplica en este versículo, pero se mantuvo la terminología bíblica estándar del proyecto para el resto del léxico relevante.
  - Se evitó 'SEÑOR' porque no hay aquí sustitución del nombre divino.
  - '''Trabajo de parto'' conserva el símil sin hacerlo más técnico de lo necesario.'
  - Se prefirió 'a la vez' para יָחַד por claridad natural en español, aunque 'todo a la vez' sigue siendo una alternativa válida.
