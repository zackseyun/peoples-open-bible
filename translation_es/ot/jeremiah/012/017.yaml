translation:
  language: es
  text: Pero si no escuchan[a], entonces yo arrancaré de raíz a esa nación, arrancándola y destruyéndola, declara Yahvé.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'no obedecen'. El verbo hebreo puede significar tanto 'escuchar' como 'obedecer' según el contexto.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְאִם
  english_pob_choice: But if
  chosen_spanish: Pero si
  alternatives_spanish:
  - Y si
  - Pero en caso de que
  lexicon: HALOT
  rationale: La partícula introduce una condición con matiz adversativo respecto del contexto previo; 'Pero si' conserva mejor esa oposición que un simple 'si'.
- source_word: לֹא יִשְׁמָעוּ
  english_pob_choice: they do not listen
  chosen_spanish: no escuchan
  alternatives_spanish:
  - no obedecen
  - no oyen
  lexicon: HALOT
  rationale: שׁמע puede significar 'oír/escuchar' y también 'obedecer'. 'No escuchan' mantiene el verbo base y deja visible la posible implicación de desobediencia sin forzarla en el texto principal.
- source_word: וְנָתַשְׁתִּי
  english_pob_choice: then I will uproot
  chosen_spanish: entonces yo arrancaré de raíz
  alternatives_spanish:
  - entonces yo desarraigaré
  - entonces yo arrancaré
  lexicon: HALOT
  rationale: נתשׁ en Jeremías es una imagen agrícola de arrancar de raíz. 'Arrancaré de raíz' transmite con naturalidad la fuerza metafórica y el carácter de juicio.
- source_word: הַגּוֹי הַהוּא
  english_pob_choice: that nation
  chosen_spanish: esa nación
  alternatives_spanish:
  - ese pueblo
  - esa nación gentílica
  lexicon: HALOT
  rationale: גּוֹי designa aquí una entidad nacional. 'Nación' es el equivalente más directo y sobrio en español.
- source_word: נָתוֹשׁ
  english_pob_choice: uprooting
  chosen_spanish: arrancándola de raíz
  alternatives_spanish:
  - desarraigándola
  - arrancando de raíz
  lexicon: HALOT
  rationale: El infinitivo absoluto intensifica el verbo finito. En español se refleja mejor con una repetición participial/gerundiva que conserve la fuerza enfática del hebreo.
- source_word: וְאַבֵּד
  english_pob_choice: and destroying
  chosen_spanish: y destruyéndola
  alternatives_spanish:
  - y haciéndola perecer
  - y exterminándola
  lexicon: HALOT
  rationale: אבד en causativo expresa hacer perecer. 'Destruyéndola' es idiomático y mantiene el paralelismo de acciones enfáticas.
- source_word: נְאֻם יְהוָה
  english_pob_choice: declares Yahweh
  chosen_spanish: declara Yahvé
  alternatives_spanish:
  - dice Yahvé
  - oráculo de Yahvé
  lexicon: HALOT
  rationale: Se conserva el nombre divino 'Yahvé' según el criterio del proyecto. 'Declara' reproduce la fórmula profética solemne de נְאֻם sin caer en una traducción excesivamente arcaica.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: El Tetragrámaton se traduce de forma consistente como 'Yahvé' en el cuerpo principal, preservando el nombre personal divino y evitando la sustitución litúrgica.
theological_decisions:
- issue: Nombre divino en la fórmula profética
  english_pob_reading: declares Yahweh
  chosen_spanish_reading: declara Yahvé
  alternative_spanish_readings:
  - dice Yahvé
  - oráculo de Yahvé
  rationale: El hebreo termina con נְאֻם יְהוָה, fórmula profética solemne con el nombre propio divino. La lectura 'declara Yahvé' conserva tanto la solemnidad como la política del proyecto de no ocultar el Tetragrámaton detrás de un título.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Matiz de obediencia en שׁמע
  english_pob_reading: they do not listen / Or 'they do not obey.'
  chosen_spanish_reading: no escuchan
  alternative_spanish_readings:
  - no obedecen
  - no atienden
  rationale: El POB inglés preserva la ambigüedad entre escuchar y obedecer. 'No escuchan' mantiene esa tensión; la nota permite la alternativa 'no obedecen' sin resolverla indebidamente en el texto principal.
  doctrine_reference: Jeremías usa con frecuencia la respuesta al mensaje divino como escucha obediente; la ambigüedad léxica debe permanecer visible.
translation_notes:
  revision_awareness: La redacción sigue la revisión más reciente del POB inglés, que prefirió conservar la repetición del verbo de 'arrancar de raíz' en lugar de condensarla en una sola expresión de destrucción total. Por eso el español también repite la acción con 'arrancándola de raíz' y 'destruyéndola', manteniendo el énfasis enfático del hebreo.
  spanish_consistency_notes:
  - Se emplea 'Yahvé' de forma consistente para יְהוָה.
  - Se evita 'SEÑOR' como sustituto litúrgico, conforme al criterio del proyecto.
  - '''Escuchan'' conserva la ambigüedad obediencial de שׁמע; la nota ofrece la alternativa.'
  - La repetición verbal en 'arrancaré de raíz... arrancándola de raíz' intenta reflejar el infinitivo absoluto intensivo del hebreo.
