    text: 'Hebreo: «ir detrás de mí», es decir, «seguirme».'
    reason: lexical_alternative
  revision_rationale: Se mejora la naturalidad del español con «le dijo» y «¿Deberé entonces llevar de vuelta...?» sin apartarse del sentido hebreo ni del audit trail inglés. Se elimina una nota innecesaria y se corrige el anclaje de la nota restante para que explique el segmento correcto.
