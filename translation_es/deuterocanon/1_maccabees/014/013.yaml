translation:
  language: es
  text: Y cesó de combatir[a] contra ellos en la tierra, y sus reyes fueron aplastados en aquellos días.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «de hacer guerra contra ellos». El participio griego πολεμῶν también puede traducirse de manera más explícita como una acción continua de guerra.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐξέλιπεν
  english_pob_choice: ceased
  chosen_spanish: cesó
  alternatives_spanish:
  - dejó de
  - terminó
  - cesó de existir
  lexicon: LSJ
  rationale: El verbo expresa dejar de hacer algo; en este contexto no indica desaparición, sino el fin de la acción de combatir.
- source_word: πολεμῶν
  english_pob_choice: fighting
  chosen_spanish: de combatir
  alternatives_spanish:
  - de hacer guerra
  - de guerrear
  - combatiendo
  lexicon: BDAG
  rationale: El participio presente de πολεμέω nombra la actividad que cesa. En español, 'de combatir' conserva el matiz militar de modo natural.
- source_word: ἐπὶ τῆς γῆς
  english_pob_choice: on the earth
  chosen_spanish: sobre la tierra
  alternatives_spanish:
  - en la tierra
  - sobre la tierra
  lexicon: LSJ
  rationale: γῆ puede significar 'tierra' o 'territorio'. Dado que el texto griego y la revisión inglesa favorecen una correspondencia más literal con γῆ, 'sobre la tierra' refleja esa forma sin imponer 'tierra' como territorio político.
- source_word: οἱ βασιλεῖς αὐτῶν
  english_pob_choice: their kings
  chosen_spanish: sus reyes
  alternatives_spanish:
  - sus reyes
  - los reyes de ellos
  lexicon: LSJ
  rationale: La posesión se expresa de forma natural en español con 'sus'. 'Reyes' conserva el rango político del original.
- source_word: συνετρίβησαν
  english_pob_choice: were crushed
  chosen_spanish: fueron aplastados
  alternatives_spanish:
  - fueron quebrantados
  - fueron quebrados
  - fueron triturados
  lexicon: LSJ
  rationale: El pasivo de συντρίβω comunica derrota decisiva y destrucción. 'Aplastados' conserva la imagen de aplastamiento y funciona bien en español moderno.
- source_word: ἐν ταῖς ἡμέραις ἐκείναις
  english_pob_choice: in those days
  chosen_spanish: en aquellos días
  alternatives_spanish:
  - en esos días
  - durante aquellos días
  lexicon: LSJ
  rationale: La expresión temporal fija se vierte de manera idiomática con 'en aquellos días'.
translation_notes:
  revision_awareness: La revisión inglesa cambió 'in the land' por 'on the earth' para acercarse más a ἐπὶ τῆς γῆς. En español se siguió esa decisión con 'sobre la tierra', manteniendo la correspondencia léxica sin perder naturalidad.
  spanish_consistency_notes:
  - Se prefirió 'tierra' en lugar de 'país' o 'territorio' para respetar la amplitud semántica de γῆ y la revisión inglesa.
  - Se evitó 'SEÑOR' o terminología teológica no pertinente; el verso es histórico-militar.
  - '''Aplastados'' reproduce con fuerza la pasividad del verbo griego y la decisión inglesa ''were crushed''.'
