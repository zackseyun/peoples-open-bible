base_translation:
  language: en
  yaml_path: translation/ot/ezekiel/034/027.yaml
  text: The tree of the field will give its fruit[a], and the land will give its produce, and they will be secure on their land. Then they will know that I am Yahweh, when I break the bars of their yoke and deliver them from the hand of those who enslaved them.
  footnotes:
  - marker: a
    text: Or 'those who made them serve' or 'those who worked them.' The Hebrew participle can be rendered more literally, but the context of a broken yoke supports the stronger sense 'enslaved them.'
    reason: lexical_alternative
