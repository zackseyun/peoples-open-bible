    reason: cultural_note
  - marker: c
    text: 'Hebreo: ''el sacerdote lo hace limpio''; aquí significa una declaración oficial de estado limpio, no que el sacerdote cure médicamente la afección.'
    reason: alternative_reading
  revision_rationale: Se reemplaza la transliteración opaca 'neṭeq' por 'afección escamosa', que sigue la lógica descriptiva del expediente inglés y mejora mucho la legibilidad en español sin imponer un diagnóstico moderno preciso. Se ajusta 'y he aquí, si' a 'y si resulta que' para reflejar la función observacional de וְהִנֵּה con español natural. Se conserva 'lo declarará limpio' por su valor judicial-ritual correcto. Se mantienen las notas necesarias, corrigiendo su formulación para alinearlas mejor con el rastro POB y con una lectura eclesial amplia.
