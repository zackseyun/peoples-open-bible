revisions:
- from: cualquier oración[a], cualquier súplica que pueda ser hecha por cualquier hombre o por todo tu pueblo Israel, cada uno conociendo su propia aflicción y su propio dolor, y extendiendo sus manos hacia esta casa—
  to: cualquier oración[a], cualquier súplica que se haga por cualquier hombre o por todo tu pueblo, Israel, sabiendo cada uno su propia aflicción y su propio dolor, y extendiendo las manos hacia esta casa—
  rationale: 'Se hicieron ajustes menores de naturalidad y legibilidad en español sin cambiar el sentido fuente ni las decisiones teológicas documentadas: ''que se haga'' por la pasiva forzada ''que pueda ser hecha''; ''sabiendo cada uno'' por el calco menos natural ''cada uno conociendo''; y coma en ''tu pueblo, Israel'' para una mejor lectura. Se mantuvo ''por cualquier hombre'' con nota inclusiva, conforme al rastro POB sobre אָדָם.'
  reviewer_model: gpt-5.4
