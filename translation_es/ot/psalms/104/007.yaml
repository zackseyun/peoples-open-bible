revisions:
- from: Ante tu reprensión huyeron[a]; ante el sonido de tu trueno se apresuraron.
  to: Por tu reprensión huyeron[a]; al sonido de tu trueno se apresuraron a huir.
  rationale: Se ajusta la primera preposición para lograr un español más natural y fiel al valor ocasionante de מִן en este paralelismo, y se añade 'a huir' en la segunda cláusula para conservar el matiz de retirada rápida. También se mejora la nota alternativa para que suene idiomática en español y siga reflejando las opciones léxicas documentadas en el inglés POB.
