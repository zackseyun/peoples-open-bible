  language: en
  yaml_path: translation/ot/1_samuel/012/017.yaml
  text: Is it not wheat harvest today? I will call to Yahweh[a], and he will send thunder and rain, so that you may know and see that your wickedness is great[b], which you have done in the sight of Yahweh by asking for yourselves a king.
  footnotes:
