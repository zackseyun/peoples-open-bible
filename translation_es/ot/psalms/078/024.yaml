translation:
  language: es
  text: Hizo llover sobre ellos maná para comer[a], y les dio el grano del cielo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «el grano de los cielos»; la expresión es una descripción poética del maná, también vertida de manera más interpretativa como «alimento del cielo» o «pan del cielo» en contextos afines.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּמְטֵר
  english_pob_choice: He rained down
  chosen_spanish: Hizo llover
  alternatives_spanish:
  - Llovió sobre
  - Hizo caer lluvia
  lexicon: HALOT
  rationale: El hiphil de מטר expresa causación de lluvia; en español, «hizo llover» conserva la idea causativa de manera natural y fiel, sin forzar una construcción extraña.
- source_word: עֲלֵיהֶם
  english_pob_choice: on them
  chosen_spanish: sobre ellos
  alternatives_spanish:
  - encima de ellos
  - sobre ellos
  lexicon: HALOT
  rationale: La preposición על con sufijo pronominal indica dirección/superposición. «Sobre ellos» transmite bien el valor espacial con un registro bíblico claro.
- source_word: מָן
  english_pob_choice: manna
  chosen_spanish: maná
  alternatives_spanish:
  - maná
  lexicon: HALOT
  rationale: «Maná» es la forma establecida en español para el alimento del desierto y corresponde al transliterado tradicional y comprensible.
- source_word: לֶאֱכֹל
  english_pob_choice: to eat
  chosen_spanish: para comer
  alternatives_spanish:
  - para que comieran
  - para comer
  lexicon: HALOT
  rationale: El infinitivo con ל expresa finalidad. «Para comer» es conciso, natural y mantiene el propósito de la provisión.
- source_word: דְגַן
  english_pob_choice: grain
  chosen_spanish: grano
  alternatives_spanish:
  - grano
  - cereal
  lexicon: HALOT
  rationale: דגן designa grano o cereal. «Grano» conserva la imagen poética y evita la interpretación más amplia de «alimento».
- source_word: שָׁמַיִם
  english_pob_choice: heaven
  chosen_spanish: cielo
  alternatives_spanish:
  - cielos
  - cielo
  lexicon: HALOT
  rationale: En español, dentro de esta metáfora poética, «cielo» comunica bien el genitivo de procedencia y mantiene el tono elevado sin necesidad de pluralizar.
- source_word: נָתַן
  english_pob_choice: gave
  chosen_spanish: les dio
  alternatives_spanish:
  - dio
  - les concedió
  lexicon: HALOT
  rationale: נתן es el verbo común «dar». «Les dio» refleja de forma directa la acción y el objeto indirecto explícito del hebreo poético.
- source_word: לָמוֹ
  english_pob_choice: them
  chosen_spanish: les
  alternatives_spanish:
  - a ellos
  - les
  lexicon: HALOT
  rationale: La forma poética pronominal significa «a ellos». En español, el dativo «les» naturaliza el complemento sin perder el referente plural.
theological_decisions:
- issue: La expresión poética «grano del cielo» para el maná
  english_pob_reading: Retain the poetic metaphor rather than interpret it away.
  chosen_spanish_reading: Conservar la metáfora poética «grano del cielo» en lugar de sustituirla por «alimento del cielo» o «pan del cielo».
  alternative_spanish_readings:
  - alimento del cielo
  - pan del cielo
  rationale: El hebreo usa דגן ('grano') en paralelo poético con el maná. Mantener «grano del cielo» preserva la imagen original y evita resolver la tensión poética con una interpretación más explícita.
  doctrine_reference: Principio de primacía del texto original y preservación de la metáfora; no armonizar de antemano con pasajes afines.
translation_notes:
  revision_awareness: La revisión inglesa más reciente no introdujo cambios y el control cruzado informó alta concordancia; por ello, el borrador español sigue de cerca la decisión estable de conservar la metáfora de «grain of heaven» y su equivalencia poética en español.
  spanish_consistency_notes:
  - Se mantuvo «maná» como transliteración estable y ampliamente inteligible.
  - Se eligió «cielo» en singular para reflejar el giro poético del hebreo en un español natural.
  - No se sustituyó la metáfora por formulaciones explicativas como «pan del cielo», para conservar la tensión léxica documentada.
  - El dativo «les» conserva la referencia plural de לָמוֹ en una forma idiomática en español.
