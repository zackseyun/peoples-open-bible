translation:
  language: es
  text: a la ciudad[a], para que ofrecieran sacrificio. Y muchos de Israel vinieron hacia ellos[b], y Matatías y sus hijos fueron reunidos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El testimonio griego dado para este versículo comienza en medio de una oración; ‘a la ciudad’ continúa la cláusula anterior y no constituye una frase completa por sí sola.
    reason: textual_variant
  - marker: b
    text: O ‘se acercaron a ellos’ o ‘se pasaron a ellos’. El griego dice literalmente ‘vinieron hacia ellos’, y en este contexto probablemente implica que se alinearon con ellos.
    reason: lexical_alternative
lexical_decisions:
- source_word: τὴν πόλιν
  english_pob_choice: to the city
  chosen_spanish: a la ciudad
  alternatives_spanish:
  - hacia la ciudad
  - a la urbe
  lexicon: LSJ
  rationale: El griego conserva un acusativo de dirección dependiente del contexto previo; en español, 'a la ciudad' mantiene la orientación del movimiento sin sobre-reconstruir lo que antecede. 'Urbe' sería menos natural y más marcado.
- source_word: ἵνα θυσιάσωσιν
  english_pob_choice: so that they might offer sacrifice
  chosen_spanish: para que ofrecieran sacrificio
  alternatives_spanish:
  - para sacrificar
  - para que sacrificaran
  lexicon: LSJ
  rationale: ἵνα con subjuntivo expresa finalidad. 'Ofrecieran sacrificio' conserva el valor cultual de θυσιάζω y suena natural en español; 'sacrificar' puede sonar demasiado absoluto o ambiguo.
- source_word: πολλοὶ ἀπὸ Ἰσραήλ
  english_pob_choice: many from Israel
  chosen_spanish: muchos de Israel
  alternatives_spanish:
  - muchos israelitas
  - muchos de entre Israel
  lexicon: LSJ
  rationale: '''De Israel'' sigue de cerca la construcción ἀπό con sentido de procedencia/pertenencia y evita añadir la precisión interpretativa de ''israelitas'', que es posible pero menos literal.'
- source_word: πρὸς αὐτοὺς προσῆλθαν
  english_pob_choice: came over to them
  chosen_spanish: se pasaron a ellos
  alternatives_spanish:
  - se acercaron a ellos
  - se unieron a ellos
  - fueron hacia ellos
  lexicon: LSJ
  rationale: El contexto sugiere alineación con el grupo, no solo acercamiento físico. 'Se pasaron a ellos' conserva el movimiento hacia personas y el matiz de cambio de bando que la POB inglesa deja implícito sin resolverlo del todo.
- source_word: συνήχθησαν
  english_pob_choice: were gathered together
  chosen_spanish: fueron reunidos
  alternatives_spanish:
  - se reunieron
  - fueron congregados
  lexicon: LSJ
  rationale: La forma pasiva/deponente pide una voz pasiva o equivalente. 'Fueron reunidos' refleja mejor la pasividad del verbo que un simple 'se reunieron', aunque ambos son posibles en español.
theological_decisions:
- issue: Matiz de alineación política/religiosa en πρὸς αὐτοὺς προσῆλθαν
  english_pob_reading: Render as 'came over to them' rather than the more interpretive 'joined them.'
  chosen_spanish_reading: se pasaron a ellos
  alternative_spanish_readings:
  - se unieron a ellos
  - se acercaron a ellos
  rationale: La escena implica una toma de partido en un contexto de sacrificio ilícito, pero el verbo griego solo dice que vinieron hacia ellos. 'Se pasaron a ellos' conserva la ambigüedad entre acercamiento y adhesión, sin convertirla en una afirmación doctrinal o narrativa más fuerte de lo que exige el texto.
  doctrine_reference: Preservar la tensión léxica y narrativa sin resolverla artificialmente.
- issue: El inicio del verso depende de una cláusula previa no conservada en el testimonio suministrado
  english_pob_reading: The Greek source for this verse begins mid-sentence in the supplied witness; 'to the city' continues the preceding clause rather than standing as a complete sentence on its own.
  chosen_spanish_reading: a la ciudad[a]
  alternative_spanish_readings:
  - a la ciudad,
  - hacia la ciudad
  rationale: La puntuación y la nota deben dejar claro que el sintagma inicial no es una oración autónoma en el testimonio. En español, mantener la frase breve con nota evita reconstrucciones no atestiguadas.
  doctrine_reference: Seguir el testimonio textual disponible y no completar lo que el griego no preserva aquí.
translation_notes:
  revision_awareness: La redacción sigue la revisión inglesa más reciente al usar una coordinación simple con ‘Y’ para καὶ y una pasiva en ‘fueron reunidos’ para συνήχθησαν. También conserva la tensión del verbo πρὸς αὐτοὺς προσῆλθαν mediante ‘se pasaron a ellos’, evitando tanto una traducción meramente espacial como una interpretación demasiado explícita de afiliación.
  spanish_consistency_notes:
  - Se usa 'Matatías' como forma española estable del nombre.
  - Se mantiene 'Israel' como nombre colectivo sin intentar explicar el genitivo/ablativo más allá de 'de Israel'.
  - La puntuación separa las tres cláusulas coordinadas del griego y conserva el flujo narrativo sin introducir contraste inexistente.
