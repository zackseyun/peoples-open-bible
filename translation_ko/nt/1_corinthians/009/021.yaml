  yaml_path: translation/nt/1_corinthians/009/021.yaml
  text: To those outside the law[b][a], as one outside the law—though not being outside God’s law but under Messiah’s law—so that I might win those outside the law.
  footnotes:
  - marker: a
    text: Or 'without the law'; the phrase refers here to those not under the Mosaic law, not necessarily to morally lawless people.
    reason: lexical_alternative
  - marker: b
    text: Greek 'but under Messiah’s law'; alternatively, 'but within the law of Messiah/Christ.'
    reason: alternative_reading
translation:
