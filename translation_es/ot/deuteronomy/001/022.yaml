  to: 'Entonces todos ustedes se acercaron a mí y dijeron: «Enviemos hombres[a] delante de nosotros, para que exploren la tierra para nosotros y nos traigan informe[b] del camino por el cual debemos subir a ella, y de las ciudades a las que iremos».'
