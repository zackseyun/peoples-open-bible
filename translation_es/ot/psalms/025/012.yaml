  rationale: Se reemplaza «Él le instruirá» por «Lo instruirá» para un español más natural sin perder el sujeto implícito contextual (Yahvé). Se cambia «debe escoger» por «ha de escoger», que mantiene mejor el matiz modal/instructivo sin imponer una obligación tan dura y sigue siendo claro y digno. Se pule la nota para mayor naturalidad en español, preservando las alternativas documentadas en el audit trail.
