translation:
  language: es
  text: Den gracias a Yahvé[a], porque él es bueno, porque su amor fiel[b] permanece para siempre.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebreo YHWH; tradicionalmente, «el SEÑOR».
    reason: source_note
  - marker: b
    text: O «su lealtad de pacto». El hebreo חֶסֶד lleva el sentido de amor y bondad leales en contexto de pacto.
    reason: lexical_alternative
lexical_decisions:
- source_word: הוֹדוּ
  english_pob_choice: Give thanks
  chosen_spanish: Den gracias
  alternatives_spanish:
  - Alaben
  - Den alabanza
  - Confiesen
  lexicon: HALOT
  rationale: El imperativo plural de ידה en hiphil admite la idea de dar gracias o alabar. En español, «Den gracias» comunica de manera natural la acción litúrgica y preserva el valor exhortativo del verbo mejor que una forma más interpretativa.
- source_word: לַיהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: El texto hebreo usa el nombre propio divino YHWH. Según el criterio del proyecto, se conserva como «Yahvé» en el texto principal, en lugar de ocultarlo bajo un sustituto reverencial.
- source_word: כִּי
  english_pob_choice: for
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  - porque...
  lexicon: HALOT
  rationale: La partícula introduce la razón de la exhortación. En español, «porque» expresa con claridad y naturalidad la relación causal, manteniendo la cadencia de la línea hebrea.
- source_word: טוֹב
  english_pob_choice: good
  chosen_spanish: bueno
  alternatives_spanish:
  - bondadoso
  - benigno
  - bueno
  lexicon: HALOT
  rationale: El adjetivo predica de Dios su bondad general. «Bueno» es la opción más directa y amplia; «bondadoso» restringiría demasiado el alcance del hebreo.
- source_word: לְעוֹלָם חַסְדּוֹ
  english_pob_choice: his steadfast love endures forever
  chosen_spanish: para siempre es su amor fiel
  alternatives_spanish:
  - para siempre perdura su amor constante
  - para siempre dura su lealtad de pacto
  - para siempre es su misericordia
  lexicon: HALOT
  rationale: חֶסֶד en contexto de pacto combina amor, lealtad y benevolencia. «Amor fiel» conserva esa tensión sin reducirla a una sola noción, y «para siempre es» refleja de forma suficientemente literal la permanencia expresada por לְעוֹלָם.
theological_decisions:
- issue: Nombre divino YHWH
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: El versículo contiene el Tetragrama. La política del proyecto favorece su transliteración en el texto principal para mantener visible el nombre del pacto y evitar el ocultamiento convencional tras un título.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יהוה / YHWH → Yahvé'
- issue: Valor de חֶסֶד
  english_pob_reading: his steadfast love
  chosen_spanish_reading: su amor fiel
  alternative_spanish_readings:
  - su lealtad de pacto
  - su misericordia
  - su amor constante
  rationale: El hebreo celebra la fidelidad benévola de Dios. «Amor fiel» conserva la dimensión relacional y de pacto sin estrechar el término a «misericordia» ni volverlo demasiado técnico con «lealtad de pacto».
  doctrine_reference: DOCTRINE.md Translation philosophy §6; consistency of key terms §5
translation_notes:
  revision_awareness: El texto inglés auditado eliminó la pausa fuerte previa y dejó dos comas para un flujo más natural. La redacción española sigue esa decisión con dos comas, manteniendo exactamente la relación causal y la estructura paralela del hebreo sin añadir puntuación interpretativa.
  spanish_consistency_notes:
  - Se preservó el nombre divino como «Yahvé» conforme a la convención del proyecto, evitando la sustitución por «SEÑOR».
  - «Den gracias» reproduce adecuadamente el valor exhortativo del verbo hebreo en un registro litúrgico natural.
  - «Amor fiel» busca mantener en español la riqueza semántica de חֶסֶד sin perder claridad para lectores eclesiales amplios.
  - La secuencia «porque... porque...» conserva el paralelismo causal del hebreo y del audit trail inglés.
