revisions:
- from: Y a todos los que guardaban la ciudad[a], les escribió que se les dieran lotes y paga.
  to: Y a todos los que vigilaban la ciudad,[a] escribió que se les dieran porciones asignadas y paga.
  rationale: Se ajusta la redacción para reflejar más de cerca la sintaxis griega y el matiz administrativo del versículo. «Escribió que se les dieran» evita añadir un destinatario explícito no presente en la fuente. «Porciones asignadas» comunica mejor κλήρους en este contexto que «lotes», mientras la nota conserva la alternativa más literal. «Vigilaban» mejora la naturalidad sin apartarse del sentido de φρουροῦσι.
