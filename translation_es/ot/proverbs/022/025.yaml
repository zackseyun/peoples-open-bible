- from: para que no aprendas sus caminos y te hagas una trampa para ti mismo.
  to: no sea que aprendas sus caminos[a] y tomes un lazo para ti mismo[b].
  rationale: Se ajusta פֶּן a «no sea que» para reflejar mejor la advertencia preventiva; se corrige וְלָקַחְתָּ a «tomes» para conservar la imagen verbal del hebreo; se prefiere «lazo» por su fuerza metafórica sapiencial; y se restauran las notas léxicas del POB inglés sobre «caminos» y נֶפֶשׁ.
