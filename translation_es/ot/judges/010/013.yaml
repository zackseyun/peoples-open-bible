    issue: El texto principal usa «los libraré» para לְהוֹשִׁיעַ en vez de una forma de «salvar».
    rationale: Aunque «librar» es posible en Jueces, la auditoría inglesa eligió «save» como lectura principal por su amplitud léxica y resonancia teológica, dejando «deliver/rescue» en nota. El español debería preservar esa misma jerarquía salvo necesidad fuerte, y aquí no la hay.
  - severity: low
