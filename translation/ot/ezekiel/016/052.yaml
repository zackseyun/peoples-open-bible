id: EZK.16.52
reference: Ezekiel 16:52
source:
  edition: WLC
  text: גַּם אַ֣תְּ שְׂאִ֣י כְלִמָּתֵ֗/ךְ אֲשֶׁ֤ר פִּלַּלְתְּ֙ לַֽ/אֲחוֹתֵ֔/ךְ בְּ/חַטֹּאתַ֛יִ/ךְ אֲשֶׁר הִתְעַ֥בְתְּ מֵ/הֵ֖ן תִּצְדַּ֣קְנָה מִמֵּ֑/ךְ וְ/גַם אַ֥תְּ בּ֨וֹשִׁי֙ וּ/שְׂאִ֣י כְלִמָּתֵ֔/ךְ בְּ/צַדֶּקְתֵּ֖/ךְ אַחְיוֹתֵֽ/ךְ־׀־־׃
translation:
  text: You also[a], bear your disgrace, because you pronounced judgment in favor of your sisters. By your sins in which you acted more abominably than they, they have become more righteous than you. So you too, be ashamed and bear your disgrace[b], because you made your sisters appear righteous.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Or ''you judged in favor of your sisters'' / ''you interceded for your sisters.'' The Hebrew is ironic: Jerusalem''s sins have effectively vindicated her sisters by comparison.'
    reason: lexical_alternative
  - marker: b
    text: Or 'they are justified more than you.' The sense is comparative, not that they were righteous in an absolute sense.
    reason: alternative_reading
lexical_decisions:
- source_word: שְׂאִי
  chosen: bear
  alternatives:
  - carry
  - endure
  lexicon: HALOT
  rationale: Imperative of נשׂא here idiomatically means to bear or carry one's shame/disgrace, not merely lift. 'Bear' preserves the moral-judicial force in English.
- source_word: כְלִמָּתֵךְ
  chosen: your disgrace
  alternatives:
  - your shame
  - your humiliation
  lexicon: HALOT
  rationale: כְּלִמָּה denotes shame/disgrace. 'Disgrace' fits the public, dishonoring sense in this judgment context, while the nearby בושי supplies the more emotional 'be ashamed' idea.
- source_word: פִּלַּלְתְּ לַאֲחוֹתֵךְ
  chosen: you pleaded for your sisters
  alternatives:
  - you judged in favor of your sisters
  - you interceded for your sisters
  lexicon: HALOT
  rationale: The piel of פלל with ל can mean intervene/judge for. In context Jerusalem's conduct has functionally vindicated her sisters by comparison, so 'pleaded for' captures the ironic forensic sense without over-specifying a courtroom scene.
- source_word: בְּחַטֹּאתַיִךְ
  chosen: by your sins
  alternatives:
  - through your sins
  - in your sins
  lexicon: HALOT
  rationale: 'The beth is instrumental or associative here: her sins are the means by which she has ''pleaded for'' or vindicated her sisters. ''By your sins'' is concise and natural.'
- source_word: הִתְעַבְתְּ מֵהֵן
  chosen: you acted more abominably than they
  alternatives:
  - you became more detestable than they
  - you did abominations more than they
  lexicon: HALOT
  rationale: The hitpael of תעב in this comparative construction indicates behaving in a more abominable way than the sisters. 'Acted more abominably than they' expresses the comparative force clearly.
- source_word: תִּצְדַּקְנָה מִמֵּךְ
  chosen: they are more righteous than you
  alternatives:
  - they are justified more than you
  - they appear more righteous than you
  lexicon: HALOT
  rationale: צדק in comparative contexts often means be in the right / be shown more righteous relative to another. 'More righteous than you' is the most direct rendering, while the contextual nuance of comparative vindication is reflected in the final clause and footnote.
- source_word: בּוֹשִׁי
  chosen: be ashamed
  alternatives:
  - feel shame
  - be put to shame
  lexicon: HALOT
  rationale: Imperative of בוש calls for an affective response of shame. 'Be ashamed' is the standard and natural English equivalent.
- source_word: בְּצַדֶּקְתֵּךְ אַחְיוֹתֵךְ
  chosen: because you made your sisters appear righteous
  alternatives:
  - by your justifying your sisters
  - in your making your sisters seem righteous
  - when you declared your sisters righteous
  lexicon: HALOT
  rationale: The infinitive-like verbal noun from צדק with beth expresses the result or circumstance that Jerusalem has, by contrast, justified/vindicated her sisters. A literal 'in your justifying your sisters' is awkward in English; 'because you made your sisters appear righteous' conveys the comparative-forensic sense.
