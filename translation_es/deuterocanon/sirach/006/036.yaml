review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue correctamente el hebreo principal: «Reflexiona sobre el temor del Altísimo y sobre sus mandamientos; medita continuamente» preserva bien la estructura revisada del POB inglés, donde ambos complementos dependen de «reflexiona» y «medita continuamente» queda como cláusula aparte. También conserva adecuadamente la nota sobre la divergencia sustancial con el paralelo griego.'
  spanish_quality_summary: 'El texto principal es fiel y natural en español bíblico moderno. La única reparación necesaria está en la nota al pie: «ve temprano a él» suena poco natural en español; conviene «ve temprano adonde él» o mejor «ve temprano a verlo / a visitarlo». Además, «hombre inteligente» puede mejorarse a «hombre entendido» o «persona inteligente», pero esto es secundario dentro de una nota de lectura alternativa.'
  glossary_alignment: 'La terminología está bien alineada: «temor», «Altísimo», «mandamientos» y «medita» reflejan correctamente las decisiones del POB y el registro sapiencial. No hay conflicto con los defaults del proyecto.'
  issues:
  - severity: medium
    issue: 'Redacción poco natural en la nota griega: «ve temprano a él»'
    rationale: Aunque transmite el sentido básico de πρὸς αὐτόν, en español neutro resulta forzado. Una formulación como «ve temprano a verlo» mantiene el sentido y mejora la legibilidad sin introducir paráfrasis indebida.
  - severity: low
    issue: «hombre inteligente» en la nota puede sonar algo plano
    rationale: El griego συνετός suele expresarse mejor como «entendido», «prudente» o «sabio» según contexto. No es un error grave, pero «entendido» encaja mejor con el registro sapiencial.
  revised_spanish_text: Reflexiona sobre el temor del Altísimo y sobre sus mandamientos[a]; medita continuamente.
  revised_footnotes:
  - marker: a
    text: 'Paralelo griego: «Si ves a un hombre entendido, ve temprano a verlo, y que tu pie desgaste los escalones de sus puertas». El testimonio hebreo conservado aquí difiere sustancialmente del griego.'
    reason: alternative_reading
  revision_rationale: El texto principal puede mantenerse. Se revisa únicamente la nota al pie para que el español sea natural y de registro sapiencial, sin alterar la transparencia textual sobre la divergencia entre el hebreo y el griego.
