  rationale: Se corrige 'del Señor' a 'de mi señor' para ajustarse mejor al hebreo אֲדֹנָי en este contexto narrativo y a la rationale léxico-teológica documentada, evitando además la confusión española con un título divino. Se actualiza la nota [c] para reflejar con precisión la lectura contextual más probable. El resto del texto puede mantenerse por ser sustancialmente fiel y legible.
