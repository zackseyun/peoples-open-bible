translation:
  language: es
  text: Entonces se acercaron las siervas y sus hijos y se postraron[a][b][c][d].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «se aproximaron»; también «vinieron cerca».
    reason: lexical_alternative
  - marker: b
    text: O «las mujeres siervas»; el hebreo se refiere específicamente a mujeres en condición de servidumbre.
    reason: lexical_alternative
  - marker: c
    text: O «se inclinaron»; «se postraron» expresa más claramente un gesto corporal de homenaje.
    reason: lexical_alternative
  - marker: d
    text: 'Otra posibilidad: «las siervas se acercaron, ellas y sus hijos».'
    reason: previous_rendering
lexical_decisions:
- source_word: וַתִּגַּשְׁןָ
  english_pob_choice: came near
  chosen_spanish: se acercaron
  alternatives_spanish:
  - se aproximaron
  - se acercaron hacia él
  - vinieron cerca
  lexicon: HALOT
  rationale: El verbo נגשׁ en esta forma narrativa indica acercamiento secuencial. «Se acercaron» comunica bien el movimiento hacia Esaú en un español natural y digno, sin endurecer el texto con un calco.
- source_word: הַשְּׁפָחוֹת
  english_pob_choice: the female servants
  chosen_spanish: las siervas
  alternatives_spanish:
  - las mujeres siervas
  - las criadas
  - las esclavas
  lexicon: HALOT
  rationale: שִׁפְחָה designa una mujer en condición de servicio doméstico o servidumbre. «Siervas» conserva el rasgo femenino y el estatus servil con lenguaje bíblico claro; «criadas» puede sonar más doméstico y «esclavas» enfatiza más la condición de propiedad.
- source_word: הֵנָּה
  english_pob_choice: they
  chosen_spanish: ellas
  alternatives_spanish:
  - ellas mismas
  - las mismas
  lexicon: HALOT
  rationale: El pronombre independiente añade énfasis. En español, «ellas» mantiene la referencia explícita sin sobrecargar la frase; en este contexto queda absorbido naturalmente por la estructura del verso.
- source_word: וְיַלְדֵיהֶן
  english_pob_choice: and their children
  chosen_spanish: y sus hijos
  alternatives_spanish:
  - con sus hijos
  - y los hijos de ellas
  lexicon: HALOT
  rationale: El sufijo posesivo de tercera femenina plural se expresa de forma natural con «sus hijos». La coordinación simple reproduce el grupo unido que avanza junto.
- source_word: וַתִּשְׁתַּחֲוֶיןָ
  english_pob_choice: bowed down
  chosen_spanish: se inclinaron
  alternatives_spanish:
  - se postraron
  - se prosternaron
  - se doblaron en homenaje
  lexicon: HALOT
  rationale: שׁחה/השתחוה nombra un gesto de homenaje corporal. «Se inclinaron» es idiomático en español y suficientemente amplio para el acto de reverencia; «se postraron» o «se prosternaron» expresan más explícitamente la intensidad física, pero serían más pesados aquí.
theological_decisions:
- issue: Gesto de homenaje ante Esaú
  english_pob_reading: bowed down
  chosen_spanish_reading: se inclinaron
  alternative_spanish_readings:
  - se postraron
  - se prosternaron
  rationale: El hebreo describe un acto de reverencia corporal. En español, «se inclinaron» comunica la subordinación/homenaje sin imponer de antemano una lectura más extrema que el verso no exige explícitamente; las alternativas quedan disponibles donde se quiera subrayar mayor postración.
  doctrine_reference: Uso narrativo de reverencia/homenaje en el AT; cf. gestos de postración ante superioridad humana o divina.
translation_notes:
  revision_awareness: 'El texto base inglés fue revisado para mejorar fluidez: primero se unió el sujeto («the female servants and their children came near»), y luego se eliminó la coma antes de «and bowed down». La redacción española sigue esa decisión de grupo sujeto + acción conjunta, pero conserva en notas la posibilidad alternativa de reflejar más literalmente la estructura apposicional hebrea.'
  spanish_consistency_notes:
  - Se mantiene «siervas» para הַשְּׁפָחוֹת, en coherencia con el valor femenino específico del hebreo.
  - «Se inclinaron» conserva el acto de homenaje sin sobreinterpretar el grado exacto de postración.
  - La coordinación «y sus hijos» sigue la estructura narrativa unificada del grupo que se aproxima y se inclina.
  - El verso no presenta un término divino ni cristológico, por lo que no requiere ajustes terminológicos especiales.
