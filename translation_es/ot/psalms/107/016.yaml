translation:
  language: es
  text: Porque quebró las puertas de bronce[a] y partió las barras de hierro.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «portones de bronce». El hebreo dice más específicamente «puertas», aunque en contexto también puede referirse a portones fortificados.
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - pues
  - ya que
  - porque es que
  lexicon: HALOT
  rationale: La partícula introduce la explicación de la acción previa; en español, «Porque» conserva con naturalidad el valor causal/explanatorio del hebreo y corresponde al «For» inglés sin endurecer el estilo.
- source_word: שִׁבַּר
  english_pob_choice: shattered
  chosen_spanish: quebró
  alternatives_spanish:
  - destruyó
  - destrozó
  - partió
  lexicon: HALOT
  rationale: El verbo expresa una ruptura violenta. «Quebró» transmite la acción de romper con fuerza de manera clara y digna en español; «destrozó» sería más expansivo que el hebreo, y «partió» es menos enfático.
- source_word: דַּלְתוֹת
  english_pob_choice: doors
  chosen_spanish: las puertas
  alternatives_spanish:
  - las puertas de hoja
  - los portones
  - las hojas
  lexicon: HALOT
  rationale: El sustantivo significa propiamente «puertas». Aunque el contexto puede sugerir una puerta fortificada, el término base no obliga a «portones»; por eso se mantiene la lectura más exacta y natural.
- source_word: נְחֹשֶׁת
  english_pob_choice: bronze
  chosen_spanish: bronce
  alternatives_spanish:
  - cobre
  - latón
  lexicon: HALOT
  rationale: En este contexto metalúrgico bíblico, «bronce» es la equivalencia estándar en español y refleja bien el material duro e imponente del verso.
- source_word: בְרִיחֵי
  english_pob_choice: bars
  chosen_spanish: las barras
  alternatives_spanish:
  - los cerrojos
  - los travesaños
  - los cerrojos transversales
  lexicon: HALOT
  rationale: La imagen apunta a las barras que aseguran la puerta o el acceso. «Barras» conserva la forma simple del original y funciona bien en castellano contemporáneo.
- source_word: בַרְזֶל
  english_pob_choice: iron
  chosen_spanish: hierro
  alternatives_spanish:
  - metal
  - acero
  lexicon: HALOT
  rationale: Traducción directa y estándar del término; mantiene el contraste material del versículo.
- source_word: גִּדֵּעַ
  english_pob_choice: cut through
  chosen_spanish: cortó
  alternatives_spanish:
  - cortó a través de
  - hizo trizas
  - tronchó
  lexicon: HALOT
  rationale: El verbo comunica acción de cortar o desgajar con violencia. En español, «cortó» es sobrio y fiel; el contexto de «barras de hierro» ya intensifica la imagen sin necesidad de una perífrasis más larga.
theological_decisions:
- issue: Sujeto divino implícito
  english_pob_reading: he
  chosen_spanish_reading: él
  alternative_spanish_readings:
  - el SEÑOR
  - Yahvé
  rationale: El hebreo usa verbos en tercera persona masculina singular sin sujeto explícito, remitiendo al referente del contexto. En español se conserva el sujeto implícito con «él», manteniendo la fluidez del discurso y la dependencia del contexto inmediato, en vez de insertar un nombre divino que el verso no expresa de forma explícita.
  doctrine_reference: 'Translation philosophy: primacía del texto original y del flujo discursivo hebreo'
translation_notes:
  revision_awareness: 'No se requieren revisiones adicionales: la versión española conserva la causalidad de כִּי, la violencia del verbo שִׁבַּר y la posible tensión contextual entre «puertas» y «portones» sin resolverla por paráfrasis.'
  spanish_consistency_notes:
  - Se mantiene «bronce» y «hierro» como metales estándar y claros en español bíblico.
  - No se introduce «SEÑOR» ni «Yahvé» porque el sujeto está implícito en el hebreo y la línea de contexto puede suplirlo.
  - La nota [a] preserva la alternativa contextual sin desplazar el sentido principal de «puertas».
