translation:
  language: es
  text: Entre los impíos burladores en un banquete[a], rechinan los dientes contra mí.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Entre los profanos burladores por un pastel o bocado»; el término hebreo traducido «en un banquete» es raro e incierto.'
    reason: lexical_alternative
lexical_decisions:
- source_word: בְּחַנְפֵי
  english_pob_choice: Among the godless
  chosen_spanish: Entre los impíos
  alternatives_spanish:
  - Entre los profanos
  - Entre los hipócritas
  - Entre los impíos y falsos
  lexicon: HALOT
  rationale: El término puede abarcar lo profano, lo impío o lo hipócrita. En este contexto poético de oposición hostil, «impíos» conserva la carga moral-religiosa sin reducirlo solo a falta de sinceridad.
- source_word: לַעֲגֵי
  english_pob_choice: mockers
  chosen_spanish: burladores
  alternatives_spanish:
  - sarcásticos
  - escarnecedores
  - mofadores
  lexicon: HALOT
  rationale: El sustantivo expresa burla, desprecio y ridículo hostil. «Burladores» suena natural en español y mantiene el matiz ofensivo del término.
- source_word: מָעוֹג
  english_pob_choice: at a feast
  chosen_spanish: en un banquete
  alternatives_spanish:
  - por un pastel
  - por un bocado
  - en una mesa festiva
  lexicon: HALOT
  rationale: La palabra hebrea es rara y su sentido es incierto. La lectura de contexto adoptada en la POB en inglés apunta a un escenario de banquete; «en un banquete» comunica ese ambiente social sin fingir mayor certeza que la que ofrece el hebreo.
- source_word: חָרֹק
  english_pob_choice: they gnash
  chosen_spanish: rechinan
  alternatives_spanish:
  - crujen
  - aprietan
  - hacen rechinar
  lexicon: HALOT
  rationale: El verbo describe el rechinar o crujir de los dientes como gesto de hostilidad. En español, «rechinan» es la forma más natural y transparente para este uso figurado.
- source_word: עָלַי
  english_pob_choice: at me
  chosen_spanish: contra mí
  alternatives_spanish:
  - sobre mí
  - hacia mí
  lexicon: HALOT
  rationale: Con un verbo hostil como el de rechinar los dientes, «contra mí» expresa con claridad la agresión dirigida al hablante y conserva el valor adversativo del hebreo.
- source_word: שִׁנֵּימוֹ
  english_pob_choice: their teeth
  chosen_spanish: sus dientes
  alternatives_spanish:
  - los dientes de ellos
  - sus muelas
  lexicon: HALOT
  rationale: Es una forma directa y exacta del plural con sufijo de tercera persona. «Sus dientes» mantiene el sentido sin añadir énfasis innecesario.
translation_notes:
  revision_awareness: La redacción sigue de cerca el texto hebreo y mantiene la ambigüedad léxica documentada en מָעוֹג mediante una nota. Se conserva la imagen de hostilidad física con «rechinan» y el objeto directo explícito «sus dientes» para reflejar con claridad la construcción hebrea.
  spanish_consistency_notes:
  - Se usó «impíos» para בְּחַנְפֵי por coherencia con el valor moral-religioso señalado en el audit trail.
  - Se evitó «Cristo/SEÑOR» porque el versículo no contiene cristología ni el Tetragrámaton.
  - La nota al pie preserva la incertidumbre léxica de מָעוֹג sin sobretraducirla.
