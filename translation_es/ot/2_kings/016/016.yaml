translation:
  language: es
  text: Así que Urías[a], el sacerdote, hizo conforme a todo lo que el rey Acaz había mandado.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Urías» reproduce la forma española habitual del nombre propio.
    reason: cultural_note
lexical_decisions:
- source_word: וַיַּעַשׂ
  english_pob_choice: did
  chosen_spanish: hizo
  alternatives_spanish:
  - hizo
  - obró
  - actuó
  lexicon: HALOT
  rationale: El hebreo עשה es amplio ('hacer/obrar'). En este contexto narrativo, con la idea de conformidad a un mandato, 'hizo' es la equivalencia más natural y directa en español, sin añadir matiz evaluativo.
- source_word: אוּרִיָּה
  english_pob_choice: Uriah
  chosen_spanish: Urías
  alternatives_spanish:
  - Uría
  - Urias
  lexicon: Nombre propio transliterado
  rationale: Se conserva el nombre propio en forma española usual 'Urías', que es clara y reconocible para lectores bíblicos en español.
- source_word: הַכֹּהֵן
  english_pob_choice: the priest
  chosen_spanish: el sacerdote
  alternatives_spanish:
  - el sacerdote
  - el clérigo
  lexicon: HALOT
  rationale: כֹּהֵן designa al oficiante sacerdotal; 'el sacerdote' comunica el oficio de manera directa y no sobrecarga el texto con terminología eclesiástica ajena al hebreo.
- source_word: כְּכֹל אֲשֶׁר
  english_pob_choice: according to all that
  chosen_spanish: conforme a todo lo que
  alternatives_spanish:
  - según todo lo que
  - de acuerdo con todo lo que
  - tal como
  lexicon: HALOT
  rationale: La secuencia expresa plena conformidad con lo mandado. 'Conforme a todo lo que' preserva esa correspondencia formal y suena natural en español bíblico contemporáneo.
- source_word: צִוָּה
  english_pob_choice: had commanded
  chosen_spanish: había mandado
  alternatives_spanish:
  - había ordenado
  - había comandado
  - mandó
  lexicon: HALOT
  rationale: צוה significa 'mandar/ordenar'. 'Había mandado' refleja bien la anterioridad del mandato en relación con la acción de Urías y mantiene el registro narrativo natural en español.
- source_word: הַמֶּלֶךְ אָחָז
  english_pob_choice: King Ahaz
  chosen_spanish: el rey Acaz
  alternatives_spanish:
  - el rey Ahaz
  - Acaz, el rey
  lexicon: HALOT
  rationale: En español bíblico, el título pospuesto al nombre es natural y claro. Se traduce el nombre como 'Acaz', forma usual en español, manteniendo el valor referencial del hebreo.
theological_decisions:
- issue: Evaluación moral de la obediencia de Urías
  english_pob_reading: Render the verse descriptively without adding explicit moral judgment.
  chosen_spanish_reading: Traducir de modo descriptivo, sin insinuar aprobación ni condena explícitas.
  alternative_spanish_readings:
  - Urías obedeció fielmente al rey Acaz.
  - Urías cumplió ciegamente lo que Acaz mandó.
  rationale: El hebreo solo informa que Urías actuó en conformidad con el mandato del rey. La traducción no debe resolver la tensión moral del contexto más amplio ni introducir una valoración que el versículo no formula.
  doctrine_reference: 'Translation philosophy: Preserve theological tension rather than resolve it; no importes juicios doctrinales que el texto no expresa.'
translation_notes:
  revision_awareness: 'Coincide con el audit trail inglés de alta concordancia: la versión inglesa opta por una formulación descriptiva y no evaluativa, y la española sigue esa misma restricción sin añadir matiz moral.'
  spanish_consistency_notes:
  - 'Se mantiene el orden narrativo simple del hebreo: acción + sujeto + conformidad + mandato.'
  - Se evita 'SEÑOR' porque el texto no contiene el Tetragrámaton ni una cita directa de יהוה.
  - '''Mandado'' conserva el valor de un mandato previo, acorde con el pasado perfecto del inglés auditado.'
  - No se usa 'Cristo' ni terminología confesional ajena al pasaje.
