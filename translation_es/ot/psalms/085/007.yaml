translation:
  language: es
  text: ¿No volverás[a] y nos darás vida[b], para que tu pueblo se alegre en ti?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «te volverás» o «volverás de nuevo». El verbo hebreo puede significar «volver», «regresar» o «volver otra vez»; aquí probablemente alude a que Dios se vuelva de nuevo hacia su pueblo con favor.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «nos avivarás», «nos harás vivir» o «nos darás vida de nuevo». El hebreo expresa hacer vivir o restaurar la vida, sin limitar el sentido a lo físico o a lo espiritual.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הֲלֹא
  english_pob_choice: Will you not
  chosen_spanish: ¿No ...?
  alternatives_spanish:
  - ¿Acaso no ...?
  - ¿No es cierto que ...?
  lexicon: HALOT
  rationale: La partícula introduce una pregunta retórica que espera respuesta afirmativa. En español, ¿No ...? conserva bien el tono de súplica confiada sin añadir énfasis innecesario.
- source_word: תָּשׁוּב
  english_pob_choice: return
  chosen_spanish: volverás
  alternatives_spanish:
  - regresarás
  - volverás de nuevo
  lexicon: HALOT
  rationale: שוב puede significar volver/retornar. 'Volverás' es natural en español y mantiene la metáfora sin explicitar en el texto principal la idea de favor, que sigue siendo contextual.
- source_word: תְּחַיֵּנוּ
  english_pob_choice: revive us
  chosen_spanish: darnos vida
  alternatives_spanish:
  - reviviremos
  - volverás a darnos vida
  - renovarnos la vida
  lexicon: HALOT
  rationale: El piel de חיה con sufijo de 1cp expresa hacer vivir o restaurar la vida. 'Darnos vida' preserva esa amplitud; en la nota se mantiene la alternativa más explícita 'volverás a darnos vida'.
- source_word: וְעַמְּךָ
  english_pob_choice: your people
  chosen_spanish: tu pueblo
  alternatives_spanish:
  - y tu pueblo
  - tu gente
  lexicon: HALOT
  rationale: El sustantivo עַם conserva el matiz pactual de comunidad perteneciente a Dios. 'Tu pueblo' es la forma más transparente y bíblica en español.
- source_word: יִשְׂמְחוּ
  english_pob_choice: may rejoice
  chosen_spanish: se alegre
  alternatives_spanish:
  - se regocije
  - se alegrarán
  - pueda alegrarse
  lexicon: HALOT
  rationale: El imperfecto aquí funciona como resultado deseado en una oración. 'Se alegre' conserva el tono de finalidad/súplica y suena más natural en español que un futuro simple.
- source_word: בָךְ
  english_pob_choice: in you
  chosen_spanish: en ti
  alternatives_spanish:
  - por ti
  - contigo
  lexicon: HALOT
  rationale: La preposición ב con verbos de gozo suele indicar esfera u objeto de la alegría. 'En ti' preserva la imagen y la densidad teológica del deleite centrado en Dios.
theological_decisions:
- issue: Cómo renderizar el retorno de Dios sin resolver demasiado el sentido de favor/restauración
  english_pob_reading: Kept the broader 'return' in the main text
  chosen_spanish_reading: Mantener 'volverás' sin añadir 'a nosotros' ni 'en favor' en el texto principal
  alternative_spanish_readings:
  - volverás a nosotros
  - volverás a mostrarnos favor
  - te volverás hacia tu pueblo
  rationale: El hebreo no explicita el complemento 'a nosotros' ni la frase 'en favor', aunque el contexto la sugiere. La redacción española conserva la imagen amplia y deja que el contexto litúrgico cargue la interpretación.
  doctrine_reference: 'Translation philosophy: Original-language primacy over translation tradition; Preserve theological tension rather than resolve it.'
- issue: Alcance de 'darnos vida'
  english_pob_reading: Used 'revive us' without narrowing the sense
  chosen_spanish_reading: Usar 'darnos vida' sin limitarlo a renovación espiritual o a restauración nacional
  alternative_spanish_readings:
  - renovarnos espiritualmente
  - restaurarnos como nación
  - revivirnos
  rationale: La petición puede abarcar restauración comunitaria, vitalidad espiritual o ambas. 'Darnos vida' mantiene esa amplitud y evita cerrar el sentido que el hebreo deja abierto.
  doctrine_reference: 'Translation philosophy: Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: Se revisó el paralelo inglés auditado y no hubo cambios de fondo en la última pasada; la versión española sigue esa lectura amplia y la hace natural en español sin perder la tensión lexical del hebreo.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' solo cuando el texto fuente lo requiera explícitamente; en este versículo no aparece el nombre divino, por lo que se conserva 'tú/ti'.
  - '''Tu pueblo'' preserva el lenguaje pactual y evita banalizar עַם como ''gente''.'
  - La construcción interrogativa retórica en español refleja el hebreo sin convertirla en afirmación directa.
