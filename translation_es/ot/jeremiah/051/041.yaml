  yaml_path: translation/ot/jeremiah/051/041.yaml
  text: How Sheshak has been captured[c][b][a], and the praise of the whole earth seized! How Babylon has become a desolation among the nations!
  footnotes:
  - marker: a
    text: Sheshak is widely understood as a cipher-name for Babylon.
    reason: alternative_reading
  - marker: b
    text: Or 'the glory of the whole earth' / 'the boast of the whole earth.'
    reason: lexical_alternative
  - marker: c
    text: Or 'has become a desolation'; the Hebrew term can include both ruin and the horror it causes.
    reason: lexical_alternative
