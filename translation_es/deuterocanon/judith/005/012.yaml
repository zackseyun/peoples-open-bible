translation:
  language: es
  text: Y clamaron a su Dios[a], y él hirió la tierra de Egipto con plagas en las que no había remedio; y los egipcios los expulsaron de delante de ellos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «de su presencia». La expresión griega «de delante de ellos» refleja un giro semítico literal que indica expulsión de la presencia de alguien.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀνεβόησαν
  english_pob_choice: cried out
  chosen_spanish: clamaron
  alternatives_spanish:
  - gritaron
  - dieron voces
  lexicon: LSJ
  rationale: El verbo expresa un clamor fuerte dirigido a Dios; «clamaron» conserva tanto la intensidad como el matiz de súplica sin sonar demasiado coloquial ni mecánico.
- source_word: πρὸς τὸν θεὸν αὐτῶν
  english_pob_choice: to their God
  chosen_spanish: a su Dios
  alternatives_spanish:
  - hacia su Dios
  - ante su Dios
  lexicon: LSJ
  rationale: La preposición con el objeto expresa dirección del clamor. «A su Dios» es la forma más natural en español y mantiene la referencia directa al destinatario.
- source_word: ἐπάταξεν
  english_pob_choice: struck
  chosen_spanish: hirió
  alternatives_spanish:
  - golpeó
  - hirió con golpe
  lexicon: LSJ
  rationale: «Hirió» reproduce la acción divina de causar daño con un verbo bíblico claro y fiel al valor de πατάσσω, sin necesidad de un arcaísmo como «smitió».
- source_word: γῆν Αἴγυπτον
  english_pob_choice: the land of Egypt
  chosen_spanish: la tierra de Egipto
  alternatives_spanish:
  - el país de Egipto
  - Egipto
  lexicon: LSJ
  rationale: «Tierra» conserva el valor geográfico de γῆ y sigue de cerca el original; «Egipto» solo perdería la concreción territorial que el griego expresa.
- source_word: πληγαῖς
  english_pob_choice: with plagues
  chosen_spanish: con plagas
  alternatives_spanish:
  - con golpes
  - con azotes
  lexicon: LSJ
  rationale: En contexto exódico, la palabra remite a plagas enviadas por Dios. «Plagas» es el equivalente más preciso y reconocible en español bíblico.
- source_word: ἐν αἷς οὐκ ἦν ἴασις
  english_pob_choice: for which there was no healing
  chosen_spanish: en las que no había remedio
  alternatives_spanish:
  - en las que no había sanidad
  - de las que no había cura
  lexicon: LSJ
  rationale: «ἴασις» puede ser sanidad, cura o remedio. «Remedio» preserva la idea de ausencia de alivio/curación y suena natural en español; se mantiene la relativa para no suavizar el tono.
- source_word: ἐξέβαλον
  english_pob_choice: drove out
  chosen_spanish: expulsaron
  alternatives_spanish:
  - arrojaron fuera
  - dieron salida forzada
  lexicon: LSJ
  rationale: El verbo significa expulsar o echar fuera. «Expulsaron» comunica con precisión la fuerza del acto y evita una paráfrasis excesiva.
- source_word: ἀπὸ προσώπου αὐτῶν
  english_pob_choice: from before them
  chosen_spanish: de delante de ellos
  alternatives_spanish:
  - de su presencia
  - ante ellos
  lexicon: LSJ
  rationale: Se conserva el giro semítico literal subyacente en el griego. «De delante de ellos» corresponde bien al español bíblico y mantiene la tensión idiomática documentada por el audit trail.
theological_decisions:
- issue: Referente de ἀπὸ προσώπου αὐτῶν
  english_pob_reading: The Egyptians drove them out from before them; idiomatically, from their presence.
  chosen_spanish_reading: Los egipcios los expulsaron de delante de ellos, conservando el giro que puede entenderse como expulsión de su presencia.
  alternative_spanish_readings:
  - Los egipcios los expulsaron de delante de los israelitas.
  - Los egipcios los expulsaron de su presencia.
  rationale: La sintaxis permite mantener el pronombre como en el griego y el inglés POB. En español, «de delante de ellos» conserva la literalidad del modismo y deja visible la posible referencia contextual a la presencia de los egipcios, sin resolverla de forma artificial.
  doctrine_reference: Preservar la ambigüedad o tensión textual donde el idioma fuente la presenta; no armonizar sin base textual.
translation_notes:
  revision_awareness: El texto fuente y el audit trail inglés coinciden estrechamente; la versión española sigue la lectura estable sin introducir variantes textuales ni cambios de sentido. Se mantuvo la tensión idiomática de ἀπὸ προσώπου αὐτῶν mediante una traducción literal transparente.
  spanish_consistency_notes:
  - Se usa «Yahvé» para el nombre divino cuando aparezca en el contexto; aquí el texto tiene «Dios», por lo que se conserva «su Dios».
  - Se prefirió vocabulario bíblico claro y moderno («clamaron», «expulsaron», «plagas») sin recurrir a arcaísmos innecesarios.
  - «De delante de ellos» mantiene la cadencia del giro semítico y evita resolver prematuramente la referencia del pronombre.
