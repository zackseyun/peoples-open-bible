review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien el griego en la estructura general: «los hijos de Israel», la reacción de turbación, el habla recíproca, la imagen de un ejército tan numeroso que cubriría/consumiría la tierra, y la triple referencia al terreno. Sin embargo, hay dos desajustes importantes con el audit trail: (1) la nota [a] está invertida, porque el texto principal ya dice «lamerán»; la nota no debe presentar eso como alternativa «más literal», sino explicar la imagen o dar la alternativa interpretativa «devorarán/consumirán»; (2) el griego y el inglés POB conservan la imagen idiomática de «la faz de la tierra / face of the land», mientras que «toda la superficie de la tierra» es comprensible pero atenúa innecesariamente la imaginería que el POB quiso preservar.'
  spanish_quality_summary: El español es claro y mayormente natural. «Se turbaron mucho» y «soportarán su peso» son adecuados. «Lamerán toda la faz de la tierra» suena fuerte, pero precisamente conserva la metáfora vívida del original; con una nota explicativa funciona mejor que la redacción actual. «Vecino» es aceptable para πλησίον en este contexto narrativo.
  glossary_alignment: No hay términos del glosario mayor en conflicto. «Los hijos de Israel» concuerda con la preferencia formal documentada. La revisión propuesta busca alinear mejor la preservación de la imagen léxica de ἐκλείξουσιν y del modismo τὸ πρόσωπον τῆς γῆς πάσης con la filosofía POB.
  issues:
  - severity: medium
    issue: La nota [a] contradice la función del texto principal.
    rationale: El texto ya usa «lamerán», por lo que no corresponde decir «Más literalmente, ‘lamerán’». La nota debe explicar la imagen literal o dar la alternativa interpretativa, como hizo el inglés POB con «consume».
  - severity: medium
    issue: «Toda la superficie de la tierra» debilita la imaginería de «la faz de la tierra».
    rationale: El audit trail en inglés preserva expresamente «the whole face of the land» y solo aclara en nota su sentido idiomático. En español bíblico legible, «la faz de toda la tierra» o «toda la faz de la tierra» conserva mejor el modismo y el paralelismo poético.
  - severity: low
    issue: La nota [b] no refleja con precisión la decisión principal.
    rationale: Si se revisa el texto a «faz», la nota debe explicar que es un modismo para la superficie/extensión; en su forma actual está redactada para defender «superficie», no la opción más fiel al proyecto.
  revised_spanish_text: 'Pero los hijos de Israel, al ver su gran número, se turbaron mucho, y cada uno dijo a su vecino: «Ahora estos hombres lamerán[a] toda la faz de la tierra[b], y ni las altas montañas ni los barrancos ni las colinas soportarán su peso».'
  revised_footnotes:
