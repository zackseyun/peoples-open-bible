review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien la estructura del hebreo y refleja correctamente la apposición ''el hombre, el señor de la tierra'', el criterio ''Por esto'', el futuro ''sabré'', la selección de ''uno de sus hermanos'' y el doble imperativo final. Sin embargo, dos puntos requieren ajuste para reflejar mejor el sentido documentado: כֵנִים se alinea mejor con ''honestos'' que con ''sinceros'', porque el contexto es forense-social frente a la acusación de espionaje; y ''sus casas'' debe elevarse a ''sus hogares'' o ''sus familias'', ya que בָּתֵּיכֶם aquí significa households, no edificios.'
  spanish_quality_summary: El español es claro y natural, pero 'sinceros' suena algo más subjetivo o relacional que el sentido de integridad comprobable del contexto. 'Provisiones para el hambre de sus casas' es comprensible, aunque 'casas' resulta poco idiomático para hogares/familias en este contexto. También conviene ajustar la puntuación final para usar el punto dentro de la cita según convención española.
  glossary_alignment: No hay conflictos con la terminología teológica del proyecto. La revisión propuesta mejora la coherencia con la decisión léxica inglesa para כֵנִים ('honest') y con el valor contextual de בָּתֵּיכֶם como 'hogares'. La nota sobre רַעֲבוֹן se conserva adecuadamente, con mejor anclaje en 'hogares'.
  issues:
  - severity: medium
    issue: '''sinceros'' para כֵנִים debilita el matiz de honestidad verificable'
    rationale: En Génesis 42 el término responde a la sospecha de espionaje; 'honestos' o 'íntegros' comunica mejor el sentido social-forense documentado por el English POB que 'sinceros', que puede sugerir solo franqueza subjetiva.
  - severity: medium
    issue: '''sus casas'' para בָּתֵּיכֶם suena demasiado literal'
    rationale: El hebreo 'casas' aquí significa 'households'. En español bíblico natural y moderno, 'hogares' expresa mejor las familias afectadas por la hambruna sin perder fidelidad.
  - severity: low
    issue: Puntuación de cierre de cita mejorable
    rationale: En español es más natural cerrar la cita con el punto antes de la comilla de cierre en este caso.
