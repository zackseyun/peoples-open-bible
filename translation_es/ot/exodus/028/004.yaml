    text: O «pieza para el pecho»; «pectoral» evita sugerir una coraza o armadura.
    reason: lexical_alternative
  - marker: b
    text: Término técnico hebreo para una prenda sacerdotal distintiva sin equivalente exacto en español.
    reason: cultural_note
  - marker: c
    text: O «túnica de trabajo cuadriculado» o «túnica de tejido trabajado»; el hebreo probablemente se refiere a una prenda con diseño tejido.
    reason: lexical_alternative
  - marker: d
    text: O «vestiduras sagradas».
    reason: lexical_alternative
