translation:
  language: es
  text: ¿Me trajeron sacrificios y ofrendas[a] en el desierto durante cuarenta años, casa de Israel?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «sacrificios y ofrenda de cereal». El hebreo de «ofrendas» puede referirse más específicamente a una ofrenda de grano en contextos cultuales.
    reason: lexical_alternative
lexical_decisions:
- source_word: הַזְּבָחִים
  english_pob_choice: sacrifices
  chosen_spanish: sacrificios
  alternatives_spanish:
  - ofrendas de sacrificio
  - sacrificios de animales
  lexicon: HALOT
  rationale: זֶבַח designa un sacrificio, con frecuencia vinculado al acto de inmolar. «Sacrificios» conserva ese valor cultual con naturalidad en español y mantiene el contraste con מִנְחָה.
- source_word: וּמִנְחָה
  english_pob_choice: and offerings
  chosen_spanish: y ofrendas
  alternatives_spanish:
  - y ofrenda de cereal
  - y oblaciones
  lexicon: HALOT
  rationale: מִנְחָה puede ser una ofrenda/tributo y, en contexto cultual, a menudo una ofrenda vegetal o de cereal. «Ofrendas» preserva el sentido más amplio en el texto principal, dejando abierta la precisión cultual documentada.
- source_word: הִגַּשְׁתֶּם
  english_pob_choice: Did you bring
  chosen_spanish: ¿Me ofrecieron ustedes
  alternatives_spanish:
  - ¿Me presentaron ustedes
  - ¿Me trajeron ustedes
  lexicon: HALOT
  rationale: El hifil de נגשׁ aquí expresa llevar/presentar ofrendas. En español, «ofrecer» transmite bien la acción cultual sin perder la fuerza retórica de la pregunta.
- source_word: לִי
  english_pob_choice: me
  chosen_spanish: me
  alternatives_spanish:
  - a mí
  lexicon: HALOT
  rationale: El objeto indirecto es directo y natural en español con «me»; no hace falta una expansión adicional.
- source_word: בַמִּדְבָּר
  english_pob_choice: in the wilderness
  chosen_spanish: en el desierto
  alternatives_spanish:
  - en el desierto/soledad
  - en la estepa
  lexicon: HALOT
  rationale: מִדְבָּר en el contexto del éxodo puede traducirse «desierto» o «desierto/soledad»; «desierto» es claro y natural en español, aunque «wilderness» en inglés conserve una resonancia bíblica más amplia.
- source_word: אַרְבָּעִים שָׁנָה
  english_pob_choice: for forty years
  chosen_spanish: durante cuarenta años
  alternatives_spanish:
  - por cuarenta años
  - por cuarenta años
  lexicon: HALOT
  rationale: La expresión indica duración del período del desierto; «durante» expresa con precisión ese lapso en español contemporáneo.
- source_word: בֵּית יִשְׂרָאֵל
  english_pob_choice: O house of Israel
  chosen_spanish: casa de Israel
  alternatives_spanish:
  - oh casa de Israel
  - pueblo de Israel
  lexicon: HALOT
  rationale: La fórmula profética conserva el apelativo «casa de Israel». En español, el vocativo puede quedar implícito por la puntuación interrogativa sin necesidad de añadir «oh».
theological_decisions:
- issue: Fuerza retórica de la pregunta
  english_pob_reading: Render as a rhetorical question expecting a negative or sharply challenging answer, without making the implied answer explicit in translation.
  chosen_spanish_reading: Mantener la pregunta retórica sin explicitar la respuesta implícita.
  alternative_spanish_readings:
  - Ustedes no me ofrecieron realmente sacrificios...
  - ¿Acaso me ofrecieron sacrificios...?
  rationale: El hebreo plantea una pregunta de reproche; la traducción conserva esa tensión sin resolverla con una paráfrasis interpretativa.
  doctrine_reference: 'Principio de traducción POB: preservar la tensión teológica y retórica del texto fuente sin sobreexplicarla.'
translation_notes:
  revision_awareness: El texto base y el control de revisión muestran alta concordancia y no registran cambios aplicados; se mantiene la lectura retórica y el par léxico sacrificios/ofrendas, con adaptación natural al español.
  spanish_consistency_notes:
  - Se mantiene Yahvé como norma general del proyecto, pero aquí el versículo no contiene el Tetragrámaton.
  - «Sacrificios» y «ofrendas» reproducen la distinción cultual del hebreo sin fusionar los dos términos.
  - La puntuación interrogativa sostiene el tono de reproche profético sin añadir comentario interpretativo.
