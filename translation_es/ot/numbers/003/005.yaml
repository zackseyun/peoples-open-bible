lexical_decisions:
- source_word: וַיְדַבֵּר
  english_pob_choice: spoke
  chosen_spanish: habló
  alternatives_spanish:
  - dijo
  - habló y dijo
  lexicon: HALOT
  rationale: El verbo דבר en esta fórmula narrativa divina introduce una comunicación solemne. En español, «habló» conserva mejor el acto de hablar que «dijo», y funciona de manera natural en un encabezado de discurso.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  - el SEÑOR
  lexicon: HALOT
  rationale: Se mantiene el nombre propio divino en español como «Yahvé», conforme al criterio del proyecto para YHWH, en vez de sustituirlo por un título.
- source_word: אֶל
  english_pob_choice: to
  chosen_spanish: a
  alternatives_spanish:
  - para
  lexicon: HALOT
  rationale: La preposición introduce el destinatario del discurso; en español, «a» expresa con naturalidad ese objeto indirecto.
- source_word: מֹשֶׁה
  english_pob_choice: Moses
  chosen_spanish: Moisés
  lexicon: HALOT
  rationale: Nombre propio bíblico estándar en español.
- source_word: לֵאמֹר
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - para decir
  lexicon: HALOT
  rationale: La forma infinitiva hebrea introduce el contenido del discurso. «Diciendo» es la equivalencia idiomática más natural y fiel en español.
theological_decisions:
- issue: Representación del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Jehová
  - el SEÑOR
  rationale: El texto hebreo usa directamente el Tetragrámaton. La traducción española conserva el nombre personal divino con «Yahvé», siguiendo la línea doctrinal del proyecto y evitando la sustitución por un título.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
translation_notes:
  revision_awareness: Se corrigió el problema de validación anterior asegurando que el marcador de nota [a] aparezca explícitamente en el texto español. No se añadieron notas sin anclaje textual.
  spanish_consistency_notes:
  - Se mantiene el orden natural del encabezado narrativo bíblico en español.
  - «Yahvé» se usa de forma consistente para YHWH según la terminología del proyecto.
  - «diciendo» conserva la función introductoria de לֵאמֹר sin sobretraducir el contenido que vendrá en el siguiente versículo.
