theological_decisions:
- issue: Rendering of δέσποτα in address to God
  chosen_reading: Master
  alternative_readings:
  - Lord
  - Sovereign
  rationale: To preserve lexical transparency, δέσποτα is distinguished from κύριος. 'Master' best reflects the direct address while avoiding conflation with the default rendering for κύριος.
  doctrine_reference: 'DOCTRINE.md: Translate titles; preserve lexical distinctions where context allows.'
- issue: Sense of μονογενεῖς
  chosen_reading: two only children
  alternative_readings:
  - two unique ones
  - two only-begotten ones
  rationale: In this narrative setting the word refers to family status, not later christological usage. Rendering it as 'only children' avoids importing theological associations not present in the text.
  doctrine_reference: 'DOCTRINE.md: Original-language primacy over translation tradition; do not import doctrinal claims the text does not make.'
