translation:
  language: es
  text: Y no multiplicará para sí esposas[a], no sea que su corazón se desvíe; y no multiplicará para sí plata y oro excesivamente.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «y su corazón no se desvíe». El hebreo puede leerse como una prohibición coordinada más que como una cláusula de advertencia o resultado.'
    reason: alternative_reading
lexical_decisions:
- source_word: יַרְבֶּה
  english_pob_choice: multiply
  chosen_spanish: multiplicará
  alternatives_spanish:
  - aumentará
  - acumulará
  lexicon: HALOT
  rationale: El hebreo indica hacer que algo sea mucho o excesivo. «Multiplicará» conserva el paralelismo de las dos ocurrencias y el matiz de acumulación desmedida, como en la versión inglesa auditada.
- source_word: נָשִׁים
  english_pob_choice: wives
  chosen_spanish: mujeres
  alternatives_spanish:
  - esposas
  - esposas para sí
  lexicon: HALOT
  rationale: En español, «mujeres» reproduce literalmente la forma hebrea plural, mientras que el contexto regio hace claro que se trata de mujeres en sentido marital. Se mantiene la tensión del original sin suavizarla de antemano con una glosa más interpretativa.
- source_word: יָסוּר
  english_pob_choice: turn away
  chosen_spanish: se desvíe
  alternatives_spanish:
  - se aparte
  - se vuelva atrás
  lexicon: HALOT
  rationale: El verbo sugiere apartarse o desviarse. «Se desvíe» conserva la metáfora de dirección y funciona bien en español con el sujeto «su corazón».
- source_word: לְבָבֹו
  english_pob_choice: his heart
  chosen_spanish: su corazón
  alternatives_spanish:
  - su mente
  - su interior
  lexicon: HALOT
  rationale: «Corazón» preserva el antropologismo bíblico para la sede de la voluntad y las inclinaciones internas, sin reemplazarlo por una explicación menos marcada.
- source_word: כֶּסֶף וְזָהָב
  english_pob_choice: silver and gold
  chosen_spanish: plata y oro
  alternatives_spanish:
  - dinero y oro
  - riquezas
  lexicon: HALOT
  rationale: La pareja concreta «plata y oro» mantiene el valor literal y el paralelismo poético-jurídico. «Riquezas» sería demasiado general.
- source_word: מְאֹד
  english_pob_choice: greatly
  chosen_spanish: en gran manera
  alternatives_spanish:
  - muchísimo
  - excesivamente
  lexicon: HALOT
  rationale: La expresión intensifica la prohibición final. «En gran manera» es formal, natural en español bíblico y comunica la idea de exceso sin perder el registro legal.
theological_decisions:
- issue: Relación entre multiplicar mujeres y el desvío del corazón
  english_pob_reading: 'La cláusula media se entiende como razón/resultado de la primera prohibición: "lest his heart turn away."'
  chosen_spanish_reading: 'La cláusula media se vierte como advertencia final: «para que no se desvíe su corazón», conservando la lectura de consecuencia implícita.'
  alternative_spanish_readings:
  - y su corazón no se desvíe
  - de modo que no se desvíe su corazón
  rationale: El hebreo permite leer la cláusula como prohibición coordinada o como cláusula de propósito/resultado. En español, «para que no» mantiene el tono normativo y deja visible la relación causal sin convertirla en una explicación explícita ajena al texto.
  doctrine_reference: Translation philosophy §3 (preservar la tensión teológica en vez de resolverla)
- issue: 'Tensión textual: mujeres / corazón / bienes'
  english_pob_reading: La advertencia liga la multiplicación de esposas con el desvío del corazón y luego añade una segunda restricción sobre plata y oro.
  chosen_spanish_reading: Se conserva la secuencia de advertencias sin añadir objeto implícito («de Yahvé») ni explicitar más de lo que el hebreo afirma.
  alternative_spanish_readings:
  - para que no se aparte de Yahvé su corazón
  - y no se desviará su corazón
  rationale: El texto fuente no menciona el objeto hacia el cual el corazón se aparta. Por fidelidad, el español no debe completarlo. También se mantiene el paralelismo entre las dos prohibiciones económicas y matrimoniales.
  doctrine_reference: Translation philosophy §3 (preservar la tensión textual y teológica)
translation_notes:
  revision_awareness: La redacción sigue la revisión más reciente del POB inglés, que prefirió «lest his heart turn away» frente a una paráfrasis con «so that». En español se refleja esa advertencia con «para que no se desvíe su corazón», manteniendo el valor preventivo sin resolver la ambigüedad sintáctica del hebreo. También se conserva la estructura de dos prohibiciones y la intensificación final de מְאֹד.
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el texto lo requiera explícitamente; en este versículo no aparece el nombre divino.
  - Se conserva «corazón» como término antropológico bíblico, no «mente» ni «interior».
  - «Plata y oro» mantiene la literalidad y el paralelismo del original.
  - La nota [a] queda anclada en «mujeres» para señalar la alternativa de lectura sobre la cláusula media.
