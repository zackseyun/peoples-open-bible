translation:
  language: es
  text: Y las braseras[a] y los tazones[b] —lo que era de oro y lo que era de plata— las tomó el capitán de la guardia[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «los incensarios».
    reason: lexical_alternative
  - marker: b
    text: O «las bacías».
    reason: lexical_alternative
  - marker: c
    text: O «el jefe de los ejecutores» / «el comandante del cuerpo de guardia».
    reason: lexical_alternative
lexical_decisions:
- source_word: הַמַּחְתּוֹת
  english_pob_choice: the firepans
  chosen_spanish: las braseras
  alternatives_spanish:
  - los incensarios
  - las palas para el fuego
  lexicon: HALOT
  rationale: מַחְתָּה designa un recipiente para carbón o fuego usado en el culto. «Braseras» comunica bien el objeto y evita especificar incienso, que no aparece explícitamente en este versículo. Se conserva la alternativa tradicional en nota.
- source_word: הַמִּזְרָקוֹת
  english_pob_choice: the bowls
  chosen_spanish: las tazas
  alternatives_spanish:
  - las vasijas
  - las bacías
  lexicon: HALOT
  rationale: מִזְרָק es un recipiente para líquidos rituales o para aspersión. «Tazas» es algo más general en español y puede sonar menos cultual; sin embargo, mantiene la idea de recipiente pequeño. «Vasijas» podría ser más neutral, pero «tazas» conserva mejor la concisión del inventario.
- source_word: אֲשֶׁר זָהָב זָהָב
  english_pob_choice: what was gold, gold
  chosen_spanish: lo que era de oro
  alternatives_spanish:
  - lo que era oro
  - lo que era de oro, oro
  lexicon: HALOT
  rationale: El hebreo repite el sustantivo material para clasificar los objetos por su material. En español, una repetición literal («oro, oro») sonaría forzada; se conserva el sentido de categorización con «lo que era de oro», sin perder la referencia material.
- source_word: וַאֲשֶׁר כֶּסֶף כָּסֶף
  english_pob_choice: and what was silver, silver
  chosen_spanish: y lo que era de plata
  alternatives_spanish:
  - y lo que era plata
  - y lo que era de plata, plata
  lexicon: HALOT
  rationale: Como en la frase paralela de oro, el énfasis hebreo es la clasificación por material. «De plata» mantiene la referencia sin una duplicación poco natural en español.
- source_word: לָקַח
  english_pob_choice: took
  chosen_spanish: tomó
  alternatives_spanish:
  - llevó
  - se llevó
  lexicon: HALOT
  rationale: El verbo básico es «tomar»; en contexto de saqueo, «tomó» deja que el contexto histórico cargue la idea de confiscación. «Se llevó» sería más interpretativo.
- source_word: רַב טַבָּחִים
  english_pob_choice: the captain of the guard
  chosen_spanish: el capitán de la guardia
  alternatives_spanish:
  - el jefe de los ejecutores
  - el comandante del cuerpo de guardia
  lexicon: HALOT
  rationale: La expresión funciona aquí como título oficial. «Capitán de la guardia» es la forma tradicional e inteligible en español y mantiene el valor titular sin forzar una traducción más cruda del hebreo literal.
translation_notes:
  revision_awareness: 'La revisión inglesa reciente eliminó la repetición explícita «gold, gold / silver, silver» por naturalidad, pero la nota audit trail mantiene que el hebreo repite el material para clasificar los objetos. En español se optó por una solución intermedia: expresar la clasificación («lo que era de oro / de plata») sin duplicación artificial, preservando el sentido del inventario y la sobriedad del original.'
  spanish_consistency_notes:
  - Se mantiene «capitán de la guardia» para רַב טַבָּחִים por coherencia con el registro POB y por ser una designación reconocible en español.
  - Se evita «SEÑOR» o recursos de sustitución porque no hay aquí nombre divino ni cita directa de YHWH.
  - Se preserva un tono de inventario histórico sobrio, sin ampliar el texto con inferencias sobre el uso ritual de los objetos.
