    text: 'Hebreo: "hijos de Israel"; es decir, los israelitas.'
    reason: lexical_alternative
  - marker: b
    text: 'O: "una porción tomada de cada cincuenta".'
    reason: alternative_reading
  revision_rationale: Se corrigió la nota [b] para que refleje la alternativa documentada en el POB inglés y se ancló en la frase de la cuota. Se ajustó 'de entre los hombres' a 'de entre las personas' para preservar el sentido colectivo de הָאָדָם. Se cambió 'y los dio' por 'y se los dio' para español natural, y se suavizó 'guardaban la custodia' a 'estaban encargados del cuidado' para mantener el sentido de custodia del hebreo con mejor legibilidad.
