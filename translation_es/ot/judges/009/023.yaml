    reason: lexical_alternative
  - marker: c
    text: O «obraron con traición contra Abimelec» o «lo traicionaron».
    reason: lexical_alternative
  revision_rationale: 'Se ajusta únicamente la formulación de וַיִּבְגְּדוּ para un español más natural y preciso: ''actuaron traicioneramente'' preserva mejor el matiz de conducta desleal/traicionera que el hebreo expresa, mientras mantiene las alternativas ya documentadas en nota. No se requieren cambios teológicos ni terminológicos adicionales.'
