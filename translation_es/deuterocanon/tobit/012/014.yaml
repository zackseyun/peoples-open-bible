revisions:
- from: Y ahora Dios me ha enviado para sanarte a ti y a Sara, tu esposa[a].
  to: Y ahora Dios me ha enviado para sanarte y a Sara[a].
  rationale: Se elimina «tu esposa» porque en español introduce una relación incorrecta con Tobit. La revisión conserva el sentido principal de la comisión de Rafael y traslada la ambigüedad de νύμφη a una nota clara, evitando afirmar en el texto principal una relación posesiva inadecuada. También se mejora la naturalidad suprimiendo el énfasis innecesario de «a ti».
