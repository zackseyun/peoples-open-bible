translation:
  language: es
  text: Y Faraón se levantó de noche, él y todos sus siervos y todo Egipto, y hubo un gran clamor en Egipto[a], porque no había casa[b] en que no hubiera un muerto.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Todo Egipto» usa el nombre del país de manera colectiva para sus habitantes.
    reason: cultural_note
  - marker: b
    text: 'O, más literalmente: «no había una casa en que no hubiera una persona muerta».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּקָם
  english_pob_choice: rose
  chosen_spanish: se levantó
  alternatives_spanish:
  - se alzó
  - se puso de pie
  lexicon: HALOT
  rationale: El perfecto narrativo hebreo de קום describe una acción simple y súbita. En español, «se levantó» es natural en narrativa y conserva el movimiento inmediato sin añadir matices no presentes.
- source_word: לַיְלָה הוּא
  english_pob_choice: in the night
  chosen_spanish: de noche
  alternatives_spanish:
  - en la noche
  - esa noche
  lexicon: HALOT
  rationale: La expresión marca el momento nocturno de forma idiomática. «De noche» suena natural en español y conserva la referencia temporal sin forzar una construcción literal.
- source_word: עֲבָדָיו
  english_pob_choice: his servants
  chosen_spanish: sus siervos
  alternatives_spanish:
  - sus servidores
  - sus servidores reales
  lexicon: HALOT
  rationale: עֶבֶד puede ser «esclavo» o «siervo» según contexto. Aquí el entorno real de Faraón apunta a personal de su corte, por lo que «siervos» comunica bien la relación funcional sin afirmar esclavitud como foco principal.
- source_word: וְכָל מִצְרַיִם
  english_pob_choice: and all Egypt
  chosen_spanish: y todo Egipto
  alternatives_spanish:
  - y todos los egipcios
  lexicon: HALOT
  rationale: El hebreo usa el nombre del país de manera colectiva. «Todo Egipto» conserva esa metonimia, igual que la lectura auditada en inglés, y evita restringirlo solo a individuos.
- source_word: וַתְּהִי
  english_pob_choice: there was
  chosen_spanish: hubo
  alternatives_spanish:
  - fue
  - se produjo
  lexicon: HALOT
  rationale: Con un sustantivo como complemento, היה introduce la existencia o aparición del clamor. «Hubo» es la forma natural en español y conserva el hecho ocurrido.
- source_word: צְעָקָה גְדֹלָה
  english_pob_choice: a great cry
  chosen_spanish: un gran clamor
  alternatives_spanish:
  - un gran grito
  - un fuerte clamor
  lexicon: HALOT
  rationale: צְעָקָה denota un grito o clamor de angustia. «Clamor» comunica mejor el carácter colectivo y doliente que «grito», y «gran» mantiene el adjetivo intensivo גְדֹלָה.
- source_word: כִּי
  english_pob_choice: for
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  lexicon: HALOT
  rationale: Aquí introduce la razón del clamor. «Porque» expresa con claridad la relación causal en español sin perder el tono narrativo.
- source_word: אֵין בַּיִת אֲשֶׁר אֵין שָׁם מֵת
  english_pob_choice: there was no house where there was not someone dead
  chosen_spanish: no había casa en que no hubiera un muerto
  alternatives_spanish:
  - no había casa donde no hubiera un muerto
  - no había casa sin un muerto
  lexicon: HALOT
  rationale: La doble negación hebrea se refleja con una formulación igualmente enfática. «Casa» mantiene בַּיִת de manera literal, y «un muerto» reproduce el valor sustantivado del participio מֵת sin sobreexplicar el tipo de muerte.
- source_word: מֵת
  english_pob_choice: someone dead
  chosen_spanish: un muerto
  alternatives_spanish:
  - una persona muerta
  - un cadáver
  lexicon: HALOT
  rationale: El participio funciona de manera sustantiva. «Un muerto» es breve, natural en español y conserva la indefinición del hebreo, sin introducir connotaciones más técnicas que el texto no exige.
theological_decisions:
- issue: La referencia colectiva a Egipto como sujeto del lamento
  english_pob_reading: '''All Egypt'' uses the land name collectively for the people of Egypt.'
  chosen_spanish_reading: «Todo Egipto» se entiende colectivamente como el país y su población.
  alternative_spanish_readings:
  - «todos los egipcios» explicita solo a las personas
  - «Egipto entero» enfatiza la totalidad
  rationale: Sigo la lectura auditada en inglés, donde el nombre del país funciona como metonimia de sus habitantes. En español, «todo Egipto» mantiene esa amplitud sin perder la referencia geográfica y social del juicio.
  doctrine_reference: Uso figurado/metonímico del nombre nacional; no implica doctrina especial.
- issue: La fuerza de la negación en la última cláusula
  english_pob_reading: '''for there was no house where there was not someone dead.'''
  chosen_spanish_reading: «porque no había casa en que no hubiera un muerto» conserva la doble negación enfática.
  alternative_spanish_readings:
  - «porque ninguna casa estaba sin un muerto»
  - «porque en cada casa había un muerto»
  rationale: El hebreo insiste mediante una negación doble. La redacción escogida conserva esa tensión retórica y evita suavizarla en una afirmación más directa que podría perder el énfasis.
  doctrine_reference: Énfasis retórico del hebreo bíblico; no es una cuestión doctrinal.
translation_notes:
  revision_awareness: Se mantuvo la lectura auditada del inglés POB sin cambios sustantivos. La revisión más reciente indicó que no eran necesarios cambios, y la versión española sigue de cerca el hebreo con equivalencia óptima en español natural.
  spanish_consistency_notes:
  - Se mantiene «Faraón» como forma establecida para פַּרְעֹה.
  - Se usa «siervos» para עֲבָדָיו por el contexto cortesano, sin introducir «esclavos» donde no es el foco lexical del versículo.
  - «Un muerto» conserva el participio sustantivado מֵת con naturalidad en español.
  - Las notas a pie de página usan marcadores únicos y corresponden a palabras o frases ancladas en el texto.
