    text: Or, more interpretively, “has rebelled against the king, against David.” The Hebrew idiom is literally “has raised his hand.”
    reason: lexical_alternative
  - marker: b
    text: Hebrew “from the hill country of Ephraim”; traditionally also rendered “from Mount Ephraim.”
    reason: lexical_alternative
