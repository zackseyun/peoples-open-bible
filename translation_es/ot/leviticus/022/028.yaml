translation:
  language: es
  text: Ya sea un buey o una oveja, no degollarás[a] al animal y a su cría el mismo día.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo literalmente: ''no degollarás a él y a su hijo''. La expresión se refiere a un animal junto con su descendencia.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְ / שׁוֹר
  english_pob_choice: ox
  chosen_spanish: buey
  alternatives_spanish:
  - toro
  - ganado vacuno
  lexicon: HALOT
  rationale: שׁוֹר designa bovino de trabajo o de ganado. En español, 'buey' comunica bien un bovino individual en registro legal y evita la especificidad sexual de 'toro'; 'ganado vacuno' suena más colectivo y menos natural aquí.
- source_word: אוֹ
  english_pob_choice: or
  chosen_spanish: o
  alternatives_spanish:
  - u
  lexicon: HALOT
  rationale: Es la conjunción disyuntiva normal; en español se mantiene como 'o'.
- source_word: שֶׂה
  english_pob_choice: sheep
  chosen_spanish: oveja
  alternatives_spanish:
  - cordero
  - animal del rebaño
  lexicon: HALOT
  rationale: שֶׂה puede referirse a un miembro del rebaño, oveja o cabra según el contexto. Aquí, en paralelo con el bovino, 'oveja' es una equivalencia clara y natural; 'cordero' sería demasiado específico por edad.
- source_word: אֹתוֹ וְאֶת־בְּנוֹ
  english_pob_choice: it and its young
  chosen_spanish: al animal y a su cría
  alternatives_spanish:
  - a él y a su hijo
  - a ella y a su cría
  lexicon: HALOT
  rationale: El hebreo dice literalmente 'a él y a su hijo'. Como se trata de animales y el español no usa normalmente 'hijo' para crías de animales en este registro, 'a su cría' expresa la relación de descendencia sin forzar sexo ni maternidad.
- source_word: תִשְׁחֲטוּ
  english_pob_choice: shall not slaughter
  chosen_spanish: no sacrificarán
  alternatives_spanish:
  - no matarán
  - no degollarán
  lexicon: HALOT
  rationale: שׁחט es el verbo técnico de degollar/sacrificar animales. 'Sacrificarán' preserva el ámbito cultual y legal en español; 'matarán' es demasiado general, y 'degollarán' es demasiado físico y menos idiomático en esta cláusula.
- source_word: בְּיוֹם אֶחָד
  english_pob_choice: on the same day
  chosen_spanish: el mismo día
  alternatives_spanish:
  - en un mismo día
  - en un día
  lexicon: HALOT
  rationale: La frase hebrea marca simultaneidad dentro de una sola jornada. 'El mismo día' reproduce bien la fuerza idiomática que el audit trail inglés ya identifica como 'the same day'.
- source_word: וְ
  english_pob_choice: Whether
  chosen_spanish: Ya sea
  alternatives_spanish:
  - Y
  - Sea
  lexicon: HALOT
  rationale: El hebreo inicia un caso legal alternativo. 'Ya sea' refleja en español la fuerza disyuntiva de 'Whether ... or ...' sin sonar mecánico.
translation_notes:
  revision_awareness: El texto inglés auditado pasó de 'on one day' a 'on the same day' para captar mejor el sentido idiomático; la versión española adopta 'el mismo día' para reflejar esa misma lectura. También se conserva la decisión legal-disyuntiva inicial ('Whether... or...') con 'Ya sea... o...'.
  spanish_consistency_notes:
  - Se evitó 'Señor' o terminología cultual ajena porque no aparece el Tetragrámaton ni un término teológico equivalente en este versículo.
  - Se mantuvo un registro legal sobrio y claro, coherente con una norma cultual de Levítico.
  - '''Sacrificarán'' se eligió por su valor técnico y por ser comprensible en español bíblico contemporáneo.'
