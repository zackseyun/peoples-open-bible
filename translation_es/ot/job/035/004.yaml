translation:
  language: es
  text: Yo te responderé con palabras[a], y tus amigos contigo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «te responderé, y a tus amigos contigo». El verbo hebreo puede entenderse como “responder” o “replicar”, y la línea puede leerse como una respuesta dirigida a Job y, al mismo tiempo, a sus compañeros.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אֲנִי
  english_pob_choice: I
  chosen_spanish: Yo
  alternatives_spanish:
  - Yo mismo
  - Yo, por mi parte
  lexicon: HALOT
  rationale: El pronombre de primera persona singular se mantiene explícito en español para conservar el énfasis del hebreo y el tono directo del hablante.
- source_word: אֲשִׁיבְךָ
  english_pob_choice: will answer you
  chosen_spanish: te responderé
  alternatives_spanish:
  - te contestaré
  - te daré respuesta
  lexicon: HALOT
  rationale: El hiphil de שוב puede expresar 'responder' o 'replicar'. En español, 'te responderé' comunica la respuesta verbal prevista sin forzar una calca como 'te haré volver una respuesta'.
- source_word: מִלִּין
  english_pob_choice: with words
  chosen_spanish: con palabras
  alternatives_spanish:
  - con palabras de argumento
  - con discurso
  lexicon: HALOT
  rationale: Se conserva el sustantivo concreto 'palabras', que refleja el valor léxico de מִלִּין y el matiz instrumental del hebreo. 'Con palabras' evita una paráfrasis más interpretativa.
- source_word: וְאֶת
  english_pob_choice: and
  chosen_spanish: y
  alternatives_spanish:
  - y también
  lexicon: HALOT
  rationale: El marcador de objeto no se reproduce aparte en español; la coordinación simple con 'y' expresa adecuadamente la adición del segundo elemento de la respuesta.
- source_word: רֵעֶיךָ
  english_pob_choice: your friends
  chosen_spanish: tus amigos
  alternatives_spanish:
  - tus compañeros
  - tus allegados
  lexicon: HALOT
  rationale: רֵעַ puede significar amigo, compañero o asociado. 'Tus amigos' es el equivalente más natural y fiel al sentido relacional en este contexto.
- source_word: עִמָּךְ
  english_pob_choice: with you
  chosen_spanish: contigo
  alternatives_spanish:
  - con vosotros
  lexicon: HALOT
  rationale: '''Contigo'' es la forma idiomática en español para expresar acompañamiento dirigido a Job. Mantiene la relación de compañía sin añadir volumen semántico.'
translation_notes:
  revision_awareness: 'Coincide con el expediente inglés de la POB en la decisión léxica central: el verbo hebreo admite ''responder''/''replicar'', y la cláusula puede entenderse como dirigida a Job junto con sus compañeros. No se registraron revisiones posteriores en el expediente, y el control cruzado indica alto grado de acuerdo.'
  spanish_consistency_notes:
  - Se usa 'Yahvé' solo cuando corresponda al nombre divino; este versículo no lo contiene.
  - Se mantiene el registro sobrio y directo, sin introducir léxico eclesiástico que el hebreo no exige.
  - '''Con palabras'' preserva la materialidad del término hebreo sin convertirlo en ''argumentos'' o ''discurso'' de manera interpretativa.'
