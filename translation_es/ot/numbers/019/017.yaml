    timestamp: '2026-04-23T11:17:32Z'
    unchanged: false
    changes_summary: Replaced 'fresh water' with 'living water' for closer lexical accuracy to the source while preserving natural formal English.
translation:
  language: es
  text: Y para el impuro tomarán polvo[a] de la quema de la ofrenda de purificación[b], y pondrá sobre él[c] agua viva[d] en un recipiente.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Lit., “polvo”; el hebreo usa עפר, no el término habitual para “cenizas”.
    reason: lexical_alternative
  - marker: b
    text: O, más tradicionalmente, “de la quema de la ofrenda por el pecado”. En este contexto, חטאת puede referirse funcionalmente a una ofrenda de purificación.
    reason: theological_note
  - marker: c
    text: El pronombre hebreo es singular masculino y probablemente remite al polvo tomado previamente.
    reason: source_note
  - marker: d
    text: Lit., “agua viva”; es decir, agua fresca o que fluye.
    reason: lexical_alternative
lexical_decisions:
- source_word: לָקְחוּ
  english_pob_choice: they shall take
  chosen_spanish: tomarán
  alternatives_spanish:
  - tomarán para
  - tomarán de
  lexicon: HALOT
  rationale: En español legal/instructivo, el futuro simple expresa con naturalidad la obligación o instrucción. El plural concuerda con el sujeto tácito del hebreo.
- source_word: לַטָּמֵא
  english_pob_choice: for the unclean person
  chosen_spanish: para el impuro
  alternatives_spanish:
  - para el inmundo
  - para la persona impura
  lexicon: HALOT
  rationale: Impuro comunica la condición ritual sin cargar el texto con una expresión más arcaica. Se evita 'inmundo' por menor neutralidad en español actual.
- source_word: מֵעֲפַר
  english_pob_choice: some of the dust
  chosen_spanish: polvo
  alternatives_spanish:
  - polvo de
  - ceniza
  lexicon: HALOT
  rationale: Se conserva el valor léxico de עפר como polvo o material pulverizado. El contexto ritual podría sugerir ceniza, pero el hebreo no usa el término usual para 'cenizas'.
- source_word: שְׂרֵפַת
  english_pob_choice: the burning
  chosen_spanish: del quemado
  alternatives_spanish:
  - de la quema
  - de la combustión
  lexicon: HALOT
  rationale: '''Quemado'' mantiene la relación con el proceso de quemar sin sonar forzado. Aunque menos abstracto que ''quema'', funciona de modo natural en la construcción nominal.'
- source_word: הַחַטָּאת
  english_pob_choice: the purification offering
  chosen_spanish: de purificación
  alternatives_spanish:
  - del sacrificio por el pecado
  - de la ofrenda por el pecado
  lexicon: HALOT
  rationale: En este rito de limpieza ritual, חטאת puede referirse funcionalmente a ofrenda de purificación. Se evita imponer de entrada el matiz moral de 'pecado', aunque queda la alternativa tradicional documentada.
- source_word: וְנָתַן
  english_pob_choice: and he shall put
  chosen_spanish: y echará
  alternatives_spanish:
  - y pondrá
  - y aplicará
  lexicon: HALOT
  rationale: El singular hebreo se mantiene con un sujeto implícito. 'Echará' comunica el acto de verter o aplicar un líquido mejor que un calco más rígido.
- source_word: עָלָיו
  english_pob_choice: on it
  chosen_spanish: sobre él
  alternatives_spanish:
  - sobre ello
  - encima de él
  lexicon: HALOT
  rationale: El antecedente probable es el polvo/material mencionado previamente; el hebreo usa pronombre masculino singular. Se conserva el género gramatical del referente implícito.
- source_word: מַיִם חַיִּים
  english_pob_choice: living water
  chosen_spanish: agua viva
  alternatives_spanish:
  - agua corriente
  - agua fresca
  lexicon: HALOT
  rationale: Se sigue de cerca la expresión hebrea literal y su resonancia ritual. 'Agua viva' preserva la imagen tradicional de agua de fuente o corriente, sin reemplazarla por una paráfrasis.
- source_word: אֶל כֶּלִי
  english_pob_choice: in a vessel
  chosen_spanish: en un recipiente
  alternatives_spanish:
  - en un vaso
  - dentro de un recipiente
  lexicon: HALOT
  rationale: '''Recipiente'' es claro en español moderno y mantiene el registro ritual. ''Vaso'' podría sonar más estrecho o doméstico; ''recipiente'' es más neutral.'
theological_decisions:
- issue: חטאת en un contexto de purificación ritual
  english_pob_reading: purification offering
  chosen_spanish_reading: ofrenda de purificación
  alternative_spanish_readings:
  - ofrenda por el pecado
  - sacrificio por el pecado
  rationale: El rito del agua de purificación trata la impureza ritual, no necesariamente culpa moral. 'Ofrenda de purificación' preserva esa función; la opción tradicional queda disponible como alternativa auditada.
  doctrine_reference: Translation philosophy §1, §5
- issue: מַיִם חַיִּים como expresión idiomática
  english_pob_reading: living water
  chosen_spanish_reading: agua viva
  alternative_spanish_readings:
  - agua corriente
  - agua fresca
  rationale: La expresión literal tiene fuerza bíblica y conviene conservarla en español. 'Agua viva' mantiene la relación con el hebreo y evita perder la resonancia de agua de fuente o corriente.
  doctrine_reference: Translation philosophy §6, §5
translation_notes:
  revision_awareness: El texto sigue de cerca el ajuste de la revisión inglesa que prefirió 'living water' sobre una equivalencia más interpretativa. En español se optó por 'agua viva' para conservar la precisión literal y la resonancia ritual, sin abandonar la claridad idiomática.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' solo cuando aparezca el nombre divino; este versículo no lo contiene.
  - '''Impuro'' y ''ofrenda de purificación'' siguen el registro ritual y evitan confundir impureza ceremonial con pecado moral.'
  - Se preserva la tensión léxica de חטאת mediante nota y decisión teológica, sin eliminar la lectura tradicional.
  - La concordancia del pronombre singular en 'sobre él' sigue el hebreo, aunque el antecedente sea colectivo o material.
