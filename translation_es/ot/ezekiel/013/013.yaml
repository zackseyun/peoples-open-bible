translation:
  language: es
  text: 'Por tanto, así dice el Señor Dios, Yahvé: yo desencadenaré[a] un viento de tormenta en mi ira, y habrá una lluvia torrencial en mi furor, y piedras de granizo con furia para destruir por completo.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo literalmente: ''abriré'' o ''haré estallar un viento de tormentas''; el sentido es que Dios hace irrumpir un viento violento de tormenta.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אֲדֹנָי יְהוִה
  english_pob_choice: the Lord GOD
  chosen_spanish: el Señor Yahvé
  alternatives_spanish:
  - el Señor Dios
  - el Señor Yahvéh
  lexicon: HALOT
  rationale: Se conserva la combinación titular del hebreo sin ocultar el nombre divino. En español, 'Señor Yahvé' comunica la relación entre el título אדני y el nombre יְהוִה de manera natural y auditable, evitando la duplicación extraña de 'Señor SEÑOR' o el masking con 'SEÑOR'.
- source_word: וּבִקַּעְתִּי
  english_pob_choice: I will unleash
  chosen_spanish: yo soltaré
  alternatives_spanish:
  - yo haré estallar
  - yo abriré paso a
  - yo desencadenaré
  lexicon: HALOT
  rationale: El hebreo literalmente sugiere 'abrir/splitting open', pero con 'viento de tormenta' el sentido causativo es que Yahvé lo hace irrumpir. 'Soltaré' expresa esa agencia causal en español natural sin perder la tensión de fuerza desatada.
- source_word: רוּחַ סְעָרוֹת
  english_pob_choice: a storm wind
  chosen_spanish: un viento de tormenta
  alternatives_spanish:
  - un viento tempestuoso
  - un viento de tempestades
  - un viento de huracán
  lexicon: HALOT
  rationale: La construcción hebrea denota un viento violento de tormenta. 'Viento de tormenta' es claro y fiel; evita un calco pesado y conserva el valor intensivo del plural.
- source_word: בַּחֲמָתִי
  english_pob_choice: in my wrath
  chosen_spanish: en mi ira
  alternatives_spanish:
  - en mi furor
  - en mi enojo
  lexicon: HALOT
  rationale: חמה expresa ira/furor ardiente. 'Ira' es la opción más natural en español bíblico contemporáneo y mantiene el tono judicial del pasaje.
- source_word: גֶּשֶׁם שֹׁטֵף
  english_pob_choice: a flooding rain
  chosen_spanish: una lluvia torrencial
  alternatives_spanish:
  - una lluvia desbordante
  - una lluvia inundante
  - una lluvia impetuosa
  lexicon: HALOT
  rationale: שֹׁטֵף transmite la idea de algo que corre con fuerza y desborda. 'Lluvia torrencial' comunica bien esa intensidad en español sin perder la imagen destructiva.
- source_word: בְּאַפִּי
  english_pob_choice: in my anger
  chosen_spanish: en mi furor
  alternatives_spanish:
  - en mi ira
  - en mi enojo
  lexicon: HALOT
  rationale: אַף puede significar literalmente 'nariz' pero idiomáticamente 'ira'. Se eligió 'furor' para diferenciarlo del primer término y reflejar la repetición enfática del hebreo sin aplanar el matiz emotivo.
- source_word: וְאַבְנֵי אֶלְגָּבִישׁ
  english_pob_choice: and hailstones
  chosen_spanish: y piedras de granizo
  alternatives_spanish:
  - y granizo
  - y grandes piedras de granizo
  lexicon: HALOT
  rationale: El hebreo dice literalmente 'piedras de granizo'. Aunque 'granizo' sería idiomático, se preserva la concreción imagística del original con 'piedras de granizo'.
- source_word: בְּחֵמָה
  english_pob_choice: in fury
  chosen_spanish: en furia
  alternatives_spanish:
  - en ira
  - con furor
  lexicon: HALOT
  rationale: חמה repite el campo semántico de ira/furor. 'En furia' mantiene la intensidad y deja visible la variación léxica del hebreo y del audit trail en inglés.
- source_word: לְכָלָה
  english_pob_choice: to bring complete destruction
  chosen_spanish: para completa destrucción
  alternatives_spanish:
  - para destrucción total
  - para consumación
  - para aniquilación completa
  lexicon: HALOT
  rationale: כָּלָה apunta a consumación en sentido de destrucción total. 'Para completa destrucción' refleja el fin telico del hebreo y la totalidad del juicio.
theological_decisions:
- issue: Traducción del nombre divino יְהוִה en el contexto de un título compuesto
  english_pob_reading: the Lord GOD
  chosen_spanish_reading: el Señor Yahvé
  alternative_spanish_readings:
  - el Señor Dios
  - Yahvé
  rationale: La política del proyecto pide 'Yahvé' para יְהוָה. En el compuesto con אֲדֹנָי, 'Señor Yahvé' evita la ocultación del nombre y conserva el valor reverencial del título, manteniendo auditabilidad frente al hebreo.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
translation_notes:
  revision_awareness: Se siguió el sentido del hebreo masorético y el audit trail inglés. No se introdujeron cambios textuales respecto del paquete fuente; la principal decisión fue conservar el nombre divino como 'Yahvé' y mantener la imaginería fuerte de juicio con equivalentes naturales en español.
  spanish_consistency_notes:
  - Se mantuvo 'Yahvé' para יְהוִה conforme a la terminología del proyecto.
  - Se prefirió 'ira' / 'furor' / 'furia' para reflejar la serie hebrea de términos emparentados sin uniformarlos por completo.
  - '''Piedras de granizo'' conserva la imagen concreta del hebreo, aunque ''granizo'' sería más idiomático.'
  - El anclaje de la nota al verbo 'soltaré' señala la alternativa literal registrada en el audit trail inglés.
