  glossary_alignment: No hay términos del glosario teológico principal en disputa aquí. La transliteración 'Hai' y 'Betel' es aceptable en español bíblico. La elección 'hombre' para אִישׁ concuerda con la decisión documentada, acompañada por nota aclaratoria sobre su uso genérico.
