translation:
  language: es
  text: y los haré volver a la tierra que juré a sus padres, a Abraham, a Isaac y a Jacob; y dominarán sobre ella[a]; y los multiplicaré, y ciertamente no serán disminuidos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «la poseerán». El verbo griego puede denotar ejercer dominio o poseer por señorío; «dominarán sobre ella» se eligió como una traducción más directa del verbo.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀποστρέψω
  english_pob_choice: I will bring ... back
  chosen_spanish: los haré volver
  alternatives_spanish:
  - los traeré de vuelta
  - los restauraré
  lexicon: BDAG
  rationale: En este contexto el verbo expresa hacer que regresen a un lugar. «Los haré volver» conserva el movimiento de retorno sin perder naturalidad en español.
- source_word: γῆν
  english_pob_choice: land
  chosen_spanish: tierra
  alternatives_spanish:
  - país
  - territorio
  lexicon: BDAG
  rationale: Aquí γῆ se refiere a la tierra prometida dentro del marco pactal con los patriarcas; «tierra» es la opción más fiel y natural en español bíblico.
- source_word: ὤμοσα
  english_pob_choice: I swore
  chosen_spanish: juré
  alternatives_spanish:
  - he jurado
  - prometí con juramento
  lexicon: BDAG
  rationale: El verbo implica juramento solemne. «Juré» conserva esa fuerza pactal de manera concisa y directa.
- source_word: πατράσιν
  english_pob_choice: fathers
  chosen_spanish: padres
  alternatives_spanish:
  - antepasados
  lexicon: BDAG
  rationale: Aunque «antepasados» sería posible, el texto nombra de inmediato a Abraham, Isaac y Jacob; «padres» mantiene el paralelismo con el griego y el tono de alianza.
- source_word: κυριεύσουσιν
  english_pob_choice: they will rule over
  chosen_spanish: la gobernarán
  alternatives_spanish:
  - la poseerán
  - ejercerán dominio sobre ella
  lexicon: BDAG
  rationale: El verbo puede significar reinar, dominar o poseer por señorío. En español, «la gobernarán» comunica de forma natural la idea de ejercer dominio, sin diluir la fuerza del verbo griego.
- source_word: πληθυνῶ
  english_pob_choice: I will multiply
  chosen_spanish: los multiplicaré
  alternatives_spanish:
  - los haré numerosos
  - los aumentaré
  lexicon: BDAG
  rationale: Es lenguaje de bendición y fecundidad de pacto. «Multiplicaré» es la correspondencia más directa y resonante en español bíblico.
- source_word: οὐ μὴ σμικρυνθῶσιν
  english_pob_choice: they will certainly not be diminished
  chosen_spanish: ciertamente no serán disminuidos
  alternatives_spanish:
  - de ningún modo serán reducidos
  - no serán hechos pocos
  lexicon: BDAG
  rationale: La negación enfática οὐ μή requiere una formulación fuerte. «Ciertamente no» conserva ese énfasis, y «serán disminuidos» refleja el sentido pasivo de reducirse en número o importancia.
theological_decisions:
- issue: Oath language tied to the patriarchs
  english_pob_reading: Retain explicit oath language and patriarchal names in the main text
  chosen_spanish_reading: Mantener el juramento explícito y los nombres patriarcales en el cuerpo del texto
  alternative_spanish_readings:
  - «la tierra prometida a sus antepasados»
  - «a sus antepasados» en lugar de «a sus padres»
  rationale: La restauración se fundamenta en un juramento divino concreto dirigido a Abraham, Isaac y Jacob. Conservar «juré» y los nombres evita suavizar el peso pactal del pasaje.
  doctrine_reference: DOCTRINE.md §§1, 4, 5
translation_notes:
  revision_awareness: 'La revisión inglesa más reciente no introdujo cambios: el texto quedó estable y el acuerdo de revisión fue alto. Por eso la redacción española sigue de cerca la decisión auditada de la POB en inglés, especialmente en el valor de κυριεύσουσιν y en la negación enfática de οὐ μή.'
  spanish_consistency_notes:
  - Se usó «tierra» para γῆ en sentido pactal, no «tierra» en sentido de mundo físico general.
  - Se prefirió «padres» siguiendo el paralelismo con el griego y la lista Abraham/Isaac/Jacob.
  - «Gobernarán» conserva la idea de dominio de κυριεύσουσιν sin introducir un término eclesiástico no pedido por el texto.
  - «Ciertamente no serán disminuidos» reproduce la fuerza enfática de οὐ μή + subjuntivo pasivo.
