translation:
  language: es
  text: Y las ofrendas consagradas[a] fueron seiscientas cabezas de ganado vacuno y tres mil ovejas[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «las cosas consagradas»; es decir, animales apartados como ofrendas sagradas.'
    reason: lexical_alternative
  - marker: b
    text: Hebreo צֹאן puede denotar animales de rebaño en general, incluidas ovejas y cabras.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהַקֳּדָשִׁים
  english_pob_choice: the consecrated offerings
  chosen_spanish: las cosas consagradas
  alternatives_spanish:
  - las ofrendas consagradas
  - las cosas santas
  - las cosas dedicadas
  lexicon: HALOT
  rationale: El hebreo plural de קדשׁ aquí no describe una cualidad abstracta de santidad, sino bienes apartados para uso sagrado. «Las cosas consagradas» conserva la amplitud del original y permite que el contexto sacrificial precise que se trata de ofrendas animales.
- source_word: בָּקָר
  english_pob_choice: cattle
  chosen_spanish: bueyes
  alternatives_spanish:
  - ganado vacuno
  - cattle
  lexicon: HALOT
  rationale: Aunque el término hebreo puede ser colectivo para bovinos, en un inventario de animales sacrificados el español «bueyes» es natural y mantiene el referente animal concreto. «Ganado vacuno» sería más técnico y menos fluido en este contexto.
- source_word: שֵׁשׁ מֵאוֹת
  english_pob_choice: six hundred
  chosen_spanish: seiscientos
  alternatives_spanish:
  - seis cientos
  lexicon: HALOT
  rationale: Construcción cardinal directa; «seiscientos» es la forma normal y más idiomática en español.
- source_word: וְצֹאן
  english_pob_choice: and three thousand sheep
  chosen_spanish: y tres mil ovejas
  alternatives_spanish:
  - y tres mil ganado menor
  - y tres mil animales de rebaño
  - y tres mil ovejas y cabras
  lexicon: HALOT
  rationale: צֹאן es un colectivo que puede incluir ovejas y cabras. Siguiendo la decisión inglesa y la fluidez del español, «ovejas» funciona como equivalente convencional en inventarios narrativos, sin negar la amplitud del hebreo, que queda registrada en nota.
- source_word: שְׁלֹשֶׁת אֲלָפִים
  english_pob_choice: three thousand
  chosen_spanish: tres mil
  alternatives_spanish:
  - tres millares
  lexicon: HALOT
  rationale: Construcción cardinal directa; «tres mil» es la forma idiomática en español.
translation_notes:
  revision_awareness: El texto base y la revisión más reciente coinciden sustancialmente; no se registraron cambios de traducción en la pasada de revisión final. La versión española mantiene la lectura auditada del hebreo y la solución inglesa, con ajuste natural de «cattle» a «bueyes» para el español bíblico contemporáneo.
  spanish_consistency_notes:
  - Se evita «SEÑOR» porque no hay tetragrámaton en este versículo.
  - Se mantiene el valor colectivo/consagrado de הַקֳּדָשִׁים sin convertirlo en un término litúrgico más específico que el hebreo no exige.
  - «Ovejas» se usa como equivalente narrativo convencional de צֹאן, con la amplitud semántica preservada en nota.
