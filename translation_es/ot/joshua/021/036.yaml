translation:
  language: es
  text: 'Y de la tribu de Rubén: Bezer con sus pastizales[a], y Jahaz[b] con sus pastizales.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Algunos manuscritos hebreos y testigos antiguos omiten Josué 21:36–37; las ciudades enumeradas aquí se corresponden con 1 Crónicas 6:78–79.
    reason: textual_variant
  - marker: b
    text: Jahaz también se escribe Jahzah o Jahazah en algunas traducciones al español.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּ/מִ/מַּטֵּה
  english_pob_choice: And from the tribe of
  chosen_spanish: Y de la tribu de
  alternatives_spanish:
  - Y de la rama de
  - Y del clan de
  lexicon: HALOT
  rationale: En listas de repartición territorial, מַטֶּה se refiere a la tribu como unidad de pertenencia y herencia. «De la tribu de» es natural en español bíblico contemporáneo y conserva el valor distributivo del hebreo.
- source_word: רְאוּבֵן
  english_pob_choice: Reuben
  chosen_spanish: Rubén
  alternatives_spanish:
  - Reúben
  lexicon: Nombre propio tribal bíblico
  rationale: El nombre propio se adapta a la forma castellana habitual «Rubén», inteligible para lectores bíblicos sin perder la referencia al mismo personaje/tribu.
- source_word: בֶּצֶר
  english_pob_choice: Bezer
  chosen_spanish: Bezer
  alternatives_spanish:
  - Bézer
  lexicon: Topónimo bíblico
  rationale: Se conserva la transliteración del topónimo. La variante acentuada «Bézer» podría servir para orientar la pronunciación, pero la forma sin tilde sigue el uso editorial usual de nombres bíblicos transliterados.
- source_word: מִגְרָשֶׁהָ
  english_pob_choice: its pasturelands
  chosen_spanish: sus pastizales
  alternatives_spanish:
  - sus campos comunes
  - su terreno abierto alrededor
  lexicon: HALOT
  rationale: מִגְרָשׁ en contextos de ciudades levíticas designa el terreno abierto circundante, especialmente el área para pastoreo. «Pastizales» comunica bien esa función espacial y económica en español, sin imponer de forma indebida una lectura técnica demasiado estrecha.
- source_word: יַהְצָה
  english_pob_choice: Jahaz
  chosen_spanish: Jahaz
  alternatives_spanish:
  - Jahzah
  - Jahazah
  lexicon: Topónimo bíblico
  rationale: Se mantiene la forma corta usada por la POB en inglés. Las variantes tradicionales se conservan en nota por tratarse de un nombre propio con oscilación en la transliteración.
theological_decisions:
- issue: Valor territorial de los nombres de ciudades con su terreno anejo
  english_pob_reading: the cities listed here with their pasturelands are part of the Levitical allotment list
  chosen_spanish_reading: las ciudades nombradas aquí con sus pastizales pertenecen a la lista de asignaciones levíticas
  alternative_spanish_readings:
  - las ciudades nombradas aquí con sus alrededores
  - las ciudades nombradas aquí con su campo abierto
  rationale: 'No hay tensión doctrinal, pero sí una decisión semántica: «pastizales» debe entenderse como el terreno anejo a la ciudad, no como pasto agrícola en sentido moderno. La formulación conserva el carácter de asignación territorial levítica del pasaje.'
  doctrine_reference: Josué 21; 1 Crónicas 6:78–79
translation_notes:
  revision_awareness: La revisión más reciente indica que no hubo cambios necesarios; por ello la versión española sigue de cerca el texto hebreo y mantiene la nota textual sobre la posible omisión de los versículos 36–37 en algunos testigos.
  spanish_consistency_notes:
  - Se usa «Rubén» como forma española estándar del nombre tribal.
  - Se preserva la transliteración de los topónimos para mantener consistencia con la serie de ciudades en este pasaje.
  - «Pastizales» traduce el valor contextual de מִגְרָשׁ como terreno anejo para pastoreo, sin introducir terminología eclesiástica ajena al texto.
