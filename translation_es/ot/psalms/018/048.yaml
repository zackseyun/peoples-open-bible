translation:
  language: es
  text: el Dios que me da venganza[a] y somete pueblos[b] bajo mi dominio.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «actos de venganza»; el sustantivo hebreo aparece en plural con sentido abstracto o intensivo.
    reason: lexical_alternative
  - marker: b
    text: El verbo aquí se entiende tradicionalmente como «somete» o «pone en sujeción», no como «habla», aunque está relacionado con el verbo hebreo común para «hablar».
    reason: lexical_alternative
lexical_decisions:
- source_word: הָאֵל
  english_pob_choice: the God
  chosen_spanish: el Dios
  alternatives_spanish:
  - Dios
  lexicon: HALOT
  rationale: El hebreo lleva artículo definido; en español, «el Dios» conserva esa forma determinada sin sonar innecesariamente extraño en este sintagma poético.
- source_word: הַנּוֹתֵן
  english_pob_choice: who gives
  chosen_spanish: que me da
  alternatives_spanish:
  - que da
  - dando
  lexicon: HALOT
  rationale: El participio describe a Dios como caracterizado por esta acción; «que me da» mantiene el valor atributivo y refleja el beneficiario implícito de לִי.
- source_word: נְקָמוֹת
  english_pob_choice: vengeance
  chosen_spanish: venganzas
  alternatives_spanish:
  - venganza
  - actos de venganza
  lexicon: HALOT
  rationale: El plural hebreo tiene fuerza abstracta o intensiva. En español, el plural «venganzas» deja visible esa pluralidad formal sin perder el sentido de retribución/represalia divina.
- source_word: לִי
  english_pob_choice: to me
  chosen_spanish: me
  alternatives_spanish:
  - a mí
  - para mí
  - en favor de mí
  lexicon: HALOT
  rationale: 'En esta construcción con «da», el dativo se expresa naturalmente en español como objeto indirecto: «me». Conserva la relación de beneficio sin recargar la frase.'
- source_word: וַיַּדְבֵּר
  english_pob_choice: and subdues
  chosen_spanish: somete
  alternatives_spanish:
  - sojuzga
  - pone en sujeción
  - habló
  lexicon: HALOT
  rationale: Aunque la raíz relacionada suele significar «hablar», aquí el uso contextual es el de someter/poner en sujeción. «Somete» reproduce ese valor sin ocultar la tensión lexical documentada.
- source_word: עַמִּים
  english_pob_choice: peoples
  chosen_spanish: pueblos
  alternatives_spanish:
  - naciones
  - gentes
  lexicon: HALOT
  rationale: «Pueblos» conserva bien la pluralidad étnico-política del hebreo עַמִּים y resulta más natural en español bíblico que una opción más genérica.
- source_word: תַּחְתָּי
  english_pob_choice: under me
  chosen_spanish: debajo de mí
  alternatives_spanish:
  - bajo mí
  - en sujeción a mí
  lexicon: HALOT
  rationale: La imagen espacial de sujeción se expresa con claridad en «debajo de mí». Es fiel al hebreo y compatible con el verbo de sometimiento.
theological_decisions:
- issue: Lenguaje de venganza divina
  english_pob_reading: Retain 'vengeance' as a description of God's just retribution on behalf of the psalmist.
  chosen_spanish_reading: Mantener el lenguaje fuerte de retribución divina con «venganzas», sin suavizarlo a «vindicación» o «liberación».
  alternative_spanish_readings:
  - vindicación
  - liberación
  - retribuciones
  rationale: El sustantivo hebreo נְקָמוֹת designa venganzas/actos de venganza. En español, «venganzas» preserva la intensidad y evita introducir una interpretación más suave que el texto no exige.
  doctrine_reference: 'Translation philosophy: prioridad de la evidencia del idioma original sobre la tradición de atenuación; no importar matices doctrinales ajenos al léxico.'
translation_notes:
  revision_awareness: 'La revisión más reciente indicó que no se requerían cambios; este borrador sigue esa lectura de alta concordancia y conserva las dos tensiones léxicas relevantes: el plural intensivo de נְקָמוֹת y el valor contextual de וַיַּדְבֵּר.'
  spanish_consistency_notes:
  - Se mantiene «Dios» en minúscula no por respeto ortográfico especial sino por continuidad sintáctica en la línea poética.
  - Se evita «SEÑOR» para YHWH porque este versículo no contiene el tetragrámaton.
  - «Pueblos» conserva el plural nacional/étnico más que una noción abstracta de masas.
  - La puntuación final respeta el cierre del hemistiquio poético en español.
