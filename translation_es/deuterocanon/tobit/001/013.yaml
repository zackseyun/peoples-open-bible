translation_notes:
  revision_awareness: 'La redacción sigue el último paso de revisión del audit trail inglés: μορφήν se entendió como un resultado social más natural que «buena apariencia», y ἀγοραστής se mantuvo con una traducción literal que conserva la fuerza del término, dejando la lectura funcional en nota.'
  spanish_consistency_notes:
  - Se mantiene «Altísimo» para ὁ ὕψιστος, conforme al tratamiento habitual de títulos divinos.
  - Se usa «favor» para χάριν por su adecuación al contexto de corte.
  - El nombre propio se conserva como «Enemessar» para reflejar la forma griega auditada.
  - «Comprador» es deliberadamente literal; la nota explica la posible función administrativa sin sustituir el término base.
