id: JDG.9.13
reference: Judges 9:13
source:
  edition: WLC
  text: וַ/תֹּ֤אמֶר לָ/הֶם֙ הַ/גֶּ֔פֶן הֶ/חֳדַ֨לְתִּי֙ אֶת תִּ֣ירוֹשִׁ֔/י הַֽ/מְשַׂמֵּ֥חַ אֱלֹהִ֖ים וַ/אֲנָשִׁ֑ים וְ/הָ֣לַכְתִּ֔י לָ/נ֖וּעַ עַל הָ/עֵצִֽים־־׃
translation:
  text: But the vine said to them[a], ‘Should I stop producing my new wine, which gladdens gods and men, and go to sway over the trees?’
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'which gladdens God and men.'
    reason: alternative_reading
lexical_decisions:
- source_word: הַגֶּפֶן
  chosen: the vine
  alternatives:
  - the grapevine
  lexicon: HALOT
  rationale: Refers to the vine as the speaking plant in Jotham's fable. 'Vine' is idiomatic and natural in English; 'grapevine' is possible but less literary here.
- source_word: הֶחֳדַלְתִּי
  chosen: Should I stop producing
  alternatives:
  - Have I ceased
  - Should I cease
  lexicon: HALOT
  rationale: 'The form is a first-person perfect used rhetorically in context after the trees'' invitation, functioning as a deliberative question: ''Should I stop/cease...?'' Adding ''producing'' makes explicit the object relationship with the following ''my new wine'' in natural English without over-paraphrasing.'
- source_word: תִּירוֹשִׁי
  chosen: my new wine
  alternatives:
  - my wine
  - my fresh wine
  - my grape juice
  lexicon: HALOT
  rationale: תִּירוֹשׁ commonly denotes fresh/new wine rather than generic wine. 'New wine' preserves the lexical distinction and fits the agricultural imagery better than 'grape juice,' which would sound anachronistic and understate fermented wine usage in the Hebrew Bible.
- source_word: הַמְשַׂמֵּחַ
  chosen: which gladdens
  alternatives:
  - that makes glad
  - that cheers
  lexicon: HALOT
  rationale: A participle modifying 'new wine.' 'Gladdens' is concise, idiomatic, and preserves the causative sense of שׂמח in the Hiphil.
- source_word: אֱלֹהִים וַאֲנָשִׁים
  chosen: gods and men
  alternatives:
  - God and men
  - divine beings and humans
  lexicon: HALOT
  rationale: In this fable context and with the plural form אֱלֹהִים, the phrase is best taken as a plural reference ('gods') rather than the singular God. This also matches the broader ancient Near Eastern and Israelite idiom reflected in the parable. 'Men' is retained for lexical correspondence with אֲנָשִׁים rather than neutralizing to 'people.'
- source_word: וְהָלַכְתִּי
  chosen: and go
  alternatives:
  - and leave
  - and depart
  lexicon: HALOT
  rationale: Sequential verb following the rhetorical question. 'Go' is the plain sense and works naturally with the infinitive that follows.
- source_word: לָנוּעַ
  chosen: to sway over
  alternatives:
  - to wave over
  - to move to and fro over
  - to hold sway over
  - to wander over
  lexicon: HALOT
  rationale: In the fable's imagery, the sense is of moving or waving above the trees in the role of king. 'Sway over' preserves both the physical image and the implied rulership better than a flat 'rule,' while avoiding excessive literalism.
- source_word: עַל הָעֵצִים
  chosen: over the trees
  alternatives:
  - above the trees
  - over the other trees
  lexicon: HALOT
  rationale: עַל here expresses authority or position over the trees in the parable. 'Over the trees' is the most natural English rendering.
