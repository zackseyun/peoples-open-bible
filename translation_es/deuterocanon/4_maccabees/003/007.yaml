translation:
  language: es
  text: Pues cuando David, atacando a los extranjeros[a] durante todo el día, mató a muchos de ellos con los soldados de la nación[b],
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «los filisteos». El griego dice «los extranjeros» (ἀλλόφυλοι), término usado a menudo en la Biblia griega para los filisteos, pero aquí no aparece el etnónimo propio.
    reason: lexical_alternative
  - marker: b
    text: O «con los soldados de su pueblo». El griego dice literalmente «con los soldados de la nación».
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐπεὶ γὰρ
  english_pob_choice: For when
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues cuando
  - Porque cuando
  lexicon: LSJ
  rationale: La combinación griega introduce una base explicativa con matiz temporal. En español, «Porque» conserva el valor causal de γάρ y deja que la frase verbal siguiente lleve la referencia temporal sin forzar una fórmula rígida.
- source_word: διʼ ὅλης ἡμέρας
  english_pob_choice: throughout the whole day
  chosen_spanish: durante todo el día
  alternatives_spanish:
  - a lo largo de todo el día
  - todo el día
  lexicon: LSJ
  rationale: La expresión enfatiza duración completa. «Durante todo el día» es natural en español y mantiene la fuerza distributiva de la frase griega.
- source_word: προσβάλλων
  english_pob_choice: attacking
  chosen_spanish: al atacar
  alternatives_spanish:
  - atacando
  - asediando
  lexicon: LSJ
  rationale: El participio expresa acción simultánea y hostil. «Al atacar» reproduce bien el valor circunstancial en español sin añadir intensidad no indicada por el texto.
- source_word: τοῖς ἀλλοφύλοις
  english_pob_choice: the foreigners
  chosen_spanish: a los extranjeros
  alternatives_spanish:
  - a los filisteos
  - a los de otra nación
  lexicon: LSJ
  rationale: ἀλλόφυλοι significa literalmente «de otro pueblo/raza» y la POB inglesa conservó esa forma general. «Extranjeros» mantiene el término común sin imponer la identificación específica con filisteos que el griego aquí no nombra explícitamente.
- source_word: ὁ Δαυεὶδ
  english_pob_choice: David
  chosen_spanish: David
  lexicon: standard proper name
  rationale: Nombre propio estándar en español bíblico.
- source_word: πολλοὺς αὐτῶν ἀπέκτεινεν
  english_pob_choice: killed many of them
  chosen_spanish: mató a muchos de ellos
  alternatives_spanish:
  - dio muerte a muchos de ellos
  - mató a muchos
  lexicon: LSJ
  rationale: ἀποκτείνω significa simplemente «matar». «Mató a muchos de ellos» es directo, fiel y idiomático en español.
- source_word: μετὰ τῶν τοῦ ἔθνους στρατιωτῶν
  english_pob_choice: with the soldiers of the nation
  chosen_spanish: con los soldados de la nación
  alternatives_spanish:
  - con los soldados de su pueblo
  - junto con los soldados de la nación
  lexicon: LSJ
  rationale: μετά con genitivo indica compañía. «Con» expresa bien la cooperación militar. «De la nación» conserva el sustantivo griego ἔθνος sin sustituirlo por una lectura interpretativa de «su pueblo».
translation_notes:
  revision_awareness: Se siguió la revisión inglesa más reciente que prefirió una preposición de compañía más directa para μετὰ; en español se resolvió de manera natural con «con». También se mantuvo la ambigüedad documentada de ἀλλόφυλοι mediante una nota, sin sustituir el término genérico por el etnónimo específico.
  spanish_consistency_notes:
  - Se evitó traducir ἔθνος como «pueblo» en el texto principal para conservar visible el sustantivo griego subyacente, tal como hace la tradición auditada en inglés.
  - La frase inicial se formuló con orden natural español, pero sin perder la relación causal-temporal del griego.
  - La nota sobre ἀλλόφυλοι preserva la alternativa «filisteos» porque la POB inglesa documenta esa posibilidad léxica.
