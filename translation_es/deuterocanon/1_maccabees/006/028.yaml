translation:
  language: es
  text: Y el rey se enfureció cuando lo oyó, y reunió a todos sus amigos, los comandantes de sus fuerzas, y a los que estaban a cargo de las riendas[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O posiblemente «los oficiales de carros» o «los encargados de la caballería»; el griego dice literalmente «los que están sobre las riendas».
    reason: lexical_alternative
lexical_decisions:
- source_word: ὠργίσθη
  english_pob_choice: was enraged
  chosen_spanish: se enfureció
  alternatives_spanish:
  - se enojó
  - se airó
  lexicon: LSJ
  rationale: El griego expresa una reacción fuerte; «se enfureció» conserva la intensidad del inglés POB «was enraged» sin sonar artificial en español.
- source_word: συνήγαγεν
  english_pob_choice: gathered
  chosen_spanish: reunió
  alternatives_spanish:
  - juntó
  - convocó
  lexicon: LSJ
  rationale: En contexto narrativo, συνάγω funciona bien como «reunir»; en español resulta natural y mantiene la idea de convocar a sus asociados.
- source_word: πάντας τοὺς φίλους αὐτοῦ
  english_pob_choice: all his friends
  chosen_spanish: a todos sus amigos
  alternatives_spanish:
  - a todos sus amigos íntimos
  - a todos sus consejeros
  lexicon: LSJ
  rationale: Aunque φίλοι puede tener matiz de círculo cortesano, aquí el texto griego y la revisión inglesa retuvieron simplemente «friends». En español, «amigos» conserva ese nivel sin sobreinterpretar el cargo.
- source_word: ἄρχοντας δυνάμεως αὐτοῦ
  english_pob_choice: the commanders of his forces
  chosen_spanish: los comandantes de sus fuerzas
  alternatives_spanish:
  - los jefes de sus fuerzas
  - los oficiales de sus tropas
  lexicon: LSJ
  rationale: «Comandantes» refleja el valor militar de ἄρχοντας y «fuerzas» reproduce la amplitud de δύναμις en este contexto bélico, siguiendo la decisión inglesa.
- source_word: τοὺς ἐπὶ τῶν ἡνιῶν
  english_pob_choice: those over the reins
  chosen_spanish: los que estaban sobre las riendas
  alternatives_spanish:
  - los conductores de carros
  - los oficiales de carros
  - los encargados de la caballería
  lexicon: LSJ
  rationale: Se preserva la imagen literal del griego, como en el inglés POB, porque la función exacta puede ser ambigua. «Sobre las riendas» mantiene la tensión léxica sin resolverla de más.
translation_notes:
  revision_awareness: La versión inglesa revisada bajó «Friends» a minúscula para no forzar un título cortesano; en español se mantuvo «amigos» en minúscula y se evitó capitalización honorífica. También se conservó la ambigüedad de τοὺς ἐπὶ τῶν ἡνιῶν mediante una nota alternativa, conforme al audit trail.
  spanish_consistency_notes:
  - Se mantuvo un registro narrativo sobrio y bíblico, sin introducir glosas interpretativas en el cuerpo principal.
  - «Fuerzas» se dejó en plural para reflejar la amplitud militar de δύναμις y evitar estrecharlo a «ejército».
