review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura y el sentido del hebreo: fórmula de maldición, eufemismo sexual, alcance distributivo de «cualquier animal» y respuesta litúrgica de la asamblea. También conserva adecuadamente la nota sobre la forma masculina singular. Sin embargo, «Maldito[a] el que…» es gramaticalmente defectuoso en español, porque la nota queda incrustada en el predicado y rompe la lectura natural de la fórmula.'
  spanish_quality_summary: 'El español es claro y mayormente natural, con tono digno y eclesialmente legible. La única reparación necesaria es mover el marcador de nota a un punto que no fracture la sintaxis. También conviene mantener la fórmula de maldición como frase verbal completa: «Maldito sea el que…», que suena más idiomática y solemne en español bíblico moderno sin alejarse del hebreo.'
  glossary_alignment: No hay términos de glosario de proyecto en disputa aquí. «Amén», «animal» y el eufemismo «se acueste con» están bien alineados con la evidencia y el audit trail. La decisión de no añadir «hombre» también concuerda con la revisión inglesa y con la política de precisión de género.
  issues:
  - severity: medium
    issue: Ubicación incorrecta de la nota al pie en «Maldito[a] el que…»
    rationale: El marcador interrumpe la frase de forma antinatural y hace parecer que la variante afecta a «Maldito» en lugar de al referente «el que». La nota explica una alternativa para el sujeto, así que debe anclarse allí.
  - severity: low
    issue: Falta el verbo copulativo implícito en una formulación española más natural
    rationale: Aunque «Maldito el que…» puede entenderse, «Maldito sea el que…» suena más idiomático, solemne y claro en español bíblico, preservando la fuerza declarativa de אָרוּר.
  revised_spanish_text: 'Maldito sea el que[a] se acueste con cualquier animal. Y todo el pueblo dirá: «Amén».'
  revised_footnotes:
  - marker: a
    text: 'O: «quien se acueste con cualquier animal». El hebreo emplea una forma masculina singular.'
    reason: alternative_reading
  revision_rationale: Se movió la nota al sujeto al que realmente afecta y se ajustó la fórmula a «Maldito sea…» para mejorar la gramática y la solemnidad del español sin cambiar el sentido fuente ni las decisiones léxicas auditadas.
