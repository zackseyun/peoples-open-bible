translation:
  language: es
  text: Desde el monte Hor, ustedes trazarán[a] el límite hasta Lebó-jamat, y los puntos finales del límite estarán en Zedad.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebreo literalmente, «hasta la entrada de Jamat»; probablemente un nombre fijo de lugar, Lebó-jamat.
    reason: lexical_alternative
lexical_decisions:
- source_word: מֵהֹר הָהָר
  english_pob_choice: From Mount Hor
  chosen_spanish: Desde el monte Hor
  alternatives_spanish:
  - Desde el monte Horro
  - Desde Hor, el monte
  lexicon: HALOT
  rationale: Se trata del topónimo convencional «monte Hor», no de una descripción libre. En español, «desde» expresa היטב el punto de partida del trazo fronterizo.
- source_word: תְּתָאוּ
  english_pob_choice: you shall mark out
  chosen_spanish: trazarán
  alternatives_spanish:
  - marcarán
  - delimitarán
  - dibujarán
  lexicon: HALOT
  rationale: En un contexto de límites territoriales, el verbo apunta a delinear una frontera. «Trazar» conserva la imagen de delineación sin sonar demasiado técnico o arcaico.
- source_word: לְבֹא חֲמָת
  english_pob_choice: to Lebo-hamath
  chosen_spanish: hasta Lebó-jamat
  alternatives_spanish:
  - hasta Lebo-jamat
  - hasta la entrada de Jamat
  lexicon: HALOT
  rationale: El hebreo funciona como designación geográfica fija. Mantengo el topónimo transliterado en forma hispanizada para preservar su fuerza toponímica, en lugar de explicitar solo el sentido literal «entrada de Jamat».
- source_word: תּוֹצְאֹת
  english_pob_choice: the end points
  chosen_spanish: los extremos
  alternatives_spanish:
  - los puntos finales
  - los límites
  - los remates
  lexicon: HALOT
  rationale: En descripciones territoriales, el sustantivo indica los puntos terminales de una frontera. «Extremos» es breve y natural en español bíblico contemporáneo.
- source_word: הַגְּבֻל
  english_pob_choice: the border
  chosen_spanish: la frontera
  alternatives_spanish:
  - el límite
  - la frontera territorial
  lexicon: HALOT
  rationale: «Frontera» comunica bien el sentido territorial y suena natural en español. Mantiene la referencia a una línea limítrofe concreta.
- source_word: צְדָדָה
  english_pob_choice: at Zedad
  chosen_spanish: Zedad
  alternatives_spanish:
  - en Zedad
  - hasta Zedad
  lexicon: HALOT
  rationale: Topónimo de ubicación terminal. Se conserva sin añadir preposición en el núcleo del texto para no sobrecargar la frase; el valor locativo ya se entiende por el contexto.
translation_notes:
  revision_awareness: 'Se siguió el pasaje hebreo de Números 34:8 y el audit trail inglés: se mantuvo el valor toponímico de Lebó-jamat, el sentido fronterizo de תְּתָאוּ y תּוֹצְאֹת, y la estructura de descripción territorial sin introducir explicaciones ajenas al texto.'
  spanish_consistency_notes:
  - Se usa «monte» para el topónimo Mount Hor, en coherencia con la práctica de la obra para lugares bíblicos.
  - Se hispaniza Lebo-hamath como «Lebó-jamat» para conservar la composición del nombre y facilitar lectura en español.
  - Se elige «frontera»/«extremos» en vez de una paráfrasis más interpretativa para respetar el registro geográfico del hebreo.
