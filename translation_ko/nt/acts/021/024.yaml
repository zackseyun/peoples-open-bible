  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: τούτους παραλαβὼν ἁγνίσθητι σὺν αὐτοῖς καὶ δαπάνησον ἐπ’ αὐτοῖς ἵνα ⸀ξυρήσονται τὴν κεφαλήν, καὶ ⸀γνώσονται πάντες ὅτι ὧν κατήχηνται περὶ σοῦ οὐδέν ἐστιν, ἀλλὰ στοιχεῖς καὶ αὐτὸς ⸂φυλάσσων τὸν νόμον⸃.
base_translation:
  language: en
  yaml_path: translation/nt/acts/021/024.yaml
  text: Take these men[a], purify yourself along with them, and pay their expenses so that they may shave their heads. Then everyone will know that there is nothing to the things they have been told about you[b], but that you yourself also are living in observance of the law.
  footnotes:
  - marker: a
    text: Or 'what they have been instructed about you.' The Greek verb can mean 'to instruct' or more generally 'to inform.' In this context it refers to reports circulating about Paul.
    reason: lexical_alternative
  - marker: b
    text: Literally 'walk in line,' that is, live in a way consistent with keeping the law.
    reason: lexical_alternative
translation:
  language: ko
  text: 그들을 데리고 가서 그들과 함께 정결하게 하고, 그들의 비용을 대신 부담하여 머리를 깎게 하십시오. 그러면 모든 사람이 당신에 관하여 들은 일이 아무것도 아닌 줄을 알 것이며, 당신 자신도 율법을 지키며 살고 있다는 것을 알게 될 것입니다.
  philosophy: optimal-equivalence
