translation:
  language: es
  text: Allí tuvieron gran temor[a], porque Dios está con la generación de los justos[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «temieron un temor», una expresión enfática que significa que fueron sobrecogidos por gran terror.'
    reason: lexical_alternative
  - marker: b
    text: 'También: «Dios está entre la generación de los justos».'
    reason: alternative_reading
lexical_decisions:
- source_word: שָׁם
  english_pob_choice: There
  chosen_spanish: Allí
  alternatives_spanish:
  - Entonces
  - En ese lugar
  lexicon: HALOT
  rationale: El adverbio espacial hebreo conserva en español la deixis breve y poética con «Allí», que suena natural y mantiene la concisión del verso.
- source_word: פָּחֲדוּ פָחַד
  english_pob_choice: they were in great dread
  chosen_spanish: tuvieron gran temor
  alternatives_spanish:
  - estuvieron llenos de gran temor
  - temblaron de temor
  - sintieron gran pavor
  lexicon: HALOT
  rationale: La construcción intensiva hebrea («temieron un temor») pide en español una expresión idiomática que conserve el énfasis. «Tuvieron gran temor» comunica la intensidad sin perder el valor léxico del sustantivo cognado.
- source_word: כִּי
  english_pob_choice: for
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  lexicon: HALOT
  rationale: Aquí introduce la razón del temor; «porque» expresa con claridad la relación causal en español contemporáneo y mantiene el registro poético.
- source_word: אֱלֹהִים
  english_pob_choice: God
  chosen_spanish: Dios
  alternatives_spanish:
  - el Dios
  - Dios mismo
  lexicon: HALOT
  rationale: La forma plural hebrea funciona aquí con referencia singular al Dios de Israel; «Dios» es la equivalencia directa y clara en español.
- source_word: בְּדוֹר
  english_pob_choice: with the generation
  chosen_spanish: con la generación
  alternatives_spanish:
  - entre la generación
  - en medio de la generación
  lexicon: HALOT
  rationale: La preposición ב admite cercanía o compañía. «Con la generación» refleja la lectura auditada de presencia/solidaridad divina sin forzar una paráfrasis más explicativa.
- source_word: צַדִּיק
  english_pob_choice: the righteous
  chosen_spanish: de los justos
  alternatives_spanish:
  - de los rectos
  - de los justos y rectos
  lexicon: HALOT
  rationale: Aunque el hebreo es formalmente singular, funciona de modo colectivo con «generación». En español, «los justos» preserva mejor ese valor colectivo y suena natural dentro de la frase nominal.
theological_decisions:
- issue: Relación de Dios con la generación de los justos en בְּדוֹר צַדִּיק
  english_pob_reading: God is with the generation of the righteous
  chosen_spanish_reading: Dios está con la generación de los justos
  alternative_spanish_readings:
  - Dios está entre la generación de los justos
  - Dios está en la generación de los justos
  rationale: La preposición hebrea permite varias cercanías semánticas. «Está con» comunica de manera fiel la presencia y solidaridad de Dios con su pueblo, coherente con la lectura auditada del POB en inglés, sin añadir precisión doctrinal que el hebreo no exige.
  doctrine_reference: Translation philosophy §3, §6
translation_notes:
  revision_awareness: Se siguió el último pase de revisión sin cambios y se mantuvo la concordancia alta del cotejo; no se introdujeron modificaciones textuales respecto del sentido auditado.
  spanish_consistency_notes:
  - Se conservó el nombre divino como «Dios», conforme al texto hebreo aquí y al uso auditado del POB en inglés.
  - Se evitó un calco de «temieron un temor» en el texto principal, pero se documentó la fuerza intensiva en nota para no borrar la tensión léxica.
  - «Generación de los justos» preserva el valor colectivo de צַדִּיק sin singularizarlo indebidamente.
  - El adverbio inicial «Allí» mantiene la deixis poética breve del hebreo.
