translation:
  language: es
  text: 'El sacerdote respondió a David y dijo[a]: «No hay pan común a mano, pero sí hay pan santo, si los jóvenes se han guardado de mujer».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «de una mujer», es decir, absteniéndose de relaciones sexuales para la pureza ritual.
    reason: lexical_alternative
lexical_decisions:
- source_word: לֶחֶם חֹל
  english_pob_choice: ordinary bread
  chosen_spanish: pan común
  alternatives_spanish:
  - pan ordinario
  - pan profano
  lexicon: HALOT
  rationale: חֹל contrasta con קֹדֶשׁ (‘santo’) y señala pan no consagrado, no ‘profano’ en sentido moral. ‘Pan común’ expresa bien la oposición cultual en español natural.
- source_word: אֶל תַּחַת יָדִי
  english_pob_choice: on hand
  chosen_spanish: a la mano
  alternatives_spanish:
  - disponible
  - bajo mi mano
  lexicon: HALOT
  rationale: El modismo hebreo comunica disponibilidad. ‘A la mano’ conserva el matiz idiomático sin sonar forzado; ‘disponible’ sería más explicativo pero menos cercano al giro original.
- source_word: כִּי אִם
  english_pob_choice: but
  chosen_spanish: pero
  alternatives_spanish:
  - sino
  - excepto que
  lexicon: HALOT
  rationale: En esta construcción contrastiva introduce la excepción frente a la ausencia de pan común. ‘Pero’ fluye naturalmente en español y mantiene la oposición.
- source_word: לֶחֶם קֹדֶשׁ
  english_pob_choice: holy bread
  chosen_spanish: pan santo
  alternatives_spanish:
  - pan consagrado
  - pan sagrado
  lexicon: HALOT
  rationale: קֹדֶשׁ denota lo apartado para Dios. ‘Pan santo’ es directo y conserva la categoría cultual; ‘consagrado’ sería más técnico.
- source_word: אִם נִשְׁמְרוּ
  english_pob_choice: if ... have kept themselves
  chosen_spanish: si los jóvenes se han guardado
  alternatives_spanish:
  - si los jóvenes se han abstenido
  - si los jóvenes han permanecido puros
  lexicon: HALOT
  rationale: El nifal de שׁמר aquí expresa guardarse de algo. ‘Se han guardado’ preserva la imagen verbal y su sentido de abstinencia.
- source_word: הַנְּעָרִים
  english_pob_choice: the young men
  chosen_spanish: los jóvenes
  alternatives_spanish:
  - los muchachos
  - los servidores
  lexicon: HALOT
  rationale: נְעָרִים puede referirse a jóvenes o acompañantes. ‘Los jóvenes’ es natural y suficientemente preciso para el contexto.
- source_word: מֵאִשָּׁה
  english_pob_choice: from women
  chosen_spanish: de las mujeres
  alternatives_spanish:
  - de una mujer
  - de relaciones sexuales con mujeres
  lexicon: HALOT
  rationale: El hebreo singular puede tener fuerza colectiva, y el contexto apunta a abstinencia sexual para pureza ritual. ‘De las mujeres’ mantiene la literalidad básica; la nota aclara el sentido.
theological_decisions:
- issue: Condición de pureza ritual para recibir el pan santo
  english_pob_reading: The priest conditions access to the holy bread on the men's sexual abstinence, expressed without expanding beyond the Hebrew.
  chosen_spanish_reading: El sacerdote condiciona el acceso al pan santo a que los jóvenes se hayan abstenido de las mujeres, sin ampliar el texto más allá de su formulación hebrea.
  alternative_spanish_readings:
  - Podría explicitarse como abstinencia de relaciones sexuales para limpieza ritual.
  - Podría suavizarse a una pureza ceremonial general.
  rationale: El pasaje pertenece al ámbito de santidad ritual, no a una enseñanza general sobre la mujer o la sexualidad. La traducción conserva la condición tal como aparece y evita sobreinterpretarla.
  doctrine_reference: Translation philosophy §§1, 3, 6
translation_notes:
  revision_awareness: 'La redacción sigue el último estado revisado del POB en inglés: se mantiene la simple condición ‘from women’ sin añadir ‘at least’ ni otra matización interpretativa, y se conserva la oposición cultual entre pan común y pan santo.'
  spanish_consistency_notes:
  - Se usa ‘Yahvé’ solo cuando el texto lo requiera explícitamente; en este versículo no aparece el nombre divino.
  - Se mantiene ‘pan santo’ para לֶחֶם קֹדֶשׁ, en continuidad con la distinción cultual del audit trail inglés.
  - ‘Los jóvenes’ traduce נְעָרִים de manera neutra y contextual, sin convertirlo en ‘sirvientes’ o ‘muchachos’ innecesariamente.
  - La nota al pie resuelve la ambigüedad de מֵאִשָּׁה sin trasladar la explicación al cuerpo del texto.
