translation:
  language: es
  text: ¡Escucha[a], pueblo mío, y yo testificaré ante ti[b]; Israel, ¡si me escucharas[c]!
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «Oye». El verbo puede llevar el matiz de obedecer o atender con seriedad, no solo percibir sonido.
    reason: lexical_alternative
  - marker: b
    text: O «te advertiré» o «daré testimonio de ti». El hebreo puede expresar la idea de testificar solemnemente o de advertir.
    reason: lexical_alternative
  - marker: c
    text: 'La cláusula hebrea también puede expresarse más explícitamente como un deseo: «¡Oh, si me escucharas!»'
    reason: alternative_reading
lexical_decisions:
- source_word: שְׁמַע
  english_pob_choice: Hear
  chosen_spanish: Escucha
  alternatives_spanish:
  - Oye
  - Escucha atentamente
  lexicon: HALOT
  rationale: El imperativo de שׁמע pide una audición atenta y obediente. «Escucha» conserva el llamado directo y funciona de manera natural en español.
- source_word: עַמִּי
  english_pob_choice: my people
  chosen_spanish: pueblo mío
  alternatives_spanish:
  - mi pueblo
  lexicon: HALOT
  rationale: En español, «pueblo mío» mantiene el valor relacional y poético del vocativo, aunque «mi pueblo» también sería posible. Se prefirió el orden más solemne en la línea.
- source_word: וְאָעִידָה
  english_pob_choice: and I will testify to you
  chosen_spanish: y yo te daré testimonio
  alternatives_spanish:
  - y yo testificaré a ti
  - y yo atestiguaré contra ti
  - y yo te advertiré
  lexicon: HALOT
  rationale: El hitpael/hiphil de עוד tiene el campo de testificar, dar testimonio y también advertir solemnemente. «Dar testimonio» conserva la fuerza forense sin forzar una lectura adversativa que el texto revisado en inglés no adoptó.
- source_word: בָּךְ
  english_pob_choice: to you
  chosen_spanish: te
  alternatives_spanish:
  - a ti
  - contra ti
  - sobre ti
  lexicon: HALOT
  rationale: El audit trail inglés corrigió la lectura adversativa a un dativo más neutral. En español, el clítico «te» transmite de forma natural esa relación direccional.
- source_word: יִשְׂרָאֵל
  english_pob_choice: O Israel
  chosen_spanish: Israel
  alternatives_spanish:
  - ¡Oh, Israel!
  - ¡Israel!
  lexicon: HALOT
  rationale: Se conserva el vocativo con coma y exclamación implícita por el contexto. No se añade «oh» porque en español puede sonar más marcado de lo necesario.
- source_word: אִם תִּשְׁמַע לִי
  english_pob_choice: if you would listen to me
  chosen_spanish: ¡si me escucharas!
  alternatives_spanish:
  - si me escuchas
  - si me escucharéis
  - ¡oh, si me escucharas!
  lexicon: HALOT
  rationale: La partícula אִם en poesía puede introducir un deseo o apelación, no solo una condición. «Si me escucharas» preserva esa tensión; el modo condicional en español expresa bien el valor desiderativo.
theological_decisions:
- issue: Fuerza desiderativa de אִם תִּשְׁמַע לִי
  english_pob_reading: 'Rendered as a wistful appeal: ''if you would listen to me!'''
  chosen_spanish_reading: «¡si me escucharas!» como apelación anhelante, no mero condicional lógico
  alternative_spanish_readings:
  - «si me escuchas»
  - «¡oh, si me escucharas!»
  rationale: La línea final no debe leerse como una simple condición contractual. El hebreo permite una inflexión de deseo o lamento; el condicional español comunica bien esa voz apelativa y conserva la tensión poética.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it'
translation_notes:
  revision_awareness: La base inglesa revisó 'testify against you' a 'testify to you' para acercarse más al hebreo; por eso el español evita una lectura adversativa explícita y prefiere «dar testimonio». También se mantuvo la lectura desiderativa de la cláusula final, en línea con el audit trail.
  spanish_consistency_notes:
  - Se usa «escucha/escuchar» para reflejar la repetición de la raíz שׁמע.
  - Se evitó «SEÑOR» o títulos eclesiásticos no presentes en el texto.
  - «Dar testimonio» mantiene el registro formal y forense sin sobreinterpretar la preposición בְּ.
  - La puntuación refleja el vocativo poético y la exclamación implícita del cierre.
