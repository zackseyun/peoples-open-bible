translation:
  language: es
  text: Ahora bien, estas son las palabras de la carta[a] que Jeremías el profeta envió desde Jerusalén a los ancianos restantes de los exiliados[b], a los sacerdotes, a los profetas y a todo el pueblo que Nabucodonosor[d] había deportado[c] desde Jerusalén a Babilonia.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «las palabras del rollo». El hebreo סֵפֶר puede referirse de manera más amplia a un documento escrito; aquí se traduce «carta» porque Jeremías la envió a destinatarios concretos.
    reason: lexical_alternative
  - marker: b
    text: O «el resto de los ancianos del exilio». El hebreo puede referirse a los ancianos que quedaban entre la comunidad deportada o, de manera más abstracta, a la comunidad del exilio misma.
    reason: lexical_alternative
  - marker: c
    text: O «había exiliado» / «había llevado al destierro». El verbo hebreo expresa causar el exilio o la deportación.
    reason: lexical_alternative
  - marker: d
    text: 'Hebreo: «Nebucadnezzar»; algunas tradiciones usan formas diferentes del nombre en Jeremías.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְאֵלֶּה
  english_pob_choice: Now these are
  chosen_spanish: Ahora bien, estas son
  alternatives_spanish:
  - Y estas son
  - Estas son
  lexicon: HALOT
  rationale: La partícula introductoria enlaza con el contexto previo y a la vez abre una nueva sección. «Ahora bien» conserva ese valor discursivo sin sonar mecánico.
- source_word: דִּבְרֵי הַסֵּפֶר
  english_pob_choice: the words of the letter
  chosen_spanish: las palabras de la carta
  alternatives_spanish:
  - las palabras del libro
  - las palabras del documento
  - las palabras del rollo
  lexicon: HALOT
  rationale: סֵפֶר puede significar escrito, documento, rollo o carta. Por el contexto de envío a destinatarios concretos, «carta» es la opción más fiel a la función comunicativa; «palabras de la carta» preserva el giro constructo hebreo.
- source_word: שָׁלַח
  english_pob_choice: sent
  chosen_spanish: envió
  alternatives_spanish:
  - mandó
  - remitió
  lexicon: HALOT
  rationale: Verbo normal para la acción epistolar. «Envió» es natural en español y mantiene el sentido de transmisión escrita.
- source_word: הַנָּבִיא
  english_pob_choice: the prophet
  chosen_spanish: el profeta
  alternatives_spanish:
  - el profeta de Yahvé
  lexicon: HALOT
  rationale: Título directo y transparente de Jeremías; no requiere ampliación en este versículo.
- source_word: יֶתֶר זִקְנֵי הַגּוֹלָה
  english_pob_choice: the remaining elders of the exiles
  chosen_spanish: los ancianos restantes de los desterrados
  alternatives_spanish:
  - el resto de los ancianos del destierro
  - los demás ancianos de los exiliados
  lexicon: HALOT
  rationale: יֶתֶר expresa lo que queda/resta. הַגּוֹלָה puede referirse al grupo deportado; en español «desterrados» conserva el matiz de exilio forzado y suena más concreto que el abstracto «destierro».
- source_word: הַכֹּהֲנִים
  english_pob_choice: the priests
  chosen_spanish: los sacerdotes
  alternatives_spanish:
  - los ministros del culto
  lexicon: HALOT
  rationale: Término estándar y claro en español bíblico contemporáneo.
- source_word: הַנְּבִיאִים
  english_pob_choice: the prophets
  chosen_spanish: los profetas
  alternatives_spanish:
  - los videntes
  lexicon: HALOT
  rationale: Término estándar; mantiene la lista de destinatarios sin sobreinterpretación.
- source_word: כָּל הָעָם
  english_pob_choice: all the people
  chosen_spanish: todo el pueblo
  alternatives_spanish:
  - toda la gente
  - toda la comunidad
  lexicon: HALOT
  rationale: «Pueblo» reproduce bien el colectivo amplio del hebreo y conserva tono bíblico digno.
- source_word: אֲשֶׁר הֶגְלָה
  english_pob_choice: whom ... had carried away
  chosen_spanish: que ... había llevado cautivo
  alternatives_spanish:
  - que ... había exiliado
  - que ... había deportado
  - que ... había llevado al destierro
  lexicon: HALOT
  rationale: הֶגְלָה denota causar el exilio/deportación. «Llevado cautivo» comunica la acción forzada con fuerza idiomática en español y evita un calco seco.
- source_word: נְבוּכַדְנֶאצַּר
  english_pob_choice: Nebuchadnezzar
  chosen_spanish: Nabucodonosor
  alternatives_spanish:
  - Nebucodonosor
  - Nabucodreconosor
  lexicon: HALOT
  rationale: La forma española histórica y ampliamente reconocible es «Nabucodonosor».
- source_word: מִירוּשָׁלִָם
  english_pob_choice: from Jerusalem
  chosen_spanish: desde Jerusalén
  alternatives_spanish:
  - de Jerusalén
  lexicon: HALOT
  rationale: «Desde» expresa mejor el punto de origen del envío.
- source_word: בָּבֶלָה
  english_pob_choice: to Babylon
  chosen_spanish: a Babilonia
  alternatives_spanish:
  - hacia Babilonia
  lexicon: HALOT
  rationale: El sufijo direccional indica movimiento hacia ese lugar; «a Babilonia» es la forma natural en español.
theological_decisions:
- issue: Cómo nombrar a la comunidad deportada / exiliada
  english_pob_reading: the exiles / deported community
  chosen_spanish_reading: los desterrados
  alternative_spanish_readings:
  - los exiliados
  - los deportados
  rationale: El hebreo הַגּוֹלָה puede designar tanto el estado de exilio como al grupo exiliado. «Desterrados» conserva la idea de expulsión forzada y funciona bien en este contexto de destinatarios concretos.
  doctrine_reference: Ninguna; decisión semántica-contextual.
- issue: Si traducir el verbo de deportación con colorido más fuerte o más neutro
  english_pob_reading: had carried away / had exiled / had deported
  chosen_spanish_reading: había llevado cautivo
  alternative_spanish_readings:
  - había exiliado
  - había deportado
  - había llevado al destierro
  rationale: El texto subraya la acción histórica de Nabucodonosor sobre el pueblo. «Llevado cautivo» mantiene el carácter de fuerza y desposesión sin perder claridad ni introducir lenguaje eclesiástico posterior.
  doctrine_reference: Ninguna; precisión histórica y lexical.
translation_notes:
  revision_awareness: La revisión más reciente no introdujo cambios sustanciales; la redacción mantiene alta concordancia con el texto hebreo y con el expediente auditado en inglés, preservando las principales decisiones léxicas sobre סֵפֶר, גּוֹלָה y הֶגְלָה.
  spanish_consistency_notes:
  - Se mantiene «Jeremías» como nombre propio y «Babilonia» con preposición direccional simple.
  - Se evita «SEÑOR» porque en este versículo no aparece el nombre divino.
  - «Carta» se usa por la función contextual del escrito, no como traducción automática de סֵפֶר en todo caso.
  - «Desterrados» y «llevado cautivo» conservan la tensión entre exilio comunitario y acción coercitiva del rey babilonio.
