base_translation:
  language: en
  yaml_path: translation/extra_canonical/testaments_twelve_patriarchs/gad/002.yaml
  text: '1 Therefore I confess my sin[a], children: many times I wanted to kill him, because I hated him from my soul. 2 And because of the dreams I added hatred toward him, and I wanted to wipe him out from the land of the living, as a calf licks up the green growth of the field. 3 But Judah sold him secretly to the Ishmaelites. 4 Thus the God of our fathers rescued him from our hands, so that we might not commit a great lawless deed in Israel.


    3 Therefore Simeon and I sold him to the Ishmaelites for thirty pieces of gold; and after hiding ten, we showed twenty to our brothers. 4 And so, through greed, we were fully set on his murder. 5 But the God of my fathers rescued him from my hands[d][c][b], so that I might not commit a lawless deed in Israel.'
  footnotes:
  - marker: a
    text: The chapter preserves more than one textual form of the Joseph-selling episode. This draft translates both strands rather than harmonizing them.
    reason: textual_variant
  - marker: b
    text: Or 'consume him' / 'wipe him out.' The Greek verb is kept literally here because of the calf simile that follows.
    reason: lexical_alternative
  - marker: c
    text: Some witnesses attribute the sale secretly to Judah; another strand says, 'Therefore Simeon and I sold him to the Ishmaelites for thirty pieces of gold.'
    reason: textual_variant
  - marker: d
    text: '''Thirty pieces of gold'' reflects the Greek text here; the line about hiding ten and showing twenty also belongs to this variant strand.'
    reason: textual_variant
  ai_draft:
    model_id: gpt-5.4
    model_version: gpt-5.4-2026-03-05
    prompt_id: testaments_draft_v1
