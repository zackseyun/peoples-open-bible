translation:
  language: es
  text: El ojo que lo vio no lo volverá a ver[a], y su lugar ya no lo verá.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «El ojo que puso sus ojos en él no volverá a hacerlo». El hebreo usa «ojo» en singular de manera poética y también personifica «su lugar» en la segunda línea.'
    reason: lexical_alternative
lexical_decisions:
- source_word: עַיִן
  english_pob_choice: The eye
  chosen_spanish: El ojo
  alternatives_spanish:
  - Un ojo
  - El ojo de quien lo vio
  lexicon: HALOT
  rationale: Conservo el singular poético y la personificación del hebreo. En español, 'El ojo' reproduce mejor la fuerza imagística que una generalización como 'nadie'.
- source_word: שְׁזָפַתּוּ
  english_pob_choice: that saw him
  chosen_spanish: que lo vio
  alternatives_spanish:
  - que lo miró
  - que lo contempló
  lexicon: HALOT
  rationale: El verbo expresa ver o mirar fijamente; 'lo vio' mantiene la repetición del campo semántico de 'ver' que domina el verso y suena natural en español.
- source_word: תוֹסִיף
  english_pob_choice: will not see him again
  chosen_spanish: no lo volverá a ver
  alternatives_spanish:
  - no seguirá viéndolo
  - no volverá a verlo
  lexicon: HALOT
  rationale: La negación con יסף transmite 'ya no' o 'no otra vez'. 'No lo volverá a ver' comunica bien la idea de repetición cesada sin añadir explicación ajena al texto.
- source_word: עוֹד
  english_pob_choice: will no longer
  chosen_spanish: ya no
  alternatives_spanish:
  - no más
  - no volverá a
  lexicon: HALOT
  rationale: '''עוֹד'' refuerza la cesación. ''Ya no'' es la equivalencia más natural y clara en español moderno.'
- source_word: תְּשׁוּרֶנּוּ
  english_pob_choice: see him
  chosen_spanish: lo verá
  alternatives_spanish:
  - lo contemplará
  - lo observará
  lexicon: HALOT
  rationale: Sigo la revisión inglesa que volvió a 'see' para mantener consistencia con el hebreo. En español, 'lo verá' conserva esa repetición verbal sin perder naturalidad.
- source_word: מְקוֹמוֹ
  english_pob_choice: his place
  chosen_spanish: su lugar
  alternatives_spanish:
  - su sitio
  - el lugar donde estaba
  lexicon: HALOT
  rationale: La forma literal 'su lugar' preserva la personificación del hebreo. No la explicito más para no suavizar la imagen poética.
translation_notes:
  revision_awareness: La base inglesa revisada prioriza la repetición de 'see' frente a 'behold' en la segunda línea; por eso el español mantiene 'ver' en ambos hemistiquios. También se conserva la personificación poética del singular 'ojo' y de 'su lugar'.
  spanish_consistency_notes:
  - Se mantuvo 'lo' para el objeto directo masculino singular, en paralelo con el hebreo.
  - '''ya no'' traduce la fuerza adverbial de עוֹד sin introducir matices temporales ajenos.'
  - La estructura en dos hemistiquios conserva el paralelismo y la repetición de 'ver'.
