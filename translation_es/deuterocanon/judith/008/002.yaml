translation:
  language: es
  text: Y su esposo Manasés era de su propia tribu y de su propio linaje[a]; y murió en los días de la cosecha de la cebada.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: ''de su propia tribu y de su propia casa ancestral''. El griego distingue φυλή (''tribu'') de πατριά, un grupo de parentesco más estrecho.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀνήρ
  english_pob_choice: husband
  chosen_spanish: esposo
  alternatives_spanish:
  - marido
  - hombre
  lexicon: BDAG
  rationale: Con el posesivo αὐτῆς ('de ella'), el sentido relacional es el de esposo, no simplemente 'hombre'. En español, 'esposo' comunica ese vínculo de manera natural y digna.
- source_word: Μανασσης
  english_pob_choice: Manasseh
  chosen_spanish: Manasés
  alternatives_spanish:
  - Manasés
  lexicon: convención onomástica
  rationale: Se translitera el nombre propio con la forma habitual en español bíblico, sin traducirlo.
- source_word: φυλή
  english_pob_choice: tribe
  chosen_spanish: tribu
  alternatives_spanish:
  - clan
  lexicon: LSJ
  rationale: En contexto genealógico israelita, φυλή designa una división tribal; 'tribu' es el equivalente directo y claro en español.
- source_word: πατριά
  english_pob_choice: family line
  chosen_spanish: linaje
  alternatives_spanish:
  - casa ancestral
  - familia
  lexicon: LSJ
  rationale: πατριά señala un grupo de parentesco más estrecho dentro de la tribu. 'Linaje' expresa bien la idea de descendencia y herencia familiar sin volver la frase demasiado técnica.
- source_word: ἐν ἡμέραις
  english_pob_choice: in the days of
  chosen_spanish: en los días de
  alternatives_spanish:
  - durante
  - al tiempo de
  lexicon: LSJ
  rationale: La locución temporal se conserva de modo idiomático en español con 'en los días de'.
- source_word: θερισμοῦ κριθῶν
  english_pob_choice: the barley harvest
  chosen_spanish: la cosecha de la cebada
  alternatives_spanish:
  - la siega de la cebada
  - la cosecha cebada
  lexicon: LSJ
  rationale: La construcción genitiva especifica el cultivo cosechado. 'La cosecha de la cebada' es natural en español y mantiene el referente agrícola.
translation_notes:
  revision_awareness: El texto griego y el audit trail inglés concuerdan plenamente; no se requieren ajustes de revisión. Se mantiene la distinción léxica entre φυλή y πατριά mediante 'tribu' y 'linaje', con nota alternativa donde el inglés documenta 'ancestral house'.
  spanish_consistency_notes:
  - Se evita 'Señor' o terminología litúrgica no pertinente; el versículo no contiene vocabulario teológico sensible.
  - '''Esposo'' se usa por el valor relacional de ἀνήρ con posesivo, coherente con el audit trail inglés.'
  - Se conserva la secuencia temporal simple del griego con puntuación semicolónica para reflejar la coordinación de las dos cláusulas.
