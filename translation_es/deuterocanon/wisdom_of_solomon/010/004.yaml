    issue: La nota al pie [a] está anclada en el lugar equivocado.
    rationale: La nota comenta la frase «por medio de un humilde/insignificante trozo de madera», pero el marcador aparece tras «él». Según las reglas, el marcador exacto debe aparecer en el término o frase pertinente.
  - severity: medium
    issue: «Guiando» debilita el matiz náutico de κυβερνήσασα.
    rationale: El griego usa una imagen de pilotar/gobernar una nave. Aunque «guiando» no es falso, pierde la imaginería marítima que el POB inglés documenta y preserva con «steering».
  - severity: low
