    text: 'O: “hacer que Israel se mueva” o “remover a Israel de la tierra”. El hebreo dice literalmente “hacer vagar el pie de Israel”, preservando la imagen de desplazamiento.'
    reason: lexical_alternative
  - marker: b
    text: 'O: “a sus antepasados”. “Sus padres” es una expresión pactual para los antepasados de Israel.'
    reason: lexical_alternative
  - marker: c
    text: “Ley” también puede verterse “instrucción”; aquí se refiere a la Torá mosaica dada por medio de Moisés.
    reason: lexical_alternative
  revision_rationale: 'La revisión corrige dos problemas principales: evita la sobreinterpretación de ''fuera de la tierra'' y reemplaza la expresión poco idiomática ''guarden para hacer'' por ''se cuiden de hacer''. Además, recupera en el texto principal la imagen corporal del hebreo con ''los pies de Israel'', en consonancia con la racionalidad léxica documentada, mientras mantiene un español claro y natural.'
