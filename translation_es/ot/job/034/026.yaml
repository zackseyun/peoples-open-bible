  text: תַּֽחַת רְשָׁעִ֥ים סְפָקָ֗/ם בִּ/מְק֥וֹם רֹאִֽים־׃
base_translation:
  language: en
  yaml_path: translation/ot/job/034/026.yaml
  text: He strikes them down as wicked men[b][a], in a place where people can see.
  footnotes:
  - marker: a
    text: Or, 'He strikes them before onlookers' / 'He strikes them in the sight of onlookers.' The Hebrew participle literally means 'those seeing.'
    reason: lexical_alternative
  - marker: b
    text: The opening phrase may also be understood more literally as 'under the wicked' or idiomatically as 'as wicked people.'
    reason: lexical_alternative
