  source_alignment_summary: 'El borrador conserva bien la estructura condicional, el propósito de amar y servir, y el uso de «Yahvé» para יְהוָה. Sin embargo, no refleja plenamente dos elementos del expediente inglés y del hebreo: (1) falta una nota para נַפְשְׁכֶם («alma / vida / ser»), que el POB inglés preservó como alternativa significativa; y (2) la nota sobre YHWH está anclada incorrectamente al final en lugar de en «Yahvé». Además, «escuchan de verdad» suena menos natural en español que una formulación que conserve la intensidad del infinitivo absoluto.'
  spanish_quality_summary: El español es generalmente claro y digno, pero «escuchan de verdad» resulta algo coloquial y poco idiomático para un registro bíblico; «de veras / atentamente / con diligencia» o una perífrasis más natural mejora la lectura. También conviene anclar las notas en los términos pertinentes y mantener la puntuación abierta porque la oración continúa en el versículo siguiente.
  glossary_alignment: 'Alineado en lo esencial con la terminología del proyecto: יְהוָה -> «Yahvé», אֱלֹהִים -> «Dios», עבד -> «servirle», לבב -> «corazón», נפש -> «alma». La principal corrección de glosario es conservar en nota la alternativa semántica de «alma» tal como hace el POB inglés, y ubicar la nota de «Yahvé» junto al nombre divino.'
  issues:
  - severity: medium
    issue: La nota sobre YHWH está mal anclada.
