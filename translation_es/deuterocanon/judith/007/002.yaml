review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la estructura básica del griego: salida del campamento, censo de infantería y jinetes, y la mención adicional del bagaje y hombres a pie en construcción difícil. Sin embargo, las notas al pie están invertidas respecto de sus anclajes: [a] está colocado sobre ἀνέζευξεν pero contiene la nota de dificultad sintáctica de la cláusula final, mientras que [b] está colocado en la cláusula final pero contiene la alternativa léxica para ἀνέζευξεν. Eso rompe la trazabilidad del audit trail. Además, la nota [a] actual cita ''desplegó su campamento'', frase que no aparece en el texto español ni corresponde a la decisión adoptada.'
  spanish_quality_summary: El español es natural, claro y de tono bíblico digno. 'Levantó el campamento', 'hombres de guerra', 'soldados de a pie' y 'jinetes' son opciones legibles y fieles. La única reparación necesaria es corregir la asignación y redacción de las notas al pie para que coincidan con los anclajes y con el texto revisado. También conviene ajustar mínimamente la nota sintáctica para evitar 'acompañantes a pie', que suena algo torpe, y usar una formulación más natural en español.
  glossary_alignment: No hay conflicto con la terminología doctrinal del proyecto. Las decisiones léxicas militares son coherentes con el griego y con el POB inglés. 'Hombres valientes' para πᾶς ἀνὴρ δυνατὸς αὐτῶν es aceptable, aunque 'hombres poderosos/valerosos' también sería posible. 'Sin contar el bagaje' para χωρὶς τῆς ἀποσκευῆς es adecuado en contexto.
  issues:
  - severity: high
    issue: Las notas al pie [a] y [b] están intercambiadas respecto de sus anclajes en el texto.
    rationale: El marcador [a] aparece en 'levantó el campamento', por lo que debe llevar la nota léxica sobre ἀνέζευξεν. El marcador [b] aparece en la cláusula difícil final, por lo que debe llevar la nota sobre la dificultad sintáctica. Actualmente ocurre al revés.
  - severity: medium
    issue: 'La nota [a] cita una frase inexistente en el texto español: ''desplegó su campamento''.'
    rationale: Esto crea incoherencia documental y puede confundir al lector o revisor sobre qué expresión se está comentando.
  - severity: low
    issue: La redacción 'hombres acompañantes a pie' en la nota es poco natural.
    rationale: 'Puede mejorarse sin alterar el sentido: ''hombres que acompañaban al ejército a pie'' o equivalente.'
  revised_spanish_text: Y en aquel día cada uno de sus hombres valientes levantó el campamento[a]; y su fuerza de hombres de guerra era de ciento setenta mil soldados de a pie y doce mil jinetes, sin contar el bagaje y los hombres de a pie entre ellos[b], una multitud muy grande.
  revised_footnotes:
  - marker: a
    text: O 'partió' / 'levantó el campamento' para ἀνέζευξεν.
    reason: lexical_alternative
  - marker: b
    text: El griego después de 'sin contar el bagaje' es sintácticamente difícil. Probablemente se refiere a un grupo muy numeroso de hombres que acompañaban al ejército a pie, vinculados con el bagaje y el tren de apoyo, además de los totales de combate ya mencionados.
    reason: textual_variant
  revision_rationale: El texto principal puede mantenerse. La revisión corrige la asignación de las notas al pie para que coincidan con los anclajes correctos y con el audit trail inglés, elimina una cita errónea ('desplegó su campamento') y mejora la naturalidad de la nota sintáctica sin cambiar su contenido sustancial.
