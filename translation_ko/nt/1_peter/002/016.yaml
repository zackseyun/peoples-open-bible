- source_word: θεοῦ δοῦλοι
  english_pob_choice: slaves of God
  chosen_korean: 하나님의 종
  alternatives_korean:
  - 하나님의 노예
  - 하나님께 매인 자
  lexicon: BDAG
  rationale: 'δοῦλος의 기본값은 「종」 (글로서리). 빌립보서 1:1처럼 매임의 부정적 함의를 폭로하는 문맥과 달리, 여기서는 「하나님께 속함」의 영광스러운 정체성을 강조하는 문맥이므로 「종」을 채택. 각주로 매임의 어감을 명시.'
