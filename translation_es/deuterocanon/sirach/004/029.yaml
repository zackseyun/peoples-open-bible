review_pass:
  verdict: revise
  source_alignment_summary: El borrador sigue correctamente el hebreo principal de la Geniza y no el griego variante. Conserva bien עַד הַמָּוֶת como «hasta la muerte», הִנָּצֵה como exhortación de lucha/contienda, y נִלְחָם לָךְ como promesa de que Yahvé peleará por el lector. Sin embargo, omite en español la nota textual importante que el inglés POB preserva sobre la lectura griega alternativa, y cambia la preferencia semántica principal de צֶדֶק de «righteousness» a «justicia» sin suficiente necesidad.
  spanish_quality_summary: 'El español es claro y digno. «Contiende» es correcto, aunque algo formal; funciona bien en registro sapiencial. «Yahvé peleará por ti» suena natural. La principal mejora necesaria es documental y de fidelidad editorial: reflejar en notas la variante griega conservada por el POB y alinear mejor la elección principal de צֶדֶק con la preferencia auditada.'
  glossary_alignment: Buena alineación con la terminología del proyecto en «Yahvé». No hay otros términos doctrinales conflictivos. Para צֶדֶק, el borrador usa «justicia» y nota «rectitud», pero el expediente inglés privilegia «righteousness»; en español «rectitud» reproduce mejor esa preferencia, dejando «justicia» como alternativa en nota.
  issues:
  - severity: medium
    issue: Falta la nota de variante textual griega presente en el POB inglés.
    rationale: El inglés conserva explícitamente que la LXX griega tiene otra oración completamente distinta. Dado que la fuente hebrea tiene validación minor_mismatch y el POB documentó la variante, el español debe preservarla también.
  - severity: medium
    issue: La elección principal «justicia» para צֶדֶק no refleja la preferencia auditada por «righteousness».
    rationale: Aunque «justicia» es posible, la decisión inglesa y teológica prioriza el sentido ético amplio. En español, «rectitud» comunica mejor esa preferencia sin perder naturalidad, y «justicia» puede mantenerse como alternativa significativa.
  revised_spanish_text: Contiende por la rectitud[a] hasta la muerte[b], y Yahvé peleará por ti.
