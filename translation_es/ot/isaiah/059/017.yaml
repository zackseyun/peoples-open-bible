revisions:
- from: Se vistió de justicia como de una coraza[a], y se puso un casco de salvación sobre su cabeza; se vistió de vestiduras de venganza para vestirse[b], y se envolvió en celo como en un manto[c].
  to: Se vistió con justicia como una coraza[a], y se puso un casco de salvación[b] sobre su cabeza; se vistió con vestiduras de venganza como vestidura, y se envolvió en celo como en un manto[c].
  rationale: Se corrigió la colocación de la nota sobre «salvación» para que ancle al término correcto, y se reparó la frase torpe «para vestirse» con «como vestidura», que refleja mejor תִּלְבֹּשֶׁת. También se ajustó la sintaxis a «se vistió con» para una lectura más natural y uniforme sin alterar el sentido.
