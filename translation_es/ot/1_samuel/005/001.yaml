translation:
  language: es
  text: Ahora los filisteos[a] habían tomado el arca de Dios y la llevaron de Ebenezer a Asdod.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «Y los filisteos»; «Ahora los filisteos» se usa para marcar la transición narrativa de manera natural en español.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וּ/פְלִשְׁתִּים
  english_pob_choice: Now the Philistines
  chosen_spanish: Ahora los filisteos
  alternatives_spanish:
  - Y los filisteos
  - Los filisteos
  lexicon: HALOT
  rationale: El ו inicial marca una transición narrativa; en español, «Ahora» comunica mejor ese giro discursivo que un simple «Y». «Filisteos» es la transliteración usual y clara del grupo étnico.
- source_word: לָקְחוּ
  english_pob_choice: had taken
  chosen_spanish: tomaron
  alternatives_spanish:
  - habían tomado
  - recibieron
  - se apoderaron de
  lexicon: HALOT
  rationale: El perfecto hebreo aquí reanuda la acción pasada. En español, el pretérito simple «tomaron» conserva la secuencia narrativa de manera natural; el pluscuamperfecto sería posible, pero no necesario en una línea tan breve.
- source_word: אֲרוֹן הָאֱלֹהִים
  english_pob_choice: the ark of God
  chosen_spanish: el arca de Dios
  alternatives_spanish:
  - el arca de Dioses
  - el arca divina
  - el arca de Dios
  lexicon: HALOT
  rationale: «Arca de Dios» conserva la relación genitiva del hebreo sin forzar un posesivo menos natural en español. «Dios» mantiene el término teológico estándar del texto.
- source_word: וַיְבִאֻהוּ
  english_pob_choice: and brought it
  chosen_spanish: la llevaron
  alternatives_spanish:
  - la trajeron
  - la llevaron allí
  - la introdujeron
  lexicon: HALOT
  rationale: El verbo causativo de בוא expresa llevar/traer hacia un destino. En español, «la llevaron» es natural y fiel al movimiento implícito; «la trajeron» podría sonar menos preciso según la perspectiva del narrador.
- source_word: מֵאֶבֶן הָעֵזֶר
  english_pob_choice: from Ebenezer
  chosen_spanish: desde Eben-ezer
  alternatives_spanish:
  - desde Ebenezer
  - de Eben-ezer
  lexicon: HALOT
  rationale: Se conserva el topónimo como nombre de lugar. «Desde» reproduce היטב el valor locativo de salida; se prefiere «Eben-ezer» por su forma más cercana a la segmentación hebrea, aunque «Ebenezer» también es inteligible.
- source_word: אַשְׁדּוֹדָה
  english_pob_choice: to Ashdod
  chosen_spanish: hasta Asdod
  alternatives_spanish:
  - a Asdod
  - hacia Asdod
  lexicon: HALOT
  rationale: El he direccional indica movimiento hacia el destino; «hasta» expresa bien ese arribo o dirección final en español. Se usa «Asdod», forma común en español, por claridad y lectura eclesial fluida.
theological_decisions:
- issue: Nombre divino en la expresión «arca de Dios»
  english_pob_reading: the ark of God
  chosen_spanish_reading: el arca de Dios
  alternative_spanish_readings:
  - el arca de Yahvé
  - el arca del Señor
  rationale: El hebreo usa אֱלֹהִים, no el tetragrámaton; por tanto, se mantiene «Dios». No se introduce «Yahvé» porque el texto no lo lleva explícitamente, y «Señor» borraría la forma hebrea concreta.
  doctrine_reference: Precisión léxica del texto hebreo; distinción entre אֱלֹהִים y יהוה.
translation_notes:
  revision_awareness: 'Se siguió el texto hebreo WLC y el audit trail inglés: se mantuvo la transición narrativa marcada por ו, el valor de movimiento de וַיְבִאֻהוּ y la dirección final hacia Asdod. No se adoptó la forma inglesa pluscuamperfecta porque en español la progresión narrativa suena más natural con pretérito simple.'
  spanish_consistency_notes:
  - Se usa «filisteos» como etnónimo estándar en español.
  - Se usa «arca de Dios» para preservar el genitivo hebreo sin introducir posesivo.
  - Se emplea «Asdod» como forma española habitual del topónimo.
  - Se evitó «SEÑOR» porque el hebreo aquí dice אֱלֹהִים.
