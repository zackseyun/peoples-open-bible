source:
  edition: WLC
  text: כִּֽי כֹ֣ה אָמַ֣ר יְהוָ֗ה עַל בֵּית֙ מֶ֣לֶךְ יְהוּדָ֔ה גִּלְעָ֥ד אַתָּ֛ה לִ֖/י רֹ֣אשׁ הַ/לְּבָנ֑וֹן אִם לֹ֤א אֲשִֽׁיתְ/ךָ֙ מִדְבָּ֔ר עָרִ֖ים לֹ֥א נושבה־׀־־׃
base_translation:
  language: en
  yaml_path: translation/ot/jeremiah/022/006.yaml
  text: 'For thus says Yahweh concerning the house of the king of Judah: You are Gilead to me[a], the summit of Lebanon; surely I will make you a wilderness[c][b], cities not inhabited.'
  footnotes:
  - marker: a
    text: Or 'the head/top of Lebanon.' The Hebrew says 'head of Lebanon,' an idiom for its height or prominence.
    reason: lexical_alternative
  - marker: b
    text: The phrase 'surely I will make you' renders an emphatic Hebrew oath-like expression (literally, 'if not I make you').
    reason: lexical_alternative
  - marker: c
    text: 'Or ''uninhabited cities.'' The Hebrew may describe the result of judgment: cities left without inhabitants.'
    reason: lexical_alternative
  ai_draft:
    model_id: gpt-5.4
    model_version: gpt-5.4-2026-03-05
