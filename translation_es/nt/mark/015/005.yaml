translation:
  language: es
  text: Pero Jesús ya no respondió nada[a], de modo que Pilato se asombró.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Pero Jesús ya no dio ninguna respuesta, con el resultado de que Pilato se maravilló».'
    reason: lexical_alternative
lexical_decisions:
- source_word: δὲ
  english_pob_choice: But
  chosen_spanish: Pero
  alternatives_spanish:
  - Y
  - Ahora
  lexicon: BDAG
  rationale: La partícula introduce un giro narrativo y leve contraste con el intercambio anterior. «Pero» conserva mejor ese matiz adversativo en español bíblico y actual.
- source_word: οὐκέτι
  english_pob_choice: no longer
  chosen_spanish: ya no
  alternatives_spanish:
  - no más
  - no longer
  lexicon: BDAG
  rationale: «Ya no» transmite con naturalidad la cesación de una acción previa. Mantiene el valor temporal de término de la respuesta de Jesús sin sonar forzado.
- source_word: οὐδὲν
  english_pob_choice: anything
  chosen_spanish: nada
  alternatives_spanish:
  - ninguna cosa
  - nada alguno
  lexicon: BDAG
  rationale: Con el verbo negado, el español idiomático prefiere «no respondió nada». Esto preserva la totalidad del silencio de Jesús sin una construcción extraña.
- source_word: ἀπεκρίθη
  english_pob_choice: answered
  chosen_spanish: respondió
  alternatives_spanish:
  - contestó
  - dio respuesta
  lexicon: BDAG
  rationale: En un contexto de interrogatorio judicial, «respondió» funciona bien y suena natural en español. También conserva la idea de réplica verbal a la acusación o pregunta.
- source_word: ὥστε
  english_pob_choice: so that
  chosen_spanish: de modo que
  alternatives_spanish:
  - así que
  - con el resultado de que
  lexicon: BDAG
  rationale: La construcción resultativa queda clara en español con «de modo que». Expresa el efecto de la silencio de Jesús sobre Pilato sin añadir interpretación.
- source_word: θαυμάζειν
  english_pob_choice: was amazed
  chosen_spanish: se asombró
  alternatives_spanish:
  - se maravilló
  - quedó asombrado
  lexicon: BDAG
  rationale: «Se asombró» es una equivalencia natural y sobria para el resultado expresado por el infinitivo. Conserva la reacción de sorpresa de Pilato sin intensificarla más de lo que exige el texto.
- source_word: Πιλᾶτον
  english_pob_choice: Pilate
  chosen_spanish: Pilato
  alternatives_spanish:
  - Pílato
  lexicon: Transliteración de nombre propio
  rationale: Se mantiene la forma habitual en español para el nombre propio, conforme a la política del proyecto de transliterar nombres.
translation_notes:
  revision_awareness: El texto griego presenta una negación total de la respuesta de Jesús y una cláusula resultativa con ὥστε; la versión española conserva ambos elementos sin suavizar la tensión narrativa. El audit trail inglés favorece una equivalencia óptima; en español se ha elegido una formulación natural («ya no respondió nada», «de modo que»).
  spanish_consistency_notes:
  - Se usa «Jesús» y «Pilato» de manera consistente con la transliteración estándar del proyecto.
  - Se evita «Cristo» porque el versículo no usa Χριστός.
  - Se conserva el valor resultativo de ὥστε mediante «de modo que», no una causalidad más fuerte.
  - La negación española simple («no respondió nada») refleja la totalidad de οὐδὲν sin doble negación problemática.
