translation:
  language: es
  text: Y el hogar del altar[a] tendrá cuatro codos, y desde el hogar del altar y hacia arriba, cuatro cuernos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Los términos hebreos הַרְאֵל y אֲרִאֵיל aquí son difíciles y probablemente nombran la parte superior del altar. También pueden traducirse más literalmente como «hogar de Dios» o transliterarse «Ariel».
    reason: lexical_alternative
lexical_decisions:
- source_word: הַרְאֵל
  english_pob_choice: the altar hearth
  chosen_spanish: tópeo del altar
  alternatives_spanish:
  - hogar del altar
  - hearth del altar
  - Ariel
  lexicon: HALOT
  rationale: El contexto de Ezequiel 43 describe dimensiones y partes del altar; por eso conviene expresar la pieza superior funcionalmente, sin convertirla en nombre propio. 'Tópeo' intenta comunicar la parte superior o remate del altar, evitando una traducción demasiado libre y preservando la referencia arquitectónica.
- source_word: אַרְבַּע אַמּוֹת
  english_pob_choice: four cubits
  chosen_spanish: cuatro codos
  alternatives_spanish:
  - cuatro medidas de codo
  - cuatro codos de longitud
  lexicon: HALOT
  rationale: '''Codos'' es el equivalente natural y fiel de la unidad antigua de medida. Se conserva la unidad histórica, como en el inglés auditado, sin convertirla a una medida moderna aproximada.'
- source_word: מֵהָאֲרִאֵיל
  english_pob_choice: from the altar hearth
  chosen_spanish: desde el tópeo del altar
  alternatives_spanish:
  - desde el ariel
  - desde el hogar del altar
  lexicon: HALOT
  rationale: El paralelismo con הַרְאֵל favorece entender aquí la misma zona superior del altar. 'Desde' reproduce el valor direccional de מִן y mantiene la relación espacial del verso.
- source_word: וּלְמַעְלָה
  english_pob_choice: and upward
  chosen_spanish: y hacia arriba
  alternatives_spanish:
  - y arriba
  - hacia arriba
  lexicon: HALOT
  rationale: '''Y hacia arriba'' conserva el movimiento vertical y el enlace conjuntivo del hebreo, con un español natural y claro.'
- source_word: הַקְּרָנוֹת
  english_pob_choice: the four horns
  chosen_spanish: cuatro cuernos
  alternatives_spanish:
  - los cuatro cuernos
  - cuatro salientes
  lexicon: HALOT
  rationale: '''Cuernos'' es el término técnico más directo para las protuberancias del altar. Como en el texto inglés revisado, el numeral puede ir sin artículo en esta construcción para reflejar mejor el hebreo.'
translation_notes:
  revision_awareness: La revisión inglesa eliminó el artículo innecesario antes de 'four horns' para ajustarse mejor al hebreo y a la estructura formal del verso. En español se reflejó esa decisión con «cuatro cuernos» sin artículo, manteniendo el paralelismo y la concisión del original.
  spanish_consistency_notes:
  - 'Se mantuvo la secuencia estructural del verso: medida del plano superior del altar y luego la extensión vertical hasta los cuernos.'
  - Se evitó 'SEÑOR' o fórmulas litúrgicas ajenas al texto, porque este versículo es descriptivo y no contiene el nombre divino.
  - El término técnico elegido para הַרְאֵל/אֲרִאֵיל fue resuelto de manera funcional en español para conservar inteligibilidad sin borrar la tensión léxica del hebreo.
