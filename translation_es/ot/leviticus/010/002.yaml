translation:
  language: es
  text: Y salió fuego de delante de Yahvé y los consumió[a], y murieron delante de Yahvé.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «de delante de Yahvé»; alternativamente, «desde la presencia de Yahvé».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַתֵּצֵא
  english_pob_choice: came out
  chosen_spanish: salió
  alternatives_spanish:
  - vino
  - salió hacia afuera
  lexicon: HALOT
  rationale: El hebreo expresa un movimiento de salida; en español, «salió» es natural y conserva el avance narrativo sin añadir matiz interpretativo.
- source_word: אֵשׁ
  english_pob_choice: fire
  chosen_spanish: fuego
  alternatives_spanish:
  - llama
  - incendio
  lexicon: HALOT
  rationale: El sustantivo denota fuego literal en este contexto de juicio inmediato; «fuego» es la correspondencia directa y clara.
- source_word: מִלִּפְנֵי יְהוָה
  english_pob_choice: from before Yahweh
  chosen_spanish: de delante de Yahvé
  alternatives_spanish:
  - desde la presencia de Yahvé
  - de la presencia de Yahvé
  lexicon: HALOT
  rationale: La expresión hebrea es idiomática, literalmente «de delante de» o «desde la presencia de». «De delante de Yahvé» preserva el giro y la solemnidad, usando el nombre divino según el criterio del proyecto.
- source_word: וַתֹּאכַל
  english_pob_choice: consumed
  chosen_spanish: los consumió
  alternatives_spanish:
  - los devoró
  - los devoró por completo
  lexicon: HALOT
  rationale: Aunque אכל significa «comer», con fuego como sujeto en español el verbo natural es «consumir». Mantiene la fuerza de destrucción total sin sonar forzado.
- source_word: אֹתָם
  english_pob_choice: them
  chosen_spanish: los
  alternatives_spanish:
  - a ellos
  lexicon: HALOT
  rationale: El pronombre de objeto directo en español requiere concordancia natural con el referente masculino plural, identificado por el contexto inmediato.
- source_word: וַיָּמֻתוּ
  english_pob_choice: they died
  chosen_spanish: murieron
  alternatives_spanish:
  - y murieron
  - fallecieron
  lexicon: HALOT
  rationale: El hebreo presenta un verbo simple de morir; «murieron» comunica el resultado sin introducir pasiva causal ni suavizar el hecho.
- source_word: לִפְנֵי יְהוָה
  english_pob_choice: before Yahweh
  chosen_spanish: delante de Yahvé
  alternatives_spanish:
  - en la presencia de Yahvé
  - ante Yahvé
  lexicon: HALOT
  rationale: La repetición de la frase mantiene el énfasis locativo-teológico del hebreo. «Delante de Yahvé» sigue de cerca el original y suena natural en español bíblico.
theological_decisions:
- issue: Renderización del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Yahveh
  rationale: El texto hebreo usa el Tetragramatón; el proyecto pide «Yahvé» en el texto principal. Se conserva así el nombre del pacto en vez de una sustitución por título.
  doctrine_reference: 'DOCTRINE.md: Contested terms — YHWH → Yahvé'
- issue: Verbo de muerte en וַיָּמֻתוּ
  english_pob_reading: they died
  chosen_spanish_reading: murieron
  alternative_spanish_readings:
  - fueron muertos
  - murieron allí
  rationale: El hebreo es intransitivo; el contexto ya muestra la causa en el fuego que sale de delante de Yahvé. «Murieron» evita añadir una pasiva interpretativa no exigida por el texto.
  doctrine_reference: 'DOCTRINE.md Translation philosophy: original-language primacy; never paraphrase beyond what the source text warrants'
translation_notes:
  revision_awareness: 'La auditoría inglesa muestra plena concordancia y no requiere cambios: la decisión de traducir מִלִּפְנֵי como una expresión locativa idiomática se conserva en español, junto con el nombre divino Yahvé y el verbo simple «murieron».'
  spanish_consistency_notes:
  - Se mantuvo el paralelismo de las dos cláusulas con «de delante de Yahvé».
  - «Consumió» conserva la fuerza total del juicio sin convertir el verbo en una paráfrasis.
  - No se añadió interpretación causal adicional a «murieron»; la causalidad queda dada por la primera cláusula.
  - El marcador [a] en el texto señala la alternativa lexical sobre la expresión hebrea idiomática.
