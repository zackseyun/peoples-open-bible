translation:
  language: es
  text: 'Los hijos de Pérez fueron: de Hezrón, el clan de los hezronitas; de Hamul, el clan de los hamulitas.'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: וַיִּהְיוּ
  english_pob_choice: were
  chosen_spanish: fueron
  alternatives_spanish:
  - eran
  - llegaron a ser
  lexicon: HALOT
  rationale: En esta fórmula genealógica/censal, היה funciona como verbo copulativo que introduce linajes y sus subdivisiones; «fueron» reproduce ese valor de forma natural en español sin añadir matices de cambio no presentes en el contexto.
- source_word: בְנֵי
  english_pob_choice: sons of
  chosen_spanish: los hijos de
  alternatives_spanish:
  - los descendientes de
  - los hijos/descendientes de
  lexicon: HALOT
  rationale: Aquí el hebreo presenta la línea genealógica masculina de la que derivan los clanes; «los hijos de» mantiene la estructura semítica y la correspondencia directa con la lectura inglesa auditada.
- source_word: פֶרֶץ
  english_pob_choice: Perez
  chosen_spanish: Pérez
  alternatives_spanish:
  - Pérez
  lexicon: HALOT
  rationale: Se conserva la transliteración moderna del nombre propio, adaptada a la ortografía española con acento agudo para la pronunciación habitual.
- source_word: לְחֶצְרֹן
  english_pob_choice: of Hezron
  chosen_spanish: de Hezrón
  alternatives_spanish:
  - de Hesrón
  - para Hezrón
  lexicon: HALOT
  rationale: En esta lista genealógica, la preposición ל expresa pertenencia o descendencia; «de» es la equivalencia idiomática más clara en español. Se mantiene el nombre propio en forma transliterada estándar.
- source_word: מִשְׁפַּחַת
  english_pob_choice: the clan of
  chosen_spanish: la familia de
  alternatives_spanish:
  - el clan de
  - la familia/clan de
  lexicon: HALOT
  rationale: En contextos censales de Números, מִשְׁפָּחָה designa una subdivisión de parentesco. En español, «familia de» conserva la transparencia y evita una rigidez innecesaria, sin perder el sentido de grupo genealógico.
- source_word: הַחֶצְרֹנִי
  english_pob_choice: the Hezronites
  chosen_spanish: los hezronitas
  alternatives_spanish:
  - la familia hezronita
  - los hezronitas
  lexicon: HALOT
  rationale: El gentilicio hebreo señala al grupo descendiente de Hezrón. «Hezronitas» reproduce el valor colectivo del etnónimo de manera natural en español.
- source_word: לְחָמוּל
  english_pob_choice: of Hamul
  chosen_spanish: de Hamul
  alternatives_spanish:
  - para Hamul
  - a Hamul
  lexicon: HALOT
  rationale: Igual que con Hezrón, la ל indica derivación genealógica; «de» comunica correctamente la relación de pertenencia o procedencia.
- source_word: הֶחָמוּלִי
  english_pob_choice: the Hamulites
  chosen_spanish: los hamulitas
  alternatives_spanish:
  - la familia hamulita
  - los hamulitas
  lexicon: HALOT
  rationale: Se conserva el gentilicio plural para expresar el grupo descendiente de Hamul, en paralelo con la estructura del verso y con la terminología usada para el otro clan.
