    text: O «escritas en las lamentaciones», si la frase se refiere en general a cantos fúnebres y no a una colección específica titulada Lamentaciones.
    reason: alternative_reading
  revision_rationale: Se corrigió el problema principal trasladando la nota [a] al sintagma que realmente comenta, «las Lamentaciones». Además, se cambió «por estatuto» por «como estatuto» para un español más natural y fiel al sentido de práctica establecida.
