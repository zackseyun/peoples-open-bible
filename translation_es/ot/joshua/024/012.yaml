review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien el sentido básico del hebreo: Yahvé envía הַצִּרְעָה delante del pueblo, esta expulsa a los enemigos, se especifica a los dos reyes amorreos y se niega que la victoria viniera por la espada o el arco de Israel. También conserva correctamente la nota sobre la posible lectura figurada de ''terror/pánico''.'
  spanish_quality_summary: 'El español es mayormente claro, pero tiene varios tropiezos de naturalidad y puntuación: ''ella'' para una avispa suena innecesariamente literal; la secuencia ''de delante de ustedes: a los dos reyes...'' está puntuada de forma poco natural; y ''la avispa'' es posible pero menos preciso y menos idiomático que ''el avispón'' para הַצִּרְעָה en este contexto bíblico. Conviene suavizar el calco y ajustar la sintaxis.'
  glossary_alignment: No hay términos del glosario principal en conflicto. La decisión sobre הַצִּרְעָה debe permanecer literal en el texto principal con nota alternativa; en español, 'avispón' refleja mejor el referente léxico que 'avispa' sin volver interpretativa la traducción.
  issues:
  - severity: medium
    issue: '''la avispa'' probablemente no es la mejor equivalencia para הַצִּרְעָה'
    rationale: Aunque 'avispa' no es imposible, el inglés auditado eligió 'hornet', y en español bíblico/general 'avispón' corresponde mejor a 'hornet'. 'Avispa' puede sonar más genérico y menos preciso.
  - severity: medium
    issue: Uso de 'ella' como sujeto explícito
    rationale: El hebreo marca concordancia femenina en el verbo, pero el español no necesita explicitar 'ella'. Su inclusión suena forzada y poco natural en un texto bíblico fluido.
  - severity: medium
    issue: 'Puntuación y construcción poco natural en ''de delante de ustedes: a los dos reyes de los amorreos'''
    rationale: El hebreo apposicional se refleja mejor con raya o comas. El uso de dos puntos seguido de punto y coma entorpece la lectura.
  - severity: low
    issue: '''expulsó de delante de ustedes'' es comprensible pero algo pesado'
    rationale: Puede mantenerse la idea idiomática con 'expulsó de delante de ustedes' o simplificarse levemente sin pérdida. Se recomienda una redacción más fluida manteniendo la correspondencia semántica.
  revised_spanish_text: Y envié delante de ustedes[a] al avispón, y expulsó de delante de ustedes a los dos reyes de los amorreos, no con tu espada ni con tu arco.
