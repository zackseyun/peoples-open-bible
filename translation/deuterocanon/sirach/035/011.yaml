translation:
  text: Have mercy on the city of your sanctuary[a], Jerusalem[b], the place established for your dwelling.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''the city of your holiness.'' This may also be understood as ''your holy city'' or, more interpretively, ''the city of your sanctuary.'''
    reason: lexical_alternative
  - marker: b
    text: The supplied Greek parallel differs substantially here, reading instead along the lines of an exhortation to rise promptly and go home without delay. Because Hebrew survives for this verse, the Hebrew is followed in the main text and the Greek is treated as a textual variant.
    reason: textual_variant
lexical_decisions:
- source_word: רחם
  chosen: Have mercy
  alternatives:
  - Show compassion
  - Be merciful to
  lexicon: HALOT
  rationale: Imperative from רחם, a plea for compassionate mercy. 'Have mercy' is idiomatic, direct, and preserves the prayerful tone better than a more abstract rendering.
- source_word: קרית
  chosen: city
  alternatives:
  - town
  lexicon: HALOT
  rationale: קריה/קרית denotes a city. 'City' is the natural English equivalent and fits Jerusalem in elevated poetic diction.
- source_word: קדשך
  chosen: your holiness
  alternatives:
  - your holy place
  - your sanctuary
  - your holy city
  lexicon: HALOT
  rationale: Literally 'your holiness' or 'your holy [thing/place].' In construct with 'city,' the Hebrew most naturally yields 'the city of your holiness,' an elevated genitival expression. This avoids importing 'sanctuary' into the text while preserving the sacred association.
- source_word: ירושלים
  chosen: Jerusalem
  rationale: Standard transliteration of the place name.
- source_word: מכון
  chosen: established place
  alternatives:
  - foundation
  - fixed place
  - dwelling place
  lexicon: HALOT
  rationale: מכון can denote a fixed or established place, often of dwelling. Because the following word already supplies 'dwelling,' rendering it as 'established place' preserves both elements instead of collapsing them into one.
- source_word: שבתך
  lemma: שבת
  chosen: your dwelling
  alternatives:
  - your resting place
  - your habitation
  lexicon: HALOT
  rationale: From ישב/שבת in the sense of dwelling or abiding. 'Your dwelling' is clear modern English and suits the parallel with Jerusalem as God's chosen abode.
