translation:
  language: es
  text: ¿Quién podrá mantenerse en pie delante de su indignación[a]? ¿Y quién podrá levantarse en el ardor de su ira? Su furor se derrama como fuego, y las rocas[b] son despedazadas por él[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «¿Quién podrá soportar delante de su indignación? ¿Y quién podrá mantenerse en pie en el ardor de su ira?»'
    reason: lexical_alternative
  - marker: b
    text: 'O: «los peñascos» o «los riscos».'
    reason: lexical_alternative
  - marker: c
    text: 'O: «de él». El hebreo puede expresar agencia o fuente.'
    reason: lexical_alternative
lexical_decisions:
- source_word: לִפְנֵי
  english_pob_choice: before
  chosen_spanish: delante de
  alternatives_spanish:
  - ante
  - en la presencia de
  lexicon: HALOT
  rationale: La preposición espacial/relacional se expresa de manera natural en español con «delante de»; conserva la idea de estar frente a la presencia o el juicio de Yahvé sin sonar forzado.
- source_word: זַעְמוֹ
  english_pob_choice: his indignation
  chosen_spanish: su indignación
  alternatives_spanish:
  - su ira
  - su furor
  lexicon: HALOT
  rationale: «Indignación» preserva el matiz moral y judicial que la POB inglesa quiso destacar, y evita reducir el término a mera emoción.
- source_word: יַעֲמוֹד
  english_pob_choice: can stand
  chosen_spanish: podrá sostenerse
  alternatives_spanish:
  - podrá estar en pie
  - podrá resistir
  lexicon: HALOT
  rationale: En este contexto retórico, el verbo apunta a resistir o mantenerse firme ante el juicio; «sostenerse» comunica la capacidad de permanecer en pie sin perder la imagen.
- source_word: יָקוּם
  english_pob_choice: can rise up
  chosen_spanish: podrá levantarse
  alternatives_spanish:
  - podrá ponerse en pie
  - podrá alzarse
  lexicon: HALOT
  rationale: «Levantarse» mantiene el paralelismo con «sostenerse» y conserva la idea de emerger o presentarse frente al furor divino.
- source_word: בַּחֲרוֹן אַפּוֹ
  english_pob_choice: in the heat of his anger
  chosen_spanish: en el ardor de su ira
  alternatives_spanish:
  - en el calor de su ira
  - en su ira ardiente
  lexicon: HALOT
  rationale: La imagen literal de «ardor/calor» se conserva con un español natural y solemne; «ira» traduce el campo semántico de אַף en esta construcción.
- source_word: חֲמָתוֹ
  english_pob_choice: his wrath
  chosen_spanish: su furor
  alternatives_spanish:
  - su ira
  - su enojo
  lexicon: HALOT
  rationale: La POB distingue aquí otro término de ira; «furor» ayuda a preservar la intensidad y la variedad poética sin repetir exactamente el término anterior.
- source_word: נִתְּכָה
  english_pob_choice: is poured out
  chosen_spanish: se derrama
  alternatives_spanish:
  - es derramado
  - se vierte
  lexicon: HALOT
  rationale: El verbo en contexto de juicio divino se expresa naturalmente como líquido desbordado. «Se derrama» conserva la metáfora y la pasividad del hebreo.
- source_word: כָאֵשׁ
  english_pob_choice: like fire
  chosen_spanish: como fuego
  alternatives_spanish:
  - como una llama
  - como incendio
  lexicon: HALOT
  rationale: La comparación es directa y breve; «como fuego» reproduce el paralelismo poético con mínima mediación.
- source_word: הַצֻּרִים
  english_pob_choice: the rocks
  chosen_spanish: las rocas
  alternatives_spanish:
  - los peñascos
  - los riscos
  lexicon: HALOT
  rationale: «Rocas» es la equivalencia más amplia y natural en español, fiel a la imagen de solidez extrema que el verso pone bajo juicio.
- source_word: נִתְּצוּ
  english_pob_choice: are shattered
  chosen_spanish: son despedazadas
  alternatives_spanish:
  - son quebradas
  - son derribadas
  lexicon: HALOT
  rationale: El verbo expresa ruptura violenta; «despedazadas» comunica mejor la fuerza del juicio que una simple «quebradura».
- source_word: מִמֶּנּוּ
  english_pob_choice: by him
  chosen_spanish: por él
  alternatives_spanish:
  - de parte de él
  - a causa de él
  lexicon: HALOT
  rationale: La POB revisó el final hacia una lectura más directa de agencia; en español, «por él» preserva esa fuerza instrumental/agencial sin sobrecargar la frase.
theological_decisions:
- issue: Variedad de términos para la ira divina
  english_pob_reading: Indignation, anger, wrath are kept distinct to preserve Hebrew poetic texture.
  chosen_spanish_reading: indignación, ira y furor se distinguen para conservar la intensidad y el relieve poético del hebreo.
  alternative_spanish_readings:
  - usar un solo término, como «ira», en toda la línea
  - usar términos más fuertes uniformemente, como «furor» o «rabia»
  rationale: El verso acumula vocabulario de juicio; mantener diferencias léxicas en español evita aplanar la poesía y respeta la tensión semántica documentada por la POB.
  doctrine_reference: Nahum 1:6; POB translation philosophy on lexical variety
- issue: Fuerza de las preguntas retóricas
  english_pob_reading: Who can stand... And who can rise up...?
  chosen_spanish_reading: ¿Quién podrá sostenerse...? ¿Y quién podrá levantarse...?
  alternative_spanish_readings:
  - ¿Quién se sostiene...? ¿Y quién se levanta...?
  - ¿Quién podrá resistir...? ¿Y quién podrá alzarse...?
  rationale: La construcción con «podrá» deja explícita la incapacidad humana ante el juicio sin convertir la frase en paráfrasis doctrinal. Mantiene el valor retórico de desafío imposible.
  doctrine_reference: Nahum 1:6; POB translation philosophy on rhetorical force
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión inglesa más reciente, que prefirió «by him» sobre «because of him» para el cierre de la cláusula. Por eso el español adopta una agencia directa («por él») en lugar de una causalidad más interpretativa.
  spanish_consistency_notes:
  - Se usó «Yahvé» implícitamente en la referencia teológica del contexto, pero el versículo mismo conserva el pronombre de tercera persona como en la fuente.
  - 'Se mantuvo la distinción entre los términos de ira: «indignación», «ira» y «furor».'
  - La imagen final conserva la agencia divina sin suavizar el golpe poético del hebreo.
