translation:
  language: es
  text: Entonces me llevó a la entrada del atrio[b], y miré[a], y he aquí, había un agujero en la pared.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «vi»; el verbo hebreo puede expresar tanto el acto de mirar como el resultado de ver. Aquí se ha conservado el matiz de atención visual.
    reason: lexical_alternative
  - marker: b
    text: O «patio»; el hebreo חָצֵר puede referirse a un patio o atrio. En este contexto del templo, «atrio» comunica mejor el recinto sagrado.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּבֵא
  english_pob_choice: Then he brought
  chosen_spanish: Entonces me llevó
  alternatives_spanish:
  - Y me llevó
  - Luego me llevó
  lexicon: HALOT
  rationale: 'El Hiphil de בוא tiene valor causativo: ''hacer venir'' / ''llevar''. En español, ''me llevó'' expresa naturalmente ese movimiento causativo; ''entonces'' conserva la progresión narrativa del waw consecutivo sin forzar una traducción mecánica.'
- source_word: אֹתִי
  english_pob_choice: me
  chosen_spanish: me
  alternatives_spanish:
  - a mí
  lexicon: Pronombre objeto directo
  rationale: El pronombre de objeto directo es requerido y natural en español. No hace falta enfatizar 'a mí' porque no hay contraste especial en el hebreo.
- source_word: אֶל
  english_pob_choice: to
  chosen_spanish: a
  alternatives_spanish:
  - hacia
  lexicon: HALOT
  rationale: La preposición direccional se rinde mejor con 'a' en español cuando se habla de llegada a un punto específico. 'Hacia' sería más débil y 'en' sugeriría ubicación, no movimiento.
- source_word: פֶּתַח
  english_pob_choice: the entrance
  chosen_spanish: la entrada
  alternatives_spanish:
  - la abertura
  - el umbral
  lexicon: HALOT
  rationale: פֶּתַח suele designar una entrada o abertura. 'La entrada' es claro, idiomático y conserva la idea de punto de acceso al atrio.
- source_word: הֶחָצֵר
  english_pob_choice: the court
  chosen_spanish: del atrio
  alternatives_spanish:
  - del patio
  - de la corte
  lexicon: HALOT
  rationale: En contexto del templo, חָצֵר se refiere al atrio o patio sagrado. 'Atrio' comunica mejor el entorno cultual y evita la ambigüedad de 'patio'; 'corte' sonaría impropio en español bíblico.
- source_word: וָאֶרְאֶה
  english_pob_choice: and I looked
  chosen_spanish: y miré
  alternatives_spanish:
  - y vi
  lexicon: HALOT
  rationale: La forma puede expresar el acto de mirar o el resultado de ver. Siguiendo la decisión inglesa de resaltar el acto de dirigir la vista, 'miré' preserva esa tensión sin cerrarla a 'vi'.
- source_word: וְהִנֵּה
  english_pob_choice: and behold
  chosen_spanish: y he aquí
  alternatives_spanish:
  - y mira
  - y he aquí que
  lexicon: HALOT
  rationale: '''He aquí'' conserva el valor deíctico y profético de הִנֵּה, manteniendo el tono solemne de revelación.'
- source_word: חֹר
  english_pob_choice: a hole
  chosen_spanish: un agujero
  alternatives_spanish:
  - un hueco
  - una abertura
  lexicon: HALOT
  rationale: חֹר denota un agujero o abertura perforada. 'Agujero' es la opción más directa y concreta en español; 'abertura' sería más general y menos vívida.
- source_word: אֶחָד
  english_pob_choice: a
  chosen_spanish: un
  alternatives_spanish:
  - uno
  lexicon: HALOT
  rationale: El numeral funciona aquí como indefinido. En español, 'un' reproduce la lectura idiomática mejor que 'uno', que sonaría enfático o numérico.
- source_word: בַּקִּיר
  english_pob_choice: in the wall
  chosen_spanish: en la pared
  alternatives_spanish:
  - en el muro
  lexicon: HALOT
  rationale: קִיר puede significar pared o muro. 'Pared' es la opción más natural en español para un agujero localizado; 'muro' es posible, pero tiende a sugerir una estructura más monumental.
theological_decisions:
- issue: Valor del atrio del templo
  english_pob_reading: the court
  chosen_spanish_reading: el atrio
  alternative_spanish_readings:
  - el patio
  - la corte
  rationale: 'No hay una decisión doctrinal, pero sí una lectura cultual importante: el espacio pertenece al complejo del templo. ''Atrio'' preserva esa referencia sagrada y evita reducirlo a un patio común.'
  doctrine_reference: Contexto del templo en Ezequiel 8
translation_notes:
  revision_awareness: Se siguió el estado final del audit trail en inglés, que quedó sin cambios tras revisión y recibió acuerdo alto. No hubo revisiones aplicadas al versículo; por eso la redacción española mantiene las mismas decisiones léxicas básicas y solo las adapta con naturalidad al español.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma del proyecto cuando el texto lo requiera, aunque este versículo no contiene el nombre divino.
  - Se usa «atrio» en el marco del templo para conservar el matiz cultual de חָצֵר.
  - Se evita la calca de 'he aquí' como simple 'mira' para preservar el tono profético.
  - La puntuación reproduce una cadencia narrativa sobria y publicable en español bíblico moderno.
