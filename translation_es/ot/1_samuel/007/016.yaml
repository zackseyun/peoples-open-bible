  glossary_alignment: No hay términos teológicos sensibles en este versículo que entren en conflicto con el glosario del proyecto. Los topónimos «Betel», «Gilgal» y «Mizpa» son formas españolas aceptables. «Juzgaba» preserva bien el vínculo léxico con שפט.
