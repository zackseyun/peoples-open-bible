    rationale: Aunque intenta reflejar εἰσῆλθον πρὸς αὐτήν, en español moderno esa frase sugiere otra cosa y no comunica limpiamente acceso a su presencia. «Llegaron hasta ella» o «vinieron a ella» preserva mejor el sentido sin artificio.
  - severity: medium
    issue: «el gran honor de nuestro pueblo» se aparta demasiado de καύχημα
    rationale: El griego καύχημα significa ‘boast’, ‘motivo de gloriarse’, ‘causa de orgullo’. «Honor» pertenece a un campo semántico distinto y reduce la conexión con el paralelismo de γαυρίαμα.
