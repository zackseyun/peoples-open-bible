translation:
  language: es
  text: 'Cuando ella se levantó para espigar, Booz mandó a sus jóvenes, diciendo: «Que espigue aun entre[a] las gavillas, y no la humillen[b]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «entre las gavillas». El hebreo usa literalmente «entre»; en inglés se eligió «among» por naturalidad idiomática, pero en español «entre las gavillas» es natural y fiel.
    reason: lexical_alternative
  - marker: b
    text: O «no la avergüencen». El verbo hebreo puede denotar causar vergüenza, deshonra o humillación pública.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַתָּקָם
  english_pob_choice: When she rose
  chosen_spanish: Y cuando ella se levantó
  alternatives_spanish:
  - Y se levantó
  - Entonces se levantó
  lexicon: HALOT
  rationale: El verbo narrativo וַתָּקָם avanza la acción; en español, «cuando ella se levantó» conserva bien la relación temporal sin sonar rígido.
- source_word: לְלַקֵּט
  english_pob_choice: to glean
  chosen_spanish: para espigar
  alternatives_spanish:
  - para recoger espigas
  - para rebuscar
  lexicon: HALOT
  rationale: En el contexto agrícola de Rut, «espigar» es el término natural y preciso en español bíblico para לקט.
- source_word: וַיְצַו ... לֵאמֹר
  english_pob_choice: Boaz commanded ... saying
  chosen_spanish: Booz mandó ... diciendo
  alternatives_spanish:
  - Booz ordenó ... diciendo
  - Booz dio instrucciones ... diciendo
  lexicon: HALOT
  rationale: צוה expresa una orden o mandato; «mandó» mantiene la fuerza directiva del hebreo. Se conserva la fórmula «diciendo» porque refleja el giro hebreo sin necesidad de suavizarlo.
- source_word: נְעָרָיו
  english_pob_choice: his young men
  chosen_spanish: a sus muchachos
  alternatives_spanish:
  - a sus jóvenes
  - a sus servidores
  lexicon: HALOT
  rationale: נְעָרִים designa aquí a los trabajadores varones del campo bajo la autoridad de Booz. «Muchachos» reproduce bien el matiz de hombres jóvenes/ayudantes sin imponer un término eclesiástico.
- source_word: גַּם
  english_pob_choice: even
  chosen_spanish: aun
  alternatives_spanish:
  - incluso
  - también
  lexicon: HALOT
  rationale: '«Aun» comunica el valor intensificador de גַּם: la autorización se extiende más allá de lo ordinario.'
- source_word: בֵּין הָעֳמָרִים
  english_pob_choice: among the sheaves
  chosen_spanish: entre las gavillas
  alternatives_spanish:
  - entre las espigas atadas
  - en medio de las gavillas
  lexicon: HALOT
  rationale: בֵּין es literalmente «entre» y עֳמָרִים son gavillas; esta traducción mantiene la estructura y el objeto agrícola del hebreo, permitiendo que el lector perciba la imagen original.
- source_word: תְּלַקֵּט
  english_pob_choice: Let her glean
  chosen_spanish: Que espigue
  alternatives_spanish:
  - Permitan que espigue
  - Déjenla espigar
  lexicon: HALOT
  rationale: El imperfecto funciona como jussivo dentro del discurso citado. En español, «Que espigue» expresa permiso/instrucción de forma natural y fiel.
- source_word: וְלֹא תַכְלִימֽוּהָ
  english_pob_choice: and do not humiliate her
  chosen_spanish: y no la avergüencen
  alternatives_spanish:
  - y no la humillen
  - y no la hagan pasar vergüenza
  - y no la deshonren
  lexicon: HALOT
  rationale: El Hifil de כלם abarca avergonzar, humillar o deshonrar. «Avergüencen» conserva el efecto social del verbo y suena más natural en español, sin borrar la dureza de la prohibición.
translation_notes:
  revision_awareness: 'El texto español sigue de cerca el hebreo y el trazado auditado en inglés: conserva la progresión narrativa, la fórmula de mandato y la imagen agrícola. Se prefirió «gavillas» para reflejar con mayor literalidad עֳמָרִים, mientras que «aun» reproduce la fuerza de גַּם. No se detectaron cambios textuales posteriores en el pasaje de control revisado.'
  spanish_consistency_notes:
  - Se mantiene «Booz» como forma española estándar del nombre propio.
  - Se usa «espigar» como término agrícola bíblico consistente con Rut.
  - Se conserva la distinción entre «entre» y la posible lectura idiomática más libre, indicada en nota.
  - «Avergüencen» conserva la dimensión de vergüenza/humillación del hebreo sin volverla mera incomodidad social.
