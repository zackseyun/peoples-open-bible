review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien el sentido del griego: ἀπεκρίθη = «respondió», δοξάσω/δόξα = «glorifico/gloria», οὐδέν ἐστιν = «no es nada», y la estructura principal «Es mi Padre quien me glorifica» representa adecuadamente ἔστιν ὁ πατήρ μου ὁ δοξάζων με. También preserva correctamente la lectura base «nuestro Dios» con nota textual para la variante. Sin embargo, la nota dice «su Dios», que no corresponde a la variante inglesa documentada ni al griego ὑμῶν; debe ser «vuestro Dios» o, por español neutral moderno con ustedes, mejor «el Dios de ustedes».'
  spanish_quality_summary: El español es claro, natural y digno. La sintaxis general funciona bien. La única reparación necesaria es la nota textual, porque «su Dios» introduce ambigüedad en español y no representa con precisión la variante de segunda persona plural. El texto principal puede mantenerse.
  glossary_alignment: 'La terminología clave concuerda con las pautas del proyecto: «Jesús», «Dios», «glorifica/gloria». No hay conflicto con Yahvé/Mesías/etc. La elección «nuestro Dios» sigue correctamente SBLGNT. La excepción a corregir es solo la formulación de la variante textual, que debe conservar explícitamente la segunda persona plural.'
  issues:
  - severity: medium
    issue: La nota textual usa «su Dios» para la variante.
    rationale: El aparato y la auditoría inglesa indican «your God», es decir, segunda persona plural. «Su Dios» en español es ambiguo (puede ser de él/ella/ellos o de ustedes) y no preserva con precisión el contraste polémico del pasaje. Debe decir «vuestro Dios» o «el Dios de ustedes».
  revised_spanish_text: 'Jesús respondió[a]: «Si me glorifico a mí mismo, mi gloria no es nada. Es mi Padre quien me glorifica, de quien ustedes dicen: “Él es nuestro Dios”».'
  revised_footnotes:
  - marker: a
    text: Algunos manuscritos leen «el Dios de ustedes» en vez de «nuestro Dios».
    reason: textual_variant
  revision_rationale: Se conserva el texto principal porque es fiel al griego y natural en español. Se corrige únicamente la nota textual para representar sin ambigüedad la variante ὑμῶν («de ustedes / vuestro») documentada por la auditoría inglesa.
  requires_gpt54_adjudication: false
