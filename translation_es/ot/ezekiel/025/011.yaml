review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la sintaxis y el sentido del hebreo: וּ/בְ/מוֹאָב = «Y en Moab», אֶעֱשֶׂה שְׁפָטִים = acción judicial divina en plural, וְיָדְעוּ כִּי = resultado cognitivo, y אֲנִי יְהוָה = fórmula de reconocimiento con el nombre divino preservado como «Yahvé». Sin embargo, la nota al pie no preserva la alternativa significativa documentada en el rastro inglés y además resulta redundante, porque ofrece como alternativa el mismo término ya usado en el texto.'
  spanish_quality_summary: El español es claro y natural. «Y en Moab haré juicios» es comprensible, pero suena algo menos idiomático y menos judicialmente preciso que «ejecutaré juicios» o «haré juicios contra/en Moab». Dado que el proyecto prioriza evitar calcos innecesarios, el texto actual puede mantenerse con una reparación mínima en notas; no obstante, «haré juicios» sigue siendo algo rígido.
  glossary_alignment: 'Alineado con la terminología del proyecto en el punto principal: יְהוָה se traduce correctamente como «Yahvé», no «SEÑOR». No hay conflicto con otros términos doctrinales clave. La principal desalineación está en la gestión de la nota: el inglés conserva una alternativa sobre el nombre divino, y el español debería reflejar esa nota, no una pseudoalternativa léxica sobre «juicios».'
  issues:
  - severity: medium
    issue: La nota al pie [a] es defectuosa y no corresponde al rastro auditado.
    rationale: El texto español ya usa «juicios», pero la nota dice «O “juicios”», lo cual no aporta una alternativa real. Además, el inglés documenta una nota sobre el nombre divino YHWH, y esa información significativa no se preservó en español.
  - severity: low
    issue: «Haré juicios» suena algo poco idiomático en español bíblico actual.
    rationale: Aunque es defendible por cercanía léxica a עשה + שפטים, en español natural suele oírse mejor «ejecutaré juicios» o «haré actos de juicio». Aun así, no es un error grave de fidelidad.
  revised_spanish_text: Y en Moab haré juicios, y sabrán que yo soy Yahvé[a].
  revised_footnotes:
  - marker: a
    text: 'Hebreo: YHWH, el nombre divino.'
    reason: alternative_reading
  revision_rationale: Se corrige la nota al pie para preservar la información significativa del rastro inglés y de la política del proyecto respecto del Tetragrama. No es necesario cambiar el cuerpo del versículo para mantener fidelidad básica al hebreo, pero sí eliminar la nota redundante sobre «juicios» y reemplazarla por una nota útil y alineada con el proyecto.
