revisions:
- from: En el momento en que oigan el sonido del cuerno[a], la flauta, el arpa, el trígono, el salterio, la bagpipe[b], y toda clase de música, se postrarán y rendirán homenaje a la imagen de oro que el rey Nabucodonosor ha levantado.
  to: En el momento en que oigan el sonido del cuerno, la flauta de caña, la lira, el trígono, el salterio, la gaita[a], y toda clase de música, se postrarán y rendirán homenaje[b] a la imagen de oro que el rey Nabucodonosor ha levantado.
  rationale: 'Se repara el anclaje erróneo de la nota teológica, se reemplaza el anglicismo impropio ''bagpipe'' por ''gaita'' con nota de incertidumbre, y se alinean mejor dos instrumentos con el audit trail: קיתרוס como ''lira'' y מַשְׁרוֹקִיתָא con una solución menos sobreprecisa (''flauta de caña''). El resto del versículo se conserva porque transmite bien el mandato real y el sentido de la escena.'
  reviewer_model: gpt-5.4
