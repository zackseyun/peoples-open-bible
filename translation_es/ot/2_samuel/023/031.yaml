lexical_decisions:
- source_word: אֲבִי עַלְבוֹן
  english_pob_choice: Abi-albon
  chosen_spanish: Abi-Albón
  alternatives_spanish:
  - Abialbón
  - Abi Albón
  lexicon: Transliteración del nombre propio compuesto; el guion inglés del POB refleja una unidad de nombre, y en español se conserva con acentuación prosódica natural.
  rationale: El hebreo maqqefado une las dos partes como un solo nombre propio. En español conviene mantener la unión visible con guion para reflejar la forma compuesta, y adaptar la acentuación a la lectura natural del nombre transliterado.
- source_word: הָעַרְבָתִי
  english_pob_choice: the Arbathite
  chosen_spanish: el arbateo
  alternatives_spanish:
  - el arabahita
  - el arbateño
  lexicon: Gentilicio derivado de un topónimo; se preserva el valor de procedencia sin traducirlo a un término interpretativo amplio.
  rationale: El POB inglés conserva un gentilicio transliterado para no decidir en exceso entre Arbath/Arabah. En español, 'arbateo' mantiene esa misma contención y suena como designación étnica/toponímica; 'arabahita' sería más explicativo, pero introduce una conexión más directa con la Arabá que el texto auditado no exige.
- source_word: עַזְמָוֶת
  english_pob_choice: Azmaveth
  chosen_spanish: Azmávet
  alternatives_spanish:
  - Azmavet
  lexicon: Transliteración de nombre propio conforme a la práctica bíblica en español; se evita la castellanización excesiva.
  rationale: El nombre propio se translitera, y en español la secuencia final se adapta a la fonética común conservando la base consonántica del hebreo. La acentuación ayuda a la lectura pública sin alterar el nombre.
- source_word: הַבַּרְחֻמִי
  english_pob_choice: the Barhumite
  chosen_spanish: el barhumita
  alternatives_spanish:
  - el baharumita
  - el hombre barhumita
  lexicon: Gentilicio transliterado directamente desde el texto masorético; se conserva la incertidumbre toponímica sin resolverla en el cuerpo del texto.
  rationale: El POB inglés prefiere la forma que sigue de cerca el texto masorético y reserva la conexión con Bahurim para nota. En español, 'barhumita' reproduce esa misma decisión y evita forzar una etimología o un lugar alternativo no asegurado por el texto.
theological_decisions:
- issue: Tratamiento de nombres propios y gentilicios en una lista de guerreros sin contenido doctrinal explícito
  english_pob_reading: The verse is a roster entry with transliterated names and gentilics; no doctrinal interpretation is required.
  chosen_spanish_reading: Se mantiene una trasliteración sobria de los nombres y gentilicios, sin añadir equivalencias interpretativas ni normalizarlos a formas tradicionales no atestiguadas por el audit trail.
  alternative_spanish_readings:
  - usar equivalentes geográficos más explicativos como 'arabahita'
  - reemplazar los gentilicios por perífrasis descriptivas
  rationale: 'El principio doctrinal aquí es de transparencia textual: no introducir una identificación geográfica o histórica más fuerte que la que el texto y el POB documentan. La lista funciona como identificación de personas, no como afirmación teológica.'
  doctrine_reference: Transparencia textual y cautela hermenéutica; no aplica una doctrina específica del contenido sino un principio de fidelidad al dato
- issue: Relación entre la puntuación final hebrea y la segmentación española
  english_pob_reading: The source is a list-like clause ending with a disjunctive marker; English ends with a semicolon.
  chosen_spanish_reading: Se conserva la sensación de lista cerrada con punto y coma final, adecuada al carácter enumerativo del versículo.
  alternative_spanish_readings:
  - punto final
  - dos puntos
  rationale: La puntuación reproduce la estructura de inventario del hebreo y del POB inglés. El punto y coma comunica que el versículo forma parte de una serie de nombres sin cerrar discursivamente más de lo que el texto exige.
  doctrine_reference: No aplica; decisión estilística de segmentación fiel
translation_notes:
  revision_awareness: Se siguió el estado de alta concordancia del auditable inglés POB y no se aplicaron revisiones sustantivas; la traducción española refleja de forma directa la misma solución onomástica y la misma cautela frente a la lectura alternativa de 'Bahurim'.
  spanish_consistency_notes:
  - Se mantuvo un estilo de transliteración uniforme para nombres propios y gentilicios.
  - Se evitó traducir los nombres como topónimos interpretativos más allá de lo respaldado por el POB inglés.
  - La puntuación final con punto y coma conserva el carácter de lista nominal del versículo.
