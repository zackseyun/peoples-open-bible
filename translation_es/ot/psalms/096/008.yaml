translation:
  language: es
  text: Atribuyan a Yahvé la gloria de su nombre; traigan una ofrenda[a] y vengan a sus atrios.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «tributo» o «presente». El término hebreo puede denotar un regalo, tributo u ofrenda según el contexto.
    reason: lexical_alternative
lexical_decisions:
- source_word: הָבוּ
  english_pob_choice: Ascribe
  chosen_spanish: Atribuyan
  alternatives_spanish:
  - Den
  - Rindan
  - Ascriban
  lexicon: HALOT
  rationale: En este imperativo cultual, el verbo no implica entregar algo material a Dios, sino reconocerle o atribuirle el honor debido. «Atribuyan» conserva ese valor idiomático en español con fuerza exhortativa.
- source_word: לַיהוָה
  english_pob_choice: to Yahweh
  chosen_spanish: a Yahvé
  alternatives_spanish:
  - al SEÑOR
  - a Yahveh
  lexicon: HALOT
  rationale: 'Se sigue el criterio del proyecto para יהוה: usar «Yahvé» en el texto principal, manteniendo el nombre divino del hebreo en vez de una sustitución reverencial.'
- source_word: כְּבוֹד
  english_pob_choice: the glory
  chosen_spanish: la gloria
  alternatives_spanish:
  - el honor
  - la honra
  lexicon: HALOT
  rationale: כבוד aquí expresa la gloria/honor debido a Dios. «La gloria» preserva mejor el peso teológico y la fórmula poética del versículo.
- source_word: שְׁמוֹ
  english_pob_choice: his name
  chosen_spanish: de su nombre
  alternatives_spanish:
  - de su nombre
  - de su fama
  - de su reputación
  lexicon: HALOT
  rationale: «Nombre» se entiende de manera literal, pero con su valor semítico de identidad, carácter y reputación revelada. «De su nombre» reproduce bien la construcción hebrea.
- source_word: שְׂאוּ מִנְחָה
  english_pob_choice: bring an offering
  chosen_spanish: traigan una ofrenda
  alternatives_spanish:
  - traigan tributo
  - traigan un regalo de ofrenda
  - lleven una ofrenda
  lexicon: HALOT
  rationale: La combinación admite «ofrenda», «tributo» o «regalo/ofrenda» según contexto. En este marco de adoración, «ofrenda» es lo suficientemente amplio y natural; el pie de página conserva la alternativa semántica de tributo/gift offering.
- source_word: וּבֹאוּ
  english_pob_choice: and come
  chosen_spanish: y entren
  alternatives_spanish:
  - y vengan
  - y acudan
  lexicon: HALOT
  rationale: Aunque el hebreo dice literalmente «vengan», el complemento siguiente («a sus atrios») hace explícita la entrada. «Entren» es idiomático en español y mantiene el movimiento hacia el recinto sagrado.
- source_word: לְחַצְרוֹתָיו
  english_pob_choice: into his courts
  chosen_spanish: en sus atrios
  alternatives_spanish:
  - a sus atrios
  - en sus patios
  - en sus patios interiores
  lexicon: HALOT
  rationale: «Atrios» es el término tradicional y comprensible para los espacios del templo. Aquí se prefiere «en» para la naturalidad del español, sin perder la referencia al recinto sagrado.
theological_decisions:
- issue: Tratamiento del nombre divino יהוה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - el SEÑOR
  rationale: Se conserva el nombre propio divino en el texto principal, siguiendo la política del proyecto y la evidencia hebrea directa del Tetragrama. Esto evita ocultar el nombre por una convención litúrgica de sustitución.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יהוה / YHWH → Yahvé'
translation_notes:
  revision_awareness: La revisión inglesa reciente ajustó «the glory due his name» a «the glory of his name» para reflejar con más precisión el hebreo. La versión española mantiene esa cercanía literal con «la gloria de su nombre» sin introducir «debida a», que sería interpretativa.
  spanish_consistency_notes:
  - Se usa «Yahvé» de forma consistente para יהוה, conforme al criterio del proyecto.
  - Se mantiene «ofrenda» como término base, con nota que preserva la amplitud semántica de מִנְחָה.
  - «Atrios» traduce חצרות con un término bíblico comprensible y estable en español.
  - 'Se conserva la estructura imperativa paralela del hebreo: atribuyan / traigan / entren.'
