  text: וְ/אֵ֨ת כָּל מברח/ו בְּ/כָל אֲגַפָּי/ו֙ בַּ/חֶ֣רֶב יִפֹּ֔לוּ וְ/הַ/נִּשְׁאָרִ֖ים לְ/כָל ר֣וּחַ יִפָּרֵ֑שׂוּ וִ/ידַעְתֶּ֕ם כִּ֛י אֲנִ֥י יְהוָ֖ה דִּבַּֽרְתִּי־־־׃ס
base_translation:
  language: en
  yaml_path: translation/ot/ezekiel/017/021.yaml
  text: And all his fugitives among all his troops will fall by the sword[a], and those who remain will be scattered to every wind. Then you will know that I, Yahweh[b], have spoken.
  footnotes:
