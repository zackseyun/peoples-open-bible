base_translation:
  language: en
  yaml_path: translation/ot/2_chronicles/029/007.yaml
  text: They also shut the doors of the vestibule[a], put out the lamps, did not burn incense[b], and did not offer up burnt offerings in the sanctuary to the God of Israel.
  footnotes:
