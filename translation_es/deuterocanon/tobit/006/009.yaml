translation:
  language: es
  text: Y úntale la hiel[a] a un hombre que tiene opacidades blanquecinas[b] en los ojos, y será sanado.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: ‘Hiel’ traduce aquí χολή; también podría decirse ‘bilis’.
    reason: lexical_alternative
  - marker: b
    text: λευκώματα se refiere a opacidades blanquecinas en los ojos; el texto no obliga a precisar un diagnóstico moderno exacto.
    reason: cultural_note
lexical_decisions:
- source_word: χολή
  english_pob_choice: gall
  chosen_spanish: hiel
  alternatives_spanish:
  - bilis
  lexicon: LSJ
  rationale: χολή puede referirse a la bilis/hiel. 'Hiel' mantiene la equivalencia breve y tradicional en español sin exigir una precisión médica excesiva; 'bilis' también es posible, pero suena más técnica.
- source_word: ἐγχρῖσαι
  english_pob_choice: smear
  chosen_spanish: untar
  alternatives_spanish:
  - frotar
  - aplicar
  - ungir
  lexicon: LSJ
  rationale: ἐγχρῖσαι expresa la acción de poner o frotar una sustancia sobre algo. 'Untar' reproduce bien la idea material y evita la connotación ritual de 'ungir'.
- source_word: ἄνθρωπον
  english_pob_choice: a man
  chosen_spanish: a un hombre
  alternatives_spanish:
  - a una persona
  - a alguien
  lexicon: LSJ
  rationale: El griego usa la forma masculina singular. En español, 'a un hombre' conserva esa concreción sin añadir una generalización que el texto no exige.
- source_word: λευκώματα
  english_pob_choice: white films
  chosen_spanish: opacidades blancas
  alternatives_spanish:
  - manchas blancas
  - velos blancos
  - leucomas
  lexicon: LSJ
  rationale: λευκώματα designa opacidades blanquecinas en los ojos. 'Opacidades blancas' comunica el rasgo visible sin imponer un diagnóstico moderno específico como 'cataratas'.
- source_word: ἰαθήσεται
  english_pob_choice: he will be healed
  chosen_spanish: será sanado
  alternatives_spanish:
  - será curado
  - quedará sano
  lexicon: LSJ
  rationale: El futuro pasivo de ἰάομαι se conserva mejor con 'será sanado'. 'Sanado' mantiene el registro bíblico y la pasiva, sin perder naturalidad en español.
translation_notes:
  revision_awareness: Se siguió el pasaje griego de Tobit 6:9 y el audit trail inglés, incluyendo la revisión que prefirió una acción material más directa para ἐγχρῖσαι y mantuvo 'white films' para λευκώματα. En español se conservó esa concreción con 'untar' y 'opacidades blancas'.
  spanish_consistency_notes:
  - Se evitó 'SEÑOR' y otras fórmulas no pertinentes al verso.
  - Se mantuvo un registro sobrio y comprensible para lectura eclesial.
  - Las notas a pie incluyen solo alternativas ancladas en el texto y con marcadores presentes en la traducción.
