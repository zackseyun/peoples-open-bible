lexical_decisions:
- source_word: לְ/בִנְיָמִן
  english_pob_choice: For Benjamin
  chosen_spanish: Para Benjamín
  alternatives_spanish:
  - De Benjamín
  - Para la tribu de Benjamín
  lexicon: HALOT
  rationale: El לְ introductorio en esta lista señala al representante tribal; en español, «Para Benjamín» conserva la función distributiva/listal sin añadir «tribu» que el hebreo no explicita.
- source_word: אֲבִידָן
  english_pob_choice: Abidan
  chosen_spanish: Abidán
  alternatives_spanish:
  - Abidán
  lexicon: Nombre propio transliterado convencionalmente
  rationale: Se conserva el nombre propio con transliteración al español y acento gráfico para lectura natural en español, sin alterar la forma del nombre.
- source_word: בֶּן
  english_pob_choice: son of
  chosen_spanish: hijo de
  alternatives_spanish:
  - el hijo de
  lexicon: HALOT
  rationale: En fórmulas genealógicas, «hijo de» es la equivalencia española natural y fiel para בֶּן; el artículo definido no es necesario.
- source_word: גִּדְעֹנִי
  english_pob_choice: Gideoni
  chosen_spanish: Guidoní
  alternatives_spanish:
  - Gideoní
  lexicon: Nombre propio transliterado convencionalmente
  rationale: El nombre se translitera como forma propia española. Se mantiene una vocalización cercana al hebreo sin convertirlo en un nombre tradicional distinto.
translation_notes:
  revision_awareness: La revisión en inglés quedó sin cambios y con alta concordancia; por eso el español sigue de cerca la estructura breve y enumerativa del hebreo, sin expansión interpretativa.
  spanish_consistency_notes:
  - 'Se mantiene el orden listal: destinatario tribal + nombre propio + filiación.'
  - Se usan transliteraciones españolas consistentes para nombres propios.
  - No se añade «tribu» porque el hebreo solo dice לְ/בִנְיָמִן en este contexto listal.
