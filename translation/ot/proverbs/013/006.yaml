theological_decisions:
- issue: Interpretation of חַטָּאת in the second colon
  chosen_reading: 'Rendered as ''sin'' in the main text: ''wickedness overturns sin.'''
  alternative_readings:
  - 'Rendered as ''the sinner'': ''wickedness overthrows the sinner'''
  - Rendered more dynamically as 'wickedness ruins the sinful person'
  rationale: The Hebrew text is terse and somewhat elliptical. A formally closer rendering keeps חַטָּאת as 'sin,' but the proverb's antithetical parallelism may point to a person characterized by sin. To preserve the textual tension rather than fully resolve it, the main text stays close to the Hebrew noun while a footnote records the common interpretive alternative.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
