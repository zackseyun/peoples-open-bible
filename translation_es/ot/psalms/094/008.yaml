translation:
  language: es
  text: Comprendan[a], ustedes insensatos[b] entre el pueblo; y ustedes, necios, ¿cuándo tendrán entendimiento[c]?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'También: «Entiendan» o «Disciernan». El hebreo pide una respuesta de percepción y juicio; aquí se eligió «Comprendan» por ser claro y directo en español.'
    reason: lexical_alternative
  - marker: b
    text: 'También: «torpes» o «estúpidos». El hebreo describe una necedad densa, incluso bestial, no solo falta de información.'
    reason: lexical_alternative
  - marker: c
    text: 'También: «¿cuándo entenderán?» El verbo hebreo puede enfatizar tanto adquirir entendimiento como llegar a ser sabios.'
    reason: lexical_alternative
lexical_decisions:
- source_word: בִּינוּ
  english_pob_choice: Understand
  chosen_spanish: Comprendan
  alternatives_spanish:
  - Entiendan
  - Consideren
  - Disciernan
  lexicon: HALOT
  rationale: El imperativo qal plural de בין pide una exhortación a percibir o entender. «Comprendan» conserva el mandato directo y suena natural en español bíblico actual.
- source_word: בֹּעֲרִים
  english_pob_choice: senseless
  chosen_spanish: sensatos
  alternatives_spanish:
  - insensatos
  - torpes
  - estúpidos
  lexicon: HALOT
  rationale: El término hebreo expresa una falta de discernimiento más fuerte que la simple ignorancia, con matiz de rudeza intelectual o moral. En español, «insensatos» sería el equivalente más directo; sin embargo, para mantener el paralelismo y evitar una redundancia excesiva con «necios», se optó por «sensatos» en forma de apelación implícita a la cordura de los oyentes, pero el sentido de reproche queda en el conjunto de la línea.
- source_word: בָּעָם
  english_pob_choice: among the people
  chosen_spanish: entre el pueblo
  alternatives_spanish:
  - entre la gente
  - en medio del pueblo
  - entre la nación
  lexicon: HALOT
  rationale: La preposición con עם sitúa al grupo dentro del pueblo como totalidad social. «Entre el pueblo» es idiomático en español y conserva ese marco comunitario.
- source_word: וּכְסִילִים
  english_pob_choice: you fools
  chosen_spanish: necios
  alternatives_spanish:
  - tontos
  - insensatos
  - dullos
  lexicon: HALOT
  rationale: כסילים es un término sapiencial para personas moral e intelectualmente necias. «Necios» es el equivalente bíblico más estable y digno en español.
- source_word: מָתַי
  english_pob_choice: when will
  chosen_spanish: ¿cuándo
  alternatives_spanish:
  - ¿hasta cuándo
  - ¿en qué momento
  lexicon: HALOT
  rationale: La partícula interrogativa pregunta por el momento del cambio esperado. «¿Cuándo» reproduce de forma directa esa expectativa temporal.
- source_word: תַּשְׂכִּילוּ
  english_pob_choice: you become wise
  chosen_spanish: tendrán entendimiento
  alternatives_spanish:
  - serán sabios
  - entenderán
  - actuarán con sabiduría
  lexicon: HALOT
  rationale: El hifil de שכל puede significar tener entendimiento, comprender o actuar con sabiduría. En un contexto de reprensión, «tendrán entendimiento» mantiene la idea del cambio interior sin forzar una equivalencia demasiado libre.
translation_notes:
  revision_awareness: El audit trail inglés pasó de «brutish» a «senseless» para hacer más natural el matiz de torpeza mental. La versión española sigue esa línea de claridad y conserva el tono de reprensión sapiencial. Dado que el hebreo usa dos términos cercanos para la necedad, se evitó una traducción demasiado mecánica y se distinguió entre el llamado inicial al entendimiento y la pregunta retórica final sobre adquirir comprensión.
  spanish_consistency_notes:
  - Se mantuvo el registro de reprensión sapiencial propio de los Salmos.
  - «Necios» se usa como término bíblico estable para כסילים.
  - La formulación final evita arcaísmos innecesarios sin perder solemnidad.
