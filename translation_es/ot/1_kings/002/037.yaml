  to: Porque el día en que salgas y cruces el valle[a] de Cedrón, debes saber con certeza que ciertamente morirás; tu sangre estará sobre tu propia cabeza[b].
  rationale: Se conserva la buena base del borrador, pero se corrige la frase final para reflejar mejor el verbo hebreo ('estará' en vez de 'caerá') y se mueve la nota cultural al lugar correcto, donde explica el modismo de responsabilidad personal. Así el texto queda más fiel a la fuente, mejor alineado con el POB inglés y más claro para el lector.
