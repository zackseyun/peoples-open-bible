translation:
  language: es
  text: Así el corazón de Faraón se endureció[a], y no dejó ir a los hijos de Israel[b], tal como Yahvé había hablado por medio de Moisés[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: ‘se puso firme’. El verbo hebreo puede significar ‘hacerse fuerte/firme’; aquí el contexto favorece la idea de endurecimiento obstinado.'
    reason: alternative_reading
  - marker: b
    text: Literalmente, ‘los hijos de Israel’. También puede entenderse como ‘los israelitas’.
    reason: lexical_alternative
  - marker: c
    text: Literalmente, ‘por la mano de Moisés’, un hebraísmo que significa ‘por medio de Moisés’.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֶּחֱזַק
  english_pob_choice: was hardened
  chosen_spanish: se endureció
  alternatives_spanish:
  - se puso firme
  - se hizo fuerte
  - se endureció el corazón
  lexicon: HALOT
  rationale: El verbo חזק puede expresar hacerse fuerte, firme o duro. En este contexto narrativo de resistencia a Yahvé, ‘se endureció’ comunica bien la dureza obstinada sin convertirla en una formulación más interpretativa que el hebreo mismo. Mantiene la tensión narrativa entre firmeza y endurecimiento.
- source_word: לֵב פַּרְעֹה
  english_pob_choice: Pharaoh’s heart
  chosen_spanish: el corazón de Faraón
  alternatives_spanish:
  - el corazón del Faraón
  - el corazón de Faraón
  lexicon: HALOT
  rationale: Se preserva el foco hebreo en el centro interior de voluntad y decisión. ‘El corazón de Faraón’ es transparente y fiel al constructo, sin desplazar el énfasis hacia una paráfrasis psicológica.
- source_word: שִׁלַּח
  english_pob_choice: let ... go
  chosen_spanish: dejó ir
  alternatives_spanish:
  - despidió
  - soltó
  - dejó salir
  lexicon: HALOT
  rationale: En Éxodo este verbo describe permitir la partida de Israel. ‘Dejó ir’ es natural en español y conserva la relación narrativa establecida en la serie de plagas, evitando una traducción demasiado técnica o una paráfrasis excesiva.
- source_word: בְּנֵי יִשְׂרָאֵל
  english_pob_choice: the sons of Israel
  chosen_spanish: los hijos de Israel
  alternatives_spanish:
  - los hijos varones de Israel
  - los israelitas
  - los hijos de Jacob
  lexicon: HALOT
  rationale: Se mantiene la expresión literal y transparente del hebreo. ‘Los hijos de Israel’ conserva la forma de parentesco colectiva documentada por la POB inglesa, sin sustituirla por el colectivo interpretativo ‘israelitas’.
- source_word: כַּאֲשֶׁר
  english_pob_choice: just as
  chosen_spanish: tal como
  alternatives_spanish:
  - como
  - según
  lexicon: HALOT
  rationale: La locución introduce cumplimiento y correspondencia entre el hecho y la palabra previa. ‘Tal como’ marca bien la conformidad con lo dicho sin añadir matices no presentes.
- source_word: דִּבֶּר יְהוָה
  english_pob_choice: the LORD had spoken
  chosen_spanish: Yahvé había hablado
  alternatives_spanish:
  - Yahvé habló
  - el SEÑOR había hablado
  - Dios había hablado
  lexicon: HALOT
  rationale: Se traduce el nombre divino por ‘Yahvé’, conforme al criterio del proyecto, en vez de ocultarlo bajo un título. El pluscuamperfecto ‘había hablado’ refleja que la palabra divina precede y enmarca el cumplimiento narrado.
- source_word: בְּיַד מֹשֶׁה
  english_pob_choice: through Moses
  chosen_spanish: por medio de Moisés
  alternatives_spanish:
  - por la mano de Moisés
  - mediante Moisés
  lexicon: HALOT
  rationale: La expresión hebrea es un idiomа de mediación instrumental. ‘Por medio de Moisés’ comunica con claridad la agencia intermediaria sin perder la imagen básica de instrumentación.
theological_decisions:
- issue: Tensión entre dureza del corazón y causalidad divina
  english_pob_reading: So Pharaoh’s heart was hardened
  chosen_spanish_reading: Así el corazón de Faraón se endureció
  alternative_spanish_readings:
  - Así el corazón de Faraón se puso firme
  - Así Faraón endureció su corazón
  rationale: La cláusula hebrea presenta el resultado de la resistencia de Faraón sin explicitar aquí la causalidad divina directa ni atribuir explícitamente la acción al propio Faraón. Se conserva esa ambigüedad teológica del pasaje, evitando resolverla prematuramente.
  doctrine_reference: Preservar la tensión teológica del relato sin sobreinterpretar la forma verbal.
translation_notes:
  revision_awareness: El registro inglés revisado no cambió el sentido base del versículo; se mantuvo la lectura de tensión narrativa en el endurecimiento del corazón y la mediación de Moisés, con alta concordancia de revisión y sin cambios aplicados.
  spanish_consistency_notes:
  - Se usa ‘Yahvé’ para el nombre divino, de acuerdo con la política del proyecto.
  - Se conserva ‘Faraón’ con mayúscula como nombre propio.
  - Se prefiere ‘hijos de Israel’ por transparencia al hebreo y consistencia con la POB inglesa.
  - ‘Por medio de’ se emplea sistemáticamente para el hebraísmo בְּיַד cuando expresa mediación.
