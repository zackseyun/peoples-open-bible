translation:
  language: es
  text: 'Entonces Isaí llamó a Abinadab y lo hizo pasar delante de Samuel. Y dijo[a]: «Yahvé tampoco ha escogido a este»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «también a este»; se expresa idiomáticamente en español como «tampoco ha escogido a este».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּקְרָא
  english_pob_choice: called
  chosen_spanish: llamó
  alternatives_spanish:
  - convocó
  - mandó llamar
  lexicon: HALOT
  rationale: קרא en este contexto narrativo expresa llamar a una persona para que se acerque o comparezca. «Llamó» es natural en español y conserva el movimiento del relato sin añadir solemnidad innecesaria.
- source_word: אֶל אֲבִינָדָב
  english_pob_choice: Abinadab
  chosen_spanish: a Abinadab
  alternatives_spanish:
  - Abinadab
  lexicon: HALOT
  rationale: El nombre propio se translitera de forma estándar; la preposición אֶל se rinde con «a» para conservar el sentido de dirigir el llamado hacia Abinadab.
- source_word: וַיַּעֲבִרֵהוּ לִפְנֵי שְׁמוּאֵל
  english_pob_choice: made him pass before Samuel
  chosen_spanish: lo hizo pasar delante de Samuel
  alternatives_spanish:
  - lo presentó delante de Samuel
  - hizo que pasara delante de Samuel
  lexicon: HALOT
  rationale: 'El hifil de עבר con sufijo objeto expresa causación: Isaí hizo que Abinadab pasara. «Lo hizo pasar delante de Samuel» conserva esa causalidad de manera transparente y sigue el orden narrativo del hebreo.'
- source_word: וַיֹּאמֶר
  english_pob_choice: he said
  chosen_spanish: Y él dijo
  alternatives_spanish:
  - dijo
  lexicon: HALOT
  rationale: El hebreo mantiene un sujeto implícito. En español conviene explicitarlo con «Y él dijo» para sostener la fluidez narrativa y reflejar la conjunción simple del original, tal como el POB inglés cambió «But» por «And» para ajustarse al hebreo.
- source_word: גַּם בָּזֶה
  english_pob_choice: this one either
  chosen_spanish: tampoco a este
  alternatives_spanish:
  - también a este
  - este también
  lexicon: HALOT
  rationale: La combinación de גַּם con negación en este contexto funciona idiomáticamente como «ni tampoco». En español, «tampoco a este» comunica mejor el valor aditivo-negativo que una traducción más literal como «también a este».
- source_word: לֹא בָחַר
  english_pob_choice: has not chosen
  chosen_spanish: no ha escogido
  alternatives_spanish:
  - no eligió
  - no ha elegido
  lexicon: HALOT
  rationale: בָחַר expresa elegir/escoger. «No ha escogido» conserva el resultado vigente de la evaluación divina en la escena, de forma semejante al presente perfecto del inglés POB.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  - el SEÑOR
  lexicon: POB doctrinal default
  rationale: Se mantiene el nombre divino como «Yahvé», siguiendo el criterio doctrinal del proyecto para el Tetragrámaton y evitando la sustitución por un título.
theological_decisions:
- issue: Renderización del Tetragrámaton יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - el SEÑOR
  rationale: El texto hebreo contiene el nombre propio del pacto, no un título genérico. En español se usa «Yahvé» como forma principal del proyecto para preservar ese nombre revelado.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Valor de גַּם בָּזֶה en una frase negativa
  english_pob_reading: this one either
  chosen_spanish_reading: tampoco a este
  alternative_spanish_readings:
  - también a este
  - este también
  rationale: La fuerza semántica es aditiva dentro de una negación; en español, la combinación más idiomática y fiel al sentido es «tampoco a este». Esto evita perder la correlación con el «either» del POB inglés y con el énfasis negativo del hebreo.
  doctrine_reference: Principio de equivalencia óptima para partículas discursivas y negación
translation_notes:
  revision_awareness: La versión inglesa auditada fue revisada de «But he said» a «And he said» para ajustarse mejor a la conjunción hebrea וַיֹּאמֶר. La frase española sigue esa decisión con «Y él dijo», manteniendo el flujo narrativo sin introducir contraste inexistente.
  spanish_consistency_notes:
  - Se usa «Yahvé» de manera consistente para יְהוָה.
  - Se evita «SEÑOR» como sustitución del nombre divino, conforme al criterio del proyecto.
  - «Lo hizo pasar delante de Samuel» preserva el valor causativo del hifil.
  - La partícula negativa aditiva se resolvió con «tampoco» para reflejar גַּם בָּזֶה en contexto negativo.
  - El estilo general es formal y publicable, sin arcaísmos innecesarios.
