base_translation:
  language: en
  yaml_path: translation/ot/hosea/008/013.yaml
  text: As for the sacrifices of my offerings[a], they sacrifice flesh and eat it, but Yahweh does not accept them. Now he will remember their iniquity and punish their sins[c][b]; they will return to Egypt.
  footnotes:
  - marker: a
    text: Hebrew has an unusual expression, literally something like 'the sacrifices of my offerings.' It may also be understood as 'my sacrificial gifts' or, less likely, 'my beloved sacrifices.'
    reason: lexical_alternative
  - marker: b
    text: Or 'takes no pleasure in them' / 'is not pleased with them.'
    reason: lexical_alternative
  - marker: c
    text: '''Return to Egypt'' may refer to an actual return, or more broadly to a return to bondage and exile under the image of Egypt.'
    reason: alternative_reading
