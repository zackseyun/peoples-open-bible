    text: Or 'formed' instead of 'had formed.' The Hebrew verb can be rendered as a simple past; the past perfect reflects the likely prior action in context.
    reason: alternative_reading
  - marker: b
    text: Or 'Adam' for 'the man.' The Hebrew has ha'adam, literally 'the man.'
    reason: alternative_reading
