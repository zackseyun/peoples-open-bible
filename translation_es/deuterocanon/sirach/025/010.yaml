  - severity: medium
    issue: La expresión «al oído de los que oyen» reduce y desplaza la imagen del griego.
    rationale: εἰς ὦτα ἀκουόντων contiene «oídos» en plural y describe hablar dirigido a oyentes; «al oído» en singular puede sugerir hablar en secreto o a una sola persona.
  - severity: low
