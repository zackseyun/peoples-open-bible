translation:
  language: es
  text: 'Entonces las tres compañías tocaron las trompetas y quebraron los cántaros. Sostuvieron las antorchas en sus manos izquierdas y las trompetas en sus manos derechas para hacerlas sonar[a], y gritaron: «¡Espada para Yahvé y para Gedeón!»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «La espada de Yahvé y de Gedeón».'
    reason: alternative_reading
lexical_decisions:
- source_word: שְׁלֹשֶׁת הָרָאשִׁים
  english_pob_choice: the three companies
  chosen_spanish: las tres compañías
  alternatives_spanish:
  - los tres jefes
  - las tres divisiones
  lexicon: HALOT
  rationale: En el contexto militar de Jueces 7, la expresión se refiere a los tres grupos o unidades en que Gedeón organizó a sus hombres. «Compañías» comunica de manera natural esa división militar sin reducir el sentido a «jefes» literales.
- source_word: שׁוֹפָרוֹת
  english_pob_choice: trumpets
  chosen_spanish: las trompetas
  alternatives_spanish:
  - los cuernos de carnero
  - los shofares
  lexicon: HALOT
  rationale: El instrumento funciona aquí como señal de guerra; «trompetas» es la forma más clara y natural en español. «Cuernos de carnero» es más específico, pero menos idiomático en esta escena.
- source_word: הַכַּדִּים
  english_pob_choice: the jars
  chosen_spanish: los cántaros
  alternatives_spanish:
  - las jarras
  - las vasijas de barro
  lexicon: HALOT
  rationale: כַּד designa un recipiente grande para guardar líquido; «cántaros» conserva bien la imagen concreta y es perfectamente inteligible en español bíblico actual.
- source_word: וַיַּחֲזִיקוּ
  english_pob_choice: They held
  chosen_spanish: Sostuvieron
  alternatives_spanish:
  - agarraron
  - tomaron firmemente
  lexicon: HALOT
  rationale: El verbo expresa que llevaron o mantuvieron los objetos en la mano. «Sostuvieron» da un español natural y conserva la acción sin añadir violencia innecesaria.
- source_word: בְיַד שְׂמֹאולָם ... וּבְיַד יְמִינָם
  english_pob_choice: in their left hands ... in their right hands
  chosen_spanish: en su mano izquierda ... en su mano derecha
  alternatives_spanish:
  - en sus manos izquierdas ... en sus manos derechas
  - con la mano izquierda ... con la mano derecha
  lexicon: HALOT
  rationale: 'Aunque el hebreo usa singular distributivo con sufijo plural, en español la forma más clara y fiel es el singular con posesivo colectivo: «su mano izquierda / derecha», entendido para cada uno de ellos.'
- source_word: לַפִּדִים
  english_pob_choice: the torches
  chosen_spanish: las antorchas
  alternatives_spanish:
  - las teas
  - las llamas
  lexicon: HALOT
  rationale: לַפִּיד se refiere a un objeto encendido para portar luz/fuego; «antorchas» comunica mejor la escena nocturna y militar que una traducción más genérica.
- source_word: לִתְקֹעַ
  english_pob_choice: to blow
  chosen_spanish: para tocarlas
  alternatives_spanish:
  - para soplarlas
  - para hacerlas sonar
  lexicon: HALOT
  rationale: En español, con «trompetas» el infinitivo natural es «tocarlas»; el sentido de soplar está implícito en el instrumento. «Para hacerlas sonar» también sería posible, pero «tocarlas» es más directo y fluido.
- source_word: וַיִּקְרְאוּ
  english_pob_choice: they cried out
  chosen_spanish: gritaron
  alternatives_spanish:
  - clamaron
  - proclamaron
  lexicon: HALOT
  rationale: Aquí no se trata de una simple declaración, sino de un grito de guerra. «Gritaron» reproduce bien la fuerza y la urgencia del hebreo.
- source_word: חֶרֶב לַיהוָה וּלְגִדְעוֹן
  english_pob_choice: A sword for Yahweh and for Gideon!
  chosen_spanish: ¡Espada para Yahvé y para Gedeón!
  alternatives_spanish:
  - ¡La espada de Yahvé y de Gedeón!
  - ¡Espada de Yahvé y de Gedeón!
  lexicon: HALOT
  rationale: La frase hebrea es elíptica y de tono bélico. «Para» preserva el valor de לְ y mantiene el carácter de grito. Se evita convertirla en una fórmula posesiva más explicativa que la hebrea.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  - el SEÑOR
  lexicon: HALOT
  rationale: Siguiendo la decisión terminológica del proyecto, el Tetragrámaton se vierte como «Yahvé», que preserva el nombre divino en lugar de sustituirlo por un título.
theological_decisions:
- issue: Cómo reproducir el grito de guerra חֶרֶב לַיהוָה וּלְגִדְעוֹן
  english_pob_reading: A sword for Yahweh and for Gideon!
  chosen_spanish_reading: ¡Espada para Yahvé y para Gedeón!
  alternative_spanish_readings:
  - ¡La espada de Yahvé y de Gedeón!
  - ¡Espada de Yahvé y de Gedeón!
  rationale: La construcción hebrea es breve y puede entenderse de manera posesiva o como aclamación dedicada a Yahvé y a Gedeón. Se conserva la ambigüedad con «para», evitando imponer una expansión interpretativa y manteniendo el ritmo de un grito de batalla.
  doctrine_reference: Principios de traducción 1 y 3; entrada terminológica para יְהוָה / YHWH
- issue: Representación del Nombre divino en el texto
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Jehová
  - el SEÑOR
  rationale: La forma elegida preserva el nombre propio del pacto sin reemplazarlo por un título. Esto sigue la práctica del proyecto y evita borrar una decisión teológica documentada en el texto fuente.
  doctrine_reference: Convención terminológica del proyecto para יהוה / YHWH
translation_notes:
  revision_awareness: El texto inglés de referencia y el examen cruzado final indican alta concordancia y no muestran revisiones sustantivas pendientes; la versión inglesa se mantuvo estable en la última pasada. La traducción española sigue esa lectura sin introducir expansiones nuevas.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» para יהוה, conforme a la terminología del proyecto.
  - Se usa «Gedeón» como forma española estándar del nombre propio.
  - «Compañías» refleja una unidad militar plural y evita una calca literal de «cabezas/jefes» que no encajaría en el contexto.
  - «Trompetas» y «antorchas» son términos naturales en español para los objetos de la escena.
  - La nota al pie preserva la alternativa tradicional sin sustituirla en el texto principal.
