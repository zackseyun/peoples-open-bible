translation:
  language: es
  text: 'Y Moisés dijo al pueblo[a]: «No teman. Manténganse firmes y vean la salvación[b] de Yahvé, que él realizará para ustedes hoy; porque los egipcios que hoy ven, no los volverán a ver».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «la gente» o «el pueblo». El hebreo עָם se refiere aquí a la comunidad de Israel reunida.
    reason: lexical_clarity
  - marker: b
    text: O «liberación de Yahvé». El término hebreo puede denotar salvación, liberación o victoria según el contexto.
    reason: lexical_alternative
lexical_decisions:
- source_word: אַל תִּירָאוּ
  english_pob_choice: Do not fear
  chosen_spanish: No teman
  alternatives_spanish:
  - No tengan miedo
  - No teman ustedes
  lexicon: HALOT
  rationale: La prohibición con ירא se expresa de forma natural y directa en español con una negación imperativa. «No teman» conserva la brevedad y el tono exhortativo del hebreo, y evita añadir matices no presentes en el texto.
- source_word: הִתְיַצְבוּ
  english_pob_choice: Stand firm
  chosen_spanish: Manténganse firmes
  alternatives_spanish:
  - Pónganse de pie
  - Tomen su lugar
  - Permanezcan firmes
  lexicon: HALOT
  rationale: El hitpael imperativo comunica tomar posición y mantenerse estable. «Manténganse firmes» comunica tanto la idea de postura como la de resolución, con buena naturalidad en español.
- source_word: וּרְאוּ
  english_pob_choice: and see
  chosen_spanish: y vean
  alternatives_spanish:
  - y miren
  - y contemplen
  lexicon: HALOT
  rationale: El imperativo simple de ראה se traduce de manera directa con «vean». Mantiene la fuerza inmediata de la instrucción sin introducir una duración o solemnidad ajenas al verbo.
- source_word: יְשׁוּעַת יְהוָה
  english_pob_choice: the salvation of Yahweh
  chosen_spanish: la salvación de Yahvé
  alternatives_spanish:
  - la liberación de Yahvé
  - la victoria de Yahvé
  lexicon: HALOT
  rationale: יְשׁוּעָה puede abarcar salvación, liberación o victoria según el contexto. Aquí el rescate concreto de Israel desde una situación de muerte inminente permite «salvación», que además conserva el alcance teológico más amplio del acto divino.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: 'Se sigue el criterio del proyecto para el nombre divino: usar «Yahvé» y no un sustituto como «SEÑOR». Esto preserva la forma del nombre del pacto tal como aparece en el hebreo.'
- source_word: אֲשֶׁר יַעֲשֶׂה לָכֶם הַיּוֹם
  english_pob_choice: which he will accomplish for you today
  chosen_spanish: que él hará por ustedes hoy
  alternatives_spanish:
  - que él realizará por ustedes hoy
  - que él efectuará para ustedes hoy
  lexicon: HALOT
  rationale: 'עָשָׂה es amplio; en español, «hará» reproduce de forma sobria la acción futura y evita sobreespecificar con «accomplish» o «realizar» algo que el hebreo deja abierto. El sentido lo aclara el objeto previo: la salvación de Yahvé.'
- source_word: מִצְרַיִם
  english_pob_choice: the Egyptians
  chosen_spanish: a los egipcios
  alternatives_spanish:
  - a Egipto
  - a los egipcios que
  lexicon: HALOT
  rationale: Aunque la forma puede referirse al país o al pueblo, el contexto apunta a los perseguidores humanos visibles en escena. Por eso el sentido personal «a los egipcios» es el más fiel.
- source_word: לֹא תֹסִיפוּ לִרְאֹתָם עוֹד
  english_pob_choice: you will never see again
  chosen_spanish: no los volverán a ver nunca más
  alternatives_spanish:
  - no los verán más
  - nunca más los verán
  lexicon: HALOT
  rationale: El hebreo con יסף + infinitivo expresa la cesación definitiva de la acción. «No los volverán a ver nunca más» comunica bien esa fuerza idiomática en español sin depender de un calco.
- source_word: עַד עוֹלָם
  english_pob_choice: forever
  chosen_spanish: nunca más
  alternatives_spanish:
  - para siempre
  - por toda la eternidad
  lexicon: HALOT
  rationale: La revisión inglesa observó que el hebreo ya queda suficientemente expresado con «never again» en inglés natural. En español, añadir «para siempre» resultaría redundante; «nunca más» transmite el mismo énfasis de irreversibilidad.
theological_decisions:
- issue: Renderización del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: La decisión doctrinal del POB es preservar el nombre del pacto y no ocultarlo bajo un título. En español, «Yahvé» mantiene esa transparencia y corresponde al criterio editorial del proyecto.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Sentido de יְשׁוּעָה en este contexto
  english_pob_reading: salvation
  chosen_spanish_reading: salvación
  alternative_spanish_readings:
  - liberación
  - victoria
  rationale: El contexto inmediato es el rescate de Israel de una destrucción inminente, por lo que hay un valor concreto de liberación. Sin embargo, «salvación» preserva mejor el alcance teológico del acto de Dios y refleja la elección auditada del POB en inglés.
  doctrine_reference: DOCTRINE.md Salvación / deliverance terminology
translation_notes:
  revision_awareness: La base inglesa fue revisada para eliminar un «forever» redundante al final, dejando la idea de irrevocabilidad en «never again». La versión española sigue esa revisión y evita añadir un segundo intensificador al final. También conserva la apertura de sentido de יְשׁוּעָה con una nota léxica, en lugar de fijarla de modo estrecho.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como forma estándar para יְהוָה, en coherencia con el proyecto.
  - Se usa «salvación» como término principal y se aclara la alternativa «liberación» en nota.
  - Se conserva el plural reverencial/directo de segunda persona («teman», «manténganse», «vean», «verán») para reflejar el خطاب al pueblo.
  - Se evita «SEÑOR» para no ocultar el nombre divino del hebreo.
  - No se añade un equivalente literal de עַד עוֹלָם aparte de «nunca más», siguiendo la revisión auditada.
