    issue: «sacudido» para אֶמּוֹט resulta poco idiomático en este contexto
    rationale: Aunque semánticamente posible, en español bíblico y general el modismo de estabilidad personal se expresa mejor con «ser conmovido», «ser movido» o «vacilar». «Sacudido» sugiere una acción física más brusca y menos natural en esta fórmula.
  - severity: low
    issue: La nota [b] debe alinearse con la redacción revisada
    rationale: Si se mejora el verbo principal, la nota literal también debe reflejar el verbo elegido para mantener coherencia formal.
