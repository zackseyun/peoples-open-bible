    rationale: En Números 26 מִשְׁפָּחָה designa una subdivisión tribal tipo clan. «Familia» puede sonar demasiado doméstico o moderno y pierde la precisión social/jurídica del censo. La auditoría inglesa eligió explícitamente «clan».
  - severity: low
    issue: Ligera pesadez en «la familia de los hezronitas / hamulitas»
    rationale: La combinación de sustantivo genérico más gentilicio plural resulta más torpe que «el clan de los hezronitas», que comunica la misma relación de forma más idiomática y formal.
  revised_spanish_text: 'Los hijos de Pérez fueron: de Hezrón, el clan de los hezronitas; de Hamul, el clan de los hamulitas.'
