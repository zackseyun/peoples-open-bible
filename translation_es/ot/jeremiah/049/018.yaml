translation:
  language: es
  text: Como cuando Sodoma y Gomorra y sus ciudades vecinas[a] fueron destruidas, dice Yahvé, no habitará allí hombre, ni vivirá en ella como forastero hijo de hombre[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Como la destrucción de Sodoma y Gomorra y de las ciudades alrededor de ellas».'
    reason: lexical_alternative
  - marker: b
    text: «Hijo de hombre» aquí es un hebraísmo que significa un ser humano o mortal, no un título mesiánico.
    reason: lexical_alternative
lexical_decisions:
- source_word: כְּמַהְפֵּכַת
  english_pob_choice: As when ... were overthrown
  chosen_spanish: Como la destrucción de ...
  alternatives_spanish:
  - Como el derribo de ...
  - Como cuando ... fueron destruidas
  lexicon: HALOT
  rationale: El prefijo comparativo כ introduce la comparación, y מַהְפֵּכָה denota una ruina o catástrofe de devastación. "Destrucción" transmite bien el resultado del vuelco catastrófico en un español natural, sin perder la fuerza del símil.
- source_word: סְדֹם וַעֲמֹרָה וּשְׁכֵנֶיהָ
  english_pob_choice: Sodom and Gomorrah and their neighboring towns
  chosen_spanish: Sodoma, Gomorra y sus ciudades vecinas
  alternatives_spanish:
  - Sodoma, Gomorra y sus vecinas
  - Sodoma, Gomorra y las ciudades alrededor de ellas
  lexicon: HALOT
  rationale: La frase nombra Sodoma y Gomorra junto con sus asentamientos circundantes. "Ciudades vecinas" conserva el sentido colectivo del hebreo y suena natural en español bíblico contemporáneo.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - SEÑOR
  - Yahweh
  lexicon: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
  rationale: Se mantiene el nombre divino explícito en el texto, siguiendo la norma del proyecto para יְהוָה. "Yahvé" es la forma establecida en el español del POB, en lugar de ocultarlo con una convención de mayúsculas.
- source_word: יֵשֵׁב
  english_pob_choice: will dwell
  chosen_spanish: habitará
  alternatives_spanish:
  - morará
  - vivirá
  lexicon: HALOT
  rationale: En contextos de residencia o asentamiento, ישב significa habitar o morar. "Habitará" reproduce el valor de permanencia y el registro formal más adecuadamente que "vivirá".
- source_word: אִישׁ
  english_pob_choice: man
  chosen_spanish: hombre
  alternatives_spanish:
  - nadie
  - una persona
  lexicon: HALOT
  rationale: El sustantivo es singular masculino y funciona aquí con valor representativo/general. "Hombre" preserva la forma y la fuerza antropológica del hebreo mejor que una neutralización más amplia.
- source_word: יָגוּר
  english_pob_choice: will sojourn
  chosen_spanish: morará
  alternatives_spanish:
  - se hospedará
  - residirá como extranjero
  lexicon: HALOT
  rationale: גור puede implicar residir como forastero o asentarse temporalmente. En español, "morará" mantiene un paralelismo elevado con "habitará" y conserva la idea de permanencia o residencia sin volverlo coloquial.
- source_word: בָּהּ
  english_pob_choice: in her
  chosen_spanish: en ella
  alternatives_spanish:
  - en ella misma
  - allí
  lexicon: HALOT
  rationale: El sufijo femenino singular remite a la ciudad/tierra personificada. "En ella" conserva la referencia gramatical y la personificación profética mejor que un impersonal como "allí".
- source_word: בֶּן אָדָם
  english_pob_choice: son of man
  chosen_spanish: hijo de hombre
  alternatives_spanish:
  - ser humano
  - mortal
  lexicon: HALOT
  rationale: Se conserva la literalidad transparente del hebreo idiomático. En este contexto no mesiánico, la expresión remite a un ser humano; el giro literal mantiene el paralelismo con אִישׁ y deja visible la tensión idiomática.
theological_decisions:
- issue: Nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Jehová
  rationale: El texto hebreo usa directamente el Tetragrámaton. La decisión del POB en inglés de evitar el disfraz litúrgico se traslada al español con "Yahvé", manteniendo el nombre del pacto y la trazabilidad al original.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: 'Lenguaje antropológico: אִישׁ / בֶּן אָדָם'
  english_pob_reading: no man ... no son of man
  chosen_spanish_reading: no habitará allí hombre, ni morará en ella hijo de hombre
  alternative_spanish_readings:
  - no habitará allí nadie, ni morará en ella ningún ser humano
  - no habitará allí hombre alguno, ni morará en ella ser humano alguno
  rationale: El hebreo usa sustantivos masculinos singulares con fuerza representativa. Se conserva esa forma para no borrar el matiz del original ni aplanar la imagen profética; "hijo de hombre" queda como giro idiomático transparente.
  doctrine_reference: 'DOCTRINE.md Translation philosophy §4; Contested terms: אָדָם → man / humankind (context)'
translation_notes:
  revision_awareness: La revisión inglesa más reciente cambió "live" por "dwell" para alinear mejor יֵשֵׁב con un registro formal. En español, "habitará" y "morará" mantienen esa misma elevación y precisión, por lo que no fue necesario suavizar el verso. Se conservó también la tensión idiomática de בֶּן אָדָם mediante la nota explicativa.
  spanish_consistency_notes:
  - Se usó «Yahvé» conforme a la terminología española del proyecto para יְהוָה, no «SEÑOR».
  - 'Se mantuvo el paralelismo verbal con dos formas elevadas: «habitará» / «morará».'
  - «Hijo de hombre» se conservó literalmente y con nota para evitar ocultar el hebraísmo.
  - «Ciudades vecinas» refleja el plural colectivo del contexto sin forzar una paráfrasis extensa.
