review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien la estructura hebrea: futuro prescriptivo para וְיָצָא, repetición de ''el sacerdote'', sentido inspectivo de וְרָאָה, y preserva correctamente וְהִנֵּה con ''y he aquí''. También mantiene la tensión entre lenguaje tradicional de ''lepra'' y la aclaración de que צָרַעַת no equivale necesariamente a la lepra moderna. Sin embargo, hay dos desajustes importantes con el texto fuente y con la lógica léxica documentada: (1) נֶגַע se vertió como ''llaga'', que en español sugiere una herida/úlcera más específica de lo que exige el hebreo; ''afección'' o ''enfermedad'' preserva mejor el alcance semántico. (2) מִן הַצָּרוּעַ fue parafraseado como ''el que tenía la afección de la piel'', introduciendo pasado (''tenía'') no presente en el hebreo y debilitando la identificación actual de la persona inspeccionada. Conviene ajustar la redacción para reflejar mejor ''de/en la persona afectada por la enfermedad de la piel''.'
  spanish_quality_summary: 'El español es claro y digno, pero ''la llaga de la lepra'' suena algo rígido y demasiado marcado por tradición, y ''el que tenía la afección de la piel'' resulta más interpretativo de lo necesario. Una revisión menor mejora fidelidad y naturalidad: ''la afección de lepra'' y ''en el que tenía la enfermedad de la piel'' o mejor aún ''en la persona con la enfermedad de la piel''. También la nota [a] es innecesaria porque ''saldrá'' no requiere aclaración especial en español y no refleja una alternativa significativa preservada por el inglés.'
  glossary_alignment: 'No hay conflicto con términos de proyecto como Yahvé/Mesías/etc. El punto terminológico principal aquí es צָרַעַת/צָרוּעַ: el borrador intenta respetar la decisión teológica del POB, pero mezcla el término tradicional ''lepra'' en el texto principal con una descripción más amplia para la persona afectada. La mejor alineación es mantener en el texto principal una formulación que no imponga diagnóstico moderno: ''afección de lepra'' con nota tradicional, y ''persona con la enfermedad de la piel'' para הַצָּרוּעַ.'
  issues:
  - severity: medium
    issue: '''llaga'' para נֶגַע es demasiado específico'
    rationale: נֶגַע puede referirse a una afección, lesión o plaga visible; 'llaga' en español estrecha el sentido hacia una úlcera/herida, mientras el POB documenta una categoría más amplia de enfermedad/afección cutánea.
  - severity: medium
    issue: '''el que tenía la afección de la piel'' introduce pasado interpretativo'
    rationale: הַצָּרוּעַ designa a la persona afectada, no necesariamente 'la que antes tenía' la afección. El pasado puede sugerir una resolución ya consumada más allá de lo que el hebreo expresa en esta inspección.
  - severity: low
    issue: La nota [a] sobre 'saldrá' no añade información necesaria
    rationale: El futuro prescriptivo ya es natural en español y está bien justificado internamente; no hace falta cargar el versículo con una nota no preservada por el POB inglés ni requerida por ambigüedad nueva en español.
  revised_spanish_text: El sacerdote saldrá a un lugar fuera del campamento, y el sacerdote lo examinará; y he aquí, la afección[a] de lepra ha sanado en la persona con la enfermedad de la piel[b].
  revised_footnotes:
  - marker: a
    text: Tradicionalmente, 'la lepra' o 'la llaga de la lepra'. El hebreo נֶגַע הַצָּרַעַת puede referirse más ampliamente a una afección cutánea/ritual y no necesariamente a la lepra moderna.
    reason: alternative_reading
  - marker: b
    text: Heb. 'en el afectado por צָרַעַת'. El término puede describir de manera más amplia a una persona con una enfermedad de la piel que a un 'leproso' en sentido médico moderno.
    reason: lexical_alternative
