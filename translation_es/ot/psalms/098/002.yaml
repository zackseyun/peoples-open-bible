translation:
  language: es
  text: Yahvé ha dado a conocer su salvación[a]; ante los ojos de las naciones ha revelado su rectitud[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «a la vista de las naciones».
    reason: lexical_alternative
  - marker: b
    text: O «su justicia». El término hebreo puede denotar justicia, rectitud o vindicación según el contexto.
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: Se conserva el nombre propio divino según la convención de POB, evitando la sustitución por un título. En español, «Yahvé» es la forma más reconocible y reverente para reproducir el tetragrama.
- source_word: הוֹדִיעַ
  english_pob_choice: has made known
  chosen_spanish: ha dado a conocer
  alternatives_spanish:
  - ha hecho saber
  - ha declarado
  lexicon: HALOT
  rationale: El hifil de ידע expresa la idea causativa de hacer saber o dar a conocer. «Ha dado a conocer» suena natural en español y mantiene el matiz causativo sin ampliar indebidamente el sentido.
- source_word: יְשׁוּעָתוֹ
  english_pob_choice: his salvation
  chosen_spanish: su salvación
  alternatives_spanish:
  - su liberación
  - su victoria
  lexicon: HALOT
  rationale: En este contexto de alabanza, יְשׁוּעָה puede abarcar salvación, liberación o victoria. «Salvación» conserva el alcance teológico amplio y es el equivalente más estable en español.
- source_word: לְעֵינֵי
  english_pob_choice: before the eyes of
  chosen_spanish: ante los ojos de
  alternatives_spanish:
  - a la vista de
  - en presencia de
  lexicon: HALOT
  rationale: La expresión idiomática se conserva de forma vívida. «Ante los ojos de» reproduce con claridad la imagen hebrea y sigue siendo idiomático en español.
- source_word: הַגּוֹיִם
  english_pob_choice: the nations
  chosen_spanish: las naciones
  alternatives_spanish:
  - los gentiles
  - los pueblos
  lexicon: HALOT
  rationale: Aquí se refiere a los pueblos no israelitas que observan la obra de Yahvé. «Las naciones» es la opción más amplia y menos ambigua en español bíblico.
- source_word: גִּלָּה
  english_pob_choice: has revealed
  chosen_spanish: ha revelado
  alternatives_spanish:
  - ha descubierto
  - ha dado a conocer
  lexicon: HALOT
  rationale: El piel de גלה significa revelar o descubrir. «Ha revelado» mantiene la correspondencia con «ha dado a conocer» en la primera mitad y conserva el paralelismo.
- source_word: צִדְקָתוֹ
  english_pob_choice: his righteousness
  chosen_spanish: su justicia
  alternatives_spanish:
  - su rectitud
  - su vindicación
  lexicon: HALOT
  rationale: En este verso, צִדְקָה puede abarcar justicia, rectitud o vindicación. Se eligió «justicia» porque en español comunica bien el acto público por el cual Yahvé se muestra en lo correcto y hace valer su derecho; se preserva así la tensión semántica reconocida en la nota.
theological_decisions:
- issue: Cómo traducir צִדְקָה en un contexto de salvación pública
  english_pob_reading: his righteousness
  chosen_spanish_reading: su justicia
  alternative_spanish_readings:
  - su rectitud
  - su vindicación
  - su justicia salvadora
  rationale: La lectura de POB mantiene la amplitud teológica de righteousness, pero en español «justicia» expresa de manera más natural la manifestación pública del obrar recto de Yahvé. El término no se restringe a justicia retributiva; deja abierta la dimensión de fidelidad, rectitud y vindicación presente en el contexto.
  doctrine_reference: 'DOCTRINE.md: Preservar la tensión teológica; no resolverla prematuramente en una sola acepción estrecha.'
translation_notes:
  revision_awareness: No se reportan revisiones aplicadas; el control más reciente indicó que no había cambios necesarios y la concordancia con la revisión fue alta.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como forma estable para el tetragrama, coherente con la política general del proyecto.
  - Se conserva la duplicación paralela «ha dado a conocer / ha revelado» para reflejar la estructura hebrea.
  - «Justicia» se usa aquí como término principal, pero la nota preserva la alternativa semántica «rectitud» para no borrar la tensión léxica del hebreo.
