translation:
  language: es
  text: En ti me he apoyado desde el vientre; desde las entrañas de mi madre, tú eres el que me sacó[a]. En ti está siempre mi alabanza.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más suavemente: «desde el vientre de mi madre, tú eres el que me sacó». El hebreo usa aquí un término distinto del de la frase anterior, literalmente «desde las entrañas de mi madre».'
    reason: lexical_alternative
lexical_decisions:
- source_word: עָלֶיךָ
  english_pob_choice: Upon you
  chosen_spanish: En ti me he apoyado
  alternatives_spanish:
  - Sobre ti me he apoyado
  - En ti he descansado
  lexicon: HALOT
  rationale: El hebreo expresa dependencia/apoyo sobre Yahvé. 'En ti me he apoyado' conserva la imagen de sostén con una preposición natural en español y evita una literalidad rígida como 'sobre ti', que suena menos idiomática.
- source_word: נִסְמַכְתִּי
  english_pob_choice: I have leaned
  chosen_spanish: me he apoyado
  alternatives_spanish:
  - me he inclinado
  - he confiado
  lexicon: HALOT
  rationale: El nifal de סמך tiene el sentido de apoyarse, sostenerse o confiar. 'Me he apoyado' mantiene la metáfora corporal de dependencia y corresponde bien al 'Upon you' del texto base inglés.
- source_word: מִבֶּטֶן
  english_pob_choice: from the womb
  chosen_spanish: desde el vientre
  alternatives_spanish:
  - desde el seno materno
  - desde la matriz
  lexicon: HALOT
  rationale: בטן apunta al vientre/womb. 'Desde el vientre' es claro, digno y natural en español; conserva la imagen del nacimiento sin sobrecargarla con un tecnicismo.
- source_word: מִמְּעֵי אִמִּי
  english_pob_choice: from my mother’s inward parts
  chosen_spanish: desde las entrañas de mi madre
  alternatives_spanish:
  - desde los órganos internos de mi madre
  - desde el interior de mi madre
  lexicon: HALOT
  rationale: מֵעֶה se refiere literalmente a las partes internas/entrañas. Se conserva la variación léxica respecto de בטן, que el audit trail inglés preserva, evitando igualar ambas expresiones.
- source_word: גוֹזִי
  english_pob_choice: who brought me out
  chosen_spanish: el que me sacó
  alternatives_spanish:
  - el que me hizo salir
  - el que me trajo al mundo
  lexicon: HALOT
  rationale: El participio aquí se entiende en contexto de nacimiento como causar la salida del vientre. 'Me sacó' es breve, fiel y natural; mantiene la agencia divina en el acto de nacimiento.
- source_word: בְּךָ
  english_pob_choice: In you
  chosen_spanish: En ti
  alternatives_spanish:
  - Por ti
  - Contigo
  lexicon: HALOT
  rationale: La preposición ב aquí puede marcar esfera o referencia; 'En ti' preserva la compacta expresión hebrea y la relación de la alabanza con Dios.
- source_word: תְהִלָּתִי
  english_pob_choice: my praise
  chosen_spanish: mi alabanza
  alternatives_spanish:
  - mi canto de alabanza
  - mi gloria
  lexicon: HALOT
  rationale: תְהִלָּה significa alabanza. 'Mi alabanza' sería literal, pero 'mi alabanza' en español puede sonar algo abstracto; 'mi alabanza' se mantiene, con 'alabanza' como término eclesial claro y fiel. Se evita 'gloria' por no ser el sentido primario aquí.
- source_word: תָמִיד
  english_pob_choice: continually
  chosen_spanish: continuamente
  alternatives_spanish:
  - siempre
  - sin cesar
  lexicon: HALOT
  rationale: תמיד expresa continuidad durativa. 'Continuamente' conserva el matiz de constancia y resulta fluido en español contemporáneo.
theological_decisions:
- issue: Agencia divina en el nacimiento
  english_pob_reading: God is described as the one who brought the psalmist out from his mother's womb, emphasizing lifelong dependence from earliest existence.
  chosen_spanish_reading: Dios aparece como quien me sacó desde el origen mismo de la vida, subrayando dependencia continua desde el nacimiento.
  alternative_spanish_readings:
  - Dios como simple sostenedor desde el nacimiento, sin referencia directa al parto
  - Dios como el que me formó, no necesariamente como el que me hizo salir
  rationale: El hebreo y el audit trail inglés atribuyen a Dios la acción de 'sacar' al salmista. La traducción conserva esa atribución sin ampliar la afirmación más allá del verso ni suavizarla hacia una mera idea de sustento.
  doctrine_reference: Translation philosophy §1, §3
translation_notes:
  revision_awareness: 'El pasaje se mantiene estable respecto del audit trail inglés: se conserva la metáfora de apoyo, la variación léxica entre בטן y מֵעֶה, y la agencia divina en el nacimiento. No se documentaron revisiones textuales adicionales en el paquete fuente.'
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' como forma base para el nombre divino en todo el proyecto, aunque este verso no contiene el tetragrámaton explícito.
  - Se evita 'SEÑOR' como sustituto no transparente; aquí el texto habla directamente de 'ti' y no requiere máscara.
  - '''Alabanza'' se usa para תְהִלָּה, en continuidad con el valor estándar del proyecto para praise.'
  - La construcción 'me he apoyado' conserva el sentido relacional y corporal de סמך sin volverlo una mera abstracción.
