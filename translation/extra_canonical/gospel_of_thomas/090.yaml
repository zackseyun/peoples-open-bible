synoptic_parallel_check:
  parallels:
  - Matthew 11:28–30
  handling: intentional_divergence
  rationale: Thomas lacks “take my yoke upon you” and “my burden is light,” and has
    “my lordship is gentle” instead. Translation follows the Coptic wording without
    harmonizing to the Matthean cadence (“easy/light”).
revision_risk_note: 'Key decisions to scrutinize: (1) rendering ⲭⲣⲏⲥⲧⲟⲥ as “good”
