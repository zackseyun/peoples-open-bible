  yaml_path: translation/nt/luke/020/042.yaml
  text: For David himself says in the Book of Psalms[a], ‘The Lord said to my Lord, “Sit at my right hand”’
  footnotes:
  - marker: a
    text: Or, following the Hebrew of Psalm 110:1, 'The LORD said to my Lord.'
    reason: alternative_reading
translation:
  language: ko
  text: 다윗 자신이 시편 책에서 말하기를, 「야훼께서 내 주께 말씀하셨다. 「내 오른편에 앉으라,
  philosophy: optimal-equivalence
theological_decisions:
- issue: 시 110:1 인용에서 두 κύριος의 구분
  chosen_reading: 야훼께서 내 주께
  alternative_readings:
  - 주께서 내 주께
  - 주께서 나의 주님께
  rationale: 시 110:1 LXX의 첫 κύριος는 YHWH(יהוה)를 옮긴 것이며, 둘째 κύριος는 다윗이 가리키는 메시아적 「주」(אדני). 두 호칭을 한국어에서 같은 「주」로 옮기면 다윗의 본문 논증(다윗이 자기 후손에게 「주」라 부르는 역설)이 흐려진다. 영어 POB는 두 κύριος를 모두 Lord로 옮겼으나, 한국어 야훼/주 구별은 본 인용의 구약 원형을 직접 회복한다.
  doctrine_reference: DOCTRINE.md §5 LXX citations; glossary YHWH→야훼
