translation:
  language: es
  text: No dejarán nada de él hasta la mañana, y no le quebrarán ningún hueso[a]; según todo el estatuto de la Pascua, la celebrarán[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «no quebrarán un hueso de él».'
    reason: lexical_alternative
  - marker: b
    text: La cláusula sobre el hueso no quebrado recuerda las instrucciones de la Pascua en Éxodo 12:46.
    reason: cross_reference
lexical_decisions:
- source_word: יַשְׁאִירוּ
  english_pob_choice: shall leave
  chosen_spanish: dejarán nada de él
  alternatives_spanish:
  - dejarán
  - dejarán algo de él
  - dejarán permanecer
  lexicon: HALOT
  rationale: El verbo hiphil expresa dejar/permitir que quede. En español, la negación con 'nada de él' reproduce bien el sentido partitivo de 'none of it' y mantiene naturalidad.
- source_word: מִמֶּנּוּ
  english_pob_choice: of it
  chosen_spanish: de él
  alternatives_spanish:
  - de ello
  - de eso
  - de él mismo
  lexicon: HALOT
  rationale: El sufijo pronominal masculino singular se refiere al cordero o a la porción pascual; 'de él' es la forma más directa y idiomática en español.
- source_word: עַד בֹּקֶר
  english_pob_choice: until morning
  chosen_spanish: hasta la mañana
  alternatives_spanish:
  - hasta el amanecer
  - hasta la madrugada
  - hasta la mañana siguiente
  lexicon: HALOT
  rationale: '''בֹּקֶר'' designa la mañana; ''hasta la mañana'' conserva la referencia temporal sin añadir precisión no explicitada por el hebreo.'
- source_word: וְעֶצֶם
  english_pob_choice: and a bone
  chosen_spanish: hueso
  alternatives_spanish:
  - un hueso
  - ningún hueso
  - huesos
  lexicon: HALOT
  rationale: El singular hebreo funciona distributivamente. En español, después de 'no quebrarán', 'hueso' sin artículo comunica la prohibición general con fluidez.
- source_word: לֹא יִשְׁבְּרוּ בוֹ
  english_pob_choice: they shall not break a bone of it
  chosen_spanish: no quebrarán hueso suyo
  alternatives_spanish:
  - no quebrarán un hueso de él
  - no le quebrarán ningún hueso
  - no quebrarán ninguno de sus huesos
  lexicon: HALOT
  rationale: '''Quebrar'' reproduce bien el verbo físico y mantiene el registro bíblico. ''Hueso suyo'' conserva el referente posesivo sin forzar una frase menos natural.'
- source_word: כְּכָל חֻקַּת הַפֶּסַח
  english_pob_choice: according to all the statute of the Passover
  chosen_spanish: conforme a toda la estatuta de la Pascua
  alternatives_spanish:
  - conforme a toda la norma de la Pascua
  - según toda la ordenanza de la Pascua
  - conforme a todo el estatuto de la Pascua
  lexicon: HALOT
  rationale: '''חֻקָּה'' es una disposición prescriptiva; ''estatuta'' conserva el sustantivo femenino singular de forma cercana a la raíz jurídica del hebreo. Aunque menos usual, aquí ayuda a reflejar el singular colectivo del original.'
- source_word: הַפֶּסַח
  english_pob_choice: the Passover
  chosen_spanish: la Pascua
  alternatives_spanish:
  - el Pésaj
  - la fiesta de Pascua
  - la celebración de la Pascua
  lexicon: HALOT
  rationale: '''Pascua'' es la forma bíblica y eclesial clara en español para esta institución ritual. ''Pésaj'' sería más transliterado de lo necesario en este contexto.'
- source_word: יַעֲשׂוּ אֹתוֹ
  english_pob_choice: they shall keep it
  chosen_spanish: la cumplirán
  alternatives_spanish:
  - la observarán
  - la harán
  - la guardarán
  lexicon: HALOT
  rationale: Con festividades y mandatos rituales, עשה puede significar observar/celebrar. 'Cumplir' expresa bien la ejecución fiel del rito y evita un calco como 'la harán'.
theological_decisions:
- issue: Relación del mandato pascual con la tipología cristológica posterior
  english_pob_reading: Translate the clause straightforwardly as a Passover regulation without importing later christological interpretation into the main text.
  chosen_spanish_reading: Traducirlo como una norma de la Pascua sin introducir en el cuerpo del texto una lectura cristológica posterior.
  alternative_spanish_readings:
  - Formularlo para subrayar en el texto principal el cumplimiento en Cristo
  - Añadir una glosa interpretativa sobre el Nuevo Testamento
  rationale: En su contexto inmediato, la frase regula la observancia pascual. La traducción debe dejar abierta la resonancia canónica posterior sin incorporarla al enunciado principal.
  doctrine_reference: Translation philosophy §1, §3
translation_notes:
  revision_awareness: El pasaje coincide sustancialmente con el rastro de auditoría inglés; no se observaron revisiones aplicadas en la fuente y se mantiene la lectura directa del mandato pascual.
  spanish_consistency_notes:
  - Se conserva 'Pascua' para הַפֶּסַח por coherencia bíblica en español.
  - Se usa 'Yahvé' como norma general del proyecto, pero este versículo no contiene el tetragrámaton.
  - '''Cumplir'' se emplea para עשה en contexto ritual, en línea con una observancia prescrita.'
  - La negación partitiva 'nada de él' busca reflejar la fuerza de מִמֶּנּוּ sin sonar rígida.
