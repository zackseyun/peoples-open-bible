translation:
  language: es
  text: ¿No fue Sodoma tu hermana motivo de comentario[a] en tu boca en el día de tu orgullo?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «un informe», «algo de lo que se habla» o «objeto de conversación». El hebreo probablemente se refiere a Sodoma como un ejemplo notorio en labios de Jerusalén.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְלֹא
  english_pob_choice: Was not
  chosen_spanish: ¿No fue
  alternatives_spanish:
  - ¿Y no fue
  - ¿No era
  lexicon: HALOT
  rationale: La negación inicial en contexto retórico se expresa mejor en español con una pregunta interrogativa directa. «¿No fue» conserva el efecto confrontativo del hebreo y la fuerza de reproche.
- source_word: הָיְתָה
  english_pob_choice: was
  chosen_spanish: fue
  alternatives_spanish:
  - era
  - había sido
  lexicon: HALOT
  rationale: El perfecto qal aquí señala un estado/pasado simple. «Fue» mantiene la correspondencia temporal y suena natural en la pregunta retórica.
- source_word: סְדֹם
  english_pob_choice: Sodom
  chosen_spanish: Sodoma
  alternatives_spanish:
  - Sodom
  lexicon: N/A
  rationale: Nombre propio bíblico en forma española estándar y reconocible en lectura eclesial.
- source_word: אֲחוֹתֵךְ
  english_pob_choice: your sister
  chosen_spanish: tu hermana
  alternatives_spanish:
  - tu hermana-ciudad
  - tu hermana
  lexicon: HALOT
  rationale: Se conserva el vínculo metafórico de parentesco entre ciudades sin explicarlo ni suavizarlo, porque es central en Ezequiel 16.
- source_word: לִשְׁמוּעָה
  english_pob_choice: a byword
  chosen_spanish: un proverbio
  alternatives_spanish:
  - un dicho
  - algo de lo que se hablaba
  - un objeto de conversación
  lexicon: HALOT
  rationale: El hebreo puede indicar algo oído, un informe o algo de lo que se habla. En este contexto de «en tu boca» y de reproche, «proverbio» comunica bien la idea de un dicho notorio o ejemplar; se preserva la ambigüedad útil sin restringirla solo a «report».
- source_word: בְּפִיךְ
  english_pob_choice: in your mouth
  chosen_spanish: en tu boca
  alternatives_spanish:
  - en tus labios
  lexicon: HALOT
  rationale: Se conserva la imagen idiomática literal del hebreo. «En tu boca» es claro en español y mantiene la relación con el hablar repetido o proverbial.
- source_word: בְּיוֹם
  english_pob_choice: in the day of
  chosen_spanish: en el día de
  alternatives_spanish:
  - al tiempo de
  - cuando
  lexicon: HALOT
  rationale: La fórmula temporal se mantiene de modo formal y fiel, sin convertirla en una subordinada más interpretativa.
- source_word: גְּאוֹנָיִךְ
  english_pob_choice: your pride
  chosen_spanish: tu orgullo
  alternatives_spanish:
  - tu arrogancia
  - tu altivez
  - tu soberbia
  lexicon: HALOT
  rationale: גאון puede abarcar exaltación orgullosa y arrogancia. «Orgullo» conserva la forma breve del texto y deja visible la carga negativa en contexto de reproche profético.
theological_decisions:
- issue: Forma retórica de la frase negativa
  english_pob_reading: 'Rendered as a rhetorical question: ''Was not Sodom your sister a byword in your mouth...?'''
  chosen_spanish_reading: 'Se vierte como pregunta retórica: «¿No fue Sodoma tu hermana...?»'
  alternative_spanish_readings:
  - Sodoma tu hermana no fue un proverbio en tu boca...
  - ¿Acaso no fue Sodoma tu hermana un proverbio en tu boca...?
  rationale: El hebreo abre con negación + perfecto y en contexto de reprensión profética funciona naturalmente como pregunta retórica. La opción elegida conserva el golpe acusatorio y evita una construcción castellana torcida.
  doctrine_reference: Fidelidad retórica al discurso profético; filosofía de equivalencia óptima.
translation_notes:
  revision_awareness: 'El borrador sigue de cerca el análisis inglés auditado: mantiene la pregunta retórica, el paralelismo «tu hermana», y la ambigüedad léxica de לִשְׁמוּעָה sin forzarla a una sola glosa. No se registraron revisiones posteriores que alteren el sentido.'
  spanish_consistency_notes:
  - Se usa «Sodoma» como nombre propio español estándar.
  - Se conserva la imagen corporal «en tu boca» para reflejar el hebreo.
  - «Orgullo» mantiene el tono de reproche sin añadir interpretación doctrinal externa.
  - La nota[a] marca la alternativa léxica principal preservada por el POB inglés.
