  to: 'Y ella le dijo: «Padre mío, tú has abierto tu boca[a] a Yahvé; haz conmigo conforme a lo que salió de tu boca, ya que Yahvé ha tomado venganza por ti de tus enemigos, de los hijos de Amón[b]».'
  rationale: 'Se reubican y corrigen las notas para reflejar la auditoría inglesa y la disciplina de anclaje: el modismo del voto recibe la nota cultural pertinente, y la alternativa léxica se ancla en «hijos de Amón». Además, se mejora la naturalidad y claridad de עֲשֵׂה לִי con «haz conmigo» sin perder la fuerza del hebreo ni resolver la tensión teológica del pasaje.'
