translation:
  language: es
  text: Una copia del documento debía ser publicada como ley en cada provincia[a], y dada a conocer públicamente a todos los pueblos, para que estuvieran preparados para este día[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «en cada y toda provincia». El hebreo repite «provincia» de manera distributiva para dar énfasis.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «para aquel día», en referencia al día señalado por el decreto.'
    reason: lexical_alternative
lexical_decisions:
- source_word: פַּתְשֶׁגֶן
  english_pob_choice: copy
  chosen_spanish: copia
  alternatives_spanish:
  - texto
  - duplicado
  lexicon: HALOT
  rationale: El préstamo persa señala una copia o transcripción de un documento oficial. «Copia» comunica bien la idea administrativa sin volverla extraña en español.
- source_word: הַכְּתָב
  english_pob_choice: the document
  chosen_spanish: documento
  alternatives_spanish:
  - escrito
  - decreto escrito
  lexicon: HALOT
  rationale: En contexto se trata del escrito imperial. «Documento» es directo y natural; evita añadir «decreto» al sustantivo principal, ya que esa función la expresa mejor la cláusula siguiente.
- source_word: לְהִנָּתֵן
  english_pob_choice: was to be issued
  chosen_spanish: debía ser promulgada
  alternatives_spanish:
  - debía ser dada
  - debía ser publicada
  lexicon: HALOT
  rationale: El infinitivo pasivo expresa la distribución/publicación oficial del escrito. «Promulgada» conserva el matiz jurídico-administrativo de un edicto sin depender de una calca incómoda.
- source_word: דָּת
  english_pob_choice: law
  chosen_spanish: ley
  alternatives_spanish:
  - decreto
  - edicto
  lexicon: HALOT
  rationale: En Ester este término persa puede referirse a una disposición legal vinculante. «Ley» preserva su fuerza normativa en español, aunque «decreto» sería una alternativa contextual válida.
- source_word: בְּכָל מְדִינָה וּמְדִינָה
  english_pob_choice: in every province and province
  chosen_spanish: en cada provincia
  alternatives_spanish:
  - en cada y toda provincia
  - en cada provincia y provincia
  lexicon: HALOT
  rationale: La repetición distributiva enfatiza la totalidad. En español se transmite de forma natural con «cada»; el sentido de énfasis queda implícito sin sonar afectado.
- source_word: גָּלוּי
  english_pob_choice: being made known
  chosen_spanish: siendo dada a conocer
  alternatives_spanish:
  - siendo publicada
  - siendo hecha pública
  lexicon: HALOT
  rationale: El participio pasivo comunica divulgación pública. «Dada a conocer» mantiene la idea de comunicación abierta a la población.
- source_word: לְכָל הָעַמִּים
  english_pob_choice: to all the peoples
  chosen_spanish: a todos los pueblos
  alternatives_spanish:
  - a todos los pueblos del imperio
  - a todas las gentes
  lexicon: HALOT
  rationale: «Pueblos» refleja mejor los diversos grupos étnicos o poblacionales que «naciones» en este contexto imperial.
- source_word: לִהְיוֹת עֲתִדִים
  english_pob_choice: so that they would be ready
  chosen_spanish: para que estuvieran listos
  alternatives_spanish:
  - para que estuvieran preparados
  - para estar listos
  lexicon: HALOT
  rationale: La construcción expresa propósito/resultación. «Estuvieran listos» es natural y conserva la idea de estar preparados para la fecha señalada.
- source_word: לַיּוֹם הַזֶּה
  english_pob_choice: for this day
  chosen_spanish: para este día
  alternatives_spanish:
  - para aquel día
  - para el día señalado
  lexicon: HALOT
  rationale: La forma hebrea dice literalmente «este día». Se conserva la referencia cercana al decreto, dejando la identificación contextual sin explicitar más de lo debido.
translation_notes:
  revision_awareness: 'La redacción sigue la revisión más reciente del inglés POB: se evita una repetición innecesaria equivalente a «provincia y provincia», se traduce פַּתְשֶׁגֶן como «copia» y הַכְּתָב como «documento», y se conserva la estructura causal/final de la frase con un español fluido y auditable.'
  spanish_consistency_notes:
  - Se mantiene «ley» para דָּת conforme a la decisión POB de reflejar su fuerza normativa.
  - Se usa «pueblos» para לְכָל הָעַמִּים por ser más preciso que «naciones» en el marco del imperio persa.
  - Los marcadores [a] y [b] aparecen exactamente en el texto base y corresponden a notas de alternativa léxica, sin crear notas huérfanas.
