  text: 그 날들이 다 끝나자, 우리가 떠나 여행을 계속하였습니다. 모든 사람이 그들의 아내와 자녀들과 함께 우리를 도시 밖까지 배웅하였고, 우리가 해변에서 무릎을 꿇고 기도하였습니다.
