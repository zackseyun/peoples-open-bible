translation:
  language: es
  text: Mi corazón está firme[a], oh Dios; mi corazón está firme. Cantaré, sí[b], cantaré alabanzas.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «Mi corazón está fijo, oh Dios; mi corazón está fijo».
    reason: lexical_alternative
  - marker: b
    text: O «haré melodía» en lugar de «cantaré alabanzas».
    reason: lexical_alternative
lexical_decisions:
- source_word: נָכוֹן
  english_pob_choice: steadfast
  chosen_spanish: firme
  alternatives_spanish:
  - estable
  - afirmado
  - fijo
  lexicon: HALOT
  rationale: El adjetivo expresa firmeza, estabilidad y estar establecido. En español, «firme» comunica bien esa solidez interior y suena natural en poesía bíblica. «Fijo» puede sonar demasiado mecánico; «estable» es posible, pero aquí «firme» conserva mejor la idea de resolución.
- source_word: לִבִּי
  english_pob_choice: my heart
  chosen_spanish: mi corazón
  alternatives_spanish:
  - mi mente
  - mi ser interior
  lexicon: HALOT
  rationale: Se mantiene el hebraísmo bíblico del corazón como sede interior de voluntad y afectos. No se reduce a «mente» ni se explicita como «ser interior» porque el hebreo emplea el término concreto «corazón».
- source_word: אֱלֹהִים
  english_pob_choice: O God
  chosen_spanish: oh Dios
  alternatives_spanish:
  - Dios
  lexicon: HALOT
  rationale: El hebreo está en vocativo; en español conviene marcar la apelación directa con «oh Dios». Se evita «Dios» solo, porque perdería la fuerza de invocación del verso.
- source_word: אָשִׁירָה
  english_pob_choice: I will sing
  chosen_spanish: Cantaré
  alternatives_spanish:
  - quiero cantar
  - cantaré yo
  lexicon: HALOT
  rationale: La forma cohortativa expresa determinación o resolución. «Cantaré» transmite esa voluntad en español moderno sin añadir matices ajenos. Se evita una paráfrasis más libre que debilite la decisión del hablante.
- source_word: וַאֲזַמֵּרָה
  english_pob_choice: I will make melody
  chosen_spanish: entonaré melodía
  alternatives_spanish:
  - cantaré alabanzas
  - haré música
  lexicon: HALOT
  rationale: זמר en piel tiene la idea de hacer música o cantar con acompañamiento. «Entonaré melodía» conserva el matiz musical sin convertirlo simplemente en repetición de «cantaré». «Cantaré alabanzas» sería interpretativo; «haré música» resulta demasiado genérico.
theological_decisions:
- issue: La duplicación enfática de «mi corazón está firme» y la respuesta de alabanza
  english_pob_reading: The English POB keeps the parallelism and the emphasis of the repeated line, then renders the paired cohortatives as resolved future action.
  chosen_spanish_reading: 'Se conserva la repetición exacta de «mi corazón está firme» para mantener el paralelismo intensivo del hebreo, y se traducen las cohortativas con futuros decididos: «Cantaré… entonaré».'
  alternative_spanish_readings:
  - «Mi corazón está firme… cantaré y haré melodía»
  - «Mi corazón está afirmado… cantaré, sí, cantaré alabanzas»
  rationale: El hebreo repite la afirmación del corazón firme y luego encadena dos acciones voluntarias. La versión española debe preservar esa estructura retórica sin suavizarla ni expandirla innecesariamente.
  doctrine_reference: Salmo poético; paralelismo hebreo y expresión de resolución en alabanza.
translation_notes:
  revision_awareness: 'Texto revisado a partir del audit trail en inglés: se mantuvo la lectura optimal-equivalence del POB inglés, conservando el paralelismo del hebreo y la distinción entre cantar y hacer música/entonar melodía. No se registraron revisiones aplicadas en el pasaje fuente.'
  spanish_consistency_notes:
  - Se usa «oh Dios» para el vocativo directo, coherente con el valor apelativo del hebreo.
  - Se conserva «corazón» como centro interior, en línea con la antropología bíblica del texto.
  - «Entonaré melodía» evita confundir el segundo verbo con una mera repetición del primero y mantiene el matiz musical del piel.
  - 'La puntuación respeta el paralelismo: dos colonas breves con repetición enfática.'
