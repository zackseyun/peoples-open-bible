base_translation:
  language: en
  yaml_path: translation/extra_canonical/2_esdras/007/105.yaml
  text: or a friend who is most dear[a], that he may understand, or sleep, or eat, or be healed for him; so no one will ever pray for another, for all will then bear, each one, his own unrighteousnesses or righteousnesses.”
  footnotes:
  - marker: a
    text: Or 'so no one will ever then pray for another, but each will bear his own unrighteousnesses or righteousnesses.'.
