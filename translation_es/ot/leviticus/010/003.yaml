translation:
  language: es
  text: 'Entonces Moisés dijo a Aarón: «Esto es lo que Yahvé habló, diciendo: “Entre los que se acercan a mí[a] seré santificado[b], y delante de todo el pueblo seré glorificado[c]”». Y Aarón guardó silencio.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, «Por medio de los que se acercan a mí seré tenido por santo». El hebreo puede expresar tanto la manifestación de la santidad de Dios como su reconocimiento reverente por quienes se acercan a él.
    reason: alternative_reading
  - marker: b
    text: O, «seré tenido por santo».
    reason: lexical_alternative
  - marker: c
    text: O, «seré honrado».
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  - el SEÑOR
  lexicon: HALOT
  rationale: Se conserva el nombre divino propio del pacto, siguiendo el criterio del POB en inglés de no sustituir el Tetragrámaton por un título. "Yahvé" es la forma castellana estable y reverente para el nombre revelado a Israel.
- source_word: דִּבֶּר
  english_pob_choice: spoke
  chosen_spanish: habló
  alternatives_spanish:
  - dijo
  - pronunció
  lexicon: HALOT
  rationale: '"Habló" reproduce con naturalidad el verbo de comunicación divina sin añadir interpretación. En español mantiene el registro sobrio del contexto profético-sacerdotal.'
- source_word: בִּקְרֹבַי
  english_pob_choice: Among those who come near me
  chosen_spanish: en los que se acercan a mí
  alternatives_spanish:
  - entre los que se acercan a mí
  - en mis cercanos
  lexicon: HALOT
  rationale: La imagen sacerdotal de acercarse a Dios se expresa de modo idiomático en español con "los que se acercan a mí". Evita restringir prematuramente el sentido a un oficio específico, aunque el contexto levítico lo presupone.
- source_word: אֶקָּדֵשׁ
  english_pob_choice: I will be sanctified
  chosen_spanish: yo seré santificado
  alternatives_spanish:
  - me mostraré santo
  - seré tratado como santo
  - seré tenido por santo
  lexicon: HALOT
  rationale: Se conserva la forma pasiva/reflexiva que el POB revisado fijó en inglés. "Santificado" mantiene la correspondencia léxica con קדש y deja abierta la tensión entre manifestación de santidad y reconocimiento humano de esa santidad.
- source_word: וְעַל פְּנֵי כָל הָעָם
  english_pob_choice: before all the people
  chosen_spanish: delante de todo el pueblo
  alternatives_spanish:
  - a la vista de todo el pueblo
  - en presencia de todo el pueblo
  lexicon: HALOT
  rationale: '"Delante de todo el pueblo" conserva el valor público y visible de la frase hebrea, con un giro natural en español. Mantiene la dimensión comunitaria del juicio y la honra divinos.'
- source_word: אֶכָּבֵד
  english_pob_choice: I will be glorified
  chosen_spanish: seré glorificado
  alternatives_spanish:
  - seré honrado
  - me mostraré glorioso
  lexicon: HALOT
  rationale: '"Glorificado" preserva la resonancia teológica de כבד respecto de Dios y sigue de cerca la elección del POB en inglés. "Honrado" es posible, pero es menos fuerte en el paralelismo con la santidad divina.'
- source_word: וַיִּדֹּם
  english_pob_choice: was silent
  chosen_spanish: guardó silencio
  alternatives_spanish:
  - calló
  - quedó en silencio
  lexicon: HALOT
  rationale: 'La acción se expresa mejor en español como una respuesta deliberada y solemne: "guardó silencio". Mantiene la sobriedad y el peso emocional del momento sin añadir explicación.'
theological_decisions:
- issue: Cómo reflejar la santidad divina en relación con los que se acercan a Yahvé
  english_pob_reading: Among those who come near me I will be sanctified
  chosen_spanish_reading: En los que se acercan a mí yo seré santificado
  alternative_spanish_readings:
  - Entre los que se acercan a mí me mostraré santo
  - Por medio de los que se acercan a mí seré tratado como santo
  rationale: 'La formulación española conserva la ambigüedad productiva del hebreo: puede entenderse como que Dios manifiesta su santidad o como que es reconocido/tratado como santo por quienes se acercan. No se resuelve la tensión porque el texto y el POB la mantienen.'
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve it'
- issue: Cómo traducir la honra pública de Dios en paralelo con la santidad
  english_pob_reading: and before all the people I will be glorified
  chosen_spanish_reading: y delante de todo el pueblo seré glorificado
  alternative_spanish_readings:
  - y a la vista de todo el pueblo seré honrado
  - y ante todo el pueblo me mostraré glorioso
  rationale: '"Glorificado" conserva el paralelismo con "santificado" y la fuerza teológica de כבד aplicada a Dios. En español bíblico sigue siendo comprensible y evita diluir la frase en un simple reconocimiento humano.'
  doctrine_reference: 'DOCTRINE.md: Consistency of key terms, or documented exception'
- issue: La reacción final de Aarón
  english_pob_reading: And Aaron was silent
  chosen_spanish_reading: Y Aarón guardó silencio
  alternative_spanish_readings:
  - Y Aarón calló
  - Y Aarón permaneció en silencio
  rationale: La versión española transmite la respuesta contenida y reverente del personaje sin amplificación narrativa. "Guardó silencio" sugiere una decisión sobria ante la palabra divina.
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve it'
translation_notes:
  revision_awareness: El borrador sigue la última revisión del POB en inglés, que prefirió "I will be sanctified" para אַקָּדֵשׁ, manteniendo "I will be glorified" y "And Aaron was silent". La propuesta española reproduce esa revisión con correspondencia léxica cercana y conserva la tensión interpretativa documentada en la nota alternativa.
  spanish_consistency_notes:
  - Se mantiene Yahvé para יְהוָה, conforme al estándar español del proyecto.
  - Se usa "santificado" en lugar de una paráfrasis explicativa, para respetar la decisión revisada del POB en inglés.
  - '"Glorificado" se conserva como término teológico consistente para אֶכָּבֵד.'
  - '"Guardó silencio" transmite con sobriedad וַיִּדֹּם sin coloquializar el cierre.'
  - Las notas a pie de página preservan la alternativa semántica principal en torno a la santidad y la honra divinas.
