  text: וְ/אֵין קוֹרֵ֣א בְ/שִׁמְ/ךָ֔ מִתְעוֹרֵ֖ר לְ/הַחֲזִ֣יק בָּ֑/ךְ כִּֽי הִסְתַּ֤רְתָּ פָנֶ֨י/ךָ֙ מִמֶּ֔/נּוּ וַ/תְּמוּגֵ֖/נוּ בְּ/יַד עֲוֺנֵֽ/נוּ־־־׃
base_translation:
  language: en
  yaml_path: translation/ot/isaiah/064/006.yaml
  text: And there is no one who calls on your name[a], who stirs himself up to take hold of you; for you have hidden your face from us and have given us over into the hand of our iniquity.
  footnotes:
