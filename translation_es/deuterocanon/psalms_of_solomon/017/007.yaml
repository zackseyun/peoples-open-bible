    text: 'O: «tu nombre estimado».'
    reason: lexical_alternative
  revision_rationale: 'La revisión es menor y no doctrinal: mejora la naturalidad y la precisión léxica en español. «Nombre honrado» representa mejor ἔντιμον que «nombre honorable», y «en gloria» sigue más de cerca ἐν δόξῃ y la decisión final del audit trail inglés. Se conserva «en lugar de su exaltación» porque refleja adecuadamente ἀντὶ ὕψους αὐτῶν sin importar la interpretación previa de «arrogancia».'
