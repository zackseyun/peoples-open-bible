translation:
  language: es
  text: Y castigaré al mundo por su maldad[a], y a los impíos por su iniquidad; pondré fin a la soberbia de los arrogantes[b], y humillaré la altivez de los despiadados.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «la tierra habitada» por «el mundo».
    reason: lexical_alternative
  - marker: b
    text: O «humillaré la soberbia de los despiadados». El hebreo usa dos expresiones casi sinónimas para la exaltación orgullosa en líneas paralelas.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּפָקַדְתִּי
  english_pob_choice: I will punish
  chosen_spanish: castigaré
  alternatives_spanish:
  - visitaré
  - llamaré a cuenta
  - tomaré cuenta de
  lexicon: HALOT
  rationale: פָקַד en este contexto judicial tiene fuerza punitiva. «Castigaré» comunica de manera natural en español esa visita de juicio sin perder el valor de rendición de cuentas.
- source_word: תֵּבֵל
  english_pob_choice: the world
  chosen_spanish: el mundo
  alternatives_spanish:
  - la tierra habitada
  - la tierra
  lexicon: HALOT
  rationale: «El mundo» conserva el alcance amplio y no restringe indebidamente el término a una región específica.
- source_word: רָעָה
  english_pob_choice: its evil
  chosen_spanish: su maldad
  alternatives_spanish:
  - su mal
  - su malicia
  - su perversidad
  lexicon: HALOT
  rationale: En el paralelismo con «los impíos» y «su iniquidad», aquí רָעָה expresa mal moral. «Maldad» mantiene ese peso ético en español y funciona bien con el posesivo implícito del hebreo.
- source_word: רְשָׁעִים
  english_pob_choice: the wicked
  chosen_spanish: los impíos
  alternatives_spanish:
  - los malvados
  - los perversos
  - los injustos
  lexicon: HALOT
  rationale: «Impíos» es un equivalente bíblico claro para רְשָׁעִים y conserva el carácter moral/religioso del grupo sin volverlo demasiado coloquial.
- source_word: עֲוֺנָם
  english_pob_choice: their iniquity
  chosen_spanish: su iniquidad
  alternatives_spanish:
  - su culpa
  - su pecado
  lexicon: HALOT
  rationale: «Iniquidad» reproduce el tenor moral y jurídico del hebreo y empareja bien con el término previo de maldad.
- source_word: וְהִשְׁבַּתִּי
  english_pob_choice: I will put an end to
  chosen_spanish: pondré fin a
  alternatives_spanish:
  - haré cesar
  - haré que cese
  - acabaré con
  lexicon: HALOT
  rationale: El hifil de שׁבת indica causar el cese. «Pondré fin a» es idiomático y conserva la idea de cesación provocada por Dios.
- source_word: גְּאוֹן
  english_pob_choice: the pride
  chosen_spanish: la soberbia
  alternatives_spanish:
  - el orgullo
  - la exaltación
  - la altivez
  lexicon: HALOT
  rationale: Aquí el matiz es de autoexaltación culpable. «Soberbia» conserva mejor ese tono moral que «orgullo».
- source_word: זֵדִים
  english_pob_choice: the arrogant
  chosen_spanish: los arrogantes
  alternatives_spanish:
  - los insolentes
  - los presuntuosos
  - los soberbios
  lexicon: HALOT
  rationale: «Arrogantes» es un equivalente directo y claro en español para זֵדִים, manteniendo la relación semántica con «soberbia».
- source_word: וְגַאֲוַת
  english_pob_choice: the haughtiness
  chosen_spanish: la altivez
  alternatives_spanish:
  - la haughtiness
  - la soberbia
  - la arrogancia
  lexicon: HALOT
  rationale: Se distingue deliberadamente de גְּאוֹן para reflejar la repetición con variación del hebreo. «Altivez» conserva la elevación orgullosa sin repetir el mismo término.
- source_word: עָרִיצִים
  english_pob_choice: the ruthless
  chosen_spanish: los violentos
  alternatives_spanish:
  - los crueles
  - los tiranos
  - los despiadados
  lexicon: HALOT
  rationale: עָרִיץ suele referirse a opresores violentos y crueles. «Violentos» captura bien la fuerza opresiva del término en español, sin forzarlo a un matiz exclusivamente político.
- source_word: אַשְׁפִּיל
  english_pob_choice: I will humble
  chosen_spanish: humillaré
  alternatives_spanish:
  - rebajaré
  - abatiré
  - bajaré
  lexicon: HALOT
  rationale: El hifil de שׁפל expresa hacer bajar o humillar. «Humillaré» es natural y mantiene la imagen de abatimiento judicial.
theological_decisions:
- issue: Alcance del juicio divino sobre תֵּבֵל
  english_pob_reading: the verse speaks of God's judgment on the world in its inhabited, human order, not merely on Babylon in isolation
  chosen_spanish_reading: el versículo habla del juicio de Dios sobre el mundo en su orden humano habitado, no solo sobre Babilonia de manera aislada
  alternative_spanish_readings:
  - la tierra
  - Babilonia sola como sinécdoque del mundo
  rationale: Aunque el oráculo inmediato se dirige a Babilonia, תֵּבֵל y el lenguaje moral universal amplían el alcance. La traducción preserva esa amplitud sin cerrarla interpretativamente.
  doctrine_reference: Preservar la tensión teológica sin resolverla
- issue: Paralelismo de dos términos de exaltación orgullosa
  english_pob_reading: The Hebrew uses two near-synonymous expressions for arrogant exaltation in parallel lines.
  chosen_spanish_reading: El hebreo usa dos expresiones casi sinónimas para una exaltación arrogante en líneas paralelas.
  alternative_spanish_readings:
  - una repetición enfática sin matiz
  - dos palabras distintas para el mismo orgullo
  rationale: 'Se conserva la duplicación retórica del hebreo mediante dos pares diferentes: «soberbia de los arrogantes» y «altivez de los violentos». No se fusionan los términos, para no perder la intensidad paralela del texto.'
  doctrine_reference: Respeta el paralelismo poético del texto hebreo
translation_notes:
  revision_awareness: 'Alineado con la última revisión: el pasaje quedó sin cambios sustantivos en el pasaje inglés auditado y el veredicto de concordancia fue alto. La versión española sigue esa lectura estable, manteniendo el alcance amplio de תֵּבֵל, el valor punitivo de פָקַד y el paralelismo de los dos miembros finales.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» solo cuando el texto base lo requiera; en este versículo no aparece el nombre divino explícito.
  - Se conserva un registro bíblico moderno y digno, evitando arcaísmos innecesarios.
  - Se diferencian con matiz «soberbia» y «altivez» para reproducir el paralelismo hebreo sin uniformarlo.
  - «Impíos» e «iniquidad» se usan de forma coherente con el registro moral-jurídico del original.
