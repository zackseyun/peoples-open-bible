base_translation:
  language: en
  yaml_path: translation/ot/1_samuel/013/004.yaml
  text: And all Israel heard it said[a], “Saul has struck down the Philistine garrison[c][b], and Israel has also become odious to the Philistines.” Then the people were called out to join Saul at Gilgal.
  footnotes:
  - marker: a
    text: Or “the Philistine prefect/governor” or “the Philistine outpost.” The Hebrew term can refer either to an official or to a stationed garrison; the military context favors “garrison.”
    reason: lexical_alternative
  - marker: b
    text: Literally “Israel had become a stench to the Philistines,” an idiom meaning Israel had become detestable or odious to them.
    reason: lexical_alternative
  - marker: c
    text: Or “the people were called together after Saul at Gilgal.” The Hebrew expression likely refers to mustering the people to follow Saul in battle.
    reason: lexical_alternative
