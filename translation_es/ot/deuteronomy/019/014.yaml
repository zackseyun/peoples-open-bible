    text: O «límite» o «lindero». El hebreo se refiere al límite de la propiedad, representado por una señal o marcador fijo.
    reason: lexical_alternative
  revision_rationale: Se ajusta «lindero» a «mojón» para reflejar mejor el objeto físico implícito en el contexto legal y explicitado por el POB inglés; la nota conserva las alternativas españolas. Se cambia «los primeros» por «las generaciones anteriores» para corresponder al valor de רִאשֹׁנִים según la documentación léxica. También se prefiere «desplazarás» por mayor naturalidad jurídica y mejor matiz de alteración del límite sin sobretraducir. No se requiere adjudicación superior porque son mejoras léxicas y estilísticas de baja complejidad doctrinal.
