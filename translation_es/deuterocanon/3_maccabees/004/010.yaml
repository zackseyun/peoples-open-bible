translation:
  language: es
  text: y con el entablado denso de encima dispuesto de modo que, con los ojos oscurecidos por todos lados, recibieran un trato propio de conspiradores[a] durante toda la travesía.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O bien: «recibieran un traslado como el de conspiradores durante toda la travesía». El griego puede referirse al modo de conducción o traslado, no solo al trato recibido; ἐπιβόλων tiene sentido peyorativo, como «conspiradores», «complotadores» o, más ampliamente, «hombres peligrosos».'
    reason: lexical_alternative
lexical_decisions:
- source_word: καθύπερθε
  english_pob_choice: above
  chosen_spanish: de arriba
  alternatives_spanish:
  - por encima
  - arriba
  lexicon: LSJ
  rationale: El adverbio indica ubicación superior; «de arriba» conserva la referencia espacial de forma natural en español sin añadir interpretación.
- source_word: πυκνῷ σανιδώματι
  english_pob_choice: dense planking
  chosen_spanish: el entablado denso
  alternatives_spanish:
  - el tablazón cerrado
  - el forrado de tablas apretadas
  lexicon: LSJ
  rationale: σανίδωμα nombra una estructura de tablas; πυκνός añade la idea de cercanía o espesura. «Entablado denso» conserva la imagen material con un registro digno y claro.
- source_word: διακειμένῳ
  english_pob_choice: arranged
  chosen_spanish: dispuesto
  alternatives_spanish:
  - colocado
  - preparado
  lexicon: LSJ
  rationale: El participio expresa el estado en que se encuentra el entablado y su disposición intencional. «Dispuesto» refleja esa configuración sin forzar el sentido.
- source_word: ὅπως πάντοθεν ἐσκοτισμένοι τοὺς ὀφθαλμούς
  english_pob_choice: so that, their eyes being darkened on every side
  chosen_spanish: de modo que, con los ojos oscurecidos por todos lados
  alternatives_spanish:
  - para que, con los ojos oscurecidos por todos lados
  - de manera que, cegados por todos lados
  lexicon: LSJ
  rationale: Se conserva la relación final y el participio resultativo. «Oscurecidos» mantiene la idea de privación de luz/visión sin exagerar hasta «cegados», que sería más fuerte que el griego.
- source_word: ἀγωγὴν
  english_pob_choice: transport
  chosen_spanish: un trato
  alternatives_spanish:
  - un traslado
  - una conducción
  - una travesía
  lexicon: LSJ
  rationale: En este contexto, con el complemento ἐπιβόλων, la frase no se reduce a mero movimiento geográfico. «Un trato» permite reproducir la carga de padecimiento o tratamiento impuesto que la lectura inglesa captó con «the treatment».
- source_word: ἐπιβόλων
  english_pob_choice: fit for plotters / conspirators
  chosen_spanish: propio de conspiradores
  alternatives_spanish:
  - de conspiradores
  - propio de hombres peligrosos
  - propio de complotados
  lexicon: LSJ
  rationale: El término es peyorativo y puede significar personas que maquinan o son tratadas como peligrosas. «Propio de conspiradores» conserva esa fuerza sin suavizarla a un término genérico.
- source_word: ἐν παντὶ τῷ κατάπλῳ
  english_pob_choice: throughout the whole voyage
  chosen_spanish: durante toda la travesía
  alternatives_spanish:
  - durante todo el viaje por mar
  - a lo largo de toda la navegación
  lexicon: LSJ
  rationale: κατάπλους se refiere al viaje por mar; «travesía» es idiomático en español y conserva el alcance temporal total indicado por ἐν παντὶ.
translation_notes:
  revision_awareness: 'La traducción inglesa auditada fue revisada para evitar una formulación como «receive a transport fit for plotters» y se prefirió «undergo the treatment of conspirators». La versión española sigue esa revisión: mantiene la estructura final, la oscuridad visual y el matiz peyorativo de ἐπιβόλων, sin volver a una lectura más literal pero menos clara del sustantivo ἀγωγή.'
  spanish_consistency_notes:
  - Se mantiene «travesía» para κατάπλους por coherencia con el contexto marítimo.
  - Se conserva el registro impersonal y sintácticamente compacto del griego mediante participios y proposiciones finales.
  - No se introduce terminología eclesiástica ajena al pasaje; el tono es narrativo-descriptivo.
