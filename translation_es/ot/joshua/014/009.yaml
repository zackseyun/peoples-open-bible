translation:
  language: es
  text: 'Moisés juró ese día, diciendo: «Ciertamente[a] la tierra sobre la cual ha pisado tu pie será heredad para ti y para tus hijos[b] para siempre, porque has seguido plenamente a Yahvé mi Dios».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo idiomático: «si no», usado aquí como fórmula enfática de juramento; por eso se traduce «Ciertamente».'
    reason: lexical_alternative
  - marker: b
    text: O «y para tus descendientes». El hebreo dice «tus hijos».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּשָּׁבַע
  english_pob_choice: swore
  chosen_spanish: juró
  alternatives_spanish:
  - hizo un juramento
  - solemnemente juró
  lexicon: HALOT
  rationale: שׁבע expresa jurar o prestar juramento. «Juró» es natural en español y conserva el peso solemne del acto.
- source_word: בַּיּוֹם הַהוּא
  english_pob_choice: on that day
  chosen_spanish: en aquel día
  alternatives_spanish:
  - ese día
  - aquel día
  lexicon: HALOT
  rationale: La expresión temporal se mantiene de forma directa. «En aquel día» refleja bien el hebreo con un tono bíblico sobrio.
- source_word: לֵאמֹר
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - declarando
  lexicon: HALOT
  rationale: Es la fórmula estándar de introducción del discurso directo; «diciendo» es transparente y fiel.
- source_word: אִם לֹא
  english_pob_choice: Surely
  chosen_spanish: Ciertamente
  alternatives_spanish:
  - de veras
  - sin duda
  lexicon: HALOT
  rationale: En fórmulas de juramento, אִם לֹא funciona como afirmación enfática y no como condición literal. «Ciertamente» comunica esa fuerza asseverativa en español sin perder el matiz.
- source_word: הָאָרֶץ אֲשֶׁר דָּרְכָה רַגְלְךָ בָּהּ
  english_pob_choice: the land on which your foot has trodden
  chosen_spanish: la tierra sobre la cual ha pisado tu pie
  alternatives_spanish:
  - la tierra sobre la cual tu pie ha hollado
  - la tierra donde tu pie ha pisado
  lexicon: HALOT
  rationale: Se conserva la imagen concreta del pie que pisa la tierra. «Ha pisado» es claro y fiel; aunque «ha hollado» sería más formal, «pisado» evita un calco demasiado pesado. Mantengo el singular «tu pie» como en el hebreo.
- source_word: תִהְיֶה לְךָ לְנַחֲלָה
  english_pob_choice: shall be an inheritance for you
  chosen_spanish: será heredad para ti
  alternatives_spanish:
  - será tu heredad
  - te pertenecerá como heredad
  lexicon: HALOT
  rationale: נַחֲלָה se refiere a una posesión heredada, especialmente en contexto de reparto territorial. «Heredad» conserva ese valor covenantal y territorial con buena naturalidad en español bíblico.
- source_word: וּלְבָנֶיךָ
  english_pob_choice: and for your sons
  chosen_spanish: y para tus hijos
  alternatives_spanish:
  - y para tus descendientes
  - y para tus hijos varones
  lexicon: HALOT
  rationale: El hebreo dice literalmente «tus hijos/sons». En español, «hijos» comunica de modo natural el valor filial sin forzar una lectura exclusivamente masculina en una fórmula patrimonial, aunque se reconoce la forma masculina del original.
- source_word: עַד עוֹלָם
  english_pob_choice: forever
  chosen_spanish: para siempre
  alternatives_spanish:
  - por siempre
  - perpetuamente
  lexicon: HALOT
  rationale: Es un equivalente idiomático claro para duración indefinida. «Para siempre» preserva la amplitud del hebreo de manera digna y comprensible.
- source_word: כִּי מִלֵּאתָ אַחֲרֵי
  english_pob_choice: because you have fully followed
  chosen_spanish: porque has seguido plenamente
  alternatives_spanish:
  - porque has seguido de todo corazón
  - porque has seguido por completo
  lexicon: HALOT
  rationale: La expresión idiomática מלא אחרי significa seguir de manera completa o íntegra. «Has seguido plenamente» conserva la fuerza del hebreo sin sonar forzado en español.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  lexicon: HALOT
  rationale: 'Se sigue la terminología española del proyecto para el Tetragrámaton: «Yahvé». Preserva el nombre propio del pacto y evita la sustitución por un título.'
- source_word: אֱלֹהָי
  english_pob_choice: my God
  chosen_spanish: mi Dios
  alternatives_spanish:
  - mi Dios
  lexicon: HALOT
  rationale: El sufijo posesivo de primera persona debe conservarse. «Mi Dios» refleja con exactitud la relación posesiva en boca de Moisés.
theological_decisions:
- issue: Uso del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  rationale: El hebreo presenta directamente el Tetragrámaton, no un título sustituido. La norma española del proyecto es «Yahvé», que mantiene el nombre propio del Dios del pacto y conserva la transparencia frente al texto fuente.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Fuerza del juramento en אִם לֹא
  english_pob_reading: Surely
  chosen_spanish_reading: Ciertamente
  alternative_spanish_readings:
  - Sin duda
  - De veras
  rationale: En contexto de juramento, la construcción hebrea expresa una afirmación enfática. «Ciertamente» evita una traducción condicional literal y comunica el valor asseverativo sin exagerarlo.
  doctrine_reference: DOCTRINE.md Translation philosophy §3
- issue: Valor de וּלְבָנֶיךָ
  english_pob_reading: and for your sons
  chosen_spanish_reading: y para tus hijos
  alternative_spanish_readings:
  - y para tus descendientes
  - y para tus hijos varones
  rationale: El hebreo es masculino plural. En español, «hijos» es una forma natural que conserva la referencia filial y la amplitud hereditaria sin introducir una restricción adicional innecesaria.
  doctrine_reference: DOCTRINE.md Translation philosophy §4
translation_notes:
  revision_awareness: La versión inglesa más reciente ajustó «has walked» a «has trodden» para acercarse más al verbo hebreo. En español se optó por «ha pisado», que mantiene la imagen concreta del pie sobre la tierra y suena natural; no se añadió ningún matiz interpretativo ajeno al texto. También se preservó el nombre divino como «Yahvé», de acuerdo con la terminología española del proyecto.
  spanish_consistency_notes:
  - Se mantiene la secuencia narrativa con verbo inicial en pasado («juró») y discurso directo entre comillas angulares.
  - «Heredad» se usa para conservar el matiz territorial y de asignación por sorteo/inherencia del hebreo נַחֲלָה.
  - Se conservó el singular «tu pie» para reflejar con precisión la forma hebrea.
  - Se evitó «SEÑOR» para no ocultar el Tetragrámaton.
  - «Para siempre» reproduce bien עַד עוֹלָם en español bíblico contemporáneo.
