translation:
  language: es
  text: Entonces Gedeón tomó diez hombres de entre sus siervos e hizo como Yahvé le había hablado. Pero, porque temía a la casa de su padre y a los hombres de la ciudad como para hacerlo de día[a], lo hizo de noche.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más literalmente: ''de hacerlo de día''; el sentido es que su temor le impedía hacerlo durante el día.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּקַּח
  english_pob_choice: took
  chosen_spanish: tomó
  alternatives_spanish:
  - seleccionó
  - escogió
  lexicon: HALOT
  rationale: לקח en narración básica expresa tomar; en español, 'tomó' es directo, natural y conserva el movimiento narrativo del hebreo sin añadir matices no presentes.
- source_word: עֲשָׂרָה אֲנָשִׁים
  english_pob_choice: ten men
  chosen_spanish: diez hombres
  alternatives_spanish:
  - diez personas
  lexicon: HALOT
  rationale: El hebreo dice explícitamente 'hombres', no un término genérico. En español se mantiene la referencia masculina plural para reflejar con precisión el texto fuente.
- source_word: מֵעֲבָדָיו
  english_pob_choice: from among his servants
  chosen_spanish: de entre sus siervos
  alternatives_spanish:
  - de sus siervos
  - de entre sus esclavos
  lexicon: HALOT
  rationale: Se conserva el valor partitivo de מִן con 'de entre'. 'Siervos' sigue la decisión contextual del POB inglés, donde no se enfatiza un estatus de esclavitud sino la pertenencia al grupo doméstico de Gedeón.
- source_word: וַיַּעַשׂ
  english_pob_choice: did
  chosen_spanish: hizo
  alternatives_spanish:
  - actuó
  - procedió
  lexicon: HALOT
  rationale: El verbo simple 'hizo' reproduce la acción obediente sin sobredeterminarla; enlaza bien con la cláusula de obediencia posterior.
- source_word: כַּאֲשֶׁר דִּבֶּר אֵלָיו יְהוָה
  english_pob_choice: as Yahweh had spoken to him
  chosen_spanish: como Yahvé le había hablado
  alternatives_spanish:
  - como Yahvé le había dicho
  - según Yahvé le había hablado
  lexicon: HALOT
  rationale: Se respeta el paralelo formal entre el hablar divino y la ejecución de Gedeón. 'Hablado' traduce דִּבֶּר de manera fiel y 'Yahvé' preserva el nombre divino según el criterio del proyecto.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  lexicon: HALOT
  rationale: 'El Tetragrámaton se vierte conforme al estándar español del proyecto: ''Yahvé''. Esto evita la sustitución por un título y mantiene el nombre personal divino.'
- source_word: יָרֵא
  english_pob_choice: feared
  chosen_spanish: temía
  alternatives_spanish:
  - tenía miedo de
  - le daba temor
  lexicon: HALOT
  rationale: En este contexto el temor es humano y concreto. 'Temía' es natural en español y conserva la fuerza del verbo sin introducir una emoción más intensa de la que el texto exige.
- source_word: בֵּית אָבִיו
  english_pob_choice: his father's household
  chosen_spanish: la casa de su padre
  alternatives_spanish:
  - el hogar de su padre
  - la familia de su padre
  lexicon: HALOT
  rationale: '''Casa'' reproduce la metáfora social del hebreo y es más cercana al valor de בית que ''familia''. En español resulta idiomática y suficientemente amplia para abarcar el grupo doméstico.'
- source_word: אַנְשֵׁי הָעִיר
  english_pob_choice: the men of the city
  chosen_spanish: los hombres de la ciudad
  alternatives_spanish:
  - los ciudadanos
  - la gente de la ciudad
  lexicon: HALOT
  rationale: Se mantiene la referencia específica a varones, como en el hebreo. 'Hombres de la ciudad' conserva la forma y el posible peso social del grupo.
- source_word: מֵעֲשׂוֹת יוֹמָם
  english_pob_choice: too much to do it by day
  chosen_spanish: como para hacerlo de día
  alternatives_spanish:
  - de hacerla de día
  - para hacerlo de día
  lexicon: HALOT
  rationale: La construcción hebrea expresa prevención o impedimento por miedo. En español, 'como para hacerlo de día' comunica esa imposibilidad práctica sin forzar una paráfrasis más interpretativa. Se añade la nota textual para reflejar la alternativa más literal 'de hacerlo de día'.
- source_word: וַיַּעַשׂ לָיְלָה
  english_pob_choice: he did it at night
  chosen_spanish: lo hizo de noche
  alternatives_spanish:
  - lo hizo durante la noche
  lexicon: HALOT
  rationale: La contraposición día/noche se conserva con una fórmula natural y breve en español. 'Lo hizo de noche' es idiomático y mantiene el contraste narrativo.
theological_decisions:
- issue: Rendering the divine name יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  rationale: El texto hebreo usa directamente el nombre propio de Dios. En el español del POB se prefiere 'Yahvé' como forma pública y reconocible del Tetragrámaton, manteniendo la distinción entre nombre y título.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Interpretation of מֵעֲשׂוֹת יוֹמָם
  english_pob_reading: too much to do it by day
  chosen_spanish_reading: como para hacerlo de día
  alternative_spanish_readings:
  - de hacerlo de día
  - para hacerlo de día
  rationale: 'Se preserva la tensión semántica: no es solo una referencia temporal, sino un impedimento causado por el temor. La formulación española expresa la misma relación causal sin borrar el matiz de restricción del hebreo.'
  doctrine_reference: Lexical syntax of פחד/ירא with מִן + infinitive
- issue: Rendering of עֲבָדָיו
  english_pob_reading: from among his servants
  chosen_spanish_reading: de entre sus siervos
  alternative_spanish_readings:
  - de entre sus esclavos
  - de sus servidores
  rationale: La decisión evita imponer 'esclavos' donde el contexto no exige esclavitud jurídica. 'Siervos' mantiene el valor relacional/domstico y la partícula partitiva 'de entre' refleja la estructura hebrea.
  doctrine_reference: 'DOCTRINE.md Contested terms: עֶבֶד/עֲבָדִים'
translation_notes:
  revision_awareness: 'Se revisó el último pase y no hubo cambios sustanciales: el consenso fue de alta concordancia y el texto fuente no presenta variantes textuales relevantes para este versículo.'
  spanish_consistency_notes:
  - Se usa 'Yahvé' para יְהוָה conforme al estándar español del proyecto.
  - Se conserva el contraste 'de día / de noche' sin suavizar la oposición narrativa.
  - '''Siervos'' refleja la decisión contextual del POB inglés frente a alternativas más fuertes como ''esclavos''.'
  - Se mantiene la referencia masculina explícita ('hombres') como en el hebreo.
  - La nota al pie acompaña la expresión donde la estructura española puede ocultar la literalidad del infinitivo hebreo.
