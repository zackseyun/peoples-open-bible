revisions:
- from: Porque lo encontró en el campo[a]; la joven desposada gritó[b], y no había quien la rescatara.
  to: Porque la encontró en el campo[a]; la joven desposada gritó, pero no había quien la rescatara[b].
  rationale: Se corrige el error de sentido «lo encontró» a «la encontró» para reflejar fielmente el sufijo femenino del hebreo. También se mueve la nota [b] a la cláusula de rescate, donde pertenece según la auditoría inglesa, y se ajusta la conjunción a «pero» para una lectura española más natural del contraste contextual.
