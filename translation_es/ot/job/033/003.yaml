  rationale: Se conserva la estructura y el sentido del hebreo y de la revisión inglesa, pero se mejora la naturalidad del español cambiando «hablan conocimiento» por «expresan conocimiento». Se reubica la nota al adverbio correspondiente, porque las alternativas documentadas pertenecen a בָּרוּר («claramente / puro / llanamente»), no a «mis palabras».
