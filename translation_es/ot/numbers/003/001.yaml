review_pass:
  verdict: revise
  source_alignment_summary: El borrador refleja bien la estructura básica del hebreo y preserva correctamente «Yahvé», «Aarón y Moisés» y «en el día en que». Sin embargo, no sigue la decisión auditada principal para תּוֹלְדֹת, que en el POB inglés se mantuvo como «generations» para preservar el carácter formal del encabezado y la tensión interpretativa; «descendientes» la resuelve de forma demasiado estrecha. Además, el marcador [a] se usa indebidamente dos veces para dos notas distintas, y la nota sobre «habló» está anclada de manera incorrecta.
  spanish_quality_summary: El español es claro y eclesialmente legible, pero necesita un ajuste menor para mayor fidelidad y limpieza editorial. «Estos son las generaciones...» suena algo literal, por lo que conviene una formulación natural que conserve el tecnicismo de encabezado, como «Este es el registro de las generaciones...» o «Estas son las generaciones...». También debe corregirse el sistema de notas para que cada marcador sea único y esté anclado solo donde corresponde.
  glossary_alignment: Alineación buena en términos del proyecto para יְהוָה → «Yahvé» y nombres propios. No se alinea bien con la decisión terminológica documentada para תּוֹלְדֹת, que debe conservar la idea formal de «generaciones» más que interpretarla como «descendientes».
  issues:
  - severity: high
    issue: «descendientes» para תּוֹלְדֹת estrecha demasiado el encabezado
    rationale: La auditoría inglesa decidió conservar «the generations» precisamente para no resolver la tensión del hebreo. «Descendientes» interpreta el encabezado de forma más específica que la evidencia fuente y la rationale documentada.
  - severity: high
    issue: El marcador de nota [a] se reutiliza para dos notas distintas
    rationale: Las instrucciones requieren marcadores únicos en orden. En el borrador, [a] aparece en «descendientes» y otra vez en «habló», pero solo hay una nota con marcador a; esto es un error editorial claro.
  - severity: medium
    issue: La nota alternativa sobre el verbo debe anclarse al verbo o a la frase verbal, no compartir marcador con תּוֹלְדֹת
    rationale: La alternativa «habló a Moisés / habló con Moisés» corresponde a דִּבֶּר + אֶת מֹשֶׁה, no al sustantivo genealógico.
  - severity: low
    issue: La formulación española puede sonar más natural sin perder formalidad
    rationale: «Estas son las generaciones...» es posible, pero «Este es el registro de las generaciones...» fluye mejor en español moderno y conserva la función de encabezado; aun así, una corrección mínima puede mantener la cercanía al POB.
  revised_spanish_text: Estas son las generaciones[a] de Aarón y de Moisés, en el día en que Yahvé habló a Moisés[b] en el monte Sinaí[c].
  revised_footnotes:
  - marker: a
    text: O «los descendientes de Aarón y de Moisés». El encabezado hebreo usa «generaciones», una fórmula estándar que puede introducir una línea familiar o lo que procede de una persona.
    reason: lexical_alternative
  - marker: b
    text: O «habló con Moisés». La construcción hebrea puede expresarse en español como discurso dirigido a Moisés o como habla con Moisés.
    reason: alternative_reading
  - marker: c
    text: 'Hebreo: «en el día en que», un giro idiomático que también puede entenderse como «cuando» o «al tiempo en que».'
    reason: lexical_alternative
  revision_rationale: Se revisa para alinearse con la decisión lexical y teológica documentada para תּוֹלְדֹת, preservando «generaciones» en vez de resolverlo como «descendientes». También se corrigen los marcadores de notas para que sean únicos y se anclen a los elementos correctos del texto.
