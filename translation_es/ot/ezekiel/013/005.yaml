revisions:
- from: No subiste[a] a las brechas ni levantaste un muro para la casa de Israel, para que ella pudiera mantenerse firme en la batalla en el día de Yahvé.
  to: No subieron[a] a las brechas ni levantaron un muro para la casa de Israel, para que pudiera mantenerse firme en la batalla en el día de Yahvé.
  rationale: Se corrige la concordancia a segunda persona plural implícita en español («subieron… levantaron») para reflejar fielmente las formas hebreas plurales. Se mantiene «brechas», «muro», «batalla» y «Yahvé» por su buena alineación con el texto fuente y la política terminológica. Se elimina «ella» para mejorar la naturalidad del español sin pérdida de sentido.
