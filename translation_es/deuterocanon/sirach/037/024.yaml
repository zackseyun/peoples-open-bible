translation:
  language: es
  text: 'Bien y mal[a], vida y muerte: sobre todo ello domina la lengua.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Paralelo griego: «Un hombre sabio será colmado de bendición, y todos los que lo ven lo llamarán feliz». El griego aquí difiere sustancialmente del hebreo conservado.'
    reason: alternative_reading
lexical_decisions:
- source_word: טוב
  english_pob_choice: good
  chosen_spanish: bien
  alternatives_spanish:
  - bondad
  - lo bueno
  lexicon: HALOT
  rationale: En el par antitético טוב ורעה, el español 'bien' comunica de manera natural la amplitud moral y experiencial del término, sin restringirlo a prosperidad material.
- source_word: רעה
  english_pob_choice: evil
  chosen_spanish: mal
  alternatives_spanish:
  - maldad
  - calamidad
  - daño
  lexicon: HALOT
  rationale: La oposición fija con טוב pide en español 'mal' para conservar la polaridad directa y amplia del hebreo; 'calamidad' estrecharía el sentido.
- source_word: חיים
  english_pob_choice: life
  chosen_spanish: vida
  alternatives_spanish:
  - existencia
  lexicon: HALOT
  rationale: '''Vida'' es la equivalencia directa y mantiene la forma proverbial de la pareja con ''muerte''.'
- source_word: מות
  english_pob_choice: death
  chosen_spanish: muerte
  alternatives_spanish:
  - fallecimiento
  lexicon: HALOT
  rationale: '''Muerte'' preserva el merismo tradicional ''vida y muerte'' con naturalidad en español.'
- source_word: ומושלת
  english_pob_choice: rules
  chosen_spanish: domina
  alternatives_spanish:
  - rige
  - gobierna
  - se impone
  lexicon: HALOT
  rationale: El verbo משל expresa ejercicio de dominio o señorío. 'Domina' reproduce esa fuerza de control de forma idiomática y evita un matiz demasiado administrativo de 'gobierna'.
- source_word: בם כליל
  english_pob_choice: over them all
  chosen_spanish: sobre todo eso
  alternatives_spanish:
  - sobre todos ellos
  - completamente sobre ellos
  lexicon: HALOT
  rationale: 'La expresión indica alcance total. En español, ''sobre todo eso'' integra de modo natural la totalidad de los elementos enumerados: bien, mal, vida y muerte.'
- source_word: לשון
  english_pob_choice: the tongue
  chosen_spanish: la lengua
  alternatives_spanish:
  - la boca
  - el habla
  lexicon: HALOT
  rationale: Aunque el hebreo usa 'lengua' concretamente para el poder del habla, en español 'lengua' es la opción más directa y conserva la imagen sapiencial corporal sin volverla abstracta.
theological_decisions:
- issue: Divergencia entre el hebreo transmitido y el paralelo griego
  english_pob_reading: 'Translate the extant Hebrew as the primary text: ''Good and evil, life and death—over them all the tongue rules.'' The Greek reads instead: ''A wise man will be filled with blessing, and all who see him will call him happy.'''
  chosen_spanish_reading: 'Traducir el hebreo conservado como texto principal: ''Bien y mal, vida y muerte: sobre todo eso domina la lengua.'''
  alternative_spanish_readings:
  - '''Un hombre sabio será colmado de bendición, y todos los que lo ven lo llamarán feliz.'''
  rationale: Siguiendo la filosofía del proyecto para Sirácides, el hebreo existente tiene prioridad textual. El griego se mantiene como lectura paralela muy distinta en una nota, para no borrar la tensión textual documentada ni mezclar dos formas del dicho que no son verbalmente equivalentes.
  doctrine_reference: 'PHILOSOPHY.md: translate from Hebrew where Sirach survives; use Greek parallel as actual input without displacing the primary Hebrew witness.'
translation_notes:
  revision_awareness: El hebreo y el griego presentan una discrepancia sustancial; la versión española sigue el hebreo transmitido como texto principal y reserva el paralelo griego en nota, conforme al audit trail existente y sin intentar armonizarlos.
  spanish_consistency_notes:
  - Se conserva 'lengua' para לשון, en coherencia con el uso sapiencial concreto y con la decisión inglesa 'the tongue'.
  - Se usa 'bien/mal' en lugar de 'bueno/malo' porque el hebreo enumera sustantivos sustantivados; así se mantiene mejor la sintaxis y el paralelismo.
  - La puntuación con dos puntos y enumeración refleja el encadenamiento del hebreo y la clausula final de dominio total.
