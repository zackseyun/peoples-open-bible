  spanish_consistency_notes:
  - Se usa «Yahvé» para el Tetragrámaton, en coherencia con el estándar del proyecto.
  - «Personas» se mantiene como término de conteo humano para נֶפֶשׁ en ambos lugares del versículo.
  - «Tributo» conserva el sentido de porción evaluada del botín, sin introducir un matiz eclesiástico ajeno al contexto.
