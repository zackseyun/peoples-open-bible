translation:
  language: es
  text: El amor constante y la verdad[a] se han encontrado; la justicia[b] y la paz se han besado.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «fidelidad» para «verdad» (אֱמֶת).
    reason: lexical_alternative
  - marker: b
    text: O «rectitud» para «justicia» (צֶדֶק).
    reason: lexical_alternative
lexical_decisions:
- source_word: חֶסֶד
  english_pob_choice: steadfast love
  chosen_spanish: misericordia
  alternatives_spanish:
  - amor constante
  - amor leal
  - amor firme
  lexicon: HALOT
  rationale: חֶסֶד expresa amor leal, relacional y de pacto. En español, «misericordia» es la opción más natural y reconocible en poesía bíblica, aunque no agota el matiz de fidelidad durable; por eso se preserva la tensión del término sin volverlo explicativo de más.
- source_word: אֱמֶת
  english_pob_choice: truth
  chosen_spanish: verdad
  alternatives_spanish:
  - fidelidad
  - fiabilidad
  lexicon: HALOT
  rationale: אֱמֶת puede significar verdad, fidelidad o confiabilidad. «Verdad» mantiene el paralelismo poético con el término anterior y conserva la amplitud semántica sin forzar una especificación de pacto que el verso no explicita.
- source_word: נִפְגָּשׁוּ
  english_pob_choice: have met
  chosen_spanish: se han encontrado
  alternatives_spanish:
  - han llegado a encontrarse
  - se han reunido
  lexicon: HALOT
  rationale: El nifal perfecto plural de פגש transmite encuentro. «Se han encontrado» es idiomático en español y conserva el aspecto perfectivo del hebreo en una escena personificada.
- source_word: צֶדֶק
  english_pob_choice: righteousness
  chosen_spanish: justicia
  alternatives_spanish:
  - rectitud
  - justeza
  lexicon: HALOT
  rationale: צֶדֶק abarca justicia y rectitud. Aquí, por el paralelismo con שלום y por la tradición poética española, «justicia» comunica bien la cualidad moral y mantiene el paralelo con «paz»; el matiz de rectitud queda implícito.
- source_word: שָׁלוֹם
  english_pob_choice: peace
  chosen_spanish: paz
  alternatives_spanish:
  - plenitud
  - bienestar
  lexicon: HALOT
  rationale: שָׁלוֹם tiene un rango amplio, pero «paz» es la equivalencia más directa y transparente en español, especialmente en una personificación poética breve.
- source_word: נָשָׁקוּ
  english_pob_choice: have kissed
  chosen_spanish: se han besado
  alternatives_spanish:
  - se han besado entre sí
  - se han dado un beso
  lexicon: HALOT
  rationale: El verbo significa «besar». En español, con sujetos personificados plurales, «se han besado» preserva la imagen literal sin suavizarla hacia una paráfrasis como «se han unido» o «se han reconciliado».
theological_decisions:
- issue: Personificación de cualidades éticas y de pacto
  english_pob_reading: Retain the poetic personification literally ('have met,' 'have kissed')
  chosen_spanish_reading: Conservar literalmente la personificación («se han encontrado», «se han besado»).
  alternative_spanish_readings:
  - «se han unido armoniosamente»
  - «han quedado reconciliadas»
  rationale: El hebreo presenta estas realidades como agentes personificados. La versión española debe mantener esa imagen para no resolver la tensión poética ni convertirla en una explicación doctrinal más explícita que el texto.
  doctrine_reference: 'Translation philosophy: Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: Se corrigió la validación previa anclando las notas al texto con [a] y [b]. Se mantuvo la lectura poética literal del hebreo y la equivalencia auditada del POB inglés, sin añadir paráfrasis interpretativa.
  spanish_consistency_notes:
  - He mantenido un registro bíblico moderno y digno, con sintaxis natural en español.
  - Conservo la personificación de las abstracciones para reflejar el hebreo y el audit trail del POB inglés.
  - «Verdad»/«fidelidad» y «justicia»/«rectitud» quedan documentadas en notas para respetar las tensiones léxicas del original.
