id: 2TH.2.2
reference: 2 Thessalonians 2:2
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: εἰς τὸ μὴ ταχέως σαλευθῆναι ὑμᾶς ἀπὸ τοῦ νοὸς ⸀μηδὲ θροεῖσθαι μήτε διὰ πνεύματος μήτε διὰ λόγου μήτε δι’ ἐπιστολῆς ὡς δι’ ἡμῶν, ὡς ὅτι ἐνέστηκεν ἡ ἡμέρα τοῦ ⸀κυρίου.
base_translation:
  language: en
  yaml_path: translation/nt/2_thessalonians/002/002.yaml
  text: that you not be quickly shaken from your mind or alarmed[a], either by a spirit or by a message or by a letter as if from us[b], to the effect that the day of the Lord has come.
translation:
  language: ko
  text: 어떤 영을 통해서든, 어떤 말을 통해서든, 우리에게서 온 것처럼 보이는 어떤 편지를 통해서든, 주의 날이 이미 이르렀다는[b] 취지의 말로 여러분의 마음[a]이 쉽게 흔들리거나 놀라지 않도록 부탁드립니다.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 헬라어 νοῦς는 안정된 사고·이해를 가리킨다. 「마음」으로 옮기며 「판단/제정신」의 의미도 함축된다.
    reason: lexical_alternative
  - marker: b
    text: 또는 「이미 와 있다」. 헬라어 완료 ἐνέστηκεν은 주의 날이 이미 도착해 현존한다는 거짓 주장이다.
    reason: alternative_reading
lexical_decisions:
- source_word: ταχέως σαλευθῆναι
  english_pob_choice: be quickly shaken
  chosen_korean: 쉽게 흔들리거나
  alternatives_korean:
  - 속히 흔들리거나
  - 빨리 동요되거나
  lexicon: BDAG
  rationale: ταχέως는 시간적 「곧」보다는 「쉽게/금세」 흔들리는 정도를 가리킨다. 「쉽게」가 본문의 경고적 정황을 자연스럽게 표현한다.
- source_word: ἀπὸ τοῦ νοὸς
  english_pob_choice: from your mind
  chosen_korean: 여러분의 마음
  alternatives_korean:
  - 여러분의 이성
  - 여러분의 평정
  lexicon: BDAG
  rationale: νοῦς는 안정된 사고와 판단을 가리키나 한국어 「마음」이 가장 포괄적이다. 직역에 가까우면서 의미를 가리지 않는다.
- source_word: θροεῖσθαι
  english_pob_choice: alarmed
  chosen_korean: 놀라지
  alternatives_korean:
  - 동요하지
  - 두려워하지
  lexicon: BDAG
  rationale: 정서적 충격을 자연스럽게 표현한다.
- source_word: πνεύματος
  english_pob_choice: a spirit
  chosen_korean: 어떤 영
  alternatives_korean:
  - 어떤 영적 발언
  - 성령
  lexicon: BDAG
  rationale: 무관사 πνεῦμα는 본문 정황상 거짓 예언적 영을 가리킬 가능성이 높다. 「어떤 영」으로 본문의 문자성을 보존한다.
- source_word: λόγου
  english_pob_choice: a message
  chosen_korean: 어떤 말
  alternatives_korean:
  - 어떤 말씀
  - 어떤 가르침
  lexicon: BDAG
  rationale: 구두 가르침/소문을 가리키며 「편지」와 대조된다.
- source_word: ἐπιστολῆς
  english_pob_choice: a letter
  chosen_korean: 어떤 편지
  alternatives_korean:
  - 어떤 서신
  lexicon: BDAG
  rationale: 현대 한국어로 자연스러운 표현.
- source_word: ὡς δι’ ἡμῶν
  english_pob_choice: as if from us
  chosen_korean: 우리에게서 온 것처럼 보이는
  alternatives_korean:
  - 우리에게서 온 듯한
  - 마치 우리를 통한 것처럼
  lexicon: BDAG
  rationale: 바울과 동역자들의 권위를 사칭하는 거짓 주장임을 명확히 표현한다.
- source_word: ἐνέστηκεν ἡ ἡμέρα τοῦ κυρίου
  english_pob_choice: the day of the Lord has come
  chosen_korean: 주의 날이 이미 이르렀다
  alternatives_korean:
  - 주의 날이 와 있다
  - 주의 날이 임했다
  lexicon: BDAG
  rationale: 완료 시제의 「이미 와서 현존함」을 「이미 이르렀다」로 자연스럽게 표현한다. 「주」는 표준 글로서리.
- source_word: ὡς ὅτι
  english_pob_choice: to the effect that
  chosen_korean: ~다는 취지의 말로
  alternatives_korean:
  - ~다고
  - ~라는 식으로
  lexicon: BDAG
  rationale: 거짓 주장의 내용을 도입하는 ὡς ὅτι를 자연스럽게 표현한다.
theological_decisions:
- issue: ἐνέστηκεν의 의미
  chosen_reading: 이미 이르렀다(완료된 현재 상태)
  alternative_readings:
  - 이미 와 있다
  - 임박했다
  rationale: 완료 시제는 사건이 이미 도착해 현존함을 가리킨다. 본문은 거짓 가르침이 주의 날을 「이미 현재」로 주장함을 폭로한다. 「임박했다」 해석은 본문의 시제와 어긋난다.
  doctrine_reference: 'Translation philosophy §3'
- issue: πνεύματος의 의미
  chosen_reading: 어떤 영(예언적 영적 발언)
  alternative_readings:
  - 어떤 영적 발언
  - 성령
  rationale: 무관사 명사는 본문 정황상 거짓 예언적 영을 가리키며, 성령 자신을 가리키는 것이 아니다. 직역적 「어떤 영」을 본문에 둔다.
  doctrine_reference: 'Translation philosophy §3'
