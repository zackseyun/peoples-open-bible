- from: ¿Qué ventaja tiene un hombre[a] en todo su trabajo con que se afana debajo del sol?
  to: ¿Qué ventaja tiene un hombre[a] de todo su trabajo en que se afana bajo el sol?
  rationale: Se ajustan preposiciones y sintaxis para reflejar mejor la relación entre 'ventaja' y la labor, mejorar la naturalidad del relativo, y usar una formulación española más idiomática para la frase fija de Eclesiastés, sin alterar la decisión teológica ni el tono del original.
  reviewer_model: gpt-5.4
