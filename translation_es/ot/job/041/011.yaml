translation:
  language: es
  text: De su boca salen antorchas; saltan chispas de fuego[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «brazas encendidas» / «dardos ardientes de fuego» para la expresión rara traducida aquí «chispas de fuego».'
    reason: lexical_alternative
lexical_decisions:
- source_word: מִפִּיו
  english_pob_choice: From his mouth
  chosen_spanish: De su boca
  alternatives_spanish:
  - De la boca de él
  - Desde su boca
  lexicon: HALOT
  rationale: La preposición מִן con פֶּה y sufijo posesivo pide en español una procedencia natural. "De su boca" conserva la imagen y evita una construcción forzada; "su" mantiene el efecto de personificación del hebreo sin necesidad de explicitar "de él".
- source_word: לַפִּידִים
  english_pob_choice: torches
  chosen_spanish: antorchas
  alternatives_spanish:
  - teas
  - llamas
  - brasas encendidas
  lexicon: HALOT
  rationale: לַפִּידִים suele designar antorchas o haces encendidos. "Antorchas" conserva el objeto concreto y el campo visual de fuego proyectado. "Llamas" es más general y perdería especificidad; "brasas encendidas" y "teas" suenan menos naturales en español bíblico contemporáneo.
- source_word: יַהֲלֹכוּ
  english_pob_choice: go out
  chosen_spanish: salen
  alternatives_spanish:
  - salen hacia afuera
  - van saliendo
  - salen de allí
  lexicon: HALOT
  rationale: El hebreo expresa movimiento de salida; en español, "salen" comunica de manera natural la emergencia del fuego desde la boca. Mantiene la direccionalidad sin añadir matices no presentes en el texto.
- source_word: כִּידֹדֵי אֵשׁ
  english_pob_choice: sparks of fire
  chosen_spanish: chispas de fuego
  alternatives_spanish:
  - centellas de fuego
  - chispazos de fuego
  - brasas de fuego
  lexicon: HALOT
  rationale: La expresión es rara y su sentido exacto es debatido, pero el paralelismo inmediato favorece una imagen de partículas ígneas o destellos. "Chispas de fuego" es la forma más clara y natural en español, conservando la ambigüedad poética sin forzar un sentido militar.
- source_word: יִתְמַלָּטוּ
  english_pob_choice: leap forth
  chosen_spanish: saltan
  alternatives_spanish:
  - brotan
  - salen disparadas
  - escapan
  lexicon: HALOT
  rationale: El verbo puede sugerir escapar o salir con rapidez, pero aquí funciona en una imagen vívida de proyección ígnea. "Saltan" conserva el dinamismo y la inmediatez del hebreo en español idiomático. "Escapan" enfatizaría demasiado la idea de librarse de algo.
translation_notes:
  revision_awareness: El hebreo poético de Job 41:11 fue verificado con la glosa y la decisión léxica inglesa ya acordadas; no hay cambios textuales posteriores en la revisión más reciente, y la versión española sigue de cerca la imaginería del original sin depender mecánicamente del inglés.
  spanish_consistency_notes:
  - Se conservó el singular posesivo implícito en «su» para reflejar la personificación masculina del hebreo.
  - Se mantuvo una equivalencia dinámica-controlada para el verbo final, evitando «escapan» porque en español sugiere fuga más que proyección repentina.
  - La nota textual alternativa se ancla solo en la expresión rara, no en «antorchas» ni en «salen», para preservar la tensión léxica documentada.
