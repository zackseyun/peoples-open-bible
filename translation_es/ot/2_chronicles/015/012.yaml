translation:
  language: es
  text: Y entraron en el pacto para buscar a Yahvé[a], el Dios de sus padres[b], con todo su corazón y con toda su alma.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «se comprometieron por pacto».'
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «el Dios de sus padres»; es decir, el Dios del pacto adorado por sus padres.'
    reason: cultural_note
lexical_decisions:
- source_word: וַיָּבֹאוּ
  english_pob_choice: they entered into
  chosen_spanish: entraron en
  alternatives_spanish:
  - entraron en el pacto
  - se metieron en
  lexicon: HALOT
  rationale: El verbo בוא puede significar 'venir', 'ir' o 'entrar'. En español, con la frase preposicional siguiente, 'entraron en el pacto' expresa con naturalidad la acción pactal sin perder el sentido de incorporación o compromiso. 'Se metieron en' sería demasiado coloquial y 'entraron en' mantiene la sobriedad del texto.
- source_word: בַּבְּרִית
  english_pob_choice: the covenant
  chosen_spanish: el pacto
  alternatives_spanish:
  - el convenio
  - la alianza
  lexicon: HALOT
  rationale: El contexto es una decisión formal de compromiso comunitario. 'Pacto' es el término español más fiel y más ampliamente inteligible para el hebreo בְּרִית. 'Alianza' podría funcionar, pero en español bíblico suele sonar más interpretativo o tradicional; 'pacto' conserva mejor la referencia contractual-covenantal.
- source_word: לִדְרוֹשׁ
  english_pob_choice: to seek
  chosen_spanish: buscar
  alternatives_spanish:
  - buscar a
  - inquirir de
  lexicon: HALOT
  rationale: En contextos religiosos, דרש expresa la búsqueda reverente de Dios. En español, 'buscar a Yahvé' comunica ese sentido con naturalidad y sin reducirlo a mera curiosidad intelectual. 'Inquirir de' sería más formal, pero menos directo para lectores actuales.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  lexicon: HALOT
  rationale: El Tetragrámaton se vierte como 'Yahvé' para preservar el nombre divino en español de modo claro y pronunciable, de acuerdo con la política del proyecto. 'Yahweh' es la forma inglesa/transliterada del audit trail, pero en español 'Yahvé' es la elección natural y coherente del mismo principio.
- source_word: אֱלֹהֵי אֲבוֹתֵיהֶם
  english_pob_choice: the God of their fathers
  chosen_spanish: el Dios de sus padres
  alternatives_spanish:
  - el Dios de sus antepasados
  - el Dios de sus padres
  lexicon: HALOT
  rationale: La construcción hebrea identifica a Yahvé como el Dios del linaje ancestral del pueblo. 'El Dios de sus padres' reproduce con fidelidad la fórmula bíblica y mantiene la resonancia de continuidad pactal. 'Antepasados' aclararía el sentido, pero suaviza la forma concreta del hebreo.
- source_word: בְּכָל לְבָבָם
  english_pob_choice: with all their heart
  chosen_spanish: con todo su corazón
  alternatives_spanish:
  - de todo corazón
  - con todo su corazón
  lexicon: HALOT
  rationale: 'לֵבָב se refiere al centro interior de la persona: voluntad, intención y pensamiento. ''Con todo su corazón'' es la equivalencia idiomática más fiel en español para esta fórmula bíblica establecida, y conserva el lenguaje integral del compromiso.'
- source_word: וּבְכָל נַפְשָׁם
  english_pob_choice: and with all their soul
  chosen_spanish: y con toda su alma
  alternatives_spanish:
  - y con toda su vida
  - y con todo su ser
  lexicon: HALOT
  rationale: נֶפֶשׁ puede significar 'alma', 'vida' o 'ser'. Aquí la fórmula paralela 'corazón/alma' preserva el paralelismo hebreo tradicional y el sentido de entrega total. 'Alma' mantiene la tensión lexical entre vida y persona sin banalizarla.
theological_decisions:
- issue: Divine name יְהוָה in Spanish
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  rationale: El texto hebreo usa el nombre propio del Dios del pacto. La traducción española conserva ese nombre como 'Yahvé' en vez de ocultarlo con un título, para mantener la transparencia textual y la coherencia con la política del proyecto.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Gendered ancestral term אֲבוֹתֵיהֶם
  english_pob_reading: their fathers
  chosen_spanish_reading: sus padres
  alternative_spanish_readings:
  - sus antepasados
  rationale: El hebreo es explícitamente masculino plural ('padres'). Se mantiene esa forma en español porque expresa la continuidad histórica/pactual con los patriarcas y evita neutralizar indebidamente la referencia del original.
  doctrine_reference: DOCTRINE.md Translation philosophy §4 (Gender-accurate over gender-neutral)
translation_notes:
  revision_awareness: 'El pasaje coincide con el audit trail inglés en lectura y énfasis: verbo de entrada/pacto, finalidad de buscar a Yahvé, conservación del nombre divino y de la fórmula ancestral, sin cambios textuales pendientes tras la última revisión.'
  spanish_consistency_notes:
  - Se usó 'Yahvé' de manera consistente con la política del proyecto para יהוה.
  - Se prefirió 'pacto' para בְּרִית por su fuerza técnico-bíblica en español.
  - Se mantuvo el paralelismo 'corazón/alma' para conservar la estructura hebrea.
  - La forma 'sus padres' respeta el valor masculino explícito del hebreo y la continuidad generacional implícita.
