lexical_decisions:
- source_word: κληρονομία
  english_pob_choice: inheritance
  chosen_spanish: herencia
  alternatives_spanish:
  - heredad
  - patrimonio
  lexicon: BDAG
  rationale: κληρονομία designa una herencia o posesión hereditaria. «Herencia» conserva de manera directa el sentido legal y familiar, y es natural en español frente a la referencia a los hijos.
- source_word: οὐχ εὑρεθήσεται
  english_pob_choice: will not be found
  chosen_spanish: no será hallada
  alternatives_spanish:
  - no será encontrada
  - no permanecerá
  - no se obtendrá
  lexicon: BDAG
  rationale: El futuro pasivo de εὑρίσκω se vierte de forma transparente como «ser hallada». Esto mantiene la sobriedad del griego, sin convertirlo en una paráfrasis más explicativa que el original.
- source_word: τοῖς τέκνοις αὐτῶν
  english_pob_choice: by their children
  chosen_spanish: por sus hijos
  alternatives_spanish:
  - a sus hijos
  - entre sus hijos
  - para sus hijos
  lexicon: BDAG
  rationale: El dativo se mantiene amplio con «por», que en español puede expresar el agente o el referente relacionado con la búsqueda/hallazgo, sin forzar de antemano una relación de transmisión más explícita de lo que el griego dice. «Hijos» es el equivalente natural de τέκνα aquí.
translation_notes:
  revision_awareness: El texto inglés auditado fue revisado de «for their children» a «by their children» para reflejar con mayor naturalidad el dativo. La traducción española sigue ese ajuste con «por sus hijos», manteniendo la ambigüedad amplia del original griego y la lectura hereditaria del sustantivo «herencia».
  spanish_consistency_notes:
  - Se usa «herencia» para κληρονομία, coherente con el valor jurídico-familiar del término.
  - Se conserva la pasiva «ser hallada» para εὑρεθήσεται, evitando una paráfrasis interpretativa.
  - «Hijos» traduce τέκνα en un registro natural y general.
  - La nota al pie preserva la alternativa semántica sobre transmisión a los descendientes, como en el audit trail inglés.
