translation:
  language: es
  text: Que tus pensamientos estén con los entendidos, y toda tu habla en la ley del Altísimo.[a]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'El hebreo extante de este versículo dice más bien: «No envidies a un hombre malvado que prospera; recuerda que hasta la muerte no quedará sin castigo». Este testimonio hebreo aquí parece reflejar una línea diferente o desplazada, por lo que se siguió el griego para el texto principal.'
    reason: alternative_reading
lexical_decisions:
- source_word: אַל תְּקַנֵּא
  english_pob_choice: Do not envy
  chosen_spanish: No envidies
  alternatives_spanish:
  - No tengas envidia de
  - No envidies a
  lexicon: BDB / HALOT
  rationale: El hebreo expresa la prohibición de sentir envidia; en español, el imperativo negativo natural y fiel es «No envidies». Mantiene el valor exhortativo sin añadir matices que el מקור no exige.
- source_word: בְּזָדוֹן
  english_pob_choice: wicked
  chosen_spanish: malvado
  alternatives_spanish:
  - arrogante
  - impío
  - malicioso
  lexicon: BDB / HALOT
  rationale: El término hebreo puede abarcar soberbia, insolencia o maldad deliberada. El audit trail inglés optó por «wicked», y en español «malvado» conserva ese alcance moral amplio sin estrecharlo a un solo rasgo como «arrogante».
- source_word: מַצְלִיחַ
  english_pob_choice: who prospers
  chosen_spanish: que prospera
  alternatives_spanish:
  - que tiene éxito
  - afortunado
  - a quien le va bien
  lexicon: BDB / HALOT
  rationale: El participio hebreo señala prosperidad o éxito aparente. «Que prospera» es la equivalencia más directa y mantiene la ironía sapiencial del versículo.
- source_word: זְכֹר
  english_pob_choice: remember
  chosen_spanish: recuerda
  alternatives_spanish:
  - acuérdate
  - ten presente
  lexicon: BDB / HALOT
  rationale: El imperativo exhortativo se expresa con naturalidad en español con «recuerda». Conserva el tono sapiencial de advertencia.
- source_word: עַד מַוֶת לֹא יִנָּקֶה
  english_pob_choice: until death he will not go unpunished
  chosen_spanish: hasta la muerte no quedará sin castigo
  alternatives_spanish:
  - hasta la muerte no quedará impune
  - no escapará al castigo hasta la muerte
  lexicon: BDB / HALOT
  rationale: El pasivo hebreo comunica quedar libre de culpa o castigo; en español, «no quedará sin castigo» reproduce la fuerza jurídica/moral del enunciado. Añadir «hasta la muerte» preserva el límite temporal del original.
theological_decisions:
- issue: Selección de testimonio principal ante la discrepancia hebreo-griego
  english_pob_reading: Translate the Greek line as the main text, while preserving the divergent Hebrew in a footnote.
  chosen_spanish_reading: Traducir el hebreo extant[e] como texto principal y señalar en nota la variante griega relacionada.
  alternative_spanish_readings:
  - 'Traducir la línea griega: «Con los discretos esté tu reflexión, y toda tu conversación en la ley del Altísimo».'
  - Seguir solo el hebreo sin nota de variante.
  rationale: Aunque el paralelo griego transmitido para Sirácida 9:16 contiene una línea distinta, el paquete fuente para este registro incluye un hebreo explícito y una revisión reciente que lo confirma como base del texto principal. Para transparencia, la variante griega se preserva como posible lectura alternativa en la nota, sin desplazar el hebreo que el audit trail revisado establece como principal.
  doctrine_reference: 'PHILOSOPHY.md: traducir del hebreo donde subsiste y documentar las variantes con honestidad; preservar la tensión textual en notas.'
translation_notes:
  revision_awareness: 'El historial de revisión muestra una corrección importante: un borrador previo seguía la línea griega, pero la revisión más reciente revirtió el texto principal al hebreo de Kahana: «No envidies a un hombre malvado que prospera; recuerda que hasta la muerte no quedará sin castigo». Esta entrega sigue esa decisión revisada y conserva la divergencia griega en nota.'
  spanish_consistency_notes:
  - Se mantiene «Altísimo» solo en la nota de variante griega, porque no pertenece al texto hebreo principal de este registro.
  - «Malvado» se usa como equivalente amplio de בְּזָדוֹן en vez de estrechar el sentido a «arrogante», aunque esa matización permanece documentada en alternativas.
  - La puntuación y el ritmo buscan un español bíblico claro y moderno, sin calcos innecesarios.
