translation:
  language: es
  text: Cuando terminó de profetizar[a], vino al lugar alto.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «al santuario de la colina»; hebreo «al lugar alto», refiriéndose a un sitio elevado de culto.
