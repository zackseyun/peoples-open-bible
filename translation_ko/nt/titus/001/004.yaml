id: TIT.1.4
reference: Titus 1:4
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: Τίτῳ γνησίῳ τέκνῳ κατὰ κοινὴν πίστιν· χάρις ⸀καὶ εἰρήνη ἀπὸ θεοῦ πατρὸς καὶ ⸂Χριστοῦ Ἰησοῦ⸃ τοῦ σωτῆρος ἡμῶν.
base_translation:
  language: en
  yaml_path: translation/nt/titus/001/004.yaml
  text: 'To Titus[b][a], my true child according to our common faith: grace and peace from God the Father and Messiah Jesus our Savior.'
  footnotes:
  - marker: a
    text: Or 'shared faith.'
    reason: lexical_alternative
  - marker: b
    text: Greek 'Christ Jesus'; rendered 'Messiah Jesus' here because Χριστός is treated as a title.
    reason: lexical_alternative
translation:
  language: ko
  text: 우리의 공통된 믿음[a]을 따라 나의 참된 자녀가 된 디도에게 편지합니다. 아버지 하나님과 우리 구주 메시아 예수[b]께로부터 은혜와 평강이 함께하시기를 빕니다.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 또는 「공유하는 믿음」. 헬라어 κοινή는 함께 나누고 있는, 공동의 믿음을 가리킨다.
    reason: lexical_alternative
  - marker: b
    text: 헬라어 「그리스도 예수」를 칭호로 옮긴 「메시아 예수」. Χριστός는 본래 칭호이며, 한국 전통의 「그리스도」는 음역으로 굳어져 칭호성이 가려진다.
    reason: lexical_alternative
lexical_decisions:
- source_word: γνησίῳ τέκνῳ
  english_pob_choice: my true child
  chosen_korean: 나의 참된 자녀
  alternatives_korean:
  - 나의 친자
  - 나의 진실한 자녀
  lexicon: BDAG
  rationale: γνήσιος는 「참된·정통한·합법적」 후사를 가리킨다. 디도가 바울의 영적 계승을 진정으로 잇고 있음을 드러낸다.
- source_word: κατὰ κοινὴν πίστιν
  english_pob_choice: according to our common faith
  chosen_korean: 우리의 공통된 믿음을 따라
  alternatives_korean:
  - 함께 가진 믿음을 따라
  - 공유하는 믿음을 따라
  lexicon: BDAG
  rationale: κοινή는 함께 나누고 있는 공동성을 강조한다. 「공통된」은 한국어에서 자연스럽고 무게가 적절하다.
- source_word: χάρις καὶ εἰρήνη
  english_pob_choice: grace and peace
  chosen_korean: 은혜와 평강
  alternatives_korean:
  - 은혜와 평화
  lexicon: BDAG
  rationale: 바울 인사 정식의 표준 한국어 등가어. 「평강」은 단순한 사회적 평화 이상의 안녕·온전함을 함의한다.
- source_word: ἀπὸ θεοῦ πατρὸς
  english_pob_choice: from God the Father
  chosen_korean: 아버지 하나님께로부터
  alternatives_korean:
  - 하나님 아버지로부터
  lexicon: BDAG
  rationale: 동격 구문을 한국어 어순으로 자연스럽게 옮긴다.
- source_word: Χριστοῦ Ἰησοῦ τοῦ σωτῆρος ἡμῶν
  english_pob_choice: Messiah Jesus our Savior
  chosen_korean: 우리 구주 메시아 예수
  alternatives_korean:
  - 우리의 구주이신 메시아 예수
  - 우리 구주 그리스도 예수
  lexicon: BDAG
  rationale: σωτήρ의 글로서리 기본값 「구주」와 칭호 Χριστός의 「메시아」를 결합한다. 한국어 어순상 「우리 구주 메시아 예수」가 자연스럽다.
