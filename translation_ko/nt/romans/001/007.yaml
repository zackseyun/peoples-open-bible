  text: πᾶσιν τοῖς οὖσιν ἐν Ῥώμῃ ἀγαπητοῖς θεοῦ, κλητοῖς ἁγίοις· χάρις ὑμῖν καὶ εἰρήνη ἀπὸ θεοῦ πατρὸς ἡμῶν καὶ κυρίου Ἰησοῦ Χριστοῦ.
base_translation:
  language: en
  yaml_path: translation/nt/romans/001/007.yaml
  text: 'To all those in Rome who are beloved by God and called to be saints: Grace to you and peace from God our Father and the Lord Jesus Messiah[a][b][c].'
  footnotes:
  - marker: a
    text: Or “called holy ones”; traditionally, “called to be saints.”
    reason: lexical_alternative
  - marker: b
    text: Or “Christ.”
    reason: lexical_alternative
  - marker: c
    text: Or 'who are beloved by God, called saints'.
    reason: previous_rendering
translation:
  language: ko
  text: 로마에 있는, 하나님께 사랑받는 모든 자들, 부르심을 받은 성도들에게 편지합니다. 우리 아버지 하나님과 주 예수 메시아께로부터 은혜와 평강이 여러분에게 있기를 빕니다.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ἀγαπητοῖς θεοῦ
  english_pob_choice: beloved by God
  chosen_korean: 하나님께 사랑받는
  alternatives_korean:
  - 하나님의 사랑하시는
  lexicon: BDAG
  rationale: 수동의 함의를 한국어 피동 「사랑받는」으로 자연스럽게 보존한다.
- source_word: κλητοῖς ἁγίοις
  english_pob_choice: called to be saints
  chosen_korean: 부르심을 받은 성도들
  alternatives_korean:
  - 부름받은 거룩한 자들
  lexicon: BDAG
  rationale: 「성도」가 바울 인사 정식에서 가장 자연스러운 한국어 등가어이다.
- source_word: Ῥώμῃ
  english_pob_choice: Rome
  chosen_korean: 로마
  alternatives_korean:
  - 로메
  lexicon: BDAG
  rationale: 한국 외래어 표기법과 굳은 관행에 따라 「로마」로 옮긴다.
