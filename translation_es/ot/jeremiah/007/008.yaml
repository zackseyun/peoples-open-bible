    issue: «para nada» para לְבִלְתִּי הוֹעִיל
    rationale: Aunque comunica inutilidad, en español actual es marcadamente coloquial y menos preciso que «sin provecho» o «sin beneficio». El hebreo expresa falta de utilidad/provecho, no solo énfasis negativo.
  - severity: low
