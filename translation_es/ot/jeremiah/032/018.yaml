review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura y el sentido general del hebreo: participios descriptivos, preservación de la tensión de la retribución intergeneracional, uso de Yahvé para יְהוָה, y mantenimiento de las alternativas en notas. Sin embargo, algunas elecciones españolas no representan de la manera más fiel ni más natural ciertos matices léxicos del original y del POB en inglés.'
  spanish_quality_summary: 'La redacción es mayormente clara y digna, pero presenta giros mejorables: «amor firme» suena algo calcado y menos idiomático para חֶסֶד; «pagando la iniquidad» puede sugerir que Dios paga por la iniquidad en vez de retribuirla; y la secuencia «el Dios grande, el Poderoso» resulta más rígida y menos natural que una formulación española fluida. «En el regazo» está bien, aunque «en el regazo de sus hijos» funciona mejor con «retribuyendo».'
  glossary_alignment: Alinea bien con la terminología del proyecto en «Yahvé» y conserva «iniquidad». La nota sobre צְבָאוֹת es adecuada. Conviene ajustar חֶסֶד a una opción más natural y pactal en español («amor leal») y וּמְשַׁלֵּם a «retribuyendo» para reflejar mejor la fuerza de requital.
  issues:
  - severity: medium
    issue: «amor firme» para חֶסֶד
    rationale: Aunque intenta reflejar «steadfast love», en español bíblico actual suena poco idiomático y algo calcado. «Amor leal» o «amor constante» comunica mejor la combinación de afecto y fidelidad pactal.
  - severity: high
    issue: «pagando la iniquidad» para וּמְשַׁלֵּם עֲוֺן
    rationale: En español, «pagar la iniquidad» puede entenderse como que Dios paga por ella, no que la retribuye o hace recaer su consecuencia. «Retribuyendo la iniquidad» o «haciendo recaer la iniquidad» evita ambigüedad y se acerca mejor al sentido judicial.
  - severity: medium
    issue: «el Dios grande, el Poderoso»
    rationale: Refleja de forma demasiado rígida la cadena hebrea. En español natural y elevado, «el gran Dios, el poderoso» o «el Dios grande y poderoso» preserva mejor el sentido sin sonar acartonado.
  - severity: low
    issue: Mayúscula en «Ejércitos»
    rationale: No es incorrecta en títulos divinos, pero «Yahvé de los ejércitos» suele leerse con mayor naturalidad en español corriente. Aun así, es una cuestión estilística menor.
  revised_spanish_text: mostrando amor leal[a] a millares, y retribuyendo la iniquidad de los padres en el regazo de sus hijos después de ellos—el gran Dios, el poderoso, Yahvé de los ejércitos[b], es su nombre.
  revised_footnotes:
  - marker: a
    text: O «a miles de generaciones» a la luz de pasajes de pacto semejantes; el hebreo aquí dice simplemente «a miles».
    reason: lexical_alternative
  - marker: b
    text: O «Yahvé de las huestes».
    reason: lexical_alternative
  revision_rationale: 'La revisión mejora la fidelidad semántica y la naturalidad del español sin apartarse del hebreo ni del rastro de auditoría inglés: «amor leal» expresa mejor חֶסֶד en español eclesial moderno; «retribuyendo la iniquidad» evita la ambigüedad de «pagando»; y «el gran Dios, el poderoso» mantiene el tono doxológico con sintaxis más idiomática. Se conservan las notas léxicas relevantes y la terminología principal del proyecto.'
