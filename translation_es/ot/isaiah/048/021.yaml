review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el sentido del hebreo: negación de la sed, conducción por regiones áridas, provisión de agua desde la roca, partición de la roca y salida abundante del agua. También mantiene correctamente el sujeto implícito divino y la alusión al éxodo sin expandirla en el texto principal. Sin embargo, «desde la roca» suena menos natural que «de la roca» en español bíblico corriente, y «las aguas brotaron» añade artículo y plural más marcados de lo necesario frente a la forma española más natural «brotó agua», que conserva mejor la fuerza indefinida/masa de מָיִם en este contexto.'
  spanish_quality_summary: El español es claro y digno, pero puede pulirse para sonar más natural y menos calcado. «Hizo fluir agua para ellos» es aceptable; «de la roca» mejora la idiomaticidad. «Brotó agua» lee mejor que «las aguas brotaron» en español contemporáneo y mantiene la viveza de la imagen. La nota a es adecuada. La nota b está bien, aunque «de Yahvé» no es necesario; basta con señalar la provisión de agua de la roca en el desierto.
  glossary_alignment: No hay conflicto con la terminología del proyecto. No aparece el nombre divino en el texto principal, así que no se requiere insertar «Yahvé». Las decisiones léxicas principales («no tuvieron sed», «los condujo», «la roca») están alineadas con el expediente inglés y con la evidencia fuente.
  issues:
  - severity: medium
    issue: «desde la roca» es menos idiomático que «de la roca»
    rationale: El hebreo מִצּוּר indica procedencia. En español, con un verbo como «hizo fluir», «de la roca» expresa esa procedencia con más naturalidad y sin pérdida de sentido.
  - severity: medium
    issue: «las aguas brotaron» suena más literario y menos natural que «brotó agua»
    rationale: Aunque מָיִם es formalmente plural, en español normalmente se expresa como sustantivo de masa singular. «Brotó agua» preserva mejor la naturalidad y la viveza del hebreo sin introducir una marcación estilística innecesaria.
  - severity: low
    issue: La nota b puede formularse de manera más directa
    rationale: La referencia intertextual está bien conservada, pero «la provisión de agua de Yahvé desde la roca» resulta algo pesada; una redacción más simple comunica mejor la misma idea.
  revised_spanish_text: No tuvieron sed cuando los condujo por los desiertos[a]; hizo fluir agua para ellos de la roca; partió la roca[b], y brotó agua.
  revised_footnotes:
  - marker: a
    text: O «en los desiertos» o «por los lugares secos».
    reason: lexical_alternative
  - marker: b
    text: El versículo remite a la provisión de agua de la roca en el desierto (por ejemplo, Éxodo 17:6; Números 20:11).
    reason: cross_reference
  revision_rationale: 'Se hicieron ajustes menores de naturalidad y estilo sin cambiar el sentido: «de la roca» por mejor español idiomático, «brotó agua» por una formulación más natural y fiel al uso español de «agua», y una simplificación leve de la nota intertextual.'
