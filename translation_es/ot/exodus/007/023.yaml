review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador capta bien la secuencia narrativa básica: Faraón se vuelve, entra en su casa y no responde interiormente ante la señal/plaga. Sin embargo, la nota en «se volvió» no refleja las alternativas relevantes del rastro auditado en inglés; el punto léxico más importante en la evidencia es el modismo וְלֹא שָׁת לִבּוֹ, donde conviene conservar mejor la fuerza de «tomarlo a pecho / no tomarlo a corazón» o, al menos, documentar esa metáfora. La traducción principal es aceptable, pero requiere ajuste menor para alinearse mejor con la decisión auditada y la nota léxica existente.'
  spanish_quality_summary: El español es claro y natural. «Entró en su casa» funciona bien. «No le prestó atención ni siquiera a esto» es idiomático, pero suena un poco menos cercano al hebreo y al inglés POB que «no tomó ni siquiera esto a pecho». Además, la nota actual sobre «se volvió» ofrece alternativas poco útiles o regionales («se dio vuelta», «se giró») en vez de las documentadas por el POB. Conviene reemplazarla por una nota sobre el idiomático «tomar a pecho».
  glossary_alignment: No hay términos del glosario mayor en juego. La cuestión principal es la fidelidad del idiomático hebreo שָׁת לִבּוֹ. Mejor reflejar la metáfora del corazón/pecho en español principal o en nota. «Faraón» está bien.
  issues:
  - severity: medium
    issue: La nota al pie está anclada en «se volvió», pero la alternativa léxica significativa del POB está en «no tomó ... a pecho / no puso su corazón».
    rationale: El inglés auditado documenta alternativas para וְלֹא שָׁת לִבּוֹ, no para וַיִּפֶן. La nota española actual desvía la atención hacia una variación menor y menos relevante.
  - severity: medium
    issue: «No le prestó atención» comunica el sentido general, pero pierde la metáfora cardíaca que el POB procuró conservar en el texto principal.
    rationale: El inglés eligió «did not take ... to heart» precisamente para mantener la imagen del corazón con español natural. «No tomó ni siquiera esto a pecho» preserva mejor esa decisión y sigue siendo idiomático.
  - severity: low
    issue: Las alternativas de la nota actual incluyen formulaciones menos adecuadas o más regionales.
    rationale: «Se dio vuelta» es marcadamente regional y «se giró» suena mecánico en este contexto narrativo; no son las mejores opciones para una nota en español bíblico general.
  revised_spanish_text: Faraón se volvió y entró en su casa, y no tomó ni siquiera esto a pecho[a].
  revised_footnotes:
  - marker: a
    text: 'O: «no puso su corazón en esto» o «no le prestó atención ni siquiera a esto».'
    reason: lexical_alternative
  revision_rationale: Se mantiene la narración con español natural, pero se traslada la nota al idiomático clave וְלֹא שָׁת לִבּוֹ y se ajusta el texto principal para reflejar mejor la decisión del POB de conservar la metáfora del corazón de forma idiomática en español.
