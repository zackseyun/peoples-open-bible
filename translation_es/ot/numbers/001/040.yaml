lexical_decisions:
- source_word: לִבְנֵי אָשֵׁר
  english_pob_choice: For the sons of Asher
  chosen_spanish: Para los hijos de Aser
  alternatives_spanish:
  - Para los descendientes de Aser
  - De los hijos de Aser
  lexicon: HALOT
  rationale: Conservo el lenguaje tribal y filial de la fórmula censal. "Hijos" refleja bien el hebreo y es más transparente que "descendientes" para mantener la estructura del texto fuente.
- source_word: תּוֹלְדֹתָם
  english_pob_choice: by their generations
  chosen_spanish: por sus generaciones
  alternatives_spanish:
  - según sus generaciones
  - por sus linajes
  lexicon: HALOT
  rationale: '"Generaciones" mantiene el valor genealógico y la repetición formular del hebreo sin convertirlo en una paráfrasis explicativa.'
- source_word: לְמִשְׁפְּחֹתָם
  english_pob_choice: by their clans
  chosen_spanish: por sus clanes
  alternatives_spanish:
  - según sus familias
  - por sus familias
  lexicon: HALOT
  rationale: '"Clanes" refleja mejor la unidad kinship/socio-tribal del contexto de enumeración que el más general "familias".'
- source_word: לְבֵית אֲבֹתָם
  english_pob_choice: by their fathers’ houses
  chosen_spanish: por las casas de sus padres
  alternatives_spanish:
  - por las casas paternas
  - por sus casas ancestrales
  lexicon: HALOT
  rationale: Sigo de cerca el modismo hebreo para preservar la estructura social del censo. "Casas de sus padres" es claro y fiel, aunque algo literal.
- source_word: בְּמִסְפַּר שֵׁמוֹת
  english_pob_choice: according to the number of names
  chosen_spanish: según el número de nombres
  alternatives_spanish:
  - conforme al número de nombres
  - por el número de nombres
  lexicon: HALOT
  rationale: La expresión señala conteo nominal de individuos. "Según el número de nombres" conserva el carácter formular y evita explicar de más.
- source_word: מִבֶּן עֶשְׂרִים שָׁנָה וָמַעְלָה
  english_pob_choice: from twenty years old and upward
  chosen_spanish: de veinte años arriba
  alternatives_spanish:
  - desde los veinte años y más
  - de veinte años y en adelante
  lexicon: HALOT
  rationale: '"De veinte años arriba" reproduce una expresión natural en español para el umbral de edad y mantiene la cadencia del hebreo.'
- source_word: כֹּל יֹצֵא צָבָא
  english_pob_choice: every man going out to war
  chosen_spanish: todo el que sale a la guerra
  alternatives_spanish:
  - todo varón que sale a la guerra
  - todo el apto para ir a la guerra
  lexicon: HALOT
  rationale: Mantengo el idioma hebreo de elegibilidad militar con una forma española idiomática. Prefiero no añadir "varón" en el texto principal porque el contexto censal ya lo presupone, pero lo hago explícito en la nota por la alternancia posible.
translation_notes:
  revision_awareness: El texto sigue de cerca la fórmula censal del hebreo y coincide sustancialmente con la traducción auditada en inglés; no se identificaron revisiones textuales relevantes en el pasaje. Se preserva el término de elegibilidad militar sin suavizarlo a una simple capacidad abstracta.
  spanish_consistency_notes:
  - Se usó "Aser" para el nombre tribal, conforme al uso bíblico en español.
  - Se mantuvo la repetición preposicional de la fórmula para conservar el paralelismo del hebreo.
  - '"Casas de sus padres" se prefirió a una paraphrase como "casas paternas" por fidelidad estructural.'
  - La nota a explica el modismo militar sin cambiar el sentido del texto principal.
