base_translation:
  language: en
  yaml_path: translation/ot/numbers/013/029.yaml
  text: Amalek lives in the land of the Negev[a], and the Hittites, the Jebusites, and the Amorites live in the hill country[c][b], and the Canaanites live by the sea and along the Jordan.
  footnotes:
  - marker: a
    text: Or 'dwells' for 'lives' throughout the verse; the Hebrew participle emphasizes settled residence.
    reason: lexical_alternative
  - marker: b
    text: '''The Negev'' may also be rendered ''the southland,'' but here it likely refers to the specific southern region of Canaan.'
    reason: lexical_alternative
  - marker: c
    text: Hebrew 'along the side of the Jordan'; idiomatically, 'beside the Jordan' or 'along the Jordan.'
    reason: lexical_alternative
