    issue: Preposición final «para todas las naciones de la tierra»
    rationale: Aunque es comprensible, el rastro de auditoría inglés revisó expresamente esta frase hacia «to all the nations of the earth». En español, «a todas las naciones de la tierra» refleja mejor la relación de la ciudad convertida en maldición frente a las naciones.
