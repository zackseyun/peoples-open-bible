translation:
  language: es
  text: Y tenían manos humanas[a] debajo de sus alas, en sus cuatro lados[b]; y los cuatro tenían sus rostros y sus alas.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «de hombre» en vez de «humanas».
    reason: alternative_reading
  - marker: b
    text: 'El hebreo es sintácticamente comprimido: literalmente, «y manos humanas de debajo de sus alas en sus cuatro lados, y sus rostros y sus alas, de los cuatro». La traducción explicita en español las relaciones implícitas.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְיָדוֹ / ידוֹת
  english_pob_choice: they had ... hands
  chosen_spanish: tenían manos
  alternatives_spanish:
  - había manos
  - poseían manos
  lexicon: HALOT
  rationale: El hebreo es una cláusula nominal comprimida; en español conviene explicitar la relación posesiva/existencial con «tenían» para una lectura natural sin añadir contenido ajeno.
- source_word: אָדָם
  english_pob_choice: human
  chosen_spanish: humanas
  alternatives_spanish:
  - de hombre
  - de un hombre
  lexicon: HALOT
  rationale: Aquí אָדָם califica el tipo de manos. «Humanas» preserva el valor adjetival y evita forzar una referencia individual que el contexto no exige.
- source_word: מִתַּחַת כַּנְפֵיהֶם
  english_pob_choice: under their wings
  chosen_spanish: debajo de sus alas
  alternatives_spanish:
  - bajo sus alas
  - bajo las alas de ellos
  lexicon: HALOT
  rationale: «Debajo de» expresa con claridad la posición bajo algo. «Alas» es el equivalente normal de כָּנָף en este contexto visionario.
- source_word: עַל אַרְבַּעַת רִבְעֵיהֶם
  english_pob_choice: on their four sides
  chosen_spanish: sobre sus cuatro lados
  alternatives_spanish:
  - en sus cuatro lados
  - a sus cuatro lados
  lexicon: HALOT
  rationale: רִבְעִים aquí se refiere a lados o cuartos espaciales. «Sobre sus cuatro lados» mantiene la distribución alrededor de la figura sin volverla más explícita de lo que el hebreo permite.
- source_word: וּפְנֵיהֶם
  english_pob_choice: their faces
  chosen_spanish: sus rostros
  alternatives_spanish:
  - sus caras
  - sus faces
  lexicon: HALOT
  rationale: «Rostros» es más digno y preciso en lenguaje bíblico en español, y conserva el plural del hebreo.
- source_word: וְכַנְפֵיהֶם
  english_pob_choice: their wings
  chosen_spanish: sus alas
  alternatives_spanish:
  - sus plumas
  - sus alas mismas
  lexicon: HALOT
  rationale: Traducción directa de כָּנָף en plural. «Alas» es el término natural y fiel en español.
- source_word: לְאַרְבַּעְתָּם
  english_pob_choice: the four of them had
  chosen_spanish: los cuatro
  alternatives_spanish:
  - para los cuatro
  - pertenecientes a los cuatro
  lexicon: HALOT
  rationale: La frase hebrea es elíptica y retoma al grupo completo. En español, «los cuatro» funciona como sujeto resumido que enlaza naturalmente con la enumeración anterior sin sobreexplicar la sintaxis.
theological_decisions:
- issue: Cómo renderizar אָדָם en una descripción visionaria sin perder el matiz descriptivo
  english_pob_reading: human hands
  chosen_spanish_reading: manos humanas
  alternative_spanish_readings:
  - manos de hombre
  - manos de un hombre
  rationale: 'No hay tensión doctrinal directa, pero sí una decisión semántica: el adjetivo «humanas» comunica clase de manos y evita masculinizar indebidamente el rasgo físico de la visión.'
  doctrine_reference: N/A
translation_notes:
  revision_awareness: Se corrigió la validación anterior incluyendo en el texto principal exactamente los marcadores de nota [a] y [b] donde corresponden.
  spanish_consistency_notes:
  - Se mantuvo «alas» para כָּנָף y «rostros» para פָּנִים, en registro bíblico natural.
  - Se evitó «SEÑOR» o terminología no presente en este versículo.
  - La cláusula inicial se hizo explícita en español porque el hebreo es nominal y comprimido, siguiendo la práctica del POB en inglés.
