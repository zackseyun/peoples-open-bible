id: 2CO.12.7
reference: '2 Corinthians 12:7'
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: καὶ τῇ ὑπερβολῇ τῶν ἀποκαλύψεων. ⸀διὸ ἵνα μὴ ὑπεραίρωμαι, ἐδόθη μοι σκόλοψ τῇ σαρκί, ἄγγελος ⸀Σατανᾶ, ἵνα με κολαφίζῃ, ⸂ἵνα μὴ ὑπεραίρωμαι⸃.
base_translation:
  language: en
  yaml_path: translation/nt/2_corinthians/012/007.yaml
  text: And because of the surpassing greatness of the revelations—so that I might not exalt myself—a thorn in the flesh was given to me[a], a messenger of Satan, so that it might torment me[e][d][c][b],
    so that I might not exalt myself.
translation:
  language: ko
  text: 그 계시들이 너무나 컸기에—내가 너무 높아지지 않게 하려고—나에게 육체에 가시[a]가 주어졌습니다. 곧 사탄의 사자입니다. 그것이 나를 치게 하여, 내가 너무 높아지지 않게 하시려는 것입니다.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 곧 바울에게 주어진 구체적 고난의 비유. 본문은 그 정체를 의료적·영적 어느 한쪽으로 정하지 않으며, 「가시」(σκόλοψ)라는 강한 이미지를 그대로 둔다.
    reason: lexical_alternative
lexical_decisions:
- source_word: σκόλοψ τῇ σαρκί
  english_pob_choice: thorn in the flesh
  chosen_korean: 육체에 가시
  lexicon: BDAG
  rationale: 문자적 「가시·말뚝」 + 「살에」. 의료적·영적 추상화를 피하고 본문의 강한 신체적 이미지를 그대로 보존한다.
  alternatives_korean:
  - 살에 박힌 가시
- source_word: ἄγγελος Σατανᾶ
  english_pob_choice: messenger of Satan
  chosen_korean: 사탄의 사자
  lexicon: BDAG
  rationale: '「사탄」 + 「사자」(전령). 11:14의 사탄 어휘와 호응.'
- source_word: κολαφίζῃ
  english_pob_choice: torment
  chosen_korean: 치게
  lexicon: BDAG
  rationale: 본래 「주먹으로 치다」. 「치다」가 가시의 고통을 의인화한다.
  alternatives_korean:
  - 주먹으로 치게
- source_word: ὑπεραίρωμαι
  english_pob_choice: exalt myself
  chosen_korean: 너무 높아지지 않게
  lexicon: BDAG
  rationale: 중간/수동 「자신을 넘치게 높이다」. 「너무 높아지다」가 자연스럽다.
  alternatives_korean:
  - 우쭐대지 않게
