  to: 'Pero les dijo: «No, sino que han venido para ver[a] la desnudez de la tierra[b]».'
  rationale: Se eliminó la nota innecesaria sobre «les» y la nota explicativa redundante sobre «No, sino que…». Se añadió una nota anclada en «ver» para conservar la alternativa contextual documentada en el POB inglés («espiar»), mientras se mantiene en el texto principal la literalidad del hebreo. Así el español queda más limpio y más alineado con el rastro de decisiones léxicas auditadas.
