- from: 'Y dijo[a]: «Bendita seas ante Yahvé, hija mía. Has mostrado más bondad esta última que la primera, al no ir detrás de los jóvenes, fuera pobre o rico».'
  to: 'Y dijo: «Bendita seas por Yahvé, hija mía. Has hecho que esta última bondad[a] sea mayor que la primera, al no ir detrás de los jóvenes, ya fueran pobres o ricos».'
