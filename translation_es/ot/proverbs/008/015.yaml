    rationale: El texto principal ya usa «Por medio de mí», pero la nota dice «O «por medio de mí»... «por mí»». Eso invierte la relación entre lectura principal y alternativa y puede confundir al lector.
  - severity: low
    issue: El anclaje de [a] en «reinan» es menos natural en español que en «mí».
    rationale: La variante afecta a בִּי, no al verbo «reinan». En español conviene marcar la expresión preposicional para mayor precisión.
  revised_spanish_text: Por medio de mí[a] los reyes reinan, y los gobernantes[b] decretan justicia.
