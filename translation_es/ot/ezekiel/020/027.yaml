translation:
  language: es
  text: 'Por tanto, habla a la casa de Israel, hijo de hombre, y diles: «Así dice el Señor Yahvé: en esto también sus padres me blasfemaron[a], al portarse traidoramente contra mí[b]»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «me injuriaron» o «me trataron con desprecio».
    reason: lexical_alternative
  - marker: b
    text: O «por su infidelidad contra mí» o «por cometer un quebrantamiento de fidelidad contra mí».
    reason: lexical_alternative
lexical_decisions:
- source_word: לָכֵן
  english_pob_choice: Therefore
  chosen_spanish: Por tanto
  alternatives_spanish:
  - Así que
  - Por eso
  - Entonces
  lexicon: HALOT
  rationale: Expresa la conclusión inferencial del contexto anterior con una fórmula natural en español y mantiene el valor consecutivo de לָכֵן.
- source_word: דַּבֵּר אֶל בֵּית יִשְׂרָאֵל
  english_pob_choice: speak to the house of Israel
  chosen_spanish: habla a la casa de Israel
  alternatives_spanish:
  - habla al pueblo de Israel
  - dirígete a la casa de Israel
  lexicon: HALOT
  rationale: Conserva la fórmula profética y la expresión colectiva 'casa de Israel', sin diluirla en una paráfrasis más general.
- source_word: בֶּן אָדָם
  english_pob_choice: son of man
  chosen_spanish: hijo de hombre
  alternatives_spanish:
  - ser humano
  - mortal
  lexicon: HALOT
  rationale: Se conserva el apelativo fijo de Ezequiel de manera literal y reconocible; 'hijo de hombre' mantiene la repetición y el valor vocativo del hebreo.
- source_word: כֹּה אָמַר אֲדֹנָי יְהוִה
  english_pob_choice: Thus says the Lord Yahweh
  chosen_spanish: Así dice el Señor Yahvé
  alternatives_spanish:
  - Así dice el Señor Yahweh
  - Así ha dicho el Señor Yahvé
  lexicon: HALOT
  rationale: '''Señor'' traduce אֲדֹנָי como título reverencial, y ''Yahvé'' preserva el nombre divino יְהוִה según el criterio del proyecto; se evita la sustitución por una convención de ocultamiento.'
- source_word: עוֹד זֹאת
  english_pob_choice: In this also
  chosen_spanish: en esto también
  alternatives_spanish:
  - todavía en esto
  - también en esto
  lexicon: HALOT
  rationale: Reproduce el valor aditivo de עוֹד y la referencia demostrativa de זֹאת en una construcción natural en español.
- source_word: גִּדְּפוּ אוֹתִי
  english_pob_choice: blasphemed me
  chosen_spanish: me blasfemaron
  alternatives_spanish:
  - me injuriaron
  - me ultrajaron
  - me escarnecieron
  lexicon: HALOT
  rationale: '''Blasphemed'' se expresa con ''blasfemar'' porque el contexto es un agravio verbal o reverente contra Dios; conserva la gravedad teológica del verbo.'
- source_word: אֲבוֹתֵיכֶם
  english_pob_choice: your fathers
  chosen_spanish: tus padres
  alternatives_spanish:
  - vuestros padres
  - tus antepasados
  lexicon: HALOT
  rationale: Se mantiene el sustantivo familiar masculino del hebreo. En este contexto profético, el español natural singulariza el destinatario colectivo en 'tus padres'.
- source_word: בְּמַעֲלָם בִּי מָעַל
  english_pob_choice: by acting treacherously against me
  chosen_spanish: al portarse traidoramente contra mí
  alternatives_spanish:
  - por obrar con infidelidad contra mí
  - al cometer una traición contra mí
  - por quebrantar su fidelidad conmigo
  lexicon: HALOT
  rationale: La construcción cognada enfatiza traición/infidelidad de pacto. 'Portarse traidoramente' conserva el peso relacional sin suavizar la ofensa; 'contra mí' mantiene el objeto directo de la ruptura.
theological_decisions:
- issue: Nombre divino en אֲדֹנָי יְהוִה
  english_pob_reading: the Lord Yahweh
  chosen_spanish_reading: el Señor Yahvé
  alternative_spanish_readings:
  - el Señor Yahweh
  - el Señor Dios
  rationale: El texto hebreo contiene el Tetragrámaton, que en este proyecto se vierte como 'Yahvé'. Se mantiene 'Señor' para אֲדֹנָי y se distingue claramente del nombre propio divino.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Uso de 'hijo de hombre' como vocativo en Ezequiel
  english_pob_reading: son of man
  chosen_spanish_reading: hijo de hombre
  alternative_spanish_readings:
  - ser humano
  - mortal
  rationale: Ezequiel usa este vocativo reiteradamente como marca profética. Traducirlo de forma literal preserva la consistencia literaria y evita una interpretación excesivamente dinámica.
  doctrine_reference: 'DOCTRINE.md: Gender-accurate over gender-neutral; consistency of key terms'
translation_notes:
  revision_awareness: Se siguió el pasaje hebreo directo y el audit trail en inglés. La revisión más reciente del POB cambió la representación de יְהוִה de 'Lord GOD' a 'Lord Yahweh'; el español refleja ese ajuste con 'Señor Yahvé'. También se conservó la equivalencia léxica de גדף como blasfemia, y de מעל como traición/infidelidad de pacto, sin suavizar la tensión teológica del texto.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' para יְהוִה conforme al estándar del proyecto.
  - '''Señor'' se usa para אֲדֹנָי, evitando confundir título con nombre divino.'
  - '''Hijo de hombre'' conserva la fórmula vocativa de Ezequiel.'
  - '''Me blasfemaron'' mantiene la dureza del verbo גדף; la nota ofrece alternativas semánticas cercanas.'
  - '''Portarse traidoramente'' intenta preservar el matiz de pacto roto de מעל sin convertirlo en una mera falta moral genérica.'
