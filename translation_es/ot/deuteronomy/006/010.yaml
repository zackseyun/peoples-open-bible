translation:
  language: es
  text: Y cuando Yahvé tu Dios te haga entrar en la tierra que juró a tus antepasados[a], a Abraham, a Isaac y a Jacob, para darte ciudades grandes y buenas que no construiste,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «a tus padres». El hebreo dice «a tus padres», y el contexto nombra específicamente a Abraham, Isaac y Jacob.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהָיָה כִּי
  english_pob_choice: And when
  chosen_spanish: Y sucederá que
  alternatives_spanish:
  - Y cuando
  - Y acontecerá que
  lexicon: HALOT
  rationale: La construcción introduce una situación futura; en español, «Y sucederá que» conserva el enlace narrativo y el matiz prospectivo sin sonar tan rígido como un calco de «y acontecerá que».
- source_word: יְבִיאֲךָ
  english_pob_choice: brings you into
  chosen_spanish: te llevará a
  alternatives_spanish:
  - te traerá a
  - te introducirá en
  lexicon: HALOT
  rationale: El hifil de בוא tiene fuerza causativa. «Te llevará a» comunica el movimiento causado por Yahvé hacia la tierra; «te introducirá en» sería más literal pero menos natural en español.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  - el SEÑOR
  lexicon: HALOT
  rationale: Se mantiene el nombre divino del tetragrámaton con la forma española asentada en el proyecto, evitando la sustitución por un título.
- source_word: אֱלֹהֶיךָ
  english_pob_choice: your God
  chosen_spanish: tu Dios
  alternatives_spanish:
  - tu Dios
  lexicon: HALOT
  rationale: La forma posesiva de segunda persona se vierte directamente como «tu Dios», que es la equivalencia normal y clara en español.
- source_word: הָאָרֶץ
  english_pob_choice: the land
  chosen_spanish: la tierra
  alternatives_spanish:
  - el país
  - la tierra prometida
  lexicon: HALOT
  rationale: En contexto pactal y de promesa, «la tierra» preserva la conexión bíblica con la הארץ sin añadir explicaciones que el hebreo no expresa aquí.
- source_word: אֲשֶׁר נִשְׁבַּע
  english_pob_choice: that he swore
  chosen_spanish: que juró
  alternatives_spanish:
  - que prometió con juramento
  - que había jurado
  lexicon: HALOT
  rationale: '«Juró» conserva el lenguaje de juramento del verbo שׁבע. En español, el sujeto implícito es claro por el contexto: Yahvé juró.'
- source_word: לַאֲבֹתֶיךָ
  english_pob_choice: to your fathers
  chosen_spanish: a tus padres
  alternatives_spanish:
  - a tus padres
  - a tus antepasados
  lexicon: HALOT
  rationale: Se conserva la referencia patriarcal y masculina del término hebreo, pero en español «padres» no suena como plural de progenitores. Aquí la forma más natural y fiel es «padres», entendida por el contexto nombrado a continuación.
- source_word: לְאַבְרָהָם לְיִצְחָק וּלְיַעֲקֹב
  english_pob_choice: to Abraham, to Isaac, and to Jacob
  chosen_spanish: a Abraham, a Isaac y a Jacob
  alternatives_spanish:
  - a Abraham, a Isaac y a Jacob
  lexicon: HALOT
  rationale: Los nombres propios se transliteran de forma estándar y el juego de preposiciones se integra en español con repetición natural solo donde la sintaxis lo requiere.
- source_word: לָתֶת לָךְ
  english_pob_choice: to give you
  chosen_spanish: para darte
  alternatives_spanish:
  - para darte
  - para dártela
  lexicon: HALOT
  rationale: El infinitivo de propósito se expresa con «para darte», natural en español y suficiente para conservar la finalidad del verbo.
- source_word: עָרִים גְּדֹלֹת וְטֹבֹת
  english_pob_choice: great and good cities
  chosen_spanish: ciudades grandes y buenas
  alternatives_spanish:
  - ciudades grandes y buenas
  - ciudades grandes y hermosas
  lexicon: HALOT
  rationale: «Grandes» conserva el tamaño; «buenas» reproduce טוב sin cargarlo de interpretaciones como «prósperas» o «hermosas», que irían más allá del hebreo inmediato.
- source_word: אֲשֶׁר לֹא בָנִיתָ
  english_pob_choice: that you did not build
  chosen_spanish: que no edificaste
  alternatives_spanish:
  - que no construiste
  - que no levantaste
  lexicon: HALOT
  rationale: «Edificaste» mantiene un registro bíblico digno y corresponde bien al acto de construir ciudades, sin perder la sencillez del hebreo.
theological_decisions:
- issue: Rendering the divine name יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - el SEÑOR
  rationale: El texto usa el nombre del pacto directamente. El proyecto pide YHWH → «Yahvé» en el texto principal; así se evita la sustitución reverencial y se preserva la identidad divina del pasaje.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Gendered kinship term in לַאֲבֹתֶיךָ
  english_pob_reading: your fathers
  chosen_spanish_reading: tus padres
  alternative_spanish_readings:
  - tus antepasados
  rationale: El hebreo emplea un plural masculino y luego lo especifica con Abraham, Isaac y Jacob. Aunque «padres» es literal, en español «a tus padres» puede leerse como progenitores inmediatos; por eso se mantiene aquí solo como equivalente de uso bíblico, apoyado por la enumeración patriarcal.
  doctrine_reference: 'DOCTRINE.md Translation philosophy §4: Gender-accurate over gender-neutral'
translation_notes:
  revision_awareness: Se corrigió la validación previa anclando la nota [a] en el texto principal. No se hicieron cambios de sentido respecto del último pase aprobado; la redacción mantiene la decisión del audit trail para YHWH, la referencia patriarcal y la relación causal de יְבִיאֲךָ.
  spanish_consistency_notes:
  - Se usa «Yahvé» de forma consistente para יְהוָה.
  - Se conserva el paralelismo promesa-cumplimiento con «te llevará a la tierra» y «para darte».
  - «Ciudades grandes y buenas» sigue de cerca el binomio hebreo sin ampliaciones interpretativas.
  - La nota [a] está anclada exactamente en «tus padres[a]» para evitar footnotes sin marca.
