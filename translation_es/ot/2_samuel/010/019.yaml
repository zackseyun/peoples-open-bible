review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el sentido básico del hebreo: los reyes subordinados a Hadadézer vieron su derrota ante Israel, hicieron paz con Israel, quedaron en condición de servicio/sujeción, y Aram dejó de prestar ayuda a los hijos de Amón. Sin embargo, hay un ajuste necesario en la nota de «ayudar», porque la alternativa «rescatar» no corresponde bien al matiz contextual documentado en la auditoría inglesa, que revisó precisamente de «save» a «help» por tratarse de apoyo militar más que de rescate.'
  spanish_quality_summary: El español es claro y digno. No obstante, «hicieron paz con Israel» suena menos idiomático que «hicieron las paces con Israel» o «hicieron paz con Israel»; aun así, puede mantenerse por cercanía al original y tono sobrio. El problema principal no está en la prosa principal, sino en la nota [c], cuya alternativa actual introduce un matiz menos fiel al razonamiento léxico aprobado.
  glossary_alignment: No hay conflictos con la terminología base del proyecto. «Aram» está bien transliterado; «hijos de Amón» preserva la forma fuente; «siervos» con nota «vasallos» sigue la decisión del POB. La excepción necesaria es corregir la nota alternativa de לְהוֹשִׁיעַ para alinearla con la decisión contextual de «ayudar» en vez de un rescate más fuerte.
  issues:
  - severity: medium
    issue: La nota [c] ofrece «rescatar» como alternativa a «ayudar».
    rationale: La auditoría inglesa cambió explícitamente de «save» a «help» para reflejar apoyo militar contextual. «Rescatar» reintroduce un matiz más fuerte y más específico que el razonamiento final quiso evitar. Una alternativa como «salvar» preserva mejor la relación léxica documentada, o puede omitirse la nota si no aporta claridad.
  revised_spanish_text: Cuando todos los reyes que eran [a]siervos de Hadadézer vieron que habían sido derrotados delante de Israel, hicieron paz con Israel y les sirvieron[b]. Y Aram tuvo miedo de ayudar[c] más a los hijos de Amón.
  revised_footnotes:
  - marker: a
    text: O «vasallos de Hadadézer».
    reason: lexical_alternative
  - marker: b
    text: O «les quedaron sujetos».
    reason: lexical_alternative
  - marker: c
    text: O «salvar».
    reason: lexical_alternative
  revision_rationale: 'Se mantiene el texto principal porque es fiel y legible. Se corrige únicamente la nota [c]: «rescatar» no sigue bien la decisión léxica auditada para לְהוֹשִׁיעַ en este contexto de auxilio militar; «salvar» es una alternativa más directa y más cercana al historial del POB, aunque el texto principal correctamente use «ayudar».'
