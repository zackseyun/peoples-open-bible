review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien el sentido general del griego y del audit trail inglés: marco temporal, lista de nombres, asociación del grupo, residencia en Samaria y otros lugares, y carácter adverso de la carta. Sin embargo, hay dos desajustes relevantes: (1) la nota [a] traduce mal ὑπογεγραμμένην con ''subyacente'', que no corresponde al sentido de ''escrita abajo / adjunta / a continuación''; y (2) la colocación de ''contra los habitantes...'' al final puede sonar como si modificara solo ''la carta'', cuando en español conviene mantener más claramente la relación verbal ''escribieron ... contra''.'
  spanish_quality_summary: El texto es legible y digno, pero puede mejorarse en naturalidad y precisión. 'Ahora, en los tiempos de Artajerjes' es aceptable, aunque 'En el tiempo de Artajerjes' suena más natural. La forma 'habitaban' o 'vivían' sería más fluida que el gerundio 'habitando' en esta cadena larga, pero no es un error. La mayor reparación necesaria está en la nota léxica y en un pequeño ajuste de orden para evitar ambigüedad sintáctica.
  glossary_alignment: No hay términos teológicos sensibles en juego. 'rey de los persas', 'el escriba' y la orientación adversa de κατά están bien resueltos. Los nombres propios son transliteraciones admisibles desde el griego, aunque con variación hispanizante; no requieren adjudicación especial.
  issues:
  - severity: medium
    issue: La nota [a] usa 'subyacente' para ὑπογεγραμμένην.
    rationale: El griego significa 'escrita abajo', 'subadjunta' o 'a continuación'; 'subyacente' en español sugiere algo implícito o que yace debajo, y falsea el matiz documental/discursivo.
  - severity: medium
    issue: El orden 'escribieron la carta que sigue ... contra los habitantes...' puede resultar algo ambiguo en español.
    rationale: Aunque reproduce el sentido global, en español conviene ordenar la frase para que 'contra los habitantes de Judea y Jerusalén' se entienda claramente como orientación de la acción escrita/denuncia, no solo como complemento suelto de 'carta'.
  - severity: low
    issue: '''En los tiempos de Artajerjes'' suena algo más pesado que lo necesario.'
    rationale: El singular 'En el tiempo de Artajerjes' expresa mejor χρόνοις en español natural sin pérdida semántica.
  revised_spanish_text: En el tiempo de Artajerjes, rey de los persas, Belemus y Mithradates y Tabelio y Rátimo y Beeltetmos y Samelio, el escriba, y los demás que estaban asociados con ellos, que vivían en Samaria y en los demás lugares, escribieron contra los habitantes de Judea y Jerusalén la carta que sigue[a].[b]
  revised_footnotes:
  - marker: a
    text: 'Griego literalmente: «la carta escrita abajo» o «la carta adjunta / a continuación».'
    reason: lexical_alternative
  - marker: b
    text: El griego es algo comprimido aquí; la traducción explicita el sentido aparente de una carta escrita con intención acusatoria o adversa.
    reason: alternative_reading
  revision_rationale: Se corrige la nota léxica para reflejar fielmente ὑπογεγραμμένην y se reordena ligeramente la oración para que 'contra los habitantes de Judea y Jerusalén' modifique con claridad la acción de escribir. También se suaviza el inicio a un español más natural.
