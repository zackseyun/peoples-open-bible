lexical_decisions:
- source_word: δόσις
  english_pob_choice: gift
  chosen_spanish: don
  alternatives_spanish:
  - regalo
  - dar
  lexicon: LSJ
  rationale: δóσις designa el acto o resultado de dar. En español, «don» conserva el valor de algo dado y funciona bien en un proverbio breve; «regalo» suena más cotidiano y puede sugerir menor alcance, y «dar» sería demasiado verbal para este sustantivo.
- source_word: λυσιτελήσει
  english_pob_choice: will profit
  chosen_spanish: te aprovechará
  alternatives_spanish:
  - te beneficiará
  - te será provechoso
  lexicon: LSJ
  rationale: El verbo expresa utilidad o ventaja. «Te aprovechará» mantiene el tono proverbial y el sentido de beneficio práctico sin restringirlo a lo económico.
- source_word: σοι
  english_pob_choice: you
  chosen_spanish: te
  alternatives_spanish:
  - para ti
  - a ti
  lexicon: Greek grammar
  rationale: El dativo marca a la persona afectada. En español, el clítico «te» integra de forma natural la idea de que algo resulta provechoso o no lo es.
- source_word: ἀνταπόδομα
  english_pob_choice: repayment
  chosen_spanish: retribución
  alternatives_spanish:
  - recompensa
  - reembolso
  - retorno
  lexicon: LSJ
  rationale: El sustantivo indica lo que se da a cambio. «Retribución» preserva el valor recíproco sin limitarlo al pago monetario; «recompensa» puede sugerir mérito moral, y «reembolso» sería demasiado técnico y financiero.
- source_word: διπλοῦν
  english_pob_choice: double
  chosen_spanish: doble
  alternatives_spanish:
  - dos veces
  - de dos partes
  lexicon: LSJ
  rationale: διπλοῦν significa directamente «doble» o «de dos veces». «Doble» es la equivalencia más natural y clara en español.
translation_notes:
  revision_awareness: El texto griego recibido coincide con el testimonio auditado de la POB inglesa; no se detectan revisiones textuales adicionales ni cambios de sentido que requieran nota crítica.
  spanish_consistency_notes:
  - Se mantuvo el paralelismo proverbial de dos cláusulas unidas por «y».
  - Se evitó «SEÑOR» u otras sustituciones no pertinentes, ya que el versículo no contiene lenguaje divino.
  - «Retribución» conserva la reciprocidad implícita en ἀνταπόδομα sin forzar una lectura exclusivamente económica.
