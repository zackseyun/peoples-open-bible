  glossary_alignment: No hay conflictos con la terminología de proyecto. «Espada» preserva bien חֶרֶב, «de dos filos» expresa adecuadamente וְלָהּ שְׁנֵי פֵיוֹת, y «codo» es una aproximación aceptable para גֹּמֶד siempre que la incertidumbre quede en nota. No aparecen términos teológicos sensibles del glosario general.
