translation:
  language: es
  text: Hijo de hombre[a], te he puesto como atalaya para la casa de Israel; y oirás una palabra de mi boca y los advertirás de mi parte[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «Mortal» o «Ser humano» para «Hijo de hombre». El hebreo es un modismo recurrente de tratamiento a Ezequiel.
    reason: lexical_alternative
  - marker: b
    text: Más formalmente, «y oirás una palabra de mi boca y los advertirás de mi parte».
    reason: alternative_reading
lexical_decisions:
- source_word: בֶּן אָדָם
  english_pob_choice: Son of man
  chosen_spanish: Hijo de hombre
  alternatives_spanish:
  - Mortal
  - Ser humano
  lexicon: HALOT
  rationale: Conservo el vocativo idiomático de Ezequiel sin neutralizarlo a una paráfrasis explicativa. En español, «Hijo de hombre» es la forma más reconocible y fiel al hebreo, aunque suene algo más marcada que una simple equivalencia semántica.
- source_word: צֹפֶה
  english_pob_choice: watchman
  chosen_spanish: atalaya
  alternatives_spanish:
  - centinela
  - vigilante
  lexicon: HALOT
  rationale: «Atalaya» comunica la función de vigilar y dar aviso, y encaja bien con el contexto profético. «Centinela» también es posible, pero «atalaya» conserva mejor el matiz bíblico de vigilancia con advertencia.
- source_word: נְתַתִּיךָ
  english_pob_choice: I have made you
  chosen_spanish: te he puesto
  alternatives_spanish:
  - te he hecho
  - te he नियुक्तado
  lexicon: HALOT
  rationale: El hebreo dice literalmente «te he dado», pero con el predicado de oficio la idea es de asignación/establecimiento. «Te he puesto» suena natural en español y preserva el sentido de comisión sin burocratizarlo.
- source_word: לְבֵית יִשְׂרָאֵל
  english_pob_choice: for the house of Israel
  chosen_spanish: para la casa de Israel
  alternatives_spanish:
  - sobre la casa de Israel
  - a la casa de Israel
  lexicon: HALOT
  rationale: «Para» conserva la idea de designación en relación con Israel, sin imponer una lectura de autoridad sobre ellos que el hebreo no exige de forma explícita.
- source_word: וְשָׁמַעְתָּ
  english_pob_choice: and you shall hear
  chosen_spanish: y oirás
  alternatives_spanish:
  - y escucharás
  - y cuando oigas
  lexicon: HALOT
  rationale: Sigo la revisión inglesa que mantiene la coordinación explícita. «Oirás» refleja el futuro/orden del encargo sin añadir una temporalidad condicionada que no está marcada de manera directa en el hebreo.
- source_word: מִפִּי
  english_pob_choice: from my mouth
  chosen_spanish: de mi boca
  alternatives_spanish:
  - de mi boca misma
  - de mi propia boca
  lexicon: HALOT
  rationale: La imagen concreta de una palabra que procede de la boca divina se conserva de forma directa y natural en español.
- source_word: דָּבָר
  english_pob_choice: a word
  chosen_spanish: una palabra
  alternatives_spanish:
  - un mensaje
  - una palabra hablada
  lexicon: HALOT
  rationale: «Palabra» reproduce el valor amplio de דָּבָר como comunicación verbal divina sin desplazarlo a una paráfrasis más interpretativa.
- source_word: וְהִזְהַרְתָּ
  english_pob_choice: you shall warn
  chosen_spanish: los amonestarás
  alternatives_spanish:
  - los advertirás
  - los amonestarás con advertencia
  lexicon: HALOT
  rationale: El verbo en hifil expresa advertir con insistencia para evitar peligro o culpa. «Amonestar» es una solución digna y fiel, cercana al sentido de advertencia profética; «advertir» también sería posible, pero «amonestar» conserva mejor el registro bíblico.
- source_word: אוֹתָם
  english_pob_choice: them
  chosen_spanish: los
  alternatives_spanish:
  - a ellos
  lexicon: HALOT
  rationale: El pronombre retoma a la casa de Israel. En español, el clítico directo masculino plural resulta natural y preciso en esta construcción.
- source_word: מִמֶּנִּי
  english_pob_choice: from me
  chosen_spanish: de parte mía
  alternatives_spanish:
  - de mí
  - por mí
  lexicon: HALOT
  rationale: «De parte mía» explicita que la amonestación procede con autoridad y representación divina. Es una forma idiomática española que conserva el origen y la agencia del mensaje sin sonar demasiado literal.
theological_decisions:
- issue: Cómo rendir el encargo profético con la relación entre recepción del mensaje y amonestación
  english_pob_reading: and you shall hear a word from my mouth and warn them from me
  chosen_spanish_reading: y oirás una palabra de mi boca y los amonestarás de parte mía
  alternative_spanish_readings:
  - y escucharás una palabra de mi boca y los advertirás de mi parte
  - y oirás una palabra de mi boca y los advertirás por mí
  rationale: 'La fuente hebrea presenta una comisión directa: Ezequiel recibe la palabra de Dios y la transmite como advertencia. Mantengo la coordinación explícita del inglés revisado y evito introducir una subordinación temporal que no está marcada de forma necesaria en el hebreo. «De parte mía» conserva que la advertencia procede con autoridad divina.'
  doctrine_reference: Translation philosophy §1, §3, §6
- issue: Retención del vocativo tradicional en Ezequiel
  english_pob_reading: Son of man
  chosen_spanish_reading: Hijo de hombre
  alternative_spanish_readings:
  - Mortal
  - Ser humano
  rationale: El hebreo בֶּן־אָדָם es un vocativo recurrente dirigido a Ezequiel. En español, «Hijo de hombre» preserva la forma idiomática y la continuidad intertextual, sin reducirla a una glosa interpretativa.
  doctrine_reference: 'Contested terms: אָדָם; Translation philosophy §4, §5'
translation_notes:
  revision_awareness: He seguido la revisión más reciente del inglés POB al preferir la coordinación explícita («y oirás... y los amonestarás») en lugar de una formulación temporal condicionada. También he mantenido el vocabulario de comisión profética con una solución española natural y auditable, sin suavizar la advertencia ni sustituir el vocativo idiomático.
  spanish_consistency_notes:
  - Se conserva «Hijo de hombre» como vocativo fijo en Ezequiel, en paralelo al inglés POB.
  - «Atalaya» se usa aquí para צֹפֶה por su valor funcional de vigilancia con advertencia.
  - «De parte mía» expresa fuente y autoridad del aviso sin ocultar el matiz representativo de מִמֶּנִּי.
  - El registro mantiene dignidad bíblica sin depender de fórmulas eclesiásticas tradicionales no exigidas por el hebreo.
