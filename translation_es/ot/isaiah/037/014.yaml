translation:
  language: es
  text: Entonces Ezequías tomó las cartas[a] de la mano de los mensajeros y las leyó[b], y subió a la casa de Yahvé y las extendió delante de Yahvé.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «de la mano de los mensajeros», un modismo para indicar que los recibió de ellos.'
    reason: cultural_note
  - marker: b
    text: O «la leyó» y «la extendió»; el hebreo usa un sufijo singular, probablemente con referencia colectiva al mensaje escrito contenido en las cartas.
    reason: lexical_alternative
lexical_decisions:
- source_word: הַסְּפָרִים
  english_pob_choice: the letters
  chosen_spanish: las cartas
  alternatives_spanish:
  - los documentos
  - los escritos
  - los rollos
  lexicon: HALOT
  rationale: סֵפֶר puede referirse a un escrito o documento en general. En este contexto narrativo, el plural designa el mensaje escrito entregado por los emisarios asirios; «cartas» comunica de forma natural una comunicación escrita recibida y conserva el sentido plural del hebreo y del inglés POB.
- source_word: מִיַּד
  english_pob_choice: from the hand of
  chosen_spanish: de la mano de
  alternatives_spanish:
  - de
  - de entre las manos de
  lexicon: HALOT
  rationale: La expresión hebrea es idiomática. «De la mano de» conserva el giro literal sin oscurecer el sentido de recepción a través de intermediarios.
- source_word: הַמַּלְאָכִים
  english_pob_choice: the messengers
  chosen_spanish: los mensajeros
  alternatives_spanish:
  - los enviados
  - los ángeles
  lexicon: HALOT
  rationale: מַלְאָךְ puede significar «mensajero» o «ángel», pero aquí el contexto histórico exige representantes humanos de Asiria. «Mensajeros» es el equivalente más directo y menos interpretativo.
- source_word: וַיִּקְרָאֵהוּ
  english_pob_choice: and read them
  chosen_spanish: y las leyó
  alternatives_spanish:
  - y la leyó
  - y las proclamó
  lexicon: HALOT
  rationale: Aunque el sufijo hebreo es singular, el antecedente colectivo son las cartas; en español, el plural «las» preserva el referente natural. Aquí קרא significa «leer», no «llamar» ni «proclamar».
- source_word: וַיַּעַל
  english_pob_choice: and he went up
  chosen_spanish: luego subió
  alternatives_spanish:
  - y ascendió
  - y fue
  lexicon: HALOT
  rationale: עלה significa «subir/ascender». «Subió» mantiene tanto el movimiento físico como el uso idiomático vinculado al monte del templo.
- source_word: בֵּית יְהוָה
  english_pob_choice: the house of Yahweh
  chosen_spanish: la casa de Yahvé
  alternatives_spanish:
  - el templo de Yahvé
  lexicon: HALOT
  rationale: El hebreo dice literalmente «casa de YHWH». «Casa de Yahvé» sigue de cerca la forma fuente y preserva la relación de pacto; «templo» sería más interpretativo.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: Se conserva el nombre divino como transliteración del Tetragrámaton, conforme al criterio del proyecto. «Yahvé» evita la sustitución por un título y mantiene la referencia personal del nombre revelado.
- source_word: וַיִּפְרְשֵׂהוּ
  english_pob_choice: and spread them
  chosen_spanish: y las extendió
  alternatives_spanish:
  - y las desplegó
  - y las puso delante
  lexicon: HALOT
  rationale: פּרשׂ significa «extender/ desplegar». Dado que el referente colectivo son las cartas, «las extendió» suena natural en español y conserva el gesto simbólico de colocarlas ante Dios.
- source_word: לִפְנֵי יְהוָה
  english_pob_choice: before Yahweh
  chosen_spanish: delante de Yahvé
  alternatives_spanish:
  - en presencia de Yahvé
  - ante Yahvé
  lexicon: HALOT
  rationale: La expresión significa literalmente «delante de/ante la presencia de». «Delante de Yahvé» preserva la relación espacial y cultual del acto de presentar la situación ante Dios.
theological_decisions:
- issue: Traducción del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: El pasaje usa el Tetragrámaton directamente. La traducción española adopta «Yahvé» para conservar el nombre propio del Dios de Israel, en vez de ocultarlo bajo una sustitución titulativa.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
translation_notes:
  revision_awareness: 'Se siguió el pasaje hebreo consonante con la auditoría inglesa: se mantuvo el plural natural para el conjunto de cartas, pero se dejó constancia en nota de la singularidad morfológica del sufijo hebreo y de la posibilidad de referirlo al mensaje colectivo. No se detectaron revisiones aplicadas en el expediente más reciente.'
  spanish_consistency_notes:
  - Se usa «Yahvé» de manera consistente para יְהוָה.
  - Se prefirió «cartas» sobre «documentos» o «rollos» por el contexto narrativo de una comunicación escrita.
  - «Casa de Yahvé» y «delante de Yahvé» conservan el léxico cultual sin sustituirlo por una paráfrasis general.
  - El plural español en «las leyó» y «las extendió» sigue el referente colectivo natural del texto, tal como refleja la nota del audit trail inglés.
