translation:
  language: es
  text: Recuerda que mi vida es un soplo[a]; mi ojo no volverá a ver el bien[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «mi vida es viento». El hebreo רוּחַ puede significar «soplo», «viento» o «espíritu»; aquí expresa la fugacidad de la vida.
    reason: lexical_alternative
  - marker: b
    text: O «mi ojo no volverá a ver el bien», es decir, experimentar bienestar o prosperidad.
    reason: lexical_alternative
lexical_decisions:
- source_word: זְכֹר
  english_pob_choice: Remember
  chosen_spanish: Recuerda
  alternatives_spanish:
  - Acuérdate
  - Recuerda, por favor
  lexicon: HALOT
  rationale: Imperativo qal 2ms. En español, «Recuerda» conserva la súplica directa sin añadir palabras que no están en el hebreo.
- source_word: רוּחַ
  english_pob_choice: breath
  chosen_spanish: soplo
  alternatives_spanish:
  - aliento
  - viento
  - espíritu
  lexicon: HALOT
  rationale: En este lamento, רוּחַ expresa transitoriedad y fragilidad de la vida. «Soplo» comunica bien esa fugacidad en español y evita la posible ambigüedad doctrinal de «espíritu».
- source_word: חַיָּי
  english_pob_choice: my life
  chosen_spanish: mi vida
  alternatives_spanish:
  - mi vivir
  - mi existencia
  - mi vivir
  lexicon: HALOT
  rationale: La forma constructa con sufijo de 1cs se refiere naturalmente a la vida del hablante. «Mi vida» es la equivalencia más clara y natural en español.
- source_word: לֹא תָשׁוּב
  english_pob_choice: will not return
  chosen_spanish: no volverá
  alternatives_spanish:
  - no regresará
  - no dará vuelta
  lexicon: HALOT
  rationale: El verbo conserva la imagen de retorno. En español, «no volverá» mantiene la solemnidad y el paralelismo con el miembro siguiente.
- source_word: עֵינִי
  english_pob_choice: my eye
  chosen_spanish: mi ojo
  alternatives_spanish:
  - mis ojos
  lexicon: HALOT
  rationale: El hebreo está en singular. Se mantiene el singular «mi ojo» para reflejar la forma poética original, aunque en español suene menos usual.
- source_word: לִרְאוֹת
  english_pob_choice: to see
  chosen_spanish: ver
  alternatives_spanish:
  - ver a
  - contemplar
  lexicon: HALOT
  rationale: Infinitivo de ראה. En esta construcción, «ver» es la opción más directa y natural en español.
- source_word: טוֹב
  english_pob_choice: good
  chosen_spanish: el bien
  alternatives_spanish:
  - la prosperidad
  - lo bueno
  - el bien-estar
  lexicon: HALOT
  rationale: «טוֹב» puede abarcar bien, bienestar o prosperidad. «El bien» preserva la amplitud semántica sin reducirlo solo a prosperidad.
theological_decisions:
- issue: Valor de רוּחַ en una afirmación sobre la fugacidad de la vida
  english_pob_reading: breath; 'wind' is a lexical alternative; 'spirit' would be misleading here
  chosen_spanish_reading: soplo; 'viento' queda como alternativa léxica, y 'espíritu' no se adopta en el texto principal
  alternative_spanish_readings:
  - viento
  - aliento
  - espíritu
  rationale: El contexto es una lamentación sobre la brevedad de la vida, no una afirmación antropológica sobre el espíritu humano. «Soplo» comunica la metáfora de manera natural y conserva la tensión textual.
  doctrine_reference: Job 7:7; HALOT sobre רוּחַ; teología bíblica de la fragilidad humana
- issue: Sentido de טוֹב al final del versículo
  english_pob_reading: good, with note that it can mean well-being or prosperity
  chosen_spanish_reading: el bien, con la posibilidad contextual de bienestar o prosperidad
  alternative_spanish_readings:
  - bienestar
  - prosperidad
  - felicidad
  rationale: El hebreo es amplio. «El bien» no cierra indebidamente la referencia y permite que el lector perciba tanto el sentido general como las posibles concreciones contextuales.
  doctrine_reference: Job 7:7; HALOT sobre טוֹב
translation_notes:
  revision_awareness: La revisión más reciente indicó que no se requerían cambios; esta versión mantiene el sentido del texto hebreo y la distinción entre רוּחַ y טוֹב sin suavizar la imaginería poética.
  spanish_consistency_notes:
  - Se mantiene el singular poético «mi ojo», reflejando el hebreo עֵינִי.
  - Se usa «Yahvé» solo cuando el texto lo requiere explícitamente; este versículo no lo contiene.
  - Se conserva una equivalencia sobria y no explicativa en el cuerpo principal, dejando las ampliaciones semánticas para las notas.
