translation:
  language: es
  text: Pero tú ridiculizas nuestra filosofía, como si no viviéramos en ella con bienaventuranza[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «como si no viviéramos en ella con felicidad», o «como si condujéramos nuestra vida en ella con buen renombre». El sustantivo griego es raro y puede sugerir bienaventuranza, felicidad o estima honorable.
    reason: lexical_alternative
lexical_decisions:
- source_word: χλευάζεις
  english_pob_choice: you mock
  chosen_spanish: tú ridiculizas
  alternatives_spanish:
  - tú te burlas de
  - tú escarneces
  lexicon: LSJ
  rationale: El verbo griego expresa burla despectiva o escarnio. 'Ridiculizas' conserva el tono de desprecio directo y funciona con registro digno en español; 'te burlas de' sería más idiomático pero algo menos incisivo, y 'escarneces' suena más arcaico.
- source_word: φιλοσοφίαν
  english_pob_choice: philosophy
  chosen_spanish: filosofía
  alternatives_spanish:
  - modo de vida
  - enseñanza
  lexicon: LSJ
  rationale: En 4 Macabeos el término funciona como categoría propia del autor para la vida judía piadosa y racional. Mantener 'filosofía' respeta el marco retórico del texto y evita una paráfrasis interpretativa.
- source_word: ὥσπερ
  english_pob_choice: as though
  chosen_spanish: como si
  alternatives_spanish:
  - como si fuera que
  - como si no
  lexicon: LSJ
  rationale: '''Como si'' reproduce la comparación que presenta la suposición errónea del hablante. Es la forma natural y fiel en español.'
- source_word: εὐλογιστίας
  english_pob_choice: with blessedness
  chosen_spanish: con bienaventuranza
  alternatives_spanish:
  - con felicidad
  - con buen renombre
  - con bendición
  lexicon: LSJ
  rationale: El sustantivo es raro y puede abarcar una cualidad de vida aprobada, feliz o digna de bendición. 'Bienaventuranza' conserva esa carga moral-religiosa sin reducirla a emoción subjetiva; 'felicidad' sería demasiado plana, y 'buen renombre' estrecha el sentido.
- source_word: ἐν αὐτῇ βιούντων
  english_pob_choice: live in it
  chosen_spanish: viviéramos en ella
  alternatives_spanish:
  - viviéramos por ella
  - condujéramos nuestra vida en ella
  lexicon: LSJ
  rationale: La imagen es literalmente de vivir 'en ella', refiriéndose a la filosofía. 'Viviéramos en ella' refleja esa construcción y sugiere una existencia ordenada dentro de ese marco, sin forzar el giro a una paráfrasis.
theological_decisions:
- issue: Conservar 'filosofía' como auto-descripción del libro
  english_pob_reading: Retain 'philosophy' in the main text rather than replacing it with an explicitly religious paraphrase.
  chosen_spanish_reading: Mantener 'filosofía' en el texto principal.
  alternative_spanish_readings:
  - modo de vida
  - piedad razonada
  - enseñanza
  rationale: 4 Macabeos presenta deliberadamente la fidelidad judía como una filosofía. Traducirlo así preserva la autodescripción del autor y evita imponer una etiqueta devocional posterior que el griego no usa.
  doctrine_reference: DOCTRINE.md Translation philosophy §§1, 5
- issue: Valor de εὐλογιστία
  english_pob_reading: Render as 'blessedness' rather than a flatter term like 'happiness.'
  chosen_spanish_reading: Traducir con 'bienaventuranza'.
  alternative_spanish_readings:
  - felicidad
  - dicha
  - buen renombre
  rationale: El contexto no habla solo de satisfacción emocional, sino de una forma de vida considerada favorable ante Dios y honorable. 'Bienaventuranza' conserva mejor ese espesor semántico que 'felicidad' o 'dicha', sin resolver la ambigüedad hacia un solo matiz.
  doctrine_reference: DOCTRINE.md Translation philosophy §§1, 6
translation_notes:
  revision_awareness: La revisión inglesa más reciente ajustó 'live by it' a 'live in it' para reflejar más directamente ἐν αὐτῇ βιούντων. En español se siguió esa corrección con 'viviéramos en ella'. También se mantuvo la decisión auditable de traducir εὐλογιστία con un término de peso moral-religioso, aquí 'bienaventuranza'.
  spanish_consistency_notes:
  - Se conserva 'filosofía' como término técnico del pasaje, conforme al audit trail inglés.
  - Se evita 'SEÑOR' u otras sustituciones no pertinentes; no hay nombres divinos en este versículo.
  - El tono es formal y publicable, sin caer en calcos rígidos ni en paráfrasis libres.
