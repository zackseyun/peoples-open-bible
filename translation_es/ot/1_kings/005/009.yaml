- from: Yahvé dio a Salomón sabiduría y muy grande entendimiento[a], y anchura de corazón como la arena que está a la orilla del mar.
  to: Dios dio a Salomón sabiduría y gran entendimiento, y anchura de corazón[a] como la arena que está en la orilla del mar.
  rationale: Se corrige «Yahvé» a «Dios» porque el texto fuente tiene אֱלֹהִים y no el nombre divino יהוה. También se pule «muy grande entendimiento» a «gran entendimiento» para un español más natural, manteniendo el énfasis del hebreo. Se conserva «anchura de corazón» con nota, en línea con la revisión auditada del POB inglés.
