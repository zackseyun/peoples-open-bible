revisions:
- from: 'Pero el rey dijo[a]: «Que vuelva a su casa, y no vea mi rostro». Entonces Absalón volvió a su casa y no vio el rostro del rey.'
  to: 'Pero el rey dijo[a]: «Que se vaya a su casa, y no vea mi rostro». Entonces Absalón se fue a su casa y no vio el rostro del rey.'
  rationale: 'Se revisa únicamente el verbo principal para reflejar mejor סבב según la evidencia fuente y la decisión léxica auditada: no solo regresar, sino apartarse y dirigirse a su propia casa en vez de comparecer ante el rey. Se mantiene ‘rostro’ literalmente con la nota, porque esa decisión sí preserva bien el modismo hebreo.'
