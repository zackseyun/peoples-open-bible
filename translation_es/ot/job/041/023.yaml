translation:
  language: es
  text: Hace hervir el abismo como una olla[a]; pone el mar como un ungüento batido.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «como una mezcla de perfumista» o «como ungüento». El término hebreo se refiere a un compuesto mezclado, a menudo asociado con ungüento o perfume.'
    reason: lexical_alternative
lexical_decisions:
- source_word: יַרְתִּיחַ
  english_pob_choice: makes ... boil
  chosen_spanish: hace hervir
  alternatives_spanish:
  - hace que hierva
  - lo hace hervir
  - hace sebólar
  lexicon: HALOT
  rationale: 'El verbo hifil expresa causación: ''hacer hervir''. ''Hace hervir'' conserva la fuerza causativa y suena natural en español poético.'
- source_word: כַּסִּיר
  english_pob_choice: like a pot
  chosen_spanish: como una olla
  alternatives_spanish:
  - como una pota
  - como un caldero
  - como una cacerola
  lexicon: HALOT
  rationale: סִיר designa un recipiente de cocina. 'Olla' es claro y fiel en español actual; 'caldero' suena más arcaico o más específico.
- source_word: מְצוּלָה
  english_pob_choice: the deep
  chosen_spanish: el abismo
  alternatives_spanish:
  - la profundidad
  - las profundidades
  - lo profundo
  lexicon: HALOT
  rationale: En el paralelismo con 'el mar', 'abismo' transmite bien la idea de las profundidades del agua y conserva el tono poético. También mantiene el peso imagético de una masa hirviente y honda.
- source_word: יָם
  english_pob_choice: the sea
  chosen_spanish: el mar
  alternatives_spanish:
  - el océano
  - las aguas
  lexicon: HALOT
  rationale: יָם normalmente significa 'mar'. 'Mar' es la correspondencia directa y mantiene el paralelismo concreto con 'abismo'.
- source_word: יָשִׂים
  english_pob_choice: he makes
  chosen_spanish: hace
  alternatives_spanish:
  - pone
  - convierte
  - lo vuelve
  lexicon: HALOT
  rationale: En esta construcción comparativa, שׂים tiene valor de 'hacer/convertir'. 'Hace' comunica bien el efecto resultante sin forzar el español.
- source_word: כַּמֶּרְקָחָה
  english_pob_choice: like a pot of ointment
  chosen_spanish: como una mezcla de ungüento
  alternatives_spanish:
  - como ungüento
  - como una mezcla de perfumista
  - como una preparación de ungüento
  lexicon: HALOT
  rationale: מֶרְקָחָה indica una mezcla compuesta, asociada con ungüento o perfume. 'Mezcla de ungüento' preserva la idea de compuesto y evita decidir demasiado pronto por una sola sustancia.
translation_notes:
  revision_awareness: La revisión más reciente indicó que no había cambios necesarios; el presente borrador mantiene la misma lectura semántica básica del original y del audit trail inglés, con una formulación española natural y fiel.
  spanish_consistency_notes:
  - 'Se mantuvo el paralelismo de dos miembros: ''hace hervir... como una olla'' // ''hace del mar... como una mezcla de ungüento''.'
  - Se eligió 'abismo' para מְצוּלָה por su fuerza poética y su relación con las aguas profundas; no se suavizó a 'profundidad' para no perder densidad imagística.
  - Se evitó 'Cristo', 'SEÑOR' o términos no presentes en el versículo; no hay decisiones teológicas adicionales en este texto.
