translation:
  language: es
  text: y tu pueblo experimentó un viaje maravilloso[a], pero encontraron una muerte extraña[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «atravesó una travesía asombrosa». El verbo puede expresar experimentar o pasar por algo, no solo intentar.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «una muerte desconocida». El adjetivo griego puede implicar algo extraño o no familiar.'
    reason: lexical_alternative
lexical_decisions:
- source_word: λαός
  english_pob_choice: people
  chosen_spanish: pueblo
  alternatives_spanish:
  - gente
  - nación
  lexicon: LSJ
  rationale: λαός designa al pueblo colectivo; en español, «pueblo» conserva mejor la referencia comunitaria y el matiz de pertenencia posesiva («tu pueblo») que «gente» o «nación».
- source_word: παράδοξον
  english_pob_choice: marvelous
  chosen_spanish: maravilloso
  alternatives_spanish:
  - extraordinario
  - asombroso
  - extraño
  lexicon: LSJ
  rationale: El adjetivo puede expresar lo sorprendente o admirable; «maravilloso» reproduce bien el valor positivo y contrastivo del contexto, sin volverlo mecánicamente a «extraño».
- source_word: ὁδοιπορίαν
  english_pob_choice: journey
  chosen_spanish: viaje
  alternatives_spanish:
  - travesía
  - camino
  - peregrinación
  lexicon: LSJ
  rationale: Se refiere al desplazamiento o recorrido. «Viaje» es natural y fiel, y evita una formulación demasiado técnica o arcaica.
- source_word: πειράσῃ
  english_pob_choice: experienced
  chosen_spanish: experimentó
  alternatives_spanish:
  - pasó por
  - soportó
  - experimentó la experiencia de
  lexicon: LSJ
  rationale: Aquí el verbo tiene fuerza de «probar/experimentar/soportar» un recorrido, no de «intentar». «Experimentó» comunica que el pueblo pasó por esa travesía.
- source_word: ξένον
  english_pob_choice: strange
  chosen_spanish: extraña
  alternatives_spanish:
  - extraña
  - insólita
  - ajena
  lexicon: LSJ
  rationale: En relación con muerte, «extraña» conserva la aspereza y la tensión del griego sin cargar el texto con una explicación interpretativa.
- source_word: εὕρωσι
  english_pob_choice: found
  chosen_spanish: encontraron
  alternatives_spanish:
  - hallaron
  - se encontraron con
  lexicon: LSJ
  rationale: El verbo griego expresa topar con o hallar algo. «Encontraron» es idiomático en español y mantiene la inmediatez de la acción.
- source_word: θάνατον
  english_pob_choice: death
  chosen_spanish: muerte
  alternatives_spanish:
  - fallecimiento
  - destrucción
  lexicon: LSJ
  rationale: θάνατον significa literalmente «muerte»; no conviene generalizarlo a «destrucción» porque el contraste del verso se apoya precisamente en la muerte.
- source_word: ἐκεῖνοι
  english_pob_choice: they
  chosen_spanish: ellos
  alternatives_spanish:
  - aquellos
  - esos
  lexicon: LSJ
  rationale: El demostrativo contrasta con «tu pueblo». En español, «ellos» mantiene la referencia contrastiva sin añadir un sustantivo no presente en el griego.
theological_decisions:
- issue: Contraste entre el pueblo de Dios y los egipcios
  english_pob_reading: God's people had a marvelous journey, while the others met a strange death.
  chosen_spanish_reading: 'El texto presenta un antítesis clara: tu pueblo tiene una travesía maravillosa, mientras ellos encuentran una muerte extraña.'
  alternative_spanish_readings:
  - '...una travesía maravillosa, pero los otros encontraron una muerte extraña.'
  - '...un viaje maravilloso, pero ellos encontraron una muerte extraña.'
  rationale: 'El griego contrapone dos destinos: para el pueblo de Dios, la travesía; para los otros, la muerte. La formulación española conserva esa oposición sin suavizar el contraste ni reescribirlo en términos doctrinales ajenos al verso.'
  doctrine_reference: Translation philosophy §§1, 5
translation_notes:
  revision_awareness: 'Seguí la revisión más reciente del audit trail: para παράδοξον se prefirió una solución natural y positiva («maravilloso»), y para ἐκεῖνοι se evitó agregar un sustantivo como «hombres», manteniendo el pronombre de tercera persona. La traducción española procura reflejar esa misma decisión, con una sintaxis fluida y fiel al contraste del griego.'
  spanish_consistency_notes:
  - Conservo «Yahvé» solo cuando el texto lo requiera; aquí el verso usa el posesivo «tu» y no nombra el tetragrámaton.
  - Mantengo «pueblo» como término colectivo coherente con el registro bíblico del proyecto.
  - Uso «muerte» sin eufemismo para preservar el contraste semántico del verso.
  - Evito «Cristo», «SEÑOR» y otras sustituciones no motivadas por este pasaje.
