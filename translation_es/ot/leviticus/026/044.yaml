translation:
  language: es
  text: Y aun con todo eso, cuando estén en la tierra de sus enemigos, no los desecharé ni los aborreceré[a] para destruirlos[b], para quebrantar mi pacto con ellos; porque yo soy Yahvé, su Dios[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «ni los desdeñaré».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «para acabar con ellos»; o «para consumirlos por completo».'
    reason: lexical_alternative
  - marker: c
    text: El nombre divino יְהוָה se traduce aquí como «Yahvé».
    reason: source_note
lexical_decisions:
- source_word: וְאַף גַּם זֹאת
  english_pob_choice: Yet even then
  chosen_spanish: Aun así
  alternatives_spanish:
  - Y aun entonces
  - Pero aun así
  lexicon: HALOT
  rationale: 'La combinación intensifica una concesión adversativa. «Aun así» comunica en español la misma fuerza: pese a lo anterior, lo que sigue permanece verdadero, sin volverla demasiado literal ni demasiado interpretativa.'
- source_word: בִּהְיוֹתָם
  english_pob_choice: when they are
  chosen_spanish: cuando estén
  alternatives_spanish:
  - cuando están
  - mientras estén
  lexicon: HALOT
  rationale: El infinitivo constructo con ב marca circunstancia temporal. En español, el subjuntivo futuro de eventualidad «cuando estén» expresa bien la situación contemplada sin perder la relación temporal.
- source_word: בְּאֶרֶץ אֹיְבֵיהֶם
  english_pob_choice: in the land of their enemies
  chosen_spanish: en la tierra de sus enemigos
  alternatives_spanish:
  - en la tierra de sus enemigos
  - en el país de sus enemigos
  lexicon: HALOT
  rationale: «Tierra» conserva mejor el campo semántico del hebreo אֶרֶץ que «país», y mantiene el tono bíblico sin sonar arcaico en exceso.
- source_word: לֹא מְאַסְתִּים
  english_pob_choice: I will not reject them
  chosen_spanish: no los desecharé
  alternatives_spanish:
  - no los rechazaré
  - no los desecharé ni los repudiaré
  lexicon: HALOT
  rationale: מָאַס puede expresar rechazar, repudiar o desechar. «Desechar» preserva el peso relacional de la negación divina sin limitarlo a un matiz meramente intelectual.
- source_word: וְלֹא גְעַלְתִּים
  english_pob_choice: I will not abhor them
  chosen_spanish: ni los aborreceré
  alternatives_spanish:
  - ni los detestaré
  - ni los tendré por abominables
  lexicon: HALOT
  rationale: גָּעַל comunica aversión intensa. «Aborrecer» refleja con claridad esa repulsión sin convertirla en una expresión coloquial o demasiado débil.
- source_word: לְכַלֹּתָם
  english_pob_choice: so as to destroy them
  chosen_spanish: para destruirlos
  alternatives_spanish:
  - para acabar con ellos
  - para consumirlos por completo
  lexicon: HALOT
  rationale: El infinitivo final expresa propósito o resultado. «Para destruirlos» es una equivalencia natural y fiel; mantiene abierta la posibilidad de la alternativa totalizante documentada en la nota inglesa.
- source_word: לְהָפֵר בְּרִיתִי אִתָּם
  english_pob_choice: to break my covenant with them
  chosen_spanish: para quebrantar mi pacto con ellos
  alternatives_spanish:
  - para romper mi pacto con ellos
  - para anular mi pacto con ellos
  lexicon: HALOT
  rationale: הֵפֵר aplicado al pacto significa quebrantar/romper/invalidar. «Quebrantar» conserva la solemnidad del lenguaje pactal y suena más bíblico que «romper» en este contexto, sin perder claridad.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahveh
  - el Señor
  lexicon: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
  rationale: Se conserva el nombre divino personal como «Yahvé», conforme al criterio del proyecto, en lugar de sustituirlo por un título reverencial. Esto mantiene visible el Tetragrámaton del hebreo.
- source_word: אֱלֹהֵיהֶם
  english_pob_choice: their God
  chosen_spanish: su Dios
  alternatives_spanish:
  - su Dios
  - el Dios de ellos
  lexicon: HALOT
  rationale: La relación posesiva del hebreo se expresa de forma natural y reverente con «su Dios», manteniendo el vínculo de pacto que cierra la cláusula.
theological_decisions:
- issue: Cómo renderizar el nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahveh
  - el Señor
  rationale: El texto hebreo usa directamente el Nombre divino. Siguiendo la política del proyecto, se evita la sustitución por un título genérico y se preserva el nombre de pacto en español como «Yahvé».
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Fuerza aspectual/retórica de los verbos negados
  english_pob_reading: I will not reject... I will not abhor
  chosen_spanish_reading: no los desecharé... ni los aborreceré
  alternative_spanish_readings:
  - no los rechazaré... ni los aborreceré
  - no los rechazaré... ni los repudiaré
  rationale: Aunque los verbos hebreos están en perfecto, el contexto del exilio y la promesa de conservación del pacto hacen que el español suene mejor en futuro. Esto preserva la fuerza de compromiso divino sin convertir el verso en una mera descripción pasada.
  doctrine_reference: 'DOCTRINE.md Contested terms: aspecto verbal en promesa profética'
- issue: Relación entre destrucción total y pacto
  english_pob_reading: so as to destroy them, to break my covenant with them
  chosen_spanish_reading: para destruirlos, para quebrantar mi pacto con ellos
  alternative_spanish_readings:
  - para acabar con ellos, para romper mi pacto con ellos
  - para consumirlos por completo, para anular mi pacto con ellos
  rationale: 'El hebreo une el verbo de destrucción con el quebrantamiento del pacto. La traducción conserva esa tensión: Dios afirma que su trato disciplinario no llegará al punto de anular la relación pactal.'
  doctrine_reference: Teología del pacto en Levítico 26
- issue: Presencia del Nombre divino al final de la cláusula
  english_pob_reading: for I am Yahweh their God
  chosen_spanish_reading: porque yo soy Yahvé, su Dios
  alternative_spanish_readings:
  - porque yo soy Yahvé, el Dios de ellos
  - porque yo soy el Dios de ellos, Yahvé
  rationale: La clausula final funciona como fundamento del compromiso previo. Mantener el Nombre y la relación posesiva conserva la autoidentificación divina como base de la promesa.
  doctrine_reference: Identidad de pacto de Yahvé
translation_notes:
  revision_awareness: 'Se respetó la lectura auditada del POB en inglés: concesión intensificada al inicio, futuro promisor en la negación, y preservación del cierre pactal. La versión española sigue esa misma línea sin introducir reinterpretaciones doctrinales nuevas.'
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» para יְהוָה, conforme al estándar del proyecto.
  - Se prefirió «pacto» para בְּרִית en lenguaje bíblico natural y consistente.
  - Se usó futuro español en las negaciones para reflejar la fuerza promissoria del contexto.
  - No se suavizó la doble negación ni la tensión entre juicio y permanencia del pacto.
