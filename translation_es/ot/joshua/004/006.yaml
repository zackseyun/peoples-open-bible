  source_alignment_summary: 'El borrador refleja bien la estructura y el sentido general del hebreo: finalidad («para que»), resultado deseado («sea»), función memorial («señal»), ubicación comunitaria («entre ustedes»), valor idiomático futuro de מָחָר («en el futuro»), y la pregunta por el significado de las piedras. Sin embargo, no preserva del todo la decisión auditada de la POB inglesa sobre בְּנֵיכֶם, que explicitó sentido inclusivo representativo como «your children». En español, «sus hijos» puede oírse como masculino o como genérico, pero aquí no comunica tan claramente la intención inclusiva documentada.'
  spanish_quality_summary: 'El español es claro, natural y digno. La puntuación y el registro son adecuados. No obstante, hay dos ajustes recomendables: 1) cambiar «sus hijos» por «sus hijos[a]» no resuelve la ambigüedad; es mejor usar «sus hijos e hijas[a]» o «sus hijos[a]» con nota muy fuerte, y dado el criterio del proyecto conviene que el texto principal comunique mejor la referencia generacional inclusiva; 2) la nota sobre «señal» no es una verdadera alternativa léxica preservada del inglés y resulta innecesaria. También falta la nota equivalente al inglés para la alternativa más literal de la pregunta («¿Qué son estas piedras para ustedes?»).'
  glossary_alignment: 'No hay términos teológicos mayores en conflicto con el glosario global. «Señal» para אוֹת y «piedras» para הָאֲבָנִים están bien. El punto principal de alineación con la filosofía documentada es la referencia generacional: conviene evitar que «hijos» opaque la elección inglesa inclusiva. Además, debe preservarse la alternativa literal de מָה ... לָכֶם en nota, como hizo la auditoría inglesa.'
