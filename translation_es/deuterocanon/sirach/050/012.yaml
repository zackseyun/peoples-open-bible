translation:
  language: es
  text: 'Cuando recibió las porciones de la mano de sus hermanos[a], y estaba en su puesto ordenado[b], a su alrededor había una corona de hijos, como retoños de cedros en el Líbano; y lo rodearon como sauces junto a un arroyo: todos los hijos de Aarón en su esplendor.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «de la mano de sus hermanos»; el paralelo griego dice «de las manos de los sacerdotes». El contexto indica que se trata de compañeros sacerdotes.'
    reason: alternative_reading
  - marker: b
    text: La expresión hebrea es difícil. El paralelo griego orienta la escena, pero el texto hebreo conserva la idea de orden o disposición.
    reason: textual_variant
lexical_decisions:
- source_word: בְּקַבְּלוֹ / δέχεσθαι
  english_pob_choice: When he received
  chosen_spanish: Cuando recibió
  alternatives_spanish:
  - al recibir
  - mientras recibía
  lexicon: HALOT / Greek parallel
  rationale: El valor temporal circunstancial se conserva de forma natural en español con 'Cuando recibió'. Evita una paráfrasis más libre y sigue la secuencia narrativa del texto.
- source_word: נְתָחִים
  english_pob_choice: the portions
  chosen_spanish: las porciones
  alternatives_spanish:
  - los pedazos
  - las piezas
  lexicon: HALOT
  rationale: En contexto sacrificial, 'porciones' comunica la división cultual de la carne sin introducir una glosa excesiva.
- source_word: מִיַּד אֶחָיו
  english_pob_choice: from the hand of his brothers
  chosen_spanish: de la mano de sus hermanos
  alternatives_spanish:
  - de la mano de los sacerdotes
  - de manos de sus hermanos
  lexicon: HALOT
  rationale: Se mantiene la lectura hebrea literal 'sus hermanos', porque es la testigo principal. No se sustituye por 'sacerdotes' en el texto principal, aunque el contexto y el paralelo griego apuntan a compañeros sacerdotes.
- source_word: נִצָּב עַל מַעֲרָכוֹת
  english_pob_choice: stood at his arrangement
  chosen_spanish: estuvo en su orden
  alternatives_spanish:
  - estuvo junto a la disposición
  - estuvo en la disposición
  lexicon: HALOT
  rationale: Se preserva la dificultad del hebreo con una expresión española breve y publicable. 'Orden' intenta conservar la idea de arreglo/disposición sin añadir 'altar' que el hebreo no expresa de manera explícita en la forma adoptada por la POB.
- source_word: עֲטֶרֶת
  english_pob_choice: a crown
  chosen_spanish: una corona
  alternatives_spanish:
  - una guirnalda
  - un círculo honorífico
  lexicon: HALOT
  rationale: '''Corona'' reproduce la imagen honorífica central del pasaje y funciona bien con la metáfora visual del grupo alrededor del sacerdote.'
- source_word: בָּנִים
  english_pob_choice: sons
  chosen_spanish: hijos
  alternatives_spanish:
  - hijos varones
  - descendientes
  lexicon: HALOT
  rationale: Aunque el hebreo es masculino plural y el contexto habla de Aaronitas, en español 'hijos' permite una lectura natural y mantiene la imagen filial del pasaje poético.
- source_word: כִּשְׁתִילֵי אֲרָזִים
  english_pob_choice: like saplings of cedars
  chosen_spanish: como retoños de cedros
  alternatives_spanish:
  - como plantones de cedros
  - como brotes de cedros
  lexicon: HALOT
  rationale: '''Retoños'' comunica crecimiento joven y vigoroso en un registro poético natural. Conserva la imagen arbórea sin hacerla demasiado técnica.'
- source_word: בַּלְּבָנוֹן
  english_pob_choice: in Lebanon
  chosen_spanish: en el Líbano
  alternatives_spanish:
  - del Líbano
  lexicon: HALOT
  rationale: Traducción geográfica estándar en español.
- source_word: בְּעַרְבֵי נָחַל
  english_pob_choice: like willows by a stream
  chosen_spanish: como sauces junto a un arroyo
  alternatives_spanish:
  - como sauces de un arroyo
  - como sauces al borde del torrente
  lexicon: HALOT
  rationale: Se preserva la comparación vegetal y acuática con una expresión española clara. 'Arroyo' transmite el entorno de agua corriente sin cargar el texto con un arcaísmo.
- source_word: בִּכְבוֹדָם
  english_pob_choice: in their splendor
  chosen_spanish: en su esplendor
  alternatives_spanish:
  - con su gloria
  - en su honor
  lexicon: HALOT
  rationale: '''Esplendor'' reproduce bien el matiz de dignidad visible y belleza honorífica. Mantiene el tono elevado del poema.'
theological_decisions:
- issue: Lectura de 'sus hermanos' frente al paralelo griego 'sacerdotes'
  english_pob_reading: Retain 'his brothers' in the main text while allowing the priestly sense to be inferred from context and the following clause.
  chosen_spanish_reading: Mantener 'sus hermanos' en el texto principal y dejar que el contexto identifique que se trata de sacerdotes hermanos.
  alternative_spanish_readings:
  - de los sacerdotes
  - de sus hermanos sacerdotes
  rationale: El hebreo conserva 'sus hermanos' y el paralelo griego explicita 'sacerdotes'. La traducción española sigue el testigo hebreo principal sin borrar la tensión textual; el contexto inmediato y la mención de los hijos de Aarón aclaran la identidad.
  doctrine_reference: Primacía del testigo original; conservar la tensión textual cuando existe una variante interpretativa significativa.
- issue: Expresión difícil de מַעֲרָכוֹת
  english_pob_reading: 'Render with altar-oriented sense: ''stood at his arranged place by the altar.'''
  chosen_spanish_reading: Traducir con una expresión que conserve la idea de disposición/orden sin añadir una localización cultual no explícita en el hebreo adoptado.
  alternative_spanish_readings:
  - estuvo sobre las disposiciones
  - estuvo junto al altar
  rationale: El hebreo es difícil; la tradición griega ayuda a orientar la escena, pero la revisión inglesa reciente retiró 'by the altar' por no estar en el hebreo. El español evita sobretraducir y mantiene la opacidad relativa del término con una solución prudente.
  doctrine_reference: Equivalencia óptima con control intertextual; no introducir elementos no atestiguados en el testimonio principal.
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión más reciente del inglés POB, que retiró 'by the altar' por no estar explícito en el hebreo y ajustó la frase a 'stood at his arrangement'. Por eso el español evita añadir 'altar' en el cuerpo principal y mantiene una solución más literal para מַעֲרָכוֹת. También se respetó la nota de variante del griego sobre 'sacerdotes' frente a 'hermanos' sin resolverla en el texto principal.
  spanish_consistency_notes:
  - Se usa 'Yahvé' solo cuando aparezca el nombre divino; en este versículo no aplica.
  - '''Hijos de Aarón'' se conserva como expresión cultual estable, coherente con el contexto sacerdotal.'
  - Se prefirió 'esplendor' para bִּכְבוֹדָם por su tono elevado y por ser natural en español bíblico moderno.
  - La puntuación reproduce el paralelismo poético con punto y coma y dos puntos, facilitando la lectura pública.
