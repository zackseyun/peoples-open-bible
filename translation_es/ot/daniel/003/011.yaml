translation:
  language: es
  text: Y quien no se postre y adore será arrojado[a] en medio de un horno de fuego ardiente.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, con una formulación más libre: «será arrojado en medio de un horno ardiente de fuego».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וּמַן
  english_pob_choice: And whoever
  chosen_spanish: Y quien
  alternatives_spanish:
  - Y cualquiera que
  - Y todo el que
  lexicon: HALOT
  rationale: El arameo introduce una condición general indefinida; en español, «quien» comunica de forma natural esa generalidad. Conservé la conjunción inicial con «Y» para reflejar la continuidad del decreto con el versículo anterior.
- source_word: דִּי
  english_pob_choice: whoever
  chosen_spanish: quien
  alternatives_spanish:
  - que
  - el que
  lexicon: HALOT
  rationale: Aquí דִּי funciona como relativo; unido a וּמַן queda absorbido en una sola construcción idiomática en español, sin necesidad de traducirlo por separado.
- source_word: לָא
  english_pob_choice: does not
  chosen_spanish: 'no'
  alternatives_spanish:
  - no hará
  - no va a
  lexicon: HALOT
  rationale: La negación rige los verbos siguientes en un contexto de decreto legal. En español, «no» conserva la fuerza general y evita introducir tiempo verbal innecesario.
- source_word: יִפֵּל
  english_pob_choice: fall down
  chosen_spanish: se postre
  alternatives_spanish:
  - caiga
  - se incline
  lexicon: HALOT
  rationale: En el contexto de homenaje ante una imagen, el verbo no es una caída física cualquiera sino postración reverente. «Se postre» expresa mejor esa obediencia corporal y ceremonial en español.
- source_word: וְיִסְגֻּד
  english_pob_choice: and worship
  chosen_spanish: y adore
  alternatives_spanish:
  - y rinda homenaje
  - y se postre
  lexicon: HALOT
  rationale: El segundo verbo añade el sentido de acto reverente de adoración/homenaje. «Adore» comunica bien el valor religioso del acto, manteniendo la distinción respecto de «se postre».
- source_word: יִתְרְמֵא
  english_pob_choice: shall be thrown
  chosen_spanish: será arrojado
  alternatives_spanish:
  - será lanzado
  - será echado
  lexicon: HALOT
  rationale: El pasivo/imperfecto en el decreto expresa la pena prescrita. «Será arrojado» conserva la fuerza judicial y la violencia del castigo con un español claro y formal.
- source_word: לְגוֹא
  english_pob_choice: into the midst of
  chosen_spanish: en medio de
  alternatives_spanish:
  - dentro de
  - al interior de
  lexicon: HALOT
  rationale: La expresión señala el interior o centro del horno. «En medio de» es la forma española más natural para preservar esa imagen vívida sin perder precisión.
- source_word: אַתּוּן
  english_pob_choice: a furnace
  chosen_spanish: un horno
  alternatives_spanish:
  - un horno de fundición
  - un horno
  lexicon: HALOT
  rationale: El término arameo puede referir a horno/furnace. En español, «horno» es suficientemente amplio y natural; el contexto ya determina que no es un horno doméstico ordinario.
- source_word: נוּרָא יָקִדְתָּא
  english_pob_choice: of blazing fire
  chosen_spanish: ardiente de fuego
  alternatives_spanish:
  - de fuego ardiente
  - en llamas
  lexicon: HALOT
  rationale: La secuencia intensifica el horno como asociado al fuego ardiente. «Ardiente de fuego» mantiene la repetición enfática del original, aunque en español suene intensiva más que literal.
translation_notes:
  revision_awareness: 'Se siguió el último estado del audit trail inglés: ''a blazing furnace of fire'' fue reordenado desde una formulación más literal para lograr mayor naturalidad sin perder los elementos léxicos del arameo. La versión española conserva esa misma decisión de fluidez controlada, manteniendo el paralelismo de postración/adoración y la imagen intensificada del horno de fuego.'
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» como norma del proyecto, pero este versículo no contiene el nombre divino.
  - Se evitó «Cristo» porque no hay lenguaje mesiánico en este texto.
  - Se prefirió una sintaxis directa y formal, acorde con un decreto real.
  - Se conservó la distinción entre postración física («se postre») y acto de culto («adore»).
