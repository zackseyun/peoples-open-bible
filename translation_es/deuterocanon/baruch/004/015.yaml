translation:
  language: es
  text: Porque hizo venir contra ellos una nación de lejos[a], una nación desvergonzada y de lengua extranjera, que no tuvo respeto por el anciano y no tuvo misericordia del niño[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «una nación de otra lengua» o «una nación de lengua extraña».
    reason: lexical_alternative
  - marker: b
    text: El griego dice literalmente «el anciano» y «el niño», con singulares representativos de los vulnerables.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐπήγαγεν
  english_pob_choice: brought against
  chosen_spanish: trajo contra
  alternatives_spanish:
  - hizo venir contra
  - llevó contra
  lexicon: LSJ
  rationale: El verbo con ἐπʼ αὐτούς expresa traer o hacer venir una fuerza hostil sobre ellos. «Trajo contra» conserva bien la hostilidad y suena natural en español sin debilitar la imagen de ataque.
- source_word: ἔθνος
  english_pob_choice: nation
  chosen_spanish: nación
  alternatives_spanish:
  - pueblo
  - nación extranjera
  lexicon: LSJ
  rationale: Aquí ἔθνος funciona para un pueblo colectivo invasor. «Nación» mantiene la repetición enfática del griego y corresponde al valor preferido por el audit trail inglés.
- source_word: μακρόθεν
  english_pob_choice: from far away
  chosen_spanish: de lejos
  alternatives_spanish:
  - desde muy lejos
  - de un lugar distante
  lexicon: LSJ
  rationale: La idea es distancia geográfica. «De lejos» es idiomático en español y conserva la claridad del adverbio sin añadir información.
- source_word: ἀναιδές
  english_pob_choice: shameless
  chosen_spanish: desvergonzada
  alternatives_spanish:
  - sin pudor
  - insolente
  - atrevida
  lexicon: LSJ
  rationale: El núcleo léxico es falta de vergüenza o pudor. «Desvergonzada» reproduce mejor ese valor que una paráfrasis moral más amplia.
- source_word: ἀλλόγλωσσον
  english_pob_choice: foreign-speaking
  chosen_spanish: de lengua extraña
  alternatives_spanish:
  - de otra lengua
  - de habla extranjera
  - de lengua extranjera
  lexicon: LSJ
  rationale: El compuesto significa literalmente «de lengua/idioma distinto». «De lengua extraña» suena natural y mantiene la alteridad lingüística sin volverlo mecánico.
- source_word: οὐκ ᾐσχύνθησαν πρεσβύτην
  english_pob_choice: showed no respect for the old man
  chosen_spanish: no tuvo respeto por el anciano
  alternatives_spanish:
  - no se avergonzó ante el anciano
  - no honró al anciano
  - no tuvo respeto por el viejo
  lexicon: LSJ
  rationale: El griego apunta a falta de deferencia hacia una persona mayor, no sólo a un sentimiento interno de vergüenza. «No tuvo respeto por el anciano» conserva esa fuerza social; el singular mantiene el valor representativo documentado.
- source_word: παιδίον
  english_pob_choice: the child
  chosen_spanish: el niño
  alternatives_spanish:
  - el muchacho
  - el pequeño
  - el infante
  lexicon: LSJ
  rationale: παιδίον es más amplio que un bebé. «Niño» es la opción más natural y abarca la vulnerabilidad infantil que el versículo contrapone al anciano.
- source_word: ἠλέησαν
  english_pob_choice: had no mercy on
  chosen_spanish: no tuvo misericordia de
  alternatives_spanish:
  - no se compadeció de
  - no mostró piedad hacia
  lexicon: LSJ
  rationale: ἐλεέω expresa tener misericordia o compasión. «No tuvo misericordia de» conserva la fuerza bíblica y se ajusta al paralelismo del texto.
theological_decisions:
- issue: Singulares representativos para personas vulnerables
  english_pob_reading: the old man ... the child
  chosen_spanish_reading: el anciano ... el niño
  alternative_spanish_readings:
  - los ancianos ... los niños
  - el anciano ... la criatura
  rationale: El griego usa singulars (πρεσβύτην, παιδίον) con valor representativo. Mantenerlos en singular preserva la retórica del texto y evita suavizar su alcance mediante una pluralización interpretativa.
  doctrine_reference: DOCTRINE.md §Translation philosophy, point 4 (gender-accurate over gender-neutral)
translation_notes:
  revision_awareness: La redacción sigue de cerca el texto griego de Swete 1909 y el juicio auditado del POB inglés. Se mantuvieron los singulares representativos y la hostilidad del verbo inicial; se prefirió una equivalencia óptima en español para evitar calcos innecesarios como «de lengua extranjera» o una literalidad rígida en la primera cláusula. No se introdujeron términos doctrinales ajenos al pasaje.
  spanish_consistency_notes:
  - Se usó «Yahvé» solo cuando el texto lo requiera; este versículo no contiene el Tetragrámaton.
  - «Nación» se mantiene para ἔθνος por consistencia con el valor colectivo del griego.
  - «Misericordia» se conserva como término bíblico estable para ἐλεέω.
  - Los singulares «el anciano» y «el niño» siguen el audit trail inglés y la forma griega representativa.
