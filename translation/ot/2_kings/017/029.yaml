theological_decisions:
- issue: Rendering of שֹׁמְרֹנִים
  chosen_reading: the people of Samaria
  alternative_readings:
  - the Samaritans
  rationale: The verse concerns resettled populations in the region of Samaria and the cultic sites associated with that region. Using 'the people of Samaria' avoids importing later theological or sectarian associations tied to 'Samaritans' that the text itself does not require.
  doctrine_reference: Preserve theological tension rather than resolve it; original-language primacy over translation tradition.
