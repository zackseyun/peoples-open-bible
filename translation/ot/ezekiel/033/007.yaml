id: EZK.33.7
reference: Ezekiel 33:7
source:
  edition: WLC
  text: וְ/אַתָּ֣ה בֶן אָדָ֔ם צֹפֶ֥ה נְתַתִּ֖י/ךָ לְ/בֵ֣ית יִשְׂרָאֵ֑ל וְ/שָׁמַעְתָּ֤ מִ/פִּ/י֙ דָּבָ֔ר וְ/הִזְהַרְתָּ֥ אֹתָ֖/ם מִמֶּֽ/נִּי־׃
translation:
  text: And you[a], son of man, I have made you a watchman for the house of Israel[b]; when you hear a word from my mouth, you shall warn them from me.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'I have appointed you a watchman for the house of Israel.'
    reason: lexical_alternative
  - marker: b
    text: '''Son of man'' is Ezekiel''s recurring form of address; alternatively, ''mortal'' or ''human one.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: בֶן אָדָם
  chosen: son of man
  alternatives:
  - human one
  - mortal
  lexicon: HALOT
  rationale: The Hebrew idiom literally reads 'son of man.' In Ezekiel this is a repeated divine address to the prophet, and retaining the traditional literal form preserves both the idiom and its literary/theological resonance. Alternatives like 'human one' or 'mortal' capture the sense but lose the established pattern.
- source_word: צֹפֶה
  chosen: watchman
  alternatives:
  - sentinel
  - lookout
  lexicon: HALOT
  rationale: The noun denotes one who keeps watch and gives warning. 'Watchman' best fits the prophetic metaphor in this chapter and matches the surrounding context of warning responsibility.
- source_word: נְתַתִּיךָ
  chosen: I have made you
  alternatives:
  - I have appointed you
  - I have given you
  lexicon: HALOT
  rationale: Although the verb is literally 'I have given you,' in this construction with the predicate noun 'watchman' and the prepositional phrase 'for the house of Israel,' idiomatic English is better expressed as 'I have made you' or 'appointed you.' 'Made' preserves the force without sounding bureaucratic.
- source_word: לְבֵית יִשְׂרָאֵל
  chosen: for the house of Israel
  alternatives:
  - to the house of Israel
  lexicon: HALOT
  rationale: The preposition ל here marks assignment or relation. 'For the house of Israel' communicates Ezekiel's appointed role on behalf of and with reference to Israel. 'To' is possible, but 'for' better reflects commission.
- source_word: וְשָׁמַעְתָּ
  chosen: when you hear
  alternatives:
  - and you shall hear
  - so you must hear
  lexicon: HALOT
  rationale: The waw with the perfect here continues the commission in an instruction-like sequence. In English, 'when you hear' naturally conveys the expected circumstance tied to the following duty to warn.
- source_word: מִפִּי
  chosen: from my mouth
  alternatives:
  - from me
  lexicon: HALOT
  rationale: The Hebrew is literally 'from my mouth,' an anthropomorphic expression emphasizing direct divine speech. Retaining it preserves the vividness and source of the message.
- source_word: דָּבָר
  chosen: a word
  alternatives:
  - a message
  - anything
  lexicon: HALOT
  rationale: '''Word'' is the standard and sufficiently broad rendering for דָּבָר here, especially in prophetic contexts where a divine utterance is in view. ''Message'' is interpretive and slightly more dynamic.'
- source_word: וְהִזְהַרְתָּ
  chosen: you shall warn
  alternatives:
  - you must warn
  - you shall give warning to
  lexicon: HALOT
  rationale: The Hiphil conveys causing someone to be warned. 'You shall warn' is clear, direct, and preserves the commission's imperative force in natural English.
- source_word: אֹתָם
  chosen: them
  lexicon: HALOT
  rationale: Straightforward object pronoun referring to the house of Israel.
- source_word: מִמֶּנִּי
  chosen: from me
  alternatives:
  - on my behalf
  - at my warning
  lexicon: HALOT
  rationale: 'This indicates the warning''s source: it comes from God. ''From me'' is the most direct rendering and pairs well with the earlier ''from my mouth.'''
