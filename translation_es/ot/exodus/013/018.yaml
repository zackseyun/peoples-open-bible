translation:
  language: es
  text: Así, Dios hizo que el pueblo diera un rodeo por el camino del desierto hacia el Mar de los Juncos[a], y los hijos de Israel subieron de la tierra de Egipto armados[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'Mar Rojo'. El nombre hebreo es literalmente 'Mar de los Juncos'.
    reason: alternative_reading
  - marker: b
    text: El término hebreo traducido aquí como 'armados' es incierto; también puede significar 'equipados para la batalla', 'en formación de batalla' o, más generalmente, 'en filas ordenadas'.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּסֵּב
  english_pob_choice: led ... around
  chosen_spanish: llevó ... por el camino
  alternatives_spanish:
  - hizo dar un rodeo
  - condujo ... alrededor
  - desvió
  lexicon: HALOT
  rationale: El hebreo expresa que Dios hizo tomar una ruta indirecta. En español, 'llevó ... por el camino' comunica la acción de guiar sin introducir un giro demasiado literal o pesado. 'Hizo dar un rodeo' sería más explícito, pero menos sobrio.
- source_word: אֱלֹהִים
  english_pob_choice: God
  chosen_spanish: Dios
  alternatives_spanish:
  - el Dios
  - dioses
  lexicon: HALOT
  rationale: El verbo singular confirma un referente singular. 'Dios' es la forma natural y fiel en español.
- source_word: הָעָם
  english_pob_choice: the people
  chosen_spanish: el pueblo
  alternatives_spanish:
  - la gente
  - la nación
  lexicon: HALOT
  rationale: Aquí se refiere colectivamente a Israel. En español bíblico, 'el pueblo' conserva bien el sentido corporativo y la referencia al pueblo del pacto.
- source_word: דֶּרֶךְ הַמִּדְבָּר
  english_pob_choice: by the way of the wilderness
  chosen_spanish: por el camino del desierto
  alternatives_spanish:
  - por la ruta del desierto
  - a través del desierto
  lexicon: HALOT
  rationale: דֶּרֶךְ señala ruta o camino. 'Por el camino del desierto' mantiene la estructura y es natural en español. 'A través del desierto' sería posible, pero desplaza el matiz de ruta.
- source_word: יַם סוּף
  english_pob_choice: the Sea of Reeds
  chosen_spanish: Mar de los Juncos
  alternatives_spanish:
  - Mar Rojo
  lexicon: HALOT
  rationale: La POB inglesa privilegia el sentido léxico del hebreo frente a la tradición heredada. En español, 'Mar de los Juncos' traduce de forma transparente יַם סוּף y evita fijar de antemano la identificación tradicional con el Mar Rojo.
- source_word: וַחֲמֻשִׁים
  english_pob_choice: armed
  chosen_spanish: armados
  alternatives_spanish:
  - equipados para la batalla
  - en formación de combate
  - alistados
  lexicon: HALOT
  rationale: La POB inglesa revisó esta palabra hacia 'armed' por concisión y por no expandir interpretativamente el término. 'Armados' preserva ese carácter sobrio, aunque el hebreo sigue siendo algo incierto.
- source_word: בְנֵי יִשְׂרָאֵל
  english_pob_choice: the sons of Israel
  chosen_spanish: los hijos de Israel
  alternatives_spanish:
  - los israelitas
  - los niños de Israel
  lexicon: HALOT
  rationale: Se conserva la forma masculina plural del hebreo. 'Los hijos de Israel' es transparente y fiel; 'israelitas' sería más idiomático, pero menos formalmente cercano al original.
- source_word: מֵאֶרֶץ מִצְרַיִם
  english_pob_choice: from the land of Egypt
  chosen_spanish: de la tierra de Egipto
  alternatives_spanish:
  - desde Egipto
  - fuera de Egipto
  lexicon: HALOT
  rationale: La preposición y el sustantivo se reflejan de manera directa. 'De la tierra de Egipto' reproduce la estructura hebrea con claridad y solemnidad.
theological_decisions:
- issue: יַם סוּף y la tradición del Mar Rojo
  english_pob_reading: the Sea of Reeds, with a footnote noting the traditional 'Red Sea' reading
  chosen_spanish_reading: Mar de los Juncos, con nota sobre 'Mar Rojo' como lectura tradicional
  alternative_spanish_readings:
  - Mar Rojo
  - Mar de los Cañaverales
  rationale: La traducción sigue la primacía del hebreo y no oculta el nombre literal del lugar. Se conserva en nota la lectura tradicional por su peso histórico y eclesial, sin sustituir el sentido del original en el texto principal.
  doctrine_reference: DOCTRINE.md §Translation philosophy 1
- issue: בְנֵי יִשְׂרָאֵל y la forma masculina plural
  english_pob_reading: the sons of Israel
  chosen_spanish_reading: los hijos de Israel
  alternative_spanish_readings:
  - los israelitas
  - los hijos de Israel
  rationale: Se preserva la forma gramatical masculina plural del hebreo, en línea con el principio de transparencia formal. 'Los israelitas' es válido idiomáticamente, pero neutraliza la forma del original.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
translation_notes:
  revision_awareness: 'La versión inglesa más reciente cambió ''toward'' por ''to'' y ''equipped for battle'' por ''armed''. La redacción española sigue esa revisión: usa un movimiento directo (''por el camino... hasta'') y opta por ''armados'' sin expandir a una frase explicativa en el texto principal, dejando la incertidumbre léxica en nota.'
  spanish_consistency_notes:
  - Se mantiene 'Dios' para אֱלֹהִים, según el referente singular y la práctica estándar del proyecto.
  - Se evita 'SEÑOR' para el nombre divino, porque en este versículo aparece אֱלֹהִים, no יהוה.
  - '''Mar de los Juncos'' conserva la primacía del hebreo; la nota ofrece la alternativa tradicional.'
  - '''Hijos de Israel'' preserva la forma masculina plural del original y la referencia corporativa al pueblo del pacto.'
  - La puntuación y mayúsculas siguen el uso editorial del español bíblico moderno, con estilo sobrio y legible.
