  to: El perezoso hunde su mano en el plato[a][b]; está demasiado cansado para volverla a llevar a su boca.
  rationale: Se revisa la segunda cláusula para reflejar explícitamente el sentido de cansancio irónico de נִלְאָה y el movimiento de retorno de לַהֲשִׁיבָהּ. También se añade la nota léxica faltante para בַּצַּלָּחַת, en línea con el audit trail inglés. Se conserva «hunde» como opción española natural para la imagen hiperbólica, con nota aclaratoria.
