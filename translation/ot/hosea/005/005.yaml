theological_decisions:
- issue: Sense of Israel's 'pride' in the opening clause
  chosen_reading: Moral pride/arrogance that serves as witness against Israel
  alternative_readings:
  - Israel's majesty or exalted status testifies against him
  rationale: The immediate context is accusation, guilt, and stumbling under judgment. Rendering גאון as 'pride' preserves the prophetic indictment without softening it into neutral 'majesty.'
- issue: Temporal/aspectual force of Judah's verb
  chosen_reading: '''Judah also has stumbled with them'''
  alternative_readings:
  - '''Judah also will stumble with them'''
  - '''Judah also stumbles with them'''
  rationale: The Hebrew shifts from imperfect plural for Israel/Ephraim to qatal singular for Judah. Rendering the latter as 'has stumbled' preserves the aspectual distinction and suggests Judah is already implicated, without forcing a rigid temporal scheme.
