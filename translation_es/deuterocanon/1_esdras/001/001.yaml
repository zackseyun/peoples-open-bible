translation:
  language: es
  text: Y Josías observó la Pascua en Jerusalén a su Señor[a], y sacrificaron la Pascua el día catorce del primer mes.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Griego: "a su Señor"; el paralelo hebreo en 2 Crónicas 35:1 dice "a/para Yahvé".'
    reason: alternative_reading
lexical_decisions:
- source_word: ἤγαγεν
  english_pob_choice: kept
  chosen_spanish: celebró
  alternatives_spanish:
  - guardó
  - hizo
  - observó
  lexicon: LSJ
  rationale: En este contexto cultual, el sentido no es simplemente 'llevar' sino celebrar/observar la Pascua. 'Celebró' transmite la acción festiva y ritual de manera natural en español, sin perder el valor observancial que la POB inglesa expresó con 'kept'.
- source_word: τὸ πάσχα
  english_pob_choice: the Passover
  chosen_spanish: la Pascua
  alternatives_spanish:
  - el Pascua
  - la fiesta de Pascua
  lexicon: BDAG
  rationale: La primera mención designa la fiesta/observancia en conjunto. 'La Pascua' es el equivalente natural y fiel en español.
- source_word: τῷ κυρίῳ αὐτοῦ
  english_pob_choice: to his Lord
  chosen_spanish: para su Señor[a]
  alternatives_spanish:
  - a su Señor
  - para el Señor
  - para su Dios
  lexicon: BDAG
  rationale: Conservo el posesivo explícito del griego, αὐτοῦ, mediante 'su'. 'Para' refleja la relación de dedicación u ofrenda cultual mejor que un simple dativo en español. Mantengo 'Señor' por κύριος y no sustituyo por 'Yahvé' en el cuerpo del texto porque el griego primario dice κυρίῳ; la nota aclara la variante semítica paralela.
- source_word: ἔθυσαν
  english_pob_choice: slaughtered
  chosen_spanish: sacrificaron
  alternatives_spanish:
  - degollaron
  - inmolaron
  - mataron ritualmente
  lexicon: LSJ
  rationale: El verbo describe una muerte sacrificial. En español, 'sacrificaron' comunica el acto ritual con claridad y dignidad; 'degollaron' sería más gráfico, pero menos natural en un texto litúrgico/canónico.
- source_word: τὸ πάσχα
  english_pob_choice: the Passover
  chosen_spanish: la Pascua
  alternatives_spanish:
  - el cordero pascual
  - el sacrificio de Pascua
  - la ofrenda pascual
  lexicon: BDAG
  rationale: Aunque el inglés POB explicita 'Passover lamb' en una etapa anterior, la revisión más reciente retiró 'lamb' por no estar explícito en el griego. Por eso conservo aquí el referente genérico 'la Pascua' también en la segunda ocurrencia, sin añadir un animal que el texto no nombra.
- source_word: τῇ τεσσαρεσκαιδεκάτῃ ἡμέρᾳ
  english_pob_choice: on the fourteenth day
  chosen_spanish: el día catorce
  alternatives_spanish:
  - en el día catorce
  - a los catorce días
  lexicon: LSJ
  rationale: La dativa temporal se expresa naturalmente en español como 'el día catorce'. Esta formulación es clara y conserva la precisión calendárica del griego.
- source_word: τοῦ μηνὸς τοῦ πρώτου
  english_pob_choice: of the first month
  chosen_spanish: del primer mes
  alternatives_spanish:
  - del mes primero
  - del mes, el primero
  lexicon: LSJ
  rationale: La referencia calendárica se vierte de manera directa y natural como 'del primer mes'.
theological_decisions:
- issue: κύριος en griego frente al nombre divino YHWH en el paralelo hebreo/MT
  english_pob_reading: Lord
  chosen_spanish_reading: Señor
  alternative_spanish_readings:
  - Yahvé
  - el Señor
  rationale: 'Sigo el texto griego de 1 Esdras como fuente primaria: κυρίῳ αὐτοῦ pide ''Señor'' con posesivo. El paralelo hebreo sugiere la relación con YHWH, pero no reemplaza la forma griega. Por eso mantengo ''Señor'' en el texto principal y dejo la variante del paralelo en la nota.'
  doctrine_reference: 'POB contested terms: κύριος / YHWH; translation philosophy #1'
translation_notes:
  revision_awareness: 'La redacción española sigue la última revisión del inglés POB en dos puntos clave: no añade ''cordero'' en la segunda ocurrencia de πάσχα, y conserva el dativo posesivo del griego con referencia al Señor. También toma en cuenta que el inglés revisado prefirió ''the Lord his God'' por naturalidad; en español se optó por ''su Señor'' para preservar el posesivo del griego sin introducir ''Dios'', que no aparece en el texto fuente.'
  spanish_consistency_notes:
  - Se mantiene 'Pascua' para πάσχα en ambas ocurrencias, evitando alternar con 'fiesta' o 'sacrificio' sin necesidad textual.
  - '''Señor'' se usa para κύριος conforme al griego; ''Yahvé'' queda solo en la nota por el paralelo hebreo.'
  - Se evita 'cordero' porque la revisión auditada del inglés lo retiró por no estar explícito en el griego.
  - El registro es bíblico y claro, sin arcaísmos innecesarios ni calcos rígidos.
