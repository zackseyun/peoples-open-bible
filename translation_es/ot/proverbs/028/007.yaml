translation:
  language: es
  text: El que guarda la ley es un hijo entendido[a]; pero el que se asocia con glotones[b] avergüenza a su padre.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Entendido» traduce el matiz de מֵבִין; también podría expresarse como «prudente» o «discreto».
    reason: lexical_alternative
  - marker: b
    text: O «se asocia con glotones»; literalmente, «pastorea glotones». El verbo hebreo usa una imagen pastoral de manera idiomática para hablar de andar o relacionarse con cierta clase de personas. «Glotones» también puede entenderse más ampliamente como personas dadas al exceso, al derroche o a la disipación.
    reason: lexical_alternative
lexical_decisions:
- source_word: נוֹצֵר
  english_pob_choice: keeps
  chosen_spanish: guarda
  alternatives_spanish:
  - observa
  - conserva
  lexicon: HALOT
  rationale: El participio expresa guardar, custodiar u observar. «Guarda» funciona de forma natural con «la ley» en español y conserva la idea de observancia fiel sin sonar forzado.
- source_word: תּוֹרָה
  english_pob_choice: the law
  chosen_spanish: la ley
  alternatives_spanish:
  - la instrucción
  - la Torá
  lexicon: HALOT
  rationale: En este proverbio, תּוֹרָה puede referirse a instrucción, pero el contexto sapiencial y la combinación con el verbo de guardar favorecen «la ley» como equivalente idiomático y claro en español.
- source_word: בֵּן
  english_pob_choice: son
  chosen_spanish: hijo
  alternatives_spanish:
  - niño
  - descendiente
  lexicon: HALOT
  rationale: El hebreo es masculino singular. «Hijo» mantiene con precisión la referencia y evita neutralizar el rasgo gramatical y semántico presente en el original.
- source_word: מֵבִין
  english_pob_choice: discerning
  chosen_spanish: entendido
  alternatives_spanish:
  - discer­niente
  - prudente
  - sabio
  lexicon: HALOT
  rationale: La forma denota a alguien con entendimiento. «Entendido» es natural en español para describir a una persona con discernimiento, sin perder el matiz sapiencial.
- source_word: וְרֹעֶה
  english_pob_choice: associates with
  chosen_spanish: se acompaña de
  alternatives_spanish:
  - se asocia con
  - pastorea
  - anda con
  lexicon: HALOT
  rationale: El verbo es literalmente «pastorear», pero aquí funciona idiomáticamente para expresar compañía o trato habitual. «Se acompaña de» conserva la relación personal sin borrar del todo la imagen pastoral implícita.
- source_word: זֹלְלִים
  english_pob_choice: gluttons
  chosen_spanish: glotones
  alternatives_spanish:
  - derrochadores
  - libertinos
  - prodigios
  lexicon: HALOT
  rationale: El término apunta a personas entregadas al exceso y la disipación, no solo a la comida. «Glotones» reproduce bien el valor directo del texto, mientras que una nota puede preservar el sentido más amplio de derrochadores/profligados.
- source_word: יַכְלִים
  english_pob_choice: shames
  chosen_spanish: avergüenza
  alternatives_spanish:
  - deshonra
  - hace quedar mal
  - afrenta
  lexicon: HALOT
  rationale: El hifil expresa causar vergüenza o deshonra. «Avergüenza» es una correspondencia directa, clara y natural en español.
- source_word: אָבִיו
  english_pob_choice: his father
  chosen_spanish: a su padre
  alternatives_spanish:
  - a su padre
  - a su progenitor
  lexicon: HALOT
  rationale: La posesión se expresa de manera natural en español con «su padre»; el dativo «a su padre» conserva el valor del objeto afectado por la acción de avergonzar.
translation_notes:
  revision_awareness: 'Se siguió el sentido final de la POB inglesa en la primera cola del versículo: «keeps the law» > «guarda la ley», y en la segunda: la imagen literal de «shepherds» se mantiene solo de forma implícita en el giro idiomático español, como reflejó la revisión inglesa hacia «associates with». Se conservó la tensión léxica de זֹלְלִים como término que puede ir más allá de la glotonería estricta.'
  spanish_consistency_notes:
  - Se mantiene «ley» en vez de «Torá» para reflejar la opción inglesa auditable y la idiomaticidad en este proverbio.
  - Se usa «hijo» en masculino singular para respetar el género explícito del hebreo.
  - «Glotones» se deja en el texto principal y se amplía su alcance en nota, siguiendo el audit trail inglés.
  - No se introduce terminología eclesiástica tradicional que no esté sustentada por el hebreo o por la decisión inglesa auditada.
