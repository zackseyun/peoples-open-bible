revisions:
- from: 'Y ofrecerán un holocausto como olor agradable[a] a Yahvé: un becerro del ganado, un carnero y siete corderos machos de un año, sin defecto.'
  to: 'Y ofrecerán un holocausto como olor agradable[a] a Yahvé: un novillo, un carnero y siete corderos machos de un año, sin defecto.'
  rationale: Se corrige únicamente el sintagma del primer animal para reflejar mejor el hebreo sacrificial פַּר בֶּן בָּקָר y el razonamiento del POB en inglés. ‘Un novillo’ es más preciso y natural que ‘un becerro del ganado’. Se conserva el resto del verso y la nota, porque representan adecuadamente el sentido fuente y el estilo español del proyecto.
