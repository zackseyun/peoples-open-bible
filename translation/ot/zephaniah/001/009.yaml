theological_decisions:
- issue: Interpretation of 'leaps over the threshold'
  chosen_reading: Retain the literal wording as a concrete practice rather than resolving it into a specific superstition or cultic custom in the main text.
  alternative_readings:
  - An allusion to Philistine threshold taboo (cf. 1 Sam 5:5)
  - A figurative description of aggressive intruders or plunderers
  rationale: The Hebrew phrase is vivid and somewhat culturally opaque, but the text itself does not explicitly explain the practice. Per translation philosophy, ambiguity should be preserved rather than resolved interpretively in the main text.
  doctrine_reference: Translation philosophy §3
- issue: Referent of 'their masters’ house'
  chosen_reading: Translate the plural form straightforwardly as 'their masters’ house' without collapsing it to a singular title.
  alternative_readings:
  - their lord's house
  - the house of their master
  rationale: The Hebrew morphology points to a plural possessive form. Since the text does not identify a divine referent, the translation should not suggest one. The social sense fits the context of exploitative violence and deceit.
  doctrine_reference: Translation philosophy §1
