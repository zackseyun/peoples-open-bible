translation:
  language: es
  text: Porque el celo por tu casa me ha consumido[a], y los reproches de los que te reprochan cayeron sobre mí[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «me ha comido» / «me ha devorado».'
    reason: lexical_alternative
  - marker: b
    text: Este versículo es citado en Juan 2:17 con referencia a Jesús.
    reason: cross_reference
lexical_decisions:
- source_word: כִּי
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  lexicon: HALOT
  rationale: El hebreo introduce la razón o explicación del estado del hablante. «Porque» conserva mejor la fuerza causal en español que un simple enlace poético sin marcar, y encaja con el flujo del versículo.
- source_word: קִנְאַת
  english_pob_choice: zeal
  chosen_spanish: celo
  alternatives_spanish:
  - ardor
  - fervor
  lexicon: HALOT
  rationale: El sustantivo expresa devoción intensa, no celos en sentido de envidia. «Celo» comunica bien esa intensidad reverente en español bíblico actual y mantiene la conexión con «tu casa».
- source_word: בֵּיתְךָ
  english_pob_choice: your house
  chosen_spanish: tu casa
  alternatives_spanish:
  - tu templo
  - tu morada
  lexicon: HALOT
  rationale: La lectura literal del hebreo es «casa». «Tu casa» preserva la forma de la fuente y permite la resonancia cultual sin especificar más de lo que dice el texto.
- source_word: אֲכָלָתְנִי
  english_pob_choice: has consumed me
  chosen_spanish: me ha consumido
  alternatives_spanish:
  - me ha devorado
  - me ha comido
  lexicon: HALOT
  rationale: El verbo es literalmente «ha comido», pero en español la imagen idiomática se expresa con naturalidad como «me ha consumido». Mantiene la intensidad y evita una literalidad extraña en registro literario.
- source_word: וְחֶרְפּוֹת
  english_pob_choice: and the reproaches
  chosen_spanish: y los reproches
  alternatives_spanish:
  - y los insultos
  - y las afrentas
  lexicon: HALOT
  rationale: El término denota habla despectiva, vergüenza o escarnio. «Reproches» conserva el tono formal y mantiene el parentesco léxico con el participio siguiente.
- source_word: חֹרְפֶיךָ
  english_pob_choice: those who reproach you
  chosen_spanish: los que te reprochan
  alternatives_spanish:
  - los que te insultan
  - tus reprochadores
  lexicon: HALOT
  rationale: La forma participial describe a quienes lanzan reproches contra Dios. «Los que te reprochan» sigue de cerca la estructura hebrea y preserva la relación cognada con «reproches».
- source_word: נָפְלוּ עָלַי
  english_pob_choice: have fallen on me
  chosen_spanish: cayeron sobre mí
  alternatives_spanish:
  - han caído sobre mí
  - han recaído sobre mí
  lexicon: HALOT
  rationale: El hebreo usa la imagen de algo que «cae» sobre la persona. En español, el pasado simple «cayeron» funciona bien en poesía y conserva la imagen del impacto sobre el salmista.
theological_decisions:
- issue: Resonancia mesiánica/canónica del versículo
  english_pob_reading: The verse is translated in its immediate psalmic sense without importing explicit messianic interpretation into the main text.
  chosen_spanish_reading: El versículo se traduce en su sentido inmediato dentro del salmo, sin incorporar en el cuerpo del texto una interpretación mesiánica explícita.
  alternative_spanish_readings:
  - Una redacción cristológica explícita
  - Una formulación que aluda directamente al cumplimiento en Jesús
  rationale: El hebreo habla directamente en la voz del salmista. La alusión posterior en el Nuevo Testamento es real, pero no debe reescribirse la línea principal del verso con una interpretación doctrinal que el texto fuente no formula.
  doctrine_reference: Principio de primacía del texto original; mantener la tensión canónica sin resolverla en la traducción principal.
translation_notes:
  revision_awareness: La revisión inglesa más reciente no introdujo cambios; el acuerdo de revisión fue alto y estable. La presente redacción española sigue esa lectura sin añadir expansiones interpretativas.
  spanish_consistency_notes:
  - Se mantuvo «celo» para קִנְאָת, coherente con la decisión inglesa de 'zeal'.
  - Se preservó la imagen verbal de 'caer sobre mí' con un español natural («cayeron sobre mí»).
  - Se conservó el paralelismo léxico entre «reproches» y «los que te reprochan».
  - No se usó «SEÑOR» para el nombre divino; el versículo habla de «tu casa» y «te reprochan», manteniendo el pronombre de segunda persona sin sustitución tradicional.
