base_translation:
  language: en
  yaml_path: translation/ot/1_kings/017/001.yaml
  text: And Elijah the Tishbite[a], from the inhabitants of Gilead, said to Ahab, “As Yahweh, the God of Israel, lives, before whom I stand, there will be neither dew nor rain in these years[c][b], except by my word.”
