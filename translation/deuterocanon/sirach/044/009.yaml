translation:
  text: And there are some for whom there is no remembrance[a], they ceased to be, just as they had ceased, as though they had never existed, and so did their children after them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'The Hebrew witness is shorter and reads literally, ''And there are some for whom there is no remembrance, and they ceased as they ceased.'' The Greek parallel preserves a fuller form of the thought: ''they perished as though they had not existed ... and their children after them.'' The main text follows the Hebrew as primary while allowing the Greek to clarify the compressed wording.'
    reason: textual_variant
lexical_decisions:
- source_word: ויש מהם
  chosen: And there are some
  alternatives:
  - And some there are
  - Some of them
  lexicon: HALOT
  rationale: The Hebrew idiom introduces a subset within the previously described ancestors. 'There are some' is natural English and preserves the partitive sense.
- source_word: אשר אין לו זכר
  chosen: for whom there is no remembrance
  alternatives:
  - who have no memorial
  - of whom there is no memory
  lexicon: HALOT
  rationale: זכר here denotes remembrance/memorial. 'No remembrance' keeps the abstract force and aligns with the Greek μνημόσυνον, while avoiding overly monumental language unless context requires 'memorial'.
- source_word: וישבתו
  chosen: they ceased to be
  alternatives:
  - they perished
  - they came to an end
  - they were cut off
  lexicon: HALOT
  rationale: The Hebrew form from שבת in this context conveys cessation. Because the Greek parallel expands with ἀπώλοντο and 'as though they had not existed,' 'ceased to be' best captures the sense of disappearance from memory/existence without overcommitting to violent destruction.
- source_word: כאשר שבתו
  chosen: just as they had ceased
  alternatives:
  - as when they ceased
  - as they came to an end
  lexicon: HALOT
  rationale: The Hebrew repetition is terse and somewhat awkward in English if rendered woodenly. The Greek parallel clarifies the sense by expanding the thought. 'Just as they had ceased' preserves the repetition while allowing the Greek to inform the fuller English line.
- source_word: καὶ ἀπώλοντο ὡς οὐχ ὑπάρξαντες
  chosen: as though they had never existed
  alternatives:
  - as if they had not existed
  - they perished as though they had not been
  lexicon: BDAG
  rationale: 'The Greek parallel appears to preserve or explicate a fuller form of the thought than the compressed Hebrew. This clause is used as actual translation input per instructions, making explicit the force latent in the Hebrew: utter disappearance from remembrance.'
- source_word: καὶ τὰ τέκνα αὐτῶν μετʼ αὐτούς
  chosen: and so did their children after them
  alternatives:
  - and their children after them likewise
  - and their children after them also
  lexicon: BDAG
  rationale: The Hebrew witness as given lacks this clause, but the Greek parallel includes it and it fits the verse's cadence and sense. 'And so did their children after them' concisely conveys that the same oblivion overtook their descendants.
