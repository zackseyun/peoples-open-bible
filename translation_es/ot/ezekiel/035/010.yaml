translation:
  language: es
  text: 'Porque dijiste[a]: «Estas dos naciones y estas dos tierras serán mías, y las poseeremos»—aunque Yahvé estaba allí[b]—'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'También puede entenderse: «las dos naciones» y «las dos tierras». El hebreo usa el artículo; «estas» se añade en español para reflejar la especificidad contextual.'
    reason: lexical_alternative
  - marker: b
    text: 'También puede leerse: «y Yahvé estaba allí» o «mientras Yahvé estaba allí». La conjunción hebrea admite más de una relación; el texto principal la entiende en sentido concesivo para reflejar la presunción de Edom.'
    reason: alternative_reading
lexical_decisions:
- source_word: יַעַן
  english_pob_choice: Because
  chosen_spanish: Porque
  alternatives_spanish:
  - Puesto que
  - Ya que
  lexicon: HALOT
  rationale: Introduce la base causal del juicio con una conjunción natural y clara en español, manteniendo la fuerza explicativa del hebreo.
- source_word: אֲמָרְךָ
  english_pob_choice: you said
  chosen_spanish: dijiste
  alternatives_spanish:
  - tu decir
  - has dicho
  lexicon: HALOT
  rationale: La forma verbal con sufijo se vierte de manera idiomática como una cláusula finita en español.
- source_word: שְׁנֵי הַגּוֹיִם
  english_pob_choice: these two nations
  chosen_spanish: estas dos naciones
  alternatives_spanish:
  - las dos naciones
  lexicon: HALOT
  rationale: Se conserva el artículo de especificidad implícita en el contexto con un demostrativo natural en español para reflejar la referencia concreta.
- source_word: שְׁתֵּי הָאֲרָצוֹת
  english_pob_choice: these two lands
  chosen_spanish: estas dos tierras
  alternatives_spanish:
  - estas dos tierras
  - las dos tierras
  - los dos territorios
  lexicon: HALOT
  rationale: אֲרָצוֹת apunta aquí a territorios/tierras. 'Tierras' empareja bien con 'naciones' y mantiene la concreción geográfica.
- source_word: לִי תִהְיֶינָה
  english_pob_choice: will be mine
  chosen_spanish: serán mías
  alternatives_spanish:
  - me pertenecerán
  - serán para mí
  lexicon: HALOT
  rationale: Expresa posesión de forma breve y natural, preservando la fuerza posesiva de la afirmación.
- source_word: וִירַשְׁנ֑וּהָ
  english_pob_choice: and we will possess them
  chosen_spanish: y las poseeremos
  alternatives_spanish:
  - y las tomaremos en posesión
  - y las heredaremos
  lexicon: HALOT
  rationale: '''Poseeremos'' sigue de cerca el sentido de ירשׁ en el contexto de conquista y posesión, sin sobreexplicar ni perder la concisión del texto fuente.'
- source_word: וַיהוָה
  english_pob_choice: the LORD
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: Se sigue el estándar del proyecto para el nombre divino, sin ocultarlo con un equivalente en mayúsculas.
- source_word: שָׁם הָיָה
  english_pob_choice: though the LORD was there
  chosen_spanish: aunque Yahvé estaba allí
  alternatives_spanish:
  - y Yahvé estaba allí
  - mientras Yahvé estaba allí
  lexicon: HALOT
  rationale: '''Aunque'' comunica la fuerza concesiva/adversativa que el POB inglés adoptó para reflejar el atrevimiento del hablante. ''Allí'' conserva la referencia locativa al lugar reclamado.'
theological_decisions:
- issue: Fuerza del cierre וַיהוָה שָׁם הָיָה
  english_pob_reading: Though the LORD was there
  chosen_spanish_reading: aunque Yahvé estaba allí
  alternative_spanish_readings:
  - y Yahvé estaba allí
  - mientras Yahvé estaba allí
  rationale: 'El waw hebreo permite lectura coordinada, pero el contexto muestra la arrogancia de Edom: reclamó las tierras a pesar de la presencia de Yahvé. La concesiva en español preserva ese matiz sin añadir contenido ajeno.'
  doctrine_reference: 'Translation philosophy #3 (preserve tension where genuine ambiguity exists) and contested terms entry for יְהוָה'
- issue: Referencia implícita de 'las dos naciones' y 'las dos tierras'
  english_pob_reading: Left implicit in the main text
  chosen_spanish_reading: Se deja implícita en el texto principal
  alternative_spanish_readings:
  - Judá e Israel
  - Israel y Judá
  - sus territorios
  rationale: El hebreo no las nombra aquí, y la traducción conserva ese nivel de explicitud, aunque el contexto permita inferir el referente histórico.
  doctrine_reference: 'Translation philosophy #1 (original-language primacy)'
translation_notes:
  revision_awareness: La redacción sigue la última revisión del POB inglés, que ajustó la frase final a 'we will possess them' por una forma más directa de ירשׁ. En español se optó por 'las poseeremos' para mantener esa mayor literalidad formal sin perder naturalidad.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' según el estándar del proyecto para יהוה.
  - '''Naciones'' y ''tierras'' se conservan como pareja léxica estable.'
  - Se evita 'SEÑOR' para no enmascarar el nombre divino.
  - La concesiva final ('aunque...') reproduce la lectura auditada del POB inglés.
  - Los demostrativos 'estas' reflejan la especificidad contextual señalada en la nota inglesa.
