  text: Λέγω οὖν, μὴ ἀπώσατο ὁ θεὸς τὸν λαὸν αὐτοῦ; μὴ γένοιτο· καὶ γὰρ ἐγὼ Ἰσραηλίτης εἰμί, ἐκ σπέρματος Ἀβραάμ, φυλῆς Βενιαμίν.
base_translation:
  language: en
  yaml_path: translation/nt/romans/011/001.yaml
  text: So I ask[a], has God rejected his people? May it never be! For I myself am an Israelite, from the offspring of Abraham[c][b], of the tribe of Benjamin.
  footnotes:
  - marker: a
    text: Or 'cast off his people.'
    reason: lexical_alternative
  - marker: b
    text: 'Greek: ''May it never be,'' a strong expression of repudiation; also rendered ''By no means!'''
    reason: lexical_alternative
  - marker: c
    text: Or 'of the seed of Abraham.'
    reason: lexical_alternative
translation:
  language: ko
  text: 그러면 내가 묻겠습니다. 하나님께서 자기 백성을 버리셨습니까? 결코 그렇지 않습니다! 나도 이스라엘 사람이며, 아브라함의 씨에서 났고, 베냐민 지파에 속한 사람입니다.
  philosophy: optimal-equivalence
