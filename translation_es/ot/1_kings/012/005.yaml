    rationale: 'Aunque formalmente posible, en español suele requerirse un verbo pronominal o una construcción más explícita para expresar una despedida temporal: «váyanse». Así se preserva mejor el sentido contextual de לְכוּ como retirada de la presencia del rey.'
  - severity: low
