id: T12P.DAN.5.5
reference: Testament of Dan 5:5
language:
  code: es
  name: Spanish
  variant: neutral Latin American
source:
  edition: Charles 1908 Greek Versions (pages 201-213, Dan source-fix v2)
  text: Καὶ *ὡς ἂν ἀποστήσεσθε⁴⁰ ἀπὸ⁴¹ Κυρίου⁴², *ἐν πάσῃ κακίᾳ⁴³ *πορευόμενοι ποιήσετε τὰ βδελύγματα τῶν ἐθνῶν ἐκπορνεύοντες ἐν⁴⁴ γυναιξὶν ἀνόμων⁴⁵ καὶ ἐν πάσῃ πονηρίᾳ⁴⁶ ἐνεργούντων⁴⁷ ⌈ἐν ὑμῖν⌉¹ *τῶν πνευμάτων⁴⁸ τῆς πονηρίας⁴⁹.
  language: Greek
base_translation:
  language: en
  yaml_path: translation/extra_canonical/testaments_twelve_patriarchs/dan/005/005.yaml
  text: And whenever you depart from the Lord, walking in every wickedness, you will do the abominations of the nations, prostituting yourselves with lawless women, and every evil will be at work among you through the spirits of wickedness.
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:54:36Z'
    unchanged: false
    changes_summary: Changed 'while every evil is at work' to 'and every evil will be at work' to better reflect the future sequence and the participial construction. Kept the rest substantially unchanged as accurate and natural.
translation:
  language: es
  text: Y cada vez que se aparten del Señor, andando en toda maldad, harán las abominaciones de las naciones, prostituyéndose con mujeres impías, y todo mal estará obrando entre ustedes por medio de los espíritus de la maldad.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ὡς ἂν ἀποστήσεσθε
  english_pob_choice: whenever you depart
  chosen_spanish: cada vez que se aparten
  alternatives_spanish:
  - siempre que se aparten
  - cuando se aparten
  lexicon: LSJ
  rationale: ὡς ἄν con futuro tiene matiz iterativo-condicional; 'cada vez que' lo captura.
- source_word: ἐν πάσῃ κακίᾳ πορευόμενοι
  english_pob_choice: walking in every wickedness
  chosen_spanish: andando en toda maldad
  alternatives_spanish:
  - caminando en toda maldad
  - viviendo en toda maldad
  lexicon: LSJ
  rationale: '''Andar en'' es la fórmula bíblica tradicional para πορεύομαι en sentido moral.'
- source_word: βδελύγματα τῶν ἐθνῶν
  english_pob_choice: the abominations of the nations
  chosen_spanish: las abominaciones de las naciones
  alternatives_spanish:
  - las abominaciones de los gentiles
  lexicon: LSJ
  rationale: Equivalente directo y formal de la fórmula deuteronomística.
- source_word: ἐκπορνεύοντες
  english_pob_choice: prostituting yourselves
  chosen_spanish: prostituyéndose
  alternatives_spanish:
  - fornicando
  - entregándose a la fornicación
  lexicon: LSJ
  rationale: Refleja la fuerza intensiva de ἐκ-; 'prostituirse' es preciso y conserva la dimensión moral-cultual.
- source_word: γυναιξὶν ἀνόμων
  english_pob_choice: lawless women
  chosen_spanish: mujeres impías
  alternatives_spanish:
  - mujeres sin ley
  - mujeres inicuas
  lexicon: LSJ
  rationale: ἄνομος en este contexto pacto-judío se refiere a mujeres no-judías o gentiles 'sin la Ley'; 'impías' captura la dimensión moral-religiosa. Alternativamente, 'sin ley' sería literal pero menos natural en español como adjetivo.
- source_word: ἐνεργούντων ... τῶν πνευμάτων τῆς πονηρίας
  english_pob_choice: every evil will be at work among you through the spirits of wickedness
  chosen_spanish: todo mal estará obrando entre ustedes por medio de los espíritus de la maldad
  alternatives_spanish:
  - actuando los espíritus de la maldad entre ustedes
  lexicon: LSJ
  rationale: ἐνεργέω → 'obrar' (cf. uso paulino); refleja la futurización de la revisión inglesa ('will be at work').
theological_decisions:
- issue: πνεύματα τῆς πονηρίας — agencia espiritual del mal
  chosen_reading: los espíritus de la maldad
  alternative_readings:
  - espíritus malignos
  - espíritus malos
  rationale: El genitivo abstracto τῆς πονηρίας ('de la maldad') es deliberado en este testamento (cf. cap. 4 'espíritu de la ira'); preservar la estructura abstracta mantiene la teología moral-pneumática del autor.
  doctrine_reference: DOCTRINE.md §Translation philosophy 3
translation_notes:
  revision_awareness: El inglés POB pasó de 'while every evil is at work' a 'and every evil will be at work' para reflejar mejor la secuencia futura. El español usa 'estará obrando' para captar el aspecto continuo-futuro.
  spanish_consistency_notes:
  - Κύριος → Señor.
  - πνεύματα → espíritus (en plural minúscula, espíritus malignos, no el Espíritu).
  - ἀνόμων → impías en este contexto.
