translation:
  language: es
  text: Cuando vio que ella estaba decidida a ir con ella, dejó de hablarle[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más formalmente: «cesó de hablarle».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַתֵּרֶא
  english_pob_choice: When she saw
  chosen_spanish: Cuando ella vio
  alternatives_spanish:
  - Y vio
  - Entonces vio
  lexicon: HALOT
  rationale: El waw narrativo introduce avance temporal; en español, «Cuando» expresa bien la relación temporal y mantiene fluidez natural sin perder el orden narrativo.
- source_word: מִתְאַמֶּצֶת
  english_pob_choice: was determined
  chosen_spanish: estaba decidida
  alternatives_spanish:
  - se fortalecía
  - estaba resuelta
  - se esforzaba por mantenerse firme
  lexicon: HALOT
  rationale: El hitpael de אמץ puede implicar fortalecerse a sí misma; en este contexto, la idea resultante es firmeza de propósito. «Estaba decidida» comunica esa resolución con naturalidad en español.
- source_word: הִיא
  english_pob_choice: she
  chosen_spanish: ella
  alternatives_spanish:
  - ella misma
  lexicon: HALOT
  rationale: El pronombre independiente enfatiza a Rut como sujeto. En español, «ella» conserva la claridad del sujeto sin forzar una intensificación reflexiva que sonaría pesada.
- source_word: לָלֶכֶת
  english_pob_choice: to go
  chosen_spanish: ir
  alternatives_spanish:
  - caminar
  - partir
  lexicon: HALOT
  rationale: En contexto de viaje, הלך significa «ir». «Ir» es la opción más natural y fiel; «caminar» sería demasiado literal y menos precisa aquí.
- source_word: אִתָּהּ
  english_pob_choice: with her
  chosen_spanish: con ella
  alternatives_spanish:
  - junto a ella
  lexicon: HALOT
  rationale: La preposición indica acompañamiento. «Con ella» refleja de forma directa y clara la intención de ir en compañía de Noemí.
- source_word: וַתֶּחְדַּל
  english_pob_choice: she stopped
  chosen_spanish: dejó de
  alternatives_spanish:
  - cesó de
  - se abstuvo de
  lexicon: HALOT
  rationale: חדל significa cesar o detenerse. Con el infinitivo siguiente, en español es más natural «dejó de hablarle» que una perífrasis más rígida.
- source_word: לְדַבֵּר
  english_pob_choice: speaking
  chosen_spanish: hablarle
  alternatives_spanish:
  - hablar
  - dirigirse a ella
  lexicon: HALOT
  rationale: 'Con חדל, el español suele usar una construcción verbal natural: «dejó de hablarle». Mantiene el sentido de cesar la acción dirigida a Noemí.'
- source_word: אֵלֶיהָ
  english_pob_choice: to her
  chosen_spanish: le
  alternatives_spanish:
  - a ella
  lexicon: HALOT
  rationale: La preposición אֶל es direccional y aquí marca destinatario del habla. En español, el clítico «le» expresa mejor esa relación en una frase fluida.
translation_notes:
  revision_awareness: 'La redacción sigue de cerca el hebreo y coincide sustancialmente con la solución del POB en inglés: percepción temporal, resolución interna y cese del habla. Se mantiene la tensión léxica de מִתְאַמֶּצֶת como decisión/firmeza, sin reducirla a mera voluntad.'
  spanish_consistency_notes:
  - Se usa «Yahvé» para el nombre divino cuando aparezca, aunque este versículo no lo contiene.
  - Se mantiene «ella» para el sujeto enfatizado, sin introducir una duplicación innecesaria.
  - «Le» en «hablarle» representa el objeto indirecto del hebreo אֵלֶיהָ de forma idiomática en español.
