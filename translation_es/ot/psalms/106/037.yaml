translation:
  language: es
  text: Sacrificaron a sus hijos varones y a sus hijas a los demonios.
  philosophy: optimal-equivalence
  footnotes: []
lexical_decisions:
- source_word: וַיִּזְבְּחוּ
  english_pob_choice: they sacrificed
  chosen_spanish: sacrificaron
  alternatives_spanish:
  - ofrecieron en sacrificio
  - inmolaron
  lexicon: HALOT
  rationale: זבח describe un acto sacrificial; en español, «sacrificaron» conserva el sentido cultual sin sonar forzado. «Ofrecieron en sacrificio» explicita el valor ritual, pero es más pesado; «inmolaron» resalta el matiz de muerte, aunque puede sonar más técnico o menos natural aquí.
- source_word: בְּנֵיהֶם
  english_pob_choice: their sons
  chosen_spanish: sus hijos varones
  alternatives_spanish:
  - sus hijos
  - sus varones
  lexicon: HALOT
  rationale: El hebreo usa específicamente בֵּן, «hijo/varón». En español, «hijos varones» mantiene esa precisión de género; «sus hijos» puede sonar genérico y perder el contraste con «hijas» del segundo miembro.
- source_word: בְּנוֹתֵיהֶם
  english_pob_choice: their daughters
  chosen_spanish: sus hijas
  alternatives_spanish:
  - sus niñas
  - sus descendientes femeninas
  lexicon: HALOT
  rationale: בַּת significa «hija». «Sus hijas» es la equivalencia natural y exacta en español; las alternativas diluyen la fuerza del paralelismo con «hijos varones».
- source_word: לַשֵּׁדִים
  english_pob_choice: to demons
  chosen_spanish: a los demonios
  alternatives_spanish:
  - a los demonios malignos
  - a los espíritus malignos
  lexicon: HALOT
  rationale: שֵׁדִים refiere a seres demoníacos; «demonios» es la equivalencia más directa y clara en español. Conservé el artículo porque el hebreo tiene forma definida por el prefijo לַ, y el español lo expresa naturalmente en plural determinado.
theological_decisions:
- issue: Naturaleza de שֵׁדִים
  english_pob_reading: demons
  chosen_spanish_reading: demonios
  alternative_spanish_readings:
  - espíritus malignos
  - falsos dioses
  rationale: La lectura inglesa preserva la referencia a seres espirituales hostiles, no meramente a ídolos abstractos. «Demonios» mantiene esa afirmación sobrenatural sin suavizarla ni reinterpretarla.
  doctrine_reference: 'Translation philosophy: original-language primacy; preserve theological tension rather than resolve it'
translation_notes:
  revision_awareness: El control de revisión más reciente indica que no se requirieron cambios y que el consenso crítico es alto; por ello, el español sigue de cerca la decisión inglesa principal sin añadir glosas innecesarias.
  spanish_consistency_notes:
  - Se mantuvo «demonios» para שֵׁדִים, coherente con el valor semántico documentado.
  - Se prefirió un español natural y bíblico a la vez, evitando calcos de la estructura hebrea.
  - 'Se conservó la coordinación simple del hebreo: hijos varones / hijas / a los demonios.'
