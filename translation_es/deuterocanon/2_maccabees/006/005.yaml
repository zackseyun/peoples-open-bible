translation:
  language: es
  text: Pero el altar estaba lleno de cosas ilícitas por parte de los que se habían apartado de las leyes[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'También: «abominaciones» o «cosas prohibidas». El griego describe lo que es ilícito o no está permitido, en un contexto de profanación cultual.'
    reason: lexical_alternative
lexical_decisions:
- source_word: θυσιαστήριον
  english_pob_choice: altar
  chosen_spanish: altar
  alternatives_spanish:
  - altar sacrificial
  lexicon: LSJ
  rationale: El sentido básico y directo de θυσιαστήριον es «altar». En español, «altar» comunica con naturalidad el referente cultual sin ampliar innecesariamente el texto con «sacrificial».
- source_word: ἀποδιεσταλμένοις
  english_pob_choice: those who had departed from
  chosen_spanish: los que se habían apartado de
  alternatives_spanish:
  - los que se habían separado de
  - apóstatas de
  lexicon: LSJ
  rationale: El participio expresa alejamiento o separación respecto de la ley. «Se habían apartado de» conserva esa distancia de manera idiomática en español sin introducir la etiqueta interpretativa «apóstatas» en el cuerpo del versículo.
- source_word: νόμων
  english_pob_choice: the laws
  chosen_spanish: las leyes
  alternatives_spanish:
  - la ley
  - las leyes ancestrales
  lexicon: LSJ
  rationale: El griego está en plural, por lo que «las leyes» reproduce mejor la forma del original que «la ley». «Ancestrales» no está explícito en el texto y no se añade.
- source_word: ἀθεμίτοις
  english_pob_choice: unlawful things
  chosen_spanish: cosas ilícitas
  alternatives_spanish:
  - abominaciones
  - cosas prohibidas
  lexicon: LSJ
  rationale: El adjetivo denota lo que no está permitido o es ilícito. En español, «cosas ilícitas» conserva el matiz legal-religioso sin cargar más de lo que el término griego exige. Se mantiene el sustantivo implícito porque el griego también lo deja implícito.
- source_word: ἐπεπλήρωτο
  english_pob_choice: was filled
  chosen_spanish: estaba lleno
  alternatives_spanish:
  - había sido llenado
  - se encontraba lleno
  lexicon: LSJ
  rationale: La forma griega expresa un estado resultante ya establecido. «Estaba lleno» comunica de manera natural esa condición en español y evita una pasiva menos idiomática.
theological_decisions:
- issue: Grado de intensidad de ἀθεμίτοις en un contexto de profanación del templo
  english_pob_reading: unlawful things
  chosen_spanish_reading: cosas ilícitas
  alternative_spanish_readings:
  - abominaciones
  - cosas prohibidas
  rationale: Aunque el contexto es de profanación cultual, el término griego señala primariamente lo no permitido o ilícito. «Cosas ilícitas» preserva esa tensión legal-religiosa sin resolverla con un término más fuerte que el texto no exige por sí solo.
  doctrine_reference: Principio de primacía del texto original y conservación de tensiones léxicas en traducción bíblica.
translation_notes:
  revision_awareness: La revisión más reciente no introdujo cambios; se mantiene el sentido del original griego y la opción inglesa de «unlawful things», pero en español se opta por una formulación natural («cosas ilícitas») que conserva el matiz jurídico-religioso y la pasiva resultativa («estaba lleno»).
  spanish_consistency_notes:
  - Se usa «Yahvé» para el nombre divino cuando aparezca; aquí no aparece ningún equivalente.
  - Se mantiene «las leyes» para respetar el plural griego νόμων.
  - «Cosas ilícitas» evita sustituir el término por una tradición interpretativa más fuerte en el texto principal.
