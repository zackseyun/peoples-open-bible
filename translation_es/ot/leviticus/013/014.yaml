translation:
  language: es
  text: Pero el día en que aparezca en él carne viva[a], será impuro.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «carne cruda». La expresión hebrea «carne viva» se refiere al tejido vivo expuesto en el área afectada.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וּ/בְ/י֨וֹם
  english_pob_choice: But on the day
  chosen_spanish: Pero en el día
  alternatives_spanish:
  - Y en el día
  - Cuando
  lexicon: HALOT
  rationale: La secuencia con prefijo y 'día' introduce un marco temporal. 'Pero' conserva el giro adversativo del contexto legal inmediato; 'en el día' mantiene la forma hebrea sin forzar una paráfrasis.
- source_word: הֵרָא֥וֹת
  english_pob_choice: appears
  chosen_spanish: aparezca
  alternatives_spanish:
  - sea visto
  - se muestre
  lexicon: HALOT
  rationale: El nifal del verbo de ver expresa aparición o manifestación visible. 'Aparezca' es natural en español y conserva el sentido de algo que se hace visible.
- source_word: בּ֛/וֹ
  english_pob_choice: in him
  chosen_spanish: en él
  alternatives_spanish:
  - en esto
  - en el afectado
  lexicon: HALOT
  rationale: El sufijo masculino singular se refiere a la persona afectada. 'En él' sigue el ajuste revisado del POB inglés y evita una neutralización impersonal que perdería el referente humano.
- source_word: בָּשָׂ֥ר
  english_pob_choice: flesh
  chosen_spanish: carne
  alternatives_spanish:
  - tejido vivo
  - carne cruda
  lexicon: HALOT
  rationale: '''Carne'' es la correspondencia directa de בשר y preserva la imagen concreta. No se opta por una expansión interpretativa en el texto principal.'
- source_word: חַ֖י
  english_pob_choice: living
  chosen_spanish: viva
  alternatives_spanish:
  - cruda
  - sana
  lexicon: HALOT
  rationale: El adjetivo significa 'vivo, viviente'. En esta ley la expresión apunta a carne viva/expuesta; 'viva' conserva la forma básica y deja la precisión contextual para la nota.
- source_word: יִטְמָֽא
  english_pob_choice: he shall be unclean
  chosen_spanish: quedará impuro
  alternatives_spanish:
  - será impuro
  - quedará inmundo
  lexicon: HALOT
  rationale: La forma imperfecta expresa el dictamen legal/resultante del sacerdote. 'Quedará impuro' comunica el estado legal de manera natural en español y evita el término tradicional 'inmundo', menos claro hoy.
translation_notes:
  revision_awareness: El texto español sigue la revisión más reciente del POB en inglés, que cambió el referente de 'it' a 'him' para concordar con el masculino singular del contexto. Por eso se traduce 'en él' y no una forma neutra.
  spanish_consistency_notes:
  - Se mantuvo 'impuro' en vez de 'inmundo' para una equivalencia más transparente con el dictamen legal del hebreo.
  - La nota conserva la alternativa 'carne cruda' porque el audit trail inglés la documenta como lectura contextual, pero el texto principal sigue la imagen literal 'carne viva'.
  - Se evitó 'SEÑOR' u այլ sustituciones litúrgicas porque el versículo no contiene el nombre divino.
