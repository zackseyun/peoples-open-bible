revisions:
- from: 'Y David dijo a Saúl[a]: «¿Quién soy yo, y cuál es mi vida, o la familia de mi padre en Israel, para que llegue a ser yerno del rey?»'
  to: 'Y David dijo a Saúl[a]: «¿Quién soy yo, y qué es mi vida, o la familia de mi padre en Israel, para llegar a ser yerno del rey?»'
  rationale: Se ajusta la redacción para que el español suene natural sin perder la tensión léxica del hebreo ni la línea del POB inglés. «¿Qué es mi vida?» refleja mejor la expresión hebrea en español, y «para llegar a ser» expresa de modo más idiomático la fuerza prospectiva de כִּי אֶהְיֶה.
