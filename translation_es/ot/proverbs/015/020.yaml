translation:
  language: es
  text: El hijo sabio alegra a su padre, pero el hombre[a] insensato desprecia a su madre.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «hombre» traduce אָדָם aquí como individuo masculino, no como «ser humano» en general; el paralelo con «hijo» y la referencia a «su madre» favorecen esa lectura.
    reason: lexical_alternative
lexical_decisions:
- source_word: בֵּן
  english_pob_choice: son
  chosen_spanish: hijo
  alternatives_spanish:
  - hijo varón
  - hijo
  lexicon: HALOT
  rationale: בֵּן es singular masculino y en el paralelismo proverbial designa naturalmente un hijo. En español, «hijo» comunica esa relación con claridad y evita una repetición más pesada.
- source_word: חָכָם
  english_pob_choice: wise
  chosen_spanish: sabio
  alternatives_spanish:
  - prudente
  - hábil
  lexicon: HALOT
  rationale: En la literatura sapiencial, חָכָם expresa sabiduría práctica y moral. «Sabio» es el equivalente más directo y natural en español.
- source_word: יְשַׂמַּח
  english_pob_choice: brings joy to
  chosen_spanish: alegra a
  alternatives_spanish:
  - hace regocijar a
  - da alegría a
  lexicon: HALOT
  rationale: 'El verbo piel de שׂמח es causativo: hace alegrarse. «Alegra a» conserva esa fuerza de manera breve y idiomática.'
- source_word: אָב
  english_pob_choice: his father
  chosen_spanish: su padre
  alternatives_spanish:
  - padre
  lexicon: HALOT
  rationale: El posesivo está implícito por el contexto relacional del proverbio. «Su padre» mantiene esa relación de manera natural en español.
- source_word: כְסִיל
  english_pob_choice: foolish
  chosen_spanish: insensato
  alternatives_spanish:
  - necio
  - tonto
  lexicon: HALOT
  rationale: כְסִיל describe una necedad moral y obstinada. «Insensato» comunica mejor ese valor que un término meramente coloquial.
- source_word: אָדָם
  english_pob_choice: man
  chosen_spanish: hombre
  alternatives_spanish:
  - persona
  - ser humano
  lexicon: HALOT
  rationale: Aquí אָדָם se refiere a un individuo masculino en paralelo con «hijo» y en relación con «su madre», no a la humanidad en general. «Hombre» preserva esa referencia personal y masculina.
- source_word: בּוֹזֶה
  english_pob_choice: despises
  chosen_spanish: desprecia
  alternatives_spanish:
  - mira con desprecio
  - menosprecia
  lexicon: HALOT
  rationale: El participio expresa una actitud habitual de desprecio. «Desprecia» es breve, fuerte y fiel al valor del término.
- source_word: אִמּוֹ
  english_pob_choice: his mother
  chosen_spanish: su madre
  alternatives_spanish:
  - madre
  lexicon: HALOT
  rationale: El sufijo posesivo es explícito en hebreo. «Su madre» lo conserva de forma natural en español.
translation_notes:
  revision_awareness: 'Revisión auditada: el expediente inglés mantiene alta concordancia con el texto fuente y no introduce cambios textuales ni variantes de traducción. Se conserva esa línea en español, con una única nota para reflejar la alternativa semántica de אָדָם sin neutralizarla.'
  spanish_consistency_notes:
  - Se mantiene el paralelismo proverbial con dos miembros breves y equilibrados.
  - Se evita «SEÑOR» u այլ terminología no pertinente; no hay términos divinos en este versículo.
  - «Sabio/insensato» preserva el contraste moral del hebreo sin volverlo coloquial.
  - La nota se ancla en «hombre» porque ahí recae la decisión lexical más sensible.
