translation:
  language: es
  text: ¿Cómo no es abandonada[a][b] la ciudad de alabanza, la ciudad de mi gozo?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «¿Cómo no es abandonada la ciudad de alabanza, la ciudad de mi deleite?»'
    reason: lexical_alternative
  - marker: b
    text: Hebreo «la ciudad de mi gozo»; se conserva el sufijo de primera persona, aunque los intérpretes difieren sobre qué voz representa el lamento.
    reason: lexical_alternative
lexical_decisions:
- source_word: אֵיךְ
  english_pob_choice: How
  chosen_spanish: ¡Cómo
  alternatives_spanish:
  - ¿Cómo
  - ¡De qué manera
  lexicon: HALOT
  rationale: Conserva el valor exclamativo e interrogativo de asombro o lamento. En español, «Cómo» con signos exclamativos e interrogativos expresa mejor la extrañeza retórica que una pregunta causal como «por qué».
- source_word: עֻזְּבָה
  english_pob_choice: been abandoned
  chosen_spanish: ha sido abandonada
  alternatives_spanish:
  - ha sido dejada
  - ha sido desamparada
  lexicon: HALOT
  rationale: El pasivo perfecto comunica bien la situación de desolación de la ciudad. «Abandonada» es natural y fiel al valor de עזב, sin forzar un tono más arcaico como «desamparada» o más literal pero menos idiomático como «dejada».
- source_word: עִיר
  english_pob_choice: city
  chosen_spanish: ciudad
  alternatives_spanish:
  - población
  - villa
  lexicon: HALOT
  rationale: «Ciudad» es la equivalencia normal y mantiene el paralelismo poético con la segunda frase.
- source_word: תהלה
  english_pob_choice: of praise
  chosen_spanish: de alabanza
  alternatives_spanish:
  - de renombre
  - de gloria
  lexicon: HALOT
  rationale: La forma más cercana y transparente en español es «alabanza». Aunque el sentido contextual puede ser el de una ciudad celebrada o famosa, la traducción evita resolver prematuramente esa tensión léxica.
- source_word: קִרְיַת
  english_pob_choice: the city of
  chosen_spanish: la ciudad de
  alternatives_spanish:
  - la villa de
  lexicon: HALOT
  rationale: Se conserva la construcción poética en aposición sin fundirla en un solo descriptor, siguiendo la repetición del hebreo y el enfoque del POB en mantener la forma retórica.
- source_word: מְשׂוֹשִׂי
  english_pob_choice: my joy
  chosen_spanish: mi gozo
  alternatives_spanish:
  - mi alegría
  - mi deleite
  lexicon: HALOT
  rationale: «Gozo» reproduce con dignidad el sustantivo de alegría/júbilo y mantiene el sufijo de primera persona. Se evita resolver quién habla, preservando la ambigüedad documentada por el POB.
theological_decisions:
- issue: Voz implícita en «mi gozo»
  english_pob_reading: The first-person suffix is retained, though interpreters differ on whose voice is represented in the lament.
  chosen_spanish_reading: Se mantiene «mi gozo» sin identificar explícitamente al hablante.
  alternative_spanish_readings:
  - mi deleite
  - el gozo de mí
  rationale: El hebreo conserva el sufijo de primera persona; la traducción no debe aclarar indebidamente una ambigüedad que el texto deja abierta. Esto preserva la tensión literaria del lamento.
  doctrine_reference: Lectura literaria y filológica del texto; no implica una afirmación doctrinal específica.
translation_notes:
  revision_awareness: Se corrigió el problema de validación anterior anclando cada nota al texto traducido mediante los marcadores [a] y [b], y manteniendo la lectura interrogativa/exclamativa breve que mejor refleja el hebreo.
  spanish_consistency_notes:
  - Se usa un registro bíblico moderno y digno, sin recurrir a «SEÑOR» ni a fórmulas eclesiásticas no presentes en el texto.
  - «Gozo» se eligió como equivalente directo de מְשׂוֹשִׂי para conservar el sufijo posesivo y la ambigüedad de la voz.
  - La duplicación de «ciudad» sigue la estructura poética del hebreo y la estrategia del POB de preservar paralelismos significativos.
