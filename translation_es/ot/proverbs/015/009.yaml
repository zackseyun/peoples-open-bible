translation:
  language: es
  text: Abominación a Yahvé es el camino del impío[a], pero ama al que persigue la rectitud[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Detestable para Yahvé es el camino de un hombre impío».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «ama a quien persigue la justicia».'
    reason: lexical_alternative
lexical_decisions:
- source_word: תּוֹעֲבַת
  english_pob_choice: an abomination
  chosen_spanish: abominación
  alternatives_spanish:
  - detestable
  - repugnancia
  lexicon: HALOT
  rationale: Conserva la fuerza evaluativa fuerte del sustantivo hebreo sin suavizarlo. En español, 'abominación' mantiene el peso moral y cultual que el POB inglés preserva con 'an abomination'.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  - el SEÑOR
  lexicon: HALOT
  rationale: 'Se sigue la convención del proyecto para el Tetragrámaton: ''Yahvé'' como nombre propio divino, no la sustitución ''SEÑOR''. Esto preserva el nombre personal revelado de Dios.'
- source_word: דֶּרֶךְ
  english_pob_choice: way
  chosen_spanish: camino
  alternatives_spanish:
  - sendero
  - conducta
  - modo de vida
  lexicon: HALOT
  rationale: En español, 'camino' transmite bien tanto la ruta literal como la imagen sapiencial de un curso de vida. 'Conducta' explicita la idea, pero pierde la metáfora del proverbio.
- source_word: רָשָׁע
  english_pob_choice: the wicked
  chosen_spanish: el impío
  alternatives_spanish:
  - el malvado
  - el perverso
  lexicon: HALOT
  rationale: '''Impío'' es una opción bíblica y sobria que comunica la categoría moral general del término. Evita una lectura demasiado descriptiva o coloquial de ''malvado''.'
- source_word: מְרַדֵּף
  english_pob_choice: the one who pursues
  chosen_spanish: el que persigue
  alternatives_spanish:
  - quien persigue
  - el perseguidor de
  lexicon: HALOT
  rationale: El participio se vierte naturalmente con una construcción substantiva en español. 'El que persigue' conserva la acción continua y el paralelismo proverbial.
- source_word: צְדָקָה
  english_pob_choice: righteousness
  chosen_spanish: la justicia
  alternatives_spanish:
  - la rectitud
  - la justicia y rectitud
  lexicon: HALOT
  rationale: Aunque 'justicia' puede abarcar el sentido moral de צְדָקָה, en español también mantiene la amplitud ética del término y enlaza bien con el giro proverbial 'persigue la justicia'. Se deja abierta la alternativa de 'rectitud' sin desplazar el matiz legal-moral.
- source_word: יֶאֱהָב
  english_pob_choice: he loves
  chosen_spanish: ama
  alternatives_spanish:
  - lo ama
  - le ama
  lexicon: HALOT
  rationale: El imperfecto hebreo expresa verdad general; en español, el presente simple comunica de forma natural el enunciado sapiencial. El sujeto divino se sobreentiende por el contexto, como en el inglés POB.
theological_decisions:
- issue: Tratamiento del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - el SEÑOR
  rationale: La línea usa el nombre propio divino y no un título. Se mantiene la decisión del POB de no ocultar el Tetragrámaton, ajustando su forma al uso español del proyecto ('Yahvé').
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Valor genérico del singular masculino
  english_pob_reading: the wicked / the one who pursues righteousness
  chosen_spanish_reading: el impío / el que persigue la justicia
  alternative_spanish_readings:
  - la persona impía / quien persigue la justicia
  - el malvado / quien persigue la rectitud
  rationale: El hebreo emplea formas masculinas singulares con sentido representativo. Se conserva ese valor genérico en español sin volverlo exclusivo de un varón, en continuidad con la lectura del POB inglés.
  doctrine_reference: DOCTRINE.md Translation philosophy §4
translation_notes:
  revision_awareness: El control de revisión indica que no hubo cambios necesarios en la última pasada y que la concordancia con la revisión/cotejo fue alta; por ello se mantiene una traducción estable y alineada con el audit trail inglés sin introducir ajustes especulativos.
  spanish_consistency_notes:
  - Se usa 'Yahvé' de forma consistente con la política del proyecto para יְהוָה.
  - Se mantiene 'justicia' para צְדָקָה, dejando nota alternativa con 'rectitud' porque el inglés POB también preserva esa posibilidad.
  - 'El paralelismo queda simétrico: ''Abominación...'' / ''pero ama...'' y conserva el contraste sapiencial.'
  - La puntuación y el orden son naturales en español sin perder la estructura fuente de dos miembros antitéticos.
