translation:
  language: es
  text: 'Y Holofernes le dijo: «Ten ánimo, mujer; no temas en tu corazón[a], porque yo no he hecho daño a ningún hombre que haya escogido[b] servir al rey Nabucodonosor de toda la tierra»[c].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «no tengas miedo en tu corazón».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «haya preferido».'
    reason: lexical_alternative
  - marker: c
    text: La expresión «rey Nabucodonosor de toda la tierra» refleja la pretensión imperial del hablante; en otros contextos, γῆ también puede significar «tierra» o «país».
    reason: cultural_note
lexical_decisions:
- source_word: Θάρσησον
  english_pob_choice: Take courage
  chosen_spanish: Ten ánimo
  alternatives_spanish:
  - Ten valor
  - Ánimo
  lexicon: LSJ
  rationale: El imperativo exhorta a cobrar valor o confianza. «Ten ánimo» conserva el tono directo y natural en español sin volverse arcaico.
- source_word: γύναι
  english_pob_choice: woman
  chosen_spanish: mujer
  alternatives_spanish:
  - señora
  lexicon: LSJ
  rationale: La vocación griega es simplemente «mujer». «Señora» suavizaría el vocativo más allá del griego.
- source_word: μὴ φοβηθῇς τῇ καρδίᾳ σου
  english_pob_choice: do not be afraid in your heart
  chosen_spanish: no temas en tu corazón
  alternatives_spanish:
  - no tengas miedo en tu corazón
  - no dejes que tu corazón tema
  lexicon: LSJ
  rationale: Conservo la localización interior expresada por τῇ καρδίᾳ σου. «En tu corazón» refleja el giro semítico sin perder claridad en español.
- source_word: ἐκάκωσα
  english_pob_choice: have harmed
  chosen_spanish: he hecho daño
  alternatives_spanish:
  - he maltratado
  - he perjudicado
  lexicon: LSJ
  rationale: El verbo expresa hacer daño o tratar mal; «he hecho daño» es amplio y natural en español, sin forzar una violencia física específica.
- source_word: ἄνθρωπον
  english_pob_choice: man
  chosen_spanish: hombre
  alternatives_spanish:
  - persona
  - ser humano
  lexicon: LSJ
  rationale: El singular masculino funciona de manera genérica en el contexto. «Hombre» sigue de cerca la forma del original, aunque el referente sea general.
- source_word: ὅστις ἡρέτικεν
  english_pob_choice: who has chosen
  chosen_spanish: que haya escogido
  alternatives_spanish:
  - que haya preferido
  - que haya resuelto
  lexicon: LSJ
  rationale: La forma expresa elección o preferencia; el subjuntivo perfecto en español mantiene la anterioridad y la condición relativa.
- source_word: δουλεύειν
  english_pob_choice: to serve
  chosen_spanish: servir
  alternatives_spanish:
  - ser esclavo de
  - estar sujeto a
  lexicon: LSJ
  rationale: Aquí el verbo se usa en un marco político de sumisión al rey; «servir» comunica la relación sin añadir la dureza específica de «esclavo».
- source_word: βασιλεῖ Ναβουχοδονόσορ
  english_pob_choice: King Nebuchadnezzar
  chosen_spanish: al rey Nabucodonosor
  alternatives_spanish:
  - al rey Nabucodonosor
  lexicon: LSJ
  rationale: Mantengo el título y el nombre propios de forma directa y reconocible en español.
- source_word: πάσης τῆς γῆς
  english_pob_choice: of all the earth
  chosen_spanish: de toda la tierra
  alternatives_spanish:
  - de toda la tierra
  - de todo el país
  lexicon: LSJ
  rationale: «Tierra» conserva la amplitud retórica del reclamo imperial. «Toda» reproduce el valor universalizador del genitivo totalizante.
theological_decisions:
- issue: Título imperial universal de Nabucodonosor
  english_pob_reading: of all the earth
  chosen_spanish_reading: de toda la tierra
  alternative_spanish_readings:
  - de todo el país
  - de toda la región
  rationale: Sigo la lectura de propaganda imperial universal, no una limitación geográfica. El español «tierra» mantiene el alcance grandilocuente sin aprobar la pretensión.
  doctrine_reference: 'Translation philosophy: preserve source meaning without importing doctrinal claims.'
