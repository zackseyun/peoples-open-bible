translation:
  language: es
  text: Tú que habitas en los jardines, los compañeros están pendientes de oír tu voz; hazme oírla[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más formalmente: «haz que la oiga».'
    reason: lexical_alternative
lexical_decisions:
- source_word: הַיּוֹשֶׁבֶת
  english_pob_choice: You who dwell
  chosen_spanish: Tú que habitas
  alternatives_spanish:
  - Tú que moras
  - Tú que vives
  lexicon: HALOT
  rationale: El participio femenino singular con artículo funciona como un vocativo que se dirige a la mujer. «Habitas» conserva la idea de residir de manera continua y suena natural en español poético.
- source_word: בַּגַּנִּים
  english_pob_choice: in the gardens
  chosen_spanish: en los jardines
  alternatives_spanish:
  - entre los jardines
  - en el jardín
  lexicon: HALOT
  rationale: Se mantiene el plural del hebreo. «Jardines» conserva la forma plural sin reducirla a un singular, y es idiomático en español.
- source_word: חֲבֵרִים
  english_pob_choice: companions
  chosen_spanish: los compañeros
  alternatives_spanish:
  - los amigos
  - los asociados
  lexicon: HALOT
  rationale: «Compañeros» preserva el matiz relacional y el tono literario. «Amigos» puede sonar más íntimo de lo que exige el término, y «compañeros» deja abierta la relación exacta.
- source_word: מַקְשִׁיבִים
  english_pob_choice: are listening for
  chosen_spanish: están atentos a
  alternatives_spanish:
  - están escuchando
  - escuchan con atención
  lexicon: HALOT
  rationale: El participio hifil expresa atención expectante. En español, «estar atentos a» comunica mejor esa vigilancia oyente que una simple «escucha» neutra.
- source_word: לְקוֹלֵךְ
  english_pob_choice: your voice
  chosen_spanish: tu voz
  alternatives_spanish:
  - el sonido de tu voz
  - tu sonido
  lexicon: HALOT
  rationale: קוֹל suele referirse a la voz en este tipo de habla directa. «Tu voz» es la opción más natural y fiel en español.
- source_word: הַשְׁמִיעִינִי
  english_pob_choice: let me hear it
  chosen_spanish: hazme oírla
  alternatives_spanish:
  - déjame oírla
  - haz que la oiga
  lexicon: HALOT
  rationale: El imperativo hifil con sufijo de 1ª persona literalmente significa «hazme oír». «Hazme oírla» preserva la fuerza causativa y mantiene en español la referencia a la voz mencionada antes.
translation_notes:
  revision_awareness: El texto inglés auditado traduce el plural de ‘gardens’, el participio vocativo femenino y el causativo final de manera idiomática; la versión española sigue esas decisiones con equivalencias naturales y mantiene la tensión entre el ruego literal («hazme oír») y la formulación más fluida.
  spanish_consistency_notes:
  - Se conserva el plural «jardines» como en el hebreo y el audit trail inglés.
  - Se mantiene el tono vocativo con «Tú que habitas», sin introducir un título no presente en el texto.
  - La nota final refleja la alternativa formal documentada por el POB inglés.
