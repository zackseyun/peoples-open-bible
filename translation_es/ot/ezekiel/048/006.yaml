translation:
  language: es
  text: Y junto al límite de Efraín, desde el lado oriental hasta el lado occidental[b], Rubén[a], una porción.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literalmente, «Rubén, uno». Aquí se sobreentiende «porción» o «lote» por el contexto de la repartición tribal.
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «al lado del mar»; en esta fórmula, «mar» funciona como término hebreo habitual para el oeste.'
    reason: cultural_note
lexical_decisions:
- source_word: וְעַל
  english_pob_choice: And along
  chosen_spanish: Y junto a
  alternatives_spanish:
  - Y al lado de
  - Y sobre
  lexicon: HALOT
  rationale: En este contexto de repartición territorial, עַל expresa ubicación adyacente o en relación con el borde. «Junto a» conserva la cercanía espacial y suena natural en español, manteniendo también la conexión del waw inicial.
- source_word: גְּבוּל
  english_pob_choice: border
  chosen_spanish: límite
  alternatives_spanish:
  - frontera
  - borde
  lexicon: HALOT
  rationale: En un pasaje de asignación de tierras, גְּבוּל señala la línea o extensión delimitadora. «Límite» comunica bien esa función territorial en español y evita la connotación moderna de frontera política.
- source_word: אֶפְרַיִם
  english_pob_choice: Ephraim
  chosen_spanish: Efraín
  alternatives_spanish:
  - Efraím
  lexicon: Transcripción estándar del nombre tribal
  rationale: Es el nombre propio de la tribu; «Efraín» es la forma usual y transparente en español bíblico.
- source_word: מִפְּאַת קָדִים
  english_pob_choice: from the east side
  chosen_spanish: desde el lado oriental
  alternatives_spanish:
  - desde el lado del oriente
  - desde el extremo oriental
  lexicon: HALOT
  rationale: פֵּאָה designa lado, borde o extremo. Aquí la referencia direccional es primaria, por lo que «lado oriental» preserva el sentido geográfico sin volverlo demasiado literal ni oscuro.
- source_word: וְעַד פְּאַת יָמָּה
  english_pob_choice: to the west side
  chosen_spanish: hasta el lado occidental
  alternatives_spanish:
  - hasta el lado del mar
  - hasta el lado del occidente
  lexicon: HALOT
  rationale: Aunque יָם puede significar literalmente «mar», en esta fórmula de orientación territorial el valor direccional occidental es el principal. «Lado occidental» refleja esa convención hebrea sin perder claridad en español.
- source_word: רְאוּבֵן
  english_pob_choice: Reuben
  chosen_spanish: Rubén
  alternatives_spanish:
  - Ruben
  lexicon: Transcripción estándar del nombre tribal
  rationale: Nombre propio de la tribu; «Rubén» es la forma bíblica usual en español.
- source_word: אֶחָד
  english_pob_choice: one portion
  chosen_spanish: una porción
  alternatives_spanish:
  - una
  - una sola porción
  - un lote
  lexicon: HALOT
  rationale: El hebreo dice simplemente «uno», con valor elíptico dentro del reparto tribal. En español conviene explicitar la unidad de heredad como «una porción», siguiendo la decisión auditada del inglés sin sobreinterpretar el término.
translation_notes:
  revision_awareness: El texto sigue de cerca el hebreo de WLC y la solución auditada del inglés POB, conservando la estructura territorial y la elipsis de אֶחָד mediante una explicitación mínima en español. No se registran revisiones posteriores que alteren la lectura base.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» por norma general del proyecto, pero este versículo no contiene el Tetragrámaton ni un título divino.
  - «Límite» se usa aquí en sentido territorial, no doctrinal.
  - Las direcciones se expresan en forma idiomática («lado oriental / occidental») para reflejar la convención hebrea sin perder inteligibilidad.
