translation:
  language: es
  text: Y Amasá yacía revolcándose en la sangre, en medio de la calzada. Cuando el hombre vio que todo el pueblo se detenía, apartó a Amasá de la calzada al campo, y echó sobre él una prenda, porque vio que todo el que llegaba hasta él se detenía.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: מִתְגֹּלֵל
  english_pob_choice: wallowing
  chosen_spanish: yacía revolcándose
  alternatives_spanish:
  - yacía revolcándose en la sangre
  - yacía retorciéndose
  - estaba rodando
  lexicon: HALOT
  rationale: El hebreo expresa movimiento involuntario y agonizante dentro de la sangre. En español, «revolcándose» preserva la imagen corporal de movimiento repetido sobre el suelo; «retorciéndose» comunica la agonía, pero pierde la idea de rodar/revolverse. «Yacía» añade el estado narrativo de estar tendido, sin exceder el sentido del verbo.
- source_word: בַּדָּם
  english_pob_choice: in blood
  chosen_spanish: en la sangre
  alternatives_spanish:
  - en sangre
  - en su sangre
  lexicon: HALOT
  rationale: El artículo hebreo sugiere una sangre definida por el contexto, pero el español natural pide la forma con artículo. Se evita añadir «su», que no está explícito en el texto.
- source_word: בְּתוֹךְ הַמְסִלָּה
  english_pob_choice: in the middle of the highway
  chosen_spanish: en medio de la calzada
  alternatives_spanish:
  - en medio del camino
  - en medio de la carretera
  lexicon: HALOT
  rationale: מְסִלָּה es una vía principal o camino elevado; «calzada» comunica bien una vía transitada sin sonar demasiado moderna ni técnica. «En medio de» refleja con claridad בְּתוֹךְ.
- source_word: כִּי עָמַד כָּל הָעָם
  english_pob_choice: that all the people were stopping
  chosen_spanish: que todo el pueblo se detenía
  alternatives_spanish:
  - que todo el pueblo estaba parado
  - que todo el pueblo se había detenido
  - que todo el pueblo se paraba
  lexicon: HALOT
  rationale: עמד aquí indica que la gente se había parado a causa del obstáculo. «Se detenía» conserva el aspecto progresivo del relato y suena natural en español.
- source_word: וַיַּסֵּב
  english_pob_choice: he moved
  chosen_spanish: apartó
  alternatives_spanish:
  - movió
  - retiró
  - desvió
  lexicon: HALOT
  rationale: El hiphil de סבב aquí expresa sacar a Amasá del camino. «Apartó» es más preciso y natural que «movió», y no añade la fuerza física de «arrastró», que el hebreo no especifica.
- source_word: מִן הַמְסִלָּה הַשָּׂדֶה
  english_pob_choice: from the highway into the field
  chosen_spanish: de la calzada al campo
  alternatives_spanish:
  - desde la calzada hacia el campo
  - del camino al campo
  lexicon: HALOT
  rationale: La construcción marca salida de la vía y traslado al terreno contiguo. «Al campo» mantiene la dirección y el contraste espacial con la calzada.
- source_word: בֶּגֶד
  english_pob_choice: a garment
  chosen_spanish: un vestido
  alternatives_spanish:
  - una prenda
  - un manto
  - un vestido/ropa
  lexicon: HALOT
  rationale: בֶּגֶד es un término general para prenda de vestir. «Vestido» en español bíblico puede sonar arcaizante y restringirse al tipo de ropa, pero aquí funciona como equivalente amplio y sobrio; se evita «manto» por ser demasiado específico.
- source_word: כָּל הַבָּא עָלָיו
  english_pob_choice: everyone who came upon him
  chosen_spanish: todos los que pasaban junto a él
  alternatives_spanish:
  - todos los que llegaban hasta él
  - todos los que venían sobre él
  - todos los que se acercaban a él
  lexicon: HALOT
  rationale: La expresión describe a quienes encontraban el cadáver en el camino. «Pasaban junto a él» comunica el encuentro accidental y conserva el sentido espacial sin forzar un matiz relacional.
- source_word: וְעָמָד
  english_pob_choice: stopped
  chosen_spanish: se detenían
  alternatives_spanish:
  - se paraban
  - quedaban parados
  - se quedaban inmóviles
  lexicon: HALOT
  rationale: La repetición de עמד al final retoma el obstáculo causado por el cuerpo en el camino. «Se detenían» mantiene el mismo valor narrativo que antes y evita un calco rígido.
translation_notes:
  revision_awareness: La versión sigue de cerca la lectura final inglesa del POB, especialmente la decisión revisada de entender מִתְגֹּלֵל con un verbo de movimiento corporal agonizante. En español se eligió una solución que conserva esa tensión semántica entre estar tendido y moverse de forma involuntaria, sin suavizar la crudeza del cuadro.
  spanish_consistency_notes:
  - Se conserva Amasá como forma española del nombre propio.
  - Se mantiene la correspondencia de la repetición verbal con «se detenía / se detenían» para reflejar el paralelismo del hebreo.
  - Se usa «calzada» para מְסִלָּה por su valor de vía transitada, evitando «SEÑOR» u otras sustituciones no pertinentes.
