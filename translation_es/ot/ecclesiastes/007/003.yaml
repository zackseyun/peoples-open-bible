translation:
  language: es
  text: Mejor es la tristeza[a] que la risa, porque por un rostro triste[b] mejora el corazón.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Traducción alternativa: ''ira'' o ''vexación'', porque כַּעַס también puede referirse al enojo. Aquí se prefiere ''tristeza'' por el contraste con la risa y por el sentido del proverbio en este contexto.'
    reason: lexical_alternative
  - marker: b
    text: 'Literalmente: ''porque por la maldad de rostro el corazón se hace bueno''. La expresión hebrea es un modismo para un semblante triste o abatido.'
    reason: lexical_alternative
lexical_decisions:
- source_word: טוֹב
  english_pob_choice: better
  chosen_spanish: Mejor
  alternatives_spanish:
  - Bueno
  - Más bueno
  lexicon: HALOT
  rationale: En la construcción comparativa con מִן implícito en español por 'que', טוֹב expresa comparación de calidad/beneficio. 'Mejor' reproduce con naturalidad la relación comparativa sin volver el enunciado una afirmación absoluta de bondad.
- source_word: כַּעַס
  english_pob_choice: sorrow
  chosen_spanish: tristeza
  alternatives_spanish:
  - ira
  - vexación
  - dolor
  - aflicción
  lexicon: HALOT
  rationale: Aunque כַּעַס puede significar 'ira' o 'vexación', el contexto sapiencial lo contrasta con la risa y lo explica por el efecto benéfico de un rostro abatido. 'Tristeza' comunica mejor en español esa condición afectiva sin sugerir necesariamente enojo pecaminoso.
- source_word: מִשְּׂחוֹק
  english_pob_choice: than laughter
  chosen_spanish: que la risa
  alternatives_spanish:
  - que la carcajada
  - que el regocijo
  lexicon: HALOT
  rationale: שְׂחוֹק designa risa o diversión. 'Risa' es la equivalencia directa y más sobria en español; conserva el paralelismo con 'tristeza'.
- source_word: כִּי
  english_pob_choice: for
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  lexicon: HALOT
  rationale: La partícula introduce la razón de la comparación. 'Porque' expresa claramente la relación causal/explicativa en español actual.
- source_word: בְּרֹעַ פָּנִים
  english_pob_choice: by a sad face
  chosen_spanish: con rostro triste
  alternatives_spanish:
  - con semblante triste
  - con faz abatida
  - con aspecto sombrío
  lexicon: HALOT
  rationale: El hebreo idiomático literalmente dice 'en/por la maldad de rostro', pero apunta a un semblante triste o abatido. 'Con rostro triste' mantiene la imagen concreta y evita una calca extraña en español.
- source_word: יִיטַב
  english_pob_choice: is made better
  chosen_spanish: se hace mejor
  alternatives_spanish:
  - mejora
  - se beneficia
  - se vuelve mejor
  lexicon: HALOT
  rationale: De יטב, 'ser bueno / estar bien / hacerse bueno'. 'Se hace mejor' conserva el efecto benéfico sobre el corazón y mantiene la estructura resultativa del hebreo.
- source_word: לֵב
  english_pob_choice: the heart
  chosen_spanish: el corazón
  alternatives_spanish:
  - el interior
  - la mente
  - el ánimo
  lexicon: HALOT
  rationale: En la sabiduría bíblica לֵב abarca la interioridad, pensamiento y disposición. 'Corazón' es el equivalente español tradicional y suficientemente amplio para esa esfera interior.
translation_notes:
  revision_awareness: 'Se verificó el contexto auditado de la POB en inglés y no se detectaron revisiones posteriores que alteren la lectura. La decisión léxica principal sigue el criterio ya asentado: comparar beneficio sapiencial más que captar una oposición moral rígida entre ira y alegría.'
  spanish_consistency_notes:
  - Se mantuvo 'Yahvé' como norma general del proyecto, pero este versículo no contiene el nombre divino.
  - Se usó 'corazón' para לֵב conforme al uso sapiencial amplio.
  - Se prefirió 'tristeza' frente a 'ira' para כַּעַס, siguiendo la lectura contextual del POB inglés y preservando la tensión léxica en nota.
  - Se evitó 'rostro' como calco duro con preposición literal; 'con rostro triste' transmite el modismo con naturalidad en español.
