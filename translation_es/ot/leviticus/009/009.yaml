    text: O «le presentaron la sangre»; el verbo hebreo puede significar «acercar» en un contexto ritual.
    reason: lexical_alternative
  - marker: b
    text: Literalmente, «los cuernos del altar», es decir, sus salientes proyectados.
    reason: cultural_note
  - marker: c
    text: O «al fundamento del altar».
    reason: lexical_alternative
  revision_rationale: Se mantiene la fidelidad básica del borrador, pero se corrige una expresión poco idiomática («a la base» → «en la base») y se mejora la naturalidad de la nota léxica [a] sin alterar el sentido ni las decisiones documentadas del POB.
