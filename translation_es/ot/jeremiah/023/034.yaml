review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador conserva bien la estructura básica del hebreo: enumera «el profeta, el sacerdote y el pueblo», mantiene «Yahvé», refleja el sentido judicial de וּפָקַדְתִּי עַל con «castigaré», y preserva el juego polémico de מַשָּׂא con «carga». Sin embargo, dos puntos requieren ajuste para mayor fidelidad al expediente POB: (1) la nota [a] sobre «el profeta» no corresponde a una alternativa significativa preservada por el inglés; el matiz distributivo pertenece más bien a la cláusula relativa, no específicamente a «profeta»; (2) «su casa» no expresa tan claramente como «su casa/familia doméstica» el sentido de בֵּיתוֹ aquí, donde el inglés auditado eligió «his household».'
  spanish_quality_summary: El español es claro y digno, pero «que digan» después de la serie suena algo menos natural que una formulación distributiva singular en español, y «su casa» puede leerse demasiado literalmente como edificio. «Quien diga» mejora la fluidez y preserva mejor el valor distributivo individual reforzado por «aquel hombre». «Su familia» o «su casa» son opciones posibles, pero «su familia» estrecha demasiado; «su casa» queda corta. Una formulación como «su hogar» o mejor «su familia» no capta todo el campo; «su casa» con nota tampoco es ideal. La solución más fiel y natural es «su hogar» o «los de su casa», pero el expediente inglés favorece «household». En español bíblico-legible, «su casa» puede funcionar, pero aquí conviene explicitar mejor con «los de su casa».
  glossary_alignment: Se alinea con la política del proyecto al usar «Yahvé». También mantiene correctamente «carga» para מַשָּׂא en este contexto polémico. No hay conflicto con otros términos doctrinales. El principal desajuste es terminológico-contextual en בֵּיתוֹ, donde el razonamiento documentado favorece el sentido de unidad doméstica más que edificio.
  issues:
  - severity: medium
    issue: La nota [a] está mal enfocada y no corresponde a una alternativa significativa del texto principal.
    rationale: La nota anclada en «profeta» explica el singular distributivo, pero ese fenómeno no afecta solo a הַנָּבִיא sino a toda la serie y a la cláusula relativa. Además, el inglés POB solo preserva una nota léxica para מַשָּׂא, no para «prophet». Mantener [a] introduce ruido editorial innecesario.
  - severity: medium
    issue: «Su casa» no refleja con suficiente precisión el sentido de בֵּיתוֹ como «household».
    rationale: En este contexto judicial, בֵּיתוֹ se refiere a la unidad doméstica del ofensor, no meramente a la vivienda. El expediente inglés lo documenta explícitamente. En español, «su casa» puede entenderse como edificio; conviene una expresión más clara.
  - severity: low
    issue: «Que digan» es defendible, pero una formulación distributiva singular sería más natural en español y armoniza mejor con «aquel hombre».
    rationale: El hebreo tiene verbo singular distributivo, y el juicio recae sobre cada ofensor individualmente. «Quien diga» o «el que diga» transmite ese valor con mayor naturalidad en español.
  revised_spanish_text: 'Y el profeta, el sacerdote o el pueblo, quien diga: «La carga[a] de Yahvé», yo castigaré a aquel hombre y a los de su casa.'
  revised_footnotes:
  - marker: a
    text: O «el oráculo de Yahvé». En este contexto, Jeremías aprovecha el sentido más literal de מַשָּׂא como «carga» para su reprensión.
    reason: lexical_alternative
  revision_rationale: Se elimina la nota innecesaria sobre «profeta», se mantiene la nota léxica importante sobre «carga», se ajusta la cláusula relativa a una formulación distributiva más natural en español («quien diga») y se cambia «su casa» por «los de su casa» para reflejar mejor el sentido de «household» documentado en el expediente inglés, sin perder legibilidad bíblica.
