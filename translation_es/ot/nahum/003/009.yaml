translation:
  language: es
  text: Cush era su fuerza[a], y Egipto sin fin[d][c][b]; Put y los libios fueron entre tus ayudantes.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'El hebreo cambia de persona dentro del versículo: “Cush era su fuerza” (3.ª persona femenina) pero “tus ayudantes” (2.ª persona femenina). La traducción conserva ese cambio en lugar de suavizarlo.'
    reason: lexical_alternative
  - marker: b
    text: 'O: “Cush era tu fuerza.” Algunas traducciones armonizan el posesivo con el posterior “tus”, pero el sufijo hebreo en “fuerza” es de 3.ª persona femenina singular (“su”).'
    reason: alternative_reading
  - marker: c
    text: “Put” también se traduce tradicionalmente “Phut”.
    reason: lexical_alternative
  - marker: d
    text: Hebreo “Lubim”; probablemente pueblos libios.
    reason: cultural_note
lexical_decisions:
- source_word: כּוּשׁ
  english_pob_choice: Cush
  chosen_spanish: Cush
  alternatives_spanish:
  - Etiopía
  lexicon: HALOT
  rationale: Se conserva el nombre propio como transliteración, siguiendo el valor de topónimo/pueblo del hebreo. “Etiopía” sería una equivalencia interpretativa más explicativa, pero menos transparente respecto de la forma מקור/hebrea.
- source_word: עָצְמָהּ
  english_pob_choice: was her strength
  chosen_spanish: era su fuerza
  alternatives_spanish:
  - era tu fuerza
  - era poderosa para ella
  lexicon: HALOT
  rationale: El sufijo femenino singular de 3.ª persona se preserva con “su”, manteniendo la referencia femenina del contexto. “Era su fuerza” refleja con naturalidad la construcción posesiva y no armoniza indebidamente con el cambio posterior a 2.ª persona.
- source_word: וּמִצְרַיִם
  english_pob_choice: and Egypt
  chosen_spanish: y Egipto
  alternatives_spanish:
  - y la tierra de Egipto
  lexicon: HALOT
  rationale: Nombre propio claro y directo; “Egipto” corresponde al uso normal en español bíblico sin añadir elementos no presentes en el hebreo.
- source_word: וְאֵין קֵצֶה
  english_pob_choice: without end
  chosen_spanish: sin fin
  alternatives_spanish:
  - no tenía fin
  - sin límite
  lexicon: HALOT
  rationale: La expresión hebrea es idiomática e indica inmensidad o innumerabilidad. “Sin fin” conserva la compactación del giro y funciona de manera natural en español.
- source_word: פּוּט
  english_pob_choice: Put
  chosen_spanish: Put
  alternatives_spanish:
  - Phut
  lexicon: HALOT
  rationale: Se translitera el nombre propio de forma directa. “Phut” responde a una tradición inglesa más antigua, pero es menos transparente para el lector en español.
- source_word: וְלוּבִים
  english_pob_choice: the Libyans
  chosen_spanish: los libios
  alternatives_spanish:
  - Lubim
  lexicon: HALOT
  rationale: El etnónimo probablemente designa pueblos libios; en español, “los libios” comunica mejor el referente histórico-geográfico que una transliteración desnuda.
- source_word: הָיוּ
  english_pob_choice: were
  chosen_spanish: fueron
  alternatives_spanish:
  - eran
  - estuvieron
  lexicon: HALOT
  rationale: El verbo copulativo en pasado se vierte aquí con un pretérito simple que fluye bien en español y mantiene la relación de pertenencia/participación en la oración.
- source_word: בְּעֶזְרָתֵךְ
  english_pob_choice: among your helpers
  chosen_spanish: entre tus ayudantes
  alternatives_spanish:
  - como tus ayudantes
  - en tu ayuda
  lexicon: HALOT
  rationale: La preposición ב con עזרה y sufijo femenino singular se entiende mejor en contexto como pertenencia al grupo de apoyo. “Entre tus ayudantes” conserva el sentido relacional y el vocativo femenino implícito en el hebreo.
theological_decisions:
- issue: Cambio de persona dentro del versículo
  english_pob_reading: Cush was her strength... Put and the Libyans were among your helpers.
  chosen_spanish_reading: Cush era su fuerza... Put y los libios fueron entre tus ayudantes.
  alternative_spanish_readings:
  - Cush era tu fuerza...
  - '...fueron tus ayudantes.'
  rationale: Se conserva la transición del hebreo entre 3.ª persona femenina singular (“su”) y 2.ª persona femenina singular (“tus”), sin suavizarla. Eso mantiene la tensión textual documentada por la POB y evita armonizar artificialmente la referencia.
  doctrine_reference: Fidelidad textual y mantenimiento de tensiones gramaticales del original
- issue: Identificación de los pueblos aliados
  english_pob_reading: Put and the Libyans
  chosen_spanish_reading: Put y los libios
  alternative_spanish_readings:
  - Put y Lubim
  - Phut y los libios
  rationale: Se privilegia claridad histórica en español con el etnónimo común “libios”, mientras se preserva “Put” como nombre propio transliterado. No se introduce una identificación doctrinal; solo se refleja el referente étnico probable.
  doctrine_reference: Onomástica bíblica y equivalencia étnica conservadora
translation_notes:
  revision_awareness: 'Coincido con el último pase revisado y con el informe de alta concordancia: no se requieren cambios sustantivos respecto del audit trail inglés. La decisión principal es conservar en español la alternancia de persona y la onomástica directa, con una equivalencia natural pero controlada.'
  spanish_consistency_notes:
  - Se mantiene “Yahvé” por defecto en el proyecto, aunque este versículo no lo contiene.
  - “Put” se deja transliterado de forma consistente con la decisión inglesa.
  - “libios” se usa como etnónimo natural en español y no como interpretación expansiva.
  - Se preserva la tensión gramatical entre “su” y “tus” mediante el pie de nota, no mediante armonización en el cuerpo del texto.
