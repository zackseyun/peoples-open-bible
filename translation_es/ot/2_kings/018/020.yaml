translation:
  language: es
  text: 'Tú dices[a]: «¡Solo una palabra de los labios!». El consejo y la fuerza son para la guerra. Ahora, ¿en quién has confiado, que te has rebelado contra mí?'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Has dicho: “¡Solo una palabra de los labios!”». El hebreo es sintácticamente compacto y admite más de una lectura en la primera cláusula.'
    reason: alternative_reading
lexical_decisions:
- source_word: אָמַרְתָּ
  english_pob_choice: You say
  chosen_spanish: Tú dices
  alternatives_spanish:
  - Tú has dicho
  lexicon: HALOT
  rationale: El perfecto qal de 2ms puede presentarse en español como presente directo en discurso amenazante o de desafío, igual que en el inglés POB. «Tú dices» suena natural en una acusación inmediata y conserva la vivacidad retórica.
- source_word: אַךְ
  english_pob_choice: only
  chosen_spanish: solo
  alternatives_spanish:
  - solamente
  - meramente
  lexicon: HALOT
  rationale: Aquí la partícula limita la expresión siguiente. «Solo» comunica con claridad la restricción y mantiene el tono breve del hebreo.
- source_word: דְּבַר שְׂפָתַיִם
  english_pob_choice: a word of the lips
  chosen_spanish: una palabra de labios
  alternatives_spanish:
  - meras palabras
  - palabras vacías
  lexicon: HALOT
  rationale: Se conserva la imagen hebrea de forma bastante literal. «De labios» mantiene la metáfora y evita aplanarla en una paráfrasis más explicativa.
- source_word: עֵצָה
  english_pob_choice: counsel
  chosen_spanish: el consejo
  alternatives_spanish:
  - el plan
  - la estrategia
  lexicon: HALOT
  rationale: En contexto militar, עֵצָה puede ser consejo, plan o estrategia. «Consejo» preserva bien el rango semántico y la construcción paralela con «la fuerza».
- source_word: וּגְבוּרָה
  english_pob_choice: strength
  chosen_spanish: la fuerza
  alternatives_spanish:
  - el poder
  - el valor
  - la valentía
  lexicon: HALOT
  rationale: En un contexto de guerra, גְבוּרָה remite a capacidad o poder efectivo. «Fuerza» es natural en español y conserva la idea de aptitud militar.
- source_word: לַמִּלְחָמָה
  english_pob_choice: for war
  chosen_spanish: para la guerra
  alternatives_spanish:
  - para el combate
  - para la batalla
  lexicon: HALOT
  rationale: «Para la guerra» reproduce de modo directo la función de la frase y conserva la amplitud del término hebreo.
- source_word: עַתָּה
  english_pob_choice: Now
  chosen_spanish: Ahora
  alternatives_spanish:
  - Y ahora
  - Pues ahora
  lexicon: HALOT
  rationale: Marca el giro retórico hacia la pregunta desafiante. «Ahora» es suficiente y natural en español.
- source_word: עַל מִי
  english_pob_choice: in whom
  chosen_spanish: ¿en quién?
  alternatives_spanish:
  - ¿sobre quién?
  - ¿en quién has puesto tu confianza?
  lexicon: HALOT
  rationale: Con בטח, el español idiomático usa «confiar en». «¿En quién?» refleja esa colocación sin perder la relación con el hebreo, que usa עַל.
- source_word: בָטַחְתָּ
  english_pob_choice: have you trusted
  chosen_spanish: has confiado
  alternatives_spanish:
  - confiaste
  - has puesto tu confianza
  lexicon: HALOT
  rationale: El perfecto en la pregunta retórica se puede expresar en español con presente perfecto para resaltar el fundamento de la rebelión. «Has confiado» mantiene esa fuerza.
- source_word: מָרַדְתָּ בִּי
  english_pob_choice: you have rebelled against me
  chosen_spanish: te hayas rebelado contra mí
  alternatives_spanish:
  - te rebelaste contra mí
  - te hayas sublevado contra mí
  lexicon: HALOT
  rationale: מרד con ב indica rebelión contra una autoridad. «Rebelarte contra mí» es el equivalente claro y natural; aquí se usa subjuntivo por la dependencia de «para que» en la cláusula final, sin cambiar el contenido semántico.
theological_decisions:
- issue: Matiz de la pregunta retórica sobre confianza y rebelión
  english_pob_reading: Now in whom have you trusted, that you have rebelled against me?
  chosen_spanish_reading: Ahora, ¿en quién has confiado, para que te hayas rebelado contra mí?
  alternative_spanish_readings:
  - Ahora, ¿en quién confiabas, para que te rebelaras contra mí?
  - Ahora, ¿en quién has puesto tu confianza, para que te hayas rebelado contra mí?
  rationale: El hebreo une la confianza previa con el acto de rebelión como base de la acusación. El español mantiene esa relación causal con «para que», preservando la lógica retórica sin introducir una explicación doctrinal ajena al texto.
  doctrine_reference: 2 Ki 18:20; cf. el uso bíblico de la confianza en Yahvé frente a alianzas humanas
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión inglesa más reciente, que prefirió una apertura más literal («Only a word of the lips!») sin expandirla a «It is only...». La versión española sigue esa decisión, manteniendo la frase nominal breve y el tono de desafío. También se conservó la ambigüedad sintáctica de la cláusula inicial mediante una nota alternativa.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como término por defecto para el nombre divino en el proyecto, pero en este versículo el texto no lo menciona explícitamente.
  - Se eligió «confiado en» en lugar de un calco como «confiado sobre» para respetar el español natural sin perder la relación con el hebreo עַל.
  - Se preservó la imagen «palabra de labios» porque el inglés POB también evitó una paráfrasis totalmente idiomática como «meras palabras».
