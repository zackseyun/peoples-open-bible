  text: עַתָּ֣ה מִ/קָּר֗וֹב אֶשְׁפּ֤וֹךְ חֲמָתִ/י֙ עָלַ֔יִ/ךְ וְ/כִלֵּיתִ֤י אַפִּ/י֙ בָּ֔/ךְ וּ/שְׁפַטְתִּ֖י/ךְ כִּ/דְרָכָ֑יִ/ךְ וְ/נָתַתִּ֣י עָלַ֔יִ/ךְ אֵ֖ת כָּל תּוֹעֲבוֹתָֽיִ/ךְ־׃
base_translation:
  language: en
  yaml_path: translation/ot/ezekiel/007/008.yaml
  text: Now[a], soon I will pour out my wrath on you, and I will spend my anger against you; I will judge you according to your ways[b], and I will bring all your abominations upon you.
  footnotes:
  - marker: a
    text: Or 'shortly' or 'in a little while'; the Hebrew expression denotes imminent judgment.
    reason: lexical_alternative
  - marker: b
    text: Or 'I will exhaust my anger on you.' The Hebrew idiom means that God's anger will run its full course against the city.
    reason: lexical_alternative
