translation:
  language: es
  text: La piedra que desecharon los edificadores ha llegado a ser la piedra angular[a][b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literalmente, «la cabeza de la esquina».
    reason: lexical_alternative
  - marker: b
    text: Este versículo es citado después en el Nuevo Testamento con referencia al Mesías (p. ej., Mt. 21:42; Hch. 4:11; 1 Pe. 2:7).
    reason: cross_reference
lexical_decisions:
- source_word: אֶבֶן
  english_pob_choice: stone
  chosen_spanish: piedra
  alternatives_spanish:
  - roca
  lexicon: HALOT
  rationale: אֶבֶן denota una piedra común; «piedra» es el equivalente natural en español y conserva la metáfora sin sobredimensionarla.
- source_word: מָאֲסוּ
  english_pob_choice: rejected
  chosen_spanish: desecharon
  alternatives_spanish:
  - rechazaron
  - despreciaron
  lexicon: HALOT
  rationale: El verbo expresa rechazo deliberado. «Desecharon» comunica la acción de apartar o descartar y encaja bien con la imagen de construcción; «rechazaron» también es posible, pero suena un poco más abstracto.
- source_word: הַבּוֹנִים
  english_pob_choice: the builders
  chosen_spanish: los constructores
  alternatives_spanish:
  - los que construyen
  - los albañiles
  lexicon: HALOT
  rationale: El participio de בנה se refiere a quienes construyen. «Constructores» es claro y natural en español; «albañiles» sería demasiado específico y «los que construyen» más literal pero menos fluido.
- source_word: הָיְתָה
  english_pob_choice: has become
  chosen_spanish: ha llegado a ser
  alternatives_spanish:
  - se ha convertido en
  - vino a ser
  lexicon: HALOT
  rationale: El perfecto hebreo expresa un estado resultante. «Ha llegado a ser» conserva esa परिणación sin sonar forzado en español; mantiene la idea de cambio de condición.
- source_word: לְרֹאשׁ פִּנָּה
  english_pob_choice: the cornerstone
  chosen_spanish: la piedra angular
  alternatives_spanish:
  - la piedra principal de la esquina
  - la piedra de ángulo
  lexicon: HALOT
  rationale: La expresión es literalmente «cabeza de esquina». «Piedra angular» es la equivalencia española más estable y comprensible para esta metáfora arquitectónica; evita un calco duro y mantiene el sentido de pieza principal.
theological_decisions:
- issue: Aplicación mesiánica posterior del versículo
  english_pob_reading: Retain the architectural metaphor in its plain sense without importing explicit messianic interpretation into the main text.
  chosen_spanish_reading: Mantener la metáfora arquitectónica en su sentido llano, sin introducir en el texto principal una lectura mesiánica explícita.
  alternative_spanish_readings:
  - Una redacción cristológica explícita a la luz de las citas del NT
  - Añadir Mesías/Cristo en el cuerpo principal
  rationale: El hebreo presenta primero una imagen de inversión y vindicación. La traducción debe respetar esa referencia primaria y no resolver en el texto principal la aplicación doctrinal posterior; esa relación puede quedar en nota.
  doctrine_reference: Primacía del sentido del texto fuente; tensión canónica preservada entre sentido histórico y uso neotestamentario.
translation_notes:
  revision_awareness: 'El borrador sigue de cerca el paquete fuente hebreo y el auditorio inglés de POB: mantiene la metáfora de construcción, evita una resolución cristológica en el cuerpo principal y conserva la nota de equivalencia literal para לְרֹאשׁ פִּנָּה. No se detectaron revisiones previas aplicadas en el registro fuente.'
  spanish_consistency_notes:
  - Se usa «piedra» para אֶבֶן y «piedra angular» para לְרֹאשׁ פִּנָּה, manteniendo la imagen arquitectónica sin sobreinterpretarla.
  - Se eligió el plural masculino inclusivo «los constructores» para הַבּוֹנִים, en línea con el valor participial colectivo del hebreo.
  - «Ha llegado a ser» refleja el estado resultante del perfecto hebreo sin forzar un simple pasado narrativo.
  - 'La nota b conserva la tensión teológica del texto: el versículo es literal en su contexto y a la vez tiene una recepción mesiánica posterior en el canon cristiano.'
