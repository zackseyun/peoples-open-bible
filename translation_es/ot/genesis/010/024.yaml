translation:
  language: es
  text: Arpacsad[a] engendró a Sélaj, y Sélaj engendró a Éber.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Muchas versiones tradicionales en español usan ''Arfaxad'' y ''Salah'' aquí, reflejando formas influidas por la tradición griega; el texto principal sigue las formas hebreas del versículo: ''Arpacsad'' y ''Sélaj''.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְ/אַרְפַּכְשַׁד
  english_pob_choice: Arpachshad / Arpachshad
  chosen_spanish: Arpajsad
  alternatives_spanish:
  - Arfaxad
  - Arpachshad
  lexicon: HALOT
  rationale: Se conserva la forma hebrea del nombre propio en una transliteración española cercana a la pronunciación y al consonantismo hebreo. Se evita la forma tradicional influida por la tradición griega/inglesa, porque el texto base privilegia la forma hebrea.
- source_word: יָלַד
  english_pob_choice: fathered
  chosen_spanish: engendró
  alternatives_spanish:
  - fue padre de
  - procreó
  lexicon: HALOT
  rationale: En genealogías, el verbo expresa la paternidad generativa. 'Engendró' comunica bien la relación genealógica en español bíblico moderno y evita tanto el arcaísmo de 'engendró' como una paráfrasis demasiado moderna; aun así, conserva la fuerza semítica del verbo.
- source_word: שָׁלַח / שֶׁלַח
  english_pob_choice: Shelah
  chosen_spanish: Sélaj
  alternatives_spanish:
  - Séla
  - Salah
  - Shelah
  lexicon: HALOT
  rationale: Se mantiene el nombre propio según la forma hebrea, pero adaptado a la ortografía española con acento para señalar la sílaba tónica. Se evita la forma tradicional 'Salah' porque depende de una tradición transliterada distinta y no refleja tan directamente la forma hebrea de este versículo.
- source_word: עֵבֶר
  english_pob_choice: Eber
  chosen_spanish: Éber
  alternatives_spanish:
  - Eber
  - Heber
  lexicon: HALOT
  rationale: Se conserva el nombre propio con transliteración directa del hebreo y acento gráfico español para facilitar la lectura. 'Heber' es una forma tradicional menos ligada al hebreo consonántico; 'Éber' es clara y coherente con la primacía de la forma original.
theological_decisions:
- issue: Tratamiento de los nombres genealógicos con formas tradicionales frente a transliteración hebrea
  english_pob_reading: The main text follows the Hebrew forms 'Arpachshad' and 'Shelah.'
  chosen_spanish_reading: 'La línea principal sigue formas transliteradas desde el hebreo: Arpajsad, Sélaj y Éber.'
  alternative_spanish_readings:
  - Arfaxad, Salah y Heber
  - Arpachshad, Shelah y Eber
  rationale: 'No hay una cuestión doctrinal, pero sí una decisión editorial-teológica sobre la transparencia del texto: se privilegia la forma hebrea frente a la tradición eclesiástica o grecolatina, manteniendo auditable la relación con el original.'
  doctrine_reference: Principio de transparencia textual y primacía del texto fuente
translation_notes:
  revision_awareness: El texto inglés auditado no muestra cambios de revisión sustantivos; se mantiene la decisión principal de seguir las formas hebreas frente a las tradicionales, sin ajustes respecto al pasaje base.
  spanish_consistency_notes:
  - Se emplea 'engendró' de manera uniforme para el verbo genealógico hebreo.
  - Los nombres propios se transliteran con criterio consistente y con acento gráfico cuando ayuda a la lectura en español.
  - La nota al pie solo acompaña la pareja de nombres donde el POB inglés documenta una alternativa tradicional.
