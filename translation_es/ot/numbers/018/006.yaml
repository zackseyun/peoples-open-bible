translation:
  language: es
  text: Y yo, he aquí, he tomado a sus hermanos los levitas de entre los hijos de Israel[a], dados a ustedes como un don, dados a Yahvé, para desempeñar el servicio de la tienda de reunión.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O “de entre los israelitas”. El hebreo dice literalmente “de entre los hijos de Israel”.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַאֲנִי
  english_pob_choice: And I
  chosen_spanish: Y yo
  alternatives_spanish:
  - Y en cuanto a mí
  - Y yo, por mi parte
  lexicon: HALOT
  rationale: Mantiene la conjunción y el pronombre enfático de apertura. En español, añadir yo conserva el énfasis sin sonar forzado.
- source_word: הִנֵּה
  english_pob_choice: behold
  chosen_spanish: he aquí
  alternatives_spanish:
  - mirad
  - ciertamente
  lexicon: HALOT
  rationale: Reproduce la fuerza deíctica y solemne del hebreo con una forma bíblica pero aún clara en español.
- source_word: לָקַחְתִּי
  english_pob_choice: I have taken
  chosen_spanish: he tomado
  alternatives_spanish:
  - tomé
  - he escogido
  lexicon: HALOT
  rationale: El perfecto hebreo se expresa bien con pretérito perfecto compuesto para indicar una acción con relevancia vigente. 'Escogido' sería más interpretativo que לקח.
- source_word: אֲחֵיכֶם
  english_pob_choice: your brothers
  chosen_spanish: vuestros hermanos
  alternatives_spanish:
  - vuestros parientes
  - vuestros compatriotas
  lexicon: HALOT
  rationale: Conserva el parentesco fraternal del original, que en contexto tribal es kinship language y no hermanazgo literal.
- source_word: הַלְוִיִּם
  english_pob_choice: the Levites
  chosen_spanish: los levitas
  alternatives_spanish:
  - los hijos de Leví
  lexicon: HALOT
  rationale: Designación tribal estándar en español; 'levitas' es claro y preciso.
- source_word: מִתּוֹךְ בְּנֵי יִשְׂרָאֵל
  english_pob_choice: from among the sons of Israel
  chosen_spanish: de entre los hijos de Israel
  alternatives_spanish:
  - de entre los israelitas
  - de entre el pueblo de Israel
  lexicon: HALOT
  rationale: Preserva la forma masculina plural del hebreo y la separación desde el conjunto mayor del pueblo. 'Hijos de Israel' sigue de cerca el original y mantiene el matiz genealógico.
- source_word: לָכֶם
  english_pob_choice: to you
  chosen_spanish: para vosotros
  alternatives_spanish:
  - para ustedes
  - a vosotros
  lexicon: HALOT
  rationale: El dativo de beneficio/destino se expresa naturalmente con 'para'. El plural mantiene la referencia a Aarón y sus hijos.
- source_word: מַתָּנָה
  english_pob_choice: as a gift
  chosen_spanish: como dádiva
  alternatives_spanish:
  - como regalo
  - como don
  lexicon: HALOT
  rationale: '''Dádiva'' comunica el carácter formal y cultual del obsequio mejor que ''regalo'', evitando una tonalidad demasiado coloquial.'
- source_word: נְתֻנִים
  english_pob_choice: given
  chosen_spanish: dados
  alternatives_spanish:
  - entregados
  - otorgados
  lexicon: HALOT
  rationale: Conserva el participio pasivo y el juego léxico con 'dádiva'. 'Dados a Yahvé' mantiene la relación de dedicación y entrega.
- source_word: לַֽ/יהוָה
  english_pob_choice: to Yahweh
  chosen_spanish: a Yahvé
  alternatives_spanish:
  - para Yahvé
  lexicon: HALOT
  rationale: Sigue el default del proyecto para el nombre divino. 'A Yahvé' reproduce mejor el valor relacional del hebreo que una perífrasis de sustitución.
- source_word: לַעֲבֹד אֶת עֲבֹדַת
  english_pob_choice: to perform the service
  chosen_spanish: para desempeñar el servicio
  alternatives_spanish:
  - para realizar el servicio
  - para servir en el servicio
  lexicon: HALOT
  rationale: '''Desempeñar el servicio'' transmite con dignidad la idea de ejecutar una tarea cultual. Evita el pleonasmo excesivo sin perder la relación verbo-sustantivo.'
- source_word: אֹהֶל מוֹעֵד
  english_pob_choice: the tent of meeting
  chosen_spanish: el tabernáculo de reunión
  alternatives_spanish:
  - la tienda de reunión
  - la tienda del encuentro
  lexicon: HALOT
  rationale: '''Tabernáculo de reunión'' es la forma más reconocible y eclesial en español para אֹהֶל מוֹעֵד, sin abandonar el sentido funcional de lugar de encuentro.'
theological_decisions:
- issue: Nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: El texto hebreo usa el Tetragrámaton de forma directa. Siguiendo el estándar del proyecto, se preserva el nombre propio divino como 'Yahvé' en lugar de una sustitución reverencial.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Phrasis of בְּנֵי יִשְׂרָאֵל
  english_pob_reading: sons of Israel
  chosen_spanish_reading: hijos de Israel
  alternative_spanish_readings:
  - israelitas
  - pueblo de Israel
  rationale: Se conserva la forma masculina genérica del hebreo, que es a la vez genealógica y corporativa. En español, 'hijos de Israel' es fiel y comprensible.
  doctrine_reference: DOCTRINE.md Translation philosophy §4
translation_notes:
  revision_awareness: 'He revisado el audit trail inglés y la corrección previa: la nota sobre מִתּוֹךְ בְּנֵי יִשְׂרָאֵל se mantiene como alternativa válida, pero ahora el marcador [a] aparece anclado en el texto español. También se conserva la actualización de ''perform the service'' mediante ''desempeñar el servicio'', buscando naturalidad formal sin perder la repetición cultual del hebreo.'
  spanish_consistency_notes:
  - Se mantiene Yahvé de manera consistente con el término del proyecto para יְהוָה.
  - '''Hijos de Israel'' conserva la forma hebrea masculina y debe usarse con coherencia en pasajes paralelos cuando el contexto lo requiera.'
  - '''Tabernáculo de reunión'' es preferido aquí por consistencia bíblico-litúrgica; si un contexto posterior exige mayor literalidad, puede evaluarse ''tienda de reunión''.'
  - Se evita 'siervo' para עבד; aquí el campo semántico es cultual y de desempeño de servicio, no de esclavitud personal.
