translation:
  language: es
  text: El remanente de Jacob estará en medio de muchos pueblos como rocío de Yahvé[a], como chubascos sobre la hierba, que no esperan a un hombre ni aguardan a los seres humanos[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘que no esperan a un hombre, ni aguardan a los hijos de hombre’. Los verbos hebreos pueden llevar la idea de esperar o de tener esperanza; la línea enfatiza que el rocío y la lluvia vienen sin mediación humana.
    reason: lexical_alternative
  - marker: b
    text: Hebreo ‘hijos de hombre’, una expresión hebrea para seres humanos.
    reason: lexical_alternative
lexical_decisions:
- source_word: שְׁאֵרִית
  english_pob_choice: the remnant
  chosen_spanish: el remanente
  alternatives_spanish:
  - el resto
  - la supervivencia
  lexicon: HALOT
  rationale: ‘Remanente’ es el término profético establecido para שְׁאֵרִית y conserva la idea de un grupo sobreviviente con carga teológica. ‘Resto’ sería más genérico y menos técnico.
- source_word: יַעֲקֹב
  english_pob_choice: Jacob
  chosen_spanish: Jacob
  alternatives_spanish:
  - Israel
  lexicon: HALOT
  rationale: El hebreo nombra explícitamente a Jacob; mantener el nombre conserva el matiz del texto fuente y no sustituye una designación bíblica por otra.
- source_word: בְּקֶרֶב עַמִּים רַבִּים
  english_pob_choice: among many peoples
  chosen_spanish: en medio de muchos pueblos
  alternatives_spanish:
  - entre muchos pueblos
  - en el corazón de muchos pueblos
  lexicon: HALOT
  rationale: ‘En medio de’ reproduce con claridad בקרב y sugiere la presencia intercalada; ‘pueblos’ refleja mejor עמים en este contexto que ‘naciones’, por ser grupos humanos más que estados.
- source_word: כְּטַל מֵאֵת יְהוָה
  english_pob_choice: like dew from Yahweh
  chosen_spanish: como rocío de Yahvé
  alternatives_spanish:
  - como rocío de Yahvé,
  - como rocío procedente de Yahvé
  lexicon: HALOT
  rationale: 'Se sigue el mandato terminológico del proyecto: יְהוָה se vierte ‘Yahvé’. ‘Rocío’ es el equivalente natural de טַל; la preposición implícita de procedencia queda clara en español por el contexto del símil.'
- source_word: כִּרְבִיבִים עֲלֵי עֵשֶׂב
  english_pob_choice: like showers upon the grass
  chosen_spanish: como lluvias sobre la hierba
  alternatives_spanish:
  - como chaparrones sobre la hierba
  - como lluvias sobre el pasto
  lexicon: HALOT
  rationale: רְבִיבִים son lluvias/copiosas precipitaciones; ‘lluvias’ mantiene el sentido amplio sin exagerar. ‘Hierba’ conserva עֵשֶׂב con un término concreto y bíblicamente sobrio.
- source_word: לֹא יְקַוֶּה לְאִישׁ
  english_pob_choice: which do not wait for a man
  chosen_spanish: que no esperan a un hombre
  alternatives_spanish:
  - que no aguardan a un hombre
  - que no esperan al hombre
  lexicon: HALOT
  rationale: קוה admite ‘esperar’ y ‘esperar con esperanza’; aquí el símil meteorológico pide la idea de no depender de la acción humana. Se evita una traducción demasiado interpretativa.
- source_word: וְלֹא יְיַחֵל לִבְנֵי אָדָם
  english_pob_choice: or delay for the sons of man
  chosen_spanish: ni aguardan a los hijos de hombre
  alternatives_spanish:
  - ni esperan a los hijos de hombre
  - ni esperan a los seres humanos
  lexicon: HALOT
  rationale: Se conserva el paralelismo con יְקַוֶּה usando ‘aguardan/esperan’. ‘Hijos de hombre’ mantiene la expresión hebrea בני אדם y su tono representativo humano.
- source_word: אָדָם
  english_pob_choice: man
  chosen_spanish: hombre
  alternatives_spanish:
  - ser humano
  - humanidad
  lexicon: HALOT
  rationale: La forma singular mantiene el contraste hebreo con el plural ‘hijos de hombre’. ‘Hombre’ funciona en español como término representativo de la humanidad sin borrar el paralelo original.
theological_decisions:
- issue: Nombre divino en יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - SEÑOR
  rationale: El proyecto fija ‘Yahvé’ para el Tetragrama. Se evita ‘SEÑOR’ como sustituto de ocultamiento; la forma ‘Yahvé’ preserva el nombre del pacto y la trazabilidad al hebreo.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Alcance del símil del rocío y las lluvias
  english_pob_reading: The clause refers to the dew/showers image, emphasizing divine action not dependent on human agency.
  chosen_spanish_reading: La cláusula relativa se entiende referida al rocío y a las lluvias, subrayando que vienen de Dios y no dependen de agencia humana.
  alternative_spanish_readings:
  - Podría referirse al remanente de Jacob como actuando independientemente de apoyo humano.
  - Podría leerse como una afirmación más general sobre la independencia del remanente.
  rationale: La proximidad sintáctica favorece que ‘que no esperan...’ describa el rocío y las lluvias. El español mantiene así la metáfora agrícola y la tensión teológica sin desplazar el referente.
  doctrine_reference: Preserve theological tension rather than resolve it
- issue: Imágenes plurales con verbo relativo
  english_pob_reading: do not wait / delay
  chosen_spanish_reading: no esperan / ni aguardan
  alternative_spanish_readings:
  - no espera / ni aguarda
  - no esperan / ni demoran
  rationale: En español, el plural concuerda naturalmente con ‘rocío’ y ‘lluvias’ entendidos como imágenes coordinadas; ‘aguardan’ mantiene el valor semántico de יחל sin introducir la idea secundaria de ‘demorar’.
  doctrine_reference: Consistencia sintáctica y semántica del paralelismo hebreo
translation_notes:
  revision_awareness: El borrador sigue la revisión más reciente del audit trail al coordinar el verbo relativo en plural con las imágenes coordinadas ‘rocío’ y ‘lluvias’, manteniendo además el nombre divino como ‘Yahvé’ según la política española del proyecto. Se incorporó el matiz de no dependencia humana sin forzar el referente más allá del antecedente más cercano.
  spanish_consistency_notes:
  - Se usa sistemáticamente ‘Yahvé’ para יְהוָה en el texto principal.
  - ‘Remanente’ conserva el término profético estándar de שְׁאֵרִית.
  - Se mantiene ‘hijos de hombre’ en la nota para conservar la expresión hebrea y explicar su sentido colectivo.
  - La puntuación sigue el paralelismo poético con coma antes de la relativa final.
