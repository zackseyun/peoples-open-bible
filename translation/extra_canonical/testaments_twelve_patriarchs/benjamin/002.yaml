translation:
  text: '1 And when we went down into Egypt[a], Joseph my brother recognized me and said to me, “They smeared your tunic with blood and said, ‘See whether this is your son’s tunic.’”

    2 And he said to me, “Yes, brother. For when the Ishmaelites took me, one of them stripped me of my tunic and gave me a loincloth; and after flogging me, he told me to run.

    3 And while he was going away to hide my garment, a lion met him and killed him.

    4 So his companions, being afraid, sold me to others of their company.

    5 Thus Joseph did not lie in saying these things; for he wanted to hide from me the deeds of our brothers.

    6 And he called his brothers to himself and said,

    7 ‘Do not tell my father what you did to me, but speak in this way, just as I explained it to Benjamin.

    8 And let such thoughts be in you[b][c][d], and let not the words come…’'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Some witnesses read more explicitly, “They sent it and said, ‘See whether this is your son’s tunic.’”
    reason: textual_variant
    anchor_ref: '2:1'
  - marker: d
    text: Other witnesses phrase the event differently, but all preserve the sense that the man handling Joseph's garment was killed by a wild beast, commonly a lion.
    reason: textual_variant
    anchor_ref: '2:3'
  - marker: c
    text: Some manuscripts read that they sold him to Ishmaelites; others, as here, to other traders of their company.
    reason: textual_variant
    anchor_ref: '2:4'
  - marker: b
    text: The Greek text breaks off here. The unfinished sentence has been left incomplete rather than reconstructed.
    reason: textual_variant
    anchor_ref: '2:8'
lexical_decisions:
- source_word: ἐγνώρισέ με
  chosen: recognized me
  alternatives:
  - made himself known to me
  - knew me
  lexicon: LSJ
  rationale: In context Joseph identifies Benjamin on arrival in Egypt. 'Recognized me' is the most natural English for personal identification without importing the more reflexive sense 'made himself known.'
- source_word: ἔφυραν
  chosen: smeared
  alternatives:
  - mixed
  - besmeared
  - stained
  lexicon: LSJ
  rationale: The verb literally means to mix or knead, but with blood on a garment the contextual sense is to smear or daub. 'Smeared' preserves the physical vividness.
- source_word: χιτών
  chosen: tunic
  alternatives:
  - coat
  - garment
  - robe
  lexicon: LSJ
  rationale: '''Tunic'' is a standard, concrete rendering for χιτών and avoids the traditional but potentially misleading ''coat.'''
- source_word: περίζωμα
  chosen: loincloth
  alternatives:
  - waistcloth
  - girdle
  lexicon: LSJ
  rationale: The term denotes a cloth worn around the loins. 'Loincloth' is clear and concrete in modern English.
- source_word: φραγελλώσας
  chosen: after flogging me
  alternatives:
  - after scourging me
  - after whipping me
  lexicon: LSJ
  rationale: The participle describes physical beating. 'Flogging' is strong, readable English and preserves the brutality.
- source_word: τρέχειν
  chosen: to run
  alternatives:
  - run
  lexicon: LSJ
  rationale: Infinitive after εἶπε is naturally rendered 'told me to run.'
- source_word: ὑπήντησεν αὐτῷ λέων
  chosen: a lion met him
  alternatives:
  - a lion came upon him
  - a lion encountered him
  lexicon: LSJ
  rationale: The idiom is vivid and narrative. 'Met him' keeps the simple force of the Greek before the killing action.
- source_word: ἀνεῖλεν
  chosen: killed
  alternatives:
  - slew
  - destroyed
  lexicon: LSJ
  rationale: '''Killed'' is direct and readable; ''slew'' would sound archaic in this translation philosophy.'
- source_word: μέτοχοι
  chosen: companions
  alternatives:
  - associates
  - partners
  lexicon: LSJ
  rationale: Refers to the man's fellows in the trading group. 'Companions' reads naturally in narrative context.
- source_word: διαπωλοῦσί με
  chosen: sold me
  alternatives:
  - traded me away
  - disposed of me by sale
  lexicon: LSJ
  rationale: The compound verb intensifies commercial sale, but plain 'sold me' best fits English narrative while preserving the core meaning.
- source_word: τὰ ἔργα τῶν ἀδελφῶν
  chosen: the deeds of our brothers
  alternatives:
  - the actions of our brothers
  - what our brothers had done
  lexicon: LSJ
  rationale: ἔργα here points to concrete acts. 'Deeds' preserves moral weight and testamentary tone.
- source_word: ἐξηγησάμην
  chosen: I explained
  alternatives:
  - I related
  - I set forth
  lexicon: LSJ
  rationale: The verb indicates recounting or explaining. 'Explained' is clear and fits Joseph's instruction.
- source_word: ἔννοιαι
  chosen: thoughts
  alternatives:
  - intentions
  - mindsets
  lexicon: LSJ
  rationale: The noun concerns inward dispositions. 'Thoughts' is broad enough, while still allowing the paraenetic force of inner moral orientation.
