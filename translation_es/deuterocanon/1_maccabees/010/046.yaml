translation:
  language: es
  text: Pero cuando Jonatán y el pueblo oyeron estas palabras[a], no las creyeron ni las aceptaron, porque recordaron la gran maldad que había hecho en Israel[b], y cómo los había oprimido con mucha dureza.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'no confiaron en ellas ni las recibieron'. El griego distingue entre no creer las palabras y no aceptarlas o recibirlas favorablemente.
    reason: lexical_alternative
  - marker: b
    text: O 'la gran maldad que había hecho contra Israel'. El griego dice literalmente 'en Israel', lo cual puede entenderse como acciones realizadas dentro de Israel o como males hechos contra Israel como pueblo.
    reason: alternative_reading
lexical_decisions:
- source_word: οὐκ ἐπίστευσαν
  english_pob_choice: they did not believe
  chosen_spanish: no les creyeron
  alternatives_spanish:
  - no confiaron en ellas
  - no dieron crédito a ellas
  lexicon: BDAG
  rationale: En este contexto narrativo, el verbo expresa que no dieron crédito al mensaje. En español, 'creer' con objeto pronominal directo comunica bien la falta de credibilidad sin perder naturalidad.
- source_word: ἐπεδέξαντο
  english_pob_choice: accept
  chosen_spanish: las aceptaron
  alternatives_spanish:
  - las recibieron
  - las acogieron
  lexicon: LSJ
  rationale: La distinción entre no creer y no aceptar se conserva mejor con un segundo verbo de recepción. 'Aceptar' expresa la recepción favorable del mensaje o propuesta.
- source_word: ἐμνήσθησαν
  english_pob_choice: they remembered
  chosen_spanish: recordaron
  alternatives_spanish:
  - trajeron a la memoria
  - se acordaron
  lexicon: BDAG
  rationale: '''Recordaron'' es una forma natural y directa en español moderno. Mantiene el valor causal: lo que recordaron explica por qué no aceptaron el mensaje.'
- source_word: τῆς κακίας τῆς μεγάλης
  english_pob_choice: the great evil
  chosen_spanish: la gran maldad
  alternatives_spanish:
  - el gran mal
  - la gran maldad
  - la gran malicia
  lexicon: LSJ
  rationale: '''Kakía'' puede abarcar maldad, perversidad o daño grave. ''Maldad'' preserva el peso moral y narrativo sin restringir indebidamente el sentido a un solo matiz.'
- source_word: ἧς ἐποίησεν ἐν Ἰσραήλ
  english_pob_choice: that he had done in Israel
  chosen_spanish: que había hecho en Israel
  alternatives_spanish:
  - que había hecho contra Israel
  - que había hecho entre Israel
  lexicon: LSJ
  rationale: Se conserva la formulación más cercana al griego 'en Israel', que el contexto puede entender como actos cometidos dentro de Israel o que repercutieron sobre Israel como pueblo. No se fija 'contra Israel' en el texto principal para no cerrar la ambigüedad documentada.
- source_word: ἔθλιψεν αὐτοὺς σφόδρα
  english_pob_choice: he had oppressed them severely
  chosen_spanish: los había oprimido con mucha dureza
  alternatives_spanish:
  - los había afligido severamente
  - los había oprimido gravemente
  lexicon: BDAG
  rationale: '''Oprimir'' recoge bien el peso político y el daño sostenido del verbo. ''Con mucha dureza'' traduce el intensificador σφόδρα de manera natural en español, preservando la intensidad sin sonar forzado.'
theological_decisions:
- issue: Referente singular del agresor implícito
  english_pob_reading: Rendered as singular 'he' to match the Greek verbs and the immediate narrative reference to the sender of the message.
  chosen_spanish_reading: Se mantiene un referente singular implícito en 'había hecho' y 'los había oprimido'.
  alternative_spanish_readings:
  - usar un plural implícito ('habían hecho' / 'los habían oprimido') si se leyera corporativamente el trasfondo político
  rationale: El griego usa formas singulares en la cláusula relativa y en el verbo siguiente. La traducción conserva ese referente singular sin introducir una lectura corporativa que el texto no marca explícitamente.
  doctrine_reference: Coherencia gramatical con el griego; no aplica una doctrina específica.
translation_notes:
  revision_awareness: 'La redacción sigue el texto griego de Swete 1909 y el audit trail inglés con sus dos distinciones léxicas principales: οὐκ ἐπίστευσαν / ἐπεδέξαντο y la ambigüedad de ἐν Ἰσραήλ. Se conserva además la revisión final inglesa que suavizó la coordinación de la última cláusula; en español se expresa con ''y cómo los había oprimido con mucha dureza'' para mantener naturalidad y paralelismo.'
  spanish_consistency_notes:
  - Se usa 'Yahvé' para el nombre divino en el proyecto, pero este versículo no lo contiene.
  - Se mantiene el nombre 'Jonatán' conforme al uso español habitual y al audit trail inglés.
  - Se evita 'siervo' u otro término no pertinente; el pasaje trata de recepción del mensaje y memoria de agravios.
  - '''Maldad'' se eligió como equivalente amplio de κακία; si en el contexto editorial se prefiriera ''mal'', deberá justificarse por consistencia local, no por este verso en sí.'
