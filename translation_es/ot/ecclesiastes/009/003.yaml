    rationale: Esto rompe la correspondencia exigida entre marcador y palabra/frase relevante, y puede confundir al lector sobre qué elemento textual está siendo comentado.
  - severity: high
    issue: Falta una nota para la alternativa léxica de מִקְרֶה (‘evento’ / ‘lo mismo les sucede a todos’).
    rationale: El audit trail inglés preserva explícitamente esa alternativa; la revisión española debe conservarla también, especialmente porque ‘suerte’ no agota todo el campo semántico.
  - severity: medium
