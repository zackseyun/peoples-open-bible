  glossary_alignment: 'No hay conflictos con la terminología doctrinal principal del proyecto. La decisión ''herrumbre'' para חֶלְאָתָהּ es defendible como equivalente contextual de la incrustación/corrosión del recipiente, aunque algo más concreta que ''corrosión''. La principal desviación no es glosarial sino gramatical: debe mantenerse la 3ª persona femenina personificada.'
