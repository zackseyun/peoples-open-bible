review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura del hebreo: conjunción inicial, relación genealógica, identificación de Bilha como sierva de Raquel y los dos nombres finales. Sin embargo, la nota alternativa debilita la fuerza léxica al usar «sirvienta» como alternativa principal, cuando el inglés POB documenta «maidservant» y el hebreo שִׁפְחָה apunta más claramente a una sierva/esclava de bajo estatus. Conviene ajustar la nota para preservar mejor el rango semántico documentado.'
  spanish_quality_summary: 'El español es claro y natural para un listado genealógico. «Y los hijos de Bila, la sierva de Raquel: Dan y Neftalí» suena bien y es legible. La puntuación es adecuada. La principal mejora necesaria está en la nota, no en el cuerpo del versículo.'
  glossary_alignment: No hay términos del glosario mayor en juego salvo la sensibilidad de estatus servil. «Sierva» en el texto principal es aceptable aquí como equivalente contextual de שִׁפְחָה, siempre que la nota conserve la alternativa «criada/sierva/esclava» con cuidado. Los nombres propios «Bila», «Raquel», «Dan» y «Neftalí» son aceptables en español bíblico.
  issues:
  - severity: medium
    issue: La nota al pie usa «la sirvienta de Raquel» como alternativa.
    rationale: El inglés POB documenta «maidservant» como alternativa y explica una mujer de menor estatus, incluso con posible sentido de esclava. «Sirvienta» en español puede sonar doméstico/moderno y no comunica tan bien el trasfondo social-jurídico del hebreo.
  - severity: low
    issue: La explicación de la nota dice «una esclava».
    rationale: Mejor «esclava» sin artículo en esta explicación general, para sonar más idiomático y léxicamente limpio en español.
  revised_spanish_text: 'Y los hijos de Bila[a], la sierva de Raquel: Dan y Neftalí.'
  revised_footnotes:
  - marker: a
    text: O «la criada de Raquel». El término hebreo denota a una mujer de condición servil inferior; en algunos contextos puede implicar el sentido de esclava.
    reason: lexical_alternative
  revision_rationale: Se conserva el texto principal, que es fiel y natural, y se corrige únicamente la nota para alinearla mejor con la justificación léxica del inglés POB y con un español más preciso sobre el estatus social de שִׁפְחָה.
