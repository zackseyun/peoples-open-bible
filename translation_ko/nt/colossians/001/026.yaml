translation:
  language: ko
  text: 이는 영원[a] 전부터, 또한 여러 세대로부터 감추어졌던 비밀입니다 — 그러나 이제 그분의 성도들에게 나타났습니다.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 헬라어 αἰῶνες는 「영원」보다는 「시대들」을 가리키므로 「영원 전부터」는 의미 보강이다. 직역하면 「시대들로부터」.
    reason: lexical_alternative
lexical_decisions:
- source_word: μυστήριον
  english_pob_choice: mystery
  chosen_korean: 비밀
  alternatives_korean:
  - 비의
  - 신비
  lexicon: BDAG
  rationale: 글로사리 기본값. 바울의 「비밀」은 한때 감추어졌다가 이제 드러난 신적 계획을 가리킨다.
- source_word: ἀποκεκρυμμένον
  english_pob_choice: hidden
  chosen_korean: 감추어졌던
  alternatives_korean:
  - 숨겨진
  - 가려져 있던
  lexicon: BDAG
  rationale: 완료 수동 분사. 선행 행위로부터 결과된 상태를 「~던」으로 옮긴다.
- source_word: ἀπὸ τῶν αἰώνων καὶ ἀπὸ τῶν γενεῶν
  english_pob_choice: from the ages and from the generations
  chosen_korean: 영원 전부터, 또한 여러 세대로부터
  alternatives_korean:
  - 시대들로부터 또 세대들로부터
  - 옛 시대들로부터 모든 세대로부터
  lexicon: BDAG
  rationale: 한국어 자연성을 위해 「영원 전부터」와 「여러 세대로부터」로 옮긴다. 「시대들」 직역은 각주로 보존.
- source_word: νῦν δὲ ἐφανερώθη
  english_pob_choice: but now revealed
  chosen_korean: 그러나 이제 ... 나타났습니다
  alternatives_korean:
  - 그러나 지금은 드러났습니다
  lexicon: BDAG
  rationale: 강한 대조. 부정과거 수동 ἐφανερώθη를 「나타났습니다」로 옮긴다.
- source_word: τοῖς ἁγίοις αὐτοῦ
  english_pob_choice: to his saints
  chosen_korean: 그분의 성도들에게
  alternatives_korean:
  - 그분의 거룩한 자들에게
  lexicon: BDAG
  rationale: 글로사리 기본 「성도」를 사용한다.
