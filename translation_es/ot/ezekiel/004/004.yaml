review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue de cerca el hebreo y el rastro de auditoría inglés: mantiene el mandato de recostarse sobre el lado izquierdo, conserva «la casa de Israel», refleja la repetición de עָוֹן con nota léxica apropiada, y preserva la idea de llevar/cargar la iniquidad como acto simbólico sin imponer una lectura expiatoria. Sin embargo, hay un desajuste significativo en el referente del pronombre final: el hebreo עֲוֺנָם es plural («su/de ellos»), y el inglés POB lo explicita como «their iniquity». El español «su iniquidad» puede funcionar colectivamente, pero aquí introduce ambigüedad innecesaria y pierde la fuerza plural explícita del sufijo.'
  spanish_quality_summary: El español es generalmente claro y digno. «Acuéstate» y «pon» son naturales, aunque «llevarás» es algo menos preciso que «cargarás» o «llevarás» para נשׂא; aun así es aceptable. El mayor problema de legibilidad/fidelidad es «su iniquidad», que en español puede sonar singular posesivo sin dejar claro que corresponde a «la de ellos». Cambiarlo a «la iniquidad de ellos» o «la iniquidad de ellos/las de ellos» mejora fidelidad; la opción más natural y formal es «la iniquidad de ellos».
  glossary_alignment: 'No hay conflicto con la terminología del proyecto: no aparecen Yahvé, Mesías, etc. «Iniquidad» concuerda con la decisión POB para עָוֹן y la nota conserva las alternativas «culpa» y «castigo por la iniquidad». «La casa de Israel» también está bien alineado con la formulación corporativa del hebreo.'
  issues:
  - severity: medium
    issue: El pronombre final «su iniquidad» no refleja con suficiente claridad el sufijo plural hebreo עֲוֺנָם.
    rationale: Aunque «su» puede ser colectivo en español, aquí el hebreo marca plural explícito («de ellos»), y el inglés auditado preserva «their». En este contexto es mejor evitar ambigüedad y traducir «la iniquidad de ellos».
  - severity: low
    issue: La nota al pie está anclada solo al final, aunque el comentario léxico se aplica a ambas ocurrencias de עָוֹן.
    rationale: No es incorrecto, porque la nota misma aclara «en ambos casos», pero un anclaje en la primera ocurrencia suele bastar mejor estilísticamente. No obstante, no es necesario cambiarlo si se mantiene un único marcador.
  revised_spanish_text: Y tú, acuéstate sobre tu lado izquierdo, y pon la iniquidad de la casa de Israel sobre él; por el número de los días que te acuestes sobre él, llevarás la iniquidad de ellos.[a]
  revised_footnotes:
  - marker: a
    text: O «culpa» o «castigo por la iniquidad» para עָוֹן en ambos casos; el término puede abarcar el pecado mismo, su culpa o su consecuencia.
    reason: lexical_alternative
  revision_rationale: Se ajusta el último sintagma a «la iniquidad de ellos» para reflejar con mayor claridad el sufijo plural hebreo עֲוֺנָם y alinearse mejor con el inglés auditado («their iniquity»), sin perder la naturalidad del español ni alterar la tensión semántica preservada por «iniquidad».
