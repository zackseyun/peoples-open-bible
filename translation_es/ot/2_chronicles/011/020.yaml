revisions:
- from: Después de ella[a], tomó a Maacá, la hija de Absalón, y ella le dio a luz a Abías, Atai, Zizá y Seloomit.
  to: 'Después de ella[a], tomó a Maacá, la hija de Absalón, y le dio hijos: Abías, Atai, Zizá y Seloomit.'
  rationale: Se conserva la fidelidad al hebreo y al POB inglés, incluida la nota sobre 'hija de Absalón', pero se corrige una formulación española poco natural. 'Y le dio hijos' expresa idiomáticamente que ella le dio a luz esos hijos, manteniendo el sentido de וַתֵּלֶד לוֹ sin la torpeza de 'y ella le dio a luz a'.
