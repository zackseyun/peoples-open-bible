translation:
  language: es
  text: que no tiene[a] jefe, oficial ni gobernante,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «líder, funcionario o gobernante».
    reason: lexical_alternative
lexical_decisions:
- source_word: אֲשֶׁר
  english_pob_choice: which
  chosen_spanish: el cual
  alternatives_spanish:
  - que
  - el que
  lexicon: HALOT
  rationale: El relativo introduce la cláusula que describe a la hormiga del versículo anterior. En español, «el cual» conserva con naturalidad el antecedente no personal y mantiene un registro sobrio y bíblico sin sonar forzado.
- source_word: אֵין לָהּ
  english_pob_choice: has no
  chosen_spanish: no tiene
  alternatives_spanish:
  - no hay para ella
  - no posee
  lexicon: HALOT
  rationale: 'La construcción existencial con ל y sufijo pronominal se expresa de manera más natural en español con posesión: «no tiene». Conserva el sentido de carencia sin añadir elementos ajenos al hebreo.'
- source_word: קָצִין
  english_pob_choice: chief
  chosen_spanish: jefe
  alternatives_spanish:
  - líder
  - caudillo
  - capitán
  lexicon: HALOT
  rationale: קָצִין designa a un jefe o dirigente. «Jefe» comunica bien la idea de autoridad primaria en una serie de tres términos y evita confundirlo con el siguiente término administrativo.
- source_word: שֹׁטֵר
  english_pob_choice: officer
  chosen_spanish: oficial
  alternatives_spanish:
  - funcionario
  - agente
  - supervisor
  lexicon: HALOT
  rationale: שֹׁטֵר suele referirse a un funcionario o encargado administrativo. «Oficial» mantiene la diferencia con «jefe» y «gobernante», y resulta comprensible en español contemporáneo.
- source_word: וּמֹשֵׁל
  english_pob_choice: ruler
  chosen_spanish: gobernante
  alternatives_spanish:
  - gobernador
  - quien gobierna
  - señor
  lexicon: HALOT
  rationale: מֹשֵׁל nombra a quien gobierna o ejerce dominio. «Gobernante» comunica ese papel con claridad y conserva el paralelismo de la lista de autoridades.
translation_notes:
  revision_awareness: Se siguió la revisión más reciente del inglés POB, que eliminó cualquier añadido no presente en el hebreo; por eso la frase final en español no incluye expansión explicativa, y la lista de tres cargos se mantiene como una enumeración breve y directa.
  spanish_consistency_notes:
  - Se preserva la serie de tres términos de autoridad sin fusionarlos ni añadir relaciones no marcadas en el hebreo.
  - Se evitó «SEÑOR» o lenguaje equivalente porque el texto no contiene el nombre divino ni una cita de YHWH.
  - «Gobernante» se eligió para mantener el valor de מֹשֵׁל sin volverlo demasiado interpretativo.
