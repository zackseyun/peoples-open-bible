base_translation:
  language: en
  yaml_path: translation/ot/jeremiah/047/005.yaml
  text: Baldness has come upon Gaza[a]; Ashkelon has been silenced, the remnant of their valley[c][b]. How long will you gash yourself?
  footnotes:
  - marker: a
    text: Or 'Ashkelon is cut off' / 'Ashkelon has perished.' The Hebrew verb can carry the sense of being silenced, stilled, or destroyed.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'the remnant of their valley.' Some interpreters, following ancient versions or a different vocalization, understand this phrase differently, including 'the remnant of the Anakim.'
    reason: alternative_reading
  - marker: c
    text: Self-gashing was a customary act of mourning in the ancient Near East.
    reason: cultural_note
