translation:
  language: es
  text: Y ofrecieron sacrificio conforme a la ley sobre el nuevo altar para holocaustos[a] que habían hecho.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘sobre el altar nuevo de los holocaustos que habían hecho’.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀνήνεγκαν
  english_pob_choice: offered
  chosen_spanish: ofrecieron
  alternatives_spanish:
  - presentaron
  - ofrecieron en sacrificio
  lexicon: LSJ
  rationale: En contexto sacrificial, ἀναφέρω significa ‘ofrecer’ o ‘ofrecer en sacrificio’. ‘Ofrecieron’ conserva el acto cultual de manera natural en español sin añadir perífrasis innecesaria.
- source_word: θυσίαν
  english_pob_choice: sacrifice
  chosen_spanish: sacrificio
  alternatives_spanish:
  - ofrenda
  lexicon: LSJ
  rationale: El sustantivo θυσία designa el acto o la víctima sacrificial. ‘Sacrificio’ mantiene el registro cultual explícito que exige el versículo.
- source_word: κατὰ τὸν νόμον
  english_pob_choice: according to the law
  chosen_spanish: conforme a la ley
  alternatives_spanish:
  - según la ley
  - de acuerdo con la ley
  lexicon: LSJ
  rationale: ‘Conforme a la ley’ comunica con claridad la conformidad con la norma mosaica y suena natural en español bíblico contemporáneo.
- source_word: θυσιαστήριον τῶν ὁλοκαυτωμάτων
  english_pob_choice: altar of burnt offering
  chosen_spanish: altar del holocausto
  alternatives_spanish:
  - altar de los holocaustos
  - altar de los sacrificios quemados
  lexicon: LSJ
  rationale: El genitivo especifica el altar destinado a los holocaustos. ‘Altar del holocausto’ es una fórmula breve y reconocible en español bíblico; además, conserva la relación cultual sin diluirla en lenguaje genérico.
- source_word: τὸ καινόν
  english_pob_choice: new
  chosen_spanish: nuevo
  alternatives_spanish:
  - recién hecho
  - recién construido
  lexicon: LSJ
  rationale: El adjetivo marca el contraste con el altar anterior profanado. ‘Nuevo’ reproduce directamente esa marca sin sobreinterpretarla.
- source_word: ὃ ἐποίησαν
  english_pob_choice: that they had made
  chosen_spanish: que habían hecho
  alternatives_spanish:
  - que habían construido
  - que hicieron
  lexicon: LSJ
  rationale: ἐποίησαν puede abarcar la acción de hacer o construir. ‘Habían hecho’ sigue de cerca el griego y evita imponer ‘construido’ más de lo que el texto explicita.
theological_decisions:
- issue: Terminología sacrificial explícita
  english_pob_reading: 'Retain explicit sacrificial language: ''offered sacrifice'' and ''altar of burnt offering.'''
  chosen_spanish_reading: 'Mantener el lenguaje sacrificial explícito: ‘ofrecieron sacrificio’ y ‘altar del holocausto’.'
  alternative_spanish_readings:
  - ‘hicieron una ofrenda’
  - ‘sobre el altar nuevo’ sin especificar el holocausto
  rationale: El versículo trata de la restauración del culto legítimo. Traducirlo con lenguaje genérico borraría su énfasis legal y sacerdotal.
  doctrine_reference: Translation philosophy §§1, 5, 6
translation_notes:
  revision_awareness: 'La revisión inglesa más reciente no introdujo cambios; el consenso crítico señalado es de alta concordancia. Por eso se conserva la solución central: sacrificio explícito, ley explícita y altar nuevo especificado como altar del holocausto.'
  spanish_consistency_notes:
  - Se mantiene ‘ley’ para νόμος en sentido mosaico, sin sustituirlo por ‘Torá’ porque el contexto inmediato en español leído por iglesia se beneficia de claridad directa.
  - Se conserva ‘holocausto’ como término cultual tradicional del altar, no como referencia moderna al genocidio; aquí su sentido es técnico-litúrgico.
  - El orden de la frase sigue el griego en lo esencial, pero se adapta a un español natural con ‘sobre el altar nuevo del holocausto’ para evitar una construcción pesada.
