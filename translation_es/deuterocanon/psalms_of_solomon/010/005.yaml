translation:
  language: es
  text: Porque el testimonio es en la ley del pacto eterno[a]; el testimonio del Señor es sobre los caminos de los hombres en visitación.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Porque el testimonio en la ley del pacto eterno es el testimonio del Señor acerca de los caminos de la gente cuando visita».'
    reason: alternative_reading
lexical_decisions:
- source_word: μαρτυρία
  english_pob_choice: testimony
  chosen_spanish: testimonio
  alternatives_spanish:
  - testigo
  - testimonio
  lexicon: BDAG
  rationale: «Testimonio» conserva el valor declarativo y jurídico-covenantal del término, especialmente junto a «ley» y «pacto». «Testigo» desplazaría el sentido hacia la persona, no hacia el contenido declarado.
- source_word: ἐν νόμῳ διαθήκης αἰωνίου
  english_pob_choice: in the law of the everlasting covenant
  chosen_spanish: en la ley del pacto eterno
  alternatives_spanish:
  - en la ley del pacto perdurable
  - en la ley del pacto eterno
  lexicon: BDAG
  rationale: Se mantiene la estructura preposicional y la relación entre «ley» y «pacto». «Eterno» traduce naturalmente αἰωνίου en español bíblico; «perdurable» sería posible pero menos directo.
- source_word: Κυρίου
  english_pob_choice: Lord
  chosen_spanish: Señor
  alternatives_spanish:
  - Señor
  - Dueño
  lexicon: BDAG
  rationale: Aquí κύριος funciona como título divino en contexto de pacto. En español, «Señor» es el equivalente natural y reverente, sin perder la referencia teológica.
- source_word: ἐπὶ ὁδοὺς ἀνθρώπων
  english_pob_choice: upon the ways of men
  chosen_spanish: sobre los caminos de los hombres
  alternatives_spanish:
  - sobre los caminos humanos
  - acerca de los caminos de los hombres
  lexicon: BDAG
  rationale: Se preserva el valor espacial/relacional de ἐπί con acusativo, sin forzar una paráfrasis como «acerca de». «Caminos de los hombres» mantiene el paralelo semítico y la amplitud genérica de ἀνθρώπων.
- source_word: ἐν ἐπισκοπῇ
  english_pob_choice: in visitation
  chosen_spanish: en visitación
  alternatives_spanish:
  - en visita
  - en inspección
  - cuando visita
  lexicon: BDAG
  rationale: «Visitación» conserva la carga técnica y teológica del sustantivo griego, que en la tradición bíblica alude a la visita divina para examinar o juzgar. «Cuando visita» aclararía el sentido, pero perdería la forma nominal y la solemnidad del original.
- source_word: '[implied copula]'
  english_pob_choice: is
  chosen_spanish: está
  alternatives_spanish:
  - es
  - hay
  lexicon: N/A
  rationale: El griego es elíptico. «Está» reproduce con naturalidad el paralelismo locativo de la primera cláusula («está en») y evita endurecer la línea con una copula abstracta donde el español admite una construcción más fluida.
theological_decisions:
- issue: κύριος como título divino en contexto de pacto
  english_pob_reading: Lord
  chosen_spanish_reading: Señor
  alternative_spanish_readings:
  - Dueño
  - Maestro
  rationale: El contexto de pacto y testimonio requiere mantener la lectura teológica de κύριος como título divino, no como simple «dueño» o «maestro». «Señor» es la forma española estándar y reverente para esa referencia.
  doctrine_reference: Divine Name / lordship language in Scripture
- issue: ἐπισκοπή como visita divina de examen/jucio
  english_pob_reading: visitation
  chosen_spanish_reading: visitación
  alternative_spanish_readings:
  - visita
  - inspección
  - supervisión
  rationale: El audit trail del POB rechaza una verbalización que borre la fuerza nominal del término. «Visitación» conserva el matiz de intervención divina, con posible carga de examen o juicio, sin reducirlo a mera observación.
  doctrine_reference: Divine visitation / judgment imagery
translation_notes:
  revision_awareness: 'Se siguió el cierre revisionado del POB inglés que separa dos miembros poéticos: (1) el testimonio está en la ley del pacto eterno; (2) el testimonio del Señor está sobre los caminos de los hombres en visitación. Se evitó la paráfrasis verbal de ἐπισκοπῇ como «cuando visita» para no perder la forma nominal y la densidad teológica del término, conforme a la revisión auditada.'
  spanish_consistency_notes:
  - Se mantuvo «Señor» para κύριος por coherencia con la terminología proyectual para el nombre/título divino.
  - Se eligió «visitación» en vez de «visita» para conservar un registro bíblico digno y la posible connotación de examen o juicio.
  - «Hombres» traduce ἀνθρώπων en sentido genérico de humanidad; no se restringe al sexo masculino.
