revisions:
- from: Recuerda que fuiste esclavo en Egipto[a], y guarda y cumple estos estatutos.
  to: Recuerda que fuiste esclavo en Egipto[a], y guarda y pon en práctica estos estatutos.
  rationale: Se realiza una reparación menor para reflejar con más precisión la pareja legal hebrea «guardar y hacer», evitando que ambos verbos queden demasiado fusionados en «guardar y cumplir». «Pon en práctica» mantiene fidelidad semántica y suena natural en español bíblico contemporáneo.
