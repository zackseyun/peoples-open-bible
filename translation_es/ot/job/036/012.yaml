    text: O «por falta de conocimiento».
    reason: lexical_alternative
  revision_rationale: Se corrige una expresión no idiomática («pasarán por la espada») por una formulación española fiel al sentido de juicio del hebreo («perecerán por la espada»). Además, se mejora la naturalidad de la cláusula final con «sin entendimiento», manteniendo en nota la alternativa causal ya documentada en el audit trail inglés.
