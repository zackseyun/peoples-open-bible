  - Se conserva «Yahvé» conforme al estándar del proyecto para el nombre divino.
  - Se usa «ira» para חֵמָה, manteniendo la intensidad semántica de «wrath».
  - Se opta por un español natural pero cercano al hebreo, evitando una paráfrasis doctrinalmente suavizada.
  - Los plurales españoles en el final reflejan el antecedente colectivo, aunque el hebreo conserve sufijos singulares femeninos.
