translation:
  language: es
  text: Y fueron por el camino hacia Gálgala, y acamparon frente a Mesalot en Arbela, y la capturaron[a], y mataron a muchas personas[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El verbo griego traducido aquí como «la capturaron» (προκατελίβοντο) es raro y difícil; también puede entenderse como «se apoderaron de ella primero» o, en sentido más general, «la arrasaron».
    reason: lexical_alternative
  - marker: b
    text: Literalmente, el griego dice «destruyó muchas vidas de hombres», un giro idiomático que significa que mataron a muchas personas.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐπορεύθησαν
  english_pob_choice: traveled
  chosen_spanish: caminaron
  alternatives_spanish:
  - viajaron
  - marcharon
  lexicon: LSJ
  rationale: El aoristo de πορεύομαι expresa desplazamiento/jornada. «Caminaron» es natural en español y suficientemente amplio para un avance de tipo militar sin añadir más de lo que el griego dice.
- source_word: ὁδὸν τὴν εἰς Γάλγαλα
  english_pob_choice: on the road to Galgala
  chosen_spanish: por el camino hacia Galgala
  alternatives_spanish:
  - en el camino a Galgala
  - por la ruta hacia Galgala
  lexicon: LSJ
  rationale: La construcción con ὁδόν es idiomática para indicar una ruta concreta. «Por el camino hacia» conserva esa concreción en español y suena más natural que una traducción demasiado literal.
- source_word: παρενέβαλον
  english_pob_choice: encamped against
  chosen_spanish: acamparon frente a
  alternatives_spanish:
  - acamparon contra
  - levantaron campamento frente a
  - acamparon ante
  lexicon: LSJ
  rationale: En contexto militar, el verbo indica tomar posición con campamento. La preposición ἐπί con el topónimo sugiere una colocación hostil o de sitio; «frente a» conserva esa orientación sin forzar un término demasiado técnico.
- source_word: Μεσσαλὼθ τὴν ἐν Ἀρβήλοις
  english_pob_choice: Mesaloth in Arbela
  chosen_spanish: Mesalot en Arbela
  alternatives_spanish:
  - Mesalot que está en Arbela
  - Mesalot en la región de Arbela
  lexicon: LSJ
  rationale: El griego identifica una Mesalot concreta asociada con Arbela. La forma breve en aposición comunica bien el lugar y mantiene claridad en español.
- source_word: προκατελίβοντο
  english_pob_choice: captured it
  chosen_spanish: la tomaron
  alternatives_spanish:
  - la capturaron
  - la ocuparon antes
  - se apoderaron de ella
  lexicon: LSJ
  rationale: El verbo compuesto es raro y difícil; el prefijo προ- sugiere acción previa o anticipada. «La tomaron» es la opción española más natural y mantiene la fuerza del acto sin especificar más de lo seguro.
- source_word: ἀπώλεσεν
  english_pob_choice: destroyed
  chosen_spanish: destruyó
  alternatives_spanish:
  - mató
  - acabó con
  - aniquiló
  lexicon: LSJ
  rationale: ἀπόλλυμι puede significar destruir o matar. Dado que el objeto expresa personas/víctimas, «destruyó» conserva la formulación del griego y permite entender el resultado letal.
- source_word: ψυχὰς ἀνθρώπων πολλὰς
  english_pob_choice: many people
  chosen_spanish: muchas vidas de hombres
  alternatives_spanish:
  - muchas personas
  - muchas vidas humanas
  - muchos hombres
  lexicon: LSJ
  rationale: ψυχή aquí funciona como «vida» o «persona»; ἀνθρώπων mantiene el matiz de «de hombres/personas». «Muchas vidas de hombres» preserva la imagen griega y la tensión idiomática del original, en vez de nivelarla demasiado pronto.
theological_decisions:
- issue: Valor de ψυχὰς ἀνθρώπων πολλὰς como idiomático de muertes masivas
  english_pob_reading: destroyed many people
  chosen_spanish_reading: destruyó muchas vidas de hombres
  alternative_spanish_readings:
  - mató a muchas personas
  - destruyó muchas personas
  rationale: El griego usa literalmente «muchas almas/vidas de hombres», un giro idiomático que señala muertes numerosas. Mantener la imagen de «vidas de hombres» deja visible la textura semítica/idiomática del texto y evita suavizar el énfasis.
  doctrine_reference: No aplica; decisión léxica/idiomática sin carga doctrinal directa.
translation_notes:
  revision_awareness: 'El español sigue el marco del último repaso inglés, pero no lo copia mecánicamente: conserva la tensión del verbo raro προκατελίβοντο con una solución prudente y mantiene el idiomatismo de ψυχὰς ἀνθρώπων πολλὰς visible en nota, en lugar de normalizarlo por completo.'
  spanish_consistency_notes:
  - Se mantuvo la transliteración Galgala y Mesalot/Arbela para concordar con el expediente inglés y la tradición editorial del texto base.
  - Se prefirió un español neutro y publicable, con vocabulario militar claro pero sin sobreinterpretar el movimiento como un asedio formal completo.
  - No se introdujo «Cristo», «SEÑOR» ni otros equivalentes teológicos ajenos al versículo.
