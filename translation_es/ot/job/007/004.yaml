    rationale: וְשָׂבַעְתִּי נְדֻדִים es más literalmente «estoy lleno de inquietudes/tossings». «Hastiado» comunica bien la saturación negativa, pero «lleno de inquietud» o similar preserva mejor la forma nominal y evita un giro demasiado coloquial.
  - severity: low
