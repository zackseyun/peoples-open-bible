translation:
  language: es
  text: 'Y Elías le dijo: «No temas. Ve[a] y haz como has dicho. Pero primero hazme de allí una torta pequeña[b] y tráemela[c]; y después haz algo para ti y para tu hijo».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «Ven y haz como has dicho». El hebreo puede traducirse más literalmente como «ven», pero aquí funciona idiomáticamente como una exhortación a proceder.
    reason: lexical_alternative
  - marker: b
    text: O «una pequeña torta». El hebreo עֻגָה puede referirse a una pequeña torta o a un pan horneado.
    reason: lexical_alternative
  - marker: c
    text: O «sácamela». El hebreo de «hacer salir» conserva un matiz de sacar desde el lugar de preparación.
    reason: lexical_alternative
lexical_decisions:
- source_word: אַל תִּירְאִי
  english_pob_choice: Do not fear
  chosen_spanish: No temas
  alternatives_spanish:
  - No tengas miedo
  - No temas ni te asustes
  lexicon: HALOT
  rationale: El hebreo usa una prohibición con ירא; en español bíblico claro y natural, «No temas» conserva el valor directivo y el tono sobrio sin añadir intensidad ajena al texto.
- source_word: בֹּאִי
  english_pob_choice: Go
  chosen_spanish: Ven
  alternatives_spanish:
  - Ve
  - Ven aquí
  lexicon: HALOT
  rationale: Aunque el verbo puede equivaler literalmente a «venir», en esta secuencia funciona como exhortación a proceder con la acción; en español, «Ven» preserva esa fuerza idiomática sin sonar forzado, y mantiene abierta la lectura literal que la POB inglesa anotó.
- source_word: עֲשִׂי כִדְבָרֵךְ
  english_pob_choice: do as you have said
  chosen_spanish: haz como has dicho
  alternatives_spanish:
  - haz conforme a tu palabra
  - haz como dijiste
  lexicon: HALOT
  rationale: «Como has dicho» reproduce el sentido de actuar de acuerdo con lo que ella acaba de expresar, con español natural. «Conforme a tu palabra» es posible, pero más solemne y menos directo.
- source_word: אַךְ
  english_pob_choice: But
  chosen_spanish: Pero
  alternatives_spanish:
  - Solo que
  - Sin embargo
  - Excepto que
  lexicon: HALOT
  rationale: Aquí introduce una restricción temporal frente a lo anterior; «Pero» comunica bien la matización adversativa en español contemporáneo.
- source_word: מִשָּׁם
  english_pob_choice: from there
  chosen_spanish: de allí
  alternatives_spanish:
  - desde allí
  - de ese lugar
  lexicon: HALOT
  rationale: La partícula conserva la referencia espacial a la provisión disponible en el lugar; «de allí» es natural y refleja el matiz local sin explicar en exceso.
- source_word: עֻגָה קְטַנָּה
  english_pob_choice: a small cake
  chosen_spanish: una torta pequeña
  alternatives_spanish:
  - una pequeña torta
  - un pan pequeño
  - una tortita
  lexicon: HALOT
  rationale: עֻגָה puede ser una torta, torta/pan horneado o tortita. «Torta pequeña» ofrece un equivalente amplio y entendible en español, evitando especificar una forma más concreta de la que el hebreo exige.
- source_word: בָרִאשֹׁנָה
  english_pob_choice: first
  chosen_spanish: primero
  alternatives_spanish:
  - en primer lugar
  - antes que nada
  lexicon: HALOT
  rationale: Marca prioridad temporal; «primero» es la forma más directa y fiel en español.
- source_word: וְהוֹצֵאתְ לִי
  english_pob_choice: and bring it out to me
  chosen_spanish: y tráemela
  alternatives_spanish:
  - y sáquela para mí
  - y sácala y dámela
  lexicon: HALOT
  rationale: El hiphil de יצא expresa sacar/traer fuera. En español, «tráemela» comunica naturalmente el movimiento desde el lugar de preparación hacia Elías; la precisión de «sacar» quedaría más pesada y menos idiomática.
- source_word: וְלָךְ וְלִבְנֵךְ תַּעֲשִׂי
  english_pob_choice: make some for yourself and for your son
  chosen_spanish: harás para ti y para tu hijo
  alternatives_spanish:
  - harás también para ti y para tu hijo
  - luego harás para ti y para tu hijo
  lexicon: HALOT
  rationale: El objeto («otra torta») queda implícito desde la cláusula anterior. En español, omitirlo evita introducir una palabra no explícita. «Harás» conserva el futuro/jussivo de la secuencia y el orden posterior.
- source_word: בָּאַחֲרֹנָה
  english_pob_choice: afterward
  chosen_spanish: después
  alternatives_spanish:
  - luego
  - más tarde
  - a continuación
  lexicon: HALOT
  rationale: Expresa la secuencia temporal posterior sin cargar la frase de matices de final definitivo. «Después» mantiene la prioridad marcada por el texto.
theological_decisions:
- issue: Prioridad temporal de la comida de Elías frente a la del hijo y la viuda
  english_pob_reading: Render the temporal priority plainly without softening or moralizing
  chosen_spanish_reading: Expresar con claridad que primero se prepara la porción de Elías y después la de la viuda y su hijo
  alternative_spanish_readings:
  - Suavizar la petición para que no parezca exigencia
  - Reordenar la frase para minimizar la prioridad de Elías
  rationale: El hebreo declara explícitamente la prioridad temporal. La traducción española la conserva sin resolverla interpretativamente ni atenuarla, siguiendo el principio de mantener la tensión del texto.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: 'La revisión inglesa más reciente no introdujo cambios; el criterio de equivalencia óptima se mantiene con alta concordancia textual. La versión española preserva las decisiones auditadas: la posibilidad idiomática de בֹּאִי, el valor temporal de בָרִאשֹׁנָה y la prioridad explícita de la porción de Elías.'
  spanish_consistency_notes:
  - Se usa «Yahvé» como norma del proyecto solo cuando aparece el nombre divino; en este versículo no ocurre.
  - Se prefiere «torta» para עֻגָה como término amplio y comprensible; la nota mantiene la alternativa «pequeña torta».
  - «Ven» reproduce la exhortación idiomática de בֹּאִי, sin forzar una lectura puramente literal de «ir».
  - Se conserva el orden de las cláusulas para reflejar la secuencia hebrea y la prioridad temporal del texto.
