    rationale: El hebreo describe a los profetas dirigiéndose al pueblo; el audit trail inglés también eligió 'to you'. En español, 'que les profetizan' o 'que están profetizando a ustedes' evita una posible lectura de beneficio ('para') y suena más idiomático.
