revisions:
- from: Y las vacas fueron derechas por el camino a Bet-semes[a], por una sola calzada; iban andando, mugiendo mientras iban, y no se desviaron ni a la derecha ni a la izquierda. Y los príncipes de los filisteos iban detrás de ellas hasta el borde de Bet-semes.
  to: Y las vacas siguieron recto por el camino a Bet-semes[a], por una sola calzada; seguían avanzando, mugiendo[b] mientras iban, y no se desviaron ni a la derecha ni a la izquierda. Y los señores[c] de los filisteos iban detrás de ellas hasta el límite de Bet-semes.
  rationale: 'Se ajustó el texto para mejorar la fidelidad al hebreo y al rastro léxico del POB inglés, y para hacerlo más natural en español neutral: ‘siguieron recto’ por וַיִשַּׁרְנָה, ‘seguían avanzando’ por הָלְכוּ הָלוֹךְ, ‘los señores de los filisteos’ por סַרְנֵי פְלִשְׁתִּים, y ‘hasta el límite’ por עַד גְּבוּל. Además, se restauraron las notas significativas presentes en el inglés para el sonido del ganado y para el título político filisteo.'
