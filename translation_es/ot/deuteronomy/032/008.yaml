translation:
  language: es
  text: Cuando el Altísimo dio a las naciones sus heredades[a], cuando separó a los hijos del hombre[b], fijó los límites de los pueblos conforme al número de los hijos de Israel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Los Rollos del Mar Muerto y la Septuaginta leen «hijos de Dios» (o «ángeles de Dios») en lugar de «hijos de Israel».
    reason: textual_variant
  - marker: b
    text: «Los hijos del hombre» es una expresión hebrea para seres humanos o la humanidad.
    reason: lexical_alternative
lexical_decisions:
- source_word: בְּ/הַנְחֵל
  english_pob_choice: when ... gave ... their inheritance
  chosen_spanish: Cuando ... dio ... su herencia
  alternatives_spanish:
  - cuando ... repartió ... la herencia
  - cuando ... asignó ... su herencia
  lexicon: HALOT
  rationale: El infinitivo hifil con prefijo temporal introduce una cláusula de tiempo. En español, «dio ... su herencia» comunica de forma natural el acto de asignar repartiendo entre las naciones, sin perder el valor distributivo del hebreo.
- source_word: עֶלְיוֹן
  english_pob_choice: the Most High
  chosen_spanish: el Altísimo
  alternatives_spanish:
  - el Más Alto
  - el Supremo
  lexicon: HALOT
  rationale: Es un título divino. «El Altísimo» es la forma española establecida y fiel al valor titular del hebreo, sin convertirlo en paráfrasis.
- source_word: גּוֹיִם
  english_pob_choice: the nations
  chosen_spanish: las naciones
  alternatives_spanish:
  - los pueblos
  - las gentes
  lexicon: HALOT
  rationale: Aquí designa a los pueblos/naciones de la tierra. «Las naciones» reproduce bien el referente colectivo y el tono bíblico.
- source_word: בְּ/הַפְרִיד/וֹ
  english_pob_choice: when he separated
  chosen_spanish: cuando separó
  alternatives_spanish:
  - cuando dividió
  - cuando apartó
  lexicon: HALOT
  rationale: El hifil con sufijo de tercera persona singular masculino vuelve a referirse al Altísimo. «Separó» conserva el sentido básico de פרד sin añadir matices no pedidos por el contexto.
- source_word: בְּנֵי אָדָם
  english_pob_choice: the sons of man
  chosen_spanish: los hijos de los hombres
  alternatives_spanish:
  - los hijos del hombre
  - la humanidad
  lexicon: HALOT
  rationale: Se mantiene la estructura masculina y representativa del hebreo. «Hijos de los hombres» es una solución española comprensible y relativamente literal, evitando una neutralización que borre la forma del original.
- source_word: יַצֵּב
  english_pob_choice: he fixed
  chosen_spanish: fijó
  alternatives_spanish:
  - estableció
  - puso
  lexicon: HALOT
  rationale: El hifil de יצב expresa colocar firmemente o establecer. «Fijó» es preciso y natural para límites territoriales.
- source_word: גְּבֻלֹת עַמִּים
  english_pob_choice: the boundaries of the peoples
  chosen_spanish: los límites de los pueblos
  alternatives_spanish:
  - las fronteras de los pueblos
  - los confines de las naciones
  lexicon: HALOT
  rationale: «Límites» funciona bien en español para la delimitación territorial. «Pueblos» mantiene el valor colectivo de עמים sin repetir «naciones» demasiado cerca.
- source_word: לְ/מִסְפַּר
  english_pob_choice: according to the number of
  chosen_spanish: conforme al número de
  alternatives_spanish:
  - según el número de
  - de acuerdo con el número de
  lexicon: HALOT
  rationale: La preposición expresa correspondencia o medida. «Conforme al número de» suena formal y fiel al sentido de ajuste proporcional.
- source_word: בְּנֵי יִשְׂרָאֵל
  english_pob_choice: the sons of Israel
  chosen_spanish: los hijos de Israel
  alternatives_spanish:
  - los hijos de Jacob
  - los israelitas
  lexicon: HALOT
  rationale: El texto masorético dice literalmente «hijos de Israel». Se conserva esa formulación para mantener la transparencia con el hebreo.
theological_decisions:
- issue: Variante textual en la cláusula final
  english_pob_reading: the sons of Israel
  chosen_spanish_reading: los hijos de Israel
  alternative_spanish_readings:
  - los hijos de Dios
  - los ángeles de Dios
  rationale: El hebreo WLC provisto lee בני ישראל, por lo que la redacción principal sigue ese texto. Sin embargo, existe una variante conocida en los Rollos del Mar Muerto y la Septuaginta que apoya «hijos de Dios» / «ángeles de Dios». Para no ocultar esa tensión textual, se preserva en nota.
  doctrine_reference: Principio POB de primacía del texto original y preservación de variantes significativas.
- issue: Expresión antropológica בני אדם
  english_pob_reading: the sons of man
  chosen_spanish_reading: los hijos de los hombres
  alternative_spanish_readings:
  - humankind
  - la humanidad
  rationale: Se mantiene la forma masculina representativa del hebreo en vez de una generalización neutral. La frase española conserva el paralelismo poético y deja abierta la referencia global a la humanidad.
  doctrine_reference: Principio POB de fidelidad morfológica y de no borrar tensiones léxicas del original.
translation_notes:
  revision_awareness: No hay revisiones aplicadas en el expediente más reciente; se mantiene la lectura de alta concordancia y el texto base no requiere ajuste adicional.
  spanish_consistency_notes:
  - Se usa «Altísimo» como título divino natural en español, equivalente a the Most High.
  - Se conserva «hijos de Israel» para seguir el texto hebreo provisto, y la variante textual se documenta aparte.
  - «Hijos de los hombres» mantiene el paralelismo formal del hebreo y la nota aclara su valor idiomático.
  - Se evita introducir «SEÑOR» o «Mesías» porque no corresponden a este versículo.
  - La puntuación sigue el uso español moderno con una sola oración compleja y comas para las cláusulas temporales.
