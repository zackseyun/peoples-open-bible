revisions:
- from: Así Gedeón y los cien hombres que estaban con él llegaron al borde del campamento al comienzo de la vigilia media[a], justo cuando habían puesto a los centinelas[b]; y tocaron las trompetas[c] y rompieron los cántaros que llevaban en las manos.
  to: Así Gedeón y los cien hombres que estaban con él llegaron al borde del campamento al comienzo de la vigilia de en medio[a], justo cuando acababan de poner a los centinelas[b]; y tocaron las trompetas[c] y rompieron los cántaros que llevaban en las manos.
  rationale: Se ajusta la expresión temporal a un español más natural («vigilia de en medio») y se corrige la nota y el verbo de la guardia para reflejar mejor la inmediatez y el énfasis verbal del hebreo, sin alterar el contenido del borrador.
