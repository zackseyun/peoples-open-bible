translation:
  language: es
  text: Entonces el sacerdote tomará un poco del log[a] de aceite y lo verterá en la palma de su propia mano izquierda.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Un «log» era una antigua medida de líquidos.
    reason: cultural_note
lexical_decisions:
- source_word: וְלָקַח
  english_pob_choice: Then ... shall take
  chosen_spanish: Entonces ... tomará
  alternatives_spanish:
  - Y ... tomará
  - Luego ... tomará
  lexicon: HALOT
  rationale: El waw consecutivo continúa la secuencia ritual; en español, «Entonces» transmite con naturalidad el orden prescriptivo sin perder el valor secuencial.
- source_word: הַכֹּהֵן
  english_pob_choice: the priest
  chosen_spanish: el sacerdote
  alternatives_spanish:
  - el sacerdote ritual
  - el cura
  lexicon: HALOT
  rationale: En contexto cultual, כֹּהֵן corresponde a «sacerdote». Mantiene la referencia funcional del rito.
- source_word: מִלֹּג הַשָּׁמֶן
  english_pob_choice: some of the log of oil
  chosen_spanish: un poco del log de aceite
  alternatives_spanish:
  - algo del log de aceite
  - una porción del log de aceite
  - del log de aceite
  lexicon: HALOT
  rationale: מִן expresa una idea partitiva; «un poco de» refleja que se toma una parte del aceite del recipiente/medida. Se conserva «log» por su unidad antigua específica, siguiendo la decisión inglesa de no sustituirla por una equivalencia moderna incierta.
- source_word: לֹג
  english_pob_choice: log
  chosen_spanish: log
  alternatives_spanish:
  - medida de log
  - log-me­dida
  lexicon: HALOT
  rationale: Se translitera la medida antigua para preservar la especificidad cultural y porque no hay equivalente moderno directo y seguro.
- source_word: וְיָצַק
  english_pob_choice: and pour
  chosen_spanish: y lo derramará
  alternatives_spanish:
  - y lo verterá
  - y derramará
  lexicon: HALOT
  rationale: «Derramar» comunica naturalmente el acto de verter aceite en español y conserva el sentido de un movimiento líquido ritual.
- source_word: עַל כַּף
  english_pob_choice: into the palm of
  chosen_spanish: en la palma de
  alternatives_spanish:
  - sobre la palma de
  - en el hueco de
  lexicon: HALOT
  rationale: Aunque עַל es literalmente «sobre/upon», con un líquido que se deposita en la mano abierta el español natural usa «en la palma de» para expresar el destino del vertido sin calcar la preposición hebrea.
- source_word: כַּף
  english_pob_choice: palm
  chosen_spanish: la palma
  alternatives_spanish:
  - la mano
  - el hueco de la mano
  lexicon: HALOT
  rationale: כַּף designa la palma o concavidad de la mano; «palma» conserva el detalle concreto del rito.
- source_word: הַשְּׂמָאלִית
  english_pob_choice: his own left hand
  chosen_spanish: su propia mano izquierda
  alternatives_spanish:
  - la mano izquierda de él
  - su mano izquierda
  lexicon: HALOT
  rationale: La repetición del sujeto en el hebreo implica que es la mano del mismo sacerdote. «Su propia mano izquierda» sigue la revisión inglesa y evita ambigüedad.
theological_decisions:
- issue: Referencia implícita del pronombre posesivo en «su propia mano izquierda»
  english_pob_reading: his own left hand
  chosen_spanish_reading: su propia mano izquierda
  alternative_spanish_readings:
  - la mano izquierda del sacerdote
  - su mano izquierda
  rationale: El hebreo repite el sujeto de manera que la mano pertenece al mismo sacerdote que actúa. Añadir «propia» hace explícita esa referencia sin introducir una interpretación nueva.
  doctrine_reference: Gramática del texto fuente; no implica doctrina adicional.
translation_notes:
  revision_awareness: Esta redacción sigue la revisión del POB inglés que aclaró «his own left hand» para reflejar el sujeto repetido del hebreo. También conserva la medida antigua «log» y el matiz partitivo de מִן.
  spanish_consistency_notes:
  - Se usa «sacerdote» para כֹּהֵן en contexto ritual.
  - Se conserva «log» como unidad antigua, con nota cultural.
  - Se evita una traducción demasiado literal de עַל con «sobre» cuando el español idiomático requiere «en» para el vertido en la palma.
  - «su propia mano izquierda» refleja la repetición del sujeto en el hebreo y la revisión inglesa aprobada.
