translation:
  language: es
  text: 'Así dice Yahvé: «¿Dónde está el certificado de divorcio[a] de su madre[b], con el cual la envié? ¿O a cuál de mis acreedores los vendí a ustedes? Miren: por causa de sus iniquidades ustedes fueron vendidos, y por causa de sus transgresiones su madre fue enviada[c]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'libelo de divorcio'. El hebreo se refiere a un documento legal formal de divorcio.
    reason: lexical_alternative
  - marker: b
    text: La expresión 'su madre' es una metáfora corporativa de Sion/Jerusalén o del pueblo del pacto representado como una madre.
    reason: cultural_note
  - marker: c
    text: O 'fue enviada fuera' o 'fue divorciada'. El hebreo dice literalmente 'fue enviada', en paralelo con la imagen de divorcio en el verso.
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: Sigo el criterio del proyecto para el nombre divino, preservando el valor del Tetragrámaton sin sustituirlo por una convención de ocultamiento.
- source_word: כֹּה אָמַר
  english_pob_choice: Thus says
  chosen_spanish: Así dice
  alternatives_spanish:
  - Así ha dicho
  - Así dice Yahvé
  lexicon: HALOT
  rationale: La fórmula profética en español suena natural como 'Así dice' y mantiene el registro solemne y directo del mensajero.
- source_word: אֵי זֶה
  english_pob_choice: Where is
  chosen_spanish: ¿Dónde está?
  alternatives_spanish:
  - ¿Dónde se halla?
  - ¿Dónde queda?
  lexicon: HALOT
  rationale: La pregunta retórica pide localizar un documento supuesto; '¿Dónde está?' conserva la fuerza idiomática y la naturalidad en español.
- source_word: סֵפֶר כְּרִיתוּת
  english_pob_choice: certificate of divorce
  chosen_spanish: certificado de divorcio
  alternatives_spanish:
  - carta de divorcio
  - libelo de divorcio
  lexicon: HALOT
  rationale: '''Certificado de divorcio'' expresa con claridad el documento legal formal al que se refiere el hebreo, conservando la imagen jurídica del texto.'
- source_word: אִמְּכֶם
  english_pob_choice: your mother
  chosen_spanish: vuestra madre
  alternatives_spanish:
  - su madre
  - la madre de ustedes
  lexicon: HALOT
  rationale: Mantengo el parentesco literal, porque en el verso funciona como metáfora corporativa de Sion/Jerusalén o del pueblo del pacto.
- source_word: שִׁלַּחְתִּיהָ
  english_pob_choice: with which I sent her away
  chosen_spanish: con el cual yo la envié fuera
  alternatives_spanish:
  - con el cual yo la eché
  - con el cual la despedí
  lexicon: HALOT
  rationale: '''Enviar fuera'' conserva el vínculo verbal con el lenguaje del divorcio sin forzar una equivalencia interpretativa más fuerte que el hebreo.'
- source_word: מִנּוֹשַׁי
  english_pob_choice: my creditors
  chosen_spanish: mis acreedores
  alternatives_spanish:
  - mis cobradores
  - los que me prestan
  lexicon: HALOT
  rationale: '''Acreedores'' es la correspondencia española estándar para el plural del sustantivo y mantiene la metáfora económica/jurídica.'
- source_word: אֲשֶׁר מָכַרְתִּי אֶתְכֶם לוֹ
  english_pob_choice: to which of my creditors did I sell you
  chosen_spanish: a cuál de mis acreedores la vendí
  alternatives_spanish:
  - a cuál de mis acreedores los vendí
  - a cuál de mis acreedores os vendí
  lexicon: HALOT
  rationale: El hebreo plantea una pregunta retórica con 'a cuál de mis acreedores'; en español la inversión 'la vendí' reproduce el objeto singular colectivo implícito en 'vuestra madre' como antecedente conceptual de la metáfora de exilio.
- source_word: הֵן
  english_pob_choice: Behold
  chosen_spanish: Mirad
  alternatives_spanish:
  - He aquí
  - Ved
  lexicon: HALOT
  rationale: La exclamación introduce la explicación divina; 'Mirad' funciona en español bíblico contemporáneo como equivalente discursivo claro y solemne.
- source_word: בַּעֲוֺנֹתֵיכֶם
  english_pob_choice: because of your iniquities
  chosen_spanish: por causa de vuestras iniquidades
  alternatives_spanish:
  - a causa de vuestras iniquidades
  - por vuestros pecados
  lexicon: HALOT
  rationale: '''Iniquidades'' preserva el matiz de culpa/torcedura moral del hebreo עָוֹן, y la preposición causal refleja la fuerza explicativa del texto.'
- source_word: נִמְכַּרְתֶּם
  english_pob_choice: you were sold
  chosen_spanish: fuisteis vendidos
  alternatives_spanish:
  - habéis sido vendidos
  - os vendieron
  lexicon: HALOT
  rationale: La voz pasiva del hebreo se mantiene con 'fuisteis vendidos', evitando añadir un sujeto agente que el texto no da.
- source_word: וּבְפִשְׁעֵיכֶם
  english_pob_choice: because of your transgressions
  chosen_spanish: por causa de vuestras transgresiones
  alternatives_spanish:
  - a causa de vuestras rebeliones
  - por vuestros delitos
  lexicon: HALOT
  rationale: '''Transgresiones'' conserva la distinción frente a ''iniquidades'' y mantiene el peso de פֶּשַׁע como rebelión/traspaso del límite.'
- source_word: שֻׁלְּחָה
  english_pob_choice: your mother was sent away
  chosen_spanish: fue enviada fuera
  alternatives_spanish:
  - fue despedida
  - fue divorciada
  lexicon: HALOT
  rationale: La pasiva 'fue enviada fuera' reproduce el verbo de desecho/separación sin sustituirlo por una interpretación ya cerrada como 'divorciada'.
- source_word: אִמְּכֶם
  english_pob_choice: your mother
  chosen_spanish: vuestra madre
  alternatives_spanish:
  - su madre
  - la madre de ustedes
  lexicon: HALOT
  rationale: Repito la misma elección para conservar la cohesión del paralelismo y la metáfora corporativa del verso.
theological_decisions:
- issue: Metáforas de divorcio y esclavitud/deuda aplicadas al juicio de Israel
  english_pob_reading: 'Retain both metaphors literally: divorce imagery (''your mother'') and debt-slavery imagery (''sold you'') as rhetorical denials followed by explanation of exile as caused by the people''s sins.'
  chosen_spanish_reading: 'Conservar literalmente ambas metáforas: la imagen jurídica del divorcio en ''vuestra madre'' y la imagen económica de venta en ''os vendí/fuisteis vendidos'', como negaciones retóricas seguidas de la explicación de que el exilio proviene del pecado del pueblo.'
  alternative_spanish_readings:
  - Generalizar el versículo como una afirmación abstracta de castigo
  - Explicitar en el texto principal que 'vuestra madre' es Sion/Jerusalén
  rationale: 'El hebreo yuxtapone imágenes covenantales muy concretas sin nombrar explícitamente a Sion. Mantenerlas en español evita borrar la tensión retórica: Yahvé niega haber repudiado arbitrariamente ni haber vendido a su pueblo por una deuda real.'
  doctrine_reference: Translation philosophy §§1, 3, 6
- issue: Distinción entre עֲוֺנוֹת y פִשְׁעִים
  english_pob_reading: Differentiate them as 'iniquities' and 'transgressions.'
  chosen_spanish_reading: Distinguirlas como 'iniquidades' y 'transgresiones'.
  alternative_spanish_readings:
  - Traducir ambas como 'pecados'
  - Traducir ambas como 'culpas'
  rationale: El paralelo hebreo usa dos términos relacionados pero no idénticos. Mantener la diferencia evita aplanar la retórica y refleja más transparentemente la textura del texto.
  doctrine_reference: Translation philosophy §5
translation_notes:
  revision_awareness: La versión inglesa más reciente ajustó la segunda pregunta para reflejar con más precisión la sintaxis hebrea ('to which of my creditors did I sell you?') y prefirió 'Behold'. En español, mantengo esa precisión mediante '¿A cuál de mis acreedores la vendí?' junto con 'Mirad' como equivalente solemne de la partícula exclamativa.
  spanish_consistency_notes:
  - Conservo 'Yahvé' para el nombre divino, conforme al estándar del proyecto.
  - Mantengo 'vuestra madre' y no explicito 'Sion/Jerusalén' en el texto principal, dejando esa identificación en la nota teológica implícita del registro.
  - Uso 'iniquidades' / 'transgresiones' para preservar la distinción léxica del hebreo.
  - Prefiero 'envié fuera' y 'fue enviada fuera' para mantener la red verbal de שׁלח en el contexto del divorcio/repudio.
