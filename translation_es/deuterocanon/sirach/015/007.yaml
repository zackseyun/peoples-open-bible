translation:
  language: es
  text: Los hombres falsos[a] no la alcanzarán[b], y los hombres insolentes no la verán.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «hombres de falsedad». El paralelo griego dice «personas insensatas», lo que puede reflejar otro Vorlage o una traducción interpretativa.'
    reason: alternative_reading
  - marker: b
    text: El verbo hebreo es difícil si se lee de manera literal como «guiar»; el paralelo griego apoya el sentido de «alcanzar» o «asir».
    reason: lexical_alternative
lexical_decisions:
- source_word: לֹא יַדְרִיכוּהָ
  english_pob_choice: will not attain her
  chosen_spanish: no la alcanzarán
  alternatives_spanish:
  - no la guiarán
  - no la llegarán a alcanzar
  - no la sobrepasarán
  lexicon: HALOT
  rationale: La forma hebrea es difícil si se toma en el sentido más común de דרך en hifil; el paralelo griego apoya la idea de alcanzar, asir o lograr. En español, «alcanzarán» comunica bien la imposibilidad de llegar a poseer o obtener la Sabiduría sin forzar una imagen de guía que no encaja con el contexto.
- source_word: מְתֵי שָׁוְא
  english_pob_choice: men of falsehood
  chosen_spanish: los hombres de falsedad
  alternatives_spanish:
  - los hombres de vanidad
  - los hombres inútiles
  - los hombres engañosos
  lexicon: HALOT
  rationale: La construcción hebrea expresa literalmente «hombres de...» y שוא puede significar falsedad, vacío o inutilidad. «Hombres de falsedad» conserva el giro idiomático y la lectura moral del hebreo, siguiendo la decisión del POB inglés de mantener ese matiz.
- source_word: וְאַנְשֵׁי זָדוֹן
  english_pob_choice: men of insolence
  chosen_spanish: los hombres de insolencia
  alternatives_spanish:
  - los hombres arrogantes
  - los hombres presuntuosos
  - los hombres malvados
  lexicon: HALOT
  rationale: זדון denota insolencia, soberbia o presunción rebelde. «Insolencia» mantiene la fuerza moral específica del término sin reducirlo a un mero genérico de maldad.
- source_word: לֹא יִרְאוּהָ
  english_pob_choice: will not see her
  chosen_spanish: no la verán
  alternatives_spanish:
  - no la percibirán
  - no la contemplarán
  - no la verán jamás
  lexicon: HALOT
  rationale: El verbo ראה significa «ver» de manera directa. En este contexto sapiencial puede implicar también reconocer o percibir, pero el español simple «verán» reproduce con claridad la forma breve del hebreo y del griego.
theological_decisions:
- issue: Prioridad del hebreo con apoyo del griego en el primer hemistiquio
  english_pob_reading: Follow the Hebrew as primary, but render the difficult verb in light of the Greek parallel as 'attain' rather than a wooden 'guide.'
  chosen_spanish_reading: Seguir el hebreo como base, pero interpretar el verbo difícil a la luz del paralelo griego como «alcanzar» y no como un calco de «guiar».
  alternative_spanish_readings:
  - Los hombres de falsedad no la guiarán
  - Los hombres insensatos no la alcanzarán
  rationale: La política del POB para Sirácida da prioridad al hebreo conservado, pero usa el griego como apoyo real de traducción. Aquí el sentido global trata de la imposibilidad de obtener la Sabiduría, no de conducirla; por eso «alcanzarán» preserva el hebreo y refleja el griego sin ocultar la tensión textual.
  doctrine_reference: 'PHILOSOPHY.md: translate from Hebrew where it survives; use Greek parallel as actual translation input'
- issue: Elección de «falsedad» frente al matiz griego de «insensatez»
  english_pob_reading: Hebrew 'men of falsehood.' The Greek parallel reads 'senseless people,' which may reflect a different Vorlage or an interpretive rendering.
  chosen_spanish_reading: Mantener «falsedad» en el texto principal y no reemplazarlo por «insensatez».
  alternative_spanish_readings:
  - los hombres insensatos
  - los hombres sin entendimiento
  - los hombres necios
  rationale: Dado que el hebreo es el testimonio principal en este verso, conviene conservar su valor léxico. La diferencia con el griego se debe documentar, no armonizarse artificialmente en el cuerpo del texto.
  doctrine_reference: 'Sirach source policy: Hebrew primary, Greek parallel as corroborating witness rather than masking the Hebrew'
translation_notes:
  revision_awareness: El borrador sigue la revisión más reciente indicada como sin cambios y de alta concordancia, sin introducir ajustes textuales adicionales.
  spanish_consistency_notes:
  - Se mantiene «Sabiduría» con mayúscula implícita en el pronombre femenino «la», como en el contexto sapiencial de Sirácida.
  - Se conserva el paralelismo hebreo con dos miembros breves y simétricos.
  - No se usa «SEÑOR» ni terminología eclesiástica no requerida por el verso.
  - La puntuación sigue el español moderno con coma antes del segundo miembro coordinado.
