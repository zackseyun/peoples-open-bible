revisions:
- from: Y fue gobernante sobre todos los reyes, desde el Río[a] hasta la tierra de los filisteos y hasta la frontera de Egipto.
  to: Y gobernó sobre todos los reyes, desde el Río[a] hasta la tierra de los filisteos y hasta la frontera de Egipto.
  rationale: Se reemplaza «Y fue gobernante» por «Y gobernó» para reflejar de forma más fiel e idiomática la construcción hebrea וַיְהִי מוֹשֵׁל y alinearse con la decisión auditada del inglés POB («he ruled»). Se conserva la nota sobre «el Río» y el resto de la formulación geográfica, que ya representaban bien el source.
