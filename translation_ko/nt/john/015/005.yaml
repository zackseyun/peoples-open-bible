source:
  edition: SBLGNT
  text: ἐγώ εἰμι ἡ ἄμπελος, ὑμεῖς τὰ κλήματα. ὁ μένων ἐν ἐμοὶ κἀγὼ ἐν αὐτῷ οὗτος φέρει καρπὸν πολύν, ὅτι χωρὶς ἐμοῦ οὐ δύνασθε ποιεῖν οὐδέν.
base_translation:
  language: en
  yaml_path: translation/nt/john/015/005.yaml
  text: I am the vine[a]; you are the branches. The one who remains in me, and I in him, bears much fruit[b], because apart from me you are not able to do anything.
  footnotes:
  - marker: a
    text: Or 'abides in me.' The Greek verb can also be rendered 'abide,' especially in John, to emphasize ongoing relational continuance.
    reason: lexical_alternative
  - marker: b
    text: Greek 'in him' uses a masculine singular form with representative force; the statement applies generally to any disciple who remains in Jesus.
    reason: lexical_alternative
translation:
  language: ko
  text: 내가 곧 포도나무이고, 여러분은 가지입니다. 내 안에 거하고 나도 그 안에 거하는 사람은 많은 열매를 맺습니다. 나를 떠나서는 여러분이 아무것도 할 수 없기 때문입니다.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 또는 「내 안에 머무르는 사람」. 요한복음의 μένω는 「거하다·머무르다」로 지속적 관계를 강조한다.
    reason: lexical_alternative
  - marker: b
    text: 헬라어 「그 안에」는 남성단수 대표 표현으로, 예수 안에 거하는 모든 제자에게 일반적으로 적용된다.
    reason: lexical_alternative
