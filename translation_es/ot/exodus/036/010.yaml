translation:
  language: es
  text: Unió cinco cortinas una con otra, y las otras[a] cinco cortinas las unió una con otra.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «y cinco cortinas» en la segunda cláusula; «las otras» se suministra en español para dejar claro que se trata de un segundo grupo de cinco.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְחַבֵּר / חִבַּר
  english_pob_choice: joined
  chosen_spanish: unió
  alternatives_spanish:
  - juntó
  - conectó
  - ajustó
  lexicon: HALOT
  rationale: El hebreo חבר expresa unir o conectar; en este contexto de montaje del tabernáculo, «unió» comunica con naturalidad la acción sin añadir un modo de sujeción no explicitado.
- source_word: יְרִיעֹת
  english_pob_choice: curtains
  chosen_spanish: cortinas
  alternatives_spanish:
  - paneles
  - telas
  - lienzos
  lexicon: HALOT
  rationale: En el contexto del tabernáculo, יְרִיעֹת designa grandes paños o colgaduras. «Cortinas» es el equivalente español más claro y tradicional para lectores bíblicos, sin salir del campo semántico del texto.
- source_word: חֲמֵשׁ
  english_pob_choice: five
  chosen_spanish: cinco
  alternatives_spanish:
  - '5'
  lexicon: morphological
  rationale: Número cardinal directo y sin tensión interpretativa.
- source_word: אַחַת אֶל אֶחָת
  english_pob_choice: to one another
  chosen_spanish: una con otra
  alternatives_spanish:
  - una a la otra
  - entre sí
  lexicon: HALOT
  rationale: La expresión hebrea indica unión recíproca dentro de cada grupo. «Una con otra» conserva esa reciprocidad con español natural y evita una sobreinterpretación técnica del tipo de unión.
- source_word: וְחָמֵשׁ יְרִיעֹת
  english_pob_choice: the other five curtains
  chosen_spanish: las otras cinco cortinas
  alternatives_spanish:
  - y cinco cortinas
  - y otras cinco cortinas
  lexicon: HALOT
  rationale: El hebreo repite «y cinco cortinas» sin una palabra equivalente a «las otras»; sin embargo, el paralelismo exige dejar claro que se trata del segundo grupo. «Las otras» es una aclaración de flujo, no una adición de contenido.
translation_notes:
  revision_awareness: El texto inglés auditado añade «the other» en la segunda cláusula para claridad, aunque el hebreo repite simplemente «y cinco cortinas». La versión española sigue esa misma clarificación implícita, manteniendo el paralelismo del original.
  spanish_consistency_notes:
  - Se mantiene el vocabulario del tabernáculo con «cortinas» para יְרִיעֹת, coherente con el contexto constructivo.
  - «Unió... una con otra» preserva el paralelismo idiomático sin forzar una explicación mecánica.
  - La nota explica la clarificación del segundo grupo sin convertirla en parte del texto hebreo explícito.
