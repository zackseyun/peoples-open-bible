id: 1PE.3.8
reference: 1 Peter 3:8
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: Τὸ δὲ τέλος πάντες ὁμόφρονες, συμπαθεῖς, φιλάδελφοι, εὔσπλαγχνοι, ταπεινόφρονες,
base_translation:
  language: en
  yaml_path: translation/nt/1_peter/003/008.yaml
  text: 'Finally, all of you, be like-minded, sympathetic, loving as brothers, tenderhearted, humble-minded,'
translation:
  language: ko
  text: '마지막으로 여러분 모두 한 마음이 되고, 동정심이 있고, 형제자매를 사랑하고, 자비롭고, 겸손한 마음을 품으십시오.'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ὁμόφρονες
  english_pob_choice: like-minded
  chosen_korean: 한 마음이 되고
  alternatives_korean:
  - 같은 생각을 품고
  - 마음을 합하고
  lexicon: BDAG
  rationale: ὁμοφρον의 「같은 생각·마음」을 「한 마음」으로 옮긴다.
- source_word: συμπαθεῖς
  english_pob_choice: sympathetic
  chosen_korean: 동정심이 있고
  alternatives_korean:
  - 함께 아파하고
  - 공감하고
  lexicon: BDAG
  rationale: 「동정」보다 강한 「함께 느낌」이지만, 한국어 「동정심」이 가장 자연스럽다.
- source_word: φιλάδελφοι
  english_pob_choice: loving as brothers
  chosen_korean: 형제자매를 사랑하고
  alternatives_korean:
  - 형제애가 있고
  - 형제처럼 사랑하고
  lexicon: BDAG
  rationale: 1:22의 φιλαδελφία와 같은 어근. 「형제자매」로 포괄성을 살린다.
- source_word: εὔσπλαγχνοι
  english_pob_choice: tenderhearted
  chosen_korean: 자비롭고
  alternatives_korean:
  - 따뜻한 마음을 가지고
  - 긍휼이 많고
  lexicon: BDAG
  rationale: σπλάγχνα(내장→연민)의 어근. 「자비」가 한국어로 자연스럽다.
- source_word: ταπεινόφρονες
  english_pob_choice: humble-minded
  chosen_korean: 겸손한 마음을 품으십시오
  alternatives_korean:
  - 겸손하고
  - 마음을 낮추고
  lexicon: BDAG
  rationale: 5:5의 ταπεινοφροσύνη와 어근 동일. 「겸손한 마음」으로 옮긴다.
