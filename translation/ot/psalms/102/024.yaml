theological_decisions:
- issue: Shift in person between 'his strength' and 'my days'
  chosen_reading: Retain the MT-like third person in the first colon and first person in the second colon
  alternative_readings:
  - 'Read both cola in the first person sense: ''He has afflicted my strength on the way; he has shortened my days'''
  rationale: 'The Hebrew as provided contains a real tension: third person suffix on ''strength'' but first person suffix on ''days.'' Rather than harmonize the verse in the main text, the translation preserves the source-text form and notes the more contextually expected alternative. This follows the principle of preserving textual tension rather than silently resolving it.'
