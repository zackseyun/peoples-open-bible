translation:
  language: es
  text: Y ahora seguimos[a] con todo nuestro corazón, y te tememos, y buscamos tu rostro.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «seguimos tras ti». El griego expresa la idea de ir detrás o adherirse a alguien; «seguimos» la dice de forma natural en español.'
    reason: lexical_alternative
lexical_decisions:
- source_word: καὶ νῦν
  english_pob_choice: And now
  chosen_spanish: Y ahora
  alternatives_spanish:
  - Y en este momento
  - Y ahora mismo
  lexicon: BDAG
  rationale: Conserva la transición temporal e inmediata del griego sin añadir contraste que el texto no exige.
- source_word: ἐξακολουθοῦμεν
  english_pob_choice: we follow after you
  chosen_spanish: seguimos
  alternatives_spanish:
  - seguimos tras ti
  - continuamos siguiéndote
  lexicon: BDAG
  rationale: En español, «seguir» comunica adecuadamente la idea de ir detrás o adherirse a alguien. Se evita una construcción demasiado pesada, manteniendo el sentido de seguimiento continuo que el verbo griego sugiere en contexto.
- source_word: ἐν ὅλῃ καρδίᾳ ἡμῶν
  english_pob_choice: with our whole heart
  chosen_spanish: con todo nuestro corazón
  alternatives_spanish:
  - de todo corazón
  - con nuestro corazón entero
  lexicon: BDAG
  rationale: Expresa la idiomática devoción íntegra del hebraísmo/griego bíblico de forma natural en español, conservando la imagen del «corazón» como centro de lealtad y voluntad.
- source_word: φοβούμεθά σε
  english_pob_choice: we fear you
  chosen_spanish: te tememos
  alternatives_spanish:
  - te reverenciamos
  - estamos en temor de ti
  lexicon: BDAG
  rationale: Se mantiene el verbo «temer» para preservar la tensión teológica del original. «Reverenciamos» suavizaría el lenguaje y reduciría la fuerza lexical de φοβέομαι.
- source_word: ζητοῦμεν τὸ πρόσωπόν σου
  english_pob_choice: we seek your face
  chosen_spanish: buscamos tu rostro
  alternatives_spanish:
  - buscamos tu presencia
  - te buscamos
  lexicon: BDAG
  rationale: «Rostro» conserva la metáfora bíblica literal y su resonancia intertextual. «Presencia» explica el sentido, pero interpreta más de lo que el griego dice de forma directa.
theological_decisions:
- issue: φοβούμεθά σε aplicado a Dios
  english_pob_reading: we fear you
  chosen_spanish_reading: te tememos
  alternative_spanish_readings:
  - te reverenciamos
  - te tememos con reverencia
  rationale: La versión española conserva el lenguaje de temor en vez de reemplazarlo por una formulación más suave. Así se preserva la tensión bíblica entre temor reverente y miedo real, sin resolverla artificialmente.
  doctrine_reference: DOCTRINE.md §Translation philosophy 3
- issue: ζητοῦμεν τὸ πρόσωπόν σου como idiomática de búsqueda divina
  english_pob_reading: we seek your face
  chosen_spanish_reading: buscamos tu rostro
  alternative_spanish_readings:
  - buscamos tu presencia
  rationale: Se preserva la imagen literal en el texto principal, siguiendo el principio de transparencia. La interpretación de «presencia» queda implícita como sentido idiomático posible, sin borrar la metáfora.
  doctrine_reference: DOCTRINE.md §Translation philosophy 1, 6
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión auditada del POB inglés, que ajustó el verbo principal de «continue to follow» a «follow after» para reflejar con mayor precisión ἐξακολουθοῦμεν. La redacción española usa «seguimos» como equivalente natural y suficientemente directo, sin introducir una glosa aspectual no requerida por el griego.
  spanish_consistency_notes:
  - Se mantiene el uso de «Yahvé» solo cuando aparece el nombre divino explícito; aquí no aplica.
  - Se conserva el lenguaje bíblico metafórico de «rostro» para τὸ πρόσωπόν σου.
  - El verbo «temer» se usa de manera deliberada para no diluir el peso teológico del original.
  - 'La cadencia conserva la serie coordinada del griego: ahora / seguimos / tememos / buscamos.'
