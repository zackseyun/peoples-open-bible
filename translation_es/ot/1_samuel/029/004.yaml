  text: וַ/יִּקְצְפ֨וּ עָלָ֜י/ו שָׂרֵ֣י פְלִשְׁתִּ֗ים וַ/יֹּ֣אמְרוּ ל/וֹ֩ שָׂרֵ֨י פְלִשְׁתִּ֜ים הָשֵׁ֣ב אֶת הָ/אִ֗ישׁ וְ/יָשֹׁב֙ אֶל מְקוֹמ/וֹ֙ אֲשֶׁ֣ר הִפְקַדְתּ֣/וֹ שָׁ֔ם וְ/לֹֽא יֵרֵ֤ד עִמָּ֨/נוּ֙ בַּ/מִּלְחָמָ֔ה וְ/לֹא יִֽהְיֶה לָּ֥/נוּ לְ/שָׂטָ֖ן בַּ/מִּלְחָמָ֑ה וּ/בַ/מֶּ֗ה יִתְרַצֶּ֥ה זֶה֙ אֶל אֲדֹנָ֔י/ו הֲ/ל֕וֹא בְּ/רָאשֵׁ֖י הָ/אֲנָשִׁ֥ים הָ/הֵֽם־־־־־־׃
base_translation:
  language: en
  yaml_path: translation/ot/1_samuel/029/004.yaml
  text: But the Philistine commanders were angry with him[a], and the Philistine commanders said to him, “Send the man back, so that he may return to his place where you assigned him, and let him not go down with us into battle, lest he become an adversary to us in the battle[b]. For with what could this man reconcile himself to his lord? Would it not be with the heads of those men?”
  footnotes:
  - marker: a
    text: Hebrew שָׂטָן here means 'adversary' or 'opponent,' not the proper name 'Satan.'
    reason: lexical_alternative
  - marker: b
    text: Or 'regain favor with his lord.' The Hebrew expression refers to making oneself acceptable again to one's superior.
    reason: lexical_alternative
