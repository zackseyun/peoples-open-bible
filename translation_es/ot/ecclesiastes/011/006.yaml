review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español sigue bien el sentido del hebreo: exhortación a trabajar continuamente, con la razón de que no se sabe cuál esfuerzo prosperará, o si ambos. Sin embargo, hay dos desajustes menores con el expediente inglés: la nota [a] fue reasignada a «tu semilla» cuando en el POB inglés la alternativa léxica pertenece a יִכְשָׁר («tendrá éxito / prosperará»), y «si esta o aquella» introduce un «si» innecesario dentro de la disyunción demostrativa הֲזֶה אוֹ זֶה.'
  spanish_quality_summary: 'El español es claro y digno, pero puede pulirse para sonar más natural y más ceñido a la sintaxis: «Por la mañana» y «por la tarde» funcionan bien; «no dejes descansar tu mano» preserva adecuadamente el modismo con ayuda de nota. La secuencia «cuál tendrá éxito, si esta o aquella» suena algo trabada; «cuál de las dos tendrá éxito, esta o aquella» fluye mejor y evita una partícula no expresada en hebreo.'
  glossary_alignment: No hay términos del glosario teológico principal implicados aquí. La elección «semilla» es adecuada para זַרְעֶךָ, y el modismo de «mano» se conserva correctamente. Conviene alinear la nota léxica con יִכְשָׁר mediante «tendrá éxito» con alternativa «prosperará».
  issues:
  - severity: medium
    issue: La nota [a] está anclada en «semilla», pero la alternativa documentada en el POB inglés corresponde a יִכְשָׁר.
    rationale: El expediente inglés preserva una alternativa léxica para «will succeed / will prosper», no para «your seed». Mantener esa correspondencia mejora la fidelidad al rastro de auditoría.
  - severity: low
    issue: «si esta o aquella» añade una partícula que no corresponde al demostrativo contrastivo hebreo.
    rationale: הֲזֶה אוֹ זֶה se refleja mejor como «esta o aquella» o «una u otra». El «si» ya aparece adecuadamente en la cláusula siguiente («o si ambas...»).
  - severity: low
    issue: La construcción puede ganar naturalidad en español con «cuál de las dos tendrá éxito».
    rationale: Aclara la referencia binaria implícita en אֵי זֶה sin añadir interpretación indebida y mejora la legibilidad.
  revised_spanish_text: Por la mañana, siembra tu semilla; y por la tarde, no dejes descansar tu mano[a], porque no sabes cuál de las dos tendrá éxito[b], esta o aquella, o si ambas por igual serán buenas.
  revised_footnotes:
  - marker: a
    text: 'Hebreo idiomático: «no dejes descansar tu mano», es decir, no suspendas el trabajo.'
    reason: cultural_note
  - marker: b
    text: O «prosperará».
    reason: lexical_alternative
  revision_rationale: 'Se corrige la ubicación de las notas para que sigan el expediente inglés y el léxico fuente: la nota idiomática se mantiene en «mano», y la alternativa léxica se traslada a «tendrá éxito». Además, se elimina el «si» innecesario antes de «esta o aquella» y se añade «de las dos» para un español más natural sin alterar el sentido.'
