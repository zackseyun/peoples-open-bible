translation:
  language: es
  text: Pero tú eres santo[a], entronizado sobre las alabanzas de Israel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Pero tú eres santo, habitando en las alabanzas de Israel». El participio hebreo puede entenderse como «sentado» o «habitando»; el matiz real de «entronizado» encaja mejor con el contexto poético.'
