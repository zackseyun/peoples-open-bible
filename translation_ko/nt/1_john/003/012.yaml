  text: not like Cain[a], who was from the evil one and slaughtered his brother. And why did he slaughter him? Because his deeds were evil[b], but those of his brother were righteous.
  footnotes:
  - marker: a
    text: Or 'from evil.' The Greek expression can be read more abstractly, but in Johannine usage it commonly refers to the personal evil one.
