translation:
  language: es
  text: Y las piedras correspondían a los nombres de los hijos de Israel[a], doce según sus nombres, grabadas como sello[b], cada una según su nombre, para las doce tribus.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'llevaban los nombres de los hijos de Israel'. El hebreo puede expresar asociación cercana o correspondencia.
    reason: lexical_alternative
  - marker: b
    text: O 'grabados de sello' / 'inscripciones de sello'. La expresión se refiere al modo de grabado, como inscripciones hechas al estilo de un sello.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהָאֲבָנִים
  english_pob_choice: And the stones
  chosen_spanish: Y las piedras
  alternatives_spanish:
  - Y las gemas
  - Y las piedras preciosas
  lexicon: HALOT
  rationale: El sustantivo básico en el contexto del pectoral es 'piedras'; 'gemas' o 'piedras preciosas' son posibles por el contexto, pero el hebreo aquí no exige esa especificación.
- source_word: עַל שְׁמֹת בְּנֵי יִשְׂרָאֵל
  english_pob_choice: according to the names of the sons of Israel
  chosen_spanish: correspondían a los nombres de los hijos de Israel
  alternatives_spanish:
  - llevaban los nombres de los hijos de Israel
  - según los nombres de los hijos de Israel
  lexicon: HALOT
  rationale: עַל expresa aquí correspondencia o relación, no solo ubicación física. 'Correspondían a' conserva mejor la relación funcional de las piedras con los nombres.
- source_word: בְּנֵי יִשְׂרָאֵל
  english_pob_choice: the sons of Israel
  chosen_spanish: los hijos de Israel
  alternatives_spanish:
  - los hijos de Israel
  - los israelitas
  lexicon: HALOT
  rationale: '''Hijos de Israel'' es formalmente cercano al hebreo y funciona de manera natural en español bíblico contemporáneo.'
- source_word: הֵנָּה שְׁתֵּים עֶשְׂרֵה
  english_pob_choice: twelve
  chosen_spanish: doce
  alternatives_spanish:
  - eran doce
  - doce en total
  lexicon: HALOT
  rationale: La construcción hebrea subraya el número; en español, 'doce' comunica con naturalidad ese valor predicativo sin añadir artificio.
- source_word: עַל שְׁמֹתָם
  english_pob_choice: according to their names
  chosen_spanish: según sus nombres
  alternatives_spanish:
  - por sus nombres
  - llevando sus nombres
  lexicon: HALOT
  rationale: Se preserva el paralelismo de correspondencia del verso anterior y la repetición estructural del hebreo.
- source_word: פִּתּוּחֵי חֹתָם
  english_pob_choice: engraved like a signet
  chosen_spanish: talladas como engaste de sello
  alternatives_spanish:
  - grabadas como sello
  - talladas como grabado de sello
  lexicon: HALOT
  rationale: La frase describe el modo de talla, comparable al trabajo de un sello o engaste de sello. 'Engaste de sello' intenta mantener la imagen artesanal sin volverla demasiado literal en español.
- source_word: אִישׁ עַל שְׁמוֹ
  english_pob_choice: each according to its name
  chosen_spanish: cada una según su nombre
  alternatives_spanish:
  - cada una con su nombre
  - cada una según el nombre
  lexicon: HALOT
  rationale: אִישׁ funciona distributivamente como 'cada una/cada uno'. Como el referente inmediato son piedras, 'cada una' evita una referencia personal inapropiada y conserva la distribución individual.
- source_word: לִשְׁנֵים עָשָׂר שָׁבֶט
  english_pob_choice: for the twelve tribes
  chosen_spanish: para las doce tribus
  alternatives_spanish:
  - para las doce tribus de Israel
  - en favor de las doce tribus
  lexicon: HALOT
  rationale: 'ל marca relación o finalidad: las piedras representan a las tribus. ''Para las doce tribus'' es natural y fiel al vínculo representativo.'
translation_notes:
  revision_awareness: 'La redacción sigue de cerca el texto hebreo y la auditoría inglesa: mantiene la correspondencia repetida de עַל con ''correspondían a'' / ''según'', y conserva la imagen artesanal de פִּתּוּחֵי חֹתָם sin diluirla. Se evita traducir mecánicamente desde el inglés cuando el español requiere una relación más natural entre sujeto y predicado.'
  spanish_consistency_notes:
  - Se usa 'Yahvé' solo cuando el texto hebreo lo exige; este versículo no lo contiene.
  - '''Hijos de Israel'' se mantiene como designación de pacto, en consonancia con el criterio del proyecto.'
  - '''Piedras'' se deja sin añadir ''preciosas'' porque el hebreo no lo expresa explícitamente aquí.'
  - '''Cada una'' refleja el distributivo hebreo y concuerda con el referente inmediato femenino plural.'
