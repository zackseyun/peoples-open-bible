translation:
  language: es
  text: 'Y al ver la fe[a] de ellos, dijo: «Hombre, tus pecados te son perdonados[b][c]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «confianza»; el griego dice «fe».
    reason: lexical_alternative
  - marker: b
    text: O «te han sido perdonados». El perfecto pasivo griego puede subrayar un estado presente resultante de una acción cumplida.
    reason: lexical_alternative
  - marker: c
    text: O «tus pecados son perdonados a ti».
    reason: previous_rendering
lexical_decisions:
- source_word: ἰδὼν
  english_pob_choice: seeing
  chosen_spanish: al ver
  alternatives_spanish:
  - viendo
  - después de ver
  lexicon: BDAG
  rationale: El participio griego expresa una acción previa que en español se vierte de forma natural con una construcción temporal breve. «Al ver» conserva el valor participial sin forzar una secuencia más explícita de la que el griego no impone.
- source_word: πίστιν
  english_pob_choice: faith
  chosen_spanish: fe
  alternatives_spanish:
  - confianza
  - fidelidad
  lexicon: BDAG
  rationale: En este contexto, πίστις se refiere a la fe/confianza mostrada por el paralítico y su grupo. «Fe» es la opción más natural y fiel en español bíblico contemporáneo; «confianza» es posible pero menos directa aquí.
- source_word: αὐτῶν
  english_pob_choice: their
  chosen_spanish: de ellos
  alternatives_spanish:
  - su
  - de éstos
  lexicon: BDAG
  rationale: El plural del pronombre debe conservarse. «De ellos» mantiene la referencia grupal sin decidir en español si la fe se atribuye solo al paralítico, a los que lo llevaban o al conjunto.
- source_word: Ἄνθρωπε
  english_pob_choice: Man
  chosen_spanish: Hombre
  alternatives_spanish:
  - Amigo
  - Señor
  lexicon: BDAG
  rationale: El vocativo es literalmente «hombre» y funciona como una forma directa de tratamiento. «Amigo» añadiría cercanía no explicitada; «Señor» introduciría un matiz social distinto.
- source_word: ἀφέωνταί
  english_pob_choice: are forgiven
  chosen_spanish: te son perdonados
  alternatives_spanish:
  - te han sido perdonados
  - son perdonados
  lexicon: BDAG
  rationale: El perfecto pasivo griego comunica un estado presente resultado de una acción cumplida. En español, «te son perdonados» reproduce la declaración con naturalidad y preserva la pasiva; el dativo de interés se expresa de modo idiomático con «te».
- source_word: ἁμαρτίαι
  english_pob_choice: sins
  chosen_spanish: pecados
  alternatives_spanish:
  - faltas
  - culpas
  lexicon: BDAG
  rationale: «Pecados» es el equivalente estándar y más directo para ἁμαρτίαι en este contexto moral y teológico. «Culpas» o «faltas» suavizarían el término sin necesidad textual.
- source_word: σοι ... σου
  english_pob_choice: you ... your
  chosen_spanish: te ... tus
  alternatives_spanish:
  - a ti ... tus
  - a ti ... te
  lexicon: BDAG
  rationale: El dativo y el genitivo se expresan de forma natural en español con «te» y «tus». La combinación mantiene la dirección personal del anuncio sin redundancia innecesaria.
theological_decisions:
- issue: Alcance de «su fe / la fe de ellos»
  english_pob_reading: The main text preserves the plural reference without deciding whether it refers to the paralytic alone by representation or to the paralytic together with those who brought him.
  chosen_spanish_reading: El texto conserva la referencia plural con «de ellos» sin resolver si la fe es del paralítico, de los que lo llevaron o del grupo entero.
  alternative_spanish_readings:
  - «al ver la fe del hombre»
  - «al ver la fe de los que lo llevaban»
  rationale: El plural αὐτῶν debe mantenerse para no cerrar una tensión narrativa y teológica que el griego deja abierta. La traducción evita explicar más de lo que el texto dice.
  doctrine_reference: Preservar la tensión teológica en lugar de resolverla.
- issue: Fuerza de la declaración de perdón
  english_pob_reading: 'A declarative passive: ''your sins are forgiven.'''
  chosen_spanish_reading: 'Una declaración en pasiva: «tus pecados te son perdonados».'
  alternative_spanish_readings:
  - «tus pecados han sido perdonados»
  - «tus pecados quedan perdonados»
  rationale: El perfecto pasivo griego presenta la realidad del perdón como un estado resultante de una acción consumada. La forma española elegida conserva esa declaración sin añadir explicaciones sobre el momento exacto o el mecanismo del perdón.
  doctrine_reference: Preservar la tensión teológica en lugar de resolverla.
translation_notes:
  revision_awareness: La revisión inglesa reciente simplificó 'are forgiven you' a 'are forgiven' por estilo; en español no se trasladó una redundancia equivalente, pero sí se conservó la dirección personal del dativo con 'te' y el valor pasivo-perfectivo del verbo. Se mantuvo además el plural de 'de ellos' para respetar la ambigüedad del referente.
  spanish_consistency_notes:
  - Se usa «fe» para πίστις, conforme al uso POB y al registro bíblico natural en español.
  - Se conserva «Hombre» para Ἄνθρωπε como vocativo directo y literal.
  - Se mantiene la pasiva con «te son perdonados» para reflejar el perfecto pasivo griego sin paraphrasear el acto de perdón.
  - No se sustituye el plural de αὐτῶν por un singular interpretativo.
  - La puntuación española coloca los signos de apertura en el discurso directo.
  - Los marcadores de nota se integran en el texto exactamente donde corresponde el término discutido.
