translation:
  language: es
  text: Entonces Yahvé llamó a Moisés y le habló desde la tienda de reunión[a], diciendo,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «Yahvé». El hebreo tiene el nombre divino יְהוָה.
    reason: alternative_reading
lexical_decisions:
- source_word: וַיִּקְרָא
  english_pob_choice: called
  chosen_spanish: llamó
  alternatives_spanish:
  - llamó a gritos
  - convocó
  lexicon: HALOT
  rationale: En este contexto narrativo y de comunicación divina, «llamó» reproduce con naturalidad el valor de קרא sin añadir una idea más fuerte como «convocó», ni una matización sonora que el hebreo no exige.
- source_word: אֶל
  english_pob_choice: to
  chosen_spanish: a
  alternatives_spanish:
  - hacia
  lexicon: HALOT
  rationale: 'Con קרא, el hebreo אֶל se expresa en español de forma idiomática con «a»: «llamó a Moisés». «Hacia» sería demasiado espacial y menos natural.'
- source_word: מֹשֶׁה
  english_pob_choice: Moses
  chosen_spanish: Moisés
  lexicon: N/A
  rationale: Nombre propio bíblico en su forma española estándar.
- source_word: וַיְדַבֵּר
  english_pob_choice: spoke
  chosen_spanish: le habló
  alternatives_spanish:
  - habló
  - dijo
  lexicon: HALOT
  rationale: «Le habló» mantiene el matiz de comunicación personal y conserva la distinción frente a לֵאמֹר («diciendo»). «Dijo» nivelaría la fórmula hebrea y perdería parte del ritmo discursivo.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: Se conserva el nombre divino en su forma transliterada «Yahvé», conforme a la práctica POB, en vez de sustituirlo por un título como «el SEÑOR».
- source_word: אֵלָיו
  english_pob_choice: to him
  chosen_spanish: le
  alternatives_spanish:
  - a él
  lexicon: HALOT
  rationale: En español, el dativo clítico «le» expresa con naturalidad el referente a Moisés y evita una repetición innecesaria del nombre.
- source_word: מֵאֹהֶל מוֹעֵד
  english_pob_choice: from the tent of meeting
  chosen_spanish: desde la tienda de reunión
  alternatives_spanish:
  - desde el tabernáculo de reunión
  - desde la tienda del encuentro
  lexicon: HALOT
  rationale: «Tienda de reunión» traduce de forma directa אֹהֶל מוֹעֵד y preserva el sentido de lugar de encuentro designado. Se evita «tabernáculo» por introducir una tradición terminológica no presente en el hebreo aquí.
- source_word: לֵאמֹר
  english_pob_choice: saying,
  chosen_spanish: diciendo,
  alternatives_spanish:
  - y dijo,
  lexicon: HALOT
  rationale: «Diciendo» conserva la fórmula narrativa hebrea y prepara la cita siguiente sin fundir artificialmente dos verbos de habla.
theological_decisions:
- issue: Traducción del Tetragrámaton יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: La POB inglesa decidió no ocultar el nombre divino tras un título. En español, la forma coherente con esa decisión y con el uso bíblico moderno es «Yahvé», manteniendo el nombre personal de Dios revelado a Israel.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
translation_notes:
  revision_awareness: La versión inglesa auditada quedó sin cambios en su último pase y con alto acuerdo entre revisiones; esta propuesta sigue ese trazado sin introducir ajustes interpretativos nuevos.
  spanish_consistency_notes:
  - Se mantiene la forma «Yahvé» para יְהוָה en coherencia con el criterio POB y con el nombre divino explícito del hebreo.
  - «Tienda de reunión» reproduce el término técnico אֹהֶל מוֹעֵד sin recurrir a «tabernáculo», que sería una equivalencia más tradicional pero menos directa al hebreo.
  - 'La secuencia verbal «llamó... y le habló... diciendo» conserva la doble fórmula narrativa del hebreo: llamada seguida de habla y de introducción del discurso.'
