translation:
  language: es
  text: La tierra de Tapúaj era de Manasés[a], pero Tapúaj, en el límite de Manasés, era de los hijos de Efraín.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, de manera más formal: «Para Manasés era la tierra de Tapúaj; pero Tapúaj, en el límite de Manasés, era de los hijos de Efraín».

      '
    reason: lexical_alternative
lexical_decisions:
- source_word: לִ/מְנַשֶּׁה
  english_pob_choice: belonged to Manasseh
  chosen_spanish: pertenecía a Manasés
  alternatives_spanish:
  - era de Manasés
  - estaba asignada a Manasés
  lexicon: HALOT
  rationale: En este contexto de repartición territorial, la preposición ל expresa pertenencia o asignación. «Pertenecía a» transmite esa fuerza con naturalidad en español, sin reducirla a una mera localización.
- source_word: הָיְתָה
  english_pob_choice: belonged
  chosen_spanish: pertenecía
  alternatives_spanish:
  - era
  - fue
  lexicon: HALOT
  rationale: Aunque el verbo hebreo es simplemente «ser/estar», en una fórmula de distribución de tierras el sentido resultante es posesivo. «Pertenecía» conserva ese valor sin añadir información ajena al texto.
- source_word: אֶרֶץ
  english_pob_choice: land
  chosen_spanish: tierra
  alternatives_spanish:
  - territorio
  - país
  lexicon: HALOT
  rationale: En un pasaje de heredad tribal, «tierra» es el equivalente más natural y fiel en español para el ámbito territorial descrito.
- source_word: תַּפּוּחַ
  english_pob_choice: Tappuah
  chosen_spanish: Tapúaj
  alternatives_spanish:
  - Tappuah
  lexicon: N/A
  rationale: Se translitera el nombre propio al español con adaptación ortográfica mínima para facilitar la lectura y mantener la identificación del lugar.
- source_word: וְ/תַפּוּחַ
  english_pob_choice: but Tappuah
  chosen_spanish: pero Tapúaj
  alternatives_spanish:
  - y Tapúaj
  - mientras que Tapúaj
  lexicon: HALOT
  rationale: La ו introduce un contraste entre la porción atribuida a Manasés y el asentamiento situado en el borde, por lo que «pero» preserva mejor la relación adversativa que el texto establece.
- source_word: אֶל גְּב֥וּל מְנַשֶּׁ֖ה
  english_pob_choice: on the border of Manasseh
  chosen_spanish: en el límite de Manasés
  alternatives_spanish:
  - sobre la frontera de Manasés
  - junto al borde de Manasés
  lexicon: HALOT
  rationale: La combinación con גְּב֥וּל señala ubicación limítrofe; «en el límite» comunica esa relación espacial de manera idiomática y precisa.
- source_word: לִ/בְנֵ֥י אֶפְרָֽיִם
  english_pob_choice: belonged to the sons of Ephraim
  chosen_spanish: pertenecía a los hijos de Efraín
  alternatives_spanish:
  - era de los hijos de Efraín
  - pertenecía a los efraimitas
  lexicon: HALOT
  rationale: Se conserva la expresión filial/tribal «hijos de Efraín», que reproduce mejor la forma hebrea que una etnónima más interpretativa.
translation_notes:
  revision_awareness: Se revisó el pasaje frente al texto hebreo y al tramo auditado en inglés; la redacción española mantiene el contraste territorial y la doble pertenencia/ubicación sin suavizar la tensión del versículo.
  spanish_consistency_notes:
  - Se mantiene «Manasés» y «Efraín» como nombres tribales consistentes con la terminología bíblica en español.
  - «Pertenecía a» se usa en ambos miembros para reflejar la misma lógica posesiva del hebreo.
  - Se translitera «Tapúaj» de forma uniforme en ambas menciones.
