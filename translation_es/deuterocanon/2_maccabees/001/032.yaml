  yaml_path: translation/deuterocanon/2_maccabees/001/032.yaml
  text: And when this happened[a], a flame was kindled; and when the light from the altar shone forth[b], it was consumed.
  footnotes:
  - marker: a
    text: Or 'when the light from the altar shone forth.' The Greek verb can denote shining or flashing responsively.
    reason: lexical_alternative
  - marker: b
    text: The Greek says simply 'it was consumed' without naming the subject. The translation takes this to refer to the flame; alternatively, some understand the thing consumed to be the fuel or, in light of the wider context, the poured liquid.
