base_translation:
  language: en
  yaml_path: translation/ot/1_samuel/014/033.yaml
  text: Then they told Saul[a], saying, “Look, the people are sinning against Yahweh by eating over the blood.” And he said, “You have acted treacherously. Roll a large stone to me today.”
  footnotes:
