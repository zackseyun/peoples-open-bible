translation:
  language: es
  text: Cada día te bendeciré[a][b], y alabaré tu nombre por los siglos de los siglos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: También puede traducirse «Todos los días» o «Día tras día».
    reason: lexical_alternative
  - marker: b
    text: Hebreo «tu nombre», una manera bíblica de hablar del carácter y la reputación revelados de Dios.
    reason: cultural_note
lexical_decisions:
- source_word: בְּ/כָל י֥וֹם
  english_pob_choice: Every day
  chosen_spanish: Cada día
  alternatives_spanish:
  - Día tras día
  - Todos los días
  lexicon: HALOT
  rationale: La expresión hebrea comunica repetición habitual; en español, «Cada día» conserva ese sentido natural y directo sin perder la fuerza distributiva del original.
- source_word: אֲבָרֲכֶ֑/ךָּ
  english_pob_choice: I will bless you
  chosen_spanish: te bendeciré
  alternatives_spanish:
  - te alabaré con bendición
  - te bendigo
  lexicon: HALOT
  rationale: ברך en piel se traduce de manera ordinaria como «bendecir». En este contexto de alabanza dirigida a Dios, el futuro mantiene el valor volitivo/poético del hebreo, como en la auditoría inglesa.
- source_word: וַ/אֲהַלְלָ֥ה
  english_pob_choice: and I will praise
  chosen_spanish: y alabaré
  alternatives_spanish:
  - y te alabaré
  - y ensalzaré
  lexicon: HALOT
  rationale: הלל expresa alabanza; «alabaré» es la forma más transparente y natural en español para conservar el paralelismo con «te bendeciré».
- source_word: שִׁ֝מְ/ךָ֗
  english_pob_choice: your name
  chosen_spanish: tu nombre
  alternatives_spanish:
  - tu fama
  - tu reputación
  lexicon: HALOT
  rationale: Se mantiene la imagen concreta de «nombre», porque en el lenguaje bíblico remite a la persona revelada, carácter y renombre de Dios. La auditoría inglesa también preserva esta forma.
- source_word: לְ/עוֹלָ֥ם וָ/עֶֽד
  english_pob_choice: forever and ever
  chosen_spanish: por siempre y para siempre
  alternatives_spanish:
  - eternamente
  - para siempre
  lexicon: HALOT
  rationale: La fórmula hebrea intensifica la duración; «por siempre y para siempre» reproduce bien esa ampliación enfática en un español culto y bíblicamente reconocible.
theological_decisions:
- issue: Tratamiento del «nombre» de Dios
  english_pob_reading: your name
  chosen_spanish_reading: tu nombre
  alternative_spanish_readings:
  - tu fama
  - tu reputación
  rationale: Se preserva «nombre» para no reducir una expresión bíblica teológicamente cargada a una mera abstracción. En la poesía hebrea, el nombre de Dios alude a su revelación pública y a su carácter.
  doctrine_reference: Translation philosophy §1, §3
- issue: Dirección inmediata a Dios sin añadir un título
  english_pob_reading: you
  chosen_spanish_reading: te
  alternative_spanish_readings:
  - oh Dios, te
  - te, mi Dios Rey
  rationale: El hebreo aquí usa el sufijo de segunda persona sin repetir un título divino; el español refleja la dirección directa sin importar elementos de la versículo previo.
  doctrine_reference: Translation philosophy §1, §5
translation_notes:
  revision_awareness: 'El texto español sigue de cerca el hebreo masorético de Salmo 145:2 y concuerda con la auditoría inglesa en los valores semánticos principales: habitualidad diaria, bendecir/alabar, conservación de «nombre» y cierre enfático de duración. No se introducen títulos divinos ni se suaviza la fuerza poética del paralelismo.'
  spanish_consistency_notes:
  - 'Se conserva el paralelismo verbal con dos futuros en primera persona: «te bendeciré» / «alabaré».'
  - «Tu nombre» se mantiene literal por coherencia con el lenguaje bíblico de alabanza.
  - «Por siempre y para siempre» reproduce el doblete enfático del hebreo sin arcaizar innecesariamente.
