translation:
  language: es
  text: 'Entonces Moisés dijo a Coré[a]: «Escuchen ahora, hijos de Leví».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «Escuchen, por favor, hijos de Leví», o «Escuchen ahora, levitas».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר
  english_pob_choice: Then ... said
  chosen_spanish: Entonces ... dijo
  alternatives_spanish:
  - Y ... dijo
  - Luego ... dijo
  lexicon: HALOT
  rationale: La forma narrativa waw-consecutiva avanza la acción; «Entonces» conserva esa secuencia en español con fluidez natural.
- source_word: אֶל
  english_pob_choice: to
  chosen_spanish: a
  alternatives_spanish:
  - hacia
  - para
  lexicon: HALOT
  rationale: La preposición de destinatario se expresa naturalmente con «a» en español.
- source_word: קֹרַח
  english_pob_choice: Korah
  chosen_spanish: Coré
  alternatives_spanish:
  - Korah
  lexicon: HALOT
  rationale: Se usa la forma española tradicional del nombre propio bíblico, sin afectar el sentido del hebreo.
- source_word: שִׁמְעוּ
  english_pob_choice: Hear
  chosen_spanish: Escuchen
  alternatives_spanish:
  - Oigan
  - Escuchen, por favor
  lexicon: HALOT
  rationale: El imperativo plural pide una exhortación directa; «Escuchen» transmite bien la apelación solemne sin sonar arcaico.
- source_word: נָא
  english_pob_choice: now
  chosen_spanish: ahora
  alternatives_spanish:
  - por favor
  - les ruego
  lexicon: HALOT
  rationale: En este contexto de urgencia y reprensión, «ahora» comunica la urgencia del llamado mejor que una fórmula de cortesía.
- source_word: בְּנֵי
  english_pob_choice: sons of
  chosen_spanish: hijos de
  alternatives_spanish:
  - hijos varones de
  - descendientes de
  lexicon: HALOT
  rationale: Aunque el hebreo es masculino plural, en español «hijos de Leví» suena natural y conserva la referencia masculina del original.
- source_word: לֵוִי
  english_pob_choice: Levi
  chosen_spanish: Leví
  alternatives_spanish:
  - Levi
  lexicon: HALOT
  rationale: Nombre propio transliterado a la forma española habitual.
theological_decisions:
- issue: Dirección del llamado y matiz de género en el vocativo
  english_pob_reading: you sons of Levi
  chosen_spanish_reading: hijos de Leví
  alternative_spanish_readings:
  - Levitas
  - hijos de Leví varones
  rationale: Se mantiene el plural masculino explícito del hebreo בלי neutralizarlo a «Levitas», que borra la forma de parentesco del texto; «hijos de Leví» conserva el giro semítico y la precisión del vocativo.
  doctrine_reference: DOCTRINE.md §Translation philosophy, point 4
translation_notes:
  revision_awareness: Se corrigió la validación anterior asegurando que el marcador de nota [a] aparece exactamente en el texto español junto al nombre propio al que se refiere la alternativa.
  spanish_consistency_notes:
  - Se mantuvo el estilo bíblico sobrio y contemporáneo.
  - «Coré» se prefirió por uso bíblico estándar en español.
  - La nota alternativa preserva las opciones de «hear/listen» y «sons/Levites» sin duplicar marcadores.
  - No se usó «SEÑOR» ni terminología no presente en el versículo.
