translation:
  text: 'And that house became great and broad, and it was built for those sheep; and a lofty and great tower was built upon the house for the Lord of the sheep. And that house was low, but the tower was raised up and became lofty; and the Lord of the sheep stood upon that tower, and they set a full table before him.'
