  to: 'Y de Zabulón dijo[a]: «¡Alégrate, Zabulón, en tus salidas, e Isacar, en tus tiendas!»'
  rationale: Se elimina el pronombre añadido «tú» para ajustarse más estrechamente al hebreo y al audit trail inglés. Se cambia «en tu salir» por «en tus salidas» para conservar la imaginería del original en un español más natural y poético, sin perder la ambigüedad reflejada por la nota alternativa. También se ajusta «y» a «e» ante «Isacar» por corrección fonética del español.
