translation:
  language: es
  text: Entonces, si el impío merece ser golpeado, el juez hará que se acueste y hará que lo golpeen delante de él, según su maldad, por número[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «según el número», es decir, con un número contado de golpes proporcionado a la falta.
    reason: lexical_alternative
lexical_decisions:
- source_word: בִּן הַכּוֹת
  english_pob_choice: deserves to be beaten
  chosen_spanish: merece ser golpeado
  alternatives_spanish:
  - es digno de ser golpeado
  - está sujeto a ser golpeado
  - debe ser golpeado
  lexicon: HALOT
  rationale: La expresión hebrea es idiomática y no literal; comunica que la persona está legalmente sujeta al castigo corporal. «Merece ser golpeado» conserva ese valor jurídico en un español natural sin suavizar el sentido.
- source_word: הָרָשָׁע
  english_pob_choice: the wicked man
  chosen_spanish: el impío
  alternatives_spanish:
  - el malvado
  - el culpable
  - el malhechor
  lexicon: HALOT
  rationale: En este contexto judicial, el término funciona como sustantivo para el acusado culpable, pero conserva una carga moral. «El impío» mantiene esa fuerza ética y es una opción bíblica clara en español.
- source_word: וְהִפִּילוֹ
  english_pob_choice: shall make him lie down
  chosen_spanish: hará que se acueste
  alternatives_spanish:
  - hará que se tienda
  - lo hará echarse
  - lo hará acostar
  lexicon: HALOT
  rationale: El hiphil de נפל expresa causar que la persona quede tendida para el castigo. «Hará que se acueste» reproduce la acción de forma comprensible y sin añadir violencia interpretativa innecesaria.
- source_word: הַשֹּׁפֵט
  english_pob_choice: the judge
  chosen_spanish: el juez
  alternatives_spanish:
  - el magistrado
  lexicon: HALOT
  rationale: Es la designación judicial estándar y la traducción más directa y transparente.
- source_word: וְהִכָּהוּ
  english_pob_choice: have him beaten
  chosen_spanish: lo harán golpear
  alternatives_spanish:
  - lo harán azotar
  - lo harán castigar a golpes
  - lo harán dar golpes
  lexicon: HALOT
  rationale: La forma hebrea describe el acto de golpear, pero en esta secuencia procesal el juez supervisa el castigo. «Lo harán golpear» conserva la idea del castigo corporal y deja implícita la ejecución por los responsables del procedimiento.
- source_word: לְפָנָיו
  english_pob_choice: before him
  chosen_spanish: delante de él
  alternatives_spanish:
  - en su presencia
  - ante él
  lexicon: HALOT
  rationale: La frase indica que el castigo ocurre frente al juez. «Delante de él» es natural en español y mantiene la referencia espacial del hebreo.
- source_word: כְּדֵי רִשְׁעָתוֹ
  english_pob_choice: according to his wickedness
  chosen_spanish: según su maldad
  alternatives_spanish:
  - conforme a su culpa
  - de acuerdo con su impiedad
  - según su culpa
  lexicon: HALOT
  rationale: El sustantivo hebreo señala la maldad o culpa moral que determina la proporcionalidad del castigo. «Según su maldad» conserva ese vínculo entre falta y pena.
- source_word: בְּמִסְפָּר
  english_pob_choice: by number
  chosen_spanish: por número[a]
  alternatives_spanish:
  - según el número
  - con un número contado de golpes
  - con número
  lexicon: HALOT
  rationale: La expresión es breve y técnica. «Por número» preserva la concisión del hebreo, mientras la nota explica que se trata de golpes contados y proporcionales.
translation_notes:
  revision_awareness: 'La redacción sigue de cerca el sentido jurídico del hebreo y la pauta de la POB en inglés: conserva la proporcionalidad del castigo, mantiene la referencia al juez y refleja la expresión concisa «por número» con una nota explicativa.'
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el texto lo requiera; este versículo no lo contiene.
  - Se mantiene «impío» como equivalente bíblico de הָרָשָׁע por su valor moral-legal.
  - «Por número» se conserva como calco controlado, acompañado de nota para claridad.
  - No se introduce terminología eclesiástica ajena al contexto judicial del pasaje.
