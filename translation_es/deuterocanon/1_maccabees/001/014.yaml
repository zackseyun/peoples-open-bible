translation:
  language: es
  text: Y edificaron un gimnasio en Jerusalén conforme a las costumbres de las naciones[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «de los gentiles». El griego dice «de las naciones», una manera judía común de referirse a los pueblos no judíos.
    reason: lexical_alternative
lexical_decisions:
- source_word: ᾠκοδόμησαν
  english_pob_choice: built
  chosen_spanish: edificaron
  alternatives_spanish:
  - construyeron
  - levantaron
  lexicon: BDAG
  rationale: El aoristo indica una acción concreta de construir. «Edificaron» conserva el sentido material y funciona con naturalidad en español bíblico contemporáneo.
- source_word: γυμνάσιον
  english_pob_choice: gymnasium
  chosen_spanish: gimnasio
  alternatives_spanish:
  - gimnasio helenístico
  - lugar de ejercicio
  lexicon: LSJ
  rationale: El término designa la institución helenística específica. En español, «gimnasio» es el equivalente directo y reconocible; el contexto histórico evita entenderlo como un gimnasio moderno sin más.
- source_word: ἐν Ἱεροσολύμοις
  english_pob_choice: in Jerusalem
  chosen_spanish: en Jerusalén
  alternatives_spanish:
  - en la ciudad de Jerusalén
  lexicon: BDAG
  rationale: La preposición locativa se vierte de forma directa y idiomática con «en Jerusalén».
- source_word: κατὰ
  english_pob_choice: according to
  chosen_spanish: conforme a
  alternatives_spanish:
  - según
  - de acuerdo con
  lexicon: BDAG
  rationale: «Conforme a» expresa adecuadamente la idea de conformidad con un patrón o norma y suena más natural que una calca rígida.
- source_word: τὰ νόμιμα
  english_pob_choice: the customs
  chosen_spanish: las costumbres
  alternatives_spanish:
  - las prácticas
  - las normas
  lexicon: LSJ
  rationale: En este contexto, νόμιμα apunta a formas establecidas de vida o práctica, no solo a leyes formales. «Costumbres» conserva bien ese matiz social y cultural.
- source_word: τῶν ἐθνῶν
  english_pob_choice: of the nations
  chosen_spanish: de las naciones
  alternatives_spanish:
  - de los gentiles
  - de los pueblos
  lexicon: BDAG
  rationale: Se mantiene la forma literal «naciones», porque el griego usa ἔθνη y la carga contrastiva con el pueblo judío se deja ver por el contexto sin añadir una interpretación más fuerte.
theological_decisions:
- issue: ἔθνη en un contexto judío contrastivo
  english_pob_reading: of the nations
  chosen_spanish_reading: de las naciones
  alternative_spanish_readings:
  - de los gentiles
  - de los paganos
  rationale: Se conserva el valor léxico básico del griego y se evita introducir un matiz peyorativo que no está explícito en el texto. El contraste religioso-cultural queda igualmente claro en el contexto de 1 Macabeos.
  doctrine_reference: Translation philosophy §1, §5
translation_notes:
  revision_awareness: El pasaje presenta alto acuerdo en la fuente griega y en el audit trail inglés; no se documentan revisiones textuales o cambios significativos, así que la versión española sigue de cerca la lectura establecida.
  spanish_consistency_notes:
  - Se mantiene el término «gimnasio» para conservar la institución histórica helenística.
  - Se usa «naciones» en el texto principal para reflejar el griego ἔθνη sin sustituirlo por una glosa interpretativa.
  - La puntuación y el orden responden al español natural sin alterar la relación sintáctica básica del original.
