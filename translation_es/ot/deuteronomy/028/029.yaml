translation:
  language: es
  text: Y andarás a tientas[a] al mediodía, como el ciego anda a tientas en la oscuridad; no prosperarás en tus caminos[b], y serás solo oprimido y robado todos los días, sin quien te salve[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «palpando»; el verbo hebreo describe buscar por medio del tacto porque no se puede ver.
    reason: lexical_alternative
  - marker: b
    text: O «no tendrás éxito en tus caminos».
    reason: lexical_alternative
  - marker: c
    text: O «sin quien te rescate» o «sin libertador».
    reason: lexical_alternative
lexical_decisions:
- source_word: מְמַשֵּׁשׁ / יְמַשֵּׁשׁ
  english_pob_choice: grope / gropes
  chosen_spanish: andarás a tientas / anda a tientas
  alternatives_spanish:
  - palparás / palpa
  - andarás palpando / palpando
  lexicon: HALOT
  rationale: El hebreo expresa buscar con la mano por no poder ver. «Andar a tientas» es una equivalencia natural en español que conserva la imagen física y la sensación de desorientación.
- source_word: בַּצָּהֳרַיִם
  english_pob_choice: at noon
  chosen_spanish: al mediodía
  alternatives_spanish:
  - a mediodía
  - en pleno día
  lexicon: HALOT
  rationale: Se refiere a la parte más luminosa del día. «Al mediodía» es idiomático y mantiene el contraste irónico con la oscuridad.
- source_word: הָעִוֵּר
  english_pob_choice: the blind
  chosen_spanish: el ciego
  alternatives_spanish:
  - la persona ciega
  - el invidente
  lexicon: HALOT
  rationale: El hebreo usa un singular masculino sustantivado; «el ciego» conserva esa forma y funciona de manera natural en español.
- source_word: בָּאֲפֵלָה
  english_pob_choice: in the darkness
  chosen_spanish: en la oscuridad
  alternatives_spanish:
  - en la sombra
  - en la penumbra
  lexicon: HALOT
  rationale: El término denota oscuridad o penumbra oscura. «En la oscuridad» reproduce bien el contraste con «al mediodía».
- source_word: תַצְלִיחַ
  english_pob_choice: you will not prosper
  chosen_spanish: no prosperarás
  alternatives_spanish:
  - no tendrás éxito
  - no saldrás bien
  lexicon: HALOT
  rationale: En este contexto de maldición del pacto, el verbo expresa prosperar o tener buen resultado. «Prosperar» conserva ese alcance más amplio que mero éxito puntual.
- source_word: אֶת דְּרָכֶיךָ
  english_pob_choice: in your ways
  chosen_spanish: en tus caminos
  alternatives_spanish:
  - en tus vías
  - en tus empresas
  lexicon: HALOT
  rationale: Literalmente «tus caminos». «En tus caminos» mantiene la metáfora hebrea y sigue siendo comprensible en español bíblico contemporáneo.
- source_word: אַךְ
  english_pob_choice: only
  chosen_spanish: solo
  alternatives_spanish:
  - solamente
  - únicamente
  - nada más que
  lexicon: HALOT
  rationale: 'La partícula restringe e intensifica: quedarás reducido a esa condición. «Solo» comunica con claridad esa exclusividad.'
- source_word: עָשׁוּק
  english_pob_choice: oppressed
  chosen_spanish: oprimido
  alternatives_spanish:
  - maltratado
  - explotado
  - agraviado
  lexicon: HALOT
  rationale: El participio pasivo señala estar bajo opresión o extorsión. «Oprimido» es la opción más directa y estable en este marco de maldición.
- source_word: גָזוּל
  english_pob_choice: robbed
  chosen_spanish: despojado
  alternatives_spanish:
  - robado
  - saqueado
  - desvalijado
  lexicon: HALOT
  rationale: El participio pasivo indica haber sido despojado por robo o saqueo. «Despojado» encaja bien con «oprimido» y conserva el matiz de ser privado de bienes.
- source_word: כָּל הַיָּמִים
  english_pob_choice: all the days
  chosen_spanish: todos los días
  alternatives_spanish:
  - constantemente
  - todo el tiempo
  - cada día
  lexicon: HALOT
  rationale: La expresión enfatiza duración continua. «Todos los días» es la forma más natural en español para mantener ese sentido repetitivo y sostenido.
- source_word: וְאֵין מוֹשִׁיעַ
  english_pob_choice: with no one to save you
  chosen_spanish: sin quien te salve
  alternatives_spanish:
  - y no habrá quien te rescate
  - sin salvador
  lexicon: HALOT
  rationale: El hebreo afirma la ausencia de un rescatador. «Sin quien te salve» preserva el sentido personal y evita imponer un título teológico que el contexto no desarrolla.
theological_decisions:
- issue: Sentido de מוֹשִׁיעַ en un contexto de maldición del pacto
  english_pob_reading: with no one to save you
  chosen_spanish_reading: sin quien te salve
  alternative_spanish_readings:
  - y no habrá quien te rescate
  - sin libertador
  rationale: Aquí el término expresa auxilio o rescate ordinario, no un título mesiánico. «Salvar» conserva el lenguaje bíblico amplio sin introducir una lectura doctrinal ajena al contexto.
  doctrine_reference: Evitar importar un sentido mesiánico donde el texto presenta solo ausencia de rescate humano/divino en la maldición.
translation_notes:
  revision_awareness: 'La redacción sigue el ajuste del audit trail inglés que sustituyó «the blind man» por «the blind» para reflejar mejor el sustantivo singular colectivo del hebreo. También conserva la secuencia retórica del versículo: desorientación al mediodía, fracaso en los caminos, y condición continua de opresión y despojo sin rescate.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» solo cuando el hebreo lo requiera explícitamente; este versículo no contiene el nombre divino.
  - Se usa «salve» en sentido ordinario de rescatar, no como título técnico.
  - «Oprimido y despojado» sigue la pareja verbal del hebreo sin suavizar la dureza del texto.
  - La puntuación conserva la cadencia de tres miembros principales del versículo.
