translation:
  language: es
  text: En tu nombre se alegran todo el día, y en tu rectitud[a] son exaltados.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «en tu justicia».'
    reason: lexical_alternative
lexical_decisions:
- source_word: בְּשִׁמְךָ
  english_pob_choice: In your name
  chosen_spanish: En tu nombre
  alternatives_spanish:
  - Por tu nombre
  - Con tu nombre
  lexicon: HALOT
  rationale: El ב aquí expresa esfera o base del regocijo, no simple localización física. 'En tu nombre' es la forma natural en español y conserva que el 'nombre' de Dios representa su carácter y reputación revelados.
- source_word: יְגִיל֣וּן
  english_pob_choice: they rejoice
  chosen_spanish: se alegran
  alternatives_spanish:
  - exultan
  - se gozan
  lexicon: HALOT
  rationale: גיל comunica júbilo expresivo. 'Se alegran' es idiomático en español y mantiene el tono celebrativo sin introducir una intensidad innecesaria.
- source_word: כָּל הַיּוֹם
  english_pob_choice: all day long
  chosen_spanish: todo el día
  alternatives_spanish:
  - todo el día long
  - constantemente
  lexicon: HALOT
  rationale: La expresión idiomática hebrea marca duración continua durante la jornada. 'Todo el día' transmite bien ese alcance temporal en español sin sobreinterpretar.
- source_word: וּבְצִדְקָתְךָ
  english_pob_choice: and in your righteousness
  chosen_spanish: y en tu justicia
  alternatives_spanish:
  - y en tu rectitud
  - y por tu justicia
  lexicon: HALOT
  rationale: צדקה puede abarcar justicia y rectitud. Aquí 'justicia' preserva el campo semántico y deja visible la tensión lexical que el inglés POB también conserva como alternativa.
- source_word: יָרֽוּמוּ
  english_pob_choice: they are exalted
  chosen_spanish: son exaltados
  alternatives_spanish:
  - son levantados
  - se elevan
  lexicon: HALOT
  rationale: 'רום expresa ser elevado o puesto en alto. ''Son exaltados'' suena natural y refleja el matiz pasivo/resultativo: la justicia de Dios es la causa de esa elevación.'
theological_decisions:
- issue: 'צִדְקָה: ''justicia'' vs. ''rectitud/righteousness'' en un contexto de alabanza'
  english_pob_reading: Rendered as 'righteousness' in the main text, with 'justice' as lexical alternative
  chosen_spanish_reading: '''justicia'' en el texto principal, manteniendo abierta la posibilidad de ''rectitud'' en el trasfondo semántico'
  alternative_spanish_readings:
  - rectitud
  - justicia de Dios
  rationale: En español, 'justicia' comunica bien el rango de צדקה en un salmo de alabanza, y evita reducir el término a una mera cualidad abstracta. La elección no niega la dimensión de rectitud; más bien la integra. El POB inglés conserva 'justice' como alternativa, por lo que el español principal puede usar 'justicia' sin perder fidelidad.
  doctrine_reference: 'DOCTRINE.md: términos disputados; justicia/rectitud en atributos divinos'
- issue: '''Nombre'' de Dios como portador de su revelación y carácter'
  english_pob_reading: '''Your name'' denotes God''s revealed character and reputation'
  chosen_spanish_reading: '''tu nombre'' como designación de su carácter revelado'
  alternative_spanish_readings:
  - tu fama
  - tu reputación
  rationale: '''Nombre'' en hebreo bíblico no es solo una etiqueta verbal; apunta a la realidad revelada de Dios. En español, ''tu nombre'' conserva ese uso bíblico sin necesidad de explicitarlo dentro del verso.'
  doctrine_reference: Uso bíblico del 'nombre' divino
translation_notes:
  revision_awareness: Se siguió el audit trail inglés sin cambios relevantes; el verso permanece estable respecto a la última revisión, con la única adaptación necesaria de equivalencias naturales al español.
  spanish_consistency_notes:
  - Se usó 'En tu nombre' para mantener la esfera/basis del hebreo בְּ.
  - '''Se alegran'' conserva el sentido de júbilo sin hacer el registro excesivamente solemne.'
  - '''Todo el día'' reproduce el idiomatismo temporal de כָּל הַיּוֹם.'
  - '''Son exaltados'' refleja el estado resultante de יָרוּמוּ sin sugerir autoexaltación.'
  - La nota textual se ancla en 'justicia' porque el POB inglés preserva esa alternativa léxica.
