    issue: «la amistad de los judíos» para τοῖς Ἰουδαίοις
    rationale: 'El dativo se documentó en el expediente inglés como relacional: «friendship with the Jews». En español, «la amistad de los judíos» puede sugerir procedencia o posesión, no relación mutua. «Con los judíos» preserva mejor el sentido fuente.'
  - severity: medium
    issue: «como apoyo» para εἰς στήριγμα
    rationale: Aunque no es imposible, «como apoyo» suena algo forzado en este contexto diplomático. El inglés revisado optó por «for support»; en español «para obtener apoyo» o «como respaldo» comunica mejor la finalidad política.
  - severity: low
    issue: La nota alternativa actual no aporta una alternativa española útil
    rationale: La nota «para ganar la amistad de los judíos para apoyo» repite la ambigüedad de «de los judíos» y además suena menos natural. Debe reformularse o suprimirse.
