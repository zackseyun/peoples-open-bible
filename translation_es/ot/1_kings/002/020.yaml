revisions:
- from: 'Ella dijo[a]: «Una sola petición pequeña es la que te hago; no me rechaces». Y el rey le dijo: «Pide, madre mía, porque no te rechazaré».'
  to: 'Ella dijo[a]: «Te hago una pequeña petición; no me rechaces». Y el rey le dijo: «Pide, mi madre, porque no te rechazaré».'
  rationale: Se mejoró la naturalidad del español sin perder ningún elemento semántico importante del hebreo ni de la auditoría inglesa. ‘Te hago una pequeña petición’ transmite mejor la modesta súplica; ‘mi madre’ refleja con más precisión אִמִּי; y la nota se aclaró para un lector hispanohablante.
