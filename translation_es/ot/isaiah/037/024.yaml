translation:
  language: es
  text: 'Por medio de tus siervos has insultado[a] al Señor, y has dicho: «Con la multitud de mis carros he subido a las alturas de los montes, a los rincones más remotos del Líbano; cortaré sus cedros altos, sus mejores cipreses[b], y entraré en su altura más remota, su bosque fértil[c]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «has afrenta­do», «has reprochado» o «te has burlado de»; el verbo hebreo transmite la idea de insultar o desafiar con desprecio.
    reason: lexical_alternative
  - marker: b
    text: El árbol nombrado aquí (hebreo berosh) es incierto; puede referirse a ciprés, abeto u otra conífera.
    reason: lexical_alternative
  - marker: c
    text: O «su bosque exuberante» o «su bosque fructífero»; el hebreo combina la idea de bosque con la de tierra fértil o de huerto.
    reason: lexical_alternative
lexical_decisions:
- source_word: בְּיַד עֲבָדֶיךָ
  english_pob_choice: By your servants
  chosen_spanish: Por medio de tus siervos
  alternatives_spanish:
  - Por la mano de tus siervos
  - Por tus siervos
  lexicon: HALOT
  rationale: La locución hebrea בְּיַד expresa medio/instrumento. En español, «por medio de» conserva el valor instrumental sin sonar forzado, y evita que «por» solo borre el matiz de agencia mediada.
- source_word: עֲבָדֶיךָ
  english_pob_choice: servants
  chosen_spanish: siervos
  alternatives_spanish:
  - esclavos
  - servidores
  lexicon: HALOT
  rationale: Aquí el contexto es cortesano y de agentes reales; «siervos» mantiene la relación de subordinación sin introducir la dureza específica de «esclavos».
- source_word: חֵרַפְתָּ
  english_pob_choice: have mocked
  chosen_spanish: has insultado
  alternatives_spanish:
  - has reprochado
  - has burlado
  - has ultrajado
  lexicon: HALOT
  rationale: El verbo hebreo implica insultar, afrentar o despreciar con arrogancia. «Has insultado» comunica bien el contenido ofensivo en español y preserva la fuerza del reproche.
- source_word: אֲדֹנָי
  english_pob_choice: the Lord
  chosen_spanish: el Señor
  alternatives_spanish:
  - Señor
  lexicon: HALOT
  rationale: Como título divino, en español se expresa naturalmente con artículo definido. Se mantiene «Señor» para este título en lugar de sustituirlo por el nombre del pacto, dado que el hebreo aquí dice אֲדֹנָי.
- source_word: בְּרֹב רִכְבִּי
  english_pob_choice: With my many chariots
  chosen_spanish: Con la multitud de mis carros
  alternatives_spanish:
  - Con mis muchos carros
  - Con la abundancia de mis carros de guerra
  lexicon: HALOT
  rationale: רֹב señala abundancia/multitud y רֶכֶב aquí se refiere a carros de guerra. «La multitud de mis carros» conserva la grandiosidad del orgullo bélico y suena natural en español bíblico actual.
- source_word: אֲנִי עָלִיתִי
  english_pob_choice: I have gone up
  chosen_spanish: yo subí
  alternatives_spanish:
  - yo he subido
  - subí
  lexicon: HALOT
  rationale: El hebreo enfatiza la acción realizada; en discurso citado, el pretérito simple español transmite con naturalidad el avance arrogante del hablante. Se mantiene el pronombre «yo» para reflejar el énfasis implícito.
- source_word: מְרוֹם הָרִים
  english_pob_choice: to the heights of the mountains
  chosen_spanish: a las alturas de los montes
  alternatives_spanish:
  - a las alturas de las montañas
  - a la cumbre de los montes
  lexicon: HALOT
  rationale: מְרוֹם indica elevación/altura. «Alturas de los montes» conserva la imagen topográfica y suena más bíblica y clara que otras opciones.
- source_word: יַרְכְּתֵי לְבָנוֹן
  english_pob_choice: to the remotest parts of Lebanon
  chosen_spanish: a los rincones más remotos del Líbano
  alternatives_spanish:
  - a los recodos más lejanos del Líbano
  - a las partes más remotas del Líbano
  lexicon: HALOT
  rationale: יַרְכְּתֵי expresa los extremos, los confines o partes más retiradas. «Rincones más remotos» reproduce la idea de alejamiento extremo con una imagen idiomática aceptable en español.
- source_word: וְאֶכְרֹת
  english_pob_choice: I will cut down
  chosen_spanish: cortaré
  alternatives_spanish:
  - derribaré
  - talaré
  lexicon: HALOT
  rationale: En el contexto de árboles, «cortaré» es claro y directo; mantiene el valor prospectivo del imperfecto de la jactancia.
- source_word: קוֹמַת אֲרָזָיו
  english_pob_choice: its tall cedars
  chosen_spanish: sus cedros altos
  alternatives_spanish:
  - sus altos cedros
  - la altura de sus cedros
  lexicon: HALOT
  rationale: קוֹמָה es «estatura/altura». En español, «cedros altos» expresa el sentido sin forzar una construcción nominal pesada.
- source_word: מִבְחַר בְּרֹשָׁיו
  english_pob_choice: its choicest cypresses
  chosen_spanish: sus mejores cipreses
  alternatives_spanish:
  - sus cipreses escogidos
  - sus mejores abetos
  lexicon: HALOT
  rationale: מִבְחַר significa lo escogido, lo mejor. בְּרוֹשׁ es botánicamente incierto; «cipreses» sigue la opción común del POB en inglés, y «mejores» conserva la idea de selección.
- source_word: וְאָבוֹא
  english_pob_choice: and I will enter
  chosen_spanish: y entraré
  alternatives_spanish:
  - y entraré en
  - y vendré
  lexicon: HALOT
  rationale: En la secuencia poética, el verbo expresa penetrar en un lugar. «Entraré» es natural en español y conserva el movimiento de invasión.
- source_word: מְרוֹם קִצּוֹ
  english_pob_choice: its farthest height
  chosen_spanish: su altura más lejana
  alternatives_spanish:
  - su altura más extrema
  - su punto más alto y lejano
  lexicon: HALOT
  rationale: La frase combina elevación y extremo. «Altura más lejana» intenta mantener ambas ideas, tal como hace el inglés al unir altura y límite.
- source_word: יַעַר כַּרְמִלּוֹ
  english_pob_choice: its fruitful forest
  chosen_spanish: su bosque fértil
  alternatives_spanish:
  - su bosque fructífero
  - su bosque frondoso
  - su bosque fértil y frondoso
  lexicon: HALOT
  rationale: כַּרְמִל sugiere tierra fértil/orchard-land; el POB inglés optó por «fruitful forest». «Bosque fértil» conserva la tensión entre bosque y fertilidad sin sobreexplicar ni aplanar la imagen.
theological_decisions:
- issue: Título divino אֲדֹנָי y su referencia en un discurso de jactancia
  english_pob_reading: the Lord
  chosen_spanish_reading: el Señor
  alternative_spanish_readings:
  - Señor
  rationale: Se conserva el título divino como tal, sin sustituirlo por Yahvé, porque el hebreo aquí usa אֲדֹנָי. Esto mantiene la distinción auditada entre el nombre del pacto y el título reverencial.
  doctrine_reference: 'DOCTRINE.md: tratamiento de títulos divinos y distinción entre nombre y título'
- issue: La fuerza del verbo חֵרַפְתָּ en un contexto de desafío arrogante
  english_pob_reading: have mocked
  chosen_spanish_reading: has insultado
  alternative_spanish_readings:
  - has reprochado
  - has burlado
  - has ultrajado
  rationale: El texto describe una afrenta pública y despectiva contra Dios. «Insultado» comunica claramente la ofensa; se preserva la tensión semántica entre burla, reproche y desafío sin reducirla a simple broma.
  doctrine_reference: 'DOCTRINE.md: términos de reproche/blasfemia y precisión semántica'
translation_notes:
  revision_awareness: 'Se siguió el estado revisado del audit trail inglés: se evitó la intensificación innecesaria de la primera persona explícita («yo mismo») y se prefirió una fórmula más natural para el cierre, manteniendo la imagen de «fruitful forest» en vez de una metáfora más pesada como «forest orchard».'
  spanish_consistency_notes:
  - Se mantuvo «Señor» para אֲדֹנָי, coherente con el tratamiento del título divino en este pasaje.
  - Se usó «siervos» en lugar de «esclavos» por el contexto cortesano y militar, sin perder subordinación.
  - Se preservó el tono de jactancia agresiva con verbos directos («insultado», «subí», «cortaré», «entraré»).
  - Se conservó la ambigüedad botánica de בְּרֹשׁ al dejarla como «cipreses» con nota de incertidumbre lexical.
  - Se evitó una traducción demasiado literal de «יַעַר כַּרְמִלּוֹ»; «bosque fértil» mantiene la tensión entre bosque y terreno fértil.
