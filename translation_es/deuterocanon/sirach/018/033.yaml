translation:
  language: es
  text: No seas glotón ni borracho[a][b], cuando no tienes nada en la bolsa[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'El testigo griego amplía la advertencia: «No llegues a ser pobre por darte festines con dinero prestado, cuando no tienes nada en tu bolsa».'
    reason: alternative_reading
  - marker: b
    text: La pareja hebrea denota los vicios de comer y beber en exceso; «borracho» preserva mejor la fuerza moral del paralelo que una opción más débil como «bebedor».
    reason: lexical_decision
  - marker: c
    text: El hebreo בַּכִּים es difícil; el paralelo griego lee «en tu bolsa» (ἐν μαρσιππίῳ), lo que apoya el sentido económico adoptado aquí.
    reason: textual_variant
lexical_decisions:
- source_word: זוֹלֵל
  english_pob_choice: glutton
  chosen_spanish: glotón
  alternatives_spanish:
  - glotón y derrochador
  - persona dada a los excesos en la comida
  lexicon: HALOT
  rationale: El hebreo expresa el vicio de comer con exceso o de forma desordenada; en español, «glotón» conserva bien ese valor moral y la fuerza proverbial de la advertencia. Como el contexto lo une con la bebida, la solución debe sonar breve y paralela.
- source_word: וְסוֹבֵא
  english_pob_choice: drunkard
  chosen_spanish: bebedor
  alternatives_spanish:
  - borracho
  - aficionado al vino
  lexicon: HALOT
  rationale: La forma hebrea apunta a alguien entregado al exceso en la bebida. «Bebedor» mantiene la idea de hábito vicioso sin forzar una denominación demasiado coloquial, y deja el paralelismo con «glotón» más natural en español.
- source_word: וּמְאוּמָה אֵין
  english_pob_choice: when there is nothing
  chosen_spanish: cuando no tienes nada
  alternatives_spanish:
  - y no tienes nada
  - mientras no tienes nada
  lexicon: HALOT
  rationale: La cláusula hebrea marca una situación de carencia absoluta; «cuando no tienes nada» expresa bien la condición y suena fluido en español. La forma de segunda persona sigue el tono proverbial de la admonición.
- source_word: בַּכִּים
  english_pob_choice: in your purse
  chosen_spanish: en la bolsa
  alternatives_spanish:
  - en tu bolsa
  - en tu monedero
  - en el bolso
  lexicon: HALOT + Greek ἐν μαρσιππίῳ
  rationale: El hebreo es difícil, y el paralelo griego apoya claramente el sentido de una bolsa o bolsa de dinero. «Bolsa» es una equivalencia natural en español para un pequeño recipiente de dinero y evita una imagen demasiado moderna o demasiado específica.
theological_decisions:
- issue: Tensión entre el hebreo conservado y el paralelo griego en la cláusula final
  english_pob_reading: 'The Hebrew vice warning is primary, but the final phrase is rendered economically in light of the Greek parallel: ''when there is nothing in your purse.'''
  chosen_spanish_reading: Se conserva la advertencia hebrea contra la glotonería y la bebida, y la cláusula final se entiende como carencia de dinero en la bolsa.
  alternative_spanish_readings:
  - No seas glotón y bebedor, y no hay nada en la bolsa.
  - No seas glotón y bebedor, cuando no hay nada en tu bolsa.
  rationale: La tradición hebrea disponible presenta una forma difícil al final; el griego paralelo confirma que la imagen es económica. Por eso la traducción principal no incorpora la expansión griega sobre «pedir prestado» ni sustituye el aviso de vicios por una paráfrasis más larga. Se mantiene la tensión textual en favor de una lectura prudente y auditable.
  doctrine_reference: 'PHILOSOPHY.md: traducir desde el hebreo cuando se conserva, usando el paralelo griego como apoyo real sin sobrepasar innecesariamente el testimonio hebreo.'
translation_notes:
  revision_awareness: El pasaje fue revisado en el último pase y quedó sin cambios, con acuerdo alto entre el hebreo base y el paralelo griego. No se requieren ajustes adicionales a la lectura inglesa auditada.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma del proyecto cuando aparezca el nombre divino, aunque este versículo no lo contiene.
  - Se evita «SEÑOR» y otras sustituciones no pertinentes al texto.
  - «Glotón» y «bebedor» preservan el tono sapiencial breve y proverbial del hebreo.
  - La solución final usa una imagen económica clara sin importar al texto una expansión interpretativa innecesaria.
