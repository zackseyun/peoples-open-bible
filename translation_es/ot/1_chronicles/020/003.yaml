translation:
  language: es
  text: Sacó al pueblo que estaba en ella y los puso a trabajar con sierras[a], herramientas de hierro y hachas[b]. Así hizo David a todas las ciudades de los amonitas. Luego David y todo el pueblo regresaron a Jerusalén.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «los puso bajo sierras, herramientas de hierro y herramientas de corte»; algunos entienden que el verso, influido por 2 Samuel 12:31, significa que David los ejecutó con tales instrumentos.'
    reason: alternative_reading
  - marker: b
    text: Los términos hebreos para estos instrumentos son en parte inciertos; la expresión traducida aquí como «herramientas de hierro» y «hachas» puede referirse más generalmente a implementos cortantes de hierro.
    reason: lexical_alternative
lexical_decisions:
- source_word: הוֹצִיא
  english_pob_choice: brought out
  chosen_spanish: sacó
  alternatives_spanish:
  - hizo salir
  - trajo fuera
  lexicon: HALOT
  rationale: El hifil de יצא expresa sacar/hacer salir. «Sacó» reproduce la acción concreta de retirar a la gente de la ciudad y suena natural en español.
- source_word: וַיָּשַׂר
  english_pob_choice: put them to work
  chosen_spanish: los puso a trabajar
  alternatives_spanish:
  - los cortó con
  - los sometió a
  lexicon: HALOT
  rationale: 'Sigo la lectura principal del POB en Chronicles: no importar sin más la ejecución violenta de 2 Samuel. «Los puso a trabajar» mantiene la idea de asignación con herramientas y evita añadir un sentido no exigido por este verso.'
- source_word: בַּמְּגֵרָה
  english_pob_choice: with saws
  chosen_spanish: con sierras
  alternatives_spanish:
  - con la sierra
  - con sierras de mano
  lexicon: HALOT
  rationale: מְגֵרָה significa «sierra». El plural español es idiomático porque la lista enumera instrumentos en conjunto.
- source_word: בַחֲרִיצֵי הַבַּרְזֶל
  english_pob_choice: with iron tools
  chosen_spanish: herramientas de hierro
  alternatives_spanish:
  - instrumentos de hierro
  - útiles de hierro
  lexicon: HALOT
  rationale: La expresión hebrea es incierta en cuanto al tipo exacto de instrumento. «Herramientas de hierro» conserva la materialidad y la imprecisión sin forzar una identificación más específica que la que permite el texto.
- source_word: וּבַמְּגֵרוֹת
  english_pob_choice: and axes
  chosen_spanish: y hachas
  alternatives_spanish:
  - y sierras
  - y herramientas de corte
  lexicon: HALOT
  rationale: Aunque la forma se relaciona con la raíz de «sierra», en contexto muchos entienden otro instrumento cortante. «Hachas» ofrece una distinción comprensible dentro de la lista y mantiene el carácter de implementos de corte.
- source_word: וְכֵן יַעֲשֶׂה
  english_pob_choice: Thus David did
  chosen_spanish: Así hizo David
  alternatives_spanish:
  - Y así David hizo
  - De este modo hizo David
  lexicon: HALOT
  rationale: La fórmula resumidora en español queda natural como «Así hizo David», que conserva el valor de resumen narrativo.
- source_word: לְכֹל עָרֵי בְנֵי עַמּוֹן
  english_pob_choice: to all the cities of the Ammonites
  chosen_spanish: con todas las ciudades de los hijos de Amón
  alternatives_spanish:
  - a todas las ciudades de los amonitas
  lexicon: HALOT
  rationale: Conservo la forma filial del hebreo («hijos de Amón») porque el texto masorético la usa de manera explícita. La preposición «con» refleja el uso idiomático español en la cláusula anterior y evita una torpe repetición de «a» en este contexto de aplicación general.
- source_word: וַיָּשָׁב ... יְרוּשָׁלִָם
  english_pob_choice: returned to Jerusalem
  chosen_spanish: regresaron a Jerusalén
  alternatives_spanish:
  - volvieron a Jerusalén
  - retornaron a Jerusalén
  lexicon: HALOT
  rationale: «Regresaron» es natural y claro en español narrativo. Pluralizo en concordancia con «David y todo el pueblo», tal como hace el hebreo al referir la acción conjunta.
theological_decisions:
- issue: Si el verso describe ejecución cruel o asignación a trabajo forzado
  english_pob_reading: The main text renders David as putting the captured people to work with implements, while preserving the harsher alternative in a footnote.
  chosen_spanish_reading: El texto principal dice que David los puso a trabajar con instrumentos; la nota mantiene la posibilidad más dura.
  alternative_spanish_readings:
  - los ejecutó con sierras, herramientas de hierro y hachas
  - los sometió a sierras, herramientas de hierro y hachas
  rationale: La redacción de Crónicas no obliga a importar la lectura más violenta de 2 Samuel. Para respetar la primacía del texto fuente y la cautela del POB, el cuerpo principal conserva la lectura menos determinada y la nota deja abierta la alternativa histórica y textual.
  doctrine_reference: Translation philosophy §§1, 3
translation_notes:
  revision_awareness: La versión inglesa revisada sustituyó «iron picks» por «iron tools» para no especificar demasiado el término hebreo incierto. La redacción española sigue esa revisión y evita concretar el instrumento más allá de lo que el hebreo y la auditoría inglesa apoyan.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como término por defecto solo cuando aparezca el nombre divino; este verso no lo contiene.
  - «Hijos de Amón» conserva el giro genealógico del hebreo frente al etnónimo simplificado.
  - La ambigüedad verbal en וַיָּשַׂר se resuelve en el texto principal con una lectura menos violenta, pero sin ocultar la alternativa en nota.
  - 'Se prefieren sustantivos concretos y neutros en español: «sierras», «herramientas de hierro», «hachas».'
