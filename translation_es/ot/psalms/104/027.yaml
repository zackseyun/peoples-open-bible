translation:
  language: es
  text: Todos ellos esperan que tú les des su alimento a su tiempo[a][b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «miran expectantemente hacia ti» o «esperan en ti».
    reason: lexical_alternative
  - marker: b
    text: O «en su tiempo debido» o «a su debido tiempo».
    reason: lexical_alternative
lexical_decisions:
- source_word: כֻּלָּם
  english_pob_choice: All of them
  chosen_spanish: Todos ellos
  alternatives_spanish:
  - Todos
  - Ellos todos
  lexicon: HALOT
  rationale: El hebreo expresa un conjunto completo y distributivo. «Todos ellos» conserva ese valor sin volver la frase rígida o ambigua en español.
- source_word: אֵלֶיךָ
  english_pob_choice: for you
  chosen_spanish: de ti
  alternatives_spanish:
  - para ti
  - hacia ti
  lexicon: HALOT
  rationale: En este contexto, el verbo de esperar/aguardar expectativamente se orienta hacia Dios como fuente de provisión. «De ti» funciona en español como dependencia dirigida a Dios sin añadir una construcción menos natural aquí.
- source_word: יְשַׂבֵּרוּן
  english_pob_choice: wait
  chosen_spanish: esperan
  alternatives_spanish:
  - aguardan
  - esperan confiados
  - miran expectantemente
  lexicon: HALOT
  rationale: La forma piel comunica espera expectante, no mera demora pasiva. «Esperan» es natural y suficientemente amplio; «aguardan» también sería posible, pero «esperan de ti» preserva bien la relación de dependencia.
- source_word: לָתֵת
  english_pob_choice: to give
  chosen_spanish: para que les des
  alternatives_spanish:
  - para darles
  - a fin de darles
  lexicon: HALOT
  rationale: 'El infinitivo expresa el contenido de la espera: recibir alimento por la acción de Dios. En español, la estructura final con subjuntivo reproduce con claridad esa finalidad/contenido.'
- source_word: אָכְלָם
  english_pob_choice: their food
  chosen_spanish: su alimento
  alternatives_spanish:
  - su comida
  - su sustento
  lexicon: HALOT
  rationale: El sustantivo es general y no exige un matiz de presa. «Su alimento» es preciso y abarca a las criaturas mencionadas en el contexto.
- source_word: בְּעִתּוֹ
  english_pob_choice: in its time
  chosen_spanish: a su tiempo
  alternatives_spanish:
  - en su tiempo
  - en el momento debido
  - a su debido tiempo
  lexicon: HALOT
  rationale: La expresión apunta al tiempo señalado o apropiado. «A su tiempo» es breve, fiel y bien asentado en español bíblico sin sonar arcaico.
theological_decisions:
- issue: Dependencia de la creación de la provisión divina
  english_pob_reading: The verse is rendered as describing creatures' dependence on God for provision without adding stronger doctrinal language beyond the Hebrew.
  chosen_spanish_reading: El verso presenta a todas las criaturas esperando de Dios su alimento, manteniendo la dependencia creatural sin añadir explicaciones teológicas externas.
  alternative_spanish_readings:
  - Todos ellos confían en ti para recibir su alimento.
  - Todos ellos esperan en ti con esperanza
  rationale: La formulación conserva la idea teológica central del salmo —Dios como proveedor de toda criatura— sin transformar la espera en una paráfrasis devocional más fuerte que el hebreo.
  doctrine_reference: Translation philosophy §§1, 3, 6
translation_notes:
  revision_awareness: El texto inglés auditado ya había sido revisado y quedó sin cambios; esta versión española sigue ese estado de alta concordancia y mantiene las alternativas léxicas donde el hebreo admite más de un matiz.
  spanish_consistency_notes:
  - Se usa «Dios» implícito por el pronombre de segunda persona singular, sin necesidad de introducir el nombre divino en este versículo.
  - «Alimento» se mantiene por su amplitud semántica; no se restringe a «presa» porque el contexto incluye a todas las criaturas.
  - La puntuación reproduce una sola cláusula principal con infinitivo final, en línea con la sintaxis hebrea y con la solución inglesa auditada.
