    rationale: Aunque intenta reflejar «So I», en español suena calcado del inglés y no corresponde bien al flujo normal de una declaración profética.
  - severity: medium
    issue: La nota al pie [a] está anclada en «Efraín» pero comenta «podredumbre/decadencia»
    rationale: El marcador debe aparecer sobre la palabra o frase relevante. Tal como está, induce a pensar que la nota trata sobre «Efraín».
  - severity: medium
    issue: La nota al pie contiene el anglicismo no traducido «rottenness»
    rationale: La nota debe estar plenamente en español. Aquí corresponde «podredumbre» o «corrupción».
  revised_spanish_text: Así que yo soy como polilla para Efraín, y como podredumbre[a] para la casa de Judá.
