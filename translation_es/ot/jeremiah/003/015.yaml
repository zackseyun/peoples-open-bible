translation:
  language: es
  text: Y les daré pastores[b] conforme a mi corazón[a], y ellos los pastorearán con conocimiento y entendimiento[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «según mi corazón». La expresión hebrea indica conformidad con la voluntad o el deseo de Dios.
    reason: lexical_alternative
  - marker: b
    text: «Pastores» también puede traducirse «shepherds» en el sentido más amplio de quienes cuidan al pueblo de Dios; la imagen hebrea es la metáfora de pastoreo, no un oficio eclesiástico específico.
    reason: lexical_alternative
  - marker: c
    text: O «con conocimiento e insight» o «con conocimiento y discernimiento». El hebreo combina dos cualidades complementarias del cuidado pastoral.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְנָתַתִּי
  english_pob_choice: And I will give
  chosen_spanish: Y yo les daré
  alternatives_spanish:
  - Y daré
  - Entonces les daré
  lexicon: HALOT
  rationale: El perfecto profético con waw se entiende como promesa futura; en español, el futuro simple expresa bien esa promesa. Se explicita 'yo' por claridad y porque el hebreo ya marca la primera persona.
- source_word: לָכֶם
  english_pob_choice: you
  chosen_spanish: les
  alternatives_spanish:
  - a ustedes
  - para ustedes
  lexicon: HALOT
  rationale: Es complemento indirecto; 'les daré' ya incorpora la noción de 'a ustedes' de forma natural en español.
- source_word: רֹעִים
  english_pob_choice: shepherds
  chosen_spanish: pastores
  alternatives_spanish:
  - pastores espirituales
  - guías
  lexicon: HALOT
  rationale: '''Pastores'' conserva la imagen hebrea de רֹעִים y es la equivalencia natural en español para el oficio/figura de cuidado del rebaño. Se evita ''líderes'' por perder la metáfora.'
- source_word: כְּלִבִּי
  english_pob_choice: after my own heart
  chosen_spanish: conforme a mi corazón
  alternatives_spanish:
  - según mi corazón
  - de acuerdo con mi corazón
  lexicon: HALOT
  rationale: La expresión idiomática comunica conformidad con la voluntad, el deseo y la aprobación de Yahvé. 'Conforme a mi corazón' es fiel, idiomática y evita una interpretación meramente afectiva.
- source_word: וְרָעוּ
  english_pob_choice: and they will shepherd
  chosen_spanish: y ellos los pastorearán
  alternatives_spanish:
  - y los apacentarán
  - y los guiarán como pastores
  lexicon: HALOT
  rationale: Se conserva la repetición verbal del campo de 'pastorear' para mantener la imagen pastoral del texto. 'Apacentarán' es posible, pero en español suena más restringido a alimentar que a gobernar/cuidar.
- source_word: דֵּעָה
  english_pob_choice: knowledge
  chosen_spanish: conocimiento
  alternatives_spanish:
  - saber
  - conocimiento profundo
  lexicon: HALOT
  rationale: '''Conocimiento'' corresponde al sustantivo hebreo y mantiene la pareja conceptual con el término siguiente sin sobrecargar el texto.'
- source_word: וְהַשְׂכֵּיל
  english_pob_choice: and understanding
  chosen_spanish: e inteligencia
  alternatives_spanish:
  - e entendimiento
  - e discernimiento
  lexicon: HALOT
  rationale: '''הַשְׂכֵּיל'' expresa comprensión prudente/insight. ''Inteligencia'' en español bíblico y contemporáneo puede comunicar esa capacidad de comprender con acierto; se usa ''e'' por eufonía ante ''inteligencia''.'
theological_decisions:
- issue: Naturaleza de los 'pastores' prometidos
  english_pob_reading: shepherds refers to human leaders appointed by God, expressed with the shepherd metaphor
  chosen_spanish_reading: pastores como líderes humanos puestos por Yahvé, conservando la metáfora pastoral
  alternative_spanish_readings:
  - pastores en sentido eclesiástico específico
  - gobernantes
  rationale: El contexto de Jeremías promete restauración de liderazgo para el pueblo; traducir literalmente 'pastores' preserva la metáfora sin importar oficios eclesiales posteriores. La elección mantiene la tensión entre imagen pastoral y función de gobierno/cuidado.
  doctrine_reference: Jeremías 3:15; filosofía de traducción POB §§1, 6
- issue: Sentido de 'conforme a mi corazón'
  english_pob_reading: leaders aligned with God's own will and character
  chosen_spanish_reading: líderes/pastores alineados con la voluntad y el carácter de Yahvé
  alternative_spanish_readings:
  - amados emocionalmente por Dios
  - agradables a Dios
  rationale: La expresión hebrea apunta a conformidad con la voluntad divina, no solo a afecto emocional. 'Conforme a mi corazón' conserva la ambigüedad productiva y la fuerza de aprobación divina.
  doctrine_reference: Jeremías 3:15; filosofía de traducción POB §3
translation_notes:
  revision_awareness: El borrador sigue de cerca el texto hebreo de WLC y el acuerdo de la auditoría inglesa. Se conserva la metáfora de 'pastores', la idiomática 'conforme a mi corazón' y la pareja semántica 'conocimiento / inteligencia' sin diluirla en una sola idea. No se introdujeron lecturas textuales alternativas adicionales porque la fuente y la auditoría muestran alto acuerdo.
  spanish_consistency_notes:
  - Se usa 'Yahvé' para el nombre divino cuando aparece explícito en el razonamiento, aunque este versículo no lo contiene en forma gráfica; la decisión teológica se mantiene en la nota.
  - '''Pastores'' se mantiene consistente con la metáfora hebrea y con el uso POB de no reemplazarla por ''pastores'' clericales o ''líderes''.'
  - '''Conocimiento e inteligencia'' conserva la distinción entre דֵּעָה y הַשְׂכֵּיל, como la auditoría inglesa preserva ''knowledge and understanding''.'
  - Se prefiere español moderno y eufónico ('e inteligencia') sin perder fidelidad al hebreo.
