  glossary_alignment: 'Buena alineación con la terminología del proyecto: יהוה -> ‘Yahvé’; אֱלֹהִים -> ‘Dios’. No hay conflicto doctrinal ni léxico relevante. ‘Adoraron’ para וַיִּשְׁתַּחֲוּ y ‘se inclinaron’ para וַיִּקְּדוּ preservan la distinción documentada en el POB.'
