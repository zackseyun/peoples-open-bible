theological_decisions:
- issue: Rendering the fiscal language in a royal context
  chosen_reading: Differentiate the first payment as 'tribute' and the second as 'taxes' in English
  alternative_readings:
  - Render both simply as 'tribute'
  - Render both simply as 'taxes'
  rationale: The Greek repeats ἀναφέρουσιν but only explicitly names φόρους in the second clause. Using 'tribute' first and 'taxes' second reflects the royal-payment context while preserving the Greek's progression from general delivery to explicit taxation. This is not a doctrinally contested issue, but it is a significant interpretive choice affecting how the verse reads.
  doctrine_reference: Translation philosophy §5 (consistency of key terms, or documented exception)
