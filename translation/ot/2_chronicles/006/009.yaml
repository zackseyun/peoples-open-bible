id: 2CH.6.9
reference: 2 Chronicles 6:9
source:
  edition: WLC
  text: רַ֣ק אַתָּ֔ה לֹ֥א תִבְנֶ֖ה הַ/בָּ֑יִת כִּ֤י בִנְ/ךָ֙ הַ/יּוֹצֵ֣א מֵֽ/חֲלָצֶ֔י/ךָ הֽוּא יִבְנֶ֥ה הַ/בַּ֖יִת לִ/שְׁמִֽ/י־׃
translation:
  text: Yet you shall not build the house[a]; rather, your son, who will come from your own body[b], shall build the house for my name.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literally, 'from your loins,' an idiom meaning a direct bodily descendant.
    reason: lexical_alternative
  - marker: b
    text: Or 'the temple'; Hebrew 'the house,' a common designation for the temple.
    reason: lexical_alternative
lexical_decisions:
- source_word: רַק
  chosen: Yet
  alternatives:
  - Only
  - Nevertheless
  - Except that
  lexicon: HALOT
  rationale: Here רַק introduces a restriction/qualification to the preceding divine approval. 'Yet' reads naturally in English while preserving the adversative force better than a bare 'only.'
- source_word: תִבְנֶה הַבָּיִת
  chosen: build the house
  alternatives:
  - build a house
  - build the temple
  lexicon: HALOT
  rationale: The definite article supports 'the house.' In this context it refers to the temple, but 'the house' preserves the Hebrew wording and the established temple idiom without over-specifying in the main text.
- source_word: כִּי
  chosen: rather
  alternatives:
  - for
  - but
  - instead
  lexicon: HALOT
  rationale: After the negation, כִּי introduces the contrasting positive statement about the son. 'Rather' captures the corrective/contrastive sense in smooth English better than a strictly causal 'for.'
- source_word: בִנְךָ
  chosen: your son
  alternatives:
  - a son of yours
  lexicon: HALOT
  rationale: Straightforward filial reference with 2ms suffix; 'your son' is the natural and sufficiently literal rendering.
- source_word: הַיּוֹצֵא מֵחֲלָצֶיךָ
  chosen: who will come from your own body
  alternatives:
  - who will come from your loins
  - who will come from your body
  - who will issue from your loins
  lexicon: HALOT
  rationale: The idiom literally refers to what comes from one's loins, denoting direct physical descent. 'From your own body' communicates the meaning clearly in modern English while avoiding archaic phrasing; 'own' preserves the emphatic personal connection.
- source_word: הוּא
  chosen: he
  alternatives:
  - he himself
  lexicon: HALOT
  rationale: The independent pronoun is emphatic. English can preserve this adequately with explicit 'he' before the verb; adding 'himself' would over-intensify the emphasis.
- source_word: יִבְנֶה הַבַּיִת
  chosen: he shall build the house
  alternatives:
  - he will build the house
  - he shall build the temple
  lexicon: HALOT
  rationale: Future statement with solemn divine force is well represented by 'shall.' Repeating 'the house' maintains lexical consistency within the verse.
- source_word: לִשְׁמִי
  chosen: for my name
  alternatives:
  - for the sake of my name
  - to my name
  lexicon: HALOT
  rationale: This common biblical expression indicates dedication to and representation of God's name. 'For my name' is both literal and idiomatic in temple-building contexts.
