  text: וְ/הִשִּׂ֨יג לָ/כֶ֥ם דַּ֨יִשׁ֙ אֶת בָּצִ֔יר וּ/בָצִ֖יר יַשִּׂ֣יג אֶת זָ֑רַע וַ/אֲכַלְתֶּ֤ם לַחְמְ/כֶם֙ לָ/שֹׂ֔בַע וִֽ/ישַׁבְתֶּ֥ם לָ/בֶ֖טַח בְּ/אַרְצְ/כֶֽם־־׃
