revisions:
- from: Ahora, al tercer día[a], he aquí, un hombre vino del campamento, de parte de Saúl, con sus vestidos rasgados y tierra sobre su cabeza[b]. Y cuando llegó a David, se postró en tierra[c] y se inclinó.
  to: Ahora, al tercer día, he aquí, un hombre vino del campamento, de junto a Saúl[a], con sus vestidos rasgados y tierra sobre su cabeza[b]. Y cuando llegó a David, cayó en tierra y se postró[c].
  rationale: 'La revisión corrige el principal falso sentido introducido por ''de parte de Saúl'', restableciendo la idea de procedencia/asociación. También separa los dos verbos finales del hebreo: primero el hombre cae en tierra, luego se postra. Además, reancla las notas a las palabras correctas y mantiene un español bíblico claro y natural.'
