base_translation:
  language: en
  yaml_path: translation/deuterocanon/4_maccabees/005/004.yaml
  text: But when many had been seized[a], one man, first from the company, a Hebrew named Eleazar, a priest by birth, learned in the law, advanced in age, and known to many around the tyrant because of his age[b], opened his mouth.
  footnotes:
  - marker: a
    text: Or 'one man, first from the group.' The Greek literally says 'from the flock,' using a metaphor for the company of Hebrews.
    reason: lexical_alternative
  - marker: b
    text: Or 'an expert in the law.' The Greek describes Eleazar as learned with respect to the law, not as a legal professional in the modern sense.
    reason: lexical_alternative
