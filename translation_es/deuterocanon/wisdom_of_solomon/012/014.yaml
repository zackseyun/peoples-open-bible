translation:
  language: es
  text: Ni rey ni tirano podrá mirarte a la cara[a] por aquellos a quienes castigaste.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «sostener tu mirada» o «ponerse frente a ti»; el verbo griego expresa de manera vívida una confrontación directa.
    reason: lexical_alternative
lexical_decisions:
- source_word: βασιλεὺς
  english_pob_choice: king
  chosen_spanish: rey
  alternatives_spanish:
  - monarca
  - soberano
  lexicon: LSJ
  rationale: El título político común βασιλεύς se rinde naturalmente como «rey» en español, manteniendo la distinción frente a τύραννος.
- source_word: τύραννος
  english_pob_choice: tyrant
  chosen_spanish: tirano
  alternatives_spanish:
  - déspota
  - gobernante absoluto
  lexicon: LSJ
  rationale: «Tirano» conserva la fuerza negativa del término griego y la contraposición con «rey» sin suavizarla.
- source_word: ἀντοφθαλμῆσαι
  english_pob_choice: look you in the face
  chosen_spanish: mirarte a la cara
  alternatives_spanish:
  - sostener tu mirada
  - ponerse frente a ti
  - mirarte a los ojos
  lexicon: LSJ
  rationale: La expresión griega es vívida y de confrontación directa; «mirarte a la cara» comunica esa imagen de forma natural en español sin perder el matiz de enfrentamiento.
- source_word: δυνήσεταί
  english_pob_choice: will be able
  chosen_spanish: podrá
  alternatives_spanish:
  - será capaz de
  - tendrá poder para
  lexicon: LSJ
  rationale: El futuro de δύναμαι se expresa de manera directa con «podrá», que mantiene la idea de capacidad futura.
- source_word: σοι
  english_pob_choice: you
  chosen_spanish: te
  alternatives_spanish:
  - a ti
  - delante de ti
  lexicon: LSJ
  rationale: El dativo de la persona confrontada se naturaliza en español con el clítico «te» en la expresión idiomática «mirarte a la cara».
- source_word: ἐκόλασας
  english_pob_choice: you punished
  chosen_spanish: castigaste
  alternatives_spanish:
  - corrigiste
  - disciplinaste
  lexicon: LSJ
  rationale: Aquí κολάζω tiene sentido punitivo; «castigaste» preserva mejor el valor de juicio y sanción que una corrección meramente pedagógica.
theological_decisions:
- issue: Fuerza de la confrontación ante Dios
  english_pob_reading: No earthly ruler can confront God over his acts of punishment.
  chosen_spanish_reading: Ningún rey ni tirano puede enfrentar directamente a Dios por los castigos que él impone.
  alternative_spanish_readings:
  - Ningún rey ni tirano puede pedir cuentas a Dios por lo que ha castigado.
  - Ningún rey ni tirano puede oponerse al juicio de Dios.
  rationale: El griego usa un verbo de confrontación cara a cara; la traducción conserva esa imagen sin convertirla en una formulación jurídica más fuerte de la que el texto exige.
  doctrine_reference: Preservar la tensión teológica sin resolverla excesivamente.
translation_notes:
  revision_awareness: 'Se corrigió la omisión previa del anclaje de nota: el marcador [a] aparece ahora en el texto principal sobre la frase correspondiente.'
  spanish_consistency_notes:
