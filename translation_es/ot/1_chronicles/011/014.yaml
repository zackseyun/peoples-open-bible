revisions:
- from: Y se pusieron en medio del terreno, lo libraron[a], hirieron a los filisteos, y Yahvé otorgó una gran salvación.
  to: Y tomaron su posición en medio de la parcela y la libraron[a], y derrotaron a los filisteos, y Yahvé dio una gran victoria.
  rationale: Se fortaleció el matiz marcial de וַיִּתְיַצְּבוּ con 'tomaron su posición', se precisó חֶלְקָה como 'parcela', se corrigió el referente femenino del objeto, se reflejó mejor el sentido bélico de נכה con 'derrotaron', y se ajustó la cláusula final al contexto militar y al rastro auditado con 'Yahvé dio una gran victoria', conservando alternativas en nota para תשועה/נצל.
