translation:
  language: es
  text: 'Y mientras él estaba contando al rey cómo había devuelto a la vida[a] al muerto, he aquí la mujer cuyo hijo él había devuelto a la vida estaba clamando al rey por su casa y por su campo. Y Guejazi dijo: «Mi señor el rey, esta es la mujer[b], y este es su hijo, al cual Eliseo había devuelto a la vida».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «cómo había revivido al muerto» / «cómo había hecho volver a la vida al muerto». El hebreo usa el causativo de «vivir» (החיה).'
    reason: lexical_alternative
  - marker: b
    text: '«He aquí» señala la coincidencia repentina y llamativa: la mujer llegó justo en ese momento.'
    reason: cultural_note
lexical_decisions:
- source_word: וַיְהִי הוּא מְסַפֵּר
  english_pob_choice: And as he was telling
  chosen_spanish: Y mientras él estaba contando
  alternatives_spanish:
  - Y aconteció que, mientras él contaba
  - Y al estar él contando
  lexicon: HALOT
  rationale: La secuencia narrativa con וַיְהִי introduce una circunstancia temporal; en español, «Y mientras» comunica bien el trasfondo sin volverse rígido. El participio מְסַפֵּר expresa acción en curso, de ahí «estaba contando».
- source_word: לַמֶּלֶךְ
  english_pob_choice: the king
  chosen_spanish: al rey
  alternatives_spanish:
  - para el rey
  - ante el rey
  lexicon: HALOT
  rationale: El hebreo marca destinatario indirecto; en español, con «contar» lo natural es «al rey». Mantiene la relación discursiva sin alterar el sentido.
- source_word: אֵת אֲשֶׁר הֶחֱיָה אֶת הַמֵּת
  english_pob_choice: how he had restored the dead to life
  chosen_spanish: cómo había devuelto a la vida al muerto
  alternatives_spanish:
  - cómo había revivido al muerto
  - cómo había hecho volver a la vida al muerto
  lexicon: HALOT
  rationale: הֶחֱיָה es causativo de «vivir», por lo que conviene preservar la fuerza de «hacer vivir / devolver a la vida». «Al muerto» refleja el singular colectivo del hebreo y evita diluir la referencia concreta.
- source_word: וְהִנֵּה
  english_pob_choice: behold
  chosen_spanish: he aquí
  alternatives_spanish:
  - mira
  - y he aquí
  lexicon: HALOT
  rationale: La fórmula introduce una coincidencia súbita y llamativa. «He aquí» conserva ese efecto discursivo con tono bíblico comprensible en español.
- source_word: הָאִשָּׁה אֲשֶׁר הֶחֱיָה אֶת בְּנָהּ
  english_pob_choice: the woman whose son he had restored to life
  chosen_spanish: la mujer que había devuelto a la vida a su hijo
  alternatives_spanish:
  - la mujer cuyo hijo había revivido
  - la mujer a quien había devuelto a la vida su hijo
  lexicon: HALOT
  rationale: El hebreo dice literalmente que «hizo vivir» a su hijo; en español, la relación posesiva se expresa de forma natural con «a su hijo». Se mantiene el mismo valor causativo de הֶחֱיָה que en la primera cláusula.
- source_word: צֹעֶקֶת אֶל הַמֶּלֶךְ
  english_pob_choice: was crying out to the king
  chosen_spanish: estaba clamando al rey
  alternatives_spanish:
  - estaba gritando al rey
  - estaba pidiendo ayuda al rey
  lexicon: HALOT
  rationale: צעק suele indicar un clamor intenso, a menudo por auxilio o justicia. «Clamando» conserva mejor esa intensidad que «pidiendo», y evita volverlo meramente burocrático.
- source_word: עַל בֵּיתָהּ וְעַל שָׂדָהּ
  english_pob_choice: about her house and about her field
  chosen_spanish: por su casa y por su campo
  alternatives_spanish:
  - acerca de su casa y de su campo
  - por su casa y por su tierra
  lexicon: HALOT
  rationale: En este contexto, עַל introduce el asunto de su reclamación. «Por» expresa bien la causa o el motivo de su clamor. שָׂדֶה se traduce como «campo», más preciso que «tierra» en este caso de propiedad concreta.
- source_word: אֲדֹנִי הַמֶּלֶךְ
  english_pob_choice: My lord the king
  chosen_spanish: Mi señor, el rey
  alternatives_spanish:
  - Mi señor, oh rey
  - Mi amo, el rey
  lexicon: HALOT
  rationale: La fórmula cortesana pide una equivalencia natural y reverente. «Mi señor, el rey» conserva el vocativo sin cargarlo con una dureza servil innecesaria.
- source_word: זֹאת הָאִשָּׁה וְזֶה בְּנָהּ
  english_pob_choice: this is the woman, and this is her son
  chosen_spanish: esta es la mujer, y este es su hijo
  alternatives_spanish:
  - ésta es la mujer, y éste es su hijo
  - he aquí la mujer, y he aquí su hijo
  lexicon: HALOT
  rationale: Los demostrativos cumplen función identificadora en la escena. «Esta es... este es...» resulta claro y directo en español, respetando el gesto de señalar a los presentes.
- source_word: אֲשֶׁר הֶחֱיָה אֱלִישָׁע
  english_pob_choice: whom Elisha restored to life
  chosen_spanish: al cual devolvió a la vida Eliseo
  alternatives_spanish:
  - a quien Eliseo revivió
  - a quien Eliseo había devuelto a la vida
  lexicon: HALOT
  rationale: Se mantiene la misma opción verbal para הֶחֱיָה que en el resto del versículo. «Al cual» es formal y evita ambigüedad sintáctica en la cláusula relativa; el orden final «Eliseo» refleja el hebreo y subraya el sujeto del acto.
theological_decisions:
- issue: Conservar la fuerza causativa de הֶחֱיָה sin suavizarla a una simple idea de 'revivir'.
  english_pob_reading: '''restored the dead to life'' / ''restored to life'''
  chosen_spanish_reading: '''devolver a la vida'' / ''haber devuelto a la vida'''
  alternative_spanish_readings:
  - '''revivir'''
  - '''hacer volver a la vida'''
  rationale: El texto repite tres veces el verbo causativo; en español conviene sostener la misma idea para no perder la insistencia narrativa. 'Devolver a la vida' comunica bien el acto de hacer vivir a otro sin introducir una explicación doctrinal ajena al pasaje.
  doctrine_reference: Narrativa milagrosa; no se propone una formulación doctrinal específica.
- issue: Mantener el valor de 'he aquí' como marca de coincidencia repentina.
  english_pob_reading: '''behold'''
  chosen_spanish_reading: '''he aquí'''
  alternative_spanish_readings:
  - '''mira'''
  - omitir la marca
  rationale: La escena depende del impacto del encuentro inesperado entre la mujer y el rey. 'He aquí' preserva la señal discursiva y el tono de sorpresa sin interpretarla de más.
  doctrine_reference: Convención narrativa bíblica; función discursiva, no doctrinal.
translation_notes:
  revision_awareness: Se revisó el audit trail inglés y no se identificaron cambios aplicados en la última pasada; la traducción española sigue la misma lectura de alto acuerdo, manteniendo la repetición de הֶחֱיָה y el valor discursivo de וְהִנֵּה.
  spanish_consistency_notes:
  - Se usa 'devolver a la vida' de manera consistente para הֶחֱיָה en todo el versículo.
  - '''rey'' se mantiene sin mayúscula reverencial por tratarse de un título contextual, no de un nombre propio.'
  - '''campo'' se eligió para שָׂדֶה por su concreción agrícola en el contexto de la reclamación de propiedad.'
  - Se conserva el orden natural del español en las oraciones relativas sin perder la referencia al sujeto original.
