translation:
  language: es
  text: Y cuando el impío se aparta de la maldad que ha hecho, y hace justicia y rectitud, mantendrá su vida[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «su alma» o «a sí mismo»; el hebreo usa נֶפֶשׁ, que según el contexto puede significar «vida», «ser» o «alma».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וּ/בְ/שׁוּב
  english_pob_choice: And when ... turns away
  chosen_spanish: Y cuando ... se aparta
  alternatives_spanish:
  - Pero cuando ... se aparta
  - Y al apartarse
  lexicon: HALOT
  rationale: La construcción temporal con שוב introduce una circunstancia de tiempo/condición. En español, «y cuando» conserva esa fuerza. «Se aparta» comunica el giro desde su conducta anterior con naturalidad y sin añadir más de lo que el hebreo exige.
- source_word: רָשָׁע
  english_pob_choice: a wicked man
  chosen_spanish: el impío
  alternatives_spanish:
  - un hombre impío
  - el malvado
  lexicon: HALOT
  rationale: El hebreo usa el adjetivo sustantivado en singular masculino para una persona caracterizada por maldad. «Impío» es un equivalente bíblico claro y digno en español; el artículo definido mantiene el valor representativo del tipo humano en este contexto.
- source_word: מֵֽ/רִשְׁעָת/וֹ
  english_pob_choice: from the wickedness
  chosen_spanish: de su maldad
  alternatives_spanish:
  - de su impiedad
  - de su perversidad
  lexicon: HALOT
  rationale: El sustantivo refiere a la maldad/impiedad del sujeto. «De su maldad» es natural en español y conserva la referencia a su conducta propia sin forzar un tecnicismo.
- source_word: אֲשֶׁר עָשָׂה
  english_pob_choice: that he has done
  chosen_spanish: que ha hecho
  alternatives_spanish:
  - que hizo
  - que cometió
  lexicon: HALOT
  rationale: La relativa modifica la maldad y apunta a actos ya realizados. «Que ha hecho» mantiene la anterioridad y la relevancia presente del acto consumado.
- source_word: וַ/יַּ֥עַשׂ
  english_pob_choice: and does
  chosen_spanish: y practica
  alternatives_spanish:
  - y hace
  - y obra
  lexicon: HALOT
  rationale: 'Aunque la forma es wayyiqtol, aquí continúa la condición: la acción consecuente. «Practica» evita la vaguedad de «hace» y expresa la conducta habitual implícita en משפט y צדקה.'
- source_word: מִשְׁפָּט
  english_pob_choice: justice
  chosen_spanish: el derecho
  alternatives_spanish:
  - la justicia
  - el juicio justo
  lexicon: HALOT
  rationale: En este binomio ético, משפט puede abarcar lo justo, el orden debido o el derecho. «El derecho» conserva la fuerza normativa/jurídica y distingue el término del siguiente, צדקה, sin aplanar la pareja hebrea.
- source_word: וּ/צְדָקָה
  english_pob_choice: righteousness
  chosen_spanish: y la justicia
  alternatives_spanish:
  - y la rectitud
  - y la justicia recta
  lexicon: HALOT
  rationale: צדקה en este contexto ético-covenantal puede traducirse como justicia o rectitud. Aquí se mantiene «justicia» para conservar la coordinación natural con «derecho» y expresar la respuesta correcta ante Dios y el prójimo.
- source_word: אֶת נַפְשׁוֹ
  english_pob_choice: his life
  chosen_spanish: su vida
  alternatives_spanish:
  - su alma
  - a sí mismo
  lexicon: HALOT
  rationale: En Ezequiel 18 el contraste es entre vivir y morir; נֶפֶשׁ aquí designa la vida concreta, no solo el alma en sentido posterior. «Su vida» refleja mejor el uso antropológico hebreo y evita introducir una dualidad ajena al pasaje.
- source_word: יְחַיֶּה
  english_pob_choice: will preserve
  chosen_spanish: preservará
  alternatives_spanish:
  - mantendrá con vida
  - hará vivir
  lexicon: HALOT
  rationale: El piel de חיה expresa mantener con vida o preservar. «Preservará» comunica bien el resultado y sigue el sentido de la decisión inglesa de evitar una traducción demasiado literal que suene forzada.
theological_decisions:
- issue: Sentido de נֶפֶשׁ en el marco de juicio y vida/muerte
  english_pob_reading: his life
  chosen_spanish_reading: su vida
  alternative_spanish_readings:
  - su alma
  - a sí mismo
  rationale: El capítulo contrapone repetidamente vida y muerte según la conducta. Traducir נַפְשׁוֹ como «su vida» mantiene esa lógica y evita sugerir una afirmación específica sobre la inmortalidad del alma fuera del foco del texto.
  doctrine_reference: Ezequiel 18; filosofía de traducción §1 y §3
- issue: Matiz de משפט y צדקה como binomio ético
  english_pob_reading: justice and righteousness
  chosen_spanish_reading: el derecho y la justicia
  alternative_spanish_readings:
  - la justicia y la rectitud
  - el juicio y la justicia
  rationale: La pareja hebrea conserva una tensión entre lo normativo/jurídico y lo recto/ético. En español, «derecho y justicia» mantiene esa distinción sin fundir los términos en un solo concepto.
  doctrine_reference: Ezequiel 18:5-9; uso léxico de משפט/צדקה
translation_notes:
  revision_awareness: La revisión inglesa más reciente no introdujo cambios; el pasaje quedó en acuerdo alto con observaciones menores. Esta propuesta sigue la lectura auditada, pero adapta al español la pareja משפט/צדקה con una distinción más natural («derecho y justicia») y conserva el valor de נֶפֶשׁ como «vida» en el contexto de vivir/morir.
  spanish_consistency_notes:
  - Se mantiene Yahvé para el nombre divino cuando aparezca en el contexto inmediato, según la terminología del proyecto.
  - Se conserva un registro bíblico moderno y digno, evitando arcaísmos innecesarios.
  - Se usa «impío» como equivalente estable de רָשָׁע en contextos sapiencia/ético-proféticos.
  - «Su vida» se emplea para נֶפֶשׁ en contextos de contraste vital, no «alma» salvo que el contexto lo exija.
