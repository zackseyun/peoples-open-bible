id: ISA.19.20
reference: Isaiah 19:20
source:
  edition: WLC
  text: וְ/הָיָ֨ה לְ/א֥וֹת וּ/לְ/עֵ֛ד לַֽ/יהוָ֥ה צְבָא֖וֹת בְּ/אֶ֣רֶץ מִצְרָ֑יִם כִּֽי יִצְעֲק֤וּ אֶל יְהוָה֙ מִ/פְּנֵ֣י לֹֽחֲצִ֔ים וְ/יִשְׁלַ֥ח לָ/הֶ֛ם מוֹשִׁ֥יעַ וָ/רָ֖ב וְ/הִצִּילָֽ/ם־־׃
translation:
  text: It will be for a sign and for a witness to Yahweh of Armies in the land of Egypt. For they will cry out to Yahweh because of oppressors[a], and he will send them a savior and champion, and he will deliver them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'a savior and a champion'; the Hebrew expression is difficult. The second term may also be understood more literally as 'a great one.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהָיָה
  chosen: It will be
  alternatives:
  - and it will be
  - and he/it shall become
  lexicon: HALOT
  rationale: The verb היה with prefixed conjunction introduces the future result of the preceding altar/pillar context. 'It will be' is natural English and preserves the predictive force without overtranslating the conjunction.
- source_word: לְאוֹת
  chosen: for a sign
  alternatives:
  - as a sign
  - for a token
  lexicon: HALOT
  rationale: אוֹת commonly denotes a sign or marker. 'Sign' is the standard, clear rendering here.
- source_word: וּלְעֵד
  chosen: and for a witness
  alternatives:
  - and for a testimony
  - and as a witness
  lexicon: HALOT
  rationale: עֵד is literally 'witness.' Although 'testimony' is possible, 'witness' better preserves the personal/legal nuance and pairs well with 'sign.'
- source_word: לַיהוָה צְבָאוֹת
  chosen: to the LORD of Armies
  alternatives:
  - to the LORD of hosts
  lexicon: HALOT
  rationale: Per doctrine, יהוה is rendered 'the LORD.' צְבָאוֹת is translated rather than left in traditional form; 'of Armies' communicates the Hebrew sense more transparently than the traditional 'of hosts.'
- source_word: בְּאֶרֶץ מִצְרָיִם
  chosen: in the land of Egypt
  alternatives:
  - in Egypt
  lexicon: HALOT
  rationale: The fuller phrase preserves the Hebrew wording and geographic emphasis.
- source_word: כִּי
  chosen: For
  alternatives:
  - because
  - when
  lexicon: HALOT
  rationale: Here כִּי introduces the explanation for why the sign/witness matters. 'For' fits the explanatory sense in English.
- source_word: יִצְעֲקוּ
  chosen: they will cry out
  alternatives:
  - they will call out
  - they will cry
  lexicon: HALOT
  rationale: צעק in distress contexts is well rendered 'cry out,' preserving urgency and petitionary force.
- source_word: מִפְּנֵי לֹחֲצִים
  chosen: because of oppressors
  alternatives:
  - from before oppressors
  - because of those who oppress them
  lexicon: HALOT
  rationale: The idiom מִפְּנֵי here expresses cause in the face of oppression. 'Because of oppressors' is concise and faithful. The participle לֹחֲצִים is substantival, hence 'oppressors.'
- source_word: מוֹשִׁיעַ
  chosen: a savior
  alternatives:
  - a deliverer
  lexicon: HALOT
  rationale: The Hiphil participial noun from ישׁע denotes one who saves/delivers. 'Savior' is the most direct rendering and fits the parallel with the following deliverance verb.
- source_word: וָרָב
  chosen: and defender
  alternatives:
  - and champion
  - and great one
  lexicon: HALOT
  rationale: The form is difficult. In context, many understand רָב not merely as 'great' but as one who contends on behalf of another, hence a protector/champion. 'Defender' best captures the likely functional sense in parallel with 'savior' and the following 'deliver.' The more literal 'great one' is possible but less coherent in context.
- source_word: וְהִצִּילָם
  chosen: and he will deliver them
  alternatives:
  - and he will rescue them
  lexicon: HALOT
  rationale: נצל in Hiphil commonly means 'deliver' or 'rescue.' 'Deliver' maintains a strong biblical register and aligns well with 'savior.'
