translation:
  language: es
  text: El sacerdote lo quemará sobre el altar, como alimento[a], una ofrenda hecha por fuego para Yahvé.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «pan de una ofrenda hecha por fuego»; aquí «pan» funciona idiomáticamente como «alimento» en el sistema sacrificial.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהִקְטִירוֹ
  english_pob_choice: shall burn it
  chosen_spanish: lo quemará
  alternatives_spanish:
  - lo hará subir en humo
  - lo ofrecerá en humo
  lexicon: HALOT
  rationale: En contexto sacrificial, el Hiphil de קטר describe la acción cultual de quemar la porción sobre el altar. En español, «quemará» comunica con naturalidad la acción ritual; las alternativas conservan más explícitamente la idea de humo, pero suenan menos idiomáticas en el texto principal.
- source_word: הַכֹּהֵן
  english_pob_choice: the priest
  chosen_spanish: el sacerdote
  alternatives_spanish:
  - el sacerdote oficiante
  - el presbítero
  lexicon: HALOT
  rationale: כֹּהֵן en contexto levítico designa al oficiante del culto. «Sacerdote» es el equivalente español más claro y establecido, sin añadir matices eclesiásticos ajenos al texto.
- source_word: הַמִּזְבֵּחָה
  english_pob_choice: on the altar
  chosen_spanish: sobre el altar
  alternatives_spanish:
  - en el altar
  - en el ara
  lexicon: HALOT
  rationale: El sufijo direccional con el altar indica la colocación de la ofrenda en ese lugar. «Sobre el altar» expresa bien la acción de quemar la porción allí, de manera natural en español.
- source_word: לֶחֶם
  english_pob_choice: food
  chosen_spanish: alimento
  alternatives_spanish:
  - pan
  - comida
  lexicon: HALOT
  rationale: Aunque el hebreo literalmente dice «pan», aquí funciona en lenguaje cultual para la porción destinada a Yahvé. «Alimento» mantiene la fuerza idiomática en español sin sugerir pan horneado literal.
- source_word: אִשֶּׁה
  english_pob_choice: an offering made by fire
  chosen_spanish: ofrenda encendida
  alternatives_spanish:
  - ofrenda hecha por fuego
  - ofrenda quemada
  lexicon: HALOT
  rationale: El término técnico se refiere a una ofrenda presentada por fuego. «Ofrenda encendida» conserva la imagen sacrificial de manera digna y comprensible; las otras opciones son más explicativas, pero menos fluidas.
- source_word: לַיהוָה
  english_pob_choice: to the LORD
  chosen_spanish: para Yahvé
  alternatives_spanish:
  - a Yahvé
  - de Yahvé
  lexicon: HALOT
  rationale: Se sigue la convención del proyecto de usar «Yahvé» para יהוה. En este contexto de dedicación ritual, «para» expresa mejor la orientación/ofrecimiento de la porción que un mero destino espacial.
theological_decisions:
- issue: La expresión cultual לֶחֶם אִשֶּׁה
  english_pob_reading: as food, an offering made by fire
  chosen_spanish_reading: como alimento, como ofrenda encendida
  alternative_spanish_readings:
  - como pan, ofrenda hecha por fuego
  - como alimento de la ofrenda hecha por fuego
  rationale: La frase hebrea combina dos términos cultuales que no deben reducirse a pan literal ni a una paráfrasis vaga. «Alimento» conserva la función idiomática de לֶחֶם en el sistema sacrificial, y «ofrenda encendida» expresa el carácter técnico de אִשֶּׁה sin borrar la tensión semántica del original.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
translation_notes:
  revision_awareness: La revisión más reciente no introdujo cambios; el pasaje quedó con alto acuerdo entre las comprobaciones, por lo que se mantiene la solución idiomática para לֶחֶם אִשֶּׁה y la terminología proyectual «Yahvé».
  spanish_consistency_notes:
  - Se conserva «Yahvé» conforme al estándar del proyecto para יהוה.
  - «Sacerdote» se usa como equivalente cultual de כֹּהֵן sin importar matiz eclesiástico cristiano.
  - «Ofrenda encendida» mantiene la categoría sacrificial de אִשֶּׁה sin expandirla a una explicación interpretativa en el texto principal.
  - La puntuación y el orden siguen una sintaxis natural en español, pero la estructura del verso permanece cercana al hebreo y al texto fuente.
