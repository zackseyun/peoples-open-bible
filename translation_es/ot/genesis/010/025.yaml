translation:
  language: es
  text: 'Y a Éber le nacieron dos hijos: el nombre del uno fue Péleg[a], porque en sus días la tierra se dividió, y el nombre de su hermano fue Joctán.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «el territorio se dividió». El hebreo puede significar «tierra» o «territorio».
    reason: lexical_alternative
lexical_decisions:
- source_word: וּלְעֵבֶר
  english_pob_choice: And to Eber
  chosen_spanish: Y a Éber
  alternatives_spanish:
  - Y para Éber
  - A Éber
  lexicon: HALOT
  rationale: La preposición con prefijo introduce de modo natural esta nota genealógica; en español, «a Éber» conserva la relación dativa/beneficiaria del hebreo sin sonar forzado.
- source_word: יֻלַּד
  english_pob_choice: were born
  chosen_spanish: le nacieron
  alternatives_spanish:
  - nacieron
  - fueron nacidos
  lexicon: HALOT
  rationale: El pasivo hebreo expresa que los hijos llegaron a ser nacidos para Éber; «le nacieron» mantiene el sentido idiomático y la orientación hacia Éber sin convertirlo en agente activo.
- source_word: שְׁנֵי בָנִים
  english_pob_choice: two sons
  chosen_spanish: dos hijos
  alternatives_spanish:
  - dos hijos varones
  - dos hijos varón
  lexicon: HALOT
  rationale: «בנים» puede traducirse literalmente «hijos», y en español el género masculino está suficientemente señalado por el contexto genealógico; «dos hijos» suena más natural que una repetición pesada de «dos hijos varones».
- source_word: שֵׁם הָאֶחָד
  english_pob_choice: the name of the one
  chosen_spanish: el nombre del uno
  alternatives_spanish:
  - el nombre del primero
  - uno se llamaba
  lexicon: HALOT
  rationale: La construcción hebrea distingue «el uno» de «su hermano»; «el uno» preserva esa oposición sin introducir un ordinal que el texto no da explícitamente.
- source_word: פֶּלֶג
  english_pob_choice: Peleg
  chosen_spanish: Péleg
  alternatives_spanish:
  - Peleg
  lexicon: HALOT
  rationale: Nombre propio transliterado de manera estándar al español con acentuación para guiar la pronunciación.
- source_word: כִּי
  english_pob_choice: for
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  lexicon: HALOT
  rationale: Aquí introduce la explicación del nombre; «porque» comunica claramente la relación causal/exegética en español.
- source_word: בְיָמָיו
  english_pob_choice: in his days
  chosen_spanish: en sus días
  alternatives_spanish:
  - durante su vida
  - en su tiempo
  lexicon: HALOT
  rationale: Es una expresión idiomática temporal que se conserva de forma natural en español sin precisar más de lo que el hebreo dice.
- source_word: נִפְלְגָה
  english_pob_choice: was divided
  chosen_spanish: fue dividida
  alternatives_spanish:
  - se dividió
  - fue partida
  lexicon: HALOT
  rationale: El nifal de פלג indica una acción pasiva; «fue dividida» sigue de cerca la forma y mantiene la asociación verbal con el nombre Péleg.
- source_word: הָאָרֶץ
  english_pob_choice: the earth
  chosen_spanish: la tierra
  alternatives_spanish:
  - la tierra habitada
  - el país
  lexicon: HALOT
  rationale: En español, «tierra» conserva la amplitud semántica de אֶרֶץ, abarcando tanto el sentido de «tierra/territorio» como el de «mundo» según el contexto; se deja la ambigüedad abierta como en el hebreo.
- source_word: וְשֵׁם אָחִיו
  english_pob_choice: and his brother's name
  chosen_spanish: y el nombre de su hermano
  alternatives_spanish:
  - y el nombre de su hermano era
  - y su hermano se llamaba
  lexicon: HALOT
  rationale: Se conserva la estructura nominal hebrea con un orden natural en español.
- source_word: יָקְטָן
  english_pob_choice: Joktan
  chosen_spanish: Joctán
  alternatives_spanish:
  - Joktan
  lexicon: HALOT
  rationale: Nombre propio transliterado al español en forma tradicional y legible.
theological_decisions:
- issue: Alcance de הָאָרֶץ en la explicación del nombre de Péleg
  english_pob_reading: the earth
  chosen_spanish_reading: la tierra
  alternative_spanish_readings:
  - la tierra habitada
  - el territorio
  rationale: En el contexto de Génesis 10, la referencia puede abarcar la dispersión amplia de pueblos; «la tierra» preserva esa amplitud sin cerrar indebidamente la interpretación histórica. La nota léxica permite que el lector vea también la posibilidad de «territorio»/«tierra» según el uso contextual de אֶרֶץ.
  doctrine_reference: Translation philosophy §3, §5
translation_notes:
  revision_awareness: El texto inglés auditado está sin cambios en la última pasada (high_agreement, sin revisiones aplicadas). Esta versión española sigue ese estado estable y refleja la misma decisión léxica principal para אֶרֶץ, conservando la ambigüedad contextual con una nota breve.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como preferencia del proyecto solo cuando el texto lo requiera; este versículo no contiene el nombre divino.
  - 'Se usa transliteración española consistente para nombres propios: Éber, Péleg, Joctán.'
  - Se conserva la relación causal de la cláusula explicativa con «porque», equivalente natural del inglés auditado «for».
  - Se mantiene una sintaxis bíblica clara pero no arcaizante, apta para lectura pública.
