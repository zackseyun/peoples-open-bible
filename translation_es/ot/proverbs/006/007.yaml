  to: que no tiene[a] jefe, oficial ni gobernante,
  rationale: Se ajusta el relativo a «que» para un español más natural y se corrige la conjunción de la nota alternativa de «u» a «o». Se conservan las tres distinciones léxicas y la omisión de cualquier añadido como «sobre ella», fiel al hebreo y al rastro de auditoría inglés.
