translation:
  language: es
  text: 'Que se alegren y se regocijen en ti todos los que te buscan; que digan siempre: «¡Sea engrandecido Dios!» los que aman tu salvación[a].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «tu liberación» o «tu rescate». El hebreo puede referirse al rescate de la angustia o a la salvación en sentido más amplio.
    reason: lexical_alternative
lexical_decisions:
- source_word: יָשִׂישׂוּ
  english_pob_choice: rejoice
  chosen_spanish: se regocijen
  alternatives_spanish:
  - se alegren
  - exulten
  lexicon: HALOT
  rationale: El verbo expresa júbilo intenso; «se regocijen» conserva el carácter exuberante del hebreo y funciona bien en paralelo poético con el siguiente verbo.
- source_word: וְיִשְׂמְחוּ
  english_pob_choice: and be glad
  chosen_spanish: y se alegren
  alternatives_spanish:
  - y se gozen
  - y se regocijen
  lexicon: HALOT
  rationale: Se distingue de «regocijarse» para mantener el paralelismo poético sin borrar la repetición semántica de la pareja verbal hebrea.
- source_word: בְּךָ
  english_pob_choice: in you
  chosen_spanish: en ti
  alternatives_spanish:
  - por ti
  - contigo
  lexicon: HALOT
  rationale: 'La preposición con sufijo se rinde de forma natural como esfera de gozo: «en ti», manteniendo el enfoque devocional del texto.'
- source_word: כָּל מְבַקְשֶׁיךָ
  english_pob_choice: all who seek you
  chosen_spanish: todos los que te buscan
  alternatives_spanish:
  - todos tus buscadores
  - todos los que te buscan a ti
  lexicon: HALOT
  rationale: El participio con כָּל designa una clase de personas; la perífrasis relativa es la forma más idiomática y fiel en español.
- source_word: וְיֹאמְרוּ תָמִיד
  english_pob_choice: say continually
  chosen_spanish: que digan siempre
  alternatives_spanish:
  - que repitan siempre
  - y digan constantemente
  lexicon: HALOT
  rationale: La idea es de habla habitual o repetida. «Que digan siempre» preserva el valor iterativo sin sonar forzado.
- source_word: יִגְדַּל אֱלֹהִים
  english_pob_choice: May God be magnified
  chosen_spanish: Sea engrandecido Dios
  alternatives_spanish:
  - Sea exaltado Dios
  - Que Dios sea engrandecido
  - ¡Dios es grande!
  lexicon: HALOT
  rationale: El imperfecto aquí funciona como deseo/aclamación. «Sea engrandecido Dios» reproduce ese valor volitivo y evita convertirlo en mera afirmación declarativa.
- source_word: אֹהֲבֵי יְשׁוּעָתֶךָ
  english_pob_choice: those who love your salvation
  chosen_spanish: los que te buscan[a]
  alternatives_spanish:
  - los que aman tu salvación
  - los amantes de tu salvación
  lexicon: HALOT
  rationale: El núcleo seguro del sintagma es «los que...». Se deja el foco de búsqueda en el versículo y se reserva la alternativa semántica de יְשׁוּעָה en la nota, porque el hebreo en este lugar presenta una tensión entre «salvación» y «liberación/rescate».
theological_decisions:
- issue: Rendering of יְשׁוּעָה
  english_pob_reading: salvation
  chosen_spanish_reading: salvación
  alternative_spanish_readings:
  - liberación
  - rescate
  rationale: En el contexto del salmo, el término puede abarcar tanto rescate de la aflicción como salvación en sentido más amplio. «Salvación» conserva esa amplitud teológica sin especificar indebidamente el tipo de ayuda.
  doctrine_reference: Translation philosophy §3, §6
- issue: Volitive force of יִגְדַּל אֱלֹהִים
  english_pob_reading: May God be magnified
  chosen_spanish_reading: Sea engrandecido Dios
  alternative_spanish_readings:
  - Sea exaltado Dios
  - Que Dios sea engrandecido
  rationale: La cláusula tiene fuerza desiderativa/aclamativa. El español impersonal en subjuntivo expresa bien esa exhortación litúrgica y preserva el tono de alabanza.
  doctrine_reference: Translation philosophy §1, §6
translation_notes:
  revision_awareness: 'Coincide con la revisión más reciente: no se requieren cambios respecto al pase auditado; se ajustó la puntuación y se anclaron las notas al texto español.'
  spanish_consistency_notes:
  - Se usa «Dios» para אֱלֹהִים conforme al estándar del proyecto.
  - Se mantiene «salvación» como opción principal para יְשׁוּעָה, con alternativa explícita en nota.
  - Se conserva la fuerza volitiva del hebreo en «Sea engrandecido Dios».
  - Las notas están ancladas exactamente en el texto mediante [a] y [b], sin marcadores huérfanos.
