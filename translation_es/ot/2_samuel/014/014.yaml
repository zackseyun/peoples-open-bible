    text: 'O: «Dios no muestra parcialidad a una persona»; el hebreo de esta cláusula es difícil y algunos la entienden de otro modo.'
    reason: alternative_reading
  - marker: b
    text: 'O: «para que el desterrado no sea echado lejos de él».'
    reason: lexical_alternative
  revision_rationale: 'Se hicieron ajustes menores para mejorar la naturalidad del español y alinear con más precisión el sentido documentado en el POB inglés: ''agua derramada'' en lugar de ''aguas derramadas'', formulación de imposibilidad explícita en ''no puede recogerse de nuevo'', y ''no permanezca desterrado'' para reflejar mejor el matiz de estado continuado del hebreo y del audit trail.'
