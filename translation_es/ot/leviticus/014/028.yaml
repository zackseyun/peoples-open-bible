revisions:
- from: Y el sacerdote pondrá un poco del aceite que está sobre su palma sobre el lóbulo de la oreja derecha del que se está purificando[a], y sobre el pulgar de su mano derecha, y sobre el dedo gordo de su pie derecho, sobre el lugar de la sangre de la ofrenda por la culpa.
  to: Y el sacerdote pondrá un poco del aceite que está sobre su palma sobre el lóbulo de la oreja derecha del que está siendo purificado[a], y sobre el pulgar de su mano derecha, y sobre el dedo gordo de su pie derecho, en el lugar de la sangre de la ofrenda por la culpa.
  rationale: La revisión corrige un matiz aspectual importante en הַמִּטַּהֵר al pasar de una formulación reflexiva a una pasiva procesual más fiel, y mejora la naturalidad de la cláusula final en español sin apartarse del sentido locativo del hebreo ni de la nota alternativa documentada.
