translation:
  language: es
  text: 'Entonces me dijo[a]: «¿Has visto esto, hijo de hombre? Volverás a ver abominaciones aún mayores que estas».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más literalmente: «volverás/te volverás y verás abominaciones mayores que estas».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר אֵלַי
  english_pob_choice: Then he said to me
  chosen_spanish: Entonces me dijo
  alternatives_spanish:
  - Y me dijo
  lexicon: HALOT
  rationale: El waw consecutivo avanza la escena; «Entonces» conserva la progresión narrativa de manera natural en español.
- source_word: הֲרָאִיתָ
  english_pob_choice: Have you seen this
  chosen_spanish: ¿Has visto esto?
  alternatives_spanish:
  - ¿Has visto?
  - ¿Lo has visto?
  lexicon: HALOT
  rationale: La pregunta perfecta segunda persona singular pide si el profeta ha percibido lo mostrado; «esto» explicita el deíctico implícito en el contexto inmediato.
- source_word: בֶן אָדָם
  english_pob_choice: son of man
  chosen_spanish: hijo de hombre
  alternatives_spanish:
  - ser humano
  - mortal
  lexicon: HALOT
  rationale: Se conserva el giro idiomático estable del libro de Ezequiel. «Hijo de hombre» mantiene la forma literaria y la dirección profética sin reinterpretarla.
- source_word: עוֹד
  english_pob_choice: even
  chosen_spanish: aún
  alternatives_spanish:
  - todavía
  - más
  lexicon: HALOT
  rationale: עוֹד expresa continuación e intensificación; «aún» funciona con el comparativo para señalar que lo que sigue supera lo anterior.
- source_word: תָּשׁוּב תִּרְאֶה
  english_pob_choice: You will see again
  chosen_spanish: Todavía verás
  alternatives_spanish:
  - Volverás a ver
  - Verás de nuevo
  lexicon: HALOT
  rationale: La expresión hebrea combina «volver/retornar» con «ver»; en español, «Todavía verás» conserva la idea de continuidad e incremento sin forzar un calco poco natural. Se mantiene «verás» porque el contexto visionario ya implica la repetición de la visión.
- source_word: תּוֹעֵבוֹת
  english_pob_choice: abominations
  chosen_spanish: abominaciones
  alternatives_spanish:
  - cosas detestables
  lexicon: HALOT
  rationale: «Abominaciones» preserva el peso profético y moral del término, especialmente en contextos de idolatría y corrupción cultual.
- source_word: גְּדֹל֖וֹת
  english_pob_choice: greater
  chosen_spanish: aún mayores
  alternatives_spanish:
  - más grandes
  - más graves
  lexicon: HALOT
  rationale: El comparativo se rinde con «mayores»; añadir «aún» refleja la intensificación de עוֹד y conserva la relación comparativa con las visiones previas.
- source_word: מֵאֵלֶּה
  english_pob_choice: than these
  chosen_spanish: que estas
  alternatives_spanish:
  - de estas
  - que las anteriores
  lexicon: HALOT
  rationale: En español, la comparación natural con «mayores» se expresa con «que estas»; mantiene la referencia a las abominaciones ya vistas.
theological_decisions:
- issue: Conservación del título profético «hijo de hombre»
  english_pob_reading: son of man
  chosen_spanish_reading: hijo de hombre
  alternative_spanish_readings:
  - ser humano
  - mortal
  rationale: La expresión en Ezequiel es una forma estable de خطاب profético dirigida al profeta, no un título mesiánico aquí. Se mantiene la formulación tradicional-literal para no perder continuidad literaria ni precisión formal.
  doctrine_reference: DOCTRINE.md §Translation philosophy, punto 4
translation_notes:
  revision_awareness: Se incorporó la revisión del audit trail inglés que prefiere «even greater» para עוֹד; por eso el español usa «aún mayores» y evita una formulación demasiado literal como «volverás y verás» que sonaría forzada. También se corrigió la ancladura de la nota al incluir [a] en el texto.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» fuera del versículo porque no aparece en el hebreo de este pasaje.
  - Se evitó «SEÑOR» como sustituto ocultador, conforme a la política del proyecto.
  - «Abominaciones» se conservó por su fuerza profética estable en Ezequiel.
  - La puntuación de cita respeta la convención española con comillas angulares.
  - El comparativo se expresó de forma natural en español sin perder la relación semántica con el hebreo.
