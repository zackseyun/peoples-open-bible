  text: 'How long will you waver[c][b][a], faithless daughter? For Yahweh has created a new thing in the land: a woman will surround a man.'
  footnotes:
  - marker: a
    text: Or, 'backsliding daughter' or 'wayward daughter.' The Hebrew describes covenantal waywardness.
    reason: lexical_alternative
  - marker: b
    text: The final clause is difficult and much debated. It is rendered literally here as 'a woman will surround a man.' Possible interpretations include 'a woman will court a man,' 'the weak will overcome the strong,' or a figurative picture of restored Israel returning to the LORD.
    reason: alternative_reading
  - marker: c
    text: Or 'in the earth'; here 'the land' likely refers to the land of Israel in context.
    reason: lexical_alternative
