translation:
  language: es
  text: Así, pues[a], se alaba al dueño de sí mismo José, porque por medio de la razón[b] dominó el amor al placer.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: La expresión griega introduce una inferencia resumptiva; «Así, pues» conserva ese valor de conclusión de manera natural en español.
    reason: lexical_alternative
  - marker: b
    text: El griego de este testimonio es algo áspero aquí (literalmente, algo como «por razonamiento, mente/pensamiento»). La traducción expresa idiomáticamente el sentido conjunto como el ejercicio del control racional.
    reason: source_note
lexical_decisions:
- source_word: ταύτῃ γοῦν
  english_pob_choice: Accordingly
  chosen_spanish: Así, pues
  alternatives_spanish:
  - Por tanto
  - En consecuencia
  lexicon: LSJ
  rationale: La expresión introduce una conclusión inferida; «Así, pues» conserva bien el valor resumptivo e inferencial sin sonar forzado en español.
- source_word: ὁ σώφρων
  english_pob_choice: the self-controlled
  chosen_spanish: el prudente
  alternatives_spanish:
  - el autocontrolado
  - el templado
  - el sensato
  lexicon: LSJ
  rationale: En este contexto de dominio de las pasiones, σώφρων puede verterse como «prudente» en español sin perder la idea de juicio sobrio y autocontrol moral. «Autocontrolado» sería más explícito pero menos natural como epíteto.
- source_word: Ἰωσὴφ
  english_pob_choice: Joseph
  chosen_spanish: José
  alternatives_spanish:
  - Joseph
  lexicon: transliteración tradicional
  rationale: En español bíblico, el nombre propio se expresa normalmente como «José».
- source_word: ἐπαινεῖται
  english_pob_choice: is praised
  chosen_spanish: se alaba
  alternatives_spanish:
  - es elogiado
  - recibe alabanza
  lexicon: LSJ
  rationale: El pasivo presente queda de manera directa y natural con «se alaba»; conserva el sentido de elogio público o moral.
- source_word: τῷ λογισμῷ
  english_pob_choice: by reason
  chosen_spanish: con la razón
  alternatives_spanish:
  - por la razón
  - mediante la razón
  - por su razonamiento
  lexicon: LSJ
  rationale: λογισμός es un término clave del argumento filosófico-moral de 4 Macabeos; «con la razón» preserva el instrumento racional de la acción y suena natural en español.
- source_word: διανοίᾳ
  english_pob_choice: reason
  chosen_spanish: y la mente
  alternatives_spanish:
  - y el entendimiento
  - y el pensamiento
  lexicon: LSJ
  rationale: El texto griego presenta una combinación algo áspera; conservar ambos sustantivos en español deja visible la acumulación de facultades racionales sin borrar la tensión textual.
- source_word: περιεκράτησεν
  english_pob_choice: he mastered
  chosen_spanish: dominó
  alternatives_spanish:
  - venció
  - se impuso sobre
  - gobernó sobre
  lexicon: LSJ
  rationale: El verbo expresa superioridad o dominio efectivo sobre algo; «dominó» comunica bien la victoria de la razón sobre la pasión.
- source_word: τῆς ἡδυπαθείας
  english_pob_choice: love of pleasure
  chosen_spanish: el amor al placer
  alternatives_spanish:
  - la inclinación al placer
  - la pasión por el placer
  - el deleite en el placer
  lexicon: LSJ
  rationale: ἡδυπάθεια designa una entrega o afecto hacia el placer; «amor al placer» refleja con claridad esa orientación y mantiene la carga ética del término.
theological_decisions:
- issue: Término ético-filosófico de autocontrol
  english_pob_reading: 'Render σώφρων and λογισμός in a way that foregrounds rational self-mastery: ''self-controlled'' and ''by reason.'''
  chosen_spanish_reading: 'Traducir σώφρων y λογισμός de modo que destaque el dominio racional de las pasiones: «prudente» y «con la razón».'
  alternative_spanish_readings:
  - «autocontrolado» / «por la razón»
  - «templado» / «mediante el razonamiento»
  rationale: 4 Macabeos presenta la razón como principio gobernante frente a las pasiones. La opción elegida mantiene ese marco filosófico-ético sin introducir vocabulario doctrinal ajeno al pasaje.
  doctrine_reference: 'DOCTRINE.md: Translation philosophy §§1, 5, 6'
translation_notes:
  revision_awareness: El inglés POB fue revisado para preferir «love of pleasure» frente a «the desire for pleasure» en ἡδυπάθεια. La versión española sigue ese ajuste con «el amor al placer». También se tuvo en cuenta la observación del testimonio griego sobre la aspereza de τῷ λογισμῷ διανοίᾳ, reflejándola sin volver la frase antinatural en español.
  spanish_consistency_notes:
  - Se usa «José» para el nombre propio conforme al uso bíblico español.
  - 'Se conserva una terminología ética-filosófica coherente con 4 Macabeos: razón, mente, dominio del placer.'
  - No se emplea «Cristo» ni terminología cristológica; el pasaje no lo requiere.
  - «Yahvé» no aparece porque el versículo no contiene el nombre divino.
