translation:
  language: es
  text: Con flechas y con un arco[a] vendrá allí, porque toda la tierra se convertirá en zarzas y espinos[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «vendrá allí con flechas y con un arco»; el verbo hebreo es singular y puede entenderse de manera genérica.'
    reason: alternative_reading
  - marker: b
    text: 'O: «toda la tierra será zarzas y espinos»; el hebreo también puede expresarse más literalmente como un estado futuro, aunque aquí se traduce de forma resultativa por el contexto.'
    reason: lexical_alternative
lexical_decisions:
- source_word: בַּחִצִּים
  english_pob_choice: with arrows
  chosen_spanish: con flechas
  alternatives_spanish:
  - con las flechas
  lexicon: HALOT
  rationale: El hebreo con ב instrumental expresa ir equipado con flechas; en español, 'con flechas' transmite naturalmente el sentido instrumental sin añadir artículo innecesario.
- source_word: וּבַקֶּשֶׁת
  english_pob_choice: and with a bow
  chosen_spanish: con arco
  alternatives_spanish:
  - con el arco
  lexicon: HALOT
  rationale: Se mantiene el valor instrumental de la preposición; 'arco' es el equivalente natural en español y la omisión del artículo es idiomática en una enumeración de instrumentos.
- source_word: יָבֹא
  english_pob_choice: One will come
  chosen_spanish: vendrá
  alternatives_spanish:
  - vendrá allí
  - uno vendrá allí
  - él vendrá allí
  lexicon: HALOT
  rationale: El verbo hebreo es singular masculino y puede funcionar genéricamente. En español, 'vendrá' conserva la referencia singular sin forzar un sujeto masculino explícito; el contexto ya indica el lugar con 'allí'.
- source_word: שָׁמָּה
  english_pob_choice: there
  chosen_spanish: allí
  alternatives_spanish:
  - ahí
  - allá
  lexicon: HALOT
  rationale: '''Allí'' es una equivalencia adverbial clara y natural para el deíctico de lugar.'
- source_word: כִּי
  english_pob_choice: because
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  lexicon: HALOT
  rationale: Se expresa la causa de venir armado en un español moderno y transparente.
- source_word: שָׁמִיר וָשַׁיִת
  english_pob_choice: briers and thorns
  chosen_spanish: zarzas y espinos
  alternatives_spanish:
  - espinos y zarzas
  - matorrales y espinos
  lexicon: HALOT
  rationale: La pareja fija de Isaías denota vegetación espinosa y desolación. 'Zarzas y espinos' preserva la imagen bíblica tradicional sin perder naturalidad en español.
- source_word: תִּהְיֶה
  english_pob_choice: will become
  chosen_spanish: será
  alternatives_spanish:
  - llegará a ser
  - se volverá
  lexicon: HALOT
  rationale: Aunque el matiz contextual puede ser resultativo, en español 'será' reproduce de forma sobria el estado futuro sin sobreinterpretar el cambio verbal.
- source_word: כָל הָאָרֶץ
  english_pob_choice: all the land
  chosen_spanish: toda la tierra
  alternatives_spanish:
  - toda la región
  - todo el país
  lexicon: HALOT
  rationale: En este contexto profético, 'tierra' conserva el alcance territorial de la expresión hebrea; 'toda' mantiene la idea de totalidad local bajo juicio.
theological_decisions:
- issue: Alcance territorial de 'toda la tierra'
  english_pob_reading: all the land refers to the local land/region under judgment rather than the whole globe.
  chosen_spanish_reading: toda la tierra se entiende como la región bajo juicio, no el globo entero.
  alternative_spanish_readings:
  - todo el mundo
  - toda la tierra en sentido universal
  rationale: La profecía describe la devastación de un territorio concreto; en español conviene conservar 'tierra' con sentido regional, y la nota evita una lectura universalizante no requerida por el hebreo ni por el contexto.
  doctrine_reference: Contexto histórico-profético de Isaías 7
- issue: Sujeto genérico del verbo singular
  english_pob_reading: The Hebrew verb is singular and may be understood generically.
  chosen_spanish_reading: Se mantiene un verbo singular sin sujeto explícito en español para conservar el valor genérico.
  alternative_spanish_readings:
  - vendrá uno
  - vendrá él
  rationale: La construcción impersonal/genericizada en español permite reflejar la singularidad verbal del hebreo sin imponer un referente masculino específico que el texto no exige.
  doctrine_reference: Gramática hebrea; estilo bíblico profético
translation_notes:
  revision_awareness: El texto español sigue el pasaje hebreo directamente y tiene alta concordancia con el auditoría inglesa; no se documentaron revisiones textuales aplicadas en el expediente más reciente.
  spanish_consistency_notes:
  - Se prefirió 'zarzas y espinos' para conservar la pareja fija de Isaías y su resonancia bíblica en español.
  - '''Tierra'' se usó en sentido territorial/local, coherente con el contexto profético.'
  - Se mantuvo la singularidad del verbo con una construcción natural en español sin especificar indebidamente el sujeto.
