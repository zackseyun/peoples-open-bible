translation:
  language: es
  text: Y yo te doy una porción[a] más que a tus hermanos, la cual tomé de la mano del amorreo, con mi espada y con mi arco.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebreo שְׁכֶם (shekhem), que también puede evocar Siquem, nombre de lugar; la línea puede sugerir intencionalmente tanto una porción adicional como el sitio después asociado con José.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַאֲנִי
  english_pob_choice: And I myself
  chosen_spanish: Y yo
  alternatives_spanish:
  - Y yo mismo
  - Ahora bien, yo
  lexicon: HALOT
  rationale: El pronombre independiente añade énfasis; en español, el énfasis queda suficientemente marcado con "yo" en posición prominente, sin volver la frase forzada.
- source_word: נָתַתִּי
  english_pob_choice: give
  chosen_spanish: te doy
  alternatives_spanish:
  - te he dado
  - te di
  lexicon: HALOT
  rationale: En discurso directo testamentario, el perfecto hebreo puede funcionar como acto declarativo; "te doy" reproduce mejor la fuerza de otorgamiento inmediato y solemne.
- source_word: שְׁכֶם אַחַד
  english_pob_choice: one portion
  chosen_spanish: una porción
  alternatives_spanish:
  - un lote
  - una parte
  lexicon: HALOT
  rationale: La auditoría inglesa finalmente privilegia el sentido de "porción" frente a un valor topográfico. En español, "porción" conserva la idea de una parte hereditaria adicional y evita fijar indebidamente el juego de palabras.
- source_word: עַל אַחֶיךָ
  english_pob_choice: above your brothers
  chosen_spanish: más que a tus hermanos
  alternatives_spanish:
  - por encima de tus hermanos
  - sobre tus hermanos
  lexicon: HALOT
  rationale: La preposición עַל expresa aquí ventaja o adición. "Más que" comunica con naturalidad la idea de porción extra sin perder la comparación implícita.
- source_word: אֲשֶׁר לָקַחְתִּי
  english_pob_choice: which I took
  chosen_spanish: la cual tomé
  alternatives_spanish:
  - que tomé
  - la que tomé
  lexicon: HALOT
  rationale: '"La cual" mantiene el referente nominal femenino implícito de "porción" y refleja el relativo sin añadir explicación interpretativa.'
- source_word: מִיַּד הָאֱמֹרִי
  english_pob_choice: from the hand of the Amorite
  chosen_spanish: de la mano del amorreo
  alternatives_spanish:
  - de poder del amorreo
  - de la mano de los amorreos
  lexicon: HALOT
  rationale: Se conserva el hebraísmo "de la mano de" porque expresa toma desde el poder o posesión de alguien. Se mantiene el singular colectivo "amorreo" como en el hebreo.
- source_word: בְּחַרְבִּי וּבְקַשְׁתִּי
  english_pob_choice: with my sword and with my bow
  chosen_spanish: con mi espada y con mi arco
  alternatives_spanish:
  - por mi espada y por mi arco
  - con mi espada y mi arco
  lexicon: HALOT
  rationale: La pareja de armas se traduce literalmente para conservar el imaginería militar. Repetir "con" refleja los dos instrumentos del hebreo.
theological_decisions:
- issue: Ambigüedad de שְׁכֶם entre 'porción' y la resonancia con Siquem/Shechem
  english_pob_reading: The English POB preserves 'one portion' and footnotes the possible echo of the place-name Shechem and the extra share motif.
  chosen_spanish_reading: una porción[a]
  alternative_spanish_readings:
  - Siquem, una porción
  - una porción, con posible eco de Siquem
  rationale: 'El español principal sigue el sentido preferido por la auditoría inglesa, pero la nota conserva la tensión interpretativa: el término puede sugerir tanto una porción adicional como un juego con el topónimo Siquem.'
  doctrine_reference: 'Translation philosophy §3: preservar la tensión interpretativa cuando el hebreo la sostiene.'
translation_notes:
  revision_awareness: La versión inglesa más reciente corrigió una primera solución más literal ('one ridge') hacia 'one portion'. El español sigue esa revisión y evita un calco topográfico en el cuerpo principal, manteniendo la ambigüedad relevante en nota.
  spanish_consistency_notes:
  - Se usa "amorreo" en singular colectivo, coherente con el hebreo.
  - '"Porción" se mantiene como término de herencia/otorgamiento, no como simple ''parte'' neutra.'
  - La repetición de "con" preserva la fuerza instrumental del hebreo.
  - Se evita "SEÑOR" porque no aparece el tetragrámaton en este versículo.
