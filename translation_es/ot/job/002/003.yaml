translation:
  language: es
  text: 'Entonces Yahvé dijo al Acusador[b]: «¿Has puesto tu corazón en[a] mi siervo Job? Porque no hay nadie como él en la tierra: hombre intachable y recto, que teme a Dios y se aparta del mal. Todavía se mantiene firme en su integridad, aunque tú me incitaste contra él para destruirlo[c] sin motivo[d].»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O «¿Has considerado a mi siervo Job?». Hebreo literalmente: «¿Has puesto tu corazón en mi siervo Job?»'
    reason: lexical_alternative
  - marker: b
    text: O «Satanás». Hebreo הַשָּׂטָן, «el Acusador»; tradicionalmente «Satanás».
    reason: alternative_reading
  - marker: c
    text: Hebreo literalmente «tragárselo»; aquí el sentido es «destruirlo», «arruinarlo» o «devorarlo».
    reason: lexical_alternative
  - marker: d
    text: También puede significar «sin causa». Probablemente hace eco de Job 1:9, donde el Acusador pregunta si Job teme a Dios «sin motivo».
    reason: cross_reference
lexical_decisions:
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  - el SEÑOR
  lexicon: HALOT
  rationale: Se conserva el nombre divino personal del Tetragrámaton en una forma española ya establecida y transparente. No se sustituye por un título, para mantener la decisión auditada del POB.
- source_word: הַשָּׂטָן
  english_pob_choice: the Accuser
  chosen_spanish: el Acusador
  alternatives_spanish:
  - Satanás
  - el adversario
  lexicon: HALOT
  rationale: El hebreo con artículo funciona aquí como título/rol, no como nombre propio. 'Acusador' comunica la función judicial/opositiva mejor que la transliteración y evita resolver de antemano la identificación teológica.
- source_word: הֲשַׂמְתָּ לִבְּךָ אֶל
  english_pob_choice: have you set your heart on
  chosen_spanish: ¿Has puesto tu corazón en
  alternatives_spanish:
  - ¿Has puesto tu mente en
  - ¿Has considerado
  lexicon: HALOT
  rationale: '''Corazón'' conserva el lenguaje antropológico hebreo y la fuerza intencional de שׂים לב. ''Has considerado'' sería más interpretativo; ''poner el corazón en'' es más cercano al giro original y natural en español.'
- source_word: עַבְדִּי
  english_pob_choice: my servant
  chosen_spanish: mi siervo
  alternatives_spanish:
  - mi esclavo
  - mi servidor
  lexicon: HALOT
  rationale: Aquí la relación de pertenencia y servicio a Dios es la más visible. 'Siervo' es la equivalencia española más fiel y bíblica para este contexto sin cargar el término con el valor jurídico de 'esclavo'.
- source_word: אֵין כָּמֹהוּ בָּאָרֶץ
  english_pob_choice: there is no one like him on the earth
  chosen_spanish: no hay ninguno como él en la tierra
  alternatives_spanish:
  - no hay nadie como él en la tierra
  - no hay ninguno como él en el mundo
  lexicon: HALOT
  rationale: '''En la tierra'' reproduce bien el alcance del hebreo ארץ en este marco cósmico. ''Ninguno'' mantiene la negación absoluta y el tono solemne del original.'
- source_word: אִישׁ תָּם וְיָשָׁר
  english_pob_choice: a blameless and upright man
  chosen_spanish: hombre intachable y recto
  alternatives_spanish:
  - hombre íntegro y recto
  - hombre irreprochable y recto
  lexicon: HALOT
  rationale: '''תָּם'' en Job apunta a integridad/irreprensibilidad más que a perfección moral absoluta; ''intachable'' transmite bien esa idea en español. ''Recto'' corresponde de manera directa a יָשָׁר.'
- source_word: יְרֵא אֱלֹהִים
  english_pob_choice: one who fears God
  chosen_spanish: que teme a Dios
  alternatives_spanish:
  - temeroso de Dios
  - que reverencia a Dios
  lexicon: HALOT
  rationale: Se conserva el verbo 'temer' porque el hebreo expresa una actitud religiosa de reverencia y asombro, no solo una emoción. La construcción relativa fluye de manera natural en español.
- source_word: וְסָר מֵרָע
  english_pob_choice: turns away from evil
  chosen_spanish: se aparta del mal
  alternatives_spanish:
  - se aleja del mal
  - se desvía del mal
  lexicon: HALOT
  rationale: '''Apartarse'' reproduce el movimiento de סור sin sobreinterpretar. ''Del mal'' es el equivalente normal en español para la esfera ética del hebreo aquí.'
- source_word: וְעֹדֶנּוּ מַחֲזִיק בְּתֻמָּתוֹ
  english_pob_choice: He still holds fast his integrity
  chosen_spanish: Todavía se mantiene firme en su integridad
  alternatives_spanish:
  - Todavía se aferra a su integridad
  - Sigue sosteniendo su integridad
  lexicon: HALOT
  rationale: '''Mantenerse firme'' comunica bien מַחֲזִיק en sentido durativo y resistente. ''Integridad'' es el mejor equivalente para תֻמָּה en este contexto, conservando el vínculo semántico con תָּם.'
- source_word: וַתְּסִיתֵנִי ב֖וֹ
  english_pob_choice: though you incited me against him
  chosen_spanish: y tú me incitaste contra él
  alternatives_spanish:
  - y tú me impulsaste contra él
  - y tú me provocaste contra él
  lexicon: HALOT
  rationale: '''Incitar'' refleja bien la fuerza causativa de סות y mantiene la tensión narrativa sin suavizar la atribución directa del texto. Se conserva la preposición ''contra él'' como en el sentido del hebreo y del POB inglés.'
- source_word: לְבַלְּע֥וֹ
  english_pob_choice: to destroy him
  chosen_spanish: para destruirlo
  alternatives_spanish:
  - para devorarlo
  - para tragárselo
  - para arrasarlo
  lexicon: HALOT
  rationale: El hebreo dice literalmente 'tragárselo', pero el POB revisado prefirió 'destroy' por naturalidad y precisión contextual. En español, 'destruirlo' transmite el resultado metafórico sin forzar una imagen menos idiomática.
- source_word: חִנָּם
  english_pob_choice: for nothing
  chosen_spanish: sin motivo
  alternatives_spanish:
  - gratis
  - sin causa
  - de balde
  lexicon: HALOT
  rationale: '''Sin motivo'' expresa bien el valor de gratuidad/ausencia de causa en un registro claro para el lector español. También deja abierta la posible resonancia con el eco literario de Job 1:9 sin convertirla en una glosa.'
theological_decisions:
- issue: Atribución de la incitación y la tensión teológica sobre la agencia divina
  english_pob_reading: Retain the direct wording 'you incited me against him' without softening divine agency.
  chosen_spanish_reading: y tú me incitaste contra él
  alternative_spanish_readings:
  - y permitiste que le hiciera daño
  - y me impulsaste a actuar contra él
  rationale: El hebreo atribuye la acción de manera directa y el POB preserva esa tensión. La traducción no la atenúa para no resolver narrativamente el problema teológico que el texto mantiene abierto.
  doctrine_reference: DOCTRINE.md §Translation philosophy 3
- issue: Identidad y función de הַשָּׂטָן
  english_pob_reading: Translate as the role-title 'the Accuser' rather than the proper name 'Satan.'
  chosen_spanish_reading: el Acusador
  alternative_spanish_readings:
  - Satanás
  - el adversario
  rationale: El artículo hebreo favorece una lectura funcional/titulativa. 'Acusador' conserva la lectura auditada del POB y evita introducir sin necesidad una identificación posterior del personaje.
  doctrine_reference: DOCTRINE.md §Translation philosophy 3
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión más reciente del POB inglés, que prefirió 'destroy him' frente a 'swallow him up' por naturalidad y precisión contextual. La versión española adopta 'destruirlo' y conserva la nota sobre el hebreo literal para no borrar la metáfora subyacente. También se mantuvo la decisión revisada de traducir הַשָּׂטָן como título funcional.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' para el Tetragrámaton, consistente con el estándar del proyecto.
  - Se usa 'Acusador' como título, no como nombre propio, siguiendo el análisis del hebreo con artículo.
  - '''Siervo'', ''integridad'', ''teme a Dios'' y ''se aparta del mal'' preservan el registro sapiencial del libro de Job sin introducir vocabulario eclesiástico ajeno.'
  - La cláusula final conserva la tensión entre destrucción efectiva y literalidad metafórica mediante 'destruirlo' con nota explicativa.
