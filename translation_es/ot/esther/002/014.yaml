revisions:
- from: Al atardecer ella entraba[a], y por la mañana volvía a la segunda casa de las mujeres, al cuidado de Shaashgaz, el eunuco del rey, guardián de las concubinas[b]. No volvería a entrar al rey, sino cuando al rey le agradara en ella y fuera llamada por su nombre.
  to: Al atardecer ella entraba[a], y por la mañana volvía a la segunda casa de las mujeres, al cuidado de Shaashgaz, el eunuco del rey, guardián de las concubinas[b]. No volvería a entrar ante el rey, a menos que el rey se complaciera en ella y fuera llamada por nombre.
  rationale: 'Se corrigieron dos puntos necesarios para fidelidad y buen español: el modismo hebreo no puede verterse como «entrar al rey», por lo que se ajustó a «entrar ante el rey»; y חָפֵץ בָּהּ se expresó como «el rey se complaciera en ella», que preserva el sentido de favor/agrado en español natural. También se armonizó la nota cultural con el texto revisado. Se mantuvo «por nombre» por su cercanía al original y su inteligibilidad en un registro bíblico digno.'
