  to: Y la procedencia de los caballos de Salomón era Egipto y Kue[b][a], y los mercaderes del rey los obtenían de Kue por un precio.
  rationale: Se cambió «la fuente» por «la procedencia» para un español más natural y preciso en contexto comercial, y «Qué» por «Kue» para evitar una forma española confusa y alinearse con la decisión toponímica documentada en el POB inglés. También se suavizó la puntuación. Se mantuvieron las dos notas, ajustando su redacción para concordar con el texto revisado.
