  text: הָ֥בָ/ה נִֽתְחַכְּמָ֖ה ל֑/וֹ פֶּן יִרְבֶּ֗ה וְ/הָיָ֞ה כִּֽי תִקְרֶ֤אנָה מִלְחָמָה֙ וְ/נוֹסַ֤ף גַּם הוּא֙ עַל שֹׂ֣נְאֵ֔י/נוּ וְ/נִלְחַם בָּ֖/נוּ וְ/עָלָ֥ה מִן הָ/אָֽרֶץ־־־־־־׃
base_translation:
  language: en
  yaml_path: translation/ot/exodus/001/010.yaml
  text: Come[a], let us deal shrewdly with them, lest they multiply, and if war breaks out[c][b], they too may join our enemies and fight against us and go up out of the land.
  footnotes:
  - marker: a
    text: Hebrew 'with him'; the singular pronoun refers collectively to Israel, so English renders the sense as 'with them.'
    reason: lexical_alternative
  - marker: b
    text: Or 'let us deal wisely with them.' The Hebrew can denote acting cleverly or wisely; here the context favors a shrewd, politically calculating sense.
    reason: lexical_alternative
  - marker: c
    text: Or 'and leave the land.' Hebrew literally, 'and go up out of the land.'
    reason: lexical_alternative
