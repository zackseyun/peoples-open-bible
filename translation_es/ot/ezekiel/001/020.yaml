  text: עַ֣ל אֲשֶׁר֩ יִֽהְיֶה שָּׁ֨ם הָ/ר֤וּחַ לָ/לֶ֨כֶת֙ יֵלֵ֔כוּ שָׁ֥מָּ/ה הָ/ר֖וּחַ לָ/לֶ֑כֶת וְ/הָ/אוֹפַנִּ֗ים יִנָּשְׂאוּ֙ לְ/עֻמָּתָ֔/ם כִּ֛י ר֥וּחַ הַ/חַיָּ֖ה בָּ/אוֹפַנִּֽים־׃
base_translation:
  language: en
  yaml_path: translation/ot/ezekiel/001/020.yaml
  text: Wherever the spirit wanted to go[a], they went there; and the wheels were lifted up alongside them[c][b], because the spirit of the living creature was in the wheels.
  footnotes:
  - marker: a
    text: Or 'wind' or 'breath'; Hebrew רוּחַ can carry any of these senses. Here it refers to the animating or directing spirit in the vision.
    reason: lexical_alternative
  - marker: b
    text: Or 'opposite them' or 'corresponding to them' for 'alongside them.'
    reason: lexical_alternative
  - marker: c
    text: Some readers understand 'spirit' here as a reference to the Spirit of God; the Hebrew does not make that identification explicit.
    reason: alternative_reading
