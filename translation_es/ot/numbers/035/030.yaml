translation:
  language: es
  text: Todo el que mate[a] a una persona[b], se le dará muerte al homicida[c] conforme al testimonio de testigos[d]; pero un solo testigo no testificará contra una persona para muerte[e].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literalmente, 'golpea a una persona'. En este contexto legal, el sentido es dar muerte a una persona.
    reason: lexical_alternative
  - marker: b
    text: Hebreo nephesh aquí designa a una persona o vida humana en sentido jurídico, no 'alma' en un sentido técnico.
    reason: lexical_alternative
  - marker: c
    text: El hebreo usa el mismo radical para el homicida y para la acción de darle muerte; la traducción lo expresa como pena legal para no sugerir un homicidio ilícito por parte del tribunal.
    reason: lexical_alternative
  - marker: d
    text: Literalmente, 'por la boca de testigos'.
    reason: lexical_alternative
  - marker: e
    text: La frase hebrea final es muy compacta y puede entenderse como 'para muerte' en sentido legal; la versión evita ampliar el giro más de lo que el hebreo exige.
    reason: lexical_alternative
lexical_decisions:
- source_word: מַכֵּה נֶפֶשׁ
  english_pob_choice: strikes down a person
  chosen_spanish: hiera a una persona
  alternatives_spanish:
  - golpee a una persona
  - mate a una persona
  - derribe a una persona
  lexicon: HALOT
  rationale: El participio describe al que causa daño mortal a una nephesh; en este contexto jurídico, 'persona' comunica mejor el referente humano que 'alma'. 'Hiera' preserva la fuerza violenta sin cerrar de antemano el matiz legal que luego precisa el verso.
- source_word: נֶפֶשׁ
  english_pob_choice: person
  chosen_spanish: persona
  alternatives_spanish:
  - vida
  - alma
  lexicon: HALOT
  rationale: Aquí nephesh se refiere a un ser humano en un caso judicial, no a 'alma' en sentido antropológico. 'Persona' evita una lectura engañosa y conserva el valor legal del término.
- source_word: לְפִי עֵדִים
  english_pob_choice: on the testimony of witnesses
  chosen_spanish: conforme al testimonio de testigos
  alternatives_spanish:
  - por la boca de testigos
  - según testigos
  lexicon: HALOT
  rationale: La locución hebrea 'por la boca de' es idiomática y apunta a la base testimonial del fallo. 'Conforme al testimonio de testigos' expresa con naturalidad la fuerza jurídica sin perder el sentido probatorio.
- source_word: יִרְצַח אֶת הָרֹצֵחַ
  english_pob_choice: the murderer shall be put to death
  chosen_spanish: el homicida será muerto
  alternatives_spanish:
  - se dará muerte al homicida
  - el homicida será ejecutado
  - matarán al homicida
  lexicon: HALOT
  rationale: El hebreo usa el mismo radical para la acción judicial y para el culpable, pero en español conviene evitar 'asesinar al asesino' o fórmulas ambiguas. 'Será muerto' mantiene la pasiva legal y deja ver que se trata de una pena capital ordenada.
- source_word: הָרֹצֵחַ
  english_pob_choice: the murderer
  chosen_spanish: el homicida
  alternatives_spanish:
  - el asesino
  - el matador
  lexicon: HALOT
  rationale: En este contexto la figura es la del matador culpable sujeto a muerte legal. 'Homicida' conserva el registro jurídico y evita una carga coloquial o demasiado amplia.
- source_word: וְעֵד אֶחָד
  english_pob_choice: but one witness
  chosen_spanish: pero un solo testigo
  alternatives_spanish:
  - y un testigo
  - sino un testigo
  lexicon: HALOT
  rationale: El contraste legal exige un giro adversativo en español. 'Un solo testigo' comunica con claridad la insuficiencia probatoria frente a los testigos plurales.
- source_word: לֹא יַעֲנֶה
  english_pob_choice: shall not testify
  chosen_spanish: no testificará
  alternatives_spanish:
  - no responderá
  - no dará testimonio
  lexicon: HALOT
  rationale: En contextos legales, ענה significa dar testimonio/responder en juicio. 'Testificará' es el equivalente más natural y preciso en español jurídico-bíblico.
- source_word: בְנֶפֶשׁ לָמוּת
  english_pob_choice: against a person for death
  chosen_spanish: contra una persona para muerte
  alternatives_spanish:
  - contra una persona para condenarla a muerte
  - en causa de muerte
  - en un caso de muerte
  lexicon: HALOT
  rationale: La frase hebrea es compacta y formal. Se conserva la literalidad de 'para muerte' porque la POB inglesa revisada evitó expandir el sentido a una paráfrasis causal más interpretativa; en español, la forma queda comprensible dentro del marco legal del verso.
theological_decisions:
- issue: Uso del mismo campo léxico para el culpable y la pena capital
  english_pob_reading: The English avoids suggesting unlawful killing by the court.
  chosen_spanish_reading: El español mantiene la pasiva legal 'será muerto' para no convertir la ejecución judicial en un homicidio común.
  alternative_spanish_readings:
  - será ejecutado
  - se le dará muerte
  rationale: El texto hebreo repite el radical רצח; la traducción debe conservar la tensión entre el término del culpable y la sanción judicial sin suavizarla ni confundirla con asesinato ilegítimo. La pasiva permite esa precisión.
  doctrine_reference: Números 35:30; cf. la legislación sobre testigos en Deuteronomio 19:15
- issue: Valor de נֶפֶשׁ en un caso legal
  english_pob_reading: '''person'' avoids a body-soul distinction not intended by the Hebrew.'
  chosen_spanish_reading: '''Persona'' se usa en ambos casos para no introducir una dicotomía alma/cuerpo ajena al contexto.'
  alternative_spanish_readings:
  - vida
  - alma
  rationale: En español, 'alma' podría desorientar al lector hacia una antropología no presente en el versículo. 'Persona' respeta el referente jurídico y humano del término hebreo.
  doctrine_reference: Números 35:30; uso legal de nephesh en la Torá
translation_notes:
  revision_awareness: La redacción sigue la revisión más reciente del inglés en la cláusula final, conservando la literalidad de 'for death' sin expandirla a una paráfrasis causal. También refleja la elección revisada de un registro jurídico más formal para la pena capital y mantiene la distinción entre el testimonio plural suficiente y el testigo único insuficiente.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' para el Tetragrámaton según el estándar del proyecto, aunque este versículo no lo contiene.
  - Se usa 'persona' para נֶפֶשׁ en coherencia con el tratamiento legal del término en la POB inglesa.
  - 'Se conserva un registro jurídico sobrio: ''testimonio'', ''testigo'', ''homicida'', ''será muerto''.'
  - La frase final 'para muerte' se preserva deliberadamente como calco formal del hebreo, conforme a la revisión inglesa más literal.
