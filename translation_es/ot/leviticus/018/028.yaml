translation:
  language: es
  text: para que la tierra no los vomite[a] cuando la contaminen, así como vomitó a la nación que estuvo antes de ustedes.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «los expulse» / «expulsó». El hebreo usa una imagen vívida de la tierra que echa fuera a sus habitantes a causa de la contaminación.
    reason: lexical_alternative
lexical_decisions:
- source_word: תָקִיא / קָאָה
  english_pob_choice: vomit ... out / vomited out
  chosen_spanish: vomite / vomitó
  alternatives_spanish:
  - los expulse
  - los arroje fuera
  - los eche fuera
  lexicon: HALOT
  rationale: El hebreo usa una imagen corporal eינטensa de expulsión; «vomitar» conserva esa fuerza metafórica mejor que suavizarla con «expulsar». En español, el complemento direccional se sobreentiende por el contexto, y «vomite» comunica con claridad la personificación de la tierra.
- source_word: הָאָרֶץ
  english_pob_choice: the land
  chosen_spanish: la tierra
  alternatives_spanish:
  - la tierra de Canaán
  - el país
  - el suelo
  lexicon: HALOT
  rationale: En este contexto levítico se trata de la tierra pactal, no del planeta entero. «La tierra» es natural en español bíblico y conserva la referencia territorial concreta sin introducir una glosa excesiva.
- source_word: בְּטַמַּאֲכֶם אֹתָהּ
  english_pob_choice: when you defile it
  chosen_spanish: cuando la profanen
  alternatives_spanish:
  - al profanarla
  - cuando la hagan impura
  - al contaminarla
  lexicon: HALOT
  rationale: El sentido es causar impureza ritual/moral a la tierra. «Profanar» comunica bien esa contaminación sagrada en español eclesial, aunque «hacer impura» sería más literal. Se mantiene la relación causal-temporal del hebreo con «cuando».
- source_word: הַגּוֹי
  english_pob_choice: the nation
  chosen_spanish: la nación
  alternatives_spanish:
  - el pueblo
  - la gente
  - la nación gentil
  lexicon: HALOT
  rationale: El sustantivo singular colectivo גוי apunta al grupo que habitaba antes la tierra. «Nación» preserva mejor esa forma colectiva que «pueblo», y evita introducir la carga posterior de «gentil».
- source_word: אֲשֶׁר לִפְנֵיכֶם
  english_pob_choice: that was before you
  chosen_spanish: que estuvo antes de ustedes
  alternatives_spanish:
  - que estaba delante de ustedes
  - que fue antes de ustedes
  - que estaba antes que ustedes
  lexicon: HALOT
  rationale: La frase indica prioridad temporal y presencia previa en la tierra. «Estuvo antes de ustedes» transmite de manera natural esa anterioridad sin calco duro de «delante de su rostro».
- source_word: וְלֹא
  english_pob_choice: so that the land will not
  chosen_spanish: de modo que ... no
  alternatives_spanish:
  - y no
  - para que no
  - así que no
  lexicon: HALOT
  rationale: En contexto, la conjunción introduce un resultado/propósito negativo. «De modo que ... no» reproduce bien esa función discursiva en español moderno sin perder el matiz de advertencia.
theological_decisions:
- issue: La personificación de la tierra como agente de juicio
  english_pob_reading: Retain the land as the grammatical subject that 'vomits out' its inhabitants.
  chosen_spanish_reading: Mantener a la tierra como sujeto gramatical que ‘vomita’ a sus habitantes.
  alternative_spanish_readings:
  - Hacer explícito que Dios expulsa por medio de la tierra
  - Reducir la imagen a una expulsión no personificada
  rationale: 'El hebreo atribuye a la tierra la acción de expulsar por su impureza. Conservar esa personificación preserva la fuerza teológica del pasaje: la impureza contamina la tierra y la tierra reacciona expulsando a quienes la profanan, sin negar que Dios sigue siendo el juez soberano.'
  doctrine_reference: Translation philosophy §1, §3
translation_notes:
  revision_awareness: 'La redacción sigue de cerca el hebreo y el juicio auditado en inglés: conserva la personificación de la tierra, la imagen fuerte de expulsión y el valor colectivo de גוי, sin introducir una paráfrasis teológica adicional. No se detectaron revisiones posteriores que alteraran el sentido base.'
  spanish_consistency_notes:
  - Se usa «la tierra» para הָאָרֶץ de forma consistente con el contexto levítico territorial.
  - Se mantiene la imagen corporal «vomite»/«vomitó» en lugar de suavizarla con un verbo más abstracto.
  - «Profanen» refleja impureza/profanación ritual-moral; no se reemplaza por un término puramente ético.
  - «Nación» conserva el singular colectivo de הַגּוֹי.
  - El tono es bíblico moderno y readable, evitando tanto arcaísmo excesivo como tecnicismo innecesario.
