lexical_decisions:
- source_word: τὰ ... περὶ τοὺς σπλαγχνισμούς
  english_pob_choice: about the compassions
  chosen_spanish: acerca de las compasiones
  alternatives_spanish:
  - acerca de los sentimientos entrañables
  - acerca de las afectos íntimos
  - acerca de las misericordias
  lexicon: LSJ
  rationale: σπλαγχνισμούς es plural y alude a afectos profundos, compasión o ternura entrañable. En español, «compasiones» conserva el plural del griego y evita añadir un sujeto no explícito. Mantiene el cierre resumidor del pasaje sin volverlo demasiado interpretativo.
- source_word: αἱ ὑπερβαλλούσαι αἰκίαι
  english_pob_choice: the extraordinary tortures
  chosen_spanish: las torturas extraordinarias
  alternatives_spanish:
  - las crueldades extraordinarias
  - los excesos de maltrato
  - los suplicios extremos
  lexicon: LSJ
  rationale: αἰκίαι en este contexto narrativo de martirio denota maltrato violento o tortura; «torturas» comunica mejor la violencia concreta que «crueldades». ὑπερβαλλούσας intensifica la expresión, por lo que «extraordinarias» reproduce adecuadamente la idea de exceder la medida común.
- source_word: ἐπὶ τοσούτου δεδηλώσθω
  english_pob_choice: let this be enough
  chosen_spanish: baste esto
  alternatives_spanish:
  - sea esto suficiente
  - déjese declarado esto hasta aquí
  - quede dicho esto hasta este punto
  lexicon: LSJ
  rationale: 'La expresión griega funciona como fórmula de cierre: «que esto quede declarado hasta tal punto» o «que baste esto». En español, «baste esto» es idiomático y conserva el tono conclusivo sin introducir una paráfrasis excesiva.'
translation_notes:
  revision_awareness: La redacción sigue el cierre formal del griego y toma en cuenta la revisión del audit trail inglés que corrigió una atribución no explícita al quitar «la madre». Por eso se conserva el plural «compasiones» y no se añade ningún sujeto concreto que el griego no menciona.
  spanish_consistency_notes:
  - Se mantiene «compasiones» en plural para reflejar σπλαγχνισμούς, evitando singularizarlo.
  - Se eligió «torturas» para αἰκίαι por el contexto martirial del pasaje.
  - «Así pues» y «baste esto» reproducen el valor conclusivo de la fórmula griega sin sonar arcaicos.
  - No se usó «SEÑOR» ni otros términos de enmascaramiento, porque el versículo no contiene el nombre divino.
