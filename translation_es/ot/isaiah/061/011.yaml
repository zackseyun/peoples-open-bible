revisions:
- from: Porque así como la tierra hace salir su brote[a], y como un jardín hace brotar lo que en él fue sembrado, así el Señor Yahvé hará brotar justicia y alabanza delante de todas las naciones.
  to: Porque así como la tierra produce su crecimiento, y como un jardín hace brotar lo que en él fue sembrado, así el Señor Yahvé hará brotar rectitud[a] y alabanza ante todas las naciones.
  rationale: La revisión corrige el anclaje de la nota para que recaiga sobre צְדָקָה, alinea el término principal con la decisión auditada del POB usando «rectitud» en el texto y dejando «justicia» como alternativa en nota, y mejora la naturalidad de la primera imagen agrícola con «produce su crecimiento».
  reviewer_model: gpt-5.4
