  glossary_alignment: No hay conflictos con la terminología base del proyecto. «prostitución», «maldad» y la conservación del símil «como un árabe en el desierto» concuerdan con el rastro léxico-teológico documentado. La principal cuestión es una decisión léxica puntual sobre שׁגל en español.
