review_pass:
  verdict: revise
  source_alignment_summary: El hebreo dice literalmente que Bilhá concibió y dio a luz un hijo para/a Jacob. Sin embargo, en español natural y fiel a la fuerza relacional de לְיַעֲקֹב en este contexto narrativo, la construcción más adecuada es «le dio un hijo a Jacob» o «dio a luz un hijo para Jacob» con nota. El borrador preserva bien el sentido general, pero «dio a luz un hijo para Jacob» suena menos idiomático y algo rígido en español.
  spanish_quality_summary: El borrador es claro, pero la frase «dio a luz un hijo para Jacob» resulta poco natural en español bíblico contemporáneo. También conviene evitar «Bilhá», ya que «Bilha» es la forma más transparente y usual en español para este nombre; el acento gráfico no es necesario. La revisión mejora la fluidez sin perder precisión.
  glossary_alignment: 'No hay términos del glosario teológico principal en juego. La decisión clave es el nombre propio: se prefiere «Bilha» sobre «Bilhá» por legibilidad y uso español. «Concibió» y «hijo» están bien alineados con la evidencia fuente. Para לְיַעֲקֹב, el español idiomático favorece «le dio a Jacob un hijo», mientras una nota puede preservar la alternativa más literal «dio a luz un hijo para Jacob».'
  issues:
  - severity: medium
    issue: «para Jacob» es poco idiomático en la oración principal
    rationale: Aunque לְ puede justificarse como «para», en español la construcción completa «dio a luz un hijo para Jacob» suena forzada. La misma relación se expresa más naturalmente como «le dio a Jacob un hijo», sin pérdida de sentido.
  - severity: low
    issue: Uso de «Bilhá» con acento gráfico
    rationale: La acentuación española no exige tilde aquí y la forma más estándar para nombres hebreos semejantes en español bíblico es «Bilha». No afecta el sentido, pero sí la naturalidad y consistencia editorial.
  - severity: low
    issue: Falta la nota léxica alternativa preservada en el inglés POB
    rationale: El inglés conservó una alternativa más literal para el primer y segundo verbo y para la preposición relacional. Dado que la revisión opta por una formulación más idiomática, conviene mantener la alternativa literal en nota.
  revised_spanish_text: Bilha concibió y le dio a Jacob un hijo[a].
  revised_footnotes:
  - marker: a
    text: O, más literalmente, «quedó embarazada y dio a luz un hijo para Jacob».
    reason: lexical_alternative
