id: 3MA.5.27
reference: 3 Maccabees 5:27
source:
  edition: lxx-swete-1909
  text: τοῦ δὲ ἀποδεξαμένου καὶ καταπλαγέντος ἐπὶ τῇ ἀνόμῳ ἐξόδῳ, κατὰ πάντα ἀγνωσίᾳ κεκρατημένος ἐπυνθάνετο, ὅτι τὸ διαγραμμένον ἔτι αὐτῷ μετὰ σπουδῆς τετέλεσται.
  language: Greek
  pages:
  - 744
  confidence: high
  validation: agree
translation:
  text: But when he had accepted it and was struck with astonishment at the lawless outcome[a], being in every way overcome by ignorance[b], he kept asking whether what had been decreed had indeed been carried out for him with urgency.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the lawless result' or 'the unlawful issue'; the Greek phrase uses ἔξοδος in a context where 'departure' is possible lexically but unlikely in English.
    reason: lexical_alternative
  - marker: b
    text: Or 'what had been written down' or 'the issued order'; the Greek can refer specifically to a written decree.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀποδεξαμένου
  chosen: had accepted
  alternatives:
  - had received
  - had approved
  lexicon: LSJ
  rationale: Aorist middle participle of ἀποδέχομαι. In context it refers to the king's having received/accepted the report or situation before reacting. 'Accepted' is natural English and preserves the sense without over-specifying formal approval.
- source_word: καταπλαγέντος
  chosen: was struck with astonishment
  alternatives:
  - was astounded
  - was dumbfounded
  lexicon: LSJ
  rationale: The participle conveys being overwhelmed or astonished. 'Struck with astonishment' preserves the passive force and dramatic tone better than the flatter 'was astounded.'
- source_word: ἀνόμῳ ἐξόδῳ
  chosen: lawless outcome
  alternatives:
  - lawless issue
  - unlawful result
  - lawless departure
  lexicon: LSJ
  rationale: ἄνομος means lawless/unlawful. ἔξοδος can mean exit, issue, or outcome depending on context. Here a literal 'departure' is awkward and unclear; the phrase refers to the shocking result/turn of events, so 'outcome' best fits the narrative sense while staying close to the Greek.
- source_word: κατὰ πάντα
  chosen: in every way
  alternatives:
  - altogether
  - completely
  lexicon: LSJ
  rationale: Idiomatic distributive phrase meaning in all respects. 'In every way' is clear modern English and preserves the breadth of the expression.
- source_word: ἀγνωσίᾳ κεκρατημένος
  chosen: overcome by ignorance
  alternatives:
  - held fast by ignorance
  - kept in ignorance
  - mastered by confusion
  lexicon: LSJ
  rationale: Perfect passive participle of κρατέω with dative indicates being dominated or controlled by ignorance/lack of knowledge. 'Overcome by ignorance' is idiomatic and preserves the force of being mentally at a loss.
- source_word: ἐπυνθάνετο
  chosen: he kept asking
  alternatives:
  - he inquired
  - he was asking
  lexicon: LSJ
  rationale: Imperfect middle of πυνθάνομαι suggests repeated or ongoing inquiry. 'He kept asking' captures the iterative aspect better than simple 'inquired.'
- source_word: τὸ διαγραμμένον
  chosen: what had been decreed
  alternatives:
  - what had been written down
  - the order that had been issued
  - what had been prescribed
  lexicon: LSJ
  rationale: The neuter perfect participle from διαγράφω can denote something set down in writing, especially an edict or decree. In this court setting, 'what had been decreed' best conveys the administrative sense.
- source_word: ἔτι
  chosen: indeed
  alternatives:
  - still
  - yet
  lexicon: LSJ
  rationale: Although ἔτι often means 'still/yet,' in this clause it functions adverbially to intensify the question about whether the decree had actually been executed. 'Indeed' fits the sense better in English than a temporal 'still.'
- source_word: μετὰ σπουδῆς
  chosen: with urgency
  alternatives:
  - with haste
  - eagerly
  - diligently
  lexicon: LSJ
  rationale: σπουδή can denote haste, earnestness, or zeal. In context of executing a royal order, 'with urgency' captures both speed and seriousness.
- source_word: τετέλεσται
  chosen: had indeed been carried out
  alternatives:
  - had been completed
  - had been accomplished
  - had been executed
  lexicon: LSJ
  rationale: Perfect passive of τελέω means to bring to completion or carry out. 'Carried out' fits an order or decree naturally; 'executed' could be misunderstood as referring to killing rather than implementation.
