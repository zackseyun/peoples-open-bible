translation:
  text: And the name of the male was Behemoth[a], who occupies with his breast an unseen wilderness named Dundayin, east of the garden, where the chosen and the righteous dwell, where my great-grandfather was taken up, the seventh from Adam[e][d][c][b], the first of men whom the Lord of Spirits made.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The description of the wilderness is uncertain. The Ge'ez may suggest a wilderness that is unseen, inaccessible, or simply desolate.
    reason: textual_variant
  - marker: b
    text: '''Garden'' is rendered literally from the Ge''ez; some readers may understand this as the primordial garden, but the text here does not explicitly say ''Eden.'''
    reason: lexical_alternative
  - marker: c
    text: The speaker is Enoch, who identifies himself as 'the seventh from Adam.'
    reason: cross_reference
  - marker: d
    text: Or 'And the name of the second was Behemoth'.
    reason: previous_rendering
  - marker: e
    text: Or 'a desolate wilderness'.
    reason: previous_rendering
lexical_decisions:
- source_word: ለተ ባዕታይ
  chosen: the second
  alternatives:
  - the second one
  - the second creature
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The phrase marks the second of the two primordial beings just mentioned in context. 'The second' is sufficient in English; 'creature' is implied by context rather than explicit here.
- source_word: ስሙ ብሔሞት
  chosen: the name ... was Behemoth
  alternatives:
  - its name was Behemoth
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: A proper name is best transliterated, not translated, per project philosophy. The singular naming formula supports 'the name ... was Behemoth.'
- source_word: ዘይአኅዝ
  chosen: who occupies
  alternatives:
  - who holds
  - who possesses
  - who takes up
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The verb conveys taking/holding a place. 'Occupies' fits the spatial sense in this visionary description without over-literal awkwardness.
- source_word: በእንግ ድዓሁ
  chosen: with his breast
  alternatives:
  - with his chest
  - with his body
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The phrase is difficult, but the traditional lexical sense points to the breast/chest region. Retaining this bodily image preserves the strange apocalyptic concreteness rather than generalizing to 'body.'
- source_word: በበድው ዘኢያስተርኢ
  chosen: a desolate wilderness
  alternatives:
  - an invisible desert
  - a trackless waste
  - a wilderness that is not seen
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The clause likely describes a barren, inaccessible, or unseen desert region. 'Desolate wilderness' gives a readable main text while avoiding overconfidence about whether the emphasis is invisibility or uninhabitability.
- source_word: ዱንዳይን
  chosen: Dundayin
  alternatives: []
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: This is a place-name and should be transliterated rather than translated.
- source_word: በምሥራቀ ገነት
  chosen: east of the garden
  alternatives:
  - to the east of Eden
  - east of the paradise
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Ge'ez literally gives 'east of the garden.' 'Garden' is preferred over importing 'Eden' where the text does not explicitly say it, and over 'paradise,' which may over-interpret.
- source_word: በኀበ ይነብሩ ኅሩያን ወጻድቃን
  chosen: where the chosen and the righteous dwell
  alternatives:
  - where the elect and the righteous dwell
  - beside whom the chosen and righteous live
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The relative-local sense is best represented by 'where.' 'Chosen' and 'righteous' preserve key apocalyptic terms without importing later doctrinal freight.
- source_word: ተመጠወ
  chosen: was taken up
  alternatives:
  - was gathered
  - was removed
  - was transferred
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: In context this refers to Enoch's translation/removal. 'Was taken up' preserves the upward, visionary force without forcing later technical terminology.
- source_word: እምኄውየ
  chosen: my great-grandfather
  alternatives:
  - my ancestor
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: In Enoch's voice and with the following phrase 'the seventh from Adam,' this points specifically to his forefather relation. 'Great-grandfather' is the idiomatic genealogical rendering traditionally associated with Enoch's relation to Adam through Jared/Mahalalel/Cainan/Enosh/Seth, though the exact kin term may be broader in Ge'ez.
- source_word: ሳብዕ እምአዳም
  chosen: the seventh from Adam
  alternatives:
  - seventh after Adam
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: This is a fixed genealogical expression and should be rendered straightforwardly.
- source_word: ቀዳሚሆሙ ለሰብእ
  chosen: the first of humankind
  alternatives:
  - the first among men
  - the first of people
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The phrase refers back to Adam as the first human. 'Humankind' is natural modern English and preserves the collective sense.
- source_word: ዘገብረ እግዚአ መናፍስት
  chosen: whom the Lord of Spirits made
  alternatives:
  - whom the Lord of spirits created
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: '''Lord of Spirits'' is a key Enochic divine title and should be preserved consistently. ''Made'' is a direct and readable rendering of the verb.'
