translation:
  language: es
  text: Entonces fueron Elifaz el temanita, Bildad el suhita y Zofar el naamatita, e hicieron como Yahvé les había dicho, y Yahvé aceptó[a] a Job.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «levantó el rostro de Job», un modismo que significa que le mostró favor o lo aceptó.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֵּלְכוּ
  english_pob_choice: went
  chosen_spanish: fueron
  alternatives_spanish:
  - fueron y se fueron
  - partieron
  lexicon: HALOT
  rationale: El wayyiqtol de הלך aquí introduce la acción siguiente en la narración; en español, «fueron» conserva la secuencia natural sin añadir matices no presentes en el hebreo.
- source_word: אֱלִיפַז הַתֵּימָנִי / בִלְדַּד הַשּׁוּחִי / צֹפַר הַנַּעֲמָתִי
  english_pob_choice: the Temanite / the Shuhite / the Naamathite
  chosen_spanish: el temanita / el suhita / el naamatita
  alternatives_spanish:
  - el de Temán / el de Suaj / el de Naamat
  lexicon: HALOT
  rationale: Son gentilicios identificadores; en español, las formas transliteradas/adjetivales mantienen el carácter propio de nombre étnico o regional sin convertirlos en descripciones libres.
- source_word: וַיַּעֲשׂוּ
  english_pob_choice: did
  chosen_spanish: hicieron
  alternatives_spanish:
  - actuaron
  - llevaron a cabo
  lexicon: HALOT
  rationale: עשה es amplio y, con כַּאֲשֶׁר, forma la expresión idiomática «hacer como». «Hicieron» preserva la sencillez y evita especificar la acción más allá del hebreo.
- source_word: כַּאֲשֶׁר דִּבֶּר אֲלֵיהֶם
  english_pob_choice: as ... had spoken to them
  chosen_spanish: como Yahvé les había dicho
  alternatives_spanish:
  - según lo que Yahvé les había dicho
  - tal como Yahvé les había hablado
  lexicon: HALOT
  rationale: La forma verbal anterior a la acción siguiente queda bien marcada con el pluscuamperfecto español. «Les había dicho» sigue de cerca el sentido de דבר en este contexto de mandato divino.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  lexicon: HALOT
  rationale: 'Se sigue el estándar del proyecto para el Tetragrámaton: transliterar el nombre divino como «Yahvé» en vez de sustituirlo por un título.'
- source_word: וַיִּשָּׂא ... אֶת־פְּנֵי אִיּוֹב
  english_pob_choice: accepted Job
  chosen_spanish: aceptó a Job
  alternatives_spanish:
  - mostró favor a Job
  - levantó el rostro de Job
  lexicon: HALOT
  rationale: Se conserva el sentido idiomático de נשׂא פנים como trato favorable/aceptación. «Aceptó a Job» comunica el efecto del hebreo sin perder la tensión figurativa documentada.
theological_decisions:
- issue: Renderización del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  rationale: El texto hebreo usa directamente el Tetragrámaton, y el proyecto exige preservarlo como nombre propio divino. «Yahvé» mantiene esa identificación sin la sustitución tradicional «SEÑOR».
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Idioma figurado de נשׂא פנים aplicado a Job
  english_pob_reading: the LORD accepted Job
  chosen_spanish_reading: Yahvé aceptó a Job
  alternative_spanish_readings:
  - Yahvé mostró favor a Job
  - Yahvé levantó el rostro de Job
  rationale: En este cierre narrativo, el hebreo expresa favor/aceptación divina. «Aceptó a Job» conserva la lectura idiomática y teológica principal; la imagen literal queda señalada en nota para no borrar la tensión del hebreo.
  doctrine_reference: DOCTRINE.md Translation philosophy §1, §3, §6
translation_notes:
  revision_awareness: 'Alineado con el audit trail inglés vigente: sin revisiones aplicadas y con acuerdo alto; se conserva la solución idiomática para נשׂא פנים y la transliteración del nombre divino como Yahvé.'
  spanish_consistency_notes:
  - 'Se mantiene una sola convención para el nombre divino: Yahvé.'
  - Los gentilicios se presentan en forma breve y reconocible para lector eclesial hispanohablante.
  - La nota preserva la alternativa literal del modismo hebreo sin incorporar interpretación doctrinal extra.
