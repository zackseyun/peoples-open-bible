translation:
  language: es
  text: 'Y dijeron[a]: «Debe haber una herencia para los sobrevivientes de Benjamín, para que ninguna tribu sea borrada de Israel».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «un remanente para Benjamín» o «una herencia para los sobrevivientes de Benjamín». El hebreo yuxtapone de manera compacta «herencia» y «sobrevivientes/remanente», y la relación exacta entre ambos sustantivos puede expresarse de más de una forma natural en español.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמְרוּ
  english_pob_choice: And they said
  chosen_spanish: Y dijeron
  alternatives_spanish:
  - Entonces dijeron
  lexicon: HALOT
  rationale: La forma narrativa wayyiqtol de אמר se expresa de manera natural con una simple coordinación en español. «Y dijeron» conserva el avance del relato sin añadir una secuencia temporal más fuerte que la del hebreo.
- source_word: יְרֻשַּׁת
  english_pob_choice: an inheritance
  chosen_spanish: una herencia
  alternatives_spanish:
  - una posesión heredada
  - una porción heredada
  lexicon: HALOT
  rationale: El sustantivo denota una posesión recibida por herencia. «Herencia» comunica bien la idea en español y mantiene la relación con continuidad tribal y posesión hereditaria.
- source_word: פְּלֵיטָה
  english_pob_choice: the survivors
  chosen_spanish: los sobrevivientes
  alternatives_spanish:
  - el remanente
  - los escapados
  lexicon: HALOT
  rationale: El término apunta a quienes han quedado con vida tras la destrucción. «Sobrevivientes» es claro y neutral en español; «remanente» sería posible, pero puede cargar un matiz teológico no exigido aquí.
- source_word: לְבִנְיָמִן
  english_pob_choice: of Benjamin
  chosen_spanish: de Benjamín
  alternatives_spanish:
  - para Benjamín
  - para los benjaminitas
  lexicon: HALOT
  rationale: En este contexto, la relación de pertenencia queda mejor expresada con «de Benjamín», es decir, los sobrevivientes que pertenecen a la tribu.
- source_word: וְלֹא יִמָּחֶה
  english_pob_choice: so that ... may not be blotted out
  chosen_spanish: para que no sea borrada
  alternatives_spanish:
  - para que no sea borrada del todo
  - para que no sea borrada y desaparezca
  lexicon: HALOT
  rationale: El nifal de מחה expresa la idea de ser borrado o borrada. «Sea borrada» conserva la fuerza del pasivo y el sentido de eliminación total; se eligió una subordinada final para reflejar el propósito del contexto.
- source_word: שֵׁבֶט
  english_pob_choice: a tribe
  chosen_spanish: ninguna tribu
  alternatives_spanish:
  - una tribu
  - la tribu
  lexicon: HALOT
  rationale: 'Aunque el hebreo tiene forma indefinida («tribu»), el contexto exige la generalización: el temor es que desaparezca alguna de las tribus de Israel. En español, «ninguna tribu» evita una lectura demasiado literal que sonaría menos idiomática.'
- source_word: מִיִּשְׂרָאֵל
  english_pob_choice: from Israel
  chosen_spanish: de Israel
  alternatives_spanish:
  - de entre Israel
  - de en medio de Israel
  lexicon: HALOT
  rationale: La preposición min se puede expresar de forma natural como «de» en español. Aquí comunica la pertenencia y la posible desaparición «de Israel» como pueblo.
theological_decisions:
- issue: Traducción de פְּלֵיטָה en un contexto de preservación tribal
  english_pob_reading: the survivors
  chosen_spanish_reading: los sobrevivientes
  alternative_spanish_readings:
  - el remanente
  - los escapados
  rationale: No se introdujo lenguaje más cargado como «remanente» porque el pasaje habla del grupo que quedó con vida después del conflicto, no necesariamente de una categoría teológica técnica. «Sobrevivientes» mantiene la realidad histórica sin borrar la tensión del texto.
  doctrine_reference: Preservación del pueblo de Israel / continuidad tribal
- issue: Relación entre «herencia» y la preservación de la tribu
  english_pob_reading: There must be an inheritance for the survivors of Benjamin
  chosen_spanish_reading: Debe haber una herencia para los sobrevivientes de Benjamín
  alternative_spanish_readings:
  - Debe quedar una herencia para los sobrevivientes de Benjamín
  - Debe existir una herencia para los sobrevivientes de Benjamín
  rationale: 'Se preserva la estructura compacta del hebreo: una herencia vinculada con los sobrevivientes. No se interpretó como herencia en el sentido espiritual, sino como provisión concreta para sostener la continuidad de la tribu.'
  doctrine_reference: Herencia tribal y preservación del linaje de Benjamín
- issue: Fuerza del pasivo «no sea borrada»
  english_pob_reading: so that a tribe may not be blotted out from Israel
  chosen_spanish_reading: para que no sea borrada de Israel ninguna tribu
  alternative_spanish_readings:
  - para que no desaparezca de Israel ninguna tribu
  - para que ninguna tribu sea borrada de Israel
  rationale: '«Borrada» conserva la imagen de eliminación total presente en el hebreo y en la traducción inglesa. Se mantuvo el alcance colectivo: no debe extinguirse ninguna tribu de Israel.'
  doctrine_reference: Continuidad de las tribus de Israel
translation_notes:
  revision_awareness: 'La versión inglesa revisada cambió «must remain» por «must be» para reflejar más directamente la expresión nominal hebrea «una herencia para los sobrevivientes de Benjamín». En español se siguió ese ajuste con una construcción igualmente nominal y natural: «Debe haber una herencia para los sobrevivientes de Benjamín».'
  spanish_consistency_notes:
  - Se usó «Yahvé» solo cuando el texto fuente lo requiera; aquí no aparece el nombre divino.
  - Se prefirió «sobrevivientes» sobre «remanente» para no cargar el término con un matiz técnico innecesario.
  - «Borrada» reproduce el valor fuerte del hebreo יִמָּחֶה y la elección inglesa «blotted out».
