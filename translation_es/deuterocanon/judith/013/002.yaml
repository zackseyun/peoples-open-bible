lexical_decisions:
- source_word: ἦσαν ... κεκοπωμένοι
  english_pob_choice: they were all exhausted
  chosen_spanish: todos estaban agotados
  alternatives_spanish:
  - todos estaban cansados
  - todos estaban fatigados
  - todos estaban rendidos
  lexicon: BDAG
  rationale: El participio perfecto expresa un estado resultante; «estaban agotados» comunica en español una condición fuerte y natural, cercana al valor de «exhausted», sin debilitarlo a «cansados».},{
- source_word: διὰ τὸ ... γεγονέναι
  english_pob_choice: because ... had gone on
  chosen_spanish: porque ... se había prolongado
  alternatives_spanish:
  - porque ... había ocurrido
  - porque ... había llegado a ser
  - porque ... había continuado
  lexicon: BDAG
  rationale: La construcción causal exige expresar la razón del agotamiento; «se había prolongado» conserva el sentido de una acción ya completada que duró más de lo debido.
- source_word: ἐπὶ πλεῖον
  english_pob_choice: too long
  chosen_spanish: demasiado
  alternatives_spanish:
  - por más tiempo
  - en exceso
  - más de la cuenta
  lexicon: LSJ
  rationale: En contexto con la bebida, el giro marca exceso de duración o medida; «demasiado» transmite esa idea de manera idiomática en español.
- source_word: τὸν πότον
  english_pob_choice: the drinking
  chosen_spanish: la bebida
  alternatives_spanish:
  - el beber
  - la ingesta de bebida
  - el brindis
  lexicon: LSJ
  rationale: πότος puede referirse al acto o ocasión de beber; «la bebida» resulta más natural que un calco, y evita introducir la idea de un banquete que el término no exige.
- source_word: γὰρ
  english_pob_choice: For
  chosen_spanish: Pues
  alternatives_spanish:
  - Porque
  - Ya que
  - En efecto
  lexicon: BDAG
  rationale: «Pues» conserva el valor explicativo de la partícula y suena natural al inicio de la cláusula en español.
translation_notes:
  revision_awareness: El texto griego breve y la auditoría inglesa están en alto acuerdo; no hay revisiones aplicadas en el paso más reciente. La versión española sigue esa lectura con equivalencia óptima y conserva la ambigüedad lexical documentada en la nota.
  spanish_consistency_notes:
  - Se usa «agotados» para reflejar el estado resultante del participio perfecto κεκοπωμένοι.
  - Se traduce πότος de forma no litúrgica y no expansiva, evitando «banquete» porque el griego no menciona comida.
  - «Pues» mantiene la conexión explicativa de γὰρ sin forzar un calco rígido.
  - La nota al pie preserva la alternativa semántica documentada por la auditoría inglesa.
