translation:
  language: es
  text: Si preparas tu corazón y extiendes tus manos a él,[a]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «extiendes tu mano a él». El hebreo usa una forma singular para «palma/mano», aunque la expresión suele referirse al gesto de extender ambas manos en oración.
    reason: lexical_alternative
lexical_decisions:
- source_word: אִם
  english_pob_choice: If
  chosen_spanish: Si
  alternatives_spanish:
  - Ciertamente, si
  - Cuando
  lexicon: HALOT
  rationale: Introduce una cláusula condicional directa; en español, «si» conserva con naturalidad la apertura condicional del hebreo sin añadir certeza ni temporalidad que no estén en el texto.
- source_word: הֲכִינוֹתָ
  english_pob_choice: prepare
  chosen_spanish: preparas
  alternatives_spanish:
  - preparas y dispones
  - pones en orden
  lexicon: HALOT
  rationale: El Hiphil de כון expresa poner firme, disponer o preparar. «Preparas» preserva el sentido interno y funciona bien con «tu corazón» en español moderno sin volverlo demasiado explicativo.
- source_word: לִבֶּךָ
  english_pob_choice: your heart
  chosen_spanish: tu corazón
  alternatives_spanish:
  - tu mente
  - tu interior
  lexicon: HALOT
  rationale: «Corazón» conserva el antropologismo hebreo del centro interior de la persona, incluyendo voluntad y pensamiento. «Mente» reduciría indebidamente el alcance del término.
- source_word: וּפָרַשְׂתָּ
  english_pob_choice: and stretch out
  chosen_spanish: extiendes
  alternatives_spanish:
  - abres
  - levantas y extiendes
  lexicon: HALOT
  rationale: En el contexto de oración, פרשׂ describe extender o desplegar las manos. «Extiendes» es la opción española más natural y mantiene la postura implícita sin sobrecargarla.
- source_word: אֵלָיו
  english_pob_choice: to him
  chosen_spanish: hacia él
  alternatives_spanish:
  - a él
  - para él
  lexicon: HALOT
  rationale: La preposición marca dirección hacia un referente masculino singular implícito en el contexto. «Hacia él» conserva el referente pronominal sin explicitar «Dios», como hace el audit trail inglés.
- source_word: כַּפֶּךָ
  english_pob_choice: your hands
  chosen_spanish: tus manos
  alternatives_spanish:
  - tu palma
  - tu mano
  lexicon: HALOT
  rationale: El hebreo usa un singular con sentido colectivo para la palma/mano, pero en español la postura de oración se expresa naturalmente en plural. «Tus manos» transmite mejor el gesto sin perder la nota léxica.
theological_decisions:
- issue: Referente implícito de אֵלָיו
  english_pob_reading: The pronoun refers to God, rendered 'to him' rather than explicitly 'to God.'
  chosen_spanish_reading: El pronombre se conserva implícito en español como «hacia él», sin añadir «a Dios».
  alternative_spanish_readings:
  - hacia Dios
  - a él
  rationale: La lectura contextual apunta a Dios, pero el hebreo no nombra explícitamente el referente. Mantener el pronombre evita introducir una especificación no presente en el verso, a la vez que deja claro el movimiento de la oración.
  doctrine_reference: Primacía del texto original; no ampliar la especificidad referencial más allá de lo que el hebreo expresa.
translation_notes:
  revision_awareness: El pasaje presenta alta concordancia con el audit trail inglés y no requiere revisiones sustantivas. Se mantiene la estructura condicional y el paralelismo entre preparar el corazón y extender las manos, con una nota para el singular hebreo de כַּף.
  spanish_consistency_notes:
  - Se usa «corazón» para לֵב de modo consistente con la antropología bíblica hebrea.
  - Se evita sustituir el pronombre por el nombre de Dios, siguiendo la reserva del texto fuente.
  - «Extiendes tus manos» conserva el gesto orante idiomático y la fluidez en español.
  - La nota marca la alternativa singular de «mano/palma» para reflejar la tensión lexical del hebreo.
