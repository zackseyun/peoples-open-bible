translation:
  language: es
  text: "Así ofrecerán, cada día por siete días, alimento[b], una ofrenda hecha por fuego, aroma agradable a Yahvé; esto se ofrecerá además del holocausto continuo y de su libación[c]."
  philosophy: optimal-equivalence
  footnotes:
  - marker: b
    text: "Hebreo: «alimento/pan de una ofrenda hecha por fuego»; aquí «alimento» se refiere a la provisión sacrificial, no necesariamente a pan literal."
    reason: cultural_note
  - marker: c
    text: "O: «sobre el holocausto continuo y su libación»."
    reason: lexical_alternative
lexical_decisions:
- source_word: כָּאֵלֶּה
  english_pob_choice: Thus / According to these
  chosen_spanish: Así
  alternatives_spanish:
  - De esta manera
  - Conforme a esto
  lexicon: HALOT
  rationale: La forma con כ indica comparación o conformidad con lo ya prescrito. «Así» mantiene ese valor distributivo y normativo en español sin sonar artificial.
- source_word: תַּעֲשׂוּ
  english_pob_choice: you shall offer
  chosen_spanish: ofrecerán
  alternatives_spanish:
  - harán
  - presentarán
  lexicon: HALOT
  rationale: En contexto sacrificial, עשה funciona como acción cultual. «Ofrecerán» es la equivalencia natural en español para el acto de presentar sacrificios.
- source_word: לַיּוֹם שִׁבְעַת יָמִים
  english_pob_choice: each day for seven days
  chosen_spanish: cada día por siete días
  alternatives_spanish:
  - día tras día por siete días
  - por siete días, cada día
  lexicon: HALOT
  rationale: La frase expresa repetición distributiva. «Cada día por siete días» comunica esa continuidad con claridad y sin añadir información.
- source_word: לֶחֶם אִשֵּׁה
  english_pob_choice: food, an offering made by fire
  chosen_spanish: alimento, ofrenda encendida
  alternatives_spanish:
  - pan, ofrenda hecha por fuego
  - alimento de ofrenda por fuego
  lexicon: HALOT
  rationale: לֶחֶם aquí puede referir a alimento/provisión sacrificial, no necesariamente a pan literal. «Alimento» conserva la amplitud semántica; «ofrenda encendida» refleja el valor de אִשֵּׁה y el trasfondo de sacrificio por fuego.
- source_word: רֵיחַ נִיחֹחַ
  english_pob_choice: a pleasing aroma
  chosen_spanish: aroma agradable
  alternatives_spanish:
  - aroma grato
  - aroma placentero
  lexicon: HALOT
  rationale: La fórmula cultual expresa aceptación delante de Dios. «Aroma agradable» es una equivalencia idiomática fiel y sobria en español.
- source_word: לַיהוָה
  english_pob_choice: to Yahweh
  chosen_spanish: a Yahvé
  alternatives_spanish:
  - para Yahvé
  - a Yahveh
  lexicon: HALOT
  rationale: 'Se sigue el criterio editorial del proyecto: el Tetragrámaton se traduce «Yahvé» en el texto principal, preservando el nombre divino revelado.'
- source_word: עַל עֹלַת הַתָּמִיד
  english_pob_choice: in addition to the regular burnt offering
  chosen_spanish: en adición al holocausto continuo
  alternatives_spanish:
  - además del holocausto continuo
  - sobre el holocausto continuo
  lexicon: HALOT
  rationale: עַל tiene aquí valor aditivo/superpuesto. «En adición a» conserva la relación ritual. «Holocausto continuo» refleja הַתָּמִיד como ofrenda regular y permanente.
- source_word: יֵעָשֶׂה
  english_pob_choice: it shall be offered
  chosen_spanish: se ofrecerá
  alternatives_spanish:
  - será ofrecido
  - se hará
  lexicon: HALOT
  rationale: La pasiva de עשה en contexto cultual se expresa de modo natural como «se ofrecerá», manteniendo el sujeto implícito del rito.
- source_word: וְנִסְכּוֹ
  english_pob_choice: and its drink offering
  chosen_spanish: y a su libación
  alternatives_spanish:
  - y su ofrenda líquida
  - y su derramamiento
  lexicon: HALOT
  rationale: נסך alude a la ofrenda derramada. «Libación» es el término más preciso y tradicionalmente comprensible en español bíblico.
theological_decisions:
- issue: Traducción del Nombre divino יהוה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Señor
  - Jehová
  rationale: El texto hebreo usa directamente el Tetragrámaton. Siguiendo la directriz del proyecto, se conserva el nombre propio de Dios en español como «Yahvé», en vez de ocultarlo con una sustitución funcional.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
translation_notes:
  revision_awareness: 'La redacción española sigue la revisión más reciente del audit trail, que prefirió una lectura más natural y precisa de כָּאֵלֶּה como valor adverbial/normativo («Así...») en lugar de un calco comparativo rígido. También conserva la estructura del hebreo: instrucción general, fórmula sacrificial, y cláusula final sobre el holocausto continuo y su libación.'
  spanish_consistency_notes:
  - Se usa «Yahvé» de manera consistente para יהוה, conforme al estándar del proyecto.
  - Se mantiene «holocausto continuo» para הַתָּמִיד en coherencia con el valor de ofrenda regular/permanente.
  - «Libación» se emplea para נֶסֶךְ/נִסְכּוֹ por precisión cultual.
  - La puntuación con dos puntos ayuda a reflejar la progresión del hebreo sin introducir interpretación extra.
