translation:
  language: es
  text: No se veían unos a otros[a], y nadie se levantó de su lugar durante tres días; pero todos los hijos de Israel tenían luz[b] en sus moradas.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo literalmente: «un hombre no veía a su hermano». La expresión es recíproca: «no se veían unos a otros».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «todos los israelitas tenían luz en sus moradas».'
    reason: lexical_alternative
lexical_decisions:
- source_word: רָאוּ ... אֶת אָחִיו
  english_pob_choice: did not see one another
  chosen_spanish: no se veían unos a otros
  alternatives_spanish:
  - no vieron el uno al otro
  - no veían a su hermano
  lexicon: HALOT
  rationale: La construcción hebrea es recíproca e idiomática; en español, «unos a otros» transmite mejor la reciprocidad que una traducción rígida con «hermano», que aquí no debe entenderse como un hermano literal sino como otra persona.
- source_word: אִישׁ
  english_pob_choice: one / no one
  chosen_spanish: nadie
  alternatives_spanish:
  - ningún hombre
  - uno
  lexicon: HALOT
  rationale: En este contexto distributivo, «nadie» conserva el sentido general sin limitarlo a varones y suena natural en español.
- source_word: קָמוּ
  english_pob_choice: rose
  chosen_spanish: se levantó
  alternatives_spanish:
  - se alzó
  - se puso de pie
  lexicon: HALOT
  rationale: El verbo hebreo indica el acto de levantarse o ponerse en movimiento; «se levantó» mantiene el valor narrativo sin añadir especificaciones excesivas.
- source_word: מִתַּחְתָּיו
  english_pob_choice: from his place
  chosen_spanish: de su lugar
  alternatives_spanish:
  - de donde estaba
  - de su sitio
  lexicon: HALOT
  rationale: La expresión hebrea es idiomática; «de su lugar» reproduce de forma clara y natural la idea de abandonar la propia posición.
- source_word: שְׁלֹשֶׁת יָמִים
  english_pob_choice: for three days
  chosen_spanish: por tres días
  alternatives_spanish:
  - durante tres días
  lexicon: HALOT
  rationale: En español, «por tres días» expresa bien la duración del lapso, en paralelo con la elección inglesa de una expresión temporal natural.
- source_word: בְּנֵי יִשְׂרָאֵל
  english_pob_choice: the sons of Israel
  chosen_spanish: los hijos de Israel
  alternatives_spanish:
  - los israelitas
  - los descendientes de Israel
  lexicon: HALOT
  rationale: Se preserva la forma covenantal/familiar del hebreo. «Los israelitas» sería una alternativa válida, pero aquí se conserva mejor el eco formal del original.
- source_word: הָיָה אוֹר
  english_pob_choice: had light
  chosen_spanish: hubo luz
  alternatives_spanish:
  - tenían luz
  - había luz
  lexicon: HALOT
  rationale: Aunque el inglés opta por «had light» para expresar disponibilidad en contraste con la oscuridad egipcia, en español «hubo luz» comunica de manera natural la presencia efectiva de luz sin perder el contraste narrativo.
- source_word: בְּמֹשְׁבֹתָם
  english_pob_choice: in their dwellings
  chosen_spanish: en sus moradas
  alternatives_spanish:
  - en sus viviendas
  - donde habitaban
  lexicon: HALOT
  rationale: «Moradas» conserva un registro digno y bíblico para מוֹשָׁב, entendible en español actual. «Viviendas» o «donde habitaban» son posibles, pero menos alineadas con la textura del hebreo.
translation_notes:
  revision_awareness: El texto base en inglés no requirió cambios sustantivos según el último pase de revisión; el presente borrador sigue de cerca ese estado de alta concordancia, ajustando únicamente la formulación al español natural y manteniendo las alternativas léxicas relevantes.
  spanish_consistency_notes:
  - Se mantiene «hijos de Israel» para conservar la forma del hebreo frente a la alternativa dinámica «israelitas».
  - Se usa «moradas» como equivalente digno y consistente para בְּמֹשְׁבֹתָם en contexto de contraste con la oscuridad.
  - La nota [a] preserva la tensión entre literalidad («hermano») y reciprocidad idiomática.
  - La nota [b] ofrece la alternativa dinámica sin alterar el texto principal.
