translation:
  language: es
  text: 'Estas son las cosas que ustedes deben hacer: digan la verdad[a] unos a otros[b]; juzguen con verdad y con un juicio de paz[c] en sus puertas[d].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'hablen verdad'. El hebreo es breve y enfático.
    reason: lexical_alternative
  - marker: b
    text: La expresión hebrea dice literalmente 'cada hombre a su prójimo', usando un singular masculino representativo; aquí se vierte con una forma recíproca natural en español.
    reason: lexical_alternative
  - marker: c
    text: O 'juzguen un juicio verdadero y pacífico en sus puertas'.
    reason: alternative_reading
  - marker: d
    text: '''En sus puertas'' alude a las puertas de la ciudad, lugar habitual donde se oían los casos legales y se emitían los fallos.'
    reason: cultural_note
lexical_decisions:
- source_word: אֵלֶּה הַדְּבָרִים
  english_pob_choice: These are the things
  chosen_spanish: Estas son las cosas
  alternatives_spanish:
  - Estas son las palabras
  - Estas son las materias
  lexicon: HALOT
  rationale: דְּבָרִים puede significar 'palabras', 'cosas' o 'asuntos'. En este contexto introduce mandatos prácticos, por lo que 'cosas' comunica naturalmente el conjunto de acciones requeridas sin reducirlo solo a habla.
- source_word: אֲשֶׁר תַּעֲשׂוּ
  english_pob_choice: that you must do
  chosen_spanish: que ustedes deben hacer
  alternatives_spanish:
  - que ustedes harán
  - que ustedes han de hacer
  lexicon: HALOT
  rationale: El imperfecto funciona aquí de modo instructivo. 'Deben hacer' expresa obligación en español natural sin exagerar más allá del valor imperativo del contexto.
- source_word: דַּבְּרוּ אֱמֶת
  english_pob_choice: speak truth
  chosen_spanish: hablen verdad
  alternatives_spanish:
  - hablen la verdad
  - digan verdad
  lexicon: HALOT
  rationale: El imperativo con אֱמֶת es breve y enérgico. 'Hablen verdad' conserva la concisión hebrea y evita añadir un artículo que el hebreo no requiere.
- source_word: אִישׁ אֶת־רֵעֵהוּ
  english_pob_choice: to one another
  chosen_spanish: unos con otros
  alternatives_spanish:
  - cada uno con su prójimo
  - entre sí
  lexicon: HALOT
  rationale: El hebreo usa אִישׁ, singular masculino representativo. En español, 'unos con otros' comunica el sentido recíproco que la revisión inglesa prefirió, sin perder la dimensión comunitaria del mandato.
- source_word: אֱמֶת וּמִשְׁפַּט שָׁלוֹם
  english_pob_choice: with truth and a judgment of peace
  chosen_spanish: con verdad y un juicio de paz
  alternatives_spanish:
  - con verdad y un juicio pacífico
  - con verdad y una sentencia de paz
  lexicon: HALOT
  rationale: מִשְׁפָּט en contexto judicial se rinde mejor como 'juicio' aquí. 'Juicio de paz' preserva la relación compacta con שָׁלוֹם sin convertir la frase en una paráfrasis más amplia.
- source_word: שִׁפְטוּ
  english_pob_choice: judge
  chosen_spanish: juzguen
  alternatives_spanish:
  - hagan juicio
  - decidan
  lexicon: HALOT
  rationale: El imperativo directo se mantiene con 'juzguen', que es claro y corresponde al contexto legal.
- source_word: בְּשַׁעֲרֵיכֶם
  english_pob_choice: in your gates
  chosen_spanish: en sus puertas
  alternatives_spanish:
  - en sus puertas de la ciudad
  - en sus portones
  lexicon: HALOT
  rationale: '''Puertas'' conserva la imagen hebrea del lugar público donde se atendían los casos legales. El sentido cultural puede inferirse del contexto y se explica en nota.'
theological_decisions:
- issue: Uso del singular masculino representativo en אִישׁ
  english_pob_reading: to one another
  chosen_spanish_reading: unos con otros
  alternative_spanish_readings:
  - cada uno con su prójimo
  - entre sí
  rationale: La revisión inglesa suavizó 'each man' a una forma recíproca más natural. El español puede expresar esa reciprocidad directamente con 'unos con otros' sin ocultar que el hebreo usa un singular representativo.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
- issue: Relación entre verdad, juicio y paz
  english_pob_reading: with truth and a judgment of peace
  chosen_spanish_reading: con verdad y un juicio de paz
  alternative_spanish_readings:
  - con verdad y un juicio pacífico
  - con verdad y una sentencia de paz
  rationale: El texto no habla solo de exactitud jurídica, sino de un juicio caracterizado por verdad y orientado a la paz comunitaria. 'Juicio de paz' preserva esa tensión sin forzar una formulación doctrinal ajena al pasaje.
  doctrine_reference: DOCTRINE.md §Translation philosophy 1, 3, 6
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión más reciente del inglés POB, que sustituyó 'each man to his neighbor' por una formulación recíproca más natural. Por eso el español evita una traducción rígida del singular representativo en la línea principal y conserva el matiz legal de 'juicio de paz'.
  spanish_consistency_notes:
  - Se mantuvo 'verdad' para אֱמֶת en ambas ocurrencias, conservando la repetición enfática del hebreo.
  - '''Puertas'' traduce בְּשַׁעֲרֵיכֶם de manera literal y publicable; la nota aclara el trasfondo cultural.'
  - Se usó 'juzguen' para שִׁפְטוּ por ser el verbo español más natural en un contexto judicial.
  - La frase inicial 'Estas son las cosas' sigue el valor práctico de דְּבָרִים como mandatos, no solo como palabras.
