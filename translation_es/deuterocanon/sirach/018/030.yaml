translation:
  language: es
  text: No vayas tras tus deseos[a], y refrena tus apetitos;
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «No sigas tus deseos, y refrena tus apetitos».'
    reason: lexical_alternative
lexical_decisions:
- source_word: Ὀπίσω
  english_pob_choice: after
  chosen_spanish: tras
  alternatives_spanish:
  - después de
  - detrás de
  - en pos de
  lexicon: LSJ
  rationale: Con πορεύου, la expresión ὀπίσω ... πορεύομαι comunica ir en seguimiento o ir tras algo. En español, «tras» conserva la imagen de persecución sin sonar forzado.
- source_word: τῶν ἐπιθυμιῶν
  english_pob_choice: your desires
  chosen_spanish: tus deseos
  alternatives_spanish:
  - tus deseos desordenados
  - tus apetitos
  - tus pasiones
  lexicon: BDAG/LSJ
  rationale: ἐπιθυμία puede ser deseo en sentido amplio; el contexto exhortativo le da tono moral, pero no obliga a especificarlo como sexual. «Deseos» mantiene esa amplitud.
- source_word: μὴ πορεύου
  english_pob_choice: Do not go
  chosen_spanish: No vayas
  alternatives_spanish:
  - No andes
  - No sigas
  - No te vayas
  lexicon: BDAG/LSJ
  rationale: La prohibición con πορεύομαι se expresa naturalmente en español con «no vayas». Con «tras» ya queda el matiz de seguir o perseguir.
- source_word: ἀπὸ
  english_pob_choice: from
  chosen_spanish: de
  alternatives_spanish:
  - desde
  - lejos de
  - apartándote de
  lexicon: BDAG/LSJ
  rationale: La preposición marca separación; en español, «de» es la forma más directa y idiomática antes del objeto de la prohibición.
- source_word: τῶν ὀρέξεών
  english_pob_choice: your cravings
  chosen_spanish: tus apetitos
  alternatives_spanish:
  - tus impulsos
  - tus ansias
  - tus deseos
  lexicon: LSJ
  rationale: ὄρεξις suele referirse a apetito o impulso fuerte. «Apetitos» distingue este término del primer miembro y conserva un matiz más corporal o inmediato que «deseos».
- source_word: κωλύου
  english_pob_choice: hold yourself back
  chosen_spanish: refrena
  alternatives_spanish:
  - contente
  - detente
  - domina
  lexicon: BDAG/LSJ
  rationale: El imperativo medio pide autocontención. «Refrena» comunica bien la idea de frenar o contener una inclinación, y en español resulta natural y exhortativo.
theological_decisions:
- issue: Tensión semántica entre ἐπιθυμίαι y ὀρέξεις
  english_pob_reading: 'Render both terms as morally cautioned but not hyper-specific: ''desires'' and ''cravings.'''
  chosen_spanish_reading: Distinguir «deseos» y «apetitos» sin estrechar el alcance a una sola clase de pecado.
  alternative_spanish_readings:
  - «deseos» y «deseos»
  - «pasiones» y «apetitos»
  - «deseos» y «impulsos»
  rationale: El griego advierte contra ser guiado por impulsos desordenados, pero no restringe la advertencia al deseo sexual. La pareja «deseos/apetitos» preserva la amplitud y la diferencia léxica del texto fuente.
  doctrine_reference: Principio de primacía de la fuente original y preservación de la amplitud moral del exhorto.
translation_notes:
  revision_awareness: La redacción sigue la última revisión inglesa al preferir una formulación natural de autocontención equivalente a κωλύου, pero en español se optó por «refrena» en lugar de una perífrasis más larga para mantener concisión y tono proverbial.
  spanish_consistency_notes:
  - Se usa «deseos» para ἐπιθυμίαι, evitando una traducción excesivamente sexualizada como «lujurias».
  - Se usa «apetitos» para ὀρέξεις, diferenciándolo del primer miembro y manteniendo la amplitud moral del original.
  - La construcción imperativa negativa se ha naturalizado en español como «No vayas tras...», manteniendo el sentido de seguimiento/pursuit del griego.
