translation:
  language: es
  text: 'Estaba sobre doce bueyes: tres mirando al norte[a], tres mirando al oeste, tres mirando al sur y tres mirando al este. El Mar estaba sobre ellos, y todas sus partes traseras estaban hacia adentro[b].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo, literalmente: «tres rostros hacia el norte... tres rostros hacia el mar». Aquí «oeste» traduce el uso direccional idiomático de «hacia el mar».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «todos sus cuartos traseros estaban hacia adentro».'
    reason: lexical_alternative
lexical_decisions:
- source_word: עוֹמֵד
  english_pob_choice: It stood
  chosen_spanish: Estaba
  alternatives_spanish:
  - Se mantenía
  - Estaba erguido
  lexicon: HALOT
  rationale: El participio funciona como estado/posición del objeto; en español, una forma imperfectiva como «estaba» comunica naturalmente la disposición fija sin forzar un calco.
- source_word: בָּקָר
  english_pob_choice: oxen
  chosen_spanish: bueyes
  alternatives_spanish:
  - toros
  - ganado
  lexicon: HALOT
  rationale: En un contexto arquitectónico/cúltico con figuras de soporte, «bueyes» conserva el valor de bovinos concretos y suena más natural que «toros», que podría sugerir énfasis sexual o agresivo.
- source_word: פֹנִים
  english_pob_choice: facing
  chosen_spanish: mirando
  alternatives_spanish:
  - de frente a
  - orientados hacia
  lexicon: HALOT
  rationale: Aunque literalmente alude a ‘rostros’, aquí expresa orientación direccional; «mirando» comunica esa orientación de manera clara en español sin perder el sentido espacial.
- source_word: צָפוֹנָה
  english_pob_choice: north
  chosen_spanish: al norte
  alternatives_spanish:
  - hacia el norte
  - norte
  lexicon: HALOT
  rationale: La terminación direccional se vierte con una preposición que exprese orientación. «Al norte» es idiomático y mantiene la lista cardinal.
- source_word: יָמָּה
  english_pob_choice: west
  chosen_spanish: al oeste
  alternatives_spanish:
  - hacia el mar
  - seaward
  lexicon: HALOT
  rationale: Aunque el término puede tener un matiz relacionado con el mar, aquí la serie direccional exige el valor cardinal; por eso se traduce «al oeste».
- source_word: נֶגְבָּה
  english_pob_choice: south
  chosen_spanish: al sur
  alternatives_spanish:
  - hacia el sur
  - al Negueb
  lexicon: HALOT
  rationale: En esta secuencia fija designa la dirección sur, no la región del Negueb específicamente.
- source_word: מִזְרָחָה
  english_pob_choice: east
  chosen_spanish: al este
  alternatives_spanish:
  - hacia el este
  - al oriente
  lexicon: HALOT
  rationale: El término direccional se vierte con el cardinal estándar. «Al este» resulta claro y equilibrado en español moderno.
- source_word: הַיָּם
  english_pob_choice: The Sea
  chosen_spanish: el Mar
  alternatives_spanish:
  - el mar
  - la fuente
  - la gran vasija
  lexicon: HALOT
  rationale: Se conserva el nombre cultual del objeto con mayúscula inicial. «Mar» reproduce el apelativo del lavacro/vasija grande sin sustituirlo por una explicación interpretativa.
- source_word: עֲלֵיהֶם מִלְמָעְלָה
  english_pob_choice: was above them
  chosen_spanish: estaba sobre ellos
  alternatives_spanish:
  - reposaba sobre ellos
  - quedaba encima de ellos
  lexicon: HALOT
  rationale: Mantiene la relación espacial del hebreo y la formulación del audit trail en español natural.
- source_word: אֲחֹרֵיהֶם
  english_pob_choice: their rear parts
  chosen_spanish: sus partes posteriores
  alternatives_spanish:
  - sus traseros
  - sus ancas
  lexicon: HALOT
  rationale: El hebreo alude literalmente a las partes de atrás; «partes posteriores» es respetuoso, claro y suficientemente anatómico para figuras animales.
- source_word: בָּיְתָה
  english_pob_choice: inward
  chosen_spanish: hacia adentro
  alternatives_spanish:
  - adentro
  - al interior
  lexicon: HALOT
  rationale: La forma direccional expresa orientación hacia el interior; «hacia adentro» conserva ese movimiento espacial con naturalidad.
theological_decisions:
- issue: 'Nombre del objeto cultual: הַיָּם'
  english_pob_reading: The Sea
  chosen_spanish_reading: el Mar
  alternative_spanish_readings:
  - el mar
  - la vasija
  - el lavacro
  rationale: Se mantiene el nombre tradicional del objeto en el contexto del templo y se capitaliza como designación cultual. No se sustituye por una glosa que borre la nomenclatura estable del texto.
  doctrine_reference: Terminología cultual del templo; fidelidad al referente histórico-literario
- issue: Direccionalidad de יָמָּה
  english_pob_reading: west
  chosen_spanish_reading: al oeste
  alternative_spanish_readings:
  - hacia el mar
  rationale: Aunque el hebreo puede evocar ‘mar’, en esta enumeración de los cuatro puntos cardinales el sentido contextual es direccional. Se privilegia el valor topográfico sin eliminar la posible tensión etimológica.
  doctrine_reference: Lectura contextual del hebreo bíblico; semántica direccional
translation_notes:
  revision_awareness: 'El borrador sigue de cerca el estado más reciente del audit trail en inglés, sin cambios revisados pendientes y con alto acuerdo de revisión; se conservaron las decisiones léxicas clave: participio de estado, serie direccional, nombre cultual del Mar y la orientación de las partes posteriores.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» para el nombre divino en todo el proyecto, aunque este versículo no lo contiene.
  - Se usa «el Mar» con mayúscula como designación cultual estable, coherente con la terminología del POB.
  - Se preserva la cadencia enumerativa de cuatro direcciones con preposición repetida para claridad y correspondencia semántica.
