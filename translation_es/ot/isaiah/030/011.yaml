translation:
  language: es
  text: ¡Apártense del camino; desvíense de la senda; hagan desaparecer[a] de delante de nosotros al Santo de Israel!
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «hagan cesar de delante de nosotros al Santo de Israel», para preservar de modo más literal la fuerza causativa del hebreo.'
    reason: lexical_alternative
lexical_decisions:
- source_word: סוּרוּ
  english_pob_choice: Turn aside
  chosen_spanish: Apártense
  alternatives_spanish:
  - Desvíense
  - Apartense
  lexicon: HALOT
  rationale: El imperativo plural exige una orden de apartarse o desviarse de una dirección ya tomada. «Apártense» conserva la imagen de abandonar una ruta y funciona con naturalidad en español bíblico contemporáneo.
- source_word: מִנֵּי דֶרֶךְ
  english_pob_choice: from the way
  chosen_spanish: del camino
  alternatives_spanish:
  - de la vía
  - del sendero
  lexicon: HALOT
  rationale: «Camino» transmite el sentido metafórico de una conducta o rumbo, y en español suena más natural que una traducción demasiado literal de «la way». Mantiene la fuerza de la imagen sin perder claridad.
- source_word: הַטּוּ
  english_pob_choice: depart
  chosen_spanish: apártense
  alternatives_spanish:
  - desvíense
  - dejen
  lexicon: HALOT
  rationale: El segundo imperativo repite la idea de desviarse. En español conviene variar mínimamente la expresión, pero sin borrar el paralelismo intensivo del hebreo. «Apártense» mantiene la cohesión con la primera orden.
- source_word: מִנֵּי אֹרַח
  english_pob_choice: from the path
  chosen_spanish: de la senda
  alternatives_spanish:
  - del camino
  - de la vereda
  lexicon: HALOT
  rationale: «Senda» preserva la sinonimia poética de אֹרַח respecto de דֶרֶךְ y evita la repetición exacta de «camino». Así se refleja el paralelismo hebreo con una alternativa natural en español.
- source_word: הַשְׁבִּיתוּ
  english_pob_choice: remove
  chosen_spanish: hagan desaparecer
  alternatives_spanish:
  - retiren
  - hagan cesar
  - eliminen
  lexicon: HALOT
  rationale: 'El verbo causativo de שבת puede significar hacer cesar o hacer ausente. En este contexto hostil, la petición es expulsiva: quieren que el Santo de Israel deje de estar delante de ellos. «Hagan desaparecer» conserva la fuerza causativa mejor que un simple «quiten» y evita suavizar el tono.'
- source_word: מִפָּנֵינוּ
  english_pob_choice: from before us
  chosen_spanish: de nuestra presencia
  alternatives_spanish:
  - de delante de nosotros
  - de nuestra vista
  lexicon: HALOT
  rationale: La expresión hebrea es literalmente espacial-relacional. «De nuestra presencia» comunica con claridad la idea de estar ante alguien, y suena más natural que una calca estricta.
- source_word: אֶת קְדוֹשׁ יִשְׂרָאֵל
  english_pob_choice: the Holy One of Israel
  chosen_spanish: al Santo de Israel
  alternatives_spanish:
  - al Santo de Israel
  - al Santo, el de Israel
  lexicon: HALOT
  rationale: Se conserva el título isaiano fijo como título divino. «Santo de Israel» refleja la carga teológica y covenantal del original, y «al» marca el objeto directo personal del mandato.
theological_decisions:
- issue: Título divino «el Santo de Israel»
  english_pob_reading: A divine title for Israel's God, retained as a title rather than paraphrased.
  chosen_spanish_reading: 'Se mantiene como título divino: «el Santo de Israel».'
  alternative_spanish_readings:
  - una referencia abstracta a la santidad de Dios
  - una alusión metonímica al mensaje profético
  rationale: 'En Isaías, esta expresión funciona consistentemente como designación del Dios de Israel. Traducirla como título preserva la acusación del pueblo: rechazan la presencia confrontadora del propio Dios, no solo una idea abstracta de santidad.'
  doctrine_reference: Affirmations; Translation philosophy §§1, 5
- issue: Fuerza causativa de הַשְׁבִּיתוּ
  english_pob_reading: remove / cause to cease from before us
  chosen_spanish_reading: «hagan desaparecer» conserva la lectura causativa sin neutralizarla.
  alternative_spanish_readings:
  - «retiren»
  - «hagan cesar»
  - «eliminen»
  rationale: El hebreo permite o exige una fuerza más fuerte que un simple desplazamiento. En el contexto, el clamor no es solo que se aleje, sino que cese de estar delante de ellos. «Hagan desaparecer» expresa esa tensión hostil y mantiene abierta la lectura más literal del causativo.
  doctrine_reference: Affirmations; lexical note on causative שבת
translation_notes:
  revision_awareness: La auditoría inglesa coincide de manera alta y no reporta revisiones aplicadas; por eso el borrador español sigue de cerca las decisiones léxicas y teológicas ya validadas, adaptándolas a un español natural sin perder la fuerza del imperativo ni la carga del título divino.
  spanish_consistency_notes:
  - Se mantiene «Santo de Israel» como título fijo isaiano para coherencia interna.
  - Se usa «apártense» en ambos imperativos para reflejar el paralelismo, con variación poética mínima en el sustantivo («camino» / «senda»).
  - Se evita «SEÑOR» o sustituciones que oculten el referente divino, porque aquí el texto nombra explícitamente al Santo de Israel.
  - La nota textual se ancla en la frase correspondiente para conservar la alternativa causativa documentada en la POB inglesa.
