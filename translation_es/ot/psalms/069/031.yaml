translation:
  language: es
  text: Alabaré el nombre de Dios con cántico, y lo engrandeceré con acción de gracias[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O "con una ofrenda de acción de gracias"; el hebreo תּוֹדָה puede referirse tanto al agradecimiento como a un sacrificio de acción de gracias, según el contexto.
    reason: lexical_alternative
lexical_decisions:
- source_word: אֲהַֽלְלָ֣ה
  english_pob_choice: I will praise
  chosen_spanish: Alabaré
  alternatives_spanish:
  - Quiero alabar
  - he de alabar
  lexicon: HALOT
  rationale: La forma cohortativa expresa resolución voluntaria en poesía. En español, el futuro simple "alabaré" comunica con naturalidad esa decisión de alabanza, sin perder el valor volitivo.
- source_word: שֵׁם אֱלֹהִ֣ים
  english_pob_choice: the name of God
  chosen_spanish: el nombre de Dios
  alternatives_spanish:
  - el nombre de Dios
  - el nombre divino
  lexicon: HALOT
  rationale: Se conserva la construcción formal del hebreo. "El nombre de Dios" mantiene la reverencia y la transparencia del sintagma mejor que una paráfrasis más compacta.
- source_word: בְּ/שִׁ֑יר
  english_pob_choice: with song
  chosen_spanish: con cántico
  alternatives_spanish:
  - con canción
  - en cántico
  lexicon: HALOT
  rationale: El ב instrumental se expresa de manera natural con "con". "Cántico" suena más digno y poético en español bíblico que "canción", sin añadir contenido no presente.
- source_word: וַ/אֲגַדְּלֶ֥/נּוּ
  english_pob_choice: and I will magnify him
  chosen_spanish: y lo engrandeceré
  alternatives_spanish:
  - y lo exaltaré
  - y lo magnificaré
  lexicon: HALOT
  rationale: גדל en piel tiene el sentido de hacer grande, es decir, ensalzar o engrandecer. "Engrandeceré" reproduce bien la idea verbal del hebreo y evita el posible tecnicismo de "magnificar" en español.
- source_word: בְ/תוֹדָֽה
  english_pob_choice: with thanksgiving
  chosen_spanish: con acción de gracias
  alternatives_spanish:
  - con agradecimiento
  - con una ofrenda de acción de gracias
  lexicon: HALOT
  rationale: Se conserva la lectura verbal adoptada por la POB inglesa en este contexto de paralelismo con "alabar" y "cántico". "Acción de gracias" expresa de modo natural la respuesta agradecida; la posible referencia sacrificial queda abierta, pero no se impone en el texto principal.
theological_decisions:
- issue: 'Sentido de תּוֹדָה: agradecimiento verbal o sacrificio de agradecimiento'
  english_pob_reading: verbal thanksgiving
  chosen_spanish_reading: acción de gracias verbal
  alternative_spanish_readings:
  - ofrenda de acción de gracias
  - sacrificio de agradecimiento
  rationale: 'El paralelismo inmediato es de actos verbales y musicales: alabar, cántico, engrandecer. Por eso se adopta la lectura de agradecimiento expresado, aunque la posibilidad léxica de una ofrenda de תודה permanece real en otros contextos.'
  doctrine_reference: Ps 69:31; cf. uso léxico de תּוֹדָה en contextos de agradecimiento y ofrenda
translation_notes:
  revision_awareness: El cotejo inglés indica alta concordancia y sin cambios recientes; se mantiene la decisión de traducción óptima del audit trail, preservando la ambigüedad lexical de תּוֹדָה en nota y la estructura paralela del versículo.
  spanish_consistency_notes:
  - Se usó "Dios" para אֱלֹהִים conforme al estándar del proyecto.
  - Se eligió "cántico" para registrar el matiz poético de שִׁיר sin forzar una lectura litúrgica específica.
  - '"Engrandeceré" comunica la fuerza causativa de גדל en este contexto de alabanza.'
  - La nota al pie conserva la alternativa sacrificial documentada en la POB inglesa.
