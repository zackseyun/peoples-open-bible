review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español sigue de cerca el hebreo y el rastro de auditoría inglés: conserva la fórmula de autoidentificación divina, mantiene repetido «el Dios de…», y traduce correctamente la reacción de Moisés al esconder su rostro por temor de mirar a Dios. La única desviación significativa es «porque temió mirar a Dios», que en español puede leerse como pasado puntual («sintió temor») más que como estado/resultante de «tenía miedo de mirar».'
  spanish_quality_summary: 'El texto es claro, digno y ampliamente legible en español eclesial. «Ocultó su rostro» funciona, pero «escondió su rostro» o «cubrió su rostro» serían opciones más idiomáticas; aun así, no es incorrecto. La mejora principal es hacer más natural y preciso el segmento causal-final: «porque tenía miedo de mirar a Dios».'
  glossary_alignment: 'No hay conflicto con la terminología del proyecto: אֱלֹהִים se vierte como «Dios», y la fórmula patriarcal repetida se preserva correctamente. No aparece el nombre divino Yahvé en este versículo. No se requieren notas léxicas adicionales.'
  issues:
  - severity: medium
    issue: «porque temió mirar a Dios» suena menos natural y menos exacto que la fuerza de כִּי יָרֵא מֵהַבִּיט
    rationale: El hebreo expresa la causa con כִּי y un estado de temor con יָרֵא, seguido del infinitivo de la acción temida. En español, «porque tenía miedo de mirar a Dios» o «porque tenía temor de mirar a Dios» comunica mejor esa relación que «temió mirar», que puede sugerir simplemente que experimentó temor en ese momento.
  revised_spanish_text: 'Entonces dijo: «Yo soy el Dios de tu padre, el Dios de Abraham, el Dios de Isaac y el Dios de Jacob». Y Moisés ocultó su rostro, porque tenía miedo de mirar a Dios.'
