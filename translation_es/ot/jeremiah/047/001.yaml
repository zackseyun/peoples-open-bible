translation:
  language: es
  text: Esta es la palabra de Yahvé que recibió Jeremías el profeta acerca de los filisteos[a][b], antes de que Faraón golpeara Gaza.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'contra los filisteos'. La preposición puede introducir el tema del oráculo y, en contextos de juicio, también puede entenderse con matiz adversativo.
    reason: lexical_alternative
  - marker: b
    text: O 'la cual recibió Jeremías el profeta acerca de los filisteos'. El hebreo comienza con una construcción relativa que funciona como encabezado.
    reason: lexical_alternative
lexical_decisions:
- source_word: אֲשֶׁר
  english_pob_choice: This is
  chosen_spanish: Esta es
  alternatives_spanish:
  - la cual
  - que
  lexicon: HALOT
  rationale: El hebreo abre con una construcción relativa que funciona como encabezado. En español, 'Esta es' comunica con naturalidad la función de superscripción sin volver la frase pesada o artificiosa.
- source_word: הָיָה
  english_pob_choice: came
  chosen_spanish: vino
  alternatives_spanish:
  - llegó
  - fue
  lexicon: HALOT
  rationale: En la fórmula profética, el sentido es de recepción de una revelación que 'vino' al profeta, no de mera existencia. 'Vino' conserva ese valor idiomático de manera clara en español.
- source_word: דְבַר יְהוָה
  english_pob_choice: the word of Yahweh
  chosen_spanish: la palabra de Yahvé
  alternatives_spanish:
  - el mensaje de Yahvé
  lexicon: HALOT
  rationale: '''Palabra'' mantiene el peso formal y revelacional del hebreo דְבַר mejor que ''mensaje''. Se conserva ''Yahvé'' según el criterio del proyecto para יְהוָה.'
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  lexicon: HALOT
  rationale: Se usa el nombre divino transliterado 'Yahvé', conforme al estándar del proyecto para el Tetragrámaton, en vez de sustituirlo por un título.
- source_word: אֶל יִרְמְיָהוּ הַנָּבִיא
  english_pob_choice: to Jeremiah the prophet
  chosen_spanish: a Jeremías el profeta
  alternatives_spanish:
  - a Jeremías, el profeta
  lexicon: HALOT
  rationale: אֶל marca el destinatario de la palabra revelada. En español, 'a Jeremías el profeta' refleja de forma directa el hebreo con una apposición clara y natural.
- source_word: אֶל פְּלִשְׁתִּים
  english_pob_choice: concerning the Philistines
  chosen_spanish: acerca de los filisteos
  alternatives_spanish:
  - contra los filisteos
  - para los filisteos
  lexicon: HALOT
  rationale: Se preserva la amplitud de אֶל en encabezamientos proféticos con 'acerca de', evitando fijar de entrada la lectura adversativa aunque el contexto inmediato sea de juicio.
- source_word: בְּטֶרֶם
  english_pob_choice: before
  chosen_spanish: antes de que
  alternatives_spanish:
  - antes de
  lexicon: HALOT
  rationale: '''Antes de que'' expresa con precisión la anterioridad temporal introduciendo una subordinada verbal natural en español.'
- source_word: יַכֶּה
  english_pob_choice: struck
  chosen_spanish: golpeara
  alternatives_spanish:
  - hiriera
  - atacara
  - derrotara
  lexicon: HALOT
  rationale: El verbo נכה admite el sentido de 'golpear/abatir'. 'Golpeara' es la opción más cercana al valor básico y mantiene la imagen verbal sin interpretar excesivamente el resultado.
- source_word: פַרְעֹה
  english_pob_choice: Pharaoh
  chosen_spanish: Faraón
  alternatives_spanish:
  - el Faraón
  lexicon: HALOT
  rationale: Se emplea la forma establecida en español para el título real egipcio, que es plenamente inteligible y fiel al referente histórico.
- source_word: עַזָּה
  english_pob_choice: Gaza
  chosen_spanish: Gaza
  alternatives_spanish:
  - Gaza
  lexicon: HALOT
  rationale: Se conserva el topónimo tradicional 'Gaza', que es la forma asentada y transparenta la referencia geográfica sin añadir interpretación.
theological_decisions:
- issue: Renderización del nombre divino יהוה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: El texto hebreo emplea el Tetragrámaton directamente. Se mantiene el nombre propio divino 'Yahvé' para preservar la identidad del nombre revelado, siguiendo la política del proyecto y evitando la sustitución por un título.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יהוה YHWH → Yahweh'
- issue: Valor de אֶל con פְּלִשְׁתִּים en un encabezado profético
  english_pob_reading: concerning the Philistines
  chosen_spanish_reading: acerca de los filisteos
  alternative_spanish_readings:
  - contra los filisteos
  - para los filisteos
  rationale: En este tipo de superscripción, אֶל puede señalar el tema del oráculo o su destinatario. 'Acerca de' conserva esa indeterminación útil sin forzar prematuramente una lectura de condena, aunque el contexto posterior sea judicial.
  doctrine_reference: Jeremiah oracle headings / prophetic superscriptions
- issue: Fórmula temporal previa al acto histórico
  english_pob_reading: before Pharaoh struck Gaza
  chosen_spanish_reading: antes de que Faraón golpeara Gaza
  alternative_spanish_readings:
  - antes de que Faraón atacara Gaza
  - antes de que Faraón hiriera Gaza
  rationale: El hebreo sitúa la palabra profética antes del evento histórico. La elección mantiene la relación temporal sin convertir de antemano el verbo en una interpretación más específica que el propio lexema.
  doctrine_reference: Narrative temporal marker — בְּטֶרֶם
translation_notes:
  revision_awareness: 'Se revisó el pasaje contra el texto hebreo y el audit trail inglés; no se detectaron cambios de revisión recientes que requirieran ajuste adicional. La traducción sigue la misma decisión de fondo del inglés: el encabezado profético se vuelve una frase española natural, se conserva Yahvé para el Tetragrámaton, y se mantiene la ambigüedad legítima de אֶל פְּלִשְׁתִּים mediante una nota.'
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' de forma consistente para יהוה.
  - '''Palabra de Yahvé'' conserva la fórmula profética estándar sin sustituirla por ''mensaje''.'
  - '''Acerca de los filisteos'' respeta la amplitud del hebreo y evita cerrar el sentido con ''contra'' en el cuerpo principal.'
  - '''Golpeara'' refleja el valor verbal de נכה con un registro natural en español bíblico contemporáneo.'
