translation:
  language: es
  text: Los simples heredan la necedad[a], pero los prudentes se ven coronados con conocimiento.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Los prudentes se coronan con conocimiento». El verbo hebreo puede entenderse activamente («se coronan») o como la idea de estar coronados o adornados con conocimiento.'
    reason: lexical_alternative
lexical_decisions:
- source_word: נָחֲלוּ
  english_pob_choice: inherit
  chosen_spanish: heredan
  alternatives_spanish:
  - reciben como herencia
  - llegan a poseer
  lexicon: HALOT
  rationale: El perfecto qal de נחל expresa recibir o llegar a poseer como herencia. «Heredan» conserva bien la metáfora sapiencial de que la necedad pasa a ser la posesión final de los simples.
- source_word: פְתָאיִם
  english_pob_choice: the simple
  chosen_spanish: los simples
  alternatives_spanish:
  - los ingenuos
  - los necios ingenuos
  lexicon: HALOT
  rationale: En Proverbios, פתי designa al inexperto o fácilmente influenciable. «Los simples» es el término sapiencial más natural y mantiene la categoría moral e intelectual del texto.
- source_word: אִוֶּלֶת
  english_pob_choice: folly
  chosen_spanish: la necedad
  alternatives_spanish:
  - la insensatez
  - la locura
  lexicon: HALOT
  rationale: Es un término sapiencial para la conducta moral y práctica insensata. «Necead» transmite con claridad esa cualidad en español y funciona de forma natural en el proverbio.
- source_word: עֲרוּמִים
  english_pob_choice: the prudent
  chosen_spanish: los prudentes
  alternatives_spanish:
  - los sagaces
  - los astutos
  lexicon: HALOT
  rationale: En Proverbios, el término puede tener un matiz positivo de prudencia y buen discernimiento. «Los prudentes» evita el matiz más negativo que podría sugerir «astutos».
- source_word: יַכְתִּרוּ
  english_pob_choice: are crowned with
  chosen_spanish: son coronados con
  alternatives_spanish:
  - se coronan con
  - son ceñidos con
  - son adornados con
  lexicon: HALOT
  rationale: El hifil de כתר puede entenderse como rodear, coronar o adornar. El pasivo español comunica bien el estado resultante sin imponer demasiada agencia, en línea con la lectura inglesa auditada.
- source_word: דָעַת
  english_pob_choice: knowledge
  chosen_spanish: conocimiento
  alternatives_spanish:
  - entendimiento
  - sabiduría
  lexicon: HALOT
  rationale: דעת es un término central de la sabiduría para el conocimiento discernidor. «Conocimiento» es la equivalencia más directa y consistente en español.
translation_notes:
  revision_awareness: 'La redacción sigue de cerca el hebreo y la decisión inglesa auditada: el contraste entre la posesión de la necedad por parte de los simples y la corona de conocimiento de los prudentes se mantiene sin añadir matices no sustentados por la fuente.'
  spanish_consistency_notes:
  - Se preservó el término sapiencial «los simples» para פְתָאיִם y «los prudentes» para עֲרוּמִים.
  - Se eligió «necedad» para אִוֶּלֶת porque el contexto de Proverbios pide un sustantivo de cualidad moral más que un simple adjetivo.
  - La nota al pie marca la ambigüedad verbal de יַכְתִּרוּ sin alterar el texto principal.
  - Se mantuvo «conocimiento» para דָעַת en coherencia con el campo semántico sapiencial.
