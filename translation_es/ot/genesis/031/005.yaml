translation:
  language: es
  text: 'Y les dijo: «Veo que el rostro de su padre no está hacia mí[a] como antes[b], pero el Dios de mi padre ha estado conmigo».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literalmente, «no está hacia mí»; con «rostro», el hebreo expresa la actitud o disposición de una persona.
    reason: lexical_alternative
  - marker: b
    text: Literalmente, «como ayer y anteayer», un modismo hebreo que significa «como antes».
    reason: alternative_reading
lexical_decisions:
- source_word: וַיֹּאמֶר לָהֶן
  english_pob_choice: And he said to them
  chosen_spanish: Y dijo a ellas
  alternatives_spanish:
  - Entonces les dijo
  lexicon: HALOT
  rationale: El wayyiqtol narrativo se vierte naturalmente con «y dijo»; «a ellas» conserva el referente femenino plural del hebreo, aunque en español suena más explícito que un dativo clítico.
- source_word: רֹאֶה אָנֹכִי
  english_pob_choice: I see
  chosen_spanish: Veo
  alternatives_spanish:
  - Estoy viendo
  - He visto
  lexicon: HALOT
  rationale: El participio con pronombre independiente expresa una percepción presente. «Veo» comunica ese valor de manera natural y directa en español.
- source_word: אֶת פְּנֵי אֲבִיכֶן
  english_pob_choice: your father's face
  chosen_spanish: el rostro de su padre
  alternatives_spanish:
  - la cara de su padre
  - el semblante de su padre
  lexicon: HALOT
  rationale: Se mantiene la imagen concreta de «rostro/cara» para conservar el modismo hebreo. «Rostro» es más formal y adecuado al registro bíblico.
- source_word: כִּי אֵינֶנּוּ אֵלַי
  english_pob_choice: is not toward me
  chosen_spanish: no está hacia mí
  alternatives_spanish:
  - no está conmigo
  - no me es favorable
  lexicon: HALOT
  rationale: Se conserva la metáfora espacial de orientación del hebreo sin explicitar de más la valoración relacional. «Hacia mí» refleja el movimiento/orientación de אֵלַי.
- source_word: כִּתְמֹל שִׁלְשֹׁם
  english_pob_choice: as before
  chosen_spanish: como antes
  alternatives_spanish:
  - como ayer y anteayer
  - como en tiempos pasados
  lexicon: HALOT
  rationale: La expresión idiomática se naturaliza como «como antes» en el texto principal. La alternativa más literal queda sugerida en una nota para no perder la fuerza histórica del hebreo.
- source_word: וֵאלֹהֵי אָבִי
  english_pob_choice: but the God of my father
  chosen_spanish: pero el Dios de mi padre
  alternatives_spanish:
  - y el Dios de mi padre
  - sin embargo, el Dios de mi padre
  lexicon: HALOT
  rationale: El waw se entiende en contraste con la oposición entre Laban y la ayuda divina; por eso «pero» funciona bien en español y refleja la lectura contextual del POB en inglés.
- source_word: הָיָה עִמָּדִי
  english_pob_choice: has been with me
  chosen_spanish: ha estado conmigo
  alternatives_spanish:
  - estuvo conmigo
  - ha permanecido conmigo
  lexicon: HALOT
  rationale: El perfecto hebreo se vierte con pretérito perfecto compuesto para mantener la relevancia continua hasta el presente. «Conmigo» expresa la compañía protectora de Dios.
theological_decisions:
- issue: Valor del sintagma divino אֱלֹהֵי אָבִי
  english_pob_reading: the God of my father
  chosen_spanish_reading: el Dios de mi padre
  alternative_spanish_readings:
  - el Dios de mi padre Jacob
  - el Dios de mi padre
  rationale: Se conserva la construcción posesiva familiar del hebreo, que tiene tono de pacto y de continuidad generacional. No se expande a una formulación más interpretativa.
  doctrine_reference: Translation philosophy §1, §5
- issue: Sentido del modismo כִּתְמֹל שִׁלְשֹׁם
  english_pob_reading: as before
  chosen_spanish_reading: como antes
  alternative_spanish_readings:
  - como ayer y anteayer
  - como en otro tiempo
  rationale: Se mantiene el sentido idiomático principal sin perder la posibilidad de una nota literal. El español principal evita una calca opaca, pero no borra la imagen temporal del hebreo.
  doctrine_reference: Translation philosophy §2
translation_notes:
  revision_awareness: 'Coincido con el estado de revisión más reciente: no se requieren cambios respecto del sentido base. La versión española preserva el contraste entre la actitud de Laban y la ayuda continua de Dios, sin suavizar el modismo temporal hebreo.'
  spanish_consistency_notes:
  - Se usa «Dios» para אֱלֹהִים siguiendo el criterio base del proyecto.
  - Se mantiene «Yahvé» solo cuando el texto fuente lo exige; aquí no aparece el nombre divino.
  - Se conserva el tono narrativo sobrio y la imagen concreta de «rostro/rostro de su padre».
  - Se evita traducir libremente «אַיֵּלַי» como una valoración explícita («favorable») para no borrar la metáfora original.
