base_translation:
  language: en
  yaml_path: translation/ot/jeremiah/028/016.yaml
  text: 'Therefore[a], this is what Yahweh says: Look, I am sending you away from the face of the earth. This year you will die[b], because you have spoken rebellion against Yahweh.'
  footnotes:
  - marker: a
    text: Or, more formally, 'from off the face of the earth.' The Hebrew expression is an idiom for being removed from among the living.
    reason: lexical_alternative
  - marker: b
    text: Or 'you have spoken apostasy/defiance against the LORD.'
    reason: lexical_alternative
