source:
  edition: SBLGNT
  text: οἶδα ἄνθρωπον ἐν Χριστῷ πρὸ ἐτῶν δεκατεσσάρων— εἴτε ἐν σώματι οὐκ οἶδα, εἴτε ἐκτὸς τοῦ σώματος οὐκ οἶδα, ὁ θεὸς οἶδεν— ἁρπαγέντα τὸν τοιοῦτον ἕως τρίτου οὐρανοῦ.
base_translation:
  language: en
  yaml_path: translation/nt/2_corinthians/012/002.yaml
  text: I know a man in Messiah who[a], fourteen years ago—whether in the body I do not know, or outside the body I do not know[c][b], God knows—was caught up to the third heaven.
translation:
  language: ko
  text: 내가 메시아 안에 있는 한 사람을 압니다. 그는 십사 년 전에—몸 안에서였는지 나는 모릅니다. 몸 밖에서였는지도 나는 모릅니다. 하나님이 아십니다—그가 셋째 하늘까지 이끌려 올라갔습니다.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ἐν Χριστῷ
  english_pob_choice: in Messiah
  chosen_korean: 메시아 안에
  lexicon: BDAG
  rationale: 바울 정형 표현. 칭호 보존.
  alternatives_korean:
  - 그리스도 안에
- source_word: ἁρπαγέντα
  english_pob_choice: caught up
  chosen_korean: 이끌려 올라갔습니다
  lexicon: BDAG
  rationale: 수동분사 ἁρπάζω 「붙잡혀 끌려가다」. 「이끌려 올라가다」가 환상 경험의 수동성을 보존한다.
  alternatives_korean:
  - 붙들려 올라간
- source_word: τρίτου οὐρανοῦ
  english_pob_choice: third heaven
  chosen_korean: 셋째 하늘
  lexicon: BDAG
  rationale: 문자적 보존. 유대 묵시 문헌의 우주관을 그대로 옮긴다.
theological_decisions:
- issue: '12:1-10 환상·낙원·육체의 가시 본문 처리'
  chosen_reading: 문자적 이미지(셋째 하늘·낙원·육체에 가시)를 그대로 보존; 의료적·영적 추상화를 피함
  alternative_readings:
  - 의료적 해석
  - 영적 알레고리화
  rationale: 본문은 1세기 유대 묵시 문헌의 우주관 안에서 바울의 실제 환상 경험을 묘사한다. 한국어로도 그 강한 이미지를 그대로 보존하여 본문의 신비와 무게를 약화하지 않는다.
  doctrine_reference: 'DOCTRINE.md §1, §3: original-language primacy; preserve theological tension'
