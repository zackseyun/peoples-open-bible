id: ISA.41.21
reference: Isaiah 41:21
source:
  edition: WLC
  text: קָרְב֥וּ רִֽיבְ/כֶ֖ם יֹאמַ֣ר יְהוָ֑ה הַגִּ֨ישׁוּ֙ עֲצֻמ֣וֹתֵי/כֶ֔ם יֹאמַ֖ר מֶ֥לֶךְ יַעֲקֹֽב׃
translation:
  text: Present your case,” says Yahweh[c][b][a]; “bring forward your strong arguments,” says the King of Jacob.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''Come near your dispute/lawsuit.'' The expression is a legal summons; ''Present your case'' conveys the courtroom sense.'
    reason: lexical_alternative
  - marker: b
    text: Or 'bring forward your strong reasons,' 'your proofs,' or 'your defenses.'
    reason: lexical_alternative
  - marker: c
    text: Hebrew YHWH, traditionally rendered 'the LORD.'
    reason: alternative_reading
lexical_decisions:
- source_word: קָרְבוּ
  chosen: Present
  alternatives:
  - Come near
  - Bring near
  lexicon: HALOT
  rationale: The imperative of קרב literally means 'come near/bring near.' In this courtroom-challenge context, idiomatic English is best conveyed by 'Present,' introducing the summons to lay out a legal case while preserving the imperative force.
- source_word: רִיבְכֶם
  chosen: your case
  alternatives:
  - your dispute
  - your lawsuit
  - your contention
  lexicon: HALOT
  rationale: רִיב commonly denotes a legal dispute or case. 'Your case' is natural modern English in a forensic setting and fits the divine challenge to the idols and their advocates.
- source_word: יֹאמַר יְהוָה
  chosen: says the LORD
  alternatives:
  - the LORD says
  - declares the LORD
  lexicon: HALOT
  rationale: The prophetic speech formula is rendered in standard readable English. יְהוָה follows the doctrinal default as 'the LORD.'
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: הַגִּישׁוּ
  chosen: bring forward
  alternatives:
  - present
  - bring near
  lexicon: HALOT
  rationale: The Hiphil imperative of נגשׁ means 'bring near/present.' 'Bring forward' works well in English legal rhetoric and pairs naturally with 'your arguments.'
- source_word: עֲצֻמוֹתֵיכֶם
  chosen: your arguments
  alternatives:
  - your strong reasons
  - your proofs
  - your defenses
  lexicon: HALOT
  rationale: From עצמה/עצומות in this context, the sense is not physical 'strengths' but strong supporting claims or arguments. 'Your arguments' communicates the courtroom demand clearly; 'strong reasons' is possible but less idiomatic in contemporary English.
- source_word: יֹאמַר מֶלֶךְ יַעֲקֹב
  chosen: says the King of Jacob
  alternatives:
  - the King of Jacob says
  - says Jacob's King
  lexicon: HALOT
  rationale: The construct phrase identifies the speaker as the king belonging to or ruling over Jacob. 'The King of Jacob' preserves the Hebrew form and covenantal resonance better than smoothing to 'Jacob's King.'
- source_word: יַעֲקֹב
  chosen: Jacob
  alternatives:
  - Israel
  lexicon: HALOT
  rationale: The proper name in the Hebrew text is Jacob, not Israel, and should be transliterated rather than interpreted.
