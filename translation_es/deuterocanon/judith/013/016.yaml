translation:
  language: es
  text: 'Y vive Yahvé[a], que me guardó en el camino por el que anduve: mi rostro lo engañó para su destrucción, y no cometió pecado conmigo para contaminación y vergüenza.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Literalmente: «mi rostro lo engañó»; la frase alude a que la apariencia externa de Judit lo llevó al engaño.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ζῇ Κύριος
  english_pob_choice: as the Lord lives
  chosen_spanish: Y vive Yahvé
  alternatives_spanish:
  - Vive el Señor
  - Por la vida de Yahvé
  lexicon: LSJ
  rationale: La fórmula griega es un juramento solemne. En español, «Y vive Yahvé» conserva el carácter de asseveración y mantiene el nombre divino según el criterio del proyecto, en vez de sustituirlo por una fórmula litúrgica más genérica.
- source_word: διεφύλαξέν με
  english_pob_choice: guarded me
  chosen_spanish: me guardó
  alternatives_spanish:
  - me preservó
  - me mantuvo a salvo
  lexicon: LSJ
  rationale: El verbo expresa protección activa y conservación. «Me guardó» es natural en español y suficientemente cercano al sentido de custodia del griego.
- source_word: ἐν τῇ ὁδῷ μου ᾗ ἐπορεύθην
  english_pob_choice: on the way by which I went
  chosen_spanish: en el camino por el que anduve
  alternatives_spanish:
  - en mi viaje por el que fui
  - a lo largo del sendero por el que pasé
  lexicon: LSJ
  rationale: «Camino» conserva la imagen concreta del recorrido; «anduve» reproduce bien el movimiento de ἐπορεύθην en un español claro y digno.
- source_word: ἠπάτησεν αὐτὸν τὸ πρόσωπόν μου
  english_pob_choice: my face deceived him
  chosen_spanish: mi rostro lo engañó
  alternatives_spanish:
  - mi apariencia lo engañó
  - mi semblante lo engañó
  lexicon: LSJ
  rationale: El griego dice literalmente «mi rostro». Se mantiene esa imagen, con «rostro» como equivalente natural en español, sin borrar la tensión entre literalidad e implicación contextual de apariencia.
- source_word: εἰς ἀπώλειαν αὐτοῦ
  english_pob_choice: to his destruction
  chosen_spanish: para su destrucción
  alternatives_spanish:
  - para su ruina
  - hacia su perdición
  lexicon: LSJ
  rationale: εἰς expresa dirección/resultadividad. «Para su destrucción» refleja bien el resultado fatal sin añadir matices no explicitados por el texto.
- source_word: οὐκ ἐποίησεν ἁμάρτημα μετʼ ἐμοῦ
  english_pob_choice: he did not commit sin with me
  chosen_spanish: no cometió pecado conmigo
  alternatives_spanish:
  - no pecó conmigo
  - no hizo pecado conmigo
  lexicon: LSJ
  rationale: Se conserva el sustantivo «pecado», como hace el inglés POB con «sin», y se evita explicitar de más la naturaleza del acto; el griego permanece deliberadamente más sobrio que una paráfrasis sexual explícita.
- source_word: εἰς μίασμα καὶ αἰσχύνην
  english_pob_choice: for defilement and shame
  chosen_spanish: para mancha y vergüenza
  alternatives_spanish:
  - para defilement y vergüenza
  - para contaminación y vergüenza
  lexicon: LSJ
  rationale: μίασμα puede abarcar contaminación/impureza/defilement. En español, «mancha» comunica bien la idea moral y cultual sin caer en un calco poco natural; «vergüenza» conserva αἰσχύνη con fidelidad.
theological_decisions:
- issue: Tratamiento de Κύριος en una fórmula de juramento
  english_pob_reading: Lord
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el Señor
  - el Dueño
  rationale: Aunque el inglés POB traduce κύριος como «Lord», el proyecto español prescribe «Yahvé» para el nombre divino. En esta fórmula juramentaria, el referente es el Dios de Israel, no un simple título humano; por eso se preserva el nombre propio divino.
  doctrine_reference: 'DOCTRINE.md Contested terms: κύριος → Yahvé'
- issue: Nivel de explicitud en «no cometió pecado conmigo»
  english_pob_reading: retain the broader wording 'he did not commit sin with me'
  chosen_spanish_reading: no cometió pecado conmigo
  alternative_spanish_readings:
  - no me violó
  - no tuvo relaciones pecaminosas conmigo
  rationale: El griego mantiene una formulación general, y el contexto inmediato ya orienta el sentido hacia la preservación de la honra y pureza de Judith. En español se conserva esa reserva sin introducir una explicitud que el verso no formula.
  doctrine_reference: DOCTRINE.md Translation philosophy §§1, 3, 6
translation_notes:
  revision_awareness: 'El borrador sigue la última revisión del inglés POB al preferir una relación final más directa para εἰς: «para» en lugar de una expansión como «resultando en». También conserva la fraseología sobria del original en «no cometió pecado conmigo».'
  spanish_consistency_notes:
  - Se usa «Yahvé» de forma consistente para el nombre divino según el criterio del proyecto.
  - «Rostro» mantiene la literalidad de πρόσωπον, mientras la nota aclara el sentido contextual de apariencia externa.
  - «Pecado» y «mancha» preservan el paralelismo moral/cultual del griego sin sobrerresolverlo.
