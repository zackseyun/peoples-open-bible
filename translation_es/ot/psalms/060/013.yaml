translation:
  language: es
  text: Danos ayuda contra el adversario[a], porque vana es la salvación[b] del hombre[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «de la angustia»; el hebreo צַר puede significar «angustia» o «adversario/enemigo».
    reason: lexical_alternative
  - marker: b
    text: O «liberación» o «victoria» para «salvación».
    reason: lexical_alternative
  - marker: c
    text: Hebreo «hombre» (אָדָם), con sentido de humanidad en general aquí.
    reason: lexical_alternative
lexical_decisions:
- source_word: הָבָה
  english_pob_choice: Give
  chosen_spanish: Danos
  alternatives_spanish:
  - Concede-nos
  - Otórganos
  - Danos favor
  lexicon: HALOT
  rationale: En una súplica poética dirigida a Dios, el imperativo hebreo funciona como petición urgente. «Danos» conserva la fuerza directa de la oración mejor que una formulación más abstracta.
- source_word: לָּנוּ
  english_pob_choice: us
  chosen_spanish: nos
  alternatives_spanish:
  - a nosotros
  lexicon: HALOT
  rationale: Es el objeto indirecto de la petición; «nos» es la forma natural y fiel en español.
- source_word: עֶזְרָת
  english_pob_choice: help
  chosen_spanish: ayuda
  alternatives_spanish:
  - auxilio
  - socorro
  lexicon: HALOT
  rationale: El sustantivo en constructo expresa ayuda/auxilio. «Ayuda» es claro y digno en español, y mantiene el tono de petición.
- source_word: מִצָּר
  english_pob_choice: against the adversary
  chosen_spanish: contra el adversario
  alternatives_spanish:
  - de la angustia
  - de la tribulación
  - contra el enemigo
  lexicon: HALOT
  rationale: Aquí צַר puede significar «angustia» o «adversario/foe». En este contexto de conflicto, la lectura personal «adversario» es preferible. La preposición מִן se vierte naturalmente como «contra» con una petición de ayuda orientada a la victoria sobre un enemigo.
- source_word: וְשָׁוְא
  english_pob_choice: for ... is vain
  chosen_spanish: porque vana es
  alternatives_spanish:
  - y vacía es
  - pues es inútil
  lexicon: HALOT
  rationale: שָׁוְא denota vanidad, vaciedad o inutilidad. «Vana es» conserva el paralelismo poético y la densidad semántica.
- source_word: תְּשׁוּעַת
  english_pob_choice: the salvation
  chosen_spanish: la salvación
  alternatives_spanish:
  - el rescate
  - la liberación
  - la victoria
  lexicon: HALOT
  rationale: «Salvación» mantiene la correspondencia léxica principal y funciona bien en el registro bíblico, sin borrar las posibilidades contextuales de rescate o victoria.
- source_word: אָדָם
  english_pob_choice: man
  chosen_spanish: el hombre
  alternatives_spanish:
  - la humanidad
  - el ser humano
  - la gente
  lexicon: HALOT
  rationale: אָדָם aquí designa a la humanidad en general frente a la ayuda divina. «El hombre» conserva la forma concisa del original; se documenta la referencia genérica en la nota.
theological_decisions:
- issue: Contraste entre ayuda humana y ayuda divina
  english_pob_reading: The verse states that human salvation/deliverance is futile in contrast to the requested help from God, without making a broader doctrinal claim beyond the psalm's immediate context.
  chosen_spanish_reading: El versículo contrapone la ayuda pedida a Dios con la insuficiencia de la salvación humana, sin convertirlo en una afirmación sistemática más amplia.
  alternative_spanish_readings:
  - Una denuncia universal de todo esfuerzo humano
  - Una afirmación absoluta de que todo rescate humano carece de valor
  rationale: La traducción conserva la tensión del hebreo entre la súplica a Dios y la futilidad de la salvación humana, sin ampliar indebidamente el alcance doctrinal.
  doctrine_reference: Preservar la tensión teológica en lugar de resolverla
translation_notes:
  revision_awareness: 'El pasaje coincide sustancialmente con el audit trail inglés: se mantuvo la lectura de conflicto/adversario, la equivalencia de salvación y la referencia genérica a אָדָם, sin incorporar revisiones posteriores ni cambios textuales.'
  spanish_consistency_notes:
  - Se usó español neutral y bíblico sin recurrir a «SEÑOR» como sustituto del nombre divino, aunque este versículo no contiene el tetragrámaton.
  - «Adversario» mantiene la lectura contextual militar/conflictiva documentada por el POB inglés.
  - La nota sobre אָדָם explica explícitamente su valor genérico para evitar una lectura exclusivamente masculina.
  - La puntuación sigue el paralelismo poético del hebreo y la colocación de las notas en el texto corresponde a los puntos léxicos significativos.
