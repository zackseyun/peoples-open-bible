translation:
  language: es
  text: Yahvé tu Dios te hará abundar en toda la obra de tu mano[a], en el fruto de tu vientre, en el fruto de tu ganado y en el fruto de tu suelo, para bien; porque Yahvé volverá a alegrarse por ti para bien[b], como se alegró por tus padres.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «te dará en abundancia» / «te prosperará»; el verbo hebreo expresa causar abundancia o excedente.
    reason: lexical_alternative
  - marker: b
    text: Hebreo «tus padres»; es decir, los antepasados de Israel.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהוֹתִירְךָ
  english_pob_choice: will make you abound
  chosen_spanish: te hará abundar
  alternatives_spanish:
  - te dará en abundancia
  - te prosperará
  - te hará tener en exceso
  lexicon: HALOT
  rationale: El hifil de יתר expresa causar abundancia o excedente. «Te hará abundar» conserva el sentido causativo y la idea de incremento concreto sin sonar rígido en español.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: 'Se conserva el nombre divino propio con la forma establecida del proyecto en español: «Yahvé», evitando la sustitución por un título.'
- source_word: בְּכֹל מַעֲשֵׂה יָדֶךָ
  english_pob_choice: in all the work of your hand
  chosen_spanish: en toda la obra de tu mano
  alternatives_spanish:
  - en todo lo que haces
  - en todo tu trabajo
  - en todas tus labores
  lexicon: HALOT
  rationale: La expresión hebrea es idiomática, pero «obra de tu mano» mantiene la concreción del hebreo y la relación con la labor humana, sin volverla una paráfrasis amplia.
- source_word: בִּפְרִי בִטְנְךָ
  english_pob_choice: in the fruit of your womb
  chosen_spanish: en el fruto de tu vientre
  alternatives_spanish:
  - en tu descendencia
  - en el fruto de tu cuerpo
  lexicon: HALOT
  rationale: Se preserva la metáfora bíblica de «fruto» y «vientre», que en este contexto significa hijos o descendencia. La imagen covenantal queda así transparente en español.
- source_word: בְהֶמְתְּךָ
  english_pob_choice: your livestock
  chosen_spanish: tu ganado
  alternatives_spanish:
  - tus animales
  - tu ganado doméstico
  lexicon: HALOT
  rationale: Aunque «livestock» puede abarcar más ampliamente el rebaño y los animales domésticos, en español «ganado» es natural y encaja con el contexto agrícola de bendición.
- source_word: אַדְמָתְךָ
  english_pob_choice: your ground
  chosen_spanish: tu suelo
  alternatives_spanish:
  - tu tierra
  - tu campo
  lexicon: HALOT
  rationale: «אדמה» aquí apunta al terreno productivo. «Suelo» mantiene la concreción agrícola del término y su relación con el fruto que produce.
- source_word: לְטוֹבָה
  english_pob_choice: for good
  chosen_spanish: para bien
  alternatives_spanish:
  - para tu bien
  - para bendición
  - para prosperidad
  lexicon: HALOT
  rationale: «Para bien» es una correspondencia directa y natural en español, suficientemente abierta para conservar la fuerza beneficiosa sin añadir precisión no explicitada.
- source_word: יָשׁוּב
  english_pob_choice: will again
  chosen_spanish: volverá
  alternatives_spanish:
  - retornará
  - volverá de nuevo
  lexicon: HALOT
  rationale: 'En esta construcción, la idea es de reanudación: Yahvé volverá a alegrarse. «Volverá» comunica con naturalidad ese valor iterativo que el inglés expresa con «again».'
- source_word: לָשׂוּשׂ עָלֶיךָ
  english_pob_choice: rejoice over you
  chosen_spanish: a gozarse sobre ti
  alternatives_spanish:
  - a alegrarse por ti
  - a regocijarse sobre ti
  lexicon: HALOT
  rationale: Se conserva el verbo de gozo y la preposición «sobre», que reflejan el objeto personal del regocijo divino. «Gozarse» mantiene el matiz de júbilo más fuerte que un simple «alegrarse».
- source_word: כַּאֲשֶׁר שָׂשׂ עַל אֲבֹתֶיךָ
  english_pob_choice: just as he rejoiced over your fathers
  chosen_spanish: como se gozó sobre tus padres
  alternatives_spanish:
  - como se gozó sobre tus antepasados
  - como se alegró con tus padres
  lexicon: HALOT
  rationale: Se mantiene «tus padres» para reflejar el masculino plural del hebreo y la referencia a la línea patriarcal, como en el texto fuente y el audit trail en inglés.
theological_decisions:
- issue: Nombre divino YHWH
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: El texto hebreo usa el Tetragrámaton de forma directa. La política del proyecto en español prescribe «Yahvé» como transliteración del nombre divino, preservando el valor de nombre propio y no de título.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Referencia masculina a los antepasados
  english_pob_reading: your fathers
  chosen_spanish_reading: tus padres
  alternative_spanish_readings:
  - tus antepasados
  - tus ancestros
  rationale: El hebreo dice explícitamente אֲבֹתֶיךָ, forma masculina plural. «Tus padres» conserva la correspondencia formal y la posible referencia patriarcal; las alternativas neutras son más explicativas que el original.
  doctrine_reference: DOCTRINE.md Translation philosophy §4 (Gender-accurate over gender-neutral)
translation_notes:
  revision_awareness: 'La revisión más reciente indica alta concordancia y ningún cambio requerido; se mantiene la misma línea interpretativa: abundancia causal, nombre divino transliterado y referencia patriarcal literal.'
  spanish_consistency_notes:
  - Se conserva la fórmula del nombre divino como «Yahvé» en todo el texto.
  - Se mantiene la metáfora agrícola («fruto», «vientre», «suelo») sin reemplazarla por paráfrasis abstractas.
  - «Sobre ti» / «sobre tus padres» reproduce la relación preposicional del hebreo y el tono personal del gozo divino.
  - La puntuación sigue el patrón español con punto y coma antes de la cláusula explicativa final.
