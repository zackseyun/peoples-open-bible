translation:
  language: es
  text: 'Y lo bendijo y dijo: «Bendito sea Abram por Dios Altísimo, poseedor[a] de los cielos y la tierra[b]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «creador de los cielos y la tierra». El participio hebreo puede significar «poseedor», «dueño» o, en contexto, «creador».
    reason: lexical_alternative
  - marker: b
    text: O «el cielo y la tierra». El hebreo dice literalmente «los cielos y la tierra».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְבָרְכֵהוּ
  english_pob_choice: And he blessed him
  chosen_spanish: Y lo bendijo
  alternatives_spanish:
  - Entonces lo bendijo
  lexicon: HALOT
  rationale: El wayyiqtol narrativo se rinde naturalmente en pasado simple con coordinación. 'Y' conserva el flujo narrativo hebreo; 'lo' expresa con claridad el sufijo de objeto de tercera persona masculina singular.
- source_word: וַיֹּאמַר
  english_pob_choice: and said
  chosen_spanish: y dijo
  alternatives_spanish:
  - y dijo entonces
  - diciendo
  lexicon: HALOT
  rationale: Como introdutor narrativo, 'y dijo' es la forma española más natural y fiel al encadenamiento del hebreo.
- source_word: בָּרוּךְ
  english_pob_choice: Blessed be
  chosen_spanish: Bendito sea
  alternatives_spanish:
  - Bendito es
  - Que sea bendito
  lexicon: HALOT
  rationale: La forma participial en fórmula de bendición funciona mejor en español como exhortación/declamación benedictoria. 'Bendito sea' preserva mejor el tono litúrgico sin forzar una paráfrasis.
- source_word: אַבְרָם
  english_pob_choice: Abram
  chosen_spanish: Abram
  alternatives_spanish:
  - Abrán
  lexicon: Nombre propio
  rationale: Se conserva la transliteración usual del nombre en este punto del Génesis, antes del cambio a Abraham.
- source_word: לְאֵל
  english_pob_choice: by God
  chosen_spanish: por Dios
  alternatives_spanish:
  - a Dios
  - de Dios
  lexicon: HALOT
  rationale: En la fórmula de bendición, la preposición ל puede señalar relación o procedencia. En español, 'por Dios' comunica con mayor claridad la fuente o agente implícito de la bendición en este contexto.
- source_word: אֵל עֶלְיוֹן
  english_pob_choice: God Most High
  chosen_spanish: Dios Altísimo
  alternatives_spanish:
  - Dios, el Altísimo
  - el Dios Altísimo
  lexicon: HALOT
  rationale: El título divino se expresa de manera natural en español como 'Dios Altísimo', preservando el valor titular de אֵל עֶלְיוֹן sin añadir elementos interpretativos.
- source_word: קֹנֵה
  english_pob_choice: possessor
  chosen_spanish: poseedor
  alternatives_spanish:
  - creador
  - dueño
  - propietario
  lexicon: HALOT
  rationale: El participio admite el rango semántico de adquirir, poseer o crear. 'Poseedor' mantiene la decisión léxica principal de la POB en español y evita resolver prematuramente la tensión entre 'poseedor' y 'creador'.
- source_word: שָׁמַיִם וָאָרֶץ
  english_pob_choice: heaven and earth
  chosen_spanish: los cielos y de la tierra
  alternatives_spanish:
  - el cielo y la tierra
  - los cielos y la tierra
  lexicon: HALOT
  rationale: Se conserva la pareja merística tradicional. 'Cielos' refleja el plural hebreo y permite mantener la forma más transparente; la segunda preposición se omite antes de 'la tierra' para una sintaxis española más natural.
theological_decisions:
- issue: Sentido de קֹנֵה aplicado a El Elyón
  english_pob_reading: possessor of heaven and earth
  chosen_spanish_reading: poseedor de los cielos y de la tierra
  alternative_spanish_readings:
  - creador de los cielos y de la tierra
  - dueño de los cielos y de la tierra
  rationale: El hebreo admite tanto 'poseedor/poseedor' como, en ciertos contextos, 'creador'. La redacción principal mantiene la ambigüedad útil del término y no impone una conclusión teológica más estrecha que la del propio participio. La alternativa interpretativa se preserva como posibilidad léxica.
  doctrine_reference: Preservar la tensión léxica documentada; no resolverla de forma dogmática.
translation_notes:
  revision_awareness: El cotejo más reciente indica alta concordancia y no se registraron revisiones sustantivas; se conserva la decisión principal de la POB sobre קֹנֵה como 'possessor/poseedor' y la nota alternativa 'creator/creador'.
  spanish_consistency_notes:
  - Se mantuvo 'Dios Altísimo' como equivalente natural de 'God Most High'.
  - Se evitó 'SEÑOR' porque el texto hebreo no contiene el Tetragrámaton en este versículo.
  - Se conservó la ambigüedad de קֹנֵה con 'poseedor', siguiendo el audit trail inglés.
  - La coordinación narrativa con 'Y' y 'y dijo' refleja el estilo bíblico sin volverlo arcaizante.
