translation:
  language: es
  text: Y toda la asamblea les creyó[a], porque eran ancianos y jueces del pueblo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «toda la congregación». El término griego se refiere a la comunidad reunida.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐπίστευσεν
  english_pob_choice: believed
  chosen_spanish: les creyó
  alternatives_spanish:
  - confió en ellos
  - les dio crédito
  - les tuvo por veraces
  lexicon: BDAG
  rationale: El aoristo de πιστεύω aquí toma dativo y expresa aceptar como verdadero el testimonio de los acusadores. En español, «les creyó» reproduce con naturalidad esa aceptación de su dicho sin añadir matices ajenos como confianza relacional más amplia.
- source_word: ἡ συναγωγὴ πᾶσα
  english_pob_choice: the whole assembly
  chosen_spanish: toda la asamblea
  alternatives_spanish:
  - toda la congregación
  - todo el pueblo reunido
  lexicon: LSJ
  rationale: En este contexto narrativo, συναγωγή designa a la comunidad reunida, no la institución posterior de «sinagoga». «Asamblea» preserva el sentido de grupo reunido y evita un anacronismo institucional.
- source_word: ὡς
  english_pob_choice: since
  chosen_spanish: porque
  alternatives_spanish:
  - ya que
  - puesto que
  - como
  lexicon: BDAG
  rationale: Aquí introduce la razón percibida por la asamblea para creerles. «Porque» comunica de forma clara y natural esa relación causal en español, sin la ambigüedad que podría tener «como».
- source_word: πρεσβυτέρων
  english_pob_choice: elders
  chosen_spanish: ancianos
  alternatives_spanish:
  - líderes mayores
  - viejos
  lexicon: LSJ
  rationale: El término señala a líderes reconocidos de la comunidad, no solo a personas de edad avanzada. «Ancianos» mantiene la carga social y judicial del cargo en español bíblico actual.
- source_word: κριτῶν
  english_pob_choice: judges
  chosen_spanish: jueces
  alternatives_spanish:
  - magistrados
  lexicon: LSJ
  rationale: El término apunta a quienes ejercían autoridad judicial entre el pueblo. «Jueces» es el equivalente más directo y comprensible en español.
- source_word: τοῦ λαοῦ
  english_pob_choice: of the people
  chosen_spanish: del pueblo
  alternatives_spanish:
  - de la nación
  - del pueblo de Dios
  lexicon: BDAG
  rationale: λαός se refiere a la comunidad del pueblo en sentido colectivo. «Del pueblo» conserva la referencia comunitaria sin expandirla innecesariamente.
theological_decisions:
- issue: ἡ συναγωγὴ πᾶσα en un relato judío precristiano
  english_pob_reading: the whole assembly
  chosen_spanish_reading: toda la asamblea
  alternative_spanish_readings:
  - toda la congregación
  - la sinagoga entera
  rationale: Se evita «sinagoga» porque en español suele sugerir una institución/casa de culto posterior y no simplemente la comunidad reunida. «Asamblea» mantiene el sentido del colectivo congregado, en línea con el auditable texto griego.
  doctrine_reference: Prioridad del sentido histórico-lingüístico sobre la terminología eclesial posterior.
translation_notes:
  revision_awareness: Coincide con el sentido del griego transmitido en el texto fuente y con la decisión inglesa de evitar un anacronismo institucional en συναγωγή. No se requiere revisión adicional según el control de alta concordancia.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» solo cuando el hebreo lo requiera; este versículo no lo contiene.
  - Se usa «ancianos» en sentido de cargo comunitario/judicial, no de mera edad.
  - «Asamblea» y «congregación» quedan como alternativas lexicales anotadas, con preferencia por la primera en el texto principal.
