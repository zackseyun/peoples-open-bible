translation:
  language: es
  text: pero las naciones se habían reunido para destruir el nombre de los judíos[a][b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «habían sido reunidas». El participio griego tiene forma pasiva.
    reason: lexical_alternative
  - marker: b
    text: «Destruir el nombre» es un giro bíblico que puede significar borrar la memoria o la existencia continuada de un pueblo.
    reason: lexical_alternative
lexical_decisions:
- source_word: τὰ ἔθνη
  english_pob_choice: nations
  chosen_spanish: las naciones
  alternatives_spanish:
  - los gentiles
  - los pueblos
  lexicon: BDAG
  rationale: En este contexto de Ester, ἔθνη designa a los pueblos no judíos. 'Las naciones' conserva el valor colectivo del griego y evita la carga más técnica de 'gentiles' en español.
- source_word: ἐπισυναχθέντα
  english_pob_choice: had assembled
  chosen_spanish: habían sido reunidas
  alternatives_spanish:
  - se habían reunido
  - habían sido congregadas
  lexicon: BDAG
  rationale: El participio es pasivo en forma y expresa que fueron juntadas/reunidas. 'Habían sido reunidas' refleja mejor esa pasividad que un giro reflexivo, aunque sigue siendo natural en español.
- source_word: ἀπολέσαι
  english_pob_choice: to destroy
  chosen_spanish: destruir
  alternatives_spanish:
  - aniquilar
  - borrar
  lexicon: BDAG
  rationale: El infinitivo expresa propósito. 'Destruir' conserva el sentido amplio del griego sin añadir más violencia interpretativa de la que el texto exige.
- source_word: τὸ ὄνομα
  english_pob_choice: the name
  chosen_spanish: el nombre
  alternatives_spanish:
  - la memoria
  - la reputación
  lexicon: BDAG
  rationale: La traducción literal preserva la imagen bíblica. En español también puede entenderse idiomáticamente como la eliminación del recuerdo o la existencia continuada del pueblo.
- source_word: Ἰουδαίων
  english_pob_choice: the Jews
  chosen_spanish: de los judíos
  alternatives_spanish:
  - de los judeanos
  lexicon: BDAG
  rationale: En Ester, Ἰουδαῖοι se refiere al pueblo judío. 'Judíos' es la equivalencia natural y más clara en español.
theological_decisions:
- issue: Fuerza idiomática de 'destruir el nombre'
  english_pob_reading: Retain the literal idiom 'destroy the name of the Jews' in the main text.
  chosen_spanish_reading: Mantener literalmente 'destruir el nombre de los judíos' en el texto principal.
  alternative_spanish_readings:
  - borrar la memoria de los judíos
  - barrer con los judíos
  rationale: El griego conserva la imagen concreta de destruir el nombre. Aunque el hebraísmo puede implicar borrar la memoria o la existencia de un pueblo, el texto base es lo bastante transparente para preservar la forma literal y dejar viva la tensión idiomática.
  doctrine_reference: DOCTRINE.md §Translation philosophy 3, 5
- issue: Valor pasivo del participio ἐπισυναχθέντα
  english_pob_reading: ‘had assembled’ with a footnote noting the passive form.
  chosen_spanish_reading: ‘habían sido reunidas’ con una nota que explicita la forma pasiva.
  alternative_spanish_readings:
  - se habían reunido
  - habían sido congregadas
  rationale: La forma pasiva del participio debe quedar visible en español para no perder un matiz importante del griego. La redacción elegida mantiene ese dato sin sonar forzada.
  doctrine_reference: DOCTRINE.md §Translation philosophy 1, 3
translation_notes:
  revision_awareness: 'El pasaje fue revisado recientemente sin cambios sustanciales; la versión española sigue de cerca el trazado auditado del inglés POB y conserva las dos tensiones documentadas: la pasividad del participio y el valor idiomático de ‘el nombre’.'
  spanish_consistency_notes:
  - Se usa ‘judíos’ en coherencia con Ester y con la equivalencia POB inglesa, no ‘judeanos’.
  - Se conserva ‘las naciones’ para ἔθνη, evitando reemplazarlo por una glosa más específica que no exige el contexto.
  - 'El orden de la oración en español sigue de cerca el griego, con una apertura adversativa natural: ‘pero las naciones…’.'
