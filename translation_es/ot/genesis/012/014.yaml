translation:
  language: es
  text: Y cuando Abram entró en Egipto, los egipcios vieron que la mujer[a] era muy hermosa.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'la esposa'. El hebreo אִשָּׁה puede significar 'mujer' o 'esposa'; aquí la traducción conserva el término más general de la cláusula.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְהִי
  english_pob_choice: And when
  chosen_spanish: Y sucedió que, cuando
  alternatives_spanish:
  - Y cuando
  - Y aconteció que, cuando
  - Y fue así que, cuando
  lexicon: HALOT
  rationale: La forma hebrea introduce la secuencia narrativa; en español, 'Y sucedió que, cuando' reproduce bien esa apertura sin sonar forzada y conserva el valor de transición del relato.
- source_word: כְּבֹא
  english_pob_choice: entered
  chosen_spanish: entró
  alternatives_spanish:
  - iba entrando
  - llegó a entrar
  - entró a
  lexicon: HALOT
  rationale: El infinitivo temporal con כ expresa el momento en que Abram cruza a Egipto. 'Entró' es natural y fiel al movimiento de ingreso señalado por el hebreo.
- source_word: מִצְרָיְמָה
  english_pob_choice: Egypt
  chosen_spanish: en Egipto
  alternatives_spanish:
  - a Egipto
  - hacia Egipto
  lexicon: HALOT
  rationale: El sufijo direccional indica movimiento hacia Egipto; en español se expresa de manera idiomática con 'en Egipto' después de 'entró', que ya incorpora la llegada al lugar.
- source_word: וַיִּרְאוּ
  english_pob_choice: saw
  chosen_spanish: vieron
  alternatives_spanish:
  - miraron
  - advirtieron
  - notaron
  lexicon: HALOT
  rationale: El verbo ראה conserva su sentido básico de percepción visual. 'Vieron' sigue de cerca el hebreo y evita interpretar más de la cuenta.
- source_word: הַמִּצְרִים
  english_pob_choice: the Egyptians
  chosen_spanish: los egipcios
  alternatives_spanish:
  - los hombres de Egipto
  - la gente de Egipto
  lexicon: HALOT
  rationale: El gentilicio plural definido se traduce de forma directa como 'los egipcios'.
- source_word: הָאִשָּׁה
  english_pob_choice: the woman
  chosen_spanish: la mujer
  alternatives_spanish:
  - la esposa
  lexicon: HALOT
  rationale: Aunque אִשָּׁה puede significar 'esposa', aquí el hebreo usa el término más general. Mantener 'la mujer' preserva esa amplitud semántica sin imponer 'esposa' en esta cláusula.
- source_word: כִּי
  english_pob_choice: that
  chosen_spanish: porque
  alternatives_spanish:
  - que
  - pues
  lexicon: HALOT
  rationale: 'En esta construcción, כִּי puede introducir la causa o el contenido de la percepción. ''Porque'' comunica en español de forma natural la razón que motiva lo que vieron: su gran belleza.'
- source_word: יָפָה
  english_pob_choice: beautiful
  chosen_spanish: hermosa
  alternatives_spanish:
  - bonita
  - bella
  - muy hermosa
  lexicon: HALOT
  rationale: El adjetivo describe belleza física. 'Hermosa' es una equivalencia clara, digna y natural en español contemporáneo.
- source_word: הִוא
  english_pob_choice: was
  chosen_spanish: era
  alternatives_spanish:
  - era ella
  - es
  lexicon: HALOT
  rationale: 'El pronombre independiente se integra de manera idiomática en la cópula española: ''era muy hermosa'' reproduce el predicado sin sobrecargar el verso.'
- source_word: מְאֹד
  english_pob_choice: very
  chosen_spanish: muy
  alternatives_spanish:
  - en gran manera
  - sumamente
  lexicon: HALOT
  rationale: El adverbio intensifica la cualidad. 'Muy' es el equivalente más natural y directo en español.
theological_decisions:
- issue: Valor de אִשָּׁה en contexto narrativo
  english_pob_reading: The Hebrew אִשָּׁה can mean either 'woman' or 'wife'; the English POB preserves the more general wording 'the woman.'
  chosen_spanish_reading: Se conserva 'la mujer' en el cuerpo del texto.
  alternative_spanish_readings:
  - la esposa
  - la mujer/esposa
  rationale: El hebreo aquí no obliga a decidir 'esposa' en la cláusula; mantener el término general evita adelantar una precisión que el versículo no formula. La nota permite reconocer la alternativa semántica sin borrarla.
  doctrine_reference: Génesis 12:14; uso léxico de אִשָּׁה
translation_notes:
  revision_awareness: El texto inglés de la POB permanece en acuerdo alto con la base hebrea y no requirió revisiones aplicadas; la versión española sigue esa misma decisión léxica central y conserva la alternativa semántica documentada para אִשָּׁה.
  spanish_consistency_notes:
  - Se usa 'Yahvé' solo cuando aparezca el tetragrámaton; este versículo no lo contiene.
  - Se mantiene 'la mujer' conforme a la decisión léxica auditada, con nota alternativa para 'la esposa'.
  - Se evita importar una lectura interpretativa adicional sobre Sarai en el cuerpo del verso.
  - La puntuación y el orden español buscan fluidez natural sin perder la secuencia narrativa hebrea.
