revisions:
- from: Entonces me incliné y me postré ante Yahvé[a], y bendije a Yahvé, Dios de mi señor Abraham, que me condujo por el camino recto para tomar a la hija del hermano de mi señor para su hijo.
  to: Entonces me incliné y me postré ante Yahvé[a], y bendije a Yahvé, Dios de mi amo Abraham, que me condujo por el camino recto para tomar a la hija del hermano de mi amo para su hijo.
  rationale: Se conserva la estructura y el sentido del borrador, pero se reemplaza «mi señor» por «mi amo» en ambas apariciones para reflejar mejor que אֲדֹנִי se refiere al superior humano del siervo, no a un título divino, y para lograr un español más natural y claro en este contexto.
