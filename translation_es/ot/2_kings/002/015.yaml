  text: When the sons of the prophets who were at Jericho saw him from a distance[a], they said[c][b], “The spirit of Elijah rests on Elisha.” Then they came to meet him and bowed down to the ground before him.
  footnotes:
  - marker: a
    text: Or “at a distance” for “from across from them”; the Hebrew expression denotes being opposite or in view from across.
    reason: lexical_alternative
  - marker: b
    text: “The spirit of Elijah” refers to Elijah’s prophetic spirit or empowerment now recognized in Elisha.
    reason: cross_reference
  - marker: c
    text: Or “prostrated themselves before him.” The gesture expresses honor and submission, not necessarily worship.
    reason: lexical_alternative
