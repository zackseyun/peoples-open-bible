translation:
  language: es
  text: Si parece bien al rey[a], que se escriba que sean destruidos, y yo pesaré diez mil talentos[b] de plata en manos de los que realizan el trabajo[c], para llevarla a las tesorerías del rey.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Si le agrada al rey».'
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «diez mil talentos de plata», una suma muy grande medida por peso y no por moneda acuñada.'
    reason: cultural_note
  - marker: c
    text: 'O: «por medio de los que realizan el trabajo», es decir, mediante la gestión de los funcionarios que ejecutarían la orden.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אִם עַל הַמֶּלֶךְ טוֹב
  english_pob_choice: If it seems good to the king
  chosen_spanish: Si parece bien al rey
  alternatives_spanish:
  - Si le agrada al rey
  - Si es bueno ante el rey
  lexicon: HALOT
  rationale: El hebreo expresa aprobación o agrado real mediante una idiomática fórmula de corte. «Parece bien» conserva el valor idiomático y suena natural en español sin perder la cercanía formal al original.
- source_word: יִכָּתֵב
  english_pob_choice: let it be written
  chosen_spanish: que se escriba
  alternatives_spanish:
  - que sea decretado
  - que se redacte un edicto
  lexicon: HALOT
  rationale: El nifal de כתב es literalmente «ser escrito». En este contexto implica una orden oficial, pero «que se escriba» preserva el verbo del hebreo sin sobrecargarlo con una interpretación adicional.
- source_word: לְאַבְּדָם
  english_pob_choice: that they be destroyed
  chosen_spanish: que sean destruidos
  alternatives_spanish:
  - para su destrucción
  - que sean aniquilados
  - para destruirlos
  lexicon: HALOT
  rationale: La construcción expresa el contenido de lo que debe escribirse y comunica la intención letal. «Sean destruidos» mantiene la pasiva y la dureza del término sin suavizarlo.
- source_word: כִּכַּר כֶּסֶף
  english_pob_choice: talents of silver
  chosen_spanish: talentos de plata
  alternatives_spanish:
  - talentos de dinero
  - unidades de plata
  lexicon: HALOT
  rationale: כִּכָּר es una unidad de peso que en español bíblico se rinde bien con «talento». Mantener «talentos de plata» conserva la medida antigua y la materia medida por peso, tal como en el texto fuente.
- source_word: אֶשְׁקוֹל
  english_pob_choice: I will weigh out
  chosen_spanish: pesaré
  alternatives_spanish:
  - pesaré y entregaré
  - pesaré y pagaré
  lexicon: HALOT
  rationale: El verbo significa literalmente «pesar». En español, «pesaré» conserva el gesto concreto de medir la plata por peso; el complemento contextual deja claro que equivale a entregar la suma.
- source_word: עַל יְדֵי
  english_pob_choice: into the hands of
  chosen_spanish: por medio de
  alternatives_spanish:
  - en manos de
  - por las manos de
  - a través de
  lexicon: HALOT
  rationale: La expresión puede señalar agencia o intermediación. Dado que el español «en manos de» sugiere posesión más que mediación, «por medio de» refleja mejor la agencia sin forzar una imagen poco natural.
- source_word: עֹשֵׂי הַמְּלָאכָה
  english_pob_choice: those who do the work
  chosen_spanish: los que realizan el trabajo
  alternatives_spanish:
  - los trabajadores
  - los encargados de la labor
  - los que hacen la obra
  lexicon: HALOT
  rationale: La expresión es bastante abierta en hebreo. «Los que realizan el trabajo» mantiene la generalidad y evita especificar indebidamente que se trata de oficiales o funcionarios.
- source_word: לְהָבִיא
  english_pob_choice: to bring it
  chosen_spanish: para llevarlos
  alternatives_spanish:
  - para traerlo
  - para entregarlos
  lexicon: HALOT
  rationale: El infinitivo indica la finalidad de transportar el dinero al destino mencionado. En español, «llevarlos» enlaza naturalmente con «talentos» y preserva la idea de traslado hacia los tesoros.
- source_word: גִּנְזֵי הַמֶּלֶךְ
  english_pob_choice: the king’s treasuries
  chosen_spanish: los tesoros del rey
  alternatives_spanish:
  - los tesoros reales
  - la tesorería del rey
  - los almacenes del rey
  lexicon: HALOT
  rationale: El plural hebreo puede referirse a depósitos o tesoros. «Los tesoros del rey» conserva el plural y resulta comprensible en español; evita reducirlo indebidamente a una sola «tesorería».
translation_notes:
  revision_awareness: 'Se siguió de cerca el audit trail inglés: se mantuvieron la formulación idiomática del agrado real, el valor literal de «escribir», la pasiva de «ser destruidos», la medida antigua de «talentos», y la ambigüedad funcional de «los que realizan el trabajo». No se detectaron revisiones posteriores en el expediente; el pasaje quedó con alta concordancia y sin cambios sustantivos.'
  spanish_consistency_notes:
  - Se usó «Yahvé» como norma del proyecto solo cuando el texto lo requiera; este versículo no contiene el nombre divino.
  - «Talentos» conserva la unidad de peso antigua sin convertirla a medidas modernas.
  - «Tesoros» mantiene el plural del hebreo גִּנְזֵי para no desdibujar la forma del original.
  - La relación de agencia en עַל יְדֵי se resolvió con una expresión funcional en español, sin añadir sujetos no explícitos.
