id: AMO.3.9
reference: Amos 3:9
source:
  edition: WLC
  text: הַשְׁמִ֨יעוּ֙ עַל אַרְמְנ֣וֹת בְּ/אַשְׁדּ֔וֹד וְ/עַֽל אַרְמְנ֖וֹת בְּ/אֶ֣רֶץ מִצְרָ֑יִם וְ/אִמְר֗וּ הֵאָֽסְפוּ֙ עַל הָרֵ֣י שֹׁמְר֔וֹן וּ/רְא֞וּ מְהוּמֹ֤ת רַבּוֹת֙ בְּ/תוֹכָ֔/הּ וַ/עֲשׁוּקִ֖ים בְּ/קִרְבָּֽ/הּ־־־׃
translation:
  text: Proclaim to the citadels of Ashdod and to the citadels in the land of Egypt[a], and say, “Assemble on the mountains of Samaria, and see the many tumults within her[d][c][b], and the oppressed in her midst.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “palaces” for “citadels.” The Hebrew term can denote grand fortified residences.
    reason: lexical_alternative
  - marker: b
    text: Or “the hills of Samaria.”
    reason: lexical_alternative
  - marker: c
    text: Or “great unrest” / “many disturbances” for “many tumults.”
    reason: lexical_alternative
  - marker: d
    text: Or “acts of oppression”; the Hebrew may be read more abstractly, but “the oppressed” best fits the form and context.
    reason: alternative_reading
lexical_decisions:
- source_word: הַשְׁמִיעוּ
  chosen: Proclaim
  alternatives:
  - Cause to hear
  - Announce
  lexicon: HALOT
  rationale: Hiphil imperative of שׁמע here functions as a public summons or announcement. 'Proclaim' is idiomatic English that preserves the imperative force better than the more wooden 'cause to hear.'
- source_word: אַרְמְנוֹת
  chosen: citadels
  alternatives:
  - palaces
  - fortresses
  lexicon: HALOT
  rationale: The noun can denote palatial or fortified high-status structures. In this prophetic context, addressing foreign elite strongholds/watchpoints is in view; 'citadels' preserves both grandeur and defensibility better than 'palaces,' while avoiding overprecision.
- source_word: בְּאַשְׁדּוֹד
  chosen: of Ashdod
  alternatives:
  - in Ashdod
  lexicon: HALOT
  rationale: With 'citadels,' English idiom prefers 'of Ashdod' to identify the city's citadels. The underlying preposition is locative, but the genitival rendering is natural and equivalent in sense.
- source_word: בְּאֶרֶץ מִצְרַיִם
  chosen: in the land of Egypt
  alternatives:
  - of the land of Egypt
  - in Egypt
  lexicon: HALOT
  rationale: The fuller phrase is retained rather than shortened to 'in Egypt' in order to reflect the Hebrew wording and its formal prophetic cadence.
- source_word: הֵאָסְפוּ
  chosen: Assemble
  alternatives:
  - Gather yourselves
  - Be gathered
  lexicon: HALOT
  rationale: Niphal imperative of אסף here is a summons to gather for observation. 'Assemble' is concise and natural in English.
- source_word: הָרֵי שֹׁמְרוֹן
  chosen: the mountains of Samaria
  alternatives:
  - the hills of Samaria
  lexicon: HALOT
  rationale: The plural of הַר can mean mountains or hills. 'Mountains' is the more direct rendering and preserves the elevated vantage point from which the witnesses are to observe Samaria.
- source_word: מְהוּמוֹת רַבּוֹת
  chosen: the many tumults
  alternatives:
  - great unrest
  - many disturbances
  - uproars
  lexicon: HALOT
  rationale: The phrase denotes disorder, confusion, or social tumult. 'Many tumults' keeps the plural and the sense of public upheaval without overinterpreting the exact form of the disorder.
- source_word: בְּתוֹכָהּ
  chosen: within her
  alternatives:
  - in her midst
  - inside her
  lexicon: HALOT
  rationale: Refers to the city Samaria as feminine singular. 'Within her' is natural and preserves the personified-city idiom.
- source_word: עֲשׁוּקִים
  chosen: the oppressed
  alternatives:
  - acts of oppression
  - those who are oppressed
  lexicon: HALOT
  rationale: As a passive participial/substantival form, it most naturally refers to oppressed people rather than abstract oppression. This fits the parallel with what the observers are to see in the city.
- source_word: בְּקִרְבָּהּ
  chosen: in her midst
  alternatives:
  - within her
  lexicon: HALOT
  rationale: A near-synonym of the previous interior-location phrase, but varied in English for readability while preserving the same basic spatial sense. The slight variation is documented rather than flattened.
