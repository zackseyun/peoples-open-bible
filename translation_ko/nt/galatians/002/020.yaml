  rationale: 갈 2:16과 동일한 속격 모호성 정책을 따라 「의 믿음」으로 옮긴다.
theological_decisions:
- issue: πίστει τοῦ υἱοῦ τοῦ θεοῦ의 속격 해석
  chosen_reading: 하나님의 아들의 믿음 (양면적 모호성 보존)
  alternative_readings:
