base_translation:
  language: en
  yaml_path: translation/ot/leviticus/015/025.yaml
  text: If a woman has a discharge of blood for many days[a], not at the time of her menstrual impurity, or if she has a discharge beyond her menstrual impurity, all the days of her unclean discharge she shall be unclean[b], as in the days of her menstrual impurity.
  footnotes:
  - marker: a
    text: Or 'outside the time of her menstruation.' The Hebrew term includes the state of ritual impurity associated with menstruation, not only the bleeding itself.
    reason: lexical_alternative
  - marker: b
    text: Or 'if she has a discharge in addition to her menstrual impurity,' that is, extending beyond the normal menstrual period.
    reason: lexical_alternative
