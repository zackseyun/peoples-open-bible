review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja correctamente la estructura y el sentido general del hebreo: Yahvé habla a Josué, el imperativo de atención רְאֵה se conserva bien con ''Mira'', y נָתַתִּי mantiene adecuadamente el valor de certeza divina con ''he entregado''. ''En tu mano'' preserva el modismo hebreo, y ''su rey'' representa de forma natural el sufijo femenino referido a Jericó. Sin embargo, la frase final גִּבּוֹרֵי הֶחָיִל queda algo atenuada en ''los valientes guerreros'', porque pierde con claridad el componente de fuerza/poderío además del valor militar; el inglés auditado preserva esa doble carga y además documenta alternativas en nota.'
  spanish_quality_summary: El español es claro, natural y digno. No obstante, conviene un ajuste menor en la puntuación tipográfica española, colocando el punto dentro de las comillas de cierre. Además, la expresión final puede fortalecerse para reflejar mejor el hebreo y el rastro auditado sin volverse acartonada.
  glossary_alignment: '''Yahvé'' concuerda con la terminología del proyecto para יהוה. No hay conflictos con otros términos doctrinales principales. El único punto de glosario/lexicalidad a mejorar es גִּבּוֹרֵי הֶחָיִל, donde conviene una formulación española que conserve tanto ''poderosos'' como ''valientes/de guerra'', y añadir la nota léxica alternativa que el inglés ya preservó.'
  issues:
  - severity: medium
    issue: Atenuación de גִּבּוֹרֵי הֶחָיִל en 'los valientes guerreros'
    rationale: La expresión hebrea combina fuerza/capacidad y valor marcial. 'Valientes guerreros' comunica bien el aspecto militar, pero diluye el matiz de poderío presente en גִּבּוֹרֵי. El inglés auditado también conservó esta riqueza con 'mighty men of valor' y una nota de alternativas.
  - severity: low
    issue: Falta la nota léxica alternativa preservada en el POB inglés
    rationale: Dado que el inglés mantuvo una nota para las posibilidades de traducción de גִּבּוֹרֵי הֶחָיִל, el español debe conservar una nota equivalente, especialmente porque la formulación española elegida también implica seleccionar entre varias opciones viables.
  - severity: low
    issue: Puntuación final no ajustada a la convención española
    rationale: En español, el punto final de una oración entrecomillada que cierra el enunciado suele colocarse antes de la comilla de cierre.
  revised_spanish_text: 'Y Yahvé dijo a Josué: «Mira, he entregado en tu mano a Jericó, junto con su rey y los poderosos guerreros[a]»'
  revised_footnotes:
  - marker: a
    text: O 'los valientes guerreros' o 'los guerreros valerosos'. La frase hebrea combina las ideas de fuerza y valor militar.
    reason: lexical_alternative
  revision_rationale: Se mantiene la traducción general del borrador porque es fiel y natural, pero se ajusta גִּבּוֹרֵי הֶחָיִל a 'los poderosos guerreros' para reflejar mejor la doble carga semántica de fuerza y capacidad militar. También se añade la nota léxica ya documentada en el POB inglés y se normaliza la puntuación/comillas al uso español.
