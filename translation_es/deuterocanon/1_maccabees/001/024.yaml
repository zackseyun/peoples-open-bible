translation:
  language: es
  text: Y después de tomarlo todo, se fue a su propia tierra. Y cometieron asesinato[a], y hablaron con gran arrogancia[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «matanza» o «derramamiento de sangre»; el griego denota matar con fuerte carga moral.
    reason: lexical_alternative
  - marker: b
    text: O «gran soberbia» o «gran altivez». El griego usa una frase nominal, literalmente «hablaron gran arrogancia».
    reason: lexical_alternative
lexical_decisions:
- source_word: λαβὼν πάντα
  english_pob_choice: after taking everything
  chosen_spanish: después de tomarlo todo
  alternatives_spanish:
  - habiendo tomado todo
  - después de haber tomado todo
  lexicon: LSJ
  rationale: El participio aoristo antecede al verbo principal; en español, «después de tomarlo todo» expresa la acción completada antes de la partida sin sonar mecánico.
- source_word: ἀπῆλθεν
  english_pob_choice: went away
  chosen_spanish: se fue
  alternatives_spanish:
  - partió
  - se marchó
  lexicon: LSJ
  rationale: El verbo indica salida o partida; «se fue» es natural en español y conserva el movimiento narrativo.
- source_word: εἰς τὴν γῆν αὐτοῦ
  english_pob_choice: to his own land
  chosen_spanish: a su propia tierra
  alternatives_spanish:
  - a su tierra
  - a su país
  lexicon: LSJ
  rationale: γῆ puede significar tierra, territorio o país; «su propia tierra» mantiene el valor posesivo y la referencia territorial sin forzar un término moderno más estrecho.
- source_word: ἐποίησαν φονοκτονίαν
  english_pob_choice: they committed murder
  chosen_spanish: cometieron homicidio
  alternatives_spanish:
  - cometieron asesinato
  - cometieron sangre derramada
  - hicieron matanza
  lexicon: LSJ
  rationale: El compuesto griego apunta a matar con fuerte carga moral. En español, «homicidio» preserva la seriedad del acto sin imponer de forma absoluta el matiz técnico-jurídico de «asesinato»; «cometieron» reproduce el valor del verbo con un sustantivo de culpa.
- source_word: ἐλάλησαν
  english_pob_choice: spoke
  chosen_spanish: hablaron
  alternatives_spanish:
  - dijeron
  - pronunciaron
  lexicon: LSJ
  rationale: Es un verbo de habla directo y sobrio; «hablaron» conserva la simplicidad del griego.
- source_word: ὑπερηφανίαν μεγάλην
  english_pob_choice: great arrogance
  chosen_spanish: con gran arrogancia
  alternatives_spanish:
  - con gran soberbia
  - con gran orgullo
  - con gran altivez
  lexicon: LSJ
  rationale: La frase nominal griega expresa arrogancia u orgullo desmedido; en español, una construcción adverbial («con gran arrogancia») suena natural y conserva la fuerza moral del juicio narrativo.
theological_decisions:
- issue: Force moral of φονοκτονίαν
  english_pob_reading: murder
  chosen_spanish_reading: homicidio
  alternative_spanish_readings:
  - asesinato
  - matanza
  - sangre derramada
  rationale: El texto denuncia un acto de matar con peso moral. «Homicidio» permite mantener la gravedad del término sin cerrar la posible amplitud semántica a un solo equivalente, mientras que «asesinato» sería más acusatorio pero más específico; la alternativa «matanza» y «sangre derramada» son más amplias pero menos precisas.
  doctrine_reference: Primacía del idioma original y conservación del peso moral del texto sin sobreinterpretación.
translation_notes:
  revision_awareness: El contexto auditado en inglés no requirió cambios sustanciales; se mantuvo la lectura de dos cláusulas narrativas y las notas alternativas sobre el valor moral de φονοκτονίαν y la frase de arrogancia.
  spanish_consistency_notes:
  - Se usó «Yahvé» solo cuando el texto lo requiera explícitamente; aquí no aparece.
  - Se prefirió un español moderno y publicable, manteniendo la estructura narrativa breve del original.
  - «Tierra» se conservó frente a opciones más técnicas como «país» para no estrechar γῆ innecesariamente.
