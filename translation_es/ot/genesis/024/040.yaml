translation:
  language: es
  text: 'Y me dijo: “Yahvé, delante de quien he andado, enviará su ángel contigo y hará prosperar tu camino[a], y tomarás esposa para mi hijo de mi clan[b] y de la casa de mi padre”.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «prosperará tu camino»; el hebreo permite la idea de éxito o prosperidad sobre el camino emprendido.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «de mi familia»; מִשְׁפָּחָה puede designar un grupo de parentesco más amplio que la familia inmediata.'
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: Se conserva el nombre propio del pacto, siguiendo el criterio del proyecto para el Tetragrámaton. 'Yahvé' mantiene la referencia personal del texto hebreo sin sustituirla por un título.
- source_word: הִתְהַלַּכְתִּי לְפָנָיו
  english_pob_choice: I have walked before
  chosen_spanish: he andado delante de él
  alternatives_spanish:
  - he vivido delante de él
  - he caminado en su presencia
  - he andado en su presencia
  lexicon: HALOT
  rationale: '''Andar delante de'' conserva el modismo bíblico de conducta y vida responsable ante Dios, sin expandirlo más allá del sentido comprobable del hebreo.'
- source_word: מַלְאָכוֹ
  english_pob_choice: his angel
  chosen_spanish: su ángel
  alternatives_spanish:
  - su mensajero
  lexicon: HALOT
  rationale: En este contexto el enviado de Yahvé se entiende naturalmente como un ser celestial; 'ángel' reproduce esa especificidad mejor que la opción más general 'mensajero'.
- source_word: וְהִצְלִיחַ דַּרְכֶּךָ
  english_pob_choice: and make your journey successful
  chosen_spanish: hará prosperar tu camino
  alternatives_spanish:
  - y prosperará tu camino
  - y dará éxito a tu camino
  lexicon: HALOT
  rationale: El hiphil de צלח expresa causar éxito o prosperidad. 'Hará prosperar tu camino' mantiene el valor causativo y también deja visible la imagen hebrea de 'camino'.
- source_word: וְלָקַחְתָּ אִשָּׁה
  english_pob_choice: and you will take a wife
  chosen_spanish: tomarás esposa
  alternatives_spanish:
  - tomarás una mujer
  - te casarás
  lexicon: HALOT
  rationale: Se conserva el idiomático 'tomar esposa', pero en español se ajusta a una forma natural y digna. 'Esposa' aquí evita una lectura genérica de 'mujer' que sería menos clara.
- source_word: לִבְנִי
  english_pob_choice: for my son
  chosen_spanish: para mi hijo
  alternatives_spanish:
  - para mi hijo varón
  lexicon: HALOT
  rationale: בן significa literalmente 'hijo'; en este contexto la referencia es inequívoca y no requiere una amplificación.
- source_word: מִמִּשְׁפַּחְתִּי
  english_pob_choice: from my clan
  chosen_spanish: de mi clan
  alternatives_spanish:
  - de mi familia
  - de mi parentela
  - de mi linaje
  lexicon: HALOT
  rationale: '''Clan'' refleja el alcance más amplio de מִשְׁפָּחָה mejor que ''familia'' en español moderno. Mantiene la distinción entre el grupo de parentesco y la casa paterna.'
- source_word: וּמִבֵּית אָבִי
  english_pob_choice: and from my father’s house
  chosen_spanish: y de la casa de mi padre
  alternatives_spanish:
  - y de la casa paterna
  - y de la casa de mi padre
  lexicon: HALOT
  rationale: Se conserva la expresión hebrea tradicional 'casa de mi padre', clara y fiel al trasfondo patriarcal del pasaje.
theological_decisions:
- issue: Cómo presentar el nombre divino יהוה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Jehová
  rationale: El texto hebreo usa el nombre propio del pacto, no un título. 'Yahvé' sigue el criterio del proyecto y evita enmascarar el nombre divino.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יהוה / YHWH → Yahvé'
- issue: El sentido de 'delante de quien he andado'
  english_pob_reading: retain the covenantal idiom without over-interpreting it
  chosen_spanish_reading: he andado delante de él
  alternative_spanish_readings:
  - he vivido fielmente delante de él
  - he andado en su presencia
  rationale: La frase conserva el tono de vida fiel y responsable ante Dios sin convertirla en una paráfrasis interpretativa. Se preserva la tensión idiomática del hebreo.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #3'
translation_notes:
  revision_awareness: 'Esta versión coincide con la última revisión auditada: el pasaje fue revisado y se concluyó que no hacía falta cambiar la solución inglesa base; la traducción española sigue esa misma línea, preservando el nombre divino, el modismo de caminar delante de Yahvé y la distinción entre clan y casa paterna.'
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' conforme al criterio del proyecto para el Tetragrámaton.
  - '''Ángel'' se usa con valor específico, coherente con el contexto narrativo y con la decisión inglesa auditada.'
  - '''Clan'' distingue correctamente מִשְׁפָּחָה de ''casa de mi padre''.'
  - La puntuación y el registro buscan ser bíblicos pero naturales en español contemporáneo.
  - Las notas a pie de página usan marcadores únicos y se anclan solo en los puntos donde hay alternativa léxica real.
