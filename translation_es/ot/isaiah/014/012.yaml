- from: ¡Cómo has caído del cielo[a], resplandeciente, hijo del alba! Has sido derribado a la tierra, tú que sometías a las naciones.
  to: ¡Cómo has caído del cielo, resplandeciente[a], hijo del alba! Has sido abatido a la tierra, tú que sometías a las naciones.
  rationale: Se corrige el anclaje de la nota para que corresponda a הֵילֵל y no a «cielo», y se ajusta «derribado» a «abatido» para acercarse mejor a la imagen de humillación violenta expresada por נִגְדַּעְתָּ, manteniendo un español natural y poético.
