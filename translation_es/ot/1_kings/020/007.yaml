    reason: lexical_alternative
  - marker: b
    text: Literalmente, «no retuve de él», con el objeto entendido por la lista anterior; en español se explicita con pronombre plural.
    reason: lexical_alternative
  revision_rationale: Se ajustó «de la tierra» a «del país» para una expresión político-social más natural en español; «me envió por» a «envió a pedirme» para mayor legibilidad sin perder el sentido de la demanda; y «no se lo negué» a «no se los retuve» para reflejar mejor מָנַע y recuperar el objeto plural implícito del hebreo y del inglés auditado. También se movió la nota [a] al verbo relevante («dijo[a]») para corresponder a la alternativa léxica sobre «busca el mal», como exige el sistema de anclaje.
