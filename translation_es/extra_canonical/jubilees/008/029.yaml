lexical_decisions:
- source_word: sons
  english_pob_choice: sons
  chosen_spanish: hijos
  alternatives_spanish:
  - descendientes
  - hijos varones
  lexicon: son / hijo
  rationale: ‘Hijos’ reproduce de forma natural y fiel el lenguaje genealógico del pasaje; ‘descendientes’ sería más interpretativo y diluye la relación directa de filiación que el texto presenta.
- source_word: Japheth
  english_pob_choice: Japheth
  chosen_spanish: Jafet
  alternatives_spanish:
  - Jafet
  lexicon: proper name
  rationale: Se conserva el nombre bíblico en su forma española común y reconocible, adecuada para lectura eclesial en español.
- source_word: Gomer, Magog, Madai, Javan, Tubal, Meshech, Tiras
  english_pob_choice: proper names in list form
  chosen_spanish: Gomer, Magog, Madai, Javán, Tubal, Mesec y Tiras
  alternatives_spanish:
  - Gómer
  - Mesec
  - Yaván
  lexicon: proper names
  rationale: Los nombres se transliteran según el uso bíblico español más establecido. ‘Javán’ refleja la forma tradicional del nombre bíblico; ‘Mesec’ evita una grafía menos común. La lista se mantiene sin expansión ni armonización adicional para respetar la secuencia del texto.
theological_decisions:
- issue: Genealogical list without doctrinal expansion
  english_pob_reading: The verse is a plain list of Japheth’s sons, with no added theological commentary.
  chosen_spanish_reading: El versículo se presenta como una lista genealógica sobria, sin añadir interpretación.
  alternative_spanish_readings:
  - Los descendientes de Jafet...
  - Los hijos de Jafet fueron...
  rationale: El texto fuente solo enumera nombres. La traducción debe conservar ese carácter enumerativo y no introducir verbos o explicaciones que no estén sustentados por el pasaje.
  doctrine_reference: Génesis 10:2; 1 Crónicas 1:5
translation_notes:
  revision_awareness: La revisión inglesa más reciente solo ajustó la puntuación de la lista para mayor legibilidad; no alteró el contenido ni la secuencia de nombres. La versión española refleja esa misma lectura final con puntuación natural y lista cerrada con ‘y’.
  spanish_consistency_notes:
  - Se usa ‘Jafet’ y no una transliteración extranjera innecesaria.
  - Se mantiene la estructura nominal del original, sin convertir la lista en una paráfrasis.
  - La puntuación española sigue la secuencia final auditada del texto inglés, con comas internas y conjunción final.
