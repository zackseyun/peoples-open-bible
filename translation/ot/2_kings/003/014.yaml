id: 2KI.3.14
reference: 2 Kings 3:14
source:
  edition: WLC
  text: וַ/יֹּ֣אמֶר אֱלִישָׁ֗ע חַי יְהוָ֤ה צְבָאוֹת֙ אֲשֶׁ֣ר עָמַ֣דְתִּי לְ/פָנָ֔י/ו כִּ֗י לוּלֵ֛י פְּנֵ֛י יְהוֹשָׁפָ֥ט מֶֽלֶךְ יְהוּדָ֖ה אֲנִ֣י נֹשֵׂ֑א אִם אַבִּ֥יט אֵלֶ֖י/ךָ וְ/אִם אֶרְאֶֽ/ךָּ־־־־׃
translation:
  text: And Elisha said[a], "As Yahweh of hosts lives, before whom I stand, were it not that I regard the presence of Jehoshaphat king of Judah[b], I would not look at you or see you."
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew ''before whose face I stood''; the idiom can also imply prophetic service: ''whom I serve.'''
    reason: lexical_alternative
  - marker: b
    text: Or 'if it were not for Jehoshaphat king of Judah, whom I regard.' The Hebrew uses an idiom involving 'lifting up the face,' meaning to show favor or regard.
    reason: lexical_alternative
lexical_decisions:
- source_word: חַי יְהוָה צְבָאוֹת
  chosen: As Yahweh of hosts lives
  alternatives:
  - As surely as the LORD of hosts lives
  - By the life of the LORD of hosts
  lexicon: HALOT
  rationale: This is the standard Hebrew oath formula. 'As ... lives' preserves the formal force of the oath while remaining natural English. יְהוָה follows the doctrinal default 'the LORD.' צְבָאוֹת is rendered 'hosts,' the conventional and semantically broad term for heavenly armies/forces.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: צְבָאוֹת
  chosen: hosts
  alternatives:
  - armies
  lexicon: HALOT
  rationale: '''Hosts'' preserves the title''s established sense without over-specifying whether the reference is heavenly armies, angelic hosts, or all divine forces.'
- source_word: אֲשֶׁר עָמַדְתִּי לְפָנָיו
  chosen: before whom I stand
  alternatives:
  - whom I serve
  - in whose presence I stand
  lexicon: HALOT
  rationale: The idiom literally speaks of standing before someone and commonly denotes prophetic service in God's presence. 'Before whom I stand' preserves both the literal image and the vocational nuance without paraphrasing to 'serve' in the main text.
- source_word: לוּלֵי
  chosen: if ... not
  alternatives:
  - unless
  - were it not for
  lexicon: HALOT
  rationale: In this oath context לוּלֵי introduces the exception that explains Elisha's otherwise negative response. Rendering it with 'if I did not...' communicates the conditional force smoothly in English.
- source_word: פְּנֵי יְהוֹשָׁפָט
  lemma: פָּנִים
  chosen: the presence of Jehoshaphat
  alternatives:
  - Jehoshaphat himself
  - the face of Jehoshaphat
  lexicon: HALOT
  rationale: פָּנִים literally means 'face,' but in this idiom it refers to the person's presence. 'The presence of Jehoshaphat' best captures the sense in context.
- source_word: אֲנִי נֹשֵׂא
  chosen: I did not regard
  alternatives:
  - I show regard for
  - I lift up regard for
  - I respect
  lexicon: HALOT
  rationale: נָשָׂא with פָּנִים forms the idiom 'to lift up the face,' meaning to show favor or regard. Since the clause is elliptical and followed by the oath consequence, English requires smoothing. 'If I did not regard the presence of Jehoshaphat' captures the idiomatic sense driving Elisha's willingness to respond.
- source_word: אִם אַבִּיט אֵלֶיךָ
  chosen: I would not look at you
  alternatives:
  - I would not pay attention to you
  - I would not glance at you
  lexicon: HALOT
  rationale: 'In this oath construction אִם introduces the apodosis with an implied negation: ''surely I would not look at you.'' The translation makes the negative explicit for clear English.'
- source_word: וְאִם אֶרְאֶךָּ
  chosen: nor would I see you
  alternatives:
  - nor would I take notice of you
  - nor would I regard you
  lexicon: HALOT
  rationale: The paired verbs intensify Elisha's refusal. Keeping both 'look at' and 'see' preserves the Hebrew parallelism rather than collapsing them into one English verb.
- source_word: יְהוֹשָׁפָט
  chosen: Jehoshaphat
  rationale: Personal names are transliterated by standard convention per translation philosophy.
- source_word: יְהוּדָה
  chosen: Judah
  rationale: Standard transliteration of the kingdom name.
