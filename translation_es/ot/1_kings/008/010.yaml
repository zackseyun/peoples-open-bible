translation:
  language: es
  text: Y cuando los sacerdotes salieron del lugar santo[a], la nube llenó la casa de Yahvé.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «del santuario» o «del Lugar Santo».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְהִי
  english_pob_choice: And when
  chosen_spanish: Y cuando
  alternatives_spanish:
  - Y sucedió que cuando
  - Entonces, cuando
  lexicon: HALOT
  rationale: La forma narrativa con waw consecutiva introduce el siguiente evento; en español, «Y cuando» reproduce la transición temporal de manera natural sin añadir una paráfrasis innecesaria.
- source_word: בְּצֵאת
  english_pob_choice: came out
  chosen_spanish: salieron
  alternatives_spanish:
  - salían
  - hubieron salido
  lexicon: HALOT
  rationale: 'El infinitivo constructo con בְ marca temporal: «cuando salieron». «Salieron» expresa con claridad la acción de salida de los sacerdotes sin forzar un giro más literal pero menos idiomático.'
- source_word: הַכֹּהֲנִים
  english_pob_choice: the priests
  chosen_spanish: los sacerdotes
  alternatives_spanish:
  - los sacerdotes ministros
  lexicon: HALOT
  rationale: כֹּהֲנִים se refiere de manera directa a los sacerdotes del culto; «sacerdotes» es la correspondencia natural y transparente en español.
- source_word: מִן־הַקֹּדֶשׁ
  english_pob_choice: from the holy place
  chosen_spanish: del lugar santo
  alternatives_spanish:
  - del santuario
  - del Lugar Santo
  lexicon: HALOT
  rationale: El hebreo habla del espacio sagrado del que salen los sacerdotes. «Lugar santo» conserva la referencia espacial y la carga cultual; se mantiene en minúsculas por tratarse aquí de una designación descriptiva, no de un nombre técnico capitalizado.
- source_word: וְהֶעָנָן
  english_pob_choice: the cloud
  chosen_spanish: la nube
  alternatives_spanish:
  - y la nube
  lexicon: HALOT
  rationale: El sustantivo definido עָנָן se traduce de forma directa por «nube». El enlace con el verbo siguiente hace natural omitir la conjunción explícita en español, como en el audit trail inglés.
- source_word: מָלֵא
  english_pob_choice: filled
  chosen_spanish: llenó
  alternatives_spanish:
  - había llenado
  - estaba llenando
  lexicon: HALOT
  rationale: El perfecto qal narra una acción culminada en pasado; «llenó» conserva la secuencia narrativa simple y directa.
- source_word: בֵּית יְהוָה
  english_pob_choice: the house of Yahweh
  chosen_spanish: la casa de Yahvé
  alternatives_spanish:
  - el templo de Yahvé
  - la casa de Yahvé
  lexicon: HALOT
  rationale: בֵּית יְהוָה es literalmente «casa de Yahvé». Se conserva «casa» para mantener la imagen concreta del templo y se usa «Yahvé» según la terminología proyectual para el nombre divino.
theological_decisions:
- issue: Representación del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - SEÑOR
  rationale: El texto hebreo contiene el Tetragrámaton. En la línea terminológica del proyecto, se expresa directamente como «Yahvé» para no ocultar el nombre del pacto ni sustituirlo por un título genérico.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Sentido de מִן־הַקֹּדֶשׁ
  english_pob_reading: from the holy place / from the sanctuary / from the Holy Place
  chosen_spanish_reading: del lugar santo
  alternative_spanish_readings:
  - del santuario
  - del Lugar Santo
  rationale: La expresión hebrea designa el espacio sagrado de salida de los sacerdotes. «Lugar santo» comunica el valor cultual sin imponer más especificidad de la que el hebreo exige; se deja constancia de las alternativas legítimas.
  doctrine_reference: 'DOCTRINE.md: Terminología cultual y nombres de espacios sagrados'
translation_notes:
  revision_awareness: El audit trail inglés confirma alta concordancia y sin cambios en la revisión más reciente; por ello se mantiene una solución española estable, con un solo punto de nota léxica para la ambigüedad de הַקֹּדֶשׁ.
  spanish_consistency_notes:
  - Se usa «Yahvé» de forma consistente para יְהוָה.
  - Se preserva la imagen concreta de «casa» en lugar de sustituirla por «templo».
  - La nota léxica se ancla en «lugar santo» para reflejar las alternativas documentadas del hebreo.
