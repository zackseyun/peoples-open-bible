translation:
  language: es
  text: Pues una copa está en la mano de Yahvé, y el vino espuma, lleno de vino mezclado con especias[a]; él vierte de ella[c], y ciertamente todos los impíos de la tierra apurarán sus posos[b] y beberán.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «lleno de mezcla» o «completamente mezclado». El hebreo se refiere a vino preparado por mezcla, posiblemente con especias.
    reason: lexical_alternative
  - marker: b
    text: «Sus posos» se refiere al sedimento o a las heces del vino en el fondo de la copa; la imagen es que los impíos deben beber la copa hasta la última gota.
    reason: cultural_note
  - marker: c
    text: 'También puede traducirse: «Pues una copa está en la mano de Yahvé, y el vino espuma, lleno de vino mezclado con especias; él vierte de ella».'
    reason: previous_rendering
lexical_decisions:
- source_word: כִּי
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  lexicon: HALOT
  rationale: Introduce la relación explicativa con el verso anterior. «Porque» conserva el sentido de base/explicación de forma natural en español.
- source_word: כּוֹס
  english_pob_choice: cup
  chosen_spanish: copa
  alternatives_spanish:
  - cáliz
  - vaso
  lexicon: HALOT
  rationale: «Copa» reproduce bien la imagen poética del recipiente de juicio y es claro en español actual; «cáliz» puede sonar más litúrgico y menos neutro.
- source_word: בְּיַד יְהוָה
  english_pob_choice: in the hand of Yahweh
  chosen_spanish: en la mano de Yahvé
  alternatives_spanish:
  - en la mano de Yahveh
  - en la mano del SEÑOR
  lexicon: HALOT
  rationale: Se mantiene el hebraísmo concreto de posesión/control. Se usa «Yahvé» según el estándar del proyecto para el nombre divino.
- source_word: יַיִן
  english_pob_choice: wine
  chosen_spanish: vino
  alternatives_spanish:
  - mosto
  lexicon: HALOT
  rationale: Equivalente directo y adecuado al contexto poético.
- source_word: חָמַר
  english_pob_choice: foams
  chosen_spanish: espuma
  alternatives_spanish:
  - fermenta
  - hierve
  - burbujea
  lexicon: HALOT
  rationale: El verbo describe vino activo/efervescente. «Espuma» comunica esa vividez sin perder naturalidad en español.
- source_word: מָלֵא מֶסֶךְ
  english_pob_choice: full of mixed spices
  chosen_spanish: lleno de mezcla de especias
  alternatives_spanish:
  - lleno de mezcla
  - lleno de vino mezclado
  - lleno de especias mezcladas
  lexicon: HALOT
  rationale: La expresión hebrea apunta a vino preparado/mezclado; en español, «mezcla de especias» conserva la idea de preparación aromática sin afirmar más de lo que el texto obliga.
- source_word: וַיַּגֵּר מִזֶּה
  english_pob_choice: he pours from it
  chosen_spanish: él derrama de ella
  alternatives_spanish:
  - derramando de ella
  - él vierte de ella
  - él lo derrama
  lexicon: HALOT
  rationale: «Derrama» conserva el gesto de vaciar el contenido de la copa. Se añade «de ella» para reflejar מִזֶּה y mantener el antecedente femenino de «copa».
- source_word: אַךְ
  english_pob_choice: surely
  chosen_spanish: ciertamente
  alternatives_spanish:
  - solo
  - sin duda
  - verdaderamente
  lexicon: HALOT
  rationale: Aquí funciona como refuerzo enfático de certeza. «Ciertamente» expresa ese matiz sin convertirlo en restricción.
- source_word: שְׁמָרֶיהָ
  english_pob_choice: its dregs
  chosen_spanish: el sedimento
  alternatives_spanish:
  - las heces
  - los posos
  - los sedimentos
  lexicon: HALOT
  rationale: «Sedimento» comunica la imagen del residuo del vino de manera clara y digna; en español «dregs» suele explicarse así. Se evita «heces» por posible ambigüedad o aspereza.
- source_word: יִמְצוּ
  english_pob_choice: will drain
  chosen_spanish: drenarán
  alternatives_spanish:
  - chuparán
  - exprimirán
  - sacarán
  lexicon: HALOT
  rationale: El verbo implica extraer hasta el fondo. «Drenarán» transmite la acción total en español moderno; en el contexto de la copa puede entenderse con el objeto implícito.
- source_word: יִשְׁתּוּ
  english_pob_choice: and drink
  chosen_spanish: y beberán
  alternatives_spanish:
  - y beberán de ella
  - y la beberán
  lexicon: HALOT
  rationale: Se conserva la continuación del acto con un verbo simple y natural; el objeto se sobreentiende por el contexto.
- source_word: כֹּל רִשְׁעֵי אָרֶץ
  english_pob_choice: all the wicked of the earth
  chosen_spanish: todos los impíos de la tierra
  alternatives_spanish:
  - todos los malvados de la tierra
  - todos los perversos de la tierra
  lexicon: HALOT
  rationale: «Impíos» mantiene el registro bíblico y el valor moral/judicial de רִשְׁעֵי. «De la tierra» conserva el alcance universal del hebreo אָרֶץ.
theological_decisions:
- issue: Nombre divino
  english_pob_reading: the LORD / Yahweh in the source context
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Jehová
  rationale: El proyecto español usa «Yahvé» para YHWH, preservando la referencia pactual sin ocultarla tras un sustituto tipográfico.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → Yahvé'
- issue: Imagen de la copa
  english_pob_reading: Retain the metaphor of the cup of potent wine as an image of divine judgment without making the theological implication more explicit in the main text.
  chosen_spanish_reading: Mantener la metáfora de la copa y el vino espumante, sin añadir «ira» o «castigo» en el texto principal.
  alternative_spanish_readings:
  - copa de la ira
  - copa del juicio
  - cáliz del castigo
  rationale: El hebreo presenta la imagen; el contexto la orienta hacia juicio divino, pero el versículo no usa un rótulo interpretativo explícito. La traducción conserva esa tensión.
  doctrine_reference: DOCTRINE.md Translation philosophy §§1, 3
translation_notes:
  revision_awareness: 'La redacción española sigue la revisión más reciente del POB inglés al unir las primeras cláusulas con una coordinación fluida y mantener la progresión: copa en la mano de Yahvé, vino espumante y preparado, derramamiento parcial y consumo completo por los impíos. Se ha evitado añadir una glosa interpretativa en el cuerpo principal, pero se conserva la nota sobre el sedimento para reflejar la imagen final del hebreo.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» de forma consistente para יְהוָה.
  - Se preserva la metáfora de la copa sin convertirla en paráfrasis doctrinal.
  - «Impíos» y «tierra» mantienen el registro bíblico y el alcance universal del hebreo.
  - 'La secuencia verbal intenta reflejar el paralelismo del hebreo: está / espuma / derrama / beberán.'
