translation:
  language: es
  text: 'Entonces un joven[a] corrió y le informó a Moisés, y dijo: «Eldad y Medad están profetizando en el campamento».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «el joven corrió y le informó a Moisés». El artículo hebreo puede reflejarse más formalmente con «el joven», y el verbo de reporte también puede traducirse «reportó» o «informó».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּרָץ
  english_pob_choice: ran
  chosen_spanish: corrió
  alternatives_spanish:
  - se apresuró
  - se lanzó a correr
  lexicon: HALOT
  rationale: El verbo indica correr de manera directa; «corrió» conserva la vivacidad narrativa sin añadir matiz de urgencia que el hebreo no exige por sí mismo.
- source_word: הַנַּעַר
  english_pob_choice: a young man
  chosen_spanish: un joven
  alternatives_spanish:
  - el joven
  - un muchacho
  - un muchacho joven
  lexicon: HALOT
  rationale: נַעַר puede abarcar varios rangos de edad y estatus. En español, «un joven» comunica bien un varón joven no identificado y evita el tono demasiado infantil de «muchacho».
- source_word: וַיַּגֵּד
  english_pob_choice: told
  chosen_spanish: se lo informó
  alternatives_spanish:
  - le dijo
  - se lo reportó
  - le comunicó
  lexicon: HALOT
  rationale: הגִּיד en hifil puede significar contar, informar o reportar. «Se lo informó» refleja mejor el acto de comunicar una noticia a Moisés y evita la redundancia de repetir el contenido inmediatamente.
- source_word: לְמֹשֶׁה
  english_pob_choice: Moses
  chosen_spanish: a Moisés
  alternatives_spanish:
  - a Moisés
  lexicon: HALOT
  rationale: Nombre propio transliterado de forma estándar en español bíblico.
- source_word: וַיֹּאמַר
  english_pob_choice: and said
  chosen_spanish: y dijo
  alternatives_spanish:
  - y añadió
  lexicon: HALOT
  rationale: La fórmula narrativa normal en español para introducir discurso directo.
- source_word: מִתְנַבְּאִים
  english_pob_choice: are prophesying
  chosen_spanish: están profetizando
  alternatives_spanish:
  - profetizan
  - están hablando proféticamente
  lexicon: HALOT
  rationale: El participio hitpael expresa actividad profética en curso. «Están profetizando» preserva ese aspecto progresivo con naturalidad en español.
- source_word: בַּמַּחֲנֶה
  english_pob_choice: in the camp
  chosen_spanish: en el campamento
  alternatives_spanish:
  - en el campamento de Israel
  - dentro del campamento
  lexicon: HALOT
  rationale: מַחֲנֶה se refiere al campamento de Israel en el desierto. «Campamento» es el equivalente idiomático claro en español contemporáneo.
translation_notes:
  revision_awareness: El texto sigue de cerca el hebreo WLC y coincide sustancialmente con la línea inglesa auditada, ajustando solo la fluidez natural del español y conservando la fuerza narrativa y el sentido de reporte.
  spanish_consistency_notes:
  - Se mantiene «Moisés» como nombre propio estándar.
  - Se usa «profetizando» para preservar el participio hebreo en aspecto progresivo.
  - Se prefiere «campamento» sobre «campa» o perífrasis, por claridad y fidelidad al contexto del desierto.
  - La nota al pie marca la alternativa de artículo definido del hebreo sin imponerla en el texto principal.
