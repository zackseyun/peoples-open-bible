id: 3MA.5.11
reference: 3 Maccabees 5:11
source:
  edition: lxx-swete-1909
  text: τὸ δὲ ἀπʼ αἰῶνος κτίσμα χρόνου καλὸν ἐν νυκτὶ καὶ ἡμέρᾳ ἐπιβαλλόμενον ὑπὸ τοῦ χαριζομένου πᾶσιν, οἷς ἂν αὐτὸς θελήσῃ, ὕπνον μέρος ἀπέστειλεν εἰς τὸν βασιλέα·
  language: Greek
  pages:
  - 742
  confidence: high
  validation: agree
translation:
  text: But the age-old ordinance of time[a], beautifully alternating in night and day by the One who grants sleep to all, to whomever he himself wills, sent a portion of sleep upon the king[b];
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'from of old creation of time'; the Greek phrase is poetic and compact, describing the long-established created order of time expressed in night and day.
    reason: lexical_alternative
  - marker: b
    text: Literally 'sent a portion of sleep into/to the king.'
    reason: lexical_alternative
lexical_decisions:
- source_word: τὸ ... κτίσμα χρόνου
  chosen: the ... creation of time
  alternatives:
  - the creature of time
  - the ordinance/order of time
  lexicon: LSJ
  rationale: κτίσμα can denote something created or a created thing. In this poetic context, joined with χρόνου and then explained by night and day, it refers to the created order/process of time rather than a living creature. 'Creation of time' preserves the imagery without over-interpreting it as merely 'course' or 'order'.
- source_word: ἀπʼ αἰῶνος
  chosen: age-old
  alternatives:
  - from eternity
  - from of old
  - ancient
  lexicon: LSJ
  rationale: The phrase marks long duration or antiquity. 'Age-old' fits idiomatic English and avoids the stronger metaphysical claim 'from eternity,' which may overstate the expression here.
- source_word: καλὸν
  chosen: beautiful
  alternatives:
  - good
  - fair
  - noble
  lexicon: LSJ
  rationale: καλός can mean good, beautiful, or fitting. Here, describing the created rhythm of time in night and day, 'beautiful' best captures the aesthetic-poetic force.
- source_word: ἐν νυκτὶ καὶ ἡμέρᾳ ἐπιβαλλόμενον
  chosen: as it comes on in night and day
  alternatives:
  - falling upon by night and day
  - coming over in night and day
  - alternating in night and day
  lexicon: LSJ
  rationale: ἐπιβαλλόμενον literally suggests being laid upon/coming on. Because the subject is the time-creation expressed through night and day, an idiomatic rendering is needed. 'As it comes on in night and day' preserves the imagery of recurring succession without forcing a technical expression.
- source_word: ὑπὸ τοῦ χαριζομένου πᾶσιν
  chosen: from the One who grants sleep to all
  alternatives:
  - by the one who graciously gives to all
  - from him who bestows on all
  lexicon: LSJ
  rationale: χαρίζομαι emphasizes gracious giving/bestowal. The object 'sleep' is implied by context and made explicit in English for clarity, since the clause leads directly to ὕπνον. Capitalizing 'One' reflects reference to God in context without adding a title absent from the Greek.
- source_word: οἷς ἂν αὐτὸς θελήσῃ
  chosen: to whomever he himself wills
  alternatives:
  - to those whom he wills
  - to whoever he wishes
  lexicon: LSJ
  rationale: The construction expresses divine discretion. 'He himself' preserves αὐτός for emphasis.
- source_word: ὕπνον μέρος
  chosen: a portion of sleep
  alternatives:
  - some sleep
  - a measure of sleep
  lexicon: LSJ
  rationale: μέρος literally means 'part' or 'portion.' 'A portion of sleep' keeps the concrete phrasing of the Greek while remaining understandable.
- source_word: ἀπέστειλεν εἰς τὸν βασιλέα
  chosen: sent ... upon the king
  alternatives:
  - sent ... to the king
  - brought ... over the king
  lexicon: LSJ
  rationale: Although εἰς is literally 'into/to,' with sleep in English the natural idiom is 'upon the king.' This is a modest dynamic adjustment for readability while preserving the action of divine sending.
