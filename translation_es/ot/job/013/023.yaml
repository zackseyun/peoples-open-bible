translation:
  language: es
  text: ¿Cuántas son mis iniquidades y pecados[a]? Hazme saber mi transgresión y mi pecado[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «¿Qué tan grandes son mis iniquidades y pecados?». El interrogativo hebreo puede preguntar por extensión además de número, aunque el texto principal conserva el sentido cuantitativo más directo.'
    reason: lexical_alternative
  - marker: b
    text: «Transgresión» traduce פֶּשַׁע, que también puede llevar el sentido de «rebeldía».
    reason: lexical_alternative
lexical_decisions:
- source_word: כַּמָּה לִי
  english_pob_choice: How many are my
  chosen_spanish: ¿Cuántas son mis
  alternatives_spanish:
  - ¿Qué tan grandes son mis
  - ¿Cuántos son mis
  lexicon: HALOT
  rationale: La pregunta hebrea con לִי puede expresar cantidad o extensión. En español, «¿Cuántas son mis…?» conserva esa fuerza interrogativa directa y encaja bien con los sustantivos plurales siguientes. «¿Qué tan grandes son mis…?» transmite una posible lectura de intensidad, pero la redacción principal mantiene la opción cuantitativa más inmediata, como en el audit trail inglés.
- source_word: עֲוֹנוֹת
  english_pob_choice: iniquities
  chosen_spanish: iniquidades
  alternatives_spanish:
  - culpas
  - maldades
  lexicon: HALOT
  rationale: «Iniquidades» preserva el peso moral de עָוֹן y mantiene la distinción lexical frente a «pecados». «Culpas» es posible, pero desplaza el foco hacia el estado de culpabilidad más que hacia los actos/condiciones de maldad. «Maldades» es más genérico y menos preciso.
- source_word: וְחַטָּאוֹת
  english_pob_choice: sins
  chosen_spanish: pecados
  alternatives_spanish:
  - ofensas
  lexicon: HALOT
  rationale: «Pecados» es la correspondencia más clara y natural para חַטָּאוֹת en plural, y conserva la distinción respecto de עֲוֹנוֹת sin tecnicismos innecesarios. «Ofensas» es posible, pero atenúa el campo semántico moral.
- source_word: פִּשְׁעִי
  english_pob_choice: my transgression
  chosen_spanish: mi transgresión
  alternatives_spanish:
  - mi rebelión
  - mi ofensa
  lexicon: HALOT
  rationale: פֶּשַׁע suele implicar una transgresión con matiz de ruptura deliberada. «Transgresión» es una forma sobria y fiel en español. «Rebelión» intensifica el matiz pero puede sobreespecificar; «ofensa» es más débil.
- source_word: וְחַטָּאתִי
  english_pob_choice: my sin
  chosen_spanish: mi pecado
  alternatives_spanish:
  - mi ofensa
  lexicon: HALOT
  rationale: El singular con sufijo se vierte naturalmente como «mi pecado», manteniendo la pareja conceptual con «mi transgresión». «Ofensa» sería menos exacta y menos transparente como término moral.
- source_word: הֹדִיעֵנִי
  english_pob_choice: Make ... known to me
  chosen_spanish: Hazme saber
  alternatives_spanish:
  - Muéstrame
  - Infórmame de
  lexicon: HALOT
  rationale: El hifil de ידע expresa causar a saber / hacer conocer. «Hazme saber» reproduce bien la fuerza causativa de manera natural en español. «Muéstrame» es más idiomático en algunos contextos, pero menos explícito semánticamente; «Infórmame de» suena más administrativo.
theological_decisions:
- issue: La tensión entre cantidad y magnitud en כַּמָּה
  english_pob_reading: How many are my iniquities and sins?
  chosen_spanish_reading: ¿Cuántas son mis iniquidades y pecados?
  alternative_spanish_readings:
  - ¿Qué tan grandes son mis iniquidades y pecados?
  - ¿Cuán grandes son mis iniquidades y pecados?
  rationale: La forma hebrea permite tanto cantidad como extensión. La redacción principal conserva la lectura cuantitativa más directa, tal como el texto base inglés, sin eliminar la posibilidad semántica alternativa, que se documenta en nota.
  doctrine_reference: Lexical ambiguity in Hebrew interrogatives; no doctrinal issue.
- issue: La distinción lexical entre עָוֹן, חַטָּאת, פֶּשַׁע
  english_pob_reading: iniquities / sins / transgression / sin
  chosen_spanish_reading: iniquidades / pecados / transgresión / pecado
  alternative_spanish_readings:
  - culpas / ofensas / rebelión
  rationale: Se conserva la diferenciación de los cuatro términos hebreos en español para no borrar matices morales y legales. «Transgresión» retiene el carácter de ruptura deliberada de פֶּשַׁע; «pecado» y «iniquidad» mantienen la repetición diferenciada del verso.
  doctrine_reference: Hebrew lexical semantics; moral culpability language in Job.
translation_notes:
  revision_awareness: El pasaje coincide con el audit trail inglés en lectura y decisiones léxicas principales; no se registraron revisiones aplicadas en la fuente inglesa, y el borrador español mantiene esa estabilidad. Se conservó la ambigüedad de כַּמָּה en nota y la distinción lexical de los términos de pecado sin ampliar el sentido.
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el hebreo o el contexto lo exigen explícitamente; este versículo no lo contiene.
  - Se mantiene «transgresión» para פֶּשַׁע, no «rebelión», por fidelidad al nivel de especificidad del verso.
  - «Hazme saber» conserva la fuerza causativa del hifil de ידע sin introducir un giro interpretativo.
  - La puntuación interrogativa y la coordinación reflejan la paralelía hebrea del verso.
