translation:
  language: es
  text: 'Cuando todos los jefes de las tropas[a], ellos y sus hombres, oyeron que el rey de Babilonia había nombrado a Gedalías, fueron a Gedalías en Mizpa: Ismael hijo de Netanías, y Johanán hijo de Careaj, y Seraías hijo de Tanhumet, el netofatita, y Jaazanías hijo del maacatita,[b] ellos y sus hombres.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'había puesto a Gedalías a cargo'; el verbo hebreo puede denotar nombrar a alguien para una función de supervisión o administración.
    reason: lexical_alternative
  - marker: b
    text: O 'Jaazanías hijo del de Maacá'; el hebreo usa un gentilicio, 'el maacatita'.
    reason: lexical_clarification
lexical_decisions:
- source_word: שָׂרֵי הַחֲיָלִים
  english_pob_choice: the commanders of the forces
  chosen_spanish: los jefes de las tropas
  alternatives_spanish:
  - los comandantes de las fuerzas
  - los capitanes del ejército
  - los oficiales de las tropas
  lexicon: HALOT
  rationale: שָׂרִים designa jefes o funcionarios; חַיִל aquí es un conjunto militar. 'Jefes de las tropas' comunica el sentido militar de forma natural en español, sin introducir un rango más técnico de lo que el hebreo exige.
- source_word: הֵמָּה וְהָאֲנָשִׁים
  english_pob_choice: they and their men
  chosen_spanish: ellos y sus hombres
  alternatives_spanish:
  - ellos y los hombres
  - ellos y sus soldados
  lexicon: HALOT
  rationale: La construcción pronominal es resumptiva y distingue a los jefes de los hombres que los acompañan. 'Sus hombres' reproduce bien esa relación en español y conserva el matiz militar.
- source_word: הִפְקִיד
  english_pob_choice: had appointed
  chosen_spanish: había puesto a Gedalías
  alternatives_spanish:
  - había nombrado a Gedalías
  - había puesto a Gedalías a cargo
  - había designado a Gedalías
  lexicon: HALOT
  rationale: El verbo puede significar nombrar, asignar o poner en una función de supervisión. 'Había puesto a Gedalías' mantiene el valor amplio del hebreo y evita especificar 'gobernador' sin que el texto lo explicite aquí.
- source_word: אֶל גְּדַלְיָהוּ הַמִּצְפָּה
  english_pob_choice: to Gedaliah at Mizpah
  chosen_spanish: a Gedalías en Mizpa
  alternatives_spanish:
  - a Gedalías en Mizpá
  - ante Gedalías en Mizpa
  lexicon: HALOT
  rationale: La preposición y el nombre de lugar indican movimiento hacia la persona situada allí. 'En Mizpa' expresa la localización con naturalidad en español.
- source_word: הַנְּטֹפָתִי
  english_pob_choice: the Netophathite
  chosen_spanish: el netofatita
  alternatives_spanish:
  - el de Netofa
  - el netofateo
  lexicon: HALOT
  rationale: El gentilicio se conserva por transliteración como marca étnico-geográfica unida al nombre propio. 'Netofatita' es la forma más transparente y reconocible en español.
- source_word: הַמַּעֲכָתִי
  english_pob_choice: the Maacathite
  chosen_spanish: el maacatita
  alternatives_spanish:
  - el de Maacá
  - el maacateo
  lexicon: HALOT
  rationale: Como con otros gentilicios, la transliteración preserva la designación de procedencia sin convertirla en una paráfrasis geográfica.
- source_word: וְאַנְשֵׁיהֶם
  english_pob_choice: and their men
  chosen_spanish: y sus hombres
  alternatives_spanish:
  - con sus hombres
  - y la gente de ellos
  lexicon: HALOT
  rationale: La cláusula final retoma la misma relación de pertenencia/acompañamiento que ya apareció antes. 'Sus hombres' reproduce el paralelismo y la estructura resumptiva del hebreo.
translation_notes:
  revision_awareness: La revisión más reciente no introdujo cambios; el pasaje mantiene alto grado de acuerdo con la fuente hebrea y con el análisis auditado en inglés. No se documentan variantes textuales ni ajustes doctrinales relevantes para este versículo.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' solo cuando el texto fuente lo requiere; este versículo no contiene el Tetragrámaton.
  - Se conserva la secuencia narrativa con verbo inicial de oír y el listado aposicional de nombres propios.
  - Los gentilicios se transliteran de manera consistente como formas adjetivales en español.
  - Se evita 'gobernador' en el texto principal para no imponer una precisión administrativa que el verbo hebreo no explicita por sí solo.
