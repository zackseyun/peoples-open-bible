translation:
  language: es
  text: Y un ejército[a] fue entregado con el holocausto regular[b] por causa de la transgresión; y echó la verdad[c] por tierra, y actuó y prosperó.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «hueste». צָבָא puede denotar un ejército o un conjunto organizado; «ejército» aquí mantiene el sentido colectivo y militar.
    reason: lexical_alternative
  - marker: b
    text: O «con el holocausto regular»; la preposición hebrea עַל es difícil aquí y puede indicar asociación, relación o incluso oposición con la ofrenda regular.
    reason: alternative_reading
  - marker: c
    text: Los verbos hebreos son femeninos singulares; el referente preciso queda comprimido en la visión y puede aludir al poder hostil simbolizado en el contexto anterior.
    reason: alternative_reading
lexical_decisions:
- source_word: וְצָבָא
  english_pob_choice: a host
  chosen_spanish: un ejército
  alternatives_spanish:
  - un host
  - una hueste
  lexicon: HALOT
  rationale: צָבָא puede referirse a un ejército o a una hueste. En español, «un ejército» comunica con naturalidad una fuerza organizada y conserva el sentido colectivo sin depender del anglicismo «host» ni de un término eclesiástico.
- source_word: תִּנָּתֵן
  english_pob_choice: was given over
  chosen_spanish: fue entregado
  alternatives_spanish:
  - fue dado
  - fue entregado en manos de
  lexicon: HALOT
  rationale: El nifal de נתן es pasivo, pero el contexto hostil favorece una idea de ser puesto bajo poder ajeno. «Fue entregado» refleja mejor esa fuerza que un simple «fue dado».
- source_word: עַל
  english_pob_choice: with
  chosen_spanish: con
  alternatives_spanish:
  - sobre
  - contra
  - junto con
  lexicon: HALOT
  rationale: La preposición עַל es difícil aquí. «Con» conserva la asociación entre el ejército y el holocausto regular sin decidir de manera excesiva si la relación es de acompañamiento, implicación o hostilidad.
- source_word: הַתָּמִיד
  english_pob_choice: the regular burnt offering
  chosen_spanish: el holocausto regular
  alternatives_spanish:
  - el sacrificio regular
  - la ofrenda continua
  - el holocausto diario
  lexicon: HALOT
  rationale: En contexto cultual, תָּמִיד se refiere al ofrecimiento regular del templo. «Holocausto regular» comunica ese sacrificio de manera clara en español y evita depender de una fórmula tradicional que puede sonar menos precisa.
- source_word: בְּפָשַׁע
  english_pob_choice: because of transgression
  chosen_spanish: por causa de la transgresión
  alternatives_spanish:
  - en transgresión
  - a causa de la rebelión
  - por la transgresión
  lexicon: HALOT
  rationale: La preposición בְּ tiene aquí valor causal o circunstancial. «Por causa de la transgresión» es natural en español y no especifica de antemano de quién es la transgresión.
- source_word: וְתַשְׁלֵךְ
  english_pob_choice: it cast
  chosen_spanish: echó
  alternatives_spanish:
  - arrojó
  - lanzó
  - echó por tierra
  lexicon: HALOT
  rationale: El hiphil de שלך significa arrojar/castar. «Echó» es breve y formal en español; unido a «por tierra» reproduce bien la imagen de derribo sin sobrecargar el verbo.
- source_word: אֱמֶת
  english_pob_choice: truth
  chosen_spanish: la verdad
  alternatives_spanish:
  - la verdad y la fidelidad
  - la verdad
  lexicon: HALOT
  rationale: אֱמֶת puede ser «verdad» o «fidelidad». En este contexto apocalíptico, «la verdad» conserva el alcance moral y religioso de lo verdadero frente a la mentira o la falsificación.
- source_word: אַרְצָה
  english_pob_choice: to the ground
  chosen_spanish: por tierra
  alternatives_spanish:
  - al suelo
  - a tierra
  - al suelo
  lexicon: HALOT
  rationale: La forma direccional de אֶרֶץ puede expresarse naturalmente como «por tierra» en español bíblico-formal; mantiene la idea de caída sin sonar mecánica.
- source_word: וְעָשְׂתָה
  english_pob_choice: it acted
  chosen_spanish: actuó
  alternatives_spanish:
  - hizo
  - obró
  - actuó con eficacia
  lexicon: HALOT
  rationale: עָשָׂה es amplio («hacer, obrar, actuar»). «Actuó» preserva la brevedad del hebreo sin introducir una interpretación más específica.
- source_word: וְהִצְלִיחָה
  english_pob_choice: prospered
  chosen_spanish: prosperó
  alternatives_spanish:
  - tuvo éxito
  - prevaleció
  - logró éxito
  lexicon: HALOT
  rationale: צָלַח en hiphil suele significar «prosperar» o «tener éxito». «Prosperó» es la correspondencia más estable y solemne en español bíblico.
theological_decisions:
- issue: Referencia y género de los verbos femeninos singulares
  english_pob_reading: Render the verbs with the generic pronoun 'it' rather than specifying the little horn, the host, or another referent.
  chosen_spanish_reading: Mantener verbos impersonales con sujeto tácito («echó», «actuó», «prosperó») para no fijar un referente que el hebreo comprime.
  alternative_spanish_readings:
  - él echó la verdad por tierra
  - el cuerno pequeño echó la verdad por tierra
  - ella echó la verdad por tierra
  rationale: El hebreo usa formas verbales femeninas singulares, lo que crea tensión si se las armoniza con un referente masculino explícito. La redacción española conserva esa ambigüedad sin resolverla prematuramente.
  doctrine_reference: Preservar la tensión interpretativa del texto fuente.
- issue: Sentido de תָּמִיד en este contexto
  english_pob_reading: Translate as 'the regular burnt offering' in the main text.
  chosen_spanish_reading: Traducirlo como «el holocausto regular» en el texto principal.
  alternative_spanish_readings:
  - el sacrificio diario
  - la ofrenda continua
  - el holocausto continuo
  rationale: El término designa la ofrenda regular del templo. «Holocausto regular» comunica el sentido cultual con claridad moderna y mantiene la referencia sacrificial.
  doctrine_reference: Primacía del sentido original sobre la tradición de traducción.
translation_notes:
  revision_awareness: 'El borrador español sigue la revisión más reciente del audit trail: se prefirió un registro más formal para el verbo de movimiento/arrojo y se mantuvo la lectura sintética y ambigua del sujeto/acción. También incorpora la decisión del POB inglés de mantener la tensión gramatical del hebreo sin identificar de manera cerrada el referente de los verbos femeninos.'
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el texto fuente lo requiera explícitamente; este versículo no contiene el Tetragrámaton.
  - «Holocausto regular» conserva el valor cultual de תָּמִיד sin sustituirlo por una fórmula litúrgica tradicional que podría ocultar el matiz hebreo.
  - Se evita «señor»/«SEÑOR» y «Cristo» porque no corresponden al léxico de este versículo.
  - La expresión «por tierra» se eligió por naturalidad bíblica en español, aunque el hebreo dice literalmente una dirección hacia la tierra/suelo.
