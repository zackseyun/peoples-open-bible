translation:
  language: es
  text: Trajo de vuelta todas las posesiones; también trajo de vuelta a Lot[a], su pariente cercano, y sus posesiones[b], y también a las mujeres[c] y al pueblo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: ''Lot, su hermano''. Aquí ''hermano'' puede tener el sentido más amplio de pariente cercano; en la narrativa, Lot es sobrino de Abram.'
    reason: lexical_alternative
  - marker: b
    text: También puede traducirse 'sus bienes' o 'su propiedad'.
    reason: lexical_alternative
  - marker: c
    text: '''Las mujeres'' puede abarcar, según el contexto, a las esposas; el hebreo usa un término más amplio.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּשֶׁב
  english_pob_choice: he brought back
  chosen_spanish: trajo de vuelta
  alternatives_spanish:
  - recobró
  - devolvió
  - volvió con
  lexicon: HALOT
  rationale: שׁוּב en forma causativa aquí expresa hacer volver o recuperar lo capturado. En español, 'trajo de vuelta' comunica bien la acción narrativa y el resultado de rescate sin sonar forzado.
- source_word: כָּל הָרְכֻשׁ
  english_pob_choice: all the possessions
  chosen_spanish: todas las posesiones
  alternatives_spanish:
  - todos los bienes
  - toda la propiedad
  lexicon: HALOT
  rationale: רְכוּשׁ se refiere a bienes o propiedad movible; 'posesiones' es amplio, natural y suficientemente preciso para el contexto de botín recuperado.
- source_word: ל֨וֹט אָחִי/ו
  english_pob_choice: Lot his kinsman
  chosen_spanish: Lot, su pariente estrecho
  alternatives_spanish:
  - Lot, su pariente
  - Lot, su sobrino
  lexicon: HALOT
  rationale: Aunque אָחִיו puede decir literalmente 'su hermano', el contexto narrativo indica una relación más amplia de parentesco. 'Pariente estrecho' conserva la fuerza relacional sin imponer 'hermano' en español.
- source_word: וּרְכֻשׁוֹ
  english_pob_choice: and his possessions
  chosen_spanish: sus posesiones
  alternatives_spanish:
  - sus bienes
  - su propiedad
  lexicon: HALOT
  rationale: Se mantiene la misma traducción de רְכוּשׁ para conservar coherencia léxica con la primera mención del término.
- source_word: הֵשִׁיב
  english_pob_choice: brought back
  chosen_spanish: trajo de vuelta
  alternatives_spanish:
  - recobró
  - restauró
  - devolvió
  lexicon: HALOT
  rationale: La repetición del mismo verbo causativo se refleja con la misma solución española para preservar el paralelismo y el ritmo del hebreo.
- source_word: הַנָּשִׁים
  english_pob_choice: the women
  chosen_spanish: las mujeres
  alternatives_spanish:
  - las esposas
  lexicon: HALOT
  rationale: El hebreo dice literalmente 'las mujeres'; no se estrecha a 'esposas' porque el término bíblico es más amplio y el contexto no lo exige.
- source_word: הָעָם
  english_pob_choice: the people
  chosen_spanish: el pueblo
  alternatives_spanish:
  - la gente
  - las personas
  lexicon: HALOT
  rationale: עָם en este contexto designa al grupo humano capturado junto con los bienes. 'El pueblo' mantiene el sentido colectivo y formal de la escena.
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión que separa en dos cláusulas principales la estructura hebrea (vayyashev / heshiv) mediante punto y coma, y la revisión que prefiere una designación más formal de אָחִיו. La draft española conserva esa bipartición con punto y coma y opta por una expresión de parentesco amplia pero precisa, sin ocultar la tensión léxica del hebreo.
  spanish_consistency_notes:
  - Se mantiene 'trajo de vuelta' para ambos verbos de שוב, preservando el paralelismo.
  - '''Posesiones'' se usa de manera consistente para רְכוּשׁ en ambas apariciones.'
  - '''Las mujeres'' y ''el pueblo'' conservan el alcance amplio del hebreo sin especificar más de lo que el texto dice.'
  - La puntuación con punto y coma refleja la división de dos cláusulas principales del hebreo.
