review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja correctamente la secuencia básica del hebreo: salida desde un lugar y acampada en otro. «Salieron» y «acamparon» corresponden bien a וַיִּסְעוּ y וַיַּחֲנוּ en fórmula itineraria. También preserva el tratamiento de מִן como «de» y ב como «en». Sin embargo, hay problemas de transliteración/toponimia frente al rastro auditado: «Kibrot-hataavá» se aparta innecesariamente de «Kibroth-hattaavah», y «Jazerot» reemplaza sin base suficiente el topónimo auditado «Hazeroth».'
  spanish_quality_summary: El español es claro y natural, pero conviene ajustar los topónimos para mayor fidelidad y coherencia editorial. La nota al pie también debe armonizarse con el topónimo auditado y con alternativas léxicas más cercanas al inglés documentado. Además, una alternativa española listada («Jeron en viaje») contiene un error evidente, aunque esto afecta el aparato de decisiones más que el texto bíblico.
  glossary_alignment: No hay términos teológicos mayores en este versículo. El principal punto de alineación es la política de transliterar nombres de lugar en lugar de traducirlos en el texto principal. Para respetar el audit trail, deben conservarse formas más cercanas a «Kibroth-hattaavah» y «Hazeroth»; no se justifica castellanizar «Hazeroth» como «Jazerot» aquí.
  issues:
  - severity: medium
    issue: Topónimo «Jazerot» en lugar de una transliteración alineada con «Hazeroth».
    rationale: El hebreo חֲצֵרֹת y el English POB auditado usan «Hazeroth». «Jazerot» introduce una castellanización no documentada y puede romper la consistencia intertextual del proyecto.
  - severity: medium
    issue: «Kibrot-hataavá» se aleja del topónimo auditado «Kibroth-hattaavah».
    rationale: Aunque cierta adaptación gráfica al español puede ser admisible, aquí la forma propuesta omite elementos de la transliteración documentada y reduce la trazabilidad del nombre propio. Conviene mantener una forma más reconocible y consistente con el audit trail.
  - severity: low
    issue: La nota léxica usa «Deseo» y «Codicia» en vez de reflejar más de cerca «Craving» / «Lust».
    rationale: La nota no necesita ser literal al inglés, pero debe preservar mejor la gama semántica documentada. «Ansia» y «Lujuria»/«Deseo vehemente» o una formulación equivalente se acercan más al rationale auditado; «codicia» desplaza el sentido hacia avaricia.
  - severity: low
    issue: 'Error en alternativa léxica interna: «Jeron en viaje».'
    rationale: Es un error textual en el aparato de decisiones, no en el texto bíblico, pero indica necesidad de revisión editorial.
  revised_spanish_text: Salieron de Kibrot-hataava y acamparon en Hazerot[a].
