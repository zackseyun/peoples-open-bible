translation:
  language: es
  text: Ahora mis días son más veloces que un corredor; huyen; no ven el bien[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «prosperidad» o «bienestar» para טוֹבָה («bien»).
    reason: lexical_alternative
lexical_decisions:
- source_word: יָמַי
  english_pob_choice: my days
  chosen_spanish: mis días
  alternatives_spanish:
  - los días de mi vida
  lexicon: HALOT
  rationale: El posesivo plural temporal se conserva de forma natural en español con «mis días», manteniendo el idiomatismo hebreo sobre la duración de la vida.
- source_word: קַלוּ
  english_pob_choice: are swifter
  chosen_spanish: son más veloces
  alternatives_spanish:
  - son más ligeros
  - han llegado a ser veloces
  lexicon: HALOT
  rationale: En comparación con un corredor, la idea dominante es velocidad. «Más veloces» comunica bien el valor comparativo sin perder la imagen de ligereza/rapidez del hebreo.
- source_word: מִנִּי רָץ
  english_pob_choice: than a runner
  chosen_spanish: que un corredor
  alternatives_spanish:
  - que uno que corre
  - que un mensajero
  lexicon: HALOT
  rationale: La preposición marca comparación. «Corredor» reproduce el sustantivo de agente de manera clara y evita especificar innecesariamente a un mensajero o courier.
- source_word: בָּרְחוּ
  english_pob_choice: they flee away
  chosen_spanish: huyen
  alternatives_spanish:
  - han huido
  - vuelan lejos
  lexicon: HALOT
  rationale: El verbo expresa fuga/movimiento de escape. En español, «huyen» conserva la imagen viva y el sujeto plural («mis días») sin sobrecargar con un adverbio redundante.
- source_word: לֹא רָאוּ
  english_pob_choice: they do not see
  chosen_spanish: no ven
  alternatives_spanish:
  - no han visto
  - nunca ven
  lexicon: HALOT
  rationale: El hebreo presenta un resultado continuado de experiencia frustrada. El presente español «no ven» transmite ese valor gnómico/resultativo con naturalidad.
- source_word: טוֹבָה
  english_pob_choice: good
  chosen_spanish: el bien
  alternatives_spanish:
  - la prosperidad
  - el bienestar
  - lo bueno
  lexicon: HALOT
  rationale: «Bien» preserva la amplitud semántica de טוֹבָה sin limitarla prematuramente a prosperidad material o bienestar psicológico. En español suena bíblico pero claro.
theological_decisions:
- issue: Amplitud de טוֹבָה
  english_pob_reading: good
  chosen_spanish_reading: el bien
  alternative_spanish_readings:
  - la prosperidad
  - el bienestar
  - lo bueno
  rationale: El término hebreo es amplio y no obliga a concretar una sola esfera de beneficio. «El bien» mantiene esa amplitud y evita una interpretación más estrecha que el texto no exige.
  doctrine_reference: Lexical breadth without doctrinal narrowing
translation_notes:
  revision_awareness: El pasaje fue revisado en el audit trail inglés y quedó sin cambios; por eso la versión española sigue de cerca la lectura aprobada, sin introducir ampliaciones interpretativas nuevas.
  spanish_consistency_notes:
  - Se usa «Yahvé» sólo cuando aparezca el nombre divino; aquí no aplica.
  - Se evita «SEÑOR» como sustituto porque el versículo no contiene el Tetragrámaton.
  - «Corredor» se prefiere a «mensajero» por fidelidad al paralelo comparativo con רָץ.
  - «El bien» conserva mejor la amplitud semántica que una traducción más específica.
