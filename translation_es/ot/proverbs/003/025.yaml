translation:
  language: es
  text: No temas el terror súbito, ni la ruina[a] de los malvados cuando llegue[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «devastación» o «destrucción» para «ruina» (heb. שֹׁאָה).
    reason: lexical_alternative
  - marker: b
    text: La frase «la ruina de los malvados» puede referirse tanto a la calamidad que les sobreviene a los malvados como a la calamidad asociada con ellos; el hebreo es compacto y no especifica del todo la relación.
    reason: alternative_reading
lexical_decisions:
- source_word: אַל / תִּירָא
  english_pob_choice: Do not fear
  chosen_spanish: No temas
  alternatives_spanish:
  - No tengas miedo
  - No te asustes
  lexicon: HALOT
  rationale: La prohibición hebrea con אַל + imperfecto jussivo se expresa de forma natural en español con el imperativo negativo «No temas». Mantiene la concisión y la fuerza exhortativa del original.
- source_word: מִפַּחַד פִּתְאֹם
  english_pob_choice: sudden terror
  chosen_spanish: el terror súbito
  alternatives_spanish:
  - el terror repentino
  - el pavor súbito
  - el terror inesperado
  lexicon: HALOT
  rationale: פַּחַד denota miedo/terror y פִּתְאֹם aporta la idea de irrupción repentina. «Terror súbito» conserva la compactación del hebreo y la relación adjetival sin volverla explicativa de más.
- source_word: וּמִשֹּׁאַת
  english_pob_choice: the ruin
  chosen_spanish: la ruina
  alternatives_spanish:
  - la devastación
  - la destrucción
  - la calamidad
  lexicon: HALOT
  rationale: שֹׁאָה puede significar ruina, devastación o destrucción. «Ruina» es breve, clara y apta para el paralelismo con «terror súbito».
- source_word: רְשָׁעִים
  english_pob_choice: of the wicked
  chosen_spanish: de los malvados
  alternatives_spanish:
  - de los impíos
  - de los perversos
  - de los malvados/impíos
  lexicon: HALOT
  rationale: El sustantivo/adjetivo plural רְשָׁעִים designa a personas malvadas o impías. «Malvados» es comprensible en español bíblico moderno y evita una formulación excesivamente técnica.
- source_word: כִּי תָבֹא
  english_pob_choice: when it comes
  chosen_spanish: cuando llegue
  alternatives_spanish:
  - cuando venga
  - cuando sobrevenga
  - cuando ocurra
  lexicon: HALOT
  rationale: כִּי introduce la circunstancia temporal, y תָבֹא concuerda en femenino singular con «ruina». «Cuando llegue» refleja bien el movimiento de בוא y sugiere la llegada del desastre sin añadir contenido ajeno.
translation_notes:
  revision_awareness: 'El texto sigue de cerca el hebreo de Proverbios 3:25 y armoniza con el audit trail inglés: se preserva la prohibición breve, el paralelismo entre miedo y ruina, y la ambigüedad compacta de la relación constructa en «ruina de los malvados». No se documentaron revisiones textuales relevantes en el expediente proporcionado.'
  spanish_consistency_notes:
  - Se usa «malvados» para רְשָׁעִים en coherencia con un registro bíblico contemporáneo y comprensible.
  - Se usa «ruina» para שֹׁאָה, manteniendo una alternativa en nota para no perder la posible gama semántica.
  - Se evita traducir mecánicamente la preposición hebrea; en español la estructura se vuelve idiomática sin perder el sentido.
  - Los corchetes de nota aparecen solo en los puntos donde el texto necesita una alternativa o precisión semántica.
