  text: You shall keep my statutes. You shall not breed your livestock with two different kinds; you shall not sow your field with two kinds of seed; and a garment of mixed material[a], shaatnez, shall not come upon you.
  footnotes:
  - marker: a
    text: Hebrew shaatnez is a technical term for a forbidden mixed fabric, traditionally understood as a mixture of wool and linen; compare Deuteronomy 22:11.
