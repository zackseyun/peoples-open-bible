  glossary_alignment: No hay conflictos con la terminología base del proyecto. Las decisiones léxicas principales («corona», «los sabios», «su riqueza», «necedad», «los necios») son consistentes con el contexto sapiencial y con la filosofía de equivalencia óptima. La preservación de la repetición masorética está bien justificada y correctamente documentada en la nota.
