base_translation:
  language: en
  yaml_path: translation/ot/amos/006/010.yaml
  text: Then his uncle[a], the one who burns him, will carry him out to bring the bones out of the house, and he will say to the one who is in the innermost part of the house, “Is there still anyone with you?” And he will say, “No one.” Then he will say[c][b], “Hush! For we must not mention the name of Yahweh.”
  footnotes:
  - marker: a
    text: Or, 'his kinsman'; the Hebrew term can denote a close male relative, though 'uncle' fits the context well.
    reason: lexical_alternative
  - marker: b
    text: Hebrew literally, 'the one who burns him.' The wording is unusual and may refer to burning associated with corpse disposal in a time of judgment.
    reason: cultural_note
  - marker: c
    text: Or, 'Do not mention the name of the LORD.' The Hebrew expression is terse and may be heard either as a direct prohibition or as a statement of necessity.
    reason: alternative_reading
