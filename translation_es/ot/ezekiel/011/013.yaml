translation:
  language: es
  text: 'Y sucedió que, mientras yo estaba profetizando, Pelatías hijo de Benaía murió. Entonces caí sobre mi rostro y clamé a gran voz, y dije: «¡Ay, Señor Yahvé[b], ¿vas a acabar por completo con el remanente de Israel?[a]»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «¿estás acabando por completo con el remanente de Israel?». El hebreo puede leerse con fuerza presente o inminente.'
    reason: alternative_reading
  - marker: b
    text: 'Hebreo: «Señor Yahvé», es decir, אֲדֹנָי יְהוִה.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְהִי
  english_pob_choice: And it happened
  chosen_spanish: Y sucedió
  alternatives_spanish:
  - Y aconteció
  - Y pasó
  lexicon: HALOT
  rationale: La fórmula narrativa wayyiqtol introduce un nuevo episodio; «sucedió» conserva ese valor discursivo en español moderno sin arcaísmo.
- source_word: כְהִנָּבְאִי
  english_pob_choice: as I was prophesying
  chosen_spanish: mientras yo estaba profetizando
  alternatives_spanish:
  - cuando yo profetizaba
  - así que yo profetizaba
  lexicon: HALOT
  rationale: 'El valor temporal-progressivo de la construcción con כ se expresa mejor en español con una acción en curso: «mientras yo estaba profetizando».'
- source_word: וּפְלַטְיָהוּ בֶן־בְּנָיָה
  english_pob_choice: that Pelatiah son of Benaiah
  chosen_spanish: Pelatías hijo de Benaía
  alternatives_spanish:
  - Pelatías, hijo de Benaía
  - y Pelatías hijo de Benaía
  lexicon: HALOT
  rationale: Se conserva la transliteración de los nombres propios y la relación filial directa con «hijo de», adecuada para la lectura pública en español.
- source_word: מֵת
  english_pob_choice: died
  chosen_spanish: murió
  alternatives_spanish:
  - había muerto
  - falleció
  lexicon: HALOT
  rationale: El perfecto qal de מות reporta la muerte como hecho; «murió» es la forma más directa y natural en español.
- source_word: וָאֶפֹּל עַל פָּנַי
  english_pob_choice: Then I fell on my face
  chosen_spanish: caí sobre mi rostro
  alternatives_spanish:
  - caí postrado
  - me postré
  lexicon: HALOT
  rationale: «Sobre mi rostro» conserva con fidelidad el modismo hebreo, mientras que «caí» reproduce el movimiento y la reacción inmediata.
- source_word: וָאֶזְעַק קוֹל גָּדוֹל
  english_pob_choice: and cried out with a loud voice
  chosen_spanish: clamé con fuerte voz
  alternatives_spanish:
  - grité con voz fuerte
  - clamé a gran voz
  lexicon: HALOT
  rationale: זעק expresa un clamor intenso de angustia; «clamé» preserva ese registro elevado y «con fuerte voz» refleja קול גדול sin sonar demasiado idiomático o tradicionalista.
- source_word: אֲהָהּ
  english_pob_choice: Ah
  chosen_spanish: ¡Ay!
  alternatives_spanish:
  - Ah
  - ¡Oh!
  lexicon: HALOT
  rationale: La interjección transmite lamento y alarma; en español «¡Ay!» es más natural y mantiene el tono de dolor.
- source_word: אֲדֹנָי יְהוִה
  english_pob_choice: Lord GOD
  chosen_spanish: Señor Yahvé
  alternatives_spanish:
  - Señor Dios
  - Señor Yahveh
  lexicon: HALOT
  rationale: Se sigue la norma del proyecto para יְהוָה/YHWH como «Yahvé». En la combinación אֲדֹנָי יְהוִה, «Señor Yahvé» preserva el valor del nombre divino sin ocultarlo ni producir una repetición artificial.
- source_word: כָּלָה ... עֹשֶׂה
  english_pob_choice: will you make a complete end
  chosen_spanish: ¿vas a hacer un exterminio completo?
  alternatives_spanish:
  - ¿vas a hacer un fin total?
  - ¿vas a acabar del todo?
  lexicon: HALOT
  rationale: La construcción idiomática expresa llevar a cabo una destrucción total. «Exterminio completo» comunica con claridad la fuerza del hebreo; se conserva la amplitud semántica de «hacer una consumación total» sin suavizarla indebidamente.
- source_word: שְׁאֵרִית יִשְׂרָאֵל
  english_pob_choice: the remnant of Israel
  chosen_spanish: el remanente de Israel
  alternatives_spanish:
  - el resto de Israel
  - lo que queda de Israel
  lexicon: HALOT
  rationale: «Remanente» preserva el término teológico clave usado por la POB inglesa y mantiene la resonancia de comunidad sobreviviente con valor covenantal.
theological_decisions:
- issue: Tratamiento del nombre divino en אֲדֹנָי יְהוִה
  english_pob_reading: Lord GOD
  chosen_spanish_reading: Señor Yahvé
  alternative_spanish_readings:
  - Señor Dios
  - Señor Yahveh
  rationale: El texto hebreo contiene explícitamente el Tetragrama; conforme a la terminología del proyecto, se traduce como «Yahvé» en el cuerpo principal. Así se evita la convención de enmascararlo como «SEÑOR» y se preserva el nombre propio del pacto.
  doctrine_reference: 'DOCTRINE.md: יְהוָה / YHWH → Yahvé'
- issue: Fuerza del último clamor de Ezequiel
  english_pob_reading: will you make a complete end of the remnant of Israel?
  chosen_spanish_reading: ¿vas a hacer un exterminio completo del remanente de Israel?
  alternative_spanish_readings:
  - ¿estás haciendo un exterminio completo del remanente de Israel?
  - ¿vas a consumar por completo el remanente de Israel?
  rationale: La cláusula hebrea admite fuerza futura o inminente, pero en el contexto funciona como súplica aterrada. La pregunta con «¿vas a…?» conserva ese matiz de alarma e intercesión, sin resolver indebidamente la tensión aspectual.
  doctrine_reference: POB textual note on Hebrew temporal/imminent force
translation_notes:
  revision_awareness: Se siguió de cerca el audit trail inglés y no se introdujeron cambios sustantivos respecto de la lectura de base. Se mantuvo la tensión temporal del hebreo en la cláusula inicial y la fuerza súplice del final, con adaptación natural al español.
  spanish_consistency_notes:
  - Se usa «Yahvé» para YHWH, conforme a la norma del proyecto.
  - Se conserva «remanente» para שְׁאֵרִית por su peso teológico.
  - Se eligió «Señor Yahvé» para אֲדֹנָי יְהוִה, evitando tanto la ocultación del nombre divino como una repetición poco natural.
  - La interjección «¡Ay!» refleja mejor el lamento hebreo que un calco más neutro.
