translation:
  language: es
  text: 'Entonces Samuel dijo: «Aunque eras pequeño[a] a tus propios ojos, ¿no eras el jefe de las tribus de Israel? Y Yahvé te ungió rey sobre Israel».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Aunque te considerabas pequeño». El hebreo admite una matización muy cercana; el sentido general es que Saúl antes se tenía por insignificante.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הֲלוֹא
  english_pob_choice: were you not
  chosen_spanish: ¿no eras…?
  alternatives_spanish:
  - ¿acaso no eras…?
  - ¿no fuiste…?
  lexicon: HALOT
  rationale: La pregunta retórica espera asentimiento; en español, «¿no eras…?» reproduce bien esa fuerza y mantiene el valor retrospectivo del contexto.
- source_word: אִם קָטֹן אַתָּה בְּעֵינֶיךָ
  english_pob_choice: Though you were small in your own eyes
  chosen_spanish: Aunque eras pequeño en tus propios ojos
  alternatives_spanish:
  - Aunque te considerabas pequeño
  - Incluso si eras pequeño en tus propios ojos
  lexicon: HALOT
  rationale: «Pequeño» conserva la metáfora de baja condición o poca estima. «En tus propios ojos» mantiene el modismo hebreo de autoevaluación; «aunque» sigue la lectura concesiva documentada en la auditoría inglesa.
- source_word: קָטֹן
  english_pob_choice: small
  chosen_spanish: pequeño
  alternatives_spanish:
  - insignificante
  - menor
  lexicon: HALOT
  rationale: «Pequeño» es natural en español y preserva la idea de poca relevancia o estatus sin explicitar más de lo que el hebreo dice.
- source_word: בְּעֵינֶיךָ
  english_pob_choice: in your own eyes
  chosen_spanish: en tus propios ojos
  alternatives_spanish:
  - a tus propios ojos
  - según tu propia estimación
  lexicon: HALOT
  rationale: El modismo hebreo alude a la propia percepción; «en tus propios ojos» es fiel y comprensible en español.
- source_word: רֹאשׁ שִׁבְטֵי יִשְׂרָאֵל
  english_pob_choice: the head of the tribes of Israel
  chosen_spanish: el jefe de las tribus de Israel
  alternatives_spanish:
  - la cabeza de las tribus de Israel
  - el caudillo de las tribus de Israel
  lexicon: HALOT
  rationale: «Jefe» comunica la función de liderazgo en un español claro. Se evita «cabeza» por sonar demasiado literal y menos natural en esta construcción, aunque conserva la metáfora de autoridad.
- source_word: וַיִּמְשָׁחֲךָ
  english_pob_choice: anointed you
  chosen_spanish: te ungió
  alternatives_spanish:
  - te consagró por unción
  - te ungió para
  lexicon: HALOT
  rationale: «Ungió» conserva el acto ritual y su peso teológico; no se sustituye por «nombró» o «designó», porque eso atenuaría el matiz cultual del verbo משׁח.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  - el SEÑOR
  lexicon: HALOT
  rationale: 'Se sigue el estándar del proyecto para el Tetragrámaton: «Yahvé» en el texto principal, preservando el nombre propio divino en lugar de una sustitución por título.'
- source_word: לְמֶלֶךְ עַל יִשְׂרָאֵל
  english_pob_choice: king over Israel
  chosen_spanish: como rey sobre Israel
  alternatives_spanish:
  - rey sobre Israel
  - para ser rey sobre Israel
  lexicon: HALOT
  rationale: «Como rey» expresa la función resultante de la unción en español fluido. Mantiene la relación entre la unción y el cargo real sin añadir información.
theological_decisions:
- issue: Renderización del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - el SEÑOR
  rationale: El hebreo usa el Nombre del pacto, no un título. La forma española del proyecto es «Yahvé», para conservar transparencia y auditable identidad del texto original.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Valor de la unción real de Saúl
  english_pob_reading: And Yahweh anointed you king over Israel.
  chosen_spanish_reading: Yahvé te ungió como rey sobre Israel.
  alternative_spanish_readings:
  - Yahvé te nombró rey sobre Israel.
  - Yahvé te designó rey sobre Israel.
  rationale: Se mantiene «ungió» porque el verbo hebreo y la lectura inglesa conservan la acción ritual y su carga teológica; «nombró/designó» perdería el componente sacramental y dinástico del pasaje.
  doctrine_reference: Lexical theology of משׁח / royal anointing
translation_notes:
  revision_awareness: La redacción española sigue la última revisión inglesa que añadió la conjunción final «And» antes de la cláusula sobre la unción; por eso se conserva «Yahvé te ungió…» con valor conjuntivo y flujo formal equivalente.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» para יְהוָה conforme al estándar del proyecto.
  - Se usa «ungió» para משׁח, evitando neutralizar la unción con verbos administrativos.
  - «En tus propios ojos» conserva el modismo hebreo sin explicarlo dentro del texto principal.
  - «Jefe de las tribus de Israel» comunica el hebraísmo רֹאשׁ sin calco excesivo.
  - La puntuación reproduce una pregunta retórica seguida de una cláusula afirmativa coordinada.
