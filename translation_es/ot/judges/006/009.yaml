translation:
  language: es
  text: Y yo los libré de la mano de Egipto y de la mano de todos los que los oprimían, y los expulsé de delante de ustedes y les di su tierra.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: וָאַצִּל
  english_pob_choice: I delivered
  chosen_spanish: los libré
  alternatives_spanish:
  - los rescaté
  - los salvé
  lexicon: HALOT
  rationale: נצל expresa librar o rescatar de un poder o peligro. «Libré» conserva la acción de sacar de una situación de dominio y suena natural en español bíblico actual.
- source_word: מִיַּד
  english_pob_choice: from the hand of
  chosen_spanish: de la mano de
  alternatives_spanish:
  - del poder de
  - de
  lexicon: HALOT
  rationale: Se conserva la imagen concreta de poder/control que trae el hebreo «mano», como en la decisión inglesa auditada.
- source_word: מִצְרַיִם
  english_pob_choice: Egypt
  chosen_spanish: Egipto
  lexicon: HALOT
  rationale: Nombre propio geográfico estándar.
- source_word: כָּל לֹחֲצֵיכֶם
  english_pob_choice: all your oppressors
  chosen_spanish: todos sus opresores
  alternatives_spanish:
  - todos los que los oprimían
  - todos sus enemigos
  lexicon: HALOT
  rationale: לֹחֲצִים designa a quienes oprimen o aprietan con violencia. «Opresores» conserva el valor lexical más preciso; se mantiene el posesivo de segunda persona plural de forma respetuosa y clara en español.
- source_word: וָאֲגָרֵשׁ
  english_pob_choice: I drove them out
  chosen_spanish: los eché
  alternatives_spanish:
  - los expulsé
  - los arrojé fuera
  lexicon: HALOT
  rationale: גָּרַשׁ puede significar echar, expulsar o arrojar fuera. «Los eché» es breve, idiomático y conserva la fuerza del movimiento de remoción del territorio.
- source_word: מִפְּנֵיכֶם
  english_pob_choice: from before you
  chosen_spanish: de delante de ustedes
  alternatives_spanish:
  - de ante ustedes
  - de su presencia
  lexicon: HALOT
  rationale: La expresión hebrea literalmente alude a la cara/presencia. «De delante de ustedes» preserva el idiomático espacial sin sonar forzado.
- source_word: וָאֶתְּנָה לָכֶם אֶת אַרְצָם
  english_pob_choice: and gave you their land
  chosen_spanish: y les di su tierra
  alternatives_spanish:
  - y les entregué su tierra
  - y di su tierra a ustedes
  lexicon: HALOT
  rationale: נתן + objeto indirecto + objeto directo se vierte de manera natural como «les di su tierra», manteniendo el sentido exacto y la relación posesiva del hebreo.
theological_decisions:
- issue: Agencia divina explícita en liberación, expulsión y don de la tierra
  english_pob_reading: 'The verse is rendered with God as the explicit subject of each action: delivering, driving out, and giving the land.'
  chosen_spanish_reading: 'El versículo conserva a Dios como sujeto explícito de cada acción: librar, echar y dar la tierra.'
  alternative_spanish_readings:
  - Se podría suavizar con formas más pasivas o impersonales, pero se perdería la agencia directa del texto.
  rationale: El hebreo usa verbos en primera persona singular para atribuir directamente a Yahvé la liberación, la expulsión y el don de la tierra. La traducción mantiene esa afirmación sin reinterpretarla.
  doctrine_reference: 'Translation philosophy: Original-language primacy over translation tradition; Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: La revisión inglesa final no introdujo cambios respecto del borrador auditado; por eso la versión española sigue de cerca las decisiones léxicas ya aprobadas y no añade notas textuales nuevas.
  spanish_consistency_notes:
  - Se usa «Yahvé» como forma de referencia divina en el proyecto, pero aquí el versículo no contiene el tetragrámaton en superficie y la referencia se preserva por el sujeto implícito del discurso.
  - «Los/ustedes» sigue el registro plural reverente y claro para una audiencia amplia de iglesia en español.
  - Se evitó «SEÑOR» como sustituto, en coherencia con el estándar del proyecto para no ocultar el nombre divino cuando está en el texto fuente.
