translation:
  language: es
  text: y en Garizim[a], Andrónico; y además de éstos, Menelao superaba a los demás en maldad[b] hacia los ciudadanos, teniendo una actitud hostil hacia los ciudadanos judíos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, 'y en Garizim, Andrónico'. La preposición puede traducirse 'en' o 'junto a' con este nombre de lugar, según cómo se entienda la localización.
    reason: lexical_alternative
  - marker: b
    text: Literalmente, 'sobresalía por encima de los demás en lo peor' o 'aventajaba a los demás en las peores cosas'.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐν δὲ Γαριζεὶν
  english_pob_choice: and in Gerizim
  chosen_spanish: y en Garizim
  alternatives_spanish:
  - y en el monte Garizim
  - y en Garizim, o en él
  lexicon: LSJ
  rationale: La preposición ἐν con un nombre de lugar puede ser 'en' o 'a/en' según el contexto; aquí se conserva la localización con 'en Garizim', que es natural en español y sigue de cerca la lectura inglesa auditada.
- source_word: Ἀνδρόνικον
  english_pob_choice: Andronicus
  chosen_spanish: Andrónico
  alternatives_spanish:
  - Andronicus
  lexicon: Convención onomástica
  rationale: Se translitera el nombre propio con la forma corriente en español bíblico, sin añadir explicación innecesaria.
- source_word: πρὸς δὲ τούτοις
  english_pob_choice: and besides these
  chosen_spanish: y además de éstos
  alternatives_spanish:
  - y además
  - por otra parte
  lexicon: LSJ
  rationale: La expresión agrega a Menelao a los personajes ya mencionados; 'y además de éstos' preserva el valor aditivo sin volverlo más interpretativo de lo necesario.
- source_word: Μενέλαον
  english_pob_choice: Menelaus
  chosen_spanish: Menelao
  alternatives_spanish:
  - Menelaus
  lexicon: Convención onomástica
  rationale: Nombre propio transliterado a la forma habitual en español.
- source_word: χείριστα τῶν ἄλλων ὑπερήρτετο
  english_pob_choice: surpassed the others in wickedness
  chosen_spanish: superaba a los demás en maldad
  alternatives_spanish:
  - aventajaba a los demás en perversidad
  - era peor que los demás
  lexicon: LSJ
  rationale: El giro comparativo expresa que Menelao sobresalía por su mal proceder; 'en maldad' mantiene el peso moral y evita una paráfrasis excesiva.
- source_word: τοῖς πολίταις
  english_pob_choice: to the citizens
  chosen_spanish: hacia los ciudadanos
  alternatives_spanish:
  - contra los ciudadanos
  - a los ciudadanos
  lexicon: LSJ
  rationale: El dativo marca a los afectados por su conducta. 'Hacia los ciudadanos' conserva la referencia relacional y la fluidez del español, siguiendo la lectura inglesa que retiene 'citizens'.
- source_word: ἀπεχθῆ ... διάθεσιν
  english_pob_choice: a hateful disposition
  chosen_spanish: una disposición odiosa
  alternatives_spanish:
  - una actitud hostil
  - un ánimo aborrecible
  lexicon: LSJ
  rationale: διάθεσις se refiere a disposición/actitud; ἀπεχθής añade el matiz de odiosidad u hostilidad. 'Disposición odiosa' reproduce ese tono sin endurecerlo más de lo que exige el griego.
- source_word: πρὸς τοὺς πολίτας Ἰουδαίους
  english_pob_choice: toward the Jewish citizens
  chosen_spanish: hacia los ciudadanos judíos
  alternatives_spanish:
  - hacia los judíos ciudadanos
  - hacia el pueblo judío
  lexicon: LSJ
  rationale: El griego conserva juntos πολίτας e Ἰουδαίους; 'ciudadanos judíos' mantiene ambos elementos, evitando reducir la frase a una identidad étnica sola.
- source_word: ἔχων
  english_pob_choice: having
  chosen_spanish: teniendo
  alternatives_spanish:
  - con una
  - manteniendo
  lexicon: LSJ
  rationale: El participio describe una condición continua; 'teniendo' conecta de forma directa con la cláusula principal en español y conserva el valor participial.
theological_decisions:
- issue: Conservar el término cívico πολίταις / πολίτας en vez de generalizarlo a 'gente' o 'pueblo'
  english_pob_reading: Retain 'citizens' in both occurrences.
  chosen_spanish_reading: Retener 'ciudadanos' en ambas ocurrencias.
  alternative_spanish_readings:
  - gente
  - compatriotas
  - pueblo
  rationale: El texto griego repite el término de ciudadanía, subrayando una hostilidad no solo étnica sino también cívico-social. Mantener 'ciudadanos' preserva esa tensión.
  doctrine_reference: Translation philosophy §1, §5
- issue: Cómo reflejar χείριστα τῶν ἄλλων ὑπερήρτετο sin perder la fuerza condenatoria
  english_pob_reading: '''surpassed the others in wickedness'''
  chosen_spanish_reading: '''superaba a los demás en maldad'''
  alternative_spanish_readings:
  - '''era peor que los demás'''
  - '''aventajaba a los demás en perversidad'''
  rationale: La frase es comparativa y moralmente acusatoria; 'superaba... en maldad' mantiene la comparación y la valoración negativa con un registro claro y sobrio.
  doctrine_reference: Translation philosophy §6
translation_notes:
  revision_awareness: 'La redacción sigue de cerca el texto griego y la lectura inglesa auditada, pero ajusta el comparativo a un español más natural: ''superaba a los demás en maldad'' reproduce el valor de χείριστα τῶν ἄλλων ὑπερήρτετο sin forzar una paráfrasis. También se mantiene la duplicación de ''ciudadanos'' para conservar el matiz cívico presente en πολίταις/πολίτας.'
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' como norma del proyecto cuando aparezca el nombre divino; este versículo no lo contiene.
  - 'Se conserva la transliteración estable de nombres propios bíblicos en español: Andrónico, Menelao.'
  - '''Ciudadanos'' se usa de forma consistente para πολίταις/πολίτας, siguiendo la decisión inglesa de no diluir el matiz cívico.'
  - '''Maldad'' se usa aquí como equivalente sobrio de la evaluación moral fuerte del griego; en contextos distintos podría preferirse ''perversidad'' o ''maldades'' según el flujo del pasaje.'
