translation:
  language: es
  text: Recibieron ayuda contra ellos, y los hagritas[a] y todos los que estaban con ellos fueron entregados en sus manos[b], porque clamaron a Dios en la batalla, y él les respondió porque confiaron en él.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O bien, «hageritas»; se conserva aquí una transliteración breve del nombre del pueblo.
    reason: alternative_reading
  - marker: b
    text: 'Hebreo: «fueron entregados en su mano», modismo para derrota y sujeción.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֵּעָזְרוּ עֲלֵיהֶם
  english_pob_choice: They were helped against them
  chosen_spanish: Recibieron ayuda contra ellos
  alternatives_spanish:
  - Fueron ayudados contra ellos
  - Se les dio ayuda contra ellos
  lexicon: HALOT
  rationale: El nifal de עזר exige una traducción pasiva o receptiva. En español, "recibieron ayuda" conserva la idea de ayuda recibida sin forzar una construcción demasiado literal y suena natural en contexto bélico.
- source_word: וַיִּנָּתְנוּ בְיָדָם
  english_pob_choice: were given into their hand
  chosen_spanish: fueron entregados en su mano
  alternatives_spanish:
  - fueron puestos en su mano
  - fueron entregados a su poder
  lexicon: HALOT
  rationale: La expresión hebrea es un modismo militar de derrota y entrega al control del vencedor. "En su mano" preserva la imagen bíblica y la fuerza idiomática del hebreo.
- source_word: הַהַגְרִיאִים
  english_pob_choice: the Hagrites
  chosen_spanish: los hagritas
  alternatives_spanish:
  - los hagrítas
  - los hageritas
  lexicon: HALOT
  rationale: Se translitera el nombre étnico como nombre propio de pueblo. Se prefiere "hagritas" como forma breve y legible en español, manteniendo la alternativa tradicional en nota.
- source_word: וְכֹל שֶׁעִמָּהֶם
  english_pob_choice: and all who were with them
  chosen_spanish: y todos los que estaban con ellos
  alternatives_spanish:
  - y todos los que iban con ellos
  - y todos los que les acompañaban
  lexicon: HALOT
  rationale: La frase incluye a los acompañantes o fuerzas asociadas con ese grupo. "Los que estaban con ellos" es claro y conserva el sentido colectivo del original.
- source_word: לֵאלֹהִים זָעֲקוּ
  english_pob_choice: because they cried out to God
  chosen_spanish: porque clamaron a Dios
  alternatives_spanish:
  - porque gritaron a Dios
  - porque invocaron a Dios
  lexicon: HALOT
  rationale: זעק expresa un clamor intenso por auxilio. "Clamaron a Dios" mantiene la urgencia del verbo sin hacerlo demasiado coloquial.
- source_word: בַּמִּלְחָמָה
  english_pob_choice: in the battle
  chosen_spanish: en la batalla
  alternatives_spanish:
  - durante la batalla
  - en la guerra
  lexicon: HALOT
  rationale: El artículo definido apunta a la contienda concreta del relato. "En la batalla" es preciso y natural en español.
- source_word: וְנַעְתּוֹר לָהֶם
  english_pob_choice: and he answered them
  chosen_spanish: y él les respondió
  alternatives_spanish:
  - y atendió su ruego
  - y fue propicio a ellos
  lexicon: HALOT
  rationale: El verbo עתר, en este contexto, expresa respuesta favorable a una súplica. "Les respondió" es sobrio y cercano al valor lexical señalado en el audit trail.
- source_word: כִּי בָטְחוּ בוֹ
  english_pob_choice: because they trusted in him
  chosen_spanish: porque confiaron en él
  alternatives_spanish:
  - porque pusieron su confianza en él
  - porque se apoyaron en él
  lexicon: HALOT
  rationale: בטח en español se rinde con "confiar" o "poner la confianza". Se elige la forma más directa y transparente para mantener el vínculo causal con la respuesta divina.
theological_decisions:
- issue: Agencia de la ayuda en la batalla
  english_pob_reading: They were helped against them.
  chosen_spanish_reading: Recibieron ayuda contra ellos.
  alternative_spanish_readings:
  - Fueron ayudados contra ellos.
  - Dios los ayudó contra ellos.
  rationale: El hebreo está en pasivo y no asigna el agente de manera explícita en la primera cláusula. La traducción conserva esa pasividad; la referencia a Dios se esclarece en las cláusulas causales siguientes, sin convertir la sintaxis en una afirmación más explícita de la que el texto da.
  doctrine_reference: Translation philosophy §§1, 3, 5
- issue: Respuesta divina a la oración
  english_pob_reading: and he answered them because they trusted in him
  chosen_spanish_reading: y él les respondió porque confiaron en él
  alternative_spanish_readings:
  - y fue escuchado por ellos porque confiaron en él
  - y atendió su ruego porque confiaron en él
  rationale: El hebreo subraya una respuesta favorable de Dios al clamor y la confianza. "Les respondió" comunica la acción divina sin añadir elementos no explicitados, y mantiene la relación entre oración, confianza y respuesta.
  doctrine_reference: Translation philosophy §§3, 6
translation_notes:
  revision_awareness: 'La redacción sigue la revisión inglesa más reciente: se mantiene la secuencia pasiva de la ayuda, el modismo de «entregados en su mano», y la formulación sobria de la respuesta divina («les respondió») en vez de una paráfrasis más interpretativa.'
  spanish_consistency_notes:
  - Se usa «Dios» para לֵאלֹהִים, coherente con el estándar POB y sin ocultar el nombre divino.
  - Se conserva «mano» en el modismo bélico para reflejar la imagen hebrea y su valor idiomático.
  - Se prefieren verbos directos y sobrios («clamaron», «respondió», «confiaron») para mantener el registro bíblico moderno sin caer en arcaísmos.
