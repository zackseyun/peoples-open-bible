translation:
  language: es
  text: Todos ellos son los rebeldes más obstinados[a], que andan como calumniadores[b]; son bronce y hierro[c]; todos ellos son corruptores[d].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «los principales rebeldes»; la expresión hebrea es intensiva y puede rendirse más literalmente como «rebeldes de rebeldes».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «andan con chismes» o «como difamadores».'
    reason: lexical_alternative
  - marker: c
    text: '«Bronce y hierro» probablemente es figurado: los retrata como duros, no refinados o de carácter vil.'
    reason: cultural_note
  - marker: d
    text: 'O: «destructores». El hebreo puede denotar a quienes arruinan o corrompen.'
    reason: lexical_alternative
lexical_decisions:
- source_word: כֻּלָּם
  english_pob_choice: All of them
  chosen_spanish: Todos ellos
  alternatives_spanish:
  - Ellos todos
  - Cada uno de ellos
  lexicon: HALOT
  rationale: El hebreo pone el alcance en primera posición para énfasis. «Todos ellos» conserva la totalidad sin sonar forzado en español.
- source_word: סָרֵי סוֹרְרִים
  english_pob_choice: the most stubborn rebels
  chosen_spanish: los más rebeldes obstinados
  alternatives_spanish:
  - rebeldes de rebeldes
  - los jefes de los rebeldes
  - enteramente obstinados
  lexicon: HALOT
  rationale: La construcción es intensiva. En español, «los más rebeldes obstinados» intenta reproducir esa fuerza superlativa/intensiva sin reducirla a un mero título jerárquico.
- source_word: הֹלְכֵי רָכִיל
  english_pob_choice: going about as slanderers
  chosen_spanish: que andan como calumniadores
  alternatives_spanish:
  - que andan con chismes
  - que van por ahí sembrando chismes
  - que andan como chismosos
  lexicon: HALOT
  rationale: La frase participial describe una conducta habitual. «Calumniadores» comunica mejor la carga moral y destructiva de רָכִיל en este contexto profético que un simple «chismosos».
- source_word: נְחֹשֶׁת וּבַרְזֶל
  english_pob_choice: bronze and iron
  chosen_spanish: bronce y hierro
  alternatives_spanish:
  - cobre y hierro
  - bronce y metal
  lexicon: HALOT
  rationale: Se conserva la pareja convencional «bronce y hierro», que en español transmite bien la imagen figurada de dureza y bajeza de carácter.
- source_word: מַשְׁחִיתִים
  english_pob_choice: corrupters
  chosen_spanish: destructores
  alternatives_spanish:
  - corruptores
  - los que corrompen
  - los que arruinan
  lexicon: HALOT
  rationale: El participio puede denotar quienes arruinan o corrompen. «Destructores» refleja con naturalidad el sentido activo y negativo, aunque se reconoce la posible connotación moral de corrupción.
- source_word: הֵמָּה
  english_pob_choice: they are
  chosen_spanish: son
  alternatives_spanish:
  - ellos son
  - son ellos
  lexicon: HALOT
  rationale: El hebreo cierra con pronombre enfático. En español, el verbo copulativo ya expresa la identificación y evita redundancia excesiva.
translation_notes:
  revision_awareness: 'El borrador sigue el audit trail inglés con equivalencias auditables: conserva la intensificación de סָרֵי סוֹרְרִים, la imagen de conducta habitual en הֹלְכֵי רָכִיל, la metáfora de «bronce y hierro» y la amplitud semántica de מַשְׁחִיתִים. No se detectaron revisiones aplicadas en el contexto inglés más reciente.'
  spanish_consistency_notes:
  - Se usa «Yahvé» como norma del proyecto solo cuando el texto lo requiera; este versículo no contiene el tetragrámaton.
  - «Calumniadores» se eligió para mantener el peso acusatorio del hebreo sin volverlo demasiado coloquial.
  - «Destructores» se mantiene en el texto principal por fluidez, dejando «corruptores» como alternativa en nota para preservar la tensión léxica.
  - La puntuación en español separa con punto y coma las cláusulas paralelas para reflejar la sintaxis acumulativa del hebreo.
