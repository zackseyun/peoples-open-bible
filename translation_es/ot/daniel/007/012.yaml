revisions:
- from: En cuanto al resto de las bestias[a], se les quitó su dominio; pero les fue dada una prolongación de vida por un tiempo y una temporada.
  to: En cuanto al resto de las bestias[a], se les quitó su dominio; pero les fue dada una prolongación de vida por un tiempo y una sazón.
  rationale: Se mantiene la estructura y el sentido del borrador, pero se sustituye «temporada» por «sazón» para reflejar mejor el par temporal arameo en un español más digno y bíblicamente legible, sin perder la distinción entre los dos términos. La nota se ajusta en consecuencia.
