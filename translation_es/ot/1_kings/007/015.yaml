translation:
  language: es
  text: Él fundió los dos pilares de bronce; la altura de uno de los pilares era de dieciocho codos[a], y una cuerda de doce codos medía alrededor de él.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «y una cuerda de doce codos circundaba el segundo pilar».

      '
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּצַר
  english_pob_choice: cast
  chosen_spanish: fundió
  alternatives_spanish:
  - fundió en molde
  - moldeó
  lexicon: HALOT
  rationale: En el contexto de pilares de bronce para el templo, el sentido metalúrgico es el decisivo. En español, 'fundió' comunica mejor la acción de vaciar metal fundido en un molde que un genérico 'formó' o 'hizo', y conserva el carácter técnico de la pieza.
- source_word: שְׁנֵי הָעַמּוּדִים
  english_pob_choice: the two bronze pillars
  chosen_spanish: los dos pilares de bronce
  alternatives_spanish:
  - las dos columnas de bronce
  lexicon: HALOT
  rationale: '''Pilares'' es el equivalente más natural en español para grandes soportes arquitectónicos independientes. ''Columnas'' es posible, pero en este contexto cultual resulta menos preciso y menos idiomático.'
- source_word: נְחֹשֶׁת
  english_pob_choice: bronze
  chosen_spanish: bronce
  alternatives_spanish:
  - cobre
  - latón
  lexicon: HALOT
  rationale: En descripciones bíblicas de objetos arquitectónicos y cultuales, נְחֹשֶׁת se entiende normalmente como 'bronce' por el material técnico implicado. 'Cobre' restringe demasiado el referente, y 'latón' no conviene históricamente.
- source_word: שְׁמֹנֶה עֶשְׂרֵה אַמָּה
  english_pob_choice: eighteen cubits
  chosen_spanish: dieciocho codos
  alternatives_spanish:
  - dieciocho codos de alto
  lexicon: HALOT
  rationale: Se conserva la unidad antigua 'codos' para mantener la medida del texto fuente. La altura se expresa en la construcción siguiente, como en el hebreo.
- source_word: קוֹמַת הָעַמּוּד הָאֶחָד
  english_pob_choice: the height of the one pillar
  chosen_spanish: la altura del primer pilar
  alternatives_spanish:
  - la altura de uno de los pilares
  - la altura del pilar uno
  lexicon: HALOT
  rationale: '''El primer pilar'' traduce con naturalidad el valor definido de הָאֶחָד y evita una formulación extraña en español. Aunque el hebreo dice literalmente ''el uno'', el contexto contrasta esta medida con la del otro pilar en el versículo.'
- source_word: וְחוּט
  english_pob_choice: and a line
  chosen_spanish: y una cuerda
  alternatives_spanish:
  - y un cordel
  - y una línea
  lexicon: HALOT
  rationale: En español, 'cuerda' transmite mejor el instrumento flexible de medición/circunferencia que un calco como 'línea'. Conserva además la opción alternativa del texto auditado donde la cuerda rodea el pilar.
- source_word: שְׁתֵּים עֶשְׂרֵה אַמָּה
  english_pob_choice: twelve cubits
  chosen_spanish: doce codos
  alternatives_spanish:
  - doce codos de longitud
  lexicon: HALOT
  rationale: Se mantiene la misma unidad antigua y la lectura directa de la medida sin explicitar más de lo que el hebreo dice.
- source_word: יָסֹב
  english_pob_choice: measured around
  chosen_spanish: lo rodeaba
  alternatives_spanish:
  - lo medía alrededor
  - lo ceñía
  lexicon: HALOT
  rationale: El hebreo puede leerse como un giro de circunferencia o de medición alrededor del pilar. 'Lo rodeaba' preserva la imagen concreta y deja abierta la medición implícita sin forzar una interpretación técnica en el cuerpo principal.
- source_word: הָעַמּוּד הַשֵּׁנִי
  english_pob_choice: the second pillar
  chosen_spanish: el segundo pilar
  alternatives_spanish:
  - el otro pilar
  lexicon: HALOT
  rationale: La frase hebrea distingue claramente un segundo pilar; sin embargo, la revisión inglesa observó que el pronombre final puede referirse al pilar en general sin subrayar contraste. En español, la forma natural y fiel es mantener la referencia implícita dentro de la misma oración sin repetirla.
