translation:
  language: es
  text: Y escribió Moisés todas las palabras de Yahvé. Se levantó muy de mañana, y edificó un altar al pie del monte[a], y doce pilares[b] para las doce tribus de Israel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «bajo el monte», es decir, en su base o al pie.'
    reason: lexical_alternative
  - marker: b
    text: O «doce piedras en pie».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּכְתֹּב
  english_pob_choice: wrote down
  chosen_spanish: escribió
  alternatives_spanish:
  - anotó
  - escribió por escrito
  lexicon: HALOT
  rationale: כתב significa 'escribir'. En español, 'escribió' comunica con naturalidad la acción de poner por escrito las palabras recibidas; 'escribió por escrito' sería redundante y 'anotó' estrecha innecesariamente el matiz.
- source_word: כָּל דִּבְרֵי יְהוָה
  english_pob_choice: all the words of Yahweh
  chosen_spanish: todas las palabras de Yahvé
  alternatives_spanish:
  - todas las palabras de Yahvé
  - todas las palabras del Yahvé
  lexicon: HALOT
  rationale: דִּבְרֵי aquí se entiende de manera directa como 'palabras', no como 'mandamientos' o 'declaraciones'. Se conserva 'Yahvé' para el nombre divino según la pauta del proyecto, evitando la sustitución por un título.
- source_word: וַיַּשְׁכֵּם בַּבֹּקֶר
  english_pob_choice: He rose early in the morning
  chosen_spanish: Se levantó muy de mañana
  alternatives_spanish:
  - Se levantó temprano en la mañana
  - Se levantó al amanecer
  lexicon: HALOT
  rationale: El hebreo expresa levantarse temprano; en español 'muy de mañana' suena natural y mantiene el énfasis temporal. Se evitó una frase más literal pero menos fluida.
- source_word: וַיִּבֶן מִזְבֵּחַ
  english_pob_choice: built an altar
  chosen_spanish: edificó un altar
  alternatives_spanish:
  - construyó un altar
  - levantó un altar
  lexicon: HALOT
  rationale: בנה + מזבח admite 'edificar' en registro bíblico y claro. 'Edificó' conserva dignidad formal; 'levantó' sería posible, pero puede sonar más general.
- source_word: תַּחַת הָהָר
  english_pob_choice: at the foot of the mountain
  chosen_spanish: al pie del monte
  alternatives_spanish:
  - al pie de la montaña
  - debajo del monte
  lexicon: HALOT
  rationale: Aunque el hebreo dice literalmente 'debajo del monte', el sentido locativo es 'en la base'. 'Al pie del monte' refleja bien esa relación espacial en español natural. Se mantiene 'monte' por estilo bíblico y por la proximidad al registro del texto.
- source_word: וּשְׁתֵּים עֶשְׂרֵה מַצֵּבָה
  english_pob_choice: and twelve pillars
  chosen_spanish: y doce pilares
  alternatives_spanish:
  - y doce piedras en pie
  - y doce estelas
  lexicon: HALOT
  rationale: מַצֵּבָה puede referirse a una piedra erguida o pilar/estela. 'Pilares' sigue la opción inglesa del POB y es comprensible en español; se preserva la ambigüedad histórica sin forzar una glosa interpretativa en el texto principal.
- source_word: לִשְׁנֵים עָשָׂר שִׁבְטֵי יִשְׂרָאֵל
  english_pob_choice: for the twelve tribes of Israel
  chosen_spanish: para las doce tribus de Israel
  alternatives_spanish:
  - en representación de las doce tribus de Israel
  - correspondientes a las doce tribus de Israel
  lexicon: HALOT
  rationale: La preposición ל aquí indica correspondencia o representación. 'Para' comunica naturalmente esa relación en español sin exceder el hebreo.
theological_decisions:
- issue: Rendering the divine name יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - SEÑOR
  rationale: Se sigue la directriz del proyecto de transliterar el Tetragrámaton como 'Yahvé'. Se evita 'SEÑOR' porque en este corpus se busca transparencia respecto del nombre propio divino y no un sustituto litúrgico.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: The spatial phrase תַּחַת הָהָר
  english_pob_reading: at the foot of the mountain
  chosen_spanish_reading: al pie del monte
  alternative_spanish_readings:
  - debajo del monte
  - en la base del monte
  rationale: La imagen hebrea literalmente dice 'debajo del monte', pero el valor contextual es locativo, no de estar oculto bajo una masa. 'Al pie del monte' preserva esa tensión semántica y es idiomático en español.
  doctrine_reference: Lexical equivalence; no doctrinal issue.
translation_notes:
  revision_awareness: 'El pasaje coincide plenamente con el texto fuente y con el audit trail inglés: no se requerían cambios de revisión. Se mantuvo la decisión del POB inglés de preservar el nombre divino como transliteración y de expresar תַּחַת הָהָר con un equivalente espacial idiomático.'
  spanish_consistency_notes:
  - Se mantuvo el registro bíblico sobrio y directo, sin calcos innecesarios.
  - '''Monte'' se usó de forma consistente con el estilo bíblico en español, aunque ''montaña'' sería igualmente posible.'
  - '''Pilares'' conserva la ambigüedad de מַצֵּבָה sin introducir una interpretación más específica en el texto principal.'
