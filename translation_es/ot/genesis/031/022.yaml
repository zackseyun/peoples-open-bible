translation:
  language: es
  text: Al tercer día se le informó[a] a Labán que Jacob había huido.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «se le avisó a Labán que Jacob había huido»; o: «le fue reportado a Labán que Jacob había huido».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֻּגַּד
  english_pob_choice: was told
  chosen_spanish: se le informó
  alternatives_spanish:
  - le dijeron
  - fue informado
  - se dijo
  lexicon: HALOT
  rationale: El Hophal de נגד expresa que la información fue comunicada a Labán. En español, «se le informó» conserva la pasiva impersonal y suena natural sin añadir un sujeto explícito.
- source_word: לְלָבָן
  english_pob_choice: Laban
  chosen_spanish: a Labán
  alternatives_spanish:
  - para Labán
  - a Laban
  lexicon: HALOT
  rationale: La preposición ל indica destinatario/recipiente del informe; en español se expresa con «a». Se mantiene la transliteración «Labán».
- source_word: בַּיּוֹם הַשְּׁלִישִׁי
  english_pob_choice: On the third day
  chosen_spanish: Al tercer día
  alternatives_spanish:
  - En el tercer día
  - El tercer día
  lexicon: HALOT
  rationale: La frase temporal se expresa de manera idiomática en español con «Al tercer día», que conserva la secuencia sin añadir información temporal no explícita.
- source_word: כִּי
  english_pob_choice: that
  chosen_spanish: que
  alternatives_spanish:
  - porque
  - pues
  lexicon: HALOT
  rationale: Aquí כִּי introduce el contenido del informe; «que» marca bien el discurso indirecto en español.
- source_word: בָרַח
  english_pob_choice: had fled
  chosen_spanish: había huido
  alternatives_spanish:
  - huyó
  - había escapado
  - se había fugado
  lexicon: HALOT
  rationale: בָרַח significa huir/escapar. «Había huido» conserva el valor de acción previa al reporte y evita el tono coloquial de otras opciones.
- source_word: יַעֲקֹב
  english_pob_choice: Jacob
  chosen_spanish: Jacob
  alternatives_spanish:
  - Yaacov
  lexicon: HALOT
  rationale: Nombre propio transliterado según la convención editorial estándar en español bíblico.
translation_notes:
  revision_awareness: El contexto inglés presenta alta concordancia y no requiere ajustes textuales; la versión española sigue de cerca la sintaxis del hebreo sin calcos innecesarios, manteniendo la alternativa de traducción pasiva/impersonal documentada por el POB inglés.
  spanish_consistency_notes:
  - Se mantiene «Labán» y «Jacob» como nombres propios transliterados de forma estándar.
  - Se usó «había huido» para reflejar el anterioridad relativa del evento reportado, en paralelo con el inglés POB.
  - No se introdujo vocabulario tradicionalizante como «le fue dicho» o «escapado» sin necesidad contextual.
