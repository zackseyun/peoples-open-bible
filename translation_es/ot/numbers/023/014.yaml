translation:
  language: es
  text: Así que lo llevó al Campo de Zofim[a], a la cumbre de Pisgá, y edificó siete altares, y ofreció un toro y un carnero sobre cada altar.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «el campo de Zofim». El hebreo puede entenderse como un nombre de lugar conservado o como una descripción traducida (“campo de vigilantes/atalayas”).
    reason: alternative_reading
lexical_decisions:
- source_word: וַיִּקָּחֵהוּ
  english_pob_choice: So he took him
  chosen_spanish: Así que lo llevó
  alternatives_spanish:
  - Y lo llevó
  - Entonces lo llevó
  lexicon: HALOT
  rationale: El imperfecto consecutivo narra una acción sucesiva; «así que» comunica bien la continuidad narrativa sin sonar mecánico. «Llevar» conserva el sentido de trasladar a alguien a un lugar, acorde con el contexto de Balaam y Balac.
- source_word: שְׂדֵה צֹפִים
  english_pob_choice: the Field of Zophim
  chosen_spanish: Campo de Zofim
  alternatives_spanish:
  - Campo de vigías
  - Campo de los vigilantes
  - Campo de Zofim
  lexicon: HALOT
  rationale: La revisión inglesa favorece preservar el probable nombre propio. En español, «Zofim» mantiene esa decisión formal; «Campo» conserva el sustantivo geográfico sin forzar una traducción interpretativa. La nota recoge la posible lectura apelativa del hebreo.
- source_word: אֶל רֹאשׁ הַפִּסְגָּה
  english_pob_choice: to the top of Pisgah
  chosen_spanish: a la cumbre de Pisgá
  alternatives_spanish:
  - al tope de Pisgá
  - a la cima de Pisgá
  - a la cumbre del Pisgá
  lexicon: HALOT
  rationale: «רֹאשׁ» en contexto geográfico es «cumbre»/«cima». Se conserva «Pisgá» como topónimo, con adaptación ortográfica al español. «A la cumbre de Pisgá» es natural y fiel.
- source_word: וַיִּבֶן שִׁבְעָה מִזְבְּחֹת
  english_pob_choice: and built seven altars
  chosen_spanish: y edificó siete altares
  alternatives_spanish:
  - y construyó siete altares
  - y levantó siete altares
  lexicon: HALOT
  rationale: «בנה» admite «edificar» en contextos cultuales; en español bíblico sigue siendo claro y digno. Se evita una paráfrasis más libre.
- source_word: וַיַּעַל
  english_pob_choice: and offered
  chosen_spanish: y ofreció
  alternatives_spanish:
  - y sacrificó
  - y hizo subir
  lexicon: HALOT
  rationale: En contexto sacrificial, עלה se entiende como ofrecer. «Ofreció» es idiomático y respeta la acción cultual sin añadir una glosa excesiva.
- source_word: פָּר וָאַיִל
  english_pob_choice: a bull and a ram
  chosen_spanish: un toro y un carnero
  alternatives_spanish:
  - un becerro y un carnero
  - un toro y un macho carnero
  lexicon: HALOT
  rationale: «פָּר» es un bovino adulto, mejor expresado como «toro»; «אַיִל» es «carnero». Los indefinidos españoles reflejan el carácter distributivo del ofrecimiento sin inventar un número explícito.
- source_word: בַּמִּזְבֵּחַ
  english_pob_choice: on each altar
  chosen_spanish: sobre cada altar
  alternatives_spanish:
  - en cada altar
  - sobre el altar
  lexicon: HALOT
  rationale: La singular hebrea funciona distributivamente con los siete altares del contexto; «sobre cada altar» hace explícita esa distribución en español. «Sobre» conserva mejor la imagen sacrificial que «en».
translation_notes:
  revision_awareness: La nota auditiva en inglés pasó de traducir el sintagma como «Field of Watchers» a preservarlo como «Field of Zophim» para dar mayor peso al posible topónimo. El español sigue esa revisión y evita una traducción interpretativa que pudiera borrar el nombre propio probable.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma del proyecto cuando aparezca el nombre divino; este versículo no lo contiene.
  - Se conserva «Pisgá» como adaptación coherente de Pisgah, evitando transliteraciones inglesas innecesarias.
  - Se usa el registro bíblico moderno «edificó» en lugar de un calco rígido de «construyó» para el contexto de altares.
  - La distribución implícita de los sacrificios se explicita con «sobre cada altar», siguiendo la lógica narrativa del hebreo y el audit trail inglés.
