base_translation:
  language: en
  yaml_path: translation/ot/proverbs/016/006.yaml
  text: By steadfast love and faithfulness iniquity is atoned for[b][a], and by the fear of Yahweh one turns away from evil.
  footnotes:
  - marker: a
    text: Or 'By steadfast love and truth iniquity is atoned for.' The Hebrew pair often carries the sense of loyal love and faithfulness, but 'truth' is also a possible rendering of אֱמֶת.
    reason: lexical_alternative
  - marker: b
    text: The verb 'is atoned for' leaves the agent unstated in Hebrew; the proverb does not explicitly say whether the focus is on God's action, the role of covenant virtues, or both.
    reason: alternative_reading
