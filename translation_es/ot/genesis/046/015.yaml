translation:
  language: es
  text: Estos son los hijos de Lea, los que ella le dio a Jacob en Paddán-aram, junto con Dina, su hija. El total[a] de sus hijos y sus hijas fue de treinta y tres[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «toda persona» o «el total de personas»; aquí es un modismo de recuento, no «alma».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «En total, sus hijos y sus hijas fueron treinta y tres personas».'
    reason: previous_rendering
lexical_decisions:
- source_word: בְּנֵי
  english_pob_choice: sons
  chosen_spanish: hijos
  alternatives_spanish:
  - varones
  - descendientes
  lexicon: HALOT
  rationale: Aunque el hebreo dice literalmente «hijos de Lea», el contexto inmediato incluye a Dina y el listado genealógico apunta al conjunto familiar. En español, «hijos» puede abarcar hijos e hijas sin perder naturalidad, y evita una discordancia interna que tendría «hijos» seguido de una hija nombrada aparte.
- source_word: אֲשֶׁר יָלְדָה לְיַעֲקֹב
  english_pob_choice: whom she bore to Jacob
  chosen_spanish: que ella dio a luz a Jacob
  alternatives_spanish:
  - que ella le dio a luz a Jacob
  - que ella parió a Jacob
  lexicon: HALOT
  rationale: «Dar a luz» preserva el sentido maternal de יָלַד sin sonar arcaico. Se mantiene «a Jacob» como complemento de destino, siguiendo el hebreo y la lógica genealógica.
- source_word: בְּפַדַּן אֲרָם
  english_pob_choice: in Paddan-aram
  chosen_spanish: en Paddán-aram
  alternatives_spanish:
  - en Paddan-aram
  - en la llanura de Aram
  lexicon: HALOT
  rationale: Se conserva el nombre propio geográfico transliterado, como en el texto fuente y en el audit trail en inglés. La acentuación adapta el nombre al español sin traducirlo.
- source_word: וְאֵת דִּינָה בִתּוֹ
  english_pob_choice: along with Dinah his daughter
  chosen_spanish: junto con Dina, su hija
  alternatives_spanish:
  - y Dina, su hija
  - además de Dina, su hija
  lexicon: HALOT
  rationale: «Junto con» reproduce la fuerza aditiva de וְאֵת sin dar la impresión de que Dina pertenece al grupo masculino de «hijos». Se conserva el parentesco explícito con «su hija».
- source_word: כָּל נֶפֶשׁ
  english_pob_choice: The total number of ...
  chosen_spanish: El total de
  alternatives_spanish:
  - Todas las personas de
  - El número total de
  lexicon: HALOT
  rationale: En este contexto genealógico, נֶפֶשׁ significa «persona(s)» o el total de individuos, no «alma». «El total de» expresa con naturalidad la suma sin introducir una palabra teológicamente cargada que no corresponde aquí.
- source_word: בָּנָיו וּבְנוֹתָיו
  english_pob_choice: his sons and his daughters
  chosen_spanish: sus hijos y sus hijas
  alternatives_spanish:
  - sus hijos
  - su descendencia
  lexicon: HALOT
  rationale: El hebreo distingue explícitamente entre varones y mujeres; por eso se conserva la duplicación. En español, «sus hijos y sus hijas» es claro y fiel, aunque el sujeto inmediato ya use «hijos» en sentido amplio.
- source_word: שְׁלֹשִׁים וְשָׁלֹשׁ
  english_pob_choice: thirty-three
  chosen_spanish: treinta y tres
  alternatives_spanish:
  - '33'
  lexicon: HALOT
  rationale: Número cardinal directo, traducido con ortografía normal en español.
theological_decisions:
- issue: Sentido de נֶפֶשׁ en contexto genealógico/censal
  english_pob_reading: Hebrew 'all the soul/person'—an idiom meaning the total number of persons.
  chosen_spanish_reading: «El total de» / el total de personas, sin traducirlo como «alma».
  alternative_spanish_readings:
  - «todas las almas»
  - «todas las personas»
  rationale: Aquí נֶפֶשׁ no expresa la antropología del alma, sino un recuento de individuos. Traducirlo literalmente como «alma» oscurecería el uso idiomático y podría sugerir una lectura doctrinal ajena al contexto.
  doctrine_reference: Uso semántico de נֶפֶשׁ en listas censales y genealógicas; cf. interpretación lexical en contextos de recuento.
translation_notes:
  revision_awareness: El texto inglés auditado pasó por una revisión para mejorar la frase final, de una formulación pesada sobre «persons» a «The total number of his sons and his daughters was thirty-three». La versión española sigue esa intención revisada con una frase natural («El total de sus hijos y sus hijas fue treinta y tres») y, al mismo tiempo, mantiene el valor idiomático de נֶפֶשׁ mediante la nota explicativa.
  spanish_consistency_notes:
  - Se usa «Dios»/«Yahvé» según corresponda en otros versículos; aquí no aparece el nombre divino.
  - Se mantiene la transliteración de Paddán-aram como nombre propio geográfico.
  - Se prefirió «hijos» en la cláusula inicial y luego «sus hijos y sus hijas» para preservar el matiz inclusivo del recuento sin forzar un calco antinatural.
  - No se usa «alma» en el cuerpo principal porque aquí el hebreo es idiomático de conteo.
