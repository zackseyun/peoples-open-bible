    reason: lexical_alternative
  revision_rationale: Se ajusta la última cláusula para reflejar con más exactitud el hebreo sin añadir 'mirada' ni otro elemento corporal no expreso, en línea con la revisión documentada del inglés POB. También se fortalece נִקְשֶׁה con 'angustiado', que comunica mejor la presión severa del contexto, y se corrige la puntuación de la nota. La alternativa interpretativa 'mirará hacia arriba' queda conservada en nota.
