  rationale: Se corrige la nota b para que ofrezca una alternativa real y útil, se simplifica el aparato eliminando una nota no necesaria, y se ajusta levemente la cláusula de la dispersión para reflejar mejor la construcción griega sin perder naturalidad en español.
