translation:
  language: es
  text: 'De los hijos de Zabulón, por sus generaciones, por sus clanes, por las casas de sus padres, según el número de nombres, de veinte años en adelante, todo varón[a] capaz de salir a la guerra:'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «apto para el servicio militar». El hebreo dice literalmente «que sale a la guerra».
    reason: lexical_alternative
lexical_decisions:
- source_word: לִבְנֵי
  english_pob_choice: For the sons of
  chosen_spanish: De los hijos de
  alternatives_spanish:
  - Para los hijos de
  - De los descendientes de
  lexicon: HALOT
  rationale: En este encabezado censal, el prefijo funcional indica pertenencia o adscripción del grupo. «De los hijos de» conserva el tono administrativo y la estructura formularia sin volverla innecesariamente interpretativa.
- source_word: זְבוּלֻן
  english_pob_choice: Zebulun
  chosen_spanish: Zabulón
  alternatives_spanish:
  - Zebulón
  - Zebulun
  lexicon: HALOT
  rationale: Se usa la forma española tradicional del nombre tribal, ampliamente reconocible y adecuada para lectura eclesial en español.
- source_word: תּוֹלְדֹתָם
  english_pob_choice: by their generations
  chosen_spanish: por sus generaciones
  alternatives_spanish:
  - según sus generaciones
  - por sus linajes
  lexicon: HALOT
  rationale: «Generaciones» mantiene la referencia genealógica/descendiente del hebreo y la forma formal del original; «linajes» aclararía, pero desplaza el término base.
- source_word: לְמִשְׁפְּחֹתָם
  english_pob_choice: by their clans
  chosen_spanish: por sus clanes
  alternatives_spanish:
  - por sus familias
  - según sus familias
  lexicon: HALOT
  rationale: «Clanes» comunica mejor la subdivisión tribal que el español «familias», que puede sonar demasiado nuclear y perder la organización censal del pasaje.
- source_word: לְבֵית אֲבֹתָם
  english_pob_choice: by their fathers’ houses
  chosen_spanish: por las casas de sus padres
  alternatives_spanish:
  - por las casas paternas
  - por sus casas ancestrales
  lexicon: HALOT
  rationale: Se conserva la expresión técnica de parentesco sin sustituirla por una paráfrasis; «casas de sus padres» es transparente y suficientemente literal para el contexto de censo.
- source_word: בְּמִסְפַּר שֵׁמֹת
  english_pob_choice: according to the number of names
  chosen_spanish: según el número de nombres
  alternatives_spanish:
  - conforme al número de nombres
  - por el número de nombres
  lexicon: HALOT
  rationale: La frase se mantiene casi de manera formal porque el hebreo es formularia e idiomática para el conteo de individuos; «según» refleja bien el valor de base de בְּ.
- source_word: מִבֶּן עֶשְׂרִים שָׁנָה וָמַעְלָה
  english_pob_choice: from twenty years old and upward
  chosen_spanish: de veinte años arriba
  alternatives_spanish:
  - desde los veinte años en adelante
  - de veinte años y más
  lexicon: HALOT
  rationale: La edad mínima se expresa de modo natural en español y sigue de cerca la fórmula hebrea de umbral etario. «Arriba» conserva la concisión del original y es idiomático en contexto enumerativo.
- source_word: כֹּל
  english_pob_choice: every male
  chosen_spanish: todo varón
  alternatives_spanish:
  - todo hombre
  - cada varón
  lexicon: HALOT
  rationale: El hebreo es explícitamente masculino en este censo militar. «Varón» es más preciso y sobrio que «hombre» en un contexto de elegibilidad militar.
- source_word: יֹצֵא צָבָא
  english_pob_choice: able to go out to war
  chosen_spanish: capaz de salir a la guerra
  alternatives_spanish:
  - apto para salir a la guerra
  - capaz de ir a la guerra
  - apto para el servicio militar
  lexicon: HALOT
  rationale: Se conserva el giro idiomático hebreo «salir a la guerra» porque el original subraya el lenguaje militar; «capaz de» expresa la aptitud funcional que el inglés POB también hizo explícita. Se evita reemplazarlo por una sola frase técnica que borre el color idiomático.
theological_decisions:
- issue: Referencia masculina y militar del censo
  english_pob_reading: every male able to go out to war
  chosen_spanish_reading: todo varón capaz de salir a la guerra
  alternative_spanish_readings:
  - todos los que pudieran salir a la guerra
  - todo hombre apto para el servicio militar
  rationale: El hebreo del pasaje delimita el censo a varones en edad militar. La traducción mantiene esa restricción de forma explícita y no la neutraliza, preservando la precisión histórica y legal del texto.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
translation_notes:
  revision_awareness: La versión inglesa revisada cambió de «every man» a «every male» para mayor correspondencia con el hebreo y consistencia interna. El español adopta esa precisión con «todo varón», manteniendo además la idiomaticidad de «salir a la guerra» como calco controlado del giro hebreo.
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el texto hebreo lo exige; aquí no aparece.
  - Se prefiere «varón» para reflejar con exactitud el referente masculino del censo.
  - La estructura formularia del versículo se mantiene para conservar el tono administrativo y genealógico.
  - La nota al pie preserva la alternativa semántica que el inglés POB documenta para יֹצֵא צָבָא.
