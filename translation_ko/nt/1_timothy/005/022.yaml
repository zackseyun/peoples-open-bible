base_translation:
  language: en
  yaml_path: translation/nt/1_timothy/005/022.yaml
  text: Do not lay hands on anyone hastily[a], nor share in the sins of others; keep yourself pure.
  footnotes:
  - marker: a
    text: Or, more specifically in context, 'Do not appoint/ordain anyone too quickly.' The Greek literally says 'lay hands on,' an idiom often associated with commissioning or recognition for ministry.
    reason: lexical_alternative
translation:
  language: ko
  text: 누구에게도 성급히 안수하지[a] 마십시오. 다른 사람들의 죄에 참여하지도 마십시오. 그대 자신을 순결하게 지키십시오.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 본 문맥에서 보다 구체적으로 「누구도 너무 빨리 임직하지 말라」. 헬라어는 직역상 「손을 얹다」로, 사역을 위한 임명·인정과 연관된 관용 표현이다.
    reason: lexical_alternative
lexical_decisions:
- source_word: χεῖρας ταχέως μηδενὶ ἐπιτίθει
  english_pob_choice: Do not lay hands on anyone hastily
  chosen_korean: 누구에게도 성급히 안수하지 마십시오
  alternatives_korean:
