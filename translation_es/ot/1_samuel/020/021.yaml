base_translation:
  language: en
  yaml_path: translation/ot/1_samuel/020/021.yaml
  text: And behold[a], I will send the young man, saying, ‘Go, find the arrows.’ If I plainly say to the young man, ‘Behold, the arrows are on this side of you; take them and come,’ then there is peace for you and no danger[b], as Yahweh lives.
  footnotes:
