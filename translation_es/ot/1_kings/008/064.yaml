revisions:
- from: En aquel día el rey consagró el centro del atrio que estaba delante de la casa de Yahvé[a], porque allí hizo el holocausto, la ofrenda de cereal y las porciones de grasa de los sacrificios de paz[c][b]; pues el altar de bronce que estaba delante de Yahvé era demasiado pequeño para contener el holocausto, la ofrenda de cereal y las porciones de grasa de los sacrificios de paz.
  to: En aquel día el rey consagró el medio del atrio[a] que estaba delante de la casa de Yahvé[b], porque allí ofreció el holocausto, la ofrenda de cereal y las porciones de grasa de los sacrificios de paz[c]; pues el altar de bronce que estaba delante de Yahvé era demasiado pequeño para contener el holocausto, la ofrenda de cereal y las porciones de grasa de los sacrificios de paz.
  rationale: 'Se corrige ''allí hizo'' a ''allí ofreció'' para reflejar el valor idiomático sacrificial de עָשָׂה en este contexto y alinearse con la decisión léxica ya auditada por POB. También se repara la nota [a] para que exprese una alternativa real: el texto principal usa ''medio del atrio'' y la nota ofrece ''centro del atrio'', preservando la alternativa documentada entre ''middle'' y ''midst/center''. Se mantiene el resto de la terminología cultual y el uso de ''Yahvé''.'
