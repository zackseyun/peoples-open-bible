base_translation:
  language: en
  yaml_path: translation/ot/daniel/006/014.yaml
  text: Then they answered and said before the king[a], “Daniel, who is one of the exiles from Judah, pays no attention to you, O king, or to the injunction that you have signed[c][b], but three times a day he makes his petition.”
  footnotes:
  - marker: a
    text: Or 'shows no regard for you.' The Aramaic idiom literally speaks of not setting attention or regard upon the king.
    reason: lexical_alternative
  - marker: b
    text: Or 'interdict' or 'decree' for 'injunction.' The term refers to a binding legal prohibition.
    reason: lexical_alternative
  - marker: c
    text: Literally 'he seeks his petition.' The expression means that he continues making his request in prayer; the recipient is not explicitly named in this clause, though the context identifies Daniel's God.
    reason: lexical_alternative
