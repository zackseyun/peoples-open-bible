translation:
  language: es
  text: Y enviaré contra ustedes las fieras del campo[a], y los dejarán en duelo[b], destruirán su ganado, los reducirán en número y sus caminos quedarán desolados[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «las bestias del campo».
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo idiomático: «los dejarán en duelo». El verbo suele implicar especialmente la pérdida de hijos, aunque aquí el hebreo no lo expresa de forma explícita.'
    reason: lexical_alternative
  - marker: c
    text: O «sus sendas quedarán desoladas»; el sentido probablemente apunta a caminos o rutas de viaje desiertos.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהִשְׁלַחְתִּי
  english_pob_choice: And I will send
  chosen_spanish: Y enviaré
  alternatives_spanish:
  - Y soltaré
  - Y dejaré ir
  lexicon: HALOT
  rationale: El hitpael/hiphil con sujeto en primera persona expresa una acción causal enviada por Dios. «Enviaré» comunica con naturalidad la agencia divina sin añadir intensidad interpretativa innecesaria.
- source_word: בָכֶם
  english_pob_choice: against you
  chosen_spanish: contra ustedes
  alternatives_spanish:
  - entre ustedes
  - sobre ustedes
  lexicon: HALOT
  rationale: La preposición con acción hostil se rinde mejor en español como «contra ustedes», que conserva el valor de juicio y agresión del contexto de maldición pactual.
- source_word: חַיַּת הַשָּׂדֶה
  english_pob_choice: the wild animals of the field
  chosen_spanish: las fieras del campo
  alternatives_spanish:
  - los animales salvajes del campo
  - las bestias del campo
  lexicon: HALOT
  rationale: «Fieras del campo» es una equivalencia natural y bíblica en español para el conjunto de animales salvajes terrestres. Mantiene el valor de clase y evita la aspereza excesiva de una traducción más literal.
- source_word: וְשִׁכְּלָה אֶתְכֶם
  english_pob_choice: and they will bereave you
  chosen_spanish: y los privarán de hijos
  alternatives_spanish:
  - y los dejarán sin hijos
  - y los harán quedar sin hijos
  lexicon: HALOT
  rationale: El verbo שׁכל suele implicar despojar de hijos en un contexto de maldición. En español, «privarán de hijos» expresa esa fuerza idiomática de forma clara, pero no se añade un objeto explícito que el hebreo no menciona de manera directa.
- source_word: וְהִכְרִיתָה אֶת בְּהֶמְתְּכֶם
  english_pob_choice: cut off your livestock
  chosen_spanish: destruirán su ganado
  alternatives_spanish:
  - extirparán su ganado
  - cortarán su ganado
  lexicon: HALOT
  rationale: כרת conserva el matiz de cortar/exterminar bajo juicio. En español, «destruirán su ganado» comunica bien el resultado pactual sin forzar un calco extraño como «cortarán su ganado».
- source_word: בְּהֶמְתְּכֶם
  english_pob_choice: your livestock
  chosen_spanish: su ganado
  alternatives_spanish:
  - sus animales domésticos
  - su hacienda
  lexicon: HALOT
  rationale: «Ganado» es el equivalente más directo y natural para בְּהֵמָה en este contexto de animales domesticados poseídos por el pueblo.
- source_word: וְהִמְעִיטָה אֶתְכֶם
  english_pob_choice: reduce your number
  chosen_spanish: los reducirán en número
  alternatives_spanish:
  - los harán pocos
  - los disminuirán
  lexicon: HALOT
  rationale: El hiphil de מעט significa hacer pocos o disminuir. «Reducirán en número» preserva con claridad la idea de disminución poblacional sin perder el tono de juicio.
- source_word: וְנָשַׁמּוּ דַּרְכֵיכֶם
  english_pob_choice: and your roads will become desolate
  chosen_spanish: y sus caminos quedarán desolados
  alternatives_spanish:
  - y sus caminos estarán desiertos
  - y sus rutas quedarán desoladas
  lexicon: HALOT
  rationale: «Caminos» traduce דֶּרֶךְ en plural de manera natural en español, y «quedarán desolados» conserva el estado resultante de devastación/despoblación. «Quedarán» ayuda a expresar el cambio de estado implícito en el verbo.
theological_decisions:
- issue: Fuerza pactual del juicio divino y agencia directa de Yahvé
  english_pob_reading: And I will send ...
  chosen_spanish_reading: Y enviaré ...
  alternative_spanish_readings:
  - Y soltaré ...
  - Y dejaré ir ...
  rationale: El texto presenta a Yahvé como el agente directo del castigo pactual. «Enviaré» mantiene esa agencia sin suavizarla ni convertirla en una mera permisión.
  doctrine_reference: Levítico 26:14–39; teología del pacto y las maldiciones del pacto.
- issue: Verbo de privación/esterilidad implícita en שׁכל
  english_pob_reading: they will bereave you
  chosen_spanish_reading: los privarán de hijos
  alternative_spanish_readings:
  - los dejarán sin hijos
  - los harán quedar sin hijos
  rationale: El hebreo no nombra literalmente «hijos» en la forma verbal, pero el verbo suele llevar ese sentido de privación familiar. Se conserva la idea idiomática de pérdida grave, pero se evita añadir una precisión que el texto no explicita aquí.
  doctrine_reference: Principio de cautela semántica; evitar sobrerrepresentar un objeto implícito.
translation_notes:
  revision_awareness: 'La versión inglesa revisada eliminó la explicitación «of children» por no estar expresada de manera literal en el hebreo. La presente redacción española sigue esa revisión: conserva el valor idiomático de שׁכל sin insertar «hijos» en el texto principal, aunque lo explica en nota para la claridad semántica.'
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» como forma estándar del nombre divino en español del proyecto, aunque este versículo no contiene el tetragrámaton explícito en la línea citada.
  - Se prefirió «caminos» en vez de «conductas» porque דַּרְכֵיכֶם aquí encaja mejor con rutas o vías desiertas en un contexto de devastación social.
  - Se evitó «siervos» o términos eclesiales para no debilitar el lenguaje de juicio literal del pasaje.
