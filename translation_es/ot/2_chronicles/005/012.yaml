base_translation:
  language: en
  yaml_path: translation/ot/2_chronicles/005/012.yaml
  text: And the Levites who were the singers—all of them[a], Asaph, Heman, Jeduthun, and their sons and their brothers—were clothed in fine linen, with cymbals, harps, and lyres, standing east of the altar[b]; and with them were one hundred twenty priests blowing trumpets.
  footnotes:
  - marker: a
    text: Or 'harp-like instruments' for נְבָלִים; the precise distinction between the ancient stringed instruments named here is uncertain.
    reason: lexical_alternative
  - marker: b
    text: Or 'standing on the east side of the altar.'
    reason: lexical_alternative
