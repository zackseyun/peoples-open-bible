base_translation:
  language: en
  yaml_path: translation/ot/amos/001/005.yaml
  text: I will break the gate-bar of Damascus[a], and I will cut off the inhabitant from the Valley of Aven and the one who holds the scepter from Beth-eden[b]; and the people of Aram will go into exile to Kir,” says Yahweh.
  footnotes:
