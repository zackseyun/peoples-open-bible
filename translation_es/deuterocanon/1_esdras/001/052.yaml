translation:
  language: es
  text: Y prendieron fuego a la casa del Señor[a][b], y derribaron los muros de Jerusalén, y quemaron sus torres con fuego.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «incendiaron la casa del Señor»; el verbo griego aparece dos veces con el mismo campo semántico de quemar o prender fuego.
    reason: lexical_alternative
  - marker: b
    text: «La casa del Señor» se refiere al templo de Jerusalén.
    reason: cross_reference
lexical_decisions:
- source_word: ἐνεπύρισαν
  english_pob_choice: burned
  chosen_spanish: prendieron fuego a
  alternatives_spanish:
  - quemaron
  - incendiaron
  lexicon: LSJ
  rationale: El verbo griego significa quemar o incendiar. «Prendieron fuego a» conserva bien la acción repetida del verso y permite una construcción natural en español sin forzar el sentido de destrucción total.
- source_word: τὸν οἶκον τοῦ κυρίου
  english_pob_choice: the house of the Lord
  chosen_spanish: la casa del Señor
  alternatives_spanish:
  - el templo del Señor
  - la casa del Señor
  lexicon: LSJ
  rationale: οἶκος es literalmente «casa». En este contexto alude al templo, pero la forma «casa del Señor» preserva de manera más directa la imagen del original griego. Se usa «Señor» siguiendo el tratamiento usual de κύριος en el texto griego base.
- source_word: κατέλυσαν
  english_pob_choice: tore down
  chosen_spanish: derribaron
  alternatives_spanish:
  - destruyeron
  - demolieron
  - tumbaron
  lexicon: LSJ
  rationale: El verbo expresa derribar o desmantelar estructuras. «Derribaron» reproduce con precisión ese matiz y suena natural en español aplicado a muros.
- source_word: τὰ τείχη Ἰερουσαλήμ
  english_pob_choice: the walls of Jerusalem
  chosen_spanish: los muros de Jerusalén
  alternatives_spanish:
  - las murallas de Jerusalén
  - los muros de Jerusalén
  lexicon: LSJ
  rationale: «Τείχη» son muros o murallas; «muros» mantiene un registro sobrio y directo. «Jerusalén» se conserva como nombre propio sin alterar la construcción.
- source_word: τοὺς πύργους αὐτῆς
  english_pob_choice: its towers
  chosen_spanish: sus torres
  alternatives_spanish:
  - sus torres
  - sus bastiones
  lexicon: LSJ
  rationale: Πύργοι son torres. El posesivo femenino griego referido a Jerusalén se vierte naturalmente con «sus» en español, sin necesidad de personalizar la ciudad.
- source_word: ἐν πυρί
  english_pob_choice: with fire
  chosen_spanish: fuego
  alternatives_spanish:
  - con fuego
  - en fuego
  lexicon: LSJ
  rationale: La expresión funciona como intensificador instrumental unido al verbo de quemar. En español, repetir «fuego» en «prendieron fuego a…» ya comunica el valor instrumental sin una preposición adicional que sonaría pesada.
theological_decisions:
- issue: κύριος en el contexto del templo
  english_pob_reading: Lord
  chosen_spanish_reading: Señor
  alternative_spanish_readings:
  - Yahvé
  - SEÑOR
  rationale: La fuente principal es el griego, que lee κυρίου. Siguiendo el criterio auditado de la POB para este caso, se conserva «Señor» en lugar de introducir el nombre divino hebreo. El contexto remite al templo, pero el texto base griego no explicita aquí una sustitución por el tetragrámaton.
  doctrine_reference: 'DOCTRINE.md contested terms: κύριος → Lord; יְהוָה → Yahvé'
translation_notes:
  revision_awareness: La revisión inglesa más reciente no introdujo cambios; se mantiene la decisión auditada de traducir el verbo griego con un equivalente natural y de conservar la imagen literal de «casa del Señor» sin ampliar a «templo» en el texto principal.
  spanish_consistency_notes:
  - Se mantiene un registro bíblico moderno y sobrio, evitando arcaísmos innecesarios.
  - «Señor» se usa de forma consistente para κύριος en este registro, conforme al contexto auditado.
  - «Muros» y «torres» conservan la imaginería defensiva del pasaje sin añadir matices no presentes en el griego.
