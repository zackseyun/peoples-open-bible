revisions:
- from: Dios no tuvo misericordia de ellos. Investigó[a] su descendencia y no dejó uno de ellos.
  to: Dios no tuvo misericordia de ellos. Buscó diligentemente su descendencia[a] y no dejó ni uno de ellos.
  rationale: Se conserva 'no tuvo misericordia' por la decisión adjudicada sobre ἐλέησεν. Se cambia 'Investigó' por 'Buscó diligentemente' para reflejar mejor ἐξερεύνησεν en contexto narrativo de juicio. Se cambia 'no dejó uno de ellos' por 'no dejó ni uno de ellos' para un español natural que preserve la totalidad enfática. La nota se reubica a 'descendencia' para reflejar las alternativas documentadas para σπέρμα.
