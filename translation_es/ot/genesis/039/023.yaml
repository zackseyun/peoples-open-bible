translation:
  language: es
  text: El jefe de la prisión no se ocupaba de nada de lo que estaba en su mano[a], porque Yahvé estaba con él; y todo lo que hacía[b], Yahvé lo hacía prosperar[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «no prestaba atención a nada» o «no veía nada» de lo que estaba bajo el cuidado de José.
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «en su mano», un modismo para lo que le había sido confiado o puesto bajo su control.'
    reason: cultural_note
  - marker: c
    text: O «Yahvé hacía que prosperara» o «Yahvé hacía que tuviera éxito».
    reason: lexical_alternative
lexical_decisions:
- source_word: שַׂר בֵּית הַסֹּהַר
  english_pob_choice: the chief of the prison
  chosen_spanish: el jefe de la cárcel
  alternatives_spanish:
  - el oficial de la cárcel
  - el encargado de la cárcel
  - el capitán de la cárcel
  lexicon: HALOT
  rationale: שַׂר denota un jefe u oficial con autoridad administrativa, no solo un guardia. «Jefe de la cárcel» conserva esa función de supervisión y suena natural en español.
- source_word: אֵין ... רֹאֶה
  english_pob_choice: paid attention to nothing
  chosen_spanish: no se ocupaba de nada
  alternatives_spanish:
  - no prestaba atención a nada
  - no cuidaba nada
  - no miraba nada
  lexicon: HALOT
  rationale: La construcción hebrea expresa que no se encargaba ni inspeccionaba los asuntos. «No se ocupaba de nada» refleja mejor la idea funcional que un literal «no veía nada».
- source_word: כָּל מְאוּמָה
  english_pob_choice: nothing
  chosen_spanish: nada
  alternatives_spanish:
  - ninguna cosa
  - ni una sola cosa
  lexicon: HALOT
  rationale: Con אֵין, la frase tiene fuerza negativa total. «Nada» es el equivalente más natural y fiel en español.
- source_word: בְּיָדוֹ
  english_pob_choice: that was in his hand
  chosen_spanish: de lo que estaba en su mano
  alternatives_spanish:
  - de lo que estaba bajo su autoridad
  - de lo que le había sido confiado
  - de lo que estaba a su cargo
  lexicon: HALOT
  rationale: Se conserva la imagen concreta del hebreo «en su mano», entendida idiomáticamente como lo confiado a su control. En español, «estar en su mano» puede sonar ambiguo, por eso se explicita con una frase natural sin perder la metáfora.
- source_word: בַּאֲשֶׁר יְהוָה אִתּוֹ
  english_pob_choice: because Yahweh was with him
  chosen_spanish: porque Yahvé estaba con él
  alternatives_spanish:
  - ya que Yahvé estaba con él
  - pues Yahvé estaba con él
  - puesto que Yahvé estaba con él
  lexicon: HALOT
  rationale: La relación causal del contexto se expresa con «porque». Se mantiene «Yahvé» según la terminología base del proyecto para יהוה.
- source_word: וַאֲשֶׁר הוּא עֹשֶׂה
  english_pob_choice: whatever he did
  chosen_spanish: y todo lo que hacía
  alternatives_spanish:
  - y todo cuanto hacía
  - y cualquier cosa que hacía
  - y lo que él hacía
  lexicon: HALOT
  rationale: La construcción relativa abarca de manera total las acciones de José. «Todo lo que hacía» transmite esa amplitud con naturalidad en español.
- source_word: יְהוָה מַצְלִיחַ
  english_pob_choice: Yahweh made prosper
  chosen_spanish: Yahvé lo hacía prosperar
  alternatives_spanish:
  - Yahvé le daba éxito
  - Yahvé lo hacía tener éxito
  - Yahvé lo hacía prosperar
  lexicon: HALOT
  rationale: 'El hifil de צלח es causativo: Yahvé es quien produce el éxito o prosperidad. «Lo hacía prosperar» preserva la fuerza causativa y el paralelismo del verso.'
theological_decisions:
- issue: Renderización del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - SEÑOR
  rationale: El texto hebreo usa el Tetragrámaton directamente. En español, la forma establecida en este proyecto es «Yahvé», que preserva el nombre propio del pacto en lugar de sustituirlo por un título.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
translation_notes:
  revision_awareness: 'El pasaje coincide sustancialmente con la última pasada revisada: no se requirieron cambios de fondo. La decisión principal es la adaptación al estándar español del proyecto para el nombre divino (Yahvé) y una formulación natural de la metáfora hebrea «en su mano».'
  spanish_consistency_notes:
  - Se mantiene la distinción entre el nombre divino propio «Yahvé» y el sustantivo común «cárcel/jefe».
  - «No se ocupaba de nada» conserva la idea administrativa del hebreo sin introducir una interpretación más fuerte de la necesaria.
  - La imagen de «su mano» se conserva en nota, mientras que el cuerpo del texto prioriza claridad idiomática en español.
  - 'Se mantiene el paralelismo causal: presencia de Yahvé → prosperidad de todo lo que José hacía.'
