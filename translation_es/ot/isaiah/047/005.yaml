review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el sentido general del hebreo: mandato de humillación, entrada en la oscuridad, personificación femenina de Babilonia/Caldea y pérdida del título imperial. Sin embargo, hay dos desajustes relevantes con la evidencia fuente y el rastro POB: (1) la nota [a] está mal anclada y no corresponde a una alternativa real del inglés auditado; «en silencio» ya es la lectura principal, no una variante. (2) «ya no seguirán llamándote» es entendible, pero suaviza y complica innecesariamente el hebreo/inglés; en español es más directo y fiel «ya no te llamarán». Además, «entra en tinieblas» funciona, pero «ve a las tinieblas» o «entra en la oscuridad» marcarían mejor el movimiento; aun así, no es error grave.'
  spanish_quality_summary: El español es claro y digno, pero la construcción con gerundio («seguirán llamándote») suena más perifrástica de lo necesario. «Dueña de reinos» es comprensible, aunque algo menos natural en registro bíblico que «señora de reinos»; no obstante, dado que el POB inglés privilegia 'mistress' y conserva 'lady' como alternativa, puede mantenerse «dueña» con nota alternativa a «señora». La revisión propuesta mejora naturalidad y concisión sin perder fuerza.
  glossary_alignment: No hay términos del glosario mayor en conflicto. La personificación femenina se conserva correctamente con «hija de los caldeos». «Tinieblas» mantiene bien la imagen profética literal. «Dueña» es defendible para גברת por el matiz de dominio; la alternativa «señora» debe quedar en nota, alineada con la nota inglesa 'lady of kingdoms'.
  issues:
  - severity: medium
    issue: La nota [a] no corresponde al audit trail inglés ni a una alternativa significativa
    rationale: El inglés POB pone la nota léxica en «mistress/lady», no en «in silence». Además, la nota española «O «en silencio»» repite exactamente la lectura principal y no aporta variante real.
  - severity: medium
    issue: «ya no seguirán llamándote» es una formulación innecesariamente perifrástica
    rationale: El hebreo con לֹא תוֹסִיפִי + יִקְרְאוּ expresa cese; en español bíblico natural se vierte mejor «ya no te llamarán», que preserva el sentido sin la torpeza del gerundio.
  - severity: low
    issue: La decisión léxica sobre יִקְרְאוּ לָךְ como gerundio no es la mejor para español
    rationale: El plural indefinido se puede expresar de manera simple con «te llamarán», más natural y más cercano a la cláusula finita hebrea.
  revised_spanish_text: Siéntate en silencio y entra en tinieblas, hija de los caldeos; porque ya no te llamarán dueña[a] de reinos.
  revised_footnotes:
  - marker: a
    text: O «señora de reinos».
    reason: lexical_alternative
  revision_rationale: Se elimina la nota impropia sobre «en silencio», se simplifica la cláusula final a «ya no te llamarán» para reflejar mejor el hebreo y el inglés POB, y se conserva la nota léxica pertinente en «dueña[a]», alineada con la alternativa inglesa 'lady of kingdoms'.
