translation:
  language: es
  text: 'Respondió y dijo: «¿No debo hablar[a] lo que Yahvé pone en mi boca?»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «¿No debo guardar/observar cuidadosamente para hablar lo que Yahvé pone en mi boca?». El verbo puede subrayar adherencia cuidadosa al hablar.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּעַן
  english_pob_choice: He answered
  chosen_spanish: Respondió
  alternatives_spanish:
  - Y respondió
  - Y contestó
  lexicon: HALOT
  rationale: La forma narrativa de respuesta se expresa de manera natural en español con un perfecto simple; se omite la conjunción inicial para no cargar la línea, manteniendo la secuencia narrativa implícita.
- source_word: וַיֹּאמַר
  english_pob_choice: and said
  chosen_spanish: y dijo
  alternatives_spanish:
  - y habló
  - y expresó
  lexicon: HALOT
  rationale: La pareja hebrea «respondió y dijo» es idiomática; en español se conserva con el paralelismo tradicional y claro de «respondió y dijo».
- source_word: הֲלֹא
  english_pob_choice: Must I not
  chosen_spanish: ¿No debo
  alternatives_spanish:
  - ¿No tengo que
  - ¿Acaso no debo
  lexicon: HALOT
  rationale: La pregunta retórica expresa obligación bajo restricción divina. «¿No debo» comunica bien esa fuerza sin endurecer el matiz más allá del hebreo.
- source_word: אֵת אֲשֶׁר
  english_pob_choice: what
  chosen_spanish: lo que
  alternatives_spanish:
  - aquello que
  - la cosa que
  lexicon: HALOT
  rationale: La combinación funciona como relativo sustantivado. «Lo que» es la equivalencia natural en español y preserva el valor de contenido del objeto directo.
- source_word: יָשִׂים
  english_pob_choice: puts
  chosen_spanish: pone
  alternatives_spanish:
  - coloca
  - mete
  lexicon: HALOT
  rationale: Con «en mi boca» se trata del giro idiomático de poner palabras en la boca de alguien. «Pone» es claro, directo y fiel al hebreo.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: Se mantiene el nombre propio divino según el criterio del proyecto. «Yahvé» conserva la referencia al Tetragrámaton sin sustituirlo por un título.
- source_word: בְּפִי
  english_pob_choice: in my mouth
  chosen_spanish: en mi boca
  alternatives_spanish:
  - dentro de mi boca
  - a mi boca
  lexicon: HALOT
  rationale: Se conserva la imagen corporal e idiomática hebrea de habla autorizada por Dios, expresada de forma natural en español.
- source_word: אֹתוֹ
  english_pob_choice: what
  chosen_spanish: lo que
  alternatives_spanish:
  - eso
  - ello
  lexicon: HALOT
  rationale: El pronombre retomando el contenido dado por Dios se integra en la relativa sustantivada española; no hace falta un pronombre separado.
- source_word: אֶשְׁמֹר
  english_pob_choice: be careful
  chosen_spanish: debo
  alternatives_spanish:
  - he de
  - me guardaré de
  lexicon: HALOT
  rationale: El valor de שׁמר con infinitivo aquí fue resuelto en el audit trail como obligación/adhesión estricta más que como simple cautela explícita. En español, «debo» transmite la carga de obligación sin introducir una glosa interpretativa adicional.
- source_word: לְדַבֵּר
  english_pob_choice: to speak
  chosen_spanish: hablar
  alternatives_spanish:
  - decir
  - pronunciar
  lexicon: HALOT
  rationale: El infinitivo complementa el mandato de expresar exactamente el contenido recibido. «Hablar» funciona de manera natural con «lo que Yahvé pone en mi boca».
theological_decisions:
- issue: Tratamiento del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: El texto hebreo usa directamente el Tetragrámaton. La elección de «Yahvé» preserva el nombre personal de Dios y sigue la convención doctrinal del proyecto.
  doctrine_reference: 'DOCTRINE.md: יְהוָה / YHWH → Yahvé'
- issue: Fuerza de la obligación en la respuesta de Balaam
  english_pob_reading: Must I not speak what Yahweh puts in my mouth?
  chosen_spanish_reading: ¿No debo hablar lo que Yahvé pone en mi boca?
  alternative_spanish_readings:
  - ¿No tengo que hablar lo que Yahvé pone en mi boca?
  - ¿No debo decir solo lo que Yahvé pone en mi boca?
  rationale: La combinación de pregunta retórica y verbo de guardar/observar indica una obligación estricta de decir únicamente lo recibido. «¿No debo hablar…?» conserva esa constricción sin añadir más énfasis del necesario.
  doctrine_reference: Hebreo de Nm 23:12; audit trail inglés sobre הֲלֹא + שׁמר + infinitivo
translation_notes:
  revision_awareness: 'El audit trail inglés revisó su formulación desde «be careful to speak» a una redacción más directa («Must I not speak…?») para no sobreinterpretar שׁמר. Esta versión española sigue esa dirección: conserva la obligación implícita en el hebreo sin añadir una glosa de cuidado explícito en el cuerpo del texto, pero la nota mantiene la alternativa lexical documentada.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» conforme al estándar del proyecto para יְהוָה.
  - Se usa «lo que» como equivalente natural de אֵת אֲשֶׁר / אֹתוֹ en este contexto.
  - «Hablar» se eligió por fluidez; en nota se conserva la alternativa «guardar/observar cuidadosamente» para reflejar שׁמר.
  - La puntuación reproduce una cita directa breve y publicable en español latinoamericano.
