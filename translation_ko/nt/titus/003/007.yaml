id: TIT.3.7
reference: Titus 3:7
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: ἵνα δικαιωθέντες τῇ ἐκείνου χάριτι κληρονόμοι ⸀γενηθῶμεν κατ’ ἐλπίδα ζωῆς αἰωνίου.
base_translation:
  language: en
  yaml_path: translation/nt/titus/003/007.yaml
  text: so that[a], having been justified by his grace[b], we might become heirs according to the hope of eternal life.
  footnotes:
  - marker: a
    text: Or 'in hope of eternal life.'
    reason: lexical_alternative
  - marker: b
    text: '''Justified'' may also be rendered ''declared righteous.'''
    reason: lexical_alternative
translation:
  language: ko
  text: 이는 우리가 그분의 은혜로 의롭게 되어[b], 영원한 생명의 소망을 따라[a] 후사가 되게 하시려는 것입니다.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 또는 「영원한 생명의 소망 안에서」.
    reason: lexical_alternative
  - marker: b
    text: 「의롭게 되어」는 「의롭다고 선언되어」로도 옮길 수 있다.
    reason: lexical_alternative
lexical_decisions:
- source_word: δικαιωθέντες
  english_pob_choice: having been justified
  chosen_korean: 의롭게 되어
  alternatives_korean:
  - 의롭다 함을 받아
  - 의롭다고 선언되어
  lexicon: BDAG
  rationale: δικαιόω의 부정과거 수동 분사. 한국 교회 전통의 「의롭다 함을 받다」도 가능하나, 본 번역은 더 자연스러운 「의롭게 되다」를 본문에 두고, 법정적 어감을 각주로 명시한다.
- source_word: τῇ ἐκείνου χάριτι
  english_pob_choice: by his grace
  chosen_korean: 그분의 은혜로
  alternatives_korean:
  - 그분의 은총으로
  lexicon: BDAG
  rationale: ἐκείνου는 강조적 지시사 「그(분)」. 한국어 「그분의 은혜」가 자연스럽다.
- source_word: κληρονόμοι ... γενηθῶμεν
  english_pob_choice: we might become heirs
  chosen_korean: 후사가 되게
  alternatives_korean:
  - 상속자가 되게
  - 유업을 받을 자가 되게
  lexicon: BDAG
  rationale: κληρονόμος는 「상속자·후사」. 한국 교회 전통의 「후사」가 자연스럽다.
- source_word: κατ’ ἐλπίδα ζωῆς αἰωνίου
  english_pob_choice: according to the hope of eternal life
  chosen_korean: 영원한 생명의 소망을 따라
  alternatives_korean:
  - 영생의 소망을 따라
  - 영원한 생명의 소망 안에서
  lexicon: BDAG
  rationale: 1:2와 일관되게 「영원한 생명」. κατά + 대격은 기준·일치. 「~을 따라」로 옮긴다.
