translation:
  language: es
  text: ¿Quién es este Rey de gloria? Yahvé de las huestes; él es el Rey de gloria[a]. Selah[b]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «de los ejércitos». El título hebreo puede referirse ampliamente a ejércitos celestiales o a poderes ordenados.
    reason: lexical_alternative
  - marker: b
    text: «Selah» probablemente es una notación musical o litúrgica; su significado preciso es incierto.
    reason: cultural_note
lexical_decisions:
- source_word: מִי הוּא זֶה
  english_pob_choice: Who is this
  chosen_spanish: ¿Quién es este...?
  alternatives_spanish:
  - ¿Quién es él, este...?
  - ¿Quién es éste...?
  lexicon: HALOT
  rationale: La secuencia interrogativa con pronombre y demostrativo es enfática. En español, «¿Quién es este...?» conserva la fuerza retórica de la pregunta sin volverse torpe.
- source_word: מֶלֶךְ
  english_pob_choice: King
  chosen_spanish: Rey
  alternatives_spanish:
  - rey
  lexicon: HALOT
  rationale: Es el equivalente normal de מלך. Se capitaliza en el texto por tratarse de un título divino en este contexto.
- source_word: הַכָּבוֹד
  english_pob_choice: of glory
  chosen_spanish: de gloria
  alternatives_spanish:
  - glorioso
  - de honor
  lexicon: HALOT
  rationale: La construcción genitiva se expresa naturalmente en español como «Rey de gloria». Mantiene el sustantivo hebreo כבוד como «gloria», sin desplazarse a un adjetivo interpretativo.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  lexicon: HALOT
  rationale: Según la convención del proyecto, el Tetragrámaton se vierte «Yahvé» en español, conservando el nombre propio divino en vez de sustituirlo por un título.
- source_word: צְבָאוֹת
  english_pob_choice: of hosts
  chosen_spanish: de los ejércitos
  alternatives_spanish:
  - de los huestes
  - de los hostes
  lexicon: HALOT
  rationale: Aunque el inglés POB usa «hosts» por su amplitud, en español «ejércitos» comunica mejor el campo semántico de צבאות y suena más natural en un título divino; se conserva la idea de agrupaciones/poderes organizados.
- source_word: הוּא
  english_pob_choice: he is
  chosen_spanish: él es
  alternatives_spanish:
  - es él
  - él mismo es
  lexicon: HALOT
  rationale: El pronombre enfático se refleja con «él es», preservando la identificación solemne del versículo sin añadir exclusividad que no esté marcada explícitamente.
- source_word: סֶלָה
  english_pob_choice: Selah
  chosen_spanish: Selah
  alternatives_spanish:
  - —
  - Selá
  lexicon: HALOT
  rationale: Se conserva la transliteración porque su función exacta es incierta y probablemente musical o litúrgica. No se traduce para no imponer una interpretación no segura.
theological_decisions:
- issue: Forma del nombre divino יהוה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Jehová
  - SEÑOR
  rationale: La lectura inglesa identifica el Tetragrámaton como nombre propio divino. En español, «Yahvé» es la forma coherente con esa decisión y con la política del proyecto; «SEÑOR» sería una sustitución y no una transliteración.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יהוה / YHWH → Yahvé'
- issue: Título יהוה צבאות
  english_pob_reading: Yahweh of hosts
  chosen_spanish_reading: Yahvé de los ejércitos
  alternative_spanish_readings:
  - Yahvé de los hosts
  - Yahvé de las huestes
  rationale: Se mantiene el título compuesto y su amplitud referencial. «Ejércitos» transmite de manera clara el sentido de צבאות en español moderno; «hosts» resulta menos natural y «huestes» es más arcaizante.
  doctrine_reference: DOCTRINE.md Translation philosophy §1, §5
translation_notes:
  revision_awareness: El pasaje coincide sustancialmente con la traducción auditada en inglés. La única adaptación relevante fue elegir «Yahvé» como forma española coherente del nombre divino y «de los ejércitos» como equivalente natural de צבאות en un título teofórico, manteniendo la nota alternativa sobre la amplitud semántica del término y la transliteración de Selah.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» para יהוה, conforme al estándar del proyecto.
  - Se conserva la capitalización de «Rey» por tratarse de un título divino en este contexto.
  - «Selah» queda sin traducir para respetar la incertidumbre semántica.
  - No se introduce «SEÑOR» ni «Cristo», porque no corresponden al texto hebreo de este versículo.
