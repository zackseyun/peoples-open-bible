translation:
  language: es
  text: Joacim tenía veinticinco años cuando comenzó a reinar sobre Judea y Jerusalén[a], e hizo lo malo delante del Señor.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «Judá y Jerusalén». El texto griego tiene «Judea y Jerusalén», mientras que la tradición hebrea paralela suele decir «Judá y Jerusalén».
    reason: alternative_reading
lexical_decisions:
- source_word: Ἐτῶν δὲ ἦν εἴκοσι πέντε
  english_pob_choice: was twenty-five years old
  chosen_spanish: tenía veinticinco años
  alternatives_spanish:
  - tenía veinticinco años de edad
  - era de veinticinco años
  lexicon: LSJ
  rationale: La fórmula griega expresa edad al inicio del reinado. En español, «tenía veinticinco años» conserva el valor idiomático y natural de la construcción sin perder la precisión temporal.
- source_word: Ἰωακεὶμ
  english_pob_choice: Jehoiakim
  chosen_spanish: Yoaquim
  alternatives_spanish:
  - Joaquim
  - Jehoiaquim
  lexicon: onomástica bíblica tradicional / transliteración histórica
  rationale: La forma española «Yoaquim» refleja mejor el nombre transmitido por el griego Ἰωακεὶμ y evita depender solo de la convención inglesa. Se mantiene una transliteración bíblica reconocible en español.
- source_word: ὅτε ἐβασίλευσεν
  english_pob_choice: when he became king
  chosen_spanish: cuando llegó a reinar
  alternatives_spanish:
  - cuando se hizo rey
  - cuando comenzó a reinar
  lexicon: LSJ
  rationale: El aoristo señala la entrada al reinado, no su duración completa. «Llegó a reinar» preserva ese matiz de acceso al trono en un español fluido.
- source_word: τῆς Ἰουδαίας καὶ Ἰερουσαλήμ
  english_pob_choice: of Judea and Jerusalem
  chosen_spanish: sobre Judea y Jerusalén
  alternatives_spanish:
  - de Judea y Jerusalén
  - sobre Judá y Jerusalén
  lexicon: LSJ
  rationale: En castellano, con verbos de reinar, la preposición natural es «sobre». Se conserva «Judea» porque el texto griego dice Ἰουδαίας; «Jerusalén» se mantiene como nombre propio. La alternativa «Judá» queda como posibilidad de la tradición hebrea paralela.
- source_word: ἐποίησεν τὸ πονηρὸν
  english_pob_choice: did what was evil
  chosen_spanish: hizo lo malo
  alternatives_spanish:
  - hizo lo que era malo
  - hizo el mal
  lexicon: LSJ
  rationale: La expresión es un modismo bíblico para conducta moralmente culpable. «Hizo lo malo» reproduce el sentido sin volverlo más interpretativo de lo que permite el griego.
- source_word: ἐνώπιον Κυρίου
  english_pob_choice: before the Lord
  chosen_spanish: delante del Señor
  alternatives_spanish:
  - a la vista del Señor
  - ante el Señor
  lexicon: LSJ
  rationale: «Delante de» expresa bien la idea de presencia y evaluación moral. «Señor» sigue el κύριος griego del LXX, conforme al testimonio de la fuente principal.
theological_decisions:
- issue: Renderización de Κυρίου en un contexto de la Septuaginta
  english_pob_reading: the Lord
  chosen_spanish_reading: el Señor
  alternative_spanish_readings:
  - Yahvé
  - el SEÑOR
  rationale: Como el texto fuente inmediato es griego κύριος, se conserva «Señor» en vez de introducir «Yahvé» desde el trasfondo hebreo. Eso respeta la primacía de la fuente griega y el valor auditado de la traducción inglesa.
  doctrine_reference: 'DOCTRINE.md Contested terms: κύριος → Lord; יְהוָה → the LORD'
- issue: Designación territorial Ἰουδαίας
  english_pob_reading: Judea
  chosen_spanish_reading: Judea
  alternative_spanish_readings:
  - Judá
  rationale: El griego nombra Ἰουδαίας, que en uso helenístico corresponde normalmente a «Judea». Se conserva esa lectura en el texto principal y se reconoce «Judá» como alternativa vinculada a la tradición paralela hebrea.
  doctrine_reference: DOCTRINE.md Translation philosophy §1, original-language primacy over translation tradition
translation_notes:
  revision_awareness: El pasaje coincide con el texto griego base y con la auditoría inglesa; no se requieren revisiones sustanciales. Se mantuvo la diferencia documental entre Ἰουδαίας y la tradición hebrea paralela, conservándola en nota.
  spanish_consistency_notes:
  - Se usa «Señor» para κύριος en el texto principal, en coherencia con la fuente griega de la Septuaginta.
  - Se mantiene «Judea» en el cuerpo y se reserva «Judá» para la nota, conforme al respaldo documental.
  - La formulación verbal en español evita calco rígido y conserva el valor de acceso al reino en el aoristo griego.
  - La onomástica adopta una forma española estable y legible, sin perder la referencia al nombre griego transmitido.
