  text: וַ/יְדַבֵּ֥ר אִתָּ֖/ם לֵ/אמֹ֑ר אִם יֵ֣שׁ אֶֽת נַפְשְׁ/כֶ֗ם לִ/קְבֹּ֤ר אֶת מֵתִ/י֙ מִ/לְּ/פָנַ֔/י שְׁמָע֕וּ/נִי וּ/פִגְעוּ לִ֖/י בְּ/עֶפְר֥וֹן בֶּן צֹֽחַר־־־־־׃
