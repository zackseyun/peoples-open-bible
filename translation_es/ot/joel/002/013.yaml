translation:
  language: es
  text: Rasguen[a] sus corazones y no sus vestiduras, y vuelvan a Yahvé su Dios, porque él es bondadoso y compasivo, lento para la ira y abundante en amor fiel, y desiste[b] del desastre.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Rasguen sus corazones».'
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «desistiendo en cuanto al desastre»; es decir, reteniendo el juicio amenazado.'
    reason: lexical_alternative
lexical_decisions:
- source_word: קִרְעוּ
  english_pob_choice: Tear
  chosen_spanish: Rasgad
  alternatives_spanish:
  - Rasguen
  - Rompan
  - Desgarren
  lexicon: HALOT
  rationale: El imperativo plural de קרע expresa la acción fuerte de rasgar o desgarrar. 'Rasgad' conserva esa fuerza verbal y el paralelismo con las vestiduras; además, es un español bíblico claro sin resultar arcaico en exceso.
- source_word: לְבַבְכֶם
  english_pob_choice: your hearts
  chosen_spanish: su corazón
  alternatives_spanish:
  - sus corazones
  - el corazón de ustedes
  lexicon: HALOT
  rationale: En español, con destinatarios plurales, el posesivo de respeto/plural contextual puede expresarse naturalmente como 'su corazón'. Mantiene la metáfora interior del arrepentimiento sin forzar una pluralidad anatómica que suena menos idiomática.
- source_word: בִּגְדֵיכֶם
  english_pob_choice: your garments
  chosen_spanish: sus vestiduras
  alternatives_spanish:
  - sus vestidos
  - sus ropas
  - sus prendas
  lexicon: HALOT
  rationale: '''Vestiduras'' preserva el registro profético y el contraste con el gesto externo de duelo ritual. Es más específico y solemne que ''ropa'' o ''prendas''.'
- source_word: וְשׁוּבוּ
  english_pob_choice: and return
  chosen_spanish: y vuelvan
  alternatives_spanish:
  - y retornen
  - y regresen
  - y conviértanse
  lexicon: HALOT
  rationale: שוב expresa volver/retornar. 'Vuelvan' conserva la dirección covenantal hacia Dios sin reducir el verbo solo a una interioridad psicológica; 'conviértanse' sería más interpretativo.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  lexicon: HALOT
  rationale: 'Se sigue el criterio del proyecto para el Tetragrámaton: ''Yahvé'' en el texto principal, manteniendo el nombre divino explícito en lugar de una sustitución por título.'
- source_word: אֱלֹהֵיכֶם
  english_pob_choice: your God
  chosen_spanish: su Dios
  alternatives_spanish:
  - su Dios de ustedes
  - su Dios
  lexicon: HALOT
  rationale: La construcción posesiva de segunda persona plural se expresa de forma natural como 'su Dios' en español bíblico dirigido a un grupo. Mantiene la relación de pacto implicada por el hebreo.
- source_word: חַנּוּן
  english_pob_choice: gracious
  chosen_spanish: bondadoso
  alternatives_spanish:
  - gracioso
  - clemente
  - benigno
  lexicon: HALOT
  rationale: Aunque 'gracioso' sería formalmente cercano, en español actual puede sonar equívoco. 'Bondadoso' comunica la disposición benévola de Dios con claridad, sin perder la nota de favor inmerecido asociada al término.
- source_word: וְרַחוּם
  english_pob_choice: compassionate
  chosen_spanish: compasivo
  alternatives_spanish:
  - misericordioso
  - piadoso
  lexicon: HALOT
  rationale: '''Compasivo'' distingue este adjetivo del anterior y preserva la doble descripción divina. Evita colapsar ambos términos en un solo campo semántico de ''misericordia''.'
- source_word: אֶרֶךְ אַפַּיִם
  english_pob_choice: slow to anger
  chosen_spanish: lento para la ira
  alternatives_spanish:
  - paciente
  - tardo para la ira
  lexicon: HALOT
  rationale: Es la equivalencia idiomática más clara en español y mantiene la imagen de la expresión hebrea sin literalismo anatómico.
- source_word: רַב חֶסֶד
  english_pob_choice: abundant in steadfast love
  chosen_spanish: abundante en amor leal
  alternatives_spanish:
  - abundante en amor constante
  - rico en misericordia
  - abundante en fidelidad amorosa
  lexicon: HALOT
  rationale: חֶסֶד tiene peso pactual y relacional. 'Amor leal' preserva la idea de amor fiel/constante, y 'abundante en' refleja רַב de manera natural en español.
- source_word: וְנִחָם
  english_pob_choice: and relenting
  chosen_spanish: y se arrepiente
  alternatives_spanish:
  - y se contiene
  - y cede
  - y se vuelve atrás
  lexicon: HALOT
  rationale: El hebreo describe la disposición divina respecto del juicio anunciado. 'Se arrepiente' es la forma más común en español bíblico y refleja la noción de relenting, aunque conserva una tensión teológica que no debe suavizarse artificialmente.
- source_word: עַל הָרָעָה
  english_pob_choice: concerning the disaster
  chosen_spanish: respecto al desastre
  alternatives_spanish:
  - acerca del desastre
  - ante la calamidad
  - sobre el mal
  lexicon: HALOT
  rationale: En contexto de juicio, רָעָה apunta a calamidad/desastre, no a mal moral. 'Respecto al desastre' sigue de cerca על sin introducir una lectura más fuerte de la necesaria.
theological_decisions:
- issue: Nombre divino יְהוָה en el texto principal
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Jehová
  rationale: Se mantiene el nombre propio divino según la convención del proyecto, preservando la identidad de pacto en vez de sustituirla por un título genérico.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: La cláusula וְנִחָם עַל הָרָעָה
  english_pob_reading: and relenting concerning the disaster
  chosen_spanish_reading: y se arrepiente respecto al desastre
  alternative_spanish_readings:
  - y se contiene respecto al desastre
  - y se vuelve atrás respecto al desastre
  - y se arrepiente ante la calamidad
  rationale: 'La formulación conserva el lenguaje antropopático del hebreo y la tensión teológica: Dios es descrito como alguien que revoca el juicio anunciado en respuesta al arrepentimiento humano, sin implicar ignorancia, error o cambio moral en Dios.'
  doctrine_reference: Preserve theological tension rather than resolve it
translation_notes:
  revision_awareness: 'El borrador sigue de cerca el audit trail inglés y el hebreo: conserva el imperativo fuerte de קרע, el contraste corazón/vestiduras, el nombre divino explícito Yahvé, y la tensión de נחם aplicada al juicio. No se detectaron revisiones posteriores que exijan ajustar la base textual.'
  spanish_consistency_notes:
  - Se usa «Yahvé» de forma consistente para יְהוָה, conforme al estándar del proyecto.
  - Se evita «SEÑOR» como sustituto del nombre divino.
  - «Amor leal» se usa para חֶסֶד, manteniendo la carga pactual sin recurrir a un calco opaco.
  - «Desastre» refleja un contexto de juicio y no debe leerse como mal moral.
  - La nota de pie b marca la carga semántica de חֶסֶד para lectores que puedan esperar una sola equivalencia tradicional.
