translation:
  language: es
  text: No te harás imagen tallada[a] ni ninguna semejanza[b] de lo que está en los cielos arriba, ni en la tierra abajo[c], ni en las aguas debajo de la tierra.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «imagen esculpida». El hebreo se refiere específicamente a una imagen hecha por talla; «ídolo» es más interpretativo.
    reason: lexical_alternative
  - marker: b
    text: O «forma» o «representación» para «semejanza».
    reason: lexical_alternative
  - marker: c
    text: 'El versículo describe las esferas creadas en términos cosmológicos antiguos: los cielos arriba, la tierra abajo y las aguas debajo de la tierra.'
    reason: cultural_note
lexical_decisions:
- source_word: לֹא תַעֲשֶׂה
  english_pob_choice: You shall not make
  chosen_spanish: No te harás
  alternatives_spanish:
  - No harás
  - No debes hacer
  lexicon: HALOT
  rationale: La prohibición con לֹא + imperfecto se vierte en español con fuerza normativa. «No te harás» mantiene el carácter directo de mandato y conserva el matiz de interés personal de לְךָ en la construcción reflexiva natural del español.
- source_word: לְךָ
  english_pob_choice: for yourself
  chosen_spanish: te
  alternatives_spanish:
  - para ti
  - para ti mismo
  lexicon: HALOT
  rationale: El dativo de interés expresa que la imagen se haría para beneficio o uso propio. En español, el reflexivo «te» integra de manera natural ese matiz sin recargar la frase.
- source_word: פֶסֶל
  english_pob_choice: a carved image
  chosen_spanish: imagen
  alternatives_spanish:
  - imagen esculpida
  - ídolo
  - imagen tallada
  lexicon: HALOT
  rationale: El POB inglés precisa el acto de tallar, pero en español «imagen» funciona aquí como término base, mientras el contexto del mandamiento y la nota explican la especificidad material. «Ídolo» sería más interpretativo de lo que el lexema exige.
- source_word: וְכָל תְּמוּנָה
  english_pob_choice: or any likeness
  chosen_spanish: ni ninguna semejanza
  alternatives_spanish:
  - ni ninguna forma
  - ni ninguna representación
  lexicon: HALOT
  rationale: «תְּמוּנָה» abarca forma, semejanza o representación. «Semejanza» conserva el alcance semántico y suena bíblico sin caer en arcaísmo excesivo. El «ni» encadena bien la serie prohibitiva en español.
- source_word: אֲשֶׁר בַּשָּׁמַיִם מִמַּעַל
  english_pob_choice: of what is in the heavens above
  chosen_spanish: de lo que está en los cielos arriba
  alternatives_spanish:
  - de lo que está en los cielos de arriba
  - de lo que está en el cielo arriba
  lexicon: HALOT
  rationale: «שָׁמַיִם» es plural y cosmológico; «los cielos» lo preserva mejor que «el cielo». «Arriba» mantiene el complemento direccional del hebreo y el registro espacial antiguo del texto.
- source_word: וַאֲשֶׁר בָּאָרֶץ מִתָּחַת
  english_pob_choice: or on the earth beneath
  chosen_spanish: ni en la tierra debajo
  alternatives_spanish:
  - ni sobre la tierra debajo
  - ni en la tierra de abajo
  lexicon: HALOT
  rationale: «בָאָרֶץ» puede expresarse naturalmente con «en la tierra». «Debajo» reproduce el contraste vertical con «arriba»; aunque suena algo elíptico, el paralelismo con la línea anterior y siguiente lo hace claro en español.
- source_word: וַאֲשֶׁר בַּמַּיִם מִתַּחַת לָאָרֶץ
  english_pob_choice: or in the waters under the earth
  chosen_spanish: ni en las aguas debajo de la tierra
  alternatives_spanish:
  - ni en las aguas bajo la tierra
  - ni en las aguas bajo la superficie de la tierra
  lexicon: HALOT
  rationale: «מַיִם» se traduce por «aguas», en plural como en español bíblico. «Debajo de la tierra» conserva la imaginería cosmológica de tres niveles sin explicarla en exceso, tal como hace la versión inglesa con su nota cultural.
theological_decisions:
- issue: Alcance de la prohibición en este versículo
  english_pob_reading: The verse prohibits making cultic images by naming carved images and any likeness from the created order, without importing a broader ban on all art into the translation itself.
  chosen_spanish_reading: El versículo prohíbe hacer imágenes o semejanzas tomadas del orden creado, sin convertir la traducción en una prohibición general de todo arte visual ni añadir explícitamente «para adorarlas».
  alternative_spanish_readings:
  - Prohibición de toda representación visual
  - Prohibición limitada solo a ídolos de culto
  rationale: El hebreo enumera objetos fabricados y luego amplía el alcance con una serie creada/creacional; la referencia al culto queda para el versículo siguiente. La traducción española debe conservar esa tensión textual y no resolverla de antemano con una glosa doctrinal en el cuerpo del versículo.
  doctrine_reference: Preservar la tensión interpretativa del mandamiento y dejar que el contexto inmediato lo delimite.
translation_notes:
  revision_awareness: 'La revisión más reciente no introdujo cambios: el pasaje quedó confirmado con alto acuerdo entre evaluaciones. Se conserva la solución optimal-equivalence del inglés POB, con ajuste natural al español y sin atenuar la especificidad lexical de פֶסֶל ni la imaginería cosmológica del versículo.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» para el nombre divino cuando aparezca en el contexto, aunque este versículo no lo incluye.
  - «Semejanza» se usa aquí para תְּמוּנָה; no se ha sustituido por «forma» en el texto principal para conservar la cadencia bíblica y el campo semántico amplio.
  - La serie prohibitiva se expresa con «ni» para evitar una lectura aditiva de «y» en español y reflejar la enumeración negativa del hebreo.
  - Se preserva la referencia a «los cielos» en plural para reflejar שָׁמַיִם y su registro cosmológico.
