review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien la estructura del hebreo: «Así dice Yahvé de los ejércitos», la tríada de juicio, y la comparación con higos incomibles. Sin embargo, dos elecciones no reflejan óptimamente el rastro auditado: הָרָעָב se alinea mejor con «la hambruna» o «el hambre» según contexto, pero aquí la POB inglesa fijó «the famine», y en español bíblico-profético «la hambruna» o mejor «el hambre» puede funcionar; aun así el problema mayor está en מֵרֹעַ, donde «por su podredumbre» estrecha el sentido más de lo que permite el hebreo y de lo que documenta la POB inglesa («because of their badness»). El hebreo explica la inedibilidad por su mala condición general, no necesariamente solo por podredumbre.'
  spanish_quality_summary: El español es claro y digno, pero «He aquí» suena algo más rígido que necesario; aun así es aceptable. «Los pondré como» es comprensible, aunque «los haré como» suena más natural en español para esta construcción comparativa. La cláusula final debe evitar redundancia demasiado física entre «podridos» y «podredumbre»; una formulación como «por lo malos que están» o «por su mal estado» lee mejor y preserva mejor el sentido.
  glossary_alignment: Se respeta correctamente «Yahvé» para יהוה. «De los ejércitos» es admisible para צְבָאוֹת. La tríada de juicio se conserva. La principal desalineación terminológica y semántica está en traducir מֵרֹעַ como «podredumbre», cuando el expediente lexical inglés preserva una noción más amplia de mala calidad/condición.
  issues:
  - severity: medium
    issue: «por su podredumbre» reduce indebidamente מֵרֹעַ
    rationale: El hebreo y la auditoría inglesa apuntan a «badness / mala condición», no específicamente a descomposición física. Como ya se usó «podridos» para הַשֹּׁעָרִים, repetir «podredumbre» sobreinterpreta el sustantivo final.
  - severity: low
    issue: «los pondré como» es menos natural que «los haré como»
    rationale: Aunque posible, «hacer ... como» expresa mejor en español el valor idiomático de וְנָתַתִּי אוֹתָם + comparación, y coincide mejor con la explicación auditada «I will make them like».
  - severity: low
    issue: La nota al pie solo conserva alternativa para הִנְנִי y no para «higos podridos»
    rationale: La POB inglesa conserva una nota lexical sobre הַשֹּׁעָרִים (‘bad figs’ / ‘spoiled figs’). Conviene preservarla también en español, ya que hay varias opciones legítimas y el español puede sugerir un matiz demasiado específico con «podridos».
  revised_spanish_text: 'Así dice Yahvé de los ejércitos: He aquí[a], estoy enviando contra ellos la espada, el hambre y la peste, y los haré como higos podridos[b], que no se pueden comer por su mal estado.'
  revised_footnotes:
  - marker: a
    text: O «Mira». La fórmula hebrea introduce un anuncio solemne e inminente.
    reason: lexical_alternative
  - marker: b
    text: O «higos malos» o «higos echados a perder»; el adjetivo hebreo denota higos tan malos que no son comestibles.
    reason: lexical_alternative
  revision_rationale: Se ajusta la cláusula final para reflejar mejor מֵרֹעַ como mala condición general y no específicamente «podredumbre», se mejora la naturalidad de וְנָתַתִּי אוֹתָם con «los haré como», y se añade una nota léxica para preservar las alternativas documentadas de הַשֹּׁעָרִים.
