translation:
  language: es
  text: Pero tú, Yahvé, me conoces; me ves, y examinas mi corazón hacia ti[a]. Sácalos como ovejas para la matanza, y apártalos[b] para el día de la matanza[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'mi corazón está contigo'. La frase hebrea es compacta y puede expresar la orientación interior o la lealtad de Jeremías en relación con Yahvé.
    reason: alternative_reading
  - marker: b
    text: O 'conságralos'; literalmente, 'apártalos' o 'ponlos aparte', aquí para juicio y no para bendición.
    reason: lexical_alternative
  - marker: c
    text: O 'para el día de matar'.
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  - SEÑOR
  lexicon: Nombre divino (Tetragrámaton)
  rationale: La fuente hebrea usa el nombre propio del pacto, no un título. En español, 'Yahvé' preserva la decisión POB de transliterar el nombre divino y evita la sustitución litúrgica por 'SEÑOR'. 'Jehová' se descarta por ser una forma tradicional menos probable filológicamente y menos consistente con la política del proyecto.
- source_word: יְדַעְתָּנִי
  english_pob_choice: know me
  chosen_spanish: me conoces
  alternatives_spanish:
  - me has conocido
  lexicon: HALOT
  rationale: El perfecto hebreo aquí funciona con valor resultativo/presente, como en la POB inglesa. 'Me conoces' suena natural en español y conserva la afirmación directa de conocimiento personal divino.
- source_word: תִּרְאֵנִי
  english_pob_choice: you see me
  chosen_spanish: me ves
  alternatives_spanish:
  - me miras
  - me contemplas
  lexicon: HALOT
  rationale: ראה expresa aquí una percepción evaluativa, no mera visión física. 'Me ves' mantiene la correspondencia con 'me conoces' y 'examinas' sin sobrecargar el verso.
- source_word: וּבָחַנְתָּ לִבִּי
  english_pob_choice: you test my heart
  chosen_spanish: examinas mi corazón
  alternatives_spanish:
  - pruebas mi corazón
  - me has examinado el corazón
  lexicon: HALOT
  rationale: בָּחַן tiene el sentido de probar/examinar. 'Examinas mi corazón' conserva el valor metafórico del interior humano y fluye mejor en español; 'probar' se mantiene como alternativa válida, pero puede sonar menos idiomática aquí.
- source_word: אִתָּךְ
  english_pob_choice: toward you
  chosen_spanish: hacia ti
  alternatives_spanish:
  - contigo
  - ante ti
  lexicon: HALOT
  rationale: La frase es compacta y admite varias lecturas. 'Hacia ti' conserva la orientación relacional del corazón de Jeremías sin decidir de manera excesiva entre 'con' y 'ante'. En español, además, mantiene la tensión entre lealtad interior y dirección personal.
- source_word: הַתִּקֵם
  english_pob_choice: Pull them out
  chosen_spanish: Sácalos
  alternatives_spanish:
  - Arráncalos
  - Tíralos fuera
  - Sácalos de allí
  lexicon: HALOT
  rationale: El hifil de נתק expresa sacar/arrancar/retirar con fuerza. 'Sácalos' es breve, natural y suficientemente enérgico para el contexto imprecatorio; evita una paráfrasis excesiva y conserva la imagen de apartarlos violentamente de su lugar.
- source_word: כְּצֹאן לְטִבְחָה
  english_pob_choice: like sheep for slaughter
  chosen_spanish: como ovejas para la matanza
  alternatives_spanish:
  - como un rebaño para la matanza
  - como ovejas para el sacrificio
  lexicon: HALOT
  rationale: El símil es directo y violento. 'Ovejas' es natural en español y comunica el plural colectivo de צֹאן; 'matanza' preserva el sentido de degüello/masacre sin suavizarlo a un término sacrificial más ambiguo.
- source_word: וְהַקְדִּשֵׁם
  english_pob_choice: set them apart
  chosen_spanish: conságralos
  alternatives_spanish:
  - apártalos
  - destínalos
  lexicon: HALOT
  rationale: קדש en Hiphil significa hacer santo o apartar para un fin. La POB inglesa preserva la tensión de 'set apart' incluso para juicio; en español, 'conságralos' mantiene la fuerza lexical y la ambivalencia teológica, aunque requiere una nota para evitar la connotación positiva habitual.
- source_word: לְיוֹם הֲרֵגָה
  english_pob_choice: for the day of killing
  chosen_spanish: para el día de la matanza
  alternatives_spanish:
  - para el día de la muerte
  - para el día del degüello
  lexicon: HALOT
  rationale: הֲרֵגָה se refiere a matar/dar muerte en un marco de juicio. 'Día de la matanza' reproduce el tono brutal del hebreo y se alinea con el símil anterior; también permite conectar la escena con una ejecución judicial, sin domesticarla.
theological_decisions:
- issue: Petición imprecatoria y violencia judicial
  english_pob_reading: Render the petition directly as a plea for divine judgment without softening the violence into mere metaphor.
  chosen_spanish_reading: Traducir la petición de forma directa, conservando la imagen de matanza y apartamiento para juicio.
  alternative_spanish_readings:
  - Suavizar a 'prepáralos para el juicio'
  - Interpretar la imagen solo como exposición figurada
  rationale: El hebreo usa lenguaje explícito de matanza/killing; la POB inglesa decide no rebajarlo. En español, 'Sácalos... como ovejas para la matanza, y conságralos para el día de la matanza' preserva la dureza del ruego de Jeremías sin añadir justificación doctrinal externa.
  doctrine_reference: Filosofía de traducción §§1, 3, 6
- issue: Sentido de אִתָּךְ en relación con el corazón
  english_pob_reading: Or 'my heart is with you.' The Hebrew phrase is compact and may express Jeremiah's inward orientation or loyalty in relation to the LORD.
  chosen_spanish_reading: '''Hacia ti'' como orientación del corazón hacia Yahvé.'
  alternative_spanish_readings:
  - '''Conmigo'''
  - '''Contigo'''
  - '''Ante ti'''
  rationale: La construcción hebrea es debatida. 'Hacia ti' preserva la relación de orientación interior sin decidir de forma absoluta la preposición más literal; así se mantiene la tensión documentada por la POB entre pertenencia, lealtad y dirección del corazón.
  doctrine_reference: Filosofía de traducción §§2, 4
translation_notes:
  revision_awareness: La versión inglesa más reciente reemplazó 'Drag them away' por 'Pull them out' para acercarse más al verbo hebreo נתק, manteniendo naturalidad formal. La traducción española sigue esa revisión con 'Sácalos', que conserva la fuerza del hifil sin introducir un matiz más duro que el texto base. También respeta la decisión inglesa de mantener el lenguaje imprecatorio y la ambigüedad de 'set apart' para juicio.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' de forma consistente para יהוה, conforme a la política del proyecto.
  - Se conserva la fuerza de juicio en 'matanza' y no se suaviza a 'sacrificio' o 'muerte' genérica.
  - '''Hacia ti'' refleja la ambigüedad documentada de אִתָּךְ sin cerrar la lectura a una sola preposición.'
  - '''Conságralos'' requiere nota porque en español puede sonar positivamente cultual; la nota aclara que aquí el apartamiento es para juicio.'
  - El pronombre enclítico 'Sácalos' conserva la concisión del hebreo y la relación directa del mandato con el objeto plural.
