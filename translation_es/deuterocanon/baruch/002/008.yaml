translation:
  language: es
  text: Y no imploramos el favor de Yahvé[a], para que cada uno se aparte de los pensamientos de su corazón malvado[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literalmente, «el rostro de Yahvé». El giro griego es un modismo que señala atención favorable o misericordiosa, no solo una referencia espacial.
    reason: lexical_alternative
  - marker: b
    text: También puede entenderse como «intenciones» o «designios» de su corazón malvado.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐδεήθημεν
  english_pob_choice: entreat the favor
  chosen_spanish: imploramos
  alternatives_spanish:
  - rogamos
  - suplicamos
  - pedimos con insistencia
  lexicon: BDAG; LEH
  rationale: El verbo griego expresa súplica o ruego insistente. En español, «imploramos» conserva el tono formal y orante del verbo sin reducirlo a una petición genérica.
- source_word: τοῦ προσώπου Κυρίου
  english_pob_choice: the favor of the Lord
  chosen_spanish: el favor de Yahvé
  alternatives_spanish:
  - el rostro de Yahvé
  - la presencia de Yahvé
  lexicon: LEH
  rationale: La expresión literal es «el rostro de Yahvé», pero en este contexto idiomático el sentido es buscar su atención favorable o misericordiosa. «Favor» preserva esa fuerza relacional; «Yahvé» sigue el estándar del proyecto para κύριος cuando remite al nombre divino.
- source_word: τοῦ ἀποστρέψαι
  english_pob_choice: that ... might turn
  chosen_spanish: para que ... se apartara
  alternatives_spanish:
  - para que ... volviera
  - a fin de que ... se apartara
  lexicon: BDAG
  rationale: El infinitivo articular expresa finalidad. «Para que ... se apartara» comunica el propósito de la súplica de manera natural en español y mantiene el movimiento de apartarse del mal.
- source_word: ἕκαστον
  english_pob_choice: each one
  chosen_spanish: cada uno
  alternatives_spanish:
  - cada persona
  - cada cual
  lexicon: BDAG
  rationale: «Cada uno» conserva el matiz distributivo singular del griego y suena natural en español bíblico contemporáneo.
- source_word: νοημάτων
  english_pob_choice: thoughts
  chosen_spanish: pensamientos
  alternatives_spanish:
  - intenciones
  - designios
  - planes
  lexicon: LEH
  rationale: En este contexto penitencial, νόημα puede abarcar pensamientos, intenciones o propósitos. «Pensamientos» es la opción más amplia y directa, sin cerrar el sentido moral del término.
- source_word: καρδίας
  english_pob_choice: heart
  chosen_spanish: corazón
  alternatives_spanish:
  - mente
  - interior
  - ser interior
  lexicon: LEH
  rationale: «Corazón» preserva la antropología bíblica de la sede interior de pensamiento y voluntad, mejor que una traducción que la vuelva solo mental.
- source_word: τῆς πονηρᾶς
  english_pob_choice: evil
  chosen_spanish: malo
  alternatives_spanish:
  - maldad
  - perverso
  - malvado
  lexicon: LEH
  rationale: El adjetivo modifica a «corazón». «Malo» es una correspondencia directa y sobria; además permite mantener la estructura del sintagma sin intensificar innecesariamente el juicio moral.
theological_decisions:
- issue: ἡ idiomática de «el rostro/favor del Señor»
  english_pob_reading: Rendered idiomatically as 'the favor of the Lord' in context of entreaty
  chosen_spanish_reading: «el favor de Yahvé»
  alternative_spanish_readings:
  - «el rostro de Yahvé»
  - «la presencia de Yahvé»
  rationale: El giro griego alude al rostro como señal de atención favorable, no solo a la presencia física. En una frase de súplica, «favor» comunica mejor la dimensión de misericordia y audiencia buscada, sin ocultar el trasfondo idiomático.
  doctrine_reference: 'DOCTRINE.md: preservar el sentido idiomático sin perder la referencia al nombre divino'
- issue: Ubicación del mal en el corazón
  english_pob_reading: Kept the biblical image of the heart as the source of evil thoughts
  chosen_spanish_reading: «los pensamientos de su corazón malo»
  alternative_spanish_readings:
  - «las intenciones de su corazón malo»
  - «los designios de su corazón malo»
  rationale: La construcción conserva la imagen bíblica de que el mal brota del corazón como centro moral e interior. «Pensamientos» mantiene el paralelismo con el griego y evita psicologizar el texto solo como mente.
  doctrine_reference: 'DOCTRINE.md: preservar la imaginería antropológica bíblica'
translation_notes:
  revision_awareness: La redacción sigue la revisión más reciente del audit trail en la que ἐδεήθημεν se afinó de un simple «seek» a «entreat»; por eso el español usa «imploramos» y mantiene un tono formal y suplicante. También conserva la finalidad del infinitivo articular y la ambigüedad controlada de νοήματα con una nota alternativa.
  spanish_consistency_notes:
  - Se usa «Yahvé» conforme al estándar del proyecto para κύριος cuando remite al nombre divino.
  - Se preserva «corazón» como sede bíblica de pensamiento y voluntad.
  - La nota [a] marca el modismo semítico de «rostro» sin reemplazarlo en el texto principal.
  - La nota [b] conserva la alternativa semántica de νοήματα sin sobrecargar el texto principal.
