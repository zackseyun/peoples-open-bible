translation:
  language: es
  text: 'Cuando ustedes vienen para presentarse ante mí[a], ¿quién ha requerido esto de su mano: pisotear mis atrios?'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literalmente, «para ver mi rostro», un modismo que significa presentarse en la presencia de Dios.
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  english_pob_choice: When
  chosen_spanish: Cuando
  alternatives_spanish:
  - Porque
  - Puesto que
  lexicon: HALOT
  rationale: Aquí introduce la circunstancia en la que se formula la reprensión, no una causa simple. «Cuando» conserva el valor temporal-condicional y fluye bien con la pregunta retórica en español.
- source_word: תָבֹאוּ
  english_pob_choice: you come
  chosen_spanish: vengáis
  alternatives_spanish:
  - entréis
  - lleguéis
  lexicon: HALOT
  rationale: El verbo básico es venir/entrar. «Vengáis» encaja de manera natural con el infinitivo siguiente y mantiene la idea de acudir al santuario.
- source_word: לֵרָאוֹת פָּנַי
  english_pob_choice: to appear before me
  chosen_spanish: para presentaros ante mí
  alternatives_spanish:
  - para ver mi rostro
  - para aparecer ante mí
  lexicon: HALOT
  rationale: El hebreo dice literalmente «ver mi rostro», pero en contexto culto significa presentarse en la presencia de Dios. «Presentaros ante mí» conserva el sentido idiomático sin volverlo demasiado literal.
- source_word: בִקֵּשׁ
  english_pob_choice: has required
  chosen_spanish: ha pedido
  alternatives_spanish:
  - ha requerido
  - ha exigido
  lexicon: HALOT
  rationale: En este contexto el verbo no expresa mera búsqueda, sino una demanda sobre la práctica cultual. «Ha pedido» funciona bien en español bíblico y evita un tono demasiado técnico; «ha requerido» queda como alternativa más cercana al registro del inglés POB.
- source_word: מִיֶּדְכֶם
  english_pob_choice: from your hand
  chosen_spanish: de vuestra mano
  alternatives_spanish:
  - de vosotros
  - a vuestra mano
  lexicon: HALOT
  rationale: Se conserva la imagen concreta de la «mano» como idiomatismo de responsabilidad y procedencia. «De vuestra mano» es natural y fiel en español.
- source_word: רְמֹס
  english_pob_choice: trampling
  chosen_spanish: el pisoteo
  alternatives_spanish:
  - pisotear
  - la acción de pisotear
  lexicon: HALOT
  rationale: El infinitivo funciona como sustantivo que nombra la acción acusada. «El pisoteo» preserva esa función nominal y su fuerza despectiva.
- source_word: חֲצֵרָי
  english_pob_choice: my courts
  chosen_spanish: de mis atrios
  alternatives_spanish:
  - de mis patios
  - de mis patios del templo
  lexicon: HALOT
  rationale: En contexto del templo, «atrios» es el término más claro y reconocido en español para los recintos sagrados. Se evita «patios» por sonar demasiado doméstico.
theological_decisions:
- issue: Idiomatismo cultual לֵרָאוֹת פָּנַי
  english_pob_reading: to appear before me
  chosen_spanish_reading: para presentaros ante mí
  alternative_spanish_readings:
  - para ver mi rostro
  rationale: La frase apunta a la comparecencia de adoradores ante Yahvé en el santuario. La opción elegida evita que el lector moderno entienda la expresión como una simple percepción visual y mantiene el matiz de presencia litúrgica.
  doctrine_reference: Principio de equivalencia óptima con primacía del hebreo sobre la tradición de traducción.
translation_notes:
  revision_awareness: Se siguió la revisión auditada del inglés POB que prefirió dos puntos para reflejar la aposición hebrea y mantener «from your hand / de vuestra mano» junto con la imagen de «trampling / pisoteo». En español se conservó la estructura retórica con una pregunta y una aposición nominal final.
  spanish_consistency_notes:
  - Se usó Yahvé para el tetragrámaton según la pauta del proyecto, aunque en este versículo no aparece explícitamente en el texto hebreo.
  - Se mantuvo el registro reverente pero moderno, evitando calcos demasiado rígidos.
  - «Atrios» se eligió como equivalente consistente para el recinto del templo en contexto cultual.
