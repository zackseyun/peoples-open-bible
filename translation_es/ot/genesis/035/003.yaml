translation:
  language: es
  text: Levantémonos y subamos a Betel[a], y allí haré un altar al Dios que me respondió[b] en el día de mi angustia y estuvo conmigo en el camino por donde anduve.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'Bethel', manteniendo la transliteración tradicional del nombre propio.
    reason: lexical_alternative
  - marker: b
    text: O 'que me responde', conservando el valor más general u habitual del participio hebreo.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְנָק֥וּמָה
  english_pob_choice: Let us rise
  chosen_spanish: Levantémonos
  alternatives_spanish:
  - Levantémonos, pues
  - Levantémonos y pongámonos en camino
  lexicon: HALOT
  rationale: El cohortativo exhortativo pide un verbo de iniciativa en primera persona plural. 'Levantémonos' conserva el impulso volitivo y suena natural en español bíblico contemporáneo.
- source_word: וְנַעֲלֶ֖ה
  english_pob_choice: and go up
  chosen_spanish: y subamos
  alternatives_spanish:
  - y ascendamos
  - y vayamos
  lexicon: HALOT
  rationale: עלה expresa 'subir/ascender'. 'Subamos' conserva la imagen espacial ligada a Betel sin volver el español rígido.
- source_word: בֵּֽית אֵ֑ל
  english_pob_choice: Bethel
  chosen_spanish: Betel
  alternatives_spanish:
  - Bethel
  - Casa de Dios
  lexicon: HALOT
  rationale: Se trata del topónimo; por consistencia de nombres propios se translitera como 'Betel' en español.
- source_word: וְאֶֽעֱשֶׂה שָּׁ֣ם מִזְבֵּ֗חַ
  english_pob_choice: and there I will make an altar
  chosen_spanish: y allí haré un altar
  alternatives_spanish:
  - y allí construiré un altar
  - y allí prepararé un altar
  lexicon: HALOT
  rationale: עָשָׂה con מִזְבֵּחַ puede expresarse como 'hacer' sin perder fidelidad. 'Haré un altar' mantiene la cercanía al hebreo y es idiomático en español.
- source_word: לָאֵ֞ל
  english_pob_choice: to the God
  chosen_spanish: al Dios
  alternatives_spanish:
  - a Dios
  - para el Dios
  lexicon: HALOT
  rationale: El prefijo ל indica dirección/dedicación. 'Al Dios' conserva la determinación del hebreo y la relación con la cláusula siguiente.
- source_word: הָעֹנֶ֤ה אֹתִ/י֙
  english_pob_choice: who answered me
  chosen_spanish: que me respondió
  alternatives_spanish:
  - que me responde
  - que me ha respondido
  lexicon: HALOT
  rationale: El participio hebreo admite fuerza habitual o descriptiva, pero el contexto remite a una respuesta pasada de Dios a Jacob. En español, el pretérito 'respondió' comunica bien ese recuerdo narrativo sin eliminar la posibilidad de una descripción característica, que queda sugerida por el contexto y la nota.
- source_word: בְּי֣וֹם צָֽרָתִ֔/י
  english_pob_choice: in the day of my distress
  chosen_spanish: en el día de mi angustia
  alternatives_spanish:
  - en el día de mi aflicción
  - en el tiempo de mi angustia
  lexicon: HALOT
  rationale: '''Angustia'' comunica adecuadamente צָרָה en español bíblico actual, preservando el sentido de aflicción o presión sin exagerar ni suavizar el término.'
- source_word: וַיְהִי֙ עִמָּדִ֔/י
  english_pob_choice: and was with me
  chosen_spanish: y estuvo conmigo
  alternatives_spanish:
  - y ha estado conmigo
  - y permaneció conmigo
  lexicon: HALOT
  rationale: La forma narrativa wayyiqtol se vierte naturalmente en pretérito simple. 'Estuvo conmigo' mantiene la declaración sobria de presencia divina.
- source_word: בַּדֶּ֖רֶךְ אֲשֶׁ֥ר הָלָֽכְתִּי
  english_pob_choice: on the way that I went
  chosen_spanish: en el camino por el que he andado
  alternatives_spanish:
  - en el camino por el que fui
  - en la ruta por la que he caminado
  lexicon: HALOT
  rationale: '''Camino'' conserva la concreción de דֶּרֶךְ. La relativa con ''he andado'' expresa el trayecto vivido por Jacob con naturalidad en español y preserva el matiz de experiencia recorrida.'
theological_decisions:
- issue: Identidad de אֵל en la cláusula final
  english_pob_reading: the God
  chosen_spanish_reading: el Dios
  alternative_spanish_readings:
  - Dios
  - el Dios que
  rationale: 'El hebreo usa אֵל con artículo y una cláusula calificativa: no es un nombre genérico, sino una identificación del Dios que actuó por Jacob. ''El Dios'' preserva esa especificidad y evita diluirla en una formulación más interpretativa.'
  doctrine_reference: 'Principio POB: primacía del texto original y conservación de la identificación verbal cuando el hebreo la marca.'
- issue: Valor temporal y aspectual de הָעֹנֶה
  english_pob_reading: who answered me
  chosen_spanish_reading: que me respondió
  alternative_spanish_readings:
  - que me responde
  - que me está respondiendo
  rationale: Aunque el participio hebreo puede tener valor general o continuo, aquí Jacob recuerda una intervención concreta. El pretérito español deja visible esa memoria histórica sin negar que el hebreo mantenga una cualidad caracterizadora del Dios que oye/responde.
  doctrine_reference: 'Principio POB: preservar la tensión léxica/aspectual cuando el contexto la orienta, sin forzar una resolución dogmática.'
translation_notes:
  revision_awareness: La redacción sigue el consenso de la auditoría inglesa sin cambios sustantivos respecto de la última pasada, que marcó el texto como estable. Se conserva la nota sobre el participio hebreo y se ajusta a una formulación española natural sin perder la tensión aspecto/tiempo.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' como norma del proyecto, pero aquí el texto hebreo usa אֵל con artículo; por tanto, se traduce 'el Dios' según la decisión auditada.
  - Se conserva 'Betel' como transliteración de nombre propio, no como 'Casa de Dios'.
  - '''Angustia'' se eligió para צָרָה por ser comprensible y solemne en español bíblico contemporáneo.'
  - '''Camino'' y ''he andado'' preservan la imagen concreta de דרך + הלך sin caer en calco mecánico.'
