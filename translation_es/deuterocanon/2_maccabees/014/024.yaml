translation:
  language: es
  text: Y mantuvo a Judas continuamente ante sí[a]; estaba interiormente inclinado hacia aquel hombre[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «lo tenía siempre en su presencia». El giro griego puede referirse tanto a mantener a alguien físicamente cerca como a tenerlo constantemente delante de su atención.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «se sentía interiormente atraído hacia aquel hombre» o «sentía profundo afecto por aquel hombre». El adverbio y el verbo juntos expresan una inclinación interna y estable de favor.'
    reason: lexical_alternative
lexical_decisions:
- source_word: εἶχεν ... ἐν προσώπῳ
  english_pob_choice: kept ... before him
  chosen_spanish: mantuvo ... ante sí
  alternatives_spanish:
  - lo tuvo en su presencia
  - lo mantuvo siempre delante de él
  - lo tuvo continuamente ante sí
  lexicon: LSJ
  rationale: El giro griego literalmente alude a estar 'ante el rostro/presencia'. 'Ante sí' conserva la imagen espacial sin sonar forzado en español, y 'mantuvo' expresa la continuidad de la actitud o la presencia mantenida.
- source_word: διὰ παντός
  english_pob_choice: continually
  chosen_spanish: continuamente
  alternatives_spanish:
  - siempre
  - en todo momento
  - sin cesar
  lexicon: LSJ
  rationale: La idea es de constancia o permanencia. 'Continuamente' reproduce bien esa continuidad narrativa sin exagerar con una absolutización innecesaria.
- source_word: ψυχικῶς
  english_pob_choice: inwardly
  chosen_spanish: interiormente
  alternatives_spanish:
  - de corazón
  - profundamente
  - en su alma
  lexicon: LSJ
  rationale: El adverbio procede de ψυχή y señala una disposición interna. 'Interiormente' mantiene el matiz psicológico y evita una traducción demasiado literal y poco natural como 'en su alma'.
- source_word: προσεκέκλιτο
  english_pob_choice: was inwardly drawn to
  chosen_spanish: se inclinaba hacia
  alternatives_spanish:
  - estaba inclinado hacia
  - sentía afecto por
  - era atraído hacia
  lexicon: LSJ
  rationale: El perfecto sugiere una disposición asentada. 'Se inclinaba hacia' comunica una inclinación personal y estable, sin convertirla en una adhesión técnica ni en una emoción más fuerte de la que el griego exige.
- source_word: τῷ ἀνδρί
  english_pob_choice: the man
  chosen_spanish: el hombre
  alternatives_spanish:
  - ese hombre
  - a aquel hombre
  - a Judas
  lexicon: LSJ
  rationale: Se conserva la referencia explícita de 'el hombre', como en el griego, para mantener el énfasis personal y no resolver demasiado pronto la formulación en un pronombre o el nombre propio.
translation_notes:
  revision_awareness: La redacción sigue la revisión del expediente inglés que sustituyó 'en su alma' por una expresión más natural ('interiormente'), pero conserva el valor antropológico e interno de ψυχικῶς. También refleja la decisión revisada de expresar προσεκέκλιτο como una inclinación interna y estable, no como una simple cercanía física.
  spanish_consistency_notes:
  - Se evitó 'SEÑOR' u otros reemplazos teológicos no presentes en el texto, ya que aquí no aparece el Tetragrámaton ni un título divino.
  - Se prefirió 'interiormente' sobre 'en su alma' para mantener naturalidad en español sin perder el matiz psicológico del adverbio griego.
  - '''Ante sí'' conserva la ambigüedad textual entre presencia física y atención constante, tal como lo hace la nota inglesa.'
