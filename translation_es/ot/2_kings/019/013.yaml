translation:
  language: es
  text: ¿Dónde está el rey de Hamat, y el rey de Arpad, y el rey de la ciudad de Sefarvaim, Hena[a] e Ivvá?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «Henah»; la transliteración de este topónimo varía en la tradición.
    reason: lexical_alternative
lexical_decisions:
- source_word: אַיּוֹ
  english_pob_choice: Where is
  chosen_spanish: ¿Dónde está
  alternatives_spanish:
  - ¿Dónde ahora está
  - ¿Dónde se encuentra
  lexicon: HALOT
  rationale: La forma interrogativa expresa una pregunta retórica sobre la desaparición o derrota de estos reyes. En español, «¿Dónde está» reproduce con naturalidad esa fuerza idiomática sin añadir matices no presentes en el hebreo.
- source_word: מֶלֶךְ
  english_pob_choice: king
  chosen_spanish: rey
  alternatives_spanish:
  - ruler
  - monarca
  lexicon: HALOT
  rationale: El sustantivo básico es «rey»; se conserva la repetición triple del hebreo para mantener el golpe retórico de la burla.
- source_word: חֲמָת
  english_pob_choice: Hamath
  chosen_spanish: Hamat
  alternatives_spanish:
  - Hamath
  lexicon: transliteration
  rationale: Se translitera el topónimo con la forma hispana más clara y reconocible, sin traducirlo.
- source_word: אַרְפָּד
  english_pob_choice: Arpad
  chosen_spanish: Arpad
  alternatives_spanish:
  - Arfad
  lexicon: transliteration
  rationale: Se conserva el nombre propio por transliteración estándar, siguiendo el tratamiento de topónimos del original y del POB inglés.
- source_word: לָעִיר סְפַרְוָיִם
  english_pob_choice: the city of Sepharvaim
  chosen_spanish: la ciudad de Sefarvaim
  alternatives_spanish:
  - la ciudad de Sepharvaim
  - Sefarvaim
  lexicon: HALOT
  rationale: El hebreo vincula «la ciudad de» con el topónimo. En español, «la ciudad de Sefarvaim» refleja esa relación sin forzar una construcción poco natural como «el rey de la ciudad de…» más allá de lo que el contexto ya exige.
- source_word: הֵנַע
  english_pob_choice: Hena
  chosen_spanish: Hena
  alternatives_spanish:
  - Hená
  - Henah
  lexicon: transliteration
  rationale: Se mantiene la forma breve del topónimo, coherente con la decisión inglesa revisada de usar Hena. No se añade una vocalización alternativa en el texto principal porque el contexto no la requiere.
- source_word: וְעִוָּה
  english_pob_choice: Ivvah
  chosen_spanish: Ivvá
  alternatives_spanish:
  - Ivvah
  - Ivá
  lexicon: transliteration
  rationale: Se translitera el nombre propio con adaptación gráfica al español. Se evita «de Ivvá» porque el hebreo aquí enumera nombres dentro de la serie retórica, y el español puede conservar la simple coordinación.
theological_decisions:
- issue: Función retórica de la pregunta
  english_pob_reading: A taunt question asking for the whereabouts of defeated kings
  chosen_spanish_reading: Pregunta de burla sobre la desaparición de reyes derrotados
  alternative_spanish_readings:
  - Pregunta informativa neutral
  - Pregunta profética sin tono burlón
  rationale: El contexto es una arrogante provocación asiria; por eso la traducción debe dejar sentir la ironía y la humillación implícitas, no solo una consulta neutra de ubicación.
  doctrine_reference: Contexto narrativo de 2 Reyes 19; retórica profética y de guerra en el ANE
translation_notes:
  revision_awareness: La revisión inglesa eliminó una segunda preposición equivalente a «of» antes de Hena para que la enumeración quedara más natural y más cercana a la secuencia hebrea. En español se sigue esa decisión manteniendo la serie de topónimos sin repetir una preposición innecesaria antes de Hena e Ivvá.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como convención general del proyecto, pero este versículo no contiene el nombre divino.
  - Se usa coordinación simple en la serie final («Hena e Ivvá») para reflejar la acumulación de nombres propios del hebreo.
  - La capitalización de topónimos sigue el uso normal del español bíblico.
  - No se introduce «Cristo», «Mesías» ni terminología teológica ajena al texto.
  - La puntuación reproduce la estructura interrogativa retórica del hebreo y del POB inglés.
