revisions:
- from: Entonces Moisés y Aarón hicieron así[a], tal como Yahvé había mandado. Y él levantó la vara e ضرب?
  to: Entonces Moisés y Aarón hicieron así[a], tal como Yahvé había mandado. Y él levantó la vara y golpeó el agua que estaba en el Nilo ante los ojos del faraón y ante los ojos de sus siervos, y toda el agua que estaba en el Nilo se convirtió en sangre.
