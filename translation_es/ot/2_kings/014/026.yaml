translation:
  language: es
  text: Porque Yahvé vio que la aflicción de Israel era muy amarga[a], y no había ni esclavo ni libre[b], ni había quien ayudara a Israel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O “muy grave” o “muy severa”. La expresión hebrea es difícil, pero claramente intensifica el sufrimiento de Israel.
    reason: lexical_alternative
  - marker: b
    text: 'Modismo hebreo: “ni esclavo ni libre”. La expresión probablemente significa que no quedó nadie para ayudar, o que toda clase de personas estaba agotada.'
    reason: alternative_reading
lexical_decisions:
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahveh
  - SEÑOR
  lexicon: HALOT
  rationale: Se sigue el default del proyecto para el nombre divino, conservando la referencia de pacto y evitando el masking litúrgico de “SEÑOR”. “Yahvé” es la forma española estable y transparente correspondiente a Yahweh.
- source_word: עֳנִי
  english_pob_choice: affliction
  chosen_spanish: aflicción
  alternatives_spanish:
  - miseria
  - pobreza
  - humillación
  lexicon: HALOT
  rationale: El contexto nacional apunta a sufrimiento o angustia general de Israel, no sólo a pobreza material. “Aflicción” mantiene amplitud semántica y naturalidad en español.
- source_word: מֹרֶה מְאֹד
  english_pob_choice: very bitter
  chosen_spanish: muy amarga
  alternatives_spanish:
  - muy grave
  - muy severa
  - muy amarga
  lexicon: HALOT
  rationale: La lectura inglesa preserva la dificultad del hebreo y opta por una imagen de intensidad. En español, “amarga” conserva bien la fuerza de la experiencia dolorosa sin imponer una paráfrasis excesiva. La ambigüedad léxica se conserva en nota.
- source_word: אֶפֶס עָצוּר וְאֶפֶס עָזוּב
  english_pob_choice: there was neither bond nor free
  chosen_spanish: ni atado ni suelto
  alternatives_spanish:
  - ni preso ni libre
  - ni retenido ni abandonado
  - ni esclavo ni libre
  lexicon: HALOT
  rationale: El inglés POB preserva la estructura idiomática totalizante. En español, “atado/suelto” reproduce mejor la oposición compacta del hebreo sin introducir una lectura social más específica que no esté exigida por el texto.
- source_word: עֹזֵר
  english_pob_choice: helper
  chosen_spanish: quien ayudara
  alternatives_spanish:
  - ayudante
  - socorredor
  - auxiliador
  lexicon: HALOT
  rationale: En español la cláusula resultante suena más natural con una relativa verbal que con un sustantivo abstracto. Se mantiene el sentido de auxilio disponible para Israel.
theological_decisions:
- issue: Cómo representar el nombre divino יהוה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Jehová
  rationale: El proyecto pide Yahvé como forma principal. Esto preserva la identificación del nombre de pacto y evita la sustitución convencional por un título. No se requiere nota doctrinal adicional porque la elección sigue la política editorial explícita del proyecto.
  doctrine_reference: Project terminology default for יהוה
- issue: Interpretación del idiomático עָצוּר וְעָזוּב
  english_pob_reading: there was neither bond nor free
  chosen_spanish_reading: ni atado ni suelto
  alternative_spanish_readings:
  - ni esclavo ni libre
  - ni retenido ni abandonado
  - ni preso ni libre
  rationale: El inglés POB mantiene la fuerza idiomática y evita decidir de manera demasiado estrecha la clase social o jurídica. En español, “atado ni suelto” conserva esa amplitud y la polaridad totalizante. Se deja abierta la tensión interpretativa del hebreo.
  doctrine_reference: Translation philosophy §3, §5
- issue: La expresión קשה/oscura מֹרֶה מְאֹד
  english_pob_reading: was very bitter
  chosen_spanish_reading: era muy amarga
  alternative_spanish_readings:
  - era muy grave
  - era muy severa
  rationale: La forma hebrea es difícil y el POB inglés preserva esa dificultad con una opción de intensidad y una nota de alternativas. En español, “muy amarga” transmite sufrimiento agudo y mantiene el registro sin afirmar más de lo que el hebreo permite.
  doctrine_reference: Translation philosophy §3
translation_notes:
  revision_awareness: 'El inglés POB revisó la puntuación para acercarse mejor al flujo del hebreo, manteniendo el contenido sin cambios. En español se siguió ese mismo flujo con una sola oración coordinada por comas y sin dos puntos, conservando la progresión: causa, percepción divina, intensidad del sufrimiento y ausencia total de ayuda.'
  spanish_consistency_notes:
  - Se mantuvo Yahvé para יהוה conforme al estándar del proyecto.
  - Se evitó “SEÑOR” como sustituto del nombre divino.
  - Se conservó la tensión del hebreo oscuro מֹרֶה מְאֹד mediante una traducción intensa y nota de alternativas.
  - Se optó por una construcción española natural para עֹזֵר sin perder el sentido de ayuda ausente.
  - La frase idiomática de total ausencia se mantuvo sin explicitar categorías sociales más allá de lo que el texto exige.
