translation:
  language: es
  text: Cuando David terminó de ofrecer la ofrenda quemada y las ofrendas de paz[a], bendijo al pueblo en el nombre de Yahvé.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «las ofrendas de comunión» o «las ofrendas de bienestar».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְכַל
  english_pob_choice: When ... finished
  chosen_spanish: Cuando ... terminó
  alternatives_spanish:
  - Y ... acabó
  - Y ... concluyó
  lexicon: HALOT
  rationale: El valor de la forma verbal es de terminación de una acción con avance narrativo; en español, «Cuando David terminó» conserva la relación temporal natural sin volverla mecánica.
- source_word: מֵהַעֲלוֹת
  english_pob_choice: offering up
  chosen_spanish: de ofrecer
  alternatives_spanish:
  - de subir en ofrenda
  - después de ofrecer
  lexicon: HALOT
  rationale: La construcción con מִן + infinitivo expresa aquí la acción sacrificial que se acaba de completar. En español, «terminó de ofrecer» es idiomático y mantiene el sentido cultual del verbo.
- source_word: הָעֹלָה
  english_pob_choice: the burnt offering
  chosen_spanish: el holocausto
  alternatives_spanish:
  - la ofrenda quemada
  - el sacrificio totalmente quemado
  lexicon: HALOT
  rationale: «Holocausto» es el equivalente cultual tradicional en español para עֹלָה y conserva el sentido de ofrenda totalmente consumida por el fuego.
- source_word: וְהַשְּׁלָמִים
  english_pob_choice: the peace offerings
  chosen_spanish: los sacrificios de comunión
  alternatives_spanish:
  - las ofrendas de paz
  - los sacrificios de bienestar
  lexicon: HALOT
  rationale: 'שְׁלָמִים admite varios matices: paz, bienestar y comunión/fellowship. En español, «sacrificios de comunión» comunica bien la relación comunitaria del término sin perder la categoría sacrificial.'
- source_word: וַיְבָרֶךְ
  english_pob_choice: he blessed
  chosen_spanish: bendijo
  alternatives_spanish:
  - pronunció una bendición sobre
  - bendijo solemnemente
  lexicon: HALOT
  rationale: La forma verbal expresa bendecir de manera directa; «bendijo» es la traducción natural y precisa.
- source_word: אֶת־הָעָם
  english_pob_choice: the people
  chosen_spanish: al pueblo
  alternatives_spanish:
  - al pueblo entero
  - a la gente
  lexicon: HALOT
  rationale: El objeto directo es simplemente «el pueblo»; en español, «al pueblo» reproduce de modo claro y breve el referente.
- source_word: בְּשֵׁם יְהוָה
  english_pob_choice: in the name of Yahweh
  chosen_spanish: en el nombre de Yahvé
  alternatives_spanish:
  - por el nombre de Yahvé
  - en nombre de Yahvé
  lexicon: HALOT
  rationale: La preposición בְּשֵׁם se rinde de forma natural como «en el nombre de». YHWH se translitera como «Yahvé» conforme al criterio doctrinal del proyecto, preservando el nombre divino.
theological_decisions:
- issue: 'שְׁלָמִים: categoría sacrificial con matiz de paz/comunión/bienestar'
  english_pob_reading: peace offerings
  chosen_spanish_reading: sacrificios de comunión
  alternative_spanish_readings:
  - ofrendas de paz
  - sacrificios de bienestar
  rationale: El hebreo admite más de un matiz semántico. «Sacrificios de comunión» evita reducir el término a una sola idea y deja visible su dimensión relacional, mientras mantiene la referencia a una categoría sacrificial reconocible.
  doctrine_reference: Translation philosophy §5 (consistency of key terms, or documented exception)
- issue: 'יְהוָה: tratamiento del nombre divino'
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  rationale: El texto hebreo usa el Tetragrámaton directamente; se conserva como nombre propio divino en español con la forma estándar del proyecto, «Yahvé», en lugar de sustituirlo por un título.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
translation_notes:
  revision_awareness: 'El borrador sigue el acuerdo alto del control cruzado y no requiere cambios respecto al análisis base: conserva la secuencia narrativa, el léxico sacrificial y la transliteración del nombre divino conforme al criterio del proyecto.'
  spanish_consistency_notes:
  - Se mantiene la distinción cultual entre «holocausto» y «sacrificios de comunión».
  - «Yahvé» se usa de forma consistente para יְהוָה en la línea principal.
  - El orden de la cláusula refleja la progresión narrativa del hebreo sin añadir información implícita.
