translation:
  language: es
  text: Entonces Satanás se levantó contra Israel e incitó a David a contar a Israel[a][b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘adversario’. El hebreo satan puede significar ‘adversario’ o funcionar como el nombre o título personal ‘Satanás’.
    reason: lexical_alternative
  - marker: b
    text: 2 Samuel 24:1 atribuye la incitación a la ira de Yahvé contra Israel. Crónicas presenta a Satanás como el agente inmediato, preservando una tensión teológica en vez de nivelar ambos relatos.
    reason: cross_reference
lexical_decisions:
- source_word: וַיַּעֲמֹד
  english_pob_choice: stood up
  chosen_spanish: se puso
  alternatives_spanish:
  - se levantó
  - se puso en pie
  lexicon: HALOT
  rationale: El hebreo expresa la idea concreta de ‘ponerse de pie’ o ‘tomar posición’. En español, ‘se puso contra’ conserva la iniciativa hostil sin sonar forzado. ‘Se levantó’ puede sugerir simplemente levantarse, y ‘se puso en pie’ resulta más marcado pero menos natural en esta construcción.
- source_word: שָׂטָן
  english_pob_choice: Satan
  chosen_spanish: Satanás
  alternatives_spanish:
  - adversario
  - acusador
  lexicon: HALOT
  rationale: Aunque el sustantivo hebreo puede significar ‘adversario’, el contexto narrativo y la lectura canónica favorecen aquí un referente personal. ‘Satanás’ preserva esa lectura principal en español, mientras que la alternativa léxica se mantiene en nota.
- source_word: עַל יִשְׂרָאֵל
  english_pob_choice: against Israel
  chosen_spanish: contra Israel
  alternatives_spanish:
  - sobre Israel
  - respecto de Israel
  lexicon: HALOT
  rationale: Con un verbo de oposición, עַל se expresa naturalmente en español como ‘contra’. ‘Sobre’ sería menos idiomático aquí y ‘respecto de’ debilitaría el matiz hostil.
- source_word: וַיָּסֶת
  english_pob_choice: incited
  chosen_spanish: incitó
  alternatives_spanish:
  - movió
  - provocó
  - instigó
  lexicon: HALOT
  rationale: El hifil de סות indica inducir o provocar a una acción. ‘Incitó’ comunica bien la acción causal y mantiene el carácter de impulso hacia un acto indebido sin exagerar la fuerza causal.
- source_word: לִמְנוֹת
  english_pob_choice: to count
  chosen_spanish: a contar
  alternatives_spanish:
  - a numerar
  - a tomar censo de
  lexicon: HALOT
  rationale: מנה significa ‘contar’ o ‘numerar’. ‘A contar’ reproduce con sobriedad el infinitivo de propósito. ‘Tomar censo de’ explicita más de lo que dice el hebreo, aunque sea contextual.
- source_word: אֶת יִשְׂרָאֵל
  english_pob_choice: Israel
  chosen_spanish: a Israel
  alternatives_spanish:
  - al pueblo de Israel
  lexicon: HALOT
  rationale: El objeto directo es simplemente ‘Israel’. En español, después de ‘contar’, ‘a Israel’ es natural y conserva la brevedad del hebreo sin expansión interpretativa.
theological_decisions:
- issue: Identidad de שָׂטָן en el pasaje
  english_pob_reading: Satan as a personal adversarial figure, while preserving the lexical possibility of 'adversary'
  chosen_spanish_reading: Satanás como figura personal adversaria, sin borrar la posibilidad léxica de ‘adversario’
  alternative_spanish_readings:
  - un adversario
  - el acusador
  rationale: La lectura principal de la crónica, en paralelo con la tensión de 2 Samuel 24:1, favorece un agente personal. La traducción conserva esa lectura en el cuerpo del texto y deja la alternativa léxica en nota para no resolver la tensión canónica a la fuerza.
  doctrine_reference: Mantener la tensión canónica; primacía del texto original
- issue: Relación con 2 Samuel 24:1
  english_pob_reading: Chronicles presents Satan as the immediate agent, preserving a theological tension rather than flattening either account.
  chosen_spanish_reading: Crónicas presenta a Satanás como el agente inmediato, preservando una tensión teológica en vez de nivelar ambos relatos.
  alternative_spanish_readings:
  - armonizar plenamente con 2 Samuel 24:1
  - atribuir la acción solo a la ira de Yahvé
  rationale: La nota debe reflejar la decisión POB de no resolver la aparente divergencia por paráfrasis explicativa. Se mantiene la atribución de Crónicas y se señala la relación con 2 Samuel como tensión preservada, no como contradicción eliminada.
  doctrine_reference: 2 Samuel 24:1; 1 Crónicas 21:1
- issue: Uso de Yahvé en la nota implícita de contraste
  english_pob_reading: The cross-reference to 2 Samuel 24:1 attributes the incitement to the LORD's anger against Israel.
  chosen_spanish_reading: La referencia cruzada a 2 Samuel 24:1 atribuye la incitación a la ira de Yahvé contra Israel.
  alternative_spanish_readings:
  - la ira del Señor
  - la ira divina
  rationale: Aunque el versículo traducido no nombra a Yahvé, la tensión con 2 Samuel 24:1 en la decisión teológica requiere mantener el nombre divino propio del proyecto en la explicación española.
  doctrine_reference: 2 Samuel 24:1; terminología POB para יהוה
translation_notes:
  revision_awareness: Coincide con la última revisión del contexto en que no se requirieron cambios; la versión española conserva la misma decisión interpretativa principal y solo la expresa en español con naturalidad.
  spanish_consistency_notes:
  - Se mantiene ‘Satanás’ en el texto principal y ‘adversario’ en nota para respetar la ambigüedad léxica documentada.
  - Se usa ‘Yahvé’ en la nota de contraste con 2 Samuel 24:1 conforme a la terminología base del proyecto.
  - ‘Incitó’ se conserva por ser la mejor correspondencia breve y natural para וַיָּסֶת en este contexto narrativo.
  - La frase ‘a contar a Israel’ sigue la tersura del hebreo sin expandir a ‘tomar censo’ en el texto principal.
