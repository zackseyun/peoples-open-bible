base_translation:
  language: en
  yaml_path: translation/ot/1_samuel/026/005.yaml
  text: Then David arose and came to the place where Saul had camped[a], and David saw the place where Saul lay, and Abner son of Ner, the commander of his army. Saul was lying within the encampment, and the people were camped around him.
  footnotes:
