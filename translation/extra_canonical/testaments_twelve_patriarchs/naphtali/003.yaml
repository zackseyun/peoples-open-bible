  text: III. Μὴ οὖν σπουδάζετε¹ *ἐν πλεονεξίᾳ² *διαφθεῖραι τὰς πράξεις ὑμῶν³, ἢ ἐν *λόγοις κενοῖς ἀπατᾶν⁴ τὰς ψυχὰς ὑμῶν, ὅτι⁵ σιωπῶντες⁶ ἐν *καθαρότητι καρδίας⁷ συνήσετε⁸ τὸ θέλημα τοῦ Θεοῦ⁹ κρατεῖν¹⁰, καὶ ἀπορρίπτειν τὸ θέλημα τοῦ Βελίαρ¹¹. 2. Ὁ¹² ἥλιος καὶ ἡ¹² σελήνη καὶ οἱ¹² ἀστέρες οὐ †καλύψουσι¹³ τὴν¹⁴ τάξιν αὐτῶν· οὕτως¹⁵ καὶ ὑμεῖς μὴ ἀλλοιώσητε¹⁶ νόμον Θεοῦ¹⁷ ἐν ἀταξίᾳ τῶν¹⁸ πράξεων ὑμῶν¹⁹. 3. Ἔθνη πλανηθέντα *καὶ ἀφέντα Κύριον²⁰ ἠλλοίωσαν²¹ τὴν²² τάξιν αὐτῶν, καὶ *ὑπήκουσαν ξύλοις καὶ λίθοις²³, πνεύμασι²⁴ πλάνης. 4. Ὑμεῖς δὲ *μὴ οὕτως²⁵, τέκνα μου, γινώσκοντες²⁶ ἐν τῷ²⁷ στερεώματι, ἐν γῇ καὶ²⁸ ἐν²⁹ θαλάττῃ, καὶ²⁸ ἐν³⁰ πᾶσι τοῖς δημιουργήμασι *Κύριον τὸν³¹ ποιήσαντα πάντα³², ἵνα μὴ γένησθε³³ ὡς Σόδομα, ἥτις³⁴ ἐνήλλαξε³⁵ τάξιν φύσεως αὐτῆς³⁶. 5. Ὁμοίως³⁷ δὲ³⁸ καὶ³⁹ οἱ Ἐγρήγοροι⁴⁰ ἐνήλλαξαν τάξιν φύσεως αὐτῶν, οὓς⁴¹ κατηράσατο⁴² Κύριος ἐπὶ τοῦ κατακλυσμοῦ⁴³, διʼ οὓς⁴⁴ *ἀπὸ κατοικησίας καὶ ἄκαρπον τάξας τὴν γῆν [ἀοίκητον]⁴⁵.
