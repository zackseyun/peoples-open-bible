translation:
  language: es
  text: Y Hiram envió al rey[a] ciento veinte talentos de oro[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El hebreo dice simplemente «al rey»; el contexto identifica a Salomón.
    reason: alternative_reading
  - marker: b
    text: Un talento era una gran unidad de peso; aquí la frase se refiere a ciento veinte talentos de oro.
    reason: cultural_note
lexical_decisions:
- source_word: וַיִּשְׁלַח
  english_pob_choice: sent
  chosen_spanish: envió
  alternatives_spanish:
  - mandó
  - despachó
  lexicon: HALOT
  rationale: El waw consecutivo da avance narrativo en pasado simple; en español, 'envió' reproduce de forma natural y directa el sentido básico de שלח en este contexto.
- source_word: חִירָם
  english_pob_choice: Hiram
  chosen_spanish: Hiram
  alternatives_spanish:
  - Huram
  lexicon: convención onomástica bíblica
  rationale: El nombre propio se translitera según la forma usual en español y coincide con la forma hebrea Hiram/Hiram en Reyes.
- source_word: לַמֶּלֶךְ
  english_pob_choice: to the king
  chosen_spanish: al rey
  alternatives_spanish:
  - al rey Salomón
  lexicon: HALOT
  rationale: El hebreo dice literalmente 'al rey' con artículo definido; en español conviene preservar esa forma sin introducir el nombre propio en el texto principal.
- source_word: מֵאָה וְעֶשְׂרִים
  english_pob_choice: one hundred and twenty
  chosen_spanish: ciento veinte
  alternatives_spanish:
  - cien y veinte
  lexicon: HALOT
  rationale: Es la expresión cardinal directa y la forma idiomática normal en español para esta cantidad.
- source_word: כִּכַּר
  english_pob_choice: talents
  chosen_spanish: talentos
  alternatives_spanish:
  - talento
  lexicon: HALOT
  rationale: כִּכָּר designa una unidad antigua de peso; 'talento' es el equivalente tradicional y preciso en español. El plural es requerido por el valor numérico.
- source_word: זָהָב
  english_pob_choice: gold
  chosen_spanish: oro
  alternatives_spanish:
  - de oro
  lexicon: HALOT
  rationale: El sustantivo denota el metal oro; en la construcción con la unidad de peso, 'talentos de oro' es la formulación clara y fiel en español.
translation_notes:
  revision_awareness: El texto hebreo y el audit trail inglés están en alto acuerdo y no muestran revisiones aplicadas; la versión española sigue esa lectura estable sin añadir información interpretativa.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' como norma del proyecto cuando corresponda, pero aquí no aparece el nombre divino.
  - Se conserva la sintaxis breve y narrativa del hebreo, con un español natural y sobrio.
  - '''Talentos de oro'' refleja la unidad de peso sin paraphrasear el valor numérico.'
