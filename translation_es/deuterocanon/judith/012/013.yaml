    text: O «muchacha» o «sirvienta» para παιδίσκη; aquí funciona como un modo de hablar halagador, no como énfasis en su condición social.
    reason: lexical_alternative
  - marker: b
    text: O «que sirven en la casa de Nabucodonosor» para «que están en la casa de Nabucodonosor».
    reason: lexical_alternative
  revision_rationale: 'Se hizo una reparación menor de estilo y naturalidad: se cambió «Que esta joven hermosa no vacile» por «No vacile esta hermosa joven» para reflejar mejor la exhortación griega y sonar más idiomático en español; además, «adonde» se simplificó a «donde». No se alteró el sentido ni las decisiones léxicas principales.'
