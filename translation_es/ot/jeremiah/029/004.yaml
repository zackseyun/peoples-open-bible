revisions:
- from: 'Así dice Yahvé de los ejércitos[a], el Dios de Israel, a todos los desterrados[b] que he hecho llevar al destierro[c] de Jerusalén a Babilonia:'
  to: 'Así dice Yahvé de los ejércitos, el Dios de Israel, a todos los exiliados[a] que he enviado al exilio[b] de Jerusalén a Babilonia:'
  rationale: Se revisa para mejorar la naturalidad del español sin perder el sentido del hebreo ni la lógica del audit trail inglés. «Exiliados»/«exilio» comunica mejor הַגּוֹלָה y גלה en este contexto, y «he enviado al exilio» expresa de forma más idiomática la agencia divina, mientras la nota preserva explícitamente la fuerza causativa y la alternativa más compacta.
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T23:30:03Z'
review_pass:
  verdict: revise
  source_alignment_summary: El borrador refleja correctamente la fórmula profética, el nombre divino «Yahvé», el título «Dios de Israel», los destinatarios y la dirección «de Jerusalén a Babilonia». También preserva bien la agencia divina en «he hecho llevar al destierro». Sin embargo, la combinación «desterrados ... he hecho llevar al destierro» suena pesada y menos natural que una formulación con «exiliados», que además se alinea mejor con el inglés auditado «exiles / sent into exile».
  spanish_quality_summary: El texto es mayormente claro y digno, pero «de los ejércitos» puede mantenerse sin nota, y el doblete «desterrados / destierro» produce repetición áspera. «He hecho llevar al destierro» comunica la causatividad, pero en español bíblico-natural suena más idiomático «he enviado al exilio», con nota que preserve la alternativa más literal/causativa. También conviene corregir en la documentación interna la alternativa imposible «de los huestes», aunque esto no afecta directamente el texto del versículo.
  glossary_alignment: Alineado con el proyecto en «Yahvé» para יהוה y «Dios» para אֱלֹהִים. No hay conflicto teológico mayor. La preferencia de proyecto por fidelidad léxica queda mejor servida con «exiliados» / «exilio» que con «desterrados» / «destierro» en este contexto, porque evita una matización innecesaria y mantiene mejor el campo semántico de גלה.
  issues:
  - severity: medium
    issue: «los desterrados» introduce una elección léxica menos natural que «los exiliados» en este contexto.
    rationale: הַגּוֹלָה se refiere al grupo de deportados/exiliados. «Desterrados» es posible, pero en español contemporáneo eclesial «exiliados» comunica mejor el referente colectivo y armoniza con «exilio».
  - severity: medium
    issue: La secuencia «que he hecho llevar al destierro» es torpe en español.
    rationale: Aunque intenta reflejar el hiphil causativo, la construcción resulta poco fluida. «que he enviado al exilio» es natural y fiel; la nota puede conservar la alternativa «he exiliado» y explicar la fuerza causativa.
  - severity: low
    issue: Hay repetición poco elegante entre «desterrados» y «destierro».
    rationale: La repetición no es incorrecta, pero reduce la legibilidad y la dignidad estilística del versículo.
  - severity: low
    issue: La nota y decisión léxica incluyen la forma incorrecta «de los huestes».
    rationale: En español sería «de las huestes». Es un error de documentación interna que conviene corregir si se edita el registro completo.
  revised_spanish_text: 'Así dice Yahvé de los ejércitos, el Dios de Israel, a todos los exiliados[a] que he enviado al exilio[b] de Jerusalén a Babilonia:'
  revised_footnotes:
  - marker: a
    text: «Exiliados» traduce el colectivo hebreo הַגּוֹלָה; también podría expresarse como «los desterrados» o «la comunidad del exilio».
    reason: lexical_alternative
  - marker: b
    text: 'O: «que he exiliado de Jerusalén a Babilonia». El verbo hebreo es causativo: «hacer ir al exilio/deportar».'
    reason: lexical_alternative
  revision_rationale: Se revisa para mejorar la naturalidad del español sin perder el sentido del hebreo ni la lógica del audit trail inglés. «Exiliados»/«exilio» comunica mejor הַגּוֹלָה y גלה en este contexto, y «he enviado al exilio» expresa de forma más idiomática la agencia divina, mientras la nota preserva explícitamente la fuerza causativa y la alternativa más compacta.
