revisions:
- from: 'Había ocho marcos[a], con sus basas[b] de plata, dieciséis basas: dos basas debajo de un marco, y dos basas debajo de cada marco.'
  to: 'Había ocho tablas[a], con sus bases[b] de plata, dieciséis bases: dos bases debajo de una tabla y dos bases debajo de cada una.'
  rationale: Se cambió 'marcos' por 'tablas' para una lectura más natural y ampliamente comprensible en español, manteniendo en nota la alternativa funcional. Se cambió 'basas' por 'bases' para mayor claridad, conservando la opción técnica en nota. La cláusula final se ajustó para expresar de forma más fluida el valor distributivo del hebreo sin perder el sentido de dos apoyos por cada tabla.
