review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien la secuencia narrativa hebrea: David y sus hombres van a Keila, combaten contra los filisteos, se llevan el ganado y salvan a los habitantes. Sin embargo, dos elecciones debilitan la fidelidad léxica: ''les arrebató su ganado'' interpreta más de la cuenta frente a נהג (''condujo/se llevó/arreó'') y ''los hirió con un gran golpe'' suena físicamente literal y menos idiomático que el hebreo נכה...מכה גדולה, que expresa una gran derrota o duro golpe militar.'
  spanish_quality_summary: 'El español es generalmente claro y digno, pero hay dos giros poco naturales o menos precisos para una Biblia publicable: ''les arrebató su ganado'' suena forzado y con duplicación posesiva, y ''los hirió con un gran golpe'' no es una formulación idiomática en español para una derrota militar. También conviene ajustar la nota a sobre מִקְנֶה para reflejar ''ganado'' frente a la alternativa más amplia ''rebaños/animales de cría'', en vez de concentrarse en el verbo de combate.'
  glossary_alignment: No hay conflicto con la terminología troncal del proyecto. 'Keila', 'filisteos', 'salvó' y 'habitantes' son adecuados. El principal ajuste léxico requerido es preferir una formulación española que preserve mejor נהג y el modismo militar de נכה...מכה גדולה.
  issues:
  - severity: medium
    issue: '''les arrebató su ganado'' sobreinterpreta וַיִּנְהַג אֶת־מִקְנֵיהֶם'
    rationale: El hebreo describe conducir/arrear/llevarse el ganado; 'arrebató' añade un matiz de despojo brusco no necesario, y 'su ganado' tras 'les' resulta algo pesado. 'Se llevó su ganado' o 'arreó su ganado' preserva mejor el sentido.
  - severity: high
    issue: '''los hirió con un gran golpe'' no refleja bien el modismo militar וַיַּךְ בָּהֶם מַכָּה גְדוֹלָה'
    rationale: En español, 'herir con un gran golpe' sugiere lesión física individual y suena poco idiomático. El hebreo apunta a infligir una gran derrota o asestar un gran golpe. Conviene una formulación como 'les asestó un gran golpe', con nota para 'gran derrota' o 'gran matanza'.
  - severity: low
    issue: La nota [a] no corresponde al punto léxico más necesitado de apoyo
    rationale: El texto principal 'combatieron contra los filisteos' ya está bien resuelto; la nota alternativa allí aporta poco. Sería mejor usar una nota en 'ganado' para reflejar que מִקְנֶה es más amplio que solo reses/cattle, como hace el inglés POB.
  revised_spanish_text: Así David y sus hombres fueron a Keila y combatieron contra los filisteos, y se llevó su ganado[a] y les asestó un gran golpe[b]. Así David salvó[c] a los habitantes de Keila.
  revised_footnotes:
