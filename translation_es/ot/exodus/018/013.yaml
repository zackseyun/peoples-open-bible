  to: Y aconteció al día siguiente que Moisés se sentó para juzgar al pueblo[a], y el pueblo estuvo de pie delante de Moisés desde la mañana hasta la tarde.
  rationale: Se revisa únicamente la cláusula verbal para preservar explícitamente el sentido de עמד ('estar de pie') mientras se mantiene 'delante de Moisés' como representación contextual de עַל מֹשֶׁה. El resto del versículo ya era fiel, claro y acorde con el registro del proyecto.
