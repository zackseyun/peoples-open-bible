translation:
  language: es
  text: 'Porque[a]: «Mandato sobre mandato, mandato sobre mandato, línea sobre línea, línea sobre línea, un poco aquí, un poco allí».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O más literalmente: «mandato a mandato, mandato a mandato, línea a línea, línea a línea, un poco allí, un poco allí». El hebreo es altamente repetitivo y puede imitar un habla burlona y cantarina.'
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Porque es
  - Ya que
  lexicon: HALOT
  rationale: La partícula introduce la explicación o el motivo del dicho anterior. «Porque» mantiene la conexión discursiva sin forzar una causalidad más fuerte que la del contexto.
- source_word: צַו
  english_pob_choice: command
  chosen_spanish: mandato
  alternatives_spanish:
  - mandato
  - orden
  - precepto
  lexicon: HALOT
  rationale: «Mandato» expresa bien la idea de una instrucción dada y conserva un tono breve y repetitivo. «Precepto» suena más técnico/tradicional y «orden» puede sonar más rígido en español moderno.
- source_word: לָ/צָו
  english_pob_choice: on command
  chosen_spanish: sobre mandato
  alternatives_spanish:
  - de mandato
  - a mandato
  - sobre orden
  lexicon: HALOT
  rationale: El hebreo usa una repetición preposicional difícil de verter de forma totalmente literal sin sonar artificial. «Sobre» permite conservar la cadencia paralela de la serie en español, mientras que una nota preserva la alternativa más literal «a mandato».
- source_word: קַו
  english_pob_choice: line
  chosen_spanish: línea
  alternatives_spanish:
  - línea
  - cordel de medición
  - regla
  lexicon: HALOT
  rationale: «Línea» es el equivalente más breve y natural para el paralelismo rítmico del verso. «Cordel de medición» sería más explícito pero demasiado pesado para el ritmo del pasaje.
- source_word: לָ/קָו
  english_pob_choice: on line
  chosen_spanish: sobre línea
  alternatives_spanish:
  - de línea
  - a línea
  - sobre cordel
  lexicon: HALOT
  rationale: 'Se sigue el mismo criterio que con לָ/צָו: una preposición española simple que conserve la repetición y la sonoridad de la fórmula.'
- source_word: זְעֵיר
  english_pob_choice: a little
  chosen_spanish: un poco
  alternatives_spanish:
  - un poco
  - un poquito
  - algo
  lexicon: HALOT
  rationale: La forma significa «poco / un poco». «Un poco» es natural, breve y mantiene la frase distributiva del final del verso.
- source_word: שָׁם
  english_pob_choice: there
  chosen_spanish: allí
  alternatives_spanish:
  - allí
  - ahí
  - allá
  lexicon: HALOT
  rationale: «Allí» corresponde bien al valor adverbial de ubicación y suena más neutral y solemne que «ahí» o «allá».
- source_word: זְעֵיר שָׁם ... זְעֵיר שָׁם
  english_pob_choice: a little here, a little there
  chosen_spanish: un poco aquí, un poco allí
  alternatives_spanish:
  - un poco allí, un poco allí
  - un poco aquí, un poco allá
  - un poquito aquí, un poquito allí
  lexicon: HALOT
  rationale: Aunque el hebreo repite «allí ... allí», el español idiomático en una distribución contrastiva suele expresarlo como «aquí ... allí». Se conserva así el efecto de fragmentación y ritmo, sin ocultar la posibilidad más literal mediante nota.
theological_decisions:
- issue: Si el verso debe sonar como instrucción seria o como habla burlona/cantada
  english_pob_reading: Se presenta como discurso citado con cadencia repetitiva que sugiere burla o mofa infantil, en el contexto de Isaías 28:9–13.
  chosen_spanish_reading: Se mantiene la cita con comillas y la repetición rítmica, sin añadir explicación interpretativa en el cuerpo del texto.
  alternative_spanish_readings:
  - Una traducción lisa y neutra sin comillas
  - Una paráfrasis que explicitara la burla
  rationale: El contexto inmediato favorece leer la fórmula como imitación desdeñosa de una enseñanza fragmentada. El español conserva esa tensión retórica sin sobreinterpretar ni suavizarla.
  doctrine_reference: Translation philosophy §1, §3, §6
translation_notes:
  revision_awareness: Se siguió el último pasaje de revisión sin cambios sustanciales; el acuerdo auditado es alto y no se detectaron revisiones pendientes que afecten la decisión española.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» como terminología del proyecto cuando no aparece explícitamente en este versículo.
  - Se evitó «SEÑOR» o lenguaje eclesiástico añadido, porque el hebreo aquí no contiene el tetragrámaton.
  - La alternancia «aquí / allí» se usó por idiomatismo español; la nota conserva la lectura más literal del hebreo.
  - El tono breve y repetitivo se preservó para reflejar la posible mofa del contexto inmediato.
