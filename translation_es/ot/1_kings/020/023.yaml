translation:
  language: es
  text: 'Y los servidores del rey de Aram le dijeron[a]: «Sus dioses son dioses de las colinas; por eso eran más fuertes que nosotros. Pero si luchamos contra ellos en la llanura, seguramente seremos más fuertes que ellos».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Su Dios es un dios de las colinas …». El hebreo usa formas plurales («dioses»), reflejando la manera pagana de hablar de los arameos sobre el Dios de Israel.'
    reason: alternative_reading
lexical_decisions:
- source_word: וְעַבְדֵי
  english_pob_choice: servants
  chosen_spanish: siervos
  alternatives_spanish:
  - servidores
  - oficiales
  lexicon: HALOT
  rationale: En contexto real de corte, עבד puede abarcar servidores de palacio o funcionarios; sin embargo, el valor más directo y amplio para la frase posesiva «los siervos del rey» es «siervos». Mantiene la relación de dependencia sin sobreespecificar cargo administrativo.
- source_word: מֶלֶךְ אֲרָם
  english_pob_choice: king of Aram
  chosen_spanish: rey de Aram
  alternatives_spanish:
  - rey de Siria
  lexicon: HALOT
  rationale: Se conserva el nombre propio geográfico-histórico «Aram» siguiendo la primacía del texto original y el patrón POB de no reemplazarlo por el etnónimo/geopolítico posterior «Siria» sin razón textual.
- source_word: אֱלֹהֵי הָרִים / אֱלֹהֵיהֶם
  english_pob_choice: gods of the hills / their gods
  chosen_spanish: dioses de las colinas / sus dioses
  alternatives_spanish:
  - Dios de las colinas / su Dios
  lexicon: HALOT
  rationale: El hebreo usa formas plurales y el contexto es el habla pagana de los arameos. «Dioses» preserva esa perspectiva politeísta y no corrige la ironía narrativa. «Sus dioses» sigue el plural del POB y evita borrar la tensión teológica documentada.
- source_word: עַל כֵּן
  english_pob_choice: therefore
  chosen_spanish: por eso
  alternatives_spanish:
  - por lo tanto
  - así que
  lexicon: HALOT
  rationale: La expresión introduce una conclusión causal. «Por eso» es natural en español y conserva el valor inferencial de עַל כֵּן sin sonar demasiado técnico.
- source_word: חָזְק֣וּ מִמֶּנּוּ
  english_pob_choice: they were stronger than we were
  chosen_spanish: eran más fuertes que nosotros
  alternatives_spanish:
  - prevalecieron sobre nosotros
  - fueron más fuertes que nosotros
  lexicon: HALOT
  rationale: חזק con מן expresa comparación de fuerza. «Más fuertes que nosotros» reproduce directamente esa relación y mantiene el paralelismo con la cláusula final.
- source_word: וְאוּלָם
  english_pob_choice: But
  chosen_spanish: Pero
  alternatives_spanish:
  - Sin embargo
  - No obstante
  lexicon: HALOT
  rationale: Marca contraste con la explicación previa y presenta la propuesta estratégica. «Pero» es breve, idiomático y fiel al giro adversativo.
- source_word: נִלָּחֵם אִתָּם
  english_pob_choice: if we fight against them
  chosen_spanish: si luchamos contra ellos
  alternatives_spanish:
  - si peleamos contra ellos
  - si combatimos contra ellos
  lexicon: HALOT
  rationale: El verbo tiene sentido militar y la construcción en contexto expresa una hipótesis de acción. «Luchamos contra ellos» resulta natural en español y conserva el matiz de enfrentamiento bélico.
- source_word: בַּמִּישׁוֹר
  english_pob_choice: on the plain
  chosen_spanish: en la llanura
  alternatives_spanish:
  - en la planicie
  - sobre el llano
  lexicon: HALOT
  rationale: מישור denota terreno llano o planicie. «En la llanura» es la forma más clara y natural para oponerla a «las colinas» del primer hemistiquio.
- source_word: אִם לֹא
  english_pob_choice: surely
  chosen_spanish: seguramente
  alternatives_spanish:
  - ciertamente
  - sin duda
  lexicon: HALOT
  rationale: Aquí funciona como intensificador asseverativo, no como condición literal. «Seguramente» transmite la confianza jactanciosa del hablante y encaja con el español contemporáneo.
- source_word: נֶחֱזַק מֵהֶם
  english_pob_choice: we will be stronger than they are
  chosen_spanish: seremos más fuertes que ellos
  alternatives_spanish:
  - prevaleceremos sobre ellos
  - seremos más fuertes que ellos mismos
  lexicon: HALOT
  rationale: Se conserva la repetición comparativa de חזק con מן mediante «más fuertes que ellos». Esto mantiene la coherencia interna con la primera comparación y evita una paráfrasis interpretativa.
theological_decisions:
- issue: Cómo representar la frase pagana sobre el Dios de Israel
  english_pob_reading: their gods are gods of the hills
  chosen_spanish_reading: Sus dioses son dioses de las colinas
  alternative_spanish_readings:
  - Su Dios es un dios de las colinas
  rationale: El texto cita la interpretación errónea de los arameos; el plural no es un accidente, sino parte de la ironía narrativa. Mantener «dioses» preserva la tensión teológica documentada por el POB y evita armonizar la voz pagana con la confesión bíblica de Yahvé.
  doctrine_reference: Preservar la tensión narrativa y la voz de los hablantes; no corregir la cita dentro de la traducción.
translation_notes:
  revision_awareness: La revisión auditada cambió el inglés de «that is why» a «therefore» para acercarlo a עַל־כֵּן y elevar el registro. La presente versión española sigue esa decisión con «por eso», manteniendo el valor causal e inferencial sin sobrecargar el estilo. No se detectaron otros cambios de sustancia en el pasaje revisado.
  spanish_consistency_notes:
  - Se mantiene «Aram» como nombre propio, en coherencia con el estándar POB.
  - Se usa «Yahvé» solo cuando el texto fuente lo exija explícitamente; en este versículo no aparece el tetragrámaton.
  - Se conserva el plural «dioses» por fidelidad a la cita pagana y a la nota doctrinal auditada.
  - La comparación con חזק se traduce de manera uniforme como «más fuertes que», para reflejar la repetición lexical del hebreo.
