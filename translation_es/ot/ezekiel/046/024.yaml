    reason: lexical_alternative
  revision_rationale: Se ajusta בשׁל a «hervirán» para seguir la decisión léxica auditada y preservar la relación con «los que cocinan/hierven». También se añade la nota alternativa para מְשָׁרְתֵי הַבַּיִת, manteniendo la evidencia y el rastro de auditoría del POB inglés, sin afectar la naturalidad del español principal.
