id: JOS.16.3
reference: Joshua 16:3
source:
  edition: WLC
  text: וְ/יָֽרַד יָ֜מָּ/ה אֶל גְּב֣וּל הַ/יַּפְלֵטִ֗י עַ֣ד גְּב֧וּל בֵּית חוֹרֹ֛ן תַּחְתּ֖וֹן וְ/עַד גָּ֑זֶר וְ/הָי֥וּ תצאת/ו יָֽמָּ/ה־־־־׃
translation:
  text: Then it went down westward to the border of the Japhletites[a], as far as the border of Lower Beth-horon, and as far as Gezer; and its goings out were at the sea.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew literally, 'its goings out were at the sea,' a boundary formula meaning its extremities or termination points reached the sea.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְיָרַד
  chosen: Then it went down
  alternatives:
  - and it went down
  - and descended
  lexicon: HALOT
  rationale: In boundary descriptions, ירד commonly marks movement downward along terrain or directional progression. 'Went down' is natural English and preserves the topographical sense better than the more formal 'descended.' The prefixed conjunction is rendered contextually as 'Then' to maintain narrative flow in the boundary sequence.
- source_word: יָמָּה
  chosen: westward
  alternatives:
  - toward the sea
  - seaward
  lexicon: HALOT
  rationale: The directional form from 'sea' often means 'westward' in Hebrew geographical descriptions, since the Mediterranean lies to the west. Here the directional adverb is best rendered idiomatically as 'westward.'
- source_word: אֶל גְּבוּל
  chosen: to the border of
  alternatives:
  - to the territory of
  - to the boundary of
  lexicon: HALOT
  rationale: גְּבוּל in Joshua boundary texts refers to a border or boundary line. 'Border of' is concise and idiomatic in English.
- source_word: הַיַּפְלֵטִי
  chosen: the Japhletites
  alternatives:
  - the Japhleti
  - Japhletite territory
  lexicon: HALOT
  rationale: This is a gentilic/toponymic designation. Following the translation philosophy, names are transliterated rather than translated. 'Japhletites' is a standard English rendering of the people/group designation.
- source_word: עַד גְּבוּל בֵּית חוֹרֹן תַּחְתּוֹן
  chosen: as far as the border of Lower Beth-horon
  alternatives:
  - to the border of Beth-horon Lower
  - as far as the border of Beth-horon below
  lexicon: HALOT
  rationale: עַד marks extent, naturally rendered 'as far as.' תַּחְתּוֹן distinguishes Lower Beth-horon from Upper Beth-horon; 'Lower Beth-horon' is the conventional and clear English form.
- source_word: וְעַד גָּזֶר
  chosen: and as far as Gezer
  alternatives:
  - and to Gezer
  lexicon: HALOT
  rationale: The repeated עַד continues the boundary progression. 'As far as Gezer' preserves the sense of extent in the list.
- source_word: וְהָיוּ תֹצְאֹתָיו
  chosen: and its boundary ends were
  alternatives:
  - and its goings out were
  - and its extremities were
  - and its outlets were
  lexicon: HALOT
  rationale: תֹצְאֹת in boundary formulas refers to the termination points or extremities of a border. 'Boundary ends' communicates the technical geographical sense in readable modern English. The pronominal suffix is singular, referring to the border/territory being described.
- source_word: יָמָּה
  chosen: at the sea
  alternatives:
  - westward
  - toward the sea
  lexicon: HALOT
  rationale: In the final clause, the same form is best taken concretely rather than adverbially because it states the terminal point of the boundary. 'At the sea' makes explicit the destination/end point, namely the Mediterranean.
