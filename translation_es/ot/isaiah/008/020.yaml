translation:
  language: es
  text: ¡A la ley[a] y al testimonio! Si no hablan conforme a esta palabra[b], no hay amanecer para ellos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «a la instrucción». El hebreo torá puede significar «instrucción» además de «ley».
    reason: lexical_alternative
  - marker: b
    text: O «Si no hablan conforme a este mensaje, para ellos no hay amanecer». La cláusula final es compacta en hebreo y ha sido entendida de más de una manera.
    reason: alternative_reading
lexical_decisions:
- source_word: לְתוֹרָה
  english_pob_choice: to the law
  chosen_spanish: a la ley
  alternatives_spanish:
  - a la instrucción
  - a la Torá
  lexicon: HALOT
  rationale: תּוֹרָה puede significar «instrucción» o «ley». En español, «ley» transmite bien la norma autoritativa divina y encaja con el paralelismo del verso. «Instrucción» es posible, pero suena menos directo en este llamado profético; «Torá» es más transliterativo y menos natural aquí.
- source_word: וְלִתְעוּדָה
  english_pob_choice: and to the testimony
  chosen_spanish: y al testimonio
  alternatives_spanish:
  - y al testigo
  - y a la atestación
  lexicon: HALOT
  rationale: תְּעוּדָה denota testimonio o atestación. «Testimonio» es la opción más clara y estable en español para este paralelismo con «ley», conservando la idea de un testigo autorizado o un registro de confirmación.
- source_word: יֹאמְרוּ
  english_pob_choice: they do not speak
  chosen_spanish: hablan
  alternatives_spanish:
  - dicen
  - hablen
  lexicon: HALOT
  rationale: אָמַר suele ser «decir», pero en este contexto profético de guía pública o enseñanza, «hablan» comunica mejor la proclamación o declaración que está en juego. Mantiene la fuerza general sin volverla demasiado literal o rígida.
- source_word: כַּדָּבָר הַזֶּה
  english_pob_choice: according to this word
  chosen_spanish: conforme a esta palabra
  alternatives_spanish:
  - según esta palabra
  - conforme a este mensaje
  lexicon: HALOT
  rationale: דָּבָר puede ser «palabra», «asunto» o «mensaje». «Conforme a esta palabra» conserva el vínculo formal con una declaración autoritativa y suena natural en español bíblico contemporáneo.
- source_word: אֲשֶׁר אֵין לוֹ שָׁחַר
  english_pob_choice: there is no dawn for them
  chosen_spanish: no hay alba para ellos
  alternatives_spanish:
  - no hay amanecer para ellos
  - no tienen alba
  lexicon: HALOT
  rationale: שַׁחַר es «alba» o «amanecer». Elegí «alba» porque preserva la imagen poética de la luz naciente y es idiomática en español. La POB inglesa mantiene «dawn»; en español, «alba» comunica el mismo campo semántico sin sobreexplicar la metáfora.
theological_decisions:
- issue: 'Valor del cierre: destino de quienes rechazan la norma revelada'
  english_pob_reading: The clause states that those who do not speak in accord with God's revealed standard have no dawn/light ahead of them.
  chosen_spanish_reading: La cláusula afirma que quienes no hablan conforme a la revelación normada por Dios quedan sin alba.
  alternative_spanish_readings:
  - 'la cláusula describe la oscuridad interna del mensaje mismo: «no hay alba en ello»'
  - 'la frase puede leerse como una afirmación enfática: «¡si no hablan conforme a esta palabra!»'
  rationale: El contexto inmediato contrasta guía ilegítima con la apelación a la revelación divina. «No hay alba para ellos» preserva la advertencia contra maestros o buscadores que rechazan ese estándar, sin resolver la tensión interpretativa del hebreo compacto.
  doctrine_reference: 'Translation philosophy #3: preservar la tensión teológica en vez de resolverla'
- issue: Posible fuerza asseverativa de אִם לֹא
  english_pob_reading: Some take אִם here with asseverative force, but the straightforward conditional sense works well in context.
  chosen_spanish_reading: 'Se mantiene el valor condicional explícito: «Si no hablan...».'
  alternative_spanish_readings:
  - «Ciertamente, si no hablan...»
  - «¡Si no hablan...»
  rationale: En español, la lectura condicional es clara, natural y fiel al hebreo, sin forzar un giro enfático que el contexto inmediato no exige de forma inequívoca. Así se conserva la apertura interpretativa documentada por la POB inglesa.
  doctrine_reference: 'Translation philosophy #3: preservar la tensión teológica en vez de resolverla'
translation_notes:
  revision_awareness: La revisión más reciente no introdujo cambios sustanciales; el acuerdo de control fue alto y se mantuvo estable la lectura principal. La versión española sigue esa línea, conservando la decisión léxica central («ley/testimonio») y la ambigüedad interpretativa del cierre.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma general del proyecto, pero este versículo no contiene el Tetragrámaton.
  - «Ley» se usa aquí como equivalente contextual de תּוֹרָה; la nota preserva la alternativa «instrucción».
  - «Testimonio» se conserva para תְּעוּדָה por su paralelismo bíblico y su resonancia autoritativa.
  - «Alba» traduce שָׁחַר con una imagen poética natural en español y cercana a «dawn».
