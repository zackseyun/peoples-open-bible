translation:
  language: es
  text: 'Los ancianos de Jabes le dijeron: «Danos siete días de respiro, y enviaremos mensajeros por todo el territorio de Israel. Entonces, si no hay nadie que nos salve, saldremos hacia ti[a]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O «nos rendiremos a ti». El hebreo dice más literalmente: «saldremos a ti», lo cual en este contexto probablemente implica capitulación.'
    reason: lexical_alternative
lexical_decisions:
- source_word: זִקְנֵי יָבֵישׁ
  english_pob_choice: the elders of Jabesh
  chosen_spanish: los ancianos de Jabes
  alternatives_spanish:
  - los líderes de Jabes
  - los ancianos de la ciudad de Jabes
  lexicon: HALOT
  rationale: זִקְנֵי es un constructo plural que señala a los ancianos o autoridades reconocidas de la ciudad. «Ancianos» conserva el rol sociopolítico; «Jabes» mantiene el nombre propio sin añadir un genitivo innecesario en español.
- source_word: הֶרֶף לָנוּ
  english_pob_choice: Give us seven days' respite
  chosen_spanish: danos siete días de respiro
  alternatives_spanish:
  - concédenos siete días de respiro
  - danos siete días de tregua
  - concédenos una tregua de siete días
  lexicon: HALOT
  rationale: El imperativo de רפה expresa pedir que se les conceda una pausa o suspensión temporal. «Respiro» comunica una pausa breve y natural en español, manteniendo el valor de solicitud urgente sin volverlo excesivamente técnico.
- source_word: שִׁבְעַת יָמִים
  english_pob_choice: for seven days
  chosen_spanish: siete días
  alternatives_spanish:
  - durante siete días
  - por siete días
  lexicon: HALOT
  rationale: La expresión temporal es directa. En español, el contexto de «danos» ya permite entender la duración, y «siete días» mantiene la concisión del hebreo.
- source_word: וְנִשְׁלְחָה מַלְאָכִים
  english_pob_choice: and we will send messengers
  chosen_spanish: y enviaremos mensajeros
  alternatives_spanish:
  - y mandaremos mensajeros
  - y dejaremos ir mensajeros
  lexicon: HALOT
  rationale: מַלְאָכִים aquí son enviados humanos, no ángeles. «Mensajeros» es la equivalencia directa y clara; el futuro simple reproduce bien la intención propuesta en la petición.
- source_word: בְּכֹל גְּב֣וּל יִשְׂרָאֵל
  english_pob_choice: throughout all the territory of Israel
  chosen_spanish: por todo el territorio de Israel
  alternatives_spanish:
  - por todo Israel
  - por toda la frontera de Israel
  - por todo el límite de Israel
  lexicon: HALOT
  rationale: גְּבול puede significar territorio, frontera o región. Aquí el contexto pide el alcance total del país, no solo la línea fronteriza; «territorio» preserva ese sentido geográfico amplio.
- source_word: מוֹשִׁיעַ
  english_pob_choice: no one to save us
  chosen_spanish: nadie que nos salve
  alternatives_spanish:
  - ningún libertador que nos rescate
  - nadie para librarnos
  lexicon: HALOT
  rationale: El participio activo expresa a alguien que salva o libra. «Nadie que nos salve» conserva la referencia personal sin introducir un término más interpretativo como «libertador».
- source_word: וְיָצָאנוּ אֵלֶיךָ
  english_pob_choice: we will come out to you
  chosen_spanish: saldremos a ti
  alternatives_spanish:
  - saldremos hacia ti
  - saldremos contra ti
  - nos rendiremos a ti
  lexicon: HALOT
  rationale: יצא es literalmente «salir/ir afuera». En el contexto de sitio militar puede implicar capitulación, pero el hebreo no la nombra explícitamente. «Saldremos a ti» mantiene la literalidad y deja que el contexto sugiera la posible rendición.
theological_decisions:
- issue: Matiz de capitulación implícita en וְיָצָאנוּ אֵלֶיךָ
  english_pob_reading: we will come out to you
  chosen_spanish_reading: saldremos a ti
  alternative_spanish_readings:
  - nos rendiremos a ti
  - saldremos contra ti
  rationale: El contexto militar hace probable la idea de rendición, pero la forma hebrea solo dice salir hacia/contra alguien. Para no sobreexplicitar una conclusión contextual en el texto principal, se conserva la formulación más cercana al hebreo y se deja la capitulación como implicación narrativa.
  doctrine_reference: Principios de fidelidad lexical y restraint interpretativo del proyecto
- issue: Alcance de גְּבוּל en un marco militar y geográfico
  english_pob_reading: throughout all the territory of Israel
  chosen_spanish_reading: por todo el territorio de Israel
  alternative_spanish_readings:
  - por todo Israel
  - por toda la frontera de Israel
  rationale: «Territorio» evita reducir el sustantivo a una mera línea fronteriza y también evita una paráfrasis demasiado libre. Así se conserva la extensión geográfica total que exige el contexto.
  doctrine_reference: Principios de precisión semántica y claridad en español
translation_notes:
  revision_awareness: Tomé como base la última revisión inglesa que prefirió un registro formal para הֶרֶף לָנוּ («Give us seven days' respite») y mantuve la cautela lexical sobre וְיָצָאנוּ אֵלֶיךָ, evitando una traducción explícita de «rendirnos» en el texto principal. También preservé el sentido geográfico amplio de גְּבוּל y la referencia a mensajeros humanos para מַלְאָכִים.
  spanish_consistency_notes:
  - Usé «mensajeros» para מַלְאָכִים, no «ángeles», por el contexto narrativo.
  - Mantengo «Jabes» como forma breve y natural del topónimo, consistente con el texto fuente.
  - 'Elegí un registro digno y moderno: «respiro» funciona en español bíblico contemporáneo sin sonar arcaico.'
  - La nota al pie marca la ambigüedad principal del cierre de la frase, en paralelo con la nota inglesa.
