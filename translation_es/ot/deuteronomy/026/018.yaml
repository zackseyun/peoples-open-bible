review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la estructura y el sentido general del hebreo: Yahvé como sujeto, declaración formal hoy, designación de Israel para ser su pueblo, referencia a la palabra/promesa previa, y obligación de guardar los mandamientos. Sin embargo, ''pueblo especial'' debilita el matiz léxico de סְגֻלָּה, que en el audit trail se conservó como ''treasured people'' con alternativa explícita ''treasured possession''.'
  spanish_quality_summary: El español es claro y natural, con registro bíblico moderno y digno. 'Has de ser' y 'guardar' funcionan bien. La principal mejora necesaria es reforzar el valor de posesión preciosa/tesoro en לְעַם סְגֻלָּה. También conviene ajustar la nota para que corresponda mejor al texto hebreo y al inglés auditado.
  glossary_alignment: Se alinea bien con la terminología del proyecto en 'Yahvé', 'mandamientos' y el tratamiento pactual de הֶאֱמִיר. No hay conflicto con glosario mayor. La excepción problemática es 'especial' para סְגֻלָּה, que resulta demasiado débil y genérica frente al valor de 'posesión preciosa/tesoro'.
  issues:
  - severity: medium
    issue: '''un pueblo especial'' debilita סְגֻלָּה'
    rationale: סְגֻלָּה no significa solo 'especial', sino una posesión valiosa/tesoro en contexto de pertenencia pactual. El inglés POB preserva esto con 'treasured people' y una nota alternativa. En español conviene reflejar mejor ese matiz.
  - severity: low
    issue: La nota [a] puede afinarse
    rationale: La nota actual 'pueblo de su posesión' es menos idiomática y 'posesión preciosa' no refleja tan bien la alternativa inglesa 'treasured possession'. Puede mejorarse a 'su pueblo atesorado' / 'su posesión atesorada' o equivalente más natural.
  revised_spanish_text: Yahvé ha declarado hoy que tú has de ser para él su pueblo atesorado[a], como te prometió[b], y que has de guardar todos sus mandamientos.
  revised_footnotes:
  - marker: a
    text: 'O ''su posesión atesorada''; hebreo: ''un pueblo, una posesión atesorada''.'
    reason: lexical_alternative
  - marker: b
    text: O 'como te habló'.
    reason: lexical_alternative
  revision_rationale: Se revisa solo el sintagma לְעַם סְגֻלָּה para preservar mejor el valor léxico de pertenencia preciosa/tesoro documentado en el source packet y en el audit trail inglés. 'Su pueblo atesorado' mantiene la identidad corporativa de עַם y el matiz de valor de סְגֻלָּה, en español natural y digno. La nota [a] se ajusta para reflejar con más precisión la alternativa 'treasured possession'.
