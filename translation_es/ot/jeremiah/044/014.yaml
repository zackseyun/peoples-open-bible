review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura y la mayoría de las decisiones léxicas del hebreo y del POB inglés: «fugitivo / sobreviviente», «el remanente de Judá», «han venido», «la tierra de Egipto», y la preservación del modismo «elevar/levantar el alma» con nota. Sin embargo, el cierre «sino fugitivos[a]» es incorrecto en español y además ancla la nota al lugar equivocado: la nota explica «elevando su alma», no «fugitivos». También conviene ajustar «Así que» a «Así» o suprimirlo, ya que el hebreo simplemente inicia con negación/aserción y no con una inferencia discursiva marcada.'
  spanish_quality_summary: El texto es mayormente legible y digno, pero presenta un problema serio de naturalidad y sentido en «porque no volverán, sino fugitivos», que en español suena a contraste mal formado. La frase excepcional debe expresarse como «excepto algunos fugitivos» o «salvo algunos fugitivos». Además, la nota debe colocarse junto a «elevando su alma», no al final del versículo.
  glossary_alignment: 'Buena alineación general con la terminología del proyecto: «Judá», «remanente», «fugitivo», «sobreviviente», «alma». No hay conflicto con términos doctrinales mayores. La única desviación relevante es sintáctica/semántica en la excepción final, no terminológica.'
  issues:
  - severity: high
    issue: La cláusula final «sino fugitivos[a]» no expresa correctamente la excepción hebrea כִּי אִם פְּלֵטִים en español.
    rationale: En español, tras «no volverán», «sino fugitivos» resulta agramatical o al menos muy oscura. El hebreo significa «excepto fugitivos / salvo algunos fugitivos», es decir, una excepción al no-retorno universal.
  - severity: high
    issue: La nota [a] está anclada en «fugitivos», pero su contenido explica el modismo «están elevando su alma».
    rationale: El requisito del proyecto exige que cada nota aparezca en el punto textual pertinente. Tal como está, el lector asociará erróneamente la nota con «fugitivos».
  - severity: medium
    issue: «Así que» añade un matiz inferencial/discursivo no explícito en el hebreo.
    rationale: 'El texto hebreo simplemente afirma el juicio: «Y no habrá...». «Así que» puede sonar a conclusión de una premisa previa; «Así» o nada sería más sobrio y fiel.'
  - severity: low
    issue: «Habitar» para לָגוּר es aceptable, pero pierde el matiz de residir como forasteros/temporalmente.
    rationale: No exige cambio obligatorio, pero «residir» o «vivir como forasteros» recogería mejor el valor de גור. Dado el estilo objetivo del proyecto, puede mantenerse «habitar» por legibilidad.
  revised_spanish_text: Así no habrá fugitivo ni sobreviviente para el remanente de Judá, de los que han venido a habitar allí en la tierra de Egipto y a volver a la tierra de Judá, a la cual están elevando su alma[a] para volver y habitar allí; porque no volverán, excepto algunos fugitivos.
  revised_footnotes:
