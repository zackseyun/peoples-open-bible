review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la estructura y la mayor parte del sentido del hebreo: finalidad/resulto («para que»), carencia de sustento básico («el pan y el agua»), reacción humana de consternación, y deterioro final. Sin embargo, la cláusula final se aparta del audit trail inglés y del hebreo al explicitar causalidad con «por causa de su iniquidad», donde el original mantiene la compacta ambigüedad de בַּעֲוֺנָם mejor preservada por «en su iniquidad».'
  spanish_quality_summary: El español es claro y legible, pero tiene un problema de anclaje de nota al insertar «[a]» antes de «espanten» con un espacio antinatural. Además, «se espanten» es entendible pero algo menos preciso que «queden horrorizados/consternados» para el matiz de שמם; aun así puede sostenerse con nota. La mejora principal necesaria es restaurar la ambigüedad de la frase final y normalizar el anclaje de notas.
  glossary_alignment: No hay términos del glosario de alto impacto en este versículo como Yahvé/Mesías. Se mantiene correctamente «iniquidad» para עָוֹן, pero debe evitarse resolverlo como causa explícita en el texto principal. «Cada hombre y su hermano» sigue la política de lenguaje masculino representativo documentada.
  issues:
  - severity: high
    issue: «por causa de su iniquidad» sobretraduce בַּעֲוֺנָם
    rationale: El hebreo usa una construcción compacta que puede denotar «en su iniquidad», con ecos de culpa o castigo. El POB inglés retuvo esa ambigüedad con «in their iniquity». La versión española la estrecha indebidamente hacia causalidad explícita.
  - severity: medium
    issue: Anclaje tipográfico de la nota [a] es antinatural
    rationale: «se [a]espanten» con espacio y corte interno de la expresión no sigue la convención indicada. El marcador debe ir adosado a la palabra o frase relevante, por ejemplo «se espanten[a]».
  - severity: low
    issue: «se espanten» es algo más débil/coloquial que el valor de שמם en este contexto
    rationale: El verbo hebreo sugiere quedar horrorizados, atónitos o desolados. «Se espanten» no es incorrecto, pero puede sonar más ligero. Dado que la nota ya preserva alternativas, no hace falta elevarlo a rechazo.
  revised_spanish_text: para que les falten el pan y el agua, y cada hombre y su hermano se espanten[a], y se consuman en su iniquidad[b].
  revised_footnotes:
  - marker: a
    text: O «se queden desolados», «se horroricen» o «queden atónitos» para «se espanten». El verbo hebreo puede expresar desolación o el estado de sobresalto producido por ella.
    reason: lexical_alternative
  - marker: b
    text: O «en su culpa» o «en el castigo de su iniquidad». El término hebreo puede denotar iniquidad, culpa o el castigo que resulta de la iniquidad.
    reason: lexical_alternative
  revision_rationale: 'Se revisa únicamente lo necesario para alinear el español con el hebreo y con la decisión documentada del POB: «en su iniquidad» preserva mejor la ambigüedad semántica de עָוֹן que «por causa de su iniquidad». También se corrige la colocación del marcador de nota para cumplir la convención del proyecto. El resto del versículo puede mantenerse.'
