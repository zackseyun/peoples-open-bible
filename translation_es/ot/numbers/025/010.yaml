translation:
  language: es
  text: 'Entonces Yahvé habló a Moisés[a], diciendo:'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebreo YHWH; tradicionalmente se vierte «el SEÑOR», pero aquí se translitera como «Yahvé».
