translation:
  language: es
  text: Mi piel se ennegrece y se me cae[a], y mis huesos arden con calor[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Mi piel se ennegrece de sobre mí»; el hebreo puede describir una piel que se oscurece y se cae, o que queda oscurecida sobre el cuerpo.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «mis huesos arden por la fiebre».'
    reason: lexical_alternative
lexical_decisions:
- source_word: עוֹרִי
  english_pob_choice: my skin
  chosen_spanish: mi piel
  alternatives_spanish:
  - mi cuero
  - mi dermis
  lexicon: HALOT
  rationale: עוֹר se usa aquí para la piel del cuerpo humano. En español, «piel» es la equivalencia natural y digna; «cuero» sería demasiado áspero y «dermis» demasiado técnico.
- source_word: שָׁחַר
  english_pob_choice: turns black
  chosen_spanish: se ennegrece
  alternatives_spanish:
  - se pone negra
  - se oscurece
  lexicon: HALOT
  rationale: El hebreo expresa volverse oscuro/negro. «Se ennegrece» conserva el resultado visible sin sonar forzado en español.
- source_word: מֵעָלָי
  english_pob_choice: and falls from me
  chosen_spanish: y se desprende de mí
  alternatives_spanish:
  - y cae de mí
  - y se me cae de encima
  lexicon: HALOT
  rationale: La expresión hebrea sugiere algo que está «sobre mí» y se desprende o cae. «Se desprende de mí» mantiene la imagen sin depender de un calco rígido.
- source_word: וְעַצְמִי
  english_pob_choice: and my bones
  chosen_spanish: y mis huesos
  alternatives_spanish:
  - y mi hueso
  lexicon: HALOT
  rationale: Aunque el hebreo es singular con sufijo, el sustantivo puede funcionar colectivamente. En español, el plural es más natural y conserva el paralelismo corporal.
- source_word: חָרָה
  english_pob_choice: burn
  chosen_spanish: arden
  alternatives_spanish:
  - se inflaman
  - se calientan
  lexicon: HALOT
  rationale: חָרָה comunica ardor o encendido. «Arden» preserva la intensidad y funciona bien con el complemento siguiente.
- source_word: מִנִּי
  english_pob_choice: with
  chosen_spanish: con
  alternatives_spanish:
  - por
  - a causa de
  lexicon: HALOT
  rationale: Aunque literalmente puede ser «de/from», aquí indica acompañamiento o condición causal. «Con» expresa de modo natural la imagen de calor acompañante.
- source_word: חֹרֶב
  english_pob_choice: heat
  chosen_spanish: calor
  alternatives_spanish:
  - fiebre
  - ardor
  lexicon: HALOT
  rationale: En este contexto corporal, «calor» es la equivalencia más amplia y segura. «Fiebre» interpreta más específicamente la causa; «ardor» intensifica más el matiz.
translation_notes:
  revision_awareness: La revisión más reciente y el control cruzado indican alta concordancia y sin cambios sustanciales; se mantiene la lectura auditada del texto con una sola decisión española principal para cada giro léxico.
  spanish_consistency_notes:
  - Se mantiene «piel» para עוֹר y «huesos» para עֶצֶם conforme al registro corporal del pasaje.
  - Se evita «SEÑOR» o terminología teológica ajena porque el versículo no contiene el nombre divino ni títulos cristológicos.
  - 'El encadenamiento verbal sigue de cerca el hebreo sin perder naturalidad: ennegrecerse + desprenderse + arder con calor.'
