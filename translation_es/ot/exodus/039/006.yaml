translation:
  language: es
  text: Y hicieron las piedras de ónice[a], montadas en engastes de oro, grabadas como las inscripciones de un sello, según los nombres de los hijos de Israel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O posiblemente ‘piedras de shoham’; la identificación exacta de la gema es incierta, aunque ‘ónice’ es la traducción tradicional.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּעֲשׂוּ
  english_pob_choice: And they made
  chosen_spanish: Y hicieron
  alternatives_spanish:
  - Y fabricaron
  - Y elaboraron
  lexicon: HALOT
  rationale: עשה es un verbo amplio de ‘hacer’. En español, ‘hicieron’ conserva la sencillez narrativa y el contexto de artesanía sin sobreinterpretar el proceso.
- source_word: אַבְנֵי הַשֹּׁהַם
  english_pob_choice: the onyx stones
  chosen_spanish: las piedras de ónice
  alternatives_spanish:
  - las piedras de shoham
  - las piedras de ónix
  lexicon: HALOT
  rationale: Se mantiene la equivalencia tradicional ‘ónice’, pero sin ocultar la incertidumbre del mineral. ‘Piedras de ónice’ es natural y fiel al valor lexical adoptado por la POB inglesa.
- source_word: מֻסַבֹּת מִשְׁבְּצֹת זָהָב
  english_pob_choice: enclosed in settings of gold
  chosen_spanish: enclavadas en engastes de oro
  alternatives_spanish:
  - encerradas en engastes de oro
  - montadas en engastes de oro
  lexicon: HALOT
  rationale: La imagen hebrea describe las piedras rodeadas o fijadas en una pieza de orfebrería. ‘Enclavadas’ comunica inserción y sujeción; ‘engastes de oro’ conserva el material y el tipo de montaje sin precisar más de lo que dice el texto.
- source_word: מְפֻתָּחֹת פִּתּוּחֵי חוֹתָם
  english_pob_choice: engraved like the engravings of a seal
  chosen_spanish: grabadas como grabados de sello
  alternatives_spanish:
  - grabadas con grabado de sello
  - talladas como sello
  lexicon: HALOT
  rationale: La repetición hebrea enfatiza el modo de grabado mediante la comparación con un sello. ‘Grabadas como grabados de sello’ conserva esa figura y la relación cognada, aunque suene algo concentrada en español.
- source_word: עַל שְׁמוֹת
  english_pob_choice: according to the names
  chosen_spanish: según los nombres
  alternatives_spanish:
  - con los nombres
  - en relación con los nombres
  lexicon: HALOT
  rationale: עַל aquí expresa correspondencia o referencia. ‘Según los nombres’ reproduce bien esa idea sin añadir un sentido de simple decoración.
- source_word: בְּנֵי יִשְׂרָאֵל
  english_pob_choice: the sons of Israel
  chosen_spanish: los hijos de Israel
  alternatives_spanish:
  - los hijos varones de Israel
  - los israelitas
  lexicon: HALOT
  rationale: Se conserva la fórmula masculina plural del hebreo, como hace la POB inglesa, para no neutralizar el giro covenantal/tribal del original.
theological_decisions:
- issue: Fórmula masculina de alianza בְּנֵי יִשְׂרָאֵל
  english_pob_reading: the sons of Israel
  chosen_spanish_reading: los hijos de Israel
  alternative_spanish_readings:
  - los hijos varones de Israel
  - los israelitas
  rationale: El hebreo emplea una expresión fija, masculina y tribal. Se preserva en español por fidelidad a la forma del texto y para no diluir la marca gramatical del original.
  doctrine_reference: DOCTRINE.md Translation philosophy §4
translation_notes:
  revision_awareness: La revisión inglesa reciente ajustó la idea de las piedras no como simplemente ‘puestas’ sino ‘enclosed in settings of gold’. El español adopta ‘enclavadas en engastes de oro’ para reflejar con mayor precisión esa relación de sujeción/rodeado, manteniendo el registro formal y la claridad lectora.
  spanish_consistency_notes:
  - Se preserva ‘hijos de Israel’ para mantener la fórmula masculina del hebreo y la coherencia con la POB inglesa.
  - ‘Ónice’ se usa como término tradicional con nota de incertidumbre léxica, en paralelo a la nota inglesa sobre ‘shoham’.
  - Se evita ‘SEÑOR’ u otra sustitución no pertinente, pues el versículo no contiene el tetragrámaton.
  - ‘Engastes de oro’ conserva el metal precioso y el carácter artesanal del pasaje sin forzar una especificación técnica no explícita.
