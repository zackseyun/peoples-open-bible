base_translation:
  language: en
  yaml_path: translation/ot/genesis/020/002.yaml
  text: And Abraham said of Sarah his wife[b][a], “She is my sister.” So Abimelech king of Gerar sent and took Sarah.
  footnotes:
  - marker: a
    text: Or “said to Sarah his wife.” The Hebrew preposition can be read more literally that way, but the context favors the sense that Abraham spoke about Sarah, since the statement reported is “She is my sister.”
    reason: lexical_alternative
  - marker: b
    text: That is, Abimelech had Sarah brought to him; the Hebrew simply says “sent and took Sarah.”
    reason: cultural_note
