id: 2TI.2.15
reference: 2 Timothy 2:15
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: σπούδασον σεαυτὸν δόκιμον παραστῆσαι τῷ θεῷ, ἐργάτην ἀνεπαίσχυντον, ὀρθοτομοῦντα τὸν λόγον τῆς ἀληθείας.
base_translation:
  language: en
  yaml_path: translation/nt/2_timothy/002/015.yaml
  text: Be diligent to present yourself approved to God, a worker with no need to be ashamed, rightly handling the word of truth.
translation:
  language: ko
  text: 힘써 자신을 하나님 앞에 인정받은 자로 드리십시오. 부끄러울 것 없는 일꾼이 되어, 진리의 말씀을 올바로 풀어내십시오.[a]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 직역하면 「곧게 잘라 내다」. 길을 곧게 내거나 천을 곧게 자르는 이미지에서 비롯된 표현으로, 본문은 진리의 말씀을 정확히 다루는 것을 가리킨다.
    reason: lexical_alternative
lexical_decisions:
- source_word: σπούδασον
  english_pob_choice: Be diligent
  chosen_korean: 힘써
  alternatives_korean:
  - 부지런히 노력하여
  - 애써
  lexicon: BDAG
  rationale: 글로사리 지침에 따라 σπουδάζω는 「힘쓰다」로 옮긴다. 4:9, 4:21과도 통일된다.
- source_word: δόκιμον παραστῆσαι τῷ θεῷ
  english_pob_choice: to present yourself approved to God
  chosen_korean: 하나님 앞에 인정받은 자로 드리십시오
  alternatives_korean:
  - 하나님께 인정받은 자로 자신을 드리십시오
  - 하나님 앞에 합당한 자로 세우십시오
  lexicon: BDAG
  rationale: δόκιμος는 「검증되어 인정받은」을 뜻한다. παρίστημι는 「제시·세움」. 「인정받은 자로 드리다」가 그 의미를 자연스럽게 담는다.
- source_word: ἐργάτην ἀνεπαίσχυντον
  english_pob_choice: a worker with no need to be ashamed
  chosen_korean: 부끄러울 것 없는 일꾼
  alternatives_korean:
  - 수치 없는 일꾼
  - 부끄러움 없는 일꾼
  lexicon: BDAG
  rationale: ἀνεπαίσχυντος는 「부끄러워할 필요 없는」. 「부끄러울 것 없는」이 한국어로 자연스럽다.
- source_word: ὀρθοτομοῦντα τὸν λόγον τῆς ἀληθείας
  english_pob_choice: rightly handling the word of truth
  chosen_korean: 진리의 말씀을 올바로 풀어내십시오
  alternatives_korean:
  - 진리의 말씀을 바르게 다루어
  - 진리의 말씀을 곧게 베어 내어
  - 진리의 말씀을 옳게 분별하여
  lexicon: BDAG
  rationale: ὀρθοτομέω의 직역(곧게 자르다)을 살리면 한국어에서 어색하므로, 비유의 의미(「올바로 다루다·풀어내다」)를 자연스러운 한국어로 옮긴다. 직역은 각주에 둔다.
