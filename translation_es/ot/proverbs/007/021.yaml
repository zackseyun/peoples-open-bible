translation:
  language: es
  text: Con su abundante persuasión[a] lo persuade; con la suavidad de sus labios lo arrastra.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Lo desvía con mucha persuasión; con la suavidad de sus labios lo impulsa» o «lo empuja hacia adelante».'
    reason: lexical_alternative
lexical_decisions:
- source_word: הִטַּתּוּ
  english_pob_choice: she persuades him
  chosen_spanish: lo desvía
  alternatives_spanish:
  - lo persuade
  - lo inclina
  - lo aparta
  lexicon: HALOT
  rationale: El hifil de נטה expresa causar que alguien se incline o se desvíe. En español, «lo desvía» conserva la idea de apartarlo del rumbo sin añadir de por sí una seducción sexual que el verbo hebreo no exige en forma aislada. «Lo persuade» sería más explícito respecto del efecto discursivo, pero menos fiel a la imagen de desvío.
- source_word: בְּרֹב
  english_pob_choice: with her abundant persuasion
  chosen_spanish: con su gran persuasión
  alternatives_spanish:
  - con mucha persuasión
  - con abundante persuasión
  - por la abundancia de
  lexicon: HALOT
  rationale: רֹב denota abundancia o gran cantidad. «Con su gran persuasión» conserva el valor instrumental de בְּ y la idea de abundancia sin sonar forzado en español.
- source_word: לִקְחָהּ
  english_pob_choice: persuasion
  chosen_spanish: persuasión
  alternatives_spanish:
  - enseñanza
  - argumento
  - discurso seductor
  lexicon: HALOT
  rationale: לקח puede significar enseñanza o discurso persuasivo según el contexto. Aquí, por el paralelismo con el engaño verbal, «persuasión» comunica bien el sentido pragmático sin sobrecargar el verso con una glosa interpretativa.
- source_word: בְּחֵלֶק
  english_pob_choice: with the smoothness of
  chosen_spanish: con la suavidad de
  alternatives_spanish:
  - con la lisura de
  - con la flaqueza de
  - con la flatería de
  lexicon: HALOT
  rationale: חלק alude a algo liso, suave o resbaladizo, y en este giro se aplica al habla. «Con la suavidad de» preserva la metáfora de un habla lisa y agradable, sin cerrarla prematuramente en «adulación».
- source_word: שְׂפָתֶיהָ
  english_pob_choice: her lips
  chosen_spanish: sus labios
  alternatives_spanish:
  - su habla
  - sus palabras
  lexicon: HALOT
  rationale: Literalmente son «sus labios». Mantener «sus labios» conserva la imaginería poética concreta del hebreo y evita neutralizarla en un sustantivo abstracto.
- source_word: תַּדִּיחֶנּוּ
  english_pob_choice: she compels him
  chosen_spanish: lo arrastra
  alternatives_spanish:
  - lo impulsa
  - lo fuerza
  - lo lleva al mal camino
  lexicon: HALOT
  rationale: La forma hifil de נדח puede expresar empujar, arrastrar o hacer avanzar con fuerza. «Lo arrastra» mantiene la idea de una presión verbal que lo mueve y evita hacer más explícita de lo que el hebreo dice una conclusión moral adicional.
translation_notes:
  revision_awareness: 'La revisión disponible no introdujo cambios sustanciales: el texto inglés final permanece igual, con una nota alternativa que contrasta «persuades/compels» con «turns aside/drives along». La versión española conserva esa tensión léxica entre desviar y arrastrar sin explicarla en exceso.'
  spanish_consistency_notes:
  - Se mantiene el paralelismo hebreo de dos miembros con la misma preposición instrumental «con».
  - «Lo» representa el objeto masculino singular implícito en el hebreo.
  - Se prefirió un registro sobrio y poético, apto para lectura pública.
  - Se evitó «adulación» como término principal para no perder la metáfora de la suavidad/lisura del habla.
