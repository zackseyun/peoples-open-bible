review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador conserva bien la estructura antitética del hebreo y la mayor parte de las decisiones léxicas del POB inglés: «el justo», «come», «pero el vientre de los impíos». También preserva correctamente la nota sobre נֶפֶשׁ. Sin embargo, el texto principal omite explícitamente el complemento de נַפְשׁוֹ, ya que «hasta quedar satisfecho» no expresa «de su alma / de sí mismo / de su apetito» en el cuerpo del versículo. Además, «el vientre ... carece» suena incompleto en español porque el verbo queda sin complemento y no refleja con claridad el sentido proverbial de carencia.'
  spanish_quality_summary: 'El español es claro y digno, pero hay dos problemas de naturalidad/fidelidad: 1) la nota al pie no corresponde exactamente al texto, porque el texto no contiene «alma» sino una paráfrasis; 2) «el vientre de los impíos carece» resulta poco idiomático. Una formulación como «el justo come hasta saciar su alma[a], pero al vientre de los impíos le falta» suena más natural, conserva mejor la antropología hebrea y mantiene el contraste conciso.'
  glossary_alignment: No hay conflictos con la terminología base del proyecto. «Impíos» para רְשָׁעִים es aceptable en registro sapiencial. La principal corrección es alinear mejor נַפְשׁוֹ con «su alma» en el texto principal y dejar «su apetito» como alternativa en nota, tal como documenta el POB inglés.
  issues:
  - severity: high
    issue: El texto principal no refleja explícitamente נַפְשׁוֹ
    rationale: El hebreo dice literalmente que el justo come para satisfacción de «su nephesh». «Hasta quedar satisfecho» expresa el resultado, pero elimina el término antropológico que el POB inglés decidió conservar en el texto principal.
  - severity: medium
    issue: La nota al pie queda desalineada con el texto principal
    rationale: La nota propone como alternativa «hasta quedar satisfecho con su apetito», pero el texto no contiene una base léxica equivalente a «alma» desde la cual contrastar «apetito». Conviene que el texto principal lleve «su alma» y la nota ofrezca «su apetito».
  - severity: medium
    issue: «El vientre de los impíos carece» es poco idiomático en español
    rationale: Aunque formalmente cercano a «lacks», en español «carecer» suele pedir complemento. La idea hebrea es que el vientre queda falto/insatisfecho; «al vientre de los impíos le falta» comunica mejor el sentido proverbial sin añadir contenido indebido.
  revised_spanish_text: El justo come hasta saciar su alma[a], pero al vientre de los impíos le falta.
  revised_footnotes:
  - marker: a
    text: O «hasta saciar su apetito». El hebreo נֶפֶשׁ (néfesh) puede significar «alma», «vida», «yo» o «apetito», según el contexto.
    reason: lexical_alternative
  revision_rationale: La revisión restaura en el texto principal el equivalente de נַפְשׁוֹ («su alma»), en conformidad con la decisión documentada del POB inglés, y deja «apetito» como alternativa léxica en nota. También mejora la naturalidad española del segundo hemistiquio con «al vientre de los impíos le falta», que expresa carencia de manera idiomática y conserva la brevedad sapiencial.
