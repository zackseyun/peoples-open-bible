    text: O «wadi de Egipto». El hebreo נחל suele referirse a un cauce estacional o wadi; «torrente de Egipto» se mantiene en el texto principal por claridad y continuidad.
    reason: lexical_alternative
  - marker: b
    text: O «sus extremos». El hebreo emplea una forma plural («sus salidas/extremos») para el punto terminal del límite.
    reason: lexical_alternative
