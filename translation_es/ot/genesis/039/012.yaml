revisions:
- from: 'Entonces ella lo agarró por su vestido[a], diciendo[b]: «¡Acuéstate conmigo!» Pero él dejó su vestido en su mano y huyó y salió afuera.'
  to: 'Entonces ella lo agarró por su prenda[b], diciendo: «¡Acuéstate[a] conmigo!» Pero él dejó su prenda en su mano y huyó y salió fuera.'
  rationale: Se cambió «vestido» por «prenda» para evitar una especificación incorrecta en español y reflejar la generalidad de בגד. Se corrigió la correspondencia de las notas al pie para que el marcador [a] explique el eufemismo sexual en «Acuéstate conmigo» y [b] explique la prenda. Se ajustó «salió afuera» a «salió fuera» para un español más digno y natural sin perder el sentido direccional, y se dejó el resto del versículo muy cerca del original y del audit trail inglés.
