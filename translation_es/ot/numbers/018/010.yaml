translation:
  language: es
  text: Lo comerás en el lugar santísimo; todo varón podrá comerlo[a]. Será santo para ti.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo literalmente: «en el santo de los santos». Aquí la expresión designa el lugar destinado para comerlo, no necesariamente el espacio más interno del santuario.'
    reason: lexical_alternative
lexical_decisions:
- source_word: בְּקֹדֶשׁ הַקֳּדָשִׁים
  english_pob_choice: in the most holy place
  chosen_spanish: en el lugar santísimo
  alternatives_spanish:
  - en el santo de los santos
  - en el lugar más santo
  lexicon: HALOT
  rationale: El hebreo es una expresión superlativa cultual que en este contexto marca el ámbito designado para comer la ofrenda. En español, «lugar santísimo» conserva la fuerza idiomática y la función locativa de בְּ mejor que una traducción más literal como «santo de los santos», que puede sonar menos natural y más técnica.
- source_word: תֹּאכֲלֶנּוּ
  english_pob_choice: You shall eat it
  chosen_spanish: Lo comerás
  alternatives_spanish:
  - Lo comerás tú
  - Lo deberás comer
  lexicon: HALOT
  rationale: El imperfecto en segunda persona masculina singular expresa aquí una instrucción. «Lo comerás» conserva el mandato sin añadir modalizaciones ajenas al hebreo; el pronombre clítico mantiene el objeto directo explícito.
- source_word: כָּל זָכָר
  english_pob_choice: every male
  chosen_spanish: todo varón
  alternatives_spanish:
  - todo hombre
  - todo varón entre ustedes
  lexicon: HALOT
  rationale: La frase restringe quién puede comerlo dentro del ámbito sacerdotal. «Todo varón» reproduce con precisión el valor de זָכָר y evita el posible ensanchamiento genérico de «hombre».
- source_word: יֹאכַל אֹתוֹ
  english_pob_choice: may eat it
  chosen_spanish: podrá comerlo
  alternatives_spanish:
  - puede comerlo
  - lo comerá
  lexicon: HALOT
  rationale: El imperfecto con valor permisivo expresa autorización. «Podrá comerlo» comunica claramente esa permisividad en español y distingue este segundo verbo del mandato inicial.
- source_word: קֹדֶשׁ יִהְיֶה לָּךְ
  english_pob_choice: It shall be holy to you
  chosen_spanish: Será cosa santa para ti
  alternatives_spanish:
  - Será santo para ti
  - Te será santo
  lexicon: HALOT
  rationale: La cláusula afirma el estatus sagrado de la porción. «Cosa santa» preserva el sustantivo cultual קֹדֶשׁ sin forzar una personificación o una reformulación demasiado abstracta; mantiene la relación cultual con Aarón/la línea sacerdotal.
theological_decisions:
- issue: Alcance del destinatario singular y aplicación sacerdotal
  english_pob_reading: The verse addresses Aaron in the singular as representative of the priesthood, with the permission extending to qualified males among the priests.
  chosen_spanish_reading: El verso mantiene el singular («lo comerás», «para ti») como dirección a Aarón representativamente, mientras que la segunda cláusula delimita la autorización a todo varón apto dentro del ámbito sacerdotal.
  alternative_spanish_readings:
  - Dirigido solo a Aarón personalmente.
  - Dirigido de manera indiferenciada a toda la comunidad.
  rationale: El hebreo conserva el singular, pero el contexto de los diezmos y ofrendas para Aarón y sus hijos muestra que habla representativamente del sacerdocio. La traducción conserva esa tensión sin diluirla.
  doctrine_reference: Translation philosophy §5 (consistencia/documented exception) y §4 (gender-accurate over gender-neutral)
translation_notes:
  revision_awareness: La redacción sigue el último estado revisado del expediente inglés, que fijó la locución como «the most holy place» por precisión léxica. En español se optó por «el lugar santísimo», equivalente natural que conserva la referencia cultual y la función locativa. También se mantuvo la restricción por sexo con «todo varón» y la fuerza permisiva con «podrá comerlo».
  spanish_consistency_notes:
  - Se preservó Yahvé solo cuando aparece explícitamente; en este versículo no está presente.
  - Se mantuvo el registro legal-cultual con verbos simples y directos.
  - «Lugar santísimo» se usa como término cultual establecido y no como paráfrasis devocional.
  - La nota al pie marca la alternativa literal sin sustituir el texto principal.
