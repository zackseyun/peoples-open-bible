translation:
  language: es
  text: Se apoyará en ella[a] y no vacilará[b]; confiará en ella y no será avergonzado[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Es decir, la Sabiduría, personificada como mujer en el contexto circundante.
    reason: cross_reference
  - marker: b
    text: O 'no será movido'. El hebreo también puede expresar 'no tambaleará' o 'no cederá' de su firmeza.
    reason: lexical_alternative
  - marker: c
    text: O 'no será decepcionado'. La expresión también puede llevar el sentido de que su confianza no resultará fallida.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְנִשְׁעַן
  english_pob_choice: he will lean on
  chosen_spanish: se apoyará en ella
  alternatives_spanish:
  - se recostará en ella
  - se sostendrá en ella
  - se apoyará sobre ella
  lexicon: HALOT
  rationale: El hebreo expresa la imagen concreta de apoyarse/recostarse en algo firme; en español, 'se apoyará en ella' conserva esa metáfora y también el sentido de depender de ella.
- source_word: עָלֶיהָ
  english_pob_choice: on her
  chosen_spanish: en ella
  alternatives_spanish:
  - sobre ella
  - en su persona
  lexicon: HALOT
  rationale: La forma femenina remite a la Sabiduría personificada; 'en ella' es natural en español y mantiene el referente femenino sin volverlo neutro.
- source_word: וְלֹא יִמּוֹט
  english_pob_choice: and not be shaken
  chosen_spanish: y no será sacudido
  alternatives_spanish:
  - y no vacilará
  - y no se tambaleará
  - y no será movido
  lexicon: HALOT
  rationale: מוֹט puede expresar inestabilidad, tambaleo o ser movido; 'no será sacudido' preserva la idea de firmeza resultante y evita un giro demasiado abstracto.
- source_word: וּבָהּ יִבְטַח
  english_pob_choice: he will trust in her
  chosen_spanish: confiará en ella
  alternatives_spanish:
  - pondrá su confianza en ella
  - se fiará de ella
  lexicon: HALOT
  rationale: בטח es 'confiar, sentirse seguro'; 'confiará en ella' es directo y fiel al paralelismo del hebreo, sin añadir matices innecesarios.
- source_word: וְלֹא יֵבוֹשׁ
  english_pob_choice: and not be put to shame
  chosen_spanish: y no será avergonzado
  alternatives_spanish:
  - y no quedará avergonzado
  - y no se verá frustrado
  lexicon: HALOT
  rationale: בוש puede significar avergonzarse o quedar decepcionado por una confianza fallida. 'No será avergonzado' conserva bien el campo semántico y la correspondencia con el griego καταισχυνθῇ.
theological_decisions:
- issue: Referente femenino de la Sabiduría personificada
  english_pob_reading: Render the feminine suffixes as 'her,' referring to personified wisdom.
  chosen_spanish_reading: Traducir los sufijos femeninos como 'ella', refiriéndolos a la Sabiduría personificada.
  alternative_spanish_readings:
  - usar un impersonal como 'ello'
  - neutralizar el referente con 'esto'
  rationale: El hebreo y el contexto literario presentan a la Sabiduría como figura femenina; mantener 'ella' preserva la personificación y la teología literaria del pasaje.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
translation_notes:
  revision_awareness: El borrador corrige el problema anterior eliminando notas al pie no ancladas en el texto, por lo que no quedan marcadores huérfanos. La redacción sigue de cerca el hebreo, con apoyo del paralelo griego para 'no será avergonzado' y la imagen de firmeza.
  spanish_consistency_notes:
  - Se mantiene 'ella' para la Sabiduría personificada, en continuidad con la sintaxis femenina del hebreo.
  - Se evita 'Cristo', 'Señor' u այլ terminología no presente en el texto.
  - La estructura paralela del versículo se conserva en dos miembros equilibrados.
