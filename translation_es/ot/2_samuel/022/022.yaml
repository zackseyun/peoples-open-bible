translation:
  language: es
  text: Porque he guardado los caminos de Yahvé, y no me he apartado perversamente de mi Dios[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «no he obrado malvadamente apartándome de mi Dios».'
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Puesto que
  lexicon: HALOT
  rationale: Introduce la razón o fundamento de la afirmación previa. En español, «Porque» conserva bien el valor explicativo causal del hebreo en un registro poético y natural.
- source_word: שָׁמַרְתִּי
  english_pob_choice: I have kept
  chosen_spanish: he guardado
  alternatives_spanish:
  - he observado
  - he custodiado
  lexicon: HALOT
  rationale: שׁמר abarca guardar, observar, custodiar. «He guardado» comunica la idea de mantener fielmente los mandamientos o caminos con un pretérito perfecto natural en español.
- source_word: דַּרְכֵי
  english_pob_choice: the ways
  chosen_spanish: los caminos
  alternatives_spanish:
  - las sendas
  - las maneras
  lexicon: HALOT
  rationale: El plural constructo de דֶּרֶךְ expresa maneras de conducta o proceder. «Caminos» conserva la metáfora bíblica y es plenamente inteligible en español.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  - Jehová
  lexicon: HALOT
  rationale: 'Se sigue la terminología del proyecto para el Tetragrámaton: «Yahvé», preservando el nombre propio divino en vez de sustituirlo por un título.'
- source_word: וְלֹא
  english_pob_choice: and have not
  chosen_spanish: y no he
  alternatives_spanish:
  - y no he llegado a
  - y tampoco he
  lexicon: HALOT
  rationale: La coordinación negativa queda de forma simple y paralela al primer miembro. «Y no he» funciona con naturalidad en español junto al perfecto anterior.
- source_word: רָשַׁעְתִּי
  english_pob_choice: have not wickedly departed from
  chosen_spanish: he obrado malvadamente apartándome de
  alternatives_spanish:
  - he actuado impíamente alejándome de
  - he procedido mal alejándome de
  lexicon: HALOT
  rationale: El verbo רשע expresa obrar mal, ser culpable o actuar perversamente. Aquí, con מִן + «mi Dios», la relación de separación está presente; por eso se conserva la dimensión moral y relacional sin convertirla en una simple declaración abstracta.
- source_word: מֵאֱלֹהָי
  english_pob_choice: from my God
  chosen_spanish: de mi Dios
  alternatives_spanish:
  - de parte de mi Dios
  - de junto a mi Dios
  lexicon: HALOT
  rationale: La preposición מִן señala separación o alejamiento. En español, «de mi Dios» reproduce esa relación de origen/separación de manera concisa y fiel al hebreo.
theological_decisions:
- issue: Renderización del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - Jehová
  rationale: Se mantiene el nombre propio del pacto según la convención del proyecto, evitando la sustitución por un título como «el SEÑOR».
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Fuerza de רָשַׁעְתִּי מֵאֱלֹהָי
  english_pob_reading: have not wickedly departed from my God
  chosen_spanish_reading: no he obrado malvadamente apartándome de mi Dios
  alternative_spanish_readings:
  - no me he apartado malvadamente de mi Dios
  - no he sido impío hacia mi Dios
  rationale: La frase hebrea une la idea moral de obrar mal con la separación relacional respecto de Dios. La opción elegida preserva ambas dimensiones sin añadir una paráfrasis interpretativa más amplia de lo que el texto exige.
  doctrine_reference: 'DOCTRINE.md: lexical force of רשע with preposition מן'
translation_notes:
  revision_awareness: Se corrigió el problema de validación anterior asegurando que cada marcador de nota esté anclado explícitamente en el texto. No se incluyen marcadores no usados ni notas sin ancla.
  spanish_consistency_notes:
  - Se usa «Yahvé» de forma consistente para יְהוָה según el estándar del proyecto.
  - Se mantiene «Dios» para אֱלֹהִים, con posesivo singular «mi Dios» por la forma hebrea.
  - «Caminos» conserva el paralelismo bíblico y la metáfora de conducta.
  - La cláusula negativa se mantiene cercana al hebreo sin ampliar el sentido más allá de la relación de separación sugerida por מִן.
