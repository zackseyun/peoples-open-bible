review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura básica del hebreo: mandato a los hijos de Israel, caso legal singular con אָדָם, ofrenda a Yahvé y procedencia animal. Sin embargo, hay dos desajustes importantes con el sentido/documentación: 1) la nota [a] introduce la alternativa ''sacrificio'' para קָרְבָּן, pero el rastro inglés preservó como alternativa principal para este versículo el matiz amplio de ''ofrenda'', no una nota necesaria en español; 2) la nota [b] dice ''O Yahweh'', pero el proyecto exige ''Yahvé'' en el texto principal, y ''Yahweh'' no necesita nota como alternativa léxica aquí. Además, ''presente/presentarán'' es aceptable, pero ''traiga/traerán'' preserva mejor la concreción de יקריב documentada en el POB inglés.'
  spanish_quality_summary: El español es claro y digno, pero puede afinarse para sonar más natural y más cercano a las decisiones fuente. 'Del vacuno o del rebaño' funciona, aunque 'del ganado mayor o del rebaño' o 'del hato o del rebaño' serían opciones; sin embargo, 'vacuno' sigue siendo inteligible. La frase mejora al usar 'traiga/traerán' en vez de 'presente/presentarán', y al eliminar notas innecesarias que crean ruido.
  glossary_alignment: Se alinea bien con 'Yahvé', 'hijos de Israel' y 'ofrenda'. No obstante, la nota sobre יהוה entra en tensión con la preferencia del proyecto al sugerir 'Yahweh' como simple alternativa. También conviene mantener el campo verbal de קרב con 'traer' según la racionalidad documentada en inglés.
  issues:
  - severity: medium
    issue: El verbo יקריב/תקריבו se traduce como 'presente/presentarán' en vez de 'traiga/traerán'.
    rationale: Aunque 'presentar' es posible en contexto sacrificial, el expediente inglés documenta explícitamente que 'bring/brings' preserva mejor la idea concreta de acercar/traer. En español, 'traer' mantiene esa concreción con buena naturalidad.
  - severity: high
    issue: La nota [b] sobre Yahvé/Yahweh es improcedente.
    rationale: El proyecto establece 'Yahvé' como forma principal en español. Añadir una nota 'O Yahweh' no preserva una alternativa significativa del texto fuente ni del POB, y puede introducir inconsistencia terminológica.
  - severity: medium
    issue: La nota [a] sobre 'sacrificio' no corresponde al aparato auditado y puede estrechar indebidamente קָרְבָּן.
    rationale: En este contexto introductorio, 'ofrenda' es la decisión amplia y correcta. 'Sacrificio' es una alternativa posible en abstracto, pero aquí puede desviar el sentido más general del término y no responde a una ambigüedad nueva en español.
  revised_spanish_text: 'Habla a los hijos de Israel[a] y diles: Cuando un hombre[b] de entre ustedes traiga una ofrenda a Yahvé, ustedes traerán su ofrenda de entre el ganado: del vacuno o del rebaño.'
  revised_footnotes:
  - marker: a
    text: O 'los israelitas' o 'el pueblo de Israel'. El hebreo dice 'los hijos de Israel'.
    reason: lexical_alternative
  - marker: b
    text: O 'una persona' o 'cualquiera'. El hebreo tiene 'un hombre' (adam) usado aquí en sentido representativo.
    reason: lexical_alternative
  revision_rationale: 'Se corrige el texto para alinearlo mejor con el hebreo y con el rastro léxico-teológico del POB: se mantiene ''hijos de Israel'' y ''un hombre'', se cambia el verbo a ''traiga/traerán'' para reflejar mejor יקריב/תקריבו, y se eliminan notas no justificadas sobre ''sacrificio'' y ''Yahweh''. Se conservan solo las notas léxicas significativas que el expediente inglés también preserva para los masculinos representativos.'
