    rationale: 'El POB inglés documenta que el texto principal sigue el sentido comparativo claro apoyado por el griego: ''Better is ... than ...'', y trata מוסר בשת en nota textual. Mantener la cláusula difícil como texto principal rompe la alineación con la decisión fuente auditada.'
