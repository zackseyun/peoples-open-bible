  - severity: medium
    issue: «Jispá» es una transliteración discutible para יִשְׁפָּה
    rationale: La yod inicial no exige «J-» en español, y esa elección puede sugerir un sonido no presente o una adaptación arbitraria. «Ispá» reproduce de forma más sobria y legible el nombre; «Yispá» sería otra opción posible.
  revised_spanish_text: y Miguel, Ispá y Joha, los hijos de Bería.
  revision_rationale: 'Se corrigen dos nombres propios para ajustarlos mejor al hebreo y al uso español legible: «Jispá» → «Ispá» y «Berías» → «Bería». Se mantiene «Miguel» como forma española establecida de מִיכָאֵל, y «Joha» conforme al audit trail inglés. No se requieren notas al pie, porque no hay ambigüedad significativa restante en español.'
