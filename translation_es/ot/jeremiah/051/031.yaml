- from: Un corredor corre a encontrarse con otro corredor[a], y un mensajero a encontrarse con otro mensajero[b], para decir al rey de Babilonia que su ciudad ha sido capturada[c] de extremo a extremo.
  to: Un corredor corre al encuentro de otro corredor[a], y un mensajero al encuentro de otro mensajero, para decirle al rey de Babilonia que su ciudad ha sido capturada de extremo a extremo[b].
  rationale: Se reemplazó «a encontrarse con» por «al encuentro de» para representar mejor לִקְרַאת en español natural y no reflexivo. Se eliminó la nota innecesaria sobre «mensajero/heraldo», ya que el texto principal ya escoge con acierto «mensajero» y el expediente inglés no exige una nota separada allí. Se rehízo la nota final para anclarla correctamente a la frase espacial hebrea y evitar mezclar dos decisiones léxicas distintas.
