  rationale: El testimonio base es singular dativo (‘to him’). En español, el dativo pronominal se expresa naturalmente como ‘a él’. Mantiene la referencia singular sin forzar una paráfrasis. ‘A ellos’ quedaría solo como variante textual, no como lectura principal.
translation_notes:
  revision_awareness: Se sigue el testimonio base singular del griego (αὐτῷ) y se preserva la variante plural atestiguada en A (αὐτοῖς) como nota textual, conforme al expediente inglés.
  spanish_consistency_notes:
  - Se conservó el pronombre dativo con preposición (‘a él’) para reflejar el valor relacional del griego.
  - La variante manuscrita plural se mantiene en nota sin incorporarla al texto principal, porque el texto base dado es singular.
