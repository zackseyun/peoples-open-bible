    rationale: El hebreo tiene objeto plural («a ustedes») y verbo plural («ustedes muestran»), referido a los amigos de Job. «Te reprenderá» y «muestras» alteran el destinatario gramatical.
  - severity: medium
    issue: Nota [a] formula una literalidad inexacta
    rationale: La construcción הוֹכֵחַ יוֹכִיחַ es un infinitivo absoluto más verbo finito para intensificación, no una frase literalmente equivalente a «reprenderá con certeza».
  - severity: low
