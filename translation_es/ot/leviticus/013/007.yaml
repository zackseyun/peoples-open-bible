translation:
  language: es
  text: Pero si la erupción escamosa[a] ciertamente se extiende[b] sobre la piel, después de haberse presentado al sacerdote para su purificación[c], entonces se presentará por segunda vez ante el sacerdote.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'la erupción', 'el sarpullido' o, tradicionalmente, 'la costra'. El término hebreo se refiere a una afección superficial de la piel bajo examen.
    reason: lexical_alternative
  - marker: b
    text: 'La frase verbal hebrea intensifica la idea: ''si la afección ciertamente se extiende'' o ''si de hecho se extiende''.'
    reason: lexical_alternative
  - marker: c
    text: '''Para su purificación'' se refiere al proceso o propósito de ser examinado con miras a ser declarado limpio.'
    reason: cultural_note
lexical_decisions:
- source_word: פָּשֹׂה תִפְשֶׂה
  english_pob_choice: indeed spreads
  chosen_spanish: se extiende de verdad
  alternatives_spanish:
  - se extiende en verdad
  - ciertamente se extiende
  - se sigue extendiendo
  lexicon: HALOT
  rationale: La combinación verbal intensifica la acción; en español, 'se extiende de verdad' conserva la fuerza enfática sin sonar mecánica ni redundante.
- source_word: הַמִּסְפַּחַת
  english_pob_choice: the scaly eruption
  chosen_spanish: la erupción escamosa
  alternatives_spanish:
  - la erupción
  - la erupción cutánea
  - la sarna
  lexicon: HALOT
  rationale: En Levítico 13 se trata de una afección superficial bajo examen sacerdotal. 'Erupción escamosa' mantiene la imagen descriptiva y evita 'sarna', que sería demasiado interpretativa.
- source_word: בָּעוֹר
  english_pob_choice: on the skin
  chosen_spanish: sobre la piel
  alternatives_spanish:
  - en la piel
  - en su piel
  - sobre su piel
  lexicon: HALOT
  rationale: '''Sobre la piel'' transmite la localización de manera natural en español y respeta que el hebreo no añade posesivo explícito.'
- source_word: אַחֲרֵי הֵרָאֹתוֹ
  english_pob_choice: after he has shown himself
  chosen_spanish: después de haberse presentado
  alternatives_spanish:
  - después de haberse mostrado
  - después de haber sido visto
  - después de haber comparecido
  lexicon: HALOT
  rationale: El valor reflexivo/procedimental del verbo en este contexto legal se expresa mejor con 'haberse presentado', que comunica el acto de acudir para examen.
- source_word: אֶל הַכֹּהֵן
  english_pob_choice: to the priest / before the priest
  chosen_spanish: al sacerdote / ante el sacerdote
  alternatives_spanish:
  - al sacerdote
  - delante del sacerdote
  - frente al sacerdote
  lexicon: HALOT
  rationale: Alterno entre 'al sacerdote' y 'ante el sacerdote' para evitar repetición y conservar el matiz de presentación para inspección.
- source_word: לְטָהֳרָתוֹ
  english_pob_choice: for his cleansing
  chosen_spanish: para su purificación
  alternatives_spanish:
  - para su limpieza ritual
  - para ser declarado limpio
  - para su limpieza
  lexicon: HALOT
  rationale: '''Purificación'' es el equivalente más directo del proceso ritual indicado por el hebreo; en contexto sacerdotal, puede implicar la declaración de limpio sin sobreespecificarla.'
- source_word: וְנִרְאָה שֵׁנִית
  english_pob_choice: then he shall appear ... a second time
  chosen_spanish: entonces se presentará por segunda vez
  alternatives_spanish:
  - entonces aparecerá por segunda vez
  - y se mostrará otra vez
  - entonces comparecerá por segunda vez
  lexicon: HALOT
  rationale: El imperfecto en este contexto legal expresa la acción requerida; 'se presentará por segunda vez' conserva la formalidad y el sentido de comparecer de nuevo.
translation_notes:
  revision_awareness: 'La redacción sigue el sentido del texto hebreo y el audit trail inglés: mantiene la intensificación verbal, conserva el matiz ritual de ''purificación'' y expresa el acto repetido de presentarse ante el sacerdote en un español natural y formal.'
  spanish_consistency_notes:
  - Se mantuvo 'sacerdote' para כֹּהֵן, en línea con el contexto levítico.
  - Se eligió 'purificación' para לְטָהֳרָתוֹ por su valor ritual y porque puede abarcar la finalidad declarativa del examen.
  - La intensificación verbal se reflejó en el cuerpo del texto con 'de verdad' y se aclaró en nota para no perder la fuerza del hebreo.
  - '''Erupción escamosa'' preserva la descripción sin introducir una diagnosis moderna ajena al texto.'
