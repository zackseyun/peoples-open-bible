translation:
  language: es
  text: Porque Dios salvará a Sion y edificará las ciudades de Judá, y habitarán allí y la poseerán[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «la heredarán» o «tomarán posesión de ella». El verbo hebreo puede llevar el sentido de heredar o tomar posesión, especialmente de una tierra. El hebreo usa un pronombre femenino singular, probablemente refiriéndose a Sion o a la tierra personificada.
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  - Porque, en efecto
  lexicon: HALOT
  rationale: Aquí כִּי introduce la base o fundamento de la afirmación anterior. En español, «Porque» conserva bien esa relación explicativa y suena natural al inicio de una cláusula bíblica.
- source_word: אֱלֹהִים
  english_pob_choice: God
  chosen_spanish: Dios
  alternatives_spanish:
  - el Dios
  - Dios mismo
  lexicon: HALOT
  rationale: El verbo en singular muestra que el referente es singular; «Dios» mantiene ese valor sin añadir determinación innecesaria.
- source_word: יוֹשִׁיעַ
  english_pob_choice: will save
  chosen_spanish: salvará
  alternatives_spanish:
  - librará
  - rescatará
  lexicon: HALOT
  rationale: El hifil de ישׁע expresa salvar/liberar. «Salvará» preserva la fuerza futura-promisoria y el peso teológico del rescate divino.
- source_word: צִיּוֹן
  english_pob_choice: Zion
  chosen_spanish: Sion
  alternatives_spanish:
  - Zion
  lexicon: HALOT
  rationale: Se conserva el nombre propio bíblico. En español, «Sion» es la forma tradicional y ampliamente reconocible; no se traduce como un término común.
- source_word: וְיִבְנֶה
  english_pob_choice: and build
  chosen_spanish: y edificará
  alternatives_spanish:
  - y construirá
  - y reconstruirá
  lexicon: HALOT
  rationale: בנה se expresa naturalmente en español con «edificar». Se evita «reconstruirá» porque el hebreo no marca de manera explícita la idea de volver a construir.
- source_word: עָרֵי יְהוּדָה
  english_pob_choice: the cities of Judah
  chosen_spanish: las ciudades de Judá
  alternatives_spanish:
  - las ciudades de Judea
  - las ciudades de Judá
  lexicon: HALOT
  rationale: La construcción posesiva se vierte de forma directa y clara. «Judá» conserva el referente territorial y tribal/covenantal del hebreo.
- source_word: וְיָשְׁבוּ
  english_pob_choice: and they will dwell
  chosen_spanish: y ellos habitarán
  alternatives_spanish:
  - y vivirán
  - y se establecerán
  lexicon: HALOT
  rationale: ישׁב suele significar habitar, morar o establecerse. «Habitarán» mantiene el matiz de residencia estable y suena natural en español bíblico contemporáneo.
- source_word: שָׁם
  english_pob_choice: there
  chosen_spanish: allí
  alternatives_spanish:
  - allá
  - allí mismo
  lexicon: HALOT
  rationale: El adverbio locativo se traduce con una forma simple y directa. «Allí» remite sin ambigüedad a Sion/Judá mencionadas antes.
- source_word: וִירֵשׁוּהָ
  english_pob_choice: and possess it
  chosen_spanish: y la poseerán
  alternatives_spanish:
  - y la heredarán
  - y tomarán posesión de ella
  lexicon: HALOT
  rationale: ירשׁ puede significar poseer, heredar o tomar posesión. Se conserva «la» para reflejar el sufijo femenino singular del hebreo y no neutralizar prematuramente la imagen poética.
theological_decisions:
- issue: Referente del sufijo femenino en וִירֵשׁוּהָ
  english_pob_reading: Possess it, while preserving the likely feminine singular referent in the source tradition.
  chosen_spanish_reading: la poseerán
  alternative_spanish_readings:
  - lo poseerán
  - heredarán la tierra
  - tomarán posesión de Sion
  rationale: El hebreo usa un sufijo femenino singular, probablemente referido a Sion o a la tierra personificada. En español, «la» preserva esa tensión sin convertirla prematuramente en un objeto neutro.
  doctrine_reference: Primacía del texto original y preservación de la personificación poética; evitar resolver de manera demasiado cerrada una ambigüedad heredada del hebreo.
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión del inglés POB que hizo más natural el pronombre en inglés («it») sin eliminar la tensión del hebreo. En español se optó por conservar el femenino singular («la») porque la forma verbal y el sufijo lo requieren y porque la personificación de Sion/tierra sigue siendo auditable en el original.
  spanish_consistency_notes:
  - Se usó «Sion» como forma bíblica habitual en español, coherente con la decisión del POB inglés de conservar el nombre propio.
  - Se evitó «Señor» o un equivalente con máscara, porque el versículo no usa el nombre divino YHWH sino אֱלֹהִים.
  - «Poseer» se mantuvo por su valor lexical de dominio/tenencia; las alternativas «heredar» y «tomar posesión» quedan documentadas en nota.
  - La puntuación conserva el paralelismo hebreo con dos miembros principales y una secuencia final de consecuencia/residencia.
