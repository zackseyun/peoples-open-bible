    rationale: En el texto español, [a] aparece tras 'derecho', pero la nota explica alternativas para חֶסֶד ('steadfast love'), que corresponde a 'amor firme'/'amor fiel'. Esto rompe la trazabilidad entre texto y nota exigida por el proyecto.
  - severity: medium
    issue: '''Amor firme'' es menos idiomático en español para חֶסֶד.'
    rationale: Aunque transmite constancia, suena algo rígido y no expresa tan claramente la lealtad pactal como 'amor fiel' o 'amor leal'. El audit trail inglés destaca precisamente esa fidelidad leal.
  revised_spanish_text: Ama la justicia y el derecho; la tierra está llena del amor fiel[a] de Yahvé.
