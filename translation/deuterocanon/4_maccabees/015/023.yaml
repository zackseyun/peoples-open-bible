translation:
  text: But devout reason[a], strengthening her inward affections even in those very sufferings[b], strained to disregard her temporary love for her children.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'pious reason.' The Greek phrase is a key expression in 4 Maccabees for reason governed by reverence toward God.
    reason: lexical_alternative
  - marker: b
    text: Literally 'her temporary love of children' or 'transient maternal affection.' The text contrasts natural maternal attachment with steadfast fidelity under suffering.
    reason: lexical_alternative
lexical_decisions:
- source_word: σπλάγχνα
  chosen: inward affections
  alternatives:
  - heart
  - compassion
  - inner parts
  lexicon: LSJ
  rationale: Literally refers to inward parts, but idiomatically denotes deep feelings or affections. 'Inward affections' preserves the bodily metaphor better than the flatter 'heart' while remaining intelligible.
- source_word: εὐσεβὴς λογισμός
  chosen: devout reason
  alternatives:
  - pious reason
  - godly reasoning
  lexicon: LSJ
  rationale: A key term in 4 Maccabees, referring to reason shaped by reverence toward God. 'Devout reason' is concise, natural English and preserves both the rational and religious dimensions.
- source_word: ἐν αὐτοῖς τοῖς πάθεσιν
  chosen: in the midst of those very sufferings
  alternatives:
  - in those sufferings themselves
  - amid those passions
  lexicon: LSJ
  rationale: πάθη here refers to sufferings/torments rather than internal passions. The emphatic αὐτοῖς τοῖς is reflected by 'those very'.
- source_word: ἀνδρειώσας
  chosen: strengthened
  alternatives:
  - made courageous
  - emboldened
  - made manly
  lexicon: LSJ
  rationale: The participle conveys making brave or courageous. 'Strengthened' fits the syntax with σπλάγχνα as object and avoids awkwardly gendered English such as 'made manly,' while still implying fortification under trial.
- source_word: ἐτέτεινεν
  chosen: strained
  alternatives:
  - stretched
  - directed
  - urged
  lexicon: LSJ
  rationale: The imperfect/intensive sense suggests a forceful stretching or exertion. 'Strained' captures the emotional and volitional tension of the mother's effort.
- source_word: τὴν πρόσκαιρον φιλοτεκνίαν
  chosen: her temporary love for her children
  alternatives:
  - her transient maternal affection
  - the passing love of children
  lexicon: LSJ
  rationale: φιλοτεκνία denotes affection for one's children; πρόσκαιρον marks it as belonging to the present age or momentary in contrast with enduring piety. 'Temporary love for her children' is clear and preserves the contrast without denying the reality of maternal love.
- source_word: παροδεῖν
  chosen: to disregard
  alternatives:
  - to overlook
  - to pass by
  - to ignore
  lexicon: LSJ
  rationale: The infinitive means to pass over or disregard. 'Disregard' best conveys deliberate suppression of maternal impulse in service of fidelity.
