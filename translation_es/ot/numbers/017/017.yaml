translation:
  language: es
  text: Habla a los hijos de Israel[a], y toma de ellos una vara por cada casa paterna, de entre todos sus jefes, conforme a sus casas paternas; doce varas[b]. Escribirás el nombre de cada hombre en su vara.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O “los israelitas”. El hebreo dice literalmente “los hijos de Israel”.
    reason: lexical_alternative
  - marker: b
    text: O “bastones”. El hebreo מַטֶּה puede significar “vara” o “bastón”; aquí se refiere a una vara física.
    reason: lexical_alternative
lexical_decisions:
- source_word: בְּנֵי יִשְׂרָאֵל
  english_pob_choice: the sons of Israel
  chosen_spanish: los hijos de Israel
  alternatives_spanish:
  - los israelitas
  - los hijos de Israel
  lexicon: HALOT
  rationale: Conservo el giro hebreo con una forma transparente y natural en español. 'Hijos de Israel' mantiene la correspondencia formal con בני ישראל y evita neutralizar el modo de nombrar al pueblo en el texto fuente.
- source_word: מַטֶּה
  english_pob_choice: staff
  chosen_spanish: vara
  alternatives_spanish:
  - bastón
  - cetro
  - vara
  lexicon: HALOT
  rationale: Aquí se trata de un objeto físico que recibirá nombres y luego florecerá, así que 'vara' comunica bien el referente concreto en español. 'Bastón' puede sonar demasiado cotidiano; 'cetro' sugeriría autoridad real indebidamente.
- source_word: מַטֶּה מַטֶּה לְבֵית אָב
  english_pob_choice: a staff for each fathers' house
  chosen_spanish: una vara por cada casa paterna
  alternatives_spanish:
  - una vara para cada casa paterna
  - una vara por cada casa ancestral
  lexicon: HALOT
  rationale: La repetición distributiva se expresa de modo idiomático con 'por cada'. 'Casa paterna' conserva la estructura clan/linaje de בית אב mejor que 'familia'.
- source_word: נְשִׂיאֵיהֶם
  english_pob_choice: their leaders
  chosen_spanish: sus jefes
  alternatives_spanish:
  - sus líderes
  - sus principales
  lexicon: HALOT
  rationale: '''Jefes'' reproduce bien la función de נָשִׂיא en este contexto tribal sin introducir matices monárquicos. ''Líderes'' sería posible, pero algo más general.'
- source_word: לְבֵית אֲבֹתָם
  english_pob_choice: according to their fathers’ houses
  chosen_spanish: conforme a sus casas paternas
  alternatives_spanish:
  - según sus casas paternas
  - de acuerdo con sus casas paternas
  lexicon: HALOT
  rationale: '''Conforme a'' mantiene la idea organizativa del reparto y suena natural en español bíblico contemporáneo. ''Casas paternas'' preserva la unidad social indicada por בית אבות.'
- source_word: שְׁנֵים עָשָׂר מַטּוֹת
  english_pob_choice: twelve staffs
  chosen_spanish: doce varas
  alternatives_spanish:
  - doce bastones
  - doce varas
  lexicon: HALOT
  rationale: Mantengo la misma traducción de מַטֶּה para coherencia interna. El número es simple y directo; 'varas' suena natural y preciso en este contexto narrativo.
- source_word: אִישׁ אֶת שְׁמוֹ תִּכְתֹּב
  english_pob_choice: You shall write each man's name
  chosen_spanish: El nombre de cada hombre escribirás
  alternatives_spanish:
  - Escribirás el nombre de cada hombre
  - El nombre de cada hombre pondrás por escrito
  lexicon: HALOT
  rationale: El hebreo pone primero 'el nombre' y luego la persona; conservo ese orden enfático en español. La forma verbal en segunda persona singular refleja el mandato directo del original.
- source_word: עַל מַטֵּהוּ
  english_pob_choice: on his staff
  chosen_spanish: en su vara
  alternatives_spanish:
  - sobre su vara
  - en su vara
  lexicon: HALOT
  rationale: '''En su vara'' reproduce de manera natural el uso espacial de עַל en contexto de inscripción. ''Sobre'' sería igualmente posible, pero ''en'' suena más fluido para la acción de escribir.'
translation_notes:
  revision_awareness: La redacción sigue el hebreo masorético de manera cercana y conserva la distribución tribal y paterna; en comparación con el audit trail en inglés, he mantenido la misma comprensión concreta de מַטֶּה como objeto físico y la misma estructura distributiva, pero la he expresado con sintaxis española más natural en la cláusula final.
  spanish_consistency_notes:
  - He usado 'vara' de forma consistente para מַטֶּה en todo el versículo.
  - He mantenido 'casa paterna' / 'casas paternas' para בית אב / בית אבות, evitando reemplazos por 'familia' o 'clan'.
  - He conservado la segunda persona singular del mandato, conforme al hebreo.
  - No he añadido notas de pie porque no hay variante textual o ambigüedad relevante que requiera anclaje explícito en este verso.
