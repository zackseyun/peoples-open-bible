translation:
  language: es
  text: 'Y Judas dijo: «Ciñan sus lomos, y háganse hombres poderosos[a], y estén listos por la mañana para combatir contra estas naciones que se han reunido contra nosotros para destruirnos y nuestras cosas sagradas[b]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «muéstrense hombres poderosos» / «háganse fuertes». El griego literalmente dice «háganse hijos poderosos».
    reason: lexical_alternative
  - marker: b
    text: O «nuestro santuario». El plural griego «nuestras cosas sagradas» puede referirse de manera amplia a los objetos sagrados o al ámbito sagrado.
    reason: alternative_reading
lexical_decisions:
- source_word: Περιζώσασθε
  english_pob_choice: Gird yourselves
  chosen_spanish: Ciñan sus lomos
  alternatives_spanish:
  - Ciñanse
  - Prepárense
  lexicon: LSJ
  rationale: El griego es un imperativo medio con imagen corporal de ajustarse el cinturón para la acción. En español, «ciñan sus lomos» conserva la fuerza marcial y la concreción, y evita una paráfrasis débil como «prepárense».
- source_word: γίνεσθε εἰς υἱοὺς δυνατούς
  english_pob_choice: become mighty sons
  chosen_spanish: háganse hijos poderosos
  alternatives_spanish:
  - háganse hombres poderosos
  - muéstrense valientes
  lexicon: LSJ
  rationale: Se conserva el sustantivo explícito «hijos» porque el griego dice literalmente «hijos», y la formulación mantiene la tensión lexical documentada en el audit trail. «Poderosos» comunica δυνατούς sin masculinizar de modo interpretativo con «hombres».
- source_word: ἕτοιμοι
  english_pob_choice: ready
  chosen_spanish: estén listos
  alternatives_spanish:
  - estén preparados
  lexicon: LSJ
  rationale: «Estén listos» es natural en español moderno y mantiene el sentido de disposición inmediata para la acción militar.
- source_word: εἰς τὸ πρωῒ
  english_pob_choice: in the morning
  chosen_spanish: por la mañana
  alternatives_spanish:
  - en la mañana
  - al amanecer
  lexicon: LSJ
  rationale: La expresión apunta al momento venidero de la acción. «Por la mañana» es idiomático y cercano al valor temporal del griego.
- source_word: πολεμῆσαι
  english_pob_choice: to fight
  chosen_spanish: para combatir
  alternatives_spanish:
  - para pelear
  - para hacer guerra
  lexicon: LSJ
  rationale: «Combatir» conserva el registro militar y formal, y funciona bien con el infinitivo de finalidad en español.
- source_word: ἔθνεσιν
  english_pob_choice: nations
  chosen_spanish: naciones
  alternatives_spanish:
  - pueblos
  - gentiles
  lexicon: LSJ
  rationale: «Naciones» refleja con fidelidad el sustantivo griego sin importar un contraste étnico-religioso más específico que el contexto inmediato no exige.
- source_word: ἐπισυνηγμένοις
  english_pob_choice: have assembled
  chosen_spanish: se han reunido
  alternatives_spanish:
  - se han congregado
  - se han juntado
  lexicon: LSJ
  rationale: El participio perfecto indica un grupo ya congregado contra ellos. «Se han reunido» conserva esa idea de reunión hostil sin sobreexplicar.
- source_word: ἐξᾶραι
  english_pob_choice: to destroy
  chosen_spanish: destruirnos
  alternatives_spanish:
  - aniquilarnos
  - borrarnos
  lexicon: LSJ
  rationale: En contexto militar, el infinitivo expresa eliminación por destrucción. En español, «destruirnos» reproduce la fuerza del verbo sin intensificarlo más allá del texto.
- source_word: τὰ ἅγια ἡμῶν
  english_pob_choice: our holy things
  chosen_spanish: nuestras cosas santas
  alternatives_spanish:
  - nuestro santuario
  - nuestro lugar santo
  - nuestras cosas sagradas
  lexicon: LSJ
  rationale: Se preserva el plural griego τὰ ἅγια con una traducción amplia. «Nuestras cosas santas» evita estrechar indebidamente el referente a un solo recinto y mantiene la amplitud semántica documentada.
theological_decisions:
- issue: Expresión masculina en γίνεσθε εἰς υἱοὺς δυνατούς
  english_pob_reading: Retain 'sons' in the main text
  chosen_spanish_reading: Conservar «hijos» en el texto principal
  alternative_spanish_readings:
  - hombres poderosos
  - varones poderosos
  rationale: El griego usa explícitamente «hijos», y el texto de POB privilegia no neutralizar esa forma. En español, «hijos» mantiene la masculinidad lexical del original sin introducir un vocablo no presente en el griego.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
- issue: Alcance de τὰ ἅγια ἡμῶν
  english_pob_reading: Translate broadly as 'our holy things'
  chosen_spanish_reading: Traducir de forma amplia como «nuestras cosas santas»
  alternative_spanish_readings:
  - nuestro santuario
  - nuestro lugar santo
  rationale: El plural griego permite una referencia abierta a objetos sagrados, el recinto sagrado o el conjunto del ámbito santo. La versión amplia preserva esa ambigüedad sin decidir prematuramente por un solo referente.
  doctrine_reference: DOCTRINE.md §Translation philosophy 3
translation_notes:
  revision_awareness: El audit trail inglés revisó «mighty sons» a «mighty men» por idiomaticidad, pero el español mantiene «hijos» para respetar la literalidad explícita del griego y la preferencia doctrinal del proyecto por no neutralizar el masculino cuando está presente en la fuente. También se adoptó un equivalente amplio para τὰ ἅγια ἡμῶν, preservando la ambigüedad documentada.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma del proyecto solo cuando aparezca el tetragrámaton; este versículo no lo contiene.
  - Se usa «naciones» para ἔθνη, en coherencia con el registro de 1 Macabeos.
  - Se conserva el plural de τὰ ἅγια mediante «cosas santas», evitando singularizar a «santuario» en el texto principal.
  - La puntuación y el estilo siguen una cadencia bíblica clara, con español natural y no arcaizante.
