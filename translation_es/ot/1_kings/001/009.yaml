review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la estructura básica del hebreo: Adonías sacrifica animales en un lugar específico y convoca a sus hermanos y a los hombres de Judá, servidores del rey. Conserva correctamente el valor cultual de וַיִּזְבַּח, la aposición «sus hermanos, los hijos del rey» y el masculino explícito de אַנְשֵׁי יְהוּדָה. Sin embargo, falta preservar varias notas del rastro auditado en inglés: la alternativa léxica para מְרִיא, la alternativa para וַיִּקְרָא, y la nota sobre «los hombres de Judá».'
  spanish_quality_summary: El español es claro y digno, pero «ganado y animales engordados» suena algo redundante porque «ganado» ya puede abarcar animales de cría. «Animales cebados» suena más natural y bíblico en español que «animales engordados». También conviene ajustar las notas para reflejar mejor las alternativas documentadas y evitar perder información relevante del audit trail.
  glossary_alignment: No hay conflicto con la terminología de proyecto principal. «Siervos» para עַבְדֵי הַמֶּלֶךְ es aceptable aquí por tratarse de servicio cortesano/real y por estar documentada la alternativa «funcionarios». Se mantiene correctamente «Judá», «Adonías» y la transliteración de los topónimos.
  issues:
  - severity: medium
    issue: Faltan varias notas preservadas en el POB inglés.
    rationale: El inglés conserva alternativas significativas para מְרִיא («fatted cattle/stall-fed cattle»), וַיִּקְרָא («called/summoned») y אַנְשֵׁי יְהוּדָה («people of Judah»). El borrador español solo conserva dos de cinco notas y pierde información léxica auditada.
  - severity: low
    issue: «Animales engordados» es menos natural que «animales cebados».
    rationale: Ambas opciones son fieles, pero «cebados» es una colocación más idiomática en español bíblico para animales preparados para banquete o sacrificio.
  - severity: low
    issue: La distribución de marcadores de nota no sigue bien los puntos léxicos relevantes del versículo.
    rationale: La nota sobre «siervos del rey» está bien anclada, pero faltan anclajes en «cebados», «invitó» y «hombres de Judá» para las alternativas documentadas.
  revised_spanish_text: Adonías sacrificó ovejas, ganado y animales cebados[a] junto a la piedra de Zohelet[b], que está al lado de En-rogel, e invitó[c] a todos sus hermanos, los hijos del rey, y a todos los hombres de Judá[d], los siervos del rey[e].
  revised_footnotes:
  - marker: a
    text: O «ganado cebado» o «ganado estabulado para engorde».
    reason: lexical_alternative
  - marker: b
    text: Zohelet es un topónimo; su significado exacto es incierto.
    reason: cultural_note
  - marker: c
    text: O «llamó» o «convocó».
    reason: lexical_alternative
  - marker: d
    text: O «la gente de Judá», aunque el hebreo dice «los hombres de Judá».
    reason: lexical_alternative
  - marker: e
    text: «Los siervos del rey» puede referirse a sirvientes o funcionarios de la corte.
    reason: lexical_alternative
  revision_rationale: Se hicieron ajustes menores para mejorar la naturalidad del español («animales cebados») y, sobre todo, para preservar en español las alternativas léxicas y notas culturales ya documentadas en el audit trail inglés. No hay cambio sustancial de sentido.
