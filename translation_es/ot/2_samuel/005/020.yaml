base_translation:
  language: en
  yaml_path: translation/ot/2_samuel/005/020.yaml
  text: So David came to Baal-perazim[a], and there David struck them down. He said[b], “Yahweh has broken through my enemies before me like a breakthrough of waters.” Therefore he called the name of that place Baal-perazim.
  footnotes:
  - marker: a
    text: Baal-perazim sounds like 'lord/master of breakthroughs' or 'place of breakthroughs,' echoing David’s statement that the LORD 'broke through' his enemies.
    reason: lexical_alternative
  - marker: b
    text: Or 'like the bursting of floodwaters.' The Hebrew phrase preserves a wordplay with 'broken through' and 'Baal-perazim.'
    reason: lexical_alternative
