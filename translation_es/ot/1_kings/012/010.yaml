  text: וַ/יְדַבְּר֣וּ אֵלָ֗י/ו הַ/יְלָדִים֙ אֲשֶׁ֨ר גָּדְל֣וּ אִתּ/וֹ֮ לֵ/אמֹר֒ כֹּֽה תֹאמַ֣ר לָ/עָ֣ם הַ/זֶּ֡ה אֲשֶׁר֩ דִּבְּר֨וּ אֵלֶ֜י/ךָ לֵ/אמֹ֗ר אָבִ֨י/ךָ֙ הִכְבִּ֣יד אֶת עֻלֵּ֔/נוּ וְ/אַתָּ֖ה הָקֵ֣ל מֵ/עָלֵ֑י/נוּ כֹּ֚ה תְּדַבֵּ֣ר אֲלֵי/הֶ֔ם קָֽטָנִּ֥/י עָבָ֖ה מִ/מָּתְנֵ֥י אָבִֽ/י־־׃
base_translation:
  language: en
  yaml_path: translation/ot/1_kings/012/010.yaml
  text: 'The young men who had grown up with him spoke to him[a], saying, “Thus you shall say to this people who spoke to you, saying, ‘Your father made our yoke heavy, but you lighten it for us’: thus you shall say to them, ‘My little finger is thicker than my father’s waist.’”'
  footnotes:
