translation:
  language: es
  text: Y cualquier hombre de los hijos de Israel[a], o del forastero que habita entre ellos, que cace alguna pieza, sea animal silvestre o ave, que se pueda comer, derramará su sangre y la cubrirá con tierra[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, «del forastero residente entre ellos». El hebreo גֵּר designa a un no israelita que vive dentro de la comunidad.
    reason: lexical_alternative
  - marker: b
    text: Literalmente, «y lo cubrirá con tierra»; el referente más natural del pronombre es la sangre recién mencionada, no el animal.
    reason: lexical_alternative
lexical_decisions:
- source_word: אִישׁ אִישׁ
  english_pob_choice: any man
  chosen_spanish: cualquier hombre
  alternatives_spanish:
  - cualquier persona
  - cualquiera
  lexicon: HALOT
  rationale: La duplicación de אִישׁ expresa valor distributivo. En español, «cualquier hombre» conserva ese sentido de generalización sin neutralizar el rasgo masculino que el inglés POB retuvo por fidelidad léxica.
- source_word: מִבְּנֵי יִשְׂרָאֵל
  english_pob_choice: from the sons of Israel
  chosen_spanish: de los hijos de Israel
  alternatives_spanish:
  - de los israelitas
  - de los hijos de Israel
  lexicon: HALOT
  rationale: Se mantiene la formulación familiar y pactal de בני ישראל. «Hijos de Israel» es más transparente al hebreo que «israelitas» y conserva el registro bíblico sin depender de una paráfrasis.
- source_word: הַגֵּר הַגָּר בְּתוֹכָם
  english_pob_choice: the sojourner who sojourns among them
  chosen_spanish: el forastero que habita entre ellos
  alternatives_spanish:
  - el forastero residente entre ellos
  - el extranjero que peregrina entre ellos
  lexicon: HALOT
  rationale: גֵּר designa un residente no israelita dentro de la comunidad. «Forastero» evita la connotación moderna de migración irregular; «que habita entre ellos» comunica la permanencia sin forzar el calco del juego verbal inglés.
- source_word: יָצוּד צֵיד
  english_pob_choice: hunts game
  chosen_spanish: cace presa
  alternatives_spanish:
  - cace caza
  - persiga presa
  lexicon: HALOT
  rationale: El par verbal-sustantivo se vuelve natural en español con «cace presa». «Presa» funciona como equivalente de caza/captura en este contexto de cacería, sin añadir especificidad no presente en el hebreo.
- source_word: חַיָּה אוֹ עוֹף
  english_pob_choice: whether wild animal or bird
  chosen_spanish: sea animal silvestre o ave
  alternatives_spanish:
  - sea bestia o ave
  - sea animal o ave
  lexicon: HALOT
  rationale: חַיָּה aquí se refiere a fauna de caza, no a animales en general. «Animal silvestre» mantiene el contexto cinegético y «ave» es el equivalente natural de עוֹף.
- source_word: אֲשֶׁר יֵאָכֵל
  english_pob_choice: that may be eaten
  chosen_spanish: que se pueda comer
  alternatives_spanish:
  - que pueda comerse
  - que sea apto para comer
  lexicon: HALOT
  rationale: La forma pasiva/permisiva del hebreo expresa lo comestible o permitido como alimento. «Que se pueda comer» reproduce ese valor con fluidez y sin sobreespecificar si el matiz es posibilidad o permisión.
- source_word: וְשָׁפַךְ אֶת־דָּמוֹ
  english_pob_choice: shall pour out its blood
  chosen_spanish: derramará su sangre
  alternatives_spanish:
  - verterá su sangre
  - deberá derramar su sangre
  lexicon: HALOT
  rationale: En la instrucción legal, el imperfecto tiene fuerza injuntiva; «derramará» conserva ese tono normativo. «Su sangre» se refiere al animal o ave cazados, como en el inglés auditado.
- source_word: וְכִסָּהוּ בֶּעָפָר
  english_pob_choice: and cover it with earth
  chosen_spanish: y la cubrirá con tierra
  alternatives_spanish:
  - y la cubrirá con polvo
  - y la cubrirá con suelo
  lexicon: HALOT
  rationale: Se sigue la revisión del POB inglés que prefirió «earth» por ser más natural en este contexto ritual. En español, «tierra» es el equivalente más idiomático de עָפָר aquí, y el pronombre femenino «la» conserva la referencia más probable a la sangre.
theological_decisions:
- issue: Referencia del sufijo en וְכִסָּהוּ
  english_pob_reading: the blood is to be covered
  chosen_spanish_reading: la sangre es lo que debe cubrirse
  alternative_spanish_readings:
  - el animal es lo que debe cubrirse
  - el ave es lo que debe cubrirse
  rationale: La referencia más cercana y natural es la sangre mencionada inmediatamente antes. Traducir con «la cubrirá» permite mantener esa lectura sin resolver en exceso la tensión sintáctica, coherente con la nota auditada del POB inglés.
  doctrine_reference: Preservar la tensión sintáctica y ritual sin sobreinterpretar
- issue: Valor legal del imperfecto en una instrucción cultual
  english_pob_reading: shall pour out ... and cover
  chosen_spanish_reading: derramará ... y la cubrirá
  alternative_spanish_readings:
  - deberá derramar ... y deberá cubrir
  - derramar y cubrir
  rationale: El hebreo legal usa formas verbales con fuerza imperativa. El futuro simple en español mantiene el carácter prescriptivo y la solemnidad normativa del texto.
  doctrine_reference: Instrucción legal/cultual en Levítico
translation_notes:
  revision_awareness: Se siguió la revisión inglesa más reciente al preferir «tierra» frente a opciones más marcadas como «polvo», porque en el contexto de cubrir la sangre el español natural coincide mejor con la decisión auditada del POB. También se preservó la lectura del pronombre en clave de sangre, sin convertirla en una explicación explícita dentro del texto principal.
  spanish_consistency_notes:
  - Se mantuvo Yahvé como terminología por defecto en este proyecto, pero este versículo no contiene el nombre divino.
  - Se conservó el paralelismo legal del hebreo sin endurecerlo con formulaciones más técnicas de la tradición eclesiástica.
  - Se evitó «extranjero» como única opción para גֵּר, porque en español puede sonar demasiado amplio y perder la categoría de residente comunitario.
