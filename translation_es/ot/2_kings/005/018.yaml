  text: 'In this matter[a], may Yahweh pardon your servant: when my master goes into the house of Rimmon to bow down there, and he is leaning on my hand, so that I also bow down in the house of Rimmon—when I bow down in the house of Rimmon[b], may Yahweh please pardon your servant in this matter.'
  footnotes:
