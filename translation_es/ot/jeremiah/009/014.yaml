translation:
  language: es
  text: 'Por tanto, así dice Yahvé de los Ejércitos, el Dios de Israel: He aquí, voy a dar de comer ajenjo[a] a este pueblo, y les haré beber agua envenenada[b].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'amargura'; el hebreo nombra una planta amarga, el ajenjo, usada con frecuencia como imagen de juicio.
    reason: lexical_alternative
  - marker: b
    text: O 'agua de veneno' o tradicionalmente 'hiel'.
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: Se conserva el nombre divino del pacto, siguiendo el criterio del proyecto para יהוה. En español bíblico, 'Yahvé' comunica el nombre propio sin sustituirlo por un título encubridor.
- source_word: צְבָאוֹת
  english_pob_choice: of Armies
  chosen_spanish: de los Ejércitos
  alternatives_spanish:
  - de los ejércitos
  - de los huestes
  lexicon: HALOT
  rationale: El hebreo alude concretamente a huestes/ejércitos. 'De los Ejércitos' mantiene la fuerza imagética y corresponde al giro del POB en inglés, sin recurrir a 'de los ejércitos celestiales' que añadiría precisión no explícita aquí.
- source_word: אֱלֹהֵי יִשְׂרָאֵל
  english_pob_choice: the God of Israel
  chosen_spanish: el Dios de Israel
  alternatives_spanish:
  - el Dios de Israel, el Dios de Israel
  lexicon: HALOT
  rationale: Se mantiene la cadena constructa de identificación pactual de manera directa y natural en español.
- source_word: הִנְנִי
  english_pob_choice: Behold, I am
  chosen_spanish: He aquí, yo estoy
  alternatives_spanish:
  - Miren, yo estoy
  - He aquí, yo
  lexicon: HALOT
  rationale: La fórmula profética enfática se conserva con 'He aquí' y el pronombre explícito para reproducir la deíxis y la solemnidad del anuncio.
- source_word: מַאֲכִילָם
  english_pob_choice: I am feeding
  chosen_spanish: yo estoy alimentando
  alternatives_spanish:
  - yo les doy de comer
  - yo los alimentaré
  lexicon: HALOT
  rationale: El participio hifil con sufijo expresa acción inminente o segura, y el presente progresivo español refleja mejor esa vivacidad que un futuro simple. Se evita suavizar la imagen del juicio.
- source_word: הָעָם הַזֶּה
  english_pob_choice: this people
  chosen_spanish: a este pueblo
  alternatives_spanish:
  - a esta gente
  - a este pueblo aquí
  lexicon: HALOT
  rationale: Se preserva el demostrativo y el sustantivo colectivo de uso profético. El acusativo con 'a' resulta natural en español con el verbo 'alimentar'.
- source_word: לַעֲנָה
  english_pob_choice: wormwood
  chosen_spanish: ajenjo
  alternatives_spanish:
  - ajenjo amargo
  - amargura
  lexicon: HALOT
  rationale: '''Ajenjo'' es el equivalente botánico tradicional en español para la planta amarga del texto. Se conserva la imagen concreta, dejando abierta la connotación de amargura/jucio sin convertirla en una abstracción.'
- source_word: וְהִשְׁקִיתִם
  english_pob_choice: and I will make them drink
  chosen_spanish: y les haré beber
  alternatives_spanish:
  - y los haré beber
  - y les daré a beber
  lexicon: HALOT
  rationale: El hifil causativo se traslada con 'haré beber', que conserva la idea de causar la ingestión sin introducir una perífrasis menos fiel. Se mantiene el complemento dativo para el español.
- source_word: מֵי רֹאשׁ
  english_pob_choice: poisoned water
  chosen_spanish: agua envenenada
  alternatives_spanish:
  - agua venenosa
  - agua ponzoñosa
  - agua de veneno
  lexicon: HALOT
  rationale: El POB en inglés opta por una equivalencia transparente que preserve la idea de juicio tóxico. En español, 'agua envenenada' comunica bien el efecto nocivo y mantiene la naturalidad, sin perder el paralelismo con el primer hemistiquio.
theological_decisions:
- issue: Renderización del nombre divino y del título y atribución profética
  english_pob_reading: Yahweh of Armies, the God of Israel
  chosen_spanish_reading: Yahvé de los Ejércitos, el Dios de Israel
  alternative_spanish_readings:
  - Yahvé de los ejércitos, el Dios de Israel
  - Yahvé de las Huestes, el Dios de Israel
  rationale: Se preserva el nombre propio divino según la política del proyecto. 'De los Ejércitos' conserva el matiz de poder soberano y fuerzas convocadas, sin reemplazar el nombre por un título litúrgico tradicional que ocultaría el Tetragrama.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יהוה YHWH → Yahweh'
translation_notes:
  revision_awareness: 'La redacción sigue el acuerdo alto del POB en inglés y su revisión más reciente: se mantiene la fórmula profética enfática, se conserva el participio con valor de acción cierta/inminente, y se refleja el causativo de ''make them drink'' con ''les haré beber''. La decisión de ''agua envenenada'' sigue la actualización editorial que privilegia claridad moderna sin perder el golpe imagístico del hebreo.'
  spanish_consistency_notes:
  - Se usa 'Yahvé' de manera consistente para יהוה, conforme al estándar del proyecto.
  - '''Ejércitos'' mantiene la terminología escogida para צְבָאוֹת y evita el masking tradicional de ''SEÑOR''.'
  - '''Ajenjo'' se deja sin glosa en el cuerpo para conservar la imagen vegetal; la nota da la alternativa interpretativa.'
  - '''Les haré beber'' conserva la causación del hifil sin sobreexplicar.'
  - La puntuación reproduce un tono profético solemne y legible en español contemporáneo.
