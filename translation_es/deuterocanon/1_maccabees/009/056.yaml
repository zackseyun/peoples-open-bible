revisions:
- from: Y murió Alcimo en aquel tiempo con gran tormento[a].
  to: Y murió Alcimo en aquel tiempo después de un gran tormento[a].
  rationale: Se ajusta el texto principal para seguir la elección auditada del POB inglés («after great torment») y se conserva la alternativa igualmente posible («with great torment») en nota. También se mejora la naturalidad del español con «un gran tormento».
  reviewer_model: gpt-5.4
