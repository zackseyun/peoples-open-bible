  text: וָ/אֵ֗רֶא כִּ֤י עַל כָּל אֹדוֹת֙ אֲשֶׁ֤ר נִֽאֲפָה֙ מְשֻׁבָ֣ה יִשְׂרָאֵ֔ל שִׁלַּחְתִּ֕י/הָ וָ/אֶתֵּ֛ן אֶת סֵ֥פֶר כְּרִיתֻתֶ֖י/הָ אֵלֶ֑י/הָ וְ/לֹ֨א יָֽרְאָ֜ה בֹּֽגֵדָ֤ה יְהוּדָה֙ אֲחוֹתָ֔/הּ וַ/תֵּ֖לֶךְ וַ/תִּ֥זֶן גַּם הִֽיא־־־־׃
base_translation:
  language: en
  yaml_path: translation/ot/jeremiah/003/008.yaml
  text: And I saw that because backsliding Israel had committed adultery in all these matters[a], I had sent her away and given her a certificate of divorce. Yet her treacherous sister Judah did not fear[c][b], but she too went and prostituted herself.
  footnotes:
  - marker: a
    text: Or 'faithless Israel' for 'backsliding Israel.' The Hebrew term emphasizes turning away or apostasy.
    reason: lexical_alternative
  - marker: b
    text: Or 'a bill of divorce.' The Hebrew refers to the formal legal document of divorce.
    reason: lexical_alternative
  - marker: c
    text: Or 'went and played the prostitute.' The phrase continues the chapter's metaphor of covenant unfaithfulness as sexual infidelity.
    reason: lexical_alternative
