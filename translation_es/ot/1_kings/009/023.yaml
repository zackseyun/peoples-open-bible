translation:
  language: es
  text: 'Estos eran los principales funcionarios[a] sobre la obra de Salomón: quinientos cincuenta, los que gobernaban[b] sobre el pueblo que hacía la obra.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «los supervisores» para הַנִּצָּבִים; el hebreo puede referirse a personas designadas o puestas sobre otros.
    reason: lexical_alternative
  - marker: b
    text: O «supervisando» o «teniendo autoridad sobre» para הָרֹדִים; el verbo puede expresar gobernar, tener a cargo o ejercer autoridad sobre.
    reason: lexical_alternative
lexical_decisions:
- source_word: שָׂרֵי
  english_pob_choice: chief officers
  chosen_spanish: principales funcionarios
  alternatives_spanish:
  - jefes
  - oficiales
  - capitanes
  lexicon: HALOT
  rationale: שָׂרִים designa líderes o funcionarios con autoridad. En español, «principales funcionarios» conserva el matiz administrativo del contexto sin sugerir una carga militar que «capitanes» podría introducir.
- source_word: הַנִּצָּבִים
  english_pob_choice: the deputies
  chosen_spanish: los que estaban puestos
  alternatives_spanish:
  - los supervisores
  - los oficiales
  - los nombrados
  lexicon: HALOT
  rationale: El participio sustantivado de נצב puede referirse a personas designadas o establecidas en un cargo. Opto por una frase más transparente en español que preserve la idea de estar establecidos sobre una tarea sin identificar de más la función con un término técnico no garantizado por el hebreo.
- source_word: אֲשֶׁר עַל הַמְּלָאכָה
  english_pob_choice: who were over the work
  chosen_spanish: sobre la obra
  alternatives_spanish:
  - encargados de la obra
  - encima del trabajo
  - a cargo de la obra
  lexicon: HALOT
  rationale: La construcción hebrea indica estar «sobre» la tarea. «Sobre la obra» mantiene esa relación de autoridad de forma breve y natural, y además armoniza con el sustantivo «obra», que en español bíblico suena más adecuado que repetir «trabajo» en cada segmento.
- source_word: לִשְׁלֹמֹה
  english_pob_choice: for Solomon
  chosen_spanish: de Salomón
  alternatives_spanish:
  - para Salomón
  - bajo Salomón
  - al servicio de Salomón
  lexicon: HALOT
  rationale: La preposición ל aquí expresa relación/servicio. En español, el genitivo «de Salomón» comunica de manera natural que la obra pertenece a su administración, sin sobrecargar la frase.
- source_word: חֲמִשִּׁים וַחֲמֵשׁ מֵאוֹת
  english_pob_choice: five hundred and fifty
  chosen_spanish: quinientos cincuenta
  alternatives_spanish:
  - quinientos y cincuenta
  lexicon: HALOT
  rationale: Es la equivalencia numérica directa y estándar en español.
- source_word: הָרֹדִים
  english_pob_choice: ruling over
  chosen_spanish: los que gobernaban sobre
  alternatives_spanish:
  - los que mandaban sobre
  - los que ejercían autoridad sobre
  - los supervisores de
  lexicon: HALOT
  rationale: רדה expresa gobernar o ejercer dominio. «Gobernaban sobre» conserva ese peso lexical mejor que «supervisaban», que suaviza demasiado el verbo.
- source_word: בָּעָם
  english_pob_choice: the people
  chosen_spanish: el pueblo
  alternatives_spanish:
  - la gente
  - los trabajadores
  lexicon: HALOT
  rationale: El hebreo dice simplemente «el pueblo». «El pueblo» preserva la amplitud del sustantivo y evita restringirlo prematuramente a «trabajadores».
- source_word: הָעֹשִׂים בַּמְּלָאכָה
  english_pob_choice: who were doing the work
  chosen_spanish: que estaba haciendo la obra
  alternatives_spanish:
  - que trabajaba en la obra
  - que estaban haciendo el trabajo
  - que realizaban la obra
  lexicon: HALOT
  rationale: La cláusula participial indica a quienes estaban efectivamente trabajando. «Estaba haciendo la obra» mantiene la continuidad verbal en español; aunque el singular colectivo puede sonar menos literal, evita una acumulación pesada de relativos y conserva la referencia al grupo como unidad.
theological_decisions:
- issue: Naturaleza de la autoridad de los oficiales
  english_pob_reading: ruling over the people who were doing the work
  chosen_spanish_reading: los que gobernaban sobre el pueblo que estaba haciendo la obra
  alternative_spanish_readings:
  - los que supervisaban al pueblo que estaba haciendo la obra
  - los que tenían autoridad sobre el pueblo que trabajaba
  rationale: No hay una carga doctrinal especial, pero sí una tensión lexical entre dominar/gobernar y supervisar. Mantengo «gobernaban sobre» para respetar la fuerza de רדה, sin convertir el versículo en una afirmación política más amplia de lo que el texto dice.
  doctrine_reference: lexical precision / governance context
translation_notes:
  revision_awareness: 'La redacción inglesa más reciente eliminó una adición no sustentada («of the deputies») y simplificó la relación con Solomon. La versión española sigue esa revisión: evita introducir «de los delegados» o equivalente, y expresa la relación con Salomón de forma breve y natural sin ampliar el sentido del hebreo.'
  spanish_consistency_notes:
  - Se conserva «obra» como equivalente estable de מְלָאכָה en este contexto administrativo.
  - Se mantiene la distinción entre designación oficial («principales funcionarios», «los que estaban puestos») y autoridad efectiva («gobernaban sobre»), reflejando las dos ideas del hebreo sin fusionarlas indebidamente.
  - No se sustituye רדה por un término más suave como «supervisar» en el texto principal, porque el audit trail inglés marcó la fuerza de «ruling over».
