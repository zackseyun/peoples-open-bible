lexical_decisions:
- source_word: ὁ ποιήσας
  english_pob_choice: the one who made
  chosen_spanish: el que hizo
  alternatives_spanish:
  - el que creó
  - el que hizo
  lexicon: BDAG
  rationale: El participio articular funciona de modo sustantivo como descripción de Dios. En español, «el que hizo» conserva esa función descriptiva y la fuerza verbal de ποιέω sin introducir la matización teológica adicional de «creó».
- source_word: τὸν οὐρανὸν
  english_pob_choice: heaven
  chosen_spanish: el cielo
  alternatives_spanish:
  - el cielo
  - el firmamento
  lexicon: LSJ
  rationale: En la pareja fija «cielo y tierra», «cielo» es la forma española natural y fiel para οὐρανός en este marco cosmológico. «Firmamento» sería demasiado específico.
- source_word: τὴν γῆν
  english_pob_choice: earth
  chosen_spanish: la tierra
  alternatives_spanish:
  - la tierra
  - el mundo
  lexicon: LSJ
  rationale: En el merismo «cielo y tierra», γῆ se refiere a la tierra como parte del orden creado, no a una tierra particular.
- source_word: σὺν
  english_pob_choice: with / together with
  chosen_spanish: con
  alternatives_spanish:
  - junto con
  - con
  lexicon: BDAG
  rationale: «Con» expresa adecuadamente la idea de acompañamiento de σὺν y resulta más fluido en español que una construcción más explícita.
- source_word: παντὶ τῷ κόσμῳ αὐτῶν
  english_pob_choice: all their host
  chosen_spanish: todo su ejército
  alternatives_spanish:
  - todo su ejército
  - todo su conjunto ordenado
  - todo lo que hay en ellos
  lexicon: LSJ
  rationale: La revisión inglesa optó por «their host» para captar el sentido totalizador de κόσμος como el conjunto/array perteneciente al cielo y la tierra. En español, «ejército» refleja bien ese valor colectivo de multitud ordenada; aunque «host» es ambiguo en inglés moderno, aquí no significa guerra, sino hueste o multitud organizada. «Todo su conjunto ordenado» sería más explicativo pero menos idiomático.
theological_decisions:
- issue: Sentido de κόσμος en una fórmula de creación
  english_pob_reading: Rendered as 'all their host' rather than 'world' or 'order'
  chosen_spanish_reading: «todo su ejército»
  alternative_spanish_readings:
  - «todo su conjunto ordenado»
  - «todo lo que hay en ellos»
  - «el mundo»
  rationale: Como el texto ya menciona «cielo y tierra», traducir κόσμος como «el mundo» duplicaría la idea de manera torpe. La lectura POB entendió aquí el término como la totalidad ordenada perteneciente a cielo y tierra; en español, «ejército» funciona como equivalente tradicional de una hueste numerosa y organizada, sin forzar el sentido bélico en este contexto.
  doctrine_reference: 'Translation philosophy: original-language primacy over translation tradition; consistency of key terms, or documented exception.'
translation_notes:
  revision_awareness: La versión inglesa pasó de «together with all their order» a «with all their host» para expresar con más naturalidad el valor totalizador de κόσμος. La redacción española sigue esa revisión y la traduce con un término colectivo e idiomático que preserve la idea de plenitud ordenada sin repetir «mundo».
  spanish_consistency_notes:
  - Se mantuvo el orden sintáctico breve y solemne del original.
  - «Cielo y tierra» conserva el merismo bíblico estándar en español.
  - No se introdujo «Cristo», «SEÑOR» ni otras terminologías no presentes en este verso.
  - No se añadieron notas al texto porque la opción española elegida puede explicarse en los campos de decisión léxica y teológica.
