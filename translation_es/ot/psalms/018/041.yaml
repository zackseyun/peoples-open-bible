review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador capta correctamente la estructura básica del hebreo: Dios como sujeto implícito de «diste/pusiste», «mis enemigos», la imagen corporal de עֹרֶף como derrota/huida, y «destruí» para אַצְמִיתֵם. Sin embargo, «Tú pusiste a mis enemigos la espalda» no refleja bien la sintaxis ni el modismo en español; suena antinatural y puede interpretarse erróneamente. Conviene volver a una formulación más cercana al audit trail inglés: «Me diste la espalda de mis enemigos», con nota que explique el literal «nuca/cuello» y el valor idiomático.'
  spanish_quality_summary: La redacción actual es comprensible solo con esfuerzo, pero no es natural en español general. «Pusiste a mis enemigos la espalda» es una construcción poco idiomática. «Me diste la espalda de mis enemigos» suena algo marcado, pero es más fiel al hebreo y legible con la nota. La segunda cola, «a los que me odiaban, los destruí», es correcta; mejor fluye como «destruí a los que me odiaban».
  glossary_alignment: 'No hay conflictos con la terminología base del proyecto. Las decisiones léxicas principales son adecuadas: «enemigos», «odiaban», «destruí». El principal ajuste es metodológico: mantener mejor el eje del inglés POB revisado («gave me the backs...») sin crear una construcción española artificiosa.'
  issues:
  - severity: high
    issue: Construcción española antinatural en «Tú pusiste a mis enemigos la espalda»
    rationale: Aunque intenta expresar el modismo de derrota, en español no funciona como oración natural ni preserva limpiamente la relación sintáctica del hebreo «diste a mí espalda/nuca». Puede confundir al lector sobre quién vuelve la espalda a quién.
  - severity: medium
    issue: La nota al pie no corresponde del todo a la redacción principal
    rationale: La nota habla de «pusiste ... la nuca/espalda», pero el problema no es solo léxico sino la construcción entera. Debe explicarse que el hebreo dice literalmente «me diste la nuca/el cuello de mis enemigos» o similar, como modismo de derrota/huida.
  - severity: low
    issue: Orden menos fluido en la segunda cláusula
    rationale: «A los que me odiaban, los destruí» es válido, pero «destruí a los que me odiaban» suena más natural en español moderno y mantiene el énfasis suficiente.
  revised_spanish_text: Me diste la espalda[a] de mis enemigos; destruí a los que me odiaban.
