translation:
  language: es
  text: Los que comen su comida[a] lo quebrantarán[b], y su ejército será barrido[c], y caerán muchos muertos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «los que comen el pan de su mesa», un modismo para allegados o dependientes cercanos que lo traicionan desde dentro.'
    reason: lexical_alternative
  - marker: b
    text: 'Lit.: «lo romperán»; el hebreo usa una expresión figurada para indicar su ruina.'
    reason: lexical_alternative
  - marker: c
    text: 'El verbo evoca una imagen de inundación: «su ejército desbordará / será barrido».'
    reason: lexical_alternative
lexical_decisions:
- source_word: אֹכְלֵי פַת בָּגוֹ
  english_pob_choice: those who eat his food
  chosen_spanish: los que comen su pan
  alternatives_spanish:
  - los que comen de su mesa
  - los que comen su comida
  - los que comen el pan de su mesa
  lexicon: HALOT
  rationale: El hebreo expresa una relación de mesa/provisión íntima. «Su pan» conserva la imagen idiomática sin forzar una expansión explicativa; en español suena natural y deja abierta la idea de dependientes o allegados de la corte.
- source_word: יִשְׁבְּרֻהוּ
  english_pob_choice: will break him
  chosen_spanish: lo quebrantarán
  alternatives_spanish:
  - lo romperán
  - lo destruirán
  - lo arruinarán
  lexicon: HALOT
  rationale: שׁבר mantiene un verbo de ruptura y puede ser figurado. «Quebrantar» preserva la metáfora del hebreo y comunica bien la ruina causada por traición, sin sustituirla por una interpretación más explícita.
- source_word: חֵילוֹ
  english_pob_choice: his army
  chosen_spanish: su ejército
  alternatives_spanish:
  - su fuerza
  - sus tropas
  - su poder militar
  lexicon: HALOT
  rationale: En este contexto bélico, חַיִל se refiere claramente a la fuerza militar. «Ejército» es la equivalencia más clara y natural en español.
- source_word: יִשְׁטוֹף
  english_pob_choice: will be swept away
  chosen_spanish: será arrasado
  alternatives_spanish:
  - será arrollado
  - será inundado
  - será barrido
  lexicon: HALOT
  rationale: El verbo hebreo sugiere desbordamiento o inundación. «Será arrasado» transmite bien la idea de un avance devastador que deja sin resistencia, sin perder del todo la imagen de arrastre/derrumbe.
- source_word: וְנָפְלוּ חֲלָלִים רַבִּים
  english_pob_choice: and many slain will fall
  chosen_spanish: y caerán muchos muertos
  alternatives_spanish:
  - y caerán muchos caídos
  - y muchos caerán muertos
  - y caerán muchos abatidos
  lexicon: HALOT
  rationale: חֲלָלִים designa a los muertos de forma violenta. «Muchos muertos» conserva la contundencia del hebreo en una construcción española fluida; «caerán» mantiene el paralelismo con el verbo hebreo.
theological_decisions:
- issue: Imagen de traición interna y ruina del rey
  english_pob_reading: Close associates or dependents who betray him from within bring about his ruin.
  chosen_spanish_reading: Allegados de su mesa lo traicionan desde dentro y provocan su ruina.
  alternative_spanish_readings:
  - Sus servidores lo traicionan desde dentro
  - Los de su mesa lo quebrantan
  rationale: El hebreo usa una imagen de intimidad de mesa más que una descripción directa de cargos o funciones. La traducción principal conserva esa tensión sin explicarla en exceso en el texto.
  doctrine_reference: Daniel 11:26; cf. la nota léxica sobre el modismo de la mesa
translation_notes:
  revision_awareness: 'Se siguió de cerca el audit trail inglés: se preservó el modismo de mesa/provisión, el verbo figurado de ''quebrantar'' y la imagen hidráulica de שטף. No se introdujeron cambios textuales significativos respecto del análisis inglés; solo se ajustó la formulación para fluidez natural en español.'
  spanish_consistency_notes:
  - Se usó «Yahvé» como norma general solo cuando el texto lo requiera; este versículo no lo contiene.
  - Se mantuvo «lo quebrantarán» para conservar la metáfora verbal del hebreo.
  - «Su pan» funciona aquí como equivalente idiomático de la provisión compartida; la nota ofrece la expansión posible sin imponerla en el cuerpo del texto.
