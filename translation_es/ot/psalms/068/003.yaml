translation:
  language: es
  text: Como se desvanece el humo[a], así tú los ahuyentas; como la cera se derrite ante el fuego[b][c], así los impíos perecen ante Dios.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'lo dispersas' o 'lo soplas lejos'; el verbo hebreo puede abarcar la idea de ser ahuyentado, dispersado o llevado por el viento.
    reason: lexical_alternative
  - marker: b
    text: La expresión hebrea literalmente dice 'de delante de' tanto aquí como en 'ante Dios'; es un giro idiomático que puede significar en presencia de o por causa de la presencia de.
    reason: lexical_alternative
  - marker: c
    text: Los verbos hebreos también pueden entenderse con matiz futuro ('ahuyentarás ... perecerán') o deseativo ('que ahuyentes ... que perezcan'), pero el presente poético conserva mejor el flujo del verso.
    reason: alternative_reading
lexical_decisions:
- source_word: כְּ/הִנְדֹּף
  english_pob_choice: As ... is driven away
  chosen_spanish: Como ... es dispersado
  alternatives_spanish:
  - Como ... es ahuyentado
  - Así como ... es llevado lejos
  lexicon: HALOT
  rationale: El prefijo comparativo כ y el infinitivo constructo de נדף expresan comparación. En español, 'es dispersado' conserva la imagen de alejamiento/expulsión y mantiene el paralelismo verbal con la segunda mitad del verso. 'Dispersado' también recoge el rango semántico documentado por la nota inglesa (driven away / scattered / blown away).
- source_word: עָשָׁן
  english_pob_choice: smoke
  chosen_spanish: humo
  alternatives_spanish:
  - humo espeso
  - vapor de humo
  lexicon: HALOT
  rationale: Sentido léxico estándar. 'Humo' es la equivalencia natural y fiel en español.
- source_word: תִּנְדֹּף
  english_pob_choice: you drive them away
  chosen_spanish: tú los dispersas
  alternatives_spanish:
  - tú los ahuyentas
  - tú los llevas lejos
  lexicon: HALOT
  rationale: El imperfecto qal 2ms de נדף se dirige a Dios. 'Los dispersas' preserva la acción sobre un objeto plural, en línea con la revisión inglesa más reciente ('them'), y suena natural en el símil poético español. 'Ahuyentas' es posible, pero 'dispersas' mantiene mejor el vínculo léxico con la primera cola.
- source_word: כְּ/הִמֵּס
  english_pob_choice: as ... melts
  chosen_spanish: como ... se derrite
  alternatives_spanish:
  - como ... se funde
  - como ... se derrite al contacto
  lexicon: HALOT
  rationale: El infinitivo constructo con כ introduce comparación. 'Se derrite' es la forma más natural y transparente en español para la imagen de la cera ante el fuego.
- source_word: דּוֹנַג
  english_pob_choice: wax
  chosen_spanish: cera
  alternatives_spanish:
  - cera de abeja
  - wax
  lexicon: HALOT
  rationale: El sustantivo designa cera. 'Cera' es el equivalente directo y no requiere especificación adicional.
- source_word: מִ/פְּנֵי אֵשׁ
  english_pob_choice: before fire
  chosen_spanish: ante el fuego
  alternatives_spanish:
  - delante del fuego
  - en presencia del fuego
  lexicon: HALOT
  rationale: La expresión idiomática literalmente significa 'de delante de / en presencia de'. 'Ante el fuego' conserva la fuerza espacial del hebreo y suena más natural que una calca más pesada como 'desde delante de'. A la vez, refleja la relación de exposición que causa el derretimiento.
- source_word: יֹאבְדוּ
  english_pob_choice: perish
  chosen_spanish: perecen
  alternatives_spanish:
  - perecerán
  - son destruidos
  lexicon: HALOT
  rationale: El qal imperfecto 3mp de אבד puede ser futuro, gnómico o modal. 'Perecen' reproduce bien el valor presentativo/genericidad poética que la auditoría inglesa privilegia, sin fijar indebidamente un futuro estricto.
- source_word: רְשָׁעִים
  english_pob_choice: the wicked
  chosen_spanish: los impíos
  alternatives_spanish:
  - los malvados
  - los malhechores
  lexicon: HALOT
  rationale: '''Los impíos'' es un equivalente bíblico claro y digno en español, y conserva el matiz moral/covenantal de רְשָׁעִים. ''Malvados'' sería más coloquial; ''impíos'' mejor para registro poético.'
- source_word: מִ/פְּנֵי אֱלֹהִים
  english_pob_choice: before God
  chosen_spanish: ante Dios
  alternatives_spanish:
  - delante de Dios
  - en presencia de Dios
  lexicon: HALOT
  rationale: La idiomática מִפְּנֵי indica literalmente 'de delante de / en la presencia de'. 'Ante Dios' es la equivalencia española más natural y mantiene la imagen de la presencia divina como la causa del perecer.
theological_decisions:
- issue: Fuerza verbal de los imperfectos hebreos en el paralelismo poético
  english_pob_reading: 'Present-generic: ''you drive ... the wicked perish'''
  chosen_spanish_reading: 'Presente poético/genericidad: ''tú los dispersas ... los impíos perecen'''
  alternative_spanish_readings:
  - 'Futuro: ''tú los dispersarás ... los impíos perecerán'''
  - 'Deseativo/jussivo: ''que tú los disperses ... que los impíos perezcan'''
  rationale: El hebreo permite matiz futuro, habitual o modal. En español, el presente poético reproduce mejor el efecto proverbial y la vivacidad del símil, sin cargar el verso con una modalidad imprecatoria más fuerte de la que exige la forma aislada.
  doctrine_reference: Preservar la tensión teológica sin resolverla de manera excesiva
- issue: Relación entre la presencia de Dios y la desaparición de los impíos
  english_pob_reading: '''perish before God'' as idiom of being in the face/presence of God'
  chosen_spanish_reading: '''perecen ante Dios'''
  alternative_spanish_readings:
  - '''perecen en presencia de Dios'''
  - '''perecen delante de Dios'''
  rationale: La frase mantiene el valor idiomático de exposición ante la presencia divina, que es el punto teológico del paralelismo. 'Ante Dios' es breve y fiel, y evita explicar en exceso el giro hebreo.
  doctrine_reference: La presencia de Dios como juicio implícito en el poema
- issue: Correspondencia entre el singular colectivo del símil y el objeto plural del verbo
  english_pob_reading: Revised to 'them' to reflect the plural implied by 'the wicked'
  chosen_spanish_reading: 'Plural explícito: ''tú los dispersas'''
  alternative_spanish_readings:
  - 'Singular colectivo: ''tú lo dispersas'''
  rationale: El hebreo comienza con 'humo' en singular, pero la segunda cola y la revisión inglesa señalan un objeto plural implícito que remite a los impíos. El español debe hacer visible esa transición para evitar ambigüedad innecesaria.
  doctrine_reference: Atender a la cohesión poética del paralelismo
translation_notes:
  revision_awareness: Tomé en cuenta la revisión inglesa más reciente que cambió el objeto de 'it' a 'them' para reflejar el plural implícito de 'the wicked'. También integré la auditoría que reconoce la posibilidad de lectura futura o desiderativa de los imperfectos, pero mantuve el presente poético por optimal-equivalence.
  spanish_consistency_notes:
  - Usé 'Yahvé' no porque aparezca explícitamente aquí, sino para mantener la terminología POB cuando corresponda; en este verso el referente es 'Dios', así que no fue necesario introducirlo.
  - Elegí 'impíos' para רְשָׁעִים por su registro bíblico estable y su adecuación al tono poético.
  - Mantuve 'ante Dios' y 'ante el fuego' como equivalentes breves de מִפְּנֵי, evitando una calca pesada pero sin perder la imagen de presencia.
  - Conservé el presente poético para reflejar el valor gnómico del hebreo y la decisión auditada en inglés.
