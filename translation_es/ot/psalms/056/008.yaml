translation:
  language: es
  text: Por causa de la iniquidad[a], no los dejes escapar; con ira, derriba a los pueblos[b], Oh, Dios.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, «Por la iniquidad, no los rescates»; la cláusula hebrea es difícil, y algunos entienden el verbo más directamente como «librar/rescatar» en lugar de «dejar escapar».
    reason: alternative_reading
  - marker: b
    text: O, «las naciones».
    reason: lexical_alternative
lexical_decisions:
- source_word: עַל
  english_pob_choice: Because of
  chosen_spanish: Por causa de
  alternatives_spanish:
  - Por
  - A causa de
  - Por motivo de
  lexicon: HALOT
  rationale: La preposición עַל aquí introduce la causa de la petición, no un sentido espacial. «Por causa de» conserva con naturalidad el valor causal que el inglés POB expresó con «Because of».
- source_word: אָוֶן
  english_pob_choice: iniquity
  chosen_spanish: iniquidad
  alternatives_spanish:
  - maldad
  - maldad culpable
  - maldad e iniquidad
  lexicon: HALOT
  rationale: אָוֶן suele cargar con sentido moral de perversidad o culpa. «Iniquidad» mantiene el peso jurídico-moral del término y corresponde bien al registro del salmo imprecatorio.
- source_word: פַּלֶּט
  english_pob_choice: do not let them escape
  chosen_spanish: no los dejes escapar
  alternatives_spanish:
  - no los libres
  - no los rescates
  - que no escapen
  lexicon: HALOT
  rationale: El verbo puede tener valor de librar/escapar, y el contexto exige una súplica negativa. «No los dejes escapar» conserva la tensión interpretativa del hebreo sin resolverla de manera demasiado cerrada.
- source_word: בְּאַף
  english_pob_choice: in anger
  chosen_spanish: en tu ira
  alternatives_spanish:
  - en ira
  - con ira
  - en indignación
  lexicon: HALOT
  rationale: Aunque el hebreo no explicita el posesivo, la dirección de la oración a Dios hace explícito el referente implícito. «En tu ira» es más claro en español sin cambiar el sentido básico del idiom.
- source_word: עַמִּים
  english_pob_choice: the peoples
  chosen_spanish: los pueblos
  alternatives_spanish:
  - las naciones
  - los pueblos de las naciones
  - los pueblos
  lexicon: HALOT
  rationale: עַמִּים es plural de «pueblos». «Los pueblos» preserva la distinción léxica y evita sustituirlo por una forma más interpretativa como «naciones».
- source_word: הוֹרֵד
  english_pob_choice: bring down
  chosen_spanish: derriba
  alternatives_spanish:
  - haz caer
  - humilla
  - haz descender
  lexicon: HALOT
  rationale: El causativo de ירד comunica hacer bajar, abatir. «Derriba» expresa bien la imagen de abatimiento y funciona con fuerza en español imperativo oracional.
- source_word: אֱלֹהִים
  english_pob_choice: O God
  chosen_spanish: oh Dios
  alternatives_spanish:
  - Dios
  - ¡oh, Dios!
  lexicon: HALOT
  rationale: Se trata de un vocativo final. «Oh Dios» hace explícita la apelación directa, como en el inglés POB, y encaja con la puntuación española.
theological_decisions:
- issue: Cláusula hebrea difícil con posible lectura alternativa de פַּלֶּט
  english_pob_reading: The verse is a plea that the wicked not escape because of their iniquity, followed by a request that God bring down the peoples in anger.
  chosen_spanish_reading: El versículo queda como una súplica para que los culpables no escapen por causa de su iniquidad, seguida de la petición de que Dios derribe a los pueblos en su ira.
  alternative_spanish_readings:
  - Por causa de la iniquidad, líbralos no; en tu ira, derriba a los pueblos, oh Dios.
  - Por la iniquidad, que no escapen; en tu ira, derriba a los pueblos, oh Dios.
  rationale: El hebreo es comprimido y admite más de una constricción sintáctica. La redacción principal mantiene la lectura imprecatoria que mejor encaja con el contexto del salmo, sin borrar la posibilidad alternativa que el propio audit trail inglés preserva.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it'
- issue: Uso de lenguaje imprecatorio en español
  english_pob_reading: An imprecatory petition asking for judgment on hostile peoples.
  chosen_spanish_reading: Una petición de juicio contra los pueblos hostiles, expresada sin suavizar la fuerza del ruego.
  alternative_spanish_readings:
  - Una petición de castigo contra los enemigos.
  - Una oración pidiendo que los adversarios no escapen.
  rationale: No se atenúa la fuerza del salmo; se conserva el tono de juicio pedido a Dios, que es parte del sentido del texto y de su género.
  doctrine_reference: Psalmic imprecation and judgment language
translation_notes:
  revision_awareness: 'Se revisó a la luz del pasaje hebreo y del audit trail inglés: la cláusula inicial permanece deliberadamente ambigua, el verbo פַּלֶּט se deja en una solución española que conserve la tensión entre «escapar» y «rescatar/librar», y עַמִּים se mantiene como «los pueblos» con nota alternativa para «las naciones». No se adoptó la máscara litúrgica «SEÑOR» para אֱלֹהִים; se mantuvo «Dios» por ser vocativo final.'
  spanish_consistency_notes:
  - Se usa «Dios» para אֱלֹהִים y «oh Dios» en vocativo.
  - Se mantiene el tono imprecatorio sin suavizarlo.
  - «Iniquidad» se usa como término moral-jurídico consistente con el POB en inglés.
  - «Pueblos» se conserva para עַמִּים; la alternativa «naciones» queda en nota.
  - La redacción evita calcos innecesarios y permanece publicable en español bíblico moderno.
