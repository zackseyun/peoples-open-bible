base_translation:
  language: en
  yaml_path: translation/ot/isaiah/043/009.yaml
  text: Let all the nations be gathered together[a], and let the peoples be assembled. Who among them can declare this and make the former things heard? Let them present their witnesses, that they may be justified; and let them hear and say[b], “It is true.”
  footnotes:
  - marker: a
    text: Or “the first things.” In Isaiah, “former things” often refers to earlier acts or prior declarations that demonstrate the Lord’s sovereignty.
    reason: lexical_alternative
  - marker: b
    text: Or “that they may be justified” / “that they may be in the right.” The Hebrew has a forensic sense in this courtroom setting.
    reason: alternative_reading
