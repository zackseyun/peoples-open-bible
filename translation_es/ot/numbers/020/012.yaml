    text: 'Hebreo: «los hijos de Israel».'
    reason: lexical_alternative
  revision_rationale: Se eliminó la nota innecesaria sobre «Aarón»; se cambió «Por cuanto» por «Porque» para un español más natural; «para santificarme» pasó a «para tratarme como santo» para reflejar mejor el sentido documentado de לְהַקְדִּישֵׁנִי; «delante de los ojos de» se simplificó a «ante los ojos de»; y «no introducirán a esta asamblea» se corrigió a «no harán entrar a esta asamblea», que representa mejor el causativo hebreo y suena más idiomático en español.
