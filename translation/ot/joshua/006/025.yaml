id: JOS.6.25
reference: Joshua 6:25
source:
  edition: WLC
  text: וְֽ/אֶת רָחָ֣ב הַ֠/זּוֹנָה וְ/אֶת בֵּ֨ית אָבִ֤י/הָ וְ/אֶת כָּל אֲשֶׁר לָ/הּ֙ הֶחֱיָ֣ה יְהוֹשֻׁ֔עַ וַ/תֵּ֨שֶׁב֙ בְּ/קֶ֣רֶב יִשְׂרָאֵ֔ל עַ֖ד הַ/יּ֣וֹם הַ/זֶּ֑ה כִּ֤י הֶחְבִּ֨יאָה֙ אֶת הַ/מַּלְאָכִ֔ים אֲשֶׁר שָׁלַ֥ח יְהוֹשֻׁ֖עַ לְ/רַגֵּ֥ל אֶת יְרִיחֽוֹ־־־־־־־־׃פ
translation:
  text: But Joshua kept Rahab the prostitute alive[a], along with her father's household and all that belonged to her, and she has lived in the midst of Israel to this day[b], because she hid the messengers whom Joshua sent to spy out Jericho.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the harlot.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'the messengers'; that is, the men Joshua sent to spy out Jericho.
    reason: lexical_alternative
lexical_decisions:
- source_word: הַזּוֹנָה
  chosen: the prostitute
  alternatives:
  - the harlot
  lexicon: HALOT
  rationale: זוֹנָה denotes a woman engaged in prostitution. 'Prostitute' is clear modern English; 'harlot' is traditional but archaic.
- source_word: בֵּית אָבִיהָ
  chosen: her father’s household
  alternatives:
  - her father’s house
  - her family
  lexicon: HALOT
  rationale: The construct phrase literally means 'house of her father,' but in context refers to the household/family unit under her father, not merely the building.
- source_word: כָּל אֲשֶׁר לָהּ
  chosen: all that belonged to her
  alternatives:
  - all that she had
  - all who belonged to her
  lexicon: HALOT
  rationale: The phrase is broad and includes possessions and dependents. 'All that belonged to her' preserves the comprehensive sense without over-specifying persons only.
- source_word: הֶחֱיָה
  chosen: kept ... alive
  alternatives:
  - spared
  - let live
  - preserved alive
  lexicon: HALOT
  rationale: The Hiphil of חיה means to keep alive or let live. 'Kept alive' preserves the causative nuance better than the more interpretive 'spared,' while remaining natural in English.
- source_word: וַתֵּשֶׁב
  chosen: she has lived
  alternatives:
  - she lived
  - she dwelt
  - she settled
  lexicon: HALOT
  rationale: With the following 'to this day,' the verb indicates a state continuing from the past to the narrator's present. English present perfect best captures this ongoing-result sense.
- source_word: בְּקֶרֶב יִשְׂרָאֵל
  chosen: in the midst of Israel
  alternatives:
  - among Israel
  - among the Israelites
  lexicon: HALOT
  rationale: '''In the midst of Israel'' closely reflects the Hebrew idiom and conveys incorporation within the Israelite community. ''Among the Israelites'' is possible but slightly more interpretive.'
- source_word: עַד הַיּוֹם הַזֶּה
  chosen: to this day
  alternatives:
  - until this day
  lexicon: HALOT
  rationale: This is the standard idiomatic rendering for the Hebrew temporal expression marking continuation to the narrator's present.
- source_word: הֶחְבִּיאָה
  chosen: hid
  alternatives:
  - brought in secretly
  - concealed
  lexicon: HALOT
  rationale: The Hiphil of חבא here means to hide/conceal. 'Hid' is the most direct and idiomatic rendering in context.
- source_word: הַמַּלְאָכִים
  chosen: the messengers
  alternatives:
  - the spies
  lexicon: HALOT
  rationale: מַלְאָכִים normally means 'messengers.' Although these men functioned as spies, the text here uses the broader term, so 'messengers' preserves the lexical choice while the following infinitive clarifies their mission.
- source_word: לְרַגֵּל
  chosen: to spy out
  alternatives:
  - to explore
  - to reconnoiter
  lexicon: HALOT
  rationale: The verb רגל in this context refers to reconnaissance or spying. 'To spy out' is the standard and clear rendering.
