translation:
  language: es
  text: Porque el día de venganza estaba en mi corazón, y el año de mis redimidos[a] había llegado.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «el año de mi redención había llegado». El hebreo puede entenderse como referencia al tiempo de la acción redentora del hablante o al tiempo correspondiente a aquellos a quienes él redime.
    reason: alternative_reading
lexical_decisions:
- source_word: כִּי
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  lexicon: HALOT
  rationale: La partícula introduce la razón o explicación del enunciado previo. «Porque» conserva bien esa fuerza causal/explanatoria en español y es natural en un registro bíblico moderno.
- source_word: יוֹם
  english_pob_choice: day
  chosen_spanish: día
  alternatives_spanish:
  - tiempo
  - momento
  lexicon: HALOT
  rationale: Se mantiene el sustantivo concreto «día», como en el inglés POB, para no diluir la imagen hebrea de un tiempo fijado e निर्णante.
- source_word: נָקָם
  english_pob_choice: vengeance
  chosen_spanish: venganza
  alternatives_spanish:
  - retribución
  - desquite
  lexicon: HALOT
  rationale: «Venganza» es el equivalente nominal más directo y conserva el sentido judicial y punitivo del término, sin suavizarlo.
- source_word: בְּלִבִּי
  english_pob_choice: in my heart
  chosen_spanish: en mi corazón
  alternatives_spanish:
  - en mi mente
  - dentro de mí
  lexicon: HALOT
  rationale: La metáfora antropológica hebrea se preserva de modo natural con «en mi corazón», que comunica intención interior o resolución sin restringirla a la mera cognición.
- source_word: וּשְׁנַת
  english_pob_choice: and the year of
  chosen_spanish: y el año de
  alternatives_spanish:
  - y un año de
  lexicon: HALOT
  rationale: La construcción en estado constructo se refleja con «el año de», manteniendo la relación sintáctica y el paralelismo con «el día de».
- source_word: גְּאוּלַי
  english_pob_choice: my redeemed
  chosen_spanish: mis redimidos
  alternatives_spanish:
  - mi redención
  - los que he redimido
  lexicon: HALOT
  rationale: 'Sigo la revisión inglesa más reciente y traduzco el plural personal implícito como un sustantivo de personas: «mis redimidos». Esto conserva la posibilidad señalada por el audit trail y evita convertirlo en un abstracto que desdibuje el referente humano.'
- source_word: בָּאָה
  english_pob_choice: had come
  chosen_spanish: había llegado
  alternatives_spanish:
  - había venido
  - había llegado ya
  lexicon: HALOT
  rationale: El pretérito perfecto compuesto de pluscuamperfecto en español expresa bien que el tiempo señalado ya se había alcanzado desde la perspectiva del habla profética.
theological_decisions:
- issue: Tensión entre juicio y redención en la frase paralela
  english_pob_reading: The day of vengeance ... and the year of my redeemed ...
  chosen_spanish_reading: el día de venganza ... y el año de mis redimidos ...
  alternative_spanish_readings:
  - el año de mi redención
  - el año de los que yo redimo
  rationale: Se conserva la pareja retórica juicio/redención sin resolverla en una sola idea. «Mis redimidos» mantiene el posible referente personal que el audit trail de la POB considera más probable en la revisión más reciente, a la vez que respeta la tensión teológica entre castigo y salvación.
  doctrine_reference: 'Translation philosophy §3: preservar la tensión teológica en lugar de resolverla.'
translation_notes:
  revision_awareness: El auditrayo inglés muestra una revisión reciente que cambió de un sentido abstracto («my redemption») a uno personal plural («my redeemed»). La redacción española sigue esa revisión y la hace explícita con «mis redimidos», sin perder la posibilidad alternativa indicada en la nota.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» solo donde el texto fuente lo exija explícitamente; este versículo no lo contiene.
  - Se prefirió «venganza» por fuerza léxica directa, en lugar de atenuar con «retribución».
  - La nota al pie preserva la ambigüedad documental del hebreo sin introducir una interpretación dogmática cerrada.
  - La puntuación sigue el orden y paralelismo del hebreo y del inglés POB, con estilo español natural.
