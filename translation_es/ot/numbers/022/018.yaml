revisions:
- from: 'Balaam respondió y dijo a los siervos[a] de Balac: «Si Balac me diera su casa llena de plata y oro, no podría pasar por encima de la palabra de Yahvé mi Dios[b], para hacer algo pequeño o grande».'
  to: 'Balaam respondió y dijo a los siervos[a] de Balac: «Si Balac me diera su casa llena de plata y oro, no podría ir más allá de la palabra de Yahvé mi Dios[b], para hacer algo pequeño o grande»'
  rationale: Se ajusta el modismo principal a un español más natural («ir más allá de») sin perder la relación con el hebreo. También se afinan las notas para reflejar mejor el audit trail inglés y evitar una alternativa contextual innecesariamente moderna.
