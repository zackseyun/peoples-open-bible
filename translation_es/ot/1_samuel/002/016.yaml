  - severity: medium
    issue: El contenido de la nota española no preserva la rationale léxica auditada.
    rationale: La nota actual habla de «lo que tu alma desee/desea», pero el expediente inglés conserva como alternativa literal «Let them surely burn...». Eso debe mantenerse para fidelidad editorial.
  - severity: low
    issue: «Dejen primero que quemen» es correcto pero algo menos natural que una orden directa en español.
    rationale: «Que primero quemen la grasa hoy» suena más idiomático en diálogo narrativo bíblico y conserva igual sentido imperativo-prioritario.
