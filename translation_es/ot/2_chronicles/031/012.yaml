translation:
  language: es
  text: Trajeron la contribución, el diezmo y las cosas santas[a] fielmente, y Conanías el levita estaba a cargo de ellos,[b] con su hermano Simei como segundo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘las cosas consagradas’.
    reason: lexical_alternative
  - marker: b
    text: O ‘Simei su hermano era segundo en mando’.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּבִיאוּ
  english_pob_choice: They brought in
  chosen_spanish: Trajeron
  alternatives_spanish:
  - Trajeron adentro
  - Ingresaron
  lexicon: HALOT
  rationale: El verbo hebreo expresa ‘traer’; en este contexto administrativo del templo, el español natural es ‘trajeron’, sin añadir más de lo que el verbo exige. No es necesario explicitar ‘adentro’ en la línea principal.
- source_word: הַתְּרוּמָה
  english_pob_choice: the contribution
  chosen_spanish: la contribución
  alternatives_spanish:
  - la ofrenda
  - la ofrenda alzada
  lexicon: HALOT
  rationale: ‘Contribución’ comunica bien una porción apartada para uso sagrado y sigue la decisión del POB en inglés. ‘Ofrenda’ sería posible, pero en español puede sonar más genérico o cultual que administrativo.
- source_word: הַמַּעֲשֵׂר
  english_pob_choice: the tithe
  chosen_spanish: el diezmo
  alternatives_spanish:
  - la décima parte
  lexicon: HALOT
  rationale: ‘Diezmo’ es el equivalente establecido en español bíblico y transmite con precisión el impuesto/sacrificio del diez por ciento.
- source_word: הַקֳּדָשִׁים
  english_pob_choice: the holy things
  chosen_spanish: las cosas santas
  alternatives_spanish:
  - las cosas consagradas
  - los objetos santos
  lexicon: HALOT
  rationale: El plural hebreo puede referirse a objetos apartados para uso sagrado. ‘Cosas santas’ mantiene la literalidad y la amplitud semántica sin decidir de más entre ‘santas’ y ‘consagradas’.
- source_word: בֶּאֱמוּנָה
  english_pob_choice: faithfully
  chosen_spanish: fielmente
  alternatives_spanish:
  - con fidelidad
  - de manera fiel
  lexicon: HALOT
  rationale: En un contexto de administración, אֱמוּנָה implica confiabilidad y lealtad. ‘Fielmente’ preserva ese matiz con un adverbio natural en español.
- source_word: וַעֲלֵיהֶם
  english_pob_choice: over them
  chosen_spanish: sobre ellos
  alternatives_spanish:
  - a cargo de ellos
  - encargado de ellos
  lexicon: HALOT
  rationale: La preposición hebrea indica supervisión/autoridad sobre los bienes mencionados. ‘Sobre ellos’ sigue de cerca el original; la idea de cargo queda contextualizada por el resto de la frase.
- source_word: נָגִיד
  english_pob_choice: chief
  chosen_spanish: el principal
  alternatives_spanish:
  - el jefe
  - el dirigente
  - el gobernador
  lexicon: HALOT
  rationale: ‘Principal’ comunica prioridad o rango superior en forma sobria y evita ‘jefe’ o ‘gobernador’, que pueden sonar demasiado modernos o a otro ámbito. Mantiene la función de supervisión administrativa.
- source_word: כונניהו
  english_pob_choice: Conaniah
  chosen_spanish: Conanías
  alternatives_spanish:
  - Conaniyá
  lexicon: standard transliteration
  rationale: Se usa la transliteración bíblica española habitual ‘Conanías’, transparente y reconocible para lectores en español.
- source_word: הַלֵּוִי
  english_pob_choice: the Levite
  chosen_spanish: el levita
  alternatives_spanish:
  - el levita
  lexicon: HALOT
  rationale: El artículo hebreo identifica a Conanías por su condición tribal/ministerial. ‘El levita’ es el equivalente natural en español.
- source_word: אָחִיהוּ
  english_pob_choice: his brother
  chosen_spanish: su hermano
  alternatives_spanish:
  - su pariente
  lexicon: HALOT
  rationale: אָח normalmente significa ‘hermano’ literal; no hay indicio suficiente para debilitarlo a ‘pariente’.
- source_word: מִשְׁנֶה
  english_pob_choice: second
  chosen_spanish: el segundo
  alternatives_spanish:
  - segundo en mando
  - el segundo en mando
  - el segundo cargo
  lexicon: HALOT
  rationale: ‘El segundo’ sigue de cerca el hebreo y deja abierta la relación jerárquica, como en el inglés POB. En español, el antecedente queda claro por el contexto de autoridad.
translation_notes:
  revision_awareness: 'Se revisó la concordancia con el texto hebreo y el audit trail en inglés. La redacción española mantiene la secuencia de objetos: contribución, diezmo y cosas santas; conserva el adverbio de fidelidad; y refleja la estructura de autoridad con ‘el principal sobre ellos’ y ‘el segundo’. No se detectaron cambios necesarios respecto al último pase de revisión, por lo que la versión sigue el acuerdo alto con el original y con la traducción auditada.'
  spanish_consistency_notes:
  - Se emplea ‘Conanías’ como forma española estándar del nombre propio.
  - Se mantiene ‘levita’ con artículo definido, conforme al hebreo.
  - ‘Las cosas santas’ conserva la posible tensión entre ‘santas’ y ‘consagradas’; se documenta en nota.
  - ‘El segundo’ se deja breve para reflejar la forma hebrea; la alternativa explicita el cargo jerárquico.
  - La puntuación separa las dos cláusulas principales con punto y coma para reflejar la coordinación del hebreo sin sobrecargar la sintaxis.
