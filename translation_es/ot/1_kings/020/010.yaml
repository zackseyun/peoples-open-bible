translation:
  language: es
  text: 'Ben-hadad le envió a decir y dijo: «Que los dioses hagan así conmigo, y aun más, si el polvo de Samaria basta para puñados para todo el pueblo que está a mis pies[a]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo literalmente: «si el polvo de Samaria bastara para puñados para todo el pueblo que está a mis pies». El modismo expresa que Samaria es tan pequeña que ni su polvo alcanzaría para un puñado por cada uno de sus hombres.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּשְׁלַח אֵלָיו
  english_pob_choice: sent to him
  chosen_spanish: le envió un mensaje
  alternatives_spanish:
  - le envió
  - le mandó decir
  lexicon: HALOT
  rationale: El hebreo permite una comunicación diplomática sin explicitar necesariamente mensajeros; en español, «le envió un mensaje» comunica con naturalidad el acto de enviar una comunicación sin añadir más de lo que el contexto exige.
- source_word: בֶּן הֲדַד
  english_pob_choice: Ben-hadad
  chosen_spanish: Ben-adad
  alternatives_spanish:
  - Ben-hadad
  lexicon: Convención onomástica
  rationale: Se translitera el nombre propio de forma transparente al español, manteniendo el referente histórico y la pronunciación amplia sin imponer adaptación teológica.
- source_word: כֹּה יַעֲשׂוּן לִי אֱלֹהִים וְכֹה יוֹסִפוּ
  english_pob_choice: May the gods do so to me, and more also
  chosen_spanish: Que los dioses[a] hagan así conmigo, y aun más
  alternatives_spanish:
  - Que los dioses me hagan así, y aun más
  - Así me hagan los dioses, y aun más
  lexicon: HALOT
  rationale: Se conserva la fórmula de juramento/maldición con el plural «dioses», porque el hablante es un rey pagano; «que... hagan así conmigo» reproduce la fuerza imprecatoria sin volverla paráfrasis libre. «Y aun más» mantiene la continuación formulaica de וְכֹה יוֹסִפוּ.
- source_word: אִם
  english_pob_choice: if
  chosen_spanish: si
  alternatives_spanish:
  - si acaso
  - si es que
  lexicon: HALOT
  rationale: En contexto de juramento, «si» conserva la superficie del hebreo y deja que la fórmula maldicional lleve el sentido elíptico.
- source_word: יִשְׂפֹּק
  english_pob_choice: will be enough
  chosen_spanish: basta
  alternatives_spanish:
  - será suficiente
  - alcanzará
  lexicon: HALOT
  rationale: El verbo expresa suficiencia; «basta» es idiomático en español y preserva la idea de que aun la cantidad mínima no alcanzaría.
- source_word: עֲפַר שֹׁמְרוֹן
  english_pob_choice: the dust of Samaria
  chosen_spanish: el polvo de Samaria
  alternatives_spanish:
  - el polvo de Samaria
  - el polvo samaritano
  lexicon: HALOT
  rationale: Se mantiene la relación constructa de pertenencia con un genitivo simple y natural en español.
- source_word: לִשְׁעָלִים
  english_pob_choice: for handfuls
  chosen_spanish: para puñados
  alternatives_spanish:
  - para manos llenas
  - para hollos de la mano
  lexicon: HALOT
  rationale: El contexto exige la idea de porciones pequeñas e insuficientes; «puñados» expresa bien la medida y evita una asociación errónea con animales.
- source_word: לְכָל הָעָם אֲשֶׁר בְּרַגְלָי
  english_pob_choice: for all the people who are at my feet
  chosen_spanish: para todo el pueblo que está a mis pies
  alternatives_spanish:
  - para toda la gente que está a mis pies
  - para todos mis hombres que están a mis pies
  lexicon: HALOT
  rationale: Se conserva la imagen hebrea de subordinación/acompañamiento con «a mis pies», siguiendo de cerca el auditable sentido idiomático del original.
theological_decisions:
- issue: אֱלֹהִים en boca de Ben-adad
  english_pob_reading: the gods
  chosen_spanish_reading: los dioses
  alternative_spanish_readings:
  - Dios
  rationale: El contexto narrativo y el hablante no israelita inclinan a leer אֱלֹהִים como referencia a deidades paganas. Traducir «los dioses» evita importar la referencia al Dios de Israel y preserva la tensión narrativa.
  doctrine_reference: Exégesis contextual del discurso pagano; no aplica una lectura monoteísta donde el texto no la exige.
translation_notes:
  revision_awareness: La redacción sigue la revisión más reciente del audit trail al conservar la literalidad final de la cláusula relacional («que está a mis pies») en lugar de una expansión interpretativa como «que me siguen». También mantiene el giro formulaico del juramento con el plural «dioses» y la suficiencia de יִשְׂפֹּק mediante «basta».
  spanish_consistency_notes:
  - Se usa «Ben-adad» como forma hispanizada del nombre propio, sin alterar el referente.
  - Se mantiene «los dioses» en plural por el contexto pagano; no se sustituye por «Dios».
  - «A mis pies» conserva el hebraísmo idiomático y la relación de subordinación implícita.
  - «Puñados» comunica la medida del original sin introducir una imagen extraña en español.
