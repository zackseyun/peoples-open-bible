translation:
  language: es
  text: 'No dejes que tu boca haga pecar a tu carne, ni digas delante del mensajero[a]: «Fue un error». ¿Por qué ha de enojarse Dios contra tu voz y destruir la obra de tus manos?'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «el ángel». El hebreo מַלְאָךְ puede referirse tanto a un mensajero humano como a un mensajero celestial.
    reason: alternative_reading
lexical_decisions:
- source_word: תִּתֵּן אֶת־פִּיךָ
  english_pob_choice: let your mouth
  chosen_spanish: dejes que tu boca
  alternatives_spanish:
  - permitas que tu boca
  - hagas hablar tu boca
  lexicon: HALOT
  rationale: El hebreo expresa una acción causativa sobre la boca; en español, «dejes que tu boca» conserva la fuerza permisiva/causativa sin un calco artificial como «des tu boca».
- source_word: לַחֲטִיא
  english_pob_choice: cause ... to sin
  chosen_spanish: haga pecar
  alternatives_spanish:
  - cause a pecar
  - lleve a pecar
  lexicon: HALOT
  rationale: El hifil de חטא es causativo. «Haga pecar» comunica bien la causalidad y mantiene el valor verbal sin sobreexplicar el mecanismo.
- source_word: בְּשָׂרֶךָ
  english_pob_choice: your flesh
  chosen_spanish: tu carne
  alternatives_spanish:
  - tu cuerpo
  - tú mismo
  lexicon: HALOT
  rationale: «Carne» conserva la literalidad hebrea y la resonancia concreta del texto. En este contexto puede referirse al ser encarnado, pero el español no requiere suavizarlo a «cuerpo».
- source_word: הַמַּלְאָךְ
  english_pob_choice: the messenger
  chosen_spanish: el mensajero
  alternatives_spanish:
  - el ángel
  - el enviado
  lexicon: HALOT
  rationale: מַלְאָךְ puede ser mensajero humano o ángel celestial. El contexto de votos y culto permite ambas lecturas; «mensajero» preserva la lectura principal del POB en inglés y deja abierta la tensión interpretativa.
- source_word: שְׁגָגָה
  english_pob_choice: a mistake
  chosen_spanish: un descuido
  alternatives_spanish:
  - un error
  - una falta involuntaria
  lexicon: HALOT
  rationale: Aunque la forma puede abarcar error o inadvertencia, «un descuido» suena natural en español y refleja la excusa de minimizar la culpa por lo dicho.
- source_word: קוֹלֶךָ
  english_pob_choice: your voice
  chosen_spanish: tu voz
  alternatives_spanish:
  - tus palabras
  - lo que dijiste
  lexicon: HALOT
  rationale: Se mantiene «voz» para conservar la imagen concreta del hebreo, aunque se refiere al acto de hablar o pronunciar el voto.
- source_word: וְחִבֵּל
  english_pob_choice: destroy
  chosen_spanish: destruir
  alternatives_spanish:
  - arruinar
  - estropear
  lexicon: HALOT
  rationale: El verbo transmite daño severo; «destruir» conserva la gravedad del juicio divino sobre la obra humana.
- source_word: מַעֲשֵׂה יָדֶיךָ
  english_pob_choice: the work of your hands
  chosen_spanish: la obra de tus manos
  alternatives_spanish:
  - el trabajo de tus manos
  - tu labor
  lexicon: HALOT
  rationale: La expresión idiomática se mantiene con una equivalencia muy cercana y natural en español, preservando el paralelismo y el tono sapiencial.
theological_decisions:
- issue: Identidad de הַמַּלְאָךְ en el contexto de voto
  english_pob_reading: the messenger
  chosen_spanish_reading: el mensajero
  alternative_spanish_readings:
  - el ángel
  rationale: La traducción principal evita resolver en exceso la ambigüedad del hebreo. «Mensajero» sigue siendo compatible con una figura humana de control cultual, mientras que «ángel» queda como posibilidad válida sin imponerla.
  doctrine_reference: Translation philosophy §3 (preserve theological tension rather than resolve it)
translation_notes:
  revision_awareness: El borrador sigue el consenso de alta concordancia del audit trail inglés y no requiere revisiones sustantivas; se preserva la ambigüedad de מַלְאָךְ mediante nota, y se mantiene una correspondencia cercana con la imagen hebrea de boca/carne/voz/obra de manos.
  spanish_consistency_notes:
  - Se usa «Yahvé» por defecto en este proyecto para el nombre divino, pero aquí el texto hebreo tiene אֱלֹהִים, así que corresponde «Dios».
  - Se mantiene un registro bíblico moderno y digno, evitando arcaísmos innecesarios.
  - «Carne» conserva la textura semántica del hebreo mejor que una paráfrasis como «cuerpo» o «persona».
