  glossary_alignment: No hay conflictos con la terminología base del proyecto. La transliteración «Ben-ammí» es aceptable en español por acentuación gráfica, y «amonitas» es una opción natural y fiel para בְנֵי עַמּוֹן, siempre que la nota literal se ancle a esa expresión y no al nombre propio.
