translation:
  language: es
  text: 'Y habló a Coré y a toda su congregación, diciendo: «Por la mañana Yahvé hará saber quién es suyo[a], y quién es santo, y lo hará acercarse a él. A quien él escoja[b], lo hará acercarse a él».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «quién le pertenece». El hebreo puede leerse más literalmente como «quién es suyo», con sentido de pertenencia de pacto.'
    reason: lexical_alternative
  - marker: b
    text: «Lo hará acercarse» conserva el lenguaje cultual de acceso autorizado a la presencia de Yahvé para servicio sagrado.
    reason: cultural_note
lexical_decisions:
- source_word: וַיְדַבֵּר
  english_pob_choice: And he spoke
  chosen_spanish: Y habló
  alternatives_spanish:
  - Y dijo
  lexicon: HALOT
  rationale: El verbo דבר aquí introduce discurso directo; «habló» mantiene el registro narrativo y distingue bien la fórmula de introducción a las palabras citadas.
- source_word: עֲדָתוֹ
  english_pob_choice: his congregation
  chosen_spanish: su congregación
  alternatives_spanish:
  - su asamblea
  - su compañía
  lexicon: HALOT
  rationale: עֵדָה designa un grupo reunido; «congregación» es natural en español bíblico y conserva el sentido comunitario del campamento israelita.
- source_word: בֹּקֶר
  english_pob_choice: In the morning
  chosen_spanish: Mañana
  alternatives_spanish:
  - Por la mañana
  lexicon: HALOT
  rationale: El sustantivo funciona adverbialmente. En español, «Mañana» es breve y fiel al valor temporal; «Por la mañana» sería más explicativo.
- source_word: וְיֹדַע יְהוָה
  english_pob_choice: the LORD will make known
  chosen_spanish: Yahvé hará saber
  alternatives_spanish:
  - Yahvé dará a conocer
  - Yahvé mostrará
  lexicon: HALOT
  rationale: Aunque ידע es literalmente «saber», en este contexto causativo con objeto directo y paralelismo forense/cultual expresa revelación pública. «Hará saber» conserva esa fuerza sin reducirlo a mero conocimiento interno.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  - el SEÑOR
  lexicon: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
  rationale: Se mantiene la transliteración española «Yahvé» conforme a la terminología del proyecto para el nombre divino, evitando la sustitución por un título.
- source_word: אֶת אֲשֶׁר ל֛וֹ
  english_pob_choice: who is his
  chosen_spanish: quién es suyo
  alternatives_spanish:
  - quién le pertenece
  - el que es de él
  lexicon: HALOT
  rationale: La frase posee un valor posesivo-covenantal. «Quién es suyo» preserva la brevedad y la pertenencia sin expandir innecesariamente el hebreo.
- source_word: הַקָּדוֹשׁ
  english_pob_choice: who is holy
  chosen_spanish: quién es santo
  alternatives_spanish:
  - el santo
  - el que es santo
  - quien está consagrado
  lexicon: HALOT
  rationale: El adjetivo se usa sustantivamente en paralelo con «quién es suyo». «Santo» mantiene la cualidad personal sin forzar una lectura nominalizada como título.
- source_word: וְהִקְרִיב אֵלָיו
  english_pob_choice: and will bring him near to himself
  chosen_spanish: y lo hará acercarse a él
  alternatives_spanish:
  - y lo acercará a sí
  - y lo presentará ante sí
  lexicon: HALOT
  rationale: קרב en hiphil conserva el matiz cultual de acceso autorizado. «Hará acercarse a él» refleja la dirección hacia Yahvé y sugiere la dimensión sacerdotal sin volverse demasiado técnica.
- source_word: אֲשֶׁר יִבְחַר בּוֹ
  english_pob_choice: The one whom he chooses
  chosen_spanish: Al que él escoja
  alternatives_spanish:
  - A quien él elija
  - El que él elija
  lexicon: HALOT
  rationale: בחר se traduce con «escoger» para un tono bíblico claro y directo. La construcción relativa se adapta al español con naturalidad.
- source_word: יַקְרִיב אֵלָיו
  english_pob_choice: he will bring near to himself
  chosen_spanish: lo hará acercarse a él
  alternatives_spanish:
  - lo acercará a sí
  - lo presentará ante sí
  lexicon: HALOT
  rationale: La repetición del verbo mantiene el paralelismo hebreo y refuerza el campo cultual de acceso acercado/presentado ante Dios.
theological_decisions:
- issue: Nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - el SEÑOR
  rationale: El texto hebreo contiene el Tetragrama. El proyecto pide reproducir el nombre divino en español con «Yahvé», no ocultarlo tras un título; se preserva así la referencia personal y de pacto.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Valor de וְיֹדַע יְהוָה
  english_pob_reading: the LORD will make known
  chosen_spanish_reading: Yahvé hará saber
  alternative_spanish_readings:
  - Yahvé conocerá
  - Yahvé mostrará
  rationale: Aunque la raíz ידע puede significar «conocer», aquí el contexto anuncia una demostración pública de quién pertenece a Yahvé. «Hará saber» mantiene esa lectura sin borrar la posible tensión entre conocer y manifestar.
  doctrine_reference: Notas léxicas de HALOT sobre ידע en contextos causativos/resultativos
- issue: Lenguaje cultual de קרב
  english_pob_reading: bring near to himself
  chosen_spanish_reading: lo hará acercarse a él
  alternative_spanish_readings:
  - lo acercará a sí
  - lo presentará ante sí
  rationale: El verbo tiene un trasfondo sacerdotal/cultual de acceso autorizado a la presencia divina. La traducción española conserva ese valor y evita reducirlo a cercanía emocional.
  doctrine_reference: Números 16 y el uso sacerdotal de קרב
- issue: Uso sustantivado de הַקָּדוֹשׁ
  english_pob_reading: who is holy
  chosen_spanish_reading: quién es santo
  alternative_spanish_readings:
  - el santo
  - el que es santo
  rationale: El hebreo presenta un adjetivo sustantivado en paralelismo. «Santo» mantiene la calificación personal y evita imponer un título que el contexto inmediato no exige.
  doctrine_reference: Paralelismo hebreo en Nm 16:5
translation_notes:
  revision_awareness: Se revisó el pasaje a la luz del texto hebreo y del audit trail en inglés. No se requirieron cambios sustanciales respecto de la solución óptima ya establecida; se mantuvieron el nombre divino «Yahvé», la lectura causativa de ידע como revelación pública y el lenguaje cultual de קרב.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» de forma consistente para יְהוָה.
  - «Congregación» preserva el valor colectivo de עֲדָה en contexto narrativo-islita.
  - «Hará saber» evita aplanar ידע a mero conocimiento interior.
  - La repetición de «lo hará acercarse a él» refleja el paralelismo del hebreo y el campo sacerdotal de acceso.
