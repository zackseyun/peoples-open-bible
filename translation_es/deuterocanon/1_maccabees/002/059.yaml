review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien el griego en la estructura general: los tres nombres, el participio πιστεύσαντες, el pasivo ἐσώθησαν y ἐκ φλογός. Sin embargo, no preserva del todo la decisión auditada del POB sobre los nombres: el inglés POB optó deliberadamente por las formas hebreas más reconocibles para identificar a los tres jóvenes de Daniel 3. En español, «Ananías» apunta más naturalmente a la forma griega que a la identificación canónica más reconocible; «Hananías» refleja mejor esa misma decisión. Además, la nota b del borrador está mal planteada, porque presenta como alternativa el mismo texto ya elegido.'
  spanish_quality_summary: El español es claro y digno. «Habiendo creído» suena formal pero aceptable. «Fueron librados de la llama» es natural y comunica bien el rescate concreto, aunque se aparta levemente del valor más directo de σῴζω como «fueron salvados». Esa elección sigue siendo defendible en contexto. La principal reparación necesaria es terminológica y de notas, no de fluidez.
  glossary_alignment: No hay términos del glosario mayor en conflicto salvo la necesidad de respetar la rationale documentada para los nombres propios. El borrador no sigue del todo la preferencia contextual del POB por las formas hebreas reconocibles; conviene usar «Hananías, Azarías y Misael» y dejar en nota la forma griega alternativa. El resto de las decisiones léxicas es compatible con el proyecto.
  issues:
  - severity: medium
    issue: El nombre «Ananías» no refleja la decisión documentada del POB de usar las formas hebreas familiares de Daniel 3.
    rationale: La auditoría inglesa eligió Hananiah/Azariah/Mishael precisamente para identificar a los tres jóvenes conocidos del libro de Daniel, dejando Ananias/Azarias/Misael como alternativa griega. En español, «Hananías» reproduce mejor esa intención que «Ananías».
  - severity: medium
    issue: La nota al pie a contradice la práctica real del texto y explica de forma imprecisa la elección onomástica.
    rationale: Dice que se adoptan las formas más reconocibles en español, pero el texto usa «Ananías», que se percibe como más cercano al griego que a la forma hebrea familiar. La nota debe aclarar que el griego tiene Ananías/Azarías/Misael y que el texto usa Hananías/Azarías/Misael para identificar a los jóvenes de Daniel 3.
  - severity: medium
    issue: La nota al pie b ofrece como alternativa «habiendo creído», que ya es la lectura principal del texto.
    rationale: Una nota de alternativas debe conservar opciones reales distintas, como «por haber creído» o una variante más cercana al valor de ἐσώθησαν como «fueron salvados»/«fueron rescatados».
