translation:
  language: es
  text: Y ellos mismos[a], y toda la región circundante, lo recibieron con guirnaldas[b] y danzas y panderos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «lo acogieron». El verbo griego puede expresar tanto «recibir» como «dar la bienvenida» según el contexto.
    reason: lexical_alternative
  - marker: b
    text: O «con coronas». στεφάνων puede referirse a adornos festivos o a coronas; aquí el contexto favorece el sentido celebrativo más que el real.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐδέξαντο
  english_pob_choice: received
  chosen_spanish: lo recibieron
  alternatives_spanish:
  - lo acogieron
  - lo dieron la bienvenida
  lexicon: BDAG
  rationale: δέχομαι puede significar 'recibir' o 'acoger/recibir con bienvenida'. En español, 'lo recibieron' conserva la cercanía al griego y mantiene abierta la idea ceremonial de acogida sin añadir verbos más interpretativos.
- source_word: αὐτοὶ
  english_pob_choice: they themselves
  chosen_spanish: ellos mismos
  alternatives_spanish:
  - ellos
  lexicon: BDAG
  rationale: El pronombre explícito es enfático. 'Ellos mismos' reproduce esa fuerza mejor que un simple 'ellos'.
- source_word: πᾶσα ἡ περίχωρος αὐτῶν
  english_pob_choice: all the surrounding region
  chosen_spanish: toda la región circundante
  alternatives_spanish:
  - todo el distrito circundante
  - toda la comarca alrededor de ellos
  lexicon: LSJ
  rationale: περίχωρος denota el territorio o región alrededor. 'Región circundante' es natural en español y conserva el valor colectivo del texto sin sobreespecificar 'countryside' o 'district'.
- source_word: μετὰ στεφάνων
  english_pob_choice: with garlands
  chosen_spanish: con guirnaldas
  alternatives_spanish:
  - con coronas
  - con laureles
  lexicon: LSJ
  rationale: En un contexto festivo, στέφανος puede ser guirnalda, corona o corona de honor. 'Guirnaldas' comunica mejor el adorno celebrativo y evita sugerir realeza.
- source_word: χορῶν
  english_pob_choice: dances
  chosen_spanish: danzas
  alternatives_spanish:
  - bailes
  - cantos corales
  lexicon: LSJ
  rationale: χορός puede referirse a una danza o a un grupo de danza/coro. 'Danzas' expresa de modo natural la acción festiva sin imponer un matiz técnico.
- source_word: τυμπάνων
  english_pob_choice: tambourines
  chosen_spanish: panderos
  alternatives_spanish:
  - tamboriles
  - tambores de mano
  lexicon: LSJ
  rationale: τύμπανον designa un instrumento de percusión de mano, cercano al pandero/tamboril. 'Panderos' es un equivalente español idiomático y adecuado para una celebración procesional.
translation_notes:
  revision_awareness: El texto griego presenta una sola cláusula coordinada con ἐδέξαντο y un sujeto enfático ('ellos mismos'); la versión española conserva esa estructura breve y ceremonial. La nota del inglés audit trail sobre 'received' versus 'welcomed' se refleja como alternativa léxica en la nota a. También se preserva la ambigüedad de στεφάνων con una nota equivalente a la del inglés, aunque en español se optó por 'guirnaldas' por el contexto festivo.
  spanish_consistency_notes:
  - Se mantiene 'región circundante' para πᾶσα ἡ περίχωρος, evitando 'campo' o 'comarca' que estrecharían indebidamente el alcance.
  - Se usa 'panderos' para τύμπανα por ser un término español natural y ritual-festivo, sin añadir la imagen de un gran tambor.
  - No se introducen títulos teológicos ni términos de equivalente eclesial no presentes en el griego.
