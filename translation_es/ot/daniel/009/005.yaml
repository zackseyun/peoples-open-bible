    rationale: Tras «Hemos pecado y obrado mal», el español espera otra forma finita paralela. La elipsis del auxiliar puede tolerarse en listas breves, pero aquí suena rígida y menos idiomática en registro bíblico moderno.
  - severity: low
    issue: La cadena verbal puede fluir mejor con una forma simple en lugar del perfecto reflexivo
    rationale: «Nos hemos rebelado» es fiel, pero en una serie de aorísticos/confesionales coordinados, «nos rebelamos» armoniza mejor con «pecamos / obramos / actuamos» si se reestructura. Aun así, esto es estilístico y no doctrinal.
