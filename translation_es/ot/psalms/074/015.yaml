translation:
  language: es
  text: Tú abriste manantiales y arroyos[a]; tú secaste ríos perennes[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «corrientes»; el hebreo puede referirse a un curso de agua estacional o a un cauce.
    reason: lexical_alternative
  - marker: b
    text: O «ríos poderosos»; el adjetivo hebreo puede significar «duraderos», «perennes» o «fuertes».
    reason: lexical_alternative
lexical_decisions:
- source_word: בָקַעְתָּ
  english_pob_choice: split open
  chosen_spanish: abriste
  alternatives_spanish:
  - partiste
  - abriste de par en par
  - rasgaste
  lexicon: HALOT
  rationale: El verbo hebreo expresa abrir por división o ruptura. En español, «abriste» comunica la acción con naturalidad y permite que la imagen del agua abierta quede en el contexto inmediato; «partiste» o «rasgaste» sonarían más forzados aquí.
- source_word: מַעְיָן
  english_pob_choice: springs
  chosen_spanish: manantiales
  alternatives_spanish:
  - fuentes
  - manantiales de agua
  - surgentes
  lexicon: HALOT
  rationale: El sustantivo designa un manantial o surgente. «Manantiales» es claro y bíblico sin ser arcaizante; mantiene bien la imagen de origen del agua.
- source_word: וָנָחַל
  english_pob_choice: streams
  chosen_spanish: corrientes
  alternatives_spanish:
  - arroyos
  - cauces
  - torrentes
  lexicon: HALOT
  rationale: נחל puede referirse a un curso de agua estacional o cauce. Como el texto inglés revisado prefirió «streams» por naturalidad formal, «corrientes» conserva la fluidez y no obliga a fijar la imagen solo como cauce seco; «arroyos» estrecharía demasiado el sentido.
- source_word: הוֹבַשְׁתָּ
  english_pob_choice: dried up
  chosen_spanish: secaste
  alternatives_spanish:
  - dejaste secos
  - marchitaste
  - agostaste
  lexicon: HALOT
  rationale: La forma causativa expresa que Dios hizo secar. «Secaste» es directo, natural y suficientemente fuerte en español; «dejaste secos» explicita el resultado, pero es menos compacto.
- source_word: נַהֲרוֹת
  english_pob_choice: rivers
  chosen_spanish: ríos
  alternatives_spanish:
  - corrientes
  - caudales
  lexicon: HALOT
  rationale: El término suele denotar ríos. «Ríos» mantiene el contraste con los «manantiales y corrientes» del primer hemistiquio.
- source_word: אֵיתָן
  english_pob_choice: ever-flowing
  chosen_spanish: perennes
  alternatives_spanish:
  - siempre corrientes
  - perpetuos
  - mighty
  lexicon: HALOT
  rationale: En este contexto el adjetivo señala permanencia o flujo continuo. «Perennes» preserva la idea de continuidad sin introducir la noción de fuerza física como sentido principal; «siempre corrientes» sería más explicativo y menos sobrio.
- source_word: אַתָּה ... אַתָּה
  english_pob_choice: You ... you
  chosen_spanish: Tú ... tú
  alternatives_spanish:
  - Tú mismo ... tú mismo
  - Eres tú ... eres tú
  lexicon: HALOT
  rationale: La repetición es enfática. Repetir «Tú ... tú» mantiene el énfasis directo sobre la acción divina sin añadir matices interpretativos.
theological_decisions:
- issue: Alcance histórico o cósmico de la imagen del agua
  english_pob_reading: Render the verse as a poetic description of God's sovereign acts over waters without specifying a single historical event in the main text.
  chosen_spanish_reading: Traducir el verso como una afirmación poética del dominio soberano de Dios sobre las aguas, sin concretarlo en un evento histórico único en el texto principal.
  alternative_spanish_readings:
  - alusión a la provisión de agua en el desierto
  - alusión al paso del Jordán
  - imaginería cósmica o de victoria sobre las aguas caóticas
  rationale: El hebreo no nombra un episodio específico. La traducción debe preservar esa amplitud poética y no cerrar el sentido a una sola lectura interpretativa.
  doctrine_reference: Preservar la tensión interpretativa sin resolverla artificialmente.
translation_notes:
  revision_awareness: 'El borrador sigue el estado revisado del audit trail inglés: conserva la pareja léxica de origen, adopta una solución más natural para נחל que evita fijarlo exclusivamente como «cauce» o «wadi», y mantiene la ambigüedad de אֵיתָן con una nota alternativa. No se especifica un evento histórico particular.'
  spanish_consistency_notes:
  - Se mantiene el tuteo reverente uniforme («Tú ... tú») para reflejar el hebreo enfático.
  - «Manantiales» y «corrientes» conservan la progresión de fuentes pequeñas a cursos de agua más amplios, paralela al inglés auditado.
  - «Perennes» evita introducir innecesariamente la idea de fuerza cuando el contexto favorece continuidad/flujo continuo.
  - La puntuación con punto y coma reproduce bien el paralelismo poético de dos cola.
