translation:
  language: es
  text: Porque somos consumidos[a] por tu ira, y por tu furor quedamos aterrados[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «llegamos a nuestro fin por tu ira». El verbo hebreo puede denotar ser terminados, consumidos o llevados al fin.
    reason: lexical_alternative
  - marker: b
    text: O «quedamos sobrecogidos», «quedamos turbados» o «quedamos abrumados». El verbo hebreo expresa alarma, perturbación o terror.
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  lexicon: HALOT
  rationale: Introduce la explicación o motivo de lo dicho antes; «Porque» expresa bien la relación causal/expositiva en español sin forzar el tono poético.
- source_word: כָלִינוּ
  english_pob_choice: we are consumed
  chosen_spanish: somos consumidos
  alternatives_spanish:
  - llegamos a nuestro fin
  - somos acabados
  - somos destruidos
  lexicon: HALOT
  rationale: כלה puede indicar ser consumidos o llegar a su fin. «Somos consumidos» conserva la fuerza resultativa y la idea de quedar agotados o terminados por la acción divina.
- source_word: בְאַפֶּךָ
  english_pob_choice: by your anger
  chosen_spanish: por tu ira
  alternatives_spanish:
  - en tu ira
  - a causa de tu ira
  lexicon: HALOT
  rationale: El valor causal/instrumental del prefijo ב aquí se expresa naturalmente con «por» en español. «Ira» es un término digno y claro para אַף, y mantiene la relación con el segundo miembro sin colapsar la distinción.
- source_word: חֲמָתְךָ
  english_pob_choice: your wrath
  chosen_spanish: tu furor
  alternatives_spanish:
  - tu ira
  - tu enojo
  - tu cólera
  lexicon: HALOT
  rationale: חֵמָה denota ardor de ira, furia o furor. Se eligió «furor» para mantener la intensificación poética y distinguirlo de «ira» en el primer hemistiquio.
- source_word: נִבְהָלְנוּ
  english_pob_choice: we are terrified
  chosen_spanish: somos aterrados
  alternatives_spanish:
  - somos sobrecogidos
  - somos atemorizados
  - somos turbados
  lexicon: HALOT
  rationale: בהל expresa alarma, perturbación o terror. «Somos aterrados» conserva la pasividad resultante y el impacto fuerte del término, en paralelo con el inglés POB «we are terrified».
theological_decisions:
- issue: Conservar dos términos distintos para la ira divina
  english_pob_reading: Distinct terms retained as 'anger' and 'wrath'
  chosen_spanish_reading: «ira» y «furor» se mantienen diferenciados
  alternative_spanish_readings:
  - «ira» y «cólera»
  - reducir ambos a «ira»
  rationale: El hebreo usa אַף y חֵמָה, dos términos relacionados pero no idénticos. Mantener dos voces en español preserva la intensificación poética y evita borrar una distinción léxica presente en el texto.
  doctrine_reference: Translation philosophy §5 (consistency of key terms, or documented exception)
translation_notes:
  revision_awareness: No hubo revisiones aplicadas en el expediente inglés; el borrador español sigue el pasaje hebreo y mantiene la distinción entre los dos términos de ira divina y la ambigüedad léxica de כָלִינוּ y נִבְהָלְנוּ mediante notas.
  spanish_consistency_notes:
  - Se usa «Yahvé» en el proyecto cuando corresponde al Tetragrámaton, pero este versículo no lo contiene.
  - Se mantuvo la distinción entre «ira» y «furor» para reflejar los dos vocablos hebreos distintos.
  - «Somos aterrados» se eligió por su fuerza semántica y por mantener la pasividad del hebreo; la nota preserva alternativas contextualmente plausibles.
