translation:
  language: es
  text: Pero él eligió rápidamente a Nicanor, hijo de Patroclo[a], uno de sus principales Amigos, y lo envió, habiéndole asignado no menos de veinte mil procedentes de naciones de toda clase[b], para exterminar a todo el pueblo judío[c]. También nombraron junto con él a Gorgias, un hombre que era general y tenía experiencia en asuntos de guerra.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «uno de los primeros Amigos», probablemente un título cortesano para un asociado real de alto rango, no solo un amigo personal.'
    reason: lexical_alternative
  - marker: b
    text: La frase griega es inusual y puede significar tropas o pueblos de composición étnica diversa.
    reason: lexical_alternative
  - marker: c
    text: 'O: «para arrancar de raíz a todo el pueblo judío».'
    reason: alternative_reading
lexical_decisions:
- source_word: προχειρισάμενος
  english_pob_choice: selected
  chosen_spanish: eligió rápidamente
  alternatives_spanish:
  - seleccionó
  - designó
  - escogió de antemano
  lexicon: LSJ
  rationale: El participio expresa una elección o designación hecha con prontitud para una misión concreta. «Eligió rápidamente» conserva la rapidez y la acción de escoger sin volver la frase artificial.
- source_word: τῶν πρώτων φίλων
  english_pob_choice: one of his chief Friends
  chosen_spanish: uno de sus principales Amigos
  alternatives_spanish:
  - uno de sus primeros Amigos
  - uno de sus principales compañeros
  - uno de los primeros Amigos
  lexicon: LSJ
  rationale: En el lenguaje de la corte helenística, φίλοι puede funcionar como título de rango. «Amigos» con mayúscula refleja ese valor técnico; «principales» comunica πρῶτοι de manera natural en español.
- source_word: ὑποτάξας
  english_pob_choice: assigning to him
  chosen_spanish: habiéndole asignado
  alternatives_spanish:
  - poniéndole bajo su mando
  - subordinándole
  - colocándole bajo su mando
  lexicon: LSJ
  rationale: Aquí la idea es poner tropas bajo el mando de Nicanor. «Habiéndole asignado» reproduce la relación de mando de forma clara y fluida en español.
- source_word: παμφύλων ἔθνη
  english_pob_choice: from nations of every kind
  chosen_spanish: de naciones de toda clase
  alternatives_spanish:
  - de naciones de toda tribu
  - de pueblos de toda clase
  - de gentes de todo tipo
  lexicon: LSJ
  rationale: La expresión griega es poco común y sugiere fuerzas o pueblos de composición muy variada. «De naciones de toda clase» conserva esa amplitud sin imponer una precisión que el texto no da.
- source_word: οὐκ ἐλάττους τῶν δισμυρίων
  english_pob_choice: no fewer than twenty thousand
  chosen_spanish: no menos de veinte mil
  alternatives_spanish:
  - no inferiores a veinte mil
  - al menos veinte mil
  lexicon: LSJ
  rationale: Es un idiomático cuantitativo directo. «No menos de veinte mil» es natural en español y mantiene el valor mínimo exacto.
- source_word: τὸ πᾶν τῆς Ἰουδαίας ἐξᾶραι γένος
  english_pob_choice: to wipe out the whole Jewish race
  chosen_spanish: para exterminar a todo el pueblo judío
  alternatives_spanish:
  - para exterminar a toda la nación de Judea
  - para arrancar de raíz a todo el pueblo judío
  - para destruir por completo a todo el pueblo judío
  lexicon: LSJ
  rationale: ἐξᾶραι aquí tiene fuerza de extirpar o eliminar por completo. γένος se refiere al colectivo humano; «pueblo judío» evita la connotación biológica de «raza» y sigue siendo fiel al referente histórico.
- source_word: συνέστησαν δὲ αὐτῷ καὶ Γοργίαν
  english_pob_choice: They also appointed with him Gorgias
  chosen_spanish: También le asignaron a Gorgias
  alternatives_spanish:
  - También le pusieron junto a él a Gorgias
  - También le asociaron a Gorgias
  - También nombraron junto con él a Gorgias
  lexicon: LSJ
  rationale: El verbo expresa colocar o designar a alguien junto a otro en una función compartida. «Le asignaron» mantiene la relación militar y evita sobreinterpretar el matiz exacto del nombramiento.
- source_word: ἄνδρα στρατηγόν
  english_pob_choice: a man who was a general
  chosen_spanish: un hombre que era general
  alternatives_spanish:
  - un general
  - un comandante
  - un hombre de rango militar
  lexicon: LSJ
  rationale: La apposición describe a Gorgias en términos de cargo o función militar. «Un hombre que era general» sigue de cerca la estructura griega sin perder inteligibilidad.
- source_word: εὖ πολεμικαῖς χρείαις ἔχοντα πεῖραν
  english_pob_choice: experienced in matters of war
  chosen_spanish: tenía experiencia en asuntos de guerra
  alternatives_spanish:
  - estaba bien versado en asuntos de guerra
  - tenía pericia en las necesidades de la guerra
  - era experimentado en cuestiones militares
  lexicon: LSJ
  rationale: La frase subraya experiencia práctica en lo militar. «Tenía experiencia en asuntos de guerra» es clara, sobria y fiel al sentido concreto del griego.
theological_decisions:
- issue: γένος como colectivo étnico-nacional
  english_pob_reading: Jewish race / Jewish people
  chosen_spanish_reading: pueblo judío
  alternative_spanish_readings:
  - raza judía
  - nación judía
  - linaje judío
  rationale: El texto describe un intento de exterminio de un colectivo histórico concreto. «Pueblo judío» preserva el sentido de grupo étnico-nacional sin introducir la carga biológica que hoy tiene «raza» en español.
  doctrine_reference: Principio de claridad semántica y respeto al referente histórico del texto.
translation_notes:
  revision_awareness: 'La redacción sigue de cerca la revisión más reciente del inglés POB: conserva la forma apposicional de «hijo de Patroclo», mantiene la idea de envío directo («lo envió»), refleja la rareza de παμφύλων ἔθνη como diversidad de naciones y prefiere una formulación sobria para la clausula final sobre Gorgias. Se evitó trasladar mecánicamente «race» al español porque en el contexto histórico y semántico la mejor equivalencia pública es «pueblo judío».'
  spanish_consistency_notes:
  - Se mantuvo «Amigos» con mayúscula para reflejar el posible título cortesano señalado por la auditoría en inglés.
  - Se usó «Yahvé» solo cuando corresponda; este versículo no contiene el nombre divino.
  - «General» se reservó para στρατηγός, siguiendo la equivalencia contextual del griego.
  - 'La puntuación busca reproducir la secuencia narrativa del original: elección, envío, asignación de tropas, propósito exterminador y añadido de Gorgias.'
