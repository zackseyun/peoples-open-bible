translation:
  language: es
  text: Vendré en los poderosos hechos del Señor Yahvé[a]; proclamaré tu justicia[c][b], solo la tuya.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «con los poderosos hechos del Señor Yahvé». La preposición puede entenderse de manera instrumental o locativa.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «mencionaré tu justicia, solo la tuya». El verbo hebreo puede significar «mencionar», «relatar» o «proclamar».'
    reason: lexical_alternative
  - marker: c
    text: «Tu justicia» también puede entenderse como «tu rectitud» o, por el contexto, «tus actos justos».
    reason: lexical_alternative
lexical_decisions:
- source_word: אָבוֹא
  english_pob_choice: I will come
  chosen_spanish: Entraré
  alternatives_spanish:
  - Iré
  - Vendré
  - Entraré
  lexicon: HALOT
  rationale: El qal imperfecto 1cs de בוא puede expresar venir, ir o entrar. «Entraré» conserva el movimiento/ingreso implícito y funciona de manera natural en español en este contexto poético.
- source_word: בִּגְבֻרוֹת
  english_pob_choice: in the mighty deeds
  chosen_spanish: en las hazañas poderosas
  alternatives_spanish:
  - en los hechos poderosos
  - con actos poderosos
  - en las poderosas hazañas
  lexicon: HALOT
  rationale: גבורות es plural de fuerza/poder y aquí apunta a actos de poder divino. «Hazañas poderosas» comunica el sentido de actos heroicos o poderosos sin perder la referencia a la acción de Yahvé; el valor de la preposición ב se mantiene de forma locativa en «en».
- source_word: אֲדֹנָי יְהוִה
  english_pob_choice: the Lord GOD
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el Señor Yahvé
  - el Señor Dios
  - Yahvé
  lexicon: HALOT
  rationale: El proyecto pide rendir יְהוָה como «Yahvé» y no enmascararlo como «SEÑOR». Aunque el hebreo tiene la forma compuesta אֲדֹנָי יְהוִה, en español se evita la redundancia y se conserva el nombre divino directo según la política del proyecto.
- source_word: אַזְכִּיר
  english_pob_choice: I will proclaim
  chosen_spanish: proclamaré
  alternatives_spanish:
  - mencionaré
  - recordaré
  - relataré
  lexicon: HALOT
  rationale: La forma hifil de זכר puede significar hacer recordar, mencionar, recount/proclaimar. En poesía, «proclamaré» expresa mejor la declaración pública y solemne que el contexto sugiere.
- source_word: צִדְקָתְךָ
  english_pob_choice: your righteousness
  chosen_spanish: tu justicia
  alternatives_spanish:
  - tu rectitud
  - tu justicia
  - tus actos justos
  lexicon: HALOT
  rationale: צדקה puede ser «justicia», «rectitud» o, por extensión, actos justos. Aquí «tu justicia» preserva el término teológico central y resulta idiomático en español.
- source_word: לְבַדֶּךָ
  english_pob_choice: yours alone
  chosen_spanish: solo la tuya
  alternatives_spanish:
  - solo tuya
  - únicamente tuya
  - solo de ti
  lexicon: HALOT
  rationale: לבדך expresa exclusividad. «Solo la tuya» reproduce esa exclusividad y suena natural en español, enlazándose con «tu justicia».
theological_decisions:
- issue: Rendición del nombre divino יהוה en un título compuesto con אֲדֹנָי
  english_pob_reading: the Lord GOD / Yahweh in doctrine
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el Señor Yahvé
  - Yahvé el Señor
  rationale: El paquete doctrinal del proyecto ordena usar «Yahvé» para יהוה. Aunque el texto masorético combina אֲדֹנָי יְהוִה, la traducción española sigue la convención del proyecto y evita la fórmula tradicional de sustitución por «Señor».
  doctrine_reference: 'DOCTRINE.md: Contested terms — יהוה / YHWH → Yahvé'
translation_notes:
  revision_awareness: No se aplicaron revisiones en el último pase; la presente redacción corrige el problema de validación anterior incluyendo en el texto los marcadores de nota exactamente donde corresponden.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» conforme a la terminología del proyecto.
  - Se conserva el paralelismo poético entre las obras poderosas de Dios y su justicia.
  - Se evita «Señor» como máscara del nombre divino en el texto principal.
  - La estructura de dos cola se refleja con punto y coma para respetar el hebreo poético.
