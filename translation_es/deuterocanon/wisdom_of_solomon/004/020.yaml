translation:
  language: es
  text: Vendrán con temor[a], razonando sobre sus pecados, y sus actos inicuos los dejarán en evidencia frente a frente[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «temerosos» o «como cobardes» para δειλοί.
    reason: lexical_alternative
  - marker: b
    text: Literalmente, «de enfrente»; la idea es que sus propios actos inicuos los confrontan y los dejan en evidencia abiertamente, cara a cara.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐλεύσονται
  english_pob_choice: They will come
  chosen_spanish: Vendrán
  alternatives_spanish:
  - Llegarán
  - Vendrán a aparecer
  lexicon: LSJ
  rationale: El futuro de ἔρχομαι se expresa naturalmente en español con «vendrán». Mantiene la idea de su aparición ante el juicio sin añadir matices no presentes en el griego.
- source_word: ἐν συλλογισμῷ
  english_pob_choice: reasoning over
  chosen_spanish: razonando sobre
  alternatives_spanish:
  - con reflexión sobre
  - pensando acerca de
  - haciendo cuentas de
  lexicon: LSJ
  rationale: συλλογισμός puede indicar razonamiento o deliberación interna. «Razonando sobre» conserva el proceso mental y evita traducirlo demasiado libremente como mero remordimiento.
- source_word: ἁμαρτημάτων
  english_pob_choice: sins
  chosen_spanish: pecados
  alternatives_spanish:
  - faltas
  - transgresiones
  - ofensas
  lexicon: LSJ
  rationale: «Pecados» es la equivalencia directa e idiomática en español para ἁμαρτήματα, y preserva el paralelo con el segundo término moral del verso.
- source_word: δειλοί
  english_pob_choice: in fear
  chosen_spanish: con temor
  alternatives_spanish:
  - temerosos
  - con miedo
  - como cobardes
  lexicon: LSJ
  rationale: El contexto revisado en inglés favorece «fear» como sentido más natural de δειλοί. En español, «con temor» comunica la actitud de temor vergonzoso sin cargar innecesariamente el matiz de cobardía.
- source_word: ἐλέγξει
  english_pob_choice: will convict
  chosen_spanish: los convencerán
  alternatives_spanish:
  - los condenarán
  - los acusarán
  - los pondrán en evidencia
  lexicon: LSJ
  rationale: ἐλέγχω puede significar convencer, desenmascarar o condenar. Aquí, con las propias obras como sujeto, «convencerán» reproduce la fuerza judicial-moral de la confrontación y evita introducir una sentencia explícita que el griego no dice de forma directa.
- source_word: ἐξ ἐναντίας
  english_pob_choice: to their face
  chosen_spanish: frente a frente
  alternatives_spanish:
  - de frente
  - ante ellos
  - a la vista de todos
  lexicon: LSJ
  rationale: La expresión idiomática griega señala confrontación directa. «Frente a frente» mantiene esa vividez relacional y la idea de exposición pública, equivalente funcional de «to their face».
- source_word: τὰ ἀνομήματα
  english_pob_choice: lawless deeds
  chosen_spanish: sus obras sin ley
  alternatives_spanish:
  - sus actos sin ley
  - sus acciones ilegales
  - sus transgresiones
  lexicon: LSJ
  rationale: ἀνόμημα enfatiza lo contrario de la ley u orden establecido. «Obras sin ley» conserva mejor la transparencia lexical que «iniquidades» y mantiene la tensión documentada entre pecado general y violación concreta de la ley.
theological_decisions:
- issue: Relación entre «pecados» y «obras sin ley»
  english_pob_reading: Retain both terms distinctly as 'sins' and 'lawless deeds' rather than collapsing them into one English term.
  chosen_spanish_reading: Mantener «pecados» y «obras sin ley» como dos expresiones distintas.
  alternative_spanish_readings:
  - Reducir ambos a «pecados»
  - Usar «iniquidades» para el segundo término
  rationale: 'El griego usa ἁμαρτήματα y ἀνομήματα, dos términos morales relacionados pero no idénticos. Conservar ambos en español preserva la intensificación retórica: primero el autoexamen por los pecados, luego la confrontación objetiva por las obras sin ley.'
  doctrine_reference: Translation philosophy §5 (consistency of key terms, or documented exception)
- issue: Fuerza de ἐλέγξει con sujeto plural implícito en la cláusula española
  english_pob_reading: their lawless deeds will convict them
  chosen_spanish_reading: sus obras sin ley los convencerán frente a frente
  alternative_spanish_readings:
  - sus obras sin ley los condenarán frente a frente
  - sus obras sin ley los acusarán frente a frente
  rationale: Aunque «convencerán» no es el verbo judicial más obvio en castellano moderno, permite reflejar el valor de ἐλέγχω como desenmascarar/convencer de culpa sin forzar una sentencia legal explícita. La construcción mantiene la agencia de las obras y la confrontación directa del texto.
  doctrine_reference: Translation philosophy §5 (consistency of key terms, or documented exception)
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión inglesa que cambió «in cowardice» por «in fear», por lo que se evitó una solución demasiado fuerte como «cobardía» y se prefirió «con temor». También se respetó la distinción entre «sins» y «lawless deeds» en lugar de fusionar ambos términos.
  spanish_consistency_notes:
  - Se mantuvo «pecados» para ἁμαρτήματα y una expresión distinta para ἀνομήματα, sin homogeneizarlos.
  - «Frente a frente» comunica la confrontación de ἐξ ἐναντίας sin introducir un giro más interpretativo de lo necesario.
  - El tono es digno y publicable, con sintaxis natural en español latinoamericano.
  - Se evitó «SEÑOR» u otros equivalentes irrelevantes porque el verso no contiene el Tetragrámaton ni κύριος.
