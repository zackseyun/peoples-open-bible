translation:
  language: es
  text: Se desvanecieron y descendieron a Hades[a], y otros se levantaron en su lugar.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «el mundo de los muertos» o «el sepulcro»; el griego dice «Hades», el ámbito de los muertos.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἠφανίσθησαν
  english_pob_choice: they vanished
  chosen_spanish: se desvanecieron
  alternatives_spanish:
  - desaparecieron
  - perecieron
  lexicon: BDAG
  rationale: El griego expresa quedar fuera de la vista o ser borrados de la escena. «Se desvanecieron» conserva ese matiz resultativo sin afirmar más de lo que el texto dice.
- source_word: εἰς ᾅδου
  english_pob_choice: to Hades
  chosen_spanish: a Hades
  alternatives_spanish:
  - al sepulcro
  - al mundo de los muertos
  - a Sheol
  lexicon: BDAG
  rationale: El testimonio griego nombra explícitamente ᾅδης. Mantener «Hades» sigue la primacía de la fuente original y preserva la referencia al ámbito de los muertos sin sustituirla por un término más interpretativo.
- source_word: κατέβησαν
  english_pob_choice: went down
  chosen_spanish: descendieron
  alternatives_spanish:
  - bajaron
  - fueron abajo
  lexicon: BDAG
  rationale: El verbo comunica movimiento hacia abajo. «Descendieron» respeta la imagen y suena natural en español.
- source_word: ἄλλοι
  english_pob_choice: others
  chosen_spanish: otros
  alternatives_spanish:
  - otros hombres
  - otros más
  lexicon: BDAG
  rationale: El plural indefinido del griego no especifica varones ni añade información temporal. «Otros» reproduce esa amplitud.
- source_word: ἀντανέστησαν
  english_pob_choice: rose up
  chosen_spanish: se levantaron
  alternatives_spanish:
  - se alzaron
  - surgieron
  lexicon: LSJ
  rationale: El compuesto sugiere levantarse en reemplazo o respuesta. «Se levantaron» conserva la imagen verbal sin introducir por sí mismo una lectura de resurrección.
- source_word: ἀντʼ αὐτῶν
  english_pob_choice: in their place
  chosen_spanish: en su lugar
  alternatives_spanish:
  - en vez de ellos
  - en sustitución de ellos
  lexicon: BDAG
  rationale: La construcción con ἀντί expresa sustitución o sucesión. «En su lugar» comunica de manera idiomática la idea de reemplazo.
theological_decisions:
- issue: Traducción de ᾅδης en un contexto sapiencial/deuterocanónico
  english_pob_reading: Hades
  chosen_spanish_reading: Hades
  alternative_spanish_readings:
  - sepulcro
  - mundo de los muertos
  - Sheol
  rationale: Como el griego usa ᾅδου y no un término hebreo, se conserva el nombre propio «Hades». Así se mantiene la peculiaridad del testimonio griego y se evita suavizar el alcance del ámbito de los muertos.
  doctrine_reference: 'DOCTRINE.md: primacía de la fuente original; preservar tensiones teológicas sin resolverlas artificialmente'
translation_notes:
  revision_awareness: El pasaje coincide con la revisión vigente sin cambios necesarios según el último pase; la redacción española sigue la decisión del texto griego y la equivalencia óptima ya adjudicadas.
  spanish_consistency_notes:
  - Se mantiene «Hades» como nombre propio, en consonancia con el audit trail inglés y con la primacía de la fuente griega.
  - «Se desvanecieron» y «se levantaron» preservan la imaginería verbal sin sobrerregularizar el sentido en dirección doctrinal.
  - «En su lugar» traduce la sustitución expresada por ἀντʼ αὐτῶν con naturalidad en español.
