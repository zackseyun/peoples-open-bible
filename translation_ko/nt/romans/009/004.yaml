id: ROM.9.4
reference: Romans 9:4
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: οἵτινές εἰσιν Ἰσραηλῖται, ὧν ἡ υἱοθεσία καὶ ἡ δόξα καὶ αἱ διαθῆκαι καὶ ἡ νομοθεσία καὶ ἡ λατρεία καὶ αἱ ἐπαγγελίαι,
base_translation:
  language: en
  yaml_path: translation/nt/romans/009/004.yaml
  text: who are Israelites[a], to whom belong the adoption, the glory, the covenants, the giving of the law, the worship, and the promises[d][c][b],
  footnotes:
  - marker: a
    text: Or 'whose are the adoption, the glory, the covenants, the giving of the law, the worship, and the promises.'
    reason: lexical_alternative
  - marker: b
    text: '''The glory'' likely refers to God''s manifested presence among Israel.'
    reason: cross_reference
  - marker: c
    text: Or 'adoption as sons' or 'sonship.'
    reason: lexical_alternative
  - marker: d
    text: That is, Israel's covenantal worship/service before God.
    reason: cultural_note
translation:
  language: ko
  text: 그들은 이스라엘 사람들이며, 양자됨과 영광과 언약들과 율법의 수여와 예배와 약속들이 그들에게 속한 것입니다.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: Ἰσραηλῖται
  english_pob_choice: Israelites
  chosen_korean: 이스라엘 사람들
  alternatives_korean:
  - 이스라엘 백성
  lexicon: BDAG
  rationale: 민족 정체성을 자연스럽게 옮긴다.
- source_word: υἱοθεσία
  english_pob_choice: the adoption
  chosen_korean: 양자됨
  alternatives_korean:
  - 아들 됨
  - 자녀 됨
  lexicon: BDAG
  rationale: 이스라엘의 언약적 아들 신분을 가리키는 바울 용어. 「양자됨」이 가장 분명하다.
- source_word: διαθῆκαι
  english_pob_choice: the covenants
  chosen_korean: 언약들
  alternatives_korean:
  - 계약들
  lexicon: BDAG
  rationale: 정책 기본값 「언약」을 복수로 보존한다.
- source_word: νομοθεσία
  english_pob_choice: the giving of the law
  chosen_korean: 율법의 수여
  alternatives_korean:
  - 율법 수립
  - 입법
  lexicon: BDAG
  rationale: 단순히 「율법」이 아니라 율법이 「주어진」 사건을 가리킨다.
- source_word: λατρεία
  english_pob_choice: the worship
  chosen_korean: 예배
  alternatives_korean:
  - 성전 예배
  - 예전
  lexicon: BDAG
  rationale: 이스라엘의 정해진 예배 봉사를 가리키는 폭넓은 「예배」를 채택한다.
