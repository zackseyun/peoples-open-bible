  to: como los días en que los judíos tuvieron descanso[a] de sus enemigos, y como el mes que se les había vuelto de tristeza a alegría y de luto a un día bueno[b], para hacerlos días de banquete y alegría, y de envío de porciones[c], cada hombre a su compañero, y de dones a los pobres.
  rationale: 'La revisión corrige el anclaje erróneo de la nota sobre «día bueno», añade la nota cultural documentada en la auditoría inglesa para «envío de porciones», y ajusta dos frases para mayor fidelidad al hebreo y mejor naturalidad en español: «para hacerlos» en vez de «para convertirlos», y «a un día bueno» en lugar de «a día bueno». No se requiere adjudicación adicional.'
