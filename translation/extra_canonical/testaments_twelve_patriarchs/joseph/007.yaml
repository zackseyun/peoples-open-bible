translation:
  text: '7[a]. So that you may learn that the wickedness of the ungodly will not prevail over those who fear God with self-control, look: taking some of it before him, I ate it in your presence. And after saying this, I tasted it and said, “The God of my fathers and the angel of Abraham will be with me.” And I ate.


    8. But when she saw this, she fell on her face at my feet, weeping; and raising her up, I admonished her.


    9. And she agreed with me no longer to commit this impiety. Yet her heart was still set on evil[b], and she kept looking around for a way to ensnare me; and groaning, she would collapse suddenly, though she was not sick.


    10. And when her husband saw her, he said to her, “What has happened to your face?” She said to him, “I am in pain with anguish of heart, and the groanings of my spirit hold me fast.” And he tried to heal her with words.


    11. Then, when she found an opportunity, she rushed in to me while her husband was still outside, and said to me, “I am choking; or I will throw myself down a cliff, if you do not have relations with me.”


    12. But I, understanding that the spirit of Beliar was troubling her, prayed to the Lord and said to her,


    13. “Why, miserable woman, are you disturbed and thrown into turmoil, blinding yourself in sins? Remember that if you kill yourself, Astho, your husband''s concubine, your rival[c], will beat your children and wipe out your memory from the earth.”'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or possibly, 'the angel who was with Abraham.' The Greek reads literally, 'the angel of Abraham.'
    reason: lexical_alternative
    anchor_ref: '7:7'
  - marker: b
    text: The description suggests feigned collapse or dramatic fits rather than actual illness.
    reason: cultural_note
    anchor_ref: '7:9'
  - marker: c
    text: Beliar is a traditional Jewish name for the power of evil, often rendered 'Belial.'
    reason: cross_reference
    anchor_ref: '7:12'
lexical_decisions:
- source_word: σωφροσύνη
  chosen: self-control
  alternatives:
  - chastity
  - sound-mindedness
  - temperance
  lexicon: LSJ
  rationale: In Joseph this virtue centers on sexual restraint but also broader disciplined piety. 'Self-control' preserves the wider ethical sense while fitting the immediate temptation context.
- source_word: θεοσεβούντων
  chosen: those who fear God
  alternatives:
  - the God-fearing
  - those who worship God
  lexicon: LSJ
  rationale: The participle denotes reverent devotion to God. 'Those who fear God' is idiomatic and preserves the moral-religious force better than a flatter 'worship God'.
- source_word: κατισχύσει
  chosen: will not prevail over
  alternatives:
  - will not overpower
  - will not triumph over
  lexicon: LSJ
  rationale: The verb conveys gaining mastery or prevailing. 'Will not prevail over' is elevated but readable and suits the exhortational tone.
- source_word: κακία
  chosen: wickedness
  alternatives:
  - evil
  - malice
  lexicon: LSJ
  rationale: Here the term names the active moral force of the ungodly rather than merely inner spite. 'Wickedness' best matches the broad ethical sense.
- source_word: ἀσεβούντων
  chosen: the ungodly
  alternatives:
  - those who act impiously
  - the irreverent
  lexicon: LSJ
  rationale: This keeps the contrast with God-fearing people sharp and preserves the testamentary moral polarity.
- source_word: ἄγγελος Ἀβραάμ
  chosen: the angel of Abraham
  alternatives:
  - Abraham's angel
  lexicon: LSJ
  rationale: The Greek is somewhat unusual, but the straightforward rendering should be preserved rather than interpreted away. A note explains the possible sense.
- source_word: ἐνουθέτησα
  chosen: I admonished her
  alternatives:
  - I warned her
  - I instructed her
  lexicon: LSJ
  rationale: The verb carries moral warning and correction. 'Admonished' preserves the fatherly-ethical register of the work.
- source_word: ἀσέβειαν
  chosen: impiety
  alternatives:
  - godlessness
  - wicked act
  lexicon: LSJ
  rationale: The sexual solicitation is framed not merely as immorality but as offense against God. 'Impiety' keeps that theological dimension.
- source_word: ἔκειτο εἰς τὸ κακόν
  chosen: was still set on evil
  alternatives:
  - lay toward evil
  - was bent on evil
  lexicon: LSJ
  rationale: This idiom expresses settled inward intention. 'Was still set on evil' is natural English while preserving the durative sense.
- source_word: παγιδεύσῃ
  chosen: ensnare me
  alternatives:
  - trap me
  - catch me
  lexicon: LSJ
  rationale: The metaphor of entrapment is vivid and morally charged; 'ensnare' preserves that texture.
- source_word: πόνον καρδίας
  chosen: anguish of heart
  alternatives:
  - pain of heart
  - heartache
  lexicon: LSJ
  rationale: A literal rendering is possible, but 'anguish of heart' better conveys the emotional intensity in elevated English.
- source_word: συνέχουσί με
  chosen: hold me fast
  alternatives:
  - constrain me
  - grip me
  lexicon: LSJ
  rationale: The phrase suggests being seized or pressed by inward distress. 'Hold me fast' is vivid and readable.
- source_word: ἐθεράπευσεν αὐτὴν ἐν λόγοις
  chosen: he tried to heal her with words
  alternatives:
  - he comforted her with words
  - he treated her by speaking
  lexicon: LSJ
  rationale: The verb is literally 'heal/attend to.' In context the husband responds verbally, so this rendering keeps the metaphor without sounding clinical.
- source_word: εἰσεπήδησε
  chosen: she rushed in to me
  alternatives:
  - she sprang upon me
  - she leapt in toward me
  lexicon: LSJ
  rationale: The verb is forceful and sudden. 'Rushed in to me' preserves urgency without overcommitting to physical assault.
- source_word: Ἄγχομαι
  chosen: I am choking
  alternatives:
  - I am distressed
  - I am being strangled
  lexicon: LSJ
  rationale: The verb can denote being pressed tight or suffocated, whether physically or emotionally. 'I am choking' preserves the dramatic immediacy of her speech.
- source_word: συγγενῇ μετ᾿ ἐμοῦ
  chosen: join yourself with me
  alternatives:
  - have relations with me
  - be with me intimately
  lexicon: LSJ
  rationale: The Greek is euphemistic. 'Join yourself with me' preserves the indirectness and moral gravity of the original better than an explicit modern paraphrase.
- source_word: πνεῦμα τοῦ Βελίαρ
  chosen: the spirit of Beliar
  alternatives:
  - the spirit of Belial
  lexicon: LSJ
  rationale: The Greek witness reads Beliar, a standard form in this literature. We transliterate the form present in the text.
- source_word: ἐνοχλεῖ
  chosen: was troubling
  alternatives:
  - was harassing
  - was afflicting
  lexicon: LSJ
  rationale: The verb indicates persistent disturbance. 'Was troubling' is clear and does not overstate beyond the Greek.
- source_word: ἄθλια
  chosen: miserable woman
  alternatives:
  - wretched woman
  - poor woman
  lexicon: LSJ
  rationale: Joseph rebukes her sharply but not crudely. 'Miserable woman' preserves the rebuke in readable English.
- source_word: τάρασσον καὶ θορυβῇ
  chosen: are you disturbed and thrown into turmoil
  alternatives:
  - do you agitate yourself and make an uproar
  - are you troubled and in confusion
  lexicon: LSJ
  rationale: The pair intensifies inner agitation. The chosen rendering keeps the rhetorical doubling.
- source_word: τυφλώττουσα
  chosen: blinding yourself
  alternatives:
  - making yourself blind
  - being blinded
  lexicon: LSJ
  rationale: The middle nuance points to self-inflicted moral blindness. 'Blinding yourself' makes that explicit.
- source_word: ἀνέλῃς σεαυτήν
  chosen: kill yourself
  alternatives:
  - destroy yourself
  - take your own life
  lexicon: LSJ
  rationale: The warning is direct. 'Kill yourself' is plain and forceful, matching the gravity of the threat.
- source_word: παλλακή
  chosen: concubine
  alternatives:
  - secondary wife
  lexicon: LSJ
  rationale: This is the standard and most transparent rendering for the social role indicated.
- source_word: ἀντίζηλος
  chosen: rival
  alternatives:
  - jealous rival
  - co-wife rival
  lexicon: LSJ
  rationale: The term marks competitive hostility within the household. 'Rival' is concise and sufficient in context.
- source_word: κονδυλίσει
  chosen: will beat
  alternatives:
  - will strike
  - will abuse
  lexicon: LSJ
  rationale: The verb suggests violent striking with the fist or cudgel-like blows. 'Will beat' is strong and natural.
- source_word: μνημόσυνόν
  chosen: your memory
  alternatives:
  - your memorial
  - your remembrance
  lexicon: LSJ
  rationale: The warning concerns posthumous remembrance and legacy. 'Your memory' is idiomatic and preserves the sense.
