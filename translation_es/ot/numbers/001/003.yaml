translation:
  language: es
  text: Desde los veinte años de edad y en adelante[a], todo hombre que sale a la guerra en Israel —tú y Aarón los contaréis por sus compañías[b]—.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «desde los veinte años y más». La expresión hebrea fija la edad mínima para la inscripción o el recuento militar.
    reason: lexical_alternative
  - marker: b
    text: O «por sus divisiones»; o «por sus unidades militares». El hebreo indica una organización militar del grupo contado.
    reason: lexical_alternative
lexical_decisions:
- source_word: מִבֶּן עֶשְׂרִים שָׁנָה וָמַעְלָה
  english_pob_choice: From twenty years old and upward
  chosen_spanish: Desde los veinte años de edad y en adelante
  alternatives_spanish:
  - Desde los veinte años y más
  - Desde la edad de veinte años en adelante
  lexicon: HALOT
  rationale: El hebreo marca un umbral mínimo de edad para la censura/inscripción. «Desde... y en adelante» comunica bien ese límite en español sin sonar forzado.
- source_word: כָּל
  english_pob_choice: every
  chosen_spanish: todo el que
  alternatives_spanish:
  - cada uno que
  - todos los que
  lexicon: HALOT
  rationale: Con el participio singular siguiente, el valor distributivo se expresa mejor en español con «todo el que» que con un simple plural general.
- source_word: יֹצֵא צָבָא
  english_pob_choice: man going out to war
  chosen_spanish: el que sale para la guerra
  alternatives_spanish:
  - el que sale al ejército
  - el apto para el servicio militar
  lexicon: HALOT
  rationale: Se conserva la imagen idiomática militar del hebreo. En español, «sale para la guerra» mantiene la concreción del giro sin volverse demasiado técnica. El contexto del capítulo ya restringe la referencia a varones, por lo que no hace falta explicitar «varón» en el texto principal.
- source_word: בְּיִשְׂרָאֵל
  english_pob_choice: in Israel
  chosen_spanish: en Israel
  alternatives_spanish:
  - entre Israel
  - dentro de Israel
  lexicon: HALOT
  rationale: Es la equivalencia más directa y natural para el marco nacional del censo.
- source_word: תִּפְקְדוּ אֹתָם
  english_pob_choice: you and Aaron shall count them
  chosen_spanish: tú y Aarón los contaréis
  alternatives_spanish:
  - tú y Aarón los haréis el censo
  - tú y Aarón los registraréis
  lexicon: HALOT
  rationale: En este contexto de censo, פקד tiene el sentido de contar/registrar para el servicio. «Contaréis» es claro y fiel; se mantiene el sujeto explícito en segunda persona plural como en el hebreo.
- source_word: לְצִבְאֹתָם
  english_pob_choice: by their companies
  chosen_spanish: por sus compañías
  alternatives_spanish:
  - por sus divisiones
  - según sus compañías
  lexicon: HALOT
  rationale: Se sigue la revisión inglesa que prefirió «companies» por ser más natural que «divisions», y en español «compañías» preserva el matiz militar/organizativo sin recurrir a «divisiones» o «huestes», que sonarían más pesadas o tradicionales.
- source_word: אַתָּה וְאַהֲרֹן
  english_pob_choice: you and Aaron
  chosen_spanish: tú y Aarón
  alternatives_spanish:
  - tú, junto con Aarón
  - tú y Aaron
  lexicon: HALOT
  rationale: Se conserva el pronombre enfático y el nombre propio con la forma usual en español bíblico.
theological_decisions:
- issue: Elegibilidad militar y lectura masculina implícita
  english_pob_reading: every man going out to war
  chosen_spanish_reading: todo el que sale para la guerra
  alternative_spanish_readings:
  - todo hombre que sale para la guerra
  - todos los que salen para la guerra
  rationale: El hebreo usa un modismo militar que, en este capítulo, se aplica al censo de los varones aptos para el servicio. En el texto principal se evita sobrecargar la línea con una explicitación de género que el contexto ya determina, pero se preserva la fuerza militar del pasaje.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
- issue: Organización del censo por unidades militares
  english_pob_reading: by their companies
  chosen_spanish_reading: por sus compañías
  alternative_spanish_readings:
  - por sus divisiones
  - según sus compañías
  rationale: La elección mantiene el sentido organizativo/militar del hebreo y sigue la decisión revisada del audit trail inglés. En español, «compañías» es comprensible y no introduce una terminología eclesiástica ajena al texto.
  doctrine_reference: Notas de revisión POB para Numbers 1:3
translation_notes:
  revision_awareness: El draft inglés revisado pasó de «divisions» a «companies» para reflejar mejor la organización militar con mayor naturalidad. La versión española adopta esa misma preferencia y evita un calco rígido como «divisiones» en el texto principal. También se tomó en cuenta la nota inglesa sobre el modismo militar de «going out to war» y la restricción contextual a varones aptos para el servicio.
  spanish_consistency_notes:
  - Se usa «Aarón» con tilde en español.
  - Se evita «SEÑOR» porque el versículo no contiene el Tetragrámaton ni una cita directa de יהוה.
  - «Compañías» se emplea como término organizativo militar, no eclesiástico.
  - La puntuación con raya conserva la estructura enfática del hebreo y la fluidez en español.
