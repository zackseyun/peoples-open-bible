translation:
  language: es
  text: Y como si fuera poca cosa para él andar en los pecados de Jeroboam hijo de Nebat[a], tomó por esposa a Jezabel, hija de Etbaal, rey de los sidonios, y fue a servir a Baal y se postró ante él.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «¿Acaso era poca cosa para él andar en los pecados de Jeroboam hijo de Nebat...?» El hebreo inicial es idiomático y subraya retóricamente que Acab consideró insignificantes esos pecados.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הֲנָקֵל
  english_pob_choice: as if it were a light thing
  chosen_spanish: como si fuera poca cosa
  alternatives_spanish:
  - ¿acaso era poca cosa?
  - si le pareciera una cosa ligera
  lexicon: HALOT
  rationale: La expresión hebrea es idiomática y con valor retórico; en español, «como si fuera poca cosa» conserva bien la idea de tratar algo como insignificante, sin convertirlo en una paráfrasis explicativa excesiva.
- source_word: לֶכְתּוֹ בְּחַטֹּאות
  english_pob_choice: for him to walk in the sins
  chosen_spanish: andar en los pecados
  alternatives_spanish:
  - caminar en los pecados
  - vivir en los pecados
  lexicon: HALOT
  rationale: «Andar en» mantiene el metáfora bíblica de conducta habitual y suena natural en español, conservando el sentido de patrón de vida sin aplanarlo a una simple acción puntual.
- source_word: בְּחַטֹּאות יָרָבְעָם בֶּן נְבָט
  english_pob_choice: in the sins of Jeroboam son of Nebat
  chosen_spanish: en los pecados de Jeroboam hijo de Nabat
  alternatives_spanish:
  - según los pecados de Jeroboam hijo de Nabat
  - en los pecados de Jeroboam hijo de Nebat
  lexicon: HALOT
  rationale: «Pecados de Jeroboam» conserva la fórmula deuteronomista. Se usa «Nabat» para reflejar el nombre propio hebreo con transcripción sencilla y consistente en español.
- source_word: וַיִּקַּח אִשָּׁה אֶת אִיזֶבֶל
  english_pob_choice: he took Jezebel ... as his wife
  chosen_spanish: tomó por esposa a Jezabel
  alternatives_spanish:
  - se casó con Jezabel
  - tomó a Jezabel como esposa
  lexicon: HALOT
  rationale: La construcción hebrea literalmente dice que «tomó una mujer»; en español, «tomó por esposa» conserva la estructura y el matiz narrativo sin sonar forzado.
- source_word: אֶתְבַּעַל
  english_pob_choice: Ethbaal
  chosen_spanish: Etbaal
  alternatives_spanish:
  - Etobaal
  - Ittobaal
  lexicon: HALOT
  rationale: Se translitera el nombre propio, pero con una forma española breve y legible. «Etbaal» es suficientemente transparente y evita introducir una variante no atestiguada en el texto fuente.
- source_word: צִידֹנִים
  english_pob_choice: the Sidonians
  chosen_spanish: los sidonios
  alternatives_spanish:
  - los sidonitas
  - el pueblo de Sidón
  lexicon: HALOT
  rationale: El etnónimo plural se vierte naturalmente como «los sidonios», que comunica la pertenencia étnica/política del rey sin perder la referencia geográfica-cultural.
- source_word: וַיֵּלֶךְ
  english_pob_choice: went
  chosen_spanish: fue
  alternatives_spanish:
  - entonces fue
  - y se encaminó
  lexicon: HALOT
  rationale: En la secuencia narrativa, «fue» reproduce el movimiento verbal de forma breve y fluida en español, enlazando con las acciones siguientes.
- source_word: וַיַּעֲבֹד אֶת הַבַּעַל
  english_pob_choice: served Baal
  chosen_spanish: sirvió a Baal
  alternatives_spanish:
  - adoró a Baal
  - prestó servicio a Baal
  lexicon: HALOT
  rationale: «Servir» preserva el valor cultual de עבד y mantiene la distinción con el verbo siguiente de postración. Se evita «adoró» porque mezclaría ambos niveles en una sola acción.
- source_word: הַבַּעַל
  english_pob_choice: Baal
  chosen_spanish: Baal
  alternatives_spanish:
  - el Baal
  lexicon: HALOT
  rationale: Se conserva el nombre divino propio «Baal» como en la tradición de traducción bíblica cuando funciona como designación personal de la deidad.
- source_word: וַיִּשְׁתַּחוּ לוֹ
  english_pob_choice: bowed down to him
  chosen_spanish: se postró ante él
  alternatives_spanish:
  - se inclinó ante él
  - se postró delante de él
  - adoró ante él
  lexicon: HALOT
  rationale: El verbo indica postración física y ritual. «Se postró ante él» reproduce con claridad el acto corporal y evita reducirlo a una mera reverencia.
theological_decisions:
- issue: Escalada de la apostasía de Acab respecto de Jeroboam
  english_pob_reading: 'The verse is translated to show escalation: Jeroboam''s sins were treated as insignificant, and Ahab went further into Baal worship through marriage alliance and cultic devotion.'
  chosen_spanish_reading: 'La redacción en español conserva la escalada: Acab trata como poca cosa los pecados previos y avanza hacia la alianza matrimonial y el culto a Baal.'
  alternative_spanish_readings:
  - 'La cláusula inicial podría traducirse de forma más neutra: «y era poca cosa para él andar en los pecados...»'
  - También podría sonar como simple descripción, sin matiz evaluativo fuerte.
  rationale: El hebreo tiene un tono evaluativo e irónico. Conviene mantener ese peso en español para no suavizar la acusación narrativa del libro de Reyes.
  doctrine_reference: '#1 y #3 de la filosofía de traducción; evaluación narrativa deuteronomista'
translation_notes:
  revision_awareness: El contexto inglés indica alta coincidencia con la fuente y ninguna revisión aplicada en la última pasada; por eso se mantiene la sintaxis evaluativa del inicio y la distinción entre «servir» y «postrarse».
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma general del proyecto, pero este versículo no contiene el nombre divino.
  - Se usa «Baal» como nombre propio de la deidad, coherente con el uso auditado en el inglés POB.
  - «Sidonios» y «Etbaal» siguen una transliteración funcional y legible en español.
  - 'La secuencia verbal se conserva en estilo narrativo breve: «tomó... fue y sirvió... se postró».'
