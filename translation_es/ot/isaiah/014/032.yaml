  yaml_path: translation/ot/isaiah/014/032.yaml
  text: And what will one answer the messengers of the nation? That Yahweh has founded Zion[b][a], and in her the afflicted of his people will find refuge.
  footnotes:
  - marker: a
    text: Or 'the envoys/ambassadors of the nation.' The Hebrew term can refer to diplomatic messengers.
    reason: lexical_alternative
  - marker: b
    text: Or 'the poor of his people' or 'the humble of his people.' The Hebrew can denote economic poverty, affliction, or lowliness/humility depending on context.
    reason: lexical_alternative
