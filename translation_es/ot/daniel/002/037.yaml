review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura y el sentido general del arameo: Nabucodonosor es interpelado directamente como rey y llamado «rey de reyes», y se preserva que el Dios del cielo le ha dado su reino y grandeza. Sin embargo, en la serie nominal final invierte innecesariamente las correspondencias documentadas en el rastro POB: חִסְנָא fue auditado como «might» y תָקְפָּא como «power». En español, «fuerza» y «poder» son posibles, pero el borrador asigna «poder» al primero y «fuerza» al segundo, apartándose de la lógica léxica documentada sin necesidad. También «oh rey» es comprensible, pero «oh, rey» con coma es la puntuación española más natural para un vocativo intercalado.'
  spanish_quality_summary: El español es claro y digno, pero requiere un pequeño ajuste de puntuación vocativa y una mejor alineación léxica en la enumeración final. «Tú[a], oh, rey» suena algo más natural si se escribe «Tú[a], oh rey,» o, mejor aún, manteniendo la cadencia bíblica, «Tú[a], oh rey, eres…». La frase completa fluye bien y es legible para un público eclesial amplio. Las notas son útiles y están bien ancladas.
  glossary_alignment: 'No hay conflicto con la terminología principal del proyecto. «Dios» y «Dios del cielo» están bien. No aparece Yahvé ni otros términos sensibles del glosario. La cuestión principal es de consistencia con las decisiones léxicas auditadas: conviene traducir חִסְנָא como «la fuerza» y תָקְפָּא como «el poder», preservando la secuencia documentada y una distinción razonable en español.'
  issues:
  - severity: medium
    issue: Intercambio de las correspondencias de חִסְנָא y תָקְפָּא
    rationale: El rastro inglés documenta «the might» para חִסְנָא y «the power» para תָקְפָּא. El español puede distinguirlos naturalmente como «la fuerza» y «el poder». El borrador los invierte por razones estilísticas, pero esto debilita la trazabilidad de la decisión léxica sin una necesidad fuerte.
  - severity: low
    issue: Puntuación del vocativo «oh rey»
    rationale: En español, el vocativo debe aislarse con coma. «Tú[a], oh rey, eres…» mejora la naturalidad y la corrección gráfica.
  - severity: low
    issue: Racional léxico con error tipográfico («адресamento»)
    rationale: Aunque no afecta el texto bíblico, el material de apoyo contiene un error tipográfico evidente en la explicación de אַ֣נְתְּה.
  revised_spanish_text: Tú[a], oh rey, eres el rey de reyes, a quien el Dios del cielo ha dado el reino, la fuerza, el poder y la gloria[b].
  revised_footnotes:
