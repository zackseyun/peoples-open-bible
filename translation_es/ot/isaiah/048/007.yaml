translation:
  language: es
  text: 'Ahora son creadas[a], y no desde mucho tiempo atrás; antes de hoy no habías oído de ellas, para que no digas: «Mira, yo ya las sabía».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Ahora han sido creadas, y no desde antiguo; antes de hoy no habías oído de ellas».'
    reason: lexical_alternative
lexical_decisions:
- source_word: עַתָּה
  english_pob_choice: Now
  chosen_spanish: Ahora
  alternatives_spanish:
  - Ahora mismo
  - En este momento
  lexicon: HALOT
  rationale: El adverbio temporal marca contraste con el tiempo anterior. «Ahora» es la forma natural y precisa en español para ese valor presente.
- source_word: נִבְרְאוּ
  english_pob_choice: they are created
  chosen_spanish: son creadas
  alternatives_spanish:
  - fueron creadas
  - están creadas
  - vienen a ser creadas
  lexicon: HALOT
  rationale: Se conserva el lenguaje fuerte de creación del nifal de ברא. «Son creadas» mantiene mejor que un pasado simple la fuerza de presente profético que el audit trail inglés quiso preservar con «are created».
- source_word: מֵאָז
  english_pob_choice: from long ago
  chosen_spanish: desde mucho tiempo atrás
  alternatives_spanish:
  - desde antiguo
  - desde hace mucho
  - desde antaño
  lexicon: HALOT
  rationale: La frase niega antigüedad lejana. «Desde mucho tiempo atrás» reproduce bien el contraste temporal sin sonar arcaico.
- source_word: וְלִפְנֵי יוֹם
  english_pob_choice: before today
  chosen_spanish: antes de hoy
  alternatives_spanish:
  - antes de este día
  - antes de hoy mismo
  lexicon: HALOT
  rationale: Es una expresión idiomática clara en español y conserva el punto temporal relativo del hebreo.
- source_word: שְׁמַעְתָּם
  english_pob_choice: you had not heard them
  chosen_spanish: no las habías oído
  alternatives_spanish:
  - no las oíste
  - no te las habían dicho
  lexicon: HALOT
  rationale: El pluscuamperfecto expresa bien la no recepción previa antes del momento de revelación. Se usa «las» porque el referente son las cosas mencionadas en el contexto.
- source_word: פֶּן
  english_pob_choice: lest
  chosen_spanish: para que no
  alternatives_spanish:
  - no sea que
  - a fin de que no
  lexicon: HALOT
  rationale: En español moderno «para que no» comunica con naturalidad el sentido preventivo de פֶּן sin perder la finalidad de evitar la jactancia.
- source_word: תֹּאמַר
  english_pob_choice: you should say
  chosen_spanish: digas
  alternatives_spanish:
  - dijeras
  - vayas a decir
  lexicon: HALOT
  rationale: Dentro de la construcción preventiva, el subjuntivo español expresa el resultado evitado de modo natural y fiel.
- source_word: הִנֵּה
  english_pob_choice: Look
  chosen_spanish: Mira
  alternatives_spanish:
  - Miren
  - Vean
  lexicon: HALOT
  rationale: Interjección deíctica que introduce la autocomplacencia del hablante. «Mira» es más natural que «He aquí» o «He aquí que».
- source_word: יְדַעְתִּי/ן
  english_pob_choice: I knew them
  chosen_spanish: yo las conocía
  alternatives_spanish:
  - yo las sabía
  - yo ya las conocía
  lexicon: HALOT
  rationale: La forma hebrea expresa conocimiento previo asumido; en español, el imperfecto transmite mejor ese estado de conocimiento frente al presente revelado. Se mantiene «las» por el referente plural femenino del texto hebreo.
theological_decisions:
- issue: Lenguaje de creación para las cosas anunciadas
  english_pob_reading: Retain creation language ('they are created') for the new events/things God now brings forth or announces, without softening to mere 'predicted' or 'declared.'
  chosen_spanish_reading: 'Mantener el verbo de creación: «son creadas».'
  alternative_spanish_readings:
  - fueron producidas
  - aparecen
  - son hechas realidad
  rationale: El hebreo usa ברא, y el audit trail inglés insiste en no rebajar el término a mera predicción. En español, «son creadas» conserva la iniciativa soberana de Yahvé en traer a existencia lo anunciado.
  doctrine_reference: Translation philosophy §1, §5
- issue: Referencia del objeto pronominal
  english_pob_reading: Translate with generic 'them' referring to the newly revealed things/events.
  chosen_spanish_reading: 'Usar pronombre femenino plural referido a las cosas anunciadas: «las».'
  alternative_spanish_readings:
  - esas cosas
  - ellos
  - lo
  rationale: El texto apunta a realidades/planteamientos anunciados en el contexto inmediato. «Las» evita sobreexplicar y sigue la referencia plural femenina sugerida por la forma hebrea y por el español natural.
  doctrine_reference: Translation philosophy §1, §6
translation_notes:
  revision_awareness: 'El borrador inglés recibió una revisión menor: se eliminó ''already'' por mayor cercanía al hebreo, dejando intacta la estructura. El español sigue esa decisión al no añadir un equivalente de ''ya'' o ''todavía'' que no esté exigido por el texto. También se preserva la fuerza de creación de נִבְרְאוּ y la prevención de jactancia introducida por פֶּן.'
  spanish_consistency_notes:
  - Se usa «Yahvé» según el estándar del proyecto para el nombre divino.
  - Se mantiene «creadas» para conservar la fuerza de ברא.
  - Se evita «SEÑOR» o una paráfrasis suavizante.
  - El objeto pronominal se traduce en femenino plural por el referente contextual de las cosas anunciadas.
  - La puntuación con comillas angulares sigue la norma española.
