  text: בֵּ/אדַ֣יִן דָּנִיֵּ֗אל הֲתִיב֙ עֵטָ֣א וּ/טְעֵ֔ם לְ/אַרְי֕וֹךְ רַב טַבָּחַיָּ֖/א דִּ֣י מַלְכָּ֑/א דִּ֚י נְפַ֣ק לְ/קַטָּלָ֔ה לְ/חַכִּימֵ֖י בָּבֶֽל־׃
base_translation:
  language: en
  yaml_path: translation/ot/daniel/002/014.yaml
  text: Then Daniel answered Arioch[a], the chief of the king’s executioners, with counsel and discretion—the one who had gone out to kill the wise men of Babylon.
  footnotes:
  - marker: a
    text: Or 'the captain of the king’s guard.' The Aramaic title is literally 'chief of the slaughterers,' which in royal context can denote executioners or the royal guard.
    reason: lexical_alternative
