    reason: lexical_alternative
  - marker: c
    text: Or, 'the wives and the children,' since the Hebrew word can mean either 'women' or 'wives' depending on context.
    reason: lexical_alternative
  - marker: d
    text: Or, 'was heard from afar.'
    reason: lexical_alternative
