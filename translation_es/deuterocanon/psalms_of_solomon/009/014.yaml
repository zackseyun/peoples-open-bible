  glossary_alignment: No hay conflictos con la terminología base del proyecto. 'Perdonará' para ἀφήσει, 'pecados' para ἁμαρτίας, y 'a los que han pecado' para τοῖς ἡμαρτηκόσι están bien alineados con el rastro léxico y teológico del POB. No se requieren notas.
