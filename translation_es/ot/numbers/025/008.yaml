base_translation:
  language: en
  yaml_path: translation/ot/numbers/025/008.yaml
  text: He went after the Israelite man into the chamber and pierced both of them—the Israelite man and the woman—through her belly[c][b][a]. Then the plague was stopped from upon the sons of Israel.
  footnotes:
  - marker: a
    text: Or 'the tent chamber,' 'the alcove,' or 'the pavilion'; the Hebrew term is rare and refers to an inner compartment or chamber.
    reason: lexical_alternative
  - marker: b
    text: Or 'through her abdomen.' The Hebrew refers specifically to the belly or abdominal cavity.
    reason: lexical_alternative
  - marker: c
    text: Hebrew 'the sons of Israel,' a standard covenantal expression for the people of Israel.
    reason: lexical_alternative
