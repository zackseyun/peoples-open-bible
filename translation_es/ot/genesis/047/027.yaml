translation:
  language: es
  text: Así, Israel se estableció en la tierra de Egipto, en la tierra de Gosén, y ganaron posesiones[a] en ella, y fueron fecundos y se multiplicaron mucho.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «se afianzaron en ella», «quedaron establecidos en ella» o, más literalmente, «fueron aferrados/sostenidos en ella». El verbo hebreo puede sugerir asegurar una posesión o quedar firmemente establecidos en la tierra.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֵּשֶׁב
  english_pob_choice: settled
  chosen_spanish: se estableció
  alternatives_spanish:
  - habitó
  - se asentó
  lexicon: HALOT
  rationale: El hebreo ישׁב puede expresar habitar, residir o establecerse. En este contexto narrativo, el sentido es residencia ya consolidada; «se estableció» comunica esa permanencia con un matiz de asentamiento firme y natural en español.
- source_word: יִשְׂרָאֵל
  english_pob_choice: Israel
  chosen_spanish: Israel
  alternatives_spanish:
  - Jacob
  - los israelitas
  lexicon: HALOT
  rationale: El texto hebreo dice «Israel». Mantener el nombre preserva la forma del original y también la representación del patriarca como cabeza de la familia del pacto, sin resolver artificialmente la tensión entre singular y plural.
- source_word: בְּאֶרֶץ מִצְרַיִם
  english_pob_choice: in the land of Egypt
  chosen_spanish: en la tierra de Egipto
  alternatives_spanish:
  - en Egipto
  lexicon: HALOT
  rationale: Se conserva «tierra» porque el hebreo lo expresa explícitamente y el contexto enfatiza el territorio, no solo la localización general.
- source_word: בְּאֶרֶץ גֹּשֶׁן
  english_pob_choice: in the land of Goshen
  chosen_spanish: en la tierra de Gosén
  alternatives_spanish:
  - en Gosén
  lexicon: HALOT
  rationale: Como en la frase anterior, se mantiene «tierra» para reflejar la construcción hebrea y el carácter regional de Gosén dentro de Egipto.
- source_word: וַיֵּאָחֲזוּ בָהּ
  english_pob_choice: they gained possessions in it
  chosen_spanish: ganaron posesiones en ella
  alternatives_spanish:
  - obtuvieron posesiones en ella
  - se afianzaron en ella
  - tomaron posesión de ella
  lexicon: HALOT
  rationale: El nifal de אחז aquí sugiere establecerse con firmeza mediante tenencia o posesión en la tierra. «Ganaron posesiones en ella» sigue la decisión auditada del POB inglés y preserva esa idea sin forzar un calco.
- source_word: וַיִּפְר֥וּ
  english_pob_choice: were fruitful
  chosen_spanish: fueron fructíferos
  alternatives_spanish:
  - se hicieron fructíferos
  - dieron fruto
  lexicon: HALOT
  rationale: La fórmula de «fructificar» es importante en Génesis. «Fueron fructíferos» conserva el paralelismo y el eco temático, aunque en español suene algo más formal que una paráfrasis libre.
- source_word: וַיִּרְבּ֖וּ
  english_pob_choice: multiplied
  chosen_spanish: se multiplicaron
  alternatives_spanish:
  - aumentaron
  - llegaron a ser numerosos
  lexicon: HALOT
  rationale: רבה en este paralelismo genésico se traduce bien con «se multiplicaron», que mantiene la fuerza de crecimiento numérico y la resonancia bíblica habitual.
- source_word: מְאֹד
  english_pob_choice: greatly
  chosen_spanish: mucho
  alternatives_spanish:
  - en gran manera
  - sobremanera
  lexicon: HALOT
  rationale: «Mucho» expresa con naturalidad el intensificador del hebreo. En combinación con «se multiplicaron» ofrece un cierre claro y sobrio, sin añadir tono arcaizante.
theological_decisions:
- issue: Tensión entre el sujeto singular 'Israel' y los verbos plurales posteriores
  english_pob_reading: Retain 'Israel' in the main text while allowing the plural continuation to refer to his household/descendants.
  chosen_spanish_reading: Mantener «Israel» como sujeto singular y dejar que los verbos en plural señalen a su casa y descendencia.
  alternative_spanish_readings:
  - «los israelitas» como sujeto de todo el versículo
  - «Jacob» como sujeto del versículo
  rationale: La redacción hebrea preserva la figura patriarcal singular y luego pasa al plural colectivo. En español conviene no resolver esa tensión, porque forma parte del modo narrativo-teológico del texto y del lenguaje del pacto.
  doctrine_reference: Primacía del original; conservar la tensión textual cuando el hebreo la presenta deliberadamente.
translation_notes:
  revision_awareness: 'Se incorporó la revisión más reciente del audit trail al preferir una formulación española más natural para וַיֵּאָחֲזוּ בָהּ, sin perder la idea de posesión/afianzamiento. También se evitó la forma inglesa literalizada y se mantuvo la progresión narrativa del hebreo: asentamiento, tenencia, fructificación y multiplicación.'
  spanish_consistency_notes:
  - Se usa «tierra» de manera consistente para אֶרֶץ cuando el contexto territorial es explícito.
  - Se mantiene «Israel» como nombre propio del sujeto, no como generalización a «los israelitas».
  - Se conserva el paralelismo hebreo entre «fructíferos» y «se multiplicaron».
  - La nota [a] está anclada en el texto junto a «se estableció» para justificar la ambigüedad léxica de וַיֵּאָחֲזוּ בָהּ.
