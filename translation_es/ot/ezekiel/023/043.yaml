translation:
  language: es
  text: 'Entonces dije de la que estaba agotada por adulterios[a]: «Ahora cometerán prostitución[b] con ella, y ella misma también».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'El hebreo es difícil: la cláusula después de «agotada por adulterios» también podría entenderse más literalmente como «Ahora su prostitución cometerá prostitución, aun ella», o con sujeto singular: «Ahora él cometerá prostitución con ella».'
    reason: alternative_reading
  - marker: b
    text: La imagen de adulterio/prostitución continúa la metáfora de Ezequiel para la infidelidad del pacto y la infidelidad política.
    reason: cultural_note
lexical_decisions:
- source_word: וָאֹמַר
  english_pob_choice: Then I said
  chosen_spanish: Entonces dije
  alternatives_spanish:
  - Y dije
  - Entonces yo dije
  lexicon: HALOT
  rationale: El waw consecutivo con אמר marca avance narrativo; «Entonces dije» conserva la secuencia y suena natural en español.
- source_word: לַבָּלָה
  english_pob_choice: of her who was worn out
  chosen_spanish: de ella, que estaba consumida
  alternatives_spanish:
  - de la mujer gastada
  - de la que estaba agotada
  - de la consumida
  lexicon: HALOT
  rationale: בלָה comunica la idea de estar gastada, consumida o agotada. En español, «consumida» conserva la imagen sin sonar arcaico, y el relativo explicita la referencia tal como hace el inglés auditable.
- source_word: נִאֻפִים
  english_pob_choice: by adulteries
  chosen_spanish: por adulterios
  alternatives_spanish:
  - por actos adúlteros
  - por adulterios repetidos
  lexicon: HALOT
  rationale: El plural mantiene el carácter acumulativo del término hebreo. «Adulterios» conserva la fuerza moral y metafórica del texto.
- source_word: עַת
  english_pob_choice: Now
  chosen_spanish: Ahora
  alternatives_spanish:
  - Entonces
  - En este momento
  lexicon: HALOT
  rationale: La partícula introduce el giro retórico presente; «Ahora» es breve y corresponde al valor de inmediatez.
- source_word: יזנה
  english_pob_choice: they will commit
  chosen_spanish: cometerán prostitución
  alternatives_spanish:
  - se prostituirán
  - cometerá prostitución
  - prostituirán
  lexicon: HALOT
  rationale: El hebreo es difícil en cuanto al sujeto; el inglés POB mantiene una lectura plural/indefinida. En español, «cometerán prostitución» preserva esa apertura sin decidir más de lo que el texto permite.
- source_word: תַזְנוּתֶהָ
  english_pob_choice: her prostitution
  chosen_spanish: con ella
  alternatives_spanish:
  - su prostitución
  - su fornicación
  - con su prostitución
  lexicon: HALOT
  rationale: El inglés auditado evita poner un posesivo directo antes de «prostitution» y conserva la relación mediante la construcción con ella. En español, «con ella» refleja la sintaxis relacional del hebreo y evita una formulación forzada.
- source_word: וָהִיא
  english_pob_choice: and she herself as well
  chosen_spanish: y ella misma también
  alternatives_spanish:
  - y ella también
  - e incluso ella
  - y aun ella misma
  lexicon: HALOT
  rationale: El pronombre es enfático; «ella misma también» conserva la insistencia y la inclusión sorprendente del sujeto femenino.
theological_decisions:
- issue: Metáfora de adulterio/prostitución para la infidelidad del pacto
  english_pob_reading: Retain the explicit language of adultery/prostitution rather than soften it.
  chosen_spanish_reading: Conservar el lenguaje explícito de adulterios y prostitución sin suavizarlo.
  alternative_spanish_readings:
  - Usar un lenguaje atenuado como «infidelidad»
  - Reemplazarlo por «deslealtad»
  rationale: Ezequiel usa deliberadamente un lenguaje sexual gráfico para la infidelidad del pacto y la política. Suavizarlo diluiría la tensión profética que el texto quiere producir.
  doctrine_reference: Principio de primacía del original; conservar la tensión teológica en vez de resolverla.
translation_notes:
  revision_awareness: La redacción sigue de cerca el registro auditado del inglés POB, pero vuelve al hebreo para mantener la ambigüedad sintáctica de יזנה y la relación difícil entre תַזְנוּתֶהָ y וָהִיא. Se evita una traducción mecánica del inglés donde el español exige otra estructura, sin perder el valor acumulativo de «adulterios» ni la fuerza figurada de «prostitución».
  spanish_consistency_notes:
  - Se mantiene «adulterios» y «prostitución» para el campo semántico sexual-metafórico, conforme al estilo POB.
  - «Dios/Yahvé/Mesías» no aparecen en este versículo, por lo que no hay decisiones terminológicas adicionales de ese tipo.
  - La ambigüedad del sujeto verbal se preserva mediante una formulación impersonal/plural que no resuelve indebidamente el hebreo.
