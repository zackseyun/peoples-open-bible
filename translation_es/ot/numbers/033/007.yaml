translation:
  language: es
  text: Partieron de Etam y dieron vuelta hacia Pi-hahirot[a], que está frente a Baal-zefón, y acamparon delante de Migdol.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «regresaron»; el verbo hebreo puede denotar volver o cambiar de dirección, pero aquí probablemente describe un cambio de ruta.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּסְעוּ
  english_pob_choice: They set out
  chosen_spanish: Partieron
  alternatives_spanish:
  - Salieron
  - Se pusieron en marcha
  lexicon: HALOT
  rationale: נסע en la fórmula itineraria del desierto expresa la acción de romper el campamento y avanzar. «Partieron» comunica con naturalidad esa transición de ruta en español sin perder el sentido de desplazamiento.
- source_word: מֵאֵתָם
  english_pob_choice: from Etham
  chosen_spanish: de Etam
  alternatives_spanish:
  - desde Etam
  lexicon: HALOT
  rationale: Es un nombre propio de lugar; se translitera al español como «Etam». La preposición «de» mantiene la relación de salida del lugar.
- source_word: וַיָּשָׁב
  english_pob_choice: and turned back
  chosen_spanish: y volvieron
  alternatives_spanish:
  - y regresaron
  - y dieron la vuelta
  lexicon: HALOT
  rationale: שׁוּב puede significar volver o dar vuelta en una ruta. Aquí el contexto geográfico pide el valor de cambio de dirección; «volvieron» lo expresa con sobriedad y evita una paráfrasis excesiva.
- source_word: עַל פִּי הַחִירֹת
  english_pob_choice: to Pi-hahiroth
  chosen_spanish: a Pi-hahirot
  alternatives_spanish:
  - hasta Pi-hahirot
  - hacia Pi-hahirot
  lexicon: HALOT
  rationale: El hebreo usa la expresión toponímica con preposición direccional. En español, «a Pi-hahirot» transmite destino de manera clara y natural; se conserva el nombre propio transliterado.
- source_word: אֲשֶׁר עַל פְּנֵי בַּעַל צְפוֹן
  english_pob_choice: which is opposite Baal-zephon
  chosen_spanish: que está frente a Baal-zefón
  alternatives_spanish:
  - que está opuesto a Baal-zefón
  - que mira hacia Baal-zefón
  lexicon: HALOT
  rationale: עַל־פְּנֵי indica una relación espacial de enfrente/oposición. «Frente a» es idiomático en español y conserva la orientación geográfica. Se translitera Baal-zefón como topónimo.
- source_word: וַיַּחֲנוּ
  english_pob_choice: and camped
  chosen_spanish: y acamparon
  alternatives_spanish:
  - y se acamparon
  - y levantaron campamento
  lexicon: HALOT
  rationale: חנה designa acampar o establecer campamento. «Acamparon» es la forma más directa y clara en español contemporáneo.
- source_word: לִפְנֵי מִגְדֹּל
  english_pob_choice: before Migdol
  chosen_spanish: delante de Migdol
  alternatives_spanish:
  - frente a Migdol
  - ante Migdol
  lexicon: HALOT
  rationale: לִפְנֵי marca posición relativa. «Delante de» reproduce bien la ubicación sin introducir un tono arcaizante; Migdol se conserva como nombre propio de lugar.
theological_decisions:
- issue: Topónimos con componentes teofóricos o apelativos
  english_pob_reading: The English POB transliterates place names rather than translating them.
  chosen_spanish_reading: Se conservan Etam, Pi-hahirot, Baal-zefón y Migdol como nombres propios transliterados.
  alternative_spanish_readings:
  - Traducir Migdol como «torre»
  - adaptar libremente los nombres
  rationale: El texto funciona como registro itinerario y geográfico; traducir los topónimos borraría la identificación textual y el trazado del recorrido. La transliteración mantiene la transparencia auditables con el hebreo.
  doctrine_reference: Num 33:1-49 como itinerario histórico de Israel
- issue: Relación espacial en עַל־פְּנֵי / לִפְנֵי
  english_pob_reading: which is opposite ... / before Migdol
  chosen_spanish_reading: «frente a» y «delante de»
  alternative_spanish_readings:
  - «en oposición a»
  - «ante»
  rationale: 'No hay una carga doctrinal aquí, pero sí una decisión semántica: el hebreo indica posición relativa. «Frente a» y «delante de» preservan la orientación espacial sin exagerar una confrontación teológica inexistente.'
  doctrine_reference: Geografía narrativa bíblica
translation_notes:
  revision_awareness: El borrador sigue de cerca el inglés POB auditado y el hebreo masorético, manteniendo la secuencia itineraria, los nombres propios transliterados y la ambigüedad lexical de שׁוּב en nota. No se registraron revisiones textuales en el audit trail inglés; la solución española refleja ese estado estable.
  spanish_consistency_notes:
  - 'Se mantiene la terminología toponímica transliterada de forma consistente: Etam, Pi-hahirot, Baal-zefón, Migdol.'
  - Se eligió vocabulario narrativo claro y natural («partieron», «acamparon») sin introducir paráfrasis interpretativas.
  - La nota a preserva la alternativa semántica importante de וַיָּשָׁב sin duplicar marcadores ni añadir tensiones no documentadas.
