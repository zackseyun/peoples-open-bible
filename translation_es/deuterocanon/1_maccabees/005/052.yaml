    issue: «hacia la gran llanura» subtraduce εἰς
    rationale: εἰς con acusativo en este contexto narrativo expresa movimiento hacia adentro o entrada al lugar de destino. «Hacia» puede sugerir solo dirección general y no necesariamente llegada. «A la gran llanura» preserva mejor el sentido del original y del English POB («into the great plain»).
  revised_spanish_text: Y cruzaron el Jordán a la gran llanura, frente a Baisán[a].
