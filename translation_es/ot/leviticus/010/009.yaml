translation:
  language: es
  text: Ni tú ni tus hijos contigo beberán vino ni bebida embriagante[a] cuando entren en la tienda de reunión, para que no mueran[b]. Este será un estatuto perpetuo por todas sus generaciones[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'bebida fuerte'. El término hebreo se refiere ampliamente a una bebida alcohólica distinta del vino.
    reason: lexical_alternative
  - marker: b
    text: O 'no sea que mueran'.
    reason: alternative_reading
  - marker: c
    text: O 'estatuto permanente'.
    reason: lexical_alternative
lexical_decisions:
- source_word: יַיִן
  english_pob_choice: wine
  chosen_spanish: vino
  alternatives_spanish:
  - licor de uva
  - vino fermentado
  lexicon: HALOT
  rationale: יַיִן designa el vino en sentido ordinario; 'vino' es el equivalente natural y fiel en español.
- source_word: שֵׁכָר
  english_pob_choice: strong drink
  chosen_spanish: bebida fuerte
  alternatives_spanish:
  - bebida embriagante
  - licor fuerte
  - licor embriagante
  lexicon: HALOT
  rationale: La POB inglesa opta por una expresión amplia para una bebida alcohólica distinta del vino. 'Bebida fuerte' conserva esa amplitud sin reducir el término a una clase específica como 'cerveza' o 'licor'.
- source_word: אַל תֵּשְׁתְּ
  english_pob_choice: shall not drink
  chosen_spanish: No beberás
  alternatives_spanish:
  - no debéis beber
  - no han de beber
  - no beberán
  lexicon: HALOT
  rationale: El hebreo expresa prohibición; 'No beberás' en futuro de mandato es natural en español legal/instructivo y mantiene la fuerza normativa.
- source_word: אַתָּה וּבָנֶיָך אִתָּךְ
  english_pob_choice: You and your sons with you
  chosen_spanish: tú y tus hijos contigo
  alternatives_spanish:
  - tú y tus hijos con tú
  - tú, y tus hijos contigo
  - tú y tus hijos con usted
  lexicon: HALOT
  rationale: Se preserva la inclusión explícita del destinatario y de sus hijos, junto con el matiz de compañía de 'con/contigo'. En español 'tus hijos contigo' suena más natural que repetir 'con usted' o una estructura más forzada.
- source_word: בְּבֹאֲכֶם
  english_pob_choice: when you enter
  chosen_spanish: cuando entren
  alternatives_spanish:
  - cuando entréis
  - al entrar
  - cuando ustedes entren
  lexicon: HALOT
  rationale: El infinitivo con prefijo marca circunstancia temporal; 'cuando entren' comunica bien el momento de entrada. El cambio a tercera persona plural se adapta al español sin perder la referencia colectiva.
- source_word: אֹהֶל מוֹעֵד
  english_pob_choice: the tent of meeting
  chosen_spanish: la tienda de reunión
  alternatives_spanish:
  - la tienda del encuentro
  - la tienda de asignación
  - el tabernáculo de reunión
  lexicon: HALOT
  rationale: '''Tienda de reunión'' conserva la designación técnica del santuario portátil con lenguaje claro y evita introducir un término más eclesiástico o ajeno al contexto.'
- source_word: וְלֹא תָמֻתוּ
  english_pob_choice: lest you die
  chosen_spanish: para que no mueran
  alternatives_spanish:
  - no sea que mueran
  - para que no mueran ustedes
  - lestéis morir
  lexicon: HALOT
  rationale: La POB inglesa pasó de una formulación más interpretativa a 'lest you die' por la fuerza preventiva del hebreo. En español, 'para que no mueran' transmite esa prevención de forma natural; la alternativa 'no sea que' también es posible, pero menos directa en estilo legal.
- source_word: חֻקַּת עוֹלָם
  english_pob_choice: a permanent statute
  chosen_spanish: un estatuto perpetuo
  alternatives_spanish:
  - un estatuto permanente
  - una norma perpetua
  - una disposición perpetua
  lexicon: HALOT
  rationale: La fórmula legal se conserva con 'estatuto'; 'perpetuo' mantiene el valor durativo y solemne. 'Permanente' sería claro, pero algo menos tradicional para esta fórmula.
- source_word: לְדֹרֹתֵיכֶם
  english_pob_choice: throughout your generations
  chosen_spanish: por vuestras generaciones
  alternatives_spanish:
  - a través de vuestras generaciones
  - por todas vuestras generaciones
  - de generación en generación
  lexicon: HALOT
  rationale: La expresión covenantal se vierte con un equivalente sobrio y transparente. 'Por vuestras generaciones' mantiene el alcance sucesivo sin redundancia innecesaria.
theological_decisions:
- issue: Alcance de la prohibición
  english_pob_reading: The command applies specifically to entering the tent of meeting, not to all drinking at all times.
  chosen_spanish_reading: La prohibición queda limitada al momento de entrar en la tienda de reunión, no a una abstinencia universal en todo momento.
  alternative_spanish_readings:
  - La prohibición exige abstinencia total y permanente para los sacerdotes.
  - La prohibición se refiere solo al servicio dentro de la tienda.
  rationale: 'Se conserva la restricción temporal del hebreo: la frase circunstancial limita el mandato al contexto de la entrada, sin ampliarlo más allá de lo que el texto dice.'
  doctrine_reference: Primacía del texto fuente; evitar resolver tensiones doctrinales por ampliación traductológica.
- issue: Fuerza de la advertencia de muerte
  english_pob_reading: '''lest you die'''
  chosen_spanish_reading: '''para que no mueran'' expresa la advertencia preventiva sin suavizarla.'
  alternative_spanish_readings:
  - '''no sea que mueran'''
  - '''para que no mueran ustedes'''
  rationale: El hebreo combina prohibición y consecuencia; se mantiene el tono de advertencia con una construcción natural en español, evitando tanto la suavización como una literalidad extraña.
  doctrine_reference: Preservación del valor exhortativo/legal del original.
translation_notes:
  revision_awareness: La redacción incorpora la revisión más reciente del audit trail inglés, que prefirió una formulación más directa para la cláusula de advertencia de muerte ('lest you die'). En español se optó por una equivalencia natural ('para que no mueran') que conserva la función preventiva y el tono legal del pasaje.
  spanish_consistency_notes:
  - Se mantiene 'tienda de reunión' para אֹהֶל מוֹעֵד, coherente con un registro bíblico claro y no eclesiástico.
  - Se traduce שֵׁכָר con una expresión amplia ('bebida fuerte') para no estrechar indebidamente el campo semántico.
  - Se preserva la fórmula legal 'estatuto perpetuo' como opción anotada, aunque el texto principal usa 'estatuto perpetuo' y la nota ofrece la variante tradicional 'estatuto perpetuo'.
  - El sujeto plural implícito en 'cuando entren' se entiende por el contexto 'tú y tus hijos contigo', evitando una construcción antinatural en español.
