translation:
  language: es
  text: 'Porque tu siervo hizo un voto mientras habitaba en Guesur en Aram, diciendo: «Si Yahvé[a] de veras me hace volver a Jerusalén[b], entonces serviré a Yahvé[c]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, más formalmente, «Porque tu siervo hizo voto».
    reason: lexical_alternative
  - marker: b
    text: La expresión hebrea intensifica la idea de regreso mediante la repetición del verbo «volver / hacer volver».
    reason: lexical_alternative
  - marker: c
    text: O «adoraré a Yahvé». El verbo hebreo puede denotar servicio rendido a Dios en adoración.
    reason: lexical_alternative
lexical_decisions:
- source_word: נֵדֶר נָדַר
  english_pob_choice: made a vow
  chosen_spanish: hizo un voto
  alternatives_spanish:
  - votó un voto
  - prometió solemnemente
  lexicon: HALOT
  rationale: El hebreo usa el acusativo cognado para énfasis. En español, «hizo un voto» comunica el valor idiomático de forma natural sin perder la solemnidad del acto.
- source_word: עַבְדְּךָ
  english_pob_choice: your servant
  chosen_spanish: tu siervo
  alternatives_spanish:
  - tu esclavo
  - tu servidor
  lexicon: HALOT
  rationale: En discurso cortesano dirigido al rey, la autoidentificación deferente se expresa bien como «tu siervo». «Esclavo» sería demasiado duro en este contexto, y «servidor» suena menos tradicional para esta fórmula de sumisión.
- source_word: בְּשִׁבְתִּי
  english_pob_choice: while I was dwelling
  chosen_spanish: mientras habitaba
  alternatives_spanish:
  - cuando habitaba
  - al vivir
  lexicon: HALOT
  rationale: El infinitivo constructo con preposición expresa simultaneidad o marco temporal. «Mientras habitaba» conserva el valor durativo y suena natural en español.
- source_word: בִגְשׁוּר בַּאֲרָם
  english_pob_choice: in Geshur in Aram
  chosen_spanish: en Guesur en Aram
  alternatives_spanish:
  - en Guesur de Aram
  - en Guesur, en Aram
  lexicon: HALOT
  rationale: Se mantiene la localización doble del hebreo sin sobreinterpretar la relación geográfica. «Guesur» sigue la transliteración hispana habitual del topónimo.
- source_word: לֵאמֹר
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - y dijo
  - al decir
  lexicon: HALOT
  rationale: Fórmula estándar de introducción de discurso citado; «diciendo» preserva la conexión sintáctica con el voto.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahveh
  - el SEÑOR
  lexicon: HALOT
  rationale: 'Se sigue el criterio del proyecto para el Tetragrámaton: transliterar el nombre divino como «Yahvé» y no sustituirlo por «SEÑOR».'
- source_word: יְרוּשָׁלִַם
  english_pob_choice: Jerusalem
  chosen_spanish: Jerusalén
  lexicon: HALOT
  rationale: Topónimo bíblico estándar en español.
- source_word: וְעָבַדְתִּי אֶת יְהוָה
  english_pob_choice: then I will serve Yahweh
  chosen_spanish: entonces serviré a Yahvé
  alternatives_spanish:
  - y serviré a Yahvé
  - entonces rendiré servicio a Yahvé
  lexicon: HALOT
  rationale: El verbo עבד con Dios puede implicar servicio cultual y adoración. «Serviré a Yahvé» conserva la amplitud semántica y evita imponer una lectura solo litúrgica.
theological_decisions:
- issue: Renderizado del nombre divino יהוה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahveh
  - el SEÑOR
  rationale: La POB en inglés preserva el nombre propio divino. En español, la forma doctrinalmente coherente y de uso bíblico amplio es «Yahvé», que mantiene el valor de nombre personal del pacto.
  doctrine_reference: 'DOCTRINE.md Contested terms: יהוה YHWH'
- issue: Sentido de עָבַד con referencia a Dios
  english_pob_reading: serve Yahweh
  chosen_spanish_reading: servir a Yahvé
  alternative_spanish_readings:
  - adorar a Yahvé
  - rendir culto a Yahvé
  rationale: El hebreo puede abarcar servicio religioso y adoración; «servir» conserva esa amplitud sin reducir el verbo a un único acto litúrgico.
  doctrine_reference: HALOT עבד + uso cultual en contextos de pacto
translation_notes:
  revision_awareness: El borrador sigue la revisión más reciente del inglés POB al preferir un registro algo más formal para בְּשִׁבְתִּי («mientras habitaba») y conserva la doble fuerza del hebreo en la condición con la nota sobre el verbo de retorno. También mantiene la decisión doctrinal de traducir יהוה como «Yahvé».
  spanish_consistency_notes:
  - Se usó «Yahvé» de manera consistente para el Tetragrámaton, siguiendo la política del proyecto.
  - «Tu siervo» refleja la fórmula cortesana del hebreo sin introducir el peso social de «esclavo».
  - No se capitalizó «siervo» porque no designa a Dios sino al hablante en autoidentificación deferente.
  - Se evitó «el SEÑOR» para no enmascarar el nombre divino, conforme al criterio del proyecto.
