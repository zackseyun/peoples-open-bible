review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español sigue de cerca el hebreo y la POB inglesa: mantiene el modismo de distanciamiento, conserva Yahvé para יהוה, retiene la tensión teológica de una posible orden divina a Simei, y preserva la alternativa explicativa/condicional en nota. La estructura lógica principal está bien representada.'
  spanish_quality_summary: 'El texto es generalmente claro y digno, pero tiene un punto de naturalidad importante: «¿Por qué has hecho así?» suena poco idiomático en español general. «¿Por qué has actuado así?» conserva el sentido sin paráfrasis excesiva. El resto fluye bien. También conviene corregir en la documentación interna la glosa problemática «mera permiso divino», pero eso no requiere nota en el texto bíblico.'
  glossary_alignment: 'Alineación buena con el glosario del proyecto: יהוה -> «Yahvé» correctamente; קלל -> «maldecir» se preserva con consistencia léxica; el modismo מַה לִּי וְלָכֶם se vierte de forma natural; no hay conflictos con terminología cristológica ni otros términos controlados. «Saruía» es aceptable en español, aunque «Zeruya/Zeruías» existe como alternativa; no exige cambio aquí.'
  issues:
  - severity: medium
    issue: La frase «¿Por qué has hecho así?» es poco natural en español neutro.
    rationale: Aunque refleja de cerca el hebreo, en español general suena forzada. «¿Por qué has actuado así?» o «¿Por qué hiciste eso?» comunica mejor la reprensión retórica sin perder sentido. Dado el encargo de español moderno pero digno y no acartonado, conviene ajustar.
  - severity: low
    issue: La documentación teológica incluye «mera permiso divino», mezcla lingüística/errata.
    rationale: Es un problema de calidad en la justificación, no del texto bíblico. Debe corregirse editorialmente a «mero permiso divino» si se conserva esa nota de decisiones.
