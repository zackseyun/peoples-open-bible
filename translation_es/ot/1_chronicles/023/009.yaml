translation:
  language: es
  text: 'Los hijos de Simei: Selomot[a], Haziel y Harán—tres. Estos fueron los jefes de las casas paternas de Ladán.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Selomot» sigue de cerca la forma hebrea de este nombre; otra transliteración posible en tradición bíblica es «Selomit».
