translation:
  language: es
  text: 'Habla a los hijos de Israel[a] y diles: Cuando entren en la tierra a la cual yo los estoy llevando,'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «los israelitas». El hebreo dice literalmente «los hijos de Israel».
    reason: lexical_alternative
lexical_decisions:
- source_word: דַּבֵּר
  english_pob_choice: Speak
  chosen_spanish: Habla
  alternatives_spanish:
  - Di
  - Dirige estas palabras a
  lexicon: HALOT
  rationale: El imperativo de דבר introduce una instrucción divina directa. «Habla» conserva el tono formal y la inmediatez del mandato sin sonar anticuado.
- source_word: בְּנֵי יִשְׂרָאֵל
  english_pob_choice: the sons of Israel
  chosen_spanish: los hijos de Israel
  alternatives_spanish:
  - los hijos varones de Israel
  - los israelitas
  lexicon: HALOT
  rationale: Se conserva la forma literal familiar del hebreo. En español, «hijos de Israel» es natural y mantiene la relación léxica con el original sin neutralizar el término.
- source_word: וְאָמַרְתָּ אֲלֵהֶם
  english_pob_choice: and say to them
  chosen_spanish: y diles
  alternatives_spanish:
  - y di a ellos
  - y habla con ellos
  lexicon: HALOT
  rationale: La secuencia imperativa funciona en español de manera más fluida con «diles», manteniendo el mandato directo y la relación con el primer verbo.
- source_word: בְּבֹאֲכֶם
  english_pob_choice: When you come
  chosen_spanish: Cuando entren
  alternatives_spanish:
  - Cuando lleguen
  - Al entrar
  lexicon: HALOT
  rationale: El valor temporal del infinitivo constructo con ב se expresa con naturalidad como «Cuando entren». Se preserva la idea de entrada en un territorio, no solo de aproximación.
- source_word: הָאָרֶץ
  english_pob_choice: the land
  chosen_spanish: la tierra
  alternatives_spanish:
  - el país
  - la tierra prometida
  lexicon: HALOT
  rationale: «La tierra» reproduce el término básico del hebreo. No se añade «prometida» porque no está en el texto de este versículo.
- source_word: אֲשֶׁר אֲנִי מֵבִיא אֶתְכֶם שָׁמָּה
  english_pob_choice: to which I am bringing you
  chosen_spanish: a la cual yo los llevo
  alternatives_spanish:
  - a la cual yo los estoy llevando
  - a donde yo los conduzco
  lexicon: HALOT
  rationale: El participio divino מֵבִיא señala una acción en curso o proyectada de Yahvé. «Yo los llevo» conserva la fuerza dinámica en español y evita una redundancia artificial con «allí» que el español no requiere.
theological_decisions:
- issue: Nombrar al sujeto divino implícito en «yo estoy llevando/yo los llevo»
  english_pob_reading: I am bringing you
  chosen_spanish_reading: yo los llevo
  alternative_spanish_readings:
  - yo los estoy llevando
  - yo los conduzco
  rationale: El hebreo usa un participio con sujeto explícito «yo», por lo que la acción se atribuye directamente a Yahvé. «Yo los llevo» mantiene esa agencia divina sin sobrecargar el español.
  doctrine_reference: Providencia y conducción divina de Israel hacia la tierra
- issue: Mantener el lenguaje de parentesco tribal en «hijos de Israel»
  english_pob_reading: the sons of Israel
  chosen_spanish_reading: los hijos de Israel
  alternative_spanish_readings:
  - los israelitas
  rationale: Se preserva la imagen genealógica/covenantal del hebreo y la decisión documental de la POB de no aplanar esta expresión a un etnónimo genérico cuando el texto es formulaico.
  doctrine_reference: Pacto con Israel y formulaciones identitarias del Pentateuco
translation_notes:
  revision_awareness: Se siguió el pasaje fuente de Números 15:18 y el expediente en inglés sin cambios aplicados; la redacción española busca ser publicable y auditable, conservando la fórmula imperativa, el parentesco «hijos de Israel» y la relación de destino con la tierra.
  spanish_consistency_notes:
  - Se usó «Yahvé» cuando el texto siguiente lo requiera en contexto, pero en este versículo el nombre divino no aparece explícito.
  - Se prefirió «hijos de Israel» por coherencia con la decisión léxica documentada del texto base en inglés.
  - La cláusula final se dejó sin una glosa redundante de «allí» porque el español ya expresa adecuadamente la relación de destino con «a la cual yo los llevo».
