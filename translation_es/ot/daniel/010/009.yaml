    issue: La cláusula final hebrea se ha condensado demasiado en una sola imagen.
    rationale: 'El original tiene dos expresiones: עַל פָּנַי («sobre mi rostro / rostro en tierra») y וּפָנַי אָרְצָה («y mi rostro hacia la tierra»). El borrador las fusiona en «con el rostro en tierra», lo que pierde el énfasis y la estructura del texto fuente y del POB inglés.'
  - severity: low
    issue: Puntuación algo rígida con punto y coma antes de «y cuando».
    rationale: La relación entre las dos cláusulas es continua; una coma refleja mejor el flujo narrativo y suena más natural en español bíblico contemporáneo.
  - severity: low
    issue: La nota b no está anclada al elemento léxico más preciso.
    rationale: La nota explica נִרְדָּם, por lo que conviene anclarla directamente a «sueño profundo» en la redacción revisada.
