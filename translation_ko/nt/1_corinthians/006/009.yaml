id: 1CO.6.9
reference: '1 Corinthians 6:9'
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: Ἢ οὐκ οἴδατε ὅτι ἄδικοι ⸂θεοῦ βασιλείαν⸃ οὐ κληρονομήσουσιν; μὴ πλανᾶσθε· οὔτε πόρνοι οὔτε εἰδωλολάτραι οὔτε μοιχοὶ οὔτε μαλακοὶ οὔτε ἀρσενοκοῖται
base_translation:
  language: en
  yaml_path: translation/nt/1_corinthians/006/009.yaml
  text: 'Or do you not know that the unrighteous will not inherit the kingdom of God? Do not be deceived: neither the sexually immoral[a], nor idolaters, nor adulterers, nor effeminate men[b], nor men who have sex with men'
  footnotes:
  - marker: a
    text: 'Or ''effeminate men,'' ''soft men,'' or possibly ''male prostitutes'' for μαλακοί; the term can denote softness, effeminacy, moral weakness, or in this context possibly the passive partner in male-male intercourse.'
    reason: lexical_alternative
  - marker: b
    text: 'Or ''men who practice homosexuality,'' ''sodomites,'' or more broadly ''men who engage in illicit sex with males'' for ἀρσενοκοῖται; the term is rare and debated, though many connect it to the wording of Leviticus in Greek.'
    reason: lexical_alternative
translation:
  language: ko
  text: 여러분은 의롭지 못한 자들이 하나님의 나라를 유업으로 받지 못할 것을 알지 못합니까? 미혹되지 마십시오. 음행하는 자들, 우상숭배자들, 간음하는 자들, 여성 역할로 성관계를 받는 남자들, 남자와 동침하는 남자들,
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: κληρονομήσουσιν
  english_pob_choice: will inherit
  chosen_korean: 유업으로 받지
  alternatives_korean:
  - 상속받지
  lexicon: BDAG
  rationale: 종말적 약속의 유업.
- source_word: μὴ πλανᾶσθε
  english_pob_choice: Do not be deceived
  chosen_korean: 미혹되지 마십시오
  alternatives_korean:
  - 속지 마십시오
  lexicon: BDAG
  rationale: 바울의 정형 권고.
- source_word: μοιχοὶ
  english_pob_choice: adulterers
  chosen_korean: 간음하는 자들
  alternatives_korean:
  - 간통하는 자들
  lexicon: BDAG
  rationale: 기혼자의 외부 성관계.
- source_word: μαλακοὶ
  english_pob_choice: effeminate men
  chosen_korean: 여성 역할로 성관계를 받는 남자들
  alternatives_korean:
  - 수동적 역할의 남성
  - 유약한 자들
  lexicon: BDAG
  rationale: '1세기 헬라-로마 맥락에서 μαλακός는 남성 동성 성관계의 수동적·받는 역할(특히 청소년 미동)을 가리키는 어휘로 자주 사용되었다(BDAG; Philo; Dio Chrysostom). 추상적 「유약함」(약함)도 어휘적으로 가능하나, 6:9의 죄 목록 문맥과 다음 어휘 ἀρσενοκοῖται와의 짝지음이 성적 맥락을 분명히 한다. 북극성 원칙에 따라 본문의 직설적 의미를 약화시키지 않는다.'
- source_word: ἀρσενοκοῖται
  english_pob_choice: men who have sex with men
  chosen_korean: 남자와 동침하는 남자들
  alternatives_korean:
  - 남색하는 자들
  - 남자와 자는 남자들
  lexicon: BDAG
  rationale: '바울이 새로 주조했거나 헬레니즘 유대교에서 받은 어휘로, 레 18:22·20:13 LXX의 「ἄρσενος κοίτην」(남자와의 동침)에서 유래한 합성어이다(ἀρσήν 「남자」 + κοίτη 「잠자리」). 본문은 남성 능동자(누구와 동침하는 자)를 지목한다. 「남색」 또는 「동성애」로 일반화하는 전통적 번역보다 합성어의 어휘적 기원에 충실한 「남자와 동침하는 남자들」을 채택한다.'
theological_decisions:
- issue: '6:9 μαλακοὶ와 ἀρσενοκοῖται 어휘의 직설적 번역'
  chosen_reading: μαλακοὶ = 여성 역할로 성관계를 받는 남자들; ἀρσενοκοῖται = 남자와 동침하는 남자들
  alternative_readings:
  - μαλακοὶ = 「유약한 자」 (일반적 도덕적 약함); ἀρσενοκοῖται = 「남색하는 자」 / 「동성애자」 / 일반화된 표현
  rationale: 두 어휘의 1세기 헬라-로마-유대 맥락은 동성 성관계의 두 역할(수동/능동)을 지목한다. ἀρσενοκοίτης는 레위기 18·20장의 ἄρσενος κοίτην에 기원하는 합성어로, 바울이 토라의 금지를 헬레니즘 회중에 적용한 어휘이다. 본 POB는 북극성 원칙(원저자가 청중에게 전하려 한 강하고 참된 의미를 약화시키지 않는다)에 따라, 「유약」 같은 추상화나 「남색」 같은 일반화 대신 어휘적 의미를 그대로 옮긴다. 이는 현대적 가치 판단이 아니라 1세기 본문 어휘 그대로의 의미이며, 적용·해석은 별개의 신학적 작업으로 남는다.
  doctrine_reference: 'DOCTRINE.md §1·§5: 원저자 의도; 본문의 강한 의미를 약화시키지 않는다'
