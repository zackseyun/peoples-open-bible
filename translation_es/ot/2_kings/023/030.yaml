  to: Sus servidores lo transportaron muerto desde Meguido y lo llevaron a Jerusalén[a], donde lo sepultaron en su sepultura. Entonces el pueblo de la tierra tomó a Jehoacaz, hijo de Josías, lo ungieron[b] y lo hicieron rey en lugar de su padre.
  rationale: 'Se corrige el error principal de fidelidad al hebreo: el verbo de unción debe ir en plural (''lo ungieron''). También se alisa la puntuación para un español más natural, manteniendo intacto el sentido. Se conservan las notas existentes porque reflejan bien la evidencia fuente y el razonamiento auditado.'
