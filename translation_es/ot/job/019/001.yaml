lexical_decisions:
- source_word: וַיַּעַן
  english_pob_choice: answered
  chosen_spanish: respondió
  alternatives_spanish:
  - contestó
  - respondió
  lexicon: HALOT
  rationale: ענה en esta fórmula narrativa introduce una intervención verbal en respuesta. «Respondió» conserva el sentido dialogal de «answered» en español moderno, con naturalidad y sin perder la estructura hebrea.
- source_word: אִיּוֹב
  english_pob_choice: Job
  chosen_spanish: Job
  alternatives_spanish:
  - —
  lexicon: Nombre propio / convención transliterada
  rationale: Se mantiene el nombre propio bíblico estándar en español.
- source_word: וַיֹּאמַר
  english_pob_choice: said
  chosen_spanish: dijo
  alternatives_spanish:
  - habló
  - manifestó
  lexicon: HALOT
  rationale: אמר es el verbo ordinario «decir». «Dijo» reproduce de manera directa la fórmula hebrea «respondió y dijo» sin añadir matiz innecesario.
- source_word: וַ
  english_pob_choice: Then
  chosen_spanish: Entonces
  alternatives_spanish:
  - Y
  - Luego
  lexicon: Valor discursivo del waw consecutivo
  rationale: El waw inicial marca secuencia narrativa. «Entonces» comunica esa progresión de forma natural en español actual mejor que una repetición mecánica de «Y».
translation_notes:
  revision_awareness: El texto base inglés no presenta revisiones sustantivas; se conserva la decisión auditada de reflejar la secuencia narrativa del hebreo con una construcción española natural.
  spanish_consistency_notes:
  - 'Se mantiene el patrón hebreo de fórmula introductoria del discurso: «respondió y dijo».'
  - «Entonces» se usa como equivalente discursivo del waw inicial, no como adición interpretativa.
  - No se introducen títulos teológicos ni variantes textuales, porque el versículo es una simple fórmula narrativa.
