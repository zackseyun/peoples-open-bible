revisions:
- from: Ellos[a] maldigan[b], pero tú bendecirás. Se levantan y son puestos en vergüenza[c], pero tu siervo se alegrará.
  to: Ellos maldigan[a], pero tú bendecirás. Se levantan[b] y son avergonzados, pero tu siervo se alegrará.
  rationale: Se corrigieron los anclajes de notas para que correspondan a las palabras pertinentes del texto fuente y de la auditoría inglesa. También se sustituyó «son puestos en vergüenza» por «son avergonzados» para mejorar la naturalidad del español sin perder el matiz de deshonra pública. Se eliminó la nota redundante sobre una alternativa española no necesaria.
