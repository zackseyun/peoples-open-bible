revisions:
- from: Codician campos y se apoderan de ellos[a], y casas, y se las llevan[b]; oprimen a un hombre y a su casa, a un hombre y su heredad[c].
  to: Codician campos y se apoderan de ellos[a], y casas y se las llevan[b]; oprimen a un hombre y a su casa, a un hombre y su heredad[c].
  rationale: Se conserva la fidelidad al hebreo y a las decisiones léxicas del POB, pero se corrige la puntuación para una lectura más natural y se reemplaza la alternativa coloquial o ambigua de la nota b por opciones más claras y neutras en español. No se requiere cambio de fondo en la traducción principal.
