    issue: «han recibido su herencia» debilita el valor de לָקְחוּ
    rationale: El hebreo usa לָקַח, y el expediente inglés defendió «have taken» precisamente para evitar una interpretación demasiado suave como «received». En español, «han tomado su herencia» preserva mejor la fuerza verbal sin volverse ininteligible.
  - severity: low
