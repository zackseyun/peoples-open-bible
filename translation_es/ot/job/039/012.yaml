translation:
  language: es
  text: ¿Confiarás en él, que traerá de vuelta tu grano[a] y lo juntará en tu era?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «tu semilla»; en este contexto probablemente se refiere al grano o producto cosechado del campo.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הֲתַאֲמִין
  english_pob_choice: Will you trust
  chosen_spanish: ¿Confiarás
  alternatives_spanish:
  - ¿Creerás
  - ¿Podrás confiar en
  lexicon: HALOT
  rationale: El hebreo pide aquí una pregunta sobre confiar/rely, no solo aceptar mentalmente. «Confiarás» reproduce bien la idea práctica de depender de él.
- source_word: בּוֹ
  english_pob_choice: him
  chosen_spanish: en él
  alternatives_spanish:
  - en eso
  - en ello
  lexicon: HALOT
  rationale: El sufijo masculino singular se refiere al animal mencionado; en español conviene mantener la referencia personal con «en él».
- source_word: כִּי
  english_pob_choice: that
  chosen_spanish: para que
  alternatives_spanish:
  - que
  - porque
  lexicon: HALOT
  rationale: En este contexto introduce el contenido de la confianza con valor final/resultativo en español. «Para que» da una relación natural sin forzar el enlace causal.
- source_word: ישוב
  english_pob_choice: will bring back
  chosen_spanish: traiga de vuelta
  alternatives_spanish:
  - vuelva a traer
  - regrese con
  lexicon: HALOT
  rationale: El verbo שׁוּב aquí tiene fuerza causativa respecto del grano; «traiga de vuelta» comunica bien el movimiento de retorno desde el campo.
- source_word: זַרְעֶךָ
  english_pob_choice: your grain
  chosen_spanish: tu grano
  alternatives_spanish:
  - tu semilla
  - tu cosecha
  lexicon: HALOT
  rationale: Aunque el hebreo dice literalmente «tu semilla», el audit trail inglés ya documenta el sentido agrícola contextual de grano/produce. «Tu grano» preserva ese valor metonímico en español sin sonar artificial.
- source_word: גָּרְנְךָ
  english_pob_choice: your threshing floor
  chosen_spanish: tu era
  alternatives_spanish:
  - tu era de trilla
  - tu granero
  lexicon: HALOT
  rationale: גֹּרֶן es la era de trilla, no un edificio de almacenamiento. En español bíblico actual «era» es claro y fiel; «era de trilla» sería más explícito, pero menos fluido.
- source_word: יֶאֱסֹף
  english_pob_choice: gather it to
  chosen_spanish: lo recoja
  alternatives_spanish:
  - lo junte
  - lo reúna
  lexicon: HALOT
  rationale: אָסַף significa recoger/juntar. En español, el complemento locativo ya está expresado por «en tu era», de modo que «lo recoja» transmite el acto de reunir la cosecha sin redundancia.
translation_notes:
  revision_awareness: La revisión inglesa cambió «seed» por «grain» para hacer explícito el sentido agrícola; la versión española sigue ese ajuste contextual, pero conserva el valor lexical de fondo mediante la nota, sin traducir mecánicamente desde el inglés.
  spanish_consistency_notes:
  - Se evita «SEÑOR» porque el versículo no contiene el nombre divino.
  - Se prefirió «era» para גֹּרֶן por precisión agrícola y naturalidad en español.
  - La pregunta mantiene el tono retórico del hebreo sin añadir énfasis interpretativo.
