review_pass:
  verdict: revise
  source_alignment_summary: El borrador refleja en gran parte el sentido del hebreo y mantiene bien la tensión del singular en בְּיוֹם הִמָּשַׁח אֹתוֹ con 'el día de su unción'. También preserva la medida, la división por mitades y el uso de 'Yahvé'. Sin embargo, קָרְבַּן es más amplio que 'sacrificio' y aquí conviene 'ofrenda' para alinearse mejor con el hebreo y con la decisión auditada en inglés. Además, el texto principal dice solo 'ofrenda' donde el hebreo/POB especifican מִנְחָה como 'ofrenda de cereal'; esa especificación debe ir en el texto, no relegarse a nota.
  spanish_quality_summary: 'El español es claro y legible, pero tiene dos puntos mejorables: ''Este es[a]'' no necesita nota, y ''como ofrenda regular de cereal'' suena menos natural que ''como ofrenda regular de cereal'' o ''como una ofrenda regular de cereal'' integrado correctamente tras ''flor de harina''. La repetición ''la mitad de ella'' es aceptable, aunque ''la mitad de esta'' también sería posible; no requiere cambio. El conjunto necesita una reparación menor para precisión léxica y mejor economía de notas.'
  glossary_alignment: Alineación parcial. Se usa correctamente 'Yahvé' para יהוה. Pero קָרְבַּן debería ir como 'ofrenda' y מִנְחָה como 'ofrenda de cereal' en el texto principal. No hay conflicto con otras pautas terminológicas del proyecto.
  issues:
  - severity: medium
    issue: '''sacrificio'' para קָרְבַּן'
    rationale: קָרְבַּן es un término sacrificial amplio; 'ofrenda' corresponde mejor al hebreo y al rastro de auditoría inglés ('offering'). 'Sacrificio' estrecha innecesariamente el sentido.
  - severity: medium
    issue: La especificación 'de cereal' para מִנְחָה quedó desplazada a nota
    rationale: El hebreo distingue explícitamente מִנְחָה, y la POB inglesa la traduce en el texto como 'grain offering'. El español principal debe decir 'ofrenda de cereal', no solo 'ofrenda'.
  - severity: low
    issue: Nota [a] innecesaria sobre 'Este es'
    rationale: No preserva una alternativa significativa del original ni resuelve una ambigüedad relevante en español. Añade ruido al aparato crítico.
  - severity: low
    issue: Nota [b] sobre 'Yahvé' innecesaria
    rationale: Es una decisión terminológica general del proyecto, no una nota contextual del versículo. No hace falta anclarla aquí.
  revised_spanish_text: 'Esta es la ofrenda de Aarón y de sus hijos, que ellos presentarán a Yahvé el día de su unción[a]: la décima parte de un efa de flor de harina como ofrenda regular de cereal, la mitad de ella por la mañana y la mitad de ella por la tarde.'
  revised_footnotes:
  - marker: a
    text: 'O: "el día en que él es ungido". El hebreo tiene pronombre singular ("lo"/"él") aunque el versículo menciona a "Aarón y sus hijos".'
    reason: alternative_reading
  revision_rationale: Se corrige 'sacrificio' a 'ofrenda' para reflejar mejor קָרְבַּן, y se incorpora 'de cereal' al texto principal para representar explícitamente מִנְחָה conforme al original y a la auditoría inglesa. Se eliminan notas no esenciales y se conserva una sola nota útil sobre la tensión del pronombre singular en la frase de la unción.
