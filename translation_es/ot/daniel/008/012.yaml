base_translation:
  language: en
  yaml_path: translation/ot/daniel/008/012.yaml
  text: And a host was given over with the regular burnt offering because of transgression[a]; and it cast truth to the ground[c][b], and it acted and prospered.
  footnotes:
  - marker: a
    text: Or 'the daily sacrifice' or 'the continual offering.' Hebrew tamid refers to the regular temple offering.
    reason: lexical_alternative
  - marker: b
    text: Or 'against the regular burnt offering' for the preposition linking 'host' and 'the regular burnt offering'; the Hebrew construction is difficult.
    reason: alternative_reading
  - marker: c
    text: The Hebrew verbs are feminine singular; the precise referent is compressed in the vision and may point to the hostile power symbolized in the preceding context.
    reason: alternative_reading
