translation:
  language: es
  text: La bendición de un padre afianza raíces[a], pero la maldición de una madre desarraiga una planta.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Paralelo griego: «Porque la bendición de un padre fortalece las casas de los hijos, pero la maldición de una madre arranca los cimientos». El testimonio hebreo usa en cambio imágenes agrícolas: «raíz» y «planta».'
    reason: alternative_reading
lexical_decisions:
- source_word: בִּרְכַת / εὐλογία
  english_pob_choice: blessing
  chosen_spanish: bendición
  alternatives_spanish:
  - bendición pronunciada
  - bendición dicha sobre
  lexicon: HALOT; LXX εὐλογία
  rationale: «Bendición» comunica de manera natural el sustantivo del hebreo y del paralelo griego, sin añadir explicaciones ajenas al proverbio. Mantiene el valor performativo de una bendición paterna.
- source_word: אָב / πατρὸς
  english_pob_choice: father's
  chosen_spanish: de un padre
  alternatives_spanish:
  - paterna
  - del padre
  lexicon: HALOT; LXX πατρός
  rationale: La construcción posesiva refleja bien el genitivo hebreo y el griego, y suena natural en español. Se evita «paterna» por ser más abstracto y menos proverbial.
- source_word: תְּיַסֵּד / στηρίζει
  english_pob_choice: establishes
  chosen_spanish: establece
  alternatives_spanish:
  - funda
  - hace firme
  - afianza
  lexicon: HALOT; LXX στηρίζει
  rationale: «Establece» reproduce la idea de asentar firmemente o dar firmeza. Conserva el tono proverbial y puede abarcar tanto la imagen hebrea de enraizar como la griega de fortalecer.
- source_word: שֹׁרֶשׁ
  english_pob_choice: roots
  chosen_spanish: raíces
  alternatives_spanish:
  - raíz
  - cimientos
  lexicon: HALOT
  rationale: El hebreo usa la imagen agrícola de «raíz». En español, el plural «raíces» sigue el ajuste ya reconocido en la revisión inglesa y suena natural con «establece» y «arranca».
- source_word: וְקִלְלַת / κατάρα
  english_pob_choice: but a mother's curse
  chosen_spanish: pero la maldición de una madre
  alternatives_spanish:
  - y la maldición de una madre
  - mas la maldición de una madre
  lexicon: HALOT; LXX κατάρα
  rationale: «Pero» hace explícito el contraste poético del paralelismo antitético. «Maldición» es el equivalente directo y sobrio para el término de ambos testigos.
- source_word: אֵם / μητρὸς
  english_pob_choice: mother's
  chosen_spanish: de una madre
  alternatives_spanish:
  - materna
  - de la madre
  lexicon: HALOT; LXX μητρός
  rationale: La posesión simple conserva el paralelismo padre/madre y evita un estilo demasiado literario. Respeta la referencia singular del hebreo y del griego.
- source_word: תִּנְתּשׁ / ἐκριζοῖ
  english_pob_choice: uproots
  chosen_spanish: arranca
  alternatives_spanish:
  - desarraiga
  - arranca de raíz
  - arranca y desaloja
  lexicon: HALOT; LXX ἐκριζοῖ
  rationale: «Arranca» es idiomático y suficientemente fuerte para la imagen de sacar de raíz. «Desarraiga» también sería válido, pero «arranca» mantiene la vivacidad proverbial y funciona bien con el sustantivo «planta».
- source_word: נֶטַע
  english_pob_choice: a plant
  chosen_spanish: una planta
  alternatives_spanish:
  - un plantío
  - lo plantado
  - un brote
  lexicon: HALOT
  rationale: «Planta» conserva la imagen agrícola del hebreo y es el paralelo natural de «raíces» en español. No se fuerza un sentido más abstracto que el del texto base.
theological_decisions:
- issue: Preferencia entre la imagen hebrea y la paráfrasis griega
  english_pob_reading: 'The main text keeps the Hebrew agricultural imagery: "establishes roots ... uproots a plant," with the Greek parallel noted as an alternative reading.'
  chosen_spanish_reading: 'El texto principal conserva la imagen agrícola hebrea: «establece raíces ... arranca una planta», con el paralelo griego señalado en nota.'
  alternative_spanish_readings:
  - «fortalece las casas de los hijos ... arranca los cimientos»
  rationale: En Sirácides, donde el hebreo está atestiguado con alta confianza, la lectura principal debe seguir el testimonio hebreo. El griego se valora como variante real e informativa, pero no reemplaza la imagen original en el cuerpo del texto.
  doctrine_reference: Principio de primacía del testimonio original; política editorial POB para Sirácides.
translation_notes:
  revision_awareness: La redacción española sigue la revisión inglesa más reciente que cambió «root» por «roots» para reflejar mejor el sentido colectivo de שֹׁרֶשׁ. Por eso se optó por «raíces» en plural y se mantuvo la oposición con «una planta». También se consultó el paralelo griego, pero la lectura hebrea gobierna el texto principal.
  spanish_consistency_notes:
  - Se conserva «bendición» y «maldición» como equivalentes directos y claros.
  - Se evita sustituir la imagen hebrea por «cimientos» en el texto principal; esa opción queda sólo en la nota por el paralelo griego.
  - El verbo «establece» mantiene la fuerza de יסד/στηρίζει sin sonar excesivamente técnico.
  - «Raíces» en plural armoniza con el ajuste de revisión del inglés y con el plural natural del proverbio en español.
