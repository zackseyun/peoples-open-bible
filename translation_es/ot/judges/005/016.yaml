review_pass:
  verdict: revise
  source_alignment_summary: El borrador capta bien la estructura general del hebreo y conserva la imagen pastoral de מִשְׁפְּתַיִם como 'apriscos'. Sin embargo, no sigue la revisión auditada de la POB inglesa en לִפְלַגּוֹת רְאוּבֵן, donde el texto principal pasó a 'For the divisions of Reuben'; 'Entre las divisiones de Rubén' introduce un matiz espacial distinto. Además, 'investigaciones del corazón' suena demasiado técnico y moderno para חִקְרֵי לֵב, que en este contexto poético se expresa mejor como 'profundas reflexiones del corazón' o similar.
  spanish_quality_summary: El español es comprensible y digno, pero 'investigaciones del corazón' resulta poco natural en registro bíblico y puede sugerir pesquisa formal en lugar de deliberación interior. También conviene ajustar la nota al sentido alternativo completo preservado en la auditoría inglesa y pulir su redacción. El resto del verso fluye bien en español neutral.
  glossary_alignment: No hay conflictos con la terminología global del proyecto. La principal cuestión léxica es mantener 'divisiones' en el texto y la alternativa 'arroyos/cauces' en nota, conforme a la rationale documentada. Para חִקְרֵי לֵב, una solución española más idiomática debe conservar la fuerza poética de búsqueda interior sin caer en tecnicismo.
  issues:
  - severity: medium
    issue: La frase 'Entre las divisiones de Rubén' no refleja la revisión auditada 'For the divisions of Reuben'.
    rationale: Aunque el hebreo admite complejidad semántica, la POB inglesa documentó una revisión deliberada desde una lectura locativa hacia una formulación más formal con 'for'. El español debe seguir esa decisión salvo razón fuerte, que aquí no supera la auditoría existente.
  - severity: medium
    issue: '''Investigaciones del corazón'' es poco idiomático y demasiado técnico para חִקְרֵי לֵב.'
    rationale: La expresión hebrea es poética y denota sondeos o reflexiones interiores. 'Investigaciones' en español suena forense o académica y debilita la legibilidad e inteligibilidad eclesial.
  - severity: low
    issue: La nota al pie no preserva con claridad la alternativa completa asociada a la cláusula final.
    rationale: La auditoría inglesa da la alternativa como una cláusula completa ('By the streams of Reuben there were great searchings of heart'), no solo una frase nominal. Conviene reflejar esa alternativa de modo más natural en español.
  revised_spanish_text: ¿Por qué te sentaste entre los apriscos, para oír los silbos de los rebaños? Porque en las divisiones[a] de Rubén hubo grandes reflexiones del corazón.
  revised_footnotes:
