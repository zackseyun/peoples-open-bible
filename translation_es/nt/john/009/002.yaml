translation:
  language: es
  text: 'Y le preguntaron sus discípulos, diciendo: «Rabí, ¿quién pecó, este hombre o sus padres, para que naciera ciego[a]?»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «de modo que nació ciego». El griego de la cláusula puede expresar la relación supuesta de propósito o de resultado en la pregunta de los discípulos.'
    reason: alternative_reading
lexical_decisions:
- source_word: ἠρώτησαν
  english_pob_choice: asked
  chosen_spanish: le preguntaron
  alternatives_spanish:
  - le hicieron una pregunta
  - lo interrogaron
  lexicon: BDAG
  rationale: El aoristo de ἐρωτάω aquí introduce una pregunta directa a Jesús. «Le preguntaron» es natural en español y conserva la sencillez narrativa sin añadir intensidad.
- source_word: μαθηταὶ
  english_pob_choice: disciples
  chosen_spanish: discípulos
  alternatives_spanish:
  - seguidores
  - alumnos
  lexicon: BDAG
  rationale: «Discípulos» es el equivalente establecido para μαθηταί en el relato evangélico y mantiene la relación maestro-seguidor.
- source_word: λέγοντες
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - y dijeron
  lexicon: BDAG
  rationale: El participio se vierte de modo natural como «diciendo», preservando el flujo narrativo del griego.
- source_word: Ῥαββί
  english_pob_choice: Rabbi
  chosen_spanish: Rabí
  alternatives_spanish:
  - Rabí, Maestro
  lexicon: BDAG
  rationale: Se conserva el vocativo judío como forma transliterada en español. «Rabí» es comprensible y respeta el color histórico del texto.
- source_word: τίς
  english_pob_choice: who
  chosen_spanish: quién
  alternatives_spanish:
  - cuál
  lexicon: BDAG
  rationale: La interrogativa pide identificar al responsable. «Quién» es el equivalente idiomático directo.
- source_word: ἥμαρτεν
  english_pob_choice: sinned
  chosen_spanish: pecó
  alternatives_spanish:
  - cometió pecado
  - hizo pecado
  lexicon: BDAG
  rationale: El aoristo de ἁμαρτάνω se traduce con el verbo común «pecó», que mantiene la fuerza moral y narrativa del término.
- source_word: οὗτος
  english_pob_choice: this man
  chosen_spanish: este hombre
  alternatives_spanish:
  - este
  - él
  lexicon: BDAG
  rationale: Aunque el griego dice literalmente «este», en contexto se refiere al hombre ciego. «Este hombre» es claro y natural en español.
- source_word: γονεῖς
  english_pob_choice: parents
  chosen_spanish: padres
  alternatives_spanish:
  - progenitores
  - papá y mamá
  lexicon: BDAG
  rationale: γονεῖς designa a los padres. «Padres» es la forma breve y exacta en español.
- source_word: ἵνα
  english_pob_choice: that
  chosen_spanish: para que
  alternatives_spanish:
  - de modo que
  - a fin de que
  lexicon: BDAG
  rationale: En esta pregunta, ἵνα expresa la relación asumida de causa/resultado desde la perspectiva de los discípulos. «Para que» permite conservar esa relación sin cerrar la cuestión teológica.
- source_word: τυφλὸς
  english_pob_choice: blind
  chosen_spanish: ciego
  alternatives_spanish:
  - sin vista
  lexicon: BDAG
  rationale: El adjetivo predicativo describe la condición del nacimiento. «Ciego» es el equivalente directo y claro.
- source_word: γεννηθῇ
  english_pob_choice: should be born
  chosen_spanish: naciera
  alternatives_spanish:
  - fuera nacido
  - hubiera nacido
  lexicon: BDAG
  rationale: El subjuntivo aoristo pasivo gobernado por ἵνα se expresa de forma natural en español como «naciera». El sentido queda en una subordinada final/resultativa sin forzar una formulación artificial.
theological_decisions:
- issue: Relación causal entre el pecado y la ceguera congénita expresada por ἵνα
  english_pob_reading: Preserve the disciples' assumed linkage without asserting narrator-approved causation.
  chosen_spanish_reading: «para que naciera ciego» mantiene la relación que los discípulos suponen, sin convertirla en una afirmación doctrinal del narrador.
  alternative_spanish_readings:
  - «de modo que naciera ciego»
  - «para que fuera nacido ciego»
  - «como resultado de eso, naciera ciego»
  rationale: La frase reporta la pregunta de los discípulos; la traducción debe conservar su marco conceptual sin resolverlo. Así se respeta la tensión teológica del pasaje.
  doctrine_reference: Preservar la tensión teológica sin resolverla
- issue: Tratamiento de Ῥαββί como vocativo judío
  english_pob_reading: Retain Rabbi as a historically textured address form.
  chosen_spanish_reading: «Rabí» conserva la forma de trato judía y evita sustituirla por un equivalente interpretativo como «Maestro».
  alternative_spanish_readings:
  - «Maestro»
  - «Rabino»
  rationale: «Rabí» es reconocible en español bíblico y mantiene el matiz cultural del original sin domesticarlo.
  doctrine_reference: Respeto del color histórico-textual
translation_notes:
  revision_awareness: Se corrigió la validación anterior anclando la nota [a] directamente en el texto español sobre «ciego[a]» y manteniendo la alternativa de lectura sobre ἵνα/γεννηθῇ. No se hicieron otros cambios sustanciales respecto al audit trail, salvo ajustar la redacción española para que sea natural y publicable.
  spanish_consistency_notes:
  - Se mantiene «Rabí» como transliteración del vocativo, coherente con el contexto judío del Evangelio.
  - «Pecó» conserva la fuerza moral de ἥμαρτεν sin perífrasis innecesaria.
  - «Para que naciera ciego» preserva la ambigüedad causal/final del griego y evita resolver la implicación teológica.
  - El añadido de la nota al pie está anclado en el propio texto para cumplir la validación de marcadores.
