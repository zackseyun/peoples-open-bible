translation:
  language: es
  text: 'Entonces me dijo[a]: «Estas son las cocinas[b], donde los ministros[c] del templo hervirán el sacrificio del pueblo».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Y me dijo».'
    reason: alternative_reading
  - marker: b
    text: 'O: «los cuartos de cocina»; o más literalmente: «la casa de los que cocinan/hierven».'
    reason: lexical_alternative
  - marker: c
    text: 'O: «los siervos» o «los asistentes del templo».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר אֵלָי
  english_pob_choice: Then he said to me
  chosen_spanish: Entonces me dijo
  alternatives_spanish:
  - Y me dijo
  - Entonces dijo a mí
  lexicon: HALOT
  rationale: El waw consecutivo marca avance narrativo; «Entonces» conserva esa progresión de manera natural en español. El objeto indirecto «me» expresa con claridad אֵלַי.
- source_word: אֵלֶּה
  english_pob_choice: These are
  chosen_spanish: Estas son
  alternatives_spanish:
  - Estas
  - Éstas son
  lexicon: HALOT
  rationale: El español requiere cópula explícita para identificar el referente. «Estas son» mantiene la fuerza identificadora del hebreo.
- source_word: בֵּית הַמְבַשְּׁלִים
  english_pob_choice: the kitchens
  chosen_spanish: las cocinas
  alternatives_spanish:
  - los cuartos de cocina
  - la casa de los que cocinan
  lexicon: HALOT
  rationale: Aunque literalmente es «casa de los que cocinan/hierven», en este contexto arquitectónico del templo el plural funcional resulta natural. «Cocinas» preserva la idea de espacios destinados a preparar los sacrificios.
- source_word: מְבַשְּׁלִים / יְבַשְּׁלוּ
  english_pob_choice: shall boil
  chosen_spanish: cocinarán
  alternatives_spanish:
  - hervirán
  - prepararán por cocción
  lexicon: HALOT
  rationale: El verbo בָּשַׁל puede referirse a cocinar por cocción o hervir. En español, «cocinarán» comunica la función del lugar sin forzar un matiz de ebullición que podría sonar artificial; se conserva el sentido sacrificial de preparación por cocción.
- source_word: מְשָׁרְתֵי הַבַּיִת
  english_pob_choice: the ministers of the temple
  chosen_spanish: los ministros del templo
  alternatives_spanish:
  - los siervos del templo
  - los servidores del templo
  - los ministros de la casa
  lexicon: HALOT
  rationale: מְשָׁרְתִים indica servicio oficial/cultual. «Ministros» refleja ese carácter formal en español sin perder el contexto del templo; «del templo» explicita que הַבַּיִת aquí es el complejo del templo.
- source_word: זֶבַח הָעָם
  english_pob_choice: the people's sacrifice
  chosen_spanish: el sacrificio del pueblo
  alternatives_spanish:
  - el sacrificio del pueblo
  - la ofrenda del pueblo
  - el sacrificio del pueblo
  lexicon: HALOT
  rationale: זֶבַח es un sacrificio sacrificial concreto, y el genitivo con הָעָם indica pertenencia/origen. «El sacrificio del pueblo» conserva la relación constructa y suena natural en español.
- source_word: שָׁם
  english_pob_choice: where
  chosen_spanish: donde
  alternatives_spanish:
  - allí
  lexicon: HALOT
  rationale: Aunque el hebreo dice literalmente «allí», en español relativo resulta más idiomático decir «donde» al referirse al lugar funcional de cocción.
translation_notes:
  revision_awareness: Versión revisada a partir del texto hebreo WLC y del rastro auditado en inglés. Se mantuvo la equivalencia funcional del lugar como espacio de preparación de los sacrificios, pero se prefirió una solución española más natural que «hervirán» para evitar un tecnicismo innecesariamente restrictivo en este verso. Se preservó la identificación cultual del sujeto como ministros del templo y la relación posesiva del sacrificio con el pueblo.
  spanish_consistency_notes:
  - Se usa «templo» para הַבַּיִת en este contexto visionario, coherente con el audit trail inglés.
  - Se evita «SEÑOR» porque el verso no contiene el Tetragrámaton ni un título divino.
  - Se mantiene «sacrificio» para זֶבַח por su fuerza cultual específica.
  - Se emplea «cocinas» en sentido arquitectónico-funcional, no como simple lugar doméstico.
