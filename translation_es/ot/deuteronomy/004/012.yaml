translation:
  language: es
  text: Entonces Yahvé les habló de en medio del fuego[a]. Ustedes oyeron el sonido de palabras[b], pero no vieron forma alguna[c]—solo una voz.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «desde el fuego».
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «el sonido de palabras»; alternativamente, «el sonido del habla».'
    reason: lexical_alternative
  - marker: c
    text: O «semejanza» o «apariencia». El hebreo enfatiza que no se vio ninguna representación visible.
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  - el SEÑOR
  lexicon: HALOT
  rationale: Se sigue el valor del nombre propio del pacto, como en el POB en inglés, y la norma del proyecto para el Tetragrámaton. 'Yahvé' preserva el nombre sin sustituirlo por un título enmascarado.
- source_word: וַיְדַבֵּר
  english_pob_choice: spoke
  chosen_spanish: habló
  alternatives_spanish:
  - dijo
  - se dirigió
  lexicon: HALOT
  rationale: El verbo דבר comunica habla solemne y narrativa. 'Habló' suena natural en español y conserva el registro de revelación divina mejor que un simple 'dijo'.
- source_word: מִתּוֹךְ הָאֵשׁ
  english_pob_choice: from the midst of the fire
  chosen_spanish: desde en medio del fuego
  alternatives_spanish:
  - desde el fuego
  - de en medio del fuego
  - desde dentro del fuego
  lexicon: HALOT
  rationale: '''מִתּוֹךְ'' expresa procedencia desde el interior/medio de algo. ''Desde en medio del fuego'' conserva la imagen auditiva y espacial del hebreo, aunque suene levemente más marcado que una preposición simple.'
- source_word: קוֹל דְּבָרִים
  english_pob_choice: the sound of words
  chosen_spanish: la voz de palabras
  alternatives_spanish:
  - el sonido de palabras
  - la voz de discursos
  - el sonido de la palabra
  lexicon: HALOT
  rationale: '''קוֹל'' puede ser ''voz'' o ''sonido''. El POB inglés prefirió ''sound of words'' para preservar la construcción. En español, ''voz de palabras'' conserva la relación literal y el carácter articulado del habla, sin reducirlo a un ruido indefinido.'
- source_word: שֹׁמְעִים
  english_pob_choice: heard
  chosen_spanish: oyeron
  alternatives_spanish:
  - escucharon
  - estaban oyendo
  lexicon: HALOT
  rationale: Aunque el hebreo está en participio, en este contexto narrativo funciona como descripción pasada. 'Oyeron' es idiomático y reproduce la percepción auditiva consumada.
- source_word: תְמוּנָה
  english_pob_choice: form
  chosen_spanish: forma
  alternatives_spanish:
  - figura
  - imagen
  - semejanza
  lexicon: HALOT
  rationale: '''תְמוּנָה'' designa una forma o representación visible. ''Forma'' es la opción más concisa y fiel para el contraste teológico con la audición de la voz.'
- source_word: אֵינְכֶם רֹאִים
  english_pob_choice: saw no
  chosen_spanish: no vieron
  alternatives_spanish:
  - no estaban viendo
  - no contemplaron
  lexicon: HALOT
  rationale: La construcción niega la percepción visual. 'No vieron' mantiene la claridad en español y empareja bien con 'oyeron'.
- source_word: זוּלָתִי קוֹל
  english_pob_choice: only a voice
  chosen_spanish: solo una voz
  alternatives_spanish:
  - excepto una voz
  - nada más que una voz
  lexicon: HALOT
  rationale: זוּלָתִי marca excepción. 'Solo una voz' conserva la fuerza de exclusión y mantiene el contraste con la ausencia de forma visible.
theological_decisions:
- issue: Contraste entre revelación audible y ausencia de forma visible
  english_pob_reading: Retain the contrast between audible revelation and absence of visible form without expanding it into a doctrinal paraphrase.
  chosen_spanish_reading: Conservar el contraste entre la palabra oída y la ausencia de una forma visible, sin ampliar el verso con explicaciones doctrinales ajenas.
  alternative_spanish_readings:
  - Ustedes oyeron su voz, pero no vieron ninguna representación visible
  - Ustedes oyeron el sonido de palabras, pero no vieron semejanza alguna
  rationale: El hebreo afirma que Israel oyó la palabra de Yahvé sin ver una manifestación visual. La traducción mantiene esa tensión teológica sin suavizarla ni sustituirla por una paráfrasis doctrinal.
  doctrine_reference: 'Deuteronomio 4:12; Translation philosophy #3; YHWH default rendering'
translation_notes:
  revision_awareness: 'Se observa alta concordancia con el audit trail en inglés; no hubo cambios sustantivos en la última revisión. La traducción española sigue la misma decisión central: preservar el contraste entre el habla audible de Yahvé y la ausencia de forma visible.'
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' como forma del nombre divino, conforme al estándar del proyecto.
  - '''Forma'' se usa de manera consistente para תְמוּנָה en contraste con ''voz''.'
  - '''Voz de palabras'' conserva la literalidad suficiente del hebreo sin caer en un calco opaco.'
  - Los marcadores de nota al pie aparecen solo donde hay notas asociadas y en el orden requerido.
