translation:
  language: es
  text: 'Y sucedió, mientras él le hablaba, que el rey le dijo: «¿Te hemos puesto[a] como consejero del rey? ¡Deja ya! ¿Por qué han de golpearte?[b]». Entonces el profeta se detuvo y dijo: «Sé que Dios ha determinado destruirte[c], porque has hecho esto y no has escuchado mi consejo».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «¿Te hemos nombrado consejero del rey?»'
    reason: lexical_alternative
  - marker: b
    text: 'El hebreo dice literalmente: «¿por qué han de golpearte?». El sujeto es un plural indefinido, probablemente quienes ejecutarían el castigo por mandato del rey.'
    reason: lexical_alternative
  - marker: c
    text: 'O: «Dios ha planeado destruirte». El verbo hebreo se relaciona literalmente con consejo o plan.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הַלְיוֹעֵץ
  english_pob_choice: the king’s adviser
  chosen_spanish: consejero del rey
  alternatives_spanish:
  - asesor del rey
  - consejero real
  lexicon: HALOT
  rationale: 'La forma hebrea funciona como una designación del cargo en la reprensión del rey: «¿Te hemos puesto como consejero del rey?». «Consejero del rey» conserva la relación con el monarca y resulta natural en español. «Asesor» es posible, pero menos solemne; «consejero real» suena más formal, aunque puede desplazar el foco al cargo en vez de la pregunta retórica.'
- source_word: נְתַנּוּךָ
  english_pob_choice: Have we made you
  chosen_spanish: ¿Te hemos puesto
  alternatives_spanish:
  - ¿Te hemos nombrado
  - ¿Te hemos establecido
  lexicon: HALOT
  rationale: נתן con sujeto de primera plural y objeto de segunda masculino singular comunica la idea de colocar a alguien en una función. «Puesto» reproduce bien el gesto de asignación y suena natural en la pregunta retórica del rey. «Nombrado» también es viable, pero un poco más administrativo.
- source_word: חֲדַל
  english_pob_choice: Stop!
  chosen_spanish: ¡Calla!
  alternatives_spanish:
  - ¡Basta!
  - ¡Cesa!
  lexicon: HALOT
  rationale: El imperativo busca cortar la intervención del profeta. En español, «¡Calla!» transmite con fuerza el mandato de dejar de hablar, y encaja con el contexto inmediato de reprimenda. «¡Basta!» sería más general; «¡Cesa!» es correcto pero más marcado y menos natural.
- source_word: לָמָּה יַכּוּךָ
  english_pob_choice: Why should they strike you down?
  chosen_spanish: ¿Por qué han de golpearte?
  alternatives_spanish:
  - ¿Por qué han de golpearte hasta derribarte?
  - ¿Por qué habrían de herirte?
  lexicon: HALOT
  rationale: 'El hebreo presenta un plural indefinido: «¿por qué deberían golpearte?». En español, «golpearte» conserva esa indeterminación y el valor violento del verbo sin añadir más de lo que el texto dice. «Hirte» debilita la fuerza; «golpearte hasta derribarte» añade una conclusión que no está explicitada.'
- source_word: הַנָּבִיא
  english_pob_choice: the prophet
  chosen_spanish: el profeta
  alternatives_spanish:
  - el profeta de Yahvé
  lexicon: HALOT
  rationale: Identificación directa y suficiente del hablante en el relato. No se añade «de Yahvé» porque el hebreo no lo expresa aquí y el contexto ya lo hace claro.
- source_word: יָעַץ אֱלֹהִים
  english_pob_choice: God has determined
  chosen_spanish: Dios ha determinado
  alternatives_spanish:
  - Dios ha planeado
  - Dios ha resuelto
  lexicon: HALOT
  rationale: יעץ, con Dios como sujeto y seguido por el infinitivo de destrucción, expresa propósito o decisión divina. «Ha determinado» comunica mejor en español la fuerza de una resolución establecida, sin suavizarla ni convertirla en mera sugerencia. «Ha resuelto» también es posible; «ha planeado» puede sonar demasiado moderno y menos solemne.
- source_word: לְהַשְׁחִיתֶךָ
  english_pob_choice: to destroy you
  chosen_spanish: destruirte
  alternatives_spanish:
  - arruinarte
  - llevarte a la destrucción
  lexicon: HALOT
  rationale: El infinitivo causativo de שׁחת aquí indica destrucción real. «Destruirte» es directo y fiel. «Arruinarte» puede sonar más moral o económico; «llevarte a la destrucción» es correcto pero más pesado.
- source_word: כִּי עָשִׂיתָ זֹּאת
  english_pob_choice: because you have done this
  chosen_spanish: porque has hecho esto
  alternatives_spanish:
  - pues has hecho esto
  - porque hiciste esto
  lexicon: HALOT
  rationale: La partícula causal introduce la razón del juicio. «Has hecho esto» conserva el demostrativo hebreo sin especificarlo más de lo que el texto da. El perfecto español mantiene la relación con la consecuencia anunciada.
- source_word: וְלֹא שָׁמַעְתָּ לַעֲצָתִי
  english_pob_choice: and have not listened to my counsel
  chosen_spanish: y no has escuchado mi consejo
  alternatives_spanish:
  - y no has atendido mi consejo
  - y no has obedecido mi consejo
  lexicon: HALOT
  rationale: שמע con ל puede significar escuchar con atención o atender/obedecer. «Escuchado mi consejo» conserva la idea de no prestar oído a la advertencia profética y es idiomático en español. «Obedecido» introduce una interpretación algo más fuerte; «atendido» es posible, pero menos directo.
theological_decisions:
- issue: La afirmación de juicio divino en יָעַץ אֱלֹהִים לְהַשְׁחִיתֶךָ
  english_pob_reading: God has determined to destroy you
  chosen_spanish_reading: Dios ha determinado destruirte
  alternative_spanish_readings:
  - Dios ha planeado destruirte
  - Dios ha resuelto destruirte
  rationale: 'Se preserva la tensión teológica del texto: el profeta atribuye a Dios una resolución de juicio sin explicarla ni suavizarla. «Determinado» comunica una decisión firme y deja intacta la gravedad de la advertencia, en línea con la filosofía de preservar la tensión teológica del original.'
  doctrine_reference: 'Translation philosophy §3: Preservar la tensión teológica en lugar de resolverla.'
translation_notes:
  revision_awareness: La redacción sigue la lectura revisada del audit trail inglés, que corrigió la identificación del hablante a «el rey» y mantuvo el resto del verso sustancialmente igual. La traducción española refleja esa corrección y conserva el tono de reprensión directa, el plural indefinido de «golpearte» y la fuerza de la decisión divina expresada por יָעַץ.
  spanish_consistency_notes:
  - Se usa «Dios» para אֱלֹהִים, conforme al estándar del proyecto.
  - Se usa «consejero» para הַלְיוֹעֵץ porque aquí funciona como cargo o función, no como un título eclesiástico.
  - Se mantiene «destruirte» para לְהַשְׁחִיתֶךָ por su fuerza directa y porque el contexto de juicio la requiere.
  - Se conserva la referencia al rey sin introducir «Yahvé» ni «Mesías», porque el versículo no lo requiere.
  - El tono de diálogo narrativo se mantiene sobrio y bíblico, sin arcaísmos innecesarios.
