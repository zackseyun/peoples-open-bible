translation:
  language: es
  text: 'Y se le informó a Joab: «Mira, el rey está llorando y de duelo[a] por Absalón».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «De duelo» traduce el matiz de luto/mourning del verbo hebreo; también podría expresarse como «de luto».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֻּגַּד
  english_pob_choice: it was reported
  chosen_spanish: se le informó
  alternatives_spanish:
  - se le dijo
  - le fue comunicado
  - se hizo saber
  lexicon: HALOT
  rationale: La forma pasiva comunica que la noticia llegó a Joab sin nombrar al agente. «Se le informó» conserva esa pasividad y suena natural en español actual.
- source_word: לְיוֹאָב
  english_pob_choice: to Joab
  chosen_spanish: a Joab
  alternatives_spanish:
  - para Joab
  lexicon: nombre propio
  rationale: La preposición hebrea indica destinatario del informe; en español, «a Joab» mantiene con claridad ese valor direccional/comunicativo.
- source_word: הִנֵּה
  english_pob_choice: Look
  chosen_spanish: Mira
  alternatives_spanish:
  - Mira bien
  - Fíjate
  lexicon: HALOT
  rationale: La partícula deíctica introduce el contenido del reporte con urgencia e inmediatez. «Mira» preserva esa vivacidad sin el tono arcaizante de «He aquí».
- source_word: הַמֶּלֶךְ
  english_pob_choice: the king
  chosen_spanish: el rey
  alternatives_spanish:
  - el monarca
  lexicon: título real
  rationale: El hebreo usa el título, no el nombre propio. «El rey» reproduce esa referencia titulada y mantiene la identificación contextual con David.
- source_word: בֹּכֶה
  english_pob_choice: is weeping
  chosen_spanish: está llorando
  alternatives_spanish:
  - llora
  lexicon: HALOT
  rationale: El participio describe una acción en curso. «Está llorando» conserva el aspecto durativo de manera natural en español.
- source_word: וַיִּתְאַבֵּל
  english_pob_choice: and mourning
  chosen_spanish: y de duelo
  alternatives_spanish:
  - y está de luto
  - y lamentándose
  lexicon: HALOT
  rationale: El hitpael de אבל expresa duelo/luto por una muerte o pérdida. «De duelo» retiene el campo semántico de luto sin forzar una repetición pesada de «llorando y lamentando».
- source_word: עַל אַבְשָׁלֹם
  english_pob_choice: over Absalom
  chosen_spanish: por Absalón
  alternatives_spanish:
  - sobre Absalón
  - a causa de Absalón
  lexicon: HALOT
  rationale: En contextos de duelo, עַל señala la persona por la que se llora o se guarda luto. «Por Absalón» es la equivalencia española más natural y conserva la relación de aflicción.
translation_notes:
  revision_awareness: 'Coincide con el audit trail inglés en el sentido básico: un informe llega a Joab de que el rey está llorando y guardando duelo por Absalón. Se mantiene el valor aspectual del participio y del verbo hitpael, evitando una paráfrasis que suprima el matiz de luto.'
  spanish_consistency_notes:
  - Se conserva «Yahvé» como convención general del proyecto, aunque este versículo no contiene el nombre divino.
  - «Absalón» sigue la forma española estándar para el nombre propio.
  - Se prefirió una construcción pasiva refleja para reproducir el impersonal del hebreo sin añadir sujeto no expresado.
