  rationale: Se reemplaza «Así que ella fue» por «Entonces fue» para reflejar mejor la progresión narrativa hebrea en un español más natural. Se conserva el resto con mínimos cambios porque representa fielmente el sentido del original y las decisiones léxicas auditadas.
