translation:
  language: es
  text: 'Ella dijo[a]: «Por favor, dame una bendición, porque me has dado la tierra del Negev[b]; dame también manantiales de agua[c]». Y él le dio los manantiales superiores y los inferiores.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O “un regalo”. El hebreo dice “una bendición”, usando lenguaje de concesión beneficiosa.
    reason: lexical_alternative
  - marker: b
    text: “Negev” también puede significar “sur”, “tierra del sur” o “región meridional”.
    reason: lexical_alternative
  - marker: c
    text: El término hebreo puede referirse a manantiales, pozos o cuencas de agua; “manantiales” encaja mejor con el contraste entre lo alto y lo bajo.
    reason: lexical_alternative
lexical_decisions:
- source_word: בְרָכָה
  english_pob_choice: a blessing
  chosen_spanish: una bendición
  alternatives_spanish:
  - un regalo
  - un presente
  lexicon: HALOT
  rationale: Bְרָכָה normalmente significa “bendición”, y en este contexto conserva bien el lenguaje de petición de un favor beneficioso. “Regalo” o “presente” serían más interpretativos y menos transparentes frente al hebreo.
- source_word: אֶרֶץ הַנֶּגֶב
  english_pob_choice: the land of the Negev
  chosen_spanish: la tierra del Negev
  alternatives_spanish:
  - la tierra del sur
  - la región del sur
  lexicon: HALOT
  rationale: Negev funciona aquí como designación geográfica. Mantener “Negev” preserva el valor propio del topónimo, y “tierra de” refleja אֶרֶץ con naturalidad en español.
- source_word: גֻּלֹּת מָיִם
  english_pob_choice: springs of water
  chosen_spanish: manantiales de agua
  alternatives_spanish:
  - pozos de agua
  - fuentes de agua
  - gullot de agua
  lexicon: HALOT
  rationale: El sentido exacto de גֻּלֹּת es debatido, pero en este contexto de heredad y abastecimiento de agua, “manantiales de agua” es la opción más idiomática y coherente con la distinción posterior entre altos y bajos.
- source_word: תְּנָה
  english_pob_choice: Please give me
  chosen_spanish: Por favor, dame
  alternatives_spanish:
  - Dame, por favor
  - Concédeme
  lexicon: HALOT
  rationale: El imperativo con matiz volitivo/pediente se expresa de forma natural en español con “por favor”. “Concédeme” suena más formal e interpretativo.
- source_word: וְנָתַתָּה לִי
  english_pob_choice: give me also
  chosen_spanish: dame también
  alternatives_spanish:
  - y dame
  - concédeme además
  lexicon: HALOT
  rationale: La conjunción añade una petición adicional; “también” preserva bien el valor aditivo sin forzar la sintaxis española.
- source_word: גֻּלֹּת עִלִּיּוֹת
  english_pob_choice: the upper springs
  chosen_spanish: los manantiales de arriba
  alternatives_spanish:
  - los manantiales altos
  - los manantiales superiores
  lexicon: HALOT
  rationale: Mantengo “manantiales” por coherencia con גֻּלֹּת מָיִם. “De arriba” reproduce de manera transparente el contraste espacial de עִלִּיּוֹת.
- source_word: גֻּלֹּת תַּחְתִּיּוֹת
  english_pob_choice: the lower springs
  chosen_spanish: los manantiales de abajo
  alternatives_spanish:
  - los manantiales bajos
  - los manantiales inferiores
  lexicon: HALOT
  rationale: Paralelo a la expresión anterior; “de abajo” mantiene la oposición superior/inferior en un español claro y natural.
- source_word: וַיִּתֶּן לָהּ
  english_pob_choice: So he gave her
  chosen_spanish: Y él le dio
  alternatives_spanish:
  - Entonces le dio
  - Así que le dio
  lexicon: HALOT
  rationale: La waw narrativa se puede reproducir con “y” en español, conservando la continuidad narrativa sin añadir inferencias causales que el hebreo no exige.
theological_decisions:
- issue: Sentido de בְרָכָה como petición de favor beneficioso, no solo fórmula religiosa
  english_pob_reading: The Hebrew says 'a blessing,' using covenantal language for a beneficial grant.
  chosen_spanish_reading: “una bendición” conserva el lenguaje del texto y permite entender una concesión beneficiosa, no meramente un acto devocional.
  alternative_spanish_readings:
  - “un regalo”
  - “un favor”
  rationale: En español, “bendición” puede abarcar el valor de un bien concedido dentro de un marco familiar y de herencia; “regalo” o “favor” explican el sentido pero diluyen el eco lexical del hebreo.
  doctrine_reference: Ninguna; decisión lexical y contextual, no doctrinal.
translation_notes:
  revision_awareness: Se siguió el texto hebreo (WLC) con alta concordancia respecto al análisis inglés. No hubo revisiones aplicadas en el expediente inglés; por eso la redacción española conserva la estructura y las decisiones léxicas principales del audit trail, adaptándolas al español con claridad y transparencia.
  spanish_consistency_notes:
  - Se mantiene “Negev” como topónimo, en línea con la política del proyecto para אֶרֶץ הַנֶּגֶב.
  - Se usa “bendición” para בְרָכָה, preservando la tensión entre lenguaje de bendición y concesión beneficiosa.
  - Se usa “manantiales” de forma consistente para גֻּלֹּת / גֻּלֹּת מָיִם, evitando alternar con “pozos” o “fuentes” dentro del mismo versículo.
  - La narración conserva el movimiento del hebreo con coordinaciones simples (“Y”, “dame también”).
