translation:
  language: es
  text: Que su misericordia fiel permanezca con Shimon[a], y que establezca para él el pacto de Finees[b], el cual no será cortado de él ni de su descendencia mientras duren los días del cielo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Paralelo griego: «Encomendar su misericordia con nosotros, y en sus días redímanos». Esto difiere notablemente del hebreo conservado, que habla de Shimon y del pacto de Finees.'
    reason: alternative_reading
  - marker: b
    text: «El pacto de Finees» alude al pacto sacerdotal permanente de Números 25:12–13.
    reason: cross_reference
lexical_decisions:
- source_word: יֵאָמֵן
  english_pob_choice: remain faithful
  chosen_spanish: permanezca fiel / permanezca con sentido de permanencia
  alternatives_spanish:
  - sea confirmado
  - sea firme
  - permanezca
  lexicon: HALOT
  rationale: El hebreo nifal de אמן expresa firmeza, estabilidad o fidelidad. En español, 'permanezca' transmite bien la idea de continuidad, y unido a 'amor fiel' conserva el matiz de fidelidad del hebreo y del audit trail inglés sin sonar forzado.
- source_word: עִם
  english_pob_choice: with
  chosen_spanish: con
  alternatives_spanish:
  - para
  - hacia
  lexicon: HALOT
  rationale: La preposición indica acompañamiento o relación directa; 'con' es la opción natural y fiel en español.
- source_word: שִׁמְעוֹן
  english_pob_choice: Shimon
  chosen_spanish: Shimon
  alternatives_spanish:
  - Simón
  lexicon: transliteración propia del proyecto
  rationale: Se conserva la transliteración dada por el POB inglés para mantener la forma hebrea del nombre en el texto principal.
- source_word: חַסְדּוֹ
  english_pob_choice: his faithful love
  chosen_spanish: su amor fiel
  alternatives_spanish:
  - su misericordia
  - su bondad leal
  - su misericordia fiel
  lexicon: HALOT
  rationale: חסד combina lealtad pactal, amor constante y benevolencia. El POB inglés revisó 'his mercy' a 'his faithful love'; 'amor fiel' reproduce bien ese equilibrio en español y evita reducir el término a mera piedad emocional.
- source_word: וְיָקֶם
  english_pob_choice: may he establish
  chosen_spanish: que establezca
  alternatives_spanish:
  - que confirme
  - que levante
  - que sostenga
  lexicon: HALOT
  rationale: El hiphil de קום en contexto de pacto expresa establecer o confirmar. 'Que establezca' es claro, natural y conserva la fuerza jurídica/pactual.
- source_word: בְּרִית פִּינְחָס
  english_pob_choice: the covenant of Phinehas
  chosen_spanish: el pacto de Finés
  alternatives_spanish:
  - el pacto de Finees
  - el pacto con Finees
  - el pacto de Phinehas
  lexicon: HALOT
  rationale: '''Pacto'' refleja mejor la fórmula bíblica y su trasfondo jurídico que ''alianza''. Se usa ''Finés'' como forma castellana tradicional del nombre, manteniendo inteligibilidad para lectores bíblicos en español.'
- source_word: אֲשֶׁר לֹא יִכָּרֵת
  english_pob_choice: which shall not be cut off
  chosen_spanish: el cual no será cortado
  alternatives_spanish:
  - el cual no será abolido
  - el cual no cesará
  - el cual no será eliminado
  lexicon: HALOT
  rationale: El verbo כרת conserva su imaginería de 'cortar'. 'No será cortado' preserva la textura idiomática del hebreo y sugiere la permanencia del pacto sin suavizar la imagen.
- source_word: וּלְזַרְעוֹ
  english_pob_choice: or from his offspring
  chosen_spanish: ni de su descendencia
  alternatives_spanish:
  - ni de su simiente
  - ni de sus hijos
  - ni de su linaje
  lexicon: HALOT
  rationale: En contexto genealógico, 'descendencia' comunica de modo natural el alcance sucesorio del pacto. Se mantiene la coordenada de procedencia con 'de'.
- source_word: כִּימֵי שָׁמָיִם
  english_pob_choice: as long as the days of heaven endure
  chosen_spanish: mientras duren los días del cielo
  alternatives_spanish:
  - como los días del cielo
  - por los días del cielo
  - mientras existan los cielos
  lexicon: HALOT
  rationale: La expresión idiomática apunta a duración indefinida. 'Mientras duren los días del cielo' conserva la imagen poética del hebreo y su valor temporal sin explicitar más de lo que el texto dice.
theological_decisions:
- issue: Prioridad del hebreo frente al paralelo griego
  english_pob_reading: Translate the extant Hebrew as primary, while allowing the Greek to inform the choice of 'mercy' for חסד.
  chosen_spanish_reading: Se traduce el hebreo conservado como base principal, y el paralelo griego solo informa la decisión léxica en torno a חסד.
  alternative_spanish_readings:
  - 'Una traducción basada en el griego: ''que encomiende su misericordia con nosotros, y en sus días nos redima'''
  rationale: En Sirácida, cuando el hebreo está preservado, el principio de primacía del original hebreo gobierna el texto principal. Aquí el griego diverge sustancialmente y parece reflejar otra Vorlage o una versión interpretativa. Por eso el español sigue la petición hebrea sobre Shimon y el pacto de Finés, aunque el griego respalda la elección de un término de amor misericordioso/fiel para חסד.
  doctrine_reference: 'PHILOSOPHY.md: traducir desde el hebreo cuando Sirácida lo conserva; primacía del original sobre la tradición de traducción.'
translation_notes:
  revision_awareness: El POB inglés pasó de 'May his mercy remain faithful with Shimon' a 'May his faithful love be with Shimon' para reflejar mejor חסדו y sonar más natural; el español sigue esa revisión con 'su amor fiel'. También se mantuvo la primacía del hebreo frente al paralelo griego, incorporando su aporte solo en la semántica de חסד.
  spanish_consistency_notes:
  - Se mantuvo 'Shimon' como transliteración coherente con el audit trail inglés y con la política del proyecto para nombres propios en textos hebreos.
  - '''Pacto'' se emplea de forma consistente para ברית, y ''descendencia'' para זרע en contexto genealógico.'
  - Se preservó la imagen de 'cortar' en לֹא יִכָּרֵת para no neutralizar el valor idiomático y legal del hebreo.
