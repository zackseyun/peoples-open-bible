translation:
  text: and Jonah[a], who was wasting away in the belly of the sea-fed monster, you brought forth unharmed in abundance to all his own people, Father[b],
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'sea monster' or 'great fish.' Greek κῆτος denotes a large sea creature; 'whale' is possible in tradition but is more specific than the Greek requires.
    reason: lexical_alternative
  - marker: b
    text: Greek literally suggests 'unmarked' or 'without injury'; the sense is that Jonah was brought out unharmed.
    reason: lexical_alternative
lexical_decisions:
- source_word: βυθοτρεφοῦς
  lemma: βυθός
  chosen: sea-fed
  alternatives:
  - deep-nourished
  - fed in the depths
  - of the deep
  lexicon: LSJ
  rationale: A compound from βυθός ('depth, deep') and τρέφω ('nourish, feed'). In context it modifies κήτους and describes the creature as belonging to or nourished by the deep/sea. 'Sea-fed' is concise and natural English while preserving the imagery better than a flat 'great fish.'
- source_word: κήτους
  chosen: monster
  alternatives:
  - sea monster
  - great fish
  - whale
  lexicon: LSJ
  rationale: κῆτος denotes a large sea creature or monster. 'Whale' is too specific, and 'great fish' can understate the mythic/large-creature sense. Because βυθοτρεφοῦς already signals the marine setting, 'monster' keeps the force without redundancy; the fuller alternative is preserved in a footnote.
- source_word: ἐν γαστρὶ κήτους
  chosen: in the belly of the ... monster
  alternatives:
  - in the womb of the ... monster
  - inside the stomach of the ... creature
  lexicon: LSJ
  rationale: γαστήρ commonly means belly or stomach; 'belly' is the standard natural rendering and echoes the Jonah tradition without importing wording beyond the Greek.
- source_word: τηκόμενον
  chosen: wasting away
  alternatives:
  - melting away
  - being consumed
  - languishing
  lexicon: LSJ
  rationale: The participle from τήκω conveys wasting, melting, or being consumed. 'Wasting away' communicates physical deterioration in idiomatic English and fits the prayer's depiction of Jonah's peril.
- source_word: ἀφθόνῳ
  chosen: in abundance
  alternatives:
  - abundantly
  - bountifully
  - freely
  lexicon: LSJ
  rationale: ἀφθόνος can mean abundant, unstinting, or lavish. Here it adverbially qualifies the manner of God's deliverance. 'In abundance' preserves the lexical idea, though the exact syntactic force is somewhat compressed in the Greek.
- source_word: ἀσήμαντον
  chosen: unharmed
  alternatives:
  - unmarked
  - without injury
  - safe and sound
  lexicon: LSJ
  rationale: ἀσήμαντος literally suggests 'without mark/sign,' hence uninjured or unharmed. 'Unharmed' best conveys the result of deliverance in clear English.
- source_word: πᾶσιν οἰκείοις
  chosen: to all his own people
  alternatives:
  - to all his own
  - to all his household
  - to all his kin
  lexicon: LSJ
  rationale: οἰκεῖοι refers to one's own people, household, or kin. Since Jonah's emergence is made manifest before those belonging to him, 'his own people' is broad enough to preserve the relational sense without over-specifying family alone.
- source_word: ἀναδείξας
  chosen: you brought forth
  alternatives:
  - you showed forth
  - you revealed
  - you displayed
  lexicon: LSJ
  rationale: ἀναδείκνυμι can mean show forth, reveal, or bring to light. In this context of rescue from the creature's belly, 'brought forth' captures both deliverance and public manifestation.
- source_word: πάτερ
  chosen: Father
  alternatives:
  - O Father
  lexicon: LSJ
  rationale: Direct address to God. 'Father' is retained plainly; English punctuation supplies the vocative force.
