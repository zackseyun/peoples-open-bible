    rationale: La formulación comunica prioridad, pero desplaza la imagen de valorar o comparar. Una frase como «No valores la plata frente a la plata» conserva mejor la compresión idiomática sin dejar de ser comprensible.
  - severity: low
    issue: «desperdicio» para περίψημα es aceptable pero menos preciso en registro
    rationale: «Deshecho» o «basura» reflejan mejor algo barrido o desechado. «Deshecho» mantiene un tono más digno que «basura» y más concreto que «desperdicio».
