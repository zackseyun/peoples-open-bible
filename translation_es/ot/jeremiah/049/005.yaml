  to: He aquí, yo traigo terror sobre ti de todas partes a tu alrededor, declara Yahvé Dios de los ejércitos, y serán expulsados, cada hombre delante de sí[a]; no habrá quien reúna al fugitivo[b].
  rationale: 'Se corrige el número verbal para reflejar el plural hebreo de וְנִדַּחְתֶּם, se mejora la naturalidad de מִכָּל סְבִיבַיִךְ en español, y se reubican/restauran las notas según el rastro POB: la nota principal sobre la frase difícil אִישׁ לְפָנָיו va en esa expresión, y la alternativa para לַנֹּדֵד va en «fugitivo». Se conserva «Yahvé» conforme al glosario del proyecto y «cada hombre» para mantener el distributivo masculino del hebreo.'
