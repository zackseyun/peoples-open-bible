translation:
  language: es
  text: Espero en Yahvé; mi alma espera[a], y en su palabra[b] tengo esperanza.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «He esperado en Yahvé; mi alma ha esperado». El perfecto hebreo puede expresar una espera ya asumida o una postura presente en este contexto.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «por su palabra» o «por su promesa». El hebreo puede designar la palabra dicha por Dios o, por implicación, su promesa.'
    reason: lexical_alternative
lexical_decisions:
- source_word: קִוִּיתִי
  english_pob_choice: I wait
  chosen_spanish: Espero
  alternatives_spanish:
  - He esperado
  - Espero en
  lexicon: HALOT
  rationale: קוה expresa esperar con expectación. En español, «espero» comunica la postura presente y mantiene el tono poético; «he esperado» también sería posible por el matiz perfectivo del hebreo, pero suena menos directo aquí. Se conserva el complemento con «en Yahvé» como apoyo sintáctico natural.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  lexicon: HALOT
  rationale: El Tetragrámaton se vierte como el nombre propio divino. En español, «Yahvé» preserva la referencia al nombre revelado, conforme al criterio del proyecto, en vez de sustituirlo por un título como «el SEÑOR».
- source_word: קִוְּתָה
  english_pob_choice: waits
  chosen_spanish: espera
  alternatives_spanish:
  - ha esperado
  - aguarda
  lexicon: HALOT
  rationale: Se mantiene el paralelo con el primer hemistiquio. «Espera» reproduce el mismo campo semántico de קוה sin introducir una diferencia innecesaria en español.
- source_word: נַפְשִׁי
  english_pob_choice: my soul
  chosen_spanish: mi alma
  alternatives_spanish:
  - mi ser
  - yo mismo
  - mi interior
  lexicon: HALOT
  rationale: נפש puede significar la persona interior o el yo vital. «Mi alma» conserva la fuerza poética y antropológica tradicional del salmo, y sigue siendo clara en español contemporáneo.
- source_word: לִדְבָרוֹ
  english_pob_choice: in his word
  chosen_spanish: en su palabra
  alternatives_spanish:
  - por su palabra
  - en lo que dice
  - en su promesa
  lexicon: HALOT
  rationale: דבר puede referirse a palabra, dicho o promesa. «En su palabra» es la opción más directa y permite conservar la ambigüedad entre la palabra pronunciada por Dios y, por implicación, su promesa; «promesa» sería más interpretativo.
- source_word: הוֹחָלְתִּי
  english_pob_choice: I hope
  chosen_spanish: tengo esperanza
  alternatives_spanish:
  - espero
  - he esperado
  - aguardo con esperanza
  lexicon: HALOT
  rationale: La raíz יחל expresa esperar/esperanzarse. «Tengo esperanza» evita repetir exactamente «espero» y refleja el matiz de esperanza expectante que el inglés POB distinguió con «I hope».
theological_decisions:
- issue: Renderización del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Jehová
  - el SEÑOR
  rationale: Se conserva el nombre propio del pacto en lugar de una sustitución por título. «Yahvé» es la forma española estándar del transliterado teológico que el proyecto adopta para el Tetragrámaton.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH'
translation_notes:
  revision_awareness: No se registran revisiones aplicadas en el paquete inglés; se mantiene la lectura auditada de alta concordancia y se traslada su tensión verbal al español con alternativas en nota.
  spanish_consistency_notes:
  - Se usa «Yahvé» de acuerdo con el criterio del proyecto para יְהוָה.
  - Se conserva la repetición verbal de קוה con «espero» / «espera» para mantener el paralelismo poético.
  - «En su palabra» preserva la ambigüedad entre palabra y promesa sin cerrar el sentido de forma innecesaria.
  - «Tengo esperanza» diferencia el segundo verbo sin perder el campo semántico de espera confiada.
