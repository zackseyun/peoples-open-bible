lexical_decisions:
- source_word: וְיִשְׁמְרַי
  english_pob_choice: Ishmerai
  chosen_spanish: Ishmerai
  alternatives_spanish:
  - Jishmerai
  lexicon: Nombre propio
  rationale: Es un nombre propio hebreo; se translitera en lugar de traducirse. Mantengo la forma más cercana al patrón consonántico, como en el texto inglés auditado.
- source_word: וְיִזְלִיאָה
  english_pob_choice: Izliah
  chosen_spanish: Izliah
  alternatives_spanish:
  - Jizliah
  lexicon: Nombre propio
  rationale: Es un nombre propio hebreo. Conservo la transliteración base del POB inglés, y reconozco la variante inglesa con J como alternativa tradicional.
- source_word: וְיוֹבָב
  english_pob_choice: Jobab
  chosen_spanish: Jobab
  lexicon: Nombre propio
  rationale: Nombre propio hebreo transliterado según convención bíblica estándar, sin añadir interpretación.
- source_word: בְּנֵי
  english_pob_choice: were the sons of
  chosen_spanish: fueron hijos de
  alternatives_spanish:
  - hijos de
  lexicon: HALOT
  rationale: La construcción de estado constructo indica relación filiativa. En español, 'fueron hijos de' comunica con naturalidad la fórmula genealógica sin perder el valor relacional del hebreo, igual que la inserción de 'were' en inglés evita una lista elíptica poco natural.
- source_word: אֶלְפָּעַל
  english_pob_choice: Elpaal
  chosen_spanish: Elpaal
  alternatives_spanish:
  - Elpa'al
  lexicon: Nombre propio
  rationale: Nombre propio transliterado. Se conserva la forma legible sin apóstrofo, como en el audit trail inglés, para mantener claridad tipográfica.
translation_notes:
  revision_awareness: El texto inglés auditado no requirió revisiones y mantiene acuerdo alto con la fuente hebrea; la versión española sigue esa misma lectura estable, sin introducir cambios textuales ni variantes no atestiguadas.
  spanish_consistency_notes:
  - 'Se mantiene el orden genealógico del hebreo: tres nombres propios seguidos de la relación ''fueron hijos de Elpaal''.'
  - No se usa 'SEÑOR' ni terminología teológica ajena al versículo, porque el texto es puramente genealógico.
  - La transliteración se conserva como nombre propio, sin intentar castellanizarlo más allá de la lectura normal en español bíblico.
