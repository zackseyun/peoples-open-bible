translation:
  language: es
  text: Y reconocían sus grandes y maravillosas obras[a], porque se les había aparecido un ángel del Señor[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «daban gracias por / reconocían abiertamente sus grandes y maravillosas obras». El verbo griego puede abarcar reconocimiento, confesión, agradecimiento o alabanza según el contexto.'
    reason: lexical_alternative
  - marker: b
    text: 'Griego: «un ángel del Señor»; algunas tradiciones en español podrían esperar «el ángel del Señor», pero el griego aquí no exige ese sentido definido.'
    reason: alternative_reading
lexical_decisions:
- source_word: ἐξωμολογοῦντο
  english_pob_choice: acknowledged
  chosen_spanish: reconocían
  alternatives_spanish:
  - confesaban
  - daban gracias
  - reconocían públicamente
  lexicon: LSJ
  rationale: El verbo puede expresar reconocimiento abierto, confesión o acción de gracias según el contexto. Aquí el objeto son las obras de Dios, y el POB en inglés terminó prefiriendo un verbo más natural que 'confessed'. 'Reconocían' conserva la idea de admisión/afirmación pública sin forzar una formulación litúrgica.
- source_word: τὰ ἔργα τὰ μεγάλα καὶ θαυμαστὰ
  english_pob_choice: his great and wondrous works
  chosen_spanish: sus obras grandes y maravillosas
  alternatives_spanish:
  - sus grandes y maravillosas obras
  - sus grandes y asombrosas obras
  - sus grandes y portentosas obras
  lexicon: LSJ
  rationale: ἔργα se rinde como 'obras' para mantener la correspondencia directa. 'Maravillosas' refleja θαυμαστά con un registro natural en español para actos divinos; 'grandes' conserva el calificativo de magnitud del griego.
- source_word: ὡς
  english_pob_choice: because
  chosen_spanish: porque
  alternatives_spanish:
  - cuando
  - como
  - ya que
  lexicon: LSJ
  rationale: 'En este contexto introduce la base o motivo de lo que reconocían: la aparición del ángel. ''Porque'' expresa mejor esa relación causal en español bíblico moderno.'
- source_word: ὤφθη
  english_pob_choice: had appeared
  chosen_spanish: se les había aparecido
  alternatives_spanish:
  - apareció
  - fue visto por ellos
  - se les apareció
  lexicon: LSJ
  rationale: El pasivo de aparición se vierte naturalmente como 'se les había aparecido', que preserva el carácter de manifestación y el orden narrativo anterior al reconocimiento.
- source_word: ἄγγελος Κυρίου
  english_pob_choice: an angel of the Lord
  chosen_spanish: un ángel del Señor
  alternatives_spanish:
  - el ángel del Señor
  - un ángel de Yahvé
  lexicon: LSJ
  rationale: El griego es anartro, por lo que el artículo indefinido se preserva. Se mantiene 'Señor' aquí porque la fuente griega usa κύριος sin nombre divino explícito en esta fórmula; 'un ángel de Yahvé' introduciría una identificación que el texto no exige en este punto.
theological_decisions:
- issue: 'Valor de ἄγγελος Κυρίου: indefinido o definido'
  english_pob_reading: an angel of the Lord
  chosen_spanish_reading: un ángel del Señor
  alternative_spanish_readings:
  - el ángel del Señor
  rationale: El texto griego no lleva artículo ante ἄγγελος, así que la lectura indefinida es la más fiel y evita fijar una identificación teológica más específica de la que el versículo da explícitamente.
  doctrine_reference: 'DOCTRINE.md: Translate titles; preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: La POB inglesa revisó ἐξωμολογοῦντο de 'confessed' a 'acknowledged' por ser más natural y preciso en este contexto. La redacción española sigue esa revisión con 'reconocían', manteniendo la ambigüedad lexical documentada sin convertirla en una alabanza explícita no requerida.
  spanish_consistency_notes:
  - Se mantiene 'Señor' para κύριος en la expresión fija 'ángel del Señor', coherente con la lectura griega anartro y con la decisión inglesa.
  - '''Obras'' se usa para ἔργα, conservando el paralelismo con la fuente.'
  - No se introduce 'Cristo' ni otras fórmulas eclesiales ajenas al verso.
