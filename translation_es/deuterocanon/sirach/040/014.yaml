translation:
  language: es
  text: Al abrir sus manos[a][b], se alegrarán; pero los transgresores llegarán a su fin de repente para siempre.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'El hebreo transmitido en el primer colon es difícil y puede reflejar una lectura distinta, con un sentido aproximado relacionado con «pueblo» y «saqueo». El griego dice: «Cuando abre sus manos, se alegrarán».'
    reason: alternative_reading
  - marker: b
    text: Masada conserva aquí solo una lectura fragmentaria; el texto de la Guenizá de El Cairo y el griego divergen de forma notable en el primer colon.
    reason: textual_variant
lexical_decisions:
- source_word: ἐν τῷ ἀνοῖξαι αὐτὸν χεῖρας / שאתו כפים
  english_pob_choice: At the opening of his hands / When he opens his hands
  chosen_spanish: Al abrir sus manos
  alternatives_spanish:
  - Cuando abre sus manos
  - Al extender sus manos
  lexicon: BDAG; HALOT
  rationale: Se sigue el sentido claro del paralelo griego, que habla de abrir las manos, y se mantiene una formulación natural en español. 'Al abrir sus manos' conserva el matiz de acción en curso del giro preposicional griego y evita endurecer la frase.
- source_word: εὐφρανθήσεται
  english_pob_choice: they will rejoice
  chosen_spanish: se alegrarán
  alternatives_spanish:
  - se regocijarán
  - se gozarán
  lexicon: BDAG
  rationale: El griego indica alegría o regocijo; en español 'se alegrarán' es claro, digno y suficientemente cercano al valor del verbo sin elevarlo artificialmente a un registro litúrgico.
- source_word: οἱ παραβαίνοντες
  english_pob_choice: the transgressors
  chosen_spanish: los transgresores
  alternatives_spanish:
  - los que transgreden
  - los quebrantadores
  lexicon: BDAG
  rationale: '''Transgresores'' refleja bien el sustantivo participial griego y mantiene el peso moral/jurídico del término sin suavizarlo.'
- source_word: εἰς συντέλειαν ἐκλείψουσιν / יתם
  english_pob_choice: will suddenly come to an end forever
  chosen_spanish: desaparecerán de repente para siempre
  alternatives_spanish:
  - se acabarán de repente para siempre
  - perecerán de repente para siempre
  lexicon: BDAG; HALOT
  rationale: '''ἐκλείψουσιν'' sugiere cesar, desvanecerse o desaparecer; ''desaparecerán'' preserva ese valor sin añadir violencia que el texto no exige. ''De repente'' refleja פתאם y ''para siempre'' conserva לנצח.'
theological_decisions:
- issue: Relación entre el hebreo oscuro y el paralelo griego en el primer colon
  english_pob_reading: Main text follows the clearer Greek sense in the first colon and aligns the second colon with both Hebrew and Greek, while preserving a Hebrew-based alternative in a footnote.
  chosen_spanish_reading: El texto principal sigue el griego claro en la imagen de abrir las manos, sin ocultar que el hebreo transmitido es difícil y probablemente distinto.
  alternative_spanish_readings:
  - Una reconstrucción más pegada al hebreo podría aludir a 'saqueo' o a una lectura corrompida del primer colon.
  rationale: Sirach presenta aquí una divergencia textual importante. Para no borrar la tensión documentada, el español principal sigue el sentido griego legible, mientras la nota conserva la dificultad del hebreo y su posible lectura alternativa.
  doctrine_reference: Principio POB de primacía de las fuentes con documentación transparente de variantes textuales.
- issue: Valor de la cláusula final con finalización súbita y definitiva
  english_pob_reading: the transgressors will suddenly come to an end forever
  chosen_spanish_reading: los transgresores desaparecerán de repente para siempre
  alternative_spanish_readings:
  - los transgresores llegarán a su fin de repente para siempre
  - los transgresores perecerán de repente para siempre
  rationale: La combinación de פתאם y לנצח exige en español una idea de súbita e irrevocable terminación. 'Desaparecerán' permite mantener el valor de ἐκλείψουσιν sin sobreinterpretar el modo de destrucción.
  doctrine_reference: Fidelidad semántica con preservación del tono sentencioso del pasaje.
translation_notes:
  revision_awareness: Se tomó en cuenta la revisión más reciente del inglés POB, que ajustó la primera mitad hacia 'At the opening of his hands' y cambió la conjunción final a una forma contrastiva. En español, 'Al abrir sus manos' preserva esa alineación con el giro nominal/infinitivo del hebreo y el valor temporal del griego, mientras 'pero' refleja mejor la transición adversativa entre la imagen positiva y el destino de los transgresores.
  spanish_consistency_notes:
  - Se usa 'transgresores' de manera consistente para οἱ παραβαίνοντες.
  - Se mantiene 'para siempre' para לנצח, evitando suavizar la finalización definitiva.
  - '''Desaparecerán'' conserva la idea de cesar/cesar de existir sin introducir violencia no explicitada.'
  - Las notas distinguen claramente entre la lectura griega clara y la dificultad del hebreo, sin fusionarlas indebidamente.
