translation:
  language: es
  text: 'Y cerca del momento de su muerte, las mujeres que estaban junto a ella le dijeron: «No temas, porque has dado a luz un hijo». Pero ella no respondió, ni lo tomó a pecho[a].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O "no puso su corazón en ello", es decir, no prestó atención a lo que decían.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּכְעֵת
  english_pob_choice: about the time of
  chosen_spanish: cuando se acercó el momento de
  alternatives_spanish:
  - aproximadamente a la hora de
  - al tiempo de
  - cuando era ya el tiempo de
  lexicon: HALOT
  rationale: La expresión introduce un marco temporal idiomático. En español, 'cuando se acercó el momento de' conserva la idea temporal sin sonar forzado ni excesivamente literal.
- source_word: מוּתָהּ
  english_pob_choice: her death
  chosen_spanish: su muerte
  alternatives_spanish:
  - su morir
  - cuando murió
  lexicon: HALOT
  rationale: El sustantivo verbal con sufijo remite al evento de morir. 'Su muerte' es natural y mantiene la referencia al acontecimiento.
- source_word: וַתְּדַבֵּרְנָה
  english_pob_choice: said
  chosen_spanish: le dijeron
  alternatives_spanish:
  - hablaron
  - decían
  lexicon: HALOT
  rationale: El verbo narrativo en plural femenino introduce el discurso directo de las mujeres. 'Le dijeron' es la forma más natural en español antes de una cita.
- source_word: הַנִּצָּבוֹת עָלֶיהָ
  english_pob_choice: the women standing by her
  chosen_spanish: las mujeres que estaban junto a ella
  alternatives_spanish:
  - las mujeres que la atendían
  - las que estaban de pie junto a ella
  - las mujeres presentes a su lado
  lexicon: HALOT
  rationale: El participio con עַל indica presencia junto a la parturienta. 'Que estaban junto a ella' preserva la imagen sin introducir 'atendían', que añade más de lo que el hebreo exige.
- source_word: אַל תִּירְאִי
  english_pob_choice: Do not fear
  chosen_spanish: No temas
  alternatives_spanish:
  - No tengas miedo
  - No temas tú
  lexicon: HALOT
  rationale: Es una prohibición estándar. 'No temas' es conciso, digno y fiel; además conserva el tono directo de consuelo.
- source_word: כִּי בֵן יָלָדְתְּ
  english_pob_choice: for you have borne a son
  chosen_spanish: porque has dado a luz un hijo
  alternatives_spanish:
  - pues has parido un hijo
  - porque has alumbrado un hijo
  lexicon: HALOT
  rationale: ילד en este contexto expresa dar a luz. 'Has dado a luz' es la equivalencia natural en español y mantiene el sentido materno con claridad.
- source_word: וְלֹא עָנְתָה
  english_pob_choice: she did not answer
  chosen_spanish: Pero ella no respondió
  alternatives_spanish:
  - Pero ella no contestó
  - Y ella no respondió
  lexicon: HALOT
  rationale: ענה aquí significa responder al discurso. 'Respondió' conserva la relación directa con la frase previa y suena sobrio en español.
- source_word: וְלֹא שָׁתָה לִבָּהּ
  english_pob_choice: nor did she take it to heart
  chosen_spanish: ni puso atención en ello
  alternatives_spanish:
  - ni lo tomó a pecho
  - ni lo tuvo en cuenta
  - ni lo puso en su corazón
  lexicon: HALOT
  rationale: La locución con לב expresa prestar atención o fijar el corazón en algo. 'Puso atención en ello' comunica el sentido idiomático sin perder la imagen de dirigir el corazón/mente hacia lo dicho.
theological_decisions:
- issue: La expresión idiomática del corazón en la última cláusula
  english_pob_reading: she did not take it to heart; or, she paid no attention to what they said
  chosen_spanish_reading: ni puso atención en ello
  alternative_spanish_readings:
  - ni lo tomó a pecho
  - ni lo puso en su corazón
  - ni prestó atención a lo que decían
  rationale: El hebreo puede leerse como falta de atención o de recepción interior del mensaje. La redacción elegida deja abierta la fuerza idiomática sin convertirla en una paráfrasis devocional. La nota aclara la alternativa semántica documentada por la POB inglesa.
  doctrine_reference: Prov. 1:5; 4:20; Sal. 90:12 (uso bíblico del corazón como sede de atención y reflexión)
translation_notes:
  revision_awareness: La POB inglesa revisó la coordinación final de 'and' a 'nor' por fluidez formal; en español se reflejó con 'ni' para mantener el paralelismo negativo del hebreo y la misma sobriedad estilística.
  spanish_consistency_notes:
  - Se mantuvo 'No temas' para el imperativo prohibitivo estándar, sin añadir intensificación.
  - Se usó 'Dios' no aplica en este versículo; no hay nombres divinos ni títulos a resolver.
  - '''Puso atención'' conserva el valor idiomático de לב sin introducir una lectura psicológica más fuerte que la evidencia textual.'
  - Se evitó 'tomó a pecho' en el texto principal porque puede sonar más interpretativo que el hebreo en este contexto narrativo.
