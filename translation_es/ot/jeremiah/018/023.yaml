base_translation:
  language: en
  yaml_path: translation/ot/jeremiah/018/023.yaml
  text: But you[a], O Yahweh, know all their counsel against me to death. Do not cover over their iniquity, and do not blot out their sin from before you. Let them stumble before you; in the time of your anger[c][b], act against them.
  footnotes:
  - marker: a
    text: Or 'against me to kill me' / 'for my death.' The Hebrew literally reads 'against me for death.'
    reason: lexical_alternative
  - marker: b
    text: Or 'forgive their iniquity.' The Hebrew verb can carry the sense of making atonement or covering over guilt; here the more literal metaphor is retained.
    reason: lexical_alternative
  - marker: c
    text: Or 'May they stumble before you.'
    reason: lexical_alternative
