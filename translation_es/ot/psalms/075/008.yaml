translation:
  language: es
  text: 'Porque Dios es el juez[a]: humilla a uno[b] y enaltece a otro.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «juzga». El participio hebreo puede entenderse de modo verbal o como una expresión predicativa nominal.'
    reason: alternative_reading
  - marker: b
    text: Literalmente, «a este humilla, y a este enaltece»; es una expresión distributiva que significa «a uno ... y a otro».
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  - Porque, en efecto
  lexicon: HALOT
  rationale: Introduce la razón o fundamento de la afirmación anterior; «Porque» conserva bien esa fuerza causal/explicativa en español natural.
- source_word: אֱלֹהִים
  english_pob_choice: God
  chosen_spanish: Dios
  alternatives_spanish:
  - el Dios
  - Dios mismo
  lexicon: HALOT
  rationale: El sustantivo es singular en sentido y concuerda con el predicado singular; «Dios» es la traducción directa y natural.
- source_word: שֹׁפֵט
  english_pob_choice: is the judge
  chosen_spanish: es el juez
  alternatives_spanish:
  - juzga
  - está juzgando
  lexicon: HALOT
  rationale: El participio funciona aquí con valor predicativo; «es el juez» preserva el matiz nominal y la función soberana de Dios en el juicio.
- source_word: זֶה
  english_pob_choice: one
  chosen_spanish: a uno
  alternatives_spanish:
  - a este
  - a uno de ellos
  lexicon: HALOT
  rationale: El demostrativo es distributivo en la construcción paralela; en español, «a uno ... a otro» expresa mejor la oposición que una repetición literal.
- source_word: יַשְׁפִּיל
  english_pob_choice: brings one down
  chosen_spanish: humilla
  alternatives_spanish:
  - rebaja
  - abate
  - lo baja
  lexicon: HALOT
  rationale: El Hifil de שׁפל significa hacer bajar o humillar; «humilla» comunica con claridad el efecto causativo sin perder la dirección semántica.
- source_word: וְ/זֶה
  english_pob_choice: and another
  chosen_spanish: y a otro
  alternatives_spanish:
  - y a este
  - pero a otro
  lexicon: HALOT
  rationale: La segunda ocurrencia del demostrativo mantiene el paralelismo distributivo; «y a otro» es la formulación más natural en español.
- source_word: יָרִים
  english_pob_choice: lifts up
  chosen_spanish: enaltece
  alternatives_spanish:
  - levanta
  - exalta
  - alza
  lexicon: HALOT
  rationale: El Hifil de רום expresa elevar o exaltar; «enaltece» conserva la idea de levantar al otro en contraste con humillar, en un español digno y claro.
theological_decisions:
- issue: Valor verbal o nominal de שֹׁפֵט
  english_pob_reading: For God is the judge
  chosen_spanish_reading: Porque Dios es el juez
  alternative_spanish_readings:
  - Porque Dios juzga
  - Porque Dios está juzgando
  rationale: El hebreo permite tanto una lectura verbal como una predicativa. Se mantiene la lectura nominal porque subraya el oficio soberano de Dios, en línea con el audit trail inglés, sin añadir contenido doctrinal extra.
  doctrine_reference: Translation philosophy §1, §5
- issue: Estructura distributiva de זֶה ... וְזֶה
  english_pob_reading: he brings one down, and lifts up another
  chosen_spanish_reading: a uno humilla y a otro enaltece
  alternative_spanish_readings:
  - humilla a uno y enaltece a otro
  - a este humilla y a este enaltece
  rationale: El hebreo usa una distribución enfática («este... y este...»). En español se preserva el sentido distributivo con «a uno... a otro», evitando una literalidad que sonaría artificial.
  doctrine_reference: Translation philosophy §1, §5
translation_notes:
  revision_awareness: Se corrigió el problema de validación anterior asegurando que el marcador [a] aparezca exactamente en el texto español. La nota se ancla ahora en «juez[a]» y corresponde a la alternativa verbal documentada por el audit trail inglés.
  spanish_consistency_notes:
  - Se mantiene «Dios» para אֱלֹהִים conforme al singular exigido por el contexto.
  - Se evita «SEÑOR» porque el versículo usa אֱלֹהִים, no el Tetragrámaton.
  - «Humilla / enaltece» conserva el contraste vertical del hebreo y su equilibrio poético.
  - La puntuación con dos puntos refleja bien la pausa del hebreo y el paralelismo subsiguiente.
