translation:
  language: es
  text: Y setenta hombres de entre los ancianos de la casa de Israel, y Jaazanías hijo de Safán, estaban de pie delante de ellos, y Jaazanías estaba[a] en medio de ellos; cada hombre tenía su incensario en la mano[b][c], y la espesa nube de incienso subía[d].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'en medio de ellos'.
    reason: lexical_alternative
  - marker: b
    text: Es decir, delante de las imágenes representadas en la pared de la cámara (véase v. 10).
    reason: cross_reference
  - marker: c
    text: O 'quemador de incienso'.
    reason: lexical_alternative
  - marker: d
    text: O 'la densa nube de incienso estaba subiendo'.
    reason: lexical_alternative
lexical_decisions:
- source_word: שִׁבְעִים אִישׁ
  english_pob_choice: seventy men
  chosen_spanish: setenta hombres
  alternatives_spanish:
  - setenta personas
  lexicon: HALOT
  rationale: אִישׁ se refiere aquí a un grupo contado de varones; 'hombres' conserva mejor el rasgo de género y la referencia a los ancianos.
- source_word: מִזִּקְנֵי בֵית יִשְׂרָאֵל
  english_pob_choice: from the elders of the house of Israel
  chosen_spanish: de entre los ancianos de la casa de Israel
  alternatives_spanish:
  - de los ancianos de la casa de Israel
  - de entre los ancianos de Israel
  lexicon: HALOT
  rationale: La preposición מִן admite aquí un matiz de origen o extracción; 'de entre' expresa que estos setenta salen del grupo de ancianos. 'Casa de Israel' se conserva por fidelidad a la expresión hebrea.
- source_word: יַאֲזַנְיָהוּ בֶן שָׁפָן
  english_pob_choice: Jaazaniah the son of Shaphan
  chosen_spanish: Jaazanías hijo de Safán
  alternatives_spanish:
  - Jaazanías, hijo de Safán
  lexicon: transliteración estándar
  rationale: Los nombres propios se transliteran al español de forma transparente; la filiación se expresa de manera directa y natural.
- source_word: עֹמֵד בְּתוֹכָם
  english_pob_choice: standing among them
  chosen_spanish: estaban en medio de ellos
  alternatives_spanish:
  - estaba en medio de ellos
  - estando en medio de ellos
  lexicon: HALOT
  rationale: בְּתוֹךְ indica estar en medio o en el centro de un grupo. En español, 'en medio de ellos' comunica con naturalidad la relación espacial.
- source_word: עֹמְדִים לִפְנֵיהֶם
  english_pob_choice: were standing before them
  chosen_spanish: de pie delante de ellos
  alternatives_spanish:
  - estaban de pie delante de ellos
  - estaban delante de ellos
  lexicon: HALOT
  rationale: El participio progresivo describe la escena en desarrollo. 'De pie delante de ellos' mantiene el matiz visual de postura, sin perder la referencia a la escena previa.
- source_word: מִקְטַרְתּוֹ
  english_pob_choice: his censer
  chosen_spanish: su incensario
  alternatives_spanish:
  - su censer
  - su recipiente para incienso
  lexicon: HALOT
  rationale: '''Incensario'' es el equivalente natural en español para el instrumento de quemar incienso y conserva el registro bíblico sin caer en un anglicismo.'
- source_word: וַעֲתַר עֲנַן הַקְּטֹרֶת
  english_pob_choice: the thick cloud of incense
  chosen_spanish: la espesa nube de incienso
  alternatives_spanish:
  - la densa nube de incienso
  - la espesa nube del incienso
  lexicon: HALOT
  rationale: עֲתַר expresa abundancia o espesura; 'espesa nube' reproduce la fuerza visual del hebreo y su efecto acumulativo.
- source_word: עֹלֶה
  english_pob_choice: was going up
  chosen_spanish: subía
  alternatives_spanish:
  - estaba subiendo
  - ascendía
  lexicon: HALOT
  rationale: El participio presenta una acción en curso. 'Subía' es breve, natural y conserva la imagen concreta del humo elevándose.
theological_decisions:
- issue: Referente de לִפְנֵיהֶם ('before them')
  english_pob_reading: Retained as 'before them,' referring contextually to the portrayed idols/creeping things in the chamber.
  chosen_spanish_reading: Se mantiene 'delante de ellos', dejando que el referente se recupere por el contexto inmediato.
  alternative_spanish_readings:
  - delante de las imágenes
  - ante ellas
  - delante de ello
  rationale: El hebreo conserva un pronombre plural cuya referencia se entiende por el contexto cercano, pero no se explicita en el verso. La traducción preserva esa tensión y evita resolverla interpretivamente en el texto principal.
  doctrine_reference: Preservar la tensión contextual sin sobreinterpretar el referente.
translation_notes:
  revision_awareness: 'La redacción sigue de cerca el sentido confirmado por la revisión reciente del inglés POB y no introduce cambios sustantivos respecto del trazado auditado: mantiene el grupo contado, la ubicación espacial de Jaazanías, el referente contextual de ''delante de ellos'' y la imagen continua del humo que asciende.'
  spanish_consistency_notes:
  - Se usó 'Y' inicial para concordar con el estilo narrativo bíblico en español.
  - '''Casa de Israel'' se mantuvo sin simplificar para conservar la formulación hebrea.'
  - '''Incensario'' se prefirió a ''censer'' por ser el término español natural y claro en este registro.'
  - No se usó 'SEÑOR' ni 'Cristo' porque el versículo no contiene el Tetragrámaton ni lenguaje mesiánico.
