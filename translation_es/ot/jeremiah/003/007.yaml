translation:
  language: es
  text: 'Y dije[a]: «Después de haber hecho todas estas cosas, volverá a mí»; pero no volvió[b]; y su hermana traicionera Judá[c] lo vio.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «volvería a mí». El imperfecto hebreo puede expresar un futuro esperado desde un punto de vista pasado.
    reason: lexical_alternative
  - marker: b
    text: «Volver» también puede rendirse como «regresar» o, en contexto de pacto, «arrepentirse».
    reason: lexical_alternative
  - marker: c
    text: O «su hermana infiel Judá». El adjetivo hebreo puede enfatizar infidelidad o traición.
    reason: lexical_alternative
lexical_decisions:
- source_word: וָאֹמַר
  english_pob_choice: And I said
  chosen_spanish: Y yo dije
  alternatives_spanish:
  - Entonces dije
  - Y dije
  lexicon: HALOT
  rationale: El wayyiqtol introduce la continuación del relato en primera persona; «Y yo dije» conserva el flujo narrativo simple y natural en español sin añadir matiz temporal no requerido.
- source_word: אַחֲרֵי עֲשׂוֹתָהּ אֶת כָּל אֵלֶּה
  english_pob_choice: After she had done all these things
  chosen_spanish: Después de haber hecho todas estas cosas
  alternatives_spanish:
  - Después de que hizo todas estas cosas
  - Tras hacer todas estas cosas
  lexicon: HALOT
  rationale: La construcción temporal con infinitivo y sufijo se expresa bien con una subordinada de anterioridad; el pluscuamperfecto español preserva la secuencia temporal relativa.
- source_word: אֵלַי תָּשׁוּב
  english_pob_choice: she will return to me
  chosen_spanish: volverá a mí
  alternatives_spanish:
  - regresará a mí
  - volvería a mí
  - debería volver a mí
  lexicon: HALOT
  rationale: «שׁוּב» en este contexto mantiene el campo semántico de regreso/restauración. «Volverá a mí» es idiomático en español y conserva la expectativa futura desde el punto de vista pasado, sin explicitar todavía «arrepentirse».
- source_word: וְלֹא שָׁבָה
  english_pob_choice: but she did not return
  chosen_spanish: pero no volvió
  alternatives_spanish:
  - pero no regresó
  - pero no se volvió
  - pero no volvió a mí
  lexicon: HALOT
  rationale: Se mantiene la repetición léxica de «volver» para conservar la cohesión con תָּשׁוּב y el motivo profético-covenantal de retorno.
- source_word: וַתֵּרֶא
  english_pob_choice: and her treacherous sister Judah saw it
  chosen_spanish: y su hermana traicionera Judá lo vio
  alternatives_spanish:
  - y su hermana infiel Judá lo vio
  - y Judá, su hermana traicionera, lo vio
  lexicon: HALOT
  rationale: «ראה» se traduce de forma directa como «ver». Se añade «lo» para hacer explícito el objeto implícito en español; no introduce contenido nuevo, solo claridad.
- source_word: בָּגוֹדָה
  english_pob_choice: treacherous
  chosen_spanish: traicionera
  alternatives_spanish:
  - infiel
  - desleal
  lexicon: HALOT
  rationale: El adjetivo procede de בגד y expresa infidelidad con matiz de traición. «Traicionera» conserva mejor esa fuerza que «infiel», que podría sonar más suave o más religioso-general.
- source_word: אֲחוֹתָהּ יְהוּדָה
  english_pob_choice: her treacherous sister Judah
  chosen_spanish: su hermana ... Judá
  alternatives_spanish:
  - Judá, su hermana
  - Judá, su hermana traicionera
  lexicon: HALOT
  rationale: La relación de parentesco metafórico se mantiene explícita para preservar la imagen profética de Israel/Judá como hermanas. El nombre propio se coloca tras el sustantivo para reflejar la apposición del hebreo.
theological_decisions:
- issue: Alcance covenantal de שׁוּב
  english_pob_reading: return
  chosen_spanish_reading: volver
  alternative_spanish_readings:
  - regresar
  - arrepentirse
  - volver atrás
  rationale: En Jeremías, שׁוּב puede incluir el retorno espiritual o pactual, pero el verso no usa un verbo explícito de arrepentimiento. «Volver» conserva la tensión entre movimiento y conversión sin resolverla prematuramente.
  doctrine_reference: Translation philosophy §3 (preservar tensión teológica en vez de resolverla)
- issue: Caracterización moral de Judá por בָּגוֹדָה
  english_pob_reading: treacherous sister Judah
  chosen_spanish_reading: su hermana traicionera Judá
  alternative_spanish_readings:
  - su hermana infiel Judá
  - su hermana desleal Judá
  - Judá, su hermana traicionera
  rationale: El término señala una falta de lealtad de pacto, no solo una descripción emocional. «Traicionera» mantiene el filo moral-teológico del adjetivo sin caer en una formulación excesivamente eclesiástica.
  doctrine_reference: Translation philosophy §5 (consistencia de términos clave y excepciones documentadas)
translation_notes:
  revision_awareness: El testimonio auditado en inglés mantiene una alta concordancia con el hebreo y no requiere revisión sustantiva; se preservan la secuencia narrativa, la repetición de «volver» y la ambigüedad covenantal de שׁוּב, además de la fuerza moral de בָּגוֹדָה.
  spanish_consistency_notes:
  - Se evita «SEÑOR» porque este versículo no contiene el Tetragrámaton en la forma del texto español objetivo; el hablante queda implícito por el contexto profético.
  - Se mantiene la metáfora de «hermana» para Judá, siguiendo el paralelismo del hebreo.
  - Se conserva la repetición verbal «volver / volvió» para reflejar el contraste de retorno frustrado.
  - El objeto explícito «lo» ayuda a la fluidez del español sin alterar el contenido del hebreo.
