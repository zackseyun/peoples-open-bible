translation:
  language: es
  text: 'Cuando el primero había muerto de esta manera, llevaron al segundo al escarnio; y, después de arrancarle la piel de la cabeza[a] junto con el cabello, preguntaron[b]: «¿Comerás antes de que tu cuerpo sea castigado miembro por miembro?»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Más literalmente: «la piel de la cabeza»; «cuero cabelludo» también sería posible.'
    reason: lexical_alternative
  - marker: b
    text: La pregunta supone, por el contexto, que se trata de comer lo prohibido por la ley ancestral.
    reason: cross_reference
lexical_decisions:
- source_word: Μεταλλάξαντος
  english_pob_choice: had died
  chosen_spanish: había muerto
  alternatives_spanish:
  - había fallecido
  - había llegado a su fin
  lexicon: LSJ
  rationale: El genitivo absoluto describe aquí la muerte del primero dentro del relato de su tortura; en español, «había muerto» comunica con naturalidad el valor idiomático que el inglés POB ya identificó.
- source_word: τὸν δεύτερον
  english_pob_choice: the second
  chosen_spanish: el segundo
  alternatives_spanish:
  - el segundo hermano
  lexicon: LSJ
  rationale: El griego dice literalmente «el segundo»; se conserva la elipsis porque el contexto narrativo ya identifica a los hermanos sin necesidad de añadir «hermano».
- source_word: ἐπὶ τὸν ἐμπαιγμόν
  english_pob_choice: to the mockery
  chosen_spanish: para el escarnio
  alternatives_spanish:
  - para la burla
  - para la mofa
  - al escarnio
  lexicon: LSJ
  rationale: ἐμπαιγμός expresa burla pública, humillación y trato vejatorio. «Escarnio» mantiene el peso de humillación ritual o pública que el inglés POB quiso conservar con «mockery».
- source_word: τὸ τῆς κεφαλῆς δέρμα
  english_pob_choice: the skin of his head
  chosen_spanish: la piel de la cabeza
  alternatives_spanish:
  - el cuero cabelludo
  - la piel de su cabeza
  lexicon: LSJ
  rationale: Se mantiene la literalidad de «la piel de la cabeza» para no sobrecerrar el sentido a «cuero cabelludo», aunque esa sea una posibilidad idiomática.
- source_word: σὺν ταῖς θριξὶν
  english_pob_choice: with the hair
  chosen_spanish: junto con el cabello
  alternatives_spanish:
  - con el pelo
  - con el cabello
  lexicon: LSJ
  rationale: La frase indica que la piel fue arrancada junto con el pelo. «Cabello» es una opción digna y natural en español; «junto con» hace explícita la concomitancia del griego.
- source_word: περισύραντες
  english_pob_choice: after tearing off
  chosen_spanish: después de arrancarle
  alternatives_spanish:
  - después de desprenderle
  - tras arrancarle
  lexicon: LSJ
  rationale: El verbo indica una remoción violenta por tirón o desgarro. «Arrancarle» expresa bien la violencia física del pasaje sin añadir más de lo que el texto da.
- source_word: ἐπηρώτων
  english_pob_choice: they asked
  chosen_spanish: preguntaban
  alternatives_spanish:
  - preguntaron
  - seguían preguntando
  lexicon: LSJ
  rationale: Aunque el inglés final optó por «they asked» por fluidez narrativa, el imperfecto griego puede conservarse en español con «preguntaban», que sugiere acción continuada o repetida y refleja mejor el aspecto original.
- source_word: Εἰ φάγεσαι
  english_pob_choice: Will you eat
  chosen_spanish: ¿Comerás?
  alternatives_spanish:
  - ¿Vas a comer?
  - ¿Consentirás en comer?
  lexicon: LSJ
  rationale: La pregunta apunta a si cederá comiendo lo prohibido; «¿Comerás?» es directo y reproduce la sencillez interrogativa del griego.
- source_word: πρὸ τοῦ τιμωρηθῆναι
  english_pob_choice: before ... is punished
  chosen_spanish: antes de que ... sea castigado
  alternatives_spanish:
  - antes de que ... sea torturado
  - antes de que ... reciba castigo
  lexicon: LSJ
  rationale: τιμωρεῖν puede abarcar castigo en sentido amplio, y aquí el contexto corporal concreta la pena. «Sea castigado» mantiene el valor léxico amplio sin perder el marco de sufrimiento físico.
- source_word: κατὰ μέλος
  english_pob_choice: limb by limb
  chosen_spanish: miembro por miembro
  alternatives_spanish:
  - miembro a miembro
  - parte por parte
  lexicon: LSJ
  rationale: Se conserva la distribución corporal del griego. «Miembro por miembro» es fiel y sobrio en español; evita una reinterpretación más libre.
- source_word: τὸ σῶμα
  english_pob_choice: your body
  chosen_spanish: tu cuerpo
  alternatives_spanish:
  - tu persona
  - tu carne
  lexicon: LSJ
  rationale: σῶμα se refiere concretamente al cuerpo sometido al tormento. «Tu cuerpo» es la equivalencia natural y transparente.
theological_decisions:
- issue: La pregunta presupone la violación de la ley ancestral sobre alimentos prohibidos
  english_pob_reading: The question implies eating what had been forbidden under the ancestral law, as the surrounding context makes clear.
  chosen_spanish_reading: La pregunta da por supuesto que se trata de comer lo prohibido por la ley ancestral, según deja claro el contexto cercano.
  alternative_spanish_readings:
  - La pregunta solo se refiere a comer en general.
  - La pregunta alude vagamente a una comida cualquiera.
  rationale: El contexto narrativo de 2 Macabeos muestra que la oferta no es neutral; la formulación española debe conservar esa implicación sin explicitar más de lo que el pasaje soporta.
  doctrine_reference: 2 Macabeos 7:1-42; ley ancestral sobre alimentos prohibidos
translation_notes:
  revision_awareness: He seguido la revisión inglesa más reciente en la narración principal al usar una pregunta en forma simple y directa, pero he recuperado en español el imperfecto de ἐπηρώτων («preguntaban») porque el aspecto iterativo/continuativo pertenece al griego y aporta precisión sin chocar con la fluidez del castellano. También he mantenido la tensión entre literalidad y naturalidad en «la piel de la cabeza» frente a la opción idiomática «cuero cabelludo».
  spanish_consistency_notes:
  - He usado «Yahvé» solo cuando el texto lo exija explícitamente; este versículo no lo requiere.
  - He preservado «escarnio» para ἐμπαιγμός, en lugar de sustituirlo por un término eclesiástico más interpretativo.
  - He mantenido «cuerpo» para σῶμα y no «carne», porque aquí la referencia es física y concreta en el contexto del tormento.
  - He usado «miembro por miembro» para conservar la distribución corporal del griego y la continuidad con la solución inglesa POB.
  - He optado por «preguntaban» para reflejar mejor el imperfecto griego, aunque la narración española siga siendo fluida.
