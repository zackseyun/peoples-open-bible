revisions:
- from: Estas son las leyes y los decretos[a] que ustedes cuidarán de poner por obra en la tierra que Yahvé, el Dios de sus padres, les ha dado para que la posean[b], todos los días que ustedes vivan sobre la tierra[c].
  to: Estos son los estatutos y los juicios[a] que ustedes tendrán cuidado de cumplir en la tierra que Yahvé, el Dios de sus padres, les ha dado para que la posean[b], todos los días que ustedes vivan sobre la tierra[c].
  rationale: Se revisa la pareja legal a «estatutos y juicios» para conservar con mayor fidelidad la distinción hebrea y la decisión léxica auditada en inglés. Se ajusta la cláusula verbal a «tendrán cuidado de cumplir» para reflejar mejor שׁמר + infinitivo en español natural y reverente. Se corrige la nota a para que preserve una alternativa significativa sin invertir la opción principal más fiel.
  reviewer_model: gpt-5.4
