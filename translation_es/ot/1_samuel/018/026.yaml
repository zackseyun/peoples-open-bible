  text: וַ/יַּגִּ֨דוּ עֲבָדָ֤י/ו לְ/דָוִד֙ אֶת הַ/דְּבָרִ֣ים הָ/אֵ֔לֶּה וַ/יִּשַׁ֤ר הַ/דָּבָר֙ בְּ/עֵינֵ֣י דָוִ֔ד לְ/הִתְחַתֵּ֖ן בַּ/מֶּ֑לֶךְ וְ/לֹ֥א מָלְא֖וּ הַ/יָּמִֽים־׃
base_translation:
  language: en
  yaml_path: translation/ot/1_samuel/018/026.yaml
  text: So his servants told David these words[a], and the matter seemed right in David’s eyes, to become the king’s son-in-law[c][b]; and the days had not yet been fulfilled.
  footnotes:
  - marker: a
    text: Or, 'the thing pleased David.' The Hebrew idiom literally says 'the matter was right in David’s eyes.'
    reason: lexical_alternative
  - marker: b
    text: Or, 'to marry into the king’s family.' The Hebrew expression is literally 'to become related by marriage with the king.'
    reason: lexical_alternative
  - marker: c
    text: That is, the allotted time had not yet expired.
    reason: cultural_note
