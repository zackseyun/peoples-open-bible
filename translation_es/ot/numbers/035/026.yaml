translation:
  language: es
  text: Pero si de hecho el homicida[a] sale más allá del límite de su ciudad de refugio a la que huyó,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «sale más allá del borde de su ciudad de refugio a la que huyó». El hebreo usa un infinitivo absoluto con el verbo finito («salir, sale») para dar énfasis.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְאִם
  english_pob_choice: But if
  chosen_spanish: Pero si
  alternatives_spanish:
  - Y si
  - Ahora bien, si
  lexicon: HALOT
  rationale: En este contexto jurídico, la conjunción marca contraste con la normativa anterior; «pero» conserva mejor ese matiz que un simple «y».
- source_word: הָרֹצֵחַ
  english_pob_choice: the manslayer
  chosen_spanish: el homicida
  alternatives_spanish:
  - el matador
  - el asesino
  - el matador de un hombre
  lexicon: HALOT
  rationale: El contexto de las ciudades de refugio apunta al que causó una muerte y busca asilo. «Homicida» funciona en español jurídico y evita imponer culpabilidad moral absoluta que el pasaje no desarrolla aquí.
- source_word: יָצֹא יֵצֵא
  english_pob_choice: indeed goes out
  chosen_spanish: sale de verdad
  alternatives_spanish:
  - sale ciertamente
  - sale realmente
  - sale sin falta
  lexicon: HALOT
  rationale: La construcción de infinitivo absoluto + verbo finito intensifica la acción. «De verdad» transmite la fuerza enfática de manera natural; se preserva la idea de salida efectiva sin volverlo mecánico.
- source_word: אֶת גְּבוּל
  english_pob_choice: beyond the boundary
  chosen_spanish: más allá del límite
  alternatives_spanish:
  - más allá del borde
  - fuera del límite
  - más allá de la frontera
  lexicon: HALOT
  rationale: Con el verbo de salida, el objeto marca la línea que no debe cruzarse. «Límite» es más natural que «frontera» en español para un límite legal o espacial.
- source_word: עִיר מִקְלָטוֹ
  english_pob_choice: his city of refuge
  chosen_spanish: la ciudad de refugio
  alternatives_spanish:
  - su ciudad de refugio
  - la ciudad de su refugio
  lexicon: HALOT
  rationale: En español, el posesivo del sufijo puede resultar redundante en esta construcción fija. Se mantiene el término técnico «ciudad de refugio»; la posesión se deja implícita por el contexto inmediato.
- source_word: אֲשֶׁר יָנוּס שָׁמָּה
  english_pob_choice: to which he fled
  chosen_spanish: a la que huyó
  alternatives_spanish:
  - donde huyó
  - a la cual huyó
  - a la que había huido
  lexicon: HALOT
  rationale: El relativo señala la ciudad como destino del escape. «A la que huyó» conserva el movimiento direccional implícito en el hebreo y es idiomático en español.
theological_decisions:
- issue: Tratamiento del término legal del sujeto responsable de una muerte
  english_pob_reading: the manslayer
  chosen_spanish_reading: el homicida
  alternative_spanish_readings:
  - el asesino
  - el matador
  rationale: La perícopa de las ciudades de refugio distingue entre la muerte causada y la culpabilidad deliberada en el resto del pasaje. «Homicida» es suficientemente técnico y no fuerza una lectura más condenatoria que la inmediata.
  doctrine_reference: Números 35:9-34; distinción entre muerte accidental y homicidio culpable
translation_notes:
  revision_awareness: 'La redacción sigue de cerca el texto hebreo y el audit trail inglés: conserva la fuerza enfática del infinitivo absoluto, mantiene el marco jurídico de las ciudades de refugio y evita suavizar el sujeto con un término demasiado genérico. Se optó por una formulación española fluida y publicable sin perder la tensión legal del pasaje.'
  spanish_consistency_notes:
  - Se conserva «ciudad de refugio» como término técnico estable.
  - Se usa «homicida» por coherencia con el contexto legal inmediato, evitando «asesino» salvo prueba de culpabilidad deliberada.
  - La nota mantiene la alternativa de traducción del límite/borde para reflejar la variación posible en español.
  - El pasaje queda en forma de cláusula subordinada, como en el hebreo y el inglés auditado, sin agregar verbos interpretativos.
