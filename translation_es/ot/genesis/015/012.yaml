translation:
  language: es
  text: Cuando el sol se estaba poniendo[a], un sueño profundo cayó sobre Abram. Y he aquí[b], un gran pavor tenebroso cayó sobre él.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «un trance cayó sobre Abram». El término hebreo puede referirse a un sueño inusualmente profundo, posiblemente producido por Dios.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «un gran terror de oscuridad» o «un gran terror oscuro». El hebreo comprime la idea de pavor y oscuridad en una frase muy vívida.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְהִי
  english_pob_choice: Now as
  chosen_spanish: Cuando
  alternatives_spanish:
  - Y sucedió que
  - Y aconteció que
  - Ahora, cuando
  lexicon: HALOT
  rationale: La forma waw-consecutiva con היה abre la escena y marca transición narrativa. En español, 'Cuando' introduce con naturalidad el marco temporal sin recurrir a una fórmula arcaica.
- source_word: הַשֶּׁמֶשׁ לָבוֹא
  english_pob_choice: the sun was going down
  chosen_spanish: el sol estaba poniéndose
  alternatives_spanish:
  - el sol se estaba poniendo
  - el sol iba a ponerse
  - al atardecer
  lexicon: HALOT
  rationale: La construcción expresa el acercamiento del ocaso. 'Estaba poniéndose' conserva el valor progresivo y la imagen dinámica del hebreo.
- source_word: תַרְדֵּמָה
  english_pob_choice: a deep sleep
  chosen_spanish: un sueño profundo
  alternatives_spanish:
  - un trance
  - un profundo sueño
  - un sopor profundo
  lexicon: HALOT
  rationale: El sustantivo denota un sueño muy profundo o pesado, a veces de origen divino. 'Sueño profundo' es claro y directo; se preserva la alternativa interpretativa en nota sin imponer 'trance' en el texto principal.
- source_word: נָפְלָה עַל אַבְרָם
  english_pob_choice: fell upon Abram
  chosen_spanish: cayó sobre Abram
  alternatives_spanish:
  - cayó sobre él
  - se abatió sobre Abram
  - vino sobre Abram
  lexicon: HALOT
  rationale: El verbo נפל mantiene la imagen de algo que desciende sobre una persona. 'Cayó sobre' reproduce esa fuerza idiomática con naturalidad en español.
- source_word: וְהִנֵּה
  english_pob_choice: And behold
  chosen_spanish: Y he aquí
  alternatives_spanish:
  - Y mira
  - Y de pronto
  - Y he aquí que
  lexicon: HALOT
  rationale: La fórmula introduce una observación vívida y dramática. 'Y he aquí' conserva bien el énfasis narrativo bíblico sin sonar excesivamente arcaico.
- source_word: אֵימָה
  english_pob_choice: dread
  chosen_spanish: pavor
  alternatives_spanish:
  - terror
  - temor
  - espanto
  lexicon: HALOT
  rationale: אֵימָה expresa temor intenso, sobrecogedor. 'Pavor' comunica bien esa intensidad y mantiene un registro bíblico sobrio.
- source_word: חֲשֵׁכָה
  english_pob_choice: dark
  chosen_spanish: oscuro
  alternatives_spanish:
  - de oscuridad
  - tenebroso
  - sombrío
  lexicon: HALOT
  rationale: Aquí el hebreo comprime la idea de oscuridad dentro de la expresión del temor. En español, 'oscuro' funciona como adjetivo que modifica naturalmente a 'pavor' y conserva la unión conceptual sin sobreexplicar.
- source_word: גְדֹלָה
  english_pob_choice: great
  chosen_spanish: grande
  alternatives_spanish:
  - muy grande
  - enorme
  - intenso
  lexicon: HALOT
  rationale: El adjetivo intensifica el sustantivo de forma directa. 'Grande' es la correspondencia más simple y fiel.
- source_word: נֹפֶלֶת עָלָיו
  english_pob_choice: was falling upon him
  chosen_spanish: cayó sobre él
  alternatives_spanish:
  - caía sobre él
  - estaba cayendo sobre él
  - se abatía sobre él
  lexicon: HALOT
  rationale: Aunque el participio sugiere vividez o continuidad, en español 'cayó' comunica con naturalidad el efecto resultante en una sola escena. Se evita una perífrasis que sonaría forzada en este contexto.
- source_word: אַבְרָם
  english_pob_choice: Abram
  chosen_spanish: Abram
  alternatives_spanish:
  - Abrán
  lexicon: Convención onomástica bíblica
  rationale: Se mantiene la forma tradicional del nombre patriarcal usada por la base inglesa y por la convención bíblica, sin adaptar la pronunciación al castellano.
theological_decisions:
- issue: Naturaleza de תַּרְדֵּמָה en un contexto revelatorio
  english_pob_reading: a deep sleep
  chosen_spanish_reading: un sueño profundo
  alternative_spanish_readings:
  - un trance
  - un sopor profundo
  rationale: El contexto sugiere una experiencia especial, posiblemente inducida por Dios, pero el sustantivo hebreo por sí mismo apunta primero a un sueño profundo. Se conserva esa base lexical y se deja abierta la posible carga visionaria en la nota.
  doctrine_reference: Preservar la tensión interpretativa sin resolverla de manera excesiva.
- issue: Compresión hebrea de ‘dread’ y ‘darkness’ en una sola frase
  english_pob_reading: a great dark dread
  chosen_spanish_reading: un gran y oscuro pavor
  alternative_spanish_readings:
  - un gran pavor de oscuridad
  - un gran terror oscuro
  rationale: El hebreo une de forma muy compacta el miedo y la oscuridad. La versión española intenta reflejar esa unión manteniendo ambos elementos y uniendo el adjetivo a la frase nominal de manera natural.
  doctrine_reference: Conservar la imaginería del texto sin suavizarla ni expandirla.
translation_notes:
  revision_awareness: La redacción sigue la revisión más reciente del POB inglés, que prefirió una acción completa (‘fell’) para la segunda cláusula en lugar de una perífrasis progresiva. En español, la solución principal ‘cayó sobre él’ refleja ese ajuste y mantiene el paralelismo con la primera aparición del verbo. También se mantiene la elección de una expresión más directa para תַּרְדֵּמָה, reservando la alternativa interpretativa en nota.
  spanish_consistency_notes:
  - Se conserva la transliteración 'Abram' para alineación con la tradición del pasaje y con el expediente POB.
  - Se evita sustituir 'Yahvé' o 'Mesías' porque no aparecen en este versículo.
  - Se mantiene un registro bíblico sobrio sin arcaísmos excesivos, pero con fórmulas narrativas reconocibles como 'Y he aquí'.
  - '''Pavor'' y ''oscuro'' reflejan la compresión semántica del hebreo sin separar artificialmente los elementos del sintagma.'
