revisions:
- from: El rey estaba en [a] ilegalidad, y el juez en [b] desobediencia, y el pueblo en pecado.
  to: El rey estaba[a] en iniquidad, y el juez en desobediencia[b], y el pueblo en pecado.
  rationale: Se revisa «ilegalidad» a «iniquidad» para representar mejor παρανομίᾳ en español bíblico natural y conservar la fuerza moral-jurídica del original. Se mantiene el pasado «estaba» por el contexto narrativo ya documentado. Se conserva la nota de alternativa para ἀπειθείᾳ y se recoloca la nota verbal donde corresponde.
