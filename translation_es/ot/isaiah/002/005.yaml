translation:
  language: es
  text: Casa de Jacob[a], vayan[b], y caminemos en la luz de Yahvé.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «Oh, casa de Jacob». La frase hebrea es una apelación directa a los descendientes de Jacob.
    reason: lexical_alternative
  - marker: b
    text: O «vengan, y caminemos». El hebreo usa un imperativo seguido de una cohortativa para exhortar a una acción compartida.
    reason: lexical_alternative
lexical_decisions:
- source_word: בֵּית יַעֲקֹב
  english_pob_choice: House of Jacob
  chosen_spanish: Casa de Jacob
  alternatives_spanish:
  - O casa de Jacob
  - familia de Jacob
  lexicon: HALOT
  rationale: La expresión hebrea es una vocación directa al pueblo descendiente de Jacob. «Casa de Jacob» conserva el idiomático constructo profético y su tono de llamado, mientras que «familia de Jacob» explicita demasiado el sentido y suaviza la fórmula.
- source_word: לְכוּ
  english_pob_choice: come
  chosen_spanish: vengan
  alternatives_spanish:
  - vayan
  - acérquense
  lexicon: HALOT
  rationale: El imperativo plural de הלך puede funcionar como invitación exhortativa. En español, «vengan» comunica naturalmente el llamado colectivo y mantiene el matiz exhortativo que en inglés POB resolvió con «come».
- source_word: וְנֵלְכָה
  english_pob_choice: and let us walk
  chosen_spanish: y caminemos
  alternatives_spanish:
  - y andemos
  - y vayamos caminando
  - para que caminemos
  lexicon: HALOT
  rationale: La forma cohortativa expresa resolución compartida; «caminemos» conserva la exhortación conjunta. Se prefiere «caminar» por ser el equivalente más claro del verbo y por mantener la metáfora bíblica de conducta o vida.
- source_word: בְּאוֹר
  english_pob_choice: in the light
  chosen_spanish: en la luz
  alternatives_spanish:
  - por la luz
  - a la luz
  lexicon: HALOT
  rationale: El hebreo permite esfera o medio; «en la luz» preserva la imagen de vivir dentro de la iluminación/guía divina sin convertirla en un instrumento externo. En español suena natural y fiel al paralelismo bíblico.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  - el SEÑOR
  lexicon: HALOT
  rationale: 'Se sigue el estándar español del proyecto para el Tetragrámaton: «Yahvé». Esto mantiene el nombre personal divino y evita la sustitución por un título o por la forma tradicional de transcripción no adoptada aquí.'
theological_decisions:
- issue: Representación del nombre divino YHWH
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Jehová
  - el SEÑOR
  rationale: El texto hebreo contiene el nombre propio divino, no un título. En español, el proyecto adopta «Yahvé» como forma estándar para preservar esa distinción y la referencia pactual del nombre revelado.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יהוה / YHWH → Yahvé'
translation_notes:
  revision_awareness: 'El pasaje coincide plenamente con el audit trail inglés: se conservan el vocativo idiomático, la invitación exhortativa del imperativo plural y la cohortativa, la metáfora de caminar en la luz, y el nombre divino transliterado. No se detectaron revisiones pendientes ni conflictos textuales.'
  spanish_consistency_notes:
  - «Casa de Jacob» mantiene el registro profético y evita la paráfrasis interpretativa.
  - «caminemos» traduce la cohortativa con naturalidad en español.
  - «en la luz de Yahvé» preserva la preposición de esfera y el nombre divino según la norma del proyecto.
  - Se evita «SEÑOR» para no ocultar el Tetragrámaton.
