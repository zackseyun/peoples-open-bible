revisions:
- from: Átalos siempre sobre tu corazón; llévalos alrededor de tu cuello.
  to: Átalos a tu corazón continuamente[a]; átalos alrededor de tu cuello[b].
  rationale: Se revisa el segundo verbo para ajustarlo mejor al hebreo עָנְדֵם y a la decisión léxica principal del POB inglés (‘tie them’), evitando una formulación demasiado interpretativa. También se añaden las notas de alternativas léxicas ya documentadas y se mejora la naturalidad española con «a tu corazón».
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T22:21:45Z'
review_pass:
  verdict: revise
  source_alignment_summary: El borrador capta bien el sentido básico de los dos imperativos y mantiene correctamente «corazón» y «cuello». Sin embargo, en el segundo miembro «llévalos alrededor de tu cuello» se aparta del valor imperativo concreto de עָנְדֵם (‘átalos / póntelos / ciñelos’) y además introduce una perífrasis más interpretativa. También falta reflejar las alternativas léxicas que el inglés conservó en notas para תָמִיד y עָנְדֵם.
  spanish_quality_summary: 'El español es claro y natural, pero puede afinarse para sonar más directo y paralelo: «Átalos a tu corazón continuamente; átalos alrededor de tu cuello». Así se preserva mejor la simetría poética y la imaginería de fijar/ceñir. «Sobre tu corazón» es posible, pero «a tu corazón» suena más idiomático en español sin perder la metáfora.'
  glossary_alignment: No hay términos de glosario mayores en juego. «Corazón» corresponde bien a לִבְּךָ. Para עָנְדֵם conviene una forma de ‘atar/ceñir’ en vez de «llévalos», porque el POB inglés documentó ‘tie them’ como principal y ‘wear them’ solo como alternativa. Las notas deben preservar «siempre» como alternativa de תָמִיד y «llévalos» como alternativa de עָנְדֵם.
  issues:
  - severity: medium
    issue: «llévalos alrededor de tu cuello» es demasiado interpretativo para עָנְדֵם
    rationale: El hebreo manda poner/ceñir/fijar algo como adorno; «llévalos» expresa el resultado de portar, no el acto imperativo de atarlo. El inglés auditado eligió ‘tie them’ y dejó ‘wear them’ como alternativa.
  - severity: low
    issue: Faltan las notas léxicas preservadas en el audit trail inglés
    rationale: El inglés conservó alternativas significativas para תָמִיד (‘always’) y para el segundo verbo (‘wear them’). Deben mantenerse también en español mediante notas ancladas correctamente.
  - severity: low
    issue: «sobre tu corazón» suena menos idiomático que «a tu corazón» en español
    rationale: Ambas opciones son defendibles, pero «átalos a tu corazón» fluye mejor en español y sigue comunicando la imagen metafórica de fijarlos al corazón.
  revised_spanish_text: Átalos a tu corazón continuamente[a]; átalos alrededor de tu cuello[b].
  revised_footnotes:
  - marker: a
    text: O «siempre».
    reason: lexical_alternative
  - marker: b
    text: O «llévalos alrededor de tu cuello».
    reason: lexical_alternative
  revision_rationale: Se revisa el segundo verbo para ajustarlo mejor al hebreo עָנְדֵם y a la decisión léxica principal del POB inglés (‘tie them’), evitando una formulación demasiado interpretativa. También se añaden las notas de alternativas léxicas ya documentadas y se mejora la naturalidad española con «a tu corazón».
