  source_alignment_summary: Dicho 24 — Discípulos piden ver el lugar de Jesús; él responde con «el que tenga oídos, que oiga» y la enseñanza sobre la luz dentro del hombre de luz. El español preserva la cadena de luz/oscuridad, la fórmula «hombre de luz» (ⲟⲩⲣⲱⲙⲉ ⲛⲟⲩⲟⲉⲓⲛ), y la conclusión «cuando no brilla, hay oscuridad». La distinción entre «oídos» (plural) y la fórmula bíblica se mantiene.
  spanish_quality_summary: Texto digno y claro. «Ilumina el mundo entero» preserva el alcance cósmico del copto. La estructura condicional «cuando no brilla» se vierte con naturalidad.
  glossary_alignment: 'Terminología alineada con la pauta POB: «Jesús» para ⲓⲏⲥⲟⲩⲥ, ausencia de calcos eclesiásticos posteriores en términos tomasinos sensibles (monachos, reino, Padre). No se introduce «Yahvé» ni terminología ajena al texto fuente. Las decisiones léxicas y teológicas siguen las del expediente POB inglés y de la revisión española previa (gpt-5.4), que ya armonizó el texto con la documentación auditada.'
  issues: []
  revised_spanish_text: 'Sus discípulos le dijeron: «Muéstranos el lugar donde estás, porque nos es necesario buscarlo». Él les dijo: «Quien tenga oídos, que oiga[a]. Hay[b] luz dentro de un hombre de luz[c], y él ilumina[d] el mundo entero. Cuando él no ilumina[f], hay oscuridad».'
  revised_footnotes:
  - marker: a
    text: El copto usa una fórmula idiomática equivalente a «quien tenga oídos con él»; en español se omite esa expresión en el texto principal.
    reason: lexical_alternative
  - marker: b
    text: 'El copto es declarativo: «Hay luz dentro de un hombre de luz». El fragmento griego lo presenta condicionalmente: «Si hay luz en un hombre de luz…».'
    reason: textual_variant
  - marker: c
    text: También puede entenderse «persona de luz», pero se conserva «hombre de luz» para mantener la expresión característica de Tomás.
    reason: lexical_alternative
  - marker: d
    text: En copto, el sujeto del verbo es la persona de luz, no la luz misma; por eso se traduce «él ilumina». El fragmento griego tiene «ella brilla», tomando «luz» como sujeto.
    reason: textual_variant
  - marker: f
    text: 'El copto dice: «Cuando él no ilumina, hay oscuridad». La reconstrucción griega se ha entendido como: «si no está, el mundo está en oscuridad». También puede traducirse «es oscuridad».'
    reason: textual_variant
  revision_rationale: Revisión Opus de precisión para palabras directas de Jesús en el Evangelio de Tomás. La revisión previa (gpt-5.4, 2026-05-08) ya armonizó el español con el rastro de auditoría POB y aplicó las correcciones léxicas y de notas necesarias. Esta revisión Opus confirma que el texto y las notas resultantes son fieles al copto (Coptic Scriptorium / Dilley 2025), preservan la cadencia aforística tomasina, y no requieren cambios adicionales. No se aplican modificaciones al texto principal ni a las notas.
