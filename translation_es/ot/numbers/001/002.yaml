  yaml_path: translation/ot/numbers/001/002.yaml
  text: Take a census of the whole congregation of the sons of Israel[a], by their clans, by their fathers’ houses, according to the number of names, every male[c][b], head by head.
  footnotes:
  - marker: a
    text: Literally, 'lift up the head of'; that is, count or enroll for a census.
    reason: lexical_alternative
  - marker: b
    text: Or 'the Israelites.' Literally, 'the sons of Israel.'
    reason: lexical_alternative
  - marker: c
    text: 'Literally, ''head by head.'' Hebrew: ''by their skulls/heads,'' an idiom for counting individuals one at a time.'
    reason: lexical_alternative
