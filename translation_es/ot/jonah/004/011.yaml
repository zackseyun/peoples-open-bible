translation:
  language: es
  text: ¿Y no habré de compadecerme de Nínive[a], la gran ciudad, en la que hay más de ciento veinte mil personas que no saben distinguir entre su derecha y su izquierda[b], y muchos animales?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: ''¿y no habré de ahorrar a Nínive?''.'
    reason: lexical_alternative
  - marker: b
    text: La expresión 'no saben distinguir entre su derecha y su izquierda' puede referirse específicamente a niños pequeños o, de manera más general, a personas sin discernimiento.
    reason: alternative_reading
lexical_decisions:
- source_word: אָח֔וּס
  english_pob_choice: have compassion
  chosen_spanish: compadecerme
  alternatives_spanish:
  - tener compasión de
  - perdonar
  - ahorrarme
  lexicon: HALOT
  rationale: El verbo hebreo חוּס puede significar 'ahorrar', 'pity' o 'have compassion'. En español, 'compadecerme' conserva el matiz afectivo de misericordia que el contexto pide, sin reducirlo solo a una acción jurídica de no destruir.
- source_word: עַל נִינְוֵה
  english_pob_choice: on Nineveh
  chosen_spanish: de Nínive
  alternatives_spanish:
  - sobre Nínive
  - para con Nínive
  lexicon: HALOT
  rationale: En español, con un verbo de compasión, la relación se expresa naturalmente con 'de', que comunica el objeto de la compasión de manera idiomática y fiel al hebreo.
- source_word: הָעִיר הַגְּדוֹלָה
  english_pob_choice: the great city
  chosen_spanish: la gran ciudad
  alternatives_spanish:
  - la ciudad grande
  - esa gran ciudad
  lexicon: HALOT
  rationale: '''Gran ciudad'' preserva el valor literario de גָּדוֹל y la repetición característica de Jonás. ''Ciudad grande'' suena más pesado en español y pierde algo del eco estilístico.'
- source_word: יֶשׁ בָּהּ
  english_pob_choice: in which there are
  chosen_spanish: en la que hay
  alternatives_spanish:
  - que tiene
  - donde hay
  lexicon: HALOT
  rationale: La construcción existencial hebrea se vierte con naturalidad como 'en la que hay', manteniendo el foco en lo que se encuentra dentro de la ciudad.
- source_word: הַרְבֵּה מִשְׁתֵּים עֶשְׂרֵה רִבּוֹ
  english_pob_choice: more than one hundred twenty thousand
  chosen_spanish: más de ciento veinte mil
  alternatives_spanish:
  - más de doce miríadas
  - más de 120.000
  lexicon: HALOT
  rationale: '''Ciento veinte mil'' es el equivalente idiomático claro de ''doce decenas de millares''. ''Más de'' conserva הַרְבֵּה en esta construcción numérica.'
- source_word: אָדָם
  english_pob_choice: people
  chosen_spanish: personas
  alternatives_spanish:
  - seres humanos
  - gente
  - hombres
  lexicon: HALOT
  rationale: '''Personas'' comunica la referencia humana contable sin sesgo masculino. Es más natural que ''hombres'' y más preciso que ''gente'' en un conteo.'
- source_word: אֲשֶׁר לֹא יָדַע בֵּין יְמִינוֹ לִשְׂמֹאלוֹ
  english_pob_choice: who do not know their right hand from their left
  chosen_spanish: que no saben distinguir entre su derecha y su izquierda
  alternatives_spanish:
  - que no saben diferenciar su derecha de su izquierda
  - que no distinguen su derecha de su izquierda
  lexicon: HALOT
  rationale: Se conserva el modismo hebreo en una forma clara y natural. 'Distinguir entre su derecha y su izquierda' retiene la imagen sin imponer si el sentido apunta a niños pequeños o a inmadurez/discernimiento moral.
- source_word: וּבְהֵמָה רַבָּה
  english_pob_choice: and many animals
  chosen_spanish: y muchos animales
  alternatives_spanish:
  - y mucho ganado
  - y muchas bestias
  lexicon: HALOT
  rationale: '''Animales'' es suficientemente amplio para no restringir innecesariamente בְּהֵמָה a ganado o reses, y conserva la sorpresa de incluir a los animales en la compasión divina.'
theological_decisions:
- issue: Referente de 'no saben distinguir entre su derecha y su izquierda'
  english_pob_reading: Retain the expression without specifying the referent beyond the text itself.
  chosen_spanish_reading: Conservar la expresión sin precisar si se refiere a niños, a habitantes inmaduros o a una falta general de discernimiento.
  alternative_spanish_readings:
  - niños pequeños o infantes
  - los habitantes en general con inmadurez moral o espiritual
  rationale: El hebreo permite varias lecturas; la traducción mantiene esa ambigüedad en vez de resolverla. Así se preserva la tensión interpretativa que el texto deja abierta.
  doctrine_reference: Translation philosophy §3
- issue: Sentido de אָחוּס
  english_pob_reading: Render as compassionate concern rather than only judicial sparing.
  chosen_spanish_reading: Expresar una compasión real, no solo un simple 'ahorrarse' la destrucción.
  alternative_spanish_readings:
  - ¿y no he de perdonar a Nínive?
  - ¿y no he de ahorrarme Nínive?
  rationale: El contexto contrasta la preocupación de Dios por Nínive con la de Jonás por la planta; 'compadecerme' comunica mejor la compasión activa, mientras que 'ahorrarme' o 'perdonar' quedan como posibilidades léxicas reales.
  doctrine_reference: Translation philosophy §3
translation_notes:
  revision_awareness: La redacción sigue de cerca el hebreo de WLC y el audit trail inglés de la POB, sin cambios de revisión reportados en el expediente más reciente. Se preserva la ambigüedad del referente de la frase idiomática y la alternativa lexical de אָחוּס mediante nota.
  spanish_consistency_notes:
  - Se usa 'Nínive' con tilde conforme al español.
  - Se eligió 'compadecerme' para mantener el matiz de misericordia activa y no solo de omitir castigo.
  - Se mantuvo 'la gran ciudad' como eco estilístico de la repetición hebrea y del inglés auditado.
  - '''Animales'' se dejó sin restringir a ''ganado'' para no estrechar el hebreo בְּהֵמָה.'
  - La formulación 'no saben distinguir entre su derecha y su izquierda' es idiomática, clara y conserva la ambigüedad interpretativa del original.
