  text: 먹고 마실 집이 여러분에게 없습니까? 아니면 여러분은 하나님의 교회를 멸시하고 가진 것이 없는 자들을 부끄럽게 합니까? 내가 여러분에게 무엇이라고 말해야 합니까? 여러분을 칭찬해야 합니까? 이 일에서는 내가 칭찬하지 않습니다.
  philosophy: optimal-equivalence
