translation:
  language: es
  text: ¡Desgraciadas las ciudades a las que fueron esclavizados tus hijos e hijas[a]; desgraciada la que recibió a tus hijos!
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «en las que tus hijos e hijas sirvieron como esclavos». El verbo griego puede rendirse más literalmente como «sirvieron», pero el contexto favorece el sentido más fuerte de esclavitud. El término griego aquí es más amplio que el de la segunda cláusula y se refiere a los hijos en general, no solo a los varones.
    reason: lexical_alternative
lexical_decisions:
- source_word: δείλαιαι
  english_pob_choice: wretched
  chosen_spanish: ¡Desgraciadas!
  alternatives_spanish:
  - ¡Miserables!
  - ¡Pobres!
  - ¡Ay de!
  lexicon: LSJ
  rationale: El griego es un adjetivo exclamativo de lamento y compasión dirigido a las ciudades. «Desgraciadas» conserva el tono de dolor/denuncia sin volverlo una mera interjección interpretativa como «¡Ay de!».
- source_word: αἱ πόλεις
  english_pob_choice: the cities
  chosen_spanish: las ciudades
  alternatives_spanish:
  - ciudades
  lexicon: LSJ
  rationale: El artículo definido se conserva de manera natural en español porque se refiere a ciudades concretas en el marco del exilio de Sión.
- source_word: αἷς ἐδούλευσαν
  english_pob_choice: to which your children were enslaved
  chosen_spanish: a las que fueron esclavizados
  alternatives_spanish:
  - en las que sirvieron como esclavos
  - en las que estuvieron en esclavitud
  lexicon: BDAG
  rationale: δουλεύω aquí expresa servicio en condición de esclavitud. Siguiendo la decisión auditada del inglés, se usa «fueron esclavizados» para mantener la fuerza de bondage y evitar suavizarlo con «sirvieron».
- source_word: τὰ τέκνα σου
  english_pob_choice: your children
  chosen_spanish: tus hijos
  alternatives_spanish:
  - tus niños
  - tu descendencia
  lexicon: BDAG
  rationale: τέκνα abarca hijos/descendencia en general. En español, «hijos» es la opción natural y suficientemente amplia en este contexto, sin introducir una restricción innecesaria.
- source_word: ἡ δεξαμένη
  english_pob_choice: she who received
  chosen_spanish: la que recibió
  alternatives_spanish:
  - la ciudad que recibió
  - la que acogió
  lexicon: LSJ
  rationale: El participio femenino singular personifica a la ciudad como mujer. «La que recibió» preserva esa personificación sin añadir un sustantivo interpretativo que no está en el griego.
- source_word: τοὺς υἱούς σου
  english_pob_choice: your sons
  chosen_spanish: tus hijos
  alternatives_spanish:
  - tus varones
  - tus hijos varones
  lexicon: BDAG
  rationale: υἱούς es específicamente masculino, pero en español «hijos» suele abarcar hijos varones en un contexto de filiación sin requerir la repetición de «varones». Aquí se prioriza la fluidez natural; la distinción de género queda implícita en el contraste con τέκνα.
theological_decisions:
- issue: Fuerza de δουλεύω en contexto de exilio y opresión
  english_pob_reading: were enslaved
  chosen_spanish_reading: fueron esclavizados
  alternative_spanish_readings:
  - sirvieron como esclavos
  - estuvieron en esclavitud
  rationale: El contexto no describe servicio neutral sino sometimiento forzado. La lectura española mantiene la severidad teológica e histórica del juicio sobre las ciudades, en línea con la decisión doctrinal del POB de conservar el sentido fuerte de la familia δοῦλος cuando el contexto lo exige.
  doctrine_reference: 'DOCTRINE.md: Contested terms table, δοῦλος *doulos* → servant / slave (context-dependent)'
translation_notes:
  revision_awareness: 'Coincide con la lectura revisada del contexto auditado: no hay cambios necesarios respecto del consenso alto del inglés POB y la revisión más reciente. Se preserva la personificación y la fuerza de esclavitud sin atenuación.'
  spanish_consistency_notes:
  - Se usó «desgraciadas» para mantener el tono de lamento exclamativo, evitando «¡Ay de!» por ser más interpretativo.
  - 'Se mantuvo el contraste léxico entre τέκνα y υἱούς con una solución española natural: ambos se traducen como «hijos», pero el segundo queda determinado por el paralelismo y la personificación.'
  - La decisión de «esclavizados» sigue el auditable POB inglés y evita una traducción más débil como «sirvieron».
