    text: 'O: «no hemos obedecido». El verbo hebreo puede implicar atender con respuesta obediente, no solo oír.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «nuestros antepasados». Literalmente, «nuestros padres».'
    reason: lexical_alternative
  revision_rationale: Se ajusta la frase final a 'todo el pueblo del país' para expresar en español natural el valor contextual de הָאָרֶץ sin introducir una lectura global de 'la tierra'. Se conservan las decisiones léxicas y teológicas principales del borrador, incluyendo 'escuchado' con nota alternativa y 'nuestros padres' con nota de 'antepasados'.
