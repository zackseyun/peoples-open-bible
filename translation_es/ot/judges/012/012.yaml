- from: Entonces murió Elon el zabulonita[a], y fue sepultado en Ajalón, en la tierra de Zabulón.
  to: Entonces murió Elon el zabulonita, y fue sepultado en Ajalón, en la tierra de Zabulón.[a]
  rationale: 'Se hace una reparación menor: se uniforma el gentilicio con el nombre tribal usado en el mismo versículo y se recoloca la nota alternativa junto a la frase ''la tierra de Zabulón'', que es donde realmente aplica la variante lexical ''territorio''. No se requieren cambios adicionales.'
