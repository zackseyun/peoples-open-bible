translation:
  language: es
  text: Él construyó Elat y la devolvió a Judá después de que el rey[a][b][c] se acostó con sus padres.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O “edificó”. El verbo hebreo puede traducirse simplemente así; el contexto también puede sugerir la reconstrucción o fortificación de un sitio ya existente.
    reason: lexical_alternative
  - marker: b
    text: La expresión “se acostó con sus padres” es un modismo hebreo que significa que el rey murió.
    reason: cultural_note
  - marker: c
    text: El hebreo dice simplemente “el rey”; por el contexto, el referente es Amasías.
    reason: cross_reference
lexical_decisions:
- source_word: בָּנָה
  english_pob_choice: built
  chosen_spanish: construyó
  alternatives_spanish:
  - edificó
  - levantó
  - edificó de nuevo
  lexicon: HALOT
  rationale: El hebreo בנה tiene el sentido básico de “construir”. En español, “construyó” expresa con naturalidad ese valor léxico sin forzar una lectura específica de reconstrucción que el texto no marca explícitamente.
- source_word: אֵילַת
  english_pob_choice: Elath
  chosen_spanish: Elat
  alternatives_spanish:
  - Elath
  - Eilat
  lexicon: HALOT
  rationale: Es un nombre propio de lugar. Se translitera para conservar la referencia geográfica; “Elat” es una forma bíblica comprensible en español y evita una modernización innecesaria.
- source_word: וַיְשִׁבֶהָ
  english_pob_choice: restored it
  chosen_spanish: la restauró
  alternatives_spanish:
  - la devolvió
  - la hizo volver
  - la restituyó
  lexicon: HALOT
  rationale: El verbo שוב con objeto de ciudad y destino político apunta a “hacer volver/restaurar” algo a su control. “La restauró” comunica bien la idea de recuperación sin sobrecargar el verso.
- source_word: לִיהוּדָה
  english_pob_choice: to Judah
  chosen_spanish: para Judá
  alternatives_spanish:
  - a Judá
  - para el control de Judá
  lexicon: HALOT
  rationale: La preposición ל puede indicar destino o transferencia. “Para Judá” conserva la idea de restitución a su posesión/ámbito sin sonar demasiado administrativo en español.
- source_word: שְׁכַב הַמֶּלֶךְ עִם אֲבֹתָיו
  english_pob_choice: after the king lay down with his fathers
  chosen_spanish: después de que el rey se acostó con sus padres
  alternatives_spanish:
  - después de que el rey murió
  - después de que el rey descansó con sus padres
  lexicon: HALOT
  rationale: Se preserva el idiomismo hebreo “se acostó con sus padres” para no borrar la forma original. “Se acostó” mantiene la imagen; el contexto permite entender que alude a la muerte.
- source_word: הַמֶּלֶךְ
  english_pob_choice: the king
  chosen_spanish: el rey
  alternatives_spanish:
  - el rey Amazías
  - Amazías
  lexicon: HALOT
  rationale: El hebreo dice solo “el rey”. En el texto principal se conserva esa formulación sobria; la identidad de Amazías queda en la nota, como en el audit trail inglés.
translation_notes:
  revision_awareness: La base inglesa fue revisada de “rebuilt” a “built” para ajustarse mejor al valor léxico de בנה. La versión española evita fijar innecesariamente “reconstruyó” en el texto principal y mantiene la transparencia idiomática de la clausula de muerte.
  spanish_consistency_notes:
  - Se mantiene el nombre divino fuera de este versículo porque no aparece en el hebreo.
  - Se conserva el paralelismo del idioma hebreo sobre la muerte sin sustituirlo por una paráfrasis interpretativa en el cuerpo del texto.
  - La traducción de la ciudad como nombre propio sigue la convención bíblica y no introduce formas modernas no atestiguadas.
