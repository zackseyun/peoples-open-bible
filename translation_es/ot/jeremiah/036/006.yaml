revisions:
- from: Así que tú mismo debes ir y leer del rollo que escribiste de mi boca[a] las palabras de Yahvé, en presencia del pueblo, en la casa de Yahvé, en un día de ayuno[b]; y también las leerás en presencia de todo Judá, los que vienen de sus ciudades.
  to: Así que tú mismo debes ir y leer del rollo que escribiste de mi boca[a] las palabras de Yahvé, a oídos del pueblo, en la casa de Yahvé, en un día de ayuno[b]; y también las leerás a oídos de todo Judá que viene de sus ciudades.
  rationale: Se revisa para preservar el modismo auditivo בְּאָזְנֵי con ‘a oídos de’, en línea con la evidencia hebrea y el rastro inglés, y para suavizar la cláusula final sin alejarse del original. También se mejora la nota léxica para que la alternativa idiomática en español sea natural.
  reviewer_model: gpt-5.4
