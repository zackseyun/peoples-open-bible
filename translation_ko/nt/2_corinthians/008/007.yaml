id: 2CO.8.7
reference: '2 Corinthians 8:7'
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: ἀλλ’ ὥσπερ ἐν παντὶ περισσεύετε, πίστει καὶ λόγῳ καὶ γνώσει καὶ πάσῃ σπουδῇ καὶ τῇ ἐξ ⸂ἡμῶν ἐν ὑμῖν⸃ ἀγάπῃ, ἵνα καὶ ἐν ταύτῃ τῇ χάριτι περισσεύητε.
base_translation:
  language: en
  yaml_path: translation/nt/2_corinthians/008/007.yaml
  text: But just as you abound in everything—in faith and speech and knowledge and all diligence and in our love in you—see that you also abound in this grace[a][b].
translation:
  language: ko
  text: 그러나 여러분이 모든 일에—믿음과 말과 지식과 모든 열심과 우리에게서 나와 여러분 안에 있는 사랑[a]에—풍성한 것처럼, 이 은혜로운 일[b]에서도 풍성하기 바랍니다.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 또는 「여러분이 우리를 향해 가진 사랑」. 본문은 사본상 어려움이 있으며, 「우리에게서 여러분에게로 흘러간 사랑」이라는 읽기가 채택되었다.
    reason: alternative_reading
  - marker: b
    text: 곧 이 은혜로운 베풂의 사역, 예루살렘 성도들을 위한 헌금을 가리킨다.
    reason: lexical_alternative
lexical_decisions:
- source_word: περισσεύετε / περισσεύητε
  english_pob_choice: abound
  chosen_korean: 풍성하다
  lexicon: BDAG
  rationale: 동사가 두 번 나타나며 동일하게 옮겨야 한다. 「풍성하다」가 영적 부요와 헌금에서의 너그러움 모두에 자연스럽다.
  alternatives_korean:
  - 넘치다
  - 뛰어나다
- source_word: πίστει
  english_pob_choice: faith
  chosen_korean: 믿음
  lexicon: BDAG
  rationale: 바울 표준어. 「믿음」 기본값.
- source_word: λόγῳ
  english_pob_choice: speech
  chosen_korean: 말
  lexicon: BDAG
  rationale: 덕목 목록에서 λόγος는 표현·언변을 가리킨다. 「말」이 가장 자연스럽다.
  alternatives_korean:
  - 말씀
  - 언변
- source_word: σπουδῇ
  english_pob_choice: diligence
  chosen_korean: 열심
  lexicon: BDAG
  rationale: σπουδή는 진지한 열정과 부지런함을 함께 담는다. 헌금 문맥에서는 「열심」이 가장 자연스럽다.
  alternatives_korean:
  - 진지함
  - 간절함
- source_word: τῇ ἐξ ἡμῶν ἐν ὑμῖν ἀγάπῃ
  english_pob_choice: our love in you
  chosen_korean: 우리에게서 나와 여러분 안에 있는 사랑
  lexicon: BDAG
  rationale: 본문은 사본상 어려움이 있으나 채택된 읽기는 「우리에게서 여러분에게로 흘러간 사랑」을 가리킨다. 영어 POB의 채택 읽기를 따른다.
  alternatives_korean:
  - 여러분이 우리를 향해 가진 사랑
