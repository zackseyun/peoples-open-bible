id: 2CH.24.8
reference: 2 Chronicles 24:8
source:
  edition: WLC
  text: וַ/יֹּ֣אמֶר הַ/מֶּ֔לֶךְ וַֽ/יַּעֲשׂ֖וּ אֲר֣וֹן אֶחָ֑ד וַֽ/יִּתְּנֻ֛/הוּ בְּ/שַׁ֥עַר בֵּית יְהוָ֖ה חֽוּצָ/ה־׃
translation:
  text: Then the king commanded[a], and they made one chest and placed it outside at the gate of the house of Yahweh.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'a chest'; Hebrew 'one chest,' likely emphasizing a single designated collection box.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר
  chosen: commanded
  alternatives:
  - said
  - ordered
  lexicon: HALOT
  rationale: Although the verb literally means 'said,' in this administrative context with ensuing action it carries the force of issuing an order. 'Commanded' captures the pragmatic sense in natural English without excessive paraphrase.
- source_word: הַמֶּלֶךְ
  chosen: the king
  lexicon: HALOT
  rationale: Straightforward rendering of the definite noun phrase.
- source_word: וַיַּעֲשׂוּ
  chosen: they made
  alternatives:
  - they prepared
  - they fashioned
  lexicon: HALOT
  rationale: Common verb עשה is best rendered 'made' here for a physical object. The plural subject is left indefinite in English, matching the Hebrew's unspecified agents.
- source_word: אֲרוֹן אֶחָד
  chosen: one chest
  alternatives:
  - a chest
  - one box
  - an ark
  lexicon: HALOT
  rationale: אֲרוֹן denotes a container/chest. 'Ark' would sound overly technical or misleading in English because this is a collection container, not the ark of the covenant. Including 'one' reflects אֶחָד, which likely emphasizes a single designated receptacle.
- source_word: וַיִּתְּנֻהוּ
  chosen: placed it
  alternatives:
  - put it
  - set it
  lexicon: HALOT
  rationale: נתן literally means 'gave/put.' 'Placed it' fits the physical setting of positioning the chest and reads smoothly in English.
- source_word: בְּשַׁעַר
  chosen: at the gate
  alternatives:
  - in the gate
  - by the gate
  lexicon: HALOT
  rationale: The preposition with 'gate' here indicates location. 'At the gate' is idiomatic English for the placement of the chest.
- source_word: בֵּית יְהוָה
  chosen: the house of the LORD
  alternatives:
  - the temple of the LORD
  - the house of Yahweh
  lexicon: HALOT
  rationale: '''House of the LORD'' closely reflects the Hebrew and preserves the temple imagery. Per doctrine, יְהוָה is rendered ''the LORD.'''
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: This follows the project's stated default for the divine name.
- source_word: חוּצָה
  chosen: outside
  alternatives:
  - outward
  - on the outside
  lexicon: HALOT
  rationale: The adverb indicates that the chest was set on the outside, clarifying its public accessibility rather than inside the sanctuary precincts proper.
