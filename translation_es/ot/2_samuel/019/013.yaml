translation:
  language: es
  text: Ustedes son mis hermanos[a]; ustedes son mi propio hueso y carne[b]. Entonces, ¿por qué van a ser ustedes los últimos en hacer regresar al rey[c]?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, más idiomáticamente, «mis parientes»; literalmente, «mis hermanos».
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «mi hueso y mi carne», un modismo para una relación de sangre cercana.'
    reason: cultural_note
  - marker: c
    text: David habla de sí mismo en tercera persona como «el rey».
    reason: lexical_alternative
lexical_decisions:
- source_word: אַחַי
  english_pob_choice: my brothers
  chosen_spanish: mis hermanos
  alternatives_spanish:
  - mis parientes
  - mis hermanos y parientes
  lexicon: HALOT
  rationale: El hebreo dice literalmente «mis hermanos». En este contexto la expresión dirige a los ancianos de Judá como parientes cercanos; en español «mis hermanos» conserva la fuerza fraterna y sigue siendo natural, mientras que «parientes» suavizaría demasiado el vínculo que el texto enfatiza con la imagen siguiente de «hueso y carne».
- source_word: עַצְמִי וּבְשָׂרִי
  english_pob_choice: my own bone and flesh
  chosen_spanish: mi propio hueso y carne
  alternatives_spanish:
  - mi hueso y mi carne
  - mi mismo hueso y carne
  lexicon: HALOT
  rationale: La expresión es un idiomatismo de parentesco estrecho o consanguinidad. «Mi propio hueso y carne» preserva la imagen concreta del hebreo y suena natural en español; «propio» refleja el énfasis posesivo que el inglés POB rindió con «own».
- source_word: וְלָמָה
  english_pob_choice: So why
  chosen_spanish: Entonces, ¿por qué
  alternatives_spanish:
  - ¿Y por qué
  - ¿Por qué entonces
  lexicon: HALOT
  rationale: El hebreo introduce una apelación derivada de la afirmación anterior sobre parentesco. «Entonces, ¿por qué» comunica en español esa fuerza inferencial sin volver mecánica la frase.
- source_word: תִהְיוּ אַחֲרֹנִים
  english_pob_choice: should you be the last
  chosen_spanish: habrían de ser los últimos
  alternatives_spanish:
  - serán los últimos
  - son los últimos
  lexicon: HALOT
  rationale: El imperfecto tiene valor retórico y exhortativo, no meramente predictivo. «Habrían de ser» expresa mejor la pregunta persuasiva de David que un futuro simple, y «los últimos» conserva la idea de ir detrás de otros en la acción.
- source_word: לְהָשִׁיב
  english_pob_choice: to bring back
  chosen_spanish: hacer volver
  alternatives_spanish:
  - traer de vuelta
  - restaurar
  lexicon: HALOT
  rationale: El causativo de שוב significa «hacer volver» o «hacer regresar». En español, «hacer volver» mantiene con claridad el valor causativo y la relación con «al rey» sin convertir la frase en algo más abstracto que el hebreo.
- source_word: הַמֶּלֶךְ
  english_pob_choice: the king
  chosen_spanish: el rey
  alternatives_spanish:
  - me, el rey
  - el soberano
  lexicon: HALOT
  rationale: El hebreo usa tercera persona y deja la autorreferencia real en esa forma. Traducir «el rey» preserva esa redacción de origen mejor que cambiar a primera persona; el español queda transparente y fiel al giro narrativo.
translation_notes:
  revision_awareness: El borrador sigue de cerca el pasaje hebreo y el trazado auditado del POB inglés. Mantiene la metáfora de parentesco («hermanos», «hueso y carne») y la referencia real en tercera persona («el rey»), ajustando solo el castellano para que la exhortación suene natural y pública en español.
  spanish_consistency_notes:
  - Se mantiene el tratamiento en segunda persona plural «ustedes» para concordar con el plural hebreo y con el tono exhortativo del contexto.
  - Se conserva la imagen idiomática de parentesco sin sustituirla por una paráfrasis explicativa en el cuerpo principal.
  - No se introduce «Cristo», «Señor» ni otras sustituciones terminológicas ajenas al hebreo de este verso.
  - Las notas al pie distinguen entre alternativa léxica y explicación cultural, siguiendo el patrón auditado del POB inglés.
