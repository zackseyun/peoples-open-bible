translation:
  language: es
  text: 'Azarías hijo de Hosaías, Johanán hijo de Carea, y todos los hombres arrogantes[a] dijeron a Jeremías: «Hablas falsamente[b]. Yahvé nuestro Dios no te ha enviado para decir: “No vayan a Egipto para residir allí como forasteros[c]”».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «insolentes» o «presuntuosos».
    reason: lexical_alternative
  - marker: b
    text: 'O «Estás hablando falsamente» / «Estás diciendo mentiras». El hebreo dice literalmente: «una mentira estás hablando».'
    reason: lexical_alternative
  - marker: c
    text: O «para morar allí». El verbo puede implicar residir como forasteros o extranjeros.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר / אֹמְרִים
  english_pob_choice: said / said to
  chosen_spanish: dijeron / dijeron a
  alternatives_spanish:
  - decían / decían a
  lexicon: HALOT
  rationale: El hebreo narra con verbo de decir en forma histórica y luego un participio colectivo; en español, el pretérito simple comunica con naturalidad la escena y la acusación directa.
- source_word: עֲזַרְיָה ... וְיוֹחָנָן ... וְכָל הָאֲנָשִׁים
  english_pob_choice: Azariah ... Johanan ... and all the arrogant men
  chosen_spanish: Azarías ... Johanán ... y todos los hombres
  alternatives_spanish:
  - Azarías ... Johanán ... y toda la gente
  lexicon: HALOT
  rationale: Los nombres propios se transliteran. אֲנָשִׁים se mantiene como «hombres» para conservar el valor lexical específico; el contexto limita el grupo a esos varones que hablan.
- source_word: הַזֵּדִים
  english_pob_choice: arrogant
  chosen_spanish: arrogantes
  alternatives_spanish:
  - insolentes
  - presuntuosos
  - soberbios
  lexicon: HALOT
  rationale: El campo semántico de זד apunta a actitud desafiante o presumida. «Arrogantes» es claro, digno y fiel al tono acusatorio del pasaje.
- source_word: שֶׁקֶר אַתָּה מְדַבֵּר
  english_pob_choice: You are speaking falsely
  chosen_spanish: Estás hablando falsamente
  alternatives_spanish:
  - Estás diciendo una mentira
  - Hablas falsamente
  lexicon: HALOT
  rationale: Se preserva la acusación de falsedad sin suavizarla. «Hablando falsamente» mantiene el paralelismo con el hebreo y evita reemplazar el sustantivo שֶׁקֶר por una paráfrasis más libre.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  lexicon: HALOT
  rationale: El Tetragrámaton se rinde con el nombre propio «Yahvé», de acuerdo con la norma del proyecto, en lugar de ocultarlo tras «SEÑOR».
- source_word: אֱלֹהֵינוּ
  english_pob_choice: our God
  chosen_spanish: nuestro Dios
  alternatives_spanish:
  - nuestro Dios
  lexicon: HALOT
  rationale: Constructo con sufijo posesivo; «nuestro Dios» expresa de forma natural la relación de pacto y pertenencia.
- source_word: לֵאמֹר
  english_pob_choice: to say
  chosen_spanish: para decir
  alternatives_spanish:
  - diciendo
  lexicon: HALOT
  rationale: La preposición final y el infinitivo se expresan en español con «para decir», que introduce con claridad el contenido citado.
- source_word: לֹא תָבֹאוּ
  english_pob_choice: Do not go
  chosen_spanish: No vayan
  alternatives_spanish:
  - No vayan ustedes
  - No irán
  lexicon: HALOT
  rationale: El plural hebreo y el valor prohibitivo se conservan con un imperativo plural en español. «No vayan» suena directo y fiel a la orden negada.
- source_word: מִצְרַיִם
  english_pob_choice: Egypt
  chosen_spanish: Egipto
  alternatives_spanish:
  - Egipto
  lexicon: HALOT
  rationale: Nombre geográfico estándar, sin variantes de sentido.
- source_word: לָגוּר שָׁם
  english_pob_choice: to sojourn there
  chosen_spanish: para morar allí
  alternatives_spanish:
  - para habitar allí como extranjeros
  - para residir allí
  lexicon: HALOT
  rationale: גוּר puede expresar residencia temporal o como forasteros. «Morar allí» conserva la idea de vivir allí sin agregar demasiado; la nota mantiene abierta la alternativa de «sojornar»/«residir como extranjeros».
theological_decisions:
- issue: Tratamiento del nombre divino יְהוָה en un discurso de acusación
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Jehová
  - el SEÑOR
  rationale: Se conserva el nombre personal de Dios tal como aparece en el hebreo. No se sustituye por un título genérico, porque el pasaje apela a la autoridad específica de Yahvé como remitente del mensaje.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Fuerza de la prohibición reportada en לֹא תָבֹאוּ
  english_pob_reading: Do not go
  chosen_spanish_reading: No vayan
  alternative_spanish_readings:
  - No deben ir
  - No irán
  rationale: El hebreo presenta una prohibición directa en discurso citado. En español, el imperativo negativo plural transmite mejor esa fuerza que una formulación modal más explicativa.
  doctrine_reference: 'Hebreo verbal: prohibición en discurso directo'
- issue: Valor de הַזֵּדִים
  english_pob_reading: arrogant men
  chosen_spanish_reading: hombres arrogantes
  alternative_spanish_readings:
  - hombres insolentes
  - hombres presuntuosos
  rationale: Se conserva el juicio moral del texto sin domesticarlo. «Arrogantes» comunica la oposición altiva de estos hombres frente al profeta.
  doctrine_reference: Lexical field of זד / זידד
translation_notes:
  revision_awareness: 'El borrador sigue la revisión más reciente del audit trail: mantiene la frase natural «hablando falsamente» para שקר אתה מדבר, y refleja la orden prohibitiva con una forma directa y plural en español. También conserva la decisión del POB de traducir el Tetragrámaton como nombre propio divino, no como sustituto titulado.'
  spanish_consistency_notes:
  - Se usa «Yahvé» de forma consistente para יְהוָה.
  - Se conserva el orden narrativo con nombres propios al inicio, como en el hebreo y el POB inglés.
  - «Morar allí» queda como opción suficientemente literal para לָגוּר שָׁם, con nota de alternativa semántica.
  - La cita directa mantiene el tono acusatorio sin añadir explicaciones interpretativas.
