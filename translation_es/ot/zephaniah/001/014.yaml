translation:
  language: es
  text: Cercano está el gran día de Yahvé; cercano, y viene muy rápido[a]. ¡El sonido del día de Yahvé! Allí el guerrero clama amargamente[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «y llega muy rápidamente». El hebreo intensifica la inminencia con una expresión adverbial de rapidez.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «el poderoso clama amargamente allí». Hebreo: «allí» puede vincularse con el guerrero o con la escena de terror, y גִּבּוֹר puede leerse como «guerrero» o «hombre poderoso».'
    reason: alternative_reading
lexical_decisions:
- source_word: קָרוֹב
  english_pob_choice: is near
  chosen_spanish: cerca está
  alternatives_spanish:
  - está cerca
  - se aproxima
  lexicon: HALOT
  rationale: El adjetivo predicativo expresa inminencia. «Cerca está» conserva ese valor y suena natural en español bíblico actual, sin añadir matices que el hebreo no exige.
- source_word: יוֹם יְהוָה
  english_pob_choice: the day of Yahweh
  chosen_spanish: el día de Yahvé
  alternatives_spanish:
  - el día de Yahvé
  - el día de Yahweh
  lexicon: HALOT
  rationale: Se mantiene la expresión profética establecida y el nombre divino traducido como «Yahvé», conforme al criterio del proyecto para el Tetragrámaton.
- source_word: הַגָּדוֹל
  english_pob_choice: great
  chosen_spanish: grande
  alternatives_spanish:
  - grande
  - magnífico
  lexicon: HALOT
  rationale: El adjetivo simple significa «grande». «Grande» reproduce la cualidad sin importar la expansión interpretativa de «terrible» u otros matices no presentes en el texto.
- source_word: וּמַהֵר מְאֹד
  english_pob_choice: very quickly coming
  chosen_spanish: muy pronto llegando
  alternatives_spanish:
  - y llegando muy pronto
  - y muy rápidamente llegando
  lexicon: HALOT
  rationale: La combinación intensifica la cercanía con rapidez. «Muy pronto llegando» preserva la idea de inminencia acelerada en un orden idiomático para el español.
- source_word: קוֹל
  english_pob_choice: The sound of
  chosen_spanish: el sonido de
  alternatives_spanish:
  - la voz de
  - el ruido de
  lexicon: HALOT
  rationale: «קוֹל» puede ser sonido, voz o ruido. Aquí introduce la percepción auditiva del día; «el sonido de» mantiene amplitud semántica sin decidir prematuramente por un hablante concreto.
- source_word: מַר
  english_pob_choice: bitterly
  chosen_spanish: amargamente
  alternatives_spanish:
  - con amargura
  - amargamente
  lexicon: HALOT
  rationale: El adverbio expresa la cualidad del clamor. «Amargamente» conserva el valor emocional y el tono de duelo/angustia del original.
- source_word: צֹרֵחַ
  english_pob_choice: cries out
  chosen_spanish: clama
  alternatives_spanish:
  - grita
  - vocifera
  lexicon: HALOT
  rationale: El participio denota un grito fuerte. «Clama» mantiene intensidad con dignidad bíblica en español y evita un registro demasiado coloquial.
- source_word: שָׁם
  english_pob_choice: there
  chosen_spanish: allí
  alternatives_spanish:
  - allí
  - ahí
  lexicon: HALOT
  rationale: El adverbio señala el lugar de la escena de terror. «Allí» es el equivalente más natural y preciso en este contexto.
- source_word: גִּבּוֹר
  english_pob_choice: the warrior
  chosen_spanish: el guerrero
  alternatives_spanish:
  - el poderoso
  - el valiente
  lexicon: HALOT
  rationale: El término puede referirse a un hombre fuerte o combatiente. «Guerrero» comunica bien la imagen de fuerza militar que se quiebra en el juicio, siguiendo la lectura auditable del POB inglés.
theological_decisions:
- issue: Renderización del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - el SEÑOR
  rationale: Se conserva el nombre personal del pacto, no un sustituto titular. «Yahvé» es la forma proyectada para español y mantiene la decisión doctrinal del POB inglés de no ocultar el Tetragrámaton.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Valor de גִּבּוֹר en la cláusula final
  english_pob_reading: the warrior cries out bitterly
  chosen_spanish_reading: el guerrero clama amargamente
  alternative_spanish_readings:
  - el valiente clama amargamente
  - el poderoso clama amargamente
  rationale: La cláusula es breve y abrupta; traducir גִּבּוֹר como «guerrero» conserva la imagen de la fuerza humana derrumbada ante el día de Yahvé, sin diluir la fuerza del término en una abstracción.
  doctrine_reference: DOCTRINE.md Translation philosophy §1, §6
- issue: Ambigüedad de קוֹל
  english_pob_reading: The sound of the day of Yahweh
  chosen_spanish_reading: El sonido del día de Yahvé
  alternative_spanish_readings:
  - La voz del día de Yahvé
  - El ruido del día de Yahvé
  rationale: «קוֹל» admite «sonido», «voz» o «ruido». Se prefiere «sonido» porque conserva la amplitud semántica y evita imponer en español una voz personal donde el hebreo puede estar sugiriendo impacto auditivo en general.
  doctrine_reference: DOCTRINE.md Translation philosophy §2
translation_notes:
  revision_awareness: 'La redacción sigue de cerca el último estado auditado del POB en inglés: mantiene la estructura breve y abrupta del hebreo, conserva la repetición de «cerca», y refleja la revisión que volvió más directa la secuencia «near and very quickly» sin sobreexplicar el cierre.'
  spanish_consistency_notes:
  - Se usa «Yahvé» de manera consistente para יְהוָה, conforme a la norma del proyecto.
  - Se preserva la repetición enfática de la cercanía con «cerca está, muy pronto llegando», equivalente funcional de «near—near and very quickly coming».
  - Se evita introducir «terrible» o equivalentes, porque el hebreo solo dice «grande».
  - 'La puntuación intenta reproducir la brusquedad del original: punto y coma tras la primera cláusula y exclamación antes de la escena auditiva.'
