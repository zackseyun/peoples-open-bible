translation:
  language: es
  text: Y llegó Atenobio, amigo del rey, a Jerusalén, y vio el esplendor de Simón, y una exhibición[a] de vasos de oro y de plata, y un séquito impresionante; y quedó asombrado, y le informó las palabras del rey.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El griego κυλίκιον es raro y difícil; puede referirse más específicamente a un servicio de bebidas o a una exhibición de vajilla costosa de oro y plata.
    reason: lexical_alternative
lexical_decisions:
- source_word: φίλος τοῦ βασιλέως
  english_pob_choice: the king’s friend
  chosen_spanish: amigo del rey
  alternatives_spanish:
  - amigo del rey
  - amigo real
  - cortesano del rey
  lexicon: LSJ
  rationale: Se conserva el título relacional sin convertirlo en un cargo técnico. «Amigo del rey» es claro en español y refleja la formulación griega sin sobreinterpretarla.
- source_word: δόξαν
  english_pob_choice: splendor
  chosen_spanish: esplendor
  alternatives_spanish:
  - gloria
  - magnificencia
  lexicon: LSJ
  rationale: En este contexto narrativo se trata de brillo, prestigio y grandeza visibles, no de «gloria» en sentido teológico. «Esplendor» comunica bien esa impresión externa.
- source_word: κυλίκιον
  english_pob_choice: a display of gold and silver vessels
  chosen_spanish: exhibición
  alternatives_spanish:
  - servicio de copas y vasos
  - aparato de mesa
  - exhibición de vajilla
  lexicon: LSJ
  rationale: El término es raro y difícil. Dado que el contexto incluye metales preciosos y una presencia cortesana, «exhibición» permite abarcar el objeto o conjunto visible sin forzar una identificación demasiado específica.
- source_word: χρυσωμάτων καὶ ἀργυρωμάτων
  english_pob_choice: gold and silver vessels
  chosen_spanish: vasos de oro y de plata
  alternatives_spanish:
  - objetos de oro y de plata
  - utensilios de oro y de plata
  - vajilla de oro y de plata
  lexicon: LSJ
  rationale: Estos sustantivos remiten a objetos hechos de oro y plata. «Vasos» mantiene la referencia a piezas materiales visibles y suena natural en español bíblico contemporáneo.
- source_word: παράστασιν ἱκανήν
  english_pob_choice: an impressive retinue
  chosen_spanish: una escolta considerable
  alternatives_spanish:
  - un séquito considerable
  - una comitiva numerosa
  - una presencia abundante
  lexicon: LSJ
  rationale: La frase apunta a una presencia acompañante amplia y notable. «Escolta considerable» conserva la idea de acompañamiento visible y evita sonar demasiado ornamental en español.
- source_word: ἐξίστατο
  english_pob_choice: he was astonished
  chosen_spanish: quedó asombrado
  alternatives_spanish:
  - se asombró
  - quedó maravillado
  - quedó atónito
  lexicon: LSJ
  rationale: El verbo expresa fuerte sorpresa. «Quedó asombrado» reproduce bien el impacto narrativo y mantiene un registro natural.
- source_word: ἀπήγγειλεν αὐτῷ τοὺς λόγους τοῦ βασιλέως
  english_pob_choice: reported the king’s words to him
  chosen_spanish: le informó las palabras del rey
  alternatives_spanish:
  - le comunicó las palabras del rey
  - le anunció el mensaje del rey
  - le refirió las palabras del rey
  lexicon: LSJ
  rationale: La construcción griega enfatiza la transmisión de las palabras del rey a Simón. «Le informó las palabras del rey» sigue de cerca el sentido, con español directo y fluido.
translation_notes:
  revision_awareness: Se corrigió el problema de validación anterior asegurando que el marcador [a] aparece exactamente en el texto español, anclado en la frase correspondiente. Se mantuvo la decisión léxica documentada para κυλίκιον sin depender de una transliteración mecánica del inglés.
  spanish_consistency_notes:
  - Se usó «Yahvé» solo cuando el texto fuente lo requiera; aquí no aplica.
  - Se mantuvo el nombre propio «Athenobio» de forma consistente con la transliteración del griego.
  - Se evitó «Cristo» y vocabulario teológico ajeno al contexto narrativo.
  - «Le informó» conserva el orden natural del español sin alterar la relación semántica de los objetos del verbo griego.
