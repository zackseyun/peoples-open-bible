  - severity: medium
    issue: «Con ningún ser humano» no preserva la elección deliberada del POB de mantener σάρξ como «flesh/carne» en el texto principal.
    rationale: La evidencia y el audit trail muestran una decisión consciente de conservar la imagen «flesh» y relegar la alternativa idiomática a nota. En español puede mantenerse «carne» con una nota aclaratoria sin perder inteligibilidad.
  - severity: low
    issue: «Cadenas» es menos preciso que πέδαι.
    rationale: πέδαι son grillos/fetteres, especialmente para los pies. «Cadenas» no es falso, pero «grillos» conserva mejor la imagen concreta del original.
