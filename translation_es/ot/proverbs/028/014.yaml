translation:
  language: es
  text: Bienaventurado[a] el hombre que siempre teme, pero el que endurece su corazón caerá en calamidad[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Dichoso el hombre que teme continuamente». El hebreo no expresa un objeto explícito para «teme».'
    reason: alternative_reading
  - marker: b
    text: 'O: «caerá en mal» o «caerá en desgracia». El hebreo רָעָה puede significar mal, daño, desgracia o calamidad; aquí probablemente se refiere a un desastre.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אַשְׁרֵי
  english_pob_choice: Blessed is
  chosen_spanish: Bienaventurado
  alternatives_spanish:
  - Feliz
  - Dichoso
  lexicon: HALOT
  rationale: אַשְׁרֵי es la fórmula sapiencial de bienaventuranza. «Bienaventurado» conserva mejor el registro proverbial y de estado venturoso que «feliz», y evita suavizar el valor evaluativo del dicho.
- source_word: אָדָם
  english_pob_choice: the man
  chosen_spanish: el hombre
  alternatives_spanish:
  - la persona
  - el ser humano
  - un hombre
  lexicon: HALOT
  rationale: אָמָדָם es singular masculino, pero funciona de manera genérica en la sabiduría hebrea. «El hombre» conserva ese valor representativo sin volver la frase demasiado abstracta.
- source_word: מְפַחֵד
  english_pob_choice: who is always fearful
  chosen_spanish: que siempre teme
  alternatives_spanish:
  - que teme continuamente
  - que está siempre temeroso
  - que vive en temor
  lexicon: HALOT
  rationale: El participio de פחד expresa un temor continuo. «Que siempre teme» mantiene la fuerza léxica de «fear» sin introducir un objeto no explicitado por el hebreo.
- source_word: תָּמִיד
  english_pob_choice: always
  chosen_spanish: siempre
  alternatives_spanish:
  - continuamente
  - constantemente
  lexicon: HALOT
  rationale: תָּמִיד indica continuidad. «Siempre» es la equivalencia más natural y fiel en español.
- source_word: וּמַקְשֶׁה לִבּוֹ
  english_pob_choice: but whoever hardens his heart
  chosen_spanish: pero el que endurece su corazón
  alternatives_spanish:
  - pero el que hace duro su corazón
  - pero quien vuelve obstinado su corazón
  lexicon: HALOT
  rationale: El hifil de קשה con «corazón» en español se expresa con la forma establecida «endurece su corazón», que preserva la dimensión moral y volitiva del hebreo.
- source_word: יִפּוֹל
  english_pob_choice: will fall
  chosen_spanish: caerá
  alternatives_spanish:
  - va a caer
  - caerá en
  lexicon: HALOT
  rationale: El imperfecto proverbial hebreo se expresa naturalmente con futuro español. «Caerá» reproduce el valor consecuencial del enunciado.
- source_word: בְּרָעָה
  english_pob_choice: into calamity
  chosen_spanish: en calamidad
  alternatives_spanish:
  - en mal
  - en desgracia
  - en trouble
  lexicon: HALOT
  rationale: רָעָה puede significar mal, daño, trouble o calamidad. En este contexto la idea es de desastre que sobreviene; «calamidad» conserva esa lectura sin reducirla a mal moral.
theological_decisions:
- issue: Objeto implícito del temor en la primera cola
  english_pob_reading: Render the term lexically as 'fearful' without specifying an object, allowing the proverb's wisdom context to imply reverent moral caution.
  chosen_spanish_reading: Traducir el verbo de manera abierta, sin añadir «de Yahvé» u otro objeto explícito.
  alternative_spanish_readings:
  - bienaventurado el hombre que teme a Yahvé siempre
  - bienaventurado el hombre que está siempre cauteloso
  rationale: El hebreo no menciona un objeto explícito del temor. Añadirlo resolvería una tensión que el texto deja abierta; por otro lado, «cauteloso» perdería la fuerza léxica de פחד. La traducción mantiene la ambigüedad auditable del original.
  doctrine_reference: Primacía del texto original y preservación de la tensión interpretativa
- issue: Sentido de רָעָה en el castigo final
  english_pob_reading: Or 'will fall into evil/trouble.' The Hebrew רָעָה can mean evil, harm, trouble, or calamity; here it likely refers to disastrous trouble.
  chosen_spanish_reading: Entender רָעָה como calamidad/desastre, no como mal moral cometido.
  alternative_spanish_readings:
  - caerá en mal
  - caerá en desgracia
  - caerá en maldad
  rationale: En la segunda cola, רָעָה describe el resultado que le sobreviene al endurecido. «Calamidad» comunica mejor el daño sufrido y evita confundir el término con maldad ética.
  doctrine_reference: Distinción semántica entre mal moral y desastre sobrevenido
translation_notes:
  revision_awareness: Se mantuvo el sentido del hebreo y la tensión lexical documentada por la POB en inglés. La primera cola conserva el temor sin objeto explícito; la segunda mantiene la idea de ruina/desastre con «calamidad». No se adoptaron soluciones que suavizaran el valor sapiencial del proverbio.
  spanish_consistency_notes:
  - Se usa «Yahvé» como forma normal del nombre divino cuando aparezca explícitamente; este versículo no lo contiene.
  - «Bienaventurado» se mantiene para la fórmula sapiencial אַשְׁרֵי.
  - «Calamidad» se usa aquí para בְּרָעָה según el contexto de consecuencia adversa.
  - La puntuación reproduce la antítesis del proverbio con una coma antes de la segunda cola.
