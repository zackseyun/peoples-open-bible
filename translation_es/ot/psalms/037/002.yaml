translation:
  language: es
  text: Porque pronto se marchitarán como hierba[a], y se secarán como hierba verde.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Alternativa posible: «serán cortados como hierba ... se marchitarán como vegetación verde». Los verbos hebreos de este versículo se solapan en el campo semántico de secarse, marchitarse o ser cortados, y las versiones varían en cómo distribuyen la imagen.'
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  lexicon: HALOT
  rationale: En este contexto introduce la razón o explicación de la exhortación anterior; «porque» conserva ese valor causal-explicativo de forma natural en español.
- source_word: כֶחָצִיר
  english_pob_choice: like grass
  chosen_spanish: como hierba
  alternatives_spanish:
  - como pasto
  - como grama
  lexicon: HALOT
  rationale: חָצִיר puede referirse a hierba/vegetación herbácea. «Hierba» es una opción natural y amplia en español, fiel a la imagen de fragilidad vegetal.
- source_word: מְהֵרָה
  english_pob_choice: quickly
  chosen_spanish: pronto
  alternatives_spanish:
  - rápidamente
  - de prisa
  lexicon: HALOT
  rationale: El adverbio subraya rapidez; «pronto» comunica bien la inmediatez en español bíblico contemporáneo sin sonar forzado.
- source_word: יִמָּלוּ
  english_pob_choice: will wither
  chosen_spanish: se marchitarán
  alternatives_spanish:
  - se secarán
  - se desvanecerán
  lexicon: HALOT
  rationale: El verbo expresa pérdida de frescura/vitalidad propia de la vegetación. «Se marchitarán» conserva la metáfora vegetal y sugiere el matiz de secarse o desmoronarse.
- source_word: וּכְיֶרֶק דֶּשֶׁא
  english_pob_choice: like green herbage
  chosen_spanish: como hierba verde
  alternatives_spanish:
  - como vegetación verde
  - como pasto tierno
  - como verdor
  lexicon: HALOT
  rationale: La combinación יֶרֶק דֶּשֶׁא intensifica la imagen de vegetación fresca y verde. «Hierba verde» reproduce de manera compacta el color y la fragilidad del cuadro original.
- source_word: יִבּוֹלוּן
  english_pob_choice: fade
  chosen_spanish: se desvanecerán
  alternatives_spanish:
  - se marchitarán
  - se secarán
  - se ajarán
  lexicon: HALOT
  rationale: El verbo puede expresar marchitarse, secarse o perder vigor. «Se desvanecerán» mantiene la paralela fluidez poética del segundo hemistiquio y evita una repetición exacta, sin perder la idea de decadencia vegetal.
translation_notes:
  revision_awareness: La redacción sigue de cerca el texto hebreo y el audit trail en inglés, manteniendo la doble imagen vegetal del verso. Se optó por «hierba verde» para reflejar la textura de יֶרֶק דֶּשֶׁא con un español natural y formal, y por «se desvanecerán» en el segundo colon para conservar el paralelismo sin repetir mecánicamente el primer verbo.
  spanish_consistency_notes:
  - Se usa «como» para ambos símiles, en paralelo con la estructura hebrea.
  - «Hierba» funciona como término amplio para חָצִיר y permite mantener el registro bíblico sin arcaísmo.
  - No se introduce ninguna nota doctrinal porque el versículo es puramente imagístico y sapiencial.
  - La nota a pie de página preserva la alternativa verbal documentada en el audit trail en inglés.
