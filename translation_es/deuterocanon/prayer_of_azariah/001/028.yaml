translation:
  language: es
  text: 'Entonces los tres[a], como de una sola boca, estaban cantando himnos y glorificando y bendiciendo a Dios en el horno, diciendo:'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «con una sola voz». El griego dice literalmente «como de una sola boca», subrayando la completa unidad de los tres en su alabanza.'
    reason: lexical_alternative
lexical_decisions:
- source_word: Τότε
  english_pob_choice: Then
  chosen_spanish: Entonces
  alternatives_spanish:
  - Luego
  - Después
  lexicon: LSJ
  rationale: Marca con naturalidad la transición temporal del relato; 'Entonces' conserva el valor secuencial de 'Then' sin sonar forzado en español.
- source_word: οἱ τρεῖς
  english_pob_choice: the three
  chosen_spanish: los tres
  alternatives_spanish:
  - los tres hombres
  - los tres jóvenes
  lexicon: LSJ
  rationale: El griego dice literalmente 'los tres' sin añadir sustantivo; el español puede conservar esa economía sin expandir innecesariamente el referente.
- source_word: ὡς ἐξ ἑνὸς στόματος
  english_pob_choice: as with one mouth
  chosen_spanish: como con una sola boca
  alternatives_spanish:
  - como de una sola boca
  - con una sola voz
  lexicon: LSJ
  rationale: Mantiene la imagen corporal del griego y su énfasis en la unidad de la alabanza. 'Con una sola voz' sería más dinámico, pero pierde la metáfora explícita.
- source_word: ὕμνουν
  english_pob_choice: were singing hymns
  chosen_spanish: estaban cantando himnos
  alternatives_spanish:
  - estaban entonando himnos
  - estaban alabando con himnos
  lexicon: LSJ
  rationale: El imperfecto expresa acción continua; 'estaban cantando himnos' conserva esa duración y el sentido de canto de alabanza.
- source_word: ἐδόξαζον
  english_pob_choice: glorifying
  chosen_spanish: glorificando
  alternatives_spanish:
  - dando gloria
  - glorificando a
  lexicon: LSJ
  rationale: '''Glorificando'' conserva la distinción verbal frente a los otros verbos de alabanza y corresponde bien al valor de dar gloria/honor.'
- source_word: εὐλόγουν
  english_pob_choice: blessing
  chosen_spanish: bendiciendo
  alternatives_spanish:
  - alabando
  - diciendo bien de
  lexicon: LSJ
  rationale: En español bíblico 'bendecir' puede reflejar el valor de εὐλογεῖν cuando el objeto es Dios; aquí evita colapsar el matiz en un mero 'alabar'.
- source_word: τὸν θεὸν
  english_pob_choice: God
  chosen_spanish: a Dios
  alternatives_spanish:
  - a Dios Padre
  - al Dios
  lexicon: LSJ
  rationale: En español, con verbos como 'glorificar' y 'bendecir' el complemento directo suele introducirse con 'a'; 'Dios' mantiene la referencia singular y reverente.
- source_word: ἐν τῇ καμίνῳ
  english_pob_choice: in the furnace
  chosen_spanish: en el horno
  alternatives_spanish:
  - en el horno ardiente
  - dentro del horno
  lexicon: LSJ
  rationale: '''Horno'' es la equivalencia natural en español para κάμινος en este contexto narrativo; ''horno ardiente'' añadiría una expansión no presente en este versículo.'
- source_word: λέγοντες
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - y diciendo
  - al decir
  lexicon: LSJ
  rationale: Introducción participial directa y transparente para abrir el discurso que sigue; 'diciendo' reproduce el enlace sin añadir contenido.
theological_decisions:
- issue: Unidad explícita de la alabanza
  english_pob_reading: as with one mouth, emphasizing the complete unity of the three in their praise.
  chosen_spanish_reading: como con una sola boca, destacando la unidad completa de los tres en su alabanza.
  alternative_spanish_readings:
  - con una sola voz
  - como de una sola boca
  rationale: Se conserva la imagen del griego y el sentido teológico de unanimidad en la adoración, sin reemplazarla por una paráfrasis más abstracta.
  doctrine_reference: Unidad en la adoración; concordia del pueblo de Dios
translation_notes:
  revision_awareness: 'Coincide con la trayectoria de revisión más reciente: no se documentan cambios aplicados y la lectura auditada del inglés POB se mantiene estable. La decisión española sigue de cerca el griego y preserva la metáfora de unidad sin introducir expansiones ajenas al versículo.'
  spanish_consistency_notes:
  - Se mantiene 'Dios' sin artículo, conforme al uso reverente en español.
  - Se conserva el imperfecto con 'estaban cantando' para reflejar la acción continua del griego.
  - Se traduce κάμινος como 'horno', coherente con la escena de Daniel y con la terminología bíblica habitual en español.
  - Se usa 'bendiciendo' para εὐλόγουν para no perder el matiz específico de bendecir a Dios, manteniéndolo distinguible de 'glorificando' y 'cantando himnos'.
