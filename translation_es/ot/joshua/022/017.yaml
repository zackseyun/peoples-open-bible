translation:
  language: es
  text: ¿Fue demasiado poca para nosotros la iniquidad de Peor[a], de la cual no nos hemos purificado hasta hoy, y vino una plaga sobre la congregación de Yahvé?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «culpa». El hebreo עָוֹן puede significar «iniquidad», «culpa» o, por extensión, la consecuencia de la culpa. Hebreo: «Peor»; compárese la expresión más completa «Baal-peor» en pasajes relacionados.'
    reason: lexical_alternative_and_cross_reference
lexical_decisions:
- source_word: הַמְעַט לָנוּ
  english_pob_choice: Was ... too little for us
  chosen_spanish: ¿Fue demasiado poca para nosotros...?
  alternatives_spanish:
  - ¿Era demasiado poca para nosotros...?
  - ¿No fue suficiente para nosotros...?
  lexicon: HALOT
  rationale: La pregunta retórica expresa reproche. En español, «¿Fue demasiado poca para nosotros...?» conserva el tono acusatorio sin añadir paráfrasis.
- source_word: עֲוֺן
  english_pob_choice: iniquity
  chosen_spanish: iniquidad
  alternatives_spanish:
  - culpa
  - pecado
  - castigo por la culpa
  lexicon: HALOT
  rationale: «Iniquidad» mantiene la fuerza moral y covenantal del término, y evita reducirlo solo a culpa subjetiva o a castigo.
- source_word: פְּעוֹר
  english_pob_choice: Peor
  chosen_spanish: Peor
  alternatives_spanish:
  - Baal-peor
  lexicon: HALOT
  rationale: El hebreo nombra solo «Peor». Se conserva esa forma sin importar el compuesto de pasajes relacionados.
- source_word: אֲשֶׁר לֹא הִטַּהַרְנוּ מִמֶּנּוּ
  english_pob_choice: from which we have not cleansed ourselves
  chosen_spanish: de la cual no nos hemos purificado
  alternatives_spanish:
  - de la cual no nos hemos limpiado
  - de la cual no nos hemos santificado
  lexicon: HALOT
  rationale: El verbo hitpael de טהר es reflexivo; «nos hemos purificado» expresa bien la idea de no haber quedado limpios de esa contaminación.
- source_word: עַד הַיּוֹם הַזֶּה
  english_pob_choice: to this day
  chosen_spanish: hasta hoy
  alternatives_spanish:
  - hasta este día
  - hasta el día de hoy
  lexicon: HALOT
  rationale: Es el equivalente idiomático natural en español y conserva la referencia al presente del hablante.
- source_word: וַיְהִי הַנֶּגֶף
  english_pob_choice: and the plague came
  chosen_spanish: y hubo una plaga
  alternatives_spanish:
  - y vino la plaga
  - y aconteció la plaga
  lexicon: HALOT
  rationale: El hebreo recuerda el hecho de la plaga sin un adverbio de contraste. «Hubo una plaga» transmite el simple acontecimiento de juicio con naturalidad.
- source_word: נֶּגֶף
  english_pob_choice: plague
  chosen_spanish: plaga
  alternatives_spanish:
  - azote
  - golpe
  - aflicción
  lexicon: HALOT
  rationale: En contexto de juicio pactual, «plaga» es la equivalencia más clara y precisa.
- source_word: בַּעֲדַת יְהוָה
  english_pob_choice: upon the congregation of Yahweh
  chosen_spanish: sobre la congregación de Yahvé
  alternatives_spanish:
  - sobre la asamblea de Yahvé
  - contra la congregación de Yahvé
  lexicon: HALOT
  rationale: «Congregación» preserva el sentido corporativo del sustantivo. Se mantiene «Yahvé» conforme al criterio del proyecto para el Tetragrámaton.
theological_decisions:
- issue: Renderización del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - Jehová
  rationale: La política del proyecto pide usar «Yahvé» para el nombre divino. Se conserva así el nombre del pacto en lugar de ocultarlo con una sustitución devocional.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Valor de עָוֹן en un contexto de culpa/iniquidad
  english_pob_reading: iniquity / guilt
  chosen_spanish_reading: iniquidad
  alternative_spanish_readings:
  - culpa
  - culpabilidad
  - castigo por la culpa
  rationale: Aquí el término apunta al pecado histórico de Peor y a su carga moral persistente. «Iniquidad» preserva esa tensión sin resolverla en una sola acepción.
  doctrine_reference: HALOT; English POB lexical note on עָוֹן
- issue: Referencia histórica a la plaga sobre Israel
  english_pob_reading: the plague came upon the congregation of Yahweh
  chosen_spanish_reading: hubo una plaga sobre la congregación de Yahvé
  alternative_spanish_readings:
  - vino una plaga sobre la congregación de Yahvé
  - la plaga cayó sobre la congregación de Yahvé
  rationale: El verso alude a un juicio histórico ya ocurrido; la forma impersonal «hubo» evita añadir una interpretación de contraste que no está en el hebreo.
  doctrine_reference: 'Revision awareness: removal of interpretive ''yet'' not warranted by source'
translation_notes:
  revision_awareness: La revisión inglesa eliminó «yet» porque no estaba expresado en el hebreo y añadía contraste interpretativo. La redacción española evita igualmente cualquier marcador adversativo añadido y sigue de cerca el flujo del original.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» para יְהוָה conforme al criterio del proyecto.
  - Se usa «iniquidad» para עָוֹן, dejando en nota la alternativa «culpa».
  - «Congregación» conserva el valor colectivo de עֵדָה y su resonancia pactual.
  - 'No se traduce mecánicamente desde el inglés: la forma española sigue el hebreo con sintaxis natural.'
  - Se evita introducir «pero»/«sin embargo» u otro contraste no presente en el texto fuente.
