translation:
  language: es
  text: 'Entonces dijo a sus siervos[a]: «Miren, la parcela de Joab está junto a la mía, y allí tiene cebada. Vayan y préndanle fuego a la parcela». Y los siervos de Absalón prendieron fuego a la parcela.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo literalmente: «la parcela de Joab está a mi mano», un modismo que indica que está al lado o junto a la propiedad de Absalón.'
    reason: lexical_alternative
lexical_decisions:
- source_word: עֲבָדָיו / עַבְדֵי אַבְשָׁלוֹם
  english_pob_choice: servants / Absalom’s servants
  chosen_spanish: siervos / los siervos de Absalón
  alternatives_spanish:
  - esclavos
  - criados
  lexicon: HALOT
  rationale: En este contexto narrativo de corte y servicio doméstico/político, «siervos» comunica adecuadamente la relación funcional sin imponer la fuerza semántica de «esclavos», que en español puede sonar más fuerte de lo que el contexto requiere. Se conserva la referencia al grupo de Absalón de manera paralela al inglés POB.
- source_word: רְאוּ
  english_pob_choice: Look
  chosen_spanish: Miren
  alternatives_spanish:
  - Vean
  - Miren ustedes
  lexicon: HALOT
  rationale: El imperativo busca llamar la atención sobre la parcela cercana. «Miren» es natural en diálogo directo y conserva el tono oral del hebreo y del inglés POB.
- source_word: חֶלְקַת
  english_pob_choice: field
  chosen_spanish: parcela
  alternatives_spanish:
  - campo
  - terreno
  lexicon: HALOT
  rationale: Aquí el término designa un lote o porción de tierra cultivada perteneciente a Joab. «Parcela» refleja bien la idea de terreno delimitado y evita la ambigüedad de «campo», que en español puede sonar demasiado general.
- source_word: אֶל יָדִי
  english_pob_choice: next to mine
  chosen_spanish: junto a la mía
  alternatives_spanish:
  - al lado de la mía
  - adyacente a la mía
  lexicon: HALOT
  rationale: El hebreo usa un idiomático «a mi mano» para indicar proximidad. Siguiendo el sentido auditado por el inglés POB, «junto a la mía» comunica la cercanía de forma natural en español sin perder la relación espacial del original.
- source_word: שְׂעֹרִים
  english_pob_choice: barley
  chosen_spanish: cebada
  alternatives_spanish:
  - grano de cebada
  - cebada allí
  lexicon: HALOT
  rationale: El sustantivo plural denota la cosecha o el cultivo de cebada. En español, «cebada» es la forma natural y suficiente para el cereal en este contexto agrícola.
- source_word: לְכוּ
  english_pob_choice: Go
  chosen_spanish: Vayan
  alternatives_spanish:
  - Vayan ustedes
  - Váyanse
  lexicon: HALOT
  rationale: La orden de movimiento se expresa con el imperativo plural de segunda persona. «Vayan» mantiene la sencillez del mandato y suena bien en diálogo.
- source_word: וְהוּצִיתָה בָאֵשׁ
  english_pob_choice: set it on fire
  chosen_spanish: préndanle fuego
  alternatives_spanish:
  - enciéndanle fuego
  - quemenlo
  lexicon: HALOT
  rationale: El Hiphil de יצת expresa causar el fuego o prender algo. «Préndanle fuego» conserva la fuerza causativa y la naturalidad idiomática del español mejor que un mero «quemenlo», que podría sonar menos preciso o más genérico.
- source_word: וַיַּצִּתוּ
  english_pob_choice: set the field on fire
  chosen_spanish: prendieron fuego a la parcela
  alternatives_spanish:
  - quemaron la parcela
  - la incendiaron
  lexicon: HALOT
  rationale: Se mantiene el mismo núcleo verbal que en el mandato para reflejar la correspondencia entre instrucción y cumplimiento. «Prendieron fuego a la parcela» preserva la repetición léxica y el tono narrativo.
translation_notes:
  revision_awareness: El texto sigue de cerca el paquete fuente hebreo y el audit trail inglés, sin cambios de revisión aplicados ni desacuerdos detectados en la pasada más reciente.
  spanish_consistency_notes:
  - Se conserva la repetición de la raíz de «prender fuego» en el mandato y su cumplimiento para mantener cohesión léxica.
  - «Parcela» se usa de manera consistente para חֶלְקָה/חֶלְקַת en este versículo, en línea con el valor concreto del término en contexto.
  - El pronombre posesivo «la mía» evita sobrecargar el texto con una paráfrasis explicativa dentro del cuerpo principal, dejando la aclaración idiomática en la nota.
