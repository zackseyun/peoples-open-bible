translation:
  language: es
  text: Porque tú me has alegrado, oh, Yahvé[a], por tu obra; ante las obras de tus manos canto de gozo[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «Yahvé». El nombre divino יְהוָה se traduce aquí con el nombre propio, no con una sustitución por título.'
    reason: alternative_reading
  - marker: b
    text: 'O: «grito de gozo». El verbo hebreo puede denotar tanto canto jubiloso como un clamor resonante de alegría.'
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  lexicon: HALOT
  rationale: Introduce la base causal del canto en el contexto del salmo. 'Porque' conserva la relación lógica de motivo sin sonar forzado en español poético.
- source_word: שִׂמַּחְתַּנִי
  english_pob_choice: you have made me glad
  chosen_spanish: me has alegrado
  alternatives_spanish:
  - me has hecho feliz
  - me has dado gozo
  lexicon: HALOT
  rationale: 'El piel con sufijo expresa acción causativa: Yahvé causa la alegría del hablante. ''Me has alegrado'' mantiene la fuerza verbal y la relevancia resultativa del perfecto.'
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  lexicon: HALOT
  rationale: Se conserva el nombre divino del Tetragrámaton conforme a la terminología del proyecto, evitando la sustitución por un título.
- source_word: בְּפָעֳלֶךָ
  english_pob_choice: by your work
  chosen_spanish: con tu obra
  alternatives_spanish:
  - por tu obra
  - a causa de tu obra
  lexicon: HALOT
  rationale: La preposición ב en este contexto expresa el medio o la ocasión por la cual el salmista es alegrado. En español, 'con tu obra' comunica de manera natural esa causalidad/instrumentalidad sin perder la relación con lo hecho por Dios.
- source_word: בְּמַעֲשֵׂי יָדֶיךָ
  english_pob_choice: at the works of your hands
  chosen_spanish: en las obras de tus manos
  alternatives_spanish:
  - ante las obras de tus manos
  - a causa de las obras de tus manos
  lexicon: HALOT
  rationale: Se conserva el idiomatismo concreto 'obras de tus manos' para reflejar el antropomorfismo del hebreo. 'En' funciona aquí como localización poética del gozo frente a esas obras, de modo cercano al valor de ocasión del original.
- source_word: אֲרַנֵּן
  english_pob_choice: I sing for joy
  chosen_spanish: cantaré de gozo
  alternatives_spanish:
  - canto de gozo
  - daré un grito de gozo
  lexicon: HALOT
  rationale: רנן puede abarcar canto jubiloso o clamor de alegría. 'Cantaré de gozo' preserva el matiz de júbilo cantado y encaja con la poesía española sin reducir el verbo a simple exclamación.
theological_decisions:
- issue: Nombre divino en el Tetragrámaton
  english_pob_reading: O Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Señor
  - Jehová
  rationale: El hebreo usa יְהוָה de forma directa; por tanto, se mantiene el nombre propio divino en español. 'Yahvé' sigue la convención del proyecto y evita la ocultación del nombre por un sustituto titulado.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
translation_notes:
  revision_awareness: Se corrigió la validación anterior incorporando el marcador [a] directamente en el texto principal, de modo que la nota de pie queda anclada y auditable. Se mantuvo la decisión del borrador inglés sobre el Tetragrámaton, pero se expresó en español conforme a la terminología del proyecto.
  spanish_consistency_notes:
  - Se usa «Yahvé» para יְהוָה en todo el versículo.
  - Se conservó el paralelismo entre «tu obra» y «las obras de tus manos».
  - «cantaré de gozo» refleja el valor jubiloso de רנן sin añadir contenido ajeno al hebreo.
