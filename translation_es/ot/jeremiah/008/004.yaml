  timestamp: '2026-05-07T22:27:40Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura del hebreo: comisión profética, fórmula «Así dice Yahvé», y dos preguntas retóricas paralelas. Sin embargo, hay dos ajustes importantes de fidelidad y naturalidad: «Dirás a ellos» suena poco idiomático en español frente a «Les dirás», y la segunda pregunta con «¿Se volverá uno y no volverá?» resulta ambigua en español porque puede sonar como mera repetición sin aclarar el contraste entre apartarse y regresar, contraste que el inglés POB documenta explícitamente.'
  spanish_quality_summary: El texto es generalmente claro y digno, pero contiene un calco innecesario («Dirás a ellos») y una formulación algo torpe/ambigua en la segunda pregunta. «¿Caerán los hombres…?» es comprensible, pero «alguien» o una forma más genérica mejora legibilidad. Conviene conservar el paralelismo proverbial con español más natural.
  glossary_alignment: Correcto en el uso de «Yahvé» para יְהוָה. No hay otros términos de glosario mayormente disputados aquí. La nota sobre שוב está bien orientada, pero el texto principal debe expresar mejor el primer שוב como apartarse/volverse atrás y el segundo como regresar.
  issues:
  - severity: medium
    issue: «Dirás a ellos» es poco natural en español bíblico contemporáneo
    rationale: Aunque refleja la preposición hebrea, en español estándar y eclesial amplio la forma natural es «Les dirás».
  - severity: high
    issue: La segunda pregunta «¿Se volverá uno y no volverá?» es semánticamente ambigua
    rationale: El hebreo juega con שוב en dos sentidos relacionados; en español la misma repetición exacta con «volver» no comunica bien el contraste entre apartarse y regresar. La traducción debe aclararlo sin perder el efecto retórico, idealmente con nota.
  - severity: low
    issue: «los hombres» puede sonar innecesariamente marcado
    rationale: El plural genérico hebreo permite una formulación más natural e inclusiva en español como «la gente» o una construcción impersonal/singular proverbial.
  revised_spanish_text: 'Les dirás: «Así dice Yahvé: ¿Cae la gente y no vuelve a levantarse? ¿Se aparta alguien[a] y no regresa?»'
  revised_footnotes:
