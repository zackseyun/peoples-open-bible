translation:
  text: For why do you hate me[a], O Greeks? Because I am a barbarian? And I am the
    knowledge of the Greek and the barbarian[d][c][b]. I am the judgment.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The OCR likely contains a loan from Greek λιμήν (“harbor”). Some English
      traditions paraphrase this as “pleasant place.” Because its syntactic attachment
      within this cola is unclear, it is noted here rather than fixed in the main
      line.
    reason: alignment_note
  - marker: b
    text: If the harbor-term is attached to the second clause and ⲫⲁⲡ is taken differently,
      the sense could be rendered “I am she who is sick, and I am well in a pleasant
      place (harbor).”
    reason: alternative_reading
  - marker: c
    text: “Physician” could be rendered “healer,” but “physician” keeps the striking
      paradox with “sick.”
    reason: lexical_alternative
  - marker: d
    text: Or 'I am she who is sick, and I am the physician.'.
    reason: previous_rendering
lexical_decisions:
- source_word: ⲁⲛⲟⲕ ⲧⲉ
  chosen: I am she who
  alternatives:
  - I am the one who
  lexicon: Sahidic Coptic copula (feminine) usage
  rationale: Thunder’s speaker is grammatically feminine; retaining “she who” preserves
