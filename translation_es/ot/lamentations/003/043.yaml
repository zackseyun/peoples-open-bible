translation:
  language: es
  text: Tú te cubriste con ira[a] y nos perseguiste; mataste sin piedad[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «en ira» o «en furor». El hebreo usa «nariz» como modismo para «ira».
    reason: lexical_alternative
  - marker: b
    text: O «no perdonaste» o «no tuviste compasión».
    reason: lexical_alternative
lexical_decisions:
- source_word: סַכֹּ֤תָה
  english_pob_choice: covered yourself
  chosen_spanish: te cubriste
  alternatives_spanish:
  - te cubriste a ti mismo
  - te cubriste
  lexicon: HALOT
  rationale: El hebreo presenta una imagen de cubrirse; en español, el reflexivo natural comunica esa acción sobre el propio sujeto sin añadir explicaciones. Se mantiene la imagen corporal/figurada del original.
- source_word: בָאַף
  english_pob_choice: with anger
  chosen_spanish: con ira
  alternatives_spanish:
  - en ira
  - con enojo
  lexicon: HALOT
  rationale: אַף es un modismo de 'nariz' para 'ira'. 'Con ira' conserva la fuerza idiomática y suena más natural en español bíblico contemporáneo que una traducción literal de 'nariz'.
- source_word: וַתִּרְדְּפֵנוּ
  english_pob_choice: and pursued us
  chosen_spanish: y nos perseguiste
  alternatives_spanish:
  - y nos seguiste persiguiendo
  - y nos cazaste
  lexicon: HALOT
  rationale: '''Perseguir'' reproduce con precisión רדף y mantiene el tono judicial y lamentativo; ''perseguirse'' comunica más fielmente que ''cazar'' o que un giro más interpretativo.'
- source_word: הָרַגְתָּ
  english_pob_choice: you killed
  chosen_spanish: mataste
  alternatives_spanish:
  - mataste
  - asesinaste
  lexicon: HALOT
  rationale: הרג es el verbo ordinario 'matar'. 'Mataste' es directo y sobrio; 'asesinaste' añadiría una carga legal/moral más fuerte que no exige el hebreo.
- source_word: לֹא חָמָלְתָּ
  english_pob_choice: without pity
  chosen_spanish: sin piedad
  alternatives_spanish:
  - sin compasión
  - no tuviste compasión
  lexicon: HALOT
  rationale: חמל expresa 'ahorrar, compadecerse, tener piedad'. 'Sin piedad' reproduce el valor adverbial de acción sin misericordia y encaja bien con 'mataste'.
theological_decisions:
- issue: Atribución directa a Dios de juicio severo en una lamentación
  english_pob_reading: Retain the stark second-person accusation without softening it
  chosen_spanish_reading: Mantener la acusación directa en segunda persona sin atenuarla
  alternative_spanish_readings:
  - Tú permitiste que nos persiguieran
  - Parecías matarnos sin piedad
  rationale: El hebreo atribuye directamente estas acciones al interlocutor; el género de lamentación permite este lenguaje franco. La versión española debe conservar esa tensión teológica en vez de resolverla.
  doctrine_reference: 'Principio de traducción POB: preservar la tensión teológica del lamento.'
translation_notes:
  revision_awareness: La versión española sigue la revisión más reciente del inglés al preferir una preposición natural para la imagen de cubrirse ('con ira') y conserva el resto de la estructura acusativa y sobria del verso.
  spanish_consistency_notes:
  - Se mantiene el trato directo en segunda persona, acorde con el hebreo y el audit trail inglés.
  - '''Ira'' traduce el modismo אַף sin ocultar su fuerza semítica.'
  - '''Sin piedad'' conserva el matiz adverbial de חמל en este contexto de acción violenta.'
