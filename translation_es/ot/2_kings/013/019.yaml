    text: Hebrew simply 'to strike'; 'the ground' is supplied from the immediately preceding action in verse 18.
    reason: cross_reference
  - marker: b
    text: Or 'until you had made an end of Aram' / 'until complete destruction.'
    reason: lexical_alternative
