base_translation:
  language: en
  yaml_path: translation/ot/daniel/001/002.yaml
  text: And the Lord gave Jehoiakim king of Judah into his hand[a], along with some of the vessels of the house of God. He brought them to the land of Shinar, to the house of his god[c][b], and he brought the vessels into the treasury of his god.
  footnotes:
  - marker: a
    text: Or 'delivered Jehoiakim king of Judah into his hand.'
    reason: lexical_alternative
  - marker: b
    text: Shinar is the ancient name for Babylonia.
    reason: cultural_note
  - marker: c
    text: Or 'temple of his god' and 'treasury/storehouse of his god.' The Hebrew uses 'house' for both God's house and the Babylonian deity's house.
    reason: lexical_alternative
