translation:
  language: es
  text: Anduvieron por el desierto, por un camino desolado[a]; no hallaron ciudad donde habitar.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Anduvieron por el desierto, en un yermo; no hallaron ciudad habitada». El hebreo también puede entenderse como dos expresiones de lugar, no solo como la imagen unificada de «un camino desolado».'
    reason: lexical_alternative
lexical_decisions:
- source_word: תָּעוּ
  english_pob_choice: They wandered
  chosen_spanish: Anduvieron
  alternatives_spanish:
  - Vagaron
  - Anduvieron errantes
  lexicon: HALOT
  rationale: El verbo expresa ir sin rumbo o extraviarse en movimiento. «Anduvieron» conserva el desplazamiento real sin añadir de forma explícita la idea moral de error; «errantes» quedaría más marcado y menos natural en español poético.
- source_word: בַמִּדְבָּר
  english_pob_choice: in the wilderness
  chosen_spanish: por el desierto
  alternatives_spanish:
  - en el desierto
  - por el yermo
  lexicon: HALOT
  rationale: El sustantivo refiere a una región despoblada y árida. «Desierto» es claro y bíblicamente reconocible en español; la preposición «por» mantiene mejor el matiz de desplazamiento itinerante que «en».
- source_word: בִּישִׁימוֹן דָּרֶךְ
  english_pob_choice: in a desolate way
  chosen_spanish: por un camino desolado
  alternatives_spanish:
  - por una senda desolada
  - por un camino en un yermo
  lexicon: HALOT
  rationale: La construcción une יְשִׁימוֹן con דָּרֶךְ, de modo que no conviene separarlos como dos lugares distintos. «Camino desolado» comunica la ruta árida y vacía de manera natural en español, preservando el valor compacto del hebreo.
- source_word: עִיר מוֹשָׁב
  english_pob_choice: city to dwell in
  chosen_spanish: ciudad donde habitar
  alternatives_spanish:
  - ciudad para habitar
  - ciudad habitada
  - ciudad de morada
  lexicon: HALOT
  rationale: La secuencia expresa una ciudad apta para asentarse o vivir. «Donde habitar» suena natural y conserva la idea de buscar un lugar de residencia, no meramente una ciudad cualquiera.
- source_word: לֹא מָצָאוּ
  english_pob_choice: they found no
  chosen_spanish: no hallaron
  alternatives_spanish:
  - no encontraron
  - no dieron con
  lexicon: HALOT
  rationale: La negación hebrea indica fracaso en encontrar. «No hallaron» es breve, poético y fiel al sentido; evita una repetición excesiva de «encontrar» en la cadencia del verso.
theological_decisions:
- issue: 'El par de expresiones geográficas: «wilderness» y «desolate way» puede sugerir dos escenarios distintos o una sola ruta desolada.'
  english_pob_reading: They wandered in the wilderness, in a desolate way; they found no city to dwell in.
  chosen_spanish_reading: Anduvieron por el desierto[a], por un camino desolado; no hallaron ciudad donde habitar.
  alternative_spanish_readings:
  - Anduvieron por el desierto y por un camino desolado; no hallaron ciudad donde habitar.
  - Anduvieron en el desierto, en un camino desolado; no hallaron ciudad donde habitar.
  rationale: Se mantiene la lectura poética de dos complementos coordinados por asindeton, sin convertir la frase en una explicación prosaica. No se fuerza una distinción topográfica absoluta donde el hebreo compacta la imagen del vagar en lugar inhóspito.
  doctrine_reference: Poética bíblica / paralelismo semántico
translation_notes:
  revision_awareness: La redacción sigue la revisión inglesa más reciente, que prefirió «a desolate way» sobre «the desolate way» por ser más natural y más cercana a la construcción hebrea. En español se reflejó con «un camino desolado».
  spanish_consistency_notes:
  - Se conserva «Yahvé» como norma del proyecto cuando aparezca el Tetragrámaton; este versículo no lo contiene.
  - Se evitó «SEÑOR» como sustituto no pertinente aquí.
  - «Desierto» y «camino desolado» mantienen el registro bíblico sin introducir glosa interpretativa adicional.
  - La puntuación reproduce dos miembros poéticos separados por punto y coma, acorde con el hebreo breve y paralelo.
