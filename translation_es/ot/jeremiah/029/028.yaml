translation:
  language: es
  text: 'Por eso nos envió en Babilonia[a], diciendo: «Será por mucho tiempo. Construyan casas y habiten en ellas[b], planten jardines y coman su fruto».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más literalmente: «nos envió en Babilonia». El hebreo expresa de forma idiomática que envió un mensaje a los exiliados que estaban en Babilonia, no que los envió a Babilonia. La frase siguiente es elíptica: literalmente, «Es largo», dando a entender que la permanencia o el exilio allí será prolongado.'
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «y habiten»; se traduce «habiten en ellas» porque el verbo sigue a «Construyan casas» y el objeto se sobreentiende por el contexto.'
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי עַל כֵּן
  english_pob_choice: For this reason
  chosen_spanish: Porque por eso
  alternatives_spanish:
  - Por eso
  - Por esta razón
  lexicon: HALOT
  rationale: La combinación introduce la causa de lo dicho antes. «Porque por eso» conserva el valor causal y el enlace discursivo, aunque en español puede sonar repetitivo; se mantiene para reflejar de cerca la relación lógica del hebreo. «Por eso» es una alternativa más fluida, pero menos explícita respecto de la estructura causal.
- source_word: שָׁלַח אֵלֵינוּ בָּבֶל
  english_pob_choice: he sent to us in Babylon
  chosen_spanish: nos envió a Babilonia
  alternatives_spanish:
  - nos envió en Babilonia
  - nos envió palabra en Babilonia
  lexicon: HALOT
  rationale: El hebreo expresa de manera idiomática que el mensaje llegó a los exiliados ubicados en Babilonia. En español, «nos envió a Babilonia» comunica con naturalidad la localización del envío sin forzar una construcción extraña. Se evita «en Babilonia» porque podría sonar menos natural en esta cláusula verbal; «envió palabra» sería más interpretativo que el texto base.
- source_word: לֵאמֹר
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - para decir
  lexicon: HALOT
  rationale: Es la forma directa y usual para introducir discurso citado, manteniendo la relación sintáctica del hebreo.
- source_word: אֲרֻכָּה הִיא
  english_pob_choice: It will be a long time
  chosen_spanish: Será por mucho tiempo
  alternatives_spanish:
  - Es largo
  - El exilio será largo
  - Durará mucho tiempo
  lexicon: HALOT
  rationale: La frase hebrea es elíptica y probablemente se refiere a una estancia/exilio prolongado. En español, «Será por mucho tiempo» conserva esa elipsis sin añadir explícitamente «el exilio» al texto principal. La nota explica la tensión léxica.
- source_word: בְּנוּ בָתִּים
  english_pob_choice: Build houses
  chosen_spanish: Construyan casas
  alternatives_spanish:
  - Edifiquen casas
  - Hagan casas
  lexicon: HALOT
  rationale: «Construyan» es un imperativo natural y fiel a בְּנוּ. «Casas» mantiene el objeto directo sin añadir reflexividad.
- source_word: וְשֵׁבוּ
  english_pob_choice: and live in them
  chosen_spanish: y habiten en ellas
  alternatives_spanish:
  - y vivan en ellas
  - y moren en ellas
  - y se queden
  lexicon: HALOT
  rationale: El hebreo dice literalmente «y siéntense/dwellen», con el objeto implícito por el contexto de «casas». «Habiten en ellas» conserva el valor de residir sin volver demasiado coloquial el mandato. Se opta por explicitar el pronombre porque el referente ya está claro en español por la frase anterior.
- source_word: וְנִטְעוּ גַנּוֹת
  english_pob_choice: and plant gardens
  chosen_spanish: planten huertos
  alternatives_spanish:
  - planten jardines
  - siembren huertos
  lexicon: HALOT
  rationale: גַנּוֹת puede abarcar jardines o huertos; aquí la secuencia final «coman su fruto» favorece «huertos» por su asociación con árboles o cultivos comestibles, aunque «jardines» sigue siendo posible. Se conserva la naturalidad del español sin perder el campo semántico agrícola.
- source_word: וְאִכְלוּ אֶת פְּרִיהֶן
  english_pob_choice: and eat their fruit
  chosen_spanish: y coman su fruto
  alternatives_spanish:
  - y coman el fruto de ellas
  - y coman su producción
  lexicon: HALOT
  rationale: El posesivo femenino plural concuerda con «huertos». «Su fruto» es una solución breve y natural en español, manteniendo el referente plural y la relación posesiva sin añadir pesadez.
translation_notes:
  revision_awareness: Se siguió el estado revisado más reciente con alta concordancia y sin cambios requeridos; la versión española mantiene la elipsis de אֲרֻכָּה הִיא mediante una traducción idiomática con nota, y conserva la secuencia imperativa del hebreo sin añadir contenido no sustentado.
  spanish_consistency_notes:
  - Se mantiene «Babilonia» como topónimo, sin sustituirlo por perífrasis.
  - Se conserva el imperativo plural con sujeto implícito en español (ustedes) conforme al hebreo.
  - No se introduce «Cristo», «SEÑOR» ni terminología teológica ajena al versículo.
  - El posesivo en «su fruto» remite a los huertos/gardens en femenino plural, respetando la concordancia del hebreo.
