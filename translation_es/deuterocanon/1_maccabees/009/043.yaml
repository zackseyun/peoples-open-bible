translation:
  language: es
  text: Y Bacquides oyó[a], y en sábado llegó hasta las riberas del Jordán con una gran fuerza.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Griego literalmente: «el día de los sábados», un giro judeogriego que significa «en sábado» o «el día de sábado».'
    reason: lexical_alternative
lexical_decisions:
- source_word: Βακχίδης
  english_pob_choice: Bacchides
  chosen_spanish: Bacquides
  alternatives_spanish:
  - Bacquides
  - Báquides
  lexicon: transliteración estándar
  rationale: Se conserva el nombre propio por transliteración. «Bacquides» refleja la forma castellana más natural y mantiene la identificación histórica sin interpretar el nombre.
- source_word: ἤκουσεν
  english_pob_choice: heard
  chosen_spanish: oyó
  alternatives_spanish:
  - escuchó
  - se enteró
  lexicon: LSJ
  rationale: Aquí ἀκούω expresa recepción de noticias; «oyó» es breve, directo y no añade un sujeto u objeto explícito que el griego tampoco especifica.
- source_word: τῇ ἡμέρᾳ τῶν σαββάτων
  english_pob_choice: on the day of the Sabbaths
  chosen_spanish: el día de los sábados
  alternatives_spanish:
  - en el día de los sábados
  - el día de sábado
  lexicon: LSJ
  rationale: Se mantiene la pluralidad del giro griego con una calca comprensible en español. «El día de los sábados» preserva la tensión idiomática que el inglés POB decidió no suavizar en la revisión final.
- source_word: ἕως τῶν κρηπῖδων τοῦ Ἰορδάνου
  english_pob_choice: as far as the banks of the Jordan
  chosen_spanish: hasta las riberas del Jordán
  alternatives_spanish:
  - hasta las orillas del Jordán
  - hasta las riberas del Jordán
  lexicon: LSJ
  rationale: κρηπίς puede referirse al borde o ribera en un contexto geográfico. «Riberas» comunica bien el borde del río en español y conserva el sentido topográfico sin introducir una imagen arquitectónica.
- source_word: ἐν δυνάμει πολλῇ
  english_pob_choice: with a great force
  chosen_spanish: con mucha fuerza
  alternatives_spanish:
  - con gran fuerza
  - con un gran contingente
  - en gran fuerza
  lexicon: LSJ
  rationale: δύναμις en este contexto militar puede expresar fuerza o potencia armada. «Con mucha fuerza» sigue de cerca la sintaxis griega y mantiene la ambigüedad entre poder y fuerza militar sin especificar «ejército».
translation_notes:
  revision_awareness: 'La versión española sigue la revisión final del inglés POB en un punto clave: conserva el plural del giro temporal griego («día de los sábados») en vez de normalizarlo a «sábado», para reflejar con mayor transparencia τῇ ἡμέρᾳ τῶν σαββάτων. También mantiene la lectura militar general de δυνάμει πολλῇ sin sobreespecificarla como «ejército».'
  spanish_consistency_notes:
  - Se evita «SEÑOR» porque no hay aquí un nombre divino ni cita del Tetragrámaton.
  - Se tradujo el nombre propio por transliteración y se mantuvo el registro narrativo sobrio propio de 1 Macabeos.
  - La nota al pie explica la tensión idiomática del plural griego sin eliminarla del texto principal.
