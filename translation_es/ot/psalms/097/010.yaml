translation:
  language: es
  text: Los que aman a Yahvé, odien el mal. Él guarda las vidas[a] de sus fieles; de la mano de los impíos los libra.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘las almas’. El hebreo nefashot puede significar ‘vidas’, ‘personas’ o ‘almas’, y jasidav puede traducirse ‘sus fieles’, ‘sus piadosos’ o ‘sus santos’.
    reason: lexical_alternative
lexical_decisions:
- source_word: אֹהֲבֵי יְהוָה
  english_pob_choice: You who love Yahweh
  chosen_spanish: Los que aman a Yahvé
  alternatives_spanish:
  - Ustedes que aman a Yahvé
  - Amadores de Yahvé
  lexicon: HALOT
  rationale: El participio constructo se entiende como una apelación directa a un grupo caracterizado por amar a Yahvé. En español, ‘Los que aman’ conserva ese valor participial y resulta natural; ‘Yahvé’ sigue el criterio doctrinal del proyecto para el Nombre divino.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  - el SEÑOR
  lexicon: HALOT
  rationale: Se conserva la transliteración del Nombre divino, conforme al estándar del proyecto. No se sustituye por un título, para mantener visible la referencia personal del texto hebreo.
- source_word: שִׂנְאוּ
  english_pob_choice: hate
  chosen_spanish: odien
  alternatives_spanish:
  - aborrezcan
  - tengan odio por
  lexicon: HALOT
  rationale: El imperativo plural exige una orden directa. ‘Odien’ expresa con claridad la fuerza del mandamiento sin suavizarla; ‘aborrezcan’ sería posible, pero ‘odien’ es más breve y transparente.
- source_word: רָע
  english_pob_choice: evil
  chosen_spanish: el mal
  alternatives_spanish:
  - lo malo
  - la maldad
  lexicon: HALOT
  rationale: El sustantivo/adjetivo funciona de manera sustantiva y designa la esfera moral contraria a Yahvé. ‘El mal’ mantiene amplitud semántica y suena natural en español bíblico contemporáneo.
- source_word: שֹׁמֵר
  english_pob_choice: He guards
  chosen_spanish: Él guarda
  alternatives_spanish:
  - Él protege
  - Él preserva
  lexicon: HALOT
  rationale: El participio describe la acción característica de Dios. ‘Guarda’ conserva tanto la idea de custodia como la continuidad verbal en español.
- source_word: נַפְשׁוֹת
  english_pob_choice: the lives
  chosen_spanish: las vidas
  alternatives_spanish:
  - las almas
  - las personas
  lexicon: HALOT
  rationale: Aquí נֶפֶשׁ apunta a la vida concreta de las personas fieles, no a una noción filosófica de ‘alma’. ‘Las vidas’ sigue de cerca el sentido hebreo y evita restringir el término.
- source_word: חֲסִידָיו
  english_pob_choice: his faithful ones
  chosen_spanish: sus fieles
  alternatives_spanish:
  - sus santos
  - sus piadosos
  - los que le son leales
  lexicon: HALOT
  rationale: El término designa a los que pertenecen a Dios y viven en lealtad pactual. ‘Sus fieles’ comunica bien esa relación sin imponer un tecnicismo eclesiástico como ‘santos’.
- source_word: מִיַּד
  english_pob_choice: from the hand of
  chosen_spanish: de la mano de
  alternatives_spanish:
  - del poder de
  - de la mano
  lexicon: HALOT
  rationale: Se conserva la imagen hebrea de ‘mano’ como poder o control. En español, ‘de la mano de’ reproduce la metáfora de forma comprensible y fiel.
- source_word: רְשָׁעִים
  english_pob_choice: the wicked
  chosen_spanish: los impíos
  alternatives_spanish:
  - los malvados
  - los malhechores
  lexicon: HALOT
  rationale: ‘Impíos’ es una opción bíblica clara para el plural sustantivado de personas culpables ante Dios. Mantiene el contraste religioso-moral del hebreo sin volverlo demasiado coloquial.
- source_word: יַצִּילֵם
  english_pob_choice: he delivers them
  chosen_spanish: los libra
  alternatives_spanish:
  - los rescata
  - los salva
  lexicon: HALOT
  rationale: El hiphil de נצל implica librar, rescatar, sacar de peligro. ‘Libra’ encaja bien con la preposición ‘de la mano de’ y evita cargar el verbo con connotaciones soteriológicas posteriores.
theological_decisions:
- issue: Sentido de נַפְשׁוֹת en el contexto
  english_pob_reading: the lives
  chosen_spanish_reading: las vidas
  alternative_spanish_readings:
  - las almas
  - las personas
  rationale: La línea trata de protección y liberación frente a los impíos; por eso el sentido concreto de ‘vida’ es el más ajustado. ‘Las vidas’ evita introducir una antropología del ‘alma’ que el verso no desarrolla.
  doctrine_reference: Translation philosophy §1, §3
- issue: Valor de חֲסִידָיו
  english_pob_reading: his faithful ones
  chosen_spanish_reading: sus fieles
  alternative_spanish_readings:
  - sus santos
  - sus piadosos
  rationale: El hebreo describe a los que muestran lealtad y piedad pactal. ‘Sus fieles’ conserva esa pertenencia relacional a Dios sin sustituir el matiz por un término exclusivamente confesional.
  doctrine_reference: Translation philosophy §5, §6
- issue: Tratamiento del Nombre divino
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Jehová
  - el SEÑOR
  rationale: El proyecto traduce el Tetragrámaton con el nombre propio ‘Yahvé’ para preservar la referencia personal del texto hebreo. No se usa una sustitución reverencial que oculte el Nombre.
  doctrine_reference: Project terminology defaults
translation_notes:
  revision_awareness: El texto sigue de cerca el hebreo masorético y concuerda con la lectura inglesa auditada sin cambios relevantes en la revisión más reciente; no se identificaron revisiones aplicadas que afecten la redacción española.
  spanish_consistency_notes:
  - Se mantiene ‘Yahvé’ como forma del Nombre divino, coherente con el estándar del proyecto.
  - Se usa ‘impíos’ para רְשָׁעִים, manteniendo el contraste moral y religioso del verso.
  - ‘Las vidas’ y ‘sus fieles’ preservan el sentido concreto y relacional del hebreo sin introducir una terminología doctrinal ajena al contexto.
  - La puntuación reproduce la división de las dos cláusulas principales del versículo en español natural.
