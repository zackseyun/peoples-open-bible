revisions:
- from: Sobre tus muros[a], Jerusalén, he puesto vigilantes; todo el día y toda la noche, continuamente, nunca callarán. Ustedes que recuerdan a Yahvé, no se den reposo para ustedes mismos.
  to: Sobre tus muros[a], Jerusalén, he asignado vigilantes; todo el día y toda la noche, continuamente, nunca callarán. Ustedes que hacen mención de Yahvé, no se den descanso.
  rationale: Se corrige la frase clave הַמַּזְכִּרִים אֶת־יְהוָה para evitar el falso sentido de mera memoria subjetiva y preservar la imagen hebrea de mención/invocación persistente. También se mejora הִפְקַדְתִּי con "he asignado" y se suaviza la exhortación final con una formulación más natural en español. La nota se reescribe para presentar con claridad las alternativas léxicas preservadas por la auditoría inglesa.
  reviewer_model: gpt-5.4
