translation:
  language: es
  text: 'Y dije[a]: «Dios mío, estoy avergonzado y humillado de levantar mi rostro hacia ti, Dios mío, porque nuestras iniquidades se han multiplicado sobre nuestras cabezas, y nuestra culpa ha crecido hasta los cielos».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «sobre nuestra cabeza». El hebreo usa el singular «cabeza» con sentido posesivo plural; el español aquí lo expresa naturalmente como plural corporativo.
    reason: lexical_alternative
lexical_decisions:
- source_word: וָאֹמְרָה
  english_pob_choice: And I said
  chosen_spanish: Y dije
  alternatives_spanish:
  - Entonces dije
  - Y yo dije
  lexicon: WLC/HALOT
  rationale: Conserva la continuidad narrativa del waw consecutivo sin forzar una paráfrasis; en español, ‘Y dije’ resulta natural y fiel.
- source_word: אֱלֹהַי
  english_pob_choice: My God
  chosen_spanish: Dios mío
  alternatives_spanish:
  - Mi Dios
  - Oh, Dios mío
  lexicon: WLC/HALOT
  rationale: Mantiene la vocación directa y la reverencia natural en español. ‘Dios mío’ es idiomático y conserva la repetición enfática del hebreo.
- source_word: בֹּשְׁתִּי
  english_pob_choice: I am ashamed
  chosen_spanish: estoy avergonzado
  alternatives_spanish:
  - estoy avergonzado de mí mismo
  - me avergüenzo
  lexicon: WLC/HALOT
  rationale: Expresa el estado de vergüenza personal que comunica el perfecto hebreo en contexto confesional. ‘Estoy avergonzado’ evita una lectura meramente puntual o anecdótica.
- source_word: וְנִכְלַמְתִּי
  english_pob_choice: and humiliated
  chosen_spanish: y humillado
  alternatives_spanish:
  - y avergonzado
  - y afrentado
  lexicon: WLC/HALOT
  rationale: Conserva la intensificación de la pareja semántica con בֹּשְׁתִּי. ‘Humillado’ reproduce bien la nota de deshonra y abatimiento sin sonar arcaico.
- source_word: לְהָרִים ... פָּנַי אֵלֶיךָ
  english_pob_choice: to lift up my face to you
  chosen_spanish: para levantar mi rostro hacia ti
  alternatives_spanish:
  - para alzar mi rostro hacia ti
  - para mirar de frente hacia ti
  lexicon: WLC/HALOT
  rationale: Sigue de cerca la imagen hebrea del rostro levantado ante Dios. ‘Rostro’ conserva mejor la metáfora que ‘ojos’ y evita aplanar el hebraísmo.
- source_word: עֲוֺנֹתֵינוּ
  english_pob_choice: our iniquities
  chosen_spanish: nuestras iniquidades
  alternatives_spanish:
  - nuestros pecados
  - nuestra culpa
  lexicon: WLC/HALOT
  rationale: ‘Iniquidades’ preserva la carga moral y judicial del término y mantiene la diferencia con אַשְׁמָה, traducido más abajo como culpa.
- source_word: רָבוּ
  english_pob_choice: have multiplied
  chosen_spanish: se han multiplicado
  alternatives_spanish:
  - han aumentado
  - son muchas
  lexicon: WLC/HALOT
  rationale: Reproduce el crecimiento acumulativo del verbo y su fuerza verbal, no solo una cantidad estática.
- source_word: לְמַעְלָה רֹאשׁ
  english_pob_choice: above our heads
  chosen_spanish: sobre nuestras cabezas
  alternatives_spanish:
  - por encima de nuestras cabezas
  - sobre nuestra cabeza
  lexicon: WLC/HALOT
  rationale: Sigue la revisión inglesa que reconoce el plural posesorio corporativo. ‘Cabezas’ es el equivalente natural en español y mantiene la imagen idiomática.
- source_word: וְאַשְׁמָתֵנוּ
  english_pob_choice: our guilt
  chosen_spanish: nuestra culpa
  alternatives_spanish:
  - nuestro pecado de culpa
  - nuestra culpabilidad
  lexicon: WLC/HALOT
  rationale: En este contexto no se trata de una ofrenda por la culpa, sino del estado de culpa. ‘Culpa’ es claro, natural y distingue este término de ‘iniquidades’.
- source_word: גָדְלָה עַד לַשָּׁמָיִם
  english_pob_choice: has grown as high as the heavens
  chosen_spanish: ha crecido hasta los cielos
  alternatives_spanish:
  - ha llegado hasta los cielos
  - ha crecido hasta los cielos mismos
  lexicon: WLC/HALOT
  rationale: Mantiene la hipérbole vertical del hebreo. ‘Cielos’ funciona bien en español y conserva el plural poético sin introducir una explicación extra en el texto.
theological_decisions:
- issue: Confesión corporativa de culpa e iniquidad
  english_pob_reading: our iniquities... our guilt
  chosen_spanish_reading: nuestras iniquidades... nuestra culpa
  alternative_spanish_readings:
  - nuestros pecados... nuestra culpabilidad
  - nuestra maldad... nuestra culpa
  rationale: La distinción entre עָוֹן y אַשְׁמָה se mantiene en español para no borrar la tensión lexical del pasaje. La confesión es corporativa y judicial, por eso se conservan formas que expresan gravedad moral y responsabilidad.
  doctrine_reference: Confesión de pecado y culpa ante Dios (cf. temática de confesión corporativa en el AT).
- issue: Imagen de incapacidad para presentarse ante Dios
  english_pob_reading: to lift up my face to you
  chosen_spanish_reading: para levantar mi rostro hacia ti
  alternative_spanish_readings:
  - para alzar mi rostro hacia ti
  - para presentarme confiadamente ante ti
  rationale: Se preserva el hebraísmo del ‘rostro’ para no sustituir la imagen por una explicación interpretativa. La humillación delante de Dios forma parte del sentido teológico del versículo.
  doctrine_reference: Humillación delante de Dios; reverencia y arrepentimiento en la oración.
translation_notes:
  revision_awareness: La redacción sigue la revisión inglesa que corrigió el posesivo idiomático a ‘our heads’; en español se reflejó directamente como ‘nuestras cabezas’. También se mantuvo la distinción entre עֲוֹנֹת y אַשְׁמָה mediante ‘iniquidades’ y ‘culpa’, evitando fusionarlas en un solo término. No se añadió lenguaje explicativo innecesario al texto principal.
  spanish_consistency_notes:
  - Se usa ‘Dios mío’ en ambas ocurrencias para mantener la repetición enfática del hebreo.
  - ‘Iniquidades’ se reserva para עֲוֺנֹתֵינוּ y ‘culpa’ para אַשְׁמָתֵנוּ, preservando la diferencia léxica.
  - ‘Rostro’ se conserva como imagen idiomática; no se sustituye por ‘ojos’.
  - Se mantuvo un registro digno y moderno, sin calcos arcaizantes.
  - La nota al pie marca únicamente la alternativa idiomática del singular/plural en la imagen de ‘cabeza/cabezas’.
