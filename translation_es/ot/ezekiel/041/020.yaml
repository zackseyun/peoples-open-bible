translation:
  language: es
  text: Desde el piso[a] hasta por encima de la entrada, los querubines y las palmeras fueron hechos, y sobre la pared de la nave[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «desde el suelo» o «desde la tierra», si se toma más literalmente; en este contexto arquitectónico, el sentido es el nivel del piso.
    reason: lexical_alternative
  - marker: b
    text: Hebreo heikhal aquí probablemente se refiere específicamente a la sala principal o nave, no al complejo completo del templo.
    reason: lexical_alternative
lexical_decisions:
- source_word: מֵהָאָרֶץ
  english_pob_choice: From the floor
  chosen_spanish: Desde el piso
  alternatives_spanish:
  - Desde el suelo
  - Desde la tierra
  - Desde el nivel del piso
  lexicon: HALOT
  rationale: En el contexto arquitectónico de la visión del templo, אֶרֶץ no se entiende como «tierra» en sentido cósmico, sino como la superficie inferior del recinto. «Piso» comunica de manera natural esa referencia espacial en español sin perder el sentido técnico.
- source_word: עַד מֵעַל הַפֶּתַח
  english_pob_choice: to above the entrance
  chosen_spanish: hasta encima de la entrada
  alternatives_spanish:
  - hasta sobre la entrada
  - hasta arriba de la entrada
  - hasta por encima de la puerta
  lexicon: HALOT
  rationale: La frase marca el alcance vertical de la ornamentación. «Entrada» mantiene el referente arquitectónico general y suena más natural que una repetición pesada de «puerta».
- source_word: הַכְּרוּבִים
  english_pob_choice: cherubim
  chosen_spanish: querubines
  alternatives_spanish:
  - querubines
  - querubines celestiales
  lexicon: HALOT
  rationale: «Querubines» es el término bíblico asentado en español y conserva la fuerza técnica de estas figuras guardianas del templo; «querubines» sería una domesticación impropia del contexto.
- source_word: וְהַתִּמֹרִים
  english_pob_choice: and palm trees
  chosen_spanish: y palmeras
  alternatives_spanish:
  - y formas de palmera
  - y figuras de palmera
  lexicon: HALOT
  rationale: El sustantivo alude a formas de palmera en la decoración. En español, «palmeras» comunica directamente la imagen sin añadir una paráfrasis excesiva; el contexto ornamental ya sugiere que son motivos decorativos.
- source_word: עֲשׂוּיִם
  english_pob_choice: were made
  chosen_spanish: fueron hechos
  alternatives_spanish:
  - fueron fabricados
  - fueron labrados
  - fueron tallados
  lexicon: HALOT
  rationale: El participio pasivo indica que estos elementos fueron ejecutados/made. «Fueron hechos» es amplio y fiel; «tallados» introduciría una precisión no explícita en la forma verbal misma, aunque posible por contexto.
- source_word: וְקִיר הַהֵיכָל
  english_pob_choice: and on the wall of the nave
  chosen_spanish: y también en la pared del templo interior
  alternatives_spanish:
  - y en la pared del templo
  - y también en la pared de la nave
  lexicon: HALOT
  rationale: הֵיכָל aquí designa el recinto principal del templo, el «templo interior» o nave. «Templo interior» mantiene la distinción frente al complejo completo y evita que el lector lo confunda con todo el santuario.
theological_decisions:
- issue: Sentido de הֵיכָל en el contexto del templo visionario
  english_pob_reading: nave
  chosen_spanish_reading: templo interior
  alternative_spanish_readings:
  - nave
  - sala principal del templo
  - santuario interior
  rationale: El inglés POB aclaró que aquí no se trata del complejo entero, sino de la sala principal. En español, «templo interior» conserva esa delimitación espacial sin depender de un tecnicismo eclesiástico que podría sonar posterior o demasiado litúrgico.
  doctrine_reference: Contexto arquitectónico del templo en Ezequiel 40–42; no es una cuestión doctrinal, sino de precisión referencial.
translation_notes:
  revision_awareness: 'Se siguió el audit trail inglés sin cambios sustantivos: la lectura espacial de מֵהָאָרֶץ como nivel del piso, el alcance vertical de עַד מֵעַל הַפֶּתַח, la elección terminológica de כרובים y תמרים como motivos decorativos, y la restricción de הֵיכָל a la sala principal del templo. No hubo revisiones aplicadas en el paso reciente, y la traducción propuesta mantiene esas decisiones con una formulación española natural.'
  spanish_consistency_notes:
  - Se preservó la terminología bíblica estándar «querubines» para כרובים, coherente con el registro del POB.
  - Se evitó «SEÑOR» u otras sustituciones teológicas no pertinentes, pues el versículo no contiene el nombre divino.
  - «Templo interior» se usa como aclaración funcional de הֵיכָל, manteniendo la distinción arquitectónica señalada por el inglés POB.
  - La coordinación final con «y también» refleja que la pared del templo interior también estaba decorada, sin imponer una relación sintáctica más fuerte que la del hebreo.
