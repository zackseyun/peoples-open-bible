  yaml_path: translation/ot/job/020/022.yaml
  text: In the fullness of his abundance[a], distress will come upon him[b]; every hand of the miserable will come against him.
  footnotes:
  - marker: a
    text: Or 'In the fullness of his sufficiency, he will be in distress.' The Hebrew is compact, and both the noun for prosperity ('sufficiency/abundance') and the verb for distress ('be in straits') admit slightly different English renderings.
    reason: lexical_alternative
  - marker: b
    text: '''Every hand of the afflicted'' may also be rendered ''every hand of the toiler'' or ''every hand of those in misery.'''
    reason: lexical_alternative
