review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura del hebreo: tres verbos perfectos dirigidos a Dios, ''las naciones'', la destrucción del impío/los impíos, y la eliminación de ''su/nombre de ellos'' con duración enfática. Sin embargo, dos puntos no preservan adecuadamente el expediente inglés ni la mejor lectura contextual: (1) la nota a [a] está anclada a ''naciones'' pero habla de la alternativa de רָשָׁע, por lo que el anclaje está equivocado; (2) ''el malvado'' debilita la decisión auditada del POB de leer רָשָׁע en sentido colectivo/genérico, reforzada por el sufijo plural en ''su nombre''.'
  spanish_quality_summary: El español es claro y digno, pero 'para siempre y para siempre' suena torpe y poco idiomático. 'Por siempre y para siempre' o simplemente 'por los siglos' serían más naturales; para reflejar mejor לְעוֹלָם וָעֶד y el POB inglés, 'por siempre y para siempre' funciona bien. Además, conviene pluralizar 'su nombre' a 'su nombre' solo si se mantiene un referente colectivo singular; al pasar a 'los malvados', la forma natural y fiel es 'su nombre' como posesivo colectivo o 'el nombre de ellos'. 'Su nombre' sigue siendo aceptable en español con antecedente plural, pero la nota debe aclarar el literal hebreo cuando corresponda.
  glossary_alignment: No hay términos del glosario mayor en juego salvo consistencia con la decisión inglesa sobre רָשָׁע. El proyecto favorece seguir las decisiones léxico-teológicas documentadas; aquí debe preferirse 'los malvados' o 'los impíos' sobre 'el malvado' por la coherencia con la nota y con 'their name'. 'Reprendiste', 'las naciones', 'destruiste' y 'borraste' están bien alineados.
  issues:
  - severity: high
    issue: La nota [a] está colocada en 'naciones' pero explica una alternativa de רָשָׁע.
    rationale: El expediente inglés pone la nota de alternativa ('the wicked one') sobre 'the wicked', no sobre 'nations'. En español, el marcador debe ir junto a 'los malvados'/'el malvado'.
  - severity: high
    issue: '''el malvado'' no sigue la decisión principal del POB de entender רָשָׁע colectivamente.'
    rationale: Aunque el singular hebreo puede ser representativo, el POB documentó como lectura escogida 'the wicked' en sentido colectivo/genérico, apoyado por el plural en שְׁמָם. En español, 'los malvados' comunica mejor esa decisión y evita una lectura indebidamente individual.
  - severity: medium
    issue: '''para siempre y para siempre'' es poco idiomático en español.'
    rationale: La expresión reproduce mecánicamente la duplicación, pero suena rígida. 'por siempre y para siempre' mantiene el énfasis y mejora la naturalidad litúrgica.
  - severity: medium
    issue: La nota [b] debe seguir anclada a 'su nombre', no a 'destruiste al malvado'.
    rationale: La observación léxica se refiere a שְׁמָם ('su nombre / el nombre de ellos'), no a אִבַּדְתָּ ni a רָשָׁע.
  revised_spanish_text: Reprendiste a las naciones; destruiste a los malvados[a]; borraste su nombre[b] por siempre y para siempre.
  revised_footnotes:
  - marker: a
    text: O 'al malvado'; el singular hebreo puede entenderse de manera individual o colectiva.
    reason: alternative_reading
  - marker: b
    text: Literalmente 'su nombre'; en contexto implica la desaparición de su memoria o renombre.
    reason: lexical_alternative
  revision_rationale: Se reubica la nota de alternativa al término correcto, se ajusta רָשָׁע a una lectura colectiva conforme al expediente del POB y al contexto, y se mejora la naturalidad de la fórmula final sin perder su fuerza enfática. La nota sobre 'su nombre' se conserva, ahora correctamente anclada.
