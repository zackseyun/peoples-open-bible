id: 2TH.3.3
reference: 2 Thessalonians 3:3
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: πιστὸς δέ ἐστιν ὁ κύριος, ὃς στηρίξει ὑμᾶς καὶ φυλάξει ἀπὸ τοῦ πονηροῦ.
base_translation:
  language: en
  yaml_path: translation/nt/2_thessalonians/003/003.yaml
  text: But the Lord is faithful[a], who will strengthen you and guard you from the evil one.
translation:
  language: ko
  text: 그러나 주는 신실하시니, 여러분을 굳게 세워 주시고 악한 자[a]로부터 지켜 주실 것입니다.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 또는 「악으로부터」. 헬라어 τοῦ πονηροῦ는 남성(「악한 자」)으로도 중성(「악」)으로도 읽을 수 있다.
    reason: alternative_reading
lexical_decisions:
- source_word: πιστὸς
  english_pob_choice: faithful
  chosen_korean: 신실하시니
  alternatives_korean:
  - 신실하십니다
  - 미쁘시니
  lexicon: BDAG
  rationale: 주의 신실하심을 가리키는 표준 술어 형용사를 합쇼체 신적 경어로.
- source_word: δέ
  english_pob_choice: But
  chosen_korean: 그러나
  alternatives_korean:
  - 그러나
  - 한편
  lexicon: BDAG
  rationale: 앞 절(모든 사람이 믿음을 가진 것은 아님)과의 대조.
- source_word: ὁ κύριος
  english_pob_choice: the Lord
  chosen_korean: 주는
  alternatives_korean:
  - 주님은
  - 주께서는
  lexicon: BDAG
  rationale: 표준 글로서리. 「주」가 가장 간결.
- source_word: στηρίξει
  english_pob_choice: will strengthen
  chosen_korean: 굳게 세워 주시고
  alternatives_korean:
  - 견고하게 하시고
  - 굳게 하시고
  lexicon: BDAG
  rationale: 미래의 약속적 신적 행위를 「~해 주시다」 수혜적 표현으로 자연스럽게 옮긴다.
- source_word: φυλάξει
  english_pob_choice: will guard
  chosen_korean: 지켜 주실 것입니다
  alternatives_korean:
  - 보호하실 것입니다
  - 지키실 것입니다
  lexicon: BDAG
  rationale: φυλάσσω의 보호적 의미.
- source_word: ἀπὸ
  english_pob_choice: from
  chosen_korean: ~로부터
  alternatives_korean:
  - ~으로부터
  lexicon: BDAG
  rationale: 보호의 출처/대상 분리.
- source_word: τοῦ πονηροῦ
  english_pob_choice: the evil one
  chosen_korean: 악한 자
  alternatives_korean:
  - 악
  - 사악한 자
  lexicon: BDAG
  rationale: 신약 정형 표현 + 영적 대적의 인격적 함의가 자연스럽다. 「악」 가능성은 각주.
theological_decisions:
- issue: τοῦ πονηροῦ의 지시(인격적 vs 추상적)
  chosen_reading: 악한 자(인격적)
  alternative_readings:
  - 악(추상적)
  rationale: 헬라어 형태는 양 의미가 가능하나 신약의 다른 정형 표현과 본문의 보호 정황은 인격적 의미를 지지한다. 본문은 인격적 의미, 추상적 의미는 각주로 보존하여 신학적 긴장을 절대적으로 해소하지 않는다.
  doctrine_reference: 'Translation philosophy §3'
