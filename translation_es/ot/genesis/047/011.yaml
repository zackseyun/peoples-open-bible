translation:
  language: es
  text: Entonces José asentó a su padre y a sus hermanos[a], y les dio una posesión en la tierra de Egipto, en la mejor parte de la tierra, en la tierra de Ramesés, tal como Faraón había mandado.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «la parte más escogida de la tierra».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיּוֹשֵׁב
  english_pob_choice: settled
  chosen_spanish: estableció
  alternatives_spanish:
  - hizo habitar
  - asentó
  - estableció para vivir
  lexicon: HALOT
  rationale: 'El verbo en hifil es causativo: José hizo que su familia residiera allí. «Estableció» conserva esa idea de colocarlos/asentarlos en un lugar, con un español natural y digno, sin perder el matiz causal del hebreo.'
- source_word: אָבִיו וְאֶת־אֶחָיו
  english_pob_choice: his father and his brothers
  chosen_spanish: a su padre y a sus hermanos
  alternatives_spanish:
  - a su padre y a su familia
  lexicon: HALOT
  rationale: El hebreo nombra explícitamente «padre» y «hermanos», así que se preserva esa referencia kinésica sin ampliarla a «familia». «Hermanos» mantiene el valor concreto del texto fuente.
- source_word: וַיִּתֵּן לָהֶם אֲחֻזָּה
  english_pob_choice: gave them a possession
  chosen_spanish: les dio una posesión
  alternatives_spanish:
  - les dio una propiedad
  - les dio un patrimonio
  - les dio una tenencia
  lexicon: HALOT
  rationale: אֲחֻזָּה designa una posesión o tenencia de tierra. «Posesión» conserva el sentido material y jurídico sin introducir por sí solo las connotaciones de «herencia» que no están explícitas en este versículo.
- source_word: בְּאֶרֶץ מִצְרַיִם
  english_pob_choice: in the land of Egypt
  chosen_spanish: en la tierra de Egipto
  alternatives_spanish:
  - en Egipto
  lexicon: HALOT
  rationale: Se mantiene «tierra» para reflejar la repetición del hebreo אֶרֶץ y conservar la textura literaria del versículo.
- source_word: בְּמֵיטַב הָאָרֶץ
  english_pob_choice: in the best part of the land
  chosen_spanish: en la mejor parte de la tierra
  alternatives_spanish:
  - en la parte más buena de la tierra
  - en lo mejor de la tierra
  - en la parte escogida de la tierra
  lexicon: HALOT
  rationale: מֵיטַב expresa lo mejor o más escogido. «La mejor parte de la tierra» reproduce con naturalidad la idea de porción selecta, siguiendo la revisión inglesa que precisó «best part».
- source_word: בְּאֶרֶץ רַעְמְסֵס
  english_pob_choice: in the land of Rameses
  chosen_spanish: en la tierra de Ramesés
  alternatives_spanish:
  - en la región de Ramesés
  lexicon: HALOT
  rationale: Se translitera el nombre propio como «Ramesés», conforme a la práctica del proyecto. Se conserva también «tierra» para reflejar el hebreo, aunque el referente pueda ser un distrito o territorio asociado con ese nombre.
- source_word: כַּאֲשֶׁר צִוָּה פַרְעֹה
  english_pob_choice: just as Pharaoh had commanded
  chosen_spanish: tal como Faraón había mandado
  alternatives_spanish:
  - como Faraón había ordenado
  - según el mandato de Faraón
  lexicon: HALOT
  rationale: La cláusula indica conformidad con una orden previa. «Tal como» y el pluscuamperfecto «había mandado» reflejan bien la secuencia narrativa y la dependencia respecto del mandato de Faraón.
translation_notes:
  revision_awareness: La redacción inglesa revisada cambió de «the best of the land» a «the best part of the land» para sonar más natural sin alterar el sentido. La propuesta española sigue esa precisión con «la mejor parte de la tierra».
  spanish_consistency_notes:
  - Se mantiene «tierra» para traducir אֶרֶץ de manera consistente en las tres ocurrencias del versículo.
  - Se usa «Ramesés» como transliteración estable del nombre propio.
  - «Faraón» se conserva como forma estable del título egipcio en español.
  - «Posesión» se eligió para אֲחֻזָּה por su valor jurídico-territorial, evitando una lectura demasiado abstracta.
