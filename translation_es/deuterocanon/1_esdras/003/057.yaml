  to: Hombres[a], ¿no son fuertes las mujeres? Grande es la tierra, y alto es el cielo, y veloz en su curso es el sol, porque gira en el circuito del cielo.
  rationale: Se reemplaza «carrera» por «curso» para reflejar mejor el sentido de δρόμος como trayectoria o recorrido del sol en contexto cosmológico, en línea con la decisión léxica auditada en inglés. Se conserva el resto, incluido el orden retórico y la nota alternativa sobre «círculo».
