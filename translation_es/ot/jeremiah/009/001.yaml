base_translation:
  language: en
  yaml_path: translation/ot/jeremiah/009/001.yaml
  text: Oh[a], that I had a travelers' lodging place in the wilderness, so that I might leave my people and go away from them! For all of them are adulterers[d][c][b], an assembly of traitors.
  footnotes:
