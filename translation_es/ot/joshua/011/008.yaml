base_translation:
  language: en
  yaml_path: translation/ot/joshua/011/008.yaml
  text: And Yahweh gave them into the hand of Israel[a], and they struck them down and pursued them as far as Great Sidon and as far as Misrephoth-maim and as far as the Valley of Mizpeh to the east[b]; and they struck them down until they had left them no survivor.
  footnotes:
  - marker: a
    text: Misrephoth-maim is a place name; the Hebrew may mean 'burnings of waters.'
    reason: lexical_alternative
  - marker: b
    text: Or 'until they had left them no survivor'; the Hebrew verb is singular, but the sense may be collective.
    reason: alternative_reading
