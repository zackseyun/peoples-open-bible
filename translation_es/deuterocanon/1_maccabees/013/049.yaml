translation:
  language: es
  text: Pero a los de la ciudadela[a] en Jerusalén se les impedía salir al campo y comprar y vender[b]; y tuvieron muchísima hambre, y muchos de ellos perecieron por la hambruna.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O “la Acra de Jerusalén”. El griego ἄκρα puede funcionar como nombre común (“ciudadela”) o como la designación conocida de la fortaleza seléucida en Jerusalén.
    reason: lexical_alternative
  - marker: b
    text: El texto griego dice “y y comprar y vender” (καὶ καὶ ἀγοράζειν καὶ πωλεῖν); el sentido es claro pese a la duplicación de la conjunción, que probablemente sea una repetición de copia o de transmisión textual, no una variante con significado.
    reason: textual_variant
lexical_decisions:
- source_word: ἄκρας
  english_pob_choice: the citadel
  chosen_spanish: la acra
  alternatives_spanish:
  - la ciudadela
  - la fortaleza
  lexicon: LSJ
  rationale: En este contexto histórico, ἄκρα puede funcionar como nombre propio del recinto fortificado seléucida en Jerusalén. Se conserva “acra” para respetar el valor histórico-topográfico reconocido por la tradición académica y por la nota inglesa; se evita neutralizarlo del todo con “ciudadela” en el texto principal. La nota explica la alternativa común.
- source_word: ἐκωλύοντο
  english_pob_choice: were prevented
  chosen_spanish: eran impedidos
  alternatives_spanish:
  - eran estorbados
  - se les impedía
  lexicon: BDAG
  rationale: El imperfecto pasivo expresa una restricción continua. “Eran impedidos” mantiene la pasividad externa y el carácter sostenido de la obstrucción.
- source_word: ἐκπορεύεσθαι
  english_pob_choice: from going out
  chosen_spanish: salir
  alternatives_spanish:
  - ir afuera
  - salir fuera
  lexicon: BDAG
  rationale: En español, “salir” ya implica el movimiento hacia afuera; añadir “fuera” sería redundante. El complemento “al campo” expresa el destino fuera de la ciudad.
- source_word: εἰς τὴν χώραν
  english_pob_choice: into the country
  chosen_spanish: al campo
  alternatives_spanish:
  - al campo circundante
  - a la región
  lexicon: LSJ
  rationale: χώρα aquí denota la zona rural o territorio exterior a Jerusalén. “Al campo” es la opción natural en español y conserva la oposición ciudad/campo.
- source_word: ἀγοράζειν καὶ πωλεῖν
  english_pob_choice: from buying and selling
  chosen_spanish: comprar y vender
  alternatives_spanish:
  - hacer compras y ventas
  - traficar
  lexicon: BDAG
  rationale: Se conserva la pareja verbal concreta para reflejar la restricción comercial de manera directa. No se comprime a “comerciar” porque el griego nombra las dos acciones explícitamente.
- source_word: ἐπείνασαν σφόδρα
  english_pob_choice: they became very hungry
  chosen_spanish: tuvieron muchísima hambre
  alternatives_spanish:
  - pasaron muchísima hambre
  - se hambrieron mucho
  lexicon: BDAG
  rationale: El aoristo con σφόδρα señala el resultado intenso de la privación. “Tuvieron muchísima hambre” suena natural y mantiene la fuerza del énfasis sin volverlo perifrástico de más.
- source_word: ἀπώλοντο
  english_pob_choice: perished
  chosen_spanish: perecieron
  alternatives_spanish:
  - murieron
  - fueron destruidos
  lexicon: BDAG
  rationale: En este contexto de sitio y escasez, el verbo indica muerte real. “Perecieron” conserva el registro histórico elevado y evita una simplificación excesiva.
- source_word: ἱκανοὶ
  english_pob_choice: many
  chosen_spanish: muchos
  alternatives_spanish:
  - un número considerable
  - bastantes
  lexicon: BDAG
  rationale: ἱκανοί aquí cuantifica a los que murieron. “Muchos” es el equivalente más natural y directo en español.
- source_word: τῷ λιμῷ
  english_pob_choice: from famine
  chosen_spanish: por el hambre
  alternatives_spanish:
  - por el hambre extrema
  - a causa del hambre
  lexicon: BDAG
  rationale: λιμός designa hambre severa o hambre de sitio. En español, “por el hambre” comunica la causa con naturalidad; la nota de contexto y el adjetivo “muchísima” ayudan a evitar que se oiga como simple apetito.
translation_notes:
  revision_awareness: El borrador sigue de cerca el griego de Swete y la solución inglesa auditada, manteniendo el valor histórico de ἄκρα, la pasiva continua de ἐκωλύοντο y el resultado intensivo de ἐπείνασαν σφόδρα. También respeta la rareza textual de la duplicación καὶ καὶ sin suavizarla en el razonamiento, aunque en español se omite por fluidez.
  spanish_consistency_notes:
  - Se usa “Yahvé” solo cuando corresponda a יהוה; aquí no aparece.
  - Se mantiene “acra” como término histórico-topográfico, con nota para la alternativa común “ciudadela”.
  - “Comprar y vender” conserva la duplicación de las acciones económicas del griego, aunque sin duplicar la conjunción en español.
  - “Perecieron” y “por el hambre” preservan el registro narrativo de desastre sin añadir interpretación doctrinal.
