translation:
  language: es
  text: Salieron de Elim y acamparon junto al Mar Rojo[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «el Mar de los Juncos». El nombre hebreo Yam Suf admite esa alternativa léxica, aunque aquí se conserva la designación tradicional «Mar Rojo».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּסְעוּ
  english_pob_choice: They set out
  chosen_spanish: Salieron
  alternatives_spanish:
  - Partieron
  - Se pusieron en marcha
  lexicon: HALOT
  rationale: En la fórmula itineraria del desierto, נסע expresa el desplazamiento desde una estación anterior. «Salieron» comunica de forma natural en español la partida desde Elim sin perder el sentido de tránsito.
- source_word: מֵאֵילִם
  english_pob_choice: from Elim
  chosen_spanish: de Elim
  alternatives_spanish:
  - desde Elim
  lexicon: Topónimo / preposición מִן
  rationale: La preposición indica origen; el nombre propio se translitera como «Elim». «De Elim» es la forma breve y natural en español para marcar el punto de salida.
- source_word: וַיַּחֲנוּ
  english_pob_choice: and camped
  chosen_spanish: y acamparon
  alternatives_spanish:
  - y se acamparon
  - y levantaron el campamento
  lexicon: HALOT
  rationale: חנה describe establecer campamento. «Acamparon» conserva la acción concreta y suena idiomático en español moderno.
- source_word: עַל
  english_pob_choice: by
  chosen_spanish: junto a
  alternatives_spanish:
  - al lado de
  - cerca de
  lexicon: HALOT
  rationale: Con un cuerpo de agua en contexto de campamento, עַל señala ubicación adyacente más que contacto físico sobre la superficie. «Junto a» refleja bien esa proximidad.
- source_word: יַם סוּף
  english_pob_choice: the Red Sea
  chosen_spanish: el Mar Rojo
  alternatives_spanish:
  - el Mar de los Juncos
  lexicon: HALOT
  rationale: En este contexto itinerario, la designación geográfica tradicional «Mar Rojo» es la lectura principal. La alternativa lexical «Mar de los Juncos» se conserva implícitamente mediante la nota, para no borrar la ambigüedad hebrea de סוּף.
translation_notes:
  revision_awareness: El texto inglés revisado está estable y en alta concordancia; no se reportan revisiones aplicadas. La versión española sigue esa lectura sin añadir matices no sustentados por el hebreo.
  spanish_consistency_notes:
  - Se mantuvo el tono sobrio y narrativo propio de una lista de itinerario.
  - «Mar Rojo» se usa como designación geográfica tradicional, con nota para la alternativa léxica de Yam Suf.
  - No se introdujeron términos eclesiásticos ni interpretaciones teológicas ajenas al versículo.
