translation:
  language: es
  text: Pero yo[a] he confiado en tu amor constante; mi corazón se gozará en tu salvación[b]. Cantaré a Yahvé, porque me ha colmado de bienes.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Pero en cuanto a mí». El hebreo marca un contraste enfático con la situación anterior.'
    reason: alternative_reading
  - marker: b
    text: 'O: «liberación». El término hebreo puede referirse tanto al rescate de una aflicción presente como a la salvación en un sentido más amplio.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַאֲנִי
  english_pob_choice: But as for me
  chosen_spanish: Pero yo[a]
  alternatives_spanish:
  - Pero en cuanto a mí
  - Pero yo, por mi parte
  lexicon: HALOT
  rationale: La partícula introduce contraste con el lamento precedente; en español, «Pero yo» expresa la oposición con naturalidad y conserva el énfasis del pronombre sin sobredeterminar el matiz.
- source_word: בְּחַסְדְּךָ
  english_pob_choice: in your steadfast love
  chosen_spanish: tu amor constante
  alternatives_spanish:
  - tu amor leal
  - tu misericordia
  - tu fidelidad amorosa
  lexicon: HALOT
  rationale: חֶסֶד combina amor, lealtad y permanencia; «amor constante» preserva esa cualidad duradera sin reducirla a simple «misericordia», y evita una formulación demasiado técnica para el lector general.
- source_word: בָטַחְתִּי
  english_pob_choice: I have trusted
  chosen_spanish: he confiado
  alternatives_spanish:
  - he puesto mi confianza
  - confié
  lexicon: HALOT
  rationale: El perfecto hebreo expresa una confianza ya asentada y vigente. «He confiado» refleja mejor ese estado consumado con relevancia presente que un simple presente o pasado aislado.
- source_word: יָגֵל
  english_pob_choice: will rejoice
  chosen_spanish: se gozará
  alternatives_spanish:
  - se alegrará
  - exultará
  lexicon: HALOT
  rationale: El imperfecto mira hacia la respuesta esperada por la salvación de Dios. «Se gozará» conserva el matiz de júbilo anticipado y suena más natural en registro bíblico que «exultará».
- source_word: לִבִּי
  english_pob_choice: my heart
  chosen_spanish: mi corazón
  alternatives_spanish:
  - mi interior
  - mi ser
  lexicon: HALOT
  rationale: «Corazón» conserva la antropología bíblica del centro interior de la persona y coincide con el uso habitual en español bíblico sin perder claridad.
- source_word: בִּישׁוּעָתֶךָ
  english_pob_choice: in your salvation
  chosen_spanish: en tu salvación
  alternatives_spanish:
  - en tu liberación
  - por tu salvación
  lexicon: HALOT
  rationale: יׁשׁוּעָה puede abarcar rescate concreto y salvación en sentido amplio. «Salvación» mantiene esa amplitud teológica, y la preposición «en» sigue de cerca la construcción hebrea.
- source_word: אָשִׁירָה
  english_pob_choice: I will sing
  chosen_spanish: Cantaré
  alternatives_spanish:
  - Quiero cantar
  - Cantaré yo
  lexicon: HALOT
  rationale: La forma cohortativa expresa intención o resolución. «Cantaré» comunica ese impulso volitivo de manera fluida y fiel en español.
- source_word: לַיהוָה
  english_pob_choice: to Yahweh
  chosen_spanish: a Yahvé
  alternatives_spanish:
  - a Yahvé Dios
  - al SEÑOR
  lexicon: HALOT
  rationale: Se sigue la convención del proyecto de verter יהוה como «Yahvé» y no como «SEÑOR», preservando el nombre divino propio del texto hebreo.
- source_word: כִּי
  english_pob_choice: because
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  lexicon: HALOT
  rationale: Aquí introduce la razón del canto; «porque» es la equivalencia más directa y clara en español contemporáneo.
- source_word: גָמַל עָלָי
  english_pob_choice: he has dealt bountifully with me
  chosen_spanish: me ha tratado con abundancia
  alternatives_spanish:
  - me ha tratado con bondad
  - me ha hecho bien
  - me ha colmado de bienes
  lexicon: HALOT
  rationale: El hebreo expresa una acción generosa y plenamente benéfica. «Me ha tratado con abundancia» intenta conservar la idea de un trato generoso y abundante sin convertirlo en un giro excesivamente interpretativo.
theological_decisions:
- issue: Nombre divino יהוה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Jehová
  rationale: El texto hebreo contiene explícitamente el Tetragrama. Siguiendo la directriz del proyecto, se conserva el nombre propio divino como «Yahvé» en vez de sustituirlo por un título reverencial.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Alcance de יְשׁוּעָה
  english_pob_reading: salvation
  chosen_spanish_reading: salvación
  alternative_spanish_readings:
  - liberación
  rationale: La palabra hebrea puede referirse tanto al rescate de una aflicción concreta como a la salvación en sentido más amplio. «Salvación» preserva esa amplitud; no se restringe indebidamente a una liberación meramente circunstancial.
  doctrine_reference: DOCTRINE.md §3 Preserve theological tension rather than resolve it
translation_notes:
  revision_awareness: El borrador sigue de cerca el último estado revisado del texto inglés, que permaneció sin cambios tras la última pasada de revisión y recibió acuerdo alto en la verificación cruzada; no se registran revisiones aplicadas adicionales para esta sección.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» para יהוה conforme al estándar del proyecto.
  - Se usa «salvación» para יְשׁוּעָה, conservando la tensión entre rescate inmediato y sentido teológico más amplio.
  - Se evita «misericordia» para חֶסֶד porque estrecha el campo semántico del término hebreo.
  - «Corazón» se conserva como centro interior de la persona, acorde con el uso bíblico.
  - La cláusula final se vierte con un verbo de trato generoso para reflejar גָמַל sin reducirlo a una lógica de retribución.
