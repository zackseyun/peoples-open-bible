translation:
  language: es
  text: Y el canto[a] alzó su voz, y sobre la multitud pusieron en orden su lámpara.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Paralelo griego: «y los salmistas alabaron con sus voces; en la casa muy llena el canto se hizo dulce». Esto sugiere que el segundo miembro hebreo puede ser difícil textualmente o estar transmitido de otra manera.'
    reason: alternative_reading
lexical_decisions:
- source_word: וַיִּתֵּן
  english_pob_choice: gave forth
  chosen_spanish: dejó oír
  alternatives_spanish:
  - dio
  - emitió
  - hizo resonar
  lexicon: HALOT
  rationale: Con קול, נתן expresa producir o sacar un sonido. «Dejó oír» conserva la idea idiomática sin sonar artificial en español.
- source_word: הַשִּׁיר
  english_pob_choice: the song
  chosen_spanish: el canto
  alternatives_spanish:
  - la canción
  - el cantar
  - el canto litúrgico
  lexicon: HALOT
  rationale: «Canto» transmite mejor el acto musical o litúrgico que «canción» en un contexto de templo, y sigue siendo fiel al sustantivo hebreo.
- source_word: קוֹלוֹ
  english_pob_choice: its voice
  chosen_spanish: su voz
  alternatives_spanish:
  - su sonido
  - su voz propia
  lexicon: HALOT
  rationale: El hebreo dice literalmente «su voz». En español, «dejó oír su voz» reproduce la imagen sin forzar el antecedente gramatical.
- source_word: וְעַל
  english_pob_choice: over
  chosen_spanish: sobre
  alternatives_spanish:
  - encima de
  - en medio de
  - ante
  lexicon: HALOT
  rationale: «Sobre» conserva la relación espacial básica del hebreo sin decidir más de lo que el texto permite.
- source_word: הֲמּוֹן
  english_pob_choice: the multitude
  chosen_spanish: la multitud
  alternatives_spanish:
  - la muchedumbre
  - el gentío
  - la gran asamblea
  lexicon: HALOT
  rationale: «Multitud» es el equivalente directo y mantiene el sentido de un grupo numeroso en escena.
- source_word: הֶעֱרִיכוּ
  english_pob_choice: they set in order
  chosen_spanish: pusieron en orden
  alternatives_spanish:
  - ordenaron
  - dispusieron
  - arreglaron
  lexicon: HALOT
  rationale: עָרַךְ en hifil significa ordenar o disponer. «Pusieron en orden» preserva el valor de organización ceremonial con claridad en español.
- source_word: נֵרוֹ
  english_pob_choice: his lamp
  chosen_spanish: su lámpara
  alternatives_spanish:
  - su luz
  - su lámpara encendida
  - su antorcha
  lexicon: HALOT
  rationale: נֵר normalmente significa «lámpara». Dado que el referente es incierto, se mantiene el sustantivo concreto y el posesivo neutro «su» en español.
theological_decisions:
- issue: Colocación del texto hebreo difícil frente al paralelo griego
  english_pob_reading: The main text follows the extant Hebrew directly, while the Greek parallel is preserved in a footnote as an alternative reading.
  chosen_spanish_reading: El texto principal sigue directamente el hebreo conservado, y el paralelo griego se preserva en una nota como lectura alternativa.
  alternative_spanish_readings:
  - 'Traducir principalmente desde el griego: «Y los salmistas alabaron con sus voces; en la casa muy llena el canto se hizo dulce»'
  - Suavizar el hebreo para armonizarlo con el griego en el cuerpo del texto
  rationale: En Sirácida, donde el hebreo existe, la política del proyecto favorece traducirlo como testimonio principal. Aquí el segundo miembro es oscuro y no coincide bien con el griego; por eso la versión española mantiene el hebreo y reconoce honestamente la tensión textual en nota.
  doctrine_reference: 'PHILOSOPHY.md: traducir desde el hebreo cuando se conserva; usar el paralelo griego como evidencia real y preservar la incertidumbre con honestidad.'
translation_notes:
  revision_awareness: El pasaje fue revisado recientemente y se mantuvo sin cambios; el marco de revisión señala, sin embargo, un problema mayor por la divergencia entre el hebreo conservado y el paralelo griego. La traducción española mantiene esa tensión en vez de resolverla por armonización.
  spanish_consistency_notes:
  - Se usó «Yahvé» como término por defecto solo cuando aparezca el nombre divino; en este versículo no aplica.
  - Se prefirió «canto» y «voz» en lugar de vocabulario eclesiástico más cargado para respetar la escena poética y cultual.
  - Se conservó la literalidad de «su lámpara» porque el hebreo no permite identificar con seguridad el referente.
