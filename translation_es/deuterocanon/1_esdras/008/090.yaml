base_translation:
  language: en
  yaml_path: translation/deuterocanon/1_esdras/008/090.yaml
  text: And Jechonias son of Jeelus[a], of the sons of Israel, cried out and said to Ezra, “We have sinned against the Lord, and foreign women from the nations of the land have dwelt among us[b]; and now there is still hope for all Israel.”
  footnotes:
  - marker: a
    text: The Greek final clause is difficult and appears to diverge from or compress the Hebrew parallel in Ezra 10:2. The translation follows the likely sense, 'there is still hope for Israel,' rather than a more literal but obscure rendering.
    reason: textual_variant
  - marker: b
    text: The Hebrew parallel reads more explicitly, 'we have married foreign women from the peoples of the land'; the Greek here instead says that foreign women 'have dwelt' among them.
    reason: alternative_reading
