translation:
  language: es
  text: ¡Vamos[a]! Voy a traer vino, y nos saciaremos con bebida fuerte; y mañana será como este día[b], mucho más grande.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «y bebamos hasta saciarnos de bebida fuerte»; el verbo hebreo puede enfatizar la saciedad o llenura, con implicación de exceso embriagante por el contexto.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «y mañana será como hoy, todavía mayor, muchísimo más». La frase final hebrea intensifica la jactancia sobre la abundancia del mañana.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אֵתָיוּ
  english_pob_choice: Come
  chosen_spanish: ¡Vengan!
  alternatives_spanish:
  - ¡Vamos!
  - ¡Acérquense!
  lexicon: HALOT
  rationale: Es una invitación imperativa dirigida a un grupo; en español, '¡Vengan!' conserva el tono exhortativo y la naturalidad conversacional sin perder el matiz de llamado colectivo.
- source_word: אֶקְחָה
  english_pob_choice: let me get
  chosen_spanish: voy a traer
  alternatives_spanish:
  - déjenme tomar
  - voy a conseguir
  lexicon: HALOT
  rationale: La forma cohortativa expresa intención/voluntad del hablante; en este contexto español 'voy a traer' comunica bien la iniciativa práctica sin sonar demasiado literal.
- source_word: יַיִן
  english_pob_choice: wine
  chosen_spanish: vino
  alternatives_spanish:
  - vino tinto
  - vino
  lexicon: HALOT
  rationale: Término estándar y directo para יין.
- source_word: וְנִסְבְּאָה
  english_pob_choice: and let us fill ourselves
  chosen_spanish: y nos saciaremos
  alternatives_spanish:
  - y nos llenaremos
  - y beberemos hasta saciarnos
  lexicon: HALOT
  rationale: El verbo sugiere saciedad, especialmente con bebida, y el contexto implica exceso. 'Nos saciaremos' preserva la idea de llenura/saciedad sin añadir una explicitación interpretativa demasiado fuerte.
- source_word: שֵׁכָר
  english_pob_choice: strong drink
  chosen_spanish: licor fuerte
  alternatives_spanish:
  - bebida fuerte
  - bebida alcohólica
  lexicon: HALOT
  rationale: '''Licor fuerte'' comunica una bebida embriagante distinta del vino y mantiene el contraste del hebreo sin restringirlo a una bebida específica moderna.'
- source_word: וְהָיָה
  english_pob_choice: and ... will be
  chosen_spanish: y ... será
  alternatives_spanish:
  - y ... resultará
  - y ... vendrá a ser
  lexicon: HALOT
  rationale: Valor futuro/resultativo simple; en español 'será' es la construcción más natural en esta profecía/boast.
- source_word: כָזֶה
  english_pob_choice: like this
  chosen_spanish: como este
  alternatives_spanish:
  - igual que este
  - tal como este
  lexicon: HALOT
  rationale: La demostración apunta al día presente/situación presente. 'Como este' reproduce la comparación de manera idiomática en español.
- source_word: יוֹם מָחָר
  english_pob_choice: tomorrow
  chosen_spanish: mañana
  alternatives_spanish:
  - el día de mañana
  lexicon: HALOT
  rationale: Adverbialización natural en español; evita una traducción mecánica de la frase nominal.
- source_word: גָּדוֹל
  english_pob_choice: great
  chosen_spanish: grande
  alternatives_spanish:
  - enorme
  - importante
  lexicon: HALOT
  rationale: Mantiene el adjetivo básico y el tono de abundancia/autoexaltación del dicho.
- source_word: יֶתֶר מְאֹד
  english_pob_choice: beyond measure
  chosen_spanish: sobremanera
  alternatives_spanish:
  - muchísimo más
  - en extremo
  lexicon: HALOT
  rationale: La combinación intensifica la comparación. 'Sobremanera' es una solución natural en español para expresar 'mucho más' con fuerza retórica, sin perder la intensificación final.
