base_translation:
  language: en
  yaml_path: translation/ot/hosea/004/012.yaml
  text: My people consult their piece of wood[a], and their staff tells them; for a spirit of whoredom has led them astray, and they have played the whore[c][b], departing from under their God.
  footnotes:
  - marker: a
    text: Or 'their wood' or, more interpretively, 'their wooden idol.' The Hebrew is literally 'his wood,' likely a collective singular referring to a wooden cult object used in divination.
    reason: lexical_alternative
  - marker: b
    text: Or 'a spirit of prostitution' or 'a spirit of unfaithfulness.' The Hebrew keeps the prostitution metaphor explicit.
    reason: lexical_alternative
  - marker: c
    text: Literally 'from under their God,' an idiom for departing from the proper allegiance and authority of their God.
    reason: lexical_alternative
