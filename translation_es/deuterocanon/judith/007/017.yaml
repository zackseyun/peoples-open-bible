  text: And the camp of the sons of Ammon moved on[a], and with them five thousand sons of Asshur[c][b], and they encamped in the valley and seized the waters and the springs of water of the sons of Israel.
  footnotes:
  - marker: a
    text: Or 'Ammonites.' The Greek reads literally 'sons of Ammon.'
    reason: lexical_alternative
  - marker: b
    text: The Greek term rendered 'valley' can also mean a hollow, glen, or enclosed plain, depending on terrain.
    reason: lexical_alternative
  - marker: c
    text: Or 'occupied' or 'secured in advance'; the verb suggests strategic seizure of the water sources.
    reason: lexical_alternative
