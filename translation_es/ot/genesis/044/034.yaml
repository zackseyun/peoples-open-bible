  rationale: Se reemplaza «subiré a mi padre» por «volveré a mi padre» para expresar de forma natural en español la idea de regresar al padre sin crear una construcción incorrecta. Se corrige la nota al pie para eliminar el anglicismo «harm» y mantener alternativas léxicas fieles al hebreo.
