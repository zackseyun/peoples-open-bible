translation:
  language: es
  text: Vuelve[a], Yahvé; rescata mi alma; sálvame por amor de tu amor fiel[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «Vuélvete». El hebreo puede expresar una petición de que Yahvé vuelva su favor o su atención.
    reason: alternative_reading
  - marker: b
    text: «Amor fiel» traduce aquí hebreo hesed, término que suele incluir amor leal, fidelidad de pacto y compasión; también puede entenderse como «amor constante», «misericordia» o «amor de pacto».
    reason: lexical_alternative
lexical_decisions:
- source_word: שׁוּבָה
  english_pob_choice: Return
  chosen_spanish: Vuélvete
  alternatives_spanish:
  - Vuelve
  - Regresa
  lexicon: HALOT
  rationale: El imperativo de שוב aquí es una súplica dirigida a Yahvé. En español, «vuélvete» conserva el movimiento relacional de retornar o volver la atención/presencia, con tono natural de oración sin añadir interpretación excesiva.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  lexicon: HALOT
  rationale: 'Se sigue el criterio proyectual para el Tetragrámaton: usar la transliteración del nombre divino en español, «Yahvé», en vez de una sustitución por título.'
- source_word: חַלְּצָה
  english_pob_choice: rescue
  chosen_spanish: rescata
  alternatives_spanish:
  - líbrame
  - sácame
  lexicon: HALOT
  rationale: El verbo expresa sacar o liberar de peligro. «Rescata» es claro, urgente y fiel al matiz de extracción de una situación amenazante.
- source_word: נַפְשִׁי
  english_pob_choice: soul
  chosen_spanish: alma
  alternatives_spanish:
  - vida
  - ser
  - yo mismo
  lexicon: HALOT
  rationale: Aunque נפש puede significar vida, ser o yo, la revisión inglesa final privilegia «soul». En español, «alma» transmite esa correspondencia sin perder el sentido de la persona en angustia, y permite mantener la tensión antropológica sin reducirla a un simple tecnicismo.
- source_word: הוֹשִׁיעֵנִי
  english_pob_choice: save me
  chosen_spanish: sálvame
  alternatives_spanish:
  - líbrame
  - guárdame
  lexicon: HALOT
  rationale: El hifil de ישׁע pide salvación/liberación. «Sálvame» es la forma más directa y natural en una oración personal.
- source_word: לְמַעַן
  english_pob_choice: for the sake of
  chosen_spanish: por amor de
  alternatives_spanish:
  - por causa de
  - a causa de
  - en atención a
  lexicon: HALOT
  rationale: La expresión marca motivo o fundamento. «Por amor de» es una fórmula idiomática española apta para súplica y preserva la apelación al carácter de Dios como base de la petición.
- source_word: חַסְדֶּךָ
  english_pob_choice: your steadfast love
  chosen_spanish: tu misericordia
  alternatives_spanish:
  - tu amor constante
  - tu lealtad amorosa
  - tu amor fiel
  lexicon: HALOT
  rationale: חסד combina lealtad, amor de pacto y misericordia. Se opta por «misericordia» porque en español litúrgico y bíblico es una equivalencia accesible; no obstante, el concepto incluye la fidelidad amorosa que el término hebreo implica.
theological_decisions:
- issue: Valor antropológico de נַפְשִׁי
  english_pob_reading: The final English revision uses 'my soul' rather than 'my life.'
  chosen_spanish_reading: «mi alma»
  alternative_spanish_readings:
  - mi vida
  - mi ser
  - a mí mismo
  rationale: La decisión inglesa revisada aproxima יותר el hebreo נפש a «soul». En español, «alma» comunica mejor esa elección editorial que «vida», aunque el contexto de peligro mortal no queda excluido; así se conserva la tensión entre la persona interior y la vida amenazada.
  doctrine_reference: Translation philosophy §1, §3
- issue: Representación del nombre divino YHWH
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Jehová
  rationale: Se preserva el nombre divino de forma transliterada, conforme al criterio del proyecto, evitando la sustitución por título. «Yahvé» es la forma establecida para español en este proyecto.
  doctrine_reference: 'Contested terms table: יְהוָה YHWH'
- issue: Sentido de חַסְדֶּךָ
  english_pob_reading: steadfast love
  chosen_spanish_reading: tu misericordia
  alternative_spanish_readings:
  - tu amor constante
  - tu amor fiel
  - tu amor de pacto
  rationale: «Misericordia» es una equivalencia bíblica natural en español, pero se reconoce que el hebreo חסד es más amplio e incluye lealtad pactal. La formulación elegida no niega esa amplitud; la hace legible en una frase breve de súplica.
  doctrine_reference: 'Contested terms table: חסד'
- issue: Imperativo de súplica dirigido a Dios
  english_pob_reading: Return
  chosen_spanish_reading: Vuélvete
  alternative_spanish_readings:
  - Vuelve
  - Regresa
  rationale: La forma pronominal en español puede sonar más directa y afectuosa en la oración que un simple «vuelve». Mantiene el carácter implorante y relacional del hebreo.
  doctrine_reference: Psalmic prayer register
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión auditada del inglés que cambió 'my life' a 'my soul'. Por eso se optó por «mi alma» en español. También se respetó el final inglés con 'steadfast love', pero se eligió una equivalencia española idiomática y teológicamente amplia, «misericordia», anotada para no perder el alcance de חסד.
  spanish_consistency_notes:
  - Se usa «Yahvé» para el Tetragrámaton conforme al estándar del proyecto.
  - Se preserva el tono de súplica breve y urgente propio del salmo.
  - No se sustituye חסד por un término exclusivamente sentimental; la nota conserva su trasfondo de amor leal/pactual.
  - Se mantiene una correspondencia natural entre el registro poético hebreo y un español bíblico claro.
