lexical_decisions:
- source_word: לְ/בִלְגָּה
  english_pob_choice: for Bilgah
  chosen_spanish: para Bilgá
  alternatives_spanish:
  - a Bilgá
  - correspondiente a Bilgá
  - para la casa de Bilgá
  lexicon: HALOT
  rationale: El prefijo ל en este reparto de suertes marca asignación; en español, «para» comunica de forma natural que la suerte cayó en Bilgá. Se mantiene la transliteración del nombre propio con acento adaptado a la prosodia española.
- source_word: חֲמִשָּׁה עָשָׂר
  english_pob_choice: the fifteenth
  chosen_spanish: el decimoquinto
  alternatives_spanish:
  - quince
  - la decimoquinta suerte
  - el quince
  lexicon: HALOT
  rationale: Aunque la forma hebrea es cardinal («quince»), aquí funciona ordinalmente por el contexto de sorteos sucesivos. En español, «el decimoquinto» expresa de manera natural esa función ordinal.
- source_word: לְ/אִמֵּר
  english_pob_choice: for Immer
  chosen_spanish: para Imer
  alternatives_spanish:
  - a Imer
  - correspondiente a Imer
  - para la casa de Imer
  lexicon: HALOT
  rationale: Como con Bilgá, el ל señala asignación por suerte. «Para Imer» conserva la fórmula distributiva y evita una paráfrasis más extensa.
- source_word: שִׁשָּׁה עָשָׂר
  english_pob_choice: the sixteenth
  chosen_spanish: el decimosexto
  alternatives_spanish:
  - dieciséis
  - la decimosexta suerte
  - el dieciséis
  lexicon: HALOT
  rationale: La forma hebrea es cardinal en apariencia, pero el contexto exige valor ordinal. «El decimosexto» mantiene la secuencia numérica y la naturalidad del español.
