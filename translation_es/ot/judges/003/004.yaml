translation:
  language: es
  text: Y ellos estuvieron allí para probar a Israel[a], para saber si escucharían los mandamientos de Yahvé[b][c], que él mandó a sus padres por medio de Moisés.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «para probar a Israel por medio de ellos». El hebreo incluye explícitamente «por medio de ellos», refiriéndose a las naciones que quedaron en la tierra como el medio de la prueba.'
    reason: lexical_alternative
  - marker: b
    text: Aquí «escucharían» tiene el sentido de prestar atención con obediencia; es decir, obedecer los mandamientos de Yahvé.
    reason: lexical_alternative
  - marker: c
    text: 'Hebreo: «sus padres»; es decir, sus antepasados o forefathers.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּהְיוּ
  english_pob_choice: And they were there
  chosen_spanish: Y ellos estuvieron allí
  alternatives_spanish:
  - Y ellos estaban allí
  - Y permanecieron allí
  lexicon: HALOT
  rationale: El hebreo expresa continuidad de presencia en el contexto de los pueblos dejados en la tierra. 'Estuvieron allí' comunica esa presencia situada de forma natural en español sin perder el valor aspectual del verbo.
- source_word: לְנַסּוֹת
  english_pob_choice: to test
  chosen_spanish: para probar
  alternatives_spanish:
  - para testar
  - para examinar
  lexicon: HALOT
  rationale: '''נסה'' aquí tiene el sentido de someter a prueba. En español, ''probar'' es natural y conserva la idea de un examen de fidelidad sin sugerir tentación al mal.'
- source_word: בָּם
  english_pob_choice: through them
  chosen_spanish: a Israel[a]
  alternatives_spanish:
  - por medio de ellos
  - mediante ellos
  lexicon: HALOT
  rationale: 'El hebreo incluye el pronombre instrumental ''en/por medio de ellos''. En español lo integro en la nota textual, mientras el cuerpo mantiene una sintaxis fluida: los pueblos quedaron como medio de prueba para Israel.'
- source_word: לָדַעַת
  english_pob_choice: to know
  chosen_spanish: para saber
  alternatives_spanish:
  - para conocer
  - para llegar a saber
  lexicon: HALOT
  rationale: '''לדעת'' expresa el propósito/resultante de la prueba. ''Para saber'' conserva el valor de averiguar o constatar sin sobreinterpretarlo.'
- source_word: הֲיִשְׁמְעוּ
  english_pob_choice: they would listen to
  chosen_spanish: si obedecerían
  alternatives_spanish:
  - si escucharían
  - si prestarían atención a
  lexicon: HALOT
  rationale: Con mandamientos, 'שמע' implica oír con obediencia. En español, 'obedecerían' comunica directamente la fuerza contextual; la alternativa más literal se preserva en la nota de sentido.
- source_word: מִצְוֺת
  english_pob_choice: the commandments
  chosen_spanish: los mandamientos
  alternatives_spanish:
  - los preceptos
  - las órdenes
  lexicon: HALOT
  rationale: '''מצוות'' se traduce con el término bíblico estándar ''mandamientos'', que conserva el carácter pactal y normativo del texto.'
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  lexicon: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
  rationale: 'Se sigue el estándar español del proyecto para el nombre divino: ''Yahvé''. Es la forma esperable en español bíblico y mantiene la transliteración del Nombre propio.'
- source_word: אֲשֶׁר צִוָּה
  english_pob_choice: which he commanded
  chosen_spanish: que él había mandado
  alternatives_spanish:
  - que él mandó
  - que había ordenado
  lexicon: HALOT
  rationale: La relativa hebrea presenta el antecedente de 'mandamientos'. 'Había mandado' reproduce con claridad el valor anterior al momento narrativo y el tono normativo del verbo.
- source_word: אֲבוֹתָם
  english_pob_choice: their fathers
  chosen_spanish: a sus padres
  alternatives_spanish:
  - a sus antepasados
  - a sus padres y mayores
  lexicon: HALOT
  rationale: El hebreo dice literalmente 'sus padres', es decir, sus antepasados varones. En español 'padres' mantiene la forma del original; la nota puede aclarar el sentido genealógico.
- source_word: בְּיַד מֹשֶׁה
  english_pob_choice: through Moses
  chosen_spanish: por medio de Moisés
  alternatives_spanish:
  - por la mano de Moisés
  - mediante Moisés
  lexicon: HALOT
  rationale: La expresión idiomática 'por la mano de' indica mediación/agency. 'Por medio de Moisés' es la forma más clara y fiel en español moderno.
theological_decisions:
- issue: Propósito del dejar a las naciones en la tierra
  english_pob_reading: The remaining nations served as a means by which Israel was tested regarding covenant obedience.
  chosen_spanish_reading: Las naciones quedaron como medio para probar a Israel respecto de su obediencia.
  alternative_spanish_readings:
  - Las naciones quedaron solo como dato histórico, sin propósito teológico explícito.
  - Las naciones fueron puestas para tentar a Israel.
  rationale: Los infinitivos finales del hebreo expresan propósito. La redacción española preserva esa intención teológica sin convertirla en una afirmación de tentación moral, que el texto no exige.
  doctrine_reference: Preservar la tensión teológica del texto; no confundir prueba con tentación.
- issue: Sentido de שׁמע con mandamientos
  english_pob_reading: ‘Listen to’ here carries the sense of heeding or obeying the LORD’s commandments.
  chosen_spanish_reading: ‘Escuchar’ aquí se entiende como obedecer.
  alternative_spanish_readings:
  - Escuchar
  - Oír
  rationale: Con mandamientos, el verbo hebreo implica obediencia atenta. En español conviene explicitar ese valor para que el lector no lo reduzca a percepción auditiva.
  doctrine_reference: Principio lexical-contextual de שׁמע en contextos de pacto/mandato.
- issue: Nombre divino יהוה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  rationale: Se conserva el Nombre propio del pacto conforme al estándar del proyecto y a la práctica habitual en español bíblico académico y eclesial.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יהוה / YHWH → Yahvé'
translation_notes:
  revision_awareness: El borrador sigue de cerca el trazado del inglés auditado, pero ajusta la sintaxis al español para que la relación entre prueba, obediencia y mediación de Moisés quede clara y natural. Se conserva la tensión lexical de שׁמע y el valor instrumental de בָּם, explicitado en nota.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' para יהוה conforme al estándar del proyecto.
  - Se usa 'mandamientos' en lugar de variantes más débiles como 'instrucciones' o 'preceptos', porque el contexto es covenantal y normativo.
  - Se traduce 'שמע' de forma contextual como 'obedecer' en el cuerpo, con nota que recuerda el sentido de 'escuchar'.
  - Se conserva 'padres' como forma fiel al hebreo, aclarando su referencia a antepasados en nota.
  - La construcción 'por medio de Moisés' transmite la mediación del hebreo בְּיַד sin calco rígido.
