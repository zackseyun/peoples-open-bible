review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador conserva en general la estructura y el sentido legal del hebreo: Yahvé toma dos porciones específicas del sacrificio de paz de los hijos de Israel y las da a Aarón y a sus hijos como estatuto duradero. Sin embargo, hay varios desajustes con el expediente inglés y con la precisión léxica del hebreo: שׁוֹק se documentó como ''thigh'' y en español conviene ''muslo'' más que ''pierna''; תְּרוּמָה fue tratada en la nota equivocada y la anotación de שְׁלָמִים quedó invertida; además, ''de entre'' sobrerrepresenta מֵאֵת, que aquí es simplemente fuente/origen legal (''de'').'
  spanish_quality_summary: 'El español es legible y digno, pero algunas elecciones suenan menos precisas o algo pesadas: ''pierna'' pierde especificidad anatómica; ''de entre los hijos de Israel'' repetido dos veces no suena tan natural ni refleja bien el hebreo; y la secuencia de notas [c][b] con contenidos cruzados crea confusión. ''Pecho de la ofrenda mecida'' y ''estatuto perpetuo'' funcionan bien.'
  glossary_alignment: Buena alineación con 'los hijos de Israel' y 'ofrendas de paz'. No hay términos de proyecto conflictivos como Yahvé/Mesías. Sí hace falta alinear mejor con la decisión auditada para תְּרוּמָה ('contribución' con nota alternativa 'ofrenda alzada/heave offering') y con שׁוֹק ('muslo').
  issues:
  - severity: high
    issue: Las notas b y c están invertidas respecto de sus anclajes en el texto.
    rationale: En el texto '[a]' sigue a 'contribución', y '[c][b]' sigue a 'ofrendas de paz'. Pero la nota b habla de 'ofrendas de comunión' (שְׁלָמִים) y la nota c dice 'ofrendas de paz', que no es alternativa sino repetición del texto. Esto no preserva el aparato del POB inglés.
  - severity: medium
    issue: '''pierna'' para שׁוֹק es menos fiel que ''muslo''.'
    rationale: El expediente inglés justificó 'thigh' por precisión anatómica en contexto sacrificial. En español, 'muslo' corresponde mejor a esa misma precisión; 'pierna' es demasiado amplio.
  - severity: medium
    issue: '''de entre los hijos de Israel'' exagera el matiz de מֵאֵת.'
    rationale: La preposición hebrea aquí marca procedencia/fuente legal, no selección 'de entre'. 'De los hijos de Israel' o 'de parte de los hijos de Israel' es más fiel y natural.
  - severity: low
    issue: La nota c actual no ofrece una alternativa real.
    rationale: Decir 'O “ofrendas de paz”' cuando el texto ya tiene 'ofrendas de paz' no aporta información útil y rompe la lógica de notas alternativas.
  revised_spanish_text: Porque he tomado el pecho de la ofrenda mecida y el muslo de la contribución[a] de los hijos de Israel, de los sacrificios de sus ofrendas de paz[b][c], y se los he dado a Aarón el sacerdote y a sus hijos como estatuto perpetuo de los hijos de Israel.
  revised_footnotes:
