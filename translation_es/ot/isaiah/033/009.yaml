    rationale: El hebreo נֹעֵר aquí se entiende, como documenta el POB, en el sentido de que su follaje es sacudido/desprendido. Una formulación como «quedan despojados de sus hojas» o «pierden sus hojas» comunica mejor la imagen en español.
