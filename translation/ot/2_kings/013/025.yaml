id: 2KI.13.25
reference: 2 Kings 13:25
source:
  edition: WLC
  text: וַ/יָּ֜שָׁב יְהוֹאָ֣שׁ בֶּן יְהוֹאָחָ֗ז וַ/יִּקַּ֤ח אֶת הֶֽ/עָרִים֙ מִ/יַּד֙ בֶּן הֲדַ֣ד בֶּן חֲזָאֵ֔ל אֲשֶׁ֣ר לָקַ֗ח מִ/יַּ֛ד יְהוֹאָחָ֥ז אָבִ֖י/ו בַּ/מִּלְחָמָ֑ה שָׁלֹ֤שׁ פְּעָמִים֙ הִכָּ֣/הוּ יוֹאָ֔שׁ וַ/יָּ֖שֶׁב אֶת עָרֵ֥י יִשְׂרָאֵֽל־־־־־׃פ
translation:
  text: Then Jehoash son of Jehoahaz regained and took back the cities from the hand of Ben-hadad son of Hazael[a], which he had taken from the hand of Jehoahaz his father in war. Three times Joash struck him[b], and he restored the cities of Israel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew uses two forms of the same royal name in this verse: ''Jehoash'' earlier and ''Joash'' later.'
    reason: lexical_alternative
  - marker: b
    text: Or 'defeated him.' The Hebrew verb can denote striking in battle with the sense of military defeat.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּשָׁב
  chosen: regained
  alternatives:
  - returned
  - turned back
  - restored
  lexicon: HALOT
  rationale: From שוב in context of recovering what had been lost. 'Regained' fits the military-political sense here and avoids confusion with the later וַיָּשֶׁב, which more specifically means 'restored.'
- source_word: וַיִּקַּח
  chosen: took back
  alternatives:
  - took
  - captured
  - recovered
  lexicon: HALOT
  rationale: לקח is literally 'took,' but in this context of recovering previously lost cities, 'took back' makes the sense explicit without over-paraphrasing.
- source_word: הֶעָרִים
  chosen: the cities
  alternatives:
  - the towns
  lexicon: HALOT
  rationale: Standard rendering of ערים; 'cities' is conventional and suitable for fortified population centers in this historical context.
- source_word: מִיַּד
  chosen: from the hand of
  alternatives:
  - from
  - out of the power of
  lexicon: HALOT
  rationale: The idiom literally means 'from the hand of.' It is preserved here for transparency and because it remains natural enough in English historical narrative.
- source_word: בֶּן־הֲדַד
  chosen: Ben-hadad
  alternatives:
  - Benhadad
  rationale: Personal names are transliterated by standard conventions per translation philosophy.
- source_word: אֲשֶׁר לָקַח
  chosen: which he had taken
  alternatives:
  - that he took
  lexicon: HALOT
  rationale: Pluperfect sense in English best reflects the prior action relative to Jehoash's recovery of the cities.
- source_word: אָבִיו
  chosen: his father
  lexicon: HALOT
  rationale: Straightforward filial reference; the pronoun most naturally refers to Jehoash, i.e., Jehoahaz was his father.
- source_word: בַּמִּלְחָמָה
  chosen: in war
  alternatives:
  - in battle
  - in the war
  lexicon: HALOT
  rationale: The singular with article can be rendered generically. 'In war' is concise and natural, indicating the military context of the earlier loss.
- source_word: שָׁלֹשׁ פְּעָמִים
  chosen: Three times
  alternatives:
  - thrice
  lexicon: HALOT
  rationale: Natural modern English rendering of the numerical idiom.
- source_word: הִכָּהוּ
  chosen: struck him down
  alternatives:
  - defeated him
  - struck him
  - beat him
  lexicon: HALOT
  rationale: נכה often denotes striking/defeating in battle. 'Struck him down' preserves the martial force while allowing for repeated military defeats rather than necessarily a single lethal blow.
- source_word: יוֹאָשׁ
  chosen: Joash
  alternatives:
  - Jehoash
  rationale: The verse uses the shorter form יוֹאָשׁ here, though earlier it has יְהוֹאָשׁ. Rendering the final occurrence as 'Joash' reflects the Hebrew form actually present while preserving the identity of the same king.
- source_word: וַיָּשֶׁב
  chosen: restored
  alternatives:
  - returned
  - brought back
  lexicon: HALOT
  rationale: Here שוב governs 'the cities of Israel' and denotes restoration to Israelite control. 'Restored' is the clearest English equivalent.
- source_word: עָרֵי יִשְׂרָאֵל
  chosen: the cities of Israel
  alternatives:
  - Israel's cities
  lexicon: HALOT
  rationale: Construct phrase rendered transparently; it refers to the cities belonging to Israel that had been lost and were now restored.
