translation:
  language: es
  text: 'Y los hijos de Gad: Zifión[a], Haggi, Shuni, Ezbón, Eri, Arodi y Areli.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El hebreo צִפְיוֹן se traduce aquí como Zifión; muchas versiones en inglés usan Zephon, reflejando una forma tradicional variante también asociada con Números 26:15.
    reason: alternative_reading
lexical_decisions:
- source_word: וּבְנֵי
  english_pob_choice: And the sons of
  chosen_spanish: Y los hijos de
  alternatives_spanish:
  - Y los niños de
  - Ahora los hijos de
  lexicon: HALOT
  rationale: En listas genealógicas, בְּנֵי se expresa de forma natural y precisa como «hijos de». El hebreo conserva la estructura enumerativa con la conjunción inicial, por lo que «Y» mantiene la continuidad de la lista.
- source_word: גָד
  english_pob_choice: Gad
  chosen_spanish: Gad
  lexicon: HALOT
  rationale: Nombre propio transliterado de manera estándar en español bíblico.
- source_word: צִפְיוֹן
  english_pob_choice: Ziphion
  chosen_spanish: Zifión
  alternatives_spanish:
  - Zefón
  lexicon: HALOT
  rationale: Se conserva la forma del texto hebreo masorético con transliteración española más natural fonéticamente. La variante tradicional «Zefón» refleja una forma relacionada y aparece en otras tradiciones textuales, por eso se indica como alternativa.
- source_word: וְחַגִּי
  english_pob_choice: Haggi
  chosen_spanish: Haggi
  lexicon: HALOT
  rationale: Nombre propio transliterado directamente; la grafía española conserva la aspiración implícita de la forma inglesa sin forzar una adaptación innecesaria.
- source_word: שׁוּנִי
  english_pob_choice: Shuni
  chosen_spanish: Shuni
  lexicon: HALOT
  rationale: Nombre propio transliterado de forma directa y reconocible para el lector español.
- source_word: וְאֶצְבֹּן
  english_pob_choice: Ezbon
  chosen_spanish: Ezbón
  alternatives_spanish:
  - Ezbun
  lexicon: HALOT
  rationale: Se translitera el nombre según la forma hebrea del versículo; en español se marca el acento prosódico para favorecer la lectura. «Ezbun» es una posible variante vocal.
- source_word: עֵרִי
  english_pob_choice: Eri
  chosen_spanish: Eri
  lexicon: HALOT
  rationale: Nombre propio transliterado directamente, sin necesidad de adaptación adicional.
- source_word: וַאֲרוֹדִי
  english_pob_choice: Arodi
  chosen_spanish: Arodi
  lexicon: HALOT
  rationale: Nombre propio transliterado directamente; la conjunción hebrea se integra en la enumeración española mediante la coma y la «y» final.
- source_word: וְאַרְאֵלִי
  english_pob_choice: Areli
  chosen_spanish: Areli
  lexicon: HALOT
  rationale: Nombre propio transliterado directamente desde la forma hebrea masorética.
translation_notes:
  revision_awareness: El borrador sigue de cerca el texto hebreo masorético y el audit trail en inglés. No hay revisiones aplicadas en el expediente; por eso se conserva la lista genealógica simple, sin expansión interpretativa.
  spanish_consistency_notes:
  - Se mantiene «hijos de» para la fórmula genealógica, en línea con el valor directo de בְּנֵי.
  - Los nombres propios se transliteran con ortografía española legible, evitando traducir o normalizar más allá de lo que el hebreo permite.
  - La nota sobre צִפְיוֹן preserva la tensión entre la forma masorética y la variante tradicional, sin resolverla por supresión.
