    issue: «los altos del pueblo» para בָּמֳתֵי עָם
    rationale: El expediente inglés y la evidencia fuente toman מותי como «muertos / muertos del pueblo», no «altos». La lectura del borrador altera el referente y pierde la imagen concreta de los muertos.
  - severity: medium
    issue: «No te creas entre» para אַל תַּחְשׁוֹבְךָ
    rationale: Aunque intenta un sentido reflexivo, en español suena extraño y puede implicar arrogancia o imaginación, no «contarte/considerarte entre» una categoría.
  - severity: medium
    issue: «el pasar no pasará» es demasiado opaco
    rationale: Preserva forma, pero no comunica bien en español el sentido auditado de que el morir o la mortalidad no pasa por alto a nadie. Debe retenerse algo de la repetición verbal, idealmente apoyada por nota.
  revised_spanish_text: No te cuentes entre los muertos del pueblo; recuerda que el morir[a] no pasará de largo.[b]
