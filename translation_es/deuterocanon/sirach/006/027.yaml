review_pass:
  verdict: revise
  source_alignment_summary: El borrador refleja bien la secuencia hebrea de búsqueda y la personificación femenina de la sabiduría, y conserva correctamente en nota la variante griega. Sin embargo, en וּמְצָא el texto fuente y la decisión inglesa privilegian una secuencia imperativa («y encuentra / y halla»), mientras que el español draft cambia el valor a futuro («y encontrarás»), acercándose innecesariamente al matiz griego de resultado.
  spanish_quality_summary: El español es claro, natural y digno. «Aférrate a ella, y no la sueltes» funciona muy bien. La mejora necesaria es hacer coincidir más estrechamente la fuerza verbal del hebreo en la cláusula «busca, y halla», sin perder legibilidad.
  glossary_alignment: No hay conflictos con la terminología base del proyecto. La personificación femenina se mantiene correctamente con «ella/la». La nota textual está bien orientada. El único ajuste es lexical-sintáctico en וּמְצָא para respetar la opción principal documentada.
  issues:
  - severity: medium
    issue: «y encontrarás» introduce un futuro donde el hebreo base fue tratado como imperativo secuencial
    rationale: La auditoría inglesa documenta explícitamente que el texto principal sigue el hebreo «seek, and find», no el giro griego «it will become known to you». En español, «y encontrarás» desplaza el sentido hacia resultado/promesa y debilita la decisión textual principal.
  - severity: low
    issue: La nota está anclada al final del versículo en vez de en la cláusula afectada
    rationale: No es incorrecto, pero el lector entiende mejor la variante textual si el marcador aparece junto a «halla/encuentra», donde ocurre la divergencia entre hebreo y griego.
  revised_spanish_text: Busca con diligencia y examina; busca[a], y halla. Aférrate a ella, y no la sueltes.
  revised_footnotes:
  - marker: a
    text: 'Paralelo griego: «busca, y se te dará a conocer». El testimonio hebreo lee más directamente: «busca, y halla».'
    reason: alternative_reading
  revision_rationale: Se ajusta «y encontrarás» a «y halla» para seguir con mayor fidelidad la secuencia imperativa del hebreo y la decisión principal del POB. También se mueve el marcador de nota a la cláusula donde está la variante griega, mejorando precisión editorial sin cambiar el contenido de la nota.
