id: 1TH.3.7
reference: 1 Thessalonians 3:7
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: διὰ τοῦτο παρεκλήθημεν, ἀδελφοί, ἐφ’ ὑμῖν ἐπὶ πάσῃ τῇ ⸂ἀνάγκῃ καὶ θλίψει⸃ ἡμῶν διὰ τῆς ὑμῶν πίστεως,
base_translation:
  language: en
  yaml_path: translation/nt/1_thessalonians/003/007.yaml
  text: For this reason[a], brothers, concerning you, in all our distress and affliction[b], we were comforted through your faith.
  footnotes:
  - marker: a
    text: Or 'through your faithfulness.' The Greek word pistis can denote faith, trust, or faithfulness; here it likely includes the sense of steadfastness in the Thessalonians' continued belief.
    reason: alternative_reading
  - marker: b
    text: '"Brothers" is Paul''s customary form of address to the congregation and may include the whole believing community.'
    reason: cultural_note
translation:
  language: ko
  text: 그러므로 형제[b] 여러분, 우리는 우리의 모든 곤경과 환난 가운데서 여러분과 여러분의 믿음[a]을 통해 위로를 받았습니다.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 또는 「여러분의 신실함을 통해」. 헬라어 πίστις는 본 문맥에서 데살로니가 신자들의 지속적 믿음의 견고함을 함께 담는다.
    reason: alternative_reading
  - marker: b
    text: 「형제」는 바울이 공동체 전체를 부르는 통상적 호칭으로, 전 신앙 공동체를 포함할 수 있다.
    reason: cultural_note
lexical_decisions:
- source_word: παρεκλήθημεν
  english_pob_choice: were comforted
  chosen_korean: 위로를 받았습니다
  alternatives_korean:
  - 격려를 받았습니다
  - 힘을 얻었습니다
  lexicon: BDAG
  rationale: παρακαλέω의 수동. 본 문맥은 곤경 가운데 받은 위로이므로 「위로를 받다」가 가장 자연스럽다.
- source_word: ἐφ’ ὑμῖν
  english_pob_choice: concerning you
  chosen_korean: 여러분과
  alternatives_korean:
  - 여러분에 관하여
  - 여러분 때문에
  lexicon: BDAG
  rationale: ἐπί + 여격은 위로의 대상·기초를 가리킨다. 본문 흐름에서는 「여러분」 자체가 위로의 근거이므로 「여러분과 ... 통해」로 자연스럽게 묶는다.
- source_word: ἐπὶ πάσῃ τῇ ἀνάγκῃ καὶ θλίψει ἡμῶν
  english_pob_choice: in all our distress and affliction
  chosen_korean: 우리의 모든 곤경과 환난 가운데서
  alternatives_korean:
  - 우리의 모든 어려움과 환난 가운데
  - 우리의 모든 압박과 고난 가운데
  lexicon: BDAG
  rationale: ἀνάγκη(곤경·필연적 압박)과 θλῖψις(환난)을 「곤경과 환난」으로 구분한다.
- source_word: διὰ τῆς ὑμῶν πίστεως
  english_pob_choice: through your faith
  chosen_korean: 여러분의 믿음을 통해
  alternatives_korean:
  - 여러분의 신실함을 통해
  - 여러분의 믿음으로 인하여
  lexicon: BDAG
  rationale: διά + 속격의 「~을 통해」 의미. 「믿음」이 본 번역의 기본값.
