translation:
  language: es
  text: 'Entonces Absalón envió espías por todas las tribus de Israel, diciendo: «Cuando oigan el sonido del cuerno[a], entonces dirán: “Absalón reina en Hebrón”».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, más específicamente, «el sonido del shofar» o «del cuerno de carnero».
    reason: cultural_note
lexical_decisions:
- source_word: וַיִּשְׁלַח
  english_pob_choice: Then ... sent
  chosen_spanish: Entonces ... envió
  alternatives_spanish:
  - Y ... envió
  lexicon: HALOT
  rationale: La forma waw-consecutiva avanza la narración. «Entonces» comunica bien la secuencia narrativa en español y conserva el valor discursivo del texto.
- source_word: מְרַגְּלִים
  english_pob_choice: spies
  chosen_spanish: espías
  alternatives_spanish:
  - mensajeros
  - exploradores
  lexicon: HALOT
  rationale: El participio nominal de רגל suele denotar espías o agentes secretos. Aquí el contexto de una maniobra encubierta favorece «espías».
- source_word: בְּכָל שִׁבְטֵי יִשְׂרָאֵל
  english_pob_choice: throughout all the tribes of Israel
  chosen_spanish: por todas las tribus de Israel
  alternatives_spanish:
  - entre todas las tribus de Israel
  - en todas las tribus de Israel
  lexicon: HALOT
  rationale: El hebreo indica distribución amplia a través de los territorios/agrupaciones tribales. «Por todas las tribus de Israel» suena natural y conserva la extensión geográfica y social.
- source_word: כְּשָׁמְעֲכֶם
  english_pob_choice: When you hear
  chosen_spanish: Cuando oigan
  alternatives_spanish:
  - Al oír
  - En cuanto oigan
  lexicon: HALOT
  rationale: La construcción marca el momento de la respuesta mandada. «Cuando oigan» es fiel y natural; no intensifica indebidamente la inmediatez como haría «en cuanto».
- source_word: קוֹל הַשֹּׁפָר
  english_pob_choice: the sound of the trumpet
  chosen_spanish: el sonido del cuerno
  alternatives_spanish:
  - el sonido de la trompeta
  - el sonido del shofar
  lexicon: HALOT
  rationale: שׁוֹפָר es específicamente un cuerno, a menudo de carnero. «Cuerno» preserva la concreción del objeto; «trompeta» sería más genérico y «shofar» requeriría una nota para lectores no familiarizados.
- source_word: וַאֲמַרְתֶּם
  english_pob_choice: then say
  chosen_spanish: entonces dirán
  alternatives_spanish:
  - y dirán
  - dirán
  lexicon: HALOT
  rationale: La respuesta ordenada sigue al sonido de la señal. «Entonces dirán» mantiene la secuencia y el carácter imperativo indirecto del hebreo.
- source_word: מָלַךְ אַבְשָׁלוֹם
  english_pob_choice: Absalom reigns
  chosen_spanish: Absalón reina
  alternatives_spanish:
  - Absalón es rey
  - Absalón ha llegado a ser rey
  - Absalón ha reinado
  lexicon: HALOT
  rationale: El verbo perfecto funciona aquí como proclamación de hecho real/político. «Reina» reproduce con sobriedad la fórmula de anuncio sin añadir la pasiva ni forzar una perífrasis.
- source_word: בְּחֶבְרוֹן
  english_pob_choice: in Hebron
  chosen_spanish: en Hebrón
  alternatives_spanish:
  - en Hebron
  - en la ciudad de Hebrón
  lexicon: HALOT
  rationale: 'La preposición es locativa. Se mantiene el nombre propio con acento españolizado habitual: «Hebrón».'
theological_decisions:
- issue: La señal del cuerno/shofar
  english_pob_reading: the sound of the trumpet, with a footnote noting the shofar or ram's horn
  chosen_spanish_reading: el sonido del cuerno, con nota que precisa que se trata del cuerno de shofar o de carnero
  alternative_spanish_readings:
  - el sonido de la trompeta
  - el sonido del shofar
  rationale: El hebreo שׁוֹפָר nombra un instrumento de cuerno, no la trompeta moderna. Mantener «cuerno» en el texto principal y explicar la opción cultural en nota preserva la precisión lexical sin perder inteligibilidad.
  doctrine_reference: Precisión semántica del término hebreo; sin implicación doctrinal.
translation_notes:
  revision_awareness: Esta versión sigue la revisión más reciente del audit trail inglés, que prefirió una formulación simple para la proclamación final («reigns») y mantuvo la temporalidad marcada por «When». En español, por naturalidad y fidelidad, se tradujo ese cierre como «Absalón reina en Hebrón», sin agregar matices de estado resultante no explícitos en el hebreo.
  spanish_consistency_notes:
  - Se usó «Absalón» y «Hebrón» con acentuación española consistente.
  - Se evitó «SEÑOR» u այլ sustitutos; no aplica aquí porque no aparece el nombre divino.
  - «Espías» conserva el matiz clandestino documentado en el contexto.
  - La nota al pie queda anclada en «Israel[a]» para preservar el aviso cultural sobre שׁוֹפָר.
