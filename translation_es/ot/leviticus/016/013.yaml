    text: El Nombre divino hebreo יְהוָה se traduce aquí como «Yahvé» conforme al estándar del proyecto.
    reason: source_note
  - marker: b
    text: O «asiento de misericordia». El término hebreo designa la cubierta del arca, especialmente en su función dentro de los ritos de expiación.
    reason: lexical_alternative
  revision_rationale: 'Se mantiene la traducción sustancial del borrador, pero se corrigen dos puntos menores: la cláusula final se ajusta a «para que no muera» para reflejar mejor la finalidad protectora del hebreo, y la nota léxica se adapta al español reemplazando la alternativa inglesa por una alternativa española inteligible para el lector meta.'
