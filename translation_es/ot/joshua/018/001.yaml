translation:
  language: es
  text: Entonces toda la congregación de los hijos de Israel[a] se reunió en Silo y estableció allí la tienda de reunión, y la tierra fue sometida delante de ellos[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'los israelitas' o tradicionalmente 'los hijos de Israel'. El hebreo dice literalmente 'los hijos de Israel'.
    reason: lexical_alternative
  - marker: b
    text: O 'la tierra fue conquistada delante de ellos'.
    reason: alternative_reading
lexical_decisions:
- source_word: וַיִּקָּהֲלוּ
  english_pob_choice: assembled
  chosen_spanish: se reunió
  alternatives_spanish:
  - se congregó
  - se juntó
  lexicon: HALOT
  rationale: El verbo de קהל expresa una reunión corporativa de la asamblea. En español, 'se reunió' comunica con naturalidad esa acción colectiva y mantiene el sentido formal sin sonar forzado.
- source_word: כָּל עֲדַת
  english_pob_choice: the whole congregation
  chosen_spanish: toda la congregación
  alternatives_spanish:
  - toda la asamblea
  - la congregación entera
  lexicon: HALOT
  rationale: עֵדָה designa la comunidad reunida; 'congregación' preserva el valor colectivo y 'toda' refleja כָּל.
- source_word: בְּנֵי יִשְׂרָאֵל
  english_pob_choice: the sons of Israel
  chosen_spanish: los hijos de Israel
  alternatives_spanish:
  - los israelitas
  - los hijos del pueblo de Israel
  lexicon: HALOT
  rationale: Se conserva la forma masculina y genealógica del hebreo. 'Hijos de Israel' es comprensible en español bíblico y evita neutralizar la expresión sin base textual.
- source_word: שִׁלֹה
  english_pob_choice: Shiloh
  chosen_spanish: Silo
  alternatives_spanish:
  - Siloé
  lexicon: HALOT
  rationale: Es un nombre propio de lugar; en español bíblico, 'Silo' es la forma usual y transparente para esta localidad.
- source_word: וַיַּשְׁכִּינוּ
  english_pob_choice: set up
  chosen_spanish: establecieron
  alternatives_spanish:
  - hicieron morar
  - levantaron
  - pusieron
  lexicon: HALOT
  rationale: El hifil de שכן con 'tienda de reunión' como objeto puede sonar artificial si se traduce literalmente como 'hicieron morar'. 'Establecieron' recoge la idea de fijar o instalar la tienda en ese lugar.
- source_word: אֹהֶל מוֹעֵד
  english_pob_choice: the tent of meeting
  chosen_spanish: la tienda de reunión
  alternatives_spanish:
  - el tabernáculo
  - la tienda del encuentro
  lexicon: HALOT
  rationale: Se mantiene la frase hebrea de manera bastante directa. 'Tienda de reunión' es fiel y clara; 'tabernáculo' sería más tradicional pero menos transparente al hebreo.
- source_word: נִכְבְּשָׁה
  english_pob_choice: was subdued
  chosen_spanish: fue sometida
  alternatives_spanish:
  - fue conquistada
  - quedó sujeta
  lexicon: HALOT
  rationale: El pasivo de כבשׁ indica dominación/sometimiento. 'Fue sometida' conserva la idea de control efectivo sin afirmar más de lo que el texto exige.
- source_word: לִפְנֵיהֶם
  english_pob_choice: before them
  chosen_spanish: delante de ellos
  alternatives_spanish:
  - ante ellos
  - en su presencia
  lexicon: HALOT
  rationale: La locución idiomática se rinde de forma natural con 'delante de ellos', manteniendo la relación espacial/figurada del hebreo sin reinterpretarla.
theological_decisions:
- issue: Designación corporativa de Israel
  english_pob_reading: the sons of Israel
  chosen_spanish_reading: los hijos de Israel
  alternative_spanish_readings:
  - los israelitas
  - los hijos del pueblo de Israel
  rationale: Se conserva la forma masculina del original por fidelidad gramatical y por coherencia con la filosofía de traducción del POB. No hay necesidad doctrinal de neutralizar la expresión.
  doctrine_reference: DOCTRINE.md Translation philosophy §4
- issue: Alcance de נִכְבְּשָׁה
  english_pob_reading: the land was subdued before them
  chosen_spanish_reading: la tierra fue sometida delante de ellos
  alternative_spanish_readings:
  - la tierra fue conquistada delante de ellos
  - la tierra quedó sometida ante ellos
  rationale: '''Sometida'' refleja mejor el matiz de subordinación/control que el pasivo de כבשׁ puede expresar. Así se evita sobreafirmar una conquista total que el contexto narrativo amplio de Josué no presupone necesariamente.'
  doctrine_reference: DOCTRINE.md Translation philosophy §1, §3
translation_notes:
  revision_awareness: El texto base en inglés y el informe de revisión reciente indican que no se requieren cambios respecto al borrador acordado; se mantiene la misma solución lexical y teológica, con ajuste idiomático natural al español.
  spanish_consistency_notes:
  - Se preserva la distinción entre 'hijos de Israel' y una neutralización genérica moderna.
  - '''Tienda de reunión'' mantiene la transparencia del hebreo אֹהֶל מוֹעֵד.'
  - '''Fue sometida'' conserva el matiz pasivo de כבשׁ sin cerrar el sentido a una conquista total absoluta.'
  - La puntuación y la sintaxis siguen un español bíblico moderno, claro y publicable.
