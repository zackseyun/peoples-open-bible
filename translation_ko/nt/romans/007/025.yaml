  text: Thanks be to God through Jesus Messiah our Lord! So then[a], I myself serve the law of God with my mind[c][b], but with my flesh the law of sin.
translation:
  language: ko
  text: 우리 주 메시아 예수를 통해 하나님께 감사드립니다! 그러므로 나 자신은 마음으로는 하나님의 율법을 섬기고, 육체로는 죄의 법을 섬깁니다.
