translation:
  language: es
  text: Así que hagan imágenes de sus tumores[a] y imágenes de sus ratones que están devastando la tierra, y den gloria al Dios de Israel. Quizá él aligere su mano de encima de ustedes, de encima de sus dioses y de encima de su tierra.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «hemorroides». El hebreo se refiere a hinchazones o tumores corporales; la traducción tradicional más específica es posible, pero no segura.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַעֲשִׂיתֶם
  english_pob_choice: So make
  chosen_spanish: Así que hagan
  alternatives_spanish:
  - Y hagan
  - Entonces hagan
  lexicon: HALOT
  rationale: 'El valor consecutivo e imperativo del wayyiqtol 2mp se expresa en español con una instrucción enlazada al contexto: «Así que hagan» conserva la consecuencia sin sonar forzado.'
- source_word: צַלְמֵי
  english_pob_choice: images of
  chosen_spanish: imágenes de
  alternatives_spanish:
  - figuras de
  - representaciones de
  lexicon: HALOT
  rationale: צֶלֶם/צַלְמֵי designa una imagen o representación; «imágenes de» es natural y fiel en español.
- source_word: עפלי/כם
  english_pob_choice: your tumors
  chosen_spanish: sus tumores
  alternatives_spanish:
  - sus hinchazones
  - sus hemorroides
  lexicon: HALOT
  rationale: El término hebreo apunta a una afección corporal con sentido amplio. «Tumores» conserva la ambigüedad médica sin precisar más de lo que el hebreo garantiza. Se mantiene la tensión con la alternativa tradicional, pero no se adopta como principal por falta de certeza.
- source_word: וְצַלְמֵי עַכְבְּרֵי/כֶם
  english_pob_choice: and images of your mice
  chosen_spanish: e imágenes de sus ratones
  alternatives_spanish:
  - e imágenes de sus ratas
  - e imágenes de sus roedores
  lexicon: HALOT
  rationale: עכבר puede referirse a ratones o, en sentido amplio, a roedores. «Ratones» sigue la opción estándar y es claro en español.
- source_word: הַמַּשְׁחִיתִם אֶת הָאָרֶץ
  english_pob_choice: that are ravaging the land
  chosen_spanish: que están devastando la tierra
  alternatives_spanish:
  - que están destruyendo la tierra
  - que arrasan la tierra
  lexicon: HALOT
  rationale: El participio expresa acción continua y dañina. «Devastando» comunica con naturalidad el matiz de ruina activa y conserva el aspecto durativo.
- source_word: וּנְתַתֶּם ... כָּבוֹד
  english_pob_choice: and give glory
  chosen_spanish: y den gloria
  alternatives_spanish:
  - y rindan honra
  - y den honra
  lexicon: HALOT
  rationale: כבוד aquí implica reconocer públicamente la gloria/peso honorífico debido a Dios. «Dar gloria» es una expresión bíblica idiomática y fiel.
- source_word: לֵאלֹהֵי יִשְׂרָאֵל
  english_pob_choice: to the God of Israel
  chosen_spanish: al Dios de Israel
  alternatives_spanish:
  - al Dios de Israel
  - para el Dios de Israel
  lexicon: HALOT
  rationale: La construcción señala el destinatario del homenaje ofrecido; «al Dios de Israel» es la formulación directa y natural en español.
- source_word: אוּלַי
  english_pob_choice: Perhaps
  chosen_spanish: Quizá
  alternatives_spanish:
  - Tal vez
  - Puede ser que
  lexicon: HALOT
  rationale: Expresa posibilidad esperanzada. «Quizá» mantiene el tono sobrio del hebreo.
- source_word: יָקֵל
  english_pob_choice: he will lighten
  chosen_spanish: él aligere
  alternatives_spanish:
  - él alivie
  - él haga más liviana
  lexicon: HALOT
  rationale: El hiphil de קלל/קל sugiere hacer más liviana la carga. «Aligere» conserva la metáfora de peso y encaja con el valor modal de la frase.
- source_word: אֶת יָדוֹ
  english_pob_choice: his hand
  chosen_spanish: su mano
  alternatives_spanish:
  - su mano
  - su poder
  lexicon: HALOT
  rationale: Se retiene la imagen corporal del hebreo, que en contexto comunica el peso de la acción divina. No se sustituye por «poder» para no desdibujar la metáfora.
- source_word: מֵעֲלֵיכֶם
  english_pob_choice: from upon you
  chosen_spanish: de sobre ustedes
  alternatives_spanish:
  - de encima de ustedes
  - de sobre ustedes
  lexicon: HALOT
  rationale: Se conserva la estructura «de sobre» para reflejar el hebreo y la imagen de una mano pesada que se retira.
- source_word: וּמֵעַל אֱלֹהֵיכֶם
  english_pob_choice: and from upon your gods
  chosen_spanish: de sobre sus dioses
  alternatives_spanish:
  - de encima de sus dioses
  - de sobre sus dioses
  lexicon: HALOT
  rationale: El hebreo repite la construcción incluso con los dioses filisteos. Se mantiene la repetición para no borrar el paralelismo.
- source_word: וּמֵעַל אַרְצְכֶם
  english_pob_choice: and from upon your land
  chosen_spanish: y de sobre su tierra
  alternatives_spanish:
  - y de encima de su tierra
  - y de sobre su tierra
  lexicon: HALOT
  rationale: Se conserva el mismo giro preposicional para mantener la cadencia y la imagen del peso retirado de la tierra.
theological_decisions:
- issue: Naturaleza de עפלים
  english_pob_reading: tumors
  chosen_spanish_reading: tumores
  alternative_spanish_readings:
  - hemorroides
  - hinchazones
  rationale: El hebreo no obliga a una especificación anatómica cerrada. «Tumores» preserva la amplitud semántica y deja abierta la interpretación tradicional sin imponerla en el texto principal.
  doctrine_reference: Principio de transparencia textual y preservación de ambigüedad lexical cuando el original no es concluyente.
- issue: La imagen de la mano divina
  english_pob_reading: his hand
  chosen_spanish_reading: su mano
  alternative_spanish_readings:
  - su poder
  - su castigo
  rationale: La metáfora se mantiene porque el hebreo la usa de forma deliberada. Traducirla por «poder» o «castigo» resolvería indebidamente una imagen que el texto quiere conservar.
  doctrine_reference: Fidelidad figurativa al lenguaje bíblico y preservación de la imaginería del original.
translation_notes:
  revision_awareness: 'Coincide con el resultado auditado en inglés: se mantiene la estructura consecutiva, la ambigüedad de עפלים se conserva como «tumores», y la metáfora de «su mano» no se parafrasea. La revisión reciente no indicó cambios.'
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando aparezca el tetragrámaton; aquí el texto habla de «el Dios de Israel», por lo que no aplica.
  - Se mantiene «Dios» en singular y «sus dioses» para los ídolos filisteos, respetando el contraste del hebreo.
  - La preposición repetida «de sobre» reproduce la imagen del peso que se retira; no se simplifica a «de» para no perder la estructura retórica.
  - «Imágenes» conserva el paralelismo de צַלְמֵי... וְצַלְמֵי sin introducir glosas interpretativas.
