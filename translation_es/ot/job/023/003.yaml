  to: ¡Oh[a], si yo supiera dónde hallarlo, y pudiera llegar hasta su morada!
  rationale: La revisión mantiene el sentido optativo del hebreo de forma más natural en español, evita el condicional ambiguo y la finalidad añadida, y mejora la fluidez de la expresión locativa sin perder la nota léxica documentada en el POB inglés.
