translation:
  language: es
  text: Para el director del coro[a]. Cántico, salmo. Aclamen a Dios[b], toda la tierra.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «Para el director musical» o «Para el maestro de coro».
    reason: lexical_alternative
  - marker: b
    text: O «Griten a Dios, toda la tierra».
    reason: lexical_alternative
lexical_decisions:
- source_word: לַמְנַצֵּחַ
  english_pob_choice: For the choir director
  chosen_spanish: Para el director del coro
  alternatives_spanish:
  - Para el director musical
  - Para el maestro del coro
  - Para el cantor principal
  lexicon: HALOT
  rationale: El término de superscripción señala a la persona encargada de la ejecución musical. «Director del coro» comunica esa función de manera natural en español y conserva el valor litúrgico/musical sin volverlo demasiado técnico o arcaico.
- source_word: שִׁיר
  english_pob_choice: A song
  chosen_spanish: Cántico
  alternatives_spanish:
  - Canción
  - Un cántico
  lexicon: HALOT
  rationale: Como encabezado poético, «cántico» suena más apropiado en español bíblico que «canción» y transmite bien el carácter de pieza cantada. Se evita duplicar el artículo para mantener el estilo telegráfico de la superscripción.
- source_word: מִזְמוֹר
  english_pob_choice: a psalm
  chosen_spanish: salmo
  alternatives_spanish:
  - un salmo
  - melodía
  lexicon: HALOT
  rationale: «Salmo» es el equivalente técnico establecido para mizmor. En la estructura nominal breve del encabezado, se deja sin artículo explícito para conservar la concisión del hebreo y del inglés auditado.
- source_word: הָרִיעוּ
  english_pob_choice: Shout
  chosen_spanish: Griten
  alternatives_spanish:
  - Alcen un grito
  - Aclamen
  - Den un grito de júbilo
  lexicon: HALOT
  rationale: El hebreo expresa un grito fuerte dirigido a Dios; la revisión inglesa optó por «Shout» sin añadir matiz interpretativo. «Griten» mantiene la fuerza imperativa y evita introducir explícitamente el adverbio «alegremente», aunque ese matiz puede estar implícito en el verbo hebreo.
- source_word: לֵאלֹהִים
  english_pob_choice: to God
  chosen_spanish: a Dios
  alternatives_spanish:
  - para Dios
  - hacia Dios
  lexicon: HALOT
  rationale: La preposición marca el destinatario del clamor. «A Dios» es la correspondencia natural y directa en español.
- source_word: כָּל הָאָרֶץ
  english_pob_choice: all the earth
  chosen_spanish: toda la tierra
  alternatives_spanish:
  - toda la tierra habitada
  - toda la tierra
  - todo el mundo
  lexicon: HALOT
  rationale: «Tierra» conserva bien el alcance universal del hebreo en poesía sin forzar una expresión más interpretativa como «todo el mundo». La concordancia femenina con «tierra» permite una frase fluida y fiel.
theological_decisions:
- issue: Alcance universal de la convocatoria
  english_pob_reading: universal call to all the earth
  chosen_spanish_reading: llamado universal a toda la tierra
  alternative_spanish_readings:
  - llamado a toda la tierra como territorio
  - convocatoria a todo el mundo
  rationale: El contexto litúrgico del salmo favorece una convocatoria universal. «Toda la tierra» conserva ese horizonte amplio sin añadir una expansión doctrinal no presente en el texto.
  doctrine_reference: Translation philosophy §1, §3
translation_notes:
  revision_awareness: La redacción sigue la revisión más reciente del inglés POB, que redujo «Shout joyfully» a «Shout» para ajustarse con mayor precisión al imperativo hebreo. La versión española evita añadir un adverbio interpretativo y preserva esa sobriedad lexical.
  spanish_consistency_notes:
  - 'Se mantiene la terminología poética breve propia de las superscripciones: «Cántico, salmo» sin expandir innecesariamente.'
  - «Director del coro» evita el calco de «choirmaster» pero conserva la función musical documentada.
  - «Tierra» se usa con valor universal, coherente con la lectura auditada de הָאָרֶץ.
  - Las notas alternativas se limitan a verdaderas opciones de traducción, sin introducir glosas doctrinales ajenas al verso.
