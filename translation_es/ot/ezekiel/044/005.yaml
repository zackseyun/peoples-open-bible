translation:
  language: es
  text: 'Y Yahvé me dijo[a]: «Hijo de hombre, pon tu corazón, y mira con tus ojos, y oye con tus oídos todo lo que te estoy diciendo acerca de todas las ordenanzas de la casa de Yahvé y de todas sus leyes[b]. Pon tu corazón en la entrada del templo y en todas las salidas del santuario».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «presta atención» para «pon tu corazón»; el hebreo expresa literalmente dirigir el corazón, es decir, atención concentrada y consideración cuidadosa.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «sus instrucciones» para «sus leyes»; el plural hebreo puede designar enseñanzas o regulaciones prescritas, no solo legislación en sentido estricto.'
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהֹוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahveh
  - el SEÑOR
  lexicon: HALOT
  rationale: El proyecto pide por defecto Yahvé para YHWH; se conserva el nombre divino en español en lugar de una sustitución reverencial. "Yahveh" es una variante ortográfica posible, pero "Yahvé" es la forma elegida por el proyecto.
- source_word: בֶּן אָדָם
  english_pob_choice: Son of man
  chosen_spanish: Hijo de hombre
  alternatives_spanish:
  - ser humano
  - mortal
  lexicon: HALOT
  rationale: En Ezequiel es un apelativo profético recurrente. "Hijo de hombre" preserva el idiomá­tico y su continuidad literaria mejor que una paráfrasis que aplane el título.
- source_word: שִׂים לִבְּךָ
  english_pob_choice: set your heart
  chosen_spanish: pon tu corazón
  alternatives_spanish:
  - presta atención
  - fija tu atención
  lexicon: HALOT
  rationale: El hebreo literalmente habla de dirigir el corazón. "Pon tu corazón" conserva la metáfora antropológica y su fuerza exhortativa, con español natural.
- source_word: וּרְאֵה בְעֵינֶיךָ
  english_pob_choice: see with your eyes
  chosen_spanish: mira con tus ojos
  alternatives_spanish:
  - ve con tus ojos
  - observa atentamente
  lexicon: HALOT
  rationale: Se mantiene el paralelismo corporal enfático del hebreo. "Mira" resulta más natural que "ve" en este imperativo, sin perder la concreción de "con tus ojos".
- source_word: וּבְאָזְנֶיךָ שְׁמָע
  english_pob_choice: hear with your ears
  chosen_spanish: oye con tus oídos
  alternatives_spanish:
  - escucha con tus oídos
  - oye atentamente
  lexicon: HALOT
  rationale: La duplicación corporal se conserva para reflejar el énfasis retórico del original. "Oye" es un imperativo natural en español bíblico moderno y mantiene la relación con "con tus oídos".
- source_word: מְדַבֵּר אֹתָךְ
  english_pob_choice: I am speaking to you
  chosen_spanish: yo te hablo
  alternatives_spanish:
  - yo estoy hablando contigo
  - yo te digo
  lexicon: HALOT
  rationale: El participio expresa acción en curso; en español "te hablo" comunica esa continuidad sin sonar forzado. La construcción directa refleja el valor de דבר con objeto pronominal.
- source_word: לְכָל חֻקּוֹת בֵּית יְהוָה
  english_pob_choice: concerning all the statutes of the house of Yahweh
  chosen_spanish: acerca de todas las ordenanzas de la casa de Yahvé
  alternatives_spanish:
  - sobre todas las estatutos de la casa de Yahvé
  - acerca de todas las disposiciones de la casa de Yahvé
  lexicon: HALOT
  rationale: '"חֻקּוֹת" puede abarcar disposiciones ordenadas, no solo leyes civiles. "Ordenanzas" conserva el valor normativo-cultual sin rigidizarlo excesivamente. Se mantiene "casa de Yahvé" para respetar la expresión hebrea.'
- source_word: תּוֹרֹתָיו
  english_pob_choice: all its laws
  chosen_spanish: todas sus leyes
  alternatives_spanish:
  - todas sus instrucciones
  - todas sus enseñanzas
  lexicon: HALOT
  rationale: El plural puede referir a reglamentos o instrucciones prescritas. En este contexto cultual, "leyes" es claro y fiel, aunque la nota inglesa deja abierta la alternativa de "instrucciones".
- source_word: וְשַׂמְתָּ לִבְּךָ
  english_pob_choice: Set your heart
  chosen_spanish: Pon tu corazón
  alternatives_spanish:
  - Presta atención
  - Fija tu atención
  lexicon: HALOT
  rationale: Se conserva la repetición del mismo modismo para mantener la estructura del verso y su insistencia retórica.
- source_word: לִמְבוֹא הַבַּיִת
  english_pob_choice: on the entrance of the temple
  chosen_spanish: en la entrada de la casa
  alternatives_spanish:
  - en el acceso de la casa
  - en la entrada del templo
  lexicon: HALOT
  rationale: מְבוֹא significa entrada o acceso. Se conserva "casa" como eco del hebreo inmediato; "templo" sería contextual pero más interpretativo en este punto.
- source_word: בְּכָל מוֹצָאֵי הַמִּקְדָּשׁ
  english_pob_choice: on all the exits of the sanctuary
  chosen_spanish: en todas las salidas del santuario
  alternatives_spanish:
  - y en todas las salidas del santuario
  - en todas las salidas del lugar santo
  lexicon: HALOT
  rationale: מוֹצָאֵי son lugares de salida, por lo que "salidas" es directo. "Santuario" traduce bien מִקְדָּשׁ en su ámbito cultual.
theological_decisions:
- issue: Nombre divino YHWH
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahveh
  - el SEÑOR
  rationale: Se sigue la política del proyecto para YHWH y se evita la máscara reverencial tradicional. Esto preserva la transparencia del nombre divino en español.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Título profético בן־אדם en Ezequiel
  english_pob_reading: Son of man
  chosen_spanish_reading: Hijo de hombre
  alternative_spanish_readings:
  - ser humano
  - mortal
  rationale: No se introduce aquí una lectura cristológica posterior. En Ezequiel funciona como vocativo profético dirigido al mensajero humano.
  doctrine_reference: 'DOCTRINE.md Translation philosophy §4; Contested terms: אָדָם'
- issue: Valor de חֻקּוֹת / תּוֹרֹת
  english_pob_reading: statutes / laws
  chosen_spanish_reading: ordenanzas / leyes
  alternative_spanish_readings:
  - disposiciones / instrucciones
  - estatutos / enseñanzas
  rationale: Se distingue entre el matiz normativo de חֻקּוֹת y el conjunto de instrucciones prescritas de תּוֹרֹת. "Ordenanzas" y "leyes" mantienen la fuerza jurídica-cultual sin borrar la amplitud semántica.
  doctrine_reference: Lexical note on cultic regulation terminology in Ezekiel 44
translation_notes:
  revision_awareness: Pasaje revisado con acuerdo alto entre auditoría inglesa y control de revisión; no se aplicaron cambios al sentido básico. Se mantiene la metáfora hebrea del corazón y el paralelismo corporal, ajustados a un español natural y publicable.
  spanish_consistency_notes:
  - Se conserva Yahvé de forma uniforme para יְהֹוָה.
  - Se mantiene "casa" en dos ocurrencias donde el hebreo dice בַּיִת; no se sustituyó por "templo" para no perder el eco literal del original, salvo en la nota alternativa implícita.
  - Se usa un registro bíblico moderno y digno, evitando arcaísmos innecesarios.
  - Se preserva la repetición de "Pon tu corazón" para reflejar la insistencia del hebreo.
