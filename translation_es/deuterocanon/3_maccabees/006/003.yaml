  glossary_alignment: 'No hay conflicto con los términos doctrinales del proyecto. «Santificado/santificada», «pueblo» y «porción» están bien alineados con las decisiones del POB. «Linaje» es aceptable para σπέρμα, aunque «descendencia» también sería posible; no exige cambio. La nota alternativa debe mantenerse. '
