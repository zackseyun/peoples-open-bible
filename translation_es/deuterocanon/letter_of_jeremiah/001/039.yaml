lexical_decisions:
- source_word: πῶς
  english_pob_choice: How
  chosen_spanish: ¿Cómo, pues,
  alternatives_spanish:
  - ¿De qué manera, pues,
  - ¿Cómo entonces,
  lexicon: BDAG
  rationale: En una pregunta retórica, 'Cómo' reproduce la apertura interrogativa de forma natural en español; 'pues' refleja οὖν como inferencia conclusiva del argumento anterior.
- source_word: οὖν
  english_pob_choice: then
  chosen_spanish: pues
  alternatives_spanish:
  - entonces
  - por tanto
  lexicon: BDAG
  rationale: En español, 'pues' funciona bien como partícula inferencial y mantiene el flujo argumentativo sin sonar forzado.
- source_word: νομιστέον
  english_pob_choice: should they be considered
  chosen_spanish: se les debe considerar
  alternatives_spanish:
  - debe uno considerarlos
  - se los debe estimar
  lexicon: LSJ
  rationale: El adjetivo verbal expresa deber/obligación impersonal. 'Se les debe considerar' conserva el matiz de lo que ha de pensarse de ellos sin resolver la tensión del texto.
- source_word: ἢ
  english_pob_choice: or
  chosen_spanish: o
  lexicon: BDAG
  rationale: Conjunción disyuntiva directa, equivalente simple en español.
- source_word: κλητέον
  english_pob_choice: called
  chosen_spanish: llamar
  alternatives_spanish:
  - nombrar
  - denominar
  lexicon: LSJ
  rationale: El adjetivo verbal indica lo que debe ser llamado o nombrado. 'Llamar' es la opción más directa y natural en español, y permite mantener el paralelismo con 'considerar'.
- source_word: θεούς
  english_pob_choice: gods
  chosen_spanish: dioses
  alternatives_spanish:
  - seres divinos
  - deidades
  lexicon: BDAG
  rationale: En el contexto polémico contra los ídolos, el plural 'dioses' conserva el contraste explícito del griego y la fuerza retórica de la acusación.
theological_decisions:
- issue: Fuerza retórica de los adjetivos verbales νομιστέον y κλητέον
  english_pob_reading: Render as a rhetorical question about whether these idols ought to be regarded or called gods
  chosen_spanish_reading: Pregunta retórica sobre si deben ser considerados o llamados dioses
  alternative_spanish_readings:
  - ¿Cómo, pues, se los ha de considerar o llamar dioses?
  - ¿Cómo, pues, pueden ser considerados o llamados dioses?
  rationale: El griego no afirma una ontología, sino cuestiona la legitimidad de otorgarles ese nombre/título. La traducción preserva esa tensión polémica y el carácter evaluativo del final del argumento.
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve it; readable modern Spanish, not archaic or academic.'
translation_notes:
  revision_awareness: Se siguió el cierre inglés auditable 'considered or called gods' y su alternativa más formal 'must they be considered or called gods', pero en español se optó por una construcción impersonal natural ('se les debe considerar o llamar') para preservar el tono retórico sin añadir sujeto explícito.
  spanish_consistency_notes:
  - Se mantiene 'dioses' para θεούς, no un término suavizado como 'seres divinos', porque el contexto desacredita explícitamente la pretensión de divinidad.
  - '''Pues'' traduce el valor inferencial de οὖν dentro de una pregunta retórica, coherente con el flujo argumentativo del pasaje.'
  - '''Llamar'' conserva el paralelo con el inglés POB y con κλητέον; no se reemplaza por ''nombrar'' porque ''llamar dioses'' suena más natural en español bíblico contemporáneo.'
