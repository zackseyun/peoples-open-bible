translation:
  language: es
  text: Si tienes algún enemigo o alguien que conspira contra tus asuntos[a], envíalo allí, y lo recibirás de vuelta azotado, si es que incluso sobrevive[b], porque verdaderamente hay algún poder de Dios en torno a ese lugar.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «alguien que maquina contra tus intereses» para «alguien que conspira contra tus asuntos».'
    reason: lexical_alternative
  - marker: b
    text: Literalmente, «si es que incluso sobrevive». La frase subraya el peligro de encontrarse con el poder divino asociado a ese lugar.
    reason: lexical_alternative
lexical_decisions:
- source_word: πολέμιον
  english_pob_choice: enemy
  chosen_spanish: enemigo
  alternatives_spanish:
  - adversario
  - fóe
  lexicon: LSJ
  rationale: πολέμιον denota un enemigo o adversario personal; 'enemigo' es la equivalencia natural y clara en español, manteniendo el sentido personal del contexto.
- source_word: πραγμάτων ἐπίβουλον
  english_pob_choice: one plotting against your affairs
  chosen_spanish: alguien que conspira contra tus asuntos
  alternatives_spanish:
  - alguien que maquina contra tus intereses
  - alguien traicionero en tus asuntos
  lexicon: LSJ
  rationale: ἐπίβουλος expresa la idea de conspirar o tramar contra algo, y πραγμάτων amplía el objeto a asuntos, intereses o negocios. 'Conspira contra tus asuntos' conserva el alcance concreto sin volverlo excesivamente interpretativo.
- source_word: πέμψον αὐτὸν ἐκεῖ
  english_pob_choice: send him there
  chosen_spanish: envíalo allí
  alternatives_spanish:
  - despáchalo allí
  - mándalo allí
  lexicon: LSJ
  rationale: El imperativo es directo; 'envíalo allí' suena natural en español y preserva la simplicidad del griego.
- source_word: μεμαστιγωμένον
  english_pob_choice: flogged
  chosen_spanish: azotado
  alternatives_spanish:
  - flagelado
  - golpeado con látigos
  lexicon: LSJ
  rationale: El participio perfecto pasivo de μαστιγόω indica una paliza ya consumada. 'Azotado' comunica bien la severidad y es más idiomático que una opción demasiado técnica.
- source_word: προσδέξῃ
  english_pob_choice: you will receive him back
  chosen_spanish: lo recibirás de vuelta
  alternatives_spanish:
  - lo recibirás nuevamente
  - lo volverás a recibir
  lexicon: LSJ
  rationale: El sentido contextual implica que la persona enviada regresa. 'Lo recibirás de vuelta' expresa ese retorno de forma natural en español.
- source_word: ἐάνπερ καὶ διασωθῇ
  english_pob_choice: if indeed he even survives
  chosen_spanish: si es que incluso sobrevive
  alternatives_spanish:
  - si acaso logra salvarse
  - si es que logra salir con vida
  lexicon: LSJ
  rationale: διασῴζω aquí tiene el matiz de salir con vida o sobrevivir; la cláusula intensificada por ἐάνπερ καὶ conserva el tono sombrío de 'si es que incluso sobrevive'.
- source_word: διὰ τὸ ... εἶναί τινα θεοῦ δύναμιν
  english_pob_choice: because there truly is some power of God
  chosen_spanish: porque verdaderamente hay algún poder de Dios
  alternatives_spanish:
  - porque de verdad hay cierta poder divino
  - porque realmente existe un poder de Dios
  lexicon: LSJ
  rationale: La construcción causal afirma una realidad divina sin definirla del todo. 'Algún poder de Dios' preserva la indefinición de τινα y evita resolver la tensión teológica del texto.
- source_word: περὶ τὸν τόπον
  english_pob_choice: about the place
  chosen_spanish: alrededor de ese lugar
  alternatives_spanish:
  - en torno a ese lugar
  - acerca de ese lugar
  lexicon: LSJ
  rationale: περί con acusativo mantiene una relación espacial. 'Alrededor de ese lugar' conserva mejor la imagen espacial que una formulación abstracta.
- source_word: ἀληθῶς
  english_pob_choice: truly
  chosen_spanish: verdaderamente
  alternatives_spanish:
  - realmente
  - en verdad
  lexicon: LSJ
  rationale: El adverbio subraya la realidad del poder asociado al lugar. 'Verdaderamente' es solemne y claro en español.
theological_decisions:
- issue: θεοῦ δύναμιν en contexto de presencia divina vinculada al lugar
  english_pob_reading: some power of God
  chosen_spanish_reading: algún poder de Dios
  alternative_spanish_readings:
  - cierto poder divino
  - el poder de Dios
  rationale: El griego usa τινα, que introduce una indefinición real. Mantener 'algún' conserva la reserva del texto y evita convertir la frase en una afirmación doctrinal más definida de lo que el versículo expresa.
  doctrine_reference: Preservar la tensión teológica sin resolverla.
translation_notes:
  revision_awareness: Se revisó a la luz del griego de Swete LXX 1909 y del audit trail inglés. La redacción española sigue de cerca las decisiones léxicas del POB inglés sin depender mecánicamente de él, y conserva la ambigüedad intencional en πραγμάτων ἐπίβουλον y θεοῦ δύναμιν.
  spanish_consistency_notes:
  - Se usa 'Dios' para θεοῦ, manteniendo la mayúscula reverencial en español.
  - Se eligió 'azotado' para μαστιγωμένον por su fuerza y naturalidad en español.
  - Se preserva 'algún' para τινα con el fin de no eliminar la indefinición del original.
  - 'El orden de la frase mantiene el énfasis causal final del griego: la razón se da al final con ''porque''.'
