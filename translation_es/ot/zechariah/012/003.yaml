    issue: Falta de nota para la expresión intensificada שָׂרוֹט יִשָּׂרֵטוּ
    rationale: El inglés POB conserva una nota literal importante ('will surely be cut/gashed'). El español comunica bien el sentido con «se lastimarán gravemente», pero debería preservar la alternativa más literal en nota.
  - severity: medium
    issue: La nota c no corresponde a una alternativa real del texto principal
    rationale: El texto ya traduce הָאָרֶץ como «tierra». La nota dice «O “de la tierra”», que repite el texto en vez de dar la alternativa local documentada ('del país' / 'de la tierra' en sentido local).
  - severity: low
    issue: «Y sucederá en aquel día» es menos idiomático de lo necesario
    rationale: Es fiel, pero suena más rígido en español que «En aquel día» o «Y en aquel día», que preservan el marcador profético sin calco innecesario.
  - severity: low
    issue: «Se juntarán contra ella» podría mejorarse a «se reunirán contra ella»
    rationale: Ambas son fieles, pero «reunirán» es más natural y digno en español bíblico general.
