base_translation:
  language: en
  yaml_path: translation/ot/jeremiah/020/009.yaml
  text: If I say[a], “I will not mention him, or speak any longer in his name,” then in my heart it is like a burning fire, shut up in my bones; I grow weary of holding it in[c][b], and I cannot.
  footnotes:
  - marker: a
    text: Or 'I will not remember him.' The Hebrew verb can mean either 'remember' or 'mention'; here 'mention' fits the parallel with speaking.
    reason: lexical_alternative
  - marker: b
    text: That is, speak as his representative or under his authority.
    reason: cultural_note
  - marker: c
    text: The Hebrew leaves the subject implicit; the sense is likely the LORD's message or the compulsion to speak it.
    reason: alternative_reading
