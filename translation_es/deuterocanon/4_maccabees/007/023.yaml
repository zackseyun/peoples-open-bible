translation:
  language: es
  text: Porque solo el sabio y dueño de sí mismo, el hombre[a], es valiente, dueño de las pasiones.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «uno» o, con formulación más inclusiva, «la persona»; el griego tiene una forma masculina singular usada de manera genérica en esta sentencia ética.
    reason: lexical_alternative
lexical_decisions:
- source_word: μόνος
  english_pob_choice: only
  chosen_spanish: solo
  alternatives_spanish:
  - únicamente
  - solamente
  lexicon: LSJ
  rationale: El adverbio introduce una exclusividad clara; «solo» comunica de modo natural esa restricción sin añadir matices ajenos.
- source_word: σοφὸς
  english_pob_choice: wise
  chosen_spanish: sabio
  alternatives_spanish:
  - prudente
  - entendido
  lexicon: LSJ
  rationale: En esta máxima ética, σοφός remite a sabiduría moral e intelectual; «sabio» es el equivalente más directo y digno en español.
- source_word: σώφρων
  english_pob_choice: self-controlled
  chosen_spanish: el que se domina
  alternatives_spanish:
  - temperante
  - sensato
  - de dominio propio
  lexicon: LSJ
  rationale: El contexto gira en torno al dominio sobre las pasiones, así que una formulación verbal en español expresa mejor el sentido de autocontrol que un adjetivo más abstracto o arcaico.
- source_word: ἀνδρεῖός
  english_pob_choice: courageous
  chosen_spanish: valiente
  alternatives_spanish:
  - courageoso
  - bravo
  - varonil
  lexicon: LSJ
  rationale: El término expresa fortaleza y valor. «Valiente» es natural en español y evita cargar la frase con un matiz de género que no conviene imponer en la traducción.
- source_word: τῶν παθῶν
  english_pob_choice: of the passions
  chosen_spanish: de las pasiones
  alternatives_spanish:
  - sobre las pasiones
  - de los afectos
  - de los impulsos
  lexicon: LSJ
  rationale: En 4 Macabeos, πάθη se refiere a pasiones o impulsos sujetos a la razón; el genitivo básico «de las pasiones» conserva el vínculo léxico con el griego.
- source_word: κύριος
  english_pob_choice: master
  chosen_spanish: señor
  alternatives_spanish:
  - dueño
  - amo
  - maestro
  lexicon: LSJ
  rationale: Aquí κύριος no es un título divino, sino una expresión de dominio. «Señor de las pasiones» preserva la fuerza nominal y, en español bíblico, comunica autoridad sobre ellas sin convertir la frase en paráfrasis.
- source_word: ὁ σοφὸς καὶ σώφρων ἀνδρεῖός ἐστιν τῶν παθῶν κύριος
  english_pob_choice: is courageous, master of the passions
  chosen_spanish: es valiente, señor de las pasiones
  alternatives_spanish:
  - es valiente y señor de las pasiones
  - es valiente, dueño de las pasiones
  - es valiente y domina las pasiones
  lexicon: Greek syntax / LSJ
  rationale: 'El griego presenta dos predicados: «valiente» y «κύριος τῶν παθῶν». La coma reproduce la estructura compacta sin forzar una subordinación explicativa.'
theological_decisions:
- issue: Expresión masculina singular con valor genérico
  english_pob_reading: man
  chosen_spanish_reading: el que se domina
  alternative_spanish_readings:
  - el hombre
  - la persona
  - uno
  rationale: El griego usa un singular masculino sustantivado, pero en español una perífrasis neutra y natural evita un masculinizante innecesario sin perder el carácter general de la sentencia.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
- issue: κύριος en contexto no divino
  english_pob_reading: the master
  chosen_spanish_reading: señor
  alternative_spanish_readings:
  - amo
  - dueño
  - maestro
  rationale: No hay aquí un uso como título divino. «Señor» conserva la idea de dominio personal sobre las pasiones y mantiene un registro elevado compatible con el género sentencioso.
  doctrine_reference: 'DOCTRINE.md Contested terms: κύριος'
translation_notes:
  revision_awareness: Se siguió el estado más reciente del audit trail inglés, que conserva dos predicados tras ἐστιν y prefiere una formulación compacta. En español se mantuvo esa compacidad con una coma predicativa, sin ampliar el sentido ni borrar la tensión entre sabiduría, autocontrol, valentía y dominio de las pasiones.
  spanish_consistency_notes:
  - Se usó «pasiones» para πάθη, en línea con el contexto filosófico-ético de 4 Macabeos.
  - Se evitó «Cristo» o terminología cristológica, ya que κύριος aquí no es título divino.
  - La frase «el que se domina» sirve para σώφρων y preserva la idea de autocontrol sin introducir una abstracción innecesaria.
