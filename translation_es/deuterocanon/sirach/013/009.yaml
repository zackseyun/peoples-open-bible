  verdict: revise
  source_alignment_summary: 'El borrador sigue bien el sentido sapiencial apoyado por el hebreo y el paralelo griego: ante un personaje poderoso, conviene mostrar reserva para que él mismo acerque más. Sin embargo, «se acerca» en la primera cláusula se inclina demasiado hacia mera proximidad física y debilita el matiz documentado de convocatoria o admisión favorecedora que el griego respalda y que la nota preserva.'
  spanish_quality_summary: El español es claro y digno, pero «mantén tu distancia» suena algo calcado; «guarda cierta distancia» o «mantén cierta distancia» fluye mejor en registro proverbial. Además, «y entonces te acercará aún más» funciona, pero conviene armonizar la primera cláusula con el sentido de invitación para evitar una secuencia algo ambigua.
  glossary_alignment: No hay términos del glosario mayor implicados de forma conflictiva. «Noble» está bien para נָדִיב. La revisión propuesta respeta la decisión lexical auditada y mejora la correspondencia con el razonamiento hebreo/griego.
  issues:
  - severity: medium
    issue: La primera cláusula «Cuando un noble se acerca» no refleja suficientemente el matiz de convocatoria/aproximación hacia el destinatario.
    rationale: Aunque el inglés revisado dice «draws near», la documentación lexical y la nota explican que el hebreo terso, leído con apoyo del griego προσκαλεσαμένου σε, apunta a la acción del poderoso que llama o hace acercar. En español, «se acerca» puede entenderse solo como que él viene físicamente.
  - severity: low
    issue: «Mantén tu distancia» suena menos idiomático en español proverbial que una formulación con «cierta distancia» o «guarda distancia».
    rationale: La idea no es separación absoluta sino reserva prudente; una ligera mejora estilística aumenta naturalidad sin cambiar el sentido.
  revised_spanish_text: Cuando un noble te hace acercarte[a], mantén cierta distancia, y entonces te acercará aún más.
