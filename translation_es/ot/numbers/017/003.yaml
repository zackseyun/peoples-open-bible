translation:
  language: es
  text: En cuanto a los incensarios de estos hombres que pecaron[a] a costa de su vida[b], háganlos de láminas[c] martilladas como recubrimiento para el altar, porque los presentaron delante de Yahvé y quedaron consagrados[d]; y serán una señal para los hijos de Israel[e].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «estos pecadores» o «estos hombres pecadores».'
    reason: lexical_alternative
  - marker: b
    text: Literalmente, «con/en sus vidas»; es decir, su pecado les costó la vida.
    reason: lexical_alternative
  - marker: c
    text: 'O: «placas martilladas» o «láminas de metal martilladas».'
    reason: lexical_alternative
  - marker: d
    text: 'O: «quedaron santificados» o «fueron consagrados». El sujeto más natural son los incensarios.'
    reason: lexical_alternative
  - marker: e
    text: 'O: «para los israelitas». Literalmente, «para los hijos de Israel».'
    reason: lexical_alternative
lexical_decisions:
- source_word: מַחְתּוֹת
  english_pob_choice: censers
  chosen_spanish: incensarios
  alternatives_spanish:
  - braseros
  - censarios
  lexicon: HALOT
  rationale: En este contexto narrativo-cultual, el objeto es un recipiente para incienso usado en la rebelión. En español, «incensarios» comunica con claridad ese uso litúrgico sin sonar técnico en exceso; «braseros» puede sugerir fuego más que incienso, y «censarios» es posible pero menos común en español actual.
- source_word: הַחַטָּאִים הָאֵלֶּה
  english_pob_choice: these men who sinned
  chosen_spanish: estos hombres que pecaron
  alternatives_spanish:
  - estos pecadores
  - estos hombres pecadores
  lexicon: HALOT
  rationale: La forma participial destaca la acción concreta del pecado. «Que pecaron» conserva ese valor verbal mejor que un simple rótulo nominal como «pecadores». «Hombres» se mantiene porque el referente narrativo es un grupo masculino ya identificado.
- source_word: בְּנַפְשֹׁתָם
  english_pob_choice: at the cost of their lives
  chosen_spanish: al costo de su vida
  alternatives_spanish:
  - con su vida
  - a costa de su vida
  - para su propia destrucción
  lexicon: HALOT
  rationale: La expresión hebrea alude idiomáticamente a que su pecado les costó la vida. «Al costo de su vida» comunica bien el resultado letal sin convertir «vida» en una noción demasiado abstracta de «alma». El singular colectivo en español conserva el sentido idiomático.
- source_word: רִקֻּעֵי פַחִים
  english_pob_choice: hammered plates
  chosen_spanish: láminas martilladas
  alternatives_spanish:
  - placas martilladas
  - láminas de metal martilladas
  - placas de metal martilladas
  lexicon: HALOT
  rationale: La expresión describe metal batido hasta quedar en láminas/placas delgadas. «Láminas martilladas» es natural en español y mantiene la imagen de metal trabajado a golpes; «placas» también es válida, pero «láminas» suena más directo para el resultado del martillado.
- source_word: צִפּוּי לַמִּזְבֵּחַ
  english_pob_choice: as a covering for the altar
  chosen_spanish: como recubrimiento para el altar
  alternatives_spanish:
  - como cubierta para el altar
  - para cubrir el altar
  - como revestimiento del altar
  lexicon: HALOT
  rationale: El sustantivo expresa un revestimiento/overlay con función cultual. «Recubrimiento» evita la ambigüedad de una simple cubierta provisional y refleja bien la idea de una capa sobre el altar.
- source_word: כִּי הִקְרִיבֻם לִפְנֵי יְהוָה
  english_pob_choice: because they presented them before Yahweh
  chosen_spanish: porque los presentaron delante de Yahvé
  alternatives_spanish:
  - porque los ofrecieron delante de Yahvé
  - porque los acercaron delante de Yahvé
  - porque los llevaron delante de Yahvé
  lexicon: HALOT
  rationale: הקריב puede significar «ofrecer/presentar traer cerca» en contexto sacrificial. «Presentaron» evita sobrecargar el verbo con un sentido estrictamente sacrificial que, aplicado a incensarios, podría sonar extraño; conserva la solemnidad cultual y el acto de llevarlos ante Dios.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  - el SEÑOR
  lexicon: HALOT
  rationale: Se sigue la política del proyecto de traducir el Nombre divino como «Yahvé», manteniendo el nombre personal de Dios en lugar de sustituirlo por un título.
- source_word: וַיִּקְדָּשׁוּ
  english_pob_choice: they became holy
  chosen_spanish: quedaron consagrados
  alternatives_spanish:
  - se hicieron santos
  - fueron consagrados
  - quedaron santificados
  lexicon: HALOT
  rationale: El verbo en plural probablemente se refiere a los incensarios, no a los hombres. En español, «quedaron consagrados» transmite el resultado cultual sin implicar necesariamente santidad moral; además conserva la tensión observada por el audit trail entre objetos asociados al pecado y su posterior estado sagrado.
- source_word: וְיִהְיוּ לְאוֹת
  english_pob_choice: and they shall be a sign
  chosen_spanish: y serán una señal
  alternatives_spanish:
  - y servirán de señal
  - y quedarán como señal
  - y serán un signo
  lexicon: HALOT
  rationale: «Señal» es una equivalencia clara y bíblica en español. Mantiene la función memorial y de advertencia del objeto sin añadir interpretación extrabíblica.
- source_word: לִבְנֵי יִשְׂרָאֵל
  english_pob_choice: to the sons of Israel
  chosen_spanish: para los hijos de Israel
  alternatives_spanish:
  - para los israelitas
  - a los hijos de Israel
  - para el pueblo de Israel
  lexicon: HALOT
  rationale: «Hijos de Israel» conserva el giro corporativo tradicional y cercano al hebreo literal. «Para» expresa bien el propósito final del signo.
theological_decisions:
- issue: Referente de וַיִּקְדָּשׁוּ
  english_pob_reading: The censers became holy because they were presented before the LORD, and therefore could be repurposed only for sacred memorial use.
  chosen_spanish_reading: Los incensarios quedaron consagrados porque fueron presentados delante de Yahvé, y por eso solo podían reutilizarse como objeto memorial sagrado.
  alternative_spanish_readings:
  - Los hombres quedaron consagrados
  - Los incensarios fueron simplemente apartados ceremonialmente
  rationale: 'La concordancia verbal y el contexto favorecen que el sujeto sea el objeto plural inmediato, los incensarios. Traducir «quedaron consagrados» preserva la tensión del texto: un objeto asociado al pecado queda en la esfera sagrada por haber estado ante Yahvé, sin borrar el contraste moral del relato.'
  doctrine_reference: Consagración cultual; santidad de objetos dedicados a Yahvé
- issue: Sentido de בְּנַפְשֹׁתָם
  english_pob_reading: The phrase indicates that their sin resulted in the loss of their own lives.
  chosen_spanish_reading: La frase indica que su pecado les costó la vida.
  alternative_spanish_readings:
  - pecaron contra sus vidas
  - pecaron con sus vidas
  rationale: El hebreo no exige una antropología técnica de «alma»; en contexto narra un desenlace mortal. «Al costo de su vida» y la nota asociada preservan el valor idiomático de una forma clara y fiel.
  doctrine_reference: Vida humana bajo juicio divino; uso idiomático de נֶפֶשׁ
translation_notes:
  revision_awareness: El redactor inglés revisó «hammered sheets» a «hammered plates» por naturalidad, sin cambiar el sentido de metal batido en láminas delgadas. En español, opté por «láminas martilladas», que conserva la imagen material y resulta idiomática; también mantuve la lectura teológica de que el plural de «quedaron consagrados» se refiere más naturalmente a los incensarios que a los hombres.
  spanish_consistency_notes:
  - Se respetó la política del proyecto para יהוה como «Yahvé».
  - Se evitó «SEÑOR» para no ocultar el Nombre divino.
  - Se prefirió un verbo verbal («que pecaron») para reflejar la fuerza eventiva del participio hebreo.
  - «Incensarios» se eligió por claridad cultual en español frente a alternativas más técnicas o ambiguas.
  - La traducción mantiene el lenguaje corporativo «hijos de Israel» por fidelidad al hebreo y al registro bíblico.
