review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura básica del hebreo: Yahvé como nombre divino, ''hizo conforme a la palabra de Moisés'', y la muerte de las ranas en tres ámbitos. Sin embargo, la frase ''murieron de las casas, de los patios y de los campos'' no expresa bien en español la relación locativa de מִן con lugares; suena como causa o procedencia poco natural. El sentido es que las ranas murieron en/desde esos lugares, enumerados uno por uno.'
  spanish_quality_summary: El texto es claro en su mayor parte, pero 'murieron de las casas' resulta poco idiomático y afecta la legibilidad. 'En las casas, en los patios y en los campos' comunica mejor el español natural sin perder la enumeración espacial. 'Patios' y 'campos' son buenas elecciones.
  glossary_alignment: 'Alineado con la terminología del proyecto en el punto principal: יְהוָה → ''Yahvé''. No hay conflictos teológicos. Las demás decisiones léxicas son generalmente sólidas; la única corrección necesaria es la preposición locativa en español para מִן en esta construcción con ''murieron''.'
  issues:
  - severity: medium
    issue: Preposición no idiomática en 'las ranas murieron de las casas, de los patios y de los campos'
    rationale: Aunque מִן se repite en hebreo, en español 'morir de' normalmente expresa causa, no ubicación/procedencia espacial. Aquí produce una frase extraña y potencialmente confusa. Una reformulación locativa preserva mejor el sentido en español natural.
  - severity: low
    issue: Decisión léxica documentada para מִן demasiado mecánica
    rationale: La nota léxica justifica 'de' por correspondencia formal, pero en este contexto verbal el español requiere ajuste idiomático. No es un problema doctrinal ni de fondo, sino de adecuación sintáctica.
  revised_spanish_text: Yahvé hizo conforme a la palabra de Moisés, y las ranas murieron en las casas, en los patios y en los campos.
  revision_rationale: Se reemplaza la repetición de 'de' por 'en' porque, en español, 'morieron de las casas' es poco natural y puede sugerir causa en vez de ubicación. La revisión conserva el listado de lugares del hebreo y produce una frase fiel y legible en español contemporáneo.
