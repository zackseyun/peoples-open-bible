review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español conserva bien la estructura básica del hebreo y del POB inglés: vocativo filial, mandato de llorar por el muerto y comienzo del lamento. Sin embargo, «sé amargo» no comunica con naturalidad en español el imperativo reflexivo de duelo התמרר; suena adjetival y puede sugerir carácter áspero en vez de entrar en amargura por el duelo. El resto se alinea bien con la evidencia fuente y con el apoyo del griego para «comienza el lamento».'
  spanish_quality_summary: El texto es mayormente claro y digno, pero «sé amargo» resulta poco idiomático y algo confuso en español eclesial general. «Entristece tu corazón» sería más interpretativo de lo debido; «amargúrate» preserva mejor la fuerza verbal y el matiz de entrar en amargura de duelo, aunque siga siendo intenso. «Por el muerto» es fiel, aunque «por el difunto» también sería posible; no requiere cambio.
  glossary_alignment: No hay conflictos con la terminología de proyecto. No aparecen términos sensibles como Yahvé, Mesías, Espíritu, etc. La decisión sobre קינה como «lamento» es adecuada para legibilidad amplia.
  issues:
  - severity: medium
    issue: «sé amargo» es poco natural y semánticamente impreciso en español
    rationale: El hebreo התמרר es un imperativo verbal/reflexivo de entrar en amargura o afligirse; «sé amargo» en español describe más fácilmente una cualidad personal que una acción de duelo. «Amargúrate» refleja mejor la forma y el sentido.
  - severity: low
    issue: La nota al pie no explica el punto principal de dificultad textual indicado por el POB inglés
    rationale: La nota española menciona que el griego añade matices, pero el POB inglés señala específicamente que el verbo final hebreo es difícil y que el griego apoya el sentido adoptado. Conviene reflejar esa justificación textual con más precisión.
  revised_spanish_text: Hijo mío[a], derrama lágrimas por el muerto, amargúrate y comienza el lamento.
