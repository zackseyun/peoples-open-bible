      '
    reason: lexical_alternative
  - marker: b
    text: 'Lit.: «con labios de alegrías» o «con labios de gritos de júbilo».'
    reason: lexical_alternative
  revision_rationale: Se ajusta solo la primera imagen léxica para que el español preserve mejor la metáfora de saciedad alimentaria del hebreo sin introducir la connotación material de «riqueza». Se conserva la estructura del borrador, el presente poético y la explicitación contextual de «te». También se mejora levemente la alternativa de la nota a para mayor naturalidad en español.
