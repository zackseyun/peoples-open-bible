  glossary_alignment: No hay conflictos con la terminología base del proyecto. No aparecen términos sensibles como Yahvé, Mesías, espíritu, etc. 'Todo hombre' / 'todos los hombres' sigue el rastro del POB inglés y la explicación de genericidad humana queda correctamente documentada en nota.
