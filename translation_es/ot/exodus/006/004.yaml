revisions:
- from: También establecí[a] mi pacto con ellos, para darles la tierra de Canaán, la tierra de su peregrinación, donde peregrinaron.
  to: También establecí mi pacto con ellos, para darles la tierra de Canaán, la tierra de su residencia como forasteros[a], donde residieron como forasteros.
  rationale: Se reemplazó 'peregrinación/peregrinaron' por 'residencia como forasteros/residieron como forasteros' para reflejar mejor מגור/גור como estancia en calidad de extranjero. Se movió la nota al sintagma final, donde corresponde según el audit trail inglés, y se formuló como alternativa más literal al plural implícito de מְגֻרֵיהֶם y la repetición verbal del hebreo.
