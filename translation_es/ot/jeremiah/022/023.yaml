translation:
  language: es
  text: Tú que habitas en el Líbano, que anidas entre los cedros, ¡cómo gemirás[a] cuando te sobrevengan dolores[b], sufrimiento como el de una mujer que da a luz!
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «cómo serás compadecida cuando te sobrevengan dolores». El verbo hebreo traducido aquí como «gemirás» es difícil, y algunos lo entienden en el sentido de recibir compasión en lugar de emitir gemidos.'
    reason: lexical_alternative
  - marker: b
    text: El Líbano y los cedros probablemente evocan el palacio real construido con cedro del Líbano, presentando a los gobernantes de Judá como si moraran en una seguridad elevada.
    reason: cultural_note
lexical_decisions:
- source_word: ישבתי
  english_pob_choice: you who dwell
  chosen_spanish: Tú que habitas
  alternatives_spanish:
  - Tú que vives
  - Tú que moras
  lexicon: HALOT
  rationale: Aunque la forma hebrea es morfológicamente primera persona singular, el contexto exige un vocativo dirigido a la entidad personificada; por eso se traduce como segunda persona. «Habitas» conserva la idea de residencia estable que tiene el inglés POB y evita «sentarte», que sería demasiado literal y menos fiel al sentido.
- source_word: בַּלְּבָנוֹן
  english_pob_choice: in Lebanon
  chosen_spanish: en el Líbano
  alternatives_spanish:
  - sobre el Líbano
  lexicon: HALOT
  rationale: La construcción es locativa; en español, «en el Líbano» comunica de manera natural el lugar de residencia exaltada. Se mantiene la referencia geográfica sin forzar una interpretación alegórica en el texto principal.
- source_word: מקננתי
  english_pob_choice: who nest
  chosen_spanish: que anidas
  alternatives_spanish:
  - que haces tu nido
  - anidando
  lexicon: HALOT
  rationale: El verbo conserva la metáfora de ave que hace nido. «Anidas» es breve, natural y mantiene la imagen de seguridad y colocación elevada que el POB inglés preserva con «nest».
- source_word: בָּאֲרָזִים
  english_pob_choice: in the cedars
  chosen_spanish: entre los cedros
  alternatives_spanish:
  - en los cedros
  - en medio de los cedros
  lexicon: HALOT
  rationale: En español, «entre los cedros» comunica mejor la imagen poética de estar rodeada por cedros o asentada en cedros sin sonar extraño. Mantiene la ambigüedad entre cedros literales y la metáfora de majestuosidad/seguridad.
- source_word: מַה
  english_pob_choice: how
  chosen_spanish: cómo
  alternatives_spanish:
  - cuánto
  - qué
  lexicon: HALOT
  rationale: Aquí מַה introduce una exclamación, no una pregunta ordinaria. «Cómo» reproduce adecuadamente el matiz exclamativo del inglés POB.
- source_word: נֵּחַנְתְּ
  english_pob_choice: you will groan
  chosen_spanish: gemirás
  alternatives_spanish:
  - suspirarás
  - serás compadecida
  lexicon: HALOT
  rationale: El verbo hebreo es difícil y admite más de una lectura. Siguiendo la elección principal del POB, «gemirás» expresa el sufrimiento audible y encaja con los dolores de parto inmediatamente siguientes, sin ocultar la tensión lexical del hebreo.
- source_word: בְּבֹא לָךְ
  english_pob_choice: when ... come upon you
  chosen_spanish: cuando te lleguen
  alternatives_spanish:
  - cuando vengan sobre ti
  - al venirte
  lexicon: HALOT
  rationale: La frase marca circunstancia temporal. «Cuando te lleguen» es idiomático en español y transmite el ingreso repentino del sufrimiento, equivalente al valor temporal del hebreo.
- source_word: חֲבָלִים
  english_pob_choice: pangs
  chosen_spanish: los dolores
  alternatives_spanish:
  - los ayes
  - los dolores de parto
  lexicon: HALOT
  rationale: En este contexto el término alude a dolores intensos, específicamente de parto por la cláusula final. «Los dolores» funciona bien en español y deja que la comparación posterior especifique la imagen obstétrica.
- source_word: חִיל
  english_pob_choice: pain
  chosen_spanish: dolor
  alternatives_spanish:
  - angustia
  - retorcimiento
  lexicon: HALOT
  rationale: El sustantivo sugiere dolor/temblor/angustia; «dolor» es la opción más natural en español y funciona en paralelo con «los dolores». Se conserva la densidad semántica sin volverlo demasiado técnico.
- source_word: כַּיֹּלֵדָה
  english_pob_choice: like that of a woman giving birth
  chosen_spanish: como de mujer que da a luz
  alternatives_spanish:
  - como de mujer en parto
  - como de una parturienta
  lexicon: HALOT
  rationale: La comparación explícita debe mantenerse sin suavizarse. «Como de mujer que da a luz» es digna, clara y fiel al símil de parto; evita un registro excesivamente médico o arcaico.
theological_decisions:
- issue: Imagen de seguridad real/política en el Líbano y los cedros
  english_pob_reading: Lebanon and the cedars likely evoke the royal palace built with cedar from Lebanon, portraying Judah's rulers as dwelling in lofty security.
  chosen_spanish_reading: El texto conserva la imagen de altura, refugio y seguridad sugerida por Líbano y los cedros, sin explicitar en el cuerpo principal la identificación con el palacio real.
  alternative_spanish_readings:
  - Líbano y los cedros evocan el palacio real construido con cedro del Líbano.
  - Líbano y los cedros pueden leerse como metáfora de seguridad elevada.
  rationale: La lectura del POB es una observación cultural importante, pero no debe imponerse en la línea principal si el hebreo permite mantener la imagen abierta. El español conserva la metáfora sin cerrarla, y la nota puede explicar la alusión histórica.
  doctrine_reference: No doctrinal issue; cultural-historical reading only.
- issue: 'Valor de נֵּחַנְתְּ: gemir vs. ser compadecida'
  english_pob_reading: you will groan / or, be pitied
  chosen_spanish_reading: gemirás
  alternative_spanish_readings:
  - serás compadecida
  - serás lamentada
  rationale: La forma hebrea es ambigua y el POB mantiene esa tensión con una nota alternativa. En español, «gemirás» sigue la lectura principal más natural con el contexto de dolores de parto, mientras que la nota preserva la alternativa de compasión para no borrar la dificultad textual.
  doctrine_reference: No doctrinal issue; lexical ambiguity only.
translation_notes:
  revision_awareness: 'La versión inglesa POB vigente fue revisada recientemente sin cambios textuales, con acuerdo alto entre revisores. Este borrador español sigue esa lectura estable y conserva la única tensión lexical señalada por el aparato: el valor difícil de נֵּחַנְתְּ. No se introdujeron revisiones interpretativas nuevas más allá de ajustar la sintaxis española para que sea natural y fiel al hebreo.'
  spanish_consistency_notes:
  - Se mantuvo la metáfora de residencia/anidación para ישבתי + מקננתי, evitando reemplazarla por un mero 'sentar' o por una paráfrasis explicativa.
  - Se conservó la ambigüedad del campo semántico de Líbano y cedros en el texto principal, con explicación cultural en nota.
  - Se usó un registro neutral y eclesialmente legible, evitando fórmulas tradicionales que oculten la imagen poética.
  - Se respetó la puntuación exclamativa para reflejar el valor retórico de מַה.
  - Se mantuvo el paralelismo entre «dolores» y «dolor» para reproducir el efecto de intensificación del hebreo.
