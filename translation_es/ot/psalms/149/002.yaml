translation:
  language: es
  text: ¡Que Israel se alegre en su Hacedor[a]; que los hijos de Sión exulten en su Rey[b]!
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: La forma hebrea es plural, «sus hacedores»; aquí suele entenderse como referencia singular a Dios como Hacedor de Israel.
    reason: lexical_alternative
  - marker: b
    text: O «en su rey», si se toma como referencia a un rey humano y no a Dios.
    reason: alternative_reading
lexical_decisions:
- source_word: יִשְׂמַח
  english_pob_choice: Let Israel rejoice
  chosen_spanish: ¡Que Israel se alegre!
  alternatives_spanish:
  - Que Israel se regocije
  - Que Israel goce
  lexicon: HALOT
  rationale: El qal imperfecto funciona aquí con valor exhortativo en el paralelismo poético; en español, «Que... se alegre» comunica bien la invitación/jussivo sin sonar mecánico.
- source_word: יִשְׂרָאֵל
  english_pob_choice: Israel
  chosen_spanish: Israel
  alternatives_spanish:
  - el pueblo de Israel
  lexicon: HALOT
  rationale: Nombre propio del pueblo del pacto; se conserva sin adaptación.
- source_word: בְּעֹשָׂיו
  english_pob_choice: in his Maker
  chosen_spanish: en su Hacedor
  alternatives_spanish:
  - en sus hacedores
  - en Aquel que lo hizo
  lexicon: HALOT
  rationale: Se mantiene el sentido relacional de ב en «en». Aunque la forma hebrea es plural con sufijo, el contexto favorece entender a Dios como creador de Israel; «Hacedor» preserva la referencia singular natural en español y la tensión del plural queda documentada en nota.
- source_word: בְּנֵי צִיּוֹן
  english_pob_choice: the sons of Zion
  chosen_spanish: los hijos de Sion
  alternatives_spanish:
  - los hijos de Siòn
  - la gente de Sion
  lexicon: HALOT
  rationale: «Hijos de Sion» es una reproducción transparente de la construcción hebrea y conserva el valor corporativo masculino del original, tal como reflejó la POB inglesa.
- source_word: יָגִילוּ
  english_pob_choice: let ... exult
  chosen_spanish: exulten
  alternatives_spanish:
  - se alegren
  - se regocijen
  lexicon: HALOT
  rationale: «Exultar» conserva el matiz de júbilo elevado y festivo mejor que un simple «alegrarse», manteniendo la fuerza poética del paralelo.
- source_word: בְמַלְכָּם
  english_pob_choice: in their King
  chosen_spanish: en su Rey
  alternatives_spanish:
  - en su rey
  - en su monarca
  lexicon: HALOT
  rationale: «Rey» traduce literalmente el sustantivo y, como en la POB inglesa, la mayúscula inicial señala la lectura divina más probable en el contexto, sin eliminar la posibilidad alternativa de un rey humano.
theological_decisions:
- issue: Referente de «su Rey»
  english_pob_reading: God is the king in view
  chosen_spanish_reading: Dios es el Rey en vista
  alternative_spanish_readings:
  - un rey humano de Israel
  - el rey de Israel en un contexto litúrgico/real
  rationale: El paralelismo con «su Hacedor» favorece fuertemente una referencia divina. Se conserva «su Rey» en el texto principal y se documenta la lectura alternativa para no borrar la ambigüedad reconocida por el audit trail.
  doctrine_reference: Preservar la tensión textual y la decisión interpretativa basada en el contexto inmediato.
- issue: Número implícito en בְּעֹשָׂיו
  english_pob_reading: singular 'Maker' despite plural Hebrew form
  chosen_spanish_reading: singular 'Hacedor' pese a la forma plural hebrea
  alternative_spanish_readings:
  - plural 'hacedores'
  - «los que lo hicieron»
  rationale: Aunque el hebreo presenta una forma plural, el uso suele entenderse de manera singular/intensiva aplicado a Dios. «Hacedor» evita sugerir pluralidad de dioses y encaja con el paralelismo con «Rey».
  doctrine_reference: Primacía del sentido original con documentación de la ambigüedad morfológica.
translation_notes:
  revision_awareness: 'Se siguió el audit trail inglés sin copiarlo mecánicamente: se mantuvo la fuerza exhortativa del verbo inicial, se conservó la construcción hebrea «hijos de Sion», y se documentó la tensión interpretativa de בְּעֹשָׂיו y בְמַלְכָּם sin resolverla de forma indiscriminada.'
  spanish_consistency_notes:
  - Se usa «Sion» de manera consistente como forma española habitual en contextos bíblicos.
  - Se prefirió «Hacedor» para reflejar la lectura singular divina y la relación creadora, manteniendo la nota sobre el plural hebreo.
  - La mayúscula en «Rey» sigue la convención POB para señalar la lectura divina probable sin eliminar la alternativa textual.
