- from: Un fuego continuo[a] arderá sobre el altar; no se apagará.
  to: Un fuego continuo será mantenido encendido sobre el altar[a]; no se apagará.
  rationale: Se revisa «arderá» a «será mantenido encendido» para representar mejor la fuerza pasiva/causativa-pasiva de תּוּקַד en un contexto cultual prescriptivo, en línea con el rastro de auditoría inglés. Se conserva la claridad del español y la alternativa léxica «perpetuo».
