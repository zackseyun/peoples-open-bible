theological_decisions:
- issue: Purity comparison in v.9
  chosen_reading: Such people are like hares, because they are half clean, but in truth they are unclean.
  alternative_readings:
  - Such people are like the hare, which seems clean in part yet is unclean.
  - Such people are like split-sign animals, outwardly mixed in purity status.
  rationale: The comparison likely alludes to Jewish food-law categories in which the hare displays one sign associated with cleanness but remains unclean. The translation keeps the direct simile and leaves the cultural logic to a note rather than expanding it in the main text.
  doctrine_reference: Preserve theological tension rather than resolve it; use notes for cultural clarification.
- issue: Fragmentary close of v.10 in the provided Greek
  chosen_reading: For God also, in the tablets of the commandments, has declared it so.
  alternative_readings:
  - For God also has made this plain in the tablets of the commandments.
  - For even God, in the tablets of the commandments, speaks in this way.
  rationale: The source excerpt breaks off after ἐν ταῖς..., but the chapter's logic and standard textual continuation support a reference to the commandment tablets. The rendering is kept restrained and flagged as textually incomplete in a note.
  doctrine_reference: Translate the Greek witness honestly and be transparent where the text is incomplete.
