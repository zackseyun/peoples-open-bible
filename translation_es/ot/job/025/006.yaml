translation:
  language: es
  text: ¡Cuánto menos el hombre[a], que es una larva, y el hijo del hombre[b], que es un gusano!
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «mortal», para «hombre»; אֱנוֹשׁ suele destacar la fragilidad humana.
    reason: lexical_alternative
  - marker: b
    text: Hebreo «el hijo del hombre», expresión poética para un ser humano aquí, no un título mesiánico.
    reason: cultural_note
lexical_decisions:
- source_word: אַף כִּי
  english_pob_choice: how much less
  chosen_spanish: ¡cuánto menos
  alternatives_spanish:
  - ¡mucho menos
  - ¡con mayor razón no
  lexicon: HALOT
  rationale: La expresión introduce el argumento a fortiori de Bildad. En español, «cuánto menos» comunica con naturalidad esa inferencia de menor a mayor/menor posibilidad mejor que una calca como «cómo menos». Incluyo signo exclamativo para reflejar la fuerza retórica del hebreo.
- source_word: אֱנוֹשׁ
  english_pob_choice: man
  chosen_spanish: el hombre
  alternatives_spanish:
  - el mortal
  - el ser humano
  lexicon: HALOT
  rationale: En este paralelismo poético, el sustantivo resalta la fragilidad humana. «El hombre» conserva la referencia singular representativa y funciona bien en español bíblico actual; «el mortal» explicita la fragilidad, pero añade un matiz no necesario en el texto base.
- source_word: רִמָּה
  english_pob_choice: maggot
  chosen_spanish: una lombriz
  alternatives_spanish:
  - un gusano
  - una larva
  lexicon: HALOT
  rationale: El término apunta a un animal asociado con descomposición. En español, «lombriz» o «gusano» son las opciones más naturales; «lombriz» diferencia mejor este primer miembro del paralelismo del siguiente término hebreo, que usa una palabra distinta.
- source_word: בֶן אָדָם
  english_pob_choice: the son of man
  chosen_spanish: el hijo del hombre
  alternatives_spanish:
  - un hijo de hombre
  - un ser humano
  lexicon: HALOT
  rationale: Conservo la forma literal para respetar la textura poética del hebreo y la correspondencia con la expresión inglesa auditada. Aquí no tiene sentido titular o mesiánico; el contexto la usa como paralelismo de «אֱנוֹשׁ» para referirse a un ser humano.
- source_word: תּוֹלֵעָה
  english_pob_choice: worm
  chosen_spanish: un gusano
  alternatives_spanish:
  - una lombriz
  - una larva
  lexicon: HALOT
  rationale: «Gusano» es el equivalente español más natural y mantiene la distinción con רִמָּה si se traduce este último como «lombriz». Así se preserva el paralelismo sin aplanar ambos sustantivos en una sola palabra.
theological_decisions:
- issue: Sentido de «hijo del hombre» en Job 25:6
  english_pob_reading: non-titular poetic idiom for a human being
  chosen_spanish_reading: expresión poética no titular para un ser humano
  alternative_spanish_readings:
  - título mesiánico
  - expresión literal que podría sonar cristológica
  rationale: Aquí בֶן־אָדָם está en paralelo con אֱנוֹשׁ y describe la pequeñez/fraqueza humana; no introduce un título mesiánico. Por eso la traducción conserva la forma literal pero la nota aclara su valor idiomático en este contexto.
  doctrine_reference: 'DOCTRINE.md: Translate titles; transliterate names; and preserve source-text meaning without importing doctrinal claims.'
translation_notes:
  revision_awareness: 'El contexto inmediato de Job 25:6 continúa el argumento a fortiori de Bildad: si aun los seres celestiales no son puros ante Dios, con mayor razón la humanidad frágil no lo es. La versión española mantiene esa fuerza inferencial y distingue los dos sustantivos hebreos de la forma más audible posible en español.'
  spanish_consistency_notes:
  - Se conserva «hijo del hombre» de manera literal, pero la nota impide una lectura titular no apoyada por el contexto.
  - «Lombriz» y «gusano» se usan para distinguir רִמָּה y תּוֹלֵעָה sin borrar la imagen de corrupción/decaimiento.
  - «Cuánto menos» refleja mejor la relación lógica de אַף כִּי que una traducción más neutral.
