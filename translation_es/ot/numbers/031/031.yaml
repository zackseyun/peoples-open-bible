translation:
  language: es
  text: Moisés y Eleazar el sacerdote hicieron tal como Yahvé había mandado a Moisés[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: “YHWH”; tradicionalmente traducido “el SEÑOR”.'
    reason: alternative_reading
lexical_decisions:
- source_word: וַיַּעַשׂ
  english_pob_choice: did
  chosen_spanish: hicieron
  alternatives_spanish:
  - actuaron
  - llevaron a cabo
  lexicon: HALOT
  rationale: El verbo עשה resume la obediencia al mandato previo. En español, «hicieron» conserva la sencillez y la naturalidad del inglés POB «did», sin añadir matices que el hebreo no exige.
- source_word: מֹשֶׁה
  english_pob_choice: Moses
  chosen_spanish: Moisés
  alternatives_spanish:
  - Moisés
  lexicon: nombre propio
  rationale: Nombre propio transliterado según la forma usual en español bíblico.
- source_word: וְאֶלְעָזָר
  english_pob_choice: and Eleazar
  chosen_spanish: y Eleazar
  alternatives_spanish:
  - y Eleazar
  lexicon: nombre propio
  rationale: Conjunción simple más nombre propio transliterado; se conserva la coordinación directa del hebreo.
- source_word: הַכֹּהֵן
  english_pob_choice: the priest
  chosen_spanish: el sacerdote
  alternatives_spanish:
  - el sacerdote
  - el sumo sacerdote
  lexicon: HALOT
  rationale: El hebreo usa un título apposicional que identifica a Eleazar. «El sacerdote» mantiene el rol formal sin introducir un rango más específico que el texto no expresa.
- source_word: כַּאֲשֶׁר
  english_pob_choice: as
  chosen_spanish: conforme a lo que
  alternatives_spanish:
  - como
  - según
  lexicon: HALOT
  rationale: La construcción expresa conformidad con una instrucción. «Conforme a lo que» comunica de manera clara la idea de actuación en acuerdo con el mandato, sin volverla rígidamente literal.
- source_word: צִוָּה
  english_pob_choice: had commanded
  chosen_spanish: había mandado
  alternatives_spanish:
  - había ordenado
  - mandó
  lexicon: HALOT
  rationale: El mandato antecede a la acción; el pluscuamperfecto español refleja bien esa secuencia. «Mandado» conserva el valor directo de orden divina sin suavizarlo.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahvé
  lexicon: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
  rationale: Se conserva el nombre divino en transliteración. En español, «Yahvé» es la forma de destino establecida para reflejar el Tetragrámaton, evitando la sustitución por un título.
- source_word: אֶת מֹשֶׁה
  english_pob_choice: Moses
  chosen_spanish: a Moisés
  alternatives_spanish:
  - a Moisés
  lexicon: gramática hebrea / acusativo marcado
  rationale: El marcador de objeto directo no se traduce, pero en español debe explicitarse con la preposición «a» ante persona. Se mantiene el referente personal de forma natural.
theological_decisions:
- issue: Renderización del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahvé
  - SEÑOR
  rationale: El texto hebreo usa directamente el Tetragrammaton. La traducción española preserva el nombre propio divino como «Yahvé», en línea con la decisión doctrinal de no ocultarlo tras una sustitución litúrgica.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
translation_notes:
  revision_awareness: 'El texto hebreo y el audit trail inglés están en alto acuerdo: la cláusula expresa obediencia simple y secuencial. No se requieren revisiones textuales ni variantes críticas; solo se adapta la sintaxis española para una lectura natural sin perder la relación «como había mandado Yahvé a Moisés».'
  spanish_consistency_notes:
  - Se usa «Yahvé» de manera consistente para el Tetragramatón.
  - Se mantiene «el sacerdote» como título funcional de Eleazar, sin expandirlo a una categoría no indicada por el hebreo.
  - La construcción con pluscuamperfecto («había mandado») refleja la anterioridad del mandato respecto de la acción.
