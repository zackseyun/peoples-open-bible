revisions:
- from: En aquel día se te abrirá la boca cuando venga a ti el fugitivo[a], y hablarás y no volverás a quedar mudo. Así serás para ellos una señal, y sabrán que yo soy Yahvé.
  to: En aquel día se te abrirá la boca cuando el fugitivo llegue a ti[a], y hablarás y ya no estarás mudo. Así serás para ellos una señal, y sabrán que yo soy Yahvé.
  rationale: Se ajusta la cláusula del fugitivo a un español más natural y se corrige la expresión sobre la mudez para reflejar con mayor precisión עוֹד sin añadir el matiz de 'volver a'. Se conservan el nombre divino 'Yahvé', 'señal' para מוֹפֵת y la nota sobre la dificultad de אֶת הַפָּלִיט.
