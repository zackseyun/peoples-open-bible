base_translation:
  language: en
  yaml_path: translation/ot/amos/002/011.yaml
  text: And I raised up some of your sons to be prophets[a], and some of your young men to be Nazirites. Is this not so[b], O sons of Israel? declares Yahweh.
  footnotes:
