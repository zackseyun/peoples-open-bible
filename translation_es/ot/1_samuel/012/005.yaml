translation:
  language: es
  text: 'Y les dijo[a]: «Yahvé es testigo contra ustedes, y su ungido[b] es testigo en este día, de que no han hallado nada en mi mano». Y ellos dijeron[c]: «Él es testigo».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Más literalmente: «Yahvé es testigo entre/con ustedes». En este contexto, el sentido es forense: Yahvé queda como testigo en el caso relativo a ellos.'
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «su ungido», referido aquí al rey (Saúl), no directamente al título mesiánico posterior.'
    reason: cultural_note
  - marker: c
    text: El verbo hebreo final está en singular («y dijo»), pero aquí funciona como respuesta colectiva; por eso se traduce «ellos dijeron».
    reason: textual_variant
lexical_decisions:
- source_word: עֵד
  english_pob_choice: witness
  chosen_spanish: testigo
  alternatives_spanish:
  - testimonio
  - testigo presencial
  lexicon: HALOT
  rationale: En este contexto forense, el sustantivo hebreo designa a una persona que da testimonio. «Testigo» conserva el valor jurídico mejor que una forma abstracta como «testimonio».
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  lexicon: HALOT
  rationale: El Tetragrama se vierte con el nombre divino «Yahvé», conforme al criterio del proyecto para preservar el nombre propio y no sustituirlo por un título.
- source_word: בָּכֶם
  english_pob_choice: against you
  chosen_spanish: contra ustedes
  alternatives_spanish:
  - entre ustedes
  - con ustedes
  lexicon: HALOT
  rationale: Con «testigo» en un marco legal, la preposición se entiende mejor de manera forense como «contra ustedes». En español, «contra» comunica con claridad la función acusatoria o vindicativa del testigo en el caso.
- source_word: מְשִׁיחוֹ
  english_pob_choice: his anointed
  chosen_spanish: su ungido
  alternatives_spanish:
  - su Mesías
  - su rey ungido
  lexicon: HALOT
  rationale: Aquí el referente inmediato es Saúl, el rey recién establecido. «Ungido» preserva el sentido léxico de מָשִׁיחַ sin importar el título mesiánico posterior al texto.
- source_word: הַיּוֹם הַזֶּה
  english_pob_choice: this day
  chosen_spanish: en este día
  alternatives_spanish:
  - hoy
  lexicon: HALOT
  rationale: La expresión formula una declaración pública solemne. «En este día» conserva mejor el tono formal que «hoy», aunque ambas sean posibles.
- source_word: מְצָאתֶם
  english_pob_choice: have found
  chosen_spanish: han hallado
  alternatives_spanish:
  - han encontrado
  - hallaron
  lexicon: HALOT
  rationale: El perfecto hebreo se expresa naturalmente con el pretérito perfecto en español. «Hallado» mantiene el matiz de comprobación resultante del examen realizado.
- source_word: בְּיָדִי
  english_pob_choice: in my hand
  chosen_spanish: en mi mano
  alternatives_spanish:
  - en mi poder
  - en mi posesión
  lexicon: HALOT
  rationale: Se conserva el idiomático «mano» porque el hebreo usa una imagen concreta de posesión o control, y en español sigue siendo comprensible y sobria.
- source_word: מְאוּמָה
  english_pob_choice: nothing
  chosen_spanish: nada
  alternatives_spanish:
  - nada en absoluto
  - ni una cosa
  lexicon: HALOT
  rationale: En combinación con la negación, el término equivale a «nada». Es la forma más natural y fiel en español.
- source_word: וַיֹּאמֶר ... וַיֹּאמֶר
  english_pob_choice: he said ... they said
  chosen_spanish: Y dijo ... Y ellos dijeron
  alternatives_spanish:
  - Y dijo ... y dijo
  - Y respondió ... y respondieron
  lexicon: HALOT
  rationale: Se mantiene la distinción del verbo inicial singular y se resuelve de modo contextual el segundo singular de MT como respuesta colectiva, tal como lo hace la tradición de traducción del POB en inglés.
theological_decisions:
- issue: Referente de מְשִׁיחוֹ en un contexto real no mesiánico
  english_pob_reading: his anointed
  chosen_spanish_reading: su ungido
  alternative_spanish_readings:
  - su Mesías
  - su Cristo
  rationale: El contexto inmediato habla del rey presente, no del título escatológico. «Su ungido» conserva la tensión entre el sentido histórico-royal y la resonancia posterior del término sin cargarlo de una lectura cristológica ajena al pasaje.
  doctrine_reference: 'DOCTRINE.md: translate titles; preserve source-text sense over tradition'
- issue: Lectura forense de עֵד יְהוָה בָּכֶם
  english_pob_reading: Yahweh is witness against you
  chosen_spanish_reading: Yahvé es testigo contra ustedes
  alternative_spanish_readings:
  - Yahvé es testigo entre ustedes
  - Yahvé es testigo con ustedes
  rationale: El contexto es una vindicación pública en el caso de Samuel. «Contra ustedes» expresa el valor judicial que el POB ya explicitó en su nota inglesa, sin borrar que la forma hebrea pueda sonar literalmente como «entre/con ustedes».
  doctrine_reference: 'DOCTRINE.md: preserve legal/covenantal force when present'
translation_notes:
  revision_awareness: 'Se revisó el ajuste solicitado por validación: los marcadores de nota se integraron explícitamente en el texto español en los tres puntos correspondientes, y se mantuvo la lectura forense y la distinción singular/colectiva del cierre conforme al audit trail inglés.'
  spanish_consistency_notes:
  - Se usa «Yahvé» de manera consistente para el Tetragrama.
  - Se mantiene «ungido» en lugar de «Mesías» para el referente real inmediato.
  - Se conserva el idiomatismo «en mi mano» como reflejo del hebreo.
  - Se ha evitado introducir una paraphrasis devocional que debilite el marco jurídico del versículo.
