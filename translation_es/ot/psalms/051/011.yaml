translation:
  language: es
  text: Oculta tu rostro de mis pecados, y borra todas mis iniquidades[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Iniquidades» traduce un término que también puede implicar «culpa».
    reason: lexical_alternative
lexical_decisions:
- source_word: הַסְתֵּר
  english_pob_choice: Hide
  chosen_spanish: Oculta
  alternatives_spanish:
  - Esconde
  - Aparta
  lexicon: HALOT
  rationale: El imperativo pide que Dios no mire favorablemente el pecado del salmista. «Oculta» conserva la fuerza concreta de la imagen sin sonar tan áspero como un calco literal.
- source_word: פָּנֶיךָ
  english_pob_choice: your face
  chosen_spanish: tu rostro
  alternatives_spanish:
  - tu cara
  - tu presencia
  lexicon: HALOT
  rationale: «Rostro» reproduce la imagen hebrea de פנים con dignidad literaria en español. «Presencia» explica el sentido, pero borra la metáfora corporal que el texto conserva.
- source_word: מֵחֲטָאָי
  english_pob_choice: from my sins
  chosen_spanish: de mis pecados
  alternatives_spanish:
  - de mis faltas
  - de mis ofensas
  lexicon: HALOT
  rationale: Se eligió «pecados» porque es el equivalente más natural y directo de חטא en este contexto penitencial. El español usa con frecuencia «de» tras verbos de ocultar/alejar para expresar la relación equivalente al hebreo מִן.
- source_word: וְכָל
  english_pob_choice: and all
  chosen_spanish: y todas
  alternatives_spanish:
  - y todos
  - y cada una de
  lexicon: HALOT
  rationale: El hebreo intensifica la totalidad; en español, «todas» concuerda con «iniquidades» y preserva el matiz de totalidad sin sobrerreformular.
- source_word: עֲוֺנֹתַי
  english_pob_choice: my iniquities
  chosen_spanish: mis iniquidades
  alternatives_spanish:
  - mi culpa
  - mis maldades
  lexicon: HALOT
  rationale: Se mantiene «iniquidades» para conservar la distinción léxica respecto de חטא. En español, «culpa» explicita una posible carga semántica, pero pierde la correspondencia verbal y poética con el segundo miembro.
- source_word: מְחֵה
  english_pob_choice: blot out
  chosen_spanish: borra
  alternatives_spanish:
  - bórralas
  - tacha
  lexicon: HALOT
  rationale: «Borra» comunica bien la imagen de eliminar de un registro. Aunque «borrar» no reproduce literalmente la metáfora de «blot out», en español es el verbo más natural y auditable para el acto de remover completamente la culpa.
theological_decisions:
- issue: Distinción entre dos vocablos de pecado
  english_pob_reading: Render חטא as 'sins' and עון as 'iniquities' in the same verse
  chosen_spanish_reading: Renderizar חטא como «pecados» y עון como «iniquidades»
  alternative_spanish_readings:
  - Traducir ambos como «pecados»
  - Traducir עון como «culpa»
  rationale: El hebreo usa dos términos distintos en paralelismo poético. Mantener la diferencia en español preserva la intensificación y evita aplanar el matiz lexical documentado por la POB inglesa.
  doctrine_reference: Translation philosophy §5 (consistency of key terms, or documented exception)
- issue: Imagen de juicio/registro en מְחֵה
  english_pob_reading: blot out
  chosen_spanish_reading: «borra»
  alternative_spanish_readings:
  - «borra completamente»
  - «elimina»
  rationale: La petición no solo pide perdón abstracto sino la remoción efectiva de la carga del pecado. «Borra» conserva la idea de quitar del registro, de modo idiomático en español.
  doctrine_reference: 'Salmos penitenciales: lenguaje de remoción de culpa y cancelación de deuda/registro'
translation_notes:
  revision_awareness: No se registran revisiones aplicadas en el audit trail inglés; el texto español sigue la lectura estable y conserva la distinción léxica entre חטא y עון, ajustando solo el verbo final a un español natural y fiel.
  spanish_consistency_notes:
  - Se mantiene «Dios» solo donde el texto lo requeriría; aquí el verso usa una segunda persona implícita y no nombra a Dios.
  - Se preserva la metáfora corporal de «rostro» en lugar de explicitar «presencia».
  - Se conserva la separación entre «pecados» e «iniquidades» para reflejar el paralelismo hebreo.
  - La puntuación sigue el tono peticionario del salmo y evita añadir explicación al cuerpo del verso.
