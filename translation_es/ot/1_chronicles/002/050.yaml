translation:
  language: es
  text: 'Estos fueron los hijos de Caleb, hijo de Hur, el primogénito de Efrata: Sobal, padre[a] de Quiriat-jearim.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'fundador de Quiriat-jearim' o 'antepasado de Quiriat-jearim'; el hebreo 'padre de' puede designar en contextos genealógicos al fundador de un clan o asentamiento.
    reason: lexical_alternative
lexical_decisions:
- source_word: אֵלֶּה הָיוּ
  english_pob_choice: These were
  chosen_spanish: Estos fueron
  alternatives_spanish:
  - Estos son
  - Éstos fueron
  lexicon: HALOT
  rationale: La forma demostrativa plural más el perfecto se vierte naturalmente en pasado narrativo en español, manteniendo el sentido de introducción genealógica sin forzar un presente que sonaría menos natural.
- source_word: בְּנֵי
  english_pob_choice: sons of
  chosen_spanish: los hijos de
  alternatives_spanish:
  - los descendientes de
  - los hijos
  lexicon: HALOT
  rationale: En español, 'hijos de' conserva el paralelismo literal de la genealogía hebrea y sigue siendo claro. 'Descendientes de' sería posible, pero diluye la correspondencia formal con el hebreo.
- source_word: כָלֵב
  english_pob_choice: Caleb
  chosen_spanish: Caleb
  alternatives_spanish:
  - Caleb
  lexicon: HALOT
  rationale: Nombre propio transliterado de manera estándar y reconocible en español bíblico.
- source_word: בֶּן חוּר
  english_pob_choice: son of Hur
  chosen_spanish: hijo de Hur
  alternatives_spanish:
  - descendiente de Hur
  lexicon: HALOT
  rationale: La construcción de parentesco se mantiene con 'hijo de' para preservar la forma hebrea. 'Descendiente de' sería menos literal y menos transparente al texto fuente.
- source_word: בְּכֹר אֶפְרָתָה
  english_pob_choice: the firstborn of Ephrathah
  chosen_spanish: el primogénito de Efrata
  alternatives_spanish:
  - el primer nacido de Efrata
  - el primogénito de Efratá
  lexicon: HALOT
  rationale: '''Primogénito'' comunica con precisión el valor de בְּכֹר. Se conserva Efrata como nombre propio, siguiendo el tratamiento del inglés POB y evitando reinterpretarla como topónimo común.'
- source_word: שׁוֹבָל
  english_pob_choice: Shobal
  chosen_spanish: Sobal
  alternatives_spanish:
  - Shobal
  lexicon: HALOT
  rationale: Se adopta una transliteración española naturalizada con 'S' inicial, corriente en castellano bíblico, sin añadir adaptación interpretativa.
- source_word: אֲבִי
  english_pob_choice: father of
  chosen_spanish: padre de
  alternatives_spanish:
  - fundador de
  - antepasado de
  lexicon: HALOT
  rationale: Se mantiene la locución genealógica literal. En este contexto, 'padre de' puede incluir la idea de fundador o progenitor, por lo que conservarla evita borrar la ambigüedad lexical documentada.
- source_word: קִרְיַת יְעָרִים
  english_pob_choice: Kiriath-jearim
  chosen_spanish: Quiriat-jearim
  alternatives_spanish:
  - Kiriat-jearim
  - Ciudad de bosques
  lexicon: HALOT
  rationale: Se translitera el topónimo en forma española habitual. No se traduce como 'Ciudad de bosques' porque el POB inglés también lo trata como nombre propio y no como significado léxico en el texto principal.
theological_decisions:
- issue: Alcance de 'padre de' en un contexto genealógico/toponímico
  english_pob_reading: '''father of'' can denote a clan or settlement founder in genealogical contexts.'
  chosen_spanish_reading: '''padre de'' conserva el hebraísmo y permite la lectura de progenitor, jefe de clan o fundador sin fijar una sola opción.'
  alternative_spanish_readings:
  - fundador de
  - antepasado de
  rationale: El hebreo אָב en genealogías puede ir más allá de la paternidad biológica. Mantener la fórmula literal en español preserva la tensión semántica documentada por el POB inglés y deja abierta la posibilidad de fundación o ascendencia.
  doctrine_reference: Uso genealógico de אָב en textos del Antiguo Testamento; no implica una afirmación doctrinal adicional.
translation_notes:
  revision_awareness: Se ha seguido el estado de revisión más reciente sin cambios sustantivos, pero se ha ajustado la formulación al español para mantener la literalidad funcional de la genealogía y la ambigüedad de 'padre de' documentada en el audit trail inglés.
  spanish_consistency_notes:
  - Se usa 'Yahvé' por defecto en el proyecto, pero este versículo no contiene el nombre divino.
  - '''Primogénito'' se eligió para reflejar בְּכֹר con naturalidad en español.'
  - Se mantuvo la ambigüedad de 'padre de' mediante nota, en lugar de sustituirla por una sola interpretación.
  - Los nombres propios se transliteran con ortografía española convencional cuando existe uso asentado.
