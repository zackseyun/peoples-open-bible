translation:
  language: es
  text: 'Ahora había allí un profeta de Yahvé,[a] cuyo nombre era Oded; y salió delante del ejército que llegaba a Samaria y les dijo: «He aquí,[b] porque Yahvé, el Dios de sus padres, estaba airado con Judá, los entregó en su mano, y ustedes los mataron con un furor que ha llegado hasta el cielo».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El nombre divino traduce aquí el Tetragrámaton יְהוָה como «Yahvé», conforme al estándar del proyecto.
    reason: source_note
  - marker: b
    text: «He aquí» traduce el hebreo הִנֵּה como llamada de atención solemne; también podría verterse «Miren» o «Vean» en un registro más coloquial.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְשָׁם
  english_pob_choice: Now there was ... there
  chosen_spanish: Ahora había allí
  alternatives_spanish:
  - Y había allí
  - Había allí
  lexicon: HALOT
  rationale: El hebreo abre una nueva escena con una localización explícita. «Ahora» conserva el valor discursivo de transición y «allí» mantiene la referencia espacial del texto.
- source_word: נָבִיא לַיהוָה
  english_pob_choice: a prophet of Yahweh / the LORD
  chosen_spanish: un profeta de Yahvé
  alternatives_spanish:
  - un profeta para Yahvé
  - un profeta perteneciente a Yahvé
  lexicon: HALOT
  rationale: La relación expresada por לַיהוָה se vierte de manera natural como pertenencia o adscripción. Se usa «Yahvé» conforme al criterio del proyecto para el nombre divino.
- source_word: עֹדֵד שְׁמוֹ
  english_pob_choice: whose name was Oded
  chosen_spanish: cuyo nombre era Oded
  alternatives_spanish:
  - Oded se llamaba
  - de nombre Oded
  lexicon: HALOT
  rationale: Es una fórmula hebrea de identificación. «Cuyo nombre era» es formal y claro en español sin añadir matiz no presente.
- source_word: וַיֵּצֵא לִפְנֵי הַצָּבָא
  english_pob_choice: he went out before the army
  chosen_spanish: salió delante del ejército
  alternatives_spanish:
  - salió frente al ejército
  - salió al encuentro del ejército
  lexicon: HALOT
  rationale: לִפְנֵי indica estar delante/en presencia de. «Delante del ejército» conserva la imagen espacial sin convertirla en una interpretación más específica.
- source_word: הַבָּא לְשֹׁמְרוֹן
  english_pob_choice: that came to Samaria
  chosen_spanish: que venía a Samaria
  alternatives_spanish:
  - que llegaba a Samaria
  - que iba a Samaria
  lexicon: HALOT
  rationale: El participio describe al ejército en movimiento hacia Samaria. «Venía a Samaria» mantiene el sentido progresivo y es idiomático en español.
- source_word: הִנֵּה
  english_pob_choice: Behold
  chosen_spanish: Miren
  alternatives_spanish:
  - He aquí
  - Vean
  lexicon: HALOT
  rationale: Es un llamado de atención. En español moderno «Miren» es claro y conserva la función exhortativa sin arcaísmo excesivo.
- source_word: בַּחֲמַת יְהוָה
  english_pob_choice: because Yahweh ... was angry
  chosen_spanish: porque Yahvé, ... estaba airado
  alternatives_spanish:
  - en la ira de Yahvé
  - por el furor de Yahvé
  lexicon: HALOT
  rationale: La preposición con חֲמָה puede expresar causa o circunstancia. Se prefiere una construcción verbal causal que comunique el sentido del hebreo de forma natural en español.
- source_word: אֱלֹהֵי אֲבוֹתֵיכֶם
  english_pob_choice: the God of your fathers
  chosen_spanish: el Dios de sus padres
  alternatives_spanish:
  - el Dios de sus antepasados
  - el Dios de sus padres ancestrales
  lexicon: HALOT
  rationale: Es una fórmula de pacto y memoria histórica. «Sus padres» conserva el vínculo ancestral y la forma bíblica habitual.
- source_word: נְתָנָם בְּיֶדְכֶם
  english_pob_choice: he gave them into your hand
  chosen_spanish: los entregó en su mano
  alternatives_spanish:
  - los puso en su mano
  - los dio en su mano
  lexicon: HALOT
  rationale: «Entregar en la mano» es el equivalente español natural del idiomático «dar en manos de». Se conserva el singular «mano» para reflejar el hebreo.
- source_word: וַתַּהַרְגוּ בָם
  english_pob_choice: and you killed them
  chosen_spanish: y ustedes los mataron
  alternatives_spanish:
  - y ustedes los mataron a ellos
  - y los asesinaron
  lexicon: HALOT
  rationale: הרג se traduce con el verbo básico «matar», sin intensificarlo con un término más valorativo que el hebreo no exige por sí mismo. «Ustedes» explicita el sujeto plural implícito.
- source_word: בְזַעַף
  english_pob_choice: in a rage
  chosen_spanish: con furor
  alternatives_spanish:
  - en furia
  - airadamente
  lexicon: HALOT
  rationale: זַעַף denota ira/furia intensa. «Con furor» mantiene la carga emocional y la preposición instrumental/circunstancial del hebreo.
- source_word: עַד לַשָּׁמַיִם הִגִּיעַ
  english_pob_choice: that has reached to heaven
  chosen_spanish: hasta que llegó al cielo
  alternatives_spanish:
  - hasta el cielo llegó
  - que llegó hasta el cielo
  lexicon: HALOT
  rationale: La expresión hebrea señala una intensidad extrema que alcanza los cielos. «Hasta que llegó al cielo» conserva la imagen idiomática de forma comprensible en español.
theological_decisions:
- issue: Renderizar el Tetragrámaton יְהוָה
  english_pob_reading: Yahweh / the LORD
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - el Eterno
  rationale: El texto hebreo usa el nombre divino directamente. Conforme al criterio del proyecto, se mantiene el nombre propio «Yahvé» en el texto principal, sin enmascararlo con una convención litúrgica.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Fuerza causal de בַּחֲמַת יְהוָה
  english_pob_reading: because Yahweh ... was angry
  chosen_spanish_reading: porque Yahvé ... estaba airado
  alternative_spanish_readings:
  - en la ira de Yahvé
  - por el furor de Yahvé
  rationale: Se conserva la tensión entre la formulación nominal hebrea y su valor causal. El español verbaliza la causa sin borrar la referencia a la ira divina.
  doctrine_reference: Hebrew syntax of ב + noun of emotion; lexical note in English POB audit trail
- issue: Registro del cierre hiperbólico 'hasta los cielos'
  english_pob_reading: that has reached to heaven
  chosen_spanish_reading: hasta que llegó al cielo
  alternative_spanish_readings:
  - hasta el cielo
  - que subió hasta el cielo
  rationale: Se mantiene la hipérbole de alcance máximo sin suavizarla. «Cielo» en español comunica el ámbito celestial del hebreo y evita una traducción demasiado explicativa.
  doctrine_reference: Biblical idiom of extremity and divine notice
translation_notes:
  revision_awareness: 'El texto en inglés pasó de una formulación más libre con ''Look'' y ''but you have killed'' a una lectura más literal con ''Behold'' y ''and you killed'', además de ajustar el cierre a ''to heaven''. La presente versión española sigue esa revisión: evita introducir contraste con «pero», mantiene la coordinación simple con «y», y conserva la hipérbole final sin atenuarla.'
  spanish_consistency_notes:
  - Se usa «Yahvé» de manera consistente para יְהוָה, conforme al estándar del proyecto.
  - Se conserva la imagen de «mano» en singular para el idiomático hebreo «en su mano».
  - «Miren» se emplea por claridad moderna; la nota preserva la alternativa más formal «He aquí».
  - 'El participio hebreo se refleja con una construcción progresiva natural: «que venía a Samaria».'
