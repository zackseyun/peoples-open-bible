revisions:
- from: De generación en generación [a] proclamará tus obras, y anunciará tus poderosos hechos [b].
  to: Una generación alabará tus obras a otra[a], y declararán tus hechos poderosos[b].
  rationale: Se corrigió el sentido verbal de יְשַׁבַּח a «alabará», se reflejó el plural de יַגִּידוּ con «declararán», y se reformuló el primer hemistiquio para representar con naturalidad en español la relación «una generación a otra», preservando además la alternativa auditada. También se suavizó la expresión de גְּבוּרוֹתֶיךָ con una colocación más natural en español.
