translation:
  language: es
  text: Y establecieron para sí un consejo[a], y cada día deliberaban trescientos y veinte, tomando continuamente consejo acerca del pueblo, para mantenerse en buen orden.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «sobre la multitud ... para ordenarse bien». El griego puede verterse de manera más literal, pero el texto principal resalta el sentido cívico en el contexto.'
    reason: lexical_alternative
lexical_decisions:
- source_word: βουλευτήριον
  english_pob_choice: council
  chosen_spanish: consejo
  alternatives_spanish:
  - concilio
  - senado
  - cuerpo deliberativo
  lexicon: LSJ
  rationale: En este contexto institucional, βουλευτήριον designa un cuerpo deliberativo; «consejo» es natural en español y conserva el sentido de órgano consultivo sin introducir la carga histórica específica de «senado».
- source_word: ἐποίησαν ἑαυτοῖς
  english_pob_choice: they established for themselves
  chosen_spanish: establecieron para sí
  alternatives_spanish:
  - se hicieron
  - se instituyeron
  - lo constituyeron para sí
  lexicon: LSJ
  rationale: La construcción no es solo «hacer», sino establecer un organismo. «Establecieron para sí» reproduce el valor institucional que el audit trail inglés destacó.
- source_word: καθ' ἡμέραν
  english_pob_choice: every day
  chosen_spanish: cada día
  alternatives_spanish:
  - diariamente
  - día tras día
  lexicon: LSJ
  rationale: Expresa con naturalidad la iteración habitual del imperfecto y mantiene el ritmo temporal sencillo del griego.
- source_word: ἐβουλεύοντο
  english_pob_choice: would deliberate
  chosen_spanish: deliberaban
  alternatives_spanish:
  - tomaban consejo
  - consultaban
  - deliberaban continuamente
  lexicon: LSJ
  rationale: El imperfecto marca acción repetida o habitual; en español, el imperfecto simple «deliberaban» comunica esa continuidad sin sobrecargar la frase.
- source_word: τριακόσιοι καὶ εἴκοσι
  english_pob_choice: three hundred and twenty
  chosen_spanish: trescientos veinte
  alternatives_spanish:
  - trescientos y veinte
  lexicon: LSJ
  rationale: Correspondencia directa del numeral con la forma natural del español.
- source_word: βουλευόμενοι διὰ παντός
  english_pob_choice: continually taking counsel
  chosen_spanish: tomando continuamente consejo
  alternatives_spanish:
  - deliberando continuamente
  - consultando sin cesar
  lexicon: LSJ
  rationale: La combinación participio + διὰ παντός exige una idea de continuidad; «tomando continuamente consejo» conserva el matiz deliberativo y la duración continua, cerca del audit trail inglés.
- source_word: περὶ τοῦ πλήθους
  english_pob_choice: concerning the multitude
  chosen_spanish: acerca de la multitud
  alternatives_spanish:
  - sobre la multitud
  - respecto de la multitud
  - acerca del pueblo
  lexicon: LSJ
  rationale: «Multitud» sigue de cerca πλῆθος y evita interpretar demasiado pronto el referente como «pueblo» o «gente» en un sentido técnico distinto.
- source_word: τοῦ εὐκοσμεῖν ἑαυτούς
  english_pob_choice: to order themselves well
  chosen_spanish: para ordenarse bien
  alternatives_spanish:
  - para conducirse bien
  - para mantenerse en buen orden
  - para gobernarse bien
  lexicon: LSJ
  rationale: εὐκοσμέω aquí apunta a poner en buen orden más que a gobernar; «ordenarse bien» preserva la reflexividad y el sentido de buena organización, conforme a la revisión inglesa que prefirió «order themselves well».
translation_notes:
  revision_awareness: Se siguió la revisión más reciente del audit trail inglés, que ajustó el último miembro de «govern themselves well» a «order themselves well» para reflejar con más precisión εὐκοσμεῖν como poner en buen orden. También se mantuvo la lectura cívica de βουλευτήριον como órgano deliberativo.
  spanish_consistency_notes:
  - Se mantuvo «consejo» para βουλευτήριον en lugar de «senado», para no imponer una equivalencia institucional más fuerte que la del griego.
  - «Multitud» se conservó como equivalente de πλῆθος; la nota ofrece la alternativa «pueblo» porque el propio audit trail inglés la señaló como posible.
  - La frase final evita «gobernarse» para no desplazar el matiz de εὐκοσμεῖν hacia autoridad política; «ordenarse bien» sigue la revisión auditada.
