id: MAT.10.34
reference: Matthew 10:34
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: Μὴ νομίσητε ὅτι ἦλθον βαλεῖν εἰρήνην ἐπὶ τὴν γῆν· οὐκ ἦλθον βαλεῖν εἰρήνην ἀλλὰ μάχαιραν.
base_translation:
  language: en
  yaml_path: translation/nt/matthew/010/034.yaml
  text: 'Do not think that I came to bring peace on the earth[a]; I did not come to bring peace[b], but a sword.'
  footnotes:
  - marker: a
    text: Or 'I have come' instead of 'I came.'
    reason: lexical_alternative
  - marker: b
    text: The Greek says 'a sword'; in context this image points to division rather than commending violence.
    reason: lexical_alternative
translation:
  language: ko
  text: '내가 땅에 평화를 주러 왔다고 생각하지 말라. 나는 평화가 아니라 검을 주러 왔다.'
  philosophy: optimal-equivalence
theological_decisions:
- issue: 10:34의 「검」을 완화하지 않고 보존
  chosen_reading: 「나는 평화가 아니라 검을 주러 왔다」
  alternative_readings:
  - 「분쟁」 또는 「분열」로 풀이
  - 「상징적 검」으로 주해 보강
  rationale: 본문의 μάχαιραν은 문자적 「검」으로, 뒤따르는 35-37절(가족 분열, 부모·자식·형제보다 그리스도를 우선)로써 그 의미가 구체화된다. 한국 전통 번역도 「검」을 유지하며, 본문의 강도와 충격을 약화시키지 않도록 그대로 옮긴다.
  doctrine_reference: 'DOCTRINE.md: §5 본문이 가진 충격과 무게를 보존'
