  glossary_alignment: 'Alineación buena con las directrices del proyecto: אֱלֹהִים → «Dios»; no hay YHWH ni términos doctrinales controvertidos. Se preserva «Israel» y se evita una paráfrasis excesiva. No hay conflictos con el glosario principal.'
