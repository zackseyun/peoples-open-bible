review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura y el sentido del hebreo: las súplicas de Salomón y del pueblo, la oración orientada hacia el templo, y el hecho de que Dios oye desde su morada celestial y perdona. Sin embargo, la primera forma verbal hebrea וְשָׁמַעְתָּ es perfectiva/jusiva en secuencia petitoria y no corresponde a un presente indicativo español implícito en la decisión léxica; además, en el texto español conviene mantener una forma más natural y más cercana al inglés auditado: ''oye'' / ''escucha'' ... ''que oigas'' ... ''cuando oigas/escuches''. También ''desde los cielos'' suena más rígido que el singular idiomático ''desde el cielo'', que preserva el sentido sin perder fidelidad.'
  spanish_quality_summary: 'El español es generalmente claro y digno, pero ''Y que tú escuches'' suena algo forzado por el pronombre expreso, y ''desde el lugar de tu morada'' resulta pesado. ''Desde tu morada'' o ''desde tu morada, desde el cielo'' es más natural y sigue siendo fiel. La nota al pie actual no corresponde bien al lugar anclado: está marcada en ''morada'' pero ofrece una alternativa para la cláusula inicial. Eso debe corregirse eliminando la nota, ya que no hay una alternativa significativa que exija nota en español aquí.'
  glossary_alignment: No hay conflicto con la terminología principal del proyecto. 'Siervo' para עַבְדְּךָ está bien por el contexto de oración real. 'Súplicas' para תַּחֲנוּנֵי está bien. 'Cielo' es preferible a 'cielos' aquí por idiomaticidad española y porque el POB inglés ya documentó ese ajuste semántico estándar para הַשָּׁמַיִם.
  issues:
  - severity: medium
    issue: La nota al pie está mal anclada y no corresponde al contenido señalado en el texto.
    rationale: 'El marcador [a] aparece en ''morada'', pero la nota dice ''O: escucha las súplicas...'', que se refiere a la cláusula inicial, no a ''morada''. Esto incumple la disciplina de anclaje de notas.'
  - severity: medium
    issue: '''Y que tú escuches'' es poco natural en español.'
    rationale: El subjuntivo petitorio es correcto, pero el pronombre explícito 'tú' es innecesario y hace la frase más torpe sin aportar contraste presente en el hebreo.
  - severity: low
    issue: '''Desde el lugar de tu morada'' es demasiado pesado.'
    rationale: Aunque es fiel, 'desde tu morada' comunica mejor מִמְּקוֹם שִׁבְתְּךָ en español natural y reverente.
  - severity: low
    issue: '''Desde los cielos'' suena menos idiomático que ''desde el cielo'' en este contexto.'
    rationale: El hebreo plural שׁמים suele expresarse naturalmente en singular en español bíblico moderno. Aquí no se pierde ningún matiz relevante y mejora la fluidez.
  revised_spanish_text: Y oye las súplicas de tu siervo y de tu pueblo Israel cuando oren hacia este lugar. Y que oigas desde tu morada, desde el cielo, y cuando oigas, perdones.
  revision_rationale: Se corrige el anclaje erróneo de la nota eliminándola, se mejora la naturalidad española con 'que oigas' en vez de 'que tú escuches', se simplifica 'desde el lugar de tu morada' a 'desde tu morada', y se adopta 'desde el cielo' por idiomaticidad y por coherencia con la decisión auditada del POB sobre הַשָּׁמַיִם. Se mantiene la repetición del verbo para reflejar la estructura hebrea.
