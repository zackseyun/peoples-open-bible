translation:
  language: es
  text: Entonces Sofonías, el sacerdote, leyó este rollo[a] a oídos de Jeremías, el profeta.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Rollo» refleja mejor el hebreo סֵפֶר en esta escena, donde el escrito se presenta como un documento leído en voz alta; el inglés POB también revisó su primera opción de «letter» a «scroll».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּקְרָא
  english_pob_choice: read
  chosen_spanish: leyó
  alternatives_spanish:
  - leía
  - proclamó
  - recitó
  lexicon: HALOT
  rationale: El verbo en este contexto gobierna un objeto escrito; por eso en español natural y fiel se traduce como «leyó». El valor narrativo de la forma wayyiqtol se expresa con «Entonces».
- source_word: צְפַנְיָה
  english_pob_choice: Zephaniah
  chosen_spanish: Sofonías
  alternatives_spanish:
  - Zephanías
  - Zephanías
  lexicon: Convención bíblica española
  rationale: Se usa la forma española tradicional del nombre propio, que es transparente para lectores bíblicos en español y corresponde al personaje identificado en el hebreo.
- source_word: הַכֹּהֵן
  english_pob_choice: the priest
  chosen_spanish: el sacerdote
  alternatives_spanish:
  - el cura
  - el presbítero
  lexicon: HALOT
  rationale: El hebreo indica el oficio sacerdotal con artículo definido; «el sacerdote» conserva el valor titular sin introducir terminología eclesiástica posterior.
- source_word: הַסֵּפֶר הַזֶּה
  english_pob_choice: this scroll
  chosen_spanish: este rollo
  alternatives_spanish:
  - este libro
  - este documento
  - esta carta
  lexicon: HALOT
  rationale: Aunque el campo semántico de סֵפֶר incluye libro, documento y carta, la revisión inglesa optó por «scroll» para reflejar un escrito físico. En español, «rollo» comunica mejor esa materialidad que «libro», y mantiene abierta la referencia a un documento escrito sin forzar «carta», que en este versículo no está léxicamente explícita.
- source_word: בְּאָזְנֵי
  english_pob_choice: in the hearing of
  chosen_spanish: en presencia de
  alternatives_spanish:
  - a oídos de
  - en el oído de
  - delante de
  lexicon: HALOT
  rationale: La expresión idiomática hebrea literalmente dice «en los oídos de», con sentido de lectura audible ante alguien. «En presencia de» preserva la escena pública y resulta natural en español; se evita una calca demasiado literal.
- source_word: יִרְמְיָהוּ
  english_pob_choice: Jeremiah
  chosen_spanish: Jeremías
  alternatives_spanish:
  - Yeremías
  lexicon: Convención bíblica española
  rationale: Nombre propio en forma española estándar.
- source_word: הַנָּבִיא
  english_pob_choice: the prophet
  chosen_spanish: el profeta
  alternatives_spanish:
  - profeta
  lexicon: HALOT
  rationale: Se mantiene el título definido como aposición de Jeremías, como en el hebreo y en la auditoría inglesa.
translation_notes:
  revision_awareness: La auditoría inglesa registra una revisión importante en la que se reemplazó «letter» por «scroll» para reflejar con mayor precisión סֵפֶר. La versión española sigue esa revisión y evita interpretar el texto como «carta», aunque el contexto inmediato trate de una comunicación escrita.
  spanish_consistency_notes:
  - Se mantiene el orden narrativo simple con «Entonces» para reflejar el wayyiqtol hebreo.
  - Se conserva el artículo definido en los oficios y títulos («el sacerdote», «el profeta»).
  - Se usa «rollo» en lugar de «libro» para alinearse con la decisión revisada del POB inglés y con el objeto físico implicado por סֵפֶר.
  - «En presencia de» evita la calca de «en los oídos de» sin perder el sentido de audición pública.
