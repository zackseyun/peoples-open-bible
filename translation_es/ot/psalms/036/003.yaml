translation:
  language: es
  text: Porque se halaga ante sus propios ojos[a], demasiado como para hallar su iniquidad y odiarla.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más literalmente: «Porque se hace suave a sí mismo en sus ojos, para hallar su iniquidad, para odiar». El hebreo es difícil; el sentido es que el autohalago le impide reconocer y rechazar su pecado.'
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  lexicon: HALOT
  rationale: Introduce la relación causal o explicativa del versículo con el contexto anterior. En español, «Porque» conserva bien ese enlace y suena natural al inicio de la cláusula.
- source_word: הֶחֱלִיק
  english_pob_choice: flatters
  chosen_spanish: se halaga
  alternatives_spanish:
  - se adula
  - se suaviza
  lexicon: HALOT
  rationale: El verbo hebreo en hifil puede dar la idea de «hacer suave» y, en el contexto reflexivo, de auto-halago o auto-adulación. «Se halaga» mantiene la idea de autoengaño complaciente sin volver el texto mecánico.
- source_word: אֵלָיו
  english_pob_choice: himself
  chosen_spanish: se
  alternatives_spanish:
  - a sí mismo
  - para sí
  lexicon: HALOT
  rationale: La construcción hebrea funciona de modo reflexivo. En español, el reflexivo verbal ya expresa esa dirección hacia sí mismo; repetir «a sí mismo» haría la frase más pesada sin añadir precisión.
- source_word: בְּעֵינָיו
  english_pob_choice: in his own eyes
  chosen_spanish: en sus propios ojos
  alternatives_spanish:
  - a sus propios ojos
  - según su propia opinión
  lexicon: HALOT
  rationale: Se conserva la imagen idiomática hebrea de autoevaluación. «En sus propios ojos» es la forma más fiel y reconocible en español, y el adjetivo «propios» refuerza la idea de percepción subjetiva.
- source_word: לִמְצֹא
  english_pob_choice: to find
  chosen_spanish: hallar
  alternatives_spanish:
  - encontrar
  - descubrir
  lexicon: HALOT
  rationale: «Hallar» es una opción natural y sobria en español para el infinitivo hebreo, sin perder la idea de reconocimiento o detección moral que exige el contexto.
- source_word: עֲוֺנוֹ
  english_pob_choice: his iniquity
  chosen_spanish: su iniquidad
  alternatives_spanish:
  - su culpa
  - su maldad
  - su pecado
  lexicon: HALOT
  rationale: «Iniquidad» preserva el peso moral del sustantivo hebreo עָוֹן y coincide con la decisión auditada en inglés. «Culpa» o «pecado» suavizan o desplazan el matiz jurídico-moral.
- source_word: לִשְׂנֹא
  english_pob_choice: and hate it
  chosen_spanish: ni odiarla
  alternatives_spanish:
  - y odiarla
  - para odiarla
  lexicon: HALOT
  rationale: El infinitivo final expresa la respuesta moral esperada ante el hallazgo del mal. En español, «ni odiarla» mantiene la relación negativa con la cláusula anterior y evita forzar un «y» que en esta estructura resultaría menos fluido. El objeto implícito se refiere a «su iniquidad».
theological_decisions:
- issue: Sentido moral-psicológico del versículo
  english_pob_reading: 'The verse describes the wicked person''s self-deception: he flatters himself so that he does not recognize and hate his own sin.'
  chosen_spanish_reading: 'El versículo describe el autoengaño del impío: se halaga a sí mismo de modo que no reconoce ni aborrece su propio pecado.'
  alternative_spanish_readings:
  - Se halaga hasta no percibir su culpa ni odiarla
  - Se dice cosas suaves a sí mismo, para no ver su pecado y rechazarlo
  rationale: La sintaxis hebrea es condensada y admite más de una lectura. La versión española conserva la idea central del autoengaño y la incapacidad moral para reconocer y detestar el propio mal, sin cerrar artificialmente la ambigüedad del hebreo ni exagerar el alcance doctrinal.
  doctrine_reference: 'Translation philosophy §3: preserve theological tension rather than resolve it'
translation_notes:
  revision_awareness: El texto inglés auditado se mantuvo sin cambios en la última revisión; el consenso del control cruzado fue alto y no se registraron objeciones. La presente versión española sigue esa lectura estable, pero ajusta la expresión para que suene natural en español sin perder la tensión sintáctica del hebreo.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» como norma general del proyecto, pero este versículo no lo contiene.
  - Se preservó «iniquidad» para עָוֹן, en coherencia con la decisión inglesa auditada.
  - Se evitó sustituir la metáfora de «ojos» por una paráfrasis explicativa, para conservar el idiomático hebreo.
  - La ambigüedad del final («hallar/odiar») se deja visible mediante la nota, en vez de resolverla por completo en el texto principal.
