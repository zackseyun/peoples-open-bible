translation:
  language: es
  text: Así como no es fácil para quien prepara un banquete y busca el provecho[a] de otros, con todo, por la gratitud[b] de los muchos soportaremos gustosamente la penuria;
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'la ventaja de otros'. El griego λυσιτέλεια significa ventaja, provecho o utilidad.
    reason: lexical_alternative
  - marker: b
    text: O 'el agradecimiento de los muchos'. El griego εὐχαριστία aquí significa gratitud o agradecimiento, no el término litúrgico posterior 'Eucaristía'.
    reason: lexical_alternative
lexical_decisions:
- source_word: καθάπερ
  english_pob_choice: Just as
  chosen_spanish: Así como
  alternatives_spanish:
  - Tal como
  - Del mismo modo que
  lexicon: LSJ
  rationale: Marca una comparación directa con naturalidad en español y conserva el valor correlativo de la construcción griega.
- source_word: τῷ παρασκευάζοντι
  english_pob_choice: for one who prepares
  chosen_spanish: para quien prepara
  alternatives_spanish:
  - para el que prepara
  - para uno que prepara
  lexicon: LSJ
  rationale: El dativo participial expresa la persona para la cual algo resulta difícil; en español conviene una estructura personal y fluida.
- source_word: συμπόσιον
  english_pob_choice: a banquet
  chosen_spanish: un banquete
  alternatives_spanish:
  - una fiesta
  - un festín
  lexicon: LSJ
  rationale: '''Banquete'' refleja un alimento festivo y formal, más fiel al tono que una simple comida o reunión.'
- source_word: ζητοῦντι
  english_pob_choice: and seeks
  chosen_spanish: y busca
  alternatives_spanish:
  - y procura
  - y persigue
  lexicon: LSJ
  rationale: Conserva el paralelo participial y el sentido intencional sin añadir una motivación no explícita.
- source_word: τὴν ἑτέρων λυσιτέλειαν
  english_pob_choice: the advantage of others
  chosen_spanish: la ventaja de otros
  alternatives_spanish:
  - el provecho de otros
  - lo útil para otros
  lexicon: LSJ
  rationale: λυσιτέλεια denota ventaja, provecho o utilidad; 'ventaja' sigue de cerca la elección inglesa revisada y su fuerza léxica.
- source_word: οὐκ εὐχερές
  english_pob_choice: it is not easy
  chosen_spanish: no es fácil
  alternatives_spanish:
  - no es sencillo
  - es difícil
  lexicon: LSJ
  rationale: Reproduce la impersonalidad y la dificultad de forma clara y natural.
- source_word: ὅμως
  english_pob_choice: yet
  chosen_spanish: con todo
  alternatives_spanish:
  - sin embargo
  - no obstante
  lexicon: LSJ
  rationale: Introduce la concesión de manera idiomática en español y mantiene el giro argumentativo.
- source_word: διὰ τὴν τῶν πολλῶν εὐχαριστίαν
  english_pob_choice: for the gratitude of the many
  chosen_spanish: por la gratitud de los muchos
  alternatives_spanish:
  - por las gracias de los muchos
  - por el agradecimiento de la multitud
  lexicon: LSJ
  rationale: εὐχαριστία aquí es gratitud/agradecimiento, no el sentido litúrgico posterior de 'Eucaristía'; 'los muchos' conserva el artículo plural del griego.
- source_word: ἡδέως
  english_pob_choice: gladly
  chosen_spanish: gustosamente
  alternatives_spanish:
  - con gusto
  - de buena gana
  lexicon: LSJ
  rationale: Expresa una aceptación voluntaria y alegre del esfuerzo, con un registro digno y natural.
- source_word: τὴν κακοπάθειαν
  english_pob_choice: the hardship
  chosen_spanish: la dificultad
  alternatives_spanish:
  - la penuria
  - el sufrimiento
  lexicon: LSJ
  rationale: En este contexto de labor literaria y exposición, 'dificultad' mantiene el tono de carga o penoso esfuerzo sin intensificarlo indebidamente.
- source_word: ὑποίσομεν
  english_pob_choice: we will endure
  chosen_spanish: soportaremos
  alternatives_spanish:
  - aguantaremos
  - la endureceremos
  lexicon: LSJ
  rationale: Verbo de resistencia y carga; 'soportaremos' conserva la voluntad de asumir la fatiga.
theological_decisions:
- issue: Sentido de εὐχαριστία
  english_pob_reading: gratitude/thanks, not Eucharist
  chosen_spanish_reading: gratitud / agradecimiento, no 'Eucaristía'
  alternative_spanish_readings:
  - Eucaristía
  - acción de gracias
  rationale: El contexto helenístico no exige ni sugiere el sentido sacramental posterior. La traducción debe preservar el sentido común del término y evitar anacronismo teológico.
  doctrine_reference: Principio de no importar significados doctrinales posteriores que el texto no afirma.
translation_notes:
  revision_awareness: La redacción sigue la línea revisada del POB inglés, que corrigió 'benefit' a 'advantage' para λυσιτέλεια. En español se optó por 'ventaja' para reflejar con más precisión ese ajuste y mantener la relación comparativa del período griego. También se preservó la advertencia léxica sobre εὐχαριστία como 'gratitud/agradecimiento' y no como 'Eucaristía'.
  spanish_consistency_notes:
  - Se mantuvo 'Yahvé' sin necesidad de aparecer en este versículo.
  - Se tradujo εὐχαριστία de forma no litúrgica para evitar una lectura anacrónica.
  - Se eligió un registro sobrio y público, adecuado para lectura eclesial amplia.
  - La puntuación reproduce el contraste entre la dificultad reconocida y la disposición final del autor.
