translation:
  language: es
  text: Y recordé las misericordias de Yahvé, y sus actos de fidelidad del pacto desde antiguo[a], que libra a los que se refugian en él[b], y los redime de todo mal.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, «sus misericordias desde siempre». La expresión hebrea puede entenderse con un énfasis más fuerte en la lealtad divina que perdura a través de todo el tiempo.
    reason: lexical_alternative
  - marker: b
    text: 'El paralelo griego lee: «tu misericordia, Señor, y tu obra desde antiguo», y continúa: «tú libras a los que te esperan y los salvas de la mano de las naciones». El testimonio hebreo aquí dice, en cambio, «los que se refugian en él» y «de todo mal».'
    reason: alternative_reading
lexical_decisions:
- source_word: וָאֶזְכְּרָה
  english_pob_choice: And I remembered
  chosen_spanish: Y recordé
  alternatives_spanish:
  - Y me acordé
  - Y trajé a la memoria
  lexicon: HALOT
  rationale: El verbo hebreo זכר expresa recordar o traer a la mente. «Recordé» es directo, natural y conserva el tono testimonial de primera persona.
- source_word: רַחֲמֵי
  english_pob_choice: mercies
  chosen_spanish: misericordias
  alternatives_spanish:
  - compasiones
  - ternuras de misericordia
  lexicon: HALOT
  rationale: El plural רַחֲמִים puede referirse a actos concretos de compasión. «Misericordias» preserva el plural y su fuerza afectiva en español.
- source_word: יְהֹוָה
  english_pob_choice: the LORD / Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: La política textual del POB en español pide nombrar el nombre divino como «Yahvé». Esto evita el ocultamiento convencional y mantiene la transparencia con el hebreo.
- source_word: וַחֲסָדָיו
  english_pob_choice: his acts of covenant faithfulness
  chosen_spanish: sus actos de fidelidad del pacto
  alternatives_spanish:
  - su amor leal
  - sus bondades del pacto
  - su misericordia fiel
  lexicon: HALOT
  rationale: חֶסֶד / חֲסָדָיו tiene un peso relacional y pactal. «Actos de fidelidad del pacto» conserva el plural concreto y la carga teológica de lealtad comprometida.
- source_word: אֲשֶׁר מֵעוֹלָם
  english_pob_choice: from of old
  chosen_spanish: desde antiguo
  alternatives_spanish:
  - desde la antigüedad
  - desde siempre
  - de tiempos antiguos
  lexicon: HALOT
  rationale: La frase comunica extensión temporal remota. «Desde antiguo» mantiene esa amplitud sin forzar de entrada una lectura metafísica de eternidad.
- source_word: הַמַּצִּיל
  english_pob_choice: who delivers
  chosen_spanish: que libra
  alternatives_spanish:
  - que rescata
  - el que libra
  lexicon: HALOT
  rationale: El participio describe a Dios de manera atributiva. «Que libra» suena natural en español y conserva la acción continua de salvación.
- source_word: חוֹסֵי בוֹ
  english_pob_choice: those who take refuge in him
  chosen_spanish: a los que se refugian en él
  alternatives_spanish:
  - a los que buscan refugio en él
  - a los que confían en él
  lexicon: HALOT
  rationale: חסה ב expresa buscar refugio/protección. «Se refugian en él» conserva la imagen concreta mejor que una mera alusión genérica a la fe.
- source_word: וַיִּגְאָלֵם
  english_pob_choice: and redeems them
  chosen_spanish: y los rescata
  alternatives_spanish:
  - y los redime
  - y los redime como goel
  lexicon: HALOT
  rationale: גאל puede significar redimir en sentido técnico, pero en este contexto la idea culmina en liberación efectiva. «Rescata» evita un tecnicismo opaco y mantiene la fuerza salvadora.
- source_word: מִכָּל רָע
  english_pob_choice: from every evil
  chosen_spanish: de todo mal
  alternatives_spanish:
  - de todo maldad
  - de todo daño
  - de todo peligro
  lexicon: HALOT
  rationale: רָע puede abarcar mal, calamidad o daño. «De todo mal» es la forma más idiomática y suficientemente amplia en español.
theological_decisions:
- issue: Cómo rendir חסד con su matiz de lealtad pactal
  english_pob_reading: his acts of covenant faithfulness
  chosen_spanish_reading: sus actos de fidelidad del pacto
  alternative_spanish_readings:
  - su amor leal
  - su misericordia fiel
  - sus bondades
  rationale: El contexto recuerda la historia salvífica de Dios, por lo que la traducción debe retener el aspecto relacional y comprometido de חסד. «Fidelidad del pacto» explicita esa dimensión sin borrar la misericordia.
  doctrine_reference: Translation philosophy §1, §5
- issue: La relación entre el hebreo y el paralelo griego en la segunda mitad del versículo
  english_pob_reading: who delivers those who take refuge in him, and redeems them from every evil
  chosen_spanish_reading: que libra a los que se refugian en él, y los rescata de todo mal
  alternative_spanish_readings:
  - que salva a los que esperan en ti, y los libra de la mano de las naciones
  - que rescata a los que confían en él, y los redime de todo mal
  rationale: El hebreo del testimonio principal dice «los que se refugian en él» y «de todo mal», mientras que el griego paralelo ofrece otra formulación («los que esperan en ti» / «de la mano de las naciones»). La traducción principal sigue el hebreo, pero el aparato debe dejar visible el eco griego.
  doctrine_reference: Translation philosophy §3, §6
- issue: Uso de «Yahvé» para el nombre divino
  english_pob_reading: the LORD / Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: La edición española POB busca transparencia frente al hebreo y evita la convención de ocultar el nombre divino. «Yahvé» es la forma editorial establecida aquí.
  doctrine_reference: Project terminology default
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión del POB en inglés que ajustó la segunda cláusula para reflejar mejor el hebreo como descripción atributiva («who delivers») y no como causal. En español se reprodujo esa relación con «que libra», manteniendo además el cierre hebreo «los rescata de todo mal» y señalando en nota el paralelo griego alternativo.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como forma editorial del nombre divino, conforme al estándar del proyecto.
  - Se conserva el contraste semántico entre «misericordias» y «actos de fidelidad del pacto» para no nivelar dos términos hebreos distintos.
  - «Se refugian en él» preserva la metáfora concreta de protección; no se sustituyó por «confían» sin necesidad.
  - «De todo mal» reproduce la amplitud de רָע sin especificar solo daño físico o solo mal moral.
  - La puntuación respeta la estructura enumerativa del versículo y la lectura atributiva de la segunda cláusula.
