revisions:
- from: Y Tobit, su padre, lo contaba cada día[a]; y cuando se cumplieron los días del viaje y ellos no volvían[b],
  to: Y Tobit, su padre, contaba cada día[a]; y cuando se cumplieron los días del viaje y no volvían[b],
