    text: «Más Allá del Río» es el nombre administrativo persa de la región al oeste del Éufrates.
    reason: cultural_note
  - marker: b
    text: O «con exactitud»; el arameo enfatiza un cumplimiento cuidadoso y pleno, más que la rapidez.
    reason: lexical_alternative
  revision_rationale: 'Se corrige el nombre propio a «Esdras» para ajustarlo al español bíblico normal, se mejora la sintaxis con «a todos los tesoreros», y se reordenan/anclan correctamente las notas: la cultural en «Más Allá del Río» y la léxica en «exactamente», conforme a la auditoría inglesa y al sentido de אָסְפַּרְנָא.'
