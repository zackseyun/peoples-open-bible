translation:
  language: es
  text: En el año treinta y seis del reinado de Asa[a], Baasa, rey de Israel, subió contra Judá y edificó Ramá, para no permitir que nadie saliera de o entrara a donde estaba Asa, rey de Judá.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: ‘en el año treinta y seis del reinado de Asa’. Esto crea una tensión cronológica con la cronología de Baasa en 1 Reyes; algunos lo entienden contando desde la división del reino, y otros proponen una corrección textual conciliadora.'
    reason: alternative_reading
lexical_decisions:
- source_word: בִּ/שְׁנַ֨ת שְׁלֹשִׁ֤ים וָ/שֵׁשׁ
  english_pob_choice: In the thirty-sixth year
  chosen_spanish: En el año treinta y seis
  alternatives_spanish:
  - En el año trigésimo sexto
  - En el año treinta y seis
  lexicon: HALOT
  rationale: La construcción hebrea es temporal y expresa ‘en el año de treinta y seis’. En español, ‘en el año treinta y seis’ es natural y fiel; ‘trigésimo sexto’ también es posible, pero la forma cardinal conserva bien el valor cronológico del hebreo.
- source_word: לְ/מַלְכ֣וּת אָסָ֔א
  english_pob_choice: of Asa’s reign
  chosen_spanish: del reinado de Asa
  alternatives_spanish:
  - de la realeza de Asa
  - del gobierno real de Asa
  lexicon: HALOT
  rationale: מַלְכוּת aquí denota reinado o ejercicio real. ‘Reinado’ es el equivalente más claro y directo en español, y mantiene la referencia temporal sin sobrecargar el texto.
- source_word: עָלָ֞ה ... עַל יְהוּדָ֔ה
  english_pob_choice: went up against Judah
  chosen_spanish: subió contra Judá
  alternatives_spanish:
  - subió a Judá en guerra
  - marchó contra Judá
  lexicon: HALOT
  rationale: El verbo עלה con עַל en contexto militar conserva el giro idiomático de ‘subir contra’. ‘Subió contra’ refleja mejor la forma hebrea que una paráfrasis más explicativa.
- source_word: וַ/יִּ֖בֶן אֶת הָ/רָמָ֑ה
  english_pob_choice: and built up Ramah
  chosen_spanish: fortificó Ramá
  alternatives_spanish:
  - construyó Ramá
  - levantó Ramá como fortaleza
  lexicon: HALOT
  rationale: Aunque בנה literalmente es ‘construir’, el contexto muestra una acción defensiva de control militar. ‘Fortificó’ expresa esa fuerza contextual sin abandonar la base semántica del hebreo; ‘construyó’ sería más literal pero menos preciso en español.
- source_word: הָ/רָמָה
  english_pob_choice: Ramah
  chosen_spanish: Ramá
  alternatives_spanish:
  - Rama
  lexicon: HALOT
  rationale: Nombre propio de lugar; se translitera como ‘Ramá’, forma usual y fácilmente reconocible en español bíblico.
- source_word: לְ/בִלְתִּ֗י תֵּ֚ת
  english_pob_choice: so as not to allow
  chosen_spanish: para no permitir
  alternatives_spanish:
  - a fin de no permitir
  - para impedir
  lexicon: HALOT
  rationale: La construcción לבלתי + infinitivo expresa finalidad negativa o prevención. ‘Para no permitir’ es natural y sigue de cerca la función del hebreo.
- source_word: יוֹצֵ֣א וָ/בָ֔א
  english_pob_choice: to go out or come in
  chosen_spanish: que nadie saliera ni entrara
  alternatives_spanish:
  - salir o entrar
  - ir y venir
  lexicon: HALOT
  rationale: La pareja verbal funciona como merismo de acceso/movimiento. En español, ‘saliera ni entrara’ comunica con claridad la restricción total sin perder el paralelismo del original.
- source_word: לְ/אָסָ֖א מֶ֥לֶךְ יְהוּדָֽה
  english_pob_choice: to Asa king of Judah
  chosen_spanish: a Asa, rey de Judá
  alternatives_spanish:
  - para Asa, rey de Judá
  - respecto de Asa, rey de Judá
  lexicon: HALOT
  rationale: Aquí ל marca relación/dirección en el contexto del cerco y bloqueo. ‘A Asa, rey de Judá’ conserva la relación sintáctica sin forzar una interpretación más específica que el hebreo no exige.
theological_decisions:
- issue: Tensión cronológica entre Reyes y Crónicas
  english_pob_reading: Retain the Masoretic wording 'the thirty-sixth year of Asa’s reign' in the main text
  chosen_spanish_reading: Mantener ‘en el año treinta y seis del reinado de Asa’ en el texto principal
  alternative_spanish_readings:
  - ‘en el año treinta y seis desde la división del reino’
  - ‘en el año veintiséis de Asa’ (emendación conciliadora)
  rationale: El hebreo masorético dice de manera explícita ‘treinta y seis’. Como se trata de una dificultad cronológica, no doctrinal, la traducción no debe resolverla silenciosamente. Se conserva la tensión en el texto principal y se deja constancia de las alternativas posibles.
  doctrine_reference: Translation philosophy §1 (primacía del texto original) y §3 (preservar tensiones textuales)
- issue: Intensidad contextual de בנה aplicado a Ramá
  english_pob_reading: and built up Ramah
  chosen_spanish_reading: fortificó Ramá
  alternative_spanish_readings:
  - construyó Ramá
  - edificó Ramá
  rationale: En el contexto narrativo, la acción apunta a un uso estratégico y defensivo de la ciudad. Traducir con ‘fortificó’ comunica esa fuerza contextual sin negar que el verbo base sea ‘construir’.
  doctrine_reference: 'Principio de equivalencia óptima: prioridad del sentido contextual sobre la literalidad rígida'
translation_notes:
  revision_awareness: La redacción sigue la última revisión inglesa disponible, que cambió ‘built Ramah’ por ‘built up Ramah’ para reflejar mejor la idea contextual de fortificación. En español se optó por ‘fortificó Ramá’, que conserva ese ajuste revisado y lo expresa con naturalidad.
  spanish_consistency_notes:
  - Se usa ‘Yahvé’ solo cuando el texto lo requiera explícitamente; este versículo no contiene el nombre divino.
  - ‘Ramá’ se mantiene como nombre propio transliterado, coherente con el tratamiento habitual de topónimos bíblicos.
  - Se prefirió ‘rey de Judá/rey de Israel’ con coma explicativa para una lectura más natural en español.
  - El merismo ‘saliera ni entrara’ busca preservar la doble dirección del hebreo sin convertirlo en una paráfrasis excesiva.
