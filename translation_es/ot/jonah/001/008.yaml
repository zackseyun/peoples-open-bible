translation:
  language: es
  text: 'Entonces le dijeron: «Por favor, dinos por causa de quién ha venido sobre nosotros esta calamidad[a]. ¿Cuál es tu ocupación, y de dónde vienes? ¿Cuál es tu tierra[b], y de qué pueblo eres?»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «por causa de quién ha venido sobre nosotros este mal»; también: «a causa de quién nos ha sobrevenido esta calamidad». El hebreo רָעָה aquí se refiere al desastre amenazante que enfrentan los marineros, no necesariamente al mal moral.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «¿Cuál es tu país?». El hebreo אֶרֶץ puede significar «tierra», «país» o «territorio»; «tierra» se mantiene más cerca del hebreo.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמְרוּ אֵלָיו
  english_pob_choice: Then they said to him
  chosen_spanish: Entonces le dijeron
  alternatives_spanish:
  - Y le dijeron
  - Luego le dijeron
  lexicon: WLC; HALOT
  rationale: El waw narrativo marca continuidad en la escena; «Entonces» comunica bien el avance del relato en español sin perder naturalidad.
- source_word: הַגִּידָה נָּא
  english_pob_choice: Please tell us
  chosen_spanish: Por favor, decláranos
  alternatives_spanish:
  - Por favor, dinos
  - Te rogamos, háblanos
  lexicon: HALOT
  rationale: הגיד en hiphil es «declarar/hacer saber». «Decláranos» preserva con más precisión el matiz de pedir una exposición clara; «por favor» rinde נָא como súplica cortés.
- source_word: לְמִי הָרָעָה הַזֹּאת לָנוּ
  english_pob_choice: on whose account this trouble has come upon us
  chosen_spanish: por causa de quién ha venido sobre nosotros este mal
  alternatives_spanish:
  - por culpa de quién nos ha sobrevenido esta calamidad
  - por quién ha venido sobre nosotros este mal
  lexicon: HALOT
  rationale: רָעָה aquí refiere al desastre amenazante que enfrentan los marineros, no necesariamente al mal moral. «Mal» conserva la amplitud semántica del hebreo; «por causa de quién» expresa la fuerza causal de לְמִי sin introducir una interpretación más moralizante de la necesaria.
- source_word: מַה מְּלַאכְתְּךָ
  english_pob_choice: What is your occupation
  chosen_spanish: ¿Cuál es tu ocupación?
  alternatives_spanish:
  - ¿Cuál es tu trabajo?
  - ¿A qué te dedicas?
  lexicon: HALOT
  rationale: מְלָאכָה puede significar trabajo, oficio u ocupación. «Ocupación» encaja bien en una serie de preguntas de identificación y corresponde al valor elegido en inglés.
- source_word: וּמֵאַיִן תָּבוֹא
  english_pob_choice: and where do you come from
  chosen_spanish: ¿y de dónde vienes?
  alternatives_spanish:
  - ¿y de dónde procedes?
  - ¿y de qué lugar vienes?
  lexicon: HALOT
  rationale: מֵאַיִן pregunta por origen o procedencia. «De dónde vienes» es la equivalencia española más natural y directa.
- source_word: מָה אַרְצֶךָ
  english_pob_choice: What is your land
  chosen_spanish: ¿Cuál es tu tierra?[b]
  alternatives_spanish:
  - ¿Cuál es tu país?
  - ¿Cuál es tu patria?
  lexicon: HALOT
  rationale: אֶרֶץ puede ser tierra, país o territorio. «Tierra» se mantiene más cerca del hebreo; se deja constancia de la alternativa «país» porque puede sonar más idiomática en español, pero estrecha un poco la amplitud del término.
- source_word: וְאֵי מִזֶּה עַם אָתָּה
  english_pob_choice: and from what people are you
  chosen_spanish: ¿y de qué pueblo eres?
  alternatives_spanish:
  - ¿y de qué pueblo provienes?
  - ¿y de qué nación eres?
  lexicon: HALOT
  rationale: עַם designa un pueblo o grupo étnico-nacional. «Pueblo» conserva bien ese valor colectivo y resulta más natural que una traducción demasiado literal de la estructura interrogativa.
theological_decisions:
- issue: alcance de רָעָה en el contexto del mar y la tormenta
  english_pob_reading: this trouble has come upon us; the Hebrew רָעָה here refers to the threatening disaster facing the sailors, not necessarily moral evil
  chosen_spanish_reading: este mal ha venido sobre nosotros; el hebreo רָעָה aquí se entiende como el desastre amenazante que enfrentan los marineros, no necesariamente como mal moral
  alternative_spanish_readings:
  - esta calamidad ha venido sobre nosotros
  - este desastre nos ha sobrevenido
  rationale: 'Se conserva la tensión semántica señalada por el audit trail: רָעָה puede abarcar mal, calamidad o desastre. «Mal» mantiene amplitud y deja abierta la posibilidad de un sentido de calamidad sin reducirlo a culpa moral.'
  doctrine_reference: Jonás 1:8; nota léxica del POB inglés sobre רָעָה
- issue: relación causal expresada por לְמִי
  english_pob_reading: on whose account
  chosen_spanish_reading: por causa de quién
  alternative_spanish_readings:
  - a causa de quién
  - por culpa de quién
  rationale: La frase hebrea pregunta por la persona vinculada causalmente con el desastre. «Por causa de quién» reproduce esa relación sin cargar el texto con una acusación explícita de culpabilidad que el contexto inmediato todavía no formula.
  doctrine_reference: Jonás 1:8; análisis sintáctico de לְמִי
- issue: valor colectivo de עַם
  english_pob_reading: what people are you
  chosen_spanish_reading: de qué pueblo eres
  alternative_spanish_readings:
  - de qué nación eres
  - de qué gente eres
  rationale: «Pueblo» es una opción más fiel al alcance de עַם que «nación» y evita una modernización excesivamente política. Mantiene el foco en identidad de grupo/linaje.
  doctrine_reference: Jonás 1:8; lexema עַם
translation_notes:
  revision_awareness: 'La redacción sigue de cerca el texto hebreo de WLC y coincide con el hilo de decisión del POB inglés en los puntos principales: petición cortés, pregunta causal por el desastre, ocupación, procedencia, tierra/país y pertenencia a un pueblo. Se preserva la ambigüedad útil de רָעָה como calamidad/mal y se evita fijarla como mal moral.'
  spanish_consistency_notes:
  - Se usó «Entonces» para el valor narrativo de וַ- sin volver la frase arcaica.
  - «Decláranos» se prefirió sobre «dinos» por el peso de הִגִּיד.
  - «Mal» se mantuvo en línea con la amplitud semántica de רָעָה documentada en el POB inglés.
  - «Tierra» se conservó como equivalente principal de אֶרֶץ; se anotó «país» como alternativa idiomática.
  - «Pueblo» refleja el valor colectivo de עַם mejor que una formulación más nacionalista o más informal.
