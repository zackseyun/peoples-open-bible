revisions:
- from: Y aconteció en aquellos muchos días que murió el rey de Egipto, y los hijos de Israel gimieron[a] a causa del trabajo[b] y clamaron[c], y su clamor subió a Dios a causa del trabajo[b].
  to: Y aconteció en aquellos muchos días[a] que murió el rey de Egipto, y los hijos de Israel[b] gimieron a causa del trabajo[c] y clamaron, y su clamor subió a Dios a causa del trabajo[c].
  rationale: 'La traducción base es fiel, pero necesita una reparación menor: reubicar la nota temporal en la frase correcta, añadir la nota sobre «los hijos de Israel» que sí está documentada en el rastro inglés, y sustituir la nota innecesaria sobre «clamaron» por la nota léxica pertinente para עֲבֹדָה. También se normaliza la redacción de las notas en español.'
