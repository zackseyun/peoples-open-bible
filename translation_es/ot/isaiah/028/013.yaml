translation:
  language: es
  text: 'Y la palabra de Yahvé será para ellos[a]: «Orden sobre orden, orden sobre orden, línea sobre línea, línea sobre línea, un poco aquí, un poco allá», para que vayan, tropiecen hacia atrás, sean quebrantados, caigan en la trampa y sean capturados.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «mandato sobre mandato, mandato sobre mandato»; tradicionalmente, «precepto sobre precepto, precepto sobre precepto». El hebreo es breve y probablemente imita una repetición burlona o infantil.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהָיָה
  english_pob_choice: So ... will be
  chosen_spanish: Así que ... será
  alternatives_spanish:
  - Y ... será
  - Entonces ... será
  lexicon: HALOT
  rationale: El waw consecutivo introduce consecuencia/resultante; «Así que» conserva ese valor sin sonar mecánico en español.
- source_word: דְּבַר יְהוָה
  english_pob_choice: the word of Yahweh
  chosen_spanish: la palabra de Yahvé
  alternatives_spanish:
  - el mensaje de Yahvé
  - la voz de Yahvé
  lexicon: HALOT
  rationale: «Palabra» mantiene el idiomismo profético de דבר, y «Yahvé» preserva el nombre divino según la guía del proyecto.
- source_word: צַו לָצָו צַו לָצָו
  english_pob_choice: Order on order, order on order
  chosen_spanish: Orden sobre orden, orden sobre orden
  alternatives_spanish:
  - Mandato sobre mandato, mandato sobre mandato
  - Precepto sobre precepto, precepto sobre precepto
  lexicon: HALOT
  rationale: La secuencia es terse y repetitiva, con probable matiz burlesco o infantil. «Orden» reproduce bien el sustantivo básico sin imponerse como terminología eclesiástica tradicional.
- source_word: קַו לָקָו קַו לָקָו
  english_pob_choice: line on line, line on line
  chosen_spanish: línea sobre línea, línea sobre línea
  alternatives_spanish:
  - cuerda sobre cuerda, cuerda sobre cuerda
  - regla sobre regla, regla sobre regla
  lexicon: HALOT
  rationale: קו puede referirse a una línea o cordel de medida; «línea» es la opción más transparente en español y preserva la cadencia repetida.
- source_word: זְעֵיר שָׁם זְעֵיר שָׁם
  english_pob_choice: a little here, a little there
  chosen_spanish: un poco aquí, un poco allá
  alternatives_spanish:
  - un poco allí, un poco allí
  - poquito aquí, poquito allá
  lexicon: HALOT
  rationale: La construcción es distributiva; «un poco aquí, un poco allá» comunica naturalidad y la alternancia espacial del hebreo.
- source_word: לְמַעַן
  english_pob_choice: so that
  chosen_spanish: para que
  alternatives_spanish:
  - a fin de que
  - con el fin de que
  lexicon: HALOT
  rationale: Expresa propósito/resultante con fluidez en español y conserva la relación causal del pasaje.
- source_word: יֵלְכ֜וּ
  english_pob_choice: they may go
  chosen_spanish: vayan
  alternatives_spanish:
  - anden
  - procedan
  lexicon: HALOT
  rationale: הלך es general; «vayan» mantiene la sencillez del verbo sin añadir una lectura más concreta de la que el hebreo exige.
- source_word: וְכָשְׁל֤וּ אָחוֹר֙
  english_pob_choice: and stumble backward
  chosen_spanish: y tropiecen hacia atrás
  alternatives_spanish:
  - y caigan hacia atrás
  - y den un traspié hacia atrás
  lexicon: HALOT
  rationale: כשל conserva la imagen de tropezar; con אָחוֹר, «hacia atrás» reproduce la dirección del movimiento y evita intensificar innecesariamente.
- source_word: וְנִשְׁבָּרוּ
  english_pob_choice: and be broken
  chosen_spanish: y sean quebrantados
  alternatives_spanish:
  - y sean rotos
  - y queden quebrados
  lexicon: HALOT
  rationale: «Quebrantados» es un equivalente bíblico y claro para el pasivo de שבר; mantiene el tono judicial/metafórico sin hacerlo demasiado coloquial.
- source_word: וְנוֹקְשׁוּ
  english_pob_choice: and snared
  chosen_spanish: y atrapados
  alternatives_spanish:
  - y enredados
  - y apresados
  lexicon: HALOT
  rationale: El verbo expresa ser enredado o puesto en trampa; «atrapados» funciona como equivalente breve y natural, cercano al matiz de la imagen.
- source_word: וְנִלְכָּדוּ
  english_pob_choice: and captured
  chosen_spanish: y capturados
  alternatives_spanish:
  - y apresados
  - y tomados
  lexicon: HALOT
  rationale: לכד implica captura o toma. «Capturados» conserva la progresión desde «atrapados» y distingue el cierre de la secuencia.
theological_decisions:
- issue: La palabra de Yahvé como instrumento de juicio
  english_pob_reading: The repetitive 'word of the LORD' functions as an instrument of judgment, resulting in their downfall.
  chosen_spanish_reading: La palabra de Yahvé llega a ser para ellos un medio de tropiezo y juicio.
  alternative_spanish_readings:
  - Solo se describe cómo ellos perciben burlonamente la palabra profética.
  - La frase es meramente descriptiva, sin sentido judicial.
  rationale: El contexto inmediato y la cláusula final de propósito indican efecto judicial, no mera descripción neutral. La traducción mantiene esa tensión sin explicarla más allá del texto.
  doctrine_reference: Preservar la tensión teológica sin resolverla
- issue: Matiz burlesco o infantil de la fórmula repetitiva
  english_pob_reading: The Hebrew is terse and likely mimics mocking or childish repetition.
  chosen_spanish_reading: La fórmula española conserva una cadencia repetitiva que deja visible el posible tono burlesco.
  alternative_spanish_readings:
  - Normalizar la frase como un refrán claro.
  - Suavizar la repetición para hacerla más elegante.
  rationale: Conviene dejar la repetición extraña en español para no borrar la forma del hebreo, que probablemente es intencionalmente enfática y despectiva.
  doctrine_reference: Respetar la forma retórica del texto fuente
translation_notes:
  revision_awareness: Se corrigió el error de validación anterior anclando la nota al texto principal con [a] en «ellos[a]», de modo que cada nota tenga marcador visible en el español. La redacción mantiene la lectura de Yahvé y la secuencia verbal acumulativa sin añadir glosa innecesaria.
  spanish_consistency_notes:
  - Se usó «Yahvé» de forma consistente para יְהוָה.
  - Se prefirió «orden» y «línea» como equivalentes básicos, sin imponer «precepto» como forma principal.
  - 'Se mantuvo la progresión verbal: tropezar → quebrantarse → atraparse → capturarse.'
  - Se conservó la repetición enfática del hebreo sin embellecerla demasiado.
  - La puntuación española usa comillas angulares y coma antes de la cláusula final de propósito.
