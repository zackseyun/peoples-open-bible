  source_alignment_summary: 'El borrador español sigue bien el griego y el rastro de auditoría en lo esencial: conserva el sujeto implícito de ἔθαψεν, mantiene ''con su padre'' sin sobreinterpretar, nombra correctamente a Tobías para Τωβίας, y preserva ''esposa'', ''hijos'' y el movimiento hacia Ragüel. La nota sobre el sujeto implícito también refleja fielmente la decisión inglesa.'
  spanish_quality_summary: El texto es claro y natural, pero tiene un pequeño problema ortográfico/onomástico en 'Ragüel'. En español bíblico y general, la forma más reconocible y mejor asentada es 'Ragüel' o 'Raguel' según política editorial, pero aquí la diéresis resulta innecesaria y poco idiomática. El resto del español es fluido y digno.
  glossary_alignment: No hay términos del glosario principal en juego salvo nombres propios. 'Tobías' concuerda con el griego Τωβίας y con la decisión auditada. 'Ana' para Ἅννα es aceptable en español. 'Ecbátana' es una adaptación española plausible. La única desalineación menor es la forma 'Ragüel', que conviene normalizar a 'Ragüel' sin coma explicativa excesiva o mejor 'a Ragüel su suegro' / 'a Ragüel, su suegro'; aquí basta corregir la forma del nombre a 'Ragüel' sin diéresis.
  issues:
  - severity: medium
    issue: Forma del nombre propio 'Ragüel' con diéresis
    rationale: El griego Ῥαγουὴλ se vierte normalmente en español como 'Ragüel' o 'Raguel' según convención editorial; la forma del borrador con diéresis ('Ragüel') no es la opción ortográfica natural en español y debe normalizarse.
  revised_spanish_text: Y cuando murió Ana[a], la enterró con su padre. Luego Tobías se fue con su esposa y sus hijos a Ecbátana, a Ragüel, su suegro.
  revised_footnotes:
  - marker: a
    text: 'El griego dice literalmente: «la enterró con su padre». El sujeto de esa cláusula no se expresa; la cláusula siguiente nombra explícitamente a Τωβίας/Tobías.'
    reason: alternative_reading
  revision_rationale: Se mantiene la traducción base porque refleja bien el griego y la decisión auditada sobre el sujeto implícito. Solo se normaliza la forma española del nombre propio de Ῥαγουήλ.
