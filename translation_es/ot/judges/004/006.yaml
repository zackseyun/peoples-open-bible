translation:
  language: es
  text: 'Ella envió y mandó llamar a Barac, hijo de Abinoam, desde Quedes de Neftalí[a], y le dijo: «¿No ha mandado Yahvé, el Dios de Israel, “Ve, marcha al monte Tabor[b], y lleva contigo diez mil hombres de entre los hijos de Neftalí y de entre los hijos de Zabulón[c]”?»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «desde Quedes de Neftalí».
    reason: lexical_alternative
  - marker: b
    text: O «avanza al monte Tabor» o «reúne tus tropas en el monte Tabor».
    reason: lexical_alternative
  - marker: c
    text: Hebreo «de entre los hijos de Neftalí y de entre los hijos de Zabulón»; es decir, hombres de esas tribus.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַתִּשְׁלַח
  english_pob_choice: She sent
  chosen_spanish: envió
  alternatives_spanish:
  - mandó
  - despachó
  lexicon: HALOT
  rationale: El verbo expresa la iniciativa de enviar a alguien en busca de Barac; en español, «envió» reproduce bien esa acción básica sin añadir matices no presentes en el hebreo.
- source_word: וַתִּקְרָא
  english_pob_choice: and summoned
  chosen_spanish: y mandó llamar
  alternatives_spanish:
  - y llamó
  - y convocó
  lexicon: HALOT
  rationale: En este contexto narrativo, el verbo no es solo «llamar» en sentido vocal, sino hacer venir a una persona; «mandó llamar» conserva la fuerza de convocatoria sin volverse demasiado técnico.
- source_word: לְבָרָק בֶּן אֲבִינֹעַם
  english_pob_choice: Barak son of Abinoam
  chosen_spanish: a Barac, hijo de Abinoam
  alternatives_spanish:
  - a Barac, hijo de Abinoam
  - para Barac, hijo de Abinoam
  lexicon: HALOT
  rationale: Se conserva el nombre propio y la filiación. «A» refleja el objeto directo del verbo de envío/convocatoria; «hijo de» es la forma natural y fiel al hebreo.
- source_word: מִקֶּדֶשׁ נַפְתָּלִי
  english_pob_choice: from Kedesh-naphtali
  chosen_spanish: desde Quedes de Neftalí
  alternatives_spanish:
  - desde Quedes de Neftalí
  - desde Quedes en Neftalí
  lexicon: HALOT
  rationale: «Quedes de Neftalí» mantiene la relación tribal del topónimo sin imponer una traducción interpretativa. «Desde» respeta el valor locativo de la preposición en este contexto.
- source_word: הֲלֹא
  english_pob_choice: Has not
  chosen_spanish: ¿No ha
  alternatives_spanish:
  - ¿Acaso no ha?
  - ¿No es cierto que ha?
  lexicon: HALOT
  rationale: La partícula introduce una pregunta retórica que espera respuesta afirmativa. En español, «¿No ha...?» conserva bien esa expectativa.
- source_word: צִוָּה
  english_pob_choice: commanded
  chosen_spanish: mandado
  alternatives_spanish:
  - ordenado
  - dado mandato
  lexicon: HALOT
  rationale: «Mandado» en la frase «ha mandado» preserva el acto autoritativo de Dios y suena natural en una pregunta retórica bíblica.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  lexicon: HALOT
  rationale: Se sigue la decisión terminológica del proyecto para el Tetragrámaton. «Yahvé» preserva el nombre personal divino sin sustituirlo por un título.
- source_word: אֱלֹהֵי יִשְׂרָאֵל
  english_pob_choice: the God of Israel
  chosen_spanish: el Dios de Israel
  alternatives_spanish:
  - el Dios de Israel
  - el Dios de los israelitas
  lexicon: HALOT
  rationale: La construcción posesiva se traduce de modo directo y claro. «El Dios de Israel» mantiene el vínculo pactual e histórico del texto.
- source_word: לֵךְ
  english_pob_choice: Go
  chosen_spanish: Ve
  alternatives_spanish:
  - Anda
  - Parte
  lexicon: HALOT
  rationale: Imperativo breve y natural en español, equivalente directo del hebreo.
- source_word: וּמָשַׁכְתָּ
  english_pob_choice: march to / draw up to
  chosen_spanish: marcha
  alternatives_spanish:
  - avanza
  - dirígete
  - reúne tus tropas en
  lexicon: HALOT
  rationale: La revisión inglesa favoreció «march» por naturalidad. En español, «marcha» conserva el matiz de movimiento militar hacia un punto estratégico sin forzar la imagen de «arrastrar» o «reunir».
- source_word: בְּהַר תָּבוֹר
  english_pob_choice: to Mount Tabor
  chosen_spanish: al monte Tabor
  alternatives_spanish:
  - al monte Tabor
  - en el monte Tabor
  lexicon: HALOT
  rationale: Aunque el hebreo usa בְּ, el español idiomático para destino usa «a/al». «Monte Tabor» es la forma geográfica natural y entendible.
- source_word: וְלָקַחְתָּ עִמְּךָ
  english_pob_choice: and take with you
  chosen_spanish: y lleva contigo
  alternatives_spanish:
  - y toma contigo
  - y trae contigo
  lexicon: HALOT
  rationale: «Lleva contigo» es una equivalencia natural para llevar personas consigo en una misión militar.
- source_word: עֲשֶׂרֶת אֲלָפִים אִישׁ
  english_pob_choice: ten thousand men
  chosen_spanish: diez mil hombres
  alternatives_spanish:
  - diez mil varones
  - diez mil soldados
  lexicon: HALOT
  rationale: Se conserva el valor cuantitativo y el sustantivo humano del hebreo. «Hombres» funciona bien en español y mantiene el vínculo con el texto fuente.
- source_word: מִבְּנֵי נַפְתָּלִי וּמִבְּנֵי זְבֻלֻן
  english_pob_choice: from the sons of Naphtali and from the sons of Zebulun
  chosen_spanish: de entre los hijos de Neftalí y de entre los hijos de Zabulón
  alternatives_spanish:
  - de entre los hijos de Neftalí y de entre los hijos de Zabulón
  - entre los hombres de Neftalí y de Zabulón
  lexicon: HALOT
  rationale: Se preserva la filiación tribal del hebreo. «De entre» ayuda a comunicar que se trata de un reclutamiento selectivo dentro de esos grupos, no de los hijos literales en sentido familiar.
theological_decisions:
- issue: Renderización del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahvé
  - Jehová
  rationale: El texto hebreo usa el Tetragrámaton y, siguiendo la terminología del proyecto, se mantiene como nombre propio divino en vez de reemplazarlo por un título. «Yahvé» es la forma establecida en español para esta serie.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
translation_notes:
  revision_awareness: La redacción sigue la revisión más reciente del audit trail inglés, que prefirió «march to Mount Tabor» por ser más natural en inglés y ajustó la puntuación tras «commanded». En español se reflejó esa preferencia con «marcha al monte Tabor», manteniendo la fuerza militar del verbo y una puntuación fluida en la cita directa.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» para יְהוָה conforme al estándar del proyecto.
  - Se usó «Neftalí» y «Zabulón» como transliteraciones habituales en español bíblico, coherentes con el tono del texto.
  - Se conservó «hijos de» para בני por fidelidad al paralelismo tribal del hebreo, sin neutralizar en el texto principal.
  - La sintaxis de la cita directa busca claridad moderna sin perder la cadencia solemne del relato bíblico.
