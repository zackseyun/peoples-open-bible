translation:
  language: es
  text: Y este asunto se convirtió en pecado para la casa de Yarovam, para cortarla y destruirla de la faz de la tierra.[a]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «de la faz del suelo». El hebreo dice literalmente «de sobre la faz de la tierra/suelo», un modismo que expresa remoción total.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְהִי
  english_pob_choice: became
  chosen_spanish: se convirtió
  alternatives_spanish:
  - fue
  - llegó a ser
  lexicon: HALOT
  rationale: El wayyiqtol de היה aquí expresa resultado o consecuencia. «Se convirtió» conserva ese matiz de cambio de estado mejor que un simple «fue».
- source_word: בַּדָּבָר הַזֶּה
  english_pob_choice: this matter
  chosen_spanish: esta cosa
  alternatives_spanish:
  - este asunto
  - este hecho
  lexicon: HALOT
  rationale: דָּבָר puede abarcar asunto, hecho o cosa. «Esta cosa» sigue la amplitud semántica del hebreo; «este asunto» también sería posible, pero «cosa» aquí refleja bien la referencia amplia al episodio narrado.
- source_word: לְחַטַּאת
  english_pob_choice: sin
  chosen_spanish: pecado
  alternatives_spanish:
  - como pecado
  - en pecado
  lexicon: HALOT
  rationale: El giro indica que la acción pasó a tener condición o efecto de pecado. «Se convirtió en pecado» conserva el valor resultativo sin añadir explicaciones ajenas al texto.
- source_word: בֵּית יָרָבְעָם
  english_pob_choice: the house of Yarovam
  chosen_spanish: la casa de Yarovam
  alternatives_spanish:
  - la casa de Jeroboam
  - la dinastía de Yarovam
  lexicon: HALOT
  rationale: Se mantiene el término «casa» como idiomático hebreo para familia/dinastía. Se conserva «Yarovam» por la política del proyecto de transliterar nombres propios.
- source_word: וּלְהַכְחִיד
  english_pob_choice: to cut it off
  chosen_spanish: para apartarla
  alternatives_spanish:
  - para cortarla
  - para extinguirla
  lexicon: HALOT
  rationale: כחד en Hifil sugiere hacer desaparecer o cortar de la existencia. En español, «apartar» aquí intenta recoger la idea de separar/retirar de manera definitiva, aunque también puede entenderse como una formulación menos literal; se preserva la doble serie verbal con el siguiente verbo.
- source_word: וּלְהַשְׁמִיד
  english_pob_choice: to destroy it
  chosen_spanish: y destruirla
  alternatives_spanish:
  - y aniquilarla
  - y exterminarla
  lexicon: HALOT
  rationale: שמד en Hifil intensifica el lenguaje de juicio. «Destruirla» es un equivalente claro y digno; se mantiene distinto de la primera forma verbal para no borrar la pareja léxica del hebreo.
- source_word: מֵעַל פְּנֵי הָאֲדָמָה
  english_pob_choice: from the face of the ground
  chosen_spanish: de sobre la faz de la tierra
  alternatives_spanish:
  - de sobre la faz del suelo
  - de la superficie de la tierra
  lexicon: HALOT
  rationale: Se conserva el idiomático «de sobre la faz de la tierra», que en español bíblico es comprensible y refleja la imagen hebrea de remoción total. Aunque אֲדָמָה es «suelo/tierra», aquí «tierra» mantiene mejor la fórmula solemne.
theological_decisions:
- issue: Objeto implícito de los verbos de destrucción
  english_pob_reading: The implied object is the house of Yarovam/dynasty, carried over from the previous phrase.
  chosen_spanish_reading: El objeto implícito sigue siendo la casa de Yarovam.
  alternative_spanish_readings:
  - Los verbos se refieren más genéricamente a la cosa mencionada.
  - El énfasis recae sobre el pecado mismo, no sobre la casa.
  rationale: La sintaxis y el contexto narrativo favorecen que los verbos finales continúen refiriéndose a la casa/dinastía de Yarovam. En español conviene mantener el objeto implícito por medio de la concordancia pronominal «la», sin introducir una explicación adicional en el texto principal.
  doctrine_reference: Juicio divino sobre la casa de Jeroboam/Yarovam en el marco de 1 Reyes 13.
translation_notes:
  revision_awareness: El audit trail en inglés pasó por una revisión que ajustó el verbo del primer verbo de destrucción de «wipe it out» a «cut it off». La propuesta española conserva esa distinción léxica mediante un primer verbo menos contundente («apartar») y un segundo verbo explícito («destruir»), aunque el equivalente más literal de כחד podría ser «cortar / eliminar».
  spanish_consistency_notes:
  - Se mantiene «Yarovam» conforme a la política del proyecto.
  - Se usa «faz de la tierra» para reflejar la fórmula hebrea idiomática.
  - Se evita «SEÑOR» o «Cristo», porque no aparecen en el versículo.
  - La concordancia pronominal en «apartarla» y «destruirla» sigue la referencia a la casa de Yarovam.
