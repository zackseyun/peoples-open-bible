review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien el sentido general del griego y del POB inglés: un proverbio sobre cautela moral en todo y vigilancia para evitar la falta. Sin embargo, hay dos desajustes relevantes: «días de pecado» reduce el plural literal ἁμαρτιῶν mejor reflejado por «días de pecados», y «delito» estrecha indebidamente πλημμελίας hacia lo penal, cuando el sentido es más amplio: falta, mala acción, mal obrar.'
  spanish_quality_summary: El español es claro y digno, pero «cuidará de apartarse del delito» suena algo explicativo y más pesado que el griego. Una formulación como «se guardará de hacer mal» o «se guardará de la mala acción» expresa mejor la vigilancia proverbial y evita la connotación jurídica de «delito».
  glossary_alignment: No hay términos del glosario principal en disputa. La decisión «el hombre sabio» es defendible por el masculino genérico proverbial del griego y concuerda con el POB inglés. La nota sobre εὐλαβηθήσεται está bien orientada al matiz de cautela práctica frente a reverencia.
  issues:
  - severity: medium
    issue: «días de pecado» no preserva bien el plural de ἁμαρτιῶν
    rationale: El POB inglés conservó deliberadamente «days of sins» y añadió nota aclaratoria. En español, «días de pecados» suena aceptable y refleja mejor la pluralidad documentada que «días de pecado», que tiende a singularizar o generalizar.
  - severity: high
    issue: «delito» es demasiado estrecho para πλημμελίας
    rationale: πλημμέλεια denota falta, ofensa, error o mala acción; «delito» introduce una connotación penal/jurídica que no está exigida por el contexto sapiencial y reduce el campo semántico de «wrongdoing».
  - severity: medium
    issue: «cuidará de apartarse» añade paráfrasis frente a προσέξει ἀπὸ
    rationale: Aunque es entendible, la construcción desarrolla más de la cuenta el verbo simple de atender/guardarse para evitar algo. «Se guardará de» o «tendrá cuidado de evitar» conserva mejor la concisión proverbial y la idea de vigilancia.
  revised_spanish_text: El hombre sabio será cauteloso en todo[a][b], y en días de pecados se guardará de la mala acción.
  revised_footnotes:
  - marker: a
    text: 'O: «será reverente en todo». El verbo griego puede denotar reverencia además de cautela; aquí el contexto favorece la prudencia moral.'
    reason: lexical_alternative
  - marker: b
    text: 'Literalmente: «en días de pecados», probablemente tiempos marcados por el pecado o la tentación.'
    reason: lexical_alternative
  revision_rationale: 'La revisión conserva la buena base del borrador, pero corrige dos puntos importantes de fidelidad léxica: restituye el plural «pecados» y reemplaza «delito» por una expresión más amplia y sapiencial, «la mala acción». Además, «se guardará de» refleja con más naturalidad y cercanía el valor de προσέξει ἀπὸ en este contexto de advertencia moral.'
