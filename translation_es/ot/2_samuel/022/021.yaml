revisions:
- from: Yahvé me ha tratado conforme a mi justicia[a][b]; conforme a la limpieza de mis manos me ha recompensado.
  to: Yahvé me ha tratado conforme a mi rectitud[a]; conforme a la limpieza de mis manos[b] me ha recompensado.
  rationale: Se ajusta «mi justicia» a «mi rectitud» para reflejar mejor el valor contextual de צדקה documentado en el expediente POB y para sonar más natural en español eclesial contemporáneo. También se mueve la nota cultural al sintagma que realmente explica. La nota léxica se simplifica para reflejar la alternativa preservada por el inglés sin sobrecargar el texto.
