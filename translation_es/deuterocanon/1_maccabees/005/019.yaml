revisions:
- from: 'Y le dio órdenes a ellos, diciendo: «Tengan cuidado[a] de este pueblo, y no entablen batalla contra las naciones hasta que nosotros volvamos».'
  to: 'Y les dio órdenes, diciendo: «Cuiden[a] de este pueblo, y no entablen batalla contra las naciones hasta que nosotros volvamos».'
  rationale: Se revisa la primera orden para expresar con claridad el cuidado protector implicado por Πρόσεχετε en este contexto. «Cuiden de este pueblo» es más natural y menos ambiguo que «Tengan cuidado de este pueblo». Además, «les dio órdenes» mejora la fluidez idiomática del español.
