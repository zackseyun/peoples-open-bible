  glossary_alignment: 'No hay conflictos con la terminología base del proyecto. La personificación femenina de la Sabiduría se preserva correctamente con «ella». La revisión propuesta ajusta solo decisiones léxicas finas: χρηστῶς -> «bien» y, por mayor cercanía al audit trail, διατείνει -> «alcanza» con nota alternativa sobre «se extiende».'
