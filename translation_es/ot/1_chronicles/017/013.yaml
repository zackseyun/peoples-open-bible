translation:
  language: es
  text: Yo le seré padre[a], y él me será hijo. Y no quitaré de él mi amor leal, como lo quité de quien estuvo antes de ti[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Seré su padre, y él será mi hijo».'
    reason: lexical_alternative
  - marker: b
    text: Es decir, de Saúl, el predecesor de David como rey.
    reason: cross_reference
lexical_decisions:
- source_word: אֶהְיֶה לּוֹ לְאָב
  english_pob_choice: I will be a father to him
  chosen_spanish: Yo le seré padre
  alternatives_spanish:
  - Seré su padre
  lexicon: HALOT
  rationale: 'La construcción hebrea expresa relación: “ser para” alguien “padre”. En español, “le seré padre” conserva esa estructura relacional con naturalidad y sin perder el sentido de pacto/filialidad. “Seré su padre” es una alternativa válida pero menos cercana a la forma del original.'
- source_word: וְהוּא יִהְיֶה לִּי לְבֵן
  english_pob_choice: and he will be a son to me
  chosen_spanish: y él me será hijo
  alternatives_spanish:
  - y será mi hijo
  lexicon: HALOT
  rationale: Se mantiene el paralelismo con la primera cláusula y la relación filial directa. “Me será hijo” refleja bien el hebreo “ser para mí por hijo”. “Será mi hijo” comunica el sentido, pero nivela un poco la construcción original.
- source_word: חַסְדִּי
  english_pob_choice: my steadfast love
  chosen_spanish: mi amor leal
  alternatives_spanish:
  - mi amor constante
  - mi misericordia
  - mi fidelidad de pacto
  lexicon: HALOT
  rationale: En este contexto de pacto real, חֶסֶד combina amor y lealtad estable. “Amor leal” conserva esa tensión en español sin reducirlo solo a emoción ni solo a obligación jurídica. “Misericordia” sería demasiado estrecho aquí; “fidelidad de pacto” explicita más de lo que el texto dice.
- source_word: לֹא אָסִיר מֵעִמּוֹ
  english_pob_choice: I will not remove ... from him
  chosen_spanish: no quitaré de él
  alternatives_spanish:
  - no apartaré de él
  - no retiraré de él
  lexicon: HALOT
  rationale: “Quitar” es un verbo natural y suficientemente directo para el valor de סוּר en Hifil, aquí en paralelo con “lo quité”. “Apartaré” y “retiraré” son posibles, pero menos inmediatos en español contemporáneo.
- source_word: כַּאֲשֶׁר הֲסִירוֹתִי
  english_pob_choice: as I removed it
  chosen_spanish: como lo quité
  alternatives_spanish:
  - como lo aparté
  - como lo retiré
  lexicon: HALOT
  rationale: Se conserva la repetición verbal del hebreo con el mismo verbo español que en la primera mitad de la frase. El objeto directo se sobreentiende por el contexto, como en el inglés POB.
- source_word: מֵאֲשֶׁר הָיָה לְפָנֶיךָ
  english_pob_choice: from the one who was before you
  chosen_spanish: de quien estuvo antes de ti
  alternatives_spanish:
  - del que estaba antes que tú
  - del que te precedió
  lexicon: HALOT
  rationale: El hebreo alude al predecesor sin nombrarlo; en español “quien estuvo antes de ti” preserva esa referencia indirecta y evita introducir el nombre en el cuerpo del texto. “Te precedió” es correcto pero más formal; “estaba antes que tú” suena menos natural en este contexto.
theological_decisions:
- issue: Lenguaje padre-hijo en el pacto davídico
  english_pob_reading: Retain the relational language 'a father' / 'a son' without softening or paraphrasing.
  chosen_spanish_reading: 'Mantener el lenguaje directo de relación: “padre” / “hijo”.'
  alternative_spanish_readings:
  - interpretar como mera protección o patrocinio
  - parafrasear como relación de cuidado sin filiación
  rationale: El texto establece una filiación real dentro del pacto real davídico. Traducirlo literalmente preserva su peso teológico y su relevancia canónica posterior, sin diluirlo en una explicación.
  doctrine_reference: DOCTRINE.md Translation philosophy §§1, 3, 4
- issue: Sentido de חֶסֶד en un contexto de pacto
  english_pob_reading: Translate as 'steadfast love.'
  chosen_spanish_reading: Traducir como “amor leal”.
  alternative_spanish_readings:
  - misericordia
  - bondad
  - lealtad
  rationale: “Amor leal” comunica tanto afecto como constancia pactal. En español bíblico actual evita el arcaísmo de “misericordia” cuando el énfasis está en fidelidad continuada, y evita también la reducción a una sola faceta semántica.
  doctrine_reference: DOCTRINE.md Translation philosophy §§1, 5
translation_notes:
  revision_awareness: El pasaje coincide con la revisión más reciente sin cambios necesarios; la redacción mantiene el paralelismo hebreo, la referencia indirecta al predecesor y la fuerza pactal de חֶסֶד, en línea con el audit trail en inglés.
  spanish_consistency_notes:
  - Se usa “Yahvé” solo cuando corresponda; en este versículo no aparece el tetragrámaton.
  - Se mantiene el paralelismo padre/hijo con formulación española natural y no eclesiástica.
  - Se evita nombrar a Saúl en el texto principal para respetar la alusión indirecta del hebreo.
  - Se conserva una traducción de חֶסֶד con carga de pacto, no meramente afectiva.
