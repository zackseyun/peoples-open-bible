translation:
  language: es
  text: Y David reunió a todo Israel en Jerusalén[a] para hacer subir el arca de Yahvé a su lugar[b], que había preparado para ella.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «a Jerusalén»; el hebreo usa la preposición «a», pero en español corriente una asamblea se expresa mejor como reunida «en» un lugar.
    reason: lexical_alternative
  - marker: b
    text: O «que había preparado para él»; el pronombre puede traducirse más literalmente en masculino, aunque en contexto se refiere más naturalmente al arca.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּקְהֵל
  english_pob_choice: assembled
  chosen_spanish: reunió
  alternatives_spanish:
  - convocó
  - juntó
  lexicon: HALOT
  rationale: El hiphil de קהל expresa hacer que el pueblo se junte. «Reunió» comunica de manera natural y fiel la acción de David sin añadir matices institucionales que el hebreo no exige.
- source_word: כָּל יִשְׂרָאֵל
  english_pob_choice: all Israel
  chosen_spanish: todo Israel
  alternatives_spanish:
  - todo el Israel
  - la totalidad de Israel
  lexicon: HALOT
  rationale: La expresión colectiva se conserva de forma idiomática en español como «todo Israel», manteniendo el alcance nacional/comunitario del hebreo.
- source_word: אֶל יְרוּשָׁלִָם
  english_pob_choice: at Jerusalem
  chosen_spanish: en Jerusalén
  alternatives_spanish:
  - a Jerusalén
  - hasta Jerusalén
  lexicon: HALOT
  rationale: Aunque la preposición hebrea es אֶל («a»), en español el resultado de la reunión se expresa mejor con «en Jerusalén». La nota conserva la alternativa más literal.
- source_word: לְהַעֲלוֹת
  english_pob_choice: to bring up
  chosen_spanish: para subir
  alternatives_spanish:
  - para traer arriba
  - para llevar arriba
  lexicon: HALOT
  rationale: עלה en este contexto cultual implica elevar o subir el arca. «Subir» preserva la imagen verbal y evita una paráfrasis más débil.
- source_word: אֲרוֹן יְהוָה
  english_pob_choice: the ark of Yahweh
  chosen_spanish: el arca de Yahvé
  alternatives_spanish:
  - el arca de Yahvé Dios
  - el arca de Yahvé
  lexicon: HALOT
  rationale: Se conserva el nombre divino «Yahvé» conforme al estándar del proyecto, y «arca» mantiene el sentido técnico del objeto sagrado sin sustituirlo por una formulación eclesiástica más interpretativa.
- source_word: אֶל מְקוֹמ֖וֹ
  english_pob_choice: to its place
  chosen_spanish: a su lugar
  alternatives_spanish:
  - a su sitio
  - al lugar que le correspondía
  lexicon: HALOT
  rationale: El sufijo pronominal sobre «lugar» se entiende naturalmente como referente del arca. «A su lugar» es breve, claro y fiel.
- source_word: אֲשֶׁר הֵכִין לוֹ
  english_pob_choice: which he had prepared for it
  chosen_spanish: que había preparado para ella
  alternatives_spanish:
  - que había preparado para él
  - que había dispuesto para ella
  lexicon: HALOT
  rationale: El antecedente más natural del sufijo es el arca, por lo que se traduce «para ella». Se mantiene la tensión del hebreo sin forzar una referencia exclusivamente masculina o abstracta.
theological_decisions:
- issue: Renderización del Tetragrámaton יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: El texto hebreo contiene el nombre propio divino. Conforme al criterio del proyecto, se vierte «Yahvé» para preservar el nombre revelado, en lugar de sustituirlo por un título.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Referencia del pronombre final en אֲשֶׁר הֵכִין לוֹ
  english_pob_reading: which he had prepared for it
  chosen_spanish_reading: que había preparado para ella
  alternative_spanish_readings:
  - que había preparado para él
  - que había preparado para ello
  rationale: En contexto, el destinatario más probable es el arca; por eso se refleja en femenino gramatical español como «ella». La nota preserva la alternativa más literal sin perder la lectura contextual predominante.
  doctrine_reference: Principio de antecedente contextual cercano
translation_notes:
  revision_awareness: El cotejo final indica alta concordancia con la fuente y sin cambios necesarios en la revisión más reciente; se mantuvo la decisión de traducir el nombre divino como Yahvé y de reflejar el pronombre final según el antecedente más natural en contexto.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» de forma consistente para יְהוָה.
  - Se prefirió un español natural («en Jerusalén») con nota que conserva la literalidad del hebreo («a Jerusalén»).
  - Se preservó la fuerza cultual de לְהַעֲלוֹת con «subir».
  - Se evitó sustituir «arca» por un término interpretativo o eclesiástico.
