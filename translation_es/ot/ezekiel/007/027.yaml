base_translation:
  language: en
  yaml_path: translation/ot/ezekiel/007/027.yaml
  text: The king will mourn[a], and the prince will clothe himself with desolation, and the hands of the people of the land will tremble. According to their way I will deal with them, and by their own judgments I will judge them[c][b]. Then they will know that I am Yahweh.
  footnotes:
  - marker: a
    text: Or, 'the prince will put on horror' or 'will be clothed with desolation.' The Hebrew uses a clothing metaphor with a noun that can denote desolation or appalled ruin.
    reason: lexical_alternative
  - marker: b
    text: Or, 'the hands of the common people will be terrified.' 'People of the land' is a Hebrew expression for the populace.
    reason: lexical_alternative
  - marker: c
    text: Or, 'according to their judgments I will judge them.' The Hebrew may mean that God judges them by the standards reflected in their own judicial practices.
    reason: alternative_reading
