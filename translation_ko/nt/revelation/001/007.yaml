  text: Ἰδοὺ ἔρχεται μετὰ τῶν νεφελῶν, καὶ ὄψεται αὐτὸν πᾶς ὀφθαλμὸς καὶ οἵτινες αὐτὸν ἐξεκέντησαν, καὶ κόψονται ἐπ’ αὐτὸν πᾶσαι αἱ φυλαὶ τῆς γῆς. ναί, ἀμήν.
base_translation:
  language: en
  yaml_path: translation/nt/revelation/001/007.yaml
  text: 'Look[a], he is coming with the clouds, and every eye will see him, even those who pierced him, and all the tribes of the earth will mourn over him. Yes, amen.'
  footnotes:
  - marker: a
    text: 'Or ''all the tribes of the land will mourn over him.'' The phrase may echo Zechariah 12:10-12, where ''land'' is contextually possible.'
    reason: alternative_reading
translation:
  language: ko
  text: '보십시오, 그분께서 구름과 함께 오십니다. 모든 눈이 그분을 볼 것이며, 그분을 찌른 자들도 볼 것입니다. 땅의 모든 족속이 그분을 인하여 가슴을 칠 것입니다[a]. 그렇습니다, 아멘.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: '또는 「땅의 모든 족속이 그분을 인하여 통곡할 것이다」. 스가랴 12:10-12의 반향이며, 「땅」은 문맥상 「그 땅(이스라엘)」으로도 읽힐 수 있다.'
    reason: alternative_reading
lexical_decisions:
- source_word: κόψονται
  english_pob_choice: will mourn
  chosen_korean: 가슴을 칠 것입니다
  alternatives_korean:
  - 통곡할 것입니다
  lexicon: BDAG
  rationale: '헬라어 κόπτω는 가슴을 치며 슬퍼하는 격렬한 애도 동작을 가리키므로 「가슴을 칠 것입니다」로 옮겨 몸짓의 강도를 살린다.'
