  chosen_reading: Use the coherent sense attested by the Greek parallel ('All these live and endure forever; in every need, all obey') as the main text, while footnoting the divergent/dislocated Hebrew wording.
  alternative_readings:
  - 'Translate the Zone 1 Hebrew literally: ''And who can be satisfied to behold? The form, the form of the height of the sky in purity.'''
  rationale: For Sirach, the project translates from Hebrew where it survives, but the prompt explicitly requires using the Greek parallel as actual translation input. Here the Hebrew line in Kahana does not match the contextual flow and is flagged by external manuscript evidence as likely displaced/corrupt, whereas the Greek yields a coherent verse and aligns with older Masada evidence at the fact level. This preserves transparency about source instability rather than forcing a misleading literal translation of a likely misplaced line.
