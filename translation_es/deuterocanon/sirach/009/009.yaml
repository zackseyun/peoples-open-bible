translation:
  language: es
  text: Aparta tus ojos de una mujer agraciada[a], y no fijes la vista en la belleza que no es tuya.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Paralelo griego: «No te sientes en absoluto con la esposa de otro hombre, ni bebas vino con ella, no sea que tu alma se aparte hacia ella y con tu espíritu resbales hacia la destrucción». El testimonio hebreo aquí es más breve y general.'
    reason: alternative_reading
lexical_decisions:
- source_word: הַעֲלִים עַיִן
  english_pob_choice: Turn your eyes away
  chosen_spanish: Aparta tus ojos
  alternatives_spanish:
  - Vuelve tus ojos aparte
  - Aparta la vista
  lexicon: HALOT
  rationale: El hebreo usa un modismo de ‘ocultar el ojo’ o apartarlo; en español, «aparta tus ojos» comunica con naturalidad la acción de desviar la mirada sin perder la fuerza exhortativa.
- source_word: אֵשֶׁת חֵן
  english_pob_choice: a graceful woman
  chosen_spanish: una mujer agraciada
  alternatives_spanish:
  - una mujer grácil
  - una mujer encantadora
  lexicon: HALOT
  rationale: «Agraciada» conserva el matiz de חֵן como encanto o gracia personal, sin reducirlo únicamente a belleza física, que aparece explícitamente en la segunda cola.
- source_word: תַּבִּיט
  english_pob_choice: gaze
  chosen_spanish: fijes la vista
  alternatives_spanish:
  - mires
  - contemples
  lexicon: HALOT
  rationale: En este contexto el verbo indica una mirada sostenida, no solo un vistazo. «Fijes la vista» reproduce esa intensidad de forma natural en español.
- source_word: יֹפִי
  english_pob_choice: beauty
  chosen_spanish: la belleza
  alternatives_spanish:
  - la hermosura
  - la hermosura física
  lexicon: HALOT
  rationale: «Belleza» es la equivalencia más directa y clara para יֹפִי, y funciona bien en paralelo con la advertencia anterior.
- source_word: לֹא לָךְ
  english_pob_choice: that is not yours
  chosen_spanish: que no es tuya
  alternatives_spanish:
  - que no te pertenece
  - que no es para ti
  lexicon: HALOT
  rationale: El hebreo expresa una pertenencia prohibida de forma breve. «Que no es tuya» mantiene esa frontera posesiva de manera idiomática en español, sin ampliar innecesariamente el sentido.
theological_decisions:
- issue: Relación entre el hebreo breve y el paralelo griego más desarrollado
  english_pob_reading: Follow the Hebrew main text while allowing the Greek to inform the sense of sexual/moral warning
  chosen_spanish_reading: Seguir el hebreo en el texto principal, dejando que el griego confirme que la advertencia es moral y sexual, pero sin trasladar al texto español la expansión griega
  alternative_spanish_readings:
  - No te sientes en absoluto con la mujer de otro, ni bebas vino con ella, no sea que tu alma se aparte hacia ella y con tu espíritu resbales hacia la destrucción
  - No te acerques a la esposa de otro
  rationale: El testimonio hebreo conservado es más breve y general; por ello el texto principal debe reflejar ese nivel de generalidad. El paralelo griego se usa como control interpretativo para no debilitar la advertencia, pero no como base para reemplazar la forma hebrea.
  doctrine_reference: 'PHILOSOPHY.md: translate from Hebrew where it survives; use Greek parallel as actual input'
translation_notes:
  revision_awareness: 'El pasaje fue revisado recientemente y no requirió cambios sustanciales: la versión española mantiene la prioridad del hebreo, integra el paralelo griego como apoyo interpretativo y conserva la advertencia moral sin sobreexpansión.'
  spanish_consistency_notes:
  - Se mantiene «Dios/Yahvé» sin aplicar aquí, pues el versículo no contiene el nombre divino.
  - Se usa «agraciada» para preservar חֵן con un matiz de gracia/encanto, y «belleza» para יֹפִי en la segunda mitad.
  - La nota al pie marca explícitamente la ampliación griega para reflejar la tensión textual documentada.
  - «Aparta tus ojos» y «fijes la vista» sostienen el contraste entre desviar la mirada y mirarla con insistencia.
