revisions:
- from: Porque Yahvé ama la justicia y no abandona a sus fieles[a]; serán guardados para siempre[b], pero la descendencia de los impíos será exterminada.
  to: Porque Yahvé ama la justicia y no abandona a sus fieles[a]; son guardados para siempre[b], pero la descendencia de los impíos será cortada.
  rationale: Se ajustó נִשְׁמָרוּ a 'son guardados' para reflejar mejor el pasivo gnómico/presente del hebreo y alinearlo con la decisión inglesa 'they are kept'. Se reemplazó 'será exterminada' por 'será cortada' para conservar el modismo bíblico de נִכְרָת ('be cut off') y su resonancia judicial/pactual, evitando una intensificación no justificada por la evidencia fuente.
  reviewer_model: gpt-5.4
