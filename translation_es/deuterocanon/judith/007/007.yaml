    text: O «los ascensos» o «los caminos de subida» a su ciudad. El griego destaca las rutas cuesta arriba que conducen a la ciudad.
    reason: lexical_alternative
  - marker: b
    text: El verbo griego es raro; también puede entenderse como «aseguró» o «bloqueó» las fuentes de agua.
    reason: lexical_alternative
  revision_rationale: Se corrige la representación de ἐφώδευεν para reflejar control militar real sobre las fuentes, no mero recorrido; se preserva la doble acción griega con 'tomó control de... y se apoderó de ellas'; se arregla la numeración de notas y se añade la nota léxica faltante. También se mejora la naturalidad y precisión militar del español con 'apostó' y 'hombres de guerra'.
