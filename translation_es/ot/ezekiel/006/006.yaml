    rationale: El hebreo מוֹשְׁבֹתֵיכֶם se puede expresar mejor como 'moradas' o 'lugares habitados' sin perder amplitud.
  - severity: medium
    issue: '''sus obras borradas'' suena menos natural que una formulación verbal finita.'
    rationale: Con 'obras' la forma más idiomática y clara es 'sus obras sean borradas' dentro de la serie verbal subordinada.
