base_translation:
  language: en
  yaml_path: translation/ot/leviticus/004/007.yaml
  text: And the priest shall put some of the blood on the horns of the altar of fragrant incense before Yahweh[a], which is in the tent of meeting, and he shall pour out all the bull’s blood at the base of the altar of burnt offering[b], which is at the entrance of the tent of meeting.
  footnotes:
  - marker: a
    text: Hebrew literally, 'all the blood of the bull'; the sense in context is the remainder after some blood has been applied to the altar horns.
    reason: lexical_alternative
  - marker: b
    text: Or simply, 'the incense altar.'
    reason: lexical_alternative
