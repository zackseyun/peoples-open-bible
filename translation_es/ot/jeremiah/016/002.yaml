translation:
  language: es
  text: No tomarás esposa[a], ni tendrás hijos ni hijas en este lugar.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más dinámicamente: «No te casarás, ni tendrás hijos ni hijas en este lugar».'
    reason: lexical_alternative
lexical_decisions:
- source_word: תִקַּח
  english_pob_choice: take
  chosen_spanish: tomarás
  alternatives_spanish:
  - te casarás
  - tomarás por esposa
  lexicon: HALOT
  rationale: לקח en la expresión 'tomar una esposa' conserva el movimiento verbal del hebreo. En español, 'tomarás esposa' resulta natural pero algo marcado; 'tomarás esposa para ti' mantiene la fuerza literal sin sonar antinatural.
- source_word: לְךָ
  english_pob_choice: for yourself
  chosen_spanish: para ti
  alternatives_spanish:
  - para ti mismo
  - para tu persona
  lexicon: HALOT
  rationale: El sufijo pronominal marca referencia personal directa. 'Para ti' comunica bien el sentido reflexivo/personal del mandato en español actual.
- source_word: אִשָּׁה
  english_pob_choice: wife
  chosen_spanish: esposa
  alternatives_spanish:
  - mujer
  - esposa
  lexicon: HALOT
  rationale: En este giro matrimonial, el contexto exige el sentido de cónyuge. 'Esposa' es el equivalente natural en español; 'mujer' sería demasiado amplio.
- source_word: וְלֹא יִהְיוּ לְךָ
  english_pob_choice: nor shall you have
  chosen_spanish: ni tendrás
  alternatives_spanish:
  - ni habrá para ti
  - ni te serán dados
  lexicon: HALOT
  rationale: El hebreo usa היה con לְ para expresar posesión/existencia. En español, 'ni tendrás' transmite la prohibición de manera idiomática y fiel a la función del original.
- source_word: בָּנִים וּבָנוֹת
  english_pob_choice: sons or daughters
  chosen_spanish: hijos ni hijas
  alternatives_spanish:
  - hijos e hijas
  - descendencia
  lexicon: HALOT
  rationale: El hebreo nombra explícitamente a ambos sexos. Dado el antecedente negativo ('no... ni...'), 'hijos ni hijas' expresa con naturalidad la prohibición y conserva la especificidad del texto.
- source_word: בַּמָּקוֹם הַזֶּה
  english_pob_choice: in this place
  chosen_spanish: en este lugar
  alternatives_spanish:
  - en este sitio
  - aquí
  lexicon: HALOT
  rationale: מָקוֹם significa básicamente 'lugar'. 'En este lugar' reproduce la deixis hebrea sin ampliar indebidamente a 'esta tierra'.
theological_decisions:
- issue: Naturaleza del mandato a Jeremías
  english_pob_reading: A direct divine prohibition against Jeremiah's marrying and having children in the present locale/context
  chosen_spanish_reading: Un mandato prohibitivo directo dirigido a Jeremías, no una mera predicción
  alternative_spanish_readings:
  - Una declaración general de que permanecerá soltero y sin hijos
  - Una restricción referida a toda la tierra en vez de a este lugar
  rationale: Las formas verbales de segunda persona singular indican un mandato directo. La traducción mantiene el valor prohibitivo y el alcance local de 'este lugar' sin resolver la tensión profética más allá de lo que el hebreo dice.
  doctrine_reference: 'Translation philosophy: preserve theological tension rather than resolve it; original-language primacy over translation tradition.'
translation_notes:
  revision_awareness: El texto coincide con el control de alta concordancia; no se requirieron revisiones adicionales respecto del paquete fuente y la auditoría inglesa.
  spanish_consistency_notes:
  - Se mantuvo el registro bíblico sobrio y contemporáneo, evitando tanto un calco rígido como una paráfrasis expansiva.
  - '''Esposa'' se usa por el contexto matrimonial; no se eligió ''mujer'' para no perder precisión.'
  - '''Este lugar'' conserva la deixis concreta del hebreo y evita interpretar de antemano el alcance geográfico.'
  - La nota al pie ofrece la alternativa dinámica documentada en la auditoría inglesa, sin sustituir la lectura principal.
