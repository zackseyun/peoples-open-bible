lexical_decisions:
- source_word: מִן
  english_pob_choice: From
  chosen_spanish: De
  alternatives_spanish:
  - Desde
  - Entre
  - De entre
  lexicon: HALOT
  rationale: En un registro de listado o censo, el valor de origen o procedencia se expresa con naturalidad en español con «de». Mantiene la relación de pertenencia/ procedencia sin forzar una construcción menos idiomática.
- source_word: בְּנֵי הַלֵּוִי
  english_pob_choice: the sons of Levi
  chosen_spanish: los hijos de Leví
  alternatives_spanish:
  - los levitas
  - los descendientes de Leví
  lexicon: HALOT
  rationale: Se conserva la expresión genealógica literal «hijos de Leví», que sigue de cerca el hebreo. «Levitas» sería más idiomático, pero borra un poco la forma constructa del original y la POB inglesa optó por preservar esa estructura.
- source_word: אַרְבַּעַת אֲלָפִים וְשֵׁשׁ מֵאוֹת
  english_pob_choice: 4,600
  chosen_spanish: '4.600'
  alternatives_spanish:
  - cuatro mil seiscientos
  lexicon: HALOT
  rationale: En una lista censal, los números con cifras son claros y auditables. «4.600» refleja correctamente el valor cardinal del hebreo sin añadir información ni alterar el estilo de enumeración.
translation_notes:
  revision_awareness: La fuente hebrea y la auditoría inglesa muestran plena concordancia textual y no requieren ajustes críticos; la traducción española sigue la misma decisión de lista/censo con numerales y una construcción genealógica literal.
  spanish_consistency_notes:
  - Se mantiene «Leví» con tilde según uso español del nombre propio bíblico.
  - Se usa el formato numérico con punto como separador de miles, conforme a la norma tipográfica española.
  - No se añaden notas porque no hay variantes textuales ni tensiones léxicas relevantes en este versículo.
