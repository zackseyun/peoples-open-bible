id: EZK.20.22
reference: Ezekiel 20:22
source:
  edition: WLC
  text: וַ/הֲשִׁבֹ֨תִי֙ אֶת יָדִ֔/י וָ/אַ֖עַשׂ לְמַ֣עַן שְׁמִ֑/י לְ/בִלְתִּ֤י הֵחֵל֙ לְ/עֵינֵ֣י הַ/גּוֹיִ֔ם אֲשֶׁר הוֹצֵ֥אתִי אוֹתָ֖/ם לְ/עֵינֵי/הֶֽם־־׃
translation:
  text: But I held back my hand[a], and I acted for the sake of my name, so that it would not be profaned in the sight of the nations[b], before whose eyes I had brought them out.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'I turned back my hand' / 'I withdrew my hand.' The Hebrew idiom expresses restraint from carrying out judgment.
    reason: lexical_alternative
  - marker: b
    text: Literally, 'so as not to profane [it],' with 'it' referring to God's name.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַהֲשִׁבֹתִי אֶת־יָדִי
  chosen: I held back my hand
  alternatives:
  - I turned back my hand
  - I withdrew my hand
  lexicon: HALOT
  rationale: The idiom literally involves causing one's hand to return/back. In context (cf. the preceding threat of judgment), it means refraining from executing the threatened action. 'Held back my hand' is idiomatic modern English that preserves the metaphor of the hand while conveying restraint.
- source_word: וָאַעַשׂ
  chosen: I acted
  alternatives:
  - I acted accordingly
  - I did so
  lexicon: HALOT
  rationale: עשה is broad ('do, act, make'). Here it refers to God's course of action in restraint for the sake of his name. 'I acted' is concise and natural, avoiding an overly vague 'I did' while not adding content.
- source_word: לְמַעַן שְׁמִי
  chosen: for the sake of my name
  alternatives:
  - for my name's sake
  lexicon: HALOT
  rationale: This covenantal expression refers to God's concern for the honor/reputation of his name. 'For the sake of my name' is transparent modern English and preserves the theological weight.
- source_word: לְבִלְתִּי הֵחֵל
  chosen: so that it would not be profaned
  alternatives:
  - so as not to profane it
  - so that it should not be defiled/desecrated
  lexicon: HALOT
  rationale: חלל in the piel/related nominal usage commonly means to profane, desecrate, treat as common. The implied object is God's name from the previous phrase. English requires making the object explicit with 'it' for clarity. 'Profaned' best preserves the covenantal/religious sense.
- source_word: לְעֵינֵי הַגּוֹיִם
  chosen: in the sight of the nations
  alternatives:
  - before the nations
  - in the eyes of the nations
  lexicon: HALOT
  rationale: 'The phrase is spatial/observational: publicly before the nations. ''In the sight of the nations'' is natural and retains the public-honor dimension.'
- source_word: אֲשֶׁר הוֹצֵאתִי אוֹתָם
  chosen: I had brought them out
  alternatives:
  - I brought them out
  lexicon: HALOT
  rationale: יצא in the hiphil means 'bring out.' The pluperfect 'had brought out' fits the relative clause in English, marking the prior action relative to the concern about profanation before the nations.
- source_word: לְעֵינֵיהֶם
  chosen: before whose eyes
  alternatives:
  - in their sight
  lexicon: HALOT
  rationale: This repeats the 'eyes/sight' motif and refers specifically to the nations' witnessing the exodus/deliverance. 'Before whose eyes' preserves the vividness and links naturally with the relative clause.
