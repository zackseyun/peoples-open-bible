revisions:
- from: Pero el hombre que se vuelva inmundo y no se purifique[a] será cortado de en medio de la asamblea, porque ha profanado el santuario de Yahvé. El agua para impureza[b] no ha sido rociada sobre él; inmundo es él.
  to: Pero el hombre que quede impuro y no se purifique será cortada[a] esa persona de en medio de la asamblea, porque ha contaminado el santuario de Yahvé. El agua de impureza[b] no ha sido rociada sobre él; él está impuro.
  rationale: 'Se corrige el borrador para ajustarlo mejor al hebreo y al rastro auditado: se añade la nota obligatoria sobre נֶפֶשׁ, se elimina una nota no necesaria sobre ''se purifique'', se reemplaza ''ha profanado'' por ''ha contaminado'' para reflejar mejor טמא, y se mejoran varias formulaciones para un español más natural y fiel. También se normaliza el cierre a ''él está impuro''.'
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T22:14:46Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la estructura y el sentido general del hebreo: impureza ritual, falta de purificación, sanción de ser ''cortado'', contaminación del santuario y permanencia en estado impuro por no haber recibido el agua ritual. Sin embargo, hay pequeños desajustes frente al rastro auditado: falta la nota alternativa correspondiente a ''esa persona / esa alma será cortada'', y una nota actual sobre ''se purifique'' no preserva una alternativa significativa sino que repite la traducción elegida. También conviene ajustar ''ha profanado'' a ''ha contaminado'' o ''ha hecho impuro'' para alinearse más estrechamente con טמא en contexto cultual, y suavizar algunas expresiones poco naturales.'
  spanish_quality_summary: 'El español es generalmente claro y digno, pero contiene giros algo rígidos o menos naturales: ''el agua para impureza'' suena algo forzado, y ''inmundo es él'' es demasiado calcado para el estilo meta. ''Se vuelva inmundo'' es posible, pero ''quede impuro'' o ''se vuelva impuro'' lee mejor en español contemporáneo eclesial. ''Impuro'' suele ser más natural que ''inmundo'' en un contexto ritual de este tipo.'
  glossary_alignment: Se respeta correctamente 'Yahvé'. No hay conflictos con terminología mesiánica o cristológica. En cuanto al léxico ritual, el proyecto pide preservar matices; aquí conviene preferir 'impuro/impureza' de forma consistente y evitar que 'profanado' desplace el valor de טמא hacia otra raíz/concepto. La fórmula legal 'será cortada' debe mantenerse y acompañarse con la nota alternativa sobre 'alma/persona', como en el English POB.
  issues:
  - severity: medium
    issue: Falta la nota equivalente a la alternativa de נֶפֶשׁ en la fórmula legal.
    rationale: El English POB preserva explícitamente la alternativa 'that soul shall be cut off'. En español debe mantenerse una nota semejante, anclada en la frase de sanción, porque es una decisión léxica significativa documentada en la auditoría.
  - severity: medium
    issue: La nota [a] actual sobre 'se purifique' no aporta una alternativa preservada del audit trail.
    rationale: La nota repite esencialmente la misma traducción y añade explicación, pero no conserva una alternativa textual relevante. Dado el límite de notas y la disciplina pedida, es mejor usar el marcador para la fórmula con נֶפֶשׁ, que sí está documentada.
  - severity: medium
    issue: '''Ha profanado'' se aparta del valor más directo de טִמֵּא en este contexto.'
    rationale: Aunque comunica gravedad cultual, 'profanar' puede sugerir una acción distinta. El hebreo habla de contaminar/hacer impuro el santuario por permanecer impuro; 'ha contaminado' o 'ha hecho impuro' alinea mejor con la decisión léxica auditada.
  - severity: low
    issue: '''El agua para impureza'' suena poco natural en español.'
    rationale: Es muy literal, pero en español resulta extraño. 'El agua de impureza' es más natural y además está contemplado como alternativa en la auditoría inglesa; una nota puede conservar la otra posibilidad y la forma tradicional 'agua de separación'.
  - severity: low
    issue: '''Inmundo es él'' suena demasiado calcado.'
    rationale: El hebreo es una cláusula nominal enfática, pero el español meta favorece una formulación más natural como 'él está impuro' o 'él es impuro' sin perder el sentido legal.
  revised_spanish_text: Pero el hombre que quede impuro y no se purifique será cortada[a] esa persona de en medio de la asamblea, porque ha contaminado el santuario de Yahvé. El agua de impureza[b] no ha sido rociada sobre él; él está impuro.
  revised_footnotes:
  - marker: a
    text: O «esa alma será cortada». La fórmula legal hebrea puede referirse a la persona entera, no solo al alma inmaterial.
    reason: lexical_alternative
  - marker: b
    text: O «el agua para impureza»; tradicionalmente, «el agua de separación». La frase alude al agua de purificación preparada en este capítulo.
    reason: lexical_alternative
  revision_rationale: 'Se corrige el borrador para ajustarlo mejor al hebreo y al rastro auditado: se añade la nota obligatoria sobre נֶפֶשׁ, se elimina una nota no necesaria sobre ''se purifique'', se reemplaza ''ha profanado'' por ''ha contaminado'' para reflejar mejor טמא, y se mejoran varias formulaciones para un español más natural y fiel. También se normaliza el cierre a ''él está impuro''.'
