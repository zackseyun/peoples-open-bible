id: EST.1.8
reference: Esther 1:8
source:
  edition: WLC
  text: וְ/הַ/שְּׁתִיָּ֥ה כַ/דָּ֖ת אֵ֣ין אֹנֵ֑ס כִּי כֵ֣ן יִסַּ֣ד הַ/מֶּ֗לֶךְ עַ֚ל כָּל רַ֣ב בֵּית֔/וֹ לַ/עֲשׂ֖וֹת כִּ/רְצ֥וֹן אִישׁ וָ/אִֽישׁ־׀־־׃
translation:
  text: 'And the drinking was according to the law: there was no compulsion[c][b][a], for so the king had instructed every official of his household to do according to the desire of each man.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'according to the regulation'; the Hebrew term can denote a law, decree, or formal rule.
    reason: lexical_alternative
  - marker: b
    text: Literally, 'there was no compulsion,' meaning no one was forced to drink.
    reason: lexical_alternative
  - marker: c
    text: Hebrew 'each man and man,' a distributive expression meaning each individual.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהַשְּׁתִיָּה
  chosen: And the drinking
  alternatives:
  - And the banquet drinking
  - And the drinking feast
  lexicon: HALOT
  rationale: The noun refers specifically to drinking/drinking activity within the banquet context. 'And the drinking' preserves the concrete sense without over-paraphrasing to a broader 'banquet.'
- source_word: כַדָּת
  chosen: according to the law
  alternatives:
  - according to the rule
  - according to the regulation
  lexicon: HALOT
  rationale: דָּת in Persian-period usage often means law, decree, or regulation. 'According to the law' is a natural rendering here, though the immediate sense is procedural rule for the feast.
- source_word: אֵין אֹנֵס
  chosen: there was no compulsion
  alternatives:
  - no one was compelled
  - there was no forcing
  lexicon: HALOT
  rationale: The phrase states the absence of coercion. 'There was no compulsion' is concise and preserves the nominal construction better than converting it fully into an active clause.
- source_word: כִּי כֵן
  chosen: for so
  alternatives:
  - for this is how
  - because thus
  lexicon: HALOT
  rationale: The pair gives the reason for the no-compulsion policy. 'For so' is compact and idiomatic in English while retaining the causal-plus-demonstrative force.
- source_word: יִסַּד
  chosen: had ordered
  alternatives:
  - had established
  - had founded
  - had laid down
  lexicon: HALOT
  rationale: Though the verb's core sense is 'establish/found,' in this administrative context it refers to setting down an instruction or policy. 'Had ordered' communicates the practical force in context.
- source_word: עַל כָּל רַב בֵּיתוֹ
  chosen: every official of his household
  alternatives:
  - every chief of his house
  - every steward of his palace
  lexicon: HALOT
  rationale: רַב literally means a great one/chief. In context it denotes those in charge within the king's household or palace administration. 'Official of his household' is clear modern English and fits the court setting.
- source_word: לַעֲשׂוֹת
  chosen: to do
  alternatives:
  - to act
  - to carry out
  lexicon: HALOT
  rationale: The infinitive is straightforward. 'To do' keeps the wording close to the Hebrew and works with the following phrase.
- source_word: כִּרְצוֹן
  chosen: according to the desire of
  alternatives:
  - according to the pleasure of
  - according to the wish of
  lexicon: HALOT
  rationale: רָצוֹן here denotes what someone wants or prefers. 'Desire' is natural and slightly more formal than 'wish,' fitting the royal setting.
- source_word: אִישׁ וָאִישׁ
  chosen: each man
  alternatives:
  - every man
  - one man and another
  - each person
  lexicon: HALOT
  rationale: The distributive expression means each individual person. Following the project's gender-accurate principle, 'each man' preserves the masculine singular form rather than neutralizing it to 'each person.' In context it refers broadly to individual attendees.
