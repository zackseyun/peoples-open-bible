translation:
  language: es
  text: Israel es una vid exuberante[a] que da fruto para sí[b]. Cuanto más aumentaba su fruto, tanto más multiplicó altares; cuanto más prosperaba su tierra, tanto más mejoraron los pilares sagrados[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «vid vacía» o «vid que se extiende». El adjetivo hebreo es difícil; el texto principal sigue el sentido favorecido por el contexto de fruto abundante y tierra próspera.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «produce fruto para sí mismo». El hebreo puede llevar un matiz reflexivo o de beneficio propio.'
    reason: lexical_alternative
  - marker: c
    text: 'O: «estelas» o «piedras erguidas de culto». Eran monumentos de piedra usados en la adoración, aquí en un contexto idólatra condenado.'
    reason: cultural_note
lexical_decisions:
- source_word: גֶּפֶן
  english_pob_choice: vine
  chosen_spanish: vid
  alternatives_spanish:
  - vid de uva
  - parra
  lexicon: HALOT
  rationale: «Vid» conserva la metáfora agrícola de una planta fructífera y es natural en español bíblico moderno. «Parra» puede sonar más coloquial; «vid de uva» es más explicativa de lo necesario.
- source_word: בּוֹקֵק
  english_pob_choice: luxuriant
  chosen_spanish: exuberante
  alternatives_spanish:
  - frondosa
  - lozana
  - vacía
  - desbordante
  lexicon: HALOT
  rationale: El hebreo admite tensión semántica; el POB inglés privilegia la imagen de abundancia vegetal frente a «emptying». «Exuberante» expresa crecimiento vigoroso sin borrar la ambigüedad original, y funciona bien con la metáfora de la vid.
- source_word: פְּרִי יְשַׁוֶּה לּוֹ
  english_pob_choice: yields fruit for himself
  chosen_spanish: da fruto para sí
  alternatives_spanish:
  - da fruto para él mismo
  - produce fruto para sí
  - lleva su fruto para sí
  lexicon: HALOT
  rationale: La secuencia hebrea puede tener matiz reflexivo o de beneficio propio. «Da fruto para sí» mantiene esa tensión sin sonar forzado en español y sigue de cerca la revisión auditada del POB inglés.
- source_word: כְּרֹב לְפִרְיוֹ
  english_pob_choice: The more his fruit increased
  chosen_spanish: Cuanto más aumentaba su fruto
  alternatives_spanish:
  - Según aumentaba su fruto
  - A medida que crecía su fruto
  - Mientras más crecía su fruto
  lexicon: HALOT
  rationale: La construcción comparativa-correlativa se reproduce con una forma natural en español y conserva la progresión causal del versículo.
- source_word: הִרְבָּה לַמִּזְבְּחוֹת
  english_pob_choice: the more he multiplied altars
  chosen_spanish: multiplicó altares
  alternatives_spanish:
  - aumentó los altares
  - hizo muchos altares
  - multiplicó los altares
  lexicon: HALOT
  rationale: El verbo causativo de רבה se expresa bien con «multiplicó». Se omite el artículo para mantener el efecto bíblico y la concisión del hebreo.
- source_word: כְּטוֹב לְאַרְצוֹ
  english_pob_choice: the better his land became
  chosen_spanish: cuanto mejor era su tierra
  alternatives_spanish:
  - cuanto mejor le iba a su tierra
  - según prosperaba su tierra
  - cuanto más prosperaba su tierra
  lexicon: HALOT
  rationale: La frase apunta a prosperidad de la tierra, no a bondad moral. «Era su tierra» conserva la relación posesiva y el paralelismo con la primera cola.
- source_word: הֵיטִיבוּ
  english_pob_choice: they made better
  chosen_spanish: hicieron mejores
  alternatives_spanish:
  - mejoraron
  - embellecieron
  - mejoraron aún más
  lexicon: HALOT
  rationale: El hiphil de יטב significa mejorar/hacer bueno. «Hicieron mejores» suena algo literal en español, pero refleja la estructura comparativa del hebreo junto con el objeto implícito.
- source_word: מַצֵּבוֹת
  english_pob_choice: sacred pillars
  chosen_spanish: pilares sagrados
  alternatives_spanish:
  - pilares rituales
  - estelas sagradas
  - piedras sagradas
  lexicon: HALOT
  rationale: El POB inglés eligió una expresión que explicita su función cultual. «Pilares sagrados» sigue esa decisión en español, preservando el sentido religioso y el tono de denuncia.
theological_decisions:
- issue: Tensión lexical inicial entre una vid 'exuberante' y la posible lectura de 'vid vacía'
  english_pob_reading: The verse depicts Israel as prosperous and fruitful, yet using that prosperity to increase idolatrous worship.
  chosen_spanish_reading: Israel aparece como una vid exuberante y fecunda, pero esa prosperidad se desvía hacia la idolatría.
  alternative_spanish_readings:
  - Israel es una vid vacía
  - Israel es una vid que vacía
  rationale: La evidencia inmediata del contexto habla de fruto abundante, aumento de altares y mejora de la tierra, por lo que la lectura de prosperidad irónica es la más sólida. La traducción principal conserva esa tensión sin negar la posible dificultad léxica del hebreo.
  doctrine_reference: Translation philosophy §1, §3
- issue: Sentido de לו en פְּרִי יְשַׁוֶּה לּוֹ
  english_pob_reading: Or, 'he brings forth fruit for himself.' The Hebrew may carry a reflexive or self-serving nuance.
  chosen_spanish_reading: «da fruto para sí» conserva el matiz reflexivo o autobeneficioso.
  alternative_spanish_readings:
  - da fruto para él
  - produce fruto
  rationale: El pronombre puede leerse en sentido reflexivo o de provecho propio. La traducción elegida mantiene esa ambigüedad orientada por el contexto, sin volverla una glosa interpretativa excesiva.
  doctrine_reference: Translation philosophy §1, §3
- issue: Naturaleza de מַצֵּבוֹת en un contexto de culto ilegítimo
  english_pob_reading: Or, 'standing stones' or 'cult pillars.' These were stone monuments used in worship, here in a condemned idolatrous setting.
  chosen_spanish_reading: «pilares sagrados» comunica su función cultual en un contexto condenatorio.
  alternative_spanish_readings:
  - estelas cultuales
  - piedras erigidas
  - columnas sagradas
  rationale: En español, «pilares sagrados» explica la referencia sin perder el valor histórico-religioso del objeto. Mantiene también la denuncia profética al mostrar que se trata de elementos de culto, no de simple arquitectura.
  doctrine_reference: Translation philosophy §1, §3
translation_notes:
  revision_awareness: Se incorporó el ajuste de la revisión auditada que hace explícito el matiz reflexivo de לו en «da fruto para sí». Se mantuvo la lectura de prosperidad/fructificación del primer miembro, en línea con el consenso revisado del POB inglés y con el contexto inmediato del versículo.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como terminología por defecto para el nombre divino, aunque este versículo no lo contiene.
  - Se conserva «pilares sagrados» para מַצֵּבוֹת, siguiendo la decisión auditada del POB inglés y su nota cultural.
  - «Exuberante» evita borrar la tensión léxica del hebreo y sigue la lectura contextual adoptada por el POB.
  - El paralelismo «Cuanto más... tanto más...» reproduce la relación proporcional del hebreo con naturalidad en español.
