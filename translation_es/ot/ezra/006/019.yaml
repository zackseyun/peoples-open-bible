translation:
  language: es
  text: Y los hijos del exilio celebraron la Pascua el día catorce del primer mes[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'los hijos de la cautividad' o 'los exiliados'. El hebreo dice literalmente 'los hijos del exilio'.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּעֲשׂוּ
  english_pob_choice: kept
  chosen_spanish: celebraron
  alternatives_spanish:
  - guardaron
  - observaron
  - hicieron
  lexicon: HALOT
  rationale: El verbo hebreo literalmente significa 'hacer', pero con פֶּסַח como objeto el sentido idiomático es celebrar/observar la Pascua. 'Celebraron' comunica bien el acto ritual en español sin perder naturalidad.
- source_word: בְנֵי
  english_pob_choice: sons of
  chosen_spanish: hijos de
  alternatives_spanish:
  - hijos
  - hijos de
  - los descendientes de
  lexicon: HALOT
  rationale: El hebreo usa una construcción idiomática colectiva. En español, 'hijos de' conserva la cercanía formal al original y mantiene el carácter corporativo del grupo.
- source_word: הַגּוֹלָה
  english_pob_choice: the exile
  chosen_spanish: el exilio
  alternatives_spanish:
  - la cautividad
  - los exiliados
  - los repatriados
  lexicon: HALOT
  rationale: La expresión apunta a la comunidad definida por el exilio. 'El exilio' conserva el valor colectivo e idiomático sin introducir precisiones no explícitas en el verso.
- source_word: הַפָּסַח
  english_pob_choice: the Passover
  chosen_spanish: la Pascua
  alternatives_spanish:
  - la Pascua
  - la fiesta de la Pascua
  - el sacrificio de Pascua
  lexicon: HALOT
  rationale: '''Pascua'' es el equivalente natural en español para la observancia pascual y mantiene suficiente amplitud para el sentido ritual del término.'
- source_word: בְּאַרְבָּעָה עָשָׂר
  english_pob_choice: on the fourteenth day
  chosen_spanish: el día catorce
  alternatives_spanish:
  - el catorce
  - el día catorce de
  - a los catorce días
  lexicon: HALOT
  rationale: La fórmula hebrea de fecha se expresa de manera natural en español como 'el día catorce'. Se omite 'del día' por idiomaticidad, pero el sentido calendárico queda claro.
- source_word: לַחֹדֶשׁ הָרִאשׁוֹן
  english_pob_choice: of the first month
  chosen_spanish: del primer mes
  alternatives_spanish:
  - en el primer mes
  - del mes primero
  lexicon: HALOT
  rationale: '''Del primer mes'' reproduce con claridad la fórmula de datación y es la forma más idiomática en español contemporáneo.'
translation_notes:
  revision_awareness: El texto inglés POB mantiene 'sons of the exile' y añade una nota sobre alternativas literales; la versión española conserva la misma decisión base con equivalentes naturales en español y sin introducir contenido interpretativo adicional.
  spanish_consistency_notes:
  - Se mantuvo 'Pascua' para הַפָּסַח, en línea con el audit trail inglés.
  - Se conservó la imagen colectiva de בְנֵי הַגּוֹלָה con una nota de alternativa literal, siguiendo el tratamiento del POB en inglés.
  - La fecha se expresó en español de manera natural, preservando el valor completo de la fórmula hebrea.
