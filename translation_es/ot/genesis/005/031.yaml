translation:
  language: es
  text: Todos los días de Lamec fueron setecientos setenta y siete años[a], y murió.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El hebreo ordena literalmente el número como «siete y setenta años, y setecientos años», es decir, 777 años.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְהִי
  english_pob_choice: So ... were
  chosen_spanish: Así ... fueron
  alternatives_spanish:
  - Y ... fueron
  - Entonces ... fueron
  lexicon: HALOT
  rationale: La forma narrativa de conversión hebrea introduce un resumen de edad; en español, «Así» conserva la relación conclusiva/secuencial con naturalidad sin forzar un calco de la sintaxis hebrea.
- source_word: כָּל יְמֵי
  english_pob_choice: all the days of
  chosen_spanish: todos los días de
  alternatives_spanish:
  - toda la vida de
  - todos los años de
  lexicon: HALOT
  rationale: Es el giro hebreo habitual para la duración total de una vida. «Todos los días de» mantiene la imagen idiomática del texto fuente y es perfectamente inteligible en español bíblico actual.
- source_word: לֶמֶךְ
  english_pob_choice: Lamech
  chosen_spanish: Lamec
  alternatives_spanish:
  - Lamech
  lexicon: Convención de nombres propios bíblicos en español
  rationale: Se adopta la forma tradicional en español «Lamec», que es natural para lectores bíblicos y transparente como nombre propio.
- source_word: שֶׁבַע וְשִׁבְעִים ... וּשְׁבַע מֵאוֹת
  english_pob_choice: seven hundred seventy-seven
  chosen_spanish: setecientos setenta y siete
  alternatives_spanish:
  - setecientos y setenta y siete
  lexicon: HALOT
  rationale: El hebreo ordena los componentes numéricos de manera no idiomática para el español, pero el total es 777. La forma española natural conserva el valor exacto sin perder la equivalencia cuantitativa.
- source_word: שָׁנָה
  english_pob_choice: years
  chosen_spanish: años
  alternatives_spanish:
  - año
  lexicon: HALOT
  rationale: Aunque el hebreo usa singular tras el numeral, el español requiere el plural para una edad total; «años» expresa con normalidad la duración de vida.
- source_word: וַיָּמֹת
  english_pob_choice: and he died
  chosen_spanish: y murió
  alternatives_spanish:
  - entonces murió
  - y falleció
  lexicon: HALOT
  rationale: Se conserva la fórmula genealógica simple y repetitiva de Génesis 5. «Y murió» es directo, fiel y mantiene el peso literario del cierre.
theological_decisions:
- issue: Fórmula genealógica de longevidad y muerte en Génesis 5
  english_pob_reading: Render the age statement plainly as a historical lifespan summary without interpretive qualification.
  chosen_spanish_reading: Presentar la declaración de edad de modo llano como un resumen histórico de la vida de Lamec, sin añadir matices simbólicos ni explicaciones ajenas al texto.
  alternative_spanish_readings:
  - Interpretar el número de manera simbólica
  - suavizar la muerte con lenguaje devocional
  rationale: El hebreo ofrece una declaración numérica directa seguida del cierre «y murió». La traducción debe reflejar ese sentido liso y reiterativo sin introducir una lectura alegórica ni atenuar la contundencia del enunciado.
  doctrine_reference: Principio de primacía del texto original; no importar al versículo afirmaciones doctrinales o interpretativas que el texto no formula.
translation_notes:
  revision_awareness: El expediente inglés indica que no hubo revisiones posteriores y que el consenso de revisión fue alto; por eso la redacción española sigue de cerca la solución auditada, conservando el número total como 777 y la clausura genealógica simple.
  spanish_consistency_notes:
  - Se mantiene «Lamec» como forma española estándar del nombre propio.
  - Se conserva la equivalencia exacta de la cifra total mediante «setecientos setenta y siete».
  - La nota al pie explica la ordenación hebrea del número sin alterar el cuerpo principal del texto.
