base_translation:
  language: en
  yaml_path: translation/ot/judges/007/024.yaml
  text: And Gideon sent messengers throughout all the hill country of Ephraim[a], saying, “Come down against Midian, and seize the waters as far as Beth-barah, and the Jordan.” So every man of Ephraim was called out, and they seized the waters as far as Beth-barah[c][b], and the Jordan.
  footnotes:
  - marker: a
    text: Or 'seize the watercourses' or 'seize the fords'; the Hebrew reads literally 'the waters,' likely referring to strategic crossing points.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'every man of Ephraim.' The singular collective likely refers to the fighting men of Ephraim being summoned as a group.
    reason: lexical_alternative
  - marker: c
    text: The verb rendered 'was called out' is difficult; some understand it more literally as 'cried out,' but the context favors the sense of being summoned or mustered.
    reason: alternative_reading
