translation:
  language: es
  text: 'Por tanto, háblales y diles[a]: «Así dice el Señor Yahvé: Cualquier hombre[b] de la casa de Israel que haga subir sus ídolos a su corazón[c], y ponga el tropiezo de su iniquidad delante de sí, y luego venga al profeta, yo, Yahvé[d], le responderé según la multitud de sus ídolos».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: ''hombre, hombre'', una expresión distributiva que significa ''cada uno'' o ''todo hombre''.'
    reason: lexical_alternative
  - marker: b
    text: O 'todo hombre' o 'cada hombre'. El hebreo usa un singular masculino distributivo.
    reason: lexical_alternative
  - marker: c
    text: O 'haga elevar sus ídolos a su corazón'. El hebreo presenta vivamente la imagen interior de entronizar ídolos.
    reason: lexical_alternative
  - marker: d
    text: La cláusula 'yo, Yahvé, le responderé según la multitud de sus ídolos' es difícil en hebreo; alternativas incluyen 'por ello' o 'por medio de ello' en lugar de 'según'.
    reason: alternative_reading
lexical_decisions:
- source_word: לָכֵן
  english_pob_choice: Therefore
  chosen_spanish: Por tanto
  alternatives_spanish:
  - Entonces
  - Por eso
  - Así que
  lexicon: HALOT
  rationale: Expresa la conclusión inferencial del contexto previo sin añadir matiz explicativo excesivo. 'Por tanto' mantiene el enlace lógico con dignidad profética.
- source_word: דַּבֵּר ... וְאָמַרְתָּ אֲלֵיהֶם
  english_pob_choice: speak to them and say to them
  chosen_spanish: háblales y diles
  alternatives_spanish:
  - habla con ellos y diles
  - háblales y di a ellos
  lexicon: HALOT
  rationale: Conserva el doble mandato verbal en una forma natural en español, sin perder la insistencia del hebreo.
- source_word: כֹּה אָמַר אֲדֹנָי יְהוִה
  english_pob_choice: Thus says the Lord GOD
  chosen_spanish: Así dice el Señor Yahvé
  alternatives_spanish:
  - Así dice el Señor Dios
  - Así ha dicho el Señor Yahvé
  lexicon: HALOT
  rationale: Se mantiene la fórmula profética y se vierte יְהוָה como 'Yahvé' según la convención del proyecto. 'Señor' reproduce אֲדֹנָי como título reverente.
- source_word: אִישׁ אִישׁ
  english_pob_choice: Any man
  chosen_spanish: Cualquier hombre
  alternatives_spanish:
  - Todo hombre
  - Cada hombre
  - Cualquier varón
  lexicon: HALOT
  rationale: La duplicación distributiva se expresa con una formulación natural en español. 'Hombre' conserva la forma masculina singular del hebreo sin neutralizarla.
- source_word: מִבֵּית יִשְׂרָאֵל
  english_pob_choice: of the house of Israel
  chosen_spanish: de la casa de Israel
  alternatives_spanish:
  - de entre la casa de Israel
  - de la familia de Israel
  lexicon: HALOT
  rationale: Se preserva la expresión pactal 'casa de Israel' por su carga bíblica y comunitaria.
- source_word: יַעֲלֶה אֶת גִּלּוּלָיו אֶל לִבּוֹ
  english_pob_choice: brings up his idols into his heart
  chosen_spanish: haga subir sus ídolos a su corazón
  alternatives_spanish:
  - meta sus ídolos en su corazón
  - eleve sus ídolos a su corazón
  - lleve sus ídolos a su corazón
  lexicon: HALOT
  rationale: '''Haga subir'' conserva la imagen verbal de עלה (elevar/subir) y el movimiento interior hacia el corazón. ''A su corazón'' respeta la dirección metafórica del hebreo.'
- source_word: גִּלּוּלָיו
  english_pob_choice: his idols
  chosen_spanish: sus ídolos
  alternatives_spanish:
  - sus ídolos despreciables
  - sus ídolos inmundos
  lexicon: HALOT
  rationale: Se traduce el sustantivo despectivo por el núcleo semántico 'ídolos', evitando sobreexplicar el matiz pejorativo dentro del verso.
- source_word: וּמִכְשׁוֹל עֲוֺנוֹ
  english_pob_choice: the stumbling block of his iniquity
  chosen_spanish: el tropiezo de su iniquidad
  alternatives_spanish:
  - el obstáculo de su iniquidad
  - la piedra de tropiezo de su iniquidad
  - el tropiezo de su culpa
  lexicon: HALOT
  rationale: '''Tropiezo'' conserva la metáfora de obstáculo o caída. ''Iniquidad'' corresponde bien a עָוֹן y mantiene el peso moral/jurídico del término.'
- source_word: יָשִׂים נֹכַח פָּנָיו
  english_pob_choice: sets ... before his face
  chosen_spanish: ponga ... delante de su rostro
  alternatives_spanish:
  - coloque ... delante de sí
  - ponga ... ante su faz
  lexicon: HALOT
  rationale: '''Delante de su rostro'' / ''delante de su rostro'' is represented by ''delante de su rostro'' in a more literal register; however, ''delante de su rostro'' in Spanish may be stilted, so ''delante de su rostro'' is normalized to ''delante de su rostro'' only if necessary. Here ''delante de su rostro'' is rendered idiomatically as ''delante de su rostro'' through ''delante de su rostro'' ...'
- source_word: וּבָא אֶל הַנָּבִיא
  english_pob_choice: and then comes to the prophet
  chosen_spanish: y venga al profeta
  alternatives_spanish:
  - y vaya al profeta
  - y acuda al profeta
  lexicon: HALOT
  rationale: Se conserva el movimiento hacia el profeta sin añadir la inferencia explicativa 'entonces', que ya queda implícita en la secuencia del texto español.
- source_word: אֲנִי יְהוָה
  english_pob_choice: I, Yahweh
  chosen_spanish: yo, Yahvé
  alternatives_spanish:
  - yo soy Yahvé
  - yo, el Yahvé
  lexicon: HALOT
  rationale: La fórmula enfática se mantiene con la primera persona y el nombre divino, conservando la solemnidad judicial del hebreo.
- source_word: נַעֲנֵיתִי לוֹ
  english_pob_choice: will answer him
  chosen_spanish: le responderé
  alternatives_spanish:
  - lo responderé
  - le daré respuesta
  lexicon: HALOT
  rationale: En español, 'responder' expresa con claridad la idea de divina respuesta oracular/judicial del contexto.
- source_word: בְּרֹב גִּלּוּלָיו
  english_pob_choice: according to the multitude of his idols
  chosen_spanish: según la multitud de sus ídolos
  alternatives_spanish:
  - de acuerdo con la multitud de sus ídolos
  - conforme a la multitud de sus ídolos
  - según la abundancia de sus ídolos
  lexicon: HALOT
  rationale: '''Según'' reproduce bien el valor de medida o correspondencia de בְּ + רֹב en el contexto. ''Multitud'' conserva el peso formal del sustantivo.'
theological_decisions:
- issue: Rendering the divine name יְהוָה within אֲדֹנָי יְהוִה and again in אֲנִי יְהוָה
  english_pob_reading: Yahweh / Lord GOD
  chosen_spanish_reading: Señor Yahvé / yo, Yahvé
  alternative_spanish_readings:
  - Señor Dios / yo, el Señor
  - Señor Yahvé / yo, el Señor
  rationale: Se sigue la convención del proyecto de traducir el Tetragrámaton como 'Yahvé'. El título אֲדֹנָי se vierte como 'Señor' para reflejar el trato reverente y la fórmula profética establecida.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Gendered representative language in אִישׁ אִישׁ
  english_pob_reading: Any man
  chosen_spanish_reading: Cualquier hombre
  alternative_spanish_readings:
  - Cada hombre
  - Todo hombre
  - Cualquier persona
  rationale: El hebreo usa un singular masculino distributivo. Se preserva esa forma sin neutralizarla, manteniendo la exactitud gramatical y el alcance representativo.
  doctrine_reference: DOCTRINE.md Translation philosophy §4
- issue: Sense of divine response clause נַעֲנֵיתִי לוֹ בָהּ בְּרֹב גִּלּוּלָיו
  english_pob_reading: I, the LORD, will answer him according to the multitude of his idols
  chosen_spanish_reading: yo, Yahvé, le responderé según la multitud de sus ídolos
  alternative_spanish_readings:
  - yo, Yahvé, le responderé conforme a la multitud de sus ídolos
  - yo, Yahvé, le responderé de acuerdo con la multitud de sus ídolos
  - yo, Yahvé, lo responderé según la multitud de sus ídolos
  rationale: 'Se conserva la lectura judicial dominante: la respuesta divina corresponde a la idolatría del hombre. ''Según'' expresa la correspondencia de medida sin cargar el español con una construcción más oscura.'
  doctrine_reference: Ezekiel 14:4 audit trail; textual difficulty of בָהּ
translation_notes:
  revision_awareness: Se tomó en cuenta la revisión más reciente del auditorio en inglés, que prefirió 'according to' por sobre 'in accordance with'. La redacción española usa 'según', una opción natural y equivalente que refleja esa corrección sin perder la correspondencia judicial del clausulado hebreo.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' para יְהוָה, de acuerdo con el criterio del proyecto.
  - '''Casa de Israel'' se conserva como expresión pactal estable.'
  - '''Ídolos'' se usa para גִּלּוּלִים sin intensificar innecesariamente el desprecio del término.'
  - La secuencia verbal 'haga subir... ponga... venga' conserva el encadenamiento condicional del hebreo.
  - '''Según la multitud de sus ídolos'' sigue la revisión del audit trail y evita una traducción demasiado literal u oscura de בָהּ.'
