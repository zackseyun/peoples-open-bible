id: GEN.30.3
reference: Genesis 30:3
source:
  edition: WLC
  text: וַ/תֹּ֕אמֶר הִנֵּ֛ה אֲמָתִ֥/י בִלְהָ֖ה בֹּ֣א אֵלֶ֑י/הָ וְ/תֵלֵד֙ עַל בִּרְכַּ֔/י וְ/אִבָּנֶ֥ה גַם אָנֹכִ֖י מִמֶּֽ/נָּה־־׃
translation:
  text: Then she said[a], “Here is my female servant Bilhah. Go in to her, so that she may bear on my knees[c][b], and I too may be built up through her.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literally, 'give birth on my knees,' likely referring to a cultural practice by which the child born to a servant woman was symbolically received as the wife's child.
    reason: cultural_note
  - marker: b
    text: Or 'that I too may obtain children through her.' The Hebrew says 'be built up,' using a family/offspring metaphor.
    reason: lexical_alternative
  - marker: c
    text: Or 'and that I too may be built up through her'.
    reason: previous_rendering
lexical_decisions:
- source_word: אֲמָתִי
  chosen: my female servant
  alternatives:
  - my maidservant
  - my slave-girl
  lexicon: HALOT
  rationale: אמה denotes a female servant/slave. 'Female servant' is clear modern English and preserves the social subordination without sounding archaic like 'maidservant.'
- source_word: בֹּא אֵלֶיהָ
  chosen: Go in to her
  alternatives:
  - sleep with her
  - have relations with her
  lexicon: HALOT
  rationale: This idiom is a standard Hebrew euphemism for sexual relations. 'Go in to her' preserves the source idiom while remaining understandable in English.
- source_word: וְתֵלֵד עַל בִּרְכַּי
  chosen: so that she may give birth on my knees
  alternatives:
  - and bear upon my knees
  - and give birth with me receiving the child on my knees
  lexicon: HALOT
  rationale: The phrase is culturally marked and likely refers to a surrogate/adoption custom in which the child is symbolically received by the wife. The literal 'on my knees' should be retained in the main text for transparency.
- source_word: וְאִבָּנֶה
  chosen: I may be built up
  alternatives:
  - I may be established
  - I may obtain children
  lexicon: HALOT
  rationale: The Niphal of בנה literally means 'be built up.' In this context it is an idiomatic wordplay for being established through offspring. Retaining 'built up' preserves the metaphor and lexical connection, while the footnote can clarify the childbearing sense.
- source_word: מִמֶּנָּה
  chosen: through her
  alternatives:
  - from her
  - by her
  lexicon: HALOT
  rationale: The preposition marks Bilhah as the means by which Rachel seeks offspring/status. 'Through her' communicates instrumentality more naturally than 'from her' in English.
- source_word: גַם אָנֹכִי
  chosen: I too
  alternatives:
  - even I
  - I also
  lexicon: HALOT
  rationale: This emphasizes Rachel's participation in the hoped-for result in contrast to her barrenness. 'I too' is natural and preserves the emphasis.
