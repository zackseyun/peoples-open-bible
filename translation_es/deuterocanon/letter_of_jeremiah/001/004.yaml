translation:
  language: es
  text: Por tanto, estén en guardia[a], no sea que también ustedes, habiendo llegado a ser como los extranjeros, lleguen a ser como ellos, y el temor los alcance por causa de ellos,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «sean asimilados a los extranjeros ... sean asimilados». El griego repite el mismo verbo dos veces para dar énfasis.'
    reason: lexical_alternative
lexical_decisions:
- source_word: εὐλαβήθητε
  english_pob_choice: be on your guard
  chosen_spanish: estén en guardia
  alternatives_spanish:
  - tengan cuidado
  - manténganse alertas
  - guárdense
  lexicon: LSJ
  rationale: El imperativo aoristo en contexto de advertencia pide un español urgente y claro. «Estén en guardia» conserva la imagen de vigilancia activa mejor que un simple «cuidado» y evita el tono devocional de «sean reverentes».
- source_word: οὖν
  english_pob_choice: therefore
  chosen_spanish: por tanto
  alternatives_spanish:
  - entonces
  - así que
  lexicon: LSJ
  rationale: Marca consecuencia lógica del contexto previo. «Por tanto» es natural en español formal y preserva la conexión inferencial.
- source_word: μὴ καὶ ὑμεῖς
  english_pob_choice: lest you too
  chosen_spanish: no sea que también ustedes
  alternatives_spanish:
  - para que ustedes no también
  - de modo que ustedes no
  lexicon: LSJ
  rationale: La construcción negativa de advertencia se expresa de manera idiomática en español con «no sea que». «También ustedes» conserva explícitamente la inclusión de los destinatarios.
- source_word: ἀφομοιωθέντες ... ἀφομοιωθῆτε
  english_pob_choice: having become like ... become like
  chosen_spanish: habiéndose hecho como ... se hagan como
  alternatives_spanish:
  - habiendo sido asimilados a ... sean asimilados
  - habiéndose conformado a ... se conformen a
  lexicon: LSJ
  rationale: El griego repite el mismo verbo para énfasis. «Hacerse como» reproduce esa repetición de forma natural en español sin imponer un tecnicismo sociológico como «asimilarse».
- source_word: τοῖς ἀλλοφύλοις
  english_pob_choice: the foreigners
  chosen_spanish: los extranjeros
  alternatives_spanish:
  - las naciones
  - los gentiles
  - los de otra nación
  lexicon: LSJ
  rationale: ἀλλόφυλος designa literalmente a quienes pertenecen a otro pueblo o tribu. «Extranjeros» es la opción más directa y comprensible; «gentiles» añadiría una carga técnico-religiosa no exigida por el texto.
- source_word: φόβος ὑμᾶς λάβῃ
  english_pob_choice: fear seize you
  chosen_spanish: el temor los alcance
  alternatives_spanish:
  - el miedo los tome
  - el temor se apodere de ustedes
  - el miedo caiga sobre ustedes
  lexicon: LSJ
  rationale: El griego presenta al temor como fuerza activa que toma a los oyentes. «Los alcance» conserva el movimiento de irrupción y suena natural en español; «temor» mantiene el registro bíblico sin convertirlo en una frase demasiado coloquial.
- source_word: ἐπʼ αὐτοῖς
  english_pob_choice: because of them
  chosen_spanish: por causa de ellos
  alternatives_spanish:
  - a causa de ellos
  - por ellos
  - debido a ellos
  lexicon: LSJ
  rationale: El contexto favorece un valor causal. «Por causa de ellos» expresa con claridad que el temor sobreviene en relación con los extranjeros, sin estrechar indebidamente el sentido.
theological_decisions:
- issue: Sentido del doble verbo ἀφομοιόω y su alcance contextual
  english_pob_reading: A warning against becoming like the foreign peoples in their idolatrous behavior
  chosen_spanish_reading: Una advertencia contra hacerse como los pueblos extranjeros en su conducta idolátrica
  alternative_spanish_readings:
  - Una advertencia más general contra la asimilación social
  - Una advertencia contra parecerse a los extranjeros sin precisar el ámbito moral
  rationale: La repetición verbal debe conservarse como énfasis. El español mantiene amplitud suficiente para el texto, pero la nota contextualiza que el foco inmediato es la imitación de la idolatría circundante, no la etnicidad en sí.
  doctrine_reference: DOCTRINE.md § Preserve theological tension rather than resolve it
translation_notes:
  revision_awareness: El pasaje se ha revisado y el estado más reciente indica que no fueron necesarios cambios; esta versión sigue el acuerdo mayoritario del control cruzado y conserva la repetición enfática del verbo griego mediante una construcción natural en español.
  spanish_consistency_notes:
  - Se usa «Yahvé» para el nombre divino cuando aparezca; este versículo no lo contiene.
  - «Extranjeros» traduce ἀλλόφυλοι sin cargar el texto con un tecnicismo eclesiástico.
  - Se mantuvo la repetición verbal del original con «habiéndose hecho como ... se hagan como» para no perder el énfasis retórico.
  - «Temor» se eligió sobre «miedo» por consistencia con un registro bíblico digno y por el valor personificado del sustantivo griego.
