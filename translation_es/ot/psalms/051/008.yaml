translation:
  language: es
  text: He aquí, tú deseas la verdad en lo íntimo[a], y en lo oculto[b] me das a conocer la sabiduría.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «en el ser interior»; las expresiones hebreas para la interioridad son poéticas y también pueden entenderse como «en lo más profundo» o «en el interior».
    reason: lexical_alternative
  - marker: b
    text: O «me enseñas sabiduría». El hebreo usa un causativo de «conocer», por lo que la idea es «me haces saber» o «me das a conocer» la sabiduría.
    reason: lexical_alternative
lexical_decisions:
- source_word: הֵן
  english_pob_choice: Behold
  chosen_spanish: He aquí
  alternatives_spanish:
  - Mira
  - Ciertamente
  - He ahí
  lexicon: HALOT
  rationale: La interjección hebrea introduce una afirmación enfática y dirige la atención; «He aquí» conserva ese valor poético y solemne en español sin volverlo plano.
- source_word: אֱמֶת
  english_pob_choice: truth
  chosen_spanish: la verdad
  alternatives_spanish:
  - la fidelidad
  - la realidad
  - la rectitud
  lexicon: HALOT
  rationale: En este paralelismo, «verdad» comunica mejor la sinceridad e integridad interior que Dios busca. «Fidelidad» sería posible, pero estrecha el sentido hacia lealtad pactal sin suficiente apoyo inmediato.
- source_word: חָפַצְתָּ
  english_pob_choice: you desire
  chosen_spanish: tú deseas
  alternatives_spanish:
  - te deleitas en
  - te complaces en
  - amas
  lexicon: HALOT
  rationale: El verbo puede expresar deseo o deleite; «deseas» refleja bien la voluntad divina orientada a la verdad interior y evita cargar demasiado el matiz emotivo de placer.
- source_word: בַּטֻּחוֹת
  english_pob_choice: in the inward parts
  chosen_spanish: en lo íntimo
  alternatives_spanish:
  - en el interior
  - en las partes internas
  - en lo más profundo
  lexicon: HALOT
  rationale: La imagen hebrea habla de las partes internas o recónditas de la persona. «En lo íntimo» mantiene la metáfora de interioridad de forma natural en español, sin convertirla en una explicación psicológica más amplia de lo que el texto dice.
- source_word: וּבְסָתֻם
  english_pob_choice: in the hidden place
  chosen_spanish: en lo oculto
  alternatives_spanish:
  - en secreto
  - en el lugar escondido
  - en lo escondido
  lexicon: HALOT
  rationale: El término apunta a lo escondido o cubierto. «En lo oculto» conserva la paralelismo con «en lo íntimo» y evita reducir la imagen espacial a un mero adverbio funcional como «secretamente».
- source_word: חָכְמָה
  english_pob_choice: wisdom
  chosen_spanish: sabiduría
  alternatives_spanish:
  - prudencia
  - inteligencia
  - discernimiento
  lexicon: HALOT
  rationale: «Sabiduría» es la equivalencia estándar y más fiel al término hebreo en este contexto moral y espiritual.
- source_word: תוֹדִיעֵנִי
  english_pob_choice: you make wisdom known to me
  chosen_spanish: me haces conocer
  alternatives_spanish:
  - me enseñas
  - me das a conocer
  - me haces saber
  lexicon: HALOT
  rationale: El causativo de ידע expresa «hacer saber / hacer conocer». En español, «me haces conocer la sabiduría» conserva con claridad el valor causativo sin sustituirlo por un verbo más interpretativo.
theological_decisions:
- issue: La verdad que Dios desea en el interior humano
  english_pob_reading: God desires truth within the person and imparts wisdom internally, without importing later doctrinal categories.
  chosen_spanish_reading: Dios desea verdad en el interior de la persona y hace conocer la sabiduría en lo oculto, sin precisar más allá de la imagen poética.
  alternative_spanish_readings:
  - Dios desea fidelidad pactal en lo íntimo
  - Dios busca sinceridad psicológica en el ser interior
  rationale: El hebreo presenta paralelismo poético entre interioridad verdadera y sabiduría dada por Dios. La traducción conserva esa tensión sin reducirla ni a una categoría doctrinal posterior ni a una lectura meramente introspectiva moderna.
  doctrine_reference: Salmos 51:8; Translation philosophy §§1, 3, 6
translation_notes:
  revision_awareness: 'El texto español sigue de cerca el hebreo y el audit trail inglés: mantiene la apertura enfática de הֵן con «He aquí», conserva el paralelismo entre interioridad y ocultamiento, y refleja el valor causativo de תוֹדִיעֵנִי con una construcción activa natural en español. Se evita una paráfrasis más interpretativa y se preserva la tensión entre «verdad»/«fidelidad» e interioridad poética.'
  spanish_consistency_notes:
  - Se usa «Yahvé» por defecto cuando aparezca el nombre divino; este versículo no lo contiene.
  - Se prefiere «sabiduría» para חָכְמָה y «verdad» para אֱמֶת, conforme al uso consistente del proyecto.
  - «Lo íntimo» y «lo oculto» mantienen el lenguaje poético del interior humano sin convertirlo en glosa doctrinal.
  - No se introduce terminología litúrgica tradicional que oscurezca el hebreo subyacente.
