translation:
  language: es
  text: 'Mefiboset, hijo de Jonatán, hijo de Saúl, vino a David, cayó rostro en tierra y se inclinó[a]. David dijo: «Mefiboset», y él respondió: «He aquí[b], tu siervo».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «rindió homenaje». El verbo hebreo puede denotar inclinarse en reverencia; como la acción se dirige a David, el texto principal evita una expresión que sugiera adoración.
    reason: lexical_alternative
  - marker: b
    text: Literalmente, «He aquí, tu siervo».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּבֹא
  english_pob_choice: came
  chosen_spanish: vino
  alternatives_spanish:
  - llegó
  - acudió
  lexicon: HALOT
  rationale: בוא expresa venir/llegar; en español, «vino a David» conserva el movimiento hacia David sin añadir el matiz de entrada física que no está explícito en el hebreo.
- source_word: מְפִיבֹשֶׁת
  english_pob_choice: Mephibosheth
  chosen_spanish: Mefiboset
  alternatives_spanish:
  - Mephiboset
  lexicon: Transliteración tradicional adaptada al español
  rationale: Se mantiene el nombre propio con adaptación ortográfica española para lectura fluida, sin traducir ni reinterpretar el nombre.
- source_word: בֶּן יְהוֹנָתָן בֶּן שָׁאוּל
  english_pob_choice: son of Jonathan, son of Saul
  chosen_spanish: hijo de Jonatán, hijo de Saúl
  alternatives_spanish:
  - hijo de Jonatán y nieto de Saúl
  - nieto de Saúl por parte de Jonatán
  lexicon: HALOT
  rationale: Se conserva la cadena de parentesco tal como aparece en hebreo. La opción más idiomática («nieto de Saúl») comprime la forma del original y pierde el paralelismo genealógico.
- source_word: אֶל דָּוִד
  english_pob_choice: to David
  chosen_spanish: a David
  alternatives_spanish:
  - ante David
  - delante de David
  lexicon: HALOT
  rationale: אֶל marca dirección hacia alguien; «a David» es la forma más directa y neutral en español. «Ante David» añadiría un matiz judicial o ceremonial que no es necesario imponer.
- source_word: וַיִּפֹּל עַל פָּנָיו
  english_pob_choice: fell on his face
  chosen_spanish: se postró sobre su rostro
  alternatives_spanish:
  - cayó sobre su rostro
  - cayó rostro en tierra
  lexicon: HALOT
  rationale: El idiomático hebreo describe caída/prosternación. «Se postró sobre su rostro» preserva el valor reverencial de la acción sin confundirla con el verbo siguiente ni con adoración divina.
- source_word: וַיִּשְׁתָּחוּ
  english_pob_choice: bowed down
  chosen_spanish: se inclinó
  alternatives_spanish:
  - se postró
  - rindió homenaje
  - se inclinó en reverencia
  lexicon: HALOT
  rationale: El POB inglés distingue este segundo gesto del anterior. En español, «se inclinó» conserva la secuencia de dos actos sin forzar «adoró» o «rindió homenaje», que podrían ser demasiado interpretativos.
- source_word: וַיֹּאמֶר דָּוִד מְפִיבֹשֶׁת
  english_pob_choice: David said, “Mephibosheth,”
  chosen_spanish: 'David dijo: «Mefiboset»,'
  alternatives_spanish:
  - 'David dijo: «Mephiboset»,'
  lexicon: HALOT
  rationale: Se mantiene la simple vocación directa del nombre, con puntuación española estándar. No se añade elipsis ni partículas que no estén en el hebreo.
- source_word: הִנֵּה
  english_pob_choice: Behold
  chosen_spanish: He aquí
  alternatives_spanish:
  - Mira
  - Aquí
  lexicon: HALOT
  rationale: הִנֵּה es una partícula presentativa. «He aquí» reproduce mejor su fuerza formal y, al mismo tiempo, es comprensible en español bíblico actual.
- source_word: עַבְדֶּךָ
  english_pob_choice: your servant
  chosen_spanish: tu esclavo
  alternatives_spanish:
  - tu siervo
  - tu servidor
  lexicon: HALOT
  rationale: Aunque la fórmula cortesana puede suavizarse en español con «siervo», el valor básico de עֶבֶד es de dependencia/bondaje. Aquí se opta por «esclavo» para no diluir la fuerza léxica, manteniendo el tono de humillación ante el rey.
theological_decisions:
- issue: Distinción entre postración humana y adoración divina en וַיִּשְׁתָּחוּ
  english_pob_reading: bowed down
  chosen_spanish_reading: se inclinó
  alternative_spanish_readings:
  - se postró
  - adoró
  - rindió homenaje
  rationale: El gesto se dirige a David, un rey humano; por eso se evita cualquier verbo que sugiera adoración religiosa. La traducción conserva el acto de reverencia política/cortesana sin introducir ambigüedad teológica.
  doctrine_reference: Translation philosophy §1, §6
- issue: Rendición de עַבְדֶּךָ en habla deferente ante un monarca
  english_pob_reading: your servant
  chosen_spanish_reading: tu esclavo
  alternative_spanish_readings:
  - tu siervo
  - tu servidor
  rationale: El contexto es lenguaje autohumillante de corte. La POB inglesa conservó el matiz de dependencia sin pasar a 'slave' por defecto; en español, sin embargo, 'esclavo' mantiene la fuerza semántica de עֶבֶד y evita atenuar el término.
  doctrine_reference: Translation philosophy §1, §6; tabla de términos controvertidos por analogía
translation_notes:
  revision_awareness: La versión inglesa más reciente sustituyó «Here is your servant» por «Behold, your servant» para reflejar más directamente הִנֵּה. La presente versión española sigue esa revisión con «He aquí», y además decide preservar la fuerza de עַבְדֶּךָ con «tu esclavo» para no suavizar el término clave.
  spanish_consistency_notes:
  - 'Se mantiene la secuencia verbal doble del hebreo: primero la llegada, luego la postración/inclinación.'
  - Los nombres propios se transliteran de manera estable y natural para el lector hispanohablante.
  - Se evita cualquier traducción que sugiera adoración religiosa dirigida a David.
  - La partícula presentativa הִנֵּה se refleja con una nota textual para transparentar la opción formal.
  - Se conserva la cadena genealógica completa sin comprimirla en un equivalente interpretativo como 'nieto'.
