translation:
  language: es
  text: Y en aquel tiempo derribaron a unos diez mil hombres de Moab[a], todo hombre robusto[b] y todo hombre de valor[c]; no escapó ni un hombre.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El hebreo dice literalmente «Moab»; la traducción hace explícito que se refiere a hombres de Moab, ya que el versículo inmediatamente cuenta «unos diez mil hombres».
    reason: lexical_alternative
  - marker: b
    text: O «todo hombre recio» o «todo hombre gordo»; el hebreo dice literalmente «todo hombre gordo/grueso», probablemente describiendo hombres bien alimentados o fuertes, no solo el tamaño corporal en sentido neutral.
    reason: lexical_alternative
  - marker: c
    text: O «todo hombre capaz» o «todo hombre poderoso»; la expresión hebrea suele referirse a un hombre valiente, capaz o fuerte, especialmente en contexto militar.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּכּוּ
  english_pob_choice: they struck down
  chosen_spanish: hirieron
  alternatives_spanish:
  - derribaron
  - mataron
  - golpearon
  lexicon: HALOT
  rationale: En un contexto militar, נכה puede expresar derrotar, herir o matar. «Hirieron» conserva el sentido violento del verbo sin decidir más de lo que el hebreo dice de forma explícita en esta cláusula.
- source_word: אֶת מוֹאָב
  english_pob_choice: men of Moab
  chosen_spanish: a Moab
  alternatives_spanish:
  - a los moabitas
  - a los hombres de Moab
  lexicon: HALOT
  rationale: El hebreo dice literalmente «a Moab», y el conteo inmediato de «hombres» hace claro que se trata de la fuerza masculina de Moab. En español, mantener «Moab» respeta la forma del texto; la aclaración se sostiene por el contexto sin añadir una glosa innecesaria.
- source_word: בָּעֵת הַהִיא
  english_pob_choice: at that time
  chosen_spanish: en aquel tiempo
  alternatives_spanish:
  - en ese tiempo
  - entonces
  lexicon: HALOT
  rationale: Es la equivalencia temporal natural en español y conserva el valor deíctico del hebreo.
- source_word: כַּעֲשֶׂרֶת אֲלָפִים אִישׁ
  english_pob_choice: about ten thousand men
  chosen_spanish: como a diez mil hombres
  alternatives_spanish:
  - unos diez mil hombres
  - aproximadamente diez mil hombres
  lexicon: HALOT
  rationale: El prefijo כ sugiere aproximación; «como a» refleja esa cualidad de manera fiel y transparente.
- source_word: כָּל שָׁמֵן
  english_pob_choice: every stout man
  chosen_spanish: todos robustos[b]
  alternatives_spanish:
  - todos gordos
  - todos fornidos
  - todos fuertes
  lexicon: HALOT
  rationale: שָׁמֵן literalmente significa «graso/gordo», pero aquí el contexto militar favorece una referencia a hombres vigorosos o bien alimentados. «Robustos» comunica esa posible fuerza física sin sonar ofensivo, y preserva la tensión semántica del hebreo.
- source_word: וְכָל אִישׁ חָיִל
  english_pob_choice: every man of valor
  chosen_spanish: todos hombres de valor[c]
  alternatives_spanish:
  - todos hombres valientes
  - todos hombres capaces
  - todos hombres fuertes
  lexicon: HALOT
  rationale: אִישׁ חָיִל es una expresión militar y social para un hombre capaz, valiente o de valor. «Hombres de valor» conserva el giro idiomático y su tono marcial.
- source_word: וְלֹא נִמְלַט אִישׁ
  english_pob_choice: not a man escaped
  chosen_spanish: no escapó ni un hombre
  alternatives_spanish:
  - no escapó hombre alguno
  - y no se escapó nadie
  lexicon: HALOT
  rationale: La construcción hebrea enfatiza la total falta de supervivientes. «No escapó ni un hombre» reproduce esa fuerza distributiva de manera natural en español.
theological_decisions:
- issue: 'Alcance del objeto directo: «Moab» como territorio/pueblo frente a los hombres combatientes'
  english_pob_reading: The translation makes explicit that the reference is to Moabite men, since the verse immediately counts 'about ten thousand men.'
  chosen_spanish_reading: Se mantiene «a Moab» y se deja que la mención inmediata de «diez mil hombres» determine que el referente son combatientes moabitas.
  alternative_spanish_readings:
  - a los moabitas
  - a los hombres de Moab
  rationale: No hay necesidad de imponer una expansión interpretativa en el texto principal. La frase siguiente ya aclara el referente humano, por lo que la traducción puede permanecer cercana al hebreo sin perder inteligibilidad.
  doctrine_reference: Criterio de fidelidad textual y referencia contextual inmediata
translation_notes:
  revision_awareness: 'El pasaje se mantiene conforme al texto hebreo y al audit trail inglés: aproximación con כ, ambigüedad de שָׁמֵן, valor idiomático de אִישׁ חָיִל y totalización en la cláusula final. No se aplicaron revisiones posteriores.'
  spanish_consistency_notes:
  - Se conserva «Yahvé» como norma general del proyecto, pero este versículo no contiene el nombre divino.
  - Se evita «SEÑOR» porque no aparece ninguna alusión al tetragrámaton ni una cita de κύριος.
  - «Robustos» y «hombres de valor» mantienen la tensión lexical sin domesticar el hebreo.
  - La puntuación y el orden verbal están ajustados a un español bíblico moderno y claro.
