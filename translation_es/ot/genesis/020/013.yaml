base_translation:
  language: en
  yaml_path: translation/ot/genesis/020/013.yaml
  text: 'And when God caused me to wander from my father’s house[a], I said to her, ‘This is the kindness you shall show me: at every place to which we come, say of me[b], “He is my brother.”’'
  footnotes:
  - marker: a
    text: Or 'caused me to go astray' / 'made me wander.' The Hebrew verb is causative and can denote wandering or straying; here the sense is departure and unsettled movement rather than necessarily moral error.
    reason: lexical_alternative
  - marker: b
    text: '''Kindness'' translates Hebrew hesed, which can also carry the sense of loyal love or faithful kindness depending on context.'
    reason: lexical_alternative
