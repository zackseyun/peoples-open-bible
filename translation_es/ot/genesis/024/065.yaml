base_translation:
  language: en
  yaml_path: translation/ot/genesis/024/065.yaml
  text: And she said to the servant[a], “Who is this man walking in the field to meet us?” And the servant said[c][b], “He is my master.” Then she took the veil and covered herself.
  footnotes:
  - marker: a
    text: Or “Who is that man walking in the field to meet us?” The Hebrew demonstrative can be rendered either “this” or “that” depending on English deixis.
    reason: lexical_alternative
  - marker: b
    text: Or “He is my lord.” Here the Hebrew means the servant’s human master, not a divine title.
    reason: lexical_alternative
  - marker: c
    text: 'Or “veiled herself.” The Hebrew verb is reflexive: she took the veil and covered herself with it.'
    reason: lexical_alternative
