revisions:
- from: Pero nosotros, habiendo soportado su insensatez[a], y habiendo sido traídos con victoria, y habiendo tratado humanamente[b] a todas las naciones en Egipto, hicimos lo que era conveniente.
  to: Pero nosotros, habiendo soportado su insensatez[a], y habiendo sido llevados a través con victoria, y habiendo tratado con humanidad[b] a todas las naciones en Egipto, hicimos lo que era apropiado.
  rationale: Se ajusta «habiendo sido traídos con victoria» a «habiendo sido llevados a través con victoria» para reflejar mejor el pasivo y la idea de haber sido conducidos con éxito a través de la situación. Se cambia «tratado humanamente» por «tratado con humanidad» por mayor naturalidad en español sin perder la base léxica. Se reemplaza «lo que era conveniente» por «lo que era apropiado» para acercarse mejor al matiz de καθὼς ἔπρεπεν. También se corrige el anglicismo en la nota a.
