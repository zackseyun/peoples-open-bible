translation:
  language: es
  text: Pues extraños[a] se han levantado contra mí, y hombres violentos[b] buscan mi vida[c]; no ponen a Dios delante de sí. Selá
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'forasteros'. El hebreo זָרִים puede denotar personas ajenas, extrañas o extranjeras.
    reason: lexical_alternative
  - marker: b
    text: O 'hombres crueles' o 'tiranos' para 'hombres violentos'.
    reason: lexical_alternative
  - marker: c
    text: Hebreo 'buscan mi alma'; aquí 'alma' se refiere a la vida del salmista.
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  lexicon: HALOT
  rationale: Mantiene el valor causal del hebreo en un español natural y apto para el arranque poético del versículo.
- source_word: זָרִים
  english_pob_choice: strangers
  chosen_spanish: extraños
  alternatives_spanish:
  - forasteros
  - foráneos
  lexicon: HALOT
  rationale: Zָרִים puede referirse a personas ajenas, extrañas o extranjeras. 'Extraños' conserva esa amplitud semántica sin especificar indebidamente etnia o procedencia.
- source_word: קָמוּ עָלַי
  english_pob_choice: have risen against me
  chosen_spanish: se han levantado contra mí
  alternatives_spanish:
  - han subido contra mí
  - se han alzado contra mí
  lexicon: HALOT
  rationale: La imagen verbal de hostilidad se conserva bien en español con 'levantado contra mí', que reproduce el valor idiomático de קום על.
- source_word: עָרִיצִים
  english_pob_choice: ruthless men
  chosen_spanish: hombres violentos
  alternatives_spanish:
  - hombres crueles
  - tiranos
  lexicon: HALOT
  rationale: '''Violentos'' refleja el matiz de dureza/opresión de עָרִיצִים y permite un equivalente claro en español; ''hombres'' preserva el plural masculino del hebreo.'
- source_word: בִּקְשׁוּ נַפְשִׁי
  english_pob_choice: seek my life
  chosen_spanish: buscan mi vida
  alternatives_spanish:
  - buscan mi alma
  - buscan quitarme la vida
  lexicon: HALOT
  rationale: En este contexto נֶפֶשׁ apunta a la vida concreta del salmista, no principalmente a una entidad anímica separable; 'mi vida' evita una lectura más estrecha de 'alma'.
- source_word: לֹא שָׂמוּ אֱלֹהִים לְנֶגְדָּם
  english_pob_choice: they do not set God before them
  chosen_spanish: no han puesto a Dios delante de ellos
  alternatives_spanish:
  - no mantienen a Dios delante de sí
  - Dios no está delante de ellos
  lexicon: HALOT
  rationale: La metáfora espacial se mantiene casi literal en español para preservar la fuerza moral del hebreo sin interpretarla de más.
- source_word: סֶלָה
  english_pob_choice: Selah
  chosen_spanish: Selah
  lexicon: HALOT
  rationale: Se translitera como marcador litúrgico-musical de sentido incierto, siguiendo la práctica conservadora del proyecto.
theological_decisions:
- issue: Sentido antropológico de נֶפֶשׁ en contexto de amenaza mortal
  english_pob_reading: Rendered as 'life' rather than 'soul'
  chosen_spanish_reading: Traducido como 'vida'
  alternative_spanish_readings:
  - alma
  - vida / alma
  rationale: El contexto describe una persecución para matar al salmista; 'vida' comunica mejor la referencia concreta sin imponer una dicotomía cuerpo/alma que el versículo no destaca.
  doctrine_reference: Mantener la tensión semántica del original; primacía del hebreo sobre la tradición de traducción.
translation_notes:
  revision_awareness: La revisión más reciente indicó que no se requerían cambios y el cotejo externo mostró alto acuerdo; por eso se mantiene la lectura base con decisiones léxicas coherentes con el audit trail inglés.
  spanish_consistency_notes:
  - Se conservó 'Selah' sin traducir por su carácter litúrgico incierto.
  - Se prefirió 'Dios' y no una sustitución reverencial, porque el hebreo dice explícitamente אֱלֹהִים.
  - La puntuación reproduce el paralelismo y la pausa final del hebreo.
