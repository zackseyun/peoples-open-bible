id: EST.9.24
reference: Esther 9:24
source:
  edition: WLC
  text: כִּי֩ הָמָ֨ן בֶּֽן הַמְּדָ֜תָא הָֽ/אֲגָגִ֗י צֹרֵר֙ כָּל הַ/יְּהוּדִ֔ים חָשַׁ֥ב עַל הַ/יְּהוּדִ֖ים לְ/אַבְּדָ֑/ם וְ/הִפִּ֥יל פּוּר֙ ה֣וּא הַ/גּוֹרָ֔ל לְ/הֻמָּ֖/ם וּֽ/לְ/אַבְּדָֽ/ם־־־׃
translation:
  text: For Haman son of Hammedatha the Agagite[a], the enemy of all the Jews, had plotted against the Jews to destroy them, and had cast Pur—that is[b], the lot—to crush them and to destroy them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew Pur is a loanword explained in the text itself as 'the lot'; retaining it preserves the connection to the name Purim in the surrounding passage.
    reason: cultural_note
  - marker: b
    text: Or 'to throw them into panic' / 'to confound them' for 'to throw them into confusion.'
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  chosen: For
  alternatives:
  - Because
  lexicon: HALOT
  rationale: Introduces the explanatory ground for the observance described in the surrounding context. 'For' fits the discourse flow in English.
- source_word: הָמָן בֶּן הַמְּדָתָא הָאֲגָגִי
  chosen: Haman son of Hammedatha the Agagite
  rationale: Personal names are transliterated per project philosophy; 'Agagite' is retained as an ethnic/dynastic designation rather than paraphrased.
- source_word: צֹרֵר
  chosen: the enemy
  alternatives:
  - the adversary
  - the foe
  lexicon: HALOT
  rationale: The participle denotes one acting as an enemy or oppressor. 'The enemy' is natural English and preserves the hostile force of the term.
- source_word: כָּל הַיְּהוּדִים
  chosen: all the Jews
  alternatives:
  - all Jews
  lexicon: HALOT
  rationale: The phrase is definite and comprehensive; 'all the Jews' reflects both features clearly.
- source_word: חָשַׁב עַל
  chosen: had plotted against
  alternatives:
  - had planned against
  - had devised against
  lexicon: HALOT
  rationale: In context the verb plus preposition conveys hostile scheming, not mere thinking. 'Had plotted against' captures the malicious intent.
- source_word: לְאַבְּדָם
  chosen: to destroy them
  alternatives:
  - to annihilate them
  - to make them perish
  lexicon: HALOT
  rationale: The infinitive of אבד here refers to causing destruction. 'Destroy' is strong, clear, and idiomatic.
- source_word: וְהִפִּיל פּוּר
  chosen: and had cast Pur
  alternatives:
  - and had cast the Pur
  - and had cast a Pur
  lexicon: HALOT
  rationale: The text uses the Persian loanword Pur as the named object cast by Haman. Retaining 'Pur' preserves the wordplay with Purim and the source-text specificity.
- source_word: הוּא הַגּוֹרָל
  chosen: that is, the lot
  alternatives:
  - that is, the die
  - meaning the lot
  lexicon: HALOT
  rationale: This appositional gloss explains the foreign term Pur. 'Lot' is the standard and contextually correct rendering of גּוֹרָל.
- source_word: לְהֻמָּם
  chosen: to throw them into confusion
  alternatives:
  - to crush them
  - to throw them into panic
  - to confound them
  lexicon: HALOT
  rationale: The verb המם often denotes causing panic, confusion, or tumult. Here 'to throw them into confusion' best fits the hostile intent while remaining intelligible in modern English.
- source_word: וּלְאַבְּדָם
  chosen: and to destroy them
  alternatives:
  - and to annihilate them
  lexicon: HALOT
  rationale: Repeating 'destroy them' preserves the Hebrew repetition and the intensification of Haman's intent.
