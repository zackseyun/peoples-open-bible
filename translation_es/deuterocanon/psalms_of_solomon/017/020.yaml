translation:
  language: es
  text: Los que amaban las asambleas de los piadosos[a] huyeron de ellos; su dispersión[b] por hombres sin ley llegó por toda la tierra, porque el cielo se contuvo de derramar lluvia sobre la tierra[d].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «reuniones» o «congregaciones» para «asambleas».
    reason: lexical_alternative
  - marker: b
    text: O «esparcimiento» para «dispersión».
    reason: lexical_alternative
  - marker: d
    text: Literalmente, «de gotear lluvia»; la imagen griega es más concreta que una simple referencia a «llover».
    reason: lexical_alternative
lexical_decisions:
- source_word: ἔφυγοσαν
  english_pob_choice: fled
  chosen_spanish: huyeron
  alternatives_spanish:
  - escaparon
  - salieron huyendo
  lexicon: LSJ
  rationale: El verbo expresa huida repentina. «Huyeron» conserva esa fuerza y suena natural en español bíblico actual.
- source_word: συναγωγὰς
  english_pob_choice: assemblies
  chosen_spanish: asambleas
  alternatives_spanish:
  - reuniones
  - congregaciones
  lexicon: LSJ
  rationale: La idea es la de comunidades o reuniones reunidas. «Asambleas» mantiene el sentido colectivo sin imponer una connotación institucional posterior.
- source_word: ὁσίων
  english_pob_choice: the pious
  chosen_spanish: los piadosos
  alternatives_spanish:
  - los santos
  - los fieles
  lexicon: LSJ
  rationale: En el contexto de Psalms of Solomon, ὅσιοι señala al grupo piadoso/fiel, no simplemente «santos» en sentido eclesial. «Piadosos» sigue esa identificación sociológica y devocional.
- source_word: σκορπισμὸς
  english_pob_choice: scattering
  chosen_spanish: dispersión
  alternatives_spanish:
  - esparcimiento
  - diseminación
  lexicon: LSJ
  rationale: El sustantivo denota el estar esparcidos. «Dispersión» es fiel y ya recoge la alternativa textual reconocida en el audit trail.
- source_word: ἀνόμων
  english_pob_choice: lawless men
  chosen_spanish: hombres sin ley
  alternatives_spanish:
  - los sin ley
  - hombres impíos
  lexicon: LSJ
  rationale: El genitivo agente apunta a los responsables de la dispersión. «Hombres sin ley» conserva el matiz moral y legal de ἄνομοι sin perder la referencia humana explícita.
- source_word: ἀνέσχεν
  english_pob_choice: held back
  chosen_spanish: se contuvo
  alternatives_spanish:
  - retuvo
  - se abstuvo
  lexicon: LSJ
  rationale: Aquí el verbo comunica restricción o contención. «Se contuvo» expresa bien la imagen de que el cielo no dejó caer lluvia.
- source_word: στάξαι ὑετόν
  english_pob_choice: pouring rain
  chosen_spanish: derramar lluvia
  alternatives_spanish:
  - hacer llover
  - verter lluvia
  lexicon: LSJ
  rationale: La imagen griega es concreta («gotear/derramar» lluvia). «Derramar lluvia» conserva esa plasticidad y funciona de manera digna en español.
theological_decisions:
- issue: Identidad de ὁσίων en Psalms of Solomon
  english_pob_reading: the pious
  chosen_spanish_reading: los piadosos
  alternative_spanish_readings:
  - los santos
  - los fieles
  rationale: Sigo la revisión del audit trail que corrige «holy ones» a «the pious», porque en esta obra ὅσιοι designa al grupo piadoso/ fiel concreto, no simplemente a «santos» en sentido posterior.
  doctrine_reference: Psalms of Solomon context / lexical adjudication
- issue: Imagen del cielo reteniendo la lluvia
  english_pob_reading: heaven held back from pouring rain upon the earth
  chosen_spanish_reading: el cielo se contuvo de derramar lluvia sobre la tierra
  alternative_spanish_readings:
  - el cielo retuvo la lluvia sobre la tierra
  - el cielo se abstuvo de llover sobre la tierra
  rationale: Mantengo la personificación del cielo y la negativa a dejar caer lluvia, sin suavizar demasiado la imagen del original. No se explicita una doctrina adicional; solo se preserva la metáfora de juicio/ sequía.
  doctrine_reference: Poetic imagery / judgment motif
translation_notes:
  revision_awareness: 'El audit trail en inglés muestra una revisión relevante: ὅσιοι fue corregido de «holy ones» a «the pious», y στάξαι ὑετόν fue suavizado de «dripping rain» a «pouring rain» para mayor naturalidad sin perder la imagen. La versión española sigue esas decisiones y las explicita donde afecta el matiz léxico.'
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el texto fuente lo requiera explícitamente; aquí no aparece.
  - Se mantiene «piadosos» para ὅσιοι de acuerdo con la revisión más reciente del proyecto.
  - «Hombres sin ley» conserva el valor moral-jurídico de ἄνομος sin sustituirlo por un término más genérico como «malvados».
  - 'La estructura de la frase reproduce la secuencia del original: huida, dispersión, causa, y luego la imagen del cielo reteniendo la lluvia.'
