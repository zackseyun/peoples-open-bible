source:
  edition: SBLGNT
  text: καὶ ⸀ἀποκριθεὶς εἶπεν αὐτοῖς· Πορευθέντες ἀπαγγείλατε Ἰωάννῃ ἃ εἴδετε καὶ ἠκούσατε· ⸀τυφλοὶ ἀναβλέπουσιν, χωλοὶ περιπατοῦσιν, λεπροὶ καθαρίζονται, ⸀κωφοὶ ἀκούουσιν, νεκροὶ ἐγείρονται, πτωχοὶ εὐαγγελίζονται·
base_translation:
  language: en
  yaml_path: translation/nt/luke/007/022.yaml
  text: 'And answering[a], he said to them, “Go and report to John what you have seen and heard: the blind receive sight, the lame walk, lepers are cleansed, the deaf hear, the dead are raised[b], the poor have good news proclaimed to them.”'
  footnotes:
  - marker: a
    text: Or, “the blind see again.” The Greek verb can mean to regain sight or to look up; here it denotes receiving sight.
    reason: lexical_alternative
  - marker: b
    text: 'Or, “good news is preached to the poor.” The Greek is passive: “the poor are evangelized / have good news announced to them.”'
    reason: lexical_alternative
