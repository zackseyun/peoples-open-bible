translation:
  language: es
  text: 'Entonces el centinela[a] llamó en voz alta y avisó al rey. Y el rey dijo: «Si está solo, hay noticia en su boca». Y seguía acercándose, cada vez más.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «el vigilante» o «el atalaya». El término hebreo designa al que está de guardia observando desde un puesto elevado.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הַצֹּפֶה
  english_pob_choice: the watchman
  chosen_spanish: el centinela
  alternatives_spanish:
  - el vigilante
  - el atalaya
  lexicon: HALOT
  rationale: צפה nombra a quien vigila desde un puesto de observación. En español, «centinela» conserva bien la función militar/de guardia y suena natural en este contexto; «atalaya» puede sonar más poético o anclado en tradición bíblica, y «vigilante» es más general.
- source_word: וַיִּקְרָא
  english_pob_choice: called out
  chosen_spanish: llamó
  alternatives_spanish:
  - clamó
  - llamó en alta voz
  lexicon: HALOT
  rationale: El verbo expresa una proclamación audible del vigía. «Llamó» es breve y fiel; el contexto ya deja claro que no se trata de una llamada privada. Se evita sobrecargar con una amplificación innecesaria.
- source_word: וַיַּגֵּד לַמֶּלֶךְ
  english_pob_choice: told the king
  chosen_spanish: avisó al rey
  alternatives_spanish:
  - informó al rey
  - dijo al rey
  lexicon: HALOT
  rationale: נגד en causativo puede ser «decir, comunicar, informar». Aquí, por tratarse de una noticia observada por un centinela, «avisó» comunica el acto de notificar con naturalidad en español. «Informó» es más formal; «dijo» pierde el matiz de reporte.
- source_word: אִם לְבַדּוֹ
  english_pob_choice: If he is by himself
  chosen_spanish: Si está solo
  alternatives_spanish:
  - Si está por sí mismo
  - Si viene solo
  lexicon: HALOT
  rationale: לְבַדּוֹ indica estado de estar sin compañía. «Está solo» es la forma más natural y directa en español. «Viene solo» introduce movimiento que el hebreo no dice explícitamente en esta cláusula.
- source_word: בְּשׂוֹרָה
  english_pob_choice: news
  chosen_spanish: hay noticias
  alternatives_spanish:
  - hay nueva
  - hay novedad
  - hay noticia
  lexicon: HALOT
  rationale: El sustantivo puede significar «noticia/tidings» sin especificar por sí mismo si es buena. Por eso se conserva la neutralidad con «noticias», alineado con la revisión inglesa que retiró «good». En español se antepone la estructura impersonal «hay» para sonar idiomático.
- source_word: בְּפִיו
  english_pob_choice: in his mouth
  chosen_spanish: en su boca
  alternatives_spanish:
  - en sus labios
  - para decir
  lexicon: HALOT
  rationale: 'La frase es literalmente idiomática: la noticia está «en su boca». Se mantiene la imagen corporal sin convertirla en paráfrasis funcional, porque el texto hebreo conserva esa concreción.'
- source_word: וַיֵּלֶךְ הָלֹוךְ וְקָרֵב
  english_pob_choice: he kept coming nearer and nearer
  chosen_spanish: seguía acercándose, cada vez más
  alternatives_spanish:
  - iba acercándose cada vez más
  - seguía viniendo más cerca y más cerca
  lexicon: HALOT
  rationale: La construcción intensiva expresa progresión continua hacia mayor proximidad. «Seguía acercándose, cada vez más» reproduce ese movimiento incremental de manera natural en español, sin perder la iteración del hebreo.
translation_notes:
  revision_awareness: La versión inglesa revisó «good news» a «news» para respetar con mayor precisión el valor léxico de בְּשׂוֹרָה. La redacción española sigue esa decisión y evita cualquier adjetivo que sugiera positividad no explicitada por el hebreo. También conserva la imagen concreta de «en su boca» y el valor progresivo de «seguía acercándose».
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el texto lo exija; este versículo no contiene el nombre divino.
  - Se mantiene «noticias» sin adjetivarlas como buenas, en coherencia con el audit trail inglés.
  - Se prefirió un español sobrio y publicable, sin introducir explicaciones interpretativas ajenas al versículo.
