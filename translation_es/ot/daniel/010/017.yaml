  text: וְ/הֵ֣יךְ יוּכַ֗ל עֶ֤בֶד אֲדֹנִ/י֙ זֶ֔ה לְ/דַבֵּ֖ר עִם אֲדֹ֣נִ/י זֶ֑ה וַ/אֲנִ֤י מֵ/עַ֨תָּה֙ לֹֽא יַעֲמָד בִּ֣/י כֹ֔חַ וּ/נְשָׁמָ֖ה לֹ֥א נִשְׁאֲרָה בִֽ/י־־־־׃
base_translation:
  language: en
  yaml_path: translation/ot/daniel/010/017.yaml
  text: So how can this servant of my lord speak with my lord like this? As for me[a], from now on no strength remains in me[c][b], and no breath is left in me.
  footnotes:
