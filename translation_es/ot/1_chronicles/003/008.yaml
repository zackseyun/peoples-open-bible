lexical_decisions:
- source_word: אֱלִישָׁמָע
  english_pob_choice: Elishama
  chosen_spanish: Elisama
  alternatives_spanish:
  - Elishama
  - Elisama
  lexicon: nombre propio
  rationale: Nombre personal transliterado. En español bíblico, 'Elisama' refleja de manera natural la secuencia consonántica hebrea y mantiene la forma breve y reconocible del nombre sin añadir traducción interpretativa.
- source_word: אֶלְיָדָע
  english_pob_choice: Eliada
  chosen_spanish: Eliada
  alternatives_spanish:
  - Eliada
  lexicon: nombre propio
  rationale: Nombre propio transliterado de forma directa; la forma española coincide con la convención habitual y no requiere ajuste semántico.
- source_word: אֱלִיפֶלֶט
  english_pob_choice: Eliphelet
  chosen_spanish: Elifelet
  alternatives_spanish:
  - Eliphelet
  - Elifelet
  - Elpelet
  lexicon: nombre propio
  rationale: Nombre propio transliterado. Se prefiere 'Elifelet' para una grafía española más natural y legible, conservando el valor fonético básico del hebreo. La forma inglesa 'Eliphelet' refleja una transliteración más plena, pero en español la 'f' simplifica sin perder identificación del nombre.
- source_word: תִּשְׁעָה
  english_pob_choice: nine
  chosen_spanish: nueve
  alternatives_spanish:
  - nueve
  lexicon: HALOT
  rationale: El cardinal hebreo significa 'nueve'. En contexto funciona como total resumido de los hijos enumerados en los vv. 5–8, por lo que se mantiene como cifra final independiente.
translation_notes:
  revision_awareness: El contexto auditado en inglés muestra acuerdo alto y ninguna revisión aplicada. Se conserva la estructura breve del hebreo con tres nombres y un total conclusivo, sin expandir el sentido más allá del resumen numérico del pasaje.
  spanish_consistency_notes:
  - Se mantiene un estilo bíblico sobrio y directo, con nombres propios transliterados y la cifra final expresada en palabras.
  - La puntuación con dos puntos conserva la función de cierre resumido del hebreo y resulta natural en español.
  - La nota al pie explica el valor acumulativo de 'nueve' sin introducir interpretación adicional.
