translation:
  language: es
  text: Así, los sacerdotes y los levitas se consagraron[a] para llevar el arca de Yahvé, el Dios de Israel, hacia arriba.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «se consagraron»; alternativamente, «se santificaron».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּתְקַדְּשׁוּ
  english_pob_choice: consecrated themselves
  chosen_spanish: se consagraron
  alternatives_spanish:
  - se santificaron
  - se hicieron santos
  lexicon: HALOT
  rationale: El verbo hitpael de קדשׁ expresa una acción reflexiva de preparación para servicio sagrado. «Se consagraron» comunica bien esa preparación ritual en español moderno y evita la rigidez de «se santificaron», aunque esta última queda como alternativa válida.
- source_word: הַכֹּהֲנִים
  english_pob_choice: the priests
  chosen_spanish: los sacerdotes
  alternatives_spanish:
  - los presbíteros
  lexicon: HALOT
  rationale: «Sacerdotes» es el equivalente cultual normal para כֹּהֲנִים y preserva el contexto del traslado del arca.
- source_word: וְהַלְוִיִּם
  english_pob_choice: and the Levites
  chosen_spanish: y los levitas
  alternatives_spanish:
  - y los hijos de Leví
  lexicon: HALOT
  rationale: «Levitas» reproduce el grupo designado por לוים de manera natural y precisa en español eclesial.
- source_word: לְהַעֲלוֹת
  english_pob_choice: to bring up
  chosen_spanish: para subir
  alternatives_spanish:
  - para traer arriba
  - para hacer subir
  lexicon: HALOT
  rationale: El hiphil de עלה significa hacer subir o subir algo. En este contexto narrativo, «para subir» conserva la imagen direccional del hebreo y funciona con naturalidad en español.
- source_word: אֲרוֹן
  english_pob_choice: the ark
  chosen_spanish: el arca
  alternatives_spanish:
  - el arca del pacto
  - el cofre
  lexicon: HALOT
  rationale: Aquí אֲרוֹן se refiere al arca sagrada; «arca» es la forma establecida y fiel al contexto.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  - Jehová
  lexicon: HALOT
  rationale: 'Se sigue la convención del proyecto para el Tetragrámaton: «Yahvé» en el texto principal, manteniendo el nombre propio divino en lugar de una sustitución como «Señor».'
- source_word: אֱלֹהֵי יִשְׂרָאֵל
  english_pob_choice: the God of Israel
  chosen_spanish: el Dios de Israel
  alternatives_spanish:
  - el Dios de Israel,
  - el Dios de Israel
  lexicon: HALOT
  rationale: La cadena constructa se vierte de forma directa. «El Dios de Israel» identifica a Yahvé como el Dios propio de Israel sin añadir explicación innecesaria.
theological_decisions:
- issue: Rendering of the divine name יהוה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - Jehová
  - el SEÑOR
  rationale: El texto hebreo contiene el Tetragrámaton. Conforme a la práctica del proyecto, se translitera como «Yahvé» para preservar el nombre personal de Dios y evitar la sustitución por un título.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יהוה / YHWH → Yahvé'
- issue: Reflexive holiness language for וַיִּתְקַדְּשׁוּ
  english_pob_reading: consecrated themselves
  chosen_spanish_reading: se consagraron
  alternative_spanish_readings:
  - se santificaron
  - se hicieron santos
  rationale: El hebreo enfatiza una auto-preparación para un servicio sagrado. «Consagraron» comunica bien la acción ritual sin imponer una formulación más técnica o arcaica que dificulte la lectura.
  doctrine_reference: HALOT / uso cultual de קדשׁ
translation_notes:
  revision_awareness: 'El texto mantiene el acuerdo alto con la auditoría inglesa: conserva la voz reflexiva para וַיִּתְקַדְּשׁוּ, el valor direccional de לְהַעֲלוֹת y el nombre divino Yahvé, sin introducir paráfrasis no sustentadas.'
  spanish_consistency_notes:
  - Se usa «Yahvé» de manera consistente para יְהוָה.
  - «Consagraron» se prefirió por naturalidad y por conservar el sentido ritual; se registra la alternativa «santificaron».
  - «Arca» se mantiene sin expansión interpretativa, ya que el contexto ya especifica el objeto sagrado.
