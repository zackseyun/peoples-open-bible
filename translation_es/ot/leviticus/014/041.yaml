translation:
  language: es
  text: Y hará que raspen el interior de la casa todo alrededor, y derramarán el polvo[a] que rasparon fuera de la ciudad a un lugar impuro.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O simplemente, «el polvo». El hebreo dice literalmente «polvo», aquí refiriéndose al material raspado de las paredes.
    reason: lexical_alternative
lexical_decisions:
- source_word: יַקְצִ֥עַ
  english_pob_choice: shall have ... scraped
  chosen_spanish: hará que raspen
  alternatives_spanish:
  - hará raspar
  - mandará raspar
  - hará que se raspe
  lexicon: HALOT
  rationale: 'El verbo en hifil es causativo: no dice que la persona principal raspe ella misma, sino que haga realizar la acción. «Harás que raspen» conserva ese valor causativo de manera natural en español.'
- source_word: מִבַּיִת סָבִ֑יב
  english_pob_choice: the inside of the house ... all around
  chosen_spanish: el interior de la casa por todas partes
  alternatives_spanish:
  - el interior de la casa alrededor
  - dentro de la casa, por todos lados
  lexicon: HALOT
  rationale: La frase apunta a la superficie interior de la casa, no solo a un lugar dentro de ella. «Por todas partes» refleja el alcance total alrededor del interior sin sonar forzado.
- source_word: וְשָׁפְכ֗וּ
  english_pob_choice: they shall pour out
  chosen_spanish: derramarán
  alternatives_spanish:
  - verterán
  - echarán fuera
  - vaciarán
  lexicon: HALOT
  rationale: En este contexto de desecho, «derramarán» mantiene la imagen concreta de sacar y vaciar el material removido.
- source_word: הֶעָפָר
  english_pob_choice: the dust
  chosen_spanish: el polvo
  alternatives_spanish:
  - el polvo de la pared
  - el material polvoso
  - el polvo raspado
  lexicon: HALOT
  rationale: Aunque el contexto se refiere al material retirado de las paredes, el hebreo dice literalmente «polvo». Se mantiene el término básico sin añadir especificidad que el texto no expresa de forma explícita.
- source_word: אֲשֶׁ֣ר הִקְצ֔וּ
  english_pob_choice: that they scraped off
  chosen_spanish: que rasparon
  alternatives_spanish:
  - que retiraron al raspar
  - que sacaron raspando
  lexicon: HALOT
  rationale: La cláusula retoma el material previamente removido. «Que rasparon» conecta directamente con el verbo anterior y conserva la referencia al acto de raspado.
- source_word: אֶל מִחוּץ לָעִיר
  english_pob_choice: outside the city
  chosen_spanish: afuera de la ciudad
  alternatives_spanish:
  - fuera de la ciudad
  - al exterior de la ciudad
  lexicon: HALOT
  rationale: La secuencia indica un traslado a un lugar más allá de los límites urbanos. «Afuera de la ciudad» es claro y natural en español.
- source_word: אֶל מָקוֹם טָמֵא
  english_pob_choice: into an unclean place
  chosen_spanish: en un lugar impuro
  alternatives_spanish:
  - a un lugar impuro
  - en un lugar inmundo
  - en un lugar ritualmiente impuro
  lexicon: HALOT
  rationale: טָמֵא es un término técnico de pureza ritual. «Impuro» preserva esa categoría cultual en español y evita cargar el término con una connotación moral que el contexto no requiere.
theological_decisions:
- issue: Rendering of טָמֵא in Leviticus 14:41
  english_pob_reading: unclean
  chosen_spanish_reading: impuro
  alternative_spanish_readings:
  - inmundo
  - contaminado
  - deficiente ritualmente
  rationale: En español, «impuro» comunica bien la categoría ritual de Levítico sin desplazarla a una valoración moral. Se evita «mundo/impuro» por el riesgo de ambigüedad doctrinal y de registro; el texto trata de pureza ceremonial, no de pecado personal.
  doctrine_reference: Levítico 14:41; traducción orientada a mantener la distinción bíblica entre impureza ritual y culpa moral.
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión más reciente del POB inglés, que retiró «plaster» para no añadir una especificación no explícita y conservó «dust» para עָפָר. Por eso el español usa «polvo» y evita añadir «yeso» o «revoque». También se mantuvo la idea de depósito fuera de la ciudad y en un lugar ritualmente impuro, sin suavizar la categoría cultual.
  spanish_consistency_notes:
  - Se conservó un estilo bíblico claro y moderno, evitando arcaísmos innecesarios.
  - Se mantuvo la lógica causativa del hifil con una construcción natural en español.
  - Se evitó añadir material interpretativo sobre la composición del polvo más allá de lo que el contexto exige.
  - «Impuro» se usó de forma consistente con la terminología de pureza ritual en Levítico.
