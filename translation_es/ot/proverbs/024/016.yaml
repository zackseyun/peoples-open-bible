translation:
  language: es
  text: Porque siete veces[b] cae el justo[a] y vuelve a levantarse, pero los impíos tropiezan en la calamidad[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «una persona justa»; el hebreo usa una forma masculina singular con valor representativo en un proverbio.
    reason: lexical_alternative
  - marker: b
    text: '«Siete» probablemente es idiomático para repetición o plenitud: el justo puede caer muchas veces y, aun así, levantarse.'
    reason: cultural_note
  - marker: c
    text: O «tropiezan en el desastre» o «son derribados por la calamidad». El término hebreo puede denotar adversidad o desastre más que mal moral en este contexto.
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  lexicon: HALOT
  rationale: Aquí כִּי introduce la razón o fundamento del dicho anterior; «Porque» conserva esa relación lógica de forma natural en español.
- source_word: שֶׁבַע
  english_pob_choice: seven times
  chosen_spanish: siete veces
  alternatives_spanish:
  - siete
  - repetidamente
  lexicon: HALOT
  rationale: «Siete veces» preserva la imagen hebrea y deja ver el valor proverbial del número como repetición o plenitud.
- source_word: יִפּוֹל
  english_pob_choice: falls
  chosen_spanish: cae
  alternatives_spanish:
  - puede caer
  - cae al suelo
  lexicon: HALOT
  rationale: El imperfecto expresa una verdad general proverbial; «cae» comunica el movimiento sin añadir modalidad que el texto no exige.
- source_word: צַדִּיק
  english_pob_choice: the righteous
  chosen_spanish: el justo
  alternatives_spanish:
  - el righteous
  - una persona justa
  lexicon: HALOT
  rationale: El adjetivo funciona sustantivado. «El justo» conserva el singular masculino representativo del proverbio sin forzar una paráfrasis.
- source_word: וָקָם
  english_pob_choice: and rises again
  chosen_spanish: y vuelve a levantarse
  alternatives_spanish:
  - y se levanta otra vez
  - y se alza de nuevo
  lexicon: HALOT
  rationale: «Vuelve a levantarse» expresa con claridad la recuperación tras la caída y refleja bien el valor iterativo del proverbio.
- source_word: וּרְשָׁעִים
  english_pob_choice: but the wicked
  chosen_spanish: pero los impíos
  alternatives_spanish:
  - y los impíos
  - pero los malvados
  lexicon: HALOT
  rationale: El contexto exige contraste adversativo. «Impíos» es una equivalencia bíblica estable para el plural sustantivado y evita una lectura meramente social o psicológica.
- source_word: יִכָּשְׁל֥וּ
  english_pob_choice: stumble
  chosen_spanish: tropiezan
  alternatives_spanish:
  - caen
  - son derribados
  lexicon: HALOT
  rationale: El nifal de כשל comunica tropezar, tambalear o fracasar. «Tropiezan» mantiene la imagen lexical y el contraste con la recuperación del justo.
- source_word: בְ/רָעָה
  english_pob_choice: in calamity
  chosen_spanish: en la calamidad
  alternatives_spanish:
  - en el desastre
  - por la desgracia
  - en el mal
  lexicon: HALOT
  rationale: En este contexto רָעָה denota adversidad o desastre, no mal moral. «En la calamidad» preserva el sentido del texto y la tensión lexical documentada en el audit trail.
theological_decisions:
- issue: 'Sentido del proverbio: caída y recuperación del justo frente al tropiezo del impío en adversidad'
  english_pob_reading: moral resilience of the righteous versus collapse of the wicked in adversity
  chosen_spanish_reading: la resiliencia del justo frente al tropiezo del impío en la calamidad
  alternative_spanish_readings:
  - siete caídas por pecado y arrepentimiento
  - caída física y levantarse
  rationale: El hebreo inmediato y רָעָה favorecen la idea de adversidad/calamidad, no una doctrina explícita sobre pecar y arrepentirse. La traducción mantiene esa lectura sin introducir una glosa doctrinal no señalada por el texto.
  doctrine_reference: DOCTRINE.md §Translation philosophy 1, 3
- issue: Forma representativa masculina singular de צַדִּיק
  english_pob_reading: the righteous
  chosen_spanish_reading: el justo
  alternative_spanish_readings:
  - el righteous
  - una persona justa
  rationale: El hebreo usa una forma masculina singular con valor representativo proverbial. «El justo» conserva esa fuerza sin añadir contenido ajeno al versículo.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
translation_notes:
  revision_awareness: 'La redacción sigue la revisión más reciente del audit trail: se evitó añadir «hombre» o equivalente innecesario para צַדִּיק, y se mantuvo la lectura proverbial centrada en la recuperación del justo y la caída del impío en calamidad.'
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» como norma del proyecto, pero este versículo no contiene el nombre divino.
  - Se eligió «el justo» para צַדִּיק siguiendo el valor sustantivado y representativo del hebreo, sin masculinizar innecesariamente con «hombre».
  - «Impíos» conserva el contraste bíblico tradicional para רְשָׁעִים y evita suavizar la oposición moral del proverbio.
  - «Calamidad» refleja mejor רָעָה en este contexto que «mal», para no confundir desastre con maldad ética.
