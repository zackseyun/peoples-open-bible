  text: 그러나 예수께서는 잠잠하셨습니다. 그러자 대제사장이 그에게 말하였습니다, 「내가 살아 계신 하나님을 두고 너를 맹세하게 한다. 네가 메시아, 곧 하나님의 아들이라면 우리에게 말하라.」
