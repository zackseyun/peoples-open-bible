  edition: Hitchcock & Brown 1884 (normalized OCR)
  text: Χειροτονήσατε οὖν ἑαυτοῖς ἐπισκόπους καὶ διακόνους ἀξίους τοῦ Κυρίου, ἄνδρας
    πραεῖς καὶ ἀφιλαργύρους καὶ ἀληθεῖς καὶ δεδοκιμασμένους· ὑμῖν γὰρ λειτουργοῦσι
    καὶ αὐτοὶ τὴν λειτουργίαν τῶν προφητῶν καὶ διδασκάλων. Μὴ οὖν ὑπερίδητε αὐτούς·
    αὐτοὶ γάρ εἰσιν οἱ τετιμημένοι ὑμῶν μετὰ τῶν προφητῶν καὶ διδασκάλων. Ἐλέγχετε
    δὲ ἀλλήλους μὴ ἐν ὀργῇ, ἀλλ' ἐν εἰρήνῃ, ὡς ἔχετε ἐν τῷ εὐαγγελίῳ· καὶ παντὶ ἀστοχοῦντι
    κατὰ τοῦ ἑτέρου μηδεὶς λαλειτώ μηδὲ παρ' ὑμῶν ἀκουέτω, ἕως οὗ μετανοήσῃ. Τὰς δὲ
    εὐχὰς ὑμῶν καὶ τὰς ἐλεημοσύνας καὶ πάσας τὰς πράξεις οὕτω ποιήσατε, ὡς ἔχετε ἐν
    τῷ εὐαγγελίῳ τοῦ Κυρίου ἡμῶν.
