translation:
  language: es
  text: 'Entonces se acordó de los días antiguos, de Moisés y de su pueblo: «¿Dónde está el que los hizo subir del mar con los pastores[a] de su rebaño? ¿Dónde está el que puso su Espíritu Santo dentro de él[b]?».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «con los pastores de su rebaño»; algunos entienden «con el pastor de su rebaño», probablemente refiriéndose a Moisés.'
    reason: alternative_reading
  - marker: b
    text: O «dentro de ellos» o «en medio de ellos». El hebreo tiene un sufijo singular («dentro de él»), pero su referente es discutido.
    reason: alternative_reading
lexical_decisions:
- source_word: וַיִּזְכֹּר
  english_pob_choice: Then he remembered
  chosen_spanish: Entonces se acordó
  alternatives_spanish:
  - Y se acordó
  - Luego se acordó
  lexicon: HALOT
  rationale: El wayyiqtol expresa avance narrativo; en español, «entonces» conserva la secuencia y «se acordó» comunica el recuerdo activo de forma natural y digna.
- source_word: יְמֵי עוֹלָם
  english_pob_choice: the ancient days
  chosen_spanish: los días antiguos
  alternatives_spanish:
  - los días de antaño
  - los días de la antigüedad
  lexicon: HALOT
  rationale: La expresión refiere tiempos de antaño, especialmente los actos fundacionales de salvación. «Antiguos» mantiene el sentido retrospectivo sin sonar arcaico.
- source_word: מֹשֶׁה עַמּוֹ
  english_pob_choice: Moses and his people
  chosen_spanish: de Moisés y de su pueblo
  alternatives_spanish:
  - Moisés y su pueblo
  - de los días de Moisés, su pueblo
  lexicon: HALOT
  rationale: El hebreo es compacto; en español conviene explicitar la relación con una construcción natural. La adición de «de» evita una yuxtaposición dura y conserva el vínculo entre Moisés y el pueblo recordado.
- source_word: אַיֵּה
  english_pob_choice: Where is
  chosen_spanish: ¿Dónde está
  alternatives_spanish:
  - ¿Dónde estaba
  lexicon: HALOT
  rationale: La pregunta retórica se conserva con una forma presente en español, como en la POB inglesa, para mantener el tono de lamento.
- source_word: הַמַּעֲלֵם
  english_pob_choice: the one who brought them up
  chosen_spanish: el que los hizo subir
  alternatives_spanish:
  - el que los subió
  - el que los sacó
  lexicon: HALOT
  rationale: עלה en el contexto del éxodo y del paso del mar expresa ascenso/salida. «Hizo subir» preserva la fuerza causativa y la referencia a la liberación desde el mar.
- source_word: מִיָּם
  english_pob_choice: out of the sea
  chosen_spanish: del mar
  alternatives_spanish:
  - fuera del mar
  - desde el mar
  lexicon: HALOT
  rationale: En español, «del mar» es la formulación más natural y sigue el trasfondo del éxodo sin sobrecargar la frase.
- source_word: אֵת רֹעֵי צֹאנֹו
  english_pob_choice: with the shepherds of his flock
  chosen_spanish: con los pastores de su rebaño
  alternatives_spanish:
  - con el pastor de su rebaño
  - junto con los pastores de su rebaño
  lexicon: HALOT
  rationale: Se conserva el plural masorético «pastores». «Rebaño» refleja צאן de modo claro y bíblico, mientras «pastores» mantiene la imagen pastoral del original.
- source_word: הַשָּׂם
  english_pob_choice: the one who put
  chosen_spanish: el que puso
  alternatives_spanish:
  - el que colocó
  - el que estableció
  lexicon: HALOT
  rationale: שׂים en esta construcción funciona como «poner/colocar». «Puso» preserva la relación verbal paralela con «el que hizo subir».
- source_word: בְּקִרְבּוֹ
  english_pob_choice: within him
  chosen_spanish: en medio de él
  alternatives_spanish:
  - dentro de él
  - en su interior
  - en medio de ellos
  lexicon: HALOT
  rationale: El sufijo singular se conserva en la lectura principal, pero en español «en medio de él» evita un calco demasiado rígido y deja abierta la cuestión referencial (Moisés, el pueblo o el medio de ellos).
- source_word: רוּחַ קָדְשׁוֹ
  english_pob_choice: his Holy Spirit
  chosen_spanish: su Espíritu Santo
  alternatives_spanish:
  - su santo Espíritu
  - su Espíritu sagrado
  lexicon: HALOT
  rationale: La expresión marcada se vierte como «Espíritu Santo», forma plenamente inteligible en español y acorde con el carácter divino del referente, sin perder la posesión del sufijo.
theological_decisions:
- issue: Sujeto implícito de «se acordó»
  english_pob_reading: God/the LORD is the implied subject
  chosen_spanish_reading: Dios es el sujeto implícito
  alternative_spanish_readings:
  - el pueblo se acordó
  rationale: El contexto inmediato continúa la acción divina; por eso la traducción mantiene el sujeto implícito sin introducirlo de manera innecesaria, pero dejando claro por el flujo del versículo que se trata de Dios.
  doctrine_reference: Contexto literario de Isaías 63:9-11
- issue: Alcance de «en medio de él» respecto al Espíritu Santo
  english_pob_reading: Retain the singular as 'within him' in the main text
  chosen_spanish_reading: Se conserva el singular con referencia abierta
  alternative_spanish_readings:
  - en medio de ellos
  - dentro de ellos
  - en medio de su pueblo
  rationale: El hebreo presenta un sufijo singular y la referencia es debatida. La formulación española mantiene esa tensión sin resolverla dogmáticamente, en línea con la POB.
  doctrine_reference: 'Principio editorial POB: preservar la tensión teológica documentada'
- issue: Identidad de «los pastores de su rebaño»
  english_pob_reading: some read 'with the shepherd of his flock,' likely referring to Moses
  chosen_spanish_reading: se mantiene el plural masorético, con posible alusión a Moisés
  alternative_spanish_readings:
  - con el pastor de su rebaño
  - con los pastores de su rebaño
  rationale: El texto masorético apunta al plural, pero el contexto permite una referencia singular a Moisés. La traducción principal conserva el plural y no elimina la nota de posible lectura singular.
  doctrine_reference: Lectura textual y contextual de Isaías 63:11
translation_notes:
  revision_awareness: Se incorporó la decisión revisada de mantener el plural masorético en «los pastores de su rebaño» y la ambigüedad del sufijo singular en «en medio de él», siguiendo la POB inglesa y el audit trail más reciente sin cambios sustantivos.
  spanish_consistency_notes:
  - Se usa «Yahvé» para el nombre divino cuando aparezca; en este versículo no está explícito en la superficie textual.
  - Se preserva la imagen pastoral con «pastores» y «rebaño» por fidelidad léxica al hebreo.
  - La puntuación mantiene el paralelismo interrogativo del original y el tono de reproche/lamento.
  - No se normaliza la tensión referencial de «él/ellos» para no borrar una ambigüedad documentada.
