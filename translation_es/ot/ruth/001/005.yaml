translation:
  language: es
  text: Entonces también murieron los dos, Mahlón y Quelión; y la mujer quedó sin sus dos hijos[a] y sin su marido.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «sus dos hijos». El hebreo dice literalmente «sus dos hijos/niños», usando un término que puede referirse más ampliamente a la descendencia.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּמ֥וּתוּ
  english_pob_choice: Then ... died
  chosen_spanish: Entonces ... murieron
  alternatives_spanish:
  - Y ... murieron
  - Así que ... murieron
  lexicon: HALOT
  rationale: El wayyiqtol avanza la narración con pasado secuencial. «Entonces» reproduce bien ese progreso narrativo en español y suena natural en un relato.
- source_word: גַם
  english_pob_choice: also
  chosen_spanish: también
  alternatives_spanish:
  - además
  - igualmente
  lexicon: HALOT
  rationale: «También» conserva la idea aditiva de גַם y encaja con el énfasis de que estas muertes se suman a la pérdida anterior.
- source_word: שְׁנֵיהֶם
  english_pob_choice: both of them
  chosen_spanish: los dos
  alternatives_spanish:
  - ambos
  - los dos de ellos
  lexicon: HALOT
  rationale: La forma dual subraya que los dos murieron juntos. «Los dos» comunica ese énfasis de manera natural y directa en español.
- source_word: מַחְלוֹן וְכִלְיוֹן
  english_pob_choice: Mahlon and Chilion
  chosen_spanish: Mahlón y Quelión
  alternatives_spanish:
  - Mahlon y Chilion
  lexicon: Nombres propios
  rationale: Se transliteran los nombres personales con adaptación ortográfica al español para facilitar lectura y pronunciación sin alterar la identidad del texto.
- source_word: וַתִּשָּׁאֵר
  english_pob_choice: was left
  chosen_spanish: quedó
  alternatives_spanish:
  - fue dejada
  - permaneció
  lexicon: HALOT
  rationale: «Quedó» expresa bien el estado de supervivencia con pérdida, que es el sentido contextual de שׁאר, sin añadir más de lo que dice el hebreo.
- source_word: הָאִשָּׁה
  english_pob_choice: the woman
  chosen_spanish: la mujer
  alternatives_spanish:
  - la esposa
  - Naomí
  lexicon: HALOT
  rationale: El hebreo dice literalmente «la mujer»; se conserva esa designación narrativa, en vez de especificar «esposa» o sustituir por el nombre propio.
- source_word: מִשְּׁנֵי יְלָדֶיהָ
  english_pob_choice: without her two children
  chosen_spanish: sin sus dos hijos
  alternatives_spanish:
  - privada de sus dos hijos
  - sin sus dos hijos varones
  lexicon: HALOT
  rationale: La preposición expresa privación y pérdida. «Sin sus dos hijos» mantiene la relación de ausencia y refleja directamente יְלָדֶיהָ, que en hebreo dice «hijos/descendencia» y no exige especificar «varones».
- source_word: וּמֵאִישָׁהּ
  english_pob_choice: and without her husband
  chosen_spanish: y sin su marido
  alternatives_spanish:
  - y sin su esposo
  - y sin su hombre
  lexicon: HALOT
  rationale: אִישׁ en relación posesiva significa «marido». «Sin su marido» conserva el sentido de pérdida con naturalidad y evita una expresión menos idiomática.
translation_notes:
  revision_awareness: 'Se mantuvo el acuerdo de alta concordancia con el expediente inglés: la estructura narrativa de secuencia, la referencia a los dos hijos y el matiz de pérdida en «quedó» se conservaron sin introducir reinterpretaciones.'
  spanish_consistency_notes:
  - Se usó «Yahvé» no porque aparezca en el versículo, sino por la política general del proyecto cuando corresponda al nombre divino.
  - Se prefirió «marido» para אִישׁ en este contexto posesivo, siguiendo el valor relacional del hebreo.
  - «Sin» transmite la privación implícita en las preposiciones hebreas mejor que una simple traducción preposicional literal.
