    rationale: Aunque «alta» refleja literalmente הָעֶלְיוֹן, en español la combinación «casa alta del rey» resulta extraña. «Casa superior del rey» conserva mejor el valor espacial/estructural y la cercanía al hebreo, mientras la nota sigue preservando «palacio superior» como alternativa.
