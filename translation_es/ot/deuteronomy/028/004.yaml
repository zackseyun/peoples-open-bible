review_pass:
  verdict: revise
  source_alignment_summary: El borrador sigue bien la estructura de bendición y la triple repetición de 'fruto', pero se aparta del sentido y del alcance léxico en la cola del versículo. שְׁגַר אֲלָפֶיךָ y עַשְׁתְּרֹת צֹאנֶךָ son expresiones ganaderas tradicionales referidas a la procreación/aumento de los rebaños, no específicamente al 'parto' ni solo a 'vacas' y 'ovejas'.
  spanish_quality_summary: El español es claro y bastante natural, pero 'el parto de tus vacas' suena más estrecho y menos idiomático que el hebreo y que la auditoría inglesa. También 'tus ovejas' reduce indebidamente el colectivo צֹאן, que abarca ganado menor en conjunto. Una leve revisión mejora fidelidad y fluidez.
  glossary_alignment: 'No hay conflictos con la terminología doctrinal principal del proyecto. ''Fruto'', ''vientre'', ''tierra'' y ''ganado'' están bien encaminados. La corrección necesaria es léxica: mantener términos colectivos (''rebaños'') y reproductivos (''crías'', ''aumento'') sin sobreespecificar a especies particulares.'
  issues:
  - severity: high
    issue: '''el parto de tus vacas'' traduce de forma demasiado estrecha שְׁגַר אֲלָפֶיךָ'
    rationale: שְׁגַר en esta colocación apunta al producto reproductivo o aumento del ganado, no al evento del parto. Además, אֲלָפֶיךָ es colectivo ('tus vacadas/rebaños/ganado mayor'), no específicamente 'tus vacas'.
  - severity: medium
    issue: '''tus ovejas'' estrecha indebidamente צֹאנֶךָ'
    rationale: צֹאן es un colectivo para ganado menor, típicamente ovejas y cabras. 'Tus rebaños' o 'tu rebaño' preserva mejor el alcance semántico y el paralelo con 'herds/flocks' del inglés POB.
  - severity: low
    issue: La nota al pie ya preserva la alternativa, pero el texto principal no refleja suficientemente la elección inglesa de términos colectivos
    rationale: La auditoría inglesa optó por 'offspring of your herds' y 'the young of your flocks'. El español puede reproducir eso de manera natural sin perder legibilidad.
  revised_spanish_text: 'Bendito será el fruto de tu vientre[a], el fruto de tu tierra, el fruto de tu ganado: las crías de tus rebaños de ganado mayor y las crías de tus rebaños.'
