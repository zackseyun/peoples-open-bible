translation:
  language: es
  text: Y sucedió el día que Yahvé habló a Moisés en la tierra de Egipto—[a][b]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «Y aconteció» / «Y sucedió en el día en que».
    reason: lexical_alternative
  - marker: b
    text: Hebreo «YHWH»; tradicionalmente se traduce «el SEÑOR».
    reason: alternative_reading
lexical_decisions:
- source_word: וַיְהִי
  english_pob_choice: Now it happened
  chosen_spanish: Y aconteció
  alternatives_spanish:
  - Y sucedió
  - Y ocurrió
  lexicon: HALOT
  rationale: La forma narrativa con waw consecutiva introduce transición de discurso. En español, «Y aconteció» conserva el arranque narrativo sin volverlo arcaico en exceso; mantiene la función de encadenamiento que el inglés expresó con «Now it happened».
- source_word: בְּיוֹם
  english_pob_choice: on the day
  chosen_spanish: en el día en que
  alternatives_spanish:
  - el día que
  - el día cuando
  - en el día
  lexicon: HALOT
  rationale: El hebreo dice literalmente «en el día de». En español, «en el día en que» comunica mejor la relación temporal con la cláusula siguiente y evita una construcción rígida, sin perder la cercanía al texto fuente.
- source_word: דִּבֶּר
  english_pob_choice: spoke
  chosen_spanish: habló
  alternatives_spanish:
  - dijo
  - le habló
  lexicon: HALOT
  rationale: El verbo דבר normalmente significa «hablar». Aquí el complemento con אֶל y Moisés permite la traducción natural «habló a Moisés», preservando el acto de comunicación verbal del original.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  lexicon: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
  rationale: Se mantiene el nombre propio divino en forma castellana de uso POB, «Yahvé», en lugar de sustituirlo por un título como «el SEÑOR». Esto conserva la distinción del Tetragrámaton en el texto español.
- source_word: אֶל
  english_pob_choice: to
  chosen_spanish: a
  alternatives_spanish:
  - hacia
  - para
  lexicon: HALOT
  rationale: 'En la construcción verbal con hablar, la preposición se expresa naturalmente en español con «a»: «habló a Moisés».'
- source_word: בְּאֶרֶץ מִצְרַיִם
  english_pob_choice: in the land of Egypt
  chosen_spanish: en la tierra de Egipto
  alternatives_spanish:
  - en el país de Egipto
  - en Egipto
  lexicon: HALOT
  rationale: Se conserva la expresión completa «la tierra de Egipto» porque el hebreo incluye explícitamente «tierra». «Tierra» es la opción más fiel y bíblicamente reconocible sin reducirla a «Egipto» a secas.
theological_decisions:
- issue: Representación del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: La lectura inglesa audita el Tetragrámaton como «Yahweh». En español se usa «Yahvé» como equivalente natural y reverente, preservando el nombre divino revelado en el texto.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
translation_notes:
  revision_awareness: No se registraron revisiones aplicadas en el paquete inglés; el texto inglés final quedó sin cambios y con acuerdo alto en la verificación cruzada.
  spanish_consistency_notes:
  - Se mantuvo la secuencia narrativa con «Y aconteció» para reflejar la función discursiva de וַיְהִי.
  - Se usó «Yahvé» de forma consistente con el criterio POB para el nombre divino.
  - Se preservó «la tierra de Egipto» por la presencia explícita de אֶרֶץ.
  - La puntuación con raya final reproduce el cierre fragmentario del versículo en el hebreo fuente.
