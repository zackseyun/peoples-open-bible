review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el sentido básico del hebreo: habla recíproca dentro del grupo, propuesta volitiva de nombrar a alguien sobre ellos, y regreso a Egipto. Sin embargo, וַיֹּאמְרוּ es narrativo puntual (''dijeron''), no imperfectivo/iterativo (''se decían''), por lo que el verbo principal debe ajustarse para preservar mejor el avance narrativo del wayyiqtol. El resto de la cita está bien alineado con נִתְּנָה רֹאשׁ וְנָשׁוּבָה מִצְרַיְמָה.'
  spanish_quality_summary: El español es claro y natural. 'Unos a otros', 'designemos' y 'volvamos a Egipto' leen bien. No obstante, 'Y se decían' suena más durativo o repetitivo de lo que pide el contexto narrativo; 'Y dijeron unos a otros' es más fiel y sigue siendo plenamente idiomático. 'Jefe' es comprensible, pero en registro bíblico amplio 'líder' suena un poco más neutral que 'jefe', que puede tener matiz demasiado coloquial o jerárquico; aun así, no constituye error grave.
  glossary_alignment: No hay términos del glosario mayor en juego salvo la necesidad de respetar la decisión funcional para רֹאשׁ. El borrador sigue la racionalidad del POB al evitar el calco opaco 'cabeza' en texto principal y conservarlo en nota. La revisión propuesta mantiene esa decisión, pero prefiere 'líder' por neutralidad y cercanía a la elección inglesa documentada.
  issues:
  - severity: medium
    issue: '''Y se decían'' no refleja bien el valor narrativo de וַיֹּאמְרוּ.'
    rationale: El wayyiqtol hebreo avanza la narración con un evento puntual secuencial. El imperfecto pronominal en español introduce un matiz iterativo/durativo no exigido por la fuente. 'Y dijeron unos a otros' conserva mejor tanto la secuencia como la reciprocidad.
  - severity: low
    issue: '''un jefe'' puede sonar menos neutral que la decisión funcional documentada.'
    rationale: Aunque 'jefe' puede valer como autoridad, 'líder' comunica con mayor naturalidad contemporánea la función de רֹאשׁ sin posibles matices administrativos o coloquiales. No es un error de sentido, pero una mejora de estilo y alineación con el audit trail.
  revised_spanish_text: 'Y dijeron unos a otros[a]: «Designemos un líder[b] y volvamos a Egipto».'
  revised_footnotes:
  - marker: a
    text: 'Literalmente: «cada hombre a su hermano». El modismo hebreo expresa reciprocidad entre ellos.'
    reason: lexical_alternative
  - marker: b
    text: 'Literalmente: «pongamos una cabeza». Aquí «cabeza» significa una persona colocada sobre el grupo, es decir, un líder.'
    reason: lexical_alternative
  revision_rationale: Se corrige el verbo principal para reflejar mejor el valor narrativo puntual de וַיֹּאמְרוּ y se ajusta 'jefe' a 'líder' para una expresión más neutral y más alineada con la decisión funcional documentada para רֹאשׁ. Se mantienen las notas léxicas porque preservan las alternativas literales relevantes del hebreo.
