base_translation:
  language: en
  yaml_path: translation/ot/nehemiah/009/026.yaml
  text: But they acted presumptuously and rebelled against you[a], and they cast your law behind their backs. They killed your prophets, who had warned them in order to bring them back to you[d][c][b], and they committed great blasphemies.
  footnotes:
  - marker: a
    text: Or 'were disobedient,' 'acted arrogantly,' or 'provoked'; the Hebrew verb suggests defiant resistance.
    reason: lexical_alternative
  - marker: b
    text: Or 'your instruction' for 'your law.'
    reason: lexical_alternative
  - marker: c
    text: Or 'testified against them'; the Hebrew can carry the sense of solemn warning or witness.
    reason: lexical_alternative
  - marker: d
    text: Or 'great contempts,' 'great insults,' or 'great provocations.'
    reason: lexical_alternative
