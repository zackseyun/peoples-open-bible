translation:
  language: es
  text: Y habiendo jurado por el nombre de Yahvé al rey Nabucodonosor[a], quebrantó su juramento y se rebeló[b]; y, endureciendo su cuello y su corazón, transgredió las leyes[c] de Yahvé, Dios de Israel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más literalmente: «habiendo sido juramentado por el rey Nabucodonosor». La preposición griega es difícil aquí; el sentido es que había asumido un juramento de lealtad en relación con el rey.'
    reason: lexical_alternative
  - marker: b
    text: «Se rebeló» probablemente se refiere a una revuelta contra Nabucodonosor, aunque el griego no explicita el objeto.
    reason: alternative_reading
  - marker: c
    text: O «los estatutos» o «las ordenanzas» de Yahvé, Dios de Israel.
    reason: lexical_alternative
lexical_decisions:
- source_word: ὁρκισθεὶς
  english_pob_choice: had sworn
  chosen_spanish: había jurado
  alternatives_spanish:
  - habiendo jurado
  - había sido juramentado
  lexicon: BDAG
  rationale: El participio aoristo antecede a los verbos principales, por eso se expresa con pluscuamperfecto. "Había jurado" conserva la secuencia temporal y la fuerza legal del acto de jurar.
- source_word: ἀπὸ τοῦ βασιλέως Ναβουχοδονόσορ
  english_pob_choice: to King Nebuchadnezzar
  chosen_spanish: al rey Nabucodonosor
  alternatives_spanish:
  - por el rey Nabucodonosor
  - bajo el rey Nabucodonosor
  lexicon: BDAG
  rationale: La preposición griega es difícil de verter literalmente en español. Como en el audit trail inglés, el sentido es una juramentación en relación con el rey, no un movimiento espacial; "al rey" comunica mejor la relación de lealtad jurada sin añadir un objeto ausente.
- source_word: τῷ ὀνόματι τοῦ κυρίου
  english_pob_choice: by the name of the Lord
  chosen_spanish: por el nombre de Yahvé
  alternatives_spanish:
  - en nombre de Yahvé
  - invocando el nombre de Yahvé
  lexicon: BDAG
  rationale: Se mantiene la fórmula de juramento y, conforme al estándar del proyecto, κύριος se rinde como "Yahvé" en el texto principal cuando remite al nombre divino.
- source_word: ἐφιορκήσας
  english_pob_choice: broke his oath
  chosen_spanish: quebrantó su juramento
  alternatives_spanish:
  - perjuró
  - violó su juramento
  lexicon: LSJ
  rationale: El verbo denota la infracción de un juramento ya hecho. "Quebrantó su juramento" conserva el peso jurídico y suena natural en español bíblico contemporáneo.
- source_word: ἀπέστη
  english_pob_choice: rebelled
  chosen_spanish: se rebeló
  alternatives_spanish:
  - se apartó
  - se sublevó
  - apostató
  lexicon: BDAG
  rationale: En este contexto real y político, el valor es defección/rebelión contra la autoridad. "Se rebeló" es la opción más clara y fiel; no se explicita contra quién porque el griego tampoco lo hace.
- source_word: σκληρύνας
  english_pob_choice: stiffening
  chosen_spanish: endureciendo
  alternatives_spanish:
  - endureciendo su cerviz
  - poniendo duro
  lexicon: BDAG
  rationale: El participio presenta la manera concomitante de su rebelión. "Endureciendo" conserva la metáfora bíblica y coordina naturalmente con los dos objetos siguientes.
- source_word: τὸν τράχηλον
  english_pob_choice: his neck
  chosen_spanish: su cuello
  alternatives_spanish:
  - su cerviz
  - su nuca
  lexicon: LSJ
  rationale: Se mantiene la imagen corporal literal. "Cuello" es más inteligible para el lector moderno que "cerviz", aunque esta última conserve el matiz idiomático de obstinación.
- source_word: τὴν καρδίαν αὐτοῦ
  english_pob_choice: his heart
  chosen_spanish: su corazón
  alternatives_spanish:
  - su interior
  - su ánimo
  lexicon: BDAG
  rationale: La referencia al corazón como sede de disposición moral e interior se conserva literalmente para no suavizar la antropología del texto.
- source_word: παρέβη
  english_pob_choice: transgressed
  chosen_spanish: traspasó
  alternatives_spanish:
  - violó
  - transgredió
  lexicon: BDAG
  rationale: '"Traspasó" mantiene la idea de cruzar un límite establecido y reproduce bien el tono legal-covenantal del verbo sin sonar excesivamente técnico.'
- source_word: τὰ νόμιμα
  english_pob_choice: the laws
  chosen_spanish: las leyes
  alternatives_spanish:
  - los estatutos
  - las ordenanzas
  lexicon: LSJ
  rationale: νόμιμα designa disposiciones legales establecidas. "Leyes" es la solución más clara y natural en español, preservando el sentido normativo general que el inglés POB resumió como "laws".
- source_word: Κυρίου θεοῦ Ἰσραήλ
  english_pob_choice: the Lord God of Israel
  chosen_spanish: de Yahvé, Dios de Israel
  alternatives_spanish:
  - del Señor Dios de Israel
  - de Yahvé, el Dios de Israel
  lexicon: BDAG
  rationale: Se respeta el título divino completo y la identidad pactual. Se evita "Señor" en el texto principal porque el proyecto exige "Yahvé" para יהוה / κύριος cuando corresponde al nombre divino.
theological_decisions:
- issue: Renderizar κύριος en juramento y en el título divino final
  english_pob_reading: Lord
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Señor
  - el Señor
  rationale: En este contexto, κύριος remite al nombre divino y al Dios de Israel, no solo a un título genérico. El proyecto prescribe "Yahvé" para preservar la visibilidad del nombre divino y evitar el enmascaramiento litúrgico.
  doctrine_reference: 'DOCTRINE.md Contested terms: יהוה / κύριος → Yahvé'
- issue: Hacer explícito el objeto de la rebelión
  english_pob_reading: he broke his oath and rebelled
  chosen_spanish_reading: quebrantó su juramento y se rebeló
  alternative_spanish_readings:
  - quebrantó su juramento y se rebeló contra Nabucodonosor
  - quebrantó su juramento y se sublevó
  rationale: El griego deja implícito el objeto de ἀπέστη. Como el antecedente inmediato ya nombra a Nabucodonosor, la rebelión queda suficientemente situada sin añadir un complemento no expresado en el texto fuente.
  doctrine_reference: DOCTRINE.md Translation philosophy §1, §3
translation_notes:
  revision_awareness: Se revisó el texto griego como ancla primaria y el audit trail inglés como apoyo para decisiones de relación sintáctica, ambigüedad de ἀπὸ, y el valor jurídico de ἐφιορκήσας/παρέβη. No se detectaron revisiones posteriores que alteren la lectura base; se conservan las tensiones documentadas sobre la relación de juramento y sobre νόμιμα.
  spanish_consistency_notes:
  - Se usa "Yahvé" de forma coherente con el estándar del proyecto para κύριος/יהוה.
  - '"Juramento" se mantiene para ὁρκισθεὶς/ἐφιορκήσας, reservando "perjurio" como alternativa lexical no preferida.'
  - '"Se rebeló" conserva el valor político de ἀπέστη sin sobreespecificar el objeto.'
  - '"Su cuello y su corazón" preserva la doble metáfora corporal y moral del original.'
