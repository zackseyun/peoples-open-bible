revisions:
- from: Recuerda —no olvides— cómo provocaste a Yahvé tu Dios[a] en el desierto. Desde el día en que saliste de la tierra de Egipto hasta que llegaste a este lugar[b], han sido rebeldes contra Yahvé.
  to: Recuerda —no olvides— cómo provocaste a ira a Yahvé tu Dios[a] en el desierto. Desde el día en que saliste de la tierra de Egipto hasta que llegaron ustedes a este lugar, ustedes han sido rebeldes contra Yahvé[b].
  rationale: Se corrige el cambio de número del hebreo marcando plural en la segunda mitad («llegaron ustedes ... ustedes han sido rebeldes»), se mejora la naturalidad sintáctica de la cláusula final y se refuerza en el texto principal la fuerza causativa de הִקְצַפְתָּ con «provocaste a ira». Se conservan «Yahvé» y la nota sobre «con/contra Yahvé» conforme al audit trail y a la política terminológica del proyecto.
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T23:50:46Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador conserva bien la estructura exhortativa inicial («Recuerda —no olvides—»), el nombre divino «Yahvé», el marco temporal desde la salida de Egipto hasta «este lugar», y el sentido adversativo de עִם יְהוָה mediante «contra Yahvé». Sin embargo, hay un problema importante de concordancia pronominal/numeral: el hebreo pasa de 2ms («provocaste», «saliste») a 2mp («vinieron/llegaron ustedes», «fueron ustedes rebeldes»). El borrador mezcla singular y plural y además usa «han sido rebeldes», que omite el sujeto explícito exigido por el contexto exhortativo a Israel como colectivo. También conviene explicitar mejor la fuerza causativa de הִקְצַפְתָּ en español principal, no solo en nota.'
  spanish_quality_summary: El español es en general claro y digno, pero la frase final «han sido rebeldes» suena defectuosa por faltar el pronombre/antecedente expreso tras una cadena en singular. Además, el paso de «saliste» a «llegaste» no refleja el cambio al plural del hebreo; en español se puede marcar naturalmente con «llegaron ustedes». «Provocaste a Yahvé tu Dios» es comprensible, pero sin «a ira» o «a enojo» debilita la elección auditada del verbo causativo.
  glossary_alignment: 'Buena alineación con la terminología del proyecto: «Yahvé» para יהוה y «Dios» para אֱלֹהֶיךָ. «Contra Yahvé» respeta correctamente la decisión adversativa para עִם יְהוָה. No hay conflictos doctrinales mayores; el ajuste principal es de fidelidad gramatical y de fuerza léxica para הִקְצַפְתָּ.'
  issues:
  - severity: high
    issue: Mezcla no resuelta de singular y plural en el verso
    rationale: El hebreo usa 2ms al inicio y cambia a 2mp en עַד בֹּאֲכֶם / הֱיִיתֶם. El borrador mantiene singular en «llegaste» pero luego pasa a plural implícito en «han sido rebeldes», lo que rompe la lógica del texto y oscurece el cambio deliberado del original.
  - severity: medium
    issue: «Han sido rebeldes» suena incompleto y poco natural en este contexto
    rationale: 'En español, tras dirigirse en singular al oyente representativo, la cláusula final necesita expresar con claridad el sujeto colectivo: «ustedes han sido rebeldes» o una reformulación equivalente. Sin ello, la lectura resulta torpe.'
  - severity: medium
    issue: La fuerza causativa de הִקְצַפְתָּ queda demasiado atenuada en el texto principal
    rationale: El inglés auditado eligió «provoked ... to wrath». En español principal conviene reflejarlo con «provocaste a ira» o «provocaste al enojo», dejando «enojaste» como alternativa, no al revés.
  - severity: low
    issue: La nota a sobrecarga una alternativa que en realidad debería estar más cerca del texto principal
    rationale: Si el texto principal dice solo «provocaste», la nota compensa demasiado. Es mejor que el cuerpo del texto ya exprese la ira, y que la nota preserve una alternativa más simple como «enojaste».
  revised_spanish_text: Recuerda —no olvides— cómo provocaste a ira a Yahvé tu Dios[a] en el desierto. Desde el día en que saliste de la tierra de Egipto hasta que llegaron ustedes a este lugar, ustedes han sido rebeldes contra Yahvé[b].
  revised_footnotes:
  - marker: a
    text: O, «cómo enojaste a Yahvé tu Dios en el desierto».
    reason: lexical_alternative
  - marker: b
    text: 'Literalmente, «con Yahvé»; aquí el sentido es adversativo: «contra Yahvé».'
    reason: lexical_alternative
  revision_rationale: Se corrige el cambio de número del hebreo marcando plural en la segunda mitad («llegaron ustedes ... ustedes han sido rebeldes»), se mejora la naturalidad sintáctica de la cláusula final y se refuerza en el texto principal la fuerza causativa de הִקְצַפְתָּ con «provocaste a ira». Se conservan «Yahvé» y la nota sobre «con/contra Yahvé» conforme al audit trail y a la política terminológica del proyecto.
