translation:
  language: es
  text: Porque un espíritu santo de disciplina[a] huirá del engaño, se apartará de pensamientos insensatos y será reprendido[b] cuando la iniquidad[c] venga sobre él.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «el Espíritu Santo de disciplina». El griego no lleva artículo; por eso la frase puede leerse cualitativamente, no necesariamente como un título fijo.
    reason: alternative_reading
  - marker: b
    text: O «será reprobado» o «será convencido».
    reason: lexical_alternative
  - marker: c
    text: O «cuando la injusticia venga sobre él».
    reason: lexical_alternative
lexical_decisions:
- source_word: ἅγιον ... πνεῦμα
  english_pob_choice: a holy spirit
  chosen_spanish: un espíritu santo
  alternatives_spanish:
  - el Espíritu Santo
  - un Espíritu Santo
  lexicon: LSJ
  rationale: El griego carece de artículo, y el audit trail inglés preserva ese matiz cualitativo. En español, «un espíritu santo» mantiene la lectura no titular sin importar una designación fija posterior.
- source_word: παιδείας
  english_pob_choice: of discipline
  chosen_spanish: de disciplina
  alternatives_spanish:
  - de instrucción
  - de formación
  - que disciplina
  lexicon: LSJ
  rationale: «Disciplina» conserva el valor formativo y correctivo de παιδεία de manera breve y natural en español, sin reducirlo solo a instrucción intelectual.
- source_word: φεύξεται
  english_pob_choice: will flee
  chosen_spanish: huirá
  alternatives_spanish:
  - evitará
  - se apartará
  lexicon: LSJ
  rationale: El futuro de φεύγω expresa movimiento de huida; «huirá» conserva mejor la fuerza verbal que una paráfrasis más suave.
- source_word: δόλον
  english_pob_choice: deceit
  chosen_spanish: el engaño
  alternatives_spanish:
  - la astucia
  - el fraude
  - la treta
  lexicon: LSJ
  rationale: «Engaño» es claro y abarca el sentido general de δόλος sin volverlo demasiado arcaico o demasiado técnico.
- source_word: ἀπαναστήσεται
  english_pob_choice: will depart from
  chosen_spanish: se apartará
  alternatives_spanish:
  - se retirará de
  - se alejará de
  - se levantará y se apartará de
  lexicon: LSJ
  rationale: El compuesto sugiere separación; «se apartará» comunica bien la ruptura con los pensamientos insensatos en español natural.
- source_word: λογισμῶν ἀσυνέτων
  english_pob_choice: senseless thoughts
  chosen_spanish: pensamientos insensatos
  alternatives_spanish:
  - razonamientos insensatos
  - pensamientos necios
  - cálculos insensatos
  lexicon: LSJ
  rationale: «Pensamientos insensatos» mantiene el campo semántico de λογισμοί como pensamientos/reasonamientos y ἀσύνετοι como carentes de entendimiento.
- source_word: ἐλεγχθήσεται
  english_pob_choice: will be rebuked
  chosen_spanish: será reprendido
  alternatives_spanish:
  - será reprobado
  - será convencido
  - será expuesto
  lexicon: LSJ
  rationale: Siguiendo la revisión inglesa más reciente, «será reprendido» recoge el matiz de ἐλέγχω como reprender/poner en evidencia, y suena más cercano al uso español actual.
- source_word: ἐπελθούσης ἀδικίας
  english_pob_choice: when unrighteousness comes upon it
  chosen_spanish: cuando la injusticia venga sobre él
  alternatives_spanish:
  - cuando venga la injusticia
  - al venir la injusticia
  - cuando la maldad venga sobre él
  lexicon: LSJ
  rationale: «Injusticia» es una posibilidad léxica válida para ἀδικία y resulta más transparente en español. «Venga sobre él» conserva la idea de irrupción/afrontamiento del participio.
theological_decisions:
- issue: Si ἅγιον ... πνεῦμα debe sonar como nombre propio o como descripción cualitativa
  english_pob_reading: a holy spirit of discipline
  chosen_spanish_reading: un espíritu santo de disciplina
  alternative_spanish_readings:
  - el Espíritu Santo de disciplina
  - un Espíritu Santo de disciplina
  rationale: Se preserva la anartrosidad del griego y la cautela del inglés POB, evitando imponer el título doctrinal posterior donde el texto sapiential no lo exige.
  doctrine_reference: 'DOCTRINE.md: mantener la tensión teológica y la primacía del idioma original sobre la tradición de traducción.'
- issue: Cómo traducir ἀδικία en este contexto
  english_pob_reading: unrighteousness
  chosen_spanish_reading: injusticia
  alternative_spanish_readings:
  - injusticia
  - impiedad
  - maldad
  rationale: En este versículo, ἀδικία puede entenderse como injusticia o injusticia moral; «injusticia» preserva la amplitud ética sin forzar un término confesional más estrecho.
  doctrine_reference: DOCTRINE.md sobre justicia/injusticia y conservación de matices léxicos según contexto.
translation_notes:
  revision_awareness: La versión inglesa más reciente reemplazó «will rise up away from» por «will depart from» para ἀπαναστήσεται y «will be exposed» por «will be rebuked» para ἐλεγχθήσεται. La redacción española sigue esa revisión, con «se apartará» y «será reprendido», manteniendo además la cautela sobre el valor no titular de ἅγιον πνεῦμα.
  spanish_consistency_notes:
  - Se conservó «espíritu» en minúscula para reflejar la lectura cualitativa del griego.
  - Se prefirió «disciplina» para παιδεία por coherencia con el tono formativo-correctivo del pasaje.
  - Se eligió «injusticia» como término amplio y transparente para ἀδικία, en lugar de una paráfrasis moral más extensa.
  - Las notas al pie se alinean con los puntos donde el texto griego y el audit trail inglés admiten alternativas reales.
