translation:
  language: es
  text: ¿Lo hirió como hirió al que lo hirió? ¿O ha sido abatido como fueron abatidos sus caídos?[a][b]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «¿Lo hirió según el golpe de su heridor?»'
    reason: lexical_alternative
  - marker: b
    text: La referencia de los pronombres queda comprimida en el hebreo; el verso no nombra explícitamente a los participantes de la comparación.
    reason: theological_note
lexical_decisions:
- source_word: הַכְּמַכַּת
  english_pob_choice: Has ... as the striking of
  chosen_spanish: ¿Lo hirió como hirió...?
  alternatives_spanish:
  - ¿Lo hirió según el golpe de...?
  - ¿Lo hirió como el golpear de...?
  lexicon: HALOT
  rationale: El hebreo usa una comparación interrogativa con כְּ; en español, la estructura más natural para conservar la fuerza retórica es repetir el verbo y comparar con 'como'. 'Lo hirió' mantiene el verbo concreto de la acción sin volver nominal una frase que en español sonaría forzada.
- source_word: מַכֵּהוּ
  english_pob_choice: the one who struck him
  chosen_spanish: al que lo hirió
  alternatives_spanish:
  - a su heridor
  - al que lo golpeó
  lexicon: HALOT
  rationale: El participio hifil con sufijo designa al agente que lo hirió. 'Al que lo hirió' conserva la referencia personal y evita un calco como 'su heridor', menos natural en español bíblico contemporáneo.
- source_word: הִכָּהוּ
  english_pob_choice: has he struck him
  chosen_spanish: lo hirió
  alternatives_spanish:
  - lo ha herido
  - lo golpeó
  lexicon: HALOT
  rationale: En esta pregunta retórica, el perfecto hebreo puede expresarse en español con pasado simple o perfecto compuesto. 'Lo hirió' mantiene la brevedad del paralelo y suena más fluido en la repetición interrogativa.
- source_word: אִם
  english_pob_choice: Or
  chosen_spanish: ¿O
  alternatives_spanish:
  - O
  - ¿Acaso
  lexicon: HALOT
  rationale: Aquí אִם introduce la alternativa paralela. '¿O' reproduce la disyunción interrogativa en español y enlaza con la primera pregunta sin añadir interpretación.
- source_word: כְּהֶרֶג
  english_pob_choice: as ... were killed
  chosen_spanish: como fueron muertos
  alternatives_spanish:
  - como fueron asesinados
  - como fueron matados
  lexicon: HALOT
  rationale: El sustantivo de muerte violenta se vierte con una pasiva breve y solemne. 'Fueron muertos' conserva el paralelismo con el pasivo del hebreo y evita desplazar el énfasis hacia una terminología más interpretativa como 'asesinados'.
- source_word: הֲרֻגָיו
  english_pob_choice: his slain
  chosen_spanish: sus muertos
  alternatives_spanish:
  - los muertos de él
  - los que fueron muertos
  lexicon: HALOT
  rationale: La forma participial pasiva con sufijo es compacta y algo ambigua. 'Sus muertos' conserva esa compresión y el vínculo posesivo sin especificar indebidamente si el sufijo apunta a los muertos del sujeto o a los muertos causados por él.
- source_word: הֹרָג
  english_pob_choice: has he been slain
  chosen_spanish: ha sido muerto
  alternatives_spanish:
  - ha sido muerto de muerte violenta
  - ha sido asesinado
  lexicon: HALOT
  rationale: El pasivo del verbo נכה/הרג en el contexto se rinde con una pasiva sobria. 'Ha sido muerto' preserva la economía del hebreo y su tono formal, aunque en español pueda sonar más literal que idiomático.
theological_decisions:
- issue: Referencia implícita de los pronombres y el sujeto comparado
  english_pob_reading: The verse contrasts the LORD's striking of Israel/Jacob with his judgment on the nation(s) that struck Israel; the English preserves the pronouns rather than replacing them with explicit nouns.
  chosen_spanish_reading: El verso conserva los pronombres y no nombra explícitamente a Israel ni al agresor.
  alternative_spanish_readings:
  - Identificar explícitamente a Israel y a su agresor en el texto principal
  - Aclarar los referentes solo en una nota
  rationale: El hebreo es comprimido y deja la referencia implícita. Mantener esa compresión en español evita resolver interpretativamente lo que el verso deja abierto y sigue la primacía del texto fuente.
  doctrine_reference: Preservar la tensión exegética sin anticipar una identificación no explícita en el verso.
translation_notes:
  revision_awareness: La redacción sigue la revisión más reciente del inglés POB que cambió 'been killed' por 'been slain' para un registro más formal y para mantener de modo más consistente el patrón nominal/verbal del hebreo. En español se reflejó con una pasiva solemne ('ha sido muerto') y con 'sus muertos' para conservar el paralelismo y la compresión del original.
  spanish_consistency_notes:
  - Se usó 'hirió' para mantener continuidad léxica con el verbo de golpe/daño del paralelismo.
  - Se evitó 'SEÑOR' porque este verso no contiene el nombre divino en la superficie textual.
  - La pasiva 'ha sido muerto' intenta preservar la formalidad y el eco del pasivo hebreo, aunque se reconoce su posible aspereza en español.
  - '''Muertos'' se emplea para sostener la ambigüedad posesiva del hebreo sin ampliar el referente.'
