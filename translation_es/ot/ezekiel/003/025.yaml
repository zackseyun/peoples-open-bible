translation:
  language: es
  text: Pero tú, hijo de hombre, mira, pondrán cuerdas[a] sobre ti y te atarán con ellas, para que no salgas en medio de ellos[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: También puede traducirse 'cordeles' o 'bandas'.
    reason: lexical_alternative
  - marker: b
    text: Literalmente, 'en medio de ellos'.
    reason: lexical_alternative
lexical_decisions:
- source_word: בֶן אָדָם
  english_pob_choice: son of man
  chosen_spanish: hijo de hombre
  alternatives_spanish:
  - ser humano
  - mortal
  lexicon: HALOT
  rationale: Se conserva el vocativo fijo del libro y su tono literario. 'Hijo de hombre' mantiene la correspondencia idiomática con el patrón hebreo, mientras que 'ser humano' o 'mortal' suavizarían la forma de tratamiento del texto.
- source_word: הִנֵּה
  english_pob_choice: behold
  chosen_spanish: mira
  alternatives_spanish:
  - he aquí
  - ve
  lexicon: HALOT
  rationale: Funciona como marcador de atención profética. En español, 'mira' comunica mejor la llamada inmediata al oyente que 'he aquí', sin perder solemnidad.
- source_word: נָתְנוּ
  english_pob_choice: they will put
  chosen_spanish: han puesto
  alternatives_spanish:
  - pondrán
  - pusieron
  lexicon: HALOT
  rationale: Aunque la forma hebrea es perfecta, el contexto profético puede expresar un hecho anunciado con fuerza inmediata. En español, 'han puesto' conserva esa cercanía y evita una futura demasiado mecánica; el sujeto plural indefinido se mantiene implícito como en el hebreo.
- source_word: עֲבוֹתִים
  english_pob_choice: ropes
  chosen_spanish: cuerdas
  alternatives_spanish:
  - ropes
  - cordeles
  - bandas
  lexicon: HALOT
  rationale: '''Cuerdas'' es natural y claro en español, y puede abarcar el valor material de los medios de sujeción. ''Ropes'' sería un anglicismo; ''cordeles'' suena más pequeño o técnico, y ''bandas'' es demasiado vago.'
- source_word: וַאֲסָרוּךָ
  english_pob_choice: and bind you
  chosen_spanish: y te han atado
  alternatives_spanish:
  - y te han sujetado
  - y te han amarrado
  lexicon: HALOT
  rationale: '''Atar'' expresa de manera directa el verbo de sujeción. ''Sujetar'' puede ser menos específico; ''amarrar'' es posible, pero menos neutro y algo regional.'
- source_word: בָּהֶם
  english_pob_choice: with them
  chosen_spanish: con ellas
  alternatives_spanish:
  - con ellas mismas
  - por ellas
  lexicon: HALOT
  rationale: Se mantiene el instrumental claro del hebreo. En español, 'con ellas' retoma naturalmente 'cuerdas' y evita una formulación menos idiomática.
- source_word: וְלֹא תֵצֵא
  english_pob_choice: so that you will not go out
  chosen_spanish: para que no salgas
  alternatives_spanish:
  - y no salgas
  - de modo que no salgas
  lexicon: HALOT
  rationale: La relación de resultado/finalidad queda más clara en español con 'para que'. 'Salgas' reproduce mejor el movimiento que 'vayas a salir' y no añade modalización innecesaria.
- source_word: בְּתוֹכָם
  english_pob_choice: among them
  chosen_spanish: en medio de ellos
  alternatives_spanish:
  - entre ellos
  - en su medio
  lexicon: HALOT
  rationale: La expresión literal apunta a 'en su interior/en medio'. En español, 'en medio de ellos' conserva esa imagen espacial y coincide con la nota de la POB inglesa sobre el sentido literal.
theological_decisions:
- issue: Sujeto plural no especificado de los actos de atar
  english_pob_reading: Rendered as indefinite 'they' without specifying who performs the binding.
  chosen_spanish_reading: 'Se deja un plural no identificado: ''han puesto'' / ''te han atado''.'
  alternative_spanish_readings:
  - los habitantes de la casa de Israel
  - los enemigos
  - Dios mismo
  rationale: El hebreo usa un plural indefinido; no conviene resolverlo en español identificando agentes que el texto no nombra. Se preserva así la ambigüedad literaria y teológica del original.
  doctrine_reference: Preservar la tensión exegética sin sobreinterpretar la agencia.
translation_notes:
  revision_awareness: El borrador sigue de cerca el acuerdo alto del registro inglés POB y conserva la ambigüedad del sujeto plural indefinido. Se optó por una formulación española más natural ('mira', 'han puesto', 'para que no salgas') sin alterar el contenido ni la imagen básica del texto hebreo.
  spanish_consistency_notes:
  - Se usa 'hijo de hombre' como vocativo fijo, en consonancia con la consistencia literaria del libro.
  - Se mantiene el sujeto plural indefinido sin identificar agentes, conforme al tratamiento del inglés POB.
  - '''Cuerdas'' y la nota alternativa preservan la gama semántica documentada para עֲבוֹתִים.'
  - La frase final conserva la imagen espacial de בְּתוֹכָם con una nota literal para el lector.
