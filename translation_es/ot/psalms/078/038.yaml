revisions:
- from: Pero él[a], siendo compasivo, hizo expiación por la iniquidad y no destruyó; muchas veces volvió atrás su ira y no despertó todo su furor.
  to: Pero él, siendo compasivo, hizo expiación[a] por la iniquidad y no destruyó; muchas veces hizo volver su ira y no desató todo su furor.
  rationale: La revisión corrige el anclaje de la nota para que corresponda al verbo relevante, mejora la naturalidad de לְהָשִׁיב אַפּוֹ con «hizo volver su ira» sin perder la imagen de reversión, y reemplaza «despertó» por «desató» para una expresión más idiomática con «furor». Se conserva la decisión teológica principal de כפר como expiación y el registro poético-digno del verso.
  reviewer_model: gpt-5.4
