review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja correctamente el sentido básico del hebreo: identifica al cerdo, mantiene la causalidad de כִּי, conserva las dos descripciones de la pezuña, expresa que no rumia y comunica la categoría ritual de טָמֵא. Sin embargo, la formulación española de la segunda descripción de la pezuña queda gramaticalmente incompleta y poco natural (''y hendida la pezuña''), y conviene ajustar la nota b para que el literal alternativo sea más idiomático y más cercano al hebreo.'
  spanish_quality_summary: 'El español es generalmente claro y digno. ''El cerdo'' y ''no rumia'' funcionan bien. ''Impuro para ustedes'' es comprensible, aunque ''inmundo'' sería más tradicional; no es obligatorio cambiarlo. El principal problema de calidad es sintáctico: ''porque tiene pezuña partida y hendida la pezuña'' suena trabado. ''Y la pezuña está hendida'' conserva el paralelismo hebreo con mejor naturalidad.'
  glossary_alignment: No hay conflicto con la terminología troncal del proyecto. No aparece Yahvé ni Mesías. La elección de 'impuro' para טָמֵא es defendible según la racionalidad teológica dada, aunque 'inmundo' también sería posible. 'Cerdo' para הַחֲזִיר y 'rumia' para גֵּרָה לֹא יִגָּר están bien alineados con la evidencia fuente y con un español amplio.
  issues:
  - severity: medium
    issue: La frase 'y hendida la pezuña' es gramaticalmente deficiente en español.
    rationale: Aunque intenta preservar la segunda cláusula hebrea, en español queda elíptica de manera poco natural. Una forma como 'y la pezuña está hendida' o 'y divide la pezuña' mantiene mejor el sentido y la legibilidad.
  - severity: low
    issue: La nota b ofrece literales poco idiomáticos y uno algo sobreexplicado ('no hace subir el bolo').
    rationale: El hebreo literal se acerca a 'no hace subir el bolo/cud', pero en español conviene una formulación más clara y menos extraña, por ejemplo 'no hace subir el bolo alimenticio' o simplemente una nota que explique el literal sin multiplicar alternativas torpes.
  revised_spanish_text: Y el cerdo[a], porque tiene pezuña partida y la pezuña está hendida, pero no rumia[b], es impuro para ustedes.
  revised_footnotes:
