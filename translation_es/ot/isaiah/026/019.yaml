translation:
  language: es
  text: Tus muertos vivirán[a]; mis cuerpos sin vida resucitarán. ¡Despierten y griten de gozo, ustedes que habitan en el polvo! Porque tu rocío es rocío de luces[b], y la tierra expulsará a los muertos[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «mi cadáver resucitará». El hebreo dice literalmente «mi cadáver» con sufijo de primera persona singular, pero el verbo plural favorece un sentido colectivo; de ahí una traducción como «mis cuerpos sin vida».
    reason: lexical_alternative
  - marker: b
    text: O «tu rocío es rocío de luz» o «rocío resplandeciente». La expresión hebrea es difícil y puede evocar un rocío vivificante, lleno de luz.
    reason: lexical_alternative
  - marker: c
    text: O «las sombras». רְפָאִים puede designar a los muertos del más allá, a menudo concebidos como habitantes sombríos del mundo de los muertos.
    reason: alternative_reading
lexical_decisions:
- source_word: מֵתֶיךָ
  english_pob_choice: your dead
  chosen_spanish: tus muertos
  alternatives_spanish:
  - tus muertos [seres]
  - los tuyos muertos
  lexicon: HALOT
  rationale: El hebreo usa un sustantivo plural con sufijo de segunda persona; en español, "tus muertos" conserva la dirección directa sin añadir interpretación. "Muertos" comunica mejor la referencia a personas fallecidas que una perífrasis más explicativa.
- source_word: נְבֵלָתִי
  english_pob_choice: my dead bodies
  chosen_spanish: mis cuerpos muertos
  alternatives_spanish:
  - mi cadáver
  - mis cadáveres
  lexicon: HALOT
  rationale: Nְבֵלָה denota cadáver/carroña, y el sufijo de primera persona singular debe mantenerse. "Mis cuerpos muertos" sigue de cerca la forma textual y deja visible la tensión del singular con sentido colectivo que el audit trail documenta. "Mis cadáveres" sería posible, pero suena más abrupto y menos natural en español de registro bíblico.
- source_word: יְקוּמוּן
  english_pob_choice: will rise
  chosen_spanish: resucitarán
  alternatives_spanish:
  - se levantarán
  - volverán a levantarse
  lexicon: HALOT
  rationale: En contexto de resurrección, "resucitarán" comunica con claridad el movimiento de volver a la vida que el verbo קום expresa aquí. "Se levantarán" es más literal, pero en español puede sonar menos específico en un pasaje tan marcadamente escatológico.
- source_word: הָקִיצוּ
  english_pob_choice: Awake
  chosen_spanish: ¡Despierten!
  alternatives_spanish:
  - ¡Despierta!
  - ¡Despiértense!
  lexicon: HALOT
  rationale: El imperativo plural mantiene el llamado poético a los que están como dormidos en la muerte. "¡Despierten!" es natural, digno y fiel al tono profético.
- source_word: וְרַנְּנוּ
  english_pob_choice: shout for joy
  chosen_spanish: griten de gozo
  alternatives_spanish:
  - canten de gozo
  - griten con alegría
  lexicon: HALOT
  rationale: רנן expresa júbilo sonoro. "Griten de gozo" preserva esa intensidad mejor que una versión suavizada. "Canten de gozo" también es viable, pero podría desplazar la imagen hacia lo musical más que hacia la exclamación jubilosa.
- source_word: שֹׁכְנֵי עָפָר
  english_pob_choice: you who dwell in the dust
  chosen_spanish: ustedes que habitan en el polvo
  alternatives_spanish:
  - moradores del polvo
  - los que viven en el polvo
  lexicon: HALOT
  rationale: La imagen de quienes moran en el polvo se conserva con una formulación clara en español. "Habitan" evita el tono arcaico de "moran" sin perder el registro bíblico.
- source_word: טַל אוֹרֹת
  english_pob_choice: a dew of lights
  chosen_spanish: rocío de luces
  alternatives_spanish:
  - rocío de luz
  - rocío resplandeciente
  lexicon: HALOT
  rationale: El plural אוֹרוֹת es difícil; "rocío de luces" mantiene la rareza del hebreo y la posible evocación de una humedad vivificante asociada con resplandor. No se resuelve prematuramente la imagen a "rocío de luz" ni a una paráfrasis interpretativa.
- source_word: רְפָאִים
  english_pob_choice: the dead
  chosen_spanish: los muertos
  alternatives_spanish:
  - las sombras
  - los difuntos
  lexicon: HALOT
  rationale: En este contexto, רְפָאִים refiere a los muertos/departados. "Los muertos" comunica el sentido principal y conserva la amplitud semántica; la opción "las sombras" queda reservada para nota porque puede ser más literal pero menos transparente.
- source_word: תַּפִּיל
  english_pob_choice: will cast out
  chosen_spanish: expulsará
  alternatives_spanish:
  - arrojará
  - hará salir
  lexicon: HALOT
  rationale: El hiphil de נפל aquí expresa la acción de dar fuera/expulsar. "Expulsará" transmite la fuerza del verbo sin introducir una imagen ajena; "arrojará" podría sugerir una agencia demasiado violenta y menos natural con "la tierra" como sujeto.
theological_decisions:
- issue: Lenguaje de resurrección en un texto profético-poético
  english_pob_reading: Render the verse straightforwardly as bodily resurrection imagery without reducing it to mere national restoration.
  chosen_spanish_reading: Traducir el verso de manera directa como imaginería de resurrección corporal, sin reducirlo a mera restauración nacional.
  alternative_spanish_readings:
  - Solo renovación del pueblo
  - resurgimiento metafórico
  rationale: La secuencia "vivirán", "resucitarán", "despierten" y "la tierra expulsará" apunta fuertemente a resurrección real, aunque también alimente esperanza corporativa para Israel. La traducción debe conservar esa tensión teológica en vez de resolverla a una sola lectura metafórica.
  doctrine_reference: Preservar la tensión teológica sin neutralizarla.
- issue: Identidad del hablante en el posesivo de primera persona
  english_pob_reading: Retain the first-person possessive in the main text.
  chosen_spanish_reading: 'Mantener el posesivo de primera persona en el texto principal: "mis cuerpos muertos".'
  alternative_spanish_readings:
  - armonizar a "sus cuerpos muertos"
  - cambiar a "tus cuerpos muertos"
  rationale: El texto hebreo masorético conserva la primera persona singular; aunque la identificación del hablante sea debatida, la traducción debe reflejar la forma textual y no armonizarla por anticipado.
  doctrine_reference: Primacía del texto original sobre la nivelación traductora.
translation_notes:
  revision_awareness: El borrador sigue la revisión más reciente del audit trail al preferir "mis cuerpos muertos" sobre una opción más áspera como "mis cadáveres" o "mis cuerpos". También conserva la rareza de "rocío de luces" para no cerrar prematuramente la ambigüedad de אוֹרֹת, y traduce רְפָאִים con "los muertos" en el texto principal, dejando la alternativa "las sombras" en nota, conforme al contexto de alta concordancia y a las revisiones registradas.
  spanish_consistency_notes:
  - Se mantuvo "Yahvé" por coherencia general del proyecto, aunque este versículo no contiene el nombre divino explícito.
  - Se empleó "resucitarán" por contexto escatológico, aunque el verbo hebreo base sea קום; esto evita una lectura demasiado genérica.
  - Se evitó "SEÑOR" como máscara del nombre divino porque aquí no aparece יהוה en el versículo, y no hay necesidad de introducirla.
  - Se conservó el plural verbal y la dirección de segunda persona en "tus muertos" para reflejar el paralelismo del hebreo.
