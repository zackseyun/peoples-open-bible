translation:
  language: es
  text: Como compensación[a] por el trabajo que hizo contra ella[b], le he dado la tierra de Egipto, porque trabajaron para mí[c], declara el Señor Dios Yahvé.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «salario»; el sustantivo hebreo puede significar trabajo, hecho o remuneración.
    reason: lexical_alternative
  - marker: b
    text: El pronombre «ella» probablemente se refiere a Tiro por el contexto inmediato (29:18).
    reason: cross_reference
  - marker: c
    text: O «porque actuaron para mí» o «porque lo hicieron para mí».
    reason: lexical_alternative
lexical_decisions:
- source_word: פְּעֻלָּתוֹ
  english_pob_choice: his compensation
  chosen_spanish: su compensación
  alternatives_spanish:
  - su salario
  - su paga
  - su recompensa
  - su trabajo
  lexicon: HALOT
  rationale: El sustantivo admite los valores de trabajo, hecho o remuneración. Dado que el contexto presenta a Egipto como entrega a modo de pago por una campaña militar, «compensación» conserva el sentido retributivo sin reducirlo solo a salario literal.
- source_word: אֲשֶׁר עָבַד בָּהּ
  english_pob_choice: for which he labored against it
  chosen_spanish: por la cual trabajó contra ella
  alternatives_spanish:
  - en la cual trabajó
  - por la cual sirvió en ella
  - por la cual laboró contra ella
  lexicon: HALOT
  rationale: עָבַד puede significar trabajar, servir o laborar. En este contexto bélico, «trabajó contra ella» comunica que el esfuerzo se dirigió contra Tiro, sin forzar una paráfrasis más amplia. Mantengo el referente femenino con el pronombre «ella» para reflejar la sufijación del hebreo y el contexto inmediato.
- source_word: נָתַתִּי לוֹ
  english_pob_choice: I have given him
  chosen_spanish: le he dado
  alternatives_spanish:
  - le di
  - yo le he dado
  lexicon: HALOT
  rationale: El perfecto hebreo puede rendirse en español como pretérito perfecto para una acción decretada con vigencia presente. «Le he dado» conserva el carácter de acto ya decidido y establecido por Dios.
- source_word: אֶת אֶרֶץ מִצְרַיִם
  english_pob_choice: the land of Egypt
  chosen_spanish: la tierra de Egipto
  alternatives_spanish:
  - Egipto
  - el país de Egipto
  lexicon: HALOT
  rationale: «La tierra de Egipto» sigue de cerca la forma hebrea y mantiene el matiz territorial, no solo nacional, que el texto enfatiza al presentarla como botín o compensación.
- source_word: אֲשֶׁר עָשׂוּ לִי
  english_pob_choice: because they worked for me
  chosen_spanish: porque trabajaron para mí
  alternatives_spanish:
  - porque hicieron para mí
  - porque sirvieron para mí
  - porque actuaron para mí
  lexicon: HALOT
  rationale: עָשׂוּ es amplio, pero aquí el sentido se aclara por el marco de servicio militar retribuido. «Trabajaron para mí» expresa naturalmente la idea de labor/servicio ejecutado como instrumento de juicio divino, sin eliminar la tensión teológica.
- source_word: נְאֻם אֲדֹנָי יְהוִה
  english_pob_choice: declares the Lord Yahweh
  chosen_spanish: declara el Señor Yahvé
  alternatives_spanish:
  - dice el Señor Yahvé
  - oráculo del Señor Yahvé
  lexicon: HALOT
  rationale: Se conserva la fórmula profética con «declara» y se traduce el nombre divino como «Yahvé» según la norma del proyecto. «Señor Yahvé» refleja אֲדֹנָי יְהוִה sin recurrir al reemplazo litúrgico por «SEÑOR».
theological_decisions:
- issue: Referente del sufijo femenino en בָּהּ ('contra ella/en ella')
  english_pob_reading: The suffix refers to Tyre from the immediate preceding context, so the clause describes Nebuchadnezzar's labor in the campaign against Tyre.
  chosen_spanish_reading: El pronombre «ella» remite a Tiro por el contexto inmediato, de modo que la cláusula describe el trabajo de Nabucodonosor contra Tiro.
  alternative_spanish_readings:
  - El sufijo podría entenderse de manera más general como referencia al trabajo mismo.
  - Podría tomarse como una referencia menos precisa al empeño o tarea realizada.
  rationale: Los versículos previos hablan de la dura campaña contra Tiro, y la recompensa de Egipto encaja como pago por ese esfuerzo. Mantener el referente implícito evita borrar la conexión discursiva sin sobreexplicarla en el texto principal.
  doctrine_reference: Preservar la referencia contextual sin resolverla artificialmente
- issue: Agencia en 'trabajaron para mí'
  english_pob_reading: Nebuchadnezzar and his forces are said to have worked for YHWH in the sense of serving as instruments of divine judgment.
  chosen_spanish_reading: Nabucodonosor y sus fuerzas aparecen como instrumentos del juicio divino, sin que eso elimine su propia intención imperial.
  alternative_spanish_readings:
  - Trabajaron solo para sus propios fines imperiales, sin implicación de servicio divino.
  - Trabajaron para Dios en un sentido meramente providencial, no ministerial.
  rationale: 'La cláusula hebrea atribuye a su labor una relación real con Yahvé. La redacción española conserva esa afirmación y su tensión: Dios los usa como instrumentos, sin convertir la frase en una aprobación completa de sus motivos.'
  doctrine_reference: Preservar la tensión teológica
translation_notes:
  revision_awareness: 'La redacción sigue la revisión más reciente del POB inglés: «compensation» en lugar de «wages» y «the Lord Yahweh» en lugar de «the Lord GOD». Se ha mantenido la estructura sintáctica y la tensión exegética del original, adaptándola a un español natural y publicable.'
  spanish_consistency_notes:
  - Se usa «Yahvé» para יְהוִה conforme al estándar del proyecto, y «Señor Yahvé» para reflejar la combinación אֲדֹנָי יְהוִה.
  - Se conserva «la tierra de Egipto» para respetar el matiz territorial del hebreo.
  - «Trabajó contra ella» mantiene el referente femenino y la relación bélica con Tiro sin añadir explicaciones al cuerpo del texto.
  - Los términos de retribución se uniforman con «compensación» y no con vocabulario eclesiástico tradicional no sustentado por el contexto.
  - Las notas al pie distinguen claramente entre alternativa léxica y referencia contextual, sin mezclar decisiones distintas en un solo marcador.
