id: PHP.4.9
reference: Philippians 4:9
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: ἃ καὶ ἐμάθετε καὶ παρελάβετε καὶ ἠκούσατε καὶ εἴδετε ἐν ἐμοί, ταῦτα πράσσετε· καὶ ὁ θεὸς τῆς εἰρήνης ἔσται μεθ’ ὑμῶν.
base_translation:
  language: en
  yaml_path: translation/nt/philippians/004/009.yaml
  text: What you also learned and received and heard and saw in me—practice these things, and the God of peace will be with you.
translation:
  language: ko
  text: 여러분이 나에게서 배우고 전해 받고 듣고 본 것[a], 이것들을 실천하십시오. 그리하면 평강의 하나님께서 여러분과 함께 계실 것입니다.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 「나에게서 본 것」은 바울의 삶과 본보기에서 직접 목격한 바를 가리킨다.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἃ
  english_pob_choice: what
  chosen_korean: 것
  alternatives_korean:
  - 바
  - 그것
  lexicon: BDAG
  rationale: 중성 복수 관계대명사를 한국어 의존명사 「것」으로 받고, 「이것들을」로 다시 가리켜 헬라어의 ἃ ... ταῦτα 구조를 자연스럽게 살린다.
- source_word: ἐμάθετε
  english_pob_choice: learned
  chosen_korean: 배우고
  lexicon: BDAG
  rationale: 표준 등가어. 부정과거 단순 과거형.
- source_word: παρελάβετε
  english_pob_choice: received
  chosen_korean: 전해 받고
  alternatives_korean:
  - 받고
  - 받아들이고
  lexicon: BDAG
  rationale: παραλαμβάνω는 바울에게서 「전수받은 것」(가르침·전통)을 가리키는 의미가 있으므로, 단순 「받다」보다 「전해 받다」가 그 결을 더 잘 담는다.
- source_word: ἠκούσατε
  english_pob_choice: heard
  chosen_korean: 듣고
  lexicon: BDAG
  rationale: 평행 구조를 위한 간결한 직역.
- source_word: εἴδετε ἐν ἐμοί
  english_pob_choice: saw in me
  chosen_korean: 나에게서 ... 본
  alternatives_korean:
  - 내 안에서 본
  - 내 삶에서 본
  lexicon: BDAG
  rationale: 「나에게서」는 바울의 인격·삶을 통한 관찰 대상을 자연스럽게 표현한다. 직역 「내 안에서」는 어색하고, 「내 삶에서」는 보충 단어를 더한다.
- source_word: ταῦτα πράσσετε
  english_pob_choice: practice these things
  chosen_korean: 이것들을 실천하십시오
  alternatives_korean:
  - 이것들을 행하십시오
  - 이것들을 행습으로 삼으십시오
  lexicon: BDAG
  rationale: πράσσω는 습관적·지속적 실행을 가리키므로 「실천」이 가장 적합하다. 「행하다」도 가능하나 한 번의 행위로 읽힐 수 있다.
- source_word: ὁ θεὸς τῆς εἰρήνης
  english_pob_choice: the God of peace
  chosen_korean: 평강의 하나님
  alternatives_korean:
  - 평화의 하나님
  - 평강을 주시는 하나님
  lexicon: BDAG
  rationale: 본 번역의 εἰρήνη 기본 옮김(「평강」)과 일치시키며, 한국 교회의 정형어를 보존한다.
- source_word: ἔσται μεθ’ ὑμῶν
  english_pob_choice: will be with you
  chosen_korean: 여러분과 함께 계실 것입니다
  alternatives_korean:
  - 여러분 가운데 계실 것입니다
  - 여러분과 같이 계실 것입니다
  lexicon: BDAG
  rationale: 미래 약속을 합쇼체 「-실 것입니다」로 옮기고, 하나님께 대한 경어 「계시다」를 사용한다.
- source_word: καί (8b)
  english_pob_choice: and
  chosen_korean: 그리하면
  alternatives_korean:
  - 그러면
  - 그리고
  lexicon: BDAG
  rationale: 헬라어는 단순 καί로 권면과 약속을 잇지만, 한국어 흐름에서 「그리하면」이 두 절의 자연스러운 연결을 만들면서도 기계적 인과 강제를 피한다.
theological_decisions:
- issue: 권면과 하나님의 임재 약속의 관계
  chosen_reading: 본문이 본래의 평행 구조(권면+약속)를 살리되 기계적 조건절 「~하면 반드시 ~한다」로 좁히지 않는다.
  alternative_readings:
  - 더 강한 조건적 인과 표현
  rationale: 헬라어는 두 절을 καί로 단순 병치하므로, 한국어 본문에서도 약속의 부드러운 결을 보존하고 도덕적 거래의 어감을 피한다. 「그리하면 ... 계실 것입니다」는 약속의 자연스러운 흐름이며 강한 조건 인과는 아니다.
  doctrine_reference: 'Preserve theological tension rather than resolve it.'
