translation:
  language: es
  text: Miré[a], y vi que no había hombre, y todas las aves de los cielos habían huido.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «no había humanidad» / «no había género humano». El hebreo singular «hombre» aquí tiene un sentido genérico representativo.
    reason: alternative_reading
lexical_decisions:
- source_word: רָאִיתִי
  english_pob_choice: I looked
  chosen_spanish: Miré
  alternatives_spanish:
  - Vi
  lexicon: HALOT
  rationale: El verbo ראה en perfectivo 1cs, dentro de esta secuencia de visión profética, se expresa mejor en español con «miré», porque conserva la idea de observación atenta del panorama y no solo de percepción puntual.
- source_word: וְהִנֵּה
  english_pob_choice: and behold
  chosen_spanish: y he aquí
  alternatives_spanish:
  - y mira
  - y he aquí que
  lexicon: HALOT
  rationale: La fórmula hebrea introduce con viveza lo que aparece ante la vista. «Y he aquí» conserva ese valor discursivo y el tono profético sin volverlo demasiado explicativo.
- source_word: אֵין
  english_pob_choice: there was no
  chosen_spanish: no había
  alternatives_spanish:
  - no hubo
  - no existía
  lexicon: HALOT
  rationale: 'En la secuencia narrativa/visionaria pasada, el negativo existencial se expresa de forma natural en pretérito imperfecto: «no había», que corresponde bien al cuadro descrito.'
- source_word: הָאָדָם
  english_pob_choice: man
  chosen_spanish: hombre
  alternatives_spanish:
  - humanidad
  - ser humano
  - humanidad alguna
  lexicon: HALOT
  rationale: El singular con artículo funciona de manera genérica. Se conserva «hombre» para reflejar con precisión la forma hebrea y mantener la fuerza representativa del término, sin ampliar indebidamente el sentido.
- source_word: וְכָל
  english_pob_choice: and all
  chosen_spanish: y todas
  alternatives_spanish:
  - y todos
  lexicon: HALOT
  rationale: Con un sustantivo colectivo femenino plural en español, «todas» transmite naturalmente la totalidad del grupo afectado.
- source_word: עוֹף
  english_pob_choice: birds
  chosen_spanish: aves
  alternatives_spanish:
  - aves voladoras
  - pájaros
  lexicon: HALOT
  rationale: En la expresión fija con «los cielos», עוֹף designa a las aves; «aves» es claro, digno y suficientemente cercano al campo semántico hebreo.
- source_word: הַשָּׁמַיִם
  english_pob_choice: the heavens
  chosen_spanish: de los cielos
  alternatives_spanish:
  - del cielo
  - de los cielos
  lexicon: HALOT
  rationale: Se conserva «los cielos» para reflejar la dicción bíblica elevada de la expresión y evitar una reducción demasiado cotidiana de שָׁמַיִם a «cielo».
- source_word: נָדָדוּ
  english_pob_choice: had fled
  chosen_spanish: habían huido
  alternatives_spanish:
  - habían volado lejos
  - se habían ido
  - habían escapado
  lexicon: HALOT
  rationale: El verbo נדד puede expresar alejarse o huir. En este contexto de devastación, «habían huido» comunica bien el alejamiento forzado o impulsado por el juicio, con un matiz algo más natural en español que «habían fled» literal.
theological_decisions:
- issue: Valor genérico de הָאָדָם en un contexto de desolación
  english_pob_reading: The Hebrew singular 'man' here has a generic representative sense.
  chosen_spanish_reading: El singular «hombre» se mantiene como representante genérico, no como referencia exclusiva al varón.
  alternative_spanish_readings:
  - «humanidad»
  - «ser humano»
  rationale: La forma hebrea es singular genérica con artículo. Se conserva una traducción directa en el texto principal y se reconoce su valor representativo, evitando borrar la tensión entre literalidad y sentido inclusivo.
  doctrine_reference: 'DOCTRINE.md: Gender-accurate over gender-neutral; Contested terms table for אָדָם'
translation_notes:
  revision_awareness: 'Sin cambios respecto al último repaso: el texto fuente y el audit trail inglés muestran alta concordancia, y no se documentaron revisiones aplicadas.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» en el proyecto cuando aparezca el Nombre divino, pero este versículo no lo contiene.
  - «Cielos» se usa de manera consistente para שָׁמַיִם cuando el contexto es la expresión elevada «aves de los cielos».
  - Se evitó calcar «vi» porque el contexto visionario favorece «miré», alineado con la decisión inglesa auditable.
