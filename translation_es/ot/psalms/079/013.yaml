revisions:
- from: Pero nosotros[a], tu pueblo y las ovejas de tu pastizal, te daremos gracias por siempre[b]; de generación en generación contaremos tu alabanza.
  to: Pero nosotros, tu pueblo y las ovejas de tu prado[a], te daremos gracias por siempre; de generación en generación contaremos[b] tu alabanza.
  rationale: Se recomienda una revisión menor, no una reescritura de fondo. El texto ya es fiel al hebreo y al POB inglés, pero «prado» mejora claramente la naturalidad y el registro bíblico de la metáfora pastoral frente a «pastizal». Además, se corrige la nota b para que refleje de verdad la alternativa léxica documentada para נְסַפֵּר y se ancle en el verbo correspondiente. No hace falta adjudicación adicional.
