translation:
  language: es
  text: Lo encontró en una tierra de desierto, y en la desolación aullante del yermo; lo rodeó, le dio entendimiento[b], lo guardó como la pupila de su ojo[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, más tradicionalmente, «como la niña de su ojo».
    reason: lexical_alternative
  - marker: b
    text: El verbo hebreo que aquí se vierte como «le dio entendimiento» también puede sugerir «lo cuidó con atención» o «le prestó atención».
    reason: alternative_reading
lexical_decisions:
- source_word: יִמְצָאֵהוּ
  english_pob_choice: he found him
  chosen_spanish: lo encontró
  alternatives_spanish:
  - lo halló
  - lo encontró en su camino
  lexicon: HALOT
  rationale: מצא expresa 'encontrar/hallar'. En español, 'lo encontró' conserva la acción puntual y la sorpresa implícita sin añadir matiz interpretativo.
- source_word: בְּאֶרֶץ מִדְבָּר
  english_pob_choice: in a desert land
  chosen_spanish: en tierra de desierto
  alternatives_spanish:
  - en una tierra desierta
  - en tierra de wilderness
  lexicon: HALOT
  rationale: אֶרֶץ es 'tierra' y מִדְבָּר apunta a desierto/yermo. 'Tierra de desierto' mantiene la construcción poética y la aridez del lugar, sin forzar una paráfrasis.
- source_word: וּבְתֹהוּ
  english_pob_choice: in a waste
  chosen_spanish: y en la waste
  alternatives_spanish:
  - y en la desolación
  - y en el yermo
  lexicon: HALOT
  rationale: תֹהוּ denota vaciedad, desolación o wastedad. Aquí se conserva con un término que puede requerir nota porque el inglés POB dejó abierta la dificultad; en español se mantiene la tensión semántica de la imagen.
- source_word: יְלֵל יְשִׁמֹן
  english_pob_choice: of wilderness / howling waste of the wilderness
  chosen_spanish: aullante del yermo
  alternatives_spanish:
  - del desierto aullante
  - de la desolación aullante
  lexicon: HALOT
  rationale: La secuencia es comprimida y difícil. יְלֵל comunica 'aullante' y יְשִׁמֹן un yermo/desierto desolado. 'Aullante del yermo' intenta conservar la densidad poética sin expandir demasiado el hebreo.
- source_word: יְסֹבְבֶנְהוּ
  english_pob_choice: he surrounded him
  chosen_spanish: lo rodeó
  alternatives_spanish:
  - lo cercó
  - lo envolvió
  lexicon: HALOT
  rationale: סבב significa rodear/volver alrededor. 'Lo rodeó' es natural y mantiene la imagen física de protección.
- source_word: יְבֹונְנֵהוּ
  english_pob_choice: he gave him understanding / he cared for him
  chosen_spanish: le dio entendimiento
  alternatives_spanish:
  - lo cuidó con discernimiento
  - lo atendió
  lexicon: HALOT
  rationale: בין/בונן puede significar comprender, hacer entender o prestar atención inteligente. La forma más cercana al sentido lexical es 'le dio entendimiento', siguiendo la revisión más reciente del audit trail.
- source_word: יִצְּרֶנְהוּ
  english_pob_choice: he guarded him
  chosen_spanish: lo guardó
  alternatives_spanish:
  - lo protegió
  - lo preservó
  lexicon: HALOT
  rationale: נצר puede significar guardar, custodiar o preservar. 'Lo guardó' conserva la paridad con el original y la secuencia protectora del verso.
- source_word: כְּאִישׁוֹן עֵינוֹ
  english_pob_choice: like the pupil of his eye
  chosen_spanish: como la pupila de su ojo
  alternatives_spanish:
  - como la niña de su ojo
  - como el niño de su ojo
  lexicon: HALOT
  rationale: אִישׁוֹן es literalmente el pequeño 'pupilo/pupila' del ojo. 'Pupila' es transparente en español moderno y más próxima a la imagen hebrea que la locución tradicional 'niña del ojo'.
theological_decisions:
- issue: Referente de los pronombres masculinos singulares
  english_pob_reading: The verse speaks of the LORD's care for Israel/Jacob in collective singular imagery.
  chosen_spanish_reading: La traducción mantiene los pronombres singulares ('lo', 'le', 'su') para conservar la personificación colectiva de Israel/Jacob.
  alternative_spanish_readings:
  - usar 'los' o 'les' para hacer explícita la colectividad
  - reformular con un sustantivo colectivo
  rationale: El hebreo usa singular masculino y el POB lo preserva. En español, mantener el singular conserva la fuerza poética y la correspondencia formal del texto fuente.
  doctrine_reference: Translation philosophy §4 (gender-accurate over gender-neutral) y §5 (consistency of key terms).
- issue: Nuance of יְבֹונְנֵהוּ
  english_pob_reading: The verb may mean 'he gave him understanding' or 'he paid close attention to him'.
  chosen_spanish_reading: Se refleja como 'le dio entendimiento', dejando visible la posibilidad de atención cuidadosa.
  alternative_spanish_readings:
  - lo cuidó
  - lo atendió con discernimiento
  - le prestó atención
  rationale: El verbo admite una gama semántica entre entender, discernir y atender con cuidado. Dado el ajuste del audit trail hacia el sentido de 'understanding', esta redacción sigue el matiz más cercano sin cerrar del todo la ambigüedad.
  doctrine_reference: Translation philosophy §1 (primacía del original) y §3 (preservar la tensión donde exista ambigüedad real).
translation_notes:
  revision_awareness: El inglés POB revisó este verso desde una formulación más libre ('he cared for him') hacia 'he gave him understanding', y también afinó la segunda mitad para reflejar mejor la secuencia poética. La presente versión española sigue esa lectura revisada, pero conserva en nota la alternativa tradicional de 'la niña de su ojo' y mantiene visible la dificultad de תֹהוּ y de יְלֵל יְשִׁמֹן.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' como norma del proyecto, pero en este versículo no aparece el tetragrámaton explícito en la línea fuente dada; la referencia al sujeto divino queda implícita por el contexto de la perícopa.
  - Se evita 'Cristo' y cualquier terminología ajena al texto.
  - '''Pupila'' se usa para la imagen ocular por fidelidad descriptiva; se reserva la alternativa tradicional en nota.'
  - La combinación 'tierra de desierto' + 'waste' conserva la acumulación de desolación sin colapsar los dos sintagmas hebreos en un solo giro español.
