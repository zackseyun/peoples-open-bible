translation:
  language: es
  text: 'Y dijo Moisés[a]: «Esto es lo que Yahvé ha mandado que hagan, para que la gloria de Yahvé se manifieste a ustedes».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «y la gloria de Yahvé se manifestará a ustedes».'
    reason: alternative_reading
lexical_decisions:
- source_word: וַיֹּאמֶר
  english_pob_choice: And ... said
  chosen_spanish: Y dijo
  alternatives_spanish:
  - Entonces dijo
  - Así dijo
  lexicon: HALOT
  rationale: El waw consecutivo avanza la narración. En español, «Y dijo» conserva la continuidad narrativa sin añadir matices no exigidos por el hebreo.
- source_word: מֹשֶׁה
  english_pob_choice: Moses
  chosen_spanish: Moisés
  lexicon: HALOT
  rationale: Nombre propio estándar en español bíblico.
- source_word: זֶה הַדָּבָר
  english_pob_choice: This is the thing
  chosen_spanish: Esta es la cosa
  alternatives_spanish:
  - Esto es lo que
  - Esta es la materia
  lexicon: HALOT
  rationale: El hebreo es singular y concreto. «La cosa» mantiene la fuerza formal de דָבָר sin suavizarlo demasiado en «lo que», y es inteligible en español moderno.
- source_word: צִוָּה
  english_pob_choice: commanded
  chosen_spanish: ha mandado
  alternatives_spanish:
  - ha ordenado
  - ha instruido
  lexicon: HALOT
  rationale: צוָה expresa mandato con autoridad. «Ha mandado» reproduce bien el valor de autoridad y respeta el perfecto hebreo, tal como indica la revisión del POB inglés.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  lexicon: HALOT
  rationale: Se preserva el nombre divino con la forma española de transliteración adoptada por el proyecto, en lugar de sustituirlo por una perífrasis titulada.
- source_word: תַּעֲשׂוּ
  english_pob_choice: you to do
  chosen_spanish: que hagan
  alternatives_spanish:
  - que hagan ustedes
  - que ustedes hagan
  lexicon: HALOT
  rationale: El verbo está en segunda persona plural. En español, el sujeto queda implícito en la flexión verbal y el subjuntivo tras «mandado que» expresa adecuadamente el contenido del mandato.
- source_word: וְיֵרָא
  english_pob_choice: that ... may appear
  chosen_spanish: para que ... se les aparezca
  alternatives_spanish:
  - y ... les aparezca
  - de modo que ... se les aparezca
  lexicon: HALOT
  rationale: La forma puede leerse como resultado o finalidad. «Para que» conserva esa relación sin resolverla en exceso, y «se les aparezca» expresa la aparición divina de manera natural en español.
- source_word: אֲלֵיכֶם
  english_pob_choice: to you
  chosen_spanish: se les
  alternatives_spanish:
  - a ustedes
  - a vosotros
  lexicon: HALOT
  rationale: El destinatario plural se integra idiomáticamente en el dativo de interés («se les»), evitando una repetición pesada.
- source_word: כְּבוֹד יְהוָה
  english_pob_choice: the glory of Yahweh
  chosen_spanish: la gloria de Yahvé
  alternatives_spanish:
  - la gloria de Yahvé Dios
  lexicon: HALOT
  rationale: La construcción de genitivo se conserva de forma directa y tradicionalmente comprensible, sin sustituir «gloria» por un equivalente más interpretativo.
theological_decisions:
- issue: Rendering of the divine name יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: El texto hebreo usa el Tetragrama directamente. La decisión del proyecto es conservar el nombre propio divino en transliteración, no ocultarlo con una sustitución titulada.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Force of the final clause וְיֵרָא אֲלֵיכֶם כְּבוֹד יְהוָה
  english_pob_reading: 'result/purpose: ''that the glory of Yahweh may appear to you'''
  chosen_spanish_reading: 'finalidad/resultado: ''para que la gloria de Yahvé se les aparezca'''
  alternative_spanish_readings:
  - 'coordinación futura: ''y la gloria de Yahvé se les aparecerá'''
  rationale: El hebreo permite una lectura de consecuencia/finalidad y también una lectura futura coordinada. Se conserva la tensión con una forma final que no cierra indebidamente el sentido.
  doctrine_reference: 'DOCTRINE.md Translation philosophy §3: Preserve theological tension rather than resolve it'
translation_notes:
  revision_awareness: La redacción sigue el ajuste de la revisión inglesa más reciente en cuanto al perfecto («ha mandado») y mantiene la tensión interpretativa del cierre hebreo sin imponer solo una paráfrasis causal.
  spanish_consistency_notes:
  - Se usa Yahvé de manera consistente para יְהוָה, conforme al criterio del proyecto.
  - 'Se mantiene un registro bíblico claro y moderno: «ha mandado», «gloria», «se les aparezca».'
  - La nota [a] queda anclada en el texto y preserva la alternativa de lectura futura coordinada.
