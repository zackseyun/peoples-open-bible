revisions:
- from: 'El rey Ptolomeo Filopátor, a los estrategas que están en Egipto y a todos los que han sido puestos sobre los asuntos: saludos y bienestar[a][b].'
  to: 'Rey Ptolomeo Filopátor, a los generales en Egipto[a] y a todos los que están puestos a cargo de los asuntos: saludos y buena salud[b].'
  rationale: La revisión alinea mejor el español con el texto griego y con la auditoría inglesa del POB. «Rey» refleja de forma natural el encabezado epistolar anartro; «generales» sigue la elección principal documentada para στρατηγοῖς; «en Egipto» mantiene el sentido principal con nota para el matiz distributivo; «puestos a cargo de los asuntos» comunica el nombramiento administrativo sin rigidez excesiva; y «buena salud» reproduce con más precisión el valor epistolar de ἐρρῶσθαι. Se corrigió además la nota cultural para evitar una glosa literal errónea.
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T23:24:03Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien la estructura epistolar griega y conserva la mayoría del sentido fuente, pero introduce dos desviaciones importantes de matiz: «estrategas» suena demasiado calco/técnico frente a la decisión auditada de «generals», y «bienestar» debilita el deseo epistolar más concreto de salud/buen estado expresado por ἐρρῶσθαι. También la nota b traduce literalmente de forma inexacta.'
  spanish_quality_summary: El español es generalmente claro, pero «a los estrategas que están en Egipto» y «han sido puestos sobre los asuntos» resultan algo pesados. Una formulación más natural y fiel sería «a los generales en Egipto» y «a todos los que están puestos a cargo de los asuntos» o «encargados de los asuntos». En el saludo final, «saludos y buena salud» refleja mejor la fórmula. La puntuación y registro son apropiados.
  glossary_alignment: 'No hay términos teológicos sensibles aquí. La revisión propuesta sigue el rastro léxico del POB inglés: «Rey», «Ptolomeo Filopátor», «generales en Egipto», «todos los que están puestos a cargo de los asuntos», «saludos» y «buena salud».'
  issues:
  - severity: medium
    issue: «estrategas» para στρατηγοῖς
    rationale: Aunque históricamente posible, aquí el POB inglés documentó «generals» como elección principal para preservar el título militar-administrativo sin tecnicismo innecesario. «Estrategas» en español moderno suena menos natural y más especializado.
  - severity: medium
    issue: «bienestar» para ἐρρῶσθαι
    rationale: La fórmula epistolar expresa específicamente un deseo de estar bien/fuerte, comúnmente de salud. «Bienestar» es más abstracto y menos cercano al valor documentado de «good health».
  - severity: medium
    issue: Nota b literalmente inexacta
    rationale: «saludados y estar fuertes / estar bien» no corresponde a χαίρειν καὶ ἐρρῶσθαι. Debe explicarse como «saludos y estar fuerte/bien» o mejor como fórmula convencional de saludo y deseo de bienestar/salud.
  - severity: low
    issue: «han sido puestos sobre los asuntos» suena rígido
    rationale: Es comprensible, pero en español más natural conviene «están puestos a cargo de los asuntos» o «encargados de los asuntos», manteniendo el sentido administrativo de τεταγμένοις ἐπὶ πραγμάτων.
  revised_spanish_text: 'Rey Ptolomeo Filopátor, a los generales en Egipto[a] y a todos los que están puestos a cargo de los asuntos: saludos y buena salud[b].'
  revised_footnotes:
  - marker: a
    text: 'O: «a los generales por todo Egipto», reflejando el matiz distributivo de κατʼ Αἴγυπτον.'
    reason: lexical_alternative
  - marker: b
    text: Literalmente, «saludos y estar fuerte/bien»; es una fórmula griega convencional de carta que expresa un saludo y un deseo de bienestar o salud.
    reason: cultural_note
  revision_rationale: La revisión alinea mejor el español con el texto griego y con la auditoría inglesa del POB. «Rey» refleja de forma natural el encabezado epistolar anartro; «generales» sigue la elección principal documentada para στρατηγοῖς; «en Egipto» mantiene el sentido principal con nota para el matiz distributivo; «puestos a cargo de los asuntos» comunica el nombramiento administrativo sin rigidez excesiva; y «buena salud» reproduce con más precisión el valor epistolar de ἐρρῶσθαι. Se corrigió además la nota cultural para evitar una glosa literal errónea.
