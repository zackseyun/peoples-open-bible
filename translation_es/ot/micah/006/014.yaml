    reason: alternative_reading
  revision_rationale: 'Se hicieron ajustes menores para mejorar la naturalidad del español y la correspondencia con el paralelismo hebreo y el audit trail inglés, sin cambiar la interpretación básica: se eliminó el pronombre explícito inicial, se reemplazó ''quitarás'' por ''apartarás'' y se simplificó ''lo que logres salvar'' a ''lo que salves''.'
