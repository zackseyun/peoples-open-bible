translation:
  language: es
  text: Y si el sacerdote examina[a] la lesión[b] de la afección escamosa[c], y resulta que su apariencia no es más profunda que la piel, y no hay en él pelo negro, entonces el sacerdote aislará la lesión de la afección escamosa por siete días.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «examina» traduce aquí una inspección diagnóstica sacerdotal, no solo el acto de ver.
    reason: lexical_alternative
  - marker: b
    text: «lesión» mantiene un término neutral y observable para נֶגַע, sin imponer una identificación médica más precisa.
    reason: lexical_alternative
  - marker: c
    text: «afección escamosa» sigue la decisión POB para נֶתֶק; también puede traducirse «erupción escamosa», y el término tradicional es «tiña» o «sarna seca» según contexto, pero esas opciones pueden ser menos precisas o demasiado interpretativas aquí.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְכִי
  english_pob_choice: And if
  chosen_spanish: Y si
  alternatives_spanish:
  - Si
  - Ahora bien, si
  lexicon: HALOT
  rationale: En español legal-narrativo, «Y si» conserva el enlace casuístico del hebreo sin sonar forzado. Mantiene la continuidad con las disposiciones previas, como en el inglés auditado.
- source_word: יִרְאֶה
  english_pob_choice: examines
  chosen_spanish: examina
  alternatives_spanish:
  - ve
  - mira
  - inspecciona
  lexicon: HALOT
  rationale: En este contexto sacerdotal, el verbo describe una revisión diagnóstica, no solo la acción física de ver. «Examina» reproduce el valor procedimental reconocido en la versión inglesa.
- source_word: נֶגַע
  english_pob_choice: diseased area
  chosen_spanish: lesión
  alternatives_spanish:
  - mancha
  - afección
  - zona afectada
  lexicon: HALOT
  rationale: La palabra hebrea nombra un área observable afectada por un problema de piel. «Lesión» es neutral, médica y suficientemente general para este caso, sin imponer un diagnóstico más específico de lo que el texto da.
- source_word: נֶתֶק
  english_pob_choice: scaly outbreak
  chosen_spanish: afección escamosa
  alternatives_spanish:
  - erupción escamosa
  - sarna
  - tiña
  lexicon: HALOT
  rationale: El término designa una afección específica de piel/cabellera asociada al texto de Levítico 13. «Afección escamosa» preserva la referencia descriptiva del inglés sin adoptar el arcaísmo tradicional «scall» ni restringir innecesariamente el cuadro a una enfermedad moderna concreta.
- source_word: מַרְאֵהוּ
  english_pob_choice: its appearance
  chosen_spanish: su aspecto
  alternatives_spanish:
  - su apariencia
  - su mirada
  lexicon: HALOT
  rationale: El sustantivo con sufijo posesivo se refiere al aspecto visible del lugar examinado. «Su aspecto» es natural en español y mantiene el foco visual del diagnóstico.
- source_word: עָמֹק מִן הָעוֹר
  english_pob_choice: deeper than the skin
  chosen_spanish: no está hundido con respecto a la piel
  alternatives_spanish:
  - no está más profundo que la piel
  - no parece hundido bajo la piel
  - no está por debajo de la piel
  lexicon: HALOT
  rationale: El hebreo describe una apariencia de depresión o hundimiento respecto de la superficie cutánea. «No está hundido con respecto a la piel» conserva la comparación espacial sin añadir una equivalencia anatómica excesiva como «carne» o una interpretación más técnica de la necesaria.
- source_word: שֵׂעָר שָׁחֹר
  english_pob_choice: black hair
  chosen_spanish: pelo negro
  alternatives_spanish:
  - cabello negro
  - pelo oscuro
  lexicon: HALOT
  rationale: El criterio diagnóstico es la ausencia de pelo negro en la zona. «Pelo negro» sigue de cerca el hebreo y su valor observacional; «cabello» sería posible, pero «pelo» encaja mejor con el lenguaje corporal/dermatológico del pasaje.
- source_word: וְהִסְגִּיר
  english_pob_choice: shall isolate
  chosen_spanish: aislará
  alternatives_spanish:
  - pondrá en aislamiento
  - mantendrá apartado
  - encerrará
  lexicon: HALOT
  rationale: El verbo expresa una separación temporal para observación. «Aislará» transmite bien esa función ritual-diagnóstica en español moderno, evitando tanto el arcaísmo como las connotaciones sanitarias demasiado técnicas de «cuarentenar».
- source_word: שִׁבְעַת יָמִים
  english_pob_choice: for seven days
  chosen_spanish: por siete días
  alternatives_spanish:
  - durante siete días
  - siete días
  lexicon: HALOT
  rationale: «Por siete días» conserva la duración del aislamiento de manera natural en español y corresponde al valor temporal del hebreo con el verbo de aislamiento.
translation_notes:
  revision_awareness: Se ha seguido el sentido del texto hebreo y el audit trail inglés sin cambios revisionarios recientes; la redacción española refleja la misma lectura diagnóstica y la misma lógica casuística.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como término por defecto cuando aparezca el nombre divino, aunque este versículo no lo contiene.
  - Se conserva un registro legal-sacerdotal claro y contemporáneo, evitando el calco de «shut up» o «cuarentena» que no fue elegido en el inglés POB.
  - La combinación de «lesión» y «afección escamosa» respeta la distinción entre el área afectada general y la condición específica del hebreo.
