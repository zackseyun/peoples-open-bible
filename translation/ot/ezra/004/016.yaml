id: EZR.4.16
reference: Ezra 4:16
source:
  edition: WLC
  text: מְהוֹדְעִ֤ין אֲנַ֨חְנָה֙ לְ/מַלְכָּ֔/א דִּ֠י הֵ֣ן קִרְיְתָ֥/א דָךְ֙ תִּתְבְּנֵ֔א וְ/שׁוּרַיָּ֖/ה יִֽשְׁתַּכְלְל֑וּן לָ/קֳבֵ֣ל דְּנָ֔ה חֲלָק֙ בַּ/עֲבַ֣ר נַהֲרָ֔/א לָ֥א אִיתַ֖י לָֽ/ךְ׃פ
translation:
  text: We make known to the king that if this city is rebuilt and its walls are completed[b][a], then because of this you will have no possession in the province Beyond the River.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Aramaic 'portion/share' could also be rendered 'share' or, more specifically in context, 'revenue.'
    reason: lexical_alternative
  - marker: b
    text: Or 'Beyond the River,' the official Persian name for the trans-Euphrates province.
    reason: cultural_note
lexical_decisions:
- source_word: מְהוֹדְעִין
  chosen: We make known
  alternatives:
  - We inform
  - We notify
  lexicon: HALOT
  rationale: Aramaic participial form functioning verbally in epistolary style; 'make known' preserves the formal register of an official letter better than the more colloquial 'inform.'
- source_word: לְמַלְכָּא
  chosen: to the king
  alternatives:
  - the king
  lexicon: HALOT
  rationale: The preposition ל marks the indirect object; English idiom with 'make known' naturally takes 'to the king.'
- source_word: דִּי הֵן
  chosen: that if
  alternatives:
  - that, behold, if
  - that indeed if
  lexicon: HALOT
  rationale: Together these particles introduce the content of the report with a conditional sense. 'That if' is the most natural English representation of the Aramaic construction in context.
- source_word: קִרְיְתָא דָךְ
  chosen: this city
  alternatives:
  - that city
  lexicon: HALOT
  rationale: Deictic pronoun points to Jerusalem from the writers' perspective; 'this city' reflects the source wording, even though English might also allow 'that city.'
- source_word: תִּתְבְּנֵא
  chosen: is rebuilt
  alternatives:
  - is being rebuilt
  - should be rebuilt
  lexicon: HALOT
  rationale: Passive/imperfect in a real future condition. 'Is rebuilt' in English conditional style is concise and natural.
- source_word: וְשׁוּרַיָּה
  chosen: and its walls
  alternatives:
  - and the walls
  lexicon: HALOT
  rationale: Plural noun with suffixed article/state referring to the city's fortifications; 'its walls' makes the relationship explicit in English.
- source_word: יִשְׁתַּכְלְלוּן
  chosen: are completed
  alternatives:
  - are finished
  - are restored
  lexicon: HALOT
  rationale: Conveys being brought to completion. 'Completed' fits construction language and the warning's formal tone.
- source_word: לָקֳבֵל דְּנָה
  chosen: then because of this
  alternatives:
  - therefore
  - for this reason
  lexicon: HALOT
  rationale: Idiomatic Aramaic expression drawing an inference from the condition just stated. 'Then because of this' preserves both the logical consequence and the explicit demonstrative.
- source_word: חֲלָק
  chosen: possession
  alternatives:
  - share
  - portion
  - revenue
  lexicon: HALOT
  rationale: The noun can denote a share or portion. In this administrative-political context, the sense is that the king will retain no stake, claim, or holding in the region. 'Possession' best captures the broad political sense without over-specifying taxation.
- source_word: בַּעֲבַר נַהֲרָא
  chosen: in the province Beyond the River
  alternatives:
  - beyond the River
  - across the River
  lexicon: HALOT
  rationale: This is the standard Persian provincial designation for the territory west of the Euphrates. Adding 'province' clarifies that the phrase is an official regional title, not merely a geographic note.
- source_word: לָא אִיתַי לָךְ
  chosen: you will have no
  alternatives:
  - there will not be for you
  - you will no longer have
  lexicon: HALOT
  rationale: Existential construction with dative possession. 'You will have no' is idiomatic English and fits the warning addressed to the king.
