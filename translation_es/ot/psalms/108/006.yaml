translation:
  language: es
  text: Sé exaltado[a] por encima de los cielos, oh Dios, y tu gloria[b] sobre toda la tierra.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Levántate por encima de los cielos, oh Dios».'
    reason: lexical_alternative
  - marker: b
    text: La segunda cola es literalmente «y sobre toda la tierra tu gloria»; el verbo queda implícito por el paralelismo poético.
    reason: lexical_alternative
lexical_decisions:
- source_word: ר֣וּמָה
  english_pob_choice: Be exalted
  chosen_spanish: ¡Sé exaltado!
  alternatives_spanish:
  - ¡Levántate!
  - ¡Sé levantado!
  lexicon: HALOT
  rationale: El imperativo/jusivo de רום, dirigido a Dios en un contexto de alabanza, pide exaltación. En español, «sé exaltado» conserva la fuerza peticionaria y el registro doxológico mejor que una forma más espacial como «levántate».
- source_word: עַל שָׁמַ֣יִם
  english_pob_choice: above the heavens
  chosen_spanish: por encima de los cielos
  alternatives_spanish:
  - sobre los cielos
  - más alto que los cielos
  lexicon: HALOT
  rationale: La imagen es vertical y poética. «Por encima de» expresa mejor la trascendencia respecto de los cielos que un simple «sobre», y mantiene claridad natural en español.
- source_word: אֱלֹהִ֑ים
  english_pob_choice: O God
  chosen_spanish: oh Dios
  alternatives_spanish:
  - Dios
  - ¡oh, Dios!
  lexicon: HALOT
  rationale: Aquí el sustantivo funciona como vocativo. «Oh Dios» marca la dirección de la súplica sin añadir contenido ajeno al hebreo.
- source_word: כְּבוֹדֶךָ
  english_pob_choice: your glory
  chosen_spanish: tu gloria
  alternatives_spanish:
  - tu honor
  - tu esplendor
  lexicon: HALOT
  rationale: En contexto doxológico, כָּבוֹד designa la gloria divina. «Gloria» es la equivalencia más precisa y estable en español bíblico, sin perder la fuerza semántica del hebreo.
- source_word: וְעַל כָּל הָאָרֶץ
  english_pob_choice: and your glory over all the earth
  chosen_spanish: y tu gloria sobre toda la tierra
  alternatives_spanish:
  - y que tu gloria esté sobre toda la tierra
  - y tu gloria por toda la tierra
  lexicon: HALOT
  rationale: 'El hebreo tiene una segunda cola sin verbo explícito. Siguiendo la lectura del POB inglés, el español conserva la elipsis con una estructura paralela y natural: «y tu gloria sobre toda la tierra».'
theological_decisions:
- issue: Elipsis verbal en la segunda cola
  english_pob_reading: and your glory over all the earth
  chosen_spanish_reading: y tu gloria sobre toda la tierra
  alternative_spanish_readings:
  - y que tu gloria esté sobre toda la tierra
  - y tu gloria está sobre toda la tierra
  rationale: La segunda cola es nominal y depende del paralelismo poético. Mantener la elipsis en español evita sobreexplicitar un verbo no presente en el hebreo y preserva la simetría del versículo.
  doctrine_reference: Translation philosophy §3, §6
- issue: Dirección de la exaltación divina
  english_pob_reading: Be exalted above the heavens
  chosen_spanish_reading: Sé exaltado por encima de los cielos
  alternative_spanish_readings:
  - Levántate por encima de los cielos
  - Sé levantado por encima de los cielos
  rationale: No se trata de un ascenso físico, sino de ser reconocido en supremacía y honor. «Sé exaltado» mantiene la lectura de alabanza/petición del texto y evita rebajar el sentido a mera localización.
  doctrine_reference: HALOT; poesía cultual de los Salmos
translation_notes:
  revision_awareness: 'El inglés POB pasó de «and let your glory be over all the earth» a una redacción más directa sin «let», para reflejar con mayor fidelidad la cláusula verbalmente elíptica. El español sigue esa revisión: mantiene la elipsis en la segunda cola y evita introducir un verbo que el hebreo no expresa explícitamente.'
  spanish_consistency_notes:
  - Se conserva «Dios» como vocativo, en lugar de «Señor», porque el hebreo usa אֱלֹהִים y el texto no exige sustitución por el nombre divino.
  - Se elige «cielos» en plural para reflejar שָׁמַיִם y conservar el registro poético.
  - «Gloria» se mantiene como término teológico estándar para כָּבוֹד en doxología.
  - La puntuación y el orden de los cola preservan el paralelismo hebreo de dos líneas.
