translation:
  language: es
  text: Yahvé habló con ustedes cara a cara en la montaña[a], de en medio del fuego.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebreo «cara a cara», un modismo para hablar de modo directo y personal; compárese Deuteronomio 4:12, donde Israel oye la voz pero no ve forma alguna.
    reason: lexical_alternative
lexical_decisions:
- source_word: פָּנִים בְּפָנִים
  english_pob_choice: face to face
  chosen_spanish: cara a cara
  alternatives_spanish:
  - personalmente
  - directamente
  lexicon: HALOT
  rationale: El hebreo es un modismo que expresa encuentro o habla directa. «Cara a cara» conserva el valor idiomático y la fuerza retórica, sin convertirlo en una paráfrasis explicativa que borre la imagen.
- source_word: דִּבֶּר
  english_pob_choice: spoke
  chosen_spanish: habló
  alternatives_spanish:
  - les habló
  - declaró
  lexicon: HALOT
  rationale: El verbo significa «hablar». En español, «habló con ustedes» refleja con naturalidad la construcción con עִמָּכֶם y mantiene el sentido verbal básico sin endurecerlo como «declaró».
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  - el SEÑOR
  lexicon: HALOT
  rationale: Se conserva el nombre divino con la forma estándar del proyecto en español, «Yahvé», en lugar de sustituirlo por un título. Esto preserva el nombre personal revelado en el texto hebreo.
- source_word: עִמָּכֶם
  english_pob_choice: with you
  chosen_spanish: con ustedes
  alternatives_spanish:
  - a ustedes
  - junto con ustedes
  lexicon: HALOT
  rationale: La preposición עִם normalmente significa «con». En español, «habló con ustedes» refleja mejor la relación inmediata y recíproca del encuentro.
- source_word: בָּהָר
  english_pob_choice: on the mountain
  chosen_spanish: en la montaña
  alternatives_spanish:
  - sobre la montaña
  - en el monte
  lexicon: HALOT
  rationale: La preposición ב es locativa. «En la montaña» es la opción más natural y fiel en español; «monte» también sería posible, pero «montaña» sigue bien el registro del texto sin perder el referente del Sinaí.
- source_word: מִתּוֹךְ הָאֵשׁ
  english_pob_choice: from the midst of the fire
  chosen_spanish: desde en medio del fuego
  alternatives_spanish:
  - desde el fuego
  - desde el interior del fuego
  lexicon: HALOT
  rationale: מִתּוֹךְ expresa procedencia «desde en medio de» o «desde el interior de». Se mantiene la imagen solemne de la teofanía con «desde en medio del fuego», que conserva más del relieve semántico que un simple «desde el fuego».
theological_decisions:
- issue: Expresión antropomórfica «cara a cara» junto con la teofanía del Sinaí
  english_pob_reading: Retain the idiomatic expression 'face to face' as a description of direct covenantal address, not necessarily of literal visual perception.
  chosen_spanish_reading: Conservar «cara a cara» como modismo de habla directa y encuentro relacional, no como afirmación de visión corporal literal.
  alternative_spanish_readings:
  - directamente
  - personalmente
  rationale: El contexto inmediato y más amplio (cf. Dt 4:12, 15) indica que Israel oyó la voz desde el fuego sin ver forma alguna. Por eso no conviene resolver la tensión con una paráfrasis explicativa, pero tampoco eliminar el modismo. La traducción preserva esa tensión.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: 'El pasaje coincide con el estado más reciente del audit trail: sin revisiones aplicadas y con acuerdo alto entre revisores; por eso no se introducen ajustes adicionales.'
  spanish_consistency_notes:
  - Se usa «Yahvé» conforme al estándar del proyecto para יהוה.
  - Se conserva «cara a cara» para respetar el modismo hebreo y la tensión teológica documentada.
  - «Desde en medio del fuego» mantiene el valor de מִתּוֹךְ sin volverlo una fórmula más plana.
