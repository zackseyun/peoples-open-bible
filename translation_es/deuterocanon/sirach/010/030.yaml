    issue: «un pobre[a]» es algo brusco y menos preciso que el singular masculino representativo del hebreo
    rationale: El expediente inglés justificó explícitamente «poor man» para reflejar el singular masculino representativo. En español, «pobre» como sustantivo es posible, pero «hombre pobre» preserva mejor esa decisión sin sonar forzado.
  - severity: low
    issue: La nota textual está anclada en «pobre», aunque comenta la divergencia de todo el versículo
    rationale: No es incorrecto, pero conviene reanclarla al primer sintagma o cláusula de manera que el lector perciba que la nota afecta la línea completa, no solo una palabra aislada.
