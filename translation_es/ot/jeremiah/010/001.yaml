translation:
  language: es
  text: Escuchen la palabra que Yahvé ha hablado acerca de ustedes, oh casa de Israel.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: שִׁמְעוּ
  english_pob_choice: Hear
  chosen_spanish: Oíd
  alternatives_spanish:
  - Escuchad
  - Oigan
  lexicon: HALOT
  rationale: El hebreo es un imperativo plural dirigido al pueblo. «Oíd» conserva el tono profético y la fuerza de exhortación solemne. «Escuchad» es posible, pero «oíd» suena más cercano al registro bíblico sin dejar de ser claro en español.
- source_word: הַדָּבָר
  english_pob_choice: the word
  chosen_spanish: la palabra
  alternatives_spanish:
  - el mensaje
  - esta palabra
  lexicon: HALOT
  rationale: דָּבָר puede significar «palabra» o «mensaje». «La palabra» mantiene el giro profético tradicional y refleja bien el sustantivo definido del hebreo.
- source_word: אֲשֶׁר דִּבֶּר
  english_pob_choice: that ... has spoken
  chosen_spanish: que ha hablado
  alternatives_spanish:
  - que habló
  - que habló y dijo
  lexicon: HALOT
  rationale: El relativo con verbo perfecto se expresa naturalmente en español como «que ha hablado», lo cual conserva la actualidad de la palabra divina anunciada. «Que habló» también es posible, pero el presente perfecto suena más inmediato en este contexto.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  lexicon: HALOT
  rationale: Siguiendo la terminología del proyecto para el Tetragrámaton, se usa «Yahvé» como forma española estable y legible. Preserva el nombre propio divino en vez de sustituirlo por un título.
- source_word: עֲלֵיכֶם
  english_pob_choice: concerning you
  chosen_spanish: acerca de vosotros
  alternatives_spanish:
  - contra vosotros
  - sobre vosotros
  lexicon: HALOT
  rationale: La preposición על con דבר puede ser «acerca de», «contra» o «sobre». Aquí el contexto es un anuncio introductorio, no todavía una acusación; por eso «acerca de vosotros» refleja mejor el valor direccional/contenutivo sin adelantar la carga adversativa.
- source_word: בֵּית יִשְׂרָאֵל
  english_pob_choice: O house of Israel
  chosen_spanish: oh casa de Israel
  alternatives_spanish:
  - casa de Israel
  - pueblo de Israel
  lexicon: HALOT
  rationale: Se mantiene la fórmula vocativa profética «casa de Israel», y «oh» conserva el llamado directo del hebreo. «Pueblo de Israel» sería más explicativo, pero perdería el giro idiomático recibido.
theological_decisions:
- issue: Traducción del nombre divino YHWH
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - el SEÑOR
  rationale: El texto hebreo usa explícitamente el Tetragrámaton. En español, «Yahvé» comunica el nombre propio divino de forma reverente y transparente, conforme a la política del POB de no ocultarlo bajo una sustitución tradicional.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
translation_notes:
  revision_awareness: El texto inglés auditado fue revisado y quedó sin cambios; la versión española sigue ese mismo sentido sin introducir variantes textuales ni cambios de interpretación.
  spanish_consistency_notes:
  - Se mantiene el registro profético directo y solemne.
  - No se usa «SEÑOR» para YHWH, en coherencia con el criterio del proyecto.
  - «Casa de Israel» se conserva como vocativo bíblico fijo.
  - La preposición «acerca de» evita adelantar el matiz de juicio que no está explícito aún en este verso.
