translation:
  language: es
  text: Y no volveré a hacerte oír la vergüenza de las naciones, ni volverás a llevar el oprobio de los pueblos, ni volverás a hacer tropezar[a] a tu nación, declara el Señor Yahvé.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «hacer caer a tu nación» o, siguiendo otra tradición interpretativa, «dejar sin hijos a tu nación». El texto consonántico hebreo aquí es difícil; la vocalización masorética apoya «hacer tropezar a tu nación».
    reason: alternative_reading
lexical_decisions:
- source_word: אַשְׁמִיעַ
  english_pob_choice: let you hear
  chosen_spanish: hacerte oír
  alternatives_spanish:
  - dejarte oír
  - causarte oír
  lexicon: HALOT
  rationale: El hiphil de שמע expresa causación. En español, «hacerte oír» comunica naturalmente la idea de causar la percepción auditiva sin sonar forzado.
- source_word: כְּלִמַּת
  english_pob_choice: disgrace
  chosen_spanish: vergüenza
  alternatives_spanish:
  - deshonra
  - desgracia
  lexicon: HALOT
  rationale: El sustantivo apunta a una vergüenza pública o humillación. «Vergüenza» mantiene ese valor de oprobio social y es claro para el lector español; se conserva la nota de alternativa porque el inglés POB eligió «disgrace».
- source_word: הַגּוֹיִם
  english_pob_choice: the nations
  chosen_spanish: las naciones
  alternatives_spanish:
  - los gentiles
  lexicon: HALOT
  rationale: En Ezequiel, el término se refiere a los pueblos circundantes. «Las naciones» conserva mejor el contraste con עַמִּים y evita el matiz posterior de «gentiles».
- source_word: חֶרְפַּת
  english_pob_choice: reproach
  chosen_spanish: oprobio
  alternatives_spanish:
  - afrenta
  - reproche
  lexicon: HALOT
  rationale: «Oprobio» conserva el tono profético y la carga de burla o deshonra pública. Además distingue bien este término de כְּלִמָּה.
- source_word: עַמִּים
  english_pob_choice: the peoples
  chosen_spanish: los pueblos
  alternatives_spanish:
  - las naciones
  lexicon: HALOT
  rationale: Se mantiene la distinción léxica respecto de גּוֹיִם con «pueblos», que en español suena natural y preserva la referencia amplia a grupos extranjeros.
- source_word: תִשְׂאִי
  english_pob_choice: bear
  chosen_spanish: llevar
  alternatives_spanish:
  - soportar
  - cargar con
  lexicon: HALOT
  rationale: El idiomatismo hebreo de «llevar» una carga de reproche se expresa bien con «llevar»; aquí suena más natural que «soportar» y conserva la imagen de carga.
- source_word: וְגוֹיִךְ
  english_pob_choice: your nation
  chosen_spanish: tu nación
  alternatives_spanish:
  - tu pueblo
  - tu gente
  lexicon: HALOT
  rationale: La forma singular con sufijo femenino se refleja mejor con «tu nación», evitando pluralizar y respetando el valor del sustantivo גוי en este contexto.
- source_word: תַכְשִׁלִי
  english_pob_choice: cause your nation to stumble
  chosen_spanish: hacer tropezar a tu nación
  alternatives_spanish:
  - hacer caer a tu nación
  - ser causa de ruina para tu nación
  lexicon: HALOT
  rationale: El hiphil de כשל se rinde con la imagen de «tropezar» o «hacer caer». «Hacer tropezar» sigue de cerca la metáfora y suena idiomático en español.
- source_word: נְאֻם אֲדֹנָי יְהוִה
  english_pob_choice: declares the Lord GOD
  chosen_spanish: dice Yahvé, el Señor
  alternatives_spanish:
  - declara el Señor Yahvé
  - oráculo del Señor Yahvé
  lexicon: HALOT
  rationale: Se conserva el nombre divino como «Yahvé» según el criterio del proyecto, y se traduce la fórmula profética נְאֻם con «dice», una equivalencia natural y sobria en español bíblico.
theological_decisions:
- issue: Tratamiento del nombre divino יְהוָה en la fórmula final
  english_pob_reading: the Lord GOD
  chosen_spanish_reading: Yahvé, el Señor
  alternative_spanish_readings:
  - el Señor Yahvé
  - el Señor Dios
  rationale: El proyecto pide renderizar יְהוָה como «Yahvé». Como אֲדֹנָי precede al Tetragrámaton, se preserva también el título con «el Señor», evitando perder la doble referencia del hebreo.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Lectura de תַכְשִׁלִי en el cierre del versículo
  english_pob_reading: cause your nation to stumble
  chosen_spanish_reading: hacer tropezar a tu nación
  alternative_spanish_readings:
  - hacer caer a tu nación
  - ser causa de ruina para tu nación
  rationale: La vocalización masorética favorece la idea de causar tropiezo. Se evita la tradición interpretativa de 'despojar de hijos' o 'hacer caer' como lectura principal, pero se reconocen como alternativas interpretativas posibles.
  doctrine_reference: MT vocalization / textual tradition noted in English audit trail
- issue: Diferencia semántica entre כְּלִמָּה y חֶרְפָּה
  english_pob_reading: disgrace ... reproach
  chosen_spanish_reading: vergüenza ... oprobio
  alternative_spanish_readings:
  - deshonra ... afrenta
  - vergüenza ... reproche
  rationale: Se conserva la distinción entre una vergüenza pública general y el reproche/escarnio concreto. El español permite reflejar ambos matices sin colapsarlos en un solo término.
  doctrine_reference: Lexical distinction in Hebrew parallelism
translation_notes:
  revision_awareness: Se revisó el pasaje con alta concordancia frente al audit trail inglés; no se detectaron cambios sustantivos recientes en la revisión más alta, por lo que la redacción española sigue de cerca la lectura masorética y conserva la distinción léxica del paralelo hebreo.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» para el nombre divino, conforme al criterio del proyecto.
  - Se conserva la diferencia entre «las naciones» y «los pueblos» para reflejar גּוֹיִם / עַמִּים.
  - Se evita «Mesías/Cristo» porque no aparece en el versículo.
  - La fórmula profética se traduce con un verbo sobrio («dice») para no sobrecargar el cierre.
  - El marcador [a] está anclado en «vergüenza» para señalar una alternativa lexical válida sin alterar el flujo del texto.
