id: 1TH.2.5
reference: 1 Thessalonians 2:5
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: οὔτε γάρ ποτε ἐν λόγῳ κολακείας ἐγενήθημεν, καθὼς οἴδατε, οὔτε ⸀ἐν προφάσει πλεονεξίας, θεὸς μάρτυς,
base_translation:
  language: en
  yaml_path: translation/nt/1_thessalonians/002/005.yaml
  text: For we never came with flattering speech[a], as you know[b], nor with a pretext for greed—God is witness.
  footnotes:
  - marker: a
    text: Or 'with flattery'; literally 'in a word of flattery.'
    reason: lexical_alternative
  - marker: b
    text: Or 'with a cloak for greed' or 'with a pretense of covetousness.'
    reason: lexical_alternative
translation:
  language: ko
  text: 여러분이 아시는 대로, 우리는 결코 아첨하는 말[a]로 나아간 적이 없고, 탐욕을 감추는 구실[b]을 댄 적도 없습니다. 하나님이 증인이십니다.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 또는 「아첨으로」. 직역하면 「아첨의 말로」.
    reason: lexical_alternative
  - marker: b
    text: 또는 「탐욕을 가리는 외투」, 「탐심의 핑계」.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐν λόγῳ κολακείας
  english_pob_choice: with flattering speech
  chosen_korean: 아첨하는 말
  alternatives_korean:
  - 아첨의 말
  - 비위 맞추는 말
  lexicon: BDAG
  rationale: κολακεία는 사익 추구를 위한 비위 맞추기. 「아첨하는 말」이 가장 직접적이다.
- source_word: ἐγενήθημεν
  english_pob_choice: came
  chosen_korean: 나아간 적이 없고
  alternatives_korean:
  - 임한 적이 없고
  - 다가간 적이 없고
  lexicon: BDAG
  rationale: γίνομαι의 「~이 되다·나타나다」. 한국어로는 사역 정황상 「나아가다」가 자연스럽다.
- source_word: ἐν προφάσει πλεονεξίας
  english_pob_choice: with a pretext for greed
  chosen_korean: 탐욕을 감추는 구실
  alternatives_korean:
  - 탐심의 핑계
  - 탐욕의 외투
  lexicon: BDAG
  rationale: πρόφασις는 「겉으로 내세우는 명분·구실」. πλεονεξία는 탐심·탐욕. 「탐욕을 감추는 구실」이 두 의미를 함께 담는다.
- source_word: θεὸς μάρτυς
  english_pob_choice: God is witness
  chosen_korean: 하나님이 증인이십니다
  alternatives_korean:
  - 하나님께서 증인이 되어 주십니다
  lexicon: BDAG
  rationale: 한국어 합쇼체에서 하나님을 주어로 한 종결은 경어 「~이십니다」가 자연스럽다.
