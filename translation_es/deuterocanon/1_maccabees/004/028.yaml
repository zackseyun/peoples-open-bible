translation:
  language: es
  text: Y en el año siguiente reunió sesenta mil hombres escogidos y cinco mil de caballería[a][b], para hacerles guerra.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «en el año venidero». La expresión griega dice literalmente «en el año que viene», y señala simplemente el año siguiente en la secuencia narrativa.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «cinco mil de caballería» o «cinco mil jinetes». El griego usa «caballo» con valor colectivo militar.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐν τῷ ἐρχομένῳ ἐνιαυτῷ
  english_pob_choice: in the following year
  chosen_spanish: en el año siguiente
  alternatives_spanish:
  - en el año venidero
  - en el año que venía
  lexicon: LSJ
  rationale: La expresión griega alude al año posterior dentro de la secuencia narrativa. «En el año siguiente» comunica con naturalidad ese valor temporal sin añadir matices innecesarios.
- source_word: συνελόχησεν
  english_pob_choice: assembled
  chosen_spanish: reunió
  alternatives_spanish:
  - juntó
  - musteró
  - agrupó
  lexicon: LSJ
  rationale: El verbo describe la convocatoria o concentración de tropas. «Reunió» es claro en español y preserva el sentido militar sin forzar un tecnicismo.
- source_word: ἀνδρῶν ἐπιλέκτων
  english_pob_choice: chosen men
  chosen_spanish: hombres escogidos
  alternatives_spanish:
  - hombres elegidos
  - hombres selectos
  - hombres de élite
  lexicon: LSJ
  rationale: ἐπίλεκτος significa seleccionado o escogido. «Hombres escogidos» mantiene la idea de tropas especialmente seleccionadas, con un registro natural en español.
- source_word: ἑξήκοντα χιλιάδας
  english_pob_choice: sixty thousand
  chosen_spanish: sesenta mil
  alternatives_spanish:
  - sesenta millares
  lexicon: LSJ
  rationale: Es un numeral directo; en español se expresa sin dificultad como «sesenta mil».
- source_word: πεντακισχιλίαν ἵππον
  english_pob_choice: five thousand cavalry
  chosen_spanish: cinco mil de caballería
  alternatives_spanish:
  - cinco mil jinetes
  - cinco mil de caballo
  - cinco mil caballeros
  lexicon: LSJ
  rationale: ἵππος puede funcionar colectivamente por tropas montadas. «Caballería» conserva el valor militar y evita una traducción más literal pero menos natural como «caballo».
- source_word: ὥστε ἐκπολεμῆσαι αὐτούς
  english_pob_choice: so as to make war against them
  chosen_spanish: para hacerles guerra
  alternatives_spanish:
  - para guerrear contra ellos
  - para hacer guerra contra ellos
  - para librar guerra contra ellos
  lexicon: LSJ
  rationale: La construcción expresa propósito, y ἐκπολεμέω implica emprender guerra contra alguien. «Para hacerles guerra» reproduce bien ese sentido bélico en un español bíblico claro.
translation_notes:
  revision_awareness: Se mantuvo la lectura y el sentido del texto griego tal como refleja el audit trail en inglés, sin cambios textuales ni revisión sustantiva respecto de la versión de referencia.
  spanish_consistency_notes:
  - Se conservó un registro sobrio y bíblico en español moderno.
  - «Yahvé» no aplica en este versículo.
  - «Mesías», «Jesús» y otros términos teológicos no aparecen en este pasaje.
  - La cantidad y la imagen militar se mantuvieron de forma literal y natural.
  - Se prefirió «caballería» como equivalente idiomático del colectivo griego ἵππος, con nota alternativa para conservar la tensión léxica.
