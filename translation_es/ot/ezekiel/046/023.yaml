translation_notes:
  revision_awareness: La redacción inglesa revisada sustituyó «cooking places» por «hearths» para precisar mejor la instalación de cocción. En español se optó por «fogones», que conserva esa precisión sin sonar demasiado técnico o arcaizante.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» en línea con la terminología del proyecto, aunque este versículo no lo contiene.
  - Se conserva la repetición espacial del hebreo mediante «alrededor ... todo alrededor».
  - Se evita «SEÑOR» o una paráfrasis que oculte la forma del texto fuente.
  - La elección de «fogones» intenta equilibrar precisión funcional y legibilidad litúrgica en español.
