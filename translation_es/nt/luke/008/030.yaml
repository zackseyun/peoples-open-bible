translation:
  language: es
  text: 'Entonces Jesús le preguntó: «¿Cómo te llamas?». Y él respondió[a]: «Legión», porque muchos demonios habían entrado en él.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Legión» es un préstamo latino que alude a una gran unidad militar romana; aquí indica que había muchos demonios en el hombre.
    reason: cultural_note
lexical_decisions:
- source_word: ἐπηρώτησεν
  english_pob_choice: asked
  chosen_spanish: preguntó
  alternatives_spanish:
  - le preguntó
  - interrogó
  lexicon: BDAG
  rationale: En este contexto narrativo, ἐπερωτάω introduce una pregunta directa. «Preguntó» es natural en español y conserva el valor simple del verbo sin dar un matiz excesivamente formal o técnico.
- source_word: δὲ
  english_pob_choice: Then
  chosen_spanish: Entonces
  alternatives_spanish:
  - Y
  - Luego
  lexicon: BDAG
  rationale: δὲ marca avance narrativo. «Entonces» refleja bien esa progresión en español y evita sobrecargar el texto.
- source_word: Τί σοι ὄνομά ἐστιν
  english_pob_choice: What is your name?
  chosen_spanish: ¿Cómo te llamas?
  alternatives_spanish:
  - ¿Cuál es tu nombre?
  - ¿Qué nombre tienes?
  lexicon: BDAG
  rationale: La expresión griega es idiomática. En español, «¿Cómo te llamas?» comunica el sentido de forma natural y fiel, sin traducir mecánicamente la estructura.
- source_word: Λεγιών
  english_pob_choice: Legion
  chosen_spanish: Legión
  alternatives_spanish:
  - Legion
  lexicon: BDAG
  rationale: El término es un préstamo latino con valor propio y además alude a una unidad militar romana grande. En español, «Legión» conserva el trasfondo semántico y la forma transliterada tradicionalmente reconocible.
- source_word: ὅτι
  english_pob_choice: because
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  lexicon: BDAG
  rationale: Aquí introduce la razón del nombre. «Porque» expresa de manera clara la relación causal en español contemporáneo.
- source_word: εἰσῆλθεν
  english_pob_choice: had entered
  chosen_spanish: habían entrado
  alternatives_spanish:
  - entraron
  - había entrado
  lexicon: BDAG
  rationale: El griego usa aoristo dentro de una explicación causal. En español, el pluscuamperfecto plural («habían entrado») deja clara la anterioridad respecto a la declaración «Legión».
- source_word: δαιμόνια πολλὰ
  english_pob_choice: many demons
  chosen_spanish: muchos demonios
  alternatives_spanish:
  - muchos espíritus malignos
  - muchos demonios impuros
  lexicon: BDAG
  rationale: δαιμόνια se traduce directamente como «demonios» para no suavizar la afirmación sobrenatural. «Muchos» preserva el énfasis plural del griego.
- source_word: εἰς αὐτόν
  english_pob_choice: into him
  chosen_spanish: en él
  alternatives_spanish:
  - dentro de él
  - al interior de él
  lexicon: BDAG
  rationale: Aunque εἰς puede señalar movimiento hacia adentro, en español «entrar en él» es la formulación más natural y expresa claramente la posesión/penetración espiritual sin forzar una construcción menos idiomática.
theological_decisions:
- issue: Naturaleza de δαιμόνια en un contexto de posesión
  english_pob_reading: demons
  chosen_spanish_reading: demonios
  alternative_spanish_readings:
  - espíritus malignos
  - espíritus demoníacos
  rationale: Se mantiene la referencia a seres personales malévolos, sin diluirla en una expresión más vaga. «Demonios» corresponde de manera directa al término griego y al sentido narrativo.
  doctrine_reference: 'Affirmations; Translation philosophy #1 and #6'
- issue: Relación temporal entre la entrada de los demonios y la respuesta «Legión»
  english_pob_reading: had entered
  chosen_spanish_reading: habían entrado
  alternative_spanish_readings:
  - entraron
  - habían entrado ya
  rationale: El pluscuamperfecto en español ayuda a mostrar que la entrada de los demonios precede a la explicación del nombre. Es una clarificación temporal de traducción, no una adición interpretativa.
  doctrine_reference: 'Translation philosophy: optimal equivalence'
translation_notes:
  revision_awareness: El texto sigue de cerca el griego de SBLGNT y el audito en inglés, sin cambios de sentido respecto a la última revisión indicada; se conserva la progresión narrativa, la pregunta idiomática y la explicación causal con anterioridad temporal clara.
  spanish_consistency_notes:
  - Se usa «Jesús» para Ἰησοῦς, conforme al estándar del proyecto.
  - Se usa «demonios» para δαιμόνια, manteniendo la fuerza lexical sin suavización.
  - Se conserva «Legión» como préstamo transliterado y se aclara su trasfondo en nota.
  - La secuencia «Entonces…» + pregunta directa + causal con «porque» reproduce adecuadamente la relación narrativa del griego.
  - No se introduce mayúscula especial en «espíritu» porque aquí no aparece πνεῦμα ni una referencia al Espíritu Santo.
