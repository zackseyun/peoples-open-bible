revisions:
- from: Quien menosprecia a su prójimo peca, pero dichoso[a] es quien muestra gracia a los pobres.
  to: Quien menosprecia a su prójimo peca, pero dichoso[a] es quien favorece a los pobres.
  rationale: Se mantiene la fidelidad general del borrador, pero se corrige una expresión poco idiomática. 'Favorece a los pobres' es español más natural y sigue reflejando razonablemente חנן como mostrar favor, aunque con algo menos de transparencia léxica que 'gracia'. La nota sobre 'dichoso' se simplifica para conservar la razón teológica principal sin sobrecargar el texto.
