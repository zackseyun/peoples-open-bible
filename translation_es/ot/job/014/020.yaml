translation:
  language: es
  text: Tú lo dominas para siempre, y él se va; cambias su rostro[a] y lo envías lejos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «su apariencia». El hebreo «rostro» puede referirse más ampliamente a la apariencia exterior o al semblante.
    reason: lexical_alternative
lexical_decisions:
- source_word: תִּתְקְפֵהוּ
  english_pob_choice: you overpower him
  chosen_spanish: Tú lo dominas
  alternatives_spanish:
  - Tú lo sobrepujas
  - Tú prevaleces contra él
  - Tú lo sometes
  lexicon: HALOT
  rationale: El verbo expresa imponerse con fuerza sobre alguien. «Dominas» comunica bien la idea de superioridad activa de Dios y suena natural en español; «sobrepujas» sería más literal pero menos claro para lectores generales.
- source_word: לָנֶצַח
  english_pob_choice: forever
  chosen_spanish: para siempre
  alternatives_spanish:
  - por siempre
  - perpetuamente
  - continuamente
  lexicon: HALOT
  rationale: נֶצַח denota duración indefinida o perpetua. «Para siempre» mantiene esa fuerza de permanencia de modo idiomático en español.
- source_word: וַיַּהֲלֹךְ
  english_pob_choice: and he passes on
  chosen_spanish: y él pasa
  alternatives_spanish:
  - y él se va
  - y él parte
  - y desaparece
  lexicon: HALOT
  rationale: El hebreo dice literalmente «va/camina», y el POB inglés opta por «passes on» para no fijar explícitamente la muerte. «Pasa» conserva esa ambigüedad y permite leer el movimiento como salida de la escena humana.
- source_word: מְשַׁנֶּה
  english_pob_choice: you alter
  chosen_spanish: cambias
  alternatives_spanish:
  - alteras
  - modificas
  - deformas
  lexicon: HALOT
  rationale: El participio funciona aquí predicativamente en una descripción dirigida a Dios. «Cambias» es claro y fiel; «alteras» sería más cercano al matiz del inglés auditado, pero menos natural en este giro poético con «rostro».
- source_word: פָנָיו
  english_pob_choice: his face
  chosen_spanish: su rostro
  alternatives_spanish:
  - su cara
  - su apariencia
  - su semblante
  lexicon: HALOT
  rationale: פנים es literalmente «rostro/cara», con posible extensión a apariencia externa. «Rostro» mantiene la imagen concreta y es más digno que «cara»; además, abre naturalmente la lectura física o de apariencia sin forzarla.
- source_word: וַתְּשַׁלְּחֵהוּ
  english_pob_choice: and send him away
  chosen_spanish: y lo despides
  alternatives_spanish:
  - y lo envías lejos
  - y lo mandas fuera
  - y lo expulsas
  lexicon: HALOT
  rationale: שלח en piel puede significar enviar, despedir o dejar ir. «Despedir» recoge el acto de apartarlo o dejarlo ir sin introducir la dureza de «expulsar»; en español, además, encaja con la secuencia paralela del verso.
theological_decisions:
- issue: 'El alcance de וַיַּהֲלֹךְ: ¿muerte explícita o simple partida?'
  english_pob_reading: and he passes on; the Hebrew verb is literally 'goes,' but here likely refers to passing from life or from the human scene.
  chosen_spanish_reading: y él pasa
  alternative_spanish_readings:
  - y él muere
  - y él se va de esta vida
  - y él desaparece
  rationale: Se evita fijar el sentido como muerte explícita, porque el audit trail del POB inglés actualizó la traducción para reflejar más directamente el verbo «go»/«depart» y no sobreinterpretarlo. «Pasa» conserva la ambigüedad poética y la referencia al abandono de la escena humana.
  doctrine_reference: No aplica; decisión de alcance semántico/poético, no doctrinal.
- issue: 'פָנָיו: rostro concreto o apariencia general'
  english_pob_reading: his face; Or 'his appearance.' The Hebrew 'face' can refer more broadly to outward appearance or countenance.
  chosen_spanish_reading: su rostro
  alternative_spanish_readings:
  - su apariencia
  - su semblante
  - su faz
  rationale: «Rostro» preserva la concreción del hebreo y, como en el inglés auditado, deja abierta la extensión semántica a apariencia externa. Se evita neutralizar de entrada la imagen corporal.
  doctrine_reference: No aplica; decisión lexical con posible implicación antropológica mínima.
translation_notes:
  revision_awareness: He seguido la revisión inglesa más reciente, que prefirió «passes on» sobre «passes away» para no sobreinterpretar el verbo hebreo como muerte explícita. Por eso el español usa «pasa» y no una formulación más cerrada como «muere» o «fallece».
  spanish_consistency_notes:
  - Se mantiene «Dios» implícito por el discurso directo a segunda persona, coherente con el hebreo y con el POB inglés.
  - 'Se preserva el paralelismo verbal con tres acciones divinas: dominar, cambiar, despedir.'
  - «Rostro» se usa de forma consistente con el valor concreto de פנים, dejando abierta la extensión a apariencia mediante la nota.
  - El registro es sobrio y bíblico sin recurrir a fórmulas eclesiásticas que oculten la imagen poética del texto.
