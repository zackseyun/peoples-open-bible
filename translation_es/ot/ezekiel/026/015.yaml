base_translation:
  language: en
  yaml_path: translation/ot/ezekiel/026/015.yaml
  text: 'Thus says the Lord GOD to Tyre: Will not the coastlands quake at the sound of your fall[a], when the wounded groan[b], when the slaughter is carried out in your midst?'
  footnotes:
  - marker: a
    text: Or 'the islands.' The Hebrew term can denote islands or, more broadly, coastlands/maritime regions.
    reason: lexical_alternative
  - marker: b
    text: '''The wounded'' could also be rendered ''the slain''; the Hebrew word can refer to one pierced or fatally wounded. Here ''the wounded'' fits the accompanying groaning.'
    reason: lexical_alternative
