translation:
  language: es
  text: Y les arrancaban los dedos, los brazos, las piernas y los codos[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «les quitaban por la fuerza» / «les despojaban»; el verbo griego expresa una remoción violenta en la escena de tortura.
    reason: lexical_alternative
lexical_decisions:
- source_word: περίειλκον
  english_pob_choice: they tore away
  chosen_spanish: les arrancaban
  alternatives_spanish:
  - les quitaban por la fuerza
  - les arrancaban violentamente
  - les despojaban
  lexicon: LSJ
  rationale: El imperfecto plural describe una acción violenta y repetida en un contexto de tortura. «Arrancaban» comunica con naturalidad en español la remoción forzada y el carácter brutal sin exagerar más allá del griego.
- source_word: δακτύλους
  english_pob_choice: fingers
  chosen_spanish: dedos
  alternatives_spanish:
  - falanges
  lexicon: LSJ
  rationale: El sentido anatómico normal es «dedos». Es la equivalencia más clara y directa en español para este contexto.
- source_word: βραχίονας
  english_pob_choice: arms
  chosen_spanish: brazos
  alternatives_spanish:
  - antebrazos
  lexicon: LSJ
  rationale: «Brazos» reproduce el sentido ordinario del término y evita una especificación anatómica innecesaria que el griego no exige de forma inequívoca.
- source_word: σκέλη
  english_pob_choice: legs
  chosen_spanish: piernas
  alternatives_spanish:
  - extremidades inferiores
  - pantorrillas
  lexicon: LSJ
  rationale: El término se refiere a las piernas; «piernas» es la forma más natural y fiel en español moderno.
- source_word: ἀγκῶνας
  english_pob_choice: elbows
  chosen_spanish: codos
  alternatives_spanish:
  - articulaciones del brazo
  - antebrazos
  lexicon: LSJ
  rationale: «Codos» es la traducción más directa y clara. Aunque la acumulación de partes del cuerpo es retóricamente horrorosa más que anatómicamente técnica, el español conserva ese efecto.
translation_notes:
  revision_awareness: El texto griego y el audit trail inglés coinciden estrechamente; no hay revisiones sustantivas aplicadas. La decisión principal en español es conservar la violencia del verbo περίειλκον con un verbo natural y directo («arrancaban»), manteniendo la enumeración anatómica sin suavizarla.
  spanish_consistency_notes:
  - Se mantiene un registro sobrio y publicable, adecuado para narrativa de martirio.
  - Se evita una transliteración o calco innecesario; la enumeración corporal se conserva en un español idiomático.
  - La nota de pie preserva la alternativa lexical documentada en inglés y el matiz de remoción forzada.
