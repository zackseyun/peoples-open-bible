translation:
  language: es
  text: Él hablará por ti al pueblo, y él te servirá de boca[a]; y tú le serás como Dios para él[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «él será tu boca». El hebreo usa literalmente «boca» como metáfora de un portavoz.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «tú le serás Dios» o «tú le serás como Dios». El sentido es que Moisés actuará hacia Aarón con autoridad representativa dada por Dios.'
    reason: alternative_reading
lexical_decisions:
- source_word: וְדִבֶּר
  english_pob_choice: will speak
  chosen_spanish: hablará
  alternatives_spanish:
  - dirá
  - hablará en tu lugar
  lexicon: HALOT
  rationale: El verbo דִּבֶּר en piel normalmente expresa el acto de hablar; en este contexto futuro, «hablará» comunica con naturalidad la función de Aarón sin añadir más de lo que dice el hebreo.
- source_word: לְךָ
  english_pob_choice: for you
  chosen_spanish: por ti
  alternatives_spanish:
  - para ti
  - en tu nombre
  - a favor de ti
  lexicon: HALOT
  rationale: La preposición ל aquí es benefactiva y representativa. «Por ti» refleja bien la idea de que Aarón hablará como portavoz de Moisés.
- source_word: אֶל הָעָם
  english_pob_choice: to the people
  chosen_spanish: al pueblo
  alternatives_spanish:
  - al pueblo de Israel
  - a la gente
  lexicon: HALOT
  rationale: En el contexto inmediato se trata del pueblo de Israel. «Al pueblo» es natural en español y conserva la referencia colectiva.
- source_word: לְפֶה
  english_pob_choice: as a mouth
  chosen_spanish: de boca
  alternatives_spanish:
  - como boca
  - como portavoz
  lexicon: HALOT
  rationale: El hebreo conserva la metáfora de la «boca»; «de boca» en español suena algo más natural que una calca rígida y mantiene la imagen de portavoz. La nota explica la posibilidad literal.
- source_word: לֵאלֹהִים
  english_pob_choice: as God
  chosen_spanish: como Dios
  alternatives_spanish:
  - como un dios
  - como Dios para él
  lexicon: HALOT
  rationale: La relación es funcional y representativa, no ontológica. «Como Dios» conserva la fuerza del hebreo y evita sugerir que Moisés sea literalmente divino.
theological_decisions:
- issue: Si לֵאלֹהִים puede sonar a que Moisés es literalmente Dios
  english_pob_reading: as God to him
  chosen_spanish_reading: como Dios
  alternative_spanish_readings:
  - como Dios para él
  - como un dios
  rationale: El contexto de Éxodo 4:15–17 muestra que Moisés recibe la palabra de Dios y la comunica mediante Aarón. La formulación española debe preservar la metáfora fuerte de autoridad delegada sin convertirla en una afirmación ontológica.
  doctrine_reference: Translation philosophy §3; ortodoxia cristiana histórica
- issue: Cómo expresar el papel de Aarón sin perder la metáfora de «boca»
  english_pob_reading: he will be as a mouth for you
  chosen_spanish_reading: te servirá de boca
  alternative_spanish_readings:
  - será tu boca
  - será como una boca para ti
  rationale: La frase española mantiene la imagen de portavoz y comunica con claridad la función intermediaria de Aarón. La nota conserva la lectura más literal como alternativa.
  doctrine_reference: Translation philosophy §2; principio de transparencia textual
translation_notes:
  revision_awareness: El borrador sigue de cerca el texto hebreo y el audit trail inglés, preservando las dos metáforas principales («boca» y «Dios») y evitando una interpretación ontológica de Moisés. Se ajustó el español para que sea publicable y natural, sin perder la tensión lexical del original.
  spanish_consistency_notes:
  - Se usa «Dios» para אֱלֹהִים conforme al estándar del proyecto.
  - Se conserva el contraste entre el portavoz humano y la autoridad divina delegada.
  - La metáfora de «boca» se mantiene en el cuerpo y se explicita en nota para transparencia.
  - No se introduce terminología eclesiástica tradicional que oscurezca el paralelismo hebreo.
