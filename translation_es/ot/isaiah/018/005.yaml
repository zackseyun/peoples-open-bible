base_translation:
  language: en
  yaml_path: translation/ot/isaiah/018/005.yaml
  text: For before the harvest[a], when the blossom is finished and the flower becomes a ripening grape, he will cut off the shoots with pruning knives[b], and he will remove and lop off the spreading branches.
  footnotes:
  - marker: a
    text: Or 'when the blossom is complete, and the flower becomes an unripe grape.' The Hebrew imagery moves from blossom to developing fruit before harvest.
    reason: lexical_alternative
  - marker: b
    text: The Hebrew terms for the vine growth here are rare and may also be rendered 'sprigs,' 'tendrils,' or 'trailing branches.'
    reason: lexical_alternative
