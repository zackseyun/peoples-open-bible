translation:
  language: es
  text: Rociará parte de la sangre sobre él con su dedo siete veces, y lo purificará[a] y lo consagrará[b] de las impurezas de los hijos[c] de Israel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «lo limpiará»; el verbo hebreo es un término sacerdotal común para hacer que algo quede ritualmente limpio.
    reason: lexical_alternative
  - marker: b
    text: O «lo santificará» o «lo hará santo».
    reason: lexical_alternative
  - marker: c
    text: Hebreo «los hijos de Israel»; muchas versiones lo traducen de forma más idiomática como «los israelitas» o «el pueblo de Israel».
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהִזָּה
  english_pob_choice: He shall sprinkle
  chosen_spanish: Rociará
  alternatives_spanish:
  - asperjará
  - esparcirá
  lexicon: HALOT
  rationale: En contexto ritual, נזה describe la aplicación ceremonial de sangre. En español, «rociará» comunica de forma natural esa acción sin perder el matiz cultual.
- source_word: עָלָיו
  english_pob_choice: on it
  chosen_spanish: sobre él
  alternatives_spanish:
  - sobre eso
  - encima de él
  lexicon: HALOT
  rationale: El referente inmediato es el altar del versículo previo; en español, el pronombre masculino singular concuerda con ese referente implícito.
- source_word: מִן־הַדָּם
  english_pob_choice: some of the blood
  chosen_spanish: parte de la sangre
  alternatives_spanish:
  - algo de la sangre
  - de la sangre
  lexicon: HALOT
  rationale: El valor partitivo de מִן se expresa bien como «parte de», que suena natural y conserva la idea de tomar una porción para el rito.
- source_word: בְּאֶצְבָּעוֹ
  english_pob_choice: with his finger
  chosen_spanish: con su dedo
  alternatives_spanish:
  - por medio de su dedo
  - usando su dedo
  lexicon: HALOT
  rationale: La preposición instrumental se refleja de forma directa con «con», manteniendo la sencillez del gesto ritual.
- source_word: שֶׁבַע פְּעָמִים
  english_pob_choice: seven times
  chosen_spanish: siete veces
  alternatives_spanish:
  - en siete ocasiones
  lexicon: HALOT
  rationale: Es una equivalencia directa y transparente para la repetición ritual especificada en hebreo.
- source_word: וְטִהֲרוֹ
  english_pob_choice: and cleanse it
  chosen_spanish: y lo limpiará
  alternatives_spanish:
  - y lo purificará
  - y lo limpiará ritualmente
  lexicon: HALOT
  rationale: «Limpiar» expresa de forma clara el sentido ritual de טהר en este contexto. Se evita «purificar» para no sonar más técnico de lo necesario, aunque la idea cultual permanece.
- source_word: וְקִדְּשׁוֹ
  english_pob_choice: and consecrate it
  chosen_spanish: y lo consagrará
  alternatives_spanish:
  - y lo santificará
  - y lo hará santo
  lexicon: HALOT
  rationale: «Consagrar» comunica bien קדש como apartar para uso santo y es natural en español bíblico moderno. «Santificar» también es posible, pero suena más eclesiástico.
- source_word: מִטֻּמְאֹת
  english_pob_choice: from the uncleannesses
  chosen_spanish: de las impurezas
  alternatives_spanish:
  - de las inmundicias
  - de las contaminaciones rituales
  lexicon: HALOT
  rationale: El plural hebreo de טֻמְאוֹת puede vertirse con un plural español. «Impurezas» mantiene el campo semántico ritual sin cargar el texto con terminología demasiado arcaica.
- source_word: בְּנֵי יִשְׂרָאֵל
  english_pob_choice: the sons of Israel
  chosen_spanish: los hijos de Israel
  alternatives_spanish:
  - los israelitas
  - el pueblo de Israel
  lexicon: HALOT
  rationale: Se conserva la forma masculina explícita del hebreo, como en la política POB, mientras sigue siendo comprensible en español.
theological_decisions:
- issue: Purificación y consagración del altar en lenguaje ritual
  english_pob_reading: The altar is said to be cleansed and consecrated from Israel's ritual uncleannesses.
  chosen_spanish_reading: El altar es limpiado y consagrado de las impurezas rituales de Israel.
  alternative_spanish_readings:
  - El altar es purificado y hecho santo de las impurezas de Israel.
  rationale: El versículo trata de un rito de purificación del santuario, no de conversión moral. «Limpiado» y «consagrado» preservan el sentido ceremonial sin desplazarlo hacia categorías posteriores.
  doctrine_reference: Translation philosophy §§1, 3, 6
- issue: Expresión masculina colectiva בְּנֵי יִשְׂרָאֵל
  english_pob_reading: the sons of Israel
  chosen_spanish_reading: los hijos de Israel
  alternative_spanish_readings:
  - los israelitas
  - el pueblo de Israel
  rationale: Se mantiene la forma masculina explícita del hebreo para respetar la transparencia formal y la huella del original.
  doctrine_reference: Translation philosophy §4
translation_notes:
  revision_awareness: Se corrigió el problema de validación eliminando las notas al pie sin anclaje en el texto. La redacción mantiene la correspondencia cultual del hebreo y la coherencia con la decisión inglesa auditada, sin introducir marcadores de nota no usados.
  spanish_consistency_notes:
  - Se conserva el referente implícito masculino de עָלָיו por el altar del contexto inmediato.
  - «Limpiará» y «consagrará» reflejan el par טהר / קדש con un registro bíblico moderno y legible.
  - «Los hijos de Israel» mantiene la forma masculina explícita del original, en línea con la política POB.
  - No se introdujo «SEÑOR» ni «Cristo»; el versículo no lo requiere.
