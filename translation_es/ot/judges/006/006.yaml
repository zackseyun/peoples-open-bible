    text: Or 'was brought very low' or 'became impoverished.' The Hebrew verb can denote being reduced, weakened, or brought low under oppression.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'the sons of Israel,' a standard covenantal designation for the people of Israel.
    reason: lexical_alternative
  - marker: c
    text: Hebrew YHWH, traditionally rendered 'the LORD.'
    reason: alternative_reading
