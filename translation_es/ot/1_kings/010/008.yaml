translation:
  language: es
  text: ¡Dichosos tus hombres; dichosos estos tus siervos, que están delante de ti continuamente y oyen tu sabiduría!
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: אַשְׁרֵי
  english_pob_choice: Blessed are
  chosen_spanish: ¡Dichosos…!
  alternatives_spanish:
  - Bienaventurados…
  - Felices…
  lexicon: HALOT
  rationale: אַשְׁרֵי expresa una condición envidiable de bienestar/felicidad favorecida; en español, «dichosos» conserva el tono elevado y la fuerza exhortativa/beatífica sin sonar tan eclesiástico como «bienaventurados» ni tan débil como «felices».
- source_word: אֲנָשֶׁיךָ
  english_pob_choice: your men
  chosen_spanish: tus hombres
  alternatives_spanish:
  - tu gente
  - tus personas
  lexicon: HALOT
  rationale: אֲנָשִׁים es plural masculino de «hombre» y aquí se refiere de forma natural a los varones de la corte o acompañantes del rey. «Tus hombres» preserva mejor el valor léxico y la referencia masculina que «tu gente».
- source_word: עֲבָדֶיךָ
  english_pob_choice: your servants
  chosen_spanish: tus siervos
  alternatives_spanish:
  - tus esclavos
  - tus servidores
  lexicon: HALOT
  rationale: En este contexto de corte real, עֶבֶד puede referirse a oficiales o asistentes al servicio del rey. Dado que el POB inglés optó por «servants» y no por «slaves», en español «siervos» mantiene el vínculo de servicio sin introducir la dureza de «esclavos».
- source_word: אֵלֶּה
  english_pob_choice: these
  chosen_spanish: estos
  alternatives_spanish:
  - aquellos
  lexicon: HALOT
  rationale: El demostrativo es proximal; «estos» reproduce con naturalidad la referencia inmediata a los siervos acabados de mencionar.
- source_word: הָעֹמְדִים לְפָנֶיךָ
  english_pob_choice: who stand before you
  chosen_spanish: que están siempre delante de ti
  alternatives_spanish:
  - que se mantienen en tu presencia
  - que sirven delante de ti
  lexicon: HALOT
  rationale: La expresión hebrea describe la postura/función de corte de quienes atienden al rey. «Están siempre delante de ti» conserva la imagen concreta de estar ante el monarca y encaja con el siguiente adverbio; además, evita perder la idea de presencia continua.
- source_word: תָּמִיד
  english_pob_choice: continually
  chosen_spanish: siempre
  alternatives_spanish:
  - continuamente
  - constantemente
  lexicon: HALOT
  rationale: תָּמִיד indica continuidad regular. En español, «siempre» fluye mejor en la construcción y mantiene la idea de presencia continua sin sonar excesivamente técnico.
- source_word: הַשֹּׁמְעִים
  english_pob_choice: and hear
  chosen_spanish: y oyen
  alternatives_spanish:
  - y escuchan
  - los que oyen
  lexicon: HALOT
  rationale: El participio marca a los siervos por su acción habitual. «Oyen» sigue de cerca el valor básico de שׁמע y mantiene la sencillez del hebreo; «escuchan» podría sugerir más intencionalidad de la que el texto exige.
- source_word: חָכְמָתֶךָ
  english_pob_choice: your wisdom
  chosen_spanish: tu sabiduría
  alternatives_spanish:
  - tu consejo sabio
  - tu prudencia
  lexicon: HALOT
  rationale: חָכְמָה aquí se refiere a la sabiduría de Salomón, entendida en su palabra y discernimiento. «Sabiduría» es la equivalencia directa y no añade contenido implícito.
theological_decisions:
- issue: ¿Cómo rendir el lenguaje de bendición inicial sin perder el tono reverencial ni convertirlo en una fórmula eclesiástica rígida?
  english_pob_reading: Blessed are your men; blessed are these your servants…
  chosen_spanish_reading: ¡Dichosos tus hombres; dichosos estos tus siervos…!
  alternative_spanish_readings:
  - Bienaventurados tus hombres…
  - Felices tus hombres…
  rationale: No hay una tensión doctrinal aquí, pero sí una decisión de registro. «Dichosos» preserva el valor de estado favorecido y el tono de proclamación, evitando que la frase suene demasiado doméstica o demasiado litúrgica para el español contemporáneo.
  doctrine_reference: Sabiduría bíblica y fórmula de bienaventuranza; sin disputa doctrinal específica
- issue: ¿Mantener el lenguaje masculino explícito de אֲנָשֶׁיךָ en lugar de generalizarlo?
  english_pob_reading: your men
  chosen_spanish_reading: tus hombres
  alternative_spanish_readings:
  - tu gente
  - tus seguidores
  rationale: El hebreo usa un sustantivo masculino plural concreto. Generalizarlo diluiría la forma del original y borraría una precisión léxica que el POB inglés también preserva.
  doctrine_reference: Principio de equivalencia semántica y fidelidad al referente textual
translation_notes:
  revision_awareness: Coincide con el estado de alta concordancia del auditoría inglesa y con la última pasada de revisión, que no introdujo cambios. No se detectan revisiones aplicadas ni tensiones textuales que requieran notas variantes.
  spanish_consistency_notes:
  - Se mantiene «siervos» para עֲבָדִים en coherencia con la decisión inglesa y con el contexto de servicio de corte; no se usa «esclavos» porque el enfoque contextual no es la servidumbre forzada.
  - Se usa «Yahvé» solo cuando el texto lo requiera; este versículo no contiene el nombre divino.
  - Se evita «Cristo/Mesías» porque no aparece ningún término correspondiente en este versículo.
  - La puntuación usa punto y coma para reflejar la paralelismo hebreo sin sobrecargar la sintaxis española.
