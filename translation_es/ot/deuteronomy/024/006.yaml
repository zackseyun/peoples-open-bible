translation:
  language: es
  text: No se tomará en prenda un par de muelas de molino[a], ni siquiera la muela superior, porque estaría tomando en prenda una vida.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: ''porque estaría tomando en prenda el sustento de una persona.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: יַחֲבֹל / חֹבֵל
  english_pob_choice: take ... as a pledge / taking ... as a pledge
  chosen_spanish: tomar en prenda / tomando en prenda
  alternatives_spanish:
  - tomar como garantía
  - retener como prenda
  - tomar en empeño
  lexicon: HALOT
  rationale: El verbo en este contexto jurídico expresa tomar un objeto como seguridad por una deuda. En español, 'tomar en prenda' conserva bien el valor legal y permite mantener la repetición del verbo implícita en la cláusula final.
- source_word: רֵחַיִם
  english_pob_choice: a pair of millstones
  chosen_spanish: un par de piedras de molino
  alternatives_spanish:
  - las piedras de molino
  - un molino de mano
  lexicon: HALOT
  rationale: El dual hebreo apunta naturalmente a las dos piedras del molino. 'Un par de piedras de molino' es claro en español y evita perder el matiz de conjunto.
- source_word: וָרָכֶב
  english_pob_choice: or even the upper millstone
  chosen_spanish: ni siquiera la muela superior
  alternatives_spanish:
  - o aun la muela superior
  - ni la muela superior
  lexicon: HALOT
  rationale: רָכֶב designa aquí la piedra superior del molino. 'Ni siquiera' reproduce la fuerza restrictiva del hebreo en un español natural, sin depender de un calco de la conjunción.
- source_word: כִּי
  english_pob_choice: for
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  lexicon: HALOT
  rationale: Introduce la razón de la prohibición; 'porque' es la forma más natural en español actual para una causal normativa.
- source_word: נֶפֶשׁ
  english_pob_choice: a life
  chosen_spanish: una vida
  alternatives_spanish:
  - la vida de una persona
  - el sustento de una persona
  - un alma
  lexicon: HALOT
  rationale: Aquí נֶפֶשׁ no señala 'alma' en sentido antropológico, sino la vida concreta y el sustento vital amenazado por quitar el medio para moler grano. 'Una vida' conserva esa fuerza sin doctrinalizar el término.
- source_word: הוּא
  english_pob_choice: he would be
  chosen_spanish: estaría
  alternatives_spanish:
  - sería
  - estaría tomando
  lexicon: HALOT
  rationale: 'El pronombre retoma al que toma la prenda. En español, la idea se expresa con una perífrasis verbal que hace natural la implicación jurídica: al hacerlo, estaría tomando en prenda una vida.'
theological_decisions:
- issue: Sentido de נֶפֶשׁ en un contexto legal-social
  english_pob_reading: concrete life/livelihood rather than immaterial soul
  chosen_spanish_reading: vida concreta, no 'alma' inmortal
  alternative_spanish_readings:
  - alma
  - persona
  - sustento
  rationale: El verso trata de un objeto indispensable para preparar alimento. La gravedad ética consiste en que quitarlo pone en riesgo la vida misma del deudor; por eso se mantiene 'vida' y no una traducción espiritualizante.
  doctrine_reference: Antropología bíblica; uso contextual de נֶפֶשׁ
- issue: Conservación de la fuerza legal de la prohibición
  english_pob_reading: No one shall take... as a pledge
  chosen_spanish_reading: No se tomará en prenda...
  alternative_spanish_readings:
  - Nadie tomará en prenda...
  - No se deberá tomar en prenda...
  rationale: La forma impersonal pasiva suena natural en español jurídico y preserva la amplitud normativa del hebreo sin introducir un sujeto que el texto no explicita.
  doctrine_reference: Derecho bíblico / formulación legal
translation_notes:
  revision_awareness: El contexto inglés fue revisado y mantenido sin cambios sustanciales; la lectura aceptada destaca el valor jurídico de חבל y el sentido concreto de נֶפֶשׁ como vida/sustento. La versión española conserva esas decisiones y adapta la sintaxis para que suene natural y publicable en español.
  spanish_consistency_notes:
  - Se usa 'Yahvé' según la pauta general del proyecto, aunque este verso no contiene el tetragrámaton.
  - Se mantiene 'en prenda' para conservar la terminología legal consistente con el POB en pasajes afines.
  - '''Muela superior'' se prefiere a alternativas más técnicas por claridad amplia en español.'
  - La nota al pie refleja la alternativa documentada de 'livelihood' / 'sustento' sin desplazar el sentido principal de 'vida'.
