    issue: '''Haz raro tu pie'' es un calco poco natural en español.'
    rationale: Aunque intenta preservar el hebreo literal, no comunica con claridad el sentido idiomático 'visita con poca frecuencia'. La meta del proyecto permite evitar calcos de madera cuando el español queda antinatural.
  - severity: medium
    issue: '''Prójimo'' es entendible pero menos natural que ''vecino'' en este contexto sapiencial.'
    rationale: La decisión inglesa prefirió 'neighbor' por su sentido social general. En español, 'vecino' transmite eso con mayor claridad cotidiana, mientras 'prójimo' suena más abstracto o moralizante.
  - severity: low
    issue: La nota literal puede pulirse para concordar con el texto revisado y con mejor español.
    rationale: La explicación es básicamente correcta, pero debe seguir reflejando el literal hebreo mientras el texto principal use una formulación idiomática más clara.
