review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue de cerca el griego y el audit trail inglés en la estructura principal, incluyendo la acumulación de imágenes de violencia sexual y profanación. Sin embargo, hay varios desajustes importantes: «Yahvé» para Κύριε no está suficientemente justificado por la evidencia inmediata, ya que la fuente griega solo tiene κύριε como apelación y el POB inglés eligió «Lord»; «porque dijiste» debilita el contraste adversativo que el inglés auditado explicitó con «though... yet»; y «mancha» para μίασμα queda demasiado débil frente a «defilement». También conviene completar los pronombres posesivos en la segunda y tercera imágenes para mantener la claridad lograda en la revisión inglesa.'
  spanish_quality_summary: 'El español es generalmente legible, pero algunas elecciones suenan poco naturales o insuficientemente precisas: «soltaron el vientre» resulta entendible aunque duro; «para mancha» suena menos idiomático que «para contaminación» o «para impureza»; «porque dijiste» no articula bien la tensión del pasaje; y la ausencia de posesivos en «profanaron el vientre» puede entorpecer la referencia. El tono puede mantenerse digno y claro con ajustes menores.'
  glossary_alignment: Alineación parcial. «Yahvé» es la preferencia del proyecto para el nombre divino יהוה, pero aquí la fuente inmediata es griega con Κύριε y el audit trail documenta «Lord» como apelación oracional, no como enmascaramiento del tetragrámaton; por tanto, «Señor» es la opción más fiel a esta evidencia. «Extranjeros», «virgen», «muslo» y «profanaron» están bien encaminados. «μίασμα» requiere una opción española con mayor fuerza de contaminación/impureza.
  issues:
  - severity: high
    issue: Se traduce Κύριε como «Yahvé» en lugar de «Señor».
    rationale: La evidencia fuente inmediata presenta Κύριε, y el audit trail inglés justificó «Lord» como tratamiento directo a Dios en oración. Aquí no hay base suficiente para introducir el nombre divino «Yahvé» en el texto principal.
  - severity: medium
    issue: «porque dijiste» no preserva bien el contraste de εἶπας γὰρ ... καὶ ἐποίησαν.
    rationale: 'El sentido en contexto es concesivo/adversativo: aunque Dios dijo «No será así», ellos lo hicieron. «Porque» suena más causal que contrastivo y debilita la tensión retórica.'
  - severity: medium
    issue: «para mancha» es una traducción débil de εἰς μίασμα.
    rationale: μίασμα connota contaminación o impureza ritual/moral. «Mancha» puede sonar demasiado ligera y menos precisa en español bíblico moderno.
  - severity: low
    issue: Falta explicitar el posesivo en «profanaron el vientre».
    rationale: El inglés auditado añadió «her» para claridad, y en español «su vientre» ayuda a mantener la referencia de la secuencia sin alterar el sentido.
