translation:
  language: es
  text: 'Por eso, esto es lo que dice Yahvé acerca de Joaquim, rey de Judá: no tendrá a nadie[a] que se siente en el trono de David, y su cadáver será arrojado al calor[b] del día y a la escarcha de la noche.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «quien se siente en el trono de David». El hebreo literalmente dice «uno que se sienta»; también puede entenderse más dinámicamente como ausencia de sucesor dinástico.
    reason: alternative_reading
  - marker: b
    text: O «a la sequedad del día». El hebreo חֹרֶב puede significar calor, sequedad o sequía; aquí se conserva «calor» en el texto principal por el paralelismo con «escarcha de la noche».
    reason: lexical_alternative
lexical_decisions:
- source_word: לָכֵן
  english_pob_choice: Therefore
  chosen_spanish: Por eso
  alternatives_spanish:
  - Por lo tanto
  - Así que
  lexicon: HALOT
  rationale: La partícula introduce consecuencia a partir del contexto previo. «Por eso» conserva la fuerza inferencial en un español natural y digno.
- source_word: כֹּה אָמַר יְהוָה
  english_pob_choice: this is what Yahweh says
  chosen_spanish: esto es lo que dice Yahvé
  alternatives_spanish:
  - así dice Yahvé
  - esto dice Yahvé
  lexicon: HALOT
  rationale: La fórmula profética se mantiene con un giro natural en español. Se conserva el nombre divino «Yahvé» conforme al criterio del proyecto.
- source_word: עַל יְהוֹיָקִים מֶלֶךְ יְהוּדָה
  english_pob_choice: concerning Jehoiakim king of Judah
  chosen_spanish: acerca de Joaquim, rey de Judá
  alternatives_spanish:
  - sobre Joaquim, rey de Judá
  - contra Joaquim, rey de Judá
  lexicon: HALOT
  rationale: «עַל» en esta fórmula oracular puede funcionar como referencia del mensaje dirigido al rey. «Acerca de» conserva esa amplitud sin forzar un valor polémico que no está explicitado por la preposición sola.
- source_word: לֹא יִהְיֶה לּוֹ יוֹשֵׁב עַל כִּסֵּא דָוִד
  english_pob_choice: He will have no one to sit on the throne of David
  chosen_spanish: no tendrá a nadie que se siente en el trono de David
  alternatives_spanish:
  - no tendrá quien se siente en el trono de David
  - no le quedará nadie sentado en el trono de David
  lexicon: HALOT
  rationale: El hebreo expresa literalmente la ausencia de «uno que se siente». En español, «no tendrá a nadie que se siente» preserva esa estructura sin añadir «descendiente», que sería interpretativo.
- source_word: כִּסֵּא דָוִד
  english_pob_choice: the throne of David
  chosen_spanish: el trono de David
  alternatives_spanish:
  - el trono davídico
  - el trono de David
  lexicon: HALOT
  rationale: Se conserva la formulación dinástica y covenantal del hebreo con una expresión transparente en español.
- source_word: נִבְלָתוֹ
  english_pob_choice: his dead body
  chosen_spanish: su cadáver
  alternatives_spanish:
  - su cuerpo muerto
  - su cuerpo sin vida
  - su cadáver
  lexicon: HALOT
  rationale: «נִבְלָה» puede tener un matiz deshonroso o de cuerpo abandonado. «Cadáver» comunica bien la indignidad del destino y es natural en español bíblico contemporáneo.
- source_word: מֻשְׁלֶכֶת
  english_pob_choice: will be cast out
  chosen_spanish: será arrojado
  alternatives_spanish:
  - será echado
  - será lanzado
  - será arrojado
  lexicon: HALOT
  rationale: El pasivo intensifica la idea de desecho público. «Arrojado» mantiene la violencia y deshonra del hebreo.
- source_word: לַחֹרֶב בַּיּוֹם
  english_pob_choice: to the heat by day
  chosen_spanish: al calor del día
  alternatives_spanish:
  - al calor diurno
  - al calor del día
  - a la sequedad del día
  lexicon: HALOT
  rationale: חֹרֶב puede abarcar calor, sequedad o sequía. Dado que el paralelo nocturno es «frío», «calor del día» reproduce la antítesis climática de manera clara; la alternativa «sequedad» queda implícitamente preservada en nota.
- source_word: לַקֶּרַח בַּלָּיְלָה
  english_pob_choice: to the frost by night
  chosen_spanish: al frío de la noche
  alternatives_spanish:
  - a la escarcha de la noche
  - al frío nocturno
  - al frío de la noche
  lexicon: HALOT
  rationale: קֶרַח denota escarcha/hielo/frío muy concreto. «Frío de la noche» es idiomático en español y conserva el paralelismo con «calor del día».
theological_decisions:
- issue: Nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Jehová
  rationale: El texto hebreo usa directamente el Tetragrámaton. La política del proyecto pide «Yahvé» en el texto principal, manteniendo la referencia al nombre pactual de Dios sin ocultarlo mediante un título.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Destino del cuerpo del rey como señal de juicio
  english_pob_reading: his dead body will be cast out to the heat by day and to the frost by night
  chosen_spanish_reading: su cadáver será arrojado al calor del día y al frío de la noche
  alternative_spanish_readings:
  - su cadáver será arrojado a la sequedad del día y al frío de la noche
  - su cuerpo muerto será arrojado al calor del día y al frío de la noche
  rationale: El hebreo describe una exposición ignominiosa del cadáver, con posible matiz de calor/sequedad diurna. En el texto principal se mantiene la imagen climática básica; la alternativa de «sequedad» queda indicada en nota para no borrar la tensión lexical.
  doctrine_reference: HALOT s.v. חֹרֶב; POB lexical audit trail
translation_notes:
  revision_awareness: La versión inglesa auditada revisó «sitting» a «to sit» por naturalidad y «thrown out» a «cast out» por registro. En español se optó por una estructura igualmente natural («no tendrá a nadie que se siente») y por «será arrojado», que mantiene la deshonra pública sin cargar el texto con una formulación demasiado técnica.
  spanish_consistency_notes:
  - Se usa «Yahvé» para יְהוָה conforme al estándar del proyecto.
  - Se mantiene «trono de David» como fórmula dinástica estable.
  - Se evitó introducir «descendiente» en el texto principal porque el hebreo no lo dice explícitamente.
  - «Cadáver» comunica mejor la indignidad del destino que «cuerpo muerto» en este contexto.
  - «Calor del día» conserva la antítesis con «frío de la noche»; la posible idea de sequedad queda en nota.
