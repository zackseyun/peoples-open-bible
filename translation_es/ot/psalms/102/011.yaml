translation:
  language: es
  text: a causa de tu indignación y de tu ira, porque me has levantado y me has arrojado lejos[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «y me has echado fuera».
    reason: lexical_alternative
lexical_decisions:
- source_word: מִפְּנֵי
  english_pob_choice: because of
  chosen_spanish: a causa de
  alternatives_spanish:
  - por
  - debido a
  - a causa de
  lexicon: HALOT
  rationale: La construcción con מִפְּנֵי expresa aquí causa o motivo, no ubicación. «A causa de» comunica de forma natural la relación causal y conserva el tono poético sin volverlo demasiado coloquial.
- source_word: זַעַמְךָ
  english_pob_choice: your indignation
  chosen_spanish: tu indignación
  alternatives_spanish:
  - tu ira
  - tu enojo
  - tu indignación
  lexicon: HALOT
  rationale: זַעַם denota una ira fuerte, a menudo con matiz de indignación. «Indignación» mantiene el registro elevado y distingue este término del siguiente, sin borrar la tensión poética.
- source_word: וְקִצְפֶּךָ
  english_pob_choice: and your wrath
  chosen_spanish: y de tu ira
  alternatives_spanish:
  - y de tu furor
  - y de tu enojo
  - y de tu ira
  lexicon: HALOT
  rationale: קֶצֶף suele expresar ira/ira encendida, y en español «ira» preserva el paralelismo con זַעַם sin imponer una distinción demasiado artificial. Se mantiene la doble referencia al enojo divino sin suavizarla.
- source_word: נְשָׂאתַנִי
  english_pob_choice: you have lifted me up
  chosen_spanish: me has levantado
  alternatives_spanish:
  - me has alzado
  - me has levantado
  - me has llevado
  lexicon: HALOT
  rationale: נָשָׂא puede significar levantar, alzar, llevar o cargar. En este contexto poético, «me has levantado» conserva la imagen de ser alzado antes de ser apartado, sin añadir un sentido no requerido por el verso.
- source_word: וַתַּשְׁלִיכֵנִי
  english_pob_choice: and cast me away
  chosen_spanish: me has arrojado
  alternatives_spanish:
  - me has arrojado
  - me has echado
  - me has lanzado
  lexicon: HALOT
  rationale: שָׁלַךְ significa arrojar o echar. «Me has arrojado» mantiene la fuerza de rechazo y el registro formal adecuado para el poema.
theological_decisions:
- issue: Lenguaje paralelo para la ira divina
  english_pob_reading: Retained both terms for God's anger without softening or systematizing them.
  chosen_spanish_reading: 'Se conservan dos términos distintos para la ira divina: «indignación» e «ira».'
  alternative_spanish_readings:
  - Reducir ambos a «ira»
  - Suavizar la expresión con un término menos intenso
  rationale: El hebreo presenta dos vocablos cercanos pero no idénticos. La traducción preserva esa tensión poética y no la resuelve artificialmente, manteniendo la intensidad del lamento tal como está en el texto.
  doctrine_reference: Preservar la tensión teológica sin armonizarla más allá del verso.
translation_notes:
  revision_awareness: El texto inglés fue revisado de «thrown me away» a «cast me away» por registro más formal. La versión española adopta un verbo igualmente formal y fuerte («arrojado»), manteniendo el sentido de rechazo y la progresión poética del verso.
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el hebreo tiene el nombre divino; aquí no aparece.
  - Se mantiene la distinción entre «indignación» e «ira» para no borrar el paralelismo hebreo.
  - La frase final conserva la ambigüedad de rechazo/expulsión sin introducir explicación adicional.
