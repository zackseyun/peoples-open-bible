lexical_decisions:
- source_word: μὴ ὑπερίδῃς
  english_pob_choice: Do not overlook
  chosen_spanish: No pases por alto
  alternatives_spanish:
  - No pases por alto
  - No desprecies
  - No ignores
  lexicon: LSJ
  rationale: ὑπεροράω expresa la idea de pasar por alto, mirar con indiferencia o descuidar. «No pases por alto» conserva la prohibición y suena natural en español sin intensificar indebidamente el tono emocional.
- source_word: τὴν μερίδα σου
  english_pob_choice: your portion
  chosen_spanish: tu porción
  alternatives_spanish:
  - tu parte
  - tu herencia
  - tu posesión
  lexicon: LSJ
  rationale: μερίς significa porción o parte. «Porción» mantiene el valor amplio del término y deja abierto el matiz pactal sin forzar el sentido técnico de «herencia».
- source_word: ἣν
  english_pob_choice: which
  chosen_spanish: que
  alternatives_spanish:
  - la cual
  lexicon: Greek grammar
  rationale: La relativa introduce de manera directa la cláusula explicativa; «que» es la opción más natural en español para este registro.
- source_word: σεαυτῷ
  english_pob_choice: for myself
  chosen_spanish: para mí mismo
  alternatives_spanish:
  - como cosa mía
  - para mi propia posesión
  lexicon: Greek grammar
  rationale: La forma refleja un dativo reflexivo en discurso divino. Dado el ajuste del audit trail inglés, «para mí mismo» reproduce la relación reflexiva sin suavizarla excesivamente.
- source_word: ἐλυτρώσω
  english_pob_choice: I redeemed
  chosen_spanish: redimí
  alternatives_spanish:
  - rescaté
  - libré
  lexicon: LSJ
  rationale: λυτρόω tiene fuerza de rescatar/redimir con carga salvífica y pactal. «Redimí» preserva mejor ese peso teológico en este contexto del éxodo.
- source_word: ἐκ γῆς Αἰγύπτου
  english_pob_choice: out of the land of Egypt
  chosen_spanish: de la tierra de Egipto
  alternatives_spanish:
  - de la tierra de Egipto
  - de Egipto
  lexicon: LSJ
  rationale: La frase bíblica se conserva con su forma plena. «De la tierra de Egipto» refleja el patrón de salida del éxodo y suena digno en español.
theological_decisions:
- issue: Valor pactal de μερίς
  english_pob_reading: your portion
  chosen_spanish_reading: tu porción
  alternative_spanish_readings:
  - tu herencia
  - tu posesión asignada
  rationale: El griego dice literalmente «tu porción». La traducción principal preserva la metáfora sin explicarla en exceso, permitiendo que el trasfondo de pueblo-posesión permanezca implícito.
  doctrine_reference: Translation philosophy §§1, 3, 5
- issue: Relación reflexiva de σεαυτῷ con el verbo de redención
  english_pob_reading: which I redeemed for myself
  chosen_spanish_reading: que redimí para mí mismo
  alternative_spanish_readings:
  - que redimí para ti
  - que redimí como posesión tuya
  rationale: El texto griego es una oración dirigida a Dios con construcción reflexiva inusual pero real. «Para mí mismo» conserva la tensión y evita una reinterpretación más explicativa.
  doctrine_reference: Translation philosophy §§1, 3
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión del audit trail inglés que corrigió la referencia reflexiva de σεαυτῷ a «for myself». Por ello, el español sigue esa lectura y evita la forma «para ti mismo», que no reflejaría el ajuste más reciente. También se conservó «porción»/«porción» (tu porción) y la fórmula completa de Egipto.
  spanish_consistency_notes:
  - Se mantiene «redimí» para λυτρόω, en coherencia con el peso salvífico del éxodo.
  - «Porción» se usa de forma consistente para μερίς, evitando «herencia» como interpretación más específica.
  - La preposición «de» en «de la tierra de Egipto» preserva la fórmula bíblica natural en español.
  - El marcador [a] está anclado en «porción» para señalar la alternativa idiomática sin alterar el texto principal.
