translation:
  language: es
  text: Así que me postré[a] delante de Yahvé durante cuarenta días y cuarenta noches, porque Yahvé había dicho que los destruiría.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «me postré por tierra». El verbo hebreo puede destacar la postración completa en intercesión.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וָאֶתְנַפַּל
  english_pob_choice: So I fell down
  chosen_spanish: Así que me postré[a]
  alternatives_spanish:
  - Así que caí
  - Entonces me postré
  - Así que me eché por tierra
  lexicon: HALOT
  rationale: El hitpael de נפל aquí expresa una postración intencional en intercesión. En español, «me postré» comunica mejor ese matiz que un simple «caí». Mantengo el valor consecutivo de la waw con «Así que».
- source_word: לִפְנֵי יְהוָה
  english_pob_choice: before Yahweh
  chosen_spanish: delante de Yahvé
  alternatives_spanish:
  - en presencia de Yahvé
  - ante Yahvé
  lexicon: HALOT
  rationale: 'לִפְנֵי marca posición relacional/spatial; «delante de» es claro y natural en español. Sigo el criterio del proyecto para יְהוָה: «Yahvé» en el texto principal.'
- source_word: אֵת אַרְבָּעִים הַיּוֹם וְאֶת אַרְבָּעִים הַלַּיְלָה
  english_pob_choice: for forty days and forty nights
  chosen_spanish: durante cuarenta días y cuarenta noches
  alternatives_spanish:
  - por cuarenta días y cuarenta noches
  - a lo largo de cuarenta días y cuarenta noches
  lexicon: HALOT
  rationale: El acusativo de duración se expresa naturalmente con «durante» en español. «Cuarenta días y cuarenta noches» conserva la unidad idiomática y el paralelismo del hebreo.
- source_word: כִּי
  english_pob_choice: because
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  lexicon: HALOT
  rationale: Aquí כִּי introduce la causa de la postración, por lo que «porque» comunica bien la relación causal sin añadir interpretación.
- source_word: אָמַר יְהוָה
  english_pob_choice: the LORD had said
  chosen_spanish: Yahvé había dicho
  alternatives_spanish:
  - Yahvé dijo
  - había dicho Yahvé
  lexicon: HALOT
  rationale: El hebreo remite a una palabra divina ya dada antes del acto de Moisés; el pluscuamperfecto español «había dicho» refleja bien esa anterioridad discursiva. Se conserva «Yahvé» para el nombre divino.
- source_word: לְהַשְׁמִיד אֶתְכֶם
  english_pob_choice: he would destroy you
  chosen_spanish: que los destruiría
  alternatives_spanish:
  - que los iba a destruir
  - para destruirlos
  - que los exterminaría
  lexicon: HALOT
  rationale: לְהַשְׁמִיד expresa destruir/aniquilar; «destruiría» es fiel y menos fuerte que «exterminaría», evitando sobrerrepresentar el verbo. Cambio a tercera persona plural («los») para concordar con el destinatario colectivo implícito en el contexto español.
theological_decisions:
- issue: Renderización del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - el SEÑOR
  rationale: El proyecto pide reproducir el nombre de pacto en forma transparente y no ocultarlo con una sustitución litúrgica. En español bíblico, «Yahvé» es la forma establecida para el texto principal.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
translation_notes:
  revision_awareness: 'El audit trail inglés había propuesto y luego retirado una repetición explicativa redundante sobre los mismos cuarenta días y noches. La versión española sigue la revisión final: conserva la duración y la causa, sin añadir repetición innecesaria.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» en el texto principal, conforme al estándar del proyecto para el tetragrama.
  - «Postré» se eligió por su valor reverencial y físico en contexto de intercesión; no se redujo a «caí».
  - La duración se expresó con «durante» para una lectura natural en español sin perder el paralelismo del hebreo.
  - El pronombre objeto plural «los» refleja que el destinatario del juicio es colectivo, coherente con el contexto inmediato.
