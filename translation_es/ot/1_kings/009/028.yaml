translation:
  language: es
  text: Fueron a Ofir y tomaron de allí cuatrocientos veinte talentos[a] de oro, y lo llevaron al rey Salomón.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El hebreo nombra una unidad antigua de peso, el 'talento'.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּבֹאוּ
  english_pob_choice: They went
  chosen_spanish: Fueron
  alternatives_spanish:
  - Vinieron
  - Llegaron
  lexicon: HALOT
  rationale: El verbo de movimiento en la secuencia narrativa permite en español una forma natural de desplazamiento. "Fueron" refleja el avance del relato sin forzar la perspectiva deíctica con "vinieron".
- source_word: אוֹפִירָה
  english_pob_choice: to Ophir
  chosen_spanish: a Ofir
  alternatives_spanish:
  - a Ofirah
  - hacia Ofir
  lexicon: HALOT
  rationale: Se conserva el topónimo bíblico en su forma usual en español, "Ofir". La terminación direccional hebrea se expresa naturalmente con la preposición "a".
- source_word: וַיִּקְחוּ
  english_pob_choice: took
  chosen_spanish: tomaron
  alternatives_spanish:
  - trajeron
  - obtuvieron
  lexicon: HALOT
  rationale: '"Tomaron" es el equivalente narrativo directo de לקח en este contexto y preserva la simplicidad del relato.'
- source_word: מִשָּׁם
  english_pob_choice: from there
  chosen_spanish: de allí
  alternatives_spanish:
  - desde allí
  - de ese lugar
  lexicon: HALOT
  rationale: Se mantiene la idea explícita de procedencia marcada por מן. "De allí" es natural y fiel al valor locativo de origen.
- source_word: זָהָב
  english_pob_choice: gold
  chosen_spanish: oro
  alternatives_spanish:
  - oro fino
  - oro
  lexicon: HALOT
  rationale: '"Oro" es la equivalencia estándar y directa para זהב, sin añadir una precisión no presente en el hebreo.'
- source_word: אַרְבַּע מֵאוֹת וְעֶשְׂרִים
  english_pob_choice: four hundred and twenty
  chosen_spanish: cuatrocientas veinte
  alternatives_spanish:
  - '420'
  - cuatrocientos veinte
  lexicon: HALOT
  rationale: Se expresa el número con concordancia femenina con "toneladas", en español idiomático. El valor numérico exacto del hebreo se conserva.
- source_word: כִּכָּר
  english_pob_choice: talents
  chosen_spanish: toneladas
  alternatives_spanish:
  - talentos
  - kikar
  lexicon: HALOT
  rationale: En español, el término técnico tradicional "talentos" es inteligible pero menos transparente para lectores modernos. Aquí se opta por "toneladas" como equivalencia de peso aproximada para lectura fluida, reconociendo que la unidad antigua no coincide exactamente con la métrica moderna.
- source_word: וַיָּבִאוּ
  english_pob_choice: brought
  chosen_spanish: lo llevaron
  alternatives_spanish:
  - lo trajeron
  - lo transportaron
  lexicon: HALOT
  rationale: El verbo causativo de בוא se entiende como traslado hacia el rey. "Lo llevaron" mantiene la función narrativa y el objeto directo del oro.
- source_word: אֶל הַמֶּלֶךְ שְׁלֹמֹה
  english_pob_choice: to King Solomon
  chosen_spanish: al rey Salomón
  alternatives_spanish:
  - al rey, Salomón
  - a Salomón el rey
  lexicon: HALOT
  rationale: Se conserva el orden natural español con el título antes del nombre propio. "Rey Salomón" comunica claramente la relación appositiva del hebreo.
translation_notes:
  revision_awareness: 'El texto coincide con el sentido básico del hebreo y con el audit trail inglés: movimiento a Ofir, toma del oro, cantidad exacta y entrega al rey Salomón. La única diferencia relevante es la adaptación de כִּכָּר a una equivalencia métrica aproximada en el texto principal, anotada para preservar la transparencia del término original.'
  spanish_consistency_notes:
  - Se mantuvo "Ofir" como topónimo bíblico estándar en español.
  - Se usó "oro" para זהב sin añadir calificativos no presentes.
  - La nota [a] preserva la alternativa tradicional "talentos" para la unidad de peso.
  - '"Rey Salomón" sigue el orden natural del español y evita una construcción demasiado literal.'
  - No se introdujo lenguaje confesional o interpretativo ajeno al versículo.
