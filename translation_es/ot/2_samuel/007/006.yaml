translation:
  language: es
  text: Porque no he habitado en una casa desde el día en que saqué a los hijos de Israel de Egipto hasta hoy, sino que he estado moviéndome en una tienda y en un tabernáculo.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: יָשַׁבְתִּי
  english_pob_choice: have not dwelt
  chosen_spanish: no he habitado
  alternatives_spanish:
  - no he morado
  - no he estado viviendo
  - no he residido
  lexicon: HALOT
  rationale: ישב puede significar 'habitar', 'residir' o 'sentarse'. En español, 'habitado' conserva el sentido durativo de residencia en una casa y mantiene un registro formal sin sonar arcaizante.
- source_word: בְּבַיִת
  english_pob_choice: in a house
  chosen_spanish: en una casa
  alternatives_spanish:
  - en la casa
  - en un templo
  lexicon: HALOT
  rationale: El sustantivo es indefinido en hebreo; 'casa' es la equivalencia más directa y evita introducir la interpretación cultual de 'templo' que no está en el término mismo.
- source_word: לְמִיּוֹם הַעֲלֹתִי
  english_pob_choice: from the day I brought up
  chosen_spanish: desde el día en que saqué
  alternatives_spanish:
  - desde el día en que hice subir
  - desde el día de mi sacada
  lexicon: HALOT
  rationale: העלה en el contexto del éxodo expresa sacar/liberar mediante acción de ascenso. En español, 'saqué' comunica con naturalidad la acción divina y el punto inicial del período temporal.
- source_word: בְּנֵי יִשְׂרָאֵל
  english_pob_choice: the sons of Israel
  chosen_spanish: los hijos de Israel
  alternatives_spanish:
  - los hijos varones de Israel
  - los israelitas
  - los descendientes de Israel
  lexicon: HALOT
  rationale: Se conserva la forma de parentesco masculina del hebreo. 'Hijos de Israel' es comprensible y mantiene la correspondencia formal sin neutralizar el género gramatical del original.
- source_word: מִמִּצְרַיִם
  english_pob_choice: out of Egypt
  chosen_spanish: de Egipto
  alternatives_spanish:
  - fuera de Egipto
  - desde Egipto
  lexicon: HALOT
  rationale: En español, con el verbo 'saqué', 'de Egipto' ya implica el movimiento de salida y evita una redundancia poco natural, sin perder la referencia al éxodo.
- source_word: וְעַד הַיּוֹם הַזֶּה
  english_pob_choice: to this day
  chosen_spanish: hasta hoy
  alternatives_spanish:
  - hasta este día
  - hasta el día de hoy
  lexicon: HALOT
  rationale: La locución temporal es estándar en español bíblico y contemporáneo; 'hasta hoy' conserva la continuidad temporal desde el éxodo hasta el presente.
- source_word: וָאֶהְיֶה מִתְהַלֵּךְ
  english_pob_choice: but I have been moving about
  chosen_spanish: sino que he andado
  alternatives_spanish:
  - y he estado andando
  - y he ido de aquí para allá
  - y he estado moviéndome
  lexicon: HALOT
  rationale: El contraste con no habitar en una casa queda mejor en español con 'sino que'. 'He andado' reproduce el movimiento continuo del participio y evita una paráfrasis excesiva.
- source_word: בְּאֹהֶל
  english_pob_choice: in a tent
  chosen_spanish: en una tienda
  alternatives_spanish:
  - en un tabernáculo portátil
  - en una tienda de campaña
  lexicon: HALOT
  rationale: Aunque 'tienda' puede ser más general, es una equivalencia española natural para אֹהֶל y comunica la idea de morada portátil sin introducir tecnicismos innecesarios.
- source_word: וּבְמִשְׁכָּן
  english_pob_choice: and in a tabernacle
  chosen_spanish: y en un tabernáculo
  alternatives_spanish:
  - y en una morada
  - y en un santuario portátil
  lexicon: HALOT
  rationale: '''Tabernáculo'' es el término cultual establecido para מִשְׁכָּן en este contexto y preserva la distinción respecto de ''tienda''.'
theological_decisions:
- issue: Referencia al éxodo y acción divina
  english_pob_reading: from the day I brought up the sons of Israel out of Egypt
  chosen_spanish_reading: desde el día en que saqué a los hijos de Israel de Egipto
  alternative_spanish_readings:
  - desde el día en que hice subir a los hijos de Israel de Egipto
  - desde el día en que los saqué de Egipto
  rationale: El hebreo atribuye la acción al hablante divino. 'Saqué' preserva esa agencia y la referencia al éxodo sin suavizarla ni convertirla en una formulación impersonal.
  doctrine_reference: Éxodo como acto salvífico divino en la narrativa veterotestamentaria
- issue: Terminología cultual de מִשְׁכָּן
  english_pob_reading: tabernacle
  chosen_spanish_reading: tabernáculo
  alternative_spanish_readings:
  - morada
  - santuario portátil
  rationale: El contexto inmediato contrasta una casa permanente con la condición itinerante anterior a la construcción del templo. 'Tabernáculo' mantiene ese trasfondo histórico-cultual y evita diluir el término.
  doctrine_reference: Tipología del santuario portátil previo al templo en la historia de Israel
translation_notes:
  revision_awareness: El texto inglés POB fue revisado desde 'dwelt' a 'dwelt' por registro formal; en español se eligió una solución igualmente formal ('habitado') que conserva el valor durativo. Se mantuvo la distinción entre אֹהֶל y מִשְׁכָּן sin fusionarlos, siguiendo la auditoría inglesa y el contexto hebreo.
  spanish_consistency_notes:
  - Se usó 'Dios' implícito no por añadidura, sino porque el sujeto habla en primera persona en el contexto narrativo.
  - Se evitó 'SEÑOR' para el nombre divino porque este versículo no contiene el Tetragrámaton explícito.
  - '''Hijos de Israel'' se mantuvo para conservar la forma masculina plural del hebreo.'
  - '''Tabernáculo'' se reservó para מִשְׁכָּן y ''tienda'' para אֹהֶל, reflejando la pareja léxica del original.'
