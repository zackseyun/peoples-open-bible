translation:
  language: es
  text: Invocamos como testigos contra ustedes[a] al cielo y a la tierra, y a nuestro Dios y Señor de nuestros antepasados, que nos castiga por nuestros pecados y por los pecados de nuestros antepasados[b], para que hoy no actúe conforme a estas palabras.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más literalmente: «testificamos a ustedes». El griego probablemente tiene el sentido de invocar formalmente al cielo, a la tierra y a Dios como testigos contra ellos.'
    reason: lexical_alternative
  - marker: b
    text: El verbo griego también puede traducirse «nos venga según nuestros pecados» o «ejerce retribución sobre nosotros según nuestros pecados»; aquí se expresa castigo divino en respuesta al pecado.
    reason: lexical_alternative
lexical_decisions:
- source_word: μαρτυρόμεθα
  english_pob_choice: We call ... to witness against you
  chosen_spanish: Llamamos a testificar contra ustedes
  alternatives_spanish:
  - testificamos contra ustedes
  - llamamos como testigos contra ustedes
  lexicon: BDAG
  rationale: El griego tiene aquí un valor forense y formular, no solo declarativo. ‘Llamamos a testificar’ conserva la acción de invocar testigos con fuerza judicial, sin reducirlo a una mera afirmación.
- source_word: ὑμῖν
  english_pob_choice: against you
  chosen_spanish: contra ustedes
  alternatives_spanish:
  - a ustedes
  - para ustedes
  lexicon: BDAG
  rationale: Aunque el dativo literal podría ser ‘a ustedes’, el contexto de testimonio solemne y acusatorio exige en español una preposición adversativa explícita.
- source_word: τὸν οὐρανὸν καὶ τὴν γῆν
  english_pob_choice: heaven and earth
  chosen_spanish: el cielo y la tierra
  alternatives_spanish:
  - los cielos y la tierra
  - el cielo y la tierra
  lexicon: LSJ
  rationale: Se conserva el merismo cósmico habitual en español bíblico, con un artículo natural y sin añadir plural donde el griego usa singular.
- source_word: τὸν θεὸν ἡμῶν καὶ κύριον τῶν πατέρων ἡμῶν
  english_pob_choice: our God and Lord of our fathers
  chosen_spanish: nuestro Dios y Señor de nuestros padres
  alternatives_spanish:
  - nuestro Dios y el Señor de nuestros padres
  - nuestro Dios, el Señor de nuestros padres
  lexicon: BDAG
  rationale: Se mantiene la coordinación de títulos y el valor de κύριος como ‘Señor’, conforme al criterio del proyecto. ‘De nuestros padres’ conserva el trasfondo de alianza y herencia patriarcal.
- source_word: ἐκδικεῖ
  english_pob_choice: avenges
  chosen_spanish: nos venga
  alternatives_spanish:
  - se venga de nosotros
  - nos haga justicia castigando
  lexicon: BDAG
  rationale: ‘Nos venga’ preserva el campo de retribución/punición sin sonar tan pesado como una paráfrasis extensa. Mantiene la tensión entre vindicación y castigo presente en el verbo.
- source_word: κατὰ τὰς ἁμαρτίας ἡμῶν καὶ κατὰ τὰ ἁμαρτήματα τῶν πατέρων ἡμῶν
  english_pob_choice: according to our sins and according to the sins of our fathers
  chosen_spanish: según nuestros pecados y según los pecados de nuestros padres
  alternatives_spanish:
  - a causa de nuestros pecados y a causa de los pecados de nuestros padres
  - conforme a nuestros pecados y conforme a los pecados de nuestros padres
  lexicon: BDAG
  rationale: ‘Según’ reproduce de forma sobria la relación de medida/correspondencia de κατά + acusativo. Se unifican ἁμαρτίαι y ἁμαρτήματα como ‘pecados’, pues en este contexto no se distingue un matiz técnico diferenciador en español.
- source_word: ἵνα μὴ ποιήσῃ
  english_pob_choice: so that he may not act
  chosen_spanish: para que ... no actúe
  alternatives_spanish:
  - para que no haga
  - a fin de que no obre
  lexicon: BDAG
  rationale: ‘Actúe’ evita la dureza de ‘haga’ en español y corresponde al efecto del infinitivo con propósito negativo, en relación con la cláusula siguiente.
- source_word: κατὰ τὰ ῥήματα ταῦτα
  english_pob_choice: according to these words
  chosen_spanish: conforme a estas palabras
  alternatives_spanish:
  - según estas palabras
  - de acuerdo con estas palabras
  lexicon: LSJ
  rationale: ‘Conforme a estas palabras’ suena natural en español y conserva la relación directa con lo dicho previamente, sin alejarse del valor literal de κατά.
- source_word: ἐν τῇ ἡμέρᾳ τῇ σήμερον
  english_pob_choice: today
  chosen_spanish: hoy
  alternatives_spanish:
  - en este día
  - en el día de hoy
  lexicon: BDAG
  rationale: La expresión griega enfática se vierte con el adverbio natural ‘hoy’, que comunica el valor temporal sin cargar la frase.
theological_decisions:
- issue: Traducción de κύριος en un contexto de invocación solemne
  english_pob_reading: Lord
  chosen_spanish_reading: Señor
  alternative_spanish_readings:
  - Maestro
  - Dueño
  rationale: Se mantiene ‘Señor’ por coherencia con la política del proyecto y porque aquí el título está asociado a Dios y a los padres, con resonancia cultual y covenantal.
  doctrine_reference: 'DOCTRINE.md Contested terms: κύριος → Lord'
- issue: Fuerza retributiva de ἐκδικεῖ ... κατὰ τὰς ἁμαρτίας
  english_pob_reading: who avenges us according to our sins
  chosen_spanish_reading: que nos venga según nuestros pecados
  alternative_spanish_readings:
  - que nos castiga por nuestros pecados
  - que nos hace justicia según nuestros pecados
  rationale: La frase mantiene la idea de retribución divina ligada al pecado sin domesticarla. ‘Venga’ conserva la tensión entre venganza judicial y castigo merecido, que el contexto hace explícita.
  doctrine_reference: Divine judgment / retribution in deuterocanonical narrative speech
- issue: Función de la invocación de cielo, tierra y Dios como testigos
  english_pob_reading: we call heaven and earth and our God and Lord of our fathers to witness against you
  chosen_spanish_reading: Llamamos a testificar contra ustedes al cielo y a la tierra, y a nuestro Dios y Señor de nuestros padres
  alternative_spanish_readings:
  - Invocamos como testigos contra ustedes al cielo y a la tierra, y a nuestro Dios y Señor de nuestros padres
  - Damos testimonio contra ustedes ante el cielo, la tierra, nuestro Dios y Señor de nuestros padres
  rationale: La fórmula se entiende como una convocatoria formal de testigos, no como un simple acto devocional. La redacción conserva el carácter jurídico-solemne del pasaje.
  doctrine_reference: Forensic witness formula in biblical oath language
translation_notes:
  revision_awareness: La revisión inglesa reciente suavizó la coordinación de ‘Lord of our fathers’ y mantuvo la cláusula relativa como más natural en inglés. En español se conservó la coordinación explícita ‘nuestro Dios y Señor de nuestros padres’ para reflejar el doble título del griego sin introducir una apposición más interpretativa. También se mantuvo la fuerza forense de μαρτυρόμεθα mediante una construcción verbal que no reduce el pasaje a mera declaración.
  spanish_consistency_notes:
  - Se usó ‘Señor’ para κύριος de acuerdo con la terminología base del proyecto.
  - Se prefirió ‘pecados’ para ambas formas de ἁμαρτία/ἁμάρτημα por naturalidad y porque el español no exige distinguirlas aquí.
  - Se eligió ‘hoy’ para la expresión temporal enfática final, manteniendo el sentido idiomático.
  - La puntuación separa la invocación de testigos de la cláusula relativa de juicio para hacer clara la sintaxis del griego.
