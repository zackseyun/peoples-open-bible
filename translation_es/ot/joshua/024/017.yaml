base_translation:
  language: en
  yaml_path: translation/ot/joshua/024/017.yaml
  text: For Yahweh our God is the one who brought us and our fathers up from the land of Egypt[a], from the house of slavery, and who did these great signs before our eyes, and kept us in all the way in which we walked[b], and among all the peoples through whose midst we passed.
  footnotes:
  - marker: a
    text: Or 'from the house of slavery.' The Hebrew is literally 'from the house of slaves.'
    reason: lexical_alternative
  - marker: b
    text: Or 'these great wonders' or 'these great miracles.'
    reason: lexical_alternative
