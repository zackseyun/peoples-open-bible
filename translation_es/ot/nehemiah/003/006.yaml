    rationale: No es un error; «antigua» es comprensible y fiel al audit trail. No requiere adjudicación especial.
  revised_spanish_text: Y Joiada hijo de Paseah, y Meshullam hijo de Besodeía, repararon la Puerta Antigua[a]. Ellos pusieron sus vigas e instalaron sus puertas, sus cerrojos y sus barras.
