translation:
  language: es
  text: Escucharé lo que hablará Dios Yahvé, porque él hablará paz a su pueblo y a sus fieles[a]; pero no vuelvan[b] a la insensatez.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «sus santos» o «sus piadosos» para «sus fieles».
    reason: lexical_alternative
  - marker: b
    text: O «que no vuelvan a la necedad»; una alternativa menos probable entiende el sustantivo final como «confianza».
    reason: lexical_alternative
lexical_decisions:
- source_word: אֶשְׁמְעָה
  english_pob_choice: I will hear
  chosen_spanish: Escucharé
  alternatives_spanish:
  - Oiré
  - Me dispondré a escuchar
  lexicon: HALOT
  rationale: La forma cohortativa expresa intención o resolución. «Escucharé» comunica en español la disposición decidida del hablante sin sonar forzado ni perder el matiz voluntativo.
- source_word: מַה יְדַבֵּר
  english_pob_choice: what ... will speak
  chosen_spanish: lo que hablará
  alternatives_spanish:
  - lo que dirá
  - lo que hablará él
  lexicon: HALOT
  rationale: El imperfecto de דבר apunta a un habla venidera. «Lo que hablará» conserva esa orientación futura y mantiene la repetición verbal con el resto del versículo.
- source_word: הָאֵל יְהוָה
  english_pob_choice: God Yahweh
  chosen_spanish: Dios Yahvé
  alternatives_spanish:
  - el Dios Yahvé
  - Dios, Yahvé
  lexicon: HALOT
  rationale: El hebreo une el título אֵל con el nombre divino. «Dios Yahvé» conserva ambos elementos de manera natural en español y evita ocultar el nombre propio.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  lexicon: HALOT
  rationale: Se sigue el valor establecido del nombre divino en este proyecto. «Yahvé» preserva la referencia pactual del Tetragrámaton sin sustituirla por un título genérico.
- source_word: כִּי
  english_pob_choice: for
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  lexicon: HALOT
  rationale: 'Aquí introduce la razón del escuchar anticipado: Dios sí hablará paz. «Porque» expresa mejor en español esa relación explicativa.'
- source_word: שָׁלוֹם
  english_pob_choice: peace
  chosen_spanish: paz
  alternatives_spanish:
  - bienestar
  - plenitud
  lexicon: HALOT
  rationale: «Paz» es la equivalencia más directa y amplia; puede abarcar bienestar y armonía sin sobreinterpretar el alcance del término.
- source_word: עַמּוֹ
  english_pob_choice: his people
  chosen_spanish: su pueblo
  alternatives_spanish:
  - su gente
  lexicon: HALOT
  rationale: La construcción posesiva es directa. «Su pueblo» es la forma natural y bíblicamente transparente en español.
- source_word: חֲסִידָיו
  english_pob_choice: his faithful ones
  chosen_spanish: sus fieles
  alternatives_spanish:
  - sus santos
  - sus piadosos
  - sus leales
  lexicon: HALOT
  rationale: חֲסִידִים denota a los leales al pacto, los piadosos o fieles. «Sus fieles» preserva ese campo semántico sin cargar el término con asociaciones eclesiales posteriores.
- source_word: וְאַל יָשׁוּבוּ
  english_pob_choice: but let them not turn back
  chosen_spanish: pero no vuelvan
  alternatives_spanish:
  - y no vuelvan
  - pero no regresen
  lexicon: HALOT
  rationale: אַל con imperfecto expresa prohibición/exhortación. «Pero no vuelvan» reproduce con naturalidad esa fuerza exhortativa en español.
- source_word: לְכִסְלָה
  english_pob_choice: to folly
  chosen_spanish: a la insensatez
  alternatives_spanish:
  - a la necedad
  - a la insensatez/follía
  lexicon: HALOT
  rationale: El sustantivo suele significar necedad o insensatez. «Insensatez» suena claro y digno en español moderno, y expresa bien la idea de retorno a una conducta espiritualmente torpe.
theological_decisions:
- issue: Render of the divine name יְהוָה in a verse that combines title and name
  english_pob_reading: God Yahweh
  chosen_spanish_reading: Dios Yahvé
  alternative_spanish_readings:
  - el Dios Yahvé
  - Dios, Yahvé
  rationale: El texto hebreo dice literalmente «el Dios, Yahvé», combinando un título con el nombre propio. «Dios Yahvé» retiene ambos sin ocultar el Tetragrámaton ni convertirlo en un simple título.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Sense of חֲסִידָיו as a covenantal descriptor
  english_pob_reading: his faithful ones
  chosen_spanish_reading: sus fieles
  alternative_spanish_readings:
  - sus santos
  - sus piadosos
  - sus leales
  rationale: La palabra señala a los que pertenecen a Yahvé por fidelidad y piedad. «Sus fieles» conserva la relación de lealtad del pacto y evita estrechar el sentido a una categoría eclesiástica técnica.
  doctrine_reference: DOCTRINE.md Translation philosophy §6
- issue: Force of the final clause with אַל + imperfect
  english_pob_reading: but let them not turn back to folly
  chosen_spanish_reading: pero no vuelvan a la insensatez
  alternative_spanish_readings:
  - y no vuelvan a la necedad
  - pero que no regresen a la insensatez
  rationale: 'La partícula prohibitiva אַל con el imperfecto expresa una advertencia o exhortación, no solo una predicción. El español debe mantener ese tono admonitorio y la tensión del versículo: Dios hablará paz, pero el pueblo no debe recaer.'
  doctrine_reference: DOCTRINE.md Translation philosophy §3
translation_notes:
  revision_awareness: El último repaso del expediente no introdujo cambios; la concordancia general con la fuente y con la auditoría inglesa es alta, y se mantiene la decisión de conservar la fuerza exhortativa del final del versículo y el valor nominal de Yahvé.
  spanish_consistency_notes:
  - Se usa «Yahvé» de forma consistente para יְהוָה, sin máscara de «SEÑOR».
  - Se evita «santos» como opción principal para חֲסִידָיו, aunque se preserva como alternativa en nota por su valor lexical.
  - «Insensatez» se eligió para לְכִסְלָה por claridad moderna y por ajustarse al tono de advertencia del contexto.
