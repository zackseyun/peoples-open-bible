base_translation:
  language: en
  yaml_path: translation/ot/nahum/003/018.yaml
  text: Your shepherds slumber[a], O king of Assyria; your nobles lie down. Your people are scattered on the mountains[d][c][b], and there is no one to gather them.
  footnotes:
  - marker: a
    text: Or 'sleep' for 'slumber'; the Hebrew image may suggest negligent or incapacitated leaders.
    reason: lexical_alternative
  - marker: b
    text: '''Your shepherds'' is a metaphor for Assyria''s rulers or leaders.'
    reason: cultural_note
  - marker: c
    text: Or 'your mighty ones dwell/rest.' The Hebrew verb can mean 'dwell,' but here likely continues the image of leaders lying inactive.
    reason: alternative_reading
  - marker: d
    text: The Hebrew behind 'are scattered' is difficult; the sense is supported by the following line, 'there is no one to gather them.'
    reason: textual_variant
