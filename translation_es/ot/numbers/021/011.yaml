    issue: La expresión «hacia el nacimiento del sol» es poco idiomática en español.
    rationale: Aunque intenta reflejar la imaginería de מִמִּזְרַח הַשָּׁמֶשׁ, en español suena forzada. «Hacia donde sale el sol» o «hacia el oriente» comunican mejor la orientación oriental sin perder el matiz figurativo.
  - severity: low
    issue: La preposición/direccionalidad de «hacia» puede leerse como movimiento en vez de localización oriental.
    rationale: En contexto el sintagma final modifica la ubicación del campamento respecto de Moab. Una formulación más idiomática minimiza esa posible ambigüedad.
  revised_spanish_text: Salieron de Obot y acamparon en Iyé-abarim, en el desierto que está frente a Moab[a], hacia donde sale el sol.
  revised_footnotes:
