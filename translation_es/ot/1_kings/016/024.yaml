translation:
  language: es
  text: Compró la colina de Samaria de Shemer por dos talentos de plata[b], edificó sobre la colina y llamó a la ciudad que edificó Samaria[a], en honor al nombre de Shemer, el dueño de la colina.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más literalmente: «y llamó el nombre de la ciudad que edificó Samaria, por el nombre de Shemer, el dueño de la colina».'
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «dos talentos de plata», una suma grande basada en el peso de metal precioso.'
    reason: cultural_note
lexical_decisions:
- source_word: וַיִּקֶן
  english_pob_choice: He bought
  chosen_spanish: Compró
  alternatives_spanish:
  - Adquirió
  - Compró
  lexicon: HALOT
  rationale: קנה en este contexto expresa adquisición mediante pago. En español, «compró» es natural, preciso y conserva el sentido comercial del verbo sin añadir matices indebidos.
- source_word: הָהָר
  english_pob_choice: the hill
  chosen_spanish: la colina
  alternatives_spanish:
  - el monte
  - la colina
  lexicon: HALOT
  rationale: El hebreo הַר puede ser «monte» o «colina». Como se trata del sitio de una ciudad, «colina» suena más idiomático en español y sigue el criterio contextual de la versión inglesa.
- source_word: שֹׁמְרוֹן
  english_pob_choice: Samaria
  chosen_spanish: Samaria
  alternatives_spanish:
  - Samaria
  lexicon: nombre propio / transliteración tradicional
  rationale: Es el nombre propio del lugar; en español bíblico, «Samaria» es la forma establecida y clara.
- source_word: מֵאֵת שֶׁמֶר
  english_pob_choice: from Shemer
  chosen_spanish: a Shemer
  alternatives_spanish:
  - de Shemer
  - a Shemer
  lexicon: HALOT
  rationale: La preposición marca al vendedor o fuente de adquisición. En español, «a Shemer» tras «compró» conserva el valor transaccional directo; «de Shemer» también sería posible, pero «a» refleja mejor la venta como destinatario del pago.
- source_word: בְּכִכְּרַיִם כָּסֶף
  english_pob_choice: for two talents of silver
  chosen_spanish: por dos talentos de plata
  alternatives_spanish:
  - por dos talentos de plata
  - por dos siclos de plata
  lexicon: HALOT
  rationale: כִּכָּר en lenguaje monetario es «talento», una unidad grande de peso/valor en metales preciosos. «Talentos» preserva el valor cuantitativo y evita el error lexical de «siclos».
- source_word: וַיִּבֶן אֶת הָהָר
  english_pob_choice: built on the hill
  chosen_spanish: edificó sobre la colina
  alternatives_spanish:
  - edificó sobre la colina
  - construyó sobre la colina
  - edificó la colina
  lexicon: HALOT
  rationale: La expresión literal «construyó la colina» sería extraña en español. «Edificó sobre la colina» conserva la acción de construcción sin sobreespecificar lo que se levantó, en línea con el sentido contextual.
- source_word: וַיִּקְרָא אֶת שֵׁם הָעִיר
  english_pob_choice: and called the name of the city
  chosen_spanish: y llamó el nombre de la ciudad
  alternatives_spanish:
  - y llamó el nombre de la ciudad
  - y nombró la ciudad
  lexicon: HALOT
  rationale: La fórmula hebrea de nombrar se mantiene de forma bastante literal para conservar el registro narrativo y la estructura del original. «Nombró la ciudad» sería más idiomático, pero menos transparente.
- source_word: אֲשֶׁר בָּנָה
  english_pob_choice: that he built
  chosen_spanish: que edificó
  alternatives_spanish:
  - que edificó
  - que había edificado
  lexicon: HALOT
  rationale: El perfecto narrativo admite pasado simple en español. «Edificó» mantiene la secuencia de acciones sin introducir una anterioridad no requerida.
- source_word: עַל שֵׁם
  english_pob_choice: after the name of
  chosen_spanish: por el nombre de
  alternatives_spanish:
  - por el nombre de
  - a nombre de
  - según el nombre de
  lexicon: HALOT
  rationale: La frase indica que la ciudad recibió su nombre en referencia a Shemer. «Por el nombre de» comunica esa relación de denominación sin sonar rígido; también deja claro que el nombre de la ciudad se deriva del de Shemer.
- source_word: אֲדֹנֵי הָהָר
  english_pob_choice: the owner of the hill
  chosen_spanish: el dueño de la colina
  alternatives_spanish:
  - el dueño de la colina
  - el señor de la colina
  - el propietario de la colina
  lexicon: HALOT
  rationale: אדון aquí tiene sentido de posesión/propiedad, no de señorío honorífico o teológico. «Dueño» comunica mejor en español moderno la relación legal de propiedad.
translation_notes:
  revision_awareness: 'El texto español sigue la lectura estable del hebreo masorético y el auditable del POB inglés: compra, edificación sobre la colina, y nombramiento de la ciudad en referencia a Shemer. No se detectaron revisiones textuales relevantes en el pasaje fuente.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma general del proyecto, pero este versículo no contiene el nombre divino.
  - «Talentos» se usa en su sentido monetario antiguo, no como habilidad.
  - «Dueño» traduce אדון en sentido de propiedad, evitando «señor» por su posible carga honorífica o teológica.
  - 'La secuencia verbal conserva el ritmo narrativo del hebreo: compró / edificó / llamó.'
