translation:
  language: es
  text: Y ahora, por favor, deja que tu siervo permanezca [a] en lugar del muchacho como esclavo de mi señor, y que el muchacho suba[b] con sus hermanos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: "en lugar del muchacho".'
    reason: lexical_alternative
  - marker: b
    text: Hebreo "suba", una manera común de describir el viaje desde Egipto hacia Canaán.
    reason: cultural_note
lexical_decisions:
- source_word: וְעַתָּה
  english_pob_choice: So now
  chosen_spanish: Y ahora
  alternatives_spanish:
  - Así que ahora
  - Ahora pues
  lexicon: HALOT
  rationale: Mantiene la transición discursiva y temporal del hebreo sin sonar forzado en español. El valor de enlace queda claro con una fórmula natural y sobria.
- source_word: יֵשֶׁב נָא
  english_pob_choice: please let ... remain
  chosen_spanish: por favor, deja que ... permanezca
  alternatives_spanish:
  - por favor, deja que ... se quede
  - te ruego que ... permanezca
  lexicon: HALOT
  rationale: El jussivo con נָא expresa ruego respetuoso. 'Permanezca' conserva la idea de quedarse en lugar de otro, sin reducirla solo a una estancia casual.
- source_word: עַבְדְּךָ
  english_pob_choice: your servant
  chosen_spanish: tu siervo
  alternatives_spanish:
  - tu esclavo
  - tu servidor
  lexicon: HALOT
  rationale: Aquí la auto-designación deferente de Judá ante José funciona como fórmula cortesana. 'Siervo' comunica mejor el registro reverente en español que 'esclavo', que sonaría demasiado duro para este saludo formal.
- source_word: תַּחַת הַנַּעַר
  english_pob_choice: instead of the boy
  chosen_spanish: en lugar del muchacho
  alternatives_spanish:
  - en vez del muchacho
  - como sustituto del muchacho
  lexicon: HALOT
  rationale: תחת tiene fuerza sustitutiva clara en este contexto. 'En lugar de' es la forma española más natural y fiel para esa sustitución.
- source_word: הַנַּעַר
  english_pob_choice: the boy
  chosen_spanish: el muchacho
  alternatives_spanish:
  - el joven
  - el muchacho joven
  lexicon: HALOT
  rationale: '''Muchacho'' refleja la manera afectiva y protectora con que Judá se refiere a Benjamín. ''Joven'' sería correcto, pero menos expresivo en este pasaje.'
- source_word: עֶבֶד
  english_pob_choice: as a slave
  chosen_spanish: como esclavo
  alternatives_spanish:
  - como siervo
  - en condición de esclavo
  lexicon: HALOT
  rationale: Aquí עבד describe una condición real de servidumbre en la casa de José, no solo una fórmula de cortesía. Por eso se conserva 'esclavo' para no diluir el peso del ofrecimiento.
- source_word: לַאדֹנִי
  english_pob_choice: to my lord
  chosen_spanish: de mi señor
  alternatives_spanish:
  - para mi señor
  - a mi señor
  lexicon: HALOT
  rationale: En español, con 'permanecer como esclavo' la relación se expresa con naturalidad como pertenencia o servicio 'de' mi señor. 'Señor' aquí traduce el título humano de respeto y no el nombre divino.
- source_word: וְהַנַּעַר יַעַל
  english_pob_choice: and let the boy go up
  chosen_spanish: y que el muchacho suba
  alternatives_spanish:
  - y que el muchacho vaya arriba
  - y que el muchacho vuelva
  lexicon: HALOT
  rationale: Se conserva 'suba' para reflejar עלה y su dirección histórica desde Egipto hacia Canaán. 'Volver' interpretaría más de lo que el verbo dice por sí solo.
- source_word: עִם אֶחָיו
  english_pob_choice: with his brothers
  chosen_spanish: con sus hermanos
  alternatives_spanish:
  - con sus hermanos de sangre
  - con los demás hermanos
  lexicon: HALOT
  rationale: Es una correspondencia directa y clara del término familiar. 'Hermanos' mantiene la referencia narrativa sin añadir matices ajenos al hebreo.
theological_decisions:
- issue: Tratamiento del título אדֹנִי / 'my lord' como fórmula humana de respeto
  english_pob_reading: to my lord
  chosen_spanish_reading: de mi señor
  alternative_spanish_readings:
  - a mi señor
  - para mi señor
  rationale: El pasaje se dirige a José con respeto cortesano. En español 'señor' mantiene el título humano sin confusión con Yahvé, y el contexto evita cualquier lectura devocional.
  doctrine_reference: Tratamiento de títulos humanos en narrativa; distinción entre respeto humano y nombre divino
- issue: Valor sustitutivo y representacional de תַּחַת הַנַּעַר
  english_pob_reading: instead of the boy
  chosen_spanish_reading: en lugar del muchacho
  alternative_spanish_readings:
  - en vez del muchacho
  - como sustituto del muchacho
  rationale: 'La frase expresa sustitución real: Judá ofrece ocupar el lugar de Benjamín. ''En lugar de'' conserva esa carga representacional sin exagerar ni suavizar el intercambio propuesto.'
  doctrine_reference: Sustitución narrativa; responsabilidad vicaria en el relato
- issue: Retención de 'esclavo' para עֶבֶד
  english_pob_reading: as a slave
  chosen_spanish_reading: como esclavo
  alternative_spanish_readings:
  - como siervo
  - en condición de esclavo
  rationale: El texto no presenta solo una cortesía verbal, sino una aceptación de servidumbre vinculada al castigo y al destino de Benjamín. 'Esclavo' preserva la tensión moral y social del ofrecimiento.
  doctrine_reference: Lexicografía de עבד; servidumbre en contexto narrativo
translation_notes:
  revision_awareness: 'Concordamos con el audit trail inglés en el valor de transición de וְעַתָּה, en el sentido sustitutivo de תַּחַת, en la conservación de עֶבֶד como ''esclavo'' por su fuerza semántica, y en la dirección espacial de יַעַל como ''suba''. La revisión más sensible en español fue עַבְדְּךָ: el inglés usa ''your servant'', pero en un registro hispano bíblico y cortesano ''tu siervo'' comunica mejor deferencia sin perder la relación de subordinación. También se ajustó ''to my lord'' a ''de mi señor'' para una sintaxis más natural con ''permanezca como esclavo''.'
  spanish_consistency_notes:
  - Se mantiene 'muchacho' para נַעַר por consistencia con el tono afectivo del pasaje.
  - Se reserva 'señor' para el título humano de José; no se usa la convención litúrgica 'SEÑOR' porque aquí no hay referencia al nombre divino.
  - Se conserva 'suba' para עָלָה conforme al trasfondo narrativo de Egipto hacia Canaán.
