revisions:
- from: 'Y les dijeron[a]: «Así dice Ezequías: Este día es día de angustia, reprensión y afrenta; porque los hijos han llegado hasta el punto del parto[c][b], pero no hay fuerza para dar a luz».'
  to: 'Y le dijeron: «Así dice Ezequías: Este día es día de angustia, reprensión y afrenta[c]; porque los niños han llegado hasta el punto del parto[a][b], pero no hay fuerza para dar a luz».'
  rationale: Se corrige el anclaje de notas para que [a] y [b] aparezcan sobre la frase que explican, se mueve [c] a «afrenta» donde corresponde, y se ajusta בָנִים a «los niños» para seguir la racionalidad documentada del POB de evitar especificidad masculina en la metáfora de parto. También se mejora la naturalidad de la nota cultural.
