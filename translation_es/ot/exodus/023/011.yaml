    text: O ‘la soltarás y la abandonarás’; los verbos hebreos subrayan que se suspende el cultivo normal y se deja la tierra sin labranza en el séptimo año.
    reason: lexical_alternative
  - marker: b
    text: Literalmente, ‘la bestia del campo’.
    reason: lexical_alternative
