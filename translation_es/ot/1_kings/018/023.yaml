  spanish_quality_summary: El texto es mayormente claro y digno, pero 'no pongan fuego' y 'no pondré fuego' resultan poco idiomáticos en español bíblico natural. Añadir 'debajo' mejora la legibilidad sin sobreinterpretar, especialmente porque la nota ya trata este punto y el inglés POB documentó explícitamente esa suplencia contextual. También conviene alinear la nota con la forma revisada para explicar que 'debajo de él' se sobreentiende por el contexto sacrificial aunque no aparezca de forma explícita en el hebreo.
