translation:
  language: es
  text: 'Pero Judá lo vendió en secreto a los ismaelitas.


    Por tanto Simeón y yo lo vendimos a los ismaelitas[a] por treinta piezas de oro; y, ocultando diez, mostramos veinte a nuestros hermanos.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Algunos testigos atribuyen la venta a Judá en secreto; otra rama dice: ''Por tanto Simeón y yo lo vendimos a los ismaelitas por treinta piezas de oro.'' La traducción presenta ambas formas tal como el griego las conserva.'
    reason: textual_variant
lexical_decisions:
- source_word: κρυφῆ
  english_pob_choice: secretly
  chosen_spanish: en secreto
  alternatives_spanish:
  - secretamente
  - a escondidas
  lexicon: BDAG
  rationale: Locución adverbial natural en español que conserva el matiz clandestino.
- source_word: πεπράκαμεν
  english_pob_choice: we sold
  chosen_spanish: vendimos
  alternatives_spanish:
  - habíamos vendido
  lexicon: BDAG
  rationale: El pretérito perfecto griego con valor narrativo se rinde naturalmente con pretérito simple en español.
- source_word: τριάκοντα χρυσίων
  english_pob_choice: thirty pieces of gold
  chosen_spanish: treinta piezas de oro
  alternatives_spanish:
  - treinta monedas de oro
  - treinta siclos de oro
  lexicon: BDAG
  rationale: Mantiene la dicción del testimonio griego ('piezas de oro'), no de plata como en el relato canónico de Génesis.
- source_word: ἀποκρύψαντες
  english_pob_choice: after hiding
  chosen_spanish: ocultando
  alternatives_spanish:
  - escondiendo
  - tras esconder
  lexicon: BDAG
  rationale: El gerundio en español traslada con naturalidad el participio aoristo griego de circunstancia.
translation_notes:
  revision_awareness: El capítulo preserva varias formas textuales del episodio de la venta de José; se traducen ambas sin armonizarlas, conforme a la decisión teológica del POB.
