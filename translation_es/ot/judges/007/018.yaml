translation:
  language: es
  text: 'Cuando yo toque el cuerno de carnero[a], yo y todos los que están conmigo, entonces ustedes también tocarán los cuernos alrededor de todo el campamento, y dirán[b]: «¡Por Yahvé y por Gedeón!»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: שׁוֹפָר se refiere a un cuerno, con frecuencia de carnero, y no a una trompeta metálica.
    reason: cultural_note
  - marker: b
    text: 'Las versiones tradicionales suelen leer: «¡La espada de Yahvé y de Gedeón!», influidas por la redacción cercana de Jueces 7:20. Pero el hebreo de este versículo dice sencillamente: «Por Yahvé y por Gedeón».'
    reason: alternative_reading
lexical_decisions:
- source_word: תָקַעְתִּי / תְקַעְתֶּם
  english_pob_choice: blow
  chosen_spanish: toquemos / tocarán
  alternatives_spanish:
  - haremos sonar
  - soplarán
  lexicon: HALOT
  rationale: Con שׁוֹפָר, תקע significa hacer sonar un cuerno. En español, «tocar» es el verbo natural y fiel para un instrumento de viento o cuerno, sin perder la acción concreta.
- source_word: שׁוֹפָר / שׁוֹפָרוֹת
  english_pob_choice: ram’s horn / horns
  chosen_spanish: cuerno de carnero / cuernos
  alternatives_spanish:
  - shofar / shofares
  - trompeta / trompetas
  lexicon: HALOT
  rationale: שׁוֹפָר designa un cuerno, a menudo de carnero, no una trompeta metálica. «Cuerno de carnero» conserva el sentido concreto; en plural, «cuernos» suena natural y mantiene la referencia material.
- source_word: אָנֹכִי וְכָל אֲשֶׁר אִתִּי
  english_pob_choice: I and all who are with me
  chosen_spanish: yo y todos los que están conmigo
  alternatives_spanish:
  - yo y todos los que están a mi lado
  - yo y todos los que me acompañan
  lexicon: HALOT
  rationale: La frase identifica a Gedeón con sus hombres. «Todos los que están conmigo» es idiomático en español y reproduce bien la referencia personal del hebreo.
- source_word: גַּם אַתֶּם
  english_pob_choice: you also
  chosen_spanish: ustedes también
  alternatives_spanish:
  - también ustedes
  - ustedes igualmente
  lexicon: HALOT
  rationale: גַּם añade inclusión y énfasis. «También» preserva ese valor sin exagerarlo.
- source_word: סְבִיבוֹת כָּל הַמַּחֲנֶה
  english_pob_choice: all around the whole camp
  chosen_spanish: alrededor de todo el campamento
  alternatives_spanish:
  - por todo alrededor del campamento
  - rodeando todo el campamento
  lexicon: HALOT
  rationale: La expresión comunica un cerco completo. «Alrededor de todo el campamento» mantiene la idea espacial de סְבִיבוֹת y כָּל con español natural.
- source_word: וַאֲמַרְתֶּם
  english_pob_choice: say
  chosen_spanish: dirán
  alternatives_spanish:
  - gritarán
  - exclamarán
  lexicon: HALOT
  rationale: El verbo hebreo es el ordinario «decir». En este contexto de guerra puede implicar una proclamación fuerte, pero «dirán» evita añadir intensidad no explícita en el texto.
- source_word: לַיהוָה
  english_pob_choice: For Yahweh
  chosen_spanish: Por Yahvé
  alternatives_spanish:
  - Para Yahvé
  - En favor de Yahvé
  lexicon: HALOT
  rationale: Siguiendo la terminología del proyecto, יהוה se traduce «Yahvé» en el texto principal. La preposición ל en este grito de batalla expresa pertenencia, lealtad o consigna; «Por» reproduce bien esa fuerza en español.
- source_word: וּלְגִדְעוֹן
  english_pob_choice: and for Gideon
  chosen_spanish: y por Gedeón
  alternatives_spanish:
  - y para Gedeón
  - y con Gedeón
  lexicon: HALOT
  rationale: El paralelo con לַיהוָה pide mantener la misma preposición en español. «Por Gedeón» conserva el valor de consigna/alineamiento del hebreo mejor que omitir la preposición.
theological_decisions:
- issue: Representación del nombre divino יהוה en el grito de batalla
  english_pob_reading: For Yahweh and for Gideon!
  chosen_spanish_reading: ¡Por Yahvé y por Gedeón!
  alternative_spanish_readings:
  - ¡Para Yahvé y para Gedeón!
  - ¡Por el SEÑOR y por Gedeón!
  rationale: El texto hebreo usa explícitamente el Tetragrama, y la política del proyecto pide «Yahvé» en el texto principal. La preposición «por» conserva mejor el valor de consigna/lealtad del lamed en este contexto que «para».
  doctrine_reference: 'DOCTRINE.md: Contested terms — יהוה / YHWH → Yahvé'
translation_notes:
  revision_awareness: 'La comparación con el audit trail inglés confirma el acuerdo alto y sin cambios sustantivos en la lectura: se mantiene la imagen concreta del cuerno, la estructura paralela de la consigna y el valor del Tetragrama como Yahvé en el texto principal. Se adopta «por» para reflejar la fuerza de la consigna y la lealtad implícita del hebreo.'
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» conforme a la terminología del proyecto para יהוה.
  - Se eligió «Gedeón» como forma castellana estable del nombre propio.
  - Se evitó «trompeta» porque debilita la concreción del שׁוֹפָר.
  - Se preservó la simetría «por Yahvé y por Gedeón» para reflejar el paralelismo hebreo.
