  from: and of its perfection there is no explanation.
  to: and of its perfection there is no description.
  rationale: 'The Greek word ἐξήγησις here carries the sense of ''description,'' ''narrative,'' or ''exposition'' (BDAG), meaning that love''s perfection cannot be fully expressed in words. In modern English, ''there is no explanation'' implies a lack of a reason or cause (e.g., ''we cannot explain why it is perfect''), which distorts the author''s meaning. | Adjudicator: The reviewer is correct on the lexical evidence. BDAG explicitly categorizes 1 Clement 50:1 under the first definition of ἐξήγησις (''narrative, description'') and translates this exact phrase as ''there'
