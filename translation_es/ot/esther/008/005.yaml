translation:
  language: es
  text: 'Y ella dijo: «Si al rey le parece bien, y si he hallado favor delante de él, y si el asunto es apropiado delante del rey, y si yo soy agradable a sus ojos, que se escriba para revocar[a] las cartas concebidas por Amán, hijo de Hamedata, el agagueo[b], que escribió para destruir a los judíos que están en todas las provincias del rey».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «revertir»; el verbo hebreo puede significar «volver atrás» o «revocar» en este contexto administrativo.
    reason: lexical_alternative
  - marker: b
    text: Literalmente, «las cartas, la trama de Amán»; la traducción «las cartas concebidas por Amán» hace explícito que las cartas encarnaban su plan.
    reason: lexical_alternative
lexical_decisions:
- source_word: אִם עַל הַמֶּלֶךְ טוֹב
  english_pob_choice: If it seems good to the king
  chosen_spanish: Si al rey le parece bien
  alternatives_spanish:
  - Si es bueno al rey
  - Si le agrada al rey
  lexicon: HALOT
  rationale: En español, «le parece bien» conserva el giro cortesano e impersonal del hebreo sin sonar rígido. Mantiene la evaluación desde la perspectiva del rey, como en la lectura inglesa auditada.
- source_word: מָצָאתִי חֵן לְפָנָיו
  english_pob_choice: I have found favor before him
  chosen_spanish: he hallado favor delante de él
  alternatives_spanish:
  - he hallado gracia delante de él
  - he hallado favor a sus ojos
  lexicon: HALOT
  rationale: «Favor» es el valor principal de חֵן en contexto de petición real. «Delante de él» sigue de cerca לְפָנָיו y preserva la formulación relacional.
- source_word: וְכָשֵׁר הַדָּבָר לִפְנֵי הַמֶּלֶךְ
  english_pob_choice: and if the matter is proper before the king
  chosen_spanish: y si el asunto es apropiado delante del rey
  alternatives_spanish:
  - y si el asunto es correcto delante del rey
  - y si la propuesta es aceptable al rey
  lexicon: HALOT
  rationale: כָשֵׁר expresa que algo es apto, adecuado o conveniente. «Apropiado» comunica esa idea con naturalidad en castellano, mientras «asunto» conserva דָּבָר sin convertirlo prematuramente en «propuesta».
- source_word: וְטוֹבָה אֲנִי בְּעֵינָיו
  english_pob_choice: and if I am pleasing in his eyes
  chosen_spanish: y si yo soy agradable a sus ojos
  alternatives_spanish:
  - y si soy buena a sus ojos
  - y si gozo de su favor
  lexicon: HALOT
  rationale: La imagen idiomática de «ser agradable a sus ojos» reproduce bien el hebreo y evita reducirla solo a una abstracción como «favor».
- source_word: יִכָּתֵב
  english_pob_choice: let it be written
  chosen_spanish: que se escriba
  alternatives_spanish:
  - que se redacte
  - sea escrito
  lexicon: HALOT
  rationale: El pasivo/jusivo hebreo se vierte naturalmente con «que se escriba», que conserva la petición formal sin añadir un sujeto explícito.
- source_word: לְהָשִׁיב
  english_pob_choice: to revoke
  chosen_spanish: revocar
  alternatives_spanish:
  - revertir
  - anular
  lexicon: HALOT
  rationale: El contexto administrativo exige una solución jurídica clara. «Revocar» es el equivalente más preciso en español para el acto de dejar sin efecto un escrito o decreto, y refleja la lectura auditada de la POB.
- source_word: הַסְּפָרִים
  english_pob_choice: the letters
  chosen_spanish: las cartas
  alternatives_spanish:
  - los documentos
  - los escritos
  lexicon: HALOT
  rationale: En Ester el término se refiere a comunicaciones oficiales enviadas por el imperio. «Cartas» es el equivalente natural en español y se alinea con la tradición léxica del pasaje.
- source_word: מַחֲשֶׁבֶת הָמָן
  english_pob_choice: devised by Haman
  chosen_spanish: ideadas por Amán
  alternatives_spanish:
  - el plan de Amán
  - la trama de Amán
  lexicon: HALOT
  rationale: La expresión hebrea puede describir el diseño o el plan de Amán. «Ideadas por Amán» mantiene la idea de concepción estratégica y hace explícito que las cartas encarnaban su trama, como en el razonamiento auditado en inglés.
- source_word: לְאַבֵּד
  english_pob_choice: to destroy
  chosen_spanish: para destruir
  alternatives_spanish:
  - para aniquilar
  - para exterminar
  lexicon: HALOT
  rationale: «Destruir» es la traducción amplia y sobria que mantiene el alcance del verbo sin intensificarlo más allá de lo requerido por el texto.
- source_word: הַיְּהוּדִים אֲשֶׁר בְּכָל מְדִינוֹת הַמֶּלֶךְ
  english_pob_choice: the Jews who are in all the provinces of the king
  chosen_spanish: a los judíos que están en todas las provincias del rey
  alternatives_spanish:
  - a los judíos que están en todas las provincias del reino
  - a los judíos por todas las provincias del rey
  lexicon: HALOT
  rationale: Se conserva la relativa y el alcance distributivo de «en todas las provincias del rey», evitando suavizar el texto con una paráfrasis más libre.
- source_word: הָאֲגָגִי
  english_pob_choice: the Agagite
  chosen_spanish: el agagueo
  alternatives_spanish:
  - el agagueíta
  - el descendiente de Agag
  lexicon: HALOT
  rationale: «Agagueo» reproduce de manera transparente el etnónimo tradicional y evita explicar de más el término hebreo. Se conserva además el valor distintivo del título.
theological_decisions:
- issue: Tratamiento del nombre divino en el contexto del libro de Ester
  english_pob_reading: No explicit divine name appears in this verse.
  chosen_spanish_reading: No se introduce ninguna mención divina en el texto principal.
  alternative_spanish_readings:
  - Añadir una nota sobre la ausencia del nombre divino
  - No hacer observación alguna
  rationale: El versículo no contiene יהוה ni una alusión inmediata que requiera ajuste terminológico. Por eso no se añade lenguaje teológico ajeno al verso.
  doctrine_reference: Textual fidelity; no doctrinal issue specific to the verse
- issue: 'Función del pedido real: revocar o revertir las cartas'
  english_pob_reading: to revoke the letters
  chosen_spanish_reading: revocar las cartas
  alternative_spanish_readings:
  - revertir las cartas
  - anular las cartas
  rationale: La POB inglesa adoptó «revoke» como equivalente administrativo. En español, «revocar» conserva con precisión el efecto jurídico de dejar sin validez el decreto sin introducir más contenido que el del hebreo y la nota inglesa.
  doctrine_reference: Administrative/legal semantics in the narrative
translation_notes:
  revision_awareness: Se refleja el estado de alta concordancia del audit trail inglés y no se incorporan revisiones pendientes; la redacción española sigue la decisión óptima-equivalente ya estabilizada.
  spanish_consistency_notes:
  - Se mantiene «favor» para חֵן, «agriable/agradable a sus ojos» para la idiomática de aprobación, y «revocar» para לְהָשִׁיב en el contexto administrativo.
  - Se usa «cartas» para הַסְּפָרִים conforme al uso narrativo de Ester y para coherencia interna con otros pasajes del libro.
  - No se añade terminología eclesiástica ni se sustituye el registro cortesano del hebreo por formulaciones modernas demasiado coloquiales.
