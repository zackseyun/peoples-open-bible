translation:
  language: es
  text: Porque él sacia el alma[a] sedienta, y llena al alma hambrienta con cosas buenas[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «persona», «ser» o «vida» para נֶפֶשׁ; el término suele referirse al ser viviente entero, no solo a una parte inmaterial.
    reason: lexical_alternative
  - marker: b
    text: O «con lo bueno».
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  lexicon: HALOT
  rationale: Introduce la explicación causal o motivación del contexto inmediato. «Porque» conserva bien el valor explicativo de כִּי en español bíblico actual sin sonar arcaico.
- source_word: הִשְׂבִּיעַ
  english_pob_choice: satisfies
  chosen_spanish: sacia
  alternatives_spanish:
  - satisface
  - hace que quede satisfecho
  lexicon: HALOT
  rationale: El hifil de שבע expresa causar saciedad. «Sacia» es natural en español, conserva la imagen de quedar plenamente colmado y funciona bien con el paralelo de hambre/sed.
- source_word: נֶפֶשׁ
  english_pob_choice: soul
  chosen_spanish: alma
  alternatives_spanish:
  - persona
  - vida
  - ser
  lexicon: HALOT
  rationale: La POB inglesa eligió «soul» para preservar el peso poético y antropológico de נֶפֶשׁ. En español, «alma» es el equivalente más natural y reverente para mantener ese rango sin reducirlo a un mero «persona».
- source_word: שֹׁקֵקָה
  english_pob_choice: thirsty
  chosen_spanish: sedienta
  alternatives_spanish:
  - ansiando
  - ávida
  - reseca
  lexicon: HALOT
  rationale: El participio describe un deseo intenso o una sed figurada. «Sedienta» preserva la metáfora concreta y mantiene el paralelismo con «hambrienta».
- source_word: וְנֶפֶשׁ
  english_pob_choice: and ... soul
  chosen_spanish: y ... al alma
  alternatives_spanish:
  - y ... a la persona
  - y ... al ser
  lexicon: HALOT
  rationale: Se conserva la repetición de נֶפֶשׁ en ambos miembros del paralelismo. En español, la segunda aparición se integra con una construcción fluida que mantiene el ritmo poético.
- source_word: רְעֵבָה
  english_pob_choice: hungry
  chosen_spanish: hambrienta
  alternatives_spanish:
  - hambrienta de comida
  - famélica
  lexicon: HALOT
  rationale: Adjetivo directo que corresponde a «hungry» y equilibra el binomio con «sedienta».
- source_word: מִלֵּא
  english_pob_choice: fills
  chosen_spanish: llena
  alternatives_spanish:
  - ha llenado
  - colma
  lexicon: HALOT
  rationale: El piel de מלא significa llenar. El presente «llena» conserva el valor proverbial/general del verso y su fuerza poética.
- source_word: טוֹב
  english_pob_choice: good things
  chosen_spanish: de bien
  alternatives_spanish:
  - con cosas buenas
  - con lo bueno
  - de cosas buenas
  lexicon: HALOT
  rationale: El hebreo permite un objeto de cualidad/beneficio más que un sustantivo concreto. «De bien» refleja esa amplitud semántica y evita concretar indebidamente en «cosas buenas». En español bíblico, «llenar de bien» comunica provisión benefactora de forma clara.
theological_decisions:
- issue: Sentido antropológico de נֶפֶשׁ
  english_pob_reading: Rendered as 'soul' in both cola
  chosen_spanish_reading: alma en ambos cola
  alternative_spanish_readings:
  - persona
  - vida
  - ser
  rationale: La POB mantiene «soul» para no perder la fuerza poética ni imponer una antropología técnica. «Alma» preserva esa resonancia en español y sigue siendo suficientemente amplia para referir a la persona entera o al interior humano necesitado.
  doctrine_reference: Anthropology in poetic Hebrew; cf. lexical range of נֶפֶשׁ
- issue: Valor de טוֹב como provisión
  english_pob_reading: '''with good things'' / ''what is good'''
  chosen_spanish_reading: de bien
  alternative_spanish_readings:
  - con lo bueno
  - con cosas buenas
  - con bondad
  rationale: El verso no define un objeto material específico, sino una provisión benéfica y satisfactoria. «De bien» conserva la amplitud del hebreo y evita una lectura más estrecha de la necesaria.
  doctrine_reference: Providence and beneficent provision in wisdom/poetic texts
translation_notes:
  revision_awareness: 'La versión española sigue de cerca el audit trail inglés: conserva el paralelismo de נֶפֶשׁ, mantiene el valor general/presentativo de los verbos y evita estrechar טוֹב a un sustantivo concreto. Se ajusta «soul» a «alma» por naturalidad y fidelidad poética en español.'
  spanish_consistency_notes:
  - Se preservó el paralelismo de dos miembros coordinados con el mismo sujeto implícito.
  - Se evitó «SEÑOR» o fórmulas de sustitución, ya que aquí no aparece el Tetragrámaton.
  - «Alma» se usa de forma coherente con la amplitud semántica de נֶפֶשׁ en poesía hebrea.
  - La construcción «llena de bien» sigue siendo idiomática en español bíblico moderno y no introduce una paráfrasis excesiva.
