translation:
  language: es
  text: 'Entonces Samuel dijo a todo Israel: «He aquí, he escuchado[a] su voz en todo lo que me han dicho, y he puesto[b] un rey sobre ustedes».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «he obedecido su voz» o «he hecho caso a su petición». El modismo hebreo «escuchar la voz» también puede incluir la idea de acceder a lo que se pidió.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «he nombrado un rey sobre ustedes» o «he hecho rey a uno sobre ustedes». El verbo hebreo es causativo: instalar o hacer reinar a alguien como rey.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר
  english_pob_choice: Then ... said
  chosen_spanish: Entonces ... dijo
  alternatives_spanish:
  - Y ... dijo
  lexicon: WLC/HALOT
  rationale: La waw consecutiva marca avance narrativo; «entonces» conserva la secuencia con fluidez natural en español.
- source_word: אֶל כָּל יִשְׂרָאֵל
  english_pob_choice: to all Israel
  chosen_spanish: a todo Israel
  alternatives_spanish:
  - a todo el Israel
  - a todo el pueblo de Israel
  lexicon: WLC/HALOT
  rationale: La fórmula colectiva es directa y natural; «todo Israel» mantiene el referente nacional sin añadir explicaciones.
- source_word: הִנֵּה
  english_pob_choice: Behold
  chosen_spanish: Miren
  alternatives_spanish:
  - He aquí
  - Observen
  - Vean
  lexicon: WLC/HALOT
  rationale: El marcador discursivo llama la atención. «Miren» comunica esa fuerza deíctica en español contemporáneo sin perder solemnidad.
- source_word: שָׁמַעְתִּי בְקֹלְכֶם
  english_pob_choice: I have listened to your voice
  chosen_spanish: he escuchado su voz
  alternatives_spanish:
  - he atendido a su voz
  - he obedecido su voz
  - he hecho caso a lo que dijeron
  lexicon: WLC/HALOT
  rationale: Se conserva la imagen hebrea de «escuchar la voz». En español, «he escuchado su voz» preserva el paralelismo y deja abierta la posible implicación de acatamiento sin traducirla como obediencia explícita.
- source_word: לְכֹל אֲשֶׁר אֲמַרְתֶּם לִי
  english_pob_choice: in all that you have said to me
  chosen_spanish: en todo lo que me han dicho
  alternatives_spanish:
  - respecto de todo lo que me dijeron
  - en todo cuanto me han dicho
  lexicon: WLC/HALOT
  rationale: Expresa el alcance de lo dicho por el pueblo con una construcción española natural y cercana al hebreo.
- source_word: וָאַמְלִיךְ
  english_pob_choice: I have made a king over you
  chosen_spanish: he puesto un rey sobre ustedes
  alternatives_spanish:
  - he hecho reinar a un rey sobre ustedes
  - he establecido un rey sobre ustedes
  - he hecho rey a uno sobre ustedes
  lexicon: WLC/HALOT
  rationale: El verbo hebreo es causativo («hacer reinar / instalar como rey»). «He puesto un rey sobre ustedes» comunica la entronización de manera natural y conserva la idea de establecimiento real sin forzar una paráfrasis técnica en español.
- source_word: מֶלֶךְ
  english_pob_choice: a king
  chosen_spanish: un rey
  alternatives_spanish:
  - rey
  lexicon: WLC/HALOT
  rationale: El sustantivo nombra el oficio conferido; en español requiere artículo indefinido en esta construcción.
theological_decisions:
- issue: Matiz de שָׁמַע en la respuesta de Samuel
  english_pob_reading: Render as 'listened to' rather than 'obeyed'
  chosen_spanish_reading: «he escuchado su voz» en vez de «he obedecido su voz»
  alternative_spanish_readings:
  - he obedecido su voz
  - he atendido su voz
  - he hecho caso a su petición
  rationale: El hebreo permite un matiz de cumplimiento, pero el texto aquí resume que Samuel actuó conforme a lo pedido. «He escuchado su voz» conserva el idioma original sin adelantar una evaluación moral o una obediencia más fuerte de la que el verso explícitamente dice.
  doctrine_reference: Translation philosophy §1, §3
- issue: Fuerza del causativo וָאַמְלִיךְ
  english_pob_reading: I have made a king over you
  chosen_spanish_reading: «he puesto un rey sobre ustedes»
  alternative_spanish_readings:
  - he hecho rey a uno sobre ustedes
  - he establecido un rey sobre ustedes
  - he hecho reinar a un rey sobre ustedes
  rationale: Se mantiene la idea de instalación de la monarquía sin convertirla en una formulación demasiado interpretativa. El español elegido transmite el acto de establecer al rey sobre el pueblo, en línea con el valor causativo del hebreo.
  doctrine_reference: Translation philosophy §1, §5
translation_notes:
  revision_awareness: 'La redacción sigue el texto hebreo con ayuda del expediente inglés: se conservó el marcaje discursivo de הִנֵּה con un imperativo de atención en español, se mantuvo el idiomatismo de «escuchar la voz» sin convertirlo en «obedecer», y se optó por una equivalencia natural para el causativo de וָאַמְלִיךְ. También se corrigió la validación anterior asegurando que cada nota al pie tenga su anclaje visible en el texto.'
  spanish_consistency_notes:
  - Uso de «Israel» como colectividad nacional sin artículo redundante salvo donde la sintaxis lo requiera.
  - «rey» se mantiene en minúscula por tratarse de un sustantivo común en el contexto.
  - Se conserva el registro bíblico digno con puntuación y comillas españolas.
  - Las notas al pie están ancladas exactamente en [a] y [b] dentro del texto principal.
