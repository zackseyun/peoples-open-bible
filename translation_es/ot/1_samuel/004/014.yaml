translation:
  language: es
  text: 'Cuando Elí oyó el sonido del grito, dijo: «¿Qué es este sonido del alboroto[a]?». Y el hombre se apresuró, llegó y le dijo a Elí.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O “el tumulto” o “la conmoción”.
    reason: lexical_alternative
lexical_decisions:
- source_word: ק֣וֹל
  english_pob_choice: sound
  chosen_spanish: sonido
  alternatives_spanish:
  - voz
  - ruido
  lexicon: HALOT
  rationale: קוֹל puede significar sonido, voz o ruido. Aquí introduce tanto el grito como el alboroto como fenómenos audibles; 'sonido' conserva esa amplitud de manera natural en español.
- source_word: הַצְּעָקָה
  english_pob_choice: the outcry
  chosen_spanish: el grito
  alternatives_spanish:
  - el clamor
  - el alarido
  lexicon: HALOT
  rationale: צְעָקָה denota un grito o clamor de angustia. 'Grito' es claro y fiel; 'clamor' también sería posible, pero 'grito' encaja mejor con la escena narrativa inmediata.
- source_word: מֶה
  english_pob_choice: What is this
  chosen_spanish: ¿Qué es este…?
  alternatives_spanish:
  - ¿Qué…?
  - ¿Por qué es este…?
  lexicon: HALOT
  rationale: La pregunta hebrea indaga por la naturaleza del ruido. En español, '¿Qué es este…?' expresa de forma idiomática ese sentido sin añadir contenido ajeno.
- source_word: הֶהָמוֹן
  english_pob_choice: the uproar
  chosen_spanish: el alboroto
  alternatives_spanish:
  - el tumulto
  - la conmoción
  - el ruido
  lexicon: HALOT
  rationale: הָמוֹן señala una agitación ruidosa o tumulto. 'Alboroto' comunica bien la perturbación pública y audible; mantiene el tono narrativo sin volverse demasiado técnico.
- source_word: וְהָאִישׁ
  english_pob_choice: And the man
  chosen_spanish: Y el hombre
  alternatives_spanish:
  - Entonces el hombre
  - Y el mensajero
  lexicon: HALOT
  rationale: El hebreo dice literalmente 'el hombre'; no añade 'mensajero'. 'El hombre' preserva la referencia explícita y evita interpretar más allá del texto.
- source_word: מִהַר
  english_pob_choice: hurried
  chosen_spanish: se apresuró
  alternatives_spanish:
  - se dio prisa
  - se apuró
  - aceleró el paso
  lexicon: HALOT
  rationale: El verbo significa apresurarse o actuar con rapidez. 'Se apresuró' es natural, narrativo y suficientemente cercano al matiz del hebreo.
- source_word: וַיַּגֵּד לְעֵלִי
  english_pob_choice: told Eli
  chosen_spanish: se lo dijo a Elí
  alternatives_spanish:
  - le informó a Elí
  - se lo contó a Elí
  lexicon: HALOT
  rationale: נגד en hifil suele significar decir o comunicar. Como el contenido ya ha sido introducido en la pregunta de Elí, 'se lo dijo' suena natural en español y evita un calco administrativo como 'informó'.
- source_word: עֵלִי
  english_pob_choice: Eli
  chosen_spanish: Elí
  alternatives_spanish:
  - Eli
  lexicon: Convención onomástica
  rationale: Los nombres propios se transliteran según uso español. 'Elí' es la forma natural en español bíblico y mantiene la identificación del personaje.
translation_notes:
  revision_awareness: Se siguió la lectura revisada del texto inglés POB sin cambios sustanciales; la única nota léxica se mantiene porque el hebreo קוֹל admite varias equivalencias y el contexto permite más de una opción española.
  spanish_consistency_notes:
  - Se mantiene 'Elí' como forma fija del nombre propio.
  - Se evita 'SEÑOR' porque no aparece el Tetragrámaton en este verso.
  - '''Alboroto'' y ''grito'' conservan la doble capa auditiva del hebreo: ruido general y clamor concreto.'
  - 'La puntuación reproduce el movimiento narrativo en dos segmentos: pregunta de Elí y acción del hombre.'
