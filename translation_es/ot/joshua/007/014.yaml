  yaml_path: translation/ot/joshua/007/014.yaml
  text: In the morning you shall come near by your tribes[a], and it shall be that the tribe that Yahweh selects shall come near by clans, and the clan that Yahweh selects shall come near by households[b], and the household that Yahweh selects shall come near man by man.
  footnotes:
