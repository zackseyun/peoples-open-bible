translation:
  language: es
  text: 'Él volvió a sus hermanos y dijo[a]: «El muchacho ya no está, y yo—¿adónde iré?»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Más literalmente: «El muchacho no está, y yo—¿adónde vengo?». El hebreo usa un giro idiomático que significa «¿adónde puedo ir?» o «¿qué puedo hacer?».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּשָׁב
  english_pob_choice: He returned
  chosen_spanish: volvió
  alternatives_spanish:
  - regresó
  - volvió atrás
  lexicon: HALOT
  rationale: שוב en wayyiqtol expresa la acción de volver; «volvió» es natural en español y conserva el avance narrativo sin añadir matices no presentes en el hebreo.
- source_word: אֶל אֶחָיו
  english_pob_choice: to his brothers
  chosen_spanish: a sus hermanos
  alternatives_spanish:
  - hacia sus hermanos
  - para con sus hermanos
  lexicon: HALOT
  rationale: אֶל indica dirección hacia personas; «a sus hermanos» reproduce el sentido relacional inmediato y evita una construcción forzada.
- source_word: הַיֶּלֶד
  english_pob_choice: the boy
  chosen_spanish: el muchacho
  alternatives_spanish:
  - el niño
  - el chico
  lexicon: HALOT
  rationale: יֶלֶד puede ser «niño» o «muchacho». Aquí, en el contexto fraternal y narrativo, «muchacho» mantiene el tono natural en español y la referencia a José sin sonar infantil en exceso.
- source_word: אֵינֶנּוּ
  english_pob_choice: is gone
  chosen_spanish: ya no está
  alternatives_spanish:
  - no está
  - se fue
  lexicon: HALOT
  rationale: La forma hebrea es idiomática y literalmente expresa ausencia. «Ya no está» comunica bien la desaparición/ausencia sin decidir más de lo que el texto dice; evita sugerir muerte, como el inglés POB también procura.
- source_word: וַאֲנִי
  english_pob_choice: and I
  chosen_spanish: y yo
  alternatives_spanish:
  - y en cuanto a mí
  - yo
  lexicon: HALOT
  rationale: La expresión introduce un giro enfático y personal. «Y yo» conserva la abrupta transición retórica del hebreo y del inglés POB.
- source_word: אָנָה
  english_pob_choice: where shall I go?
  chosen_spanish: ¿adónde iré?
  alternatives_spanish:
  - ¿adónde podré ir?
  - ¿adónde he de ir?
  lexicon: HALOT
  rationale: אָנה con el verbo de movimiento forma un giro idiomático de destino. En español, «¿adónde iré?» expresa de manera natural la pregunta retórica; «shall» del inglés POB se refleja mejor con futuro simple que con una perífrasis más explícita.
- source_word: אֲנִי בָא
  english_pob_choice: where shall I go?
  chosen_spanish: ¿adónde iré?
  alternatives_spanish:
  - ¿adónde voy?
  - ¿adónde he de ir?
  lexicon: HALOT
  rationale: Aunque literalmente puede leerse «¿adónde vengo?», el conjunto idiomático apunta a destino/movimiento. El futuro simple español transmite la urgencia y el desconcierto de la pregunta sin quebrar la sintaxis natural.
translation_notes:
  revision_awareness: Se siguió la revisión inglesa que prefirió «shall» por un registro más formal y por mayor cercanía al modismo hebreo. En español, se reflejó ese registro con el futuro simple «iré», manteniendo la pregunta retórica y evitando una paráfrasis excesiva.
  spanish_consistency_notes:
  - Se usó «muchacho» para הַיֶּלֶד en coherencia con un registro natural y bíblico moderado, sin recurrir a «niño» ni a arcaísmos.
  - Se evitó «SEÑOR» u otras equivalencias teológicas porque el versículo no contiene referencias divinas.
  - La puntuación con raya y comillas busca reproducir el quiebre enfático del hebreo y del inglés POB sin añadir contenido.
  - La nota al pie está anclada correctamente en el texto con [a] y conserva la alternativa literal del modismo.
