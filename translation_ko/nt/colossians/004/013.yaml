  rationale: πόνος의 「수고·노력」을 살린다. 영어 POB의 「great labor」 결정을 따른다.
- source_word: ὑπὲρ ὑμῶν καὶ τῶν ἐν Λαοδικείᾳ καὶ τῶν ἐν Ἱεραπόλει
  english_pob_choice: for you and for those in Laodicea and those in Hierapolis
