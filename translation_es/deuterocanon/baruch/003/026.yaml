lexical_decisions:
- source_word: ἐκεῖ
  english_pob_choice: There
  chosen_spanish: Allí
  alternatives_spanish:
  - En aquel lugar
  - Allá
  lexicon: BDAG
  rationale: Mantiene el deíctico de lugar de forma natural en español y conserva la referencia al contexto previo sin sobreexplicar.
- source_word: ἐγεννήθησαν
  english_pob_choice: were born
  chosen_spanish: nacieron
  alternatives_spanish:
  - fueron engendrados
  - llegaron a existir
  lexicon: BDAG
  rationale: La imagen de nacimiento es clara y fiel; 'nacieron' evita el arcaísmo de 'fueron engendrados' y es más específico que 'llegaron a existir'.
- source_word: οἱ γίγαντες
  english_pob_choice: the giants
  chosen_spanish: los gigantes
  alternatives_spanish:
  - los hombres gigantes
  - los titanes
  lexicon: BDAG
  rationale: '''Gigantes'' corresponde directamente al término griego y preserva su fuerza lexical sin introducir una identificación mitológica más precisa de la que el texto ofrece.'
- source_word: οἱ ὀνομαστοὶ
  english_pob_choice: those renowned
  chosen_spanish: aquellos renombrados
  alternatives_spanish:
  - los famosos
  - los bien conocidos
  lexicon: BDAG
  rationale: '''Renombrados'' transmite fama o notoriedad con un registro digno; ''aquellos'' ayuda a conservar el valor apposicional del participio sustantivado.'
- source_word: ἀπʼ ἀρχῆς
  english_pob_choice: from the beginning
  chosen_spanish: desde el principio
  alternatives_spanish:
  - desde antiguo
  - desde el comienzo
  lexicon: BDAG
  rationale: '''Desde el principio'' es la correspondencia más natural y mantiene la idea de antigüedad remota que el griego comunica.'
- source_word: γενόμενοι
  english_pob_choice: from the beginning
  chosen_spanish: aquellos renombrados desde el principio
  alternatives_spanish:
  - habiendo llegado a ser
  - que llegaron a ser en tiempos antiguos
  lexicon: BDAG
  rationale: El participio está comprimido junto con ἀπʼ ἀρχῆς; en español se integra en la frase para evitar una construcción artificial y conservar el sentido de existencia antigua y reputación antigua.
- source_word: εὐμεγέθεις
  english_pob_choice: great in size
  chosen_spanish: grandes en tamaño
  alternatives_spanish:
  - de gran estatura
  - muy grandes
  lexicon: LSJ
  rationale: '''Grandes en tamaño'' es transparente y evita añadir una connotación heroica que no está explícita en el adjetivo.'
- source_word: ἐπιστάμενοι πόλεμον
  english_pob_choice: skilled in war
  chosen_spanish: expertos en la guerra
  alternatives_spanish:
  - diestros en la guerra
  - versados en la guerra
  - expertos en la guerra
  lexicon: BDAG
  rationale: '''ἐπιστάμενοι'' expresa competencia o pericia; ''expertos en la guerra'' conserva esa idea en español claro y natural, con el artículo para reflejar el objeto del saber.'
theological_decisions:
- issue: Identidad y connotaciones de los gigantes
  english_pob_reading: Retain 'the giants' as a direct rendering of οἱ γίγαντες without specifying mythological or Genesis-6 interpretation.
  chosen_spanish_reading: Mantener 'los gigantes' sin identificar aquí si se trata de nefilim, héroes míticos o una lectura intertestamentaria concreta.
  alternative_spanish_readings:
  - los nefilim
  - los hombres poderosos
  rationale: El griego dice γίγαντες; una identificación más específica iría más allá de la evidencia del verso. La traducción conserva la tensión interpretativa en lugar de resolverla artificialmente.
  doctrine_reference: Preservar la tensión exegética sin añadir una interpretación doctrinal no explicitada por el texto.
translation_notes:
  revision_awareness: 'El texto griego del versículo presenta una construcción comprimida: οἱ ὀνομαστοὶ ἀπʼ ἀρχῆς γενόμενοι. La versión española integra el valor de los participios y la locución temporal en una frase fluida, siguiendo la decisión auditada del POB inglés de preservar el sentido sin forzar un calco.'
  spanish_consistency_notes:
  - Se usa 'gigantes' de forma consistente con el valor léxico de γίγαντες, sin sustituirlo por 'mighty men' u otro equivalente interpretativo.
  - '''Desde el principio'' conserva la idea de antigüedad remota de ἀπʼ ἀρχῆς, en coherencia con el inglés auditado.'
  - '''Expertos en la guerra'' mantiene el matiz de habilidad/pericia de ἐπιστάμενοι πόλεμον y evita un giro demasiado militarista o técnico.'
