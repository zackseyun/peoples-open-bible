translation:
  language: es
  text: Yahvé dio a Israel un[a] libertador, y salieron de debajo de la mano de Aram[b]; y los hijos de Israel habitaron en sus tiendas, como antes[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'salvador'. El sustantivo hebreo denota a uno que trae rescate o liberación.
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: ''de debajo de la mano de Aram'', un modismo para ser librados del poder de Aram.'
    reason: cultural_note
  - marker: c
    text: O 'como antes' / 'como en tiempos pasados'. Literalmente, 'como ayer, tres días atrás', un modismo hebreo para tiempos anteriores.
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - SEÑOR
  - Jehová
  lexicon: WLC / HALOT
  rationale: Se sigue el criterio del proyecto para el nombre divino. 'Yahvé' conserva el nombre del pacto sin ocultarlo como título, y es la forma española establecida en este registro.
- source_word: מוֹשִׁיעַ
  english_pob_choice: a deliverer
  chosen_spanish: un libertador
  alternatives_spanish:
  - un salvador
  - uno que salva
  lexicon: HALOT
  rationale: En el contexto histórico de liberación de la opresión aramea, 'libertador' comunica rescate/ liberación temporal sin importar connotaciones cristológicas que 'salvador' podría sugerir en español.
- source_word: מִתַּחַת יַד אֲרָם
  english_pob_choice: from under the hand of Aram
  chosen_spanish: de debajo de la mano de Aram
  alternatives_spanish:
  - del poder de Aram
  - de debajo del dominio de Aram
  lexicon: HALOT
  rationale: Se preserva la imagen idiomática de la 'mano' como poder opresivo, manteniendo la concreción del hebreo y la explicación ya auditada por la POB inglesa.
- source_word: אֲרָם
  english_pob_choice: Aram
  chosen_spanish: Aram
  alternatives_spanish:
  - Siria
  lexicon: HALOT
  rationale: Se conserva el nombre histórico transliterado para respetar la primacía del original y evitar una equivalencia geográfica posterior que suavizaría el referente bíblico.
- source_word: בְנֵי יִשְׂרָאֵל
  english_pob_choice: the sons of Israel
  chosen_spanish: los hijos de Israel
  alternatives_spanish:
  - los israelitas
  - el pueblo de Israel
  lexicon: HALOT
  rationale: Se mantiene la expresión familiar/masculina del hebreo, acorde con la política de precisión de género del proyecto y con el tono narrativo bíblico.
- source_word: בְּאָהֳלֵיהֶם
  english_pob_choice: in their tents
  chosen_spanish: en sus tiendas
  alternatives_spanish:
  - en sus hogares
  - en sus moradas
  lexicon: HALOT
  rationale: '''Tiendas'' reproduce el sustantivo hebreo de modo directo y sigue siendo inteligible en español; conserva la imagen nómada o tradicional del texto.'
- source_word: כִּתְמוֹל שִׁלְשׁוֹם
  english_pob_choice: as formerly
  chosen_spanish: como antes
  alternatives_spanish:
  - como en tiempos antiguos
  - como antes de esto
  - como ayer y antes de ayer
  lexicon: HALOT
  rationale: Se vierte el modismo con una expresión natural en español que comunica el sentido idiomático de 'en tiempos pasados' sin volverlo opaco.
- source_word: וַיֵּצְאוּ
  english_pob_choice: they went out
  chosen_spanish: salieron
  alternatives_spanish:
  - escaparon
  - fueron sacados
  lexicon: HALOT
  rationale: '''Salieron'' refleja el verbo יצא de forma directa; el contexto de liberación queda especificado por la frase idiomática anterior.'
- source_word: וַיֵּשְׁבוּ
  english_pob_choice: lived
  chosen_spanish: habitaron
  alternatives_spanish:
  - vivieron
  - se establecieron
  lexicon: HALOT
  rationale: '''Habitaron'' conserva la tonalidad bíblica del verbo y funciona bien con ''en sus tiendas'', sin perder naturalidad en español.'
theological_decisions:
- issue: Cómo traducir מוֹשִׁיעַ sin importar una identificación mesiánica no presente en el verso
  english_pob_reading: deliverer
  chosen_spanish_reading: libertador
  alternative_spanish_readings:
  - salvador
  - redentor
  rationale: El contexto es la liberación histórica de la opresión aramea. 'Libertador' preserva la acción salvífica de Dios mediante un agente humano o providencial, sin sobrecargar el término con usos posteriores.
  doctrine_reference: Principio POB de primacía del original y preservación de la tensión léxica sin importación doctrinal.
- issue: Si debe neutralizarse בְנֵי יִשְׂרָאֵל en español
  english_pob_reading: the sons of Israel
  chosen_spanish_reading: los hijos de Israel
  alternative_spanish_readings:
  - los israelitas
  - el pueblo de Israel
  rationale: Se conserva la forma masculina/familiar del hebreo para respetar el registro textual y la política de precisión de género del proyecto.
  doctrine_reference: Política del proyecto sobre precisión de género frente a neutralización.
translation_notes:
  revision_awareness: La versión española sigue de cerca el texto hebreo y el audit trail inglés. Se revisó para mantener el nombre divino, la imagen idiomática de la 'mano' y el modismo temporal, sin introducir reinterpretaciones teológicas adicionales.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' para יְהוָה.
  - Se conserva 'Aram' como nombre histórico.
  - Se usa 'los hijos de Israel' por fidelidad al hebreo y consistencia con la política de género del proyecto.
  - Las notas a pie distinguen alternativas léxicas reales del texto y no duplican marcadores.
