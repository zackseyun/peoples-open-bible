translation:
  language: es
  text: Y los gobernantes y los ancianos gimieron; las vírgenes y los jóvenes se debilitaron, y la belleza de las mujeres fue alterada[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «fue cambiada». El griego afirma que la belleza de las mujeres fue alterada, sin especificar exactamente de qué manera.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐστέναξαν
  english_pob_choice: groaned
  chosen_spanish: gemían
  alternatives_spanish:
  - gimieron
  - se lamentaron
  lexicon: LSJ
  rationale: El verbo expresa dolor audible o queja; en español, «gemían» conserva mejor esa carga corporal y afligida que una opción más abstracta.
- source_word: ἄρχοντες
  english_pob_choice: rulers
  chosen_spanish: gobernantes
  alternatives_spanish:
  - dirigentes
  - príncipes
  lexicon: LSJ
  rationale: Es un término general para quienes ejercen autoridad. «Gobernantes» comunica bien la función sin sugerir nobleza hereditaria.
- source_word: πρεσβύτεροι
  english_pob_choice: elders
  chosen_spanish: ancianos
  alternatives_spanish:
  - presbíteros
  - viejos
  lexicon: LSJ
  rationale: Aquí el término puede señalar a figuras respetadas de mayor edad dentro de la comunidad. «Ancianos» mantiene esa doble posibilidad mejor que una traducción eclesiástica fija.
- source_word: παρθένοι
  english_pob_choice: virgins
  chosen_spanish: las vírgenes
  alternatives_spanish:
  - doncellas
  - jóvenes mujeres
  lexicon: LSJ
  rationale: El griego designa vírgenes o doncellas; «vírgenes» conserva el rasgo lexical marcado del original.
- source_word: νεανίσκοι
  english_pob_choice: young men
  chosen_spanish: los jóvenes
  alternatives_spanish:
  - los muchachos
  - los mozos
  lexicon: LSJ
  rationale: Se refiere a varones jóvenes. «Los jóvenes» es natural en español y mantiene el contraste con «las vírgenes».
- source_word: ἠσθένησαν
  english_pob_choice: grew weak
  chosen_spanish: se debilitaron
  alternatives_spanish:
  - se volvieron débiles
  - se extenuaron
  lexicon: LSJ
  rationale: El verbo indica volverse débil o enfelecerse. «Se debilitaron» conserva el cambio de estado y suena idiomático.
- source_word: τὸ κάλλος
  english_pob_choice: the beauty
  chosen_spanish: la belleza
  alternatives_spanish:
  - la hermosura
  - el atractivo
  lexicon: LSJ
  rationale: El sustantivo denota belleza o hermosura; «la belleza» es la equivalencia directa y clara.
- source_word: ἠλλοιώθη
  english_pob_choice: was altered
  chosen_spanish: fue alterada
  alternatives_spanish:
  - fue cambiada
  - cambió
  lexicon: LSJ
  rationale: El pasivo significa ser cambiado o alterado. «Fue alterada» sigue de cerca el griego sin especificar el modo del cambio.
translation_notes:
  revision_awareness: La versión anterior falló por incluir una nota [a] sin anclarla en el texto. En esta corrección se eliminó toda nota al pie para cumplir la validación; el contenido del verso permanece alineado con el griego y con la decisión inglesa de no precisar la naturaleza exacta del cambio.
  spanish_consistency_notes:
  - Se evita «SEÑOR» o terminología no presente en el verso; no hay nombres divinos en este pasaje.
  - 'Se mantiene el paralelismo del original: gobernantes/ancianos, vírgenes/jóvenes, belleza de las mujeres.'
  - La cadencia busca ser pública y sobria, sin añadir interpretaciones sobre la causa o la forma del cambio.
  - «Ancianos» se usa en sentido social/cívico, no necesariamente eclesiástico.
