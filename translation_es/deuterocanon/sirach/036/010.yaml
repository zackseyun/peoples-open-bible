translation:
  language: es
  text: Y todos los hombres son del suelo[a], y Adán fue creado de la tierra.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «todas las personas». El griego dice literalmente «todos los hombres» (ἄνθρωποι πάντες), con plural masculino de fuerza representativa para la humanidad.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἄνθρωποι πάντες
  english_pob_choice: all men
  chosen_spanish: todos los hombres
  alternatives_spanish:
  - todas las personas
  - todos los seres humanos
  lexicon: BDAG
  rationale: La forma griega usa el plural masculino ἄνθρωποι con fuerza representativa para la humanidad. «Todos los hombres» conserva esa forma léxica y su valor genérico sin perder claridad en español.
- source_word: ἀπὸ ἐδάφους
  english_pob_choice: from the ground
  chosen_spanish: del suelo
  alternatives_spanish:
  - de la tierra
  - del terreno
  lexicon: LSJ
  rationale: ἐδάφος designa el suelo o la base terrestre. «Del suelo» conserva la imagen concreta de origen y evita confundir este término con γῆς, que aparece en la segunda cláusula.
- source_word: γῆς
  english_pob_choice: the earth
  chosen_spanish: la tierra
  alternatives_spanish:
  - el suelo
  - el terreno
  lexicon: LSJ
  rationale: Aquí γῆ conserva su sentido amplio de tierra como materia/origen creador. «La tierra» mantiene el paralelismo con ἐδάφους sin borrar la leve variación semántica del griego.
- source_word: ἐκτίσθη
  english_pob_choice: was created
  chosen_spanish: fue creado
  alternatives_spanish:
  - fue formado
  - fue hecho
  lexicon: LSJ
  rationale: El pasivo de κτίζω expresa creación. «Fue creado» reproduce de manera directa ese valor y conserva el vínculo temático con el acto creador de Dios.
- source_word: Ἀδάμ
  english_pob_choice: Adam
  chosen_spanish: Adán
  alternatives_spanish:
  - Adam
  lexicon: LSJ
  rationale: Nombre propio transliterado al español según la forma bíblica establecida y legible para la audiencia hispanohablante.
theological_decisions:
- issue: Fuerza representativa de ἄνθρωποι πάντες aplicada a la humanidad
  english_pob_reading: The verse says all men come from the ground, then supports that claim with Adam's creation from the earth.
  chosen_spanish_reading: El verso afirma que todos los hombres proceden del suelo y, a la vez, apoya esa afirmación con la creación de Adán de la tierra.
  alternative_spanish_readings:
  - La segunda cláusula podría leerse como apposición, tratando a Adán como figura representativa de la humanidad.
  - Podría entenderse a Adán solo como el primer hombre histórico, sin desarrollar más la relación tipológica.
  rationale: La sintaxis griega permite leer una afirmación general seguida de un ejemplo fundacional. La traducción conserva tanto la lectura histórica de Adán como la fuerza representativa de la primera cláusula, sin reducir una a la otra.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4; tabla de términos controvertidos para אָדָם
translation_notes:
  revision_awareness: Coincide con el pasaje fuente y con el auditoría inglesa revisada; no se requirieron cambios respecto del último pase, y se preservó la tensión entre el plural masculino representativo y el alcance universal.
  spanish_consistency_notes:
  - Se usó «Adán» para el nombre propio, conforme al uso bíblico estándar en español.
  - Se evitó «SEÑOR» o terminología de ocultamiento porque el texto no contiene el nombre divino.
  - «Suelo» y «tierra» se diferenciaron para reflejar ἐδάφους y γῆς sin nivelarlos.
  - El versículo mantiene un registro sobrio y publicable, sin paráfrasis expansiva.
