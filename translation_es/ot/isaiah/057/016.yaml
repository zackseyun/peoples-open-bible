translation:
  language: es
  text: Porque no contenderé para siempre[a], ni estaré enojado sin fin; porque el espíritu se desmayaría ante mí[b], y los alientos[c] que yo he hecho.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «disputaré». Hebreo רִיב puede expresar contienda o litigio.
    reason: lexical_alternative
  - marker: b
    text: O «el aliento se desmayaría ante mí». Hebreo רוּחַ puede significar «espíritu» o «aliento».
    reason: lexical_alternative
  - marker: c
    text: Hebreo נְשָׁמוֹת, literalmente «alientos»; también puede entenderse más interpretativamente como «almas» o «vidas».
    reason: lexical_alternative
lexical_decisions:
- source_word: לְעוֹלָם
  english_pob_choice: forever
  chosen_spanish: para siempre
  alternatives_spanish:
  - perpetuamente
  - por siempre
  lexicon: HALOT
  rationale: En la negación, la expresión idiomática comunica duración sin término. «Para siempre» es natural en español y preserva el valor temporal.
- source_word: אָרִיב
  english_pob_choice: contend
  chosen_spanish: contender
  alternatives_spanish:
  - litigar
  - disputar
  - llevar pleito
  lexicon: HALOT
  rationale: El verbo ריב tiene matiz legal-relacional. «Contender» conserva esa fuerza sin volver la línea excesivamente técnica.
- source_word: לָנֶצַח
  english_pob_choice: without end
  chosen_spanish: sin fin
  alternatives_spanish:
  - para siempre
  - sin término
  - continuamente
  lexicon: HALOT
  rationale: Se evita repetir exactamente la primera expresión, pero se mantiene el paralelismo semántico de duración ilimitada.
- source_word: אֶקְּצֹף
  english_pob_choice: be angry
  chosen_spanish: estar enojado
  alternatives_spanish:
  - estar airado
  - estar indignado
  - tener ira
  lexicon: HALOT
  rationale: El verbo קצף expresa enojo/ira. «Estar enojado» es claro y digno en español moderno; no se fuerza un término más teológico si no es necesario.
- source_word: רוּחַ
  english_pob_choice: the spirit
  chosen_spanish: el espíritu
  alternatives_spanish:
  - el aliento
  - la respiración
  - el viento
  lexicon: HALOT
  rationale: El contexto antropológico y el paralelo con «respiraciones» favorecen un sentido de vida animada/espíritu humano, no el Espíritu Santo.
- source_word: מִלְּפָנַי
  english_pob_choice: before me
  chosen_spanish: delante de mí
  alternatives_spanish:
  - en mi presencia
  - ante mí
  - frente a mí
  lexicon: HALOT
  rationale: «Delante de mí» reproduce el valor idiomático de estar ante la presencia divina con naturalidad en español.
- source_word: יַעֲטוֹף
  english_pob_choice: would grow faint
  chosen_spanish: se desmayaría
  alternatives_spanish:
  - se agotaría
  - se debilitaría
  - se vendría abajo
  lexicon: HALOT
  rationale: El verbo עטף puede denotar desfallecer o languidecer. «Se desmayaría» comunica con fuerza la idea de colapso vital en este contexto poético.
- source_word: נְשָׁמוֹת
  english_pob_choice: the breaths
  chosen_spanish: las respiraciones
  alternatives_spanish:
  - los alientos
  - las almas
  - las vidas
  lexicon: HALOT
  rationale: Se conserva la concreción de נשמות como «respiraciones/alientos» en vez de «almas», para no introducir una lectura más abstracta que la del hebreo.
- source_word: אֲנִי עָשִׂיתִי
  english_pob_choice: the breaths that I have made
  chosen_spanish: las respiraciones que yo he hecho
  alternatives_spanish:
  - las respiraciones que hice
  - las vidas que yo he hecho
  - las que yo creé
  lexicon: HALOT
  rationale: El pronombre enfático אֲנִי se expresa con «yo». «He hecho» conserva la cercanía del verbo עשה sin sustituirlo por «crear», que sería más interpretativo.
theological_decisions:
- issue: רוּחַ y נְשָׁמוֹת como lenguaje antropológico
  english_pob_reading: Render with life-breath/spirit language referring to human creatureliness, not the Holy Spirit.
  chosen_spanish_reading: «El espíritu» y «las respiraciones» se entienden como el aliento/vida de las criaturas humanas, no como una referencia al Espíritu Santo.
  alternative_spanish_readings:
  - «El aliento» y «las almas»
  - «La vida» y «los seres vivientes»
  rationale: El paralelismo con «las respiraciones que yo he hecho» y la lógica del versículo apuntan a la fragilidad de la vida creada ante el juicio divino. Se mantiene la tensión semántica sin resolverla dogmáticamente.
  doctrine_reference: Preservar la tensión antropológica del texto; no importar una lectura pneumatológica ajena al contexto.
translation_notes:
  revision_awareness: Se siguió la revisión más reciente que unió la última proposición con «y» en vez de un guion, y se mantuvo la dupla «espíritu» / «respiraciones» por coherencia con el audit trail. También se evitó añadir énfasis no explícito como «yo mismo».
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como forma habitual del proyecto solo cuando el hebreo lo exija explícitamente; aquí no aparece el tetragrámaton, así que no se introduce.
  - «El espíritu» conserva mayúscula solo cuando el contexto lo requiera; aquí se usa minúscula por sentido antropológico.
  - Se prefirió un español bíblico claro y moderno, evitando calcos como «en ira» o «para perpetuidad» que sonarían menos naturales.
