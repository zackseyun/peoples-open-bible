    text: Or 'bounded it' / 'was its boundary.' The Hebrew verb indicates that the Jordan served as the territorial boundary.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'sons of Benjamin,' a tribal designation for Benjamin's descendants.
    reason: lexical_alternative
