translation:
  language: es
  text: los habitantes de Seir y de Filistea[a], y la nación necia que habita en Siquem.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Griego: «los que se sientan en el monte de Samaria, Filistea» en lugar de «los habitantes de Seir y de Filistea».'
    reason: textual_variant
lexical_decisions:
- source_word: יוֹשְׁבֵי
  english_pob_choice: the inhabitants of
  chosen_spanish: los habitantes de
  alternatives_spanish:
  - los que habitan en
  - los moradores de
  lexicon: HALOT
  rationale: El sustantivo plural constructo de ישב se usa de forma colectiva para quienes residen en un lugar. «Los habitantes de» conserva ese valor colectivo con español natural y digno.
- source_word: שֵׂעִיר
  english_pob_choice: Seir
  chosen_spanish: Seir
  alternatives_spanish:
  - el monte de Seir
  - el monte Seir
  lexicon: HALOT
  rationale: Es un nombre propio geográfico. El hebreo no añade explícitamente «monte», así que se conserva solo «Seir».
- source_word: וּפְלֶשֶׁת
  english_pob_choice: and Philistia
  chosen_spanish: y de Filistea
  alternatives_spanish:
  - y de los filisteos
  - y Filistea
  lexicon: HALOT
  rationale: El hebreo nombra la región/territorio, no directamente al pueblo. «Filistea» mantiene ese matiz territorial y el paralelismo con «Seir».
- source_word: גּוֹי
  english_pob_choice: nation
  chosen_spanish: nación
  alternatives_spanish:
  - pueblo
  - gente
  lexicon: HALOT
  rationale: «Nación» preserva mejor la fuerza colectiva y político-étnica de גוי en este contexto.
- source_word: נָבָל
  english_pob_choice: foolish
  chosen_spanish: necia
  alternatives_spanish:
  - insensata
  - foolish
  lexicon: HALOT
  rationale: נבל expresa necedad moral e intelectual. «Necia» reproduce el tono despectivo de manera idiomática en español.
- source_word: הַדָּר
  english_pob_choice: that dwells
  chosen_spanish: que habita
  alternatives_spanish:
  - que vive
  - moradora
  lexicon: HALOT
  rationale: El participio atributivo comunica residencia continua. «Que habita» es natural y mantiene el sentido durativo.
- source_word: בִּשְׁכֶם
  english_pob_choice: in Shechem
  chosen_spanish: en Siquem
  alternatives_spanish:
  - en Shequem
  - en Sichem
  lexicon: HALOT
  rationale: Nombre propio de lugar. «Siquem» es la transliteración española más asentada y coincide con el paralelo griego que apunta a la misma localidad.
theological_decisions:
- issue: Divergencia textual entre el hebreo conservado y el paralelo griego en el primer referente geográfico/étnico
  english_pob_reading: Follow the extant Hebrew 'the inhabitants of Seir and Philistia' in the main text, with a note for the Greek alternative
  chosen_spanish_reading: 'Seguir el hebreo: «los habitantes de Seir y de Filistea»; anotar la variante griega «el monte de Samaria»'
  alternative_spanish_readings:
  - «los que habitan en el monte de Samaria y Filistea»
  - «los habitantes de Samaria y de Filistea»
  rationale: En Sirácida, el hebreo conservado es el testimonio principal cuando está disponible y es de alta confianza. La versión griega difiere materialmente en el primer término, así que se preserva la lectura hebrea en el texto principal y se registra la alternativa griega en nota para transparencia textual.
  doctrine_reference: Translation philosophy §1; primacía del testimonio original conservado y transparencia textual
translation_notes:
  revision_awareness: Se revisó el pasaje frente al hebreo conservado y el paralelo griego de Swete; no se requieren cambios respecto de la lectura base, salvo la anotación de la variante griega en nota.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma general del proyecto, pero este versículo no contiene el nombre divino.
  - Se usa «Siquem» para el topónimo, no una forma anglicada ni la transliteración griega.
  - «Filistea» conserva el nombre de la región, evitando sustituirlo por un etnónimo cuando el hebreo habla del territorio.
