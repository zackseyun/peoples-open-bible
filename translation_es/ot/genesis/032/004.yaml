translation:
  language: es
  text: Jacob envió mensajeros delante de él a Esaú, su hermano, a la tierra de Seír, la región[a] de Edom.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'el territorio de Edom'. El hebreo dice literalmente 'el campo de Edom', probablemente como designación regional.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּשְׁלַח
  english_pob_choice: sent
  chosen_spanish: envió
  alternatives_spanish:
  - mandó
  - despachó
  lexicon: HALOT
  rationale: El verbo narrativo de שלח pide en español un pasado simple natural. 'Envió' conserva el sentido básico sin añadir matiz burocrático o formal innecesario.
- source_word: מַלְאָכִים
  english_pob_choice: messengers
  chosen_spanish: mensajeros
  alternatives_spanish:
  - ángeles
  - enviados
  lexicon: HALOT
  rationale: En este contexto son representantes humanos que Jacob manda a Esaú. 'Mensajeros' preserva la ambigüedad léxica sin forzar el sentido de 'ángeles'.
- source_word: לְפָנָיו
  english_pob_choice: ahead of him
  chosen_spanish: delante de él
  alternatives_spanish:
  - antes de él
  - en frente de él
  lexicon: HALOT
  rationale: La idea es de envío previo o adelantado. 'Delante de él' suena natural en español y conserva la imagen espacial del hebreo.
- source_word: עֵשָׂו אָחִיו
  english_pob_choice: Esau his brother
  chosen_spanish: Esaú, su hermano
  alternatives_spanish:
  - su hermano Esaú
  - Esaú su hermano
  lexicon: HALOT
  rationale: Se mantiene el nombre propio con el apuesto de parentesco. La coma refleja bien la aposición hebrea.
- source_word: אַרְצָה שֵׂעִיר
  english_pob_choice: to the land of Seir
  chosen_spanish: a la tierra de Seír
  alternatives_spanish:
  - hacia la tierra de Seír
  - a Seír
  lexicon: HALOT
  rationale: La terminación direccional se vierte de forma directa con 'a'. 'Tierra de Seír' conserva el sustantivo explícito del hebreo.
- source_word: שְׂדֵה אֱדוֹם
  english_pob_choice: the country of Edom
  chosen_spanish: la región de Edom
  alternatives_spanish:
  - el campo de Edom
  - el territorio de Edom
  lexicon: HALOT
  rationale: El hebreo dice literalmente 'campo de Edom', pero la pista de revisión inglesa indica un valor territorial regional. 'Región de Edom' mantiene el sentido geográfico sin imponer una imagen literal engañosa.
translation_notes:
  revision_awareness: La versión inglesa pasó de 'field of Edom' a 'country of Edom' por considerar que שְׂדֵה aquí funciona como designación territorial. La redacción española sigue esa revisión con 'región de Edom' y conserva la alternativa literal en nota.
  spanish_consistency_notes:
  - Se usa 'Yahvé' como norma cuando aparezca el nombre divino; aquí no aparece.
  - Se prefirió 'mensajeros' por el contexto narrativo humano, en línea con la auditoría inglesa.
  - Se evitó 'Cristo', 'SEÑOR' y otras sustituciones no pertinentes al versículo.
  - La puntuación mantiene la aposición y la secuencia geográfica de forma clara para lectura pública.
