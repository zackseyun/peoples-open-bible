translation:
  language: es
  text: 'Entonces Adoni-zédec, rey de Jerusalén, envió a Hoham, rey de Hebrón, a Piram, rey de Jarmut, a Jafía, rey de Laquis, y a Debir, rey de Eglón, diciendo:'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: וַיִּשְׁלַח
  english_pob_choice: So ... sent
  chosen_spanish: Entonces ... envió
  alternatives_spanish:
  - Y ... envió
  - Luego ... envió
  lexicon: HALOT
  rationale: El wayyiqtol continúa la acción narrativa; en español, «Entonces» conserva la conexión discursiva sin sonar mecánico. «Envió» expresa con precisión el verbo hebreo שׁלח.
- source_word: אֲדֹנִי צֶדֶק
  english_pob_choice: Adoni-zedek
  chosen_spanish: Adoni-sedec
  alternatives_spanish:
  - Adoni-zedec
  - Adonisedec
  lexicon: HALOT
  rationale: Es nombre propio compuesto. Se conserva la estructura del nombre y se adapta la consonante inicial de צֶדֶק a una transliteración española natural, sin traducir el elemento del nombre.
- source_word: מֶלֶךְ יְרוּשָׁלִַם
  english_pob_choice: king of Jerusalem
  chosen_spanish: rey de Jerusalén
  alternatives_spanish:
  - rey de Yerusalén
  lexicon: HALOT
  rationale: Construcción posesiva directa y natural en español. «Jerusalén» es la forma habitual y clara en español bíblico.
- source_word: אֶל
  english_pob_choice: to
  chosen_spanish: a
  alternatives_spanish:
  - hacia
  - para
  lexicon: HALOT
  rationale: La preposición marca destinatarios del envío. En español, «a» reproduce esa relación de manera natural con verbos de movimiento y comunicación.
- source_word: הוֹהָם
  english_pob_choice: Hoham
  chosen_spanish: Hoham
  alternatives_spanish:
  - Joham
  lexicon: HALOT
  rationale: Nombre propio transliterado sin traducir. Se mantiene la forma breve y reconocible del hebreo.
- source_word: חֶבְרוֹן
  english_pob_choice: Hebron
  chosen_spanish: Hebrón
  alternatives_spanish:
  - Hebron
  lexicon: HALOT
  rationale: Se usa la forma española asentada del topónimo, con tilde normativa.
- source_word: פִּרְאָם
  english_pob_choice: Piram
  chosen_spanish: Piram
  alternatives_spanish:
  - Píram
  lexicon: HALOT
  rationale: Nombre propio transliterado. No hay razón textual para adaptarlo más allá de la grafía habitual en español bíblico.
- source_word: יַרְמוּת
  english_pob_choice: Jarmuth
  chosen_spanish: Jarmut
  alternatives_spanish:
  - Yarmut
  - Jarmuth
  lexicon: HALOT
  rationale: Se adapta al sistema gráfico español, evitando la terminación inglesa -th cuando no aporta valor distintivo en español.
- source_word: יָפִיעַ
  english_pob_choice: Japhia
  chosen_spanish: Jafía
  alternatives_spanish:
  - Jafia
  lexicon: HALOT
  rationale: Transliteración española del nombre, con acento para reflejar la prosodia natural del español.
- source_word: לָכִישׁ
  english_pob_choice: Lachish
  chosen_spanish: Laquis
  alternatives_spanish:
  - Lachis
  lexicon: HALOT
  rationale: Topónimo bíblico con forma española establecida. Se prefiere la forma tradicionalmente reconocible en español.
- source_word: דְּבִיר
  english_pob_choice: Debir
  chosen_spanish: Debir
  alternatives_spanish:
  - Débir
  lexicon: HALOT
  rationale: Aquí funciona como nombre propio del rey, no como sustantivo común. Se conserva la transliteración simple para no introducir una lectura innecesaria.
- source_word: עֶגְלוֹן
  english_pob_choice: Eglon
  chosen_spanish: Eglón
  alternatives_spanish:
  - Eglon
  lexicon: HALOT
  rationale: Se usa la forma española con tilde, ajustada a la acentuación natural del nombre en español.
- source_word: לֵאמֹר
  english_pob_choice: saying,
  chosen_spanish: 'diciendo:'
  alternatives_spanish:
  - 'para decir:'
  lexicon: HALOT
  rationale: Fórmula introductoria de discurso directo. «Diciendo:» es la equivalencia natural en español y prepara la cita siguiente.
translation_notes:
  revision_awareness: El borrador sigue de cerca el hebreo y el audit trail en inglés, manteniendo el encadenamiento narrativo y la serie de nombres propios sin añadir interpretación. No se registraron revisiones en el paquete fuente.
  spanish_consistency_notes:
  - Se mantuvo «Jerusalén» como forma española usual de la ciudad.
  - Se prefirió «rey de ...» como construcción repetida para reflejar la sintaxis del hebreo.
  - Los nombres propios se adaptaron solo cuando existe una forma española asentada o una necesidad gráfica clara.
  - No se añadieron notas de pie porque el verso no presenta una tensión léxica o textual documentada en el paquete fuente.
