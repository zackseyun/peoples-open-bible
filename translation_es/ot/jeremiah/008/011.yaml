translation:
  language: es
  text: 'Han tratado con ligereza[a] la herida de la hija de mi pueblo, diciendo: «Paz[b], paz», cuando no hay paz.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'superficialmente' / 'como si fuera algo trivial'.
    reason: lexical_alternative
  - marker: b
    text: El hebreo shalom también puede significar 'bienestar', 'plenitud' o 'seguridad'.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְרַפּוּ
  english_pob_choice: have treated
  chosen_spanish: han tratado
  alternatives_spanish:
  - han sanado
  - han intentado sanar
  lexicon: HALOT
  rationale: El hebreo procede de רפא, ‘sanar/curar’, pero en este contexto profético la ironía recae en que atendieron el daño de manera superficial e ineficaz. ‘Han tratado’ conserva la metáfora médica sin afirmar un verdadero sanamiento.
- source_word: שֶׁבֶר
  english_pob_choice: wound
  chosen_spanish: herida
  alternatives_spanish:
  - quebranto
  - fractura
  - ruina
  lexicon: HALOT
  rationale: Aunque שׁבר puede significar quebranto o ruina, aquí va junto con el verbo de curar, por lo que el campo médico queda activado. ‘Herida’ suena natural en español y mantiene la imagen.
- source_word: בַּת עַמִּי
  english_pob_choice: the daughter of my people
  chosen_spanish: la hija de mi pueblo
  alternatives_spanish:
  - mi pueblo
  - mi querido pueblo
  - la hija de mi pueblo Israel
  lexicon: HALOT
  rationale: Se conserva la personificación profética. En español, ‘la hija de mi pueblo’ suena fiel y transmite la carga afectiva y covenantal del giro hebreo.
- source_word: עַל נְקַלָּה
  english_pob_choice: lightly
  chosen_spanish: con ligereza
  alternatives_spanish:
  - superficialmente
  - como si fuera algo trivial
  - por cosa leve
  lexicon: HALOT
  rationale: La idea es que trataron el mal como algo sin importancia. ‘Con ligereza’ comunica esa actitud sin perder el tono de reproche; la alternativa ‘superficialmente’ queda preservada en la nota.
- source_word: לֵאמֹר
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - al decir
  - y dijeron
  lexicon: HALOT
  rationale: Construcción normal para introducir la falsa seguridad que sigue.
- source_word: שָׁלוֹם שָׁלוֹם
  english_pob_choice: Peace, peace
  chosen_spanish: Paz, paz
  alternatives_spanish:
  - Todo está bien, todo está bien
  - ¡Paz! ¡Paz!
  lexicon: HALOT
  rationale: Se mantiene la repetición retórica del hebreo. ‘Paz’ es la equivalencia más directa; la nota preserva el alcance semántico más amplio de שָׁלוֹם.
- source_word: וְאֵין שָׁלוֹם
  english_pob_choice: when there is no peace
  chosen_spanish: cuando no hay paz
  alternatives_spanish:
  - pero no hay paz
  - aunque no hay paz
  lexicon: HALOT
  rationale: La cláusula desenmascara la falsedad del anuncio anterior. ‘Cuando no hay paz’ fluye bien en español y refleja la contradicción entre lo proclamado y la realidad.
theological_decisions:
- issue: Preservación de la personificación profética
  english_pob_reading: Retain 'the daughter of my people' in the main text
  chosen_spanish_reading: Mantener 'la hija de mi pueblo' en el texto principal
  alternative_spanish_readings:
  - mi pueblo
  - mi querido pueblo
  rationale: La personificación no es un adorno accidental; forma parte de la imagen profética y de la carga afectiva del pasaje. Suprimirla aplanaría el texto.
  doctrine_reference: Translation philosophy §§1, 3, 6
- issue: Alcance semántico de שָׁלוֹם
  english_pob_reading: Use 'peace' in the main text
  chosen_spanish_reading: Usar 'paz' en el texto principal
  alternative_spanish_readings:
  - bienestar
  - plenitud
  - seguridad
  rationale: '''Paz'' conserva la fórmula repetida y es la equivalencia estándar, mientras que la nota deja constancia de que שָׁלוֹם también incluye bienestar, plenitud y seguridad.'
  doctrine_reference: Translation philosophy §§1, 5, 6
translation_notes:
  revision_awareness: El pasaje coincide con el audit trail inglés y no requiere revisiones adicionales; se conserva la ironía profética, la personificación de 'la hija de mi pueblo' y la repetición de 'paz' con su matiz ampliado en nota.
  spanish_consistency_notes:
  - Se usó 'Yahvé' como norma general del proyecto, pero este versículo no contiene el nombre divino.
  - Se mantuvo el tono profético formal sin volverlo arcaizante.
  - Se preservó la repetición exacta 'Paz, paz' para reflejar el énfasis hebreo.
  - La nota sobre שָׁלוֹם evita reducir 'paz' a mera ausencia de conflicto.
