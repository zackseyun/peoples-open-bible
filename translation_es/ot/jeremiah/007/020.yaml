translation:
  language: es
  text: 'Por tanto, así dice el Señor Yahvé: He aquí, mi ira y mi furor se derraman sobre este lugar, sobre el hombre[a] y sobre el animal, sobre los árboles del campo y sobre el fruto de la tierra; arderá y no se apagará.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'la humanidad' para 'el hombre'; el hebreo אָדָם es singular con fuerza genérica.
    reason: lexical_alternative
lexical_decisions:
- source_word: לָכֵן
  english_pob_choice: Therefore
  chosen_spanish: Por tanto
  alternatives_spanish:
  - Por ello
  - Así que
  lexicon: HALOT
  rationale: Expresa con naturalidad la conclusión consecuente del juicio previo, manteniendo el valor inferencial de לָכֵן sin volverlo coloquial.
- source_word: כֹּה אָמַר
  english_pob_choice: thus says
  chosen_spanish: así dice
  alternatives_spanish:
  - esto dice
  - de este modo dice
  lexicon: HALOT
  rationale: Conserva la fórmula profética estándar en un español digno y directo, equivalente al carácter solemne del hebreo.
- source_word: אֲדֹנָי יְהוִה
  english_pob_choice: the Lord GOD
  chosen_spanish: el Señor Yahvé
  alternatives_spanish:
  - el Señor Dios
  - el Señor Yahvé Dios
  lexicon: HALOT
  rationale: Se preserva el nombre divino y la distinción del compuesto evitando el recurso de máscara con 'SEÑOR'. 'Señor' traduce אֲדֹנָי y 'Yahvé' traduce יְהוִה conforme al criterio del proyecto.
- source_word: הִנֵּה
  english_pob_choice: Behold
  chosen_spanish: He aquí
  alternatives_spanish:
  - Miren
  - Vean
  lexicon: HALOT
  rationale: Mantiene la fuerza de anuncio solemne y profético sin sonar demasiado coloquial en español moderno.
- source_word: אַפִּי
  english_pob_choice: my anger
  chosen_spanish: mi ira
  alternatives_spanish:
  - mi enojo
  - mi cólera
  lexicon: HALOT
  rationale: En este contexto judicial, 'ira' comunica mejor la intensidad y el peso punitivo del término que un simple 'enojo'.
- source_word: חֲמָתִי
  english_pob_choice: my wrath
  chosen_spanish: mi furor
  alternatives_spanish:
  - mi indignación
  - mi cólera
  lexicon: HALOT
  rationale: 'Se conserva la distinción retórica entre אַף y חֵמָה/חֲמָה: ''furor'' intensifica el juicio sin borrar la segunda palabra con un sinónimo idéntico.'
- source_word: נִתֶּכֶת
  english_pob_choice: are being poured out
  chosen_spanish: se derraman
  alternatives_spanish:
  - están siendo derramadas
  - se vierten
  lexicon: HALOT
  rationale: El verbo en imagen de derramamiento se expresa de forma natural en español con voz media/reflexiva, conservando la idea de un juicio ya en curso.
- source_word: אֶל הַמָּקוֹם הַזֶּה
  english_pob_choice: on this place
  chosen_spanish: sobre este lugar
  alternatives_spanish:
  - contra este lugar
  - en este lugar
  lexicon: HALOT
  rationale: '''Sobre'' reproduce mejor el blanco del derramamiento y deja abierta la resonancia adversativa del juicio, sin imponer una paráfrasis más fuerte.'
- source_word: הָאָדָם
  english_pob_choice: man
  chosen_spanish: el hombre
  alternatives_spanish:
  - la humanidad
  - las personas
  lexicon: HALOT
  rationale: Se conserva el singular genérico del hebreo. En español, 'el hombre' refleja con fidelidad la forma y la fuerza representativa del término.
- source_word: הַבְּהֵמָה
  english_pob_choice: beast
  chosen_spanish: el animal
  alternatives_spanish:
  - la bestia
  - el ganado
  lexicon: HALOT
  rationale: '''Animal'' comunica la categoría amplia del hebreo en español contemporáneo; ''bestia'' sería más áspero y ''ganado'' demasiado estrecho.'
- source_word: עֵץ הַשָּׂדֶה
  english_pob_choice: the trees of the field
  chosen_spanish: los árboles del campo
  alternatives_spanish:
  - el árbol del campo
  - los árboles de la tierra
  lexicon: HALOT
  rationale: Aunque el hebreo es singular en constructo, el sentido colectivo se expresa de modo natural en plural en español.
- source_word: פְּרִי הָאֲדָמָה
  english_pob_choice: the fruit of the ground
  chosen_spanish: el fruto de la tierra
  alternatives_spanish:
  - el fruto del suelo
  - la cosecha de la tierra
  lexicon: HALOT
  rationale: Se mantiene la imagen agrícola básica con un giro claro y bíblicamente reconocible en español.
- source_word: וּבָעֲרָה
  english_pob_choice: it will burn
  chosen_spanish: arderá
  alternatives_spanish:
  - se encenderá
  - hará arder
  lexicon: HALOT
  rationale: El verbo conserva el valor de fuego/judgment sin requerir un sujeto explícito en español, que ya se infiere del contexto.
- source_word: וְלֹא תִכְבֶּה
  english_pob_choice: and will not be quenched
  chosen_spanish: no se apagará
  alternatives_spanish:
  - no se extinguirá
  - no se sofocará
  lexicon: HALOT
  rationale: '''Apagarse'' es la forma más natural para fuego en español y conserva bien el contraste con el ardor persistente del texto.'
theological_decisions:
- issue: Renderización del nombre divino en אֲדֹנָי יְהוִה
  english_pob_reading: the Lord GOD
  chosen_spanish_reading: el Señor Yahvé
  alternative_spanish_readings:
  - el Señor Dios
  - el Señor Yahvé Dios
  rationale: La doctrina del proyecto exige traducir YHWH como 'Yahvé'. En el compuesto con אֲדֹנָי, 'Señor Yahvé' preserva ambos elementos sin ocultar el nombre propio ni crear una lectura artificial.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Valor genérico de הָאָדָם
  english_pob_reading: man
  chosen_spanish_reading: el hombre
  alternative_spanish_readings:
  - la humanidad
  - las personas
  rationale: El hebreo usa un singular genérico. Se mantiene 'el hombre' para respetar la forma del original y su paralelismo con 'el animal'.
  doctrine_reference: 'DOCTRINE.md: Translation philosophy §4; Contested terms table, אָדָם *adam* → man / humankind (context)'
- issue: Relación de ira y furor en la secuencia de juicio
  english_pob_reading: my anger and my wrath
  chosen_spanish_reading: mi ira y mi furor
  alternative_spanish_readings:
  - mi ira y mi cólera
  - mi enojo y mi furor
  rationale: Se procura conservar la tensión léxica entre dos términos hebreos cercanos pero no idénticos, evitando nivelarlos con un solo registro emocional.
  doctrine_reference: HALOT / discourse-level lexical distinction
translation_notes:
  revision_awareness: He incorporado la revisión que elimina la coma tras 'Por tanto' para un tono más natural y formal. También ajusté el orden y la puntuación para que el español siga de cerca la cadencia profética del hebreo sin depender de una traducción mecánica del inglés.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' conforme al criterio del proyecto para יְהוָה.
  - Se conserva el singular genérico 'el hombre' con nota alternativa.
  - El par 'ira/furor' intenta reflejar la distinción hebrea entre אַף y חֵמָה sin borrar la tensión lexical.
  - '''Se derraman'' reproduce la imagen verbal de derramamiento de juicio y armoniza con ''sobre este lugar''.'
