- from: y que muchos de ellos están encerrados en Bosora y Bosor[a], en Alamis, Casfor, Maked y Carnaín; todas estas ciudades son fortificadas y grandes.
  to: y que muchos de ellos están encerrados en Bosora y Bosor[a], en Alamis, Casfor, Maked y Carnaín; todas estas son ciudades fortificadas y grandes.
  rationale: 'Se conserva el sentido y la transliteración del borrador, pero se ajusta la última cláusula a un español más natural: ''todas estas son ciudades fortificadas y grandes'' expresa mejor el valor descriptivo de ὀχυραὶ καὶ μεγάλαι que ''son fortificadas y grandes''. No se requieren cambios doctrinales ni textuales complejos.'
