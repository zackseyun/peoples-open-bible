translation:
  language: es
  text: Hizo lo malo ante los ojos de Yahvé. No se apartó de ninguno de los pecados de Jeroboam hijo de Nebat[a], con los cuales hizo pecar a Israel; anduvo en ellos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más literalmente: «en él», con el pronombre singular referido colectivamente al camino pecaminoso de Jeroboam.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּעֲשֶׂה
  english_pob_choice: He did
  chosen_spanish: Hizo
  alternatives_spanish:
  - Y hizo
  - E hizo
  lexicon: HALOT
  rationale: El wayyiqtol introduce avance narrativo; en español, la forma verbal simple conserva la secuencia sin añadir un conector innecesario. "Hizo" mantiene el valor de acción evaluada del hebreo.
- source_word: הָרַע
  english_pob_choice: what was evil
  chosen_spanish: lo malo
  alternatives_spanish:
  - el mal
  - lo que era malo
  lexicon: HALOT
  rationale: La fórmula עשׂה הרע es idiomática en Reyes. "Lo malo" transmite la evaluación moral sin volverla excesivamente literal o poco natural en español.
- source_word: בְּעֵינֵי יְהוָה
  english_pob_choice: in the sight of Yahweh
  chosen_spanish: ante los ojos de Yahvé
  alternatives_spanish:
  - a los ojos de Yahvé
  - en la presencia de Yahvé
  lexicon: HALOT
  rationale: Conservo la metáfora hebrea de percepción/juzgamiento. "Ante los ojos de Yahvé" es natural en español bíblico y mantiene el registro evaluativo.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  - el SEÑOR
  lexicon: HALOT
  rationale: Se sigue el criterio del proyecto para el Nombre divino. "Yahvé" preserva el Tetragrámaton sin máscara devocional.
- source_word: לֹא סָר
  english_pob_choice: He did not turn away
  chosen_spanish: No se apartó
  alternatives_spanish:
  - No se desvió
  - No volvió atrás
  lexicon: HALOT
  rationale: סור expresa apartarse de un camino o norma; "no se apartó" es el equivalente español más claro y fiel al sentido moral del verbo.
- source_word: מִכָּל חַטֹּאות
  english_pob_choice: from any of the sins
  chosen_spanish: de ninguno de los pecados
  alternatives_spanish:
  - de cualquiera de los pecados
  - de todas las pecados
  lexicon: HALOT
  rationale: 'Sigo la revisión inglesa que entendió מִכָּל aquí como distributivo: no se apartó de ni uno solo. En español, "de ninguno" expresa mejor ese alcance que "de todos".'
- source_word: יָרָבְעָם בֶּן נְבָט
  english_pob_choice: Jeroboam son of Nebat
  chosen_spanish: de Jeroboam hijo de Nabat
  alternatives_spanish:
  - de Jeroboam, hijo de Nabat
  - de Jeroboam hijo de Nebat
  lexicon: HALOT
  rationale: Conservo los nombres propios transliterados y la relación patronímica natural en español. "Hijo de Nabat" refleja directamente בֶּן נְבָט.
- source_word: אֲשֶׁר הֶחֱטִיא אֶת יִשְׂרָאֵל
  english_pob_choice: by which he caused Israel to sin
  chosen_spanish: con los cuales hizo pecar a Israel
  alternatives_spanish:
  - por los cuales hizo pecar a Israel
  - que hicieron pecar a Israel
  lexicon: HALOT
  rationale: El relativo puede referirse a los pecados/patrones de Jeroboam como medio de seducción. "Con los cuales" mantiene esa relación instrumental y evita forzar una identificación exclusivamente personal.
- source_word: בָּהּ הָלָךְ
  english_pob_choice: he walked in them
  chosen_spanish: anduvo en ellos
  alternatives_spanish:
  - caminó en ellos
  - vivió conforme a ellos
  lexicon: HALOT
  rationale: הלך en este giro significa seguir un camino de conducta. "Anduvo en ellos" conserva la metáfora bíblica de manera fluida en español y respeta el plural colectivo.
theological_decisions:
- issue: Nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Jehová
  - el SEÑOR
  rationale: El texto hebreo usa directamente el Tetragrámaton. El proyecto pide conservarlo como nombre propio, no ocultarlo tras una mayúscula devocional.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Fórmula de juicio moral en Reyes
  english_pob_reading: what was evil in the sight of Yahweh
  chosen_spanish_reading: lo malo ante los ojos de Yahvé
  alternative_spanish_readings:
  - lo malo a los ojos de Yahvé
  - el mal ante los ojos de Yahvé
  rationale: Mantiene la evaluación teológica del narrador sin suavizarla ni explicarla de más. La metáfora de los ojos conserva el carácter de juicio divino del pasaje.
  doctrine_reference: 'DOCTRINE.md Translation philosophy: optimal equivalence; preserve source meaning without paraphrase'
translation_notes:
  revision_awareness: La revisión inglesa más reciente prefirió entender מִכָּל en sentido distributivo como 'any of the sins' y mantuvo la cláusula final como 'he walked in them'. La versión española refleja esa decisión con 'de ninguno de los pecados' y 'anduvo en ellos', conservando la tensión entre el singular formal del pronombre hebreo y su referencia colectiva.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' conforme al estándar del proyecto para el Nombre divino.
  - Se conserva el paralelismo narrativo del hebreo con dos oraciones breves y una cláusula relativa final.
  - '''Anduvo en ellos'' respeta la imagen bíblica de conducta/camino y evita una paráfrasis doctrinal.'
  - La nota a pie de página aclara la alternativa singular del pronombre sin alterar el texto principal.
