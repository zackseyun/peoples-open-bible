translation:
  language: es
  text: Te ruego[a] que ella no sea como uno muerto, cuya carne está consumida a medias cuando sale del vientre de su madre.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, «como un mortinato, cuya carne está consumida a medias cuando sale del vientre de su madre». El hebreo compara a Miriam con uno muerto al nacer; algunas traducciones hacen explícita esa imagen en el texto principal.
    reason: lexical_alternative
lexical_decisions:
- source_word: אַל נָא
  english_pob_choice: Please, do not
  chosen_spanish: Por favor, que no
  alternatives_spanish:
  - Oh, no
  - Ruego que no
  - Te ruego que no
  lexicon: HALOT
  rationale: אַל expresa prohibición y נָא añade una nota de súplica. En español, «Por favor» comunica la petición urgente sin volver el tono mecánico ni excesivamente coloquial.
- source_word: תְהִי
  english_pob_choice: let her be
  chosen_spanish: que no sea
  alternatives_spanish:
  - no sea
  - que no llegue a ser
  - que no esté
  lexicon: HALOT
  rationale: 'La forma jussiva en contexto negativo expresa un ruego: no permitir que ella esté en ese estado. «Que no sea» conserva bien esa fuerza exhortativa en español.'
- source_word: כַּמֵּת
  english_pob_choice: like one dead
  chosen_spanish: como un muerto
  alternatives_spanish:
  - como uno muerto
  - como alguien muerto
  - como un cadáver
  lexicon: HALOT
  rationale: El hebreo compara con «el muerto / uno muerto». «Como un muerto» mantiene la comparación directa y natural en español sin especificar todavía la imagen de nacimiento muerto.
- source_word: אֲשֶׁר
  english_pob_choice: whose
  chosen_spanish: cuya
  alternatives_spanish:
  - que
  - el cual
  - de quien
  lexicon: HALOT
  rationale: La relativa introduce una descripción posesiva. «Cuya» reproduce con naturalidad la relación entre «muerto» y la condición de su carne.
- source_word: בְּצֵאתוֹ מֵרֶחֶם אִמּוֹ
  english_pob_choice: when he comes out of his mother’s womb
  chosen_spanish: cuando sale del vientre de su madre
  alternatives_spanish:
  - cuando sale del seno de su madre
  - al salir del vientre materno
  - cuando nace del vientre de su madre
  lexicon: HALOT
  rationale: El hebreo usa una expresión vívida de salida del vientre. «Sale del vientre de su madre» conserva la imagen corporal y temporal sin suavizarla demasiado.
- source_word: וַיֵּאָכֵל
  english_pob_choice: is half consumed
  chosen_spanish: está medio consumida
  alternatives_spanish:
  - ha sido consumida en parte
  - está consumida hasta la mitad
  - queda medio comida
  lexicon: HALOT
  rationale: Aunque la forma verbal es narrativa, el sentido en la comparación es de estado resultante. «Está medio consumida» comunica la condición visible de la carne con naturalidad en español.
- source_word: חֲצִי בְשָׂרוֹ
  english_pob_choice: his flesh is half consumed
  chosen_spanish: su carne está medio consumida
  alternatives_spanish:
  - media carne suya está consumida
  - está consumida la mitad de su carne
  - su cuerpo está medio consumido
  lexicon: HALOT
  rationale: בשר aquí es literalmente «carne», no «cuerpo» ni una metáfora moral. Mantener «carne» preserva la crudeza física del símil.
theological_decisions:
- issue: Referente femenino singular implícito
  english_pob_reading: '''her'' refers to Miriam'
  chosen_spanish_reading: la referencia queda implícita en el contexto
  alternative_spanish_readings:
  - que ella
  - Miriam
  rationale: El hebreo usa femenino singular, pero en español puede quedar implícito porque el contexto inmediato ya identifica a Miriam. Evita añadir el nombre donde el texto no lo repite.
  doctrine_reference: Contexto narrativo de Números 12
- issue: Imagen de muerte vs. mortinato
  english_pob_reading: The Hebrew compares her to one dead at birth; some translations make the stillbirth imagery explicit in the main text.
  chosen_spanish_reading: se mantiene la comparación general con un muerto, sin explicitar «mortinato» en el texto principal
  alternative_spanish_readings:
  - como un mortinato
  - como un niño nacido muerto
  - como uno muerto al nacer
  rationale: La comparación básica del hebreo es «como un muerto». La imagen de muerte al nacer está presente en la cláusula siguiente; por eso se conserva la progresión del símil sin cerrar prematuramente el sentido.
  doctrine_reference: Ninguna; decisión de precisión semántica y estilo
translation_notes:
  revision_awareness: El borrador sigue de cerca la última forma inglesa aprobada y no requiere ajustes adicionales según el historial de revisión; se conserva la misma distinción entre la comparación general («como un muerto») y la imagen más específica sugerida por la nota.
  spanish_consistency_notes:
  - Se preservó «carne» para בשר, evitando «cuerpo» por ser una generalización innecesaria.
  - «Por favor» se usa para reflejar la súplica de נָא sin perder el tono de ruego.
  - La referencia femenina se deja implícita porque el contexto narrativo ya la establece como Miriam.
  - La nota recoge la alternativa semántica de «mortinato» que el inglés POB también documenta.
