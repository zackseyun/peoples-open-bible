  text: הַ/נֶּ֥פֶשׁ הַ/חֹטֵ֖את הִ֣יא תָמ֑וּת בֵּ֞ן לֹא יִשָּׂ֣א בַּ/עֲוֺ֣ן הָ/אָ֗ב וְ/אָב֙ לֹ֤א יִשָּׂא֙ בַּ/עֲוֺ֣ן הַ/בֵּ֔ן צִדְקַ֤ת הַ/צַּדִּיק֙ עָלָ֣י/ו תִּֽהְיֶ֔ה וְ/רִשְׁעַ֥ת רשע עָלָ֥י/ו תִּֽהְיֶֽה־׀׃ס
base_translation:
  language: en
  yaml_path: translation/ot/ezekiel/018/020.yaml
  text: The person who sins—he shall die[a]. A son shall not bear the iniquity of the father, and a father shall not bear the iniquity of the son. The righteousness of the righteous shall be upon him[b], and the wickedness of the wicked shall be upon him.
  footnotes:
  - marker: a
    text: Or, more literally, 'The soul who sins, it shall die.' Here 'soul' (Hebrew nephesh) refers to the individual person.
    reason: lexical_alternative
  - marker: b
    text: '''Bear the iniquity'' is a Hebrew legal idiom that can include both guilt and its liability.'
    reason: cultural_note
  ai_draft:
