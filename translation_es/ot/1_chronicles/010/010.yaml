    issue: Los marcadores de notas [a] y [b] están colocados en el lugar incorrecto dentro del texto.
    rationale: La nota a explica «casa/templo», por lo que debe anclarse en «casa de sus dioses» (y, por extensión contextual, cubre también «casa de Dagón» como en el POB inglés). La nota b explica «cráneo/cabeza», por lo que debe anclarse en «cráneo». En el borrador aparecen invertidas, creando desalineación entre texto y aparato.
