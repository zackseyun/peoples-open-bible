translation:
  text: For when the leader and the force around him that seemed to be invincible had entered[a], they were cut down in the temple of Nanaia[b], because the priests of Nanaia had used deceit.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'that seemed invincible.' The Greek describes the force as appearing impossible to withstand.
    reason: lexical_alternative
  - marker: b
    text: Or 'by a trick' / 'through deceit.' The Greek genitive absolute explains that the priests associated with Nanaia brought this about by deception.
    reason: lexical_alternative
lexical_decisions:
- source_word: γενόμενος
  chosen: had entered
  alternatives:
  - having come
  - having arrived
  - when he came to be
  lexicon: LSJ
  rationale: The participle with ὁ ἡγεμών is awkward literally ('the leader having become'). In context it introduces the circumstance leading to the killing in the temple. 'Had entered' brings out the implied movement into the shrine required by the narrative context and yields natural English without over-paraphrasing.
- source_word: ὁ ἡγεμών
  chosen: the leader
  alternatives:
  - the governor
  - the ruler
  - the commander
  lexicon: LSJ
  rationale: ἡγεμών broadly denotes a leader/ruler. In this narrative setting it refers to the expedition's chief, not necessarily a formal provincial governor, so 'leader' is the least over-specific choice.
- source_word: ἡ περὶ αὐτὸν ... δύναμις
  chosen: the force around him
  alternatives:
  - his company
  - the troops with him
  - the army around him
  lexicon: LSJ
  rationale: δύναμις in military contexts commonly means force/troops. The phrase περὶ αὐτόν means those around/accompanying him. 'Force around him' preserves the military sense without overstating scale.
- source_word: ἀνυπόστατος δοκοῦσα εἶναι
  chosen: that seemed to be irresistible
  alternatives:
  - that seemed invincible
  - that seemed impossible to withstand
  - that seemed unassailable
  lexicon: LSJ
  rationale: ἀνυπόστατος literally suggests unable to be withstood or resisted. 'Irresistible' communicates the sense in idiomatic English; 'invincible' is possible but can imply absolute inability to be defeated rather than apparent human impressiveness. δοκοῦσα εἶναι is preserved with 'seemed to be.'
- source_word: κατεκόπησαν
  chosen: they were cut down
  alternatives:
  - they were struck down
  - they were slain
  - they were cut to pieces
  lexicon: LSJ
  rationale: The passive of κατακόπτω conveys violent killing by hacking/striking. 'Cut down' preserves the vividness without becoming overly graphic.
- source_word: ἐν τῷ τῆς Ναναίας ἱερῷ
  chosen: in the temple of Nanaia
  alternatives:
  - in Nanaia's temple
  - in the shrine of Nanaia
  lexicon: LSJ
  rationale: ἱερόν is best rendered 'temple' here. The genitive construction is naturally expressed in English as 'the temple of Nanaia.' The divine name is transliterated per project policy for names.
- source_word: παραλογισμῷ χρησαμένων
  chosen: because ... had used deceit
  alternatives:
  - by a trick
  - through treachery
  - by stratagem
  lexicon: LSJ
  rationale: The genitive absolute explains the means/cause of the killing. παραλογισμός denotes deception/trickery; χρησαμένων means 'having employed/used.' 'Because ... had used deceit' makes the causal-instrumental force clear in smooth English.
- source_word: τῶν περὶ τὴν Ναναίαν ἱερέων
  chosen: the priests attending Nanaia
  alternatives:
  - the priests of Nanaia
  - the priests around Nanaia
  - Nanaia's priests
  lexicon: LSJ
  rationale: The phrase likely means the priests associated with or serving the goddess Nanaia. 'Attending Nanaia' preserves the relational sense of περὶ without sounding spatially odd in English.
