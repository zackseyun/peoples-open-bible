review_pass:
  verdict: revise
  source_alignment_summary: El borrador sigue bien el hebreo base y conserva correctamente la variante griega en nota. Mantiene la estructura locativa de בַּעֲדַת / וּבְגוֹי y el contraste entre 'impíos/impía' y el juicio por fuego/ira. Sin embargo, 'arde fuego' es una construcción poco natural en español y debilita la dignidad/readabilidad del texto; además, la nota 'fue encendida' suena menos idiomática que 'fue encendida la ira' o mejor 'se encendió la ira'.
  spanish_quality_summary: 'La redacción es en general clara y fiel, pero necesita un ajuste estilístico menor para sonar natural en español bíblico contemporáneo. ''En la asamblea de los impíos'' y ''entre una nación impía'' funcionan bien. La coma antes de ''se enciende la ira'' no es necesaria. La mejor reparación mínima es explicitar el sujeto: ''el fuego arde''.'
  glossary_alignment: No hay conflictos con la terminología base del proyecto. 'Impíos/impía' representa adecuadamente רְשָׁעִים y חָנֵף en este contexto; 'ira' para חֵמָה es apropiado. No intervienen términos sensibles como Yahvé, Mesías, esclavo, etc.
  issues:
  - severity: medium
    issue: 'Construcción poco natural: ''arde fuego'''
    rationale: Aunque intenta reflejar el hebreo de forma concisa, en español suena forzado. 'El fuego arde' preserva el sentido y mejora mucho la legibilidad sin añadir significado.
  - severity: low
    issue: Coma innecesaria en 'y entre una nación impía, se enciende la ira'
    rationale: La pausa no corresponde a la sintaxis normal española y entorpece el paralelismo.
  - severity: low
    issue: Redacción de la nota con 'fue encendida'
    rationale: Es comprensible, pero menos idiomática en español que 'se encendió la ira', que sigue transmitiendo la variante griega con claridad.
  revised_spanish_text: En la asamblea de los impíos[a], el fuego arde; y entre una nación impía se enciende la ira.
  revised_footnotes:
  - marker: a
    text: 'Griego: «entre una nación desobediente, se encendió la ira». El hebreo dice «nación impía».'
    reason: alternative_reading
  revision_rationale: Se hace una reparación menor de estilo para que el español sea natural y digno sin alterar el sentido del hebreo ni la nota textual del inglés POB. 'El fuego arde' refleja mejor יוֹקֶדֶת אֵשׁ en español, se elimina una coma innecesaria y se mejora la idiomaticidad de la nota griega.
