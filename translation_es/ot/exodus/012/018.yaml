review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el sentido general del hebreo: primer mes, día catorce, comer panes sin levadura, hasta el día veintiuno al anochecer. Sin embargo, la nota al pie no preserva la alternativa documentada en el rastro inglés, porque repite la misma expresión en vez de ofrecer la variante equivalente a ''en la noche/la tarde'' o, mejor, ''por la noche''/''en la tarde''. Además, ''panes sin levadura'' es comprensible, pero en este contexto festivo y con מַצּוֹת como sustantivo de alimento, ''pan sin levadura'' suena más natural en español como nombre genérico.'
  spanish_quality_summary: El texto es claro y legible, pero puede pulirse para mayor naturalidad bíblica en español. 'El día catorce del mes' es aceptable, aunque 'a los catorce días del mes' o 'el día catorce del mes' ambos funcionarían; no exige cambio. La principal reparación necesaria es la nota al pie mal formulada. También conviene singularizar 'pan sin levadura' para una expresión más idiomática sin perder el valor colectivo.
  glossary_alignment: No hay conflictos con la terminología doctrinal del proyecto. La decisión 'al anochecer' para בָּעֶרֶב es defendible. 'Panes sin levadura' no contradice el glosario, pero 'pan sin levadura' se alinea mejor con la opción inglesa estándar 'unleavened bread' y con el uso natural del español. No hay términos como Yahvé, Mesías, espíritu, etc., involucrados aquí.
  issues:
  - severity: medium
    issue: La nota al pie repite la lectura principal en vez de dar una alternativa real.
    rationale: 'La nota dice: ''O «al anochecer» en ambos casos de «al anochecer»'', lo cual no añade información y no preserva la alternativa documentada en inglés (''in the evening'').'
  - severity: low
    issue: '''Panes sin levadura'' suena menos idiomático que ''pan sin levadura'' en este contexto.'
    rationale: Aunque el hebreo está en plural, en español el alimento se expresa con naturalidad como nombre de masa/genérico. 'Pan sin levadura' comunica mejor el referente sin pérdida relevante.
  revised_spanish_text: En el primer mes[a], el día catorce del mes, al anochecer, comerán pan sin levadura, hasta el día veintiuno del mes, al anochecer.
  revised_footnotes:
  - marker: a
    text: O «en la tarde» en ambos casos de «al anochecer».
    reason: lexical_alternative
  revision_rationale: Se corrige la nota al pie para que presente una alternativa léxica real al hebreo בָּעֶרֶב en ambas ocurrencias, conforme al rastro inglés. También se ajusta 'panes sin levadura' a 'pan sin levadura' por mayor naturalidad en español sin cambiar el sentido fuente.
