  - marker: b
    text: El hebreo de este versículo es difícil, especialmente en las expresiones tradicionalmente traducidas ‘tu clamor’ y ‘no en angustia’.
    reason: lexical_alternative
  revision_rationale: Se ajusta la redacción principal para mayor naturalidad en español (‘¿Te servirá de algo...?’) conservando el sentido de ‘avail’. Se mejora la expresión final para evitar un calco demasiado duro, manteniendo la idea de esfuerzos derivados de la fuerza. Se corrige la nota alternativa para reflejar con más fidelidad la alternativa auditada en inglés y se corrige el anclaje del marcador.
