translation:
  language: es
  text: En el tercer año del reinado de Belsasar el rey[a], se me apareció una visión a mí —yo, Daniel— después de la visión que se me había aparecido al principio.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, más literalmente, «después de la que se me había aparecido al principio». El hebreo remite a una aparición anterior y probablemente alude a la visión previa de Daniel.
    reason: lexical_alternative
lexical_decisions:
- source_word: בִּשְׁנַת
  english_pob_choice: In the ... year of
  chosen_spanish: En el ... año de
  alternatives_spanish:
  - Durante el ... año de
  lexicon: HALOT
  rationale: La construcción temporal con בְּ + שָׁנָה en fórmulas cronológicas se expresa naturalmente en español con «en el ... año de», manteniendo el valor dativo-temporal del hebreo sin sobreparafrasear.
- source_word: שָׁל֔וֹשׁ
  english_pob_choice: third
  chosen_spanish: tercer
  alternatives_spanish:
  - tres
  lexicon: HALOT
  rationale: En esta fórmula de datación, el cardinal funciona idiomáticamente como ordinal; «tercer» conserva el valor cronológico exacto.
- source_word: לְמַלְכ֖וּת
  english_pob_choice: of the reign of
  chosen_spanish: del reinado de
  alternatives_spanish:
  - de la realeza de
  - cuando reinaba
  lexicon: HALOT
  rationale: מַלְכוּת aquí denota el período de gobierno real. «Reinado» es la equivalencia española más precisa y natural para esta fórmula histórica.
- source_word: בֵּלְאשַׁצַּר
  english_pob_choice: Belshazzar
  chosen_spanish: Belsasar
  alternatives_spanish:
  - Belshazzar
  lexicon: HALOT
  rationale: Se adopta la transliteración española usual «Belsasar», que es clara para lectores bíblicos en español y preserva el nombre propio sin anglicismo innecesario.
- source_word: הַמֶּלֶךְ
  english_pob_choice: the king
  chosen_spanish: el rey
  alternatives_spanish:
  - rey Belsasar
  - el monarca
  lexicon: HALOT
  rationale: Se conserva el aposicional «el rey» de manera explícita, reflejando el orden del hebreo y la referencia titulada del personaje.
- source_word: חָזוֹן
  english_pob_choice: a vision
  chosen_spanish: una visión
  alternatives_spanish:
  - visión
  lexicon: HALOT
  rationale: El término introduce una experiencia visionaria concreta e indefinida; «una visión» mantiene esa apertura sin añadir interpretaciones.
- source_word: נִרְאָה
  english_pob_choice: appeared
  chosen_spanish: se me apareció
  alternatives_spanish:
  - apareció a mí
  - fue vista por mí
  lexicon: HALOT
  rationale: El nifal de ראה en contextos visionarios se expresa mejor en español como «se apareció»; el dativo «se me» conserva con claridad que Daniel es el receptor de la visión.
- source_word: אֵלַי
  english_pob_choice: to me
  chosen_spanish: se me
  alternatives_spanish:
  - a mí
  lexicon: HALOT
  rationale: La marca de destinatario se integra de forma idiomática en el verbo pronominal español, sin perder el sentido de dirección hacia Daniel.
- source_word: אֲנִי דָנִיֵּאל
  english_pob_choice: I, Daniel
  chosen_spanish: a mí, Daniel
  alternatives_spanish:
  - yo, Daniel
  - yo, Daniel mismo
  lexicon: HALOT
  rationale: La autoidentificación enfática se conserva con el inciso «a mí, Daniel», que reproduce la estructura explicativa del hebreo y evita una reordenación excesiva.
- source_word: אַחֲרֵי
  english_pob_choice: after
  chosen_spanish: después de
  alternatives_spanish:
  - tras
  lexicon: HALOT
  rationale: Se mantiene el valor secuencial-temporal básico de אַחֲרֵי con la preposición española más directa.
- source_word: הַנִּרְאָה
  english_pob_choice: the one that had appeared
  chosen_spanish: la que se me había aparecido
  alternatives_spanish:
  - la visión que se me había aparecido
  - lo que se me había aparecido
  lexicon: HALOT
  rationale: El participio con artículo remite a una aparición previa específica. «La que se me había aparecido» conserva el anclaje pronominal y la referencia retrospectiva sin forzar el sustantivo «visión» donde el hebreo no lo repite explícitamente.
- source_word: בַּתְּחִלָּה
  english_pob_choice: at the first
  chosen_spanish: al principio
  alternatives_spanish:
  - al comienzo
  - antes
  lexicon: HALOT
  rationale: «Al principio» expresa con naturalidad la referencia retrospectiva a la primera visión; en español suena más fluido que una calca como «en el primero» o «al primero».
theological_decisions:
- issue: Referencia a la visión anterior y posible alusión a una primera visión previa
  english_pob_reading: after the one that had appeared to me at the first
  chosen_spanish_reading: después de la que se me había aparecido al principio
  alternative_spanish_readings:
  - después de la visión que se me había aparecido al principio
  - después de lo que se me había aparecido al principio
  rationale: Se preserva la referencia retrospectiva a una aparición anterior sin resolver innecesariamente la forma nominal hebrea. El español permite mantener la ambigüedad controlada entre «la que» y «la visión que», tal como el audit trail inglés sugiere.
  doctrine_reference: Daniel 8:1; referencia interna a la visión previa de Daniel
- issue: Valor del nombre divino no aplica; se mantiene la cronología histórica de la sección
  english_pob_reading: In the third year of the reign of Belshazzar the king
  chosen_spanish_reading: En el tercer año del reinado de Belsasar el rey
  alternative_spanish_readings:
  - En el tercer año del reinado del rey Belsasar
  rationale: No hay tensión teológica relevante; la decisión principal es conservar el encuadre histórico exacto y el énfasis del título real. Se mantiene el aposición explícita para reflejar el hebreo.
  doctrine_reference: Daniel 8:1; cronología narrativa
translation_notes:
  revision_awareness: El auditor inglés señaló que no se requerían cambios sustanciales y que la única tensión menor está en la referencia retrospectiva de הַנִּרְאָה. La redacción española conserva esa apertura mediante «la que se me había aparecido» y una nota alternativa más explícita.
  spanish_consistency_notes:
  - Se usó «Belsasar» como forma española estándar del nombre propio, consistente con el registro bíblico en español.
  - Se mantuvo «visión» como sustantivo explícito para חָזוֹן, y «se me apareció» para נִרְאָה, distinguiendo visión y aparición sin mezclarlos.
  - La estructura con inciso «a mí, Daniel» reproduce la autoidentificación enfática del hebreo.
  - Se prefirió «al principio» para בַּתְּחִלָּה por naturalidad española y fidelidad semántica.
