translation:
  language: es
  text: Su plantío está arraigado para siempre[a]; no cesarán[b] todos los días del cielo[c], porque Israel es la porción y herencia de Dios.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «arraigado firmemente»; el participio griego expresa un estado duradero y establecido.
    reason: lexical_alternative
  - marker: b
    text: O «no llegarán a su fin» / «no serán cortados». El verbo es raro y apunta a una estabilidad permanente.
    reason: lexical_alternative
  - marker: c
    text: «Todos los días del cielo» es una expresión literal para la duración completa del orden celestial presente.
    reason: cultural_note
lexical_decisions:
- source_word: φυτεία
  english_pob_choice: planting
  chosen_spanish: plantío
  alternatives_spanish:
  - plantación
  - plantío sembrado
  - lo plantado
  lexicon: LSJ
  rationale: φυτεία designa lo plantado o una plantación. "Plantío" mantiene la metáfora agrícola con buena naturalidad en español y permite referirse al conjunto plantado sin especificar más de lo que el griego dice.
- source_word: ἐρριζωμένη
  english_pob_choice: rooted
  chosen_spanish: arraigado
  alternatives_spanish:
  - enraizado
  - firmemente arraigado
  - establecido
  lexicon: LSJ
  rationale: El participio perfecto pasivo expresa un estado ya asentado y duradero. "Arraigado" conserva la imagen vegetal y comunica permanencia con naturalidad.
- source_word: εἰς τὸν αἰῶνα
  english_pob_choice: forever
  chosen_spanish: para siempre
  alternatives_spanish:
  - por la eternidad
  - para el siglo venidero
  - para el eón
  lexicon: LSJ
  rationale: En contexto la expresión comunica permanencia continua, no un tecnicismo de "edad". "Para siempre" es idiomático en español y conserva la fuerza durativa.
- source_word: ἐκλήξουσιν
  english_pob_choice: they will not fail
  chosen_spanish: no fallarán
  alternatives_spanish:
  - no cesarán
  - no llegarán a su fin
  - no se extinguirán
  lexicon: LSJ
  rationale: El verbo es raro y en este contexto expresa no cesar ni venirse abajo. "No fallarán" sigue la línea del POB inglés, pero en español puede sonar a defecto moral; por eso se prefiere "no fallarán" solo dentro de una construcción de estabilidad, manteniendo la idea de persistencia sin exagerar.
- source_word: πάσας τὰς ἡμέρας τοῦ οὐρανοῦ
  english_pob_choice: all the days of heaven
  chosen_spanish: todos los días del cielo
  alternatives_spanish:
  - todos los días bajo el cielo
  - durante todos los días del cielo
  - por todo el tiempo del orden del cielo
  lexicon: LSJ
  rationale: Se conserva de cerca la idiomática elevada del griego. "Del cielo" reproduce el giro literal y deja abierta la idea de la duración completa del orden presente, sin resolverla demasiado.
- source_word: μερὶς
  english_pob_choice: portion
  chosen_spanish: porción
  alternatives_spanish:
  - parte
  - lote
  - cuota
  lexicon: LSJ
  rationale: '"Porción" es el equivalente bíblico natural para lenguaje de repartición y alianza, y encaja con κληρονομία en la segunda mitad del verso.'
- source_word: κληρονομία
  english_pob_choice: inheritance
  chosen_spanish: herencia
  alternatives_spanish:
  - heredad
  - posesión
  - patrimonio
  lexicon: LSJ
  rationale: '"Herencia" conserva el valor de posesión recibida por asignación y es transparente para el lector español. Se evita "heredad" por sonar más arcaico, aunque sigue siendo una alternativa válida.'
- source_word: τοῦ θεοῦ
  english_pob_choice: of God
  chosen_spanish: de Dios
  alternatives_spanish:
  - perteneciente a Dios
  lexicon: LSJ
  rationale: 'El genitivo posesivo se deja de manera directa: "de Dios". Es claro y no introduce matices no presentes en el griego.'
theological_decisions:
- issue: Identidad corporativa pactal de Israel como posesión asignada de Dios
  english_pob_reading: Israel is the portion and inheritance of God
  chosen_spanish_reading: Israel es la porción y herencia de Dios
  alternative_spanish_readings:
  - Israel es la porción y la herencia de Dios
  - Israel es la herencia y porción de Dios
  - Israel pertenece a Dios como porción y herencia
  rationale: La construcción predicativa griega admite este orden. Se mantiene la afirmación pactal sin ampliarla doctrinalmente ni invertir el énfasis hacia una formulación explicativa.
  doctrine_reference: Preservar la tensión teológica y el lenguaje de alianza sin resolverlo por paráfrasis.
translation_notes:
  revision_awareness: Se tuvo en cuenta el historial de revisión inglés que corrigió una primera lectura de ἐκλήξουσιν como "fall"/"come to an end" hacia una expresión de persistencia más natural. En español se optó por una formulación estable y no moralizante, manteniendo la fuerza del verbo raro y la imagen botánica del verso.
  spanish_consistency_notes:
  - Se conserva "Dios" para θεός, no una perífrasis devocional.
  - Se mantiene el lenguaje de alianza con "porción" y "herencia".
  - Se preserva la metáfora vegetal de φυτεία + ἐρριζωμένη con vocabulario coherente.
  - La expresión "todos los días del cielo" se deja cercana al griego por su valor idiomático y elevado.
