  - severity: low
    issue: ‘en favor de él’ suena pesado
    rationale: Aunque es entendible y busca reflejar el sufijo de tercera persona, en esta construcción idiomática ‘por él’ resulta más natural y suficientemente fiel al sentido de parcialidad hacia alguien.
