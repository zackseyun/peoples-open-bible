revisions:
- from: Y en cuanto a la cosa[a] que hemos hablado tú y yo, mira, Yahvé está entre tú y yo para siempre.
  to: Y en cuanto al asunto[a] del que hemos hablado tú y yo, he aquí, Yahvé está entre tú y yo para siempre.
  rationale: Se ajusta 'cosa' a 'asunto' para reflejar mejor el sentido contextual de דָּבָר y mejorar la naturalidad y dignidad del español. Se corrige la relativa a 'del que hemos hablado' para que la sintaxis sea idiomática. Se cambia 'mira' por 'he aquí' para representar mejor הִנֵּה en registro bíblico solemne, sin alterar el significado. Se conserva 'Yahvé', 'entre tú y yo' y 'para siempre' por fidelidad al hebreo y a la política del proyecto.
