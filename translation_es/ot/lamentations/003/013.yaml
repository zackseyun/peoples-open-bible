translation:
  language: es
  text: Clavó en mis riñones los hijos de su aljaba[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebreo literalmente, "los hijos de su aljaba"; es decir, sus flechas.
