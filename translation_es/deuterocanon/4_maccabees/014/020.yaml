translation:
  language: es
  text: Pero el afecto por sus hijos[a] no movió a la madre de los jóvenes, que era de un mismo espíritu con Abraham.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «la madre de los jóvenes, semejante a Abraham»; el griego dice literalmente «la madre de los jóvenes, de un mismo espíritu con Abraham».
    reason: lexical_alternative
lexical_decisions:
- source_word: μετεκίνησεν
  english_pob_choice: did not move
  chosen_spanish: no movió
  alternatives_spanish:
  - no la conmovió
  - no la desplazó
  - no la apartó
  lexicon: LSJ
  rationale: El verbo conserva en español la imagen de ser desplazada de una postura o convicción. «No movió» mantiene la fuerza metafórica y el sentido de resistencia interior sin forzar una paráfrasis.
- source_word: συμπάθεια
  english_pob_choice: sympathy
  chosen_spanish: simpatía
  alternatives_spanish:
  - compasión
  - afecto maternal
  - sentimiento de ternura
  lexicon: LSJ
  rationale: La POB inglesa revisó su opción desde una formulación más interpretativa hacia «sympathy». En español, «simpatía» refleja de manera más directa la raíz y puede abarcar el sentir compartido o la sensibilidad afectiva sin especificar indebidamente solo compasión o solo ternura.
- source_word: τέκνων
  english_pob_choice: her children
  chosen_spanish: sus hijos
  alternatives_spanish:
  - los hijos
  - su descendencia
  - sus descendientes
  lexicon: LSJ
  rationale: Aunque el griego no expresa un posesivo explícito, el contexto maternal lo hace natural. «Sus hijos» es idiomático y conserva la relación implícita sin añadir más de lo que el texto sugiere.
- source_word: ὁμόψυχον
  english_pob_choice: of one spirit with
  chosen_spanish: de un mismo espíritu con
  alternatives_spanish:
  - de un mismo ánimo con
  - unida en espíritu con
  - de una misma alma con
  lexicon: LSJ
  rationale: La expresión apunta a una solidaridad interior compartida. «De un mismo espíritu con» preserva la conexión fuerte con Abraham y evita reducirla a simple parecido de ideas.
- source_word: τῶν νεανιῶν μητέρα
  english_pob_choice: the mother of the young men
  chosen_spanish: la madre de los jóvenes
  alternatives_spanish:
  - la madre de los muchachos
  - la madre de los jóvenes hombres
  lexicon: LSJ
  rationale: «Jóvenes» es natural en español bíblico contemporáneo y corresponde a νεανίαι; la forma evita un calco pesado y sigue siendo clara en el contexto martirial.
theological_decisions:
- issue: Relación de la madre con Abraham
  english_pob_reading: The mother shares Abraham's steadfast inner disposition, not merely ethnic descent.
  chosen_spanish_reading: La madre comparte el mismo espíritu de fidelidad que Abraham, no solo un vínculo de descendencia.
  alternative_spanish_readings:
  - la madre era como Abraham
  - la madre pertenecía a la línea de Abraham
  rationale: 'ὁμόψυχον con genitivo expresa afinidad interior, no mera genealogía. La redacción española conserva esa tensión: honra la cercanía espiritual con Abraham sin convertirla en una afirmación meramente étnica.'
  doctrine_reference: Preservar la tensión semántica del original; primacía del sentido del griego sobre formulaciones tradicionales de filiación.
translation_notes:
  revision_awareness: Tomé como base la lectura inglesa revisada que cambió «motherly affection» por «sympathy», y reflejé esa decisión en español con «simpatía». También preservé la estructura formal del verso y la observación auditada de que ὁμόψυχον apunta a una afinidad espiritual con Abraham, no a una mera referencia genealógica.
  spanish_consistency_notes:
  - Se usa «espíritu» para ὁμόψυχον en coherencia con el valor de solidaridad interior del texto.
  - Se evitó «Cristo»/«Mesías» porque no aparece en este versículo.
  - La nota al pie conserva la alternativa lexicográfica documentada por la POB inglesa, adaptada al español con una advertencia literal sobre el griego.
