lexical_decisions:
- source_word: כִּי
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  - Puesto que
  lexicon: HALOT
  rationale: Introduce la base o explicación de lo dicho en el contexto inmediato. «Porque» preserva bien esa fuerza explicativa en español natural.
- source_word: יִתְחַמֵּץ
  english_pob_choice: was embittered
  chosen_spanish: se había amargado
  alternatives_spanish:
  - estaba amargado
  - se había agriado
  - se había vuelto amargo
  lexicon: HALOT
  rationale: El verbo sugiere una interioridad que se agria o se amarga. «Se había amargado» conserva la metáfora gustativa y su sentido emocional sin volverlo demasiado abstracto.
- source_word: לְבָבִי
  english_pob_choice: my heart
  chosen_spanish: mi corazón
  alternatives_spanish:
  - mi corazón interior
  - mi mente
  - mi ser interior
  lexicon: HALOT
  rationale: En español, «corazón» comunica de manera natural el centro de la vida interior, los afectos y la voluntad, y corresponde bien al hebreo לֵב/לְבָב.
- source_word: וְכִלְיוֹתַי
  english_pob_choice: my kidneys
  chosen_spanish: mis riñones
  alternatives_spanish:
  - mis entrañas
  - mis partes internas
  - mis interiores
  lexicon: HALOT
  rationale: Se conserva el término concreto del hebreo, como en la POB inglesa. «Riñones» mantiene la imagen corporal original; una alternativa explicativa puede darse en nota.
- source_word: אֶשְׁתּוֹנָן
  english_pob_choice: my kidneys were pierced
  chosen_spanish: habían sido traspasados
  alternatives_spanish:
  - habían sido perforados
  - habían sido heridos
  - habían sido atravesados
  lexicon: HALOT
  rationale: La forma verbal transmite una afectación aguda y punzante. «Traspasados» ofrece una imagen fuerte y formalmente cercana al sujeto plural «mis riñones».
translation_notes:
  revision_awareness: Tomé en cuenta la revisión inglesa que explicitó «my kidneys» como sujeto en la segunda cláusula; por eso el español también mantiene el sujeto plural («mis riñones») en lugar de convertirlo en una paráfrasis impersonal.
  spanish_consistency_notes:
  - 'Se conservó la metáfora corporal del hebreo para ambas partes: «corazón» y «riñones».'
  - La construcción verbal en pluscuamperfecto compuesto («se había amargado», «habían sido traspasados») refleja el estado resultante sin añadir tiempo aspectual no atestiguado con certeza.
  - La nota preserva la tensión entre traducción literal («riñones») y la lectura idiomática («entrañas»).
