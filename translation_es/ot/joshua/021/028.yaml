translation:
  language: es
  text: 'Y de la tribu de Isacar: Kisión[a] con sus tierras de pasto[c], y Daberat[b] con sus tierras de pasto.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Kisión refleja la forma del hebreo קִשְׁיוֹן. En algunas tradiciones aparece como Kishón o Kishion; aquí se conserva una forma española cercana al texto masorético.
    reason: alternative_reading
  - marker: b
    text: Daberat corresponde al hebreo דָּבְרַת. Algunas versiones y tradiciones de transliteración usan Daberath.
    reason: alternative_reading
  - marker: c
    text: 'O también ‘terreno abierto’ o ‘tierras comunes’: la tierra asociada a cada ciudad para su uso y pastoreo.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וּמִמַּטֵּה
  english_pob_choice: And from the tribe of
  chosen_spanish: Y de la tribu de
  alternatives_spanish:
  - Y del lote de
  - Y del bastón/tribu de
  lexicon: HALOT
  rationale: En contextos de repartición tribal, מַטֶּה designa ‘tribu’. En español, ‘de la tribu de’ comunica con naturalidad el origen y la pertenencia sin introducir una imagen ajena como ‘bastón’.
- source_word: יִשָּׂשכָר
  english_pob_choice: Issachar
  chosen_spanish: Isacar
  alternatives_spanish:
  - Issacar
  lexicon: Nombre propio bíblico
  rationale: Se adapta al uso español habitual del nombre tribal, manteniendo la identificación con el hebreo מקור y una forma reconocible para lectores en español.
- source_word: קִשְׁיוֹן
  english_pob_choice: Kishion
  chosen_spanish: Quisién
  alternatives_spanish:
  - Kishion
  lexicon: Transliteración del nombre propio
  rationale: Se preserva el nombre de lugar como topónimo propio, con una transliteración española que respeta la base consonántica y el valor vocálico aproximado del MT.
- source_word: מִגְרָשֶׁיהָ
  english_pob_choice: its pasturelands
  chosen_spanish: sus tierras de pasto
  alternatives_spanish:
  - sus campos abiertos
  - sus tierras comunes
  - su terreno abierto
  lexicon: HALOT
  rationale: מִגְרָשׁ alude al terreno abierto asociado a la ciudad; ‘tierras de pasto’ conserva bien el matiz de área abierta/usable en un registro natural en español. Se mantiene el plural porque la construcción hebrea se aplica a cada ciudad mencionada.
- source_word: דָּבְרַת
  english_pob_choice: Daberath
  chosen_spanish: Daberat
  alternatives_spanish:
  - Daberath
  lexicon: Transliteración del nombre propio
  rationale: Se sigue la forma consonántica del hebreo en una transliteración española sobria. La alternativa inglesa documentada se registra como variante en nota.
translation_notes:
  revision_awareness: Se tomó en cuenta la revisión inglesa que corrigió el topónimo a Daberath y se preservó la decisión auditada de traducir מִגְרָשׁ como un terreno abierto/pastoral asociado a cada ciudad. También se evitó una calca de ‘pasturelands’ que sonara poco natural en español.
  spanish_consistency_notes:
  - Se mantuvo el orden simple de la enumeración para reflejar la estructura hebrea.
  - Se usó ‘Y de la tribu de’ para reproducir el valor distributivo de מִן/וּמִמַּטֵּה sin sobreexplicar.
  - Los topónimos se tratan como nombres propios, con notas para variantes tradicionales cuando el audit trail las documenta.
