  text: 'Why do you question me? Question those who have heard what I said to them. Look[a], they know what I said.'
  footnotes:
  - marker: a
    text: 'Or ''Why are you asking me? Ask those who heard what I said to them.'' The Greek verb can be rendered more neutrally as ''ask,'' but ''question'' better reflects the hearing''s judicial setting.'
    reason: lexical_alternative
translation:
  language: ko
  text: '왜 내게 묻습니까? 내가 그들에게 말한 것을 들은 자들에게 물으십시오. 보십시오, 그들은 내가 말한 것을 알고 있습니다.」'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: '또는 「왜 내게 묻고 있느냐? 내가 그들에게 말한 것을 들은 자들에게 물으라」. 헬라어 동사는 더 중립적으로 「묻다」로도 옮길 수 있으나, 공식 심리 문맥을 반영해 「묻다」를 유지한다.'
    reason: lexical_alternative
