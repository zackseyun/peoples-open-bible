translation:
  language: es
  text: 'Y se puso en pie y bendijo a toda la asamblea[a] de Israel a gran voz[b], diciendo:'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «toda la congregación de Israel».
    reason: lexical_alternative
  - marker: b
    text: Lit. «con voz grande», es decir, «a gran voz».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּעְמֹד
  english_pob_choice: And he stood
  chosen_spanish: Y se puso en pie
  alternatives_spanish:
  - Y estuvo en pie
  - Y se levantó
  lexicon: HALOT
  rationale: El hebreo narra la siguiente acción en secuencia; en español, «se puso en pie» expresa con naturalidad el acto de ponerse de pie para hablar en un contexto público y ceremonial. Mantiene el sentido básico de עמד sin sonar arcaico.
- source_word: וַיְבָרֶךְ
  english_pob_choice: blessed
  chosen_spanish: bendijo
  alternatives_spanish:
  - pronunció una bendición sobre
  - dijo una bendición sobre
  lexicon: HALOT
  rationale: En este contexto, ברך se refiere a pronunciar una bendición sobre el pueblo reunido. «Bendijo» conserva la concisión del texto y el valor litúrgico sin añadir una mecánica teológica que el hebreo no explicita.
- source_word: כָּל קְהַל יִשְׂרָאֵל
  english_pob_choice: all the assembly of Israel
  chosen_spanish: toda la asamblea de Israel
  alternatives_spanish:
  - toda la congregación de Israel
  - todo el conjunto de Israel
  lexicon: HALOT
  rationale: קהל designa al pueblo reunido como cuerpo. «Asamblea» preserva mejor el matiz corporativo y público que «congregación», que en español puede sonar más eclesiástico. «Toda» representa כָּל.
- source_word: קוֹל גָּדוֹל
  english_pob_choice: with a loud voice
  chosen_spanish: con voz fuerte
  alternatives_spanish:
  - en voz alta
  - con gran voz
  lexicon: HALOT
  rationale: La expresión hebrea dice literalmente «voz grande», con sentido de volumen. «Con voz fuerte» es idiomático en español y conserva el carácter audible y solemne del discurso. «En voz alta» también es posible, pero algo menos solemne.
- source_word: לֵאמֹר
  english_pob_choice: 'saying:'
  chosen_spanish: 'diciendo:'
  alternatives_spanish:
  - 'y dijo:'
  lexicon: HALOT
  rationale: La forma infinitiva introduce el contenido de la cita siguiente. «Diciendo:» mantiene el enlace formal con lo que sigue y corresponde bien al estilo narrativo bíblico.
theological_decisions:
- issue: Sentido de «bendijo» aplicado a Salomón
  english_pob_reading: Solomón pronunció una bendición sobre la asamblea reunida, no que él comunicara gracia divina por poder propio.
  chosen_spanish_reading: Salomón pronunció una bendición sobre el pueblo reunido, sin atribuirle un poder causativo especial no expresado por el texto.
  alternative_spanish_readings:
  - Salomón impartió una bendición eficaz por sí mismo
  - Salomón otorgó gracia mediante la bendición
  rationale: El hebreo permite el sentido de hablar una bendición en un acto solemne. La traducción conserva «bendijo» para no debilitar el verbo, pero evita formularlo como un acto sacramental o causativo que el pasaje no afirma.
  doctrine_reference: Affirmations; Translation philosophy §§1, 3, 6
translation_notes:
  revision_awareness: El archivo fuente y el audit trail en inglés muestran alta concordancia y no registran revisiones aplicadas; esta redacción sigue de cerca las decisiones léxicas ya validadas, adaptándolas al español natural sin introducir cambios de sentido.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma general del proyecto cuando aparezca el nombre divino; en este versículo no aparece.
  - Se conserva «asamblea» para קהל, en línea con la preferencia del proyecto por el matiz corporativo y público.
  - «Con voz fuerte» refleja el hebreo literal y la nota aclara la equivalencia idiomática para lectores en español.
  - La puntuación con dos puntos tras «diciendo» prepara correctamente la cita inmediata siguiente.
