  - severity: medium
    issue: Uso de 'shequemitas' para הַשִּׁכְמִי
    rationale: El gentilicio derivado de 'Shequem' hereda el mismo problema de naturalidad. 'Siquemitas' es la forma española más clara y adecuada para un texto eclesial de lectura amplia.
