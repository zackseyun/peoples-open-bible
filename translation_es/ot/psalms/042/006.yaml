base_translation:
  language: en
  yaml_path: translation/ot/psalms/042/006.yaml
  text: Why are you cast down[a], O my soul, and why are you in turmoil within me? Hope in God, for I will yet praise him, the salvation of my countenance and my God.
  footnotes:
