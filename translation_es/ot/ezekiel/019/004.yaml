base_translation:
  language: en
  yaml_path: translation/ot/ezekiel/019/004.yaml
  text: The nations heard of him[a]; he was caught in their pit[c][b], and they brought him with hooks to the land of Egypt.
  footnotes:
  - marker: a
    text: Or 'heard of him.' The Hebrew idiom may denote hearing reports concerning him rather than hearing him directly.
    reason: lexical_alternative
  - marker: b
    text: Or 'trap' for 'pit.' The image is of a hunting pit used to capture prey.
    reason: lexical_alternative
  - marker: c
    text: '''With hooks'' may refer to restraining hooks or rings used on captured animals or prisoners.'
    reason: cultural_note
