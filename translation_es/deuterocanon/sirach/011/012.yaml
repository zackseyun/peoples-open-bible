review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue correctamente el hebreo como testigo principal y conserva bien el paralelismo proverbial: «si no corres ... si no buscas ...». También mantiene el vocativo filial y la nota sobre la gran divergencia griega. Sin embargo, «no llegarás» refleja más bien movimiento/arribo, mientras que el POB inglés documenta «attain» como decisión preferida para expresar alcanzar una meta; en español «no alcanzarás» preserva mejor ese matiz.'
  spanish_quality_summary: El español es claro y legible, con tono sapiencial adecuado. «Hijo mío» y «buscar/hallar» funcionan bien. La principal mejora es sustituir «no llegarás» por «no alcanzarás», que suena más natural en este proverbio y evita una lectura demasiado espacial.
  glossary_alignment: No hay conflictos con la terminología base del proyecto. La nota usa «el Señor» para traducir κύριος en el testigo griego, lo cual es aceptable porque se está describiendo la lectura griega alternativa y no el tetragrámaton hebreo del texto principal. El resto de decisiones léxicas concuerdan con el expediente inglés.
  issues:
  - severity: medium
    issue: «no llegarás» para תַגִּיעַ
    rationale: Aunque posible, «llegarás» enfatiza arribo espacial. Dado que la decisión inglesa auditada favorece «attain» por el sentido de lograr una meta, «alcanzarás» comunica mejor el valor proverbial sin sobreinterpretar.
  - severity: low
    issue: 'Redacción de la nota: «se vuelven para bien»'
    rationale: Es comprensible, pero «miran con favor» o «lo miran para bien» suena más natural en español bíblico contemporáneo. Se puede pulir sin cambiar el contenido.
  revised_spanish_text: Hijo mío[a], si no corres, no alcanzarás; y si no buscas, no hallarás.
  revised_footnotes:
  - marker: a
    text: 'El testigo griego en este punto difiere notablemente: habla de una persona perezosa, falta de fuerzas y abundante en pobreza, a quien los ojos del Señor miran para bien y levantan de su humillación. Por eso, aquí se sigue el hebreo como testigo principal, conservando el griego como una tradición textual alternativa significativa.'
    reason: textual_variant
