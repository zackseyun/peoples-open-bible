translation:
  language: es
  text: No entres por la puerta de mi pueblo en el día de su desastre; no mires[a] su calamidad, incluso tú, en el día de su desastre; y no pongas mano sobre sus bienes[b] en el día de su desastre.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «veas»; el verbo hebreo es literalmente «ver», pero aquí probablemente implica mirar con satisfacción hostil.
    reason: lexical_alternative
  - marker: b
    text: O «su ejército», «su fuerza» o «sus recursos»; la palabra hebrea puede designar fuerza militar o riqueza. Aquí se traduce «sus bienes» porque el contexto habla de saqueo después del desastre.
    reason: lexical_alternative
lexical_decisions:
- source_word: בְ/שַֽׁעַר עַמִּ/י
  english_pob_choice: enter the gate of my people
  chosen_spanish: entres por la puerta de mi pueblo
  alternatives_spanish:
  - entres en la puerta de mi pueblo
  - entres por la puerta de mi gente
  - entres en la puerta de mi pueblo
  lexicon: HALOT
  rationale: שַׁעַר es literalmente 'puerta' o 'portón', y en el contexto profético designa la entrada de la ciudad/comunidad. 'Por la puerta de mi pueblo' conserva la imagen concreta sin convertirla en una paráfrasis más abstracta.
- source_word: בְּ/י֣וֹם אֵידָ֔/ם
  english_pob_choice: in the day of their disaster
  chosen_spanish: en el día de su desastre
  alternatives_spanish:
  - en el día de su calamidad
  - en el día de su ruina
  lexicon: HALOT
  rationale: אֵיד denota desastre, calamidad o ruina. 'Desastre' es natural en español y conserva el tono repetido del versículo. El posesivo 'su' mantiene el referente colectivo de 'mi pueblo'.
- source_word: תֵּ֧רֶא
  english_pob_choice: look on
  chosen_spanish: mires
  alternatives_spanish:
  - veas
  - mire[s] con satisfacción
  - contemples
  lexicon: HALOT
  rationale: El verbo ראה es literalmente 'ver', y el contexto de hostilidad permite un sentido adversativo. En español, 'no mires' conserva la literalidad básica sin forzar un término más interpretativo como 'glores'.
- source_word: גַם אַתָּ֛ה
  english_pob_choice: even you
  chosen_spanish: aun tú
  alternatives_spanish:
  - tú también
  - sí, tú
  - incluso tú
  lexicon: HALOT
  rationale: La partícula añade reproche enfático. 'Aun tú' reproduce bien la fuerza retórica y el contraste con la prohibición principal.
- source_word: בְ/רָעָת֖/וֹ
  english_pob_choice: his calamity
  chosen_spanish: su calamidad
  alternatives_spanish:
  - su desgracia
  - su mal
  - su adversidad
  lexicon: HALOT
  rationale: רָעָה aquí describe el mal sufrido, no maldad moral. 'Calamidad' recoge la idea de desgracia nacional sin perder el matiz de daño o ruina.
- source_word: וְ/אַל תִּשְׁלַ֥חְנָה
  english_pob_choice: do not lay hands on
  chosen_spanish: no alargues la mano contra
  alternatives_spanish:
  - no extiendas la mano contra
  - no te abalances sobre
  - no te apoderes de
  lexicon: HALOT
  rationale: שׁלח con ב expresa extender la mano hacia algo, aquí con intención hostil y de saqueo. 'Alargar la mano contra' preserva el gesto idiomático y la agresión implícita.
- source_word: בְ/חֵיל֖/וֹ
  english_pob_choice: his wealth
  chosen_spanish: sus bienes
  alternatives_spanish:
  - su riqueza
  - sus recursos
  - su ejército
  lexicon: HALOT
  rationale: חַיִל puede significar fuerza, ejército, recursos o riqueza. En este contexto de saqueo tras el desastre, 'bienes' funciona bien en español y deja abierta la amplitud semántica sin restringirlo sólo a dinero o a ejército.
theological_decisions:
- issue: Cambio de número en los sufijos posesivos ('their' / 'his')
  english_pob_reading: Retain 'their disaster' in the first clause and 'his calamity/disaster' in the following clauses
  chosen_spanish_reading: Mantener el cambio entre 'su desastre' y 'su calamidad' sin armonizar explícitamente el número
  alternative_spanish_readings:
  - 'armonizar todo en plural: ''su desastre / su calamidad'' entendiendo siempre a un plural colectivo'
  - armonizar todo en singular explícito con una nota explicativa
  rationale: El hebreo alterna entre referencia colectiva y singular personificado. En español, el posesivo 'su' permite conservar esa oscilación sin introducir una solución interpretativa que el texto no exige. La repetición de 'su desastre' mantiene el paralelismo retórico.
  doctrine_reference: 'Translation philosophy #3, #5'
translation_notes:
  revision_awareness: 'La redacción sigue de cerca el estado revisado del POB en inglés: se evitó una paráfrasis como ''regocijarte'' o ''glores'', y se prefirió una solución más literal para ראה (''mirar'') manteniendo el matiz hostil por contexto. También se preservó la idea de saqueo en חַיִל con una opción española amplia (''bienes'') coherente con la revisión auditada.'
  spanish_consistency_notes:
  - Se usa 'mi pueblo' para עַמִּי, no 'mi gente', por mayor claridad y porque el inglés POB conserva la referencia comunitaria.
  - '''Desastre'' se mantiene de forma consistente para אֵיד en las tres repeticiones del versículo.'
  - '''Calamidad'' se reserva para רָעָה, siguiendo la distinción semántica del contexto.'
  - 'La segunda persona singular se mantiene uniforme: ''entres'', ''mires'', ''alargues''.'
  - Se evita 'SEÑOR' o cualquier sustituto para el nombre divino, ya que este versículo no lo contiene.
