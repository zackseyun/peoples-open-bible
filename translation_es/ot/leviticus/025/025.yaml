translation:
  language: es
  text: Si tu hermano se empobrece y vende parte de su propiedad[a], entonces su pariente redentor más cercano[b] podrá venir y redimir lo que su hermano ha vendido.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Propiedad» aquí alude a una tenencia hereditaria dentro de la distribución tribal de Israel, no a propiedad genérica sin más.
    reason: cultural_note
  - marker: b
    text: 'También: «su redentor más cercano vendrá y redimirá». El término hebreo designa al pariente cercano con el derecho y deber de reclamar la propiedad familiar.'
    reason: lexical_alternative
lexical_decisions:
- source_word: יָמוּךְ
  english_pob_choice: becomes poor
  chosen_spanish: se empobrece
  alternatives_spanish:
  - llega a ser pobre
  - cae en pobreza
  lexicon: HALOT
  rationale: El verbo expresa debilitamiento o empobrecimiento económico. «Se empobrece» es natural en español y conserva el sentido jurídico-económico del contexto.
- source_word: אָחִיךָ
  english_pob_choice: your brother
  chosen_spanish: tu hermano
  alternatives_spanish:
  - tu pariente
  - tu compatriota
  lexicon: HALOT
  rationale: La forma hebrea dice literalmente «hermano». En este contexto legal puede representar a un miembro del pueblo del pacto, pero se conserva el término de parentesco en el texto principal.
- source_word: מָכַר
  english_pob_choice: sells
  chosen_spanish: vende
  alternatives_spanish:
  - ha vendido
  - debe vender
  lexicon: HALOT
  rationale: El sentido básico es «vender». El presente en español funciona bien en este caso legal general y evita forzar una narración pasada.
- source_word: מֵאֲחֻזָּתוֹ
  english_pob_choice: some of his property
  chosen_spanish: parte de su propiedad
  alternatives_spanish:
  - parte de su posesión
  - parte de su heredad
  lexicon: HALOT
  rationale: Aquí אֲחֻזָּה designa una posesión o tenencia dentro del marco de la herencia tribal de Israel. «Propiedad» es preciso y claro; «parte de» refleja el valor partitivo del contexto.
- source_word: גֹאֲלוֹ
  english_pob_choice: his redeemer
  chosen_spanish: su pariente redentor
  alternatives_spanish:
  - su redentor
  - su pariente rescatador
  lexicon: HALOT
  rationale: גאל conserva una carga legal y teológica importante. «Pariente redentor» mantiene el vínculo familiar y la función de rescate/reivindicación del derecho familiar.
- source_word: הַקָּרֹב אֵלָיו
  english_pob_choice: his nearest
  chosen_spanish: más cercano
  alternatives_spanish:
  - el pariente más cercano
  - el más próximo a él
  lexicon: HALOT
  rationale: La frase califica al redentor con prioridad de parentesco. «Más cercano» reproduce esa cercanía legal sin recargar el español.
- source_word: וּבָא
  english_pob_choice: may come
  chosen_spanish: vendrá
  alternatives_spanish:
  - puede venir
  - podrá venir
  lexicon: HALOT
  rationale: El hebreo presenta la acción esperable dentro del caso legal. Dado el ajuste editorial del inglés POB a «shall come», el futuro simple en español comunica bien esa fuerza normativa.
- source_word: וְגָאַל
  english_pob_choice: redeem
  chosen_spanish: redimirá
  alternatives_spanish:
  - rescatará
  - reivindicará
  lexicon: HALOT
  rationale: «Redimir» conserva el término técnico-jurídico y su resonancia bíblica mejor que un verbo meramente comercial.
- source_word: אֵת מִמְכַּר אָחִיו
  english_pob_choice: what his brother has sold
  chosen_spanish: lo que su hermano ha vendido
  alternatives_spanish:
  - la venta de su hermano
  - lo vendido por su hermano
  lexicon: HALOT
  rationale: מִמְכָּר puede referirse al objeto vendido o a la transacción. «Lo que su hermano ha vendido» es idiomático y mantiene el referente al bien alienado.
theological_decisions:
- issue: Lenguaje de parentesco en la ley israelita
  english_pob_reading: your brother
  chosen_spanish_reading: tu hermano
  alternative_spanish_readings:
  - tu pariente
  - tu compatriota
  rationale: El texto hebreo usa el término familiar masculino. En esta ley puede abarcar a un miembro del pueblo del pacto, pero la traducción preserva el lenguaje de parentesco en el cuerpo principal.
  doctrine_reference: DOCTRINE.md § Translation philosophy 4
- issue: Terminología de גאל / goel
  english_pob_reading: redeemer / kinsman-redeemer
  chosen_spanish_reading: pariente redentor / redimirá
  alternative_spanish_readings:
  - redentor / redimirá
  - pariente-rescatador / rescatará
  - comprará de vuelta / comprará
  rationale: גאל carga con una función legal y un trasfondo teológico de rescate familiar. «Pariente redentor» retiene ambos aspectos mejor que un lenguaje puramente comercial.
  doctrine_reference: DOCTRINE.md § Translation philosophy 5
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión más reciente del inglés POB, que ajustó «inherited property» a «property» y fortaleció la fuerza normativa de la cláusula verbal. La redacción española refleja ese ajuste con «parte de su propiedad» y el futuro simple «vendrá y redimirá», manteniendo naturalidad formal.
  spanish_consistency_notes:
  - Se mantuvo «hermano» para אָחִיךָ por consistencia con la política de lenguaje de parentesco del proyecto.
  - Se evitó «SEÑOR» u otra sustitución para el nombre divino, ya que este versículo no lo contiene.
  - «Redentor» se usa como término técnico; «redimirá» conserva el mismo campo semántico.
  - La nota de propiedad aclara el trasfondo cultural sin introducir una glosa demasiado interpretativa en el texto principal.
