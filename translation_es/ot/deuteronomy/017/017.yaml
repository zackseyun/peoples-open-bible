review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura general del hebreo: prohibición de multiplicar esposas, cláusula de advertencia sobre el corazón y prohibición de multiplicar plata y oro. Sin embargo, «mujeres» no preserva fielmente el sentido contextual de נָשִׁים en esta ley real, donde claramente significa esposas. Además, «para que no se desvíe» suena más a propósito deseado que a advertencia; el inglés auditado prefirió «lest», y en español conviene una formulación de advertencia más natural.'
  spanish_quality_summary: El texto es comprensible, pero «multiplicará para sí mujeres» suena poco natural y puede malentenderse como mujeres en general, no esposas. «En gran manera» es inteligible pero algo acartonado en español actual; «excesivamente» o «demasiado» expresa mejor el intensivo legal sin arcaísmo innecesario. Una leve reestructuración mejora claridad y dignidad sin perder literalidad.
  glossary_alignment: 'No hay términos del glosario mayor en disputa aquí, pero sí una desviación del razonamiento léxico auditado: el inglés POB eligió «wives», y el español debe seguir ese valor contextual con «esposas», no «mujeres». «Corazón», «plata y oro» y el sentido de exceso se pueden mantener fielmente.'
  issues:
  - severity: high
    issue: «mujeres» para נָשִׁים
    rationale: En este contexto jurídico-regio, el sustantivo significa esposas, no mujeres en general. «Mujeres» introduce ambigüedad indebida y no sigue la decisión léxica auditada del POB.
  - severity: medium
    issue: «para que no se desvíe su corazón»
    rationale: Aunque posible, en español suena principalmente a finalidad. Dado el rastro auditado que favorece una advertencia tipo «lest», una formulación como «no sea que su corazón se desvíe» preserva mejor la fuerza precautoria.
  - severity: low
    issue: «en gran manera»
    rationale: Es formal pero algo rígido y menos natural en español contemporáneo amplio. «Excesivamente» comunica bien מְאֹד en este contexto de acumulación prohibida.
  revised_spanish_text: Y no multiplicará para sí esposas[a], no sea que su corazón se desvíe; y no multiplicará para sí plata y oro excesivamente.
  revised_footnotes:
