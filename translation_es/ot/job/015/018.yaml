translation:
  language: es
  text: lo que declaran[a] los sabios, y no han ocultado lo recibido de sus padres—
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «lo que sus padres no ocultaron», o «y no han ocultado nada a sus padres». El hebreo permite más de una manera de relacionar «ocultaron» con «sus padres».'
    reason: alternative_reading
lexical_decisions:
- source_word: אֲשֶׁר
  english_pob_choice: what
  chosen_spanish: lo que
  alternatives_spanish:
  - que
  - aquello que
  lexicon: HALOT
  rationale: El relativo introduce el contenido transmitido; «lo que» en español preserva bien la función sustantiva de la cláusula sin sonar rígido.
- source_word: חֲכָמִים
  english_pob_choice: wise men
  chosen_spanish: los sabios
  alternatives_spanish:
  - hombres sabios
  - los sabios varones
  lexicon: HALOT
  rationale: «Sabios» comunica el sustantivo plural con naturalidad en español y evita la pesadez de «hombres sabios»; el contexto de Job habla de tradición sapiencial.
- source_word: יַגִּידוּ
  english_pob_choice: declare
  chosen_spanish: declaran
  alternatives_spanish:
  - declaran públicamente
  - hacen saber
  lexicon: HALOT
  rationale: El hiphil de נגד expresa dar a conocer o declarar. El presente gnómico «declaran» mantiene el tono proverbial y la transmisión autorizada de enseñanza.
- source_word: כִחֲדוּ
  english_pob_choice: hidden
  chosen_spanish: ocultado
  alternatives_spanish:
  - escondido
  - encubierto
  lexicon: HALOT
  rationale: El verbo significa ocultar/conceal. «Ocultado» conserva el sentido de no retener a escondidas la tradición recibida, en un español natural y digno.
- source_word: מֵאֲבוֹתָם
  english_pob_choice: from their fathers
  chosen_spanish: de sus padres
  alternatives_spanish:
  - de sus antepasados
  - por parte de sus padres
  lexicon: HALOT
  rationale: La expresión hebrea puede leerse como origen o como relación con aquello que no fue ocultado. «De sus padres» sigue de cerca el hebreo y preserva la ambigüedad interpretativa que el POB inglés mantuvo.
theological_decisions:
- issue: Relación sintáctica entre «ocultado» y «de sus padres»
  english_pob_reading: and have not hidden from their fathers
  chosen_spanish_reading: y no han ocultado de sus padres
  alternative_spanish_readings:
  - y no han ocultado lo que recibieron de sus padres
  - y no han ocultado nada a sus padres
  - y sus padres no ocultaron
  rationale: 'El hebreo permite más de una relación: los padres pueden ser la fuente de la tradición, o el grupo ante el cual algo no fue ocultado. La redacción española conserva esa tensión sin resolverla de manera interpretativa.'
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it'
translation_notes:
  revision_awareness: 'Coincide con la última pasada de revisión: no se requieren cambios adicionales; la redacción mantiene la ambigüedad sintáctica documentada en el audit trail inglés.'
  spanish_consistency_notes:
  - Se mantiene «sabios» para חֲכָמִים, en línea con la terminología sapiencial del libro de Job.
  - Se evita resolver la preposición con una paráfrasis interpretativa; la ambigüedad del hebreo queda visible en español.
  - El tono es formal y bíblico, pero con español actual; no se usan fórmulas eclesiásticas innecesarias.
