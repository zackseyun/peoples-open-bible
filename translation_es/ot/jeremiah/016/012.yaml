    rationale: 'Conviene priorizar las alternativas documentadas: comparación moral en הֲרֵעֹתֶם, distributivo de אִישׁ y alternativa de שְׁרִרוּת como «imaginación obstinada», más una nota breve para la formulación del corazón si se desea claridad.'
