translation:
  language: es
  text: 'Porque el auxilio de Egipto es totalmente vacío y sin valor; por eso le llamo: «Rahab[a], la que se queda quieta[b]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebreo Rahab, un nombre poético o epíteto para Egipto; también puede sugerir «arrogancia» o «jactancia».
    reason: lexical_alternative
  - marker: b
    text: O «Rahab—se quedan quietos», o «el fanfarrón que no hace nada». La frase hebrea es condensada y probablemente burlesca contra Egipto por su orgullo y su inacción.
    reason: alternative_reading
lexical_decisions:
- source_word: וּמִצְרַיִם
  english_pob_choice: For Egypt’s
  chosen_spanish: de Egipto
  alternatives_spanish:
  - y Egipto
  - Ahora Egipto
  lexicon: HALOT
  rationale: La frase hebrea introduce la afirmación sobre el auxilio de Egipto. En español, la construcción posesiva natural es «el auxilio de Egipto», que conserva el referente y la relación sintáctica sin forzar un calco del hebreo.
- source_word: הֶבֶל
  english_pob_choice: empty
  chosen_spanish: vacío
  alternatives_spanish:
  - vano
  - fútil
  - aliento
  lexicon: HALOT
  rationale: הֶבֶל expresa vacuidad, insustancialidad o inutilidad. «Vacío» funciona bien en español y mantiene la idea de algo sin contenido efectivo, sin cargar el término con resonancias exclusivamente sapienciales.
- source_word: וָרִיק
  english_pob_choice: worthless
  chosen_spanish: sin valor
  alternatives_spanish:
  - inútil
  - vacío
  - vano
  lexicon: HALOT
  rationale: רִיק añade intensificación a הֶבֶל. «Sin valor» conserva la fuerza depreciativa y evita repetir exactamente «vacío», manteniendo en español el paralelo intensivo del hebreo.
- source_word: יַעְזֹרוּ
  english_pob_choice: help
  chosen_spanish: auxilio
  alternatives_spanish:
  - ayuda
  - ayudarán
  - asistencia
  lexicon: HALOT
  rationale: El verbo עזר aquí describe el apoyo que Egipto supuestamente brindaría. Como el hebreo funciona predicativamente, «el auxilio de Egipto» reproduce mejor el sentido que un verbo suelto en español.
- source_word: לָכֵן
  english_pob_choice: therefore
  chosen_spanish: por eso
  alternatives_spanish:
  - por tanto
  - así que
  - por consiguiente
  lexicon: HALOT
  rationale: La partícula introduce conclusión. «Por eso» suena natural en español moderno y conserva la relación inferencial sin endurecer el ritmo del verso.
- source_word: קָרָאתִי
  english_pob_choice: I call
  chosen_spanish: le llamo
  alternatives_spanish:
  - lo llamo
  - lo he llamado
  - lo nombro
  lexicon: HALOT
  rationale: En un contexto profético de designación burlona, el presente español comunica una denominación vigente. El dativo implícito de la construcción hebrea se vuelve «le» para mantener la personificación de Egipto.
- source_word: לָזֹאת
  english_pob_choice: her
  chosen_spanish: le
  alternatives_spanish:
  - a ella
  - a esto
  - la
  lexicon: HALOT
  rationale: El demostrativo femenino apunta a Egipto personificado. En español, el pronombre indirecto «le» permite la referencia personal sin sobreespecificar el género del sustantivo «Egipto».
- source_word: רַהַב
  english_pob_choice: Rahab
  chosen_spanish: Rahab
  alternatives_spanish:
  - Arrogancia
  - Bocona
  - Boastfulness
  lexicon: HALOT
  rationale: El término funciona como epíteto poético y casi como nombre propio. Se mantiene transliterado para respetar el juego retórico y la ambigüedad entre nombre y carácter.
- source_word: הֵם שָׁבֶת
  english_pob_choice: Who Sits Still
  chosen_spanish: la que se queda quieta
  alternatives_spanish:
  - la que no hace nada
  - la que está sentada
  - la inactiva
  lexicon: HALOT
  rationale: La frase hebrea es comprimida y probablemente taunting. En español, «la que se queda quieta» reproduce la imagen de inmovilidad con naturalidad y conserva la ironía de un nombre altisonante desmentido por la pasividad.
theological_decisions:
- issue: Tratamiento de רַהַב הֵם שָׁבֶת como apodo burlesco de Egipto
  english_pob_reading: 'Treat as a poetic epithet for Egypt: ''Rahab Who Sits Still.'''
  chosen_spanish_reading: 'Tratarlo como epíteto poético de Egipto: «Rahab, la que se queda quieta».'
  alternative_spanish_readings:
  - «Rahab, la inmóvil»
  - «Rahab, la que no hace nada»
  - «Arrogancia que se queda quieta»
  rationale: El hebreo admite varias lecturas comprimidas. La versión española conserva la sátira profética, mantiene Rahab como epíteto transliterado y no resuelve la ambigüedad de manera dogmática. Así se preserva la tensión lexical y retórica documentada en el audit trail inglés.
  doctrine_reference: 'Translation philosophy #3: Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: El último repaso disponible indica que no hubo cambios necesarios (modelo gpt-5.4, 2026-04-23, acuerdo alto). Esta versión española sigue ese estado estable y conserva las ambigüedades léxicas relevantes del hebreo sin sobreinterpretarlas.
  spanish_consistency_notes:
  - Se mantiene Yahvé para el nombre divino según las normas del proyecto, aunque en este versículo no aparece.
  - Se usa «Egipto» como nombre geográfico estándar y «Rahab» transliterado como epíteto poético.
  - Se evita una traducción eclesiástica arcaizante; el español busca ser claro, digno y apto para lectura pública.
  - La puntuación con dos puntos antes de la cita reproduce el giro taunt-like del hebreo y ayuda a leer la designación nominal.
