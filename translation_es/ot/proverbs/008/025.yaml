translation:
  language: es
  text: Antes que los montes fueran asentados[a], antes de que existieran las colinas, fui dada a luz.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «nací» o «fui engendrada». El hebreo usa imaginería de nacimiento/origen para la Sabiduría personificada.'
    reason: lexical_alternative
lexical_decisions:
- source_word: בְּטֶרֶם
  english_pob_choice: Before
  chosen_spanish: Antes que
  alternatives_spanish:
  - Antes de que
  - Antes
  lexicon: HALOT
  rationale: La partícula temporal introduce una acción previa. «Antes que» comunica con naturalidad la prioridad temporal y conserva el paralelismo poético del versículo.
- source_word: הָרִים
  english_pob_choice: the mountains
  chosen_spanish: los montes
  alternatives_spanish:
  - las montañas
  - los montes
  lexicon: HALOT
  rationale: En español poético, «montes» es una equivalencia natural para el plural hebreo y mantiene el tono elevado del pasaje. «Montañas» también es posible, pero «montes» suena más bíblico sin forzar el sentido.
- source_word: הָטְבָּעוּ
  english_pob_choice: were settled
  chosen_spanish: fueran asentados
  alternatives_spanish:
  - fueran establecidos
  - fueran fijados
  - fueran hundidos
  lexicon: HALOT
  rationale: El Hophal de טבע sugiere quedar puestos o fijados en su lugar. «Asentados» preserva la imagen de colocación firme sin volverse demasiado técnico ni introducir una imagen distinta.
- source_word: לִפְנֵי
  english_pob_choice: before
  chosen_spanish: antes de
  alternatives_spanish:
  - delante de
  - antes
  lexicon: HALOT
  rationale: Aquí la preposición es temporal, en paralelo con בטרֶם. «Antes de» mantiene esa relación temporal de modo claro y idiomático en español.
- source_word: גְבָעוֹת
  english_pob_choice: the hills
  chosen_spanish: las colinas
  alternatives_spanish:
  - los collados
  - los cerros
  lexicon: HALOT
  rationale: «Colinas» reproduce el paralelo poético con «montes» y es claro para lectores contemporáneos. «Collados» sería más tradicional, pero menos transparente en español moderno.
- source_word: חוֹלָלְתִּי
  english_pob_choice: I was brought forth
  chosen_spanish: fui dada a luz
  alternatives_spanish:
  - fui engendrada
  - fui alumbrada
  - fui traída al mundo
  lexicon: HALOT
  rationale: El verbo conserva imaginería de nacimiento/origen aplicada a la Sabiduría personificada. «Fui dada a luz» expresa bien esa imagen figurada en español y evita tanto una literalidad biológica como una carga doctrinal excesiva que tendría «fui engendrada».
theological_decisions:
- issue: Imaginería de origen de la Sabiduría personificada y su uso en debates cristológicos
  english_pob_reading: I was brought forth
  chosen_spanish_reading: fui dada a luz
  alternative_spanish_readings:
  - fui engendrada
  - fui nacida
  rationale: La frase hebrea usa lenguaje de nacimiento/origen en una personificación poética. «Fui dada a luz» preserva esa tensión sin convertir el versículo en una afirmación doctrinal cerrada sobre filiación divina o generación eterna. Así se mantiene la ambigüedad literaria que el texto requiere.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: No hay revisiones aplicadas en el registro inglés; la concordancia de revisión indica que el texto base se mantuvo sin cambios. La versión española sigue de cerca ese estado estable y conserva la tensión poética del original.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como término por defecto cuando aparezca el nombre divino; este versículo no lo contiene.
  - Se eligió «montes/colinas» para respetar el paralelismo hebreo y sonar natural en español.
  - «Fui dada a luz» preserva el valor figurado del verbo sin resolverlo hacia una lectura doctrinal específica.
