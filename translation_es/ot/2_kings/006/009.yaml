translation:
  language: es
  text: 'Entonces el hombre de Dios mandó avisar al rey de Israel, diciendo: «Guárdate de pasar por este lugar, porque allí los arameos[a] están descendiendo».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «están descendiendo allí».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּשְׁלַח
  english_pob_choice: sent word
  chosen_spanish: envió palabra
  alternatives_spanish:
  - envió
  - mandó decir
  - despachó un mensaje
  lexicon: HALOT
  rationale: El hebreo indica que el hombre de Dios ‘envió’; en contexto, lo enviado es un mensaje. ‘Envió palabra’ conserva la idiomática bíblica sin reducir indebidamente el contenido a una simple acción de envío.
- source_word: אִישׁ הָאֱלֹהִים
  english_pob_choice: the man of God
  chosen_spanish: el hombre de Dios
  alternatives_spanish:
  - el profeta
  - el hombre del Dios verdadero
  lexicon: HALOT
  rationale: Se preserva el título hebreo estándar. No se sustituye por ‘el profeta’ porque el texto no usa ese término aquí y el título tiene valor propio.
- source_word: מֶלֶךְ יִשְׂרָאֵל
  english_pob_choice: the king of Israel
  chosen_spanish: el rey de Israel
  alternatives_spanish:
  - el monarca de Israel
  lexicon: HALOT
  rationale: Corresponde de manera directa al título real y al nombre nacional, sin añadir interpretación.
- source_word: לֵאמֹר
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - y dijo
  - para decir
  lexicon: HALOT
  rationale: Introduce el discurso directo de manera natural en español y refleja el valor introductorio del infinitivo.
- source_word: הִשָּׁמֶר
  english_pob_choice: Beware
  chosen_spanish: Guárdate
  alternatives_spanish:
  - Ten cuidado
  - Cuidado
  - Precávete
  lexicon: HALOT
  rationale: El imperativo nifal funciona como advertencia. ‘Guárdate’ conserva el tono de alerta y evita la suavización de una mera recomendación.
- source_word: מֵעֲבֹר
  english_pob_choice: of passing by
  chosen_spanish: de pasar por
  alternatives_spanish:
  - de pasar
  - de atravesar
  - de cruzar
  lexicon: HALOT
  rationale: Con el verbo de advertencia y la preposición de separación, la idea es evitar el tránsito por el lugar. ‘Pasar por’ expresa bien el desplazamiento por esa zona en español.
- source_word: הַמָּקוֹם הַזֶּה
  english_pob_choice: this place
  chosen_spanish: este lugar
  alternatives_spanish:
  - este sitio
  - este lugar mismo
  lexicon: HALOT
  rationale: Traducción directa y natural del demostrativo. ‘Lugar’ funciona mejor que ‘sitio’ en registro bíblico moderno.
- source_word: אֲרָם
  english_pob_choice: the Arameans
  chosen_spanish: los arameos
  alternatives_spanish:
  - Aram
  - los sirios
  lexicon: HALOT
  rationale: Se opta por la etnónimo ‘arameos’ para reflejar con precisión el referente militar del contexto y evitar el tradicional pero menos exacto ‘sirios’.
- source_word: נְחִתִּים
  english_pob_choice: are coming down
  chosen_spanish: están descendiendo
  alternatives_spanish:
  - están bajando
  - están viniendo hacia abajo
  - han descendido
  lexicon: HALOT
  rationale: El participio expresa descenso/movimiento hacia abajo. ‘Están descendiendo’ mantiene el valor aspectual y la imagen espacial del hebreo. Se conserva la tensión entre una posible descripción de movimiento y la posibilidad de una lectura más estática/resultado, reflejada también en la nota.
theological_decisions:
- issue: Nombre divino y título profético en la narración
  english_pob_reading: the man of God
  chosen_spanish_reading: el hombre de Dios
  alternative_spanish_readings:
  - el profeta
  - el hombre del Señor
  rationale: El versículo no contiene el nombre divino ni el término profeta; la traducción mantiene el título narrativo exacto del hebreo, sin expandirlo a una identificación teológica que el verso no formula.
  doctrine_reference: 2 Reyes 6:9
translation_notes:
  revision_awareness: 'La redacción sigue el estado revisado más reciente del inglés POB: se prefirió una advertencia directa con valor formal (‘Beware of passing by’), que en español se reflejó con ‘Guárdate de pasar por este lugar’. También se mantuvo la alternativa lexical para נְחִתִּים, porque el audit trail conserva la posibilidad de entenderlo como ‘descending’ además de un movimiento en curso.'
  spanish_consistency_notes:
  - Se preserva ‘el hombre de Dios’ como título fijo, coherente con el patrón del POB inglés.
  - Se usa ‘arameos’ para אֲרָם en contexto militar, en continuidad con la decisión inglesa documentada.
  - ‘Yahvé’ no aparece en este versículo; no se requiere ninguna adaptación del nombre divino.
  - La puntuación y la comilla española siguen el registro bíblico moderno en español.
