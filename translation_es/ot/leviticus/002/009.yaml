revisions:
- from: Entonces el sacerdote levantará de la ofrenda de cereal su porción memorial[a] y la quemará en el altar, una ofrenda hecha por fuego, aroma agradable para Yahvé.
  to: Entonces el sacerdote levantará de la ofrenda de cereal su porción memorial y la quemará en el altar, una ofrenda de alimento[a], un aroma agradable para Yahvé.
  rationale: Se corrige la ubicación de la nota para que ancle la alternativa léxica donde realmente corresponde, y se ajusta אִשֵּׁה a 'ofrenda de alimento' para seguir la decisión principal documentada en el POB audit trail, conservando en nota la opción tradicional 'hecha por fuego'. También se suaviza la frase final con 'un aroma agradable' para mejor español.
