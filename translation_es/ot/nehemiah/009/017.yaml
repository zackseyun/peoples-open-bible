  text: But they refused to listen and did not remember your wonders that you had done among them[a]. They stiffened their neck and appointed a leader to return to their slavery in their rebellion. But you are a God of forgiveness, gracious and compassionate, slow to anger and abundant in steadfast love[b], and you did not forsake them.
  footnotes:
