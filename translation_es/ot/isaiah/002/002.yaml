  rationale: Se revisa para acercar la frase temporal al matiz menos interpretativo documentado en el English POB y para mejorar la naturalidad del movimiento de las naciones en español con «afluirán», conservando la metáfora mediante nota. También se ajusta la nota b para incluir explícitamente el sujeto completo, como en la auditoría inglesa.
