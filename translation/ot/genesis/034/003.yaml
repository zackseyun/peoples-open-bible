id: GEN.34.3
reference: Genesis 34:3
source:
  edition: WLC
  text: וַ/תִּדְבַּ֣ק נַפְשׁ֔/וֹ בְּ/דִינָ֖ה בַּֽת יַעֲקֹ֑ב וַ/יֶּֽאֱהַב֙ אֶת הַֽ/נַּעֲרָ֔ וַ/יְדַבֵּ֖ר עַל לֵ֥ב הַֽ/נַּעֲרָֽ־־־׃
translation:
  text: His soul clung to Dinah[a], the daughter of Jacob[b], and he loved the young woman and spoke to the heart of the young woman.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'His inner self was attached to Dinah.' The Hebrew says literally, 'his soul clung to Dinah.'
    reason: lexical_alternative
  - marker: b
    text: Or 'spoke to the heart of the young woman,' an idiom meaning to speak tenderly, kindly, or reassuringly.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַתִּדְבַּק
  chosen: clung
  alternatives:
  - was attached
  - held fast
  lexicon: HALOT
  rationale: דבק commonly denotes sticking, clinging, or attaching oneself closely. 'Clung' preserves the vivid relational force without over-paraphrasing.
- source_word: נַפְשׁוֹ
  chosen: his soul
  alternatives:
  - his life
  - his inner self
  - he himself
  lexicon: HALOT
  rationale: נפש can denote soul, self, life, or person. Here 'his soul' preserves the Hebrew idiom and emotional intensity better than flattening to simply 'he.'
- source_word: בְּדִינָה
  chosen: to Dinah
  alternatives:
  - to/with Dinah
  lexicon: HALOT
  rationale: With דבק plus ב, English idiom is best represented by 'clung to Dinah.'
- source_word: בַּת יַעֲקֹב
  chosen: the daughter of Jacob
  alternatives:
  - Jacob's daughter
  lexicon: HALOT
  rationale: Both are possible; 'the daughter of Jacob' stays closer to the Hebrew apposition while remaining natural English.
- source_word: וַיֶּאֱהַב
  chosen: he loved
  alternatives:
  - he desired
  - he was in love with
  lexicon: HALOT
  rationale: אהב is the standard verb 'love.' Given the immediate context, the text reports his affection without requiring a more interpretive gloss such as 'desired.'
- source_word: הַנַּעֲרָ
  chosen: the young woman
  alternatives:
  - the girl
  - the maiden
  lexicon: HALOT
  rationale: נַעֲרָה denotes a girl/young woman. 'Young woman' is readable modern English and avoids the potentially diminutive tone of 'girl' in this context.
- source_word: וַיְדַבֵּר עַל לֵב
  chosen: spoke tenderly to
  alternatives:
  - spoke to the heart of
  - spoke reassuringly to
  - spoke kindly to
  lexicon: HALOT
  rationale: The idiom דבר על־לב means to speak to someone's heart, often with comforting or tender intent. 'Spoke tenderly to' is a natural English rendering that preserves the idiomatic sense.
- source_word: הַנַּעֲרָ
  chosen: the young woman
  alternatives:
  - the girl
  - the maiden
  lexicon: HALOT
  rationale: Repeated for consistency with the earlier occurrence in the verse.
