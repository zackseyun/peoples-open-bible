translation:
  language: es
  text: 'Porque como calcula en su interior[a], así es: «Come y bebe», te dice; pero su corazón no está contigo.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Porque como piensa en su interior, así es». El verbo hebreo puede significar «pensar», pero aquí sugiere más específicamente calcular o hacer cuentas.'
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  lexicon: HALOT
  rationale: Introduce la explicación proverbial del comportamiento descrito; en español, “Porque” conserva la fuerza causal/explanatoria natural del hebreo y del inglés POB.
- source_word: כְּמוֹ ... כֶּן
  english_pob_choice: as ... so
  chosen_spanish: como ... así
  alternatives_spanish:
  - tal como ... así
  - así como ... así
  lexicon: HALOT
  rationale: Mantiene la correlación comparativa del proverbio sin sobretraducirla.
- source_word: שָׁעַר
  english_pob_choice: calculates
  chosen_spanish: calcula
  alternatives_spanish:
  - piensa
  - razona
  - estima
  lexicon: HALOT
  rationale: El verbo hebreo puede abarcar pensar, reckoning o calcular; aquí el contexto de una evaluación interna y contable favorece “calcula”, que conserva la tensión lexical señalada por la POB inglesa.
- source_word: בְּנַפְשׁוֹ
  english_pob_choice: within himself
  chosen_spanish: dentro de sí
  alternatives_spanish:
  - en su alma
  - en su interior
  - dentro de su alma
  lexicon: HALOT
  rationale: נפש aquí apunta al interior de la persona; “dentro de sí” comunica bien la interioridad sin forzar un tecnicismo como “alma”.
- source_word: כֵּן הוּא
  english_pob_choice: so he is
  chosen_spanish: así es él
  alternatives_spanish:
  - así es
  - tal es él
  lexicon: HALOT
  rationale: 'Conserva la conclusión proverbial: el cálculo interior revela lo que la persona realmente es.'
- source_word: אֱכֹל וּשְׁתֵה
  english_pob_choice: Eat and drink
  chosen_spanish: Come y bebe
  alternatives_spanish:
  - Coman y beban
  - Come, bebe
  lexicon: HALOT
  rationale: Reproduce el imperativo directo de la invitación citada.
- source_word: יֹאמַר לָךְ
  english_pob_choice: he says to you
  chosen_spanish: te dice
  alternatives_spanish:
  - te dirá
  - te dice a ti
  lexicon: HALOT
  rationale: En discurso proverbial, el presente resulta natural en español y preserva la cita inmediata.
- source_word: וְלִבּוֹ
  english_pob_choice: but his heart
  chosen_spanish: pero su corazón
  alternatives_spanish:
  - y su corazón
  - mas su corazón
  lexicon: HALOT
  rationale: La adversativa “pero” expresa mejor el contraste entre las palabras hospederas y la disposición real.
- source_word: בַּל
  english_pob_choice: is not
  chosen_spanish: no está
  alternatives_spanish:
  - no es
  - de ningún modo está
  lexicon: HALOT
  rationale: La negación se integra de modo natural con la expresión relacional del hebreo.
- source_word: עִמָּךְ
  english_pob_choice: with you
  chosen_spanish: contigo
  alternatives_spanish:
  - con usted
  - a tu lado
  lexicon: HALOT
  rationale: “Contigo” conserva la cercanía relacional del hebreo y es idiomático en español.
translation_notes:
  revision_awareness: 'La versión sigue de cerca la lectura y la nota lexical de la POB inglesa: se preserva la tensión entre “pensar” y “calcular” con una nota alternativa en español, y se mantiene el contraste proverbial entre la invitación externa y la disposición interna.'
  spanish_consistency_notes:
  - Se usa “Yahvé” solo cuando el texto fuente lo requiera explícitamente; este verso no contiene el nombre divino.
  - Se mantiene “corazón” para לֵב/לִבּוֹ, como en la tradición bíblica y la POB, por su valor de centro interior de decisión y deseo.
  - Se evita “alma” en el cuerpo principal porque aquí נֶפֶשׁ funciona como interioridad personal, no como término técnico doctrinal.
