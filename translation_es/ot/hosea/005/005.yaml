translation:
  language: es
  text: La soberbia de Israel testifica contra él[a], e Israel y Efraín tropezarán en su culpabilidad[b]; también Judá tropezará con ellos[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «La majestad de Israel testifica ante él» / «delante de él». El hebreo puede leerse con un giro espacial más literal, pero el texto principal expresa el sentido judicial probable.
    reason: lexical_alternative
  - marker: b
    text: También puede traducirse «en su iniquidad» o «por su culpa».
    reason: lexical_alternative
  - marker: c
    text: O «Judá también ha tropezado con ellos». El verbo hebreo difiere del de la cláusula anterior y puede entenderse con más de un matiz temporal.
    reason: alternative_reading
lexical_decisions:
- source_word: וְעָנָה
  english_pob_choice: testifies
  chosen_spanish: testifica
  alternatives_spanish:
  - responde
  - da testimonio
  lexicon: HALOT
  rationale: En este contexto forense, ענה se entiende como dar testimonio o responder en calidad de testigo. «Testifica» conserva el sentido acusatorio sin volver la frase pesada en español.
- source_word: גְּאוֹן
  english_pob_choice: pride
  chosen_spanish: soberbia
  alternatives_spanish:
  - orgullo
  - majestad
  - exaltación
  lexicon: HALOT
  rationale: Aunque גאון puede ser «majestad» o «exaltación», el contexto de reproche y juicio pide un matiz negativo. «Soberbia» comunica mejor la carga moral que «majestad» en español.
- source_word: בְּפָנָיו
  english_pob_choice: against him
  chosen_spanish: contra él
  alternatives_spanish:
  - delante de él
  - ante él
  lexicon: HALOT
  rationale: El hebreo dice literalmente «en/ante su rostro». En español, el sentido judicial queda mejor expresado como «contra él», manteniendo la idea de testimonio adversarial.
- source_word: יִשְׂרָאֵל
  english_pob_choice: Israel
  chosen_spanish: Israel
  alternatives_spanish:
  - el pueblo de Israel
  lexicon: HALOT
  rationale: Se conserva el nombre propio como designación del reino/cuerpo pactal, tal como en el texto fuente.
- source_word: אֶפְרַיִם
  english_pob_choice: Ephraim
  chosen_spanish: Efraín
  alternatives_spanish:
  - Efraím
  lexicon: HALOT
  rationale: Se translitera el nombre propio en su forma usual en español bíblico. En Oseas funciona metonímicamente para el reino del norte.
- source_word: יִכָּשְׁלוּ
  english_pob_choice: will stumble
  chosen_spanish: tropezarán
  alternatives_spanish:
  - se tambalearán
  - caerán
  lexicon: HALOT
  rationale: El nifal de כשל suele expresar «tropezar» o «caer». «Tropezarán» conserva la metáfora y su naturalidad en español.
- source_word: בַּעֲוֹנָם
  english_pob_choice: in their guilt
  chosen_spanish: en su culpa
  alternatives_spanish:
  - en su iniquidad
  - por su culpa
  lexicon: HALOT
  rationale: עון puede abarcar culpa, iniquidad o la carga de culpa. «En su culpa» reproduce bien la concisión del hebreo y el alcance moral/judicial.
- source_word: כָּשַׁל
  english_pob_choice: will stumble
  chosen_spanish: tropezará
  alternatives_spanish:
  - caerá
  - se tambaleará
  lexicon: HALOT
  rationale: El qatal singular sobre Judá se vierte con el mismo verbo español para conservar el enlace léxico con la cláusula anterior y la imagen común de caída/tropiezo.
- source_word: גַּם
  english_pob_choice: also
  chosen_spanish: también
  alternatives_spanish:
  - incluso
  lexicon: HALOT
  rationale: 'Marca adición simple: Judá queda incluido en el mismo patrón de juicio.'
- source_word: עִמָּם
  english_pob_choice: with them
  chosen_spanish: con ellos
  alternatives_spanish:
  - junto con ellos
  lexicon: HALOT
  rationale: El sufijo pronominal plural remite a Israel y Efraín; «con ellos» es la forma más directa y natural en español.
theological_decisions:
- issue: Valor de גאון en el primer hemistiquio
  english_pob_reading: Moral pride/arrogance that serves as witness against Israel
  chosen_spanish_reading: Soberbia moral que testifica contra Israel
  alternative_spanish_readings:
  - majestad de Israel
  - exaltación de Israel
  rationale: La secuencia de acusación, culpa y tropiezo favorece una lectura peyorativa. Traducirlo como «soberbia» evita neutralizar el tono profético de denuncia.
  doctrine_reference: Profecía de juicio y responsabilidad pactal
- issue: Forma verbal de Judá
  english_pob_reading: Judah also will stumble with them
  chosen_spanish_reading: Judá también tropezará con ellos
  alternative_spanish_readings:
  - Judá también ha tropezado con ellos
  - Judá también tropieza con ellos
  rationale: La revisión inglesa reciente privilegió el futuro para alinearse con la secuencia verbal hebrea. El español conserva esa decisión con «tropezará», manteniendo la coordinación con los verbos precedentes.
  doctrine_reference: Aspecto verbal en hebreo bíblico
- issue: Matiz judicial de בְּפָנָיו
  english_pob_reading: testifies against him
  chosen_spanish_reading: testifica contra él
  alternative_spanish_readings:
  - testifica ante él
  - testifica delante de él
  rationale: «Contra él» expresa en español el sentido forense del hebreo sin perder la imagen espacial subyacente.
  doctrine_reference: Lenguaje profético-forense
translation_notes:
  revision_awareness: La versión inglesa auditada pasó de «has stumbled» a «will stumble» para Judá, con el fin de seguir más de cerca la secuencia verbal hebrea. La redacción española adopta ese ajuste y mantiene la misma coordinación futura con «tropezarán / tropezará».
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como convención general del proyecto, pero en este versículo no aparece el Tetragrámaton.
  - Se conserva la distinción entre nombres propios («Israel», «Efraín», «Judá») y el valor metonímico de Efraín para el reino del norte.
  - Se ha preferido un vocabulario forense claro («testifica contra él») para no diluir el tono de denuncia del pasaje.
