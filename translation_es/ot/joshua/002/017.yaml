translation:
  language: es
  text: 'Y los hombres le dijeron[a]: «Nosotros quedaremos libres de este juramento tuyo que nos hiciste jurar».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «quedaremos inocentes / claros de este juramento tuyo». El adjetivo hebreo puede indicar estar libre de responsabilidad u obligación en un marco legal o de pacto.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמְרוּ
  english_pob_choice: And ... said
  chosen_spanish: Y ... dijeron
  alternatives_spanish:
  - Entonces ... dijeron
  lexicon: HALOT
  rationale: El wayyiqtol de אמר avanza la narración; en español, «Y ... dijeron» conserva ese flujo narrativo de manera natural.
- source_word: אֵלֶיהָ
  english_pob_choice: to her
  chosen_spanish: le
  alternatives_spanish:
  - a ella
  lexicon: HALOT
  rationale: El dativo indirecto en español permite mantener la dirección hacia Rahab sin recargar la frase.
- source_word: הָאֲנָשִׁים
  english_pob_choice: the men
  chosen_spanish: los hombres
  alternatives_spanish:
  - los agentes
  - los espías
  lexicon: HALOT
  rationale: El sustantivo hebreo es el término ordinario «hombres». Aunque el contexto identifica a los espías, el texto aquí no usa ese vocablo más específico.
- source_word: נְקִיִּם
  english_pob_choice: free
  chosen_spanish: quedaremos libres
  alternatives_spanish:
  - seremos inocentes
  - quedaremos exentos
  - estaremos libres
  lexicon: HALOT
  rationale: En contexto jurídico/de juramento, נָקִי expresa quedar libre de responsabilidad u obligación. «Quedaremos libres» comunica bien esa liberación de la carga del juramento.
- source_word: מִשְּׁבֻעָתֵךְ
  english_pob_choice: from this oath of yours
  chosen_spanish: de este juramento tuyo
  alternatives_spanish:
  - de tu juramento
  - de esta obligación jurada tuya
  lexicon: HALOT
  rationale: La preposición מִן marca separación o liberación. En español, «de este juramento tuyo» conserva el demostrativo y el matiz de pertenencia a Rahab.
- source_word: הַזֶּה
  english_pob_choice: this
  chosen_spanish: este
  alternatives_spanish:
  - el presente
  lexicon: HALOT
  rationale: El demostrativo se vierte de forma directa y natural.
- source_word: הִשְׁבַּעְתָּנוּ
  english_pob_choice: you made us swear
  chosen_spanish: nos hiciste jurar
  alternatives_spanish:
  - nos obligaste con juramento
  - nos hiciste prestar juramento
  lexicon: HALOT
  rationale: 'El hiphil de שׁבע es causativo: no dice solo que ella juró, sino que hizo jurar a ellos. «Nos hiciste jurar» preserva ese sentido causativo con naturalidad en español.'
theological_decisions:
- issue: Estado respecto al juramento / responsabilidad legal
  english_pob_reading: We will be free from this oath of yours that you made us swear.
  chosen_spanish_reading: Nosotros quedaremos libres de este juramento tuyo que nos hiciste jurar.
  alternative_spanish_readings:
  - Nosotros estaremos libres de este juramento tuyo que nos hiciste jurar.
  - Quedamos libres de este juramento tuyo que nos hiciste jurar.
  rationale: El contexto futuro del inglés revisado («will be free») se refleja con «quedaremos libres», evitando interpretar el estado como presente cuando la frase expresa una liberación anticipada o resultante del pacto.
  doctrine_reference: Lexical/legal covenantal force of נָקִי in oath contexts; see usage notes on obligation release.
translation_notes:
  revision_awareness: La revisión inglesa cambió «are free» por «will be free» para reflejar un sentido futuro en el contexto; la versión española sigue esa decisión con «quedaremos libres», manteniendo además el valor jurídico-covenantal de נְקִיִּם.
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el texto lo exige explícitamente; aquí no aparece el nombre divino.
  - Se mantuvo «juramento» como equivalente de שְׁבוּעָה por ser el término jurídico natural en español.
  - Se conservó el matiz causativo de הִשְׁבַּעְתָּנוּ con «nos hiciste jurar», no con una simple reformulación pasiva.
