    text: 'Hebreo: «darás, sí darás»; el infinitivo absoluto intensifica el mandato.'
    reason: lexical_alternative
  - marker: b
    text: 'También puede entenderse: «tu corazón no se resentirá» o «no darás de mala gana» al darle.'
    reason: lexical_alternative
  - marker: c
    text: 'Literalmente: «en todo envío de tu mano»; es decir, en todo lo que emprendas.'
    reason: lexical_alternative
  revision_rationale: Se ajustó la cláusula del corazón para reflejar mejor el sentido contextual de וְלֹא יֵרַע לְבָבְךָ como falta de generosidad interior o resentimiento al dar. También se mejoró la naturalidad de la apertura manteniendo el énfasis del infinitivo absoluto, y se conservaron Yahvé y la imagen de la mano en la frase final.
