base_translation:
  language: en
  yaml_path: translation/ot/genesis/015/017.yaml
  text: And when the sun had gone down and it was dark[a], behold[b], a smoking firepot and a flaming torch passed between these pieces.
  footnotes:
  - marker: a
    text: Or 'a smoking oven' or 'a smoking furnace.' The Hebrew term denotes an oven or fire-container; 'firepot' is chosen for natural English in this scene.
    reason: lexical_alternative
  - marker: b
    text: The 'pieces' are the divided animal parts prepared earlier in the covenant ritual (see Gen 15:10).
    reason: cross_reference
