  rationale: 'Se revisa la cláusula final para reflejar mejor las decisiones léxicas auditadas: אוֹצַר como «tesorería» en vez de «tesoro» y כְּלִי con mayor concreción como «vasija». También se corrige la nota [c], que antes repetía el texto principal en lugar de conservar la alternativa documentada sobre el sujeto del verbo. Se mantienen las demás elecciones del borrador, que son fieles y naturales en español.'
