  text: καὶ ἐπὶ τὸ μέτωπον αὐτῆς ὄνομα γεγραμμένον, μυστήριον, Βαβυλὼν ἡ μεγάλη, ἡ μήτηρ τῶν πορνῶν καὶ τῶν βδελυγμάτων τῆς γῆς.
base_translation:
  language: en
  yaml_path: translation/nt/revelation/017/005.yaml
  text: 'And on her forehead a name was written: Mystery[a], Babylon the Great, the mother of prostitutes and of the abominations of the earth.'
