revisions:
- from: Pero los hijos de Israel no expulsaron a los guesuritas[a] ni a los maacatitas, y Guesur y Maacat habitan entre Israel hasta este día.
  to: Pero los hijos de Israel no expulsaron[a] a los gesuritas ni a los maacatitas, y Gesur y Maacat habitan en medio de Israel hasta este día.
  rationale: Se corrigen las formas onomásticas a la castellanización más natural y reconocible en español ('Gesur/gesuritas'), se mejora la naturalidad de בְּקֶרֶב יִשְׂרָאֵל con 'en medio de Israel', y se reubica el marcador de nota para que ancle correctamente la observación léxica sobre 'expulsaron'. No se requieren cambios doctrinales ni de sentido sustancial.
