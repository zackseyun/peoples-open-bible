translation:
  language: es
  text: '¿Por qué el malvado desprecia a Dios? Dice en su corazón[a]: «No exigirás cuentas».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Dice en su corazón: “No exigirá cuentas”», es decir, que Dios no investigará ni exigirá rendición de cuentas por el mal.'
    reason: alternative_reading
lexical_decisions:
- source_word: עַל מֶה
  english_pob_choice: Why
  chosen_spanish: ¿Por qué... ?
  alternatives_spanish:
  - ¿Por qué razón... ?
  - ¿Con qué motivo... ?
  lexicon: HALOT
  rationale: La expresión introduce una pregunta retórica por la causa. «¿Por qué» es la forma natural y fiel en español, sin añadir carga interpretativa.
- source_word: נִאֵץ
  english_pob_choice: despise
  chosen_spanish: desprecia
  alternatives_spanish:
  - menosprecia
  - mira con desprecio
  - desprecia con insulto
  lexicon: HALOT
  rationale: El verbo expresa desprecio o desdén hacia Dios. «Desprecia» reproduce bien la fuerza moral y la concisión del hebreo.
- source_word: רָשָׁע
  english_pob_choice: the wicked
  chosen_spanish: el malvado
  alternatives_spanish:
  - el impío
  - el perverso
  - el malvado
  lexicon: HALOT
  rationale: El sustantivo/adjetivo sustantivado es singular y genérico. «El malvado» conserva ese valor sin volverlo una categoría abstracta o demasiado eclesiástica.
- source_word: אֱלֹהִים
  english_pob_choice: God
  chosen_spanish: Dios
  alternatives_spanish:
  - Dios de Israel
  - el Dios
  lexicon: HALOT
  rationale: Aquí el término se refiere claramente al Dios de Israel en sentido singular, por lo que «Dios» es la traducción natural y precisa.
- source_word: אָמַר בְּלִבּוֹ
  english_pob_choice: He says in his heart
  chosen_spanish: Dice en su corazón
  alternatives_spanish:
  - Se dice a sí mismo
  - Dice para sí
  lexicon: HALOT
  rationale: Se mantiene el modismo hebreo del hablar interior. «En su corazón» preserva la imagen bíblica sin reducirla solo a pensamiento psicológico.
- source_word: לֹא תִּדְרֹשׁ
  english_pob_choice: You will not require an account
  chosen_spanish: No pedirás cuentas
  alternatives_spanish:
  - No exigirás cuentas
  - No requerirás cuentas
  - No investigarás
  lexicon: HALOT
  rationale: דרשׁ aquí tiene sentido judicial de exigir o requerir rendición de cuentas por el mal. «Pedir cuentas» comunica bien esa fuerza en español y mantiene la segunda persona implícita en el hebreo.
theological_decisions:
- issue: Fuerza de la última cláusula לֹא תִּדְרֹשׁ
  english_pob_reading: 'The wicked man addresses God: "You will not require an account."'
  chosen_spanish_reading: 'El malvado se dirige a Dios en segunda persona: «No pedirás cuentas».'
  alternative_spanish_readings:
  - 'El malvado dice de Dios: «Él no pedirá cuentas».'
  - 'El malvado dice: «Dios no investigará».'
  rationale: El hebreo usa una forma verbal de segunda persona masculina singular, lo que favorece una acusación directa a Dios. Mantener la segunda persona conserva la insolencia y la tensión del texto, en lugar de suavizarla a tercera persona.
  doctrine_reference: 'Translation philosophy §3: preservar la tensión teológica y retórica del original'
translation_notes:
  revision_awareness: Se siguió el último pase revisado del texto inglés, que prefirió «the wicked» y «require an account». En español se reflejó ese ajuste con «el malvado» y «pedirás cuentas», evitando una paráfrasis más amplia. También se conservó la ambigüedad teológica del final mediante una nota alternativa basada en la lectura posible del hebreo.
  spanish_consistency_notes:
  - Se mantuvo «Dios» para אֱלֹהִים, sin sustituirlo por «SEÑOR», porque el versículo habla de Dios de forma directa.
  - Se usó «en su corazón» como modismo bíblico, no «se dice a sí mismo», para preservar la imagen hebrea.
  - La segunda persona en «No pedirás cuentas» sigue el valor verbal del hebreo y la lectura auditada del POB en inglés.
