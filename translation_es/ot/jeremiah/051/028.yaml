translation:
  language: es
  text: 'Consagren[a] contra ella a las naciones: los reyes de Media[b], sus gobernadores y todos sus prefectos, y cada tierra bajo su dominio[c].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Aquí «consagren» conserva el sentido de poner aparte o preparar para la guerra en un marco de guerra santa.
    reason: theological_note
  - marker: b
    text: 'O: «los reyes de los medos».'
    reason: lexical_alternative
  - marker: c
    text: El hebreo pasa de sufijos femeninos con los cargos administrativos a un sufijo masculino singular en «su dominio»; la traducción mantiene ese cambio sin armonizarlo.
    reason: alternative_reading
lexical_decisions:
- source_word: קַדְּשׁוּ
  english_pob_choice: Consecrate
  chosen_spanish: Consagra
  alternatives_spanish:
  - Consagrad
  - Apartad
  - Consagrad para la guerra santa
  - Santificad
  lexicon: HALOT
  rationale: En este contexto bélico, el verbo lleva la idea de poner aparte o preparar para la guerra con un matiz sacral. En español, «consagra» conserva esa fuerza solemne y el valor de apartar para una acción de juicio, sin perder naturalidad en una orden plural.
- source_word: עָלֶיהָ
  english_pob_choice: against her
  chosen_spanish: contra ella
  alternatives_spanish:
  - sobre ella
  - acerca de ella
  lexicon: HALOT
  rationale: La preposición en este marco militar expresa dirección hostil contra Babilonia; «contra ella» comunica mejor esa oposición que una traducción neutral.
- source_word: גוֹיִם
  english_pob_choice: nations
  chosen_spanish: las naciones
  alternatives_spanish:
  - los pueblos
  lexicon: HALOT
  rationale: «Naciones» corresponde al uso político y bélico de גוֹיִם en este pasaje, y mantiene la referencia a potencias convocadas para la guerra.
- source_word: מַלְכֵי מָדַי
  english_pob_choice: the kings of Media
  chosen_spanish: los reyes de Media
  alternatives_spanish:
  - los reyes de los medos
  lexicon: HALOT
  rationale: La construcción nombra a los gobernantes asociados con Media. «De Media» conserva el referente geopolítico de manera natural en español, como en la revisión inglesa.
- source_word: פַּחוֹתֶיהָ
  english_pob_choice: its governors
  chosen_spanish: sus gobernadores
  alternatives_spanish:
  - sus sátrapas
  - sus funcionarios provinciales
  lexicon: HALOT
  rationale: פּחה designa gobernadores o autoridades provinciales. «Gobernadores» es una equivalencia clara y sobria; el posesivo se entiende referido a Media en continuidad con el sintagma anterior.
- source_word: סְגָנֶיהָ
  english_pob_choice: its prefects
  chosen_spanish: sus prefectos
  alternatives_spanish:
  - sus delegados
  - sus oficiales
  - sus comandantes
  lexicon: HALOT
  rationale: סגן alude a oficiales subordinados. «Prefectos» conserva la distinción administrativa respecto de «gobernadores» y evita fundir ambos cargos en una sola idea.
- source_word: כָּל אֶרֶץ מֶמְשַׁלְתּוֹ
  english_pob_choice: every land of his dominion
  chosen_spanish: toda la tierra de su dominio
  alternatives_spanish:
  - toda la tierra bajo su dominio
  - todo el territorio de su dominio
  - toda la tierra de su señorío
  lexicon: HALOT
  rationale: La expresión es distributiva y territorial. «Toda la tierra de su dominio» conserva la amplitud de כָּל + אֶרֶץ y el sufijo masculino singular final, sin suavizar el cambio pronominal del hebreo.
theological_decisions:
- issue: Matiz sacral-militar de קַדְּשׁוּ
  english_pob_reading: '''Consecrate'' here carries the sense of setting apart for battle or mustering for holy war.'
  chosen_spanish_reading: «Consagra» mantiene la idea de apartar solemnemente para la guerra bajo juicio divino.
  alternative_spanish_readings:
  - «Aparta»
  - «Prepara para la guerra santa»
  - «Santifica»
  rationale: El hebreo no habla de consagración cultual en sentido estrecho, sino de una puesta aparte con propósito bélico y sacral. «Consagra» es lo bastante solemne y deja visible esa tensión.
  doctrine_reference: Jeremías 51:28; uso bélico de קדשׁ en contexto de juicio
- issue: Cambio de referentes pronominales en los sufijos
  english_pob_reading: Retain 'its governors ... its prefects' and 'his dominion' with the final masculine singular.
  chosen_spanish_reading: Mantener «sus gobernadores… sus prefectos» y cerrar con «su dominio», sin regularizar el cambio de referente del hebreo.
  alternative_spanish_readings:
  - Uniformar todo con un solo posesivo
  - Traducir el final como «su dominio» entendiendo un referente colectivo
  rationale: El texto hebreo presenta continuidad femenina implícita en los cargos administrativos y luego un sufijo masculino singular en «dominio». La traducción española conserva esa tensión en vez de resolverla artificialmente; «su» permite respetar el antecedente más próximo sin borrar la oscilación pronominal.
  doctrine_reference: Jeremías 51:28; decisiones de fidelidad textual y auditable
- issue: Identidad de Media y sus autoridades
  english_pob_reading: the kings of Media / its governors / its prefects
  chosen_spanish_reading: los reyes de Media, sus gobernadores y sus prefectos
  alternative_spanish_readings:
  - los reyes de los medos
  - sus sátrapas
  rationale: «Media» es una forma geográfica clara y tradicional en español bíblico, mientras que «gobernadores» y «prefectos» reflejan dos niveles administrativos distintos. Se evita introducir un término más técnico como «sátrapas» que el contexto no exige.
  doctrine_reference: Jeremías 51:28; precisión histórica y administrativa
translation_notes:
  revision_awareness: 'Se siguió de cerca el expediente inglés POB: se mantuvo el imperativo sacral-militar de קַדְּשׁוּ, el valor hostil de עָלֶיהָ, la referencia geopolítica de Media, la distinción entre פַּחוֹת y סְגָנִים, y el sufijo masculino singular final de מֶמְשַׁלְתּוֹ. Se adaptó la sintaxis para que el español resulte publicable y fluido, sin perder la tensión pronominal documentada en el audit trail inglés.'
  spanish_consistency_notes:
  - Se prefirió «Media» y no «los medos» en el texto principal por coherencia con el nombre geográfico usado en el audit trail; se dejó la alternativa en nota.
  - Se usó «consagra» como equivalente solemne de קדשׁ en contexto bélico, evitando una paráfrasis explicativa dentro del texto principal.
  - «Gobernadores» y «prefectos» se mantuvieron diferenciados para reflejar dos rangos administrativos distintos.
  - No se regularizó el cambio de sufijos del hebreo; la nota explica la tensión textual.
  - La puntuación con raya larga ayuda a reflejar la pausa enfática del original y la segmentación del expediente inglés.
