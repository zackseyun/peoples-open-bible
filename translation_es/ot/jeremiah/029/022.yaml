translation:
  language: es
  text: 'Y de ellos se tomará una maldición entre todos los exiliados de Judá que están en Babilonia[a], diciendo: «Que Yahvé te haga como Sedequías y como Acab, a quienes el rey de Babilonia asó en el fuego».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «los quemó en el fuego». El verbo hebreo puede traducirse de manera más general como «quemó», aunque «asó» conserva mejor su fuerza vívida.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְלֻקַּח
  english_pob_choice: will be taken up
  chosen_spanish: se tomará
  alternatives_spanish:
  - será tomada
  - se levantará
  lexicon: HALOT
  rationale: El pasivo de לקח introduce aquí la adopción de una fórmula maldiciente. En español, «se tomará» conserva la pasividad y la idea de que la maldición queda establecida a partir de este caso.
- source_word: קְלָלָה
  english_pob_choice: a curse
  chosen_spanish: una maldición
  alternatives_spanish:
  - una maldición formularia
  - una imprecación
  lexicon: HALOT
  rationale: El sustantivo designa una maldición; en el contexto funciona como fórmula de maldición. «Maldición» es natural y permite que la cita siguiente explicite el uso formular.
- source_word: לְכֹל גָּל֣וּת יְהוּדָה אֲשֶׁ֥ר בְּבָבֶל
  english_pob_choice: by all the exiles of Judah who are in Babylon
  chosen_spanish: para todos los desterrados de Judá que están en Babilonia
  alternatives_spanish:
  - entre todos los desterrados de Judá que están en Babilonia
  - por todos los desterrados de Judá que están en Babilonia
  lexicon: HALOT
  rationale: La preposición לְ aquí señala el grupo al que la maldición servirá. En español, «para todos» expresa bien esa función, y «desterrados» traduce con claridad la condición de exilio.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  - Jehová
  lexicon: HALOT
  rationale: Se mantiene el nombre divino con la forma española establecida en este proyecto. «Yahvé» preserva el Tetragrámaton sin sustituirlo por un título.
- source_word: כְּצִדְקִיָּהוּ וּכְאֶחָב
  english_pob_choice: like Zedekiah and like Ahab
  chosen_spanish: como Sedequías y como Acab
  alternatives_spanish:
  - igual que Sedequías y igual que Acab
  - tal como Sedequías y como Acab
  lexicon: HALOT
  rationale: El כ repetido marca comparación en una fórmula de maldición. «Como ... y como ...» conserva ese paralelismo enfático del hebreo.
- source_word: קָלָם
  english_pob_choice: roasted them
  chosen_spanish: quemó
  alternatives_spanish:
  - los quemó
  - los asó
  lexicon: HALOT
  rationale: El verbo קלה puede ser «asar/quemar»; el contexto de ejecución por fuego exige una traducción natural en español. «Quemó» comunica el hecho con sobriedad, mientras «asó» sonaría demasiado literal o extrañamente vívido en español.
- source_word: בָּאֵשׁ
  english_pob_choice: in the fire
  chosen_spanish: en el fuego
  alternatives_spanish:
  - con fuego
  - por el fuego
  lexicon: HALOT
  rationale: La preposición ב aquí indica el medio o la esfera del castigo. «En el fuego» reproduce de manera clara y directa la imagen del hebreo.
theological_decisions:
- issue: Renderización del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - Jehová
  rationale: El texto hebreo usa directamente el Tetragrámaton. En la línea editorial del proyecto, se conserva el nombre propio de Dios y no se lo sustituye por una designación como «el SEÑOR».
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
translation_notes:
  revision_awareness: 'Se verificó el texto hebreo y el audit trail en inglés: no se requieren revisiones adicionales; la lectura permanece alineada con la versión auditada más reciente.'
  spanish_consistency_notes:
  - Se usa «Yahvé» de manera uniforme para יְהוָה.
  - Se prefirió «desterrados» para mantener un registro natural y bíblico sin perder la idea de exilio.
  - Se evitó una calca demasiado fuerte en el verbo final, pero se conservó la imagen del fuego y la severidad del castigo.
