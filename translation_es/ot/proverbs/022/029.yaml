review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura del hebreo y la mayoría de las decisiones del POB en inglés: pregunta retórica inicial, singular representativo «un hombre», «hábil» para מָהִיר, y contraste entre reyes y personas sin prominencia. Sin embargo, «se pondrá» debilita la imagen y el matiz de presentarse/estar de pie ante superiores que trae יִתְיַצָּב, y «hombres oscuros» en español tiende a sugerir ambigüedad moral o rasgos de carácter más que falta de distinción social.'
  spanish_quality_summary: El texto es generalmente claro y digno, pero puede mejorarse para sonar más natural y preciso en español bíblico moderno. «Estará delante de reyes» o «se presentará delante de reyes» funciona mejor que «se pondrá». Además, «hombres oscuros» es comprensible solo con nota, pero en español principal resulta poco idiomático y potencialmente engañoso; «hombres sin distinción» comunica mejor el sentido mientras la nota preserva el literal hebreo.
  glossary_alignment: No hay términos del glosario principal en juego. Las decisiones léxicas relevantes están mayormente alineadas con el POB inglés, salvo que la preservación demasiado literal de «oscuros» en el texto principal no reproduce bien la intención documentada de «obscure men» = personas sin prominencia. La nota debe conservar el literal hebreo.
  issues:
  - severity: medium
    issue: «Se pondrá» para יִתְיַצָּב
    rationale: Aunque posible, suena menos idiomático y menos preciso que una expresión que conserve la idea de estar/presentarse ante personas de alto rango.
  - severity: high
    issue: «Hombres oscuros» en el texto principal
    rationale: En español contemporáneo puede sugerir hombres moralmente turbios, misteriosos o sombríos, no simplemente personas sin prominencia. Eso distorsiona el sentido documentado del hebreo חֲשֻׁכִּים en este contexto.
  revised_spanish_text: ¿Ves a un hombre hábil[a] en su trabajo? Estará delante de reyes; no estará delante de hombres sin distinción[b].
