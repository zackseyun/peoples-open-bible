    issue: «hombres de a caballo» es torpe frente a una opción más natural
    rationale: פָּרָשִׁים significa jinetes o hombres montados. «Jinetes» es más idiomático, más breve y mantiene bien el registro.
  - severity: low
    issue: La posición de «también» puede mejorarse
    rationale: En español suena más natural «También subieron con él carros y jinetes» o «Carros y jinetes también subieron con él». La segunda mantiene mejor la cercanía con el inglés auditado, pero la nota de variante debe anclarse a la cláusula pertinente.
  - severity: low
    issue: Las notas están ancladas en bloque al final, no en los términos relevantes
    rationale: La disciplina del proyecto pide que cada marcador aparezca en la palabra o frase correspondiente. La nota del singular colectivo debe ir con «Carros»; la de la variante de orden, con la cláusula de subida; la de «muy pesado», con «muy grande».
  revised_spanish_text: Carros[a] y jinetes también subieron con él[b], y el campamento era muy grande[c].
