translation:
  language: es
  text: Y estuvo allí con Yahvé cuarenta días y cuarenta noches; no comió pan ni bebió agua. Y escribió[a] sobre las tablas las palabras del pacto[b], las diez palabras.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «y Yahvé escribió», ya que en otras partes la escritura en las tablas se atribuye a Yahvé (véanse Éx. 34:1; Deut. 10:4).'
    reason: alternative_reading
  - marker: b
    text: 'Hebreo: «las diez palabras»; tradicionalmente, «los Diez Mandamientos».'
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  - el SEÑOR
  lexicon: HALOT
  rationale: Se sigue el estándar del proyecto para el Nombre divino, preservando la referencia directa al Tetragrámaton. «Yahvé» es más transparente que una sustitución litúrgica como «el SEÑOR».
- source_word: וַיְהִי שָׁם עִם
  english_pob_choice: And he was there with
  chosen_spanish: Y estuvo allí con
  alternatives_spanish:
  - Y permaneció allí con
  - Y se quedó allí con
  lexicon: HALOT
  rationale: La secuencia hebrea comunica presencia y permanencia en el lugar; «estuvo allí con» es natural en español y no añade matices no evidentes en el texto.
- source_word: אַרְבָּעִים יוֹם וְאַרְבָּעִים לַיְלָה
  english_pob_choice: forty days and forty nights
  chosen_spanish: cuarenta días y cuarenta noches
  alternatives_spanish:
  - cuarenta días y cuarenta noches enteros
  lexicon: HALOT
  rationale: Es la equivalencia directa y estable de la expresión temporal hebrea, conservando el paralelismo del original.
- source_word: לֶחֶם לֹא אָכַל
  english_pob_choice: he ate no bread
  chosen_spanish: no comió pan
  alternatives_spanish:
  - no comió pan alguno
  - no comió alimento
  lexicon: HALOT
  rationale: Se mantiene el sustantivo concreto «pan», como en el hebreo, en vez de generalizar a «alimento». El sentido de ayuno queda implícito por la construcción.
- source_word: וּמַיִם לֹא שָׁתָה
  english_pob_choice: and drank no water
  chosen_spanish: ni bebió agua
  alternatives_spanish:
  - y no bebió agua
  lexicon: HALOT
  rationale: «Ni bebió agua» conserva mejor la coordinación negativa del español tras «no comió pan» y mantiene el paralelismo hebreo.
- source_word: וַיִּכְתֹּב
  english_pob_choice: And he wrote
  chosen_spanish: Y escribió
  alternatives_spanish:
  - Y lo escribió
  - Y grabó
  lexicon: HALOT
  rationale: El verbo básico es «escribir». Se preserva la ambigüedad del sujeto tal como aparece en la fuente, sin resolverla en el texto principal.
- source_word: עַל הַלֻּחֹת
  english_pob_choice: on the tablets
  chosen_spanish: sobre las tablas
  alternatives_spanish:
  - en las tablas
  - sobre las tablas de piedra
  lexicon: HALOT
  rationale: «Tablas» es el equivalente normal en español para las tablas del pacto; «sobre» reproduce con naturalidad עַל.
- source_word: דִּבְרֵי הַבְּרִית
  english_pob_choice: the words of the covenant
  chosen_spanish: las palabras del pacto
  alternatives_spanish:
  - las palabras de la alianza
  - las palabras del convenio
  lexicon: HALOT
  rationale: Se traduce בְּרִית con «pacto», término ya asentado y teológicamente preciso; «alianza» sería una alternativa válida pero menos consistente con el registro bíblico del proyecto.
- source_word: עֲשֶׂרֶת הַדְּבָרִים
  english_pob_choice: the ten words
  chosen_spanish: las diez palabras
  alternatives_spanish:
  - los Diez Mandamientos
  - los diez dichos
  lexicon: HALOT
  rationale: Se conserva la literalidad de la expresión hebrea. «Diez Mandamientos» queda como alternativa tradicional, pero no se adopta en el texto principal para no perder la transparencia de la forma original.
theological_decisions:
- issue: Sujeto de «Y escribió»
  english_pob_reading: Retain the Hebrew's most immediate grammatical reading in English as 'And he wrote,' with the antecedent naturally read as Moses in the flow of this verse, while noting the broader canonical tension with texts attributing the writing to Yahweh.
  chosen_spanish_reading: Mantener en el texto principal «Y escribió», dejando abierta la referencia del sujeto sin armonizarla.
  alternative_spanish_readings:
  - Y Yahvé escribió
  - Y él [Yahvé] escribió
  - Y él escribió
  rationale: La forma verbal hebrea permite leer la frase con el antecedente inmediato del relato, pero el contexto canónico más amplio atribuye la escritura de las tablas a Yahvé. La versión española conserva esa tensión en lugar de resolverla de antemano.
  doctrine_reference: Translation philosophy §3 (Preserve theological tension rather than resolve it)
- issue: «the ten words» frente a «Ten Commandments»
  english_pob_reading: The Hebrew literally reads 'the ten words.' This is more source-transparent than the traditional interpretive rendering 'the Ten Commandments,' which can be preserved as an explanatory alternative in a footnote.
  chosen_spanish_reading: «las diez palabras» en el texto principal, con «los Diez Mandamientos» como alternativa explicativa.
  alternative_spanish_readings:
  - los Diez Mandamientos
  - los diez mandamientos
  - los diez dichos
  rationale: Se privilegia la literalidad del hebreo para reflejar la estructura original y evitar imponer de entrada una formulación tradicional interpretativa.
  doctrine_reference: Translation philosophy §1 (Original-language primacy over translation tradition)
translation_notes:
  revision_awareness: No se registran revisiones aplicadas en el expediente inglés; el pasaje se mantiene en acuerdo alto, sin cambios en la última pasada de revisión.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» para el Nombre divino, conforme al estándar del proyecto.
  - Se conserva el paralelismo negativo «no comió pan ni bebió agua», evitando una paráfrasis generalizante.
  - «Tablas» y «palabras del pacto» siguen la terminología transparente y auditable del expediente inglés.
  - La nota sobre el sujeto de «escribió» preserva la tensión canónica sin resolverla en el cuerpo principal.
  - «Las diez palabras» refleja el hebreo literal; la alternativa tradicional se documenta en nota.
