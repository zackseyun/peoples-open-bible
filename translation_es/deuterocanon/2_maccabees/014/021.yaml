  verdict: revise
  source_alignment_summary: 'El borrador sigue en líneas generales la secuencia del griego: fijar un día, reunirse en privado y preparar asientos para el encuentro. Sin embargo, pierde parte del sentido de ἥξουσιν εἰς τὸ αὐτό al traducir solo «vendrían», sin expresar que llegarían al mismo lugar o se reunirían; y «se adelantó un dífrax» suena demasiado opaco e impreciso para προῆλθε ... δίφραξ, donde el contexto pide que el objeto sea sacado o llevado al frente para el acto.'
  spanish_quality_summary: El español es mayormente legible, pero «dífrax» en el texto principal resulta innecesariamente oscuro para lectores hispanohablantes y entorpece la lectura. La nota ya preserva la incertidumbre léxica, por lo que conviene usar una opción comprensible en el texto, como «silla de manos», con nota aclaratoria. También es más natural «se reunirían» que «vendrían en privado», y «fue sacada»/«fue llevada al frente» refleja mejor la preparación ceremonial que «se adelantó».
  glossary_alignment: No hay términos teológicos mayores en este versículo. La revisión propuesta mantiene la filosofía POB de claridad con fidelidad léxica y conserva la incertidumbre de δίφραξ en nota, sin imponer una equivalencia excesivamente rígida.
  issues:
  - severity: medium
    issue: «vendrían» omite el matiz de reunión compartida en ἥξουσιν εἰς τὸ αὐτό
    rationale: El griego no solo indica venir, sino venir al mismo lugar / reunirse. «Se reunirían» o equivalente preserva mejor el sentido.
  - severity: high
    issue: «dífrax» en el texto principal es demasiado opaco
    rationale: La transliteración no es una opción normal de lectura en español y dificulta comprender la escena. La ambigüedad ya puede conservarse en nota al pie con una palabra comprensible en el texto.
  - severity: medium
    issue: «se adelantó un dífrax» suena poco natural y no comunica bien la acción
    rationale: En contexto ceremonial, προῆλθε se entiende mejor como que la silla/litera fue sacada o llevada al frente, no que ella misma «se adelantó».
  revised_spanish_text: Así fijaron un día en el que se reunirían en privado; y de cada lado fue sacada una silla de manos[a], y se colocaron asientos.
  revised_footnotes:
  - marker: a
    text: El griego δίφραξ es raro aquí y puede designar una litera, silla de manos o un asiento portátil semejante; la forma exacta del objeto no es segura.
    reason: lexical_alternative
