lexical_decisions:
- source_word: εὐφραινόμεθα
  english_pob_choice: we rejoice
  chosen_spanish: nos gozamos
  alternatives_spanish:
  - nos alegramos
  - nos regocijamos
  lexicon: LSJ
  rationale: El griego expresa alegría o regocijo en forma verbal. En español, «nos gozamos» conserva el valor verbal y suena natural en registro bíblico; «nos alegramos» sería igualmente válido, pero un poco más general, y «nos regocijamos» más formal.
- source_word: δὲ
  english_pob_choice: but
  chosen_spanish: pero
  alternatives_spanish:
  - y
  - ahora
  lexicon: LSJ
  rationale: δέ introduce aquí una transición con matiz leve de contraste. «Pero» reproduce bien esa relación en español sin endurecerla demasiado.
- source_word: ἐπὶ
  english_pob_choice: in
  chosen_spanish: en
  alternatives_spanish:
  - por
  - sobre
  - a causa de
  lexicon: LSJ
  rationale: Con el dativo, ἐπί puede indicar base u ocasión. «En vuestra gloria» mantiene la construcción cercana al griego y funciona de manera natural con el verbo de gozo.
- source_word: τῇ δόξῃ
  english_pob_choice: glory
  chosen_spanish: gloria
  alternatives_spanish:
  - honor
  - renombre
  lexicon: LSJ
  rationale: δόξα aquí apunta al prestigio o buena reputación de los destinatarios. «Gloria» es el equivalente directo más amplio en español y conserva la ambigüedad entre honor y renombre que el texto permite.
- source_word: ὑμῶν
  english_pob_choice: your
  chosen_spanish: vuestra
  alternatives_spanish:
  - su
  - de ustedes
  lexicon: LSJ
  rationale: El griego usa segunda persona plural. «Vuestra» lo refleja con claridad y mantiene el paralelismo formal del original.
translation_notes:
  revision_awareness: El texto griego es breve y de alta concordancia con el audit trail inglés. Se ha mantenido la relación causal/ocasional implícita en ἐπὶ con una forma española natural, sin añadir elementos inexistentes en el original.
  spanish_consistency_notes:
  - Se usó «vuestra» para reflejar el plural del griego.
  - Se evitó «SEÑOR» u otras sustituciones innecesarias porque el versículo no contiene el Nombre divino.
  - «Gloria» conserva la amplitud semántica documentada por el audit trail, con nota de alternativas para honor/renombre.
