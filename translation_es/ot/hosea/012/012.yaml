source:
  edition: WLC
  text: אִם גִּלְעָ֥ד אָ֨וֶן֙ אַךְ שָׁ֣וְא הָי֔וּ בַּ/גִּלְגָּ֖ל שְׁוָרִ֣ים זִבֵּ֑חוּ גַּ֤ם מִזְבְּחוֹתָ/ם֙ כְּ/גַלִּ֔ים עַ֖ל תַּלְמֵ֥י שָׂדָֽי־־׃
base_translation:
  language: en
  yaml_path: translation/ot/hosea/012/012.yaml
  text: If Gilead is iniquity[a], they have surely become nothing; in Gilgal they sacrifice bulls; indeed[c][b], their altars are like stone heaps on the furrows of the field.
  footnotes:
  - marker: a
    text: Or, 'Surely Gilead is wickedness'; the Hebrew particle can be read as emphatic rather than conditional.
    reason: alternative_reading
  - marker: b
    text: Or, 'they are surely worthlessness / falsehood'; the Hebrew expression is compressed and can emphasize emptiness, vanity, or falseness.
    reason: lexical_alternative
  - marker: c
    text: The image may compare their many altars to the piles of stones commonly seen along plowed field furrows.
    reason: cultural_note
