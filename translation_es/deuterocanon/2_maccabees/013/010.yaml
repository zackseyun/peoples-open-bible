review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja correctamente la secuencia básica del griego: Judas recibe la información, da una orden al grupo reunido, y les manda orar continuamente para que el Señor los ayude ahora como antes. Sin embargo, «mandó a la multitud que ... invocaran» presenta discordancia de sujeto en español estándar; además, «para que» puede afinarse a una construcción más directa de propósito/petición acorde con el infinitivo griego dependiente de la orden.'
  spanish_quality_summary: 'El texto es claro y digno, con buen registro bíblico moderno. La principal reparación necesaria es gramatical: con «mandó a la multitud», lo natural es singular («invocara») o bien reformular con infinitivo («mandó ... invocar»). También conviene simplificar «de día y de noche» a «día y noche» para mayor naturalidad.'
  glossary_alignment: La decisión de traducir κύριον como «Señor» está justificada porque el original griego tiene κύριος, no el tetragrámaton hebreo; por tanto no corresponde forzar «Yahvé» aquí. «Invocar al Señor» preserva bien ἐπικαλεῖσθαι τὸν κύριον. No hay conflicto relevante con la terminología base del proyecto.
  issues:
  - severity: medium
    issue: Discordancia gramatical en «mandó a la multitud que ... invocaran»
    rationale: «La multitud» es singular; aunque a veces el sentido colectivo admite plural, en este contexto suena defectuoso en español bíblico cuidado. Debe decirse «invocara» o reformularse con infinitivo.
  - severity: low
    issue: «De día y de noche» suena algo menos idiomático que «día y noche»
    rationale: Ambas opciones son comprensibles y fieles, pero «día y noche» es la equivalencia española más natural para la locución continua διʼ ἡμέρας καὶ νυκτός.
  revised_spanish_text: Y cuando Judas supo estas cosas, mandó a la multitud invocar al Señor día y noche, para que, así como en otros tiempos, ahora también viniera en su ayuda.
  revision_rationale: Se ajusta la sintaxis para eliminar la discordancia entre «la multitud» y «invocaran», manteniendo fielmente el sentido de una orden dada al conjunto del pueblo. También se adopta «día y noche», más natural en español y plenamente equivalente al griego.
