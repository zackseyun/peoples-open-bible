review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la estructura y el sentido general del hebreo: se oye un lamento desde Sión, seguido por una exclamación de devastación, vergüenza intensa, salida de la tierra y destrucción de las moradas. Sin embargo, hay un desajuste en la nota [a]: el inglés POB ofrece como alternativa ''we have been plundered'' frente a ''we are devastated'', pero la nota española dice ''O «somos devastados»'', que no representa esa alternativa léxica y además suena poco natural. También conviene ajustar ''Porque desde Sión se oye el sonido de lamentación'' a un orden más natural y fiel al énfasis auditivo: ''Porque se oye desde Sión el sonido de lamentación'' o similar.'
  spanish_quality_summary: El texto es legible y digno, con buen registro bíblico. 'Estamos devastados' y 'muy avergonzados' son comprensibles. No obstante, 'el sonido de lamentación' puede sonar algo rígido; 'el sonido de lamento' o 'de llanto' sería más idiomático, aunque no indispensable. El problema principal de calidad está en la nota [a], que introduce una alternativa extraña en español. El resto de las notas son claras y útiles.
  glossary_alignment: No hay conflictos con la terminología doctrinal del proyecto. 'Sión', 'tierra' y 'moradas' son aceptables en este contexto. La elección 'moradas' mantiene el tono del POB, aunque 'viviendas' sería una alternativa más cotidiana ya recogida en nota.
  issues:
  - severity: medium
    issue: La nota [a] no preserva la alternativa léxica documentada en el POB inglés.
    rationale: El POB inglés contrasta 'devastated' con 'plundered'. La nota española 'O «somos devastados»' no comunica la alternativa de saqueo/despojo y además cambia innecesariamente el aspecto verbal.
  - severity: low
    issue: El orden 'desde Sión se oye el sonido de lamentación' es entendible pero algo menos natural en español.
    rationale: 'Mover ''se oye'' antes mejora la fluidez sin alterar el sentido: ''Porque se oye desde Sión el sonido de lamentación''.'
