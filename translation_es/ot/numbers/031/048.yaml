    rationale: La nota «O “se acercaron a Moisés”» no ofrece una alternativa real al lector, pues repite esencialmente la misma formulación. La alternativa útil sería «O “vinieron cerca de Moisés”» o simplemente omitirla; aquí se conserva una alternativa mejor.
