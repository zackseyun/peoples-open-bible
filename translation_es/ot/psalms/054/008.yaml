translation:
  language: es
  text: Te ofreceré una ofrenda voluntaria[a]; daré gracias a tu nombre, Yahvé, porque es bueno[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «ofrenda voluntaria»; la frase también puede entenderse más adverbialmente como «ofreceré voluntariamente» o «de buen grado».'
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «porque es bueno». Algunos entienden: «porque él es bueno», refiriéndose directamente a Yahvé y no a «tu nombre».'
    reason: alternative_reading
lexical_decisions:
- source_word: בִּנְדָבָה
  english_pob_choice: with a freewill offering
  chosen_spanish: Con un sacrificio voluntario
  alternatives_spanish:
  - voluntariamente
  - con una ofrenda voluntaria
  - como ofrenda voluntaria
  lexicon: HALOT
  rationale: El sustantivo נְדָבָה tiene fuerza cultual de ofrenda voluntaria; en español, «sacrificio voluntario» conserva el matiz sacrificial sin volver la frase mecánica. Se evita reducirlo solo a un adverbio, aunque esa lectura alternativa existe.
- source_word: אֶזְבְּחָה
  english_pob_choice: I will sacrifice
  chosen_spanish: te ofreceré
  alternatives_spanish:
  - sacrificaré
  - haré un sacrificio
  lexicon: HALOT
  rationale: En español, «ofreceré» encaja naturalmente con el régimen indirecto «te» y mantiene el sentido de sacrificio. «Sacrificaré» es posible, pero puede sonar menos natural en la cláusula con objeto indirecto explícito.
- source_word: לָּךְ
  english_pob_choice: to you
  chosen_spanish: te
  alternatives_spanish:
  - a ti
  - para ti
  lexicon: HALOT
  rationale: El ל marca aquí destinatario del sacrificio; en español, el pronombre átono «te» expresa bien esa relación sin sobrecargar la línea.
- source_word: אוֹדֶה
  english_pob_choice: I will give thanks
  chosen_spanish: daré gracias
  alternatives_spanish:
  - te alabaré
  - te daré gracias
  lexicon: HALOT
  rationale: יָדָה en hiphil suele tener el sentido de agradecer o alabar. «Daré gracias» es la opción más directa y mantiene el vínculo con el objeto «tu nombre».
- source_word: שִׁמְךָ
  english_pob_choice: your name
  chosen_spanish: tu nombre
  alternatives_spanish:
  - tu fama
  - tu reputación
  lexicon: HALOT
  rationale: Se conserva «tu nombre» porque el hebreo dice literalmente eso y, en contexto bíblico, es una manera reverente de hablar del carácter revelado de Dios.
- source_word: יְהוָה
  english_pob_choice: O Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  - el SEÑOR
  lexicon: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
  rationale: El Tetragrámaton se vierte como «Yahvé» según la terminología del proyecto. Se evita la sustitución por un título, preservando el nombre propio divino.
- source_word: כִּי
  english_pob_choice: for
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  lexicon: HALOT
  rationale: Aquí introduce la razón de la acción de gracias; «porque» resulta natural en español y comunica bien la relación explicativa.
- source_word: טוֹב
  english_pob_choice: it is good
  chosen_spanish: es bueno
  alternatives_spanish:
  - es agradable
  - él es bueno
  lexicon: HALOT
  rationale: El hebreo es breve y el antecedente inmediato puede ser «tu nombre». «Es bueno» conserva esa sobriedad y deja abierta la cuestión de si el adjetivo se refiere al nombre o directamente a Yahvé.
theological_decisions:
- issue: Renderización del nombre divino יְהוָה
  english_pob_reading: O Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Yahweh
  - Jehová
  rationale: Se preserva el nombre divino en transliteración española estándar del proyecto, sin sustituirlo por un título. Esto mantiene la identidad del pacto expresada por el Tetragrámaton.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Referente de כִּי טוֹב
  english_pob_reading: for it is good (referring to 'your name')
  chosen_spanish_reading: porque es bueno (dejando como antecedente natural «tu nombre»)
  alternative_spanish_readings:
  - porque él es bueno, refiriendo directamente a Yahvé
  - porque es agradable
  rationale: El hebreo no explicita sujeto. La redacción principal sigue el antecedente inmediato «tu nombre», pero no borra la lectura teológica tradicional que aplica la bondad directamente a Yahvé; esa tensión queda visible en nota.
  doctrine_reference: 'DOCTRINE.md: Preserving documented tensions in ambiguous clauses'
translation_notes:
  revision_awareness: 'La redacción sigue el ajuste revisado del inglés POB: la primera cláusula se ordena como sacrificio/ofrenda voluntaria + destinatario, no como una construcción torpe equivalente a «sacrificar a ti con una ofrenda». Se preserva también la ambigüedad del segundo hemistiquio sobre el referente de «es bueno».'
  spanish_consistency_notes:
  - Se usa «Yahvé» de forma consistente para יְהוָה.
  - Se mantiene «tu nombre» en vez de reducirlo a «tú», porque el hebreo conserva el sustantivo.
  - Se conserva una dicción bíblica sobria y pública, evitando arcaísmos innecesarios.
  - La nota sobre «es bueno» deja visible la alternativa «él es bueno» sin imponerla en el texto principal.
