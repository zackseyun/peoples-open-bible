translation:
  language: es
  text: Porque no habrá futuro[a] para el malvado; la lámpara de los impíos[b] se apagará.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘fin’, ‘resultado’ o ‘desenlace’ para אַחֲרִית. En este contexto sapiencial la palabra puede referirse al porvenir, al desenlace o al destino final de una persona.
    reason: lexical_alternative
  - marker: b
    text: O ‘será apagada’ o ‘se extinguirá’. La imagen de la lámpara sugiere el cese de vida, prosperidad o permanencia.
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  lexicon: HALOT
  rationale: Introduce la razón o fundamento de la exhortación previa; en español, 'Porque' conserva bien el valor causal sin sonar forzado.
- source_word: לֹא תִהְיֶה
  english_pob_choice: there will be no
  chosen_spanish: no habrá
  alternatives_spanish:
  - no יהיה
  - no existirá
  lexicon: HALOT
  rationale: La construcción negativa existencial se expresa de forma natural con 'no habrá', manteniendo el sentido futuro y la negación total.
- source_word: אַחֲרִית
  english_pob_choice: future
  chosen_spanish: futuro
  alternatives_spanish:
  - fin
  - resultado
  - desenlace
  lexicon: HALOT
  rationale: '''Futuro'' comunica la idea de perspectiva o porvenir duradero, coherente con el paralelismo de la lámpara apagada. ''Fin'' podría sonar demasiado absoluto o meramente terminal.'
- source_word: לָרָע
  english_pob_choice: for the evil
  chosen_spanish: para el mal
  alternatives_spanish:
  - para el malvado
  - para el impío
  - para el hombre malo
  lexicon: HALOT
  rationale: El hebreo usa un singular sustantivado/adjetival; en español 'el mal' conserva la brevedad y la ambigüedad controlada del original sin añadir 'hombre'. Aunque 'el malvado' sería una opción natural, aquí el inglés POB revisado optó por no añadir 'man'; 'para el mal' mantiene mejor esa economía textual y la tensión semántica del hebreo.
- source_word: נֵר
  english_pob_choice: lamp
  chosen_spanish: lámpara
  alternatives_spanish:
  - lámpara
  - luz
  lexicon: HALOT
  rationale: La imagen concreta es un objeto de iluminación. 'Lámpara' preserva el paralelismo imagético mejor que 'luz'.
- source_word: רְשָׁעִים
  english_pob_choice: the wicked
  chosen_spanish: los impíos
  alternatives_spanish:
  - los malvados
  - los perversos
  lexicon: HALOT
  rationale: '''Impíos'' es un equivalente bíblico común para רְשָׁעִים y conserva el valor moral-religioso del término con buen registro en español.'
- source_word: יִדְעָךְ
  english_pob_choice: will be put out
  chosen_spanish: se apagará
  alternatives_spanish:
  - será apagada
  - se extinguirá
  lexicon: HALOT
  rationale: Para una lámpara, 'se apagará' es idiomático en español y mantiene la imagen de extinción. 'Se extinguirá' es posible, pero algo más técnico o abstracto.
theological_decisions:
- issue: Valor de אַחֲרִית en contexto sapiencial
  english_pob_reading: Render as 'future' rather than 'posterity'.
  chosen_spanish_reading: Renderizar como 'futuro' y no como 'descendencia' ni 'posteridad'.
  alternative_spanish_readings:
  - fin
  - resultado
  - posteridad
  - descendencia
  rationale: En Proverbios 24:20 el contraste es entre un porvenir real y la lámpara apagada de los impíos. 'Futuro' mantiene la amplitud sapiencial del término sin restringirlo a herencia familiar o descendencia.
  doctrine_reference: 'Translation philosophy #1, #6'
- issue: Singular de לָרָע frente al plural de רְשָׁעִים
  english_pob_reading: Translate the first colon with singular 'the evil' and the second with collective plural 'the wicked.'
  chosen_spanish_reading: Conservar el singular sustantivado en la primera cola ('el mal') y el plural en la segunda ('los impíos').
  alternative_spanish_readings:
  - los impíos ... los impíos
  - el malvado ... los impíos
  - el malo ... los impíos
  rationale: El hebreo alterna singular y plural; mantener esa oscilación evita nivelar el texto y respeta la textura fuente. No se introduce una figura demonológica ni se homogeneiza el paralelismo.
  doctrine_reference: 'Translation philosophy #1, #4, #5'
- issue: Imagen de la lámpara que se apaga
  english_pob_reading: The image of the lamp signifies the extinguishing of life, prosperity, or enduring standing.
  chosen_spanish_reading: La imagen de la lámpara se conserva como metáfora de la desaparición de vida, prosperidad o permanencia.
  alternative_spanish_readings:
  - la lámpara simboliza la muerte
  - la lámpara representa la vida
  rationale: El español debe dejar intacta la metáfora sin reducirla a una sola interpretación. 'Se apagará' comunica tanto la extinción literal de la luz como el colapso de una vida o posición.
  doctrine_reference: 'Translation philosophy #1, #4, #5'
translation_notes:
  revision_awareness: El borrador refleja la revisión auditada que ajustó la frase inglesa de 'the evil man' a 'the evil' para acercarse más al singular sustantivado del hebreo. En español, eso se resolvió evitando añadir 'hombre' y conservando una formulación breve y sustantivada en la primera cola.
  spanish_consistency_notes:
  - Se mantuvo Yahvé no aplicable en este versículo; no hay referencia al nombre divino.
  - '''Impíos'' se usa como término bíblico estable para רְשָׁעִים y no se sustituye por ''malvados'' para conservar el registro sapiencial.'
  - La puntuación en dos miembros reproduce el paralelismo hebreo con claridad y naturalidad en español.
