translation:
  language: es
  text: Él te prestará[a], pero tú no le prestarás a él; él será la cabeza[b], y tú serás la cola.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Es decir, el extranjero o forastero mencionado en el versículo anterior.
    reason: cross_reference
  - marker: b
    text: 'O: «hará un préstamo a él». El verbo hebreo en ambas cláusulas se refiere al préstamo, subrayando la dependencia económica y la inversión de estatus.'
    reason: lexical_alternative
lexical_decisions:
- source_word: יַלְוְךָ / תַלְוֶנּוּ (לוה, Hiphil)
  english_pob_choice: lend to / lend to him
  chosen_spanish: prestará / le prestarás
  alternatives_spanish:
  - hará un préstamo a / le harás un préstamo
  - dará prestado a / darás prestado a
  lexicon: HALOT
  rationale: 'El Hiphil de לוה en este contexto expresa la relación económica de préstamo o endeudamiento. En español, «prestar» comunica de manera natural esa asimetría entre acreedor y deudor, sin perder la tensión del paralelismo: él te prestará y tú no le prestarás a él.'
- source_word: הוּא
  english_pob_choice: he
  chosen_spanish: él
  alternatives_spanish:
  - ese
  - aquel
  lexicon: HALOT
  rationale: El hebreo usa un pronombre singular masculino que retoma al extranjero o forastero del verso anterior. «Él» conserva esa referencia singular y el estilo pronominal del original.
- source_word: לְרֹאשׁ
  english_pob_choice: the head
  chosen_spanish: la cabeza
  alternatives_spanish:
  - cabeza
  - jefe
  lexicon: HALOT
  rationale: La expresión hebrea es una metáfora estable de preeminencia o dominio. «La cabeza» preserva la metáfora y el contraste con «la cola».
- source_word: לְזָנָב
  english_pob_choice: the tail
  chosen_spanish: la cola
  alternatives_spanish:
  - cola
  - parte trasera
  lexicon: HALOT
  rationale: «La cola» es el correlato directo de «la cabeza» en la metáfora de estatus. Mantiene el contraste vívido y reconocido en español.
- source_word: יִהְיֶה / תִּהְיֶה
  english_pob_choice: will be
  chosen_spanish: será
  alternatives_spanish:
  - estará
  - llegará a ser
  lexicon: HALOT
  rationale: El verbo היה aquí indica el estado resultante dentro de la maldición del pacto. «Será» es la forma natural y precisa en español para ese estado futuro.
- source_word: וְאַתָּה
  english_pob_choice: but you / and you
  chosen_spanish: pero tú / y tú
  alternatives_spanish:
  - mientras tú / en cambio tú
  - y tú
  lexicon: HALOT
  rationale: La repetición del pronombre intensifica el contraste. En español, «pero tú» en la primera cláusula y «y tú» en la segunda conservan la oposición marcada del hebreo sin volver la frase artificial.
theological_decisions:
- issue: Referencia singular masculina al extranjero/forastero del contexto inmediato
  english_pob_reading: Use singular masculine 'he' and 'you'
  chosen_spanish_reading: Mantener el singular masculino «él» y «tú»
  alternative_spanish_readings:
  - 'pluralizar: «ellos te prestarán ... ellos serán la cabeza»'
  - 'sustituir por el sustantivo explícito: «el extranjero te prestará ...»'
  rationale: El hebreo es singular masculino y funciona de manera representativa respecto del forastero del versículo anterior. Mantener el singular conserva la forma del texto y su fuerza retórica, sin neutralizarla en plural.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
translation_notes:
  revision_awareness: 'Coincide con la última revisión auditada: no hubo cambios aplicados en el pase más reciente, y el consenso de revisión fue de alta concordancia.'
  spanish_consistency_notes:
  - Se mantiene «él» para el referente singular masculino, en consonancia con el hebreo y con la política de exactitud de género cuando el original es singular.
  - Se usa «prestar» para reflejar la relación económica de la raíz לוה, conservando la asimetría entre quien presta y quien recibe el préstamo.
  - Se preserva la metáfora «cabeza/cola» por su valor contrastivo y por su equivalencia estable en español bíblico.
