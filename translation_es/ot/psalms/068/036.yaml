  text: נ֤וֹרָ֥א אֱלֹהִ֗ים מִֽ/מִּקְדָּ֫שֶׁ֥י/ךָ אֵ֤ל יִשְׂרָאֵ֗ל ה֤וּא נֹתֵ֨ן עֹ֖ז וְ/תַעֲצֻמ֥וֹת לָ/עָ֗ם בָּר֥וּךְ אֱלֹהִֽים׀׃
base_translation:
  language: en
  yaml_path: translation/ot/psalms/068/036.yaml
