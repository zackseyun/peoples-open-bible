base_translation:
  language: en
  yaml_path: translation/ot/ezekiel/044/012.yaml
  text: Because they ministered to them before their idols and became a stumbling block of iniquity for the house of Israel[a], therefore I have raised my hand against them, declares the Lord GOD[b], and they will bear their iniquity.
  footnotes:
  - marker: a
    text: 'Hebrew idiom: ''I have lifted up my hand against them,'' a gesture that can signal a solemn oath or judicial action; here the context favors a judgment declaration against them.'
    reason: lexical_alternative
  - marker: b
    text: Or 'they served them before their idols.' The Hebrew pronoun 'them' is somewhat compressed in English and may refer to those associated with the idols or, by sense, to the idols themselves.
    reason: alternative_reading
