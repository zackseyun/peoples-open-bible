translation:
  language: es
  text: Tú conoces mi angustia[a], porque detesto la señal[b] de mi orgullo, que está sobre mi cabeza en los días en que me presento[c]; la detesto como un paño de menstruación[d], y no lo uso en los días de mi descanso[e].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'También: «mi aflicción» o «mi necesidad» para ἀνάγκη.'
    reason: lexical_alternative
  - marker: b
    text: La frase «la señal de mi orgullo» probablemente alude al adorno o emblema regio que Esther llevaba sobre la cabeza; el griego no especifica cuál era el objeto exacto.
    reason: cultural_note
  - marker: c
    text: 'O: «en los días de mi aparición pública»; es decir, cuando se presenta en público o en la corte.'
    reason: lexical_alternative
  - marker: d
    text: 'Griego: «como un trapo de menstruación», una expresión deliberadamente gráfica de repulsión.'
    reason: lexical_alternative
  - marker: e
    text: 'O: «en los días de mi reposo» o «de mi privacidad», en contraste con sus apariciones públicas.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀνάγκην
  english_pob_choice: distress
  chosen_spanish: angustia
  alternatives_spanish:
  - necesidad
  - necesidad apremiante
  - aflicción
  lexicon: BDAG
  rationale: ἀνάγκη puede expresar necesidad, presión, constricción o aflicción. En este contexto de súplica, «angustia» comunica bien la situación apremiante sin sonar técnico ni atenuar la urgencia.
- source_word: βδελύσσομαι
  english_pob_choice: loathe
  chosen_spanish: detesto
  alternatives_spanish:
  - aborrezco
  - repudio
  - abomino
  lexicon: BDAG
  rationale: El verbo expresa fuerte repulsión. «Detesto» es natural en español y conserva la intensidad de ambas ocurrencias del versículo.
- source_word: σημεῖον
  english_pob_choice: sign
  chosen_spanish: señal
  alternatives_spanish:
  - marca
  - símbolo
  - insignia
  lexicon: BDAG
  rationale: El griego es amplio y no nombra el objeto exacto. «Señal» mantiene la indeterminación del texto fuente, sin precisar indebidamente si se trata de corona, diadema u otro adorno.
- source_word: ὑπερηφανίας
  english_pob_choice: pride
  chosen_spanish: orgullo
  alternatives_spanish:
  - arrogancia
  - altivez
  - soberbia
  lexicon: BDAG
  rationale: Aquí el término funciona negativamente, como orgullo asociado al adorno real. «Orgullo» conserva la referencia general sin sobrecargar el texto con una valoración más interpretativa.
- source_word: ὀπτασίας
  english_pob_choice: appearance
  chosen_spanish: aparición
  alternatives_spanish:
  - presencia pública
  - presentación
  - mostrarme
  lexicon: LSJ
  rationale: En contexto, la palabra se entiende como las ocasiones en que ella aparece ante otros. «Aparición» reproduce de cerca el valor contextual elegido en el POB inglés y deja abierta la referencia pública/cortesa.
- source_word: ῥάκος καταμηνίων
  english_pob_choice: menstrual cloth
  chosen_spanish: paño menstrual
  alternatives_spanish:
  - trapo menstrual
  - paño de menstruación
  - paño de regla
  lexicon: LSJ
  rationale: La expresión es deliberadamente gráfica y debe conservarse. «Paño menstrual» mantiene la fuerza del original sin rebajarla a una formulación eufemística.
- source_word: φορῶ
  english_pob_choice: wear
  chosen_spanish: llevo
  alternatives_spanish:
  - uso
  - porto
  - me pongo
  lexicon: BDAG
  rationale: En referencia a un adorno o insignia que se lleva sobre la cabeza, «llevo» suena natural y fiel al sentido de portar una prenda u objeto visible.
- source_word: ἡσυχίας
  english_pob_choice: rest
  chosen_spanish: descanso
  alternatives_spanish:
  - quietud
  - reposo
  - privacidad
  lexicon: BDAG
  rationale: El contraste es con los días de aparición pública. «Descanso» funciona bien en español para el estado opuesto a la exhibición pública, y es coherente con la revisión inglesa más reciente.
theological_decisions:
- issue: Objeto exacto rechazado por Esther
  english_pob_reading: A general emblem/sign of royal exaltation worn on her head, rendered without over-identifying it as a crown.
  chosen_spanish_reading: Una señal general de exaltación real sobre la cabeza, sin identificarla de forma cerrada como corona.
  alternative_spanish_readings:
  - corona
  - diadema
  - tocado real
  rationale: El griego no nombra el objeto específico, solo habla de la «señal de mi orgullo» sobre la cabeza. La traducción preserva esa indeterminación y evita introducir un término no garantizado por el texto.
  doctrine_reference: Primacía del idioma original; no especificar más allá de lo que el texto permite.
- issue: Fuerza de la comparación impura
  english_pob_reading: Retain the explicit menstrual imagery in the main text.
  chosen_spanish_reading: Mantener la imagen menstrual explícita en el texto principal.
  alternative_spanish_readings:
  - paño impuro
  - trapo inmundo
  - paño sucio
  rationale: La expresión griega es intencionalmente cruda. El español debe conservar esa dureza sin eufemizarla, porque forma parte del efecto retórico del pasaje.
  doctrine_reference: Fidelidad al origen y respeto por la intensidad semántica del texto fuente.
