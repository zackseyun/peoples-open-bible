translation:
  language: es
  text: Ahora bien, estas son las ordenanzas[a] que pondrás delante de ellos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «juicios» o «reglas». El término hebreo se refiere a decisiones jurídicas o leyes de caso.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְ/אֵלֶּה
  english_pob_choice: Now these
  chosen_spanish: Ahora bien, estas
  alternatives_spanish:
  - Y estas
  - Estas
  lexicon: HALOT
  rationale: La conjunción ו más el demostrativo enlaza esta sección con lo anterior. «Ahora bien» conserva el valor discursivo de transición de manera natural en español, y «estas» mantiene el referente próximo del hebreo.
- source_word: הַ/מִּשְׁפָּטִים
  english_pob_choice: ordinances
  chosen_spanish: ordenanzas
  alternatives_spanish:
  - juicios
  - leyes
  - decretos
  lexicon: HALOT
  rationale: מִשְׁפָּטִים puede referirse a decisiones legales, dictámenes o normas jurídicas. En este contexto de legislación del pacto, «ordenanzas» expresa el carácter normativo del término sin reducirlo a un simple conjunto de reglas, y es una opción publicable en español bíblico.
- source_word: אֲשֶׁר
  english_pob_choice: that
  chosen_spanish: que
  alternatives_spanish:
  - las cuales
  lexicon: HALOT
  rationale: Pronombre relativo estándar. «Que» es la forma más natural y fiel en español moderno.
- source_word: תָּשִׂים
  english_pob_choice: you shall set
  chosen_spanish: pondrás
  alternatives_spanish:
  - colocarás
  - ponerás
  - establecerás
  lexicon: HALOT
  rationale: שׂוּם significa «poner, colocar, establecer». «Pondrás» conserva el mandato dirigido a Moisés con naturalidad en español, sin perder la fuerza formal del imperativo futuro.
- source_word: לִ/פְנֵי/הֶם
  english_pob_choice: before them
  chosen_spanish: delante de ellos
  alternatives_spanish:
  - en presencia de ellos
  - ante ellos
  lexicon: HALOT
  rationale: La expresión idiomática לִפְנֵי significa «delante de, en presencia de». «Delante de ellos» transmite bien la idea de presentar estas normas al pueblo de manera comprensible y sin sobrecarga formal.
theological_decisions:
- issue: Valor legal de מִשְׁפָּטִים en el código del pacto
  english_pob_reading: ordinances
  chosen_spanish_reading: ordenanzas
  alternative_spanish_readings:
  - juicios
  - leyes
  - reglas
  rationale: No se trata de una cuestión doctrinal, sino lexical y de género. «Ordenanzas» preserva la fuerza jurídica del término hebreo y su conexión con el cuerpo legal que sigue, evitando un tono demasiado eclesiástico o demasiado débil.
  doctrine_reference: Translation philosophy §1, §5
translation_notes:
  revision_awareness: El audit trail inglés pasó de «judgments» a «ordinances» por considerarse más natural en este contexto legal; la versión española sigue ese último criterio, pero mantiene una nota alternativa porque מִשְׁפָּטִים conserva una gama semántica legítima en hebreo.
  spanish_consistency_notes:
  - Se usa «Yahvé» como forma estándar del proyecto cuando aparezca el nombre divino; este versículo no lo contiene.
  - «Ordenanzas» se mantiene aquí para מִשְׁפָּטִים, coherente con el juicio editorial más reciente del POB en inglés.
  - Se evita «reglas» por ser demasiado débil para el campo semántico jurídico del hebreo.
