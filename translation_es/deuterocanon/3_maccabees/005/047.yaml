translation:
  language: es
  text: Pero él, lleno de intensa ira y con mente impía, salió precipitadamente con toda su fuerza junto con las bestias[b], queriendo, con un corazón insensible[a] y con las pupilas de sus ojos, contemplar la dolorosa y miserable destrucción de los que habían sido señalados.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: “con un corazón no atravesado/no herido”. El griego dice literalmente “con un corazón no atravesado/no herido”, probablemente para expresar un corazón no tocado por la compasión.'
    reason: lexical_alternative
  - marker: b
    text: 'Literalmente: “con las pupilas de sus ojos”, una forma enfática de decir que quería verlo personalmente y de manera directa.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ὀργῇ βαρείᾳ γεμίσας
  english_pob_choice: filled with heavy wrath
  chosen_spanish: lleno de una furia pesada
  alternatives_spanish:
  - lleno de grave ira
  - lleno de intensa furia
  lexicon: LSJ
  rationale: βαρεῖᾳ conserva la metáfora de ‘pesada’; en español ‘furia pesada’ mantiene esa intensidad sin perder la imagen física del griego.
- source_word: δυσσεβῆ φρένα
  english_pob_choice: impious in mind
  chosen_spanish: con mente impía
  alternatives_spanish:
  - con pensamiento impío
  - con ánimo impío
  lexicon: LSJ
  rationale: φρένα apunta al ámbito interior de la mente/disposición; δυσσεβῆ expresa irreverencia religiosa, por lo que ‘mente impía’ conserva el matiz teológico sin hacerlo meramente moral.
- source_word: παντὶ τῷ βάρει
  english_pob_choice: with all his force
  chosen_spanish: con toda su fuerza
  alternatives_spanish:
  - con todo su peso
  - con todo su ímpetu
  lexicon: LSJ
  rationale: El giro aquí es idiomático y no meramente físico; ‘con toda su fuerza’ comunica bien la energía total del avance, como en el audit trail inglés.
- source_word: σὺν τοῖς θηρίοις
  english_pob_choice: along with the beasts
  chosen_spanish: junto con las bestias
  alternatives_spanish:
  - junto con los animales
  - con las fieras
  lexicon: LSJ
  rationale: θῆρια alude a los animales feroces preparados para ejecución; ‘bestias’ conserva la dureza del término mejor que ‘animales’.
- source_word: ἐξώρμησε
  english_pob_choice: rushed out
  chosen_spanish: salió precipitadamente
  alternatives_spanish:
  - irrumpió
  - se lanzó afuera
  lexicon: LSJ
  rationale: El verbo expresa movimiento súbito y violento; ‘salió precipitadamente’ suena natural en español y mantiene el sentido de urgencia.
- source_word: ἀτρώτῳ καρδίᾳ
  english_pob_choice: with an unfeeling heart
  chosen_spanish: con un corazón insensible
  alternatives_spanish:
  - con un corazón invulnerable
  - con un corazón no herido
  lexicon: LSJ
  rationale: ἀτρώτος es literalmente ‘no herido / no atravesado’; en español, ‘corazón insensible’ comunica la idea de un corazón no tocado por la compasión sin forzar una imagen extraña.
- source_word: καὶ κόραις ὀφθαλμῶν
  english_pob_choice: with the pupils of his eyes
  chosen_spanish: con las pupilas de sus ojos
  alternatives_spanish:
  - con sus propios ojos
  - con sus pupilas
  lexicon: LSJ
  rationale: La expresión es enfática y concreta; ‘pupilas de sus ojos’ conserva la literalidad y el carácter intensivo del hebraísmo/grecismo.
- source_word: θεάσασθαι
  english_pob_choice: to look upon
  chosen_spanish: contemplar
  alternatives_spanish:
  - ver
  - mirar
  lexicon: LSJ
  rationale: El infinitivo final pide un verbo de observación deliberada; ‘contemplar’ mantiene la intención de ver personalmente y con atención.
- source_word: τὴν ἐπίπονον καὶ ταλαίπωρον ... καταστροφήν
  english_pob_choice: the painful and miserable destruction
  chosen_spanish: la dolorosa y miserable destrucción
  alternatives_spanish:
  - la ruinosa y lamentable destrucción
  - la dolorosa y desdichada ruina
  lexicon: LSJ
  rationale: Los dos adjetivos intensifican la catástrofe; ‘dolorosa y miserable destrucción’ reproduce esa doble carga sin diluirla.
- source_word: τῶν προσεσημαμμένων
  english_pob_choice: of those who had been marked out
  chosen_spanish: de los que habían sido señalados
  alternatives_spanish:
  - de los que habían sido marcados
  - de los designados
  lexicon: LSJ
  rationale: El participio perfecto sugiere una designación previa para un destino determinado; ‘señalados’ mantiene la idea de selección/ marcación sin sobreespecificar el modo.
theological_decisions:
- issue: Fuerza religiosa de δυσσεβῆ
  english_pob_reading: Rendered as 'impious in mind' rather than a merely secular term like 'wicked.'
  chosen_spanish_reading: con mente impía
  alternative_spanish_readings:
  - con mente perversa
  - con mente malvada
  rationale: Se conserva la dimensión de irreverencia hacia Dios, no solo maldad ética general, siguiendo la orientación del texto griego y del audit trail inglés.
  doctrine_reference: Original-language primacy; preserve religious force where present in source
- issue: Literalidad de ἀτρώτῳ καρδίᾳ
  english_pob_reading: with an unfeeling heart
  chosen_spanish_reading: con un corazón insensible
  alternative_spanish_readings:
  - con un corazón impenetrable
  - con un corazón no herido
  rationale: Se evita una paráfrasis excesiva y se mantiene la imagen de un corazón no tocado por piedad, como indica el griego y el comentario del inglés.
  doctrine_reference: Original-language primacy; preserve metaphor when intelligible
translation_notes:
  revision_awareness: 'Se incorporó la revisión del audit trail inglés que prefirió una redacción más natural para ἀτρώτῳ καρδίᾳ y mantuvo el énfasis intensivo de κόραις ὀφθαλμῶν. La versión española sigue esa línea: conserva la fuerza de ‘corazón insensible’ y ancla la expresión literal de ‘las pupilas de sus ojos’ con nota textual.'
  spanish_consistency_notes:
  - Se usa ‘Yahvé’ como convención general del proyecto, pero este versículo no contiene el tetragrámaton ni una cita explícita del nombre divino.
  - ‘bestias’ se conserva para θηρία por su carga más temible en contexto narrativo-jurídico.
  - ‘señalados’ evita introducir una interpretación más fuerte como ‘condenados’ o ‘designados para morir’, aunque el contexto apunta a una selección hostil.
