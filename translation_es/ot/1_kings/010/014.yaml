translation:
  language: es
  text: Ahora bien, el peso del oro que llegó a Salomón en un año fue de seiscientos sesenta y seis talentos de oro.[a]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Un talento era una unidad antigua de peso; el versículo presenta la cantidad anual según la medida antigua, sin convertirla a unidades modernas.
    reason: cultural_note
lexical_decisions:
- source_word: וַיְהִי
  english_pob_choice: Now ... was
  chosen_spanish: Ahora bien, ... fue
  alternatives_spanish:
  - Y fue
  - Y aconteció que ... fue
  lexicon: HALOT
  rationale: La forma narrativa con waw consecutiva introduce una nueva afirmación. «Ahora bien» conserva el giro discursivo sin sonar arcaico, y «fue» mantiene la estructura declarativa del hebreo/inglés auditable.
- source_word: מִשְׁקַל
  english_pob_choice: weight
  chosen_spanish: peso
  alternatives_spanish:
  - peso total
  - medida por peso
  lexicon: HALOT
  rationale: En este contexto contable, «peso» es el equivalente natural de מִשְׁקַל y preserva la idea de cantidad medida por peso, sin convertirla a unidades modernas.
- source_word: הַזָּהָב ... זָהָב
  english_pob_choice: the gold ... of gold
  chosen_spanish: del oro ... de oro
  alternatives_spanish:
  - el oro ... de oro
  - oro ... de oro
  lexicon: HALOT
  rationale: La primera mención identifica el material como sustantivo definido; la segunda conserva la especificación del peso en «talentos de oro», siguiendo la construcción hebrea sin borrar la repetición significativa.
- source_word: אֲשֶׁר בָּא לִשְׁלֹמֹה
  english_pob_choice: that came to Solomon
  chosen_spanish: que llegó a Salomón
  alternatives_spanish:
  - que vino a Salomón
  - que fue traído a Salomón
  - que le llegó a Salomón
  lexicon: HALOT
  rationale: בוא con ל indica algo que alcanzó o llegó a Salomón. «Llegó a Salomón» mantiene la neutralidad sobre la agencia y evita sobreespecificar si fue traído o simplemente recibido.
- source_word: בְּשָׁנָה אֶחָת
  english_pob_choice: in one year
  chosen_spanish: en un año
  alternatives_spanish:
  - durante un año
  - en un solo año
  lexicon: HALOT
  rationale: La expresión señala el período dentro del cual se recibió esa cantidad. «En un año» es claro, natural y fiel al marco temporal del hebreo.
- source_word: שֵׁשׁ מֵאֹת שִׁשִּׁים וָשֵׁשׁ
  english_pob_choice: six hundred sixty-six
  chosen_spanish: seiscientos sesenta y seis
  alternatives_spanish:
  - seiscientos y sesenta y seis
  lexicon: HALOT
  rationale: Es la lectura cardinal directa del hebreo. En español moderno, la forma sin «y» en la centena es estándar y transparente.
- source_word: כִּכַּר
  english_pob_choice: talents
  chosen_spanish: talentos
  alternatives_spanish:
  - talento
  - unidades de talento
  lexicon: HALOT
  rationale: כִּכָּר es la unidad antigua de peso normalmente traducida «talento». Se conserva el término tradicional de medida, ya que el POB inglés también mantuvo la unidad histórica en lugar de modernizarla.
theological_decisions:
- issue: Conservación de la unidad de medida antigua
  english_pob_reading: The verse reports the annual amount by ancient measure rather than converting it into modern units.
  chosen_spanish_reading: La cifra se conserva como medida antigua («talentos») y no se convierte a una equivalencia moderna.
  alternative_spanish_readings:
  - Convertir la cifra a kilogramos o toneladas
  - Añadir una equivalencia moderna en el texto principal
  rationale: No hay base en el hebreo para imponer una conversión moderna. Mantener la unidad antigua respeta el registro histórico y evita falsear la precisión textual con una cifra aproximada.
  doctrine_reference: Principio de fidelidad histórica y textual; transparencia en medidas antiguas
translation_notes:
  revision_awareness: Se siguió el sentido estable del texto hebreo y la decisión auditada del POB inglés de conservar la unidad antigua en lugar de modernizarla. No hubo revisiones textuales sustanciales en el pasaje aportado; la redacción española refleja esa misma estabilidad.
  spanish_consistency_notes:
  - Se usó «Yahvé» según la norma del proyecto solo cuando el texto lo exige; aquí no aparece el nombre divino.
  - Se prefirió «talentos» como término de medida histórico, coherente con el audit trail en inglés.
  - La puntuación y el orden verbal se ajustaron al español natural sin añadir contenido interpretativo.
