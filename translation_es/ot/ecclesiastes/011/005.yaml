translation:
  language: es
  text: Así como no sabes cuál es el camino del viento[a], ni cómo se forman los huesos en el vientre de la mujer encinta[b], así no sabes la obra de Dios, que hace todas las cosas.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘el camino del espíritu’ o ‘cómo va el aliento’; el hebreo רוּחַ puede significar ‘viento’, ‘aliento’ o ‘espíritu’.
    reason: alternative_reading
  - marker: b
    text: Literalmente ‘en el vientre de la llena’, un modismo para una mujer embarazada.
    reason: cultural_note
lexical_decisions:
- source_word: דֶּרֶךְ הָרוּחַ
  english_pob_choice: the way of the wind
  chosen_spanish: el camino del viento
  alternatives_spanish:
  - el camino del espíritu
  - cómo va el aliento
  lexicon: HALOT
  rationale: La expresión conserva el valor de דֶּרֶךְ como ‘camino’ y sigue la decisión inglesa de tomar רוּחַ como ‘wind’ en este contexto sapiencial de procesos naturales ocultos. ‘El camino del viento’ suena natural en español y mantiene la ambigüedad deliberada sin resolverla por completo.
- source_word: כַּעֲצָמִים
  english_pob_choice: how the bones form
  chosen_spanish: cómo se forman los huesos
  alternatives_spanish:
  - como los huesos
  - cómo están los huesos
  lexicon: HALOT
  rationale: El hebreo es elíptico; en español conviene explicitar el proceso implícito. ‘Cómo se forman los huesos’ preserva la idea de desarrollo oculto en el vientre sin añadir más de lo que permite el texto.
- source_word: בְּבֶטֶן הַמְּלֵאָה
  english_pob_choice: in the womb of a pregnant woman
  chosen_spanish: en el vientre de la mujer encinta
  alternatives_spanish:
  - en el vientre de una mujer llena
  - en el vientre de la mujer embarazada
  lexicon: HALOT
  rationale: El hebreo literalmente dice ‘en el vientre de la llena’, un modismo para una mujer embarazada. ‘Mujer encinta’ es claro, digno y bíblicamente reconocible en español; ‘embarazada’ sería igualmente posible, pero ‘encinta’ conserva mejor el registro solemne sin perder claridad.
- source_word: מַעֲשֵׂה הָאֱלֹהִים
  english_pob_choice: the work of God
  chosen_spanish: la obra de Dios
  alternatives_spanish:
  - el trabajo de Dios
  - la actividad de Dios
  lexicon: HALOT
  rationale: ‘Obra de Dios’ es la correspondencia más natural y mantiene el vínculo temático con la acción creadora y providencial de Dios en el libro. ‘Trabajo’ sonaría menos adecuado en español bíblico, y ‘actividad’ sería más abstracto de lo necesario.
- source_word: אֲשֶׁר יַעֲשֶׂה אֶת הַכֹּל
  english_pob_choice: who makes everything
  chosen_spanish: el que hace todo
  alternatives_spanish:
  - que hace todo
  - el que hace todas las cosas
  lexicon: HALOT
  rationale: La relativa describe a Dios como quien hace todo. ‘El que hace todo’ reproduce bien la fuerza global de אֶת־הַכֹּל con un español fluido y sobrio.
theological_decisions:
- issue: Sentido de רוּחַ en la comparación inicial
  english_pob_reading: wind, with footnoted alternatives spirit/breath
  chosen_spanish_reading: viento, con alternativas en nota para espíritu/aliento
  alternative_spanish_readings:
  - espíritu
  - aliento
  rationale: El contexto enfatiza la ignorancia humana ante procesos naturales ocultos, por lo que ‘viento’ es la lectura principal más ajustada. Sin embargo, el hebreo permite ‘espíritu’ o ‘aliento’; se preserva esa tensión en la nota para no cerrar indebidamente el alcance semántico.
  doctrine_reference: Translation philosophy §3 (Preserve theological tension rather than resolve it)
- issue: Imagen del vientre lleno
  english_pob_reading: idiom for a pregnant woman
  chosen_spanish_reading: mujer encinta como modismo idiomático
  alternative_spanish_readings:
  - mujer embarazada
  - vientre lleno
  rationale: La imagen hebrea es idiomática y no debe traducirse de modo opaco. ‘Mujer encinta’ comunica el sentido y mantiene un tono reverente; la nota aclara el trasfondo sin perder la literalidad subyacente.
  doctrine_reference: Translation philosophy §2 (clarity without flattening source imagery)
translation_notes:
  revision_awareness: 'La revisión más reciente no requirió cambios; esta redacción mantiene la alta concordancia con el control inglés y conserva las dos ambigüedades principales del hebreo: רוּחַ y el modismo de ‘la llena’.'
  spanish_consistency_notes:
  - Se mantiene ‘Dios’ para אֱלֹהִים de forma consistente con el estándar del proyecto.
  - Se usa ‘viento’ en el texto principal, pero la nota preserva ‘espíritu’ y ‘aliento’ para no perder la tensión léxica del hebreo.
  - ‘Mujer encinta’ equilibra claridad y registro bíblico; evita la literalidad opaca de ‘la llena’.
  - ‘Obra de Dios’ y ‘el que hace todo’ conservan el paralelismo con la lectura inglesa auditada sin introducir terminología eclesiástica no motivada por el hebreo.
