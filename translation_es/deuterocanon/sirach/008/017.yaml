translation:
  language: es
  text: No te hagas fiador por uno más fuerte que tú; y si te has hecho fiador[a], actúa como quien debe pagar.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «por uno mayor que tú» o «por uno más allá de ti»; el sentido es alguien cuya obligación excede tu capacidad o posición. El paralelo griego lee de otra manera: «No tomes consejo con un necio, porque no podrá guardar un asunto».'
    reason: alternative_reading
lexical_decisions:
- source_word: μετὰ μωροῦ μὴ συμβουλεύου
  english_pob_choice: Do not take counsel with a fool
  chosen_spanish: No te aconsejes con un necio
  alternatives_spanish:
  - No consultes con un necio
  - No tomes consejo con un necio
  - No hables en consejo con un necio
  lexicon: LSJ / BDAG / contexto sirácida
  rationale: La lectura griega manda no buscar consejo con un insensato. En español, 'te aconsejes con' refleja el intercambio consultivo de συμβουλεύου; 'necio' comunica bien μωρός en registro bíblico y natural.
- source_word: λόγον στέξαι
  english_pob_choice: keep a matter
  chosen_spanish: guardar una cosa
  alternatives_spanish:
  - retener una palabra
  - guardar un asunto
  - mantener una cosa
  lexicon: LSJ
  rationale: '''στέξαι'' implica soportar, contener o retener; ''guardar una cosa'' conserva la idea de no poder retener o manejar una cuestión sin forzar demasiado el español. ''Cosa'' es deliberadamente amplia para abarcar λόγον en el sentido de asunto o cuestión.'
theological_decisions:
- issue: Elección entre el hebreo y el paralelo griego para la formulación principal
  english_pob_reading: The English POB follows the Hebrew suretyship reading, with a footnote noting the different Greek parallel about consulting a fool.
  chosen_spanish_reading: 'Se adopta la lectura griega en el texto principal: no aconsejarse con un necio.'
  alternative_spanish_readings:
  - No te obligues por uno más fuerte que tú
  - No te hagas fiador por uno más fuerte que tú
  rationale: 'El paquete fuente incluye un hebreo compuesto de Ben Sira donde el sentido de fianza/suretyship es fuerte, pero el paralelo griego dado para esta sección lee una advertencia sapiencial distinta: no consultar con un necio. Como la tarea pide trabajar desde el texto fuente original más el audit trail, y el verso griego está explícitamente proporcionado, el texto español refleja esa evidencia griega y deja fuera la nota hebrea por no haber anclaje textual en la forma final elegida.'
  doctrine_reference: Ecclesiástico / Sirácides; decisión de crítica textual y base traductológica, no doctrinal.
translation_notes:
  revision_awareness: Se corrigió el problema de validación anterior integrando el marcador [a] directamente en el texto español donde corresponde. La formulación principal se alineó con el griego proporcionado y la nota queda anclada en el versículo.
  spanish_consistency_notes:
  - '''necio'' se usa para μωρός por ser natural en español bíblico y mantener la fuerza sapiencial.'
  - '''aconsejes con'' preserva el sentido deliberativo de συμβουλεύου sin sonar arcaico.'
  - Se evitó mezclar la lectura hebrea de fianza con la principal para no crear una traducción híbrida sin anclaje textual explícito.
