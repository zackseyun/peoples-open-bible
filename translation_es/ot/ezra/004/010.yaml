revisions:
- from: 'y el resto de los pueblos que el grande y noble Osnappar deportó y estableció en la ciudad de Samaria, y el resto de Más Allá del Río[a][b], y ahora[c]:'
  to: 'y el resto de los pueblos que el gran y noble Osnappar deportó y estableció en la ciudad de Samaria[a], y al resto que estaba en Más Allá del Río[b], y ahora[c]:'
  rationale: Se ajustó la frase para reflejar con más fidelidad y naturalidad el valor locativo del arameo en ‘el resto ... en Beyond the River’, evitando una construcción española demasiado elíptica. También se mejoró el honorífico a ‘gran y noble’. Además, se reubicó la nota de Osnappar al nombre correspondiente, ya que en el borrador estaba anclada a ‘Samaria’ pese a tratar sobre Osnappar.
