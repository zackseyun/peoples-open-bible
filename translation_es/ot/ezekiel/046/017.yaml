translation:
  language: es
  text: Pero si da un don de su heredad a uno de sus siervos[a], será suyo hasta el año de la libertad; entonces volverá al príncipe. Solo su heredad para sus hijos será de ellos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «el año de liberación»; probablemente alude a un año de restauración de tipo jubilar, aunque el hebreo aquí dice literalmente «libertad» y no usa el término habitual para «jubileo».
    reason: lexical_alternative
lexical_decisions:
- source_word: וְכִי
  english_pob_choice: But if
  chosen_spanish: Pero si
  alternatives_spanish:
  - Y si
  - Ahora bien, si
  lexicon: HALOT
  rationale: La partícula introduce un caso condicional con matiz de contraste respecto de la regulación anterior. «Pero si» conserva el valor adversativo-condicional de forma natural en español.
- source_word: יִתֵּן
  english_pob_choice: he gives
  chosen_spanish: da
  alternatives_spanish:
  - diera
  - dé
  lexicon: HALOT
  rationale: En estilo legal, el imperfecto hebreo puede expresarse con presente simple. «Da» suena directo y normativo en español contemporáneo.
- source_word: מַתָּנָה
  english_pob_choice: a gift
  chosen_spanish: un regalo
  alternatives_spanish:
  - un don
  - una dádiva
  lexicon: HALOT
  rationale: El sustantivo denota algo entregado gratuitamente. «Regalo» comunica bien la idea básica en español, aunque en lenguaje legal también podría decirse «don» o «dádiva».
- source_word: מִנַּחֲלָתוֹ
  english_pob_choice: from his inheritance
  chosen_spanish: de su heredad
  alternatives_spanish:
  - de su herencia
  - de su posesión hereditaria
  lexicon: HALOT
  rationale: Aquí נַחֲלָה se refiere a una posesión hereditaria, especialmente territorial. «Heredad» preserva mejor ese matiz legal y patrimonial que «herencia» en español.
- source_word: לְאַחַד מֵעֲבָדָיו
  english_pob_choice: to one of his servants
  chosen_spanish: a uno de sus esclavos
  alternatives_spanish:
  - a uno de sus siervos
  - a uno de sus servidores
  lexicon: HALOT
  rationale: עבד puede significar «siervo», «sirviente» o «esclavo». Dado el contraste con los hijos y el marco de propiedad/cesión, «esclavos» retiene mejor la fuerza social del término; se conserva así la tensión léxica documentada en la POB inglesa.
- source_word: וְהָיְתָה לּוֹ
  english_pob_choice: it shall be his
  chosen_spanish: será suyo
  alternatives_spanish:
  - le pertenecerá
  - será de él
  lexicon: HALOT
  rationale: La forma hebrea expresa posesión temporal de la porción entregada. «Será suyo» reproduce de modo claro y breve la idea de pertenencia.
- source_word: עַד שְׁנַת הַדְּרוֹר
  english_pob_choice: until the year of liberty
  chosen_spanish: hasta el año de la libertad
  alternatives_spanish:
  - hasta el año de liberación
  - hasta el año de jubileo
  lexicon: HALOT
  rationale: דְּרוֹר significa «libertad» o «liberación». La POB inglesa optó por «liberty» para respetar el término hebreo, y en español «libertad» mantiene esa misma primacía léxica; «jubileo» queda como alternativa interpretativa.
- source_word: וְשָׁבַת לַנָּשִׂיא
  english_pob_choice: then it shall return to the prince
  chosen_spanish: entonces volverá al príncipe
  alternatives_spanish:
  - y volverá al príncipe
  - revertirá al príncipe
  lexicon: HALOT
  rationale: שָׁבַת expresa retorno. «Volverá» es natural en español y conserva el sentido de re-versión de la posesión al príncipe, término técnico mantenido como en la POB inglesa.
- source_word: אַךְ
  english_pob_choice: Only
  chosen_spanish: Solo
  alternatives_spanish:
  - Pero
  - Sin embargo
  lexicon: HALOT
  rationale: 'La partícula introduce una restricción: lo anterior no contradice la permanencia de la heredad en la línea filial. «Solo» comunica esa limitación con precisión.'
- source_word: נַחֲלָתוֹ בָּנָיו לָהֶם תִּהְיֶה
  english_pob_choice: Only his inheritance to his sons shall be theirs
  chosen_spanish: su heredad para sus hijos será de ellos
  alternatives_spanish:
  - su heredad será para sus hijos; será de ellos
  - solo su heredad, para sus hijos, les pertenecerá
  lexicon: HALOT
  rationale: La clausula subraya que la heredad del príncipe permanece en la descendencia. La estructura elegida mantiene la relación «heredad → hijos → pertenencia» sin añadir interpretaciones ajenas al hebreo.
theological_decisions:
- issue: עבד en contexto jurídico de heredad
  english_pob_reading: servants
  chosen_spanish_reading: esclavos
  alternative_spanish_readings:
  - siervos
  - sirvientes
  rationale: Aunque el término puede flexibilizarse según contexto, aquí el contraste entre una porción hereditaria y la línea de los hijos favorece un vínculo de dependencia más fuerte. «Esclavos» conserva la dureza social del hebreo sin suavizarla indebidamente.
  doctrine_reference: Translation philosophy §1; términos contextuales para δοῦλος por analogía
- issue: דְּרוֹר como año de libertad
  english_pob_reading: liberty
  chosen_spanish_reading: libertad
  alternative_spanish_readings:
  - liberación
  - jubileo
  rationale: La POB inglesa preserva el lexema hebreo evitando sustituirlo por el término técnico «Jubileo». En español, «libertad» sigue esa misma estrategia y deja abierta la referencia a un año de restauración tipo jubilar sin borrarla.
  doctrine_reference: Translation philosophy §1 y §3
- issue: Permanencia de la heredad en la línea filial del príncipe
  english_pob_reading: Only his inheritance to his sons shall be theirs
  chosen_spanish_reading: Solo su heredad para sus hijos será de ellos
  alternative_spanish_readings:
  - Solo su heredad será de sus hijos
  - La heredad de sus hijos les pertenecerá
  rationale: La formulación hebrea distingue entre el regalo temporal al esclavo y la heredad estable para los hijos. La traducción debe conservar esa tensión legal y de sucesión, no suavizarla en una generalidad.
  doctrine_reference: Ezequiel 46:17; principio de herencia familiar en la visión del príncipe
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión más reciente de la POB inglesa, que prefirió una formulación más literal en la cláusula final («Only his inheritance to his sons shall be theirs») y mantuvo «liberty» para דְּרוֹר. La versión española sigue esa misma revisión, conservando el contraste entre la posesión temporal dada al esclavo y la heredad permanente de los hijos.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma general de la serie, aunque este versículo no lo contiene.
  - Se conserva «príncipe» para נָשִׂיא, siguiendo el uso técnico del contexto de Ezequiel.
  - Se prefiere «heredad» para נַחֲלָה cuando el sentido es patrimonial/hereditario.
  - Se conserva la tensión léxica de עבד con «esclavos», sin neutralizarla a «siervos».
  - La nota a pie marca solo la alternativa semántica de דְּרוֹר y no altera el texto principal.
