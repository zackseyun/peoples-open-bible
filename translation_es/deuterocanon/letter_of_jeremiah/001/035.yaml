translation:
  language: es
  text: Ciertamente no rescatarán a un hombre de la muerte[a], ni librarán al más débil del fuerte.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «ni librarán al más débil del poderoso». El griego usa un adjetivo comparativo («el más débil») en contraste con «el fuerte».'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐκ θανάτου
  english_pob_choice: from death
  chosen_spanish: de la muerte
  alternatives_spanish:
  - de entre la muerte
  - fuera de la muerte
  lexicon: BDAG
  rationale: La preposición ἐκ con θανάτου expresa salida o rescate desde la esfera de la muerte. En español, «de la muerte» conserva la idea de rescate sin añadir matices innecesarios.
- source_word: ἄνθρωπον
  english_pob_choice: a man
  chosen_spanish: a un hombre
  alternatives_spanish:
  - a una persona
  - a un ser humano
  lexicon: BDAG
  rationale: El singular ἄνθρωπον es genérico, pero el texto griego usa forma masculina. «A un hombre» preserva esa forma y sigue la decisión auditable de género del inglés POB.
- source_word: οὐ μὴ ῥύσωνται
  english_pob_choice: they will certainly not rescue
  chosen_spanish: ciertamente no rescatarán
  alternatives_spanish:
  - no rescatarán en absoluto
  - seguramente no librarán
  lexicon: BDAG
  rationale: οὐ μή con futuro expresa negación enfática. «Ciertamente no» reproduce bien esa fuerza en español, y «rescatarán» comunica el sentido de ῥύομαι como rescate de peligro.
- source_word: ἥττονα
  english_pob_choice: the weaker
  chosen_spanish: al más débil
  alternatives_spanish:
  - al débil
  - al inferior
  lexicon: LSJ
  rationale: 'ἥττων es comparativo: «el más débil» mantiene la comparación del griego y evita neutralizarla. En español, la forma natural en este contraste es «al más débil».'
- source_word: ἀπὸ ἰσχυροῦ
  english_pob_choice: from the strong
  chosen_spanish: del más fuerte
  alternatives_spanish:
  - del fuerte
  - del poderoso
  lexicon: BDAG
  rationale: El contraste griego es con ἥττονα. Por eso, «del más fuerte» hace explícita la comparación implícita y conserva el paralelismo de fuerza entre las dos mitades del versículo.
- source_word: μὴ ἐξέλωνται
  english_pob_choice: nor will they deliver
  chosen_spanish: ni librarán
  alternatives_spanish:
  - ni rescatarán
  - ni sacarán
  lexicon: LSJ
  rationale: ἐξαιρέω en este contexto tiene sentido de librar o sacar de peligro. «Librarán» es idiomático en español y mantiene el paralelismo con «rescatarán» sin perder la idea de liberación.
translation_notes:
  revision_awareness: El texto griego y el paquete de auditoría inglesa concuerdan de forma alta; no se registraron revisiones aplicadas. La redacción española sigue de cerca esa lectura estable, conservando la negación enfática, el paralelismo comparativo y el contraste entre debilidad y fuerza.
  spanish_consistency_notes:
  - Se mantuvo una sintaxis breve y paralela para reflejar la estructura del original.
  - Se conservó el contraste comparativo explícito en ambas mitades del verso.
  - Se evitó introducir lenguaje teológico no presente en el texto fuente.
