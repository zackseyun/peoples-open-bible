translation:
  language: es
  text: Después, los hijos de Judá descendieron para pelear contra los cananeos que habitaban en la región montañosa, el Néguev y la región baja.[a]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «la Sefela», la región de piedemonte de Judá entre la región montañosa y la llanura costera.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְ/אַחַר
  english_pob_choice: Afterward
  chosen_spanish: Después
  alternatives_spanish:
  - Después de esto
  - Luego
  lexicon: HALOT
  rationale: La partícula temporal marca sucesión narrativa. «Después» conserva con naturalidad ese avance temporal sin añadir precisión no presente en el hebreo.
- source_word: יָרְדוּ
  english_pob_choice: went down
  chosen_spanish: descendieron
  alternatives_spanish:
  - bajaron
  - fueron hacia abajo
  lexicon: HALOT
  rationale: El verbo ירד mantiene aquí el matiz topográfico de movimiento hacia abajo. «Descendieron» conserva ese valor concreto mejor que un simple «fueron».
- source_word: בְּנֵי יְהוּדָה
  english_pob_choice: the sons of Judah
  chosen_spanish: los hijos de Judá
  alternatives_spanish:
  - los hombres de Judá
  - el pueblo de Judá
  lexicon: HALOT
  rationale: «Hijos de Judá» reproduce de forma directa la filiación tribal del hebreo. Aunque funciona corporativamente como tribu, no conviene neutralizarlo sin necesidad.
- source_word: לְ/הִלָּחֵם
  english_pob_choice: to fight
  chosen_spanish: para pelear
  alternatives_spanish:
  - para combatir
  - para guerrear
  lexicon: HALOT
  rationale: La idea es de enfrentamiento bélico. «Pelear» es claro, natural y suficientemente fuerte en español sin introducir un matiz más militar del que exige el texto.
- source_word: בַּֽ/כְּנַעֲנִ֑י
  english_pob_choice: against the Canaanites
  chosen_spanish: contra los cananeos
  alternatives_spanish:
  - contra el cananeo
  - contra el pueblo cananeo
  lexicon: HALOT
  rationale: Aunque el hebreo está en singular colectivo, en español el plural comunica mejor el grupo étnico. «Contra» expresa correctamente la relación hostil del contexto.
- source_word: יוֹשֵׁב
  english_pob_choice: living
  chosen_spanish: que habitaban
  alternatives_spanish:
  - que vivían
  - que moraban
  lexicon: HALOT
  rationale: El participio expresa ocupación continua del territorio. «Habitaban» conserva el valor durativo y encaja mejor en la descripción geográfica que un mero «vivían».
- source_word: הָ/הָר
  english_pob_choice: the hill country
  chosen_spanish: la región montañosa
  alternatives_spanish:
  - la zona montañosa
  - la serranía
  lexicon: HALOT
  rationale: Aquí הָהָר designa una región upland, no solo una montaña individual. «Región montañosa» comunica ese sentido geográfico en español con claridad.
- source_word: הַ/נֶּגֶב
  english_pob_choice: the Negev
  chosen_spanish: el Néguev
  alternatives_spanish:
  - el Neguev
  - el sur
  lexicon: HALOT
  rationale: Se conserva el nombre geográfico como en la decisión inglesa. En español, «Néguev» es la forma usual del topónimo y preserva la referencia regional.
- source_word: הַ/שְּׁפֵלָה
  english_pob_choice: the lowland
  chosen_spanish: la llanura
  alternatives_spanish:
  - la Sefela
  - la tierra baja
  lexicon: HALOT
  rationale: «Llanura» traduce con claridad la zona baja frente a la región montañosa. Aunque «Sefela» es el tecnicismo toponímico, aquí el texto inglés optó por una equivalencia accesible.
translation_notes:
  revision_awareness: El pasaje coincide con el texto fuente y con la evaluación de alta concordancia del expediente inglés; no se requieren revisiones adicionales.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» como norma del proyecto cuando corresponda, pero este versículo no contiene el nombre divino.
  - Se prefirió un español bíblico moderno y legible, evitando calcos innecesarios pero conservando la secuencia narrativa y el valor geográfico del hebreo.
  - Se respetó la pluralidad colectiva de «hijos de Judá» y de «cananeos» para una lectura natural en español.
