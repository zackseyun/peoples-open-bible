base_translation:
  language: en
  yaml_path: translation/ot/2_chronicles/014/012.yaml
  text: Asa and the people who were with him pursued them as far as Gerar[a], and the Cushites fell until none remained alive, for they were shattered before Yahweh and before his camp[b]. Then they carried off a very great amount of plunder.
  footnotes:
  - marker: a
    text: Or, 'Ethiopians.' The Hebrew says 'Cushites,' referring to people of Cush.
    reason: lexical_alternative
  - marker: b
    text: Or, 'before his camp.' The Hebrew word can mean 'camp' or 'army'; the suffix may be understood as referring to Asa's force, though some take it as the LORD's host.
    reason: alternative_reading
