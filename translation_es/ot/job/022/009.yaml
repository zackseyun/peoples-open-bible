translation:
  language: es
  text: A las viudas las despediste con las manos vacías[a][c], y los brazos[b] de los huérfanos fueron aplastados.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «vacías».'
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «los brazos de los huérfanos»; «brazos» también puede implicar su fuerza o poder.'
    reason: lexical_alternative
  - marker: c
    text: 'O: «sin nada».'
    reason: lexical_alternative
lexical_decisions:
- source_word: אַ֭לְמָנוֹת
  english_pob_choice: widows
  chosen_spanish: viudas
  alternatives_spanish:
  - viudas desamparadas
  - mujeres viudas
  lexicon: HALOT
  rationale: ‘Viudas’ reproduce el sentido básico del hebreo y conserva la vulnerabilidad social y legal del término en el contexto de denuncia.
- source_word: שִׁלַּ֣חְתָּ
  english_pob_choice: sent away
  chosen_spanish: despediste
  alternatives_spanish:
  - enviaste lejos
  - las mandaste fuera
  lexicon: HALOT
  rationale: En este contexto acusatorio, ‘despediste’ comunica bien la acción de apartar o enviar fuera, con naturalidad en español.
- source_word: רֵיקָ֑ם
  english_pob_choice: empty
  chosen_spanish: vacías
  alternatives_spanish:
  - con las manos vacías
  - sin nada
  lexicon: HALOT
  rationale: La idea de ‘empty’ se expresa en español como ‘vacías’; la nota mantiene la alternativa más explícita ‘con las manos vacías’.
- source_word: וּ/זְרֹע֖וֹת
  english_pob_choice: arms
  chosen_spanish: los brazos
  alternatives_spanish:
  - las fuerzas
  - la fuerza
  lexicon: HALOT
  rationale: ‘Brazos’ conserva la imagen concreta del hebreo. En este verso puede sugerir también fuerza o capacidad; la nota recoge esa posibilidad sin perder la literalidad.
- source_word: יְתֹמִ֣ים
  english_pob_choice: orphans
  chosen_spanish: los huérfanos
  alternatives_spanish:
  - los padreless
  - los huérfanos sin padre
  lexicon: HALOT
  rationale: ‘Huérfanos’ es la equivalencia natural y clara en español para el grupo vulnerable señalado por el hebreo.
- source_word: יְדֻכָּֽא
  english_pob_choice: were crushed
  chosen_spanish: fueron quebrantados
  alternatives_spanish:
  - fueron aplastados
  - fueron destrozados
  lexicon: HALOT
  rationale: El pasivo de דכא implica ser aplastado o quebrantado; ‘quebrantados’ mantiene el peso poético y la violencia de la imagen en español.
translation_notes:
  revision_awareness: Se corrigió la validación anterior anclando cada nota al texto con su marcador correspondiente y evitando notas sin ancla. La redacción sigue el hebreo de forma directa, con equivalencia natural en español.
  spanish_consistency_notes:
  - Se mantiene el paralelismo hebreo entre ‘viudas’ y ‘huérfanos’.
  - ‘Vacías’ conserva la brevedad adverbial de רֵיקָם sin forzar una paráfrasis extensa.
  - ‘Brazos’ se deja literal para preservar la imagen corporal; la posible fuerza implícita queda documentada en nota.
  - No se añadió terminología eclesiástica tradicional que desplace el tono judicial del texto.
