translation:
  language: es
  text: Y cuando Baasa lo oyó, dejó de construir Ramá[a] y puso fin a su obra.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «dejó de edificar Ramá»; el hebreo se refiere a cesar la actividad de construcción o fortificación en Ramá.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַ/יְהִי֙ כִּ/שְׁמֹ֣עַ
  english_pob_choice: And when ... heard it
  chosen_spanish: Y cuando ... lo oyó
  alternatives_spanish:
  - Y aconteció que ... oyó
  - Ahora, cuando ... oyó
  lexicon: HALOT
  rationale: La construcción hebrea introduce una cláusula temporal; en español, «Y cuando» expresa bien la secuencia narrativa sin volverla rígida. «Lo oyó» mantiene el objeto implícito del contexto y evita añadir una paráfrasis innecesaria.
- source_word: בַּעְשָׁ֔א
  english_pob_choice: Baasha
  chosen_spanish: Baasá
  alternatives_spanish:
  - Baasa
  - Basa
  lexicon: Convención onomástica
  rationale: Se translitera el nombre propio con acento final según uso español para facilitar la pronunciación y lectura, manteniendo la identidad del personaje.
- source_word: וַ/יֶּחְדַּ֕ל
  english_pob_choice: he stopped
  chosen_spanish: dejó de
  alternatives_spanish:
  - cesó de
  - se detuvo
  lexicon: HALOT
  rationale: חדל expresa cesar o dejar de hacer algo. «Dejó de» es natural en español y conserva el sentido aspectual de interrupción de la acción.
- source_word: מִ/בְּנ֖וֹת
  english_pob_choice: building
  chosen_spanish: construir
  alternatives_spanish:
  - edificar
  - levantar
  lexicon: HALOT
  rationale: Con חדל + מן + infinitivo, el hebreo indica cesación de una actividad. En español, «dejó de construir» reproduce el valor verbal de la acción suspendida sin forzar una preposición literal.
- source_word: אֶת הָ/רָמָ֑ה
  english_pob_choice: Ramah
  chosen_spanish: a Ramá
  alternatives_spanish:
  - Ramá
  - la fortaleza de Ramá
  lexicon: HALOT
  rationale: Ramá es un topónimo; en este contexto la actividad de construir se refiere al lugar/fortificación. «Construir a Ramá» mantiene el nombre propio en una forma española clara, mientras la nota explica el matiz constructivo o fortificatorio.
- source_word: וַ/יַּשְׁבֵּ֖ת
  english_pob_choice: and ceased
  chosen_spanish: y detuvo
  alternatives_spanish:
  - y hizo cesar
  - y paró
  lexicon: HALOT
  rationale: El hiphil de שבת significa hacer cesar o poner fin a. «Detuvo» conserva la fuerza causativa sin sonar pesado en español.
- source_word: מְלַאכְתּֽ/וֹ
  english_pob_choice: his work
  chosen_spanish: su obra
  alternatives_spanish:
  - su trabajo
  - su labor
  lexicon: HALOT
  rationale: מלאכה puede referirse a trabajo, labor u obra. En este contexto de construcción, «su obra» comunica la actividad emprendida y funciona bien en español bíblico contemporáneo.
translation_notes:
  revision_awareness: El borrador anterior fue ajustado para eliminar la discrepancia de puntuación/anudamiento del objeto de «oyó» y para anclar la nota al marcador [a] en el texto español. Se mantiene la equivalencia funcional del inglés auditado, pero con una formulación más natural en español.
  spanish_consistency_notes:
  - Se usa «Baasá» para el nombre propio, con acento gráfico adaptado al español.
  - Se evita «SEÑOR» u otras sustituciones teológicas no pertinentes; el versículo no contiene el Tetragrámaton.
  - «Construir» y «obra» preservan el campo semántico de actividad constructiva/fortificatoria sin añadir interpretación extrabíblica.
  - La nota [a] está anclada explícitamente en el texto para cumplir la validación y conservar la alternativa lexical documentada.
