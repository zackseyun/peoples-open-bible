translation:
  language: es
  text: 'Así me dijo Yahvé: «Ve y ponte de pie en la puerta del pueblo[a], por la cual entran los reyes de Judá y por la cual salen, y en todas las puertas de Jerusalén»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «la puerta de los hijos del pueblo»; quizá un nombre específico de puerta, a menudo entendido como «la Puerta del Pueblo».'
    reason: lexical_alternative
lexical_decisions:
- source_word: כֹּה
  english_pob_choice: Thus
  chosen_spanish: Así
  alternatives_spanish:
  - De este modo
  - Esto es lo que
  lexicon: HALOT
  rationale: La fórmula profética introduce el dicho divino con naturalidad en español. «Así» conserva el tono solemne y breve sin cargar el texto con una paráfrasis más explicativa.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: Se sigue el criterio del proyecto para el nombre divino. «Yahvé» preserva el Tetragrámaton sin sustituirlo por un título enmascarado.
- source_word: אֵלַי
  english_pob_choice: to me
  chosen_spanish: a mí
  alternatives_spanish:
  - para mí
  - con respecto a mí
  lexicon: HALOT
  rationale: En este contexto de discurso directo, la preposición señala al destinatario de la palabra divina. «A mí» es la forma más natural y fiel en español.
- source_word: הָלֹךְ וְעָמַדְתָּ
  english_pob_choice: Go and stand
  chosen_spanish: Ve y ponte
  alternatives_spanish:
  - Ve y hazte de pie
  - Ve y toma tu lugar
  lexicon: HALOT
  rationale: La secuencia hebrea intensifica la orden. En español, «ve y ponte» transmite con naturalidad la acción de ir y colocarse en un sitio determinado, manteniendo el valor imperativo.
- source_word: בְּשַׁעַר
  english_pob_choice: in the gate
  chosen_spanish: en la puerta
  alternatives_spanish:
  - en la puerta de la ciudad
  - junto a la puerta
  lexicon: HALOT
  rationale: En español, «puerta» comunica mejor que «puerta de entrada» el espacio urbano de la puerta de la ciudad. El hebreo permite el sentido de recinto/portal, y «en la puerta» conserva esa imagen.
- source_word: בְּנֵי עָם
  english_pob_choice: the gate of the people
  chosen_spanish: del pueblo
  alternatives_spanish:
  - del pueblo común
  - de los hijos del pueblo
  lexicon: HALOT
  rationale: El inglés POB ya adoptó el sentido más natural «gate of the people» frente al literal más pesado. En español, «del pueblo» mantiene la decisión revisada y evita una calca innecesaria, sin borrar la posible tensión del hebreo literal.
- source_word: אֲשֶׁר יָבֹאוּ בוֹ ... וַאֲשֶׁר יֵצְאוּ בוֹ
  english_pob_choice: by which the kings of Judah enter and by which they go out
  chosen_spanish: por la cual entran los reyes de Judá y por la cual salen
  alternatives_spanish:
  - por la que entran los reyes de Judá y por la que salen
  - por donde entran los reyes de Judá y por donde salen
  lexicon: HALOT
  rationale: Se conserva la repetición de las relativas y el movimiento de ingreso y salida. «Por la cual» suena sobrio y corresponde al funcionamiento de la puerta como vía de paso.
- source_word: מַלְכֵי יְהוּדָה
  english_pob_choice: the kings of Judah
  chosen_spanish: los reyes de Judá
  alternatives_spanish:
  - los monarcas de Judá
  - los reyes judíos
  lexicon: HALOT
  rationale: Es la equivalencia formal estándar para el constructo, sin introducir matices ajenos al texto.
- source_word: וּבְכֹל שַׁעֲרֵי יְרוּשָׁלִָם
  english_pob_choice: and in all the gates of Jerusalem
  chosen_spanish: y en todas las puertas de Jerusalén
  alternatives_spanish:
  - y en todas las entradas de Jerusalén
  - y en cada una de las puertas de Jerusalén
  lexicon: HALOT
  rationale: Se mantiene la ampliación del encargo desde una puerta concreta hacia todas las puertas de la ciudad. «Puertas» conserva el trasfondo urbano y la imagen bíblica.
theological_decisions:
- issue: Nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: El texto hebreo usa explícitamente el nombre propio del pacto. La traducción española debe reflejar ese nombre y no ocultarlo tras un título genérico.
  doctrine_reference: 'DOCTRINE.md: יְהוָה / YHWH'
translation_notes:
  revision_awareness: 'El inglés POB pasó de «the gate of the sons of the people» a «the gate of the people» por considerarlo más natural sin perder el sentido probable del hebreo. La versión española sigue esa revisión y mantiene la misma cautela: no fuerza la literalidad de «hijos del pueblo», pero deja constancia en nota de la forma hebrea subyacente.'
  spanish_consistency_notes:
  - Se conserva «Yahvé» conforme al criterio del proyecto para יהוה.
  - Se usa «puerta» para שַׁעַר por ser la opción española más natural en el contexto urbano de Jerusalén.
  - Se mantiene la repetición de «por la cual» para reflejar la estructura paralela del hebreo.
  - La nota a pie de página marca la posible ambigüedad léxica de בְּנֵי עָם sin sobrecargar el cuerpo principal del texto.
