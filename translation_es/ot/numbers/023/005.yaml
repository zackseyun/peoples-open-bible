translation:
  language: es
  text: 'Entonces Yahvé puso una palabra en la boca de Balaam y dijo: «Vuelve a Balac, y así[a] hablarás».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «de este modo hablarás».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּשֶׂם
  english_pob_choice: put
  chosen_spanish: puso
  alternatives_spanish:
  - colocó
  - puso
  - depositó
  lexicon: HALOT
  rationale: El hebreo שׂוּם expresa la acción concreta de poner/colocar. «Puso» reproduce bien la imagen de algo dado o colocado en la boca sin volverla pesada en español.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: Se conserva el nombre propio divino del Tetragrámaton, conforme al criterio del proyecto. «Yahvé» mantiene la referencia personal del pacto en lugar de sustituirla por un título.
- source_word: דָּבָר
  english_pob_choice: a word
  chosen_spanish: una palabra
  alternatives_spanish:
  - un mensaje
  - unas palabras
  lexicon: HALOT
  rationale: El singular hebreo se preserva con «una palabra». Aunque «mensaje» sería posible, añade interpretación; «palabra» refleja mejor el término y la economía del verso.
- source_word: בְּפִי
  english_pob_choice: in Balaam’s mouth
  chosen_spanish: en la boca de Balaam
  alternatives_spanish:
  - en la boca de Balaam
  - en labios de Balaam
  - sobre la boca de Balaam
  lexicon: HALOT
  rationale: La imagen hebrea es literalmente «en la boca de Balaam». En español, «en la boca de» conserva el idiomática corporal y el sentido de habla inspirada o puesta por Dios.
- source_word: וַיֹּאמֶר
  english_pob_choice: and said
  chosen_spanish: y dijo
  alternatives_spanish:
  - y le dijo
  - y habló
  lexicon: HALOT
  rationale: La forma narrativa se rinde naturalmente como «y dijo». No se añade pronombre explícito porque el sujeto ya queda claro por el contexto inmediato.
- source_word: שׁוּב
  english_pob_choice: Return
  chosen_spanish: Vuelve
  alternatives_spanish:
  - Regresa
  - Vuelve atrás
  lexicon: HALOT
  rationale: El imperativo שׁוּב tiene el valor de volver/regresar. «Vuelve» suena natural y directo en español, manteniendo la orden divina.
- source_word: אֶל
  english_pob_choice: to
  chosen_spanish: a
  alternatives_spanish:
  - a
  - hacia
  lexicon: HALOT
  rationale: La preposición direccional se expresa de forma simple con «a» en español, que comunica bien el movimiento hacia Balac.
- source_word: וְכֹה
  english_pob_choice: thus
  chosen_spanish: así
  alternatives_spanish:
  - de esta manera
  - de este modo
  - así
  lexicon: HALOT
  rationale: «Así» reproduce la función adverbial de כֹה sin la rigidez de un calco. En español introduce de manera natural la forma de la declaración que Balaam debe repetir.
- source_word: תְדַבֵּר
  english_pob_choice: you shall speak
  chosen_spanish: hablarás
  alternatives_spanish:
  - dirás
  - hablarás
  lexicon: HALOT
  rationale: El piel de דבר se traduce con el verbo de hablar. «Hablarás» mantiene el futuro exhortativo/mandato del hebreo y evita perder la conexión con el acto de hablar mismo.
theological_decisions:
- issue: Nombre divino del Tetragrámaton
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: El texto hebreo usa יְהוָה directamente; por fidelidad al nombre revelado se conserva en español «Yahvé», no una sustitución titulada.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: La ‘palabra’ puesta por Yahvé en la boca de Balaam
  english_pob_reading: a word in Balaam’s mouth
  chosen_spanish_reading: una palabra en la boca de Balaam
  alternative_spanish_readings:
  - un mensaje en la boca de Balaam
  - palabras en la boca de Balaam
  rationale: Se mantiene el singular del hebreo y la imagen concreta de una palabra colocada por Dios en la boca del profeta. No se amplía a plural ni se sustituye por ‘mensaje’ para no debilitar la forma del dicho.
  doctrine_reference: Principio POB de conservar la imaginería y el número gramatical cuando son significativos
translation_notes:
  revision_awareness: La versión inglesa revisó ‘this is what you shall speak’ a ‘thus you shall speak’ para reflejar mejor וְכֹה תְדַבֵּר. La redacción española sigue esa misma decisión con «así hablarás», manteniendo el tono formal y la relación directa con el hebreo.
  spanish_consistency_notes:
  - Se usa «Yahvé» de manera consistente para יְהוָה, conforme al estándar del proyecto.
  - Se conserva el singular «una palabra» para דָּבָר.
  - Se mantiene la imagen corporal «en la boca» como traducción del hebreo idiomático.
  - «Así» refleja la función adverbial de וְכֹה sin añadir interpretación.
