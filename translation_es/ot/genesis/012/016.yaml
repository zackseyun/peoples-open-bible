translation:
  language: es
  text: Y trató bien a Abram por causa de ella[a], y llegó a tener ovejas y ganado, y asnos machos, y esclavos y esclavas, y asnas y camellos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «por su causa» o «por amor a ella». La expresión hebrea puede traducirse de cualquiera de estas maneras.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הֵיטִיב
  english_pob_choice: treated ... well
  chosen_spanish: trató bien
  alternatives_spanish:
  - hizo bien a
  - trató favorablemente a
  - benefició a
  lexicon: HALOT
  rationale: El hiphil de יטב aquí expresa hacer el bien o tratar favorablemente. «Trató bien» es natural en español y conserva la relación personal del objeto directo mejor que una versión más literal y pesada.
- source_word: בַּעֲבוּרָהּ
  english_pob_choice: because of her
  chosen_spanish: a causa de ella
  alternatives_spanish:
  - por ella
  - por su causa
  - por causa de ella
  lexicon: HALOT
  rationale: La expresión indica causa u ocasión. «A causa de ella» reproduce con claridad ese valor causal sin añadir una intención benefactora que el contexto no exige.
- source_word: וַיְהִי לוֹ
  english_pob_choice: he came to have
  chosen_spanish: llegó a tener
  alternatives_spanish:
  - tuvo
  - vino a tener
  - pasó a tener
  lexicon: HALOT
  rationale: La idiomática hebrea sugiere adquisición o posesión resultante. «Llegó a tener» conserva ese matiz procesual y evita el liso «tuvo».
- source_word: צֹאן
  english_pob_choice: sheep
  chosen_spanish: ovejas
  alternatives_spanish:
  - ganado menor
  - rebaños
  - ovejas y cabras
  lexicon: HALOT
  rationale: Aunque el término puede abarcar ganado menor en general, aquí aparece en una lista de posesiones. «Ovejas» es una equivalencia clara y natural; las alternativas amplían más de lo que la lista exige.
- source_word: בָקָר
  english_pob_choice: cattle
  chosen_spanish: ganado
  alternatives_spanish:
  - bovinos
  - reses
  - vacas y toros
  lexicon: HALOT
  rationale: Es un término colectivo para bovinos. En español, «ganado» funciona de manera natural en una lista de bienes, manteniendo la amplitud del hebreo.
- source_word: חֲמֹרִים
  english_pob_choice: male donkeys
  chosen_spanish: asnos machos
  alternatives_spanish:
  - burros machos
  - asnos
  - mulos
  lexicon: HALOT
  rationale: El plural masculino distingue sexos, y la referencia debe conservarse porque el siguiente término es femenino. «Asnos machos» expresa esa distinción de forma directa; «burros» sería más coloquial.
- source_word: עֲבָדִים
  english_pob_choice: male slaves
  chosen_spanish: esclavos varones
  alternatives_spanish:
  - siervos varones
  - siervos
  - esclavos
  lexicon: HALOT
  rationale: El término designa esclavos/siervos, y la política terminológica favorece «esclavos» por su fuerza léxica. Se añade «varones» para conservar el contraste con el femenino siguiente.
- source_word: שְׁפָחֹת
  english_pob_choice: female slaves
  chosen_spanish: esclavas
  alternatives_spanish:
  - siervas
  - doncellas
  - mujeres esclavas
  lexicon: HALOT
  rationale: El femenino plural se refiere a esclavas/siervas. «Esclavas» preserva el valor social del término en un inventario de posesiones.
- source_word: אֲתֹנֹת
  english_pob_choice: female donkeys
  chosen_spanish: asnas
  alternatives_spanish:
  - burras
  - asnas hembras
  - asnos hembras
  lexicon: HALOT
  rationale: El plural femenino identifica a los animales como hembras. En español, «asnas» es breve y fiel; «asnas hembras» sería redundante.
- source_word: גְמַלִּים
  english_pob_choice: camels
  chosen_spanish: camellos
  alternatives_spanish:
  - dromedarios
  - camellos
  lexicon: HALOT
  rationale: Es el equivalente estándar del plural hebreo. «Camellos» es el término usual y suficientemente preciso en español.
theological_decisions:
- issue: Preservación de la distinción social de עֲבָדִים / שְׁפָחֹת
  english_pob_reading: male slaves and female slaves
  chosen_spanish_reading: esclavos varones y esclavas
  alternative_spanish_readings:
  - siervos varones y siervas
  - criados y criadas
  rationale: La secuencia está en un inventario de bienes, por lo que la condición servil/esclava es relevante. Se evita suavizar la carga social del texto con «siervos» o «criados», salvo que un contexto más amplio lo exija.
  doctrine_reference: DOCTRINE.md / terminología de δοῦλος como 'esclavo' donde la fuerza léxica importa
- issue: Sentido causal de בַּעֲבוּרָהּ
  english_pob_reading: because of her
  chosen_spanish_reading: a causa de ella
  alternative_spanish_readings:
  - por ella
  - por su causa
  - por causa de ella
  rationale: La expresión hebrea puede señalar causa u ocasión. La traducción mantiene abierta la tensión documental sin convertirla en una fórmula benefactora más interpretativa.
  doctrine_reference: N/A
- issue: Valor narrativo de וַיְהִי לוֹ
  english_pob_reading: he came to have
  chosen_spanish_reading: llegó a tener
  alternative_spanish_readings:
  - tuvo
  - vino a tener
  - pasó a tener
  rationale: Se conserva la idea de adquisición o resultado, que es más precisa que un simple pretérito de posesión.
  doctrine_reference: N/A
translation_notes:
  revision_awareness: 'Se tomó en cuenta el historial de revisión del inglés POB: la frase sobre servidumbre volvió de ''servants'' a ''slaves'' por una corrección regresiva, así que el español mantiene ''esclavos/esclavas'' para conservar la fuerza léxica documentada. También se respetó el matiz causal alternativo de בַּעֲבוּרָהּ que el aparato inglés señaló con nota.'
  spanish_consistency_notes:
  - Se usó «Yahvé» como forma por defecto solo cuando el texto lo requiera; este versículo no contiene el Tetragrámaton.
  - Se mantuvo «esclavos/esclavas» en coherencia con la política terminológica para δοῦλος y su fuerza social en listas de posesiones.
  - Se evitó «Cristo»/«Mesías» por no ser pertinentes aquí.
  - Se prefirió una construcción española natural sin diluir la lista de bienes ni la distinción de sexo en los animales y las personas.
