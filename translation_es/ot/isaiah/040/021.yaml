review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la secuencia retórica hebrea y varias decisiones léxicas básicas: «¿No saben? ¿No oyen? ¿No se les ha dicho desde el principio?». Sin embargo, el texto principal no sigue la lectura principal auditada por POB en la cláusula final. El inglés POB adopta «Have you not understood from the foundations of the earth?» y conserva «Have you not understood the foundations of the earth?» solo como alternativa en nota. El español puesto en el texto principal dice «¿No han entendido las fundaciones de la tierra?», que invierte esa prioridad y por tanto no preserva fielmente la decisión documentada.'
  spanish_quality_summary: 'La legibilidad general es buena, pero «fundaciones» suena poco natural en español bíblico y general para referirse a los cimientos cósmicos de la tierra; «cimientos» o «fundamentos» sería más idiomático. Además, los marcadores de nota están mal anclados: [a] y [b] aparecen sobre «fundaciones» aunque la nota b pretende marcar una lectura alternativa de toda la cláusula, y la nota a comenta un término que no conviene mantener. Conviene simplificar a una sola nota para la lectura alternativa.'
  glossary_alignment: No hay conflicto con la terminología principal del proyecto. El problema es de alineación con la decisión sintáctica/teológica auditada y de elección léxica española para מוֹסְדוֹת. Se debe reflejar en el texto principal «desde los cimientos/fundamentos de la tierra» y dejar como nota la lectura alternativa «entendido los cimientos/fundamentos de la tierra».
  issues:
  - severity: high
    issue: La cláusula final del texto principal sigue la lectura alternativa en vez de la lectura principal auditada por POB.
    rationale: El expediente inglés establece como lectura elegida «Have you not understood from the foundations of the earth?» y deja la otra como nota. El borrador español pone en el texto «¿No han entendido las fundaciones de la tierra?», alterando la decisión exegética documentada.
  - severity: medium
    issue: «Fundaciones» es una opción poco natural en español para מוֹסְדוֹת en este contexto cósmico.
    rationale: Aunque etimológicamente posible, en español actual y eclesial «cimientos» o «fundamentos» comunica mejor la imagen de bases de la tierra. «Fundaciones» tiende a sonar institucional o forzado.
  - severity: medium
    issue: Los marcadores de nota están mal distribuidos y generan confusión.
    rationale: 'La nota b dice «O: “¿No han entendido las fundaciones de la tierra?”», pero el texto principal ya dice precisamente eso. Además, dos marcadores sobre una sola palabra no corresponden bien a las funciones de las notas.'
  revised_spanish_text: ¿No saben? ¿No oyen? ¿No se les ha dicho desde el principio? ¿No han entendido desde los cimientos de la tierra?[a]
  revised_footnotes:
  - marker: a
    text: 'O: «¿No han entendido los cimientos de la tierra?»'
    reason: alternative_reading
  revision_rationale: Se corrige la cláusula final para que el texto principal siga la lectura adoptada por el English POB («desde los cimientos de la tierra») y se conserva en nota la alternativa literal viable. También se sustituye «fundaciones» por «cimientos» para una expresión española más natural y clara, manteniendo el sentido de מוֹסְדוֹת.
