id: 2KI.2.19
reference: 2 Kings 2:19
source:
  edition: WLC
  text: וַ/יֹּ֨אמְר֜וּ אַנְשֵׁ֤י הָ/עִיר֙ אֶל אֱלִישָׁ֔ע הִנֵּה נָ֞א מוֹשַׁ֤ב הָ/עִיר֙ ט֔וֹב כַּ/אֲשֶׁ֥ר אֲדֹנִ֖/י רֹאֶ֑ה וְ/הַ/מַּ֥יִם רָעִ֖ים וְ/הָ/אָ֥רֶץ מְשַׁכָּֽלֶת־־׃
translation:
  text: Then the men of the city said to Elisha[a], “Please look, the location of the city is good, as my lord sees; but the water is bad, and the land causes miscarriages.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “the site of the city is good … and the land is unfruitful.” The Hebrew for “causes miscarriages” can denote causing loss of offspring and may extend to agricultural barrenness in context.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמְרוּ
  chosen: Then ... said
  alternatives:
  - And ... said
  lexicon: HALOT
  rationale: The waw-consecutive advances the narrative. 'Then' gives natural English narrative flow while preserving sequence.
- source_word: אַנְשֵׁי הָעִיר
  chosen: the men of the city
  alternatives:
  - the people of the city
  - the citizens
  lexicon: HALOT
  rationale: אַנְשֵׁי is literally 'men of.' Following the gender-accurate policy, 'men' is retained rather than neutralizing to 'people,' since the Hebrew form is explicitly masculine plural construct.
- source_word: הִנֵּה נָא
  chosen: Please look
  alternatives:
  - Please see
  - Behold, please
  lexicon: HALOT
  rationale: This combination draws attention politely. 'Please look' captures both the deictic force of הִנֵּה and the softening/request nuance of נָא in readable modern English.
- source_word: מוֹשַׁב הָעִיר
  chosen: the location of the city
  alternatives:
  - the site of the city
  - the situation of the city
  - the dwelling-place of the city
  lexicon: HALOT
  rationale: מוֹשָׁב here refers to the city's setting or site, not merely its habitation in the abstract. 'Location' is clear modern English and fits the context of discussing the city's favorable placement.
- source_word: טוֹב
  chosen: good
  alternatives:
  - pleasant
  - favorable
  lexicon: HALOT
  rationale: A straightforward rendering that fits the evaluation of the city's setting.
- source_word: כַּאֲשֶׁר אֲדֹנִי רֹאֶה
  chosen: as my lord sees
  alternatives:
  - as my master sees
  - as my lord can see
  lexicon: HALOT
  rationale: אֲדֹנִי is a respectful address to Elisha, best rendered 'my lord' in this social context. 'Sees' preserves the Hebrew participle without overinterpreting it as merely idiomatic 'can see,' though that sense is implicit.
- source_word: וְהַמַּיִם רָעִים
  chosen: but the water is bad
  alternatives:
  - and the water is bad
  - but the waters are bad
  lexicon: HALOT
  rationale: The conjunction is rendered adversatively in English because the clause contrasts the good location with the bad water. Singular 'water' is idiomatic in English for a water supply, though Hebrew has a plural form.
- source_word: וְהָאָרֶץ
  chosen: and the land
  alternatives:
  - and the country
  - and the ground
  lexicon: HALOT
  rationale: אֶרֶץ here refers to the local land/soil of the area. 'Land' is broad enough to preserve the ambiguity between territory and productive ground.
- source_word: מְשַׁכָּלֶת
  chosen: causes miscarriages
  alternatives:
  - is unfruitful
  - causes bereavement
  - causes barrenness
  lexicon: HALOT
  rationale: From שׁכל in the causative stem, the sense is causing loss of offspring. In this agricultural setting it may include human and agricultural unfruitfulness, but 'causes miscarriages' most directly reflects the lexical force without flattening it to the vaguer 'unfruitful.'
