translation:
  language: es
  text: Y después de admirar también el buen orden del santuario[a], consideró entrar en el templo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'El griego usa dos términos diferentes aquí: ἱερόν para el recinto sagrado o santuario, y ναός para el templo propiamente dicho.'
    reason: lexical_alternative
lexical_decisions:
- source_word: θαυμάσας
  english_pob_choice: having marveled
  chosen_spanish: habiendo admirado
  alternatives_spanish:
  - habiendo maravillado
  - habiendo quedado maravillado
  - admirando
  lexicon: LSJ
  rationale: El participio aoristo expresa una acción previa al verbo principal. «Habiendo admirado» comunica la admiración sin cargar el verso con una reacción más intensa de lo que pide el griego.
- source_word: εὐταξίαν
  english_pob_choice: good order
  chosen_spanish: buen orden
  alternatives_spanish:
  - orden
  - ordenamiento
  - ordenidad
  lexicon: LSJ
  rationale: La idea central es el arreglo correcto y bien dispuesto. «Buen orden» suena natural en español y conserva el matiz valorativo del griego.
- source_word: ἱεροῦ
  english_pob_choice: sanctuary
  chosen_spanish: santuario
  alternatives_spanish:
  - recinto sagrado
  - precinto sagrado
  - templo
  lexicon: LSJ
  rationale: Aquí ἱερόν designa el conjunto sagrado, distinto de ναός después. «Santuario» permite mantener esa diferencia léxica en español.
- source_word: ἐνεθυμήθη
  english_pob_choice: he considered
  chosen_spanish: consideró
  alternatives_spanish:
  - pensó
  - meditó
  - ponderó
  lexicon: LSJ
  rationale: El verbo indica deliberación interna. «Consideró» expresa esa reflexión sin convertirla en decisión plena.
- source_word: ναὸν
  english_pob_choice: temple
  chosen_spanish: templo
  alternatives_spanish:
  - templo propiamente dicho
  - santuario interior
  - santuario
  lexicon: LSJ
  rationale: ναός suele referirse al templo propiamente dicho. «Templo» es la equivalencia más clara y mantiene el contraste con «santuario».
- source_word: εἰσελθεῖν
  english_pob_choice: to enter
  chosen_spanish: entrar
  alternatives_spanish:
  - ingresar
  - ir dentro
  lexicon: LSJ
  rationale: Infinitivo de movimiento básico; «entrar» es la forma más directa y idiomática en español.
theological_decisions:
- issue: Distinción entre ἱερόν y ναός
  english_pob_reading: Render ἱερόν as 'sanctuary' and ναός as 'temple'
  chosen_spanish_reading: Traducir ἱερόν como «santuario» y ναός como «templo»
  alternative_spanish_readings:
  - Traducir ambos como «templo»
  rationale: 'El griego usa dos términos distintos para espacios sagrados en la misma frase. Conservar la diferencia ayuda a ver el movimiento narrativo: admiración del recinto sagrado y luego consideración de entrar en el templo propiamente dicho.'
  doctrine_reference: Translation philosophy §5 (Consistency of key terms, or documented exception)
translation_notes:
  revision_awareness: 'La revisión inglesa reciente simplificó la cláusula para reflejar mejor el griego: de una formulación con «making plans» a «considered entering». La versión española sigue ese ajuste y evita añadir una capa explícita de planificación que el griego no exige.'
  spanish_consistency_notes:
  - Se mantiene «santuario» para ἱερόν y «templo» para ναός, preservando la distinción terminológica documentada.
  - «Habiendo admirado» refleja mejor la relación temporal del participio aoristo que una subordinada finita.
  - Se evita introducir un equivalente de «hacer planes», porque el griego solo dice que lo consideró, no que lo formulara explícitamente.
