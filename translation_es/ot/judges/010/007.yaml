translation:
  language: es
  text: Así que la ira de Yahvé se encendió[a] contra Israel, y los vendió[b] en manos de los filisteos y en manos de los amonitas[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, «su ira se encendió contra Israel»; el hebreo usa una imagen de ira que arde.
    reason: lexical_alternative
  - marker: b
    text: «Los vendió» reproduce un giro recurrente en Jueces para la entrega de Israel a dominación enemiga como juicio.
    reason: cross_reference
  - marker: c
    text: 'O, más literalmente: «en manos de los filisteos y en manos de los hijos de Amón».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַ/יִּֽחַר אַף
  english_pob_choice: anger burned
  chosen_spanish: la ira ... se encendió
  alternatives_spanish:
  - su ira se encendió
  - se inflamó de ira
  lexicon: HALOT
  rationale: El hebreo usa la imagen de la ira que arde o se enciende. En español, «se encendió» conserva esa metáfora sin sonar artificial. Mantiene la fuerza idiomática de la construcción hebrea y evita reducirla a un simple «se enojó».
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: La pauta del proyecto exige rendir el Tetragrámaton como «Yahvé». Es la forma más transparente para el nombre divino en este registro y evita la sustitución por un título.
- source_word: בְּ/יִשְׂרָאֵל
  english_pob_choice: against Israel
  chosen_spanish: contra Israel
  alternatives_spanish:
  - sobre Israel
  - con Israel
  lexicon: HALOT
  rationale: En el contexto de ira divina, el hebreo con ב expresa hostilidad dirigida; «contra Israel» reproduce bien esa relación en español.
- source_word: וַֽ/יִּמְכְּרֵ/ם
  english_pob_choice: he sold them
  chosen_spanish: los vendió
  alternatives_spanish:
  - los entregó
  - los puso en manos de
  lexicon: HALOT
  rationale: «Vender» preserva el verbo concreto del hebreo y su uso recurrente en Jueces como lenguaje de juicio. «Los vendió» mantiene la metáfora sin explicar de más.
- source_word: בְּ/יַד
  english_pob_choice: into the hand of
  chosen_spanish: en manos de
  alternatives_spanish:
  - en la mano de
  - bajo el poder de
  lexicon: HALOT
  rationale: La expresión hebrea idiomática se entiende naturalmente en español como «en manos de», conservando la imagen de control o dominio.
- source_word: פְּלִשְׁתִּים
  english_pob_choice: the Philistines
  chosen_spanish: los filisteos
  alternatives_spanish:
  - los filisteos
  lexicon: HALOT
  rationale: Es el etnónimo usual y claro en español para este pueblo.
- source_word: בְּנֵי עַמּוֹן
  english_pob_choice: the Ammonites
  chosen_spanish: los hijos de Amón
  alternatives_spanish:
  - los ammonitas
  - los amonitas
  lexicon: HALOT
  rationale: Aquí conservo la forma más literal del hebreo, en paralelo con el texto fuente, porque el POB inglés también conserva el matiz literal en nota. En español, «hijos de Amón» mantiene la estructura y el enlace con el original.
theological_decisions:
- issue: Nombre divino en el Tetragrámaton
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: El texto hebreo usa יְהוָה directamente. Siguiendo la norma del proyecto, se preserva el nombre propio divino como «Yahvé» para no ocultar el término original bajo un título.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Lenguaje de juicio en «los vendió»
  english_pob_reading: he sold them
  chosen_spanish_reading: los vendió
  alternative_spanish_readings:
  - los entregó
  - los abandonó
  rationale: En Jueces, el verbo expresa entrega judicial de Israel a opresores. «Los vendió» conserva la dureza y el motivo repetido del libro, sin suavizar la agencia divina implícita en el hebreo.
  doctrine_reference: DOCTRINE.md Translation philosophy §1, §5
translation_notes:
  revision_awareness: 'El pasaje muestra alto acuerdo con la revisión inglesa más reciente: no se requieren cambios de sentido respecto del audit trail. La traducción española sigue la misma lectura textual y mantiene las decisiones léxicas principales: ira como imagen de fuego, el nombre divino como Yahvé y el verbo «vender» para la entrega judicial.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» en lugar de una sustitución por título.
  - Se conserva la metáfora de ira encendida con un verbo natural en español.
  - «En manos de» respeta el hebraísmo sin volverlo oscuro.
  - «Hijos de Amón» preserva la literalidad donde el original la presenta explícitamente.
