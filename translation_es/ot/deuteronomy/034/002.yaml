translation:
  language: es
  text: y todo Neftalí[a], y la tierra de Efraín y de Manasés, y toda la tierra de Judá hasta el mar occidental,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literalmente, “el mar último” o “el mar de atrás”, un modo hebreo de referirse al mar del occidente; es decir, al mar Mediterráneo.
    reason: lexical_alternative
lexical_decisions:
- source_word: כָּל נַפְתָּלִי
  english_pob_choice: all Naphtali
  chosen_spanish: todo Neftalí
  alternatives_spanish:
  - todo el territorio de Neftalí
  - toda la región de Neftalí
  lexicon: HALOT
  rationale: Como en el inglés POB, כָּל con el nombre tribal apunta al conjunto completo del territorio/pueblo de la tribu. En español, “todo Neftalí” es breve, natural en una lista geográfica y deja abierta la fuerza tribal-territorial sin añadir una palabra no expresada explícitamente en el hebreo.
- source_word: אֶרֶץ אֶפְרַיִם וּמְנַשֶּׁה
  english_pob_choice: the land of Ephraim and Manasseh
  chosen_spanish: la tierra de Efraín y de Manasés
  alternatives_spanish:
  - el territorio de Efraín y de Manasés
  - la tierra de Efraín y Manasés
  lexicon: HALOT
  rationale: אֶרֶץ se rinde de forma directa como “tierra”. Mantener dos genitivos con “de” preserva la coordinación de las tribus y suena natural en español. “Territorio” sería posible, pero “tierra” sigue más de cerca la amplitud del término hebreo y la opción del POB inglés.
- source_word: כָּל אֶרֶץ יְהוּדָה
  english_pob_choice: all the land of Judah
  chosen_spanish: toda la tierra de Judá
  alternatives_spanish:
  - toda la tierra de Judá
  - todo Judá
  lexicon: HALOT
  rationale: Se conserva la repetición de אֶרֶץ con “tierra”, y כָּל se traduce naturalmente como “toda”. “Todo Judá” podría sonar más étnico o político en español, por lo que “toda la tierra de Judá” mantiene mejor el énfasis geográfico.
- source_word: עַד
  english_pob_choice: as far as
  chosen_spanish: hasta
  alternatives_spanish:
  - así como hasta
  - al punto de
  lexicon: HALOT
  rationale: En una descripción de límites o alcance espacial, “hasta” expresa bien el valor de extensión de עַד en español moderno. Es más natural que una calca como “as far as” y conserva la idea de límite geográfico.
- source_word: הַיָּם הָאַחֲרוֹן
  english_pob_choice: the western sea
  chosen_spanish: el mar occidental
  alternatives_spanish:
  - el mar de occidente
  - el mar del oeste
  - el mar postrero
  lexicon: HALOT
  rationale: La expresión hebrea es literalmente “el mar último/postrero” o “el mar de atrás”, pero el POB inglés ya documenta la interpretación direccional como “western sea”. En español, “mar occidental” reproduce esa decisión interpretativa de manera clara y digna, sin introducir todavía el nombre propio “Mediterráneo” en el texto principal.
translation_notes:
  revision_awareness: El texto español sigue la lectura hebrea y coincide con la decisión revisada del POB inglés, sin cambios de fondo respecto del último pase editorial. La única nota necesaria es la equivalencia idiomática de הַיָּם הָאַחֲרוֹן.
  spanish_consistency_notes:
  - Se mantuvo “tierra” para אֶרֶץ de forma consistente.
  - Se prefirió “mar occidental” para reflejar la dirección implícita del hebreo y la solución del POB inglés.
  - Se usó “Judá” en vez de “Juda” para la forma española estándar del nombre propio.
  - La nota al pie está anclada en “Neftalí” porque allí el POB inglés también marcó el primer segmento con nota explicativa.
