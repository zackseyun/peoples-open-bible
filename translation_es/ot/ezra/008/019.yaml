translation:
  language: es
  text: y Hasabías[a], y con él Jesaías, de los hijos de Merari, sus hermanos y sus hijos, veinte[b];
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «de los meraritas». El hebreo dice literalmente «de los hijos de Merari».
    reason: lexical_alternative
  - marker: b
    text: «Sus hermanos» probablemente se refiere a hermanos de clan o parientes masculinos cercanos dentro de la línea merarita, no necesariamente solo a hermanos biológicos.
    reason: cultural_note
lexical_decisions:
- source_word: וְאֶת
  english_pob_choice: and
  chosen_spanish: y
  alternatives_spanish:
  - y también
  - además
  lexicon: HALOT
  rationale: El objeto directo marcado por אֶת no se expresa en español; el valor coordinante y continuativo se conserva naturalmente con «y».
- source_word: חֲשַׁבְיָה
  english_pob_choice: Hashabiah
  chosen_spanish: Hashabías
  alternatives_spanish:
  - Hashabía
  - Jasabías
  lexicon: HALOT
  rationale: Nombre propio transliterado. Se adapta a una forma española legible manteniendo la referencia nominal sin traducirla.
- source_word: וְאִתּוֹ
  english_pob_choice: and with him
  chosen_spanish: y con él
  alternatives_spanish:
  - con él
  - y junto con él
  lexicon: HALOT
  rationale: La preposición con sufijo expresa acompañamiento; «y con él» preserva la coordinación y la relación de compañía.
- source_word: יְשַׁעְיָה
  english_pob_choice: Jeshaiah
  chosen_spanish: Jesaías
  alternatives_spanish:
  - Jesaia
  - Isaías
  lexicon: HALOT
  rationale: Nombre propio distinto del profeta Isaías en la convención inglesa del POB. «Jesaías» conserva la forma del nombre en español sin confundirlo con Isaías.
- source_word: מִבְּנֵי מְרָרִי
  english_pob_choice: from the sons of Merari
  chosen_spanish: de entre los hijos de Merari
  alternatives_spanish:
  - de los hijos de Merari
  - de los meraritas
  lexicon: HALOT
  rationale: El hebreo dice literalmente «de entre los hijos de Merari». «De entre» ayuda a reflejar la selección dentro del grupo y evita aplanar el matiz genealógico.
- source_word: אֶחָיו
  english_pob_choice: his brothers
  chosen_spanish: sus hermanos
  alternatives_spanish:
  - sus parientes
  - sus hermanos de clan
  lexicon: HALOT
  rationale: Se conserva el término ordinario «hermanos», que en este contexto probablemente alude a hermanos de clan o parientes masculinos cercanos, sin explicitar más de lo que el hebreo exige.
- source_word: וּבְנֵיהֶם
  english_pob_choice: and their sons
  chosen_spanish: y sus hijos
  alternatives_spanish:
  - y sus hijos varones
  - y sus descendientes
  lexicon: HALOT
  rationale: Aunque el hebreo dice literalmente «sus hijos», en español «hijos» es la forma natural y fiel en un registro genealógico.
- source_word: עֶשְׂרִים
  english_pob_choice: twenty
  chosen_spanish: veinte
  alternatives_spanish:
  - '20'
  lexicon: HALOT
  rationale: Número cardinal expresado con palabra, como es normal en traducción bíblica.
theological_decisions:
- issue: Alcance de «sus hermanos» en un registro genealógico/levítico
  english_pob_reading: The English note says 'His brothers' likely refers to clan-brothers or close male relatives within the Merarite line, not necessarily only biological brothers.
  chosen_spanish_reading: «Sus hermanos» se mantiene sin restringirlo a hermanos biológicos; puede entenderse como hermanos de clan o parientes cercanos dentro de la línea merarita.
  alternative_spanish_readings:
  - sus parientes
  - sus hermanos de clan
  rationale: El hebreo no explicita biología ni parentesco más amplio. Mantener «hermanos» conserva la tensión semántica y deja abierta la referencia social del término, en línea con la nota del POB inglés.
  doctrine_reference: Uso genealógico y comunitario del parentesco en los listados levíticos
translation_notes:
  revision_awareness: 'Coincide con la revisión inglesa más reciente: no hubo cambios sustanciales en el trazado. La traducción sigue el texto hebreo masorético y el auditoría inglesa con alta concordancia.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma del proyecto cuando el texto lo requiera; aquí no aparece.
  - Se usa «hijos» en sentido genealógico, equivalente al inglés POB «sons» y al hebreo בְּנֵי.
  - Se transliteran los nombres propios de manera consistente con un español bíblico moderno y legible.
