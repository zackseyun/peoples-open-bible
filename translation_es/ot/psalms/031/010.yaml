revisions:
- from: Ten gracia[a] de mí, Yahvé, porque estoy en angustia[c][b]; mis ojos se han consumido con el dolor; también mi alma y mi vientre.
  to: Sé bondadoso conmigo, Yahvé, porque estoy en angustia; mi ojo[a] se ha consumido por el dolor, mi alma[b] y también mi vientre[c].
  rationale: Se corrige la súplica inicial a un español natural y fiel, se reubican las notas para que correspondan al rastro auditado, se restituye el singular «mi ojo» del hebreo, y se mantiene la terminología del proyecto («Yahvé», «alma», «vientre») con una sintaxis clara y digna.
