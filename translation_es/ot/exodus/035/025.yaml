revisions:
- from: 'Y toda mujer sabia de corazón[a] hilaba con sus manos, y traían lo que habían hilado: la tela azul, la púrpura, el carmesí[b] y el lino fino.'
  to: 'Y toda mujer sabia de corazón[a] hiló con sus manos, y trajeron lo que habían hilado: el azul, la púrpura, el carmesí[b] y el lino fino.'
  rationale: Se corrigen los verbos al pretérito para reflejar mejor la secuencia narrativa hebrea y la decisión del POB en inglés; se elimina 'tela' para no sobreespecificar el primer elemento de una lista compacta de materiales; y se ajusta la nota b para alinear exactamente la alternativa preservada en la auditoría inglesa.
