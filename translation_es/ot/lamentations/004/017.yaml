review_pass:
  verdict: revise
  source_alignment_summary: El borrador capta bien la persistencia de עודינה («Todavía»), la imagen de ojos agotados, la futilidad de la ayuda esperada y la expectativa puesta en una nación incapaz de salvar. Sin embargo, «buscando en vano nuestra ayuda» suena algo forzado en español, y «en nuestra vigilia vigilábamos» preserva la raíz pero resulta poco natural y puede sugerir una guardia nocturna literal más que una espera vigilante.
  spanish_quality_summary: 'El español es mayormente claro y digno, pero dos giros necesitan ajuste para mejorar naturalidad y legibilidad sin perder la compresión poética: «puestos en nuestra ayuda en vano»/«esperando en vano nuestra ayuda» expresa mejor הבל con אֶל־עֶזְרָתֵנוּ, y «en nuestra espera vigilante esperábamos» o similar evita la rigidez de «vigilia vigilábamos».'
  glossary_alignment: No hay conflictos con la terminología del proyecto. «Salvar» para יוֹשִׁעַ y «nación» para גּוֹי están bien. No aparecen términos teológicos sensibles del glosario principal.
  issues:
  - severity: medium
    issue: «buscando en vano nuestra ayuda» es poco idiomático
    rationale: Aunque transmite la futilidad, en español suena como si ellos mismos estuvieran buscando una ayuda ya definida como posesión. El hebreo expresa mirar hacia ayuda esperada que resultó vana; una formulación como «esperando en vano nuestra ayuda» o «puestos nuestros ojos en vano en busca de ayuda» fluye mejor.
  - severity: medium
    issue: «en nuestra vigilia vigilábamos» es demasiado rígido
    rationale: Preserva el juego de raíz, pero en español moderno suena artificial y «vigilia» puede evocar desvelo o ceremonia. Conviene mantener la repetición semántica con una expresión más natural como «en nuestra espera vigilante, esperábamos».
  - severity: low
    issue: La nota al pie omite la alternativa sobre la cláusula final presente en la auditoría inglesa
    rationale: La nota inglesa también preserva la alternativa «esperamos a una nación que no salvó». En este verso, incluir esa posibilidad ayuda a reflejar la ambigüedad documentada de לֹא יוֹשִׁעַ y del verbo de esperar/observar.
  revised_spanish_text: Todavía nuestros ojos se consumían[a], esperando en vano nuestra ayuda; en nuestra espera vigilante[b], esperábamos a una nación que no podía salvar[c].
  revised_footnotes:
  - marker: a
    text: O «se agotaban» o «fallaban». El verbo hebreo puede describir ojos gastados por la espera prolongada.
    reason: lexical_alternative
  - marker: b
    text: O «en nuestro observar» o «en nuestra vigilancia». El hebreo usa un sustantivo y un verbo de la misma raíz para expresar una espera atenta.
    reason: lexical_alternative
  - marker: c
    text: O «que no salvó». El hebreo puede entenderse como incapacidad o como fracaso en salvar.
    reason: lexical_alternative
  revision_rationale: La revisión conserva el sentido fuente y las decisiones léxicas del POB, pero mejora la naturalidad en español. «Esperando en vano nuestra ayuda» reproduce mejor la expectativa frustrada; «en nuestra espera vigilante, esperábamos» mantiene el paralelismo raíz-sustantivo/verbo sin sonar torpe; y la nota final recupera la alternativa documentada en la auditoría inglesa.
