translation:
  language: es
  text: Así que Antíoco, después de llevarse del templo mil ochocientos talentos, se retiró rápidamente a Antioquía, pensando, en su arrogancia, hacer la tierra navegable y el mar transitable a pie[b], a causa de la exaltación de su corazón[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'por la exaltación de su corazón'. La expresión griega dice literalmente la 'elevación' o 'exaltación' del corazón, describiendo una confianza altiva y presuntuosa.
    reason: lexical_alternative
  - marker: b
    text: 'La imagen es deliberadamente hiperbólica: Antíoco imaginaba poder invertir el orden natural, haciendo la tierra apta para navegar y el mar apto para viajar a pie.'
    reason: cultural_note
lexical_decisions:
- source_word: ὀκτακόσια πρὸς τοῖς χιλίοις
  english_pob_choice: eighteen hundred
  chosen_spanish: mil ochocientos
  alternatives_spanish:
  - un mil ochocientos
  - ochocientos además de mil
  lexicon: LSJ
  rationale: La expresión griega significa literalmente 'ochocientos además de mil', es decir, 1.800. En español, 'mil ochocientos' comunica con naturalidad la suma exacta sin perder el valor numérico.
- source_word: ἀπενεγκάμενος
  english_pob_choice: after carrying off
  chosen_spanish: después de llevarse
  alternatives_spanish:
  - después de tomar
  - después de haber cargado con
  lexicon: LSJ
  rationale: El participio indica que Antíoco removió o se llevó el botín. 'Llevarse' transmite bien el sentido de saqueo y mantiene el valor participial en español.
- source_word: ἐκ τοῦ ἱεροῦ
  english_pob_choice: from the temple
  chosen_spanish: del templo
  alternatives_spanish:
  - del santuario
  - del lugar santo
  lexicon: LSJ
  rationale: Aquí ἱερόν designa el templo en sentido amplio. 'Templo' es la opción más clara y evita restringir indebidamente el espacio al interior del santuario.
- source_word: θᾶττον
  english_pob_choice: quickly
  chosen_spanish: rápidamente
  alternatives_spanish:
  - de prisa
  - en seguida
  lexicon: LSJ
  rationale: El adverbio subraya prisa. 'Rápidamente' es natural, sobrio y suficientemente enfático en español.
- source_word: ἐχωρίσθη
  english_pob_choice: departed
  chosen_spanish: se retiró
  alternatives_spanish:
  - partió
  - salió
  lexicon: LSJ
  rationale: En contexto el verbo expresa salida o alejamiento hacia Antioquía. 'Se retiró' conserva el movimiento de apartarse y suena narrativo en español.
- source_word: οἰόμενος
  english_pob_choice: thinking
  chosen_spanish: pensando
  alternatives_spanish:
  - imaginando
  - suponiendo
  lexicon: LSJ
  rationale: El participio introduce la autovaloración del personaje. 'Pensando' es simple y fiel; el matiz arrogante aparece en la frase siguiente.
- source_word: ἀπὸ τῆς ὑπερηφανίας
  english_pob_choice: in his arrogance
  chosen_spanish: en su arrogancia
  alternatives_spanish:
  - por su soberbia
  - debido a su orgullo
  lexicon: LSJ
  rationale: La preposición expresa la base o condición desde la cual piensa. 'En su arrogancia' reproduce bien el valor causal/ambiental y evita suavizar el tono.
- source_word: τὴν μὲν γῆν πλωτὴν
  english_pob_choice: to make the land navigable
  chosen_spanish: hacer la tierra navegable
  alternatives_spanish:
  - volver navegable la tierra
  - hacer navegable la tierra
  lexicon: LSJ
  rationale: πλωτός significa 'apto para navegar'. 'Hacer la tierra navegable' sigue de cerca el griego y conserva la hipérbole imposible del pasaje.
- source_word: καὶ τὸ πέλαγος πορευτὸν
  english_pob_choice: and the sea passable on foot
  chosen_spanish: y el mar transitable a pie
  alternatives_spanish:
  - y el mar pasable a pie
  - y el mar transitable
  lexicon: LSJ
  rationale: πορευτός es 'transitable' o 'recorrible'. 'A pie' explicita la inversión irónica del contraste con 'navegable' y hace visible la hipérbole del texto.
- source_word: θέσθαι
  english_pob_choice: to make
  chosen_spanish: hacer
  alternatives_spanish:
  - volver
  - poner
  lexicon: LSJ
  rationale: El infinitivo indica causar un estado. 'Hacer' es la forma más directa y idiomática para expresar 'hacer que algo sea así'.
- source_word: διὰ τὸν μετεωρισμὸν τῆς καρδίας
  english_pob_choice: because of the exaltation of his heart
  chosen_spanish: a causa de la exaltación de su corazón
  alternatives_spanish:
  - por la exaltación de su corazón
  - a causa de la soberbia de su corazón
  lexicon: LSJ
  rationale: μετεωρισμός alude a exaltación, altivez o elevación presuntuosa. 'Exaltación de su corazón' conserva la imagen griega del corazón como sede del orgullo; 'a causa de' mantiene el valor causal. Se evita sustituir 'corazón' por 'mente' para preservar el antropologismo bíblico.
theological_decisions:
- issue: Antropologismo de τῆς καρδίας
  english_pob_reading: his heart
  chosen_spanish_reading: su corazón
  alternative_spanish_readings:
  - su mente
  - su interior
  rationale: El texto griego habla del 'corazón' como centro de disposición moral y orgullo. Mantener 'corazón' conserva el lenguaje bíblico y la tensión semántica sin psicologizarlo en exceso.
  doctrine_reference: Translation philosophy §1, §6
- issue: Hipérbole sobre el orden natural
  english_pob_reading: make the land navigable and the sea passable on foot
  chosen_spanish_reading: hacer la tierra navegable y el mar transitable a pie
  alternative_spanish_readings:
  - volver navegable la tierra y transitable el mar
  - hacer la tierra apta para navegar y el mar para andar
  rationale: 'La imagen es deliberadamente hiperbólica: Antíoco imagina invertir el orden natural. Se conserva la paradoja en español sin suavizarla ni explicarla dentro del texto principal.'
  doctrine_reference: Translation philosophy §2, §5
translation_notes:
  revision_awareness: 'La versión española sigue el acuerdo alto del texto fuente y del audit trail inglés, sin cambios sustantivos respecto de la lectura aprobada: se conserva el número exacto, el movimiento de saqueo y retirada, el matiz de arrogancia y la hipérbole sobre el orden natural.'
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' como norma del proyecto, pero este versículo no contiene el nombre divino.
  - Se usa 'corazón' como antropologismo bíblico conforme al griego τῆς καρδίας.
  - '''Templo'' se prefiere a ''santuario'' porque ἱερόν aquí señala el recinto/templo en general.'
  - '''Mil ochocientos'' comunica el idiomismo griego con naturalidad en español.'
  - Se conserva la oposición retórica entre 'navegable' y 'transitable a pie' para reflejar la hipérbole del pasaje.
