translation:
  language: es
  text: Bajo todos los cielos lo envía, y su relámpago[a] hasta los confines[b] de la tierra.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «y su luz sobre los confines de la tierra». El hebreo dice «su luz», aunque en este contexto probablemente se refiere al relámpago.'
    reason: lexical_alternative
  - marker: b
    text: 'Literalmente: «sobre las alas de la tierra», un modismo hebreo para los extremos de la tierra.'
    reason: cultural_note
lexical_decisions:
- source_word: תַּחַת
  english_pob_choice: under
  chosen_spanish: Debajo de
  alternatives_spanish:
  - Bajo de
  - Bajo
  lexicon: HALOT
  rationale: El hebreo expresa posición espacial inferior. «Debajo de» mantiene la imagen poética de ubicación sin volverla áspera en español.
- source_word: כָּל הַשָּׁמַיִם
  english_pob_choice: all the heavens
  chosen_spanish: todos los cielos
  alternatives_spanish:
  - todo el cielo
  - los cielos todos
  lexicon: HALOT
  rationale: Se conserva el plural «cielos», correspondiente al plural hebreo y al registro poético, en lugar de reducirlo a singular.
- source_word: יִשְׁרֵהוּ
  english_pob_choice: he sends it out
  chosen_spanish: él lo envía
  alternatives_spanish:
  - él lo despliega
  - él lo dirige
  - él lo suelta
  lexicon: HALOT
  rationale: La forma verbal transmite la idea de enviar/soltar hacia afuera algo que se mueve por el cielo. «Lo envía» conserva el objeto implícito del verbo hebreo y funciona naturalmente en español.
- source_word: וְאוֹרוֹ
  english_pob_choice: and his lightning
  chosen_spanish: su relámpago
  alternatives_spanish:
  - y su luz
  - y su resplandor
  - y su fulgor
  lexicon: HALOT
  rationale: El hebreo dice literalmente «su luz», pero el contexto de teofanía de tormenta favorece entenderlo como un relámpago. Se adopta la lectura contextual fuerte sin borrar la alternativa literal.
- source_word: עַל
  english_pob_choice: to
  chosen_spanish: hasta
  alternatives_spanish:
  - sobre
  - hacia
  - sobre los
  lexicon: HALOT
  rationale: La preposición indica alcance o extensión. En español «hasta» comunica bien la idea de llegar a un extremo geográfico.
- source_word: כַּנְפוֹת הָאָרֶץ
  english_pob_choice: the ends of the earth
  chosen_spanish: los confines de la tierra
  alternatives_spanish:
  - las extremidades de la tierra
  - los bordes de la tierra
  - las alas de la tierra
  lexicon: HALOT
  rationale: Literalmente es «las alas de la tierra», un hebraísmo para los extremos más lejanos. «Los confines de la tierra» mantiene el sentido idiomático y evita una literalidad extraña.
translation_notes:
  revision_awareness: El texto español sigue de cerca el hebreo masorético de Job 37:3 y el trayecto de decisión del POB en inglés. Se preserva la ambigüedad entre «luz» y «relámpago» mediante nota, y se mantiene el modismo hebreo de «alas de la tierra» en nota mientras el texto principal usa una equivalencia idiomática clara.
  spanish_consistency_notes:
  - Se usa «cielos» en plural para reflejar el hebreo.
  - Se traduce el valor contextual de אוֹר como «relámpago» en el texto principal, con alternativa literal en nota.
  - «Confines de la tierra» funciona como equivalente idiomático de כַּנְפוֹת הָאָרֶץ.
  - El orden del verso conserva la estructura poética del original sin introducir contenido ajeno.
