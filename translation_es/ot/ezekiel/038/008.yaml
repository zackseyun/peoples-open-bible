revisions:
- from: Después de muchos días serás llamado[a]; en los últimos años entrarás en una tierra restaurada de la espada, reunida de muchos pueblos, sobre los montes de Israel, que habían sido siempre una desolación; pero ella fue sacada de entre los pueblos, y todos ellos habitarán seguros.
  to: Después de muchos días serás llamado[a]; en los últimos años entrarás en una tierra restaurada tras la espada, reunida de entre muchos pueblos, sobre los montes de Israel, que habían sido siempre una desolación; pero fue sacada de entre los pueblos, y todos ellos habitarán seguros.
  rationale: 'Se hicieron reparaciones menores para mejorar la fidelidad y la naturalidad del español sin cambiar el sentido base: se corrigieron dos calcos preposicionales («tras la espada», «de entre muchos pueblos»), se suavizó la referencia pronominal a la tierra, y se alineó la nota léxica con las alternativas auditadas para תִּפָּקֵד.'
