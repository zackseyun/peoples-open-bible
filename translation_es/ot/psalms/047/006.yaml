translation:
  language: es
  text: Dios ha subido con aclamación[a]; Yahvé, con el sonido de una trompeta[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «ha ascendido».'
    reason: lexical_alternative
  - marker: b
    text: Hebreo shofar, una trompeta de cuerno, tradicionalmente de carnero.
    reason: cultural_note
lexical_decisions:
- source_word: עָלָה
  english_pob_choice: has gone up
  chosen_spanish: ha subido
  alternatives_spanish:
  - ha ascendido
  - subió
  - ha ido arriba
  lexicon: HALOT
  rationale: El hebreo perfecto en poesía puede expresar una acción ya realizada en tono de proclamación. «Ha subido» conserva el movimiento ascendente de עָלָה sin cargar el texto con resonancias doctrinales ajenas. «Ha ascendido» es posible, pero en español suena más solemne y puede sugerir una lectura teológica posterior que el hebreo no exige aquí.
- source_word: אֱלֹהִים
  english_pob_choice: God
  chosen_spanish: Dios
  alternatives_spanish:
  - el Dios
  - Dios mismo
  lexicon: HALOT
  rationale: El referente es el Dios de Israel, en paralelo con YHWH; por tanto, en español corresponde «Dios» en singular. Mantiene la relación paralela sin forzar una perífrasis.
- source_word: בִּתְרוּעָה
  english_pob_choice: with a shout
  chosen_spanish: con un grito
  alternatives_spanish:
  - con un clamor
  - con un grito de júbilo
  - con una aclamación
  lexicon: HALOT
  rationale: תְּרוּעָה abarca un grito fuerte, clamor o aclamación. «Con un grito» preserva la amplitud semántica y evita estrechar el sentido a «júbilo» o a un contexto militar que el paralelismo no exige.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  - Jehová
  lexicon: HALOT
  rationale: El texto hebreo usa el Nombre divino. La norma del proyecto pide reproducirlo como «Yahvé» en el texto principal, manteniendo la forma de nombre propio y no sustituyéndolo por un título.
- source_word: בְּקוֹל
  english_pob_choice: with the sound of
  chosen_spanish: con el sonido de
  alternatives_spanish:
  - con la voz de
  - al sonido de
  lexicon: HALOT
  rationale: קוֹל puede significar sonido, voz o ruido. Con שׁוֹפָר, «con el sonido de» es la colocación más natural en español y conserva la imagen auditiva sin convertirlo en «voz».
- source_word: שׁוֹפָר
  english_pob_choice: trumpet
  chosen_spanish: cuerno
  alternatives_spanish:
  - trompeta
  - cuerno de carnero
  lexicon: HALOT
  rationale: שׁוֹפָר designa un cuerno utilizado para señales y culto. Aunque en inglés POB opta por «trumpet» con nota explicativa, en español «cuerno» preserva mejor el objeto concreto sin imponer la idea de una trompeta metálica moderna. La nota puede aclarar que se trata del shofar, tradicionalmente de carnero.
theological_decisions:
- issue: Representación del Nombre divino YHWH
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - Jehová
  - el SEÑOR
  rationale: La lectura de fondo es la transliteración del Tetragrámaton como nombre propio. «Yahvé» respeta la decisión doctrinal y evita la sustitución por un título. «El SEÑOR» no se usa porque ocultaría el Nombre revelado en el hebreo.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Posible lectura cristológica de la subida
  english_pob_reading: God has gone up
  chosen_spanish_reading: Dios ha subido
  alternative_spanish_readings:
  - Dios ha ascendido
  rationale: El salmo afirma la entronización/victoria de Dios en lenguaje poético. Se evita introducir una referencia cristológica explícita que el hebreo no formula, manteniendo la imagen ascendente simple y directa.
  doctrine_reference: DOCTRINE.md Translation philosophy §1, §3
translation_notes:
  revision_awareness: 'El borrador sigue de cerca el paquete fuente hebreo y el audit trail inglés; no se detectan revisiones aplicadas en la fuente inglesa más reciente, por lo que la versión española mantiene las decisiones estables: Nombre divino como Yahvé, verbo ascendente no cristologizado y equivalente semántico amplio para תְּרוּעָה y שׁוֹפָר.'
  spanish_consistency_notes:
  - Se mantiene «Dios» para אֱלֹהִים en paralelo con Yahvé.
  - Se usa «Yahvé» como forma principal del Tetragrámaton, conforme al estándar del proyecto.
  - «Cuerno» traduce shofar de manera más concreta en español; la nota aclara su sentido ritual e histórico.
  - El orden poético de dos miembros se conserva sin añadir conectores interpretativos.
