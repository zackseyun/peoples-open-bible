translation:
  language: es
  text: Yahvé, guíame en tu justicia, por causa de mis enemigos[a]; endereza tu camino[b] delante de mí.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «los que me acechan»; el término hebreo puede incluir la idea de vigilantes hostiles, no solo enemigos en general.
    reason: lexical_alternative
  - marker: b
    text: O «endereza tu senda delante de mí».
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  english_pob_choice: O Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahvé
  - Jehová
  lexicon: HALOT
  rationale: El texto hebreo usa directamente el nombre divino יְהוָה. En español se sigue el criterio del proyecto de verterlo como «Yahvé», manteniendo el nombre propio del pacto y no ocultándolo con una sustitución funcional. El vocativo se integra naturalmente sin añadir una partícula equivalente a «O».
- source_word: נְחֵנִי
  english_pob_choice: lead me
  chosen_spanish: guíame
  alternatives_spanish:
  - condúceme
  - llévame
  - dirígeme
  lexicon: HALOT
  rationale: La forma de נחה expresa conducción o guía. «Guíame» es natural en español, conserva la petición directa y comunica bien la idea de ser conducido por Dios en el camino correcto.
- source_word: בְצִדְקָתֶךָ
  english_pob_choice: in your righteousness
  chosen_spanish: en tu justicia
  alternatives_spanish:
  - en tu rectitud
  - por tu justicia
  - en tu righteousness
  lexicon: HALOT
  rationale: צדקה puede referirse a justicia o rectitud. Aquí la POB inglesa eligió «righteousness» por el sentido moral/covenantal más amplio; en español «justicia» es un equivalente bíblico válido y claro, sin reducir el alcance a un mero acto judicial. «Rectitud» también sería posible, pero «justicia» resulta más estable en registro bíblico.
- source_word: לְמַעַן
  english_pob_choice: because of
  chosen_spanish: por causa de
  alternatives_spanish:
  - a causa de
  - por motivo de
  - por amor de
  lexicon: HALOT
  rationale: La partícula introduce la circunstancia motivadora ligada a los adversarios. «Por causa de» expresa bien ese valor causal en español moderno y evita una traducción más abstracta que podría oscurecer el matiz contextual.
- source_word: שׁוֹרְרָי
  english_pob_choice: my enemies
  chosen_spanish: mis enemigos
  alternatives_spanish:
  - los que me acechan
  - mis hostiles
  - los que me vigilan
  lexicon: HALOT
  rationale: El término puede abarcar enemigos y también la idea de quienes acechan o vigilan con hostilidad. «Mis enemigos» da el sentido contextual principal de manera clara; la posible nuance de acecho se conserva en la nota.
- source_word: הושר
  english_pob_choice: make your way straight
  chosen_spanish: endereza tu camino
  alternatives_spanish:
  - haz llano tu camino
  - haz recta tu senda
  - allana tu camino
  lexicon: HALOT
  rationale: El causativo de ישר tiene el sentido de hacer recto, derecho o llano. «Endereza tu camino» conserva la metáfora bíblica de un trayecto sin desvíos y funciona bien en español poético sin perder literalidad sustancial.
- source_word: לְפָנַי
  english_pob_choice: before me
  chosen_spanish: delante de mí
  alternatives_spanish:
  - ante mí
  - frente a mí
  lexicon: HALOT
  rationale: La locución preposicional se traduce de forma natural como «delante de mí», que mantiene el valor espacial/poético de la expresión y sugiere una vía abierta delante del orante.
- source_word: דַּרְכֶּךָ
  english_pob_choice: your way
  chosen_spanish: tu camino
  alternatives_spanish:
  - tu senda
  - tu vía
  - tu andar
  lexicon: HALOT
  rationale: דרך puede significar camino, senda, modo o curso. En este verso, «tu camino» preserva el singular y la imagen del recorrido que Dios pone delante del salmista; «camino» es la opción más natural y bíblicamente transparente en español.
theological_decisions:
- issue: Nombre divino YHWH
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Jehová
  - el SEÑOR
  rationale: El hebreo contiene el Tetragrámaton y no un título genérico. Siguiendo la norma del proyecto, se mantiene el nombre propio «Yahvé» para conservar la referencia al Dios del pacto, evitando el ocultamiento que produciría una sustitución por «el SEÑOR».
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Sentido de צדקה en la oración
  english_pob_reading: in your righteousness
  chosen_spanish_reading: en tu justicia
  alternative_spanish_readings:
  - en tu rectitud
  - por tu justicia
  rationale: La petición no apela a una abstracción meramente judicial, sino a la fidelidad moral de Dios como guía del creyente. «Justicia» conserva el peso ético y pactual del término en español bíblico; «rectitud» sería posible, pero menos estable en el registro litúrgico usual.
  doctrine_reference: DOCTRINE.md Translation philosophy §5 (consistency of key terms, or documented exception)
translation_notes:
  revision_awareness: La revisión más reciente indicó alto acuerdo y ningún cambio necesario; por ello se conserva la lectura de base y solo se traslada al español la misma estructura semántica, manteniendo las alternativas léxicas donde el hebreo permite una ambigüedad relevante.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» conforme al estándar del proyecto para יְהוָה.
  - «Justicia» se usa aquí como equivalente funcional de צדקה, sin perder el matiz moral/covenantal señalado por la POB inglesa.
  - «Camino» y «delante de mí» conservan la metáfora de una senda recta abierta por Dios.
  - Las notas al pie reflejan las alternativas léxicas documentadas en la auditoría inglesa sin introducir lecturas ajenas al hebreo.
