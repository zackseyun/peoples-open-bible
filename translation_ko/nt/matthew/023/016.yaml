  text: Οὐαὶ ὑμῖν, ὁδηγοὶ τυφλοὶ οἱ λέγοντες· Ὃς ἂν ὀμόσῃ ἐν τῷ ναῷ, οὐδέν ἐστιν, ὃς δ’ ἂν ὀμόσῃ ἐν τῷ χρυσῷ τοῦ ναοῦ ὀφείλει.
base_translation:
  language: en
  yaml_path: translation/nt/matthew/023/016.yaml
  text: Woe to you[a], blind guides, who say, ‘Whoever swears by the temple, it is nothing[b]; but whoever swears by the gold of the temple is bound.’
  footnotes:
  - marker: a
    text: Or, more literally, 'Whoever swears in the temple.' Here 'by the temple' reflects the oath formula intended in context.
    reason: lexical_alternative
  - marker: b
    text: 'Greek: ''it is nothing,'' that is, such an oath is treated as not binding.'
    reason: lexical_alternative
translation:
  language: ko
  text: 너희에게 화가 있으리니, 눈먼 인도자들아, 너희는 말하기를 ʻ누구든지 성전을 두고 맹세하면 아무것도 아니지만, 누구든지 성전의 금을 두고 맹세하면 매이게 된다ʼ고 합니다.
  philosophy: optimal-equivalence
