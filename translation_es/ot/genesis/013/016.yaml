translation:
  language: es
  text: Y haré tu descendencia[a] como el polvo de la tierra, de modo que, si un hombre[b] puede contar el polvo de la tierra, también tu descendencia podrá ser contada.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «tu simiente» o «tu posteridad»; זֶרַע es un sustantivo colectivo para la posteridad.
    reason: lexical_alternative
  - marker: b
    text: O «alguien puede contar»; el hebreo usa אִישׁ en forma masculina singular con sentido genérico.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְשַׂמְתִּי
  english_pob_choice: And I will make
  chosen_spanish: Y haré
  alternatives_spanish:
  - Y pondré
  - Y colocaré
  lexicon: HALOT
  rationale: 'En este contexto de promesa de multiplicación, שׂוּם no se vierte de forma mecánica como «poner»; el valor idiomático es causativo: hacer que la descendencia sea innumerable. «Haré» conserva ese sentido natural en español y sigue de cerca la decisión inglesa de «make».'
- source_word: זַרְעֲךָ
  english_pob_choice: your offspring
  chosen_spanish: tu descendencia
  alternatives_spanish:
  - tu simiente
  - tu posteridad
  lexicon: HALOT
  rationale: זֶרַע es un sustantivo colectivo. «Descendencia» transmite bien la referencia colectiva y genealógica en español moderno, sin la ambigüedad arcaizante de «simiente» y sin perder el alcance plural implícito.
- source_word: כַּעֲפַר הָאָרֶץ
  english_pob_choice: like the dust of the earth
  chosen_spanish: como el polvo de la tierra
  alternatives_spanish:
  - como el polvo de la tierra
  - igual que el polvo de la tierra
  lexicon: HALOT
  rationale: La imagen es formulaica y concreta. «Como el polvo de la tierra» mantiene la comparación y la imaginería hebrea con claridad natural en español.
- source_word: אֲשֶׁר אִם
  english_pob_choice: so that if
  chosen_spanish: de modo que, si
  alternatives_spanish:
  - tal que, si
  - de manera que, si
  lexicon: HALOT
  rationale: La secuencia introduce una relación de resultado/comparación. «De modo que, si» comunica en español la función idiomática del hebreo mejor que una simple subordinación condicional sin matiz.
- source_word: אִישׁ
  english_pob_choice: a man
  chosen_spanish: un hombre
  alternatives_spanish:
  - alguien
  - una persona
  lexicon: HALOT
  rationale: El hebreo usa una forma masculina singular con fuerza genérica. Se conserva en el texto principal como «un hombre» para respetar la forma fuente, siguiendo la decisión auditada de mantener el valor genérico masculino.
- source_word: לִמְנוֹת
  english_pob_choice: count
  chosen_spanish: contar
  alternatives_spanish:
  - numerar
  - enumerar
  lexicon: HALOT
  rationale: מנה significa contar o enumerar; «contar» es la opción más directa y transparente en español, coherente con la imagen de la imposibilidad de contar el polvo.
- source_word: גַּם
  english_pob_choice: also
  chosen_spanish: también
  alternatives_spanish:
  - igualmente
  - incluso
  lexicon: HALOT
  rationale: El término marca correspondencia entre el polvo y la descendencia. «También» reproduce ese paralelismo con fluidez y sin añadir énfasis indebido.
- source_word: יִמָּנֶה
  english_pob_choice: can be counted
  chosen_spanish: podrá ser contada
  alternatives_spanish:
  - podrá contarse
  - será contada
  lexicon: HALOT
  rationale: El nifal expresa posibilidad dentro de la comparación condicional. «Podrá ser contada» conserva esa posibilidad y mantiene el paralelismo con la cláusula anterior.
theological_decisions:
- issue: Renderización de זֶרַע en la promesa a Abram
  english_pob_reading: your offspring
  chosen_spanish_reading: tu descendencia
  alternative_spanish_readings:
  - tu simiente
  - tus descendientes
  rationale: La promesa se refiere a la posteridad de Abram como conjunto innumerable. «Descendencia» preserva el valor colectivo sin introducir una lectura mesiánica singular que el verso no exige por sí mismo.
  doctrine_reference: Translation philosophy §§1, 3, 5
- issue: Conservación del masculino genérico en אִישׁ
  english_pob_reading: a man
  chosen_spanish_reading: un hombre
  alternative_spanish_readings:
  - alguien
  - una persona
  rationale: El hebreo presenta un sustantivo masculino singular con función genérica. Se mantiene esa forma en la traducción principal para no neutralizar indebidamente la señal gramatical del original.
  doctrine_reference: Translation philosophy §4
translation_notes:
  revision_awareness: No hay revisiones aplicadas en el expediente más reciente; la lectura se mantiene sin cambios sustanciales y en alta concordancia con la auditoría inglesa y la verificación cruzada.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» como término predeterminado del proyecto cuando corresponda, pero este versículo no lo contiene.
  - Se prefirió «descendencia» para זֶרַע por su valor colectivo natural en español bíblico contemporáneo.
  - Se conservó el masculino genérico de אִישׁ en el cuerpo principal y se explicó en nota.
  - La puntuación y el orden sintáctico buscan legibilidad en español sin perder la estructura comparativa del hebreo.
