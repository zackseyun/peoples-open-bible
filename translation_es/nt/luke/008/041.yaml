translation:
  language: es
  text: Y he aquí que vino un hombre llamado Jairo, y este era un dirigente de la sinagoga; y, cayendo a los pies de Jesús, le rogaba que entrara en su casa,
  philosophy: optimal-equivalence
  footnotes: []
lexical_decisions:
- source_word: ἰδοὺ
  english_pob_choice: behold
  chosen_spanish: he aquí
  alternatives_spanish:
  - mira
  - ve
  lexicon: BDAG
  rationale: Conserva el marcador discursivo de atención y la vivacidad narrativa sin omitirlo. En español bíblico, «he aquí» mantiene la solemnidad de «behold» mejor que una simple omisión.
- source_word: ἀνὴρ
  english_pob_choice: a man
  chosen_spanish: un hombre
  alternatives_spanish:
  - un varón
  lexicon: BDAG
  rationale: Aquí designa a un hombre adulto concreto, no a la humanidad en general. «Hombre» es la equivalencia directa y natural.
- source_word: ᾧ ὄνομα Ἰάϊρος
  english_pob_choice: named Jairus
  chosen_spanish: llamado Jairo
  alternatives_spanish:
  - de nombre Jairo
  - cuyo nombre era Jairo
  lexicon: BDAG
  rationale: «Llamado Jairo» expresa con naturalidad la construcción griega y evita una literalidad pesada. Mantiene el dato identificatorio sin añadir información.
- source_word: ἄρχων τῆς συναγωγῆς
  english_pob_choice: a ruler of the synagogue
  chosen_spanish: un dirigente de la sinagoga
  alternatives_spanish:
  - un jefe de la sinagoga
  - un oficial de la sinagoga
  lexicon: BDAG
  rationale: «ἄρχων» puede ser gobernante/dirigente/oficial. En español, «dirigente de la sinagoga» conserva la función de autoridad sin sonar artificial con «ruler», y evita una terminología eclesiástica ajena al contexto.
- source_word: ὑπῆρχεν
  english_pob_choice: he was
  chosen_spanish: era
  alternatives_spanish:
  - estaba
  - servía como
  lexicon: BDAG
  rationale: En este contexto, el verbo indica estado o condición. «Era» comunica con naturalidad que ocupaba esa función.
- source_word: πεσὼν παρὰ τοὺς πόδας τοῦ Ἰησοῦ
  english_pob_choice: falling at Jesus' feet
  chosen_spanish: cayendo a los pies de Jesús
  alternatives_spanish:
  - postrándose a los pies de Jesús
  - cayendo junto a los pies de Jesús
  lexicon: BDAG
  rationale: La frase describe la postura de súplica urgente. «Cayendo a los pies de Jesús» sigue de cerca el griego y en español comunica la misma escena sin imponer explícitamente un matiz de adoración que el versículo no formula.
- source_word: παρεκάλει
  english_pob_choice: begged
  chosen_spanish: le rogaba
  alternatives_spanish:
  - le suplicaba
  - le imploraba
  lexicon: BDAG
  rationale: El imperfecto indica petición insistente y continua. «Rogaba» preserva esa reiteración con un tono digno y fuerte; «suplicaba» también sería posible, pero «rogaba» equilibra mejor urgencia y registro.
- source_word: εἰσελθεῖν εἰς τὸν οἶκον αὐτοῦ
  english_pob_choice: to come into his house
  chosen_spanish: que entrara en su casa
  alternatives_spanish:
  - que viniera a su casa
  - que se metiera en su casa
  lexicon: BDAG
  rationale: «Entrar en su casa» reproduce el sentido básico de εἰσελθεῖν con buen español. Se usa la subordinada con «que» porque depende de «rogaba» y expresa la petición de manera natural.
- source_word: οἶκον
  english_pob_choice: house
  chosen_spanish: casa
  alternatives_spanish:
  - hogar
  - vivienda
  lexicon: BDAG
  rationale: «Casa» es la equivalencia más directa y transparente. «Hogar» sería más afectivo e interpretativo.
theological_decisions:
- issue: La postura de Jairo ante Jesús
  english_pob_reading: Rendered the action straightforwardly as urgent supplication without adding worship language.
  chosen_spanish_reading: Se presenta como una súplica urgente, sin añadir lenguaje explícito de adoración.
  alternative_spanish_readings:
  - postrándose en adoración
  - haciéndole reverencia
  rationale: El texto describe que cae a los pies de Jesús y le ruega; no dice de forma explícita que esté adorando. La redacción española conserva esa tensión y no introduce una afirmación teológica más fuerte que el original.
  doctrine_reference: Affirmations; Translation philosophy item 3
translation_notes:
  revision_awareness: 'El texto español sigue el estado revisado del audit trail inglés: conserva «behold» como marcador discursivo, mantiene la sobriedad del acto de caer a los pies de Jesús sin añadir adoración explícita, y adopta la forma posesiva/relacional natural en español con «de Jesús». No se requieren notas textuales variantes porque el griego base y la traducción auditada coinciden sustancialmente.'
  spanish_consistency_notes:
  - Se conserva «Jesús» en genitivo perifrástico como «de Jesús», coherente con el español bíblico moderno.
  - Se usa «sinagoga» y «dirigente» de forma consistente con el oficio descrito por ἄρχων τῆς συναγωγῆς.
  - El registro es reverente pero moderno, evitando arcaísmos innecesarios.
