    issue: '''el gran lugar alto'' es una construcción poco natural en español'
    rationale: Aunque reproduce formalmente 'the great high place', en español resulta rígido y extraño. 'el principal lugar alto' o 'el gran lugar de culto en lo alto' serían más naturales; dado que la nota ya preserva la alternativa, la mejor solución en texto principal es 'el principal lugar alto'.
  - severity: medium
    issue: La nota al pie está anclada en 'Gabaón' en vez de la expresión 'lugar alto'
    rationale: La nota explica el valor de הַגְּדוֹלָה dentro de 'la gran/ principal altura cultual', no el topónimo. El marcador debe aparecer junto a la frase relevante.
  - severity: low
    issue: '''sobre aquel altar'' es comprensible pero menos idiomático que ''en aquel altar'''
    rationale: En español bíblico y eclesial, 'ofrecer holocaustos en el altar' suena más natural, sin perder el sentido de עַל הַמִּזְבֵּחַ.
