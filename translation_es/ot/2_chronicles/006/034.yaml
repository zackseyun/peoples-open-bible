revisions:
- from: Si tu pueblo sale[a] a la guerra contra sus enemigos, por el camino que tú los envías, y oran a ti en dirección de esta ciudad que tú has escogido y de la casa que he edificado para tu nombre[b],
  to: Si tu pueblo sale a la guerra contra sus enemigos, por el camino que les envíes, y oran a ti hacia[a] esta ciudad que has escogido y la casa que he edificado para tu nombre[b],
  rationale: Se corrige el anclaje de la nota [a] para que corresponda a la frase direccional que comenta, y se alisa el español con 'hacia esta ciudad ... y la casa', que preserva mejor el sentido espacial del hebreo y suena más natural. También se eliminan pronombres explícitos no necesarios.
