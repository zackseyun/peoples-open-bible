review_pass:
  verdict: revise
  source_alignment_summary: El borrador español no sigue fielmente el texto base hebreo ni la auditoría inglesa. La traducción inglesa principal para este registro corresponde solo a la segunda mitad del versículo hebreo ('esplendor de gloria... perfección de belleza'), con nota sobre el paralelo griego. En cambio, el borrador español incorporó material de la primera mitad y del griego ('corona de oro sobre el turbante... obra de fuerza') y además alteró 'y alabanza de fuerza' a 'gloria de honor'.
  spanish_quality_summary: El español es comprensible, pero mezcla testigos, introduce contenido no presente en la línea principal inglesa auditada, y contiene frases poco naturales o menos precisas como 'deleites de los ojos'. Una forma más fiel y más idiomática sería 'esplendor de gloria y alabanza de fuerza[a], delicia de los ojos y perfección de belleza'.
  glossary_alignment: 'No hay términos doctrinales mayores en juego. El problema principal es de alineación textual y léxica: הוד/כבוד deben conservarse como una pareja elevada (''esplendor de gloria''), ותהלת עז no debe reemplazarse por ''gloria de honor'', y la divergencia griega debe permanecer en nota, no absorbida en el texto principal.'
  issues:
  - severity: high
    issue: El texto principal español incorpora la primera mitad del versículo ('corona de oro... turbante... sello de santidad') que no pertenece a la traducción inglesa principal auditada para este registro.
    rationale: La tarea es revisar este registro concreto contra la evidencia fuente y el rastro POB. El POB inglés para SIR.45.12 traduce la cláusula hebrea 'הוד כבוד...' como texto principal y deja el paralelo griego en nota.
  - severity: high
    issue: Se introdujo lenguaje del paralelo griego en el texto principal ('obra de fuerza') en vez de mantenerlo solo en la nota.
    rationale: La decisión teológica documentada dice expresamente que el hebreo es principal y el griego se preserva en nota por la divergencia notable.
  - severity: high
    issue: ותהלת עז fue traducido como 'gloria de honor', que no refleja ni el hebreo ni la elección inglesa auditada.
    rationale: תהלה = alabanza, y עז = fuerza/might. 'Gloria de honor' sustituye el sentido por otro diferente.
  - severity: medium
    issue: הוד y כבוד fueron redistribuidos como 'gloria de honor' en vez de conservar su secuencia poética.
    rationale: La auditoría inglesa distingue 'splendor' de 'glory' para no colapsar los términos. En español, 'esplendor de gloria' preserva bien esa distinción.
  - severity: low
    issue: '''deleites de los ojos'' suena menos natural que una formulación singular idiomática.'
    rationale: Para מחמד עין, 'delicia de los ojos' o 'deleite para los ojos' resulta más natural en español bíblico moderno y mantiene el valor idiomático.
  revised_spanish_text: esplendor de gloria y alabanza de fuerza[a], delicia de los ojos y perfección de belleza.
  revised_footnotes:
