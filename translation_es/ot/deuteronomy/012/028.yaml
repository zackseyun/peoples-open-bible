translation:
  language: es
  text: Guarda y escucha[a] todas estas palabras que yo te mando, para que te vaya bien a ti y a tus hijos[b] después de ti para siempre, porque harás lo bueno y lo recto ante los ojos de Yahvé tu Dios.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'El hebreo combina dos verbos: uno de guardar u observar con diligencia y otro de escuchar con atención; el contexto implica obediencia.'
    reason: lexical_alternative
  - marker: b
    text: Hebreo «hijos»; aquí se entiende en el sentido más amplio de hijos/descendencia o posteridad.
    reason: lexical_alternative
lexical_decisions:
- source_word: שְׁמֹר
  english_pob_choice: Keep
  chosen_spanish: Guarda
  alternatives_spanish:
  - Cuida
  - Observa
  - Mantén
  lexicon: HALOT
  rationale: El imperativo pide observancia diligente y fiel; «guarda» conserva la idea de custodiar/obedecer sin perder naturalidad en español.
- source_word: וְשָׁמַעְתָּ
  english_pob_choice: hear / listen to
  chosen_spanish: escucha
  alternatives_spanish:
  - oye
  - atiende
  - oye y obedece
  lexicon: HALOT
  rationale: שׁמע aquí conserva el valor de escuchar con atención, dentro de la fórmula exhortativa. «Escucha» es natural y deja implícita la obediencia por el contexto.
- source_word: כָּל הַדְּבָרִים הָאֵלֶּה
  english_pob_choice: all these words
  chosen_spanish: todas estas palabras
  alternatives_spanish:
  - todas estas cosas
  - todos estos mandamientos
  lexicon: HALOT
  rationale: דברים se refleja mejor como «palabras» porque el texto alude a las palabras pronunciadas de la instrucción divina; el plural se conserva de modo directo.
- source_word: מְצַוֶּךָּ
  english_pob_choice: I am commanding you
  chosen_spanish: yo te mando
  alternatives_spanish:
  - yo te estoy mandando
  - yo te ordeno
  lexicon: HALOT
  rationale: El participio expresa mandato en curso o inmediato; «yo te mando» es claro, bíblico y suficiente en español, sin sobrecargar la frase.
- source_word: לְמַעַן יִיטַב לְךָ
  english_pob_choice: so that it may go well with you
  chosen_spanish: para que te vaya bien a ti
  alternatives_spanish:
  - a fin de que te vaya bien
  - para que sea bueno para ti
  lexicon: HALOT
  rationale: La fórmula de bienestar pactal se expresa naturalmente en español con «te vaya bien», manteniendo el sentido idiomático del hebreo.
- source_word: וּלְבָנֶיךָ אַחֲרֶיךָ
  english_pob_choice: and with your children after you
  chosen_spanish: y a tus hijos después de ti
  alternatives_spanish:
  - y a tus hijos tras de ti
  - y a tu descendencia después de ti
  lexicon: HALOT
  rationale: El término plural masculino puede referirse a la posteridad; en esta línea, «hijos» conserva el matiz familiar y concreto del texto, mientras que la referencia sucesoria se expresa con «después de ti».
- source_word: עַד עוֹלָם
  english_pob_choice: forever
  chosen_spanish: para siempre
  alternatives_spanish:
  - eternamente
  - por siempre
  lexicon: HALOT
  rationale: La expresión denota duración indefinida y duradera; «para siempre» es la forma más natural y fiel en español contemporáneo.
- source_word: כִּי
  english_pob_choice: because
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  lexicon: HALOT
  rationale: Introduce la razón de la promesa de bienestar; «porque» hace explícita la relación causal.
- source_word: תַעֲשֶׂה
  english_pob_choice: you will do
  chosen_spanish: harás
  alternatives_spanish:
  - tú harás
  - hagas
  lexicon: HALOT
  rationale: 'El imperfecto se traduce aquí con valor resultativo/futuro: «harás». Es la forma más fluida en español.'
- source_word: הַטּוֹב וְהַיָּשָׁר
  english_pob_choice: what is good and right
  chosen_spanish: lo bueno y lo recto
  alternatives_spanish:
  - lo bueno y lo justo
  - el bien y lo recto
  lexicon: HALOT
  rationale: Los adjetivos funcionan sustantivados; «lo bueno y lo recto» reproduce esa función y mantiene el par moral del hebreo.
- source_word: בְּעֵינֵי יְהוָה
  english_pob_choice: in the eyes of Yahweh
  chosen_spanish: ante los ojos de Yahvé
  alternatives_spanish:
  - a los ojos de Yahvé
  - a la vista de Yahvé
  lexicon: HALOT
  rationale: Se conserva el hebraísmo de evaluación divina con una preposición natural en español. «Ante los ojos de» expresa bien el criterio de valoración.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  - el SEÑOR
  lexicon: HALOT
  rationale: 'Se sigue el criterio del proyecto para el Tetragrámaton: transliteración del nombre divino como «Yahvé», no sustitución por un título.'
- source_word: אֱלֹהֶיךָ
  english_pob_choice: your God
  chosen_spanish: tu Dios
  alternatives_spanish:
  - tu Dios, el Yahvé
  - tu Dios, Yahvé
  lexicon: HALOT
  rationale: 'La construcción posesiva se conserva de manera directa y sobria: «tu Dios».'
theological_decisions:
- issue: Rendering of the divine name יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Jehová
  - el SEÑOR
  rationale: El texto hebreo usa el Nombre divino directamente. La traducción del proyecto exige preservarlo como transliteración audible, por lo que se mantiene «Yahvé».
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Scope of בָנֶיךָ
  english_pob_reading: children
  chosen_spanish_reading: tus hijos
  alternative_spanish_readings:
  - tus niños
  - tus descendientes
  rationale: Aunque formalmente masculino plural, aquí la referencia es de posteridad covenantal/familiar. En español, «hijos» conserva el vínculo generacional sin forzar una paráfrasis más amplia.
  doctrine_reference: DOCTRINE.md Translation philosophy §4 (Gender-accurate over gender-neutral)
translation_notes:
  revision_awareness: La redacción sigue el ajuste del audit trail que recupera ambos verbos hebreos («keep and hear») y mantiene la estructura causal y pactal del versículo. La versión española integra ese doble matiz con «Guarda y escucha», más la nota explicativa sobre el par verbal.
  spanish_consistency_notes:
  - Se preservó el nombre divino como «Yahvé» conforme al estándar del proyecto.
  - Se mantuvo el paralelismo moral con «lo bueno y lo recto» sin sustituirlo por formulaciones interpretativas.
  - La referencia familiar de בנים se expresó como «hijos» por ser el equivalente más natural en español en este contexto.
  - Las notas a pie se anclan explícitamente en el texto con [a] y [b].
