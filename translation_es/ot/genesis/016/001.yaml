translation:
  language: es
  text: Sarai, la esposa de Abram, no le había dado ningún hijo, y tenía una esclava egipcia[a] cuyo nombre era Agar.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: '''Esclava'' traduce שִׁפְחָה con su fuerza social de mujer en condición servil; se evita ''sierva'' porque suaviza la relación de dependencia que el hebreo presenta.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְשָׂרַי
  english_pob_choice: Now Sarai
  chosen_spanish: Ahora Sarai
  alternatives_spanish:
  - Y Sarai
  - Sarai
  lexicon: HALOT
  rationale: Al inicio de una nueva escena narrativa, 'Ahora' transmite bien el valor discursivo de ו sin forzar un calco; conserva el movimiento del relato y suena natural en español.
- source_word: אֵשֶׁת אַבְרָם
  english_pob_choice: Abram’s wife
  chosen_spanish: la esposa de Abram
  alternatives_spanish:
  - la mujer de Abram
  - la esposa Abram
  lexicon: HALOT
  rationale: El constructo hebreo indica relación marital; 'la esposa de Abram' es claro, fiel y natural en español, manteniendo la especificación explícita.
- source_word: לֹא יָלְדָה לוֹ
  english_pob_choice: had borne him no children
  chosen_spanish: no le había dado hijos
  alternatives_spanish:
  - no le había dado descendencia
  - no había parido para él
  lexicon: HALOT
  rationale: En este contexto, יָלַד expresa el hecho de tener hijos para el esposo. 'No le había dado hijos' comunica el sentido narrativo con naturalidad sin perder la negación de fertilidad de Sarai.
- source_word: וְלָהּ
  english_pob_choice: and she had
  chosen_spanish: y tenía
  alternatives_spanish:
  - y ella tenía
  - y poseía
  lexicon: HALOT
  rationale: La construcción posesiva hebrea se vierte de modo idiomático como 'tenía'; conserva la relación de pertenencia sin una traducción artificial.
- source_word: שִׁפְחָה
  english_pob_choice: slave woman
  chosen_spanish: esclava
  alternatives_spanish:
  - sierva
  - criada
  - sirvienta
  lexicon: HALOT
  rationale: El término hebreo señala una mujer en condición servil/bondada. En español, 'esclava' preserva mejor esa fuerza social y lexical que opciones más suaves como 'sierva'.
- source_word: מִצְרִית
  english_pob_choice: Egyptian
  chosen_spanish: egipcia
  alternatives_spanish:
  - egipcia de Egipto
  lexicon: HALOT
  rationale: Adjetivo étnico que modifica a la esclava; 'egipcia' es la forma natural y precisa en español.
- source_word: וּשְׁמָהּ הָגָר
  english_pob_choice: whose name was Hagar
  chosen_spanish: cuyo nombre era Agar
  alternatives_spanish:
  - y su nombre era Agar
  - llamada Agar
  lexicon: HALOT
  rationale: El hebreo identifica formalmente a la mujer por su nombre. 'Cuyo nombre era Agar' reproduce esa identificación con fluidez; 'Agar' sigue la forma española habitual del nombre.
translation_notes:
  revision_awareness: La revisión más reciente indicó que no había cambios necesarios y el acuerdo con el control cruzado fue alto; este borrador mantiene esa lectura estable sin introducir ajustes textuales innecesarios.
  spanish_consistency_notes:
  - Se conserva 'Sarai', 'Abram' y 'Agar' conforme a la transliteración del proyecto y al uso ya fijado en la traducción inglesa auditada.
  - Se mantiene la tensión lexical de שִׁפְחָה con 'esclava', evitando una domesticación que atenúe el estatus social descrito en hebreo.
  - La negación de fertilidad se expresa en pasado perfecto ('no le había dado hijos') para reflejar el trasfondo narrativo del hebreo sin sonar rígido en español.
