revisions:
- from: Y también que todo hombre coma y beba y vea bien en todo su trabajo[a][b]—esto es don de Dios.
  to: Y también que todo hombre coma y beba y vea el bien en todo su trabajo[a][b]—esto es don de Dios.
  rationale: Se hace una reparación pequeña pero necesaria para que el español preserve mejor el sentido y la imagen del hebreo sin sonar extraño. 'Ver el bien' es más fiel y más claro que 'ver bien' en este contexto; las notas se ajustan en consecuencia.
