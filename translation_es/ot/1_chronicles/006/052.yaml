translation:
  language: es
  text: 'Les dieron las ciudades de refugio: Siquem con sus pastos[a] en la región montañosa de Efraín, y Gezer con sus pastos.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, de manera más formal: «las ciudades de refugio: Siquem y sus pastos en la región montañosa de Efraín, y Gezer y sus pastos».

      '
    reason: alternative_reading
lexical_decisions:
- source_word: וַיִּתְּנוּ
  english_pob_choice: They gave
  chosen_spanish: Les dieron
  alternatives_spanish:
  - Y les dieron
  - Y dieron
  lexicon: HALOT
  rationale: El wayyiqtol de נתן introduce la acción narrativa. En español, 'les dieron' conserva el sentido y el complemento indirecto, mientras que la conjunción inicial puede omitirse por fluidez sin perder la secuencia narrativa.
- source_word: לָהֶם
  english_pob_choice: them
  chosen_spanish: les
  alternatives_spanish:
  - a ellos
  - les dieron a ellos
  lexicon: HALOT
  rationale: El pronombre refiere a los destinatarios del contexto mayor. El dativo español 'les' es natural y suficientemente claro.
- source_word: עָרֵי הַמִּקְלָט
  english_pob_choice: the cities of refuge
  chosen_spanish: las ciudades de refugio
  alternatives_spanish:
  - las ciudades refugio
  - las ciudades de asilo
  lexicon: HALOT
  rationale: Es el término técnico bíblico estándar para las ciudades designadas como refugio. 'Ciudades de refugio' comunica con claridad el valor legal y cultual del hebreo.
- source_word: שְׁכֶם
  english_pob_choice: Shechem
  chosen_spanish: Siquem
  alternatives_spanish:
  - Siquén
  - Siquén
  lexicon: N/A proper name
  rationale: Se usa la forma castellana establecida en biblias y estudios bíblicos, más natural que la transliteración inglesa 'Shechem'.
- source_word: מִגְרָשֶׁיהָ
  english_pob_choice: its pasturelands
  chosen_spanish: sus pastizales
  alternatives_spanish:
  - sus tierras de pasto
  - sus terrenos de pastoreo
  - sus praderas
  lexicon: HALOT
  rationale: מִגְרָשׁ designa el terreno abierto asociado a la ciudad, aquí particularmente para pastoreo. 'Pastizales' conserva el sentido funcional de terreno de pasto sin introducir el matiz urbano de 'suburbios'.
- source_word: בְּהַר אֶפְרָיִם
  english_pob_choice: in the hill country of Ephraim
  chosen_spanish: en la región montañosa de Efraín
  alternatives_spanish:
  - en la sierra de Efraín
  - en la tierra montañosa de Efraín
  - en el monte de Efraín
  lexicon: HALOT
  rationale: El hebreo denota la zona alta/accidentada asociada a Efraín, no una sola montaña. 'Región montañosa' refleja bien esa extensión geográfica en español actual.
- source_word: גֶּזֶר
  english_pob_choice: Gezer
  chosen_spanish: Gezer
  alternatives_spanish:
  - Guézer
  lexicon: N/A proper name
  rationale: Nombre propio transliterado de forma reconocible y consistente.
theological_decisions:
- issue: Término técnico 'ciudades de refugio'
  english_pob_reading: the cities of refuge
  chosen_spanish_reading: las ciudades de refugio
  alternative_spanish_readings:
  - las ciudades refugio
  - las ciudades de asilo
  rationale: No se atenúa el valor jurídico-teológico del concepto. La fórmula 'de refugio' mantiene la institución establecida por la Torá y evita reemplazarla por un término menos específico.
  doctrine_reference: Números 35; Josué 20
translation_notes:
  revision_awareness: 'El pasaje coincide sustancialmente con el audit trail en inglés: se mantiene la estructura enumerativa, la equivalencia de ''cities of refuge'' y el binomio ciudad + tierras asociadas. La única adaptación principal es la elección de español natural (''les dieron'', ''región montañosa'', ''pastizales'') sin perder el matiz técnico del texto hebreo.'
  spanish_consistency_notes:
  - Se mantiene 'Siquem' y 'Gezer' como nombres propios, evitando mezclas con transliteraciones inglesas.
  - '''Ciudades de refugio'' conserva la terminología legal bíblica; no se sustituye por ''asilo'' en el texto principal.'
  - '''Pastizales'' traduce de forma funcional מִגְרָשׁ, siguiendo la intención de tierras de pasto/uso abierto alrededor de la ciudad.'
  - La nota al pie preserva la alternativa formal documentada en el audit trail inglés.
