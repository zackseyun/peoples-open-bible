translation:
  language: es
  text: Así que edificó allí un altar e invocó[a] el nombre de Yahvé, y plantó allí su tienda[b]. Y los siervos de Isaac cavaron allí un pozo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «proclamó el nombre de Yahvé». El hebreo puede expresar invocación o proclamación; aquí el contexto del altar favorece la invocación.
    reason: alternative_reading
  - marker: b
    text: O «Así que edificó allí un altar, invocó el nombre de Yahvé y plantó allí su tienda».
    reason: previous_rendering
lexical_decisions:
- source_word: וַיִּ֧בֶן
  english_pob_choice: built
  chosen_spanish: edificó
  alternatives_spanish:
  - construyó
  - levantó
  lexicon: HALOT
  rationale: בנה en este relato narrativo admite «edificar»; conserva la acción de levantar una estructura de culto sin sonar demasiado técnica o arcaica. «Construyó» sería posible, pero «edificó» encaja mejor con el registro bíblico y con «altar».
- source_word: מִזְבֵּ֗חַ
  english_pob_choice: altar
  chosen_spanish: altar
  alternatives_spanish:
  - ara
  lexicon: HALOT
  rationale: Es el equivalente regular y transparente para מִזְבֵּחַ en este contexto de culto patriarcal.
- source_word: וַיִּקְרָא בְּשֵׁם יְהוָה
  english_pob_choice: called on the name of Yahweh
  chosen_spanish: llamó en el nombre de Yahvé
  alternatives_spanish:
  - invocó el nombre de Yahvé
  - proclamó el nombre de Yahvé
  lexicon: HALOT
  rationale: Con el contexto del altar, el hebreo permite tanto invocación como proclamación. La frase española «llamó en el nombre de Yahvé» conserva la fuerza idiomática sin decidir en exceso por una paráfrasis interpretativa. Se añade nota para explicitar la alternativa semántica.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: El texto hebreo usa el Nombre divino; el estándar del proyecto pide «Yahvé» como transliteración del Tetragrámaton, no una sustitución por título.
- source_word: וַיֶּט
  english_pob_choice: pitched
  chosen_spanish: plantó
  alternatives_spanish:
  - tendió
  - armó
  lexicon: HALOT
  rationale: Con אֹהֶל, נטה significa idiomáticamente «tender/plantar una tienda». «Plantó» es natural en español bíblico y comunica la instalación de la tienda sin forzar una traducción literal poco idiomática.
- source_word: אָהֳל֑וֹ
  english_pob_choice: his tent
  chosen_spanish: su tienda
  alternatives_spanish:
  - su carpa
  lexicon: HALOT
  rationale: «Tienda» es el equivalente estable para אָהֶל en este pasaje patriarcal; el posesivo refleja correctamente el sufijo de tercera persona masculina singular.
- source_word: וַיִּכְרוּ
  english_pob_choice: dug
  chosen_spanish: cavaron
  alternatives_spanish:
  - excavaron
  - abrieron
  lexicon: HALOT
  rationale: El verbo de cavar pozos se expresa de forma natural con «cavaron»; mantiene la sencillez narrativa del hebreo.
- source_word: עַבְדֵי יִצְחָק
  english_pob_choice: Isaac’s servants
  chosen_spanish: los siervos de Isaac
  alternatives_spanish:
  - los esclavos de Isaac
  - los servidores de Isaac
  lexicon: HALOT
  rationale: 'Aunque עבד puede significar «esclavo», aquí el contexto doméstico y funcional de la tarea hace preferible «siervos» en español, tal como el POB inglés optó por «servants» y no por «slaves». '
- source_word: בְּאֵר
  english_pob_choice: a well
  chosen_spanish: un pozo
  alternatives_spanish:
  - un aljibe
  lexicon: HALOT
  rationale: בְּאֵר en relatos patriarcales refiere un pozo de agua; «pozo» es la equivalencia normal y suficiente.
- source_word: שָׁם
  english_pob_choice: there
  chosen_spanish: allí
  alternatives_spanish:
  - ahí
  lexicon: HALOT
  rationale: Se conserva la repetición adverbial del hebreo con «allí», manteniendo el énfasis narrativo en el lugar.
theological_decisions:
- issue: Nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Jehová
  rationale: El audit trail inglés trata el Tetragrámaton como nombre propio divino. En español, «Yahvé» comunica ese nombre sin sustituirlo por un título y mantiene coherencia con la política del proyecto.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Sentido de וַיִּקְרָא בְּשֵׁם יְהוָה
  english_pob_reading: called on the name of Yahweh
  chosen_spanish_reading: llamó en el nombre de Yahvé
  alternative_spanish_readings:
  - invocó el nombre de Yahvé
  - proclamó el nombre de Yahvé
  rationale: El hebreo admite una oscilación entre invocación y proclamación. El contexto inmediato de altar favorece la idea de culto/invocación; sin embargo, la fórmula permanece idiomática en español para no cerrar indebidamente la tensión semántica.
  doctrine_reference: DOCTRINE.md Translation philosophy §1, §3
- issue: עַבְדֵי יִצְחָק
  english_pob_reading: Isaac’s servants
  chosen_spanish_reading: los siervos de Isaac
  alternative_spanish_readings:
  - los esclavos de Isaac
  rationale: No hay indicio contextual de esclavitud como foco teológico o narrativo; por eso se conserva el valor funcional de la casa/entorno laboral. La opción «esclavos» sería demasiado cargada para este verso.
  doctrine_reference: 'DOCTRINE.md: lexical policy on δοῦλος / עבד context-sensitive rendering'
translation_notes:
  revision_awareness: 'El contexto inglés pasó por una revisión que ajustó la secuencia verbal para reflejar mejor los tres verbos wayyiqtol del hebreo y luego restauró la claridad con el sujeto repetido en la segunda cláusula. La versión española sigue esa secuencia narrativa de acciones coordinadas: edificar, llamar, plantar la tienda y cavar el pozo. También respeta la decisión estable de renderizar el Nombre divino como Yahvé, en lugar de sustituirlo por una perífrasis.'
  spanish_consistency_notes:
  - Se conserva la repetición de «allí» para reproducir el énfasis locativo del hebreo.
  - «Siervos» se usa de manera consistente con la política del proyecto para עבד en contexto doméstico, evitando «esclavos» cuando no es necesario.
  - «Yahvé» se mantiene como forma estándar para יְהוָה.
  - La cláusula «llamó en el nombre de Yahvé» deja abierta la tensión invocar/proclamar sin resolverla de forma excesiva.
