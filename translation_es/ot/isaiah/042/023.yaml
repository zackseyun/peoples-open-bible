translation:
  language: es
  text: ¿Quién de entre ustedes escuchará esto[a], prestará atención y oirá de aquí en adelante?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'en el futuro', 'más adelante' o 'después'. El hebreo dice literalmente 'hacia atrás', usado de manera idiomática para lo que viene después.
    reason: lexical_alternative
lexical_decisions:
- source_word: מִי
  english_pob_choice: Who
  chosen_spanish: ¿Quién
  alternatives_spanish:
  - ¿Quién es el que
  - ¿Quién de ustedes
  lexicon: HALOT
  rationale: Interrogativo directo y natural en español, manteniendo el tono retórico del hebreo.
- source_word: בָכֶם
  english_pob_choice: among you
  chosen_spanish: de entre ustedes
  alternatives_spanish:
  - entre ustedes
  - de ustedes
  lexicon: HALOT
  rationale: La preposición ב con sufijo plural aquí expresa pertenencia al grupo; 'de entre ustedes' conserva la idea colectiva sin sonar rígida.
- source_word: יַאֲזִין
  english_pob_choice: will listen
  chosen_spanish: escuchará
  alternatives_spanish:
  - oirá con atención
  - dará oído
  lexicon: HALOT
  rationale: Hifil de אזן implica escuchar con atención; 'escuchará' es claro y digno en español contemporáneo.
- source_word: זֹאת
  english_pob_choice: this
  chosen_spanish: esto
  alternatives_spanish:
  - estas cosas
  - este mensaje
  lexicon: HALOT
  rationale: El demostrativo singular femenino apunta al mensaje o advertencia presente; en español neutro, 'esto' reproduce bien esa referencia discursiva.
- source_word: יַקְשִׁב
  english_pob_choice: will pay attention
  chosen_spanish: prestará atención
  alternatives_spanish:
  - atenderá
  - se pondrá atento
  lexicon: HALOT
  rationale: קשב intensifica la escucha atenta; 'prestará atención' distingue este verbo del primero sin caer en arcaísmo.
- source_word: וְיִשְׁמַע
  english_pob_choice: and hear
  chosen_spanish: y oirá
  alternatives_spanish:
  - y escuchará
  - y obedecerá
  lexicon: HALOT
  rationale: Aquí שמע conserva su sentido auditivo en paralelo con los verbos de escuchar; 'oirá' mantiene la proximidad formal al hebreo sin introducir obediencia que el contexto inmediato no exige.
- source_word: לְאָחוֹר
  english_pob_choice: hereafter
  chosen_spanish: de aquí en adelante
  alternatives_spanish:
  - en adelante
  - para el futuro
  - después
  lexicon: HALOT
  rationale: La expresión hebrea literalmente dice 'hacia atrás', pero idiomáticamente se refiere a lo que viene después. 'De aquí en adelante' comunica esa referencia temporal en español sin perder la tensión idiomática.
translation_notes:
  revision_awareness: 'El texto inglés auditado pasó de ''for the time to come'' a ''hereafter'' para reforzar el matiz temporal formal de לְאָחוֹר. La versión española conserva ese sentido con una locución natural (''de aquí en adelante'') que evita el calco literal sin perder la orientación al futuro. También se preservó la triple progresión verbal del hebreo: escuchar, prestar atención y oír.'
  spanish_consistency_notes:
  - Se mantuvo 'Yahvé' fuera del versículo porque el hebreo no contiene el Tetragrámaton aquí.
  - Se distinguieron dos verbos de escucha en español para reflejar la pareja hebrea no idéntica.
  - '''Esto'' se usa como demostrativo discursivo singular, no como plural.'
