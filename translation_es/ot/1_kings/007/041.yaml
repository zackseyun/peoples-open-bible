  glossary_alignment: No hay problemas con terminología teológica del proyecto. En lo léxico-arquitectónico, 'capiteles' y 'pilares' están bien alineados con la auditoría POB. Debe preservarse la alternativa de גֻלֹּת ('globos' o 'formas redondeadas') en una nota sobre 'copas', y la alternativa tradicional para כֹּתָרֹת debe expresarse en español como 'chapiteles', no omitirse.
