id: ROM.9.5
reference: Romans 9:5
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: ὧν οἱ πατέρες, καὶ ἐξ ὧν ὁ χριστὸς τὸ κατὰ σάρκα, ὁ ὢν ἐπὶ πάντων, θεὸς εὐλογητὸς εἰς τοὺς αἰῶνας· ἀμήν.
base_translation:
  language: en
  yaml_path: translation/nt/romans/009/005.yaml
  text: theirs are the fathers[a], and from them, according to the flesh, is the Messiah, who is over all, God blessed forever[b]. Amen.
  footnotes:
  - marker: a
    text: Or, 'with respect to human descent.' Literally, 'according to the flesh.'
    reason: lexical_alternative
  - marker: b
    text: Or, taking the last clause as a separate doxology, 'May God, who is over all, be blessed forever. Amen,' rather than a description of the Messiah.
    reason: alternative_reading
translation:
  language: ko
  text: 조상들도 그들의 것이며, 육체를 따라서는 메시아께서 그들에게서 나셨습니다. 그분은 만물 위에 계신 분, 영원히 찬송받으실 하나님이십니다. 아멘.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 또는 마지막 구절을 별도의 송영으로 끊어 「만물 위에 계신 하나님은 영원히 찬송받으실지어다. 아멘」으로 읽을 수도 있다. 그러나 헬라어 어순과 분사 구문(ὁ ὢν)은 메시아에 대한 서술로 읽는 것이 가장 자연스러우므로 본문은 고기독론적 독법을 채택했다.
    reason: alternative_reading
lexical_decisions:
- source_word: οἱ πατέρες
  english_pob_choice: the fathers
  chosen_korean: 조상들
  alternatives_korean:
  - 족장들
  - 선조들
  lexicon: BDAG
  rationale: 이스라엘 언약사의 「아버지들」을 가리키는 표준 한국어 표현.
- source_word: ὁ χριστός
  english_pob_choice: the Messiah
  chosen_korean: 메시아
  alternatives_korean:
  - 그리스도
  lexicon: BDAG
  rationale: 정관사가 붙은 칭호적 용법. 정책에 따라 「메시아」.
- source_word: ὁ ὢν ἐπὶ πάντων, θεὸς εὐλογητὸς
  english_pob_choice: who is over all, God blessed
  chosen_korean: 만물 위에 계신 분, 영원히 찬송받으실 하나님
  alternatives_korean:
  - 만물 위에 계신 하나님, 영원히 찬송받으실 분
  lexicon: BDAG
  rationale: ὁ ὢν 분사를 ὁ χριστός에 대한 동격으로 읽어 메시아 = 만물 위에 계신 하나님이라는 서술로 옮긴다.
theological_decisions:
- issue: ὁ ὢν ἐπὶ πάντων, θεὸς εὐλογητὸς εἰς τοὺς αἰῶνας 구절을 메시아에 대한 서술로 읽을 것인가, 아버지께 드리는 별도의 송영으로 읽을 것인가
  chosen_reading: 메시아에 대한 서술(고기독론)로 읽는다
  alternative_readings:
  - 만물 위에 계신 하나님께 별도의 송영으로 끊어 읽기
  rationale: 관사가 있는 분사 ὁ ὢν은 가장 자연스럽게 직전의 ὁ χριστός에 동격으로 붙는다. 사본 단계의 구두점이 명시적이지 않으므로 대안 독법을 각주에 보존하되, 본문은 고기독론적 독법을 따른다. EN POB의 결정과 일치하며, 정통 신학 전통과도 부합한다.
  doctrine_reference: DOCTRINE.md §1 본문 우선; Nicene Creed (381); Definition of Chalcedon (451)
