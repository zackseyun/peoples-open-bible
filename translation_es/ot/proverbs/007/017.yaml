  spanish_consistency_notes:
  - Se mantuvo un registro bíblico claro y natural en español, evitando calcos innecesarios.
  - 'La lista de aromas conserva la sucesión simple del hebreo: mirra, áloes y canela.'
  - El marcador de nota [a] aparece en el lugar correspondiente a «áloes» para preservar la alternativa lexical documentada.
