  language: en
  yaml_path: translation/ot/daniel/005/007.yaml
  text: The king called out loudly to bring in the enchanters[a], the Chaldeans, and the diviners. The king answered and said to the wise men of Babylon, “Any man who reads this writing and makes its interpretation known to me shall be clothed with purple, have a chain of gold around his neck[c][b], and rule as third in the kingdom.”
  footnotes:
  - marker: a
    text: Or “the astrologers” for “the Chaldeans,” since the term can denote a class of Babylonian court sages rather than the ethnic group alone.
    reason: lexical_alternative
  - marker: b
    text: “Any man” renders a grammatically masculine singular expression used generically here; the sense is “anyone.”
    reason: lexical_alternative
  - marker: c
    text: Or “be the third ruler in the kingdom.” The Aramaic likely refers to rank as third in authority.
    reason: alternative_reading
