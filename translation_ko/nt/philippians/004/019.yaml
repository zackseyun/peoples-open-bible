id: PHP.4.19
reference: Philippians 4:19
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: ὁ δὲ θεός μου πληρώσει πᾶσαν χρείαν ὑμῶν κατὰ ⸂τὸ πλοῦτος⸃ αὐτοῦ ἐν δόξῃ ἐν Χριστῷ Ἰησοῦ.
base_translation:
  language: en
  yaml_path: translation/nt/philippians/004/019.yaml
  text: And my God will supply every need of yours according to his riches in glory in Messiah Jesus.
translation:
  language: ko
  text: 나의 하나님께서 메시아 예수[a] 안에서 영광 가운데[b] 그분의 풍성하심을 따라[c] 여러분의 모든 필요를 채워 주실 것입니다.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 또는 「그리스도 예수」. Χριστός를 칭호로 옮기는 본 번역의 원칙에 따라 「메시아」로 번역한다.
    reason: lexical_alternative
  - marker: b
    text: 또는 「영광스럽게」(부사적 해석). 「영광 가운데」는 헬라어의 함의를 좁히지 않고 보존한다.
    reason: alternative_reading
  - marker: c
    text: 「그분의 풍성하심을 따라」는 단지 「그분의 풍성하심에서」(출처)가 아니라 「풍성하심의 분량에 따라」(척도)를 가리킨다.
    reason: alternative_reading
lexical_decisions:
- source_word: ὁ δὲ θεός μου
  english_pob_choice: And my God
  chosen_korean: 나의 하나님께서
  alternatives_korean:
  - 그러나 나의 하나님께서
  - 한편 나의 하나님께서
  lexicon: BDAG
  rationale: δέ는 가벼운 연결어로 한국어에서는 자연스러운 흐름상 생략한다. 「나의」(μου)는 바울의 친밀한 신앙고백 어조를 보존한다.
- source_word: πληρώσει
  english_pob_choice: will supply
  chosen_korean: 채워 주실 것입니다
  alternatives_korean:
  - 채우실 것입니다
  - 공급하실 것입니다
  lexicon: BDAG
  rationale: πληρόω의 「부족함을 채움」을 「채워 주실 것입니다」로 자연스럽게 옮긴다. 합쇼체 경어 「-시-」와 미래 약속 「-실 것」을 함께 살린다.
- source_word: πᾶσαν χρείαν ὑμῶν
  english_pob_choice: every need of yours
  chosen_korean: 여러분의 모든 필요를
  alternatives_korean:
  - 여러분에게 필요한 모든 것을
  - 여러분의 모든 쓸 것을
  lexicon: BDAG
  rationale: 분배적 πᾶσαν의 함의를 「모든」으로 살리고, 16절의 「필요」(χρεία)와 어휘 일관성을 유지한다.
- source_word: κατὰ τὸ πλοῦτος αὐτοῦ
  english_pob_choice: according to his riches
  chosen_korean: 그분의 풍성하심을 따라
  alternatives_korean:
  - 그분의 풍성하심을 좇아
  - 그분의 풍성하심으로부터
  lexicon: BDAG
  rationale: κατά + 대격의 「~을 따라/척도로」를 「~을 따라」로 명시하여, 출처(「~에서」)가 아닌 척도(「분량에 따라」)의 함의를 보존한다. 합쇼체 경어 「풍성하심」을 사용한다.
- source_word: ἐν δόξῃ
  english_pob_choice: in glory
  chosen_korean: 영광 가운데
  alternatives_korean:
  - 영광스럽게
  - 영광 안에서
  lexicon: BDAG
  rationale: 헬라어가 의도적으로 열어 둔 모호함(영역적·양태적)을 「영광 가운데」로 보존한다. 부사적 「영광스럽게」는 한 해석으로 좁힌다.
- source_word: ἐν Χριστῷ Ἰησοῦ
  english_pob_choice: in Messiah Jesus
  chosen_korean: 메시아 예수 안에서
  alternatives_korean:
  - 그리스도 예수 안에서
  - 메시아 예수와 연합하여
  lexicon: BDAG
  rationale: 본 번역의 칭호 번역 원칙에 따라 「메시아」를 유지한다. 7절과 동일한 결정.
theological_decisions:
- issue: ἐν Χριστῷ Ἰησοῦ에서 Χριστός를 칭호로 번역
  chosen_reading: 메시아 예수 안에서
  alternative_readings:
  - 그리스도 예수 안에서
  rationale: 7절과 동일한 원칙. 본 번역은 칭호로 기능하는 Χριστός를 칭호로 옮긴다.
  doctrine_reference: 'Contested terms: Χριστός → Messiah (where title; Christ where name-like)'
