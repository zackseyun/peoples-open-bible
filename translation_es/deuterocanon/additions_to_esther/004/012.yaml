translation:
  language: es
  text: 'Y alzando el cetro de oro, lo puso sobre su cuello, y la besó[a] y le dijo: «Háblame».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «la saludó»; el verbo griego puede denotar saludo, pero aquí el contexto favorece un beso físico.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἄρας
  english_pob_choice: lifting up
  chosen_spanish: alzando
  alternatives_spanish:
  - levantando
  - habiendo alzado
  lexicon: BDAG
  rationale: El participio aoristo introduce la acción previa del rey. «Alzando» conserva el gesto concreto y suena natural en español sin convertirlo en una perífrasis pesada.
- source_word: χρυσῆν ῥάβδον
  english_pob_choice: the golden scepter
  chosen_spanish: el cetro de oro
  alternatives_spanish:
  - la vara de oro
  - el bastón de oro
  lexicon: LSJ
  rationale: ῥάβδος puede ser vara, bastón o cetro; en un contexto real de corte, «cetro» comunica mejor el objeto regio. Se mantiene «de oro» para reflejar χρυσῆν.
- source_word: ἐπέθηκεν
  english_pob_choice: he placed
  chosen_spanish: lo puso
  alternatives_spanish:
  - lo colocó
  - lo depositó
  lexicon: BDAG
  rationale: τίθημι con ἐπί describe el acto de poner sobre alguien algo. «Lo puso» es directo, idiomático y suficientemente literal.
- source_word: ἐπὶ τὸν τράχηλον αὐτῆς
  english_pob_choice: on her neck
  chosen_spanish: sobre su cuello
  alternatives_spanish:
  - en su cuello
  - sobre el cuello de ella
  lexicon: BDAG
  rationale: τράχηλος significa «cuello». «Sobre su cuello» conserva la relación espacial del griego y suena natural en español.
- source_word: ἠσπάσατο
  english_pob_choice: kissed
  chosen_spanish: la besó
  alternatives_spanish:
  - la saludó con un beso
  - la saludó
  lexicon: BDAG
  rationale: ἀσπάζομαι puede significar saludar, pero el contexto narrativo con el gesto físico favorece un beso literal. «La besó» refleja mejor la acción inmediata.
- source_word: Λάλησόν μοι
  english_pob_choice: Speak to me
  chosen_spanish: Háblame
  alternatives_spanish:
  - Hable conmigo
  - Dime
  lexicon: BDAG
  rationale: El imperativo de λαλέω con μοι pide una invitación directa. «Háblame» es la forma natural y fiel en español.
