translation:
  language: es
  text: Pero yo[a], como mis hermanos, entrego tanto el cuerpo como la vida por las leyes de nuestros padres, invocando a Dios para que pronto tenga misericordia de la nación, y para que tú, mediante tormentos y azotes[b], confieses que solo él es Dios.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «suerte» o «destino». El término griego τύχην puede referirse al lote o destino de una persona, pero aquí el contexto de martirio hace que «vida» comunique mejor lo que se entrega.
    reason: lexical_alternative
  - marker: b
    text: O «reconozcas abiertamente». El verbo traducido «confieses» también puede implicar una admisión pública.
    reason: lexical_alternative
lexical_decisions:
- source_word: καθάπερ
  english_pob_choice: like
  chosen_spanish: como
  alternatives_spanish:
  - tal como
  - así como
  lexicon: LSJ
  rationale: La comparación con los hermanos se expresa de forma natural en español con «como», conservando la fuerza comparativa sin añadir énfasis indebido.
- source_word: σῶμα
  english_pob_choice: body
  chosen_spanish: el cuerpo
  alternatives_spanish:
  - mi cuerpo
  lexicon: LSJ
  rationale: Se mantiene el sentido físico literal del cuerpo ofrecido en el martirio.
- source_word: τύχην
  english_pob_choice: life
  chosen_spanish: la vida
  alternatives_spanish:
  - la suerte
  - el destino
  - la fortuna
  lexicon: LSJ
  rationale: Aunque el griego puede significar suerte o destino, en este contexto de martirio el sentido concreto es la vida que se entrega; «la vida» comunica mejor ese valor práctico en español.
- source_word: προδίδωμι
  english_pob_choice: give up
  chosen_spanish: entrego
  alternatives_spanish:
  - suelto
  - renuncio a
  - sacrifico
  - abandono
  lexicon: LSJ
  rationale: «Entrego» conserva la idea de ceder voluntariamente cuerpo y vida, sin la carga indebida de «traicionar» que tendría un calco del verbo.
- source_word: περὶ τῶν πατρίων νόμων
  english_pob_choice: for the laws of our fathers
  chosen_spanish: por las leyes de nuestros padres
  alternatives_spanish:
  - por nuestras leyes ancestrales
  - a favor de las leyes de nuestros antepasados
  lexicon: LSJ
  rationale: Se conserva la referencia familiar y hereditaria de πατρίων con «nuestros padres», siguiendo la textura del original y evitando una abstracción excesiva.
- source_word: ἐπικαλούμενοι τὸν θεόν
  english_pob_choice: calling on God
  chosen_spanish: invocando a Dios
  alternatives_spanish:
  - llamando a Dios
  - apelando a Dios
  lexicon: LSJ
  rationale: «Invocando» expresa bien la apelación orante en el contexto del martirio y mantiene un registro reverente y natural en español.
- source_word: ἵλεων ... γενέσθαι
  english_pob_choice: to become merciful
  chosen_spanish: sea misericordioso
  alternatives_spanish:
  - se muestre propicio
  - sea favorable
  lexicon: LSJ
  rationale: El griego expresa que Dios llegue a estar en actitud favorable/compasiva; «sea misericordioso» comunica esa disposición de forma clara y digna en español.
- source_word: τῷ ἔθνει
  english_pob_choice: to the nation
  chosen_spanish: con la nación
  alternatives_spanish:
  - para con el pueblo
  - al pueblo
  lexicon: LSJ
  rationale: «Nación» preserva el referente colectivo de Israel como pueblo nacional; la preposición «con» funciona aquí con el verbo «ser misericordioso» para expresar el objeto de la compasión divina.
- source_word: μετὰ ἐτασμῶν καὶ μαστίγων
  english_pob_choice: through torments and whippings
  chosen_spanish: mediante tormentos y azotes
  alternatives_spanish:
  - por medio de tormentos y flagelos
  - con tormentos y latigazos
  lexicon: LSJ
  rationale: «Tormentos y azotes» es una combinación clara y fiel para las dos herramientas de coerción del texto; «azotes» refleja mejor μαστίγων en español que una traducción más técnica o arcaica.
- source_word: ἐξομολογήσασθαι
  english_pob_choice: to confess
  chosen_spanish: confieses
  alternatives_spanish:
  - reconozcas abiertamente
  - declares
  lexicon: LSJ
  rationale: En este contexto el verbo puede significar confesar o reconocer abiertamente. «Confieses» conserva la solemnidad de la admisión forzada del señorío divino, aunque también deja abierta la lectura de reconocimiento público.
- source_word: διότι μόνος αὐτὸς θεὸς ἐστίν
  english_pob_choice: that he alone is God
  chosen_spanish: que solo él es Dios
  alternatives_spanish:
  - que él solo es Dios
  - que Dios es el único
  lexicon: LSJ
  rationale: La frase subraya la exclusividad monoteísta. «Solo él es Dios» mantiene el énfasis del griego y el referente personal de αὐτός al Dios ya mencionado.
theological_decisions:
- issue: Confesión monoteísta final
  english_pob_reading: that he alone is God
  chosen_spanish_reading: que solo él es Dios
  alternative_spanish_readings:
  - que él solo es Dios
  - que Dios es el único
  rationale: El griego enfatiza la exclusividad con μόνος αὐτός. La redacción elegida preserva esa exclusividad y mantiene el referente personal a Dios sin suavizar la afirmación.
  doctrine_reference: Monoteísmo bíblico; preservación de la exclusividad divina en traducción.
- issue: Alcance de πατρίων
  english_pob_reading: the laws of our fathers
  chosen_spanish_reading: las leyes de nuestros padres
  alternative_spanish_readings:
  - las leyes ancestrales
  - las leyes de nuestros antepasados
  rationale: Se opta por una formulación familiar y hereditaria que reproduce la textura del original. «Padres» conserva la relación de linaje y tradición presente en el griego.
  doctrine_reference: Preservar el valor pactual y familiar del lenguaje tradicional sin neutralizarlo.
- issue: Sujeto de la misericordia divina
  english_pob_reading: to become merciful to the nation
  chosen_spanish_reading: sea misericordioso con la nación
  alternative_spanish_readings:
  - se muestre favorable con la nación
  - tenga misericordia de la nación
  rationale: El original presenta a Dios llegando a ser favorable/compasivo hacia el pueblo. La opción elegida mantiene la iniciativa divina y la dirección de la misericordia hacia la nación.
  doctrine_reference: Gracia y misericordia divinas en lenguaje bíblico directo.
translation_notes:
  revision_awareness: Se siguió de cerca el expediente inglés, especialmente la decisión revisada que coloca «pronto» junto a la petición de misericordia y mantiene «vida» para τύχην. El español conserva esa relación sintáctica y el paralelo con los hermanos, sin perder la tensión entre confesión forzada y reconocimiento público.
  spanish_consistency_notes:
  - Se mantuvo Yahvé en la terminología general del proyecto cuando aparezca el Tetragrámaton; aquí el texto griego usa θεός, por lo que se traduce «Dios».
  - Se evitó «Señor» y «Cristo» porque no aparecen en este versículo.
  - Se conservó un registro reverente, pero moderno y publicable, sin arcaísmos innecesarios.
  - La puntuación separa con claridad la petición a Dios y la cláusula final de confesión, siguiendo la sintaxis griega.
