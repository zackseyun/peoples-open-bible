    text: 'Hebreo: «sé amargo y ... un lamento»; el verbo final es difícil en el hebreo conservado. El paralelo griego dice: «y como quien sufre terriblemente, comienza el lamento», lo que respalda el sentido adoptado aquí.'
    reason: textual_variant
