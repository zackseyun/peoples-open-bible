id: ACT.19.2
reference: Acts 19:2
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: εἶπέν ⸀τε πρὸς αὐτούς· Εἰ πνεῦμα ἅγιον ἐλάβετε πιστεύσαντες; οἱ ⸀δὲ πρὸς αὐτόν· Ἀλλ’ οὐδ’ εἰ πνεῦμα ἅγιον ἔστιν ἠκούσαμεν.
base_translation:
  language: en
  yaml_path: translation/nt/acts/019/002.yaml
  text: And he said to them[a], “Did you receive the Holy Spirit when you believed?” And they said to him, “No[b], we have not even heard that there is a Holy Spirit.”
  footnotes:
  - marker: a
    text: Or, 'Did you receive the Holy Spirit after believing?' The Greek participle can be understood with slightly different temporal nuance.
    reason: lexical_alternative
  - marker: b
    text: Or, 'we have not even heard whether there is a Holy Spirit,' or more interpretively, 'we have not even heard that the Holy Spirit has been given.'
    reason: alternative_reading
translation:
  language: ko
  text: 그가 그들에게 말하기를, 「여러분이 믿을 때에 성령을 받았습니까?」 하니, 그들이 그에게 말하기를, 「아니, 우리는 성령이 있는지조차 듣지 못하였습니다」 하였습니다.
  philosophy: optimal-equivalence
theological_decisions:
- issue: 19:1-7 에베소 12 제자의 「재세례」 — 요한의 세례를 받은 자가 다시 예수의 이름으로 세례를 받는 사건의 신학적 의미
  chosen_reading: 본문은 제자들이 「성령에 관해서도 듣지 못한」 상태에 있었으며, 따라서 「요한의 세례」가 종말론적 회개 세례로서 충분치 않았음을 함의한다. 바울은 그들을 다시 세례 주는데(5절), 이는 일반적 그리스도인 세례의 「재시행」이 아니라, 그들의 이전 세례가 「예수의 이름으로의 세례」였는지가 불명확한 사례에 대한 신학적 보충이다.
  alternative_readings:
  - 일반적 재세례 사례
  - 요한의 세례를 그리스도인 세례로 인정하지 않은 경우
  rationale: 사도행전 안에서 다른 제자들(가령 12사도)이 「예수의 이름으로 재세례」를 받았다는 기록이 없다. 본 본문은 요한의 세례만 받았던 자들이 그리스도 사건의 충만한 의미에 미치지 못한 상태에 있었던 특수한 과도기적 상황으로 읽힌다. 본 번역은 이 신학적 모호함을 직역으로 보존한다.
  doctrine_reference: 'DOCTRINE.md: baptism in Acts; cf. Acts 2:38, 8:16, 10:48'
