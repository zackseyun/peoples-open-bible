translation:
  language: es
  text: 'Y les dijo a los hombres del ejército[a]: «Luchen hoy por nuestros hermanos[b].»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «los soldados» / «los guerreros»; en griego, literalmente, «los hombres de la fuerza».
    reason: lexical_alternative
  - marker: b
    text: «Nuestros hermanos» puede referirse de manera amplia a los demás israelitas, no solo a hermanos biológicos.
    reason: lexical_alternative
lexical_decisions:
- source_word: τοῖς ἀνδράσιν
  english_pob_choice: to the men
  chosen_spanish: a los hombres
  alternatives_spanish:
  - a los soldados
  - a los guerreros
  lexicon: LSJ
  rationale: ἀνδράσιν nombra a varones dentro del grupo combatiente. «Hombres» preserva el rasgo de género y el sentido de miembros aptos para la guerra sin introducir un término más interpretativo como «soldados».
- source_word: τῆς δυνάμεως
  english_pob_choice: of the force
  chosen_spanish: de la fuerza
  alternatives_spanish:
  - del ejército
  - de la hueste
  lexicon: LSJ
  rationale: En contexto militar, δύναμις puede referirse a una fuerza armada. «De la fuerza» sigue de cerca el griego y mantiene la ambigüedad léxica sin precisar innecesariamente a «ejército».
- source_word: Πολεμήσατε
  english_pob_choice: Fight
  chosen_spanish: Luchen
  alternatives_spanish:
  - Combatan
  - Háganle guerra
  lexicon: LSJ
  rationale: El imperativo aoristo exhorta a una acción bélica inmediata. «Luchen» es natural en español y conserva la urgencia exhortativa del mandato.
- source_word: σήμερον
  english_pob_choice: today
  chosen_spanish: hoy
  alternatives_spanish:
  - este día
  lexicon: LSJ
  rationale: «Hoy» es la equivalencia española más natural para marcar la inmediatez del momento, como en el griego.
- source_word: ὑπὲρ
  english_pob_choice: for
  chosen_spanish: por
  alternatives_spanish:
  - en favor de
  - en defensa de
  lexicon: LSJ
  rationale: Aquí ὑπέρ expresa intervención solidaria y protectora en batalla. «Por» es breve e idiomático y deja que el contexto militar aporte la defensa implícita.
- source_word: τῶν ἀδελφῶν ἡμῶν
  english_pob_choice: our brothers
  chosen_spanish: nuestros hermanos
  alternatives_spanish:
  - nuestros hermanos y hermanas
  - nuestros parientes
  lexicon: LSJ
  rationale: ἀδελφῶν es masculino plural y, en este contexto, designa a los compañeros del pueblo. «Hermanos» conserva la forma del texto y la solidaridad comunitaria sin ampliar el alcance más allá del griego.
theological_decisions:
- issue: Referencia del término de parentesco en plural masculino
  english_pob_reading: our brothers may refer broadly to fellow Israelites, not only to biological brothers.
  chosen_spanish_reading: nuestros hermanos puede referirse de forma amplia a los demás israelitas, no solo a hermanos biológicos.
  alternative_spanish_readings:
  - nuestros hermanos y hermanas
  - nuestros compatriotas
  rationale: El griego usa ἀδελφῶν en masculino plural. Mantener «hermanos» respeta la forma textual y la política de precisión de género; a la vez, la nota aclara que el referente probable es la comunidad del pacto, no solo vínculos biológicos.
  doctrine_reference: 'DOCTRINE.md §Translation philosophy #4'
translation_notes:
  revision_awareness: El texto griego, la traducción inglesa POB y la revisión automática coinciden sustancialmente; no se detectaron cambios sustantivos necesarios. Se mantuvo la estructura directa del mandato y la ambigüedad controlada de δύναμις y ἀδελφοί.
  spanish_consistency_notes:
  - Se evitó «SEÑOR» u otras sustituciones no presentes en el texto.
  - Se conservó un registro bíblico claro y contemporáneo con puntuación española.
  - La frase «de la fuerza» mantiene la cercanía al griego sin sobrerinterpretar como «ejército».
  - La nota sobre «hermanos» preserva la tensión entre género gramatical y referencia comunitaria.
