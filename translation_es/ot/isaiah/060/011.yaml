  text: וּ/פִתְּח֨וּ שְׁעָרַ֧יִ/ךְ תָּמִ֛יד יוֹמָ֥ם וָ/לַ֖יְלָה לֹ֣א יִסָּגֵ֑רוּ לְ/הָבִ֤יא אֵלַ֨יִ/ךְ֙ חֵ֣יל גּוֹיִ֔ם וּ/מַלְכֵי/הֶ֖ם נְהוּגִֽים׃
base_translation:
  language: en
  yaml_path: translation/ot/isaiah/060/011.yaml
  text: Your gates will be open continually[a]; day and night they will not be shut, so that the wealth of the nations may be brought to you[b], with their kings led in procession.
  footnotes:
  - marker: a
    text: Or 'the riches of the nations'; Hebrew חֵיל can also mean 'strength' or 'army,' but here likely refers to material wealth brought as tribute.
    reason: lexical_alternative
  - marker: b
    text: Or 'with their kings being led' or 'their kings led along.' The Hebrew participle can suggest escort, procession, or subjugated leading.
    reason: lexical_alternative
