    changes_summary: Changed 'from leavened bread' to 'of leavened bread' for a more natural rendering of the Hebrew, and revised 'For this is what you have loved' to 'For so you have loved' to reflect the Hebrew more closely and idiomatically. Also adjusted punctuation slightly.
translation:
  language: es
  text: Y quemen una ofrenda de acción de gracias de pan con levadura[a], y proclamen ofrendas voluntarias; anúncienlas. Porque así lo han amado, hijos de Israel[b], declara el Señor Yahvé.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: También puede entenderse «con levadura» o «de pan leudado»; la frase hebrea vincula el material leudado con la ofrenda de acción de gracias.
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «hijos de Israel».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְקַטֵּר
  english_pob_choice: And burn
  chosen_spanish: Y quemen
  alternatives_spanish:
  - Y ofrezcan en humo
  - Y hagan subir en humo
  lexicon: HALOT
  rationale: El piel imperativo aquí manda hacer subir la ofrenda en el altar; en español, 'quemar' comunica de forma natural la acción cultual sin perder el valor sacrificial. Mantiene también el tono irónico del mandato profético.
- source_word: מֵחָמֵץ
  english_pob_choice: of leavened bread
  chosen_spanish: de pan con levadura
  alternatives_spanish:
  - con levadura
  - de panes leudados
  lexicon: HALOT
  rationale: La relación hebrea une el material leudado con la תודה. 'De pan con levadura' conserva la idea de materia leudada y suena más claro en español que una calca como 'de levadura'.
- source_word: תּוֹדָה
  english_pob_choice: a thank offering
  chosen_spanish: una ofrenda de acción de gracias
  alternatives_spanish:
  - una ofrenda de gratitud
  - una ofrenda de agradecimiento
  lexicon: HALOT
  rationale: En contexto sacrificial, תודה es un término técnico de ofrenda de gratitud/acción de gracias. 'Ofrenda de acción de gracias' preserva el sentido cultual y resulta idiomático en español bíblico moderno.
- source_word: וְקִרְאוּ
  english_pob_choice: and proclaim
  chosen_spanish: y proclamen
  alternatives_spanish:
  - y clamen
  - y publiquen
  lexicon: HALOT
  rationale: El verbo introduce una declaración pública. 'Proclamen' conserva la fuerza pública y ceremonial mejor que 'llamen' o 'griten'.
- source_word: נְדָבוֹת
  english_pob_choice: freewill offerings
  chosen_spanish: ofrendas voluntarias
  alternatives_spanish:
  - ofrendas de voluntariedad
  - ofrendas libremente dadas
  lexicon: HALOT
  rationale: El término es el equivalente sacrificial de ofrendas dadas espontáneamente. 'Ofrendas voluntarias' es transparente y conserva el valor técnico.
- source_word: הַשְׁמִיעוּ
  english_pob_choice: announce them
  chosen_spanish: anúncienlas
  alternatives_spanish:
  - háganlas oír
  - publíquenlas
  lexicon: HALOT
  rationale: El hiphil de שמע significa 'hacer oír'. En este contexto, 'anúncienlas' transmite la idea de publicitarlas. El pronombre femenino plural concuerda con 'ofrendas'.
- source_word: כִּי כֵן אֲהַבְתֶּם
  english_pob_choice: For so you have loved
  chosen_spanish: Porque así lo han amado
  alternatives_spanish:
  - Porque eso es lo que han amado
  - Pues de ese modo lo han amado
  lexicon: HALOT
  rationale: 'La frase expresa ironía y evaluación profética: eso es lo que han preferido amar. ''Así lo han amado'' conserva la estructura y el tono acusatorio sin sobreexplicar.'
- source_word: בְּנֵי יִשְׂרָאֵל
  english_pob_choice: O sons of Israel
  chosen_spanish: hijos de Israel
  alternatives_spanish:
  - hijos de Israel,
  - oh hijos de Israel
  lexicon: HALOT
  rationale: Se conserva el vocativo masculino plural del hebreo. En español, 'hijos de Israel' es claro y plenamente bíblico; no se neutraliza a 'pueblo' para no borrar el matiz formal del original.
- source_word: נְאֻם אֲדֹנָי יְהוִה
  english_pob_choice: declares the Lord GOD
  chosen_spanish: declara Yahvé Dios
  alternatives_spanish:
  - declara el Señor Yahvé
  - declara Yahvé, el Señor Dios
  lexicon: HALOT
  rationale: 'Se sigue la política española del proyecto: יְהוָה se traduce como ''Yahvé''. La combinación אֲדֹנָי יְהוִה se vierte ''Yahvé Dios'' para preservar ambos títulos sin recurrir al sustituto ''SEÑOR''.'
theological_decisions:
- issue: Traducción del nombre divino יְהוָה en la fórmula נְאֻם אֲדֹנָי יְהוִה
  english_pob_reading: declares the Lord GOD
  chosen_spanish_reading: declara Yahvé Dios
  alternative_spanish_readings:
  - declara el Señor Dios
  - declara el Señor Yahvé
  rationale: El texto hebreo usa explícitamente el Tetragrámaton. Conforme a la política del proyecto, se lo debe renderizar como 'Yahvé' en lugar de ocultarlo con 'SEÑOR'. 'Yahvé Dios' preserva el doble título del hebreo y evita perder la referencia al nombre del pacto.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión inglesa que prefirió 'of leavened bread' sobre 'from leavened bread' y 'For so you have loved' para reflejar mejor el hebreo. En español, esto se refleja en 'de pan con levadura' y 'Porque así lo han amado', manteniendo el sentido irónico y la relación sintáctica del original.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' para el Tetragrámaton, según la norma española del proyecto.
  - '''Ofrenda de acción de gracias'' se usa como equivalente técnico de תודה en contexto cultual.'
  - Se conserva el vocativo masculino plural 'hijos de Israel' sin neutralización.
  - El pronombre implícito de 'anúncienlas' concuerda con 'ofrendas' en femenino plural.
