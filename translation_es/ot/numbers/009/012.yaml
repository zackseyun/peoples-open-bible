review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja en general el sentido hebreo: no dejar nada hasta la mañana, no quebrar hueso alguno, y observar la Pascua conforme a su prescripción. Sin embargo, hay desajustes importantes: la nota [a] está anclada en la frase equivocada; «estatuta» no es español estándar adecuado aquí; y «la cumplirán» resulta menos natural para יַעֲשׂוּ אֹתוֹ en contexto festivo/ritual que «la celebrarán/observarán/guardarán».'
  spanish_quality_summary: 'La legibilidad del borrador se ve afectada por formulaciones poco naturales o incorrectas en español: «hueso suyo» suena forzado, «estatuta» es inaceptable en este registro, y la nota alternativa está colocada sobre «hasta la mañana» en vez de sobre la cláusula del hueso. Conviene ajustar a un español bíblico claro y digno.'
  glossary_alignment: «Pascua» está bien para הַפֶּסַח en este contexto. No hay términos de glosario mayor en juego como Yahvé/Mesías. La decisión de no introducir lectura cristológica en el texto principal está bien preservada. Se recomienda «según todo el estatuto de la Pascua» para reflejar חֻקַּת en singular colectivo con español natural.
  issues:
  - severity: high
    issue: La nota [a] está anclada en la frase incorrecta.
    rationale: La nota alternativa «no quebrarán ningún hueso suyo» corresponde a la cláusula sobre el hueso, no a «hasta la mañana». Esto desordena la evidencia lexical y la trazabilidad del audit trail.
  - severity: high
    issue: «Estatuta» no es una forma española adecuada aquí.
    rationale: Aunque intenta reflejar el femenino hebreo, en español estándar bíblico/jurídico corresponde «estatuto», «ordenanza» o «norma». «Estatuta» perjudica fidelidad idiomática y legibilidad.
  - severity: medium
    issue: «No quebrarán hueso suyo» es demasiado forzado.
    rationale: Preserva de manera rígida el posesivo, pero en español natural y fiel conviene «no le quebrarán ningún hueso» o «no quebrarán ningún hueso de él».
  - severity: medium
    issue: «La cumplirán» no es la mejor opción para יַעֲשׂוּ אֹתוֹ en contexto pascual.
    rationale: Con la Pascua, el sentido es observar/celebrar/guardar la observancia. «La celebrarán» o «la observarán» comunica mejor el uso idiomático ritual sin alejarse del hebreo.
  revised_spanish_text: No dejarán nada de él hasta la mañana, y no le quebrarán ningún hueso[a]; según todo el estatuto de la Pascua, la celebrarán[b].
  revised_footnotes:
