translation:
  language: es
  text: 'Pero la otra mujer dijo[a]: «¡No! Mi hijo es el que está vivo, y tu hijo es el que está muerto». Y esta dijo: «¡No! Tu hijo es el que está muerto, y mi hijo es el que está vivo». Así hablaron ante el rey.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más idiomáticamente: «Mi hijo está vivo, y tu hijo está muerto ... tu hijo está muerto, y mi hijo está vivo». El texto principal conserva el contraste hebreo entre el hijo vivo y el hijo muerto.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַתֹּאמֶר
  english_pob_choice: said
  chosen_spanish: dijo
  alternatives_spanish:
  - respondió
  - habló
  lexicon: HALOT
  rationale: Verbo narrativo normal para introducir la réplica en este intercambio judicial; en español, «dijo» es natural y preciso sin añadir matiz no atestiguado.
- source_word: הָאִשָּׁה הָאַחֶרֶת
  english_pob_choice: the other woman
  chosen_spanish: la otra mujer
  alternatives_spanish:
  - la otra esposa
  - la otra mujer implicada
  lexicon: HALOT
  rationale: «Mujer» conserva la referencia contextual a una de las dos contendientes sin importar una relación marital que el texto no explicita aquí.
- source_word: לֹא כִי
  english_pob_choice: No!
  chosen_spanish: ¡No!
  alternatives_spanish:
  - No, de ningún modo
  - ¡No, ciertamente!
  lexicon: HALOT
  rationale: La expresión funciona como una negación enfática y contenciosa; «¡No!» transmite bien la fuerza de la disputa en español moderno.
- source_word: בְּנִי הַחַי
  english_pob_choice: my son is the living one
  chosen_spanish: mi hijo es el vivo
  alternatives_spanish:
  - mi hijo está vivo
  - mi hijo es el que vive
  lexicon: HALOT
  rationale: Se conserva el contraste adjetival sustantivado entre «el vivo» y «el muerto», que refleja mejor la estructura hebrea que una simple paráfrasis con «está vivo».
- source_word: וּבְנֵךְ הַמֵּת
  english_pob_choice: and your son is the dead one
  chosen_spanish: y tu hijo es el muerto
  alternatives_spanish:
  - y tu hijo está muerto
  - y tu hijo es el que murió
  lexicon: HALOT
  rationale: Se mantiene el paralelismo con «el vivo», preservando la contraposición textual y el tono forense del diálogo.
- source_word: וְזֹאת אֹמֶרֶת
  english_pob_choice: And this one said
  chosen_spanish: Y esta dijo
  alternatives_spanish:
  - Y ésta dijo
  - Y la otra dijo
  lexicon: HALOT
  rationale: «Esta» conserva el deíctico hebreo זֹאת (‘esta’) y mantiene visible la alternancia entre las dos mujeres, en vez de neutralizarla con un pronombre genérico.
- source_word: הֶחָי
  english_pob_choice: the living one
  chosen_spanish: el vivo
  alternatives_spanish:
  - el que vive
  - el que está vivo
  lexicon: HALOT
  rationale: Se repite la misma solución del primer hemistiquio para conservar la simetría antitética del hebreo.
- source_word: וַתְּדַבֵּרְנָה
  english_pob_choice: So they spoke
  chosen_spanish: Así hablaron
  alternatives_spanish:
  - Y hablaron
  - De modo que hablaron
  lexicon: HALOT
  rationale: Resume el intercambio con una conclusión narrativa natural; «hablaron» evita sobreespecificar el matiz de «discutieron» que el hebreo no marca explícitamente en esta forma verbal.
- source_word: לִפְנֵי הַמֶּלֶךְ
  english_pob_choice: before the king
  chosen_spanish: delante del rey
  alternatives_spanish:
  - en presencia del rey
  - ante el rey
  lexicon: HALOT
  rationale: «Delante del rey» reproduce con fidelidad la relación espacial/judicial del hebreo y es perfectamente idiomático en español.
translation_notes:
  revision_awareness: Se siguió de cerca el texto hebreo y el audit trail inglés de la POB, sin introducir cambios de sentido; la única nota conserva la alternativa idiomática documentada para el contraste adjetival.
  spanish_consistency_notes:
  - Se mantuvo «rey» sin añadir «Salomón», porque el hebreo dice simplemente «el rey» y el contexto inmediato ya lo identifica.
  - Se preservó la alternancia deíctica «la otra mujer / esta» para reflejar el vaivén del litigio.
  - Se mantuvo el contraste léxico «el vivo / el muerto» como rasgo estructural del verso.
