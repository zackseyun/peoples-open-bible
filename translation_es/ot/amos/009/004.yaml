translation:
  language: es
  text: Y si van al cautiverio ante sus enemigos[a], desde allí ordenaré a la espada, y los matará; y pondré mis ojos sobre ellos para mal y no para bien.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «para calamidad y no para bien». El hebreo רָעָה aquí denota desastre o juicio perjudicial, no mal moral.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְאִם
  english_pob_choice: And if
  chosen_spanish: Y si
  alternatives_spanish:
  - Y aun si
  - Si
  lexicon: HALOT
  rationale: Conserva la conexión condicional del hebreo y la continuidad con el contexto inmediato, con una forma natural en español.
- source_word: יֵלְכוּ
  english_pob_choice: they go
  chosen_spanish: van
  alternatives_spanish:
  - van a ir
  - se van
  - marchan
  lexicon: HALOT
  rationale: El verbo hebreo es literalmente 'ir'; 'van' mantiene el sentido básico sin sobreinterpretar pasividad que no está expresada por la forma verbal.
- source_word: בַשְּׁבִי
  english_pob_choice: into captivity
  chosen_spanish: al cautiverio
  alternatives_spanish:
  - en cautiverio
  - como cautivos
  lexicon: HALOT
  rationale: En español, con el verbo de movimiento, 'al cautiverio' expresa bien la entrada en estado de cautiverio/exilio sin forzar una construcción más pesada.
- source_word: לִפְנֵי אֹיְבֵיהֶם
  english_pob_choice: before their enemies
  chosen_spanish: delante de sus enemigos
  alternatives_spanish:
  - ante sus enemigos
  - en presencia de sus enemigos
  lexicon: HALOT
  rationale: '''Delante de'' conserva la idea idiomática de encontrarse frente a/en poder de los enemigos con una formulación natural en español.'
- source_word: מִשָּׁם
  english_pob_choice: from there
  chosen_spanish: desde allí
  alternatives_spanish:
  - de allí
  - aun desde allí
  lexicon: HALOT
  rationale: Mantiene el valor locativo de origen y el contraste del juicio que alcanza aun el lugar del cautiverio.
- source_word: אֲצַוֶּה אֶת הַחֶרֶב
  english_pob_choice: I will command the sword
  chosen_spanish: mandaré la espada
  alternatives_spanish:
  - ordenaré a la espada
  - daré orden a la espada
  lexicon: HALOT
  rationale: En español, 'mandar la espada' suena más duro o menos claro que el hebreo; 'mandaré la espada' conserva el mandato divino y la personificación del arma como agente bajo control de Dios, sin añadir un objeto indirecto que el texto no exige.
- source_word: וַהֲרָגָתַם
  english_pob_choice: and it will kill them
  chosen_spanish: y los matará
  alternatives_spanish:
  - y los matará la espada
  - y los degollará
  lexicon: HALOT
  rationale: La concordancia con 'la espada' está implícita en español por el contexto; 'los matará' es claro y fiel al efecto verbal sin volver la frase pesada.
- source_word: וְשַׂמְתִּי עֵינִי עֲלֵיהֶם
  english_pob_choice: and I will set my eyes on them
  chosen_spanish: y pondré mis ojos sobre ellos
  alternatives_spanish:
  - y fijaré mis ojos sobre ellos
  - y estaré atento a ellos
  lexicon: HALOT
  rationale: El hebraísmo se conserva con una imagen comprensible en español y apta para el contraste final de juicio.
- source_word: לְרָעָה
  english_pob_choice: for harm
  chosen_spanish: para mal
  alternatives_spanish:
  - para desgracia
  - para calamidad
  lexicon: HALOT
  rationale: '''Mal'' mantiene la fuerza adversa del término hebreo sin convertirlo en ''mal'' moral; en español el contexto judicial ya orienta la lectura a calamidad o daño.'
- source_word: לְטוֹבָה
  english_pob_choice: for good
  chosen_spanish: para bien
  alternatives_spanish:
  - para prosperidad
  - para beneficio
  lexicon: HALOT
  rationale: '''Bien'' preserva el paralelo directo con ''mal'' y la oposición semántica del hebreo.'
theological_decisions:
- issue: Sentido de רָעָה en juicio divino
  english_pob_reading: for harm and not for good
  chosen_spanish_reading: para mal y no para bien
  alternative_spanish_readings:
  - para daño y no para bien
  - para calamidad y no para bien
  rationale: Se evita leer 'mal' como mal moral atribuido a Dios. El contexto de Amos 9:4 es de juicio pactual; en español, 'para mal' comunica el contraste adverso sin perder la dureza del original.
  doctrine_reference: La traducción distingue entre mal moral y desastre/judicio, manteniendo la lectura contextual del texto.
translation_notes:
  revision_awareness: La revisión inglesa más reciente no introdujo cambios; la concordancia general fue alta y no requirió ajustes. La versión española sigue el mismo perfil de decisión léxica, especialmente en el tratamiento de רָעָה y de la personificación de la espada.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' como forma por defecto en el proyecto cuando el nombre divino aparece explícitamente; en este versículo no aparece, así que no se introduce ninguna sustitución.
  - '''Mal'' y ''bien'' conservan el paralelismo hebreo y la oposición judicial.'
  - La imagen de 'poner mis ojos sobre ellos' se preserva por ser un hebraísmo transparente y teológicamente cargado.
  - No se añade una pasiva explícita en 'la espada' porque el contexto ya la identifica como agente; la frase española queda fluida y audit-able.
