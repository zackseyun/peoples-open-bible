revisions:
- from: Todas sus imágenes talladas[a] serán destrozadas, y todo el salario de prostitución[b] será quemado con fuego; todas sus ídolos haré desolación. Porque de salario de prostituta[c] los reunió, y al salario de prostituta volverán.
  to: Todas sus imágenes talladas[a] serán destrozadas, y todos sus salarios de prostituta[b] serán quemados con fuego; todos sus ídolos los dejaré desolados. Porque de los salarios de una prostituta los reunió,[c] y a los salarios de una prostituta volverán.
  rationale: La revisión corrige la gramática española, restituye mejor el plural y la personificación del hebreo («sus salarios de prostituta»), mejora la naturalidad sintáctica de las frases con «de/a los salarios de una prostituta», y reemplaza la construcción poco idiomática «haré desolación» por «los dejaré desolados», que transmite con claridad el juicio anunciado sin perder fuerza. Se conservan las notas léxicas y la alternativa de lectura, con marcadores correctamente anclados en el texto.
