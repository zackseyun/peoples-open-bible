translation:
  language: es
  text: 'Entonces Jacob llamó a sus hijos y dijo: «Reúnanse, y les diré lo que les ha de suceder en los últimos días[a]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «en los últimos días». La frase hebrea también puede tener en algunos contextos un sentido escatológico.'
    reason: alternative_reading
lexical_decisions:
- source_word: וַיִּקְרָא
  english_pob_choice: called
  chosen_spanish: llamó
  alternatives_spanish:
  - convocó
  - llamó para sí
  lexicon: HALOT
  rationale: En este contexto narrativo, קרא expresa la acción de llamar o convocar a sus hijos. «Llamó» es natural en español y conserva el tono directo y solemne del pasaje.
- source_word: בָּנָיו
  english_pob_choice: his sons
  chosen_spanish: sus hijos
  alternatives_spanish:
  - sus hijos varones
  - sus hijos, los varones
  lexicon: HALOT
  rationale: El hebreo dice literalmente «sus hijos». Aunque el contexto inmediato apunta a los varones que encabezan las tribus, en español «hijos» reproduce el término sin forzar una especificación que el texto hebreo no añade aquí.
- source_word: הֵאָסְפוּ
  english_pob_choice: Gather yourselves
  chosen_spanish: Reúnanse
  alternatives_spanish:
  - Júntense
  - Congréguense
  lexicon: HALOT
  rationale: El imperativo niphal de אסף pide que se agrupen. «Reúnanse» transmite la fuerza reflexiva/recíproca del verbo y suena natural en español actual.
- source_word: וְאַגִּידָה לָכֶם
  english_pob_choice: and I will tell you
  chosen_spanish: y les diré
  alternatives_spanish:
  - y les anunciaré
  - y les declararé
  lexicon: HALOT
  rationale: La forma cohortativa expresa la intención de Jacob. «Les diré» conserva esa intención de manera idiomática y clara en español.
- source_word: אֵת אֲשֶׁר יִקְרָא אֶתְכֶם
  english_pob_choice: what will happen to you
  chosen_spanish: lo que les ha de suceder
  alternatives_spanish:
  - lo que les sucederá
  - lo que les sobrevendrá
  lexicon: HALOT
  rationale: El giro con קרא aquí apunta a lo que acontecerá o sobrevendrá a ellos, no a «llamar». «Lo que les ha de suceder» preserva el sentido futuro y un matiz de inevitabilidad, sin volverlo demasiado interpretativo.
- source_word: בְּאַחֲרִית הַיָּמִים
  english_pob_choice: in the latter days
  chosen_spanish: en los últimos días
  alternatives_spanish:
  - en los postreros días
  - en los días venideros
  lexicon: HALOT
  rationale: La expresión hebrea puede tener alcance futuro general o matiz escatológico según el contexto. «En los últimos días» mantiene la forma tradicional y deja abierta esa tensión interpretativa sin resolverla demasiado en una paráfrasis más débil.
theological_decisions:
- issue: Alcance de בְּאַחֲרִית הַיָּמִים
  english_pob_reading: in the latter days
  chosen_spanish_reading: en los últimos días
  alternative_spanish_readings:
  - en los días venideros
  - en el tiempo final
  rationale: En Génesis 49:1, Jacob habla del futuro de sus hijos y de las tribus. La frase hebrea puede señalar un futuro amplio y, en algunos contextos, tener carga escatológica. «En los últimos días» conserva esa posible tensión sin cerrarla a una sola lectura.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: La revisión inglesa reciente favoreció «in the latter days» frente a una fórmula más genérica; por eso el español evita una dilución como «en los días venideros» y opta por «en los últimos días», que conserva la literalidad relativa y la posible tensión escatológica documentada en el audit trail.
  spanish_consistency_notes:
  - Se mantuvo «Jacob» y no una forma tradicionalizante para el nombre propio, conforme al texto fuente.
  - Se evitó «SEÑOR» o terminología no pertinente; no aparece el Tetragrámaton en este versículo.
  - «Hijos» se conserva como traducción directa de בָּנָיו; no se introdujo una especificación de género en el cuerpo principal.
  - La nota al pie marca la alternativa temporal/escatológica sin sobreinterpretar el hebreo.
