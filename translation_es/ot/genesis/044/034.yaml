translation:
  language: es
  text: Porque, ¿cómo volveré a mi padre si el muchacho no está conmigo? No sea que vea la desgracia[a] que vendría sobre mi padre.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «el daño» o «la calamidad»; el hebreo רָע aquí se refiere a un perjuicio o desgracia concreta, no a mal moral.
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  lexicon: HALOT
  rationale: Introducción causal/discursiva que conecta la declaración de Judá con su argumento previo. En español, «Porque» expresa con naturalidad esa relación de fundamento.
- source_word: אֵיךְ
  english_pob_choice: how
  chosen_spanish: ¿cómo... ?
  alternatives_spanish:
  - ¿de qué manera... ?
  lexicon: HALOT
  rationale: La pregunta retórica expresa imposibilidad; el español «¿cómo subiré...?» conserva ese valor sin sobreexplicar.
- source_word: אֶעֱלֶה
  english_pob_choice: can I go up
  chosen_spanish: subiré
  alternatives_spanish:
  - iré subiendo
  - habré de subir
  lexicon: HALOT
  rationale: El verbo hebreo es literalmente «subir», muy apropiado para el retorno a la tierra/padre. El español mantiene la imagen verbal sin añadir modales ajenos al hebreo.
- source_word: אֶל אָבִי
  english_pob_choice: to my father
  chosen_spanish: a mi padre
  alternatives_spanish:
  - hacia mi padre
  lexicon: HALOT
  rationale: La relación de posesión ya está explícita en el hebreo; «a mi padre» es directo y fiel. No se añade el nombre propio porque el contexto ya identifica a Jacob como el padre.
- source_word: וְהַנַּעַר
  english_pob_choice: if the boy
  chosen_spanish: si el muchacho
  alternatives_spanish:
  - y el muchacho
  - si el joven
  lexicon: HALOT
  rationale: Aquí la conjunción funciona con la cláusula negativa siguiente como condición implícita. «Muchacho» conserva el valor de נַעַר y es natural en español para Benjamín.
- source_word: אֵינֶנּוּ אִתִּי
  english_pob_choice: is not with me
  chosen_spanish: no está conmigo
  alternatives_spanish:
  - no se encuentra conmigo
  - está ausente de mí
  lexicon: HALOT
  rationale: Reproduce de forma natural la negación existencial con la idea de compañía/presencia. «Conmigo» mantiene el matiz relacional del hebreo.
- source_word: פֶּן
  english_pob_choice: lest / Otherwise
  chosen_spanish: No sea que
  alternatives_spanish:
  - para que no
  - lest
  lexicon: HALOT
  rationale: «פֶּן» introduce un resultado temido o adverso. «No sea que» preserva la advertencia formal del hebreo y su valor precautorio sin modernizarlo en exceso.
- source_word: אֶרְאֶה
  english_pob_choice: I would have to see / I see
  chosen_spanish: vea
  alternatives_spanish:
  - llegue a ver
  - tenga que ver
  lexicon: HALOT
  rationale: Tras פֶּן, el imperfecto expresa una eventualidad temida. «Vea» mantiene la forma sencilla y deja que el contexto porte el matiz de posibilidad adversa.
- source_word: בָרָע
  english_pob_choice: the disaster / harm / calamity
  chosen_spanish: la desgracia
  alternatives_spanish:
  - el mal
  - la calamidad
  - el desastre
  lexicon: HALOT
  rationale: Aquí רָע no es mal moral sino infortunio grave que le sobrevendría a Jacob. «Desgracia» comunica bien el daño concreto y el tono lamentoso del pasaje.
- source_word: אֲשֶׁר יִמְצָא
  english_pob_choice: that would come upon
  chosen_spanish: que vendría sobre
  alternatives_spanish:
  - que alcanzaría
  - que sobrevendría a
  lexicon: HALOT
  rationale: «Encontrar» es idiomático en hebreo para un mal que alcanza a alguien. En español, «vendría sobre» conserva la idea de irrupción o acometida del mal sin resultar rígido.
- source_word: אֶת אָבִי
  english_pob_choice: my father
  chosen_spanish: mi padre
  alternatives_spanish:
  - a mi padre
  lexicon: HALOT
  rationale: El hebreo marca el objeto directo con אֶת, pero en español el posesivo basta. Se mantiene la referencia a Jacob sin redundancia sintáctica.
theological_decisions:
- issue: El valor de פֶּן como advertencia temida, no solo como resultado lógico
  english_pob_reading: Lest I see...
  chosen_spanish_reading: No sea que vea...
  alternative_spanish_readings:
  - para que no vea...
  - lest vea...
  rationale: La construcción española conserva el carácter precautorio y temeroso del hebreo, sin convertirlo en una mera consecuencia ni en una paráfrasis explicativa.
  doctrine_reference: No aplica; decisión de modalidad discursiva y semántica textual.
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión del inglés POB que sustituyó una paráfrasis explicativa por «Lest I see» para reflejar mejor פֶּן. En español se adoptó una solución igualmente formal y breve («No sea que vea») para preservar la advertencia temida sin añadir interpretación.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma general, pero este versículo no lo contiene.
  - Se eligió «muchacho» para נער por coherencia con el valor juvenil/familiar del término, sin convertirlo en «niño» ni en «joven» para no alterar el tono narrativo.
  - Se evitó usar «señor» o lenguaje eclesiástico ajeno al hebreo; el foco sigue en la relación filial y la amenaza de la desgracia sobre Jacob.
