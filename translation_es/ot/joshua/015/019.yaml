base_translation:
  language: en
  yaml_path: translation/ot/joshua/015/019.yaml
  text: She said[a], “Please give me a blessing, since you have given me the land of the Negev[c][b]; give me also springs of water.” So he gave her the upper springs and the lower springs.
  footnotes:
  - marker: a
    text: Or 'a gift.' The Hebrew says 'a blessing,' using covenantal language for a beneficial grant.
    reason: lexical_alternative
  - marker: b
    text: '''Negev'' can also mean ''southland'' or ''southern region.'''
    reason: lexical_alternative
  - marker: c
    text: The Hebrew term may denote springs, pools, or basins of water; 'springs' best fits the context here.
    reason: lexical_alternative
