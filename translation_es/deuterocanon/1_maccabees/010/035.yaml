translation:
  language: es
  text: Y nadie tendrá autoridad para actuar ni para hostigar[a] a ninguno de ellos en ningún asunto.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Hostigar» traduce παρενοχλεῖν como interferencia hostil o presión persistente; también podría entenderse como «molestar», pero ese término es más débil en español actual.
    reason: lexical_alternative
lexical_decisions:
- source_word: οὐχ ἕξει ἐξουσίαν
  english_pob_choice: will have authority
  chosen_spanish: tendrá autoridad
  alternatives_spanish:
  - tendrá poder
  - le será permitido
  lexicon: BDAG
  rationale: ἐξουσία expresa autoridad, derecho o potestad para actuar. «Tendrá autoridad» conserva el sentido jurídico del decreto y evita debilitarlo con una simple idea de capacidad o permiso.
- source_word: οὐδεὶς
  english_pob_choice: no one
  chosen_spanish: nadie
  alternatives_spanish:
  - ninguna persona
  - no uno
  lexicon: BDAG
  rationale: Es el equivalente natural y directo en español para el indefinido negativo general.
- source_word: πρᾶξαι
  english_pob_choice: to act
  chosen_spanish: actuar
  alternatives_spanish:
  - proceder
  - obrar
  lexicon: LSJ
  rationale: El infinitivo de πράσσω es amplio; en este contexto legal-protectivo, «actuar» conserva esa amplitud sin introducir una acción penal específica que el griego no explicita.
- source_word: παρενοχλεῖν
  english_pob_choice: harass
  chosen_spanish: hostigar
  alternatives_spanish:
  - molestar
  - importunar
  - acosar
  lexicon: LSJ
  rationale: El verbo denota causar molestia o interferencia hostil. «Hostigar» comunica bien esa presión o perturbación y evita la ambigüedad moderna de otros términos.
- source_word: τινα αὐτῶν
  english_pob_choice: any of them
  chosen_spanish: a ninguno de ellos
  alternatives_spanish:
  - a cualquiera de ellos
  - a cualquiera entre ellos
  lexicon: BDAG
  rationale: La construcción negativa con οὐδείς favorece en español «a ninguno de ellos», que mantiene la referencia a cualquier individuo del grupo protegido.
- source_word: περὶ παντὸς πράγματος
  english_pob_choice: in any matter
  chosen_spanish: en ningún asunto
  alternatives_spanish:
  - en cualquier asunto
  - respecto de cualquier asunto
  lexicon: BDAG
  rationale: περὶ παντὸς πράγματος amplía la protección a cualquier asunto o caso. En español, con la negación previa, «en ningún asunto» reproduce de forma natural el alcance total de la prohibición.
translation_notes:
  revision_awareness: 'Se corrigió el problema de validación anterior: el marcador [a] ahora aparece exactamente en el texto base, anclado en la palabra correspondiente. La redacción sigue de cerca el griego y el audit trail inglés, manteniendo el tono jurídico del decreto.'
  spanish_consistency_notes:
  - 'Se mantuvo el paralelismo negado: «nadie tendrá autoridad para actuar ni para hostigar…»'
  - Se evitó añadir «contra», porque no está explícito en el griego ni en la revisión inglesa final.
  - «En ningún asunto» conserva la amplitud de περὶ παντὸς πράγματος dentro de la negación española.
