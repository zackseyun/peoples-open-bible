translation:
  language: es
  text: 'Entonces el jinete[a] fue a su encuentro y dijo: «Así dice el rey: “¿Hay paz?”». Pero Jehú dijo: «¿Qué tienes tú que ver con la paz? Vuélvete detrás de mí[b]». Y el centinela reportó, diciendo: «El mensajero llegó hasta ellos, pero no ha regresado».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «el hombre a caballo». La expresión hebrea dice literalmente «el que monta el caballo».
    reason: lexical_alternative
  - marker: b
    text: O «Ponte detrás de mí». El hebreo literalmente dice «Vuélvete detrás de mí».
    reason: lexical_alternative
lexical_decisions:
- source_word: רֹכֵב הַסּוּס
  english_pob_choice: the horseman
  chosen_spanish: el jinete del caballo
  alternatives_spanish:
  - el jinete
  - el hombre a caballo
  lexicon: HALOT
  rationale: La expresión hebrea es literalmente ‘el que monta el caballo’. En español, ‘jinete’ comunica de manera natural la imagen y el movimiento, mientras que ‘del caballo’ mantiene visible el vínculo con el sustantivo original sin convertirlo en una paráfrasis amplia.
- source_word: לִקְרָאתוֹ
  english_pob_choice: to meet him
  chosen_spanish: fue al encuentro de él
  alternatives_spanish:
  - fue a su encuentro
  - fue a encontrarse con él
  lexicon: HALOT
  rationale: El hebreo expresa un movimiento para salir al encuentro. ‘Fue al encuentro de él’ conserva esa dirección y evita perder el componente dinámico de la escena.
- source_word: כֹה אָמַר הַמֶּלֶךְ
  english_pob_choice: Thus says the king
  chosen_spanish: Así dice el rey
  alternatives_spanish:
  - Así ha dicho el rey
  - Esto dice el rey
  lexicon: HALOT
  rationale: Es una fórmula mensajera fija. ‘Así dice’ reproduce el tono formal y el valor de proclamación del hebreo y del inglés auditado.
- source_word: הֲשָׁלוֹם
  english_pob_choice: Is it peace?
  chosen_spanish: ¿Hay paz?
  alternatives_spanish:
  - ¿Está todo bien?
  - ¿Paz?
  lexicon: HALOT
  rationale: Aquí שָׁלוֹם pregunta por bienestar o ausencia de conflicto. ‘¿Hay paz?’ conserva la repetición del término clave en el diálogo; las alternativas más idiomáticas se reservan porque atenúan esa repetición.
- source_word: מַה לְּךָ וּלְשָׁלוֹם
  english_pob_choice: What do you have to do with peace?
  chosen_spanish: ¿Qué tienes que ver tú con la paz?
  alternatives_spanish:
  - ¿Qué tienes tú que ver con la paz?
  - ¿Qué es para ti la paz?
  lexicon: HALOT
  rationale: Es una expresión de rechazo o desinterés que en hebreo enfrenta al interlocutor con el tema. La versión elegida mantiene el ímpetu idiomático y el sustantivo ‘paz’ requerido por la repetición del pasaje.
- source_word: סֹב אֶל אַחֲרָי
  english_pob_choice: Turn behind me
  chosen_spanish: Vuélvete detrás de mí
  alternatives_spanish:
  - Ponte detrás de mí
  - Hazte detrás de mí
  - Sigue detrás de mí
  lexicon: HALOT
  rationale: El verbo da una orden de giro/retorno con dirección posterior. ‘Vuélvete detrás de mí’ sigue de cerca el hebreo, sin borrar la literalidad que el inglés auditado preservó; la opción militar más idiomática queda como alternativa.
- source_word: הַצֹּפֶה
  english_pob_choice: the watchman
  chosen_spanish: el centinela
  alternatives_spanish:
  - el vigilante
  - el atalaya
  lexicon: HALOT
  rationale: En castellano, ‘centinela’ comunica con más naturalidad la función de vigilancia desde un puesto elevado en un relato histórico. ‘Atalaya’ puede sonar más literario y ‘vigilante’ menos preciso en este contexto narrativo.
- source_word: הַמַּלְאָךְ
  english_pob_choice: the messenger
  chosen_spanish: el mensajero
  alternatives_spanish:
  - el enviado
  - el ángel
  lexicon: HALOT
  rationale: Aquí מַלְאָךְ designa a un mensajero humano. ‘Mensajero’ evita introducir una lectura angélica que el contexto no sostiene.
- source_word: בָּא ... עַד הֵם
  english_pob_choice: reached them
  chosen_spanish: llegó hasta ellos
  alternatives_spanish:
  - alcanzó hasta ellos
  - llegó a ellos
  lexicon: HALOT
  rationale: La expresión indica llegada hasta el punto donde se encontraban. ‘Llegó hasta ellos’ conserva el alcance espacial del hebreo sin sonar rígido en español.
- source_word: וְלֹא שָׁב
  english_pob_choice: but he has not returned
  chosen_spanish: pero no ha regresado
  alternatives_spanish:
  - y no volvió
  - pero no volvió
  lexicon: HALOT
  rationale: En español narrativo, ‘ha regresado’ transmite el resultado observado desde la perspectiva del centinela. Se mantiene el contraste adversativo implícito en el relato, como en el inglés auditado.
theological_decisions:
- issue: Sentido de שָׁלוֹם en la doble pregunta del pasaje
  english_pob_reading: Is it peace? ... What do you have to do with peace?
  chosen_spanish_reading: ¿Hay paz? ... ¿Qué tienes que ver tú con la paz?
  alternative_spanish_readings:
  - ¿Está todo bien? ... ¿Qué tienes tú que ver con la paz?
  - ¿Paz? ... ¿Qué es para ti la paz?
  rationale: Se conserva ‘paz’ en ambas ocurrencias para reflejar la insistencia retórica del texto. Aunque en español ‘paz’ puede sonar más abstracto que ‘bienestar’, la repetición es parte del efecto narrativo y no debe diluirse.
  doctrine_reference: 2 Reyes 9:18; uso narrativo de שָׁלוֹם
- issue: Identificación de הַמַּלְאָךְ como mensajero humano
  english_pob_reading: the messenger
  chosen_spanish_reading: el mensajero
  alternative_spanish_readings:
  - el enviado
  - el ángel
  rationale: El contexto describe a un emisario que va y vuelve, por lo que la lectura humana es la única segura. Traducir ‘ángel’ introduciría una carga teológica ajena al relato.
  doctrine_reference: 2 Reyes 9:18; uso contextual de מַלְאָךְ
translation_notes:
  revision_awareness: 'Se siguió de cerca el audit trail inglés sin depender mecánicamente de él: se mantuvieron la fórmula mensajera y la repetición de שָׁלוֹם, y se preservó el sentido concreto de מַלְאָךְ como mensajero humano. No hubo revisiones aplicadas en el antecedente inglés; esta versión española refleja ese estado estable.'
  spanish_consistency_notes:
  - Se usó ‘Yahvé’ no porque aparezca en este versículo, sino por la norma del proyecto para el Tetragrámaton cuando corresponda en el contexto inmediato de la obra.
  - Se prefirió ‘paz’ de forma consistente para שָׁלוֹם, manteniendo la cohesión léxica del intercambio.
  - Se eligió ‘centinela’ por naturalidad en español narrativo, sin cambiar la función de vigilancia del hebreo.
  - Se evitó ‘ángel’ para מַלְאָךְ para no introducir una lectura sobrenatural no apoyada por el contexto.
