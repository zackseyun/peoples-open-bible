translation:
  language: es
  text: Cuando bajaron del lugar alto a la ciudad[a], él habló con Saúl en la azotea.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Y bajaron del lugar alto a la ciudad, y él habló con Saúl en la azotea».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֵּרְדוּ
  english_pob_choice: When they came down
  chosen_spanish: Cuando bajaron
  alternatives_spanish:
  - Y bajaron
  - Cuando descendieron
  lexicon: HALOT
  rationale: El hebreo marca avance narrativo con waw consecutivo; en español, «Cuando bajaron» preserva la secuencia y suena natural sin añadir matices ajenos al verbo ירד.
- source_word: מֵהַבָּמָה
  english_pob_choice: from the high place
  chosen_spanish: del lugar alto
  alternatives_spanish:
  - de la altura
  - del alto lugar
  lexicon: HALOT
  rationale: בָּמָה puede referirse a un lugar alto cultual; «lugar alto» conserva la referencia espacial y el posible trasfondo cultual sin forzar una interpretación más específica que el hebreo inmediato.
- source_word: הָעִיר
  english_pob_choice: into the city
  chosen_spanish: a la ciudad
  alternatives_spanish:
  - hacia la ciudad
  - en la ciudad
  lexicon: HALOT
  rationale: El movimiento desde «del lugar alto» hacia la ciudad se expresa de forma idiomática en español con «a la ciudad», manteniendo la direccionalidad implícita.
- source_word: וַיְדַבֵּר
  english_pob_choice: he spoke
  chosen_spanish: él habló
  alternatives_spanish:
  - él se habló
  - él conversó
  lexicon: HALOT
  rationale: El singular del verbo exige pasar del plural anterior a un sujeto singular explícito; «él habló» reproduce el sentido básico de דבר sin sobreinterpretar si fue conversación o discurso.
- source_word: עִם שָׁאוּל
  english_pob_choice: with Saul
  chosen_spanish: con Saúl
  alternatives_spanish:
  - a Saúl
  - para con Saúl
  lexicon: HALOT
  rationale: עִם normalmente indica compañía o interacción; «con Saúl» mantiene esa relación de habla compartida, en lugar de convertirla en un simple destinatario con «a».
- source_word: עַל הַגָּג
  english_pob_choice: on the roof
  chosen_spanish: en la azotea
  alternatives_spanish:
  - sobre el techo
  - en el techo
  lexicon: HALOT
  rationale: גָּג denota la cubierta plana de una casa; «azotea» comunica con claridad esa realidad en español bíblico moderno y es más preciso que «techo», que puede sonar ambiguo para el lector.
translation_notes:
  revision_awareness: 'El audit trail inglés mantiene una lectura estable: descenso desde el lugar alto, llegada a la ciudad, y un discurso de un sujeto singular con Saúl, culminando en la referencia espacial al techo/azotea. La nota alternativa inglesa sobre «housetop» se refleja en español con «azotea» como término principal y «techo» implícito en la alternativa.'
  spanish_consistency_notes:
  - Se preserva «Saúl» como nombre propio sin transliteración alternativa.
  - Se evita «SEÑOR» u otras convenciones de máscara porque el versículo no contiene el Tetragrámaton.
  - Se usa un estilo sobrio y narrativo, coherente con prosa histórica bíblica en español.
  - La ambigüedad entre «roof» y «housetop» se resuelve con «azotea», pero se conserva en nota una alternativa literal más cercana al inglés auditado.
