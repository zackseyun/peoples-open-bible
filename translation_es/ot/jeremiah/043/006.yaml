  language: en
  yaml_path: translation/ot/jeremiah/043/006.yaml
  text: the men[a], the women, the little children, the king’s daughters, and every person whom Nebuzaradan the captain of the guard had left with Gedaliah son of Ahikam, son of Shaphan, and Jeremiah the prophet[c][b], and Baruch son of Neriah—
  footnotes:
  - marker: a
    text: Or 'the children'; Hebrew טַף can denote little ones or dependent children more broadly.
    reason: lexical_alternative
