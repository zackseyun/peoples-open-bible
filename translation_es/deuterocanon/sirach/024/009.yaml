translation:
  language: es
  text: Antes de los siglos[a], desde el principio, me creó, y por todos los siglos no cesaré[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «Antes de la eternidad». El griego αἰών puede indicar una era o una duración ilimitada según el contexto.
    reason: lexical_alternative
  - marker: b
    text: O «nunca cesaré» / «no llegaré a mi fin». La expresión griega es enfáticamente negativa.
    reason: lexical_alternative
lexical_decisions:
- source_word: πρὸ τοῦ αἰῶνος
  english_pob_choice: Before the age
  chosen_spanish: Antes del siglo
  alternatives_spanish:
  - Antes de la edad
  - Antes de la eternidad
  - Antes de los siglos
  lexicon: LSJ
  rationale: αἰών puede designar un período o una duración sin límite según el contexto. En español, «Antes del siglo» conserva la idea de anterioridad absoluta con un registro natural y solemne, evitando la literalidad extraña de «Antes de la edad». La nota mantiene la alternativa interpretativa de duración indefinida.
- source_word: ἀπʼ ἀρχῆς
  english_pob_choice: from the beginning
  chosen_spanish: desde el principio
  alternatives_spanish:
  - desde el comienzo
  - al principio
  lexicon: LSJ
  rationale: La expresión marca un punto inicial temporal. «Desde el principio» es idiomático, bíblico y fiel al arranque temporal del griego sin volverlo arcaico.
- source_word: ἔκτισέν
  english_pob_choice: created
  chosen_spanish: me creó
  alternatives_spanish:
  - me formó
  - me estableció
  - me hizo
  lexicon: LSJ
  rationale: κτίζω significa crear o fundar. Se conserva «creó» porque refleja directamente el verbo griego y mantiene la fuerza teológica del texto sin atenuarla.
- source_word: ἕως αἰῶνος
  english_pob_choice: for all ages
  chosen_spanish: por todos los siglos
  alternatives_spanish:
  - para siempre
  - por la eternidad
  - en todos los siglos
  lexicon: LSJ
  rationale: Aquí αἰών expresa duración sin término. «Por todos los siglos» reproduce la amplitud temporal con un español elevado y claro, cercano al valor de «for all ages» sin perder la idea de continuidad indefinida.
- source_word: οὐ μὴ ἐκλίπω
  english_pob_choice: I will never cease
  chosen_spanish: no cesaré
  alternatives_spanish:
  - nunca dejaré de ser
  - no desapareceré
  - no llegaré a su fin
  lexicon: LSJ
  rationale: La negación enfática indica que la voz personificada no terminará. «No cesaré» comunica de forma directa la continuidad de existencia; el tiempo verbal futuro sostiene el valor enfático del griego.
theological_decisions:
- issue: Mantener el lenguaje de creación aplicado a la Sabiduría personificada
  english_pob_reading: Retain 'he created me' in the main text
  chosen_spanish_reading: Conservar «me creó» en el texto principal
  alternative_spanish_readings:
  - me estableció
  - me formó
  rationale: El verbo griego es κτίζω y el texto habla en voz de Sabiduría personificada. No se suaviza el lenguaje para resolver tensiones doctrinales posteriores; la traducción debe dejar visible el enunciado del original.
  doctrine_reference: Sirach 24; Translation philosophy §1, §3
- issue: Decidir el alcance de αἰών en los marcos temporales inicial y final
  english_pob_reading: Before the age ... for all ages
  chosen_spanish_reading: Antes del siglo ... por todos los siglos
  alternative_spanish_readings:
  - Antes de la eternidad ... para siempre
  - Antes de la edad ... por todas las edades
  rationale: En ambos miembros αἰών puede sugerir un marco temporal amplio o ilimitado. Se conserva la tensión entre un término con sentido de “edad/siglo” y la idea de duración sin fin, sin reducirlo todo a una sola paráfrasis homogénea.
  doctrine_reference: LSJ; Sirach 24:9
translation_notes:
  revision_awareness: La revisión más reciente en inglés pasó de «Before time... unto eternity» a «Before the age... for all ages», buscando mayor precisión léxica para αἰών y una negación enfática mejor alineada con οὐ μὴ ἐκλίπω. La presente versión española refleja esa última decisión, pero conserva la posibilidad interpretativa de αἰών en nota para no borrar la tensión semántica documentada.
  spanish_consistency_notes:
  - Se evita «SEÑOR» porque el pasaje no contiene el tetragrámaton ni κύριος como sustituto divino.
  - Se mantiene el verbo de creación en forma directa («creó») por fidelidad al griego κτίζω.
  - Se conserva un registro bíblico sobrio sin depender de fórmulas tradicionales que oculten el matiz temporal de αἰών.
  - La puntuación reproduce la estructura coordinada del original con una pausa fuerte tras el primer miembro.
