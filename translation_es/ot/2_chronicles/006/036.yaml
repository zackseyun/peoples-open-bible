revisions:
- from: Cuando pequen contra ti —porque no hay ningún ser humano que no peque— y te enojes con ellos y los entregues[a] delante de un enemigo, y sus cautivadores los lleven a una tierra lejana o cercana,
  to: Cuando pequen contra ti —porque no hay nadie que no peque— y te enojes con ellos y los entregues[a] a un enemigo, y sus captores los lleven a una tierra lejana o cercana,
  rationale: 'Ajusté la frase principal para que exprese el sentido hebreo de manera natural en español: «los entregues a un enemigo» comunica sometimiento al poder enemigo sin el calco torpe «delante de». Conservé el matiz literal en una nota. También cambié «ningún ser humano» por «nadie» para mayor fluidez y concisión, en línea con el inglés POB revisado, y «cautivadores» por «captores» para mejorar la legibilidad sin pérdida de sentido.'
  reviewer_model: gpt-5.4
