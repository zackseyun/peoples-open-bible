translation:
  language: es
  text: ¡Oh muerte, qué amarga es tu memoria para un hombre en paz con sus bienes[b], para un hombre sin sobresaltos y prosperando en todo, y todavía con fuerzas para gozar del placer[a]!
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «todavía teniendo fuerza para recibir placer»; el paralelo griego dice más específicamente: «todavía fuerte para recibir alimento». Se mantiene aquí la amplitud del hebreo, aunque el griego refleja un sentido más específico.'
    reason: alternative_reading
  - marker: b
    text: La expresión hebrea traducida aquí como «en paz con sus bienes» es algo incierta; el paralelo griego apoya la idea de una persona que vive en paz y seguridad con lo que posee.
    reason: textual_variant
lexical_decisions:
- source_word: Ὦ θάνατε / מה מר זכרך
  english_pob_choice: O death, how bitter is your remembrance
  chosen_spanish: ¡Oh muerte!, ¡qué amarga es tu memoria!
  alternatives_spanish:
  - ¡Oh muerte!, ¡qué amarga es tu recordación!
  - ¡Oh muerte!, ¡qué amarga es el recuerdo de ti!
  lexicon: HALOT; BDAG
  rationale: El original dirige el lamento a la muerte en segunda persona y habla de su “memoria/recuerdo”, no de la muerte en abstracto. En español, «tu memoria» conserva el paralelismo y la fuerza de la dirección directa.
- source_word: לאיש שוקט על מכונתו / ἀνθρώπῳ εἰρηνεύοντι ἐν τοῖς ὑπάρχουσιν αὐτοῦ
  english_pob_choice: to a man at ease in his possessions
  chosen_spanish: para un hombre en paz con sus bienes
  alternatives_spanish:
  - para un hombre en reposo en su posición
  - para un hombre seguro en lo que posee
  lexicon: HALOT; BDAG
  rationale: La expresión hebrea es algo incierta; el griego aclara el sentido de alguien que vive en paz con lo que tiene. «En paz con sus bienes» suena natural en español y mantiene la idea de seguridad material sin forzar una paráfrasis amplia.
- source_word: איש שליו / ἀνδρὶ ἀπερισπάστῳ
  english_pob_choice: to a man untroubled
  chosen_spanish: para un hombre sin sobresaltos
  alternatives_spanish:
  - para un hombre tranquilo
  - para un hombre libre de distracciones
  lexicon: HALOT; BDAG
  rationale: «Sin sobresaltos» expresa tranquilidad, ausencia de turbación y estabilidad. Captura bien la combinación del hebreo שליו con el griego ἀπερίσπαστος, sin caer en una formulación demasiado técnica.
- source_word: ומצליח בכל / καὶ εὐοδουμένῳ ἐν πᾶσιν
  english_pob_choice: and prospering in everything
  chosen_spanish: y prosperando en todo
  alternatives_spanish:
  - y teniendo éxito en todo
  - y yéndole bien en todo
  lexicon: HALOT; BDAG
  rationale: El hebreo y el griego coinciden en un éxito o prosperidad amplios. «Prosperando en todo» conserva el alcance total con un español claro y sobrio.
- source_word: ועוד בו חיל לקבל תענוג / καὶ ἔτι ἰσχύοντι ἐπιδέξασθαι τροφήν
  english_pob_choice: and still strong enough to enjoy pleasure
  chosen_spanish: y todavía con fuerzas para gozar del placer
  alternatives_spanish:
  - y todavía con fuerzas para recibir alimento
  - y todavía fuerte para disfrutar
  lexicon: HALOT; BDAG
  rationale: La revisión inglesa reciente prefirió «pleasure» por תענוג; en español, «gozar del placer» refleja esa lectura y mantiene la amplitud del hebreo, mientras el griego subraya la vigorosa capacidad todavía presente.
theological_decisions:
- issue: Masculino singular representativo
  english_pob_reading: to a man ... to a man
  chosen_spanish_reading: para un hombre ... para un hombre
  alternative_spanish_readings:
  - para una persona ... para una persona
  - para uno ... para uno
  rationale: El texto usa formas masculinas singulares de manera representativa. Se conserva esa marca para no neutralizar indebidamente la forma del original.
  doctrine_reference: DOCTRINE.md §4 Gender-accurate over gender-neutral
- issue: Relación entre el hebreo base y el paralelo griego en la cláusula final
  english_pob_reading: The Hebrew phrase ... 'strength to receive pleasure'; the Greek parallel reads more specifically, 'still strong enough to receive food.'
  chosen_spanish_reading: Se mantiene la idea de «gozar del placer», con el griego como apoyo para el sentido de vigor suficiente.
  alternative_spanish_readings:
  - '... y todavía con fuerzas para recibir alimento'
  - '... y todavía con fuerzas para disfrutar del alimento'
  rationale: Para Sirácida, el hebreo tiene primacía, pero el griego ayuda a confirmar que se trata de la capacidad de disfrutar todavía la vida en su vigor. Por eso la traducción no se restringe solo a «alimento».
  doctrine_reference: PHILOSOPHY.md 'What we are translating' y la consigna del paquete fuente
translation_notes:
  revision_awareness: 'El texto inglés de referencia fue revisado: una versión anterior decía ''enjoy food'', luego se ajustó a ''enjoy pleasure'' para reflejar mejor תענוג. La versión española sigue esa revisión reciente, pero conserva la ayuda del griego para no estrechar indebidamente el sentido.'
  spanish_consistency_notes:
  - Se usa «muerte» en vocativo directo para mantener la personificación del original.
  - «Memoria» se prefiere a «recuerdo» por su mayor naturalidad en este contexto, aunque ambas opciones serían válidas.
  - «Bienes» comunica posesiones/recursos sin introducir un tecnicismo jurídico no presente en el verso.
  - «Gozar del placer» sigue la revisión del audit trail y mantiene la amplitud semántica de תענוג.
  - Se evitó «Cristo», «SEÑOR» o equivalentes doctrinales no pertinentes al pasaje.
