translation:
  language: es
  text: Y los puso bajo custodia por tres días[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: ‘O: «Y los confinó bajo custodia por tres días». El verbo hebreo literalmente significa «reunió» o «juntó», pero aquí funciona idiomáticamente con el sentido de ponerlos bajo guardia.’
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֶּאֱסֹף
  english_pob_choice: put
  chosen_spanish: puso
  alternatives_spanish:
  - reunió
  - confinó
  - colocó
  lexicon: HALOT
  rationale: El verbo hebreo אסף significa literalmente ‘reunir/juntar’, pero aquí, en la construcción con אֶל מִשְׁמָר, funciona de manera idiomática para llevarlos a un estado de custodia. ‘Puso’ comunica la acción en español natural sin perder esa función idiomática.
- source_word: אֹתָם
  english_pob_choice: them
  chosen_spanish: los
  alternatives_spanish:
  - a ellos
  lexicon: Pronombre de objeto directo masculino plural
  rationale: El objeto directo plural masculino se refiere a los hermanos de José. En español, ‘los’ es la forma más natural y fiel en este contexto.
- source_word: אֶל
  english_pob_choice: in
  chosen_spanish: bajo
  alternatives_spanish:
  - en
  - a
  lexicon: HALOT
  rationale: Aunque אֶל suele significar ‘a’ o ‘hacia’, en esta expresión con מִשְׁמָר el sentido resultante es entrar en custodia. ‘Bajo custodia’ expresa ese estado mejor que una traducción literal rígida.
- source_word: מִשְׁמָר
  english_pob_choice: custody
  chosen_spanish: custodia
  alternatives_spanish:
  - custodia guardada
  - vigilancia
  - prisión
  lexicon: HALOT
  rationale: מִשְׁמָר designa un estado o lugar de guardia, vigilancia o custodia. ‘Custodia’ conserva la amplitud del término sin convertirlo innecesariamente en ‘prisión’.
- source_word: שְׁלֹשֶׁת יָמִים
  english_pob_choice: for three days
  chosen_spanish: por tres días
  alternatives_spanish:
  - durante tres días
  - por un lapso de tres días
  lexicon: Construct phrase for duration
  rationale: La frase constructa indica duración. ‘Por tres días’ es la forma más directa y natural en español, equivalente funcional de ‘for three days’.
translation_notes:
  revision_awareness: 'Coincide con el tramo de revisión más reciente: el sentido idiomático de וַיֶּאֱסֹף se conserva mediante una formulación española natural, sin intensificar indebidamente מִשְׁמָר como ‘prisión’.'
  spanish_consistency_notes:
  - Se mantuvo la terminología de custodia/guardia para מִשְׁמָר, evitando ‘prisión’ salvo en la nota como alternativa.
  - Se evitó un calco mecánico de ‘reunió’ en el cuerpo principal porque en español puede sonar menos idiomático que la función narrativa del hebreo en este contexto.
  - La nota reproduce la tensión léxica documentada entre el sentido literal de אסף y su valor idiomático aquí.
