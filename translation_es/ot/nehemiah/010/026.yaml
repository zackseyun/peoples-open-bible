lexical_decisions:
- source_word: רְחוּם
  english_pob_choice: Rehum
  chosen_spanish: Rehum
  alternatives_spanish:
  - Rechum
  lexicon: HALOT
  rationale: Es un nombre propio en una lista de firmantes; por eso se translitera, no se traduce. Se conserva la forma breve y reconocible, siguiendo la práctica bíblica habitual y la decisión inglesa de mantener el nombre como transliteración estándar.
- source_word: חֲשַׁבְנָה
  english_pob_choice: Hashabnah
  chosen_spanish: Hashabná
  alternatives_spanish:
  - Hashabna
  lexicon: HALOT
  rationale: Nombre propio en serie nominal. En español se adapta mínimamente la grafía para reflejar la pronunciación natural con acento prosódico final en la forma castellana/latinoamericana, manteniendo la transliteración como nombre y no como traducción.
- source_word: מַעֲשֵׂיָה
  english_pob_choice: Maaseiah
  chosen_spanish: Maaseías
  alternatives_spanish:
  - Maaseiah
  - Maaseya
  lexicon: HALOT
  rationale: Nombre propio teofórico; se translitera en vez de traducirse, conforme al tratamiento del POB en inglés. La forma española conserva la secuencia vocálica principal del nombre y lo hace legible en español sin borrar su carácter onomástico.
theological_decisions:
- issue: La lista contiene solo nombres propios, sin predicación ni contenido doctrinal explícito.
  english_pob_reading: Hebrew consists solely of three personal names in a larger list of signatories.
  chosen_spanish_reading: El hebreo consiste únicamente en tres nombres personales dentro de una lista mayor de firmantes.
  alternative_spanish_readings:
  - Tres nombres en una lista de personas
  - Solo tres nombres propios
  rationale: No hay una cuestión doctrinal independiente en el versículo; la decisión relevante es de formato y de reconocimiento del género textual. La nota preserva que se trata de una lista de signatarios, no de un enunciado narrativo o exhortativo.
  doctrine_reference: Ninguna específica; nota de género textual y función del pasaje.
translation_notes:
  revision_awareness: 'El expediente inglés indica que no hubo revisiones aplicadas y que el texto quedó en alta concordancia. La versión española sigue esa estabilidad textual: solo traslada los tres nombres propios con adaptación mínima para legibilidad, sin añadir contenido ausente en el hebreo.'
  spanish_consistency_notes:
  - Se mantiene el orden de los tres nombres como en el hebreo.
  - Se usa transliteración para los nombres propios, no traducción semántica.
  - La nota al pie marca el carácter de lista nominal, tal como en el aparato inglés.
  - No se introducen títulos, conectores ni elementos no presentes en el texto fuente.
