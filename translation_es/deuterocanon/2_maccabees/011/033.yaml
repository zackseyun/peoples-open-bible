lexical_decisions:
- source_word: ἔρρωσθε
  english_pob_choice: Farewell
  chosen_spanish: ¡Adiós!
  alternatives_spanish:
  - ¡Que estén bien!
  - ¡Estén fuertes!
  - ¡Salud!
  lexicon: LSJ
  rationale: La forma griega es una fórmula epistolar de despedida, no una exhortación literal a la fuerza. En español, «¡Adiós!» comunica de manera natural y digna el cierre del mensaje sin perder el valor de despedida convencional.
- source_word: ἔτους
  english_pob_choice: year
  chosen_spanish: año
  alternatives_spanish:
  - año de
  lexicon: LSJ
  rationale: Es parte de una fórmula de datación; «año» refleja directamente el genitivo de fecha y es la solución más natural en español.
- source_word: ἑκατοστοῦ τεσσερακοστοῦ ὀγδόου
  english_pob_choice: one hundred forty-eighth
  chosen_spanish: ciento cuarenta y ocho[a]
  alternatives_spanish:
  - ciento cuarenta y ocho
  lexicon: LSJ
  rationale: Se conserva el valor ordinal/cronológico de la expresión griega. En español, la forma ordinal completa sería poco natural en esta datación; por eso se opta por la cifra escrita en forma cardinal dentro de una fórmula de año, manteniendo el sentido calendárico.
- source_word: Ξανθικοῦ
  english_pob_choice: Xanthicus
  chosen_spanish: Xántico
  alternatives_spanish:
  - Xánticos
  - Xantico
  lexicon: LSJ
  rationale: El nombre del mes se translitera al español para preservar la referencia calendárica histórica. Se adapta la ortografía a una forma hispanizada comprensible y consistente con la pronunciación.
- source_word: πεντεκαιδεκάτῃ
  english_pob_choice: fifteenth day
  chosen_spanish: el día quince
  alternatives_spanish:
  - quince
  lexicon: LSJ
  rationale: La forma dativa indica el día del mes en una fórmula de fecha. En español, «el día quince» expresa con claridad el mismo valor temporal.
translation_notes:
  revision_awareness: 'El texto griego y el audit trail inglés coinciden plenamente: la única cuestión interpretativa relevante es la fórmula de despedida ἔρρωσθε y la transliteración del mes Xanthikos. No se documentan revisiones sustantivas en el expediente; la versión española sigue esa lectura estable.'
  spanish_consistency_notes:
  - Se mantiene «Xántico» para el mes macedonio, con nota cultural explicativa.
  - Se usa la fórmula breve de despedida «¡Adiós!» como equivalente funcional de ἔρρωσθε.
  - 'La datación conserva el orden natural del español: despedida primero, luego la fecha.'
