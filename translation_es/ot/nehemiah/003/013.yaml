base_translation:
  language: en
  yaml_path: translation/ot/nehemiah/003/013.yaml
  text: Hanun and the inhabitants of Zanoah repaired the Valley Gate[a]. They built it and set up its doors, its bolts, and its bars, and repaired a thousand cubits of the wall[c][b], as far as the Dung Gate.
  footnotes:
  - marker: a
    text: Or 'strengthened' the Valley Gate; the Hebrew verb can mean 'made firm' or 'repaired' in this chapter's rebuilding context.
    reason: lexical_alternative
  - marker: b
    text: A thousand cubits is roughly 1,500 feet (about 457 meters).
    reason: cultural_note
  - marker: c
    text: Or 'Refuse Gate.'
    reason: lexical_alternative
