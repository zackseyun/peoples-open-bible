translation:
  language: es
  text: Y Mardoqueo permaneció en la corte con Gabata y Tarra[a], los dos eunucos del rey que custodiaban el palacio[b],
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'quedó' o 'estuvo quieto'. El verbo griego puede expresar permanecer, estar quieto o guardar silencio; aquí se opta por 'permaneció' porque encaja mejor con el contexto narrativo sin imponer específicamente la idea de silencio.
    reason: lexical_alternative
  - marker: b
    text: O 'patio', 'corte' o 'recinto del palacio'. La palabra griega puede referirse al patio o recinto cerrado de una residencia real, y por extensión al ámbito cortesano.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἡσύχασεν
  english_pob_choice: remained
  chosen_spanish: permaneció
  alternatives_spanish:
  - se quedó
  - estuvo
  - permaneció en silencio
  lexicon: BDAG; LSJ
  rationale: El verbo griego puede expresar permanecer, estar quieto o guardar silencio. Dado que la revisión inglesa corrigió 'kept quiet' por 'remained' por mayor precisión, 'permaneció' conserva el valor de estancia/quietud sin añadir una idea específica de silencio que el contexto no exige.
- source_word: αὐλή
  english_pob_choice: court
  chosen_spanish: corte
  alternatives_spanish:
  - patio
  - patio real
  - corte palaciega
  lexicon: LSJ
  rationale: En este contexto real, 'corte' comunica mejor el ámbito palaciego y administrativo que 'patio', aunque la palabra griega también puede referirse a un patio o recinto cerrado. Se mantiene la ambigüedad básica del término sin perder el marco regio.
- source_word: Μαρδοχαῖος
  english_pob_choice: Mordecai
  chosen_spanish: Mardoqueo
  alternatives_spanish:
  - Mordecai
  lexicon: LSJ
  rationale: Se usa la forma española estándar del nombre propio, más natural y reconocible para lectura bíblica en español, sin alterar la identidad del referente.
- source_word: Γαβὰθα
  english_pob_choice: Gabatha
  chosen_spanish: Gabata
  alternatives_spanish:
  - Gabatha
  lexicon: LSJ
  rationale: Se adapta la transliteración al uso ortográfico español más fluido, conservando la forma griega subyacente y sin introducir una equivalencia interpretativa.
- source_word: Θαῤῥὰ
  english_pob_choice: Tharra
  chosen_spanish: Tarra
  alternatives_spanish:
  - Tharra
  lexicon: LSJ
  rationale: Se simplifica la transliteración al español natural, preservando el nombre propio como testigo directo de la forma griega.
- source_word: εὐνούχων
  english_pob_choice: eunuchs
  chosen_spanish: eunucos
  alternatives_spanish:
  - oficiales de la corte
  - chambelanes
  lexicon: BDAG
  rationale: El griego dice explícitamente 'eunucos'; se conserva el término concreto en español para no suavizar ni sustituir un dato lexical del texto fuente.
- source_word: φυλασσόντων
  english_pob_choice: were guarding
  chosen_spanish: que estaban guardando
  alternatives_spanish:
  - que vigilaban
  - que custodiaban
  lexicon: BDAG
  rationale: La forma participial indica una acción continua de custodia/guardia. 'Estaban guardando' reproduce bien esa función activa y mantiene la relación directa con la corte.
theological_decisions:
- issue: 'Sentido de ἡσύχασεν: quietud/silencio frente a permanencia'
  english_pob_reading: The revision notes recognize that the verb is better understood as staying/remaining rather than specifically being silent.
  chosen_spanish_reading: permaneció
  alternative_spanish_readings:
  - estuvo quieto
  - guardó silencio
  - se mantuvo en calma
  rationale: La evidencia de la revisión inglesa favorece el matiz de permanencia o reposo situacional. En español, 'permaneció' evita imponer la idea de silencio verbal y refleja mejor la tensión lexical documentada.
  doctrine_reference: Precisión semántica y prudencia traductora; no hay afirmación doctrinal directa en el versículo.
- issue: αὐλή como espacio palaciego
  english_pob_reading: '''court'' with a footnote allowing ''courtyard'' or ''palace court''.'
  chosen_spanish_reading: corte
  alternative_spanish_readings:
  - patio
  - corte palaciega
  - patio del palacio
  rationale: '''Corte'' transmite el entorno real y la función narrativa de vigilancia palaciega. La alternativa ''patio'' reduce innecesariamente el aspecto administrativo/real que el contexto sugiere.'
  doctrine_reference: Contexto histórico-literario; no implica una doctrina específica.
translation_notes:
  revision_awareness: La versión española sigue la revisión inglesa más reciente, que corrigió 'kept quiet' por 'remained' para dar mejor precisión a ἡσύχασεν. Por eso se traduce con un verbo de permanencia ('permaneció') y no con una expresión centrada en el silencio.
  spanish_consistency_notes:
  - Se mantiene 'Mardoqueo' como forma española estable del nombre propio.
  - Se usa 'corte' para αὐλή, coherente con el contexto real y con la nota alternativa sobre 'patio'.
  - '''Eunucos'' conserva la fuerza concreta del griego, sin sustituirla por un título cortesano más genérico.'
  - La transliteración de Gabata y Tarra se adapta al español sin perder el vínculo con la forma griega.
