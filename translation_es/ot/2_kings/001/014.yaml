translation:
  language: es
  text: Mira, el fuego descendió del cielo y consumió a los dos primeros capitanes de cincuenta y a sus grupos de cincuenta[a]. Pero ahora, que mi vida[b] sea preciosa a tus ojos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «los grupos de cincuenta bajo ellos»; el hebreo dice literalmente «sus cincuentas».
    reason: lexical_alternative
  - marker: b
    text: O «que mi alma sea preciosa a tus ojos»; aquí «alma» se refiere a la vida del hablante.
    reason: lexical_alternative
lexical_decisions:
- source_word: הִנֵּה
  english_pob_choice: Look
  chosen_spanish: ¡Mira!
  alternatives_spanish:
  - ¡Mira aquí!
  - ¡Mira, pues!
  - ¡He aquí!
  lexicon: HALOT
  rationale: La partícula introduce una llamada enfática a atender un hecho visible. «¡Mira!» conserva la fuerza deíctica con español natural y más directo que una forma arcaizante.
- source_word: יָרְדָה אֵשׁ מִן הַשָּׁמַיִם
  english_pob_choice: fire came down from heaven
  chosen_spanish: El fuego descendió del cielo
  alternatives_spanish:
  - El fuego bajó del cielo
  - El fuego vino del cielo
  lexicon: HALOT
  rationale: Se mantiene el movimiento descendente del hebreo. «Cielo» es el equivalente natural de הַשָּׁמַיִם en este contexto y preserva el registro bíblico sin necesidad de un calco pesado.
- source_word: וַתֹּאכַל
  english_pob_choice: consumed
  chosen_spanish: consumió
  alternatives_spanish:
  - devoró
  - se los comió
  lexicon: HALOT
  rationale: Con fuego como sujeto, el sentido de אכל es destructivo. «Consumió» reproduce la fuerza de destrucción de forma idiomática en español.
- source_word: שְׁנֵי שָׂרֵי הַחֲמִשִּׁים
  english_pob_choice: the first two captains of fifty
  chosen_spanish: los dos primeros capitanes de cincuenta
  alternatives_spanish:
  - los dos primeros jefes de cincuenta
  - los dos primeros comandantes de cincuenta
  lexicon: HALOT
  rationale: «Capitanes» refleja bien שָׂרֵי en este contexto militar. Se conserva «de cincuenta» para respetar la unidad de mando del hebreo.
- source_word: הָרִאשֹׁנִים
  english_pob_choice: the first
  chosen_spanish: los primeros
  alternatives_spanish:
  - los anteriores
  - los primeros de antes
  lexicon: HALOT
  rationale: El adjetivo mira hacia los dos ya mencionados en la narración. En español, «los primeros» transmite esa referencia anafórica con claridad.
- source_word: וְאֶת חֲמִשֵּׁיהֶם
  english_pob_choice: and their fifties
  chosen_spanish: y a sus cincuentenas
  alternatives_spanish:
  - y a sus grupos de cincuenta
  - y a las compañías bajo ellos
  lexicon: HALOT
  rationale: Se conserva la estructura militar del hebreo. «Cincuentenas» es poco común, pero comunica de manera breve y fiel la referencia a las unidades de cincuenta; se evita diluirla en una explicación más interpretativa.
- source_word: וְעַתָּה
  english_pob_choice: But now
  chosen_spanish: Pero ahora
  alternatives_spanish:
  - Y ahora
  - Ahora, pues
  lexicon: HALOT
  rationale: La conjunción enmarca un giro desde el relato del juicio hacia la súplica. «Pero ahora» reproduce bien el contraste implícito del contexto.
- source_word: תִּיקַר נַפְשִׁי בְּעֵינֶיךָ
  english_pob_choice: let my life be precious in your sight
  chosen_spanish: que mi vida sea preciosa a tus ojos
  alternatives_spanish:
  - que mi alma sea preciosa a tus ojos
  - que mi vida sea estimada por ti
  lexicon: HALOT
  rationale: Se sigue la lectura del POB inglés de נֶפֶשׁ como «vida», no «alma», porque aquí el hablante suplica no morir. «Preciosa a tus ojos» preserva la metáfora de יקר y la expresión idiomática de «en tu vista».
theological_decisions:
- issue: נֶפֶשׁ en una súplica de supervivencia
  english_pob_reading: life
  chosen_spanish_reading: vida
  alternative_spanish_readings:
  - alma
  rationale: En este contexto narrativo el orador teme ser destruido como las compañías anteriores. Traducir נֶפֶשׁ por «vida» evita introducir una antropología de «alma» que el hebreo aquí no exige y mantiene el sentido concreto del ruego.
  doctrine_reference: Antropología bíblica; uso contextual de נֶפֶשׁ en narraciones de peligro de muerte
translation_notes:
  revision_awareness: No hubo revisiones aplicadas en el expediente inglés; la propuesta sigue el pasaje con alta concordancia y conserva las decisiones léxicas y teológicas auditadas, adaptándolas a un español publicable sin perder la estructura del hebreo.
  spanish_consistency_notes:
  - Se usó «Yahvé» como forma de rigor por defecto en este proyecto, pero este versículo no contiene el nombre divino.
  - Se mantuvo la metáfora de «a tus ojos» para reproducir בְּעֵינֶיךָ sin convertirla en una paráfrasis explicativa.
  - «Cincuentenas» es una solución marcada pero transparente; se conserva para no eliminar la referencia técnica a las unidades militares del hebreo.
