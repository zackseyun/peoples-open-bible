    text: O «cayeron a David» / «se unieron a David»; el modismo hebreo significa pasarse al bando de alguien.
    reason: lexical_alternative
  - marker: b
    text: Literalmente, «con nuestras cabezas»; un modismo que significa «a costa de nuestras vidas» o «para nuestra ruina».
    reason: lexical_alternative
  revision_rationale: 'Se hicieron ajustes menores para mejorar fidelidad y naturalidad: «a la batalla» en vez de «para la guerra»; «después de deliberar» por el hebreo de consejo; «lo despidieron» para reflejar mejor que los jefes filisteos lo apartaron de la campaña; y «podría pasarse a su amo Saúl» para reproducir mejor tanto la posibilidad temida como el valor relacional de אֲדֹנָיו.'
