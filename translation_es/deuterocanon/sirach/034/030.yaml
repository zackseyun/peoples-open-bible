- from: La embriaguez multiplica la ira de un necio[a] hasta su tropezón, disminuyendo la fuerza y causando heridas.
  to: La embriaguez multiplica la ira de un necio hasta hacerlo tropezar[a], disminuyendo la fuerza y causando heridas.
  rationale: Se reemplaza «hasta su tropezón» por «hasta hacerlo tropezar» para lograr un español natural y mantener el sentido resultativo de εἰς πρόσκομμα. Se conserva la metáfora del tropiezo y la nota alternativa sobre «caída».
