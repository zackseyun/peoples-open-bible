    issue: 'Frase española poco natural y menos fiel: «marchita en su hoja»'
    rationale: עָלֶהָ significa ‘su hoja’ y נֹבֶלֶת describe esa hoja marchitándose. En español, «en su hoja» no expresa bien la relación posesiva/relativa del original y suena extraño. «Cuya hoja se marchita» conserva mejor la imagen y el singular.
  revised_spanish_text: Porque serán como una encina[a] cuya hoja se marchita, y como un jardín que no tiene agua.
  revised_footnotes:
