    issue: «las Astartes» no preserva de forma suficientemente cercana la decisión léxica documentada para הָעַשְׁתָּרֹת.
    rationale: El audit trail inglés escogió una transliteración del plural hebreo («Ashtaroths») precisamente para no sustituirlo por otro nombre tradicional o interpretación más amplia. «Astartes» introduce otra forma histórica/grecolatina y se aleja de esa justificación. En español, «Astarot» o «Ashtarot» mantiene mejor el referente específico.
  - severity: low
