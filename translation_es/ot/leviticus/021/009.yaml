base_translation:
  language: en
  yaml_path: translation/ot/leviticus/021/009.yaml
  text: And the daughter of a priest[a], if she profanes herself by prostituting herself, profanes her father[b]; she shall be burned with fire.
  footnotes:
  - marker: a
    text: Or 'if she begins to prostitute herself.' The Hebrew verb can in some contexts mean 'begin,' but here it is better taken in the sense of becoming profaned/profaning herself.
    reason: lexical_alternative
  - marker: b
    text: Or 'by playing the prostitute.'
    reason: lexical_alternative
