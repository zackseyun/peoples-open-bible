base_translation:
  language: en
  yaml_path: translation/ot/ruth/004/010.yaml
  text: And also Ruth the Moabite[a], the wife of Mahlon, I have acquired for myself as a wife, to raise up the name of the dead over his inheritance, so that the name of the dead may not be cut off from among his brothers and from the gate of his place[c][b]. You are witnesses today.
  footnotes:
  - marker: a
    text: Or, 'I have bought for myself.' The Hebrew verb can carry the sense of acquiring by purchase in a legal transaction.
    reason: lexical_alternative
  - marker: b
    text: That is, to preserve the deceased man's family line and legal standing in connection with his inherited property.
    reason: cultural_note
  - marker: c
    text: The 'gate' was the public place where legal matters were witnessed and settled.
    reason: cultural_note
