translation:
  language: es
  text: Y sacaste a tu pueblo Israel de la tierra de Egipto con señales y prodigios[a], con mano fuerte y brazo extendido, y con gran terror.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «con gran asombro reverente». El hebreo puede abarcar temor, terror o reverencia asombrada.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַתֹּצֵא
  english_pob_choice: you brought ... out
  chosen_spanish: sacaste
  alternatives_spanish:
  - llevaste ... fuera
  - hiciste salir
  lexicon: HALOT
  rationale: El verbo causativo de יצא en este contexto exige una acción que hace salir; en español, «sacaste» expresa bien la salida causada por Dios y mantiene la fórmula del éxodo de forma natural.
- source_word: עַמְּךָ
  english_pob_choice: your people
  chosen_spanish: tu pueblo
  alternatives_spanish:
  - tu gente
  - tu pueblo, tu propiedad
  lexicon: HALOT
  rationale: Conserva el posesivo directo y el tono de alianza del hebreo, sin añadir explicaciones que el texto no da.
- source_word: אֶת יִשְׂרָאֵל
  english_pob_choice: Israel
  chosen_spanish: Israel
  alternatives_spanish:
  - el Israel
  - el pueblo de Israel
  lexicon: HALOT
  rationale: Se mantiene como aposición a «tu pueblo», reflejando el énfasis hebreo sin volverlo innecesariamente explicativo.
- source_word: מֵאֶרֶץ מִצְרַיִם
  english_pob_choice: out of the land of Egypt
  chosen_spanish: de la tierra de Egipto
  alternatives_spanish:
  - fuera de la tierra de Egipto
  - de la tierra egipcia
  lexicon: HALOT
  rationale: «De la tierra de Egipto» es una equivalencia natural y fiel; el contexto de éxodo ya aporta la idea de salida, así que no hace falta repetirla con una preposición más interpretativa.
- source_word: בְּאֹתוֹת
  english_pob_choice: with signs
  chosen_spanish: con señales
  alternatives_spanish:
  - con signos
  - por señales
  lexicon: HALOT
  rationale: «Señales» es una traducción clara y bíblicamente reconocible de אֹתוֹת; evita un tecnicismo innecesario y conserva el valor instrumental.
- source_word: וּבְמוֹפְתִים
  english_pob_choice: and wonders
  chosen_spanish: y prodigios
  alternatives_spanish:
  - y maravillas
  - y portentos
  lexicon: HALOT
  rationale: «Prodigios» comunica bien el carácter extraordinario de מוֹפְתִים en español bíblico contemporáneo, sin reducirlo a mera espectacularidad.
- source_word: וּבְיָד חֲזָקָה
  english_pob_choice: with a strong hand
  chosen_spanish: con mano fuerte
  alternatives_spanish:
  - con mano poderosa
  - con mano robusta
  lexicon: HALOT
  rationale: Se conserva la imagen hebrea de la mano como poder eficaz. «Fuerte» mantiene la cercanía a חֲזָקָה y suena natural en español.
- source_word: וּבְאֶזְרֹעַ נְטוּיָה
  english_pob_choice: and an outstretched arm
  chosen_spanish: y brazo extendido
  alternatives_spanish:
  - y brazo alargado
  - y brazo tendido
  lexicon: HALOT
  rationale: «Brazo extendido» reproduce la expresión fija del éxodo con buena naturalidad en español y sin perder el paralelismo con «mano fuerte».
- source_word: וּבְמוֹרָא גָּדוֹל
  english_pob_choice: and with great terror
  chosen_spanish: y con gran terror
  alternatives_spanish:
  - y con gran temor
  - y con gran temor reverente
  - y con gran pavor
  lexicon: HALOT
  rationale: Se preserva la tensión semántica de מוֹרָא entre temor, terror y awe. «Gran terror» sigue de cerca la lectura inglesa del POB y comunica el impacto temible de los actos de Yahvé sin suavizarlo.
theological_decisions:
- issue: Valor de מוֹרָא גָּדוֹל al final de la fórmula del éxodo
  english_pob_reading: and with great terror
  chosen_spanish_reading: y con gran terror
  alternative_spanish_readings:
  - y con gran temor
  - y con gran asombro reverente
  rationale: El contexto de liberación de Egipto destaca el carácter temible de las obras de Dios sobre el opresor. «Gran terror» conserva la fuerza del hebreo y la decisión inglesa de no domesticar el efecto emocional del texto, manteniendo la tensión entre temor y reverencia.
  doctrine_reference: Éxodo como acto histórico de juicio y liberación; mantener la ambigüedad léxica de מוֹרָא sin resolverla artificialmente.
translation_notes:
  revision_awareness: El borrador sigue de cerca la decisión inglesa establecida en el audit trail y no introduce cambios revisionales; se conserva la fórmula exódica completa con su cierre lexicalmente tenso en מוֹרָא גָּדוֹל.
  spanish_consistency_notes:
  - Se usó «Yahvé» solo cuando el texto lo exigiera explícitamente; en este versículo el hebreo no contiene el tetragrámaton, así que el referente divino queda implícito en el verbo de segunda persona.
  - Se mantuvo la secuencia paralela «con señales y prodigios, con mano fuerte y brazo extendido» para reflejar el ritmo y el paralelismo del hebreo.
  - «Tierra de Egipto» se prefirió sobre fórmulas más interpretativas para conservar la dicción bíblica y la correspondencia con el sustantivo הארץ en contexto de éxodo.
