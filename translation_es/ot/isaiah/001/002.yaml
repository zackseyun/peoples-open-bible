revisions:
- from: '[a] Oigan, cielos, y presten oído, tierra, porque Yahvé ha hablado: “Yo crié hijos y los engrandecí[b], pero ellos se rebelaron contra mí”'
  to: '[a]Oigan, cielos, y presten oído, tierra, porque Yahvé ha hablado: «Yo crié hijos y los hice crecer[b], pero ellos se rebelaron contra mí»'
  rationale: Se corrigió el anclaje de la nota [a] para cumplir la disciplina de marcadores en el texto. Se cambió «los engrandecí» por «los hice crecer» para alinearlo con el contexto parental del hebreo y con la revisión auditada del POB, que prefirió un sentido de crianza/desarrollo antes que exaltación. También se ajustó la nota [b] para reflejar correctamente esa prioridad contextual, sin perder las alternativas léxicas posibles.
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T23:00:01Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador capta bien la estructura profética, el paralelismo cósmico y el sentido general del versículo. Conserva correctamente «Yahvé», «ha hablado» y «se rebelaron contra mí». Sin embargo, hay dos problemas de fidelidad: (1) el marcador [a] está anclado al inicio del versículo en vez de en «Oigan», donde corresponde la alternativa léxica; (2) «los engrandecí» y su nota empujan demasiado רוֹמַמְתִּי hacia exaltación/engrandecimiento, mientras que el historial auditado del POB para este versículo prefirió el sentido de crianza/crecimiento en contexto («brought them up»).'
  spanish_quality_summary: El español es generalmente natural y digno. «Oigan, cielos, y presten oído, tierra» suena claro y solemne. No obstante, «Yo crié hijos y los engrandecí» resulta menos idiomático y menos contextual que una formulación como «los hice crecer» o «los crié». Además, el anclaje de la nota [a] al comienzo de la oración es impropio según la disciplina de notas del proyecto.
  glossary_alignment: 'Alineación buena en el uso de «Yahvé» para יהוה y en la conservación del tono profético. La decisión «hijos» para בָּנִים es defendible en español, aunque el inglés auditado prefirió «children» por referencia corporativa; no exige cambio. La principal desalineación está en רוֹמַמְתִּי: el borrador sigue una línea de «engrandecer/exaltar», pero la revisión auditada del POB ya documentó que aquí debe reflejar mejor la idea contextual de crianza y crecimiento, no exaltación.'
  issues:
  - severity: medium
    issue: Marcador de nota [a] mal colocado
    rationale: La nota explica la alternativa de «Oigan/Escuchen», por lo que el marcador debe ir sobre esa palabra o frase, no antes de toda la oración.
  - severity: high
    issue: «los engrandecí» sobrerrepresenta רוֹמַמְתִּי en este contexto
    rationale: Aunque el verbo puede sugerir elevación, el expediente auditado concluyó que en Isaías 1:2 el contexto parental requiere una traducción del tipo «brought them up». «Los engrandecí» suena más a exaltación social que a crianza y rompe la revisión ya documentada.
  - severity: medium
    issue: La nota [b] favorece una explicación léxica contraria a la revisión auditada
    rationale: La nota actual presenta «los hice grandes»/«los exalté» como eje principal y solo secundariamente la crianza. Debe reformularse para reflejar que el contexto parental justifica una traducción de crecimiento/crianza, preservando como alternativas secundarias los matices de elevación.
  revised_spanish_text: '[a]Oigan, cielos, y presten oído, tierra, porque Yahvé ha hablado: «Yo crié hijos y los hice crecer[b], pero ellos se rebelaron contra mí»'
  revised_footnotes:
  - marker: a
    text: O «Escuchen». El hebreo abre con un llamado solemne a oír atentamente, con paralelismo poético entre cielo y tierra.
    reason: lexical_alternative
  - marker: b
    text: O «los crié y los levanté». El segundo verbo también puede traducirse más generalmente como «los hice grandes» o «los exalté», pero aquí se entiende mejor en el contexto de crianza y crecimiento.
    reason: lexical_alternative
  revision_rationale: Se corrigió el anclaje de la nota [a] para cumplir la disciplina de marcadores en el texto. Se cambió «los engrandecí» por «los hice crecer» para alinearlo con el contexto parental del hebreo y con la revisión auditada del POB, que prefirió un sentido de crianza/desarrollo antes que exaltación. También se ajustó la nota [b] para reflejar correctamente esa prioridad contextual, sin perder las alternativas léxicas posibles.
