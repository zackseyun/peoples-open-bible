translation:
  language: es
  text: los de Macalón[a], ciento veintidós; los de Betolio, cincuenta y dos; Neifeis, ciento cincuenta y seis.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'El paralelo hebreo de Nehemías 7:25 lee: «los hijos de Ramá y de Gabaa, seiscientos veintiuno». 1 Esdras aquí conserva una tradición de nombres y números sustancialmente distinta.'
    reason: alternative_reading
lexical_decisions:
- source_word: οἱ ἐκ
  english_pob_choice: those from
  chosen_spanish: los de
  alternatives_spanish:
  - los provenientes de
  - los de entre
  lexicon: LSJ
  rationale: La construcción griega identifica a personas por procedencia. En español, «los de» comunica esa pertenencia/origen de forma natural y breve, sin introducir la fórmula hebrea «hijos de», que no es la base primaria aquí.
- source_word: Μακαλών
  english_pob_choice: Makalon
  chosen_spanish: Macalón
  alternatives_spanish:
  - Makalón
  - Macalon
  lexicon: LSJ
  rationale: Nombre propio transliterado desde la forma griega. Se conserva la referencia onomástica sin armonizarla con el paralelo hebreo, que presenta otra tradición de nombres.
- source_word: Βετολιώ
  english_pob_choice: Betolio
  chosen_spanish: Betolio
  alternatives_spanish:
  - Betoliō
  - Betolio
  lexicon: LSJ
  rationale: Nombre propio transliterado del griego. La forma española mantiene la transparencia del nombre sin intentar normalizarlo a otra tradición textual.
- source_word: Νειφείς
  english_pob_choice: Neipheis
  chosen_spanish: Neifeis
  alternatives_spanish:
  - Neipheis
  - Néifeis
  lexicon: LSJ
  rationale: Nombre propio transliterado directamente del nominativo griego. Se adapta la grafía al español para facilitar la lectura, conservando el sonido aproximado del nombre.
- source_word: ἑκατὸν εἴκοσι δύο
  english_pob_choice: one hundred twenty-two
  chosen_spanish: ciento veintidós
  alternatives_spanish:
  - ciento veintidós
  lexicon: LSJ
  rationale: Número cardinal en español moderno estándar, fiel y natural.
- source_word: πεντήκοντα δύο
  english_pob_choice: fifty-two
  chosen_spanish: cincuenta y dos
  alternatives_spanish:
  - cincuenta y dos
  lexicon: LSJ
  rationale: Número cardinal en español moderno estándar.
- source_word: ἑκατὸν πεντήκοντα ἕξ
  english_pob_choice: one hundred fifty-six
  chosen_spanish: ciento cincuenta y seis
  alternatives_spanish:
  - ciento cincuenta y seis
  lexicon: LSJ
  rationale: Número cardinal en español moderno estándar.
theological_decisions:
- issue: Diferencia entre la lista griega y el paralelo hebreo/MT
  english_pob_reading: Translate the Greek list as given, while preserving the Hebrew-parallel difference in a footnote.
  chosen_spanish_reading: Traducir la lista griega tal como está, y señalar en nota que el paralelo hebreo difiere sustancialmente.
  alternative_spanish_readings:
  - Harmonizar el verso con el paralelo hebreo de Nehemías 7:25
  rationale: Para 1 Esdras, el texto primario es el griego de Swete. Dado que el paralelo hebreo ofrece nombres y cifras muy distintos, no conviene armonizar en el cuerpo del texto. La nota mantiene la transparencia textual y deja constancia de la divergencia.
  doctrine_reference: 'PHILOSOPHY.md: Swete LXX is the source for 1 Esdras; WLC MT parallels are cross-referenced but not primary where 1 Esdras diverges.'
translation_notes:
  revision_awareness: Se corrigió el anclaje de la nota al incorporar el marcador [a] en el nombre propio correspondiente, cumpliendo la validación requerida. No se hicieron otros cambios de contenido respecto del sentido del griego y del aparato de auditoría.
  spanish_consistency_notes:
  - Se mantiene «los de» para οἱ ἐκ por ser la forma más natural y transparente en español.
  - Los nombres propios se transliteran de manera consistente y sin harmonización con el paralelo hebreo.
  - Las cifras se expresan con ortografía numérica estándar del español.
  - La nota al pie queda correctamente anclada en el texto para evitar notas huérfanas.
