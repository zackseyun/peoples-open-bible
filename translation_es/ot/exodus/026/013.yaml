base_translation:
  language: en
  yaml_path: translation/ot/exodus/026/013.yaml
  text: And the extra cubit on this side and the extra cubit on that side[a], from the surplus in the length of the tent curtains, shall hang over the sides of the tabernacle on this side and on that side[b], to cover it.
  footnotes:
