- from: Todos estos reyes se juntaron por acuerdo,[a] y vinieron y acamparon juntos junto a las aguas de Merom para pelear contra Israel.
  to: Todos estos reyes se reunieron de común acuerdo,[a] y vinieron y acamparon juntos en las aguas de Merom para pelear contra Israel.
  rationale: Se reemplaza 'se juntaron por acuerdo' por 'se reunieron de común acuerdo' para expresar con mayor precisión y dignidad el sentido de reunión concertada de וַיִּוָּעֲדוּ. También se ajusta 'junto a las aguas' a 'en las aguas de Merom' para evitar la torpeza de 'juntos junto a' y seguir siendo natural en el contexto de acampar. La nota se actualiza con alternativas españolas más idiomáticas.
