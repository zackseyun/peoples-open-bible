translation:
  language: es
  text: En tu impureza hay lascivia[a]. Porque te purifiqué, pero no fuiste purificada de tu impureza; ya no serás purificada más, hasta que haya satisfecho mi ira contra ti[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'También puede entenderse: «Por tu impureza hay lascivia» o, de manera más formal, vincular esta expresión con la cláusula siguiente. El hebreo permite más de una relación sintáctica, pero el contexto inmediato favorece la presentación del texto principal.'
    reason: lexical_alternative
  - marker: b
    text: Literalmente, «hasta que haga reposar mi ira sobre/en ti»; es un modismo hebreo que significa que la ira de Dios queda plenamente descargada.
    reason: lexical_alternative
lexical_decisions:
- source_word: בְּטֻמְאָתֵךְ
  english_pob_choice: In your uncleanness
  chosen_spanish: En tu impureza
  alternatives_spanish:
  - En tu inmundicia
  - En tu impureza ritual
  lexicon: HALOT
  rationale: El hebreo usa ב + טֻמְאָה para describir un estado de impureza. 'Impureza' conserva el valor léxico básico y funciona mejor en español moderno que una calca como 'en tu inmundicia'.
- source_word: זִמָּה
  english_pob_choice: lewdness
  chosen_spanish: lascivia
  alternatives_spanish:
  - liviandad
  - depravación
  - desenfreno
  lexicon: HALOT
  rationale: En Ezequiel el término suele tener una carga de inmoralidad sexual y vergüenza. 'Lascivia' preserva esa fuerza sin volverlo demasiado genérico.
- source_word: יַעַן
  english_pob_choice: Because
  chosen_spanish: Porque
  alternatives_spanish:
  - Puesto que
  - Ya que
  lexicon: HALOT
  rationale: Introduce la base causal del juicio; 'Porque' es natural y fiel al sentido lógico del hebreo.
- source_word: טִהַרְתִּיךְ
  english_pob_choice: I cleansed you
  chosen_spanish: te purifiqué
  alternatives_spanish:
  - te limpié
  - te quité la impureza
  lexicon: HALOT
  rationale: Se mantiene el valor verbal directo del hebreo. Aunque el audit trail inglés discutió un matiz de intento, la revisión posterior prefirió la forma más cercana al original; en español 'te purifiqué' conserva esa correspondencia.
- source_word: וְלֹא טָהַרְתְּ
  english_pob_choice: but you were not cleansed
  chosen_spanish: pero no te purificaste
  alternatives_spanish:
  - pero no quedaste limpia
  - pero no fuiste purificada
  lexicon: HALOT
  rationale: La construcción expresa el resultado negativo en contraste con la acción divina. El reflexivo en español comunica bien que no se produjo el cambio esperado, sin forzar una pasiva pesada.
- source_word: מִטֻּמְאָתֵךְ
  english_pob_choice: from your uncleanness
  chosen_spanish: de tu impureza
  alternatives_spanish:
  - de tu inmundicia
  - de tu impureza ritual
  lexicon: HALOT
  rationale: Repite el campo léxico de טֻמְאָה para conservar coherencia terminológica dentro del versículo.
- source_word: לֹא תִטְהֲרִי עוֹד
  english_pob_choice: you will not be cleansed anymore
  chosen_spanish: ya no te purificarás más
  alternatives_spanish:
  - ya no serás purificada
  - no volverás a purificarte
  lexicon: HALOT
  rationale: '''Ya no'' comunica la continuidad de la prohibición/jucio, y ''más'' reproduce עוֹד de manera natural. El reflexivo mantiene la misma familia verbal del versículo.'
- source_word: הֲנִיחִי אֶת חֲמָתִי בָּךְ
  english_pob_choice: until I have satisfied my wrath against you
  chosen_spanish: hasta que haya dado descanso a mi ira contra ti
  alternatives_spanish:
  - hasta que haya satisfecho mi ira contra ti
  - hasta que haya hecho reposar mi ira sobre ti
  lexicon: HALOT
  rationale: La expresión hebrea dice literalmente 'hacer descansar' la ira. 'Dar descanso a mi ira' conserva la imagen idiomática sin perder claridad; 'ira' mantiene el tono profético de חֵמָה.
theological_decisions:
- issue: Cómo reflejar el contraste entre la acción purificadora de Dios y la negativa/fracaso de la purificación en la segunda mitad del versículo
  english_pob_reading: Because I cleansed you, but you were not cleansed
  chosen_spanish_reading: Porque te purifiqué, pero no te purificaste
  alternative_spanish_readings:
  - Porque te limpié, pero no quedaste limpia
  - Aunque te purifiqué, no te purificaste
  rationale: El hebreo mantiene juntos el acto divino y el resultado negativo. En español, el giro con 'pero' reproduce bien la oposición sin introducir un matiz que el texto no exige.
  doctrine_reference: Translation philosophy §1, §3, §6
- issue: Cómo expresar el final de la ira divina en הֲנִיחִי אֶת־חֲמָתִי בָּךְ
  english_pob_reading: until I have satisfied my wrath against you
  chosen_spanish_reading: hasta que haya dado descanso a mi ira contra ti
  alternative_spanish_readings:
  - hasta que haya satisfecho mi ira contra ti
  - hasta que haya hecho reposar mi ira sobre ti
  rationale: El hebreo usa una imagen de la ira que 'descansa' cuando ha sido plenamente ejecutada. 'Dar descanso' conserva el idiomatismo sin convertirlo en una fórmula doctrinal ajena al contexto.
  doctrine_reference: Translation philosophy §1, §6
translation_notes:
  revision_awareness: El borrador sigue la revisión más reciente del audit trail, que prefirió una afirmación directa de la purificación ('I cleansed you') sobre la lectura más interpretativa de intento. En español se refleja esa decisión con «te purifiqué», manteniendo el contraste inmediato con «pero no te purificaste».
  spanish_consistency_notes:
  - Se conservó el mismo campo léxico de טֻמְאָה con «impureza» en ambas ocurrencias para mantener coherencia.
  - Se prefirió «purificar» para טהר en todo el versículo, evitando alternar con «limpiar» salvo que el contexto lo exigiera.
  - Se tradujo חֵמָה como «ira» por la fuerza profética y judicial del pasaje.
  - Se mantuvo un registro bíblico claro y publicable, evitando una paráfrasis excesiva o un calco demasiado rígido.
