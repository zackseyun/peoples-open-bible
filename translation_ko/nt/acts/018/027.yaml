  text: 그가 아카이아로 건너가기를 원하므로, 형제들이 그를 격려하면서 제자들에게 그를 영접하도록 편지하였습니다. 그가 그곳에 이르러 은혜로 말미암아 믿게 된 사람들에게 많은 도움을 주었습니다.
  philosophy: optimal-equivalence
