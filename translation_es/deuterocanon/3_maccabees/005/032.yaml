  yaml_path: translation/deuterocanon/3_maccabees/005/032.yaml
  text: Yet[a], if it were not for your affection because of the gathering together and the necessity[b], you would have been deprived of life instead of these things.
  footnotes:
  - marker: a
    text: Or 'your affection for the gathering' or 'your fondness for the crowd.' The Greek συστροφή can denote a gathering or massed crowd; the exact nuance here is context-dependent.
    reason: lexical_alternative
  - marker: b
    text: The phrase 'and for need' may also be understood as 'and because of necessity.'
    reason: lexical_alternative
