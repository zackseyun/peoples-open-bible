translation:
  language: es
  text: Y desplegaron el libro de la ley[a], sobre el cual[b] las naciones estaban buscando las semejanzas de sus ídolos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «abrieron» o «desenrollaron» el libro de la ley.'
    reason: lexical_alternative
  - marker: b
    text: El griego es muy comprimido; el sentido puede ser que las naciones buscaban, en relación con el libro de la ley, las semejanzas de sus ídolos.
    reason: alternative_reading
lexical_decisions:
- source_word: ἐξεπέτασαν
  english_pob_choice: spread out
  chosen_spanish: extendieron
  alternatives_spanish:
  - abrieron
  - desenrollaron
  lexicon: LSJ
  rationale: El verbo griego expresa la acción física de desplegar o extender algo. 'Extendieron' conserva esa imagen concreta sin imponer demasiado si se trataba de un rollo o de un libro en formato posterior. 'Abrieron' es más natural, pero menos visual; 'desenrollaron' sería demasiado específico.
- source_word: τὸ βιβλίον τοῦ νόμου
  english_pob_choice: the book of the law
  chosen_spanish: el libro de la ley
  alternatives_spanish:
  - el rollo de la ley
  - el libro de la Ley
  lexicon: LSJ
  rationale: La frase se vierte de forma directa y transparente. 'Libro de la ley' reproduce bien la referencia escritural y mantiene la sencillez del griego. Se evita capitalizar 'Ley' porque el texto no lo exige de manera inequívoca.
- source_word: περὶ ὧν
  english_pob_choice: concerning which
  chosen_spanish: acerca del cual
  alternatives_spanish:
  - sobre el cual
  - con respecto al cual
  lexicon: LSJ
  rationale: La construcción relativa se conserva de manera visible para no resolver prematuramente la relación sintáctica difícil del griego. 'Acerca del cual' es natural en español y mantiene la conexión abierta con la cláusula siguiente.
- source_word: ἐξηρεύων
  english_pob_choice: were searching for
  chosen_spanish: estaban buscando
  alternatives_spanish:
  - estaban buscando con empeño
  - estaban indagando
  lexicon: LSJ
  rationale: El imperfecto sugiere una acción continua o habitual. 'Estaban buscando' comunica bien esa continuidad y preserva la amplitud semántica de ἐξηρεύων sin volverla más interpretativa de lo necesario.
- source_word: τὰ ἔθνη
  english_pob_choice: the nations
  chosen_spanish: las naciones
  alternatives_spanish:
  - los gentiles
  - los pueblos
  lexicon: LSJ
  rationale: En este contexto deuterocanónico, el término apunta a pueblos no israelitas. 'Las naciones' es la opción más directa y menos cargada teológicamente en español.
- source_word: τὰ ὁμοιώματα
  english_pob_choice: the likenesses
  chosen_spanish: las semejanzas
  alternatives_spanish:
  - las imágenes
  - las representaciones
  lexicon: LSJ
  rationale: '''Semejanzas'' mantiene la distinción lexical respecto de εἴδωλα y conserva el matiz de cosas que se parecen o representan otra realidad. ''Imágenes'' podría solaparse demasiado con ''ídolos''.'
- source_word: τῶν εἰδώλων αὐτῶν
  english_pob_choice: of their idols
  chosen_spanish: de sus ídolos
  alternatives_spanish:
  - de sus imágenes
  - de sus falsos dioses
  lexicon: LSJ
  rationale: '''Ídolos'' recoge el sentido cultual y polémico de εἴδωλα. Se evita ''falsos dioses'' porque añade una explicación que el griego no formula de modo explícito.'
theological_decisions:
- issue: Construcción comprimida entre el libro de la ley y la búsqueda de las semejanzas de los ídolos
  english_pob_reading: 'The Greek is compressed: the sense may be that the nations searched the law-book in relation to making or consulting representations of their idols.'
  chosen_spanish_reading: 'La traducción conserva la compresión del griego: las naciones buscaban las semejanzas de sus ídolos en relación con el libro de la ley, sin precisar más de lo que el texto permite.'
  alternative_spanish_readings:
  - Abrían el libro de la ley para comparar sus contenidos con las imágenes de sus ídolos.
  - Extendieron el libro de la ley mientras examinaban las imágenes de sus ídolos.
  rationale: El griego no aclara del todo el escenario práctico y conviene no resolverlo en exceso. La versión española mantiene la tensión textual y deja abierta la relación exacta entre el libro de la ley y las representaciones idolátricas, como exige la pauta de preservar ambigüedad documentada.
  doctrine_reference: DOCTRINE.md §3 Preserve theological tension rather than resolve it
translation_notes:
  revision_awareness: Se tuvo en cuenta el pasaje griego de Swete (1909) y la auditoría inglesa. La revisión más reciente afinó ἐξηρεύων hacia una idea más natural de 'searching for'; en español se reflejó con 'estaban buscando' para conservar continuidad verbal sin forzar una explicación adicional. También se preservó la compresión sintáctica señalada por la POB inglesa, evitando una paráfrasis que aclarara indebidamente la relación entre el libro de la ley y las imágenes idolátricas.
  spanish_consistency_notes:
  - Se usa 'ley' en minúscula, de manera consistente con una traducción transparente y no interpretativa.
  - Se usa 'ídolos' para εἴδωλα, manteniendo el registro cultual habitual y la fuerza polémica del término.
  - Se evita 'gentiles' en favor de 'naciones' por neutralidad lexical y coherencia con el criterio POB.
  - La nota a pie de página marca la alternativa de 'abrieron'/'desenrollaron' sin duplicar el marcador.
  - La traducción conserva la ambigüedad del griego en la relación sintáctica, sin resolverla con una explicación añadida en el texto principal.
