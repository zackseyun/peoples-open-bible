base_translation:
  language: en
  yaml_path: translation/ot/exodus/002/015.yaml
  text: When Pharaoh heard this matter[a], he sought to kill Moses. But Moses fled from Pharaoh and stayed in the land of Midian[b], and he sat down by the well.
  footnotes:
