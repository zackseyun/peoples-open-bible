translation:
  text: '1[a]. But Pentephris, persuaded by her words, ordered the broker to be brought, and said to him, “What is this that I hear concerning you—that you steal souls from the land of Canaan and sell them as slaves?”


    2. But the broker fell at his feet and begged him, saying, “I beg you, lord[b], I do not know what you are saying.”


    3. And Pentephris fell upon him and said to him, “From where, then, is this Hebrew slave before me?” And he said, “The Ishmaelites entrusted him to me until they return.”


    4. But he did not believe him; rather, he ordered him to be beaten naked. And when he persisted in these words, Pentephris said, “Then let the young man be brought.”


    5. And when I was brought in, I bowed down to Pentephris, for he was, he said, third in rank among Pharaoh’s rulers.


    6. And after separating me from him, he said to me, “Are you a slave or free?” And I said, “A slave.”


    7. And he said, “Whose?” And I said, “The Ishmaelites’.”


    8. But he said, “How did you become their slave?” And I said, “They bought me from the land of Canaan.”


    9. But he said to me[c][d], “You are truly lying.” And immediately he ordered me also to be stripped naked...'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Greek 'steal souls' likely means 'kidnap people' or 'steal persons' in context.
    reason: lexical_alternative
    anchor_ref: '13:1'
  - marker: b
    text: The Greek text is difficult at the start of the verse; the sense is that Pentephris presses the broker about the origin of 'this Hebrew slave' standing before him.
    reason: textual_variant
    anchor_ref: '13:3'
  - marker: d
    text: Or 'third in office among Pharaoh’s rulers.'
    reason: lexical_alternative
    anchor_ref: '13:5'
  - marker: c
    text: The chapter breaks off in the extant OCR witness here, after 'he ordered me also to be stripped naked.'
    reason: textual_variant
    anchor_ref: '13:9'
lexical_decisions:
- source_word: μετάβολος
  chosen: broker
  alternatives:
  - trader
  - dealer
  - middleman
  lexicon: LSJ
  rationale: The term denotes an intermediary in trade rather than simply a generic merchant. 'Broker' best captures the role in the accusation and interrogation scene.
- source_word: κλέπτεις ψυχὰς
  chosen: steal souls
  alternatives:
  - steal persons
  - kidnap people
  lexicon: LSJ
  rationale: Literally 'steal souls.' In this testamentary/Jewish idiom ψυχαί can mean persons/lives, especially in slave-trading context. I preserved the vivid literal expression in English because it carries the moral force of trafficking human lives.
- source_word: παῖδας μεταπωλεῖς
  chosen: sell them again as slaves
  alternatives:
  - resell them as servants
  - sell them into slavery
  lexicon: LSJ
  rationale: μεταπωλεῖς implies resale; παῖδας here refers to enslaved persons/servile status in context, not merely children. 'As slaves' makes the bonded nature explicit.
- source_word: κύριε
  chosen: lord
  alternatives:
  - master
  - sir
  lexicon: LSJ
  rationale: In direct address to a superior official, 'lord' preserves the elevated register without over-specifying ownership as 'master.'
- source_word: γυμνὸν τύπτεσθαι
  chosen: to be beaten naked
  alternatives:
  - to be flogged stripped
  - to be beaten after being stripped
  lexicon: LSJ
  rationale: The Greek combines stripping and beating in a judicial humiliation context. 'Beaten naked' is concise and preserves the shame element.
- source_word: νεανίσκος
  chosen: young man
  alternatives:
  - youth
  - lad
  lexicon: LSJ
  rationale: '''Young man'' is natural readable English and fits Joseph''s self-presentation before an Egyptian official.'
- source_word: προσεκύνησα
  chosen: I bowed down
  alternatives:
  - I prostrated myself
  - I did obeisance
  lexicon: LSJ
  rationale: The verb indicates reverential bodily submission. 'Bowed down' is readable while preserving the deferential action.
- source_word: ἀξίωμα
  chosen: rank
  alternatives:
  - office
  - dignity
  - position
  lexicon: LSJ
  rationale: In the phrase about being third among Pharaoh's rulers, 'rank' best conveys official standing.
- source_word: δοῦλος
  chosen: slave
  alternatives:
  - servant
  - bondservant
  lexicon: BDAG
  rationale: Following project doctrine, the bonded nature is salient in this interrogation about ownership and sale; therefore 'slave' is required.
- source_word: ἐλεύθερος
  chosen: free
  alternatives:
  - a free man
  - freedman
  lexicon: BDAG
  rationale: The contrast is directly with δοῦλος. 'Free' is concise and idiomatic in dialogue.
- source_word: Γὄντως ψεύδῃ
  chosen: You are truly lying
  alternatives:
  - You are certainly lying
  - You are plainly lying
  lexicon: LSJ
  rationale: The adverb intensifies the accusation. 'Truly' preserves the force without sounding too colloquial.
