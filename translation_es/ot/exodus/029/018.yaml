revisions:
- from: Y harás arder todo el carnero sobre el altar[a]. Es un holocausto para Yahvé, un aroma agradable[b], una ofrenda que se quema para Yahvé.
  to: Y harás arder[a] todo el carnero sobre el altar. Es un holocausto para Yahvé, un aroma agradable, una ofrenda de alimento[b] para Yahvé.
  rationale: Se corrige el anclaje de la nota verbal para que corresponda al verbo הִקְטַרְתָּ y no a «altar». También se ajusta אִשֶּׁה a «ofrenda de alimento», que preserva mejor la decisión léxica documentada por el POB y mantiene un registro bíblico natural en español. No se requieren cambios doctrinales ni de fondo adicionales.
