translation:
  language: es
  text: 'Entonces Hushai dijo a Absalón[a]: «El consejo que ha dado Ahitofel[b] no es bueno.»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «a Absalón».
    reason: lexical_alternative
  - marker: b
    text: O «ha aconsejado» o «ha propuesto».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר
  english_pob_choice: Then ... said
  chosen_spanish: Entonces ... dijo
  alternatives_spanish:
  - Y ... dijo
  - Luego ... dijo
  lexicon: HALOT
  rationale: La waw consecutiva introduce avance narrativo; «entonces» comunica bien esa secuencia en español sin sonar mecánico. «Dijo» es la forma natural para el verbo de habla.
- source_word: אֶל
  english_pob_choice: to
  chosen_spanish: a
  alternatives_spanish:
  - hacia
  - para
  lexicon: HALOT
  rationale: En español, con verbo de habla y destinatario personal, la preposición natural es «a». Conserva la dirección del enunciado hacia Absalón.
- source_word: לֹא טוֹבָה
  english_pob_choice: is not good
  chosen_spanish: no es bueno
  alternatives_spanish:
  - no es acertado
  - no es favorable
  lexicon: HALOT
  rationale: El hebreo usa un juicio evaluativo general; «no es bueno» reproduce esa valoración sin precisar más de lo que el texto dice.
- source_word: הָעֵצָה
  english_pob_choice: the counsel
  chosen_spanish: el consejo
  alternatives_spanish:
  - la recomendación
  - el plan
  lexicon: HALOT
  rationale: «עֵצָה» puede ser consejo, recomendación o plan. Aquí «consejo» mantiene el tono formal y encaja con la función política de Ahitofel.
- source_word: אֲשֶׁר יָעַץ
  english_pob_choice: that ... has given
  chosen_spanish: que ha dado
  alternatives_spanish:
  - que ha aconsejado
  - que ha propuesto
  lexicon: HALOT
  rationale: El hebreo expresa literalmente que Ahitofel «aconsejó»; en español, «ha dado consejo» es natural. «Que ha dado» conserva la estructura del complemento relativo y la acción completa.
- source_word: בַּפַּעַם הַזֹּאת
  english_pob_choice: this time
  chosen_spanish: esta vez
  alternatives_spanish:
  - en esta ocasión
  - en esta oportunidad
  lexicon: HALOT
  rationale: La locución hebrea señala una ocasión concreta. «Esta vez» es la equivalencia más natural y breve en español, con el mismo valor temporal situacional.
- source_word: אֲחִיתֹפֶל
  english_pob_choice: Ahithophel
  chosen_spanish: Ahitofel
  alternatives_spanish:
  - Ajitofel
  lexicon: HALOT
  rationale: Nombre propio transliterado con grafía española habitual y legible. Se evita la forma inglesa transliterada para la presentación en español.
translation_notes:
  revision_awareness: 'Alineado con el pasaje fuente y con la POB inglesa: se conserva la secuencia narrativa, el juicio evaluativo general de טוֹבָה y la alternativa temporal implícita en בַּפַּעַם הַזֹּאת. No se introdujeron cambios textuales ni notas teológicas.'
  spanish_consistency_notes:
  - Se usa «Ahitofel» como transliteración española consistente de אֲחִיתֹפֶל.
  - «Consejo» mantiene el campo semántico de עֵצָה en contexto estratégico/político.
  - «Esta vez» refleja el valor ocasional de בַּפַּעַם הַזֹּאת y corresponde a la alternativa inglesa «on this occasion».
