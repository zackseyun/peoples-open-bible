base_translation:
  language: en
  yaml_path: translation/ot/2_samuel/021/012.yaml
  text: Then David went and took the bones of Saul and the bones of Jonathan his son from the citizens of Jabesh-gilead[a], who had stolen them from the public square of Beth-shan[c][b], where the Philistines had hung them on the day the Philistines struck down Saul on Gilboa.
  footnotes:
  - marker: a
    text: Or 'remains' for 'bones,' though the Hebrew more literally says 'bones.'
    reason: lexical_alternative
  - marker: b
    text: '''Hung them'' could also be rendered ''displayed them'' or, in a stronger reading, ''impaled them''; the Hebrew verb itself most directly means ''hang.'''
    reason: lexical_alternative
  - marker: c
    text: Gilboa refers to the mountain area where Saul fell (cf. 1 Sam 31:8–13).
    reason: cross_reference
