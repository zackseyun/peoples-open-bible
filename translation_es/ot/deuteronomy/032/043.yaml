translation:
  language: es
  text: ¡Regocíjense[a], naciones, con su pueblo! Porque él vengará la sangre de sus siervos[b]; les dará su merecido a sus adversarios[c], y hará expiación[d] por su tierra y su pueblo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «¡Canten de alegría, naciones, con su pueblo!». El imperativo hebreo puede expresar júbilo con gritos o canto.
    reason: lexical_alternative
  - marker: b
    text: Hebreo «la sangre de sus siervos»; «esclavos» también es posible para este sustantivo en otros contextos.
    reason: lexical_alternative
  - marker: c
    text: La Septuaginta griega y un manuscrito del Mar Muerto conservan una forma más larga de este versículo, incluyendo llamados adicionales a que los cielos y los seres divinos se regocijen y a que las naciones lo adoren. El texto principal aquí sigue el hebreo masorético.
    reason: textual_variant
  - marker: d
    text: O «limpiará/purgará su tierra y su pueblo». El verbo hebreo puede enfatizar expiación o purificación.
    reason: lexical_alternative
lexical_decisions:
- source_word: הַרְנִינוּ
  english_pob_choice: Rejoice
  chosen_spanish: ¡Regocíjense
  alternatives_spanish:
  - ¡Canten de alegría
  - ¡Griten de júbilo
  lexicon: HALOT
  rationale: El imperativo plural de רנן expresa júbilo exultante. En español, «regocíjense» comunica bien el tono festivo y mantiene la dignidad poética; las alternativas conservan el matiz sonoro más explícito.
- source_word: גוֹיִם
  english_pob_choice: nations
  chosen_spanish: naciones
  alternatives_spanish:
  - gentiles
  - pueblos
  lexicon: HALOT
  rationale: En este contexto colectivo y poético, «naciones» es la equivalencia más natural y mantiene el contraste con «su pueblo». «Gentiles» suena demasiado cristiano-neotestamentario.
- source_word: עַמּוֹ
  english_pob_choice: with his people
  chosen_spanish: con su pueblo
  alternatives_spanish:
  - su pueblo
  lexicon: HALOT
  rationale: El hebreo es condensado; el sentido relacional más probable es que las naciones se alegren junto con el pueblo de Dios. En español, «con» expresa esa relación sin añadir más de lo necesario.
- source_word: דַם עֲבָדָיו
  english_pob_choice: the blood of his servants
  chosen_spanish: la sangre de sus esclavos
  alternatives_spanish:
  - la sangre de sus siervos
  - la sangre de sus servidores
  lexicon: HALOT
  rationale: POB preserva la fuerza léxica de עבד como «slaves» en otros contextos. Aquí se mantiene «esclavos» por transparencia léxica, aunque el foco teológico recae en que le pertenecen a Dios y su sangre fue derramada injustamente.
- source_word: יִקּוֹם
  english_pob_choice: he will avenge
  chosen_spanish: vengará
  alternatives_spanish:
  - tomará venganza
  - hará justicia vengando
  lexicon: HALOT
  rationale: El verbo נקם en este marco de sangre derramada pide un verbo de vindicación retributiva. «Vengará» es natural y fiel al peso del término.
- source_word: וְנָקָם יָשִׁיב
  english_pob_choice: he will repay his adversaries
  chosen_spanish: devolverá el castigo sobre
  alternatives_spanish:
  - repagará a
  - hará recaer venganza sobre
  lexicon: HALOT
  rationale: El hebreo literalmente combina la idea de «devolver» con «venganza/castigo». «Devolverá el castigo sobre» intenta conservar el movimiento retributivo sin repetir innecesariamente «venganza».
- source_word: לְצָרָיו
  english_pob_choice: on his adversaries
  chosen_spanish: sus adversarios
  alternatives_spanish:
  - sus enemigos
  - sus opositores
  lexicon: HALOT
  rationale: צָרִים son oponentes hostiles; «adversarios» conserva un registro formal y poético. La relación implícita de dirección o recaída queda expresada por el verbo anterior.
- source_word: וְכִפֶּר
  english_pob_choice: he will make atonement for
  chosen_spanish: hará expiación
  alternatives_spanish:
  - hará atonement por
  - limpiará
  - purificará
  lexicon: HALOT
  rationale: כפר tiene fuerza expiatoria/cultual. «Hará expiación» conserva el término técnico sin perder la carga teológica; en español bíblico moderno es comprensible y fiel.
- source_word: אַדְמָתוֹ
  english_pob_choice: his land
  chosen_spanish: su tierra
  alternatives_spanish:
  - su país
  - su suelo
  lexicon: HALOT
  rationale: אדמה designa tierra/ground en sentido territorial. «Su tierra» es idiomático y mantiene el paralelo con «su pueblo».
- source_word: עַמּוֹ
  english_pob_choice: his people
  chosen_spanish: su pueblo
  alternatives_spanish:
  - su gente
  lexicon: HALOT
  rationale: El cierre coordina tierra y pueblo; «su pueblo» reproduce bien el vínculo de pertenencia y evita la vaguedad de «gente».
theological_decisions:
- issue: Relación sintáctica y teológica de «naciones» con «su pueblo»
  english_pob_reading: The nations are summoned to rejoice with God's people.
  chosen_spanish_reading: Las naciones son llamadas a regocijarse con el pueblo de Dios.
  alternative_spanish_readings:
  - Las naciones son llamadas a alabar a su pueblo.
  - El texto podría reflejar una expansión textual en la LXX y en un manuscrito del Mar Muerto.
  rationale: El hebreo masorético es breve y permite una relación implícita; en español, «con su pueblo» hace explícita la lectura más probable sin depender de la tradición textual ampliada. Esto mantiene la tensión sintáctica sin borrarla.
  doctrine_reference: 'Translation philosophy #1 and #3'
- issue: Sentido de כפר al final del versículo
  english_pob_reading: The verse speaks of God making atonement for his land and his people.
  chosen_spanish_reading: El versículo habla de que Dios hace expiación por su tierra y su pueblo.
  alternative_spanish_readings:
  - Dios limpia/purga su tierra y su pueblo.
  - Dios se reconcilia con su tierra y su pueblo.
  rationale: «Hará expiación» conserva la carga cultual y sacrificial de כפר, sin adelantar una explicación doctrinal posterior. «Expiación» mantiene el peso teológico que la POB quiso preservar.
  doctrine_reference: 'Translation philosophy #6'
translation_notes:
  revision_awareness: 'La revisión inglesa reciente afinó dos puntos: eliminó una formulación redundante sobre ‘venganza’ y coordinó explícitamente ‘su tierra y su pueblo’. La redacción española sigue esa revisión al usar una sola expresión de retribución («devolverá el castigo sobre») y la coordinación final «su tierra y su pueblo».'
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el hebreo subyacente es יהוה; en este versículo no aparece.
  - Se mantiene «expiación» para כפר por coherencia con el valor cultual preservado en el audit trail.
  - «Esclavos» se conserva por la decisión léxica POB de no suavizar עבדים cuando la transparencia es prioritaria.
  - La puntuación y el orden poético buscan reproducir el paralelismo del hebreo sin añadir contenido interpretativo excesivo.
