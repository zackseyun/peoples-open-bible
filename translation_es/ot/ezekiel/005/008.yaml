review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la estructura y el sentido del hebreo: inferencia («Por tanto»), fórmula profética («así dice»), oposición divina («contra ti»), énfasis («yo mismo»), ejecución de juicios dentro de Jerusalén y visibilidad ante las naciones. Sin embargo, en אֲדֹנָי יְהוִה la forma «el Señor Yahvé» conserva el nombre divino pero añade un artículo que no suena natural en español bíblico y puede diluir la fuerza titular compuesta; «el Señor, Yahvé» o «el Señor Yahvé» son posibles, pero el proyecto privilegia claridad y legibilidad con «el Señor Yahvé» solo si realmente funciona idiomáticamente. Aquí conviene una leve reparación de puntuación y de la nota para explicar mejor la decisión.'
  spanish_quality_summary: 'El español es claro, digno y ampliamente legible. La sintaxis es natural y no cae en calcos graves. «He aquí» y «ante los ojos de las naciones» mantienen bien el registro profético. El único punto mejorable es la presentación del título divino: con coma aposicional («el Señor, Yahvé») se lee con mayor naturalidad en español y distingue mejor título y nombre. También conviene alinear la nota al hecho de que el texto español no usa la convención inglesa de enmascarar YHWH.'
  glossary_alignment: 'Alineación mayormente buena con la terminología del proyecto: יְהוָה se preserva como «Yahvé», no como «SEÑOR»; מִשְׁפָּטִים se traduce adecuadamente «juicios»; הַגּוֹיִם como «las naciones»; הִנְנִי como «He aquí». La revisión propuesta mantiene estos aciertos y solo ajusta la forma española del título compuesto para mayor naturalidad y precisión.'
  issues:
  - severity: medium
    issue: La expresión «el Señor Yahvé» es algo rígida en español.
    rationale: 'Aunque preserva ambos elementos de אֲדֹנָי יְהוִה, en español suena más natural marcar relación aposicional: «el Señor, Yahvé». Esto mantiene el nombre divino visible y evita una secuencia poco idiomática.'
  - severity: low
    issue: La nota al pie puede formularse con mayor precisión para el lector español.
    rationale: La explicación actual menciona la máscara «SEÑOR», pero conviene aclarar que aquí se conserva explícitamente «Yahvé» en el título compuesto, en vez de centrarse en la convención inglesa.
  revised_spanish_text: 'Por tanto, así dice el Señor, Yahvé: He aquí[a], yo mismo estoy contra ti, y ejecutaré juicios en medio de ti, ante los ojos de las naciones.'
  revised_footnotes:
  - marker: a
    text: 'Hebreo: «el Señor, YHWH». Se conserva el nombre divino como «Yahvé» en español, en vez de reemplazarlo con una forma enmascarada como «SEÑOR».'
    reason: lexical_alternative
  revision_rationale: La revisión es pequeña pero mejora la naturalidad y la precisión del título compuesto אֲדֹנָי יְהוִה en español, manteniendo la política del proyecto de traducir יְהוָה como «Yahvé». El resto del versículo ya era fiel al hebreo, claro y terminológicamente sólido.
