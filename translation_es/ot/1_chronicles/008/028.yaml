translation:
  language: es
  text: Estos eran jefes de casas paternas según sus generaciones[a], hombres principales. Estos habitaron en Jerusalén.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'cabezas de casas ancestrales ... jefes'. El hebreo repite la raíz de 'cabeza/jefe' para dar énfasis.
    reason: lexical_alternative
lexical_decisions:
- source_word: רָאשֵׁי אָבוֹת
  english_pob_choice: heads of fathers’ houses
  chosen_spanish: cabezas de casas paternas
  alternatives_spanish:
  - jefes de casas paternas
  - cabezas de hogares ancestrales
  - líderes de familias
  lexicon: HALOT
  rationale: La expresión hebrea es un idiomático social-genealógico. 'Casas paternas' conserva la estructura de pertenencia por linaje, y 'cabezas' mantiene la imagen de jefatura sin sustituirla por una formulación más interpretativa.
- source_word: לְתֹלְדוֹתָם
  english_pob_choice: according to their generations
  chosen_spanish: según sus generaciones
  alternatives_spanish:
  - de acuerdo con sus generaciones
  - por sus generaciones
  - según sus genealogías
  lexicon: HALOT
  rationale: '''תולדות'' aquí apunta al orden genealógico o de descendencia. ''Según sus generaciones'' conserva ese sentido formal sin convertirlo en una referencia explícita a registros escritos que el hebreo no exige.'
- source_word: רָאשִׁים
  english_pob_choice: chief men
  chosen_spanish: hombres principales
  alternatives_spanish:
  - jefes
  - principales
  - jefes principales
  lexicon: HALOT
  rationale: El hebreo repite la idea de 'cabeza/jefe' para énfasis. En español, repetir 'cabezas' sonaría forzado; 'hombres principales' preserva el peso de prominencia social sin borrar la redundancia enfática.
- source_word: יָשְׁבוּ
  english_pob_choice: lived
  chosen_spanish: habitaron
  alternatives_spanish:
  - vivieron
  - residieron
  - moraron
  lexicon: HALOT
  rationale: En este contexto genealógico, el verbo expresa residencia estable. 'Habitaron' es suficientemente digno y refleja mejor el matiz bíblico que un simple 'vivieron'.
- source_word: בִירוּשָׁלַם
  english_pob_choice: in Jerusalem
  chosen_spanish: en Jerusalén
  alternatives_spanish:
  - en la ciudad de Jerusalén
  lexicon: HALOT
  rationale: Nombre propio estándar con la preposición conservada.
- source_word: אֵלֶּה ... אֵלֶּה
  english_pob_choice: These ... These
  chosen_spanish: Estos ... Estos
  alternatives_spanish:
  - Estos eran ... ellos
  - Éstos ... éstos
  lexicon: HALOT
  rationale: La repetición del demostrativo estructura y enfatiza la declaración. En español se conserva la repetición al inicio y en el segundo miembro para reflejar el patrón discursivo hebreo.
translation_notes:
  revision_awareness: El contexto inglés muestra alta concordancia con la fuente hebrea y no registra revisiones aplicadas; por eso la versión española sigue de cerca la sintaxis y las repeticiones del original, ajustando solo donde el español exige mayor naturalidad.
  spanish_consistency_notes:
  - Se mantuvo 'Yahvé' como norma del proyecto solo cuando corresponde; este versículo no contiene el tetragrámaton.
  - Se evitó 'SEÑOR' y 'Cristo' por no ser pertinentes al texto.
  - Se conservó el paralelismo demostrativo 'Estos ... Estos' para reflejar el énfasis hebreo.
  - La elección de 'habitaron' busca un registro bíblico natural sin perder el sentido de residencia estable.
