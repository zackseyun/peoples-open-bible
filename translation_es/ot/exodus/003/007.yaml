translation:
  language: es
  text: 'Entonces Yahvé dijo[a]: «Ciertamente he visto la aflicción de mi pueblo que está en Egipto, y he oído su clamor[b] a causa de sus opresores[c], porque conozco sus sufrimientos».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «De veras he visto». El hebreo usa un infinitivo absoluto con el verbo finito para dar énfasis.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «grito».'
    reason: lexical_alternative
  - marker: c
    text: 'O: «capataces».'
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  - el SEÑOR
  lexicon: Nombre divino (Tetragrámaton)
  rationale: El POB en inglés translitera el nombre propio divino; en español, el equivalente establecido por defecto del proyecto es «Yahvé», que preserva el nombre personal de Dios revelado a Israel sin sustituirlo por un título.
- source_word: רָאֹה רָאִיתִי
  english_pob_choice: I have surely seen
  chosen_spanish: he visto ciertamente
  alternatives_spanish:
  - he visto sin duda
  - he visto de veras
  - he visto
  lexicon: Infinitivo absoluto + verbo finito de énfasis
  rationale: La construcción hebrea intensifica la acción. «Ciertamente he visto» conserva el énfasis de manera natural en español y evita una traducción mecánica.
- source_word: עֳנִי
  english_pob_choice: affliction
  chosen_spanish: aflicción
  alternatives_spanish:
  - miseria
  - opresión
  - sufrimiento
  lexicon: HALOT
  rationale: «Aflicción» recoge el dolor y la dureza de la situación sin reducir el término solo a opresión política ni solo a sufrimiento interior.
- source_word: עַמִּי
  english_pob_choice: my people
  chosen_spanish: mi pueblo
  alternatives_spanish:
  - mi gente
  lexicon: HALOT
  rationale: «Pueblo» es la forma natural en español para la designación pactual del pueblo de Yahvé.
- source_word: בְּמִצְרָיִם
  english_pob_choice: who are in Egypt
  chosen_spanish: que está en Egipto
  alternatives_spanish:
  - en Egipto
  lexicon: Sintaxis relacional
  rationale: La relativa explicita de forma idiomática la modificación de «mi pueblo» y mantiene la claridad del español sin añadir contenido ajeno.
- source_word: צַעֲקָתָם
  english_pob_choice: their cry
  chosen_spanish: su clamor
  alternatives_spanish:
  - su grito
  - su clamor alzado
  - su outcry
  lexicon: HALOT
  rationale: «Clamor» expresa un grito de angustia más solemne que «grito» y permite reflejar la fuerza del sustantivo hebreo en contexto.
- source_word: מִפְּנֵי נֹגְשָׂיו
  english_pob_choice: because of their oppressors
  chosen_spanish: por causa de sus opresores
  alternatives_spanish:
  - a causa de sus capataces
  - debido a sus taskmasters
  lexicon: HALOT
  rationale: נֹגֵשׂ alude a quien oprime y fuerza trabajo; «opresores» comunica bien esa función en castellano. «Por causa de» conserva el valor causal de מִפְּנֵי.
- source_word: כִּי
  english_pob_choice: for
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  lexicon: HALOT
  rationale: Aquí introduce la razón de la frase anterior; «porque» fluye naturalmente en español y mantiene la relación explicativa.
- source_word: יָדַעְתִּי
  english_pob_choice: I know
  chosen_spanish: conozco
  alternatives_spanish:
  - sé
  - he conocido
  - estoy al tanto de
  lexicon: HALOT
  rationale: El perfecto hebreo expresa conocimiento presente y personal. «Conozco» conserva esa inmediatez relacional mejor que una perífrasis más fría.
- source_word: מַכְאֹבָיו
  english_pob_choice: their sufferings
  chosen_spanish: sus sufrimientos
  alternatives_spanish:
  - sus dolores
  - sus penas
  lexicon: HALOT
  rationale: El sustantivo puede denotar dolor o sufrimiento; en plural, «sufrimientos» comunica la amplitud de la aflicción del pueblo sin perder el sentido básico.
theological_decisions:
- issue: Nombre divino YHWH
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Jehová
  - el SEÑOR
  rationale: Se preserva el nombre propio divino en vez de ocultarlo tras un título. Esto sigue el criterio del proyecto y mantiene la identidad pactual de Dios en el texto español.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Conocimiento divino expresado en lenguaje humano
  english_pob_reading: I know their sufferings
  chosen_spanish_reading: conozco sus sufrimientos
  alternative_spanish_readings:
  - estoy al tanto de sus sufrimientos
  - he tomado nota de sus sufrimientos
  rationale: La frase conserva el lenguaje directo de conocimiento personal atribuido a Dios. No se suaviza a una simple observación impersonal, para respetar la tensión antropopática del hebreo.
  doctrine_reference: 'DOCTRINE.md Translation philosophy §3: Preserve theological tension rather than resolve it'
translation_notes:
  revision_awareness: 'Se revisó el precedente inglés y el control cruzado posterior: no hubo cambios sustantivos en el contenido base. La versión española sigue el mismo sentido auditable, conservando el énfasis del hebreo, el nombre divino y la relación causal entre el clamor y los opresores.'
  spanish_consistency_notes:
  - Se usa «Yahvé» conforme al estándar del proyecto para יְהוָה.
  - 'Se mantiene el paralelismo de acción divina: ver / oír / conocer.'
  - «Opresores» traduce de forma funcional נֹגְשִׂים sin introducir tecnicismo excesivo.
  - «Sufrimientos» conserva el plural del hebreo y la amplitud del dolor del pueblo.
  - Las notas al pie se limitan a alternativas léxicas documentadas y no introducen lecturas no sustentadas.
