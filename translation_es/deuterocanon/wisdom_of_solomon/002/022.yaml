translation:
  language: es
  text: Y no conocieron sus misterios[a], ni esperaron la recompensa de la santidad[b], ni consideraron dignas de honra a las almas irreprensibles[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «secretos» para «misterios».
    reason: lexical_alternative
  - marker: b
    text: O «piedad» para «santidad».
    reason: lexical_alternative
  - marker: c
    text: Lit. «ni consideraron honra de almas irreprensibles»; el español debe expandir la construcción griega comprimida.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἔγνωσαν
  english_pob_choice: did not know
  chosen_spanish: no conocieron
  alternatives_spanish:
  - no entendieron
  - no llegaron a conocer
  lexicon: BDAG
  rationale: ἔγνωσαν expresa falta de conocimiento real; «no conocieron» es natural en español y conserva el valor directo del verbo sin añadir explicación interpretativa.
- source_word: μυστήρια
  english_pob_choice: mysteries
  chosen_spanish: misterios
  alternatives_spanish:
  - secretos
  - cosas secretas
  lexicon: BDAG
  rationale: «Misterios» mantiene el enlace léxico y el peso teológico del término, como en la opción inglesa, sin reducirlo a meros secretos privados.
- source_word: μισθὸν
  english_pob_choice: reward
  chosen_spanish: recompensa
  alternatives_spanish:
  - paga
  - galardón
  lexicon: BDAG
  rationale: En este contexto moral-religioso, «recompensa» comunica bien μισθός sin el matiz comercial de «paga»; «galardón» sería posible pero menos neutral en español actual.
- source_word: ἤλπισαν
  english_pob_choice: did they hope for
  chosen_spanish: esperaron
  alternatives_spanish:
  - esperaron en
  - confiaron en
  lexicon: BDAG
  rationale: El verbo griego apunta a una esperanza orientada al futuro; «esperaron» conserva la dirección del sentido y funciona de modo idiomático en español.
- source_word: ὁσιότητος
  english_pob_choice: holiness
  chosen_spanish: la santidad
  alternatives_spanish:
  - la piedad
  - la devoción
  lexicon: LSJ
  rationale: «Santidad» conserva el registro elevado y la amplitud moral-religiosa de ὁσιότης mejor que una opción más estrecha como «piedad».
- source_word: ἔκριναν
  english_pob_choice: did they consider
  chosen_spanish: consideraron
  alternatives_spanish:
  - juzgaron
  - estimaron
  lexicon: BDAG
  rationale: Siguiendo la revisión inglesa, κρίνω aquí expresa valoración; «consideraron» suena natural y conserva la idea de evaluación sin forzar el verbo «juzgar».
- source_word: γέρας
  english_pob_choice: worthy of honor
  chosen_spanish: dignas de honra
  alternatives_spanish:
  - merecedoras de honor
  - honor
  lexicon: LSJ
  rationale: γέρας alude a un honor, premio o distinción. En español, la construcción «dignas de honra» reproduce el sentido evaluativo condensado del griego y evita una expansión demasiado interpretativa.
- source_word: ψυχῶν
  english_pob_choice: souls
  chosen_spanish: las almas
  alternatives_spanish:
  - las vidas
  - las personas
  lexicon: BDAG
  rationale: «Almas» preserva la resonancia antropológica y escatológica del texto, coherente con la decisión inglesa, sin desplazarlo a un sentido meramente biográfico.
- source_word: ἀμώμων
  english_pob_choice: blameless
  chosen_spanish: irreprensibles
  alternatives_spanish:
  - sin culpa
  - sin mancha
  lexicon: BDAG
  rationale: «Irreprensibles» comunica bien el valor moral de ἀμώμος y resulta natural para personas; mantiene la idea de ausencia de culpa o defecto.
theological_decisions:
- issue: Referente de «sus» en «sus misterios»
  english_pob_reading: '''his'' refers to God'
  chosen_spanish_reading: «sus» se entiende referido a Dios
  alternative_spanish_readings:
  - mantener una ambigüedad formal
  - usar «sus propios misterios»
  rationale: El contexto de Sabiduría 2 trata del actuar y del propósito divinos frente a los impíos. Mantener el pronombre posesivo sigue de cerca el griego y preserva la referencia a Dios sin sobreexplicarla en el texto principal.
  doctrine_reference: Primacía del original; conservar tensiones referenciales cuando el texto las deja implícitas.
- issue: Sentido de ψυχῶν ἀμώμων
  english_pob_reading: '''souls'' rather than ''lives'' or ''persons'''
  chosen_spanish_reading: «las almas irreprensibles»
  alternative_spanish_readings:
  - «las vidas irreprensibles»
  - «las personas irreprensibles»
  rationale: La sección tiene un tono sapiencial con horizonte de vindicación final; «almas» conserva mejor esa resonancia que «vidas» o «personas», sin añadir doctrina ajena al pasaje.
  doctrine_reference: Primacía del texto original; mantener la carga antropológica y escatológica del pasaje.
translation_notes:
  revision_awareness: El audit trail inglés pasó por una revisión menor que ajustó ἔκριναν de «judge» a «consider» para mayor naturalidad. La redacción española adopta directamente ese sentido evaluativo con «consideraron», manteniendo el resto de las decisiones léxicas y la ambigüedad teológica documentada.
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando aparezca el nombre divino explícito; aquí el texto pronominal refiere a Dios y se conserva como «sus».
  - Se mantiene «misterios» en lugar de «secretos» para conservar continuidad terminológica con la tradición auditada.
  - «Santidad» traduce ὁσιότης de modo amplio; no se reduce a práctica exterior de piedad.
  - «Almas» preserva el campo semántico escatológico del pasaje y sigue la opción inglesa auditada.
  - La sintaxis española expande el tercer miembro para reflejar la elipsis del griego sin perder el paralelismo.
