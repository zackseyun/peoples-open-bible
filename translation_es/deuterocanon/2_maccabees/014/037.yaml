translation:
  language: es
  text: 'Ahora bien, un tal Razis[a], uno de los ancianos de Jerusalén, fue reportado a Nicanor: un hombre devoto de su ciudad y muy estimado[b], y por su buena voluntad llamado padre de los judíos.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'fue denunciado ante Nicanor'. El verbo griego puede tener el sentido de que se informó contra alguien en un contexto hostil.
    reason: lexical_alternative
  - marker: b
    text: Literalmente, 'que oía muy bien'; es decir, que gozaba de muy buena reputación pública o era muy bien considerado.
    reason: lexical_alternative
lexical_decisions:
- source_word: Ῥαζεὶς
  english_pob_choice: Razis
  chosen_spanish: Razis
  alternatives_spanish:
  - Rhazis
  lexicon: LSJ
  rationale: Nombre propio transliterado. Se conserva la forma breve y reconocible del griego, sin intentar traducirlo.
- source_word: πρεσβυτέρων
  english_pob_choice: elders
  chosen_spanish: ancianos
  alternatives_spanish:
  - presbíteros
  - mayores
  lexicon: LSJ
  rationale: En este contexto designa a los líderes senior de Jerusalén; 'ancianos' comunica bien la función comunitaria sin cargarlo con terminología eclesiástica posterior.
- source_word: ἐμηνύθη
  english_pob_choice: was reported
  chosen_spanish: fue denunciado
  alternatives_spanish:
  - fue informado a Nicanor
  - fue reportado a Nicanor
  - fue delatado
  lexicon: LSJ
  rationale: El contexto es hostil y el verbo puede implicar que se informó de él en tono adverso. 'Fue denunciado' preserva esa posible carga negativa que la POB inglesa dejó abierta con su nota.
- source_word: φιλοπολίτης
  english_pob_choice: devoted to his city
  chosen_spanish: devoto de su ciudad
  alternatives_spanish:
  - amante de su ciudad
  - patriota
  - comprometido con su ciudad
  lexicon: LSJ
  rationale: Literalmente es 'amigo/amante de la ciudad'. 'Devoto de su ciudad' mantiene la idea de lealtad y dedicación cívica con un español natural y digno.
- source_word: σφόδρα καλῶς ἀκούων
  english_pob_choice: very highly regarded
  chosen_spanish: muy estimado
  alternatives_spanish:
  - de muy buena reputación
  - muy bien considerado
  - muy alabado
  lexicon: LSJ
  rationale: La expresión griega remite a buena reputación pública. 'Muy estimado' es formal, natural y conserva el matiz de estima social sin exagerarlo.
- source_word: εὔνοιαν
  english_pob_choice: goodwill
  chosen_spanish: buena disposición
  alternatives_spanish:
  - benevolencia
  - buena voluntad
  - afecto favorable
  lexicon: LSJ
  rationale: El sustantivo indica una actitud favorable o benevolente. 'Buena disposición' expresa ese sentido de forma clara en español y funciona bien dentro de la frase causal.
- source_word: πατὴρ τῶν Ἰουδαίων
  english_pob_choice: the father of the Jews
  chosen_spanish: padre de los judíos
  alternatives_spanish:
  - padre para los judíos
  - un padre de los judíos
  lexicon: LSJ
  rationale: Se conserva el título honorífico casi literalmente, porque el griego lo presenta como una designación de reconocimiento, no como paternidad literal.
- source_word: προσαγορευόμενος
  english_pob_choice: called
  chosen_spanish: llamado
  alternatives_spanish:
  - designado
  - apodado
  - nombrado
  lexicon: LSJ
  rationale: Participio de apelación habitual; 'llamado' es la equivalencia más directa y natural en español.
theological_decisions:
- issue: Carga negativa de ἐμηνύθη en un contexto hostil
  english_pob_reading: The Greek verb can carry the sense of being informed against in a hostile setting, so the English kept 'was reported' but noted the possible adversarial nuance.
  chosen_spanish_reading: Se opta por 'fue denunciado' para hacer audible la posibilidad de una delación hostil.
  alternative_spanish_readings:
  - fue informado a Nicanor
  - fue reportado a Nicanor
  - fue delatado
  rationale: En español, 'denunciado' reproduce mejor la tensión del contexto sin cerrar totalmente el sentido a un acto judicial o acusatorio. Preserva la ambigüedad hostil señalada por la POB inglesa.
  doctrine_reference: 'DOCTRINE.md: Preservar tensiones textuales y no neutralizar vocablos con carga contextual.'
- issue: Título honorífico 'padre de los judíos'
  english_pob_reading: Render the commendatory civic and communal titles straightforwardly without either amplifying or diminishing them.
  chosen_spanish_reading: 'Se conserva el título honorífico tal como está: ''padre de los judíos''.'
  alternative_spanish_readings:
  - padre para los judíos
  - benefactor de los judíos
  rationale: La expresión funciona como apelativo honorífico derivado de la buena disposición de Razis; traducirla literalmente evita suavizarla o convertirla en un título interpretativo más amplio de lo que el griego dice.
  doctrine_reference: 'DOCTRINE.md: Primacía del lenguaje original y mantenimiento de matices honoríficos.'
translation_notes:
  revision_awareness: La redacción sigue el último estado del audit trail inglés, que prefirió 'very highly regarded' para σφόδρα καλῶς ἀκούων. En español se adopta 'muy estimado' como equivalente formal y natural. También se mantiene la tensión del pasivo ἐμηνύθη con 'fue denunciado', reflejando la posibilidad hostil indicada en la nota inglesa, sin añadir información externa.
  spanish_consistency_notes:
  - Se mantiene 'ancianos' para πρεσβύτεροι, evitando 'presbíteros' por una resonancia eclesiástica no requerida por el contexto.
  - Se conserva 'judíos' como traducción de Ἰουδαίων, sin ampliar a 'pueblo judío' o 'nación judía' porque el griego usa un genitivo simple de pertenencia.
  - La puntuación con dos puntos tras 'Nicanor' reproduce bien la apposición explicativa del griego y la cadencia de la POB inglesa.
  - Se evita 'patriota', porque en español moderno puede introducir una carga nacionalista anacrónica; 'devoto de su ciudad' mantiene el matiz cívico de φιλοπολίτης.
