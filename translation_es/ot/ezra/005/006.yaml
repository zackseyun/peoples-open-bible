translation:
  language: es
  text: Esta es una copia de la carta que Tatenai[a], gobernador de la región de Más Allá del Río, y Setar-bozenai y sus asociados, los funcionarios que estaban en Más Allá del Río, enviaron al rey Darío.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «los afarsaquitas», si el término se toma como el nombre de un pueblo o grupo administrativo y no como un título funcional.
    reason: alternative_reading
lexical_decisions:
- source_word: פַּרְשֶׁגֶן
  english_pob_choice: copy
  chosen_spanish: copia
  alternatives_spanish:
  - transcripción
  - traslado
  lexicon: HALOT
  rationale: El término designa una reproducción escrita de un documento. «Copia» es la opción más natural en español y conserva el sentido documental sin tecnicismo innecesario.
- source_word: אִגַּרְתָּא
  english_pob_choice: letter
  chosen_spanish: carta
  alternatives_spanish:
  - epístola
  - documento
  lexicon: HALOT
  rationale: Aquí se trata de una comunicación escrita oficial. «Carta» comunica bien el género del texto en español contemporáneo y mantiene la claridad administrativa.
- source_word: שְׁלַח
  english_pob_choice: sent
  chosen_spanish: enviaron
  alternatives_spanish:
  - mandaron
  - remitieron
  lexicon: HALOT
  rationale: El verbo expresa el acto de hacer llegar la carta. «Enviaron» es idiomático en español y adecuado al contexto diplomático/administrativo.
- source_word: תַּתְּנַי
  english_pob_choice: Tattenai
  chosen_spanish: Tatenai
  alternatives_spanish:
  - Tattenai
  lexicon: standard transliteration
  rationale: Se translitera el nombre propio al español con una forma fonéticamente natural y ya apta para lectura pública.
- source_word: פַּחַת
  english_pob_choice: governor
  chosen_spanish: gobernador
  alternatives_spanish:
  - prefecto
  lexicon: HALOT
  rationale: En el marco persa/aqueménida, el término designa al jefe de una provincia. «Gobernador» es la equivalencia funcional más clara en español.
- source_word: עֲבַר נַהֲרָה
  english_pob_choice: Beyond the River
  chosen_spanish: el Más Allá del Río
  alternatives_spanish:
  - Más Allá del Río
  - la provincia del Más Allá del Río
  - Al otro lado del Río
  lexicon: HALOT
  rationale: Se conserva el valor de nombre administrativo del territorio persa, no solo una descripción geográfica. La forma con artículo hace natural en español la referencia territorial.
- source_word: וּשְׁתַר בּוֹזְנַי
  english_pob_choice: Shethar-bozenai
  chosen_spanish: Setar-bosnai
  alternatives_spanish:
  - Shetar-bosnai
  - Setar-bozenai
  lexicon: standard transliteration
  rationale: Es un nombre propio; se ofrece una transliteración española fluida sin alterar su identificación.
- source_word: וּכְנָוָתֵהּ
  english_pob_choice: and his associates
  chosen_spanish: y sus asociados
  alternatives_spanish:
  - y sus compañeros
  - y sus colegas
  lexicon: HALOT
  rationale: «Asociados» conserva el matiz de personas vinculadas a la autoridad principal y encaja con el registro oficial del pasaje.
- source_word: אֲפַרְסְכָיֵא
  english_pob_choice: the officials
  chosen_spanish: los funcionarios
  alternatives_spanish:
  - los afarsaquitas
  - los oficiales persas
  lexicon: HALOT
  rationale: Dado que el contexto explica su función en la provincia, «funcionarios» transmite el papel administrativo sin forzar una identificación étnica incierta.
- source_word: עַל
  english_pob_choice: to
  chosen_spanish: al
  alternatives_spanish:
  - a
  - hacia
  lexicon: HALOT
  rationale: Con el verbo de envío, la preposición en español debe marcar destinatario; «al rey Darío» es la formulación más natural.
- source_word: דָּרְיָוֶשׁ מַלְכָּא
  english_pob_choice: King Darius
  chosen_spanish: el rey Darío
  alternatives_spanish:
  - Darío, el rey
  lexicon: standard royal title
  rationale: Se conserva el título real y el orden natural del español. La forma definida evita ambigüedad y suena sobria en registro bíblico.
theological_decisions:
- issue: Tratamiento del título provincial y del nombre administrativo «Beyond the River / עֲבַר נַהֲרָה»
  english_pob_reading: Capitalized as a fixed administrative region rather than a mere geographic description.
  chosen_spanish_reading: «el Más Allá del Río» como denominación territorial fija.
  alternative_spanish_readings:
  - «la provincia del Más Allá del Río»
  - «Al otro lado del Río»
  rationale: El texto funciona como designación oficial persa. Mantener una forma nominalizada preserva esa fuerza administrativa y evita reducirlo a una simple ubicación geográfica.
  doctrine_reference: Ninguna; decisión histórico-terminológica.
- issue: Naturaleza de אֲפַרְסְכָיֵא
  english_pob_reading: Rendered functionally as 'the officials' because the term may denote a class of officials or an ethnic/administrative group.
  chosen_spanish_reading: «los funcionarios»
  alternative_spanish_readings:
  - «los afarsaquitas»
  - «los oficiales persas»
  rationale: 'La misma cautela del POB en inglés se conserva en español: se prioriza la función administrativa sin afirmar más de lo que el contexto garantiza.'
  doctrine_reference: Ninguna; decisión lexical y histórica.
translation_notes:
  revision_awareness: El audit trail inglés muestra acuerdo alto y sin cambios revisionales; por eso la traducción española sigue de cerca las decisiones léxicas ya validadas, conservando la ambigüedad documentada de אֲפַרְסְכָיֵא mediante nota.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma del proyecto solo donde aparezca el Tetragrámaton; este versículo no lo contiene.
  - Se usa una transliteración española estable para nombres propios persas, con guiones solo cuando ayudan a la legibilidad.
  - «Más Allá del Río» se conserva con mayúsculas por ser nombre regional fijo en el contexto imperial.
  - «Funcionarios» refleja el contexto administrativo del pasaje y evita una identificación étnica no asegurada.
