    issue: La expresión 'se movía de un lado a otro' no representa con suficiente precisión el matiz de movimiento disperso/confuso de וַיֵּלֶךְ וַהֲלֹם.
    rationale: El hebreo describe al conjunto deshaciéndose y yendo 'aquí y allá' / 'de aquí para allá', no simplemente moviéndose de un lado al otro.
  - severity: low
    issue: '''Centinelas'' es posible, pero puede sugerir guardias fijos más que observadores apostados.'
    rationale: El participio הַצֹּפִים enfatiza a quienes observan/vigilan; 'vigías' comunica con más precisión ese rol visual en español.
  - severity: low
    issue: La secuencia 'Y los centinelas... miraron' resulta algo dura en español narrativo.
    rationale: Una pequeña reestructuración mejora la naturalidad sin apartarse del hebreo.
  revised_spanish_text: Y los vigías[a] de Saúl en Guibeá de Benjamín vieron, y he aquí, la multitud se iba deshaciendo yendo aquí y allá.[b]
