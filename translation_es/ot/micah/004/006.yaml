  yaml_path: translation/ot/micah/004/006.yaml
  text: In that day[a], declares Yahweh, I will gather the lame, and I will assemble the outcast[c][b], even those whom I have afflicted.
  footnotes:
  - marker: a
    text: Or 'the limping' for 'the lame.' The Hebrew uses a feminine singular participle with collective force.
    reason: lexical_alternative
  - marker: b
    text: Or 'the driven away' or 'the banished' for 'the outcast.'
    reason: lexical_alternative
  - marker: c
    text: Or 'and those whom I have brought to grief.' The Hebrew explicitly attributes the prior affliction to the LORD.
    reason: alternative_reading
