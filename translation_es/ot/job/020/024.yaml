translation:
  language: es
  text: Huirá de un arma de hierro[a]; un arco de bronce lo atravesará[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «de armamento de hierro». El hebreo נשק puede referirse más ampliamente al armamento o a las armas en general.'
    reason: lexical_alternative
  - marker: b
    text: 'Literalmente: «un arco de bronce pasará a través de él». El verbo hebreo puede traducirse más formalmente como «pasará a través de él»; «lo atravesará» expresa el sentido probable en este contexto.'
    reason: lexical_alternative
lexical_decisions:
- source_word: יִבְרַח
  english_pob_choice: he will flee
  chosen_spanish: huirá
  alternatives_spanish:
  - huirá corriendo
  - escapará
  - saldrá huyendo
  lexicon: HALOT
  rationale: El imperfecto qal de ברח comunica huida/escape; en este contexto poético de juicio, el futuro español expresa bien la acción prevista.
- source_word: מִנֵּשֶׁק
  english_pob_choice: from a weapon
  chosen_spanish: de un arma
  alternatives_spanish:
  - de una arma
  - de un arma de guerra
  - de armas
  lexicon: HALOT
  rationale: נשק puede referirse al armamento en sentido amplio. 'Arma' mantiene ese valor general y suena natural en español; el singular refleja el constructo con 'hierro'.
- source_word: בַּרְזֶל
  english_pob_choice: iron
  chosen_spanish: hierro
  alternatives_spanish:
  - de hierro
  - ferro
  lexicon: HALOT
  rationale: Es el término normal para el metal; unido a נשק da la imagen de un arma de hierro.
- source_word: תַּחְלְפֵהוּ
  english_pob_choice: will pierce him through
  chosen_spanish: lo atravesará
  alternatives_spanish:
  - lo pasará de largo y lo herirá
  - lo traspasará
  - pasará a través de él
  lexicon: HALOT
  rationale: חלף puede significar 'pasar a través/de largo'. En este contexto bélico, 'lo atravesará' comunica el resultado probable sin perder la base literal del verbo.
- source_word: קֶשֶׁת
  english_pob_choice: bow
  chosen_spanish: arco
  alternatives_spanish:
  - arco de guerra
  - arco
  lexicon: HALOT
  rationale: Término estándar del arma; 'arco' es la equivalencia natural en español.
- source_word: נְחוּשָׁה
  english_pob_choice: bronze
  chosen_spanish: bronce
  alternatives_spanish:
  - cobre
  - bronce/cobre
  lexicon: HALOT
  rationale: En el uso bíblico, נחושה suele abarcar el bronce/cobre aleado. 'Bronce' es la opción más idiomática e históricamente adecuada para el arma.
