lexical_decisions:
- source_word: οὐχ ἱκανώθησαν
  english_pob_choice: were not satisfied
  chosen_spanish: no se dieron por satisfechos
  alternatives_spanish:
  - no les bastó
  - no quedaron satisfechos
  - no se contentaron
  lexicon: LSJ
  rationale: ἱκανόω en pasivo expresa que algo no resultó suficiente. En español, «no se dieron por satisfechos» conserva la idea de insuficiencia sin volverla demasiado interpretativa.
- source_word: ἐν πικρασμῷ
  english_pob_choice: with the bitterness
  chosen_spanish: con la amargura
  alternatives_spanish:
  - con la amargura amarga
  - con la amargura de
  - con la aflicción
  lexicon: LSJ
  rationale: πικρασμός apunta a amargura o trato que amarga. «Amargura» reproduce con naturalidad la fuerza del sustantivo y evita expandirlo a «opresión», que no está explícito en el griego de este verso.
- source_word: δουλείας ἡμῶν
  english_pob_choice: of our slavery
  chosen_spanish: de nuestra esclavitud
  alternatives_spanish:
  - de nuestra servidumbre
  - de nuestro cautiverio
  - de nuestra esclavitud
  lexicon: LSJ
  rationale: δουλεία tiene el peso de esclavitud/bondage. Se conserva «esclavitud» por su fuerza lexical y por la preferencia del proyecto por mantener el lenguaje de sujeción cuando es central.
- source_word: ἔθηκαν τὰς χεῖρας αὐτῶν
  english_pob_choice: have laid their hands upon us
  chosen_spanish: pusieron sus manos sobre nosotros
  alternatives_spanish:
  - alzaron sus manos contra nosotros
  - echaron mano de nosotros
  - pusieron la mano sobre nosotros
  lexicon: LSJ
  rationale: La expresión griega es literal y el contexto exige entender acción hostil. «Pusieron sus manos sobre nosotros» mantiene la imagen sin añadir más interpretación que el español necesita para ser claro.
theological_decisions:
- issue: Intensidad de δουλεία en un contexto de opresión nacional
  english_pob_reading: slavery
  chosen_spanish_reading: esclavitud
  alternative_spanish_readings:
  - servidumbre
  - cautiverio
  - bondad
  rationale: La elección preserva la gravedad del término. «Esclavitud» comunica mejor la subyugación colectiva que un término más suave como «servidumbre».
  doctrine_reference: 'DOCTRINE.md: Contested terms table on δοῦλος / related bonded language; Translation philosophy §1'
- issue: Interpretación de ἔθηκαν τὰς χεῖρας αὐτῶν
  english_pob_reading: they have laid their hands upon us
  chosen_spanish_reading: pusieron sus manos sobre nosotros
  alternative_spanish_readings:
  - nos han atacado
  - han obrado violentamente contra nosotros
  - han extendido sus manos contra nosotros
  rationale: El griego literal puede sugerir simplemente acción tomada, pero en el lamento contextual se entiende como acción hostil. El español conserva la metáfora corporal sin borrar la tensión interpretativa.
  doctrine_reference: LXX narrative-prayer style; context of hostile action in the petition
translation_notes:
  revision_awareness: El borrador sigue la última revisión del inglés que prefirió «the bitterness» como más cercano a πικρασμῷ y evitó ampliar a «opresión». En español, por eso se conservó «amargura» en vez de explicar el término con una interpretación adicional; también se mantuvo la imagen concreta de «pusieron sus manos» con una nota breve de sentido hostil.
  spanish_consistency_notes:
  - Se usó «esclavitud» para reflejar la fuerza de δουλεία, en línea con la terminología POB para lenguaje de sujeción.
  - Se evitó sustituir la imagen corporal por una paráfrasis directa en el texto principal.
  - La puntuación y el orden siguen el estilo español bíblico moderno, manteniendo el paralelo adversativo «y ahora... sino que...».
