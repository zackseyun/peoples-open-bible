review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la secuencia narrativa hebrea: marco temporal al atardecer, David se levanta de su cama, camina en el techo/azotea, ve a una mujer bañándose desde allí, y la mujer es descrita como muy hermosa de apariencia. Sin embargo, hay un desajuste de notas: la nota [a] está anclada a «casa del rey» pero en realidad la alternativa lexical relevante del inglés POB para ese segmento es «palacio», mientras que la nota inglesa [a] pertenecía al inciso temporal inicial. Además, la nota [b] del español introduce una alternativa participial válida, pero omite la alternativa documentada por el POB sobre «la casa del rey / palacio».'
  spanish_quality_summary: El español es claro, natural y de registro digno. «Entonces, al atardecer» funciona bien; «se levantó de su cama» y «vio a una mujer bañándose» son fluidos. «Caminó sobre el techo» es comprensible, aunque «por la azotea» suena más idiomático; no es indispensable cambiarlo. «Muy hermosa de aspecto» es aceptable y conserva el énfasis visual. El problema principal es editorial y de trazabilidad de notas, no de legibilidad general.
  glossary_alignment: 'No aparecen términos sensibles del glosario principal como Yahvé, Mesías, Espíritu, etc. Las decisiones léxicas principales son adecuadas: «cama» por מִשְׁכָּב, «bañándose» por רֹחֶצֶת, y una formulación visual para טוֹבַת מַרְאֶה מְאֹד. Conviene alinear mejor la anotación con la justificación auditada: nota temporal para וַיְהִי לְעֵת הָעֶרֶב y nota de alternativa contextual «palacio» para «la casa del rey».'
  issues:
  - severity: medium
    issue: La nota [a] está anclada al lugar equivocado.
    rationale: En el rastro de auditoría inglés, la nota a corresponde a la alternativa más literal del marco temporal inicial («y aconteció al tiempo de la tarde»), no a «la casa del rey». El español debe conservar esa trazabilidad o reordenar coherentemente las notas.
  - severity: medium
    issue: Falta una nota para la alternativa contextual «palacio».
    rationale: El inglés POB preserva explícitamente que «the king’s house» puede también traducirse contextualmente como «palace». Esa alternativa debe mantenerse en español, especialmente porque el borrador ya la mencionó, pero con marcador incorrecto.
  - severity: low
    issue: La nota sobre «bañándose» es válida, pero no necesaria si se prioriza la correspondencia con las notas auditadas.
    rationale: La explicación del participio hebreo es correcta; sin embargo, si se mantienen solo las notas documentadas por el POB inglés, conviene usar [b] para «casa del rey». Puede omitirse la nota participial sin pérdida sustancial de fidelidad.
  revised_spanish_text: Entonces, al atardecer[a], David se levantó de su cama y caminó sobre el techo de la casa del rey[b]; y desde el techo vio a una mujer bañándose; y la mujer era muy hermosa de aspecto.
