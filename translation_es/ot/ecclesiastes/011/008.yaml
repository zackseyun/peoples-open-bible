review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la estructura y el sentido básico del hebreo: condición explicativa («Porque si»), vida larga, exhortación a alegrarse, contraste con el recuerdo de «los días de oscuridad», y cierre con הָבֶל como «vapor». Sin embargo, no preserva plenamente el rastro de auditoría del POB en la anotación: la nota al pie se ancla en «alegre», mientras que la nota inglesa preserva la alternativa léxica de הָבֶל («breath/vanity»). Además, «Todo lo que viene» es aceptable, pero «Todo lo que llega» suena algo más natural en español para כָּל שֶׁבָּא sin perder el valor gnómico.'
  spanish_quality_summary: El español es claro y digno, pero la nota actual introduce una alternativa menor no requerida y omite la nota importante sobre «vapor». Conviene mover la nota al término clave «vapor» para mantener la justificación léxica y teológica del libro. El resto del verso es legible; «que se alegre» funciona bien, y «los días de oscuridad» conserva adecuadamente la metáfora.
  glossary_alignment: No hay términos del glosario mayor en juego como Yahvé o Mesías. La decisión clave del proyecto aquí es הָבֶל -> «vapor», y debe conservarse con su nota sobre alternativas («aliento», tradicionalmente «vanidad»). «Un hombre» también sigue la política documentada de masculino genérico representativo.
  issues:
  - severity: medium
    issue: La nota al pie está anclada en «alegre» en vez de en «vapor».
    rationale: El expediente inglés documenta la alternativa léxica principal en הָבֶל, no en יִשְׂמָח. La nota española actual desplaza la atención a una variante estilística menor y omite la nota importante del término temático de Eclesiastés.
  - severity: low
    issue: La nota española actual no preserva las alternativas tradicionales de הָבֶל.
    rationale: El POB inglés conserva «breath» y «vanity» como alternativas significativas. En español conviene reflejar «aliento» y la forma tradicional «vanidad» para continuidad exegética y transparencia.
  - severity: low
    issue: «Todo lo que viene» es correcto, pero «Todo lo que llega» puede leerse con mayor naturalidad en español.
    rationale: Para כָּל שֶׁבָּא ambas opciones funcionan. «Llega» evita una resonancia demasiado temporal/futurizante de «viene» y suena más idiomático en una sentencia gnómica.
  revised_spanish_text: Porque si un hombre vive muchos años, que se alegre en todos ellos; pero que recuerde los días de oscuridad, porque serán muchos. Todo lo que llega es vapor[a].
  revised_footnotes:
  - marker: a
    text: 'O: «Todo lo que llega es aliento», o tradicionalmente «vanidad». El hebreo hebel es un término recurrente en Eclesiastés para lo que es pasajero, insustancial o evasivo.'
    reason: lexical_alternative
  revision_rationale: Se conserva la traducción básica del borrador, pero se corrige la nota al pie para alinearla con la decisión léxica central del POB sobre הָבֶל. También se ajusta «viene» a «llega» por naturalidad española sin cambiar el sentido general.
