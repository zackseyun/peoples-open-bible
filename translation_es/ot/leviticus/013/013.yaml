translation:
  language: es
  text: y el sacerdote lo examina, y he aquí, la enfermedad de la piel[a] ha cubierto toda su carne; entonces declarará limpio al afectado[b]; todo se ha vuelto blanco; él está limpio.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebreo צָרַעַת (tradicionalmente «lepra») se refiere más ampliamente a diversas afecciones cutáneas en Levítico, no necesariamente a la lepra moderna.
    reason: lexical_alternative
  - marker: b
    text: O «entonces lo declarará limpio». El objeto hebreo es literalmente «la afección/la llaga», pero el veredicto recae sobre la persona que la porta.
    reason: alternative_reading
lexical_decisions:
- source_word: וְרָאָה
  english_pob_choice: examines
  chosen_spanish: lo examina
  alternatives_spanish:
  - lo ve
  - lo inspecciona
  lexicon: HALOT
  rationale: En el contexto sacerdotal de Levítico, ראה no es mera visión sino examen/inspección diagnóstica. «Lo examina» conserva ese valor procedural en español natural.
- source_word: הַכֹּהֵן
  english_pob_choice: the priest
  chosen_spanish: el sacerdote
  alternatives_spanish:
  - el sacerdote cultual
  - el presbítero
  lexicon: HALOT
  rationale: «Sacerdote» es el equivalente normal y claro en español para el oficial cultual de Levítico.
- source_word: וְהִנֵּה
  english_pob_choice: behold
  chosen_spanish: y he aquí
  alternatives_spanish:
  - y mira
  - y resulta que
  lexicon: HALOT
  rationale: «Y he aquí» preserva la fuerza deíctica de sorpresa/constatación al observar el caso.
- source_word: כִסְּתָה
  english_pob_choice: has covered
  chosen_spanish: ha cubierto
  alternatives_spanish:
  - cubrió
  - cubre
  lexicon: HALOT
  rationale: 'El perfecto verbal expresa el estado resultante que el sacerdote constata: la afección ya cubrió totalmente la superficie afectada.'
- source_word: הַצָּרַעַת
  english_pob_choice: the skin disease
  chosen_spanish: la afección de lepra
  alternatives_spanish:
  - la enfermedad de la piel
  - la afección cutánea
  lexicon: HALOT
  rationale: El término hebreo צָרַעַת no equivale con precisión a la lepra moderna. En español, «afección de lepra» conserva la tradición terminológica sin afirmar una identificación médica estricta; se mantiene la tensión lexical documentada por el texto fuente.
- source_word: אֶת כָּל בְּשָׂרוֹ
  english_pob_choice: all his flesh
  chosen_spanish: toda su carne
  alternatives_spanish:
  - todo su cuerpo
  - toda su piel
  lexicon: HALOT
  rationale: «Carne» reproduce con más fidelidad el término semítico בשר y su alcance corporal en el contexto, evitando una expansión interpretativa a «piel».
- source_word: וְטִהַר
  english_pob_choice: then he shall pronounce the affected person clean
  chosen_spanish: entonces declarará limpio al afectado
  alternatives_spanish:
  - entonces lo declarará limpio
  - entonces pronunciará limpio al afectado
  lexicon: HALOT
  rationale: טהר en piel aquí es una declaración sacerdotal de pureza, no una limpieza material. «Declarará limpio» conserva el valor judicial/ritual.
- source_word: אֶת הַנָּגַע
  english_pob_choice: the affected person
  chosen_spanish: al afectado
  alternatives_spanish:
  - la afección
  - la llaga
  lexicon: HALOT
  rationale: Aunque el hebreo puede referirse literalmente a la afección, el inglés POB ya decidió hacer explícito que el veredicto recae sobre la persona portadora. «Al afectado» mantiene esa aclaración sin sobreparafrasear.
- source_word: כֻלּוֹ
  english_pob_choice: all of it
  chosen_spanish: todo ello
  alternatives_spanish:
  - todo
  - en su totalidad
  lexicon: HALOT
  rationale: Conserva el énfasis totalizador del hebreo y su referencia al conjunto visible de la afección, sin perder la ambigüedad controlada entre área afectada y condición.
- source_word: הָפַךְ לָבָן
  english_pob_choice: has turned white
  chosen_spanish: se ha vuelto blanco
  alternatives_spanish:
  - ha blanqueado
  - ha tornado blanco
  lexicon: HALOT
  rationale: «Se ha vuelto blanco» es natural en español y refleja el cambio de color decisivo para el veredicto sacerdotal.
- source_word: טָהוֹר הוּא
  english_pob_choice: he is clean
  chosen_spanish: limpio es él
  alternatives_spanish:
  - él está limpio
  - él es limpio
  lexicon: HALOT
  rationale: Se conserva el predicado de pureza ritual con una formulación sobria y fiel. El orden enfático final reproduce el hebreo sin forzar el castellano.
theological_decisions:
- issue: Rendición de צָרַעַת sin colapsarlo en lepra moderna
  english_pob_reading: the skin disease
  chosen_spanish_reading: la afección de lepra
  alternative_spanish_readings:
  - la enfermedad de la piel
  - la afección cutánea
  - tzaraat
  rationale: La tradición española suele decir «lepra», pero el hebreo bíblico abarca más que la lepra clínica moderna. «Afección de lepra» conserva el enlace con la tradición receptiva y, a la vez, deja ver que el término es más amplio que una categoría médica moderna estricta.
  doctrine_reference: 'Principio POB: primacía del original y transparencia terminológica sin ocultar la amplitud semántica.'
- issue: Valor declarativo de טהר en el contexto sacerdotal
  english_pob_reading: then he shall pronounce the affected person clean
  chosen_spanish_reading: entonces declarará limpio al afectado
  alternative_spanish_readings:
  - entonces lo declarará limpio
  - entonces pronunciará limpio al afectado
  - entonces lo limpiará
  rationale: El sacerdote no ejecuta una limpieza física, sino un dictamen ritual. La traducción debe mantener esa función declarativa/judicial, evitando leer el verbo como acción terapéutica.
  doctrine_reference: Lectura cultual-legal de Levítico; preservar distinciones entre estado ritual y curación material.
translation_notes:
  revision_awareness: 'Coincide con la revisión más reciente: no se requieren cambios sustanciales respecto del sentido base; se mantiene la equivalencia óptima y la distinción ritual de טהר, con una solución española transparente para צָרַעַת.'
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el texto lo exija explícitamente; en este versículo no aparece.
  - Se mantiene «carne» para בשר, conforme al valor semítico y al uso técnico de Levítico.
  - Se conserva la declaración de pureza como juicio sacerdotal, no como purificación física.
  - La puntuación sigue el español moderno y el registro bíblico digno, sin arcaísmos innecesarios.
