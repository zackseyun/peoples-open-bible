translation:
  language: es
  text: Todo el que se acerque, el que se acerque al tabernáculo de Yahvé, morirá. ¿Acaso todos vamos a perecer?[a]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «¿Acaso todos vamos a morir?». El hebreo usa aquí un verbo distinto del de «morirá», lo que puede sugerir la idea de perecer o ser consumidos, en vez de simplemente repetir «morir».'
    reason: lexical_alternative
lexical_decisions:
- source_word: כֹּל
  english_pob_choice: Everyone
  chosen_spanish: Todo el que
  alternatives_spanish:
  - Todos
  - Quienquiera que
  lexicon: HALOT
  rationale: En español, «Todo el que» comunica con naturalidad el valor universal y distributivo de כֹּל en este contexto, sin sonar tan abstracto como «todos» ni tan arcaico como «quienquiera que».
- source_word: הַקָּרֵב הַקָּרֵב
  english_pob_choice: who comes near, who comes near
  chosen_spanish: se acerque[a], el que se acerque
  alternatives_spanish:
  - se acerca, el que se acerca
  - que se acerque, que se acerque
  lexicon: HALOT
  rationale: Se conserva la repetición enfática del participio hebreo con una repetición equivalente en español. El duplicado mantiene la urgencia y la intensificación del habla del pueblo, en vez de suavizarla.
- source_word: אֶל
  english_pob_choice: to
  chosen_spanish: al
  alternatives_spanish:
  - hacia
  - a
  lexicon: HALOT
  rationale: «Al» expresa de forma idiomática la dirección hacia el tabernáculo en combinación con «acercarse», manteniendo el sentido direccional del מקור original.
- source_word: מִשְׁכַּן
  english_pob_choice: tabernacle
  chosen_spanish: tabernáculo
  alternatives_spanish:
  - morada
  - habitación
  lexicon: HALOT
  rationale: «Tabernáculo» es el equivalente cultual establecido para מִשְׁכַּן en el contexto del desierto y preserva la referencia técnica al santuario.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  - el SEÑOR
  lexicon: HALOT
  rationale: Se sigue la convención proyectual de traducir el Nombre divino como «Yahvé» en el texto principal, conservando la referencia personal al Tetragrámaton sin sustituirla por un título.
- source_word: יָמוּת
  english_pob_choice: will die
  chosen_spanish: morirá
  alternatives_spanish:
  - ha de morir
  - morirá ciertamente
  lexicon: HALOT
  rationale: «Morirá» reproduce con claridad la consecuencia futura y solemne del verbo, sin añadir énfasis no presente en el hebreo.
- source_word: הַאִם
  english_pob_choice: Are ... ?
  chosen_spanish: ¿Vamos a ... ?
  alternatives_spanish:
  - ¿Hemos de ... ?
  - ¿Seremos ... ?
  lexicon: HALOT
  rationale: La partícula interrogativa se vierte como pregunta directa en español. «¿Vamos a ... ?» conserva el tono retórico y la implicación colectiva de la queja.
- source_word: תַּמְנוּ
  english_pob_choice: are ... to
  chosen_spanish: perecer
  alternatives_spanish:
  - ser consumidos
  - ser acabados
  lexicon: HALOT
  rationale: El hebreo sugiere ser llevados a término/consumidos, no solo morir. «Perecer» transmite mejor el matiz de desaparición o ruina total que el simple repetido «morir».
- source_word: לִגְוֹעַ
  english_pob_choice: perish
  chosen_spanish: perecer
  alternatives_spanish:
  - morir
  - expirar
  lexicon: HALOT
  rationale: Se mantiene «perecer» para conservar la fuerza semántica de גוע y evitar una repetición plana con יָמוּת. En español, esta elección refleja mejor la posible idea de acabar consumidos o desaparecer.
theological_decisions:
- issue: Traducción del Nombre divino יהוה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - el SEÑOR
  rationale: La línea editorial de POB pide transliterar el Tetragrámaton en vez de ocultarlo tras un título. «Yahvé» es la forma proyectual en español y preserva el nombre del pacto en el texto principal.
  doctrine_reference: 'DOCTRINE.md Contested terms: יהוה YHWH'
translation_notes:
  revision_awareness: La revisión más reciente indicó que no eran necesarios cambios respecto del borrador base; el control cruzado también mostró alta concordancia y acuerdo total con la lectura del pasaje.
  spanish_consistency_notes:
  - Se usa «Yahvé» de manera consistente para יְהוָה, conforme al criterio del proyecto.
  - Se conserva la repetición enfática de «se acerque» para reflejar el hebreo doble de קרב.
  - «Perecer» se reserva para תַּמְנוּ / לִגְוֹעַ, manteniendo la distinción semántica sugerida por la nota inglesa.
  - El tono es reverente y bíblico, pero en español moderno y claro, sin depender de fórmulas tradicionales de reemplazo del Nombre divino.
