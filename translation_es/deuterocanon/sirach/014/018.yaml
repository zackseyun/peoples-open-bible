translation:
  language: es
  text: 'Como hojas en un árbol frondoso: esta se marchita y otra brota; así son las generaciones de carne y sangre: una muere y otra surge[a].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El hebreo puede también entenderse como 'otra madura' o algo parecido a partir de גּוֹמֵל; pero el testimonio griego dice 'otra nace', lo cual encaja con la comparación de generaciones sucesivas y se sigue aquí con una formulación más abierta.
    reason: alternative_reading
lexical_decisions:
- source_word: כְּפֶרַח עָלֶה / ὡς φύλλον θάλλον
  english_pob_choice: Like leaves budding
  chosen_spanish: Como hojas
  alternatives_spanish:
  - Como hojas en brote
  - Como follaje en flor
  lexicon: HALOT
  rationale: El hebreo y el griego presentan una imagen vegetal colectiva, no una hoja aislada en sentido estricto. En español, 'hojas' mantiene la comparación natural y fluida sin forzar un calco raro como 'hoja-brote'.
- source_word: עֵץ רַעֲנָן / δένδρου δασέος
  english_pob_choice: a luxuriant tree
  chosen_spanish: un árbol frondoso
  alternatives_spanish:
  - un árbol lozano
  - un árbol exuberante
  - un árbol verde
  lexicon: HALOT
  rationale: רַעֲנָן comunica frescura y abundancia de follaje; δασέος refuerza la idea de espesura. 'Frondoso' es el equivalente español más natural y fiel a la imagen de un árbol lleno de hojas.
- source_word: שֶׁזֶּה נוֹבֵל וְאַחֵר צוֹמֵחַ / τὰ μὲν καταβάλλει, ἄλλα δὲ φύει
  english_pob_choice: this one withers and another sprouts
  chosen_spanish: esta se marchita y otra brota
  alternatives_spanish:
  - esta se seca y otra crece
  - una se marchita y otra nace
  lexicon: HALOT
  rationale: נוֹבֵל y φύει conservan la alternancia de pérdida y renovación vegetal. 'Se marchita... brota' preserva la metáfora sin sobretraducirla como muerte/vida todavía.
- source_word: כֵּן דּוֹרוֹת
  english_pob_choice: so are the generations
  chosen_spanish: así son las generaciones
  alternatives_spanish:
  - así las generaciones
  - de igual manera son las generaciones
  lexicon: HALOT
  rationale: La formulación española sigue de cerca la comparación del hebreo y del griego, con un giro natural en castellano.
- source_word: בָּשָׂר וָדָם / σαρκός καὶ αἵματος
  english_pob_choice: of flesh and blood
  chosen_spanish: de carne y sangre
  alternatives_spanish:
  - de carne y hueso
  - de humanidad
  - de seres humanos
  lexicon: HALOT
  rationale: El POB conserva el idiomático 'flesh and blood'; en español 'carne y sangre' mantiene la expresión semítica y el matiz de mortalidad humana sin sustituirla por una abstracción.
- source_word: אֶחַד גֹּוֵעַ
  english_pob_choice: one dies
  chosen_spanish: una muere
  alternatives_spanish:
  - una fallece
  - una expira
  lexicon: HALOT
  rationale: גֹּוֵעַ designa el morir, y en paralelo con el resto del verso 'muere' es claro y sobrio en español.
- source_word: וְאֶחַד גּוֹמֵל / ἑτέρα δὲ γεννᾶται
  english_pob_choice: another comes forth
  chosen_spanish: otra aparece
  alternatives_spanish:
  - otra viene al mundo
  - otra nace
  lexicon: HALOT
  rationale: El hebreo גּוֹמֵל puede sugerir madurar/desarrollarse, mientras que el griego lee 'nace'. Dado que el POB opta por una formulación abierta ('comes forth') para no cerrar el sentido, 'aparece' en español conserva esa apertura y evita fijar indebidamente 'nace' o 'madura'.
theological_decisions:
- issue: Imagen de mortalidad humana en בשר ודם
  english_pob_reading: retain the literal idiom 'flesh and blood'
  chosen_spanish_reading: conservar el modismo 'carne y sangre'
  alternative_spanish_readings:
  - humanidad
  - seres humanos
  rationale: La frase subraya la condición mortal y transitoria de la humanidad. Mantener el modismo preserva el color semítico y la tensión antropológica del texto.
  doctrine_reference: 'DOCTRINE.md: original-language primacy over translation tradition'
- issue: Relación entre hebreo גּוֹמֵל y griego γεννᾶται
  english_pob_reading: Hebrew 'another matures' or similar is possible, but the Greek witness reads 'another is born'... followed here
  chosen_spanish_reading: dejar la última cláusula abierta con 'otra aparece'
  alternative_spanish_readings:
  - otra nace
  - otra madura
  rationale: La tradición textual ofrece una tensión real entre madurar/crecer y nacer. 'Otra aparece' permite respetar esa tensión sin resolverla de forma más cerrada de lo que autoriza el conjunto de testigos.
  doctrine_reference: 'DOCTRINE.md: preserve documented lexical/theological tension'
translation_notes:
  revision_awareness: La redacción sigue la revisión más reciente del POB al evitar 'budding' / 'is born' como cierres demasiado específicos, y conserva el paso comparativo con 'this one... and another' mediante 'esta... y otra'. En español se ha optado por una solución equivalente-óptima que mantiene la metáfora vegetal y la apertura del cierre textual.
  spanish_consistency_notes:
  - Se usó 'frondoso' para עֵץ רַעֲנָן por ser natural en español y cercano a 'luxuriant/flourishing'.
  - Se conservó el modismo 'carne y sangre' para no diluir la antropología del verso.
  - Se eligió 'aparece' para גּוֹמֵל / γεννᾶται con el fin de mantener abierta la tensión entre madurar y nacer.
  - No se incluyeron notas al pie porque no había marcador anclado en el texto español.
