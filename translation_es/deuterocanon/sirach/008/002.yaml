base_translation:
  language: en
  yaml_path: translation/deuterocanon/sirach/008/002.yaml
  text: Do not quarrel with one stronger than you[b][a], lest you fall into his hand.
  footnotes:
  - marker: a
    text: 'The Hebrew reads ''one harder than you.'' The Greek parallel has ''a rich man'' and expands the warning: ''lest he outweigh you ... for gold has destroyed many.'' The main text follows the surviving Hebrew witness as primary.'
    reason: alternative_reading
  - marker: b
    text: The Hebrew word rendered 'lest' is literally 'why,' but the clause is best understood as a warning of what may happen if one quarrels with a more formidable person.
    reason: lexical_alternative
