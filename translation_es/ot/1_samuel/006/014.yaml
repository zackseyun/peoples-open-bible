base_translation:
  language: en
  yaml_path: translation/ot/1_samuel/006/014.yaml
  text: The cart came into the field of Joshua the Beth-shemite and stopped there[a], where there was a large stone[c][b]. Then they split up the wood of the cart and offered up the cows as a burnt offering to Yahweh.
  footnotes:
  - marker: a
    text: Or 'the field of Joshua of Beth-shemesh.' The Hebrew identifies Joshua by his connection to Beth-shemesh.
    reason: lexical_alternative
  - marker: b
    text: Or 'and stood there.' The Hebrew verb is literally 'stood,' used here of the cart coming to a stop.
    reason: lexical_alternative
  - marker: c
    text: Hebrew 'to the LORD'; alternatively, 'to Yahweh.'
    reason: alternative_reading
