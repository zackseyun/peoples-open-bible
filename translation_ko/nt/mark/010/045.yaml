id: MRK.10.45
reference: Mark 10:45
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: καὶ γὰρ ὁ υἱὸς τοῦ ἀνθρώπου οὐκ ἦλθεν διακονηθῆναι ἀλλὰ διακονῆσαι καὶ δοῦναι τὴν ψυχὴν αὐτοῦ λύτρον ἀντὶ πολλῶν.
base_translation:
  language: en
  yaml_path: translation/nt/mark/010/045.yaml
  text: For even the Son of Man did not come to be served[a], but to serve, and to give his life as a ransom for many.
  footnotes:
  - marker: a
    text: Or "as a ransom in place of many." The preposition behind "for" can carry the sense of substitution or exchange.
    reason: lexical_alternative
translation:
  language: ko
  text: 인자도 섬김을 받으러 온 것이 아니라 섬기러, 또 자기 목숨을 많은 사람을 위한 대속물로 주러 왔기 때문입니다.」
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 또는 「많은 사람을 대신하여」. 「위한」 뒤의 헬라어 전치사 ἀντί는 대신함이나 교환의 의미를 가질 수 있습니다.
    reason: lexical_alternative
theological_decisions:
- issue: ἀντί(대속물)의 대신적 의미 보존
  chosen_reading: 많은 사람을 위한 대속물
  alternative_readings:
  - 많은 사람을 대신하는 대속물
  - 많은 사람을 대신하여
  rationale: ἀντί는 가장 자연스럽게 교환·대신의 의미를 가진다. 본문 본체는 한국 성경 전통에서 정착된 「많은 사람을 위한」을 유지하고, 각주에서 더 강한 대신적 함의를 보존한다. 신학적 긴장을 해소하지 않는다.
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve it'
