  text: וְ/לָקַ֨ח הַ/כֹּהֵ֜ן אֶת הַ/כֶּ֣בֶשׂ הָ/אֶחָ֗ד וְ/הִקְרִ֥יב אֹת֛/וֹ לְ/אָשָׁ֖ם וְ/אֶת לֹ֣ג הַ/שָּׁ֑מֶן וְ/הֵנִ֥יף אֹתָ֛/ם תְּנוּפָ֖ה לִ/פְנֵ֥י יְהוָֽה־־׃
base_translation:
  language: en
  yaml_path: translation/ot/leviticus/014/012.yaml
  text: Then the priest shall take the one male lamb and present it as a guilt offering[a], along with the log of oil[b], and he shall wave them as a wave offering before Yahweh.
  footnotes:
  - marker: a
    text: A 'log' was a small unit of liquid measure used in Israel's ritual system.
    reason: cultural_note
  - marker: b
    text: Or 'as a reparation offering' for 'as a guilt offering.'
    reason: lexical_alternative
