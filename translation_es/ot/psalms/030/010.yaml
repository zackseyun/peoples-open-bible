translation:
  language: es
  text: ¿Qué provecho hay en mi sangre[a], cuando yo baje a la fosa[b]? ¿Te alabará el polvo? ¿Declarará tu fidelidad[c]?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «mi muerte». El hebreo dice literalmente: «mi sangre».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «el sepulcro» o «la tumba» para «la fosa».'
    reason: lexical_alternative
  - marker: c
    text: 'O: «tu verdad». El término hebreo puede significar «verdad» o «fidelidad»; aquí encaja mejor «fidelidad» por el contexto pactal.'
    reason: lexical_alternative
lexical_decisions:
- source_word: מַה בֶּצַע
  english_pob_choice: What profit is there
  chosen_spanish: ¿Qué provecho hay
  alternatives_spanish:
  - ¿Qué ganancia hay
  - ¿Qué beneficio hay
  lexicon: HALOT
  rationale: La expresión interrogativa pide una ventaja o ganancia real. «Provecho» conserva bien el valor idiomático y la fuerza retórica sin volver la frase pesada.
- source_word: בְּדָמִי
  english_pob_choice: in my blood
  chosen_spanish: en mi sangre
  alternatives_spanish:
  - en mi muerte
  - por mi derramamiento de sangre
  lexicon: HALOT
  rationale: Se mantiene la imagen concreta del hebreo. «Sangre» reproduce con fidelidad la forma literal; el contexto deja claro que alude a la muerte del salmista sin explicitarlo en el texto principal.
- source_word: בְּרִדְתִּי אֶל שָׁחַת
  english_pob_choice: in my going down to the pit
  chosen_spanish: en mi descender al sepulcro
  alternatives_spanish:
  - cuando yo descienda al sepulcro
  - en mi bajar al sepulcro
  lexicon: HALOT
  rationale: La construcción verbal se puede expresar con un infinitivo sustantivado en español. «Descender» conserva la idea de movimiento hacia abajo, y «sepulcro» da un equivalente natural de «pit» en este contexto funerario poético.
- source_word: שָׁחַת
  english_pob_choice: the pit
  chosen_spanish: el sepulcro
  alternatives_spanish:
  - el pozo
  - la fosa
  - la tumba
  lexicon: HALOT
  rationale: Aunque «pozo/fosa» preservan más literalmente la imagen, «sepulcro» es una opción sobria y comprensible en español para el ámbito de la muerte. Mantiene el carácter funerario sin sonar técnico o forzado.
- source_word: הֲיוֹדְךָ עָפָר
  english_pob_choice: Will the dust praise you
  chosen_spanish: ¿Te alabará el polvo?
  alternatives_spanish:
  - ¿Te dará gracias el polvo?
  - ¿Te confesará el polvo?
  lexicon: HALOT
  rationale: En español, «alabar» es la forma más natural en contexto de adoración dirigida a Dios. «Polvo» conserva la metonimia de la condición mortal humana.
- source_word: הֲיַגִּיד
  english_pob_choice: Will it declare
  chosen_spanish: ¿Declarará
  alternatives_spanish:
  - ¿Proclamará
  - ¿Dirá
  lexicon: HALOT
  rationale: «Declarar» encaja con el registro poético elevado y se relaciona bien con el segundo miembro del paralelismo.
- source_word: אֲמִתֶּךָ
  english_pob_choice: your faithfulness
  chosen_spanish: tu fidelidad
  alternatives_spanish:
  - tu verdad
  - tu confiabilidad
  lexicon: HALOT
  rationale: Aunque אמת puede significar «verdad», aquí el sentido pactal es central. «Fidelidad» comunica mejor la lealtad constante de Dios en este lamento.
theological_decisions:
- issue: Si interpretar explícitamente la muerte o conservar la imaginería concreta
  english_pob_reading: Preserve the concrete images 'blood,' 'pit,' and 'dust' in the main text
  chosen_spanish_reading: Conservar «sangre», «sepulcro» y «polvo» en el texto principal
  alternative_spanish_readings:
  - Reformular como «muerte», «tumba» y «los muertos»
  rationale: La queja poética depende de imágenes corporales y funerarias. Mantenerlas en el texto principal respeta la tensión del hebreo y evita una interpretación más explicativa de lo que el verso dice.
  doctrine_reference: Translation philosophy §1, §3, §6
translation_notes:
  revision_awareness: No se informan revisiones aplicadas; el control más reciente indica que el borrador previo permaneció sin cambios y el consenso de revisión fue alto, con solo observaciones menores.
  spanish_consistency_notes:
  - Se mantuvo el paralelismo interrogativo del hebreo con cuatro preguntas breves.
  - Se conservó la imaginería de mortalidad sin reemplazarla por una paráfrasis abstracta.
  - «Fidelidad» se eligió para אמת por el peso relacional y pactal en este lamento.
  - Se evitó «SEÑOR» y se siguió el principio de traducir los términos divinos según su valor léxico, aunque aquí no aparece el Tetragrámaton.
