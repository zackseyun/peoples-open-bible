base_translation:
  language: en
  yaml_path: translation/ot/isaiah/011/011.yaml
  text: And in that day the Lord will again extend his hand[a], a second time, to recover the remnant of his people who remain, from Assyria, from Egypt, from Pathros, from Cush, from Elam, from Shinar, from Hamath[c][b], and from the coastlands of the sea.
  footnotes:
  - marker: a
    text: Or 'will recover ... a second time.' The Hebrew literally says 'will again/add to extend his hand ... to acquire,' an idiom many versions render 'recover.'
    reason: lexical_alternative
  - marker: b
    text: Or 'from the islands of the sea.' The Hebrew expression can refer to islands or maritime coastlands more broadly.
    reason: lexical_alternative
  - marker: c
    text: Cush is the Hebrew place name, often associated with regions south of Egypt; some translations use 'Ethiopia.'
    reason: cultural_note
