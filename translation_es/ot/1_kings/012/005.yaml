translation:
  language: es
  text: 'Él les dijo[a]: «Váyanse por tres días más, y luego vuelvan a mí». Y el pueblo se fue.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Váyanse por otros tres días y vuelvan a mí».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר
  english_pob_choice: He said
  chosen_spanish: Él les dijo
  alternatives_spanish:
  - Y él dijo
  - Él habló
  lexicon: HALOT
  rationale: La forma wayyiqtol introduce narración pasada; en español, «les dijo» comunica de manera natural la introducción del discurso. Se explicita «Él» para evitar ambigüedad referencial en una línea aislada y mantener fluidez.
- source_word: אֲלֵיהֶם
  english_pob_choice: to them
  chosen_spanish: les
  alternatives_spanish:
  - a ellos
  - para ellos
  lexicon: HALOT
  rationale: El dativo indirecto español «les» reproduce con naturalidad el destinatario del habla. Se evita la repetición pesada «a ellos» en el cuerpo del texto.
- source_word: לְכוּ
  english_pob_choice: Go away
  chosen_spanish: Vayan
  alternatives_spanish:
  - Salgan
  - Aléjense
  lexicon: HALOT
  rationale: El imperativo plural de הלך aquí expresa despidida o retirada temporal. «Vayan» es fiel y natural en español; el matiz de alejamiento queda ya claro por el contexto y por el movimiento de salida que sigue.
- source_word: עֹד שְׁלֹשָׁה יָמִים
  english_pob_choice: for three more days
  chosen_spanish: por tres días más
  alternatives_spanish:
  - por otros tres días
  - durante tres días más
  lexicon: HALOT
  rationale: עֹד con una expresión temporal indica un periodo adicional. «Por tres días más» conserva ese valor de extensión adicional sin forzar una paráfrasis excesiva.
- source_word: וְשׁוּבוּ
  english_pob_choice: then return
  chosen_spanish: y luego vuelvan
  alternatives_spanish:
  - y regresen
  - entonces vuelvan
  lexicon: HALOT
  rationale: שוב en imperativo se traduce por «volver/regresar». «Y luego» refleja la secuencia narrativa y mantiene el paralelismo con la orden anterior.
- source_word: אֵלַי
  english_pob_choice: to me
  chosen_spanish: a mí
  alternatives_spanish:
  - hacia mí
  - para mí
  lexicon: HALOT
  rationale: La preposición direccional exige en español la forma «a mí». Se conserva la referencia directa al hablante sin añadir matices no presentes en el hebreo.
- source_word: וַיֵּלְכוּ הָעָם
  english_pob_choice: So the people went away
  chosen_spanish: Y el pueblo se fue
  alternatives_spanish:
  - Y la gente se fue
  - Así que el pueblo se fue
  lexicon: HALOT
  rationale: הָעָם funciona colectivamente; «el pueblo» es la forma más sobria y fiel en español. «Se fue» expresa la salida efectiva en respuesta a la instrucción, sin intensificar más allá del texto.
theological_decisions:
- issue: Referencia colectiva de הָעָם
  english_pob_reading: the people went away
  chosen_spanish_reading: el pueblo se fue
  alternative_spanish_readings:
  - la gente se fue
  - el pueblo se marchó
  rationale: 'No hay tensión doctrinal, pero sí una decisión de registro: «el pueblo» mantiene la unidad colectiva del hebreo y evita reducir el grupo a una expresión coloquial. La forma verbal singular refleja correctamente el sustantivo colectivo español.'
  doctrine_reference: none
translation_notes:
  revision_awareness: 'Se respetó el estado de revisión más reciente del pasaje: no se registran cambios de fondo respecto del audit trail inglés, y se mantuvo la equivalencia óptima con una formulación española natural y breve.'
  spanish_consistency_notes:
  - Se mantuvo «a mí» para אֵלַי de forma consistente con el valor direccional.
  - Se eligió «el pueblo» como colectivo para הָעָם, con verbo singular español, siguiendo el sentido corporativo del hebreo.
  - El imperativo plural se expresó con «Vayan» y «vuelvan», preservando el tono de instrucción directa.
