translation:
  language: es
  text: ¿Harán ustedes acepción de personas por él?[a] ¿Contenderán por Dios?[b]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Literalmente: «¿levantarán su rostro?»; es decir, mostrarán parcialidad o favoritismo.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «¿pleitearán por Dios?»'
    reason: alternative_reading
lexical_decisions:
- source_word: הֲפָנָיו / תִּשָּׂאוּן
  english_pob_choice: Will you show partiality for him?
  chosen_spanish: ¿Harán ustedes acepción de persona en favor de él?
  alternatives_spanish:
  - ¿Le levantarán el rostro?
  - ¿Mostrarán favoritismo hacia él?
  - ¿Aceptarán su persona?
  lexicon: HALOT
  rationale: El hebreo usa el modismo נָשָׂא פָּנִים / פָּנָיו, literalmente “levantar el rostro”, que en contexto judicial significa mostrar parcialidad o favoritismo. En español, “acepción de persona” conserva bien el valor forense y ético del modismo sin volverlo opaco. La frase “en favor de él” refleja el sufijo de tercera masculina singular y mantiene la idea de parcialidad hacia Job sin imponer una paráfrasis más fuerte que el hebreo.
- source_word: תִּשָּׂאוּן
  english_pob_choice: will you show
  chosen_spanish: ¿Harán ustedes acepción de persona...
  alternatives_spanish:
  - ¿Levantarán...
  - ¿Aceptarán...
  lexicon: HALOT
  rationale: El verbo נָשָׂא aquí funciona dentro del modismo con פָּנִים, por lo que en español conviene traducir la unidad idiomática completa. “Harán ustedes” conserva el valor interrogativo plural y la fuerza retórica del hebreo sin descomponer el giro en una literalidad poco natural.
- source_word: אִם
  english_pob_choice: '?'
  chosen_spanish: ¿Contenderán por Dios?
  alternatives_spanish:
  - ¿O contenderán por Dios?
  - ¿Pugnarán por Dios?
  - ¿Plead on God's behalf?
  lexicon: HALOT
  rationale: Aquí אִם introduce la segunda pregunta retórica en paralelo. En español, la estructura interrogativa separada comunica mejor el valor de la partícula que una traducción mecánica como “si”. La posible lectura “o” queda implícita en el paralelismo y en la puntuación, como en el audit trail inglés.
- source_word: לָאֵל
  english_pob_choice: for God
  chosen_spanish: por Dios
  alternatives_spanish:
  - para Dios
  - en favor de Dios
  - a favor de Dios
  lexicon: HALOT
  rationale: אֵל se entiende claramente como “Dios”. La preposición ל expresa aquí relación de beneficio o defensa; en español, “por Dios” es natural y preserva la idea de tomar partido o abogar en su causa. “Para Dios” sonaría más teleológico que forense en este contexto.
- source_word: תְּרִיבוּן
  english_pob_choice: will you contend
  chosen_spanish: ¿Contenderán por Dios?
  alternatives_spanish:
  - ¿Pleitearán por Dios?
  - ¿Pugnarán por Dios?
  - ¿Disputarán por Dios?
  lexicon: HALOT
  rationale: 'El verbo רִיב pertenece al campo legal y de disputa. “Contender” mantiene la fuerza adversarial y forense sin restringirlo demasiado a un procedimiento jurídico específico. En combinación con “por Dios”, la frase suena natural en español y conserva la acusación de Job: ellos actúan como defensores parciales de Dios.'
theological_decisions:
- issue: Si el versículo acusa a los amigos de parcialidad al defender a Dios
  english_pob_reading: The verse is rendered as two rhetorical questions accusing the friends of showing partiality and contending for God.
  chosen_spanish_reading: El versículo se traduce como dos preguntas retóricas que acusan a los amigos de hacer acepción de persona y de contender por Dios.
  alternative_spanish_readings:
  - ¿Le levantarán el rostro? ¿Pleitearán por Dios?
  - ¿Mostrarán favoritismo hacia él? ¿Pedirán por Dios?
  rationale: 'El contexto inmediato de Job 13 favorece una lectura forense y ética: no se trata de una defensa neutral de la verdad, sino de una defensa parcial de Dios contra Job. Por eso la traducción conserva la acusación de parcialidad y la idea de abogar o contender a favor de Dios, sin suavizarla doctrinalmente.'
  doctrine_reference: Job 13:8; Translation philosophy §§1, 3, 5
translation_notes:
  revision_awareness: El audit trail inglés no requiere cambios; la traducción española sigue la misma lectura óptima-equivalente, conservando el modismo judicial y la pregunta retórica paralela.
  spanish_consistency_notes:
  - Se mantiene “Dios” para אֵל, sin sustituirlo por una forma reverencial más tradicional que oscurezca el paralelo.
  - Se usa “contender” para reflejar el valor legal/disputacional de רִיב, coherente con la terminología POB.
  - “Acepción de persona” se emplea como equivalente idiomático forense de “lift up his face”, evitando una literalidad extraña en español.
  - Las notas al pie distinguen entre el sentido idiomático principal y la alternativa ‘pleitear por Dios’, como en el aparato inglés.
