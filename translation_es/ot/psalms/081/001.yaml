translation:
  language: es
  text: 'Para el director del coro: según la Gitit[a]. De Asaf.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebreo Gitit. El término probablemente se refiere a una indicación musical, un instrumento o el nombre de una melodía, pero su significado preciso es incierto; podría aludir a algo asociado con Gat o a una tonada nombrada así.
    reason: lexical_alternative
lexical_decisions:
- source_word: לַמְנַצֵּחַ
  english_pob_choice: For the choir director
  chosen_spanish: Para el director del coro
  alternatives_spanish:
  - Para el músico principal
  - Para el maestro de canto
  lexicon: HALOT
  rationale: En los encabezados de los salmos, el participio con ל indica dirección o destinación al responsable de la ejecución musical. «Director del coro» comunica bien la función en español moderno sin recurrir a un calco arcaico.
- source_word: עַל
  english_pob_choice: according to
  chosen_spanish: según
  alternatives_spanish:
  - con la melodía de
  - sobre
  - con referencia a
  lexicon: HALOT
  rationale: En este tipo de superscripción, עַל suele introducir una designación musical, como un tono, instrumento o estilo. «Según» conserva la relación de correspondencia sin imponer una interpretación técnica no segura.
- source_word: הַגִּתִּית
  english_pob_choice: The Gittith
  chosen_spanish: la Guitit
  alternatives_spanish:
  - la gittit
  - el instrumento de Gat
  - la melodía de Gat
  lexicon: HALOT
  rationale: Se mantiene la transliteración del término hebreo para no sobreinterpretar un vocablo cuyo referente exacto es incierto. Se adapta ortográficamente a una forma natural en español, preservando la opacidad lexical.
- source_word: לְאָסָף
  english_pob_choice: Of Asaph
  chosen_spanish: De Asaf
  alternatives_spanish:
  - Para Asaf
  - Perteneciente a Asaf
  lexicon: HALOT
  rationale: La preposición ל con nombre propio en encabezamientos puede indicar autoría, asociación o pertenencia a una colección. «De Asaf» conserva esa ambigüedad, como en el inglés de referencia.
theological_decisions:
- issue: Naturaleza del encabezamiento y relación con la autoría/asignación
  english_pob_reading: Of Asaph
  chosen_spanish_reading: De Asaf
  alternative_spanish_readings:
  - Por Asaf
  - Para Asaf
  - Relacionado con Asaf
  rationale: El hebreo no obliga a una sola lectura; el encabezamiento puede señalar autor, tradición o colección. «De Asaf» mantiene esa apertura sin resolverla artificialmente.
  doctrine_reference: None
translation_notes:
  revision_awareness: 'La versión inglesa revisada solo ajustó la capitalización de ''the Gittith'' a ''the Gittith'' en su forma final; no cambió la decisión de fondo. El español sigue esa misma cautela: transliteración del término oscuro y conservación de la ambigüedad en la relación con Asaf.'
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando aparece el nombre divino; aquí no aparece.
  - Se conservó la estructura breve de encabezamiento poético, con dos segmentos separados por dos puntos y punto final.
  - «De Asaf» evita fijar autoría exclusiva y permanece coherente con el valor ambiguo del ל hebreo.
  - Se prefirió «director del coro» por claridad natural en español, sin sustituir el sentido funcional del hebreo.
