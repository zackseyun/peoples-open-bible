source:
  edition: WLC
  text: יְהוָ֣ה מָלָךְ֮ גֵּא֪וּת לָ֫בֵ֥שׁ לָבֵ֣שׁ יְ֭הוָה עֹ֣ז הִתְאַזָּ֑ר אַף תִּכּ֥וֹן תֵּ֝בֵ֗ל בַּל תִּמּֽוֹט־־׃
base_translation:
  language: en
  yaml_path: translation/ot/psalms/093/001.yaml
  text: Yahweh reigns[a]; he is clothed with majesty; Yahweh is clothed with strength; he has girded himself. Indeed, the world is established[e][d][c][b]; it will not be moved.
  footnotes:
  - marker: a
    text: Or 'The LORD has become king'; the Hebrew verb can be rendered more ingressively, but here likely proclaims his present reign.
    reason: alternative_reading
  - marker: b
    text: Or 'splendor' for 'majesty.'
    reason: lexical_alternative
  - marker: c
    text: Literally 'has girded himself'; the image is of putting on strength like a belt or armor.
    reason: cultural_note
  - marker: d
    text: Or 'the inhabited world is firmly fixed; it shall not totter.'
    reason: lexical_alternative
  - marker: e
    text: Or 'the LORD is clothed, he has girded himself with strength'.
    reason: previous_rendering
  ai_draft:
