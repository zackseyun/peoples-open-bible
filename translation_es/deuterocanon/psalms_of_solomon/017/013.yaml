translation:
  language: es
  text: El sin ley asoló nuestra tierra, vaciándola de sus habitantes; destruyeron[a] al joven y al anciano, y a sus hijos juntamente.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El griego pasa del verbo en singular (ἠρήμωσεν, 'asoló', cuyo sujeto es 'el sin ley') a un verbo en plural (ἠφάνισαν, 'destruyeron'). La traducción preserva este cambio en lugar de suavizarlo.
    reason: textual_variant
lexical_decisions:
- source_word: ἠρήμωσεν
  english_pob_choice: laid waste
  chosen_spanish: asoló
  alternatives_spanish:
  - devastó
  - dejó desierta
  - arrasó
  lexicon: BDAG
  rationale: ἐρημόω denota convertir algo en yerma soledad. 'Asoló' (de asolar) es el equivalente español más idiomático y de registro digno; conserva el sentido concreto de reducir la tierra a desolación sin añadir paráfrasis. 'Devastó' sería aceptable pero ligeramente más genérico; 'arrasó' enfatiza la destrucción física más que la vaciedad resultante.
- source_word: ὁ ἄνομος
  english_pob_choice: the lawless one
  chosen_spanish: el inicuo
  alternatives_spanish:
  - el transgresor de la ley
  - el malvado
  - el impío
  lexicon: BDAG
  rationale: ἄνομος significa literalmente 'sin ley' o 'que actúa al margen de la ley'. 'El inicuo' tiene arraigo en la literatura deuterocanónica española y preserva la fuerza titular del artículo singular griego (ὁ ἄνομος). 'El transgresor de la ley' captaría mejor la dimensión legal pero resulta excesivamente largo; 'el impío' es demasiado genérico y desplaza el énfasis hacia la impiedad religiosa; 'el malvado' pierde por completo la referencia a la ley. Se opta por 'el inicuo' como término que equilibra precisión, dignidad y legibilidad.
- source_word: ἀπὸ ἐνοικούντων αὐτήν
  english_pob_choice: emptying it of its inhabitants
  chosen_spanish: vaciándola de sus habitantes
  alternatives_spanish:
  - expulsando a sus moradores
  - quitándole a quienes la habitaban
  - dejándola sin habitantes
  lexicon: BDAG
  rationale: 'El ἀπό es separativo: la desolación consiste en la extracción de los que habitaban la tierra. ''Vaciándola de sus habitantes'' reproduce el sentido resultativo señalado por el POB inglés; el participio de gerundio en español encaja naturalmente como complemento explicativo del verbo principal ''asoló''. ''Expulsando a sus moradores'' sugeriría expulsión activa y deliberada, añadiendo matiz no plenamente respaldado por el griego.'
- source_word: ἠφάνισαν
  english_pob_choice: destroyed
  chosen_spanish: destruyeron
  alternatives_spanish:
  - aniquilaron
  - hicieron desaparecer
  - exterminaron
  lexicon: BDAG
  rationale: ἀφανίζω denota literalmente 'hacer desaparecer' u 'obliterar', con fuerza de extinción total. La revisión inglesa sustituyó 'wiped out' por 'destroyed' por razones de registro formal. El español 'destruyeron' sigue esa decisión de registro; 'aniquilaron' preservaría mejor la fuerza de obliteración propia del griego pero superaría el registro de la traducción inglesa final; 'hicieron desaparecer' sería más literal pero resultaría artificioso en español.
- source_word: νέον καὶ πρεσβύτην
  english_pob_choice: young and old
  chosen_spanish: al joven y al anciano
  alternatives_spanish:
  - a jóvenes y ancianos
  - al muchacho y al viejo
  - al mozo y al anciano
  lexicon: BDAG
  rationale: El griego usa acusativos singulares (νέον / πρεσβύτην) formando un merismo de extremos de edad. 'Al joven y al anciano' preserva el número singular del griego con naturalidad española y mantiene el tono digno; 'a jóvenes y ancianos' (plural) sería más idiomático en español corriente pero diluye la precisión del singular; 'al mozo y al viejo' es coloquial y reduce el registro.
- source_word: τέκνα αὐτῶν ἅμα
  english_pob_choice: their children together
  chosen_spanish: a sus hijos juntamente
  alternatives_spanish:
  - a sus hijos también
  - a sus hijos a una
  - a sus hijos a la vez
  lexicon: BDAG
  rationale: 'ἅμα indica simultaneidad y colectividad: todos fueron destruidos al mismo tiempo. ''Juntamente'' es el equivalente español más formal y digno, con uso establecido en textos bíblicos y deuterocanónicos; ''también'' debilitaría el sentido de simultaneidad; ''a la vez'' es correcto pero más coloquial.'
translation_notes:
  revision_awareness: La revisión inglesa (azure-gpt-5.4, 2026-04-23) sustituyó 'wiped out' por 'destroyed' por razones de registro formal y eliminó una coma antes de 'and their children together' para lograr una fraseo más continuo. El español 'destruyeron' sigue el registro formal de la versión revisada. La alternativa 'aniquilaron' preservaría mejor la fuerza de obliteración propia de ἀφανίζω —sentido de 'hacer desaparecer' totalmente— pero rebasaría el registro de la traducción inglesa final. Se mantiene el polisíndeton (καὶ...καὶ → 'y al anciano y a sus hijos'), coherente con la supresión de la coma en la revisión inglesa.
  spanish_consistency_notes:
  - No aparecen nombres divinos (YHWH, θεός, κύριος) en este versículo; los valores por defecto del proyecto para Yahvé, Dios, Jesús y Mesías no se aplican.
  - Se preserva el polisíndeton griego (καὶ νέον καὶ πρεσβύτην καὶ τέκνα) con la doble 'y' en español ('y al anciano y a sus hijos'), siguiendo la estructura del POB inglés revisado sin coma adicional.
  - '''Juntamente'' se prefiere sobre ''juntos'' o ''a la vez'' para mantener el registro formal propio del texto deuterocanónico.'
  - El participio 'vaciándola' funciona como complemento resultativo de 'asoló', estructura natural en español que evita la literalidad forzada de una cláusula preposicional ('de los que la habitaban').
