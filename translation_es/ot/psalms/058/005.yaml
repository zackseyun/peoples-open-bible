translation:
  language: es
  text: Su veneno es como el veneno de una serpiente[a], como una cobra sorda que se tapa el oído.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'áspid' para 'cobra'; el hebreo פֶתֶן designa una serpiente venenosa, tradicionalmente traducida como 'áspid'.
    reason: lexical_alternative
lexical_decisions:
- source_word: חֲמַת
  english_pob_choice: venom
  chosen_spanish: veneno
  alternatives_spanish:
  - veneno
  - ponzoña
  - ira
  lexicon: HALOT
  rationale: En este paralelismo con 'serpiente' y 'cobra', el hebreo apunta al veneno de un reptil, no a 'ira'. 'Veneno' es la opción natural y precisa en español para conservar la imagen zoológica.
- source_word: לָמוֹ
  english_pob_choice: their
  chosen_spanish: su
  alternatives_spanish:
  - su
  - de ellos
  - para ellos
  lexicon: HALOT
  rationale: La forma pronominal funciona posesivamente con el sustantivo siguiente. En español, 'su veneno' comunica mejor la relación posesiva que una reproducción más literal y torpe.
- source_word: כִּדְמוּת
  english_pob_choice: is like
  chosen_spanish: es como
  alternatives_spanish:
  - como
  - según la semejanza de
  lexicon: HALOT
  rationale: La construcción comparativa pide una equivalencia natural en español. 'Es como' conserva la comparación y mantiene un registro claro y poético.
- source_word: נָחָשׁ
  english_pob_choice: serpent
  chosen_spanish: serpiente
  alternatives_spanish:
  - serpiente
  - culebra
  - víbora
  lexicon: HALOT
  rationale: '''Serpiente'' corresponde al registro elevado del salmo y evita la especificación excesiva de términos más concretos o coloquiales.'
- source_word: פֶתֶן
  english_pob_choice: cobra
  chosen_spanish: cobra
  alternatives_spanish:
  - cobra
  - áspid
  - víbora
  lexicon: HALOT
  rationale: El término hebreo designa una serpiente venenosa; 'cobra' es el equivalente moderno más claro y mantiene la fuerza imagística. Se conserva la tensión con la nota sobre 'áspid' como alternativa tradicional.
- source_word: חֵרֵשׁ
  english_pob_choice: deaf
  chosen_spanish: sorda
  alternatives_spanish:
  - sorda
  - que no oye
  - muda
  lexicon: HALOT
  rationale: El adjetivo significa normalmente 'sordo'. 'Sorda' preserva el sentido y la imagen de la serpiente que no escucha al encantador.
- source_word: יַאְטֵם
  english_pob_choice: stops up
  chosen_spanish: tapa
  alternatives_spanish:
  - cierra
  - tapa
  - sella
  lexicon: HALOT
  rationale: El verbo expresa cerrar o sellar. 'Tapa' resulta idiomático en español y comunica la acción física de bloquear el oído sin perder vividness.
- source_word: אָזְנוֹ
  english_pob_choice: its ear
  chosen_spanish: su oído
  alternatives_spanish:
  - su oído
  - su oreja
  lexicon: HALOT
  rationale: Para el paralelismo poético, 'oído' funciona bien en español y evita una expresión demasiado corporal o técnica. El posesivo concuerda con la cobra como antecedente implícito.
translation_notes:
  revision_awareness: El texto español sigue de cerca la lectura aprobada del POB inglés y del hebreo masorético, sin cambios respecto al estado auditado más reciente; se conservó la imagen poética y la alternativa léxica tradicional en nota.
  spanish_consistency_notes:
  - Se mantuvo 'veneno' para חֲמַת en coherencia con el paralelismo serpentino y para evitar la lectura de 'ira'.
  - '''Cobra'' se conserva como equivalente moderno claro; la nota preserva la alternativa tradicional ''áspid''.'
  - '''Su oído'' refleja el posesivo hebreo y mantiene la fluidez del castellano sin masculinizar innecesariamente el referente animal.'
