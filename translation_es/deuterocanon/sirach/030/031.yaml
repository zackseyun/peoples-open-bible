  glossary_alignment: No hay términos del glosario mayor en juego. La decisión «honra» para δόξα es aceptable y coherente con la justificación contextual. Conviene alinear mejor μὴ δῷς con un verbo español más cercano al sentido de ocasionar una mancha sobre la honra.
