id: JER.1.10
reference: Jeremiah 1:10
source:
  edition: WLC
  text: רְאֵ֞ה הִפְקַדְתִּ֣י/ךָ הַ/יּ֣וֹם הַ/זֶּ֗ה עַל הַ/גּוֹיִם֙ וְ/עַל הַ/מַּמְלָכ֔וֹת לִ/נְת֥וֹשׁ וְ/לִ/נְת֖וֹץ וּ/לְ/הַאֲבִ֣יד וְ/לַ/הֲר֑וֹס לִ/בְנ֖וֹת וְ/לִ/נְטֽוֹעַ׀־־׃פ
translation:
  text: See[a], today I have appointed you over the nations and over the kingdoms, to uproot and to tear down, and to destroy and to demolish[c][b], to build and to plant.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'this day.'
    reason: lexical_alternative
  - marker: b
    text: Or 'to pluck up.'
    reason: lexical_alternative
  - marker: c
    text: The phrase 'over nations and over kingdoms' refers to Jeremiah's prophetic commission concerning them, not to direct political rule.
    reason: cultural_note
lexical_decisions:
- source_word: רְאֵה
  chosen: See
  alternatives:
  - Look
  - Behold
  lexicon: HALOT
  rationale: Imperative of ראה functioning as an attention-getter. 'See' is concise, natural modern English, and preserves the force of direct address better than the more archaic 'Behold.'
- source_word: הִפְקַדְתִּיךָ
  chosen: I have appointed you
  alternatives:
  - I have set you
  - I have placed you in charge
  lexicon: HALOT
  rationale: Hiphil of פקד here conveys commissioning/appointing to an office or charge. 'Appointed' best captures formal commissioning in prophetic context without over-paraphrasing.
- source_word: הַיּוֹם הַזֶּה
  chosen: today
  alternatives:
  - this day
  lexicon: HALOT
  rationale: Idiomatic temporal expression. 'Today' is the natural modern equivalent while preserving the immediacy of the commissioning.
- source_word: עַל הַגּוֹיִם וְעַל הַמַּמְלָכוֹת
  chosen: over nations and over kingdoms
  alternatives:
  - concerning nations and kingdoms
  - against nations and kingdoms
  lexicon: HALOT
  rationale: With פקד, עַל commonly marks sphere of authority or charge. 'Over' fits the commissioning context better than 'against,' while still allowing that Jeremiah's prophetic word concerns judgment and restoration among these political entities.
- source_word: לִנְתוֹשׁ
  chosen: to uproot
  alternatives:
  - to pluck up
  lexicon: HALOT
  rationale: Agricultural metaphor of pulling up by the roots. 'Uproot' is clear modern English and pairs well with the later 'plant.' 'Pluck up' is traditional but less natural today.
- source_word: לִנְתּוֹץ
  chosen: to tear down
  alternatives:
  - to pull down
  - to break down
  lexicon: HALOT
  rationale: Verb of dismantling or pulling down structures. 'Tear down' is idiomatic and distinct enough from the following destruction terms.
- source_word: וּלְהַאֲבִיד
  chosen: to destroy
  alternatives:
  - to make perish
  - to cause to perish
  lexicon: HALOT
  rationale: Hiphil of אבד is causative, but in this sequence an infinitive of purpose is best rendered with the straightforward English 'to destroy.' This preserves the intensifying series without awkwardness.
- source_word: וְלַהֲרוֹס
  chosen: to demolish
  alternatives:
  - to overthrow
  - to tear down
  lexicon: HALOT
  rationale: Used for razing or breaking down. 'Demolish' differentiates it from נָתַץ ('tear down') and preserves the cumulative force of the four judgment verbs.
- source_word: לִבְנוֹת
  chosen: to build
  lexicon: HALOT
  rationale: Straightforward architectural/restorative metaphor, retained literally.
- source_word: וְלִנְטוֹעַ
  chosen: to plant
  lexicon: HALOT
  rationale: Agricultural metaphor balancing 'uproot.' Literal rendering preserves the prophetic imagery of restoration.
