- from: Y Yahvé lo apartará de entre todas las tribus de Israel para desastre[a], conforme a todas las maldiciones del pacto escritas en este libro de la ley.
  to: Y Yahvé lo apartará de entre todas las tribus de Israel para calamidad,[a] conforme a todas las maldiciones del pacto escritas en este libro de la ley.
  rationale: Se reemplaza «para desastre» por «para calamidad» para una expresión más idiomática y natural en español, manteniendo el sentido de juicio punitivo de לְרָעָה. Se conserva el resto del texto y la nota léxica, añadiendo solo la ubicación correcta del marcador en la puntuación española.
