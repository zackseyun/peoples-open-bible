  to: 'Y le dijo: «Ve en paz». Y él se alejó de su presencia cierta[a] distancia.'
  rationale: Se conserva fielmente la despedida «Ve en paz» y la secuencia narrativa, pero se reemplaza la construcción poco idiomática «se fue de él a cierta distancia» por «se alejó de su presencia cierta distancia», que expresa con naturalidad la separación de Eliseo y la distancia indefinida de כִּבְרַת אָרֶץ. También se corrige la colocación del marcador de nota.
