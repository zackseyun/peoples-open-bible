translation:
  language: es
  text: 'Entonces Yahvé dijo a Moisés: «Cuando vuelvas a Egipto, asegúrate de hacer delante de Faraón todos los prodigios[a] que he puesto en tu mano. Pero yo endureceré su corazón[b], y no dejará ir al pueblo»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘señales’ o ‘milagros’. El hebreo מופתים se refiere a actos extraordinarios que manifiestan el poder divino.
    reason: lexical_alternative
  - marker: b
    text: O ‘fortaleceré su corazón’ o ‘haré firme su corazón’. El verbo hebreo puede expresar fortalecimiento; aquí, sin embargo, describe la confirmación de Faraón en su negativa obstinada.
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: Se sigue el uso por defecto del proyecto para el nombre divino, conservando el nombre propio en lugar de sustituirlo por un título. En español, ‘Yahvé’ es la forma transparente y reverente más coherente con la política del POB.
- source_word: בְּלֶכְתְּךָ לָשׁוּב מִצְרַיְמָה
  english_pob_choice: When you go back to Egypt
  chosen_spanish: Cuando vayas a volver a Egipto
  alternatives_spanish:
  - Cuando regreses a Egipto
  - Cuando vuelvas a Egipto
  - Al ir a volver a Egipto
  lexicon: HALOT
  rationale: La construcción temporal con infinitivo expresa el movimiento de regreso. En español, ‘vayas a volver’ conserva la idea de desplazamiento de retorno sin perder naturalidad ni reducir el matiz de la doble noción de ir/volver.
- source_word: רְאֵה
  english_pob_choice: see that
  chosen_spanish: mira
  alternatives_spanish:
  - ve que
  - asegúrate de
  - procura
  lexicon: HALOT
  rationale: El imperativo introduce una advertencia o encargo atento. ‘Mira’ mantiene la fuerza directiva de forma breve y natural en español; el POB inglés usa ‘see that’ con el mismo valor exhortativo.
- source_word: הַמֹּפְתִים
  english_pob_choice: the wonders
  chosen_spanish: todos los prodigios
  alternatives_spanish:
  - todas las señales
  - todos los milagros
  - todas las maravillas
  lexicon: HALOT
  rationale: מופת designa actos extraordinarios que funcionan como señales de poder divino. ‘Prodigios’ conserva el carácter portentoso sin reducirlo solo a ‘señales’ ni volverlo una paráfrasis explicativa.
- source_word: שַׂמְתִּי בְיָדֶךָ
  english_pob_choice: I have put in your hand
  chosen_spanish: he puesto en tu mano
  alternatives_spanish:
  - he colocado en tu mano
  - te he confiado
  - he puesto a tu disposición
  lexicon: HALOT
  rationale: Se conserva la imagen hebrea de ‘mano’ como lugar de depósito, encargo y habilitación. ‘En tu mano’ es transparente en español y sigue de cerca la metáfora original.
- source_word: וַעֲשִׂיתָם לִפְנֵי פַרְעֹה
  english_pob_choice: you do before Pharaoh
  chosen_spanish: hazlos delante de Faraón
  alternatives_spanish:
  - hazlos ante Faraón
  - realízalos delante de Faraón
  - hazlos en presencia de Faraón
  lexicon: HALOT
  rationale: ‘Hazlos’ traduce directamente עשה con el objeto ‘prodigios’. ‘Delante de Faraón’ conserva el escenario público y confrontativo que el hebreo expresa con לִפְנֵי.
- source_word: וַאֲנִי
  english_pob_choice: But I
  chosen_spanish: Pero yo
  alternatives_spanish:
  - Y yo
  - Ahora yo
  lexicon: HALOT
  rationale: Se refleja el contraste discursivo entre la acción de Moisés y la acción soberana de Yahvé. ‘Pero yo’ expresa mejor la oposición en español que un simple ‘y’.
- source_word: אֲחַזֵּק אֶת לִבּוֹ
  english_pob_choice: I will harden his heart
  chosen_spanish: endureceré su corazón
  alternatives_spanish:
  - fortaleceré su corazón
  - haré firme su corazón
  lexicon: HALOT
  rationale: Aunque el verbo puede sugerir ‘fortalecer’ o ‘hacer firme’, en este contexto narrativo la tradición semántica y la fuerza teológica apuntan a ‘endurecer’. Se mantiene la tensión del texto sin suavizarla.
- source_word: יְשַׁלַּח אֶת הָעָם
  english_pob_choice: he will not let the people go
  chosen_spanish: no dejará ir al pueblo
  alternatives_spanish:
  - no enviará al pueblo
  - no liberará al pueblo
  - no soltará al pueblo
  lexicon: HALOT
  rationale: La cláusula refleja el idiomático שׁלח con el sentido de permitir la salida. ‘Dejar ir’ es natural en español y comunica el resultado narrativo esperado en Éxodo.
theological_decisions:
- issue: La dureza del corazón de Faraón y la agencia divina
  english_pob_reading: I will harden his heart
  chosen_spanish_reading: yo endureceré su corazón
  alternative_spanish_readings:
  - fortaleceré su corazón
  - haré firme su corazón
  rationale: 'Se conserva el peso teológico del texto: Yahvé interviene de modo activo en la resistencia de Faraón. ‘Endureceré’ mantiene la tensión entre soberanía divina y responsabilidad humana que el POB inglés preserva al no suavizar el verbo.'
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: La versión inglesa auditada no recibió cambios en la última revisión; el control cruzado marcó revisión necesaria por discrepancias mayores, así que esta propuesta sigue de cerca el hebreo y la filosofía POB sin introducir armonizaciones externas.
  spanish_consistency_notes:
  - Se mantiene ‘Yahvé’ para יְהוָה, conforme al estándar del proyecto.
  - ‘Faraón’ se escribe con mayúscula como nombre/título histórico en español bíblico.
  - ‘Corazón’ conserva el valor antropológico hebreo sin reemplazos interpretativos.
  - Se evita ‘SEÑOR’ para no ocultar el nombre divino.
  - La puntuación con comillas angulares es adecuada para estilo bíblico en español.
