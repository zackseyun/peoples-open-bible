translation:
  language: es
  text: Mi Dios los rechazará[a] porque no le han escuchado, y serán errantes entre las naciones.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «no le han obedecido». La expresión hebrea dice literalmente que no lo han escuchado, con la obediencia implícita por el contexto.
    reason: lexical_alternative
lexical_decisions:
- source_word: יִמְאָסֵם
  english_pob_choice: will reject them
  chosen_spanish: los rechazará
  alternatives_spanish:
  - los echará fuera
  - los desechará
  - los rechazará y los apartará
  lexicon: HALOT
  rationale: מאס expresa rechazo o desecho. «Los rechazará» conserva la fuerza judicial y de pacto del verbo, con español natural y sin añadir matices emocionales no requeridos por el hebreo.
- source_word: אֱלֹהַי
  english_pob_choice: My God
  chosen_spanish: Mi Dios
  alternatives_spanish:
  - Dios mío
  - mi Dios
  lexicon: HALOT
  rationale: El sufijo de primera persona singular debe mantenerse. «Mi Dios» reproduce la posesión del hebreo y conserva la voz profética en primera persona.
- source_word: כִּי
  english_pob_choice: because
  chosen_spanish: porque
  alternatives_spanish:
  - ya que
  - pues
  - puesto que
  lexicon: HALOT
  rationale: Aquí introduce la causa del rechazo divino. «Porque» es la conexión causal más clara y natural en español contemporáneo.
- source_word: לֹא שָׁמְעוּ ל֑וֹ
  english_pob_choice: they have not listened to him
  chosen_spanish: no le han escuchado
  alternatives_spanish:
  - no le han obedecido
  - no lo han escuchado
  lexicon: HALOT
  rationale: שׁמע con ל puede implicar obediencia, pero el verbo mantiene primero la imagen de oír/escuchar. «No le han escuchado» conserva esa metáfora y deja implícita la desobediencia, como en el texto fuente.
- source_word: וְיִהְיוּ
  english_pob_choice: and they will be
  chosen_spanish: y serán
  alternatives_spanish:
  - y estarán
  - y llegarán a ser
  lexicon: HALOT
  rationale: En esta cláusula el hebreo presenta el estado resultante. «Serán» refleja directamente el valor de יהיה sin sobretraducirlo como proceso.
- source_word: נֹדְדִים
  english_pob_choice: wanderers
  chosen_spanish: vagabundos
  alternatives_spanish:
  - errantes
  - andantes
  - nómadas
  lexicon: HALOT
  rationale: El participio denota vagar, desplazamiento sin asentamiento fijo. «Vagabundos» comunica bien la condición de errancia/exilio en español, sin restringirlo a la idea más específica de fugitivos. «Errantes» es posible, pero menos contundente.
- source_word: בַּגּוֹיִם
  english_pob_choice: among the nations
  chosen_spanish: entre las naciones
  alternatives_spanish:
  - entre los pueblos
  - en medio de las naciones
  lexicon: HALOT
  rationale: גּוֹיִם se refiere a las naciones extranjeras. «Entre las naciones» es idiomático en español y preserva la dispersión entre pueblos ajenos.
theological_decisions:
- issue: Conservar la primera persona profética «Mi Dios»
  english_pob_reading: Retain the first-person expression 'My God' as Hosea's own prophetic declaration.
  chosen_spanish_reading: Mantener «Mi Dios» como confesión profética en primera persona.
  alternative_spanish_readings:
  - Dios
  - el Dios de Israel
  rationale: El sufijo posesivo está presente en el hebreo y forma parte de la voz del profeta. Mantenerlo evita diluir el vínculo personal y de pacto que el texto expresa.
  doctrine_reference: Translation philosophy §1, §5
- issue: 'Valor de שׁמע: escuchar u obedecer'
  english_pob_reading: Use 'listened to him' in the main text.
  chosen_spanish_reading: Traducir con «no le han escuchado», dejando implícita la desobediencia.
  alternative_spanish_readings:
  - no le han obedecido
  - no han querido oírle
  rationale: El hebreo puede abarcar obediencia, pero la forma más cercana al verbo es «escuchar». Así se preserva la tensión textual sin resolverla de manera más explícita que el original.
  doctrine_reference: Translation philosophy §1, §3
translation_notes:
  revision_awareness: Se siguió la revisión final del audit trail inglés, que prefirió una formulación directa para el verbo de estado/resultante en lugar de una perífrasis más expansiva. La versión española refleja esa directitud con «serán» y conserva el resto del sentido sin añadir elementos no sustentados por el hebreo.
  spanish_consistency_notes:
  - Se mantiene «Dios» para אֱלֹהַי, no «SEÑOR», porque el texto hebreo no usa el tetragrámaton.
  - «Escuchado» conserva la metáfora auditiva del hebreo y evita sustituirla por una paráfrasis moralizante.
  - «Vagabundos» comunica bien el matiz de errancia/exilio sin introducir una connotación penal ajena al contexto.
  - El marcador de nota [a] está anclado en «rechazará» porque la nota afecta a la cláusula causal completa, especialmente al verbo de respuesta divina.
