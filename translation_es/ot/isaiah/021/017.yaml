revisions:
- from: Y el resto del número de los hombres del arco[a], los valientes de los hijos de Quedar, serán pocos, porque Yahvé, el Dios de Israel, ha hablado.
  to: Y el resto del número de los arqueros[a], los valientes de los hijos de Quedar, será poco[b], porque Yahvé, el Dios de Israel, ha hablado.
  rationale: Se cambia «los hombres del arco» por «los arqueros» para lograr un español más natural sin perder el sentido metonímico, que queda preservado en nota. Se añade la nota de lectura alternativa presente en el expediente inglés. Se ajusta «serán pocos» a «será poco» para concordar mejor con «el resto del número» en español, manteniendo el mismo sentido cuantitativo del hebreo.
