translation:
  language: es
  text: 'declarando el fin desde el principio[a], y desde tiempos antiguos las cosas que no han sido hechas, diciendo: «Mi propósito[b] permanecerá[c], y cumpliré todo lo que deseo[d]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «desde el comienzo». El hebreo literalmente dice «desde el principio».
    reason: lexical_alternative
  - marker: b
    text: O «consejo».
    reason: lexical_alternative
  - marker: c
    text: O «se mantendrá» / «será establecido».
    reason: lexical_alternative
  - marker: d
    text: O «mi voluntad» / «mi buen placer».
    reason: lexical_alternative
lexical_decisions:
- source_word: מַגִּיד
  english_pob_choice: declaring
  chosen_spanish: declarando
  alternatives_spanish:
  - haciendo saber
  - diciendo
  lexicon: HALOT
  rationale: El participio hifil de נגד expresa dar a conocer o declarar. «Declarando» conserva el estilo elevado y la continuidad participial del hebreo y del texto inglés de referencia.
- source_word: מֵרֵאשִׁית
  english_pob_choice: from the beginning
  chosen_spanish: desde el principio
  alternatives_spanish:
  - desde el comienzo
  - desde el inicio
  lexicon: HALOT
  rationale: רֵאשִׁית suele referirse al comienzo o primer momento. «Desde el principio» es natural en español y mantiene el contraste temporal con «el fin».
- source_word: אַחֲרִית
  english_pob_choice: the end
  chosen_spanish: el fin
  alternatives_spanish:
  - el final
  - el resultado
  lexicon: HALOT
  rationale: En contraste con רֵאשִׁית, aquí la lectura temporal directa es la más fuerte. «El fin» reproduce bien ese paralelismo.
- source_word: וּמִקֶּדֶם
  english_pob_choice: and from ancient times
  chosen_spanish: y desde tiempos antiguos
  alternatives_spanish:
  - y desde hace mucho
  - y desde antiguo
  lexicon: HALOT
  rationale: קֶדֶם en uso temporal apunta a tiempos antiguos o lejanos. «Desde tiempos antiguos» mantiene el paralelismo con «desde el principio» sin sonar redundante.
- source_word: אֲשֶׁר לֹא נַעֲשׂוּ
  english_pob_choice: things that have not been done
  chosen_spanish: las cosas que no han sido hechas
  alternatives_spanish:
  - las cosas que aún no han ocurrido
  - las cosas que no se han realizado
  lexicon: HALOT
  rationale: El nifal de עשה es literalmente «no han sido hechas/hecho». En contexto alude a hechos futuros no realizados todavía; la versión elegida conserva la forma más cercana al hebreo y sigue siendo natural en español.
- source_word: אֹמֵר
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - que dice
  - afirmando
  lexicon: HALOT
  rationale: El participio mantiene la autodescripción divina enlazada con «declarando». «Diciendo» preserva ese flujo verbal.
- source_word: עֲצָתִי
  english_pob_choice: My purpose
  chosen_spanish: mi propósito
  alternatives_spanish:
  - mi consejo
  - mi plan
  lexicon: HALOT
  rationale: עֵצָה puede significar consejo, plan o propósito. En este contexto de intención soberana y cumplimiento eficaz, «propósito» comunica bien el sentido sin la posible ambigüedad de «consejo» como mera recomendación.
- source_word: תָקוּם
  english_pob_choice: shall stand
  chosen_spanish: permanecerá
  alternatives_spanish:
  - será establecida
  - se mantendrá
  lexicon: HALOT
  rationale: Aquí קום expresa firmeza, perduración o establecimiento. «Permanecerá» es idiomático en español y comunica la idea de que el propósito divino no fallará.
- source_word: וְכָל חֶפְצִי
  english_pob_choice: all my good pleasure
  chosen_spanish: todo mi buen placer
  alternatives_spanish:
  - todo lo que deseo
  - toda mi voluntad
  - todo mi deleite
  lexicon: HALOT
  rationale: חֵפֶץ denota deleite, deseo o placer. La revisión inglesa añadió «good» para reflejar mejor el registro formal del término; en español, «buen placer» conserva esa decisión y la relación lexical con la benevolencia de la voluntad divina.
- source_word: אֶעֱשֶׂה
  english_pob_choice: I will accomplish
  chosen_spanish: realizaré
  alternatives_spanish:
  - haré
  - llevaré a cabo
  - cumpliré
  lexicon: HALOT
  rationale: עשה es amplio («hacer», «obrar», «realizar»). En este contexto de traer a efecto el propósito divino, «realizaré» transmite la idea de ejecución efectiva sin alejarse del rango semántico.
theological_decisions:
- issue: Cómo rendir la intención soberana de עֲצָתִי y חֶפְצִי
  english_pob_reading: My purpose shall stand, and I will accomplish all my good pleasure
  chosen_spanish_reading: Mi propósito permanecerá, y realizaré todo mi buen placer
  alternative_spanish_readings:
  - Mi consejo permanecerá, y haré toda mi voluntad
  - Mi plan permanecerá, y cumpliré todo lo que deseo
  rationale: El versículo enfatiza la previsión soberana de Dios y la eficacia de su intención. «Propósito» y «buen placer» mantienen juntos la intención y la volición divina sin imponer una formulación sistemática más estrecha que la del hebreo.
  doctrine_reference: Translation philosophy §§1, 3, 6
translation_notes:
  revision_awareness: La revisión inglesa más reciente añadió «good» antes de «pleasure» para reflejar mejor חֵפֶץ en registro formal. La versión española incorpora esa decisión con «buen placer» y conserva el resto de la formulación revisada, manteniendo la tensión lexical entre propósito, consejo, voluntad y deleite sin resolverla de forma reductiva.
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando corresponda al Tetragrámaton; en este versículo el sujeto está implícito en la primera persona divina, así que no se introduce un nombre explícito.
  - «Propósito» se prefiere aquí sobre «consejo» por claridad, pero se preserva la alternativa en nota porque el hebreo la permite y el POB inglés la documenta.
  - «Buen placer» refleja la revisión inglesa y evita traducir חֵפֶץ solo como «voluntad», que perdería el matiz de deleite/intención.
