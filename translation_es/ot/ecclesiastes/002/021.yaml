translation:
  language: es
  text: Porque hay un hombre cuyo trabajo se hace con sabiduría, con conocimiento y con habilidad[a]; sin embargo, debe dar su porción a un hombre que no ha trabajado en ello. También esto es vapor[b] y un gran mal.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «su labor». El hebreo עָמָל en Eclesiastés suele llevar el matiz de esfuerzo penoso o labor fatigosa.
    reason: lexical_alternative
  - marker: b
    text: O «También esto es vanidad». «Vapor» preserva mejor la imagen hebrea de algo pasajero e insustancial.
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  lexicon: HALOT
  rationale: La partícula introduce la explicación o desarrollo de lo dicho antes; en español, «Porque» comunica bien esa relación causal/discursiva sin forzar un valor estrictamente causal cuando el contexto es argumentativo.
- source_word: יֵשׁ אָדָם
  english_pob_choice: there is a man
  chosen_spanish: hay un hombre
  alternatives_spanish:
  - hay una persona
  - existe un hombre
  lexicon: HALOT
  rationale: La construcción existencial se vierte de modo natural con «hay». «Hombre» conserva el valor singular y concreto de אָדָם en este caso ejemplar, siguiendo la decisión de género-precisa del inglés auditado.
- source_word: עֲמָלוֹ
  english_pob_choice: his labor
  chosen_spanish: su trabajo
  alternatives_spanish:
  - su labor
  - su toil
  - su afán
  lexicon: HALOT
  rationale: עָמָל en Eclesiastés puede llevar el matiz de trabajo fatigoso. «Trabajo» es claro y natural en español; «labor» también sería posible, pero puede sonar más abstracto. Se preserva la idea de esfuerzo sin sobrecargar el texto.
- source_word: בְּחָכְמָה
  english_pob_choice: with wisdom
  chosen_spanish: con sabiduría
  alternatives_spanish:
  - en sabiduría
  - sabia mente
  lexicon: HALOT
  rationale: La preposición ב expresa modo/esfera. «Con sabiduría» mantiene la estructura triádica y suena idiomático en español.
- source_word: וּבְדַעַת
  english_pob_choice: and with knowledge
  chosen_spanish: y con conocimiento
  alternatives_spanish:
  - y con saber
  - y con entendimiento
  lexicon: HALOT
  rationale: «Conocimiento» distingue bien דַעַת de חָכְמָה y conserva el paralelismo con la serie de cualidades.
- source_word: וּבְכִשְׁרוֹן
  english_pob_choice: and with skill
  chosen_spanish: y con habilidad
  alternatives_spanish:
  - y con destreza
  - y con competencia
  - y con aptitud
  lexicon: HALOT
  rationale: כִשְׁרוֹן denota capacidad apta, destreza o habilidad exitosa. «Habilidad» es la opción más natural y mantiene la progresión sabiduría-conocimiento-habilidad.
- source_word: וּלְאָדָם שֶׁלֹּא עָמַל בּוֹ
  english_pob_choice: to a man who has not labored in it
  chosen_spanish: a un hombre que no ha trabajado en ella
  alternatives_spanish:
  - a un hombre que no se ha esforzado en ello
  - a un hombre que no ha laborado en eso
  lexicon: HALOT
  rationale: El destinatario es contrastado con quien sí trabajó. «En ella» mantiene la referencia al trabajo/resultado sin explicitar más de lo que el hebreo exige; el antecedente implícito en español se entiende como la labor o la obra producida.
- source_word: יִתְּנֶנּוּ
  english_pob_choice: he must give
  chosen_spanish: debe dar
  alternatives_spanish:
  - tendrá que dar
  - dará
  lexicon: HALOT
  rationale: El imperfecto expresa aquí una inevitabilidad amarga. «Debe dar» comunica esa necesidad/obligación contextual mejor que un simple futuro.
- source_word: חֶלְקוֹ
  english_pob_choice: his portion
  chosen_spanish: su porción
  alternatives_spanish:
  - su parte
  - su lote
  lexicon: HALOT
  rationale: «Porción» conserva el sentido de lo asignado o repartido y corresponde bien al campo semántico de חֵלֶק en Eclesiastés.
- source_word: גַּם זֶה הֶבֶל
  english_pob_choice: This also is vapor
  chosen_spanish: También esto es vapor
  alternatives_spanish:
  - Esto también es vapor
  - También esto es vanidad
  lexicon: HALOT
  rationale: Se conserva la imagen concreta de הֶבֶל como algo pasajero e insubstancial. «Vapor» sigue el criterio del POB en inglés y evita la lectura moralizante estrecha de «vanidad».
- source_word: וְרָעָה רַבָּה
  english_pob_choice: and a great evil
  chosen_spanish: y un gran mal
  alternatives_spanish:
  - y un gran maldad
  - y una gran calamidad
  - y un grave mal
  lexicon: HALOT
  rationale: רָעָה puede abarcar maldad, mal o calamidad. «Un gran mal» mantiene el peso valorativo sin cerrar indebidamente la amplitud del término.
theological_decisions:
- issue: Renderización de הֶבֶל
  english_pob_reading: vapor
  chosen_spanish_reading: vapor
  alternative_spanish_readings:
  - vanidad
  - flecosidad / fugacidad
  rationale: Se conserva la metáfora material de algo transitorio e insustancial. Esto mantiene la tensión literaria de Eclesiastés y evita reducir el término a una sola noción moral como «vanidad».
  doctrine_reference: Translation philosophy §1, §3, §5
- issue: Valor de אָדָם en singular
  english_pob_reading: man
  chosen_spanish_reading: hombre
  alternative_spanish_readings:
  - persona
  - ser humano
  rationale: El versículo presenta un caso individual en singular. «Hombre» mantiene la precisión del original y la decisión de no neutralizar innecesariamente el referente.
  doctrine_reference: 'Translation philosophy §4; Contested terms table: אָדָם'
translation_notes:
  revision_awareness: La redacción sigue el texto hebreo masorético (WLC) y el audit trail inglés sin cambios textuales posteriores relevantes; se mantiene la lectura de הֶבֶל como «vapor» y de אָדָם como singular masculino genérico en este caso concreto.
  spanish_consistency_notes:
  - 'Se conserva la tríada de medios de trabajo: sabiduría, conocimiento y habilidad.'
  - Se mantiene el contraste entre el que trabajó y el que recibe la porción.
  - «Vapor» se usa de manera consistente para הֶבֶל en coherencia con el proyecto POB.
  - Se evita «Señor» u այլ masking para no introducir terminología no presente en este versículo.
