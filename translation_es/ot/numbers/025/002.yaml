translation:
  language: es
  text: Y ellas invitaron al pueblo a los sacrificios de sus dioses, y el pueblo comió y se postró[a] ante sus dioses.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: "adoró a sus dioses". El verbo hebreo se refiere literalmente a postrarse, a menudo como acto de culto.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַתִּקְרֶאןָ
  english_pob_choice: they invited
  chosen_spanish: las invitaron
  alternatives_spanish:
  - las llamaron
  - las convocaron
  lexicon: HALOT
  rationale: El verbo con לְ más personas en este contexto significa invitar a alguien a participar en una ocasión. En español, 'invitaron' comunica con naturalidad la acción de atraer al pueblo a la comida/sacrificio, manteniendo el sentido contextual.
- source_word: לָעָם
  english_pob_choice: the people
  chosen_spanish: el pueblo
  alternatives_spanish:
  - la gente
  - el pueblo de Israel
  lexicon: HALOT
  rationale: '''El pueblo'' conserva el colectivo hebreo עָם sin añadir explícitamente ''Israel'', que el verso no repite. Es claro en español y respeta el alcance del texto.'
- source_word: לְזִבְחֵי אֱלֹהֵיהֶן
  english_pob_choice: to the sacrifices of their gods
  chosen_spanish: a los sacrificios de sus dioses
  alternatives_spanish:
  - para los sacrificios de sus dioses
  - a los banquetes sacrificiales de sus dioses
  lexicon: HALOT
  rationale: La construcción nominal hebrea se conserva bien con 'a los sacrificios de sus dioses'. 'Sacrificios' mantiene la relación con זִבְחֵי, y 'sus dioses' refleja el sufijo femenino plural sin suavizar la referencia idolátrica.
- source_word: וַיֹּאכַל
  english_pob_choice: ate
  chosen_spanish: comió
  alternatives_spanish:
  - participó
  - comieron
  lexicon: HALOT
  rationale: El verbo simple de comer se expresa de forma directa con 'comió'. Aunque el sustantivo colectivo es singular en hebreo, en español el sujeto colectivo 'el pueblo' permite el verbo en singular sin perder claridad narrativa.
- source_word: וַיִּשְׁתַּחֲוּוּ
  english_pob_choice: bowed down
  chosen_spanish: se postró
  alternatives_spanish:
  - se inclinó
  - adoró
  lexicon: HALOT
  rationale: '''Se postró'' conserva el gesto físico de inclinarse/prosternarse que el POB inglés preserva con ''bowed down''. ''Adoró'' sería más interpretativo; ''se postró'' deja visible la acción corporal y su carga cultual.'
- source_word: לֵאלֹהֵיהֶן
  english_pob_choice: to their gods
  chosen_spanish: ante sus dioses
  alternatives_spanish:
  - a sus dioses
  - para sus dioses
  lexicon: HALOT
  rationale: La preposición לְ con השתחוה puede marcar el objeto de la reverencia. 'Ante sus dioses' comunica en español la orientación del acto de postración sin forzar una frase menos natural, manteniendo la referencia idolátrica.
theological_decisions:
- issue: Conservar la tensión entre el gesto corporal y la adoración idolátrica
  english_pob_reading: bowed down to their gods
  chosen_spanish_reading: se postró ante sus dioses
  alternative_spanish_readings:
  - adoró a sus dioses
  - se inclinó ante sus dioses
  rationale: La redacción mantiene el acto físico explícito, como en el inglés POB, y deja que el contexto revele la idolatría. 'Adoró' interpretaría demasiado pronto; 'se inclinó' puede sonar menos fuerte que la postración ritual.
  doctrine_reference: Translation philosophy §3, §6
translation_notes:
  revision_awareness: El antecedente inglés fue revisado y mantenido sin cambios en el último pase; la presente propuesta sigue esa lectura de alta concordancia, conservando la distinción entre la invitación a los sacrificios y el gesto de postración idolátrica.
  spanish_consistency_notes:
  - Se usa 'Yahvé' solo cuando el texto hebreo contiene el nombre divino; este versículo no lo contiene.
  - '''Dioses'' conserva el plural posesivo del hebreo ''sus dioses'', sin normalizarlo a singular.'
  - '''Se postró'' mantiene el valor físico-cultual de השתחוה, alineado con la nota alternativa del POB inglés.'
