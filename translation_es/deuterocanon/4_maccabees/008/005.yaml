revisions:
- from: ¡Jóvenes[a]!, yo admiro cordialmente la hermosura de cada uno de ustedes, y, valorando tan altamente este gran número de hermanos, no solo les exhorto a no dejarse llevar por la misma locura que el anciano que ya ha sido torturado, sino también—
  to: ¡Jóvenes[a], yo admiro cordialmente la hermosura de cada uno de ustedes, y, valorando tan altamente este gran número de hermanos, no solo les exhorto a no ser arrastrados a la misma locura que el anciano que ya ha sido torturado, sino también—
  rationale: Se ajustó la puntuación del vocativo para que suene natural en español. Se reemplazó «dejarse llevar» por «ser arrastrados a la misma locura» para reflejar mejor el matiz pasivo señalado por la auditoría inglesa y conservar con más fuerza la repetición retórica entre «enloquecer/locura» presente en el griego, sin perder claridad ni dignidad estilística.
