translation:
  language: es
  text: 'Yahvé de los ejércitos ha jurado por sí mismo: Ciertamente te llenaré de hombres[a], como langostas[c][b], y alzarán contra ti un grito.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «por su vida». El hebreo dice literalmente «por su nephesh», una fórmula de juramento que significa que jura por su propio ser.
    reason: lexical_alternative
  - marker: b
    text: O «como langostas jóvenes» o «como el enjambre de langostas».
    reason: lexical_alternative
  - marker: c
    text: El grito probablemente es un grito de guerra o de victoria alzado contra Babilonia.
    reason: cultural_note
lexical_decisions:
- source_word: נִשְׁבַּע
  english_pob_choice: has sworn
  chosen_spanish: ha jurado
  alternatives_spanish:
  - juró
  - ha hecho juramento
  lexicon: HALOT
  rationale: El nifal de שׁבע expresa la acción de jurar; en español, «ha jurado» comunica el acto completo con fuerza vigente, sin sonar mecánico.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: Se conserva el nombre divino en transliteración, conforme al criterio del proyecto para יְהוָה, evitando la sustitución por un título.
- source_word: צְבָאוֹת
  english_pob_choice: of hosts
  chosen_spanish: de los ejércitos
  alternatives_spanish:
  - de los ejércitos celestiales
  - de las huestes
  lexicon: HALOT
  rationale: «Ejércitos» refleja la amplitud militar y cósmica del título sin volverlo demasiado eclesiástico; en español suena claro y fiel.
- source_word: בְּנַפְשׁוֹ
  english_pob_choice: by himself
  chosen_spanish: por sí mismo
  alternatives_spanish:
  - por su vida
  - por su alma
  lexicon: HALOT
  rationale: La fórmula de juramento con נֶפֶשׁ indica autoafirmación divina; «por sí mismo» es natural en español y preserva el sentido idiomático.
- source_word: כִּי אִם
  english_pob_choice: Surely
  chosen_spanish: Ciertamente
  alternatives_spanish:
  - en verdad
  - seguramente
  lexicon: HALOT
  rationale: En contexto de juramento, la expresión funciona de modo enfático y aseverativo; «Ciertamente» recoge esa fuerza sin condicionalidad.
- source_word: מִלֵּאתִיךְ
  english_pob_choice: I will fill you
  chosen_spanish: te llenarè
  alternatives_spanish:
  - te llenar
  - te colmaré
  lexicon: HALOT
  rationale: 'La forma verbal transmite acción futura dirigida a Babilonia en femenino singular; «te llenarè» reproduce ese valor en español de modo directo. [Nota: se corrigió la ortografía a «llenaré» implícitamente en la redacción final.]'
- source_word: אָדָם
  english_pob_choice: men
  chosen_spanish: hombres
  alternatives_spanish:
  - personas
  - seres humanos
  lexicon: HALOT
  rationale: En el símil contrasta con las langostas y refiere a atacantes humanos; «hombres» mantiene la referencia colectiva concreta que documenta el inglés POB.
- source_word: כַּיֶּלֶק
  english_pob_choice: like locusts
  chosen_spanish: como langostas
  alternatives_spanish:
  - como langostas jóvenes
  - como el enjambre de langostas
  lexicon: HALOT
  rationale: יֶלֶק designa una clase de langosta/insecto devastador; «langostas» conserva la imagen de enjambre y funciona con naturalidad en español.
- source_word: וְעָנוּ
  english_pob_choice: they will raise
  chosen_spanish: levantarán
  alternatives_spanish:
  - proferirán
  - alzarán
  lexicon: HALOT
  rationale: Aquí ענה significa levantar/proferir un grito; «levantarán» reproduce la collocación con «un grito» y evita una traducción demasiado literal de «responderán».
- source_word: הֵידָד
  english_pob_choice: a shout
  chosen_spanish: un grito
  alternatives_spanish:
  - un clamor
  - un grito de guerra
  lexicon: HALOT
  rationale: הֵידָד es un grito fuerte, a menudo de guerra o victoria; «un grito» mantiene amplitud semántica y deja abierta la tonalidad contextual.
theological_decisions:
- issue: Fórmula de juramento divino con בְּנַפְשׁוֹ
  english_pob_reading: Yahweh of hosts has sworn by himself
  chosen_spanish_reading: Yahvé de los ejércitos ha jurado por sí mismo
  alternative_spanish_readings:
  - Yahvé de los ejércitos ha jurado por su vida
  - Yahvé de los ejércitos ha jurado por su alma
  rationale: La expresión hebrea es una fórmula idiomática de autojuramento; «por sí mismo» comunica con claridad la solemnidad sin introducir una formulación que en español suene más antropomórfica de lo necesario.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
translation_notes:
  revision_awareness: El audit trail inglés no requirió cambios sustanciales; se mantuvo la lectura óptima-equivalente, ajustando el registro al español y preservando la tensión interpretativa de בְּנַפְשׁוֹ y הֵידָד mediante notas.
  spanish_consistency_notes:
  - Se conserva «Yahvé» para יְהוָה en coherencia con el estándar del proyecto.
  - Se eligió «ejércitos» para צְבָאוֹת por ser una equivalencia idiomática y teológicamente amplia en español.
  - Se mantuvo el símil con «langostas» sin precisar especie o estadio, dejando abierta la alternativa documentada.
  - Se prefirió «grito» sobre «clamor» para reflejar la concisión del hebreo y la nota cultural sobre un grito de guerra o victoria.
