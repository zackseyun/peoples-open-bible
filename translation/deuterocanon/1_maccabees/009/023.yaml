translation:
  text: And it happened that after the death of Judas[a], the lawless emerged in all the territories of Israel[b], and all those who worked unrighteousness sprang up.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the lawless' rather than 'the lawless men'; the Greek masculine plural can function substantivally.
    reason: lexical_alternative
  - marker: b
    text: Or 'those who worked injustice.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐγένετο
  chosen: it happened
  alternatives:
  - it came to pass
  - it was
  lexicon: BDAG
  rationale: Common narrative formula; 'it happened' preserves the idiomatic transition without archaic English.
- source_word: τελευτήν
  chosen: death
  alternatives:
  - end
  lexicon: LSJ
  rationale: In this context the noun refers to Judas's death, not merely his 'end' in an abstract sense; 'death' is the plain English sense.
- source_word: ἐξέκυψαν
  chosen: emerged
  alternatives:
  - appeared
  - sprang up
  - came forth
  lexicon: LSJ
  rationale: The verb literally suggests coming out or appearing suddenly. 'Emerged' captures the sense of becoming openly visible after Judas's death, while avoiding over-idiomatic English.
- source_word: οἱ ἄνομοι
  chosen: the lawless men
  alternatives:
  - the lawless
  - the wicked
  lexicon: LSJ
  rationale: ἄνομοι denotes those characterized by lawlessness. 'The lawless men' preserves the substantival force and the masculine plural form; 'the wicked' would be more interpretive and less tied to νόμος language.
- source_word: ὁρίοις
  chosen: territories
  alternatives:
  - borders
  - regions
  - districts
  lexicon: LSJ
  rationale: The phrase refers to the various areas within Israel rather than boundary lines alone. 'Territories' communicates geographic extent better than the more literal but potentially misleading 'borders.'
- source_word: ἀνέτειλαν
  chosen: sprang up
  alternatives:
  - arose
  - appeared
  - came up
  lexicon: LSJ
  rationale: The verb literally means 'rose' or 'sprang up,' often of growth or dawning. Here it metaphorically parallels the spread of evildoers; 'sprang up' preserves the vivid image.
- source_word: οἱ ἐργαζόμενοι τὴν ἀδικίαν
  chosen: those who practiced unrighteousness
  alternatives:
  - those who worked injustice
  - evildoers
  - those who did wrong
  lexicon: BDAG
  rationale: The participial phrase emphasizes ongoing activity. 'Practiced unrighteousness' preserves both the durative sense of ἐργάζομαι and the moral weight of ἀδικία. 'Worked injustice' is more literal but less natural in English.
- source_word: ἀδικίαν
  chosen: unrighteousness
  alternatives:
  - injustice
  - wrongdoing
  lexicon: BDAG
  rationale: Both 'unrighteousness' and 'injustice' are possible. Here the phrase characterizes moral evil broadly rather than a specific judicial wrong, so 'unrighteousness' best fits, while the alternative remains viable.
