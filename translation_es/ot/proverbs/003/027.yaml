translation:
  language: es
  text: No retengas el bien de quienes tienen derecho a él[a], cuando está en tu mano[b] hacerlo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «de sus dueños»; el hebreo también puede entenderse en sentido posesivo o de reclamo legítimo.'
    reason: alternative_reading
  - marker: b
    text: 'Lit.: «cuando está en el poder de tu mano hacerlo»; el hebreo usa «mano» como imagen de capacidad o poder.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אַל תִּמְנַע
  english_pob_choice: Do not withhold
  chosen_spanish: No retengas
  alternatives_spanish:
  - No niegues
  - No te abstengas de dar
  - No guardes
  lexicon: HALOT
  rationale: תִּמְנַע expresa la idea de impedir, retener o no dejar salir algo debido; en español, 'retener' comunica con naturalidad el acto de no entregar lo que debe darse, manteniendo el tono prohibitivo del hebreo.
- source_word: טוֹב
  english_pob_choice: good
  chosen_spanish: el bien
  alternatives_spanish:
  - el bien
  - algo bueno
  - bondad
  lexicon: HALOT
  rationale: טוֹב es deliberadamente amplio; 'el bien' preserva esa amplitud moral y práctica mejor que restringirlo a 'bondad' o a un bien concreto.
- source_word: מִבְּעָלָיו
  english_pob_choice: from those to whom it is due
  chosen_spanish: de quienes tienen derecho a él
  alternatives_spanish:
  - de sus dueños
  - de quienes lo poseen
  - de quienes les corresponde
  lexicon: HALOT
  rationale: בְּעָלָיו puede señalar posesión o reclamación legítima. La revisión inglesa optó por el sentido idiomático de 'aquellos a quienes corresponde'; en español, 'quienes tienen derecho a él' expresa esa reclamación legítima sin perder la tensión entre posesión y deber.
- source_word: בִּהְיוֹת
  english_pob_choice: when it is
  chosen_spanish: cuando está
  alternatives_spanish:
  - cuando sea
  - mientras esté
  lexicon: HALOT
  rationale: El infinitivo constructo con בִּ transmite circunstancia temporal; 'cuando está' suena natural en español y conserva la condición temporal.
- source_word: לְאֵל יָדֶךָ
  english_pob_choice: in your power
  chosen_spanish: en tu mano
  alternatives_spanish:
  - a tu alcance
  - en tu poder
  - si puedes hacerlo
  lexicon: HALOT
  rationale: La expresión idiomática hebrea literalmente alude a la mano como capacidad o control. 'En tu mano' preserva la imagen original, mientras que la nota permite la lectura idiomática de capacidad.
- source_word: לַעֲשׂוֹת
  english_pob_choice: to do it
  chosen_spanish: hacerlo
  alternatives_spanish:
  - hacer
  - obrar
  lexicon: HALOT
  rationale: עָשָׂה es un verbo general de hacer/actuar; 'hacerlo' completa naturalmente la cláusula en español y refleja el objeto implícito del contexto.
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión inglesa más reciente, que reemplazó 'its owners' por 'those to whom it is due' para reflejar el sentido idiomático de בְּעָלָיו. La redacción española sigue esa decisión interpretativa, pero mantiene una nota que deja visible la alternativa posesiva más literal del hebreo.
  spanish_consistency_notes:
  - Se usó 'Yahvé' como término por defecto cuando corresponde, pero este versículo no contiene el nombre divino.
  - Se prefirió 'el bien' frente a una especificación más estrecha para conservar la amplitud semántica de טוֹב.
  - Se mantuvo la imagen de la mano en la nota para no borrar la metáfora corporal del hebreo.
  - La formulación principal evita un calco pesado y busca ser publicable en español neutro y bíblico.
