translation:
  language: es
  text: Entonces se vieron los canales de las aguas[a], y quedaron al descubierto los cimientos del mundo[b], por tu reprensión, oh Yahvé, por el aliento impetuoso de tus narices[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «los lechos de los ríos» o «los cauces de las aguas».
    reason: lexical_alternative
  - marker: b
    text: O «los cimientos de la tierra».
    reason: lexical_alternative
  - marker: c
    text: 'Hebreo literalmente: «del aliento del viento/espíritu de tus narices»; la expresión presenta de manera vívida y antropomórfica la fuerza del aliento de Yahvé.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֵּרָאוּ
  english_pob_choice: were seen
  chosen_spanish: se vieron
  alternatives_spanish:
  - aparecieron
  - fueron vistos
  lexicon: HALOT
  rationale: El nifal narrativo expresa una percepción/manifestación pasiva. «Se vieron» conserva la idea de que los cauces quedaron a la vista sin añadir un sujeto distinto ni volver la frase demasiado mecánica.
- source_word: אֲפִיקֵי מַיִם
  english_pob_choice: the channels of the waters
  chosen_spanish: los canales de las aguas
  alternatives_spanish:
  - los cauces de las aguas
  - los lechos de las aguas
  - los cauces del agua
  lexicon: HALOT
  rationale: אֲפִיקִים puede referirse a canales, cauces o lechos. «Canales» comunica bien la imagen poética y sigue de cerca la formulación inglesa, mientras «aguas» mantiene el plural hebreo y el paralelismo del verso.
- source_word: וַיִּגָּלוּ
  english_pob_choice: were laid bare
  chosen_spanish: quedaron al descubierto
  alternatives_spanish:
  - fueron descubiertos
  - fueron desnudados
  - quedaron revelados
  lexicon: HALOT
  rationale: El nifal de גלה implica exposición o desvelamiento. «Quedaron al descubierto» reproduce el efecto de desocultamiento fuerte y es idiomático en español, sin suavizar la imagen cósmica.
- source_word: מוֹסְדוֹת תֵּבֵל
  english_pob_choice: the foundations of the world
  chosen_spanish: los cimientos del mundo
  alternatives_spanish:
  - los fundamentos del mundo
  - los cimientos de la tierra
  - los fundamentos de la tierra
  lexicon: HALOT
  rationale: מוֹסְדוֹת son cimientos/fundamentos. «Cimientos» es natural y concreto en español; «mundo» conserva תֵּבֵל como el orden habitado o el mundo en su totalidad, tal como en la línea inglesa.
- source_word: מִגַּעֲרָתְךָ
  english_pob_choice: at your rebuke
  chosen_spanish: por tu reprensión
  alternatives_spanish:
  - ante tu reprensión
  - a causa de tu reprensión
  - por tu amonestación
  lexicon: HALOT
  rationale: La preposición מִן puede marcar causa u origen. «Por tu reprensión» expresa naturalmente la causalidad en español poético y corresponde al valor interpretado en la traducción inglesa.
- source_word: יְהוָה
  english_pob_choice: O Yahweh
  chosen_spanish: oh Yahvé
  alternatives_spanish:
  - oh Yahweh
  - oh el SEÑOR
  lexicon: HALOT
  rationale: Se preserva el nombre divino con la forma de proyecto «Yahvé», conforme a la terminología española base. El vocativo «oh» mantiene el tono de invocación del hebreo y del inglés auditado.
- source_word: מִנִּשְׁמַת רוּחַ אַפֶּךָ
  english_pob_choice: at the blast of the breath of your nostrils
  chosen_spanish: por el soplo de la respiración de tus narices
  alternatives_spanish:
  - por el aliento de la respiración de tus narices
  - por el soplo del viento de tus narices
  - al soplo de la respiración de tus narices
  lexicon: HALOT
  rationale: El hebreo acumula imágenes de soplo/aliento/viento y nariz/nostril para un cuadro antropomórfico de gran fuerza. «Soplo de la respiración» preserva נִשְׁמָה y רוּחַ como intensificación de aliento; «narices» mantiene אַף en sentido literal, aunque suene más crudo, porque el texto quiere conservar esa corporeidad.
theological_decisions:
- issue: El nombre divino YHWH en español
  english_pob_reading: O Yahweh
  chosen_spanish_reading: oh Yahvé
  alternative_spanish_readings:
  - oh Yahweh
  - el SEÑOR
  rationale: La base doctrinal del proyecto evita la sustitución por un título y conserva el nombre propio del pacto. En español, «Yahvé» es la forma normalizada del proyecto; se mantiene en el vocativo para no perder la referencia directa al Tetragrámaton.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Imagen antropomórfica del aliento divino
  english_pob_reading: the blast of the breath of your nostrils
  chosen_spanish_reading: el soplo de la respiración de tus narices
  alternative_spanish_readings:
  - el aliento de la respiración de tus narices
  - el soplo del viento de tus narices
  rationale: La frase hebrea conserva deliberadamente una imagen corporal intensa. Se mantiene la tensión antropomórfica en español, en vez de suavizarla a «ira» o «poder», porque el verso asocia la intervención de Yahvé con una exhalación violenta y visible.
  doctrine_reference: POB lexical note on anthropomorphic divine imagery in Psalm 18:16
translation_notes:
  revision_awareness: 'El pasaje coincide en alto grado con el audit trail inglés revisado: se mantienen la pasividad de «were seen», la exposición de los cimientos, la causalidad de la reprensión divina y la imagen antropomórfica final. No se detectaron revisiones aplicadas en la fuente inglesa reciente, por lo que esta propuesta sigue su lectura estable sin introducir nuevas decisiones textuales.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como forma estándar del nombre divino en el texto principal.
  - 'Se conserva el paralelismo poético del hebreo con dos cola: visibilización de las aguas y descubrimiento de los cimientos.'
  - «Canales» y «cimientos» son términos comprensibles y solemnes en español bíblico moderno.
  - La segunda mitad del verso conserva la crudeza imagística del hebreo sin interpretarla como simple ira, para no borrar la metáfora corporal documentada.
