translation:
  language: es
  text: Por tanto, escuchen, reyes, y comprendan; aprendan, jueces de los confines de la tierra.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: Ἀκούσατε
  english_pob_choice: listen
  chosen_spanish: oigan
  alternatives_spanish:
  - escuchen
  - oigan atentamente
  lexicon: BDAG
  rationale: El imperativo plural de ἀκούω pide un llamado a prestar atención. En español, «oigan» conserva el matiz de atención auditiva y funciona bien en una exhortación directa; «escuchen» también sería posible, pero «oigan» se acerca más al valor básico del verbo sin sonar forzado.
- source_word: οὖν
  english_pob_choice: therefore
  chosen_spanish: Por tanto
  alternatives_spanish:
  - Entonces
  - Así que
  lexicon: BDAG
  rationale: El conector expresa consecuencia o inferencia respecto del contexto anterior. «Por tanto» preserva con claridad la relación lógica y mantiene un registro digno.
- source_word: βασιλεῖς
  english_pob_choice: kings
  chosen_spanish: reyes
  alternatives_spanish:
  - monarcas
  - soberanos
  lexicon: BDAG
  rationale: El término designa específicamente a reyes. «Reyes» es la equivalencia directa y transparente en español.
- source_word: σύνετε
  english_pob_choice: understand
  chosen_spanish: comprendan
  alternatives_spanish:
  - entiendan
  - perciban
  lexicon: BDAG
  rationale: El imperativo de συνίημι aquí pide captar el sentido con discernimiento. «Comprendan» comunica bien la exhortación intelectual y combina naturalmente con el paralelismo de «aprendan».
- source_word: μάθετε
  english_pob_choice: learn
  chosen_spanish: aprendan
  alternatives_spanish:
  - reciban instrucción
  - tomen enseñanza
  lexicon: BDAG
  rationale: μανθάνω expresa aprender o recibir instrucción. «Aprendan» es la forma más directa y natural en español, sin añadir explicaciones ausentes del griego.
- source_word: δικασταί
  english_pob_choice: judges
  chosen_spanish: jueces
  alternatives_spanish:
  - magistrados
  - árbitros
  lexicon: BDAG
  rationale: El sustantivo señala a quienes juzgan. «Jueces» conserva la función judicial con máxima transparencia; términos más amplios borrarían esa precisión.
- source_word: περάτων γῆς
  english_pob_choice: of the ends of the earth
  chosen_spanish: de los confines de la tierra
  alternatives_spanish:
  - de los extremos de la tierra
  - de los últimos rincones de la tierra
  lexicon: BDAG
  rationale: La expresión es idiomática y de alcance universal. «Los confines de la tierra» mantiene el giro bíblico y comunica la amplitud del destinatario sin volverlo explicativo en exceso.
translation_notes:
  revision_awareness: La base griega coincide plenamente con el testimonio auditado; no hay variantes textuales ni revisiones aplicadas en el pasaje. La traducción sigue la formulación inferencial de οὖν y conserva la dirección solemne del discurso.
  spanish_consistency_notes:
  - Se mantuvo un registro bíblico sobrio y contemporáneo.
  - Se prefirió un español claro y directo sin sustituir los términos judiciales específicos por vocabulario más general.
  - La frase final conserva la idiomaticidad bíblica de «los confines de la tierra» para reflejar el alcance universal del llamado.
