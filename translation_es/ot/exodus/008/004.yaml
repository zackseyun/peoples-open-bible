  yaml_path: translation/ot/exodus/008/004.yaml
  text: Then Pharaoh called for Moses and Aaron and said[a], “Pray to Yahweh, that he may remove the frogs from me and from my people, and I will let the people go[b], so that they may sacrifice to Yahweh.”
  footnotes:
