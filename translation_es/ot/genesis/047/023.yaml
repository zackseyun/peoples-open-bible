  text: וַ/יֹּ֤אמֶר יוֹסֵף֙ אֶל הָ/עָ֔ם הֵן֩ קָנִ֨יתִי אֶתְ/כֶ֥ם הַ/יּ֛וֹם וְ/אֶת אַדְמַתְ/כֶ֖ם לְ/פַרְעֹ֑ה הֵֽא לָ/כֶ֣ם זֶ֔רַע וּ/זְרַעְתֶּ֖ם אֶת הָ/אֲדָמָֽה־־־־׃
