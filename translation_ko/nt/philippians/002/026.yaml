id: PHP.2.26
reference: Philippians 2:26
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: ἐπειδὴ ἐπιποθῶν ἦν πάντας ⸀ὑμᾶς, καὶ ἀδημονῶν διότι ἠκούσατε ὅτι ἠσθένησεν.
base_translation:
  language: en
  yaml_path: translation/nt/philippians/002/026.yaml
  text: since he was longing for all of you and was deeply distressed because you heard that he was sick.
translation:
  language: ko
  text: 그는 여러분 모두를 사모하고 있었으며, 자기가 병들었다는 소식을 여러분이 들었다는 사실 때문에 깊이 괴로워하고 있었기 때문입니다[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 또는 「여러분이 자기가 병들었다는 소식을 들었다는 것 때문에」.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐπειδὴ
  english_pob_choice: since
  chosen_korean: ~ 때문입니다
  alternatives_korean:
  - 왜냐하면
  - 그러한 까닭으로
  lexicon: BDAG
  rationale: 에바브로디도를 돌려보내는 이유를 도입한다. 한국어 「~때문입니다」가 합쇼체에 자연스럽다.
- source_word: ἐπιποθῶν ἦν
  english_pob_choice: he was longing
  chosen_korean: 사모하고 있다
  alternatives_korean:
  - 그리워하고 있다
  - 간절히 보고 싶어 하다
  lexicon: BDAG
  rationale: 현재 분사 + εἰμί 미완료의 우회 구문이 과거 진행 상태를 표시한다. 한국어 진행적 「~고 있었다」가 그 아스펙트를 자연스럽게 담는다.
- source_word: πάντας ὑμᾶς
  english_pob_choice: all of you
  chosen_korean: 여러분 모두
  alternatives_korean:
  - 여러분 전부
  lexicon: BDAG
  rationale: 분배적 강조의 πάντας를 보존한다.
- source_word: ἀδημονῶν
  english_pob_choice: was deeply distressed
  chosen_korean: 깊이 괴로워하다
  alternatives_korean:
  - 심히 괴로워하다
  - 번민하다
  - 마음 졸이다
  lexicon: BDAG
  rationale: 강한 감정적 고통을 표시하는 어휘. 「깊이 괴로워하다」가 그 무게를 자연스럽게 담는다.
- source_word: διότι
  english_pob_choice: because
  chosen_korean: ~ 때문에
  alternatives_korean:
  - ~이기에
  - 왜냐하면
  lexicon: BDAG
  rationale: 단순한 인과 접속사. 한국어 「때문에」가 자연스럽다.
- source_word: ἠκούσατε
  english_pob_choice: you heard
  chosen_korean: 들었다
  alternatives_korean:
  - 듣게 되었다
  - 소식을 받았다
  lexicon: BDAG
  rationale: 부정과거. 한국어 단순 과거 「들었다」가 직접적이고 자연스럽다.
- source_word: ὅτι ἠσθένησεν
  english_pob_choice: that he was sick
  chosen_korean: 자기가 병들었다는 소식
  alternatives_korean:
  - 그가 병이 들었다는 것
  - 그가 앓고 있다는 것
  lexicon: BDAG
  rationale: 한국어 자연 흐름에서 「~다는 소식」으로 풀어 옮겨, 들음의 대상을 명료하게 한다.
