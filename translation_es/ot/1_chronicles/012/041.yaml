translation:
  language: es
  text: 'También los que estaban cerca de ellos[a], hasta[b] Isacar, Zabulón y Neftalí, traían alimento en asnos, camellos, mulas y ganado: provisiones de harina, tortas de higos, tortas de pasas[c], vino, aceite, ganado y ovejas en abundancia, porque había alegría en Israel.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El hebreo לֶחֶם significa literalmente 'pan', pero aquí introduce una lista más amplia de provisiones; por eso se traduce 'alimento' en el texto principal.
    reason: lexical_alternative
  - marker: b
    text: O 'incluso hasta Isacar, Zabulón y Neftalí'. La frase marca el alcance geográfico de quienes traían provisiones.
    reason: alternative_reading
  - marker: c
    text: El hebreo צִמּוּקִים puede traducirse 'pasas' o 'uvas secas'; 'tortas de pasas' sigue el sentido de alimento preparado y compactado que encaja con la lista del verso.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְגַם
  english_pob_choice: Also
  chosen_spanish: También
  alternatives_spanish:
  - Además
  - Y también
  lexicon: HALOT
  rationale: Conserva el valor aditivo de la partícula y suena natural en español al enlazar con el versículo anterior.
- source_word: הַקְּרֹבִים אֲלֵיהֶם
  english_pob_choice: those near them
  chosen_spanish: los que estaban cerca de ellos
  alternatives_spanish:
  - sus vecinos
  - los cercanos a ellos
  lexicon: HALOT
  rationale: Responde al sentido relacional de 'los que estaban cerca de ellos' sin forzar una identificación social más precisa que el hebreo no exige.
- source_word: עַד יִשָׂשכָר וּזְבֻלוּן וְנַפְתָּלִי
  english_pob_choice: as far as Issachar and Zebulun and Naphtali
  chosen_spanish: hasta Isacar, Zabulón y Neftalí
  alternatives_spanish:
  - incluso hasta Isacar, Zabulón y Neftalí
  - hasta llegar a Isacar, Zabulón y Neftalí
  lexicon: HALOT
  rationale: '''Hasta'' expresa bien el alcance geográfico del hebreo עַד. Se mantiene la referencia tribal sin ampliarla con matices no requeridos.'
- source_word: מְבִיאִים
  english_pob_choice: were bringing
  chosen_spanish: traían
  alternatives_spanish:
  - estaban trayendo
  - llevaban
  lexicon: HALOT
  rationale: El participio narrativo expresa acción repetida o en curso; 'traían' es una forma natural en español que conserva esa continuidad.
- source_word: לֶחֶם
  english_pob_choice: food
  chosen_spanish: alimento
  alternatives_spanish:
  - comida
  - pan
  lexicon: HALOT
  rationale: Aunque literalmente es 'pan', aquí introduce una lista amplia de provisiones; 'alimento' preserva el sentido general sin restringirlo.
- source_word: בַּחֲמוֹרִים וּבַגְּמַלִּים וּבַפְּרָדִים וּבַבָּקָר
  english_pob_choice: on donkeys, camels, mules, and cattle
  chosen_spanish: sobre asnos, camellos, mulas y ganado
  alternatives_spanish:
  - en asnos, camellos, mulas y ganado
  - sobre burros, camellos, mulas y ganado
  lexicon: HALOT
  rationale: '''Sobre'' refleja el medio de transporte en español y evita una lectura demasiado literal de preposición. ''Ganado'' reproduce la idea de animales de carga/traslado asociada al término en este contexto.'
- source_word: מַאֲכָל
  english_pob_choice: provisions
  chosen_spanish: provisiones
  alternatives_spanish:
  - suministros
  - comida
  lexicon: HALOT
  rationale: Introduce la lista detallada de alimentos y encaja con el contexto logístico de abastecimiento masivo.
- source_word: קֶמַח
  english_pob_choice: flour
  chosen_spanish: harina
  alternatives_spanish:
  - harina fina
  - meal
  lexicon: HALOT
  rationale: Es la equivalencia normal y clara para el producto molido de grano en esta enumeración.
- source_word: דְּבֵלִים
  english_pob_choice: fig cakes
  chosen_spanish: tortas de higos
  alternatives_spanish:
  - higos prensados
  - pasteles de higos
  lexicon: HALOT
  rationale: Mantiene la idea de higos preparados y compactados para transporte; 'tortas de higos' es inteligible y fiel.
- source_word: וְצִמּוּקִים
  english_pob_choice: raisin cakes
  chosen_spanish: tortas de pasas
  alternatives_spanish:
  - pasas
  - uvas secas
  lexicon: HALOT
  rationale: Sigue el sentido de fruto seco preparado, paralelo a 'tortas de higos'. Evita reducirlo a pasas sueltas si el contexto sugiere una forma compactada.
- source_word: וְיַיִן
  english_pob_choice: wine
  chosen_spanish: vino
  alternatives_spanish:
  - vino tinto
  - mosto
  lexicon: HALOT
  rationale: Equivalencia directa y estándar en español bíblico.
- source_word: וְשֶׁמֶן
  english_pob_choice: oil
  chosen_spanish: aceite
  alternatives_spanish:
  - aceite de oliva
  - óleo
  lexicon: HALOT
  rationale: El hebreo no especifica el tipo; 'aceite' preserva la generalidad del término sin añadir información no explícita.
- source_word: וּבָקָר וְצֹאן
  english_pob_choice: cattle, and sheep
  chosen_spanish: ganado y ovejas
  alternatives_spanish:
  - bueyes y ovejas
  - reses y ovejas
  lexicon: HALOT
  rationale: Se distingue entre los animales suministrados y los de transporte del inicio del verso. 'Ganado y ovejas' transmite abundancia sin duplicar innecesariamente la referencia anterior.
- source_word: לָרֹב
  english_pob_choice: in abundance
  chosen_spanish: en abundancia
  alternatives_spanish:
  - en gran cantidad
  - abundantemente
  lexicon: HALOT
  rationale: Conserva el valor cuantitativo fuerte del hebreo con una formulación natural en español.
- source_word: כִּי שִׂמְחָה בְּיִשְׂרָאֵל
  english_pob_choice: for there was joy in Israel
  chosen_spanish: porque había alegría en Israel
  alternatives_spanish:
  - pues había gozo en Israel
  - porque reinaba alegría en Israel
  lexicon: HALOT
  rationale: Traduce la cláusula causal final de forma fluida y fiel; 'alegría' refleja היטב שִׂמְחָה sin necesidad de tecnicismos.
translation_notes:
  revision_awareness: 'El contexto auditado en inglés coincide en lo esencial con el hebreo: el verso describe a grupos cercanos que traen provisiones variadas y concluye con la explicación causal de la alegría en Israel. Se han conservado las decisiones léxicas clave del POB en español, ajustando la expresión para que sea natural y publicable sin perder las tensiones documentadas (especialmente לֶחֶם y צִמּוּקִים).'
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' no aplicable aquí, ya que el verso no contiene el Nombre divino.
  - Se evita 'Cristo' porque no hay terminología mesiánica en este versículo.
  - '''Alimento'' y ''provisiones'' distinguen el término general y la lista concreta, como en el audit trail inglés.'
  - Las especies de animales se conservan diferenciadas entre medios de transporte y animales ofrecidos.
  - El paralelismo de la lista final se mantiene con una enumeración simple y clara en español.
