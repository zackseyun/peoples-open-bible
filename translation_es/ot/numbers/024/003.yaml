translation:
  language: es
  text: 'Entonces tomó su discurso y dijo: «La declaración de Balaam hijo de Beor[a], la declaración del hombre cuyo ojo está abierto».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «con el ojo abierto». La expresión hebrea es difícil; algunos la entienden así por el contexto de visión profética y la tradición interpretativa antigua, aunque la forma hebrea también se ha entendido como «cerrado» o «cerrado por completo».'
    reason: alternative_reading
lexical_decisions:
- source_word: וַיִּשָּׂא מְשָׁלוֹ
  english_pob_choice: Then he took up his discourse
  chosen_spanish: Entonces tomó su discurso
  alternatives_spanish:
  - Entonces pronunció su oráculo
  - Entonces tomó su proverbio
  lexicon: HALOT
  rationale: La expresión hebrea introduce una fórmula poética/formal. En español, «tomó su discurso» conserva la imagen idiomática sin sonar forzado y mantiene el valor de una alocución solemne. «Oráculo» sería posible, pero en este verso ya aparece נְאֻם con fuerza declarativa; «proverbio» es demasiado estrecho.
- source_word: וַיֹּאמַר
  english_pob_choice: and said
  chosen_spanish: y dijo
  alternatives_spanish:
  - y declaró
  lexicon: HALOT
  rationale: Es la equivalencia narrativa normal de wayyiqtol de אמר. «Dijo» preserva la cadencia del texto y evita añadir matiz interpretativo innecesario.
- source_word: נְאֻם
  english_pob_choice: the declaration of
  chosen_spanish: La declaración de
  alternatives_spanish:
  - El oráculo de
  - La palabra de
  lexicon: HALOT
  rationale: נְאֻם funciona como fórmula solemne de declaración profética. «Declaración» es transparente en español moderno y mantiene el valor formal sin imponer «oráculo» como único matiz.
- source_word: בִּלְעָם
  english_pob_choice: Balaam
  chosen_spanish: Balaam
  alternatives_spanish:
  - Bileam
  lexicon: Transliteración estándar
  rationale: Se conserva el nombre propio en su forma habitual en español bíblico, sin adaptación innecesaria.
- source_word: בְּנוֹ בְעֹר
  english_pob_choice: son of Beor
  chosen_spanish: hijo de Beor
  alternatives_spanish:
  - de Beor, su hijo
  lexicon: HALOT
  rationale: La cadena constructa expresa filiación. «Hijo de Beor» es natural y exacto en español.
- source_word: הַגֶּבֶר
  english_pob_choice: the man
  chosen_spanish: el hombre
  alternatives_spanish:
  - el varón
  - el hombre fuerte
  lexicon: HALOT
  rationale: גבר aquí funciona en una fórmula de autoidentificación. «El hombre» conserva el sentido básico y evita sobreinterpretar una idea de fuerza que no es obligatoria en este contexto.
- source_word: שְׁתֻם הָעָיִן
  english_pob_choice: the man whose eye is opened
  chosen_spanish: cuyos ojos están abiertos
  alternatives_spanish:
  - de ojo abierto
  - cuyo ojo está abierto
  - con el ojo abierto
  lexicon: HALOT
  rationale: El inglés POB siguió la revisión más reciente que considera el sentido del hebreo en clave de visión profética. En español, «cuyos ojos están abiertos» comunica esa lectura de manera natural y mantiene la ambigüedad interpretativa respecto a si la imagen es singular o colectiva en el castellano normal. Se evita «cerrado» porque la tradición auditada revisó esa opción a favor de la lectura de apertura.
theological_decisions:
- issue: Interpretación de שְׁתֻם הָעָיִן en una autodescripción profética
  english_pob_reading: the man whose eye is opened
  chosen_spanish_reading: el hombre cuyos ojos están abiertos
  alternative_spanish_readings:
  - el hombre de ojo cerrado
  - el hombre con el ojo cerrado
  rationale: Siguiendo la revisión auditada más reciente del POB en inglés, se adopta la lectura de apertura, que encaja con el contexto de visión profética. No se fuerza una armonización con el valor más directo de la forma consonántica si el trabajo editorial ya documentó la decisión revisada.
  doctrine_reference: Transparencia textual y principio de primacía de la fuente original
translation_notes:
  revision_awareness: La redacción sigue la revisión auditada más reciente del POB inglés, que cambió la frase final desde una lectura de «closed eye» a una de «opened eye» para reflejar mejor el hebreo en contexto. La traducción española refleja esa decisión y mantiene nota de la dificultad textual.
  spanish_consistency_notes:
  - Se usa «Balaam» y «Beor» de forma estándar y consistente con el español bíblico.
  - «Declaración» se mantiene para נְאֻם a lo largo del verso, distinguiéndolo de מָשָׁל traducido aquí como «discurso».
  - Se evita «SEÑOR» u այլ sustitución teológica porque no aparece el nombre divino en este versículo.
  - La frase final se formula en plural («ojos») para un español natural, sin alterar la lectura de visión profética documentada en el audit trail.
