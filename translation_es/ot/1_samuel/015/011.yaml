base_translation:
  language: en
  yaml_path: translation/ot/1_samuel/015/011.yaml
  text: I regret that I made Saul king[a], because he has turned back from following me and has not carried out my words. And Samuel burned with anger[d][c][b], and he cried out to Yahweh all night.
  footnotes:
  - marker: a
    text: Or, 'I am sorry' or 'I relent'; Hebrew 'I regret/was moved to regret.' The wording expresses the LORD's grief over Saul's kingship.
    reason: lexical_alternative
  - marker: b
    text: Literally, 'he has turned back from after me,' an idiom for turning away from following the LORD.
    reason: lexical_alternative
  - marker: c
    text: Or, 'has not fulfilled my words' or 'has not obeyed my words.'
    reason: lexical_alternative
  - marker: d
    text: 'Hebrew idiom: ''Samuel burned with anger.'' Some understand the sense here as grief or deep displeasure in context.'
    reason: alternative_reading
