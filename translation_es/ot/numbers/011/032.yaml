    reason: Combina la nota cultural auditada con la alternativa léxica preservada por el POB inglés.
  revision_rationale: Se añadió la alternativa léxica documentada para חֳמָרִים, se mejoró la naturalidad del préstamo de medida en español con 'homeres', y se suavizaron dos giros ('para ellos mismos', 'por todo alrededor del campamento') para mayor legibilidad sin apartarse del hebreo ni de la auditoría inglesa.
