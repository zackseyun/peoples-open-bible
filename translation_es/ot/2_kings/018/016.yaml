translation:
  language: es
  text: En aquel tiempo Ezequías cortó las puertas del templo de Yahvé y los postes de las puertas[a] que Ezequías, rey de Judá, había recubierto, y se los entregó al rey de Asiria.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: También puede entenderse como «marcos de las puertas» o, de forma más amplia, «soportes»; el hebreo es raro y admite un campo arquitectónico más amplio.
    reason: lexical_alternative
lexical_decisions:
- source_word: בָּעֵת הַהִיא
  english_pob_choice: At that time
  chosen_spanish: En aquel tiempo
  alternatives_spanish:
  - En ese tiempo
  - Por entonces
  lexicon: HALOT
  rationale: La expresión temporal hebrea introduce una secuencia narrativa; «En aquel tiempo» es natural, formal y fiel al valor de marco histórico.
- source_word: קִצַּץ
  english_pob_choice: cut off
  chosen_spanish: cortó
  alternatives_spanish:
  - cortó
  - arrancó
  - quitó
  lexicon: HALOT
  rationale: El verbo expresa una acción concreta de corte o eliminación. «Cortó» conserva la imagen física sin añadir más de lo que el hebreo exige.
- source_word: דַּלְתוֹת
  english_pob_choice: the doors
  chosen_spanish: las puertas
  alternatives_spanish:
  - las hojas de las puertas
  - las puertas
  lexicon: HALOT
  rationale: El término designa puertas o batientes; en español, «las puertas» es la forma más clara y natural.
- source_word: הֵיכַל יְהוָה
  english_pob_choice: the temple of Yahweh
  chosen_spanish: el templo de Yahvé
  alternatives_spanish:
  - el templo de Yahvé
  - el santuario de Yahvé
  lexicon: HALOT
  rationale: «הֵיכָל» aquí se refiere al templo de Jerusalén. Se mantiene «Yahvé» para el nombre divino conforme al estándar del proyecto.
- source_word: הָאֹמְנוֹת
  english_pob_choice: the doorposts
  chosen_spanish: los postes de las puertas
  alternatives_spanish:
  - los marcos de las puertas
  - los postes
  - los soportes de las puertas
  lexicon: HALOT
  rationale: El sustantivo es raro y puede abarcar elementos estructurales asociados a las puertas. «Postes de las puertas» conserva la ambigüedad sin cerrar indebidamente la referencia.
- source_word: צִפָּה
  english_pob_choice: had overlaid
  chosen_spanish: había recubierto
  alternatives_spanish:
  - había recubierto
  - había cubierto
  - había plateado
  lexicon: HALOT
  rationale: El verbo indica revestir u overlay. «Había recubierto» es suficientemente amplio y no impone un material específico más allá del contexto.
- source_word: וַיִּתְּנֵם
  english_pob_choice: and gave them
  chosen_spanish: y se los entregó
  alternatives_spanish:
  - y se los entregó
  - y los dio
  - y los puso en manos
  lexicon: HALOT
  rationale: El hebreo narra una entrega directa. «Se los entregó» reproduce el movimiento de dar objetos a otra autoridad con claridad en español.
- source_word: לְמֶלֶךְ אַשּׁוּר
  english_pob_choice: to the king of Assyria
  chosen_spanish: al rey de Asiria
  alternatives_spanish:
  - al rey de Asiria
  - al rey asirio
  lexicon: HALOT
  rationale: Construcción transparente y estándar en español para el destinatario político-histórico.
theological_decisions:
- issue: Representación del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahvé
  - SEÑOR
  rationale: El texto hebreo usa el Tetragrámaton directamente. Se conserva el nombre propio divino «Yahvé» conforme a la terminología del proyecto y para no ocultar el término original bajo una sustitución litúrgica.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
translation_notes:
  revision_awareness: Se siguió el estado de revisión más reciente, que no reporta cambios; la redacción española mantiene el acuerdo alto con la auditoría inglesa y conserva la ambigüedad lexical documentada para הָאֹמְנוֹת.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» como nombre divino, coherente con el estándar del proyecto.
  - «Los postes de las puertas» intenta reflejar la rareza de הָאֹמְנוֹת sin perder naturalidad en español.
  - No se introdujeron términos eclesiásticos tradicionales que suavicen el sentido material del pasaje.
