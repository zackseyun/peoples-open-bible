translation:
  language: es
  text: Contiendan con su madre[a], contiendan, porque ella no es mi esposa, y yo no soy su esposo; que quite de su rostro sus prostituciones[b] y de entre sus pechos sus adulterios.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O también: «Presenten demanda contra su madre» / «Litiguen contra su madre». El verbo hebreo ריב puede llevar fuerza legal-disputativa.'
    reason: lexical_alternative
  - marker: b
    text: «Prostituciones» traduce un término hebreo usado en Oseas tanto para la inmoralidad sexual literal como, metafóricamente, para la infidelidad del pacto mediante la idolatría.
    reason: cultural_note
lexical_decisions:
- source_word: רִיבוּ
  english_pob_choice: Contend
  chosen_spanish: Contended
  alternatives_spanish:
  - Pleden
  - Presenten demanda contra
  - Acusen
  lexicon: HALOT
  rationale: ריב en este contexto conserva fuerza disputativa y también puede implicar litigio. En español, «contender» mantiene esa amplitud sin forzar todavía una imagen exclusivamente judicial.
- source_word: בְאִמְּכֶם
  english_pob_choice: with your mother
  chosen_spanish: con su madre
  alternatives_spanish:
  - contra su madre
  lexicon: HALOT
  rationale: La preposición admite un valor adversativo en contexto, pero «con su madre» conserva la transparencia formal del hebreo; la oposición queda clara por el contexto y por el imperativo repetido.
- source_word: כִּי הִיא לֹא אִשְׁתִּי וְאָנֹכִי לֹא אִישָׁהּ
  english_pob_choice: for she is not my wife, and I am not her husband
  chosen_spanish: porque ella no es mi esposa, y yo no soy su esposo
  alternatives_spanish:
  - porque ella no es mi mujer, y yo no soy su hombre
  lexicon: HALOT
  rationale: «Esposa/esposo» expresa con naturalidad la metáfora matrimonial del pacto. Se evita «mujer/hombre» porque en español suena menos preciso y menos idiomático aquí.
- source_word: וְתָסֵר
  english_pob_choice: let her remove
  chosen_spanish: que quite
  alternatives_spanish:
  - y que retire
  - que aparte
  lexicon: HALOT
  rationale: El valor jussivo se expresa bien con «que quite» en español actual. Es breve, claro y mantiene el tono exhortativo.
- source_word: זְנוּנֶיהָ
  english_pob_choice: her prostitutions
  chosen_spanish: sus prostituciones
  alternatives_spanish:
  - sus fornicaciones
  - sus actos de prostitución
  - sus rameras
  lexicon: HALOT
  rationale: Se conserva la fuerza concreta del término hebreo y su carga moral. «Prostituciones» es menos común, pero refleja mejor la elección lexical del POB inglés y la imagen profética de Oseas.
- source_word: מִפָּנֶיהָ
  english_pob_choice: from her face
  chosen_spanish: de su rostro
  alternatives_spanish:
  - de delante de ella
  - de su presencia
  lexicon: HALOT
  rationale: «Rostro» comunica en español la imagen visible y pública del hebreo sin perder literalidad. Evita una abstracción que debilitaría la escena.
- source_word: וְנַאֲפוּפֶיהָ
  english_pob_choice: her adulteries
  chosen_spanish: sus adulterios
  alternatives_spanish:
  - sus actos de adulterio
  - sus infidelidades conyugales
  lexicon: HALOT
  rationale: «Adulterios» conserva el plural y el peso moral del sustantivo hebreo. Mantiene la simetría con «prostituciones».
- source_word: מִבֵּין שָׁדֶיהָ
  english_pob_choice: from between her breasts
  chosen_spanish: de entre sus pechos
  alternatives_spanish:
  - de entre sus senos
  - de entre su pecho
  lexicon: HALOT
  rationale: «Pechos» es la equivalencia más directa y concreta del hebreo. Preserva la imagen corporal sin suavizarla.
theological_decisions:
- issue: Metáfora matrimonial de la ruptura del pacto
  english_pob_reading: Retain the literal marital language in the main text while allowing the prophetic metaphor of Israel's covenant unfaithfulness to stand without explanatory expansion.
  chosen_spanish_reading: Conservar el lenguaje matrimonial literal en el texto principal, sin convertirlo en paráfrasis explicativa.
  alternative_spanish_readings:
  - Explicitar en el texto principal que se trata de infidelidad del pacto
  - Reescribir la frase como una denuncia espiritual general
  rationale: La fuerza teológica del pasaje depende de la metáfora matrimonial tal como está escrita. Traducirla literalmente en español evita imponer interpretación y mantiene la tensión profética.
  doctrine_reference: Translation philosophy items 1 and 3
- issue: Lenguaje sexual fuerte para la infidelidad
  english_pob_reading: Use strong terms ('prostitutions,' 'adulteries') rather than softening to generic 'unfaithfulness.'
  chosen_spanish_reading: Usar términos fuertes («prostituciones», «adulterios») en lugar de suavizar con «infidelidad».
  alternative_spanish_readings:
  - infidelidad
  - inmoralidad
  - deslealtad
  rationale: Oseas usa deliberadamente lenguaje sexual cargado. Suavizarlo reduciría la severidad profética y ocultaría la intensidad del juicio.
  doctrine_reference: Translation philosophy items 1 and 6
translation_notes:
  revision_awareness: El pasaje se mantiene sin cambios respecto del último repaso auditado; la formulación española busca conservar la misma decisión exegética y lexical del POB inglés, con equivalencias naturales en español y sin suavizar el lenguaje profético.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como forma estándar cuando aparezca el tetragrámaton, aunque este versículo no lo contiene.
  - Se conserva el binomio lexical fuerte «prostituciones/adulterios» para reproducir la carga semántica del hebreo.
  - Se usa «esposa/esposo» para reflejar el marco matrimonial del texto, no para reinterpretarlo como comentario doctrinal.
  - Los corchetes de nota aparecen solo donde hay nota correspondiente en el texto.
