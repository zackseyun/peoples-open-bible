review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura tripartita del griego y conserva el aspecto imperfectivo con «soportaba / despreciaba / perseveraba». «Los dolores» para τοὺς πόνους y «despreciaba» para περιεφρόνει son fieles. Sin embargo, hay dos problemas principales: la nota [a] está anclada en «dolores» cuando corresponde a τῆς ἀνάγκης, y «perseveraba entre los tormentos» debilita διεκαρτέρει τοὺς αἰκισμούς, que expresa mantenerse firme a través de/ante torturas más que simplemente estar entre tormentos.'
  spanish_quality_summary: El español es generalmente claro y digno, pero «la compulsión» suena menos natural en este contexto que «la coerción» o «la presión impuesta», y la ubicación de la nota produce confusión. «Los tormentos» es comprensible, pero «las torturas» comunica mejor la severidad física de αἰκισμούς en español moderno eclesial legible. Una leve revisión mejora precisión y naturalidad sin parafrasear.
  glossary_alignment: No hay términos del glosario mayor en juego. A nivel léxico, conviene alinear ἀνάγκη con la justificación auditada de presión externa impuesta; en español, «coerción» funciona mejor que «compulsión» para esa fuerza externa. Para αἰκισμούς, «torturas» se ajusta mejor a la decisión inglesa documentada que «tormentos».
  issues:
  - severity: medium
    issue: La nota [a] está colocada en «dolores» en vez de en el equivalente de τῆς ἀνάγκης.
    rationale: La nota explica alternativas para ἀνάγκη («coerción», «necesidad»), no para πόνοι. Debe anclarse en la palabra o frase correspondiente para preservar la trazabilidad lexical.
  - severity: medium
    issue: «Perseveraba entre los tormentos» no refleja con suficiente precisión διεκαρτέρει τοὺς αἰκισμούς.
    rationale: El griego expresa resistencia perseverante frente a torturas/maltratos, no mera localización «entre» ellos. «Perseveraba a través de las torturas» o «se mantenía firme ante las torturas» es más fiel.
  - severity: low
    issue: «La compulsión» suena menos idiomático en español para coerción externa martirial.
    rationale: Aunque semánticamente posible, en español actual «compulsión» suele asociarse a impulso interno o compulsividad. «Coerción» comunica mejor la presión externa descrita por ἀνάγκη aquí.
  - severity: low
    issue: «Los tormentos» atenúa la concreción de αἰκισμούς.
    rationale: Dado el contexto de tortura física, «las torturas» es más directo y coincide mejor con la auditoría inglesa.
  revised_spanish_text: Pero él soportaba los dolores, y despreciaba la coerción[a], y perseveraba a través de las torturas.
  revised_footnotes:
  - marker: a
    text: O «la compulsión» o «la necesidad»; el término griego puede denotar fuerza, restricción o necesidad, pero aquí probablemente se refiere a la presión que se ejercía sobre él.
    reason: lexical_alternative
  revision_rationale: Se reubica la nota al término correcto, se sustituye «compulsión» por «coerción» para expresar mejor la presión externa de ἀνάγκη en español natural, y se ajusta la última cláusula a «a través de las torturas» para reflejar mejor διεκαρτέρει τοὺς αἰκισμούς y la severidad de αἰκισμοί.
