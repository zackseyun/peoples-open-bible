  glossary_alignment: No hay conflicto con la terminología principal del proyecto. No aparecen Yahvé, Mesías, Espíritu, etc. «fidelidad» alinea bien con אֵמֻן en sentido pactual. «rostro» preserva correctamente el idiomatismo teológico. «generación perversa» sigue la revisión aprobada del POB inglés y es apropiada en español.
