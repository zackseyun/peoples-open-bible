translation:
  language: es
  text: Pero si llega a redimirlo[a], entonces añadirá una quinta parte a tu valoración.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «lo redime» / «ciertamente lo redime»; el hebreo usa un infinitivo absoluto con un verbo finito para dar énfasis.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְאִם
  english_pob_choice: But if
  chosen_spanish: Pero si
  alternatives_spanish:
  - Y si
  - Si
  lexicon: HALOT
  rationale: El hebreo introduce una condición en continuidad con una disposición legal previa; en español, «Pero si» conserva el matiz contrastivo natural en este contexto normativo sin volverse pesado.
- source_word: גָּאֹל יִגְאָלֶנָּה
  english_pob_choice: he does redeem it
  chosen_spanish: lo redime
  alternatives_spanish:
  - lo redime ciertamente
  - lo redime de verdad
  - lo quiera redimir
  lexicon: HALOT
  rationale: La construcción infinitivo absoluto + verbo finito expresa énfasis. En español, el presente simple puede transmitir esa fuerza de manera sobria y natural en una norma legal. El pronombre neutro «lo» refleja el objeto retomado por el sufijo femenino del hebreo, aludiendo a la res ya mencionada.
- source_word: וְיָסַף
  english_pob_choice: then he shall add
  chosen_spanish: entonces añadirá
  alternatives_spanish:
  - y añadirá
  - deberá añadir
  lexicon: HALOT
  rationale: En este contexto jurídico, la secuencia expresa consecuencia obligatoria. «Entonces añadirá» reproduce ese resultado legal en español moderno.
- source_word: חֲמִישִׁתוֹ
  english_pob_choice: a fifth
  chosen_spanish: una quinta parte
  alternatives_spanish:
  - un quinto
  - la quinta parte
  lexicon: HALOT
  rationale: El sustantivo indica una fracción proporcional. «Una quinta parte» es claro y fiel; evita la posible ambigüedad de «un quinto» en un registro legal pastoral.
- source_word: עַל
  english_pob_choice: to
  chosen_spanish: a
  alternatives_spanish:
  - sobre
  - encima de
  - además de
  lexicon: HALOT
  rationale: Con el verbo de añadir y un monto de valoración, עַל expresa adición sobre una base. En español, «a» comunica la misma relación de incremento sin forzar una preposición más literal.
- source_word: עֶרְכֶּךָ
  english_pob_choice: your valuation
  chosen_spanish: tu valoración
  alternatives_spanish:
  - tu tasación
  - tu evaluación
  - tu valuación
  lexicon: HALOT
  rationale: En Levítico 27, עֶרֶךְ es una valoración o tasación cultual. «Tu valoración» conserva el sentido legal y la segunda persona singular del hebreo, y resulta natural en español bíblico contemporáneo.
translation_notes:
  revision_awareness: El texto español sigue la última revisión del auditorio inglés al omitir cualquier duplicación implícita como «de él» después de «quinta parte», porque el hebreo dice que añade una quinta parte a la valoración, no explícitamente «una quinta parte de ello».
  spanish_consistency_notes:
  - Se mantuvo «valoración» para עֶרֶךְ en coherencia con el uso técnico de Levítico 27.
  - Se evitó «SEÑOR» u otra sustitución teológica, porque aquí no aparece el nombre divino.
  - «Lo» se usa de forma impersonal/anáfora para referir el animal mencionado previamente, respetando el referente del sufijo hebreo.
