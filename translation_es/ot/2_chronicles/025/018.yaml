base_translation:
  language: en
  yaml_path: translation/ot/2_chronicles/025/018.yaml
  text: Then Joash king of Israel sent to Amaziah king of Judah[a], saying, “The thornbush that was in Lebanon sent to the cedar that was in Lebanon, saying, ‘Give your daughter to my son as a wife.’ Then a wild beast of the field that was in Lebanon passed by and trampled the thornbush.”
  footnotes:
