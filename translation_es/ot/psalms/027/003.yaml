translation:
  language: es
  text: Aunque[a] un ejército[b] acampe contra mí, mi corazón no temerá; aunque se levante la guerra contra mí, aun así[c] confiaré.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «Si un ejército acampa contra mí ... si se levanta la guerra contra mí». El hebreo אִם puede traducirse de forma condicional («si») o concesiva («aunque»); aquí el sentido concesivo encaja mejor con el contexto poético.
    reason: lexical_alternative
  - marker: b
    text: Hebreo «campamento»; por el contexto, se refiere a un campamento armado, de ahí «ejército».
    reason: lexical_alternative
  - marker: c
    text: O «en esto confío» o «a pesar de esto confío». El hebreo puede enfatizar ya sea la confianza misma o la perseverancia de esa confianza frente a la amenaza.
    reason: alternative_reading
lexical_decisions:
- source_word: אִם
  english_pob_choice: Though
  chosen_spanish: Aunque
  alternatives_spanish:
  - Si
  lexicon: HALOT
  rationale: En este paralelismo poético, אִם funciona con valor concesivo. «Aunque» expresa mejor la idea de una amenaza real que no cambia la confianza del salmista.
- source_word: תַּחֲנֶה
  english_pob_choice: encamps
  chosen_spanish: acampe
  alternatives_spanish:
  - acampe el campamento
  - se establezca
  lexicon: HALOT
  rationale: El verbo חנה conserva la imagen militar de establecer campamento. «Acampе» suena natural en español y mantiene esa fuerza imagética.
- source_word: מַחֲנֶה
  english_pob_choice: an army
  chosen_spanish: un ejército
  alternatives_spanish:
  - un campamento
  - una hueste
  lexicon: HALOT
  rationale: Aunque el término básico es «campamento», aquí el contexto hostil y el paralelismo con «guerra» permiten entenderlo metonímicamente como una fuerza armada. «Ejército» comunica con claridad esa referencia sin perder el trasfondo militar.
- source_word: לֹא יִירָא לִבִּי
  english_pob_choice: my heart will not fear
  chosen_spanish: mi corazón no temerá
  alternatives_spanish:
  - no tendrá temor mi corazón
  - yo no temeré
  lexicon: HALOT
  rationale: Se conserva el sujeto explícito «mi corazón», porque el hebreo lo formula así. «No temerá» es idiomático y mantiene el tono poético.
- source_word: תָּקוּם
  english_pob_choice: rises
  chosen_spanish: se levante
  alternatives_spanish:
  - se alce
  - surja
  lexicon: HALOT
  rationale: קום con «guerra» como sujeto sugiere que el conflicto se alza o se pone en acción. «Se levante» preserva la imagen verbal sin sobreexplicarla.
- source_word: מִלְחָמָה
  english_pob_choice: war
  chosen_spanish: guerra
  alternatives_spanish:
  - combate
  - batalla
  lexicon: HALOT
  rationale: '«Guerra» es la equivalencia más directa y fuerte en español para el escalamiento del cuadro: de un ejército acampado a un conflicto abierto.'
- source_word: בְּזֹאת
  english_pob_choice: even then
  chosen_spanish: aun así
  alternatives_spanish:
  - en esto
  - en esa circunstancia
  - en medio de esto
  lexicon: HALOT
  rationale: El demostrativo es elíptico y apunta a la situación amenazante descrita antes. «Aun así» expresa de modo natural que la confianza persiste precisamente en ese contexto, sin forzar un referente explícito no dado por el verso.
- source_word: בוֹטֵחַ
  english_pob_choice: I will trust
  chosen_spanish: confiaré
  alternatives_spanish:
  - confío
  - estaré confiado
  lexicon: HALOT
  rationale: בטח puede expresar confianza firme o seguridad. «Confiaré» sigue de cerca la lectura inglesa revisada y conserva el valor volitivo/continuo del hablante en medio de la amenaza.
theological_decisions:
- issue: Valor de בְּזֹאת al final del versículo
  english_pob_reading: 'Reference to the threatening circumstances just described: ''even then I will trust.'''
  chosen_spanish_reading: 'Referencia a la situación amenazante recién descrita: «aun así confiaré».'
  alternative_spanish_readings:
  - «en esto confiaré»
  - «en medio de esto confiaré»
  - «con todo, confiaré»
  rationale: La cercanía inmediata de «ejército» y «guerra» hace que el demostrativo apunte a esa misma circunstancia. La traducción mantiene la tensión textual sin resolverla hacia un referente más explícito que el hebreo no formula.
  doctrine_reference: Preservar la tensión textual y la confianza del salmista sin añadir contenido no dicho por el verso.
translation_notes:
  revision_awareness: Se siguió el giro revisado del POB inglés en la cola del versículo, preferiendo una expresión natural en español que conserve la confianza continua dentro de la amenaza. No se introdujeron notas porque el español elegido no necesitó una alternativa textual destacada en el cuerpo.
  spanish_consistency_notes:
  - Se usó «Yahvé» solo cuando el texto lo requiera explícitamente; aquí no aparece.
  - Se mantuvo «confiaré» para בטח, en línea con la decisión POB de preservar el lenguaje de confianza más que reducirlo a mera seguridad psicológica.
  - Se conservó el sujeto explícito «mi corazón» para respetar la antropología del hebreo.
  - «Ejército» se emplea como metonimia contextual de מַחֲנֶה, no como sustitución de un término genérico por tradición eclesiástica.
