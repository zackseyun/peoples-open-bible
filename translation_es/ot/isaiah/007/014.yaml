base_translation:
  language: en
  yaml_path: translation/ot/isaiah/007/014.yaml
  text: 'Therefore the Lord himself will give you a sign: behold[a], the young woman is pregnant and is bearing a son[d][c][b], and she will call his name Immanuel.'
  footnotes:
  - marker: a
    text: Or 'the virgin.' The Hebrew word here is עַלְמָה ('young woman'); the Greek Septuagint renders it with a word often understood as 'virgin,' and Matthew 1:23 cites the verse in that form.
    reason: alternative_reading
  - marker: b
    text: 'Traditional rendering: ''shall conceive and bear a son.'' The Hebrew more literally describes the woman as already pregnant and bearing.'
    reason: lexical_alternative
  - marker: c
    text: Or 'you shall call his name,' reflected in some ancient versional traditions; Matthew 1:23 has 'they shall call his name.'
    reason: textual_variant
  - marker: d
    text: Immanuel means 'God with us.'
    reason: cultural_note
