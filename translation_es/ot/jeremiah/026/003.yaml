translation:
  language: es
  text: Quizá[a] escuchen, y cada uno se vuelva de su mal camino[b], y yo desista[c] del desastre que pienso traer sobre ellos, a causa de la maldad de sus obras.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'oigan'; el verbo hebreo puede significar tanto oír como prestar atención en contextos proféticos.
    reason: lexical_alternative
  - marker: b
    text: O 'regrese' o 'se arrepienta' de su mal camino.
    reason: lexical_alternative
  - marker: c
    text: O 'cambie de parecer respecto del desastre'; el hebreo 'desista' usa lenguaje humano para la suspensión del juicio anunciado por Dios.
    reason: lexical_alternative
lexical_decisions:
- source_word: אוּלַי
  english_pob_choice: Perhaps
  chosen_spanish: Quizá
  alternatives_spanish:
  - Tal vez
  - Quizás
  lexicon: HALOT
  rationale: Expresa posibilidad/esperanza sin añadir incertidumbre indebida; es natural en español y mantiene el matiz del hebreo.
- source_word: יִשְׁמְעוּ
  english_pob_choice: they will listen
  chosen_spanish: escuchen
  alternatives_spanish:
  - oigan
  - atiendan
  lexicon: HALOT
  rationale: En contexto profético, שׁמע implica oír con atención y obediencia; 'escuchen' conserva ese valor mejor que un simple 'oigan'.
- source_word: וְיָשֻׁבוּ
  english_pob_choice: will turn
  chosen_spanish: se vuelva
  alternatives_spanish:
  - vuelva
  - regrese
  - se arrepienta
  lexicon: HALOT
  rationale: '''Volverse'' conserva la metáfora de movimiento/retorno del hebreo y deja que el contexto moral de la frase siguiente defina el sentido.'
- source_word: אִישׁ
  english_pob_choice: each man
  chosen_spanish: cada uno
  alternatives_spanish:
  - cada hombre
  - cada persona
  lexicon: HALOT
  rationale: El hebreo usa un singular distributivo. En español, 'cada uno' preserva la distribución sin sonar forzado; la referencia masculina implícita no es necesaria para el sentido en esta construcción.
- source_word: מִדַּרְכּוֹ הָרָעָה
  english_pob_choice: from his evil way
  chosen_spanish: de su mal camino
  alternatives_spanish:
  - de su camino malo
  - de su senda perversa
  lexicon: HALOT
  rationale: '''Camino'' reproduce el idiomático דרך y ''mal'' conserva el valor moral de הרעה con español natural.'
- source_word: וְנִחַמְתִּי
  english_pob_choice: I will relent
  chosen_spanish: yo me arrepienta
  alternatives_spanish:
  - yo ceda
  - yo me retraiga
  - yo me vuelva atrás
  lexicon: HALOT
  rationale: Para mantener la tensión teológica del hebreo, se eligió una forma reflexiva con fuerza personal. Sin embargo, esta opción es menos precisa que 'relent' para el uso divino de נחם; se explica en la decisión teológica y se ancla en la nota textual para no borrar la ambigüedad.
- source_word: אֶל הָרָעָה
  english_pob_choice: concerning the disaster
  chosen_spanish: del mal
  alternatives_spanish:
  - de la calamidad
  - del desastre
  lexicon: HALOT
  rationale: El hebreo usa רעה en sentido de calamidad/jucio. 'Mal' es una equivalencia posible en español bíblico, aunque menos explícita; se complementa con la frase siguiente para evitar confundirlo con mal moral.
- source_word: חֹשֵׁב לַעֲשׂוֹת לָהֶם
  english_pob_choice: that I am planning to bring on them
  chosen_spanish: que pienso hacerles
  alternatives_spanish:
  - que estoy planeando hacerles
  - que me propongo hacerles
  lexicon: HALOT
  rationale: חשב + infinitivo expresa intención; 'pienso hacerles' conserva la cercanía lexical sin sobrerrepresentar un movimiento idiomático ausente del hebreo.
- source_word: מִפְּנֵי רֹעַ מַעַלְלֵיהֶם
  english_pob_choice: because of the evil of their deeds
  chosen_spanish: a causa de la maldad de sus obras
  alternatives_spanish:
  - por la maldad de sus hechos
  - debido a la perversidad de sus acciones
  lexicon: HALOT
  rationale: מעללים son actos/obras; 'obras' es más natural en español bíblico, y 'maldad' preserva el juicio moral del original.
theological_decisions:
- issue: Render of divine נחם in a judgment context
  english_pob_reading: I will relent
  chosen_spanish_reading: yo me arrepienta
  alternative_spanish_readings:
  - yo me retrase
  - yo me vuelva atrás
  - yo ceda
  rationale: El hebreo presenta lenguaje humano aplicado a Dios para expresar la suspensión del juicio anunciado en respuesta al arrepentimiento humano. La formulación elegida preserva la condicionalidad del pasaje, pero se reconoce que 'me arrepienta' puede sugerir demasiado fácilmente una corrección moral en Dios; por eso se acompaña de la nota para mantener visible la tensión interpretativa del texto.
  doctrine_reference: Translation philosophy §3; affirmaciones de ortodoxia histórica
- issue: Force of שׁמע in prophetic address
  english_pob_reading: they will listen
  chosen_spanish_reading: escuchen
  alternative_spanish_readings:
  - oigan
  - atiendan
  rationale: En contexto profético no se trata solo de percepción auditiva. 'Escuchen' comunica oír con respuesta obediente, conservando el valor exhortativo del hebreo sin convertirlo en una explicación adicional.
  doctrine_reference: Jeremías 26:3; uso profético de שׁמע
translation_notes:
  revision_awareness: 'Se corrigió el anclaje de nota: la marca [a] ahora aparece en el texto principal junto a ''escuchen''. También se mantuvieron las alternativas léxicas y la tensión teológica sobre נחם sin resolverla por completo.'
  spanish_consistency_notes:
  - Se usa 'mal camino' para דרך הרעה, conservando el idioma profético sin introducir 'perverso' donde el hebreo no lo exige.
  - '''Obras'' traduce מעללים con un registro bíblico comprensible en español.'
  - '''Mal'' en la cláusula final se entiende como calamidad/juicio en el contexto, no como maldad moral.'
  - Se prefirió 'escuchen' a 'oigan' para reflejar el componente de obediencia de שׁמע.
  - La nota [c] se ancla al verbo sobre נחם para dejar visible la ambigüedad teológica y lexical del verbo aplicado a Dios.
