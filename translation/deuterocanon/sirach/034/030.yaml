theological_decisions:
- issue: Representative masculine in wisdom literature
  chosen_reading: Render ἄφρονος as 'foolish man' rather than a gender-neutral expression.
  alternative_readings:
  - foolish person
  - fool
  rationale: The Greek is grammatically masculine singular and functions as a representative wisdom-type. Per doctrine, gender-accurate rendering is preferred over flattening to a neutral term, though 'fool' remains a viable lexical alternative.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
