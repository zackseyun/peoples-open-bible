review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja correctamente la secuencia básica del hebreo: incluso los jóvenes desfallecen/se cansan, y los jóvenes tropiezan. Sin embargo, no preserva bien la distinción léxica entre נְעָרִים y בַּחוּרִים porque traduce ambos simplemente como «los jóvenes». Además, «tropiezan ciertamente» suena poco natural en español y no es la mejor forma de reflejar el infinitivo absoluto enfático.'
  spanish_quality_summary: 'El español es comprensible, pero tiene dos problemas de calidad: repetición plana de «los jóvenes» donde el original usa dos términos distintos, y una colocación poco idiomática en «tropiezan ciertamente». Una mejora mínima puede conservar fidelidad y sonar más natural y digno en español bíblico moderno.'
  glossary_alignment: No hay términos teológicos sensibles aquí. La revisión propuesta respeta la decisión inglesa revisada de no traducir בַּחוּרִים como «escogidos», pero conserva su matiz con una nota léxica. El resto del vocabulario («fatigan», «cansan», «tropiezan») es compatible con el proyecto.
  issues:
  - severity: medium
    issue: Se pierde la distinción entre נְעָרִים y בַּחוּרִים
    rationale: El hebreo usa dos sustantivos distintos en paralelismo. Traducir ambos como «los jóvenes» borra un contraste léxico que el POB audit trail quiso al menos conservar en nota, aunque el texto principal inglés finalmente use la misma expresión.
  - severity: medium
    issue: «Tropiezan ciertamente» es poco natural en español
    rationale: Aunque intenta reflejar el énfasis de כָּשׁוֹל יִכָּשֵׁלוּ, el orden adverbial suena forzado. «Ciertamente tropiezan» o «sin duda tropiezan» comunica mejor el énfasis en español.
  - severity: low
    issue: Falta nota léxica para בַּחוּרִים
    rationale: El inglés POB conservó una nota alternativa sobre el matiz de vigor/plenitud. En español conviene mantener una nota equivalente, especialmente porque el texto principal no puede cargar fácilmente toda esa nuance sin volverse pesado.
  revised_spanish_text: Hasta los jóvenes se fatigan y se cansan, y los jóvenes[a] ciertamente tropiezan.
  revised_footnotes:
  - marker: a
    text: O «jóvenes vigorosos» o simplemente «jóvenes». El hebreo בַּחוּרִים se refiere a jóvenes varones en la plenitud de sus fuerzas; aquí se mantiene «jóvenes» en el texto principal, pero el término puede sugerir vigor juvenil.
    reason: lexical_alternative
  revision_rationale: Se conserva la estructura y el sentido del original, pero se mejora la naturalidad de la frase enfática y se añade una nota para no perder el matiz léxico de בַּחוּרִים. No hace falta una reescritura mayor ni adjudicación adicional.
