- from: Hay una reprensión que no es oportuna[a], y hay quien calla y él mismo es sabio.
  to: Hay una reprensión que no es oportuna[a], y hay quien calla y también es sabio.
  rationale: Se mantiene el contenido semántico del original y del POB inglés, pero se sustituye 'él mismo es sabio' por 'también es sabio' para expresar de forma más idiomática en español el énfasis de καὶ αὐτός. También se pule la nota para mayor naturalidad.
