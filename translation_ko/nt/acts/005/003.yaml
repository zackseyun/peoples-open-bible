id: ACT.5.3
reference: Acts 5:3
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: εἶπεν δὲ ⸀ὁ Πέτρος· Ἁνανία, διὰ τί ἐπλήρωσεν ὁ Σατανᾶς τὴν καρδίαν σου, ψεύσασθαί σε τὸ πνεῦμα τὸ ἅγιον καὶ ⸀νοσφίσασθαι ἀπὸ τῆς τιμῆς τοῦ χωρίου;
base_translation:
  language: en
  yaml_path: translation/nt/acts/005/003.yaml
  text: But Peter said[a], “Ananias[d][c][b], why has Satan filled your heart to lie to the Holy Spirit and to keep back some of the price of the land?”
  footnotes:
  - marker: a
    text: Or 'to deceive the Holy Spirit.' The Greek verb can carry the sense of speaking falsely to someone, but in this context 'lie to' is the more direct rendering.
    reason: lexical_alternative
  - marker: b
    text: Or 'to keep back part of the proceeds' or 'of the sale price.'
    reason: lexical_alternative
  - marker: c
    text: '''Land'' may also be rendered ''property'' or ''field.'''
    reason: lexical_alternative
  - marker: d
    text: Or 'for you to lie to the Holy Spirit and to keep back'.
    reason: previous_rendering
translation:
  language: ko
  text: 그러자 베드로가 말하였습니다. 「아나니아여, 어찌하여 사탄이 그대의 마음을 가득 채워서, 그대가 성령께 거짓말하고 그 땅값에서 얼마를 빼돌리게 하였는가?
  philosophy: optimal-equivalence
theological_decisions:
- issue: 5:1-11 아나니아·삽비라 사건의 어조 보존
  chosen_reading: 완곡어법을 피하고 본문의 가혹한 어조와 직접성을 유지(「빼돌리다」, 「쓰러져 죽다」 등)
  alternative_readings:
  - 「숨기다」, 「잠들다」
  rationale: 본 사건은 초기 교회에 임한 두려운 심판 사건으로, 본문이 의도하는 무게를 약화시키지 않기 위해 사도 베드로의 책망과 사망 사건을 직설적으로 옮긴다. 부드러운 의역으로 도덕적 충격을 완화하지 않는다.
  doctrine_reference: 'DOCTRINE.md §1·§5: 원문의 강한 의미를 약화시키지 않음'
