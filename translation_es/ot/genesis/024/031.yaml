translation:
  language: es
  text: 'Y le dijo[a]: «Entra, bendito de Yahvé. ¿Por qué estás de pie afuera? Yo he preparado la casa y un lugar para los camellos».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «bendito por Yahvé» o «oh bendito de Yahvé».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר
  english_pob_choice: And he said
  chosen_spanish: Y le dijo
  alternatives_spanish:
  - Entonces le dijo
  lexicon: HALOT
  rationale: La forma wayyiqtol avanza la narración; en español, «Y le dijo» conserva ese flujo narrativo natural sin añadir una relación temporal más fuerte de la que el hebreo exige.
- source_word: בּוֹא
  english_pob_choice: Come in
  chosen_spanish: Entra
  alternatives_spanish:
  - Ven adentro
  - Pasa
  lexicon: HALOT
  rationale: En este contexto de hospitalidad, el imperativo invita a ingresar a la casa. «Entra» comunica la acción implícita con naturalidad en español sin sobreexplicar.
- source_word: בְּרוּךְ יְהוָה
  english_pob_choice: blessed of Yahweh
  chosen_spanish: bendito de Yahvé
  alternatives_spanish:
  - bendecido por Yahvé
  - oh bendito de Yahvé
  lexicon: HALOT
  rationale: Se mantiene la estructura de participio pasivo + nombre divino como vocativo o fórmula de reconocimiento. «Bendito de Yahvé» es breve, fiel y refleja la solución de la POB con el nombre divino explícito.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  lexicon: HALOT
  rationale: 'Se conserva el Tetragrámaton con la forma doctrinal establecida por la POB en español: «Yahvé», en lugar de sustituirlo por un título como «SEÑOR».'
- source_word: לָמָּה תַעֲמֹד בַּחוּץ
  english_pob_choice: Why do you stand outside?
  chosen_spanish: ¿Por qué te quedas fuera?
  alternatives_spanish:
  - ¿Por qué estás afuera?
  - ¿Por qué permaneces fuera?
  lexicon: HALOT
  rationale: El hebreo expresa la situación de estar parado/retenerse afuera. «Te quedas fuera» suena natural en español y conserva la idea de permanecer en el exterior sin volverla excesivamente literal.
- source_word: וְאָנֹכִי
  english_pob_choice: I
  chosen_spanish: Yo ya
  alternatives_spanish:
  - Y yo
  - Yo
  lexicon: HALOT
  rationale: El pronombre enfático se reproduce con «Yo»; el «ya» ayuda a que el sentido de acción completada que sigue resulte fluido en español. No se fuerza un equivalente para la conjunción inicial en el segundo miembro.
- source_word: פִּנִּיתִי
  english_pob_choice: have prepared
  chosen_spanish: he preparado
  alternatives_spanish:
  - he despejado
  - he hecho espacio
  lexicon: HALOT
  rationale: Aunque el verbo puede significar «despejar» o «hacer lugar», en este contexto doméstico/hospitalario el resultado buscado es que el lugar esté listo. «He preparado» comunica el efecto sin perder el trasfondo de hacer espacio.
- source_word: הַבַּיִת
  english_pob_choice: the house
  chosen_spanish: la casa
  alternatives_spanish:
  - la vivienda
  - el hogar
  lexicon: HALOT
  rationale: «Casa» es el equivalente más directo y natural en español para בית en este contexto de alojamiento.
- source_word: וּמָקוֹם לַגְּמַלִּים
  english_pob_choice: and a place for the camels
  chosen_spanish: y un lugar para los camellos
  alternatives_spanish:
  - y espacio para los camellos
  - y sitio para los camellos
  lexicon: HALOT
  rationale: «Lugar» reproduce con sobriedad מקום, dejando implícito si se trata de espacio para descanso, amarre o resguardo, como en el hebreo.
theological_decisions:
- issue: Nombre divino en יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Jehová
  rationale: La política del proyecto es transliterar el nombre divino y no ocultarlo tras un sustituto. «Yahvé» preserva la referencia personal y pactal del Tetragrámaton en español.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה / YHWH → Yahvé'
translation_notes:
  revision_awareness: Se siguió el estado de revisión más reciente indicado como sin cambios; la versión española mantiene la misma decisión de fondo que el audit trail inglés, especialmente en el nombre divino y en la fórmula de bendición.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» de forma consistente para יְהוָה.
  - Se usa un registro digno y natural, evitando calcos innecesarios.
  - «Casa» y «lugar» conservan la sencillez concreta del hebreo sin añadir matices interpretativos no explícitos.
