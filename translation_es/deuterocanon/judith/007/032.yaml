    issue: El verbo «se dirigió» está en singular y distorsiona el sujeto de ἀπῆλθεν.
    rationale: Aunque el griego tiene forma singular, el rastro auditado del POB decidió correctamente un sentido plural/distributivo por contexto. En español, dejarlo singular hace pensar que él solo fue a los muros y torres, en vez de los dispersados.
  - severity: medium
    issue: «en su campamento» no refleja con naturalidad la dirección de εἰς.
    rationale: La preposición indica movimiento hacia el campamento, no mera localización dentro de él. «a su campamento» es más fiel y natural.
  - severity: low
    issue: La nota a menciona «como en el inglés auditado», formulación metatextual poco apropiada para una nota final.
    rationale: La nota debe explicar la decisión textual/semántica, no depender del proceso editorial en inglés. Puede simplificarse sin perder contenido.
  revised_spanish_text: Y dispersó al pueblo a su campamento[a], y fueron a los muros y a las torres de su ciudad, y envió a las mujeres y a los niños a sus casas; y estaban en gran humillación[b] en la ciudad.
  revised_footnotes:
