  - severity: medium
    issue: Hay dos notas donde el POB inglés conserva una sola nota textual principal.
    rationale: La segunda nota [b] contiene la información correcta; la primera duplica y desplaza indebidamente la dificultad textual. Conviene dejar una sola nota en la frase relevante para mantener claridad y fidelidad al expediente.
  - severity: low
