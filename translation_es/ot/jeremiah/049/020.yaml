translation:
  language: es
  text: 'Por tanto, oigan el consejo de Yahvé que ha planeado contra Edom[a], y sus pensamientos que ha ideado contra los habitantes de Temán: ciertamente los más pequeños del rebaño los arrastrarán[b]; ciertamente dejará desolado su pastizal[c] sobre ellos.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'el plan de Yahvé' o 'el propósito de Yahvé'. עֵצָה puede abarcar consejo, plan o propósito; se conserva 'consejo' en el texto principal.
    reason: lexical_alternative
  - marker: b
    text: O 'los más jóvenes del rebaño' o 'los menos importantes del rebaño'. La frase probablemente funciona de modo metafórico para los atacantes más débiles o insignificantes, pero se conserva la imagen del rebaño en el texto principal.
    reason: lexical_alternative
  - marker: c
    text: O 'su morada' o 'su redil'. El sustantivo hebreo puede referirse a un lugar de habitación o a una zona de pasto; el texto principal conserva la imaginería del rebaño en el versículo.
    reason: lexical_alternative
lexical_decisions:
- source_word: לָכֵן
  english_pob_choice: Therefore
  chosen_spanish: Por tanto
  alternatives_spanish:
  - Así que
  - Por eso
  lexicon: HALOT
  rationale: Expresa bien la conclusión profética en español sin sonar artificial; conserva la fuerza inferencial de la partícula.
- source_word: שִׁמְעוּ
  english_pob_choice: hear
  chosen_spanish: oigan
  alternatives_spanish:
  - escuchen
  - atiendan
  lexicon: HALOT
  rationale: El imperativo plural directo mantiene el tono profético de exhortación pública; 'oigan' es natural y solemne en español.
- source_word: עֲצַת יְהוָה
  english_pob_choice: the counsel of Yahweh
  chosen_spanish: el consejo de Yahvé
  alternatives_spanish:
  - el plan de Yahvé
  - el propósito de Yahvé
  lexicon: HALOT
  rationale: '''Consejo'' conserva la amplitud semántica de עֵצָה y mantiene la deliberación divina sin reducirla solo a ''plan''.'
- source_word: יָעַץ אֶל אֱדוֹם
  english_pob_choice: has planned against Edom
  chosen_spanish: ha planeado contra Edom
  alternatives_spanish:
  - ha aconsejado contra Edom
  - ha dispuesto respecto de Edom
  lexicon: HALOT
  rationale: En el contexto hostil, 'contra' refleja bien la dirección adversativa de אֶל; 'ha planeado' transmite la intención deliberada de forma idiomática.
- source_word: מַחְשְׁבוֹתָיו
  english_pob_choice: his thoughts
  chosen_spanish: sus pensamientos
  alternatives_spanish:
  - sus planes
  - sus designios
  lexicon: HALOT
  rationale: '''Pensamientos'' preserva la distinción léxica respecto de ''consejo'' y evita homogeneizar ambos sustantivos hebreos.'
- source_word: חָשַׁב
  english_pob_choice: has devised
  chosen_spanish: ha ideado
  alternatives_spanish:
  - ha planeado
  - ha concebido
  lexicon: HALOT
  rationale: '''Ideado'' comunica cálculo intencional y mantiene una diferencia estilística frente a ''ha planeado'' en la primera cola.'
- source_word: יֹשְׁבֵי תֵימָן
  english_pob_choice: the inhabitants of Teman
  chosen_spanish: los habitantes de Temán
  alternatives_spanish:
  - los que habitan en Temán
  - la gente de Temán
  lexicon: HALOT
  rationale: Es una traducción directa y formal del sintagma de constructo, apropiada para el discurso profético.
- source_word: אִם לֹא
  english_pob_choice: Surely
  chosen_spanish: ciertamente
  alternatives_spanish:
  - de seguro
  - en verdad
  lexicon: HALOT
  rationale: Aquí la construcción tiene valor enfático/asseverativo, no condicional; 'ciertamente' reproduce bien ese tono.
- source_word: יִסְחָבוּם
  english_pob_choice: will drag them away
  chosen_spanish: los arrastrarán
  alternatives_spanish:
  - los llevarán arrastrando
  - los sacarán a rastras
  lexicon: HALOT
  rationale: El verbo sugiere un arrastre violento; 'arrastrarán' es breve, fuerte y fiel a la imagen.
- source_word: צְעִירֵי הַצֹּאן
  english_pob_choice: the little ones of the flock
  chosen_spanish: los más pequeños del rebaño
  alternatives_spanish:
  - los jóvenes del rebaño
  - los menores del rebaño
  lexicon: HALOT
  rationale: '''Más pequeños'' preserva el matiz de pequeñez/insignificancia y mantiene la imagen del rebaño sin forzar una interpretación demasiado específica.'
- source_word: יַשִּׁים
  english_pob_choice: he will make
  chosen_spanish: hará
  alternatives_spanish:
  - pondrá
  - establecerá
  lexicon: HALOT
  rationale: En la construcción causativa, 'hará' resulta natural en español y refleja el valor resultativo del verbo.
- source_word: נְוֵהֶם
  english_pob_choice: their pasture
  chosen_spanish: su pastizal
  alternatives_spanish:
  - su morada
  - su redil
  lexicon: HALOT
  rationale: '''Pastizal'' conserva la imaginería pastoral del pasaje; en español suena más natural que un calco literal y sigue la decisión poética del texto fuente.'
- source_word: עֲלֵיהֶם
  english_pob_choice: over them
  chosen_spanish: sobre ellos
  alternatives_spanish:
  - encima de ellos
  - contra ellos
  lexicon: HALOT
  rationale: '''Sobre ellos'' refleja la preposición sin añadir una causalidad que el hebreo no expresa de forma explícita.'
theological_decisions:
- issue: Renderización del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahvéh
  - el SEÑOR
  rationale: La política del proyecto para el Tetragrámaton exige 'Yahvé' en el texto principal; se conserva el nombre propio del pacto en lugar de una sustitución reverencial.
  doctrine_reference: 'DOCTRINE.md: יְהוָה / YHWH'
- issue: Valor de אִם לֹא en la cláusula final
  english_pob_reading: Surely
  chosen_spanish_reading: ciertamente
  alternative_spanish_readings:
  - de seguro
  - sin duda
  rationale: La forma hebrea funciona aquí como aserción enfática profética, no como condición; el español debe reflejar esa certeza y no introducir duda.
  doctrine_reference: Notas de sintaxis profética para construcciones אִם לֹא
- issue: Imagen del rebaño en צְעִירֵי הַצֹּאן
  english_pob_reading: the little ones of the flock
  chosen_spanish_reading: los más pequeños del rebaño
  alternative_spanish_readings:
  - los más jóvenes del rebaño
  - los menos importantes del rebaño
  rationale: Se preserva la tensión interpretativa entre literalidad e imagen metafórica. El español admite 'más pequeños' como eco de tamaño/estatus sin borrar la metáfora pastoral.
  doctrine_reference: POB lexical policy on metaphor retention
translation_notes:
  revision_awareness: 'La redacción sigue el ajuste más reciente del audit trail: en la cola final se prefiere una preposición que refleje más de cerca עֲלֵיהֶם (''sobre/encima de ellos'') en lugar de una causalidad explícita. También se conserva la imagen pastoril del verso y la aserción enfática de אִם לֹא.'
  spanish_consistency_notes:
  - Se usa 'Yahvé' de manera consistente para יְהוָה.
  - Se mantiene 'consejo' para עֲצָה y 'pensamientos' para מַחְשְׁבוֹת', evitando colapsar ambos términos.
  - '''Rebaño'' y ''pastizal'' conservan la imaginería pastoral del verso.'
  - '''Ciertamente'' reproduce el valor enfático de אִם לֹא sin convertirlo en condicional.'
