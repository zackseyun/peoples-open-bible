theological_decisions:
- issue: 영원한 생명의 정의(definitio)를 보존
  chosen_reading: 「영원한 생명은 이것입니다. 곧 유일하신 참 하나님과, 아버지께서 보내신 예수 메시아를 아는 것입니다.」
  alternative_readings:
  - 「이것이 영생이니, 유일하신 참 하나님과 그가 보내신 예수 그리스도를 아는 것이니이다」
  rationale: 요한 신학의 핵심 정의문이다. 「~은 ~입니다」의 정의 구조를 명확히 보존하고, 「유일하신 참 하나님」과 「예수 메시아」의 두 대상을 평행으로 둔다.
  doctrine_reference: 'DOCTRINE.md: 요한 신학의 핵심 정의 보존'
