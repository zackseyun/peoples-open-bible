translation:
  language: es
  text: ¡Cuán hermosos son tus pies en sandalias, oh hija noble! Las curvas de tus muslos[a] son como joyas[b], obra de las manos de un maestro artesano.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «tus caderas» para «tus muslos». El término hebreo puede referirse de manera más amplia a la región de la cadera o del muslo.
    reason: lexical_alternative
  - marker: b
    text: O «ornamentos» o «collares» para «joyas». El hebreo probablemente alude a adornos preciosos trabajados.
    reason: lexical_alternative
lexical_decisions:
- source_word: מַה
  english_pob_choice: How
  chosen_spanish: ¡Cuán...!
  alternatives_spanish:
  - ¡Cómo...!
  - ¡Qué...!
  lexicon: HALOT
  rationale: El hebreo introduce una exclamación de admiración, no una pregunta. En español, «cuán» conserva mejor ese matiz enfático y solemne en una frase poética.
- source_word: יָּפ֧וּ
  english_pob_choice: beautiful
  chosen_spanish: hermosos
  alternatives_spanish:
  - bellos
  - bonitos
  lexicon: HALOT
  rationale: El adjetivo expresa belleza atractiva en contexto de alabanza poética. «Hermosos» es natural y digno en español actual.
- source_word: פְעָמַ֛יִךְ
  english_pob_choice: your feet
  chosen_spanish: tus pies
  alternatives_spanish:
  - tus pasos
  lexicon: HALOT
  rationale: Aunque el término puede abarcar también la idea de «pasos», con «sandalias» el sentido concreto de pies resulta el más directo y natural.
- source_word: בַּ/נְּעָלִ֖ים
  english_pob_choice: in sandals
  chosen_spanish: en sandalias
  alternatives_spanish:
  - con sandalias
  - calzadas con sandalias
  lexicon: HALOT
  rationale: La preposición con el sustantivo se vierte de forma idiomática como «en sandalias», preservando la imagen sin sobreexplicarla.
- source_word: בַּת נָדִ֑יב
  english_pob_choice: O noble daughter
  chosen_spanish: oh hija noble
  alternatives_spanish:
  - hija de noble linaje
  - oh hija del noble
  lexicon: HALOT
  rationale: Se conserva el vocativo elogioso y la compactación hebrea. «Hija noble» evita añadir una relación genealógica que el hebreo no exige explícitamente.
- source_word: חַמּוּקֵ֣י
  english_pob_choice: the curves
  chosen_spanish: las curvas
  alternatives_spanish:
  - los contornos redondeados
  - las redondeces
  lexicon: HALOT
  rationale: En este contexto corporal poético, «curvas» reproduce bien la idea de formas redondeadas y la valoración estética del original.
- source_word: יְרֵכַ֔יִךְ
  english_pob_choice: your thighs
  chosen_spanish: tus muslos
  alternatives_spanish:
  - tus caderas
  - tus lomos
  lexicon: HALOT
  rationale: «Muslos» es una opción clara y respetuosa en español para la forma dual, manteniendo la referencia corporal. Se preserva la alternativa amplia de la región cadera/muslo en la nota.
- source_word: כְּמ֣וֹ
  english_pob_choice: like
  chosen_spanish: como
  alternatives_spanish:
  - cual
  lexicon: HALOT
  rationale: Comparación estándar; «como» es la forma natural y fiel en español.
- source_word: חֲלָאִ֔ים
  english_pob_choice: jewels
  chosen_spanish: joyas
  alternatives_spanish:
  - ornamentos
  - collares
  lexicon: HALOT
  rationale: El término puede designar adornos preciosos. «Joyas» comunica con claridad el valor y la belleza artesanal sin decidir en exceso el objeto concreto.
- source_word: מַעֲשֵׂ֖ה יְדֵ֥י אָמָּֽן
  english_pob_choice: the work of the hands of a master craftsman
  chosen_spanish: obra de las manos de un maestro artesano
  alternatives_spanish:
  - trabajo de las manos de un hábil artesano
  - hechura de manos expertas
  lexicon: HALOT
  rationale: Se preserva la imagen de trabajo manual experto. «Maestro artesano» transmite habilidad y oficio; «obra de las manos» mantiene el hebraísmo sin resultar forzado.
translation_notes:
  revision_awareness: 'El borrador sigue de cerca el texto hebreo y el audit trail inglés, sin cambios respecto a la revisión más reciente: se mantiene el tono exclamativo, la metáfora corporal poética y la ambigüedad léxica principal en notas.'
  spanish_consistency_notes:
  - Se conserva «Yahvé» como norma del proyecto solo cuando aparezca el nombre divino; este versículo no lo contiene.
  - Se evita sustituir «muslos» por un eufemismo más general, porque el hebreo permite una referencia corporal concreta y el contexto poético la sostiene.
  - Se mantiene «joyas»/«ornamentos» como campo semántico abierto, sin fijar indebidamente el tipo exacto de adorno.
  - La puntuación exclamativa refleja el tono admirativo de la interjección hebrea.
