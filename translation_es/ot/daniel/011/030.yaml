  text: וּ/בָ֨אוּ ב֜/וֹ צִיִּ֤ים כִּתִּים֙ וְ/נִכְאָ֔ה וְ/שָׁ֛ב וְ/זָעַ֥ם עַל בְּרִֽית ק֖וֹדֶשׁ וְ/עָשָׂ֑ה וְ/שָׁ֣ב וְ/יָבֵ֔ן עַל עֹזְבֵ֖י בְּרִ֥ית קֹֽדֶשׁ־־־׃
base_translation:
  language: en
  yaml_path: translation/ot/daniel/011/030.yaml
  text: For ships of Kittim will come against him[a], and he will be disheartened. Then he will turn back and rage against the holy covenant, and he will act[b]. He will turn back and pay attention to those who forsake the holy covenant.
  footnotes:
  - marker: a
    text: Or 'ships from Kittim'; Kittim can refer to Cyprus or, more broadly, western maritime powers.
    reason: lexical_alternative
  - marker: b
    text: Or 'he will show regard for' those who forsake the holy covenant.
    reason: lexical_alternative
