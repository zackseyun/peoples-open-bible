translation:
  language: es
  text: Y Yahvé Dios hizo brotar de la tierra todo árbol agradable a la vista y bueno para comer[a], y el árbol de la vida en medio del jardín[b], y el árbol del conocimiento del bien y del mal.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «agradable a la vista».'
    reason: lexical_alternative
  - marker: b
    text: La expresión «el conocimiento del bien y del mal» se mantiene literal; los intérpretes discrepan sobre si alude a discernimiento moral, madurez o conocimiento integral.
    reason: alternative_reading
lexical_decisions:
- source_word: וַיַּצְמַח
  english_pob_choice: caused to grow
  chosen_spanish: hizo brotar
  alternatives_spanish:
  - hizo crecer
  - hizo surgir
  - hizo germinar
  lexicon: HALOT
  rationale: El hebreo es hiphil causativo de צמח, así que conviene una forma causativa en español. «Hizo brotar» comunica bien la acción de hacer salir vegetación desde la tierra sin volverla meramente intransitiva.
- source_word: יְהוָה אֱלֹהִים
  english_pob_choice: Yahweh God
  chosen_spanish: Yahvé Dios
  alternatives_spanish:
  - el Señor Dios
  - Jehová Dios
  lexicon: HALOT
  rationale: Se conserva el nombre divino como «Yahvé» según la directriz del proyecto; «Dios» mantiene el sustantivo hebreo אֱלֹהִים sin ocultar el nombre propio.
- source_word: מִן הָאֲדָמָה
  english_pob_choice: from the ground
  chosen_spanish: de la tierra
  alternatives_spanish:
  - del suelo
  - de la tierra cultivable
  - del terreno
  lexicon: HALOT
  rationale: אֲדָמָה puede referirse al suelo/tierra de donde brota la vegetación. «Tierra» es natural en español y respeta el marco del huerto de Edén.
- source_word: כָּל עֵץ
  english_pob_choice: every tree
  chosen_spanish: todo árbol
  alternatives_spanish:
  - cada árbol
  - todo tipo de árbol
  - toda clase de árbol
  lexicon: HALOT
  rationale: El singular colectivo hebreo se puede expresar en español con «todo árbol», preservando el sentido distributivo sin añadir una clasificación que el texto no da.
- source_word: נֶחְמָד לְמַרְאֶה
  english_pob_choice: pleasant to the sight
  chosen_spanish: agradable a la vista
  alternatives_spanish:
  - placentero a la vista
  - hermoso de ver
  - agradable para mirar
  lexicon: HALOT
  rationale: La expresión apunta a la atracción visual del árbol. «Agradable a la vista» es natural y mantiene la equivalencia formal sin forzar un valor interpretativo adicional.
- source_word: וְטוֹב לְמַאֲכָל
  english_pob_choice: and good for food
  chosen_spanish: y bueno para comer
  alternatives_spanish:
  - y bueno de comer
  - y bueno como alimento
  - y apto para comer
  lexicon: HALOT
  rationale: Se conserva la valoración de utilidad alimentaria con una frase clara y directa en español.
- source_word: וְעֵץ הַחַיִּים
  english_pob_choice: and the tree of life
  chosen_spanish: y el árbol de la vida
  alternatives_spanish:
  - y el árbol de vida
  lexicon: HALOT
  rationale: La construcción nominal está bien establecida en español como «árbol de la vida».
- source_word: בְּתוֹךְ הַגָּן
  english_pob_choice: in the midst of the garden
  chosen_spanish: en medio del jardín
  alternatives_spanish:
  - en medio del huerto
  - dentro del jardín
  - en el centro del jardín
  lexicon: HALOT
  rationale: «En medio de» transmite el valor locativo central de בְּתוֹךְ y suena natural en español. «Jardín» sigue la tradición de traducción de גָּן en este contexto.
- source_word: וְעֵץ הַדַּעַת טוֹב וָרָע
  english_pob_choice: and the tree of the knowledge of good and evil
  chosen_spanish: y el árbol del conocimiento del bien y del mal
  alternatives_spanish:
  - y el árbol del conocimiento de lo bueno y lo malo
  - y el árbol del conocimiento del bien y del mal
  lexicon: HALOT
  rationale: Se preserva la frase tradicional y literal del hebreo sin expandir su significado. «Bien y mal» mantiene la tensión interpretativa documentada por la POB en inglés.
theological_decisions:
- issue: Nombre divino YHWH
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el Señor
  - Jehová
  rationale: El texto hebreo usa יְהוָה directamente; siguiendo la directriz del proyecto, se translitera como «Yahvé» para no enmascarar el nombre divino con una convención litúrgica.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: El árbol del conocimiento de bien y mal
  english_pob_reading: Preserve the literal phrase without interpretive expansion
  chosen_spanish_reading: Preservar la frase literal sin ampliarla
  alternative_spanish_readings:
  - árbol del conocimiento moral
  - árbol del conocimiento de lo beneficioso y lo dañino
  - árbol del conocimiento total
  rationale: La frase hebrea es teológicamente cargada y admite varias lecturas; la versión española conserva la literalidad para no resolver la ambigüedad en el texto principal.
  doctrine_reference: DOCTRINE.md Translation philosophy §3 Preserve theological tension rather than resolve it
translation_notes:
  revision_awareness: Se tomó en cuenta la revisión más reciente del POB en inglés, que prefirió «pleasant to the sight» por sobre «desirable to look at». Por eso la redacción española usa «agradable a la vista», una equivalencia natural y formalmente cercana. También se preservó la decisión revisada de mantener literal «the tree of the knowledge of good and evil» sin expansión interpretativa.
  spanish_consistency_notes:
  - Se usó «Yahvé» para יְהוָה, coherente con la terminología del proyecto.
  - Se eligió «árbol de la vida» y «árbol del conocimiento del bien y del mal» como fórmulas estables y reconocibles en español.
  - «En medio del jardín» mantiene el valor locativo central de בְּתוֹךְ sin volverlo más específico de lo que dice el hebreo.
  - Se evitó traducir אֲדָמָה con una opción demasiado técnica; «tierra» conserva la referencia al suelo del que brota la vegetación.
