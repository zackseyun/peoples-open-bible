translation:
  language: es
  text: Y Judá fue derrotado delante de Israel, y cada hombre huyó a su tienda[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «cada uno huyó a su casa». El hebreo dice literalmente: «cada hombre a su tienda», una expresión idiomática común para retirarse a la propia morada.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּנָּגֶף
  english_pob_choice: was defeated
  chosen_spanish: fue derrotado
  alternatives_spanish:
  - fue vencido
  - fue derrotado en batalla
  - fue abatido
  lexicon: HALOT
  rationale: El nifal de נָגַף en este contexto militar expresa haber sido vencido o derrotado, no solo “golpeado” físicamente. “Fue derrotado” comunica bien la idea en español moderno y conserva el sentido bélico del hebreo.
- source_word: יְהוּדָה
  english_pob_choice: Judah
  chosen_spanish: Judá
  alternatives_spanish:
  - Judah
  lexicon: nombre propio
  rationale: Es el nombre propio del reino del sur; “Judá” es la forma establecida en español bíblico y corresponde al término hebreo.
- source_word: לִפְנֵי
  english_pob_choice: before
  chosen_spanish: delante de
  alternatives_spanish:
  - ante
  - en presencia de
  lexicon: HALOT
  rationale: En contexto de batalla, la expresión indica quedar vencido frente a un oponente. “Delante de” conserva la relación espacial del hebreo y su fuerza narrativa sin sonar rígido en español.
- source_word: יִשְׂרָאֵל
  english_pob_choice: Israel
  chosen_spanish: Israel
  alternatives_spanish:
  - Israel
  lexicon: nombre propio
  rationale: Nombre propio del reino del norte; se mantiene sin cambio.
- source_word: וַיָּנֻסוּ
  english_pob_choice: fled
  chosen_spanish: huyó
  alternatives_spanish:
  - escapó
  - tomó fuga
  - se dispersó
  lexicon: HALOT
  rationale: נוּס significa huir. En español, “huyó” transmite la acción de escape con naturalidad y concisión narrativa.
- source_word: אִישׁ
  english_pob_choice: each man
  chosen_spanish: cada hombre
  alternatives_spanish:
  - cada uno
  - cada persona
  - cada hombre
  lexicon: HALOT
  rationale: El singular distributivo indica que cada individuo se retiró por separado. “Cada hombre” preserva el matiz distributivo y la referencia masculina del hebreo.
- source_word: לְאָהֳלוֹ
  english_pob_choice: to his tent
  chosen_spanish: a su tienda
  alternatives_spanish:
  - a su casa
  - a su hogar
  lexicon: HALOT
  rationale: La imagen literal del hebreo es “a su tienda”. Aunque puede equivaler idiomáticamente a “a su casa”, se conserva el lenguaje concreto del texto fuente.
translation_notes:
  revision_awareness: Texto revisado a la luz del paquete fuente hebreo y del audit trail inglés; sin cambios de sentido respecto al consenso de revisión más reciente.
  spanish_consistency_notes:
  - Se mantiene el nombre divino según la política general del proyecto solo cuando aparece en el texto; aquí no ocurre.
  - “Judá” e “Israel” se conservan como nombres propios territoriales/monárquicos, no como referencias etnográficas genéricas.
  - La nota al pie preserva la alternativa idiomática documentada en el inglés POB sin sustituir la traducción principal literal.
