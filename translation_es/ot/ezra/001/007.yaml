translation:
  language: es
  text: Y el rey Ciro sacó los vasos de la casa de Yahvé[a], que Nabucodonosor había sacado[b] de Jerusalén y había puesto en la casa de su dios.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «la casa de Yahvé»; alternativamente, «el templo de Yahvé».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «había tomado de Jerusalén y colocado en la casa de su dios».'
    reason: lexical_alternative
lexical_decisions:
- source_word: הַמֶּלֶךְ כּוֹרֶשׁ
  english_pob_choice: King Cyrus
  chosen_spanish: el rey Ciro
  alternatives_spanish:
  - Ciro el rey
  lexicon: HALOT
  rationale: En español bíblico y general, la estructura natural es artículo + sustantivo + nombre propio. Se conserva el título real sin alterar el orden del hebreo más de lo necesario para la fluidez.
- source_word: הוֹצִיא
  english_pob_choice: brought out
  chosen_spanish: sacó
  alternatives_spanish:
  - hizo salir
  - trajo fuera
  lexicon: HALOT
  rationale: El valor causativo de יצא en este contexto permite «sacó». Es breve, natural y mantiene el paralelismo verbal entre la acción de Ciro y la de Nabucodonosor.
- source_word: כְּלֵי
  english_pob_choice: vessels
  chosen_spanish: los utensilios
  alternatives_spanish:
  - los vasos
  - los objetos
  lexicon: HALOT
  rationale: En contexto del templo, el término abarca instrumentos o piezas de servicio sagrado. «Utensilios» comunica el conjunto sin restringir indebidamente la forma de los objetos.
- source_word: בֵית יְהוָה
  english_pob_choice: the house of Yahweh
  chosen_spanish: la casa de Yahvé
  alternatives_spanish:
  - el templo de Yahvé
  - la casa del Señor
  lexicon: HALOT
  rationale: Se conserva la expresión literal «casa de» y el nombre divino «Yahvé», conforme al criterio del proyecto para el Tetragrámaton. «Templo» es posible, pero no reproduce tan directamente la formulación hebrea.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  lexicon: HALOT
  rationale: El nombre divino se translitera como «Yahvé», no como una sustitución titulada. Esto preserva el nombre personal del pacto según la pauta del proyecto.
- source_word: אֲשֶׁר
  english_pob_choice: which
  chosen_spanish: los cuales
  alternatives_spanish:
  - que
  - cuales
  lexicon: HALOT
  rationale: El relativo introduce una cláusula identificadora sobre los utensilios. «Los cuales» es suficientemente formal y evita ambigüedad de referencia en español.
- source_word: הוֹצִיא נְבֽוּכַדְנֶצַּר
  english_pob_choice: had brought out from Jerusalem
  chosen_spanish: había sacado Nabucodonosor de Jerusalén
  alternatives_spanish:
  - Nabucodonosor había sacado de Jerusalén
  - que Nabucodonosor había sacado de Jerusalén
  lexicon: HALOT
  rationale: Se conserva el verbo repetido con el mismo núcleo semántico («sacar»), reflejando la relación léxica del hebreo. El pluscuamperfecto expresa anterioridad respecto de la acción de Ciro.
- source_word: וַיִּתְּנֵם
  english_pob_choice: had put
  chosen_spanish: había puesto
  alternatives_spanish:
  - los había puesto
  - los colocó
  lexicon: HALOT
  rationale: «Puso»/«había puesto» recoge el sentido de depositar o colocar, y encaja con la frase siguiente. El pluscuamperfecto mantiene la referencia a una acción previa.
- source_word: בְּבֵית אֱלֹהָיו
  english_pob_choice: in the house of his god
  chosen_spanish: en la casa de su dios
  alternatives_spanish:
  - en el templo de su dios
  - en la casa de su deidad
  lexicon: HALOT
  rationale: Se conserva el singular con sufijo posesivo («su dios»), sin generalizar a plural ni suavizar la contraposición entre Yahvé y la deidad de Nabucodonosor.
theological_decisions:
- issue: Renderización del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Jehová
  - el SEÑOR
  rationale: La pauta del proyecto exige transliterar el nombre del pacto. «Yahvé» mantiene la referencia personal del texto y evita la sustitución por un título genérico.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Contraste entre la casa de Yahvé y la casa de su dios
  english_pob_reading: the house of Yahweh ... the house of his god
  chosen_spanish_reading: la casa de Yahvé ... la casa de su dios
  alternative_spanish_readings:
  - la casa del Señor ... la casa de su dios
  - el templo de Yahvé ... el templo de su dios
  rationale: Se preserva el contraste explícito entre el santuario de Israel y la residencia cultual de la divinidad de Nabucodonosor, sin homogeneizar ambos referentes.
  doctrine_reference: 'DOCTRINE.md: Preserve source contrasts and singular/plural force where relevant'
translation_notes:
  revision_awareness: El contexto de auditoría en inglés no reporta revisiones aplicadas y el consenso de revisión es alto/agreed. Esta redacción sigue la decisión estable de mantener el paralelismo verbal de «sacar» para ambos sujetos y el pluscuamperfecto para las acciones anteriores de Nabucodonosor.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» de forma consistente para יְהוָה, conforme al criterio del proyecto.
  - Se conserva el contraste singular «su dios» sin pluralizar ni neutralizar la referencia.
  - Se usa un registro bíblico moderno y claro, evitando calcos innecesarios pero sin paraphrasear el contenido factual del verso.
