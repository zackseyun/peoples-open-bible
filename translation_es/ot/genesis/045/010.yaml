translation:
  language: es
  text: Habitarás en la tierra de Gosén, y estarás cerca de mí—tú, tus hijos, tus nietos, tus rebaños, tus manadas y todo lo que tienes.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: וְיָשַׁבְתָּ
  english_pob_choice: you shall live
  chosen_spanish: habitarás
  alternatives_spanish:
  - vivirás
  - te establecerás
  - morarás
  lexicon: HALOT
  rationale: El verbo ישׁב puede significar residir, habitar o establecerse. En este contexto no se trata de mera permanencia abstracta, sino de residencia concreta en una tierra asignada; por eso "habitarás" conserva el sentido de asentamiento estable sin sonar tan moderno como "vivirás" ni tan legal como "te establecerás".
- source_word: בְאֶרֶץ גֹּשֶׁן
  english_pob_choice: in the land of Goshen
  chosen_spanish: en la tierra de Gosén
  alternatives_spanish:
  - en Gosén
  - en la región de Gosén
  - en la tierra de Gosen
  lexicon: HALOT
  rationale: אֶרֶץ puede ser "tierra" o "región". Se mantiene "la tierra de Gosén" para conservar la construcción hebrea y la referencia geográfica específica, con el nombre propio transliterado de manera estable al español bíblico.
- source_word: וְהָיִיתָ קָרוֹב אֵלַי
  english_pob_choice: and you shall be near me
  chosen_spanish: y estarás cerca de mí
  alternatives_spanish:
  - y estarás junto a mí
  - y me quedarás cerca
  - y estarás próximo a mí
  lexicon: HALOT
  rationale: La construcción con היה + קָרוֹב expresa un estado resultante de cercanía. "Estarás cerca de mí" es natural en español y conserva la proximidad personal prometida por José.
- source_word: אַתָּה
  english_pob_choice: you
  chosen_spanish: tú
  alternatives_spanish:
  - tú mismo
  - usted
  lexicon: HALOT
  rationale: El pronombre independiente aporta énfasis. En español se refleja mejor con la dislocación y la lista siguiente, sin añadir una fórmula pesada como "tú mismo". Se usa "tú" por el tono directo del pasaje.
- source_word: וּבָנֶיךָ
  english_pob_choice: and your sons
  chosen_spanish: tus hijos
  alternatives_spanish:
  - tus hijos varones
  - tus hijos (varones)
  - tus niños
  lexicon: HALOT
  rationale: בנים es masculino plural; sin embargo, en español bíblico y narrativo, "hijos" puede abarcar los descendientes varones inmediatos de forma natural. Se evita "niños" por edad y "hijos varones" por pesadez, conservando el valor genealógico del contexto.
- source_word: וּבְנֵי בָנֶיךָ
  english_pob_choice: and your grandsons
  chosen_spanish: los hijos de tus hijos
  alternatives_spanish:
  - tus nietos
  - tus nietos varones
  - los hijos de tus hijos varones
  lexicon: HALOT
  rationale: La expresión hebrea es literalmente "los hijos de tus hijos". Aunque "nietos" sería el equivalente idiomático, aquí se conserva la estructura genealógica para no perder la correspondencia formal con el hebreo y el paralelismo del verso.
- source_word: וְצֹאנְךָ
  english_pob_choice: and your flocks
  chosen_spanish: tus rebaños
  alternatives_spanish:
  - tus ovejas
  - tu ganado menor
  - tus rebaños de ovejas y cabras
  lexicon: HALOT
  rationale: צֹאן es un colectivo de ganado menor, especialmente ovejas y cabras. "Rebaños" es un colectivo natural en español que preserva esa idea sin detallar especies que el hebreo no especifica aquí.
- source_word: וּבְקָרְךָ
  english_pob_choice: and your herds
  chosen_spanish: tus ganados
  alternatives_spanish:
  - tu ganado
  - tus reses
  - tus vacas
  lexicon: HALOT
  rationale: בקר designa ganado mayor, especialmente vacuno. Se eligió "ganados" para mantener el paralelismo con "rebaños" y conservar el sentido colectivo del hebreo; "tu ganado" también sería posible, pero el plural ayuda al ritmo enumerativo del verso.
- source_word: וְכָל אֲשֶׁר לָךְ
  english_pob_choice: and all that you have
  chosen_spanish: y todo lo que tienes
  alternatives_spanish:
  - y todo lo que es tuyo
  - y todo lo que posees
  - y todo cuanto te pertenece
  lexicon: HALOT
  rationale: La frase es amplia e idiomática. "Todo lo que tienes" es claro, natural y suficientemente inclusivo para abarcar posesiones y bienes sin sobrecargar el español.
theological_decisions:
- issue: Inclusión del tono de cercanía personal sin atenuarlo
  english_pob_reading: and you shall be near me
  chosen_spanish_reading: y estarás cerca de mí
  alternative_spanish_readings:
  - y quedarás cerca de mí
  - y estarás junto a mí
  rationale: El texto no sólo promete una ubicación geográfica, sino cercanía relacional con José. Se conserva esa dimensión personal con una formulación directa y sobria, sin convertirla en una cercanía afectiva añadida que el hebreo no explicita.
  doctrine_reference: Lectura contextual de la relación familiar y providencial en Génesis 45; no hay doctrina dogmática implicada, sino sensibilidad narrativa.
- issue: Tratamiento de los descendientes masculinos
  english_pob_reading: your sons and your grandsons
  chosen_spanish_reading: tus hijos, los hijos de tus hijos
  alternative_spanish_readings:
  - tus hijos y tus nietos
  - tus hijos varones y tus nietos varones
  rationale: El hebreo distingue entre hijos e hijos de hijos. Aunque "nietos" sería idiomático, la forma elegida evita borrar la estructura genealógica y mantiene visible la progresión del linaje que el versículo enumera.
  doctrine_reference: Genealogía y continuidad del linaje familiar en la narrativa patriarcal de Génesis.
translation_notes:
  revision_awareness: La versión española sigue de cerca el hebreo de Génesis 45:10 y armoniza con la decisión inglesa POB de conservar la residencia en Gosén, la cercanía personal y la enumeración completa de familia y bienes. No se aplicaron revisiones previas; el texto permanece estable respecto al sentido del original.
  spanish_consistency_notes:
  - Se mantiene "Gosén" como transliteración estable del topónimo.
  - Se usa "rebaños" y "ganados" para conservar el paralelismo colectivo de צֹאן / בקר.
  - Se evita "SEÑOR" porque el versículo no contiene el Tetragrámaton ni κύριος.
  - La frase final "todo lo que tienes" conserva la amplitud idiomática de וְכָל אֲשֶׁר לָךְ.
  - 'El orden de la lista reproduce el énfasis del hebreo: tú, tu descendencia, tu ganado menor, tu ganado mayor y todo lo demás.'
