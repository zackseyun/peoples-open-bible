  yaml_path: translation/deuterocanon/2_maccabees/015/021.yaml
  text: When Maccabeus saw the presence of the crowds[a], the varied array of weapons, and the savagery of the beasts positioned advantageously, he stretched out his hands to heaven and called on the wonder-working Lord, knowing that victory is not secured by weapons, but that, whenever it is judged right by him[b], he grants it to those who are worthy.
