translation:
  language: es
  text: Entonces el rey del norte volverá y levantará una multitud mayor que la anterior[a]; y al fin de los tiempos, después de algunos años[b], sin duda vendrá con un gran ejército y con muchos recursos[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'También puede traducirse: «una gran multitud», porque el hebreo puede subrayar tanto el tamaño como el número.'
    reason: lexical_alternative
  - marker: b
    text: 'También puede traducirse: «al fin de los tiempos señalados, después de años». La expresión hebrea es condensada y puede sugerir que un período fijado ha llegado a su fin.'
    reason: lexical_alternative
  - marker: c
    text: 'También puede traducirse: «con grandes suministros», porque el hebreo puede referirse de manera amplia a posesiones o recursos que acompañan la campaña.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְשָׁב
  english_pob_choice: Then ... will return
  chosen_spanish: Entonces ... volverá
  alternatives_spanish:
  - Y ... volverá
  - Luego ... volverá
  lexicon: HALOT
  rationale: שׁוּב en qal significa ‘volver/retornar’. ‘Entonces’ conserva la secuencia narrativa que el POB inglés expresa con ‘Then’ y suena natural en español.
- source_word: מֶלֶךְ הַצָּפוֹן
  english_pob_choice: the king of the north
  chosen_spanish: el rey del norte
  alternatives_spanish:
  - el rey septentrional
  - el rey del norte
  lexicon: HALOT
  rationale: Se mantiene el título direccional tradicional del capítulo. ‘Del norte’ es claro y fiel; ‘septentrional’ sería más marcado y menos natural.
- source_word: וְהֶעֱמִיד הָמוֹן רַב
  english_pob_choice: will raise a multitude
  chosen_spanish: levantará una multitud
  alternatives_spanish:
  - reunirá una multitud
  - levantaría una multitud
  lexicon: HALOT
  rationale: El hiphil de עמד aquí implica hacer que una fuerza quede formada/levantada. ‘Levantará’ conserva la fuerza del movimiento de reunir y disponer tropas o gente.
- source_word: הָמוֹן רַב
  english_pob_choice: a multitude
  chosen_spanish: una multitud
  alternatives_spanish:
  - una gran multitud
  - un gran ejército
  lexicon: HALOT
  rationale: ‘Multitud’ preserva la amplitud léxica de הָמוֹן. Como el contexto es militar, el sentido de hoste queda apoyado por la frase posterior ‘con un gran ejército’.
- source_word: מִן הָרִאשׁוֹן
  english_pob_choice: greater than the former one
  chosen_spanish: mayor que la primera
  alternatives_spanish:
  - mayor que la anterior
  - más grande que la primera
  lexicon: HALOT
  rationale: La comparación con la formación previa se expresa naturalmente con ‘la primera’ en español. ‘Mayor’ preserva tanto cantidad como tamaño, como indica la nota inglesa sobre el doble matiz del hebreo.
- source_word: וּלְקֵץ הָעִתִּים שָׁנִים
  english_pob_choice: at the end of the times, after some years
  chosen_spanish: al fin de los tiempos, después de algunos años
  alternatives_spanish:
  - al final de los tiempos, tras algunos años
  - al término de los tiempos, después de unos años
  lexicon: HALOT
  rationale: La frase hebrea es comprimida. ‘Al fin de los tiempos’ conserva קֵץ + עִתִּים sin forzar una reinterpretación; ‘después de algunos años’ refleja שָׁנִים como tiempo transcurrido.
- source_word: יָבוֹא בּוֹא
  english_pob_choice: he will surely come
  chosen_spanish: sin duda vendrá
  alternatives_spanish:
  - ciertamente vendrá
  - vendrá, sin falta
  lexicon: HALOT
  rationale: El verbo finito con infinitivo absoluto intensifica la acción. ‘Sin duda vendrá’ transmite con naturalidad la certeza enfática del hebreo.
- source_word: בְּחַיִל גָּדוֹל
  english_pob_choice: with a great army
  chosen_spanish: con un gran ejército
  alternatives_spanish:
  - con un gran poderío
  - con una gran fuerza
  lexicon: HALOT
  rationale: En contexto militar, חַיִל se entiende mejor como ‘ejército’. ‘Gran’ conserva גָּדוֹל y evita perder el matiz bélico de la escena.
- source_word: וּבִרְכוּשׁ רָב
  english_pob_choice: and with much equipment
  chosen_spanish: y con mucho equipo
  alternatives_spanish:
  - y con muchos suministros
  - y con muchas provisiones
  - y con muchos bienes
  lexicon: HALOT
  rationale: רְכוּשׁ puede referirse a bienes, recursos o provisiones acompañantes de una campaña. ‘Equipo’ sigue la decisión inglesa de un término amplio y militarmente pertinente; ‘suministros’ también es posible.
translation_notes:
  revision_awareness: 'Se siguió la lectura del POB inglés sin cambios sustanciales: se mantuvo la secuencia narrativa, la comparación con la fuerza previa, la intensificación verbal con infinitivo absoluto y la amplitud semántica de רְכוּשׁ. No se detectaron revisiones aplicadas en el pass más reciente.'
  spanish_consistency_notes:
  - Se conserva ‘rey del norte’ como título direccional estable en el libro.
  - Se optó por ‘multitud’ y no por ‘ejército’ en la primera cola para mantener la amplitud del hebreo; el contexto militar queda aclarado por la segunda cola.
  - ‘Equipo’ se usa en sentido amplio de recursos/materiales de campaña, no en el sentido moderno técnico de utensilios individuales.
