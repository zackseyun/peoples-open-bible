translation:
  language: es
  text: Y Tobit, su padre, contaba cada día.[a]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El griego de esta página está textual y recensionalmente saturado; aquí se traduce solo la unidad clara de esta cláusula, siguiendo la nota auditada en inglés.
    reason: textual_variant
lexical_decisions:
- source_word: Τωβεὶθ ὁ πατὴρ αὐτοῦ
  english_pob_choice: Tobit his father
  chosen_spanish: Tobit, su padre
  alternatives_spanish:
  - su padre Tobit
  - Tobit, el padre de él
  lexicon: LSJ
  rationale: La apposición griega identifica a Tobit como el padre de quien se habla. En español, «Tobit, su padre» conserva la relación familiar sin forzar el orden ni introducir ambigüedad innecesaria.
- source_word: ἐλογίζετο
  english_pob_choice: was counting
  chosen_spanish: contaba
  alternatives_spanish:
  - estaba contando
  - iba contando
  - calculaba
  lexicon: LSJ
  rationale: El imperfecto expresa acción repetida y continua. «Contaba» transmite de manera natural la idea de ir llevando la cuenta de los días, sin perder la iteración del original.
- source_word: ἑκάστης ἡμέρας
  english_pob_choice: every day
  chosen_spanish: cada día
  alternatives_spanish:
  - todos los días
  - día tras día
  lexicon: LSJ
  rationale: La expresión distributiva pide una equivalencia sencilla y idiomática. «Cada día» conserva la repetición cotidiana que destaca el texto.
theological_decisions:
- issue: No hay tensión doctrinal explícita en este versículo; solo se conserva el tono narrativo y la persistencia del duelo/espera implícita en el contexto inmediato.
  english_pob_reading: And Tobit his father was counting every day.
  chosen_spanish_reading: Y Tobit, su padre, contaba cada día.
  alternative_spanish_readings:
  - Y Tobit, su padre, estaba contando cada día.
  - Y Tobit, su padre, iba contando cada día.
  rationale: La elección mantiene el valor aspectual del imperfecto y la repetición diaria sin añadir interpretación teológica no presente en el segmento traducido.
  doctrine_reference: No aplica; versículo narrativo sin contenido doctrinal directo.
translation_notes:
  revision_awareness: La versión inglesa revisada cambió «each day» por «every day» para mayor naturalidad. En español, «cada día» ofrece esa misma naturalidad y conserva la repetición distributiva del griego. El texto fuente griego muestra material superpuesto en esta página, por lo que la traducción se limita al sintagma claro correspondiente al versículo solicitado.
  spanish_consistency_notes:
  - Se usa «Tobit» para el nombre propio según la tradición del libro.
  - Se evita una paráfrasis expansiva porque el testimonio griego de este punto es una cláusula breve y clara.
  - «Cada día» mantiene la repetición frecuente sin sonar mecánico en español.
