translation:
  language: es
  text: Y consagrarás el pecho de la ofrenda mecida y el muslo de la contribución[a], que fue mecido y que fue alzado, del carnero de la investidura[b], de lo que pertenecía a Aarón y de lo que pertenecía a sus hijos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «el muslo de la ofrenda alzada»; tradicionalmente, «la ofrenda elevada».
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «el carnero de las llenaduras»; es un modismo para el carnero usado en la ceremonia de investidura o consagración.'
    reason: cultural_note
lexical_decisions:
- source_word: קִדַּשְׁתָּ
  english_pob_choice: you shall consecrate
  chosen_spanish: consagrarás
  alternatives_spanish:
  - santificarás
  - harás santo
  lexicon: HALOT
  rationale: 'En este contexto ritual, el verbo pide un valor cultual concreto: apartar para uso sagrado. «Consagrar» comunica mejor esa acción en español moderno que «santificar», que puede sonar más abstracto.'
- source_word: חֲזֵה
  english_pob_choice: breast
  chosen_spanish: pecho
  alternatives_spanish:
  - pechuga
  - pecho del animal
  lexicon: HALOT
  rationale: Para la porción sacrificial del animal, «pecho» es natural y transparente en español, y evita introducir una palabra demasiado técnica o poco idiomática.
- source_word: תְּנוּפָה
  english_pob_choice: wave offering
  chosen_spanish: ofrenda mecida
  alternatives_spanish:
  - ofrenda movida
  - ofrenda de mecimiento
  lexicon: HALOT
  rationale: La POB en inglés retiene la acción ritual visible del sustantivo. «Ofrenda mecida» preserva esa relación con el verbo posterior y suena más claro en español que calcos más pesados.
- source_word: שׁוֹק
  english_pob_choice: thigh
  chosen_spanish: pierna
  alternatives_spanish:
  - muslo
  - parte trasera
  lexicon: HALOT
  rationale: Aunque «muslo» puede ser posible, «pierna» funciona mejor para el reparto anatómico de la pieza y resulta más inteligible para lectores generales sin perder el sentido de porción del animal.
- source_word: תְּרוּמָה
  english_pob_choice: contribution
  chosen_spanish: ofrenda alzada
  alternatives_spanish:
  - ofrenda elevada
  - ofrenda presentada
  lexicon: HALOT
  rationale: El hebreo enlaza el sustantivo con el verbo «alzar/levantar». «Ofrenda alzada» conserva esa conexión directa y refleja la decisión inglesa de no diluir el término en una expresión genérica.
- source_word: הוּנַף
  english_pob_choice: was waved
  chosen_spanish: fue mecida
  alternatives_spanish:
  - fue movida
  - fue presentada meciéndola
  lexicon: HALOT
  rationale: Mantiene el paralelismo con תְּנוּפָה y expresa la acción ritual sin perder la concreción del texto.
- source_word: הוּרָם
  english_pob_choice: was raised
  chosen_spanish: fue alzada
  alternatives_spanish:
  - fue levantada
  - fue elevada
  lexicon: HALOT
  rationale: «Alzada» conserva el vínculo verbal con תְּרוּמָה y sigue de cerca la estructura del hebreo.
- source_word: אֵיל הַמִּלֻּאִים
  english_pob_choice: the ram of ordination
  chosen_spanish: el carnero de la investidura
  alternatives_spanish:
  - el carnero de la ordenación
  - el carnero de la consagración
  lexicon: HALOT
  rationale: La POB inglesa explicó el idiomático «ram of fillings» como el carnero usado en la ceremonia de instalación sacerdotal. «Investidura» transmite bien esa idea de nombramiento/instalación en español y evita una paráfrasis más larga.
- source_word: לְאַהֲרֹן וּמֵאֲשֶׁר לְבָנָיו
  english_pob_choice: from what was Aaron's and from what was his sons'.
  chosen_spanish: de lo que era de Aarón y de lo que era de sus hijos
  alternatives_spanish:
  - de lo que pertenecía a Aarón y de lo que pertenecía a sus hijos
  - de la parte de Aarón y de la parte de sus hijos
  lexicon: HALOT
  rationale: La construcción posesiva reproduce de cerca el hebreo y sigue la revisión inglesa, que prefirió una formulación breve y directa. «Era de» evita sobreinterpretar la distribución exacta de la porción.
theological_decisions:
- issue: Términos sacrificiales técnicos y su transparencia
  english_pob_reading: Retain concrete ritual language ('wave offering,' 'contribution,' 'was waved,' 'was raised') rather than flattening into generic dedication language.
  chosen_spanish_reading: Conservar lenguaje ritual concreto («ofrenda mecida», «ofrenda alzada», «fue mecida», «fue alzada») en vez de generalizarlo a una idea vaga de dedicación.
  alternative_spanish_readings:
  - «ofrenda de presentación»
  - «porción especial»
  - «dedicada»
  rationale: El versículo es legislación sacerdotal procedimental; la terminología concreta mantiene visible el paralelismo entre sustantivos y verbos del hebreo y evita ocultar el lenguaje técnico del rito.
  doctrine_reference: Éxodo 29:27; principios de transparencia cultual y correspondencia léxica en traducción bíblica
- issue: Cómo traducir el idiomático אֵיל הַמִּלֻּאִים
  english_pob_reading: Hebrew 'the ram of fillings,' an idiom for the ram used in ordination/consecration.
  chosen_spanish_reading: «El carnero de la investidura» con nota explicativa sobre el valor idiomático del hebreo.
  alternative_spanish_readings:
  - «el carnero de la ordenación»
  - «el carnero de la consagración»
  rationale: «Investidura» comunica la instalación ceremonial sin reducir el sentido a un solo matiz. La nota preserva la tensión entre el hebreo idiomático y la aclaración interpretativa ya documentada por la POB inglesa.
  doctrine_reference: Éxodo 29:27; nota cultural sobre el rito de investidura sacerdotal
translation_notes:
  revision_awareness: La versión inglesa más reciente ajustó «contribution offering» a «contribution» para acercarse más al hebreo y suavizó las posesiones finales a «from what was Aaron's and from what was his sons'.» Esta redacción española sigue esa revisión con «ofrenda alzada» y la posesión breve «de lo que era de Aarón y de lo que era de sus hijos», manteniendo la transparencia cultual y la economía expresiva.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como convención general del proyecto solo cuando aparece el tetragrámaton; en este versículo no aparece el nombre divino.
  - «Ofrenda mecida» y «ofrenda alzada» conservan el paralelismo hebreo entre sustantivo y verbo.
  - «Carnero» se usa aquí para el animal sacrificial, en armonía con el registro cultual del pasaje.
  - No se emplea «siervo» ni «Cristo» porque no corresponden al contenido léxico de este versículo.
