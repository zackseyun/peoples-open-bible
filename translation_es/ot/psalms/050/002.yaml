translation:
  language: es
  text: Desde Sión[a], la perfección de la belleza, Dios resplandece.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «De Sión, la perfección de la belleza, Dios ha resplandecido» o «Desde Sión, en perfecta belleza, Dios resplandece».
    reason: alternative_reading
lexical_decisions:
- source_word: מִצִּיּוֹן
  english_pob_choice: From Zion
  chosen_spanish: Desde Sion
  alternatives_spanish:
  - De Sion
  - Desde Sión
  lexicon: HALOT
  rationale: El hebreo usa מִן para indicar origen o procedencia. «Desde» conserva ese valor de procedencia de manera natural en español y mantiene el movimiento de aparición que tiene el verso.
- source_word: מִכְלַל
  english_pob_choice: the perfection of
  chosen_spanish: la perfección de
  alternatives_spanish:
  - la plenitud de
  - la consumación de
  - la corona de
  lexicon: HALOT
  rationale: En construcción con יֹפִי, el sustantivo expresa plenitud, culminación o belleza consumada. «La perfección de» sigue de cerca la decisión inglesa y conserva el tono poético sin forzar una glosa interpretativa.
- source_word: יֹפִי
  english_pob_choice: beauty
  chosen_spanish: belleza
  alternatives_spanish:
  - esplendor
  - hermosura
  lexicon: HALOT
  rationale: «Belleza» es el equivalente más directo y claro en español. Mantiene el valor estético del término sin desplazarlo hacia un matiz más luminoso que el hebreo no exige por sí mismo.
- source_word: אֱלֹהִים
  english_pob_choice: God
  chosen_spanish: Dios
  alternatives_spanish:
  - dioses
  lexicon: HALOT
  rationale: Aunque la forma es plural, el verbo singular muestra que aquí es singular en sentido. Por eso se traduce «Dios», conforme al análisis del texto fuente y al audit trail inglés.
- source_word: הוֹפִיעַ
  english_pob_choice: shines forth
  chosen_spanish: resplandece
  alternatives_spanish:
  - brilla
  - se manifiesta con esplendor
  - ha resplandecido
  lexicon: HALOT
  rationale: El hifil de יפע puede expresar aparecer con resplandor o manifestarse con brillo. «Resplandece» conserva la imagen visual y poética en español, y funciona bien como presente poético, tal como en la decisión inglesa.
theological_decisions:
- issue: Relación de «la perfección de la belleza» con Sion o con Dios
  english_pob_reading: 'Treat the phrase appositionally with Zion: ''From Zion, the perfection of beauty, God shines forth.'''
  chosen_spanish_reading: 'La frase se toma en aposición con Sion: «Desde Sion, la perfección de la belleza, Dios resplandece.»'
  alternative_spanish_readings:
  - Desde Sion, en perfecta belleza, Dios resplandece.
  - Desde Sion, la perfección de belleza, Dios resplandece.
  rationale: 'La secuencia hebrea se lee con mayor naturalidad como una descripción de Sion: Sion queda identificada como «la perfección de la belleza». Esto conserva la tensión poética sin convertir la frase en una descripción más directa de Dios de lo que el sintagma exige.'
  doctrine_reference: Translation philosophy §3 (preserve theological tension rather than resolve it)
translation_notes:
  revision_awareness: 'La revisión más reciente no introdujo cambios: el texto fuente y la auditoría inglesa se mantienen en alto acuerdo, por lo que la redacción española sigue de cerca esa lectura estable.'
  spanish_consistency_notes:
  - Se mantiene «Sion» sin tilde para la forma bíblica usual en español.
  - Se usa «Dios» en singular por el verbo singular del hebreo, aunque אֱלֹהִים tenga forma plural.
  - «Resplandece» conserva el valor poético de aparición radiante sin añadir un pasado explícito.
  - La nota al pie recoge alternativas reales de la auditoría inglesa y una reformulación española equivalente.
