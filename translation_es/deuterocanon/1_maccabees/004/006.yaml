translation:
  language: es
  text: Y al amanecer apareció Judas en la llanura con tres mil hombres; pero no tenían protección ni espadas[a], como querían.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «no tenían protección y una espada, como querían». El griego tiene el singular μάχαιραν, que puede entenderse colectivamente.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἅμα ἡμέρᾳ
  english_pob_choice: at daybreak
  chosen_spanish: al amanecer
  alternatives_spanish:
  - con el día
  - cuando llegó el día
  - al despuntar el día
  lexicon: LSJ
  rationale: La locución griega expresa la llegada de la luz del día. «Al amanecer» comunica de forma natural esa fuerza temporal sin calcar la estructura griega.
- source_word: ὤφθη
  english_pob_choice: appeared
  chosen_spanish: apareció
  alternatives_spanish:
  - fue visto
  - vino a la vista
  lexicon: LSJ
  rationale: Aunque literalmente puede entenderse como «fue visto», en este contexto narrativo describe la llegada visible de Judas. «Apareció» conserva la función idiomática de forma clara en español.
- source_word: ἐν τῷ πεδίῳ
  english_pob_choice: in the plain
  chosen_spanish: en la llanura
  alternatives_spanish:
  - en el campo
  - sobre la llanura
  lexicon: LSJ
  rationale: πέδιον designa una llanura o terreno llano. «Llanura» evita el matiz agrícola de «campo» y encaja mejor con el contexto militar.
- source_word: ἐν τρισχιλίοις ἀνδράσιν
  english_pob_choice: with three thousand men
  chosen_spanish: con tres mil hombres
  alternatives_spanish:
  - entre tres mil hombres
  - con tres mil guerreros
  lexicon: LSJ
  rationale: La preposición indica compañía o fuerza acompañante. «Con tres mil hombres» reproduce de manera natural el sentido militar.
- source_word: πλὴν
  english_pob_choice: but
  chosen_spanish: pero
  alternatives_spanish:
  - sin embargo
  - no obstante
  - sólo
  lexicon: LSJ
  rationale: Aquí introduce un contraste limitativo respecto de la fuerza de Judas. «Pero» comunica bien la oposición sin añadir matices innecesarios.
- source_word: καλύμματα
  english_pob_choice: armor
  chosen_spanish: armaduras
  alternatives_spanish:
  - protecciones
  - equipamiento defensivo
  - escudos
  lexicon: LSJ
  rationale: Aunque el sustantivo literalmente significa «coberturas», en este contexto bélico se refiere a equipo defensivo. «Armaduras» expresa ese sentido de forma comprensible, y el plural ayuda a reflejar el plural griego.
- source_word: μάχαιραν
  english_pob_choice: swords
  chosen_spanish: espadas
  alternatives_spanish:
  - una espada
  - sable
  lexicon: LSJ
  rationale: El griego tiene singular, pero el contexto permite un sentido colectivo o distributivo; el audit trail inglés también optó por plural por naturalidad. En español, «espadas» refleja ese valor colectivo sin perder la tensión textual.
- source_word: καθὼς ἠβούλοντο
  english_pob_choice: as they wished
  chosen_spanish: como querían
  alternatives_spanish:
  - como deseaban
  - según querían
  lexicon: LSJ
  rationale: La cláusula indica que su equipo no alcanzaba lo que ellos deseaban. «Como querían» es natural, fiel y suficientemente sobrio para el tono narrativo.
translation_notes:
  revision_awareness: El inglés POB revisó la última cláusula desde «a sword» a «swords» para reflejar mejor el sentido colectivo del singular griego y la naturalidad narrativa. La versión española sigue esa misma decisión auditada y la explica en nota para no ocultar la tensión entre singular griego y plural de sentido.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma del proyecto cuando el texto no presenta el Tetragrámaton ni un equivalente directo.
  - No aparecen términos cristológicos ni vocabulario teológico que requieran decisión doctrinal específica.
  - La puntuación y el orden sintáctico buscan un registro bíblico moderno, sin arcaísmos innecesarios.
