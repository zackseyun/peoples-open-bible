translation:
  language: es
  text: He aquí, un hijo te nacerá. Él será un hombre de reposo, y yo le daré descanso de todos sus enemigos que lo rodean; porque Salomón será su nombre[a], y daré paz y quietud a Israel en sus días.[b]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Su nombre será Salomón».'
    reason: lexical_alternative
  - marker: b
    text: El hebreo vincula «Salomón» con la idea de «paz» (shalom), y también lo presenta como un «hombre de reposo».
    reason: cultural_note
lexical_decisions:
- source_word: הִנֵּה
  english_pob_choice: Behold
  chosen_spanish: ¡Mira!
  alternatives_spanish:
  - He aquí
  - Mira
  lexicon: HALOT
  rationale: En español, '¡Mira!' conserva la fuerza de llamada de atención del hebreo sin sonar arcaico como 'He aquí'. Mantiene el tono solemne de anuncio.
- source_word: בֵן נוֹלָד לָךְ
  english_pob_choice: a son will be born to you
  chosen_spanish: Un hijo te nacerá
  alternatives_spanish:
  - Te nacerá un hijo
  - Un hijo será nacido para ti
  lexicon: HALOT
  rationale: La construcción española más natural y fiel al pasivo/resultado futuro del hebreo es 'te nacerá un hijo'. Mantiene la referencia al hijo prometido sin añadir información.
- source_word: אִישׁ מְנוּחָה
  english_pob_choice: a man of rest
  chosen_spanish: un hombre de reposo
  alternatives_spanish:
  - un hombre de paz
  - un hombre de descanso
  lexicon: HALOT
  rationale: '''Reposo'' preserva el vínculo léxico con el verbo siguiente y evita sustituir indebidamente el sentido por ''paz'', que corresponde al término posterior שָׁלוֹם.'
- source_word: וַהֲנִחוֹתִי לוֹ
  english_pob_choice: and I will give him rest
  chosen_spanish: y yo le daré descanso
  alternatives_spanish:
  - y yo le haré descansar
  - y yo le concederé reposo
  lexicon: HALOT
  rationale: '''Daré descanso'' comunica de forma natural la causación divina de reposo y conserva la relación verbal con מְנוּחָה. ''Le haré descansar'' sería más literal pero menos fluido.'
- source_word: מִכָּל אוֹיְבָיו מִסָּבִיב
  english_pob_choice: from all his enemies all around
  chosen_spanish: de todos sus enemigos alrededor
  alternatives_spanish:
  - de todos sus enemigos por todos lados
  - de todos sus enemigos en derredor
  lexicon: HALOT
  rationale: '''Alrededor'' conserva el matiz circundante de מִסָּבִיב con español moderno y claro. Se mantiene ''todos'' para la totalidad del alcance.'
- source_word: כִּי
  english_pob_choice: for
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  lexicon: HALOT
  rationale: '''Porque'' expresa la explicación del anuncio y enlaza de manera natural con la frase anterior en español.'
- source_word: שְׁלֹמֹה יִהְיֶה שְׁמוֹ
  english_pob_choice: Solomon will be his name
  chosen_spanish: su nombre será Salomón
  alternatives_spanish:
  - Salomón será su nombre
  - se llamará Salomón
  lexicon: HALOT
  rationale: '''Su nombre será Salomón'' refleja el orden y la función explicativa del hebreo. ''Salomón'' se mantiene como nombre propio convencional en español.'
- source_word: שְׁלֹמֹה
  english_pob_choice: Solomon
  chosen_spanish: Salomón
  alternatives_spanish:
  - Solomón
  lexicon: HALOT
  rationale: Se usa la forma asentada en español bíblico y general.
- source_word: וְשָׁלוֹם
  english_pob_choice: peace
  chosen_spanish: paz
  alternatives_spanish:
  - bienestar
  - shalom
  lexicon: HALOT
  rationale: '''Paz'' es la equivalencia principal de שָׁלוֹם en español y conserva la relación audible con el nombre Salomón en la explicación del versículo.'
- source_word: וָשֶׁקֶט
  english_pob_choice: quiet
  chosen_spanish: quietud
  alternatives_spanish:
  - silencio
  - tranquilidad
  lexicon: HALOT
  rationale: '''Quietud'' distingue este término de ''paz'' y reproduce el matiz de calma/ausencia de perturbación sin confundirlo con reposo.'
- source_word: אֶתֵּן עַל יִשְׂרָאֵל
  english_pob_choice: I will give ... to Israel
  chosen_spanish: daré ... a Israel
  alternatives_spanish:
  - pondré ... sobre Israel
  - concederé ... a Israel
  lexicon: HALOT
  rationale: '''Daré a Israel'' es la solución española natural para el hebreo con עַל, manteniendo el sentido de concesión divina sin forzar una imagen espacial.'
- source_word: בְּיָמָיו
  english_pob_choice: in his days
  chosen_spanish: en sus días
  alternatives_spanish:
  - durante sus días
  - en su tiempo
  lexicon: HALOT
  rationale: La fórmula 'en sus días' es idiomática en registro bíblico español y reproduce con claridad el marco temporal del hebreo.
theological_decisions:
- issue: Juegos de palabras entre el nombre Salomón y los términos de paz/reposo
  english_pob_reading: Preserve the lexical links by rendering מְנוּחָה as 'rest' and שָׁלוֹם as 'peace,' while transliterating the name as 'Solomon.'
  chosen_spanish_reading: Conservar el vínculo léxico entre reposo, paz y el nombre Salomón mediante 'reposo', 'paz' y la forma propia del nombre en español.
  alternative_spanish_readings:
  - traducir מְנוּחָה como 'paz' para alinear más el versículo
  - usar 'descanso' y 'tranquilidad' para ambos términos
  rationale: El hebreo distingue מְנוּחָה, שָׁלוֹם y שֶׁקֶט; la traducción española debe distinguirlos también para no borrar la tensión léxica y el juego con el nombre. 'Reposo', 'paz' y 'quietud' preservan esa relación.
  doctrine_reference: Translation philosophy §§2, 5
- issue: Nombre explicado como declaración de significado, no como simple etiqueta
  english_pob_reading: Solomon will be his name
  chosen_spanish_reading: su nombre será Salomón
  alternative_spanish_readings:
  - se llamará Salomón
  - Salomón será su nombre
  rationale: 'La forma elegida conserva el carácter explicativo del hebreo: el nombre no solo identifica, sino que se interpreta dentro del contexto del oráculo. En español, esta construcción es clara y reverente.'
  doctrine_reference: Translation philosophy §§2, 5
translation_notes:
  revision_awareness: Se siguió el pasaje hebreo de 1 Crónicas 22:9 y se contrastó con la elección inglesa auditada. La redacción española mantiene el paralelismo entre reposo, paz y quietud, sin suavizar la distinción de los tres términos hebreos ni introducir lecturas no atestiguadas. No se registraron revisiones pendientes en el paquete inglés.
  spanish_consistency_notes:
  - Se usa 'Yahvé' para el nombre divino en este proyecto, pero este versículo no lo contiene.
  - Se conservan 'reposo', 'paz' y 'quietud' como tres términos distintos para reflejar el hebreo.
  - '''Salomón'' se mantiene como nombre propio español estándar, con nota explicativa sobre la relación semántica.'
  - Se evita 'Señor' o 'Cristo' porque no aparecen en el texto base.
