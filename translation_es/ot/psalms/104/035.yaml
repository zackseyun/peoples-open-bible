  text: יִתַּ֤מּוּ חַטָּאִ֨ים מִן הָ/אָ֡רֶץ וּ/רְשָׁעִ֤ים ע֤וֹד אֵינָ֗/ם בָּרֲכִ֣י נַ֭פְשִׁ/י אֶת יְהוָ֗ה הַֽלְלוּ יָֽהּ׀־׀־־׃
