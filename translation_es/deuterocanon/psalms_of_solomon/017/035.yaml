translation:
  language: es
  text: y ver la gloria de Yahvé[a], con la cual Dios la glorificó; y él mismo será un rey justo sobre ellos, enseñado por Dios[b][c],
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Literalmente: «la gloria de Yahvé con la que Dios la glorificó».'
    reason: lexical_alternative
  - marker: b
    text: O «instruido por Dios».
    reason: lexical_alternative
  - marker: c
    text: 'O también: «y él mismo será un rey justo, enseñado por Dios, sobre ellos».'
    reason: previous_rendering
lexical_decisions:
- source_word: δόξαν
  english_pob_choice: glory
  chosen_spanish: gloria
  alternatives_spanish:
  - honra
  - esplendor
  lexicon: LSJ
  rationale: «δόξα» aquí conserva el peso bíblico de honor visible y magnificencia; «gloria» mantiene ese registro mejor que alternativas más explicativas.
- source_word: Κυρίου
  english_pob_choice: the Lord
  chosen_spanish: el Señor
  alternatives_spanish:
  - Yahvé
  lexicon: LSJ
  rationale: En este contexto, el genitivo con κύριος funciona como título reverencial tradicional; el español leído en voz alta fluye naturalmente con «el Señor». La forma «Yahvé» no es la mejor aquí porque el texto griego cita el título y no nombra explícitamente el Tetragrámaton.
- source_word: ἐδόξασεν
  english_pob_choice: glorified
  chosen_spanish: glorificó
  alternatives_spanish:
  - honró
  lexicon: LSJ
  rationale: Se conserva el juego léxico con δόξα mediante el cognado «glorificó», igual que en el audit trail inglés.
- source_word: αὐτὴν
  english_pob_choice: her
  chosen_spanish: la
  alternatives_spanish:
  - a ella
  - la ciudad
  lexicon: LSJ
  rationale: El pronombre femenino remite naturalmente a Jerusalén personificada en el contexto; en español, «la» preserva esa referencia sin sobreespecificarla en el cuerpo del verso.
- source_word: βασιλεὺς δίκαιος
  english_pob_choice: a righteous king
  chosen_spanish: un rey justo
  alternatives_spanish:
  - un rey recto
  - un rey recto y justo
  lexicon: LSJ
  rationale: «δίκαιος» aquí admite «justo» y «recto»; se elige «justo» por ser natural en español y mantener el sentido ético/judicial de realeza legítima.
- source_word: διδακτὸς ὑπὸ θεοῦ
  english_pob_choice: taught by God
  chosen_spanish: enseñado por Dios
  alternatives_spanish:
  - instruido por Dios
  - aprendido de Dios
  lexicon: LSJ
  rationale: «διδακτός» se expresa de manera directa como «enseñado»; «instruido» es posible, pero «enseñado por Dios» es más llano y fiel al valor pasivo.
- source_word: ἐπ’ αὐτούς
  english_pob_choice: over them
  chosen_spanish: sobre ellos
  alternatives_spanish:
  - sobre éstos
  - contra ellos
  lexicon: LSJ
  rationale: En contexto regio, ἐπί con acusativo marca dominio/autoridad, por eso «sobre ellos» reproduce mejor la relación de gobierno que «para ellos» o «contra ellos».
theological_decisions:
- issue: Cláusula sin verbo expreso en el segundo miembro
  english_pob_reading: and he himself will be a righteous king over them, taught by God
  chosen_spanish_reading: y él mismo será un rey justo sobre ellos, enseñado por Dios
  alternative_spanish_readings:
  - y él mismo, un rey justo enseñado por Dios, sobre ellos
  - y él mismo será un rey justo, enseñado por Dios, sobre ellos
  rationale: El griego transmitido es nominal/verbless en el segundo miembro; en español conviene suplir «será» para una lectura publica natural. Se mantiene el orden de gobierno («sobre ellos») unido a la realeza, sin perder la aposición «enseñado por Dios».
  doctrine_reference: Mesianismo real y realeza justa; sintaxis elíptica del griego
translation_notes:
  revision_awareness: El audit trail inglés mantiene alta concordancia con el griego y solo requiere una decisión de fluidez en la segunda cláusula verbal. Se preservó el paralelismo gloria/glorificó y se evitó sustituir el título divino por una forma de ocultamiento; sin embargo, al tratarse de κύριος en griego, se optó por «Señor» como título reverencial más directo en español litúrgicamente legible. La posición de «sobre ellos» sigue la revisión inglesa que reagrupa el modificador de gobierno con la realeza.
  spanish_consistency_notes:
  - Se usó «gloria» y «glorificó» para conservar el vínculo léxico del original.
  - Se eligió «rey justo» en vez de «rey recto» por naturalidad y porque la justicia real está explícita en δικ-.
  - «Enseñado por Dios» mantiene el pasivo y evita intensificar a una interpretación más libre.
  - La coma antes de «enseñado por Dios» refleja la apposición del griego y ayuda a que la relación sintáctica sea clara en español.
