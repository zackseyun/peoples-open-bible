  glossary_alignment: 'No hay términos teológicos sensibles en este versículo. La decisión principal es onomástica: conviene ''Simei'' en vez de ''Simi''. El resto del vocabulario concuerda bien con las decisiones del POB y con un español bíblico moderno.'
