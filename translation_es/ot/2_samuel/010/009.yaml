translation:
  language: es
  text: Cuando Joab vio que el frente de batalla estaba dispuesto contra él por delante y por detrás, escogió de entre todos los combatientes selectos de Israel y los dispuso para enfrentar a Aram.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: וַיַּרְא
  english_pob_choice: saw
  chosen_spanish: vio
  alternatives_spanish:
  - percibió
  - advirtió
  lexicon: HALOT
  rationale: ראה expresa percepción visual; aquí implica que Joab comprendió la situación táctica al verla. «Vio» conserva la narración hebrea sin sobrerinterpretar.
- source_word: פְּנֵי הַמִּלְחָמָה
  english_pob_choice: the battle was set
  chosen_spanish: la batalla se había puesto
  alternatives_spanish:
  - la batalla estaba puesta
  - la batalla se había dispuesto
  lexicon: HALOT
  rationale: El hebreo usa la imagen de la ‘cara’ o ‘frente’ de la batalla. En español, la pasiva refleja «se había puesto contra él» transmite la posición táctica de enfrentamiento sin calco rígido.
- source_word: מִפָּנִים וּמֵאָחוֹר
  english_pob_choice: in front and in the rear
  chosen_spanish: por delante y por detrás
  alternatives_spanish:
  - de frente y por la retaguardia
  - delante y detrás
  lexicon: HALOT
  rationale: La expresión indica cerco o ataque en dos lados. «Por delante y por detrás» es natural en español y conserva el contraste espacial.
- source_word: וַיִּבְחַר מִכֹּל בְּחוּרֵי בְיִשְׂרָאֵל
  english_pob_choice: he chose from all the choice men of Israel
  chosen_spanish: escogió de entre todos los hombres escogidos de Israel
  alternatives_spanish:
  - escogió de entre todos los hombres elegidos de Israel
  - escogió de entre todos los mejores hombres de Israel
  lexicon: HALOT
  rationale: בְּחוּרִים son hombres seleccionados, de élite, aptos para combate. «Hombres escogidos» preserva el valor léxico y evita suavizarlo con una paráfrasis excesiva.
- source_word: וַיַּעֲרֹךְ
  english_pob_choice: arrayed
  chosen_spanish: los dispuso
  alternatives_spanish:
  - los ordenó en formación
  - los alineó para la batalla
  lexicon: HALOT
  rationale: ערך en contexto militar es poner en orden o formar tropas. «Los dispuso» comunica la acción de organizar para combate con dignidad y brevedad.
- source_word: לִקְרַאת אֲרָם
  english_pob_choice: to meet Aram
  chosen_spanish: para enfrentar a Aram
  alternatives_spanish:
  - para hacer frente a Aram
  - para encontrarse con Aram en combate
  lexicon: HALOT
  rationale: לקראת puede significar encontrarse o salir al encuentro; en contexto bélico, «para enfrentar» expresa confrontación militar de modo claro en español.
- source_word: אֲרָם
  english_pob_choice: Aram
  chosen_spanish: Aram
  alternatives_spanish:
  - los arameos
  - Siria
  lexicon: HALOT
  rationale: Se preserva el nombre propio hebreo conforme a la práctica del POB, evitando sustituirlo por un etnónimo o geografía posterior.
translation_notes:
  revision_awareness: 'La revisión inglesa reciente ajustó el clímax a una redacción más directa y menos paraprástica: «battle was set against him» y «from all the choice men of Israel». El español sigue esa misma dirección, manteniendo la imagen militar y la selección desde entre los hombres escogidos, sin expandir el contenido más allá del hebreo.'
  spanish_consistency_notes:
  - He mantenido el registro narrativo sobrio y militar.
  - He conservado «Aram» como nombre propio transliterado.
  - No se han añadido notas al pie porque la redacción española puede reflejar el sentido del hebreo sin requerir alternativas obligatorias en el texto.
