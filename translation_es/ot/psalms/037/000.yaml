  text: לְ/דָוִ֨ד אַל תִּתְחַ֥ר בַּ/מְּרֵעִ֑ים אַל תְּ֝קַנֵּ֗א בְּ/עֹשֵׂ֥י עַוְלָֽה׀־־׃
base_translation:
  language: en
  yaml_path: translation/ot/psalms/037/000.yaml
  text: Of David[a]. Do not fret because of evildoers[b]; do not be envious of those who do wrong.
  footnotes:
  - marker: a
    text: Or 'Do not fret because of evildoers.' The Hebrew verb can denote becoming heated, agitated, or vexed.
    reason: lexical_alternative
  - marker: b
    text: Or 'those who do injustice' / 'workers of unrighteousness.'
    reason: lexical_alternative
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T20:36:50Z'
    unchanged: false
    changes_summary: Completed the verse by adding the two imperative clauses omitted from the draft; rendered the Hebrew naturally and accurately as 'Do not fret because of evildoers; do not be envious of those who do wrong.'
translation:
  language: es
  text: De David[a]. No te inquietes por causa de los malhechores[b]; no envidies a los que hacen el mal.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «No te inquietes por causa de los malhechores». El verbo hebreo puede significar calentarse, agitarse o verse vexado interiormente.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «los que hacen injusticia» / «obradores de injusticia».'
    reason: lexical_alternative
lexical_decisions:
- source_word: לְדָוִד
  english_pob_choice: Of David
  chosen_spanish: De David
  alternatives_spanish:
  - Para David
  - Salmo de David
  lexicon: לְ + nombre propio
  rationale: La preposición lamed aquí introduce la atribución del salmo a David; en español, «De David» conserva esa relación sin añadir una formulación no presente en el hebreo.
- source_word: אַל תִּתְחַר
  english_pob_choice: Do not fret
  chosen_spanish: No te inquietes
  alternatives_spanish:
  - No te irrites
  - No te enfurezcas
  - No te agites
  lexicon: תִּתְחַר
  rationale: El verbo hebreo puede abarcar calentarse interiormente, agitarse o vexarse. «No te inquietes» comunica bien la idea de turbación interior en español moderno, sin forzar una intensidad excesiva.
- source_word: בַּמְּרֵעִים
  english_pob_choice: because of evildoers
  chosen_spanish: por causa de los malhechores
  alternatives_spanish:
  - por causa de los malos
  - por los malhechores
  - a causa de los impíos
  lexicon: מְרֵעִים
  rationale: «Malhechores» mantiene el sentido de personas que obran mal. Añadir «por causa de» refleja la relación causal del hebreo y evita leerlo solo como compañía o comparación.
- source_word: אַל תְּקַנֵּא
  english_pob_choice: do not be envious
  chosen_spanish: no envidies
  alternatives_spanish:
  - no tengas envidia
  - no codicies
  - no te pongas celoso
  lexicon: קנא
  rationale: «Envidiar» es el equivalente más directo y natural en español para esta prohibición. Conserva el matiz afectivo de la prohibición sin introducir una idea más específica que el texto no exige.
- source_word: בְּעֹשֵׂי עַוְלָה
  english_pob_choice: those who do wrong / workers of unrighteousness
  chosen_spanish: a los que hacen el mal
  alternatives_spanish:
  - a los que hacen injusticia
  - a los que practican la iniquidad
  - a los obradores de maldad
  lexicon: עֹשֵׂי עַוְלָה
  rationale: La frase hebrea designa a quienes practican la injusticia o el mal. «Los que hacen el mal» es claro y fiel, y evita un giro demasiado arcaico en español.
theological_decisions:
- issue: Relación entre עַוְלָה y justicia/injusticia
  english_pob_reading: those who do wrong / workers of unrighteousness
  chosen_spanish_reading: los que hacen el mal
  alternative_spanish_readings:
  - los que hacen injusticia
  - los obradores de injusticia
  - los que practican la iniquidad
  rationale: El hebreo puede expresar tanto maldad moral como injusticia. En español, «hacen el mal» conserva amplitud semántica y es comprensible, sin perder la oposición ética del versículo.
  doctrine_reference: Salmo 37:1; Proverbios 24:19-20; Romanos 12:17-19
- issue: Intensidad emocional de אַל תִּתְחַר
  english_pob_reading: Do not fret
  chosen_spanish_reading: No te inquietes
  alternative_spanish_readings:
  - No te irrites
  - No te enojes
  - No te alteres
  rationale: La advertencia no se limita a una emoción leve; puede incluir agitación interna o calentamiento moral. «No te inquietes» permite esa gama sin decidir innecesariamente por una sola emoción fuerte.
  doctrine_reference: Salmo 37:8; Filipenses 4:6-7
translation_notes:
  revision_awareness: La versión inglesa revisada completó el versículo añadiendo las dos cláusulas imperativas omitidas en el borrador inicial y ajustó la redacción para reflejar con naturalidad el hebreo. La presente versión española sigue esa revisión, conservando las dos prohibiciones paralelas y su relación causal y comparativa.
  spanish_consistency_notes:
  - Se mantiene «David» sin añadir «salmo» porque el hebreo solo contiene la atribución.
  - Se usa «malhechores» y «los que hacen el mal» con variación mínima para reproducir el paralelismo sin alejarse del campo semántico del hebreo.
  - Se evita «SEÑOR» porque este versículo no contiene el tetragrámaton.
  - Se conserva el tono imperativo negativo con formas naturales del español latinoamericano.
