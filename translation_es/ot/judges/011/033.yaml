base_translation:
  language: en
  yaml_path: translation/ot/judges/011/033.yaml
  text: And he struck them from Aroer as far as the entrance to Minnith[a], twenty cities, and as far as Abel-keramim, with a very great slaughter[d][c][b]. So the sons of Ammon were subdued before the sons of Israel.
  footnotes:
  - marker: a
    text: Or 'as far as Minnith' or 'up to the entrance of Minnith.' The Hebrew expression is somewhat difficult and may refer either to the approach to the city or simply to the city itself.
    reason: alternative_reading
  - marker: b
    text: Abel-keramim is a place name; the components of the name may mean something like 'meadow of vineyards,' but it is left transliterated here because it functions as a proper name.
    reason: lexical_alternative
  - marker: c
    text: Or 'with a very great blow/defeat.' The Hebrew phrase can denote a devastating military strike; 'slaughter' makes the severity explicit in context.
    reason: lexical_alternative
  - marker: d
    text: Or more idiomatically, 'the Ammonites' and 'the Israelites.' The translation preserves the Hebrew expressions 'sons of Ammon' and 'sons of Israel.'
    reason: lexical_alternative
