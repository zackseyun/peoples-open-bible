translation:
  language: es
  text: Y desde el frente del portal exterior[a] hasta el frente del vestíbulo del portal interior había cincuenta codos[b][c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El hebreo es difícil en esta expresión; el término subyacente es inusual aquí. Por el contexto, muchos intérpretes lo entienden como el portal exterior.
    reason: textual_variant
  - marker: b
    text: O «pórtico» para «vestíbulo».
    reason: lexical_alternative
  - marker: c
    text: En este capítulo, «portal» también puede traducirse «puerta»; se refiere al complejo de acceso, no solo a una hoja de puerta.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְעַל
  english_pob_choice: And from
  chosen_spanish: Y desde
  alternatives_spanish:
  - Y de
  - Y desde la
  lexicon: HALOT
  rationale: En un contexto de medición arquitectónica, la preposición introduce el punto de partida de la distancia; «desde» expresa con naturalidad esa función espacial en español y conserva el valor conjuntivo de la waw.
- source_word: פְּנֵי
  english_pob_choice: the front of
  chosen_spanish: la parte frontal de
  alternatives_spanish:
  - el frente de
  - la cara de
  lexicon: HALOT
  rationale: פָּנִים en este tipo de descripción arquitectónica señala el lado frontal o la cara hacia adelante. «La parte frontal de» es claro y mantiene la precisión espacial.
- source_word: הַשַּׁעַר
  english_pob_choice: the gateway
  chosen_spanish: la puerta
  alternatives_spanish:
  - la entrada
  - el portal
  lexicon: HALOT
  rationale: Aunque el inglés POB optó por «gateway» para el complejo arquitectónico, en español «puerta» puede funcionar de modo más natural y comprensible en una descripción medida, sin perder el sentido de acceso estructural. No se reduce a una simple hoja de puerta, sino al acceso/gateway del conjunto.
- source_word: ה/יאתון
  english_pob_choice: the outer
  chosen_spanish: exterior
  alternatives_spanish:
  - externa
  - de afuera
  lexicon: HALOT
  rationale: El término hebreo es difícil; el POB inglés lo entendió como «outer» por el contexto. «Exterior» conserva esa lectura contextual y encaja con el contraste posterior con la puerta interior.
- source_word: לִפְנֵי
  english_pob_choice: to the front of
  chosen_spanish: hasta la parte frontal de
  alternatives_spanish:
  - hasta delante de
  - frente a
  lexicon: HALOT
  rationale: La frase marca el extremo de la medición. «Hasta la parte frontal de» reproduce la terminación espacial con precisión idiomática en español.
- source_word: אֻלָם
  english_pob_choice: the vestibule
  chosen_spanish: el vestíbulo
  alternatives_spanish:
  - el pórtico
  - el portal
  lexicon: HALOT
  rationale: «Vestíbulo» comunica bien el espacio de entrada templario/arquitectónico y coincide con la decisión inglesa. Se evita «porche» por su asociación más doméstica y menos precisa en español moderno.
- source_word: הַשַּׁעַר הַפְּנִימִי
  english_pob_choice: the inner gate
  chosen_spanish: la puerta interior
  alternatives_spanish:
  - la puerta interna
  - la entrada interior
  lexicon: HALOT
  rationale: El contraste con «exterior» pide una equivalencia directa y clara. «Interior» mantiene el paralelo estructural y el sentido del complejo de acceso.
- source_word: חֲמִשִּׁים אַמָּה
  english_pob_choice: fifty cubits
  chosen_spanish: cincuenta codos
  alternatives_spanish:
  - cincuenta codos de medida
  - cincuenta medidas de codo
  lexicon: HALOT
  rationale: «Codos» es la forma estándar y transparente en español para la unidad hebrea אַמָּה. Se conserva la medida tradicional sin explicitar más de lo que el texto da.
theological_decisions:
- issue: Término arquitectónico difícil en el hebreo («la puerta exterior» / «outer gateway»).
  english_pob_reading: The Hebrew text is difficult at 'the outer gateway'; many interpreters understand it to mean the outer gate/gateway from context.
  chosen_spanish_reading: La traducción refleja «puerta exterior» y mantiene la lectura contextual sin esconder la dificultad del hebreo.
  alternative_spanish_readings:
  - la puerta de afuera
  - la puerta/gateway exterior
  rationale: El versículo es una medida arquitectónica; el punto crítico no es doctrinal sino textual/lexical. Se conserva la lectura contextual apoyada por el POB inglés y se expresa de forma natural en español.
  doctrine_reference: No aplica; decisión de crítica textual y arquitectura del pasaje.
translation_notes:
  revision_awareness: 'Se siguió el estado de revisión más reciente: no hubo cambios necesarios en el texto inglés auditado; la propuesta española mantiene esa lectura estable y solo ajusta la expresión para naturalidad y precisión en español.'
  spanish_consistency_notes:
  - Se conservó «codos» para אַמָּה por consistencia terminológica.
  - Se usó «exterior/interior» para sostener el contraste arquitectónico del pasaje.
  - «Puerta» se emplea con sentido de acceso/estructura, no meramente de hoja física.
  - Se evitó «SEÑOR» u այլ vocabulario teológico no pertinente, porque el versículo es descriptivo y métrico.
