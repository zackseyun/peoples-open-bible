translation:
  language: es
  text: Tus flechas son afiladas[a]; los pueblos caen ante ti; tus flechas están en el corazón de los enemigos del rey.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más literalmente: «Tus flechas son afiladas; los pueblos caen ante ti; tus flechas están en el corazón de los enemigos del rey». El hebreo es muy comprimido y poético.'
    reason: lexical_alternative
lexical_decisions:
- source_word: חִצֶּיךָ
  english_pob_choice: your arrows
  chosen_spanish: Tus flechas
  alternatives_spanish:
  - Tus saetas
  - Tus dardos
  lexicon: HALOT
  rationale: El sustantivo plural con sufijo de 2ª masc. singular se refiere de manera directa a flechas. «Flechas» es el equivalente natural en español y conserva la imagen bélica sin arcaísmo innecesario.
- source_word: שְׁנוּנִים
  english_pob_choice: are sharp
  chosen_spanish: son afiladas
  alternatives_spanish:
  - están afiladas
  - son agudas
  lexicon: HALOT
  rationale: 'El participio pasivo expresa cualidad resultante: las flechas están afiladas/afiladas. «Son afiladas» suena natural en español y mantiene el valor descriptivo de la forma hebrea.'
- source_word: עַמִּים
  english_pob_choice: peoples
  chosen_spanish: los pueblos
  alternatives_spanish:
  - las naciones
  - los pueblos
  lexicon: HALOT
  rationale: El plural de עַם puede señalar grupos o pueblos. «Los pueblos» conserva el plural semítico y evita reducirlo a una sola colectividad abstracta.
- source_word: תַּחְתֶּיךָ
  english_pob_choice: beneath you
  chosen_spanish: debajo de ti
  alternatives_spanish:
  - bajo ti
  - debajo de ti
  lexicon: HALOT
  rationale: La preposición con sufijo indica posición inferior respecto del destinatario. «Debajo de ti» es claro y conserva la imagen de sometimiento/derrota.
- source_word: יִפְּלוּ
  english_pob_choice: fall
  chosen_spanish: caen
  alternatives_spanish:
  - caerán
  - se desploman
  lexicon: HALOT
  rationale: El imperfecto en poesía puede leerse como presente vívido. «Caen» funciona bien en español poético y no fuerza una lectura exclusivamente futura.
- source_word: בְּלֵב
  english_pob_choice: they are in the heart
  chosen_spanish: en el corazón
  alternatives_spanish:
  - en el corazón
  - hasta el corazón
  lexicon: HALOT
  rationale: El hebreo es elíptico y muy comprimido. En español, «en el corazón» reproduce el sintagma sin añadir un verbo interpretativo que no está en el texto.
- source_word: אוֹיְבֵי הַמֶּלֶךְ
  english_pob_choice: of the king’s enemies
  chosen_spanish: de los enemigos del rey
  alternatives_spanish:
  - del rey, sus enemigos
  - de los enemigos del rey
  lexicon: HALOT
  rationale: Se conserva la cadena constructa literalmente como «los enemigos del rey», porque el hebreo nombra al rey de forma explícita y el POB inglés evitó armonizarlo con un «tus enemigos».
theological_decisions:
- issue: Referencia de «el rey» en un salmo real
  english_pob_reading: Retain the immediate historical-poetic wording 'the king' without making an explicit messianic identification in the translation.
  chosen_spanish_reading: Conservar «el rey» sin identificarlo explícitamente como el Mesías en la redacción.
  alternative_spanish_readings:
  - Conservar «el rey» y dejar la lectura mesiánica para la interpretación
  - Sustituir por una formulación explícitamente mesiánica
  rationale: El hebreo dice «el rey», y la traducción debe respetar ese dato. Mantener la referencia abierta preserva la tensión teológica documentada por el POB y evita insertar una identificación interpretativa en la frase misma.
  doctrine_reference: Preservar la tensión teológica en lugar de resolverla en la traducción.
translation_notes:
  revision_awareness: 'El borrador sigue la última revisión del POB inglés al no añadir un verbo interpretativo como «penetran» en la cláusula final. En lugar de expandir el hebreo, conserva la elipsis con una estructura española natural: «están en el corazón de los enemigos del rey».'
  spanish_consistency_notes:
  - Se usa «Yahvé» en el proyecto, pero este versículo no contiene el tetragrámaton.
  - Se mantiene «rey» como sujeto nominal explícito, conforme al audito inglés y al hebreo.
  - «Flechas» se eligió por claridad moderna; «saetas» quedaría posible si se quisiera un matiz más literario, pero no es necesario aquí.
