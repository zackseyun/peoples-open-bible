base_translation:
  language: en
  yaml_path: translation/ot/joshua/021/002.yaml
  text: And they spoke to them at Shiloh in the land of Canaan[a], saying, “Yahweh commanded through Moses to give us cities to dwell in[b], along with their pasturelands for our livestock.”
