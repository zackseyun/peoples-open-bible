translation:
  language: es
  text: 'Entonces me enseñó y me dijo: «Que tu corazón[a] se aferre a mis palabras[b]; guarda mis mandamientos y vive».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: En hebreo, «corazón» suele incluir pensamiento, voluntad y entendimiento, no solo emoción.
    reason: cultural_note
  - marker: b
    text: O «retenga mis palabras».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּרֵנִי
  english_pob_choice: he taught me
  chosen_spanish: me enseñó
  alternatives_spanish:
  - me instruyó
  - me dirigió
  lexicon: HALOT
  rationale: La forma הִפְעִיל de ירה aquí expresa enseñar/instruir. «Me enseñó» es natural en español y conserva el sentido pedagógico del padre que transmite sabiduría.
- source_word: וַיֹּאמֶר לִי
  english_pob_choice: and said to me
  chosen_spanish: y me dijo
  alternatives_spanish:
  - y me habló
  - y me declaró
  lexicon: HALOT
  rationale: Es la introducción directa del discurso. «Me dijo» es la equivalencia más natural y no añade matiz interpretativo.
- source_word: יִתְמָךְ
  english_pob_choice: hold fast
  chosen_spanish: retenga firmemente
  alternatives_spanish:
  - retenga
  - sostenga
  - agarre firmemente
  lexicon: HALOT
  rationale: תמך puede significar sostener, mantener o aferrar. En este contexto con «tu corazón» como sujeto, la idea es que el interior conserve con firmeza las palabras; «retenga firmemente» preserva la fuerza del verbo sin sonar duro en español.
- source_word: דְּבָרַי
  english_pob_choice: my words
  chosen_spanish: mis palabras
  alternatives_spanish:
  - mis dichos
  - mis palabras de instrucción
  lexicon: HALOT
  rationale: דברים con sufijo posesivo se traduce de manera amplia y directa como «palabras». Mantiene la referencia a las enseñanzas sin estrechar innecesariamente el término.
- source_word: לִבֶּךָ
  english_pob_choice: your heart
  chosen_spanish: tu corazón
  alternatives_spanish:
  - tu mente
  - tu interior
  lexicon: HALOT
  rationale: לב incluye el centro de pensamiento, voluntad y entendimiento. «Corazón» conserva el antropologismo hebreo y permite la carga cognitiva y volitiva del pasaje.
- source_word: שְׁמֹר
  english_pob_choice: keep
  chosen_spanish: guarda
  alternatives_spanish:
  - observa
  - custodia
  lexicon: HALOT
  rationale: שמר es el verbo habitual para guardar/observar mandamientos. «Guarda» es la forma española más estable y bíblica para este mandato.
- source_word: מִצְוֺתַי
  english_pob_choice: my commandments
  chosen_spanish: mis mandamientos
  alternatives_spanish:
  - mis preceptos
  - mis órdenes
  lexicon: HALOT
  rationale: מצוה denota mandamiento con autoridad. «Mandamientos» preserva el tono normativo del hebreo.
- source_word: וֶחְיֵה
  english_pob_choice: and live
  chosen_spanish: y vive
  alternatives_spanish:
  - para que vivas
  - y vivirás
  lexicon: HALOT
  rationale: El imperativo final de חיה cierra la exhortación con una llamada directa a la vida. «Y vive» conserva la concisión del hebreo y la fuerza exhortativa del paralelo.
theological_decisions:
- issue: Sentido antropológico de «corazón»
  english_pob_reading: In Hebrew, “heart” often includes thought, will, and understanding, not only emotion.
  chosen_spanish_reading: '«Corazón» conserva el centro interior integral: pensamiento, voluntad y entendimiento, no solo emoción.'
  alternative_spanish_readings:
  - mente
  - interior
  rationale: El hebreo לב no se reduce a afecto. Mantener «corazón» evita perder la antropología bíblica y respeta la amplitud semántica indicada por el audit trail inglés.
  doctrine_reference: Antropología bíblica; sabiduría veterotestamentaria
translation_notes:
  revision_awareness: Se corrigió la validación anterior asegurando que los marcadores [a] y [b] aparecen exactamente en el texto español y que no hay notas huérfanas.
  spanish_consistency_notes:
  - Se mantuvo el paralelismo breve del hebreo con un español natural y reverente.
  - «Mandamientos» se preservó para reflejar la fuerza normativa de מִצְוֺתַי.
  - No se sustituyó «corazón» por «mente» para no reducir el antropologismo hebreo.
