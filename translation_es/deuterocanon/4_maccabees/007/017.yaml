translation:
  language: es
  text: 'Pero quizá algunos dirían: «No todos logran dominar sus pasiones[a], porque no todos poseen una razón prudente[b]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «vencer sus pasiones» o «ganar dominio sobre sus pasiones».
    reason: lexical_alternative
  - marker: b
    text: O «tienen una razón sabia/sensata» o «poseen un juicio racional prudente». El griego usa un término clave para el juicio racional central al argumento de 4 Macabeos.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἴσως
  english_pob_choice: perhaps
  chosen_spanish: quizá
  alternatives_spanish:
  - tal vez
  - quizás
  lexicon: LSJ
  rationale: Expresa la misma reserva hipotética y encaja con el tono de objeción introducida por el griego.
- source_word: εἴποιέν τινες
  english_pob_choice: some might say
  chosen_spanish: algunos dirían
  alternatives_spanish:
  - algunos podrían decir
  - cierta gente diría
  lexicon: LSJ
  rationale: La forma potencial introduce una objeción imaginada; «dirían» conserva esa voz genérica y el matiz hipotético.
- source_word: τῶν παθῶν
  english_pob_choice: their passions
  chosen_spanish: sus pasiones
  alternatives_spanish:
  - las pasiones
  - sus emociones
  lexicon: LSJ
  rationale: En 4 Macabeos πάθη se refiere a impulsos/pasiones que deben ser gobernados por la razón, no a sufrimientos externos.
- source_word: οὐ πάντες περικρατοῦσιν
  english_pob_choice: not all gain mastery over
  chosen_spanish: no todos logran dominar
  alternatives_spanish:
  - no todos ganan dominio sobre
  - no todos vencen
  lexicon: LSJ
  rationale: περικρατέω indica obtener dominio o prevalecer sobre algo; «logran dominar» reproduce bien esa idea en español natural.
- source_word: φρόνιμον
  english_pob_choice: prudent
  chosen_spanish: prudente
  alternatives_spanish:
  - sensata
  - sabia
  lexicon: LSJ
  rationale: φρόνιμος tiene el sentido de juicio práctico y sensato; «prudente» conserva mejor ese matiz ético-filosófico.
- source_word: τὸν λογισμόν
  english_pob_choice: reason
  chosen_spanish: razón
  alternatives_spanish:
  - juicio racional
  - facultad de razonar
  lexicon: LSJ
  rationale: λογισμός es un término clave para la razón/judicio racional en este libro; «razón» es claro y fiel en español.
theological_decisions:
- issue: Relación entre razón y dominio de las pasiones
  english_pob_reading: The verse states that failure to master passions is due to not all people possessing reason in a prudent/sound state.
  chosen_spanish_reading: El versículo afirma que no todos dominan sus pasiones porque no todos tienen una razón prudente.
  alternative_spanish_readings:
  - No todos dominan sus pasiones porque no todos poseen un juicio prudente.
  - No todos logran vencer las pasiones porque no todos tienen razón sensata.
  rationale: 'La traducción evita convertir el pasaje en una negación absoluta de la racionalidad humana. Mantiene la tensión del texto: el problema es la calidad moral y práctica de la razón, no simplemente la ausencia de capacidad racional.'
  doctrine_reference: Antropología moral y ética filosófica de 4 Macabeos
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión más reciente del POB en inglés, que ajustó la expresión a «gain mastery over their passions» para reflejar con más precisión περικρατοῦσιν. Por eso el español usa «logran dominar», que conserva la idea de alcanzar dominio efectivo y no solo de resistir pasivamente.
  spanish_consistency_notes:
  - Se prefirió «razón» para λογισμός, siguiendo el valor técnico del término en 4 Macabeos.
  - Se mantuvo «pasiones» para πάθη, porque el contexto es el gobierno moral de los impulsos.
  - Se usó «prudente» para φρόνιμον por su matiz de juicio práctico y sobrio.
  - La puntuación reproduce una cita introductoria con coma y dos puntos conforme al tono retórico del original.
