base_translation:
  language: en
  yaml_path: translation/ot/2_kings/016/017.yaml
  text: Then King Ahaz cut off the frames of the stands and removed the basin from them[c][b][a], and he took down the Sea from upon the bronze oxen that were under it and put it on a stone pavement.
  footnotes:
  - marker: a
    text: Or 'removed the laver from them.' The Hebrew כִּיּוֹר refers to a wash basin used in temple service; 'laver' is the traditional rendering.
    reason: lexical_alternative
  - marker: b
    text: '''The Sea'' is the name of the large basin made for Solomon''s temple (see 1 Kings 7:23–26).'
    reason: cross_reference
  - marker: c
    text: Or 'the bronze bulls.' The Hebrew term can refer broadly to cattle; 'oxen' is the conventional rendering in this temple context.
    reason: lexical_alternative
