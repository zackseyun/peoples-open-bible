    issue: «sé limpiado» es poco idiomático en español
    rationale: Aunque intenta reflejar el pasivo griego, en español neutro y eclesial moderno la forma más natural y fiel es «sé limpio», que conserva la idea de limpieza/purificación sin sonar forzada.
  - severity: low
    issue: «se apartó de él» para ἀπῆλθεν ἀπ’ αὐτοῦ resulta menos natural
    rationale: El sentido es que la lepra dejó de afectarlo inmediatamente. En español, «desapareció de él» o «lo dejó» transmite mejor esa remoción sin rigidez innecesaria.
  - severity: medium
    issue: La nota [a] no está anclada en la palabra pertinente
    rationale: La nota explica «lepra/λέπρα», por lo que el marcador debe aparecer junto a «lepra», no al final del versículo, conforme a la disciplina requerida.
