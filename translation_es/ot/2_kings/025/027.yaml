revisions:
- from: Y sucedió que, en el año treinta y siete del destierro de Jehoiaquín, rey de Judá, en el duodécimo mes, a los veintisiete días del mes, Evil-merodac, rey de Babilonia, en el año de su reinado[b][c], levantó la cabeza de Jehoiaquín, rey de Judá, sacándolo de la cárcel[a].
  to: Y sucedió que, en el año treinta y siete del destierro de Jehoiaquín, rey de Judá, en el duodécimo mes, el día veintisiete del mes, Evil-merodac, rey de Babilonia, en el año de su reinado[b][c], levantó la cabeza de Jehoiaquín, rey de Judá, de la cárcel[a].
  rationale: La revisión corrige una pequeña sobretraducción sintáctica al reemplazar «sacándolo de la cárcel» por «de la cárcel», que refleja mejor el hebreo y el POB inglés. También mejora la naturalidad de la fecha con «el día veintisiete del mes». Se conservan el modismo principal y las notas explicativas del audit trail.
