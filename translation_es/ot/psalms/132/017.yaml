translation:
  language: es
  text: Allí haré brotar un cuerno para David[a]; he preparado una lámpara para mi ungido[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Haré crecer un cuerno para David». «Cuerno» es una imagen hebrea de fuerza o poder real.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «para mi Mesías». El hebreo dice «mi ungido», refiriéndose aquí ante todo al rey davídico, con posible resonancia mesiánica más amplia.'
    reason: alternative_reading
lexical_decisions:
- source_word: שָׁם
  english_pob_choice: There
  chosen_spanish: Allí
  alternatives_spanish:
  - En ese lugar
  - Allí mismo
  lexicon: HALOT
  rationale: El adverbio locativo se conserva como referencia espacial. «Allí» es natural en español y mantiene la conexión con el lugar mencionado en el contexto inmediato.
- source_word: אַצְמִיחַ
  english_pob_choice: I will cause ... to sprout
  chosen_spanish: haré brotar
  alternatives_spanish:
  - haré crecer
  - haré surgir
  - haré brotar un cuerno
  lexicon: HALOT
  rationale: El hifil tiene fuerza causativa. «Haré brotar» conserva la metáfora vegetal de צמח mejor que una paráfrasis como «levantaré» o «haré surgir», y suena natural en español.
- source_word: קֶרֶן
  english_pob_choice: horn
  chosen_spanish: cuerno
  alternatives_spanish:
  - fuerza
  - poder
  - mando
  lexicon: HALOT
  rationale: Se mantiene la imagen literal de «cuerno» para no perder el símbolo hebreo de fuerza y poder real. La lectura figurada queda implícita, como en el inglés POB.
- source_word: לְדָוִד
  english_pob_choice: for David
  chosen_spanish: para David
  alternatives_spanish:
  - en favor de David
  - para la casa de David
  lexicon: HALOT
  rationale: La preposición ל expresa referencia/beneficio. «Para David» es fiel y conserva la resonancia davídica sin introducir «casa» o «linaje» en el texto principal.
- source_word: עָרַכְתִּי
  english_pob_choice: I have prepared
  chosen_spanish: he preparado
  alternatives_spanish:
  - he dispuesto
  - he ordenado
  - he arreglado
  lexicon: HALOT
  rationale: El perfecto qal comunica una acción ya realizada. «He preparado» es idiomático con «lámpara» y refleja bien la provisión divina.
- source_word: נֵר
  english_pob_choice: lamp
  chosen_spanish: lámpara
  alternatives_spanish:
  - luz
  - candil
  lexicon: HALOT
  rationale: Se traduce el objeto concreto por «lámpara» para preservar la imagen material del texto. «Luz» sería más interpretativo.
- source_word: לִמְשִׁיחִי
  english_pob_choice: for my anointed one
  chosen_spanish: para mi ungido
  alternatives_spanish:
  - para mi Mesías
  - para mi ungido
  lexicon: HALOT
  rationale: Se conserva el sentido básico de מָשִׁיחַ como «ungido». En este contexto davídico, «mi ungido» es más fiel que introducir «Mesías» en el cuerpo principal, aunque la resonancia mesiánica permanece abierta.
theological_decisions:
- issue: Valor mesiánico de מְשִׁיחִי en un contexto real davídico
  english_pob_reading: my anointed one
  chosen_spanish_reading: mi ungido
  alternative_spanish_readings:
  - mi Mesías
  rationale: El referente inmediato es el rey davídico, ungido por Yahvé. Traducir «mi ungido» evita fijar en el texto principal un título más desarrollado de lo que el hebreo exige, pero no niega la posibilidad de resonancia mesiánica más amplia.
  doctrine_reference: Translate titles; preserve the tension between immediate historical referent and broader messianic fulfillment.
translation_notes:
  revision_awareness: La versión española sigue de cerca el texto hebreo y el trazado de decisiones del POB en inglés. Mantiene la metáfora de «cuerno» y el referente davídico de «mi ungido», sin borrar la tensión entre el sentido histórico inmediato y la posible extensión mesiánica.
  spanish_consistency_notes:
  - Se usa «Yahvé» en el corpus POB, pero en este versículo no aparece el Tetragrámaton explícito.
  - Se mantuvo «cuerno» en vez de una equivalencia explicativa para conservar la imagen bíblica.
  - «Mi ungido» se eligió como forma principal; «mi Mesías» queda reservada para la nota por la decisión auditada del POB inglés.
  - La puntuación y el orden siguen un español natural sin alejarse del paralelismo del hebreo.
