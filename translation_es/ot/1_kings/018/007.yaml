    reason: lexical_alternative
  revision_rationale: 'Se ajusta el español para mayor naturalidad y fidelidad al hebreo y al audit trail inglés: «de camino» reproduce bien בַּדֶּרֶךְ; «lo encontró» evita sobretrazar el movimiento; «cayó sobre su rostro» refleja mejor וַיִּפֹּל עַל פָּנָיו que la formulación previa poco idiomática. Además, se añade una nota en «mi señor» para preservar la aclaración léxico-teológica que el inglés POB documentó para אֲדֹנִי.'
