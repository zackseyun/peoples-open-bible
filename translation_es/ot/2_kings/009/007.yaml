translation:
  language: es
  text: Y abatirás la casa de Acab, tu señor, y yo vengaré la sangre de mis siervos los profetas y la sangre de todos los siervos de Yahvé, de la mano de Jezabel[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «de la mano de Jezabel», un idiomatismo que puede significar «a manos de Jezabel» o «por cuya responsabilidad Jezabel es culpable».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהִכִּיתָה
  english_pob_choice: you shall strike down
  chosen_spanish: golpearás
  alternatives_spanish:
  - derribarás
  - castigarás
  - matarás
  lexicon: HALOT
  rationale: El verbo נכה en este contexto de juicio contra una dinastía expresa acción violenta y punitiva. En español, «golpearás» conserva el paralelismo verbal directo y la fuerza de la amenaza sin introducir más especificidad que la que permite el hebreo; la expresión completa queda reforzada por el objeto «la casa de Ahab».
- source_word: בֵּית אַחְאָב
  english_pob_choice: the house of Ahab
  chosen_spanish: la casa de Ahab
  alternatives_spanish:
  - la familia de Ahab
  - la dinastía de Ahab
  - el linaje de Ahab
  lexicon: HALOT
  rationale: «Casa» reproduce el idiomático בית en sentido real/familiar-político, manteniendo la imagen bíblica de un linaje gobernante.
- source_word: אֲדֹנֶיךָ
  english_pob_choice: your master
  chosen_spanish: tu amo
  alternatives_spanish:
  - tu señor
  - tu maestro
  lexicon: HALOT
  rationale: El término se refiere a un superior humano, no al nombre divino. «Amo» conserva la relación de subordinación en el ámbito cortesano/militar y evita la ambigüedad reverencial de «señor».
- source_word: וְנִקַּמְתִּי
  english_pob_choice: and I will avenge
  chosen_spanish: y yo vengaré
  alternatives_spanish:
  - y yo tomaré venganza
  - y yo haré justicia vengadora
  lexicon: HALOT
  rationale: נקם expresa retribución activa en favor de los agraviados. «Vengaré» es breve, directo y preserva la fuerza judicial-retributiva del verbo sin diluirla en una noción meramente abstracta de justicia.
- source_word: דְּמֵי
  english_pob_choice: the blood of
  chosen_spanish: la sangre de
  alternatives_spanish:
  - la sangre derramada de
  - la sangre de derramamiento de
  lexicon: HALOT
  rationale: El plural constructo hebreo funciona como idiomatismo de sangre derramada o responsabilidad por sangre. En español, «la sangre de» es la equivalencia natural y transparente en un contexto de juicio y culpa de sangre.
- source_word: עֲבָדַי הַנְּבִיאִים
  english_pob_choice: my servants the prophets
  chosen_spanish: mis siervos, los profetas
  alternatives_spanish:
  - mis siervos los profetas
  - mis esclavos, los profetas
  lexicon: HALOT
  rationale: La frase identifica a los profetas como pertenecientes al servicio de Dios; «siervos» es más natural en español eclesial que «esclavos» en este contexto relacional, sin perder la idea de pertenencia y servicio.
- source_word: כָּל עַבְדֵי יְהוָה
  english_pob_choice: all the servants of Yahweh
  chosen_spanish: todos los siervos de Yahvé
  alternatives_spanish:
  - todos los esclavos de Yahvé
  - todos los servidores de Yahvé
  lexicon: HALOT
  rationale: Se mantiene el paralelismo con la frase anterior y se aplica la terminología del proyecto para יְהוָה como «Yahvé». «Siervos» conserva el tono bíblico y el campo semántico de servicio leal.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: 'Se sigue el criterio del proyecto para el Tetragrámaton: transliteración del nombre divino en lugar de la sustitución tradicional por un título. «Yahvé» preserva la referencia al nombre personal revelado.'
- source_word: מִיַּד אִיזָבֶל
  english_pob_choice: from the hand of Jezebel
  chosen_spanish: de la mano de Jezabel
  alternatives_spanish:
  - por mano de Jezabel
  - a manos de Jezabel
  lexicon: HALOT
  rationale: Se conserva el hebraísmo «de la mano de» porque puede leerse en español como agencia o responsabilidad en la sangre derramada, manteniendo la textura idiomática del original.
theological_decisions:
- issue: Venganza divina y retribución justa
  english_pob_reading: and I will avenge
  chosen_spanish_reading: y yo vengaré
  alternative_spanish_readings:
  - y yo tomaré venganza
  - y yo haré justicia vengadora
  rationale: El texto atribuye a Dios la acción retributiva; la traducción no la suaviza ni la moraliza. «Vengaré» conserva la tensión teológica de una venganza presentada como justicia divina en favor de los muertos.
  doctrine_reference: Justicia retributiva divina; preservar la tensión bíblica sin resolverla artificialmente.
translation_notes:
  revision_awareness: 'Concordé la lectura del hebreo con el audit trail en inglés y mantuve las decisiones doctrinales ya estabilizadas: el nombre divino se vierte como Yahvé, el giro de sangre se conserva en forma idiomática, y la retribución divina se expresa sin atenuación. No se introdujeron revisiones sustanciales respecto del contexto inglés revisado más reciente.'
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» para יְהוָה conforme al criterio del proyecto.
  - «Casa de Ahab» preserva el idiomático político-dinástico del hebreo.
  - Se evitó «Señor» para אֲדֹנֶיךָ porque el referente es humano.
  - El hebraísmo «de la mano de Jezabel» se marcó con nota para no ocultar la alternativa semántica.
  - «Siervos» se usó de manera consistente para עֲבָדִים en este versículo, dada la tradición semántica del contexto profético.
