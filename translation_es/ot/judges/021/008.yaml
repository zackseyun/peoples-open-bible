translation:
  language: es
  text: 'Y dijeron[a]: «¿Cuál de las tribus de Israel no subió a Yahvé en Mizpa?» Y he aquí, no había venido ni un hombre de Jabes de Galaad al campamento[b], a la asamblea.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «ante Yahvé en Mizpa». El hebreo puede entenderse como comparecer ante Yahvé en el lugar de la asamblea.
    reason: alternative_reading
  - marker: b
    text: 'Hebreo: «no había venido un hombre». La forma singular masculina enfatiza que no estuvo presente ningún individuo de Jabes de Galaad.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמְרוּ
  english_pob_choice: And they said
  chosen_spanish: Y dijeron
  alternatives_spanish:
  - Entonces dijeron
  - Y dijeron, pues
  lexicon: HALOT
  rationale: El wayyiqtol narrativo se expresa con una simple coordinación en español; «Y dijeron» conserva el avance narrativo sin añadir matices temporales no explicitados.
- source_word: מִי אֶחָד
  english_pob_choice: Which one
  chosen_spanish: ¿Cuál... no... ?
  alternatives_spanish:
  - ¿Qué uno... ?
  - ¿Quién... ?
  lexicon: HALOT
  rationale: La combinación hebrea pide identificar un solo grupo/tribu ausente. En español, «¿Cuál de las tribus de Israel no subió...?» transmite esa selección singular de forma natural y fiel.
- source_word: מִשִּׁבְטֵי יִשְׂרָאֵל
  english_pob_choice: of the tribes of Israel
  chosen_spanish: de las tribus de Israel
  alternatives_spanish:
  - entre las tribus de Israel
  - de entre las tribus de Israel
  lexicon: HALOT
  rationale: El מִן hebreo marca selección desde un conjunto mayor; «de las tribus de Israel» es la manera más natural en español y mantiene el marco tribal explícito.
- source_word: לֹא עָלָה
  english_pob_choice: did not go up
  chosen_spanish: no subió
  alternatives_spanish:
  - no fue en ascenso
  - no ascendió
  lexicon: HALOT
  rationale: «Subir» preserva el idiomatismo bíblico de עלה para acercarse a un sitio de reunión o culto. Se evita «ir» para no perder el rasgo convencional del hebreo.
- source_word: אֶל יְהוָה
  english_pob_choice: to Yahweh
  chosen_spanish: a Yahvé
  alternatives_spanish:
  - ante Yahvé
  - hasta Yahvé
  lexicon: HALOT
  rationale: Se conserva el nombre divino como «Yahvé», conforme al criterio del proyecto. Aquí אֶל señala dirección/comparecencia ante el destinatario divino; «a Yahvé» es directo y fiel.
- source_word: הַמִּצְפָּה
  english_pob_choice: at Mizpah
  chosen_spanish: en Mizpa
  alternatives_spanish:
  - en Mizpá
  - a Mizpa
  lexicon: HALOT
  rationale: El lugar se entiende como sitio de reunión; en español, «en Mizpa» comunica mejor la localización del evento. Se usa la forma toponímica común en castellano sin añadir artículo.
- source_word: וְהִנֵּה
  english_pob_choice: And behold
  chosen_spanish: Y he aquí
  alternatives_spanish:
  - Y mira
  - He aquí
  lexicon: HALOT
  rationale: «Y he aquí» preserva la función discursiva de marcar un hallazgo notable en la narración, con un registro bíblico sobrio y natural en español.
- source_word: לֹא בָא אִישׁ
  english_pob_choice: not a man had come
  chosen_spanish: no había venido un hombre
  alternatives_spanish:
  - no había venido nadie
  - no había llegado un hombre
  lexicon: HALOT
  rationale: Se conserva la fuerza del singular masculino hebreo mediante «un hombre», sin perder la idea distributiva de ausencia total. El pluscuamperfecto expresa adecuadamente el estado previo relevante en el relato.
- source_word: אֶל הַמַּחֲנֶה
  english_pob_choice: to the camp
  chosen_spanish: al campamento
  alternatives_spanish:
  - a la campamento
  - hacia el campamento
  lexicon: HALOT
  rationale: «Campamento» es la equivalencia normal de מַחֲנֶה en este contexto de reunión militar de Israel. «Al campamento» fluye mejor en español que una repetición literal de la preposición.
- source_word: מִיָּבֵישׁ גִּלְעָד
  english_pob_choice: from Jabesh-gilead
  chosen_spanish: de Jabes de Galaad
  alternatives_spanish:
  - de Jabes-galaad
  - procedente de Jabes de Galaad
  lexicon: HALOT
  rationale: Se conserva el topónimo en forma española tradicional «Jabes de Galaad», que comunica la misma referencia geográfica sin oscurecer la identidad del lugar.
- source_word: אֶל הַקָּהָל
  english_pob_choice: to the assembly
  chosen_spanish: a la asamblea
  alternatives_spanish:
  - ante la asamblea
  - para la asamblea
  lexicon: HALOT
  rationale: קָהָל se refiere al conjunto reunido; «asamblea» es más neutral y precisa que «congregación» en este contexto cívico-sacral. Mantiene la segunda dirección del hebreo como complemento final del movimiento.
theological_decisions:
- issue: Nombre divino יהוה / YHWH
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - el SEÑOR
  rationale: El proyecto pide traducir YHWH como «Yahvé» en el texto principal. Esto preserva el nombre propio del Dios del pacto, evitando la sustitución por una designación funcional.
  doctrine_reference: 'DOCTRINE.md Contested terms: יהוה YHWH'
- issue: Comparación de la comparecencia ante Yahvé en Mizpa
  english_pob_reading: did not go up to Yahweh at Mizpah / before Yahweh at Mizpah
  chosen_spanish_reading: no subió a Yahvé en Mizpa
  alternative_spanish_readings:
  - no compareció ante Yahvé en Mizpa
  - no subió ante Yahvé en Mizpa
  rationale: La lectura hebrea permite entender una subida al lugar de reunión o una comparecencia ante Yahvé allí. El español principal sigue el sentido más directo del movimiento a la asamblea, y la nota explica la alternativa sin borrar la tensión semántica.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Valor de אִישׁ en la negación
  english_pob_reading: not a man had come
  chosen_spanish_reading: no había venido un hombre
  alternative_spanish_readings:
  - no había venido nadie
  - no había llegado un hombre
  rationale: Se mantiene el singular masculino del hebreo como rasgo de precisión léxica, sin ocultar el sentido global de ausencia total. Esto respeta la observación del audit trail sobre la forma singular.
  doctrine_reference: 'POB lexical policy: gender-accurate singular forms under negation'
translation_notes:
  revision_awareness: El auditorio inglés revisó la frase inicial de «from the tribes of Israel» a «of the tribes of Israel» para mayor naturalidad, sin cambiar el sentido. La versión española adopta desde el inicio la relación partitiva natural «de las tribus de Israel». También se siguió la revisión que mantiene la doble localización/comparecencia en Mizpa sin introducir cambios doctrinales.
  spanish_consistency_notes:
  - Se usa «Yahvé» de forma consistente para יְהוָה.
  - Se prefiere «asamblea» para קָהָל en este contexto narrativo-cívico.
  - Se conserva «subió» para עלה como idiomatismo bíblico.
  - Se mantiene el toponímico «Jabes de Galaad» en forma española legible.
  - La nota [a] preserva la alternativa interpretativa sin reemplazar el texto principal.
