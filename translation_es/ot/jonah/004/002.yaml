translation:
  language: es
  text: 'Y él oró a Yahvé y dijo[a]: «Por favor, Yahvé, ¿no era esto lo que yo dije mientras aún estaba en mi tierra? Por eso me adelanté a huir a Tarsis, porque sabía que tú eres un Dios clemente y compasivo[b], lento para la ira y abundante en amor fiel, y que desistes[c] del desastre.»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «me anticipé a huir a Tarsis» o «me apresuré a huir a Tarsis». El verbo hebreo expresa actuar con anterioridad o ir delante.
    reason: lexical_alternative
  - marker: b
    text: O «misericordioso» para «compasivo». La expresión hace eco de Éxodo 34:6.
    reason: cross_reference
  - marker: c
    text: O «cedes en cuanto al desastre» o «desistes de la calamidad». El hebreo dice «el mal/la calamidad», usando «mal» en el sentido de juicio amenazado, no de mal moral en Dios.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּתְפַּלֵּל
  english_pob_choice: he prayed
  chosen_spanish: oró
  alternatives_spanish:
  - rezó
  - pidió en oración
  lexicon: HALOT
  rationale: El hitpael de פלל denota oración dirigida a Dios. En español, «oró» es natural, digno y fiel al acto de dirigirse a Yahvé en oración, sin diluir el sentido.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  lexicon: HALOT
  rationale: 'Se preserva el nombre propio del pacto con la transliteración usada por el proyecto en español: «Yahvé», no una sustitución titulada.'
- source_word: אָנָּה
  english_pob_choice: Please
  chosen_spanish: Por favor
  alternatives_spanish:
  - Ah
  - Oh
  lexicon: HALOT
  rationale: La partícula expresa súplica o apelación. «Por favor» conserva el tono de ruego en un español actual y reverente.
- source_word: הֲלוֹא
  english_pob_choice: was this not
  chosen_spanish: ¿no era esto
  alternatives_spanish:
  - ¿no es esto
  - ¿acaso no era esto
  lexicon: HALOT
  rationale: La pregunta retórica mira hacia el pasado dentro del relato; «¿no era esto» reproduce bien el valor esperado de confirmación.
- source_word: דְבָרִי
  english_pob_choice: what I said
  chosen_spanish: lo que yo decía
  alternatives_spanish:
  - mi palabra
  - mi declaración
  lexicon: HALOT
  rationale: Aquí דָבָר no necesita traducirse como «palabra»; el contexto exige la referencia a lo que Jonás había dicho previamente. «Lo que yo decía» mantiene la idea sin forzar una literalidad poco natural.
- source_word: עַד הֱיוֹתִי עַל אַדְמָתִי
  english_pob_choice: while I was still in my own land
  chosen_spanish: mientras aún estaba en mi tierra
  alternatives_spanish:
  - antes de estar en mi tierra
  - cuando aún estaba sobre mi suelo
  lexicon: HALOT
  rationale: La frase temporal apunta a la situación previa al viaje. «En mi tierra» comunica de forma clara y natural la pertenencia al lugar natal.
- source_word: עַל כֵּן
  english_pob_choice: Therefore
  chosen_spanish: Por eso
  alternatives_spanish:
  - Por tanto
  - Así que
  lexicon: HALOT
  rationale: Conector causal-consecutivo. «Por eso» suena fluido en español y conserva la relación lógica con la frase anterior.
- source_word: קִדַּמְתִּי
  english_pob_choice: I fled ahead / I anticipated this by fleeing
  chosen_spanish: me adelanté
  alternatives_spanish:
  - me anticipé
  - me apresuré
  lexicon: HALOT
  rationale: El verbo expresa ir delante o actuar con antelación. «Me adelanté» conserva esa anterioridad intencional y permite mantener el sentido de irse antes de tiempo.
- source_word: לִבְרֹחַ תַּרְשִׁישָׁה
  english_pob_choice: to flee to Tarshish
  chosen_spanish: a huir a Tarsis
  alternatives_spanish:
  - a escapar a Tarsis
  lexicon: HALOT
  rationale: La expresión direccional con ברח se traduce con «huir», que conserva la gravedad de la evasión de Jonás; «Tarsis» sigue la forma española usual del topónimo.
- source_word: אֵל
  english_pob_choice: God
  chosen_spanish: Dios
  alternatives_spanish:
  - Dios poderoso
  lexicon: HALOT
  rationale: El título genérico se traduce como «Dios»; no se añade una glosa innecesaria.
- source_word: חַנּוּן וְרַחוּם
  english_pob_choice: gracious and compassionate
  chosen_spanish: bondadoso y compasivo
  alternatives_spanish:
  - gracioso y misericordioso
  - gracioso y compasivo
  lexicon: HALOT
  rationale: En español, «bondadoso» transmite bien חנון como benevolencia/generosidad, mientras «compasivo» refleja רחום. Se evita «gracioso», que sería engañoso en español.
- source_word: אֶרֶךְ אַפַּיִם
  english_pob_choice: slow to anger
  chosen_spanish: lento para la ira
  alternatives_spanish:
  - paciente
  - tardo para la ira
  lexicon: HALOT
  rationale: Es la equivalencia idiomática estable en español y conserva la imagen de contención de la ira.
- source_word: רַב חֶסֶד
  english_pob_choice: abundant in steadfast love
  chosen_spanish: abundante en amor fiel
  alternatives_spanish:
  - rico en misericordia
  - abundante en amor leal
  lexicon: HALOT
  rationale: חסד tiene peso de lealtad de pacto; «amor fiel» preserva esa dimensión mejor que un término meramente afectivo. «Abundante en» refleja רַב de modo natural.
- source_word: וְנִחָם עַל הָרָעָה
  english_pob_choice: and relenting concerning the disaster
  chosen_spanish: y que te arrepientes del desastre
  alternatives_spanish:
  - y que te apiadas del desastre
  - y que te retractas del desastre
  - y que cedes ante el desastre
  lexicon: HALOT
  rationale: El hebreo expresa que Dios se revoca o se detiene respecto del juicio anunciado. En español, «te arrepientes» preserva la tensión antropopática documentada por el POB, aunque no implique culpa moral en Dios; «del desastre» sigue el sentido contextual de הָרָעָה como calamidad/jucio.
theological_decisions:
- issue: Renderización del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  rationale: Se mantiene la decisión doctrinal del POB de no sustituir el nombre por un título. En español, «Yahvé» es la forma de transliteración adoptada para el Tetragrámaton.
  doctrine_reference: 'DOCTRINE.md: יְהוָה / YHWH'
- issue: Sentido de וְנִחָם עַל הָרָעָה
  english_pob_reading: relenting concerning the disaster
  chosen_spanish_reading: te arrepientes del desastre
  alternative_spanish_readings:
  - te apiadas del desastre
  - te retractas del desastre
  rationale: La frase debe conservar la tensión antropopática sin convertirla en una afirmación de pecado o error moral en Dios. En este contexto, הָרָעָה es calamidad/juicio anunciado, no mal moral.
  doctrine_reference: 'DOCTRINE.md: preservar la tensión teológica; lenguaje antropopático'
- issue: Amor fiel / חסד
  english_pob_reading: steadfast love
  chosen_spanish_reading: amor fiel
  alternative_spanish_readings:
  - amor leal
  - misericordia
  rationale: חסד tiene un trasfondo de lealtad de pacto. «Amor fiel» conserva el peso relacional y covenantal mejor que una traducción suavizada.
  doctrine_reference: 'DOCTRINE.md: חסד / covenant loyalty'
translation_notes:
  revision_awareness: La redacción sigue la revisión más reciente del POB al preferir una solución directa para עַל כֵּן קִדַּמְתִּי לִבְרֹחַ, evitando una perífrasis pesada. También conserva la decisión revisada de expresar la antecedencia de Jonás con un verbo natural en español («me adelanté»).
  spanish_consistency_notes:
  - Se mantuvo Yahvé para el Tetragrámaton, conforme al estándar del proyecto.
  - «Tarsis» sigue la forma española estable del topónimo; no se añade artículo.
  - Se evitó «Señor» como sustituto del nombre divino.
  - «Amor fiel» se usa de manera consistente para חסד en este contexto, con nota sobre la alternativa «misericordioso»/«compasivo» donde el paralelismo lo requiere.
  - La nota sobre הָרָעָה preserva la tensión entre ‘desastre’ y ‘mal’ sin moralizar el texto.
