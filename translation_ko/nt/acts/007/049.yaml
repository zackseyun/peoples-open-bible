  text: 『하늘은 내 보좌이고 땅은 내 발의 발판이다. 주께서[a] 말씀하신다. 너희가 내게 어떤 집을 지어 주겠느냐? 또 내가 안식할 곳이 어디 있겠느냐?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 이사야 66:1-2 인용. 70인역의 κύριος는 히브리어 본문의 YHWH를 가리키지만, 사도행전이 본문 안에 「말씀하시는 주」를 직접 끼워 넣어 인용함으로써 화자 정체가 「주(=야훼)」임을 분명히 한다. 「주」로 보존하되 본문이 이사야의 야훼 발화임을 각주로 밝힌다.
