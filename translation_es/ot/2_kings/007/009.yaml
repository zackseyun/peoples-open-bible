base_translation:
  language: en
  yaml_path: translation/ot/2_kings/007/009.yaml
  text: Then they said to one another[a], “We are not doing right. This day is a day of good news, and we are keeping silent. If we wait until the light of morning, punishment will overtake us. So now, come[b], let us go and report it to the king’s household.”
  footnotes:
  - marker: a
    text: Or, “punishment will find us” or “we will incur guilt.” The Hebrew says literally, “guilt/iniquity will find us.”
    reason: lexical_alternative
  - marker: b
    text: “The king’s household” may also be rendered “the king’s house” or “the royal palace.”
    reason: lexical_alternative
