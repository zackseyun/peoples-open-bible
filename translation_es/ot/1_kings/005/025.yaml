revisions:
- from: Y Salomón dio a Hiram veinte mil cor de trigo como alimento para su casa[a], y veinte cor de aceite batido[b]. Así Salomón se lo daría a Hiram año tras año.
  to: Y Salomón dio a Hiram veinte mil cores de trigo como alimento para su casa[a], y veinte cores de aceite batido[b]. Así Salomón solía darle a Hiram año tras año.
  rationale: 'La revisión corrige dos puntos para reflejar mejor el hebreo y mejorar la legibilidad del español: se cambia ''se lo daría'' por ''solía darle'' para expresar hábito anual, y se pluraliza la unidad como ''cores'' para un español más natural. Se conservan las notas y el sentido de ''su casa'' con la aclaración contextual sobre la casa real de Hiram.'
