translation:
  language: es
  text: Tomen para ustedes del pueblo doce hombres[a], un hombre de cada tribu.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'El hebreo repite literalmente la frase distributiva: «un hombre, un hombre de cada tribu».'
    reason: lexical_alternative
lexical_decisions:
- source_word: קְחוּ
  english_pob_choice: Take
  chosen_spanish: Tomad
  alternatives_spanish:
  - Tomad para vosotros
  - Tomad
  lexicon: HALOT
  rationale: El imperativo plural de לקח pide un mandato directo. "Tomad" conserva la fuerza verbal básica sin sobreinterpretar el acto como elección o designación exclusiva.
- source_word: לָכֶם
  english_pob_choice: for yourselves
  chosen_spanish: para vosotros
  alternatives_spanish:
  - para ustedes
  - para vosotros mismos
  lexicon: HALOT
  rationale: La preposición con sufijo 2mp añade matiz beneficiario/reflexivo. "Para vosotros" transmite ese valor de manera natural en español bíblico contemporáneo.
- source_word: מִן הָעָם
  english_pob_choice: from the people
  chosen_spanish: de entre el pueblo
  alternatives_spanish:
  - del pueblo
  - de entre la gente
  lexicon: HALOT
  rationale: '"Pueblo" refleja al pueblo del pacto en el contexto inmediato, y "de entre" ayuda a expresar la selección desde dentro del grupo sin añadir demasiado.'
- source_word: שְׁנֵים עָשָׂר אֲנָשִׁים
  english_pob_choice: twelve men
  chosen_spanish: doce hombres
  alternatives_spanish:
  - doce varones
  - doce personas
  lexicon: HALOT
  rationale: La expresión denota varones adultos. "Hombres" preserva la referencia de género y la fuerza simple del sustantivo hebreo.
- source_word: אִישׁ אֶחָד אִישׁ אֶחָד
  english_pob_choice: one man from each
  chosen_spanish: un hombre de cada tribu
  alternatives_spanish:
  - un hombre, un hombre de cada tribu
  - un hombre por tribu
  lexicon: HALOT
  rationale: La repetición distributiva se expresa con naturalidad en español como "un hombre de cada tribu". La forma literal repetida quedaría forzada, aunque se mantiene su sentido distributivo.
- source_word: מִשָּׁבֶט
  english_pob_choice: tribe
  chosen_spanish: tribu
  alternatives_spanish:
  - casa
  - clan
  lexicon: HALOT
  rationale: En este contexto שֵׁבֶט designa una de las tribus de Israel; "tribu" es el equivalente preciso y transparente en español.
translation_notes:
  revision_awareness: El texto coincide con la lectura inglesa auditada y no requiere revisiones adicionales; se conserva la equivalencia distributiva y la referencia colectiva sin cambios de sentido.
  spanish_consistency_notes:
  - Se usa "pueblo" para עם en el marco narrativo de Israel.
  - Se conserva "tribu" para שבט sin recurrir a un término eclesiástico o etnográfico más amplio.
  - La nota al pie marca la repetición distributiva hebrea sin introducir una lectura alternativa doctrinal.
