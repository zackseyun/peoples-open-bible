translation:
  language: es
  text: Y todos los hombres de guerra que estaban con él subieron y se acercaron, y llegaron delante de la ciudad y acamparon al norte de Hai, con el valle entre él[a] y Hai.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «entre él y Hai». El pronombre singular probablemente se refiere a Josué, aunque algunos entienden el sentido de manera colectiva: «entre ellos y Hai».'
    reason: lexical_alternative
lexical_decisions:
- source_word: כָל הָעָם הַמִּלְחָמָה
  english_pob_choice: all the men of war
  chosen_spanish: todo el pueblo de guerra
  alternatives_spanish:
  - todos los guerreros
  - todos los hombres de guerra
  - todo el ejército
  lexicon: HALOT
  rationale: La expresión hebrea es literalmente 'todo el pueblo de la guerra' y nombra al conjunto combatiente, no a la población civil. 'Pueblo de guerra' conserva el sustantivo colectivo עָם y el matiz militar sin convertirlo sin necesidad en un mero 'ejército'.
- source_word: אֲשֶׁר אִתּוֹ
  english_pob_choice: who were with him
  chosen_spanish: que estaba con él
  alternatives_spanish:
  - que iban con él
  - que estaban con él
  lexicon: HALOT
  rationale: La cláusula relativa identifica a las tropas que acompañaban a Josué. El singular de 'estaba' mantiene la referencia más natural al dirigente implícito en el contexto, y sigue de cerca la lectura inglesa con pronombre singular.
- source_word: עָלוּ
  english_pob_choice: went up
  chosen_spanish: subió
  alternatives_spanish:
  - ascendieron
  - subieron
  - marcharon hacia arriba
  lexicon: HALOT
  rationale: עלה expresa el movimiento de subida. En español, 'subió' conserva el valor direccional sin sobreinterpretar como marcha militar técnica.
- source_word: וַיִּגְּשׁוּ
  english_pob_choice: approached
  chosen_spanish: se acercó
  alternatives_spanish:
  - se aproximó
  - se arrimó
  - se acercaron
  lexicon: HALOT
  rationale: נגשׁ indica acercamiento. Se eligió 'se acercó' por naturalidad, conservando el sentido de aproximación en la secuencia verbal.
- source_word: וַיָּבֹאוּ נֶגֶד הָעִיר
  english_pob_choice: came before the city
  chosen_spanish: llegaron delante de la ciudad
  alternatives_spanish:
  - vinieron frente a la ciudad
  - llegaron frente a la ciudad
  - vinieron antes de la ciudad
  lexicon: HALOT
  rationale: נֶגֶד expresa posición enfrente o delante. 'Delante de la ciudad' comunica la relación espacial sin diluir la idea de quedar frente a ella.
- source_word: וַיַּחֲנוּ
  english_pob_choice: camped
  chosen_spanish: acamparon
  alternatives_spanish:
  - acamparon allí
  - levantaron campamento
  - se instalaron
  lexicon: HALOT
  rationale: חנה es el verbo estándar para establecer campamento. 'Acamparon' es claro, digno y fiel al acto militar descrito.
- source_word: מִצְּפוֹן לָעַי
  english_pob_choice: north of Ai
  chosen_spanish: al norte de Hai
  alternatives_spanish:
  - al norte de Ai
  - a la norte de Hai
  - por el norte de Hai
  lexicon: HALOT
  rationale: La preposición localiza el campamento respecto de Hai. Se usa 'Hai' como forma española del topónimo, y 'al norte de' es la construcción idiomática más natural.
- source_word: הַגַּי
  english_pob_choice: the valley
  chosen_spanish: el valle
  alternatives_spanish:
  - la quebrada
  - la garganta
  - el desfiladero
  lexicon: HALOT
  rationale: גַּי designa una depresión o valle; 'el valle' es la opción más amplia y transparente en español, acorde con el contexto geográfico.
- source_word: בֵּינוֹ וּבֵין הָעָי
  english_pob_choice: between him and Ai
  chosen_spanish: entre él y Hai
  alternatives_spanish:
  - entre ellos y Hai
  - entre ellos y Ai
  - entre él y Ai
  lexicon: HALOT
  rationale: Se preserva el pronombre singular difícil del texto hebreo, que la nota inglesa también retuvo. En español, 'él' mantiene la tensión interpretativa y evita armonizar prematuramente la referencia.
theological_decisions:
- issue: Referencia del pronombre singular en 'entre él y Hai'
  english_pob_reading: The singular pronoun likely refers to Joshua, though some understand the sense collectively as 'between them and Ai.'
  chosen_spanish_reading: El pronombre singular se mantiene como 'él', probablemente referido a Josué, aunque puede entenderse de modo colectivo.
  alternative_spanish_readings:
  - entre ellos y Hai
  - entre el pueblo y Hai
  rationale: La tradición textual hebrea conserva un sufijo singular difícil. La traducción no lo nivela, porque la tensión interpretativa forma parte del testimonio del verso; la nota permite la lectura colectiva sin imponerla en el texto principal.
  doctrine_reference: Principio de fidelidad textual y manejo de ambigüedad gramatical sin armonización indebida
translation_notes:
  revision_awareness: La redacción sigue de cerca la forma revisada del inglés POB, que prioriza la secuencia simple de movimiento ('went up and approached') y conserva la dificultad del singular en 'between him and Ai'. En español se mantuvo esa misma tensión, sin convertir el pronombre en plural ni suavizar el orden de los verbos más allá de lo necesario para la sintaxis natural.
  spanish_consistency_notes:
  - Se emplea 'Yahvé' cuando aparezca el tetragrámaton; en este versículo no aparece.
  - Se usa 'Hai' como forma española del topónimo Ai para mantener consistencia toponímica en la serie.
  - Se prefirió 'pueblo de guerra' para conservar el sustantivo colectivo עָם con fuerza militar, en línea con la traducción auditada del inglés.
  - No se añadió mayúscula a 'valle' porque no funciona como nombre propio en este verso.
