revisions:
- from: 'Así dice Yahvé: He aquí[a], aguas suben desde el norte, y llegarán a ser un torrente desbordado; inundarán la tierra y su plenitud, la ciudad y los que habitan en ella. Entonces los hombres[b] clamarán, y todo habitante de la tierra se lamentará.'
  to: 'Así dice Yahvé: He aquí, las aguas suben desde el norte, y llegarán a ser un torrente desbordado; inundarán la tierra y su plenitud[a], la ciudad y los que habitan en ella. Entonces los hombres[c] clamarán[b], y todo habitante de la tierra se lamentará.'
  rationale: Se corrigió el anclaje de la nota léxica para que explique 'la tierra y su plenitud', se añadió la nota requerida sobre הָאָדָם como colectivo humano, y se suavizó ligeramente la sintaxis con 'las aguas suben'. Se mantuvo 'Yahvé', la metáfora de inundación y la estructura del versículo, sin expandir interpretativamente el texto principal.
