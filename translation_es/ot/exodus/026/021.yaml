translation:
  language: es
  text: 'Y sus cuarenta bases[a] serán de plata: dos bases debajo del primer marco[b], y dos bases debajo del otro marco[b].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Bases» conserva el sentido técnico de los apoyos o sockets de plata donde se asentaban los marcos.
    reason: lexical_alternative
  - marker: b
    text: «Marco» traduce aquí el hebreo קֶרֶשׁ por su función estructural en el tabernáculo; la alternativa tradicional «tabla» o «tablero» es posible, pero puede sonar menos clara en español moderno.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְ/אַרְבָּעִ֥ים
  english_pob_choice: and ... forty
  chosen_spanish: y ... cuarenta
  alternatives_spanish:
  - y cuarenta
  lexicon: HALOT
  rationale: Conservo la coordinación de la partícula וְ y el numeral cardinal, manteniendo el enlace con el versículo anterior y el conteo exacto sin sobreexplicar.
- source_word: אַדְנֵי/הֶ֖ם
  english_pob_choice: their bases
  chosen_spanish: sus bases
  alternatives_spanish:
  - sus sockets
  - sus apoyos
  lexicon: HALOT
  rationale: En el contexto del tabernáculo, אֲדָנִים designa las piezas de soporte en las que se insertaban los marcos. «Bases» refleja bien la función estructural en español y sigue la decisión auditada del POB en inglés.
- source_word: כָּ֑סֶף
  english_pob_choice: of silver
  chosen_spanish: de plata
  alternatives_spanish:
  - de plata fina
  - plateadas
  lexicon: HALOT
  rationale: El sustantivo material se expresa naturalmente en español como «de plata», manteniendo el valor de material de construcción.
- source_word: שְׁנֵ֣י אֲדָנִ֗ים
  english_pob_choice: two bases
  chosen_spanish: dos bases
  alternatives_spanish:
  - dos sockets
  lexicon: HALOT
  rationale: Mantengo «bases» de forma consistente para el mismo término hebreo, evitando variar sin motivo entre dos equivalentes posibles.
- source_word: תַּ֚חַת
  english_pob_choice: under
  chosen_spanish: debajo de
  alternatives_spanish:
  - bajo
  - bajo de
  lexicon: HALOT
  rationale: «Debajo de» comunica con claridad la posición física inferior y resulta natural en español contemporáneo.
- source_word: הַ/קֶּ֣רֶשׁ
  english_pob_choice: the ... frame
  chosen_spanish: un marco
  alternatives_spanish:
  - el tablero
  - la tabla
  - el board
  lexicon: HALOT
  rationale: El término tabernacular קֶרֶשׁ describe una pieza estructural vertical; «marco» comunica su función mejor que una traducción literal como «tabla» o «tablero» y sigue el criterio funcional del POB inglés.
- source_word: הָֽ/אֶחָ֔ד
  english_pob_choice: the one
  chosen_spanish: un
  alternatives_spanish:
  - el uno
  - cada
  lexicon: HALOT
  rationale: Aunque el hebreo es formalmente definido, en español «un» funciona mejor para la distribución de la construcción y evita una repetición rígida; el segundo miembro queda explícito como «el otro marco» para reflejar el contraste contextual.
- source_word: וּ/שְׁנֵ֣י אֲדָנִ֔ים תַּ֖חַת הַ/קֶּ֥רֶשׁ הָ/אֶחָֽד
  english_pob_choice: and two bases under the other frame
  chosen_spanish: y dos bases debajo del otro marco
  alternatives_spanish:
  - y dos bases debajo del segundo marco
  - y dos bases debajo del otro tablero
  lexicon: HALOT
  rationale: La repetición hebrea se entiende distributivamente en el contexto; por eso empleo «el otro marco» para hacer explícito el contraste que la revisión inglesa también resolvió, sin perder la estructura paralela del verso.
translation_notes:
  revision_awareness: La redacción sigue la lectura revisada del POB en inglés que evita la repetición literal «the one frame» en ambos miembros y distingue el segundo como «the other frame». En español, esa distinción se reproduce con «un marco» / «el otro marco» para conservar la simetría y la claridad distributiva del original hebreo.
  spanish_consistency_notes:
  - He mantenido «bases» para אַדְנִים y «marco» para קֶרֶשׁ de manera consistente dentro del versículo.
  - He evitado «SEÑOR» o formulaciones litúrgicas no presentes en este texto; no hay término divino en el versículo.
  - La puntuación con dos puntos reproduce bien la enumeración material del hebreo y del POB inglés.
