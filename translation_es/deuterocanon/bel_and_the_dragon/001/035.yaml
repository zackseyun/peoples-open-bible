translation:
  language: es
  text: 'Y dijo Habacuc: «Señor, no he visto Babilonia, y no conozco el foso[a]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «la guarida» o «la cisterna»; el término griego es general y designa un lugar parecido a un foso, y aquí se refiere al sitio donde está encerrado Daniel.
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἀμβακοὺμ
  english_pob_choice: Habakkuk
  chosen_spanish: Habacuc
  alternatives_spanish:
  - Habakkuk
  lexicon: uso bíblico estándar
  rationale: El nombre propio del profeta se adapta al español bíblico como «Habacuc», forma clara y reconocible para lectores hispanohablantes.
- source_word: Κύριε
  english_pob_choice: Lord
  chosen_spanish: Señor
  alternatives_spanish:
  - Maestro
  lexicon: LSJ
  rationale: Es vocativo dirigido a Dios; «Señor» conserva la función reverencial y es la correspondencia natural en español para este uso.
- source_word: Βαβυλῶνα
  english_pob_choice: Babylon
  chosen_spanish: Babilonia
  alternatives_spanish:
  - Babilon
  lexicon: uso geográfico bíblico estándar
  rationale: El topónimo se vierte con la forma usual en español bíblico, «Babilonia», sin perder la referencia histórica.
- source_word: οὐχ ἑώρακα
  english_pob_choice: I have not seen
  chosen_spanish: no he visto
  alternatives_spanish:
  - no vi
  - nunca he visto
  lexicon: LSJ
  rationale: El perfecto griego expresa un estado presente derivado de una experiencia pasada; «no he visto» reproduce mejor ese valor que un pretérito simple.
- source_word: τὸν λάκκον
  english_pob_choice: the pit
  chosen_spanish: el foso
  alternatives_spanish:
  - la cisterna
  - la cueva
  - el pozo
  lexicon: LSJ
  rationale: Aunque el inglés POB opta por «pit», en español «foso» comunica de manera natural una cavidad o recinto de confinamiento y puede aludir al lugar donde está Daniel; se mantiene la generalidad del término griego sin estrecharlo innecesariamente.
- source_word: οὐ γινώσκω
  english_pob_choice: I do not know
  chosen_spanish: no conozco
  alternatives_spanish:
  - no sé
  - no lo conozco
  lexicon: LSJ
  rationale: Aquí γινώσκω puede expresar desconocimiento o falta de familiaridad; «no conozco» fluye mejor en español con el objeto implícito del lugar y preserva el sentido de no estar familiarizado con él.
