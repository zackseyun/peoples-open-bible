translation:
  language: es
  text: 'Entonces David llamó a uno de los jóvenes y dijo: «Acércate; derríbalo[a]». Y él lo golpeó, y murió.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «atácalo» / «cae sobre él» para פְּגַע בּוֹ. El verbo hebreo puede denotar un asalto violento más general; aquí el contexto deja claro que el resultado sería mortal.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּקְרָא
  english_pob_choice: called
  chosen_spanish: llamó
  alternatives_spanish:
  - convocó
  - mandó llamar
  lexicon: HALOT
  rationale: קרא en este contexto narrativo expresa el acto de llamar a alguien. «Llamó» es natural en español y conserva la sencillez del hebreo sin añadir matiz de ceremonia o autoridad más fuerte de lo que el texto exige.
- source_word: לְאַחַד מֵהַנְּעָרִים
  english_pob_choice: one of the young men
  chosen_spanish: a uno de los jóvenes
  alternatives_spanish:
  - a uno de los siervos
  - a uno de los asistentes
  lexicon: HALOT
  rationale: נְעָרִים puede designar jóvenes, servidores o asistentes según el contexto. Aquí el hebreo usa lenguaje de edad/estatus, y «jóvenes» reproduce de forma directa ese valor sin convertirlo en un título funcional más específico.
- source_word: גַּשׁ
  english_pob_choice: Come near
  chosen_spanish: Acércate
  alternatives_spanish:
  - Ven aquí
  - Arrímate
  lexicon: HALOT
  rationale: El imperativo de נגשׁ significa acercarse o ponerse cerca. «Acércate» transmite bien la orden inmediata y resulta idiomático en español.
- source_word: פְּגַע בּוֹ
  english_pob_choice: strike him down
  chosen_spanish: atácalo
  alternatives_spanish:
  - golpéalo
  - cae sobre él
  - mátalo
  lexicon: HALOT
  rationale: פגע con ב puede significar golpear, atacar o caer sobre alguien. En este contexto la acción es letal, pero el verbo hebreo no es el término directo para «matar». «Atácalo» preserva esa amplitud semántica y deja que la muerte quede confirmada por el contexto y por la cláusula siguiente.
- source_word: וַיַּכֵּהוּ
  english_pob_choice: he struck him
  chosen_spanish: lo golpeó
  alternatives_spanish:
  - lo hirió
  - lo atacó
  lexicon: HALOT
  rationale: נכה es el verbo común para golpear o herir. «Lo golpeó» mantiene la secuencia narrativa separada de la consecuencia final («y murió»), como en el hebreo.
- source_word: וַיָּמֹת
  english_pob_choice: and he died
  chosen_spanish: y murió
  alternatives_spanish:
  - así murió
  - y falleció
  lexicon: HALOT
  rationale: מות es el verbo estándar «morir». «Y murió» reproduce de manera transparente la clausura narrativa del hebreo.
translation_notes:
  revision_awareness: El texto sigue de cerca el hebreo WLC y el audit trail inglés de la POB. Se conserva la secuencia verbal narrativa sin fusionar la orden y el resultado, y se mantiene la ambigüedad léxica de פְּגַע בּוֹ con una nota que refleja el matiz del inglés auditado.
  spanish_consistency_notes:
  - Se usa «David» y no una forma abreviada o reverencial, conforme al narrativo hebreo.
  - Se evitó traducir פְּגַע בּוֹ como «mátalo», porque el POB inglés documenta un rango más amplio y la muerte queda expresada explícitamente en la cláusula final.
  - «Jóvenes» se conserva como término de edad/estatus, no como cargo técnico.
  - La puntuación reproduce el encadenamiento narrativo breve del hebreo con una cita directa clara en español.
