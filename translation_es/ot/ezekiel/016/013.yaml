translation:
  language: es
  text: Te adornaste con oro y plata, y tu vestimenta fue de lino fino, seda[a] y tela bordada. Comiste flor de harina, miel y aceite, y te volviste sumamente hermosa, y prosperaste hasta llegar a la realeza[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: La identificación precisa del tejido traducido como 'seda' es incierta; se trata de una tela de lujo.
    reason: lexical_alternative
  - marker: b
    text: 'O: ''prosperaste hasta un reino'' o ''llegaste a la realeza''. La expresión hebrea puede indicar un avance exitoso hacia un estatus real más general.'
    reason: alternative_reading
lexical_decisions:
- source_word: וַתַּעְדִּי
  english_pob_choice: You adorned yourself
  chosen_spanish: Te adornaste
  alternatives_spanish:
  - Te engalanaste
  - Fuiste adornada
  lexicon: HALOT
  rationale: El verbo expresa adornarse con ornamentos; el reflexivo español conserva la acción sobre la propia persona y el tono de lujo del contexto.
- source_word: זָהָב וָכֶסֶף
  english_pob_choice: gold and silver
  chosen_spanish: oro y plata
  alternatives_spanish:
  - oro y plata preciosos
  - oro y plata finos
  lexicon: HALOT
  rationale: Son materiales directos y transparentes; se mantiene la literalidad sin añadir matices no presentes en el hebreo.
- source_word: וּמַלְבּוּשֵׁךְ
  english_pob_choice: and your clothing was
  chosen_spanish: y tu vestimenta fue
  alternatives_spanish:
  - y tu ropa fue
  - y tu atuendo fue
  lexicon: HALOT
  rationale: El sustantivo singular colectivo con sufijo de segunda femenina se expresa naturalmente como 'vestimenta', que introduce bien la lista de telas lujosas.
- source_word: שֵׁשִׁי
  english_pob_choice: fine linen
  chosen_spanish: lino fino
  alternatives_spanish:
  - lino
  - lino de calidad
  lexicon: HALOT
  rationale: '''Lino fino'' conserva el valor de tela lujosa y cultual sin perder claridad en español.'
- source_word: מֶשִׁי
  english_pob_choice: silk
  chosen_spanish: seda
  alternatives_spanish:
  - tela preciosa
  - tejido fino
  lexicon: HALOT
  rationale: La identificación precisa del tejido es discutida, pero la tradición de traducción la rinde como una tela de lujo; 'seda' es la equivalencia breve y natural en español.
- source_word: רִקְמָה
  english_pob_choice: embroidered cloth
  chosen_spanish: tela bordada
  alternatives_spanish:
  - obra bordada
  - tejido bordado
  lexicon: HALOT
  rationale: El término designa un material con bordado; 'tela bordada' conserva el sustantivo de uso textil y la idea de ornamentación.
- source_word: סֹלֶת
  english_pob_choice: fine flour
  chosen_spanish: flor de harina
  alternatives_spanish:
  - harina fina
  - harina selecta
  lexicon: HALOT
  rationale: '''Flor de harina'' es el equivalente castellano más natural y tradicional para harina de alta calidad.'
- source_word: דְבַשׁ
  english_pob_choice: honey
  chosen_spanish: miel
  alternatives_spanish:
  - miel dulce
  - miel de abeja
  lexicon: HALOT
  rationale: El alimento se traduce literalmente como miel; no hay razón contextual para especificar más.
- source_word: שֶׁמֶן
  english_pob_choice: oil
  chosen_spanish: aceite
  alternatives_spanish:
  - aceite de oliva
  - óleo
  lexicon: HALOT
  rationale: '''Aceite'' es el término natural en español; el hebreo es genérico y no obliga a precisar ''de oliva''.'
- source_word: וַתִּיפִי בִּמְאֹד מְאֹד
  english_pob_choice: you became exceedingly beautiful
  chosen_spanish: te volviste bellísima en gran manera
  alternatives_spanish:
  - te hiciste hermosísima
  - te volviste muy hermosa
  lexicon: HALOT
  rationale: El intensificador hebreo se expresa con 'en gran manera'; 'bellísima' comunica la superlación con naturalidad y mantiene el énfasis estético.
- source_word: וַתִּצְלְחִי לִמְלוּכָה
  english_pob_choice: prospered to royalty
  chosen_spanish: prosperaste hasta llegar a la realeza
  alternatives_spanish:
  - prosperaste hacia la realeza
  - llegaste a la realeza
  lexicon: HALOT
  rationale: La raíz צלח aquí denota prosperar/salir bien hacia una condición elevada; 'hasta llegar a la realeza' conserva la idea de avance exitoso sin reducirla a una sola institución política.
theological_decisions:
- issue: La cláusula final sobre el ascenso a condición real
  english_pob_reading: prospered to royalty
  chosen_spanish_reading: prosperaste hasta llegar a la realeza
  alternative_spanish_readings:
  - prosperaste hasta el reino
  - llegaste a la realeza
  rationale: El hebreo puede expresar prosperidad o éxito en el paso a una condición real. 'Hasta llegar a la realeza' mantiene la elevación de estatus sin forzar 'reino' como entidad política ni 'reina/queenship' como lectura más estrecha de género.
  doctrine_reference: Lexical continuity; no doctrinal expansion beyond the metaphor of Jerusalem exalted in status.
translation_notes:
  revision_awareness: La versión española sigue la revisión más reciente del audit trail inglés, que prefirió 'prospered to royalty' en lugar de 'advanced to royalty'. Se preservó también la incertidumbre léxica del tejido מֶשִׁי mediante una nota de alternativa, aunque en el texto principal se optó por una solución española natural y concisa.
  spanish_consistency_notes:
  - Se usa 'Yahvé' solo cuando el texto lo requiera explícitamente; en este versículo no aparece el nombre divino.
  - Se mantuvo 'realeza' para לִמְלוּכָה por su neutralidad y porque evita imponer 'reino' o 'reina' donde el hebreo habla de condición/estatus real.
  - '''Flor de harina'' se escogió por idiomaticidad castellana y para conservar el registro de abundancia del pasaje.'
  - La enumeración de telas se mantuvo en serie paralela para reflejar el paralelismo del hebreo.
