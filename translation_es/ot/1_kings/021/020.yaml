translation:
  language: es
  text: 'Acab dijo a Elías: «¿Me has hallado, enemigo mío?» Él dijo: «Te he hallado, porque te has vendido para hacer el mal a ojos de Yahvé[a]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: יְהוָה. Traducido aquí como «Yahvé» para preservar el nombre divino; la traducción tradicional «el SEÑOR» queda evitada por la política terminológica del POB.'
    reason: source_note
lexical_decisions:
- source_word: הַמְצָאתַנִי
  english_pob_choice: Have you found me
  chosen_spanish: ¿Me has hallado?
  alternatives_spanish:
  - ¿Me has encontrado?
  - ¿Me has descubierto?
  lexicon: HALOT
  rationale: El verbo מצא en esta pregunta directa conserva mejor la confrontación con «hallar»/«encontrar». «Hallar» mantiene con más nitidez el eco verbal con la respuesta de Elías y es perfectamente natural en español bíblico moderno.
- source_word: אֹיְבִי
  english_pob_choice: my enemy
  chosen_spanish: oh mi enemigo
  alternatives_spanish:
  - mi enemigo
  - enemigo mío
  lexicon: HALOT
  rationale: El sufijo posesivo expresa «mi enemigo»; el «oh» refleja con naturalidad el valor vocativo que la revisión inglesa destacó. Se evita una traducción más suave para conservar la hostilidad del intercambio.
- source_word: מָצָאתִי
  english_pob_choice: I have found you
  chosen_spanish: Te he hallado
  alternatives_spanish:
  - Te he encontrado
  - Te he descubierto
  lexicon: HALOT
  rationale: Se mantiene el mismo verbo básico que en la pregunta para preservar el paralelismo y el golpe retórico del hebreo. «Hallar» permite repetir el vínculo verbal sin sonar forzado.
- source_word: יַעַן
  english_pob_choice: because
  chosen_spanish: porque
  alternatives_spanish:
  - ya que
  - pues
  lexicon: HALOT
  rationale: Introduce la causa de la sentencia de Elías. «Porque» es la equivalencia causal más clara y directa en español contemporáneo.
- source_word: הִתְמַכֶּרְךָ
  english_pob_choice: you have sold yourself
  chosen_spanish: te has vendido
  alternatives_spanish:
  - te has entregado
  - te has dado por vendido
  lexicon: HALOT
  rationale: El hitpael de מכר es reflexivo y conserva la metáfora de autoventa o autoentrega. «Te has vendido» reproduce con fuerza el matiz de someterse voluntariamente al mal, sin diluirlo en una explicación.
- source_word: לַעֲשׂוֹת הָרַע
  english_pob_choice: to do what is evil
  chosen_spanish: para hacer lo malo
  alternatives_spanish:
  - para hacer el mal
  - para hacer lo que es malo
  lexicon: HALOT
  rationale: La frase hebrea funciona como una finalidad moral. «Lo malo» permite mantener el sustantivo neutro implícito y evita una formulación excesivamente abstracta; también conserva la fuerza ética del texto.
- source_word: בְּעֵינֵי יְהוָה
  english_pob_choice: in the eyes of Yahweh
  chosen_spanish: a ojos de Yahvé
  alternatives_spanish:
  - a la vista de Yahvé
  - delante de Yahvé
  lexicon: HALOT
  rationale: Se conserva la imagen idiomática de evaluación divina con una expresión natural en español. «A ojos de» reproduce bien la metáfora perceptiva del hebreo y no la aplana a una simple valoración general.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  - Jehová
  lexicon: HALOT
  rationale: El Tetragrámaton se vierte con el nombre divino «Yahvé» conforme a la terminología del proyecto. Se evita la sustitución por un título, preservando el nombre personal de Dios en el original.
theological_decisions:
- issue: Traducción del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - Jehová
  rationale: El texto hebreo usa explícitamente el Tetragrámaton. La decisión del POB en inglés es transliterarlo como «Yahweh»; en español se normaliza a «Yahvé», la forma consagrada en el uso bíblico hispano del proyecto, manteniendo el nombre divino y evitando la sustitución por «Señor».
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh / español: Yahvé'
translation_notes:
  revision_awareness: La revisión inglesa reciente solo añadió el vocativo enfático «O» antes de «my enemy»; por eso en español se reflejó con «oh mi enemigo» sin introducir cambios de sentido. No hubo otras revisiones sustantivas que afectaran la estructura del versículo.
  spanish_consistency_notes:
  - Se mantuvo el eco verbal entre «¿Me has hallado?» y «Te he hallado» para reproducir la repetición de מצא.
  - «Yahvé» se usa de forma consistente para יְהוָה, conforme a la terminología del proyecto.
  - «Te has vendido» preserva la imagen reflexiva del hebreo sin suavizarla a «te has entregado».
