translation:
  language: es
  text: 'Entonces Moisés dijo a Yahvé: «El pueblo no puede subir al monte Sinaí, porque tú mismo nos advertiste[a], diciendo: “Pon límites alrededor del monte y conságralo”[b]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «nos diste una solemne advertencia» o «testificaste contra nosotros». El verbo hebreo puede expresar una advertencia formal o un testimonio solemne.
    reason: lexical_alternative
  - marker: b
    text: O «Fija un límite para el monte y conságralo».
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  - el SEÑOR
  lexicon: HALOT
  rationale: El texto hebreo usa el Tetragrámaton directamente; siguiendo la decisión auditada del POB, se conserva el nombre divino en forma transparente. En español, «Yahvé» es la forma establecida y natural para este registro, más que la sustitución por un título.
- source_word: לֹא יוּכַל
  english_pob_choice: cannot
  chosen_spanish: no puede
  alternatives_spanish:
  - no es capaz de
  - no podrá
  lexicon: HALOT
  rationale: El verbo expresa imposibilidad real, no simple falta de permiso. «No puede» transmite esa incapacidad de forma natural y fiel.
- source_word: הָעָם
  english_pob_choice: the people
  chosen_spanish: el pueblo
  alternatives_spanish:
  - la gente
  - la nación
  lexicon: HALOT
  rationale: Aquí el colectivo de Israel se expresa con el sustantivo singular colectivo «el pueblo», que es el equivalente más claro y adecuado en español.
- source_word: לַעֲלֹת אֶל הַר סִינַי
  english_pob_choice: go up to Mount Sinai
  chosen_spanish: subir al monte Sinaí
  alternatives_spanish:
  - ascender al monte Sinaí
  - subir al monte del Sinaí
  lexicon: HALOT
  rationale: עלה conserva el sentido literal de subir/ascender. En español, «subir al monte Sinaí» preserva la imagen vertical sin sonar forzado.
- source_word: כִּי
  english_pob_choice: because
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  lexicon: HALOT
  rationale: Introduce la razón de la afirmación de Moisés; «porque» es la conexión causal más directa y natural en español.
- source_word: אַתָּה
  english_pob_choice: you yourself
  chosen_spanish: tú mismo
  alternatives_spanish:
  - tú
  - tú personalmente
  lexicon: HALOT
  rationale: El pronombre explícito añade énfasis. «Tú mismo» reproduce esa fuerza enfática de modo natural en español.
- source_word: הַעֵדֹתָה בָּנוּ
  english_pob_choice: warned us
  chosen_spanish: nos advertiste
  alternatives_spanish:
  - nos testificaste
  - nos diste una solemne advertencia
  lexicon: HALOT
  rationale: El hifil de עוד puede abarcar advertir, amonestar o dar testimonio formal. En este contexto de límites al monte, «nos advertiste» capta bien la fuerza de la instrucción previa sin perder la posibilidad semántica de una advertencia solemne.
- source_word: לֵאמֹר
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - al decir
  - diciendo así
  lexicon: HALOT
  rationale: Es la forma estándar para introducir discurso directo en español y mantiene la continuidad sintáctica del hebreo.
- source_word: הַגְבֵּל אֶת הָהָר
  english_pob_choice: Set bounds around the mountain
  chosen_spanish: Pon límites alrededor del monte
  alternatives_spanish:
  - Señala un límite para el monte
  - Delimita el monte
  lexicon: HALOT
  rationale: El hifil de גבל significa delimitar o fijar fronteras. «Pon límites alrededor del monte» es idiomático, claro y conserva la imagen espacial del mandato.
- source_word: וְקִדַּשְׁתּוֹ
  english_pob_choice: and consecrate it
  chosen_spanish: y conságralo
  alternatives_spanish:
  - y santifícalo
  - y sepáralo como santo
  lexicon: HALOT
  rationale: קדשׁ en este contexto cultual es poner aparte para Dios. «Conságralo» mantiene el sentido ritual y es una equivalencia natural en español bíblico contemporáneo.
theological_decisions:
- issue: Cómo reflejar el nombre divino יהוה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Yahweh
  rationale: Se conserva el nombre personal de Dios en vez de sustituirlo por un título. «Yahvé» es la forma habitual y transparente para el lector de español, alineada con la decisión doctrinal del POB.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Valor de הַעֵדֹתָה בָּנוּ en el contexto del Sinaí
  english_pob_reading: warned us / testified to us
  chosen_spanish_reading: nos advertiste
  alternative_spanish_readings:
  - nos testificaste
  - nos diste una solemne advertencia
  rationale: La escena trata de una instrucción previa que establece límites sagrados. «Nos advertiste» comunica la fuerza normativa y preventiva del verbo sin ocultar que el hebreo también puede sugerir un testimonio o amonestación formal.
  doctrine_reference: HALOT / contexto inmediato de Éxodo 19:12-13, 19:23
translation_notes:
  revision_awareness: El borrador sigue el texto hebreo de WLC y el trazado auditado del POB en inglés. No se observaron revisiones aplicadas en el ciclo más reciente; la concordancia de revisión indica alta coincidencia y ningún cambio necesario.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» para יְהוָה, conforme al estándar del proyecto.
  - Se usó «monte Sinaí» y no una reformulación más libre, para conservar el paralelismo con el mandato previo del contexto inmediato.
  - «Conságralo» conserva el sentido cultual de קדשׁ sin introducir terminología eclesiástica ajena al hebreo.
  - Se evitó traducir mecánicamente desde el inglés cuando el español pedía un orden más natural, pero sin ampliar el sentido del versículo.
