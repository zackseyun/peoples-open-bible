translation:
  language: es
  text: ¡Oh madre[a], ahora probada por dolores más amargos que los dolores de parto al darlos a luz!
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'También puede entenderse: «los dolores al momento de darles a luz». El griego literalmente alude a los dolores de parto conectados con ellos.'
    reason: lexical_alternative
lexical_decisions:
- source_word: πικροτέρων
  english_pob_choice: more bitter
  chosen_spanish: más amargos
  alternatives_spanish:
  - más graves
  - más duros
  lexicon: LSJ
  rationale: El comparativo de πικρός conserva con naturalidad en español la imagen de algo «amargo». «Más amargos» mantiene la fuerza metafórica y el tono de sufrimiento intenso mejor que una simplificación abstracta como «más graves».
- source_word: μήτηρ
  english_pob_choice: mother
  chosen_spanish: madre
  alternatives_spanish:
  - madre mía
  - madre,
  lexicon: LSJ
  rationale: Se mantiene el vocativo directo y natural. «Madre» refleja el apelativo de lamento/clamor del griego sin añadir matices que el texto no exige.
- source_word: πόνων
  english_pob_choice: pains
  chosen_spanish: dolores
  alternatives_spanish:
  - sufrimientos
  - penas
  lexicon: LSJ
  rationale: En este contexto de aflicción y comparación con dolores de parto, «dolores» comunica bien la experiencia corporal y emocional. «Sufrimientos» sería posible, pero perdería la conexión verbal con ὠδίνων.
- source_word: πειρασθεῖσα
  english_pob_choice: tested
  chosen_spanish: probada
  alternatives_spanish:
  - puesta a prueba
  - tentada
  lexicon: BDAG/LSJ
  rationale: El participio expresa haber sido sometida a una prueba o experiencia dura. «Probada» conserva esa idea de haber pasado por una prueba sin imponer una lectura exclusivamente moral o tentatoria.
- source_word: ἤπερ
  english_pob_choice: than
  chosen_spanish: que
  alternatives_spanish:
  - más que
  - antes que
  lexicon: LSJ
  rationale: En español, la comparación queda más natural con «más amargos que...». «Que» expresa la relación comparativa de manera idiomática.
- source_word: τῶν ἐπʼ αὐτοῖς ὠδίνων
  english_pob_choice: the birth pangs for them
  chosen_spanish: los dolores de parto de ellos
  alternatives_spanish:
  - los dolores de parto al darlos a luz
  - los dolores de parto que los tuvieron
  lexicon: LSJ
  rationale: ὠδίνων son «dolores de parto». La preposición y el pronombre se reflejan de modo transparente con «de ellos», manteniendo la referencia a los hijos mencionados y la posible tensión entre «para ellos» y «en su nacimiento».
translation_notes:
  revision_awareness: El texto griego presenta un alto grado de acuerdo con la auditoría inglesa. Se ha preservado la comparación entre los dolores presentes y los dolores de parto asociados con los hijos, sin suavizar la imagen de amargura ni borrar la ambigüedad señalada por la nota inglesa.
  spanish_consistency_notes:
  - Se mantiene «madre» en vocativo directo y «dolores» para conservar el paralelismo con «dolores de parto».
  - Se usa «probada» para πειρασθεῖσα como alternativa natural y fiel al matiz de prueba/experiencia dura.
  - La nota al pie marca la ambigüedad de ὠδίνων sin resolverla de forma unilateral.
