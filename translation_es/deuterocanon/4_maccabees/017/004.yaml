translation:
  language: es
  text: Por tanto, ten ánimo, oh madre de alma santa[a], manteniendo valerosamente la esperanza de la perseverancia hacia Dios.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «madre con alma santa». El griego ἱερόψυχε es un compuesto compacto que une la idea de lo sagrado con la interioridad del alma.
    reason: lexical_alternative
lexical_decisions:
- source_word: θάρρει
  english_pob_choice: take courage
  chosen_spanish: ten ánimo
  alternatives_spanish:
  - cobra ánimo
  - ten valor
  - ten coraje
  lexicon: LSJ
  rationale: El imperativo exhorta a la valentía; «ten ánimo» es natural en español y conserva el tono imperativo de aliento sin sonar mecánico.
- source_word: τοιγαροῦν
  english_pob_choice: therefore
  chosen_spanish: por tanto
  alternatives_spanish:
  - así que
  - por consiguiente
  - entonces
  lexicon: LSJ
  rationale: La partícula introduce una conclusión; «por tanto» reproduce bien la relación inferencial con registro digno.
- source_word: μῆτηρ
  english_pob_choice: mother
  chosen_spanish: madre
  alternatives_spanish:
  - madrecita
  - madre mía
  lexicon: LSJ
  rationale: Vocativo directo y literal. En español basta «madre» para el apelativo sin añadir afectación no presente en el griego.
- source_word: ἱερόψυχε
  english_pob_choice: of a holy soul
  chosen_spanish: de alma santa
  alternatives_spanish:
  - de alma sagrada
  - de alma santa y noble
  - alma santa
  lexicon: LSJ
  rationale: El compuesto reúne la idea de lo sagrado con el alma. «De alma santa» preserva la cualidad religiosa y suena más idiomático que un calco como «santa-animada» o «holy-souled».
- source_word: ἐλπίδα
  english_pob_choice: hope
  chosen_spanish: la esperanza
  alternatives_spanish:
  - la expectativa
  - la espera
  lexicon: LSJ
  rationale: «Esperanza» es el equivalente normal y mantiene la fuerza teologal del término.
- source_word: ὑπομονῆς
  english_pob_choice: of endurance
  chosen_spanish: de la perseverancia
  alternatives_spanish:
  - de la paciencia
  - de la constancia
  - de la resistencia
  lexicon: LSJ
  rationale: En este contexto martirial, ὑπομονή apunta a resistencia perseverante bajo prueba. «Perseverancia» comunica bien esa continuidad, con menos ambigüedad que «paciencia».
- source_word: γενναίως
  english_pob_choice: bravely
  chosen_spanish: valerosamente
  alternatives_spanish:
  - bravamente
  - con valor
  - noblemente
  lexicon: LSJ
  rationale: El adverbio expresa nobleza de ánimo y valentía. «Valerosamente» conserva el matiz moral y evita redundar con el imperativo inicial.
- source_word: ἔχουσα
  english_pob_choice: holding
  chosen_spanish: sosteniendo
  alternatives_spanish:
  - teniendo
  - manteniendo
  - aferrando
  lexicon: LSJ
  rationale: El participio describe la actitud sostenida de la madre respecto a la esperanza. «Sosteniendo» transmite continuidad y firmeza sin añadir un «fast» inexistente en el griego.
- source_word: πρὸς θεόν
  english_pob_choice: toward God
  chosen_spanish: hacia Dios
  alternatives_spanish:
  - hacia Yahvé
  - ante Dios
  - en dirección a Dios
  lexicon: LSJ
  rationale: La preposición expresa orientación. «Hacia Dios» conserva esa dirección relacional sin sobrecargar el sentido con una localización teológica distinta.
theological_decisions:
- issue: Tratamiento del vocativo ἱερόψυχε y su carga religiosa
  english_pob_reading: mother with a holy soul
  chosen_spanish_reading: madre de alma santa
  alternative_spanish_readings:
  - madre con alma santa
  - madre de espíritu santo
  - alma santa
  rationale: El griego alaba la interioridad consagrada de la mujer. La elección mantiene la dimensión sagrada explícita del compuesto sin convertirlo en un título doctrinal posterior o en una paráfrasis excesiva.
  doctrine_reference: Principio de primacía del original y respeto por la semántica compuesta; no importar fórmulas devocionales ajenas al texto.
translation_notes:
  revision_awareness: 'La redacción sigue la revisión más reciente del POB inglés: se evita añadir un equivalente de «fast» para ἔχουσα, y γενναίως se vierte con un adverbio simple de valentía sin repetir el matiz del imperativo inicial. También se conserva el valor vocativo natural de «madre» con una construcción española fluida.'
  spanish_consistency_notes:
  - Se usa «Dios» porque el texto griego tiene θεόν y no un reemplazo litúrgico indirecto.
  - Se prefiere «alma santa» para reflejar el compuesto ἱερόψυχε sin perder el componente sacro.
  - «Perseverancia» se reserva aquí para ὑπομονή por el contexto de resistencia en pruebas; no se usa «paciencia» para no suavizar el sentido martirial.
  - No se introduce «Cristo» ni «Yahvé» porque el verso no contiene esos términos.
