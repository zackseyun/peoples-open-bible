translation:
  language: es
  text: Caigan sobre ellos brasas ardientes[a]; que él los arroje al fuego, a hondos pozos[b], para nunca volver a levantarse.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Que lluevan brasas sobre ellos». El verbo hebreo puede expresar la idea de hacer caer o hacer llover algo sobre ellos.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «a abismos» o «a profundidades acuáticas». El término hebreo es raro y su matiz preciso es incierto.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ימיטו
  english_pob_choice: Let ... fall
  chosen_spanish: Caigan
  alternatives_spanish:
  - Que caigan
  - Caigan sobre ellos
  lexicon: HALOT
  rationale: El hifil imperfecto con fuerza jussiva/imprecativa pide una forma volitiva en español. "Caigan" conserva el valor de deseo/clamor y el matiz causativo sin hacer la frase artificial.
- source_word: עֲלֵיהֶם
  english_pob_choice: on them
  chosen_spanish: sobre ellos
  alternatives_spanish:
  - en ellos
  - contra ellos
  lexicon: HALOT
  rationale: La preposición עַל con sufijo se expresa naturalmente como "sobre ellos" en español, manteniendo la imagen de algo que desciende sobre sus cabezas.
- source_word: גחלים
  english_pob_choice: burning coals
  chosen_spanish: carbones encendidos
  alternatives_spanish:
  - brasas
  - carbones ardientes
  - brasas ardientes
  lexicon: HALOT
  rationale: '"Carbones encendidos" comunica el sentido de carbones/brasas con fuego activo y preserva bien la imagen poética de juicio.'
- source_word: בָּאֵשׁ
  english_pob_choice: into the fire
  chosen_spanish: al fuego
  alternatives_spanish:
  - en el fuego
  - dentro del fuego
  lexicon: HALOT
  rationale: Con el verbo causativo siguiente, el hebreo tiene fuerza direccional; "al fuego" suena natural en español y mantiene la idea de ser arrojados hacia el fuego.
- source_word: יפילם
  english_pob_choice: let him cast them
  chosen_spanish: que él los arroje
  alternatives_spanish:
  - que los eche
  - que él los haga caer
  - que los lance
  lexicon: HALOT
  rationale: El hifil de נפל tiene valor causativo. "Arroje" expresa bien la acción de lanzar o hacer caer, y el singular se conserva para no resolver explícitamente el sujeto implícito.
- source_word: במהמרות
  english_pob_choice: into deep pits
  chosen_spanish: a hondos pozos
  alternatives_spanish:
  - a profundos pozos
  - a abismos
  - en abismos hondos
  lexicon: HALOT
  rationale: El término es raro y de sentido incierto. "Hondos pozos" conserva la concreción de un lugar profundo y peligroso, sin fijar indebidamente una lectura más específica que el hebreo no asegura.
- source_word: בל
  english_pob_choice: never
  chosen_spanish: nunca
  alternatives_spanish:
  - jamás
  - de ningún modo
  lexicon: HALOT
  rationale: 'La partícula negativa final expresa resultado definitivo: que no se levanten. "Nunca" da bien la fuerza idiomática de cierre absoluto en español.'
- source_word: יקומו
  english_pob_choice: to rise again
  chosen_spanish: se levanten
  alternatives_spanish:
  - vuelvan a levantarse
  - se alcen
  - resurjan
  lexicon: HALOT
  rationale: קום puede significar levantarse o ponerse en pie. Aquí el contraste con la caída/presión del juicio hace natural "se levanten"; el contexto ya comunica la idea de no volver a alzarse.
theological_decisions:
- issue: Lenguaje imprecatorio y sujeto implícito del verbo singular
  english_pob_reading: Retain the verse as a prayer for divine judgment, with the singular 'let him cast them' left implicit rather than explicitly naming God.
  chosen_spanish_reading: Mantener la forma singular implícita en "que él los arroje" sin añadir explícitamente "Dios" ni convertirlo en impersonal plural.
  alternative_spanish_readings:
  - Que Dios los arroje al fuego
  - Que sean arrojados al fuego
  - Que el Señor los arroje al fuego
  rationale: El hebreo pasa del plural al singular, lo que probablemente apunta a un agente singular implícito. En español se conserva esa tensión con "él" sin resolverla ni suavizar el tono imprecatorio.
  doctrine_reference: Preservar la tensión teológica en lugar de resolverla.
translation_notes:
  revision_awareness: La redacción sigue de cerca el audit trail inglés y no introduce cambios de revisión posteriores; se mantiene la misma lectura de valor jussivo, el sujeto singular implícito y la ambigüedad del sustantivo raro.
  spanish_consistency_notes:
  - Se prefirió «Yahvé» solo cuando aparezca el nombre divino; aquí no se nombra explícitamente, por lo que no se añade.
  - Se mantuvo «carbones encendidos» en vez de un equivalente más interpretativo como «brasas» para conservar el paralelismo imagístico del juicio.
  - Se evitó «SEÑOR» o una explicitación innecesaria del sujeto, conforme al enfoque auditable del POB.
