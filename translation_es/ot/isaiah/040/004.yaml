review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador capta bien la imaginería topográfica básica del hebreo: valle elevado, monte y colina rebajados, terreno irregular hecho llano. Sin embargo, desajusta dos puntos importantes del rastro POB: ancla mal la nota [a] en «valle» cuando la alternativa documentada corresponde a הֶעָקֹב («terreno desigual/torcido»), y «las alturas» para הָרְכָסִים diluye demasiado el sentido de terreno cresteado o accidentado que el inglés auditado preservó con «ridges».'
  spanish_quality_summary: El español es generalmente legible y digno, pero «collado» y especialmente «las alturas» suenan menos naturales o menos precisos que opciones más claras y ampliamente comprensibles. Además, «las alturas, llanura» omite el verbo y queda demasiado elíptico en español moderno; conviene explicitar «serán» o «se convertirán en» para mantener fluidez y paralelismo.
  glossary_alignment: 'No hay conflicto con términos doctrinales del glosario mayor. Las decisiones léxicas topográficas sí necesitan ajustarse al criterio POB: mantener concreción física, y preservar alternativas léxicas en nota donde el inglés las documenta. «Colina» es más transparente que «collado» para גבעה, y «las crestas»/«los lugares escarpados» refleja mejor הָרְכָסִים que «las alturas».'
  issues:
  - severity: high
    issue: La nota [a] está anclada en «valle», pero corresponde a הֶעָקֹב en la segunda mitad del versículo.
    rationale: El rastro inglés conserva una alternativa léxica para «the uneven ground / the crooked place», no para «valley». Tal como está, la nota induce un error de correspondencia entre texto y fuente.
  - severity: high
    issue: «Las alturas» para הָרְכָסִים pierde la fuerza léxica de terreno cresteado/áspero.
    rationale: El inglés POB eligió «ridges» precisamente para mantener concreción topográfica. «Alturas» generaliza demasiado y desplaza la imagen hacia elevación, no rugosidad.
  - severity: medium
    issue: «Las alturas, llanura» resulta demasiado elíptico y poco natural en español.
    rationale: Aunque la poesía tolera elipsis, aquí suena truncado. Un verbo explícito mejora la claridad sin añadir significado indebido.
  - severity: low
    issue: «Collado» es comprensible, pero menos transparente que «colina» para un público amplio latinoamericano.
    rationale: El objetivo del proyecto favorece español neutral y eclesialmente legible; «colina» comunica mejor la pareja menor frente a «monte».
  revised_spanish_text: Todo valle será elevado, y todo monte y colina serán rebajados; lo torcido[a] se volverá llano, y las crestas[b] se convertirán en llanura.
  revised_footnotes:
