translation:
  language: es
  text: En el día de la angustia te será recordado para tu bien[a]; como calor sobre la escarcha, así serán borrados tus pecados.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'También podría leerse, siguiendo más de cerca el griego: “como buen tiempo sobre la escarcha, así serán disueltos tus pecados”. El hebreo dice “calor sobre la escarcha”; ambas imágenes comunican la desaparición de la escarcha.'
    reason: alternative_reading
lexical_decisions:
- source_word: בְּיוֹם צָרָה / ἐν ἡμέρᾳ θλίψεώς σου
  english_pob_choice: In the day of distress
  chosen_spanish: En el día de la angustia
  alternatives_spanish:
  - En el día de la aflicción
  - En tiempo de angustia
  lexicon: HALOT; LXX θλίψις
  rationale: צָרָה y θλίψις expresan presión, aflicción o angustia. 'Angustia' conserva la gravedad del contexto y suena natural en español bíblico actual, sin volverlo demasiado técnico.
- source_word: תִּזָּכֵר לָךְ / ἀναμνησθήσεταί σου
  english_pob_choice: it will be remembered for your benefit
  chosen_spanish: será recordado para tu bien
  alternatives_spanish:
  - será recordado por ti
  - será tenido en cuenta a tu favor
  - te será recordado
  lexicon: HALOT; LXX ἀναμιμνῄσκω
  rationale: La forma hebrea y la griega permiten un matiz de beneficio o provecho. 'Para tu bien' comunica ese valor adverbial sin forzar una explicación doctrinal, y mantiene la idea de que el acto no queda perdido ante Dios.
- source_word: כְּחֹם עַל כְּפוֹר / ὡς εὐδία ἐπὶ παγετῷ
  english_pob_choice: like heat upon frost
  chosen_spanish: como calor sobre el hielo
  alternatives_spanish:
  - como calor sobre la escarcha
  - como buen tiempo sobre la escarcha
  - como calor sobre el frost
  lexicon: HALOT; LXX εὐδία
  rationale: El hebreo habla de 'calor' y 'frost/hielo'; el griego ofrece 'buen tiempo' sobre la helada. En español, 'calor sobre el hielo' conserva la imagen física inmediata y clara. 'Hielo' funciona como equivalente idiomático del fenómeno solidificado que desaparece.
- source_word: לְהַשְׁבִּית עֲוֹנֶיךָ / οὕτως ἀναλυθήσονταί σου αἱ ἁμαρτίαι
  english_pob_choice: your sins will be blotted out
  chosen_spanish: serán borrados tus pecados
  alternatives_spanish:
  - serán eliminados tus pecados
  - tus pecados se disolverán
  - serán quitados tus pecados
  lexicon: HALOT; LXX ἀναλύω
  rationale: לְהַשְׁבִּית significa causar que algo cese o sea removido; el griego ἀναλυθήσονται sostiene la imagen de disolverse. 'Serán borrados' es un giro español idiomático y formal que preserva el sentido de remoción sin perder la metáfora del deshielo.
- source_word: עֲוֹנֶיךָ / αἱ ἁμαρτίαι
  english_pob_choice: your sins
  chosen_spanish: tus pecados
  alternatives_spanish:
  - tus iniquidades
  - tu culpa
  - tus faltas
  lexicon: HALOT; LXX ἁμαρτίαι
  rationale: Aunque עָוֹן puede abarcar culpa o iniquidad, la correspondencia con ἁμαρτίαι y la claridad en español favorecen 'pecados'. 'Tus pecados' mantiene el registro bíblico sin introducir un término más técnico que el versículo no exige.
theological_decisions:
- issue: Si el verso debe leerse como promesa de mérito automático o como lenguaje sapiencial de favor y memoria delante de Dios
  english_pob_reading: The translation preserves the text's statement that the deed will be remembered on the person's behalf and that sins will be removed, without adding a doctrinal explanation beyond the verse.
  chosen_spanish_reading: La traducción conserva que el acto será recordado para bien y que los pecados serán borrados, sin explicarlo como mecanismo automático ni diluirlo en mera metáfora.
  alternative_spanish_readings:
  - 'Un sentido más meritocrático: la obra borra directamente el pecado'
  - 'Un sentido más general: la fidelidad queda en memoria y se expresa como perdón implícito'
  rationale: 'Sirácides presenta sabiduría pactual: una obra justa es tenida en cuenta por Dios y se vincula con la remoción del pecado. En español conviene retener ambas afirmaciones sin resolver la tensión hacia una doctrina sistemática posterior.'
  doctrine_reference: DOCTRINE.md § Preserve theological tension rather than resolve it
translation_notes:
  revision_awareness: 'La redacción sigue el acuerdo alto entre hebreo y griego: mantiene el marco temporal, el matiz de beneficio en ''para tu bien'' y la imagen de deshielo/remoción final. Se prefirió un verbo español idiomático (''serán borrados'') frente a una traducción más literal de ''disolverse'', sin perder la metáfora ni la revisión reciente del inglés hacia ''blotted out''.'
  spanish_consistency_notes:
  - Se usa 'Yahvé' solo cuando el texto lo requiera explícitamente; aquí no aparece el nombre divino.
  - Se mantiene 'pecados' por claridad y correspondencia con la LXX, evitando 'iniquidades' por ser más marcado y menos natural en este contexto.
  - '''Angustia'' y ''calor'' son términos sobrios y reconocibles en español bíblico contemporáneo, adecuados al registro sapiencial del verso.'
