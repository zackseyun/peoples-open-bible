translation:
  language: es
  text: En cuanto a los altares sobre el techo del aposento alto[a] de Ahaz, que los reyes de Judá habían hecho, y a los altares que Manasés había hecho en los dos patios de la casa de Yahvé, el rey los derribó, los hizo pedazos allí, y arrojó su polvo al valle del Cedrón[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «aposento alto de Ahaz». El hebreo עֲלִיָּה puede referirse a un aposento o habitación superior.
    reason: lexical_alternative
  - marker: b
    text: O «arroyo del Cedrón». El hebreo נַחַל puede denotar cauce de torrente, quebrada o valle.
    reason: lexical_alternative
lexical_decisions:
- source_word: הַמִּזְבְּחוֹת
  english_pob_choice: the altars
  chosen_spanish: los altares
  alternatives_spanish:
  - los sitios del altar
  lexicon: HALOT
  rationale: מִזְבֵּחַ designa de manera directa un altar; el plural debe mantenerse en ambos casos para conservar la precisión formal del hebreo.
- source_word: עַל הַגָּג עֲלִיַּת אָחָז
  english_pob_choice: on the roof of the upper chamber of Ahaz
  chosen_spanish: sobre el techo del aposento alto de Ahaz
  alternatives_spanish:
  - sobre el techo del cuarto alto de Ahaz
  - sobre el techo del piso alto de Ahaz
  lexicon: HALOT
  rationale: עֲלִיָּה puede referirse a un aposento alto o habitación superior. "Aposento alto" preserva el sentido arquitectónico y es natural en español sin decidir indebidamente entre cuarto o nivel.
- source_word: אֲשֶׁר עָשׂוּ מַלְכֵי יְהוּדָה
  english_pob_choice: which the kings of Judah had made
  chosen_spanish: que los reyes de Judá habían hecho
  alternatives_spanish:
  - que los reyes de Judá hicieron
  lexicon: HALOT
  rationale: El pluscuamperfecto español refleja bien que estos altares ya estaban hechos antes de la acción de Josías en la narración.
- source_word: בִּשְׁתֵּי חַצְרוֹת בֵּית יְהוָה
  english_pob_choice: in the two courts of the house of Yahweh
  chosen_spanish: en los dos patios de la casa de Yahvé
  alternatives_spanish:
  - en los dos atrios de la casa de Yahvé
  - en los dos patios del templo de Yahvé
  lexicon: HALOT
  rationale: חָצֵר significa patio/corral/atrio según contexto. "Patios" es claro y mantiene el término concreto; "casa de Yahvé" conserva el idiomático בֵּית יְהוָה sin sustituirlo por "templo".
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: Se conserva el nombre divino revelado, siguiendo el criterio del proyecto para יְהוָה. "Yahvé" es la forma española estable y auditable, en lugar de ocultarlo mediante un título.
- source_word: נָתַץ
  english_pob_choice: tore them down
  chosen_spanish: los derribó
  alternatives_spanish:
  - los demolió
  - los desmanteló
  lexicon: HALOT
  rationale: נָתַץ suele denotar derribar estructuras; "derribó" es natural en español y conserva la fuerza de destrucción física.
- source_word: וַיָּרָץ מִשָּׁם
  english_pob_choice: smashed them there
  chosen_spanish: los hizo pedazos allí
  alternatives_spanish:
  - los machacó allí
  - los aplastó allí
  lexicon: HALOT
  rationale: En este contexto la secuencia de acciones apunta a pulverizar los restos tras derribarlos. "Los hizo pedazos" expresa el resultado de forma idiomática y evita la lectura no contextual de "corrió de allí".
- source_word: עֲפָרָם
  english_pob_choice: their dust
  chosen_spanish: su polvo
  alternatives_spanish:
  - su polvo triturado
  - sus restos pulverizados
  lexicon: HALOT
  rationale: עָפָר es polvo/tierra suelta. Tras ser destruidos, "su polvo" comunica la imagen de ruina material sin añadir más de lo que el hebreo exige.
- source_word: נַחַל קִדְרוֹן
  english_pob_choice: the Kidron Valley
  chosen_spanish: el valle del Cedrón
  alternatives_spanish:
  - el torrente del Cedrón
  - la vaguada del Cedrón
  lexicon: HALOT
  rationale: נַחַל puede denotar valle de torrente, cauce o quebrada. "Valle del Cedrón" es claro para el lector en español y conserva el topónimo tradicional del lugar.
theological_decisions:
- issue: Representación del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: El texto hebreo usa directamente el Tetragrámaton. En español, "Yahvé" preserva el nombre personal de Dios y mantiene la transparencia del texto, conforme al criterio doctrinal del proyecto.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
translation_notes:
  revision_awareness: Alineado con la auditoría inglesa de filosofía optimal-equivalence. Se conserva la misma estructura de objetos frontados, la referencia al aposento alto de Ahaz y el contraste entre derribar, hacer pedazos y arrojar el polvo al Cedrón. No se detectaron revisiones posteriores que alteraran el sentido base.
  spanish_consistency_notes:
  - Se mantiene "casa de Yahvé" como calco idiomático del hebreo בֵּית יְהוָה, coherente con la política del proyecto.
  - '"Aposento alto" traduce עֲלִיָּה con una opción natural en español y compatible con la nota de alternativa.'
  - '"Valle del Cedrón" conserva la toponimia usual en español, mientras la nota recoge la posible traducción de נַחַל.'
