translation:
  language: es
  text: Ahora[a], cuando yo vuelva a tu siervo mi padre, y el muchacho no esté con nosotros—estando su vida ligada a la del muchacho—
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Y ahora»; el hebreo usa una partícula discursiva que introduce la súplica.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְעַתָּה
  english_pob_choice: Now
  chosen_spanish: Ahora
  alternatives_spanish:
  - Y ahora
  lexicon: HALOT
  rationale: Introducción discursiva natural en español. El valor conjuntivo de ו queda absorbido en el flujo de la frase, como en el inglés POB con 'Now'.
- source_word: כְּבֹאִי
  english_pob_choice: when I come
  chosen_spanish: cuando yo vaya
  alternatives_spanish:
  - cuando llegue
  - al llegar yo
  lexicon: HALOT
  rationale: El constructo temporal con כ + infinitivo se vierte de forma natural con 'cuando'. Se usa 'vaya' para mantener el movimiento futuro del contexto de la súplica; 'llegue' también sería posible, pero 'vaya' conserva la referencia al acto de presentarse ante el padre.
- source_word: אֶל עַבְדְּךָ אָבִי
  english_pob_choice: to your servant my father
  chosen_spanish: a tu siervo mi padre
  alternatives_spanish:
  - a tu siervo, mi padre
  - ante tu siervo mi padre
  lexicon: HALOT
  rationale: Se mantiene la apposición deferencial sin añadir puntuación innecesaria. 'Tu siervo' preserva la fórmula de respeto de Judá hacia José; 'mi padre' identifica a Jacob.
- source_word: הַנַּעַר
  english_pob_choice: the boy
  chosen_spanish: el muchacho
  alternatives_spanish:
  - el joven
  - el muchacho
  lexicon: HALOT
  rationale: '''Muchacho'' comunica mejor en español la carga afectiva y familiar del pasaje. Aunque Benjamin no es un niño pequeño, el término hebreo puede abarcar un joven; ''muchacho'' conserva esa flexibilidad mejor que ''joven'' en este contexto.'
- source_word: אֵינֶנּוּ אִתָּנוּ
  english_pob_choice: is not with us
  chosen_spanish: no esté con nosotros
  alternatives_spanish:
  - no está con nosotros
  - esté ausente de nosotros
  lexicon: HALOT
  rationale: El inglés POB capta la ausencia como estado; en español, dentro de la cláusula temporal con 'cuando', el subjuntivo 'no esté' resulta natural. Mantiene la simple negación existencial sin añadir matices ajenos.
- source_word: וְנַפְשׁוֹ
  english_pob_choice: his life
  chosen_spanish: su vida
  alternatives_spanish:
  - su alma
  - su ser
  lexicon: HALOT
  rationale: En este contexto נֶפֶשׁ expresa la vida concreta y afectiva del padre, no una noción técnica de 'alma'. 'Vida' reproduce bien la fuerza relacional y existencial del hebreo.
- source_word: קְשׁוּרָה
  english_pob_choice: is bound up
  chosen_spanish: estando ligada
  alternatives_spanish:
  - atada
  - unida
  lexicon: HALOT
  rationale: '''Ligada'' conserva la imagen de fuerte unión o sujeción. ''Estando ligada'' refleja el participio/circunstancia del hebreo, como el inglés auditado ''his life being bound up''.'
- source_word: בְנַפְשׁוֹ
  english_pob_choice: with the boy’s life
  chosen_spanish: a la vida del muchacho
  alternatives_spanish:
  - con la vida del muchacho
  - en la vida del muchacho
  lexicon: HALOT
  rationale: El pronombre final se entiende contextual y naturalmente como referido al muchacho, Benjamín, siguiendo la decisión auditada del inglés. 'A la vida del muchacho' evita una repetición pesada de 'vida' y expresa bien la unión resultante.
translation_notes:
  revision_awareness: La redacción inglesa auditada pasó de una paráfrasis causal explícita ('since/for his life is bound up') a una construcción participial más cercana al hebreo ('his life being bound up'). En español se refleja esa opción con 'estando ligada', evitando convertir la cláusula en una causal más fuerte de lo que exige el מקור. También se mantiene la referencia contextual del pronombre final al muchacho, siguiendo el criterio del inglés POB.
  spanish_consistency_notes:
  - Se usa 'Yahvé' como norma general, pero este versículo no contiene el nombre divino.
  - Se evita 'alma' para נֶפֶשׁ porque aquí el contexto habla de vida y afecto familiar.
  - Se conserva una expresión de relación estrecha ('estando ligada') para no suavizar la fuerza de קְשׁוּרָה.
  - La cláusula final se deja dependiente del contexto para reflejar la ambigüedad pronominal resuelta por antecedente inmediato.
