translation:
  language: es
  text: 'Y los hijos de Cam: Cus, Mizraim[a], Put[b] y Canaán.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebreo «Mizraim»; muchas versiones traducen «Egipto». En esta genealogía, la forma hebrea se trata como nombre personal o ancestral.
    reason: alternative_reading
  - marker: b
    text: «Put» también se ha traducido tradicionalmente como «Phut» en algunas versiones.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּ/בְנֵי
  english_pob_choice: And the sons of
  chosen_spanish: Y los hijos de
  alternatives_spanish:
  - Ahora los hijos de
  - Los hijos de
  lexicon: HALOT
  rationale: Se conserva la estructura genealógica y el valor colectivo de בְנֵי en contexto de linaje. En español, “hijos de” mantiene la forma formal y transparente sin diluir la relación genealógica a “descendientes”.
- source_word: חָם
  english_pob_choice: Ham
  chosen_spanish: Cam
  alternatives_spanish:
  - Jam
  lexicon: HALOT
  rationale: Nombre propio tradicional en español bíblico. Se mantiene la forma establecida “Cam” por claridad y recepción eclesial, sin alterar el referente del texto hebreo.
- source_word: כּוּשׁ
  english_pob_choice: Cush
  chosen_spanish: Cus
  alternatives_spanish:
  - Cush
  - Cush
  lexicon: HALOT
  rationale: Se usa la transliteración española “Cus” para reflejar el nombre propio hebreo sin añadir vocal final ajena al sistema español. La forma inglesa “Cush” queda como alternativa de tradición anglófona, pero no es la más natural en español.
- source_word: וּ/מִצְרַיִם
  english_pob_choice: Mizraim
  chosen_spanish: Mizraim
  alternatives_spanish:
  - Egipto
  lexicon: HALOT
  rationale: Se conserva el nombre ancestral “Mizraim”, siguiendo el criterio del POB inglés de tratarlo aquí como nombre propio genealógico, no como la nación posterior “Egipto”. En español, “Egipto” sería comprensible pero perdería la distinción documental del linaje.
- source_word: וּ/פוּט
  english_pob_choice: Put
  chosen_spanish: Put
  alternatives_spanish:
  - Fut
  - Phut
  lexicon: HALOT
  rationale: Se mantiene la forma breve “Put”, cercana al hebreo y coherente con una transliteración moderna. “Phut” pertenece a una tradición inglesa más antigua; “Fut” es una posibilidad española, pero menos asentada en el uso bíblico.
- source_word: וּ/כְנָעַן
  english_pob_choice: and Canaan
  chosen_spanish: y Canaán
  alternatives_spanish:
  - y Canaan
  lexicon: HALOT
  rationale: Se conserva el nombre bíblico estándar “Canaán” y la conjunción final para respetar la coordinación del listado hebreo. La tilde en español es necesaria por pronunciación y norma ortográfica.
translation_notes:
  revision_awareness: 'Se siguió de cerca el audit trail inglés: conservar la lista genealógica, tratar Mizraim como nombre propio ancestral y mantener el valor transliterado de Put. Se ajustó la presentación al español publicable, especialmente en nombres propios y puntuación de la enumeración.'
  spanish_consistency_notes:
  - Se preservó el paralelismo genealógico con una coordinación simple y directa.
  - Se mantuvo el criterio POB de distinguir nombres ancestrales de nombres nacionales cuando el contexto lo exige.
  - La forma “Cus” se adoptó por naturalidad ortográfica del español, sin introducir una paráfrasis interpretativa.
