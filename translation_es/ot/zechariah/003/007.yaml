translation:
  language: es
  text: 'Así dice Yahvé de los ejércitos: Si andas en mis caminos y si guardas mi encargo[a], tú también gobernarás mi casa y también guardarás mis atrios, y yo te daré libre acceso[b] entre estos que están aquí de pie.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «mi custodia» o «mi obligación confiada»; el hebreo מִשְׁמֶרֶת puede expresar una responsabilidad encomendada, especialmente en contexto sacerdotal.
    reason: alternative_reading
  - marker: b
    text: O «libre tránsito entre estos que están aquí de pie»; el hebreo מַהְלְכִים es difícil y también puede entenderse como «los que andan» o como «lugares para andar» entre los que están aquí de pie.
    reason: alternative_reading
lexical_decisions:
- source_word: יְהוָה צְבָאוֹת
  english_pob_choice: Yahweh of hosts
  chosen_spanish: Yahvé de los ejércitos
  alternatives_spanish:
  - Yahvé de los hosts
  - Yahvé de las huestes
  lexicon: HALOT
  rationale: Se conserva el nombre divino Yahvé y se vierte צְבָאוֹת con el equivalente bíblico natural «de los ejércitos», que comunica bien la amplitud del título sin depender del sustituto litúrgico «Señor».
- source_word: בִּדְרָכַי תֵּלֵךְ
  english_pob_choice: you walk in my ways
  chosen_spanish: andas en mis caminos
  alternatives_spanish:
  - caminas en mis caminos
  - vives conforme a mis caminos
  lexicon: HALOT
  rationale: El hebreo usa la metáfora de caminar; «andas en mis caminos» la preserva con español natural y fiel, sin convertirla en una paráfrasis más abstracta.
- source_word: מִשְׁמַרְתִּי תִשְׁמֹר
  english_pob_choice: you keep my charge
  chosen_spanish: guardas mi encargo
  alternatives_spanish:
  - guardas mi cargo
  - guardas mi obligación
  - guardas mi mandato
  lexicon: HALOT
  rationale: מִשְׁמֶרֶת puede expresar una responsabilidad confiada. «Encargo» conserva la idea de una tarea/deber encomendado, mientras evita reducirlo demasiado a «mandato» o a un tecnicismo más rígido.
- source_word: תָּדִין אֶת בֵּיתִי
  english_pob_choice: you shall govern my house
  chosen_spanish: gobernarás mi casa
  alternatives_spanish:
  - juzgarás mi casa
  - administrarás mi casa
  - regirás mi casa
  lexicon: HALOT
  rationale: דִּין admite sentido de gobernar/administrar en este contexto sacerdotal-templario. «Gobernarás» refleja esa función de dirección sin limitarla a un acto judicial.
- source_word: חֲצֵרָי
  english_pob_choice: my courts
  chosen_spanish: mis atrios
  alternatives_spanish:
  - mis patios
  - mis cortes
  lexicon: HALOT
  rationale: En contexto del templo, «atrios» es el equivalente español más natural y preciso para los recintos sagrados. «Cortes» sonaría ambiguo en español contemporáneo.
- source_word: מַהְלְכִים
  english_pob_choice: free access
  chosen_spanish: libre acceso
  alternatives_spanish:
  - libre tránsito
  - facultad de moverte
  - entrada libre
  lexicon: HALOT
  rationale: La expresión hebrea es rara y debatida, pero en este contexto visionario la idea de privilegio concedido se comunica mejor con «libre acceso», manteniendo la tensión del hebreo sin forzar una lectura demasiado concreta.
- source_word: בֵּין הָעֹמְדִים הָאֵלֶּה
  english_pob_choice: among these who are standing here
  chosen_spanish: entre estos que están aquí
  alternatives_spanish:
  - entre estos que se mantienen en pie
  - entre los que están aquí de pie
  lexicon: HALOT
  rationale: Se conserva el referente de los presentes en la visión con una formulación española clara. «Entre» mantiene la relación espacial/relacional del hebreo sin resolver en exceso la imagen.
theological_decisions:
- issue: Sentido de la promesa final sobre מַהְלְכִים בֵּין הָעֹמְדִים הָאֵלֶּה
  english_pob_reading: A promise of granted access/free movement among the heavenly attendants in God's presence.
  chosen_spanish_reading: Una promesa de libre acceso concedido entre los seres que están de pie en la escena visionaria, es decir, los asistentes celestiales en la presencia de Dios.
  alternative_spanish_readings:
  - Una promesa de movimientos o pasos entre los que están aquí
  - Una promesa de puestos para caminar entre los que están aquí
  - Una promesa de acceso entre los que están aquí
  rationale: El hebreo es realmente ambiguo y no conviene borrar esa tensión. La traducción principal sigue la línea de la POB inglesa al expresar un privilegio de acceso concedido, mientras deja abierta la posibilidad de otras lecturas sin encerrarlas en una sola interpretación.
  doctrine_reference: 'Translation philosophy §3: Preservar la tensión teológica y léxica cuando el hebreo es debatido.'
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión más reciente de la POB inglesa, que reforzó la idea de «free access» frente a un simple «access». La redacción española adopta «libre acceso» para reflejar ese ajuste y conserva la ambigüedad del sintagma final mediante nota.
  spanish_consistency_notes:
  - Se mantiene Yahvé para יהוה, de acuerdo con el estándar del proyecto.
  - Se usa «ejércitos» para צְבָאוֹת en el título divino, evitando «SEÑOR» como sustituto.
  - Se eligió «encargo» para מִשְׁמֶרֶת por su fuerza de responsabilidad confiada, no como mera orden.
  - «Atrios» se reservó para el contexto templario, donde es más natural que «patios» en español bíblico.
  - La nota sobre מַהְלְכִים preserva la tensión interpretativa del hebreo sin resolverla de modo dogmático.
