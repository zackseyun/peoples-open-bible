base_translation:
  language: en
  yaml_path: translation/ot/2_kings/017/015.yaml
  text: They rejected his statutes and his covenant that he had made with their fathers[a], and his testimonies with which he had warned them. They went after emptiness and became empty, and after the nations that were around them[c][b], concerning whom Yahweh had commanded them not to do as they did.
  footnotes:
  - marker: a
    text: Hebrew 'vanity' can also mean 'emptiness,' 'worthlessness,' or, by implication in this context, 'idols.'
    reason: lexical_alternative
  - marker: b
    text: 'The Hebrew plays on related words: they ''went after vanity'' and ''became vain''—that is, empty or worthless like what they pursued.'
    reason: lexical_alternative
  - marker: c
    text: Or 'his testimonies that he had testified against them with' / 'his warnings with which he had warned them.'
    reason: alternative_reading
