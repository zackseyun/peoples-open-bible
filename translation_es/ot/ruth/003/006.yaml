translation:
  language: es
  text: Entonces bajó a la era y hizo conforme a todo lo que su suegra le había mandado[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Entonces bajó a la era y hizo exactamente como su suegra le había indicado».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַתֵּרֶד
  english_pob_choice: went down
  chosen_spanish: bajó
  alternatives_spanish:
  - descendió
  - fue hacia abajo
  lexicon: HALOT / ירד
  rationale: ירד expresa movimiento hacia abajo; en español, «bajó» suena natural y conserva el sentido direccional sin volver el texto más pesado que «descendió».
- source_word: הַגֹּרֶן
  english_pob_choice: the threshing floor
  chosen_spanish: la era
  alternatives_spanish:
  - la era de trillar
  - la era de la trilla
  lexicon: HALOT / גורן
  rationale: גורן designa la era o lugar de trillar. «La era» es un equivalente breve, bíblico y claro en español; evita una glosa más larga sin perder el referente agrícola del pasaje.
- source_word: וַתַּעַשׂ
  english_pob_choice: and did
  chosen_spanish: e hizo
  alternatives_spanish:
  - y hizo
  - y actuó
  lexicon: HALOT / עשה
  rationale: עשה es amplio ('hacer, obrar'). «Hizo» conserva la sencillez narrativa y funciona bien con la frase de conformidad siguiente.
- source_word: כְּכֹל אֲשֶׁר
  english_pob_choice: according to all that
  chosen_spanish: conforme a todo lo que
  alternatives_spanish:
  - según todo lo que
  - tal como todo lo que
  lexicon: HALOT
  rationale: La construcción enfatiza conformidad completa. «Conforme a todo lo que» preserva esa amplitud mejor que una paráfrasis más libre, y suena natural en español bíblico moderno.
- source_word: צִוַּתָּה
  english_pob_choice: had commanded
  chosen_spanish: le había mandado
  alternatives_spanish:
  - le había ordenado
  - le había instruido
  lexicon: HALOT / צוה
  rationale: צוה denota mandato con fuerza directiva. «Mandado» mantiene ese peso; el pluscuamperfecto refleja que la instrucción de Noemí antecede a la acción de Rut. Se evita «instruido» porque suaviza el verbo.
- source_word: חֲמוֹתָהּ
  english_pob_choice: her mother-in-law
  chosen_spanish: su suegra
  alternatives_spanish:
  - la suegra de ella
  lexicon: HALOT / חמות
  rationale: El término de parentesco corresponde a Noemí. «Su suegra» es la forma más natural en español y preserva la referencia relacional sin añadir explicitación innecesaria.
- source_word: וַ
  english_pob_choice: So
  chosen_spanish: Así que
  alternatives_spanish:
  - Entonces
  - Y
  lexicon: HALOT
  rationale: La waw narrativa introduce continuidad y secuencia. «Así que» comunica el avance del relato con fluidez moderna, sin perder la conexión con el versículo anterior.
translation_notes:
  revision_awareness: 'El texto coincide sustancialmente con el patrón de la POB inglesa: narración breve, secuencia clara y una nota alternativa que conserva la posibilidad de leer «exactamente»/«indicado» para reforzar la conformidad plena sin desplazar el sentido básico del hebreo.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma del proyecto, pero este versículo no contiene el nombre divino.
  - «Suegra» se usa de forma consistente para חמות; no se introduce ningún nombre propio porque el hebreo no lo repite aquí.
  - «Era» se prefiere por fidelidad y naturalidad; en un contexto agrícola bíblico español, comunica el lugar de trilla sin necesidad de perífrasis.
