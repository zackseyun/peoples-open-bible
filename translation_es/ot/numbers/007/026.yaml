lexical_decisions:
- source_word: כַּף
  english_pob_choice: dish
  chosen_spanish: platillo
  alternatives_spanish:
  - disco
  - vaso
  - plato
  lexicon: HALOT
  rationale: En el contexto de una ofrenda ritual, כַּף designa un utensilio pequeño para contener la ofrenda; en español, «platillo» comunica mejor un recipiente cultual pequeño que «spoon», y evita la ambigüedad de «plato».
- source_word: אַחַת
  english_pob_choice: one
  chosen_spanish: un
  alternatives_spanish:
  - uno
  lexicon: HALOT
  rationale: Es el numeral cardinal simple que modifica al sustantivo; en español se adapta a la concordancia con «platillo».
- source_word: עֲשָׂרָה
  english_pob_choice: ten shekels
  chosen_spanish: diez siclos
  alternatives_spanish:
  - diez
  - pesando diez siclos
  lexicon: HALOT
  rationale: Aunque «siclos» no está expresado de manera aislada en este versículo, la fórmula de ofrendas en el contexto inmediato especifica la medida. Se la suministra para hacer inteligible la cantidad sin perder la elipsis hebrea.
- source_word: זָהָב
  english_pob_choice: gold
  chosen_spanish: de oro
  alternatives_spanish:
  - dorada
  - de oro puro
  lexicon: HALOT
  rationale: 'Es un genitivo de composición/material: el recipiente es de oro. En español, «de oro» es la forma más natural y fiel.'
- source_word: מְלֵאָה
  english_pob_choice: full of
  chosen_spanish: lleno de
  alternatives_spanish:
  - llena de
  - colmado de
  lexicon: HALOT
  rationale: La forma hebrea concuerda con el sustantivo del recipiente; en español se vierte de modo natural como «lleno de», manteniendo la relación predicativa.
- source_word: קְטֹרֶת
  english_pob_choice: incense
  chosen_spanish: incienso
  alternatives_spanish:
  - perfume aromático
  - aroma
  lexicon: HALOT
  rationale: Es el término estándar para la sustancia aromática del santuario; «incienso» conserva el sentido cultual y es idiomático en español.
translation_notes:
  revision_awareness: 'La redacción sigue de cerca el hebreo breve y elíptico y adopta la solución auditada del texto inglés: suplir la unidad de medida implícita por el contexto inmediato. Se evita mecanizar «golden» como adjetivo en español cuando la relación material se expresa de modo más natural con «de oro».'
  spanish_consistency_notes:
  - Se mantiene «incienso» como término cultual estándar.
  - Se preserva la elipsis de la unidad de medida mediante una nota, en continuidad con el registro inglés auditado.
  - 'El español usa concordancia natural: «un platillo... lleno» con el núcleo implícito del recipiente.'
