base_translation:
  language: en
  yaml_path: translation/ot/zechariah/013/008.yaml
  text: And it will happen in all the land[a], declares Yahweh, that two-thirds in it will be cut off and perish[b], but one-third will be left in it.
  footnotes:
  - marker: a
    text: Or 'in the whole earth.' The Hebrew אֶרֶץ can mean 'land' or 'earth'; here 'land' best fits the immediate context.
    reason: alternative_reading
  - marker: b
    text: Literally 'a mouth of two'—an idiom here meaning 'two portions,' contrasted with 'the third'; hence 'two-thirds.'
    reason: lexical_alternative
