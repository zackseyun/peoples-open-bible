review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español sigue bien la secuencia del griego: burla, retiro de la prenda púrpura, reposición de la ropa propia, y salida para la crucifixión. Sin embargo, la nota [b] no corresponde al texto principal: «para crucificarlo» ya está en el texto, pero la nota ofrece exactamente la misma frase como alternativa. Además, el inglés auditado usa la nota de propósito para la alternativa más explícita «so that they might crucify him», que en español debe reflejarse como «para que lo crucificaran» o similar.'
  spanish_quality_summary: El español es natural, claro y digno. «Se burlaron de él», «le quitaron la púrpura», «le pusieron sus propias ropas» y «lo sacaron para crucificarlo» son expresiones idiomáticas y fieles. No se requieren cambios al cuerpo del versículo; solo hace falta reparar la nota final para que sea informativa y no redundante.
  glossary_alignment: 'No hay términos del glosario de alto impacto en este versículo aparte de «Jesús» implícito por referencia y «crucificar», que está bien. Las decisiones léxicas concuerdan con el racional del POB: conservar «la púrpura» en el texto y dejar las alternativas de prenda en nota; mantener la finalidad con «para crucificarlo».'
  issues:
  - severity: medium
    issue: La nota [b] está mal formulada y duplica el texto principal.
    rationale: El texto principal ya dice «para crucificarlo», pero la nota ofrece «O «para crucificarlo»». Eso no preserva la alternativa documentada en el POB inglés para la cláusula de propósito y produce una nota inútil.
  revised_spanish_text: Y cuando se burlaron de él[a], le quitaron la púrpura y le pusieron sus propias ropas. Y lo sacaron para crucificarlo[b].
  revised_footnotes:
  - marker: a
    text: O «la prenda púrpura» o «el manto púrpura». El griego dice simplemente «la púrpura», y la clase de prenda se entiende por el contexto.
    reason: lexical_alternative
  - marker: b
    text: O «para que lo crucificaran». El griego usa una cláusula de propósito.
    reason: lexical_alternative
  revision_rationale: Se conserva intacto el texto español porque es fiel y natural. Solo se corrige la nota [b] para que exprese una alternativa real que refleje la cláusula de propósito griega, en línea con el expediente inglés.
