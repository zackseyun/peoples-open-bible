translation:
  language: es
  text: Y las hizo como monumentos[a], levantando grandes pilares; y sobre los pilares hizo armaduras para un memorial eterno, y junto a las armaduras, naves grabadas, para ser vistas por todos los que navegan por el mar.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literalmente, «para un nombre eterno». El texto traduce el giro de manera más natural en español como «para un memorial eterno», expresando la idea de memoria o renombre perdurable.
    reason: lexical_alternative
lexical_decisions:
- source_word: μηχανήματα
  english_pob_choice: monuments
  chosen_spanish: monumentos
  alternatives_spanish:
  - dispositivos
  - obras
  - construcciones conmemorativas
  lexicon: LSJ
  rationale: En este contexto conmemorativo/funerario, el término no se entiende como máquinas de guerra, sino como obras construidas para recordar. «Monumentos» sigue la revisión inglesa y comunica mejor la función memorial sin perder el carácter material de la obra.
- source_word: περιθεὶς
  english_pob_choice: setting up
  chosen_spanish: levantando
  alternatives_spanish:
  - colocando
  - erigiendo
  - poniendo
  lexicon: LSJ
  rationale: El participio expresa la acción de añadir o disponer los pilares. «Levantando» es natural en español para la instalación de estructuras verticales y conserva el sentido constructivo.
- source_word: στύλους μεγάλους
  english_pob_choice: great pillars
  chosen_spanish: grandes pilares
  alternatives_spanish:
  - grandes columnas
  - pilares grandes
  lexicon: LSJ
  rationale: «Pilares» reproduce bien στύλους en un marco monumental. Se mantiene el adjetivo intensivo «grandes» para reflejar μεγάλους.
- source_word: πανοπλίας
  english_pob_choice: suits of armor
  chosen_spanish: armaduras
  alternatives_spanish:
  - suites de armadura
  - armas completas
  - armas defensivas completas
  lexicon: LSJ
  rationale: πανοπλία designa armadura completa. En español, el plural del inglés puede sonar artificial; «armaduras» es breve y suficientemente fiel en un contexto de exhibición decorativa, aunque puede leerse también como el conjunto de piezas de armamento.
- source_word: εἰς ὄνομα αἰώνιον
  english_pob_choice: for an everlasting memorial
  chosen_spanish: para un nombre eterno
  alternatives_spanish:
  - para un memorial eterno
  - para una memoria eterna
  - para un recuerdo eterno
  lexicon: LSJ
  rationale: Se conserva la literalidad del giro «nombre eterno», porque el griego dice ὄνομα y no solo una idea general de memoria. La frase puede implicar renombre duradero; se evita borrar esa tensión reduciéndola directamente a «memorial» en el texto principal.
- source_word: πλοῖα ἐγγεγλυμμένα
  english_pob_choice: ships engraved
  chosen_spanish: naves grabadas
  alternatives_spanish:
  - barcos grabados
  - naves esculpidas
  - barcos esculpidos
  lexicon: LSJ
  rationale: ἐγγεγλυμμένα indica algo grabado o tallado sobre una superficie. «Naves grabadas» conserva el lenguaje visual del relieve o grabado sin especificar más de lo que el griego permite.
- source_word: εἰς τὸ θεωρεῖσθαι
  english_pob_choice: to be seen
  chosen_spanish: para ser vistas
  alternatives_spanish:
  - para verse
  - a fin de ser vistas
  - para que se vean
  lexicon: LSJ
  rationale: El infinitivo articular expresa finalidad. «Para ser vistas» mantiene esa función y suena natural en español.
- source_word: ὑπὸ πάντων τῶν πλεόντων τὴν θάλασσαν
  english_pob_choice: by all who sail the sea
  chosen_spanish: por todos los que navegan por el mar
  alternatives_spanish:
  - por todos los que surcan el mar
  - por todos los que viajan por el mar
  - por todos los marineros
  lexicon: LSJ
  rationale: πλέω es navegar/surcar el mar. «Navegan por el mar» conserva el alcance universal de πάντων y evita restringir el sujeto a marineros profesionales.
theological_decisions:
- issue: 'Sentido de εἰς ὄνομα αἰώνιον: nombre, renombre o memoria'
  english_pob_reading: for an everlasting memorial
  chosen_spanish_reading: para un nombre eterno
  alternative_spanish_readings:
  - para un memorial eterno
  - para una memoria eterna
  - para un recuerdo eterno
  rationale: El inglés POB optó por una equivalencia interpretativa («memorial») para expresar la función conmemorativa. En español, sin embargo, conviene preservar la literalidad del sustantivo «nombre» porque el griego usa ὄνομα. Esto deja visible la posible idea de renombre duradero y evita eliminar la tensión entre «nombre» y «memoria» que el texto original permite.
  doctrine_reference: Memoria/renombre conmemorativo en lenguaje bíblico; no implica una doctrina específica, sino preservación del valor semántico del original.
translation_notes:
  revision_awareness: 'La base inglesa pasó por una revisión significativa: «devices» fue corregido a «monuments» para reflejar mejor μηχανήματα en este contexto memorial. La presente versión española sigue esa revisión y, al mismo tiempo, conserva en el texto principal la literalidad de εἰς ὄνομα αἰώνιον como «para un nombre eterno», dejando la explicación interpretativa en nota para no aplanar el original.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma general del proyecto, pero este versículo no contiene el nombre divino.
  - Se usa «naves» en vez de «barcos» para un registro más elevado y acorde con la imaginería monumental.
  - «Armaduras» refleja la exhibición de panoplias completas; no se introduce lenguaje eclesiástico ajeno al pasaje.
  - La puntuación conserva el ritmo de enumeración del griego sin sobreinterpretar relaciones sintácticas.
