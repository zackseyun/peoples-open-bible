  yaml_path: translation/ot/isaiah/040/010.yaml
  text: Behold[a], the Lord GOD comes with strength, and his arm rules for him; behold, his reward is with him[d][c][b], and his recompense before him.
  footnotes:
  - marker: a
    text: 'Hebrew: ''the Lord YHWH.'' English ''the Lord GOD'' reflects the combined title אֲדֹנָי יְהוִה and avoids the awkward ''Lord LORD.'''
    reason: alternative_reading
  - marker: b
    text: Or 'will come with might.' The Hebrew can be rendered with a more explicit future sense.
    reason: lexical_alternative
  - marker: c
    text: Or 'his arm is ruling on his behalf.'
    reason: lexical_alternative
  - marker: d
    text: Or 'his wages ... and his compensation.'
    reason: lexical_alternative
