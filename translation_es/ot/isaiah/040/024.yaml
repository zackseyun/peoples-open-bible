review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español sigue bien la estructura y el sentido general del hebreo: la triple repetición de אַף בַּל con «apenas» comunica adecuadamente la inmediatez frustrada; «son plantados / son sembrados / ha echado raíces» preserva la metáfora vegetal y «él sopla sobre ellos» mantiene correctamente la agencia divina implícita del contexto. Sin embargo, hay dos desajustes léxicos importantes respecto del expediente POB y del hebreo: גִּזְעָם se acerca mejor a «tallo» o «tronco/cepa», pero en esta línea «tronco» suena demasiado arbóreo en combinación con «sembrados»; y sobre todo כַּקַּשׁ significa «como rastrojo/hojarasca de cosecha, stubble», no simplemente «paja».'
  spanish_quality_summary: El español es claro y digno, pero conviene pulirlo para mayor naturalidad poética y precisión de imagen. «Apenas su tronco ha echado raíces» es entendible, pero «su tallo» encaja mejor con la secuencia agrícola y evita una imagen demasiado pesada. «y cuando él sopla» introduce un matiz temporal («cuando») que no está en el hebreo; «y aun solo sopla sobre ellos» o «y aun sopla sobre ellos» refleja mejor וְגַם y la súbita facilidad de la acción. «como paja» es demasiado general y debilita la precisión agrícola del texto.
  glossary_alignment: 'No hay términos del glosario mayor en juego como Yahvé/Mesías. Las decisiones relevantes del proyecto se respetan en general: se conserva la metáfora vegetal, la agencia divina implícita y la fuerza de la repetición. La principal divergencia con la racionalidad lexical documentada del POB está en כַּקַּשׁ, donde el inglés auditado eligió «stubble» por precisión y el español debería reflejarlo con «rastrojo» mejor que con «paja». También sería preferible que la nota alternativa para סְעָרָה se mantuviera, ya que el expediente inglés preserva «whirlwind» como alternativa significativa.'
  issues:
  - severity: medium
    issue: «como paja» no refleja con suficiente precisión כַּקַּשׁ
    rationale: El expediente inglés justifica «stubble» sobre «chaff». En español, «paja» es más amplia y pierde la imagen específica del residuo seco de la cosecha. «Como rastrojo» preserva mejor la precisión del hebreo.
  - severity: medium
    issue: «su tronco» suena demasiado arbóreo en esta cadena poética
    rationale: Aunque גזע puede significar tronco, en combinación con «sembrados» y «ha echado raíces» la imagen fluye mejor con «su tallo», más cercana a «stem» del POB y menos pesada en español.
  - severity: low
    issue: «y cuando él sopla» añade un matiz temporal no expreso
    rationale: El hebreo tiene וְגַם + verbo, más bien «y aun / incluso». La idea es que basta su soplo para secarlos, no tanto una cláusula temporal desarrollada.
  - severity: low
    issue: Falta nota alternativa para «torbellino»
    rationale: El POB inglés conserva una alternativa relevante para סְעָרָה («whirlwind» frente a «storm»). Como el español opta por «torbellino», conviene conservar la alternativa «tormenta» en nota, o bien volver al texto principal «tormenta» con nota «torbellino».
  revised_spanish_text: Apenas son plantados[a], apenas son sembrados, apenas su tallo ha echado raíces en la tierra; y aun sopla sobre ellos, y se secan, y una tormenta[b] los lleva como rastrojo.
  revised_footnotes:
