translation:
  language: es
  text: Y aconteció, cuando el rey de Hai vio esto, que se apresuraron y se levantaron temprano, y los hombres de la ciudad salieron al encuentro de Israel para la batalla, él y todo su pueblo, en el lugar concertado ante el Arabá[a]. Pero no sabía que había una emboscada contra él detrás de la ciudad.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «antes del Arabá». El término hebreo puede designar la región del Arabá o, más en general, una llanura desértica o estepa.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְהִי
  english_pob_choice: And it happened
  chosen_spanish: Y aconteció
  alternatives_spanish:
  - Y sucedió
  - Y ocurrió
  lexicon: HALOT
  rationale: La forma narrativa introduce un nuevo episodio; «aconteció» preserva el marcador discursivo hebreo con un tono natural y digno en español.
- source_word: כִּרְאוֹת
  english_pob_choice: when ... saw it
  chosen_spanish: cuando ... vio esto
  alternatives_spanish:
  - al ver esto
  - así que al ver
  lexicon: HALOT
  rationale: El infinitivo constructo con כ expresa circunstancia temporal; «cuando vio esto» mantiene el valor temporal y explicita el referente implícito en español sin añadir contenido.
- source_word: מֶלֶךְ הָעַי
  english_pob_choice: the king of Ai
  chosen_spanish: el rey de Hai
  alternatives_spanish:
  - el rey de Ai
  lexicon: HALOT
  rationale: Se conserva el nombre propio en una forma española usual para el topónimo; el genitivo constructo se traduce de manera directa y natural.
- source_word: וַיְמַהֲרוּ
  english_pob_choice: they hurried
  chosen_spanish: se apresuraron
  alternatives_spanish:
  - se dieron prisa
  - se apuraron
  lexicon: HALOT
  rationale: El verbo es plural; «se apresuraron» refleja con precisión la rapidez de la acción sin sonar arcaico.
- source_word: וַיַּשְׁכִּימוּ
  english_pob_choice: rose early
  chosen_spanish: se levantaron temprano
  alternatives_spanish:
  - se levantaron de madrugada
  - madrugaron
  lexicon: HALOT
  rationale: El sentido básico es levantarse temprano; «se levantaron temprano» es claro y fiel en español contemporáneo.
- source_word: וַיֵּצְאוּ אַנְשֵׁי הָעִיר
  english_pob_choice: the men of the city went out
  chosen_spanish: los hombres de la ciudad salieron
  alternatives_spanish:
  - los varones de la ciudad salieron
  - los hombres de la ciudad salieron fuera
  lexicon: HALOT
  rationale: אַנְשֵׁי es literalmente «hombres de»; «los hombres de la ciudad» preserva la referencia masculina y el marco militar del relato.
- source_word: לִקְרַאת יִשְׂרָאֵל
  english_pob_choice: to meet Israel
  chosen_spanish: al encuentro de Israel
  alternatives_spanish:
  - para encontrarse con Israel
  - contra Israel
  lexicon: HALOT
  rationale: לִקְרַאת significa ir al encuentro de; en este contexto implica aproximación hostil, que queda reforzada por la frase siguiente.
- source_word: לַמִּלְחָמָה
  english_pob_choice: for battle
  chosen_spanish: para la batalla
  alternatives_spanish:
  - para guerra
  - para combatir
  lexicon: HALOT
  rationale: «Batalla» reproduce con claridad el propósito militar y suena más idiomático que una traducción más literal y pesada.
- source_word: הוּא וְכָל עַמּוֹ
  english_pob_choice: he and all his people
  chosen_spanish: él y todo su pueblo
  alternatives_spanish:
  - él y toda su gente
  - él y toda su gente de guerra
  lexicon: HALOT
  rationale: עַם puede significar «pueblo»; aquí mantiene el sentido colectivo sin imponer «ejército», que el hebreo no dice explícitamente.
- source_word: לַמּוֹעֵד
  english_pob_choice: at the appointed place
  chosen_spanish: en el lugar concertado
  alternatives_spanish:
  - en el lugar señalado
  - en el sitio acordado
  lexicon: HALOT
  rationale: Aquí מוֹעֵד funciona como un punto fijado de antemano; «lugar concertado» preserva la idea de cita o punto previamente acordado.
- source_word: לִפְנֵי הָעֲרָבָה
  english_pob_choice: before the Arabah
  chosen_spanish: ante el Arabá
  alternatives_spanish:
  - antes del Arabá
  - frente al Arabá
  - ante la Arabá
  lexicon: HALOT
  rationale: Se conserva el término geográfico como nombre propio/semitécnico. «Ante» refleja literalmente לִפְנֵי y su función locativa en el relato.
- source_word: וְהוּא לֹא יָדַע
  english_pob_choice: But he did not know
  chosen_spanish: Pero no sabía
  alternatives_spanish:
  - Y él no sabía
  - Mas él no sabía
  lexicon: HALOT
  rationale: El contraste irónico del hebreo se expresa bien con «Pero»; el sujeto implícito en español puede mantenerse en el verbo sin repetir «él».
- source_word: אֹרֵב לוֹ
  english_pob_choice: an ambush was against him
  chosen_spanish: una emboscada estaba contra él
  alternatives_spanish:
  - había una emboscada contra él
  - una emboscada le esperaba
  lexicon: HALOT
  rationale: El participio de ארב designa una emboscada ya preparada; «estaba contra él» preserva la tensión del original sin forzar un sujeto humano explícito.
- source_word: מֵאַחֲרֵי הָעִיר
  english_pob_choice: behind the city
  chosen_spanish: detrás de la ciudad
  alternatives_spanish:
  - a espaldas de la ciudad
  - tras la ciudad
  lexicon: HALOT
  rationale: La expresión espacial se traduce de forma directa y transparente; «detrás de la ciudad» es natural y clara en español.
translation_notes:
  revision_awareness: Se ha mantenido la lectura narrativa y militar del hebreo, siguiendo el audit trail inglés. La principal decisión estilística fue conservar términos geográficos con valor semitécnico («Arabá») y usar un español natural que no diluya la inmediatez del relato. No se detectaron revisiones textuales sustantivas en el contexto inglés provisto.
  spanish_consistency_notes:
  - Se usó «Hai» para el topónimo siguiendo la forma española usual y evitando una transliteración mixta.
  - «Pueblo» traduce aquí עַם como colectivo; no se elevó a «ejército» porque el hebreo no lo explicita.
  - «Lugar concertado» conserva la idea de punto fijado de antemano para el encuentro bélico.
  - La nota al pie sobre «Arabá» se ancla en el término geográfico y preserva la alternativa lexical documentada en el texto inglés.
