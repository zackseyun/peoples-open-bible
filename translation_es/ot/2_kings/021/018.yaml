revisions:
- from: Y Manasés se acostó con sus padres y fue sepultado en el huerto de su casa[a], en el huerto de Uzá[b]. Y Amón su hijo reinó en su lugar.
  to: Y Manasés se acostó con sus padres y fue sepultado en el jardín de su casa[a], en el jardín de Uzá. Y Amón su hijo llegó a ser rey en su lugar.
  rationale: Se ajusta «reinó» a «llegó a ser rey» para reflejar el valor de accesión de וַיִּמְלֹךְ según el rastro auditado. Se cambia «huerto» por «jardín» para mayor naturalidad en español sin perder fidelidad a גן. Se elimina la nota [b] por no corresponder a una ambigüedad significativa preservada por el POB inglés. Se mantiene la fórmula «se acostó con sus padres» con nota alternativa, por su valor idiomático y su cercanía al hebreo.
