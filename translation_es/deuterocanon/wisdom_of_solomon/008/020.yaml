translation:
  language: es
  text: Más bien[a], siendo bueno, vine a estar en un cuerpo sin mancha.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Entré en un cuerpo sin mancha». El verbo griego es literalmente «vine», pero en contexto puede entenderse como la entrada en la vida corporal.'
    reason: lexical_alternative
lexical_decisions:
- source_word: μᾶλλον δὲ
  english_pob_choice: Rather
  chosen_spanish: Más bien
  alternatives_spanish:
  - Antes bien
  - Más aún
  lexicon: LSJ
  rationale: La expresión griega introduce un giro correctivo o de mayor énfasis; «más bien» reproduce con naturalidad esa transición en español sin añadir contenido.
- source_word: ἀγαθὸς ὢν
  english_pob_choice: being good
  chosen_spanish: siendo bueno
  alternatives_spanish:
  - siendo recto
  - siendo virtuoso
  lexicon: LSJ
  rationale: «Bueno» es la correspondencia directa y clara de ἀγαθός; «virtuoso» o «recto» sonarían más interpretativos de lo que exige el griego.
- source_word: ἦλθον
  english_pob_choice: I came
  chosen_spanish: vine
  alternatives_spanish:
  - entré
  - llegué
  lexicon: LSJ
  rationale: El aoristo de ἔρχομαι se expresa naturalmente con «vine»; en contexto puede aludir a entrar en la vida corporal, pero el verbo en sí no obliga a «entré».
- source_word: εἰς σῶμα
  english_pob_choice: into a body
  chosen_spanish: a un cuerpo
  alternatives_spanish:
  - en un cuerpo
  - al cuerpo
  lexicon: LSJ
  rationale: El sintagma es indefinido; «a un cuerpo» mantiene la dirección del movimiento con un español fluido y evita sobredeterminar «el cuerpo».
- source_word: ἀμίαντον
  english_pob_choice: undefiled
  chosen_spanish: sin mancha
  alternatives_spanish:
  - sin contaminar
  - puro
  lexicon: LSJ
  rationale: ἀμίαντος denota lo no manchado o no contaminado; «sin mancha» preserva el matiz de pureza moral y la resonancia bíblica en español.
theological_decisions:
- issue: ¿Debe la traducción resolver si el texto presupone preexistencia o simplemente nacimiento/ingreso corporal?
  english_pob_reading: Translate the clause straightforwardly without resolving the broader anthropological question.
  chosen_spanish_reading: Traducir la cláusula de manera directa, sin decidir en la traducción si se trata de preexistencia, de entrada a la vida corporal o de otro trasfondo antropológico.
  alternative_spanish_readings:
  - Vine como un alma preexistente a un cuerpo sin mancha
  - Entré en la vida corporal con un cuerpo sin mancha
  rationale: El griego afirma que el hablante, siendo bueno, «vino a un cuerpo sin mancha». La versión española debe conservar esa tensión sin imponer una explicación doctrinal no explicitada por la frase.
  doctrine_reference: DOCTRINE.md §3 Preserve theological tension rather than resolve it
translation_notes:
  revision_awareness: La base inglesa y el control de revisión indican alta concordancia y sin cambios recientes; por eso se conserva una traducción sobria, con la única nota necesaria sobre el matiz contextual de ἦλθον.
  spanish_consistency_notes:
  - Se conserva «Yahvé» como norma general del proyecto cuando corresponda, aunque este versículo no lo contiene.
  - Se evita «Cristo»/«Mesías» porque no aparece en el texto fuente.
  - «Sin mancha» mantiene el valor de pureza moral de ἀμίαντος sin introducir una paráfrasis doctrinal más amplia.
