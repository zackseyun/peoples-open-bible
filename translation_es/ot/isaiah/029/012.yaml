translation:
  language: es
  text: 'Y se entrega el libro[b] a uno que no sabe leer[a], diciendo: «Por favor, lee esto», y él dice: «No sé leer».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Más literalmente, «a uno que no sabe libro/escritura». El hebreo repite סֵפֶר para subrayar la falta de alfabetización; por eso el sentido es «no sabe leer».
    reason: lexical_alternative
  - marker: b
    text: También puede entenderse «el rollo» o «el documento», pero «libro» mantiene una traducción clara y la repetición del término en la escena.
    reason: cultural_note
lexical_decisions:
- source_word: וְנִתַּן
  english_pob_choice: is given
  chosen_spanish: se entrega
  alternatives_spanish:
  - se da
  - es dado
  lexicon: HALOT
  rationale: El nifal expresa voz pasiva; «se entrega» comunica bien la acción pasiva en español moderno y conserva el movimiento narrativo de la escena ilustrativa.
- source_word: הַסֵּפֶר
  english_pob_choice: the book
  chosen_spanish: el libro
  alternatives_spanish:
  - el rollo
  - el documento
  lexicon: HALOT
  rationale: סֵפֶר puede ser libro, rollo o documento. «Libro» es natural en español y mantiene la repetición del término en el contexto inmediato.
- source_word: עַל אֲשֶׁר לֹא יָדַע סֵפֶר
  english_pob_choice: to one who does not know how to read
  chosen_spanish: a uno que no sabe leer
  alternatives_spanish:
  - a uno que no puede leer
  - a uno que no conoce la escritura
  lexicon: HALOT
  rationale: En este contexto la expresión apunta a la alfabetización. «No sabe leer» es idiomático en español y transmite la idea central sin ocultar el sentido del hebreo.
- source_word: לֵאמֹר
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - y dice
  - con estas palabras
  lexicon: HALOT
  rationale: Es el infinitivo constructo introductorio del discurso directo; «diciendo» refleja con transparencia la relación sintáctica.
- source_word: קְרָא נָא זֶה
  english_pob_choice: Please read this
  chosen_spanish: Por favor, lee esto
  alternatives_spanish:
  - Lee esto, por favor
  - Te ruego que leas esto
  lexicon: HALOT
  rationale: קרא aquí significa leer, y נָא añade cortesía o ruego. «Por favor» reproduce naturalmente ese matiz en español.
- source_word: לֹא יָדַעְתִּי סֵפֶר
  english_pob_choice: I do not know how to read
  chosen_spanish: No sé leer
  alternatives_spanish:
  - No puedo leer
  - No sé de letras
  lexicon: HALOT
  rationale: La respuesta repite la idea de incapacidad para leer. «No sé leer» es la forma más natural en español y conserva la fuerza idiomática del hebreo.
translation_notes:
  revision_awareness: La revisión inglesa reciente prefirió la equivalencia idiomática «does not know how to read» sobre la más literal «does not know writing». En español, la decisión equivalente es usar «no sabe leer» / «No sé leer», manteniendo en nota la resonancia literal hebrea con סֵפֶר.
  spanish_consistency_notes:
  - He mantenido «libro» en el texto principal por naturalidad y coherencia con la versión inglesa revisada, dejando en nota las otras posibilidades léxicas.
  - Usé un registro sobrio y bíblico, pero no arcaizante, para que la frase sea publicable en español contemporáneo.
  - No introduje terminología eclesiástica ajena al hebreo; el foco permanece en la escena de alfabetización implícita por la repetición de סֵפֶר.
