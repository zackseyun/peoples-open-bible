  glossary_alignment: No hay conflicto con la terminología del proyecto. 'Iniquidades' para עֲוֹנֹתַי está bien justificado; 'males' para רָעוֹת funciona. No aparecen términos sensibles del glosario mayor como Yahvé, Mesías o esclavo.
