review_pass:
  verdict: revise
  source_alignment_summary: 'El primer hemistiquio está bien alineado con el hebreo: צְדָקָה como «justicia» y תְרוֹמֵם como «exalta» son opciones fieles y naturales. El segundo hemistiquio en el borrador español reproduce la lectura principal del POB inglés («el pecado es una vergüenza para los pueblos»), lo cual es correcto. Sin embargo, la nota al pie no preserva adecuadamente toda la explicación del audit trail inglés: omite la alternativa de que la palabra detrás de «pecado» pueda traducirse como «vergüenza/desgracia», y en cambio desplaza la rareza léxica a la palabra traducida como «vergüenza», alterando la documentación de la dificultad hebrea.'
  spanish_quality_summary: El español principal es claro, idiomático y de registro sapiencial adecuado. «La justicia exalta a una nación, pero el pecado es una vergüenza para los pueblos» suena natural y digno. Solo conviene ajustar la nota para mayor precisión filológica; también «desgracia» o «deshonra» suenan algo más proverbiales que «vergüenza», pero «vergüenza» sigue siendo aceptable y fiel.
  glossary_alignment: 'Buena alineación con las pautas del proyecto: צְדָקָה como «justicia» es defendible en contexto sapiencial; no hay conflictos con terminología teológica principal. La decisión de mantener «pecado» y «vergüenza» en la cláusula difícil sigue la lectura documentada del POB inglés. La única desalineación real está en la formulación de la nota explicativa, no en el texto bíblico principal.'
  issues:
  - severity: medium
    issue: La nota al pie no refleja con fidelidad la nota y rationale del POB inglés sobre la ambigüedad del segundo hemistiquio.
    rationale: 'El inglés indica dos posibilidades: que la línea se entienda tradicionalmente como que el pecado trae reproche/desgracia a los pueblos, y que alternativamente la palabra traducida «sin/pecado» pueda traducirse «disgrace/desgracia», mientras que la otra palabra también ha sido tomada en el sentido raro de «reproach/reproche». La nota española actual atribuye el sentido raro a la palabra traducida como «vergüenza» y omite la alternativa sobre la palabra detrás de «pecado».'
  - severity: low
    issue: «Vergüenza» es aceptable, pero «desgracia» o «deshonra» reflejarían un poco mejor el matiz de reproche público del audit trail.
    rationale: No es un error de fidelidad suficiente para rechazar el texto; la frase sigue siendo comprensible y fiel. Se deja el texto principal intacto por ser natural, claro y coherente con la decisión inglesa.
  revised_spanish_text: La justicia exalta a una nación[a], pero el pecado es una vergüenza para los pueblos.
  revised_footnotes:
  - marker: a
    text: El hebreo de la segunda línea es difícil. Tradicionalmente se entiende que el pecado trae reproche o deshonra sobre los pueblos; alternativamente, la palabra traducida «pecado» puede entenderse como «desgracia», y la otra palabra de la cláusula también ha sido tomada en el sentido raro de «reproche».
    reason: alternative_reading
  revision_rationale: Se conserva el texto principal porque es fiel, claro y estilísticamente apropiado. Se corrige la nota al pie para que refleje con precisión la dificultad del hebreo y la explicación lexical documentada en el POB inglés, sin introducir una reinterpretación nueva.
