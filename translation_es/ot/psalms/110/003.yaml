base_translation:
  language: en
  yaml_path: translation/ot/psalms/110/003.yaml
  text: Your people will offer themselves freely on the day of your power[a], in holy splendor; from the womb of the dawn[c][b], to you belongs the dew of your youth.
  footnotes:
  - marker: a
    text: Or 'Your people are freewill offerings on the day of your strength/army.' The Hebrew uses the noun 'freewill offerings' poetically for willing self-presentation.
    reason: lexical_alternative
  - marker: b
    text: Or 'in holy array,' 'in the splendors of holiness,' or possibly 'in holy garments.'
    reason: lexical_alternative
  - marker: c
    text: The final line is difficult. It may mean 'your young men are to you like dew from the womb of the dawn,' or it may speak of the freshness of your youth.
    reason: alternative_reading
