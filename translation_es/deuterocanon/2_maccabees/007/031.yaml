review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja con precisión la estructura y el sentido del griego: contraste directo («Pero tú»), acusación amplia («de todo mal»), hostilidad hacia «los hebreos», negación enfática de escape, y la imagen concreta de «las manos de Dios». La única desviación significativa está en la nota léxica, donde «devisador» no es una opción española adecuada para εὑρετής.'
  spanish_quality_summary: 'El texto principal es natural, claro y digno en español eclesial moderno. «Habiéndote convertido en el inventor de todo mal» es comprensible, aunque algo pesado; sin embargo, sigue siendo fiel. La lectura es buena en conjunto. El problema principal de calidad está en la nota al pie: «devisador» no es término estándar; conviene reemplazarlo por «ideador» o «maquinador» según el matiz, y aquí «ideador» encaja mejor como alternativa a «inventor/autor».'
  glossary_alignment: 'No hay conflicto con la terminología por defecto del proyecto: θεοῦ se traduce correctamente como «Dios» y Ἑβραίους como «hebreos», conforme al razonamiento documentado. No intervienen términos sensibles como Yahvé, Mesías, esclavo, etc.'
  issues:
  - severity: medium
    issue: La nota al pie usa «devisador», que no es una forma natural o recomendable en español.
    rationale: El inglés auditado ofrece «deviser» como alternativa, pero trasladarlo mecánicamente produce un hispanismo defectuoso. Para preservar la intención léxica y la legibilidad, debe sustituirse por una opción española idiomática como «ideador».
  revised_spanish_text: Pero tú[a], habiéndote convertido en el inventor de todo mal contra los hebreos, ciertamente no escaparás de las manos de Dios.
  revised_footnotes:
  - marker: a
    text: O «el ideador» o «el autor» de todo mal.
    reason: lexical_alternative
  revision_rationale: Se mantiene intacto el texto principal porque es fiel al griego y suena bien en español. Solo se corrige la nota léxica para reemplazar «devisador», que no es una alternativa española natural, por «ideador», que transmite adecuadamente el matiz de εὑρετής.
