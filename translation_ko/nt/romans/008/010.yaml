  rationale: 본 절은 σῶμα(몸)와 명시적 대조이므로, 인격적 「영」으로 보는 것이 자연스럽다. 다음 절(8:11)에서 성령이 명시되므로, 본 절은 「영」 유지로 점진성 보존.
