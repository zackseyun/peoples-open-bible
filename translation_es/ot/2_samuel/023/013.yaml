revisions:
- from: Entonces treinta de entre los treinta jefes[a] bajaron y llegaron en tiempo de cosecha[b] a David, a la cueva de Adulam, mientras una banda[c] de los filisteos estaba acampada en el Valle de Refaim.
  to: Entonces treinta de los treinta hombres principales[a] bajaron y vinieron en tiempo de cosecha[b] a David, a la cueva de Adulam, mientras una tropa[c] de los filisteos estaba acampada en el Valle de Refaim.
  rationale: 'Se ajusta la redacción para mayor naturalidad narrativa y mejor precisión léxica en español: «vinieron» refleja bien el movimiento hacia David, y «tropa» comunica mejor el sentido militar contextual de חַיַּת פְּלִשְׁתִּים que «banda». También se pule la nota textual difícil para que suene más natural en castellano sin perder la incertidumbre del hebreo.'
