translation:
  language: es
  text: Vuélvanse ante mi reprensión[a]; miren, derramaré mi espíritu[b] a ustedes; daré a conocer mis palabras a ustedes.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Retornen a mi reprensión» o «Arrepiéntanse ante mi reprensión».'
    reason: lexical_alternative
  - marker: b
    text: «mi espíritu» también puede entenderse como «mi mente» o «mi pensamiento interior»; algunos lectores ven aquí una resonancia canónica más amplia con el Espíritu de Dios, aunque el versículo presenta a la Sabiduría personificada hablando.
    reason: alternative_reading
lexical_decisions:
- source_word: תָּשׁוּבוּ
  english_pob_choice: Turn
  chosen_spanish: Vuélvanse
  alternatives_spanish:
  - Retornen
  - Arrepiéntanse
  lexicon: HALOT
  rationale: שׁוּב expresa volver/cambiar de rumbo. "Vuélvanse" conserva la imagen concreta y el llamado a un cambio de dirección. "Arrepiéntanse" introduciría con más fuerza la carga teológica de arrepentimiento que el hebreo aquí no explicita por sí mismo.
- source_word: לְת֫וֹכַחְתִּי
  english_pob_choice: at my rebuke
  chosen_spanish: ante mi reprensión
  alternatives_spanish:
  - a mi reprensión
  - por mi corrección
  - ante mi reprensión
  lexicon: HALOT
  rationale: תּוֹכַחַת puede ser reprensión, reprobación o corrección. Con ל tras שוב, el sentido es responder a esa corrección o volver en atención a ella. "Ante mi reprensión" comunica bien la idea de colocarse frente a la advertencia sin sonar forzado en español.
- source_word: הִנֵּה
  english_pob_choice: behold
  chosen_spanish: miren
  alternatives_spanish:
  - he aquí
  - fíjense
  lexicon: HALOT
  rationale: Es una partícula de llamada de atención. "Miren" es natural en español contemporáneo y conserva el énfasis discursivo.
- source_word: אַבִּיעָה
  english_pob_choice: I will pour out
  chosen_spanish: derramaré
  alternatives_spanish:
  - brotaré
  - verteré
  - haré brotar
  lexicon: HALOT
  rationale: נבע tiene la idea de brotar o salir abundantemente. "Derramaré" mantiene la imagen de flujo abundante y funciona bien con "mi espíritu" en español.
- source_word: רוּחִי
  english_pob_choice: my spirit
  chosen_spanish: mi espíritu
  alternatives_spanish:
  - mi aliento
  - mi mente
  - mi interior
  lexicon: HALOT
  rationale: רוּחַ puede ser espíritu, aliento o viento. En este discurso personificado de Sabiduría, "mi espíritu" preserva la ambigüedad lexical y evita identificarlo sin más con el Espíritu Santo.
- source_word: אוֹדִיעָה
  english_pob_choice: I will make known
  chosen_spanish: daré a conocer
  alternatives_spanish:
  - haré saber
  - declararé
  - enseñaré
  lexicon: HALOT
  rationale: La forma causativa de ידע comunica hacer saber o dar a conocer. "Daré a conocer" es claro, natural y suficientemente literal.
- source_word: דְבָרַי
  english_pob_choice: my words
  chosen_spanish: mis palabras
  alternatives_spanish:
  - mis dichos
  - mi mensaje
  - mis palabras
  lexicon: HALOT
  rationale: דָּבָר puede significar palabra, dicho o asunto. En este contexto sapiencial, "mis palabras" mantiene la referencia verbal e instructiva de la Sabiduría.
- source_word: לָכֶם ... אֶתְכֶם
  english_pob_choice: to you ... to you
  chosen_spanish: sobre ustedes ... a ustedes
  alternatives_spanish:
  - para ustedes ... a ustedes
  - a ustedes ... a ustedes
  lexicon: HALOT
  rationale: El hebreo dirige el discurso al plural. "Sobre ustedes" con "derramaré" refleja el movimiento de fluido del verbo, y "a ustedes" conserva el destinatario directo de la última cláusula.
theological_decisions:
- issue: Sentido de "mi espíritu" en la boca de Sabiduría personificada
  english_pob_reading: lowercase 'my spirit' referring to personified Wisdom's own spirit/disposition
  chosen_spanish_reading: 'minúsculas: "mi espíritu", entendido como el espíritu o disposición de la Sabiduría personificada'
  alternative_spanish_readings:
  - '"mi Espíritu" con lectura más plenamente pneumatológica'
  - una alusión directa al Espíritu Santo
  rationale: El hablante inmediato en Proverbios 1 es la Sabiduría personificada. El hebreo no la identifica explícitamente con el Espíritu de Dios. Mantener minúsculas preserva la lectura literaria e impide importar una afirmación doctrinal que el verso no formula, dejando abierta la resonancia canónica sin resolverla artificialmente.
  doctrine_reference: Preservar la tensión teológica y literaria sin sobrerresolverla; no importar una identificación pneumatológica que el texto no declara.
translation_notes:
  revision_awareness: 'El borrador sigue el pasaje hebreo con el mismo sentido general que el texto inglés auditado: llamado a volverse ante la reprensión, promesa de derramar el propio espíritu/disposición, y promesa de hacer conocer las palabras. Se conserva la tensión lexical de רוּחִי sin convertirla en una identificación explícita con el Espíritu Santo.'
  spanish_consistency_notes:
  - Se usa "Sabiduría personificada" para aludir al marco literario de Proverbios 1.
  - Se mantiene el plural de segunda persona con formas naturales de español.
  - Se evita "SEÑOR" porque el versículo no contiene el tetragrámaton ni una cita directa de YHWH.
  - '"Reprensión" se usa como equivalente de תּוֹכַחַת para conservar el campo de corrección/reproche.'
