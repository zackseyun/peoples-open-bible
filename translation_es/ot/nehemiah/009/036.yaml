translation:
  language: es
  text: Miren[a], hoy somos esclavos; y en la tierra que diste a nuestros padres para comer su fruto y lo bueno[b] de ella, miren, somos esclavos sobre ella[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O «Observa» o «Fíjate»: la partícula hebrea llama la atención e introduce una queja enfática.'
    reason: lexical_alternative
  - marker: b
    text: O «su abundancia» para «lo bueno de ella».
    reason: lexical_alternative
  - marker: c
    text: Hebreo literalmente «sobre ella», es decir, sobre la misma tierra que Dios dio a sus padres.
    reason: cultural_note
lexical_decisions:
- source_word: הִנֵּה
  english_pob_choice: Look
  chosen_spanish: ¡Mira
  alternatives_spanish:
  - ¡Mira!
  - ¡Observa!
  - ¡Fíjate!
  lexicon: HALOT
  rationale: La partícula introduce énfasis y llamada de atención. «Mira» conserva la fuerza deictica en español moderno y mantiene el tono de lamento sin sonar arcaico.
- source_word: הַיּוֹם
  english_pob_choice: today
  chosen_spanish: hoy
  alternatives_spanish:
  - este día
  - ahora
  lexicon: HALOT
  rationale: 'Adverbio temporal contrastivo: la condición presente se contrapone al don previo de la tierra. «Hoy» es natural y directo.'
- source_word: עֲבָדִים
  english_pob_choice: slaves
  chosen_spanish: esclavos
  alternatives_spanish:
  - siervos
  - criados
  lexicon: HALOT
  rationale: El término expresa sujeción y servidumbre política bajo dominio extranjero. En este contexto, «esclavos» preserva la fuerza del hebreo mejor que «siervos».
- source_word: וְהָאָרֶץ
  english_pob_choice: and in the land
  chosen_spanish: y en la tierra
  alternatives_spanish:
  - y la tierra
  lexicon: HALOT
  rationale: El hebreo es elíptico y la frase siguiente «sobre ella» aclara el sentido locativo. «En la tierra» hace fluida la lectura en español sin perder la relación con el lugar dado.
- source_word: אֲשֶׁר נָתַתָּה לַאֲבֹתֵינוּ
  english_pob_choice: that you gave to our fathers
  chosen_spanish: que diste a nuestros padres
  alternatives_spanish:
  - que diste a nuestros ancestros
  lexicon: HALOT
  rationale: Mantiene la dirección a Dios y el lenguaje pactal de «nuestros padres». Se conserva el término familiar masculino porque es la forma explícita del hebreo.
- source_word: לֶאֱכֹל
  english_pob_choice: to eat
  chosen_spanish: para comer
  alternatives_spanish:
  - para que comieran
  - para comer de
  lexicon: HALOT
  rationale: 'Infinitivo de propósito después de «diste»: la tierra fue dada para el disfrute de su fruto. «Para comer» es la equivalencia más directa y natural.'
- source_word: פִּרְיָהּ
  english_pob_choice: its fruit
  chosen_spanish: su fruto
  alternatives_spanish:
  - su producción
  - su cosecha
  lexicon: HALOT
  rationale: Conserva la imagen agrícola literal. «Fruto» es claro en español y mantiene la resonancia bíblica del lenguaje de la tierra.
- source_word: טוּבָהּ
  english_pob_choice: its good things
  chosen_spanish: sus bienes
  alternatives_spanish:
  - su abundancia
  - sus cosas buenas
  - su bondad
  lexicon: HALOT
  rationale: El sustantivo puede abarcar bondad, abundancia o lo bueno de la tierra. «Bienes» traduce de manera amplia la idea de riqueza y provisión, sin restringirla solo a la cosecha.
- source_word: עָלֶיהָ
  english_pob_choice: on it
  chosen_spanish: sobre ella
  alternatives_spanish:
  - en ella
  - en su suelo
  lexicon: HALOT
  rationale: La preposición es literalmente locativa/superficial. «Sobre ella» conserva el matiz irónico de estar sometidos sobre la misma tierra que Dios dio.
theological_decisions:
- issue: עֲבָדִים como término de subordinación política en un lamento pactal
  english_pob_reading: slaves
  chosen_spanish_reading: esclavos
  alternative_spanish_readings:
  - siervos
  rationale: La oración lamenta la pérdida de libertad bajo poder imperial. «Esclavos» comunica mejor la sujeción total que «siervos», y evita suavizar el contraste con la tierra prometida.
  doctrine_reference: DOCTRINE.md Translation philosophy §1; criterio de fuerza léxica en términos de servidumbre
- issue: Referencia genealógica y pactal a לַאֲבֹתֵינוּ
  english_pob_reading: our fathers
  chosen_spanish_reading: nuestros padres
  alternative_spanish_readings:
  - nuestros ancestros
  rationale: Se conserva el masculino plural explícito del hebreo. En esta fórmula pactal, «padres» es fiel, auditable y evita neutralizar el texto base.
  doctrine_reference: DOCTRINE.md Translation philosophy §4
translation_notes:
  revision_awareness: El registro inglés auditado no requirió revisiones sustantivas; la versión española sigue el mismo sentido, preservando la repetición enfática, el contraste temporal y la ironía locativa del hebreo. Se ajustó el orden para que la sintaxis española fuera natural sin diluir la fuerza del original.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» en este proyecto cuando aparezca el nombre divino; en este versículo no aparece.
  - «Esclavos» se usa conforme al criterio del proyecto cuando la sujeción es central.
  - «Padres» conserva la fórmula pactal masculina del hebreo.
  - La puntuación con punto y coma ayuda a reflejar la cadencia de lamento y contraste del versículo.
