translation:
  language: es
  text: Todos nosotros, como ovejas, nos hemos extraviado; cada uno[a] se ha vuelto a su propio camino; y Yahvé ha hecho recaer sobre él[b] la iniquidad[c] de todos nosotros.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «cada hombre». El hebreo usa un singular masculino distributivo con sentido colectivo, referido universalmente en el contexto.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «Yahvé hizo que la iniquidad de todos nosotros cayera sobre él» o «convergiera sobre él». El verbo hebreo puede expresar causar que algo golpee o llegue sobre alguien.'
    reason: alternative_reading
  - marker: c
    text: «Iniquidad» también puede entenderse como «culpa» o, por extensión, la responsabilidad o consecuencia asociada con esa culpa.
    reason: lexical_alternative
lexical_decisions:
- source_word: כֻּלָּנוּ
  english_pob_choice: All of us
  chosen_spanish: Todos nosotros
  alternatives_spanish:
  - nosotros todos
  - todos de nosotros
  lexicon: HALOT
  rationale: El hebreo coloca el total al frente para dar énfasis. «Todos nosotros» conserva esa amplitud inicial con una construcción natural en español.
- source_word: כַּצֹּאן
  english_pob_choice: like sheep
  chosen_spanish: como ovejas
  alternatives_spanish:
  - cual ovejas
  - igual que ovejas
  lexicon: HALOT
  rationale: La comparación es directa; «como ovejas» es idiomático y preserva la imagen pastoral y moral del símil.
- source_word: תָּעִינוּ
  english_pob_choice: have gone astray
  chosen_spanish: nos hemos extraviado
  alternatives_spanish:
  - nos hemos desviado
  - hemos andado errantes
  lexicon: HALOT
  rationale: El verbo expresa desviación o extravío del camino correcto. «Nos hemos extraviado» comunica bien el matiz de perder el rumbo sin debilitar la imagen de las ovejas.
- source_word: אִישׁ
  english_pob_choice: each man / each of us
  chosen_spanish: cada uno
  alternatives_spanish:
  - cada hombre
  - cada quien
  lexicon: HALOT
  rationale: Aunque el hebreo usa singular masculino distributivo, en español «cada uno» reproduce con naturalidad la fuerza distributiva sin perder la referencia universal del contexto de «todos nosotros».
- source_word: לְדַרְכּוֹ
  english_pob_choice: to his own way
  chosen_spanish: por su propio camino
  alternatives_spanish:
  - a su propio camino
  - en su propio camino
  lexicon: HALOT
  rationale: «Camino» mantiene el valor moral de דֶּרֶךְ. La preposición «por» expresa bien el apartarse en la dirección elegida por cada uno.
- source_word: פָּנִינוּ
  english_pob_choice: has turned
  chosen_spanish: se ha apartado
  alternatives_spanish:
  - se ha vuelto
  - ha girado
  lexicon: HALOT
  rationale: En español, con el sentido de desviarse del camino, «se ha apartado» suena natural y transmite la idea de volverse hacia otra dirección.
- source_word: וַיהוָה
  english_pob_choice: the LORD / Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  - el Señor
  lexicon: HALOT
  rationale: 'Se sigue el criterio del proyecto para el nombre divino: «Yahvé» en el texto principal, evitando la sustitución por una máscara reverencial.'
- source_word: הִפְגִּיעַ בּוֹ
  english_pob_choice: has laid on him
  chosen_spanish: ha hecho recaer sobre él
  alternatives_spanish:
  - ha puesto sobre él
  - ha hecho que caiga sobre él
  lexicon: HALOT
  rationale: El verbo puede expresar causar que algo llegue, choque o recaiga sobre alguien. «Ha hecho recaer sobre él» conserva esa fuerza de convergencia/carga sin resolver en exceso el mecanismo exacto.
- source_word: עֲוֺן
  english_pob_choice: iniquity
  chosen_spanish: la iniquidad
  alternatives_spanish:
  - la culpa
  - la maldad
  lexicon: HALOT
  rationale: «Iniquidad» preserva el peso moral y el registro teológico del término, tal como hace la POB en inglés.
- source_word: כֻּלָּנוּ
  english_pob_choice: of us all
  chosen_spanish: de todos nosotros
  alternatives_spanish:
  - de nosotros todos
  - de todos
  lexicon: HALOT
  rationale: La clausura retoma la totalidad del inicio. «De todos nosotros» mantiene el inclusio y suena natural en español.
theological_decisions:
- issue: Barrera entre traducción y formulación doctrinal sobre el sufrimiento vicario
  english_pob_reading: The verse says Yahweh placed the iniquity of all on him, without expanding into a doctrinal paraphrase.
  chosen_spanish_reading: Yahvé ha hecho recaer sobre él la iniquidad de todos nosotros.
  alternative_spanish_readings:
  - Yahvé le ha cargado a él el castigo de todos nosotros
  - Yahvé ha puesto sobre él la culpa de todos
  rationale: La frase española conserva el sentido vicario y la tensión teológica del hebreo, pero evita sobreexplicar el mecanismo como si el texto ya formulara una tesis sistemática completa.
  doctrine_reference: Preservar la tensión teológica sin resolverla más allá del texto fuente
- issue: Valor distributivo de אִישׁ
  english_pob_reading: each of us / each man with distributive force
  chosen_spanish_reading: cada uno
  alternative_spanish_readings:
  - cada hombre
  - cada quien
  rationale: El singular masculino del hebreo tiene fuerza distributiva. «Cada uno» conserva esa distribución y es más natural en español que un masculino explícito en este contexto universal.
  doctrine_reference: Exactitud gramatical con claridad idiomática
translation_notes:
  revision_awareness: 'El borrador sigue de cerca el contexto auditado en inglés, pero ajusta varios puntos para español: sustituye la fórmula final de ‘laid on him’ por ‘ha hecho recaer sobre él’ para reflejar mejor el valor de הִפְגִּיעַ; mantiene «Yahvé» conforme al estándar del proyecto; y opta por «cada uno» en lugar de una expresión masculinizada explícita, conservando la fuerza distributiva del hebreo sin perder naturalidad en español.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» para el nombre divino, conforme al criterio del proyecto.
  - Se conserva «iniquidad» para עֲוֺן, evitando suavizar el peso moral del término.
  - La cláusula inicial y la final se corresponden mediante la repetición de «todos nosotros», preservando el inclusio del hebreo.
  - Se usa «cada uno» para reflejar el singular distributivo de אִישׁ sin introducir un calco incómodo.
