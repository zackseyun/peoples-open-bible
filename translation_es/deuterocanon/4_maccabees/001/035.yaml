translation:
  language: es
  text: Porque las pasiones de los deseos son contenidas, al ser hechas retroceder por la mente dueña de sí; y todos los impulsos del cuerpo son gobernados[a] por la razón.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «todas las mociones del cuerpo son orientadas al honor por la razón». El verbo griego aquí es poco común y puede implicar aspirar con celo o amar el honor.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀντέχεται
  english_pob_choice: are held in check
  chosen_spanish: son contenidas
  alternatives_spanish:
  - son resistidas
  - son restringidas
  - son refrenadas
  lexicon: LSJ
  rationale: El verbo griego expresa oposición y contención. «Son contenidas» comunica la idea de freno sin sugerir eliminación total, en línea con la intención de la POB en inglés.
- source_word: πάθη
  english_pob_choice: passions
  chosen_spanish: pasiones
  alternatives_spanish:
  - afectos
  - emociones
  - sufrimientos
  lexicon: LSJ
  rationale: En este contexto ético-filosófico, πάθη se refiere a impulsos pasionales desordenados. «Pasiones» mantiene ese campo semántico.
- source_word: ὀρέξεων
  english_pob_choice: of desires
  chosen_spanish: de los deseos
  alternatives_spanish:
  - de los apetitos
  - de las ansias
  - de las apetencias
  lexicon: LSJ
  rationale: ὄρεξις puede ser deseo, apetito o anhelo. «Deseos» es amplio, natural en español y conserva la relación interna del genitivo con «pasiones».
- source_word: σώφρονος νοὸς
  english_pob_choice: the self-controlled mind
  chosen_spanish: la mente sobria
  alternatives_spanish:
  - la mente autocontrolada
  - la mente temperante
  - la mente prudente
  lexicon: LSJ
  rationale: σώφρων incluye sobriedad, moderación y autodominio. «Mente sobria» es breve y reproduce bien el tono moral de 4 Macabeos sin forzar un giro demasiado psicológico.
- source_word: ἀνακαμπτόμενα
  english_pob_choice: being turned back
  chosen_spanish: siendo rechazadas
  alternatives_spanish:
  - siendo devueltas
  - siendo vueltas atrás
  - siendo refrenadas
  lexicon: LSJ
  rationale: El participio sugiere retroceso o vuelta hacia atrás. «Siendo rechazadas» expresa la imagen de ser repelidas/echadas atrás y funciona de manera natural en español.
- source_word: φιλοτιμοῦνται
  english_pob_choice: are governed by reason
  chosen_spanish: son gobernados por la razón
  alternatives_spanish:
  - son dirigidos hacia el honor por la razón
  - aspiran al honor por la razón
  - son orientados por la razón
  lexicon: LSJ
  rationale: La revisión inglesa optó por «are governed by reason» para esta forma inusual. En español, «son gobernados por la razón» conserva la lectura principal y evita perder la extrañeza del verbo al reducirlo a un simple control genérico.
- source_word: κινήματα
  english_pob_choice: impulses
  chosen_spanish: impulsos
  alternatives_spanish:
  - movimientos
  - estímulos
  - mociones
  lexicon: LSJ
  rationale: En este marco antropológico, κινήματα no son solo movimientos físicos sino impulsos internos. «Impulsos» transmite bien esa fuerza interna.
- source_word: λογισμοῦ
  english_pob_choice: reason
  chosen_spanish: la razón
  alternatives_spanish:
  - el razonamiento
  - el juicio racional
  - la facultad racional
  lexicon: LSJ
  rationale: λογισμός es un término central de 4 Macabeos para la razón o el juicio racional. «La razón» es conciso y fiel al argumento filosófico del pasaje.
theological_decisions:
- issue: Psicología moral helenística sin categorías posteriores
  english_pob_reading: The verse is rendered in terms of reason restraining passions and directing bodily impulses, without importing later doctrinal categories such as 'sinful nature.'
  chosen_spanish_reading: El versículo se traduce como una descripción de la razón que contiene y gobierna las pasiones e impulsos corporales, sin introducir categorías doctrinales posteriores.
  alternative_spanish_readings:
  - Se podría paraphrasear como si hablara de una naturaleza pecaminosa
  - Se podría hacer más literal y decir solo «movimientos»
  rationale: El griego pertenece al mundo moral filosófico de 4 Macabeos. La traducción conserva ese marco y evita añadir interpretaciones ajenas al texto.
  doctrine_reference: Translation philosophy §§1, 3, 6
translation_notes:
  revision_awareness: La redacción sigue la revisión inglesa más reciente, que sustituyó «are made ambitious by reason» por «are governed by reason» para reflejar mejor φιλοτιμοῦνται en este contexto. La versión española evita tanto un tecnicismo artificial como una simplificación excesiva, y mantiene la tensión del verbo inusual mediante una nota alternativa.
  spanish_consistency_notes:
  - Se mantuvo «razón» para λογισμός, en coherencia con el uso filosófico del libro.
  - Se evitó traducir σάρξ, porque el versículo no usa ese término; se prefirió «cuerpo» para σώματος.
  - «Mente sobria» conserva el matiz de autodominio de σώφρων sin imponer un equivalente excesivamente tradicional.
