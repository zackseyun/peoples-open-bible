review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador capta bien la estructura básica del hebreo: proclamación recíproca, triple «Santo», nombre divino «Yahvé» y la idea de que toda la tierra está llena de su gloria. Sin embargo, se aparta innecesariamente del perfil aspectual/narrativo del hebreo con «clamaba… decía», donde los wayyiqtol favorecen mejor un pasado simple en español («llamó… dijo» o similar). Además, la nota sobre YHWH está mal anclada: el marcador [b] aparece sobre «su gloria» pero la nota trata del nombre divino «YHWH», por lo que debe moverse a «Yahvé».'
  spanish_quality_summary: El texto es legible y digno, pero puede sonar más natural y fiel con «Y uno llamó al otro y dijo». «Clamaba» y «decía» introducen un matiz iterativo/progresivo no exigido por el original. «Yahvé de los ejércitos» es comprensible, aunque «de las huestes» preserva mejor la amplitud tradicional del título; dado el expediente inglés y la claridad en español, puede mantenerse «de los ejércitos» con nota alternativa. La puntuación y el registro general son buenos.
  glossary_alignment: 'Alinea correctamente «Yahvé» para יְהוָה y conserva «Santo, santo, santo». La decisión «de los ejércitos» para צְבָאוֹת es aceptable como excepción contextual, siempre que se mantenga la alternativa «de las huestes» en nota. El problema principal de alineación terminológica es técnico: la nota de YHWH debe anclarse al nombre divino, no a «su gloria».'
  issues:
  - severity: medium
    issue: Aspecto verbal español menos fiel al hebreo narrativo
    rationale: Los verbos hebreos wayyiqtol וְקָרָא / וְאָמַר se reflejan mejor con pasado simple en español. «Clamaba… decía» sugiere acción habitual o en desarrollo, matiz no requerido por el texto fuente ni por el audit trail inglés.
  - severity: high
    issue: Marcador de nota [b] mal ubicado
    rationale: La nota [b] explica YHWH, pero en el borrador está colocada después de «su gloria». Esto crea una incoherencia entre texto y nota y debe corregirse anclando [b] en «Yahvé».
  - severity: low
    issue: «Clamaba» intensifica más de lo necesario
    rationale: Aunque posible, el inglés auditado prefirió «called» y el hebreo permite «llamó». «Clamaba» añade un matiz de grito/proclamación que no es indispensable, especialmente junto con el contexto ya solemne.
  revised_spanish_text: 'Y uno llamó al otro y dijo: «Santo, santo, santo es Yahvé[b] de los ejércitos[a]; toda la tierra está llena de su gloria».'
