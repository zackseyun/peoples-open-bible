review_pass:
  verdict: revise
  source_alignment_summary: El borrador refleja correctamente la fórmula profética כֹּה אָמַר como «Así dice», preserva יְהוָה como «Yahvé» y mantiene el modismo con «corazón», en línea con la revisión inglesa que explicitó «Set your heart». Sin embargo, «en sus caminos» no representa bien עַל ni suena idiomático con «poner el corazón» en español; además, «sus caminos» puede entenderse de manera demasiado física si no se formula con mayor naturalidad.
  spanish_quality_summary: «Pongan su corazón en sus caminos» es comprensible, pero resulta poco natural en español e incluso algo torpe. Una formulación más clara y digna es «Pongan su corazón en sus propios caminos», que mantiene la imagen y mejora la legibilidad; alternativamente podría usarse «en su proceder», pero eso se alejaría del texto inglés auditado y de la metáfora hebrea de «caminos».
  glossary_alignment: Alinea bien con los términos del proyecto en «Yahvé». «De los ejércitos» es aceptable para צְבָאוֹת. La preservación explícita de «corazón» concuerda con la decisión auditada. La única corrección necesaria es estilístico-idiomática en la frase preposicional final.
  issues:
  - severity: medium
    issue: La expresión «Pongan su corazón en sus caminos» suena poco idiomática en español.
    rationale: Aunque es formalmente cercana al hebreo, en español la combinación produce una frase rígida y algo ambigua. Añadir «propios» aclara que se trata de su conducta o proceder, no de caminos físicos ajenos.
  - severity: low
    issue: La nota al pie «sobre sus caminos» no ofrece una alternativa especialmente útil para el lector hispano.
    rationale: «Sobre sus caminos» es más literal respecto de עַל, pero menos natural que el texto principal. Conviene mantenerla solo como nota de literalidad, formulada con claridad.
  revised_spanish_text: 'Así dice Yahvé de los ejércitos: Pongan su corazón en[a] sus propios caminos.'
  revised_footnotes:
  - marker: a
    text: O, más literalmente, «Pongan su corazón sobre sus caminos».
    reason: lexical_alternative
  revision_rationale: Se conserva la fidelidad al hebreo y a la revisión inglesa explícita («Set your heart»), pero se mejora la naturalidad del español añadiendo «propios» para aclarar el sentido moral de «caminos». La nota se mantiene como alternativa más literal para reflejar la preposición hebrea.
