translation:
  language: es
  text: Y cuídate de alzar tus ojos al cielo, y al ver el sol, la luna y las estrellas, todo el ejército del cielo, te desvíes y te inclines ante ellos y les sirvas, los cuales Yahvé tu Dios ha repartido[a] a todos los pueblos debajo de todos los cielos[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «ha asignado» o «ha distribuido». El hebreo dice que Yahvé «ha repartido» estas cosas a todos los pueblos; la redacción en sí no dice que él apruebe que las adoren.
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «debajo de todos los cielos». Muchas versiones expresan este modismo como «bajo todo el cielo».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וּפֶן
  english_pob_choice: And beware lest
  chosen_spanish: Y cuídate de
  alternatives_spanish:
  - Y guarda que no
  - Y procura no
  lexicon: HALOT
  rationale: La partícula de advertencia introduce un riesgo a evitar. «Cuídate de» expresa de forma natural y solemne la advertencia preventiva, sin perder el matiz exhortativo del hebreo.
- source_word: תִּשָּׂא עֵינֶיךָ הַשָּׁמַיְמָה
  english_pob_choice: you lift up your eyes to heaven
  chosen_spanish: alzar tus ojos al cielo
  alternatives_spanish:
  - levantar tus ojos al cielo
  - mirar hacia el cielo
  lexicon: HALOT
  rationale: Se conserva el giro idiomático de dirigir la mirada hacia arriba. «Cielo» es la forma natural en español para este contexto, aunque el hebreo usa una forma plural.
- source_word: וְרָאִיתָ
  english_pob_choice: and when you see
  chosen_spanish: al ver
  alternatives_spanish:
  - y cuando veas
  - y al que veas
  lexicon: HALOT
  rationale: En la secuencia advertencia + acción posible, el participio español «al ver» comunica con naturalidad la condición temporal implícita.
- source_word: הַשֶּׁמֶשׁ ... הַיָּרֵחַ ... הַכּוֹכָבִים
  english_pob_choice: the sun and the moon and the stars
  chosen_spanish: el sol, la luna y las estrellas
  alternatives_spanish:
  - el sol, la luna y los astros
  - el sol, la luna y las constelaciones
  lexicon: HALOT
  rationale: La secuencia de cuerpos celestes se traduce de manera directa y transparente, conservando el orden del original.
- source_word: כֹּל צְבָא הַשָּׁמַיִם
  english_pob_choice: all the host of heaven
  chosen_spanish: todo el ejército de los cielos
  alternatives_spanish:
  - todo el ejército celestial
  - toda la hueste del cielo
  lexicon: HALOT
  rationale: צָבָא puede ser «ejército» o «hueste». Aquí la expresión abarca el conjunto de los cuerpos celestes; «ejército de los cielos» mantiene la fuerza colectiva y la resonancia del hebreo sin reducirlo a ángeles.
- source_word: וְנִדַּחְתָּ
  english_pob_choice: you be drawn away
  chosen_spanish: te desvíes
  alternatives_spanish:
  - te apartes
  - seas arrastrado
  lexicon: HALOT
  rationale: El nifal de נדח transmite ser desviado o apartado hacia la apostasía. «Te desvíes» conserva esa idea de apartamiento inducido sin exagerar la coerción.
- source_word: וְהִשְׁתַּחֲוִיתָ לָהֶם
  english_pob_choice: bow down to them
  chosen_spanish: te inclines ante ellos
  alternatives_spanish:
  - te postres ante ellos
  - te arrodilles ante ellos
  lexicon: HALOT
  rationale: El verbo denota postración física. «Te inclines ante ellos» es natural en español y conserva la acción corporal de rendición idolátrica.
- source_word: וַעֲבַדְתָּם
  english_pob_choice: serve them
  chosen_spanish: les sirvas
  alternatives_spanish:
  - les prestes servicio
  - les rindas culto
  lexicon: HALOT
  rationale: עבד en contextos de idolatría puede significar servir en sentido cúltico. «Servir» preserva la correspondencia lexical y deja que la pareja con «inclinarse» exprese la adoración prohibida.
- source_word: אֲשֶׁר חָלַק
  english_pob_choice: which ... has allotted
  chosen_spanish: a los cuales ... ha repartido
  alternatives_spanish:
  - a los cuales ... ha asignado
  - a los cuales ... ha distribuido
  lexicon: HALOT
  rationale: חלק expresa repartir/aportionar. «Ha repartido» refleja bien la distribución sin añadir que Dios apruebe el culto a esos astros, manteniendo la tensión teológica del pasaje.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  - Jehová
  lexicon: HALOT
  rationale: 'Se sigue el criterio de la serie para el Tetragrámaton: transliteración del nombre divino como «Yahvé», en lugar de sustituirlo por un título.'
- source_word: אֱלֹהֶיךָ
  english_pob_choice: your God
  chosen_spanish: tu Dios
  alternatives_spanish:
  - tu Dios y Señor
  lexicon: HALOT
  rationale: Es la fórmula pactal directa y estándar en español, fiel al vocativo hebreo.
- source_word: לְכֹל הָעַמִּים
  english_pob_choice: to all the peoples
  chosen_spanish: entre todos los pueblos
  alternatives_spanish:
  - para todos los pueblos
  - a todos los pueblos
  lexicon: HALOT
  rationale: El dativo distributivo se expresa de modo natural con «entre», que en español comunica la repartición sin perder el alcance colectivo de עַמִּים.
- source_word: תַּחַת כָּל הַשָּׁמָיִם
  english_pob_choice: under all the heavens
  chosen_spanish: debajo de todos los cielos
  alternatives_spanish:
  - bajo todos los cielos
  - bajo todo el cielo
  lexicon: HALOT
  rationale: Se conserva el plural hebreo con «todos los cielos», reflejando de forma auditable la estructura del original y manteniendo la idiomaticidad en español.
theological_decisions:
- issue: La cláusula sobre el reparto de los astros a todos los pueblos puede sonar como aprobación del culto astral si se traduce sin matiz.
  english_pob_reading: The clause is rendered without implying divine approval of celestial worship; it states that these heavenly bodies were apportioned/distributed among the nations in God's providential ordering.
  chosen_spanish_reading: La traducción habla de que Yahvé los ha repartido entre todos los pueblos, pero no sugiere que por eso apruebe su adoración.
  alternative_spanish_readings:
  - Yahvé los asignó para uso general de las naciones
  - Yahvé entregó las naciones al culto de esos cuerpos celestes
  rationale: El hebreo permite la idea de repartir/aportionar, pero el contexto inmediato es una prohibición de idolatría. Por eso se conserva la afirmación de reparto sin ampliar el sentido hacia una autorización del culto ni hacia una interpretación judicial que el texto no explicita aquí.
  doctrine_reference: 'Translation philosophy #3: preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: Se tuvo en cuenta que la revisión más reciente no requirió cambios y que el control cruzado solo señaló diferencias menores, sin alterar la lectura principal.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» para el Tetragrámaton, conforme al criterio general del proyecto.
  - Se usa «Dios» para אֱלֹהֶיךָ y no «Señor», para no mezclar el nombre divino con el título.
  - «Ejército de los cielos» preserva la imagen colectiva de צְבָא הַשָּׁמַיִם sin restringirla indebidamente a seres angélicos.
  - «Servir» se conserva en la pareja cultual con «inclinarse», evitando sustituirla por una paráfrasis que diluya la fuerza idolátrica.
