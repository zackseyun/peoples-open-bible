    text: 'Hebreo: «setenta sietes»; muchos entienden esto como setenta semanas de años.'
    reason: lexical_alternative
  - marker: b
    text: O «para poner fin a los pecados».
    reason: lexical_alternative
  - marker: c
    text: El hebreo dice «visión y profeta»; algunos intérpretes antiguos y modernos entienden «visión y profecía».
    reason: alternative_reading
  - marker: d
    text: O «para ungir una persona santísima»; la frase hebrea puede referirse al lugar o a un objeto santísimo, y algunos la interpretan personalmente.
    reason: alternative_reading
  revision_rationale: Se recomienda una revisión menor para ajustar mejor la fuerza de לְכַלֵּא a la decisión auditada del POB en inglés y evitar un giro español algo más interpretativo. También se mejora la naturalidad de la nota d sin cerrar la ambigüedad teológica del hebreo.
