- from: Y los hijos de Israel no se acordaron de Yahvé, su Dios[a], que los había librado de la mano de todos sus enemigos alrededor.
  to: Y los hijos de Israel no se acordaron de Yahvé, su Dios[a], que los había librado de la mano de todos sus enemigos que los rodeaban.
  rationale: 'Se conserva la traducción principal del borrador, pero se corrige la frase final para expresar de manera natural y fiel el valor de מִסָּבִיב: no solo «alrededor» en abstracto, sino enemigos circundantes. «Que los rodeaban» mantiene el sentido espacial y mejora el español.'
