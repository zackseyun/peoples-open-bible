review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura y el sentido del hebreo: mandato de colocar las dos piedras sobre las piezas de hombro del efod, función conmemorativa para los hijos de Israel, y la representación sacerdotal de Aarón delante de Yahvé llevando sus nombres sobre sus hombros. También preserva correctamente Yahvé y el lenguaje filial ''hijos de Israel''.'
  spanish_quality_summary: El español es en general claro y digno, pero 'piedras de memorial' y sobre todo 'para memorial' suenan poco naturales en español actual y rozan el calco. Además, la nota a dice 'piedras de recuerdo', que no corresponde bien como alternativa de 'piedras memoriales'. Conviene ajustar a una formulación más natural sin perder la repetición léxica de זִכָּרוֹן.
  glossary_alignment: 'Alinea bien con la terminología del proyecto: יְהוָה → ''Yahvé''; בְּנֵי יִשְׂרָאֵל → ''hijos de Israel''. No hay conflictos con otros términos doctrinales. La mejora principal es estilístico-lexical en torno a זִכָּרוֹן.'
  issues:
  - severity: medium
    issue: '''piedras de memorial'' es comprensible pero poco idiomático en español'
    rationale: Aunque cercano al hebreo y al inglés auditado, en español bíblico legible resulta más natural 'piedras memoriales' o 'piedras conmemorativas'. Mantiene la función memorial sin calco innecesario.
  - severity: medium
    issue: '''para memorial'' suena forzado'
    rationale: La frase final לְזִכָּרוֹן expresa finalidad/resultado. En español natural y fiel, 'como memorial' o 'para recordatorio' funciona mejor. 'Como memorial' conserva el registro digno y el vínculo con la idea memorial previa.
  - severity: low
    issue: La nota alternativa 'piedras de recuerdo' no es la mejor equivalencia
    rationale: El inglés preserva la alternativa literal 'stones of remembrance'. En español, 'piedras de recordación' es más literal pero menos natural; 'piedras para recuerdo' tampoco es ideal. Si se mantiene nota, conviene usar una alternativa claramente diferenciada pero adecuada, como 'piedras conmemorativas' frente a 'piedras memoriales' en texto, o viceversa.
  revised_spanish_text: Y pondrás las dos piedras sobre las hombreras del efod, como piedras memoriales[a] para los hijos de Israel[b]; y Aarón llevará sus nombres delante de Yahvé sobre sus dos hombros, como memorial.
  revised_footnotes:
