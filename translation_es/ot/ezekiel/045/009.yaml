revisions:
- from: 'Así dice el Señor Yahvé: ¡Basta[a], príncipes de Israel! Aparten la violencia y el saqueo, y practiquen la justicia y la rectitud. Aparten de mi pueblo sus expulsiones, declara el Señor Yahvé.'
  to: 'Así dice el Señor Yahvé: ¡Basta[a], príncipes de Israel! Quiten la violencia y el saqueo, y hagan justicia y rectitud. Alejen de mi pueblo sus expulsiones, declara el Señor Yahvé.'
  rationale: 'Se revisa para hacer el español más natural y más cercano al hebreo: «Quiten» refleja bien הָסִירוּ; «hagan» traduce de forma más directa עֲשׂוּ; y «Alejen de mi pueblo sus expulsiones» aclara la relación de las expulsiones con el pueblo sin estrechar el sentido de גְרֻשֹׁתֵיכֶם. No se requiere adjudicación adicional porque el ajuste es estilístico-lexical, no doctrinalmente incierto.'
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T23:48:24Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español transmite bien el sentido general del hebreo: reprensión a los príncipes, cese de violencia y saqueo, práctica de justicia/rectitud, y eliminación de las expulsiones contra el pueblo. Sin embargo, hay dos ajustes importantes para mayor fidelidad y naturalidad: (1) en el proyecto, אֲדֹנָי יְהוִה debe reflejarse con «el Señor Yahvé» o mejor en español bíblico natural «el Señor Dios Yahvé»/similar según política, pero dado el material provisto y la decisión ya documentada, «el Señor Yahvé» es aceptable; (2) la cláusula «Aparten de mi pueblo sus expulsiones» suena invertida y poco idiomática para מֵעַל עַמִּי; conviene «Quiten sus expulsiones de sobre mi pueblo» o mejor «Alejen de mi pueblo sus expulsiones». También «practiquen» añade matiz aspectual no explícito donde el hebreo simplemente dice «hagan».'
  spanish_quality_summary: 'El español es generalmente claro y digno, pero tiene dos tropiezos de fluidez: la repetición de «Aparten» en ambos imperativos y, sobre todo, «Aparten de mi pueblo sus expulsiones», que resulta forzado. «Hagan justicia y rectitud» es más cercano al hebreo y más directo que «practiquen la justicia y la rectitud». El resto del registro es adecuado para español eclesial moderno.'
  glossary_alignment: 'Buena alineación con el glosario: יְהוָה se mantiene como «Yahvé»; מִשְׁפָּט como «justicia» y צְדָקָה como «rectitud» preservan la distinción; שֹׁד como «saqueo» y חָמָס como «violencia» están bien. La principal mejora léxica es usar un verbo más simple para עֲשׂוּ («hagan») y una formulación más idiomática para הָרִימוּ ... גְרֻשֹׁתֵיכֶם מֵעַל עַמִּי.'
  issues:
