id: PHM.1.13
reference: Philemon 1:13
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: ὃν ἐγὼ ἐβουλόμην πρὸς ἐμαυτὸν κατέχειν, ἵνα ὑπὲρ σοῦ ⸂μοι διακονῇ⸃ ἐν τοῖς δεσμοῖς τοῦ εὐαγγελίου,
base_translation:
  language: en
  yaml_path: translation/nt/philemon/001/013.yaml
  text: I wanted to keep him with me[a], so that on your behalf he might serve me in the chains of the gospel,
  footnotes:
  - marker: a
    text: Or, 'for the gospel'—that is, chains borne because of the gospel.
    reason: alternative_reading
translation:
  language: ko
  text: 나는 복음의 결박[a] 중에 있는 나를 그가 그대를 대신해서 섬기도록 그를 곁에 두고 싶었습니다.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 또는 「복음을 위한 결박」, 곧 복음 때문에 진 사슬. 헬라어 속격은 그 사슬이 복음과 연관되어 있음을 압축적으로 표현한다.
    reason: alternative_reading
lexical_decisions:
- source_word: ὃν
  english_pob_choice: him
  chosen_korean: 그를
  lexicon: BDAG
  rationale: 오네시모를 가리키는 관계대명사.
- source_word: ἐβουλόμην
  english_pob_choice: I wanted
  chosen_korean: ~고 싶었습니다
  alternatives_korean:
  - 원했습니다
  - 바랐습니다
  lexicon: BDAG
  rationale: 미완료 중간태. 과거의 바람·의향. 합쇼체 「~고 싶었습니다」가 자연스럽다.
- source_word: πρὸς ἐμαυτὸν κατέχειν
  english_pob_choice: to keep him with me
  chosen_korean: 곁에 두고
  alternatives_korean:
  - 내 곁에 머무르게 하고
  - 나와 함께 있게 하고
  lexicon: BDAG
  rationale: πρὸς ἐμαυτὸν은 「내 곁에/내 옆에」, κατέχειν은 「붙들어 두다, 머물게 하다」. 「곁에 두고」가 가장 자연스럽다.
- source_word: ἵνα
  english_pob_choice: so that
  chosen_korean: ~도록
  lexicon: BDAG
  rationale: 목적절. 한국어 「~도록」이 합쇼체 산문에서 자연스럽다.
- source_word: ὑπὲρ σοῦ
  english_pob_choice: on your behalf
  chosen_korean: 그대를 대신해서
  alternatives_korean:
  - 그대를 위하여
  - 그대 대신
  lexicon: BDAG
  rationale: ὑπέρ + 속격의 대표·대신 의미. 「대신해서」가 본문의 「그대가 직접 와서 섬길 자리에서 오네시모가 대신 섬긴다」는 함의를 가장 잘 살린다.
- source_word: μοι διακονῇ
  english_pob_choice: he might serve me
  chosen_korean: 나를 ... 섬기도록
  alternatives_korean:
  - 나를 도와주도록
  - 나에게 봉사하도록
  lexicon: BDAG
  rationale: διακονέω는 일반적 섬김·봉사. 「섬기다」가 자연스럽고 후대의 교회 직제 함의 없이 일반적 보살핌·도움을 담는다.
- source_word: ἐν τοῖς δεσμοῖς
  english_pob_choice: in the chains
  chosen_korean: 결박 중에 있는
  alternatives_korean:
  - 사슬 중에 있는
  - 갇혀 있는
  lexicon: BDAG
  rationale: 10절과 일관되게 「결박」을 사용하며, 「~중에 있는」 분사 구문으로 「나」를 수식해 한국어 흐름을 자연스럽게 한다.
- source_word: τοῦ εὐαγγελίου
  english_pob_choice: of the gospel
  chosen_korean: 복음의
  alternatives_korean:
  - 복음을 위한
  - 복음 때문의
  lexicon: BDAG
  rationale: 본문의 압축적 속격을 그대로 살린다. 인과·이유 해석은 각주에 둔다.
theological_decisions:
- issue: τοῦ εὐαγγελίου의 의미
  chosen_reading: 복음의 결박 — 헬라어 속격을 그대로 보존
  alternative_readings:
  - 복음을 위한 결박
  rationale: 헬라어 속격은 복음과 결박의 압축적 결속을 보여 준다. 본 번역은 본문의 압축성을 보존하고 인과적 풀이는 각주에 둔다.
  doctrine_reference: 'Translation philosophy #3: Preserve theological tension rather than resolve it'
