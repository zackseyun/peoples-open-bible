lexical_decisions:
- source_word: לֹא
  english_pob_choice: not
  chosen_spanish: 'No'
  alternatives_spanish:
  - No habrás de
  - No deberás
  lexicon: HALOT
  rationale: La negación abre una prohibición legal; en español bíblico y moderno claro, 'No' introduce de forma natural el mandato negativo.
- source_word: תַחֲרֹשׁ
  english_pob_choice: you shall plow
  chosen_spanish: ararás
  alternatives_spanish:
  - labrarás
  - no ararás
  - no deberás arar
  lexicon: HALOT
  rationale: El verbo hebreo se refiere al acto de arar la tierra. 'Ararás' preserva el registro jurídico sin sonar forzado; la prohibición queda marcada por 'No'.
- source_word: בְּשׁוֹר
  english_pob_choice: with an ox
  chosen_spanish: con un buey
  alternatives_spanish:
  - con un toro
  - con un buey de labor
  lexicon: HALOT
  rationale: שׁוֹר designa un bovino de trabajo. En español, 'buey' comunica mejor la imagen agrícola de arado que 'toro'.
- source_word: וּבַחֲמֹר
  english_pob_choice: and a donkey
  chosen_spanish: y un asno
  alternatives_spanish:
  - y un burro
  - y un pollino
  lexicon: HALOT
  rationale: חֲמוֹר es el término común para donkey/ass. 'Asno' mantiene el paralelismo con el léxico bíblico y es preciso en español.
- source_word: יַחְדָּו
  english_pob_choice: together
  chosen_spanish: juntos
  alternatives_spanish:
  - a la vez
  - en conjunto
  lexicon: HALOT
  rationale: El adverbio indica que ambos animales participan en la misma labor. 'Juntos' es natural y preserva la idea de yugo compartido.
theological_decisions:
- issue: Registro de prohibición legal del pacto
  english_pob_reading: 'Render as a direct legal prohibition: ''You shall not plow...'''
  chosen_spanish_reading: 'Prohibición legal directa: ''No ararás...'''
  alternative_spanish_readings:
  - No deberás arar...
  - No se arará...
  rationale: Deuteronomio presenta instrucción legal del pacto; el futuro exhortativo en español transmite la fuerza normativa sin perder claridad. No hay tensión doctrinal adicional en el versículo.
  doctrine_reference: Derecho/covenio en Deuteronomio; principio de prohibición ritual-agrícola.
translation_notes:
  revision_awareness: El texto hebreo y la traducción inglesa están en alta concordancia; no se observan revisiones sustantivas en el pasaje. La opción española sigue la misma prohibición legal y mantiene la equivalencia óptima del audit trail.
  spanish_consistency_notes:
  - Se evitó 'SEÑOR' u otras convenciones de sustitución porque el versículo no contiene el nombre divino.
  - '''Buey'' y ''asno'' reflejan el campo semántico agrícola del hebreo; se prefirió el léxico bíblico claro sobre equivalentes más coloquiales.'
  - La nota alternativa conserva la opción de un giro más deóntico en español sin cambiar el contenido.
