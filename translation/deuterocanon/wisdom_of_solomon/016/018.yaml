lexical_decisions:
- source_word: ἡμεροῦτο
  chosen: was restrained
  alternatives:
  - was tamed
  - was made gentle
  - grew mild
  lexicon: LSJ
  rationale: From ἡμερόω, 'to tame, make gentle, soften.' In context of fire/flame, English 'was restrained' best conveys the flame's being subdued without implying extinction. 'Tamed' is vivid but less natural with 'flame' in modern English.
- source_word: φλόξ
  chosen: flame
  alternatives:
  - fire
  - blaze
  lexicon: LSJ
  rationale: φλόξ specifically denotes flame rather than fire in general. 'Flame' preserves the image and fits the singular subject.
- source_word: καταφλέξῃ
  chosen: burn up
  alternatives:
  - consume with fire
  - burn completely
  lexicon: LSJ
  rationale: The compound intensifies the sense beyond simple 'burn.' 'Burn up' is idiomatic and conveys destructive consumption.
- source_word: τὰ ἐπʼ ἀσεβεῖς ἀπεσταλμένα ζῷα
  chosen: the creatures sent against the ungodly
  alternatives:
  - the animals dispatched against the ungodly
  - the living creatures sent upon the ungodly
  lexicon: LSJ
  rationale: ζῷα here refers to living creatures/animals in the plague narrative. 'Creatures' is broad enough to fit the context, while 'sent against' reflects ἐπʼ ἀσεβεῖς with hostile force. 'Ungodly' is preferred for ἀσεβεῖς as a standard moral-religious term in Wisdom.
- source_word: ἀσεβεῖς
  chosen: the ungodly
  alternatives:
  - the impious
  - the wicked
  lexicon: LSJ
  rationale: In Wisdom, ἀσεβής regularly carries religious-moral force. 'Ungodly' preserves that dimension better than the more general 'wicked.'
- source_word: βλέποντες
  chosen: seeing it
  alternatives:
  - looking on
  - observing
  lexicon: LSJ
  rationale: The participle is causal/circumstantial. 'Seeing it' makes explicit the object implied by context—the restrained flame—while remaining natural in English.
- source_word: εἴδωσιν
  chosen: might know
  alternatives:
  - might perceive
  - might realize
  lexicon: LSJ
  rationale: The verb here moves from physical sight to understanding. 'Might know' preserves the cognitive result intended by the ἵνα clause.
- source_word: θεοῦ κρίσει
  chosen: by the judgment of God
  alternatives:
  - by God's judgment
  - by the sentence of God
  lexicon: LSJ
  rationale: κρίσις here denotes divine judicial action. 'Judgment of God' is clear and preserves the formal theological weight of the phrase.
- source_word: ἐλαύνονται
  chosen: were being driven on
  alternatives:
  - were being pursued
  - were being driven
  - were being harried
  lexicon: LSJ
  rationale: ἐλαύνω commonly means to drive, set in motion, or press on. In this plague context, the sense is that the ungodly were being relentlessly pressed/driven by divine judgment. 'Driven on' captures the passive force without over-specifying the agent beyond the following phrase.
