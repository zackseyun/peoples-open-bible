translation:
  language: es
  text: 'Estos son los hijos de Seir el horeo[a], los habitantes de la tierra: Lotan, Shobal, Zibeon y Anah.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'los que habitan en la tierra'.
    reason: lexical_alternative
lexical_decisions:
- source_word: אֵלֶּה
  english_pob_choice: These are
  chosen_spanish: Estos son
  alternatives_spanish:
  - Estos eran
  lexicon: HALOT
  rationale: La fórmula presentativa genealógica en español fluye mejor con presente, como en el inglés POB, y conserva el valor de introducción de lista sin añadir interpretación temporal.
- source_word: בְנֵי
  english_pob_choice: sons of
  chosen_spanish: hijos de
  alternatives_spanish:
  - descendientes de
  - hijos de familia
  lexicon: HALOT
  rationale: En español, 'hijos de' reproduce con naturalidad la relación genealógica formal del hebreo; 'descendientes de' es posible, pero atenúa el estilo genealógico directo del texto.
- source_word: שֵׂעִיר
  english_pob_choice: Seir
  chosen_spanish: Seir
  lexicon: nombre propio
  rationale: Se mantiene la transliteración del nombre propio sin adaptación.
- source_word: הַחֹרִי
  english_pob_choice: the Horite
  chosen_spanish: el horita
  alternatives_spanish:
  - el horeo
  - el horita del pueblo
  lexicon: HALOT
  rationale: El sustantivo gentilicio se vierte como 'horita' para conservar la categoría étnica/titular y la proximidad al original; en español bíblico, 'horita' es más transparente que una paráfrasis explicativa.
- source_word: יֹשְׁבֵי הָאָרֶץ
  english_pob_choice: the inhabitants of the land
  chosen_spanish: los habitantes de la tierra
  alternatives_spanish:
  - los que habitaban la tierra
  - los moradores de la tierra
  lexicon: HALOT
  rationale: '''Habitantes de la tierra'' reproduce bien la construcción de participio + sustantivo y es idiomático en español. Se evita ''moradores'' por sonar más arcaico, y ''los que habitaban'' sería más interpretativo.'
- source_word: לוֹטָן
  english_pob_choice: Lotan
  chosen_spanish: Lotán
  alternatives_spanish:
  - Lotan
  lexicon: nombre propio
  rationale: Se adapta la acentuación al español para lectura pública, manteniendo la forma transliterada del nombre propio.
- source_word: שׁוֹבָל
  english_pob_choice: Shobal
  chosen_spanish: Shobal
  alternatives_spanish:
  - Sobal
  lexicon: nombre propio
  rationale: Se conserva la transliteración estándar del nombre propio sin hispanizar más allá de lo necesario.
- source_word: צִבְעוֹן
  english_pob_choice: Zibeon
  chosen_spanish: Zibeón
  alternatives_spanish:
  - Zibeon
  lexicon: nombre propio
  rationale: Se coloca tilde para acomodar la pronunciación española, conservando la transliteración bíblica del nombre.
- source_word: עֲנָה
  english_pob_choice: Anah
  chosen_spanish: Aná
  alternatives_spanish:
  - Anah
  lexicon: nombre propio
  rationale: Se adapta la acentuación al español para lectura natural, sin alterar el nombre.
theological_decisions:
- issue: Valor del gentilicio 'הַחֹרִי'
  english_pob_reading: the Horite
  chosen_spanish_reading: el horita
  alternative_spanish_readings:
  - el horeo
  - el horita del pueblo
  rationale: 'No hay carga doctrinal especial, pero sí una decisión identitaria: ''horita'' mantiene el matiz étnico del hebreo y evita convertirlo en una simple descripción. Se conserva la tensión entre nombre gentilicio y posible referencia colectiva sin resolverla en exceso.'
  doctrine_reference: N/A
translation_notes:
  revision_awareness: Se siguió el texto hebreo base y el auditoría inglesa sin cambios de fondo; la única adaptación relevante al español fue la formulación natural del gentilicio y la acentuación de nombres propios para lectura pública.
  spanish_consistency_notes:
  - Se mantuvo 'habitantes de la tierra' para יֹשְׁבֵי הָאָרֶץ, en línea con la lectura inglesa auditada.
  - Se prefirió 'hijos de' sobre 'descendientes de' por consistencia genealógica en registros bíblicos.
  - Los nombres propios se conservaron transliterados, con tildes solo donde mejora la pronunciación española sin introducir otra forma del nombre.
