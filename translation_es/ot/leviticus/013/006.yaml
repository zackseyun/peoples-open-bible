translation:
  language: es
  text: Entonces el sacerdote lo examinará de nuevo el séptimo día, y si la infección se ha atenuado y la infección no se ha extendido en la piel, el sacerdote lo declarará limpio; es una erupción escamosa[a]. Lavará su ropa y quedará limpio.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘sarpullido’. El término hebreo se refiere a una erupción cutánea relativamente menor, en contraste con una afección más seria que se propaga.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְרָאָה
  english_pob_choice: shall examine
  chosen_spanish: lo examinará
  alternatives_spanish:
  - lo verá
  - lo inspeccionará
  lexicon: HALOT
  rationale: En contexto sacerdotal, ראה no es solo ‘ver’, sino realizar una evaluación oficial. ‘Examinará’ comunica bien esa función diagnóstica sin alejarse del hebreo.
- source_word: שֵׁנִית
  english_pob_choice: again
  chosen_spanish: de nuevo
  alternatives_spanish:
  - otra vez
  - por segunda vez
  lexicon: HALOT
  rationale: La forma adverbial indica repetición de la inspección. ‘De nuevo’ suena natural en español y conserva la idea de reiteración.
- source_word: כֵּהָה
  english_pob_choice: has faded
  chosen_spanish: ha palidecido
  alternatives_spanish:
  - se ha debilitado
  - se ha atenuado
  - se ha oscurecido
  lexicon: HALOT
  rationale: El término describe que la lesión se ha vuelto menos intensa o visible. ‘Ha palidecido’ expresa esa disminución perceptible de manera clara y digna en español.
- source_word: הַנֶּגַע
  english_pob_choice: the infection
  chosen_spanish: la infección
  alternatives_spanish:
  - la lesión
  - la afección
  - la llaga
  lexicon: HALOT
  rationale: En Levítico 13, נגע designa una afección cutánea observada por el sacerdote. ‘Infección’ mantiene la seriedad del cuadro y sigue la decisión del texto inglés POB.
- source_word: פָשָׂה
  english_pob_choice: has not spread
  chosen_spanish: no se ha extendido
  alternatives_spanish:
  - no ha avanzado
  - no ha aumentado
  lexicon: HALOT
  rationale: El sentido contextual es la propagación sobre la piel. ‘No se ha extendido’ es la forma más natural y precisa en español.
- source_word: בָּעוֹר
  english_pob_choice: in the skin
  chosen_spanish: en la piel
  alternatives_spanish:
  - sobre la piel
  - dentro de la piel
  lexicon: HALOT
  rationale: עור es ‘piel’. ‘En la piel’ corresponde al uso diagnóstico del pasaje y suena idiomático en español.
- source_word: וְטִהֲרוֹ הַכֹּהֵן
  english_pob_choice: the priest shall pronounce him clean
  chosen_spanish: el sacerdote lo declarará limpio
  alternatives_spanish:
  - el sacerdote lo pronunciará limpio
  - el sacerdote lo considerará limpio
  lexicon: HALOT
  rationale: En la legislación de pureza el sacerdote emite un veredicto ritual; no realiza una limpieza física. ‘Declarará limpio’ conserva esa fuerza jurídica y cultual.
- source_word: מִסְפַּחַת
  english_pob_choice: a scaly eruption
  chosen_spanish: una erupción escamosa
  alternatives_spanish:
  - un sarpullido
  - una erupción cutánea
  - una escama
  lexicon: HALOT
  rationale: El término apunta a una afección menor de la piel, distinta de la condición más grave y propagante. ‘Erupción escamosa’ preserva la especificidad y la relación con el inglés POB.
- source_word: וְכִבֶּס בְּגָדָיו
  english_pob_choice: He shall wash his clothes
  chosen_spanish: Lavará sus vestidos
  alternatives_spanish:
  - Lavará su ropa
  - Lavará sus prendas
  lexicon: HALOT
  rationale: בְּגָדָיו son sus prendas/vestidos. ‘Vestidos’ conserva un registro sobrio y bíblico sin resultar arcaizante en exceso.
- source_word: וְטָהֵר
  english_pob_choice: and be clean
  chosen_spanish: y quedará limpio
  alternatives_spanish:
  - y estará limpio
  - y será limpio
  lexicon: HALOT
  rationale: El verbo final expresa el resultado ritual tras el lavado. ‘Quedará limpio’ comunica bien el estado resultante en español contemporáneo.
theological_decisions:
- issue: Veredicto ritual frente a curación médica
  english_pob_reading: Render priestly action as 'pronounce him clean' and final state as ritual cleanness, without implying medical cure.
  chosen_spanish_reading: El sacerdote lo declarará limpio; el final indica un estado ritual de limpieza, no necesariamente curación física completa.
  alternative_spanish_readings:
  - el sacerdote lo limpiará
  - estará sanado
  rationale: El contexto es una evaluación sacerdotal de pureza, no una afirmación médica. Mantener el lenguaje de declaración protege la fuerza legal/cultual del texto.
  doctrine_reference: Translation philosophy §§1, 3, 6
translation_notes:
  revision_awareness: 'Alineado con la revisión más reciente: el inglés POB mantiene la lectura de inspección sacerdotal, la distinción entre estado ritual y curación, y la nota léxica sobre la afección cutánea menor; no se registraron cambios posteriores.'
  spanish_consistency_notes:
  - Se mantiene ‘el sacerdote’ para reflejar la función diagnóstica oficial del hebreo.
  - ‘Limpio’ se usa en sentido ritual, coherente con la terminología de pureza de Levítico.
  - Se conserva la distinción entre una afección menor y una condición más grave mediante ‘erupción escamosa’ y la nota alternativa.
  - No se introduce ‘SEÑOR’ ni terminología eclesiástica ajena al pasaje.
