translation:
  language: es
  text: No te retires[a] de nosotros, oh Dios, para que no nos ataquen los que nos odian sin causa[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O “No levantes tu tienda lejos de nosotros”; el verbo griego se relaciona más literalmente con quitar la tienda o acampar lejos, una imagen vívida de retirada de la presencia.
    reason: lexical_alternative
  - marker: b
    text: O “para que los que nos odian no nos ataquen por nada”; el adverbio «sin causa» puede oírse con el odio o con la acción hostil.
    reason: alternative_reading
lexical_decisions:
- source_word: Μὴ ἀποσκηνώσῃς
  english_pob_choice: Do not depart
  chosen_spanish: No te retires
  alternatives_spanish:
  - No te apartes
  - No levantes tu tienda lejos de nosotros
  - No te vayas de nosotros
  lexicon: LSJ
  rationale: El verbo griego alude literalmente a quitar la tienda o acampar lejos, pero en este contexto la petición es que Dios no retire su presencia. "No te retires" comunica la salida o retirada relacional en español natural, sin perder del todo la fuerza de alejamiento.
- source_word: ἀφʼ ἡμῶν
  english_pob_choice: from us
  chosen_spanish: de nosotros
  alternatives_spanish:
  - de entre nosotros
  - lejos de nosotros
  lexicon: BDAG
  rationale: La preposición marca separación del pueblo; "de nosotros" es directo y natural en español, y mantiene la relación comunitaria del ruego.
- source_word: ὁ θεός
  english_pob_choice: O God
  chosen_spanish: oh Dios
  alternatives_spanish:
  - Dios
  - oh, Dios
  lexicon: BDAG
  rationale: Se conserva la apelación reverente en vocativo. No aparece el Tetragrámaton en este versículo, así que no corresponde introducir "Yahvé".
- source_word: ἐπιθῶνται ἡμῖν
  english_pob_choice: attack us
  chosen_spanish: se levanten contra nosotros
  alternatives_spanish:
  - nos ataquen
  - se lancen sobre nosotros
  - nos acometan
  lexicon: LSJ
  rationale: El verbo puede expresar ponerse contra alguien o atacarlo. "Se levanten contra nosotros" conserva la idea hostil en un registro bíblico claro y evita un exceso de literalidad brusca.
- source_word: οἱ μισοῦντα ἡμᾶς
  english_pob_choice: those who hate us
  chosen_spanish: los que nos odian
  alternatives_spanish:
  - los que nos aborrecen
  - nuestros odiadores
  lexicon: BDAG
  rationale: La expresión participial se vuelve naturalmente relativa en español. "Odiar" reproduce bien la fuerza del participio sin añadir matices no presentes en el griego.
- source_word: δωρεάν
  english_pob_choice: without cause
  chosen_spanish: sin causa
  alternatives_spanish:
  - gratuitamente
  - por nada
  - sin motivo
  lexicon: BDAG
  rationale: '"Sin causa" mantiene la afirmación moral de hostilidad injustificada y refleja la ambigüedad señalada en la auditoría: puede oírse con el odio o con la acción de atacar.'
theological_decisions:
- issue: Imagen de alejamiento de la presencia divina frente a una simple partida
  english_pob_reading: Do not depart from us
  chosen_spanish_reading: No te retires de nosotros
  alternative_spanish_readings:
  - No te apartes de nosotros
  - No vayas lejos de nosotros
  - No retires tu presencia de nosotros
  rationale: La revisión auditada subraya la imaginería de la tienda y el retiro de la presencia. En español, "retirarte de nosotros" conserva la idea de alejamiento sin sobrerrepresentar el verbo como una fórmula técnica de tabernáculo que sonaría forzada en este solo versículo.
  doctrine_reference: Presencia divina / lenguaje de pacto
- issue: Ambigüedad de "sin causa" respecto al odio o al ataque
  english_pob_reading: those who hate us without cause attack us
  chosen_spanish_reading: los que nos odian sin causa se levanten contra nosotros
  alternative_spanish_readings:
  - los que nos odian ataquen sin causa
  - los que nos odian nos ataquen sin causa
  rationale: 'La nota inglesa preserva la ambigüedad: el adverbio puede modificar el odio o el ataque. La forma española también deja esa ambigüedad abierta sin fijarla de manera excesiva.'
  doctrine_reference: Hostilidad injustificada / justicia
- issue: Tratamiento reverente del vocativo divino
  english_pob_reading: O God
  chosen_spanish_reading: oh Dios
  alternative_spanish_readings:
  - Dios
  - oh, Dios
  rationale: El griego usa un vocativo simple. En español, "oh Dios" mantiene la solemnidad sin introducir un título que el texto no da.
  doctrine_reference: Vocativo de oración
translation_notes:
  revision_awareness: 'La auditoría inglesa pasó de una traducción más literal de la imagen de tienda/dwelling a una formulación más natural con "depart", y luego conservó esa opción por fluidez. Para el español, se eligió una solución intermedia: "No te retires de nosotros" preserva la naturalidad y deja abierta la imagen de alejamiento, mientras la nota [a] documenta el trasfondo más literal de la tienda. También se mantuvo la ambigüedad de δωρεάν con "sin causa", como en el inglés auditado.'
  spanish_consistency_notes:
  - Se evita "SEÑOR" porque el texto griego dice ὁ θεός, no el Tetragrámaton.
  - Se mantiene "Dios" con vocativo reverente, coherente con el resto del proyecto.
  - '"Sin causa" se conserva como fórmula estable para δωρεάν cuando el contexto habla de hostilidad injustificada.'
  - No se introduce "Mesías", "Yahvé" ni "siervo" porque no corresponden a este verso.
