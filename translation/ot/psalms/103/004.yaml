theological_decisions:
- issue: Scope of redemption imagery
  chosen_reading: Temporal and existential deliverance expressed in poetic language, without restricting it to either physical rescue or final salvation.
  alternative_readings:
  - Deliverance from death/grave specifically
  - Broader spiritual salvation
  rationale: The verse is poetic and can encompass rescue from mortal ruin broadly. The translation avoids narrowing the imagery to a single doctrinal category not explicitly specified by the Hebrew.
  doctrine_reference: Preserve theological tension rather than resolve it.
