    rationale: Aunque es comprensible, «era fuerte sobre mí» reproduce mejor el predicado hebreo חָזָקָה en español natural y mantiene la imagen sin parafrasear.
  revised_spanish_text: Y el Espíritu[a] me levantó y me llevó, y yo fui con amargura, en el ardor de mi espíritu[b], mientras la mano de Yahvé era fuerte sobre mí.
