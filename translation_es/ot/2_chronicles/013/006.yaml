translation:
  language: es
  text: Jeroboam hijo de Nebat[a], siervo de Salomón hijo de David, se levantó y se rebeló contra su señor.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «contra su amo».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּקָם
  english_pob_choice: rose up
  chosen_spanish: se levantó
  alternatives_spanish:
  - se alzó
  - se puso de pie
  lexicon: HALOT
  rationale: El hebreo wayyiqtol de קום introduce la acción de Jeroboam en sentido de iniciarse en oposición. En español, «se levantó» conserva ese impulso narrativo sin forzar un matiz militar que el texto no exige.
- source_word: יָרָבְעָם בֶּן נְבָט
  english_pob_choice: Jeroboam son of Nebat
  chosen_spanish: Jeroboam hijo de Nabat
  alternatives_spanish:
  - Jeroboam, hijo de Nabat
  lexicon: convención onomástica bíblica
  rationale: Se translitera el nombre propio según uso bíblico en español y se vierte literalmente el patronímico para mantener la referencia genealógica.
- source_word: עֶבֶד
  english_pob_choice: servant
  chosen_spanish: siervo
  alternatives_spanish:
  - servidor
  - esclavo
  lexicon: HALOT
  rationale: Aunque עבד puede abarcar esclavo o siervo, aquí el contexto real-administrativo de Jeroboam respecto de Salomón favorece «siervo» en español para expresar subordinación sin sugerir necesariamente esclavitud chattel.
- source_word: שְׁלֹמֹה בֶן דָּוִיד
  english_pob_choice: Solomon son of David
  chosen_spanish: Salomón hijo de David
  alternatives_spanish:
  - Salomón, hijo de David
  lexicon: convención onomástica bíblica
  rationale: Se preserva la estructura filial del hebreo y el énfasis dinástico mediante una traducción literal y natural en español.
- source_word: וַיִּמְרֹד
  english_pob_choice: rebelled
  chosen_spanish: se rebeló
  alternatives_spanish:
  - se amotinó
  - se alzó en rebelión
  lexicon: HALOT
  rationale: מרד denota rebelión contra autoridad. «Se rebeló» es la equivalencia más natural y precisa en español para el contexto político del versículo.
- source_word: עַל אֲדֹנָיו
  english_pob_choice: against his lord
  chosen_spanish: contra su señor
  alternatives_spanish:
  - contra su amo
  - contra su dueño
  lexicon: HALOT
  rationale: אדון con sufijo se refiere aquí a un superior humano, Salomón. «Señor» en minúscula preserva la relación de autoridad sin confundirla con el nombre divino.
theological_decisions:
- issue: Título humano אֲדֹנָיו en contraste con el uso divino de «Señor»
  english_pob_reading: his lord
  chosen_spanish_reading: su señor
  alternative_spanish_readings:
  - su amo
  - su dueño
  rationale: El referente es Salomón como superior humano de Jeroboam. En español, «señor» en minúscula mantiene la jerarquía sin activar una lectura teológica del nombre divino.
  doctrine_reference: 'DOCTRINE.md: distinguir títulos humanos de los títulos divinos; YHWH se reserva para el nombre divino, no aplica aquí.'
translation_notes:
  revision_awareness: El texto sigue de cerca el hebreo y el audit trail inglés; no se detectaron revisiones aplicadas en el expediente, y la redacción española mantiene las decisiones léxicas principales sin introducir ampliaciones interpretativas.
  spanish_consistency_notes:
  - Se conserva el patrón bíblico «hijo de» para el patronímico.
  - Se usa «siervo» para עבד por el contexto político, no «esclavo».
  - Se mantiene «se rebeló» como equivalente directo de מרד.
  - «Señor» se escribe en minúscula por referirse a un superior humano, no al nombre divino.
