lexical_decisions:
- source_word: אַרְפַּכְשַׁד
  english_pob_choice: Arpachshad
  chosen_spanish: Arpajsad
  alternatives_spanish:
  - Arfaxad
  lexicon: nombre propio hebreo
  rationale: El hebreo apunta directamente a una transliteración del nombre propio. Se conserva una forma cercana a la consonantización hebrea; 'Arfaxad' refleja la tradición grecolatina/vernácula más conocida, pero es menos directa respecto del texto hebreo aquí.
- source_word: יָלַד
  english_pob_choice: fathered
  chosen_spanish: engendró
  alternatives_spanish:
  - fue padre de
  - tuvo a
  lexicon: HALOT
  rationale: En genealogías, el verbo expresa generación paterna. 'Engendró' mantiene esa fuerza genealógica con un registro bíblico claro en español, sin perder precisión.
- source_word: שָׁלַח / שֶׁלַח
  english_pob_choice: Shelah
  chosen_spanish: Sélaj
  alternatives_spanish:
  - Sela
  - Sala
  lexicon: nombre propio hebreo
  rationale: El texto hebreo presenta la misma persona con vocalización/ortografía ligeramente distinta. Se unifica en español como nombre propio transliterado desde el hebreo; se opta por 'Sélaj' para reflejar la forma consonántica del versículo, aunque 'Sala' aparece en tradiciones y genealogías relacionadas.
- source_word: עֵבֶר
  english_pob_choice: Eber
  chosen_spanish: Éber
  alternatives_spanish:
  - Heber
  lexicon: nombre propio hebreo
  rationale: Se conserva el nombre propio a partir del hebreo עבר. 'Éber' es la forma más cercana y reconocible en español bíblico; 'Heber' corresponde a otras tradiciones y puede confundirse con nombres distintos.
translation_notes:
  revision_awareness: El texto hebreo es una línea genealógica simple y el audit trail inglés no introduce revisiones doctrinales ni textuales adicionales; se ha mantenido la estructura repetitiva del original con una transliteración española consistente.
  spanish_consistency_notes:
  - Se conserva el paralelismo genealógico con dos veces «engendró a».
  - Se usa acentuación gráfica en los nombres para lectura natural en español bíblico, sin alterar la identificación de los nombres propios.
  - Las notas a y b distinguen la alternativa tradicional del nombre inicial y la variante ortográfica del segundo nombre sin sobrecargar el texto principal.
