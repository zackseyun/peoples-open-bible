translation:
  language: es
  text: La mano floja[a] hace pobre, pero la mano de los diligentes enriquece.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Floja» traduce aquí el matiz de רְמִיָּה como falta de esfuerzo o de firmeza en el trabajo; también podría entenderse como «engañosa», pero el contexto sapiencial de labores favorece el sentido de negligencia.
    reason: lexical_alternative
lexical_decisions:
- source_word: רָאשׁ
  english_pob_choice: poor
  chosen_spanish: empobrece
  alternatives_spanish:
  - hace pobre
  - produce pobreza
  - vuelve pobre
  lexicon: HALOT
  rationale: El hebreo expresa un resultado causado por la acción de la mano. En español, «empobrece» reproduce con naturalidad ese valor causativo y mantiene el paralelismo con «enriquece».
- source_word: עֹשֶׂה
  english_pob_choice: makes
  chosen_spanish: empobrece
  alternatives_spanish:
  - hace
  - produce
  - causa
  lexicon: HALOT
  rationale: El participio expresa acción causativa. En esta estructura proverbial, el verbo simple en español puede integrarse en «empobrece» sin perder la relación causa-resultado que el inglés POB marcó con «makes».
- source_word: כַף
  english_pob_choice: hand
  chosen_spanish: mano
  alternatives_spanish:
  - palma
  lexicon: HALOT
  rationale: Aunque el término puede ser más específico que «mano», en este contexto sapiencial designa el instrumento del trabajo; «mano» es el equivalente natural y conserva la imagen corporal del proverbio.
- source_word: רְמִיָּה
  english_pob_choice: slack
  chosen_spanish: floja
  alternatives_spanish:
  - laxa
  - perezosa
  - descuidada
  - engañosa
  lexicon: HALOT
  rationale: El contexto laboral favorece la idea de flojedad o negligencia, no la de engaño moral. «Floja» preserva la imagen de una mano sin vigor para el trabajo y suena idiomática en español.
- source_word: יָד
  english_pob_choice: the hand
  chosen_spanish: la mano
  alternatives_spanish:
  - mano
  lexicon: HALOT
  rationale: La segunda cola repite la imagen corporal para el paralelismo antitético. «La mano» mantiene esa repetición y suena natural en español.
- source_word: חָרוּצִים
  english_pob_choice: the diligent
  chosen_spanish: los diligentes
  alternatives_spanish:
  - los industriosos
  - los trabajadores
  - los aplicados
  lexicon: HALOT
  rationale: El sustantivo/adjetivo plural describe a personas marcadas por diligencia en el trabajo. «Los diligentes» conserva la concisión proverbial y el contraste con la mano floja.
- source_word: תַּעֲשִׁיר
  english_pob_choice: makes rich
  chosen_spanish: enriquece
  alternatives_spanish:
  - hace rico
  - da riqueza
  - prospera
  lexicon: HALOT
  rationale: El verbo en hifil es causativo. «Enriquece» reproduce de modo breve y equilibrado el efecto del original y corresponde bien al paralelo antitético con «empobrece».
translation_notes:
  revision_awareness: 'El pasaje coincide sustancialmente con el sentido ya auditado en el inglés POB: una mano desidiosa produce pobreza, mientras la diligencia produce riqueza. La redacción española conserva el paralelismo antitético y la imagen corporal sin introducir explicaciones ajenas al hebreo.'
  spanish_consistency_notes:
  - Se conserva «mano» en ambos miembros para reflejar el paralelismo del hebreo.
  - Se evita «siervo» o vocabulario religioso ajeno al proverbio; el campo semántico es laboral y sapiencial.
  - «Empobrece/enriquece» mantiene la simetría resultativa del original mejor que una paráfrasis más explicativa.
