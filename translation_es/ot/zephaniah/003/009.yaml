    reason: lexical_alternative
  - marker: b
    text: YHWH es el Nombre divino. En esta serie se vierte como Yahvé.
    reason: theological_note
  - marker: c
    text: 'Hebreo literalmente: ''con un solo hombro'', un modismo para servicio unido o acción conjunta, como actuar hombro con hombro.'
    reason: lexical_alternative
  revision_rationale: 'La revisión hace dos reparaciones pequeñas pero importantes: sustituye la construcción poco idiomática ''cambiaré a los pueblos un lenguaje puro'' por ''les daré a los pueblos un habla pura'', que suena natural en español y sigue dejando abierta la tensión interpretativa; y reemplaza ''con un solo hombro'' en el texto principal por ''de común acuerdo'', preservando la imagen hebrea exacta en nota para mantener la trazabilidad exegética. Se conserva ''Yahvé'' conforme al glosario del proyecto.'
