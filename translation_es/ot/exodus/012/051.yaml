- from: Y en aquel mismo día, Yahvé sacó a los hijos de Israel de la tierra de Egipto, según sus ejércitos[a].
  to: Y en aquel mismo día, Yahvé sacó a los hijos de Israel de la tierra de Egipto según sus divisiones[a].
  rationale: Se cambió «según sus ejércitos» por «según sus divisiones» para reflejar con mayor fidelidad el sentido contextual de עַל צִבְאֹתָם y la decisión lexical documentada por el POB. Se ajustó la nota para preservar alternativas viables en español sin imponer un matiz militar excesivo.
