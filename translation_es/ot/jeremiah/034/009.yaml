    rationale: El hebreo dice que el esclavo y la esclava sean/estén 'libres'. En el borrador, 'libere' comunica la acción, pero no reproduce el estado resultante expresado por el adjetivo plural. Debe aparecer algo como 'quedaran libres' o 'en libertad'.
  - severity: medium
