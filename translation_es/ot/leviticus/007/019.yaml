translation:
  language: es
  text: Pero la carne[a] que toque cualquier cosa impura no se comerá; será quemada con fuego. Y en cuanto a la carne, todo el que esté puro podrá comer carne.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: “que entra en contacto con cualquier cosa impura”. El hebreo es amplio y se refiere a impureza ritual.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהַבָּשָׂר
  english_pob_choice: But the meat
  chosen_spanish: Pero la carne
  alternatives_spanish:
  - Y la carne
  - Ahora bien, la carne
  - la carne
  lexicon: HALOT
  rationale: בָּשָׂר en este contexto designa la carne sacrificial destinada al consumo, no “carne” en sentido antropológico. “Carne” es el equivalente natural y fiel en español; “Pero” conserva el contraste legal con el caso anterior.
- source_word: אֲשֶׁר יִגַּע בְּכָל טָמֵא
  english_pob_choice: that touches anything unclean
  chosen_spanish: que toque cualquier cosa impura
  alternatives_spanish:
  - que entre en contacto con cualquier cosa impura
  - que toque cualquier objeto impuro
  - que toque cualquier impureza
  lexicon: HALOT
  rationale: יִגַּע indica contacto físico, y כָּל טָמֵא abarca de manera amplia lo ritualmente impuro. “Cualquier cosa impura” mantiene esa amplitud sin restringirla indebidamente a personas u objetos.
- source_word: לֹא יֵאָכֵל
  english_pob_choice: must not be eaten
  chosen_spanish: no se comerá
  alternatives_spanish:
  - no debe comerse
  - no ha de comerse
  - no podrá comerse
  lexicon: HALOT
  rationale: El nifal expresa prohibición pasiva. “No se comerá” conserva el registro legal y es plenamente natural en español bíblico contemporáneo.
- source_word: בָּאֵשׁ יִשָּׂרֵף
  english_pob_choice: it must be burned with fire
  chosen_spanish: será quemada con fuego
  alternatives_spanish:
  - será quemada en el fuego
  - debe ser quemada con fuego
  - será echada al fuego y quemada
  lexicon: HALOT
  rationale: La construcción exige destrucción por fuego; “con fuego” reproduce con fidelidad la preposición hebrea y mantiene el tono formal. Se usa femenino por concordancia con “la carne”.
- source_word: וְהַבָּשָׂר
  english_pob_choice: And as for the meat
  chosen_spanish: Y en cuanto a la carne
  alternatives_spanish:
  - Y la carne
  - Pero la carne
  - En cuanto a la carne
  lexicon: HALOT
  rationale: 'La repetición del sustantivo marca un cambio de caso: de carne contaminada a carne apta para comer. “En cuanto a” refleja bien la función tópica sin añadir interpretación.'
- source_word: כָּל טָהוֹר
  english_pob_choice: anyone who is clean
  chosen_spanish: cualquiera que esté limpio
  alternatives_spanish:
  - todo el que esté limpio
  - cualquiera que sea limpio
  - todos los limpios
  lexicon: HALOT
  rationale: El adjetivo funciona sustantivamente para personas en estado ritual de limpieza. “Cualquiera que esté limpio” es inclusivo y mantiene la condición ritual, no moral.
- source_word: יֹאכַל בָּשָׂר
  english_pob_choice: may eat meat
  chosen_spanish: podrá comer carne
  alternatives_spanish:
  - puede comer carne
  - comerá carne
  - tiene permiso para comer carne
  lexicon: HALOT
  rationale: La forma verbal expresa permiso o habilitación; “podrá” lo comunica con claridad sin convertirlo en mandato. Repetir “carne” en español es natural y evita ambigüedad.
theological_decisions:
- issue: טָמֵא / טָהוֹר como categorías rituales
  english_pob_reading: Render as 'unclean' / 'clean' in ritual terms without importing moral categories.
  chosen_spanish_reading: “impura” / “limpio” en sentido ritual, sin cargar la expresión de moralidad.
  alternative_spanish_readings:
  - inmunda / pura
  - impura / pura
  - contaminada / limpia
  rationale: En la ley sacrificial, estos términos señalan estado ritual y aptitud para el culto. “Impura” y “limpio” comunican bien esa oposición en español, pero se evita convertirla en juicio ético; la nota mantiene esa tensión.
  doctrine_reference: 'Levítico 7:19; traducción POB: preservar el contraste cultual sin resolverlo teológicamente.'
translation_notes:
  revision_awareness: 'Se siguió el estado de revisión más reciente del contexto inglés: se mantuvo “with fire” como “con fuego” por mayor correspondencia preposicional y registro formal. La solución española conserva la estructura legal del versículo y la alternancia entre carne contaminada y carne apta para comer.'
  spanish_consistency_notes:
  - Se usó “carne” para בָּשָׂר en ambos casos, conforme al contexto de alimento sacrificial.
  - Se mantuvo la distinción ritual entre “impura” y “limpio” sin moralizarla.
  - La voz pasiva refleja “no se comerá / será quemada” preserva el tono jurídico del hebreo.
  - “En cuanto a la carne” reproduce la transición topical del segundo miembro sin añadir palabras de interpretación.
