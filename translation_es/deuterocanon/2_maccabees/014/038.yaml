translation:
  language: es
  text: Pues en tiempos anteriores[a], cuando se estaba juzgando la separación, había sido acusado por el judaísmo[b], y había arriesgado cuerpo y alma por el judaísmo con todo empeño.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «cuando se estaba ventilando un caso sobre separación/no asociación». La expresión griega está condensada y probablemente alude a un contexto judicial.'
    reason: lexical_alternative
  - marker: b
    text: «Judaísmo» aquí no se limita a una religión abstracta, sino que refiere a la identidad y práctica judías ancestrales bajo presión.
    reason: cultural_note
lexical_decisions:
- source_word: ἐν τοῖς ἔμπροσθεν χρόνοις
  english_pob_choice: in earlier times
  chosen_spanish: en tiempos anteriores
  alternatives_spanish:
  - en tiempos pasados
  - en tiempos de antes
  lexicon: LSJ
  rationale: La expresión temporal se vierte de modo natural en español y conserva el retroceso histórico sin sonar arcaica.
- source_word: τῆς ἀμιξίας
  english_pob_choice: separation
  chosen_spanish: la separación
  alternatives_spanish:
  - la no asociación
  - el apartamiento
  lexicon: LSJ
  rationale: ‘Separación’ mantiene la idea de no mezclarse o mantenerse aparte, y permite una lectura social/judicial acorde con el contexto.
- source_word: κρίσις
  english_pob_choice: being judged
  chosen_spanish: se estaba juzgando
  alternatives_spanish:
  - se estaba ventilando el caso
  - se estaba llevando a juicio
  lexicon: LSJ
  rationale: El griego sugiere un marco judicial o de acusación; la forma impersonal refleja que el asunto estaba bajo juicio sin forzar demasiado la frase.
- source_word: εἰσενηνεγμένος
  english_pob_choice: had come under accusation
  chosen_spanish: había sido acusado
  alternatives_spanish:
  - había sido llevado ante juicio
  - había sido presentado como acusado
  lexicon: LSJ
  rationale: Aunque el participio puede sugerir ‘ser traído ante juicio’, en español ‘haber sido acusado’ expresa con naturalidad el resultado judicial que el contexto exige.
- source_word: Ἰουδαισμοῦ
  english_pob_choice: Judaism
  chosen_spanish: el judaísmo
  alternatives_spanish:
  - la vida judía
  - la religión judía
  lexicon: LSJ
  rationale: Se conserva el cognado ‘judaísmo’, que en este contexto histórico incluye identidad y práctica ancestral bajo presión, no solo una religión abstracta.
- source_word: σῶμα καὶ ψυχὴν
  english_pob_choice: both body and soul
  chosen_spanish: cuerpo y alma
  alternatives_spanish:
  - cuerpo y vida
  - todo su ser
  lexicon: LSJ
  rationale: La pareja antropológica griega se mantiene de forma literal, preservando la intensidad total del riesgo asumido.
- source_word: ὑπὲρ τοῦ Ἰουδαισμοῦ
  english_pob_choice: for Judaism
  chosen_spanish: por el judaísmo
  alternatives_spanish:
  - en defensa del judaísmo
  - a favor del judaísmo
  lexicon: LSJ
  rationale: ‘Por’ transmite la idea de compromiso y causa defendida; es la equivalencia más directa y natural en español.
- source_word: παραβεβλημένος
  english_pob_choice: had risked
  chosen_spanish: había arriesgado
  alternatives_spanish:
  - se había expuesto
  - había aventurado
  lexicon: LSJ
  rationale: El participio expresa exponerse al peligro; ‘había arriesgado’ reproduce bien esa fuerza en español.
- source_word: μετὰ πάσης ἐκτενίας
  english_pob_choice: with all earnestness
  chosen_spanish: con toda diligencia
  alternatives_spanish:
  - con todo empeño
  - con toda entrega
  lexicon: LSJ
  rationale: La frase denota intensidad y esfuerzo completo; ‘con toda diligencia’ comunica empeño serio y constante sin añadir matices ajenos al texto.
theological_decisions:
- issue: Sentido de Ἰουδαισμός en un contexto del Segundo Templo
  english_pob_reading: Judaism refers not merely to abstract religion but to Jewish ancestral identity and practice under pressure.
  chosen_spanish_reading: ‘Judaísmo’ se conserva como término histórico que incluye identidad ancestral, práctica y lealtad comunitaria bajo presión.
  alternative_spanish_readings:
  - ‘la vida judía’
  - ‘la religión judía’
  rationale: El cognado español preserva la tensión histórica del término griego y evita reducirlo solo a religión o solo a etnicidad.
  doctrine_reference: Translation philosophy §1, §5
- issue: Marco judicial implícito en κρίσις εἰσενηνεγμένος
  english_pob_reading: the phrase is compressed and likely reflects a judicial setting; 'had come under accusation' better reflects being brought into judgment.
  chosen_spanish_reading: ‘se estaba juzgando la separación’ y ‘había sido acusado’ reflejan un proceso judicial implícito sin explicitar más de la cuenta.
  alternative_spanish_readings:
  - ‘cuando se ventilaba un caso sobre separación’
  - ‘cuando la separación estaba en juicio’
  rationale: La combinación española conserva la ambigüedad comprimida del griego entre ‘juicio’ y ‘acusación’, sin perder el sentido forense reconocido en la auditoría inglesa.
  doctrine_reference: Translation philosophy §1, §5
translation_notes:
  revision_awareness: La redacción sigue la revisión inglesa más reciente al reflejar una acusación o proceso judicial implícito en κρίσις εἰσενηνεγμένος, evitando la formulación anterior más literal de ‘haber sido traído’ y manteniendo el resto del versículo alineado con el sentido del griego de Swete.
  spanish_consistency_notes:
  - Se mantiene ‘judaísmo’ como cognado técnico para Ἰουδαισμός, coherente con el uso auditado en inglés.
  - ‘Separation’ se traduce como ‘separación’ para conservar el campo semántico de no mezcla/no asociación.
  - ‘Cuerpo y alma’ preserva la pareja antropológica del griego y evita suavizarla a ‘vida’ o ‘ser’ sin necesidad.
  - El tono general es formal pero natural para lectura eclesial en español.
