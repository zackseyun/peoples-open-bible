lexical_decisions:
- source_word: ἑτέρα
  english_pob_choice: another
  chosen_spanish: otra
  alternatives_spanish:
  - otra mujer
  - una segunda
  lexicon: LSJ
  rationale: El femenino singular indica una acompañante adicional. En español, «otra» reproduce con naturalidad esa referencia sin añadir información que el griego no da.
- source_word: ἐπηκολούθει
  english_pob_choice: followed
  chosen_spanish: la seguía
  alternatives_spanish:
  - seguía
  - acompañaba
  lexicon: LSJ
  rationale: El imperfecto expresa acción continua de acompañamiento. «La seguía» conserva esa continuidad y encaja bien con la escena.
- source_word: κουφίζουσα
  english_pob_choice: easing
  chosen_spanish: aliviando
  alternatives_spanish:
  - aligerando
  - aliviando la carga
  - haciendo más liviana
  lexicon: LSJ
  rationale: El participio sugiere quitar peso o carga. En español, «aliviando» comunica bien esa idea y evita una calca torpe; conserva la imagen de reducir la pesadez de la ropa.
- source_word: τὴν ἔνδυσιν
  english_pob_choice: clothing
  chosen_spanish: su vestidura
  alternatives_spanish:
  - su ropa
  - su vestido
  - su atuendo
  lexicon: LSJ
  rationale: ἔνδυσις puede ser «vestidura», «ropa» o «atuendo». «Vestidura» mantiene mejor el matiz singular colectivo y el tono elevado del pasaje, sin apartarse del sentido básico de la prenda que llevaba.
- source_word: αὐτῆς
  english_pob_choice: her
  chosen_spanish: su
  alternatives_spanish:
  - de ella
  lexicon: LSJ
  rationale: El posesivo se integra naturalmente en «su vestidura». El referente contextual es Esther, pero el griego solo dice «su».
- source_word: καὶ αὐτὴ
  english_pob_choice: and she
  chosen_spanish: y ella
  alternatives_spanish:
  - y ella misma
  lexicon: LSJ
  rationale: El segmento griego queda incompleto en esta porción del versículo. «Y ella» preserva esa apertura sin suplir palabras ausentes.
translation_notes:
  revision_awareness: La versión inglesa auditada pasó de «lightening her clothing» a «easing her clothing» para sonar más natural. La traducción española sigue esa revisión con «aliviando», que conserva la idea de reducir la carga de la vestidura sin forzar un calco.
  spanish_consistency_notes:
  - Se conserva «Yahvé» como norma general del proyecto, pero este versículo no contiene el nombre divino.
  - Se evita «Cristo» porque no hay lenguaje mesiánico en este fragmento.
  - Se mantiene un registro digno y bíblico, pero sin arcaísmos innecesarios.
  - La fragmentariedad del final se conserva deliberadamente para respetar el corte del texto fuente.
