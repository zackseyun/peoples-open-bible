translation:
  language: es
  text: Y que los hijos[a] de Israel guarden la Pascua en su tiempo señalado.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'los israelitas'; tradicionalmente, 'los hijos de Israel'. El hebreo dice literalmente 'los hijos de Israel'.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְיַעֲשׂוּ
  english_pob_choice: Let ... keep
  chosen_spanish: Y ... celebren
  alternatives_spanish:
  - Y ... observen
  - Y ... guarden
  - Y ... hagan
  lexicon: HALOT
  rationale: El verbo עשה con פֶּסַח tiene valor idiomático de celebrar/observar la Pascua, no solo de “hacer”. En español, “celebren” comunica la acción ritual de manera natural y conserva el sentido de cumplimiento cultual. El waw inicial se refleja con “Y”.
- source_word: בְנֵי יִשְׂרָאֵל
  english_pob_choice: the sons of Israel
  chosen_spanish: los hijos de Israel
  alternatives_spanish:
  - los hijos de Israel
  - los israelitas
  - los hijos de Jacob
  lexicon: HALOT
  rationale: Se conserva la expresión familiar literal del hebreo. “Hijos de Israel” es transparente y fiel al valor formal de בְנֵי יִשְׂרָאֵל; “israelitas” sería más idiomático pero menos cercano a la forma hebrea documentada por la POB inglesa.
- source_word: הַפָּסַח
  english_pob_choice: the Passover
  chosen_spanish: la Pascua
  alternatives_spanish:
  - la Pascua
  - el Pascua
  - el sacrificio de la Pascua
  - la celebración de la Pascua
  lexicon: HALOT
  rationale: En este contexto, פֶּסַח designa la observancia pascual como unidad ritual; “la Pascua” es la forma natural en español y no restringe indebidamente el sentido a solo el sacrificio o solo la fiesta.
- source_word: בְּמוֹעֲדוֹ
  english_pob_choice: at its appointed time
  chosen_spanish: en su tiempo señalado
  alternatives_spanish:
  - en su tiempo fijado
  - en su tiempo determinado
  - en el tiempo señalado
  lexicon: HALOT
  rationale: מוֹעֵד expresa un tiempo fijado o designado. “En su tiempo señalado” preserva el matiz calendárico y el posesivo referido a la Pascua, como en la lectura inglesa auditada.
translation_notes:
  revision_awareness: La versión inglesa fue revisada para añadir la conjunción inicial “And” a fin de reflejar el waw del hebreo; la redacción española también inicia con “Y” para mantener ese enlace sintáctico. No hay otras variantes textuales o teológicas relevantes en este versículo.
  spanish_consistency_notes:
  - Se evita el calco rígido “hacer la Pascua” porque en español suena menos natural que “celebrar la Pascua” y no añade fidelidad semántica en este contexto.
  - Se mantiene “hijos de Israel” por coherencia con la forma hebrea literal y con la decisión auditada de la POB inglesa de conservar la estructura filial.
  - No se usa “SEÑOR” ni terminología sustituta porque este versículo no contiene el nombre divino.
