translation:
  language: es
  text: 'Y dijeron a Moisés[a]: «¿Fue porque no había sepulcros en Egipto que nos llevaste para morir en el desierto? ¿Qué es esto que nos has hecho al sacarnos de Egipto?»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más formalmente: «¿Fue por falta de sepulcros en Egipto que nos llevaste para morir en el desierto?»'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמְרוּ
  english_pob_choice: And they said
  chosen_spanish: Y dijeron
  alternatives_spanish:
  - Y hablaron
  lexicon: HALOT
  rationale: El wayyiqtol narrativo de אמר introduce discurso directo; en español, «dijeron» reproduce de manera natural la función narrativa básica sin añadir matices no presentes en el hebreo.
- source_word: אֶל מֹשֶׁה
  english_pob_choice: to Moses
  chosen_spanish: a Moisés
  alternatives_spanish:
  - a Moshe
  lexicon: HALOT
  rationale: אֶל marca dirección del habla; en español, la preposición natural es «a». Se usa «Moisés» por convención traductora hispana, equivalente funcional del nombre propio.
- source_word: הֲמִבְּלִי אֵין קְבָרִים בְּמִצְרַיִם
  english_pob_choice: Was it because there were no graves in Egypt
  chosen_spanish: ¿Fue porque no había sepulcros en Egipto
  alternatives_spanish:
  - ¿Es por falta de sepulcros en Egipto
  - ¿Fue por no haber sepulcros en Egipto
  lexicon: HALOT
  rationale: La expresión interrogativa irónica se vierte con una pregunta retórica natural en español. «Sepulcros» conserva la referencia a tumbas/graves; «sepulcros» funciona bien en registro bíblico sin sonar arcaizante.
- source_word: לְקַחְתָּנוּ
  english_pob_choice: that you took us away
  chosen_spanish: que nos tomaste
  alternatives_spanish:
  - que nos llevaste
  - que nos sacaste
  lexicon: HALOT
  rationale: לקח significa «tomar»; se conserva el verbo base para no diluir la acusación. En contexto, el complemento posterior «para morir en el desierto» ya expresa el desplazamiento lejos de Egipto.
- source_word: לָמוּת
  english_pob_choice: to die
  chosen_spanish: para morir
  alternatives_spanish:
  - a morir
  - a fin de morir
  lexicon: HALOT
  rationale: El infinitivo de propósito se expresa con «para morir», una construcción natural y clara en español.
- source_word: בַּמִּדְבָּר
  english_pob_choice: in the wilderness
  chosen_spanish: en el desierto
  alternatives_spanish:
  - en el desierto salvaje
  - en el yermo
  lexicon: HALOT
  rationale: מִדְבָּר puede ser «desierto» o «desierto/tierras desoladas». Aquí «desierto» es claro y idiomático en español; no se fuerza «wilderness» si no añade precisión necesaria para el lector hispano.
- source_word: מַה זֹּאת עָשִׂיתָ לָּנוּ
  english_pob_choice: What is this you have done to us
  chosen_spanish: ¿Qué es esto que nos has hecho
  alternatives_spanish:
  - ¿Qué has hecho con nosotros
  - ¿Por qué nos has hecho esto
  lexicon: HALOT
  rationale: 'Se conserva la estructura exclamativa/interrogativa de fuerte reproche: «¿Qué es esto que nos has hecho?». Es más cercana al hebreo que una reformulación causal como «¿Por qué...?». '
- source_word: לְהוֹצִיאָנוּ מִמִּצְרָיִם
  english_pob_choice: by bringing us out of Egypt
  chosen_spanish: al sacarnos de Egipto
  alternatives_spanish:
  - por sacarnos de Egipto
  - para sacarnos de Egipto
  lexicon: HALOT
  rationale: הוֹצִיא es «sacar/traer fuera». «Al sacarnos» refleja bien la construcción de infinitivo con sentido circunstancial y mantiene el vínculo con el éxodo sin sobreexplicar.
translation_notes:
  revision_awareness: Se incorporó la alternativa formal documentada en el audit trail inglés para הֲמִבְּלִי אֵין קְבָרִים, pero se prefirió una formulación más natural en español («¿Fue porque no había sepulcros en Egipto...?») que conserva la ironía del reproche. La nota a pie de página ofrece la redacción más formal paralela al inglés POB.
  spanish_consistency_notes:
  - Se mantiene la distinción entre לקח («tomar») y הוציא («sacar») para no borrar la diferencia lexical que el texto hebreo explota.
  - «Egipto» y «desierto» siguen la terminología bíblica estándar y coherente con Exodus.
  - El marcador [a] aparece exactamente en el lugar correspondiente del texto principal para anclar la nota alternativa.
