lexical_decisions:
- source_word: מִן
  english_pob_choice: From
  chosen_spanish: De entre
  alternatives_spanish:
  - De
  - Desde
  lexicon: HALOT
  rationale: El hebreo introduce el origen o procedencia del contingente tribal. En español, 'De entre' comunica de forma natural la idea de extracción dentro de un grupo sin perder el matiz de procedencia del original.
- source_word: בְּנֵי שִׁמְעֹון
  english_pob_choice: the sons of Simeon
  chosen_spanish: los hijos de Simeón
  alternatives_spanish:
  - los descendientes de Simeón
  - los simeonitas
  lexicon: HALOT
  rationale: Se conserva la expresión de parentesco del hebreo de manera transparente. 'Hijos' refleja directamente בְּנֵי, y 'Simeón' mantiene el nombre propio bíblico de forma natural en español.
- source_word: גִּבּוֹרֵי חַיִל
  english_pob_choice: mighty men of valor
  chosen_spanish: guerreros valerosos
  alternatives_spanish:
  - hombres poderosos de valor
  - hombres valientes
  - hombres de valor
  lexicon: HALOT
  rationale: La expresión hebrea es un modismo militar para combatientes capaces y valientes. 'Guerreros valerosos' mantiene el sentido bélico y la cualidad de valor, con un español más fluido que una calca como 'poderosos de valor'.
- source_word: לַצָּבָא
  english_pob_choice: for the army
  chosen_spanish: para el ejército
  alternatives_spanish:
  - para la guerra
  - para el servicio militar
  - para la batalla
  lexicon: HALOT
  rationale: El sustantivo צָבָא en este contexto apunta a función o asignación militar. 'Ejército' es el equivalente más claro y digno en español contemporáneo; conserva la referencia institucional del contingente.
- source_word: שִׁבְעַת אֲלָפִים וּמֵאָה
  english_pob_choice: 7,100
  chosen_spanish: siete mil cien
  alternatives_spanish:
  - '7.100'
  - 7,100
  lexicon: HALOT
  rationale: Se mantiene el valor exacto del número en forma escrita para una lectura bíblica más natural en español. La cifra queda inequívoca sin depender de la convención tipográfica de separadores.
translation_notes:
  revision_awareness: El inglés POB quedó sin notas y con acuerdo alto; la versión española sigue de cerca la estructura y el sentido del hebreo sin introducir interpretaciones adicionales.
  spanish_consistency_notes:
  - Se mantiene la nomenclatura bíblica 'Simeón' en vez de una forma abreviada o etnónima para respetar la transparencia del original.
  - Se eligió 'ejército' sobre 'guerra' o 'batalla' porque el hebreo aquí señala el ámbito o función militar del contingente, no el conflicto como tal.
  - La cifra se expresa con palabras para favorecer la lectura litúrgica o devocional, manteniendo exactamente el total de 7,100.
