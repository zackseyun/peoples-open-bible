revisions:
- from: ¿Puedes poner una cuerda[a] por su nariz, o perforarle la quijada con un garfio?
  to: ¿Puedes poner una cuerda[a] por su nariz, o perforar su quijada[b] con un gancho?
  rationale: Se ajusta levemente el español para mayor naturalidad y legibilidad general («perforar su quijada», «gancho») y se añade la nota faltante para la alternativa léxica de לֶחֱיוֹ, preservando así el audit trail del POB inglés sin alterar el sentido base del versículo.
