base_translation:
  language: en
  yaml_path: translation/ot/2_samuel/003/014.yaml
  text: Then David sent messengers to Ish-bosheth son of Saul[a], saying, “Give me my wife Michal[b], whom I betrothed to myself for a hundred Philistine foreskins.”
  footnotes:
  - marker: a
    text: Or, more idiomatically, “whom I won as my wife for a hundred Philistine foreskins.” The Hebrew more literally says, “whom I betrothed to myself.”
    reason: lexical_alternative
  - marker: b
    text: See 1 Samuel 18:25–27 for the account of David obtaining Michal by presenting Philistine foreskins as the bride-price Saul demanded.
    reason: cross_reference
