translation:
  language: es
  text: ¿Por qué te destruyes irracionalmente con estos males[a], Eleazar?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «por estos males», si el dativo expresa medio o circunstancia; en contexto se refiere a los padecimientos que se le infligen a Eleazar.
    reason: lexical_alternative
lexical_decisions:
- source_word: Τί
  english_pob_choice: Why
  chosen_spanish: ¿Por qué
  alternatives_spanish:
  - ¿Qué
  lexicon: LSJ
  rationale: En esta reprensión interrogativa, τί expresa motivo o razón, no un objeto. «¿Por qué» comunica mejor la fuerza idiomática en español.
- source_word: τοῖς κακοῖς τούτοις
  english_pob_choice: with these evils
  chosen_spanish: con estos males
  alternatives_spanish:
  - por estos males
  - con estos sufrimientos
  - por estas calamidades
  lexicon: LSJ
  rationale: El dativo plural con κακοῖς puede indicar medio o circunstancia; «con estos males» conserva la cercanía formal de la cláusula y mantiene la amplitud semántica de κακά sin concretar indebidamente a «torturas».
- source_word: σεαυτόν
  english_pob_choice: yourself
  chosen_spanish: te
  alternatives_spanish:
  - a ti mismo
  lexicon: LSJ
  rationale: Es el objeto reflexivo directo de ἀπόλλυες. En español, el clítico «te» resulta natural y fiel a la construcción reflexiva.
- source_word: ἀλογίστως
  english_pob_choice: irrationally
  chosen_spanish: irracionalmente
  alternatives_spanish:
  - sin pensar
  - sin razón
  - insensatamente
  lexicon: LSJ
  rationale: El adverbio señala actuar sin razón o sin cálculo. «Irracionalmente» preserva el enlace con el tema del libro sobre razón frente a pasión.
- source_word: ἀπόλλυες
  english_pob_choice: are ... destroying
  chosen_spanish: te destruyes
  alternatives_spanish:
  - te arruinas
  - te pierdes
  - te aniquilas
  lexicon: LSJ
  rationale: El presente activo expresa una autodestrucción en curso. «Te destruyes» conserva la fuerza del verbo y la construcción reflexiva en español.
- source_word: Ἐλεάζαρ
  english_pob_choice: Eleazar
  chosen_spanish: Eleazar
  lexicon: transliteration policy
  rationale: Nombre propio transliterado de acuerdo con la política del proyecto.
theological_decisions:
- issue: Sentido de κακοῖς en el contexto del martirio de Eleazar
  english_pob_reading: Rendered broadly as 'evils' rather than more interpretive 'tortures.'
  chosen_spanish_reading: Traducido ampliamente como «males», no como «torturas» en el texto principal.
  alternative_spanish_readings:
  - torturas
  - sufrimientos
  - castigos
  rationale: El sustantivo griego es más amplio que un término técnico para tortura. Dado que el hablante se refiere al trato doloroso que Eleazar está padeciendo, «males» deja visible la amplitud del original y evita añadir precisión interpretativa al texto principal.
  doctrine_reference: Principio de primacía del original; no parafrasear más allá de lo que el texto exige.
translation_notes:
  revision_awareness: 'Coincide con la última pasada revisada: el texto fuente griego y el audit trail inglés muestran alto acuerdo y no requieren enmiendas sustantivas.'
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando aparece el nombre divino; aquí no aplica.
  - Se mantiene «males» para κακοῖς por fidelidad formal, con nota que preserva la alternativa de medio/circunstancia.
  - Se conserva un español moderno y digno, sin calcos innecesarios ni registro arcaizante.
