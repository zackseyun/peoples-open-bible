translation:
  language: es
  text: La lengua del justo es plata fina[a]; el corazón de los impíos es de poco valor.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'También puede entenderse: «plata selecta» o «plata escogida»; el hebreo נִבְחָר destaca la alta calidad del metal.'
    reason: lexical_alternative
lexical_decisions:
- source_word: כֶּסֶף
  english_pob_choice: silver
  chosen_spanish: plata
  alternatives_spanish:
  - dinero
  - metal precioso
  lexicon: HALOT
  rationale: En este proverbio el sustantivo funciona como imagen de valor. «Plata» preserva la metáfora concreta mejor que «dinero» y corresponde al valor estimativo del paralelo hebreo.
- source_word: נִבְחָר
  english_pob_choice: choice
  chosen_spanish: escogida
  alternatives_spanish:
  - seleccionada
  - refinada
  - de calidad
  lexicon: HALOT
  rationale: El participio expresa algo de alta calidad o selecto. «Escogida» transmite bien esa cualidad en español y mantiene el tono elogioso aplicado al metal.
- source_word: לְשׁוֹן
  english_pob_choice: tongue
  chosen_spanish: lengua
  alternatives_spanish:
  - habla
  - palabras
  - boca
  lexicon: HALOT
  rationale: La metáfora corporal debe conservarse. «Lengua» es el equivalente natural en español y mantiene la concreción proverbial del hebreo.
- source_word: צַדִּיק
  english_pob_choice: the righteous
  chosen_spanish: del justo
  alternatives_spanish:
  - del justo hombre
  - de los justos
  - del recto
  lexicon: HALOT
  rationale: El adjetivo funciona sustantivamente. En español, el singular genérico «el justo» reproduce bien la categoría moral sin forzar pluralización ni masculinidad individual innecesaria.
- source_word: לֵב
  english_pob_choice: heart
  chosen_spanish: corazón
  alternatives_spanish:
  - mente
  - interior
  - pensamiento
  lexicon: HALOT
  rationale: «Corazón» es la equivalencia normal y conserva en español el alcance hebreo de centro de pensamiento y voluntad, además de equilibrar el paralelismo con «lengua».
- source_word: רְשָׁעִים
  english_pob_choice: the wicked
  chosen_spanish: los impíos
  alternatives_spanish:
  - los malvados
  - los perversos
  - los malhechores
  lexicon: HALOT
  rationale: El plural sustantivado designa una clase moral. «Impíos» es una opción bíblica clara en español y refleja la oposición ética del proverbio sin ampliar el sentido.
- source_word: כִּמְעָט
  english_pob_choice: of little worth
  chosen_spanish: vale poco
  alternatives_spanish:
  - es de poco valor
  - vale muy poco
  - no vale casi nada
  lexicon: HALOT
  rationale: La expresión hebrea es concisa y puede indicar escaso valor o casi nada. «Vale poco» comunica de forma natural la evaluación negativa sin exagerar hacia la nulidad absoluta.
translation_notes:
  revision_awareness: La base inglesa pasó de «is worth little» a «is of little worth» para sonar más formal sin cambiar el sentido. En español se decidió una formulación breve y idiomática («vale poco») que conserva el valor mínimo del hebreo כִּמְעָט. La imagen de «choice silver» se mantuvo como «plata escogida» para retener la metáfora material.
  spanish_consistency_notes:
  - Se mantuvo el paralelismo concreto lengua/corazón del hebreo.
  - Se evitó «SEÑOR» o cualquier terminología no pertinente; no hay Tetragrámaton en el versículo.
  - «Impíos» se eligió como equivalente colectivo de רְשָׁעִים, coherente con el registro bíblico en español.
  - La valoración del segundo hemistiquio se dejó en una forma idiomática breve para no sobreexplicar el hebreo conciso.
