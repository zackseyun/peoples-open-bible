  yaml_path: translation/ot/zechariah/012/004.yaml
  text: On that day[a], declares Yahweh, I will strike every horse with panic, and its rider with madness. But over the house of Judah I will keep my eyes open[b], and I will strike every horse of the peoples with blindness.
