base_translation:
  language: en
  yaml_path: translation/ot/proverbs/005/020.yaml
  text: Why[a], my son[b], should you go astray with a strange woman and embrace the bosom of a foreign woman?
  footnotes:
  - marker: a
    text: Or 'strange woman.' The Hebrew term refers to a woman outside proper covenantal or marital bounds; the sense here is moral and relational, not merely unusual.
    reason: lexical_alternative
  - marker: b
    text: Or 'the lap of a foreign woman.' 'Bosom' renders a Hebrew term for the chest or lap in an intimate embrace.
    reason: lexical_alternative
