revisions:
- from: Pero si no lo acechó[a], y Yahvé hizo que le sobreviniera por su mano, yo te señalaré un lugar adonde pueda huir.
  to: Pero si no estuvo al acecho[a], y Dios hizo que cayera en su mano, entonces yo te señalaré un lugar adonde pueda huir.
  rationale: Se corrigió «Yahvé» a «Dios» para reflejar fielmente אֱלֹהִים en el texto fuente. Se reemplazó «no lo acechó» por «no estuvo al acecho» para evitar un objeto añadido y expresar mejor la falta de premeditación. Se revisó «hizo que le sobreviniera por su mano» a «hizo que cayera en su mano», que conserva mejor el modismo hebreo con español más natural y claro. La nota al pie se ajustó para reflejar estas correcciones.
