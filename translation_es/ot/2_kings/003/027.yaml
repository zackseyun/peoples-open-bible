base_translation:
  language: en
  yaml_path: translation/ot/2_kings/003/027.yaml
  text: Then he took his firstborn son[a], who was to reign in his place, and offered him up as a burnt offering on the wall. And there came great wrath against Israel, so they withdrew from him and returned to their land.
  footnotes:
