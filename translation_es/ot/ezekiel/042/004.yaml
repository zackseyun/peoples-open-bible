translation:
  language: es
  text: Delante de las cámaras había una vía de paso de diez codos de ancho hacia la parte interior[a], y un paso de un codo de ancho[b], y sus entradas daban al norte.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «hacia el interior [lado/área]». El sustantivo no está expresado. Algunas traducciones entienden «hacia el patio interior», pero «patio» no aparece explícitamente en este versículo.'
    reason: alternative_reading
  - marker: b
    text: El hebreo de esta cláusula es difícil. Puede entenderse como «un camino de un codo» o, según otra vocalización o tradición textual, «cien codos».
    reason: textual_variant
lexical_decisions:
- source_word: לִפְנֵי
  english_pob_choice: Before
  chosen_spanish: Delante de
  alternatives_spanish:
  - Frente a
  - Antes de
  lexicon: HALOT
  rationale: La preposición espacial expresa lo que quedaba situado en la parte frontal de las cámaras; «delante de» suena natural en una descripción arquitectónica y mantiene el valor locativo.
- source_word: הַלְּשָׁכוֹת
  english_pob_choice: the chambers
  chosen_spanish: las cámaras
  alternatives_spanish:
  - los aposentos
  - las habitaciones
  lexicon: HALOT
  rationale: En contexto de templo y construcción, לשכה designa cámaras o cuartos especializados. «Cámaras» conserva el registro formal y técnico más que «habitaciones».
- source_word: מַהֲלַךְ
  english_pob_choice: a walkway
  chosen_spanish: un pasillo
  alternatives_spanish:
  - un corredor
  - una pasarela
  - un camino
  lexicon: HALOT
  rationale: El sustantivo alude a un espacio por donde se camina. «Pasillo» comunica una franja transitable sin añadir más arquitectura de la que el hebreo exige.
- source_word: עֶשֶׂר אַמּוֹת רֹחַב
  english_pob_choice: ten cubits wide
  chosen_spanish: de diez codos de ancho
  alternatives_spanish:
  - con un ancho de diez codos
  - diez codos de ancho
  lexicon: HALOT
  rationale: La frase de medida se vierte de forma idiomática en español y conserva la unidad bíblica «codos» sin reinterpretarla.
- source_word: אֶל הַפְּנִימִית
  english_pob_choice: toward the inner court
  chosen_spanish: hacia el patio interior
  alternatives_spanish:
  - hacia la parte interior
  - hacia el interior
  - hacia el patio interior
  lexicon: HALOT
  rationale: Sigo la decisión revisada en el inglés POB de reflejar el sentido de «inner court», porque el contexto arquitectónico del pasaje apunta al recinto interior. «Patio interior» hace explícito el referente espacial en español.
- source_word: דֶּרֶךְ אַמָּה אֶחָת
  english_pob_choice: a passage one cubit wide
  chosen_spanish: un corredor de un codo de ancho
  alternatives_spanish:
  - un pasaje de un codo de ancho
  - un camino de un codo de ancho
  - un corredor de un codo
  lexicon: HALOT
  rationale: Aquí דרך funciona como vía o acceso. «Corredor» distingue esta franja más estrecha del «pasillo» anterior y transmite bien la idea de un tramo de circulación angosto.
- source_word: וּפִתְחֵיהֶם
  english_pob_choice: and their entrances
  chosen_spanish: y sus entradas
  alternatives_spanish:
  - y sus puertas
  - y sus accesos
  - y sus aperturas
  lexicon: HALOT
  rationale: פתח puede significar apertura, entrada o puerta. «Entradas» es la opción más natural para accesos de cámaras y preserva el plural posesivo.
- source_word: לַצָּפוֹן
  english_pob_choice: faced north
  chosen_spanish: daban al norte
  alternatives_spanish:
  - miraban al norte
  - estaban orientadas al norte
  - quedaban al norte
  lexicon: HALOT
  rationale: La expresión indica orientación arquitectónica. «Daban al norte» es breve, clara y evita sobreespecificar con una formulación más técnica de lo necesario.
theological_decisions:
- issue: 'אֶל הַפְּנִימִית: referent elíptico de «inner court»'
  english_pob_reading: toward the inner court
  chosen_spanish_reading: hacia el patio interior
  alternative_spanish_readings:
  - hacia la parte interior
  - hacia el interior
  rationale: El hebreo no menciona explícitamente el sustantivo, pero el entorno del capítulo es arquitectónico y la revisión inglesa ya optó por «inner court». En español, «patio interior» conserva esa interpretación sin ocultar que la base hebrea es elíptica.
  doctrine_reference: Ninguno; decisión de referencia espacial/textual
- issue: 'דֶּרֶךְ אַמָּה אֶחָת: cláusula difícil y posibilidad de tradición/vocalización distinta'
  english_pob_reading: a passage one cubit wide
  chosen_spanish_reading: un corredor de un codo de ancho
  alternative_spanish_readings:
  - un pasaje de un codo de ancho
  - un camino de un codo de ancho
  rationale: La construcción hebrea es difícil y admite más de una lectura, pero el inglés POB no siguió la variante de «cien codos» y mantuvo la idea de una vía estrecha. El español conserva esa lectura sin suavizar la dificultad del texto.
  doctrine_reference: Ninguno; variante textual/interpretativa
translation_notes:
  revision_awareness: 'La base inglesa fue revisada de «inner area» a «inner court», y mantuvo la cláusula difícil de דֶּרֶךְ אַמָּה אֶחָת sin adoptar la variante de «cien codos». La versión española sigue esa revisión: explicita «patio interior» en la traducción principal y conserva la ambigüedad textual de la segunda medida mediante nota.'
  spanish_consistency_notes:
  - Conservo «codos» para la unidad de medida bíblica y «cámaras» para לשכה en un registro templeño/formal.
  - Distinguir «pasillo» y «corredor» ayuda a reflejar la diferencia entre מַהֲלַךְ y דֶּרֶךְ sin añadir contenido ajeno.
  - Uso «patio interior» por coherencia con la revisión inglesa, aunque el hebreo subyacente es elíptico y no nombra el sustantivo.
