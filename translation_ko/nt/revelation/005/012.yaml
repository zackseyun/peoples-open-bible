  rationale: 이 송영의 일곱 항목은 어린 양의 완전한 합당성을 신학적으로 가리키는 구조적 형식이다. 한국어로도 항목 수와 순서를 그대로 보존하여 본문 형식의 무게를 살린다.
  doctrine_reference: 'DOCTRINE.md: 송영 형식 보존'
