    text: El hebreo dice literalmente algo como «la vida de מכי מתן»; la expresión es difícil, pero el paralelo griego aclara el sentido como vivir de mendigar o de buscar limosna.
    reason: lexical_alternative
  - marker: b
    text: 'El hebreo «ser reunido» es un modismo para la muerte; compárese el paralelo griego, que expresa el sentido explícitamente: «morir».'
    reason: alternative_reading
  revision_rationale: 'Se conserva el sentido y el buen registro del borrador, pero se corrigen las notas para reflejar el expediente auditado y el verdadero punto de dificultad del hebreo. También se hace un pequeño ajuste de naturalidad en español: ''la vida de un mendigo''.'
