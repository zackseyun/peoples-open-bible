translation:
  text: Pain and sleepless wandering[a], and retching and choking[c][b], and a turned face with a foolish man.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The Hebrew text of this line is difficult, especially the middle symptoms and the phrase 'a turned face.' The Greek parallel for this verse is entirely different, indicating a major textual divergence in the tradition.
    reason: textual_variant
  - marker: b
    text: Or 'restless sleep,' 'wakeful tossing.'
    reason: lexical_alternative
  - marker: c
    text: Or 'an averted face' or 'a distorted expression.'
    reason: lexical_alternative
lexical_decisions:
- source_word: מכאוב
  chosen: pain
  alternatives:
  - sickness
  - sorrow
  lexicon: HALOT
  rationale: The noun denotes bodily pain or distress. In this context of physical aftereffects, 'pain' best fits the sequence of symptoms.
- source_word: ונדד ישנה
  chosen: sleepless wandering
  alternatives:
  - restless sleep
  - sleep that wanders away
  - wakeful tossing
  lexicon: HALOT
  rationale: The phrase combines נדד ('to wander/flee') with שנה ('sleep'), yielding the sense of sleep being driven away or restless wakefulness. 'Sleepless wandering' preserves the vivid Hebrew image while remaining intelligible.
- source_word: ומער
  chosen: retching
  alternatives:
  - vomiting
  - nausea
  lexicon: HALOT
  rationale: The form is difficult, but in context it points to gastric distress. 'Retching' preserves the physical force without overcommitting to actual vomiting where the Hebrew form is somewhat uncertain.
- source_word: ותשניק
  chosen: choking
  alternatives:
  - gagging
  - suffocation
  lexicon: HALOT
  rationale: From a root associated with choking or constriction. 'Choking' is the most natural English equivalent in a list of bodily symptoms.
- source_word: ופני הפוכות
  chosen: a turned face
  alternatives:
  - averted face
  - distorted expression
  - face turned away
  lexicon: HALOT
  rationale: Literally 'faces/face turned over.' The expression is somewhat idiomatic and uncertain; 'a turned face' keeps the image of altered or averted countenance without forcing a more interpretive gloss.
- source_word: עם איש כסיל
  chosen: with a foolish man
  alternatives:
  - in the company of a fool
  - beside a fool
  lexicon: HALOT
  rationale: The Hebrew is straightforward. 'Foolish man' preserves the singular masculine wording and the wisdom-literature category כסיל.
