translation:
  language: es
  text: 'Y ellos mandaron a los hijos de Benjamín,[b] diciendo: «Vayan y pónganse al acecho[a] en las viñas».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «pongan una emboscada en las viñas».
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «los hijos de Benjamín».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְצַו
  english_pob_choice: And they commanded
  chosen_spanish: Y ellos mandaron
  alternatives_spanish:
  - Y él mandó
  - Y ellos ordenaron
  lexicon: HALOT
  rationale: La forma hebrea y la auditoría inglesa favorecen un sujeto plural. En español, «mandaron» conserva el valor de autoridad/mandato sin volverlo excesivamente pesado. «Ordenaron» también sería posible, pero «mandaron» suena más natural en este contexto narrativo.
- source_word: אֶת בְּנֵי בִנְיָמִן
  english_pob_choice: the sons of Benjamin
  chosen_spanish: a los hijos de Benjamín
  alternatives_spanish:
  - a los benjaminitas
  - a la gente de Benjamín
  lexicon: HALOT
  rationale: Se preserva la expresión genealógica literal del hebreo. «Hijos de Benjamín» mantiene la transparencia del texto fuente y evita sustituirla por un etnónimo más interpretativo.
- source_word: לֵאמֹר
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - así
  lexicon: HALOT
  rationale: Es la fórmula quotativa estándar. «Diciendo» refleja con claridad la transición a discurso directo y conserva la estructura hebrea.
- source_word: לְכוּ
  english_pob_choice: Go
  chosen_spanish: Vayan
  alternatives_spanish:
  - Vayan ustedes
  - Vayan y
  lexicon: HALOT
  rationale: El imperativo plural se expresa naturalmente con «Vayan». En español, la forma de tratamiento es neutra y clara para lectura pública.
- source_word: וַאֲרַבְתֶּם
  english_pob_choice: and lie in wait
  chosen_spanish: y pongan una emboscada
  alternatives_spanish:
  - y estén al acecho
  - y acechen
  lexicon: HALOT
  rationale: El hebreo permite tanto la idea verbal de «acechar/estar al acecho» como la de «tender una emboscada». La auditoría inglesa preserva esa tensión con nota alternativa; en español, «pongan una emboscada» comunica bien la acción estratégica sin perder el matiz militar. Se evita «acechen» porque puede sonar menos específico en una orden táctica.
- source_word: בַּכְּרָמִים
  english_pob_choice: in the vineyards
  chosen_spanish: en las viñas
  alternatives_spanish:
  - en los viñedos
  - entre las viñas
  lexicon: HALOT
  rationale: «Viñas» traduce directamente כרמים y es idiomático en español bíblico y contemporáneo. «Viñedos» es posible, pero suele sonar más técnico o moderno; «viñas» conserva mejor el paisaje del relato.
translation_notes:
  revision_awareness: La revisión más reciente no introdujo cambios; el pasaje fue considerado de alto acuerdo, con solo observaciones menores. Se mantiene la lectura plural de la forma verbal y la transparencia de «hijos de Benjamín» conforme al hebreo y a la auditoría inglesa.
  spanish_consistency_notes:
  - Se mantiene «Benjamín» como nombre propio sin adaptar el etnónimo.
  - Se usa «viñas» de manera consistente con כרמים y con el registro bíblico natural del español.
  - 'El mandato plural se conserva en todo el versículo: «mandaron», «Vayan», «pongan».'
