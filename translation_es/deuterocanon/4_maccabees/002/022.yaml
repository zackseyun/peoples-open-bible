translation:
  language: es
  text: Y entonces también entronizó a la santa mente gobernante sobre todas las cosas mediante los sentidos.[a]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'la santa razón gobernante'. νοῦς puede denotar la facultad racional, no solo la mente en un sentido psicológico moderno.
    reason: lexical_alternative
lexical_decisions:
- source_word: τηνικαῦτα
  english_pob_choice: at that time
  chosen_spanish: y entonces
  alternatives_spanish:
  - en aquel tiempo
  - entonces
  lexicon: LSJ
  rationale: Marca la transición temporal del argumento. 'Y entonces' conserva el valor secuencial de la partícula y suena natural en español.
- source_word: περὶ πάντων
  english_pob_choice: over all things
  chosen_spanish: sobre todas las cosas
  alternatives_spanish:
  - en cuanto a todas las cosas
  - respecto de todo
  lexicon: LSJ
  rationale: Con ἐνεθρόνισεν la frase expresa dominio o superintendencia, no solo referencia temática. 'Sobre todas las cosas' conserva esa idea de gobierno.
- source_word: τὸν ἱερὸν ἡγεμόνα νοῦν
  english_pob_choice: the holy ruling mind
  chosen_spanish: el santo mente gobernante
  alternatives_spanish:
  - el santo entendimiento gobernante
  - la santa razón gobernante
  - la mente santa que gobierna
  lexicon: LSJ
  rationale: Se mantiene νοῦς como 'mente' por la decisión del POB inglés, pero en español 'mente gobernante' suena más natural que una calca rígida. 'Santo' preserva ἱερόν como registro moral/culto. Se evita 'razón' como opción principal para no desplazar el matiz antropológico del contexto.
- source_word: διὰ τῶν αἰσθητηρίων
  english_pob_choice: through the senses
  chosen_spanish: mediante los sentidos
  alternatives_spanish:
  - por medio de los órganos de los sentidos
  - a través de las facultades perceptivas
  lexicon: LSJ
  rationale: αἰσθητήρια puede referir órganos o facultades de percepción. 'Mediante los sentidos' es idiomático en español y preserva el valor instrumental de διά.
- source_word: ἐνεθρόνισεν
  english_pob_choice: enthroned
  chosen_spanish: entronizó
  alternatives_spanish:
  - lo sentó en el trono
  - lo estableció como soberano
  - lo puso en autoridad
  lexicon: LSJ
  rationale: El verbo conserva la imagen real de instalación en autoridad. En español 'entronizó' es la forma más directa y fiel al campo metafórico.
theological_decisions:
- issue: νοῦς como facultad moral-racional, no solo intelecto abstracto
  english_pob_reading: mind
  chosen_spanish_reading: mente
  alternative_spanish_readings:
  - razón
  - entendimiento
  rationale: En 4 Macabeos, νοῦς es la facultad que gobierna moralmente las pasiones. 'Mente' mantiene amplitud antropológica y evita reducir el término a una filosofía demasiado técnica. La frase 'mente gobernante' conserva el aspecto rector del texto.
  doctrine_reference: Translation philosophy §6; §5 consistency of key terms, or documented exception
translation_notes:
  revision_awareness: 'Se tuvo en cuenta el contexto auditado: el inglés POB opta por ''mind'' y conserva la imagen de entronización. La versión española mantiene esa metáfora real y la alternativa lexical principal de νοῦς en nota.'
  spanish_consistency_notes:
  - Se preserva 'entronizó' para sostener la imaginería regia del verbo.
  - '''Mente'' se usa como equivalente funcional de νοῦς, sin reducirlo a cognición meramente intelectual.'
  - '''Sentidos'' traduce αἰσθητήρια de manera concisa y compatible con el registro del pasaje.'
