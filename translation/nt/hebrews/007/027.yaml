theological_decisions:
- issue: Scope of 'this' in the parenthetical clause
  chosen_reading: The main text renders τοῦτο as referring to the decisive sacrificial act just described, namely Christ's dealing with sins through self-offering, without implying that he offered for his own sins.
  alternative_readings:
  - '''this'' refers only to the latter clause, offering for the people''s sins'
  - '''this'' refers broadly to the entire priestly work'
  rationale: 'The immediate context and the theology of Hebrews exclude the notion that Jesus offered for his own sins. The parenthesis explains the contrast with other high priests: unlike them, he performed the needed sacrificial act once for all by offering himself. The English wording preserves that contrast without importing sinfulness into Christ.'
  doctrine_reference: 'Affirmations: Chalcedonian orthodoxy; Translation philosophy §3 Preserve theological tension rather than resolve it'
- issue: Rendering of Christ's self-offering
  chosen_reading: The translation uses 'offered up himself' to preserve the sacrificial and priestly force of the Greek.
  alternative_readings:
  - gave himself
  - offered himself
  rationale: Hebrews emphasizes Jesus as priest and sacrifice. 'Offered up himself' keeps the cultic register without becoming archaic, and avoids flattening the verse into a merely general statement of self-giving.
  doctrine_reference: Translation philosophy §1 Original-language primacy; §6 Readable modern English, not archaic or academic
