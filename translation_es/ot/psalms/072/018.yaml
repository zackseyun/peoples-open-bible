translation:
  language: es
  text: Bendito sea Yahvé Dios,[a] el Dios de Israel, que solo hace maravillas.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Bendito sea Yahvé Dios, el Dios de Israel, que por sí mismo hace maravillas».'
    reason: lexical_alternative
lexical_decisions:
- source_word: בָּרוּךְ
  english_pob_choice: Blessed be
  chosen_spanish: ¡Bendito sea!
  alternatives_spanish:
  - Sea bendecido
  - Alabado sea
  lexicon: HALOT
  rationale: La forma participial funciona en una fórmula doxológica. En español, «Bendito sea» reproduce bien el valor performativo y litúrgico sin añadir paráfrasis.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  lexicon: HALOT
  rationale: Se preserva el nombre divino con la transliteración estándar del proyecto en español, coherente con la decisión doctrinal de no sustituir el Tetragrámaton por un título.
- source_word: אֱלֹהִים
  english_pob_choice: God
  chosen_spanish: Dios
  alternatives_spanish:
  - el Dios
  lexicon: HALOT
  rationale: Aquí aparece en aposición a Yahvé; «Dios» mantiene la relación nominal sin redundancia innecesaria en español.
- source_word: אֱלֹהֵי יִשְׂרָאֵל
  english_pob_choice: the God of Israel
  chosen_spanish: el Dios de Israel
  alternatives_spanish:
  - Dios de Israel
  lexicon: HALOT
  rationale: La cadena constructa expresa identidad y relación pactal; «el Dios de Israel» preserva esa especificidad de manera natural en español.
- source_word: עֹשֵׂה
  english_pob_choice: who ... does
  chosen_spanish: que ... hace
  alternatives_spanish:
  - que realiza
  - que obra
  lexicon: HALOT
  rationale: El participio qal describe una acción característica de Dios. «Que ... hace» conserva el valor descriptivo continuo sin volverlo demasiado abstracto.
- source_word: נִפְלָא֣וֹת
  english_pob_choice: wondrous things
  chosen_spanish: cosas maravillosas
  alternatives_spanish:
  - maravillas
  - hechos maravillosos
  lexicon: HALOT
  rationale: «Cosas maravillosas» comunica el sustantivo plural con claridad y conserva el tono de actos extraordinarios; «maravillas» sería posible, pero puede sonar más nominalizado o litúrgico.
- source_word: לְבַדּוֹ
  english_pob_choice: alone
  chosen_spanish: solo
  alternatives_spanish:
  - por sí mismo
  - solamente
  lexicon: HALOT
  rationale: El adverbio enfatiza exclusividad. «Solo» refleja bien esa idea en español y deja abierta la alternativa explicativa de «por sí mismo» sin imponerla en el texto principal.
theological_decisions:
- issue: Tratamiento del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Jehová
  - SEÑOR
  rationale: Se sigue la política del proyecto de traducir el Tetragrámaton por el nombre propio divino en español. «SEÑOR» ocultaría el nombre revelado y no corresponde al criterio de auditable source-grounding.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Fuerza exclusiva de לְבַדּוֹ
  english_pob_reading: who alone does wondrous things
  chosen_spanish_reading: que solo hace cosas maravillosas
  alternative_spanish_readings:
  - que por sí mismo hace maravillas
  - que únicamente hace cosas maravillosas
  rationale: Se preserva la exclusividad explícita del hebreo sin ampliar el alcance teológico más allá del verso. «Solo» mantiene la tensión de que Dios es el único agente de estas obras maravillosas.
  doctrine_reference: 'DOCTRINE.md Translation philosophy §3: Preserve theological tension rather than resolve it'
translation_notes:
  revision_awareness: El borrador sigue de cerca el paquete fuente hebreo y el audit trail inglés, manteniendo el tono doxológico, el nombre divino Yahvé y la exclusividad de לְבַדּוֹ. No se detectaron revisiones aplicadas en el expediente inglés, y el acuerdo de revisión fue alto.
  spanish_consistency_notes:
  - Se conserva «Yahvé» como forma estándar del proyecto para יְהוָה.
  - «Dios» se usa para אֱלֹהִים y no se reemplaza por «Señor».
  - La doxología en español conserva el orden y la cadencia del hebreo sin introducir una paráfrasis interpretativa.
  - Las notas alternativas se limitan a la variante léxica documentada en el audit trail inglés y a la explicitación de לְבַדּוֹ.
