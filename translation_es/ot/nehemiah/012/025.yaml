review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador conserva bien la lista de nombres y la función general de vigilancia en las puertas, pero no sigue la decisión principal del POB inglés en un punto clave: בַּאֲסֻפֵּי se auditó como ''storehouses'' en el texto principal, con ''gathering places'' relegado a nota. El español invierte esa prioridad al poner ''lugares de reunión'' en el texto y ''almacenes'' en nota. Además, ''porteros'' es posible, pero ''guardianes de las puertas'' comunica mejor שׁוֹעֲרִים en español moderno y evita asociaciones domésticas o deportivas.'
  spanish_quality_summary: La redacción es entendible, pero 'lugares de reunión de las puertas' suena extraña e imprecisa en español. Una formulación como 'los almacenes de las puertas' o 'los depósitos junto a las puertas' encaja mejor con el contexto administrativo y con la decisión auditada. También conviene suavizar 'haciendo guardia' a 'montando guardia' o 'de guardia' para mayor naturalidad literaria.
  glossary_alignment: 'No hay términos teológicos mayores en juego. La principal alineación requerida es con la decisión léxica documentada para בַּאֲסֻפֵּי: texto principal ''almacenes'' / nota ''lugares de reunión o de acopio''. En nombres propios, las formas españolas son aceptables; ''Acub'' y ''Mesulán'' son comprensibles aunque menos comunes que transliteraciones más conservadoras.'
  issues:
  - severity: high
    issue: La traducción principal de בַּאֲסֻפֵּי se invirtió respecto del POB auditado.
    rationale: El inglés POB fijó 'storehouses' en el texto principal y preservó 'gathering places' como alternativa en nota. El español puso 'lugares de reunión' en el texto, alterando la priorización semántica documentada.
  - severity: medium
    issue: '''Lugares de reunión de las puertas'' suena poco natural y contextualmente débil.'
    rationale: En español eclesial y narrativo, la frase resulta extraña y no transmite bien un contexto de vigilancia y administración de accesos.
  - severity: medium
    issue: '''Porteros'' puede resultar menos claro que ''guardianes de las puertas'' en este contexto.'
    rationale: Aunque es una opción válida para שׁוֹעֲרִים, en español actual 'porteros' tiene sentidos cotidianos ajenos al contexto bíblico. 'Guardianes de las puertas' expresa el oficio con mayor transparencia.
  revised_spanish_text: Matanías[a], Bakbucías, Abdías, Mesulán, Talmón y Acub eran guardianes de las puertas, montando guardia en los almacenes de las puertas.
  revised_footnotes:
  - marker: a
    text: O “en los lugares de reunión junto a las puertas”. El término hebreo traducido “almacenes” puede referirse más ampliamente a lugares de reunión o de acopio.
    reason: lexical_alternative
  revision_rationale: 'Se revisa para alinear el texto principal con la decisión léxica auditada del POB: בַּאֲסֻפֵּי se traduce como ''almacenes'' en el cuerpo y se conserva la alternativa amplia en nota. También se mejora la naturalidad y precisión contextual con ''guardianes de las puertas'' y ''montando guardia''. Se mantiene la nota anclada en el versículo para preservar la alternativa léxica documentada.'
