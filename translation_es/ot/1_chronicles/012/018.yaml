translation:
  language: es
  text: 'David salió ante ellos y respondió y les dijo: «Si han venido a mí en paz para ayudarme, mi corazón estará unido con ustedes; pero si han venido a traicionarme[a] ante mis enemigos, aunque no hay violencia en mis manos, que el Dios de nuestros padres vea[b] y juzgue».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «engañarme». El verbo hebreo puede denotar engaño traicionero; aquí se traduce «traicionarme» por el contexto político-militar y la mención de enemigos.
    reason: lexical_alternative
  - marker: b
    text: O «vea y reprenda» o «vea y decida». El verbo final hebreo puede expresar reprensión, arbitraje o juicio; aquí «juzgue» refleja mejor el sentido forense del contexto.
    reason: alternative_reading
lexical_decisions:
- source_word: וַיֵּצֵא
  english_pob_choice: went out
  chosen_spanish: salió
  alternatives_spanish:
  - salió afuera
  - salió delante
  lexicon: HALOT
  rationale: El hebreo expresa movimiento de salida en narrativa. «Salió» es natural en español y conserva el hecho de que David se coloca ante el grupo sin añadir interpretación innecesaria.
- source_word: לִפְנֵיהֶם
  english_pob_choice: before them
  chosen_spanish: delante de ellos
  alternatives_spanish:
  - ante ellos
  - frente a ellos
  lexicon: HALOT
  rationale: La idea espacial es que David se presenta en su presencia. «Delante de ellos» mantiene ese sentido de manera clara y fluida en español.
- source_word: וַיַּעַן וַיֹּאמֶר
  english_pob_choice: answered and said
  chosen_spanish: 'les respondió:'
  alternatives_spanish:
  - respondió y dijo
  - les habló y dijo
  lexicon: HALOT
  rationale: En español, la fórmula narrativa se puede expresar de forma más natural con un solo verbo sin perder el valor discursivo de la respuesta. «Les respondió» conserva la función del par hebreo sin un calco pesado.
- source_word: לְשָׁלוֹם
  english_pob_choice: in peace
  chosen_spanish: en paz
  alternatives_spanish:
  - pacíficamente
  - con intención de paz
  lexicon: HALOT
  rationale: La preposición hebrea sugiere una llegada pacífica y sincera. «En paz» reproduce bien la expresión y es idiomática en español bíblico actual.
- source_word: לְעָזְרֵנִי
  english_pob_choice: to help me
  chosen_spanish: para ayudarme
  alternatives_spanish:
  - a ayudarme
  - para socorrerme
  lexicon: HALOT
  rationale: El infinitivo de propósito se expresa con claridad mediante «para ayudarme». Es directo, fiel y evita un término más específico que el hebreo no exige.
- source_word: יִהְיֶה לִּי עֲלֵיכֶם לֵבָב לְיָחַד
  english_pob_choice: my heart will be united with you
  chosen_spanish: mi corazón estará unido con vosotros
  alternatives_spanish:
  - mi corazón será uno con vosotros
  - mi corazón se unirá con vosotros
  lexicon: HALOT
  rationale: La frase hebrea es idiomática y expresa solidaridad de intención. «Mi corazón estará unido con vosotros» comunica la unidad leal y mutua sin volverla demasiado explicativa.
- source_word: לְרַמּוֹתַנִי
  english_pob_choice: to betray me
  chosen_spanish: a engañarme[b]
  alternatives_spanish:
  - a traicionarme
  - a hacerme engaño
  lexicon: HALOT
  rationale: El verbo puede abarcar engaño traicionero. En español, «engañarme» preserva esa amplitud semántica; la nota aclara que, en este contexto militar-político, la idea incluye traición o entrega a enemigos.
- source_word: לְצָרַי
  english_pob_choice: to my enemies
  chosen_spanish: a mis enemigos
  alternatives_spanish:
  - a mis adversarios
  - contra mis enemigos
  lexicon: HALOT
  rationale: «Enemigos» es la forma más clara y fiel al contexto de hostilidad. Mantiene el valor concreto del término hebreo sin suavizarlo.
- source_word: בְּלֹא חָמָס בְּכַפַּי
  english_pob_choice: though there is no violence in my hands
  chosen_spanish: aunque no hay violencia en mis manos[c]
  alternatives_spanish:
  - aunque no hay injusticia en mis manos
  - sin violencia en mis manos
  lexicon: HALOT
  rationale: Se conserva el idiomático «en mis manos» como señal de inocencia/culpa. «Violencia» traduce bien חָמָס y «aunque» recoge el matiz concesivo del contexto.
- source_word: יֵרֶא
  english_pob_choice: may ... see
  chosen_spanish: que ... lo vea[d]
  alternatives_spanish:
  - que ... vea
  - que ... lo mire
  lexicon: HALOT
  rationale: El imperfecto aquí funciona como apelación/jussivo. En español, «que ... lo vea» expresa la invocación forense de manera natural.
- source_word: אֱלֹהֵי אֲבוֹתֵינוּ
  english_pob_choice: the God of our fathers
  chosen_spanish: el Dios de nuestros padres
  alternatives_spanish:
  - el Dios de nuestros antepasados
  - el Dios de nuestros padres y madres
  lexicon: HALOT
  rationale: La fórmula bíblica convencional se mantiene de forma cercana al hebreo. «Padres» conserva el eco pactal e histórico del texto fuente.
- source_word: וְיוֹכַח
  english_pob_choice: and judge
  chosen_spanish: y juzgue
  alternatives_spanish:
  - y lo reprenda
  - y decida
  lexicon: HALOT
  rationale: El verbo puede significar reprender, arbitrar o juzgar. En paralelo con «vea», «juzgue» es la opción más clara para el sentido judicial del pasaje.
theological_decisions:
- issue: Matiz de לְרַמּוֹתַנִי en un contexto de posible entrega a enemigos
  english_pob_reading: to betray me
  chosen_spanish_reading: a engañarme
  alternative_spanish_readings:
  - a traicionarme
  - a hacerme engaño
  rationale: El español «engañar» conserva la amplitud del hebreo, que puede incluir engaño traicionero. La nota lexical aclara que, por el contexto, el engaño sería una forma de traición o entrega a enemigos. Así se preserva la tensión semántica sin cerrar el término demasiado pronto.
  doctrine_reference: 'Translation philosophy §3: preservar la tensión léxica y contextual'
- issue: Función forense del cierre divino
  english_pob_reading: may the God of our fathers see and judge
  chosen_spanish_reading: que el Dios de nuestros padres lo vea y juzgue
  alternative_spanish_readings:
  - que el Dios de nuestros padres vea y reprenda
  - que el Dios de nuestros padres lo vea y decida
  rationale: El cierre no debe sonar como simple descripción futura, sino como apelación solemne a la intervención divina. «Que ... lo vea y juzgue» reproduce la invocación y el juicio forense implícito en el hebreo.
  doctrine_reference: 'Translation philosophy §3: conservar el juicio divino como apelación solemne'
translation_notes:
  revision_awareness: 'La revisión más reciente indicó alto acuerdo y no requirió cambios sustantivos. Se mantuvo la línea óptima del inglés POB, ajustando solo la fluidez española y preservando las tensiones léxicas del hebreo: במיוחד el valor de רמה («engañar/traicionar») y el cierre judicial de יכח.'
  spanish_consistency_notes:
  - Se usa «Dios» para אֱלֹהים y «el Dios de nuestros padres» para la fórmula pactal.
  - Se mantiene «en paz» y no se expande a una explicación más larga.
  - «Mi corazón estará unido con vosotros» conserva la metáfora de unidad sin sustituirla por una paráfrasis doctrinal.
  - Se preserva la imagen de «manos» para חָמָס, evitando normalizarla como simple inocencia abstracta.
  - El registro es bíblico moderno, no arcaizante, y evita sustituciones litúrgicas no requeridas por la fuente.
