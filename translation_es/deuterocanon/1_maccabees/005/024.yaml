- from: Y Judas Macabeo y Jonatán su hermano cruzaron el Jordán, y caminaron un trayecto de tres días por el desierto.
  to: Y Judas Macabeo y Jonatán su hermano cruzaron el Jordán, e hicieron un viaje de tres días en la región despoblada.
  rationale: 'Se revisa para reflejar mejor el sentido del griego y la auditoría inglesa: «hicieron un viaje de tres días» comunica mejor ἐπορεύθησαν ὁδὸν τριῶν ἡμερῶν que «caminaron un trayecto de tres días», y «en la región despoblada» preserva el valor más amplio de ἐν τῇ ἐρήμῳ sin reducirlo a un desierto arenoso ni cambiar la relación locativa.'
