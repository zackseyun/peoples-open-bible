  glossary_alignment: 'No hay conflictos con la terminología base del proyecto. La principal mejora es léxica: para גִּבּוֹרֵי חַיִל conviene ''hombres valientes y poderosos'' o equivalente más robusto que ''hombres valientes'', a fin de preservar mejor la fuerza idiomática reflejada en el POB inglés.'
