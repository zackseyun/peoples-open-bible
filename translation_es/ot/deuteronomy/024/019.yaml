base_translation:
  language: en
  yaml_path: translation/ot/deuteronomy/024/019.yaml
  text: When you reap your harvest in your field and forget a sheaf in the field[a], you shall not go back to take it. It shall be for the sojourner, the fatherless, and the widow[b], so that Yahweh your God may bless you in all the work of your hands.
  footnotes:
  - marker: a
    text: Or 'the foreigner,' 'the resident alien,' or 'the stranger' for 'the sojourner.' The Hebrew term refers to a non-native resident living among Israel.
    reason: lexical_alternative
  - marker: b
    text: Or 'the orphan' for 'the fatherless.'
    reason: lexical_alternative
