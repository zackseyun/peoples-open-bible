translation:
  language: es
  text: Y Moisés construyó un altar y lo llamó[a] «Yahvé es mi estandarte».
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «YHWH mi estandarte» o «Yahvé mi estandarte»; también puede entenderse como «Yahvé es mi bandera». La imagen probablemente alude al estandarte bajo el cual Yahvé reúne y da la victoria a Israel.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּבֶן
  english_pob_choice: built
  chosen_spanish: construyó
  alternatives_spanish:
  - edificó
  - levantó
  lexicon: HALOT
  rationale: El verbo בנה aquí describe la acción concreta de levantar un altar. En español, «construyó» comunica con naturalidad la acción narrativa sin perder la idea de hacer o erigir una estructura.
- source_word: מִזְבֵּחַ
  english_pob_choice: altar
  chosen_spanish: altar
  alternatives_spanish:
  - ara
  - altares
  lexicon: HALOT
  rationale: Es el equivalente directo y establecido en español para un lugar de sacrificio o memorial cultual.
- source_word: וַיִּקְרָא שְׁמוֹ
  english_pob_choice: called its name
  chosen_spanish: llamó su nombre
  alternatives_spanish:
  - lo nombró
  - le puso nombre
  lexicon: HALOT
  rationale: La fórmula hebrea es literalmente «llamó su nombre». Mantenerla como «llamó su nombre» conserva mejor la estructura nominal del hebreo que una paráfrasis más fluida.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: El texto hebreo usa el Nombre divino explícitamente. La política española del proyecto favorece «Yahvé» como transliteración del Tetragrámaton, en lugar de sustituirlo por «SEÑOR».
- source_word: נִסִּי
  english_pob_choice: Is My Banner
  chosen_spanish: es mi estandarte
  alternatives_spanish:
  - es mi bandera
  - es mi bandera de guerra
  - es mi estandarte
  lexicon: HALOT
  rationale: נֵס puede significar bandera, señal o estandarte. «Estandarte» conserva mejor en español la imagen de reunión y victoria que el inglés auditado explica para «banner», y evita una imagen demasiado moderna o ambigua de «bandera».
theological_decisions:
- issue: Uso del Nombre divino en el título del altar
  english_pob_reading: Yahweh Is My Banner
  chosen_spanish_reading: Yahvé es mi estandarte
  alternative_spanish_readings:
  - Yahvé es mi bandera
  - Yahvé es mi estandarte de guerra
  rationale: El hebreo une el Nombre divino con un nombre memorial del altar. Traducir יְהוָה como «Yahvé» preserva el Nombre propio; «estandarte» mantiene la metáfora de victoria y reunión señalada por la nota inglesa.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
translation_notes:
  revision_awareness: El audit trail inglés no requirió revisión textual; se mantuvo la lectura memorial del altar y la equivalencia óptima del nombre divino, con adaptación natural al español.
  spanish_consistency_notes:
  - Se conservó la fórmula narrativa hebrea «llamó su nombre» para respetar la estructura del original.
  - Se usó «Yahvé» de manera consistente con la política del proyecto para el Tetragrámaton.
  - «Estandarte» se eligió por su valor semántico de insignia de reunión/victoria, coherente con la nota explicativa del POB en inglés.
