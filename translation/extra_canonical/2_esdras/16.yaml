    4 A fire has been sent upon you, and who is there to quench it?

    5 Evils have been sent upon you, and who is there to drive them away?

    6 Can anyone beat back a hungry lion in the forest, or quench a fire when straw has been set ablaze?

    7 Or can anyone turn back an arrow shot by a mighty archer?

    8 The Lord God sends evils, and who will drive them away?

    9 Fire will go out from his wrath, and who is there to quench it?

    10 He will flash forth, and who will not fear? He will thunder, and who will not shudder?

    11 The Lord will threaten, and who will not be utterly crushed before his face?

    12 The earth quakes, and its foundations; the sea surges from the deep, and its waves are troubled, and its fish, before the Lord and before the glory of his power.

    13 For mighty is his right hand that bends the bow; his arrows that are sent by him are sharp, and they will not fail when they begin to be shot to the ends of the earth.

    14 Behold, evils are sent out, and they will not return until they come upon the earth.

    15 Fire is kindled, and it will not be quenched until it consumes the foundations of the earth.

    16 As an arrow shot by a strong archer does not return, so the evils that have been sent upon the earth will not return.

    17 Woe is me, woe is me! Who will deliver me in those days?

    18 The beginning of pains and many groanings; the beginning of famine, and many will perish; the beginning of wars, and the rulers will be afraid; the beginning of evils, and all will tremble.

    19 What will they do in these things, when the evils come?

    20 Behold, famine and plague and tribulation and distress have been sent as scourges for correction.

    21 Yet for all these things they will not turn from their iniquities, nor will they always remember the scourges.

    22 Behold, there will be cheapness of grain upon the earth, so that they will think peace has been set straight for them; and then evils will spring up upon the earth: sword, famine, and great confusion.

    23 For many of those who inhabit the earth will die by famine, and the sword will destroy those who survive the famine.

    24 And the dead will be cast out like dung, and there will be no one to comfort them; for the earth will be left desolate, and its cities will be thrown down.

    25 There will be no one left to till the earth and to sow it.

    26 The trees will bear fruit, and who will gather it?

    27 The grape will ripen, and who will tread it? For there will be great desolation in the places.

    28 For a man will long to see a man, or even to hear his voice.

    29 For ten will be left from a city, and two from the countryside, who have hidden themselves in thick groves and in clefts of the rocks.

    30 As in an olive orchard three or four olives are left on each tree,

    31 or as in a vineyard after the vintage some clusters are left by those who search the vineyard carefully,

    32 so in those days three or four will be left by those who search their houses with the sword.

    33 And the earth will be left desolate, and its fields will grow over with thorns, and its roads and all its paths will sprout brambles, because sheep will not pass through them.

    34 Virgins will mourn, having no bridegrooms; women will mourn, having no husbands; their daughters will mourn, having no help.

    35 Their bridegrooms will be consumed in war, and their husbands will perish by famine.

    36 But hear these things and understand them, servants of the Lord.

    37 Behold, the word of the Lord: receive it; do not disbelieve the things of which the Lord speaks.

    38 Behold, evils are drawing near and are not delayed.

    39 As when a woman with child in the ninth month, when the hour of her delivery draws near, for two or three hours great pains surround her womb, and when the child comes forth from the womb it does not delay a single moment,

    40 so also the evils will not delay to come forth upon the earth, and the age will groan, and pains will seize it on every side.

    41 Hear the word, my people: prepare yourselves for battle, and in the midst of evils be like strangers on the earth.

    42 Let the one who sells be like one who will flee; and the one who buys, like one who is about to lose;

    43 and the one who trades, like one who will gain no profit; and the one who builds, like one who will not dwell there;

    44 and the one who sows, like one who will not reap; so also the one who prunes the vines, like one who will not gather the grapes.

    45 Those who marry, let them be as though they will have no children; and those who do not marry, as widowers.

    46 Therefore those who labor labor in vain,

    47 for foreigners will reap their fruits and plunder their goods and overturn their houses and take their children captive, because in captivity and famine they beget their children.

    48 And those who conduct business conduct it for plunder;

    49 the more they adorn their cities and their houses and their possessions and their own persons,

    50 the more I will be angry with them for their sins, says the Lord.

    51 As a respectable and very beautiful woman hates a prostitute, so righteousness will hate iniquity when she adorns herself, and will accuse her to her face when he comes who defends the one who searches out every sin upon the earth.

    52 Therefore do not become like her or like her works.

    53 For behold, in a very little while iniquity will be taken away from the earth, and righteousness will reign over us.

    54 Let not the sinner say that he has not sinned, for coals of fire will burn upon the head of the one who says, “I have not sinned before God and his glory.”

    55 Behold, the Lord knows all the works of men and their devices and their thoughts and their hearts.

    56 He who said, “Let the earth be made,” and it was made; “Let heaven be made,” and it was made.

    57 By his word the stars were established, and he knows the number of the stars.

    58 He searches the deep and its treasures; he has measured the sea and what it contains.

    59 He shut up the sea in the midst of the waters, and by his word he hung the earth upon the waters.

    60 He stretched out heaven like a vaulted chamber, and founded it upon the waters.

    61 He placed springs of waters in the desert, and pools upon the mountain tops, to send forth rivers from the heights to water the earth.

    62 He formed man, and put a heart in the midst of the body, and gave him spirit and life and understanding,

    63 and the breath of God Almighty, who made all things and searches out hidden things in hidden places. Surely he knows your devisings and what you think in your hearts.

    64 Woe to those who sin and wish to hide their sins!

    65 Therefore the Lord will surely search out all their works and will expose you all.

    66 And you will be put to shame when your sins come out before men, and your iniquities will stand as accusers in that day.

    67 What will you do? Or how will you hide your sins before God and his angels?

    68 Behold, God is judge; fear him. Cease from your sins, and forget your iniquities, to practice them no more forever; and God will lead you out and deliver you from every tribulation.

    69 For behold, a burning wrath is kindled over you, a great multitude, and they will seize some of you and feed you, after killing you, to idols.

    70 And those who consent to them will be had in derision and reproach and trampled underfoot.

    71 For in place after place, and in the neighboring cities, there will be a great uprising against those who fear the Lord.

    72 They will be like madmen, sparing no one, still plundering and ravaging those who fear the Lord.

    73 For they will ravage and plunder their goods and drive them out of their houses.

    74 Then the tested character of my chosen ones will appear, like gold that is tested by fire.

    75 Hear, my chosen ones, says the Lord: behold, days of tribulation are near, and from them I will deliver you.

    76 Do not fear or doubt, for God is your guide.

    77 And you who keep my commandments and my ordinances, says the Lord God, do not let your sins weigh you down, nor let your iniquities prevail over you.

    78 Woe to those who are bound fast by their sins and covered over by their iniquities, as a field is hemmed in by a forest and its seeds covered by thorns, so that no man can pass through; it is shut off and given over to be devoured by fire.'
