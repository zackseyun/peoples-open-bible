lexical_decisions:
- source_word: בַּיּוֹם הַשְּׁלִישִׁי
  english_pob_choice: On the third day
  chosen_spanish: Al tercer día
  alternatives_spanish:
  - En el tercer día
  - El tercer día
  lexicon: HALOT
  rationale: 'La expresión temporal con artículo y ordinal se rinde de forma natural en español con una preposición elidida: ''Al tercer día''. Conserva el valor narrativo del hebreo sin añadir información no explícita.'
- source_word: וַיִּשָּׂא ... אֶת עֵינָיו
  english_pob_choice: lifted up his eyes
  chosen_spanish: alzó sus ojos
  alternatives_spanish:
  - levantó los ojos
  - miró hacia arriba
  lexicon: HALOT
  rationale: Mantengo la imagen idiomática del hebreo, que literalmente presenta a Abraham 'levantando/subiendo' sus ojos. 'Alzó sus ojos' es una formulación natural en español bíblico y preserva la fuerza narrativa sin aplanar el giro semítico.
- source_word: וַיַּרְא
  english_pob_choice: and saw
  chosen_spanish: y vio
  alternatives_spanish:
  - y contempló
  - y miró
  lexicon: HALOT
  rationale: El verbo de percepción se expresa con la coordinación simple 'y vio', que corresponde al avance narrativo del hebreo y evita sobreinterpretar el acto de ver.
- source_word: הַמָּקוֹם
  english_pob_choice: the place
  chosen_spanish: el lugar
  alternatives_spanish:
  - ese lugar
  - el sitio
  lexicon: HALOT
  rationale: '''הַמָּקוֹם'' es el sustantivo común ''el lugar''. ''El lugar'' reproduce la referencia definida sin introducir un término más interpretativo como ''sitio''.'
- source_word: מֵרָחֹק
  english_pob_choice: from afar
  chosen_spanish: desde lejos
  alternatives_spanish:
  - de lejos
  - a distancia
  lexicon: HALOT
  rationale: La frase adverbial indica distancia. 'Desde lejos' es idiomático, claro y fiel; mantiene la ambigüedad controlada entre una distancia concreta y una percepción remota, como en el inglés auditado.
- source_word: אַבְרָהָם
  english_pob_choice: Abraham
  chosen_spanish: Abraham
  alternatives_spanish:
  - Abram
  lexicon: tradicional/transliteración
  rationale: Se conserva la forma española estándar del nombre propio, en línea con la transliteración habitual y con el contexto narrativo del pasaje.
translation_notes:
  revision_awareness: 'El texto coincide sustancialmente con el audit trail inglés: mantiene la secuencia narrativa, el idiomatismo de ''alzar los ojos'' y la referencia definida ''el lugar'', sin añadir elementos como ''del viaje''. No se detectan revisiones aplicadas en el material de referencia.'
  spanish_consistency_notes:
  - Se usa 'Abraham' como forma estándar del nombre propio para consistencia bíblica en español.
  - '''Al tercer día'' evita una calca dura y conserva el sentido temporal exacto.'
  - '''Desde lejos'' mantiene la misma amplitud semántica que el inglés ''from afar'' y admite la alternativa léxica en nota.'
