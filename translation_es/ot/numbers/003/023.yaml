translation:
  language: es
  text: Los clanes de los gersonitas acamparán detrás del tabernáculo[a], hacia el occidente.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebreo literalmente «hacia el mar», un giro idiomático estándar para indicar el occidente.
    reason: lexical_alternative
lexical_decisions:
- source_word: מִשְׁפְּחֹת
  english_pob_choice: clans
  chosen_spanish: familias
  alternatives_spanish:
  - clanes
  lexicon: HALOT
  rationale: En contextos censales y tribales, el hebreo puede referirse a subdivisiones de parentesco dentro de una tribu. En español, 'familias' comunica bien esa unidad genealógica sin sonar demasiado técnico. 'Clanes' también sería posible, pero aquí 'familias' mantiene la referencia colectiva con naturalidad.
- source_word: הַגֵּרְשֻׁנִּי
  english_pob_choice: the Gershonites
  chosen_spanish: los gersonitas
  alternatives_spanish:
  - la familia gersonita
  - el clan gersonita
  lexicon: HALOT
  rationale: El adjetivo gentilicio funciona colectivamente para los descendientes de Gersón. 'Los gersonitas' es la forma natural y transparente en español para ese grupo colectivo.
- source_word: אַחֲרֵי
  english_pob_choice: behind
  chosen_spanish: detrás de
  alternatives_spanish:
  - tras
  - a la parte de atrás de
  lexicon: HALOT
  rationale: Aquí la preposición es espacial, no temporal. 'Detrás de' expresa con claridad la ubicación del campamento respecto del tabernáculo.
- source_word: הַמִּשְׁכָּן
  english_pob_choice: the tabernacle
  chosen_spanish: el tabernáculo
  alternatives_spanish:
  - la morada
  - la tienda del encuentro
  lexicon: HALOT
  rationale: En Números, el término designa el santuario portátil. 'Tabernáculo' es el equivalente castellano establecido y fiel al contexto cultual.
- source_word: יַחֲנוּ
  english_pob_choice: shall camp
  chosen_spanish: acamparán
  alternatives_spanish:
  - acamparán de manera ordenada
  - harán campamento
  lexicon: HALOT
  rationale: El imperfecto expresa una disposición prescrita. En español, el futuro simple conserva bien ese valor normativo/descriptivo y suena natural.
- source_word: יָמָּה
  english_pob_choice: toward the west
  chosen_spanish: hacia el occidente
  alternatives_spanish:
  - hacia el oeste
  - al lado occidental
  - seawards
  lexicon: HALOT
  rationale: La forma hebrea es literalmente 'hacia el mar', un hebraísmo direccional usado idiomáticamente para 'al oeste'. 'Hacia el occidente' preserva el sentido direccional y el registro bíblico sin dejar la expresión opaca.
translation_notes:
  revision_awareness: 'El texto sigue de cerca el hebreo con el apoyo del auditable inglés POB: el orden espacial se mantiene, ''behind'' se vierte como ''detrás de'', y la dirección idiomática se explicita como ''hacia el occidente'' para evitar una literalidad opaca. No se identificaron revisiones previas que afecten este versículo.'
  spanish_consistency_notes:
  - Se usa 'tabernáculo' de manera consistente con el término cultual del pasaje.
  - Se prefiere 'occidente' para reflejar el hebraísmo direccional con un registro bíblico claro.
  - '''Los gersonitas'' conserva el valor colectivo del gentilicio hebreo.'
