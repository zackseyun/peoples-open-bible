lexical_decisions:
- source_word: מִי זֶה
  english_pob_choice: Who is this
  chosen_spanish: ¿Quién es este
  alternatives_spanish:
  - ¿Quién es este hombre
  - ¿Quién es aquel
  lexicon: HALOT
  rationale: La pregunta hebrea es una interpelación enfática y de reproche. «¿Quién es este» conserva el tono desafiante de forma natural en español.
- source_word: מַחְשִׁיךְ
  english_pob_choice: darkens
  chosen_spanish: oscurece
  alternatives_spanish:
  - apaga
  - entorpece
  - hace oscuro
  lexicon: HALOT
  rationale: El verbo mantiene la metáfora de volver menos visible o claro algo ya existente. «Oscurece» es el equivalente más directo y idiomático en español.
- source_word: עֵצָה
  english_pob_choice: counsel
  chosen_spanish: el consejo
  alternatives_spanish:
  - el plan
  - el propósito
  lexicon: HALOT
  rationale: «Consejo» reproduce bien el campo semántico de deliberación sabia. Como en el inglés POB, deja abierta la posibilidad de «plan» o «propósito» sin forzar una sola opción.
- source_word: בְּמִלִּין
  english_pob_choice: with words
  chosen_spanish: con palabras
  alternatives_spanish:
  - por medio de palabras
  - con discurso
  lexicon: HALOT
  rationale: La preposición instrumental se expresa de manera natural con «con». «Palabras» conserva el carácter verbal del reproche sin añadir interpretación.
- source_word: בְּלִי דָעַת
  english_pob_choice: without knowledge
  chosen_spanish: sin conocimiento
  alternatives_spanish:
  - sin entendimiento
  - ignorantemente
  lexicon: HALOT
  rationale: La frase hebrea dice literalmente «sin conocimiento». «Sin conocimiento» mantiene la forma y la acusación de falta de discernimiento sin suavizarla.
theological_decisions:
- issue: Sentido de עֵצָה en la reprensión divina
  english_pob_reading: counsel
  chosen_spanish_reading: consejo
  alternative_spanish_readings:
  - plan
  - propósito
  rationale: En el contexto de Job 38, Dios reprocha palabras humanas que empañan una realidad de sabiduría o decisión divina. «Consejo» preserva esa amplitud semántica y no resuelve prematuramente la tensión entre sabiduría, designio y propósito.
  doctrine_reference: Translation philosophy §3, Preserve theological tension rather than resolve it.
translation_notes:
  revision_awareness: La fuente y el audit trail inglés coinciden de manera alta; no se registran revisiones aplicadas en el pasaje. La redacción española sigue de cerca las decisiones léxicas auditadas.
  spanish_consistency_notes:
  - Se mantiene «conocimiento» para בְּלִי דָעַת, evitando reformular como «entendimiento» salvo nota alternativa.
  - «Consejo» se usa como término principal y no se sustituye por «plan» en el texto base.
  - El tono interrogativo-retórico se conserva con puntuación española estándar.
