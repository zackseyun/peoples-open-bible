translation:
  language: es
  text: En aquellos días Yahvé comenzó a enviar contra Judá[a] a Rezín, rey de Aram[b], y a Pecaj, hijo de Remalías.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «en Judá»; el hebreo aquí probablemente tiene fuerza hostil, de ahí «contra Judá».
    reason: lexical_alternative
  - marker: b
    text: Hebreo «Aram»; tradicionalmente «Siria».
    reason: lexical_alternative
lexical_decisions:
- source_word: בַּיָּמִים הָהֵם
  english_pob_choice: In those days
  chosen_spanish: En aquellos días
  alternatives_spanish:
  - En esos días
  - En ese tiempo
  lexicon: HALOT
  rationale: Es un modismo temporal hebreo que introduce un marco histórico. 'En aquellos días' conserva el valor idiomático y suena natural en español bíblico actual.
- source_word: הֵחֵל
  english_pob_choice: began
  chosen_spanish: comenzó
  alternatives_spanish:
  - empezó
  - inició
  lexicon: HALOT
  rationale: El verbo marca inicio de acción. 'Comenzó' expresa bien la incepción sin añadir matices ajenos.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  - el SEÑOR
  lexicon: HALOT
  rationale: Se conserva el nombre divino propio, conforme a la pauta del proyecto, en lugar de sustituirlo por un título. 'Yahvé' es la forma establecida para el texto español.
- source_word: לְהַשְׁלִיחַ
  english_pob_choice: to send against
  chosen_spanish: enviar contra
  alternatives_spanish:
  - mandar contra
  - lanzar contra
  - enviar a
  lexicon: HALOT
  rationale: El contexto es hostil y el inglés POB ya lo explicita con 'against'. En español, 'enviar contra' comunica esa fuerza adversativa sin sobretraducir.
- source_word: בִּיהוּדָה
  english_pob_choice: against Judah
  chosen_spanish: contra Judá
  alternatives_spanish:
  - en Judá
  - a Judá
  lexicon: HALOT
  rationale: La preposición hebrea puede ser local, pero aquí funciona idiomáticamente con sentido hostil. 'Contra Judá' preserva el valor contextual reconocido por el POB inglés.
- source_word: רְצִין מֶלֶךְ אֲרָם
  english_pob_choice: Rezin king of Aram
  chosen_spanish: Rezín, rey de Aram
  alternatives_spanish:
  - Rezín, rey de Siria
  - Rezín, el rey de Aram
  lexicon: HALOT
  rationale: Se translitera el nombre propio y se mantiene 'Aram' por ser el etnónimo/geónimo hebreo más directo. 'Rey de Aram' refleja la estructura del original.
- source_word: וְאֵת פֶּקַח בֶּן רְמַלְיָהוּ
  english_pob_choice: and Pekah son of Remaliah
  chosen_spanish: y a Pecaj, hijo de Remalías
  alternatives_spanish:
  - y a Pecaj, hijo de Remalíasu
  - y a Pecaj, hijo de Remalías
  lexicon: HALOT
  rationale: Se conserva el nombre propio con transliteración española usual. 'Hijo de' es el equivalente genealógico directo de בן. La terminación larga del patronímico se adapta a una forma española clara y legible.
theological_decisions:
- issue: Nombre divino en el texto español
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Jehová
  - el SEÑOR
  rationale: El original hebreo usa explícitamente el Tetragrama. La lectura española debe preservar el nombre propio de Dios, no ocultarlo tras una sustitución tradicional. 'Yahvé' sigue la convención del proyecto y mantiene la distinción teológica del texto.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Dirección hostil de לְהַשְׁלִיחַ בִּיהוּדָה
  english_pob_reading: to send against Judah
  chosen_spanish_reading: enviar contra Judá
  alternative_spanish_readings:
  - enviar en Judá
  - enviar a Judá
  rationale: El hebreo admite un sentido local ('a/into Judah'), pero el contexto narrativo y la lectura auditada del POB muestran fuerza hostil. 'Contra Judá' conserva esa tensión y evita suavizarla.
  doctrine_reference: Nota lexical del POB inglés para 2 Reyes 15:37
translation_notes:
  revision_awareness: El texto inglés auditado no requirió cambios en la última revisión; se mantiene el acuerdo alto y la solución hostil para לְהַשְׁלִיחַ/בִּיהוּדָה. La versión española sigue esa decisión y ajusta solo la forma natural del español, incluyendo la traducción del nombre divino según la política del proyecto.
  spanish_consistency_notes:
  - Se usa «Yahvé» de manera consistente con el estándar del proyecto para יְהוָה.
  - Se prefiere «Aram» sobre «Siria» para reflejar el término hebreo sin latinizaciones tradicionales.
  - Se mantiene el valor hostil de la construcción verbal con «contra Judá».
  - Los nombres propios se transliteran de forma legible para el español y se conserva la sintaxis genealógica con «hijo de».
