id: JHN.17.26
reference: 'John 17:26'
language:
  code: ko
  name: Korean
  variant: '표준어 / modern formal-polite (합쇼체)'
source:
  edition: SBLGNT
  text: καὶ ἐγνώρισα αὐτοῖς τὸ ὄνομά σου καὶ γνωρίσω, ἵνα ἡ ἀγάπη ἣν ἠγάπησάς με ἐν αὐτοῖς ᾖ κἀγὼ ἐν αὐτοῖς.
base_translation:
  language: en
  yaml_path: translation/nt/john/017/026.yaml
  text: And I made your name known to them[a], and I will make it known, so that the love with which you loved me may be in them[c][b], and I in them.
  footnotes:
  - marker: a
    text: Or 'I revealed your name to them, and I will reveal it.'
    reason: lexical_alternative
  - marker: b
    text: '''Your name'' refers to God''s revealed identity and character, not merely a spoken designation.'
    reason: cultural_note
  - marker: c
    text: Or 'among them' for 'in them,' though 'in them' better preserves the Johannine theme of indwelling.
    reason: lexical_alternative
translation:
  language: ko
  text: 나는 그들에게 아버지의 이름을 알렸으며, 또 알릴 것입니다. 이는 아버지께서 나를 사랑하신 그 사랑이 그들 안에 있고, 나도 그들 안에 있게 하려는 것입니다.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 또는 「내가 그들에게 아버지의 이름을 드러내었고, 또 드러낼 것이다」.
    reason: lexical_alternative
  - marker: b
    text: 「아버지의 이름」은 단순한 호칭이 아니라, 하나님의 계시된 정체성과 성품을 가리킨다.
    reason: theological_clarification
  - marker: c
    text: 또는 「그들 가운데」. 그러나 「그들 안에」가 요한적 내주(內住) 주제를 더 잘 보존한다.
    reason: lexical_alternative
