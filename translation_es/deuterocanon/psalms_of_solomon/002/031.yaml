    rationale: La nota [a] documenta una alternativa para διαφερόμενον, por lo que debe ir en ‘llevado/arrastrado’; la nota [b] documenta alternativas para ἐν ὕβρει πολλῇ, por lo que debe ir en ‘gran indignidad’. Tal como está, [b] aparece en ‘enterrara’, donde no corresponde a ninguna alternativa preservada.
  - severity: low
    issue: ‘su cuerpo siendo llevado’ suena poco natural en español.
    rationale: Aunque formalmente posible, es un calco del participio inglés y griego. En español, ‘su cuerpo, llevado sobre las olas…’ preserva el sentido pasivo y mejora la legibilidad sin parafrasear.
