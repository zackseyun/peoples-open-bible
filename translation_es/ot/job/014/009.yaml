translation:
  language: es
  text: al olor del agua brotará y echará ramas como una planta[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'También puede entenderse: «y echará brotes como una planta». El hebreo de קָצִיר es conciso y admite tanto una imagen de ramas como de brotes/renuevos; ''cosecha'' es posible en abstracto, pero es menos probable en este contexto.'
    reason: lexical_alternative
lexical_decisions:
- source_word: מֵ/רֵיחַ
  english_pob_choice: at the scent of
  chosen_spanish: al olor de
  alternatives_spanish:
  - desde el olor de
  - ante el olor de
  lexicon: HALOT
  rationale: רֵיחַ significa literalmente 'olor, aroma, fragancia'. Con מִן expresa la respuesta a la sola presencia o cercanía del agua. 'Al olor de' conserva la imagen poética en español y suena natural sin perder la idea de reacción mínima.
- source_word: מַיִם
  english_pob_choice: water
  chosen_spanish: agua
  alternatives_spanish:
  - aguas
  lexicon: HALOT
  rationale: Aunque la forma hebrea es plural, funciona aquí como sustantivo de masa. En español, 'agua' es la equivalencia natural y clara.
- source_word: יַפְרִחַ
  english_pob_choice: it will bud
  chosen_spanish: brotará
  alternatives_spanish:
  - florecerá
  - germinará
  lexicon: HALOT
  rationale: El verbo hiphil de פרח puede sugerir brotar, florecer o echar renuevo. 'Brotará' comunica bien el comienzo de nueva vida en un árbol cortado, sin cargar la imagen con una etapa más específica de la que exige el hebreo.
- source_word: וְ/עָשָׂה
  english_pob_choice: and put forth
  chosen_spanish: y echará
  alternatives_spanish:
  - y producirá
  - y hará
  lexicon: HALOT
  rationale: עָשָׂה es amplio ('hacer, producir'). En este contexto botánico, 'echará' transmite la idea de sacar o producir nuevo crecimiento de manera idiomática en español.
- source_word: קָצִיר
  english_pob_choice: branches
  chosen_spanish: ramas
  alternatives_spanish:
  - renuevos
  - brotes
  - cosecha
  lexicon: HALOT
  rationale: El término suele significar 'cosecha', pero aquí el contexto favorece la idea de nuevo crecimiento producido por la planta. 'Ramas' sigue de cerca la revisión inglesa final ('branches') y mantiene una imagen vegetal comprensible, aunque el hebreo permite también 'brotes' o 'renuevos'.
- source_word: כְּמוֹ
  english_pob_choice: like
  chosen_spanish: como
  alternatives_spanish:
  - igual que
  - tal como
  lexicon: HALOT
  rationale: Partícula comparativa estándar; 'como' es la correspondencia natural y directa en español.
- source_word: נָטַע
  english_pob_choice: a plant
  chosen_spanish: una planta
  alternatives_spanish:
  - un plantío
  - algo plantado
  - un árbol plantado
  lexicon: HALOT
  rationale: נָטַע refiere a lo plantado. Dado que el hebreo no explicita 'árbol' aquí, 'una planta' evita añadir un sustantivo más específico de lo que el texto exige y refleja la revisión inglesa final.
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión final inglesa que sustituyó 'produce growth' por 'put forth branches' y que cambió 'like a planted tree' por 'like a plant'. La versión española sigue esa orientación, pero conserva una nota sobre la ambigüedad de קָצִיר porque el hebreo permite varias concreciones vegetales.
  spanish_consistency_notes:
  - Se usó 'agua' en singular por ser el equivalente natural de מַיִם como sustantivo de masa.
  - Se evitó 'SEÑOR' y no hay nombre divino en este versículo.
  - 'Se prefirió un español poético pero transparente: ''al olor de'' / ''brotará'' / ''echará''.'
  - '''Ramas'' refleja la lectura revisada del audit trail, pero la nota mantiene abierta la alternativa más cercana a ''brotes''.'
