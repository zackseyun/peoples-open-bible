translation:
  language: es
  text: Y el remanente de Jacob estará entre las naciones, en medio de muchos pueblos, como un león entre las bestias del bosque[a], como leoncillo entre rebaños de ovejas, que, si pasa, pisotea y despedaza[b], y no hay quien rescate.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «animales del bosque».
    reason: lexical_alternative
  - marker: b
    text: O «que, cuando pasa, pisotea y despedaza a pedazos».
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהָיָה
  english_pob_choice: And ... will be
  chosen_spanish: Y ... estará
  alternatives_spanish:
  - Y ... será
  - Entonces ... estará
  lexicon: HALOT
  rationale: El hebreo introduce aquí un futuro profético; en español, «estará» comunica bien ese valor futuro/resultativo sin sonar rígido. Se conserva el arranque coordinado con «Y».
- source_word: שְׁאֵרִית יַעֲקֹב
  english_pob_choice: the remnant of Jacob
  chosen_spanish: el remanente de Jacob
  alternatives_spanish:
  - el resto de Jacob
  - los sobrevivientes de Jacob
  lexicon: HALOT
  rationale: «Remanente» preserva el valor profético-covenantal de שְׁאֵרִית mejor que «resto», que puede sonar meramente cuantitativo.
- source_word: בַּגּוֹיִם
  english_pob_choice: among the nations
  chosen_spanish: entre las naciones
  alternatives_spanish:
  - entre los pueblos
  - en medio de las naciones
  lexicon: HALOT
  rationale: «Naciones» mantiene la amplitud de גּוֹיִם sin introducir el matiz técnico posterior de «gentiles». «Entre» refleja bien el valor relacional del sintagma.
- source_word: בְּקֶרֶב עַמִּים רַבִּים
  english_pob_choice: in the midst of many peoples
  chosen_spanish: en medio de muchos pueblos
  alternatives_spanish:
  - en el centro de muchos pueblos
  - entre muchos pueblos
  lexicon: HALOT
  rationale: «En medio de» conserva la imagen espacial de בְּקֶרֶב y el paralelismo con el miembro anterior. «Pueblos» traduce עַמִּים con naturalidad en español bíblico.
- source_word: כְּאַרְיֵה
  english_pob_choice: like a lion
  chosen_spanish: como león
  alternatives_spanish:
  - como un león
  lexicon: HALOT
  rationale: En español poético-bíblico, «como león» es natural y fiel al símil; evita sobrecargar el verso con un artículo innecesario.
- source_word: בְּבַהֲמוֹת יַעַר
  english_pob_choice: among the beasts of the forest
  chosen_spanish: entre las bestias del bosque
  alternatives_spanish:
  - entre los animales del bosque
  - entre las fieras del bosque
  lexicon: HALOT
  rationale: Se sigue la revisión inglesa más formal («beasts»). «Bestias» conserva la fuerza salvaje del término sin suavizarlo a «animales».
- source_word: כִּכְפִיר
  english_pob_choice: like a young lion
  chosen_spanish: como leoncillo
  alternatives_spanish:
  - como cachorro de león
  - como un león joven
  lexicon: HALOT
  rationale: «Leoncillo» transmite con naturalidad la idea de un león joven y vigoroso, y funciona bien en el paralelismo poético.
- source_word: בְּעֶדְרֵי צֹאן
  english_pob_choice: among flocks of sheep
  chosen_spanish: entre rebaños de ovejas
  alternatives_spanish:
  - entre los rebaños
  - entre manadas de ovejas
  lexicon: HALOT
  rationale: «Rebaños de ovejas» hace explícita la presa y conserva la relación semántica de עֶדֶר + צֹאן. «Manadas» sería menos natural con ovejas en español.
- source_word: אֲשֶׁר אִם עָבַר
  english_pob_choice: which, if it passes through
  chosen_spanish: que, si pasa
  alternatives_spanish:
  - que, si atraviesa
  - que, si va de paso
  lexicon: HALOT
  rationale: «Pasa» es breve y fiel al movimiento general del verbo hebreo; en español resulta más natural que una perífrasis más pesada.
- source_word: וְרָמַס
  english_pob_choice: tramples
  chosen_spanish: pisa
  alternatives_spanish:
  - aplasta
  - pisotea
  lexicon: HALOT
  rationale: El sentido básico es pisar con violencia. «Pisa» mantiene la secuencia verbal concisa; el contexto ya comunica la violencia por la imagen del león.
- source_word: וְטָרַף
  english_pob_choice: and tears
  chosen_spanish: y despedaza
  alternatives_spanish:
  - y destroza
  - y hace pedazos
  lexicon: HALOT
  rationale: Aunque el inglés POB evita una expansión, en español «despedaza» comunica de forma natural la violencia de טָרַף sin perder la fuerza predatoria.
- source_word: וְאֵין מַצִּיל
  english_pob_choice: and there is none to rescue
  chosen_spanish: y no hay quien rescate
  alternatives_spanish:
  - y nadie rescata
  - y no hay rescatador
  lexicon: HALOT
  rationale: La construcción impersonal «no hay quien rescate» conserva bien la ausencia absoluta de salvador/rescatador y suena idiomática en español.
theological_decisions:
- issue: Metáfora del remanente como león dominante
  english_pob_reading: Retain the image as a statement of the remnant's overpowering strength and invincibility among the nations without specifying whether this is military, political, or eschatological in a narrower doctrinal sense.
  chosen_spanish_reading: Se mantiene la imagen del remanente como fuerza dominante e invencible entre las naciones/pueblos, sin precisar si el cumplimiento es militar, político o escatológico en sentido restringido.
  alternative_spanish_readings:
  - Interpretarlo como conquista militar específica
  - Entenderlo solo como influencia simbólica
  rationale: El hebreo ofrece un símil de dominio depredador, pero no delimita el modo de cumplimiento. La traducción debe conservar esa tensión interpretativa en vez de resolverla.
  doctrine_reference: Preservar la tensión teológica sin imponer un sistema interpretativo.
translation_notes:
  revision_awareness: Se reflejó la revisión inglesa más formal al preferir «bestias» para בְּבַהֲמוֹת יַעַר. También se mantuvo la fuerza predatoria del cierre con una solución española natural («despedaza») y se evitó suavizar el símil.
  spanish_consistency_notes:
  - Se usa «remanente» para שְׁאֵרִית, coherente con el lenguaje profético bíblico.
  - «Naciones» y «pueblos» se distinguen para reflejar בַּגּוֹיִם y עַמִּים רַבִּים.
  - Se mantiene el registro bíblico formal sin recurrir a fórmulas eclesiásticas no exigidas por el hebreo.
