revisions:
- from: Entonces la mujer fue a todo el pueblo en su sabiduría[a], y cortaron la cabeza de Seba hijo de Bicri y se la arrojaron a Joab. Entonces él tocó la trompeta, y se dispersaron de la ciudad, cada hombre a su tienda; y Joab volvió a Jerusalén al rey.
  to: Entonces la mujer fue a todo el pueblo en su sabiduría, y cortaron la cabeza de Seba hijo de Bicri y se la arrojaron a Joab. Entonces él tocó la trompeta, y se dispersaron de la ciudad, cada hombre a su tienda[a]; y Joab volvió a Jerusalén, donde estaba el rey.
  rationale: 'Se reubica la nota [a] al modismo que realmente explica y se corrige la cláusula final para que el español sea natural y claro sin alterar el sentido básico del hebreo: Joab regresó a Jerusalén, a la presencia/ubicación del rey. No se requieren cambios doctrinales ni de glosario.'
