translation:
  language: es
  text: Un perezoso se compara con un bulto de estiércol[a]; todo el que lo levante se sacudirá la mano.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, más literalmente, «ha sido arrojado junto con un bulto de estiércol», si συνεβλήθη se toma en sentido físico y no comparativo; el sentido comparativo encaja mejor con el proverbio en contexto.
    reason: lexical_alternative
lexical_decisions:
- source_word: βολβίτῳ
  english_pob_choice: a lump
  chosen_spanish: un bulto
  alternatives_spanish:
  - una masa
  - un terrón
  - un trozo
  lexicon: LSJ
  rationale: El término griego designa una masa o bulto redondeado; en este contexto, unido a κοπρίων, la imagen concreta es la de un bulto de materia sucia. «Bulto» conserva la concreción sin sonar arcaico.
- source_word: κοπρίων
  english_pob_choice: of dung
  chosen_spanish: de estiércol
  alternatives_spanish:
  - de boñiga
  - de excremento
  - de suciedad
  lexicon: LSJ
  rationale: El genitivo especifica la sustancia del bulto. «Estiércol» comunica con claridad la imagen degradante del proverbio en español y funciona de manera natural; «excremento» sería más literal pero más técnico, y «suciedad» diluye el golpe de la metáfora.
- source_word: συνεβλήθη
  english_pob_choice: is compared to
  chosen_spanish: es comparado con
  alternatives_spanish:
  - ha sido comparado con
  - fue puesto junto a
  - ha sido arrojado junto con
  lexicon: LSJ
  rationale: En este dicho sapiencial, el pasivo se entiende mejor como comparación proverbial, no como acción física. «Es comparado con» reproduce ese valor con naturalidad en español.
- source_word: ὀκνηρός
  english_pob_choice: a lazy man
  chosen_spanish: un perezoso
  alternatives_spanish:
  - un hombre perezoso
  - un holgazán
  - un indolente
  lexicon: LSJ
  rationale: El adjetivo significa perezoso, ocioso, lento. «Un perezoso» conserva el valor sustantivado y suena claro en español moderno; evita la rusticidad de «holgazán» y la rareza de «indolente».
- source_word: πᾶς ὁ ἀναιρούμενος αὐτὸν
  english_pob_choice: everyone who picks it up
  chosen_spanish: todo el que lo levante
  alternatives_spanish:
  - todo el que lo recoja
  - quien lo tome
  - todo el que lo alce
  lexicon: LSJ
  rationale: ἀναιρέω aquí significa tomar, alzar, levantar. Dado que el objeto es un bulto de estiércol, «lo levante» mantiene la imagen física y el pronombre neutro en español sigue el referente impersonal del proverbio.
- source_word: ἐκτινάξει χεῖρα
  english_pob_choice: will shake off his hand
  chosen_spanish: sacudirá su mano
  alternatives_spanish:
  - sacudirá la mano
  - se sacudirá la mano
  - sacudirá la mano limpia
  lexicon: LSJ
  rationale: El verbo sugiere sacudir para desprender algo adherido. En español, «sacudirá su mano» conserva la acción inmediata y la sensación de repulsión sin añadir un complemento que el griego no exige de forma explícita.
translation_notes:
  revision_awareness: El texto griego y el audit trail inglés concuerdan bien; la única tensión relevante es el valor de συνεβλήθη, que puede leerse físicamente o como comparación proverbial. Se optó por la lectura comparativa porque explica mejor la estructura sapiencial y coincide con la solución auditada en inglés.
  spanish_consistency_notes:
  - Se mantiene «perezoso» como sustantivo adjetival para reflejar ὀκνηρός.
  - Se usa «estiércol» en vez de un término más suave para preservar la fuerza degradante de la imagen.
  - La nota [a] conserva la alternativa literal documentada en el audit trail inglés.
  - No se introduce vocabulario eclesiástico ni doctrinal ajeno al proverbio.
