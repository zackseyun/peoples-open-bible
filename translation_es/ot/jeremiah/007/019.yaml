- from: ¿Acaso soy yo a quien ellos están provocando[a]?, declara Yahvé. ¿No son más bien ellos mismos, para la vergüenza de su propio rostro?
  to: ¿Acaso soy yo a quien ellos están provocando?, declara Yahvé. ¿No es más bien a sí mismos[a], para vergüenza de sus propios rostros?
  rationale: Se corrige la segunda cláusula para que el contraste retórico del hebreo sea gramatical y claro en español, explicitando el valor reflexivo de אֹתָם como «a sí mismos». También se mejora «פְּנֵיהֶם» con plural («sus propios rostros») y se normaliza la puntuación. Se mantiene la nota alternativa ya documentada en el audit trail inglés.
