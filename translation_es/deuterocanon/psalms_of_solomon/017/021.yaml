translation:
  language: es
  text: Los manantiales eternos[a], desde las profundidades, desde los montes altos, fueron retenidos, porque no había entre ellos quien practicara rectitud y justicia; desde su gobernante hasta el más pequeño del pueblo, todos estaban en toda clase de pecado.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «manantiales antiguos».
    reason: lexical_alternative
lexical_decisions:
- source_word: πηγαὶ
  english_pob_choice: springs
  chosen_spanish: fuentes
  alternatives_spanish:
  - manantiales
  - fuentes de agua
  lexicon: LSJ
  rationale: El griego designa brotes naturales de agua. En español, «fuentes» es claro y digno; «manantiales» también sería posible, pero «fuentes» mantiene mejor el paralelismo poético del pasaje.
- source_word: αἰώνιοι
  english_pob_choice: everlasting
  chosen_spanish: eternas
  alternatives_spanish:
  - perennes
  - antiguas
  - imperecederas
  lexicon: LSJ
  rationale: Aquí el término califica a las fuentes con un tono de duración muy fuerte. «Eternas» reproduce mejor el registro solemne del texto que una opción más naturalista como «perennes», y evita atenuar la fuerza semántica que el inglés POB finalmente adoptó.
- source_word: ἐξ ἀβύσσων
  english_pob_choice: from the depths
  chosen_spanish: de los abismos
  alternatives_spanish:
  - de las profundidades
  - desde los abismos
  - de lo profundo
  lexicon: LSJ
  rationale: «Abismos» conserva el valor de profundidad subterránea y la resonancia poética del plural griego. «De las profundidades» sería idiomático, pero menos vívido y menos marcado lexicalmente.
- source_word: ὀρέων ὑψηλῶν
  english_pob_choice: the lofty mountains
  chosen_spanish: de los montes altos
  alternatives_spanish:
  - de los altos montes
  - de las montañas altas
  - de los montes elevados
  lexicon: LSJ
  rationale: La combinación «montes altos» sigue de cerca el adjetivo griego y mantiene el paralelismo con «abismos». «Lofty» en español se expresa con naturalidad como «altos/elevados» en este contexto poético.
- source_word: συνεσχέθησαν
  english_pob_choice: were restrained
  chosen_spanish: fueron detenidas
  alternatives_spanish:
  - fueron restringidas
  - fueron contenidas
  - fueron retenidas
  lexicon: LSJ
  rationale: El pasivo expresa que las fuentes quedaron impedidas o frenadas. «Fueron detenidas» conserva la idea de ser puestas en suspensión sin introducir un mecanismo hidráulico ajeno al texto.
- source_word: ποιῶν δικαιοσύνην καὶ κρίμα
  english_pob_choice: doing righteousness and justice
  chosen_spanish: quien hiciera justicia y derecho
  alternatives_spanish:
  - quien practicara justicia y juicio
  - quien hiciera rectitud y justicia
  - quien obrara justicia y juicio
  lexicon: BDAG
  rationale: En español, «hacer justicia y derecho» conserva la pareja ética-jurídica del griego y su trasfondo semítico. «Derecho» rinde mejor κρίμα aquí que «juicio», porque el contexto no es el acto de juzgar sino la rectitud judicial/orden justo.
- source_word: ἄρχοντος
  english_pob_choice: ruler
  chosen_spanish: gobernante
  alternatives_spanish:
  - ruler
  - príncipe
  - líder
  lexicon: LSJ
  rationale: «Gobernante» funciona bien en español contemporáneo y mantiene la referencia a una cabeza política. «Ruler» sería un préstamo innecesario; «príncipe» sería más específico de lo que el griego exige.
- source_word: ἐλαχίστου
  english_pob_choice: the least
  chosen_spanish: el más pequeño
  alternatives_spanish:
  - el menor
  - el más bajo
  - el más humilde
  lexicon: LSJ
  rationale: El superlativo marca el extremo inferior de la escala social. «El más pequeño» es natural y refleja bien el contraste con el gobernante.
- source_word: ἐν πάσῃ ἁμαρτίᾳ
  english_pob_choice: in every kind of sin
  chosen_spanish: en todo tipo de pecado
  alternatives_spanish:
  - en todo pecado
  - en cada pecado
  - en toda clase de pecado
  lexicon: BDAG
  rationale: 'La idea es de totalidad distributiva: todos, sin excepción, estaban implicados. «Todo tipo de pecado» comunica esa amplitud con naturalidad en español.'
theological_decisions:
- issue: Cómo distinguir δικαιοσύνη de κρίμα en una pareja ética-jurídica
  english_pob_reading: righteousness and justice
  chosen_spanish_reading: justicia y derecho
  alternative_spanish_readings:
  - justicia y juicio
  - rectitud y justicia
  - justicia y sentencia
  rationale: 'El texto contrapone la ausencia de conducta recta en toda la sociedad. En español, «justicia y derecho» preserva la doble dimensión: ética (justicia) y jurídica/ordenada (derecho), sin colapsar ambos términos en un solo campo semántico.'
  doctrine_reference: 'DOCTRINE.md contested terms: δικαιοσύνη; κρίμα'
translation_notes:
  revision_awareness: Tomé en cuenta la revisión del inglés que corrigió la ubicación sintáctica de «restrained» y reforzó el valor solemne de αἰώνιοι. Por eso el español sitúa correctamente «fueron detenidas» con el sujeto «las fuentes» y evita una lectura ambigua de procedencia o destino.
  spanish_consistency_notes:
  - Usé «Yahvé» en otros contextos del proyecto cuando corresponde; este versículo no contiene el Tetragrámaton.
  - Mantuve una distinción funcional entre «justicia» y «derecho» para reflejar δικαιοσύνη / κρίμα.
  - Elegí un registro poético-digno, evitando calcos demasiado rígidos que oscurecieran el paralelismo del versículo.
