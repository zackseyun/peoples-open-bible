translation:
  language: es
  text: Entonces profetizaron Hageo el profeta y Zacarías hijo de Idóo, los profetas, a los judíos[a] que estaban en Judá y en Jerusalén, en nombre[b] del Dios de Israel, quien estaba sobre ellos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «a los judeanos». El término arameo puede designar al pueblo judío o, más geográficamente, a los habitantes de Judá.
    reason: lexical_alternative
  - marker: b
    text: O «por la autoridad del Dios de Israel».
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהִתְנַבִּי
  english_pob_choice: Now ... prophesied
  chosen_spanish: Y profetizaron
  alternatives_spanish:
  - Y comenzaron a profetizar
  - Entonces profetizaron
  lexicon: HALOT
  rationale: El verbo arameo narra la acción profética en pasado. En español, «profetizaron» reproduce el hecho sin añadir un matiz aspectual no exigido por el texto. Mantengo la conjunción inicial como simple continuación narrativa.
- source_word: חַגַּי
  english_pob_choice: Haggai
  chosen_spanish: Hageo
  alternatives_spanish:
  - Haggai
  lexicon: Uso bíblico tradicional en español
  rationale: El nombre del profeta tiene forma establecida en español bíblico. «Hageo» es claro y reconocible para lectura eclesial.
- source_word: נביאה
  english_pob_choice: the prophet
  chosen_spanish: el profeta
  alternatives_spanish:
  - profeta
  lexicon: HALOT
  rationale: 'La forma determinada funciona como aposición: «Hageo el profeta». En español, el artículo expresa bien esa determinación.'
- source_word: וּזְכַרְיָה בַר עִדּוֹא
  english_pob_choice: and Zechariah son of Iddo
  chosen_spanish: Zacarías hijo de Idóo
  alternatives_spanish:
  - Zacarías, hijo de Idóo
  - y Zacarías, hijo de Idóo
  lexicon: Uso bíblico tradicional en español
  rationale: «Bar» se traduce naturalmente por «hijo de». El nombre se presenta en forma usual en español bíblico. La coma es opcional; aquí la construcción fluye sin ella.
- source_word: נביאיא
  english_pob_choice: the prophets
  chosen_spanish: los profetas
  alternatives_spanish:
  - profetas
  lexicon: HALOT
  rationale: El plural de aposición resume a ambos personajes y debe conservarse. «Los profetas» mantiene el paralelo y evita perder la estructura del arameo.
- source_word: עַל יְהוּדָיֵא
  english_pob_choice: to the Jews
  chosen_spanish: a los judíos
  alternatives_spanish:
  - a los judeanos
  lexicon: HALOT
  rationale: El término puede designar al pueblo judío o, más geográficamente, a los habitantes de Judá. Dado el contexto de Esdras, «judíos» es natural y comunica bien; connota el grupo étnico-religioso sin forzar una precisión innecesaria en el cuerpo del texto.
- source_word: דִּי בִיהוּד וּבִירוּשְׁלֶם
  english_pob_choice: who were in Judah and in Jerusalem
  chosen_spanish: que estaban en Judá y en Jerusalén
  alternatives_spanish:
  - que estaban en Judea y en Jerusalén
  lexicon: HALOT
  rationale: La relativa aramea se vierte de forma directa. «Judá» es preferible aquí por el marco del período persa y porque evita anacronismos frente a «Judea». «Estaban» refleja la ubicación geográfica sin añadir interpretaciones.
- source_word: בְּשֻׁם
  english_pob_choice: in the name of
  chosen_spanish: en el nombre de
  alternatives_spanish:
  - por la autoridad de
  lexicon: HALOT
  rationale: El giro idiomático comunica representación y autoridad divina. En español, «en el nombre de» es la equivalencia más transparente y fiel.
- source_word: אֱלָהּ יִשְׂרָאֵל
  english_pob_choice: the God of Israel
  chosen_spanish: el Dios de Israel
  alternatives_spanish:
  - el Dios de Israel
  lexicon: HALOT
  rationale: La cadena constructa se traduce de forma estándar y precisa. No requiere expansión ni paráfrasis.
- source_word: עֲלֵיהוֹן
  english_pob_choice: who was over them
  chosen_spanish: que estaba sobre ellos
  alternatives_spanish:
  - sobre ellos
  - que ejercía autoridad sobre ellos
  lexicon: HALOT
  rationale: Conserva el valor de superioridad/autoridad divina que el inglés POB explicó como supervisión o autoridad sobre el pueblo. En español, la relativa hace explícito el vínculo con «el Dios de Israel» sin perder la tensión entre presencia y autoridad.
theological_decisions:
- issue: Sentido de עֲלֵיהוֹן al final del versículo
  english_pob_reading: Modifies 'the God of Israel' and conveys God's oversight/authority over the Jews.
  chosen_spanish_reading: Modifica a «el Dios de Israel» y expresa su autoridad y cuidado sobre ellos.
  alternative_spanish_readings:
  - que estaba sobre ellos
  - sobre ellos
  - que ejercía autoridad sobre ellos
  rationale: La sintaxis más probable une la frase con «el Dios de Israel». «Que estaba sobre ellos» preserva la idea de presencia soberana sin volverla exclusivamente jerárquica ni reducirla a una simple localización.
  doctrine_reference: Providencia divina; soberanía y cuidado del Dios del pacto
translation_notes:
  revision_awareness: 'Se siguió el pasaje fuente arameo con el audit trail inglés como control: se mantuvo la aposición doble («el profeta», «los profetas»), se conservaron las dos localidades («Judá» y «Jerusalén») y se reflejó el cierre teológico con una relativa que puede leerse como autoridad/cuidado sobre el pueblo. No hubo revisiones posteriores en el expediente; el pasaje permanece en alta concordancia.'
  spanish_consistency_notes:
  - Se usa «Hageo» y «Zacarías» con formas bíblicas estándar en español.
  - Se prefirió «judíos» en el texto principal y se reservó «judeanos» en nota por la alternativa lexical documentada.
  - Se mantuvo «el nombre de» como giro idiomático estable para בְּשֻׁם.
  - «Dios» se usa de forma singular y natural, conforme al hebreo/arameo y al audit trail inglés.
  - La puntuación conserva la estructura de aposición y la cláusula relativa sin sobrecargar el versículo.
