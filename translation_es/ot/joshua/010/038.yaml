review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja correctamente la secuencia narrativa hebrea: Josué y todo Israel con él regresan a Debir y combaten contra la ciudad. Sin embargo, la elección de «contra ella» no es la mejor preservación del sentido en español corriente, aunque el hebreo use pronombre femenino para la ciudad. La nota inglesa ya documenta que el femenino es gramatical, no necesariamente estilísticamente obligatorio en la lengua receptora.'
  spanish_quality_summary: 'El español es claro en general, pero la coma tras «Josué[a]» es innecesaria y entorpece el flujo. Más importante, «peleó contra ella» suena algo forzado para una ciudad en español bíblico y general; «combatió contra ella» también sería posible, pero «peleó contra ella» mantiene una personificación no requerida. Lo más natural y fiel es «peleó contra ella[a]» solo si se defiende el femenino; aun así, aquí conviene adoptar «peleó contra la ciudad» o mejor «peleó contra ella» con nota. Dado el requisito de preservar la alternativa significativa y la evidencia inglesa, la mejor solución es usar «peleó contra ella[a]» solo si la nota justifica el español. Pero como la nota inglesa explica que el inglés usa “it” idiomáticamente, en español también conviene evitar una nota que afirme positivamente que se “mantiene” el femenino como si fuera preferible. Mejor: «peleó contra ella[a]» con nota aclaratoria neutral. Además, «Entonces Josué y todo Israel con él» sin coma es
    más natural.'
  glossary_alignment: No hay términos teológicos sensibles en este versículo. «Josué» y «Debir» están bien. No aparece Yahvé ni terminología del glosario principal en disputa.
  issues:
  - severity: medium
    issue: Puntuación innecesaria después de «Josué[a]»
    rationale: En español no corresponde separar con coma el sujeto compuesto «Josué y todo Israel con él» del resto de la oración en esta estructura simple.
  - severity: medium
    issue: La nota al pie sobre «contra ella» está formulada de manera demasiado prescriptiva
    rationale: El hebreo sí usa femenino gramatical para la ciudad, pero decir que «en español se mantiene la concordancia femenina del original» sugiere que esta es la opción necesaria o superior, cuando en español también sería natural evitarla. La nota debería limitarse a explicar el hecho lingüístico.
  revised_spanish_text: Entonces Josué[a] y todo Israel con él volvió a Debir y peleó contra ella.
  revised_footnotes:
  - marker: a
    text: 'Hebreo: «contra ella», refiriéndose a la ciudad de Debir, que lleva forma gramatical femenina en hebreo.'
    reason: lexical_alternative
