review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien el hebreo y el rastro inglés: עַל־פִּי הַגּוֹרָל = «Según la suerte», תֵּחָלֵק = pasivo de reparto, y «su herencia» conserva adecuadamente el posesivo distributivo de נַחֲלָתוֹ. La nota también preserva la alternativa válida «por la suerte … entre los muchos y los pocos».'
  spanish_quality_summary: La frase es clara y natural, pero «entre el mayor y el menor» en español tiende a leerse como comparación entre dos individuos o incluso por edad/rango, no como dos grupos de distinto tamaño. «Entre el grupo mayor y el menor» mejora la legibilidad y refleja mejor el sentido distributivo del hebreo sin sobreparafrasear.
  glossary_alignment: No hay términos teológicos sensibles aquí. «Suerte» para גּוֹרָל y «herencia» para נַחֲלָה están alineados con el proyecto y con el contexto. La única mejora recomendada es precisar el contraste רַב / מְעָט para evitar ambigüedad en español.
  issues:
  - severity: medium
    issue: «entre el mayor y el menor» suena ambiguo en español
    rationale: Aunque literalmente cercano al inglés «the larger and the smaller», en español esta formulación puede entenderse como dos personas o dos entidades individuales, no como grupos de distinta magnitud en el reparto tribal. El hebreo contrasta categorías de tamaño/número.
  - severity: low
    issue: La nota al pie empieza con comilla simple innecesaria
    rationale: 'La redacción «''O: …» es tipográficamente impropia en español. Conviene normalizarla a «O: …».'
