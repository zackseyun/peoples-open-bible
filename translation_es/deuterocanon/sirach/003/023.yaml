review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador capta bien el sentido general del hebreo con apoyo del paralelo griego: una advertencia contra indagar asuntos que exceden el propio límite, seguida por la razón de que lo demasiado grande ya ha sido mostrado. Sin embargo, «no te ocupes» debilita el matiz de indagación curiosa presente en אַל תַּמֵּר y apoyado por μὴ περιεργάζου; conviene una forma más precisa como «no indagues». Además, la nota b no preserva con suficiente fidelidad la alternativa documentada en el inglés, que contrasta la posible lectura activa hebrea con la pasiva apoyada por el griego.'
  spanish_quality_summary: El español es claro y natural, pero «No te ocupes de lo que está más allá de ti» suena algo difuso y menos sapiencial que «No indagues en lo que está más allá de ti». La frase final «te ha sido mostrado» es inteligible, aunque en español bíblico-natural «se te ha mostrado» fluye mejor. Las notas necesitan alinearse mejor con las alternativas del expediente inglés y con su anclaje textual.
  glossary_alignment: No hay conflictos con la terminología doctrinal del proyecto. La principal cuestión léxica es refinar אַל תַּמֵּר / μὴ περιεργάζου hacia «indagar/investigar» en vez de «ocuparse». «Lo que está más allá de ti» y «lo que es demasiado grande para ti» son soluciones válidas y bien alineadas con el expediente.
  issues:
  - severity: medium
    issue: «No te ocupes» subtraduce el matiz de investigación o curiosidad excesiva.
    rationale: El expediente inglés eligió «Do not probe into» y la nota léxica apela al griego μὴ περιεργάζου. «Ocuparse» puede significar simplemente atender algo, no necesariamente indagarlo.
  - severity: medium
    issue: La nota b no refleja con precisión la alternativa hebrea documentada.
    rationale: La nota inglesa b dice que el hebreo también podría leerse «for you have seen many things beyond you», mientras que la nota española actual ofrece otra reformulación de la primera cláusula y luego una explicación interpretativa.
  - severity: low
    issue: «Te ha sido mostrado» es correcto, pero «se te ha mostrado» suena más idiomático en español actual.
    rationale: Ambas son fieles al pasivo apoyado por el griego; la forma pronominal pasiva perifrástica resulta más natural y eclesialmente legible.
  revised_spanish_text: No indagues[a] en lo que está más allá de ti[b], porque lo que es demasiado grande para ti se te ha mostrado.
  revised_footnotes:
  - marker: a
    text: 'O: «No investigues cosas mayores que tú». El verbo hebreo es difícil, y el paralelo griego dice: «No seas demasiado curioso en tus muchas obras».'
