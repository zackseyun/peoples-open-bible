translation:
  language: es
  text: 'Entonces el hombre, el amo de la casa, salió a su encuentro y les dijo: «No, hermanos míos, por favor no obren mal. Ya que este hombre ha entrado en mi casa, no hagan esta infamia[a]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «este acto vergonzoso» o «esta vileza». El término hebreo denota un hecho vergonzoso y moralmente escandaloso.
    reason: lexical_alternative
lexical_decisions:
- source_word: בַּעַל הַבַּיִת
  english_pob_choice: the master of the house
  chosen_spanish: el amo de la casa
  alternatives_spanish:
  - el dueño de la casa
  - el anfitrión
  - el señor de la casa
  lexicon: HALOT
  rationale: בַּעַל הַבַּיִת designa al hombre con autoridad y responsabilidad sobre la casa. En español, «amo de la casa» preserva mejor esa autoridad doméstica que «dueño»; «anfitrión» suaviza demasiado el matiz social, y «señor» puede sonar más tradicional que preciso.
- source_word: אַחַי
  english_pob_choice: my brothers
  chosen_spanish: hermanos míos
  alternatives_spanish:
  - mis hermanos
  - mis parientes
  - mis amigos
  lexicon: HALOT
  rationale: La frase es literalmente fraterna y funciona como apelación directa a los hombres del lugar. «Hermanos míos» conserva la forma vocativa y la cercanía comunitaria sin convertirla en una interpretación social más amplia que el hebreo no explicita.
- source_word: תָּרֵעוּ
  english_pob_choice: do not act wickedly
  chosen_spanish: no hagan algo malo
  alternatives_spanish:
  - no hagan lo malo
  - no obren mal
  - no actúen perversamente
  lexicon: HALOT
  rationale: El verbo expresa una prohibición moral fuerte. «Hagan algo malo» comunica el mandato de no cometer una acción moralmente reprochable, aunque en español «actúen perversamente» sería más fuerte; se evita porque puede sonar más interpretativo o excesivo para el registro general.
- source_word: נָא
  english_pob_choice: please
  chosen_spanish: por favor
  alternatives_spanish:
  - les ruego
  - les suplico
  lexicon: HALOT
  rationale: נָא añade súplica urgente. «Por favor» es el equivalente natural y digno en español moderno; «les ruego» intensifica demasiado el tono y «les suplico» añade emotividad no necesaria.
- source_word: אַחֲרֵי אֲשֶׁר בָּא ... אֶל־בֵּיתִי
  english_pob_choice: Since this man has come into my house
  chosen_spanish: Ya que este hombre ha entrado en mi casa
  alternatives_spanish:
  - puesto que este hombre ha entrado en mi casa
  - dado que este hombre ha entrado en mi casa
  - después de que este hombre ha entrado en mi casa
  lexicon: HALOT
  rationale: 'La construcción marca la circunstancia causal que agrava la ofensa: el huésped ha quedado bajo el techo del hablante. «Ya que» expresa bien esa causalidad en español; «después de que» sería más temporal que causal y no reflejaría tan bien el peso argumentativo del hebreo.'
- source_word: הַנְּבָלָה הַזֹּאת
  english_pob_choice: this disgraceful thing
  chosen_spanish: esta cosa vergonzosa
  alternatives_spanish:
  - esta vileza
  - este acto vergonzoso
  - esta acción infame
  lexicon: HALOT
  rationale: נְבָלָה denota una acción vergonzosa, moralmente escandalosa. «Cosa vergonzosa» comunica el deshonor y la repulsión moral sin volverlo excesivamente técnico; en español, «acto infame» o «vileza» serían posibles, pero pueden sonar más cargados o literarios que el hebreo exige aquí.
- source_word: וַיֵּצֵא אֲלֵיהֶם
  english_pob_choice: went out to them
  chosen_spanish: salió a ellos
  alternatives_spanish:
  - salió hacia ellos
  - salió a su encuentro
  - fue hacia ellos
  lexicon: HALOT
  rationale: La narración simple de יצא se conserva de manera directa. «Salió a ellos» sigue de cerca la estructura hebrea; «salió a su encuentro» introduce una suavización idiomática que no es necesaria.
translation_notes:
  revision_awareness: El inglés auditado corrigió una primera lectura temporal («After this man has come into my house») a una causal («Since this man has come into my house»). La versión española sigue esa revisión con «Ya que este hombre ha entrado en mi casa», manteniendo el valor argumentativo del hebreo. No se introdujeron notas textuales porque el pasaje no presenta una variante relevante en el paquete provisto.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» como norma del proyecto, pero este versículo no lo contiene.
  - Se evitó «SEÑOR» como sustituto de un nombre divino porque aquí no aparece ninguna referencia a YHWH.
  - Se preservó el matiz moral fuerte de נְבָלָה sin convertirlo en un término técnico eclesiástico.
  - La expresión vocativa «hermanos míos» conserva el tono directo del hebreo masculino plural sin ampliar innecesariamente el alcance social.
