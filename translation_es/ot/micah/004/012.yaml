translation:
  language: es
  text: Pero ellos no conocen los pensamientos de Yahvé, ni entienden su plan, porque los ha reunido como gavillas[a] a la era[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «haces de mies» o «manojos de cereal».
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «como gavillas a la era», imagen de ser reunidos para la trilla y el juicio.'
    reason: cultural_note
lexical_decisions:
- source_word: וְהֵמָּה
  english_pob_choice: But they
  chosen_spanish: Pero ellos
  alternatives_spanish:
  - Y ellos
  - Y ellos, en cambio
  lexicon: HALOT
  rationale: El pronombre explícito y el contraste del contexto piden un giro adversativo natural en español. «Pero ellos» conserva la oposición sin volver mecánica la conjunción.
- source_word: יָדְעוּ
  english_pob_choice: do not know
  chosen_spanish: no conocen
  alternatives_spanish:
  - no saben
  - no han conocido
  lexicon: HALOT
  rationale: El verbo expresa falta de conocimiento vigente. «No conocen» suena natural y conserva la fuerza relacional/intelectual del hebreo sin perder el presente de estado.
- source_word: מַחְשְׁבֹות
  english_pob_choice: thoughts
  chosen_spanish: pensamientos
  alternatives_spanish:
  - planes
  - intenciones
  lexicon: HALOT
  rationale: Se preserva la distinción léxica respecto de עֲצָה. «Pensamientos» mantiene el sentido básico del término y evita fusionarlo con «plan».
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: Se conserva el nombre divino revelado, siguiendo la política del proyecto. En español, «Yahvé» comunica el Tetragrámaton sin sustituirlo por un título.
- source_word: הֵבִינוּ
  english_pob_choice: do not understand
  chosen_spanish: ni entienden
  alternatives_spanish:
  - ni disciernen
  - ni comprenden
  lexicon: HALOT
  rationale: «Entienden» expresa con claridad la incapacidad de captar el sentido del propósito divino. La coordinación con «no conocen» mantiene el paralelismo sin sobrecargar el verso.
- source_word: עֲצָתוֹ
  english_pob_choice: his plan
  chosen_spanish: su plan
  alternatives_spanish:
  - su consejo
  - su propósito
  lexicon: HALOT
  rationale: «Plan» es la opción más clara en español moderno y conserva el matiz de intención divina. Se mantiene la distinción con «pensamientos» en la línea anterior.
- source_word: קִבְּצָם
  english_pob_choice: he has gathered them
  chosen_spanish: los ha reunido
  alternatives_spanish:
  - los ha juntado
  - los reunió
  lexicon: HALOT
  rationale: El perfecto hebreo se expresa con valor resultativo presente. «Ha reunido» traduce bien קבץ en un contexto de convocatoria para juicio.
- source_word: כֶּעָמִיר
  english_pob_choice: like sheaves
  chosen_spanish: como gavillas
  alternatives_spanish:
  - como haces de mies
  - como manojos de cereal
  lexicon: HALOT
  rationale: «Gavillas» es el equivalente agrícola más natural en español para עָמִיר y conserva la imagen de cereal cortado listo para la trilla.
- source_word: גֹּרְנָה
  english_pob_choice: to the threshing floor
  chosen_spanish: en la era
  alternatives_spanish:
  - a la era
  - hacia la era
  lexicon: HALOT
  rationale: La imagen apunta a la era de trilla. «En la era» funciona bien en español y comunica el escenario del juicio agrícola, aunque el hebreo marca dirección hacia ese lugar.
theological_decisions:
- issue: Nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: La política del POB español exige reproducir el nombre del pacto en vez de ocultarlo tras un título. «Yahvé» es la forma estándar en español para este proyecto y mantiene la audibilidad del Tetragrámaton.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יהוה / YHWH → Yahvé'
- issue: Sujeto implícito de «los ha reunido»
  english_pob_reading: The implied subject is the LORD, gathering the nations for judgment.
  chosen_spanish_reading: El sujeto implícito es Yahvé, que reúne a las naciones para juicio.
  alternative_spanish_readings:
  - Un sujeto no especificado
  - Sion como el que reúne
  rationale: El contexto inmediato contrasta el entendimiento humano con el conocimiento del designio divino; por ello, el sujeto más coherente es Yahvé. La metáfora de la era apunta a convocatoria para trilla/juicio, no a una acción meramente agrícola.
  doctrine_reference: Doctrina de la retribución/juicio divino en el contexto profético de Miqueas
translation_notes:
  revision_awareness: Coincide con el audit trail inglés en sentido, contraste y metáfora agrícola; no se detectaron revisiones aplicadas en el pasaje fuente, por lo que el español sigue la lectura estable sin introducir expansión interpretativa.
  spanish_consistency_notes:
  - Se mantuvo la distinción entre «pensamientos» y «plan» para reflejar מַחְשְׁבוֹת / עֲצָה.
  - Se usó «Yahvé» conforme a la terminología POB para יְהוָה.
  - Se prefirió un presente de estado en «no conocen / no entienden» para reflejar la vigencia del desconocimiento.
  - La imagen agrícola se conservó con vocabulario natural en español («gavillas», «era») sin perder su valor de juicio.
