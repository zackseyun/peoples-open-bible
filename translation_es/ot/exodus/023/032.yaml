translation:
  language: es
  text: No harás ningún pacto[a] con ellos ni con sus dioses[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo literalmente: «cortar un pacto».'
    reason: lexical_alternative
  - marker: b
    text: 'O, de manera más formal: «y con sus dioses».'
    reason: alternative_reading
lexical_decisions:
- source_word: לֹא
  english_pob_choice: no / not
  chosen_spanish: 'no'
  alternatives_spanish:
  - no...
  lexicon: HALOT
  rationale: La negación hebrea se expresa de forma directa con «no». Mantiene el carácter prohibitivo del mandamiento sin añadir matices que el hebreo no exige.
- source_word: תִכְרֹת
  english_pob_choice: you shall make
  chosen_spanish: harás
  alternatives_spanish:
  - cortarás
  - celebrarás
  lexicon: HALOT
  rationale: Aunque el hebreo usa el modismo literal «cortar un pacto», en español bíblico claro la forma natural es «hacer pacto». Aquí se conserva la fuerza legal del mandato con una formulación idiomática y fiel.
- source_word: לָהֶם
  english_pob_choice: with them
  chosen_spanish: con ellos
  alternatives_spanish:
  - para ellos
  lexicon: HALOT
  rationale: 'La preposición con כרת ברית en contexto de pacto se entiende mejor como relación recíproca: «con ellos». «Para ellos» no expresa el enlace de pacto.'
- source_word: וְלֵאלֹהֵיהֶם
  english_pob_choice: or with their gods
  chosen_spanish: ni con sus dioses
  alternatives_spanish:
  - y con sus dioses
  lexicon: HALOT
  rationale: En español, la coordinación negativa «ni... ni...» comunica con naturalidad el alcance distributivo del hebreo en una prohibición. «Sus dioses» conserva el plural y el contexto pagano.
- source_word: בְּרִית
  english_pob_choice: covenant
  chosen_spanish: pacto
  alternatives_spanish:
  - alianza
  - convenio
  lexicon: HALOT
  rationale: «Pacto» es el equivalente español más natural y reverente para בְּרִית en este contexto. «Alianza» puede sonar más político; «convenio» debilita el peso teológico y jurídico.
theological_decisions:
- issue: Modismo hebreo כרת ברית
  english_pob_reading: make no covenant
  chosen_spanish_reading: No harás pacto
  alternative_spanish_readings:
  - No cortarás pacto
  - No establecerás pacto
  rationale: Se conserva el valor prohibitivo del modismo sin calco mecánico. «Hacer pacto» es una equivalencia natural en español que mantiene la solemnidad jurídica del hebreo.
  doctrine_reference: 'Translation philosophy: optimal equivalence; fidelidad idiomática sin pérdida del sentido legal-teológico.'
- issue: Conjunción antes de «their gods»
  english_pob_reading: or with their gods
  chosen_spanish_reading: ni con sus dioses
  alternative_spanish_readings:
  - y con sus dioses
  rationale: 'El hebreo usa waw coordinante, pero en una prohibición la forma española más clara es negativa correlativa: «ni... ni...». Esto evita ambigüedad y preserva el sentido distributivo de la prohibición.'
  doctrine_reference: 'Translation philosophy: optimal equivalence'
translation_notes:
  revision_awareness: El testimonio inglés presenta acuerdo alto y no registra revisiones aplicadas; esta versión española sigue el mismo sentido básico, ajustando la idiomaticidad al español sin introducir cambios de contenido.
  spanish_consistency_notes:
  - Se mantiene «pacto» para בְּרִית, en línea con el uso bíblico-teológico habitual y con la decisión inglesa de «covenant».
  - Se conserva la prohibición directa en segunda persona singular futura de mandato («No harás»), que corresponde al tono legal del hebreo.
  - 'Las notas a y b reflejan las dos tensiones documentadas: el modismo literal del verbo y la posible coordinación formal con «y».'
