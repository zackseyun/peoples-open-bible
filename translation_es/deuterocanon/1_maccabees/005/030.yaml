translation:
  language: es
  text: Y cuando amaneció, alzaron los ojos y, he aquí, una gran multitud, incontable[a], llevaban escaleras y máquinas de asedio para tomar la fortaleza[b]; y combatían contra ellos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «sin número», «demasiados para contar».
    reason: lexical_alternative
  - marker: b
    text: 'Griego μηχανάς: dispositivos o máquinas de asedio usados para atacar un lugar fortificado.'
    reason: cultural_note
lexical_decisions:
- source_word: ἐγένετο ἑωθινή
  english_pob_choice: when morning came
  chosen_spanish: cuando amaneció
  alternatives_spanish:
  - cuando llegó la mañana
  - al llegar la mañana
  lexicon: LSJ
  rationale: La expresión griega funciona como transición temporal idiomática. «Cuando amaneció» conserva la naturalidad del español y el cambio de escena sin volverse explicativo.
- source_word: ἦραν τοὺς ὀφθαλμοὺς αὐτῶν
  english_pob_choice: they lifted up their eyes
  chosen_spanish: alzaron los ojos
  alternatives_spanish:
  - levantaron los ojos
  - miraron hacia arriba
  lexicon: LSJ
  rationale: Mantiene el idiomático bíblico de mirar hacia arriba, pero en español «alzaron los ojos» suena más natural y directo que una calca más pesada.
- source_word: ἰδοὺ
  english_pob_choice: behold
  chosen_spanish: he aquí
  alternatives_spanish:
  - miren
  - y he aquí
  lexicon: LSJ
  rationale: «He aquí» conserva la fuerza deíctica y la sorpresa narrativa de ἰδοὺ con registro sobrio y reconocible en español bíblico.
- source_word: λαὸς πολὺς
  english_pob_choice: a great multitude
  chosen_spanish: una gran multitud
  alternatives_spanish:
  - una multitud numerosa
  - mucha gente
  lexicon: LSJ
  rationale: «Multitud» reproduce mejor el valor colectivo y elevado del griego que «gente». «Gran» conserva la magnitud retórica del original.
- source_word: οὗ οὐκ ἦν ἀριθμός
  english_pob_choice: beyond number
  chosen_spanish: incontable
  alternatives_spanish:
  - sin número
  - más allá de todo número
  lexicon: LSJ
  rationale: El griego expresa innumerabilidad enfática. «Incontable» transmite bien esa idea en español sin perder fluidez; se evita una redundancia como «sin número» porque el verso ya ha dicho «gran multitud».
- source_word: αἴροντες κλίμακας
  english_pob_choice: carrying ladders
  chosen_spanish: llevaba escaleras
  alternatives_spanish:
  - cargaba escaleras
  - portaba escaleras
  lexicon: LSJ
  rationale: El participio describe la acción simultánea de la multitud. «Llevaba» en plural colectivo suena natural en español y mantiene el gesto preparatorio del asedio.
- source_word: μηχανὰς
  english_pob_choice: siege engines
  chosen_spanish: máquinas de asedio
  alternatives_spanish:
  - artefactos de asedio
  - máquinas de guerra
  lexicon: LSJ
  rationale: En contexto militar, μηχανάς alude a dispositivos de asalto contra fortificaciones. «Máquinas de asedio» es la opción más precisa y transparente en español; se evita un genérico como «máquinas».
- source_word: καταλαβεῖσθαι τὸ ὀχύρωμα
  english_pob_choice: to capture the stronghold
  chosen_spanish: para tomar la fortaleza
  alternatives_spanish:
  - para capturar la fortaleza
  - para apoderarse de la fortificación
  lexicon: LSJ
  rationale: El infinitivo expresa propósito. «Tomar la fortaleza» comunica bien el objetivo militar y suena natural en español, sin exagerar el término técnico «fortificación» si el contexto ya lo hace claro.
- source_word: ἐπολέμουν αὐτούς
  english_pob_choice: they were fighting against them
  chosen_spanish: combatían contra ellos
  alternatives_spanish:
  - luchaban contra ellos
  - les hacían guerra
  lexicon: LSJ
  rationale: El imperfecto presenta una acción en curso. «Combatían contra ellos» conserva ese aspecto progresivo y refleja con precisión el valor preposicional de la revisión inglesa «against».
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión inglesa más reciente, que añadió «against» en la cláusula final para precisar ἐπολέμουν αὐτούς. En español se reflejó explícitamente con «contra ellos». También se mantuvo la equivalencia idiomática para ἰδοὺ y la lectura militar de μηχανάς como «máquinas de asedio».
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando aparezca el nombre divino; este versículo no lo contiene.
  - «Mesías/Cristo» no aplica aquí.
  - Se prefirió un registro bíblico sobrio («he aquí», «fortaleza», «combatían») sin arcaísmos innecesarios.
  - «Incontable» preserva la fuerza de οὗ οὐκ ἦν ἀριθμός sin añadir explicación al cuerpo del texto.
