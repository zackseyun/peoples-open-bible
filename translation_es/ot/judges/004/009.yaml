translation:
  language: es
  text: 'Y ella dijo: «Ciertamente iré contigo. Sin embargo, el honor no será tuyo en el camino que vas a tomar, porque Yahvé venderá[a] a Sísara en mano de una mujer». Entonces Débora se levantó y fue con Barac a Quedes.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, de manera más idiomática: «Yahvé entregará a Sísara en poder de una mujer».'
    reason: lexical_alternative
lexical_decisions:
- source_word: הָלֹךְ אֵלֵךְ
  english_pob_choice: I will surely go
  chosen_spanish: Iré contigo, sí, ciertamente
  alternatives_spanish:
  - Iré sin falta contigo
  - Iré ciertamente contigo
  lexicon: HALOT
  rationale: La construcción de infinitivo absoluto + imperfecto intensifica la afirmación. En español, una repetición literal sonaría forzada; «sí, ciertamente» conserva el énfasis sin perder naturalidad.
- source_word: עִמָּךְ
  english_pob_choice: with you
  chosen_spanish: contigo
  alternatives_spanish:
  - con usted
  - con tu compañía
  lexicon: HALOT
  rationale: El sufijo de 2ms se expresa de forma natural con «contigo». Mantiene la relación directa entre Débora y Barac sin calcar la estructura hebrea.
- source_word: אֶפֶס
  english_pob_choice: Nevertheless
  chosen_spanish: pero
  alternatives_spanish:
  - sin embargo
  - no obstante
  lexicon: HALOT
  rationale: Aquí introduce una restricción o contraste con la afirmación anterior. «Pero» es breve y adecuado en español; el matiz adversativo queda reforzado por el resto de la cláusula.
- source_word: תִּפְאַרְתְּךָ
  english_pob_choice: the honor will not be yours
  chosen_spanish: el honor no será tuyo
  alternatives_spanish:
  - tu gloria no será
  - la gloria no te corresponderá
  lexicon: HALOT
  rationale: תִּפְאַרְתְּ puede referirse a gloria, honor o esplendor. En este contexto militar, «honor» comunica la idea de crédito por la victoria. Se conserva la posesión implícita con «será tuyo».
- source_word: עַל הַדֶּרֶךְ אֲשֶׁר אַתָּה הוֹלֵךְ
  english_pob_choice: on the way that you are going
  chosen_spanish: en el camino que vas recorriendo
  alternatives_spanish:
  - en el camino que vas
  - en la ruta que tomas
  lexicon: HALOT
  rationale: «Camino» mantiene la imagen hebrea y «vas recorriendo» expresa el aspecto progresivo del participio/forma verbal sin volver la frase rígida.
- source_word: בְיַד אִשָּׁה
  english_pob_choice: into the hand of a woman
  chosen_spanish: en manos de una mujer
  alternatives_spanish:
  - en la mano de una mujer
  - a una mujer
  lexicon: HALOT
  rationale: La locución hebrea denota poder o control. En español, «en manos de» es idiomático y conserva la imagen de entrega/sometimiento mejor que una formulación más literal.
- source_word: יִמְכֹּר
  english_pob_choice: will sell
  chosen_spanish: venderá
  alternatives_spanish:
  - entregará
  - pondrá en manos
  lexicon: HALOT
  rationale: Se conserva el valor léxico de «vender» que el POB inglés decidió mantener. En este contexto, la imagen de venta comunica la entrega de Sísara por Yahvé sin ocultar la tensión semántica.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  - Jehová
  lexicon: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
  rationale: Se sigue la norma del proyecto de transliterar el Tetragrámaton como «Yahvé» en el texto principal, evitando la sustitución por un título.
- source_word: וַתָּקָם
  english_pob_choice: arose
  chosen_spanish: se levantó
  alternatives_spanish:
  - se puso en pie
  - se alzó
  lexicon: HALOT
  rationale: «Se levantó» reproduce con claridad el inicio de una nueva acción narrativa y es natural en español.
- source_word: וַתֵּלֶך
  english_pob_choice: went
  chosen_spanish: fue
  alternatives_spanish:
  - se fue
  - partió
  lexicon: HALOT
  rationale: El verbo de movimiento se traduce de forma simple y fluida. La secuencia narrativa se mantiene sin añadir matices no presentes en el hebreo.
- source_word: קֶדְשָׁה
  english_pob_choice: Kedesh
  chosen_spanish: Quedes
  alternatives_spanish:
  - Cedes
  - Cades
  lexicon: HALOT
  rationale: Se translitera el topónimo con una forma habitual y legible en español bíblico.
theological_decisions:
- issue: El nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: La política del POB exige conservar el Nombre divino en transliteración. En español, «Yahvé» es la forma consistente con ese principio y evita ocultar el Tetragrámaton bajo un título.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: La entrega de Sísara «en manos de una mujer»
  english_pob_reading: the hand of a woman / hand over to a woman
  chosen_spanish_reading: en manos de una mujer
  alternative_spanish_readings:
  - a una mujer
  - por medio de una mujer
  rationale: El hebreo expresa entrega o sometimiento mediante la imagen de la mano. «En manos de una mujer» conserva la metáfora y, al mismo tiempo, permite entender que Yahvé controla el desenlace.
  doctrine_reference: Uso idiomático bíblico de בְיַד para dominio o entrega
translation_notes:
  revision_awareness: 'El inglés POB reciente mantiene el valor léxico de יִמְכֹּר con «will sell» y ofrece en nota la alternativa idiomática «hand Sisera over». El español conserva ambas dimensiones: el texto principal usa «venderá», mientras la nota recoge una formulación más idiomática. También se mantiene la transliteración del Nombre divino como «Yahvé», conforme a la política del proyecto y a la revisión establecida sin cambios en el texto inglés.'
  spanish_consistency_notes:
  - Se usa «Yahvé» de manera consistente para יְהוָה.
  - Se mantiene «honor» y no «gloria» para reflejar la elección contextual del POB inglés.
  - 'Los nombres propios se transliteran: Débora, Barac, Sísara, Quedes.'
  - Se evita el calco «mano de» cuando el español idiomático exige «en manos de».
