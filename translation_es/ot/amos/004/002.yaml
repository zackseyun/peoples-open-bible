  rationale: 'Se conserva casi todo el borrador, pero se corrige la coordinación (''y su posteridad'') y se añade la nota léxica necesaria para אַחֲרִיתְכֶן, ya preservada en el rastro inglés y útil para evitar que ''posteridad'' se lea de forma demasiado estrecha. No hace falta adjudicación adicional: la reparación es pequeña y bien sustentada por la evidencia dada.'
