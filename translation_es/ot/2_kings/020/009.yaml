revisions:
- from: 'Entonces Isaías dijo[a]: «Esta es para ti la señal de Yahvé, de que Yahvé hará la cosa que ha dicho: ¿avanzará la sombra diez pasos, o retrocederá diez pasos?»'
  to: 'Entonces Isaías dijo: «Esta será para ti la señal[a] de parte de Yahvé: que Yahvé hará lo que ha dicho. ¿Avanzará la sombra diez pasos, o retrocederá diez pasos?»'
  rationale: 'Se ajustó la redacción para lograr un español más natural y fiel: «será para ti la señal» mejora la fluidez, y «hará lo que ha dicho» expresa mejor el sentido de cumplimiento de דָּבָר sin el calco incómodo «la cosa». También se reubicó correctamente el marcador de nota para que ancle el término relevante «señal» dentro del texto, cumpliendo la disciplina de notas.'
  reviewer_model: gpt-5.4
