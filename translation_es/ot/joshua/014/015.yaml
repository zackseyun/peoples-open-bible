  glossary_alignment: No hay términos teológicos sensibles en juego. El etnónimo עֲנָקִים no exige una única forma fija en español, pero «anaceos» resulta menos común y menos legible; «anaquitas» se alinea mejor con uso bíblico español amplio y con la inteligibilidad eclesial. El resto del vocabulario concuerda con las decisiones auditadas.
