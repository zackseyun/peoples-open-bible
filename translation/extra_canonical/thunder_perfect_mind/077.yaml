translation:
  text: 'I am the silence within a voice[a].

    I am peace, and because of me war came to be.

    And I am a foreigner and a citizen.

    I am the substance, and the one who has no substance[g][f][e][d][c][b]; those
    who exist outside my association are ignorant of me.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Silence within a voice: the noun is read as ⲥⲙⲙⲟⲥ (silence); OCR shows
      ⲙⲙⲟⲥ. Thunder elsewhere juxtaposes silence and voice.'
    reason: alignment_note
  - marker: b
    text: 'Foreigner: the lemma of ⲟⲩϣⲙⲙⲱ is uncertain; "stranger" is an equally possible
      rendering.'
    reason: lexical_alternative
  - marker: c
    text: 'Essence translates Greek οὐσία (ousia). Alternatives: substance, being.'
    reason: lexical_alternative
  - marker: d
    text: Consort renders Greek συνουσία (synousia), which can denote companionship,
      association, or sexual union; "companionship" or "association" are possible.
    reason: lexical_alternative
  - marker: e
    text: '"Because of me the war came to be" follows ϣⲱⲡⲉ ⲉⲧⲃⲏⲏⲧ; the causative sense
      could also be expressed as "on account of me war occurred."'
    reason: alignment_note
  - marker: f
    text: Or 'I am the essence, and the one with the consort; those who are within
      my consort make me known.'.
    reason: previous_rendering
  - marker: g
    text: Or 'I am the peace, and because of me the war came to be.'.
    reason: previous_rendering
lexical_decisions:
- source_word: ⲁⲛⲟⲕ
  chosen: I am
  alternatives:
  - It is I
  lexicon: Layton; Crum
  rationale: Standard first-person emphatic self-identification in Thunder; retain
    anaphoric "I am" for cadence.
- source_word: ϣⲱⲥ
  chosen: voice
  alternatives:
  - sound
  lexicon: Crum
  rationale: Coptic ϣⲱⲥ commonly denotes "voice"; preserves the paradox with "silence"
    in context.
- source_word: '(ⲥ)ⲙⲙⲟⲥ (OCR: ⲙⲙⲟⲥ)'
  chosen: silence
  alternatives:
  - quiet
  - stillness
  lexicon: Crum
  rationale: Thunder frequently contrasts silence and voice; OCR likely dropped initial
    ⲥ; ⲥⲙⲙⲟⲥ = silence fits the phrase with ϣⲱⲥ.
- source_word: ϯⲣⲏⲛⲏ
  chosen: peace
  alternatives:
  - peacefulness
  lexicon: Greek loanword (eirēnē) via Coptic
  rationale: Direct loan; "peace" is the natural English equivalent and preserves
    antithesis with war.
- source_word: ⲡⲡⲟⲗⲉⲙⲟⲥ
  chosen: the war
  alternatives:
  - war
  - battle
  lexicon: Greek loanword (polemos) via Coptic
  rationale: Definite article present; "the war" sharpens the causative line "because
    of me the war came to be."
- source_word: ϣⲱⲡⲉ
  chosen: came to be
  alternatives:
  - happened
  - came about
  - was made
  lexicon: Crum
  rationale: Common verb "to come into being/occur"; "came to be" keeps the ontic
    resonance typical of Thunder.
- source_word: ⲉⲧⲃⲏⲏⲧ
  chosen: because of me
  alternatives:
  - on account of me
  - for my sake
  lexicon: Crum
  rationale: Causal preposition; pronominal sense "me" is contextually supplied by
    the first-person discourse.
- source_word: ⲟⲩϣⲙⲙⲱ
  chosen: foreigner
  alternatives:
  - stranger
  - outsider
  lexicon: Crum (uncertain reading)
  rationale: Term is uncertain due to OCR; paired antithetically with ⲣⲙⲛⲡⲟⲗⲓⲥ (citizen),
    so "foreigner/stranger" best fits the contrast.
- source_word: ⲣⲙⲛⲡⲟⲗⲓⲥ
  chosen: citizen
  alternatives:
  - man of the city
  - townsman
  lexicon: Crum; Greek loan (polis)
  rationale: Idiomatic rendering of "man of the city" as "citizen" preserves the social
    antithesis with "foreigner."
- source_word: 'ⲟⲩⲥⲓⲁ (OCR: ⲧⲟⲩⲥⲓⲁ)'
  chosen: essence
  alternatives:
  - substance
  - being
  lexicon: Greek loan (ousia) via Coptic
  rationale: Context favors a metaphysical nuance; "essence" is faithful and keeps
    the poem’s philosophical edge.
- source_word: ⲥⲩⲛⲟⲩⲥⲓⲁ
  chosen: consort
  alternatives:
  - companionship
  - company
  - association
  - co-presence
  lexicon: Greek loan (synousia) via Coptic
  rationale: Synousia can denote companionship/consorting; "consort" preserves relational
    and possibly erotic overtones common in Thunder.
- source_word: ⲣⲁⲧⲥⲟⲟⲩⲛ
  chosen: make known
  alternatives:
  - reveal
  - declare
  lexicon: Crum
  rationale: Causative ⲣⲁⲧ- + ⲥⲟⲟⲩⲛ (know) yields "cause to know"; "make known" is
    idiomatic and precise.
parallelism_check: 'Antithetical pairs maintained: peace/war and foreigner/citizen
  are explicit. The opening line keeps the paradox of silence/voice. The "essence/consort"
  portion is less strictly antithetical but preserves relational tension and leads
  into the communal line "those who are within my consort make me known." Repeated
  "I am" is retained across lines and not smoothed.'
voice_check: First-person, declarative "I am" voice preserved throughout; cadence
  kept by short, parallel clauses. Causative and relational claims are rendered plainly
  without interpretive smoothing.
alignment_risk_note: 'Overall alignment confidence is medium. Specific risks: (1)
  The first clause reads ⲙⲙⲟⲥ with ϣⲱⲥ; I resolve it as ⲥⲙⲙⲟⲥ "silence" due to Thunder’s
  known silence/voice motif and plausible OCR loss of initial ⲥ. (2) ⲟⲩϣⲙⲙⲱ is taken
  as "foreigner/stranger" by contrast with ⲣⲙⲛⲡⲟⲗⲓⲥ "citizen," but the exact lemma
  is uncertain. (3) ⲧⲟⲩⲥⲓⲁ is read as Greek οὐσία "essence" (or possibly ἐξουσία "authority"
  if OCR dropped ⲉⲝ), but I favor "essence" given the immediate appearance of ⲥⲩⲛⲟⲩⲥⲓⲁ.
  (4) The final line fragment is truncated (ⲛⲉⲧϣⲟⲟⲡ ⲛⲧⲁ...), so the translation stops
  at "make me known" without speculating beyond the extant text.'
