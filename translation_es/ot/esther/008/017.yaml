translation:
  language: es
  text: Y en toda provincia y en toda ciudad, dondequiera que llegaba la palabra del rey y su decreto, había alegría y gozo para los judíos, banquete y un buen día[a]. Y muchos de entre los pueblos de la tierra se hacían judíos[b], porque había caído sobre ellos el temor de los judíos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literalmente, 'un buen día'; es decir, un día festivo o de celebración.
    reason: lexical_alternative
  - marker: b
    text: 'O: «se declaraban judíos» o «adoptaban identidad o práctica judía»; el verbo hebreo es raro y puede indicar identificación con los judíos más que una conversión formal en un sentido técnico posterior.'
    reason: alternative_reading
lexical_decisions:
- source_word: וּ/בְ/כָל מְדִינָה וּ/מְדִינָה ... וּ/בְ/כָל עִיר וָ/עִיר
  english_pob_choice: every province ... every city
  chosen_spanish: en toda provincia y en toda ciudad
  alternatives_spanish:
  - en cada provincia y en cada ciudad
  - provincia tras provincia y ciudad tras ciudad
  lexicon: HALOT
  rationale: El hebreo usa repetición distributiva. En español, la duplicación literal sonaría torpe; «en toda ... y en toda ...» conserva el alcance universal y la distribución sin perder naturalidad.
- source_word: מְקוֹם אֲשֶׁר
  english_pob_choice: wherever
  chosen_spanish: dondequiera que
  alternatives_spanish:
  - en todo lugar donde
  - donde
  lexicon: HALOT
  rationale: La frase comprime bien el valor locativo universal del hebreo y evita una subordinación pesada.
- source_word: דְּבַר הַמֶּלֶךְ וְדָתוֹ
  english_pob_choice: the king’s word and his decree
  chosen_spanish: la palabra del rey y su decreto
  alternatives_spanish:
  - la orden del rey y su decreto
  - la palabra del rey y su edicto
  lexicon: HALOT
  rationale: «Palabra» mantiene דְּבַר sin convertirlo automáticamente en «orden»; «decreto» refleja דָּת en el lenguaje administrativo de Ester. La pareja conserva la distinción lexical del hebreo.
- source_word: מַגִּיעַ
  english_pob_choice: reached
  chosen_spanish: llegaba
  alternatives_spanish:
  - alcanzaba
  - arribaba
  lexicon: HALOT
  rationale: El participio expresa llegada o alcance efectivo. «Llegaba» es natural en español y conserva el movimiento de circulación del decreto.
- source_word: שִׂמְחָה וְשָׂשׂוֹן
  english_pob_choice: joy and gladness
  chosen_spanish: alegría y gozo
  alternatives_spanish:
  - gozo y alegría
  - alegría y regocijo
  lexicon: HALOT
  rationale: La pareja hebrea es una fórmula festiva de celebración. En español, «alegría y gozo» comunica bien el doble matiz sin forzar un calco rígido.
- source_word: מִשְׁתֶּה
  english_pob_choice: a feast
  chosen_spanish: banquete
  alternatives_spanish:
  - fiesta
  - festín
  lexicon: HALOT
  rationale: En Ester, מִשְׁתֶּה suele denotar un banquete festivo, connotación más precisa que el genérico «fiesta».
- source_word: וְ/י֣וֹם ט֑וֹב
  english_pob_choice: a good day
  chosen_spanish: día bueno
  alternatives_spanish:
  - día festivo
  - un buen día
  lexicon: HALOT
  rationale: Se preserva la literalidad de la expresión hebrea, porque el texto dice «día bueno»; en español suena algo marcado, pero es fiel y transparenta la fórmula del original. La frase admite la idea de día festivo sin sustituirla por una categoría posterior.
- source_word: רַבִּ֞ים מֵֽ/עַמֵּ֤י הָ/אָ֨רֶץ
  english_pob_choice: many from the peoples of the land
  chosen_spanish: muchos de los pueblos de la tierra
  alternatives_spanish:
  - muchos de entre los pueblos de la tierra
  - muchos de los pueblos del país
  lexicon: HALOT
  rationale: «Pueblos» preserva el plural del hebreo y evita reducirlo a una sola colectividad. «De la tierra» sigue de cerca el genitivo sin cargarlo de interpretación extra.
- source_word: מִתְיַהֲדִים
  english_pob_choice: were becoming Jews
  chosen_spanish: se estaban haciendo judíos
  alternatives_spanish:
  - se declaraban judíos
  - adoptaban identidad judía / práctica judía
  lexicon: HALOT
  rationale: El verbo es raro y la POB inglesa conserva su fuerza sin asumir la noción técnica de conversión formal. «Se estaban haciendo judíos» mantiene el proceso y deja abierta la tensión entre identificación, adopción y posible conversión.
- source_word: פַּחַד הַ/יְּהוּדִ֖ים
  english_pob_choice: the fear of the Jews
  chosen_spanish: el temor de los judíos
  alternatives_spanish:
  - el miedo a los judíos
  - el terror de los judíos
  lexicon: HALOT
  rationale: «Temor» es suficientemente amplio para miedo, pavor o respeto intimidado, y conserva el valor de la construcción sin exagerarla.
- source_word: נָפַל ... עֲלֵי/הֶם
  english_pob_choice: had fallen on them
  chosen_spanish: había caído sobre ellos
  alternatives_spanish:
  - cayó sobre ellos
  - les había sobrevenido
  lexicon: HALOT
  rationale: La idiomática hebrea de algo que «cae sobre» alguien se mantiene en español con la misma imagen.
theological_decisions:
- issue: 'Sentido de מִתְיַהֲדִים: conversión formal versus identificación con los judíos'
  english_pob_reading: were becoming Jews
  chosen_spanish_reading: se estaban haciendo judíos
  alternative_spanish_readings:
  - se declaraban judíos
  - adoptaban identidad judía / práctica judía
  rationale: El hebreo permite más de una lectura social-religiosa. La traducción no debe cerrar la cuestión como conversión técnica posterior; por eso se conserva una formulación procesual y abierta, coherente con la nota auditada en inglés.
  doctrine_reference: 'Translation philosophy §3: preservar tensiones léxicas y teológicas cuando el texto las deja abiertas'
- issue: Relación entre la celebración de los judíos y el ‘día bueno’
  english_pob_reading: a feast and a good day
  chosen_spanish_reading: banquete y día bueno
  alternative_spanish_readings:
  - banquete y día festivo
  - banquete y un buen día
  rationale: El hebreo presenta una fórmula breve y concreta. «Día bueno» puede sonar menos idiomático en español, pero precisamente por eso deja visible la literalidad del original y evita sustituirla por una equivalencia interpretativa más posterior.
  doctrine_reference: Principio de transparencia textual del People's Open Bible
translation_notes:
  revision_awareness: La versión inglesa revisada eliminó la repetición demasiado literal de ‘province and province’ / ‘city and city’ y la suavizó a ‘every province’ / ‘every city’. Esta traducción española sigue esa decisión revisada con un equivalente natural («en toda provincia y en toda ciudad») sin reintroducir una duplicación artificial.
  spanish_consistency_notes:
  - Se mantiene «judíos» en minúscula como gentilicio/identidad étnico-religiosa, acorde con uso español bíblico habitual.
  - Se conserva la pareja semántica «palabra ... decreto» para distinguir דְּבַר y דָּת en lugar de fusionarlos.
  - «Día bueno» se deja intencionalmente literal para reflejar יוֹם טוֹב sin imponer una glosa tradicional que borre la forma hebrea.
