translation:
  language: es
  text: y no lo lleva a la entrada de la tienda de reunión para ofrecerlo a Yahvé[a], aquel hombre será cortado[b] de entre su pueblo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, más literalmente, «para hacerlo para Yahvé»; aquí el hebreo usa un modismo que se refiere a presentar la ofrenda.
    reason: lexical_alternative
  - marker: b
    text: «Será cortado» es una fórmula legal cuyo castigo exacto no se especifica aquí; puede implicar exclusión de la comunidad del pacto o juicio divino directo.
    reason: alternative_reading
lexical_decisions:
- source_word: פֶּתַח
  english_pob_choice: entrance
  chosen_spanish: entrada
  alternatives_spanish:
  - portal
  - umbral
  lexicon: HALOT
  rationale: פֶּתַח nombra la abertura o acceso; en español, «entrada» es natural y transparente en el contexto del santuario. «Umbral» podría sonar más literal, pero estrecha el sentido y suena menos idiomático aquí.
- source_word: אֹהֶל מוֹעֵד
  english_pob_choice: the tent of meeting
  chosen_spanish: tabernáculo de reunión
  alternatives_spanish:
  - tienda de reunión
  - tienda del encuentro
  lexicon: HALOT
  rationale: Aunque la forma hebrea dice literalmente «tienda de reunión», en el uso bíblico esta expresión designa el santuario del desierto. «Tabernáculo de reunión» conserva la referencia cultual reconocible y comunica con claridad la función del lugar.
- source_word: יְבִיאֶנּוּ
  english_pob_choice: bring it
  chosen_spanish: lo lleva
  alternatives_spanish:
  - lo trae
  - lo presenta
  lexicon: HALOT
  rationale: El sufijo remite al animal sacrificial del contexto inmediato. «Lo lleva» expresa el acto concreto de conducir la ofrenda hacia el santuario sin cargar demasiado el texto con una interpretación adicional.
- source_word: לַעֲשׂוֹת אֹתוֹ לַיהוָה
  english_pob_choice: to offer it to Yahweh
  chosen_spanish: para ofrecerlo a Yahvé
  alternatives_spanish:
  - para hacerlo para Yahvé
  - para presentarlo a Yahvé
  lexicon: HALOT
  rationale: El hebreo dice literalmente «hacerlo para Yahvé», pero en lenguaje sacrificial עשה funciona idiomáticamente como realizar u ofrecer una ofrenda. «Ofrecerlo» transmite ese valor cultual sin perder la base textual.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: Se mantiene el nombre divino como «Yahvé», conforme al criterio del proyecto para el Tetragrámaton, en vez de sustituirlo por un título.
- source_word: וְנִכְרַת
  english_pob_choice: shall be cut off
  chosen_spanish: será cortado
  alternatives_spanish:
  - será excluido
  - será removido
  lexicon: HALOT
  rationale: כרת en este formulario legal conserva la metáfora de «ser cortado». En español, «será cortado» mantiene la tensión legal y teológica sin resolver de antemano la forma exacta del castigo.
- source_word: הָאִישׁ הַהוּא
  english_pob_choice: that man
  chosen_spanish: aquel hombre
  alternatives_spanish:
  - ese hombre
  - esa persona
  lexicon: HALOT
  rationale: El hebreo emplea una forma masculina singular legal. «Aquel hombre» conserva el tono jurídico y la referencia individual sin neutralizar el género del original.
- source_word: מֵעַמָּיו
  english_pob_choice: from his people
  chosen_spanish: de entre su pueblo
  alternatives_spanish:
  - de su pueblo
  - de entre sus gentes
  lexicon: HALOT
  rationale: La construcción indica separación de la comunidad. «De entre su pueblo» expresa mejor la idea de exclusión o apartamiento que un simple «de su pueblo».
theological_decisions:
- issue: Sentido de la pena expresada por וְנִכְרַת
  english_pob_reading: Retain the formal expression 'shall be cut off' without specifying whether this means death, excommunication, childlessness, or divine judgment.
  chosen_spanish_reading: Conservar «será cortado» sin precisar si implica muerte, expulsión de la comunidad o juicio divino directo.
  alternative_spanish_readings:
  - será muerto
  - será excluido de la comunidad
  - será destruido
  rationale: El hebreo usa una fórmula legal intencionalmente sobria. Traducirla con una sola explicación cerrada eliminaría la ambigüedad deliberada del texto y haría decir al versículo más de lo que afirma.
  doctrine_reference: Translation philosophy §3 (Preserve theological tension rather than resolve it); §6 (Readable modern Spanish without flattening theological weight)
- issue: Marco cultual de לַעֲשׂוֹת אֹתוֹ לַיהוָה
  english_pob_reading: '''to do/make it for the LORD'' is an idiom for presenting the sacrifice.'
  chosen_spanish_reading: «para ofrecerlo a Yahvé» como traducción del modismo sacrificial.
  alternative_spanish_readings:
  - para hacerlo para Yahvé
  - para prepararlo para Yahvé
  rationale: La frase hebrea no describe una mera fabricación; en contexto sacrificial se refiere a la presentación ritual de la ofrenda. En español, «ofrecerlo» comunica el acto cultual con fidelidad y claridad.
  doctrine_reference: Lexical decision on idiom preservation and cultic context
- issue: Nombre divino יהוה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: Se preserva el nombre propio divino, siguiendo la norma del proyecto, para no ocultar el Tetragrámaton bajo una sustitución titulativa.
  doctrine_reference: Project terminology default for יהוה / YHWH
- issue: Género de הָאִישׁ
  english_pob_reading: Render as 'that man' rather than a gender-neutral substitute.
  chosen_spanish_reading: «aquel hombre» en lugar de «esa persona»
  alternative_spanish_readings:
  - esa persona
  - quien
  rationale: El hebreo conserva una forma masculina singular con función legal. Mantenerla evita suavizar indebidamente la forma del texto.
  doctrine_reference: Translation philosophy §4 (Gender-accurate over gender-neutral)
translation_notes:
  revision_awareness: La revisión más reciente indicó que no se requerían cambios y que el acuerdo con la fuente era alto. Esta redacción mantiene esa línea, preservando la metáfora legal de «ser cortado» y el modismo sacrificial de «hacer/ofrecer» sin resolver ambigüedades que el hebreo deja abiertas.
  spanish_consistency_notes:
  - Se usa «Yahvé» de manera consistente para יהוה, conforme al criterio del proyecto.
  - Se conserva el valor cultual de לַעֲשׂוֹת אֹתוֹ לַיהוָה con «ofrecerlo», evitando una paráfrasis no motivada.
  - «Será cortado» mantiene la fórmula jurídica sin especificar el mecanismo de la pena.
  - «Aquel hombre» conserva el singular masculino legal del hebreo.
  - «De entre su pueblo» expresa mejor la idea de separación comunitaria que una traducción más neutra.
