translation:
  language: es
  text: 'Y cuando los dos quedaron encerrados juntos[a], Tobías se levantó de la cama y dijo: «Levántate, hermana[b], y oremos para que el Señor tenga misericordia de nosotros».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Más literalmente: «habían sido encerrados juntos» o «habían quedado encerrados juntos». La expresión alude a que la pareja quedó encerrada en la habitación.'
    reason: lexical_alternative
  - marker: b
    text: «Hermana» reproduce el vocativo griego y refleja aquí un lenguaje de parentesco afectivo para la novia, no una negación del matrimonio.
    reason: cultural_note
lexical_decisions:
- source_word: συνεκλείσθησαν
  english_pob_choice: had been shut in together
  chosen_spanish: fueron encerrados juntos
  alternatives_spanish:
  - habían sido encerrados juntos
  - fueron recluidos juntos
  - habían quedado encerrados juntos
  lexicon: LSJ
  rationale: El verbo pasivo pide una idea de encierro/reclusión en común. «Fueron encerrados juntos» conserva la pasividad y la acción de ser puestos dentro, sin perder naturalidad en español.
- source_word: ἀμφότεροι
  english_pob_choice: the two of them
  chosen_spanish: ambos
  alternatives_spanish:
  - los dos
  - los dos juntos
  - ambos dos
  lexicon: LSJ
  rationale: El griego subraya a la pareja como conjunto. «Ambos» es breve y fiel en español, y funciona bien con el contexto narrativo.
- source_word: ἀνέστη
  english_pob_choice: rose
  chosen_spanish: se levantó
  alternatives_spanish:
  - se puso de pie
  - se alzó
  - se incorporó
  lexicon: LSJ
  rationale: En español narrativo, «se levantó» transmite el gesto físico desde la cama con claridad y dignidad, sin sonar forzado.
- source_word: κλίνης
  english_pob_choice: bed
  chosen_spanish: cama
  alternatives_spanish:
  - lecho
  - cama nupcial
  lexicon: LSJ
  rationale: Aquí se trata del lecho matrimonial, pero «cama» es el equivalente más directo y comprensible; «lecho» sería más elevado y menos natural para lectura pública.
- source_word: Ἀνάστηθι
  english_pob_choice: Get up
  chosen_spanish: Levántate
  alternatives_spanish:
  - Ponte de pie
  - Levántate ya
  - Alzate
  lexicon: LSJ
  rationale: Es un imperativo inmediato y coloquial en el buen sentido, acorde con la escena. «Levántate» reproduce bien el mandato sin exageración.
- source_word: ἀδελφή
  english_pob_choice: sister
  chosen_spanish: hermana
  alternatives_spanish:
  - hermana mía
  - mi hermana
  - esposa
  lexicon: LSJ
  rationale: Se conserva el vocativo literal «hermana», porque el texto griego usa lenguaje de parentesco/afecto dentro de este contexto narrativo. No se sustituye por «esposa» para no borrar esa tensión documental.
- source_word: προσευξώμεθα
  english_pob_choice: let us pray
  chosen_spanish: oremos
  alternatives_spanish:
  - vamos a orar
  - recemos
  - oremos juntos
  lexicon: LSJ
  rationale: El subjuntivo exhortativo se expresa naturalmente con «oremos». Mantiene el valor exhortativo y el tono devocional sin añadir más de lo que dice el texto.
- source_word: ἐλεήσῃ
  english_pob_choice: may show us mercy
  chosen_spanish: nos tenga misericordia
  alternatives_spanish:
  - nos muestre misericordia
  - tenga misericordia de nosotros
  - nos sea misericordioso
  lexicon: LSJ
  rationale: «Tener misericordia» es una forma bíblica y clara en español que conserva la idea de acción compasiva dirigida hacia la pareja.
- source_word: ὁ κύριος
  english_pob_choice: the Lord
  chosen_spanish: el Señor
  alternatives_spanish:
  - el Señor Yahvé
  - Yahvé
  lexicon: LSJ
  rationale: Aunque el proyecto prefiere «Yahvé» para el nombre divino hebreo, aquí el griego dice κύριος en una oración de estilo narrativo-devocional; «el Señor» preserva la forma de referencia de la fuente griega y la fórmula de petición.
theological_decisions:
- issue: Vocativo ἀδελφή aplicado a la novia/esposa
  english_pob_reading: Render literally as 'sister' in the main text
  chosen_spanish_reading: Mantener «hermana» en el texto principal
  alternative_spanish_readings:
  - «esposa»
  - «querida esposa»
  - omitir el parentesco y decir solo «levántate»
  rationale: El griego dice literalmente «hermana». Mantenerlo preserva la peculiaridad del lenguaje de parentesco afectivo en Tobit y evita domesticar una tensión narrativa importante. La aclaración va en nota, no en el cuerpo.
  doctrine_reference: DOCTRINE.md §§1, 6
translation_notes:
  revision_awareness: El texto sigue de cerca el pasaje griego de Swete 1909 y conserva la lectura auditada del inglés POB, incluida la construcción pasiva, el mandato directo y el vocativo de parentesco. No hubo revisiones posteriores que alteraran el sentido base; el estado de revisión indica alta concordancia y sin cambios necesarios.
  spanish_consistency_notes:
  - He usado «Señor» para κύριος en correspondencia con el griego y con la oración del pasaje.
  - He mantenido el vocativo «hermana» en el cuerpo y lo he explicado en nota para no borrar la tensión léxica documentada.
  - «Oremos» conserva el matiz exhortativo del subjuntivo hortatorio sin añadir contenido interpretativo.
