translation:
  language: es
  text: 'para que esto sea una señal entre ustedes. Cuando sus hijos e hijas[a] les pregunten en el futuro[b], diciendo: «¿Qué significan para ustedes estas piedras?»[c]'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «sus hijos». Aquí el plural masculino funciona de manera representativa para la siguiente generación; por eso se traduce de forma inclusiva.'
    reason: lexical_alternative
  - marker: b
    text: 'Literalmente: «mañana». En este contexto, el hebreo usa una expresión idiomática para el tiempo venidero.'
    reason: lexical_alternative
  - marker: c
    text: 'O más literalmente: «¿Qué son estas piedras para ustedes?»'
    reason: lexical_alternative
lexical_decisions:
- source_word: לְמַעַן
  english_pob_choice: so that
  chosen_spanish: para que
  alternatives_spanish:
  - a fin de que
  - de modo que
  lexicon: HALOT
  rationale: El hebreo introduce finalidad. «Para que» expresa de manera natural y fiel la relación de propósito en español, sin endurecer la construcción.
- source_word: תִּהְיֶה
  english_pob_choice: may be
  chosen_spanish: sea
  alternatives_spanish:
  - pueda ser
  - llegue a ser
  lexicon: HALOT
  rationale: En la cláusula de propósito, el imperfecto hebreo funciona como resultado deseado. «Sea» conserva esa finalidad con una forma española sobria y adecuada.
- source_word: זֹאת
  english_pob_choice: this
  chosen_spanish: esto
  alternatives_spanish:
  - esta cosa
  - esta señal
  lexicon: HALOT
  rationale: El demostrativo femenino apunta al arreglo memorial representado por las piedras. «Esto» mantiene la deixis amplia sin especificar de más.
- source_word: אוֹת
  english_pob_choice: sign
  chosen_spanish: señal
  alternatives_spanish:
  - signo
  - señal memorial
  lexicon: HALOT
  rationale: «Señal» comunica bien la función visible y recordatoria de א֖וֹת en español bíblico contemporáneo. «Signo» también sería posible, pero «señal» suena más natural aquí.
- source_word: בְּקִרְבְּכֶם
  english_pob_choice: among you
  chosen_spanish: entre ustedes
  alternatives_spanish:
  - en medio de ustedes
  - en su medio
  lexicon: HALOT
  rationale: La expresión indica ubicación comunitaria. «Entre ustedes» es idiomática y conserva la referencia al grupo, evitando un calco rígido.
- source_word: בְּנֵיכֶם
  english_pob_choice: your children
  chosen_spanish: sus hijos
  alternatives_spanish:
  - sus hijos e hijas
  - sus descendientes
  lexicon: HALOT
  rationale: Aunque la forma hebrea es literalmente «sus hijos/varones», el contexto representativo apunta a la siguiente generación. En español, «sus hijos» preserva esa referencia genérica y coincide con el criterio de no imponer un sentido masculino exclusivo.
- source_word: מָחָר
  english_pob_choice: in time to come
  chosen_spanish: en el futuro
  alternatives_spanish:
  - más adelante
  - con el tiempo
  lexicon: HALOT
  rationale: Aquí «mañana» funciona idiomáticamente para el tiempo venidero. Siguiendo la revisión inglesa, «en el futuro» expresa con claridad el valor temporal sin perder el matiz prospectivo.
- source_word: לֵאמֹר
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - y diciendo
  - al decir
  lexicon: HALOT
  rationale: Es la fórmula quotativa que introduce el contenido de la pregunta. «Diciendo» mantiene la función textual de apertura del discurso citado.
- source_word: מָה ... לָכֶם
  english_pob_choice: What do these stones mean to you?
  chosen_spanish: ¿Qué significan para ustedes estas piedras?
  alternatives_spanish:
  - ¿Qué son para ustedes estas piedras?
  - ¿Qué les importan estas piedras?
  lexicon: HALOT
  rationale: El hebreo dice literalmente «¿Qué son estas piedras para ustedes?». En español, «¿Qué significan para ustedes estas piedras?» comunica la fuerza pragmática de preguntar por su valor o sentido, sin volverla torpe.
- source_word: הָאֲבָנִים הָאֵלֶּה
  english_pob_choice: these stones
  chosen_spanish: estas piedras
  alternatives_spanish:
  - estas piedras mismas
  - estas piedras concretas
  lexicon: HALOT
  rationale: Traducción directa del sustantivo con demostrativo. «Piedras» es una opción válida en español; aquí se mantiene para claridad y naturalidad.
theological_decisions:
- issue: Referencia generacional en בְּנֵיכֶם
  english_pob_reading: your children
  chosen_spanish_reading: sus hijos
  alternative_spanish_readings:
  - sus hijos e hijas
  - sus descendientes
  rationale: La POB inglesa trató el plural masculino hebreo de forma representativa y no restrictiva. En español, «sus hijos» mantiene esa referencia a la siguiente generación sin añadir una expansión innecesaria que el contexto no exige.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
- issue: Valor idiomático de מָחָר
  english_pob_reading: in time to come
  chosen_spanish_reading: en el futuro
  alternative_spanish_readings:
  - más adelante
  - con el tiempo
  rationale: La revisión inglesa descartó la lectura literal «tomorrow» por la idiomática futura. En español, «en el futuro» transmite ese mismo valor temporal y evita una lectura cronológica equivocada.
  doctrine_reference: Revision awareness / applied revisions
- issue: Función memorial de אוֹת
  english_pob_reading: sign
  chosen_spanish_reading: señal
  alternative_spanish_readings:
  - signo
  - señal memorial
  rationale: El texto presenta las piedras como marcador visible destinado a suscitar memoria e instrucción. «Señal» conserva esa función sin convertirla en un tecnicismo eclesiástico ajeno al hebreo.
  doctrine_reference: HALOT / context-driven semantics
translation_notes:
  revision_awareness: 'La POB inglesa revisó «when your children ask tomorrow» a «When your children ask in time to come» para reflejar el valor idiomático de מָחָר. También mantuvo una cláusula de propósito clara y una pregunta más natural en inglés. La versión española sigue esa misma línea: evita un «mañana» literal, conserva el matiz de propósito con «para que», y formula la pregunta en español idiomático sin perder la literalidad semántica.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» solo cuando el texto lo requiera; en este versículo no aparece el nombre divino.
  - Se usa «sus hijos» como término genérico para la siguiente generación, coherente con la decisión inglesa «your children».
  - Se evita «Señor» o cualquier sustitución teológica no presente en el versículo.
  - La pregunta se vierte con un verbo de significado («significan») para expresar el hebreo interrogativo de sentido relacional.
  - La puntuación separa la cláusula de propósito de la cláusula temporal, conforme a la revisión inglesa y a la sintaxis natural del español.
