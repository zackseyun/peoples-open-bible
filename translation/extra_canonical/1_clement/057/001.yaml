  note: This chapter comes from the normalized Funk 1901 OCR layer.
  verse: 1
translation:
  text: "Therefore, you who laid the foundation of the rebellion, submit yourselves to the elders and be disciplined unto repentance, bending the knees of your heart. Learn to submit, putting away the arrogant and proud self-will of your tongue. For it is better for you to be found small and esteemed within the flock of the Messiah than, while seeming preeminent, to be cast out from his hope.\n\nFor thus says all-virtuous Wisdom: “Behold, I will bring forth to you a word from my breath, and I will teach you my message. Because I called and you did not listen, and I stretched out words and you paid no attention, but made my counsels void, and disobeyed my reproofs, therefore I also will laugh at your ruin; I will rejoice when destruction comes upon you, and when sudden turmoil reaches you, and your overthrow comes like a storm, or when affliction and siege come upon you. For it shall be that when you call upon me, I will not listen to you; evil men will seek me and will not find me. For they hated wisdom, and did not choose the fear of the Lord, nor were they willing to attend to my counsels, but they mocked my reproofs. Therefore they will eat the fruits of their own way and be filled with their own ungodliness. For because they were wronging the innocent, they will be slain, and examination will destroy the ungodly; but the one who hears me will dwell, trusting in hope, and will be at rest without fear from every evil.”"
  philosophy: optimal-equivalence
status: revised
lexical_decisions:
- source_word: καταβολήν τῆς στάσεως
  chosen: laid the foundation of the uprising
  alternatives:
  - caused the revolt
  - began the dissension
  - started the sedition
  lexicon: LSJ
  rationale: καταβολή is literally a laying down/foundation; paired with στάσις it vividly depicts initiating the factional disturbance. 'Uprising' preserves the seriousness without over-specifying political revolt.
- source_word: ὑποτάγητε
  chosen: submit yourselves
  alternatives:
  - be subject
  - be subordinate
  lexicon: BDAG
  rationale: Imperative middle/passive with ecclesial force; 'submit yourselves' preserves the voluntary paraenetic tone better than a bare passive.
- source_word: πρεσβυτέροις
  chosen: elders
  alternatives:
  - presbyters
  - older men
  lexicon: BDAG
  rationale: In 1 Clement the term carries ecclesial office/respected leadership overtones in this dispute context; 'elders' is clear modern English while preserving church texture.
- source_word: παιδεύθητε εἰς μετάνοιαν
  chosen: be disciplined unto repentance
  alternatives:
  - be instructed into repentance
  - accept correction leading to repentance
  lexicon: BDAG
  rationale: παιδεύω includes training/correction/discipline, not mere teaching. 'Unto repentance' keeps the telic force of εἰς.
- source_word: κάμψαντες τὰ γόνατα τῆς καρδίας
  chosen: bending the knees of your heart
  alternatives:
  - bowing the knees of your heart
  lexicon: LSJ
  rationale: A striking metaphor that should be preserved rather than paraphrased; it conveys inward humility.
- source_word: ἀλαζόνα καὶ ὑπερήφανον ... αὐθάδειαν
  chosen: the arrogant and proud self-will
  alternatives:
  - the boastful and haughty insolence
  - the swaggering and proud stubbornness
  lexicon: BDAG
  rationale: αὐθάδεια is self-will/obstinacy; with ἀλαζών and ὑπερήφανος the phrase targets overbearing speech. 'Self-will' best captures the moral vice.
- source_word: ἐλλογίμους
  chosen: esteemed
  alternatives:
  - notable
  - accounted
  - recognized
  lexicon: LSJ
  rationale: The sense is being counted or held in regard. 'Esteemed' fits the contrast with apparent preeminence while sounding natural in English.
- source_word: ἐκβληθῆναι ἐκ τῆς ἐλπίδος αὐτοῦ
  chosen: to be cast out from his hope
  alternatives:
  - excluded from his hope
  - driven out of the hope in him
  lexicon: BDAG
  rationale: The Greek is rhetorically sharp and somewhat unusual; retaining 'cast out from his hope' preserves the warning's force and leaves the theological nuance visible for audit.
- source_word: πανάρετος σοφία
  chosen: all-virtuous Wisdom
  alternatives:
  - most virtuous Wisdom
  - Wisdom full of virtue
  lexicon: LSJ
  rationale: The epithet is elevated and personifying; 'all-virtuous' preserves the rhetorical dignity.
- source_word: προΐομαι ὑμῖν ἐμῆς πνοῆς ῥῆσιν
  chosen: I will bring forth to you a word from my breath
  alternatives:
  - I will pour out to you an utterance of my spirit
  - I will utter to you speech from my breath
  lexicon: LSJ
  rationale: The citation echoes Proverbs in a form emphasizing spoken breath. 'Word from my breath' keeps the imagery without importing later pneumatological language too strongly.
- source_word: ἐξέτεινον λόγους
  chosen: I stretched out words
  alternatives:
  - I extended my speech
  - I spoke at length
  lexicon: LSJ
  rationale: The Greek is unusual and vivid; preserving the metaphor maintains the cadence of the citation.
- source_word: ἀκύρους ἐποιεῖτε
  chosen: made ... void
  alternatives:
  - set aside
  - treated as invalid
  lexicon: BDAG
  rationale: A juridical/moral nullifying sense; 'made void' is concise and weighty.
- source_word: ἐλέγχοις
  chosen: reproofs
  alternatives:
  - rebukes
  - corrections
  lexicon: BDAG
  rationale: Keeps the wisdom-literature register and moral force.
- source_word: ἐπιγελάσομαι / καταχαροῦμαι
  chosen: I will laugh ... I will rejoice
  alternatives:
  - I will mock ... I will exult
  lexicon: LSJ
  rationale: The paired verbs intensify the judicial irony. 'Laugh' and 'rejoice' preserve the scriptural cadence of the warning citation.
- source_word: θόρυβος
  chosen: turmoil
  alternatives:
  - uproar
  - panic
  - confusion
  lexicon: BDAG
  rationale: In context of sudden calamity, 'turmoil' captures the disruptive onset without narrowing to noise alone.
- source_word: πολιορκία
  chosen: siege
  alternatives:
  - encirclement
  lexicon: LSJ
  rationale: Concrete calamity image from the source; should be retained plainly.
- source_word: κακοὶ
  chosen: evil men
  alternatives:
  - the wicked
  - evil people
  lexicon: BDAG
  rationale: Masculine plural in a representative moral sense; 'evil men' follows the project's gender-accurate policy while preserving proverbial style.
- source_word: προείλαντο
  chosen: did not choose
  alternatives:
  - did not prefer
  - did not embrace
  lexicon: LSJ
  rationale: The verb denotes deliberate choice; 'choose' is direct and clear.
- source_word: ἐμυκτήριζον
  chosen: mocked
  alternatives:
  - sneered at
  - scorned
  lexicon: BDAG
  rationale: Conveys contemptuous rejection in accessible English.
- source_word: ἀσεβείας
  chosen: ungodliness
  alternatives:
  - impiety
  - wickedness
  lexicon: BDAG
  rationale: Retains the Godward dimension of the vice better than the broader 'wickedness.'
- source_word: νηπίους
  chosen: the innocent
  alternatives:
  - little ones
  - the simple
  - infants
  lexicon: BDAG
  rationale: In this wisdom citation the sense is not literal babies but vulnerable/simple persons being wronged. 'The innocent' best fits the moral contrast and resulting judgment.
- source_word: ἐξέτασμος
  chosen: examination
  alternatives:
  - scrutiny
  - inquest
  - testing
  lexicon: LSJ
  rationale: The noun is difficult and rare; 'examination' preserves the literal sense and leaves the line's severity visible for later review rather than over-interpreting it.
- source_word: κατασκηνώσει ἐπ' ἐλπίδι πεποιθώς
  chosen: will dwell, trusting in hope
  alternatives:
  - will camp securely in hope
  - will settle in confidence upon hope
  lexicon: BDAG
  rationale: Combines settled dwelling with confidence. 'Trusting in hope' keeps both the participial nuance and the theological tone.
theological_decisions:
- issue: Rendering Χριστοῦ
  chosen_reading: the Messiah
  alternative_readings:
  - Christ
  rationale: Here Χριστός functions as a title in an ecclesial exhortation, so 'Messiah' follows project policy to translate titles where context supports it.
  doctrine_reference: 'DOCTRINE.md: Translate titles; transliterate names.'
- issue: Meaning of ἐκ τῆς ἐλπίδος αὐτοῦ
  chosen_reading: from his hope
  alternative_readings:
  - from the hope in him
  - from his promised hope
  rationale: The genitive permits more than one construal. The main text keeps the literal phrasing to preserve the warning's ambiguity rather than resolving it interpretively.
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve it.'
