  to: Y yo sé[a], mi Dios, que tú pruebas el corazón y te complaces en la rectitud. Yo, en la rectitud de mi corazón, he ofrecido voluntariamente todas estas cosas, y ahora he visto con alegría que tu pueblo[b], que está presente aquí, presenta voluntariamente sus ofrendas para ti.
  rationale: La revisión corrige el anclaje de la nota b para que coincida con la auditoría inglesa y con el hebreo הַנִּמְצְאוּ פֹה. También aclara el sentido cultual de לְהִתְנַדֶּב לָךְ con «presenta voluntariamente sus ofrendas para ti», evitando la ambigüedad reflexiva de «se ofrece a ti». Se mantiene «rectitud» y la estructura general por su buena fidelidad al original.
