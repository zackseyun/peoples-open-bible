base_translation:
  language: en
  yaml_path: translation/ot/leviticus/002/011.yaml
  text: Every grain offering that you present to Yahweh shall not be made with leaven[b][a], for you shall not burn any leaven or any honey from it as a food offering to Yahweh.
  footnotes:
  - marker: a
    text: Or 'offering by fire.' The Hebrew term refers to an offering presented on the altar by burning.
    reason: lexical_alternative
  - marker: b
    text: '''Honey'' may in ancient usage also include fruit syrup, not only bee honey.'
    reason: cultural_note
