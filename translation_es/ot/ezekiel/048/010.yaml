translation:
  language: es
  text: 'Y para estos[a], la contribución santa corresponderá a los sacerdotes: al norte, veinticinco mil de largo; al occidente, diez mil de ancho; al oriente, diez mil de ancho; y al sur, veinticinco mil de largo; y el santuario de Yahvé estará en medio de esta porción.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O «el distrito sagrado» o «la ofrenda consagrada»; hebreo: «la contribución santa», una porción apartada para uso sagrado.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וּלְאֵלֶּה
  english_pob_choice: And for these
  chosen_spanish: Y para estos
  alternatives_spanish:
  - Y para ellos
  - Y a estos
  lexicon: HALOT
  rationale: El ל con demostrativo señala asignación o destino. En español, «para estos» comunica mejor la idea de una porción reservada y asignada en el contexto de reparto territorial.
- source_word: תְּרוּמַת הַקֹּדֶשׁ
  english_pob_choice: the holy contribution
  chosen_spanish: la contribución santa
  alternatives_spanish:
  - la porción santa
  - la ofrenda santa
  - el distrito sagrado
  lexicon: HALOT
  rationale: תְּרוּמָה mantiene el matiz de contribución/ofrenda elevada, pero aquí funciona como porción territorial apartada. «Contribución santa» conserva el vínculo cultual sin convertirlo en una simple división administrativa.
- source_word: לַכֹּהֲנִים
  english_pob_choice: shall belong to the priests
  chosen_spanish: para los sacerdotes
  alternatives_spanish:
  - a los sacerdotes
  - les pertenecerá a los sacerdotes
  lexicon: HALOT
  rationale: El dativo marca destinatarios de la porción asignada. En esta construcción, el español puede expresar naturalmente la pertenencia implícita con «para los sacerdotes», sin añadir un verbo no presente en el hebreo.
- source_word: צָפוֹנָה
  english_pob_choice: on the north
  chosen_spanish: al norte
  alternatives_spanish:
  - hacia el norte
  - por el norte
  lexicon: HALOT
  rationale: Adverbio direccional en una descripción de límites. «Al norte» es la forma más natural en español para una medida perimetral.
- source_word: חֲמִשָּׁה וְעֶשְׂרִים אֶלֶף
  english_pob_choice: twenty-five thousand
  chosen_spanish: veinticinco mil
  alternatives_spanish:
  - veinticinco mil unidades
  - veinticinco mil codos
  lexicon: HALOT
  rationale: El hebreo da el número de manera directa. Como el sustantivo de medida no aparece explícito aquí, el español debe mantener la misma elipsis y dejar que el contexto determine la unidad.
- source_word: וְיָמָּה
  english_pob_choice: on the west
  chosen_spanish: al occidente
  alternatives_spanish:
  - al oeste
  - hacia el oeste
  lexicon: HALOT
  rationale: Término direccional equivalente a «hacia el mar», usado geográficamente para el oeste. «Occidente» preserva bien el registro bíblico y resulta claro en español.
- source_word: רֹחַב
  english_pob_choice: a width
  chosen_spanish: de ancho
  alternatives_spanish:
  - en anchura
  - de anchura
  lexicon: HALOT
  rationale: En medidas fronterizas, «ancho» suena más natural que una repetición técnica de «anchura». Mantiene el contraste con «de largo» para אָרֶךְ.
- source_word: וְקָדִימָה
  english_pob_choice: on the east
  chosen_spanish: al oriente
  alternatives_spanish:
  - al este
  - hacia el oriente
  lexicon: HALOT
  rationale: Dirección del lado oriental. «Oriente» conserva el tono bíblico y mantiene la simetría con «occidente».
- source_word: וְנֶגְבָּה
  english_pob_choice: on the south
  chosen_spanish: al sur
  alternatives_spanish:
  - hacia el sur
  - por el sur
  lexicon: HALOT
  rationale: Dirección del lado meridional; «al sur» es la opción más directa y natural.
- source_word: אֹרֶךְ
  english_pob_choice: a length
  chosen_spanish: de largo
  alternatives_spanish:
  - de longitud
  - en largo
  lexicon: HALOT
  rationale: Contrasta con רֹחַב. «De largo» es idiomático en español y mantiene el paralelo medible con «de ancho».
- source_word: מִקְדַּשׁ יְהוָה
  english_pob_choice: the sanctuary of Yahweh
  chosen_spanish: el santuario de Yahvé
  alternatives_spanish:
  - el santuario de Yahveh
  - el santuario del SEÑOR
  lexicon: HALOT
  rationale: מִקְדָּשׁ es «santuario». YHWH se rinde como «Yahvé» según el criterio del proyecto, conservando el nombre divino en lugar de sustituirlo por un título.
- source_word: בְּתוֹכוֹ
  english_pob_choice: in its midst
  chosen_spanish: en medio de ella
  alternatives_spanish:
  - en su centro
  - dentro de ella
  lexicon: HALOT
  rationale: El sufijo remite a la porción/área santa, de género femenino en español por «la contribución». «En medio de ella» reproduce la ubicación central del santuario dentro del lote.
theological_decisions:
- issue: Renderización del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahveh
  - SEÑOR
  rationale: El hebreo usa el Tetragrámaton de forma directa. Siguiendo la norma del proyecto, se translitera el nombre divino como «Yahvé» para preservar el nombre de pacto sin enmascararlo con un título.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Sentido de תְּרוּמַת הַקֹּדֶשׁ
  english_pob_reading: the holy contribution
  chosen_spanish_reading: la contribución santa
  alternative_spanish_readings:
  - la ofrenda santa
  - la porción santa
  - el distrito sagrado
  rationale: En la visión territorial de Ezequiel, תְּרוּמָה no se limita a una ofrenda litúrgica; designa una porción separada para uso sagrado. «Contribución santa» preserva esa tensión entre ofrenda y distrito consagrado.
  doctrine_reference: Ezequiel 48:10; lexical usage of תְּרוּמָה in consecrated allotments
- issue: Elipsis de la unidad de medida en las dimensiones
  english_pob_reading: twenty-five thousand in length / ten thousand in width
  chosen_spanish_reading: veinticinco mil de largo / diez mil de ancho
  alternative_spanish_readings:
  - veinticinco mil en longitud / diez mil en anchura
  - veinticinco mil de longitud / diez mil de anchura
  rationale: El hebreo omite la palabra equivalente a «largo» en la primera dimensión del norte, pero el contexto la exige y el paralelo con el sur la confirma. El español conserva esa economía sintáctica con formulación natural y sin añadir una unidad inexistente.
  doctrine_reference: Contextual parallelism in Ezekiel 48:10
translation_notes:
  revision_awareness: La redacción sigue de cerca el texto hebreo y la revisión auditada del inglés, manteniendo la estructura de medidas y el paralelismo norte/sur, pero adaptando el orden para un español natural. Se conserva la elipsis de la unidad de medida, se evita sustituir el nombre divino por un título, y se refleja la tensión léxica de תְּרוּמָה como porción/ofrenda territorial sagrada.
  spanish_consistency_notes:
  - Se usó «Yahvé» de manera uniforme para יְהוָה, conforme al estándar del proyecto.
  - Se mantuvo la simetría direccional con «norte / occidente / oriente / sur» para reflejar el patrón geográfico del hebreo.
  - «Contribución santa» se eligió para conservar el vínculo entre ofrenda cultual y porción territorial consagrada.
  - La frase final «en medio de ella» concuerda con «la contribución» como antecedente femenino en español.
