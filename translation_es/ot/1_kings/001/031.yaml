    rationale: Aunque intenta reflejar el modismo hebreo, en español suena truncado. «Con el rostro en tierra» preserva el sentido fuente y mejora la legibilidad.
  - severity: low
    issue: Redundancia en la nota alternativa «¡Larga vida a ... por siempre!»
    rationale: La alternativa idiomática ya expresa duración implícita; añadir «por siempre» la vuelve menos natural en español.
