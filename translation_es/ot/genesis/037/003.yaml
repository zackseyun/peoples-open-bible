review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador conserva bien el sentido básico del hebreo: Israel ama a José más que a sus hijos, la razón es que era hijo de su vejez, y le hizo una prenda especial. También mantiene correctamente ''Israel'' y ''hijos''. Sin embargo, el tratamiento de כְּתֹנֶת פַּסִּים no sigue bien el estado auditado del POB en inglés: el texto principal en inglés fue revisado a ''a richly ornamented robe'', mientras que el español deja solo ''una túnica'' y dispersa la carga semántica en notas redundantes. Eso debilita un detalle significativo del original según la decisión vigente del proyecto.'
  spanish_quality_summary: 'El español es generalmente natural y claro, pero hay problemas formales y de consistencia: hay dos notas léxicas superpuestas para la misma expresión, una anclada con marcador inexistente en la decisión léxica (''[a]'' para כְּתֹנֶת פַּסִּים) y otra en el texto con marcador ''[r]'', fuera de la secuencia esperada. Además, ''una túnica'' queda demasiado subespecificado frente al sentido adoptado por el POB auditado. Una revisión mínima puede resolverlo con un solo marcador y una redacción principal más fiel.'
  glossary_alignment: 'No hay conflicto con terminología teológica mayor del proyecto. ''Israel'', ''José'' e ''hijos'' están bien. La principal desviación es léxica: כְּתֹנֶת פַּסִּים debería reflejar en el texto principal una prenda ''ricamente ornamentada'', con nota para la alternativa tradicional ''de muchos colores'' y la incertidumbre semántica.'
  issues:
  - severity: high
    issue: El texto principal omite el valor descriptivo de כְּתֹנֶת פַּסִּים adoptado en la auditoría inglesa vigente.
    rationale: La revisión auditada cambió el inglés a 'a richly ornamented robe'. Traducir solo 'una túnica' reduce demasiado la información y no preserva la decisión lexical documentada.
  - severity: high
    issue: Las notas al pie son redundantes y están mal ancladas.
    rationale: Hay dos notas para la misma dificultad léxica, con marcadores 'a' y 'r'. El marcador '[r]' no sigue la secuencia requerida y la decisión léxica menciona 'una túnica[a]' mientras el texto tiene '[r]'. Debe haber una sola nota coherente con un marcador único presente en el texto.
  - severity: medium
    issue: '''Túnica'' puede conservarse, pero conviene explicitar el matiz ornamentado en el texto principal.'
    rationale: En español bíblico 'túnica' es aceptable para כְּתֹנֶת, pero sin adjetivo deja sin representar la incertidumbre resuelta por el POB hacia 'ricamente ornamentada'.
  revised_spanish_text: Israel amó a José más que a todos sus hijos, porque era el hijo de su vejez; y le hizo una túnica ricamente ornamentada[a].
  revised_footnotes:
  - marker: a
    text: O tradicionalmente, «una túnica de muchos colores». La expresión hebrea es incierta; puede referirse a una túnica ricamente ornamentada o a una que llegaba hasta las muñecas y los tobillos, más que específicamente a sus colores.
    reason: lexical_alternative
