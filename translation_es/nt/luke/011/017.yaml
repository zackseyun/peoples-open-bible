translation:
  language: es
  text: 'Pero él, al conocer sus pensamientos, les dijo: «Todo reino dividido contra sí mismo queda devastado, y una casa[a] cae sobre otra casa».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «hogar»; οἶκος puede significar tanto una casa física como una unidad familiar o doméstica.
    reason: lexical_alternative
lexical_decisions:
- source_word: εἰδὼς
  english_pob_choice: knowing
  chosen_spanish: al conocer
  alternatives_spanish:
  - sabiendo
  - conociendo
  lexicon: BDAG
  rationale: En contexto expresa conciencia cognitiva inmediata antes del dicho. «Al conocer» preserva la conexión participial con el verbo principal y suena natural en español.
- source_word: διανοήματα
  english_pob_choice: thoughts
  chosen_spanish: pensamientos
  alternatives_spanish:
  - razonamientos
  - intenciones
  lexicon: BDAG
  rationale: Se refiere a contenidos mentales interiores; «pensamientos» es claro y no sobreinterpreta una intención hostil específica.
- source_word: Πᾶσα βασιλεία
  english_pob_choice: Every kingdom
  chosen_spanish: Toda reino
  alternatives_spanish:
  - Cada reino
  - Todo reino
  lexicon: BDAG
  rationale: La fuerza distributiva de πᾶσα se conserva con «toda». Se evita «cada» por sonar menos proverbial. Se mantiene la referencia a un reino en sentido general.
- source_word: ἐφ’ ἑαυτὴν
  english_pob_choice: against itself
  chosen_spanish: contra sí mismo
  alternatives_spanish:
  - en conflicto consigo mismo
  - contra sí misma
  lexicon: BDAG
  rationale: El modismo con διαμερίζω expresa oposición interna, no relación espacial. En español, «contra sí mismo» reproduce el valor idiomático; el masculino concuerda con «reino».
- source_word: διαμερισθεῖσα
  english_pob_choice: divided
  chosen_spanish: dividido
  alternatives_spanish:
  - partido
  - separado
  lexicon: BDAG
  rationale: El participio presenta división interna; «dividido» es el equivalente más directo y proverbial en español.
- source_word: ἐρημοῦται
  english_pob_choice: is laid waste
  chosen_spanish: queda devastado
  alternatives_spanish:
  - queda arruinado
  - es dejado desolado
  lexicon: BDAG
  rationale: El verbo apunta a ruina/desolación más que a mera caída. «Queda devastado» conserva el resultado pasivo y la intensidad del juicio sin sonar arcaico.
- source_word: οἶκος ἐπὶ οἶκον
  english_pob_choice: a house falls upon a house
  chosen_spanish: casa cae sobre casa
  alternatives_spanish:
  - hogar cae sobre hogar
  - casa contra casa cae
  lexicon: BDAG
  rationale: El griego es comprimido y puede referirse tanto a una casa física como a una unidad familiar. «Casa» mantiene la imaginería concreta del texto; se deja abierta la posible lectura social.
- source_word: πίπτει
  english_pob_choice: falls
  chosen_spanish: cae
  alternatives_spanish:
  - se desploma
  - colapsa
  lexicon: BDAG
  rationale: «Cae» reproduce el verbo simple y el tono proverbial sin añadir matices ajenos.
theological_decisions:
- issue: Sentido de οἶκος en la segunda cláusula
  english_pob_reading: Rendered literally as 'house' rather than interpretively as 'household' in the main text.
  chosen_spanish_reading: Se traduce literalmente como «casa» en el texto principal.
  alternative_spanish_readings:
  - hogar
  - familia
  - casa/casa como unidad doméstica
  rationale: El griego usa οἶκος sin un marcador explícito que obligue al sentido social. Mantener «casa» preserva la imagen proverbial y deja abierta la aplicación a casas, hogares o facciones. La nota recoge la alternativa interpretativa.
  doctrine_reference: Translation philosophy §§1, 3, 5
translation_notes:
  revision_awareness: 'La revisión inglesa añadió el artículo en la cláusula final para mayor naturalidad: «a house falls upon a house». En español no se necesita artículo para sonar natural; la construcción proverbial se conserva con «casa cae sobre casa».'
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el texto lo requiera; aquí no aparece el nombre divino.
  - Se mantiene el registro proverbial y sobrio del original, sin explicitar el alcance interpretativo en el cuerpo del texto.
  - «Reino» se traduce con concordancia masculina para reflejar el antecedente implícito en español.
