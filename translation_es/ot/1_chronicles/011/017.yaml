translation:
  language: es
  text: 'Y David anheló y dijo[a][b]: «¿Quién me dará a beber agua del pozo de Belén que está junto a la puerta?»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, de forma más idiomática: «¡Si alguien me diera a beber agua del pozo de Belén que está junto a la puerta!»'
    reason: alternative_reading
  - marker: b
    text: La palabra hebrea traducida «pozo» también puede significar «cisterna» o «hoyo», pero aquí se refiere a una fuente de agua potable.
    reason: lexical_alternative
lexical_decisions:
- source_word: ויתאו
  english_pob_choice: longed
  chosen_spanish: anheló
  alternatives_spanish:
  - deseó
  - sintió gran deseo
  - suspiró por
  lexicon: HALOT
  rationale: El hebreo expresa un deseo intenso. «Anheló» conserva esa fuerza afectiva en español sin sonar artificial ni diluir la intensidad.
- source_word: מי
  english_pob_choice: Who will
  chosen_spanish: ¿Quién me dará... ?
  alternatives_spanish:
  - ¿Quién me daría... ?
  - Ojalá alguien me diera...
  lexicon: HALOT
  rationale: La interrogativa mantiene la forma directa del hebreo en el discurso de David. En español, el futuro «dará» reproduce bien la apertura interrogativa con valor desiderativo.
- source_word: ישקני
  english_pob_choice: give me water to drink
  chosen_spanish: me dará a beber
  alternatives_spanish:
  - me dará agua de beber
  - me hará beber
  - me ofrecerá a beber
  lexicon: HALOT
  rationale: El hiphil de שקה significa hacer beber / dar de beber. «Dará a beber» conserva el valor causativo y suena natural en español; el objeto explícito «agua» ya queda expresado más adelante.
- source_word: מים
  english_pob_choice: water
  chosen_spanish: agua
  alternatives_spanish:
  - aguas
  lexicon: HALOT
  rationale: Es la traducción directa del sustantivo común, en singular colectivo natural en español.
- source_word: מבּור
  english_pob_choice: from the well
  chosen_spanish: del pozo
  alternatives_spanish:
  - de la cisterna
  - del aljibe
  - del hoyo
  lexicon: HALOT
  rationale: בור puede ser pozo, cisterna o foso. En este contexto, la fuente de agua potable en Belén se entiende mejor como «pozo» en español, preservando la claridad contextual que la POB inglesa señaló.
- source_word: בית לחם
  english_pob_choice: Bethlehem
  chosen_spanish: Belén
  alternatives_spanish:
  - Bethlehem
  lexicon: Uso bíblico estándar
  rationale: «Belén» es el topónimo bíblico estándar en español y comunica de manera natural el lugar mencionado.
- source_word: אשר בשער
  english_pob_choice: that is by the gate
  chosen_spanish: que está junto a la puerta
  alternatives_spanish:
  - que está junto a la entrada
  - que está en la puerta
  - que está junto a la puerta de la ciudad
  lexicon: HALOT
  rationale: La cláusula relativa ubica el pozo respecto de la puerta de la ciudad. «Junto a la puerta» es claro y fiel; «puerta» conserva la referencia urbana del hebreo sin sobreexplicar.
translation_notes:
  revision_awareness: 'El pasaje coincide con el sentido y la puntuación del audit trail inglés: deseo intenso de David expresado como pregunta retórica, con la misma ambigüedad léxica de בור resuelta contextual­mente como «pozo».'
  spanish_consistency_notes:
  - Se mantuvo el nombre propio bíblico «Belén» en lugar de transliteración inglesa.
  - Se evitó «SEÑOR» u otra terminología teológica porque el versículo no contiene el Tetragrámaton ni vocabulario doctrinal sensible.
  - La puntuación con dos notas sigue el orden del audit trail inglés, preservando primero la alternativa idiomática y luego la nota léxica sobre בור.
