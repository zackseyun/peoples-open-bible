  language: en
  yaml_path: translation/ot/1_kings/018/036.yaml
  text: And it happened[a], at the offering up of the grain offering, that Elijah the prophet came near and said, “O Yahweh, God of Abraham, Isaac, and Israel, let it be known today that you are God in Israel, and that I am your servant[b], and that by your word I have done all these things.”
  footnotes:
