revisions:
- from: El temor de Dios es como un jardín de bendición[a], y lo cubre más que cualquier gloria[b].
  to: El temor de Dios es como un jardín de bendición[a], y da refugio[b] más que cualquier gloria.
  rationale: Se revisa solo la cláusula final para alinearla con la decisión auditada del POB de expresar protección/refugio en vez de mantener un «lo cubre» ambiguo y menos natural. También se pulen detalles ortográficos en la nota.
