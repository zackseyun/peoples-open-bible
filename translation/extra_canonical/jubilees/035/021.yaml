  from: on my behalf and on behalf of
  to: concerning me and concerning
  rationale: The Ge'ez preposition 'ba-enta' can mean 'on behalf of' or 'concerning/regarding'.
    In this context, Esau is asking Rebecca to command or admonish Jacob regarding
    how he treats Esau and his children. 'Concerning' or 'regarding' is clearer and
    avoids the implication that Jacob is being admonished as Esau's representative.
