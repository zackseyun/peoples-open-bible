theological_decisions:
- issue: Meaning of 'to break bread' in an early Christian gathering
  chosen_reading: Rendered idiomatically as 'to break bread' without specifying whether it refers narrowly to the Lord's Supper or more broadly to a communal meal.
  alternative_readings:
  - to celebrate the Lord's Supper
  - to share a meal
  rationale: The phrase can carry meal fellowship and eucharistic significance in Acts. The translation preserves the source idiom and theological openness rather than resolving a denominationally contested nuance not made explicit by the text.
  doctrine_reference: Preserve theological tension rather than resolve it.
