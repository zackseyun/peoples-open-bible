lexical_decisions:
- source_word: כּוֹס
  english_pob_choice: little owl
  chosen_spanish: lechuza chica
  alternatives_spanish:
  - búho pequeño
  - lechuza
  - mochuelo
  lexicon: HALOT
  rationale: El hebreo nombra un ave de presa nocturna dentro de la lista de aves impuras. Como la identificación zoológica precisa es incierta, mantengo una equivalencia tradicional y diferenciada en español. «Lechuza chica» conserva la idea de un tipo de búho/lechuza sin afirmar una especie exacta.
- source_word: יַנְשׁוּף
  english_pob_choice: great owl
  chosen_spanish: lechuza grande
  alternatives_spanish:
  - búho grande
  - búho cornudo
  - ibis
  lexicon: HALOT
  rationale: El término parece referirse a un ave nocturna en este contexto alimentario. «Lechuza grande» sigue la decisión inglesa de distinguirla de los otros dos nombres del versículo y evita una identificación más precisa de la que el texto permite.
- source_word: תִּנְשָׁמֶת
  english_pob_choice: white owl
  chosen_spanish: lechuza blanca
  alternatives_spanish:
  - lechuza común
  - búho
  - búho blanco
  lexicon: HALOT
  rationale: En esta lista de aves, el sustantivo funciona como nombre de un ave. «Lechuza blanca» reproduce la diferenciación tradicional del POB en inglés y refleja la incertidumbre taxonómica sin neutralizar el rasgo distintivo sugerido por la traducción inglesa.
- source_word: אֶת
  english_pob_choice: '[not translated]'
  chosen_spanish: '[no se traduce]'
  lexicon: gramática hebrea
  rationale: Marcador de objeto directo sin equivalente independiente en español.
- source_word: וְ
  english_pob_choice: and
  chosen_spanish: y
  alternatives_spanish:
  - e
  lexicon: gramática hebrea
  rationale: Conjunción coordinante que enlaza los miembros de la lista.
- source_word: הַ
  english_pob_choice: the
  chosen_spanish: la
  alternatives_spanish:
  - el
  lexicon: gramática hebrea
  rationale: Artículo definido que en español ayuda a presentar cada ave como miembro de la categoría listada.
theological_decisions:
- issue: Identificación precisa de las aves impuras
  english_pob_reading: The precise identification of these bird names is uncertain. Traditional and modern translations differ, often rendering them as various kinds of owls.
  chosen_spanish_reading: La identificación precisa de estos nombres de aves es incierta; en esta lista se expresan como tipos de lechuza/búho.
  alternative_spanish_readings:
  - Son especies exactas y distintas de aves conocidas.
  - Conviene uniformarlas simplemente como ‘búhos’.
  rationale: El hebreo y la nota inglesa señalan incertidumbre léxica. La traducción española conserva esa tensión con nombres tradicionales diferenciados, sin resolver artificialmente la especie exacta.
  doctrine_reference: principio de transparencia textual y cautela exegética
translation_notes:
  revision_awareness: El inglés POB revisado mantiene alta concordancia y no introduce cambios; la traducción española sigue esa línea, preservando la lista tripartita y la nota de incertidumbre taxonómica.
  spanish_consistency_notes:
  - Se usa «lechuza» de manera consistente para los tres nombres de aves, con modificadores diferenciadores para reflejar la lista hebrea.
  - Se evita «SEÑOR» o terminología teológica ajena al versículo, porque el texto es una lista zoológica.
  - Se mantiene puntuación de lista y cierre con punto y coma, acorde con el tono enumerativo del pasaje.
