id: ISA.63.14
reference: Isaiah 63:14
source:
  edition: WLC
  text: כַּ/בְּהֵמָה֙ בַּ/בִּקְעָ֣ה תֵרֵ֔ד ר֥וּחַ יְהוָ֖ה תְּנִיחֶ֑/נּוּ כֵּ֚ן נִהַ֣גְתָּ עַמְּ/ךָ֔ לַ/עֲשׂ֥וֹת לְ/ךָ֖ שֵׁ֥ם תִּפְאָֽרֶת׃
translation:
  text: Like livestock going down into the valley[a], the Spirit of Yahweh gave them rest; so you led your people[c][b], to make for yourself a glorious name.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the wind of the LORD gave him rest.' Hebrew רוּחַ can mean 'spirit,' 'wind,' or 'breath,' though 'Spirit' best fits the context here.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'gave him rest'; the singular likely refers to Israel as a people considered collectively. Some translations render 'gave them rest.'
    reason: alternative_reading
  - marker: c
    text: Or 'a name of glory.'
    reason: lexical_alternative
lexical_decisions:
- source_word: כַּבְּהֵמָה
  chosen: Like livestock
  alternatives:
  - Like cattle
  - Like beasts
  lexicon: HALOT
  rationale: בְּהֵמָה here is a collective animal term; 'livestock' is natural modern English and fits the simile without implying wild animals.
- source_word: בַּבִּקְעָה
  chosen: into the valley
  alternatives:
  - in the valley
  - on the plain
  lexicon: HALOT
  rationale: בִּקְעָה can denote a valley plain or broad valley. With ירד ('go down'), 'into the valley' best captures the motion and terrain.
- source_word: תֵרֵד
  chosen: going down
  alternatives:
  - descends
  - goes down
  lexicon: HALOT
  rationale: 'The imperfect verb in the simile is rendered with an English participial phrase for smooth idiomatic comparison: ''Like livestock going down...''.'
- source_word: רוּחַ יְהוָה
  chosen: the Spirit of the LORD
  alternatives:
  - the wind of the LORD
  - the breath of the LORD
  lexicon: HALOT
  rationale: In this salvation-history context, רוּחַ is best taken as God's Spirit rather than impersonal wind. Per doctrine, יְהוָה is rendered 'the LORD'.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: תְּנִיחֶנּוּ
  chosen: gave him rest
  alternatives:
  - led him to rest
  - caused him to rest
  - settled him
  lexicon: HALOT
  rationale: Hiphil of נוח commonly means 'cause to rest' or 'give rest.' 'Gave him rest' is concise and idiomatic. The 3ms suffix most naturally refers back to the people conceived corporately (Israel), hence 'him' rather than pluralizing.
- source_word: כֵּן
  chosen: so
  alternatives:
  - thus
  - in this way
  lexicon: HALOT
  rationale: Marks the comparison's conclusion; 'so' is the most natural connective in modern English.
- source_word: נִהַגְתָּ
  chosen: you led
  alternatives:
  - you guided
  - you drove
  lexicon: HALOT
  rationale: The verb denotes leading/guiding. 'Led' matches the exodus/wilderness motif and avoids overreading coercion.
- source_word: עַמְּךָ
  chosen: your people
  alternatives:
  - your nation
  lexicon: HALOT
  rationale: עַם in covenant context is best rendered 'people,' preserving the relational sense.
- source_word: לַעֲשׂוֹת לְךָ
  chosen: to make for yourself
  alternatives:
  - to make for you
  - to establish for yourself
  lexicon: HALOT
  rationale: The infinitive expresses purpose/result. 'For yourself' reflects the dative pronoun and preserves divine self-glorification language without awkwardness.
- source_word: שֵׁם תִּפְאָרֶת
  chosen: a glorious name
  alternatives:
  - a name of glory
  - a beautiful name
  - a renowned name
  lexicon: HALOT
  rationale: The construct phrase denotes a name characterized by splendor/glory. 'A glorious name' is idiomatic and preserves the honorific sense.
