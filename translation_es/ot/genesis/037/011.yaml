  - severity: low
    issue: «en su memoria» suena poco idiomático
    rationale: Aunque comprensible, esta formulación resulta más rígida y menos natural en español bíblico contemporáneo que «en mente» o «tuvo presente», y el hebreo apunta a retener el asunto en consideración.
