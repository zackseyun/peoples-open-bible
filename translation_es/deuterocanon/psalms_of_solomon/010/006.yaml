review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien el sentido básico del griego: mantiene la predicación enfática inicial, conserva la dupla semántica de δίκαιος/ὅσιος, refleja κρίμασιν como «juicios», y traduce adecuadamente la segunda cola sobre la alabanza de Israel. Sin embargo, «Yahvé nuestro» no representa bien ὁ Κύριος ἡμῶν en español natural; la posesión debe recaer sobre «Señor» si se usara, o expresarse como «nuestro Dios/Yahvé» solo con base suficiente, que aquí no existe. Dado el lineamiento del proyecto, conviene mantener «Yahvé» pero sin el posesivo pospuesto antinatural.'
  spanish_quality_summary: 'El texto es mayormente claro y digno, pero «Yahvé nuestro» suena forzado y poco idiomático en español eclesial general. Además, la nota al pie actual no ayuda: propone una variante aún menos natural («nuestro Yahvé»), y no corresponde a la nota inglesa, que documenta la alternativa sintáctica principal, no una reubicación posesiva. «Justo» resulta más natural y teológicamente estable que «recto» para δίκαιος aplicado a Dios en este contexto.'
  glossary_alignment: Buen alineamiento general con la política del proyecto al usar «Yahvé» por κύριος como título divino. «Santo», «juicios», «alabará» y «con alegría» encajan bien. Recomiendo ajustar δίκαιος a «justo» por uso bíblico-teológico más estándar en español, y eliminar el posesivo con «Yahvé» para evitar una construcción no idiomática.
  issues:
  - severity: high
    issue: «Yahvé nuestro» es una construcción poco fiel y poco natural para Κύριος ἡμῶν
    rationale: El griego dice «nuestro Señor». La política de proyecto favorece «Yahvé» por κύριος divino, pero trasladar mecánicamente ἡμῶν a «Yahvé nuestro» produce español torpe y no ampliamente legible. Es mejor omitir el posesivo aquí para preservar naturalidad sin añadir una formulación extraña.
  - severity: medium
    issue: La nota al pie no refleja la alternativa real documentada en la auditoría inglesa
    rationale: La nota inglesa conserva la alternativa de orden sintáctico («Our Lord is righteous and holy»), no una variante con posesivo desplazado. La nota española debe corresponder a esa alternativa y anclarse al segmento pertinente.
  - severity: medium
    issue: «Recto» para δίκαιος es posible, pero «justo» es más natural y bíblicamente reconocible en español
    rationale: En predicación sobre Dios, «justo y santo» preserva bien la dimensión moral/judicial y suena más idiomático que «recto y santo» para lectores eclesiales amplios.
  revised_spanish_text: Justo y santo es Yahvé en sus juicios para siempre[a], e Israel alabará el nombre de Yahvé con alegría.
  revised_footnotes:
  - marker: a
    text: 'O: «Yahvé es justo y santo en sus juicios para siempre».'
    reason: previous_rendering
  revision_rationale: Se corrige la construcción antinatural «Yahvé nuestro», se ajusta δίκαιος a «justo» por mejor legibilidad y registro bíblico en español, se mantiene el orden enfático del griego, y se reemplaza la nota por una alternativa sintáctica que sí corresponde al historial de auditoría inglesa. También se usa «e Israel» por eufonía ante palabra que inicia con sonido /i/.
