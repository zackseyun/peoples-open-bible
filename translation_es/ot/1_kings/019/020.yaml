base_translation:
  language: en
  yaml_path: translation/ot/1_kings/019/020.yaml
  text: So he left the oxen and ran after Elijah and said[a], “Please let me kiss my father and my mother, and then I will go after you.” And he said to him, “Go back[b], for what have I done to you?”
  footnotes:
  - marker: a
    text: Or, more generally, “Please let me bid farewell to my father and my mother.” The Hebrew verb is literally “kiss.”
    reason: lexical_alternative
  - marker: b
    text: Elijah’s reply is difficult and may mean, “Go back, for what have I done for you?” or function as an elliptical way of leaving the decision with Elisha.
    reason: alternative_reading
