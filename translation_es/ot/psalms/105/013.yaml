lexical_decisions:
- source_word: וַיִּתְהַלְּכוּ
  english_pob_choice: they wandered
  chosen_spanish: andaban
  alternatives_spanish:
  - vagaban
  - iban de un lugar a otro
  - anduvieron
  lexicon: HALOT
  rationale: El hitpael de הלך aquí expresa movimiento repetido o itinerante. «Andaban» conserva el valor de desplazamiento continuo y suena natural en español bíblico sin forzar una imagen demasiado moderna.
- source_word: מִגּוֹי אֶל גּוֹי
  english_pob_choice: from nation to nation
  chosen_spanish: de nación en nación
  alternatives_spanish:
  - de pueblo en pueblo
  - de una nación a otra
  lexicon: HALOT
  rationale: «Nación» mantiene el paralelismo y el sentido de grupo político-étnico que tiene גּוֹי. La repetición «de... en...» reproduce bien la estructura distributiva del hebreo.
- source_word: מִמַּמְלָכָה
  english_pob_choice: from one kingdom
  chosen_spanish: de un reino
  alternatives_spanish:
  - de reino
  - de un reino a otro
  lexicon: HALOT
  rationale: En español, el patrón coordinado queda claro con «de un reino a otro pueblo», aunque el hebreo no expresa explícitamente el primer «uno». Se conserva así la progresión paralela sin añadir más de lo necesario.
- source_word: אֶל עַם אַחֵר
  english_pob_choice: to another people
  chosen_spanish: a otro pueblo
  alternatives_spanish:
  - a otra gente
  - a otra nación
  lexicon: HALOT
  rationale: «Pueblo» refleja bien עַם como grupo social o étnico y permite distinguirlo de מַמְלָכָה ('reino'). «Otro» traduce אַחֵר con naturalidad y sin perder la oposición paralela.
translation_notes:
  revision_awareness: El borrador sigue de cerca el hebreo masorético y el rastro auditado en inglés, conservando la imagen de desplazamiento repetido y la paralelismo nación/reino/pueblo. No se registran revisiones posteriores en el expediente.
  spanish_consistency_notes:
  - Se evita «SEÑOR» porque este versículo no contiene el nombre divino.
  - «Nación», «reino» y «pueblo» se usan de manera diferenciada para respetar גּוֹי, מַמְלָכָה y עַם.
  - La nota alternativa se limita a una variante sintáctica cercana al inglés POB, sin introducir una paráfrasis amplia.
