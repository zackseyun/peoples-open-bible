  yaml_path: translation/ot/2_chronicles/034/026.yaml
  text: 'But to the king of Judah[a], who sent you to inquire of Yahweh, thus you shall say to him: ‘Thus says Yahweh, the God of Israel: Regarding the words that you have heard—’'
