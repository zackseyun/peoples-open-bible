translation:
  language: es
  text: un corazón que maquina planes perversos[a], pies que se apresuran a correr hacia el mal,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «un corazón que trama planes perversos».'
    reason: alternative_reading
lexical_decisions:
- source_word: לֵב
  english_pob_choice: heart
  chosen_spanish: corazón
  alternatives_spanish:
  - mente
  lexicon: HALOT
  rationale: לֵב nombra el centro interior de la persona, incluyendo pensamiento y voluntad. «Corazón» conserva esa imagen antropológica hebrea mejor que reducirlo a «mente».
- source_word: חֹרֵשׁ
  english_pob_choice: devises
  chosen_spanish: maquina
  alternatives_spanish:
  - trama
  - proyecta
  lexicon: HALOT
  rationale: En este uso figurado, חרשׁ expresa idear o planear en secreto. «Maquina» comunica actividad intencional y encaja bien con «planes» sin volver el texto excesivamente interpretativo.
- source_word: מַחְשְׁבוֹת
  english_pob_choice: plans
  chosen_spanish: planes
  alternatives_spanish:
  - pensamientos
  - maquinaciones
  lexicon: HALOT
  rationale: El sustantivo puede abarcar pensamientos, dispositivos o planes. «Planes» refleja la formación deliberada de una intención y mantiene la naturalidad en español.
- source_word: אָוֶן
  english_pob_choice: wicked
  chosen_spanish: perversos
  alternatives_spanish:
  - malvados
  - malos
  - iniquos
  lexicon: HALOT
  rationale: אָוֶן puede expresar maldad, iniquidad o daño. «Perversos» preserva el sentido moral negativo sin repetir inmediatamente «mal» en la segunda mitad del versículo.
- source_word: רַגְלַיִם
  english_pob_choice: feet
  chosen_spanish: pies
  lexicon: HALOT
  rationale: Se conserva la imagen corporal literal del hebreo, donde los miembros del cuerpo son personificados como instrumentos de conducta.
- source_word: מְמַהֲרוֹת
  english_pob_choice: hurry
  chosen_spanish: se apresuran
  alternatives_spanish:
  - corren presurosos
  - se dan prisa
  lexicon: HALOT
  rationale: El participio comunica prisa o diligencia. «Se apresuran» es natural en español y conserva el sentido activo de movimiento veloz.
- source_word: לָרוּץ
  english_pob_choice: to run
  chosen_spanish: a correr
  alternatives_spanish:
  - para correr
  lexicon: HALOT
  rationale: El infinitivo se puede rendir de forma literal con «correr», manteniendo la imagen de movimiento rápido hacia el mal.
- source_word: לָרָעָה
  english_pob_choice: to evil
  chosen_spanish: hacia el mal
  alternatives_spanish:
  - al mal
  - para el mal
  - hacia la perversidad
  lexicon: HALOT
  rationale: La preposición más el sustantivo se expresa naturalmente como dirección «hacia el mal». Esto preserva la compacidad hebrea sin añadir la idea explícita de hacer mal que no está en la forma básica del texto.
translation_notes:
  revision_awareness: La versión española sigue de cerca el texto hebreo de Proverbios 6:18 y el criterio auditado de la POB en inglés, conservando la imagen corporal («corazón», «pies») y la fuerza del verbo figurado («maquina» / «trama») sin ampliar el sentido más allá del original. No se introdujeron cambios respecto del último pase auditado porque el acuerdo fue alto y no había revisiones aplicadas.
  spanish_consistency_notes:
  - Se mantiene «corazón» para לֵב en coherencia con la antropología bíblica hebrea.
  - «Perversos» evita duplicar «mal» en ambas cláusulas y conserva la carga moral de אָוֶן.
  - La secuencia «a correr hacia el mal» preserva la estructura compacta y direccional del hebreo.
