  text: כִּ֤י נֹ֨כַח עֵינֵ֣י יְ֭הוָה דַּרְכֵי אִ֑ישׁ וְֽ/כָל מַעְגְּלֹתָ֥י/ו מְפַלֵּֽס׀־־׃
base_translation:
  language: en
  yaml_path: translation/ot/proverbs/005/021.yaml
  text: For a man's ways are before the eyes of Yahweh[a], and he watches all his paths.
  footnotes:
  - marker: a
    text: Or 'he weighs all his paths.' The Hebrew verb can carry the sense of measuring or assessing a course.
    reason: lexical_alternative
