translation:
  language: es
  text: 'Yahvé[a] habló a Moisés en el desierto de Sinaí, diciendo:'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «YHWH»; tradicionalmente se traduce «el SEÑOR».'
    reason: alternative_reading
lexical_decisions:
- source_word: וַיְדַבֵּר
  english_pob_choice: spoke
  chosen_spanish: habló
  alternatives_spanish:
  - habló
  - dijo
  lexicon: HALOT
  rationale: El perfecto narrativo de דבר introduce una fórmula de discurso. En español, 'habló' conserva el valor verbal de una acción de habla formal y encaja bien con la fórmula bíblica 'habló ... diciendo'. 'Dijo' es posible, pero menos preciso para reproducir la estructura del hebreo.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  - el SEÑOR
  lexicon: HALOT
  rationale: El Tetragrámaton se vierte como el nombre propio divino, no como un título sustitutorio. 'Yahvé' preserva la decisión doctrinal y es la forma usual en español para este proyecto.
- source_word: אֶל
  english_pob_choice: to
  chosen_spanish: a
  alternatives_spanish:
  - hacia
  - para
  lexicon: HALOT
  rationale: La preposición marca el destinatario del habla. En español natural, 'a Moisés' expresa esa relación de manera directa y fiel.
- source_word: מֹשֶׁה
  english_pob_choice: Moses
  chosen_spanish: Moisés
  alternatives_spanish:
  - Moisés
  lexicon: HALOT
  rationale: Nombre propio estándar en español.
- source_word: בְּמִדְבַּר
  english_pob_choice: in the wilderness of
  chosen_spanish: en el desierto de
  alternatives_spanish:
  - en el desierto de
  - en la tierra de desierto de
  lexicon: HALOT
  rationale: '''מִדְבָּר'' puede traducirse por ''desierto'' o ''wilderness''. En español bíblico, ''desierto'' comunica de forma natural el lugar de tránsito y estepa del Sinaí; aquí no se pierde un matiz teológico necesario.'
- source_word: סִינַי
  english_pob_choice: Sinai
  chosen_spanish: Sinaí
  alternatives_spanish:
  - Sinaí
  lexicon: HALOT
  rationale: Transliteración estándar del topónimo.
- source_word: לֵאמֹר
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - diciendo
  - y dijo
  lexicon: HALOT
  rationale: El infinitivo constructo funciona como fórmula introductoria de cita. 'Diciendo' preserva esa relación sintáctica y anuncia que sigue el contenido del discurso.
theological_decisions:
- issue: Representación del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Jehová
  - el SEÑOR
  rationale: La fuente hebrea usa directamente el Tetragrámaton. Se mantiene como nombre propio divino en español para no sustituirlo por un título y conservar la referencia al nombre del pacto.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
translation_notes:
  revision_awareness: Se corrigió el problema de validación anterior incorporando el marcador [a] directamente en el texto español, anclado a 'habló'. No se añadieron notas sin anclaje.
  spanish_consistency_notes:
  - Se mantiene la fórmula narrativa breve y reverente del hebreo.
  - '''Desierto de Sinaí'' conserva el marco geográfico sin sobreparafrasear.'
  - Se evita 'SEÑOR' como sustituto del nombre divino, en coherencia con la auditoría inglesa y la política del proyecto.
