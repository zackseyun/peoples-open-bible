revisions:
- from: Sucedió en los días en que juzgaban los jueces[a] que hubo hambre en la tierra[b], y un hombre salió de Belén de Judá para sojornar[c] en los campos de Moab—él, su esposa y sus dos hijos.
  to: Sucedió en los días en que los jueces juzgaban[a] que hubo una hambruna en la tierra, y un hombre se fue de Belén de Judá para residir temporalmente[c] en los campos de Moab[b]—él, su esposa y sus dos hijos.
  rationale: La revisión corrige un error evidente en nota, mejora la precisión semántica de רָעָב con «hambruna», reemplaza el poco natural «sojornar» por una expresión española clara que conserva el matiz mediante nota, y restituye la alternativa léxica documentada para «campos de Moab». También ajusta el orden de «los jueces juzgaban» para sonar más natural sin perder la repetición hebrea.
  reviewer_model: gpt-5.4
