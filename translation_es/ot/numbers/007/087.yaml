translation:
  language: es
  text: 'Todo el ganado para el holocausto: doce toros, doce carneros, doce corderos de un año y sus ofrendas vegetales; y doce machos cabríos para la ofrenda por el pecado[a].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «ofrenda de purificación». El término hebreo חַטָּאת puede enfatizar la purificación de la impureza tanto como el pecado.
    reason: lexical_alternative
lexical_decisions:
- source_word: כָּל
  english_pob_choice: All
  chosen_spanish: Todo
  alternatives_spanish:
  - Todo el conjunto
  - La suma total de
  lexicon: HALOT
  rationale: En este inventario sacrificial, el hebreo introduce el total de las víctimas ofrendadas. «Todo» conserva la idea de totalidad con español natural y compacto.
- source_word: הַבָּקָר
  english_pob_choice: the cattle
  chosen_spanish: el ganado
  alternatives_spanish:
  - el ganado vacuno
  - los animales bovinos
  lexicon: HALOT
  rationale: El hebreo designa colectivamente los bovinos. «Ganado» funciona como sustantivo colectivo natural en español; el contexto inmediato ya especifica que se trata de toros.
- source_word: לָעֹלָה
  english_pob_choice: for the burnt offering
  chosen_spanish: para el holocausto
  alternatives_spanish:
  - para la ofrenda quemada
  - como holocausto
  lexicon: HALOT
  rationale: En español bíblico de uso amplio, «holocausto» transmite la ofrenda totalmente consumida por fuego. Mantiene el valor cultual de עֹלָה sin necesidad de un giro más explicativo.
- source_word: פָּרִים
  english_pob_choice: bulls
  chosen_spanish: toros
  alternatives_spanish:
  - bueyes
  - toros jóvenes
  lexicon: HALOT
  rationale: En esta enumeración sacrificial, «toros» es claro y natural en español. Conserva la referencia a bovinos machos adultos sin volverla pesada.
- source_word: אֵילִם
  english_pob_choice: rams
  chosen_spanish: carneros
  alternatives_spanish:
  - borregos machos
  - ovejas machos
  lexicon: HALOT
  rationale: «Carneros» es el término usual y preciso para el macho de la oveja en contextos sacrificiales.
- source_word: כְּבָשִׂים בְּנֵי שָׁנָה
  english_pob_choice: one-year-old lambs
  chosen_spanish: corderos de un año
  alternatives_spanish:
  - corderos de año
  - corderos de un año de edad
  lexicon: HALOT
  rationale: La construcción hebrea marca la edad requerida para el sacrificio. «Corderos de un año» suena natural y preserva la especificación.
- source_word: וּמִנְחָתָם
  english_pob_choice: and their grain offering
  chosen_spanish: y su ofrenda vegetal
  alternatives_spanish:
  - y su ofrenda de cereal
  - y su oblación
  lexicon: HALOT
  rationale: «מִנְחָה» en este contexto ritual se refiere a la ofrenda que acompaña al sacrificio animal, normalmente de cereal/grano. «Ofrenda vegetal» conserva la tradición POB de distinguir el elemento no animal sin imponer «grano» donde el español litúrgico puede sonar técnico; además mantiene el vínculo con la ofrenda asociada a los animales mencionados.
- source_word: וּשְׂעִירֵי עִזִּים
  english_pob_choice: and male goats
  chosen_spanish: y doce machos cabríos
  alternatives_spanish:
  - y doce cabras machos
  - y doce chivos
  lexicon: HALOT
  rationale: La expresión denota machos de las cabras. «Machos cabríos» es preciso y bíblico en español, y corresponde bien al paralelo del conteo.
- source_word: לְחַטָּאת
  english_pob_choice: for a sin offering
  chosen_spanish: para la ofrenda por el pecado
  alternatives_spanish:
  - para la ofrenda por el pecado o la purificación
  - para la ofrenda expiatoria
  lexicon: HALOT
  rationale: Se preserva la ambigüedad cultual del término sin reducirlo a un único matiz doctrinal. «Ofrenda por el pecado» es inteligible y cercana al uso bíblico, mientras deja abierta la nota alternativa de purificación.
theological_decisions:
- issue: Valor de חַטָּאת en la legislación sacrificial
  english_pob_reading: sin offering
  chosen_spanish_reading: ofrenda por el pecado
  alternative_spanish_readings:
  - ofrenda de purificación
  - ofrenda expiatoria
  rationale: El hebreo puede abarcar tanto la dimensión de pecado como la de purificación ritual. En español, «ofrenda por el pecado» comunica el sentido tradicional sin borrar la observación lexical de que también puede enfatizar purificación.
  doctrine_reference: Translation philosophy §3, §5
translation_notes:
  revision_awareness: 'El pasaje coincide sustancialmente con la versión auditada en inglés: se mantiene la enumeración total y la nota sobre חַטָּאת. No se identificaron revisiones textuales posteriores que exigieran ajustar el español.'
  spanish_consistency_notes:
  - Se mantuvo un registro culto y legible, evitando calcos innecesarios del inglés.
  - «Holocausto» se usa aquí como término sacrificial tradicional para עֹלָה, en coherencia con un español bíblico comprensible.
  - La nota sobre חַטָּאת conserva la tensión entre pecado y purificación en lugar de resolverla de forma unilateral.
  - El numeral se expresó de forma explícita en cada grupo sacrificial para reflejar la estructura enumerativa del hebreo.
