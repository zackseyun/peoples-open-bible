    text: O 'conságralos'; literalmente, 'apártalos' o 'ponlos aparte', aquí para juicio y no para bendición.
    reason: lexical_alternative
  - marker: c
    text: O 'para el día de matar'.
    reason: lexical_alternative
  revision_rationale: Se corrige el anclaje de la nota sobre אִתָּךְ, que debía ir con 'hacia ti'. Se cambia 'conságralos' por 'apártalos' para seguir la decisión lexical de la POB y evitar una connotación positiva indebida en contexto de juicio. Se conserva 'matanza' por legibilidad española, pero se explicita en nota la alternativa más literal correspondiente al rastro inglés. No hace falta adjudicación adicional porque los ajustes son claros y de bajo riesgo doctrinal.
