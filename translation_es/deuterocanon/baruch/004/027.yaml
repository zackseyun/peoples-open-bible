review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el sentido general del griego: exhortación al valor, llamado a clamar a Dios, y promesa futura de memoria por parte del agente implícito del juicio. Conserva adecuadamente la indirecta teológica de ὑπὸ τοῦ ἐπάγοντος. Sin embargo, «Tengan ánimo» suena menos idiomático y menos preciso que una formulación imperativa más natural para Θαρρήσατε; además, «por el que trajo esto sobre ustedes» es comprensible pero puede afinarse levemente en fluidez española.'
  spanish_quality_summary: 'La redacción es clara y fiel, con buen registro eclesial moderno. Los puntos mejorables son de naturalidad: «Cobren ánimo» o «Tengan valor» funciona mejor que «Tengan ánimo» para una exhortación directa; y «por quien trajo esto sobre ustedes»/«por aquel que trajo esto sobre ustedes» evitaría una sensación algo tosca de «por el que». También conviene mantener consistencia de tratamiento evitando la repetición pesada de «ustedes» cuando no hace falta.'
  glossary_alignment: 'No hay conflictos con la terminología del proyecto: θεόν se traduce correctamente como «Dios»; no aparecen términos sensibles como Yahvé, Mesías, Espíritu, carne, gracia, etc. La elección de «hijos» para τέκνα es defendible en registro bíblico, aunque «hijos» mantiene el matiz tradicional más que inclusivo explícito.'
  issues:
  - severity: medium
    issue: «Tengan ánimo» para Θαρρήσατε
    rationale: Es entendible, pero en español suena menos idiomático como mandato exhortativo. «Cobren ánimo» preserva mejor la fuerza ingresiva/exhortativa de ‘take courage’.
  - severity: low
    issue: «por el que trajo esto sobre ustedes» suena algo rígido
    rationale: La construcción es fiel, pero «por aquel que trajo esto sobre ustedes» suena más natural y digna sin alterar la ambigüedad del participio sustantivado griego.
