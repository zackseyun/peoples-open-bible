id: 1PE.1.12
reference: 1 Peter 1:12
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: οἷς ἀπεκαλύφθη ὅτι οὐχ ἑαυτοῖς ὑμῖν δὲ διηκόνουν αὐτά, ἃ νῦν ἀνηγγέλη ὑμῖν διὰ τῶν εὐαγγελισαμένων ὑμᾶς πνεύματι ἁγίῳ ἀποσταλέντι ἀπ’ οὐρανοῦ, εἰς ἃ ἐπιθυμοῦσιν ἄγγελοι παρακύψαι.
base_translation:
  language: en
  yaml_path: translation/nt/1_peter/001/012.yaml
  text: 'To them it was revealed that they were serving not themselves but you in these things, which now have been announced to you through those who preached the good news to you by the Holy Spirit sent from heaven—things into which angels long to look.'
translation:
  language: ko
  text: '그들에게는 그것들이 자기들이 아니라 여러분을 위하여 섬기던 일이라는 것이 계시되었습니다. 그것들은 이제 하늘로부터 보내심을 받은 성령으로 여러분에게 좋은 소식을 전한 자들을 통하여 여러분에게 전해진 것들이며, 천사들도 들여다보기를 갈망하는 것들입니다.'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ἀπεκαλύφθη
  english_pob_choice: it was revealed
  chosen_korean: 계시되었습니다
  alternatives_korean:
  - 나타내심을 받았습니다
  - 드러내심을 받았습니다
  lexicon: BDAG
  rationale: 신적 수동을 「계시되었다」로 살린다.
- source_word: διηκόνουν αὐτά
  english_pob_choice: were serving in these things
  chosen_korean: 섬기던 일이라는 것
  alternatives_korean:
  - 이것들을 봉사하던 것
  - 이것들을 위해 섬기던 일
  lexicon: BDAG
  rationale: 미완료 διηκόνουν의 진행적 의미와 대격 αὐτά(섬김의 대상·내용)를 한국어로 자연스럽게 결합.
- source_word: τῶν εὐαγγελισαμένων ὑμᾶς
  english_pob_choice: those who preached the good news to you
  chosen_korean: 여러분에게 좋은 소식을 전한 자들
  alternatives_korean:
  - 너희에게 복음을 전한 자들
  lexicon: BDAG
  rationale: 「복음」은 한국 성서 전통에서 굳었으나, 본문에서는 더 평이한 「좋은 소식」으로 옮겨 어원적 투명성을 보존한다.
- source_word: πνεύματι ἁγίῳ ἀποσταλέντι ἀπ’ οὐρανοῦ
  english_pob_choice: by the Holy Spirit sent from heaven
  chosen_korean: 하늘로부터 보내심을 받은 성령으로
  alternatives_korean:
  - 하늘에서 보내신 성령에 의해
  lexicon: BDAG
  rationale: 수단의 여격 + 수동분사 구조를 한국어 「~으로」와 「보내심을 받은」으로 옮긴다.
- source_word: παρακύψαι
  english_pob_choice: long to look
  chosen_korean: 들여다보기를 갈망하는
  alternatives_korean:
  - 굽어보기를 사모하는
  - 살펴보기를 원하는
  lexicon: BDAG
  rationale: παρακύπτω는 「몸을 굽혀 들여다보다」로, 「들여다보다」가 가장 자연스럽다.
