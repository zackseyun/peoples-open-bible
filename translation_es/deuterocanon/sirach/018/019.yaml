translation:
  language: es
  text: Antes de hablar[a], aprende; y antes de la enfermedad, busca tratamiento.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «cuídate» / «busca remedio». El verbo griego puede significar atenderse, cuidarse o tratarse médicamente.'
    reason: lexical_alternative
lexical_decisions:
- source_word: πρὶν ἢ
  english_pob_choice: Before
  chosen_spanish: Antes de
  alternatives_spanish:
  - Antes que
  - Previo a
  lexicon: LSJ
  rationale: La expresión marca prioridad temporal; «Antes de» es natural en español y conserva el valor proverbial de la exhortación.
- source_word: λαλῆσαι
  english_pob_choice: you speak
  chosen_spanish: hablar
  alternatives_spanish:
  - decir
  - expresarte
  lexicon: LSJ
  rationale: El infinitivo aoristo de λαλέω se rinde bien con un infinitivo español simple. «Hablar» mantiene el sentido general sin añadir contenido.
- source_word: μάνθανε
  english_pob_choice: learn
  chosen_spanish: aprende
  alternatives_spanish:
  - aprende bien
  - adquiere conocimiento
  - instrúyete
  lexicon: LSJ
  rationale: El imperativo de μανθάνω exhorta a adquirir conocimiento; «aprende» es la equivalencia más directa y clara en español.
- source_word: πρὸ
  english_pob_choice: before
  chosen_spanish: antes de
  alternatives_spanish:
  - previo a
  - antes que
  lexicon: LSJ
  rationale: Se mantiene el paralelismo temporal con la primera cláusula y la misma relación de prioridad.
- source_word: ἀρρωστίας
  english_pob_choice: sickness
  chosen_spanish: la enfermedad
  alternatives_spanish:
  - la dolencia
  - la enfermedad corporal
  - la enfermedad grave
  lexicon: LSJ
  rationale: El sustantivo puede abarcar enfermedad o debilidad física; «la enfermedad» es el equivalente más amplio y natural en español.
- source_word: θεραπεύου
  english_pob_choice: seek treatment
  chosen_spanish: busca tratamiento
  alternatives_spanish:
  - cuídate
  - atiéndete
  - busca remedio
  lexicon: LSJ
  rationale: En este contexto sapiencial, θεραπεύω apunta a cuidado o tratamiento preventivo. «Busca tratamiento» conserva la idea práctica sin convertirla en un mero «sanar».
translation_notes:
  revision_awareness: Se corrigió el problema de validación anterior asegurando que el marcador [a] aparezca explícitamente en el texto español y quede anclado a la frase correspondiente.
  spanish_consistency_notes:
  - Se mantuvo el tono sapiencial breve y proverbial del griego.
  - Se evitó el calco «aprende antes de hablar» para conservar naturalidad, pero sin ampliar el sentido.
  - No se introdujeron términos eclesiásticos ni interpretaciones doctrinales ajenas al dicho sapiencial.
