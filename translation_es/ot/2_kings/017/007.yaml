translation:
  language: es
  text: Y esto sucedió porque los hijos de Israel habían pecado contra Yahvé su Dios, que los había sacado de la tierra de Egipto, de debajo de la mano de Faraón, rey de Egipto[a], y habían temido a otros dioses[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «de debajo del poder de Faraón». El hebreo dice literalmente «de debajo de la mano de Faraón».
    reason: lexical_alternative
  - marker: b
    text: O «habían adorado a otros dioses». El hebreo dice «habían temido a otros dioses», usando el verbo común para temor o reverencia que puede incluir una devoción cultual.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְהִי כִּי
  english_pob_choice: And this happened because
  chosen_spanish: Y esto sucedió porque
  alternatives_spanish:
  - Y esto aconteció porque
  - Y aconteció porque
  lexicon: HALOT
  rationale: La expresión introduce una relación explicativa-causal. «Y esto sucedió porque» conserva la función narrativa y la causalidad de כי en un español natural y digno, sin recurrir a una fórmula arcaica.
- source_word: חָטְאוּ
  english_pob_choice: had sinned
  chosen_spanish: habían pecado
  alternatives_spanish:
  - pecaron
  - habían ofendido
  lexicon: HALOT
  rationale: El pretérito pluscuamperfecto encaja con el marco retrospectivo del versículo. «Pecado» mantiene el valor moral y teológico del hebreo חטא sin suavizarlo.
- source_word: בְנֵי יִשְׂרָאֵל
  english_pob_choice: the children of Israel
  chosen_spanish: los hijos de Israel
  alternatives_spanish:
  - los israelitas
  - los hijos de Jacob
  lexicon: HALOT
  rationale: «Hijos de Israel» reproduce de cerca la fórmula del hebreo y preserva su resonancia pactal, manteniéndose comprensible en español.
- source_word: לַיהוָה
  english_pob_choice: against Yahweh
  chosen_spanish: contra Yahvé
  alternatives_spanish:
  - contra Yahweh
  - contra el Señor
  lexicon: HALOT
  rationale: El texto hebreo usa el nombre divino יְהוָה; en la norma del proyecto se vierte «Yahvé». Con חטא + ל, el sentido es «pecar contra».
- source_word: אֱלֹהֵיהֶם
  english_pob_choice: their God
  chosen_spanish: su Dios
  alternatives_spanish:
  - su Dios propio
  - el Dios de ellos
  lexicon: HALOT
  rationale: El sufijo pronominal expresa posesión relacional y pactal. «Su Dios» es idiomático en español y conserva esa relación sin añadir matices no presentes.
- source_word: הַמַּעֲלֶה אֹתָם
  english_pob_choice: who had brought them up
  chosen_spanish: que los había sacado
  alternatives_spanish:
  - que los había hecho subir
  - que los había traído
  lexicon: HALOT
  rationale: El participio describe a Yahvé por su acto redentor. «Había sacado» comunica bien la liberación y evita una construcción demasiado literal que sonaría forzada en español.
- source_word: מֵאֶרֶץ מִצְרַיִם
  english_pob_choice: from the land of Egypt
  chosen_spanish: de la tierra de Egipto
  alternatives_spanish:
  - de la tierra de Egipto
  - desde Egipto
  lexicon: HALOT
  rationale: «De la tierra de Egipto» sigue de cerca la construcción hebrea y mantiene la formulación bíblica habitual sin perder claridad.
- source_word: מִתַּחַת יַד פַּרְעֹה
  english_pob_choice: from under the hand of Pharaoh
  chosen_spanish: de debajo de la mano de Faraón
  alternatives_spanish:
  - del poder de Faraón
  - de la autoridad de Faraón
  lexicon: HALOT
  rationale: Se conserva la imagen idiomática de «debajo de la mano» porque el proyecto valora la trazabilidad del hebreo. En español, «mano» mantiene la metáfora de dominio y control.
- source_word: וַיִּירְאוּ
  english_pob_choice: and they feared
  chosen_spanish: y habían temido
  alternatives_spanish:
  - y temieron
  - y reverenciaron
  lexicon: HALOT
  rationale: יָרֵא aquí puede abarcar temor reverente y, en contexto, un acto de devoción indebida. Se mantiene «temer» para no reemplazar la forma verbal del hebreo por «adorar» sin base textual suficiente.
- source_word: אֱלֹהִים אֲחֵרִים
  english_pob_choice: other gods
  chosen_spanish: a otros dioses
  alternatives_spanish:
  - otros dioses
  - dioses ajenos
  lexicon: HALOT
  rationale: La expresión significa literalmente «otros dioses». El complemento con «a» responde a la construcción española con temer + objeto personal/temático y conserva la referencia a la desviación idolátrica.
theological_decisions:
- issue: Nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - el Señor
  rationale: La norma del proyecto para יְהוָה es «Yahvé». Esto evita la sustitución por una convención eclesiástica y mantiene el nombre del pacto visible en el texto español.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Sentido de ירא con אֱלֹהִים אֲחֵרִים
  english_pob_reading: and had feared other gods
  chosen_spanish_reading: y habían temido a otros dioses
  alternative_spanish_readings:
  - y habían adorado a otros dioses
  - y habían reverenciado a otros dioses
  rationale: Se preserva el verbo básico «temer» porque el hebreo usa ירא. Aunque el contexto implica idolatría, traducir directamente como «adorar» sería más interpretativo que el dato textual.
  doctrine_reference: 'DOCTRINE.md: preserve source text''s plain sense; do not paraphrase beyond what the source warrants'
translation_notes:
  revision_awareness: 'El audit trail inglés pasó por una revisión menor para ajustar el paralelismo verbal: se añadió «had» antes de «feared». En español, el pluscuamperfecto «habían temido» ya refleja ese paralelismo retrospectivo sin necesidad de cambio adicional. Se mantuvieron las decisiones de nombre divino, la metáfora de «la mano» y el verbo «temer» para no perder trazabilidad al hebreo.'
  spanish_consistency_notes:
  - Se usa «Yahvé» conforme a la terminología del proyecto para יְהוָה.
  - Se mantiene «hijos de Israel» por su valor formulaico y pactal.
  - Se conserva la imagen idiomática «debajo de la mano» en una nota, mientras el texto principal queda natural en español.
  - «Temido» se usa en sentido lexical y no se sustituye por «adorado» en el cuerpo principal.
  - La puntuación y el orden de miembros siguen un español bíblico moderno, no una calca rígida del inglés.
