- from: Roboam tomó por esposa a Mahalat, la hija de Jerimot hijo de David[a], y a Abihail, la hija de Eliab hijo de Jesé.
  to: Roboam tomó por esposa a Mahalat, la hija de Jerimot hijo de David[a], y de Abihail, la hija de Eliab hijo de Jesé.
  rationale: Se cambia «y a Abihail» por «y de Abihail» para que el español exprese con claridad que Abihail pertenece a la genealogía de Mahalat y no funciona como una segunda esposa en el texto principal. También se mejora levemente la nota para una expresión más natural en español.
