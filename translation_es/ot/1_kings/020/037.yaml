translation:
  language: es
  text: 'Entonces encontró a otro hombre y le dijo[a]: «Por favor, golpéame». Así que el hombre lo golpeó y lo hirió.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'El hebreo repite el verbo «golpear» para dar énfasis: literalmente, «el hombre lo golpeó, golpeándolo e hiriéndolo».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּמְצָא / found
  english_pob_choice: Then he found
  chosen_spanish: Entonces encontró
  alternatives_spanish:
  - Y encontró
  - Luego encontró
  lexicon: HALOT
  rationale: El wayyiqtol narrativo avanza la acción; «entonces» reproduce bien la secuencia sin sonar forzado en español.
- source_word: אִישׁ אַחֵר / another man
  english_pob_choice: another man
  chosen_spanish: a otro hombre
  alternatives_spanish:
  - a otro hombre
  - a otra persona
  lexicon: HALOT
  rationale: אִישׁ es masculino singular; «otro hombre» preserva esa referencia directa y natural en español.
- source_word: הַכֵּינִי נָא / Please strike me
  english_pob_choice: Please strike me
  chosen_spanish: Por favor, hiéreme
  alternatives_spanish:
  - Por favor, golpéame
  - Hiéreme, por favor
  lexicon: HALOT
  rationale: El imperativo de נכה con sufijo de primera persona pide «hiéreme/áteme». «Hiéreme» conserva la fuerza de «strike» mejor que «golpéame», y «por favor» refleja נָא como ruego.
- source_word: וַיַּכֵּהוּ / struck him
  english_pob_choice: So the man struck him
  chosen_spanish: Así el hombre lo hirió
  alternatives_spanish:
  - Y el hombre lo hirió
  - Entonces el hombre lo hirió
  lexicon: HALOT
  rationale: 'La forma narrativa puede expresarse con resultado: «así» enlaza con la petición previa. «Hirió» mantiene la seriedad del acto mejor que «golpeó».'
- source_word: הַכֵּה וּפָצֹעַ / striking and wounding
  english_pob_choice: and wounded him
  chosen_spanish: y lo dejó herido
  alternatives_spanish:
  - y lo hirió
  - y lo lastimó
  lexicon: HALOT
  rationale: El hebreo repite el verbo de herir y añade פצע, con la idea de causar lesión. «Lo dejó herido» comunica el resultado sin una repetición torpe en español, y preserva la noción de daño físico.
translation_notes:
  revision_awareness: La redacción sigue la revisión inglesa más reciente, que simplificó la última cláusula de una repetición más pesada a una expresión natural del resultado; por eso en español también se evita la duplicación literal y se conserva la lesión final.
  spanish_consistency_notes:
  - Se mantiene un español moderno y sobrio, apto para lectura pública.
  - Se evita «señor»/«sirviente» porque el hebreo no lo requiere aquí; el foco está en la acción física.
  - «Hirió» se usa con valor de herir/dañar, no en sentido bélico técnico exclusivamente.
  - No se añade nota al pie porque la repetición hebrea puede explicarse en la decisión léxica sin cargar el texto principal.
