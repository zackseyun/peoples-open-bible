  to: Y después de algún tiempo[a], al cabo de dos años, le salieron las entrañas[b] a causa de su enfermedad, y murió de enfermedades graves. Y su pueblo no hizo por él una quema[c], como la quema por sus padres.
  rationale: Se conserva la fidelidad general del borrador, pero se ajusta la cláusula final para evitar la ambigüedad de «la quema de sus padres» y para reflejar mejor el sentido conmemorativo de שְׂרֵפָה mediante «por él / por sus padres». También se añade la nota cultural necesaria, ya presente en el expediente inglés, para impedir una lectura de cremación.
