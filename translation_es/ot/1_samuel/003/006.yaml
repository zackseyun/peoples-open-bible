translation:
  language: es
  text: 'Entonces Yahvé llamó a Samuel otra vez. Samuel se levantó y fue a Elí y dijo: «Aquí estoy, porque me llamaste». Pero él dijo: «No te llamé, hijo mío. Vuelve; acuéstate».'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: וַיֹּסֶף / עוֹד
  english_pob_choice: called ... again
  chosen_spanish: llamó ... otra vez
  alternatives_spanish:
  - volvió a llamar
  - siguió llamando
  lexicon: HALOT
  rationale: La secuencia verbal expresa repetición de la llamada; «otra vez» reproduce naturalmente ese valor en español sin volverlo mecánico.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: La política del proyecto para el Tetragrama es usar el nombre divino transliterado. «Yahvé» preserva el nombre propio del pacto y evita la sustitución por un título.
- source_word: קְרֹא
  english_pob_choice: called
  chosen_spanish: llamó
  alternatives_spanish:
  - llamaba
  - estaba llamando
  lexicon: HALOT
  rationale: En este contexto el verbo denota una acción de llamar dirigida a Samuel; «llamó» conserva el valor verbal simple y natural en español.
- source_word: וַיָּקָם
  english_pob_choice: got up
  chosen_spanish: se levantó
  alternatives_spanish:
  - se puso de pie
  - se alzó
  lexicon: HALOT
  rationale: «Se levantó» expresa de manera clara y natural la acción narrativa de ponerse en pie para responder.
- source_word: וַיֵּלֶךְ אֶל
  english_pob_choice: went to
  chosen_spanish: fue a
  alternatives_spanish:
  - fue hacia
  - se acercó a
  lexicon: HALOT
  rationale: La construcción indica movimiento hacia una persona; «fue a Elí» es la forma española más directa y transparente.
- source_word: הִנְנִי
  english_pob_choice: Here I am
  chosen_spanish: Heme aquí
  alternatives_spanish:
  - Aquí estoy
  - Presente
  lexicon: HALOT
  rationale: «Heme aquí» conserva el tono bíblico y la fórmula de disponibilidad/respuesta a un llamado, sin perder inteligibilidad en español.
- source_word: כִּי
  english_pob_choice: for
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  lexicon: HALOT
  rationale: Aquí introduce la razón dada por Samuel para acudir; «porque» transmite la relación causal de forma clara y fluida en español.
- source_word: קָרָאתָ לִי
  english_pob_choice: you called me
  chosen_spanish: me llamaste
  alternatives_spanish:
  - me has llamado
  - me convocaste
  lexicon: HALOT
  rationale: La forma directa y natural en español es «me llamaste», manteniendo el sentido simple del verbo sin añadir solemnidad innecesaria.
- source_word: לֹא קָרָאתִי
  english_pob_choice: I did not call
  chosen_spanish: No te llamé
  alternatives_spanish:
  - No llamé
  - No he llamado
  lexicon: HALOT
  rationale: 'El pronombre objeto se entiende por el contexto dialogal; en español es más natural explicitarlo: «No te llamé».'
- source_word: בְנִי
  english_pob_choice: my son
  chosen_spanish: hijo mío
  alternatives_spanish:
  - mi hijo
  - hijo
  lexicon: HALOT
  rationale: «Hijo mío» conserva la relación afectiva y el orden natural de la apelación en español bíblico contemporáneo.
- source_word: שׁוּב
  english_pob_choice: Go back
  chosen_spanish: Vuelve
  alternatives_spanish:
  - Regresa
  - Vuelve atrás
  lexicon: HALOT
  rationale: En este mandato breve, «Vuelve» reproduce la concisión imperativa del hebreo y resulta natural en español.
- source_word: שְׁכָב
  english_pob_choice: lie down
  chosen_spanish: acuéstate
  alternatives_spanish:
  - tiéndete
  - vuélvete a acostar
  lexicon: HALOT
  rationale: El verbo indica la acción de recostarse, no necesariamente dormir; «acuéstate» mantiene esa literalidad con un español idiomático.
theological_decisions:
- issue: Tratamiento del nombre divino יְהוָה en español
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Jehová
  rationale: El texto hebreo usa el Tetragrama directamente. Siguiendo la norma del proyecto, se conserva el nombre propio divino transliterado en lugar de sustituirlo por un título.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה / YHWH → Yahvé'
- issue: Registro de la fórmula de respuesta הִנְנִי
  english_pob_reading: Here I am
  chosen_spanish_reading: Heme aquí
  alternative_spanish_readings:
  - Aquí estoy
  - Presente
  rationale: No se trata solo de ubicación física, sino de una respuesta disponible a la voz que llama. «Heme aquí» mantiene ese matiz vocativo y reverente.
  doctrine_reference: Uso narrativo de respuesta a un llamado en textos veterotestamentarios
translation_notes:
  revision_awareness: El borrador sigue la revisión más reciente del POB inglés, que ajustó la relación de כִּי a «for» para dar un enlace causal más directo. En español se refleja con «porque», manteniendo la misma relación sintáctica y sin introducir variación doctrinal o textual adicional.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» de forma coherente con la política del proyecto para יְהוָה.
  - «Heme aquí» conserva el registro bíblico sin caer en arcaísmo opaco.
  - Se evita traducir שְׁכָב como «dormir», porque el hebreo dice literalmente «acostarse/recostarse».
  - No se introducen notas al pie porque no hay una variante textual o lexical que requiera alternativa anclada en el verso.
