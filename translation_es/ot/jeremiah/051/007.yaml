translation:
  language: es
  text: Babilonia fue una copa de oro en la mano de Yahvé[a], que embriagaba a toda la tierra. Las naciones bebieron de su vino;[b] por eso las naciones enloquecieron.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «el SEÑOR»; el nombre divino es YHWH.'
    reason: alternative_reading
  - marker: b
    text: 'O: «las naciones actúan como locas» o «las naciones son enloquecidas». El verbo hebreo aquí probablemente lleva el sentido de frenesí o locura en este contexto.'
    reason: lexical_alternative
lexical_decisions:
- source_word: כּוֹס זָהָב
  english_pob_choice: a golden cup
  chosen_spanish: una copa de oro
  alternatives_spanish:
  - una copa dorada
  - una copa de oro fino
  lexicon: HALOT
  rationale: La construcción nominal hebrea se expresa con naturalidad en español como 'una copa de oro'. Mantiene la imagen metafórica sin forzar un adjetivo idiomático que altere el valor material del sustantivo.
- source_word: בָּבֶל
  english_pob_choice: Babylon
  chosen_spanish: Babilonia
  alternatives_spanish:
  - Babel
  lexicon: HALOT
  rationale: El nombre propio se vierte con la forma española estándar 'Babilonia', clara y reconocible para el lector bíblico en español.
- source_word: בְּיַד יְהוָה
  english_pob_choice: in the hand of Yahweh
  chosen_spanish: en la mano de Yahvé
  alternatives_spanish:
  - en la mano de Yahvé está
  - en poder de Yahvé
  lexicon: HALOT
  rationale: La metáfora de instrumento/posesión se conserva con 'en la mano de Yahvé', que reproduce el idiomático hebreo sin reducirlo a una paráfrasis explicativa.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  - el SEÑOR
  lexicon: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
  rationale: Se mantiene la transliteración del nombre divino prescrita por el proyecto, adaptada a la ortografía española como 'Yahvé', en lugar de sustituirla por un título.
- source_word: מְשַׁכֶּרֶת
  english_pob_choice: making ... drunk
  chosen_spanish: que embriagaba
  alternatives_spanish:
  - que hacía beber hasta embriagar
  - embriagando
  lexicon: HALOT
  rationale: 'El participio causativo se vierte con un imperfecto relativo que mantiene el valor de acción continua: ''que embriagaba''. En español expresa con claridad la causa del efecto sobre ''toda la tierra''.'
- source_word: כָּל הָאָרֶץ
  english_pob_choice: all the earth
  chosen_spanish: toda la tierra
  alternatives_spanish:
  - toda la tierra habitada
  - todo el mundo
  lexicon: HALOT
  rationale: '''Tierra'' conserva el alcance global del hebreo en este contexto de juicio internacional, y ''toda la tierra'' sigue de cerca el original sin sonar arcaico.'
- source_word: מִיֵּינָהּ
  english_pob_choice: from her wine
  chosen_spanish: de su vino
  alternatives_spanish:
  - de aquel vino suyo
  - de su bebida
  lexicon: HALOT
  rationale: La preposición מִן admite en español una relación posesiva de origen o procedencia; 'de su vino' es natural y conserva la personificación femenina de Babilonia.
- source_word: שָׁתוּ גוֹיִם
  english_pob_choice: Nations drank
  chosen_spanish: Las naciones bebieron
  alternatives_spanish:
  - Bebieron las naciones
  - los pueblos bebieron
  lexicon: HALOT
  rationale: Se conserva el sujeto colectivo plural y el verbo simple de ingestión para enlazar directamente con la imagen de la copa. 'Las naciones' hace explícita la referencia colectiva del hebreo.
- source_word: עַל כֵּן
  english_pob_choice: therefore
  chosen_spanish: por eso
  alternatives_spanish:
  - por tanto
  - así que
  lexicon: HALOT
  rationale: La relación consecutiva se expresa de manera natural con 'por eso', que comunica claramente la inferencia resultante sin cargar el registro.
- source_word: יִתְהֹלְל֥וּ
  english_pob_choice: have gone mad
  chosen_spanish: enloquecieron
  alternatives_spanish:
  - se volvieron locas
  - anduvieron frenéticas
  - perdieron el juicio
  lexicon: HALOT
  rationale: El Hitpolel de הלל, en este contexto de embriaguez, apunta a frenesí o locura. 'Enloquecieron' preserva ese sentido resultativo sin introducir una explicación interpretativa adicional.
- source_word: גוֹיִם
  english_pob_choice: the nations
  chosen_spanish: las naciones
  alternatives_spanish:
  - naciones
  - los pueblos
  lexicon: HALOT
  rationale: Se mantiene la repetición referencial del hebreo con el artículo en español para una referencia natural y cohesiva a las mismas naciones mencionadas antes.
theological_decisions:
- issue: Traducción del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Jehová
  - el SEÑOR
  rationale: El texto hebreo usa explícitamente el Tetragrama, y el proyecto exige su transliteración. En español, 'Yahvé' es la forma coherente con esa decisión y evita la sustitución por un título genérico.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Sentido de la metáfora de embriaguez y locura
  english_pob_reading: Babylon as an instrument in Yahweh's hand causing the nations' madness under judgment
  chosen_spanish_reading: Babilonia como copa en la mano de Yahvé, instrumento de embriaguez que termina en locura de las naciones
  alternative_spanish_readings:
  - Babilonia solo como poder político que confunde a las naciones
  - Babilonia como símbolo de seducción
  rationale: La frase 'en la mano de Yahvé' se conserva para no borrar la soberanía divina sobre el juicio. Al mismo tiempo, la versión española mantiene la secuencia imagen→embriaguez→locura sin suavizar el efecto del verbo final.
  doctrine_reference: Jeremías 51:7; uso contextual de la metáfora de juicio
translation_notes:
  revision_awareness: 'Se revisó la redacción para mantener alta correspondencia con el hebreo y con el audit trail inglés: se preservan la metáfora de la copa, la imagen de embriaguez, la progresión causal y la fuerza del verbo final de locura/frenesí. No se detectaron revisiones sustantivas pendientes respecto del pasaje de referencia.'
  spanish_consistency_notes:
  - Se usa 'Yahvé' de manera uniforme para יְהוָה, conforme a la norma del proyecto.
  - Se mantiene 'naciones' para גוֹיִם en ambas apariciones para reflejar la repetición del hebreo.
  - '''Toda la tierra'' conserva el alcance global del original sin cambiarlo a ''el mundo'', que podría sonar más interpretativo.'
  - '''Enloquecieron'' preserva el resultado de la embriaguez sin introducir una glosa explicativa en el texto principal.'
