  text: 그가 나왔으나 그들에게 말을 할 수 없었으므로, 사람들은 그가 성소 안에서 환상을 본 줄을 알았습니다. 그는 그들에게 계속 손짓으로만 표시하며 말 못하는 채로 있었습니다.
