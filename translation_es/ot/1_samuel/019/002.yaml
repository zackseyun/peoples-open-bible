translation:
  language: es
  text: 'Jonatán le dijo a David[a], diciendo: «Saúl mi padre está procurando matarte. Así que ahora, por favor, mantente en guardia por la mañana, y quédate en un lugar secreto y escóndete».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «permanece en secreto» / «quédate escondido». El hebreo combina «quedarse» con un sustantivo que significa «secreto» o «lugar de ocultamiento», seguido de «escóndete» para dar énfasis.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּגֵּד
  english_pob_choice: told
  chosen_spanish: le avisó
  alternatives_spanish:
  - le dijo
  - le informó
  lexicon: HALOT
  rationale: El hiphil de נגד puede significar decir o declarar; aquí la idea es comunicar una advertencia. «Le avisó» transmite bien el acto de comunicar un peligro inminente.
- source_word: לֵאמֹר
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - y dijo
  - ':'
  lexicon: HALOT
  rationale: Se conserva la fórmula de introducción del discurso de manera natural en español, sin añadir contenido.
- source_word: מְבַקֵּשׁ
  english_pob_choice: is seeking
  chosen_spanish: está procurando
  alternatives_spanish:
  - busca
  - está buscando
  lexicon: HALOT
  rationale: El participio expresa acción en curso o intención presente. «Está procurando» conserva esa fuerza progresiva y el matiz de intención hostil.
- source_word: לַהֲמִיתֶךָ
  english_pob_choice: to kill you
  chosen_spanish: matarte
  alternatives_spanish:
  - darte muerte
  - hacerte morir
  lexicon: HALOT
  rationale: מות en hiphil significa causar la muerte; en este contexto, el equivalente natural y directo en español es «matarte».
- source_word: הִשָּׁמֶר נָא
  english_pob_choice: please be on your guard
  chosen_spanish: por favor, estate atento
  alternatives_spanish:
  - por favor, cuídate
  - por favor, ponte en guardia
  lexicon: HALOT
  rationale: 'El imperativo nifal de שמר tiene fuerza reflexiva: guardarse, cuidarse. «Estate atento» comunica la alerta urgente de forma idiomática; «por favor» refleja נָא.'
- source_word: בַבֹּקֶר
  english_pob_choice: in the morning
  chosen_spanish: por la mañana
  alternatives_spanish:
  - en la mañana
  - mañana por la mañana
  lexicon: HALOT
  rationale: La expresión temporal se entiende naturalmente como un momento de la mañana. «Por la mañana» es claro y no añade especificación no explícita.
- source_word: וְיָשַׁבְתָּ
  english_pob_choice: stay
  chosen_spanish: quédate
  alternatives_spanish:
  - permanece
  - siéntate
  lexicon: HALOT
  rationale: ישב puede significar sentarse o permanecer. En un contexto de ocultamiento, «quédate» expresa bien la idea de permanecer en un lugar.
- source_word: בַסֵּתֶר
  english_pob_choice: in a secret place
  chosen_spanish: en un lugar secreto
  alternatives_spanish:
  - en secreto
  - en un escondite
  lexicon: HALOT
  rationale: סֵתֶר denota secreto, ocultamiento o lugar de refugio. «En un lugar secreto» sigue de cerca el sentido locativo que prefirió la POB inglesa.
- source_word: וְנַחְבֵּאתָ
  english_pob_choice: hide yourself
  chosen_spanish: escóndete
  alternatives_spanish:
  - ocúltate
  - mantente escondido
  lexicon: HALOT
  rationale: חבא es esconderse/ocultarse. El imperativo reflexivo «escóndete» preserva la idea directa y la intensificación del mandato.
- source_word: יְהוֹנָתָן ... לְדָוִד ... שָׁאוּל אָבִי
  english_pob_choice: Jonathan ... David ... Saul my father
  chosen_spanish: Jonatán ... David ... Saúl mi padre
  alternatives_spanish:
  - Yonatán ... David ... Saúl mi padre
  lexicon: Proyecto POB transliteración bíblica
  rationale: Se mantiene la transliteración estándar del nombre propio y el posesivo «mi padre», porque forma parte del tono personal y de la advertencia de Jonatán.
translation_notes:
  revision_awareness: La versión inglesa revisada cambió «a hidden place» por «a secret place» para reflejar más directamente el hebreo; por eso se eligió «un lugar secreto» en español, y se evitó una formulación más abstracta. Se conservó además la intensificación final del mandato mediante «escóndete».
  spanish_consistency_notes:
  - Se mantiene «Jonatán» para coherencia con la transliteración usada en el proyecto.
  - Se usa un tratamiento directo y sobrio acorde con el tono narrativo y urgente del versículo.
  - El pronombre enclítico en «escóndete» preserva la reflexividad del verbo hebreo.
