translation:
  language: es
  text: 'Estos veinte años he estado en tu casa[a]: te serví catorce años por tus dos hijas, y seis años por tu rebaño, y cambiaste mi salario diez veces.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Durante estos veinte años he estado en tu hogar».'
    reason: alternative_reading
lexical_decisions:
- source_word: זֶה לִּי עֶשְׂרִים שָׁנָה
  english_pob_choice: These twenty years
  chosen_spanish: Estos veinte años
  alternatives_spanish:
  - Durante estos veinte años
  - Por estos veinte años
  lexicon: HALOT
  rationale: El hebreo abre con un sintagma temporal deíctico sin verbo expreso. «Estos veinte años» conserva esa fuerza demostrativa de manera natural en español; «Durante estos veinte años» explicita la duración, pero suaviza la forma breve del hebreo.
- source_word: בְּבֵיתֶךָ
  english_pob_choice: in your house
  chosen_spanish: en tu casa
  alternatives_spanish:
  - en tu casa y tu hogar
  - en tu casa / en tu hogar
  lexicon: HALOT
  rationale: «Casa» mantiene el sentido concreto de בַּיִת y sigue de cerca la elección inglesa. En español, «hogar» podría captar la extensión de 'household', pero aquí «casa» es más directo y suficientemente natural.
- source_word: עֲבַדְתִּיךָ
  english_pob_choice: I served you
  chosen_spanish: te serví
  alternatives_spanish:
  - trabajé para ti
  - te laboré
  lexicon: HALOT
  rationale: El verbo עבד conserva la idea de servicio/labor bajo relación de dependencia. «Te serví» retiene ese valor sin introducir una perífrasis innecesaria; «trabajé para ti» es posible, pero atenúa el matiz relacional.
- source_word: אַרְבַּע עֶשְׂרֵה שָׁנָה בִּשְׁתֵּי בְנֹתֶיךָ
  english_pob_choice: fourteen years for your two daughters
  chosen_spanish: catorce años por tus dos hijas
  alternatives_spanish:
  - catorce años a cambio de tus dos hijas
  - catorce años por causa de tus dos hijas
  lexicon: HALOT
  rationale: El בְ inicial funciona como relación de consideración/causa del servicio. «Por tus dos hijas» refleja bien la frase sin expandirla; «a cambio de» interpretaría más de lo necesario en el texto principal.
- source_word: וְשֵׁשׁ שָׁנִים בְּצֹאנֶךָ
  english_pob_choice: and six years for your flock
  chosen_spanish: y seis años por tu rebaño
  alternatives_spanish:
  - y seis años por tu ganado menor
  - y seis años sobre tu rebaño
  lexicon: HALOT
  rationale: צֹאן designa el ganado menor, especialmente ovejas y cabras. «Rebaño» es un equivalente amplio y natural en español bíblico; «ganado menor» sería más técnico y menos fluido.
- source_word: וַתַּחֲלֵף
  english_pob_choice: and you changed
  chosen_spanish: y cambiaste
  alternatives_spanish:
  - y alteraste
  - y seguías cambiando
  lexicon: HALOT
  rationale: El hiphil de חלף aquí expresa cambiar o sustituir. «Cambiaste» reproduce el sentido básico y el tono acusatorio condensado del versículo; la repetición queda reforzada por «diez veces».
- source_word: מַשְׂכֻּרְתִּי
  english_pob_choice: my wages
  chosen_spanish: mi salario
  alternatives_spanish:
  - mi paga
  - mi compensación
  lexicon: HALOT
  rationale: En español, «salario» comunica con claridad la idea de paga acordada por trabajo. Aunque «sueldos» o «jornal» serían posibles en otros contextos, aquí «salario» es la opción más transparente y digna.
- source_word: עֲשֶׂרֶת מֹנִים
  english_pob_choice: ten times
  chosen_spanish: diez veces
  alternatives_spanish:
  - diez cambios
  - diez cómputos
  lexicon: HALOT
  rationale: La expresión es idiomática y se entiende mejor como frecuencia de cambio. «Diez veces» preserva el valor convencional del hebreo sin añadir explicaciones al texto principal.
theological_decisions:
- issue: Sentido de בְּבֵיתֶךָ como 'casa' o 'hogar/household'
  english_pob_reading: in your house
  chosen_spanish_reading: en tu casa
  alternative_spanish_readings:
  - en tu hogar
  - en tu casa, es decir, en tu casa y tu familia
  rationale: No hay tensión doctrinal, pero sí una posible ambigüedad semántica. Se mantiene «casa» para conservar la concreción del hebreo y porque el contexto de servicio doméstico-laboral ya hace visible la dimensión de 'hogar'.
  doctrine_reference: None
- issue: Relación entre servicio y trabajo en עֲבַדְתִּיךָ
  english_pob_reading: I served you
  chosen_spanish_reading: te serví
  alternative_spanish_readings:
  - trabajé para ti
  - te presté servicio
  rationale: «Serví» retiene el vínculo de dependencia y el acto de labor personal sin convertir el verso en una mera referencia laboral moderna. Esto preserva la carga relacional del hebreo.
  doctrine_reference: None
translation_notes:
  revision_awareness: 'La revisión inglesa más reciente no introdujo cambios; el texto final se alinea con el estado de alta concordancia del audit trail. La versión española sigue esa lectura estable y conserva las decisiones léxicas centrales: duración de veinte años, servicio, rebaño, salario y la idiomática ''diez veces''.'
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el texto fuente lo requiere explícitamente; este versículo no contiene el Tetragrámaton.
  - Se conserva «casa» para בַּיִת y «rebaño» para צֹאן, siguiendo el campo semántico del audit trail.
  - «Te serví» y «cambiaste» mantienen el tono de queja resumida del hebreo sin ampliar la interpretación.
