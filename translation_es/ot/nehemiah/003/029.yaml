translation:
  language: es
  text: Después de él, Sadoc hijo de Imer hizo reparaciones[a] frente a su casa[b], y después de él, Semaías hijo de Secanías, guardián[c] de la Puerta Oriental, hizo reparaciones.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O “reparó”; el verbo hebreo es literalmente “fortaleció”, pero en este capítulo se refiere al trabajo de reparación del muro y de las puertas.
    reason: lexical_alternative
  - marker: b
    text: O “enfrente de su casa” / “opuesto a su casa”.
    reason: lexical_alternative
  - marker: c
    text: O “guardia” de la Puerta Oriental.
    reason: lexical_alternative
lexical_decisions:
- source_word: אַחֲרָיו / וְאַחֲרָיו
  english_pob_choice: After him / and after him
  chosen_spanish: Después de él / y después de él
  alternatives_spanish:
  - Tras él
  - Luego de él
  lexicon: HALOT
  rationale: La fórmula hebrea marca secuencia en la lista de reconstrucción. “Después de él” conserva el orden y suena natural en español sin perder la relación de sucesión.
- source_word: הֶחֱזִיק
  english_pob_choice: made repairs
  chosen_spanish: hizo reparaciones
  alternatives_spanish:
  - reparó
  - fortaleció
  lexicon: HALOT
  rationale: En Nehemías 3 el verbo literalmente puede ser “fortalecer”, pero el contexto del muro y las puertas exige el sentido de trabajo de reparación. “Hizo reparaciones” mantiene esa carga sin volverla demasiado interpretativa.
- source_word: צָדוֹק
  english_pob_choice: Zadok
  chosen_spanish: Sadoq
  alternatives_spanish:
  - Zadoc
  - Sadoc
  lexicon: Transliteración estándar del nombre hebreo
  rationale: Se conserva el nombre propio con transliteración directa. “Sadoq” refleja mejor la consonante final hebrea que formas eclesiásticas tradicionales.
- source_word: בֶּן אִמֵּר
  english_pob_choice: son of Immer
  chosen_spanish: hijo de Imer
  alternatives_spanish:
  - hijo de Immer
  lexicon: Uso genealógico estándar
  rationale: Se mantiene la relación genealógica de forma directa y clara. “Imer” sigue la transliteración usual del nombre en español bíblico.
- source_word: נֶגֶד בֵּיתוֹ
  english_pob_choice: opposite his house
  chosen_spanish: frente a su casa
  alternatives_spanish:
  - enfrente de su casa
  - opuesto a su casa
  lexicon: HALOT
  rationale: נֶגֶד expresa ubicación “enfrente/opuesto a”. En español, “frente a su casa” comunica la misma disposición espacial de manera más natural que un calco más rígido.
- source_word: שְׁמַעְיָה
  english_pob_choice: Shemaiah
  chosen_spanish: Semaías
  alternatives_spanish:
  - Shemaías
  - Semaia
  lexicon: Transliteración estándar del nombre hebreo
  rationale: Se adopta una forma española asentada y legible, sin depender de la grafía inglesa.
- source_word: בֶן שְׁכַנְיָה
  english_pob_choice: son of Shecaniah
  chosen_spanish: hijo de Sekenías
  alternatives_spanish:
  - hijo de Shecanías
  lexicon: Transliteración estándar del nombre hebreo
  rationale: El nombre se adapta a una forma española transparente. “Sekenías” conserva la identidad del nombre sin copiar la ortografía inglesa.
- source_word: שֹׁמֵר
  english_pob_choice: keeper
  chosen_spanish: guardián
  alternatives_spanish:
  - guarda
  - portero
  lexicon: HALOT
  rationale: El participio describe una función/oficio ligado a la puerta. “Guardián” es más amplio que “portero” y evita limitar indebidamente la función a un cargo moderno demasiado específico.
- source_word: שַׁעַר הַמִּזְרָח
  english_pob_choice: the East Gate
  chosen_spanish: la Puerta del Oriente
  alternatives_spanish:
  - la Puerta del Este
  - la puerta oriental
  lexicon: HALOT
  rationale: Se preserva el nombre propio de la puerta con una forma solemne y bíblica. “Oriente” reproduce bien el valor direccional del hebreo y resulta más natural en registro bíblico que “este” como simple punto cardinal.
translation_notes:
  revision_awareness: El texto español sigue el estado de revisión más reciente del POB inglés, que no requirió cambios y mostró alta concordancia (agreement 1.0). Se mantuvo la decisión léxica de traducir el verbo de construcción con sentido de reparación y la designación específica de la puerta oriental, ajustando únicamente la expresión al español sin introducir nuevas variantes textuales.
  spanish_consistency_notes:
  - Se mantuvo un registro bíblico sobrio y contemporáneo, evitando arcaísmos innecesarios.
  - Se conservó la secuencia repetida “Después de él... y después de él...” para reflejar la estructura listada del hebreo.
  - Los nombres propios se transliteraron de manera consistente en español, sin depender de la ortografía inglesa.
  - Se usó “Puerta del Oriente” como nombre de la puerta para conservar el matiz direccional y el tono bíblico.
