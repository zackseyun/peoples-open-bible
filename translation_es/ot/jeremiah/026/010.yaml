translation:
  language: es
  text: Cuando los oficiales[a] de Judá oyeron estas palabras, subieron[b] de la casa del rey a la casa de Yahvé y se sentaron a la entrada de la Puerta Nueva de Yahvé[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «los príncipes de Judá». El término hebreo puede designar gobernantes de alto rango o funcionarios.
    reason: lexical_alternative
  - marker: b
    text: O «fueron subiendo». El verbo hebreo conserva la idea direccional de subir hacia el recinto del templo.
    reason: lexical_alternative
  - marker: c
    text: Es decir, una puerta del complejo del templo conocida como «la Puerta Nueva».
    reason: cultural_note
lexical_decisions:
- source_word: שָׂרֵי יְהוּדָה
  english_pob_choice: the officials of Judah
  chosen_spanish: los oficiales[a] de Judá
  alternatives_spanish:
  - los príncipes de Judá
  - los gobernantes de Judá
  - los líderes de Judá
  lexicon: HALOT
  rationale: שָׂרִים puede referirse a altos funcionarios o príncipes. En español, «oficiales» comunica autoridad gubernamental sin cargar innecesariamente una noción hereditaria de nobleza. Se conserva la ambigüedad histórica con la nota.
- source_word: הַדְּבָרִים הָאֵלֶּה
  english_pob_choice: these words
  chosen_spanish: estas palabras
  alternatives_spanish:
  - estas cosas
  - este asunto
  - estos dichos
  lexicon: HALOT
  rationale: Aquí el texto se refiere al mensaje oído por los funcionarios; «palabras» mantiene el foco verbal del hebreo y del contexto narrativo.
- source_word: וַיַּעֲלוּ
  english_pob_choice: they went up
  chosen_spanish: subieron[b]
  alternatives_spanish:
  - fueron hacia arriba
  - ascendieron
  - subieron allá
  lexicon: HALOT
  rationale: עלה conserva el modismo direccional de «subir», natural en español y acorde con el movimiento hacia el recinto del templo y/o la elevación topográfica. La nota aclara la posible lectura de «palacio/casa real».
- source_word: מִבֵּית הַמֶּלֶךְ
  english_pob_choice: from the king’s house
  chosen_spanish: de la casa del rey
  alternatives_spanish:
  - del palacio
  - desde el palacio
  lexicon: HALOT
  rationale: La forma más literal en español es «casa del rey», que preserva la imagen hebrea. «Palacio» es posible, pero menos transparente como traducción directa.
- source_word: בֵּית יְהוָה
  english_pob_choice: the house of Yahweh
  chosen_spanish: la casa de Yahvé
  alternatives_spanish:
  - el templo de Yahvé
  - la casa del SEÑOR
  lexicon: HALOT
  rationale: 'Se mantiene el valor formal de בית como «casa», en armonía con la directriz del proyecto para el nombre divino: יְהוָה → «Yahvé».'
- source_word: וַיֵּשְׁבוּ
  english_pob_choice: and sat
  chosen_spanish: se sentaron
  alternatives_spanish:
  - se colocaron
  - tomaron asiento
  - se sentaron a
  lexicon: HALOT
  rationale: ישׁב se traduce de manera directa por «sentarse». El contexto judicial/administrativo se deja inferido por la escena.
- source_word: בְּפֶתַח
  english_pob_choice: at the entrance
  chosen_spanish: a la entrada
  alternatives_spanish:
  - en la entrada
  - junto a la entrada
  - a la puerta
  lexicon: HALOT
  rationale: פֶּתַח designa una entrada o abertura; «a la entrada» es idiomático y preciso para la ubicación junto al acceso de la puerta.
- source_word: שַׁעַר יְהוָה הֶחָדָשׁ
  english_pob_choice: the New Gate of Yahweh
  chosen_spanish: la puerta Nueva de Yahvé[c]
  alternatives_spanish:
  - la puerta nueva de Yahvé
  - la Nueva Puerta de Yahvé
  - la puerta nueva del templo de Yahvé
  lexicon: HALOT
  rationale: El hebreo nombra una puerta concreta del complejo del templo. «Puerta Nueva» puede leerse como designación fija; se conserva con mayúscula en «Nueva» para reflejar el probable carácter de nombre propio sin eliminar el valor adjetival del original.
theological_decisions:
- issue: Traducción del Tetragrámaton יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - Jehová
  rationale: Se sigue la directriz del proyecto para preservar el nombre divino personal en español. «Yahvé» es la forma adoptada en el texto principal y evita la sustitución por un título genérico.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Designación de la puerta del templo
  english_pob_reading: the New Gate of Yahweh
  chosen_spanish_reading: la puerta Nueva de Yahvé
  alternative_spanish_readings:
  - la puerta nueva de Yahvé
  - la Nueva Puerta de Yahvé
  rationale: El hebreo parece tratarse de un nombre de puerta conocido dentro del complejo del templo. La mayúscula en «Nueva» intenta reflejar ese valor nominal sin imponer más de lo que el texto exige.
  doctrine_reference: Jeremiah 26:10 contextual temple-topography note
translation_notes:
  revision_awareness: 'Se ha mantenido el estado de alta concordancia del audit trail inglés, sin cambios sustanciales respecto de la última revisión: el único ajuste relevante para español es la adaptación del nombre divino a la convención del proyecto («Yahvé») y la preservación de la designación fija de la puerta del templo con una nota aclaratoria.'
  spanish_consistency_notes:
  - Se conserva «casa del rey» en vez de «palacio» para mantener transparencia con el hebreo.
  - Se usa «Yahvé» de manera consistente para יְהוָה.
  - Se mantiene «puerta Nueva» con mayúscula parcial para sugerir nombre propio sin sobreinterpretar.
  - El verbo «subieron» retiene el movimiento ascendente del hebreo.
  - «Oficiales» refleja la lectura administrativa documentada en el audit trail inglés.
