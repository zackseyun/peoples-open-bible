translation:
  language: es
  text: Mientras él hablaba con ellos, he aquí que subió el campeón[a] —Goliat, el filisteo, de Gat, de las filas de los filisteos[b]—, y habló estas palabras, y David lo oyó.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebreo literalmente, ‘el hombre entre [las dos partes/líneas]’, un modismo para un guerrero representante en combate singular.
    reason: lexical_alternative
  - marker: b
    text: La expresión probablemente se refiere a las líneas o filas de batalla de los filisteos; algunas traducciones dicen ‘de los campamentos de los filisteos’.
    reason: alternative_reading
lexical_decisions:
- source_word: מְדַבֵּר
  english_pob_choice: was speaking
  chosen_spanish: hablaba
  alternatives_spanish:
  - estaba hablando
  - estaba hablando con ellos
  lexicon: HALOT
  rationale: El participio con הוּא expresa acción en curso. En español, el imperfecto simple 'hablaba' comunica de manera natural esa continuidad narrativa sin recargar el estilo.
- source_word: עִמָּם
  english_pob_choice: with them
  chosen_spanish: con ellos
  alternatives_spanish:
  - a ellos
  lexicon: HALOT
  rationale: עִם indica compañía o interacción mutua; 'con ellos' conserva la idea de conversación en curso.
- source_word: וְהִנֵּה
  english_pob_choice: behold
  chosen_spanish: he aquí
  alternatives_spanish:
  - y he aquí
  - miren
  lexicon: HALOT
  rationale: Se conserva el marcador discursivo de sorpresa/vividez narrativa con una fórmula natural y reverente en español bíblico.
- source_word: אִישׁ הַבֵּנַיִם
  english_pob_choice: the champion
  chosen_spanish: el campeón
  alternatives_spanish:
  - el hombre entre las dos filas
  - el guerrero representante
  lexicon: HALOT
  rationale: El giro idiomático designa al combatiente representativo en duelo singular. 'Campeón' comunica bien esa función en español sin perder el matiz de singularidad combativa; la opción más literal queda reflejada en nota.
- source_word: עוֹלֶה
  english_pob_choice: came up
  chosen_spanish: subía
  alternatives_spanish:
  - subió
  - venía subiendo
  lexicon: HALOT
  rationale: El verbo de ascenso es coherente con la topografía del relato. El imperfecto 'subía' mantiene la escena en desarrollo, acorde con el participio hebreo, aunque la narración total pueda leerse como dinámica progresiva.
- source_word: הַפְּלִשְׁתִּי
  english_pob_choice: the Philistine
  chosen_spanish: el filisteo
  alternatives_spanish:
  - el filisteo
  lexicon: HALOT
  rationale: Gentilicio identificador directo, sin necesidad de ampliación.
- source_word: שְׁמוֹ
  english_pob_choice: named
  chosen_spanish: Goliat
  alternatives_spanish:
  - llamado Goliat
  - de nombre Goliat
  lexicon: HALOT
  rationale: El hebreo formula la identificación por nombre. En español, la aposición con el nombre propio resulta suficientemente clara; se mantiene la mención explícita en la oración para no perder el valor identificador.
- source_word: מִגַּת
  english_pob_choice: from Gath
  chosen_spanish: de Gat
  alternatives_spanish:
  - desde Gat
  lexicon: HALOT
  rationale: Topónimo estándar transliterado en forma hispana habitual.
- source_word: ממערות פְּלִשְׁתִּים
  english_pob_choice: from the ranks of the Philistines
  chosen_spanish: de las filas de los filisteos
  alternatives_spanish:
  - de los campamentos de los filisteos
  - de las líneas de batalla de los filisteos
  lexicon: HALOT
  rationale: La frase difícil se entiende en contexto como procedencia desde la formación militar filistea. 'Filas' es una forma española natural que conserva la imagen de línea/bando militar y permite la lectura alternativa señalada por el POB inglés.
- source_word: וַיְדַבֵּר כַּדְּבָרִים הָאֵלֶּה
  english_pob_choice: and he spoke these words
  chosen_spanish: y habló esas palabras
  alternatives_spanish:
  - y dijo esas palabras
  - y repitió esas palabras
  lexicon: HALOT
  rationale: La construcción apunta a la intervención verbal concreta de Goliat ya descrita. 'Habló esas palabras' conserva el enlace deíctico con el discurso previo; 'dijo' sería más idiomático, pero menos atento a la repetición marcada por el hebreo.
- source_word: וַיִּשְׁמַע דָּוִד
  english_pob_choice: and David heard
  chosen_spanish: y David lo oyó
  alternatives_spanish:
  - y David oyó
  - y David escuchó
  lexicon: HALOT
  rationale: El objeto está implícito en hebreo; en español, 'lo oyó' evita ambigüedad y mantiene la referencia al discurso de Goliat. 'Escuchó' introduciría una intensidad no exigida por el texto.
theological_decisions:
- issue: Sentido de אִישׁ הַבֵּנַיִם como figura de combate singular
  english_pob_reading: the champion; idiom for a representative warrior in single combat
  chosen_spanish_reading: el campeón; es decir, el guerrero representante del duelo singular
  alternative_spanish_readings:
  - el hombre entre las dos filas
  - el representante en combate singular
  rationale: No se debe borrar la tensión idiomática del hebreo. 'Campeón' funciona como equivalente natural en español, pero la nota preserva el valor más literal y la función histórica del término como combatiente representante.
  doctrine_reference: No doctrinal issue; lexical/theological transparency in narrative translation
- issue: Sentido de מ/מערות פְּלִשְׁתִּים como procedencia militar
  english_pob_reading: from the ranks of the Philistines; alternative 'from the camps of the Philistines'
  chosen_spanish_reading: de las filas de los filisteos
  alternative_spanish_readings:
  - de los campamentos de los filisteos
  - de las líneas de batalla de los filisteos
  rationale: La tradición textual y la dificultad léxica permiten más de una concreción. 'Filas' mantiene el sentido militar de la escena sin decidir de forma excesiva entre 'campamentos' y 'líneas de batalla'.
  doctrine_reference: No doctrinal issue; textual/lexical ambiguity preserved
translation_notes:
  revision_awareness: El texto hebreo y el audit trail inglés coinciden ampliamente. Se siguió la revisión más reciente del inglés al preferir un verbo narrativo simple ('came up') antes que una progresiva. En español, se optó por un imperfecto natural ('subía') para reflejar el participio hebreo y mantener fluidez narrativa, sin alterar el evento puntual; el resto del verso se mantuvo cercano al análisis inglés y a la ambigüedad textual documentada.
  spanish_consistency_notes:
  - Se usa 'Yahvé' como norma general, pero este versículo no lo contiene.
  - Se mantiene 'filisteo/filisteos' para el gentilicio uniforme.
  - '''Campeón'' se usa como equivalente narrativo; la nota preserva la literalidad idiomática.'
  - Se preserva la ambigüedad de la frase militar con una formulación española natural.
  - '''Lo oyó'' explicita el objeto implícito para claridad, sin añadir contenido nuevo.'
