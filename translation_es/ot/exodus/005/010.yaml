translation:
  language: es
  text: 'Entonces los capataces del pueblo y sus oficiales salieron y dijeron al pueblo[a]: «Así dice Faraón: No les doy paja».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «sus capataces». El hebreo puede designar oficiales subordinados entre el pueblo.
    reason: lexical_alternative
lexical_decisions:
- source_word: נֹגְשֵׂי
  english_pob_choice: taskmasters
  chosen_spanish: capataces
  alternatives_spanish:
  - caporales
  - supervisores
  - apremiadores
  lexicon: HALOT
  rationale: El hebreo designa a funcionarios que imponían la carga laboral. En español, 'capataces' comunica bien la función coercitiva de supervisión del trabajo sin sonar tan técnico como 'supervisores' ni tan interpretativo como 'apremiadores'.
- source_word: שֹׁטְרָיו
  english_pob_choice: their officers
  chosen_spanish: sus oficiales
  alternatives_spanish:
  - sus capataces
  - sus foremanes
  - sus suboficiales
  lexicon: HALOT
  rationale: El sufijo masculino singular remite aquí al pueblo, y el término indica subordinados administrativos. 'Sus oficiales' mantiene la relación jerárquica y la amplitud semántica sin cerrar innecesariamente el sentido en 'foremanes'.
- source_word: וַיֵּצְאוּ
  english_pob_choice: went out
  chosen_spanish: salieron
  alternatives_spanish:
  - fueron
  - se fueron
  lexicon: HALOT
  rationale: '''Salir'' reproduce de manera natural el movimiento narrativo desde la presencia de Faraón hacia el pueblo.'
- source_word: הָעָם
  english_pob_choice: the people
  chosen_spanish: el pueblo
  alternatives_spanish:
  - la gente
  - el pueblo de Israel
  lexicon: HALOT
  rationale: El colectivo se refiere al pueblo oprimido en contexto; 'el pueblo' es la forma más directa y fiel, y evita añadir 'de Israel' sin que el verso lo explicite.
- source_word: לֵאמֹר
  english_pob_choice: and said
  chosen_spanish: y dijeron
  alternatives_spanish:
  - diciendo
  lexicon: HALOT
  rationale: En español, la introducción del discurso suena más natural con 'y dijeron' que con un calco tipo 'y dijeron, diciendo'. Conservar la coordinación preserva la función discursiva sin pesadez.
- source_word: כֹּה אָמַר
  english_pob_choice: Thus says
  chosen_spanish: Así dice
  alternatives_spanish:
  - Esto dice
  - Así ha dicho
  lexicon: HALOT
  rationale: Es la fórmula mensajera estándar. 'Así dice' refleja el valor formular y el presente de proclamación, más natural en español que un pasado literal.
- source_word: פַּרְעֹה
  english_pob_choice: Pharaoh
  chosen_spanish: el faraón
  alternatives_spanish:
  - Faraón
  lexicon: HALOT
  rationale: En español, el título suele ir en minúscula cuando funciona como sustantivo común. 'El faraón' conserva el referente real sin forzar una transliteración innecesaria.
- source_word: אֵינֶנִּי נֹתֵן
  english_pob_choice: I am not giving
  chosen_spanish: No les estoy dando
  alternatives_spanish:
  - No les daré
  - No les doy
  lexicon: HALOT
  rationale: La construcción expresa una negativa inmediata en contexto. 'No les estoy dando' conserva la fuerza de una negativa en curso, cercana al matiz progresivo defendido en el POB inglés.
- source_word: תֶּבֶן
  english_pob_choice: straw
  chosen_spanish: paja
  alternatives_spanish:
  - rastrojo
  - caña picada
  lexicon: HALOT
  rationale: '''Paja'' es el equivalente natural y tradicional para el material usado en la fabricación de ladrillos; en este contexto comunica bien la carga de la orden faraónica.'
theological_decisions:
- issue: Fórmula de autoridad real en boca de Faraón
  english_pob_reading: 'Thus says Pharaoh: I am not giving you straw.'
  chosen_spanish_reading: 'Así dice el faraón: No les estoy dando paja.'
  alternative_spanish_readings:
  - 'Así dice Faraón: No les doy paja'
  - 'Así ha dicho el faraón: No les daré paja'
  rationale: 'No hay una cuestión doctrinal controvertida, pero sí una decisión de registro: mantener la fórmula proclamativa en presente subraya el carácter autoritativo del decreto y evita convertirlo en una simple nota narrativa pasada.'
  doctrine_reference: N/A
translation_notes:
  revision_awareness: La versión inglesa auditada no presenta revisiones aplicadas; el control de calidad indica alta concordancia y sin cambios necesarios. La redacción española sigue de cerca la sintaxis y las decisiones léxicas del POB inglés, ajustándolas a un español natural y publicable.
  spanish_consistency_notes:
  - Se mantiene 'el faraón' en minúscula por tratarse de título en español, salvo estilos editoriales que prefieran mayúscula.
  - Se evita 'SEÑOR' u otras equivalencias teológicas no pertinentes, porque aquí aparece פַּרְעֹה y no el nombre divino.
  - '''Capataces'' y ''oficiales'' conservan la distinción entre los dos grupos de supervisión sin mezclar ambos términos.'
  - La negativa progresiva 'No les estoy dando' preserva el matiz de acción en curso del hebreo y del POB inglés.
