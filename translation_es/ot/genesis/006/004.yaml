    reason: alternative_reading
  - marker: b
    text: «Los hijos de Dios» también puede entenderse como «seres divinos» o, en algunas interpretaciones, como gobernantes humanos o la línea piadosa de Set.
    reason: alternative_reading
  - marker: c
    text: '«Hombre» aquí tiene sentido colectivo: es decir, mujeres humanas.'
    reason: lexical_alternative
  revision_rationale: Se ajusta el texto para expresar en español natural el idiomatismo sexual de יָבֹאוּ אֶל sin resolver la ambigüedad teológica ni añadir detalle interpretativo. También se mejora la fuerza léxica de הַגִּבֹּרִים con «hombres poderosos» y la naturalidad de la apertura con «Había ... en la tierra». Las notas existentes siguen siendo adecuadas y no requieren cambio de contenido ni de marcadores.
