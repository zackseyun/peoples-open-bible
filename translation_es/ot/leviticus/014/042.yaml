  yaml_path: translation/ot/leviticus/014/042.yaml
  text: Then they shall take other stones and bring them in place of the stones[b][a], and he shall take other mortar and plaster the house.
  footnotes:
  - marker: a
    text: Or 'other mortar' or, more literally, 'other dust/earth.' The Hebrew refers to the material used to recoat the house after the infected stones are replaced.
    reason: lexical_alternative
  - marker: b
    text: Literally 'under the stones,' an idiom here meaning 'in place of the stones' or 'to replace the stones.'
    reason: lexical_alternative
