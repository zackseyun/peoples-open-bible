base_translation:
  language: en
  yaml_path: translation/ot/deuteronomy/001/001.yaml
  text: These are the words that Moses spoke to all Israel beyond the Jordan[a], in the wilderness, in the Arabah opposite Suph, between Paran, Tophel, Laban, Hazeroth[d][c][b], and Dizahab.
  footnotes:
  - marker: a
    text: Or “across the Jordan” or “on the other side of the Jordan.” The Hebrew expression can be rendered from different geographic viewpoints.
    reason: lexical_alternative
  - marker: b
    text: “Arabah” is a geographic term for the rift/plain region; traditionally also rendered “plain.”
    reason: cultural_note
  - marker: c
    text: Hebrew “Suph.” Some understand this as a place-name; others connect it with the “Reed Sea,” but the word “sea” is not present here.
    reason: alternative_reading
  - marker: d
    text: Or, in smoother English, “between Paran, Tophel, Laban, Hazeroth, and Dizahab.”
    reason: lexical_alternative
