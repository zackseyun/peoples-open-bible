translation:
  language: es
  text: Yahvé habló a Moisés[a], diciendo,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «YHWH». Tradicionalmente se vierte «el SEÑOR»; alternativamente, «Yahvé».'
