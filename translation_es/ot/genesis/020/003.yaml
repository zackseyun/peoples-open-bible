  text: וַ/יָּבֹ֧א אֱלֹהִ֛ים אֶל אֲבִימֶ֖לֶךְ בַּ/חֲל֣וֹם הַ/לָּ֑יְלָה וַ/יֹּ֣אמֶר ל֗/וֹ הִנְּ/ךָ֥ מֵת֙ עַל הָ/אִשָּׁ֣ה אֲשֶׁר לָקַ֔חְתָּ וְ/הִ֖וא בְּעֻ֥לַת בָּֽעַל־־־׃
base_translation:
  language: en
  yaml_path: translation/ot/genesis/020/003.yaml
  text: But God came to Abimelech in a dream by night and said to him[a], “Behold, you are a dead man because of the woman whom you have taken[c][b], for she is married.”
  footnotes:
  - marker: a
    text: Or, more literally, “Look, you are dead” or “Look, you will die.” The Hebrew expresses certain, imminent death.
    reason: lexical_alternative
  - marker: b
    text: 'Hebrew: “for she is possessed by a husband,” that is, she already has a husband.'
    reason: lexical_alternative
  - marker: c
    text: Or 'for she is married to a husband'.
    reason: previous_rendering
