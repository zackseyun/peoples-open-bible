revisions:
- from: Pero si ellos dicen esto[a], ‘Sube contra nosotros’, entonces subiremos, porque Yahvé los ha entregado en nuestra mano[b], y esto será la señal para nosotros.
  to: Pero si ellos dicen esto[a], «Suban hacia nosotros», entonces subiremos, porque Yahvé los ha entregado en nuestra mano[b], y esta será la señal para nosotros.
  rationale: Se corrige el imperativo al plural y se restituye en el texto principal el sentido preferido y documentado de acercamiento («hacia nosotros»), dejando la lectura más hostil («contra nosotros») en nota, como en la auditoría inglesa. También se ajusta «esto será la señal» a «esta será la señal», que suena más natural en español al concordar con «señal».
