theological_decisions:
- issue: Rendering the Son's inability/dependence without implying ontological inferiority
  chosen_reading: the Son is not able to do anything from himself
  alternative_readings:
  - the Son can do nothing by himself
  - the Son can do nothing on his own initiative
  rationale: The Greek states functional inseparability and dependence in action, not denial of the Son's deity. The wording preserves the text's claim without importing subordinationist conclusions. This accords with Nicene and Chalcedonian orthodoxy while remaining text-driven.
  doctrine_reference: 'Affirmations: Nicene Creed (381 AD), Definition of Chalcedon (451 AD); Translation philosophy #3'
- issue: Capitalization of 'Son' and 'Father' as divine titles
  chosen_reading: the Son / the Father
  alternative_readings:
  - the son / the father
  rationale: Although capitalization is an English editorial decision, in this context the terms function as specific christological and theological titles within John's Gospel. Capitalization aids readers without altering meaning.
  doctrine_reference: 'Affirmations: Nicene Creed (381 AD)'
