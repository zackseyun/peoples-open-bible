translation:
  language: es
  text: Pero él volvió al rey con ira[a], y le comunicó estas palabras y el esplendor[b] de Simón y todo lo que había visto; y el rey se enfureció grandemente.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Con ira» traduce μετὰ θυμοῦ como una expresión de modo; también podría entenderse «enojado» o «airado».
    reason: lexical_alternative
  - marker: b
    text: O «la gloria de Simón». Aquí δόξα probablemente se refiere al esplendor visible o a la grandeza impresionante que rodeaba a Simón.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀπέστρεψεν
  english_pob_choice: returned
  chosen_spanish: volvió
  alternatives_spanish:
  - regresó
  - volvió de regreso
  lexicon: LSJ
  rationale: El verbo indica movimiento de retorno; «volvió» es natural en español y conserva la idea de regresar al rey sin añadir matices ajenos.
- source_word: μετὰ θυμοῦ
  english_pob_choice: in anger
  chosen_spanish: enojado
  alternatives_spanish:
  - con ira
  - en ira
  lexicon: LSJ
  rationale: La frase expresa la manera del retorno. «Enojado» mantiene el valor emocional de forma idiomática y legible en español, sin forzar un giro arcaico.
- source_word: ἀπήγγειλεν
  english_pob_choice: reported
  chosen_spanish: le comunicó
  alternatives_spanish:
  - le informó
  - le contó
  lexicon: LSJ
  rationale: Aquí el verbo implica transmitir un mensaje de vuelta al rey. «Le comunicó» preserva ese acto de relatar lo oído y visto, con registro formal.
- source_word: τοὺς λόγους τούτους
  english_pob_choice: these words
  chosen_spanish: estas palabras
  alternatives_spanish:
  - este mensaje
  - estos dichos
  lexicon: LSJ
  rationale: λόγοι se refiere de forma concreta a lo que acababa de decirse. «Estas palabras» sigue de cerca el referente verbal sin volverlo demasiado abstracto.
- source_word: τὴν δόξαν Σίμωνος
  english_pob_choice: the splendor of Simon
  chosen_spanish: la magnificencia de Simón
  alternatives_spanish:
  - la gloria de Simón
  - el esplendor de Simón
  - la honra de Simón
  lexicon: LSJ
  rationale: En este contexto narrativo, δόξα apunta a la exhibición visible de grandeza o prestigio que acompañaba a Simón. «Magnificencia» comunica mejor esa impresión observable que «gloria» en español, aunque se mantiene como alternativa viable.
- source_word: πάντα ὅσα εἶδεν
  english_pob_choice: everything that he had seen
  chosen_spanish: todo lo que había visto
  alternatives_spanish:
  - todo cuanto vio
  - todo lo que vio
  lexicon: LSJ
  rationale: La construcción es abarcadora y retrospectiva; el pluscuamperfecto español deja claro que la visión ocurrió antes del informe al rey.
- source_word: ὠργίσθη ὁ βασιλεὺς ὀργὴν μεγάλην
  english_pob_choice: the king was greatly angered
  chosen_spanish: el rey se enojó mucho
  alternatives_spanish:
  - el rey se enfureció grandemente
  - el rey quedó muy airado
  lexicon: LSJ
  rationale: El griego usa una construcción cognada de intensificación. «Se enojó mucho» transmite la fuerza del original con naturalidad; en un registro más fuerte podrían usarse las otras opciones, pero esta mantiene el tono sobrio del pasaje.
translation_notes:
  revision_awareness: 'La redacción sigue el estado más reciente del texto inglés auditado: se prefirió un español formal y natural, manteniendo la secuencia narrativa, la intensificación final y la nota léxica sobre δόξα como término de posible doble lectura.'
  spanish_consistency_notes:
  - Se mantuvo «Simón» para el nombre propio, en correspondencia con el original griego.
  - Se eligió un registro bíblico moderno sin calcos rígidos, pero sin domesticar la carga semántica de los términos claves.
  - No se añadieron decisiones teológicas porque el verso es narrativo y no presenta un punto doctrinal explícito.
