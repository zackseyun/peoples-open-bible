revisions:
- from: Reúne[a] la dispersión de Israel con misericordia y bondad[b].
  to: Reúne a los dispersos[a] de Israel con misericordia y bondad[b].
  rationale: Se reemplaza «la dispersión de Israel» por «los dispersos de Israel» porque en español esta construcción expresa de forma más natural el referente humano colectivo de διασπορά con el verbo «reúne». La alternativa literal se conserva en nota para mantener el peso léxico e histórico del término griego. Se simplifica además la nota de χρηστότης para evitar una alternativa menos precisa en este contexto.
  reviewer_model: gpt-5.4
