base_translation:
  language: en
  yaml_path: translation/ot/genesis/044/032.yaml
  text: For your servant became surety for the boy to my father[a], saying, ‘If I do not bring him to you[b], then I will bear the blame before my father all my days.’
  footnotes:
  - marker: a
    text: Or 'guaranteed the boy' or 'pledged himself for the boy.' The Hebrew verb carries the sense of taking responsibility as a guarantor.
    reason: lexical_alternative
  - marker: b
    text: Literally, 'I will have sinned to/against my father all the days'; here the sense is enduring guilt or blame before him.
    reason: lexical_alternative
