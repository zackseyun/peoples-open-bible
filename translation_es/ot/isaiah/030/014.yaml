  yaml_path: translation/ot/isaiah/030/014.yaml
  text: and its breaking is like the breaking of a potter’s jar[a], smashed without pity[b], so that among its shattered pieces not a shard is found with which to take fire from the hearth or to scoop water from a cistern.
  footnotes:
  - marker: a
    text: Or 'with which to scoop coals/embers from the hearth.' The Hebrew says literally 'to take fire from the burning place.'
    reason: lexical_alternative
  - marker: b
    text: Or 'from a pool.' The Hebrew term can refer more generally to a gathered body of water, but 'cistern' best fits the setting.
    reason: lexical_alternative
