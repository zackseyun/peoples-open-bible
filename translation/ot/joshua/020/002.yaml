theological_decisions:
- issue: Gendered covenantal designation בְּנֵי יִשְׂרָאֵל
  chosen_reading: the sons of Israel
  alternative_readings:
  - the Israelites
  - the children of Israel
  rationale: The source uses a masculine plural familial expression. Per the translation philosophy, gender-accurate rendering is preferred over neutralizing the phrase, unless context clearly demands otherwise. Here the expression names the covenant people in a conventional Hebrew form, so the literal familial wording is retained.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
- issue: Agency idiom בְּיַד מֹשֶׁה
  chosen_reading: through Moses
  alternative_readings:
  - by the hand of Moses
  rationale: No doctrinal dispute is at stake, but the idiom concerns how divine instruction was mediated. 'Through Moses' preserves Moses as the human mediator of God's prior command while using natural English. The more literal idiom is preserved in a footnote for auditability.
  doctrine_reference: DOCTRINE.md §Translation philosophy 1, 6
