base_translation:
  language: en
  yaml_path: translation/ot/1_kings/007/008.yaml
  text: His house where he was to live[a], in the other court farther back from the Hall, was of the same workmanship. He also made a house like this Hall for Pharaoh’s daughter[b], whom Solomon had taken as wife.
  footnotes:
  - marker: a
    text: Or 'in another court, farther inward from the Hall.' The Hebrew spatial phrase is difficult, and translations vary in how they describe the residence’s position relative to the Hall.
    reason: alternative_reading
  - marker: b
    text: Hebrew 'whom Solomon had taken'; that is, taken in marriage.
    reason: lexical_alternative
