  language: en
  yaml_path: translation/ot/genesis/003/016.yaml
  text: To the woman he said[a], “I will greatly multiply your pain and your conception; in pain you will bear children. Your desire will be for your husband[c][b], and he will rule over you.”
  footnotes:
  - marker: a
    text: Or 'your pregnancy.' The Hebrew term can denote conception or pregnancy.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'sons'; here likely meaning children/offspring generally.
    reason: lexical_alternative
  - marker: c
    text: Or 'longing.' The rare Hebrew word may denote desire in a broad sense; some interpret it as a desire to control (compare Gen 4:7), while others take it as relational or sexual longing.
    reason: alternative_reading
