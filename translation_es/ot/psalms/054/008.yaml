- from: Con un sacrificio voluntario[a] te ofreceré; daré gracias a tu nombre, Yahvé, porque es bueno[b].
  to: Te ofreceré una ofrenda voluntaria[a]; daré gracias a tu nombre, Yahvé, porque es bueno[b].
