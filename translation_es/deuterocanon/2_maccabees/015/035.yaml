translation:
  language: es
  text: Y colgó la cabeza cercenada[a] de Nicanor de la ciudadela[b], visible para todos y como una señal clara de la ayuda del Señor.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «la cabeza de Nicanor». El griego προτομή puede denotar la parte frontal o la cabeza; aquí, como el contexto ya ha narrado su decapitación, «cabeza cercenada» hace explícito el sentido.
    reason: lexical_alternative
  - marker: b
    text: O «fortaleza» o «altura fortificada». El griego ἄκρα se refiere a un lugar alto fortificado; «ciudadela» preserva bien ese sentido en español general.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐξέδησεν
  english_pob_choice: hung
  chosen_spanish: colgó
  alternatives_spanish:
  - suspendió
  - pendió
  lexicon: LSJ
  rationale: El verbo griego expresa colgar o suspender algo para exposición pública. En español, «colgó» comunica de modo natural esa acción pública y visual, sin perder el sentido narrativo.
- source_word: προτομήν
  english_pob_choice: severed head
  chosen_spanish: cabeza cortada
  alternatives_spanish:
  - cabeza
  - cabeza cercenada
  - busto
  lexicon: LSJ
  rationale: En este contexto, Nicanor ya ha sido decapitado en la narración previa; por eso la referencia es a su cabeza separada del cuerpo. «Cabeza cortada» hace explícito el sentido sin introducir una imagen artística ajena como «busto».
- source_word: ἄκρας
  english_pob_choice: citadel
  chosen_spanish: acrópolis
  alternatives_spanish:
  - ciudadela
  - fortaleza
  - altura fortificada
  lexicon: LSJ
  rationale: ἄκρα designa un lugar alto fortificado. «Acrópolis» mantiene la idea de altura fortificada y resulta más idiomático en español que una transliteración o una perífrasis demasiado larga; la nota conserva la alternativa tradicional de sentido.
- source_word: ἐπίδηλον
  english_pob_choice: visible
  chosen_spanish: visible
  alternatives_spanish:
  - manifiesta
  - evidente
  - clara de ver
  lexicon: LSJ
  rationale: El adjetivo significa algo que se ve claramente o que salta a la vista. «Visible» reproduce bien el énfasis público del texto.
- source_word: φανερὸν
  english_pob_choice: clear
  chosen_spanish: clara
  alternatives_spanish:
  - manifiesta
  - evidente
  - patente
  lexicon: LSJ
  rationale: Usado con σημεῖον, el término intensifica la idea de una señal inequívoca. «Señal clara» conserva esa fuerza con español natural.
- source_word: τοῦ κυρίου
  english_pob_choice: the Lord’s
  chosen_spanish: del Señor
  alternatives_spanish:
  - de Yahvé
  - del Señor Dios
  lexicon: LSJ
  rationale: Aunque el proyecto normalmente usa «Yahvé» para el nombre divino, aquí el griego dice κυρίου, no el tetragrámaton. Por eso se conserva «Señor», coherente con la lectura auditada del inglés y con el valor reverente del genitivo.
- source_word: βοηθείας
  english_pob_choice: help
  chosen_spanish: ayuda
  alternatives_spanish:
  - auxilio
  - socorro
  - asistencia
  lexicon: LSJ
  rationale: El sustantivo significa ayuda o auxilio. «Ayuda» es claro, directo y conserva el sentido de intervención favorable de Dios en la victoria.
- source_word: σημεῖον
  english_pob_choice: sign
  chosen_spanish: señal
  alternatives_spanish:
  - signo
  - prueba
  - indicativo
  lexicon: LSJ
  rationale: En español, «señal» comunica bien el valor de σημεῖον como indicio visible de la acción divina, sin sobrerrepresentarlo como «prueba».
theological_decisions:
- issue: Renderización de κύριος en una narración griega deuterocanónica
  english_pob_reading: the Lord
  chosen_spanish_reading: el Señor
  alternative_spanish_readings:
  - Yahvé
  - el Señor Dios
  rationale: La evidencia griega presenta τοῦ κυρίου. Según el criterio del proyecto para κύριος en este tipo de contexto, se mantiene «Señor»; no se sustituye por «Yahvé» porque aquí no hay una cita explícita del tetragrámaton, sino una referencia reverente al Dios que ayuda.
  doctrine_reference: 'DOCTRINE.md: Contested terms — κύριος → Lord'
translation_notes:
  revision_awareness: 'La versión española sigue la última revisión del audit trail al mantener el enlace coordinante equivalente a καί: «y señal clara...». También refleja la decisión revisada de hacer explícita la idea de una cabeza ya separada del cuerpo, sin depender solo de una traducción genérica de προτομήν.'
  spanish_consistency_notes:
  - Se mantiene el estilo reverente y público del relato, con sintaxis natural en español.
  - Se conserva «Señor» para κύριος en coherencia con el audit trail inglés y con la práctica del proyecto para este término griego.
  - «Cabeza cortada» evita ambigüedad y preserva la tensión lexical documentada en προτομήν.
  - «Acrópolis» funciona aquí como equivalente estilísticamente claro de un lugar alto fortificado, con nota para la alternativa más literal.
