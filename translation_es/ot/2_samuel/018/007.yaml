review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien el sentido del hebreo: Israel es derrotado por los hombres de David y hubo una gran mortandad de veinte mil. Sin embargo, hay dos puntos de ajuste para mayor fidelidad y español más natural: el verbo hebreo es plural, por lo que «fue derrotado» con sujeto colectivo singular puede mejorarse a «fueron derrotados» para reflejar mejor a los combatientes; y la repetición de «allí» en español suena pesada y no es necesaria para conservar el sentido.'
  spanish_quality_summary: El español es claro y digno, pero «delante de los siervos de David» suena algo rígido en contexto militar. «Ante los siervos de David» mantiene la cercanía formal y mejora la fluidez. También conviene evitar la repetición de «allí».
  glossary_alignment: No hay conflictos con la terminología base del proyecto. «Siervos de David» es defendible según la racionalidad auditada, aunque menos idiomático que «hombres de David». «Matanza» refleja bien הַמַּגֵּפָה en este contexto, y las notas conservan las alternativas léxicas relevantes.
  issues:
  - severity: medium
    issue: Concordancia verbal con sujeto colectivo
    rationale: El texto español dice «el pueblo de Israel fue derrotado», que es gramaticalmente posible, pero el hebreo usa verbo plural y el contexto bélico apunta a los israelitas como combatientes; «fueron derrotados» refleja mejor la escena narrativa.
  - severity: low
    issue: Repetición poco natural de «allí»
    rationale: El hebreo repite שָׁם, pero en español la doble repetición inmediata resulta pesada. Puede conservarse el sentido con una sola mención sin pérdida material.
  - severity: low
    issue: «Delante de» suena algo torpe en registro militar
    rationale: «Ante» preserva bien לִפְנֵי y lee con mayor naturalidad en español bíblico moderno.
  revised_spanish_text: 'Allí el pueblo de Israel fueron derrotados[a] ante los siervos de David, y la matanza[b] fue grande aquel día: veinte mil hombres.'
  revised_footnotes:
