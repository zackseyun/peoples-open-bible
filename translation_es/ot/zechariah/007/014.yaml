    issue: El marcador de la nota [b] está colocado en el lugar incorrecto.
    rationale: La nota [b] ofrece alternativas para אֶרֶץ חֶמְדָּה ('la tierra deseable/deleitosa'), pero en el borrador está anclada después de 'regresara', como si comentara מֵעֹבֵר וּמִשָּׁב. Esto desaline­a la evidencia fuente, la traducción inglesa auditada y la nota española.
