revisions:
- from: Concibió y dio a luz un hijo[a], y le puso por nombre Er.
  to: Concibió y dio a luz un hijo,[a] y él lo llamó Er.
  rationale: Se revisa la última cláusula para reflejar en el texto principal el verbo masculino singular del hebreo, en consonancia con la decisión documentada del POB en inglés. «Y él lo llamó Er» es natural en español y preserva mejor el cambio de sujeto que el borrador anterior. Se conserva la nota explicativa sobre la forma hebrea más literal y la identificación probable del sujeto.
