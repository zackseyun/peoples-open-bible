translation:
  language: es
  text: Entonces Josué[a] y todo Israel con él subió de Eglón a Hebrón, y pelearon contra ella.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «contra ella», con pronombre femenino que se refiere a la ciudad de Hebrón.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּעַל
  english_pob_choice: went up
  chosen_spanish: subieron
  alternatives_spanish:
  - subió
  - ascendieron
  lexicon: HALOT
  rationale: עלה en este contexto narrativo expresa movimiento ascendente o de desplazamiento hacia un lugar más alto. En español, «subieron» conserva esa dirección de manera natural y fiel.
- source_word: וְכָל יִשְׂרָאֵל
  english_pob_choice: and all Israel
  chosen_spanish: y todo Israel
  alternatives_spanish:
  - y todos los israelitas
  lexicon: HALOT
  rationale: La expresión colectiva se mantiene de forma literal e idiomática. «Todo Israel» reproduce el alcance total del grupo sin volverla excesivamente explicativa.
- source_word: עִמּוֹ
  english_pob_choice: with him
  chosen_spanish: con él
  alternatives_spanish:
  - junto con él
  lexicon: HALOT
  rationale: El sufijo pronominal masculino singular se refiere a Josué. «Con él» es la equivalencia directa y natural en español.
- source_word: מֵעֶגְלֹנָה
  english_pob_choice: from Eglon
  chosen_spanish: de Eglón
  alternatives_spanish:
  - desde Eglón
  lexicon: HALOT
  rationale: La preposición מִן marca procedencia/origen. En español, «de Eglón» expresa bien el punto de partida sin añadir énfasis innecesario.
- source_word: חֶבְרוֹנָה
  english_pob_choice: to Hebron
  chosen_spanish: a Hebrón
  alternatives_spanish:
  - hacia Hebrón
  lexicon: HALOT
  rationale: El he direccional indica movimiento hacia Hebrón. «A Hebrón» es la forma más directa y natural para ese valor direccional.
- source_word: וַיִּלָּחֲמוּ
  english_pob_choice: and they fought
  chosen_spanish: y pelearon
  alternatives_spanish:
  - y combatieron
  - y hicieron guerra
  lexicon: HALOT
  rationale: לחם en este contexto militar se traduce con un verbo natural de combate. «Pelearon» comunica el hecho sin introducir un registro más técnico de guerra que el español común.
- source_word: עָלֶיהָ
  english_pob_choice: against it
  chosen_spanish: contra ella
  alternatives_spanish:
  - contra ella misma
  - en contra de ella
  lexicon: HALOT
  rationale: El sufijo femenino singular se refiere a la ciudad de Hebrón. En español, las ciudades suelen concordar como femeninas en este tipo de referencia, por lo que «contra ella» conserva la relación adversativa y la referencia pronominal del hebreo.
translation_notes:
  revision_awareness: El texto inglés auditado ya estaba en alta concordancia y sin revisiones aplicadas; la versión española sigue de cerca el hebreo y conserva la referencia pronominal femenina para Hebrón.
  spanish_consistency_notes:
  - Se mantuvo «Josué» como nombre propio estándar en español.
  - Se conservó la referencia a Hebrón con pronombre femenino en la nota, siguiendo el valor del hebreo.
  - Se evitó introducir terminología eclesiástica o interpretativa ajena al breve relato narrativo.
