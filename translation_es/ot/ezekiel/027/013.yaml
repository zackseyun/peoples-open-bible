translation:
  language: es
  text: 'Javán[a], Tubal y Mesec: ellos eran tus comerciantes; intercambiaban personas y artículos de bronce por tus mercancías.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'Grecia'. Aquí se translitera el etnónimo hebreo para conservar la forma del original, no para hacer una identificación contextual.
    reason: lexical_alternative
lexical_decisions:
- source_word: יָוָן
  english_pob_choice: Javan
  chosen_spanish: Javán
  alternatives_spanish:
  - Grecia
  lexicon: HALOT
  rationale: Se trata de un etnónimo / nombre propio, por lo que se translitera en español para conservar la correspondencia con el hebreo y con la decisión auditada en inglés.
- source_word: תֻּבַל
  english_pob_choice: Tubal
  chosen_spanish: Tubal
  lexicon: HALOT
  rationale: Nombre propio de pueblo o región; la transliteración mantiene la forma del original.
- source_word: מֶשֶׁךְ
  english_pob_choice: Meshech
  chosen_spanish: Mesec
  alternatives_spanish:
  - Meshec
  - Meshech
  lexicon: HALOT
  rationale: Nombre propio. En español bíblico, 'Mesec' es una transliteración natural y legible; conserva la referencia al etnónimo sin introducir una identificación interpretativa como 'Grecia'.
- source_word: רֹכְלָיִךְ
  english_pob_choice: your traders
  chosen_spanish: tus comerciantes
  alternatives_spanish:
  - tus mercaderes
  - tus tratantes
  lexicon: HALOT
  rationale: El término pertenece al campo comercial. 'Comerciantes' es claro y natural en español; 'mercaderes' es posible pero algo más arcaizante, y 'tratantes' suena menos general.
- source_word: בְּנֶפֶשׁ אָדָם
  english_pob_choice: persons
  chosen_spanish: personas
  alternatives_spanish:
  - personas humanas
  - vidas humanas
  - esclavos
  lexicon: HALOT
  rationale: La POB en inglés eligió 'persons' para no sobreespecificar el estatuto legal, pero manteniendo el impacto de bienes humanos en el comercio. 'Personas' reproduce esa opción de forma formal y natural en español.
- source_word: כְלֵי נְחֹשֶׁת
  english_pob_choice: articles of bronze
  chosen_spanish: utensilios de bronce
  alternatives_spanish:
  - artículos de bronce
  - objetos de bronce
  - vasos de bronce
  lexicon: HALOT
  rationale: La expresión es amplia y designa bienes manufacturados de bronce. 'Utensilios' comunica manufactura y utilidad sin restringir indebidamente a recipientes; 'artículos' es posible pero más genérico y menos idiomático.
- source_word: נָתְנוּ
  english_pob_choice: they exchanged
  chosen_spanish: intercambiaban
  alternatives_spanish:
  - dieron
  - comerciaban
  - cambiaban
  lexicon: HALOT
  rationale: Aunque el hebreo dice literalmente 'dieron', el contexto comercial pide una equivalencia idiomática. 'Intercambiaban' expresa la acción de trueque/negociación que la POB inglesa señaló.
- source_word: מַעֲרָבֵךְ
  english_pob_choice: your merchandise
  chosen_spanish: tus mercancías
  alternatives_spanish:
  - tu mercancía
  - tus bienes
  - tus productos
  lexicon: HALOT
  rationale: En el capítulo 27 el sustantivo pertenece al vocabulario del comercio y lo intercambiado. 'Mercancías' preserva el sentido comercial colectivo de la POB en inglés y suena natural en español.
theological_decisions:
- issue: ¿Debe identificarse el intercambio como esclavitud explícita?
  english_pob_reading: persons; in context this likely refers to people sold in trade, that is, slaves.
  chosen_spanish_reading: personas, sin explicitar 'esclavos' en el texto principal.
  alternative_spanish_readings:
  - esclavos
  - personas humanas
  - seres humanos
  rationale: El hebreo dice literalmente 'alma/vida de hombre' y el inglés auditado optó por 'persons' para reflejar el texto con formalidad, dejando abierta la inferencia contextual de trata humana. En español, 'personas' conserva esa tensión sin cerrarla más de lo que el texto base exige.
  doctrine_reference: Dignidad humana; trata de personas en contexto profético (sin añadir una glosa interpretativa al texto base).
translation_notes:
  revision_awareness: 'Se siguió la revisión inglesa más reciente: ''persons'' en lugar de una equivalencia más interpretativa, y ''merchandise'' como término comercial. La versión española evita endurecer la lectura hacia ''esclavos'' en el cuerpo del verso, pero deja abierta la tensión semántica de ''personas'' en el marco de una transacción comercial.'
  spanish_consistency_notes:
  - Se usó 'Yaván' para el etnónimo יָוָן, siguiendo transliteración en vez de una identificación geográfica.
  - Se prefirió 'Mesec' como forma española legible y consistente con transliteración bíblica.
  - '''Comerciantes'' e ''intercambiaban'' sostienen la lógica comercial del verso sin alejarse del hebreo.'
  - '''Mercancías'' mantiene el campo semántico de bienes de intercambio, paralelo a ''merchandise'' en la auditoría inglesa.'
