translation:
  language: es
  text: Entonces Jonatán se levantó de la mesa, ardiendo en ira; y no comió comida el segundo día del mes[a], porque estaba afligido por David, porque su padre lo había humillado.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, «el segundo día de la luna nueva». El hebreo חֹדֶשׁ puede significar «mes» o «luna nueva»; aquí el contexto es el banquete real de novilunio.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּקָם
  english_pob_choice: rose
  chosen_spanish: se levantó
  alternatives_spanish:
  - se puso de pie
  - se alzó
  lexicon: HALOT
  rationale: El verbo narrativo קום en wayyiqtol se expresa naturalmente en español con «se levantó», que mantiene el movimiento físico sin sobretraducción.
- source_word: מֵעִם הַשֻּׁלְחָן
  english_pob_choice: from the table
  chosen_spanish: de la mesa
  alternatives_spanish:
  - desde la mesa
  - de junto a la mesa
  lexicon: HALOT
  rationale: La idea es salir de la posición vinculada a la mesa; «de la mesa» es la forma más natural y fiel en español.
- source_word: בָּחֳרִי אָף
  english_pob_choice: in fierce anger
  chosen_spanish: ardiendo en ira
  alternatives_spanish:
  - en ira encendida
  - con ira ardiente
  lexicon: HALOT
  rationale: La expresión hebrea es intensiva y literalmente relacionada con el calor/ardor de la ira. «Ardiendo en ira» conserva esa fuerza imagética sin sonar rígido.
- source_word: וְלֹא אָכַל ... לֶחֶם
  english_pob_choice: he ate no food
  chosen_spanish: no comió pan
  alternatives_spanish:
  - no comió alimento
  - no comió comida
  lexicon: HALOT
  rationale: Aunque לֶחֶם puede ampliarse a «alimento», el texto hebreo dice literalmente «pan», y aquí la abstención del banquete se expresa de modo más cercano al original.
- source_word: בְּיוֹם הַחֹדֶשׁ הַשֵּׁנִי
  english_pob_choice: on the second day of the month
  chosen_spanish: en el segundo día del mes
  alternatives_spanish:
  - en el segundo día de la luna nueva
  - en el segundo día del novilunio
  lexicon: HALOT
  rationale: La frase hebrea admite «mes» o «luna nueva». El cuerpo del texto sigue la forma más directa; la ambigüedad cultual queda registrada en la nota.
- source_word: נֶעְצַב
  english_pob_choice: he was grieved
  chosen_spanish: estaba afligido
  alternatives_spanish:
  - estaba apenado
  - estaba triste
  lexicon: HALOT
  rationale: El nifal de עצב expresa dolor, pena o aflicción. «Afligido» preserva el matiz afectivo y la gravedad relacional.
- source_word: אֶל דָּוִד
  english_pob_choice: over David
  chosen_spanish: por David
  alternatives_spanish:
  - a causa de David
  - respecto de David
  lexicon: HALOT
  rationale: La relación preposicional comunica el objeto o motivo de su pena. «Por David» es breve y natural en español, sin perder el sentido causal/relacional.
- source_word: הִכְלִמוֹ
  english_pob_choice: had humiliated him
  chosen_spanish: lo había humillado
  alternatives_spanish:
  - lo había avergonzado
  - lo había deshonrado
  lexicon: HALOT
  rationale: El hifil de כלם significa avergonzar o humillar. En este contexto de ofensa pública y familiar, «humillado» reproduce bien la fuerza del término.
- source_word: אָבִיו
  english_pob_choice: his father
  chosen_spanish: su padre
  lexicon: HALOT
  rationale: El posesivo remite a Saúl, el padre de Jonatán; se mantiene la referencia literal del hebreo sin añadir nombres innecesarios al verso.
theological_decisions:
- issue: Ambigüedad de חֹדֶשׁ en el contexto del banquete real de luna nueva
  english_pob_reading: '''month'' in the main text, with a footnote that it can also mean ''new moon'''
  chosen_spanish_reading: '''mes'' en el texto principal, con nota de que también puede significar ''luna nueva'' o ''novilunio'''
  alternative_spanish_readings:
  - '''luna nueva'' en el texto principal'
  - '''novilunio'' en el texto principal'
  rationale: 'El hebreo permite ambas lecturas, pero el sintagma más directo en español es «mes». La nota conserva la tensión contextual: el banquete es del novilunio, así que la referencia al calendario y al evento litúrgico no debe borrarse.'
  doctrine_reference: Ninguna
- issue: Intensidad de בָּחֳרִי אָף y su efecto narrativo
  english_pob_reading: '''in fierce anger'''
  chosen_spanish_reading: '''ardiendo en ira'''
  alternative_spanish_readings:
  - '''en ira encendida'''
  - '''con ira ardiente'''
  rationale: No se suaviza la intensidad emocional del texto. La formulación escogida retiene el carácter enfático e imagístico del hebreo sin convertirlo en una locución poco natural.
  doctrine_reference: Ninguna
translation_notes:
  revision_awareness: Se siguió de cerca el texto hebreo y el audit trail inglés. No se introdujeron cambios doctrinales ni se suavizó la fuerza de las expresiones clave. La única tensión léxica relevante es חֹדֶשׁ, preservada mediante nota. La redacción española evita calcos duros donde el español pide mayor naturalidad, manteniendo, sin embargo, el valor semántico del original.
  spanish_consistency_notes:
  - Se usa «Yahvé» como convención del proyecto solo cuando aparece el tetragrámaton; aquí no aplica.
  - Se mantiene «Jonatán» como forma castellana estándar del nombre propio.
  - «Afligido» se eligió por coherencia emocional con el hebreo נֶעְצַב y con la relación conflictiva del contexto.
  - «Humillado» conserva la fuerza de הִכְלִמוֹ sin cambiar a una terminología eclesiástica ajena al pasaje.
