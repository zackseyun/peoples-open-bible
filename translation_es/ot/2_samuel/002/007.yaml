translation:
  language: es
  text: Ahora, que se fortalezcan sus manos y sean hombres valientes[a], porque su señor Saúl ha muerto, y la casa de Judá también me ha ungido rey sobre ellos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «hombres de valor». La expresión hebrea denota valor y capacidad, a menudo en un contexto militar.'
    reason: lexical_alternative
lexical_decisions:
- source_word: תֶּחֱזַקְנָה יְדֵיכֶם
  english_pob_choice: let your hands be strong
  chosen_spanish: que se fortalezcan sus manos
  alternatives_spanish:
  - fortalezcan sus manos
  - que sus manos sean fuertes
  lexicon: HALOT
  rationale: El hebreo expresa de manera concreta que las manos ‘se hagan fuertes’. En español, ‘que se fortalezcan sus manos’ conserva la imagen corporal y funciona con naturalidad exhortativa. ‘Fortalezcan sus manos’ suena más directo pero puede perder el matiz pasivo del hebreo.
- source_word: וִהְיוּ
  english_pob_choice: and be
  chosen_spanish: y sean
  alternatives_spanish:
  - y sean hechos
  - y lleguen a ser
  lexicon: HALOT
  rationale: Aquí היה introduce una exhortación coordinada; ‘sean’ reproduce bien el valor imperativo/jusivo sin sobrecargar el verso. ‘Lleguen a ser’ sería más interpretativo.
- source_word: לִבְנֵי חַיִל
  english_pob_choice: valiant men
  chosen_spanish: hombres valientes
  alternatives_spanish:
  - hombres de valor
  - hombres esforzados
  - gente valiente
  lexicon: HALOT
  rationale: La expresión hebrea designa hombres de capacidad y valor, con frecuencia en contexto militar. ‘Hombres valientes’ mantiene el masculino del original y su fuerza idiomática; ‘hombres de valor’ es posible, pero menos natural en español actual.
- source_word: אֲדֹנֵיכֶם
  english_pob_choice: your lord
  chosen_spanish: su señor
  alternatives_spanish:
  - su amo
  - su soberano
  - su señor y amo
  lexicon: HALOT
  rationale: Aquí el término es honorífico y político, aplicado a Saúl. ‘Señor’ comunica autoridad sin llevar la frase al ámbito doméstico de ‘amo’. Se evita ‘SEÑOR’ porque no se trata del nombre divino.
- source_word: מָשְׁחוּ
  english_pob_choice: has anointed
  chosen_spanish: me ha ungido
  alternatives_spanish:
  - me ungió
  - me ha consagrado
  - me ha designado por ungimiento
  lexicon: HALOT
  rationale: ‘Ungir’ es el equivalente tradicional y fiel al acto ceremonial de investidura. El perfecto español ‘ha ungido’ refleja bien la acción completada con efecto presente.
- source_word: בֵית יְהוּדָה
  english_pob_choice: the house of Judah
  chosen_spanish: la casa de Judá
  alternatives_spanish:
  - el pueblo de Judá
  - Judá
  lexicon: HALOT
  rationale: Se conserva la expresión colectiva ‘casa de Judá’ porque es la forma del hebreo y mantiene su sentido de linaje/agrupación tribal.
- source_word: לְמֶלֶךְ עֲלֵיהֶם
  english_pob_choice: king over them
  chosen_spanish: por rey sobre ellos
  alternatives_spanish:
  - como rey sobre ellos
  - para ser rey sobre ellos
  lexicon: HALOT
  rationale: ‘Por rey sobre ellos’ reproduce el valor de nombramiento/instalación del hebreo con un español sobrio y claro. ‘Como rey’ suaviza demasiado el matiz de investidura.
theological_decisions:
- issue: Relación entre el ungimiento de David y la legitimidad real
  english_pob_reading: the house of Judah also has anointed me king over them
  chosen_spanish_reading: la casa de Judá también me ha ungido por rey sobre ellos
  alternative_spanish_readings:
  - la casa de Judá me ha ungido también por rey sobre ellos
  - la casa de Judá asimismo me ha ungido rey sobre ellos
  rationale: 'Se conserva el dato teológico-histórico central: David presenta su autoridad como derivada de un ungimiento recibido de Judá, no como mera autoafirmación. ‘También’ se coloca junto a la casa de Judá para reflejar el énfasis hebreo sin oscurecer la coordinación.'
  doctrine_reference: DOCTRINE.md §Translation philosophy 1, 5
- issue: Tratamiento del título humano אֲדֹנֵיכֶם
  english_pob_reading: your lord Saul
  chosen_spanish_reading: su señor Saúl
  alternative_spanish_readings:
  - su señor y amo Saúl
  - su soberano Saúl
  rationale: El título aplica a Saúl como autoridad humana; no debe confundirse con el uso reverente del nombre divino. ‘Señor’ preserva el honorífico sin introducir una lectura teológica indebida.
  doctrine_reference: DOCTRINE.md §Translation philosophy 1, 6
translation_notes:
  revision_awareness: 'La redacción sigue de cerca el texto hebreo y el audit trail inglés: mantiene la imagen de ‘las manos’ fuertes, la expresión colectiva ‘casa de Judá’, el carácter honorífico de ‘señor’ para Saúl, y el verbo ‘ungir’ para מָשַׁח. También ajusta el orden del ‘también’ para que suene natural en español sin perder el énfasis hebreo.'
  spanish_consistency_notes:
  - Se usó ‘Yahvé’ solo cuando el texto lo requiera; aquí no aparece el nombre divino en la superficie del verso, aunque el hebreo lo tenga en el contexto textual de la edición.
  - Se prefirió ‘ungido’/‘ungir’ en lugar de ‘consagrado’ para conservar el acto real de investidura por aceite.
  - Se mantuvo el plural masculino ‘hombres’ por fidelidad al hebreo לִבְנֵי חַיִל y al análisis contextual del destinatario.
  - La puntuación separa con punto y coma la primera exhortación de la cláusula causal para reflejar la progresión argumentativa del hebreo.
