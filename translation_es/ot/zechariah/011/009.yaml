translation:
  language: es
  text: 'Entonces dije: «No los pastorearé. Que muera la que se muere, y que perezca la que perece. Y las que queden[a], cada una devore la carne de la otra[b]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «las sobrevivientes»; hebreo: «las que quedan» o «las que permanecen».'
    reason: lexical_alternative
  - marker: b
    text: Literalmente, «mujer la carne de su compañera», un modismo distributivo que aquí significa «cada una ... la otra», con gramática femenina que corresponde a la imagen del rebaño.
    reason: cultural_note
lexical_decisions:
- source_word: אֶרְעֶה
  english_pob_choice: I will not shepherd
  chosen_spanish: No los pastorearé
  alternatives_spanish:
  - No los pastorearé
  - No seré su pastor
  - No los apacentaré
  lexicon: HALOT
  rationale: El verbo רעה aquí mantiene la metáfora pastoral del capítulo. «Pastorear» conserva la imagen con naturalidad en español y evita reducirla a «alimentar» o a un oficio más abstracto.
- source_word: הַמֵּתָה תָמוּת
  english_pob_choice: Let the dying die
  chosen_spanish: Que muera la que se muere
  alternatives_spanish:
  - Que muera la moribunda
  - La que está muriendo, que muera
  lexicon: HALOT
  rationale: La construcción participio + verbo finito intensifica la acción. En español, «la que se muere» conserva mejor la reiteración y el tono sentencioso que una paráfrasis más explicativa.
- source_word: וְהַנִּכְחֶדֶת תִּכָּחֵד
  english_pob_choice: let the perishing perish
  chosen_spanish: y que perezca la que perece
  alternatives_spanish:
  - y que sea destruida la que perece
  - y que sea borrada la que perece
  lexicon: HALOT
  rationale: כחד admite el campo de ser destruido, borrado o perderse. «Perecer» reproduce la repetición hebrea y evita cargar el texto con una especificación más técnica de la que el contexto inmediato exige.
- source_word: וְהַ֨/נִּשְׁאָר֔וֹת
  english_pob_choice: those who remain
  chosen_spanish: las que queden
  alternatives_spanish:
  - las que permanezcan
  - las sobrevivientes
  - las que quedan
  lexicon: HALOT
  rationale: El participio indica a las que han quedado/han sido dejadas. «Las que queden» es breve, femenino como el hebreo, y mantiene el matiz de remanente sin imponer de entrada una interpretación más marcada como «sobrevivientes».
- source_word: תֹּאכַ֕לְנָה
  english_pob_choice: devour
  chosen_spanish: devore
  alternatives_spanish:
  - coma
  - consuma
  - se devore
  lexicon: HALOT
  rationale: Aunque el verbo literal es «comer», el objeto «carne» hace que el acto sea violento. «Devorar» comunica esa crudeza de forma natural en español.
- source_word: אִשָּׁה אֶת בְּשַׂר רְעוּתָהּ
  english_pob_choice: each devour the flesh of the other
  chosen_spanish: cada una devore la carne de su compañera
  alternatives_spanish:
  - cada una coma la carne de la otra
  - una a otra la carne de su compañera
  - cada una devore la carne de la otra
  lexicon: HALOT
  rationale: אִשָּׁה aquí funciona distributivamente con gramática femenina; por eso se traduce «cada una» y no literalmente «mujer». רְעוּתָהּ significa «su compañera/amiga/otra». «Compañera» conserva el vínculo relacional sin suavizar el horror de la imagen.
theological_decisions:
- issue: Preservar la metáfora pastoral al expresar la negativa del profeta
  english_pob_reading: I will not shepherd you
  chosen_spanish_reading: No los pastorearé
  alternative_spanish_readings:
  - No seré su pastor
  - No los apacentaré
  rationale: La escena profética depende del simbolismo del pastor y del rebaño. «Pastorear» mantiene esa figura activa sin desplazarla a un lenguaje meramente funcional.
  doctrine_reference: Translation philosophy §1, §5
- issue: Mantener la dureza del juicio final sin atenuar la imagen de violencia mutua
  english_pob_reading: let those who remain each devour the flesh of the other
  chosen_spanish_reading: las que queden, cada una devore la carne de su compañera
  alternative_spanish_readings:
  - las que queden, cada una coma la carne de la otra
  - las sobrevivientes se devoren unas a otras
  rationale: El hebreo presenta una imagen extrema de destrucción interna. La traducción conserva la fuerza visual y el paralelismo del texto, sin suavizarlo ni volverlo abstracto.
  doctrine_reference: Translation philosophy §1, §6
translation_notes:
  revision_awareness: 'Se tuvo en cuenta la revisión final del inglés POB, que ajustó la última cláusula a un orden más natural. En español se optó por una construcción igualmente natural: «cada una devore la carne de su compañera», manteniendo el distributivo femenino del hebreo y el sentido de mutualidad.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como forma base cuando aparezca el nombre divino en el contexto; en este versículo no se presenta.
  - Se preserva el registro profético con verbos de juicio directos y sin eufemismos.
  - Se evita «Cristo» porque no corresponde a este versículo.
  - Se conserva la imaginería pastoral con «pastorearé» en lugar de una paráfrasis de provisión.
