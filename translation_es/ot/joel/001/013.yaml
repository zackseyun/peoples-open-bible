translation:
  language: es
  text: Ceñíos y lamentad[a], sacerdotes; gemid, ministros del altar. Venid, pasad la noche en cilicio, ministros de mi Dios, porque la ofrenda de grano y la ofrenda de bebida han sido retenidas de la casa de vuestro Dios[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo literalmente: ''Ceñíos''. Aquí la idea es ceñirse para el duelo; el cilicio se menciona explícitamente más adelante en el versículo.'
    reason: lexical_alternative
  - marker: b
    text: 'O ''del templo de vuestro Dios''. Hebreo literalmente: ''de la casa de vuestro Dios''.'
    reason: lexical_alternative
lexical_decisions:
- source_word: חִגְרוּ
  english_pob_choice: Gird yourselves
  chosen_spanish: Ceñíos
  alternatives_spanish:
  - Ceñíos con cilicio
  - Preparaos
  lexicon: HALOT
  rationale: Sigo la decisión revisada del POB inglés de reflejar el verbo literalmente como una orden de ceñirse, sin fusionarlo con el cilicio que aparece después. En español, 'ceñíos' conserva el gesto corporal y la fuerza imperativa del hebreo.
- source_word: וְסִפְדוּ
  english_pob_choice: and mourn
  chosen_spanish: y lamentad
  alternatives_spanish:
  - y llorad
  - y haced duelo
  lexicon: HALOT
  rationale: '''Lamentad'' comunica el duelo ritual y mantiene una relación cercana con el campo semántico de ספד sin sonar demasiado coloquial. También deja espacio para el siguiente verbo más intenso.'
- source_word: הַכֹּהֲנִים
  english_pob_choice: O priests
  chosen_spanish: sacerdotes
  alternatives_spanish:
  - oh sacerdotes
  - ustedes sacerdotes
  lexicon: HALOT
  rationale: El vocativo está claro por el contexto imperativo. En español, el tono natural y digno se logra con un vocativo implícito marcado por la pausa y el orden de la frase.
- source_word: הֵילִילוּ
  english_pob_choice: wail
  chosen_spanish: aullad
  alternatives_spanish:
  - clamad
  - gemid
  lexicon: HALOT
  rationale: '''Aullad'' preserva la intensidad del hebreo, más fuerte que ''lamentad''. Evita suavizar el clamor de duelo que el texto exige.'
- source_word: מְשָׁרְתֵי מִזְבֵּחַ
  english_pob_choice: you ministers of the altar
  chosen_spanish: ministros del altar
  alternatives_spanish:
  - servidores del altar
  - los que ministran en el altar
  lexicon: HALOT
  rationale: '''Ministros'' reproduce bien la idea funcional y cultual del participio sustantivado, sin caer en un lenguaje eclesiástico posterior que pudiera desplazar el sentido sacerdotal del hebreo.'
- source_word: בֹּאוּ
  english_pob_choice: Come
  chosen_spanish: Entrad
  alternatives_spanish:
  - Venid
  - Llegad
  lexicon: HALOT
  rationale: El mandato introduce una acción concreta de ir a un lugar para continuar el duelo. 'Entrad' encaja mejor que 'venid' con la secuencia del verso en español.
- source_word: לִינוּ
  english_pob_choice: spend the night
  chosen_spanish: pasad la noche
  alternatives_spanish:
  - permaneced la noche
  - alojad la noche
  lexicon: HALOT
  rationale: La locución española es clara y natural, y conserva el valor de permanecer durante la noche como parte del rito de lamentación.
- source_word: בַשַּׂקִּים
  english_pob_choice: in sackcloth
  chosen_spanish: en cilicio
  alternatives_spanish:
  - con cilicio
  - vestidos de cilicio
  lexicon: HALOT
  rationale: '''Cilicio'' es el equivalente español estándar para la prenda de duelo del hebreo שׂק. Lo mantengo como sustantivo de vestimenta y no lo traduzco por una expresión interpretativa más larga.'
- source_word: מְשָׁרְתֵי אֱלֹהָי
  english_pob_choice: you ministers of my God
  chosen_spanish: ministros de mi Dios
  alternatives_spanish:
  - servidores de mi Dios
  - los que ministran a mi Dios
  lexicon: HALOT
  rationale: Conservo la primera persona posesiva 'mi Dios', como hace el POB inglés, para mantener la tensión retórica entre el Dios del profeta y el Dios del pueblo.
- source_word: נִמְנַע
  english_pob_choice: are withheld
  chosen_spanish: se ha retenido
  alternatives_spanish:
  - han sido retenidas
  - están detenidas
  lexicon: HALOT
  rationale: La pasiva refleja en español transmite bien la idea de algo que deja de llegar o queda impedido. Evita sobrecargar el verso con una pasiva más pesada.
- source_word: מִבֵּית אֱלֹהֵיכֶם
  english_pob_choice: from the house of your God
  chosen_spanish: de la casa de su Dios
  alternatives_spanish:
  - de la casa de vuestro Dios
  - del templo de su Dios
  lexicon: HALOT
  rationale: Mantengo 'casa' para respetar la expresión hebrea. Cambio a 'su Dios' porque el español exige una referencia posesiva natural después de 'la casa de'; el contexto sigue señalando que el referente es el de los sacerdotes.
- source_word: מִנְחָה
  english_pob_choice: grain offering
  chosen_spanish: la ofrenda vegetal
  alternatives_spanish:
  - la ofrenda de cereal
  - la ofrenda de grano
  lexicon: HALOT
  rationale: El POB inglés eligió 'grain offering' para la ofrenda cultual específica. En español, 'ofrenda vegetal' es la opción tradicional y precisa para מִנְחָה en contexto sacrificial, aunque reconozco que puede sonar menos transparente para lectores modernos.
- source_word: וָנָסֶךְ
  english_pob_choice: and drink offering
  chosen_spanish: y la libación
  alternatives_spanish:
  - y la ofrenda de vino
  - y la ofrenda líquida
  lexicon: HALOT
  rationale: '''Libación'' refleja fielmente la ofrenda derramada y conserva el paralelismo cultual con la ofrenda vegetal. Es más preciso que una paráfrasis con ''vino'' porque el hebreo no especifica el líquido.'
theological_decisions:
- issue: Distinción entre 'mi Dios' y 'su Dios'
  english_pob_reading: Preserve both 'my God' and 'your God' in the same verse
  chosen_spanish_reading: Conservar 'mi Dios' y expresar 'su Dios' en la cláusula final
  alternative_spanish_readings:
  - uniformar ambos como 'nuestro Dios'
  - repetir simplemente 'Dios'
  rationale: El hebreo alterna entre la voz del profeta y la referencia al Dios del pueblo. La redacción española mantiene esa tensión sin suavizarla, aunque adapta la posesión final para que el sintagma suene natural en español.
  doctrine_reference: Translation philosophy §1, §3, §5
- issue: Relación entre el verbo inicial y el cilicio posterior
  english_pob_reading: Heard in English as 'Gird yourselves' with later explicit 'in sackcloth'
  chosen_spanish_reading: '''Ceñíos'' seguido de ''en cilicio'''
  alternative_spanish_readings:
  - '''Vestíos de cilicio'''
  - '''Ceñíos con cilicio'''
  rationale: El hebreo distingue el gesto inicial de ceñirse del lugar/estado posterior de pasar la noche con cilicio. La versión española evita fundir ambos elementos para no borrar esa secuencia retórica.
  doctrine_reference: Translation philosophy §1, §5
translation_notes:
  revision_awareness: He seguido la revisión más reciente del POB inglés, que corrigió la lectura inicial hacia 'Gird yourselves' para reflejar con mayor precisión חִגְרוּ, y he preservado esa distinción en español con 'Ceñíos'. También he mantenido el paralelismo de duelo y la alternancia posesiva del verso, evitando suavizar la intensidad de הֵילִילוּ.
  spanish_consistency_notes:
  - He usado 'Yahvé' como norma en otros contextos, pero este versículo no contiene el tetragrámaton.
  - He preferido 'ministros' para מְשָׁרְתֵי, coherente con el valor funcional/cultual ya documentado en el POB inglés.
  - He evitado 'SEÑOR' y 'Cristo', porque no corresponden al contenido de este versículo.
  - He mantenido una sintaxis solemne pero natural para lectura pública en español.
