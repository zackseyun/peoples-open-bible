translation:
  language: es
  text: Tú has defendido la causa de mi alma[a], oh Señor; has redimido mi vida.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «has pleiteado la causa de mi alma» o «has contendido por mi vida».
    reason: lexical_alternative
lexical_decisions:
- source_word: רַבְתָּ
  english_pob_choice: have defended
  chosen_spanish: has defendido
  alternatives_spanish:
  - has pleiteado
  - has contendido por
  - has tomado a cargo
  lexicon: HALOT
  rationale: El verbo ריב en este contexto jurídico expresa intervenir en una disputa o causa. «Has defendido» conserva la idea de defensa/abogacía en un registro natural y claro para el español, sin borrar el matiz forense.
- source_word: אֲדֹנָי
  english_pob_choice: O Lord
  chosen_spanish: oh Yahvé
  alternatives_spanish:
  - mi Señor
  - Señor
  lexicon: HALOT
  rationale: En el texto hebreo, אֲדֹנָי funciona como vocativo divino. En la política terminológica del proyecto, el nombre divino se vierte como «Yahvé» en el texto principal; por eso se usa la invocación directa «oh Yahvé» en lugar de ocultarlo con «Señor».
- source_word: רִיבֵי
  english_pob_choice: the cause
  chosen_spanish: la causa
  alternatives_spanish:
  - el caso
  - las disputas
  - las contiendas
  lexicon: HALOT
  rationale: El plural de רִיב tiene aquí valor colectivo o abstracto. «La causa» refleja bien el lenguaje jurídico y evita una pluralidad poco natural en español, manteniendo el sentido de litigio o reclamación.
- source_word: נַפְשִׁי
  english_pob_choice: of my soul
  chosen_spanish: de mi alma
  alternatives_spanish:
  - de mi vida
  - de mí
  lexicon: HALOT
  rationale: נֶפֶשׁ puede significar alma, vida o ser. Aquí se preserva «alma» porque el texto poético distingue este miembro del paralelo siguiente, donde aparece explícitamente «vida» con חַיַּי. Así se conserva la tensión lexical del hebreo.
- source_word: גָּאַ֥לְתָּ
  english_pob_choice: have redeemed
  chosen_spanish: has redimido
  alternatives_spanish:
  - has rescatado
  - has rescatado como pariente redentor
  - has librado
  lexicon: HALOT
  rationale: «Redimido» conserva el peso covenantal y teológico de גאל, incluyendo la idea de redención/liberación propia del redentor pariente, sin reducirlo a una liberación genérica.
- source_word: חַיָּי
  english_pob_choice: my life
  chosen_spanish: mi vida
  alternatives_spanish:
  - mi ser viviente
  - mi vida-breath
  lexicon: HALOT
  rationale: La forma plural idiomática se vierte naturalmente como «mi vida». Esto mantiene el paralelismo con el miembro anterior y resulta claro y fiel en español.
theological_decisions:
- issue: Preservación del paralelismo entre defensa jurídica y redención
  english_pob_reading: Retain legal language in the first colon and redemption language in the second
  chosen_spanish_reading: Mantener lenguaje jurídico en el primer hemistiquio («has defendido la causa») y lenguaje de redención en el segundo («has redimido»).
  alternative_spanish_readings:
  - Tú me has ayudado; me has salvado
  - Has resuelto mi problema y me has librado
  rationale: 'El hebreo usa dos verbos e imágenes distintas: ריב (litigio/defensa) y גאל (redención). La traducción española conserva ambas sin fusionarlas en una sola idea de ayuda general.'
  doctrine_reference: Translation philosophy §§1, 3, 5
- issue: Tratamiento del título divino אֲדֹנָי
  english_pob_reading: O Lord
  chosen_spanish_reading: oh Yahvé
  alternative_spanish_readings:
  - oh Señor
  - mi Señor
  rationale: El sistema terminológico del proyecto favorece «Yahvé» para el nombre divino. En este versículo, el vocativo directo expresa dirección personal a Dios; por eso se evita el sustituto convencional «Señor», que borraría la decisión auditada sobre el nombre divino.
  doctrine_reference: Project-level Spanish terminology defaults
translation_notes:
  revision_awareness: 'La versión española sigue de cerca el texto hebreo y el audit trail inglés: conserva el lenguaje jurídico de ריב y el lenguaje redentor de גאל, y refleja el vocativo divino con «oh Yahvé» conforme a la terminología española del proyecto.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» para el nombre divino en lugar de «SEÑOR» o «Señor» como máscara.
  - Se traduce נֶפֶשׁ aquí como «alma» para conservar el paralelismo con «vida» en el segundo cola.
  - «Redimido» se usa de manera consistente con el valor teológico de גאל en el proyecto.
  - La partícula vocativa «oh» ayuda a reflejar el llamado directo del hebreo y coincide con el ajuste del audit trail inglés.
