translation:
  language: es
  text: Y Shallum, hijo de Coré, hijo de Ebiasaf, hijo de Corá, y sus hermanos de la casa de su padre, los coreítas, estaban sobre la obra del servicio, guardianes de los umbrales[a] de la tienda; y sus padres habían estado sobre el campamento de Yahvé[b], guardianes de la entrada.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «guardianes de las entradas de la tienda». El hebreo dice literalmente «guardianes de los umbrales de la tienda».
    reason: lexical_alternative
  - marker: b
    text: El hebreo usa el nombre divino YHWH, representado aquí como «Yahvé».
    reason: alternative_reading
lexical_decisions:
- source_word: וְשַׁלּוּם
  english_pob_choice: And Shallum
  chosen_spanish: Y Shallum
  alternatives_spanish:
  - Ahora Shallum
  lexicon: HALOT
  rationale: La conjunción inicial enlaza la línea genealógica y de oficio con el contexto anterior. 'Y' conserva esa continuidad simple sin añadir matiz interpretativo.
- source_word: בֶּן ... בֶּן ... בֶּן
  english_pob_choice: son of ... son of ... son of
  chosen_spanish: hijo de ... hijo de ... hijo de
  alternatives_spanish:
  - descendiente de ... descendiente de ... descendiente de
  lexicon: HALOT
  rationale: La fórmula genealógica hebrea se mantiene de forma formal porque presenta linaje específico, no solo descendencia general.
- source_word: וְאֶחָיו
  english_pob_choice: and his brothers
  chosen_spanish: y sus hermanos
  alternatives_spanish:
  - y sus parientes varones
  lexicon: HALOT
  rationale: '''Hermanos'' reproduce el plural masculino ordinario del hebreo. En este contexto de clan puede incluir parientes varones, pero la forma literal preserva mejor el texto fuente.'
- source_word: לְבֵית אָבִיו
  english_pob_choice: from his father’s house
  chosen_spanish: de la casa de su padre
  alternatives_spanish:
  - de la casa paterna
  - pertenecientes a la casa de su padre
  lexicon: HALOT
  rationale: La frase indica afiliación familiar/clánica. 'De la casa de su padre' es natural en español y conserva el sentido de linaje doméstico.
- source_word: הַקָּרְחִים
  english_pob_choice: the Korahites
  chosen_spanish: los corahitas
  alternatives_spanish:
  - la casa de Corá
  - los descendientes de Corá
  lexicon: HALOT
  rationale: El gentilicio plural se refiere a los miembros de la línea de Corá. 'Corahitas' es la forma española más precisa y reconocible.
- source_word: עַל מְלֶאכֶת הָעֲבוֹדָה
  english_pob_choice: were over the work of the service
  chosen_spanish: estaban sobre la obra del servicio
  alternatives_spanish:
  - estaban a cargo de la obra del servicio
  - tenían la responsabilidad de la obra del servicio
  lexicon: HALOT
  rationale: '''Estaban sobre'' conserva la preposición de supervisión de עַל y evita introducir una formulación más explicativa de la que el hebreo exige. ''Servicio'' mantiene el valor general de עֲבוֹדָה sin cargarlo de sentido eclesiástico posterior.'
- source_word: שֹׁמְרֵי
  english_pob_choice: keepers of
  chosen_spanish: guardianes de
  alternatives_spanish:
  - custodios de
  - los que guardaban
  lexicon: HALOT
  rationale: El participio expresa una función continua de custodia. 'Guardianes de' suena natural en español y preserva la idea de vigilancia/guarda.
- source_word: הַסִּפִּים
  english_pob_choice: the thresholds
  chosen_spanish: los umbrales
  alternatives_spanish:
  - los dinteles
  - las entradas
  lexicon: HALOT
  rationale: '''סִפִּים'' designa literalmente umbrales o umbrales/sills. ''Umbrales'' conserva mejor la imagen concreta que ''entradas'' y sigue siendo comprensible en español.'
- source_word: לָאֹהֶל
  english_pob_choice: of the tent
  chosen_spanish: de la tienda
  alternatives_spanish:
  - del tabernáculo
  - de la tienda del santuario
  lexicon: HALOT
  rationale: El hebreo dice 'tienda' de manera literal. Se evita 'tabernáculo' porque sería más interpretativo que el término fuente.
- source_word: וַאֲבֹתֵיהֶם
  english_pob_choice: and their fathers had been
  chosen_spanish: y sus padres habían estado
  alternatives_spanish:
  - y sus antepasados habían estado
  - y sus padres estaban
  lexicon: HALOT
  rationale: 'El pluperfecto español ayuda a expresar el giro retrospectivo del hebreo: la tarea actual se vincula con un encargo anterior de sus padres.'
- source_word: עַל מַחֲנֵה יְהוָה
  english_pob_choice: over the camp of Yahweh
  chosen_spanish: sobre el campamento de Yahvé
  alternatives_spanish:
  - a cargo del campamento de Yahvé
  - sobre el campamento de Yahveh
  lexicon: HALOT
  rationale: Se conserva 'sobre' para el valor de supervisión de עַל. El Tetragrámaton se rinde como 'Yahvé' conforme al estándar del proyecto, preservando el nombre divino.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahveh
  lexicon: HALOT
  rationale: Se sigue el estándar del proyecto para el nombre divino. 'Yahvé' mantiene la transliteración reverente y transparente del Tetragrámaton.
- source_word: הַמָּבוֹא
  english_pob_choice: the entrance
  chosen_spanish: la entrada
  alternatives_spanish:
  - el acceso
  - la vía de entrada
  lexicon: HALOT
  rationale: '''Entrada'' es la equivalencia más directa y natural en español para el lugar de acceso al recinto.'
theological_decisions:
- issue: Nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahveh
  rationale: El texto hebreo contiene el Tetragrámaton directamente. En el español del POB se mantiene el nombre divino como 'Yahvé' para no ocultar el nombre propio por medio de una sustitución titular.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: 'Terminología del recinto sagrado: סִפִּים / אֹהֶל'
  english_pob_reading: thresholds of the tent
  chosen_spanish_reading: umbrales de la tienda
  alternative_spanish_readings:
  - entradas de la tienda
  - dinteles de la tienda
  rationale: El hebreo presenta un vocabulario concreto de custodia del acceso. 'Umbrales de la tienda' conserva la imagen física y evita convertir anticipadamente la 'tienda' en 'tabernáculo', lo cual sería más interpretativo.
  doctrine_reference: DOCTRINE.md Translation philosophy §1, original-language primacy over translation tradition
translation_notes:
  revision_awareness: El texto base y la revisión más reciente coinciden sustancialmente; no se requieren cambios textuales adicionales. Se mantiene la solución auditada para el nombre divino, la imaginería del acceso al santuario y la sintaxis genealógica.
  spanish_consistency_notes:
  - Se conserva 'Yahvé' en todo el texto para יְהוָה, conforme al estándar del proyecto.
  - Se mantiene el orden genealógico y la repetición de 'hijo de' para reflejar la estructura hebrea.
  - '''Tienda'' se usa de forma literal para אֹהֶל; no se introduce ''tabernáculo'' en el texto principal.'
  - '''Umbrales'' traduce literalmente הַסִּפִּים y se marca con nota por la alternativa ''entradas''.'
  - '''Sobre'' refleja el valor de supervisión de עַל sin añadir una perífrasis más explicativa.'
