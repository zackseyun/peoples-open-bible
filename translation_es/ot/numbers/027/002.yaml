translation:
  language: es
  text: 'Y ellas se pusieron de pie delante de Moisés, delante de Eleazar el sacerdote, delante de los líderes[a] y de toda la congregación[b], a la entrada de la tienda de reunión, diciendo:'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'los jefes' o 'los príncipes'.
    reason: lexical_alternative
  - marker: b
    text: O 'toda la asamblea'.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַתַּעֲמֹדְנָה
  english_pob_choice: And they stood
  chosen_spanish: Y ellas se presentaron
  alternatives_spanish:
  - Y ellas se pusieron de pie
  - Y ellas estuvieron de pie
  lexicon: HALOT
  rationale: El hebreo narra que las hijas de Selofejad tomaron posición de manera formal ante las autoridades. En español, 'se presentaron' conserva el acto público y jurídico sin perder naturalidad; 'se pusieron de pie' sería más literal, pero menos preciso para el carácter deliberado de la escena.
- source_word: לִפְנֵי
  english_pob_choice: before
  chosen_spanish: delante de
  alternatives_spanish:
  - ante
  - en presencia de
  lexicon: HALOT
  rationale: '''Delante de'' mantiene la repetición enfática del hebreo y el sentido de comparecer ante una autoridad. ''Ante'' también sería posible, pero ''delante de'' suena más directo en español para esta acumulación de destinatarios.'
- source_word: הַכֹּהֵן
  english_pob_choice: the priest
  chosen_spanish: el sacerdote
  alternatives_spanish:
  - el sacerdote-oficiante
  - el sacerdote
  lexicon: HALOT
  rationale: En español bíblico contemporáneo, 'sacerdote' comunica bien el título de Eleazar. 'Sacerdote' evita una expansión innecesaria y conserva la función cultual/jurídica sin introducir 'sumo sacerdote', que el hebreo no dice.
- source_word: הַנְּשִׂיאִם
  english_pob_choice: the leaders
  chosen_spanish: los líderes
  alternatives_spanish:
  - los jefes
  - los príncipes
  lexicon: HALOT
  rationale: '''Líderes'' reproduce la decisión inglesa del POB y es claro para lectores actuales. ''Príncipes'' puede sonar monárquico o aristocrático en español y no refleja bien a los dirigentes tribales/comunitarios.'
- source_word: כָּל הָעֵדָה
  english_pob_choice: all the congregation
  chosen_spanish: toda la congregación
  alternatives_spanish:
  - toda la asamblea
  - toda la comunidad
  lexicon: HALOT
  rationale: '''Congregación'' conserva el uso pentateucal de עֵדָה como pueblo reunido del pacto. ''Toda la congregación'' refleja mejor el כָּל que una simple ''congregación'' y mantiene el tono público del pasaje.'
- source_word: פֶּתַח אֹהֶל מוֹעֵד
  english_pob_choice: at the entrance of the tent of meeting
  chosen_spanish: a la entrada de la tienda de reunión
  alternatives_spanish:
  - a la entrada de la tienda del encuentro
  - a la puerta de la tienda de reunión
  lexicon: HALOT
  rationale: '''Tienda de reunión'' es la equivalencia habitual y fiel de אֹהֶל מוֹעֵד. ''Entrada'' traduce פֶּתַח de forma natural; ''puerta'' sería demasiado restrictivo, y ''encuentro'' cambia el sentido establecido de la expresión cultual.'
- source_word: לֵאמֹר
  english_pob_choice: saying,
  chosen_spanish: 'diciendo:'
  alternatives_spanish:
  - 'y dijeron:'
  - 'para decir:'
  lexicon: HALOT
  rationale: La forma infinitiva introduce el discurso directo del versículo siguiente. 'Diciendo:' preserva la conexión discursiva del hebreo y su función de enlace formal.
theological_decisions:
- issue: Escena pública y jurídica de la petición
  english_pob_reading: Retain the repeated 'before' and the full list of authorities and congregation
  chosen_spanish_reading: Mantener la enumeración completa de autoridades y la congregación, con repeticiones de 'delante de'
  alternative_spanish_readings:
  - Condensar la lista para que fluya mejor en español
  - Reducir la fórmula a una sola mención de las autoridades
  rationale: El versículo subraya que la petición se hace abiertamente ante Moisés, Eleazar, los líderes y toda la congregación. Conservar esa estructura preserva su peso legal y comunitario, evitando suavizar una escena de comparecencia formal.
  doctrine_reference: Principio de fidelidad estructural al texto fuente; evitar paráfrasis que borren el énfasis narrativo.
- issue: Valor de עֵדָה
  english_pob_reading: congregation
  chosen_spanish_reading: congregación
  alternative_spanish_readings:
  - asamblea
  - comunidad
  rationale: '''Congregación'' conserva la resonancia bíblica de un pueblo reunido en marco pactal. ''Asamblea'' puede sonar demasiado procedural, y ''comunidad'' pierde el matiz técnico del sustantivo hebreo en Números.'
  doctrine_reference: Consistencia terminológica bíblica para términos colectivos del pacto.
translation_notes:
  revision_awareness: El texto base inglés fue revisado solo para capitalización inicial; no hay cambios sustantivos de sentido que exijan ajuste especial en español. La decisión principal fue mantener la sintaxis pública y acumulativa del hebreo en una forma natural para español.
  spanish_consistency_notes:
  - Se usa 'Moisés' y 'Eleazar el sacerdote' de modo consistente con la nomenclatura bíblica estándar.
  - Se prefirió 'tienda de reunión' para אֹהֶל מוֹעֵד por consistencia con el vocabulario cultual del Pentateuco.
  - No se añadieron notas de pie porque no hubo una alternativa textual o ambigüedad española que requiriera anclaje específico en el verso.
