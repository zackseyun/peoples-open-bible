  text: אִם אַכְזָרִי אַל תֵּלֵךְ, פֶּן תַּכְבִּיד אֶת רָעָתֶךָ.
  language: Hebrew
  pages:
  - 677
  confidence: high
  validation: minor_mismatch
  note: Kahana's edition is a composite of the Cairo Geniza Hebrew manuscripts. Where the Hebrew is missing or uncertain, consult the fuller scholarly editions referenced in sources/hebrew_sirach/README.md.
  parallel_sources:
  - edition: lxx-swete-1909
    text: παντὶ ἀνθρώπῳ μὴ ἔκφαινε σὴν καρδίαν, καὶ μὴ ἀναφερέτω σοι χάριν.
    kind: greek_parallel
    note: Greek fallback / consistency check alongside the Hebrew Vorlage.
    reference: Sirach 8:19
translation:
  text: Do not go with a cruel man[a], lest you add weight to your own trouble.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Greek parallel: ''Do not reveal your heart to every man, and do not let him repay you with favor.'' The Hebrew and Greek witnesses differ substantially here.'
    reason: alternative_reading
lexical_decisions:
- source_word: אִם אַכְזָרִי
  chosen: a cruel man
  alternatives:
  - with a cruel person
  - with the cruel
  lexicon: HALOT
  rationale: The Hebrew adjective/noun אַכְזָרִי denotes a cruel or merciless person. The singular masculine is best represented as 'man' under the project's gender-accurate policy, while still conveying a representative type rather than one specific individual.
- source_word: אַל תֵּלֵךְ
  chosen: Do not go with
  alternatives:
  - do not walk with
  - do not associate with
  lexicon: HALOT
  rationale: הלך literally means 'go/walk.' In wisdom context with a person as object, English 'go with' naturally conveys keeping company or accompanying someone without over-paraphrasing to the more interpretive 'associate with.'
- source_word: פֶּן
  chosen: lest
  alternatives:
  - or else
  - so that not
  lexicon: HALOT
  rationale: פֶּן introduces a warning of undesirable consequence. 'Lest' is concise and preserves the admonitory force.
- source_word: תַּכְבִּיד
  chosen: you add weight to
  alternatives:
  - you make heavier
  - you increase
  - you burden
  lexicon: HALOT
  rationale: From כבד in the Hiphil, the sense is to make heavy or increase the burden. 'Add weight to' keeps the metaphor of heaviness present in the Hebrew while remaining idiomatic English.
- source_word: אֶת רָעָתֶךָ
  chosen: your own trouble
  alternatives:
  - your evil
  - your harm
  - your misfortune
  lexicon: HALOT
  rationale: רעה can mean evil, harm, or calamity/trouble depending on context. Here the warning concerns the damage that comes upon the addressee from keeping company with a cruel person, so 'trouble' best captures the consequential sense. 'Your own' makes explicit the 2ms suffix. The Greek parallel points in a different textual direction, so the Hebrew sense is retained in the main text.
