translation:
  language: es
  text: Entonces él fue con ellos, y llegaron al Jordán y cortaron los árboles[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «y cortaron la madera». El sustantivo hebreo puede referirse en sentido amplio a árboles o madera; en este contexto de tala, «árboles» es más preciso.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֵּלֶךְ
  english_pob_choice: So he went
  chosen_spanish: Así fue que él fue
  alternatives_spanish:
  - Entonces fue
  - Y fue
  lexicon: HALOT
  rationale: El hebreo wayyiqtol avanza la narración. En español, "Así fue que" mantiene la secuencia narrativa sin volverla pesada, y "fue" conserva el sentido básico de הלך sin añadir matices no presentes.
- source_word: אִתָּם
  english_pob_choice: with them
  chosen_spanish: con ellos
  alternatives_spanish:
  - junto con ellos
  lexicon: HALOT
  rationale: La preposición con sufijo de tercera persona plural se expresa de manera directa con "con ellos"; no se requiere expansión.
- source_word: וַיָּבֹאוּ
  english_pob_choice: and they came
  chosen_spanish: y llegaron
  alternatives_spanish:
  - y vinieron
  - y fueron
  lexicon: HALOT
  rationale: בוא puede significar venir, llegar o entrar. Aquí el movimiento hacia un lugar concreto se comunica con naturalidad en español mediante "llegaron".
- source_word: הַיַּרְדֵּנָה
  english_pob_choice: to the Jordan
  chosen_spanish: al Jordán
  alternatives_spanish:
  - al río Jordán
  - hacia el Jordán
  lexicon: HALOT
  rationale: El he direccional indica movimiento hacia el Jordán. En español, "al Jordán" conserva brevedad y fidelidad; "río Jordán" explicita más de lo que exige el hebreo.
- source_word: וַיִּגְזְרוּ
  english_pob_choice: cut down
  chosen_spanish: cortaron
  alternatives_spanish:
  - derribaron
  - talaban
  lexicon: HALOT
  rationale: En este contexto de tala, el verbo español natural es "cortar"; el objeto "los árboles" ya deja claro que se trata de cortarlos para derribarlos. "Cortaron" evita una traducción más interpretativa que "derribaron".
- source_word: הָעֵצִים
  english_pob_choice: the trees
  chosen_spanish: los árboles
  alternatives_spanish:
  - la madera
  - los troncos
  lexicon: HALOT
  rationale: El plural de עֵץ aquí se refiere a árboles en pie que están siendo talados. "Los árboles" es más preciso que "la madera" en este contexto.
translation_notes:
  revision_awareness: El texto hebreo y el aparato inglés están en alto acuerdo; no se registran revisiones sustantivas. La versión española conserva la secuencia narrativa, el movimiento hacia el Jordán y la ambigüedad léxica de עֵץ en nota.
  spanish_consistency_notes:
  - Se mantiene "Jordán" como nombre geográfico sin añadir "río" en el texto principal, conforme al valor direccional del hebreo.
  - '"Cortaron los árboles" sigue la decisión inglesa de preferir "trees" sobre "wood" en el cuerpo del texto, con alternativa en nota.'
  - No se usa terminología eclesiástica tradicional innecesaria; el registro es bíblico estándar, claro y contemporáneo.
