  source_alignment_summary: 'El borrador sigue bien la estructura y la mayor parte del sentido del griego: causalidad, herir, derribar, poner en fuga y capturar junto al tesoro. Sin embargo, en τὸν ἱερόσυλον se aparta de la decisión auditada del POB, que privilegia el matiz concreto de robo sacrílego en contexto de fondos del templo. «Profanador del templo» conserva sacrilegio pero debilita el componente de expolio que el inglés documentó como principal.'
  spanish_quality_summary: El español es claro y natural. «Por esta causa» suena digno aunque algo más rígido; funciona. «Junto al tesoro» es comprensible, pero «tesorería» o «tesoro» ambos pueden valer; no requiere cambio. La principal mejora necesaria es alinear el término clave ἱερόσυλος con la opción léxica documentada sin perder legibilidad.
  glossary_alignment: No hay términos del glosario mayor en juego salvo la fidelidad al tratamiento de ἱερόσυλος. El borrador no contradice otros defaults del proyecto, pero sí se desvía de la decisión léxico-teológica auditada, que favorece una formulación equivalente a «ladrón del templo»/«saqueador del templo» más que un abstracto «profanador».
  issues:
  - severity: medium
    issue: τὸν ἱερόσυλον se traduce como «profanador del templo» en vez de reflejar más directamente el robo sacrílego
    rationale: El griego puede incluir sacrilegio en general, pero la auditoría inglesa eligió «temple-robber» precisamente por el contexto del tesoro. En español conviene conservar ese componente concreto; de lo contrario se pierde parte de la razón documentada.
  - severity: low
    issue: La nota al pie ofrece «el sacrílego» pero no preserva una alternativa española que recoja el matiz de sacrilegio frente a la traducción principal de robo sacrílego
    rationale: Si el texto principal se corrige a una forma como «ladrón del templo», la nota debe mantener la alternativa «el sacrílego» para conservar la amplitud semántica reconocida por el POB.
  revised_spanish_text: Por esta causa, hirieron a muchos de ellos[a], derribaron a algunos y a todos los hicieron huir; y apresaron al mismo ladrón del templo junto al tesoro.
  revised_footnotes:
