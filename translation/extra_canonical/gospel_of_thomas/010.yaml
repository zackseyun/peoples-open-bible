translation:
  text: Jesus said[a], “I have cast a fire upon the world, and look[c][b], I am guarding
    it until it blazes.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: “Look” renders the deictic idiom ⲉⲓⲥϩⲏⲏⲧⲉ, which can also be taken as “behold”
      or “pay heed.”
    reason: lexical_alternative
  - marker: b
    text: ϩⲁⲣⲉϩ may also be read “watch over/keep watch over,” but “guard” retains
      a protective nuance.
    reason: lexical_alternative
  - marker: c
    text: Cf. Luke 12:49 (“I came to cast fire upon the earth…”), noting Thomas’s
      different objects (“world”) and continuation (“I am guarding it until it blazes”).
    reason: cross_reference
lexical_decisions:
- source_word: ⲁⲁⲛⲟⲕ … ⲛⲟⲩϫⲉ
  chosen: I have cast
  alternatives:
  - I cast
  - I hurled
  - I threw
  lexicon: Layton, Coptic Grammar; Crum, Dictionary s.v. ⲛⲟⲩϫⲉ
  rationale: ⲛⲟⲩϫⲉ means “throw, cast.” With the emphatic pronoun ⲁⲁⲛⲟⲕ in a perfective
    frame, English present perfect best conveys completed action with present relevance.
- source_word: ⲛⲟⲩⲕⲱϩⲧ
  chosen: a fire
  alternatives:
  - fire
  - a blaze
  lexicon: Crum, Dictionary s.v. ⲕⲱϩⲧ
  rationale: Indefinite article ⲛⲟⲩ- marks indefiniteness; basic sense is “fire.”
- source_word: ⲉϫⲛⲡⲕⲟⲥⲙⲟⲥ
  chosen: upon the world
  alternatives:
  - on the world
  - over the world
  - upon the cosmos
  lexicon: Crum, s.v. ⲉϫⲛ; Greek loan κόσμος
  rationale: ⲉϫⲛ takes the sense “upon/on.” ⲡⲕⲟⲥⲙⲟⲥ is the world-order; “world” is
    idiomatic while retaining scope.
- source_word: ⲉⲓⲥϩⲏⲏⲧⲉ
  chosen: look
  alternatives:
  - behold
  - pay heed
  - see
  lexicon: Layton, Coptic Grammar (deictic idiom)
  rationale: Set-phrase functioning as a deictic interjection; “look” preserves Thomas’s
    terseness and immediacy.
- source_word: ϩⲁⲣⲉϩ
  chosen: am guarding
  alternatives:
  - am watching over
  - keep watch over
  - am protecting
  lexicon: Crum, Dictionary s.v. ϩⲁⲣⲉϩ
  rationale: Verb means to keep watch/guard; here durative progressive sense fits
    the contrast with prior perfective action.
- source_word: ⲉⲛⲧⲟϥ
  chosen: it
  alternatives:
  - him
  lexicon: Layton, Coptic Grammar (dependent pronouns)
  rationale: 3ms object referring back to ⲕⲱϩⲧ (“fire”). In English, natural referent
    is the neuter “it.”
- source_word: ϣⲁⲛⲧⲉ
  chosen: until
  alternatives:
  - until such time as
  lexicon: Lambdin, Introduction to Sahidic Coptic §178
  rationale: Temporal conjunction marking a limit point in time.
- source_word: ϫⲉⲣⲟ
  chosen: blazes
  alternatives:
  - burns
  - flares up
  lexicon: Crum, Dictionary s.v. ϫⲉⲣⲟ
  rationale: Connotes blazing/flaring rather than merely burning; preserves vividness
    of the image.
textual_note: 'Dialect: Sahidic with Lycopolitan features. No lacunae in this saying.
  Orthography: The manuscript line shows ⲁⲉⲓⲛⲟⲩϫⲉ (NHAM02.34/lb14), which Dilley normalizes
  to ⲁⲁⲛⲟⲕ ⲛⲟⲩϫⲉ—an emphatic-pronoun construction with the verb “cast/throw.” At lb15
  the printed line has ϯϩⲁⲣⲉϩ ⲉⲣⲟϥ, while the normalization reads ⲁⲛⲟⲕ ϩⲁⲣⲉϩ ⲉⲛⲧⲟϥ;
  the ⲉⲛⲧⲟϥ object-pronoun is a Lycopolitan/Sahidic variant for 3ms after ⲉ-, where
  strict Sahidic often has ⲉⲣⲟϥ. No restorations are proposed, and there are no Greek
  POxy overlaps for this logion.'
