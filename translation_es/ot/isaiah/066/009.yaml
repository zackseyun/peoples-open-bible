translation:
  language: es
  text: ¿Haré yo llegar al punto de parto y no haré nacer?[a] —dice Yahvé. ¿Yo, que hago nacer, voy a cerrar el vientre?[b] —dice tu Dios[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «llevar al punto de parto»; el hebreo usa imaginería de parto para expresar llevar hasta el momento del alumbramiento.'
    reason: lexical_alternative
  - marker: b
    text: Lit. «restringiré» o «cerraré»; el hebreo sugiere la acción de cerrar o contener el vientre en la imagen del parto.
    reason: lexical_alternative
  - marker: c
    text: El hebreo dice «tu Dios» con sufijo femenino singular, dirigiéndose a Sion/Jerusalén como mujer en el contexto cercano.
    reason: cultural_note
lexical_decisions:
- source_word: אַשְׁבִּיר
  english_pob_choice: bring to the point of birth
  chosen_spanish: hacer que llegue al punto de parto
  alternatives_spanish:
  - llevar al punto de parto
  - llevar al punto de alumbramiento
  - hacer llegar al punto de parto
  lexicon: HALOT
  rationale: 'El verbo hiphil aquí pertenece a la imagen de parto: no es ''romper'' de manera literal, sino llevar la gestación al umbral del nacimiento. ''Hacer que llegue al punto de parto'' preserva la metáfora y comunica con claridad el valor idiomático en español.'
- source_word: אוֹלִיד
  english_pob_choice: cause to give birth
  chosen_spanish: haré nacer
  alternatives_spanish:
  - causaré que dé a luz
  - haré dar a luz
  - haré parir
  lexicon: HALOT
  rationale: El hiphil de ילד es causativo. 'Haré nacer' mantiene esa fuerza causativa de forma natural en español y evita una paráfrasis excesiva.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  lexicon: N/A
  rationale: Se mantiene el nombre divino propio del proyecto, siguiendo la convención española establecida para el Tetragrámaton, en lugar de sustituirlo por un título.
- source_word: אִם
  english_pob_choice: Shall I
  chosen_spanish: ¿Haré yo
  alternatives_spanish:
  - ¿O haré yo?
  - ¿Acaso haré yo?
  lexicon: HALOT
  rationale: En este paralelismo retórico, la segunda cláusula continúa la pregunta sin necesidad de añadir un 'or'. En español, '¿Haré yo...?' reproduce mejor la estructura y el tono interrogativo del hebreo.
- source_word: הַמּוֹלִיד
  english_pob_choice: who cause to give birth
  chosen_spanish: yo que hago nacer
  alternatives_spanish:
  - el que hace nacer
  - quien hace nacer
  lexicon: HALOT
  rationale: El participio con artículo identifica al sujeto por su acción habitual. 'Yo que hago nacer' conserva el valor participial y la autodesignación divina de manera fluida.
- source_word: וְעָצַרְתִּי
  english_pob_choice: shut the womb
  chosen_spanish: cerraré el vientre
  alternatives_spanish:
  - restringiré el vientre
  - cerraré el seno
  - retendré el parto
  lexicon: HALOT
  rationale: '''עצר'' expresa retener, cerrar o impedir. En este contexto de parto, ''cerraré el vientre'' explicita la imagen implicada en el hebreo sin perder su fuerza corporal y poética.'
- source_word: אֱלֹהָיִךְ
  english_pob_choice: your God
  chosen_spanish: tu Dios
  alternatives_spanish:
  - tu Diosa
  - tu Dios, en femenino implícito
  lexicon: HALOT
  rationale: El sufijo femenino singular del hebreo se conserva en el sentido de la apelación directa a Sion/Jerusalén, pero el español no marca de forma natural ese género en el posesivo. 'Tu Dios' mantiene la referencia covenantal y la dirección del discurso.
theological_decisions:
- issue: Mantener la metáfora del parto como promesa de culminación, sin literalizarla ni neutralizarla
  english_pob_reading: God rhetorically assures Zion that he will not begin her birth and then prevent its completion.
  chosen_spanish_reading: Dios promete, por medio de la imagen del parto, que no iniciará el proceso para luego impedir su culminación.
  alternative_spanish_readings:
  - Dios asegura que no abrirá el vientre para luego impedir el nacimiento.
  - Dios no comenzará el parto para dejarlo incompleto.
  rationale: La imagen de parto comunica el punto de entrega final y la fidelidad divina para completar lo iniciado. La formulación española conserva esa tensión poética y no añade conclusiones doctrinales ajenas al verso.
  doctrine_reference: Translation philosophy §§1, 3, 6
- issue: Explicitar el objeto implícito de 'cerrar' dentro del campo semántico del parto
  english_pob_reading: '''shut the womb'' makes the implied childbirth image explicit in English.'
  chosen_spanish_reading: '''cerraré el vientre'' hace explícita en español la imagen implícita de obstaculizar el nacimiento.'
  alternative_spanish_readings:
  - '''restringiré'' sin objeto explícito'
  - '''cerraré'' sin complemento'
  rationale: El hebreo permite omitir el objeto; el español, para ser claro y natural, necesita nombrarlo. 'Vientre' es la concreción más directa del contexto y evita una lectura abstracta.
  doctrine_reference: Translation philosophy §§1, 6
translation_notes:
  revision_awareness: Se corrigió la cohesión entre la traducción y las notas para asegurar que cada marcador de nota aparezca anclado exactamente en el texto español. La versión sigue la revisión más reciente del POB inglés, manteniendo el paralelismo interrogativo directo y la imaginería de parto.
  spanish_consistency_notes:
  - Se usó «Yahvé» para el Tetragrámaton conforme a la convención del proyecto.
  - Se mantuvo la repetición interrogativa del hebreo con «¿Haré yo...? ¿Haré yo...?», sin introducir 'or'.
  - Se eligió «vientre» para el objeto implícito de 'cerrar' por claridad contextual y fidelidad a la imagen corporal.
  - Se preservó «tu Dios» para reflejar el sufijo pronominal del hebreo, aunque el español no marque el femenino en el posesivo.
