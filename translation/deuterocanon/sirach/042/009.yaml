translation:
  text: 'A daughter is a hidden cause of deceit to her father[a], and anxiety over her drives away his sleep: in her youth, lest she remain unmarried, and in her virginity[b], lest she not be married.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew 'a hidden falsehood'; the Greek parallel reads 'hidden sleeplessness,' suggesting the line refers to concealed anxiety a daughter causes her father.
    reason: alternative_reading
  - marker: b
    text: The Hebrew behind 'lest she pass her prime' is uncertain in sense; the Greek parallel supports the idea of fading from youth or passing marriageable age.
    reason: textual_variant
lexical_decisions:
- source_word: בת לאב
  chosen: A daughter ... to her father
  alternatives:
  - A daughter for her father
  - A daughter to a father
  lexicon: HALOT
  rationale: The Hebrew phrase marks the father-daughter relation succinctly. English idiom is best preserved with 'to her father,' matching the relational dative sense also reflected in the Greek πατρί.
- source_word: מטמנת שקר
  chosen: is a hidden falsehood
  alternatives:
  - is a secret deception
  - is concealed anxiety built on falsehood
  - is a hidden cause of disappointment
  lexicon: HALOT
  rationale: The Hebrew literally suggests something hidden/concealed joined with 'falsehood.' The phrase is difficult, but the Greek ἀπόκρυφος ἀγρυπνία ('hidden sleeplessness') confirms the sense of concealed trouble. I retained the Hebrew's sharper wording with 'hidden falsehood' rather than smoothing it away, since the source witness is extant and should govern. The obscurity is preserved rather than over-resolved.
- source_word: דאגה
  chosen: anxiety
  alternatives:
  - worry
  - care
  lexicon: HALOT
  rationale: '''Anxiety'' best captures ongoing troubled concern in readable modern English and fits the parallel Greek μέριμνα.'
- source_word: תפריע שנתו
  chosen: drives away his sleep
  alternatives:
  - disturbs his sleep
  - interrupts his sleep
  lexicon: HALOT
  rationale: The idiom is that worry deprives him of sleep. 'Drives away his sleep' is natural English and aligns well with Greek ἀφιστᾷ ὕπνον.
- source_word: בנעוריה
  chosen: in her youth
  alternatives:
  - while she is young
  lexicon: HALOT
  rationale: A straightforward temporal phrase; 'in her youth' is concise and preserves the formal parallelism of the verse.
- source_word: פן תגור
  chosen: lest she pass her prime
  alternatives:
  - lest she mature too far
  - lest she grow old
  - lest she fade
  lexicon: HALOT
  rationale: The Hebrew reading is somewhat uncertain, but the Greek μὴ ποτε παρακμάσῃ points to decline/passing one's bloom rather than mere residence or fear. 'Pass her prime' communicates the likely sense idiomatically without importing more than the parallel source warrants.
- source_word: ובתוליה
  chosen: in her virginity
  alternatives:
  - while still a virgin
  lexicon: HALOT
  rationale: The Hebrew term refers specifically to virgin status, and the translation should preserve that explicit cultural category.
- source_word: פן לא תנשא
  chosen: lest she not be married
  alternatives:
  - lest she remain unmarried
  - lest she not marry
  lexicon: HALOT
  rationale: The Niphal/passive-like sense is naturally rendered 'be married.' This keeps the social framing of the Hebrew and avoids over-modernizing the expression.
