translation:
  language: es
  text: Ustedes que temen a Yahvé, esperen su misericordia[a] y no se desvíen, no sea que caigan.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebreo חֶסֶד puede expresar lealtad de pacto, amor constante o bondad; el paralelo griego lee ἔλεος, «misericordia», lo que respalda esa elección en el texto principal.
    reason: lexical_alternative
lexical_decisions:
- source_word: יִרְאֵי יְהֹוָה / οἱ φοβούμενοι Κύριον
  english_pob_choice: You who fear Yahweh
  chosen_spanish: Ustedes que temen a Yahvé
  alternatives_spanish:
  - Los que temen a Yahvé
  - Temerosos de Yahvé
  lexicon: HALOT; BDAG
  rationale: El hebreo y el griego usan una expresión participial que se dirige directamente al grupo caracterizado por su temor reverente a Dios. En español, «Ustedes que temen a Yahvé» conserva el tono exhortativo y evita volverlo una mera tercera persona.
- source_word: חַכּוּ / ἀναμείνατε
  english_pob_choice: wait for
  chosen_spanish: esperen
  alternatives_spanish:
  - esperen por
  - aguarden
  - esperen con paciencia
  lexicon: HALOT; BDAG
  rationale: El imperativo pide expectativa paciente. «Esperen» transmite bien la instrucción y suena natural en español sin añadir un matiz interpretativo excesivo.
- source_word: לְחַסְדּוֹ / τὸ ἔλεος αὐτοῦ
  english_pob_choice: his mercy
  chosen_spanish: su misericordia
  alternatives_spanish:
  - su misericordia
  - su lealtad de pacto
  - su amor constante
  lexicon: HALOT; BDAG
  rationale: La pareja griega ἔλεος apoya de forma directa «misericordia» como traducción principal. Aunque חֶסֶד puede abarcar fidelidad leal o amor constante, aquí el paralelo griego hace preferible mantener la tensión semántica en la nota y no en el texto principal.
- source_word: וְאַל תִּטּוּ / καὶ μὴ ἐκκλίνητε
  english_pob_choice: do not turn aside
  chosen_spanish: no se desvíen
  alternatives_spanish:
  - no se aparten
  - no se desvíen del camino
  - no tuerzan el rumbo
  lexicon: HALOT; BDAG
  rationale: El verbo expresa apartarse de una trayectoria. «No se desvíen» conserva la metáfora de apartarse del camino y funciona con claridad en español contemporáneo.
- source_word: פֶּן תִּפֹלוּ / ἵνα μὴ πέσητε
  english_pob_choice: lest you fall
  chosen_spanish: para que no caigan
  alternatives_spanish:
  - no sea que caigan
  - lest you fall
  - para no caer
  lexicon: HALOT; BDAG
  rationale: La advertencia negativa de hebreo y griego puede expresarse naturalmente como finalidad negativa en español. «Para que no caigan» mantiene el tono de advertencia y evita un arcaísmo innecesario; el sujeto plural concuerda con «Ustedes».
theological_decisions:
- issue: Nombre divino יהוה / Κύριον
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el Señor
  - Yahweh
  rationale: El proyecto pide renderizar יהוה como «Yahvé» en el texto principal. El griego Κύριον en este contexto remite al nombre divino del hebreo subyacente, por lo que no se oculta detrás de «Señor» en el cuerpo del texto.
  doctrine_reference: 'DOCTRINE.md: Contested terms — YHWH → Yahvé'
- issue: Nuance of חֶסֶד in light of the Greek parallel ἔλεος
  english_pob_reading: mercy
  chosen_spanish_reading: misericordia
  alternative_spanish_readings:
  - amor constante
  - lealtad de pacto
  - bondad
  rationale: Dado que el paralelo griego usa ἔλεος, «misericordia» es la opción más auditable y directa. La posible amplitud de חֶסֶד no se pierde, sino que queda reconocida en la nota textual.
  doctrine_reference: POB lexical policy on source-anchored nuances
- issue: For the warning clause, preserving admonitory force without over-specifying the fall
  english_pob_reading: lest you fall
  chosen_spanish_reading: para que no caigan
  alternative_spanish_readings:
  - no sea que caigan
  - para no caer
  - a fin de que no caigan
  rationale: La combinación hebrea-griega expresa una advertencia preventiva. En español, «para que no caigan» conserva la fuerza exhortativa sin introducir una interpretación más precisa de la caída (moral, espiritual o circunstancial) que el texto no especifica.
  doctrine_reference: POB syntax and warning-clause policy
translation_notes:
  revision_awareness: La traducción sigue de cerca el estado más reciente del expediente auditado, que no registra revisiones aplicadas y fue confirmado como de alta concordancia entre hebreo y griego. Se mantuvo la lectura directa del nombre divino como Yahvé/Yahvé en español, con la misericordia anclada en el paralelo griego y la advertencia final formulada de manera natural en español.
  spanish_consistency_notes:
  - Se preservó el trato directo en segunda persona plural («Ustedes») para reflejar el carácter exhortativo del hebreo y del griego.
  - Se mantuvo «Yahvé» de acuerdo con la terminología del proyecto para יְהוָה, evitando «Señor» como máscara editorial.
  - «Misericordia» se eligió por el apoyo explícito del griego ἔλεος, mientras que la amplitud de חֶסֶד queda en la nota.
  - «No se desvíen» conserva la metáfora de apartarse del camino sin volverla técnica o explicativa.
  - «Para que no caigan» refleja la advertencia del original sin precisar el tipo de caída.
