  rationale: 'Se ajusta el español para mayor naturalidad y fidelidad funcional: «ha hecho bien» mejora la idiomaticidad; «estuviera» encaja mejor en la subordinación final tras un verbo principal pasado; y «para los que…, hay destrucción» conserva el sentido y el énfasis del griego sin dejar una frase elíptica poco natural en español. Las notas se actualizan para que correspondan exactamente al texto revisado.'
