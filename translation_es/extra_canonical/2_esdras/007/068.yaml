source:
  edition: Bensly 1895 (Texts and Studies III.2) + Bensly 1875 Missing Fragment, cleaned Latin
  text: quid prodest, quoniam salutati saluabimur, si tormento tormentabimur? Omnes enim qui nati sunt, conmixti sunt iniquitatibus, et pleni sunt peccatis, et grauidi delictis;
  language: Latin
base_translation:
  language: en
  yaml_path: translation/extra_canonical/2_esdras/007/068.yaml
  text: What does it profit that we will be saved[a], if we will be tormented? For all who have been born are mixed with iniquities, and are full of sins and burdened with transgressions.
  footnotes:
  - marker: a
    text: Or 'For all who have been born are mixed with iniquities, and are full of sins and loaded with transgressions.'.
    reason: previous_rendering
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T11:42:12Z'
    unchanged: false
    changes_summary: Removed 'surely' and 'severely' because the Latin does not explicitly intensify either verb; revised 'entangled in iniquities' to 'mixed with iniquities' to reflect conmixti more directly; added 'are' before 'burdened' for smoother, complete English parallelism.
translation:
  language: es
  text: ¿De qué sirve que seamos salvados, si hemos de ser atormentados? Porque todos los que han nacido están mezclados con iniquidades, están llenos de pecados y están cargados de transgresiones.
  philosophy: optimal-equivalence
  footnotes: []
lexical_decisions:
- source_word: quid prodest
  english_pob_choice: What does it profit
  chosen_spanish: ¿Qué provecho hay de... ?
  alternatives_spanish:
  - ¿Qué gana... ?
  - ¿De qué sirve... ?
  lexicon: prodest
  rationale: Mantiene el valor de pregunta retórica sobre utilidad/provecho sin suavizar el sentido deliberativo del latín.
- source_word: saluabimur / salutati saluabimur
  english_pob_choice: we will be saved
  chosen_spanish: seamos salvados
  alternatives_spanish:
  - seremos salvados
  - seamos rescatados
  lexicon: saluabimur
  rationale: La construcción española con subjuntivo en la pregunta retórica conserva el matiz hipotético del original y la pasiva futura de salvación.
- source_word: tormento tormentabimur
  english_pob_choice: we will be tormented
  chosen_spanish: hemos de ser atormentados
  alternatives_spanish:
  - seremos atormentados
  - seremos torturados
  lexicon: tormentabimur
  rationale: ‘Atormentados’ reproduce el campo semántico de tormentum/tormento; la perífrasis ‘hemos de ser’ refleja la certeza o inminencia del giro latino sin añadir intensificación ajena.
- source_word: conmixti sunt iniquitatibus
  english_pob_choice: are mixed with iniquities
  chosen_spanish: están mezclados con iniquidades
  alternatives_spanish:
  - están entremezclados con iniquidades
  - están enredados en iniquidades
  lexicon: conmixti
  rationale: ‘Mezclados con’ sigue de cerca el latín conmixti y evita introducir una imagen distinta; ‘iniquidades’ conserva el tono moral y bíblico del sustantivo.
- source_word: pleni sunt peccatis
  english_pob_choice: are full of sins
  chosen_spanish: llenos de pecados
  alternatives_spanish:
  - colmados de pecados
  - rebosantes de pecados
  lexicon: pleni / peccatis
  rationale: La equivalencia directa es clara y natural en español, preservando la plenitud culpable del texto.
- source_word: grauidi delictis
  english_pob_choice: burdened with transgressions
  chosen_spanish: cargados de transgresiones
  alternatives_spanish:
  - gravados con transgresiones
  - agobiados por transgresiones
  lexicon: grauidi / delictis
  rationale: ‘Cargados de’ comunica peso moral de forma idiomática; ‘transgresiones’ traduce delictis con una palabra sobria y ampliamente comprensible.
theological_decisions:
- issue: La certeza de salvación y tormento en el paralelismo latino
  english_pob_reading: we will be saved / we will be tormented
  chosen_spanish_reading: seamos salvados / hemos de ser atormentados
  alternative_spanish_readings:
  - seremos salvados / seremos atormentados
  - se nos salvará / se nos atormentará
  rationale: El latín de la fuente conserva un paralelismo intensivo heredado; en español se mantiene el contraste entre salvación y tormento sin agregar adverbios que el latín no explicita. La perífrasis ‘hemos de ser’ ayuda a reflejar la fuerza del futuro pasivo en un registro bíblico.
  doctrine_reference: Lexical source fidelity; apocalyptic rhetorical question
translation_notes:
  revision_awareness: Se tomó en cuenta la revisión más reciente del audit trail, que corrigió la omisión del primer miembro de la pregunta retórica y estabilizó el valor no intensificado de los verbos latinos. La versión española refleja ambos miembros de la pregunta y conserva el paralelismo completo del pasaje.
  spanish_consistency_notes:
  - Se usó ‘Yahvé’ como terminología por defecto solo cuando el texto lo requiera; aquí no aparece el tetragrámaton.
  - ‘Iniquidades’, ‘pecados’ y ‘transgresiones’ se mantuvieron diferenciados para preservar la triple acumulación moral del latín.
  - Se evitó ‘Cristo’/‘Mesías’ porque no aparece en este versículo.
  - La puntuación sigue el ritmo retórico de una única pregunta seguida de la explicación causal introducida por ‘Porque’.
