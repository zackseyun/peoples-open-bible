translation:
  language: es
  text: Entonces David cruzó al otro lado y se paró en la cima del monte, a distancia[a]; había un gran espacio entre ellos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «la distancia entre ellos era grande». El hebreo dice literalmente: «grande fue el espacio/lugar entre ellos».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּעֲבֹר
  english_pob_choice: crossed over
  chosen_spanish: cruzó al otro lado
  alternatives_spanish:
  - pasó al otro lado
  - cruzó
  - atravesó
  lexicon: HALOT
  rationale: עבר expresa un movimiento de pasar de un lado a otro. En español, 'cruzó al otro lado' conserva el valor direccional y el matiz de tránsito que el inglés POB captó con 'crossed over'.
- source_word: הָעֵבֶר
  english_pob_choice: the other side
  chosen_spanish: al otro lado
  alternatives_spanish:
  - al lado opuesto
  - al lado de allá
  lexicon: HALOT
  rationale: Con artículo, el sustantivo señala el lado opuesto o distante. 'Al otro lado' es natural en español y mantiene la referencia geográfica sin rigidizarla.
- source_word: וַיַּעֲמֹד
  english_pob_choice: stood
  chosen_spanish: se quedó sobre
  alternatives_spanish:
  - se puso de pie sobre
  - estuvo de pie sobre
  - se detuvo sobre
  lexicon: HALOT
  rationale: El verbo básico es 'estar de pie', pero en este contexto narrativo el español 'se quedó sobre' comunica la fijación de su posición sin sonar forzado. La elección preserva la acción de ubicarse y permanecer allí.
- source_word: עַל רֹאשׁ הָהָר
  english_pob_choice: on the top of the mountain
  chosen_spanish: sobre la cima del monte
  alternatives_spanish:
  - en la cima del monte
  - sobre la cumbre del monte
  - sobre la cabeza del monte
  lexicon: HALOT
  rationale: רֹאשׁ en topografía significa 'cima' o 'cumbre'. 'Monte' refleja הָהָר de manera idiomática; se evita una traducción literal de 'cabeza' por no ser natural en español.
- source_word: מֵרָחֹק
  english_pob_choice: at a distance
  chosen_spanish: a distancia
  alternatives_spanish:
  - desde lejos
  - lejos
  lexicon: HALOT
  rationale: La frase marca separación espacial. 'A distancia' mantiene la idea sin añadir demasiado contenido interpretativo, y corresponde bien al valor del inglés POB.
- source_word: רַב הַמָּקוֹם
  english_pob_choice: there was a great space
  chosen_spanish: había un gran espacio
  alternatives_spanish:
  - el espacio era grande
  - la distancia era grande
  - había mucha distancia
  lexicon: HALOT
  rationale: Literalmente, 'grande fue el espacio/lugar'. 'Había un gran espacio' conserva la imagen concreta del hebreo y reproduce la tensión del inglés POB entre espacio y distancia.
- source_word: בֵּינֵיהֶם
  english_pob_choice: between them
  chosen_spanish: entre ellos
  alternatives_spanish:
  - que los separaba
  - en medio de ellos
  lexicon: HALOT
  rationale: La preposición señala con claridad la separación entre los dos grupos/personas aludidos. 'Entre ellos' es la forma directa y transparente en español.
translation_notes:
  revision_awareness: 'El pasaje coincide con el análisis inglés POB y no requiere cambios de revisión; se mantiene la misma decisión interpretativa básica: עבר = ''cruzó'', הָעֵבֶר = ''al otro lado'', y רַב הַמָּקוֹם = separación espacial expresada idiomáticamente en español.'
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' como norma del proyecto, pero este versículo no contiene el Tetragrámaton ni un equivalente directo.
  - Se evita 'SEÑOR' y 'Cristo' por no aparecer en el texto fuente.
  - '''Monte'' traduce הָהָר de forma neutral; no se fuerza ''colina'' porque el hebreo usa el término general de elevación.'
  - La nota al pie preserva la alternativa lexical documentada por el POB inglés sin sobrecargar el texto principal.
