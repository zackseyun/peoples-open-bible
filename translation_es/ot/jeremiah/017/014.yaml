translation:
  language: es
  text: Sáname[a], Yahvé, y seré sanado; sálvame, y seré salvado[b], porque tú eres mi alabanza.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «líbrame ... y seré librado». El verbo hebreo puede denotar rescate o liberación, además de sanidad en sentido más amplio.
    reason: lexical_alternative
  - marker: b
    text: 'O «porque tú eres el que yo alabo». El hebreo dice literalmente: «porque tú eres mi alabanza».'
    reason: lexical_alternative
lexical_decisions:
- source_word: רְפָאֵנִי
  english_pob_choice: Heal me
  chosen_spanish: Sáname
  alternatives_spanish:
  - Réstaurame
  - Cúrame
  lexicon: HALOT
  rationale: El imperativo de רפא con sufijo de 1ª singular pide una forma breve y natural en español. «Sáname» conserva la amplitud semántica de curar/restaurar sin estrechar el sentido solo a lo físico.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: El texto hebreo usa el nombre propio del pacto, no un título. En español del POB, la forma estándar es «Yahvé», que preserva el Tetragrámaton sin sustituirlo por un equivalente tradicional.
- source_word: וְאֵרָפֵא
  english_pob_choice: and I will be healed
  chosen_spanish: y seré sanado
  alternatives_spanish:
  - y seré curado
  - para que yo sea sanado
  lexicon: HALOT
  rationale: La forma verbal expresa resultado o consecuencia de la acción divina. «Seré sanado» mantiene el paralelo directo con el hebreo y suena natural en español bíblico actual.
- source_word: הוֹשִׁיעֵנִי
  english_pob_choice: save me
  chosen_spanish: sálvame
  alternatives_spanish:
  - líbrame
  - rescátame
  lexicon: HALOT
  rationale: יׁשע puede significar salvar o librar. «Sálvame» conserva la amplitud teológica y el paralelismo con «Sáname» mejor que una restricción a rescate temporal.
- source_word: וְאִוָּשֵׁעָה
  english_pob_choice: and I will be saved
  chosen_spanish: y seré salvado
  alternatives_spanish:
  - y seré librado
  - para que yo sea salvado
  lexicon: HALOT
  rationale: La pasiva/medio correlativa mantiene la respuesta a la súplica. «Seré salvado» refleja la forma verbal y deja abierta la resonancia tanto de rescate como de salvación.
- source_word: כִּי
  english_pob_choice: for
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  lexicon: HALOT
  rationale: Aquí introduce el fundamento de la petición; «porque» comunica con claridad la relación causal en español sin perder el tono de oración.
- source_word: תְהִלָּתִי
  english_pob_choice: my praise
  chosen_spanish: mi alabanza
  alternatives_spanish:
  - mi elogio
  - la que yo alabo
  lexicon: HALOT
  rationale: El sustantivo תְהִלָּה significa «praise». «Mi alabanza» es la traducción más literal y transparente en español, preservando la expresión compacta del hebreo.
- source_word: אָתָּה
  english_pob_choice: you are
  chosen_spanish: tú eres
  alternatives_spanish:
  - eres tú
  - tú solo eres
  lexicon: HALOT
  rationale: El pronombre independiente añade énfasis. En español, «tú eres» comunica de modo natural esa focalización sin introducir un elemento ajeno al texto.
theological_decisions:
- issue: Nombre divino יְהוָה
  english_pob_reading: Yahweh / O Yahweh
  chosen_spanish_reading: Yahvé / Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: 'El verso emplea el nombre personal de Dios, no un sustituto reverencial. La lectura española mantiene el criterio del POB: transliterar el Tetragrámaton como «Yahvé» para preservar la identidad del nombre revelado.'
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Alcance de הוֹשִׁיעֵנִי / וְאִוָּשֵׁעָה
  english_pob_reading: save me / and I will be saved
  chosen_spanish_reading: sálvame / y seré salvado
  alternative_spanish_readings:
  - líbrame / y seré librado
  - rescátame / y seré rescatado
  rationale: El hebreo puede abarcar rescate, liberación y salvación en sentido amplio. Se conserva «salvado» para reflejar la amplitud lexical y la correspondencia con la formulación inglesa auditada, sin limitarla a un alivio meramente circunstancial.
  doctrine_reference: HALOT; poesía de súplica en Jeremías
translation_notes:
  revision_awareness: La revisión más reciente indicó que no eran necesarios cambios; el presente borrador sigue de cerca el texto hebreo y el audit trail inglés, manteniendo la misma estructura poética y las mismas alternativas léxicas documentadas.
  spanish_consistency_notes:
  - Se usó «Yahvé» de manera consistente para יהוה, conforme al criterio del proyecto.
  - «Sáname» / «sálvame» se mantuvieron como imperativos paralelos, con el segundo hemistiquio reflejado por formas pasivas en futuro simple, natural en español.
  - «Mi alabanza» conserva la literalidad del hebreo y deja visible la posible lectura alternativa explicada en nota.
