    rationale: Aunque refleja מִקְוֵה como agua reunida, en español bíblico legible «todo depósito de sus aguas» o similar suena más natural dentro de una lista de cuerpos o reservas de agua sin perder sentido.
  - severity: low
    issue: La razón de la nota [b] no coincide bien con su función.
    rationale: «textual_variant» no describe adecuadamente una nota que preserva una formulación alternativa/previa para la misma expresión interpretativa.
