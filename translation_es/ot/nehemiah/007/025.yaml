translation:
  language: es
  text: los hijos de Gabaón[a], noventa y cinco.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «los descendientes de Gabaón». El hebreo dice literalmente «los hijos de Gabaón», una fórmula genealógica habitual que puede designar a un clan o grupo comunitario más amplio, no solo a hijos varones inmediatos.
    reason: lexical_alternative
lexical_decisions:
- source_word: בְּנֵי
  english_pob_choice: the sons of
  chosen_spanish: los hijos de
  alternatives_spanish:
  - los descendientes de
  - los hombres de
  lexicon: HALOT
  rationale: En listas genealógicas o censales, el constructo plural de בֵּן puede referirse al grupo familiar o clan. «Los hijos de» conserva la fórmula formal del hebreo y corresponde bien al registro de estas listas en español; «los descendientes de» explicita más de lo que el hebreo exige, y «los hombres de» cambia el matiz genealógico.
- source_word: גִבְע֖וֹן
  english_pob_choice: Gibeon
  chosen_spanish: Guebaón
  alternatives_spanish:
  - Gabaón
  - Gibeaón
  lexicon: HALOT
  rationale: Topónimo hebreo transliterado al español con una forma reconocible y cercana a la pronunciación, manteniendo el nombre propio sin sustituirlo por una traducción.
- source_word: תִּשְׁעִ֥ים וַחֲמִשָּֽׁה
  english_pob_choice: ninety-five
  chosen_spanish: noventa y cinco
  alternatives_spanish:
  - noventa y cinco
  - noventa y cinco años
  lexicon: HALOT
  rationale: La expresión cardinal hebrea significa 95. En español, la forma natural y fiel es «noventa y cinco»; no se añade ninguna unidad porque el contexto del versículo ya es una cifra de listado.
translation_notes:
  revision_awareness: 'El texto hebreo y el contexto de la versión inglesa coinciden plenamente en el sentido básico: una fórmula de lista genealógica/censal con el total «noventa y cinco». No hay variantes textuales relevantes ni revisiones pendientes en el registro auditado.'
  spanish_consistency_notes:
  - Se conserva la fórmula genealógica compacta «los hijos de», siguiendo la preferencia POB por la estructura del original cuando no fuerza el español.
  - Se usa «Guebaón» como transliteración española consistente con nombres hebreos, sin cambiar el sentido topónimo.
  - 'La cifra se presenta en forma española moderna y clara: «noventa y cinco».'
