  to: 'Y dijo a sus hijos: «Ensíllenme el asno». Y ellos le ensillaron el asno[a], y montó sobre él.'
  rationale: Se corrige la ubicación de la nota al pie para que ancle la cláusula correcta según la auditoría inglesa. Se sustituye «aparejar» por «ensillar» por mayor naturalidad y precisión contextual en español, manteniendo «asno» por registro bíblico. No se requiere adjudicación adicional.
