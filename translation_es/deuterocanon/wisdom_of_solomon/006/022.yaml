translation:
  language: es
  text: Pero qué es la sabiduría y cómo llegó a ser[a], lo declararé, y no les esconderé misterios; más bien, desde el principio de su origen la rastrearé, y pondré en claro el conocimiento de ella, y de ningún modo pasaré por alto la verdad[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «cómo se originó». El griego permite una formulación más explícita del ‘venir a ser’.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «y ciertamente no pasaré por alto la verdad».'
    reason: lexical_alternative
lexical_decisions:
- source_word: τί δέ ἐστιν σοφία
  english_pob_choice: what wisdom is
  chosen_spanish: qué es la sabiduría
  alternatives_spanish:
  - qué significa la sabiduría
  - cómo es la sabiduría
  lexicon: LSJ
  rationale: La pregunta directa se conserva con naturalidad en español. 'Sabiduría' mantiene el término central del pasaje sin reinterpretarlo.
- source_word: πῶς ἐγένετο
  english_pob_choice: how it came to be
  chosen_spanish: cómo llegó a ser
  alternatives_spanish:
  - cómo vino a ser
  - cómo surgió
  - cómo fue creada
  lexicon: LSJ
  rationale: '''Llegó a ser'' comunica el valor de γίνομαι como venir a existir o surgir, sin forzar una conclusión doctrinal sobre si la sabiduría fue creada o eterna.'
- source_word: ἀπαγγελῶ
  english_pob_choice: I will declare
  chosen_spanish: lo declararé
  alternatives_spanish:
  - lo anunciaré
  - lo relataré
  - lo diré
  lexicon: LSJ
  rationale: '''Declarar'' conserva el registro elevado del verbo griego y funciona bien en español bíblico actual.'
- source_word: οὐκ ἀποκρύψω ὑμῖν μυστήρια
  english_pob_choice: I will not hide mysteries from you
  chosen_spanish: no les esconderé misterios
  alternatives_spanish:
  - no les ocultaré misterios
  - no les encubriré misterios
  - no les guardaré misterios
  lexicon: LSJ
  rationale: '''Esconder'' reproduce de forma clara ἀποκρύπτω. ''Misterios'' se conserva para no reducir μυστήρια a simples secretos o datos privados.'
- source_word: ἀπ' ἀρχῆς γενέσεως
  english_pob_choice: from the beginning of its origin
  chosen_spanish: desde el principio de su origen
  alternatives_spanish:
  - desde el comienzo de su origen
  - desde el principio de su surgimiento
  - desde el inicio de su venir a ser
  lexicon: LSJ
  rationale: La frase griega es compacta y redundante; el español mantiene esa intensidad con 'desde el principio de su origen', sin resolver demasiado la densidad del original.
- source_word: ἐξιχνιάσω
  english_pob_choice: I will trace it out
  chosen_spanish: la rastrearé
  alternatives_spanish:
  - la investigaré a fondo
  - la seguiré hasta encontrarla
  - la indagaré
  lexicon: LSJ
  rationale: '''Rastrear'' conserva la imagen de seguir huellas o indicios hasta descubrir algo, equivalente al matiz de ἐξιχνιάζω.'
- source_word: θήσω εἰς τὸ ἐμφανὲς
  english_pob_choice: I will set the knowledge of it in the open
  chosen_spanish: pondré en claro el conocimiento de ella
  alternatives_spanish:
  - pondré al descubierto el conocimiento de ella
  - lo haré manifiesto respecto de ella
  - lo pondré a la vista
  lexicon: LSJ
  rationale: El griego sugiere colocar algo 'en lo manifiesto'. 'Poner en claro' comunica bien la idea de hacerlo público y evidente sin sonar mecánico en español.
- source_word: τὴν γνῶσιν αὐτῆς
  english_pob_choice: the knowledge of it
  chosen_spanish: el conocimiento de ella
  alternatives_spanish:
  - el conocimiento acerca de ella
  - su conocimiento
  - el saber de ella
  lexicon: LSJ
  rationale: '''Conocimiento de ella'' mantiene el vínculo con la sabiduría personificada sin añadir interpretación. Se evita ''de ello'' por la referencia femenina implícita en σοφία.'
- source_word: οὐ μὴ παροδεύσω τὴν ἀλήθειαν
  english_pob_choice: I will by no means pass by the truth
  chosen_spanish: de ningún modo pasaré por alto la verdad
  alternatives_spanish:
  - de ningún modo pasaré de largo ante la verdad
  - de ningún modo ignoraré la verdad
  - ciertamente no pasaré por alto la verdad
  lexicon: LSJ
  rationale: '''Pasar por alto'' conserva el valor figurado de παροδεύω como no pasar de largo o no omitir. La construcción enfática ''de ningún modo'' reproduce bien οὐ μή.'
theological_decisions:
- issue: Alcance de πῶς ἐγένετο y γενέσεως respecto del origen de la sabiduría
  english_pob_reading: Render with origin language ('how it came to be,' 'from the beginning of its origin') without importing a doctrinal claim about created vs. eternal wisdom.
  chosen_spanish_reading: Traducir con lenguaje de origen ('cómo llegó a ser', 'desde el principio de su origen') sin decidir si la sabiduría fue creada o es eterna.
  alternative_spanish_readings:
  - cómo fue creada
  - cómo surgió
  - desde el principio de su creación
  rationale: El versículo promete explicar el origen de la sabiduría, pero el texto griego y el contexto inmediato no obligan a resolver aquí la cuestión doctrinal. La traducción conserva la tensión del original.
  doctrine_reference: Preservar la tensión teológica sin resolverla
- issue: Tratamiento de μυστήρια
  english_pob_reading: I will not hide mysteries from you
  chosen_spanish_reading: no les esconderé misterios
  alternative_spanish_readings:
  - no les ocultaré secretos
  - no les encubriré misterios
  rationale: '''Misterios'' preserva la densidad del término griego y evita reducirlo a información meramente privada o esotérica.'
  doctrine_reference: Uso bíblico del término μυστήριον / μυστήρια
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión inglesa que quitó la coma antes de 'and how it came to be' para reflejar una sola cláusula interrogativa fluida. También se respetó la decisión auditada de no cerrar el texto a una doctrina sobre si la sabiduría es creada o eterna.
  spanish_consistency_notes:
  - Se mantiene 'sabiduría' para σοφία de forma consistente.
  - Se conserva el lenguaje de origen sin introducir 'creación' donde el griego solo habla de génesis/origen.
  - '''Misterios'' se mantiene como traducción fuerte de μυστήρια.'
  - La referencia femenina implícita en σοφία se respeta con 'ella'.
