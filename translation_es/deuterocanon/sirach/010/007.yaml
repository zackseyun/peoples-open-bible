    text: 'Griego: «La soberbia es odiosa ante el Señor y los hombres, y de ambos cometerá cosas injustas». El hebreo se entiende más naturalmente en el sentido de que la opresión es una falta respecto de ambos, Dios y los hombres.'
    reason: alternative_reading
  - marker: b
    text: El hebreo une מַעַל con עֹשֶׁק. Aquí se entiende no como origen causal, sino como una afirmación de que la opresión constituye una falta o injusticia.
    reason: lexical_clarification
  revision_rationale: Se sustituyó 'Yahvé' por 'el Señor' porque la fuente no contiene el nombre divino יהוה sino אֲדוֹן / Κυρίου. Se rehízo la nota [a] para reflejar fielmente la alternativa griega y la explicación del audit trail inglés, evitando presentar 'ante' como el sentido principal del hebreo. Se ajustó la redacción a 'por el Señor y por los hombres' para un español más natural, y 'es una injusticia' para mejorar la fluidez sin cambiar el contenido.
