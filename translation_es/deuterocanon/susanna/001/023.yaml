    text: O, «daremos testimonio contra ti». El griego tiene un tono forense.
    reason: lexical_alternative
  - marker: b
    text: «Sirvientas» traduce un término que puede significar «muchachas», pero aquí se refiere a las asistentes femeninas de Susana.
    reason: lexical_alternative
  revision_rationale: Se corrige el anclaje de la nota forense para que recaiga sobre el verbo pertinente, y se mejora la naturalidad y fidelidad de ἐξαπέστειλας ἀπὸ σοῦ con «enviaste lejos de ti» en lugar de «despediste ... lejos de ti». También se elimina el sujeto explícito innecesario para un español más fluido.
