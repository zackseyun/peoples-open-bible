review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español comunica bien el sentido básico del griego: una súplica para recibir la sabiduría asociada al trono divino y no ser rechazado de entre los hijos de Dios. Sin embargo, no preserva fielmente un rasgo significativo del texto fuente y del expediente léxico: τῶν σῶν θρόνων es plural en griego. Aunque la revisión inglesa normalizó a singular por naturalidad, el propio aparato auditado conserva el plural como dato importante y la nota española actual está mal formulada porque presenta como alternativa exactamente la misma frase singular del texto.'
  spanish_quality_summary: El español es natural, claro y digno. 'Dame la sabiduría que se sienta junto a...' y 'no me rechaces de entre tus hijos' leen bien en español eclesial contemporáneo. La principal deficiencia está en el manejo de la nota y en la pérdida innecesaria del plural 'tronos'. Además, en español suena más directo y estilísticamente mejor 'junto a tus tronos' que singular con nota contradictoria.
  glossary_alignment: No hay conflicto con la terminología base del proyecto. 'sabiduría', 'hijos' y 'rechaces' encajan bien. La decisión 'hijos' para παῖδες está bien justificada, con 'siervos' preservado como alternativa en nota. El punto a corregir es la fidelidad formal a θρόνων en plural.
  issues:
  - severity: medium
    issue: Se cambió el plural griego 'tus tronos' a singular en el texto principal.
    rationale: El griego fuente dice claramente τῶν σῶν θρόνων, plural. Dado que el expediente léxico subraya que debe preservarse la forma plural, el español debería hacerlo también salvo razón excepcional muy fuerte, que aquí no supera la pérdida de fidelidad.
  - severity: medium
    issue: La nota [a] está mal construida porque ofrece como 'O:' la misma lectura singular ya usada en el texto.
    rationale: Una nota de alternativa debe presentar una variante real. La nota actual no ayuda al lector y además confunde la relación entre texto y variante.
  revised_spanish_text: Dame la sabiduría que se sienta junto a tus tronos[a], y no me rechaces de entre tus hijos[b].
  revised_footnotes:
