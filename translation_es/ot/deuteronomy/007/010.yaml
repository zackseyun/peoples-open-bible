    issue: «delante de su rostro» es un calco poco natural de אֶל־פָּנָיו
    rationale: Aunque intenta preservar la imagen corporal, en español resulta rígido y poco idiomático. El POB inglés ya documenta que el sentido puede expresarse como trato directo/personal; conviene una forma natural como «en su cara» con nota explicativa.
  - severity: medium
    issue: Falta de concordancia contextual en la primera ocurrencia del modismo
    rationale: 'En la primera cláusula el objeto es plural («a los que lo odian»), por lo que «su rostro» introduce ambigüedad singular. El sentido es distributivo: a cada uno, cara a cara.'
  - severity: low
    issue: «paga / le pagará» debilita el matiz judicial de שׁלם
    rationale: No es incorrecto, pero en este contexto de juicio divino «retribuye / le retribuirá» suena más preciso y digno en español eclesial general.
  revised_spanish_text: y retribuye a los que lo odian en su cara[a], para destruirlos. No se demora con el que lo odia; le retribuirá en su cara[a].
