    issue: La nota al pie [a] está anclada en «casas paternas» pero explica «cabeza por cabeza».
    rationale: Las instrucciones exigen que el marcador aparezca exactamente en la palabra o frase relevante. Aquí la nota corresponde a לְגֻלְגְּלֹתָם, no a לְבֵית אֲבֹתֵיהֶם.
  - severity: medium
    issue: «los cabezas de las casas paternas» es poco natural en español.
    rationale: Aunque conserva la imagen hebrea, en español suena forzado y disminuye la legibilidad. «Los jefes de las casas paternas» transmite fielmente la función de liderazgo familiar sin pérdida significativa de sentido.
