translation:
  language: es
  text: Samlá murió[a], y Shaúl de Rejobot junto al Río reinó en su lugar.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «el río»; muchos entienden esto como una referencia al Éufrates.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּמָת
  english_pob_choice: died
  chosen_spanish: murió
  alternatives_spanish:
  - falleció
  - se murió
  lexicon: HALOT
  rationale: El verbo qal wayyiqtol de מות expresa muerte de manera directa. «Murió» conserva la sencillez narrativa del hebreo y evita un eufemismo innecesario.
- source_word: שַׂמְלָה
  english_pob_choice: Samlah
  chosen_spanish: Samlá
  alternatives_spanish:
  - Samlah
  lexicon: nombre propio
  rationale: Es un nombre propio. Se mantiene transliterado, ajustado a ortografía española con acento para señalar la acentuación natural en lectura en voz alta.
- source_word: וַיִּמְלֹךְ
  english_pob_choice: reigned
  chosen_spanish: reinó
  alternatives_spanish:
  - comenzó a reinar
  - llegó a reinar
  lexicon: HALOT
  rationale: En la fórmula de sucesión real, מלך se expresa naturalmente como «reinar». «Reinó» conserva el valor aspectual narrativo y la fórmula histórica del texto.
- source_word: תַּחְתָּיו
  english_pob_choice: in his place
  chosen_spanish: en su lugar
  alternatives_spanish:
  - en vez de él
  - después de él
  lexicon: HALOT
  rationale: La preposición תחת con sufijo indica sucesión o sustitución. «En su lugar» es la equivalencia española más natural y precisa en este contexto regnal.
- source_word: שָׁאוּל
  english_pob_choice: Shaul
  chosen_spanish: Saúl
  alternatives_spanish:
  - Shaúl
  - Shaul
  lexicon: nombre propio
  rationale: Aquí se conserva la forma española tradicional «Saúl», ya que no hay tensión contextual que exija diferenciarlo mediante transliteración estricta y la forma es plenamente inteligible en español.
- source_word: מֵרְחֹבוֹת
  english_pob_choice: from Rehoboth
  chosen_spanish: de Rejobot
  alternatives_spanish:
  - desde Rejobot
  - procedente de Rejobot
  lexicon: topónimo
  rationale: Se translitera el topónimo según uso español fluido. La preposición מֵ indica procedencia o afiliación; «de» mantiene esa relación de origen sin forzar una lectura más específica.
- source_word: הַנָּהָר
  english_pob_choice: the River
  chosen_spanish: el Río
  alternatives_spanish:
  - el río
  - el Éufrates
  lexicon: HALOT
  rationale: El hebreo dice literalmente «el río», con posible valor toponímico conocido. En español, la mayúscula de «Río» ayuda a conservar esa posible referencia fija sin añadir «Éufrates» al texto principal, ya que el hebreo no lo especifica.
theological_decisions:
- issue: Referencia de הַנָּהָר como designación geográfica conocida
  english_pob_reading: the River; many understand this as a reference to the Euphrates
  chosen_spanish_reading: el Río, con posible valor toponímico conocido
  alternative_spanish_readings:
  - el Éufrates
  - el río
  rationale: La fuente hebrea no nombra explícitamente al Éufrates; por eso el texto principal conserva la expresión literal. La nota admite la identificación tradicional sin imponerla como si fuera explícita en el hebreo.
  doctrine_reference: none
translation_notes:
  revision_awareness: La revisión inglesa más reciente cambió «on the River» por «by the River» para lograr mayor naturalidad. En español, «de Rejobot, junto al Río» mantiene esa naturalidad relacional y conserva la ambigüedad útil del hebreo sin introducir una localización más precisa que la fuente no ofrece.
  spanish_consistency_notes:
  - Se mantiene el nombre divino no pertinente aquí sin intervención.
  - Se usa puntuación española estándar con coma de incisión para la aposición geográfica.
  - Se conserva la sucesión real con la fórmula «reinó en su lugar», alineada con el valor de תַּחְתָּיו.
  - El pie de nota se ancla en «Río» porque allí reside la alternativa textual/lexical relevante.
