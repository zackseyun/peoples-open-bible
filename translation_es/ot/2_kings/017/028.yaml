translation:
  language: es
  text: Entonces vino uno de los sacerdotes a quienes habían exiliado de Samaria, y habitó en Betel, y les enseñó cómo debían temer a Yahvé[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «YHWH» (el nombre divino); tradicionalmente se vierte «el SEÑOR».'
    reason: alternative_reading
lexical_decisions:
- source_word: וַיָּבֹא
  english_pob_choice: Then ... came
  chosen_spanish: Entonces vino
  alternatives_spanish:
  - Y vino
  - Y llegó
  lexicon: HALOT
  rationale: El waw consecutivo marca avance narrativo; «entonces» comunica bien la secuencia en español sin perder el valor de progreso de la acción.
- source_word: אֶחָד מֵהַכֹּהֲנִים
  english_pob_choice: one of the priests
  chosen_spanish: uno de los sacerdotes
  alternatives_spanish:
  - un sacerdote entre los sacerdotes
  - uno de aquellos sacerdotes
  lexicon: HALOT
  rationale: La frase indica un individuo perteneciente a un grupo mayor. «Uno de los sacerdotes» reproduce ese valor idiomático de pertenencia y selección.
- source_word: אֲשֶׁר הִגְלוּ מִשֹּׁמְרוֹן
  english_pob_choice: whom they had exiled from Samaria
  chosen_spanish: que habían exiliado de Samaria
  alternatives_spanish:
  - que habían deportado de Samaria
  - que habían llevado cautivo de Samaria
  lexicon: HALOT
  rationale: El hifil de גלה expresa deportación/exilio. «Exiliado» mantiene la fuerza histórica del término y es natural en español bíblico contemporáneo.
- source_word: וַיֵּשֶׁב
  english_pob_choice: lived
  chosen_spanish: habitó
  alternatives_spanish:
  - vivió
  - se estableció
  lexicon: HALOT
  rationale: ישב puede significar residir o establecerse. «Habitó» conserva el matiz bíblico de residencia sin sugerir una permanencia más fuerte de la que exige el contexto.
- source_word: בְּבֵית אֵל
  english_pob_choice: in Bethel
  chosen_spanish: en Betel
  alternatives_spanish:
  - en Betel
  lexicon: HALOT
  rationale: El topónimo se vierte de forma convencional como «Betel» en español. La preposición locativa se mantiene de manera directa.
- source_word: וַיְהִי מוֹרֶה
  english_pob_choice: and he taught
  chosen_spanish: y les enseñaba
  alternatives_spanish:
  - y enseñó
  - y era su maestro
  lexicon: HALOT
  rationale: La construcción con היה + participio expresa acción característica o en curso. El imperfecto español «enseñaba» refleja bien ese valor durativo/habitual.
- source_word: אֹתָם
  english_pob_choice: them
  chosen_spanish: les
  alternatives_spanish:
  - a ellos
  - los
  lexicon: HALOT
  rationale: 'El objeto directo/indirecto pronominal se adapta al español como complemento dativo de destinatario en el contexto de enseñanza: «les enseñaba».'
- source_word: אֵיךְ יִירְאוּ
  english_pob_choice: how they should fear
  chosen_spanish: cómo debían temer
  alternatives_spanish:
  - cómo temer
  - cómo habían de temer
  lexicon: HALOT
  rationale: La frase transmite instrucción normativa sobre la manera correcta de temer. «Debían» preserva el matiz prescriptivo mejor que un infinitivo desnudo.
- source_word: אֶת יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: a Yahvé
  alternatives_spanish:
  - a Yahvé
  - al SEÑOR
  lexicon: HALOT
  rationale: El texto hebreo nombra directamente a YHWH. Conforme al criterio del proyecto, se conserva el nombre divino como «Yahvé» en la traducción principal.
theological_decisions:
- issue: Renderización del Tetragrámaton יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: El versículo usa el nombre divino explícitamente. En español, «Yahvé» preserva el nombre covenantal sin sustituirlo por un título genérico, en línea con la política del proyecto.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
translation_notes:
  revision_awareness: 'El contexto auditado en inglés opta por una traducción dinámica/óptima, pero el ajuste español prioriza la naturalidad sintáctica sin perder las decisiones léxicas documentadas: exilio/deportación, residencia en Betel, enseñanza normativa y el nombre divino explícito. No se detectaron revisiones textuales adicionales en el pasaje fuente.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» para יְהוָה según la norma del proyecto.
  - «Betel» se conserva como topónimo transliterado estándar.
  - «Exiliado» y «había exiliado» reflejan el campo semántico de גלה sin suavizarlo a simple traslado.
  - «Les enseñaba» conserva el valor aspectual del participio con היה en contexto narrativo.
  - La puntuación sigue el orden narrativo del hebreo con fluidez idiomática en español.
