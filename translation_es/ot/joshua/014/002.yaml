translation:
  language: es
  text: Su herencia fue por sorteo, como Yahvé había mandado por medio de Moisés[a], para las nueve tribus y la media tribu.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'por la mano de Moisés', un hebraísmo que indica mediación o agencia.
    reason: lexical_alternative
lexical_decisions:
- source_word: בְּגוֹרָל
  english_pob_choice: by lot
  chosen_spanish: por sorteo
  alternatives_spanish:
  - por lotes
  - mediante sorteo
  lexicon: HALOT
  rationale: El hebreo con בְּ + גוֹרָל expresa medio o manera en un reparto por suertes. 'Por sorteo' comunica con naturalidad el procedimiento en español y evita una construcción demasiado literal que sonaría pesada.
- source_word: נַחֲלָתָם
  english_pob_choice: their inheritance
  chosen_spanish: la herencia de ellos
  alternatives_spanish:
  - su herencia
  - su posesión asignada
  lexicon: HALOT
  rationale: נַחֲלָה puede denotar herencia o posesión asignada; aquí se trata del reparto de la tierra. 'La herencia de ellos' conserva el sentido posesivo del sufijo y mantiene la referencia al reparto por asignación.
- source_word: כַּאֲשֶׁר
  english_pob_choice: as
  chosen_spanish: como
  alternatives_spanish:
  - tal como
  - así como
  lexicon: HALOT
  rationale: '''Como'' reproduce la relación comparativa con el mandato previo de manera clara y fiel.'
- source_word: צִוָּה
  english_pob_choice: had commanded
  chosen_spanish: había mandado
  alternatives_spanish:
  - había ordenado
  - mandó
  lexicon: HALOT
  rationale: El perfecto hebreo remite a una orden ya dada. 'Había mandado' refleja bien la anterioridad relativa y conserva el tono de mandato.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahveh
  - el SEÑOR
  lexicon: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
  rationale: Se mantiene el nombre propio divino como 'Yahvé', equivalente español directo del tratamiento del texto fuente, en vez de sustituirlo por un título.
- source_word: בְּיַד מֹשֶׁה
  english_pob_choice: through Moses
  chosen_spanish: por medio de Moisés
  alternatives_spanish:
  - por la mano de Moisés
  - mediante Moisés
  lexicon: HALOT
  rationale: La expresión hebrea 'por la mano de' indica mediación o agencia. 'Por medio de Moisés' transmite esa mediación de forma natural en español, sin perder el matiz idiomático.
- source_word: לְתִשְׁעַת הַמַּטּוֹת
  english_pob_choice: for the nine tribes
  chosen_spanish: para las nueve tribus
  alternatives_spanish:
  - a las nueve tribus
  - para los nueve clanes
  lexicon: HALOT
  rationale: El ל marca aquí destinatario o beneficiario. 'Para las nueve tribus' es la formulación más clara y directa en español.
- source_word: וַחֲצִי הַמַּטֶּה
  english_pob_choice: and the half-tribe
  chosen_spanish: y la media tribu
  alternatives_spanish:
  - y el medio tribu
  - y la media tribu de Manasés
  lexicon: HALOT
  rationale: מַטֶּה en este contexto significa 'tribu'. 'La media tribu' es la expresión estable y comprensible en español para la subdivisión tribal aludida.
theological_decisions:
- issue: Rendering of the divine name יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahveh
  - el SEÑOR
  rationale: El texto hebreo contiene el Tetragrámaton y el proyecto POB lo vierte con el nombre divino. En español, 'Yahvé' es la forma tradicional y más reconocible para mantener el nombre propio sin ocultarlo bajo un título.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
translation_notes:
  revision_awareness: 'El control de revisión indica que no hubo cambios necesarios en la línea inglesa más reciente; por ello, el español sigue de cerca la decisión estable de la POB: reparto por sorteo, mandato divino mediado por Moisés, y el nombre propio Yahvé.'
  spanish_consistency_notes:
  - Se evitó 'SEÑOR' para יְהוָה, siguiendo la política del proyecto de conservar el nombre divino.
  - '''Media tribu'' mantiene la fórmula bíblica idiomática para חֲצִי הַמַּטֶּה.'
  - '''Por medio de Moisés'' en la nota preserva la alternativa idiomática sin sobrecargar el texto principal.'
