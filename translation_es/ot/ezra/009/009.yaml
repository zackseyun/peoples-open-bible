translation:
  language: es
  text: Porque somos esclavos; pero en nuestra esclavitud nuestro Dios no nos ha abandonado, sino que extendió sobre nosotros su amor constante[a] ante los reyes de Persia, para darnos vida, para levantar la casa de nuestro Dios, para restaurar sus ruinas y para darnos un muro[b] en Judá y en Jerusalén.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'misericordia fiel', 'bondad leal' o 'favor'. El hebreo חֶסֶד puede expresar amor constante, lealtad de pacto y misericordia activa.
    reason: lexical_alternative
  - marker: b
    text: O 'una cerca protectora' o 'un cerco'. La imagen puede referirse más ampliamente a seguridad y protección en Judá y Jerusalén, no solo a un muro literal.
    reason: lexical_alternative
lexical_decisions:
- source_word: עֲבָדִים
  english_pob_choice: slaves
  chosen_spanish: esclavos
  alternatives_spanish:
  - siervos
  - siervos en esclavitud
  lexicon: HALOT
  rationale: El hebreo expresa una condición de subordinación o servidumbre real. Como la POB inglesa eligió 'slaves' para conservar la fuerza léxica, 'esclavos' preserva esa dureza en español mejor que 'siervos'.
- source_word: וּבְעַבְדֻתֵנוּ
  english_pob_choice: in our slavery
  chosen_spanish: en nuestra esclavitud
  alternatives_spanish:
  - en nuestra servidumbre
  - en nuestra cautividad
  lexicon: HALOT
  rationale: El sustantivo cognado mantiene la idea de estado de esclavitud. 'En nuestra esclavitud' conserva la conexión verbal con 'esclavos' y el contraste con la acción misericordiosa de Dios.
- source_word: עֲזָבָנוּ
  english_pob_choice: has not forsaken us
  chosen_spanish: no nos ha abandonado
  alternatives_spanish:
  - no nos ha dejado
  - no nos ha desamparado
  lexicon: HALOT
  rationale: El verbo significa dejar, abandonar o forsake. 'Abandonado' es natural en español y mantiene la fuerza relacional/covenantal del enunciado.
- source_word: חֶסֶד
  english_pob_choice: steadfast love
  chosen_spanish: favor leal
  alternatives_spanish:
  - amor constante
  - misericordia fiel
  - bondad leal
  lexicon: HALOT
  rationale: La POB inglesa pasó de 'covenant faithfulness' a 'steadfast love'. En español, 'favor leal' intenta mantener la amplitud de חֶסֶד sin imponer una sola equivalencia; conserva tanto la gracia como la lealtad del pacto, y evita una traducción demasiado estrecha.
- source_word: לִפְנֵי מַלְכֵי פָרַס
  english_pob_choice: before the kings of Persia
  chosen_spanish: ante los reyes de Persia
  alternatives_spanish:
  - en presencia de los reyes de Persia
  - delante de los reyes de Persia
  lexicon: HALOT
  rationale: '''Ante'' reproduce la relación espacial y de audiencia indicada por לִפְנֵי con un registro natural y digno en español.'
- source_word: מִחְיָה
  english_pob_choice: reviving
  chosen_spanish: para darnos vida
  alternatives_spanish:
  - para darnos revivificación
  - para preservarnos la vida
  - para renovar nuestra vida
  lexicon: HALOT
  rationale: En este contexto postexílico, el término apunta a vida preservada y reanimada. 'Darnos vida' comunica de forma clara ese don restaurador sin forzar una palabra técnica poco natural en español.
- source_word: לְרוֹמֵם
  english_pob_choice: to raise up
  chosen_spanish: para levantar
  alternatives_spanish:
  - para exaltar
  - para restaurar
  - para reconstruir
  lexicon: HALOT
  rationale: El infinitivo de רום literalmente es levantar/elevar. 'Levantar' conserva la imagen y funciona bien con 'la casa de nuestro Dios' en contexto de reconstrucción.
- source_word: בֵּית אֱלֹהֵינוּ
  english_pob_choice: the house of our God
  chosen_spanish: la casa de nuestro Dios
  alternatives_spanish:
  - el templo de nuestro Dios
  lexicon: HALOT
  rationale: Se mantiene la expresión literal 'casa de nuestro Dios', que preserva la formulación hebrea y sigue siendo comprensible como referencia al templo.
- source_word: וּלְהַעֲמִיד אֶת חָרְבֹתָיו
  english_pob_choice: to restore its ruins
  chosen_spanish: para restaurar sus ruinas
  alternatives_spanish:
  - para establecer sus ruinas
  - para reedificar sus ruinas
  lexicon: HALOT
  rationale: La POB inglesa optó por 'restore its ruins' para clarificar. En español, 'restaurar sus ruinas' conserva la idea de reponer en pie lo arruinado y respeta el referente del templo/casa.
- source_word: גָדֵר
  english_pob_choice: a wall
  chosen_spanish: un muro
  alternatives_spanish:
  - una muralla
  - una cerca
  - un cerco protector
  lexicon: HALOT
  rationale: El término puede significar muro, cerca o barrera. 'Muro' es suficientemente concreto y menos específico que 'muralla', permitiendo tanto una lectura literal como protectora.
- source_word: בִּיהוּדָה וּבִירוּשָׁלִָם
  english_pob_choice: in Judah and in Jerusalem
  chosen_spanish: en Judá y en Jerusalén
  alternatives_spanish:
  - en la tierra de Judá y en Jerusalén
  lexicon: HALOT
  rationale: Se conserva la localización directa del hebreo con el nombre geográfico estándar en español.
theological_decisions:
- issue: Renderización de חֶסֶד
  english_pob_reading: steadfast love
  chosen_spanish_reading: favor leal
  alternative_spanish_readings:
  - amor constante
  - misericordia fiel
  - bondad leal
  rationale: El texto subraya que la preservación y restauración del pueblo proceden de una acción gratuita y fiel de Dios. 'Favor leal' intenta mantener juntas la gracia y la fidelidad pactal sin reducir חֶסֶד a una sola cualidad. Se preserva así la tensión léxica observada en la POB inglesa entre 'steadfast love' y su trasfondo de 'covenant faithfulness'.
  doctrine_reference: Translation philosophy §§1, 5
- issue: Sentido de גָדֵר
  english_pob_reading: a wall
  chosen_spanish_reading: un muro
  alternative_spanish_readings:
  - una muralla
  - una cerca
  - un cerco protector
  rationale: La imagen puede apuntar a protección concreta y no solo a una obra de albañilería. 'Muro' mantiene la imagen visible sin cerrar el sentido a una fortificación estrictamente literal; conserva la tensión entre protección y reconstrucción.
  doctrine_reference: Translation philosophy §3
translation_notes:
  revision_awareness: La POB inglesa revisó 'covenant faithfulness' a 'steadfast love' y 'set up its ruins' a 'restore its ruins'. La redacción española sigue esa revisión en sentido, pero mantiene una formulación que suena natural en español y conserva las ambigüedades importantes del hebreo.
  spanish_consistency_notes:
  - Se mantuvo 'nuestro Dios' para אלֹהֵינוּ en toda la frase, siguiendo el paralelismo hebreo.
  - '''Esclavos'' y ''esclavitud'' se conservaron juntos para reflejar la repetición léxica del original.'
  - '''Ante los reyes de Persia'' reproduce el marco de audiencia/presencia sin añadir interpretación histórica.'
  - '''Restaurar sus ruinas'' usa un verbo general que puede incluir reconstrucción y reestablecimiento, coherente con el contexto del templo.'
  - Se evitó 'SEÑOR' para יהוה porque este verso no contiene el Tetragrámaton; el término 'Dios' corresponde a אֱלֹהים.
