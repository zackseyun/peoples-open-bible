translation:
  language: es
  text: Sin embargo[a], los lugares altos no fueron quitados[b]; el pueblo todavía sacrificaba y quemaba incienso en los lugares altos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'los santuarios'. El término hebreo se refiere a lugares locales de culto, a menudo en terreno elevado.
    reason: lexical_alternative
  - marker: b
    text: O 'en los lugares altos'.
    reason: lexical_alternative
lexical_decisions:
- source_word: רַק
  english_pob_choice: However
  chosen_spanish: Sin embargo
  alternatives_spanish:
  - No obstante
  - Pero
  - Con todo
  lexicon: HALOT
  rationale: Introduce la concesión o contraste respecto de la evaluación previa del rey. 'Sin embargo' expresa bien el valor adversativo en español moderno sin endurecerlo con un giro arcaico.
- source_word: הַבָּמוֹת
  english_pob_choice: the high places
  chosen_spanish: los lugares altos
  alternatives_spanish:
  - los altos lugares
  - las colinas sagradas
  - los santuarios
  lexicon: HALOT
  rationale: '''Lugares altos'' conserva la expresión bíblica tradicional y mantiene la referencia a sitios de culto local. En español suena más natural que calcar ''las alturas'' y evita una interpretación demasiado cerrada como ''santuarios''.'
- source_word: לֹא סָרוּ
  english_pob_choice: were not removed
  chosen_spanish: no fueron quitados
  alternatives_spanish:
  - no fueron removidos
  - no desaparecieron
  - no fueron abolidos
  lexicon: HALOT
  rationale: El sujeto son los 'lugares altos'; en español la pasiva 'no fueron quitados' refleja el valor idiomático de la forma hebrea en este contexto de reforma real. 'Abolidos' explicaría demasiado la idea.
- source_word: עוֹד
  english_pob_choice: still
  chosen_spanish: todavía
  alternatives_spanish:
  - aún
  - seguían
  - todavía en ese tiempo
  lexicon: HALOT
  rationale: Marca continuidad de la práctica pese a la reforma. 'Todavía' es claro y natural, y conserva la fuerza aspectual del hebreo sin añadir matiz temporal excesivo.
- source_word: הָעָם
  english_pob_choice: the people
  chosen_spanish: el pueblo
  alternatives_spanish:
  - la gente
  - la población
  lexicon: HALOT
  rationale: '''El pueblo'' reproduce el colectivo hebreo en un registro bíblico sobrio y ampliamente inteligible en español.'
- source_word: מְזַבְּחִים
  english_pob_choice: were sacrificing
  chosen_spanish: sacrificaba
  alternatives_spanish:
  - estaba sacrificando
  - ofrecía sacrificios
  lexicon: HALOT
  rationale: El participio hebreo expresa acción continuada o habitual. En español, el imperfecto simple 'sacrificaba' comunica mejor la práctica continua que una perífrasis más pesada.
- source_word: וּמְקַטְּרִים
  english_pob_choice: and burning incense
  chosen_spanish: y quemaba incienso
  alternatives_spanish:
  - y ofrecía incienso
  - y hacía humear incienso
  - y quemaba ofrendas aromáticas
  lexicon: HALOT
  rationale: En contexto cultual, קטר puede referirse a quemar incienso. 'Quemaba incienso' es la forma española más natural y precisa para conservar la imagen ritual sin sobreexplicar.
- source_word: בַּבָּמוֹת
  english_pob_choice: on the high places
  chosen_spanish: en los lugares altos
  alternatives_spanish:
  - sobre los lugares altos
  - en las alturas
  - junto a los lugares altos
  lexicon: HALOT
  rationale: La preposición hebrea es locativa. 'En los lugares altos' suena idiomático en español y mantiene el mismo referente cultual que 'high places' en la POB inglesa.
theological_decisions:
- issue: Cómo traducir el término cultual 'high places' sin interpretar de más
  english_pob_reading: Retain the historically descriptive term 'high places' without interpretive expansion in the main text.
  chosen_spanish_reading: Retener la expresión tradicional 'lugares altos' en el texto principal, sin sustituirla por una glosa interpretativa.
  alternative_spanish_readings:
  - santuarios locales
  - lugares de culto no autorizados
  - lugares elevados
  rationale: El versículo describe hechos y no añade aquí una evaluación explícita; la valoración negativa pertenece al marco deuteronomista más amplio. Por eso conviene preservar el término tradicional y dejar la interpretación para notas o contexto.
  doctrine_reference: Principio de primacía del texto original y de no importar explicaciones doctrinales al cuerpo principal de la traducción.
translation_notes:
  revision_awareness: La redacción sigue la revisión inglesa más reciente, que prefirió verbos finitos paralelos y una sintaxis más fluida ('still sacrificed and burned incense'). En español se mantuvo ese paralelismo con imperfectos simples ('sacrificaba y quemaba incienso') y se conservó la opción lexical 'lugares altos' del audit trail.
  spanish_consistency_notes:
  - Se mantiene Yahvé/Jesús/Dios/espíritu/esclavo/justicia/gracia según los defaults del proyecto, aunque este versículo no los contiene.
  - '''Lugares altos'' se usa como término técnico bíblico consistente con la traducción inglesa auditada.'
  - Se evitó 'SEÑOR' y cualquier glosa interpretativa en el texto principal.
  - La pasiva 'no fueron quitados' respeta el sujeto inanimado del hebreo y su lectura contextual en el registro histórico.
