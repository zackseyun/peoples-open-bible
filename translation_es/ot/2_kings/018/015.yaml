translation:
  language: es
  text: Así Ezequías entregó toda la plata[a] que se halló en la casa de Yahvé[b] y en las tesorerías de la casa del rey[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «el dinero»; hebreo «la plata».
    reason: lexical_alternative
  - marker: b
    text: O «el templo de Yahvé»; literalmente «la casa de Yahvé».
    reason: lexical_alternative
  - marker: c
    text: O «el palacio real»; literalmente «la casa del rey».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּתֵּן
  english_pob_choice: gave
  chosen_spanish: entregó
  alternatives_spanish:
  - dio
  - hizo entrega de
  lexicon: HALOT
  rationale: En este contexto de tributo, «entregar» conserva la idea de ceder o poner a disposición sin volver la frase demasiado administrativa. «Dar» sería más literal, pero en español puede sonar más genérico; «entregó» mantiene naturalidad y fuerza contextual.
- source_word: חִזְקִיָּה
  english_pob_choice: Hezekiah
  chosen_spanish: Ezequías
  alternatives_spanish:
  - Hezekías
  lexicon: Onomástica bíblica tradicional
  rationale: El nombre propio se adapta a la forma española bíblica establecida y ampliamente reconocible. «Ezequías» es la forma más asentada en español culto y eclesiástico.
- source_word: כָּל
  english_pob_choice: all
  chosen_spanish: toda
  alternatives_spanish:
  - todo el
  - la totalidad de
  lexicon: HALOT
  rationale: El hebreo expresa totalidad. «Toda» concuerda con «la plata» y conserva la amplitud del cuantificador sin recargar la frase.
- source_word: הַכֶּסֶף
  english_pob_choice: the silver
  chosen_spanish: la plata
  alternatives_spanish:
  - el dinero
  lexicon: HALOT
  rationale: Se conserva el sustantivo concreto «plata», como en el hebreo, en lugar de generalizarlo a «dinero». En este contexto de tesoros y tributo, la referencia material es la más fiel.
- source_word: הַנִּמְצָא
  english_pob_choice: that was found
  chosen_spanish: que se halló
  alternatives_spanish:
  - que fue encontrada
  - que estaba hallada
  lexicon: HALOT
  rationale: El participio nifal de מצא se traduce de forma directa con «se halló», preservando el sentido pasivo/resultativo. «Se encontró» también sería posible, pero «se halló» mantiene un tono más bíblico y digno.
- source_word: בֵית יְהוָה
  english_pob_choice: the house of Yahweh
  chosen_spanish: la casa de Yahvé
  alternatives_spanish:
  - el templo de Yahvé
  - la casa de Yahveh
  lexicon: HALOT
  rationale: Se conserva la expresión literal «casa de Yahvé», alineada con la política del proyecto para el nombre divino. «Templo» sería un glosado contextual, pero el hebreo dice literalmente «casa».
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahveh
  lexicon: DOCTRINE.md — contested terms
  rationale: Se adopta «Yahvé» como forma española del nombre divino, conforme a la política del proyecto. Mantiene el nombre propio del pacto en lugar de sustituirlo por un título.
- source_word: וּבְאֹצְרוֹת
  english_pob_choice: and in the treasuries
  chosen_spanish: y en los tesoros
  alternatives_spanish:
  - y en los almacenes
  - y en las cámaras del tesoro
  lexicon: HALOT
  rationale: «Tesoros» comunica bien la función de אֹצָר en un contexto monetario y real, y en español resulta más natural que «tesorerías». Aunque «treasuries» en inglés destaca la función institucional, «tesoros» preserva la referencia a bienes guardados.
- source_word: בֵּית הַמֶּלֶךְ
  english_pob_choice: the king's house
  chosen_spanish: la casa del rey
  alternatives_spanish:
  - el palacio real
  - la casa real
  lexicon: HALOT
  rationale: Se mantiene la estructura literal «casa del rey», que corresponde al hebreo y equilibra la repetición con «casa de Yahvé». «Palacio real» sería una interpretación contextual posible, pero menos cercana a la forma original.
theological_decisions:
- issue: Nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahveh
  rationale: El texto hebreo usa el Tetragramatón directamente. En español se preserva el nombre propio divino con la forma tradicional del proyecto, evitando la sustitución por un título como «el SEÑOR».
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
translation_notes:
  revision_awareness: La revisión más reciente indicó que no se requerían cambios y el cotejo final mostró alta concordancia. Esta versión sigue la evidencia hebrea y conserva las decisiones auditadas del POB en español, adaptando solo la formulación para naturalidad idiomática sin alterar el contenido.
  spanish_consistency_notes:
  - Se usó «Yahvé» de manera consistente para יְהוָה, conforme a la terminología del proyecto.
  - 'Se preservó la imagen hebrea de «casa» en ambos sintagmas paralelos: «casa de Yahvé» y «casa del rey».'
  - Se mantuvo «plata» en lugar de generalizar a «dinero», para respetar el sustantivo concreto del hebreo.
  - El verbo «entregó» busca reflejar el valor contextual de dar/ceder en una situación de tributo, sin añadir información que no está en el texto.
