    issue: «habla a ellos» es poco natural en español bíblico contemporáneo
    rationale: Aunque transparenta la estructura hebrea, en español neutral y eclesial suena forzado. «Háblales» transmite el mismo contenido con mejor legibilidad y sin paráfrasis.
  - severity: medium
    issue: «todo lo que yo te mande» debilita el valor directivo actual del hebreo
    rationale: El imperfecto hebreo en este contexto se vierte mejor como presente comisionador («yo te mando»), como ya documenta el POB inglés. «Te mande» puede sugerir una orden futura o eventual.
  - severity: low
    issue: Las notas b y c no son necesarias
    rationale: No preservan una alternativa textual indispensable ni resuelven una ambigüedad nueva en español. El texto mismo ya mantiene el juego verbal.
