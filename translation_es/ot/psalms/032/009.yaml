  glossary_alignment: No hay términos teológicos de glosario principal en este versículo. Las decisiones léxicas relevantes piden ajustar עֶדְיוֹ a 'arreos' y בְּמֶתֶג וָרֶסֶן a 'freno y brida' para mejor alineación con la evidencia fuente y con un español eclesial claro.
