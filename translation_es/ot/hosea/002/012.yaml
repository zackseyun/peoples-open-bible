translation:
  language: es
  text: Y ahora descubriré su desnudez[a] delante de los ojos de sus amantes, y nadie la librará de mi mano.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, «exponer su vergüenza». El término hebreo puede denotar la deshonra asociada con la desnudez expuesta.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְעַתָּה
  english_pob_choice: And now
  chosen_spanish: Y ahora
  alternatives_spanish:
  - Ahora
  lexicon: HALOT
  rationale: Conserva la transición discursiva y el valor temporal inmediato del hebreo, con la coordinación explícita que el español natural exige al inicio de la oración.
- source_word: אֲגַלֶּה
  english_pob_choice: I will uncover
  chosen_spanish: descubriré
  alternatives_spanish:
  - revelaré
  - expondré
  lexicon: HALOT
  rationale: El verbo en contexto se relaciona con exposición vergonzosa, no solo con revelar información. «Descubriré» mantiene la imagen concreta de dejar al desnudo/expuesto.
- source_word: נַבְלֻתָהּ
  english_pob_choice: her nakedness
  chosen_spanish: su desnudez
  alternatives_spanish:
  - su vergüenza
  - sus partes íntimas
  lexicon: HALOT
  rationale: «Desnudez» preserva la metáfora corporal y la carga de deshonra asociada al hebreo. «Vergüenza» abstrae demasiado; «partes íntimas» estrecha indebidamente el sentido.
- source_word: לְעֵינֵי
  english_pob_choice: before the eyes of
  chosen_spanish: delante de los ojos de
  alternatives_spanish:
  - en presencia de
  - ante
  lexicon: HALOT
  rationale: Mantiene el modismo hebreo de exposición pública con imaginería visual directa, sin perder naturalidad en español.
- source_word: מְאַהֲבֶיהָ
  english_pob_choice: her lovers
  chosen_spanish: sus amantes
  alternatives_spanish:
  - los que la aman
  lexicon: HALOT
  rationale: En Oseas la metáfora matrimonial apunta a relaciones infieles; «amantes» conserva ese tono y evita suavizar el trasfondo de adulterio simbólico.
- source_word: וְאִישׁ
  english_pob_choice: no one
  chosen_spanish: nadie
  alternatives_spanish:
  - ningún hombre
  - ninguno
  lexicon: HALOT
  rationale: El hebreo usa אִישׁ con valor indefinido; en español, «nadie» transmite con naturalidad la imposibilidad universal del rescate. Se mantiene el sentido, aunque no la forma masculina explícita del hebreo.
- source_word: יַצִּילֶנָּה
  english_pob_choice: will rescue her
  chosen_spanish: la librará
  alternatives_spanish:
  - la rescatará
  - la salvará
  lexicon: HALOT
  rationale: El hiphil de נצל expresa librar/rescatar de poder o peligro. «Librará» funciona bien en español bíblico moderno y conserva la idea de liberación efectiva.
- source_word: מִיָּדִי
  english_pob_choice: from my hand
  chosen_spanish: de mi mano
  alternatives_spanish:
  - de mi poder
  - de mis manos
  lexicon: HALOT
  rationale: La expresión idiomática hebrea se conserva literalmente para mantener la imagen de poder/control divino. En español, «de mi mano» es claro y auditable.
theological_decisions:
- issue: Lenguaje de desnudez y vergüenza en el juicio profético
  english_pob_reading: Retain the concrete imagery of 'uncover her nakedness' in the main text.
  chosen_spanish_reading: Mantener en el texto principal la imagen concreta de «descubrir su desnudez».
  alternative_spanish_readings:
  - «exponer su vergüenza»
  rationale: Oseas emplea deliberadamente una imagen sexual y de deshonra para expresar el juicio por infidelidad del pacto. La redacción española conserva esa tensión en vez de atenuarla con una abstracción.
  doctrine_reference: Translation philosophy §§1, 3, 6
- issue: Valor genérico de וְאִישׁ en la cláusula negativa
  english_pob_reading: Translate as 'no one' rather than gender-neutral 'no one' in the main text.
  chosen_spanish_reading: Traducir con «nadie», que expresa el indefinido con naturalidad idiomática.
  alternative_spanish_readings:
  - «ningún hombre»
  rationale: Aunque el hebreo dice literalmente «y un hombre», el español bíblico moderno suele requerir un indefinido natural. «Nadie» comunica la universalidad del fracaso del rescate sin oscurecer el sentido.
  doctrine_reference: Translation philosophy §4
translation_notes:
  revision_awareness: El audit trail inglés pasó de «no man» a «no one» para mayor naturalidad, manteniendo el valor indefinido de אִישׁ. En español, ese ajuste se refleja con «nadie», que comunica el mismo sentido sin forzar una fórmula masculina que sonaría menos natural en este contexto.
  spanish_consistency_notes:
  - Se mantiene el campo semántico de juicio/vergüenza con «descubrir su desnudez», evitando una paráfrasis moralizante.
  - «Amantes» conserva la metáfora de infidelidad conyugal del libro de Oseas.
  - «De mi mano» preserva la imagen idiomática del poder divino; no se sustituye por una abstracción como «de mi poder» en el texto principal.
