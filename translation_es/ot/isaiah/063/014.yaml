base_translation:
  language: en
  yaml_path: translation/ot/isaiah/063/014.yaml
  text: Like livestock that go down into the valley[a], the Spirit of Yahweh gave them rest; so you led your people[c][b], to make for yourself a glorious name.
  footnotes:
  - marker: a
    text: Or 'the wind of the LORD gave him rest.' Hebrew רוּחַ can mean 'spirit,' 'wind,' or 'breath,' though 'Spirit' best fits the context here.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'gave him rest'; the singular likely refers to Israel as a people considered collectively. Some translations render 'gave them rest.'
    reason: alternative_reading
  - marker: c
    text: Or 'a name of glory.'
    reason: lexical_alternative
