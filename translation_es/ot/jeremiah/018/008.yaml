revisions:
- from: Y si aquella nación se vuelve de su mal[a], contra la cual hablé[b], entonces yo me arrepentiré[c] del mal[d] que pensé hacerle.
  to: Y si aquella nación se vuelve[a] de su mal[b], contra la cual hablé, entonces yo desistiré[c] del desastre[d] que pensaba hacerle.
  rationale: 'La revisión mantiene la estructura y el tono del borrador, pero corrige dos puntos decisivos de fidelidad: «desistiré» refleja mejor וְנִחַמְתִּי en español sin implicar culpa moral en Dios, y «desastre» traduce correctamente הָרָעָה en su sentido de calamidad punitiva. Se preserva la relación léxica entre ambos usos de רָעָה mediante nota, en línea con el audit trail inglés. También se normalizan las notas para que sean claras y naturales en español.'
