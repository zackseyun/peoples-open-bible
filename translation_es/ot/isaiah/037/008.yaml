revisions:
- from: Entonces el Rabsaqué[a] regresó y encontró al rey de Asiria peleando contra Libna[b], porque había oído que se había retirado de Laquis.
  to: Entonces el Rabsaqué[a] regresó y encontró al rey de Asiria combatiendo contra Libna[b], porque había oído que Senaquerib se había retirado de Laquis.
  rationale: Se ajusta el participio a «combatiendo contra» por mejor registro en español y se explicita «Senaquerib» para evitar una ambigüedad pronominal que en español podría atribuir erróneamente la retirada al rey de Asiria mencionado en la misma cláusula. La aclaración preserva el sentido contextual documentado por la auditoría inglesa sin alterar el contenido narrativo.
