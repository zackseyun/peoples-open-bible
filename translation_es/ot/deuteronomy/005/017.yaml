translation:
  language: es
  text: No asesinarás[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, más tradicionalmente, «No matarás». El verbo hebreo aquí se refiere más específicamente al asesinato o al homicidio ilícito.
