translation:
  language: es
  text: Y el rey Darío hizo un gran banquete[a] para todos los que estaban bajo su autoridad[b], y para toda su casa, y para todos los nobles de Media y Persia.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'fiesta'. El término griego denota una comida formal de entretenimiento o banquete.
    reason: lexical_alternative
  - marker: b
    text: Literalmente, 'todos los que estaban bajo él'.
    reason: lexical_alternative
lexical_decisions:
- source_word: βασιλεὺς Δαρεῖος
  english_pob_choice: King Dareios
  chosen_spanish: el rey Darío
  alternatives_spanish:
  - el rey Dareios
  lexicon: LSJ
  rationale: En español bíblico y de uso general, 'Darío' es la forma transparente y plenamente reconocible del nombre; mantiene la identificación histórica sin perder naturalidad. Aunque el inglés POB translitera 'Dareios', en español la forma tradicional y comprensible es 'Darío'.
- source_word: ἐποίησεν δοχὴν μεγάλην
  english_pob_choice: made a great banquet
  chosen_spanish: hizo un gran banquete
  alternatives_spanish:
  - preparó un gran banquete
  - hizo una gran fiesta
  lexicon: LSJ
  rationale: δοχήν designa un convite o banquete formal. 'Banquete' conserva mejor el matiz de comida solemne y regia que 'fiesta'; 'hizo' sigue de cerca ἐποίησεν sin forzar una reformulación.
- source_word: τοῖς ὑπʼ αὐτόν
  english_pob_choice: who were under him
  chosen_spanish: los que estaban bajo su autoridad
  alternatives_spanish:
  - sus súbditos
  - los que estaban sometidos a él
  lexicon: LSJ
  rationale: La frase griega es literalmente 'los que están bajo él'. En español, 'bajo su autoridad' preserva la relación jerárquica sin añadir una categoría política más estrecha que la del original. 'Sus súbditos' sería más interpretativo.
- source_word: οἰκογενέσιν
  english_pob_choice: household
  chosen_spanish: su casa
  alternatives_spanish:
  - su hogar
  - los de su casa
  - su familia
  lexicon: LSJ
  rationale: En contexto real, οἰκογενέσιν se refiere a los miembros de la casa del rey, no solo a parientes. 'Su casa' es natural en español y puede abarcar familia y personal doméstico/administrativo, como en el contexto cortesano.
- source_word: μεγιστᾶσιν
  english_pob_choice: nobles
  chosen_spanish: los nobles
  alternatives_spanish:
  - los magnates
  - los grandes
  lexicon: LSJ
  rationale: '''Nobles'' comunica el rango elevado de μεγιστᾶσιν de manera idiomática y clara. ''Magnates'' sería más técnico y menos natural; ''los grandes'' sería posible pero más ambiguo en español.'
- source_word: Μηδείας καὶ τῆς Περσίδος
  english_pob_choice: Media and Persia
  chosen_spanish: Media y Persia
  alternatives_spanish:
  - los medos y los persas
  lexicon: LSJ
  rationale: El griego nombra regiones o ámbitos geopolíticos; por eso se conserva 'Media y Persia' en vez de convertirlo a etnónimos. Esto sigue la evidencia del texto sin sobreinterpretar.
translation_notes:
  revision_awareness: 'La versión española sigue el texto griego de Swete de manera directa y coincide con la lectura auditada en inglés, manteniendo las mismas decisiones léxicas básicas: δοχήν como ''banquete'', τοῖς ὑπʼ αὐτόν como relación de subordinación, οἰκογενέσιν como la casa del rey, y μεγιστᾶσιν como ''nobles''. No se registran revisiones sustantivas en el pasaje de referencia.'
  spanish_consistency_notes:
  - Se mantiene el registro narrativo y regio del pasaje.
  - '''Darío'' se usa por transparencia y uso bíblico común en español, sin alterar el referente del griego Δαρεῖος.'
  - No se introducen notas teológicas porque el versículo es descriptivo y no doctrinal.
  - La nota de pie de página se ancla solo en 'banquete' porque esa es la principal alternativa léxica documentada.
