translation:
  language: es
  text: Pero tú eres arrojado de tu sepulcro, como una rama despreciada[a], vestido con los caídos, los traspasados por la espada[b], los que descienden a las piedras de la fosa[c], como un cadáver pisoteado.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O “un vástago aborrecido”. El hebreo puede significar “rama”, “brote” o “retoño”; aquí describe algo rechazado y arrojado como desecho.
    reason: lexical_alternative
  - marker: b
    text: O “los atravesados por la espada”. La expresión hebrea es difícil; el sentido apunta a los caídos en batalla.
    reason: lexical_alternative
  - marker: c
    text: “La fosa” es un término poético para la tumba o el reino de los muertos; “las piedras de la fosa” probablemente evoca un lugar de sepultura revestido de piedra.
    reason: cultural_note
lexical_decisions:
- source_word: הָשְׁלַכְתָּ
  english_pob_choice: are cast out
  chosen_spanish: eres arrojado
  alternatives_spanish:
  - has sido arrojado
  - eres echado
  lexicon: HALOT
  rationale: El Hophal perfecto expresa pasividad con resultado vigente; en español, el presente pasivo dinámico 'eres arrojado' conserva la fuerza de reproche y la vividez del oráculo.
- source_word: מִקִּבְרְךָ
  english_pob_choice: from your grave
  chosen_spanish: de tu sepulcro
  alternatives_spanish:
  - de tu tumba
  - de tu grave
  lexicon: HALOT
  rationale: קבר designa el lugar de enterramiento. 'Sepulcro' mantiene el tono poético y solemne, y en español es más natural que una traducción demasiado literal o técnica.
- source_word: כְּנֵצֶר
  english_pob_choice: branch
  chosen_spanish: rama
  alternatives_spanish:
  - retoño
  - vástago
  - brote
  lexicon: HALOT
  rationale: En este contexto de desprecio y desecho, 'rama' comunica bien la imagen vegetal sin introducir por sí sola una resonancia mesiánica ajena al pasaje.
- source_word: נִתְעָב
  english_pob_choice: despised
  chosen_spanish: despreciada
  alternatives_spanish:
  - aborrecida
  - detestada
  lexicon: HALOT
  rationale: El participio nifal expresa algo tenido por repulsivo o rechazado; 'despreciada' es claro y conserva el juicio degradante del texto.
- source_word: לְבוּשׁ
  english_pob_choice: clothed with
  chosen_spanish: vestido con
  alternatives_spanish:
  - cubierto con
  - ataviado con
  lexicon: HALOT
  rationale: La expresión funciona predicativamente con lo que sigue. 'Vestido con' preserva la imagen sin volverla forzada en español.
- source_word: הֲרֻגִים
  english_pob_choice: the slain
  chosen_spanish: los muertos
  alternatives_spanish:
  - los caídos
  - los muertos en batalla
  lexicon: HALOT
  rationale: Aunque el término implica muerte violenta, en español 'los muertos' se integra mejor con la frase siguiente y mantiene la referencia a cadáveres; la nota conserva la especificidad bélica del hebreo.
- source_word: מְטֹעֲנֵי חָרֶב
  english_pob_choice: those pierced by the sword
  chosen_spanish: los heridos de espada
  alternatives_spanish:
  - los atravesados por la espada
  - los traspasados por la espada
  lexicon: HALOT
  rationale: La construcción es difícil. 'Heridos de espada' comunica el resultado letal sin resolver de manera demasiado tajante una dificultad léxica que el POB inglés también preserva con cautela.
- source_word: יוֹרְדֵי אֶל אַבְנֵי בֹור
  english_pob_choice: who go down to the stones of the pit
  chosen_spanish: los que descienden a las piedras del pozo
  alternatives_spanish:
  - los que bajan a las piedras del sepulcro
  - los que descienden a las piedras de la fosa
  lexicon: HALOT
  rationale: Se conserva la imagen concreta de 'piedras del pozo' porque probablemente alude a una tumba o fosa revestida de piedra; 'descienden' respeta el participio continuo.
- source_word: בּוֹר
  english_pob_choice: the pit
  chosen_spanish: pozo
  alternatives_spanish:
  - fosa
  - sepulcro
  lexicon: HALOT
  rationale: El sustantivo puede denotar pozo/fosa y, en poesía funeraria, el ámbito de la muerte. 'Pozo' mantiene la concreción del hebreo y permite la nota explicativa sobre su valor funerario.
- source_word: כְּפֶגֶר
  english_pob_choice: like a corpse
  chosen_spanish: como un cadáver
  alternatives_spanish:
  - como un cuerpo muerto
  - como una carroña
  lexicon: HALOT
  rationale: פגר designa un cuerpo muerto; 'cadáver' es la equivalencia más natural y digna en español en este contexto de burla real.
- source_word: מוּבָס
  english_pob_choice: trampled
  chosen_spanish: pisoteado
  alternatives_spanish:
  - aplastado
  - hollado
  lexicon: HALOT
  rationale: El participio pasivo expresa haber sido hollado o pisoteado. 'Pisoteado' reproduce con claridad la imagen de desprecio y humillación.
theological_decisions:
- issue: Posible resonancia mesiánica de נֵצֶר
  english_pob_reading: branch
  chosen_spanish_reading: rama
  alternative_spanish_readings:
  - retoño
  - vástago
  rationale: En Isaías 14:19 el contexto es una sátira contra un rey humillado, no una promesa mesiánica. 'Rama' evita importar la asociación de Isaías 11:1 y sigue la decisión del POB inglés de no activar esa lectura aquí.
  doctrine_reference: Isaías 11:1; principio de contexto inmediato
- issue: Sentido funerario de בּוֹר y אַבְנֵי בּוֹר
  english_pob_reading: the pit / stones of the pit
  chosen_spanish_reading: pozo / piedras del pozo
  alternative_spanish_readings:
  - fosa / piedras de la fosa
  - sepulcro / piedras del sepulcro
  rationale: Se conserva la imagen corporal y concreta del hebreo sin reducirla a un término abstracto. La nota explica que puede evocar una tumba o recinto funerario revestido de piedra.
  doctrine_reference: Poética hebrea; imaginería funeraria del Antiguo Testamento
- issue: La expresión קשה מְטֹעֲנֵי חָרֶב
  english_pob_reading: those pierced by the sword
  chosen_spanish_reading: los heridos de espada
  alternative_spanish_readings:
  - los atravesados por la espada
  - los traspasados por la espada
  rationale: El hebreo es difícil y admite más de una solución. En vez de fijar una interpretación excesivamente específica, se ofrece una versión transparente en español que conserva la referencia a muerte violenta.
  doctrine_reference: Principio de cautela ante lecturas lexicográficamente disputadas
translation_notes:
  revision_awareness: 'La redacción sigue de cerca la decisión revisada del POB inglés de mantener ''from your grave'' sin añadir equivalentes como ''away'', y conserva el orden imagístico del hebreo: expulsión del sepulcro, imagen vegetal despreciada, vestidura con muertos, y descenso al pozo. También respeta la cautela inglesa ante נֵצֶר y la dificultad de מְטֹעֲנֵי חָרֶב.'
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' como terminología estándar del proyecto cuando corresponda; este versículo no lo contiene.
  - Se usa 'pozo' para בור por coherencia con la imaginería de muerte del texto, con aclaración en nota para evitar confusión con un pozo literal.
  - '''Cadáver'' se reserva para פגר por su fuerza humana y funeraria; ''muertos'' traduce הֲרֻגִים para distinguir el grupo colectivo de los caídos.'
  - '''Despreciada'' y ''pisoteado'' conservan el tono de humillación del oráculo sin suavizarlo.'
