translation:
  language: es
  text: Aférrate[a] a la instrucción; no la sueltes. Guárdala, porque ella es tu vida.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «disciplina» o «corrección» para «instrucción» (hebreo musar), destacando tanto la formación como el adiestramiento correctivo.
    reason: lexical_alternative
lexical_decisions:
- source_word: הַחֲזֵק
  english_pob_choice: Hold fast
  chosen_spanish: Aférrate
  alternatives_spanish:
  - Sujétate firmemente
  - Manténte firme
  - Retén con firmeza
  lexicon: HALOT
  rationale: El imperativo expresa tomar y mantener con fuerza; «Aférrate» conserva la imagen física de asirse con firmeza y suena natural en español exhortativo.
- source_word: בַּמּוּסָר
  english_pob_choice: to instruction
  chosen_spanish: a la instrucción
  alternatives_spanish:
  - a la disciplina
  - a la corrección
  lexicon: HALOT
  rationale: En Proverbios, מוּסָר incluye formación educativa con matiz correctivo. «Instrucción» comunica bien el núcleo sapiencial en español, sin perder que la palabra abarca más que mera enseñanza.
- source_word: אַל תֶּרֶף
  english_pob_choice: do not let go
  chosen_spanish: no la sueltes
  alternatives_spanish:
  - no la dejes ir
  - no te apartes de ella
  - no aflojes
  lexicon: HALOT
  rationale: El verbo transmite soltar o aflojar el agarre. «No la sueltes» mantiene el paralelismo con «aférrate» y reproduce la metáfora en español coloquial y claro.
- source_word: נִצְּרֶהָ
  english_pob_choice: Guard her
  chosen_spanish: Guárdala
  alternatives_spanish:
  - Vela por ella
  - Protégela
  - Custódiala
  lexicon: HALOT
  rationale: נצר significa guardar, custodiar, vigilar. «Guárdala» es breve y fiel; en español puede sugerir cuidado protector y preservación, acorde con el hebreo.
- source_word: כִּי הִיא
  english_pob_choice: for she
  chosen_spanish: porque ella
  alternatives_spanish:
  - pues ella
  - porque es ella
  lexicon: HALOT
  rationale: El pronombre femenino retoma a מוּסָר personificado en el hebreo. «Porque ella» conserva esa personificación, que el inglés POB también mantuvo con «she».
- source_word: חַיֶּיךָ
  english_pob_choice: your life
  chosen_spanish: tu vida
  alternatives_spanish:
  - tu vida misma
  - tu existencia
  - tu fuente de vida
  lexicon: HALOT
  rationale: Aunque la forma hebrea es plural morfológico, funciona idiomáticamente como «vida». «Tu vida» es la equivalencia más natural y fiel al uso sapiencial.
translation_notes:
  revision_awareness: El texto se mantuvo alineado con el sentido del hebreo masorético y con la decisión inglesa de conservar la metáfora de asirse/guardar, sin introducir reinterpretaciones doctrinales. La revisión más reciente del paquete indicó que no eran necesarios cambios.
  spanish_consistency_notes:
  - Se mantuvo «instrucción» como término principal para מוּסָר, con nota alternativa para el matiz disciplinario.
  - Se conservó la personificación femenina de «ella» para armonizar con el hebreo y con la solución inglesa.
  - «Tu vida» traduce el plural hebreo idiomático חַיֶּיךָ en singular natural español, sin perder la intensidad totalizante.
