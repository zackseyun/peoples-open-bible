translation:
  language: es
  text: Entonces los cinco reyes de los amorreos —el rey de Jerusalén, el rey de Hebrón, el rey de Jarmut, el rey de Laquis y el rey de Eglón— se reunieron y subieron, ellos y todos sus ejércitos[a]; y acamparon contra Gabaón y lucharon contra ella.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'ellos y todos sus campamentos'. El hebreo dice literalmente 'ellos y todos sus campamentos'.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֵּאָסְפוּ
  english_pob_choice: gathered together
  chosen_spanish: se reunieron
  alternatives_spanish:
  - se juntaron
  - se congregaron
  lexicon: HALOT
  rationale: El verbo refleja la idea de acercarse y formar un solo grupo. En español, 'se reunieron' comunica bien el sentido colectivo sin añadir una noción más formal de alianza que el hebreo no exige.
- source_word: וַיַּעֲלוּ
  english_pob_choice: went up
  chosen_spanish: subieron
  alternatives_spanish:
  - subieron y avanzaron
  - marcharon hacia arriba
  lexicon: HALOT
  rationale: עלה conserva el movimiento ascendente o direccional. 'Subieron' es la equivalencia más transparente y mantiene la ambigüedad del hebreo sobre si el valor es topográfico o idiomático.
- source_word: חֲמֵשֶׁת מַלְכֵי הָאֱמֹרִי
  english_pob_choice: the five kings of the Amorites
  chosen_spanish: los cinco reyes de los amorreos
  alternatives_spanish:
  - cinco reyes amorreos
  lexicon: HALOT
  rationale: Se conserva la relación de constructo y el etnónimo. 'Amorreos' es el plural natural en español para הָאֱמֹרִי en este contexto.
- source_word: מֶלֶךְ יְרוּשָׁלִַם ... מֶלֶךְ עֶגְלוֹן
  english_pob_choice: the king of Jerusalem, the king of Hebron, the king of Jarmuth, the king of Lachish, and the king of Eglon
  chosen_spanish: el rey de Jerusalén, el rey de Hebrón, el rey de Jarmut, el rey de Laquis y el rey de Eglón
  alternatives_spanish:
  - rey de Jerusalén ... rey de Eglón
  lexicon: HALOT
  rationale: Se mantiene la repetición de 'el rey de' porque el hebreo enumera a cada gobernante individualmente. Los topónimos se transliteran en formas españolas ampliamente inteligibles.
- source_word: הֵם וְכָל מַחֲנֵיהֶם
  english_pob_choice: they and all their armies
  chosen_spanish: ellos y todos sus ejércitos
  alternatives_spanish:
  - ellos y todos sus campamentos
  - ellos y todos sus fuerzas
  lexicon: HALOT
  rationale: Aunque la POB inglesa conservó inicialmente 'camps' y luego revisó a 'armies', aquí 'ejércitos' expresa el referente militar en español natural. Se evita 'campamentos' por sonar más locativo que bélico.
- source_word: וַיַּחֲנוּ עַל גִּבְעוֹן
  english_pob_choice: they encamped against Gibeon
  chosen_spanish: acamparon frente a Gabaón
  alternatives_spanish:
  - acamparon contra Gabaón
  - acamparon ante Gabaón
  lexicon: HALOT
  rationale: עַל con hostilidad puede expresarse en español con una relación de oposición. 'Frente a' comunica la posición militar adversaria sin forzar el matiz de ataque implícito de 'contra' en una frase donde el siguiente verbo ya expresa la agresión.
- source_word: וַיִּלָּחֲמוּ עָלֶיהָ
  english_pob_choice: fought against it
  chosen_spanish: lucharon contra ella
  alternatives_spanish:
  - pelearon contra ella
  - hicieron guerra contra ella
  lexicon: HALOT
  rationale: La forma verbal denota acción bélica directa. 'Lucharon contra ella' es idiomático en español y conserva la referencia pronominal femenina a la ciudad de Gabaón.
translation_notes:
  revision_awareness: Tomé en cuenta la revisión del inglés POB que sustituyó 'camps' por 'armies' para מַחֲנֵיהֶם, pero opté por una formulación española natural que preserve el sentido militar explícito sin reproducir una ambigüedad innecesaria. Mantengo además la estructura acumulativa del hebreo y el encadenamiento narrativo con acampar/luchar.
  spanish_consistency_notes:
  - Uso 'Yahvé' solo cuando el texto lo requiera; este versículo no contiene el nombre divino.
  - Conservo 'Gabaón' como forma española estándar para גִּבְעוֹן.
  - Mantengo la enumeración repetida de 'el rey de' por fidelidad al estilo hebreo y al audit trail.
  - Uso el femenino 'ella' para el pronombre final porque el antecedente es la ciudad de Gabaón, aunque en español común podría alternar con 'ella'/'la'.
