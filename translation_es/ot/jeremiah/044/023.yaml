    text: '''Ley'' también puede traducirse ''instrucción'' (heb. torá).'
    reason: lexical_alternative
  - marker: d
    text: O 'esta calamidad os ha sobrevenido'. El hebreo puede significar 'mal' o, en contextos como este, 'desastre/calamidad'.
    reason: lexical_alternative
  revision_rationale: Se corrige la incoherencia de persona gramatical cambiando 'les ha sobrevenido' por 'os ha sobrevenido', en línea con el resto del borrador y con el hebreo de segunda persona plural. También se ajusta כַּיּוֹם הַזֶּה a 'como sucede hoy' para reflejar mejor la constatación presente, y se normaliza la nota léxica con ortografía española correcta.
