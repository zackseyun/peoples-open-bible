  spanish_consistency_notes:
  - Se mantiene el patrón formular de la lista censal con una preposición inicial de designación.
  - Los nombres propios se transliteran de manera consistente en español.
  - No se añade artículo innecesario en la fórmula genealógica.
  - Se conserva la brevedad del hebreo sin expansiones interpretativas.
