translation:
  language: es
  text: El sabio, por sus palabras[a], se hará apreciar; pero los favores[b] de los necios se derramarán.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'También: «en su hablar» o «por su palabra». El griego ἐν λόγῳ puede expresar medio o esfera; aquí se vierte con sentido instrumental.'
    reason: lexical_alternative
  - marker: b
    text: O «las gracias» o «los encantos». El griego χάριτες puede referirse a actos de favor, gracia o atractivo; aquí se eligió «favores» como la opción contextual más clara.
    reason: lexical_alternative
lexical_decisions:
- source_word: ὁ σοφὸς
  english_pob_choice: wise man
  chosen_spanish: el sabio
  alternatives_spanish:
  - el hombre sabio
  - la persona sabia
  - los sabios
  lexicon: LSJ
  rationale: El griego articular sustantivado funciona como un tipo de persona. En español, «el sabio» conserva esa función sustantiva sin añadir género marcado donde el contexto sapiencial ya es representativo.
- source_word: ἐν λόγῳ
  english_pob_choice: by his words
  chosen_spanish: por su palabra
  alternatives_spanish:
  - por sus palabras
  - en su hablar
  - mediante sus palabras
  lexicon: LSJ
  rationale: La frase expresa medio o esfera. «Por su palabra» mantiene la idea instrumental y suena natural en español; el singular colectivo puede abarcar el habla eficaz del sabio, como en el inglés auditado.
- source_word: ἑαυτὸν προσφιλῆ ποιήσει
  english_pob_choice: will make himself beloved
  chosen_spanish: se hará agradable
  alternatives_spanish:
  - se hará querido
  - se volverá amado
  - se hará amado
  lexicon: LSJ
  rationale: προσφιλής puede significar ‘querido, agradable, amado’. «Se hará agradable» conserva el valor relacional sin forzar un giro demasiado abstracto; además evita una pasiva pesada en español.
- source_word: χάριτες
  english_pob_choice: favors
  chosen_spanish: las amabilidades
  alternatives_spanish:
  - los favores
  - las gracias
  - los encantos
  lexicon: LSJ
  rationale: 'El inglés POB eligió «favors» pero reconoció la ambigüedad semántica de χάριτες: actos de favor, amabilidad o encanto. «Amabilidades» conserva el plural concreto y la idea de gestos graciosos, sin imponer un sentido demasiado litúrgico de «gracias» ni uno meramente estético como «encantos».'
- source_word: μωρῶν
  english_pob_choice: of fools
  chosen_spanish: de los necios
  alternatives_spanish:
  - de los tontos
  - de los insensatos
  - de los fatuos
  lexicon: LSJ
  rationale: «Necios» es el equivalente sapiencial más natural y fiel al registro bíblico para μωρός en este contexto.
- source_word: ἐκχυθήσονται
  english_pob_choice: will be poured out
  chosen_spanish: se derramarán
  alternatives_spanish:
  - serán derramadas
  - se verterán
  - se esparcirán
  lexicon: LSJ
  rationale: El futuro pasivo de ἐκχέω conserva la metáfora de vertido. «Se derramarán» reproduce la imagen de manera idiomática en español y deja abierta la posible idea de prodigalidad o desperdicio que el texto sugiere sin explicitar.
translation_notes:
  revision_awareness: El texto base en inglés fue revisado y quedó sin cambios; se mantuvo la misma decisión central sobre χάριτες como término polisémico con nota alternativa. La versión española sigue esa línea, pero adapta la ambigüedad a un término natural en español.
  spanish_consistency_notes:
  - Se conservó el tono sapiencial breve y proverbial del original.
  - No se introdujo «Cristo», «SEÑOR» ni otras fórmulas no presentes en el griego.
  - Se mantuvo la metáfora de ‘derramar’ para ἐκχυθήσονται, en paralelo con la imagen verbal del versículo.
