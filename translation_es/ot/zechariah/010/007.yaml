translation:
  language: es
  text: Efraín será como un guerrero poderoso, y su corazón se alegrará como con vino; sus hijos[a] verán y se gozarán; su corazón exultará[b] en Yahvé.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘sus descendientes’. El hebreo usa ‘hijos’, que puede funcionar de manera colectiva o representativa en este contexto.
    reason: lexical_alternative
  - marker: b
    text: Hebreo ‘su corazón’, con un sustantivo singular usado colectivamente.
    reason: lexical_alternative
lexical_decisions:
- source_word: כְגִבּוֹר
  english_pob_choice: like a mighty warrior
  chosen_spanish: como un guerrero poderoso
  alternatives_spanish:
  - como un héroe
  - como un hombre poderoso
  lexicon: HALOT
  rationale: גִּבּוֹר tiene fuerza marcadamente marcial o de campeón. 'Guerrero poderoso' conserva ese matiz mejor que 'héroe', y suena natural en español.
- source_word: וְשָׂמַח לִבָּם
  english_pob_choice: their heart will rejoice
  chosen_spanish: su corazón se alegrará
  alternatives_spanish:
  - sus corazones se alegrarán
  - su corazón se gozará
  lexicon: HALOT
  rationale: El hebreo usa 'corazón' en singular colectivo con sufijo plural. En español, el singular posesivo 'su corazón' conserva ese rasgo idiomático sin perder claridad.
- source_word: כְּמוֹ יָיִן
  english_pob_choice: as with wine
  chosen_spanish: como con vino
  alternatives_spanish:
  - como vino
  - como por el vino
  lexicon: HALOT
  rationale: La comparación apunta al gozo asociado con el vino, no a identidad literal. 'Como con vino' mantiene el símil y la naturalidad en español.
- source_word: וּבְנֵיהֶם
  english_pob_choice: their children
  chosen_spanish: sus hijos
  alternatives_spanish:
  - sus niños
  - sus descendientes
  lexicon: HALOT
  rationale: El sustantivo hebreo es masculino plural y puede funcionar de manera representativa. 'Sus hijos' mantiene la forma más cercana al hebreo y conserva el posible valor genérico.
- source_word: יִרְא֣וּ
  english_pob_choice: will see
  chosen_spanish: verán
  alternatives_spanish:
  - mirarán
  - verán esto
  lexicon: HALOT
  rationale: El hebreo no expresa objeto directo; por eso se omite cualquier complemento añadido. 'Verán' reproduce la concisión del original.
- source_word: וְשָׂמֵחוּ
  english_pob_choice: and rejoice
  chosen_spanish: y se gozarán
  alternatives_spanish:
  - y se alegrarán
  - y estarán contentos
  lexicon: HALOT
  rationale: '''Se gozarán'' conserva el campo semántico de alegría intensa y permite distinguirlo del primer שׂמח con una variación estilística válida en español.'
- source_word: יָגֵל לִבָּם
  english_pob_choice: their heart will exult
  chosen_spanish: su corazón se alegrará
  alternatives_spanish:
  - su corazón exultará
  - su corazón se gozará
  lexicon: HALOT
  rationale: גיל expresa júbilo exaltado. En español, 'se alegrará' es más natural y todavía apto para el contexto; 'exultará' es posible, pero más marcado y menos frecuente.
- source_word: בַּיהוָה
  english_pob_choice: in Yahweh
  chosen_spanish: en Yahvé
  alternatives_spanish:
  - en Yahveh
  - en el SEÑOR
  lexicon: HALOT
  rationale: 'Siguiendo la norma del proyecto, יהוה se rinde como ''Yahvé''. La preposición ב indica esfera o fundamento: el gozo ocurre ''en Yahvé''.'
theological_decisions:
- issue: Nombre divino יהוה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahveh
  - el SEÑOR
  rationale: El texto hebreo tiene el Tetragrámaton; el proyecto pide no enmascararlo con 'SEÑOR'. 'Yahvé' es la forma directiva adoptada para el texto principal en español.
  doctrine_reference: 'DOCTRINE.md Contested terms: יהוה YHWH'
- issue: Singular colectivo 'corazón'
  english_pob_reading: their heart (singular collective)
  chosen_spanish_reading: su corazón
  alternative_spanish_readings:
  - sus corazones
  rationale: La singularidad del sustantivo hebreo se preserva para no perder la imagen de unidad interna del pueblo, aunque se trate de un referente colectivo.
  doctrine_reference: Hebrew collective singular usage in context
- issue: Sentido de 'hijos'
  english_pob_reading: their children / their sons
  chosen_spanish_reading: sus hijos
  alternative_spanish_readings:
  - sus descendientes
  rationale: El audit trail inglés reconoce la posible lectura generacional y rechaza añadir un objeto no presente. En español, 'hijos' mantiene la forma textual y puede abarcar descendencia en contexto.
  doctrine_reference: Lexical alternative noted in audit trail
translation_notes:
  revision_awareness: El audit trail inglés fue revisado para eliminar el complemento añadido 'it' después de 'will see', porque no está en el hebreo. La presente redacción española sigue esa revisión y evita introducir un objeto no explícito. También conserva la distinción entre el primer שׂמח ('se alegrará') y el último גיל ('se alegrará' en sentido de júbilo), sin sobrecargar el texto con vocabulario artificial.
  spanish_consistency_notes:
  - Se usó 'Yahvé' conforme al estándar del proyecto para יהוה.
  - Se mantuvo el singular colectivo 'su corazón' para reflejar el hebreo.
  - No se añadió complemento a 'verán', en línea con la revisión inglesa.
  - Se evitó 'Cristo' o vocabulario eclesiástico no presente en el versículo.
  - La dicción busca ser clara y publicable en español latinoamericano sin perder el paralelismo del hebreo.
