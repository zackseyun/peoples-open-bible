    text: 'Literalmente: «no lo harás servir el servicio de un esclavo».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «y es vendido a ti»; el hebreo puede expresarse en pasiva, aunque en el contexto se refiere al hombre pobre que se vende para servicio por deuda.'
    reason: alternative_reading
  revision_rationale: Se hizo un ajuste mínimo de estilo en «empobrece contigo» a «se empobrece estando contigo» para preservar mejor el sentido relacional de עִמָּךְ en un español más natural, sin cambiar el significado ni las decisiones léxicas principales. Se conservaron las notas y la elección de «esclavo».
