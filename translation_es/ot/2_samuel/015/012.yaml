translation:
  language: es
  text: Y Absalón mandó llamar a Ahitofel el gilonita[a], consejero de David, desde su ciudad, desde Giló, mientras ofrecía los sacrificios. Y la conspiración se fortaleció[b], y el pueblo iba aumentando[c] con Absalón.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘envió a Ahitofel’; el hebreo puede traducirse más literalmente así, pero en este contexto probablemente significa que Absalón lo mandó llamar para unirse a la rebelión.
    reason: lexical_alternative
  - marker: b
    text: O ‘el complot se fortaleció’.
    reason: lexical_alternative
  - marker: c
    text: 'Literalmente: ‘el pueblo iba y se volvía muchos con Absalón’, un giro idiomático para indicar aumento continuo de apoyo.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּשְׁלַח
  english_pob_choice: sent for
  chosen_spanish: envió
  alternatives_spanish:
  - mandó llamar
  - envió a buscar
  lexicon: HALOT
  rationale: El hebreo puede significar simplemente ‘enviar’, pero el contexto narrativo sugiere convocatoria/reclutamiento. En español, ‘envió’ conserva la forma básica del verbo sin forzar una perífrasis demasiado interpretativa; el sentido de convocatoria queda disponible por el contexto inmediato.
- source_word: הַגִּלֹנִי
  english_pob_choice: the Gilonite
  chosen_spanish: el gilonita
  alternatives_spanish:
  - el de Giló
  - el gilonita de Giló
  lexicon: HALOT
  rationale: Es un gentilicio derivado de Giló. ‘Gilonita’ reproduce el valor gentilicio de forma natural en español y mantiene la identificación apposicional.
- source_word: יוֹעֵץ דָּוִד
  english_pob_choice: David’s counselor
  chosen_spanish: consejero de David
  alternatives_spanish:
  - asesor de David
  - consejero para David
  lexicon: HALOT
  rationale: El constructo expresa relación de oficio respecto de David. ‘Consejero’ conserva bien la función política y cortesana; ‘asesor’ es posible, pero menos tradicional para este cargo en este contexto.
- source_word: מֵעִירוֹ מִגִּלֹה
  english_pob_choice: from his city, from Giloh
  chosen_spanish: desde su ciudad, desde Giló
  alternatives_spanish:
  - de su ciudad, de Giló
  - desde su ciudad, Giló
  lexicon: HALOT
  rationale: La duplicación hebrea (‘de su ciudad, de Giló’) se preserva para no perder la apposición. ‘Desde’ refleja bien el movimiento de procedencia y mantiene el ritmo de dos miembros.
- source_word: בְּזָבְחוֹ אֶת־הַזְּבָחִים
  english_pob_choice: while he was offering the sacrifices
  chosen_spanish: mientras ofrecía los sacrificios
  alternatives_spanish:
  - cuando ofrecía los sacrificios
  - al ofrecer los sacrificios
  lexicon: HALOT
  rationale: La preposición con infinitivo expresa acción simultánea. ‘Mientras ofrecía’ es la forma más natural en español y mantiene el sentido cultual de זבח/זבחים sin repetir mecánicamente la raíz.
- source_word: הַקֶּשֶׁר
  english_pob_choice: the conspiracy
  chosen_spanish: la conspiración
  alternatives_spanish:
  - el complot
  - la trama
  lexicon: HALOT
  rationale: En este contexto de rebelión organizada, ‘conspiración’ expresa bien el carácter político y secreto del movimiento. ‘Complot’ sería viable, pero ‘conspiración’ resulta más estable y solemne.
- source_word: אַמִּץ
  english_pob_choice: grew strong
  chosen_spanish: se hizo fuerte
  alternatives_spanish:
  - creció en fuerza
  - se fortaleció
  lexicon: HALOT
  rationale: El hebreo describe un estado que se intensifica. ‘Se hizo fuerte’ conserva la idea de desarrollo narrativo y funciona de modo natural en español.
- source_word: וְהָעָם הוֹלֵךְ וָרָב
  english_pob_choice: the people kept increasing
  chosen_spanish: el pueblo iba aumentando
  alternatives_spanish:
  - el pueblo seguía aumentando
  - el pueblo iba y se multiplicaba
  lexicon: HALOT
  rationale: La secuencia verbal hebrea expresa incremento continuo. ‘Iba aumentando’ reproduce bien esa progresión durativa y evita una traducción demasiado literal y pesada.
- source_word: הָעָם
  english_pob_choice: the people
  chosen_spanish: el pueblo
  alternatives_spanish:
  - la gente
  - la muchedumbre
  lexicon: HALOT
  rationale: Aquí se refiere al conjunto de adherentes que se suman a Absalón. ‘Pueblo’ es una equivalencia natural y digna, más cohesionada que ‘la gente’ en este registro.
- source_word: אֶת אַבְשָׁלוֹם
  english_pob_choice: with Absalom
  chosen_spanish: con Absalón
  alternatives_spanish:
  - junto con Absalón
  - a favor de Absalón
  lexicon: HALOT
  rationale: En este uso, אֶת expresa asociación/alianza, no objeto directo. ‘Con Absalón’ comunica de forma precisa la adhesión al bando rebelde.
translation_notes:
  revision_awareness: Se tuvo en cuenta que la revisión inglesa más reciente no introdujo cambios y que el pasaje mantiene una alta concordancia textual; por eso la versión española conserva el contenido y la estructura semántica principales del audit trail, con solo las adaptaciones idiomáticas necesarias.
  spanish_consistency_notes:
  - Se mantiene ‘Yahvé’ como norma del proyecto, pero este versículo no lo contiene.
  - Se conserva ‘Absalón’, ‘Ahitofel’, ‘Giló’ y ‘David’ de forma uniforme.
  - Se optó por ‘conspiración’ y no por ‘complot’ para mantener el tono político-formal del contexto.
  - Se preserva la duplicación de procedencia (‘desde su ciudad, desde Giló’) para reflejar la textura hebrea.
  - Se eligió ‘consejero’ como término estable para יוֹעֵץ en este contexto cortesano.
