review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura y el sentido general del griego: λογισμέ como «razón», παθῶν como «pasiones», y εὐσέβεια como devoción dirigida a Dios. Sin embargo, «tirano de las pasiones de los hijos» en español suena menos claro que una construcción con «sobre», que expresa mejor el dominio de la razón sobre las pasiones. Además, en la segunda cláusula «más deseable para una madre» es comprensible, pero «más anhelada por una madre» reproduce mejor el matiz afectivo de ποθεινοτέρα y suena más natural en español.'
  spanish_quality_summary: El texto es legible y digno, pero requiere un ajuste menor para mayor naturalidad y precisión semántica. «Tirano sobre» evita una ambigüedad posesiva de «tirano de». En la segunda mitad, conviene usar una formulación más idiomática y emocional que «más deseable para una madre que los hijos».
  glossary_alignment: No hay conflicto con la terminología base del proyecto. «Piedad» es aceptable aquí para εὐσέβεια, especialmente con nota explicativa; también podría haberse usado «devoción a Dios», pero no es necesario imponerlo. «Razón» para λογισμέ está bien documentado.
  issues:
  - severity: medium
    issue: «tirano de las pasiones de los hijos» suena poco natural y puede sugerir posesión más que dominio
    rationale: τύραννε con genitivo de relación se entiende como dominio sobre las pasiones; en español «tirano sobre» o «tirano de las pasiones» con reestructuración expresa mejor ese valor.
  - severity: medium
    issue: «más deseable para una madre» atenúa el matiz afectivo de ποθεινοτέρα
    rationale: El comparativo apunta a lo más anhelado o deseado; «más anhelada por una madre» suena más natural y conserva mejor la fuerza emocional del término.
  - severity: low
    issue: La nota a sobrecarga «de los hijos» sin mencionar la otra mitad del sentido preservada en el inglés
    rationale: La nota inglesa explica tanto la posible unión sintáctica del genitivo como el sentido global de que la razón gobierna las pasiones y que la devoción a Dios supera el apego materno. Conviene conservar esa explicación completa.
  revised_spanish_text: ¡Oh razón[a], tirano sobre las pasiones de los hijos! Y la piedad[b] es más anhelada por una madre que sus hijos.
  revised_footnotes:
