review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura triple imperativa del hebreo y preserva correctamente el título divino «el Santo de Israel». Sin embargo, hay dos ajustes importantes: el pie de nota [a] está anclado en «camino», pero la alternativa léxica corresponde al tercer imperativo הַשְׁבִּיתוּ; además, «de nuestra presencia» es menos fiel que «de delante de nosotros» para מִפָּנֵינוּ, ya que el hebreo mantiene una imagen espacial concreta.'
  spanish_quality_summary: El español es claro y digno, pero repetir «apártense» dos veces suena algo menos elegante que una leve variación paralela. «Hagan desaparecer» comunica hostilidad, aunque «hagan cesar» es la alternativa más literal y debe quedar en nota correctamente anclada. La revisión mejora fidelidad y orden del aparato sin perder naturalidad.
  glossary_alignment: Se mantiene correctamente «el Santo de Israel» como título divino fijo de Isaías. No hay conflictos con los términos de proyecto como Yahvé/Mesías. La decisión principal a corregir es la representación de מִפָּנֵינוּ con una formulación más cercana al valor espacial del hebreo.
  issues:
  - severity: high
    issue: La nota [a] está anclada en «camino», pero su contenido explica una alternativa del tercer imperativo («hagan cesar… al Santo de Israel»).
    rationale: Según el rastro inglés, la nota léxica corresponde a הַשְׁבִּיתוּ, no a «from the way». El marcador debe aparecer junto a la frase relevante en el texto español.
  - severity: medium
    issue: «De nuestra presencia» suaviza y desplaza el sentido espacial de מִפָּנֵינוּ.
    rationale: El hebreo significa literalmente «de delante de nosotros / de ante nosotros». La formulación actual es comprensible, pero menos precisa que una expresión espacial más directa.
  - severity: low
    issue: La repetición exacta de «apártense» en los dos primeros imperativos pierde la ligera variación poética presente entre סוּרוּ y הַטּוּ.
    rationale: Aunque el paralelismo se conserva, una variación natural como «desvíense» en el segundo miembro puede reflejar mejor la sinonimia poética sin alterar el sentido.
  revised_spanish_text: ¡Apártense del camino; desvíense de la senda; hagan desaparecer[a] de delante de nosotros al Santo de Israel!
  revised_footnotes:
