translation:
  language: es
  text: Y la ciudad y todo lo que está en ella será consagrado a destrucción para Yahvé[a]. Solo Rahab la prostituta vivirá, ella y todos los que estén con ella en la casa, porque escondió a los mensajeros[b] que enviamos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «bajo el anatema». El hebreo חֵרֶם se refiere a algo entregado irrevocablemente a Yahvé, aquí mediante destrucción.
    reason: lexical_alternative
  - marker: b
    text: Hebreo «los mensajeros»; en contexto, estos son los hombres que Josué había enviado para reconocer la tierra.
    reason: lexical_alternative
lexical_decisions:
- source_word: חֵרֶם
  english_pob_choice: devoted to destruction
  chosen_spanish: devotada a destrucción
  alternatives_spanish:
  - bajo el anatema
  - consagrada a destrucción
  - dedicada a destrucción
  lexicon: HALOT
  rationale: חֵרֶם en contextos de conquista expresa algo entregado irrevocablemente a Dios mediante destrucción. «Devotada a destrucción» conserva la doble fuerza de consagración y juicio sin suavizar el sentido.
- source_word: לַיהוָה
  english_pob_choice: for Yahweh
  chosen_spanish: para Yahvé
  alternatives_spanish:
  - a Yahvé
  - de Yahvé
  lexicon: HALOT
  rationale: La preposición marca dedicación dirigida a Yahvé. «Para Yahvé» es natural en español y mantiene el sentido de pertenencia/dedicación del texto.
- source_word: רַק
  english_pob_choice: Only
  chosen_spanish: Solo
  alternatives_spanish:
  - Excepto
  - Únicamente
  lexicon: HALOT
  rationale: רַק introduce la excepción única al juicio sobre la ciudad. «Solo» es la forma más clara y enfática en español actual.
- source_word: הַזּוֹנָה
  english_pob_choice: the prostitute
  chosen_spanish: la prostituta
  alternatives_spanish:
  - la ramera
  - la meretriz
  lexicon: HALOT
  rationale: El término hebreo identifica a Rahab por su oficio/estatus. «La prostituta» es el equivalente moderno más claro y evita arcaísmos.
- source_word: תִּחְיֶה
  english_pob_choice: shall live
  chosen_spanish: vivirá
  alternatives_spanish:
  - seguirá con vida
  - será preservada con vida
  lexicon: HALOT
  rationale: El verbo significa simplemente vivir o permanecer con vida. «Vivirá» conserva la sobriedad del contraste con la destrucción.
- source_word: אִתָּהּ בַּבַּיִת
  english_pob_choice: with her in the house
  chosen_spanish: con ella en la casa
  alternatives_spanish:
  - en la casa con ella
  - en su casa con ella
  lexicon: HALOT
  rationale: La frase se refiere a los que están físicamente reunidos con Rahab. «Con ella en la casa» refleja de modo directo el hebreo sin añadir matices interpretativos.
- source_word: הֶחְבְּאַתָה
  english_pob_choice: she hid
  chosen_spanish: escondió
  alternatives_spanish:
  - ocultó
  - encubrió
  lexicon: HALOT
  rationale: El hifil de חבא significa esconder o ocultar. «Escondió» es transparente y evita implicaciones adicionales que podría tener «rescató» o «amparó».
- source_word: הַמַּלְאָכִים
  english_pob_choice: the messengers
  chosen_spanish: los mensajeros
  alternatives_spanish:
  - los espías
  - los enviados
  lexicon: HALOT
  rationale: מַלְאָךְ significa de forma básica «mensajero». Aunque el contexto narrativo los identifica como enviados de exploración, «mensajeros» conserva el valor léxico sin sobreinterpretar.
- source_word: שָׁלָחְנוּ
  english_pob_choice: we sent
  chosen_spanish: enviamos
  alternatives_spanish:
  - habíamos enviado
  - mandamos
  lexicon: HALOT
  rationale: El qatal de primera persona plural remite a una acción ya realizada. «Enviamos» es natural en español y suficiente para el contexto narrativo.
- source_word: וְהָיְתָה הָעִיר ... הִיא וְכָל אֲשֶׁר בָּהּ
  english_pob_choice: And the city and all that is in it shall be devoted to destruction
  chosen_spanish: Y la ciudad y todo lo que hay en ella será devotada a destrucción
  alternatives_spanish:
  - Y la ciudad, y todo lo que hay en ella, será devotada a destrucción
  - La ciudad y todo lo que hay en ella será devotada a destrucción
  lexicon: HALOT
  rationale: El hebreo pone énfasis en la ciudad con el pronombre resumptivo. El español puede expresar esa estructura de forma fluida sin añadir un «ella» innecesario; «todo lo que hay en ella» mantiene el referente implícito.
theological_decisions:
- issue: Cómo traducir חֵרֶם en un contexto de conquista/jucio
  english_pob_reading: devoted to destruction
  chosen_spanish_reading: devotada a destrucción
  alternative_spanish_readings:
  - bajo el anatema
  - consagrada a destrucción
  - dedicada a destrucción
  rationale: La traducción debe conservar la gravedad del juicio divino y la idea de una entrega irrevocable a Yahvé. «Devotada a destrucción» evita tanto el suavizamiento como la mera idea de maldición abstracta.
  doctrine_reference: 'Translation philosophy: original-language primacy; consistency of key terms, or documented exception.'
- issue: Representación del nombre divino en una fórmula de dedicación
  english_pob_reading: for Yahweh
  chosen_spanish_reading: para Yahvé
  alternative_spanish_readings:
  - a Yahvé
  - de Yahvé
  rationale: Siguiendo la política del proyecto, Yahvé se conserva en el texto principal. «Para Yahvé» expresa bien la dedicación del objeto/ciudad a él sin recurrir a una sustitución por «Señor».
  doctrine_reference: 'Project terminology default: יהוה / YHWH -> Yahvé.'
translation_notes:
  revision_awareness: 'El auditr trail inglés revisó la formulación para eliminar una apposición innecesaria después de «the city» y dejar una frase más natural. La versión española sigue esa misma línea: mantiene el énfasis del hebreo sin introducir una duplicación forzada, y conserva la distinción entre la ciudad condenada y la excepción de Rahab.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» conforme a la terminología del proyecto para יהוה.
  - Se usa «mensajeros» siguiendo el valor léxico básico de מַלְאָךְ y la nota contextual del texto fuente.
  - «Prostituta» se conserva como equivalente moderno directo de הַזּוֹנָה; no se sustituye por un término eclesiástico tradicional.
  - «Devotada a destrucción» intenta reflejar la tensión semántica de חֵרֶם sin diluirla; se documenta la alternativa «bajo el anatema».
  - La casa se traduce de forma literal y sobria, sin ampliar a «hogar» o «familia», porque el hebreo dice בַּבַּיִת.
