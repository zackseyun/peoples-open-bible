  source_alignment_summary: 'El borrador transmite correctamente la estructura básica del hebreo: la referencia temporal, el cargo tribal, la relación con los hijos de Efraín y el patronímico. Sin embargo, añade notas no respaldadas por la auditoría inglesa y el giro temporal principal no es el más natural ni el más fiel al razonamiento documentado.'
  spanish_quality_summary: El texto es comprensible, pero «En el séptimo día» suena poco idiomático en español bíblico natural; «El séptimo día» o «En el séptimo día» no requieren nota aquí, y la primera opción es preferible. «Jefe» es posible, pero «líder» refleja mejor la decisión POB inglesa para נָשִׂיא y evita un matiz algo brusco o coloquial.
  glossary_alignment: No hay términos teológicos mayores en juego. La onomástica española «Elisama» y «Amihud» es adecuada. Conviene alinear נָשִׂיא con la decisión auditada «leader» mediante «líder», y conservar «de los hijos de Efraín».
  issues:
  - severity: medium
    issue: La expresión principal «En el séptimo día» es poco natural en español.
    rationale: El hebreo expresa tiempo con ב + יום + ordinal. En español, «El séptimo día» comunica el valor temporal de forma más idiomática y limpia; además, la propia nota reconoce esta opción como natural.
  - severity: medium
    issue: La nota [a] introduce una alternativa que no corresponde a una diferencia significativa en español.
    rationale: La auditoría inglesa no preserva una alternativa temporal equiparable que deba mantenerse como nota en español. Aquí la nota más bien compensa una elección menos natural del texto base.
  - severity: medium
    issue: La nota [b] sobre «jefe»/«líder» no refleja la alternativa documentada en la auditoría inglesa.
    rationale: 'La nota inglesa va con «On the seventh day» y documenta la ambigüedad relacional de לִבְנֵי: «leader of» / «leader for». La nota española desplaza la atención a נָשִׂיא, donde no está la alternativa preservada por la auditoría.'
  - severity: low
    issue: «Jefe» es aceptable, pero menos alineado con la decisión léxica POB que «líder».
    rationale: La razón documentada favorece un término moderno para función representativa tribal; «líder» reproduce mejor esa elección y evita matices innecesarios.
  revised_spanish_text: El séptimo día, el líder de los hijos de Efraín[a] fue Elisama, hijo de Amihud.
  revised_footnotes:
