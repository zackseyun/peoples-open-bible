review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien el sentido general del hebreo: negación de expulsar, temporalidad de ''en un año'', cláusula preventiva, desolación de la tierra y aumento amenazante de la fauna silvestre. Sin embargo, la nota [a] está mal formulada porque presenta «en un solo año» como alternativa de sí misma y mezcla indebidamente la observación del sufijo singular con una nota que en la auditoría inglesa pertenece a la frase temporal. Además, la nota [b] no preserva adecuadamente la relación de alternativa léxica del inglés, donde la alternativa es ''bestias del campo''; en español conviene explicitar que la opción principal revisada será ''los animales salvajes del campo'' con alternativa ''las fieras del campo'' o ''las bestias del campo''.'
  spanish_quality_summary: El texto es legible y digno, pero «las fieras del campo» suena más marcado y algo interpretativo que el hebreo. «Los animales salvajes del campo» es más claro y más cercano al valor léxico documentado por la POB inglesa. El resto del verso suena natural en español eclesial amplio.
  glossary_alignment: 'No hay términos del glosario mayor en juego como Yahvé o Mesías. La decisión sobre גרש como «expulsaré» es adecuada. La principal mejora es alinear חית השדה con una expresión menos cargada: «animales salvajes del campo», conservando en nota la alternativa más tradicional «bestias del campo» y también «fieras del campo».'
  issues:
  - severity: medium
    issue: La nota [a] está internamente defectuosa.
    rationale: 'Dice «También: “en un solo año” o “en un año”», pero «en un solo año» ya es la lectura del texto principal. La nota debe presentar una verdadera alternativa, no repetir la lectura base.'
  - severity: medium
    issue: La nota [a] traslada una observación del sufijo singular al lugar equivocado.
    rationale: En la auditoría inglesa, la nota temporal solo trata la alternativa «in a single year»; la explicación sobre el sufijo singular pertenece a אגרשנו, no a בשנה אחת. En español no hace falta fusionarlas en la misma nota.
  - severity: medium
    issue: «Las fieras del campo» es más interpretativo que la opción más cercana al hebreo y al POB inglés.
    rationale: El hebreo חית השדה se refiere a animales salvajes del campo. «Fieras» añade ferocidad como matiz principal; aunque compatible con el contexto, no es la opción más fiel ni la más clara para lectura general.
  revised_spanish_text: No los expulsaré de delante de ti en un solo año[a], no sea que la tierra quede desolada y los animales salvajes del campo[b] se multipliquen contra ti.
  revised_footnotes:
  - marker: a
    text: 'O: «en un año».'
    reason: lexical_alternative
  - marker: b
    text: También puede traducirse «las fieras del campo» o «las bestias del campo».
    reason: lexical_alternative
  revision_rationale: Se conserva la estructura y el sentido del borrador, pero se corrige la nota temporal para que sea una alternativa real y no repita la lectura principal. También se reemplaza «las fieras del campo» por «los animales salvajes del campo» para reflejar mejor חית השדה y la decisión léxica inglesa, dejando en nota las alternativas españolas más tradicionales o estilísticamente marcadas.
