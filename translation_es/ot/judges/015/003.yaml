translation:
  language: es
  text: 'Y Sansón les dijo: «Esta vez soy inocente con respecto a los filisteos[a], cuando les hago daño[b]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «estoy libre de culpa respecto a los filisteos»; el hebreo puede expresar exención de responsabilidad o inocencia en relación con ellos.'
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «les hago mal». Aquí «daño» comunica mejor el sentido concreto de perjuicio hostil en este contexto.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר
  english_pob_choice: And ... said
  chosen_spanish: les dijo
  alternatives_spanish:
  - y dijo
  - entonces dijo
  lexicon: HALOT
  rationale: El wayyiqtol narrativo se expresa de forma natural en español con una continuación simple del relato; 'les dijo' mantiene el avance narrativo sin sobrecargar la secuencia temporal.
- source_word: לָהֶם
  english_pob_choice: to them
  chosen_spanish: les
  alternatives_spanish:
  - a ellos
  - a los filisteos
  lexicon: HALOT
  rationale: El sufijo pronominal plural se refleja con el dativo átono español 'les', que es natural y fiel al destinatario del habla.
- source_word: שִׁמְשׁוֹן
  english_pob_choice: Samson
  chosen_spanish: Sansón
  alternatives_spanish:
  - Samson
  lexicon: uso bíblico tradicional
  rationale: En español bíblico el nombre se ha establecido como 'Sansón'; es la forma idiomática y reconocible para lectores de la Biblia en español.
- source_word: נִקֵּיתִי
  english_pob_choice: I am blameless
  chosen_spanish: soy inocente
  alternatives_spanish:
  - estoy libre de culpa
  - soy irreprochable
  lexicon: HALOT
  rationale: נקה expresa estar libre de culpa o responsabilidad. 'Soy inocente' comunica la fuerza resultativa/estativa de manera clara en español y conserva la idea de exención de culpa.
- source_word: הַפַּעַם
  english_pob_choice: This time
  chosen_spanish: Esta vez
  alternatives_spanish:
  - Ahora
  - En esta ocasión
  lexicon: HALOT
  rationale: La expresión temporal idiomática se vierte de manera natural como 'Esta vez', sin perder el contraste con episodios previos.
- source_word: מִפְּלִשְׁתִּים
  english_pob_choice: with respect to the Philistines
  chosen_spanish: con respecto a los filisteos
  alternatives_spanish:
  - frente a los filisteos
  - en relación con los filisteos
  lexicon: HALOT
  rationale: El מן con נקה indica separación de culpa en relación con alguien. 'Con respecto a' preserva esa relación sin convertirla en una idea meramente espacial.
- source_word: כִּי
  english_pob_choice: when
  chosen_spanish: cuando
  alternatives_spanish:
  - porque
  - pues
  lexicon: HALOT
  rationale: Aquí כִּי introduce la circunstancia en la que Sansón se considera inocente; 'cuando' transmite bien el valor circunstancial en español.
- source_word: עֹשֶׂה אֲנִי
  english_pob_choice: I do
  chosen_spanish: les hago
  alternatives_spanish:
  - les hago daño
  - estoy por hacerles
  lexicon: HALOT
  rationale: El participio con pronombre explícito puede indicar acción en curso o inminente. En español, 'les hago' mantiene la simplicidad verbal y enlaza con el complemento siguiente.
- source_word: עִמָּם
  english_pob_choice: them
  chosen_spanish: les
  alternatives_spanish:
  - a ellos
  - con ellos
  lexicon: HALOT
  rationale: Con עשה + עִם el sentido es idiomático, equivalente a actuar contra/para daño de alguien. El objeto indirecto 'les' permite una frase fluida en español.
- source_word: רָעָה
  english_pob_choice: harm
  chosen_spanish: daño
  alternatives_spanish:
  - mal
  - perjuicio
  - daño hostil
  lexicon: HALOT
  rationale: Aunque el hebreo puede significar 'mal', en este contexto de represalia concreta 'daño' evita una abstracción moral excesiva y comunica lesión hostil tangible.
theological_decisions:
- issue: Alcance de la inocencia declarada por Sansón
  english_pob_reading: I am blameless with respect to the Philistines when I do them harm.
  chosen_spanish_reading: Soy inocente con respecto a los filisteos cuando les hago daño.
  alternative_spanish_readings:
  - soy inocente de culpa respecto a los filisteos
  - estoy libre de culpa en relación con los filisteos
  rationale: La declaración no absuelve la acción en sí, sino que expresa que Sansón se considera libre de culpa en su relación con los filisteos en este acto de represalia. 'Con respecto a' preserva el matiz relacional sin suavizar la tensión moral del pasaje.
  doctrine_reference: Éxodo 21:23–25; Romanos 12:19
translation_notes:
  revision_awareness: El inglés POB revisó la relación preposicional de 'against the Philistines' a 'with respect to the Philistines' para precisar el valor de מן con נקה. Esta revisión se reflejó en español con 'con respecto a los filisteos'. También se respetó la tensión léxica entre 'evil' y 'harm' mediante 'daño', manteniendo el sentido hostil concreto del contexto.
  spanish_consistency_notes:
  - Se usó 'Sansón' como forma bíblica establecida en español.
  - Se evitó 'SEÑOR' u სხვა masking conventions because el versículo no contiene el nombre divino.
  - '''filisteos'' se mantuvo en minúscula según uso español normal para gentilicios.'
  - La puntuación y las comillas siguen la convención española moderna.
  - Los marcadores de nota [a] y [b] aparecen exactamente en el texto y están anclados al tramo correspondiente.
