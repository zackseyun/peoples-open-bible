  to: Podrán dejarlos en herencia a sus hijos después de ustedes[a], para heredarlos como posesión hereditaria permanente; de ellos podrán exigir trabajo. Pero sobre sus hermanos, los hijos de Israel[b], ningún hombre dominará a su hermano con dureza.
