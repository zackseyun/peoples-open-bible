translation:
  language: es
  text: 'Ciertos hombres indignos[a] han salido de en medio de ti y han desviado a los habitantes de su ciudad, diciendo: “Vayamos y sirvamos a otros dioses que no has conocido”.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: ''hijos de inutilidad'' o ''hijos de Belial''; aquí se entiende como un modismo para hombres moralmente indignos.'
    reason: lexical_alternative
lexical_decisions:
- source_word: יָצְאוּ
  english_pob_choice: have gone out
  chosen_spanish: han salido
  alternatives_spanish:
  - han ido fuera
  - salieron
  lexicon: HALOT
  rationale: El qal perfecto plural de יצא se expresa de modo natural en español con ‘han salido’, conservando el valor de evento ocurrido con relevancia presente en el contexto exhortativo.
- source_word: אֲנָשִׁים
  english_pob_choice: men
  chosen_spanish: hombres
  alternatives_spanish:
  - personas
  - gente
  lexicon: HALOT
  rationale: El hebreo usa un plural masculino explícito; ‘hombres’ preserva la referencia de género sin neutralizarla innecesariamente.
- source_word: בְּנֵי בְלִיַּעַל
  english_pob_choice: worthless men
  chosen_spanish: hombres indignos
  alternatives_spanish:
  - hombres perversos
  - hombres sin valor
  - hijos de Belial
  lexicon: HALOT
  rationale: La expresión es idiomática y describe personas moralmente corruptas. ‘Indignos’ comunica la descalificación moral sin importar un nombre propio o asociación posterior que el texto no exige.
- source_word: מִקִּרְבְּךָ
  english_pob_choice: from among you
  chosen_spanish: de en medio de ti
  alternatives_spanish:
  - de entre ustedes
  - de tu medio
  lexicon: HALOT
  rationale: La frase indica procedencia desde dentro de la comunidad del pacto; ‘de en medio de ti’ conserva esa interioridad con un tono bíblico natural en español.
- source_word: וַיַּדִּיחוּ
  english_pob_choice: have led ... astray
  chosen_spanish: han desviado
  alternatives_spanish:
  - han apartado
  - han seducido
  - han llevado ... al error
  lexicon: HALOT
  rationale: El hifil de נדח implica apartar o hacer desviar, especialmente hacia la apostasía. ‘Han desviado’ mantiene esa fuerza causal sin sobretraducir con ‘seducido’.
- source_word: יֹשְׁבֵי עִירָם
  english_pob_choice: the inhabitants of their city
  chosen_spanish: a los habitantes de su ciudad
  alternatives_spanish:
  - a los residentes de su ciudad
  - a los que habitaban su ciudad
  lexicon: HALOT
  rationale: El participio plural se vierte de forma compacta y natural; ‘habitantes’ conserva la idea de los que moran allí.
- source_word: לֵאמֹר
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - al decir
  - y dijeron
  lexicon: HALOT
  rationale: Es la fórmula habitual para introducir discurso directo; ‘diciendo’ resulta fluido y fiel.
- source_word: נֵלְכָה וְנַעַבְדָה
  english_pob_choice: Let us go and serve
  chosen_spanish: Vayamos y sirvamos
  alternatives_spanish:
  - Vamos y sirvamos
  - Vayamos a servir
  lexicon: HALOT
  rationale: Los cohortativos expresan invitación/exhortación en primera persona plural; el subjuntivo exhortativo ‘vayamos... sirvamos’ conserva el tono de incitación. ‘Servir’ mantiene la amplitud cultual y pactal de עבד.
- source_word: אֱלֹהִים אֲחֵרִים
  english_pob_choice: other gods
  chosen_spanish: a otros dioses
  alternatives_spanish:
  - a dioses ajenos
  - a dioses extraños
  lexicon: HALOT
  rationale: La frase deuteronómica estándar se mantiene de modo literal y transparente. ‘Otros dioses’ preserva el contraste con Yahvé sin introducir matices interpretativos adicionales.
- source_word: אֲשֶׁר לֹא יְדַעְתֶּם
  english_pob_choice: which you have not known
  chosen_spanish: que ustedes no han conocido
  alternatives_spanish:
  - que no han conocido
  - que ustedes no conocieron
  lexicon: HALOT
  rationale: El relativo concuerda con ‘dioses’ en español y mantiene el valor relacional de ידע como conocimiento reconocido, no mera información.
theological_decisions:
- issue: Renderizar בְּנֵי בְלִיַּעַל sin importar el nombre propio 'Belial'
  english_pob_reading: worthless men
  chosen_spanish_reading: hombres indignos
  alternative_spanish_readings:
  - hijos de Belial
  - hombres perversos
  rationale: En este contexto el giro es un modismo para personas moralmente corruptas. Se evita capitalizar o personificar ‘Belial’ porque la lectura auditada en inglés descartó esa asociación como innecesaria para el sentido del versículo.
  doctrine_reference: Principio de primacía del texto original; evitar importaciones teológicas no exigidas por el contexto.
translation_notes:
  revision_awareness: La redacción sigue el ajuste auditado del inglés POB para acordar el relativo con ‘other gods’ y lo refleja en español con ‘que ustedes no han conocido’. También conserva la decisión revisada de no traducir בְּנֵי בְלִיַּעַל como nombre propio.
  spanish_consistency_notes:
  - Se mantiene ‘Yahvé’ como forma estándar solo cuando el Tetragrámaton aparece explícitamente; este versículo no lo contiene.
  - ‘Servir’ se usa en sentido cultual/de pacto, no como mera atención o labor cotidiana.
  - El relativo ‘que’ se usa para evitar una construcción forzada y mantener la referencia a ‘otros dioses’.
  - Se preserva el tono solemne pero claro, apto para lectura pública.
