id: 2TH.3.15
reference: 2 Thessalonians 3:15
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: καὶ μὴ ὡς ἐχθρὸν ἡγεῖσθε, ἀλλὰ νουθετεῖτε ὡς ἀδελφόν.
base_translation:
  language: en
  yaml_path: translation/nt/2_thessalonians/003/015.yaml
  text: And do not regard him as an enemy[b][a], but admonish him as a brother.
translation:
  language: ko
  text: 그러나 그를 원수[a]로 여기지 말고, 형제[b]로 알고 권면하십시오.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 또는 「적」, 「대적」.
    reason: lexical_alternative
  - marker: b
    text: 본 문맥에서 「형제」는 같은 신앙 공동체의 일원을 가리킨다. 호칭은 대표적으로 사용될 수 있다.
    reason: cultural_note
lexical_decisions:
- source_word: ἡγεῖσθε
  english_pob_choice: regard
  chosen_korean: 여기지
  alternatives_korean:
  - 생각하지
  - 간주하지
  lexicon: BDAG
  rationale: 중간태 명령의 「어떤 사람을 어떻게 ~로 여기다」를 자연스럽게 표현.
- source_word: ἐχθρὸν
  english_pob_choice: enemy
  chosen_korean: 원수
  alternatives_korean:
  - 적
  - 대적
  lexicon: BDAG
  rationale: 한국 성경 전통의 표준 어휘.
- source_word: νουθετεῖτε
  english_pob_choice: admonish
  chosen_korean: 권면하십시오
  alternatives_korean:
  - 경고하십시오
  - 깨우치십시오
  lexicon: BDAG
  rationale: νουθετέω의 교정적·목회적 권면을 「권면하다」로 자연스럽게 옮긴다. 「경고」는 좁고 「가르치다」는 약하다.
- source_word: ἀδελφόν
  english_pob_choice: brother
  chosen_korean: 형제
  alternatives_korean:
  - 형제자매
  - 동료 신자
  lexicon: BDAG
  rationale: 성별 정확성 원칙. 회중 일원의 대표적 호칭.
- source_word: ὡς
  english_pob_choice: as
  chosen_korean: ~로
  alternatives_korean:
  - ~처럼
  lexicon: BDAG
  rationale: 양 절에서 자연스러운 한국어 격조사.
theological_decisions:
- issue: 권징의 자세 — 교정 vs 적대
  chosen_reading: 교회 권징은 인격적 적대와 구별되며, 같은 공동체의 일원으로 인정한 채 권면하는 것
  alternative_readings:
  - 일반적 대인 갈등 권면
  rationale: 14절-15절의 문맥은 회중 내 무질서한 자에 대한 권징적 거리두기를 다루며, 「형제」 언어는 언약 공동체의 관계가 유지됨을 보여 준다.
  doctrine_reference: 'Translation philosophy §3; Affirmations'
