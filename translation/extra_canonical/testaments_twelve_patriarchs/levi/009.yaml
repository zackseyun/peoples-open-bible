translation:
  text: 'And after two days[a], I and Judah went up with our father Jacob to Isaac our grandfather. And the father of my father blessed me according to the visions that I had seen, and he was not willing to go with us to Bethel.


    And when we came to Bethel, my father Jacob saw a vision concerning me, that I would be a priest for them. And rising early in the morning, he gave a tenth of everything through me to the Lord.


    And so we came to Hebron to remain there. And Isaac kept calling me continually to remind me of the law of the Lord, just as the angel had shown me. And he taught me the law of the priesthood, of sacrifices, of whole burnt offerings, of firstfruits, of freewill offerings, and of peace offerings. And every day he kept instructing me in freewill offerings, and giving his attention to me he said:


    “Take heed to yourself from the spirit of sexual immorality[b], for this persists and is about to defile the holy things through your offspring. Therefore take for yourself a wife while you are still young, one having no blemish and not defiled, and not from the stock of foreign nations.


    And before you enter into the holy things, wash; and when you sacrifice in the presence of the Lord, wash your hands. And when you complete the sacrifice again, wash.


    And from twelve trees having leaves offer to the Lord, as Abraham taught me. And from every clean animal and bird offer a sacrifice to the Lord. And from all your first produce and wine offer firstfruits as a sacrifice to the Lord God[c][d]. And season every sacrifice with salt.”'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The Greek phrase rendered 'this persists' is textually difficult in the OCR layer; the sense appears to be that the spirit of sexual immorality is continual or persistent.
    reason: textual_variant
    anchor_ref: '9:9'
  - marker: b
    text: The repeated command 'wash' likely refers specifically to ritual hand-washing in the sacrificial setting.
    reason: cultural_note
    anchor_ref: '9:11'
  - marker: d
    text: The instruction about 'twelve trees having leaves' is obscure; the translation stays close to the Greek without attempting to reconstruct the ritual beyond the wording given.
    reason: lexical_alternative
    anchor_ref: '9:12'
  - marker: c
    text: '''Peace offerings'' could also be understood more broadly as offerings associated with well-being or deliverance.'
    reason: lexical_alternative
    anchor_ref: '9:14'
lexical_decisions:
- source_word: ἀπεδεκάτωσε πάντα
  chosen: he gave a tenth of everything
  alternatives:
  - he tithed everything
  - he set apart a tenth of all
  lexicon: LSJ
  rationale: The verb denotes giving a tenth. 'Gave a tenth of everything' is clear modern English while preserving the cultic/tithed sense.
- source_word: ἱερέα
  chosen: priest
  alternatives:
  - priestly minister
  lexicon: LSJ
  rationale: Standard rendering for the office; concise and consistent with priestly context in this chapter.
- source_word: νόμον ἱερωσύνης
  chosen: the law of the priesthood
  alternatives:
  - the priestly law
  - the law concerning priesthood
  lexicon: LSJ
  rationale: Keeps the genitival construction visible and preserves the testamentary instructional tone.
- source_word: ὁλοκαυτωμάτων
  chosen: whole burnt offerings
  alternatives:
  - burnt offerings
  lexicon: LSJ
  rationale: The compound explicitly conveys complete burning; 'whole burnt offerings' preserves that nuance better than the shorter traditional phrase.
- source_word: ἀπαρχῶν
  chosen: firstfruits
  alternatives:
  - first offerings
  - first produce
  lexicon: LSJ
  rationale: Established cultic term that accurately reflects offerings from the first yield.
- source_word: ἑκουσίου
  chosen: freewill offerings
  alternatives:
  - voluntary offerings
  lexicon: LSJ
  rationale: Cultic language in English commonly uses 'freewill offerings'; it preserves the voluntary aspect without sounding casual.
- source_word: σωτηρίου
  chosen: peace offerings
  alternatives:
  - offerings of salvation
  - well-being offerings
  lexicon: LSJ
  rationale: In sacrificial contexts this term corresponds to the class of well-being/peace offerings. 'Peace offerings' is the most recognizable English equivalent, though the semantic field includes deliverance/well-being.
- source_word: πρόσεχε σεαυτῷ
  chosen: Take heed to yourself
  alternatives:
  - Watch yourself
  - Pay attention to yourself
  lexicon: LSJ
  rationale: Preserves the solemn imperative register appropriate to a patriarchal warning.
- source_word: πνεύματος τῆς πορνείας
  chosen: the spirit of sexual immorality
  alternatives:
  - the spirit of fornication
  - the spirit of whoredom
  lexicon: LSJ
  rationale: '''Sexual immorality'' communicates πορνεία in accessible modern English without archaic overtones, while retaining the personified/spiritual dimension.'
- source_word: ἐνδελεχές
  chosen: persists
  alternatives:
  - is constant
  - is continual
  lexicon: LSJ
  rationale: The OCR text is difficult here, but the sense is of something continual or persistent. 'Persists' fits the warning context and reads naturally.
- source_word: μιαίνειν τὰ ἅγια
  chosen: to defile the holy things
  alternatives:
  - to pollute the sacred things
  - to profane the holy things
  lexicon: LSJ
  rationale: Maintains cultic impurity language and the concrete reference to sacred matters/items.
- source_word: μὴ ἔχουσαν μῶμον
  chosen: one having no blemish
  alternatives:
  - without defect
  - blameless in body
  lexicon: LSJ
  rationale: Echoes sacrificial purity language intentionally applied to marriage suitability; 'blemish' preserves that resonance.
- source_word: βεβηλωμένην
  chosen: defiled
  alternatives:
  - profaned
  - made common
  lexicon: LSJ
  rationale: Best captures ritual/moral contamination in concise English.
- source_word: ἀλλοφύλων ἐθνῶν
  chosen: foreign nations
  alternatives:
  - alien peoples
  - the nations of foreigners
  lexicon: LSJ
  rationale: Smooth English that still preserves the boundary-marker against exogamy.
- source_word: τὰ ἅγια
  chosen: the holy things
  alternatives:
  - the sanctuary things
  - the sacred things
  lexicon: LSJ
  rationale: The plural likely refers broadly to sacred rites/items rather than the sanctuary building alone; 'holy things' keeps the breadth.
- source_word: νίπτου
  chosen: wash your hands
  alternatives:
  - wash
  - perform ablutions
  lexicon: LSJ
  rationale: In ritual contexts νίπτω often refers to washing part of the body, especially hands. The phrase 'wash your hands' makes the likely sense explicit in English.
- source_word: ἀπαρτίζων
  chosen: when you complete
  alternatives:
  - when you prepare fully
  - when you finish arranging
  lexicon: LSJ
  rationale: The participle suggests bringing the sacrifice to completion; 'complete' fits the sequence of ritual washings.
- source_word: δώδεκα ... δένδρων ἐχόντων φύλλα
  chosen: from twelve trees having leaves
  alternatives:
  - from twelve leafy trees
  - using leaves from twelve trees
  lexicon: LSJ
  rationale: The Greek is somewhat compressed. The translation stays close to the wording without over-interpreting the ritual detail.
- source_word: πρωτογεννήματός σου
  chosen: your first produce
  alternatives:
  - your first yield
  - your firstborn produce
  lexicon: LSJ
  rationale: In context with wine and firstfruits, the sense is agricultural first yield rather than offspring.
- source_word: ἅλατι ἁλιεῖς
  chosen: season with salt
  alternatives:
  - salt
  - make salty
  lexicon: LSJ
  rationale: Idiomatic English for applying salt to sacrifices, while preserving the ritual requirement.
