review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien el hebreo y el rastro de auditoría inglés en casi todos los puntos clave: prohibición de maldecir al sordo, prohibición de poner un obstáculo ante el ciego, motivación reverencial hacia Dios, y uso de «Yahvé» para יְהוָה. También preserva correctamente el masculino singular representativo mediante «un sordo» y «un ciego».'
  spanish_quality_summary: 'El español es claro y digno, pero «no pondrás tropiezo» suena algo incompleto o menos idiomático que una formulación que exprese mejor el objeto concreto de מִכְשֹׁל. «No pondrás obstáculo» o «no pondrás piedra de tropiezo» serían más naturales; dado el valor metafórico tradicional y la claridad, «obstáculo» funciona mejor aquí en español corriente sin perder el sentido. Además, en la cláusula final, «Yo soy Yahvé» puede ajustarse a la convención española de minúscula inicial tras dos puntos en cita continua: «yo soy Yahvé».'
  glossary_alignment: 'Alineación general buena con el glosario del proyecto: «Yahvé» para יְהוָה, «Dios» para אֱלֹהֶיךָ, y mantenimiento del valor representativo masculino. La única mejora léxica recomendada es reemplazar «tropiezo» por «obstáculo» en el texto principal para mayor naturalidad española, manteniendo si se desea la resonancia de «tropiezo» en la justificación léxica.'
  issues:
  - severity: medium
    issue: «No pondrás tropiezo» suena menos idiomático en español actual
    rationale: Aunque «tropiezo» puede entenderse, en español natural el mandato suele expresarse con un objeto más concreto o abstracto contable, como «obstáculo» o «piedra de tropiezo». El hebreo מִכְשֹׁל denota aquello que hace caer o tropezar; «obstáculo» comunica bien ese sentido sin rigidez.
  - severity: low
    issue: Capitalización de «Yo soy Yahvé» tras dos puntos
    rationale: No es un error grave, pero en español moderno dentro de una misma oración suele preferirse «yo soy Yahvé» después de dos puntos, salvo que se quiera marcar inicio enfático de cita independiente.
  revised_spanish_text: 'No maldecirás a un sordo[a], y delante de un ciego no pondrás obstáculo; pero temerás a tu Dios: yo soy Yahvé.'
  revised_footnotes:
  - marker: a
    text: O «el sordo» y «el ciego». El hebreo usa formas masculinas singulares como ejemplos legales representativos.
    reason: lexical_alternative
  revision_rationale: 'El texto requiere solo un ajuste menor para mayor naturalidad y precisión idiomática en español: «obstáculo» expresa mejor מִכְשֹׁל en esta construcción que «tropiezo». También se normaliza la capitalización tras dos puntos. No hay problemas doctrinales ni de fidelidad mayores.'
