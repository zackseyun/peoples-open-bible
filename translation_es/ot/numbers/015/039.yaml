translation:
  language: es
  text: Y será para ustedes una borla[a]; cuando la vean, recordarán todos los mandamientos de Yahvé y los pondrán por obra. No se desviarán[b] tras su corazón ni tras sus ojos, en pos de los cuales ustedes se prostituyen[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «fleco». El término hebreo se refiere a la borla o franja con flecos adherida a la prenda.
    reason: lexical_alternative
  - marker: b
    text: O «irán tras su corazón y tras sus ojos». El verbo hebreo sugiere perseguir o ir en pos de esos impulsos.
    reason: lexical_alternative
  - marker: c
    text: El hebreo dice «después de los cuales ustedes se prostituyen», usando la imagen de infidelidad sexual como metáfora de deslealtad al pacto; alternativamente, «en pos de los cuales ustedes se desvían».
    reason: lexical_alternative
lexical_decisions:
- source_word: צִיצִת
  english_pob_choice: tassel
  chosen_spanish: borla
  alternatives_spanish:
  - fleco
  - tassel
  lexicon: HALOT
  rationale: El término hebreo designa la pieza de flecos o borla ritual adherida a la prenda. ‘Borla’ funciona de manera natural en español y puede abarcar la idea del adorno/franja textil sin sonar demasiado técnica. Mantiene la alternativa semántica documentada por la POB inglesa ('fringe').
- source_word: וְהָיָה לָכֶם לְצִיצִת
  english_pob_choice: it shall be a tassel for you
  chosen_spanish: será para ustedes una borla
  alternatives_spanish:
  - les servirá como borla
  - será para ustedes como borla
  lexicon: HALOT
  rationale: Conserva la construcción predicativa del hebreo con un sujeto implícito retomado del contexto inmediato. ‘Para ustedes’ preserva el dativo; ‘será’ evita una paráfrasis excesiva.
- source_word: וּרְאִיתֶם אֹתוֹ
  english_pob_choice: when you see it
  chosen_spanish: la verán
  alternatives_spanish:
  - y la verán
  - cuando la vean
  lexicon: HALOT
  rationale: En español, la secuencia queda natural con un futuro simple coordinado, ya que el hebreo usa una forma coordinada con valor secuencial. ‘La’ concuerda con ‘borla’ y mantiene la referencia directa al objeto.
- source_word: מִצְוֺת יְהוָה
  english_pob_choice: all the commandments of Yahweh
  chosen_spanish: todos los mandamientos de Yahvé
  alternatives_spanish:
  - todas las instrucciones de Yahvé
  - todos los preceptos de Yahvé
  lexicon: HALOT
  rationale: ‘Mandamientos’ preserva la fuerza legal y pactual de מִצְוֺת mejor que ‘mandatos’ o ‘instrucciones’. Se mantiene ‘Yahvé’ según el criterio del proyecto para יְהוָה.
- source_word: וַעֲשִׂיתֶם אֹתָם
  english_pob_choice: and do them
  chosen_spanish: los pondrán por obra
  alternatives_spanish:
  - y los harán
  - y los obedecerán
  lexicon: HALOT
  rationale: ‘Poner por obra’ es un equivalente español natural para cumplir/observar mandamientos, sin perder el valor práctico de עשה aplicado a los preceptos. Evita un calco rígido de ‘hacerlos’ y conserva la idea de ejecución obediente.
- source_word: תָתֻרוּ
  english_pob_choice: go astray
  chosen_spanish: se desviarán
  alternatives_spanish:
  - irán tras
  - se apartarán
  - seguirán
  lexicon: HALOT
  rationale: El hebreo tiene el matiz de explorar/peregrinar tras un impulso; la POB inglesa ajustó el sentido moral a ‘go astray’. En español, ‘se desviarán’ expresa bien la metáfora de apartarse del camino debido a deseos interiores y externos, sin borrar el trasfondo de búsqueda.
- source_word: לְבַבְכֶם
  english_pob_choice: your heart
  chosen_spanish: su corazón
  alternatives_spanish:
  - su mente
  - su interior
  lexicon: HALOT
  rationale: ‘Corazón’ es el equivalente bíblico estándar para el centro interior de deseo, intención y pensamiento. Se usa el plural respetuoso de segunda persona ('su') acorde al español de trato grupal.
- source_word: עֵינֵיכֶם
  english_pob_choice: your eyes
  chosen_spanish: sus ojos
  alternatives_spanish:
  - su mirada
  - lo que sus ojos desean
  lexicon: HALOT
  rationale: Se conserva la literalidad de ‘ojos’, que en la metáfora apunta a lo visualmente deseado. ‘Sus ojos’ mantiene el paralelismo con ‘su corazón’.
- source_word: זֹנִים
  english_pob_choice: are whoring
  chosen_spanish: se prostituyen
  alternatives_spanish:
  - son infieles
  - se desvían
  lexicon: HALOT
  rationale: Se conserva la imagen sexual fuerte del hebreo זנה, que la POB inglesa mantuvo de forma explícita. ‘Se prostituyen’ refleja la metáfora de infidelidad pactual con la misma crudeza semántica que el original y evita suavizarla indebidamente.
- source_word: אַחֲרֵי
  english_pob_choice: after
  chosen_spanish: tras
  alternatives_spanish:
  - después de
  - en pos de
  lexicon: HALOT
  rationale: ‘Tras’ reproduce bien la idea de seguir/persistir detrás de algo. En español permite mantener el paralelismo repetido con ‘tras su corazón y tras sus ojos’.
theological_decisions:
- issue: Nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Jehová
  rationale: El proyecto establece ‘Yahvé’ como la forma española principal para el Tetragrámaton, preservando el nombre pactual revelado y evitando el sustituto litúrgico ‘SEÑOR’.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Metáfora de infidelidad sexual para זנה
  english_pob_reading: are whoring
  chosen_spanish_reading: se prostituyen
  alternative_spanish_readings:
  - son infieles
  - se desvían
  rationale: La POB inglesa decidió conservar la imagen fuerte de infidelidad sexual para reflejar la gravedad de la desobediencia pactual. En español, ‘se prostituyen’ mantiene esa tensión teológica sin atenuarla y conserva la relación entre deseo interior, mirada y ruptura del pacto.
  doctrine_reference: DOCTRINE.md Translation philosophy §1, §3, §6
translation_notes:
  revision_awareness: 'La redacción española sigue de cerca la revisión más reciente del audit trail inglés: mantiene el enlace secuencial del ver/recordar/obrar, conserva la advertencia moral con un verbo de desviación que corresponde mejor a תָתֻרוּ, y retiene la metáfora final fuerte de זנה sin suavizarla.'
  spanish_consistency_notes:
  - Se usa ‘Yahvé’ de manera consistente para יְהוָה, conforme al estándar del proyecto.
  - Se preserva el paralelismo ‘su corazón / sus ojos’ y la repetición de ‘tras’ para reflejar la estructura hebrea.
  - ‘Borla’ se eligió como equivalente idiomático principal; la nota mantiene la alternativa ‘fleco’ por transparencia.
  - La puntuación mantiene un solo flujo oracional largo, acorde al estilo bíblico formal, sin descomponer indebidamente la secuencia causal/imperativa del hebreo.
