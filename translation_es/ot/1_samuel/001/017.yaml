revisions:
- from: 'Entonces Elí respondió y dijo[a]: «Ve en paz, y que el Dios de Israel conceda tu petición[b] que has pedido de él».'
  to: 'Entonces Elí respondió y dijo[a]: «Ve en paz, y que el Dios de Israel conceda tu petición[b] que le has pedido».'
  rationale: Se corrigió una construcción poco natural en español («pedido de él») por «le has pedido», que expresa con claridad que Ana pidió su petición a Dios. También se afinó la nota alternativa de «petición» para acercarla mejor al audit trail inglés sin perder el contexto de oración.
