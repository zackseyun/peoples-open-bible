translation:
  language: es
  text: Y el santo templo, que antes había saqueado, lo adornaría con las más hermosas ofrendas votivas[a], y restituiría todos los utensilios sagrados multiplicados muchas veces[b], y de sus propios ingresos costearía los gastos necesarios para los sacrificios.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «con las más espléndidas ofrendas votivas». El término griego puede referirse específicamente a dones dedicados colocados en un santuario.'
    reason: lexical_alternative
  - marker: b
    text: 'Lit.: «restituiría todos los utensilios sagrados multiplicados muchas veces», expresando restitución en medida multiplicada, no mera reposición.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ὃν δὲ πρότερον ἐσκύλευεν
  english_pob_choice: which he had formerly plundered
  chosen_spanish: que antes había saqueado
  alternatives_spanish:
  - que había despojado antes
  - que antiguamente había saqueado
  - que antes había despojado
  lexicon: LSJ
  rationale: El imperfecto griego presenta una acción previa y característica; en español, 'había saqueado' conserva bien el contraste retrospectivo con la promesa posterior. 'Saqueado' refleja con fuerza el despojo del templo, sin suavizar el sentido.
- source_word: ἅγιον ναὸν
  english_pob_choice: the holy temple
  chosen_spanish: el santo templo
  alternatives_spanish:
  - el templo santo
  - el templo sagrado
  - el santuario santo
  lexicon: LSJ
  rationale: '''Naós'' alude al templo como espacio sagrado; ''santo templo'' mantiene el valor cultual y suena natural en español bíblico sin depender de una máscara como ''SEÑOR''.'
- source_word: καλλίστοις ἀναθήμασιν
  english_pob_choice: with the finest votive offerings
  chosen_spanish: con las más hermosas ofrendas votivas
  alternatives_spanish:
  - con las ofrendas votivas más espléndidas
  - con los más bellos dones votivos
  - con las ofrendas dedicadas más hermosas
  lexicon: LSJ
  rationale: ἀναθήματα son dones dedicados a una divinidad y colocados en un santuario; 'ofrendas votivas' preserva ese matiz. 'Las más hermosas' comunica el superlativo καλλίστοις de modo idiomático y culto.
- source_word: κοσμήσειν
  english_pob_choice: he would adorn
  chosen_spanish: lo adornaría
  alternatives_spanish:
  - lo decoraría
  - lo embellecería
  lexicon: LSJ
  rationale: '''Adornar'' mantiene la idea de embellecer con ofrendas dedicadas y conserva el tono ceremonial del pasaje.'
- source_word: τὰ ἱερὰ σκεύη
  english_pob_choice: the sacred vessels
  chosen_spanish: los utensilios sagrados
  alternatives_spanish:
  - los vasos sagrados
  - los recipientes sagrados
  - los utensilios del templo
  lexicon: LSJ
  rationale: '''σκεύη'' puede abarcar implementos/utensilios cultuales; ''utensilios sagrados'' es amplio y fiel, sin restringirse indebidamente a vasos.'
- source_word: πολυπλάσια πάντα ἀποδώσειν
  english_pob_choice: he would restore all ... many times over
  chosen_spanish: devolvería todos ... muchas veces más
  alternatives_spanish:
  - restituiría todo ... muchas veces más
  - devolvería todo ... multiplicado muchas veces
  - restituiría todos ... en medida multiplicada
  lexicon: LSJ
  rationale: La expresión comunica devolución en medida sobrada, no simple reemplazo. 'Muchas veces más' conserva la fuerza intensiva de πολυπλάσια y sugiere restitución abundante.
- source_word: τὰς δὲ ἐπιβαλλούσας πρὸς τὰς θυσίας συντάξεις
  english_pob_choice: the expenses required for the sacrifices
  chosen_spanish: los gastos necesarios para los sacrificios
  alternatives_spanish:
  - las cargas correspondientes a los sacrificios
  - las erogaciones debidas para los sacrificios
  - los costos que recaen sobre los sacrificios
  lexicon: LSJ
  rationale: '''Συντάξεις'' aquí tiene un matiz financiero; ''gastos necesarios'' expresa bien la provisión económica ligada al culto sin añadir interpretación innecesaria.'
- source_word: ἐκ τῶν ἰδίων προσόδων
  english_pob_choice: from his own revenues
  chosen_spanish: de sus propios ingresos
  alternatives_spanish:
  - de sus propias rentas
  - de sus propios recursos
  - de sus propias entradas
  lexicon: LSJ
  rationale: '''Πρόσοδοι'' alude a rentas/ingresos; ''ingresos'' es claro y natural en español contemporáneo, y ''propios'' preserva la idea de financiamiento personal/real.'
- source_word: χορηγήσειν
  english_pob_choice: he would provide
  chosen_spanish: costearía
  alternatives_spanish:
  - proveería
  - sufragaría
  - financiaría
  lexicon: LSJ
  rationale: En contexto económico-cultual, χορηγέω implica proveer a expensas propias. 'Costearía' expresa con precisión que él asumiría el gasto.
theological_decisions:
- issue: Terminología cultual del templo y los sacrificios
  english_pob_reading: Render with explicit temple/cult language ('holy temple,' 'votive offerings,' 'sacred vessels,' 'sacrifices')
  chosen_spanish_reading: 'Mantener lenguaje cultual explícito: ''santo templo'', ''ofrendas votivas'', ''utensilios sagrados'', ''sacrificios'''
  alternative_spanish_readings:
  - usar términos más generales como 'santuario', 'regalos' u 'objetos religiosos'
  rationale: El pasaje trata de la promesa de restauración del templo de Jerusalén y de su sistema sacrificial. El español debe conservar esa especificidad religiosa e histórica sin neutralizarla.
  doctrine_reference: Translation philosophy §§1, 6
translation_notes:
  revision_awareness: La redacción sigue de cerca el texto griego de Swete (1909) y el expediente auditado en inglés. Se incorporó el ajuste revisado de ἀναθήμασιν como 'ofrendas votivas' para mayor precisión, conservando el resto de las decisiones léxicas y el tono cultual explícito.
  spanish_consistency_notes:
  - Se evita 'SEÑOR' como máscara del nombre divino; este versículo no contiene el Tetragrámaton.
  - '''Santo templo'' mantiene la referencia cultual al ναός sin introducir una glosa interpretativa.'
  - '''Ofrendas votivas'' conserva el valor técnico de ἀναθήματα y no se reduce a ''regalos''.'
  - '''Utensilios sagrados'' se usa en sentido amplio para σκεύη, compatible con implementos del templo.'
  - '''Costearía'' expresa la obligación financiera implicada en χορηγήσειν y preserva el matiz económico del contexto.'
