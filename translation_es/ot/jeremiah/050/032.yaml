translation:
  language: es
  text: Y el arrogante[a] tropezará y caerá, y no habrá quien lo levante; y yo encenderé fuego en sus ciudades[b], y este consumirá todo a su alrededor.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'soberbia' o 'insolencia'; זָדוֹן suele ser abstracto, pero aquí se traduce de forma personal como 'el arrogante' porque los verbos y pronombres circundantes son masculinos singulares.
    reason: lexical_alternative
  - marker: b
    text: Hebreo 'sus ciudades'. El verso personifica a Babilonia como una figura masculina singular.
    reason: cultural_note
lexical_decisions:
- source_word: זָדוֹן
  english_pob_choice: the arrogant one
  chosen_spanish: el arrogante
  alternatives_spanish:
  - el soberbio
  - la soberbia
  - el presuntuoso
  lexicon: HALOT
  rationale: El hebreo puede ser abstracto ('soberbia', 'insolencia'), pero aquí funciona como designación personificada por los verbos y pronombres masculinos singulares. En español, 'el arrogante' conserva ese referente personal sin perder el matiz de orgullo insolente.
- source_word: כָשַׁל
  english_pob_choice: will stumble
  chosen_spanish: tropezará
  alternatives_spanish:
  - vacilará
  - tambaleará
  - tropezará y caerá
  lexicon: HALOT
  rationale: El perfectivo profético apunta a un futuro de juicio. 'Tropezará' comunica bien la idea de trastabillar como inicio de la caída, y se integra con la secuencia siguiente.
- source_word: נָפַל
  english_pob_choice: and fall
  chosen_spanish: y caerá
  alternatives_spanish:
  - y se derrumbará
  - y se desplomará
  - y caerá
  lexicon: HALOT
  rationale: Se mantiene la coordinación y la intensificación del derrumbe. 'Caerá' es directo y natural en español para la imagen de juicio.
- source_word: מֵקִים
  english_pob_choice: to raise him up
  chosen_spanish: quien lo levante
  alternatives_spanish:
  - quien lo haga ponerse en pie
  - quien lo restaure
  - quien lo levante
  lexicon: HALOT
  rationale: El participio hifil de קום expresa causar que alguien se ponga de pie. 'Levante' conserva la imagen física y evita sobreinterpretar el sentido como restauración política.
- source_word: הִצַּתִּי אֵשׁ
  english_pob_choice: I will kindle a fire
  chosen_spanish: encenderé fuego
  alternatives_spanish:
  - prenderé fuego
  - haré arder fuego
  - encenderé un fuego
  lexicon: HALOT
  rationale: El giro hebreo idiomático conserva la imagen del juicio por fuego. 'Encenderé fuego' suena natural en español y mantiene el sustantivo explícito 'fuego'.
- source_word: בְּעָרָיו
  english_pob_choice: in his cities
  chosen_spanish: en sus ciudades
  alternatives_spanish:
  - en sus urbes
  - en sus poblaciones
  lexicon: HALOT
  rationale: El sufijo masculino singular se conserva como 'sus' para reflejar la personificación de Babilonia como figura masculina singular, siguiendo el audit trail inglés.
- source_word: וְאָכְלָה
  english_pob_choice: and it will consume
  chosen_spanish: y consumirá
  alternatives_spanish:
  - y devorará
  - y lo consumirá
  - y arderá
  lexicon: HALOT
  rationale: El verbo femenino singular concuerda con 'fuego'. 'Consumirá' expresa de manera natural la acción destructiva del fuego en español.
- source_word: כָּל סְבִיבֹתָיו
  english_pob_choice: all around him
  chosen_spanish: todos los alrededores de él
  alternatives_spanish:
  - todo lo que lo rodea
  - todo a su alrededor
  - todo cuanto lo rodea
  lexicon: HALOT
  rationale: La frase señala la totalidad de lo circundante. 'Todos los alrededores de él' conserva el referente masculino singular y la amplitud del alcance del fuego, aunque suene algo más literal que una paráfrasis idiomática.
theological_decisions:
- issue: Personificación masculina singular de Babilonia / el soberbio
  english_pob_reading: Retain masculine singular reference ('the arrogant one ... him ... his cities')
  chosen_spanish_reading: Mantener el referente masculino singular ('el arrogante ... lo ... sus ciudades')
  alternative_spanish_readings:
  - Usar un referente neutro o impersonal ('la arrogancia ... sus ciudades')
  - Traducirlo como un nombre colectivo de la ciudad o imperio
  rationale: El hebreo usa formas masculinas singulares de manera consistente. Conservarlas en español evita borrar la personificación poética y la continuidad gramatical del juicio.
  doctrine_reference: Translation philosophy items 1 and 5
translation_notes:
  revision_awareness: 'El borrador sigue de cerca el audit trail inglés: mantiene la personificación masculina singular, conserva la secuencia ''tropezará y caerá'', y refleja el idiomático ''kindle a fire'' con un español natural pero textual. No hay revisiones previas aplicadas en el material fuente.'
  spanish_consistency_notes:
  - Se usa 'Yahvé' cuando el texto fuente hebreo contiene el nombre divino; este versículo no lo contiene.
  - '''Arrogante'' se eligió para preservar la personificación; no se sustituyó por una abstracción que borrara el sujeto implícito.'
  - '''Encenderé fuego'' conserva la imagen de juicio por fuego sin añadir elementos no presentes en el hebreo.'
  - Se mantuvo el masculino singular en todo el verso para reflejar la coherencia gramatical del original.
