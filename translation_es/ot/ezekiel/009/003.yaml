translation:
  language: es
  text: Y la gloria del Dios de Israel subió de encima del querubín, sobre el cual había estado, hasta el umbral de la casa[a]. Y llamó[b] al hombre vestido de lino, que tenía el estuche de escritura del escriba en su cintura[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «el umbral del templo». Aquí «casa» se refiere al edificio del templo en este contexto.
    reason: lexical_alternative
  - marker: b
    text: El hebreo también podría traducirse «y ello llamó», refiriéndose a «la gloria», pero el contexto sugiere agencia divina personal.
    reason: alternative_reading
  - marker: c
    text: O «el tintero del escriba» o «la tintera del escriba»; el hebreo designa un recipiente o estuche para escribir. Se prefirió una expresión más clara y menos arcaica en español.
    reason: lexical_alternative
lexical_decisions:
- source_word: כְבוֹד
  english_pob_choice: glory
  chosen_spanish: gloria
  alternatives_spanish:
  - presencia
  - resplandor
  lexicon: HALOT
  rationale: «Gloria» es el equivalente español más establecido para כָּבוֹד y conserva bien la manifestación visible y majestuosa de Dios en la visión de Ezequiel. «Presencia» o «resplandor» explican aspectos posibles, pero restringen demasiado el sentido.
- source_word: אֱלֹהֵי יִשְׂרָאֵל
  english_pob_choice: the God of Israel
  chosen_spanish: el Dios de Israel
  lexicon: HALOT
  rationale: La construcción posesiva se vierte de manera directa y natural en español, preservando la identificación pactual sin añadir matices no presentes en el hebreo.
- source_word: נַעֲלָה
  english_pob_choice: went up
  chosen_spanish: subió
  alternatives_spanish:
  - ascendió
  - subió hacia arriba
  lexicon: HALOT
  rationale: El verbo עלה expresa movimiento ascendente; «subió» es la opción más natural y mantiene la concreción espacial del texto visionario.
- source_word: מֵעַל
  english_pob_choice: from above
  chosen_spanish: de sobre
  alternatives_spanish:
  - de encima de
  - desde sobre
  lexicon: HALOT
  rationale: «De sobre» reproduce de forma bastante directa la relación espacial de separación respecto del querubín. En español suena algo más literal que «desde encima de», sin perder claridad.
- source_word: הַכְּרוּב
  english_pob_choice: the cherub
  chosen_spanish: el querubín
  alternatives_spanish:
  - el querube
  lexicon: HALOT
  rationale: El singular hebreo se conserva en singular. «Querubín» es la forma más reconocible y estándar en español bíblico; «querube» es menos usual.
- source_word: אֲשֶׁר הָיָה עָלָיו
  english_pob_choice: on which it had been
  chosen_spanish: sobre el cual había estado
  alternatives_spanish:
  - en el que había estado
  - sobre el que había estado
  lexicon: HALOT
  rationale: La relativa describe la ubicación previa de la gloria respecto del querubín. «Sobre el cual había estado» mantiene la relación espacial sin añadir la idea de reposo.
- source_word: מִפְתַּן הַבָּיִת
  english_pob_choice: the threshold of the house
  chosen_spanish: el umbral de la casa
  alternatives_spanish:
  - el umbral del templo
  lexicon: HALOT
  rationale: «Umbral» expresa היטב מִפְתָּן. Se conserva «casa» como en el hebreo, tal como la POB inglesa mantiene «house» con la nota contextual de que se trata del templo.
- source_word: וַיִּקְרָא
  english_pob_choice: he called
  chosen_spanish: llamó
  alternatives_spanish:
  - él llamó
  - clamó
  lexicon: HALOT
  rationale: El verbo se traduce de forma simple y directa. En español, el sujeto ya está explícito por el contexto, por lo que no es necesario repetir «él».
- source_word: הָאִישׁ
  english_pob_choice: the man
  chosen_spanish: al hombre
  alternatives_spanish:
  - al varón
  lexicon: HALOT
  rationale: «Hombre» conserva el sustantivo singular del hebreo sin convertir la figura en un mensajero genérico. La preposición acusativa se adapta naturalmente al español con «al».
- source_word: הַלָּבֻשׁ הַבַּדִּים
  english_pob_choice: clothed in linen
  chosen_spanish: vestido de lino
  alternatives_spanish:
  - revestido de lino
  - cubierto de lino
  lexicon: HALOT
  rationale: «Vestido de lino» es la forma más natural y fiel para el participio, manteniendo el tono formal y sacerdotal del retrato.
- source_word: קֶסֶת הַסֹּפֵר
  english_pob_choice: the scribe’s writing case
  chosen_spanish: la tintera del escriba
  alternatives_spanish:
  - el estuche de escritura del escriba
  - el tintero del escriba
  lexicon: HALOT
  rationale: El término designa un recipiente o estuche para escritura; la tradición española «tintero» comunica bien la función, y «tintera» mantiene el femenino que exige «cesta»/«keseṯ» en algunas versiones léxicas, aunque aquí se entiende como un implemento de escritura. Se evita «estuche» por ser más explicativo pero menos concreto.
- source_word: בְּמָתְנָיו
  english_pob_choice: at his waist
  chosen_spanish: en su cintura
  alternatives_spanish:
  - a su cintura
  - en sus lomos
  lexicon: HALOT
  rationale: «Cintura» es claro y moderno en español. «Lomos» o «riñones» serían demasiado literales o arcaicos para este contexto.
theological_decisions:
- issue: Agencia personal en וַיִּקְרָא tras «la gloria del Dios de Israel»
  english_pob_reading: Render the verb personally as 'he called' rather than impersonally as 'it called.'
  chosen_spanish_reading: «llamó» mantiene una lectura personal y no impersonal del verbo.
  alternative_spanish_readings:
  - «llamó» con sujeto tácito impersonal
  - «la gloria llamó»
  rationale: El hebreo usa una forma masculina singular y el contexto presenta la gloria como la manifestación activa del Dios de Israel. En español, dejar el sujeto tácito y traducir simplemente «llamó» preserva esa agencia personal sin forzar una aclaración que el texto no da.
  doctrine_reference: Mantener la tensión textual sin resolverla artificialmente; primacía del original con equivalencia óptima.
translation_notes:
  revision_awareness: Se siguió de cerca el audit trail inglés y no se introdujeron revisiones posteriores. La versión española conserva la estructura narrativa, la relación espacial del querubín y el umbral, y la ambigüedad controlada sobre la agencia del llamado.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» fuera del texto porque aquí el hebreo dice «Dios de Israel», no el tetragrámaton.
  - Se conservó «lino» para הַבַּדִּים por ser el equivalente tradicional y preciso en contexto sacerdotal.
  - Se evitó «templo» en el texto principal para respetar el hebreo «casa», siguiendo la nota contextual de la POB inglesa.
