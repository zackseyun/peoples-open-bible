translation:
  language: es
  text: 'Esta fue la herencia de los hijos de Gad según sus clanes: las ciudades y sus aldeas[a].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Esta es la herencia de los hijos de Gad según sus clanes: las ciudades y sus aldeas». El hebreo permite tanto el sentido presente como el pasado en esta fórmula resumida.'
    reason: alternative_reading
lexical_decisions:
- source_word: זֹאת
  english_pob_choice: This was
  chosen_spanish: Esta fue
  alternatives_spanish:
  - Esta es
  lexicon: HALOT
  rationale: El demostrativo femenino singular retoma el reparto territorial ya descrito. En español, el pasado ‘fue’ suena natural en esta fórmula de resumen, aunque el presente también sería posible.
- source_word: נַחֲלַת
  english_pob_choice: the inheritance
  chosen_spanish: la herencia
  alternatives_spanish:
  - el reparto
  - la posesión
  lexicon: HALOT
  rationale: En contextos de distribución de tierra, נַחֲלָה expresa una porción recibida por herencia/asignación. ‘Herencia’ preserva bien el matiz de posesión recibida; ‘reparto’ sería más interpretativo.
- source_word: בְּנֵי גָד
  english_pob_choice: the sons of Gad
  chosen_spanish: los hijos de Gad
  alternatives_spanish:
  - los descendientes de Gad
  - el pueblo de Gad
  lexicon: HALOT
  rationale: Se conserva la fórmula genealógica y tribal. ‘Hijos de Gad’ es el equivalente más cercano y reconocible en español bíblico.
- source_word: לְמִשְׁפְּחֹתָם
  english_pob_choice: according to their clans
  chosen_spanish: según sus clanes
  alternatives_spanish:
  - por sus familias
  - de acuerdo con sus familias
  lexicon: HALOT
  rationale: El prefijo ל indica distribución/clasificación, y מִשְׁפָּחוֹת apunta a agrupaciones familiares de nivel tribal. ‘Clanes’ comunica bien esa unidad sin caer en una traducción demasiado libre.
- source_word: הֶעָרִים
  english_pob_choice: the cities
  chosen_spanish: las ciudades
  alternatives_spanish:
  - las poblaciones
  - los pueblos
  lexicon: HALOT
  rationale: עָרִים es el término usual para los centros habitados en listas de herencia. ‘Ciudades’ mantiene el valor estándar y la simetría con la frase siguiente.
- source_word: וְחַצְרֵיהֶם
  english_pob_choice: and their villages
  chosen_spanish: y sus aldeas
  alternatives_spanish:
  - y sus poblados
  - y sus asentamientos
  - y sus granjas
  lexicon: HALOT
  rationale: חָצֵר en fórmulas territoriales suele referirse a asentamientos rurales dependientes de una ciudad. ‘Aldeas’ comunica esa relación de forma natural en español. ‘Villages’ no es el término habitual en español bíblico.
theological_decisions:
- issue: 'Fórmula resumida de cierre: presente o pasado'
  english_pob_reading: This was ... / This is ...
  chosen_spanish_reading: Esta fue ...
  alternative_spanish_readings:
  - Esta es ...
  rationale: El hebreo permite tanto sentido presente como pasado en esta fórmula sumaria. En español, el pasado encaja mejor con el flujo narrativo de Josué y con el cierre de la enumeración territorial, sin negar que una lectura de presente sea posible en el original.
  doctrine_reference: N/A
translation_notes:
  revision_awareness: La revisión inglesa más reciente indica que no hubo cambios respecto al borrador aprobado; el acuerdo con la verificación cruzada es alto. La traducción española sigue esa lectura estable sin introducir novedades interpretativas.
  spanish_consistency_notes:
  - Se mantiene ‘Yahvé’ cuando no aparece en este versículo.
  - Se preserva la fórmula tribal ‘hijos de Gad’ como equivalente directo de בְּנֵי גָד.
  - ‘Clanes’ se usa para מִשְׁפְּחֹתָם por su valor de agrupación familiar tribal.
  - ‘Aldeas’ traduce חַצְרֵיהֶם para reflejar los asentamientos dependientes asociados a las ciudades.
