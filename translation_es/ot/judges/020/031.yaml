translation:
  language: es
  text: Y los hijos de Benjamín salieron al encuentro del pueblo[a], y fueron apartados de la ciudad[b]; y comenzaron a derribar a algunos del pueblo, como en otras ocasiones[c], en las calzadas, una de las cuales sube a Betel y otra a Gibeá por campo abierto[d], como a treinta hombres de Israel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'los benjaminitas'. El hebreo dice literalmente 'los hijos de Benjamín'.
    reason: lexical_alternative
  - marker: b
    text: O 'fueron separados de la ciudad' o 'fueron atraídos lejos de la ciudad'. La idea es que fueron sacados de la protección de la ciudad.
    reason: lexical_alternative
  - marker: c
    text: O 'como antes'. El modismo hebreo compara este ataque con los anteriores del capítulo.
    reason: lexical_alternative
  - marker: d
    text: O 'en el campo abierto'. La frase probablemente describe la ruta que pasa por terreno abierto.
    reason: lexical_alternative
lexical_decisions:
- source_word: בְנֵי בִנְיָמִן
  english_pob_choice: the sons of Benjamin
  chosen_spanish: los hijos de Benjamín
  alternatives_spanish:
  - los benjaminitas
  - la gente de Benjamín
  lexicon: HALOT
  rationale: Conserva la expresión hebrea de filiación/tribu con naturalidad en español. 'Benjaminitas' sería posible, pero la forma de parentesco mantiene mejor el matiz del texto fuente y el audit trail inglés.
- source_word: לִקְרַאת הָעָם
  english_pob_choice: to meet the people
  chosen_spanish: al encuentro del pueblo
  alternatives_spanish:
  - para confrontar al pueblo
  - para encontrarse con el pueblo
  lexicon: HALOT
  rationale: '''Al encuentro'' reproduce bien el sentido direccional de לִקְרַאת. Se conserva ''el pueblo'' como equivalente directo de עָם, sin añadir ''ejército'' que no está explícito en el hebreo.'
- source_word: הָנְתְּקוּ מִן הָעִיר
  english_pob_choice: were drawn away from the city
  chosen_spanish: fueron apartados de la ciudad
  alternatives_spanish:
  - fueron arrancados de la ciudad
  - fueron atraídos lejos de la ciudad
  - fueron separados de la ciudad
  lexicon: HALOT
  rationale: '''Apartados'' comunica el desplazamiento fuera de la protección urbana sin forzar una imagen demasiado interpretativa. Mantiene la idea táctica de separación documentada en el inglés POB.'
- source_word: וַיָּחֵלּוּ
  english_pob_choice: they began
  chosen_spanish: comenzaron
  alternatives_spanish:
  - empezaron
  lexicon: HALOT
  rationale: Verbo ingesivo simple y natural en español. Evita calco y preserva el inicio de la acción.
- source_word: לְהַכּוֹת
  english_pob_choice: to strike down
  chosen_spanish: a herir
  alternatives_spanish:
  - a golpear
  - a derribar
  - a matar
  lexicon: HALOT
  rationale: En este contexto bélico 'herir' puede abarcar el golpe letal sin explicitar más de lo que el hebreo exige en esta línea. Se evita añadir una interpretación excesivamente cerrada donde el texto solo señala el ataque.
- source_word: מֵהָעָם
  english_pob_choice: some of the people
  chosen_spanish: a algunos del pueblo
  alternatives_spanish:
  - a parte del pueblo
  - a algunos del ejército
  - a algunos entre el pueblo
  lexicon: HALOT
  rationale: El מן partitivo se refleja con 'a algunos', conservando que no se trata de todo el grupo. 'Del pueblo' sigue la equivalencia directa de עָם.
- source_word: כְּפַעַם בְּפַעַם
  english_pob_choice: as at other times
  chosen_spanish: como en otras ocasiones
  alternatives_spanish:
  - como antes
  - una y otra vez
  - como de costumbre
  lexicon: HALOT
  rationale: La frase idiomática compara esta embestida con ataques previos. 'Como en otras ocasiones' es claro y mantiene el sentido repetitivo sin perder la referencia histórica del capítulo.
- source_word: בַּמְסִלּוֹת
  english_pob_choice: on the highways
  chosen_spanish: en los caminos
  alternatives_spanish:
  - en las carreteras
  - en los caminos altos
  - en los caminos principales
  lexicon: HALOT
  rationale: '''Caminos'' es idiomático y comprensible en español. Aunque מְסִלּוֹת puede sugerir vías elevadas o principales, aquí el énfasis topográfico ya se explicita en las dos rutas siguientes.'
- source_word: אַחַת עֹלָה בֵית אֵל
  english_pob_choice: one of which goes up to Bethel
  chosen_spanish: uno de los cuales sube a Betel
  alternatives_spanish:
  - uno que sube a Betel
  - uno de los cuales va hacia Betel
  - uno de los cuales asciende a Betel
  lexicon: HALOT
  rationale: '''Sube'' traduce el valor topográfico de עֹלָה de manera natural en español bíblico contemporáneo. Se mantiene la estructura relativa del hebreo y del inglés POB.'
- source_word: וְאַחַת גִּבְעָתָה בַּשָּׂדֶה
  english_pob_choice: and one to Gibeah in the open country
  chosen_spanish: y otro a Gibeá, en el campo
  alternatives_spanish:
  - y uno a Gibeá, en el campo abierto
  - y otro a Gibeá, en la campiña
  - y uno a Gibeá, en la tierra abierta
  lexicon: HALOT
  rationale: '''En el campo'' reproduce la lectura topográfica de בַּשָּׂדֶה y sigue la alternativa que el inglés POB documenta. ''Gibeá'' conserva el nombre propio en forma castellana usual.'
- source_word: כִּשְׁלֹשִׁים אִישׁ בְּיִשְׂרָאֵל
  english_pob_choice: about thirty men of Israel
  chosen_spanish: como a treinta hombres de Israel
  alternatives_spanish:
  - unos treinta hombres de Israel
  - aproximadamente treinta hombres de Israel
  - como treinta hombres de Israel
  lexicon: HALOT
  rationale: '''Como a treinta'' refleja la aproximación de כִּ con buena naturalidad en español. ''Hombres de Israel'' conserva el marcado antropológico/nacional del hebreo, evitando una neutralización innecesaria.'
theological_decisions:
- issue: Traducción de עָם en un contexto militar
  english_pob_reading: the people
  chosen_spanish_reading: el pueblo
  alternative_spanish_readings:
  - el ejército
  - la gente
  - la multitud
  rationale: El hebreo usa עָם, y el inglés POB mantiene 'the people' aunque el contexto sea militar. En español, 'el pueblo' preserva esa correspondencia lexical y deja que el contexto narrativo indique que se trata de los combatientes de Israel.
  doctrine_reference: No doctrinal issue; lexical-contextual consistency with the source text.
- issue: Valor de בַּשָּׂדֶה en la descripción de la ruta
  english_pob_reading: in the open country
  chosen_spanish_reading: en el campo
  alternative_spanish_readings:
  - en campo abierto
  - en la campiña
  - en terreno abierto
  rationale: La frase describe la localización de la ruta de Gibeá fuera del ámbito urbano. 'En el campo' es breve y fiel; mantiene la ambigüedad topográfica sin sobreexplicarla ni convertirla en un comentario interpretativo.
  doctrine_reference: No doctrinal issue; geographical/topographical rendering.
translation_notes:
  revision_awareness: La redacción sigue el estado revisado del POB inglés que eliminó 'as slain' por ser poco natural y poco claro. Por eso el español evita añadir un equivalente redundante o interpretativo; se conserva la secuencia de ataque y la cifra aproximada sin expandir el resultado más allá de lo que el hebreo expresa aquí.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' como norma del proyecto solo cuando el texto lo requiere; este versículo no contiene el tetragrámaton.
  - Se eligió 'hijos de Benjamín' por transparencia semántica y coherencia con el audit trail inglés, aunque 'benjaminitas' es una alternativa válida.
  - Se evitó 'señor/señores' o lenguaje eclesiástico no presente en el original.
  - La puntuación conserva el paralelismo narrativo del hebreo con puntos y coma, útil para lectura pública.
  - Se usó 'Gibeá' como forma castellana habitual del topónimo, alineada con el nombre propio del texto fuente.
