translation:
  language: es
  text: Nuestros perseguidores eran más veloces que las águilas de los cielos[a]; sobre los montes nos persiguieron; en la soledad nos acecharon.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «las águilas del cielo»; el hebreo נֶשֶׁר puede referirse también a un buitre en algunos contextos.
    reason: lexical_alternative
lexical_decisions:
- source_word: קַלִּים
  english_pob_choice: swifter
  chosen_spanish: más veloces
  alternatives_spanish:
  - más rápidos
  - más ligeros
  lexicon: HALOT
  rationale: El hebreo expresa una comparación de velocidad; en español, «más veloces» mantiene el valor comparativo y el tono poético sin sonar forzado.
- source_word: רֹדְפֵינוּ
  english_pob_choice: our pursuers
  chosen_spanish: nuestros perseguidores
  alternatives_spanish:
  - los que nos perseguían
  - nuestros perseguidoras
  lexicon: HALOT
  rationale: «Perseguidores» conserva el sustantivo agentivo del hebreo y la relación posesiva explícita («nuestros»), igual que en la traducción inglesa auditada.
- source_word: מִנִּשְׁרֵי שָׁמָיִם
  english_pob_choice: the eagles of the heavens
  chosen_spanish: las águilas de los cielos
  alternatives_spanish:
  - las águilas del cielo
  - los buitres de los cielos
  lexicon: HALOT
  rationale: Se mantiene «águilas» como imagen convencional de rapidez, y «de los cielos» refleja de modo más literal el genitivo hebreo y el registro elevado del verso.
- source_word: עַל הֶהָרִים
  english_pob_choice: on the mountains
  chosen_spanish: sobre los montes
  alternatives_spanish:
  - en los montes
  - sobre las montañas
  lexicon: HALOT
  rationale: «Sobre los montes» conserva la preposición local y el paralelismo poético; «montes» suena más bíblico y natural que una repetición demasiado moderna de «montañas».
- source_word: דְּלָקֻנוּ
  english_pob_choice: they pursued us
  chosen_spanish: nos persiguieron
  alternatives_spanish:
  - nos dieron caza
  - nos acosaron
  lexicon: HALOT
  rationale: El verbo דלק aquí corresponde a perseguir; «nos persiguieron» sigue de cerca el valor léxico y mantiene coherencia con «nuestros perseguidores».
- source_word: בַּמִּדְבָּר
  english_pob_choice: in the wilderness
  chosen_spanish: en el desierto
  alternatives_spanish:
  - en la estepa
  - en el páramo
  lexicon: HALOT
  rationale: Aunque «wilderness» puede abarcar una zona más amplia, «desierto» es la equivalencia española más clara y pública para este contexto poético.
- source_word: אָרְבוּ לָנוּ
  english_pob_choice: they lay in wait for us
  chosen_spanish: nos tendieron emboscadas
  alternatives_spanish:
  - nos acecharon
  - estuvieron al acecho de nosotros
  lexicon: HALOT
  rationale: El verbo ארב denota ponerse en acecho/emboscada. «Nos tendieron emboscadas» expresa con precisión la acción estratégica y evita suavizarla en exceso.
translation_notes:
  revision_awareness: La versión española sigue el texto hebreo directamente y toma como apoyo la solución inglesa auditada, especialmente la comparación de rapidez, la imagen de las águilas, y la progresión verbal entre perseguir y tender emboscadas. Se optó por una redacción más natural en español sin perder el paralelismo ni la tensión semántica del original.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» no aplicable aquí, ya que el verso no contiene el nombre divino.
  - 'Se preservó la imagen poética y la secuencia verbal: rapidez comparativa, persecución en los montes y emboscada en el desierto.'
  - «Desierto» se eligió como equivalente comunicativamente claro de מִדְבָּר, sin eliminar la amplitud semántica de «wilderness» en el comentario de decisión.
