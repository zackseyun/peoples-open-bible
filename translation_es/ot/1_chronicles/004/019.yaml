base_translation:
  language: en
  yaml_path: translation/ot/1_chronicles/004/019.yaml
  text: And the sons of the wife of Hodiah[a], the sister of Naham[b], were the father of Keilah the Garmite and Eshtemoa the Maacathite.
  footnotes:
  - marker: a
    text: Hebrew 'father of' in genealogies can mean founder, ancestor, or clan-head, not only immediate biological father.
    reason: lexical_alternative
  - marker: b
    text: Because the Hebrew says 'sons' but then uses singular 'father of,' the line is compressed and may summarize a clan relationship rather than a simple father-son sequence.
    reason: cultural_note
