  - marker: a
    text: 'El hebreo repite el verbo «hacer» para enfatizar la obediencia: «Y Noé hizo ... así lo hizo».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «Y Noé hizo esto;».'
    reason: previous_rendering
  revision_rationale: Se corrige la nota [b] para alinearla exactamente con la auditoría inglesa y se ajusta levemente la redacción principal a un español más natural, manteniendo la repetición enfática del hebreo.
