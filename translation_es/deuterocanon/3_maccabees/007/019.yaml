  source_alignment_summary: 'El borrador español conserva en general la estructura y el sentido del griego: regreso/llegada en paz, acompañada de acciones de gracias apropiadas, seguido de la decisión de observar esos días como días alegres durante toda su condición de residencia temporal. Sin embargo, introduce dos problemas importantes: ancla las notas al lugar equivocado y usa «sojournación», que no es español natural ni eclesialmente legible. Además, «con paz» es menos idiomático que «en paz» para μετʼ εἰρήνης.'
  spanish_quality_summary: La redacción es mayormente clara, pero «sojournación» es un anglicismo impropio y reduce seriamente la legibilidad. También conviene mejorar la naturalidad con «en paz» y «acciones de gracias debidas» o «apropiadas». La sintaxis global es buena y «resolvieron observar estos días como días de alegría» comunica bien ἔστησαν… ἄγειν… εὐφροσύνους.
  glossary_alignment: No hay términos teológicos de proyecto en juego aquí. La decisión clave es παροικία, que debe reflejar residencia temporal/como extranjeros sin forzar «exilio». En español conviene expresarlo con una formulación natural como «su residencia temporal» o «su estancia como extranjeros», con nota cultural si se desea preservar el matiz de forasteros. El borrador falla al intentar conservarlo mediante «sojournación».
  issues:
  - severity: high
    issue: Uso de «sojournación»
    rationale: No es español natural ni ampliamente comprensible. No preserva bien la legibilidad requerida y suena a calco/anglicismo innecesario. El matiz de παροικία puede preservarse mejor con una frase española natural y una nota.
  - severity: medium
    issue: Notas al pie ancladas a frases incorrectas
    rationale: La nota sobre confesiones/acciones de gracias debe ir en «acciones de gracias», no en «paz». La nota cultural sobre παροικία debe anclarse a la expresión que la traduce, no a «acciones de gracias». Esto afecta la fidelidad del aparato crítico.
  - severity: medium
    issue: «con paz» es menos idiomático que «en paz»
    rationale: Aunque posible como calco formal, «en paz» expresa mejor μετʼ εἰρήνης en español bíblico natural y coincide con el valor modal/estativo del original.
  revised_spanish_text: Y después de haber sido conducidos en paz, con las acciones de gracias apropiadas[a], también allí resolvieron observar estos días como días de alegría, durante todo el tiempo de su residencia temporal[b].
  revised_footnotes:
  - marker: a
    text: O «con las debidas confesiones». El griego puede significar confesión o acción de gracias; el contexto festivo favorece «acciones de gracias».
    reason: lexical_alternative
  - marker: b
    text: «Residencia temporal» refleja la idea griega de vivir como residentes temporales o extranjeros, no necesariamente de estar en un exilio formal.
    reason: cultural_note
