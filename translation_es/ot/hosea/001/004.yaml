translation:
  language: es
  text: 'Entonces Yahvé le dijo: «Ponle por nombre Jezreel, porque dentro de poco castigaré a la casa de Jehú por la sangre de Jezreel[a], y pondré fin al reino de la casa de Israel».[b]'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «por el derramamiento de sangre de Jezreel» o «por la culpabilidad de sangre de Jezreel». El hebreo dice literalmente «las sangres de Jezreel».'
    reason: lexical_alternative
  - marker: b
    text: Jezreel es a la vez el nombre simbólico del niño y el nombre del lugar asociado con los actos violentos de Jehú.
    reason: cultural_note
lexical_decisions:
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: Se conserva el nombre propio divino del Tetragrámaton con la forma española estándar del proyecto, en lugar de sustituirlo por un título. Esto sigue la decisión auditada de preservar el nombre personal de Dios.
- source_word: קְרָא שְׁמוֹ
  english_pob_choice: Call his name
  chosen_spanish: Llama su nombre
  alternatives_spanish:
  - Ponle por nombre
  - Nómbralo
  lexicon: HALOT
  rationale: La construcción hebrea con ‘llamar nombre’ se mantiene de manera natural en español. ‘Ponle por nombre’ es posible, pero ‘llama su nombre’ conserva mejor el giro idiomático del original.
- source_word: יִזְרְעֶאל
  english_pob_choice: Jezreel
  chosen_spanish: Jezreel
  alternatives_spanish:
  - Yizreel
  lexicon: HALOT
  rationale: Es un nombre propio transliterado. Se mantiene la forma bíblica tradicional y reconocible en español.
- source_word: כִּי עוֹד מְעַט
  english_pob_choice: for in a little while
  chosen_spanish: porque dentro de poco
  alternatives_spanish:
  - porque por un poco más de tiempo
  - porque aún un poco
  lexicon: HALOT
  rationale: ‘Porque’ reproduce la fuerza explicativa de כִּי, y ‘dentro de poco’ comunica bien la inminencia temporal sin sonar arcaico.
- source_word: וּפָקַדְתִּי
  english_pob_choice: I will punish
  chosen_spanish: castigaré
  alternatives_spanish:
  - visitaré
  - llamaré a cuentas
  lexicon: HALOT
  rationale: En este contexto judicial, פקד tiene fuerza punitiva. ‘Castigaré’ es la opción más directa y natural en español, preservando el juicio anunciado sin perder el matiz de intervención divina.
- source_word: דְּמֵי יִזְרְעֶאל
  english_pob_choice: the bloodshed of Jezreel
  chosen_spanish: la sangre derramada en Jezreel
  alternatives_spanish:
  - la sangre de Jezreel
  - la culpabilidad por la sangre de Jezreel
  - la sangre derramada de Jezreel
  lexicon: HALOT
  rationale: El hebreo literal ‘las sangres de Jezreel’ contiene una idiomaticidad que en español se expresa con claridad como ‘la sangre derramada en Jezreel’. Esta opción conserva el sentido de violencia derramada y evita una literalidad extraña.
- source_word: עַל בֵּית יֵהוּא
  english_pob_choice: the house of Jehu
  chosen_spanish: la casa de Jehú
  alternatives_spanish:
  - la dinastía de Jehú
  - la familia de Jehú
  lexicon: HALOT
  rationale: ‘Casa’ reproduce el valor dinástico del hebreo. ‘Jehú’ mantiene el nombre propio con acento español habitual; la estructura no se suaviza a ‘dinastía’ para no perder el eco bíblico de ‘casa’.
- source_word: וְהִשְׁבַּתִּי
  english_pob_choice: I will put an end to
  chosen_spanish: pondré fin a
  alternatives_spanish:
  - haré cesar
  - acabaré con
  lexicon: HALOT
  rationale: El hiphil de שבת expresa causar el cese. ‘Pondré fin a’ es idiomático y fuerte en español, y conserva la idea de terminación judicial.
- source_word: מַמְלְכ֖וּת בֵּ֥ית יִשְׂרָאֵל
  english_pob_choice: the kingdom of the house of Israel
  chosen_spanish: el reino de la casa de Israel
  alternatives_spanish:
  - el reino de Israel
  - la realeza de la casa de Israel
  lexicon: HALOT
  rationale: Se conserva la cadena constructa y el sustantivo ‘casa’, porque el texto apunta a una estructura nacional/dinástica concreta. ‘Reino de Israel’ sería más fluido, pero perdería parte de la forma del hebreo.
theological_decisions:
- issue: Juicio sobre la casa de Jehú y la tensión histórica-teológica
  english_pob_reading: Announces divine punishment on Jehu's house for the bloodshed associated with Jezreel, without resolving the broader historical-theological debate.
  chosen_spanish_reading: Anuncia el castigo divino sobre la casa de Jehú por la sangre derramada en Jezreel, sin resolver la relación más amplia con la comisión anterior de Jehú en 2 Reyes 9–10.
  alternative_spanish_readings:
  - Interpretar el texto como condena total del acto de Jehú como pecado en sí mismo
  - Interpretar el texto como condena sólo de la dinastía posterior por continuar la violencia o la idolatría
  rationale: 'La traducción debe dejar en pie la tensión del texto: Dios anuncia juicio, pero el versículo no explica por sí mismo cómo se integra con la comisión previa dada a Jehú. Se evita armonizar o polemizar más allá de lo que el hebreo dice.'
  doctrine_reference: Preservar la tensión teológica sin resolverla artificialmente.
translation_notes:
  revision_awareness: El borrador sigue de cerca la lectura auditada en inglés y no requiere ajustes respecto de la última revisión, que quedó sin cambios. Se mantuvo la decisión de traducir פקד como verbo punitivo y de preservar la tensión histórica-teológica sobre la casa de Jehú.
  spanish_consistency_notes:
  - Se usa ‘Yahvé’ de manera consistente para יְהוָה.
  - Se conserva ‘casa’ para בית, siguiendo el valor dinástico del hebreo.
  - Se mantiene ‘Jezreel’ como nombre propio sin traducir.
  - Se evita el sustituto litúrgico ‘SEÑOR’ para el Tetragrámaton.
  - La puntuación y la sintaxis buscan una lectura natural en español sin perder la estructura del original.
