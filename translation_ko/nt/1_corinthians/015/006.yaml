  text: ἔπειτα ὤφθη ἐπάνω πεντακοσίοις ἀδελφοῖς ἐφάπαξ, ἐξ ὧν οἱ ⸀πλείονες μένουσιν ἕως ἄρτι, τινὲς ⸀δὲ ἐκοιμήθησαν·
base_translation:
  language: en
  yaml_path: translation/nt/1_corinthians/015/006.yaml
  text: Then he appeared to more than five hundred brothers at one time[a], most of whom remain until now[b], though some have fallen asleep.
  footnotes:
  - marker: a
    text: Or 'brothers and sisters'; the Greek says 'brothers,' which in early Christian usage can sometimes refer to the wider community of believers.
    reason: lexical_alternative
  - marker: b
    text: That is, they have died. Paul uses 'fallen asleep,' a common early Christian expression for death in light of the hope of resurrection.
    reason: lexical_alternative
translation:
  language: ko
  text: 그 후에 한꺼번에 오백 명이 넘는 형제들에게 보이셨는데, 그들 중 대다수는 지금도 살아 있고, 어떤 이들은 잠들었습니다.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 「잠들었다」는 부활의 소망 안에서 신자의 죽음을 가리키는 신약의 정형 표현이다.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐκοιμήθησαν
  english_pob_choice: fallen asleep
  chosen_korean: 잠들었다
  alternatives_korean:
