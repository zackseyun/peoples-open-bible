    reason: lexical_alternative
  revision_rationale: Se corrige מִמְסָךְ a «vino mezclado» para preservar el referente léxico de la bebida, en línea con la evidencia hebrea y el audit trail inglés, dejando la interpretación cultual en nota. También se reubican los marcadores de nota sobre Gad, Meni y la bebida mezclada para que coincidan exactamente con sus notas.
