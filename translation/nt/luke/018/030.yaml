id: LUK.18.30
reference: Luke 18:30
source:
  edition: SBLGNT
  text: ὃς ⸀οὐχὶ μὴ ⸀ἀπολάβῃ πολλαπλασίονα ἐν τῷ καιρῷ τούτῳ καὶ ἐν τῷ αἰῶνι τῷ ἐρχομένῳ ζωὴν αἰώνιον.
translation:
  text: who will certainly receive many times more in this time[a], and in the age to come, eternal life.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'the age to come.'
    reason: alternative_reading
lexical_decisions:
- source_word: οὐχὶ μὴ
  chosen: will certainly not fail to
  alternatives:
  - will surely
  - will by no means
  - will certainly
  lexicon: BDAG
  rationale: 'The emphatic negation οὐχὶ μὴ with the aorist subjunctive strongly conveys certainty. In English, a bare double negative is unnatural, so the force is represented idiomatically as a strong assurance: ''will certainly not fail to.'''
- source_word: ἀπολάβῃ
  chosen: receive
  alternatives:
  - receive back
  - get back
  - obtain
  lexicon: BDAG
  rationale: ἀπολαμβάνω can mean 'receive back' or 'receive.' In this context of recompense for what was left behind, 'receive' is natural English and fits the sense of recompense without overpressing the prefix. The idea of return/recompense is already carried by the broader context.
- source_word: πολλαπλασίονα
  chosen: many times more
  alternatives:
  - manifold more
  - much more
  - many times as much
  lexicon: BDAG
  rationale: The comparative/neuter plural expression denotes a multiplied return. 'Many times more' is clear modern English and preserves the sense of abundance better than archaic 'manifold more.'
- source_word: καιρῷ
  chosen: time
  alternatives:
  - season
  - present time
  lexicon: BDAG
  rationale: καιρός often denotes a particular time or season. With τούτῳ, 'this time' is a natural rendering and preserves the contrast with 'the age that is coming.'
- source_word: αἰῶνι τῷ ἐρχομένῳ
  chosen: the age that is coming
  alternatives:
  - the coming age
  - the age to come
  lexicon: BDAG
  rationale: This phrase refers to the eschatological future order. 'The age that is coming' is slightly more transparent to the participial structure while remaining natural English. 'The age to come' is a common alternative and worth preserving in a footnote.
- source_word: ζωὴν αἰώνιον
  chosen: eternal life
  alternatives:
  - life of the age
  - everlasting life
  lexicon: BDAG
  rationale: This is the standard and contextually appropriate rendering in the Gospels. While αἰώνιος can be understood in relation to 'the age,' 'eternal life' best communicates the established eschatological sense in idiomatic English.
- source_word: ὃς
  chosen: who
  alternatives:
  - whoever
  lexicon: BDAG
  rationale: The relative pronoun refers back to the person described in the previous verse. 'Who' fits the syntactic continuation better than the more generalized 'whoever.'
