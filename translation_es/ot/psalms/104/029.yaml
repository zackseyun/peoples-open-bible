translation:
  language: es
  text: Tú escondes tu rostro[a], y ellos se espantan; les quitas el aliento[b], mueren y vuelven a su polvo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «tu presencia». El hebreo «tu rostro» es una manera común de hablar de la presencia personal o del favor de Dios.
    reason: lexical_alternative
  - marker: b
    text: O «su espíritu». רוּחַ puede significar «aliento», «viento» o «espíritu»; aquí el contexto de morir y volver al polvo favorece «aliento».
    reason: lexical_alternative
lexical_decisions:
- source_word: תַּסְתִּיר
  english_pob_choice: hide
  chosen_spanish: escondes
  alternatives_spanish:
  - ocultas
  - escondes
  lexicon: HALOT
  rationale: El verbo hebreo en hiphil expresa ocultar o esconder. «Escondes» comunica bien la acción divina y suena natural en español, manteniendo la imagen relacional del rostro retirado.
- source_word: פָּנֶיךָ
  english_pob_choice: your face
  chosen_spanish: tu rostro
  alternatives_spanish:
  - tu cara
  - tu presencia
  lexicon: HALOT
  rationale: La expresión es literalmente «tu rostro». En español, «rostro» preserva mejor el tono poético y la corporeidad de la imagen que «cara». «Presencia» queda como alternativa interpretativa en nota.
- source_word: יִבָּהֵלוּן
  english_pob_choice: are terrified
  chosen_spanish: se espantan
  alternatives_spanish:
  - se aterrorizan
  - quedan consternados
  - se turban
  lexicon: HALOT
  rationale: El nifal de בהל comunica alarma fuerte, pánico o consternación. «Se espantan» es idiomático, vigoroso y suficientemente fuerte para el contexto poético.
- source_word: תֹּסֵף
  english_pob_choice: take away
  chosen_spanish: les quitas
  alternatives_spanish:
  - retiras
  - tomas de nuevo
  - remueves
  lexicon: HALOT
  rationale: Con רוּחָם como objeto, el verbo expresa retirar o quitar la fuerza de vida. «Les quitas» sigue de cerca el sentido de retirada y funciona con naturalidad en español.
- source_word: רוּחָם
  english_pob_choice: their breath
  chosen_spanish: el aliento
  alternatives_spanish:
  - su respiración
  - su espíritu
  - su vida
  lexicon: HALOT
  rationale: En este contexto de morir y volver al polvo, «aliento» preserva el sentido de la fuerza vital y evita afirmar sin necesidad una antropología más específica. «Espíritu» queda como alternativa semántica en nota.
- source_word: יִגְוָעוּן
  english_pob_choice: they die
  chosen_spanish: mueren
  alternatives_spanish:
  - perecen
  - expiran
  lexicon: HALOT
  rationale: El verbo גוע describe expirar o morir. «Mueren» es la equivalencia más directa y clara en español, adecuada para el paralelismo poético.
- source_word: עֲפָרָם
  english_pob_choice: their dust
  chosen_spanish: su polvo
  alternatives_spanish:
  - su tierra
  - el polvo de ellos
  lexicon: HALOT
  rationale: Aunque literalmente es «su polvo», «su polvo» en español transmite bien la idea de retorno mortal y mantiene el vínculo con el polvo de la creación. «Polvo» es el término más natural y tradicionalmente comprensible.
- source_word: יְשׁוּבוּן
  english_pob_choice: return
  chosen_spanish: vuelven
  alternatives_spanish:
  - regresan
  - retornan
  lexicon: HALOT
  rationale: שוב expresa volver o regresar. «Vuelven» conserva el movimiento final del verso y su tono poético, sin sobrecargarlo con un registro más elevado.
theological_decisions:
- issue: Antropomorfismo de «rostro» de Dios
  english_pob_reading: your face
  chosen_spanish_reading: tu rostro
  alternative_spanish_readings:
  - tu presencia
  rationale: Se conserva la imagen concreta del hebreo, porque el texto usa el antropomorfismo con fuerza poética. «Tu presencia» es una glosa válida, pero en el texto principal suavizaría la imagen original.
  doctrine_reference: Primacía del texto original y equivalencia óptima
- issue: Sentido de רוּחָם en un contexto de muerte
  english_pob_reading: their breath
  chosen_spanish_reading: el aliento
  alternative_spanish_readings:
  - su espíritu
  - su vida
  rationale: En el paralelismo con morir y volver al polvo, «aliento» expresa la fuerza vital retirada por Dios sin resolver la tensión entre aliento, espíritu y vida. Esto preserva la ambigüedad productiva del hebreo.
  doctrine_reference: Mantener tensión lexical y teológica del original
- issue: Relación entre morir y volver al polvo
  english_pob_reading: they die and return to their dust
  chosen_spanish_reading: mueren y vuelven a su polvo
  alternative_spanish_readings:
  - perecen y regresan a su polvo
  rationale: La formulación conserva el paralelismo y la resonancia de Génesis sobre el retorno al polvo. No se explicita más allá de lo que el verso dice.
  doctrine_reference: Intertextualidad creatural de Génesis 3:19
translation_notes:
  revision_awareness: La redacción sigue de cerca el sentido consolidado en el audit trail inglés, manteniendo la equivalencia óptima y la misma resolución principal para פָּנֶיךָ y רוּחָם. No se registraron revisiones posteriores que alteren el criterio de traducción.
  spanish_consistency_notes:
  - Se mantiene «rostro» para פָּנֶיךָ y «aliento» para רוּחָם, con notas que preservan las alternativas semánticas.
  - El tono es poético y bíblico, pero en español moderno y claro.
  - «Polvo» se conserva como imagen de mortalidad, en paralelo con la creación y el retorno de las criaturas a su origen.
