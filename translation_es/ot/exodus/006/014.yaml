translation:
  language: es
  text: 'Estos son los jefes de sus casas paternas: los hijos de Rubén, el primogénito de Israel: Hanoj, Palú, Hezrón y Carmi. Estos son los clanes[a] de Rubén.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «familias de Rubén».
    reason: lexical_alternative
lexical_decisions:
- source_word: אֵלֶּה
  english_pob_choice: These are
  chosen_spanish: Estos son
  alternatives_spanish:
  - Estos
  lexicon: HALOT
  rationale: El demostrativo plural introduce una lista genealógica; en español, «Estos son» suena natural y conserva el valor deíctico y copulativo implícito del hebreo.
- source_word: רָאשֵׁי
  english_pob_choice: heads of
  chosen_spanish: jefes de
  alternatives_spanish:
  - cabezas de
  - líderes de
  lexicon: HALOT
  rationale: En construcción con «casa paterna», el término señala a los representantes principales de cada unidad familiar. «Jefes de» mantiene la metáfora de liderazgo sin resultar forzado en español.
- source_word: בֵית אֲבֹתָם
  english_pob_choice: their fathers’ houses
  chosen_spanish: sus casas paternas
  alternatives_spanish:
  - sus casas de sus padres
  - sus casas ancestrales
  - sus familias paternas
  lexicon: HALOT
  rationale: «Casa paterna» es una fórmula genealógica bien establecida y más fiel que reducirla a «familias». Conserva la referencia a la unidad doméstica/linajuda transmitida por línea paterna.
- source_word: בְּנֵי רְאוּבֵן
  english_pob_choice: the sons of Reuben
  chosen_spanish: los hijos de Rubén
  alternatives_spanish:
  - los hijos de Reuben
  - los descendientes de Rubén
  lexicon: HALOT
  rationale: En una lista inmediata de nombres, «hijos de» reproduce mejor la relación genealógica directa que «descendientes». Se usa la forma española habitual «Rubén».
- source_word: בְּכֹר יִשְׂרָאֵל
  english_pob_choice: the firstborn of Israel
  chosen_spanish: el primogénito de Israel
  alternatives_spanish:
  - el primero en nacer de Israel
  - el hijo primogénito de Israel
  lexicon: HALOT
  rationale: «Primogénito» conserva la relación de primacía por nacimiento y el tono genealógico formal del hebreo y del audit trail inglés.
- source_word: חֲנוֹךְ
  english_pob_choice: Hanoch
  chosen_spanish: Hanoj
  alternatives_spanish:
  - Hanoch
  lexicon: HALOT
  rationale: Se adapta al español la transliteración tradicional del nombre propio, manteniendo la pronunciación aproximada y la inteligibilidad eclesial.
- source_word: וּפַלּוּא
  english_pob_choice: and Pallu
  chosen_spanish: Palú
  alternatives_spanish:
  - Pallu
  - Falú
  lexicon: HALOT
  rationale: Se opta por la forma española del nombre propio sin repetir la conjunción en la lista final, que en español queda naturalmente coordinada por comas. La adaptación «Palú» responde a uso bíblico español y a la pronunciación aproximada.
- source_word: חֶצְרוֹן
  english_pob_choice: Hezron
  chosen_spanish: Hezrón
  alternatives_spanish:
  - Jezrón
  - Hezron
  lexicon: HALOT
  rationale: Se usa la transliteración española habitual del nombre propio, conservando la acentuación gráfica para lectura clara en español.
- source_word: וְכַרְמִי
  english_pob_choice: and Carmi
  chosen_spanish: y Carmi
  alternatives_spanish:
  - y Carmi
  - y Karmi
  lexicon: HALOT
  rationale: Se preserva el nombre propio con forma breve y reconocible; «y» expresa la coordinación final de la lista.
- source_word: מִשְׁפְּחֹת
  english_pob_choice: clans
  chosen_spanish: familias
  alternatives_spanish:
  - clanes
  - linajes
  lexicon: HALOT
  rationale: Aunque «clanes» refleja con más precisión la unidad socio-genealógica, en español bíblico «familias» sigue siendo la equivalencia más transparente y natural para este cierre genealógico. Se conserva así la opción del audit trail inglés como posible alternativa implícita.
- source_word: רְאוּבֵן
  english_pob_choice: Reuben
  chosen_spanish: Rubén
  alternatives_spanish:
  - Reuben
  lexicon: HALOT
  rationale: Nombre propio bíblico en su forma española estándar.
translation_notes:
  revision_awareness: Se corrigió el problema de validación anterior asegurando que el marcador [a] aparezca explícitamente en el texto español. La nota conserva la alternativa léxica documentada por el audit trail inglés para מִשְׁפְּחֹת.
  spanish_consistency_notes:
  - Se mantiene un registro genealógico sobrio y publicable, sin añadir interpretaciones no sustentadas por el hebreo.
  - Se usa «Rubén» de manera consistente para el nombre propio y «Hanoj», «Palú», «Hezrón» como transliteraciones españolas legibles.
  - Se conserva la distinción entre «casas paternas» y «familias», dejando la nota para la alternativa léxica documentada.
