translation:
  language: es
  text: 'Al director del coro: con instrumentos de cuerda. Un Maskil[a] de David[b].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «un salmo instructivo» o «una canción contemplativa»; el sentido preciso de Maskil en los encabezamientos de salmos es incierto.'
    reason: lexical_alternative
  - marker: b
    text: La expresión «de David» también puede significar «por David» o «para David».
    reason: alternative_reading
lexical_decisions:
- source_word: לַמְנַצֵּחַ
  english_pob_choice: For the choirmaster
  chosen_spanish: Al director del coro
  alternatives_spanish:
  - Para el director del coro
  - Al maestro de música
  lexicon: HALOT
  rationale: El participio en encabezamientos de salmos señala al responsable musical o litúrgico. 'Director del coro' comunica esa función en español actual sin recurrir a una forma demasiado arcaica. La preposición ל se expresa aquí como dirección/dedicación con 'al'.
- source_word: בִּנְגִינֹת
  english_pob_choice: with stringed instruments
  chosen_spanish: con instrumentos de cuerda
  alternatives_spanish:
  - sobre instrumentos de cuerda
  - con música de cuerda
  lexicon: HALOT
  rationale: El término alude a acompañamiento con cuerdas o melodía ejecutada con instrumentos de cuerda. 'Con instrumentos de cuerda' es natural en español y conserva el valor instrumental del encabezamiento.
- source_word: מַשְׂכִּיל
  english_pob_choice: A Maskil
  chosen_spanish: Un Maskil
  alternatives_spanish:
  - Un salmo instructivo
  - Una canción contemplativa
  lexicon: HALOT
  rationale: La fuerza exacta de מַשְׂכִּיל en los títulos de salmos es incierta y funciona como término técnico/genérico. Se preserva la transliteración 'Maskil' en el texto principal para no resolver indebidamente la ambigüedad; las alternativas se explicitan en la nota.
- source_word: לְדָוִד
  english_pob_choice: of David
  chosen_spanish: de David
  alternatives_spanish:
  - por David
  - para David
  - a David
  lexicon: HALOT
  rationale: La preposición ל en los encabezamientos puede indicar autoría, pertenencia, dedicación o asociación. 'De David' mantiene esa ambigüedad mejor que una opción más fuerte como 'por David'.
theological_decisions:
- issue: Relación de David con el salmo en el encabezamiento
  english_pob_reading: of David
  chosen_spanish_reading: de David
  alternative_spanish_readings:
  - por David
  - para David
  rationale: El hebreo no obliga a precisar una sola relación. 'De David' conserva la tensión interpretativa y evita afirmar con más fuerza de la que exige el texto si el salmo fue escrito, dedicado o asociado a David.
  doctrine_reference: 'Translation philosophy §3: preservar la tensión teológica e histórica en lugar de resolverla innecesariamente.'
translation_notes:
  revision_awareness: 'Se tomó en cuenta la revisión que corrigió la colocación de las notas en el antecedente inglés: la nota sobre Maskil debe anclarse a «Maskil» y la nota sobre David debe anclarse a «David», no a «instrumentos».'
  spanish_consistency_notes:
  - Se usa «Yahvé» como forma estándar para el nombre divino cuando corresponda; aquí no aparece.
  - Se conserva «Maskil» transliterado, en coherencia con el criterio de no forzar una equivalencia interpretativa incierta.
  - «Instrumentos de cuerda» mantiene el matiz musical concreto y evita una paráfrasis más vaga.
  - La puntuación imita el encabezamiento poético y litúrgico del original hebreo.
