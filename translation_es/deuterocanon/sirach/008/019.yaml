translation:
  language: es
  text: No vayas con un hombre cruel[a], no sea que hagas más pesado tu problema.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Paralelo griego: «No reveles tu corazón a todo hombre, y no dejes que te corresponda con favor». Los testigos hebreo y griego difieren sustancialmente aquí.'
    reason: textual_variant
lexical_decisions:
- source_word: אִם אַכְזָרִי
  english_pob_choice: a cruel man
  chosen_spanish: un hombre cruel
  alternatives_spanish:
  - una persona cruel
  - el cruel
  lexicon: HALOT
  rationale: אַכְזָרִי designa a una persona cruel o despiadada. En español, «hombre» refleja el singular masculino del hebreo y mantiene el tipo representativo sin neutralizar indebidamente la referencia humana.
- source_word: אַל תֵּלֵךְ
  english_pob_choice: Do not go with
  chosen_spanish: No vayas con
  alternatives_spanish:
  - No andes con
  - No te juntes con
  lexicon: HALOT
  rationale: הלך en este contexto sapiencial expresa compañía o acompañamiento. «No vayas con» es natural en español y conserva la imagen básica de ir acompañado, sin convertirlo en una paráfrasis más interpretativa.
- source_word: פֶּן
  english_pob_choice: lest
  chosen_spanish: no sea que
  alternatives_spanish:
  - para que no
  - o si no
  lexicon: HALOT
  rationale: פֶּן introduce una advertencia sobre una consecuencia indeseable. «No sea que» es una equivalencia española formal y clara para esa fuerza admonitiva.
- source_word: תַּכְבִּיד
  english_pob_choice: you make your trouble heavier
  chosen_spanish: hagas más pesada
  alternatives_spanish:
  - hagas más grave
  - aumentes
  - cargues más
  lexicon: HALOT
  rationale: 'El Hifil de כבד conserva la metáfora de peso: volver más pesado, aumentar la carga. «Hagas más pesada» mantiene esa imagen y permite que el complemento final complete el sentido de «tu desgracia».'
- source_word: אֶת רָעָתֶךָ
  english_pob_choice: your trouble
  chosen_spanish: tu desgracia
  alternatives_spanish:
  - tu mal
  - tu daño
  - tu calamidad
  lexicon: HALOT
  rationale: רָעָה puede abarcar mal, daño o calamidad. Dado que el contexto advierte sobre el resultado perjudicial de tratar con un hombre cruel, «desgracia» comunica bien el efecto adverso sin imponer una lectura moralizante excesiva.
theological_decisions:
- issue: Divergencia textual entre el hebreo conservado y el paralelo griego
  english_pob_reading: 'The Hebrew is primary; the Greek preserves a substantially different saying: ''Do not reveal your heart to every man, and do not let him repay you with favor.'''
  chosen_spanish_reading: 'Se traduce como texto principal el hebreo conservado: «No vayas con un hombre cruel…», y se preserva el paralelo griego como lectura alternativa en nota.'
  alternative_spanish_readings:
  - «No reveles tu corazón a todo hombre, y no permitas que te devuelva favor.»
  - «No descubras tu corazón a cualquier persona, ni dejes que te pague con favor.»
  rationale: Como el proyecto traduce Sirácides desde el hebreo cuando este se conserva, el texto principal debe seguir esa tradición. Pero la divergencia con el griego es sustancial y no sólo estilística, por lo que conviene mantenerla visible en nota para transparencia textual y para no borrar la tensión documental.
  doctrine_reference: 'PHILOSOPHY.md: translate from Hebrew where it survives; preserve source uncertainty honestly'
translation_notes:
  revision_awareness: El borrador sigue la revisión del inglés POB que prefirió una clausula final más natural («make your trouble heavier») sin perder la metáfora de peso. En español, «hagas más pesada tu desgracia» conserva esa imagen y evita añadir explicaciones que el hebreo no exige. También se mantiene la prioridad del hebreo conservado, con la variante griega explícita en nota.
  spanish_consistency_notes:
  - Se usa «hombre» para reflejar el singular masculino del hebreo, en línea con la política de exactitud de género del proyecto.
  - Se evita «SEÑOR» porque aquí no aparece el tetragrámaton ni una cita del nombre divino.
  - «Desgracia» se escogió como equivalente contextual de רָעָה en una advertencia sapiencial, sin convertirlo en «mal» moral de forma no justificada.
  - La nota textual conserva la diferencia sustancial entre testigos, como requiere el expediente auditado.
