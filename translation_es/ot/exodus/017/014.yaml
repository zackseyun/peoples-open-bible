base_translation:
  language: en
  yaml_path: translation/ot/exodus/017/014.yaml
  text: Then Yahweh said to Moses[a], “Write this as a memorial in the book, and put it in Joshua’s hearing[c][b], for I will surely blot out the remembrance of Amalek from under heaven.”
  footnotes:
  - marker: a
    text: Or 'in a book' or 'in the scroll'; Hebrew has 'in the book.'
    reason: lexical_alternative
  - marker: b
    text: Literally 'put in the ears of Joshua,' that is, make Joshua hear it or recite it to him.
    reason: lexical_alternative
  - marker: c
    text: The Hebrew expression 'I will surely blot out' is emphatic.
    reason: lexical_alternative
