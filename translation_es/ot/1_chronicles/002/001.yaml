translation:
  language: es
  text: 'Estos son los hijos de Israel: Rubén, Simeón, Leví, Judá, Isacar y Zabulón.'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: אֵלֶּה
  english_pob_choice: These are
  chosen_spanish: Estos son
  alternatives_spanish:
  - Éstos son
  - Estas son
  lexicon: HALOT
  rationale: La expresión introductoria de listado en español se vierte de forma natural con un demostrativo plural y el verbo copulativo en presente. «Estos son» conserva el valor deíctico del hebreo y funciona bien como encabezado genealógico.
- source_word: בְּנֵי
  english_pob_choice: sons of
  chosen_spanish: hijos de
  alternatives_spanish:
  - descendientes de
  - hijos
  lexicon: HALOT
  rationale: Aunque el inglés POB eligió «sons of» por precisión genealógica, en español «hijos de Israel» es la fórmula más natural y fiel al grupo de descendencia masculina nombrado aquí. «Descendientes de» sería más general de lo que pide el contexto inmediato.
- source_word: יִשְׂרָאֵל
  english_pob_choice: Israel
  chosen_spanish: Israel
  alternatives_spanish:
  - Jacob
  lexicon: HALOT
  rationale: Se conserva el nombre propio «Israel», que es el término del hebreo y el referente del patriarca. Cambiarlo por «Jacob» introduciría una interpretación que el texto no expresa aquí.
- source_word: רְאוּבֵן
  english_pob_choice: Reuben
  chosen_spanish: Rubén
  alternatives_spanish:
  - Reubén
  lexicon: HALOT
  rationale: Se usa la forma española convencional del nombre propio, ampliamente reconocible y consistente con el uso bíblico en español.
- source_word: שִׁמְעוֹן
  english_pob_choice: Simeon
  chosen_spanish: Simeón
  alternatives_spanish:
  - Simón
  lexicon: HALOT
  rationale: «Simeón» distingue adecuadamente el nombre patriarcal de «Simón» y mantiene la transliteración bíblica habitual en español.
- source_word: לֵוִי
  english_pob_choice: Levi
  chosen_spanish: Leví
  alternatives_spanish:
  - Levi
  lexicon: HALOT
  rationale: Se prefiere «Leví», forma usual en español bíblico, con acento gráfico que refleja la pronunciación tradicional y ayuda a la lectura.
- source_word: וִיהוּדָה
  english_pob_choice: and Judah
  chosen_spanish: Judá
  alternatives_spanish:
  - y Judá
  lexicon: HALOT
  rationale: En español, la lista fluye mejor sin repetir una conjunción antes del quinto nombre, igual que la revisión inglesa eliminó el «and» innecesario antes de Judah. El sentido conjuntivo ya queda cubierto por la estructura enumerativa del versículo.
- source_word: יִשָׂשכָר
  english_pob_choice: Issachar
  chosen_spanish: Isacar
  alternatives_spanish:
  - Isascar
  lexicon: HALOT
  rationale: Se adopta la forma española tradicional «Isacar», que es clara y estable en la recepción bíblica en español.
- source_word: וּזְבֻלוּן
  english_pob_choice: and Zebulun
  chosen_spanish: Zabulón
  alternatives_spanish:
  - y Zabulón
  lexicon: HALOT
  rationale: Se emplea la forma española convencional del nombre propio. Como en el hebreo, el listado finaliza sin necesidad de repetir una conjunción explícita en la prosa española.
theological_decisions:
- issue: Lectura genealógica de «hijos de Israel»
  english_pob_reading: These are the sons of Israel
  chosen_spanish_reading: Estos son los hijos de Israel
  alternative_spanish_readings:
  - Estos son los descendientes de Israel
  - Estos son los hijos de Jacob
  rationale: El versículo funciona como encabezado genealógico que introduce una serie de nombres. «Hijos» preserva mejor la relación filial inmediata sugerida por el hebreo y evita ampliar innecesariamente el alcance a generaciones posteriores.
  doctrine_reference: Genealogía patriarcal en el marco del pacto con Israel; cf. la función introductoria de listados en Crónicas.
translation_notes:
  revision_awareness: La redacción española sigue el acuerdo alto del expediente inglés y respeta la revisión que simplificó la enumeración eliminando una conjunción redundante. No se requiere nota textual ni variante, porque el hebreo base y la versión inglesa auditada coinciden en la estructura simple del listado.
  spanish_consistency_notes:
  - Se mantiene «Israel» como nombre propio del patriarca, no como sustituto interpretativo.
  - Los nombres tribales se presentan con formas españolas convencionales y uniformes.
  - Se evita una conjunción extra antes del cuarto nombre para reflejar la lista simple del hebreo.
  - El registro es bíblico, sobrio y apto para lectura pública.
