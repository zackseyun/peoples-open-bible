  spanish_quality_summary: 'El texto es claro y legible, con buen registro bíblico moderno. ‘Azote abrumador’ funciona, aunque la nota ya preserva la ambigüedad de la expresión difícil. La principal necesidad de reparación es estilística-lexical: mejorar la idiomaticidad de la cláusula final y afinar el paralelismo semántico con vocabulario más formal y consistente.'
