translation:
  language: es
  text: ¿No me preocupa[a], hijo, que te haya dejado ir, la luz de mis ojos?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O también: «¿Acaso no me importa, hijo, que te haya dejado ir, la luz de mis ojos?». El griego formula una pregunta retórica que expresa profunda angustia personal.'
    reason: lexical_alternative
lexical_decisions:
- source_word: Οὐ μέλει μοι
  english_pob_choice: Do I not care
  chosen_spanish: ¿No me importa[a]
  alternatives_spanish:
  - ¿No me preocupa
  - ¿No me afecta
  lexicon: BDAG
  rationale: La expresión griega es una pregunta retórica de interés o preocupación personal. En español, «no me importa» conserva bien el valor idiomático y la fuerza emocional de la pregunta, sin volverla una simple afirmación.
- source_word: τέκνον
  english_pob_choice: child
  chosen_spanish: hijo
  alternatives_spanish:
  - hijo mío
  - niño
  - hija
  lexicon: BDAG
  rationale: τέκνον es un vocativo afectuoso y relacional. Dado el contexto narrativo de Tobit, «hijo» comunica cercanía natural en español; se evita añadir «mío» porque el posesivo ya queda implícito por el contexto y la frase puede sonar más fluida sin él.
- source_word: ἀφῆκά σε
  english_pob_choice: I have let you go
  chosen_spanish: que te haya dejado ir
  alternatives_spanish:
  - que te haya enviado lejos
  - que te haya dejado partir
  lexicon: BDAG
  rationale: El perfecto griego expresa una acción concluida con efecto presente. «Te haya dejado ir» conserva la idea de permitir la partida y mantiene el matiz emocional de una separación no deseada.
- source_word: τὸ φῶς τῶν ὀφθαλμῶν μου
  english_pob_choice: the light of my eyes
  chosen_spanish: la luz de mis ojos
  alternatives_spanish:
  - la luz de mi vista
  - el gozo de mis ojos
  lexicon: BDAG
  rationale: La frase es un modismo afectivo. «La luz de mis ojos» preserva la imagen literal y es plenamente comprensible en español, manteniendo la ternura del original sin reemplazarla por una paráfrasis.
translation_notes:
  revision_awareness: 'Se corrigió el problema de validación anterior: el marcador de nota [a] ahora aparece explícitamente en el texto español junto a la frase a la que se refiere. No se introdujeron notas sin anclaje.'
  spanish_consistency_notes:
