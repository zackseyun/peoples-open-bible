    text: 'O: «no vaciló en hacer esta cosa»'
    reason: lexical_alternative
  - marker: b
    text: 'O: «se agradaba de la hija de Jacob»; o «deseaba a la hija de Jacob»'
    reason: lexical_alternative
  - marker: c
    text: 'O: «era honrado por encima de todos los de la casa de su padre»'
    reason: lexical_alternative
  revision_rationale: 'Se corrigieron dos puntos para mayor fidelidad y naturalidad en español: «hacer la cosa» pasó a «hacer esto», que sigue remitiendo al acto mencionado sin sonar forzado; y la comparación final se reformuló para referirse claramente a las personas de la casa del padre, como exige el hebreo. Se conservaron el tono y las alternativas léxicas del expediente inglés.'
