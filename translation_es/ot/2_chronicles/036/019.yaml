translation:
  language: es
  text: Quemaron la casa de Dios[a], derribaron el muro de Jerusalén, quemaron con fuego todos sus palacios y destruyeron todas sus vasijas preciosas[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «el templo de Dios». El hebreo dice literalmente «la casa de Dios».
    reason: lexical_alternative
  - marker: b
    text: O «todos sus objetos preciados» o «todos sus artículos deseables».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּשְׂרְפוּ
  english_pob_choice: They burned
  chosen_spanish: Quemaron
  alternatives_spanish:
  - Y quemaron
  - Le prendieron fuego
  lexicon: HALOT
  rationale: El verbo hebreo indica quemar de manera directa. En español, «quemaron» mantiene la secuencia narrativa y el sentido simple del original sin añadir matices innecesarios.
- source_word: בֵּית הָאֱלֹהִים
  english_pob_choice: the house of God
  chosen_spanish: la casa de Dios
  alternatives_spanish:
  - el templo de Dios
  - la casa de Dios
  lexicon: HALOT
  rationale: La opción principal sigue de cerca la expresión hebrea literal «casa de Dios», como en el audit trail inglés. «Templo» sería interpretativo; aquí se preserva la formulación original y su transparencia.
- source_word: וַיְנַתְּצוּ
  english_pob_choice: tore down
  chosen_spanish: derribaron
  alternatives_spanish:
  - demolieron
  - tiraron abajo
  lexicon: HALOT
  rationale: El verbo transmite la acción de derribar una construcción. «Derribaron» es natural en español y conserva la fuerza física del hebreo.
- source_word: חוֹמַת יְרוּשָׁלִָם
  english_pob_choice: the wall of Jerusalem
  chosen_spanish: el muro de Jerusalén
  alternatives_spanish:
  - la muralla de Jerusalén
  - el muro de Jerusalén
  lexicon: HALOT
  rationale: «Muro» refleja bien la imagen del hebreo y permite una lectura transparente. «Muralla» es posible, pero «muro» sigue más de cerca la estructura nominal del texto fuente.
- source_word: אַרְמְנוֹתֶיהָ
  english_pob_choice: its palaces
  chosen_spanish: sus palacios
  alternatives_spanish:
  - sus palacios reales
  - sus edificios palaciegos
  lexicon: HALOT
  rationale: El término hebreo designa palacios o residencias señoriales. «Palacios» es la equivalencia española más natural y adecuada al contexto de destrucción urbana.
- source_word: שָׂרְפוּ בָאֵשׁ
  english_pob_choice: burned all its palaces with fire
  chosen_spanish: quemaron con fuego todos sus palacios
  alternatives_spanish:
  - incendiaron todos sus palacios
  - quemaron todos sus palacios
  lexicon: HALOT
  rationale: Se conserva la redundancia enfática del hebreo con «con fuego», como en el inglés auditado. Esto evita suavizar la insistencia del original en el acto de incendio.
- source_word: כְּלֵי מַחֲמַדֶּיהָ
  english_pob_choice: its precious vessels
  chosen_spanish: sus utensilios preciosos
  alternatives_spanish:
  - sus vasos preciosos
  - sus objetos preciosos
  - sus utensilios deseables
  lexicon: HALOT
  rationale: כְּלִי es un término amplio para objetos, utensilios o vasijas; «utensilios» mantiene amplitud semántica sin limitarlo solo a vasijas. מַחֲמַדִּים expresa valor/deseabilidad; «preciosos» comunica bien esa cualidad en español.
- source_word: לְהַשְׁחִית
  english_pob_choice: destroyed
  chosen_spanish: destruyeron
  alternatives_spanish:
  - para destruir
  - arruinaron
  lexicon: HALOT
  rationale: 'Aunque la forma hebrea es un infinitivo de finalidad o resultado, el inglés auditado lo vertebra como verbo finito coordinado. En español se sigue esa misma equivalencia óptima: «destruyeron».'
translation_notes:
  revision_awareness: El texto sigue el sentido del hebreo masorético y coincide sustancialmente con el audit trail inglés; no se requieren cambios revisados adicionales.
  spanish_consistency_notes:
  - Se mantuvo «casa de Dios» para reflejar la literalidad hebrea y conservar la equivalencia auditada.
  - Se eligió «utensilios preciosos» para abarcar el valor y la amplitud de כְּלֵי מַחֲמַדֶּיהָ sin restringirlo demasiado.
  - Se preservó la repetición del incendio («quemaron... quemaron con fuego») para no perder el énfasis del original.
