review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador conserva bien la estructura paralela y las decisiones léxicas principales: «misericordia», «prójimo», «Yahvé», «toda carne», y la serie verbal correctiva/pastoral. Sin embargo, hay un problema importante de anclaje de notas: la nota [a] está colocada en «prójimo» pero su contenido explica «toda carne», mientras que la nota [b] está colocada en «toda carne» pero su contenido explica ἐπιστρέφων («vuelve/hace volver»). Además, «vuelve a su rebaño» en español suena incompleto o ambiguo; el griego ἐπιστρέφων con objeto «su rebaño» se expresa mejor como «hace volver a su rebaño» o «devuelve a su rebaño».'
  spanish_quality_summary: El español es claro y digno, pero «vuelve a su rebaño como un pastor» resulta poco natural porque «volver» transitivo con «a su rebaño» no comunica con claridad la idea de hacer regresar al rebaño descarriado. «Hace volver a su rebaño como un pastor» preserva mejor el sentido pastoral y suena más idiomático. También conviene corregir «similitúd» a «similitud» en la documentación, aunque eso no afecta el texto bíblico principal.
  glossary_alignment: 'La alineación con la terminología del proyecto es buena: κύριος se ha vertido como «Yahvé» conforme a la política del proyecto; σάρξ se mantiene como «carne» en su sentido idiomático amplio; ἔλεος como «misericordia» y ποίμνιον como «rebaño» son adecuados. La única decisión a ajustar en el texto es ἐπιστρέφων, donde el español debe reflejar causativamente el sentido de «hacer volver / traer de vuelta».'
  issues:
  - severity: high
    issue: Notas al pie mal ancladas
    rationale: La nota [a] explica «toda carne» pero está anclada a «prójimo»; la nota [b] explica «hace volver» pero está anclada a «toda carne». Esto rompe la trazabilidad exigida entre texto y nota.
  - severity: medium
    issue: «Vuelve a su rebaño» es una formulación española ambigua o poco natural
    rationale: El griego ἐπιστρέφων describe la acción de hacer regresar al rebaño, no simplemente 'volver' en sentido intransitivo. En español, «hace volver a su rebaño» comunica con más fidelidad la imagen del pastor que recupera a los descarriados.
