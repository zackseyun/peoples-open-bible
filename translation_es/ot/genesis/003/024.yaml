revisions:
- from: Así expulsó al hombre[a], y al oriente del jardín de Edén colocó a los querubines y la llama de la espada que se volvía en todas direcciones[b], para guardar el camino al árbol de la vida.
  to: Así expulsó al hombre, y al oriente del jardín de Edén[a] colocó a los querubines y la llama de la espada que gira en todas direcciones[b], para guardar el camino al árbol de la vida.
  rationale: Se corrigió la ubicación del marcador [a] para que corresponda a la frase espacial que comenta la nota. También se cambió «se volvía» por «gira» para reflejar mejor el participio hebreo y alinearse con la decisión lexical auditada de movimiento continuo. Se mantuvo el resto del texto porque es fiel, natural y terminológicamente adecuado.
  reviewer_model: gpt-5.4
