translation:
  language: es
  text: Y será sentado segundo después de Darío[a], a causa de su sabiduría, y será llamado pariente de Darío[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «se sentará segundo después de Darío». El verbo griego puede indicar sentarse o ser instalado en un puesto de rango.'
    reason: lexical_alternative
  - marker: b
    text: «Pariente» puede referirse a un verdadero familiar o a un título honorífico de cercanía y favor cortesano.
    reason: lexical_alternative
lexical_decisions:
- source_word: δεύτερος
  english_pob_choice: second
  chosen_spanish: en segundo lugar
  alternatives_spanish:
  - segundo
  - en segundo puesto
  lexicon: LSJ
  rationale: El griego expresa rango u orden en la corte. «En segundo lugar» comunica con naturalidad esa posición subordinada sin perder la idea de estatus relativo a Darío.
- source_word: καθιεῖται
  english_pob_choice: will be seated
  chosen_spanish: se sentará
  alternatives_spanish:
  - será sentado
  - será puesto en un asiento
  - se le asignará un asiento
  lexicon: LSJ
  rationale: La forma griega puede sugerir sentarse o ser instalado en una posición. En español, «se sentará» conserva la imagen concreta de la sesión/corte y permite la lectura de investidura sin forzar un tecnicismo.
- source_word: διὰ τὴν σοφίαν αὐτοῦ
  english_pob_choice: because of his wisdom
  chosen_spanish: a causa de su sabiduría
  alternatives_spanish:
  - por su sabiduría
  - debido a su sabiduría
  lexicon: LSJ
  rationale: διά con acusativo expresa causa. «A causa de su sabiduría» mantiene el valor causal de manera clara y digna en español.
- source_word: συγγενής
  english_pob_choice: kinsman
  chosen_spanish: pariente
  alternatives_spanish:
  - de la misma familia
  - consanguíneo
  - pariente cercano
  lexicon: LSJ
  rationale: El término básico es de parentesco familiar. «Pariente» es más natural en español que «kinsman» y conserva la ambigüedad entre parentesco real y honorífico que el contexto cortesano permite.
- source_word: κληθήσεται
  english_pob_choice: will be called
  chosen_spanish: será llamado
  alternatives_spanish:
  - será nombrado
  - será proclamado
  lexicon: LSJ
  rationale: Es el futuro pasivo regular de καλέω. «Será llamado» sigue de cerca el griego y mantiene abierta la posibilidad de un nombre/título conferido.
translation_notes:
  revision_awareness: 'Coincide con el texto griego de Swete 1909 y con el audit trail inglés: se conserva la relación de rango («en segundo lugar»), la imagen de instalación/sesión («se sentará»), la causalidad de la sabiduría, y la ambigüedad de συγγενής mediante «pariente».'
  spanish_consistency_notes:
  - Se evitó «SEÑOR» o terminología eclesiástica no pertinente; el pasaje es cortesano y no contiene léxico divino.
  - «Sabiduría» traduce σοφία con el matiz de capacidad prudente/cortesana, sin elevarlo a un sentido técnico ajeno al contexto.
  - La nota de alternancia sobre el verbo se ancla en el punto donde la imagen de sentarse/ser instalado afecta la lectura interpretativa.
