translation:
  language: es
  text: ¿Por qué nos olvidas para siempre? ¿Por qué nos abandonas por largos días?[a]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebreo literalmente, «por longitud de días», un modismo que significa «por largo tiempo» o «por muchos días».
    reason: lexical_alternative
lexical_decisions:
- source_word: לָמָּה
  english_pob_choice: Why
  chosen_spanish: ¿Por qué
  alternatives_spanish:
  - ¿Para qué
  - ¿A qué
  lexicon: HALOT
  rationale: Es una interrogación causal directa en un lamento; «¿Por qué» comunica con claridad la queja dirigida a Dios sin añadir sentido que el hebreo no exige.
- source_word: לָנֶצַח
  english_pob_choice: forever
  chosen_spanish: para siempre
  alternatives_spanish:
  - para perpetuidad
  - para siempre jamás
  lexicon: HALOT
  rationale: נֶצַח con ל expresa duración continua; «para siempre» es la equivalencia natural y sobria en español, y conserva el tono de queja absoluta del verso.
- source_word: תִּשְׁכָּחֵנוּ
  english_pob_choice: do you forget us
  chosen_spanish: nos olvidas
  alternatives_spanish:
  - ¿vas a olvidarnos?
  - ¿nos olvidarás?
  lexicon: HALOT
  rationale: En español, la pregunta retórica en presente transmite bien el valor imperfectivo del hebreo dentro de una lamentación dirigida a Dios. Evita forzar un futuro donde el contexto de ruego es más inmediato.
- source_word: תַּעַזְבֵנוּ
  english_pob_choice: do you abandon us
  chosen_spanish: nos abandonas
  alternatives_spanish:
  - nos dejas
  - nos forsas
  lexicon: HALOT
  rationale: עָזַב significa dejar/abandonar/abandonar en sentido fuerte. «Abandonas» conserva la severidad emocional del original y resulta más natural que un calco más débil.
- source_word: לְאֹרֶךְ יָמִים
  english_pob_choice: for length of days
  chosen_spanish: por un tiempo tan largo
  alternatives_spanish:
  - por muchos días
  - por largo tiempo
  - por la duración de los días
  lexicon: HALOT
  rationale: La expresión hebrea es literalmente «para longitud de días», un modismo de duración prolongada. En español, «por un tiempo tan largo» mantiene la idea de prolongación sin sonar rígido; además conserva la tensión entre la literalidad y la fluidez que el POB ya documentó en inglés.
translation_notes:
  revision_awareness: 'El texto inglés POB revisó la última cláusula de «for so many days» a «for length of days» para reflejar más de cerca לְאֹרֶךְ יָמִים. En español se preserva esa cercanía con una formulación idiomática que sigue siendo auditable: «por un tiempo tan largo».'
  spanish_consistency_notes:
  - Se mantiene el paralelismo interrogativo del hebreo con dos preguntas consecutivas.
  - Se eligió un registro sobrio y bíblico sin recurrir a fórmulas tradicionales que oscurezcan el sentido.
  - La nota al pie conserva la tensión entre la literalidad de «longitud de días» y el modismo de duración prolongada.
