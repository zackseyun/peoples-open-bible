    rationale: El sufijo se refiere al montón/monumento recién establecido. Aunque «lugar» no destruye el sentido, amplía el referente más allá de lo expresado y del audit trail inglés, que opta por «it».
  - severity: medium
    issue: La forma «Jegar-sahaduta» no sigue la transliteración auditada
    rationale: El POB inglés documenta «Jegar-sahadutha». La adaptación sin h final no es necesaria y reduce la consistencia interlingüística del proyecto en un nombre poco transparente.
  - severity: low
    issue: Las notas podrían reflejar mejor las alternativas semánticas auditadas
    rationale: El inglés preserva «heap of witness» o «mound of testimony». En español, conviene mantener una correspondencia más directa con esas posibilidades.
