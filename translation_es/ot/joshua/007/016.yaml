translation:
  language: es
  text: Josué se levantó temprano[a] por la mañana y acercó a Israel por sus tribus[b], y la tribu de Judá fue tomada[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «se levantó de madrugada».
    reason: lexical_alternative
  - marker: b
    text: O «según sus tribus»; es decir, dispuesto por unidades tribales.
    reason: lexical_alternative
  - marker: c
    text: Hebreo «la tribu de Judá fue tomada», un modismo para indicar que fue señalada o seleccionada en el proceso.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּשְׁכֵּם
  english_pob_choice: rose early
  chosen_spanish: se levantó temprano
  alternatives_spanish:
  - se levantó de madrugada
  - se levantó muy temprano
  lexicon: HALOT
  rationale: El Hiphil de שׁכם expresa levantarse temprano. En español, «se levantó temprano» conserva el valor temporal y suena natural sin añadir más de lo que dice el hebreo.
- source_word: בַּבֹּקֶר
  english_pob_choice: in the morning
  chosen_spanish: por la mañana
  alternatives_spanish:
  - en la mañana
  - esa mañana
  lexicon: HALOT
  rationale: La expresión marca el momento de la acción. «Por la mañana» combina bien con «se levantó temprano» y mantiene un registro claro y bíblico sin calco innecesario.
- source_word: וַיַּקְרֵב
  english_pob_choice: brought near
  chosen_spanish: acercó
  alternatives_spanish:
  - presentó
  - hizo acercar
  lexicon: HALOT
  rationale: El Hiphil de קרב significa acercar o traer cerca. «Acercó» conserva el sentido procedimental del pasaje, donde Israel es acercado para la selección tribal.
- source_word: אֶת יִשְׂרָאֵל
  english_pob_choice: Israel
  chosen_spanish: a Israel
  alternatives_spanish:
  - a los israelitas
  lexicon: HALOT
  rationale: El objeto es el pueblo en conjunto. «A Israel» respeta el referente corporativo y la forma directa del hebreo.
- source_word: לִשְׁבָטָיו
  english_pob_choice: by its tribes
  chosen_spanish: por sus tribus
  alternatives_spanish:
  - según sus tribus
  - tribu por tribu
  lexicon: HALOT
  rationale: La preposición ל con el sufijo posesivo expresa distribución o arreglo tribal. «Por sus tribus» mantiene el sentido distributivo de manera natural en español.
- source_word: וַיִּלָּכֵד
  english_pob_choice: was taken
  chosen_spanish: fue tomada
  alternatives_spanish:
  - fue seleccionada
  - fue identificada
  - fue capturada
  lexicon: HALOT
  rationale: El Niphal de לכד literalmente es «ser tomado/capturado», pero en este contexto funciona como un idiomático quedar señalado o sacado del grupo. «Fue tomada» preserva la tensión del hebreo sin explicitar el mecanismo.
- source_word: שֵׁבֶט יְהוּדָה
  english_pob_choice: the tribe of Judah
  chosen_spanish: la tribu de Judá
  alternatives_spanish:
  - la tribu de Judá fue apartada
  - Judá, la tribu
  lexicon: HALOT
  rationale: La construcción de estado constructo es la forma estándar «la tribu de Judá». Es clara, fiel y natural en español.
theological_decisions:
- issue: El sentido de וַיִּלָּכֵד en el proceso de selección
  english_pob_reading: Retain the idiomatic passive 'was taken' without specifying 'by lot' or 'by the LORD' in the main text.
  chosen_spanish_reading: Mantener «fue tomada» sin añadir en el texto principal «por sorteo» ni «por Yahvé».
  alternative_spanish_readings:
  - fue seleccionada
  - fue tomada por sorteo
  - fue identificada
  rationale: El versículo por sí solo no nombra el mecanismo en esta cláusula; el contexto amplio sí implica una selección sagrada. Conservar el pasivo idiomático evita resolver la ambigüedad con una explicación que el hebreo de este versículo no da explícitamente.
  doctrine_reference: Principio de primacía del texto original y preservación de la tensión contextual; cf. la filosofía de traducción del POB y la nota auditada en inglés.
translation_notes:
  revision_awareness: 'La revisión más reciente del paquete inglés no introdujo cambios: el estado final quedó igual, con acuerdo alto y solo observaciones menores. Esta versión española sigue ese estado estable sin incorporar interpretaciones adicionales.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como término teológico normal del proyecto cuando sea necesario; en este versículo no aparece.
  - «Israel» se conserva como nombre corporativo del pueblo, no como plural explicativo.
  - «Fue tomada» reproduce el pasivo idiomático del hebreo y evita reemplazarlo por una interpretación más explícita.
  - El registro es formal y bíblico, pero con español natural y no arcaizante.
