translation:
  language: es
  text: ¡Ay de la ciudad sanguinaria[a], toda ella llena de engaño, llena de saqueo[c]; la presa nunca se aparta[b]!
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «ciudad de sangres», un modismo para una ciudad marcada por derramamiento de sangre y culpa de sangre.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «la presa no cesa», conservando la idea de violencia depredadora continua.'
    reason: alternative_reading
  - marker: c
    text: «Saqueo» también puede traducirse «robo violento»; el término hebreo evoca despojo por la fuerza.
    reason: lexical_alternative
lexical_decisions:
- source_word: ה֖וֹי
  english_pob_choice: Woe
  chosen_spanish: ¡Ay de…!
  alternatives_spanish:
  - ¡Ay!
  - ¡Ay de la…!
  lexicon: HALOT
  rationale: El interjección profética expresa lamento y denuncia. «¡Ay de…!» conserva esa fuerza exhortativa en un español natural y bíblico.
- source_word: עִ֣יר דָּמִ֑ים
  english_pob_choice: the city of bloodshed
  chosen_spanish: la ciudad de sangre
  alternatives_spanish:
  - la ciudad de derramamiento de sangre
  - la ciudad sanguinaria
  lexicon: HALOT
  rationale: El hebreo dice literalmente «ciudad de sangres», un idiomático de culpa violenta. «Ciudad de sangre» mantiene la densidad semítica y la acusación de violencia, sin suavizarla.
- source_word: כֻּלָּהּ
  english_pob_choice: all of it
  chosen_spanish: toda ella
  alternatives_spanish:
  - toda
  - enteramente
  lexicon: HALOT
  rationale: La referencia vuelve a la ciudad como totalidad. «Toda ella» conserva el énfasis distributivo y suena natural en español.
- source_word: כַּחַשׁ
  english_pob_choice: lies
  chosen_spanish: engaño
  alternatives_spanish:
  - mentiras
  - falsedad
  lexicon: HALOT
  rationale: El término puede expresar engaño o falsedad. Aquí «engaño» mantiene el campo semántico de mentira activa y encaja bien con la acusación profética.
- source_word: פֶּרֶק
  english_pob_choice: plunder
  chosen_spanish: saqueo
  alternatives_spanish:
  - rapiña
  - robo
  lexicon: HALOT
  rationale: El término evoca despojo violento. «Saqueo» comunica con claridad la violencia del acto y se corresponde con el entorno de predación del verso.
- source_word: מְלֵאָה
  english_pob_choice: full of
  chosen_spanish: llena de
  alternatives_spanish:
  - colmada de
  - repleta de
  lexicon: HALOT
  rationale: Adjetivo predicativo directo. «Llena de» reproduce la estructura hebrea de manera clara y sobria.
- source_word: לֹ֥א יָמִ֖ישׁ
  english_pob_choice: never departs
  chosen_spanish: no se aparta
  alternatives_spanish:
  - no cesa
  - nunca se aparta
  lexicon: HALOT
  rationale: La negación de מושׁ/מישׁ expresa que algo no se mueve o no se aleja. «No se aparta» conserva ese valor continuo en español.
- source_word: טָֽרֶף
  english_pob_choice: prey
  chosen_spanish: la presa
  alternatives_spanish:
  - presa
  - botín
  lexicon: HALOT
  rationale: El sustantivo conserva la imagen predatoria. «La presa» mantiene la referencia a lo cazado/arrancado por violencia, que es central en el contexto.
theological_decisions:
- issue: Valor idiomático de «ciudad de sangre(s)»
  english_pob_reading: Idiomatic expression for a city marked by bloodshed and bloodguilt; English renders it as 'city of bloodshed'.
  chosen_spanish_reading: «La ciudad de sangre» conserva el giro hebreo y su carga de culpa por violencia.
  alternative_spanish_readings:
  - la ciudad de derramamiento de sangre
  - la ciudad sanguinaria
  rationale: No se suaviza la acusación. La forma breve mantiene la tensión idiomática del original y permite que el lector perciba la violencia como rasgo definitorio de la ciudad.
  doctrine_reference: Imprecación profética y juicio divino sobre la violencia institucional
translation_notes:
  revision_awareness: Se incorporó la repetición de «llena de» para reflejar con mayor fidelidad la estructura hebrea, siguiendo la revisión del POB en inglés. También se evitó condensar «lies, full of plunder» en una sola frase, para conservar el paralelismo y la acumulación acusatoria del original.
  spanish_consistency_notes:
  - Se usó «Yahvé» solo cuando corresponda a YHWH; este versículo no lo contiene.
  - Se mantuvo «presa» para טָרֶף, coherente con el léxico predatorio del contexto.
  - No se reemplazó la imaginería semítica por una paráfrasis más suave; se preservó la acusación directa y repetitiva del verso.
