translation:
  language: es
  text: o tinieblas, de modo que no puedas ver, y una abundancia de aguas[a] te cubre.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «un torrente de aguas te cubre». La expresión hebrea puede sugerir aguas desbordantes, pero el texto principal conserva el sentido más amplio de «una abundancia de aguas».
    reason: lexical_alternative
lexical_decisions:
- source_word: אוֹ
  english_pob_choice: or
  chosen_spanish: o
  alternatives_spanish:
  - o bien
  - o también
  lexicon: HALOT
  rationale: La partícula introduce una alternativa o continuación de la serie de calamidades. En español, 'o' conserva la brevedad y el tono poético del hebreo sin añadir matiz innecesario.
- source_word: חֹשֶׁךְ
  english_pob_choice: darkness
  chosen_spanish: tinieblas
  alternatives_spanish:
  - oscuridad
  - oscuridad densa
  lexicon: HALOT
  rationale: Aunque 'oscuridad' es el equivalente más directo, 'tinieblas' mantiene mejor el registro poético y la imagen de una oscuridad que impide ver, sin perder el valor semántico del término hebreo.
- source_word: לֹא תִרְאֶה
  english_pob_choice: so that you cannot see
  chosen_spanish: de modo que no puedas ver
  alternatives_spanish:
  - para que no veas
  - y no ves
  lexicon: HALOT
  rationale: El hebreo expresa el efecto resultante de las tinieblas. 'De modo que no puedas ver' transmite bien esa consecuencia en español, con un subjuntivo natural y fluido.
- source_word: וְשִׁפְעַת
  english_pob_choice: and an abundance of
  chosen_spanish: y un caudal de
  alternatives_spanish:
  - y una abundancia de
  - y un torrente de
  - y una inundación de
  lexicon: HALOT
  rationale: שִׁפְעָה puede denotar abundancia, derramamiento u overflow. 'Un caudal de' conserva la idea de plenitud y movimiento de aguas sin fijar demasiado pronto una sola imagen hidrológica.
- source_word: מַיִם
  english_pob_choice: waters
  chosen_spanish: aguas
  alternatives_spanish:
  - agua
  - aguas caudalosas
  lexicon: HALOT
  rationale: El plural hebreo es poético y colectivo. 'Aguas' reproduce ese valor mejor que el singular 'agua'.
- source_word: תְּכַסֶּךָּ
  english_pob_choice: covers you
  chosen_spanish: te cubre
  alternatives_spanish:
  - te cubren
  - te envuelve
  - te tapa
  lexicon: HALOT
  rationale: El verbo כסה significa 'cubrir'. 'Te cubre' retiene la imagen básica sin introducir una interpretación más fuerte como 'ahogar' u 'oprimir'.
translation_notes:
  revision_awareness: 'El texto inglés POB mantiene ''darkness'' y opta por ''an abundance of waters'' en vez de restringir el sentido a ''flood of waters''. La presente versión española sigue esa misma decisión interpretativa: conserva una imagen amplia de tinieblas y un caudal abundante de aguas, sin cerrar prematuramente la metáfora a una sola lectura.'
  spanish_consistency_notes:
  - Se mantuvo 'aguas' en plural para reflejar el hebreo מַיִם y su fuerza colectiva poética.
  - Se eligió 'tinieblas' por su valor bíblico y su tono solemne, aunque 'oscuridad' sería una alternativa válida más neutra.
  - No se introdujo 'SEÑOR' ni otras fórmulas de sustitución del nombre divino porque este verso no contiene el Tetragrámaton.
  - La relación sintáctica se suavizó con 'de modo que' para expresar la consecuencia implícita del hebreo sin perder fidelidad semántica.
