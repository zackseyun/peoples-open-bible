review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien el sentido básico del hebreo y del POB inglés: Yahvé habla a Josué, le prohíbe temer, da la razón con la entrega de los enemigos a su poder, y afirma que ninguno podrá resistirle. Sin embargo, hay dos ajustes de fidelidad recomendables: «a ellos» tras «No temas» suena menos natural que el español bíblico corriente «No les tengas miedo», y «podrá mantenerse» añade un matiz modal («podrá») no expresado por לֹא יַעֲמֹד, además de sonar algo forzado. El hebreo afirma directamente que ningún hombre se mantendrá/en pie ante Josué.'
  spanish_quality_summary: 'La redacción es generalmente clara y digna, pero «No temas a ellos» resulta poco idiomático en español natural, y «Ningún hombre de ellos podrá mantenerse delante de ti» suena rígido. Una formulación más natural y fiel es: «No les tengas miedo… Ningún hombre de ellos se mantendrá en pie ante ti». Esto conserva la imagen hebrea y mejora la fluidez.'
  glossary_alignment: Se alinea bien con la terminología del proyecto en «Yahvé», «Josué» y la preservación de «hombre» para אִישׁ en contexto militar. También mantiene adecuadamente la imagen de «en tu mano». El cambio principal sugerido no afecta el glosario, sino la idiomaticidad y la precisión verbal.
  issues:
  - severity: medium
    issue: «No temas a ellos» es poco idiomático en español.
    rationale: Aunque «temer a» es posible, en una prohibición dirigida a una persona el español natural y ampliamente legible prefiere «No les tengas miedo» o «No temas por ellos» según contexto. Aquí «No les tengas miedo» expresa mejor el objeto del temor marcado por מֵהֶם.
  - severity: medium
    issue: «podrá mantenerse» no refleja de la forma más fiel y natural לֹא יַעֲמֹד.
    rationale: El hebreo dice literalmente que no se mantendrá/estará en pie ningún hombre de ellos ante Josué. «Podrá mantenerse» introduce capacidad y una perífrasis no requerida. «Se mantendrá en pie» conserva mejor la imagen hebrea y el valor militar de resistir.
  - severity: low
    issue: La nota al pie actual se vuelve innecesaria con una redacción más directa.
    rationale: Si el texto principal ya conserva «se mantendrá en pie», la imagen hebrea queda suficientemente clara y no hace falta explicar «mantenerse» como alternativa léxica.
  revised_spanish_text: 'Yahvé dijo a Josué: «No les tengas miedo, porque los he entregado en tu mano. Ningún hombre de ellos se mantendrá en pie ante ti».

    '
  revision_rationale: 'Se revisa para mejorar la naturalidad del español y acercar más la redacción al hebreo auditado: «No les tengas miedo» expresa idiomáticamente el objeto del temor; «los he entregado en tu mano» preserva el orden y la imagen idiomática; «Ningún hombre de ellos se mantendrá en pie ante ti» conserva el singular masculino de אִישׁ y la imagen de עמד sin añadir modalidad innecesaria. No se requieren notas al pie porque el texto revisado ya transmite con claridad el sentido y la imagen del original.'
