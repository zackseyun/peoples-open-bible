translation:
  language: es
  text: Ahora bien, cuando Judith llegó[a] delante de él y de sus asistentes, todos se maravillaron de la belleza de su rostro; y, cayendo rostro en tierra, se inclinó ante él, y ellos la levantaron.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «en su presencia». El giro griego puede expresar llegada ante alguien en contexto cortesano.
    reason: lexical_alternative
lexical_decisions:
- source_word: κατὰ πρόσωπον αὐτοῦ
  english_pob_choice: before him
  chosen_spanish: delante de él
  alternatives_spanish:
  - en su presencia
  - frente a él
  lexicon: LSJ
  rationale: El griego idiomático indica entrada en la presencia de alguien, no necesariamente ubicación literal “cara a cara”. «Delante de él» es natural en español y conserva el marco cortesano de la escena.
- source_word: θεραπόντων
  english_pob_choice: attendants
  chosen_spanish: sirvientes
  alternatives_spanish:
  - atendientes
  - servidores
  - acompañantes
  lexicon: LSJ
  rationale: θεράπων puede referirse a un sirviente o asistente en contexto de corte. «Sirvientes» es claro en español y mantiene la relación subordinada sin forzar el matiz más técnico de «siervo».
- source_word: ἐθαύμασαν
  english_pob_choice: marveled
  chosen_spanish: se maravillaron
  alternatives_spanish:
  - quedaron asombrados
  - se admiraron
  lexicon: LSJ
  rationale: El verbo expresa admiración sorprendida. «Se maravillaron» reproduce bien esa mezcla de asombro y admiración en un registro digno.
- source_word: κάλλει
  english_pob_choice: beauty
  chosen_spanish: belleza
  alternatives_spanish:
  - hermosura
  - lindeza
  lexicon: LSJ
  rationale: κάλλος significa belleza o atractivo. «Belleza» es la opción directa y más transparente en español.
- source_word: τοῦ προσώπου
  english_pob_choice: of her face
  chosen_spanish: de su rostro
  alternatives_spanish:
  - de su cara
  - de su semblante
  lexicon: LSJ
  rationale: El griego dice literalmente «rostro/cara». «Rostro» preserva el sentido concreto y suena más digno y literario que «cara».
- source_word: πεσοῦσα ἐπὶ πρόσωπον
  english_pob_choice: falling on her face
  chosen_spanish: cayendo sobre su rostro
  alternatives_spanish:
  - postrada sobre su rostro
  - cayendo de bruces
  lexicon: LSJ
  rationale: La imagen es física y vívida. «Cayendo sobre su rostro» mantiene la forma literal del gesto; la carga de reverencia queda reforzada por el verbo siguiente.
- source_word: προσεκύνησεν
  english_pob_choice: bowed down to him
  chosen_spanish: se inclinó ante él
  alternatives_spanish:
  - se postró ante él
  - lo homenajeó
  - lo adoró
  lexicon: LSJ
  rationale: En este contexto humano de corte, el verbo expresa reverencia u homenaje, no adoración religiosa. «Se inclinó ante él» conserva la deferencia sin importar «adoró» como lectura teológica indebida.
- source_word: ἤγειραν αὐτὴν
  english_pob_choice: they raised her up
  chosen_spanish: la levantaron
  alternatives_spanish:
  - la alzaron
  - la ayudaron a incorporarse
  lexicon: LSJ
  rationale: El plural se refiere a los presentes que la ponen de pie. «La levantaron» es breve, natural y fiel al movimiento descrito.
theological_decisions:
- issue: Sentido de προσκυνέω ante un gobernante humano
  english_pob_reading: bowed down to him
  chosen_spanish_reading: se inclinó ante él
  alternative_spanish_readings:
  - se postró ante él
  - lo adoró
  - le rindió homenaje
  rationale: Como el objeto es un jefe militar humano, el contexto favorece reverencia/obeisancia y no culto divino. La traducción evita resolver indebidamente la tensión semántica del verbo y mantiene el sentido cortesano del pasaje.
  doctrine_reference: 'DOCTRINE.md: preservar la tensión teológica y traducir según el contexto inmediato.'
translation_notes:
  revision_awareness: El texto griego y la versión inglesa de POB están en alto acuerdo; no se detectaron revisiones sustanciales en el expediente auditado, por lo que esta propuesta sigue de cerca la lectura aprobada y conserva la decisión clave sobre προσκυνέω como reverencia humana.
  spanish_consistency_notes:
  - Se usa «Yahvé» como convención del proyecto cuando corresponda, aunque aquí no aparece el nombre divino.
  - Se mantiene «rostro» para τοῦ προσώπου por fidelidad literal y registro digno.
  - «Sirvientes» se eligió por claridad contextual en la escena de corte; no se usa «esclavos» porque el griego θεράπων no exige esa fuerza léxica.
  - «Se inclinó ante él» preserva la ambigüedad reverencial sin convertir el gesto en adoración religiosa.
