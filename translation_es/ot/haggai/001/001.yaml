translation:
  language: es
  text: 'En el segundo año del rey Darío, en el sexto mes, el primer día del mes, vino la palabra de Yahvé[a] por medio de Hageo el profeta a Zorobabel, hijo de Salatiel, gobernador de Judá, y a Josué, hijo de Josadac, el sumo sacerdote, diciendo:'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «por la mano de Hageo el profeta». El hebreo dice literalmente «por la mano de».
    reason: lexical_alternative
lexical_decisions:
- source_word: בִּ/שְׁנַת שְׁתַּיִם
  english_pob_choice: In the second year
  chosen_spanish: En el segundo año
  alternatives_spanish:
  - En año dos
  lexicon: HALOT
  rationale: La fórmula cronológica de reinado en español natural requiere el ordinal 'segundo año', que conserva el valor temporal del hebreo sin calco torpe.
- source_word: לְ/דָרְיָוֶשׁ הַ/מֶּלֶךְ
  english_pob_choice: of King Darius
  chosen_spanish: del rey Darío
  alternatives_spanish:
  - de Darío, el rey
  lexicon: HALOT
  rationale: '''del rey Darío'' reproduce la relación regnal de manera clara y elegante en español, manteniendo el título y el nombre propio.'
- source_word: בַּ/חֹ֨דֶשׁ הַ/שִּׁשִּׁ֔י
  english_pob_choice: in the sixth month
  chosen_spanish: en el sexto mes
  alternatives_spanish:
  - en el mes sexto
  lexicon: HALOT
  rationale: '''sexto mes'' es el equivalente idiomático normal en español para la datación del texto.'
- source_word: בְּ/י֥וֹם אֶחָ֖ד לַ/חֹ֑דֶשׁ
  english_pob_choice: on the first day of the month
  chosen_spanish: el primer día del mes
  alternatives_spanish:
  - en el día uno del mes
  lexicon: HALOT
  rationale: El cardinal hebreo 'uno' funciona como ordinal en fechas; en español, 'primer día' expresa mejor esa función temporal.
- source_word: הָיָ֨ה דְבַר יְהוָ֜ה
  english_pob_choice: the word of Yahweh came
  chosen_spanish: vino la palabra de Yahvé
  alternatives_spanish:
  - la palabra de Yahvé fue
  - llegó la palabra de Yahvé
  lexicon: HALOT
  rationale: Se conserva la fórmula profética con 'vino' para reflejar el inicio efectivo de la revelación, como en el inglés POB 'came', sin borrar la personificación idiomática del hebreo.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  lexicon: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
  rationale: 'Se sigue el estándar del proyecto para el Nombre divino: ''Yahvé'' en el texto principal, evitando la sustitución por ''SEÑOR''.'
- source_word: בְּ/יַד חַגַּי הַ/נָּבִיא
  english_pob_choice: by the hand of Haggai the prophet
  chosen_spanish: por medio de Hageo el profeta
  alternatives_spanish:
  - por la mano de Hageo el profeta
  - por Hageo el profeta
  lexicon: HALOT
  rationale: El hebreo dice literalmente 'por la mano de', pero en español 'por medio de' comunica con naturalidad la agencia profética sin perder la mediación textual; se preserva la alternativa literal en nota.
- source_word: אֶל זְרֻבָּבֶל
  english_pob_choice: to Zerubbabel
  chosen_spanish: a Zorobabel
  alternatives_spanish:
  - a Zerubabel
  lexicon: HALOT
  rationale: Se usa la forma española más establecida y readable del nombre propio, sin alterar la identidad del referente.
- source_word: בֶּן שְׁאַלְתִּיאֵל
  english_pob_choice: son of Shealtiel
  chosen_spanish: hijo de Salatiel
  alternatives_spanish:
  - hijo de Shealtiel
  lexicon: HALOT
  rationale: '''Salatiel'' es la adaptación española tradicional y transparente del patronímico, manteniendo la relación filial del hebreo.'
- source_word: פַּחַת יְהוּדָה
  english_pob_choice: governor of Judah
  chosen_spanish: gobernador de Judá
  alternatives_spanish:
  - prefecto de Judá
  lexicon: HALOT
  rationale: '''Gobernador'' expresa con claridad la función administrativa persa del término sin introducir un tecnicismo innecesario para el lector general.'
- source_word: וְ/אֶל יְהוֹשֻׁעַ
  english_pob_choice: and to Joshua
  chosen_spanish: y a Josué
  alternatives_spanish:
  - y a Yehoshúa
  lexicon: HALOT
  rationale: '''Josué'' es la forma española estándar y bíblicamente reconocible del nombre propio.'
- source_word: בֶּן יְהוֹצָדָק
  english_pob_choice: son of Jehozadak
  chosen_spanish: hijo de Josadac
  alternatives_spanish:
  - hijo de Jehozadac
  lexicon: HALOT
  rationale: '''Josadac'' es la forma española tradicional del nombre, clara y consistente con el uso bíblico en español.'
- source_word: הַ/כֹּהֵ֥ן הַ/גָּד֖וֹל
  english_pob_choice: the high priest
  chosen_spanish: el sumo sacerdote
  alternatives_spanish:
  - el gran sacerdote
  lexicon: HALOT
  rationale: '''Sumo sacerdote'' es el equivalente español establecido del cargo supremo sacerdotal; mantiene el sentido de jerarquía del título hebreo.'
- source_word: לֵ/אמֹר
  english_pob_choice: 'saying:'
  chosen_spanish: 'diciendo:'
  alternatives_spanish:
  - 'diciendo así:'
  lexicon: HALOT
  rationale: La fórmula introductoria se traduce de forma directa y natural, preparando la cita que continúa en el versículo siguiente.
theological_decisions:
- issue: Nombre divino יְהוָה en el texto principal
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  rationale: Se mantiene el Nombre propio del pacto, conforme a la política del proyecto y a la transparencia frente al texto hebreo, en vez de ocultarlo con un título sustitutivo.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Fórmula profética de mediación בְּיַד
  english_pob_reading: by the hand of Haggai the prophet
  chosen_spanish_reading: por medio de Hageo el profeta
  alternative_spanish_readings:
  - por la mano de Hageo el profeta
  - por Hageo el profeta
  rationale: La mediación profética se conserva en sentido, pero se expresa con una locución española natural. No se elimina la agencia humana; solo se evita una calca innecesaria.
  doctrine_reference: DOCTRINE.md Translation philosophy §1, §5
translation_notes:
  revision_awareness: El texto sigue de cerca el audit trail inglés y no requiere revisión textual adicional; la única tensión lexical relevante es la frase idiomática בְּיַד, donde se conserva el sentido de mediación profética y se documenta la alternativa literal.
  spanish_consistency_notes:
  - Se usa 'Yahvé' de manera consistente para יְהוָה, conforme al estándar del proyecto.
  - 'Los nombres propios se han dado en formas españolas reconocibles y estables: Darío, Hageo, Zorobabel, Salatiel, Josué, Josadac.'
  - '''Sumo sacerdote'' se mantiene como equivalente funcional del título hebreo, coherente con el uso bíblico en español.'
  - La puntuación con dos puntos después de 'diciendo' prepara la cita siguiente y refleja la función sintáctica del לֵאמֹר hebreo.
