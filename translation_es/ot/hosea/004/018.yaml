translation:
  language: es
  text: Cuando su bebida se ha acabado[a], se entregan a la prostitución; sus escudos aman profundamente la vergüenza[b][c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Cuando su bebida se ha agriado» o «Cuando ha pasado su borrachera». El inicio hebreo es difícil y puede referirse tanto al final de una ronda de bebida como a la bebida que se ha desviado o echado a perder.'
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «sus escudos»; probablemente una metáfora de sus gobernantes o protectores.'
    reason: lexical_alternative
  - marker: c
    text: 'La cláusula final es difícil en hebreo. Algunos la entienden de manera más literal: «aman, ¡dad vergüenza!».'
    reason: alternative_reading
lexical_decisions:
- source_word: סָר
  english_pob_choice: is gone
  chosen_spanish: se ha ido
  alternatives_spanish:
  - ha pasado
  - se ha apartado
  - se ha agriado
  lexicon: HALOT
  rationale: El hebreo expresa que algo se aparta o se va; con el sustantivo de bebida, la idea probable es que la ronda o el vino ya terminó. «Se ha ido» conserva esa imagen sin volverla demasiado explicativa.
- source_word: סָבְאָם
  english_pob_choice: their drink
  chosen_spanish: su bebida
  alternatives_spanish:
  - su beber
  - su embriaguez
  - su vino
  lexicon: HALOT
  rationale: El sustantivo se refiere al beber/embriagarse de ellos. «Su bebida» es una opción natural en español y mantiene el referente concreto del texto sin perder la ambigüedad entre bebida y borrachera.
- source_word: הַזְנֵה הִזְנוּ
  english_pob_choice: they give themselves to prostitution
  chosen_spanish: se entregan a la prostitución
  alternatives_spanish:
  - cometen prostitución
  - se prostituyen
  - practican la prostitución
  lexicon: HALOT
  rationale: La intensificación hebrea debe mantenerse en una forma natural. «Se entregan a la prostitución» conserva el lenguaje sexual fuerte y el carácter de acción deliberada, sin suavizarlo a una simple infidelidad abstracta.
- source_word: אָהֲבוּ
  english_pob_choice: dearly love
  chosen_spanish: aman
  alternatives_spanish:
  - aman con pasión
  - aprecian mucho
  - quieren
  lexicon: HALOT
  rationale: El verbo expresa amor/afecto intensificado por el contexto. En español, «aman» es lo más directo; la carga moral queda reforzada por el objeto «la vergüenza».
- source_word: הֵבוּ
  english_pob_choice: dearly
  chosen_spanish: aman
  alternatives_spanish:
  - ardientemente
  - muchísimo
  - con empeño
  lexicon: HALOT
  rationale: La forma hebrea es difícil y en el audit trail inglés se trata como intensificación adverbial. En español no conviene forzar un imperativo oscuro; la intensificación queda absorbida por el conjunto «aman la vergüenza».
- source_word: קָלוֹן
  english_pob_choice: shame
  chosen_spanish: vergüenza
  alternatives_spanish:
  - deshonra
  - ignominia
  - afrenta
  lexicon: HALOT
  rationale: «Vergüenza» es la equivalencia más natural y clara en español, y reproduce la deshonra moral del término hebreo en este contexto profético.
- source_word: מָגִנֶּיהָ
  english_pob_choice: her shields
  chosen_spanish: sus escudos
  alternatives_spanish:
  - sus gobernantes
  - sus protectores
  - sus defensores
  lexicon: HALOT
  rationale: Se conserva la metáfora literal del hebreo para mantener transparencia textual. El español admite «escudos» como imagen poética; la posible referencia a gobernantes o protectores se deja para nota.
theological_decisions:
- issue: Si conviene atenuar el lenguaje de prostitución de Oseas por ser metáfora de infidelidad del pacto
  english_pob_reading: Retain prostitution language in the main text
  chosen_spanish_reading: Mantener «prostitución» en el texto principal
  alternative_spanish_readings:
  - se vuelven completamente infieles
  - se apartan de Dios
  rationale: Oseas usa deliberadamente una metáfora sexual concreta para la infidelidad de Israel. La traducción debe conservar esa fuerza profética y no resolverla en una abstracción más suave.
  doctrine_reference: Translation philosophy §3, §6
- issue: Si traducir מָגִנֶּיהָ literalmente o interpretar su referente en el texto principal
  english_pob_reading: Translate literally as 'her shields' and preserve 'rulers/protectors' in a footnote
  chosen_spanish_reading: Traducir literalmente como «sus escudos»
  alternative_spanish_readings:
  - sus gobernantes
  - sus protectores
  rationale: La imagen hebrea es transparente y a la vez ambigua. Mantenerla en el cuerpo del texto respeta el original; la nota puede aclarar el posible sentido figurado.
  doctrine_reference: Translation philosophy §3, §5
- issue: Cómo reflejar la expresión difícil del cierre, donde el hebreo puede leerse como intensificación o como construcción irregular
  english_pob_reading: The clause 'they dearly love shame' is difficult Hebrew.
  chosen_spanish_reading: «aman la vergüenza» con la dificultad preservada en nota
  alternative_spanish_readings:
  - aman, ¡dad vergüenza!
  - aman la deshonra
  rationale: No conviene imponer una solución demasiado específica si el hebreo es oscuro. La redacción principal mantiene el sentido general; la nota preserva la lectura alternativa y la tensión textual.
  doctrine_reference: Translation philosophy §2, §4
translation_notes:
  revision_awareness: El borrador sigue la revisión más reciente del audit trail inglés, que afinó la apertura de «drinking is over» a «drink is gone». En español se optó por «su bebida se ha ido» para conservar esa cercanía léxica y al mismo tiempo sonar natural. También se mantuvo la metáfora de «sus escudos» en el texto principal, con nota explicativa, y se preservó el carácter difícil del cierre sin resolverlo de forma interpretativa excesiva.
  spanish_consistency_notes:
  - Se mantiene Yahvé no aplicable en este versículo.
  - Se conserva «prostitución» como lenguaje profético fuerte, no suavizado.
  - «Sus escudos» retiene la metáfora del hebreo; la nota explica el posible referente humano.
  - La puntuación española usa punto y coma para separar la segunda cola poética.
  - Los marcadores de nota aparecen solo donde hay una alternativa textual real o una dificultad reconocida.
