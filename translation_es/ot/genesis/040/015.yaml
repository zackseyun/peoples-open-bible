- from: Porque fui, en verdad, secuestrado[a] de la tierra de los hebreos, y también aquí no he hecho nada para que me pusieran en el pozo[b].
  to: Porque ciertamente fui secuestrado[a] de la tierra de los hebreos, y aun aquí no he hecho nada como para que me pusieran en el pozo[b].
  rationale: Se ajusta la cláusula final para expresar mejor la idea de que José no hizo nada que justificara su encarcelamiento, en línea con la revisión del POB inglés. También se mejora la fluidez del énfasis verbal y se refuerza el matiz de «even here» con «aun aquí».
