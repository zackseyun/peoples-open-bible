translation:
  language: es
  text: 'Y los hijos de Simeón: Jemuel, Jamín, Ohad, Jacín, Zohar y Shaúl[a], hijo de la mujer cananea.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «Saúl», la forma tradicional española del nombre hebreo Shaúl.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּבְנֵי
  english_pob_choice: And the sons of
  chosen_spanish: Y los hijos de
  alternatives_spanish:
  - Ahora los hijos de
  - Los hijos de
  lexicon: HALOT
  rationale: El hebreo introduce una lista genealógica con ו conjuntivo y el constructo plural de בֵּן. «Y los hijos de» conserva la estructura y la coordinación del original sin volverla más interpretativa de lo necesario.
- source_word: שִׁמְעוֹן
  english_pob_choice: Simeon
  chosen_spanish: Simeón
  alternatives_spanish:
  - Simón
  lexicon: HALOT
  rationale: Como nombre propio bíblico, «Simeón» es la forma castellana establecida y transparente en español bíblico, más cercana al uso tradicional que «Simón» en este contexto genealógico.
- source_word: יְמוּאֵל
  english_pob_choice: Jemuel
  chosen_spanish: Jemuel
  alternatives_spanish:
  - Yemuel
  lexicon: HALOT
  rationale: Se conserva la transliteración bíblica convencional «Jemuel», que refleja el nombre hebreo sin traducirlo.
- source_word: וְיָמִין
  english_pob_choice: Jamin
  chosen_spanish: Jamín
  alternatives_spanish:
  - Yamín
  lexicon: HALOT
  rationale: Se adopta la forma castellanizada y bíblicamente reconocible «Jamín», que corresponde al nombre hebreo y evita una transliteración menos natural para el lector hispanohablante.
- source_word: וְאֹהַד
  english_pob_choice: Ohad
  chosen_spanish: Ohad
  alternatives_spanish:
  - Ohad
  lexicon: HALOT
  rationale: Nombre propio transliterado de manera directa. La forma «Ohad» es breve, legible y suficientemente fiel al hebreo.
- source_word: וְיָכִין
  english_pob_choice: Jachin
  chosen_spanish: Jacín
  alternatives_spanish:
  - Yacín
  lexicon: HALOT
  rationale: Se prefiere «Jacín», forma que comunica de manera clara el nombre bíblico en español y mantiene la tradición de transliteración castellana con ajuste ortográfico para lectura natural.
- source_word: וְצֹחַר
  english_pob_choice: Zohar
  chosen_spanish: Zoar
  alternatives_spanish:
  - Zohar
  - Zojar
  lexicon: HALOT
  rationale: El texto hebreo apunta a un nombre propio que en la tradición española suele aparecer como «Zoar» en esta genealogía. Se evita confundirlo con otros nombres bíblicos homónimos o muy cercanos, y se preserva la identificación tradicional del personaje.
- source_word: וְשָׁאוּל
  english_pob_choice: and Shaul
  chosen_spanish: Saúl
  alternatives_spanish:
  - Shaúl
  - Shaul
  lexicon: HALOT
  rationale: La POB inglesa preserva «Shaul» por transparencia hebrea, pero en español el nombre bíblico reconocido es «Saúl». Aquí se usa «Saúl» como forma natural y claramente identificable, sin introducir un nombre ajeno al hebreo.
- source_word: בֶּן הַכְּנַעֲנִית
  english_pob_choice: the son of the Canaanite woman
  chosen_spanish: hijo de la mujer cananea
  alternatives_spanish:
  - hijo de la cananea
  - hijo de la mujer canaanea
  lexicon: HALOT
  rationale: El hebreo usa el femenino singular gentilicio con artículo para designar a una mujer cananea. «Mujer cananea» conserva el sentido femenino y evita la forma poco natural «cananeíta» o la ambigüedad de dejar solo «cananea» como sustantivo.
translation_notes:
  revision_awareness: La revisión inglesa más reciente no introdujo cambios sustanciales; el texto se mantiene en acuerdo alto con la fuente hebrea y con la decisión de conservar la forma nominal y genealógica de la lista. En español se ajustaron únicamente las formas de nombres propios para máxima naturalidad y fidelidad auditables.
  spanish_consistency_notes:
  - Se mantiene el orden genealógico del hebreo.
  - Se usó «Simeón» y no «Simón» para respetar el personaje bíblico en contexto genealógico.
  - Se conservó la estructura «hijo de la mujer cananea» para reflejar el femenino del hebreo.
  - La nota al pie marca la alternativa «Saúl» para el nombre hebreo Shaul, siguiendo la tensión documentada entre transparencia hebrea y forma tradicional española.
