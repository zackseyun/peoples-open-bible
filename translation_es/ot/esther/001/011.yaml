  text: to bring Queen Vashti before the king with the royal crown[a], to show the peoples and the officials her beauty[c][b], for she was beautiful in appearance.
  footnotes:
  - marker: a
    text: Or 'with the royal crown.' The Hebrew preposition can be rendered more literally that way; 'wearing the royal crown' makes the sense explicit in English.
    reason: lexical_alternative
  - marker: b
    text: Or 'the people and the officials.' The Hebrew has a plural form, 'the peoples,' which may reflect the empire's many subject peoples.
    reason: lexical_alternative
  - marker: c
    text: Literally, 'for she was good of appearance,' a Hebrew idiom meaning physically beautiful.
    reason: lexical_alternative
