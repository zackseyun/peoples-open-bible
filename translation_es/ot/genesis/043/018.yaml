revisions:
- from: 'Y tuvieron miedo los hombres, porque habían sido introducidos[a] en la casa de José, y se dijeron: “A causa del dinero que fue devuelto en nuestros costales la primera vez, estamos siendo introducidos, para que él busque un pretexto contra nosotros, y caiga sobre nosotros, y nos tome como esclavos, junto con nuestros asnos.”'
  to: 'Los hombres tuvieron miedo porque habían sido llevados a la casa de José, y dijeron: «Es por el dinero que fue devuelto en nuestros sacos la primera vez que nos están haciendo entrar, para que él busque un pretexto[a] contra nosotros, caiga sobre nosotros, y nos tome como esclavos, junto con nuestros asnos».'
  rationale: 'Se corrige el problema principal: la nota se mueve a la expresión idiomática que realmente explica. También se mejora la naturalidad del español con «habían sido llevados», «dijeron», y «sacos», sin alterar el significado ni la decisión léxica clave de «esclavos».'
