    issue: «trescientos siclos de plata» especifica una unidad no presente en el hebreo
    rationale: El hebreo dice literalmente «trescientos plata» y el POB inglés decidió explícitamente evitar «shekels/siclos». Añadir «siclos» altera el significado y contradice la decisión lexical documentada.
  - severity: medium
    issue: «A todos les dio» debilita el doble distributivo hebreo
    rationale: לְכֻלָּם junto con לָאִישׁ enfatiza que cada hermano recibió su propio cambio de ropa. «A cada uno de ellos» lo preserva mejor y sigue siendo español natural.
  - severity: low
    issue: La nota [a] introduce una glosa alternativa innecesaria
    rationale: No hay una ambigüedad nueva en español que requiera nota sobre «muda de ropa». La nota útil que sí debe conservarse es la de la unidad monetaria no especificada.
  revised_spanish_text: A cada uno de ellos le dio una muda de ropa, pero a Benjamín le dio trescientas piezas de plata[a] y cinco mudas de ropa.
