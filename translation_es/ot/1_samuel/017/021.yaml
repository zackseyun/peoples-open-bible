translation:
  language: es
  text: Israel y los filisteos se alinearon en formación de batalla frente a formación de batalla[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'También: «línea de batalla frente a línea de batalla» o «formación contra formación».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַתַּעֲרֹךְ
  english_pob_choice: drew up
  chosen_spanish: dispusieron
  alternatives_spanish:
  - se alinearon
  - formaron
  lexicon: HALOT
  rationale: En contexto militar, ערך indica ordenar o disponer tropas para el combate. «Dispusieron» comunica la acción de organizarse en formación sin sonar arcaico ni demasiado interpretativo.
- source_word: יִשְׂרָאֵל
  english_pob_choice: Israel
  chosen_spanish: Israel
  alternatives_spanish:
  - el Israel
  lexicon: nombre propio
  rationale: Nombre propio del pueblo/nación, conservado sin adaptación.
- source_word: וּפְלִשְׁתִּים
  english_pob_choice: and the Philistines
  chosen_spanish: y los filisteos
  alternatives_spanish:
  - y Filistea
  lexicon: nombre étnico/nacional
  rationale: Nombre del grupo étnico-histórico; en español bíblico estándar, «filisteos» es claro y fiel.
- source_word: מַעֲרָכָה
  english_pob_choice: battle line
  chosen_spanish: línea de batalla
  alternatives_spanish:
  - formación de batalla
  - batalla en formación
  lexicon: HALOT
  rationale: El sustantivo refiere a una formación militar ordenada. «Línea de batalla» mantiene la imagen concreta y resulta natural en español.
- source_word: לִקְרַאת
  english_pob_choice: against
  chosen_spanish: frente a
  alternatives_spanish:
  - contra
  - para encontrar
  lexicon: HALOT
  rationale: En esta construcción idiomática, el valor es de enfrentamiento u oposición entre dos líneas. «Frente a» preserva la relación visual y militar sin añadir una connotación más fuerte que la del hebreo.
- source_word: מַעֲרָכָה
  english_pob_choice: battle line
  chosen_spanish: otra línea de batalla
  alternatives_spanish:
  - otra formación de batalla
  - otra línea
  lexicon: HALOT
  rationale: Se repite el mismo término para conservar la repetición hebrea y la simetría del versículo. «Otra línea de batalla» refleja la redundancia intencional de manera clara en español.
translation_notes:
  revision_awareness: La versión inglesa revisada mantuvo sin cambios la decisión léxica principal («drew up battle line against battle line»), por lo que el español conserva el paralelismo y la imagen militar sin introducir una paráfrasis más amplia.
  spanish_consistency_notes:
  - Se mantuvo el paralelismo de dos miembros con repetición de «línea de batalla» para reflejar la repetición de מַעֲרָכָה.
  - Se evitó «contra» en el cuerpo principal porque el hebreo enfatiza la posición opuesta y la disposición de las líneas; esa opción queda como alternativa en la nota.
