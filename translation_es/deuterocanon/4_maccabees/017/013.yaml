- from: Eleazar iba delante en la contienda[a]; la madre de los siete hijos estaba compitiendo como atleta; y los hermanos estaban contendiendo.
  to: Eleazar tomaba la delantera en la contienda[a]; la madre de los siete hijos competía como atleta; y los hermanos contendían.
  rationale: Se revisa el primer verbo para reflejar mejor el matiz de precedencia/liderazgo de προηγωνίζετο, y se aligera la sintaxis verbal con imperfectos simples más naturales en español. Se conserva la metáfora agonística a lo largo de las tres cláusulas y se mantiene 'los hermanos' por precisión contextual. No se fuerza 'hijos varones' en el texto principal para evitar pesadez, pero se señala la cuestión como matiz contextual menor.
