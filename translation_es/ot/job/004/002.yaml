translation:
  language: es
  text: Si uno intenta hablarte[a], ¿te cansarás? Pero ¿quién podrá contener las palabras?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Si uno se atreve a plantearte un asunto, ¿te cansarás?»'
