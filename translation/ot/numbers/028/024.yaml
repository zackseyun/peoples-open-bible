id: NUM.28.24
reference: Numbers 28:24
source:
  edition: WLC
  text: כָּ/אֵ֜לֶּה תַּעֲשׂ֤וּ לַ/יּוֹם֙ שִׁבְעַ֣ת יָמִ֔ים לֶ֛חֶם אִשֵּׁ֥ה רֵֽיחַ נִיחֹ֖חַ לַ/יהוָ֑ה עַל עוֹלַ֧ת הַ/תָּמִ֛יד יֵעָשֶׂ֖ה וְ/נִסְכּֽ/וֹ־־׃
translation:
  text: 'Thus you shall offer these each day for seven days: food[a], an offering made by fire, a pleasing aroma to Yahweh[c][b]; it shall be offered in addition to the regular burnt offering and its drink offering.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'According to these you shall do day by day for seven days.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'bread/food of a fire offering'; here 'food' refers to the sacrificial provision, not necessarily literal bread alone.
    reason: cultural_note
  - marker: c
    text: Or 'besides the continual burnt offering and its libation.'
    reason: lexical_alternative
lexical_decisions:
- source_word: כָּאֵלֶּה
  chosen: Like these
  alternatives:
  - According to these
  - Thus
  lexicon: HALOT
  rationale: 'The prefixed כ expresses comparison: the daily offerings are to be made in the same manner/quantity as those just specified. ''Like these'' is concise and natural while preserving the comparative force.'
- source_word: תַּעֲשׂוּ
  chosen: you shall offer
  alternatives:
  - you shall do
  - you shall make
  lexicon: HALOT
  rationale: עשה is broadly 'do/make,' but in sacrificial context English idiom prefers 'offer.' This reflects the cultic action without over-paraphrasing.
- source_word: לַיּוֹם שִׁבְעַת יָמִים
  chosen: each day for seven days
  alternatives:
  - day by day for seven days
  - for seven days daily
  lexicon: HALOT
  rationale: The phrase indicates repetition on each of the seven days. 'Each day for seven days' communicates the distributive sense clearly in modern English.
- source_word: לֶחֶם אִשֵּׁה
  chosen: as food, an offering made by fire
  alternatives:
  - food offering
  - bread of a fire offering
  lexicon: HALOT
  rationale: Literally 'bread/food of a fire-offering.' In sacrificial usage לֶחֶם often means food provision rather than literal bread. Rendering both elements preserves the Hebrew imagery and cultic terminology while remaining readable.
- source_word: רֵיחַ נִיחֹחַ
  chosen: a pleasing aroma
  alternatives:
  - a soothing aroma
  - a sweet-smelling aroma
  lexicon: HALOT
  rationale: This standard sacrificial formula denotes acceptability before God. 'Pleasing aroma' is idiomatic modern English and avoids archaic phrasing while preserving the metaphor.
- source_word: לַיהוָה
  chosen: to the LORD
  alternatives:
  - to Yahweh
  lexicon: HALOT
  rationale: Per doctrine, יהוה is rendered 'the LORD' rather than transliterated.
- source_word: עַל עֹלַת הַתָּמִיד
  chosen: in addition to the regular burnt offering
  alternatives:
  - besides the continual burnt offering
  - upon the regular burnt offering
  lexicon: HALOT
  rationale: Here עַל has the sense of addition/superimposition in sacrificial instructions. הַתָּמִיד refers to the regular continual offering. 'In addition to the regular burnt offering' best conveys the ritual relationship.
- source_word: יֵעָשֶׂה
  chosen: it shall be offered
  alternatives:
  - it shall be made
  - it shall be done
  lexicon: HALOT
  rationale: Passive of עשה in this cultic context is naturally rendered 'be offered,' matching the sacrificial subject implied by the preceding instructions.
- source_word: וְנִסְכּוֹ
  chosen: and its drink offering
  alternatives:
  - with its libation
  lexicon: HALOT
  rationale: נסך refers to the accompanying poured offering. 'Drink offering' is the standard transparent English equivalent; the 3ms suffix refers back to the regular burnt offering.
