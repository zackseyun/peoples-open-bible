revisions:
- from: 'El sacerdote respondió a David y dijo[a]: «No hay pan común a la mano, pero sí hay pan santo—si los jóvenes se han guardado de las mujeres».'
  to: 'El sacerdote respondió a David y dijo[a]: «No hay pan común a mano, pero sí hay pan santo, si los jóvenes se han guardado de mujer».'
  rationale: Se ajusta el modismo de disponibilidad a un español más natural (‘a mano’) y se afina la expresión de abstinencia a ‘de mujer’, que conserva mejor el hebreo singular con sentido colectivo y suena más idiomática en español, mientras la nota mantiene explícitamente la alternativa ‘de una mujer’ y su explicación ritual.
