translation:
  text: Years of life are with a discerning man[a]; he will lie down until morning[b], and his life is with him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew reads 'and his life is with him'; alternatively, 'and his soul is with him.' The Hebrew נפש can mean life, self, or soul depending on context.
    reason: lexical_alternative
  - marker: b
    text: The Greek parallel cited here differs sharply from the Hebrew, reading approximately, 'He who takes away a neighbor's livelihood is killing him.' This appears to reflect a different textual form, so the main translation follows the extant Hebrew witness.
    reason: textual_variant
lexical_decisions:
- source_word: שנות חיים
  chosen: Years of life
  alternatives:
  - Years of living
  - Life-years
  - Long life
  lexicon: HALOT
  rationale: A formally anchored rendering of the construct phrase. 'Years of life' preserves the Hebrew idiom without over-interpreting it as a promise of 'long life,' though the sense points toward life prolonged or sustained.
- source_word: איש נבון
  chosen: an understanding man
  alternatives:
  - a discerning man
  - a prudent man
  - a wise man
  lexicon: HALOT
  rationale: נבון emphasizes discernment or understanding rather than general wisdom. 'Man' is retained for gender-accurate fidelity to the singular איש, in line with project philosophy.
- source_word: ילין עד בקר
  chosen: he will lodge until morning
  alternatives:
  - he will remain until morning
  - he will spend the night until morning
  lexicon: HALOT
  rationale: ילין from לון/לין commonly means to lodge or spend the night. 'Lodge until morning' keeps the nocturnal sense explicit and avoids flattening the image into mere duration.
- source_word: ונפשו עמו
  chosen: and his life is with him
  alternatives:
  - and his soul is with him
  - and he remains alive
  - and his appetite is with him
  lexicon: HALOT
  rationale: נפש can mean soul, life, self, or appetite depending on context. Here, with the surrounding language of life and surviving the night, 'his life is with him' best captures continued life/preservation. 'His soul is with him' is possible but sounds misleadingly dualistic in English; 'appetite' is too narrow here.
- source_word: φονεύων τὸν πλησίον ὁ ἀφαιρούμενος συμβίωσιν
  chosen: used as a control witness indicating a major divergence, not followed for the main text
  alternatives:
  - he who takes away a neighbor's livelihood is killing him
  - one who deprives his neighbor of means of life is a murderer
  lexicon: BDAG
  rationale: The Greek parallel as given differs radically from the Hebrew witness and appears to reflect a different verse or textual form. Because the task directs primacy to the Hebrew where extant, the main translation follows the Hebrew while documenting the divergence.
