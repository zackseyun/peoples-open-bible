lexical_decisions:
- source_word: θεὲ
  english_pob_choice: God
  chosen_spanish: Dios
  alternatives_spanish:
  - ¡Oh Dios!
  lexicon: LSJ
  rationale: El vocativo directo se expresa naturalmente en español con 'Dios'; se omite la interjección 'oh' porque no añade contenido y puede sonar más enfática de lo necesario.
- source_word: πατέρων
  english_pob_choice: of the fathers
  chosen_spanish: de los padres
  alternatives_spanish:
  - de nuestros padres
  - de los antepasados
  lexicon: LSJ
  rationale: El griego presenta un genitivo plural simple; 'de los padres' conserva la referencia ancestral/covenantal sin añadir posesivo explícito ni generalizar a 'antepasados'.
- source_word: Κύριε
  english_pob_choice: Lord
  chosen_spanish: Señor
  alternatives_spanish:
  - Dueño
  - Maestro
  lexicon: LSJ
  rationale: En una invocación a Dios, 'Señor' es el equivalente natural y reverente en español, manteniendo el valor vocativo del original.
- source_word: τοῦ ἐλέους σου
  english_pob_choice: of your mercy
  chosen_spanish: de tu misericordia
  alternatives_spanish:
  - de tu gracia
  - misericordioso
  lexicon: LSJ
  rationale: Se conserva la construcción posesiva explícita de σου con 'tu misericordia'. 'Gracia' sería menos preciso y 'misericordioso' cambiaría la sintaxis.
- source_word: ὁ ποιήσας
  english_pob_choice: who made
  chosen_spanish: que hiciste
  alternatives_spanish:
  - que has hecho
  - el que hizo
  lexicon: LSJ
  rationale: En español, la cláusula relativa se integra de forma natural con 'que hiciste', manteniendo la identificación de Dios por su acto creador.
- source_word: τὰ πάντα
  english_pob_choice: all things
  chosen_spanish: todas las cosas
  alternatives_spanish:
  - todo
  - el universo entero
  lexicon: LSJ
  rationale: '''Todas las cosas'' reproduce de forma amplia y solemne la totalidad de τὰ πάντα sin introducir una paráfrasis más interpretativa.'
- source_word: ἐν λόγῳ σου
  english_pob_choice: by your word
  chosen_spanish: por tu palabra
  alternatives_spanish:
  - mediante tu palabra
  - por medio de tu palabra
  - por tu mandato
  lexicon: LSJ
  rationale: '''Por tu palabra'' expresa bien el valor instrumental de ἐν y preserva λόγος como ''palabra''. Se evita ''mandato'' para no estrechar el alcance del término ni perder su resonancia teológica.'
theological_decisions:
- issue: λόγος en la creación
  english_pob_reading: by your word
  chosen_spanish_reading: por tu palabra
  alternative_spanish_readings:
  - por tu mandato
  - mediante tu palabra
  rationale: Se conserva 'palabra' para mantener la correspondencia con λόγος y no resolver la expresión en una sola glosa funcional. Así queda abierta la resonancia bíblica y teológica del lenguaje creador.
  doctrine_reference: Primacía del texto original y preservación de la tensión léxica; no forzar una interpretación doctrinal posterior.
translation_notes:
  revision_awareness: La versión inglesa auditada revisó 'Lord of mercy' a 'Lord of your mercy' para reflejar σου; en español se siguió esa lectura explícita con 'Señor de tu misericordia'. También se mantuvo el valor instrumental de ἐν λόγῳ σου con 'por tu palabra', coherente con la nota inglesa.
  spanish_consistency_notes:
  - Se usa 'Dios' y 'Señor' en forma vocativa, sin mayúsculas excesivas ni abreviaturas litúrgicas.
  - '''Palabra'' se conserva para λόγος, evitando ''mandato'' en el texto principal para no perder la ambigüedad productiva del original.'
  - '''Padres'' traduce πατέρων de modo tradicional y bíblico, sin introducir ''antepasados'' que diluiría el tono de oración histórica.'
