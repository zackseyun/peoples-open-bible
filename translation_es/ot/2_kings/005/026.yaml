translation:
  language: es
  text: 'Pero él le dijo: “¿No fue mi corazón[a] cuando aquel hombre se volvió de su carro para encontrarte? ¿Es este el tiempo para tomar la plata, y para tomar vestidos, y olivares y viñas, y ovejas y ganado, y siervos y siervas[b]?”'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, de manera más interpretativa: “¿No estaba yo allí en espíritu cuando aquel hombre se volvió de su carro para encontrarte?”'
    reason: lexical_alternative
  - marker: b
    text: O “esclavos y esclavas”.
    reason: lexical_alternative
lexical_decisions:
- source_word: לִבִּי הָלַךְ
  english_pob_choice: my heart go
  chosen_spanish: mi corazón iba
  alternatives_spanish:
  - yo estaba allí en espíritu
  - mi mente iba
  lexicon: HALOT
  rationale: Conservo la idiomática hebrea de una presencia/interioridad percibida sin reducirla simplemente a ‘yo’. ‘Mi corazón’ mantiene la imagen concreta del original y su fuerza retórica.
- source_word: כַּאֲשֶׁר הָפַךְ אִישׁ מֵעַל מֶרְכַּבְתּוֹ לִקְרָאתֶךָ
  english_pob_choice: when the man turned from his chariot to meet you
  chosen_spanish: cuando aquel hombre se volvió desde su carro para encontrarte
  alternatives_spanish:
  - cuando el hombre bajó de su carro para encontrarte
  - cuando el hombre se apartó de su carro para encontrarte
  lexicon: HALOT
  rationale: ‘Se volvió’ comunica היטב la idea de girarse/volver del hebreo הָפַךְ. ‘Desde su carro’ preserva la relación espacial del original. ‘Aquel hombre’ refleja el indefinido específico del hebreo sin introducir el nombre en el texto.
- source_word: הַעֵת
  english_pob_choice: Is this the time
  chosen_spanish: ¿Es este el tiempo
  alternatives_spanish:
  - ¿Es éste un tiempo
  - ¿Era este el tiempo
  lexicon: HALOT
  rationale: El español requiere una formulación interrogativa explícita. ‘Este el tiempo’ reproduce el tono de reprensión sobre la oportunidad inapropiada para tomar ventaja.
- source_word: לָקַחַת אֶת הַכֶּסֶף
  english_pob_choice: to take silver
  chosen_spanish: para tomar el plata
  alternatives_spanish:
  - para tomar la plata
  - para aceptar plata
  - para tomar dinero
  lexicon: HALOT
  rationale: Conservo ‘plata’ como sustantivo de valor/metálico, conforme al hebreo כֶּסֶף. La forma sin artículo sigue el paralelismo del original y evita una interpretación excesivamente abstracta como ‘dinero’.
- source_word: בְּגָדִים
  english_pob_choice: garments
  chosen_spanish: vestidos
  alternatives_spanish:
  - ropas
  - prendas
  lexicon: HALOT
  rationale: ‘Vestidos’ es natural en español y mantiene el registro de bienes recibidos. Evita la aspereza de una traducción demasiado técnica y sigue suficientemente de cerca el sustantivo hebreo.
- source_word: וְזֵיתִים
  english_pob_choice: olive orchards
  chosen_spanish: olivares
  alternatives_spanish:
  - huertos de olivos
  - plantaciones de olivos
  lexicon: HALOT
  rationale: ‘Olivares’ es el equivalente idiomático más directo en español para una propiedad productiva de olivos. Conserva la idea de bien inmueble, en paralelo con viñas.
- source_word: וּכְרָמִים
  english_pob_choice: vineyards
  chosen_spanish: viñas
  alternatives_spanish:
  - viñedos
  - campos de vid
  lexicon: HALOT
  rationale: ‘Viñas’ es claro y bíblico en español, y se ajusta al listado de posesiones agrícolas. También mantiene buena cadencia junto a ‘olivares’.
- source_word: צֹאן וּבָקָר
  english_pob_choice: sheep and cattle
  chosen_spanish: ovejas y ganado
  alternatives_spanish:
  - rebaños y ganados
  - ovejas y vacas
  lexicon: HALOT
  rationale: La pareja concreta se conserva en español. ‘Ganado’ abarca el hebreo בָּקָר sin forzar una especie específica, y funciona bien en una lista de bienes.
- source_word: עֲבָדִים וּשְׁפָחוֹת
  english_pob_choice: male servants and female servants
  chosen_spanish: esclavos y esclavas
  alternatives_spanish:
  - siervos y siervas
  - criados y criadas
  lexicon: HALOT
  rationale: Sigo la fuerza más literal del par hebreo, que designa personas bajo dependencia/bondaje y que la POB inglesa dejó como alternativa explícita. En este contexto de acumulación de riquezas, ‘esclavos’ preserva mejor la dureza del término.
theological_decisions:
- issue: Tratamiento de עֲבָדִים וּשְׁפָחוֹת como estatus social
  english_pob_reading: male servants and female servants, with alternative male slaves and female slaves
  chosen_spanish_reading: esclavos y esclavas
  alternative_spanish_readings:
  - siervos y siervas
  - criados y criadas
  rationale: El hebreo apunta a personas en condición de dependencia, no simplemente a ayudantes domésticos. Dado que la POB inglesa conserva la alternativa ‘slaves’, en español conviene reflejar esa tensión y no suavizarla indebidamente. La pareja masculina/femenina queda explícita.
  doctrine_reference: 'DOCTRINE.md: términos de estatus social con fuerza de dependencia; principio análogo al tratamiento contextual de δοῦλος.'
- issue: ‘Mi corazón’ como forma idiomática de conocimiento/presencia interior
  english_pob_reading: Did not my heart go...; more interpretively, ‘Was I not there in spirit...?’
  chosen_spanish_reading: ¿No iba mi corazón... ?
  alternative_spanish_readings:
  - ¿No estaba yo allí en espíritu... ?
  - ¿No iba mi mente... ?
  rationale: 'La POB inglesa retiene la imagen del ‘heart’ y ofrece una paráfrasis interpretativa. El español mantiene la misma tensión: una formulación literal que deja abierta la comprensión idiomática sin eliminarla.'
  doctrine_reference: 'Principio de equivalencia óptima: conservar la imagen hebrea cuando no impide la inteligibilidad.'
translation_notes:
  revision_awareness: Tomé en cuenta la revisión más reciente del audit trail inglés, que ajustó ‘olive groves’ a ‘olive orchards’. En español no se requiere ese matiz porque ‘olivares’ ya cubre naturalmente la propiedad productiva de olivos y mantiene el paralelismo con ‘viñas’. También consideré la alternativa interpretativa de ‘my heart go’ como presencia en espíritu, pero la forma principal conserva mejor la imagen hebrea.
  spanish_consistency_notes:
  - Uso ‘Yahvé’ para el nombre divino en la traducción general, pero este versículo no lo contiene.
  - Conservo el registro de reprensión profética con sintaxis directa y lista acumulativa de bienes.
  - Mantengo la distinción entre el texto principal y la nota alternativa para no aplanar la tensión lexical del hebreo.
  - ‘Plata’ se usa como sustantivo de valor/metálico, no como color.
  - ‘Esclavos y esclavas’ responde al par hebreo explícito y a la sensibilidad auditiva del contexto de adquisición de bienes.
