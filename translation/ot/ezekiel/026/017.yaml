theological_decisions:
- issue: Personification of the city Tyre
  chosen_reading: Render the city with feminine personal language ('she and her inhabitants')
  alternative_readings:
  - Render impersonally as 'it and its inhabitants'
  rationale: The Hebrew uses feminine forms for the city and prophetic laments often personify cities. Preserving this supports the poetic force without adding doctrine.
  doctrine_reference: Translation philosophy §6 (readable modern English) and §5 (consistency/documented exception)
