translation:
  language: es
  text: Y encomiendan a un solo hombre gobernarlos cada año y ejercer señorío sobre toda su tierra, y todos escuchan a ese solo hombre[a], y no hay entre ellos envidia ni celos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «obedecen a ese solo hombre». El griego dice literalmente «todos escuchan al uno», lo cual en este contexto de gobierno puede implicar obediencia.'
    reason: lexical_alternative
lexical_decisions:
- source_word: πιστεύουσιν
  english_pob_choice: entrust
  chosen_spanish: confían a
  alternatives_spanish:
  - encomiendan a
  - depositan en
  - confían a un solo hombre el
  lexicon: LSJ
  rationale: En este contexto político, el verbo expresa delegar autoridad a una persona. «Confían a» conserva la idea de poner la responsabilidad en manos de alguien, sin reducirla a una simple creencia mental.
- source_word: ἑνὶ ἀνθρώπῳ
  english_pob_choice: one man
  chosen_spanish: un solo hombre
  alternatives_spanish:
  - una sola persona
  - un hombre
  - un único hombre
  lexicon: LSJ
  rationale: El griego es masculino singular. «Un solo hombre» refleja esa especificidad y mantiene la fuerza distributiva de que el cargo recae en una sola persona varón.
- source_word: ἄρχειν
  english_pob_choice: to rule over
  chosen_spanish: el gobierno de
  alternatives_spanish:
  - el gobernar de
  - el reinar sobre
  - el mandar sobre
  lexicon: LSJ
  rationale: Aquí el infinitivo funciona como complemento de la delegación de autoridad. «El gobierno de» suena natural en español y preserva el sentido de ejercicio de autoridad política sin sobrecargar la frase.
- source_word: κατ' ἐνιαυτόν
  english_pob_choice: each year
  chosen_spanish: cada año
  alternatives_spanish:
  - anualmente
  - año tras año
  - por un año
  lexicon: LSJ
  rationale: La expresión indica un turno anual. «Cada año» es la forma más clara y fiel en español para ese ritmo repetido.
- source_word: κυριεύειν
  english_pob_choice: to exercise lordship over
  chosen_spanish: el ejercicio de señorío sobre
  alternatives_spanish:
  - el dominio sobre
  - el ejercicio de dominio sobre
  - el señorío sobre
  lexicon: LSJ
  rationale: El verbo es más fuerte que un simple «gobernar» y apunta a señorío o dominio. «Ejercicio de señorío sobre» conserva ese peso sin recurrir a una formulación arcaica.
- source_word: πάσης τῆς γῆς αὐτῶν
  english_pob_choice: all their land
  chosen_spanish: toda su tierra
  alternatives_spanish:
  - toda su tierra
  - todo su territorio
  - toda su región
  lexicon: LSJ
  rationale: En este marco cívico-político, γῆ se refiere a la tierra/territorio propio. «Toda su tierra» es breve, natural y fiel al alcance geográfico del griego.
- source_word: ἀκούουσιν τοῦ ἑνός
  english_pob_choice: listen to the one
  chosen_spanish: todos escuchan al uno
  alternatives_spanish:
  - todos obedecen al uno
  - todos atienden al uno
  - todos escuchan a uno
  lexicon: LSJ
  rationale: Con el genitivo, ἀκούω puede significar oír/escuchar y, en contexto, implicar obediencia. «Escuchan» conserva la literalidad griega; el contexto político permite inferir la sumisión sin explicitarla de más.
- source_word: φθόνος
  english_pob_choice: envy
  chosen_spanish: envidia
  alternatives_spanish:
  - resentimiento
  - rencor
  lexicon: LSJ
  rationale: «Envidia» es la correspondencia directa y mantiene el sentido de mala voluntad en competencia o rivalidad.
- source_word: ζῆλος
  english_pob_choice: jealousy
  chosen_spanish: celo
  alternatives_spanish:
  - celos
  - rivalidad
  - envidia
  lexicon: LSJ
  rationale: En español, «celo» puede reflejar el matiz de ζῆλος, pero en este contexto la pareja con φθόνος sugiere una segunda forma de disposición hostil. Se eligió «celo» para evitar duplicar «envidia», aunque se reconoce la ambigüedad semántica.
translation_notes:
  revision_awareness: El texto sigue de cerca el griego Swete 1909 y el audit trail inglés, manteniendo la estructura política de la oración y la tensión entre literalidad y implicación de obediencia en ἀκούουσιν τοῦ ἑνός. Se evitó una paráfrasis amplia y se preservó el contraste final entre φθόνος y ζῆλος.
  spanish_consistency_notes:
  - Se usó «Yahvé» como norma general del proyecto no porque aparezca aquí, sino para consistencia global cuando corresponda.
  - Se mantuvo un registro relativamente literal de los dos infinitivos coordinados («el gobierno de... y el ejercicio de señorío sobre...»), siguiendo la fuerza del griego.
  - «Escuchan al uno» conserva la ambigüedad del original; la nota explica la posible lectura de obediencia sin imponerla en el texto principal.
  - En el par final, «envidia» traduce φθόνος y «celo» se reserva para ζῆλος, reconociendo que el español no reproduce exactamente la misma oposición que el griego.
