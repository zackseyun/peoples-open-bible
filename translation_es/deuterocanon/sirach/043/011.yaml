translation:
  language: es
  text: Mira el arcoíris[a] y bendice a su Hacedor[b], porque es sumamente majestuoso en esplendor.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo קשת: ''arco''; aquí, el arco del cielo, es decir, el arcoíris.'
    reason: lexical_alternative
  - marker: b
    text: 'El rollo de Masada apoya aquí el sentido de majestad/esplendor, con una formulación cognada donde el texto de la Guenizá de El Cairo dice: ''porque es sumamente majestuoso en esplendor''.'
    reason: textual_variant
lexical_decisions:
- source_word: ראה
  english_pob_choice: Look at
  chosen_spanish: Mira
  alternatives_spanish:
  - Mira atentamente
  - Contempla
  - Observa
  lexicon: HALOT
  rationale: El imperativo pide atención visual directa. 'Mira' conserva la inmediatez y suena natural en español moderno sin perder el tono poético.
- source_word: קשת
  english_pob_choice: rainbow
  chosen_spanish: arco iris
  alternatives_spanish:
  - arco
  - arco del cielo
  lexicon: HALOT
  rationale: El contexto cosmológico y el paralelo griego τόξον apuntan al fenómeno celeste; 'arco iris' explicita el referente para el lector hispanohablante.
- source_word: וברך
  english_pob_choice: and bless
  chosen_spanish: y bendice
  alternatives_spanish:
  - y alaba
  - y glorifica
  lexicon: HALOT
  rationale: ברך mantiene su sentido básico de bendecir. En este contexto significa hablar bien del Creador; 'bendice' conserva la formulación reverente del texto fuente.
- source_word: עושיה
  english_pob_choice: its Maker
  chosen_spanish: a su Hacedor
  alternatives_spanish:
  - al que lo hizo
  - a su Creador
  lexicon: HALOT
  rationale: El sufijo remite al arco iris. 'Hacedor' mantiene la referencia personal al agente creador y refleja la forma participial del hebreo sin forzar una expansión doctrinal.
- source_word: מאד
  english_pob_choice: exceedingly
  chosen_spanish: sumamente
  alternatives_spanish:
  - en gran manera
  - excesivamente
  lexicon: HALOT
  rationale: El adverbio intensifica la afirmación. 'Sumamente' preserva el énfasis elevado del verso con buen registro literario.
- source_word: נאדרה
  english_pob_choice: majestic
  chosen_spanish: majestuoso
  alternatives_spanish:
  - glorioso
  - espléndido
  lexicon: HALOT
  rationale: La raíz comunica grandeza, dignidad y magnificencia. 'Majestuoso' reproduce bien ese campo semántico y se ajusta al estilo poético.
- source_word: בהוד
  english_pob_choice: in splendor
  chosen_spanish: en su esplendor
  alternatives_spanish:
  - en esplendor
  - en gloria
  lexicon: HALOT
  rationale: הוד expresa esplendor o majestad. Se conserva la construcción natural 'en su esplendor' para reflejar la cualidad visible del arco iris; el posesivo queda justificado por el sufijo del sustantivo en la construcción hebrea.
theological_decisions:
- issue: Referente implícito del Hacedor
  english_pob_reading: The verse calls the reader to bless the rainbow's Maker, implicitly God, without expanding the wording.
  chosen_spanish_reading: El verso llama a bendecir a su Hacedor, dejando implícito que es Dios, sin añadir una expansión interpretativa.
  alternative_spanish_readings:
  - bendice a Dios, que lo hizo
  - bendice al Creador
  rationale: El hebreo y el griego dicen 'su Hacedor / el que lo hizo' y no nombran a Dios explícitamente. Mantener esa formulación evita sobreinterpretar el texto y preserva la tensión lexical documentada.
  doctrine_reference: Translation philosophy; auditable source fidelity
translation_notes:
  revision_awareness: 'La redacción sigue la lectura hebrea confirmada por el paralelo griego: la orden de mirar el fenómeno celeste, bendecir a su Hacedor y describirlo como extraordinariamente majestuoso en esplendor. Se evitó introducir ''Dios'' en el cuerpo del verso porque el texto fuente usa un referente implícito.'
  spanish_consistency_notes:
  - Se prefirió 'arco iris' para hacer explícito el referente celestial, como en el inglés POB.
  - '''Hacedor'' mantiene la relación con el participio hebreo y con el griego ''el que lo hizo''.'
  - Se conservó el tono poético sin arcaísmos innecesarios.
  - '''Esplendor'' se mantuvo sin añadir un segundo posesivo, en línea con la revisión inglesa que evita una posesión no explícita.'
