  - severity: medium
    issue: «después de salir» no expresa tan claramente que ambos sujetos realizaron la acción previa
    rationale: El griego ἐξελθόντες es un participio plural con sujeto compartido con el verbo principal. En español, «después de que salieron» conserva mejor esa referencia personal que el infinitivo.
  - severity: low
    issue: «el uno del otro» suena algo rígido
    rationale: Aunque es correcto, «uno del otro» resulta más natural y suficientemente digno en español general, manteniendo el valor recíproco de ἀπ᾿ ἀλλήλων.
