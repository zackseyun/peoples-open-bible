  yaml_path: translation/deuterocanon/1_esdras/003/047.yaml
  text: and he watches for the lion[a], and walks in darkness; and whenever he steals and snatches and breaks in[c][b], he brings it to his beloved.
  footnotes:
  - marker: a
    text: Or 'looks at the lion.' The Greek verb can denote attentive looking or observing; the context favors a more purposeful sense.
    reason: lexical_alternative
  - marker: b
    text: The final verb for theft (κλωποδυτήσῃ) refers specifically to stealing by stealth, especially by housebreaking; hence 'breaks in.'
    reason: lexical_alternative
  - marker: c
    text: Or 'his lover' or 'the woman he loves.' The Greek τῇ ἐρωμένῃ denotes a beloved woman in a romantic sense.
    reason: lexical_alternative
