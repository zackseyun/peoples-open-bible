revisions:
- from: Cuando todo el pueblo veía el pilar de nube de pie[a] a la entrada de la tienda, todo el pueblo se levantaba y se postraba, cada uno a la entrada de su tienda.
  to: Cuando todo el pueblo vio la columna de nube de pie[a] a la entrada de la tienda, todo el pueblo se levantó y adoró, cada uno a la entrada de su tienda.
  rationale: Se corrige el aspecto verbal para reflejar la secuencia narrativa del hebreo y se alinea la traducción principal de וְהִשְׁתַּחֲוּוּ con la decisión documentada del POB inglés ('worshiped' > 'adoró'), preservando las alternativas físicas en nota. También se mejora la idiomaticidad con 'columna de nube'.
