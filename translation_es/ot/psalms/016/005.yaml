review_pass:
  verdict: revise
  source_alignment_summary: El borrador refleja bien la estructura básica del hebreo y preserva correctamente Yahvé, la imaginería de herencia/porción/copa, y el énfasis de la segunda cláusula. Sin embargo, introduce una desviación sintáctica y semántica al decir «y de mi copa», lo que hace parecer que Yahvé es la porción de la copa, cuando el hebreo coordina «mi herencia» y «mi copa» como dos complementos paralelos. Además, «mi suerte» es posible para גּוֹרָלִי, pero en español puede sonar más a fortuna que a lote asignado; conviene una formulación que preserve mejor la imaginería de asignación.
  spanish_quality_summary: El texto es legible, pero «la porción de mi herencia y de mi copa» suena forzado y menos natural que una coordinación simple. Una leve reparación mejora fidelidad y fluidez poética. «Mi lote» sería demasiado literal y poco idiomático; «mi porción asignada» sería explicativa. La mejor solución breve y clara es conservar «mi suerte» o cambiar a «mi heredad»/«mi lote» según contexto, pero aquí basta con corregir la coordinación principal y dejar una nota léxica.
  glossary_alignment: «Yahvé» sigue correctamente la política del proyecto para יהוה. No hay conflicto con otras entradas del glosario. La revisión mantiene la acumulación de imágenes de reparto sin colapsarlas. Se conserva «copa» de forma literal. Para גּוֹרָלִי, se admite «suerte» como equivalente contextual, pero se señala su posible ambigüedad en español.
  issues:
  - severity: high
    issue: «y de mi copa» altera la relación sintáctica del hebreo
    rationale: 'El original coordina חֶלְקִי y כוֹסִי: «la porción de mi herencia y mi copa», no «la porción de ... mi copa». Añadir «de» hace que «copa» dependa de «porción», modificando el sentido.'
  - severity: medium
    issue: «mi suerte» puede debilitar la imaginería de lote/asignación
    rationale: Aunque puede funcionar, en español contemporáneo «suerte» suele oírse como fortuna o azar. El inglés POB preserva «lot» precisamente por su vínculo con herencia y reparto. Conviene al menos mantener la nota aclaratoria.
  - severity: low
    issue: La nota al pie actual refleja bien la alternativa, pero debe acompañar el texto corregido
    rationale: El marcador y la nota son útiles porque explican la sucesión de imágenes de asignación y la opción más simple «mi porción y mi copa».
  revised_spanish_text: Yahvé es la porción de mi herencia y mi copa[a]; tú sostienes mi suerte.
  revised_footnotes:
