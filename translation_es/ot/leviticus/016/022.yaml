translation:
  language: es
  text: El macho cabrío llevará sobre sí todas sus iniquidades a una tierra separada[a], y enviará al macho cabrío al desierto.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «a una tierra solitaria», «a una tierra inaccesible» o «a una tierra desolada». El hebreo probablemente comunica un lugar cortado o aislado de la habitación humana.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְנָשָׂא
  english_pob_choice: shall carry
  chosen_spanish: llevará sobre sí
  alternatives_spanish:
  - cargará
  - llevará
  lexicon: HALOT
  rationale: נָשָׂא expresa la idea de llevar o cargar algo sobre uno mismo. En español, «llevará sobre sí» conserva la imagen sacrificial y refleja bien el carácter reflexivo del verbo sin volverlo una paráfrasis teológica.
- source_word: הַשָּׂעִיר
  english_pob_choice: the goat
  chosen_spanish: el macho cabrío
  alternatives_spanish:
  - el cabro
  - la cabra
  lexicon: HALOT
  rationale: El hebreo designa un macho cabrío. A diferencia del inglés, en español conviene explicitar el matiz masculino para mantener precisión zoológica y ritual.
- source_word: עָלָיו
  english_pob_choice: on itself
  chosen_spanish: sobre sí
  alternatives_spanish:
  - sobre él
  - encima de sí
  lexicon: HALOT
  rationale: La preposición con sufijo pronominal indica que el macho cabrío carga la culpa sobre sí mismo. «Sobre sí» comunica esa reflexividad de modo natural en español.
- source_word: כָּל עֲוֺנֹתָם
  english_pob_choice: all their iniquities
  chosen_spanish: todas sus iniquidades
  alternatives_spanish:
  - todos sus pecados
  - toda su culpa
  lexicon: HALOT
  rationale: עָוֹן suele abarcar iniquidad, culpa o perversidad, y la opción «iniquidades» conserva mejor el peso moral y cultual que «pecados».
- source_word: אֶל אֶרֶץ גְּזֵרָה
  english_pob_choice: to a cut-off land
  chosen_spanish: a una tierra aislada
  alternatives_spanish:
  - a una tierra apartada
  - a una tierra solitaria
  - a una tierra desolada
  lexicon: HALOT
  rationale: La expresión es difícil y sugiere separación, aislamiento o exclusión. «Tierra aislada» conserva esa idea sin decidir demasiado entre las opciones posibles.
- source_word: וְשִׁלַּח
  english_pob_choice: he shall send away
  chosen_spanish: soltará
  alternatives_spanish:
  - enviará lejos
  - despedirá
  - dejará ir
  lexicon: HALOT
  rationale: En este contexto ritual, שׁלח implica despachar o dejar libre al macho cabrío. «Soltará» transmite bien el acto de liberarlo hacia el desierto y es idiomático en español.
- source_word: בַּמִּדְבָּר
  english_pob_choice: into the wilderness
  chosen_spanish: en el desierto
  alternatives_spanish:
  - al desierto
  - en la estepa
  lexicon: HALOT
  rationale: מִדְבָּר puede referirse al desierto o región árida. «En el desierto» es claro y natural en español, y conserva la ubicación ritual del envío.
theological_decisions:
- issue: La imagen ritual del macho cabrío que carga la culpa
  english_pob_reading: Retain the concrete language that the goat carries the people's iniquities on itself.
  chosen_spanish_reading: Conservar el lenguaje concreto de que el macho cabrío lleva sobre sí las iniquidades del pueblo.
  alternative_spanish_readings:
  - tomará sus pecados
  - quitará su culpa
  rationale: El hebreo presenta una acción simbólica de transferencia y remoción. La traducción mantiene esa imagen concreta sin explicitar más de lo que el verso dice.
  doctrine_reference: Levítico 16:22; POB translation philosophy §§1, 3, 6
- issue: El valor de אֶרֶץ גְּזֵרָה
  english_pob_reading: Render as 'a cut-off land' in the main text.
  chosen_spanish_reading: Traducir la expresión como «una tierra aislada» y conservar su ambigüedad relativa.
  alternative_spanish_readings:
  - una tierra apartada
  - una tierra inaccesible
  - una tierra desolada
  rationale: La frase hebrea es lexicamente difícil. «Tierra aislada» mantiene la idea de separación de la comunidad sin resolver interpretativamente la localización exacta.
  doctrine_reference: Levítico 16:22; POB translation philosophy §§1, 3, 5
translation_notes:
  revision_awareness: Se siguió el pasaje base del WLC y el contexto auditado de la POB en inglés; no hubo revisiones posteriores que alteraran el sentido, y el único punto especialmente incierto es אֶרֶץ גְּזֵרָה, cuya ambigüedad se preserva en el texto principal con una nota léxica breve.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» solo cuando aparezca el nombre divino; este versículo no lo contiene.
  - Se eligió «iniquidades» para conservar el peso moral/cultual de עֲוֺנֹתָם.
  - Se usó «macho cabrío» por precisión y claridad en español bíblico contemporáneo.
  - Se evitó «siervo» o una paráfrasis de expiación que no esté explicitada por el hebreo del verso.
