translation:
  language: es
  text: hijo de Elcaná[a], hijo de Joel, hijo de Azarías, hijo de Sofonías.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O posiblemente «descendiente de» en cada ocurrencia de «hijo de», ya que las genealogías hebreas a veces condensan generaciones; sin embargo, la secuencia genealógica inmediata aquí favorece «hijo de».
    reason: lexical_alternative
lexical_decisions:
- source_word: בֶּן
  english_pob_choice: the son of
  chosen_spanish: hijo de
  alternatives_spanish:
  - descendiente de
  - el hijo de
  lexicon: HALOT
  rationale: En listas genealógicas, בֶּן marca filiación o descendencia. En español, 'hijo de' reproduce la cadencia genealógica del hebreo con naturalidad y sin añadir artículos innecesarios. 'Descendiente de' es posible, pero sería más general; aquí la secuencia inmediata favorece la filiación directa.
- source_word: אֶלְקָנָה
  english_pob_choice: Elkanah
  chosen_spanish: Elcaná
  alternatives_spanish:
  - Elcana
  - Elkaná
  lexicon: Transliteración convencional de nombre propio
  rationale: Se translitera el nombre propio al español manteniendo la forma bíblica reconocible. 'Elcaná' conserva mejor la pronunciación española y evita la grafía inglesa del audit trail.
- source_word: יוֹאֵל
  english_pob_choice: Joel
  chosen_spanish: Joel
  alternatives_spanish:
  - Yoel
  lexicon: Transliteración convencional de nombre propio
  rationale: '''Joel'' es la forma usual y reconocible en español bíblico. ''Yoel'' sería más fonético respecto del hebreo, pero menos transparente para lectores de lengua española.'
- source_word: עֲזַרְיָה
  english_pob_choice: Azariah
  chosen_spanish: Azarías
  alternatives_spanish:
  - Azarías
  lexicon: Transliteración convencional de nombre propio
  rationale: El nombre se adapta a la forma española usual 'Azarías', que es la más natural y establecida para lectores bíblicos en español.
- source_word: צְפַנְיָה
  english_pob_choice: Zephaniah
  chosen_spanish: Sofonías
  alternatives_spanish:
  - Zephanías
  - Zefanías
  lexicon: Transliteración convencional de nombre propio
  rationale: En español bíblico, el nombre se conoce de manera estándar como 'Sofonías'. Aunque el audit trail inglés usa 'Zephaniah', la forma española tradicional y reconocible corresponde a la transliteración asentada en español.
translation_notes:
  revision_awareness: 'El texto fuente y el audit trail inglés concuerdan plenamente: se trata de una cadena genealógica simple sin variantes textuales ni tensiones teológicas. La única decisión relevante es léxica: conservar la fórmula genealógica repetida y usar las formas españolas establecidas para los nombres propios.'
  spanish_consistency_notes:
  - Se mantuvo la repetición de 'hijo de' para reflejar el estilo genealógico del hebreo.
  - Se usaron formas españolas bíblicamente asentadas para los nombres propios cuando existen (Joel, Azarías, Sofonías).
  - La nota [a] conserva la alternativa interpretativa indicada en el audit trail inglés sin sobrecargar el texto principal.
