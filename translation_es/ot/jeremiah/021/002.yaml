  rationale: 'Reubiqué y rehice las notas para que coincidan con el rastro auditado en inglés: añadí la alternativa del nombre propio, restauré la nota sobre ''sus obras maravillosas'' y mantuve la nota idiomática sobre la retirada del atacante. También ajusté el texto principal para un español más natural (''por nosotros'', ''se retire de nosotros'') sin perder el sentido hebreo ni la terminología del proyecto.'
