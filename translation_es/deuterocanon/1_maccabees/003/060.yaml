lexical_decisions:
- source_word: ὡς δʼ ἂν ᾖ
  english_pob_choice: As ... is
  chosen_spanish: Como es
  alternatives_spanish:
  - Tal como sea
  - Así como es
  lexicon: LSJ
  rationale: La construcción comparativa con matiz indefinido se vierte de modo natural en español con 'Como es', manteniendo la relación correlativa con 'así' sin sobrecargar el verso.
- source_word: θέλημα
  english_pob_choice: will
  chosen_spanish: voluntad
  alternatives_spanish:
  - querer
  - deseo
  - propósito
  lexicon: BDAG
  rationale: '''Voluntad'' es el equivalente más directo y sobrio en español para θέλημα en este contexto, preservando el sentido de intención divina sin introducir un matiz excesivamente subjetivo.'
- source_word: ἐν οὐρανῷ
  english_pob_choice: in heaven
  chosen_spanish: en el cielo
  alternatives_spanish:
  - en los cielos
  lexicon: LSJ
  rationale: En español bíblico, 'el cielo' comunica de manera clara y natural el singular griego, y evita una pluralización que no está en el texto.
- source_word: οὕτως
  english_pob_choice: so
  chosen_spanish: así
  alternatives_spanish:
  - de este modo
  - de esa manera
  lexicon: LSJ
  rationale: '''Así'' conserva la correlación directa con la cláusula inicial y reproduce la simplicidad del adverbio griego.'
- source_word: ποιήσει
  english_pob_choice: he will do
  chosen_spanish: hará
  alternatives_spanish:
  - actuará
  - llevará a cabo
  lexicon: BDAG
  rationale: El verbo español 'hará' mantiene la generalidad del griego ποιήσει sin añadir objeto explícito ni desplazar el foco de la acción personal implícita.
theological_decisions:
- issue: Sujeto implícito de ποιήσει
  english_pob_reading: he will do
  chosen_spanish_reading: hará
  alternative_spanish_readings:
  - será hecho
  - se hará
  rationale: El griego usa voz activa con sujeto masculino singular implícito por el contexto; por eso el español conserva una forma activa breve en vez de una pasiva impersonal.
  doctrine_reference: Agencia personal implícita en el texto; coherencia gramatical con el griego
translation_notes:
  revision_awareness: El borrador sigue el sentido confirmado del griego de Swete y refleja la lectura auditada en inglés, conservando la correlación comparativa 'as... so...' y la alternativa expansiva documentada para θέλημα/ὡς δʼ ἂν ᾖ sin añadir contenido no presente en el verso.
  spanish_consistency_notes:
  - Se mantiene 'cielo' para ἐν οὐρανῷ en línea con el español bíblico natural y con el singular griego.
  - '''Voluntad'' se usa para θέλημα por claridad y neutralidad teológica.'
  - La cláusula final permanece activa ('hará') para respetar el sujeto implícito del griego.
  - La nota al pie marca la alternativa expansiva documentada por el audit trail inglés.
