review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien el hebreo y el rastro de auditoría inglés: conserva el adversativo, la apelación directa a los interlocutores, la doble convocatoria verbal y el resultado futuro «no encontraré». También mantiene correctamente «entre ustedes» para בָכֶם y una forma sustantiva para חָכָם. Sin embargo, la nota al pie actual no preserva bien la alternativa documentada, porque repite exactamente el texto principal en vez de reflejar la alternativa más literal «regresen/retornen».'
  spanish_quality_summary: El español es claro, natural y digno. «Pero todos ustedes, vuelvan ahora y vengan; no encontraré entre ustedes a un sabio» es perfectamente legible en español eclesial general. El único ajuste necesario es en la nota al pie, para que realmente ofrezca una alternativa léxica útil y no duplique la redacción principal.
  glossary_alignment: No hay conflictos con la terminología marco del proyecto. No aparecen términos como Yahvé, Mesías, esclavo, etc. «Un sabio» es una buena solución para חָכָם en este contexto masculino singular sin caer en una expansión innecesaria.
  issues:
  - severity: medium
    issue: La nota al pie marcada [a] no presenta una alternativa real
    rationale: 'El texto principal ya dice «vuelvan ahora y vengan», y la nota dice «O: “vuelvan ahora y vengan”». Eso no cumple la función de preservar la alternativa documentada en inglés («return now and come») ni añade una variante léxica significativa para el lector español.'
  revised_spanish_text: Pero todos ustedes[a], vuelvan ahora y vengan; no encontraré entre ustedes a un sabio.
  revised_footnotes:
  - marker: a
    text: 'O: «regresen ahora y vengan»; el hebreo presenta un llamado enérgico y probablemente desafía a los amigos de Job a intentar de nuevo sus argumentos.'
    reason: lexical_alternative
  revision_rationale: Se conserva el texto principal porque es fiel y natural. Solo se corrige la nota al pie para que ofrezca una alternativa léxica real, alineada con la auditoría inglesa y con el valor exhortativo del hebreo.
