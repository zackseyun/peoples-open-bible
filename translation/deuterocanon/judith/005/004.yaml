translation:
  text: And why did they refuse to come to meet me[a], unlike all who dwell in the west?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, 'why did they turn a deaf ear so as not to come to meet me.'
    reason: lexical_alternative
lexical_decisions:
- source_word: διὰ τί
  chosen: why
  alternatives:
  - for what reason
  - why is it that
  lexicon: LSJ
  rationale: Introduces a direct question asking the reason for the action that follows.
- source_word: κατενωτίσαντο
  chosen: refuse
  alternatives:
  - turn a deaf ear
  - disregard
  - pay no heed
  lexicon: LSJ
  rationale: The middle form from a verb related to 'ear' literally suggests giving ear or heeding, but with the following infinitive construction τοῦ μὴ ἐλθεῖν it idiomatically conveys declining or refusing to come. 'Refuse' gives the sense clearly in modern English without awkward literalism.
- source_word: τοῦ μὴ ἐλθεῖν
  chosen: to come out
  alternatives:
  - not to come
  - to avoid coming
  lexicon: LSJ
  rationale: 'The articular infinitive with μή expresses the content/result of their refusal: they did not come. ''Come out'' is supplied in English because the context is a summons to appear before the speaker.'
- source_word: εἰς ἀπάντησίν μοι
  chosen: to meet me
  alternatives:
  - for a meeting with me
  - to my presence
  lexicon: LSJ
  rationale: ἀπάντησις commonly means a meeting or encounter, often 'meeting' someone who approaches. 'To meet me' is the most natural English rendering.
- source_word: παρὰ πάντας
  chosen: unlike all
  alternatives:
  - beyond all
  - more than all
  - contrary to all
  lexicon: LSJ
  rationale: In this comparative context, παρά with the accusative contrasts their behavior with that of everyone else. 'Unlike all' captures the contrast better than a wooden 'beyond all.'
- source_word: τοὺς κατοικοῦντας ἐν δυσμαῖς
  chosen: who live in the west
  alternatives:
  - who dwell in the western regions
  - the inhabitants of the west
  lexicon: LSJ
  rationale: A participial phrase describing the peoples in the western lands. 'Who live in the west' is clear and natural while preserving the geographical reference.
