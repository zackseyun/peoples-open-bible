translation:
  language: es
  text: Vendrán y declararán su rectitud[a] a un pueblo que aún no ha nacido[b], que lo ha hecho[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «su justicia». El hebreo puede denotar rectitud en sentido amplio, incluida la acción justa y salvadora de Dios.
    reason: lexical_alternative
  - marker: b
    text: O «que nacerá».
    reason: lexical_alternative
  - marker: c
    text: O «porque lo ha hecho». La cláusula final en hebreo es breve y puede entenderse tanto como el contenido de lo proclamado como la razón de la proclamación.
    reason: alternative_reading
lexical_decisions:
- source_word: יָבֹאוּ
  english_pob_choice: They will come
  chosen_spanish: Vendrán
  alternatives_spanish:
  - Ellos vendrán
  - Han de venir
  lexicon: HALOT
  rationale: El imperfecto qal expresa acción futura; «vendrán» comunica naturalmente ese valor en español sin perder el matiz prospectivo.
- source_word: וְיַגִּידוּ
  english_pob_choice: and declare
  chosen_spanish: y declararán
  alternatives_spanish:
  - y proclamarán
  - y dirán
  lexicon: HALOT
  rationale: El hifil de נגד implica dar a conocer o anunciar públicamente. «Declararán» conserva el tono testimonial y formal mejor que «dirán».
- source_word: צִדְקָתוֹ
  english_pob_choice: his righteousness
  chosen_spanish: su justicia
  alternatives_spanish:
  - su rectitud
  - su justicia salvadora
  lexicon: HALOT
  rationale: En este contexto, צִדְקָה puede abarcar justicia y la acción justa/salvadora de Dios. Se eligió «justicia» como equivalente directo y porque el registro de la POB en inglés preserva esa ambigüedad con nota; en español se deja la alternativa en nota para no estrechar el sentido.
- source_word: לְעַם
  english_pob_choice: to a people
  chosen_spanish: a un pueblo
  alternatives_spanish:
  - al pueblo
  - para un pueblo
  lexicon: HALOT
  rationale: El sustantivo es indefinido y la preposición ל marca destinatario; «a un pueblo» refleja ese valor sin forzar definición.
- source_word: נ֝וֹלָ֗ד
  english_pob_choice: yet to be born
  chosen_spanish: que aún no ha nacido
  alternatives_spanish:
  - que será nacido
  - que nacerá
  lexicon: HALOT
  rationale: El participio pasivo apunta a una generación futura. «Que aún no ha nacido» expresa con naturalidad el sentido prospectivo y mantiene la referencia a un pueblo venidero.
- source_word: כִּי
  english_pob_choice: that
  chosen_spanish: porque
  alternatives_spanish:
  - que
  - pues
  lexicon: HALOT
  rationale: El hebreo permite una lectura causal o de contenido. Aquí se eligió «porque» para reflejar la lectura posible del final breve como razón de la proclamación, manteniendo la tensión sintáctica documentada en la nota.
- source_word: עָשָׂה
  english_pob_choice: he has done it
  chosen_spanish: lo ha hecho
  alternatives_spanish:
  - ha obrado
  - lo ha cumplido
  lexicon: HALOT
  rationale: El perfecto qal es terso y el objeto está elidido. «Lo ha hecho» conserva la concisión hebrea y la clausula climática sin añadir especificación ajena al texto.
theological_decisions:
- issue: Sentido de צִדְקָתוֹ en el salmo
  english_pob_reading: Rendered as 'his righteousness' in the main text, with a footnote allowing 'his justice'
  chosen_spanish_reading: «su justicia» en el texto principal, con nota que reconoce «su rectitud» o el matiz de justicia salvadora
  alternative_spanish_readings:
  - su rectitud
  - su justicia salvadora
  rationale: El término hebreo mantiene una tensión entre cualidad moral y acción justa/salvadora. En español, «justicia» conserva la amplitud conceptual y, con la nota, evita cerrar indebidamente el campo semántico.
  doctrine_reference: 'DOCTRINE.md: conservar la tensión cuando el término es genuinamente ambiguo; no resolver el alcance teológico más allá del hebreo.'
- issue: Valor de la cláusula final כִּי עָשָׂה
  english_pob_reading: '''that he has done it'' with a footnote allowing ''for he has done it'''
  chosen_spanish_reading: «porque él lo ha hecho»
  alternative_spanish_readings:
  - que él lo ha hecho
  - pues él lo ha hecho
  rationale: La frase hebrea es breve y culminante. «Porque él lo ha hecho» permite una lectura causal reconocida por el audit trail, y el pronombre neutro «lo» conserva la elipsis del objeto sin precisar más de lo que el texto dice.
  doctrine_reference: 'DOCTRINE.md: preservar la concisión y la ambigüedad donde el original la presenta; priorizar la evidencia del hebreo frente a la tradición interpretativa.'
translation_notes:
  revision_awareness: El pasaje se mantiene sin cambios respecto al último pase de revisión; el veredicto de alta concordancia y la decisión de 'no changes needed' se reflejan en esta versión española, que sigue de cerca el hebreo y conserva las ambigüedades documentadas en el audit trail inglés.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma general del proyecto, pero este versículo no contiene el tetragrámaton.
  - Se eligió «justicia» en el cuerpo principal para preservar la amplitud de צִדְקָה; la nota ofrece «rectitud» como alternativa semántica española.
  - «Lo ha hecho» conserva la elipsis del objeto implícito en el hebreo y evita una expansión interpretativa.
  - La puntuación y el uso de notas siguen convenciones españolas y el estilo editorial de la POB.
