base_translation:
  language: en
  yaml_path: translation/ot/2_chronicles/008/016.yaml
  text: Thus all the work of Solomon was prepared from the day the house of Yahweh was founded until it was finished[b][a]. So the house of Yahweh was completed.
  footnotes:
  - marker: a
    text: Or, 'all Solomon's work was prepared/set in order.' The Hebrew verb can carry the sense of being established, made ready, or set in order.
    reason: lexical_alternative
  - marker: b
    text: Literally, 'from the day of the founding of the house of the LORD until its completion.'
    reason: lexical_alternative
