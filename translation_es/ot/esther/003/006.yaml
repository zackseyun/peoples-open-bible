  text: But it seemed contemptible in his eyes to lay a hand on Mordecai alone[a], because they had told him what people Mordecai belonged to. So Haman sought to destroy all the Jews throughout the whole kingdom of Ahasuerus—the people of Mordecai.
  footnotes:
