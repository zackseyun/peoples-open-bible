    reason: alternative_reading
  - marker: b
    text: O «cabezas de grano».
    reason: lexical_alternative
  revision_rationale: Se distingue la doble descripción hebrea mediante «marchitas, delgadas», se mantiene la imagen de daño agrícola por el viento del oriente, y se reemplaza «detrás de ellas» por «después de ellas» para una secuencia más natural en español.
