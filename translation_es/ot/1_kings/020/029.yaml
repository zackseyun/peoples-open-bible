translation:
  language: es
  text: 'Y estos acamparon unos frente a otros durante siete días. Entonces, en el séptimo día, la batalla se acercó, y los hijos[a] de Israel abatieron a Aram[b]: cien mil soldados de a pie[c] en un solo día.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «los israelitas». El hebreo dice literalmente «los hijos de Israel».
    reason: lexical_alternative
  - marker: b
    text: O «los arameos». El hebreo «Aram» puede referirse al reino o al pueblo arameo.
    reason: lexical_alternative
  - marker: c
    text: O «infantería». El hebreo literalmente se refiere a tropas «de a pie».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּחֲנוּ
  english_pob_choice: camped
  chosen_spanish: acamparon
  alternatives_spanish:
  - acamparon
  - se acamparon
  lexicon: HALOT
  rationale: חנה describe establecer el campamento; «acamparon» es natural en español y conserva la imagen militar sin añadir interpretación.
- source_word: אֵלֶּה נֹכַח אֵלֶּה
  english_pob_choice: these ... opposite those
  chosen_spanish: uno frente a otro
  alternatives_spanish:
  - éstos ... frente a aquéllos
  - unos frente a otros
  lexicon: HALOT
  rationale: La expresión hebrea marca oposición espacial entre dos grupos. «Uno frente a otro» transmite esa oposición de forma clara y breve en español.
- source_word: שִׁבְעַת יָמִים
  english_pob_choice: for seven days
  chosen_spanish: durante siete días
  alternatives_spanish:
  - por siete días
  - siete días
  lexicon: HALOT
  rationale: El valor de duración requiere una preposición temporal explícita en español; «durante» conserva el sentido de extensión temporal.
- source_word: וַיְהִי בַּיּוֹם הַשְּׁבִיעִי
  english_pob_choice: Then on the seventh day
  chosen_spanish: Y aconteció en el séptimo día
  alternatives_spanish:
  - Entonces, en el séptimo día
  - Y fue en el séptimo día
  lexicon: HALOT
  rationale: Se preserva la fórmula narrativa hebrea con un giro idiomático digno en español, sin depender de un calco arcaico.
- source_word: וַתִּקְרַב הַמִּלְחָמָה
  english_pob_choice: the battle drew near
  chosen_spanish: la batalla se acercó
  alternatives_spanish:
  - la batalla se aproximó
  - la batalla llegó
  lexicon: HALOT
  rationale: קרב significa literalmente «acercarse»; «se acercó» mantiene la imagen del texto base y la progresión narrativa.
- source_word: וַיַּכּוּ
  english_pob_choice: struck down
  chosen_spanish: hirieron
  alternatives_spanish:
  - golpearon
  - derribaron
  - mataron
  lexicon: HALOT
  rationale: נכה es amplio y puede abarcar herir o golpear con resultado letal; «hirieron» conserva la fuerza sin decidir de manera excesiva entre golpear y matar.
- source_word: בְנֵי יִשְׂרָאֵל
  english_pob_choice: the sons of Israel
  chosen_spanish: los hijos de Israel
  alternatives_spanish:
  - los hijos de Israel
  - los israelitas
  - el pueblo de Israel
  lexicon: HALOT
  rationale: Se retiene la forma masculina literal del hebreo, como rasgo auditables del original, coherente con el contexto militar.
- source_word: אֲרָם
  english_pob_choice: Aram
  chosen_spanish: Aram
  alternatives_spanish:
  - los arameos
  - Siria
  lexicon: HALOT
  rationale: Se conserva el nombre propio hebreo para no sustituirlo por una etiqueta geopolítica posterior; así se mantiene la correspondencia con el texto fuente.
- source_word: מֵאָה אֶלֶף
  english_pob_choice: one hundred thousand
  chosen_spanish: cien mil
  alternatives_spanish:
  - ciento mil
  lexicon: HALOT
  rationale: Equivale de manera directa al cardinal hebreo y es la forma idiomática normal en español.
- source_word: רַגְלִי
  english_pob_choice: foot soldiers
  chosen_spanish: soldados de a pie
  alternatives_spanish:
  - infantería
  - soldados a pie
  lexicon: HALOT
  rationale: El término remite a tropas que van a pie; «soldados de a pie» es claro y conserva el matiz militar sin tecnicismo innecesario.
- source_word: בְּיוֹם אֶחָד
  english_pob_choice: in one day
  chosen_spanish: en un solo día
  alternatives_spanish:
  - en un día
  - en el mismo día
  lexicon: HALOT
  rationale: Expresa con naturalidad la duración limitada de la victoria y mantiene el énfasis en la rapidez del resultado.
theological_decisions:
- issue: Masculine collective language in בְנֵי יִשְׂרָאֵל
  english_pob_reading: the sons of Israel
  chosen_spanish_reading: los hijos de Israel
  alternative_spanish_readings:
  - los israelitas
  - el pueblo de Israel
  rationale: Se conserva la forma masculina literal del hebreo. En este contexto bélico, la lectura refleja con precisión el colectivo descrito por el texto sin neutralizarlo.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
- issue: Proper-name rendering of אֲרָם
  english_pob_reading: Aram
  chosen_spanish_reading: Aram
  alternative_spanish_readings:
  - los arameos
  - Siria
  rationale: El hebreo usa un nombre propio; mantener «Aram» evita reinterpretar el referente con nombres posteriores o más generales.
  doctrine_reference: DOCTRINE.md §Translation philosophy 2
translation_notes:
  revision_awareness: 'El texto español sigue la lectura estable del paquete fuente y del auditor inglés: no se registraron revisiones aplicadas y el pass reciente indica que no hubo cambios necesarios. Se ha conservado la tensión lexical entre «hirieron» y el alcance posible de נכה, sin cerrarla a una sola lectura más fuerte que la evidencia.'
  spanish_consistency_notes:
  - Se mantuvo «Aram» como nombre propio, en continuidad con el criterio POB auditado.
  - Se preservó la fórmula narrativa hebrea con un español natural («Y aconteció en el séptimo día»).
  - 'Se optó por una traducción militar clara y no eclesiástica: «soldados de a pie» para רַגְלִי.'
  - No se añadieron notas al pie porque el texto español no introdujo una ambigüedad nueva que requiriera anclaje explícito.
