revisions:
- from: Y un recipiente de barro[a] que toque el que tiene la descarga[b] será quebrado, y todo recipiente de madera será enjuagado[c] con agua.
  to: Y una vasija de barro[a] que toque el que tiene flujo[b] será quebrada, y toda vasija de madera será enjuagada[c] con agua.
  rationale: Se revisa para mejorar la naturalidad eclesial del español ('flujo' en vez de 'descarga'), mantener mejor el paralelismo con objetos concretos ('vasija' en ambas frases), concordar naturalmente con el femenino de 'vasija' ('quebrada'), y corregir la nota [c] para que preserve fielmente la alternativa auditada en inglés. No hay cambio sustantivo de sentido respecto del hebreo.
