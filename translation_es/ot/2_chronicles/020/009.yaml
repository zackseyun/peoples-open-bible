  yaml_path: translation/ot/2_chronicles/020/009.yaml
  text: If disaster comes upon us—sword[a], judgment, pestilence, or famine—we will stand before this house and before you, for your name is in this house, and we will cry out to you from our distress, and you will hear and save.
  footnotes:
