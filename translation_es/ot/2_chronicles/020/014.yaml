translation:
  language: es
  text: Y Jahaziel, hijo de Zacarías, hijo de Benaía, hijo de Jeiel, hijo de Matanías, el levita, de entre los hijos de Asaf, —el Espíritu de Yahvé vino sobre él en medio de la asamblea.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: וְ/יַחֲזִיאֵל
  english_pob_choice: And Jahaziel
  chosen_spanish: Y Jahaziel
  alternatives_spanish:
  - Ahora Jahaziel
  lexicon: HALOT
  rationale: La conjunción inicial se mantiene con «Y» para conservar la continuidad narrativa del hebreo; el nombre propio se translitera, no se traduce.
- source_word: בֶּן ... בֶּן ... בֶּן ... בֶּן
  english_pob_choice: son of ... son of ... son of ... son of
  chosen_spanish: hijo de ... hijo de ... hijo de ... hijo de
  alternatives_spanish:
  - descendiente de ...
  lexicon: HALOT
  rationale: La cadena genealógica se conserva de manera formal porque el hebreo enumera ascendencia explícita, no solo pertenencia general a un linaje.
- source_word: הַ/לֵּוִי
  english_pob_choice: the Levite
  chosen_spanish: el levita
  alternatives_spanish:
  - un levita
  lexicon: HALOT
  rationale: El artículo hebreo apoya una identificación appositiva del personaje dentro de la genealogía; «levita» reproduce ese valor sin introducir indefinición.
- source_word: מִן בְּנֵי אָסָף
  english_pob_choice: from the sons of Asaph
  chosen_spanish: de entre los hijos de Asaf
  alternatives_spanish:
  - de los hijos de Asaf
  - entre los descendientes de Asaf
  lexicon: HALOT
  rationale: «De entre» expresa bien la pertenencia corporativa o de clan que sugiere la construcción hebrea, sin perder la referencia a la casa/gremio de Asaf.
- source_word: הָיְתָה עָלָיו רוּחַ יְהוָה
  english_pob_choice: the Spirit of Yahweh came upon him
  chosen_spanish: el Espíritu de Yahvé vino sobre él
  alternatives_spanish:
  - el Espíritu de Yahvé estaba sobre él
  - el Espíritu de Yahvé vino encima de él
  lexicon: HALOT
  rationale: «Vino sobre él» preserva el carácter eventivo de la expresión hebrea y comunica la irrupción capacitadora del Espíritu para hablar proféticamente; «Espíritu» va con mayúscula por tratarse del Espíritu divino.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  lexicon: HALOT
  rationale: Se mantiene el nombre propio divino como «Yahvé», conforme a la norma del proyecto para יְהוָה, en lugar de sustituirlo por un título.
- source_word: בְּ/ת֖וֹךְ הַ/קָּהָל
  english_pob_choice: in the midst of the assembly
  chosen_spanish: en medio de la asamblea
  alternatives_spanish:
  - en medio del pueblo reunido
  - entre la asamblea
  lexicon: HALOT
  rationale: «En medio de» conserva la fuerza espacial de בְּתוֹךְ; «asamblea» refleja קָהָל en su sentido de reunión pública convocada.
theological_decisions:
- issue: Naturaleza de רוּחַ יְהוָה en el contexto
  english_pob_reading: the Spirit of Yahweh came upon him
  chosen_spanish_reading: el Espíritu de Yahvé vino sobre él
  alternative_spanish_readings:
  - el espíritu de Yahvé estaba sobre él
  rationale: 'La formulación española debe conservar la lectura dinámica: no es solo una presencia estática, sino una venida que habilita la proclamación profética. La mayúscula en «Espíritu» ayuda a identificar correctamente al referente divino sin añadir contenido extrabíblico.'
  doctrine_reference: Affirmations; Translation philosophy §6
- issue: Tratamiento del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Jehová
  rationale: El texto hebreo usa directamente el Tetragrámaton; por coherencia doctrinal y de transparencia se preserva el nombre personal de Dios, no una sustitución honorífica.
  doctrine_reference: 'Contested terms: יְהוָה YHWH'
translation_notes:
  revision_awareness: 'La versión española sigue de cerca la decisión inglesa auditada sin depender mecánicamente del inglés: conserva la genealogía, la identificación levítica, la afiliación a Asaf, y la expresión eventiva del Espíritu con el nombre divino Yahvé. No se detectaron revisiones textuales en el pasaje fuente que alteren la base hebrea o la lectura auditada en inglés.'
  spanish_consistency_notes:
  - Se usa «Yahvé» de forma consistente para יְהוָה.
  - Se usa «Espíritu» con mayúscula cuando se refiere al Espíritu divino.
  - Se prefiere «hijo de» en la genealogía por fidelidad formal y claridad eclesial.
  - «Asaf» se translitera según uso bíblico común en español.
  - No se incorporan notas al pie porque no hay alternativa textual o lexical que requiera anclaje explícito en este versículo.
