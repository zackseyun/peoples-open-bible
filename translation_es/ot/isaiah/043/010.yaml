base_translation:
  language: en
  yaml_path: translation/ot/isaiah/043/010.yaml
  text: You are my witnesses[a], declares Yahweh, and my servant whom I have chosen, so that you may know and believe in me and understand that I am he. Before me no god was formed[c][b], and after me there will be none.
  footnotes:
  - marker: a
    text: Or 'and believe in me' or 'and trust me.' The Hebrew can express trusting or believing with God as the object; 'believe me' preserves the direct force here.
    reason: lexical_alternative
  - marker: b
    text: 'Or ''that I am the one.'' Hebrew: ''that I am he,'' a compact formula of divine self-identification used in Isaiah.'
    reason: lexical_alternative
  - marker: c
    text: 'Hebrew is elliptical: ''and after me there will not be.'' The implied sense is ''there will be no god'' or ''there will be none.'''
    reason: lexical_alternative
