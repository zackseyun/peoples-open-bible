translation:
  language: es
  text: A los que les hagan la guerra no les darán ni les proveerán grano, armas, plata ni barcos, según lo decidió Roma; y guardarán sus compromisos[a], sin tomar nada.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «observarán sus términos» o «cumplirán sus estipulaciones» para «guardarán sus compromisos». El griego usa una expresión cognada, literalmente «guardarán sus cosas-a-guardar», en contexto de tratado.
    reason: lexical_alternative
lexical_decisions:
- source_word: τοῖς πολεμοῦσιν
  english_pob_choice: to those who make war on them
  chosen_spanish: a los que les hagan guerra
  alternatives_spanish:
  - a los que guerrean contra ellos
  - a los que están haciendo guerra contra ellos
  - a sus atacantes
  lexicon: LSJ
  rationale: La frase griega es un participio sustantivado en dativo, dentro de un contexto de tratado. En español, «a los que les hagan guerra» conserva el sentido hostil y la relación con el objeto implícito del conflicto sin volverlo demasiado libre.
- source_word: οὐ δώσουσιν οὐδὲ ἐπαρκέσουσιν
  english_pob_choice: they shall neither give nor supply
  chosen_spanish: no les darán ni les proveerán
  alternatives_spanish:
  - no les darán ni les suministrarán
  - no les darán ni les abastecerán
  lexicon: LSJ
  rationale: 'La pareja verbal expresa dos niveles de asistencia: dar y proveer/suministrar. «Proveerán» mantiene el paralelo con el inglés POB y su valor de abastecer con lo necesario.'
- source_word: σῖτον
  english_pob_choice: grain
  chosen_spanish: grano
  alternatives_spanish:
  - grano
  - cereal
  - alimentos
  lexicon: LSJ
  rationale: σῖτος suele significar grano o provisiones de grano. «Grano» es preciso y natural en español; evita ampliar indebidamente a «alimentos».
- source_word: ὅπλα
  english_pob_choice: weapons
  chosen_spanish: armas
  alternatives_spanish:
  - armas
  - armamento
  - armas de guerra
  lexicon: LSJ
  rationale: Término militar directo. «Armas» es claro y fiel en español contemporáneo.
- source_word: ἀργύριον
  english_pob_choice: silver
  chosen_spanish: plata
  alternatives_spanish:
  - plata
  - dinero
  lexicon: LSJ
  rationale: El griego dice literalmente «plata». Se conserva el valor material e histórico del término, como en el inglés POB.
- source_word: πλοῖα
  english_pob_choice: ships
  chosen_spanish: barcos
  alternatives_spanish:
  - barcos
  - naves
  - embarcaciones
  lexicon: LSJ
  rationale: En un contexto militar-diplomático, «barcos» es claro y natural en español. «Naves» sería más solemne, pero menos cotidiano.
- source_word: ὡς ἔδοξεν Ῥώμῃ
  english_pob_choice: as Rome has decided
  chosen_spanish: según lo decidió Roma
  alternatives_spanish:
  - como decidió Roma
  - según lo resolvió Roma
  - como le pareció bien a Roma
  lexicon: LSJ
  rationale: La construcción con ἔδοξεν + dativo expresa una resolución u orden formal. «Según lo decidió Roma» transmite ese valor institucional con naturalidad.
- source_word: φυλάξονται τὰ φυλάγματα αὐτῶν
  english_pob_choice: they shall keep their obligations
  chosen_spanish: guardarán sus compromisos
  alternatives_spanish:
  - observarán sus términos
  - cumplirán sus obligaciones
  - guardarán sus estipulaciones
  lexicon: LSJ
  rationale: El juego cognado entre verbo y sustantivo sugiere «cosas a guardar» en un contexto de tratado. «Compromisos» comunica bien la fuerza legal del pasaje sin introducir una formulación demasiado técnica.
- source_word: οὐθὲν λαβόντες
  english_pob_choice: taking nothing
  chosen_spanish: sin tomar nada
  alternatives_spanish:
  - sin recibir nada
  - sin aceptar nada a cambio
  lexicon: LSJ
  rationale: El participio indica que la observancia se realiza sin recibir nada. «Sin tomar nada» es breve y muy cercano al griego.
translation_notes:
  revision_awareness: Se corrigió el fallo anterior asegurando que el marcador de nota [a] aparezca exactamente en el texto español, anclado a la frase correspondiente. No se añadieron notas sin anclaje.
  spanish_consistency_notes:
  - Se mantuvo «Roma» como nombre propio sin artículo, siguiendo el valor institucional del original.
  - Se evitó «SEÑOR» u այլ sustituciones teológicas porque no aplican en este versículo.
  - Se preservó el tono jurídico-diplomático del pasaje mediante verbos de obligación y provisión, no una paráfrasis devocional.
