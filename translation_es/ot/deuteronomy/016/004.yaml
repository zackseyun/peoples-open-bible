translation:
  language: es
  text: No se ha de ver levadura en todo tu territorio durante siete días,[a] y nada de la carne[b] que sacrifiques al anochecer del primer día[c] permanecerá hasta la mañana.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «El primer día» puede referirse específicamente al sacrificio de Pascua al comienzo de la fiesta, aunque el hebreo no dice explícitamente «cordero pascual» aquí.
    reason: alternative_reading
  - marker: b
    text: O «nada de la carne para comer». El hebreo dice literalmente «carne», un término común en contextos sacrificiales.
    reason: lexical_alternative
  - marker: c
    text: O «el primer día» puede entenderse más ampliamente en relación con los sacrificios de la fiesta al inicio de la celebración; el texto hebreo no lo especifica más.
    reason: alternative_reading
lexical_decisions:
- source_word: יֵרָאֶה
  english_pob_choice: is to be seen
  chosen_spanish: se ha de ver
  alternatives_spanish:
  - será vista
  - aparecerá
  - se verá
  lexicon: HALOT
  rationale: El nifal de ראה aquí expresa una prohibición pasiva. «Se ha de ver» conserva el valor de prohibición en un español natural y solemne, sin desdibujar la fuerza normativa del hebreo.
- source_word: שְׂאֹר
  english_pob_choice: leaven
  chosen_spanish: levadura
  alternatives_spanish:
  - fermento
  - masa fermentada
  lexicon: HALOT
  rationale: En español bíblico y contemporáneo, «levadura» comunica con claridad el agente fermentador prohibido en el contexto pascual. Mantiene el sentido ritual sin necesidad de un tecnicismo más opaco.
- source_word: בְּכָל גְּבֻלְךָ
  english_pob_choice: within all your territory
  chosen_spanish: en todo tu territorio
  alternatives_spanish:
  - dentro de todos tus límites
  - por todo tu territorio
  lexicon: HALOT
  rationale: «Territorio» preserva la idea de גבול como ámbito territorial, y «en todo» expresa bien la extensión total. Evita el calco rígido «en todos tus límites».
- source_word: שִׁבְעַת יָמִים
  english_pob_choice: for seven days
  chosen_spanish: durante siete días
  alternatives_spanish:
  - por siete días
  - siete días
  lexicon: HALOT
  rationale: El hebreo marca duración; «durante» comunica esa extensión temporal con naturalidad en español y sin añadir contenido interpretativo.
- source_word: יָלִין
  english_pob_choice: shall remain overnight
  chosen_spanish: permanecerá hasta la mañana
  alternatives_spanish:
  - quedará hasta la mañana
  - se quedará toda la noche
  - pasará la noche
  lexicon: HALOT
  rationale: El verbo indica que no debe quedar hasta el alba. «Permanecerá hasta la mañana» reproduce la restricción temporal de forma clara y solemne, sin recurrir a un giro menos natural como «dormirá» o «se alojará».
- source_word: מִן הַבָּשָׂר
  english_pob_choice: none of the flesh
  chosen_spanish: nada de la carne
  alternatives_spanish:
  - nada de la carne sacrificada
  - ninguna parte de la carne
  - ninguna carne
  lexicon: HALOT
  rationale: «בשר» puede significar «carne» o, en contexto sacrificial, «carne/meat». Mantener «carne» preserva el registro sacrificial y la tensión léxica; «nada de» expresa bien el partitivo.
- source_word: אֲשֶׁר תִּזְבַּח
  english_pob_choice: that you sacrifice
  chosen_spanish: que sacrifiques
  alternatives_spanish:
  - que ofrezcas en sacrificio
  - que inmoles
  - que sacrifiques como ofrenda
  lexicon: HALOT
  rationale: «זבח» en contexto cultual se traduce de manera directa por «sacrificar». Es suficientemente exacto y evita la paráfrasis de especificar un tipo de ofrenda no explícito en el texto.
- source_word: בָּעֶרֶב
  english_pob_choice: in the evening
  chosen_spanish: en la tarde
  alternatives_spanish:
  - por la tarde
  - al anochecer
  - en la noche
  lexicon: HALOT
  rationale: La palabra hebrea señala el tiempo vespertino. En español, «en la tarde» es una equivalencia amplia y natural para un registro bíblico moderno, sin forzar una precisión cronológica que el hebreo no detalla.
- source_word: בַּיּוֹם הָרִאשׁוֹן
  english_pob_choice: on the first day
  chosen_spanish: del primer día
  alternatives_spanish:
  - en el primer día
  - el primer día
  lexicon: HALOT
  rationale: El hebreo dice literalmente «en el día el primero». En el español de esta frase, la construcción más fluida es «del primer día» dentro del complemento temporal, sin añadir «de la fiesta» que el texto no explicita.
- source_word: לַבֹּקֶר
  english_pob_choice: until morning
  chosen_spanish: hasta la mañana
  alternatives_spanish:
  - hasta el amanecer
  - para la mañana
  - por la mañana
  lexicon: HALOT
  rationale: La preposición marca límite temporal. «Hasta la mañana» reproduce con claridad la prohibición de dejar el sacrificio para el día siguiente.
theological_decisions:
- issue: Alcance de la prohibición sobre la carne sacrificada el primer día
  english_pob_reading: Render generically as sacrificial flesh without specifying 'Passover lamb' in the main text.
  chosen_spanish_reading: Mantener una referencia genérica a «la carne» sacrificada, sin identificarla explícitamente como «cordero pascual» en el texto principal.
  alternative_spanish_readings:
  - Interpretar específicamente como el sacrificio/cordero de Pascua
  - Interpretar de manera más amplia como carne de sacrificios de la fiesta
  rationale: El hebreo sólo dice «la carne que sacrifiques en la tarde del primer día». Como el texto no nombra de forma explícita el cordero pascual, la traducción conserva la formulación general y deja abierta la cuestión interpretativa, tal como hace el POB en inglés.
  doctrine_reference: Preservar la tensión interpretativa sin resolverla en la traducción principal.
translation_notes:
  revision_awareness: Esta redacción sigue la revisión más reciente sin cambios sustanciales respecto del audit trail inglés, manteniendo la ambigüedad sobre la identidad exacta de la víctima sacrificial y el sentido sacrificial de בשר.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como término por defecto en este proyecto, aunque en este versículo no aparece el tetragrámaton.
  - Se conserva la distinción entre lenguaje sacrificial general («carne») y una identificación más específica como «cordero pascual», que no está en el hebreo explícito.
  - La puntuación y el orden de los complementos buscan sonar naturales en español sin introducir información no presente en el texto fuente.
