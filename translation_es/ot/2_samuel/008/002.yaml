base_translation:
  language: en
  yaml_path: translation/ot/2_samuel/008/002.yaml
  text: He struck Moab and measured them with a line[a], making them lie down on the ground. He measured off two lengths of line to put to death and a full length of line to keep alive. So Moab became David’s servants[b], bringing tribute.
  footnotes:
  - marker: a
    text: Or 'with a cord' or 'with a measuring line.'
    reason: lexical_alternative
  - marker: b
    text: 'The Hebrew describes David measuring the Moabites while they lay on the ground: two measured portions were assigned ''for death'' and one full portion ''for life,'' implying that some were executed and others spared.'
    reason: cultural_note
