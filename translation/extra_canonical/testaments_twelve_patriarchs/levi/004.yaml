id: T12P.LEV.04
reference: Testament of Levi 4
source:
  edition: Charles 1908 Greek Versions (Levi source-fix v2)
  text: IV. Νῦν οὖν γίνωσκε¹ ὅτι ποιήσει Κύριος κρίσιν ἐπὶ τοὺς υἱοὺς τῶν ἀνθρώπων. Ὅτι² πετρῶν³ σχιζομένων, καὶ τοῦ ἡλίου σβεννυμένου⁴ καὶ ὑδάτων⁵ ξηραινομένων καὶ τοῦ⁶ πυρὸς καταπτήσσοντος⁷ καὶ πάσης [τῆς]⁸ κτίσεως κλονουμένης⁹ καὶ τῶν ἀοράτων πνευμάτων¹⁰ τηκομένων¹¹ καὶ¹² τοῦ ᾅδου σκυλευομένου¹³ [ἐπὶ τῷ πάθει τοῦ ὑψίστου]¹⁴ *οἱ ἄνθρωποι ἀπειθοῦντες ἐπιμενοῦσι ταῖς ἀδικίαις¹⁵, διὰ τοῦτο ἐν Γτῇ¹⁶ κολάσει κριθήσονται. 2. Εἰσήκουσεν¹⁷ Γοὖν¹⁸ ὁ ὕψιστος τῆς προσευχῆς¹⁹ σου *τοῦ διελεῖν²⁰ σε ἀπὸ²¹ ἀδικίας²² καὶ γενέσθαι αὐτῷ²³ *υἱὸν καὶ θεράποντα²⁴ καὶ λειτουργὸν²⁵ τοῦ προσώπου αὐτοῦ. 3. Φῶς²⁶ γνώσεως²⁷ φωτιεῖς²⁸ *ἐν τῷ Ἰακώβ²⁹, καὶ³⁰ ὡς³¹ ἥλιος *ἔσῃ³² παντὶ³³ σπέρματι³⁴ Ἰσραήλ. 4. Καὶ δοθήσεταί σοι εὐλογία *καὶ παντὶ τῷ σπέρματί σου³⁵ ἕως³⁶ ἐπισκέψεται³⁷ Κύριος πάντα τὰ ἔθνη³⁸ ἐν σπλάγχνοις [υἱοῦ]³⁹ αὐτοῦ *ἕως αἰῶνος⁴⁰. [Πλὴν⁴¹ οἱ υἱοί σου ἐπιβαλοῦσι χεῖρας *ἐπ᾿ αὐτὸν⁴² *τοῦ ἀνασκολοπίσαι⁴³ αὐτόν.] 5. ⸀Καὶ⸀⁴⁴ διὰ τοῦτο δέδωταί⁴⁵ σοι⁴⁶ βουλὴ καὶ σύνεσις τοῦ συνετίσαι τοὺς υἱούς σου⁴⁷ *περὶ τούτου⁴⁸. 6. Ὅτι *οἱ εὐλογοῦντες⁴⁹ †αὐτὸν⁵⁰ εὐλογημένοι⁵¹ ἔσονται⁵² *καὶ οἱ⁵³ καταρώμενοι †αὐτὸν⁵⁰ ἀπολοῦνται⁵⁴.
  language: Greek
  source_pages:
  - 101
  - 102
  - 103
  - 104
translation:
  text: '1[4:1]. Now therefore know that the Lord will execute judgment upon the sons of men. For when rocks are being split, and the sun is being extinguished, and waters are drying up, and fire is cowering, and all creation is being shaken, and the invisible spirits are melting away, and Hades is being plundered at the suffering of the Most High, men[4:4], being disobedient, will persist in their injustices. Therefore they will be judged with a greater punishment.


    2. Therefore the Most High has heard your prayer, to separate you from unrighteousness and for you to become to him a son and a servant and a minister of his presence.


    3. You shall shine forth the light of knowledge in Jacob, and you shall be like the sun to all the seed of Israel.


    4. And a blessing shall be given to you and to all your seed, until the Lord visits all the nations in the tender mercies of his son forever.


    5. And for this reason counsel and understanding have been given to you, so that you may instruct your sons concerning this.


    6. For those who bless him will be blessed[4:6], and those who curse him will perish.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: '4:1'
    text: The clause 'at the suffering of the Most High' is textually uncertain in the Greek tradition and may reflect a later expansion; it is translated here because it appears in the supplied witness text.
    reason: textual_variant
  - marker: '4:4'
    text: Some witnesses expand this verse with an explicit statement that God will send 'his son' to save creation, and that Levi's sons will lay hands on him and impale him. The present translation follows the shorter wording of the supplied main text while retaining the bracketed 'son' in 'the tender mercies of his son' as textually uncertain.
    reason: textual_variant
  - marker: '4:6'
    text: The pronoun 'him' may refer to the Lord, to the son mentioned in v.4, or to Levi / Levi's priestly line; the Greek leaves the referent unstated.
    reason: alternative_reading
lexical_decisions:
- source_word: κρίσιν
  chosen: judgment
  alternatives:
  - justice
  - sentence
  lexicon: BDAG
  rationale: In this apocalyptic-warning context the word denotes divine judicial action, not abstract justice; 'judgment' preserves the solemn testamentary warning.
- source_word: υἱοὺς τῶν ἀνθρώπων
  chosen: sons of men
  alternatives:
  - human beings
  - the children of men
  lexicon: BDAG
  rationale: A traditional-semitizing expression fits the elevated register of the testament and preserves the broad human scope of the warning.
- source_word: σβεννυμένου
  chosen: being extinguished
  alternatives:
  - going out
  - quenched
  lexicon: LSJ
  rationale: The participle describes cosmic collapse in vivid process language; 'being extinguished' keeps the passive, catastrophic force.
- source_word: καταπτήσσοντος
  chosen: is cowering
  alternatives:
  - shrinking back
  - being terrified
  lexicon: LSJ
  rationale: Used of fire in a personified cosmic upheaval list; 'is cowering' preserves the startling anthropomorphic image rather than smoothing it.
- source_word: κτίσεως
  chosen: creation
  alternatives:
  - creaturely order
  - created order
  lexicon: BDAG
  rationale: '''All creation'' is idiomatic and preserves the cosmic scope.'
- source_word: τηκομένων
  chosen: melting away
  alternatives:
  - wasting away
  - dissolving
  lexicon: LSJ
  rationale: The image is one of dissolution under divine upheaval; 'melting away' matches the vivid participial sequence.
- source_word: ᾅδου σκυλευομένου
  chosen: Hades is being plundered
  alternatives:
  - the grave is being despoiled
  - Hades is being stripped
  lexicon: BDAG
  rationale: σκυλεύω carries the sense of despoiling after conquest; 'plundered' preserves the forceful image and avoids flattening to mere defeat.
- source_word: πάθει
  chosen: suffering
  alternatives:
  - passion
  - affliction
  lexicon: BDAG
  rationale: The noun can mean suffering generally; 'suffering' is transparent English and avoids importing later technical capitalization into the main text.
- source_word: ἀπειθοῦντες ἐπιμενοῦσι
  chosen: will persist in disobedience
  alternatives:
  - continue refusing to obey
  - remain rebellious
  lexicon: BDAG
  rationale: The combination stresses ongoing refusal; 'persist in disobedience' captures durative moral obstinacy.
- source_word: ἀδικίαις
  chosen: injustices
  alternatives:
  - unrighteousnesses
  - wrongdoings
  lexicon: BDAG
  rationale: Plural 'injustices' preserves the concrete plural and moral-social force better than a smoothed singular abstraction.
- source_word: μείζονι κολάσει
  chosen: with a greater punishment
  alternatives:
  - by a harsher penalty
  - with severer torment
  lexicon: BDAG
  rationale: κολάσις here is punitive judgment; 'greater punishment' is clear and retains comparative force.
- source_word: διελεῖν σε ἀπὸ ἀδικίας
  chosen: to separate you from unrighteousness
  alternatives:
  - to set you apart from injustice
  - to divide you off from wrongdoing
  lexicon: BDAG
  rationale: The infinitive expresses divine setting-apart; 'separate you from unrighteousness' preserves both moral and priestly overtones.
- source_word: θεράποντα
  chosen: servant
  alternatives:
  - attendant
  - retainer
  lexicon: BDAG
  rationale: Alongside 'son' and 'minister,' this term suggests honored service; 'servant' is natural English without erasing dignity.
- source_word: λειτουργὸν τοῦ προσώπου αὐτοῦ
  chosen: a minister of his presence
  alternatives:
  - a liturgical servant before his face
  - an officiant of his presence
  lexicon: BDAG
  rationale: The phrase evokes priestly service before God; 'minister of his presence' preserves cultic and relational force in readable English.
- source_word: Φῶς γνώσεως
  chosen: the light of knowledge
  alternatives:
  - light of understanding
  - light of insight
  lexicon: BDAG
  rationale: A compact revelatory phrase; 'knowledge' keeps the cognitive and theological resonance.
- source_word: φωτιεῖς
  chosen: You shall shine forth
  alternatives:
  - you will illumine
  - you will give light
  lexicon: LSJ
  rationale: Given the following sun simile, 'shine forth' better preserves the imagery than the flatter 'give light.'
- source_word: σπέρματι
  chosen: seed
  alternatives:
  - offspring
  - descendants
  lexicon: BDAG
  rationale: '''Seed'' preserves biblical covenant diction and the collective sense.'
- source_word: ἐπισκέψεται
  chosen: visits
  alternatives:
  - comes to
  - shows concern for
  lexicon: BDAG
  rationale: The verb often carries the sense of divine visitation with saving intent; 'visits' keeps the biblical idiom and ambiguity of intervention.
- source_word: ἐν σπλάγχνοις
  chosen: in the tender mercies
  alternatives:
  - in compassion
  - with deep mercy
  lexicon: BDAG
  rationale: The plural noun denotes deep inward compassion; 'tender mercies' preserves the affective intensity and scriptural register.
- source_word: βουλή
  chosen: counsel
  alternatives:
  - purpose
  - deliberation
  lexicon: BDAG
  rationale: Here it denotes wise guidance granted for instruction; 'counsel' fits the testamentary setting.
- source_word: σύνεσις
  chosen: understanding
  alternatives:
  - insight
  - discernment
  lexicon: BDAG
  rationale: Paired with counsel, 'understanding' gives a natural and faithful rendering of intellectual-moral capacity.
- source_word: συνετίσαι
  chosen: instruct
  alternatives:
  - make understand
  - give insight to
  lexicon: BDAG
  rationale: The infinitive concerns imparting understanding to Levi's sons; 'instruct' is concise and idiomatic.
