translation:
  language: es
  text: 'Y ofrecerán un holocausto como olor agradable[a] a Yahvé: un novillo, un carnero y siete corderos machos de un año, sin defecto.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'También: “como aroma agradable” o “como olor grato”. La expresión hebrea es una fórmula sacrificial fija que indica que la ofrenda es aceptable delante de Yahvé.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַעֲשִׂיתֶם
  english_pob_choice: you shall offer
  chosen_spanish: ofrecerán
  alternatives_spanish:
  - harán
  - prepararán
  lexicon: HALOT
  rationale: En contexto sacrificial, el verbo hebreo ‘hacer’ funciona idiomáticamente como ‘ofrecer’ una ofrenda. En español, ‘ofrecerán’ comunica con naturalidad la acción cultual sin perder el valor ritual del verbo.
- source_word: עֹלָה
  english_pob_choice: burnt offering
  chosen_spanish: holocausto
  alternatives_spanish:
  - ofrenda quemada
  - ofrenda íntegra
  lexicon: HALOT
  rationale: ‘Holocausto’ es el término bíblico-español más asentado para la ofrenda totalmente consumida por el fuego. Se conserva el valor sacrificial específico del hebreo sin explicarlo en exceso.
- source_word: לְרֵיחַ נִיחֹחַ
  english_pob_choice: a pleasing aroma
  chosen_spanish: como olor agradable
  alternatives_spanish:
  - como aroma agradable
  - como olor grato
  lexicon: HALOT
  rationale: La expresión hebrea es una fórmula sacrificial fija que indica aceptación de la ofrenda. ‘Olor agradable’ mantiene la imagen concreta del hebreo; se evita suavizarla demasiado para no borrar la fórmula ritual.
- source_word: לַיהוָה
  english_pob_choice: to Yahweh
  chosen_spanish: a Yahvé
  alternatives_spanish:
  - a Yahweh
  - al SEÑOR
  lexicon: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
  rationale: 'Se conserva el nombre divino en la forma editorial establecida para este proyecto: ‘Yahvé’. El dativo marca dirección de la ofrenda hacia el Dios del pacto.'
- source_word: פַּר בֶּן בָּקָר אֶחָד
  english_pob_choice: one bull from the herd
  chosen_spanish: un becerro del ganado
  alternatives_spanish:
  - un toro del ganado
  - un novillo
  lexicon: HALOT
  rationale: La construcción hebrea significa literalmente un toro/becerro, ‘hijo del ganado’. En español, ‘becerro del ganado’ conserva la relación idiomática con el rebaño y evita una paráfrasis demasiado interpretativa.
- source_word: אַיִל אֶחָד
  english_pob_choice: one ram
  chosen_spanish: un carnero
  alternatives_spanish:
  - un macho ovino
  - un macho carnero
  lexicon: HALOT
  rationale: אַיִל corresponde de manera directa a ‘carnero’. La palabra es clara y natural en lista sacrificial.
- source_word: כְּבָשִׂים בְּנֵי שָׁנָה שִׁבְעָה
  english_pob_choice: seven male lambs a year old
  chosen_spanish: siete corderos machos de un año
  alternatives_spanish:
  - siete corderos de un año
  - siete corderos machos de un año de edad
  lexicon: HALOT
  rationale: ‘Corderos’ expresa כְּבָשִׂים en un contexto sacrificial; ‘machos’ refleja la especificación léxica implícita en la forma y el contexto, y ‘de un año’ reproduce la expresión hebrea de edad.
- source_word: תְּמִימִם
  english_pob_choice: without blemish
  chosen_spanish: sin defecto
  alternatives_spanish:
  - sin mancha
  - sin tacha
  - sin defecto alguno
  lexicon: HALOT
  rationale: En lenguaje sacrificial, el término indica ausencia de defecto físico apto para el sacrificio. ‘Sin defecto’ es preciso, sobrio y bíblicamente natural en español.
theological_decisions:
- issue: Nombre divino YHWH
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - SEÑOR
  rationale: El hebreo usa explícitamente el Tetragrámaton. El proyecto español establece ‘Yahvé’ como forma principal para mantener visible el nombre del pacto y evitar el ocultamiento devocional de ‘SEÑOR’.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Fórmula sacrificial de aceptación
  english_pob_reading: a pleasing aroma
  chosen_spanish_reading: como olor agradable
  alternative_spanish_readings:
  - como aroma agradable
  - como olor grato
  - como suave aroma
  rationale: La expresión no describe un placer olfativo humano, sino la aceptabilidad cultual de la ofrenda delante de Dios. ‘Olor agradable’ conserva la fórmula bíblica y su tensión metafórica.
  doctrine_reference: Uso sacrificial fijo de לְרֵיחַ נִיחֹחַ en el Pentateuco
translation_notes:
  revision_awareness: 'El texto inglés auditado pasó por una corrección menor de puntuación, sin cambios de sentido. La versión española conserva la estructura listada del hebreo y mantiene las decisiones léxicas documentadas: verbo sacrificial idiomático, fórmula de aroma aceptable, nombre divino explícito y terminología de sacrificio sin atenuación.'
  spanish_consistency_notes:
  - Se usó ‘Yahvé’ de forma consistente con el estándar del proyecto para יְהוָה.
  - Se conservó ‘holocausto’ como término técnico sacrificial, no como eufemismo general.
  - ‘Olor agradable’ se dejó como fórmula bíblica reconocible, con nota de alternativas para evitar reducirla a una percepción sensorial literal.
  - La lista de animales sigue el orden y la especificidad del hebreo, sin añadir ni omitir elementos.
