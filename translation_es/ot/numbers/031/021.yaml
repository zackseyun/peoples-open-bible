    issue: Uso de «estatuta» para חֻקַּת הַתּוֹרָה
    rationale: «Estatuta» no es una forma normal ni adecuada en el español bíblico general. Perjudica la legibilidad y no representa bien el registro digno solicitado. La forma correcta es «estatuto» o una alternativa como «ordenanza».
  - severity: medium
    issue: Concordancia «Esta es la...» derivada de la elección defectuosa
    rationale: Al corregir a «estatuto», la frase debe ajustarse a «Este es el estatuto de la ley». Mantener «Esta es» produciría discordancia gramatical.
