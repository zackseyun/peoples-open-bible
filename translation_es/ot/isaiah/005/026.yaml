source:
  edition: WLC
  text: וְ/נָֽשָׂא נֵ֤ס לַ/גּוֹיִם֙ מֵ/רָח֔וֹק וְ/שָׁ֥רַק ל֖/וֹ מִ/קְצֵ֣ה הָ/אָ֑רֶץ וְ/הִנֵּ֥ה מְהֵרָ֖ה קַ֥ל יָבֽוֹא־׃
base_translation:
  language: en
  yaml_path: translation/ot/isaiah/005/026.yaml
  text: He will raise a signal for the nations from far away[a], and whistle for them from the end of the earth; and behold, quickly, swiftly[c][b], it comes.
  footnotes:
  - marker: a
    text: Or 'a banner' or 'a standard' for נֵס.
    reason: lexical_alternative
  - marker: b
    text: The Hebrew verb can mean 'whistle' or, in older English renderings, 'hiss'—that is, make a sharp summoning sound.
    reason: lexical_alternative
  - marker: c
    text: 'Hebrew singular: ''for him ... he comes.'' The singular likely represents the invading force as a collective.'
    reason: lexical_alternative
