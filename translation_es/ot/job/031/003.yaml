lexical_decisions:
- source_word: הֲלֹא
  english_pob_choice: Is not
  chosen_spanish: ¿No es
  alternatives_spanish:
  - ¿Acaso no es?
  - ¿No será?
  lexicon: HALOT
  rationale: La pregunta retórica espera una respuesta afirmativa. En español, «¿No es» conserva ese valor interrogativo sin forzar un estilo arcaico.
- source_word: אֵיד
  english_pob_choice: disaster
  chosen_spanish: desastre
  alternatives_spanish:
  - ruina
  - calamidad
  lexicon: HALOT
  rationale: Designa una desgracia destructiva o ruina; «desastre» es claro y natural en español moderno, y mantiene el contraste poético con el segundo hemistiquio.
- source_word: לְעַוָּל
  english_pob_choice: for the unrighteous
  chosen_spanish: para el injusto
  alternatives_spanish:
  - para el inicuo
  - para el injusto
  - para el malvado
  lexicon: HALOT
  rationale: El sustantivo describe a una persona caracterizada por injusticia. «El injusto» conserva el matiz moral y la correspondencia con el lenguaje bíblico, sin neutralizarlo.
- source_word: וְנֵכֶר
  english_pob_choice: and calamity
  chosen_spanish: y calamidad
  alternatives_spanish:
  - y ruina
  - y desgracia
  - y misfortunio
  lexicon: HALOT
  rationale: En este paralelismo poético, el término expresa un resultado funesto. «Calamidad» reproduce bien la fuerza del paralelo con אֵיד y mantiene el registro elevado.
- source_word: לְפֹעֲלֵי
  english_pob_choice: for the workers of
  chosen_spanish: para los que hacen
  alternatives_spanish:
  - para los hacedores de
  - para los trabajadores de
  - para los que practican
  lexicon: HALOT
  rationale: El participio expresa acción habitual. «Los que hacen» suena natural en español y conserva la idea de práctica continua sin añadir una interpretación más específica que el hebreo.
- source_word: אָוֶן
  english_pob_choice: iniquity
  chosen_spanish: iniquidad
  alternatives_spanish:
  - mal
  - maldad
  - injusticia
  lexicon: HALOT
  rationale: Con «los que hacen», el término apunta a maldad moral culpable. «Iniquidad» preserva el peso ético y el registro poético que el texto exige.
theological_decisions:
- issue: Naturaleza del juicio en la sabiduría de Job
  english_pob_reading: Render the verse as a general principle of divine moral order without making the mechanism of judgment more explicit than the Hebrew does.
  chosen_spanish_reading: Presentar el versículo como un principio general de orden moral, sin precisar si el resultado funesto proviene directamente del castigo divino o de una consecuencia moral más amplia.
  alternative_spanish_readings:
  - Interpretarlo como castigo divino explícito
  - Interpretarlo como mera consecuencia natural
  rationale: El hebreo afirma que el desastre y la calamidad corresponden al injusto y al que hace iniquidad, pero no explica el mecanismo. La redacción española conserva esa tensión sin resolverla.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: El texto previo falló porque los marcadores de nota no aparecían en el cuerpo del versículo. Esta versión inserta [a] y [b] exactamente en las palabras ancladas para que las alternativas léxicas queden auditables.
  spanish_consistency_notes:
  - Se mantiene el paralelismo poético del hebreo con dos sustantivos de juicio funesto.
  - Se evita suavizar עַוָּל y פֹעֲלֵי אָוֶן con vocabulario demasiado genérico.
  - 'Se preserva la tensión teológica: el texto no especifica el mecanismo del juicio.'
