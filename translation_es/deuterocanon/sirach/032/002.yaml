translation:
  language: es
  text: para que te alegres en su honor[a], y recibas una recompensa por tu instrucción[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'El paralelo griego dice algo muy diferente: «El que presta atención a los mandamientos ofrece una ofrenda de paz». El texto principal sigue el testimonio hebreo conservado, que es la fuente primaria de Sirácida donde se preserva.'
    reason: alternative_reading
  - marker: b
    text: También puede entenderse «disciplina», «corrección» o «buen orden» para מוסר. El matiz sapiencial del hebreo admite más de una opción.
    reason: lexical_alternative
lexical_decisions:
- source_word: למען
  english_pob_choice: so that
  chosen_spanish: para que
  alternatives_spanish:
  - a fin de que
  - de modo que
  lexicon: HALOT
  rationale: Expresa de forma natural en español la relación de propósito/resultados sin perder el valor final del hebreo.
- source_word: תשמח
  english_pob_choice: you may rejoice
  chosen_spanish: te alegres
  alternatives_spanish:
  - te regocijes
  - te llenes de alegría
  lexicon: HALOT
  rationale: שמח comunica alegría o regocijo; «te alegres» conserva el tono bíblico y es claro en español contemporáneo.
- source_word: בכבודם
  english_pob_choice: in their honor
  chosen_spanish: en su honor
  alternatives_spanish:
  - por su honor
  - ante su honor
  - en el honor que se les muestra
  lexicon: HALOT
  rationale: «ב» con כבוד puede indicar la esfera o relación del honor; «en su honor» es idiomático y deja abierta la relación entre el honor de los invitados y el honor que se les concede.
- source_word: מוסר
  english_pob_choice: instruction
  chosen_spanish: instrucción
  alternatives_spanish:
  - disciplina
  - corrección
  - amonestación
  lexicon: HALOT
  rationale: El hebreo מוסר admite varios matices. En este contexto sapiencial y en línea con la lectura del inglés POB, «instrucción» preserva el registro de guía moral sin cargarlo de castigo.
- source_word: תשא שכר
  english_pob_choice: receive a reward
  chosen_spanish: recibas una recompensa
  alternatives_spanish:
  - obtengas una recompensa
  - recibas pago
  - recibas retribución
  lexicon: HALOT
  rationale: נשא con שכר funciona idiomáticamente como «recibir/obtener recompensa». «Recibas una recompensa» es natural y mantiene la idea de compensación o retribución.
theological_decisions:
- issue: Prioridad del testimonio hebreo frente al paralelo griego divergent
  english_pob_reading: The main text follows the extant Hebrew witness, with the Greek parallel kept as a control and noted as very different.
  chosen_spanish_reading: La traducción sigue el hebreo conservado y no armoniza el verso con el griego paralelo.
  alternative_spanish_readings:
  - «El que presta atención a los mandamientos ofrece un sacrificio de paz»
  - «El que atiende a los mandamientos ofrece una ofrenda de paz»
  rationale: El hebreo y el griego divergen sustancialmente. Dado el método del proyecto para Sirácida, el texto principal debe traducir el hebreo conservado donde existe, usando el griego solo como verificación semántica y no como reemplazo.
  doctrine_reference: 'PHILOSOPHY.md: translate from Hebrew where it survives; use parallel Greek as actual input without displacing original-language primacy.'
translation_notes:
  revision_awareness: El último repaso indicó que no había cambios necesarios, pero el control cruzado señaló observaciones importantes; por eso se mantiene el texto hebreo como base principal y se explicita la divergencia con el griego en nota.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» solo cuando el hebreo/greco lo exija; este versículo no lo contiene.
  - Se traduce שכר con «recompensa», coherente con el registro sapiencial y con el audit trail inglés.
  - Se evita forzar una lectura litúrgica cristiana del griego en el texto principal, ya que la base aquí es el hebreo sapiencial conservado.
