revisions:
- from: Que cada uno de nosotros diga una palabra que prevalezca[a]; y cualquiera cuya declaración resulte más sabia que la del otro, Darío el rey le dará grandes regalos y grandes honores de victoria[b].
  to: Que cada uno de nosotros diga una palabra que prevalezca[a]; y aquel cuya declaración resulte más sabia que la del otro, Darío el rey le dará grandes dones y grandes honores de victoria[b].
  rationale: 'Se revisa para mejorar la naturalidad y el registro del español sin cambiar el sentido: «aquel cuya» fluye mejor que «cualquiera cuya», y «grandes dones» corresponde mejor al tono regio de δωρεὰς. Se conserva «una palabra» con nota por la decisión léxica documentada, y se mantiene la distinción entre dones y honores de victoria.'
