theological_decisions:
- issue: Meaning of הַמּוֹרֶה in a verse sometimes read messianically as 'the teacher of righteousness'
  chosen_reading: Rendered as 'the early rain' in the main text
  alternative_readings:
  - the teacher for righteousness
  - the teacher of righteousness
  rationale: The immediate agricultural context ('rain, early rain and latter rain') strongly supports the meteorological reading. Rendering it as 'teacher' would import a messianic or didactic sense not demanded by this verse itself. To preserve interpretive transparency, the alternative is retained in a footnote.
  doctrine_reference: Translation philosophy §1, §3
- issue: Sense of לִצְדָקָה
  chosen_reading: Rendered literally as 'for righteousness'
  alternative_readings:
  - in just measure
  - for your vindication
  rationale: The Hebrew noun צדקה carries moral/covenantal weight ('righteousness') and can also imply what is right or just. The main text preserves the lexical-theological term rather than flattening it to a purely adverbial phrase, while alternatives are footnoted.
  doctrine_reference: Translation philosophy §3, §5
