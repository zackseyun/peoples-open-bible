review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura y el sentido básico del griego: exclamación inicial (ὡς μεγάλη), «misericordia» para ἐλεημοσύνη, y la idea de volverse a Dios en τοῖς ἐπιστρέφουσιν ἐπ᾿ αὐτόν. Sin embargo, «su expiación» suena menos natural en español en este contexto y puede sugerir un objeto demasiado técnico; además, el inglés POB preserva alternativas léxicas en nota para ἐξιλασμός, y aquí conviene conservar esa apertura semántica también en español.'
  spanish_quality_summary: El texto es mayormente claro y digno. «¡Cuán grande es…!» funciona bien. «Yahvé» sigue el estándar del proyecto. La principal mejora es sustituir «su expiación» por «su reconciliación expiatoria», no; mejor por «su expiación»? No, más natural es «y cuán grande su expiación»? Pero para fidelidad y fluidez conviene «y su expiación para los que vuelven a él» con leve ajuste de «se vuelven» a «vuelven». Aun así, la mejor reparación mínima es añadir nota léxica y suavizar la frase a «para los que vuelven a él».
  glossary_alignment: Alinea bien con los términos del proyecto en «Yahvé», «misericordia» y el lenguaje de retorno. La elección de «expiación» es defendible como equivalente de ἐξιλασμός, pero debe acompañarse de una nota que preserve las alternativas «propiciación» y «atonamiento/atonación»; en español común, «expiación» es aceptable y más inteligible que un neologismo técnico.
  issues:
  - severity: medium
    issue: Falta nota léxica para ἐξιλασμός
    rationale: El rastro de auditoría inglés conserva alternativas significativas ('propitiation' / 'expiation'). Dado que el español elige «expiación», conviene anotar la alternativa «propiciación» para no cerrar demasiado el rango semántico.
  - severity: low
    issue: «se vuelven a él» es correcto pero algo menos natural que «vuelven a él»
    rationale: Con ἐπιστρέφω ambas opciones sirven, pero «vuelven a él» suena más fluido en español bíblico moderno y mantiene la idea de retorno sin pérdida de sentido.
  revised_spanish_text: ¡Cuán grande es la misericordia de Yahvé, y su expiación[a] para los que vuelven a él!
  revised_footnotes:
  - marker: a
    text: O «propiciación».
    reason: lexical_alternative
  revision_rationale: Se conserva el sentido del original y la terminología del proyecto, pero se añade una nota para preservar la amplitud semántica documentada de ἐξιλασμός y se mejora levemente la naturalidad de ἐπιστρέφουσιν con «vuelven». No se requiere adjudicación adicional.
