review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien la estructura y el sentido general del hebreo: mandato de regocijarse en la celebración, lista inclusiva de miembros del hogar y grupos vulnerables, y cierre con el modismo «dentro de tus puertas». Sin embargo, dos elecciones no reflejan del todo la pista auditada del POB: גֵּר se acerca mejor a «residente extranjero» o «forastero residente» que a «forastero» a secas, y la nota a «dentro de tus puertas» está anclada en la viuda en vez de en la frase idiomática final, lo que desordena la relación texto-nota.'
  spanish_quality_summary: El español es generalmente claro y digno. No obstante, «tu esclavo varón» suena algo pesado; «tu esclavo y tu esclava» expresa bien el contraste de género sin pérdida. «Dentro de tus puertas» es aceptable como hebraísmo comprensible, pero conviene reubicar su nota al lugar correcto. También deben traducirse al español las notas, no dejarlas en inglés.
  glossary_alignment: 'Buen alineamiento en «esclavo/esclava», «levita» y el mantenimiento del modismo «dentro de tus puertas». Hay desalineación parcial con la rationale del POB en גֵּר: «forastero» puede sonar demasiado general o transitorio, mientras que el contexto pide un no israelita residente entre el pueblo. «Huérfano» es aceptable si la nota conserva el matiz de «sin padre».'
  issues:
  - severity: medium
    issue: גֵּר traducido como «forastero» sin matiz de residencia
    rationale: El inglés auditado documenta explícitamente la identidad legal-social de un no israelita residente. «Forastero» a secas puede sugerir simplemente alguien de fuera o de paso. En español, «residente extranjero» o «forastero residente» preserva mejor el matiz.
  - severity: medium
    issue: La nota sobre «dentro de tus puertas» está anclada en «la viuda[d]» en vez de en la frase final
    rationale: La marca [d] debe aparecer junto a la expresión que explica. Tal como está, induce a pensar que la nota comenta «la viuda» en lugar del modismo hebreo final.
  - severity: medium
    issue: Las notas están en inglés, no en español
    rationale: El producto meta es español; las notas deben ser legibles para el lector hispanohablante y coherentes con la revisión española.
  - severity: low
    issue: «tu esclavo varón» suena algo rígido
    rationale: Aunque fiel, «tu esclavo y tu esclava» es más natural en español y mantiene claramente el par masculino/femenino del hebreo.
  revised_spanish_text: Y te alegrarás en tu fiesta[a] —tú, tu hijo y tu hija, tu esclavo y tu esclava, el levita, el forastero residente[b], el huérfano[c] y la viuda, que están dentro de tus puertas[d].
  revised_footnotes:
