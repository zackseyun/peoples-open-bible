  text: 항구가 겨울을 나기에 적합하지 않았기에, 대다수가 거기서 떠나기로 결정하였습니다. 가능하면 뵈닉스에 이르러 그곳에서 겨울을 나려는 것이었는데, 뵈닉스는 그레데의 한 항구로 남서쪽과 북서쪽을 바라보고 있었습니다.
