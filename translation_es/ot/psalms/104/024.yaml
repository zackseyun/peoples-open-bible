  text: מָֽה רַבּ֬וּ מַעֲשֶׂ֨י/ךָ יְֽהוָ֗ה כֻּ֭לָּ/ם בְּ/חָכְמָ֣ה עָשִׂ֑יתָ מָלְאָ֥ה הָ֝/אָ֗רֶץ קִנְיָנֶֽ/ךָ־׀׃
base_translation:
  language: en
  yaml_path: translation/ot/psalms/104/024.yaml
  text: How many are your works[a], O Yahweh! In wisdom you have made them all; the earth is full of your creatures.
  footnotes:
  - marker: a
    text: Or 'the earth is full of your creatures' or 'what belongs to you.' The Hebrew term can denote what one possesses or acquires; in context it may refer broadly to the things God has made.
    reason: lexical_alternative
