lexical_decisions:
- source_word: מִנֹּגַהּ
  english_pob_choice: From the brightness
  chosen_spanish: Desde el resplandor
  alternatives_spanish:
  - Desde la brillantez
  - Desde la luz resplandeciente
  - Desde el brillo
  lexicon: HALOT
  rationale: נֹגַהּ denota brillo, resplandor o luz brillante. «Resplandor» comunica bien esa luminosidad en español y conserva el valor visual y teofánico. El prefijo מִן se expresa con «desde» para indicar origen.
- source_word: נֶגְדּוֹ
  english_pob_choice: before him
  chosen_spanish: que estaba delante de él
  alternatives_spanish:
  - delante de él
  - ante él
  - en frente de él
  lexicon: HALOT
  rationale: נֶגֶד con sufijo de tercera persona señala lo que está frente a él. En español, «que estaba delante de él» fluye naturalmente y conserva la ubicación espacial sin introducir «presencia» como interpretación adicional.
- source_word: בָּעֲרוּ
  english_pob_choice: blazed forth
  chosen_spanish: se encendieron
  alternatives_spanish:
  - ardieron
  - prendieron
  - flamearon
  lexicon: HALOT
  rationale: בער en qal significa arder o prender fuego. «Se encendieron» reproduce la irrupción del fuego con naturalidad en español y evita forzar una imagen demasiado interpretativa; la idea de intensidad queda apoyada por el contexto poético.
- source_word: גַּחֲלֵי אֵשׁ
  english_pob_choice: coals of fire
  chosen_spanish: brasas de fuego
  alternatives_spanish:
  - carbones de fuego
  - brasas ígneas
  - brasas ardientes
  lexicon: HALOT
  rationale: La construcción hebrea es literalmente «brasas/carbones de fuego». «Brasas de fuego» conserva la imagen y suena idiomático y claro en español, manteniendo el paralelismo poético.
theological_decisions:
- issue: Imaginería teofánica y sujeto implícito
  english_pob_reading: The verse is rendered as describing fiery phenomena proceeding from the divine appearance without adding an explicit divine action beyond the Hebrew wording.
  chosen_spanish_reading: El versículo presenta el resplandor y las brasas como fenómenos que proceden de la escena teofánica, sin añadir una causa explícita que el hebreo no formule.
  alternative_spanish_readings:
  - His brightness kindled coals of fire
  - Su resplandor encendió brasas de fuego
  rationale: El hebreo es breve y poético; no explicita con un verbo causal separado quién enciende las brasas. La traducción española conserva esa sobriedad y deja que la imagen teofánica se sostenga por sí sola.
  doctrine_reference: 'Translation philosophy: Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: La revisión más reciente indica que no hubo cambios necesarios; el acuerdo de control cruzado fue alto y sin incidencias, por lo que esta redacción sigue de cerca el paquete fuente y la decisión inglesa auditada.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma del proyecto solo cuando el texto lo requiera; aquí no aparece el Tetragrámaton explícitamente.
  - Se conserva la imaginería de fuego sin expandirla a una explicación causal no presente en el hebreo.
  - «Resplandor» y «brasas de fuego» reflejan el campo semántico de brillo/fuego sin suavizar el efecto poético.
