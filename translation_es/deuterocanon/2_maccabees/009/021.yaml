translation:
  language: es
  text: Recordaba con afecto su honor y su buena voluntad[a]; después de regresar de las regiones de Persia y caer en una grave enfermedad[b], juzgué necesario velar por la seguridad común de todos ustedes[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «su honor y su favor». εὔνοια puede significar también «favor» o «benevolencia».
    reason: lexical_alternative
  - marker: b
    text: Literalmente, «habiendo caído en una enfermedad que tiene δυσχερία». La expresión señala una dolencia grave o difícil de soportar.
    reason: lexical_alternative
  - marker: c
    text: O «la seguridad pública de todos ustedes».
    reason: lexical_alternative
lexical_decisions:
- source_word: τιμή
  english_pob_choice: honor
  chosen_spanish: honor
  alternatives_spanish:
  - estima
  - prestigio
  lexicon: LSJ
  rationale: τιμή puede significar honor, estima o prestigio. «Honor» conserva mejor el valor relacional y formal del contexto de carta real, sin reducirlo a cortesía ni a mera reputación.
- source_word: εὔνοια
  english_pob_choice: goodwill
  chosen_spanish: buena voluntad
  alternatives_spanish:
  - favor
  - benevolencia
  lexicon: LSJ
  rationale: εὔνοια expresa buena disposición, favor o benevolencia. «Buena voluntad» es natural en español y mantiene el matiz de disposición favorable que acompaña a «honor».
- source_word: ἐμνημόνευον
  english_pob_choice: I remembered
  chosen_spanish: recordaba
  alternatives_spanish:
  - tenía presente
  - me acordaba de
  lexicon: LSJ
  rationale: El imperfecto sugiere acción continuada. «Recordaba» conserva ese aspecto mejor que un perfecto puntual y encaja con el tono epistolar.
- source_word: φιλοστόργως
  english_pob_choice: with affection
  chosen_spanish: con afecto
  alternatives_spanish:
  - con cariño
  - con afecto entrañable
  lexicon: LSJ
  rationale: El adverbio comunica afecto cálido, con posible matiz familiar. «Con afecto» mantiene ese tono sin añadir una especificación demasiado interpretativa.
- source_word: ἐπαναγαγών
  english_pob_choice: after returning
  chosen_spanish: después de regresar
  alternatives_spanish:
  - tras volver
  - habiendo regresado
  lexicon: LSJ
  rationale: 'En contexto, el participio se entiende con sentido intransitivo: haber vuelto de Persia. «Después de regresar» expresa bien la secuencia temporal en español.'
- source_word: κατὰ τὴν Περσίδα τόπων
  english_pob_choice: from the regions of Persia
  chosen_spanish: de las regiones de Persia
  alternatives_spanish:
  - de los territorios de Persia
  - de los lugares de Persia
  lexicon: LSJ
  rationale: La expresión designa localidades o territorios en Persia. «Regiones de Persia» es idiomático y fiel al alcance geográfico del griego.
- source_word: περιπεσών
  english_pob_choice: falling into
  chosen_spanish: habiendo caído en
  alternatives_spanish:
  - al caer en
  - después de contraer
  lexicon: LSJ
  rationale: Con ἀσθενείᾳ, la idea es entrar en un estado de enfermedad. «Habiendo caído en» conserva el movimiento del participio y la relación con la dolencia.
- source_word: ἀσθενείᾳ
  english_pob_choice: a grievous illness
  chosen_spanish: una grave enfermedad
  alternatives_spanish:
  - una enfermedad grave
  - una dolencia grave
  lexicon: LSJ
  rationale: Aunque ἀσθένεια puede ser «debilidad», aquí el contexto físico exige «enfermedad». «Grave» reproduce bien la intensificación que el inglés POB expresa como «grievous».
- source_word: δυσχερίαν ἔχουσῃ
  english_pob_choice: grievous illness
  chosen_spanish: grave
  alternatives_spanish:
  - difícil de sobrellevar
  - de extrema dificultad
  lexicon: LSJ
  rationale: La frase califica la enfermedad como pesada o difícil de soportar. «Grave» en español absorbe esa carga semántica de forma natural y digna.
- source_word: ἀναγκαῖον ἡγησάμην
  english_pob_choice: I considered it necessary
  chosen_spanish: juzgué necesario
  alternatives_spanish:
  - consideré necesario
  - me pareció necesario
  lexicon: LSJ
  rationale: La construcción expresa una evaluación deliberada. «Juzgué necesario» es breve, formal y fiel al juicio expresado por el hablante.
- source_word: φροντίσαι
  english_pob_choice: to take thought for
  chosen_spanish: ocuparme de
  alternatives_spanish:
  - velar por
  - procurar
  lexicon: LSJ
  rationale: En este contexto administrativo, φροντίζω implica atender con cuidado. «Ocuparme de» comunica la acción concreta sin perder el matiz de responsabilidad.
- source_word: κοινῆς ... ἀσφαλείας
  english_pob_choice: the common safety
  chosen_spanish: la seguridad común
  alternatives_spanish:
  - la seguridad pública
  - la seguridad compartida
  lexicon: LSJ
  rationale: ἀσφάλεια es seguridad o protección; κοινῆς indica que es compartida por todos. «Seguridad común» conserva el sentido colectivo sin cargarlo con un tecnicismo moderno.
- source_word: πάντων ὑμῶν
  english_pob_choice: of all of you
  chosen_spanish: de todos ustedes
  alternatives_spanish:
  - de todos vosotros
  - de todos ustedes
  lexicon: LSJ
  rationale: El genitivo depende de «seguridad». «De todos ustedes» resulta claro y neutral para el español latinoamericano, manteniendo el alcance universal del grupo.
translation_notes:
  revision_awareness: El contexto inglés fue revisado desde una formulación más analítica ('an illness that has become severe') a 'a grievous illness'. La versión española sigue esa revisión con «una grave enfermedad», manteniendo el valor de δυσχερίαν ἔχουσῃ como intensificación de la dolencia. No se documentan cambios teológicos en el audit trail; la decisión principal es léxica y estilística.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma del proyecto, pero este versículo no contiene el nombre divino.
  - Se conserva el tono epistolar y administrativo del griego, evitando vocabulario eclesiástico no sustentado por el texto.
  - «Seguridad común» conserva el matiz colectivo de κοινῆς ... ἀσφαλείας sin imponer una lectura exclusivamente política o exclusivamente espiritual.
