translation:
  language: es
  text: Ahora, el peso del oro que llegó a Salomón en un año fue de seiscientos sesenta y seis talentos de oro.[a]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «que fue traído a Salomón»; el hebreo dice literalmente «que llegó a Salomón», sin especificar el agente.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְהִי
  english_pob_choice: Now ... was
  chosen_spanish: Ahora, ... fue
  alternatives_spanish:
  - Y ... fue
  - Entonces ... fue
  lexicon: HALOT
  rationale: La forma narrativa introduce una nueva afirmación en secuencia. «Ahora» funciona de manera natural en español y conserva el avance discursivo sin sobretraducir el waw consecutivo.
- source_word: מִשְׁקַל
  english_pob_choice: the weight
  chosen_spanish: el peso
  alternatives_spanish:
  - la cantidad en peso
  - la medida de peso
  lexicon: HALOT
  rationale: El sustantivo señala peso, no valor ni simple cantidad. «El peso» es directo y fiel al dato cuantitativo del versículo.
- source_word: הַזָּהָב
  english_pob_choice: of the gold
  chosen_spanish: del oro
  alternatives_spanish:
  - de oro
  lexicon: HALOT
  rationale: El hebreo tiene artículo definido; en español, «del oro» mantiene la referencia específica al oro recibido por Salomón sin sonar forzado.
- source_word: אֲשֶׁר בָּא
  english_pob_choice: that came
  chosen_spanish: que llegó
  alternatives_spanish:
  - que vino
  - que fue traído
  lexicon: HALOT
  rationale: «Llegó» conserva la idea básica de venir/arribar del hebreo sin introducir un agente explícito. Evita resolver en la traducción la ambigüedad que el POB inglés preserva con «that came».
- source_word: לִשְׁלֹמֹה
  english_pob_choice: to Solomon
  chosen_spanish: a Salomón
  alternatives_spanish:
  - para Salomón
  lexicon: HALOT
  rationale: La preposición ל expresa dirección o recepción; «a Salomón» es la correspondencia más natural en español.
- source_word: בְּשָׁנָה אֶחָת
  english_pob_choice: in one year
  chosen_spanish: en un año
  alternatives_spanish:
  - en un solo año
  lexicon: HALOT
  rationale: La frase denota el período dentro del cual se recibió la cantidad. «En un año» es literal y claro.
- source_word: שֵׁשׁ מֵא֛וֹת וְשִׁשִּׁים וָשֵׁשׁ
  english_pob_choice: six hundred sixty-six
  chosen_spanish: seiscientos sesenta y seis
  alternatives_spanish:
  - seiscientos y sesenta y seis
  lexicon: HALOT
  rationale: Se trata del número cardinal exacto. En español moderno, la forma sin «y» entre centenas y decenas es la más natural y precisa.
- source_word: כִּכְּרֵי זָהָב
  english_pob_choice: talents of gold
  chosen_spanish: talentos de oro
  alternatives_spanish:
  - talentos de oro fino
  lexicon: HALOT
  rationale: כִּכָּר es la unidad de peso tradicionalmente rendida como «talento». Se conserva la medida histórica, sin sustituirla por una equivalencia moderna no dada en el texto.
theological_decisions:
- issue: Posible carga simbólica del número 666
  english_pob_reading: Render the number straightforwardly as a historical quantity without interpretive signaling.
  chosen_spanish_reading: Presentar el número de manera directa como cantidad histórica, sin insinuar un significado simbólico aquí.
  alternative_spanish_readings:
  - Introducir una nota que vincule el número con usos simbólicos posteriores
  - Marcar el número como potencialmente significativo
  rationale: El hebreo describe el peso anual del oro y no interpreta el número. La traducción no debe importar asociaciones posteriores ni resolver una tensión que el texto no resuelve.
  doctrine_reference: 'Principio de fidelidad textual: no introducir lecturas doctrinales o simbólicas que el pasaje no formula.'
translation_notes:
  revision_awareness: 'El pasaje muestra alta concordancia con el audit trail inglés: mantiene el valor numérico exacto, conserva la ambigüedad del verbo de llegada y sigue la decisión de no interpretar el 666 simbólicamente en el texto principal.'
  spanish_consistency_notes:
  - Se conservó «Yahvé» como terminología base del proyecto, aunque este versículo no la contiene.
  - Se usó «Salomón» y no una forma abreviada, para mantener claridad reverente en español.
  - Se prefirió «talentos» como unidad histórica establecida, en coherencia con el POB inglés.
