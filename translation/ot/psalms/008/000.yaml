id: PSA.8.0
reference: Psalms 8:0
source:
  edition: WLC
  text: לַ/מְנַצֵּ֥חַ עַֽל הַ/גִּתִּ֗ית מִזְמ֥וֹר לְ/דָוִֽד־׃
translation:
  text: For the choir director[a]; according to the Gittith[c][b]. A psalm of David.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew Gittith; probably a musical or liturgical term, perhaps the name of a tune or instrument.
    reason: cultural_note
  - marker: b
    text: Or 'by David' or 'for David.' The Hebrew 'of David' can indicate authorship or association.
    reason: alternative_reading
  - marker: c
    text: 'Or ''For the choir director: according to The Gittith. A psalm of David.''.'
    reason: previous_rendering
lexical_decisions:
- source_word: לַמְנַצֵּחַ
  chosen: For the choir director
  alternatives:
  - For the music director
  - To the choirmaster
  - For the leader
  lexicon: HALOT
  rationale: In psalm superscriptions this participial form conventionally denotes the person overseeing musical performance. 'Choir director' is clear modern English and fits the liturgical/musical setting better than the more ambiguous 'leader.'
- source_word: עַל
  chosen: according to
  alternatives:
  - 'on'
  - upon
  - with reference to
  lexicon: HALOT
  rationale: In superscriptions introducing a tune, instrument, or performance notation, עַל often signals musical direction. 'According to' communicates that the psalm is to be rendered in relation to the following term without overcommitting to a specific technical sense.
- source_word: הַגִּתִּית
  chosen: The Gittith
  alternatives:
  - the Gittite instrument
  - the winepresses
  lexicon: HALOT
  rationale: 'The exact referent is uncertain: likely a musical term, perhaps an instrument or tune name. Because the meaning is not secure, transliteration preserves the Hebrew form most transparently. The article is retained as part of the phrase introduced by עַל.'
- source_word: מִזְמוֹר
  chosen: A psalm
  alternatives:
  - A song
  - A melody
  lexicon: HALOT
  rationale: '''Psalm'' is the standard and most precise rendering for this genre label in superscriptions.'
- source_word: לְדָוִד
  chosen: of David
  alternatives:
  - belonging to David
  - for David
  - by David
  lexicon: HALOT
  rationale: The preposition ל in psalm titles can indicate authorship, association, dedication, or collection. 'Of David' preserves that ambiguity better than 'by David,' which would decide the question too narrowly.
