revisions:
- from: Además[a], yo también alcé mi mano hacia ellos en el desierto, para dispersarlos entre las naciones y esparcirlos por las tierras.
  to: Además[a], yo también les alcé mi mano en el desierto, para dispersarlos entre las naciones y esparcirlos por las tierras.
  rationale: Se corrige únicamente la preposición/pronombre del modismo de juramento para reflejar mejor לָהֶם y la decisión auditada 'to them', y se naturaliza la nota alternativa en español sin cambiar la filosofía del POB. El resto del versículo puede mantenerse.
