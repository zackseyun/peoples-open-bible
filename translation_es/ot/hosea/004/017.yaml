translation:
  language: es
  text: Efraín está unido a los ídolos[a]; déjalo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Efraín está ligado a los ídolos; déjalo en paz». El hebreo es breve, y el mandato final puede expresar el abandono de Efraín a la idolatría que eligió.'
    reason: lexical_alternative
lexical_decisions:
- source_word: חֲבוּר
  english_pob_choice: is joined
  chosen_spanish: está unido
  alternatives_spanish:
  - está ligado
  - está atado
  - está adherido
  lexicon: HALOT
  rationale: El participio pasivo de חבר comunica estar unido o enlazado. «Está unido» reproduce esa relación sin añadir matices excesivos y suena natural en español bíblico contemporáneo.
- source_word: עֲצַבִּים
  english_pob_choice: idols
  chosen_spanish: ídolos
  alternatives_spanish:
  - imágenes
  - dolos
  lexicon: HALOT
  rationale: En el contexto profético, el término denota objetos de culto falsos y porta una carga polémica. «Ídolos» conserva esa fuerza mejor que una traducción más neutral como «imágenes».
- source_word: אֶפְרַיִם
  english_pob_choice: Ephraim
  chosen_spanish: Efraín
  alternatives_spanish:
  - la tribu de Efraín
  - Israel
  lexicon: Nombre propio / transliteración estándar
  rationale: Se mantiene el nombre propio, como en el texto fuente, porque el verso conserva la retórica profética de dirigirse a Efraín sin expandirlo interpretativamente en el texto principal.
- source_word: הַנַּח
  english_pob_choice: leave ... alone
  chosen_spanish: déjalo
  alternatives_spanish:
  - déjalo en paz
  - suéltalo
  - déjenlo
  lexicon: HALOT
  rationale: El imperativo causativo expresa dejar sin intervenir o dejar tranquilo. «Déjalo» es breve, idiomático y preserva la aspereza del mandato profético.
- source_word: לוֹ
  english_pob_choice: him
  chosen_spanish: lo
  alternatives_spanish:
  - le
  - a él
  lexicon: Pronombre de 3.ª masc. sing.
  rationale: El sufijo pronominal masculino singular se refleja de forma directa con «lo». En español, el objeto del imperativo queda natural y mantiene el referente personificado de Efraín.
theological_decisions:
- issue: Referente de Efraín
  english_pob_reading: Ephraim is retained as the named subject, with no expansion in the main text.
  chosen_spanish_reading: Se conserva «Efraín» como sujeto nombrado, sin expandirlo en el texto principal.
  alternative_spanish_readings:
  - Efraín como abreviatura de Israel o del reino del norte
  rationale: El hebreo nombra a Efraín; la poesía profética usa ese nombre para personificar al reino del norte. Mantenerlo evita resolver una tensión interpretativa que el texto no explica de forma explícita.
  doctrine_reference: 'Principio de traducción: preservar la tensión teológica y retórica del texto fuente.'
- issue: Fuerza del imperativo final
  english_pob_reading: 'A command to abandon or cease attempting to restrain Ephraim: ''leave him alone.'''
  chosen_spanish_reading: 'Un mandato para no intervenir más en Efraín: «déjalo».'
  alternative_spanish_readings:
  - «déjalo en paz» como matiz idiomático
  - «suéltalo» como lectura de abandono
  rationale: La sintaxis hebrea es breve y abierta; el imperativo puede entenderse como abandonar a Efraín a su idolatría elegida. «Déjalo» conserva esa brusquedad y deja espacio a la ambigüedad documentada.
  doctrine_reference: 'Principio de traducción: preservar la tensión lexical y sintáctica sin cerrarla artificialmente.'
translation_notes:
  revision_awareness: 'La revisión más reciente no introdujo cambios: el pasaje quedó confirmado como de alta concordancia y sin observaciones abiertas.'
  spanish_consistency_notes:
  - Se usa «Efraín» como nombre propio, coherente con la política POB de transliterar nombres.
  - Se prefiere «ídolos» para עֲצַבִּים, manteniendo el tono profético de denuncia.
  - Se mantiene un mandato breve y abrupto en español para reflejar la tersura del hebreo.
  - Los marcadores de nota [a] y [b] aparecen en el texto exactamente donde corresponden.
