translation:
  language: es
  text: Y atacaron[a] todas las ciudades alrededor de Gerar, porque el terror de Yahvé estaba sobre ellos. Y saquearon todas las ciudades, porque había gran botín en ellas.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: También puede traducirse «hirieron» o «golpearon»; el hebreo נכה en este contexto militar expresa un ataque o derrota violenta.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּכּוּ
  english_pob_choice: they struck
  chosen_spanish: hirieron
  alternatives_spanish:
  - golpearon
  - atacaron
  - hirieron de muerte
  lexicon: HALOT
  rationale: נכה en contexto militar puede expresar un golpe violento o una derrota infligida. En español, 'hirieron' conserva la fuerza de una acción bélica sin añadir explícitamente 'muerte' ni debilitarlo a 'golpearon'.
- source_word: כָּל הֶעָרִים סְבִיבוֹת גְּרָר
  english_pob_choice: all the cities around Gerar
  chosen_spanish: todas las ciudades alrededor de Guerar
  alternatives_spanish:
  - todas las ciudades en derredor de Guerar
  - todas las ciudades que rodeaban Guerar
  - todas las ciudades alrededor de Gerar
  lexicon: HALOT
  rationale: עָרִים se mantiene como 'ciudades' por el marco de campaña militar; 'alrededor de' representa bien סְבִיבוֹת sin forzar un calco. 'Guerar' sigue la forma castellana usual del topónimo bíblico.
- source_word: פַחַד יְהוָה
  english_pob_choice: the terror of Yahweh
  chosen_spanish: el terror de Yahvé
  alternatives_spanish:
  - el temor de Yahvé
  - el pavor de Yahvé
  - el terror de Yahveh
  lexicon: HALOT
  rationale: Aquí פַחַד indica pánico impuesto o sobrevenido, no temor reverente. 'Terror' preserva esa carga. YHWH se rinde como 'Yahvé' según la convención del proyecto.
- source_word: עֲלֵיהֶם
  english_pob_choice: was upon them
  chosen_spanish: estaba sobre ellos
  alternatives_spanish:
  - vino sobre ellos
  - reposaba sobre ellos
  - caía sobre ellos
  lexicon: HALOT
  rationale: La construcción con היה + על se expresa naturalmente como una condición que 'estaba sobre' las ciudades/personas; mantiene la imagen de una presión envolvente sin reinterpretarla.
- source_word: וַיָּבֹזּוּ
  english_pob_choice: they plundered
  chosen_spanish: saquearon
  alternatives_spanish:
  - despojaron
  - plumaron
  - tomaron como botín
  lexicon: HALOT
  rationale: בזז en guerra significa tomar bienes por la fuerza. 'Saqueó/saquearon' es el equivalente español más transparente y directo para esta acción.
- source_word: בִזָּה רַבָּה
  english_pob_choice: much spoil
  chosen_spanish: gran botín
  alternatives_spanish:
  - mucho botín
  - abundante botín
  - gran saqueo
  lexicon: HALOT
  rationale: בִזָּה es el botín capturado en guerra. 'Gran botín' reproduce el sustantivo con una cuantificación natural en español y distingue el nombre del verbo 'saquear'.
- source_word: בָהֶם
  english_pob_choice: in them
  chosen_spanish: en ellas
  alternatives_spanish:
  - dentro de ellas
  - allí
  - entre ellas
  lexicon: HALOT
  rationale: El pronombre retoma 'las ciudades'; por eso el femenino plural 'en ellas' hace explícito el referente en español y evita una ambigüedad innecesaria.
theological_decisions:
- issue: Rendering of the divine name יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahveh
  - el SEÑOR
  rationale: El texto hebreo usa directamente el Tetragrama. Siguiendo la convención del proyecto, se translitera como 'Yahvé' y no se sustituye por un título impersonal.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
translation_notes:
  revision_awareness: 'El inglés auditado pasó por una revisión menor: se cambió ''struck down'' a ''struck'' para acercarse más al hebreo, y ''plunder'' a ''spoil'' para distinguir el verbo del sustantivo. El español sigue esa línea: usa un verbo bélico fuerte (''hirieron'') sin añadir ''de muerte'', y conserva ''botín'' para el sustantivo final.'
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' como forma normal del nombre divino, en coherencia con el proyecto.
  - '''Botín'' se reserva para בִזָּה; el verbo correspondiente se vierte como ''saquearon''.'
  - '''Ciudades'' y el femenino plural de los pronombres conservan el referente explícito del hebreo.'
