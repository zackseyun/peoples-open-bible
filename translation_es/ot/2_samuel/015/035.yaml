- from: ¿No están allí contigo Sadoc y Abiatar, los sacerdotes? Y todo lo que oigas de la casa del rey, se lo informarás a Sadoc y a Abiatar, los sacerdotes.
  to: ¿No están allí contigo Sadoc y Abiatar, los sacerdotes? Y todo lo que oigas de la casa del rey informarás a Sadoc y a Abiatar, los sacerdotes.
