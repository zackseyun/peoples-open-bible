translation:
  language: es
  text: Quien se alegra en el corazón será condenado[a], y quien aborrece la charla[b] será menoscabado por el mal.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Condenado» sigue la lectura de la revisión inglesa final para καταγνωσθήσεται; también podría entenderse como «hallado culpable».
    reason: alternative_reading
  - marker: b
    text: El griego λαλιὰν puede aludir a «charla», pero también a «parloteo», «palabrería» o, más ampliamente, «hablar»; aquí se usa una opción española más natural sin fijar necesariamente un matiz tan negativo como «palabrería».
    reason: lexical_alternative
lexical_decisions:
- source_word: ὁ εὐφραινόμενος
  english_pob_choice: whoever rejoices
  chosen_spanish: Quien se alegra
  alternatives_spanish:
  - quien se regocija
  - quien se deleita
  lexicon: LSJ
  rationale: El participio presente expresa una acción general y proverbial; «quien se alegra» conserva bien ese valor gnómico en español sin sonar artificioso.
- source_word: καρδίᾳ
  english_pob_choice: in heart
  chosen_spanish: en el corazón
  alternatives_spanish:
  - en corazón
  - de corazón
  lexicon: LSJ
  rationale: La dative idiomática se vierte de manera natural como interioridad personal. «En el corazón» mantiene la imagen bíblica y la claridad en español.
- source_word: καταγνωσθήσεται
  english_pob_choice: will be condemned
  chosen_spanish: será condenado
  alternatives_spanish:
  - será hallado culpable
  - será reprobado
  lexicon: LSJ
  rationale: El futuro pasivo de καταγινώσκω admite el valor judicial de condena o culpabilidad. Se eligió «condenado» por seguir de cerca la revisión inglesa final y por ser una fórmula clara y pública en español.
- source_word: ὁ μισῶν
  english_pob_choice: whoever hates
  chosen_spanish: quien aborrece
  alternatives_spanish:
  - quien odia
  - el que aborrece
  lexicon: LSJ
  rationale: El participio genérico se expresa con una relativa. «Aborrece» reproduce con fuerza el rechazo del verbo griego y encaja bien con el tono sapiencial.
- source_word: λαλιὰν
  english_pob_choice: talk
  chosen_spanish: el hablar
  alternatives_spanish:
  - la charla
  - el parloteo
  - la palabrería
  lexicon: LSJ
  rationale: Aunque la nota inglesa abre la posibilidad de un matiz negativo de exceso verbal, el texto revisado opta por un término más neutral. «El hablar» preserva esa neutralidad y evita imponer «palabrería» sin necesidad textual.
- source_word: ἐλαττονοῦται
  english_pob_choice: is lessened
  chosen_spanish: será menoscabado
  alternatives_spanish:
  - será disminuido
  - quedará reducido
  - será rebajado
  lexicon: LSJ
  rationale: El verbo expresa ser hecho menor o reducido. «Menoscabado» comunica esa merma con dignidad literaria y evita una paráfrasis demasiado abstracta.
- source_word: κακίᾳ
  english_pob_choice: by evil
  chosen_spanish: por el mal
  alternatives_spanish:
  - por la maldad
  - a causa del mal
  - mediante el mal
  lexicon: LSJ
  rationale: El dativo es denso y puede entenderse instrumentalmente o como esfera causal. «Por el mal» mantiene la concisión del griego y no estrecha innecesariamente el sentido a «maldad».
translation_notes:
  revision_awareness: 'Se tuvo en cuenta la revisión más reciente del inglés POB: se prefirió «condemned» frente a «found guilty», se suavizó el campo semántico de λαλιάν desde «chatter» hacia «talk», y se mantuvo la relación sintáctica breve de la segunda cláusula con un equivalente español igualmente conciso.'
  spanish_consistency_notes:
  - Se mantiene «corazón» como sede interior de la disposición moral.
  - Se evita introducir «Mesías», «Yahvé» u otra terminología no presente en el versículo.
  - «Por el mal» conserva la ambigüedad del dativo griego sin convertirlo en una explicación interpretativa más amplia.
