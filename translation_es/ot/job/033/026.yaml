    rationale: En el English POB, [c] acompaña «his righteousness» y [b] aclara «his face». En el borrador español, [b] quedó sobre «grito de gozo» y [c] sobre «justicia», pero falta reflejar que la nota de «su rostro» es la de referencia, mientras la alternativa léxica de «justicia» debe permanecer anclada a «justicia». El orden/ubicación de marcadores debe ser coherente y exacto en el texto español.
  - severity: low
