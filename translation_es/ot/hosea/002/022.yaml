revisions:
- from: Y te desposaré conmigo en fidelidad[a], y conocerás a Yahvé.
  to: Y haré que seas mi esposa en fidelidad[a], y conocerás a Yahvé.
  rationale: Se revisa únicamente la expresión de וְאֵרַשְׂתִּיךְ לִי. «Haré que seas mi esposa» comunica de manera natural en español el sentido de desposorio dirigido a Yahvé mismo, preservando la imagen marital del pacto sin el giro forzado «te desposaré conmigo». Se mantiene «en fidelidad» para אֱמוּנָה, «conocerás» para ידע, y «Yahvé» para יְהוָה.
  reviewer_model: gpt-5.4
