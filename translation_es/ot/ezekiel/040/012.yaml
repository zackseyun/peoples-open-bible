translation:
  language: es
  text: Y había una barrera de un codo delante de las cámaras laterales[a], y una barrera de un codo al otro lado[b]; y cada cámara lateral medía seis codos de este lado y seis codos de aquel lado.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'cuartos laterales', 'celdas' o 'alcobas' para el hebreo תָּאוֹת, que designa pequeños compartimientos en la estructura de la puerta.
    reason: lexical_alternative
  - marker: b
    text: El hebreo usa expresiones deícticas repetidas, literalmente 'de aquí' y 'de allá', para indicar las medidas en lados opuestos.
    reason: lexical_alternative
lexical_decisions:
- source_word: גְב֞וּל
  english_pob_choice: barrier
  chosen_spanish: barrera
  alternatives_spanish:
  - borde
  - límite
  - muro
  - separación
  lexicon: HALOT
  rationale: En este contexto arquitectónico, el término no señala un límite abstracto sino una franja o elemento delimitador físico delante de las habitaciones. 'Barrera' conserva esa función concreta sin sonar excesivamente interpretativo.
- source_word: לִפְנֵי
  english_pob_choice: in front of
  chosen_spanish: delante de
  alternatives_spanish:
  - antes de
  - frente a
  lexicon: HALOT
  rationale: La relación es espacial dentro de una descripción de medidas. 'Delante de' expresa con naturalidad en español la ubicación frontal sin perder precisión.
- source_word: הַתָּאוֹת
  english_pob_choice: the side rooms
  chosen_spanish: las habitaciones laterales
  alternatives_spanish:
  - los cuartos laterales
  - las cámaras laterales
  - las salas laterales
  lexicon: HALOT
  rationale: El hebreo se refiere a pequeños compartimientos adosados a la estructura de la puerta. 'Habitaciones laterales' comunica el sentido arquitectónico de forma clara y evita sobrecargar con una función militar específica que el contexto no exige aquí.
- source_word: אַמָּה
  english_pob_choice: cubit
  chosen_spanish: codo
  alternatives_spanish:
  - cúbito
  lexicon: HALOT
  rationale: Se conserva la unidad antigua de medida. En español bíblico, 'codo' es la forma natural y reconocible para 'cubit'.
- source_word: אֶחָ֔ת / אַחַ֥ת
  english_pob_choice: one ... one
  chosen_spanish: un ... un
  alternatives_spanish:
  - un solo ... un solo
  lexicon: HALOT
  rationale: El hebreo repite explícitamente el numeral para cada lado. En español, 'un codo ... un codo' reproduce esa medida paralela de forma idiomática.
- source_word: מִפֹּ֑ה ... מִפּֽוֹ
  english_pob_choice: on the other side ... on this side ... on that side
  chosen_spanish: de este lado ... de aquel lado
  alternatives_spanish:
  - de aquí ... de allá
  - por este lado ... por aquel lado
  lexicon: HALOT
  rationale: Las expresiones deícticas hebreas marcan lados opuestos en la estructura. 'De este lado / de aquel lado' preserva la oposición bilateral y suena natural en español.
- source_word: וְהַתָּא
  english_pob_choice: each side room was
  chosen_spanish: cada habitación lateral tenía
  alternatives_spanish:
  - y la habitación lateral era
  - cada cuarto lateral medía
  lexicon: HALOT
  rationale: Aunque la forma hebrea es singular, el contexto es distributivo respecto de las habitaciones laterales. 'Cada habitación lateral tenía' transmite que la medida se aplica individualmente a cada una.
- source_word: שֵׁשׁ אַמּוֹת
  english_pob_choice: six cubits
  chosen_spanish: seis codos
  alternatives_spanish:
  - seis medidas de codo
  lexicon: HALOT
  rationale: Se mantiene la unidad de medida y la repetición marcada del texto fuente. 'Seis codos' es la forma más directa y estándar en español bíblico.
translation_notes:
  revision_awareness: La redacción sigue de cerca el texto hebreo y el audit trail inglés sin depender mecánicamente de la formulación inglesa. Se conserva la repetición de la medida y la oposición deíctica de los dos lados, con una elección española natural para una lectura pública.
  spanish_consistency_notes:
  - Se usa 'codo' como unidad bíblica tradicional correspondiente a 'cubit'.
  - Se evita 'SEÑOR' u otras sustituciones teológicas irrelevantes aquí, dado que el versículo no contiene el nombre divino.
  - '''Habitaciones laterales'' mantiene el valor arquitectónico de תָּאוֹת sin imponer una lectura excesivamente técnica.'
