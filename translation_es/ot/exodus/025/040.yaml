  to: Y mira que los hagas conforme a su modelo[a], el cual te fue mostrado en el monte.
  rationale: Se corrige el número del referente para reflejar el plural del hebreo («them / their pattern»). Se reestructura la exhortación inicial como «Y mira que los hagas» para conservar la fuerza admonitiva de וּרְאֵה con español más natural. Se mantiene «modelo» por fidelidad a la decisión léxica documentada y se ajusta la nota alternativa para que también preserve el plural.
