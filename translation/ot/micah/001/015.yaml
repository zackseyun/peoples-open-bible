id: MIC.1.15
reference: Micah 1:15
source:
  edition: WLC
  text: עֹ֗ד הַ/יֹּרֵשׁ֙ אָ֣בִי לָ֔/ךְ יוֹשֶׁ֖בֶת מָֽרֵשָׁ֑ה עַד עֲדֻּלָּ֥ם יָב֖וֹא כְּב֥וֹד יִשְׂרָאֵֽל־׃
translation:
  text: I will yet bring an heir against you[a], inhabitant of Mareshah[b]; the glory of Israel will come as far as Adullam.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'an heir,' 'one who takes possession,' or 'a conqueror.' The Hebrew likely plays on the name Mareshah.
    reason: lexical_alternative
  - marker: b
    text: Or 'the nobility of Israel' or 'the wealth/splendor of Israel.'
    reason: alternative_reading
lexical_decisions:
- source_word: עֹד
  chosen: yet
  alternatives:
  - still
  - again
  lexicon: HALOT
  rationale: 'Signals continuation/addition: YHWH''s judgment is not finished but will continue. ''Yet'' is concise and idiomatic in prophetic announcement.'
- source_word: הַיּוֹרֵשׁ
  chosen: a possessor
  alternatives:
  - an heir
  - one who takes possession
  - a conqueror
  lexicon: HALOT
  rationale: From ירשׁ, 'to possess/dispossess/inherit.' Here the wordplay with מָרֵשָׁה (Mareshah) is important, so 'possessor' preserves the possession theme better than the more genealogical 'heir.' It also fits the invasion/judgment context.
- source_word: אָבִי לָךְ
  chosen: I will bring against you
  alternatives:
  - I will bring to you
  lexicon: HALOT
  rationale: The Hiphil of בוא with ל can mean 'bring to/against.' In this judgment oracle, 'against you' makes the hostile force explicit and matches the context of threatened conquest.
- source_word: יוֹשֶׁבֶת
  chosen: inhabitant
  alternatives:
  - you who dwell
  - resident
  lexicon: HALOT
  rationale: Feminine singular participle addressing the city personified as a woman. 'Inhabitant' gives natural English while preserving the direct address to the city population/city-as-daughter motif.
- source_word: מָרֵשָׁה
  chosen: Mareshah
  lexicon: HALOT
  rationale: Proper place name, transliterated per translation philosophy. The sound-play with 'possessor' is not fully reproducible in English, so it is preserved only partially through lexical choice.
- source_word: עַד
  chosen: as far as
  alternatives:
  - to
  - until
  lexicon: HALOT
  rationale: 'Marks spatial extent here more naturally than temporal ''until'': the movement reaches Adullam.'
- source_word: עֲדֻּלָּם
  chosen: Adullam
  lexicon: HALOT
  rationale: Proper place name, transliterated. Adullam evokes a place of refuge/hiding in Israel's memory, which may color the line.
- source_word: יָבֹא
  chosen: will come
  alternatives:
  - will enter
  - will reach
  lexicon: HALOT
  rationale: Simple future of בוא. Combined with עַד, 'will come as far as' is idiomatic and preserves the Hebrew movement imagery.
- source_word: כְּבוֹד יִשְׂרָאֵל
  chosen: the glory of Israel
  alternatives:
  - the nobility of Israel
  - the wealth of Israel
  - the honor of Israel
  lexicon: HALOT
  rationale: כבוד can denote glory, honor, splendor, or what is weighty/impressive. 'The glory of Israel' preserves the Hebrew's ambiguity and traditional force. In context it likely refers to Israel/Judah's dignitaries or what is most splendid in the nation retreating to Adullam, but the more literal rendering best preserves that range.
