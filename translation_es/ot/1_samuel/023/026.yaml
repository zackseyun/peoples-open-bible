translation:
  language: es
  text: Saúl iba por un lado del monte[a], y David y sus hombres por el otro lado del monte. David se apresuraba a alejarse de Saúl, mientras Saúl y sus hombres iban cercando[b] a David y a sus hombres para capturarlos[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo literalmente: ''Saúl iba por el lado del monte de este lado, y David y sus hombres por el lado del monte de este lado''. La traducción expresa el contraste pretendido como ''un lado'' y ''el otro lado''.'
    reason: lexical_alternative
  - marker: b
    text: O 'los rodeaban'.
    reason: alternative_reading
  - marker: c
    text: O 'apresarlos'.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֵּלֶךְ
  english_pob_choice: was going on
  chosen_spanish: iba
  alternatives_spanish:
  - iba avanzando
  - se iba moviendo
  lexicon: HALOT
  rationale: El wayyiqtol de הלך presenta avance narrativo simultáneo. En español, 'iba' comunica bien el desplazamiento en curso sin volverlo demasiado puntual.
- source_word: מִצַּד הָהָר מִזֶּה / מִצַּד הָהָר מִזֶּה
  english_pob_choice: on one side of the mountain / on the other side of the mountain
  chosen_spanish: por un lado del monte / por el otro lado del monte
  alternatives_spanish:
  - en un lado del monte / en el otro lado del monte
  - por un costado del monte / por el otro costado del monte
  lexicon: HALOT
  rationale: El hebreo repite la indicación deíctica 'de este lado' para ambos grupos. En español, la oposición espacial queda natural y clara con 'por un lado... por el otro lado', sin perder el contraste entre posiciones opuestas.
- source_word: נֶחְפָּז
  english_pob_choice: was hurrying
  chosen_spanish: se apresuraba
  alternatives_spanish:
  - se daba prisa
  - iba de prisa
  - se apresuraba a salir
  lexicon: HALOT
  rationale: El participio nifal expresa prisa urgente. 'Se apresuraba' conserva la urgencia y suena natural en español, sin añadir matiz emocional que no exige el hebreo.
- source_word: לָלֶכֶת מִפְּנֵי שָׁאוּל
  english_pob_choice: to get away from Saul
  chosen_spanish: a alejarse de Saúl
  alternatives_spanish:
  - a huir de Saúl
  - a irse de Saúl
  lexicon: HALOT
  rationale: '''Ir delante de'' o ''de la presencia de'' sería demasiado literal para el español corriente. ''Alejarse de Saúl'' mantiene el movimiento de salida sin intensificarlo más allá de lo que el verso dice.'
- source_word: עֹטְרִים
  english_pob_choice: were closing in on
  chosen_spanish: lo rodeaban
  alternatives_spanish:
  - lo cercaban
  - iban cerrándose sobre
  lexicon: HALOT
  rationale: El participio describe a Saúl y sus hombres moviéndose alrededor de David para atraparlo. 'Lo rodeaban' expresa bien la acción táctica y deja abierta la alternativa del sentido de 'cercar', que el inglés POB también preservó como lectura posible.
- source_word: לְתָפְשָׂם
  english_pob_choice: to capture them
  chosen_spanish: para capturarlos
  alternatives_spanish:
  - para apresarlos
  - para prenderlos
  lexicon: HALOT
  rationale: El infinitivo con sufijo marca propósito. 'Capturarlos' refleja con claridad el contexto militar; 'apresar' o 'prender' serían opciones válidas pero menos naturales para este pasaje en español moderno.
translation_notes:
  revision_awareness: La base inglesa revisada eliminó la repetición literal de 'from this side'/'on the other side' para hacer más natural la oposición espacial. El español conserva esa mejora con una formulación idiomática ('por un lado... por el otro lado') y mantiene abierta la alternativa de 'rodeaban' frente a 'cercaban' para עֹטְרִים, según el audit trail inglés.
  spanish_consistency_notes:
  - Se usa 'Saúl' y 'David' consistentemente como nombres propios sin artículos.
  - Se mantiene 'monte' para הָהָר, siguiendo el registro bíblico natural en español; 'montaña' sería posible, pero 'monte' suena más idiomático en este contexto narrativo.
  - Se evita 'SEÑOR' u otras convenciones no presentes en el verso, porque no hay el divino nombre en este pasaje.
