translation:
  language: es
  text: 'Y sucedió en aquel tiempo que Abimelec y Ficol, el comandante de su ejército, dijeron a Abraham: «Dios[a] está contigo en todo lo que haces».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, menos probablemente en este contexto, «un dios está contigo». El hebreo אֱלֹהִים puede entenderse de otra manera en algunos contextos, pero aquí lo más natural es referirlo a Dios como quien bendice a Abraham.
    reason: alternative_reading
lexical_decisions:
- source_word: וַיְהִי
  english_pob_choice: And it happened
  chosen_spanish: Y sucedió
  alternatives_spanish:
  - Y aconteció
  - Y pasó
  lexicon: HALOT
  rationale: El wayyiqtol narrativo de היה introduce una nueva escena. «Y sucedió» conserva el valor discursivo sin sonar arcaico en español.
- source_word: בָּעֵת הַהִוא
  english_pob_choice: at that time
  chosen_spanish: en aquel tiempo
  alternatives_spanish:
  - en ese tiempo
  - entonces
  lexicon: HALOT
  rationale: La expresión temporal fija se vierte de forma natural con «en aquel tiempo», manteniendo el valor de marco narrativo.
- source_word: וַיֹּאמֶר
  english_pob_choice: said
  chosen_spanish: dijeron
  alternatives_spanish:
  - dijo
  lexicon: HALOT
  rationale: Aunque el verbo hebreo está en singular, el sujeto explícito es compuesto («Abimelec y Ficol»), por lo que en español la concordancia natural es plural.
- source_word: אֲבִימֶלֶךְ
  english_pob_choice: Abimelech
  chosen_spanish: Abimelec
  alternatives_spanish:
  - Abimelech
  lexicon: transliteration
  rationale: Se sigue la transliteración española usual y legible en contextos bíblicos.
- source_word: וּפִיכֹל
  english_pob_choice: and Phicol
  chosen_spanish: Ficol
  alternatives_spanish:
  - Picol
  lexicon: transliteration
  rationale: Se usa la forma española habitual del nombre propio, sin añadir conjunción duplicada dentro del sujeto coordinado.
- source_word: שַׂר צְבָאוֹ
  english_pob_choice: the commander of his army
  chosen_spanish: el comandante de su ejército
  alternatives_spanish:
  - el jefe de su ejército
  - el capitán de su ejército
  lexicon: HALOT
  rationale: שַׂר tiene fuerza de oficial/jefe/mandatario militar; «comandante» comunica bien la función en español contemporáneo, y צָבָא aquí es claramente militar.
- source_word: אֶל אַבְרָהָם
  english_pob_choice: to Abraham
  chosen_spanish: a Abraham
  alternatives_spanish:
  - para Abraham
  lexicon: HALOT
  rationale: La preposición direccional introduce al destinatario del habla. En español, tras el verbo de decir, «a Abraham» es la forma natural.
- source_word: אֱלֹהִים
  english_pob_choice: God
  chosen_spanish: Dios
  alternatives_spanish:
  - un dios
  - dioses
  lexicon: HALOT
  rationale: En este contexto el hablante reconoce la presencia del Dios verdadero con Abraham; por eso se traduce con mayúscula como nombre/deidad singular.
- source_word: עִמְּךָ
  english_pob_choice: is with you
  chosen_spanish: está contigo
  alternatives_spanish:
  - va contigo
  - permanece contigo
  lexicon: HALOT
  rationale: La expresión de presencia/apoyo con עם se vierte de forma idiomática como «está contigo», conservando el sentido relacional.
- source_word: בְּכֹל אֲשֶׁר אַתָּה עֹשֶׂה
  english_pob_choice: in all that you do
  chosen_spanish: en todo lo que haces
  alternatives_spanish:
  - en cuanto haces
  - en todo cuanto haces
  lexicon: HALOT
  rationale: La construcción expresa alcance total. En español, «en todo lo que haces» es clara y fiel al valor inclusivo del hebreo.
theological_decisions:
- issue: Referencia de אֱלֹהִים en la խոսa de Abimelec
  english_pob_reading: God
  chosen_spanish_reading: Dios
  alternative_spanish_readings:
  - un dios
  - dioses
  rationale: La escena presupone que Abimelec reconoce la bendición divina sobre Abraham. Traducir «Dios» mantiene esa lectura contextual sin introducir una paráfrasis doctrinal.
  doctrine_reference: Monoteísmo bíblico; reconocimiento narrativo de la acción de Dios en la vida de Abraham.
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión inglesa que eliminó la redundancia de «saying» en favor de una frase más natural. En español, el equivalente estructural del infinitivo לֵאמֹר no requiere explicitarse, por lo que se omitió sin pérdida de sentido. También se respetó la lectura contextual de אֱלֹהִים como «Dios», con nota de alternativa menos probable.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» como norma general del proyecto, pero este versículo no contiene el tetragrámaton.
  - Se usó «Abimelec» y «Ficol» con transliteración española consistente.
  - «Ejército» se eligió para צָבָא por el contexto militar explícito.
  - La concordancia plural en «dijeron» refleja el sujeto compuesto, aunque el verbo hebreo sea singular.
