base_translation:
  language: en
  yaml_path: translation/ot/1_kings/006/021.yaml
  text: Solomon overlaid the inside of the house with pure gold[a], and he drew gold chains across the front of the inner sanctuary[c][b], and overlaid it with gold.
  footnotes:
  - marker: a
    text: Or 'refined gold.' The Hebrew phrase literally reads 'gold, closed/shut,' an idiom for high-quality gold.
    reason: lexical_alternative
  - marker: b
    text: Or 'before the inner sanctuary.' The Hebrew may describe gold chains placed in front of the inner sanctuary; 'across the front of' reflects the likely sense with the verb 'caused to pass.'
    reason: alternative_reading
  - marker: c
    text: '''Inner sanctuary'' refers to the debir, the innermost room of the temple, later called the Most Holy Place.'
    reason: cultural_note
