translation:
  language: es
  text: 'No digas[a]: «¿Quién puede resistir su poder?», porque Yahvé busca a los perseguidos.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'El griego dice: «No digas: “He pecado, ¿y qué me sucedió?”, porque el Señor es paciente». Esto probablemente refleja un texto subyacente distinto del hebreo conservado.'
    reason: alternative_reading
lexical_decisions:
- source_word: אַל תֹּאמַר
  english_pob_choice: Do not say
  chosen_spanish: No digas
  alternatives_spanish:
  - No hables
  - No te digas
  lexicon: HALOT
  rationale: El hebreo es una prohibición directa con אמר. En español, «No digas» conserva la fuerza y la naturalidad de la advertencia sin añadir matices no presentes en el texto.
- source_word: מִי יוּכַל כֹּחוֹ
  english_pob_choice: Who can withstand his power?
  chosen_spanish: ¿Quién puede resistir su poder?
  alternatives_spanish:
  - ¿Quién puede aguantar su poder?
  - ¿Quién puede hacerle frente a su poder?
  - ¿Quién puede soportar su poder?
  lexicon: HALOT
  rationale: El hebreo es breve y difícil; la POB inglesa lo entendió como una pregunta sobre oponerse o resistir a la fuerza divina. «Resistir» reproduce bien esa idea en español y mantiene el tono de advertencia. «Poder» conserva כוח sin forzar una paráfrasis.
- source_word: כִּי
  english_pob_choice: for
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  - puesto que
  lexicon: HALOT
  rationale: La partícula introduce la razón de la prohibición. «Porque» es la equivalencia más directa y clara en español.
- source_word: יְהֹוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  - el SEÑOR
  - el Señor
  lexicon: HALOT
  rationale: Siguiendo el estándar del proyecto en español, el Tetragrama se vierte «Yahvé» para mantener la transparencia respecto del nombre divino y evitar el reemplazo por un título.
- source_word: מְבַקֵּשׁ
  english_pob_choice: seeks
  chosen_spanish: busca
  alternatives_spanish:
  - busca a
  - se interesa por
  - procura
  lexicon: HALOT
  rationale: בקש en este contexto expresa búsqueda activa. «Busca» es natural en español y suficiente para reflejar la acción divina sin añadir la idea de 'buscar fuera' o 'salir en busca de' que no está explícita.
- source_word: נִרְדָּפִים
  english_pob_choice: the persecuted
  chosen_spanish: a los perseguidos
  alternatives_spanish:
  - a los perseguidos y acosados
  - a los oprimidos
  - a los que son perseguidos
  lexicon: HALOT
  rationale: El participio pasivo de רדף apunta a personas perseguidas; la POB inglesa eligió 'the persecuted'. En español, «los perseguidos» conserva la relación verbal y el matiz de víctimas humanas, y la preposición «a» marca correctamente el complemento directo.
theological_decisions:
- issue: Divergencia entre el hebreo conservado y el paralelo griego
  english_pob_reading: Follow the extant Hebrew as the main text, while preserving the Greek-based alternative in a footnote.
  chosen_spanish_reading: Seguir el hebreo transmitido como texto principal, dejando en nota la lectura griega alternativa.
  alternative_spanish_readings:
  - No incluir la lectura griega
  - Reemplazar el hebreo por la lectura griega
  rationale: 'El expediente muestra una descoordinación real entre el hebreo y el griego: el griego dice «No digas: ‘He pecado, ¿y qué me sucedió?’ porque el Señor es paciente». En coherencia con la política del proyecto para Sirácides, el hebreo se mantiene como base principal cuando está conservado, pero la variante griega merece nota por su peso textual y porque explica la tensión del testimonio.'
  doctrine_reference: 'PHILOSOPHY.md: traducir desde el hebreo cuando se conserva; usar el paralelo griego como dato real y preservar honestamente la incertidumbre.'
translation_notes:
  revision_awareness: El texto inglés revisado cambió «seeks out» por «seeks» y mantuvo «the persecuted». La versión española sigue esa línea con «busca» y «los perseguidos», y además respeta la decisión de mantener el hebreo como texto principal, sin ocultar la divergencia con el griego en nota.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» conforme al estándar del proyecto en español.
  - Se evitó «SEÑOR» como máscara del Tetragrama.
  - «Los perseguidos» conserva el sentido pasivo del participio hebreo y armoniza con la lectura inglesa final.
  - La puntuación y las comillas siguen el uso tipográfico español.
  - La nota a se ancla en «digas» porque la variante griega afecta directamente a la prohibición inicial.
