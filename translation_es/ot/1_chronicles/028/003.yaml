translation:
  language: es
  text: 'Pero Dios me dijo: «No edificarás una casa para mi nombre[b], porque eres un hombre de guerras[a] y has derramado sangre».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «un hombre de guerra». El hebreo es literalmente «un hombre de guerras».
    reason: lexical_alternative
  - marker: b
    text: «Una casa para mi nombre» se refiere al templo como el lugar asociado con el nombre y la presencia de Dios.
    reason: cultural_note
lexical_decisions:
- source_word: וְהָאֱלֹהִים
  english_pob_choice: But God
  chosen_spanish: Pero Dios
  alternatives_spanish:
  - Y Dios
  - Ahora Dios
  lexicon: HALOT
  rationale: אָמַר con וְ al inicio de la cita introduce una observación adversativa en el discurso de David; en español, «Pero Dios» comunica mejor ese contraste natural que un simple «Y Dios». «Dios» preserva el referente al Dios de Israel.
- source_word: אָמַר לִי
  english_pob_choice: said to me
  chosen_spanish: me dijo
  alternatives_spanish:
  - me habló
  - me dijo a mí
  lexicon: HALOT
  rationale: La forma directa «me dijo» conserva el reporte de habla de manera clara y natural en español, sin añadir matices que el hebreo no exige.
- source_word: לֹא תִבְנֶה
  english_pob_choice: You shall not build
  chosen_spanish: No edificarás
  alternatives_spanish:
  - No construirás
  - No has de edificar
  lexicon: HALOT
  rationale: El imperfecto con לֹא en la palabra divina funciona como prohibición/decreto. «No edificarás» mantiene la solemnidad y la relación verbal con el objeto «casa», sin volverlo demasiado coloquial.
- source_word: בַיִת
  english_pob_choice: a house
  chosen_spanish: una casa
  alternatives_spanish:
  - un templo
  - la casa
  lexicon: HALOT
  rationale: «Casa» reproduce con más transparencia el término hebreo בַיִת y conserva el idiomático «casa para mi nombre». «Templo» explicita la referencia, pero interpreta más de lo que el texto dice.
- source_word: לִשְׁמִי
  english_pob_choice: for my name
  chosen_spanish: para mi nombre
  alternatives_spanish:
  - en honor de mi nombre
  - a mi nombre
  lexicon: HALOT
  rationale: La expresión bíblica es formularia y apunta al santuario asociado con el nombre y la presencia de Yahvé. «Para mi nombre» es la correspondencia más directa y deja visible la forma hebrea.
- source_word: אִישׁ מִלְחָמוֹת
  english_pob_choice: a man of wars
  chosen_spanish: un hombre de guerras
  alternatives_spanish:
  - un hombre de guerra
  - un guerrero
  - un hombre de combate
  lexicon: HALOT
  rationale: Se conserva el plural hebreo «guerras» para reflejar con transparencia la expresión מקורית. Aunque «hombre de guerra» suena más natural en español, el plural comunica mejor la literalidad y la idea de actividad bélica repetida.
- source_word: וְדָמִים שָׁפָכְתָּ
  english_pob_choice: and have shed blood
  chosen_spanish: y has derramado sangre
  alternatives_spanish:
  - y has vertido sangre
  - y has derramado sangre de hombres
  lexicon: HALOT
  rationale: El modismo דמים שפך se vierte naturalmente como «derramar sangre» en español. El plural hebreo «sangres» no se reproduce porque el español exige singular idiomático, y el aspecto perfecto queda bien en «has derramado».
theological_decisions:
- issue: Motivo dado para que David no edifique la casa de Yahvé
  english_pob_reading: The text states that David's identity as a man of wars and his shedding of blood are the stated reasons God gave for forbidding him to build a house for God's name.
  chosen_spanish_reading: El texto afirma que ser un hombre de guerras y haber derramado sangre son las razones expresadas por Dios para impedir que David edifique la casa para su nombre.
  alternative_spanish_readings:
  - La sangre derramada indica específicamente violencia culpable.
  - La restricción se debe solo a una impropiedad ritual o cultual.
  rationale: 'La traducción mantiene la tensión del pasaje sin resolverla: no declara si la sangre derramada fue moralmente culpable, solo que eso es lo que Dios presenta como motivo. «Casa para mi nombre» conserva el lenguaje del texto y su carga teológica sin sustituirlo por una glosa interpretativa.'
  doctrine_reference: Preservar la tensión teológica sin resolverla de antemano.
translation_notes:
  revision_awareness: 'Coincide con la lectura de alta concordancia del expediente inglés: no se requieren revisiones sustantivas respecto del sentido base, y se preservan las decisiones clave sobre la prohibición, la metáfora de la casa y la expresión plural «hombre de guerras».'
  spanish_consistency_notes:
  - Se mantuvo «Dios» según el texto fuente y el uso POB para אֱלֹהִים.
  - Se evitó «SEÑOR» porque aquí el hebreo usa אֱלֹהִים, no una sustitución editorial del nombre divino.
  - «Casa para mi nombre» conserva la expresión bíblica sin convertirla en una paráfrasis con «templo».
  - El plural «guerras» se retuvo de forma deliberada para reflejar la literalidad hebrea.
  - «Derramado sangre» sigue el modismo bíblico habitual sin añadir juicio moral explícito.
