translation:
  language: es
  text: Si te han puesto como líder[a], no te engrías; estate entre ellos como uno más. Cuida de ellos[b], y luego recuéstate[c]; prepara lo necesario, y después toma tu lugar.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'El hebreo de apertura está entre corchetes en la edición de Kahana: «Si te han puesto como líder, no te engrías». El contexto inmediato favorece el marco de un banquete, y el paralelo griego de esta sección también apunta a instrucciones de mesa, aunque con redacción bastante distinta.'
    reason: textual_variant
  - marker: b
    text: O «ocúpate de ellos». El verbo hebreo puede enfatizar tanto el cuidado práctico como la solicitud interior.
    reason: lexical_alternative
  - marker: c
    text: «Recuéstate» refleja la postura habitual en comidas formales antiguas.
    reason: cultural_note
lexical_decisions:
- source_word: ראש נבחרת
  english_pob_choice: the leader
  chosen_spanish: cabeza
  alternatives_spanish:
  - líder
  - jefe
  - presidente
  lexicon: HALOT
  rationale: La imagen literal de ‘cabeza’ comunica el cargo de quien preside el grupo, sin imponer una terminología moderna más específica que el hebreo no exige. En este contexto de banquete, ‘cabeza’ mantiene la función de conducción y la sobriedad del pasaje.
- source_word: אל תתרומם
  english_pob_choice: do not exalt yourself
  chosen_spanish: no te engrías
  alternatives_spanish:
  - no te exaltes
  - no te levantes sobre los demás
  - no te vuelvas orgulloso
  lexicon: HALOT
  rationale: El verbo reflexivo expresa autoelevación; en español ‘engreírse’ transmite con naturalidad la actitud de autosuficiencia o presunción que el texto reprende, sin perder la fuerza moral del mandato.
- source_word: היה להם כאחד מהם
  english_pob_choice: be among them like one of them
  chosen_spanish: estate entre ellos como uno más
  alternatives_spanish:
  - sé para ellos como uno de ellos
  - permanece entre ellos como uno de ellos
  - sé uno de ellos
  lexicon: HALOT
  rationale: La formulación busca preservar la solidaridad social y la humildad. ‘Uno más’ comunica bien la idea de no separarse del grupo ni reclamar superioridad, con un español natural.
- source_word: דאג להם
  english_pob_choice: Care for them
  chosen_spanish: Cuida de ellos
  alternatives_spanish:
  - ocúpate de ellos
  - procura por ellos
  - preocúpate por ellos
  lexicon: HALOT
  rationale: El verbo admite atención práctica y solicitud interior. ‘Cuida de ellos’ abarca ambas dimensiones y encaja bien con el contexto doméstico/banquetario.
- source_word: תסב
  english_pob_choice: recline
  chosen_spanish: recuéstate
  alternatives_spanish:
  - siéntate
  - toma asiento
  - reclínate
  lexicon: HALOT
  rationale: El gesto propio de la mesa antigua es el de recostarse/reclinarse. ‘Recuéstate’ conserva mejor esa imagen cultural que una mera ‘sentarse’.
- source_word: הכן מרכם
  english_pob_choice: prepare what is needed
  chosen_spanish: prepara lo necesario
  alternatives_spanish:
  - prepara sus provisiones
  - dispón lo que hace falta
  - arregla lo necesario
  lexicon: HALOT
  rationale: El hebreo es difícil, pero el sentido contextual es la preparación práctica antes de ocupar el lugar propio. ‘Lo necesario’ evita precisar más de lo que el texto permite.
- source_word: תרבץ
  english_pob_choice: take your place
  chosen_spanish: toma tu lugar
  alternatives_spanish:
  - échate
  - acóstate
  - ocupa tu puesto
  lexicon: HALOT
  rationale: Después de ‘recuéstate’, esta cláusula indica asentarse ya en el puesto correspondiente. ‘Toma tu lugar’ comunica el cierre del movimiento de manera clara y digna en español.
translation_notes:
  revision_awareness: El pasaje presenta una divergencia notable entre el hebreo conservado por Kahana y el paralelo griego de Swete; esta versión sigue el hebreo para la traducción principal, manteniendo el marco de banquete que el propio contexto y la tradición paralela respaldan. No se introdujeron cambios revisionales respecto del audit trail inglés, salvo su adaptación idiomática al español.
  spanish_consistency_notes:
  - Se usó ‘Yahvé’ como norma del proyecto solo cuando aparezca el nombre divino; aquí no aplica.
  - Se preservó el tono sapiencial y exhortativo sin añadir explicaciones interpretativas que el texto no exige.
  - ‘Recuéstate’ y ‘toma tu lugar’ distinguen dos acciones consecutivas para conservar la secuencia del hebreo.
  - No se sustituyó la imagen social de ‘cabeza’ por un título eclesiástico posterior.
