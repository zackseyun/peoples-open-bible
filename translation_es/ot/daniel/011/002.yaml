review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien el sentido general del hebreo y la línea del English POB: introducción discursiva, anuncio verdadero, tres reyes más en Persia, un cuarto más rico, y una movilización contra Grecia. Sin embargo, dos elecciones no preservan de la mejor manera la fuerza fuente/POB: ''todavía hay tres reyes que se levantarán'' introduce un ''hay'' innecesario y menos directo que el hebreo; y ''despertará a todos'' suena menos natural y menos preciso que ''incitará/agitará/movilizará a todos'' para יָעִיר en contexto político-militar.'
  spanish_quality_summary: El español es mayormente claro y digno, pero tiene cierta rigidez y una leve falta de naturalidad en dos puntos clave. 'Todavía hay tres reyes que se levantarán' es más pesado que 'todavía se levantarán otros tres reyes' u 'otros tres reyes se levantarán'. 'Despertará a todos contra el reino de Grecia' resulta poco idiomático en español bíblico moderno para una acción militar-política; 'incitará a todos' o 'agitará a todos' lee mejor. También conviene alinear mejor las notas con las alternativas reales del POB inglés.
  glossary_alignment: 'No hay conflictos con la terminología teológica base del proyecto. No aparecen Yahvé/Mesías/etc. La traducción de יָוָן como ''Grecia'' y מַלְכוּת como ''reino'' está bien. La principal cuestión es léxico-contextual: עור debe reflejar mejor ''stir up/rouse'' en contexto histórico-político.'
  issues:
  - severity: medium
    issue: La frase 'todavía hay tres reyes que se levantarán en Persia' añade 'hay' y diluye la secuencia profética.
    rationale: El hebreo עוֹד שְׁלֹשָׁה מְלָכִים עֹמְדִים expresa más directamente 'todavía/además se levantarán tres reyes' u 'otros tres reyes se levantarán'. La formulación actual es comprensible, pero menos ceñida y menos natural.
  - severity: medium
    issue: '''Despertará a todos'' no comunica con naturalidad el valor político-militar de יָעִיר.'
    rationale: Aunque עור puede significar 'despertar', en este contexto de movilización contra Grecia el español idiomático pide 'incitará', 'agitará' o 'movilizará'. Esto preserva mejor la decisión léxica del POB ('stir up/rouse') y evita una lectura demasiado literal.
  - severity: low
    issue: La nota [a] no refleja bien la alternativa inglesa ni suena natural en español.
    rationale: '''Todavía, tres reyes adicionales se levantarán para Persia'' suena forzado. Debe ofrecer una alternativa española natural y, si se conserva, reflejar la opción ''para Persia'' como alternativa contextual, no como forma principal.'
  - severity: low
    issue: La nota [c] mezcla dos alternativas con barra y una de ellas es poco idiomática.
    rationale: Conviene formular una alternativa limpia y natural, por ejemplo 'agitará a todos contra el reino de Grecia' o 'pondrá en movimiento a todos...'.
  revised_spanish_text: 'Y ahora te diré la verdad: he aquí[a], todavía se levantarán otros tres reyes en Persia, y el cuarto se hará mucho más rico que todos; y cuando se haga fuerte por medio de sus riquezas[b], incitará a todos contra el reino de Grecia[c].'
  revised_footnotes:
