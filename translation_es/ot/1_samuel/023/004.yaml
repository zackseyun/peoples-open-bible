translation:
  language: es
  text: 'David volvió a consultar a Yahvé, y Yahvé le respondió y dijo: «Levántate, baja a Queila, porque yo estoy entregando[a] a los filisteos en tu mano[b]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «te entregaré» o «daré». El participio hebreo puede expresar una acción futura inminente o segura.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «en tu poder». La expresión hebrea «en tu mano» es un modismo para entregar a alguien al dominio de otro.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיּוֹסֶף עוֹד
  english_pob_choice: again
  chosen_spanish: volvió a
  alternatives_spanish:
  - de nuevo
  - otra vez
  lexicon: HALOT
  rationale: El hebreo expresa repetición de la acción; en español, «volvió a» comunica de forma natural que David repitió la consulta, sin añadir paráfrasis.
- source_word: לִשְׁאֹל בַּיהוָה
  english_pob_choice: inquired of Yahweh
  chosen_spanish: consultar a Yahvé
  alternatives_spanish:
  - preguntar a Yahvé
  - inquirir de Yahvé
  lexicon: HALOT
  rationale: El verbo שׁאל con בַּיהוה indica buscar respuesta o guía de Dios. «Consultar a Yahvé» mantiene el sentido formal de buscar dirección divina y suena natural en español bíblico actual.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  - Jehová
  lexicon: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
  rationale: Se conserva el nombre propio del pacto como «Yahvé», conforme al criterio del proyecto, en lugar de reemplazarlo por un título.
- source_word: וַיַּעֲנֵהוּ
  english_pob_choice: answered him
  chosen_spanish: le respondió
  alternatives_spanish:
  - respondió a él
  - lo respondió
  lexicon: HALOT
  rationale: ענה aquí introduce la respuesta divina a una consulta; «le respondió» es idiomático y preserva el valor directo del verbo.
- source_word: קוּם
  english_pob_choice: Arise
  chosen_spanish: Levántate
  alternatives_spanish:
  - Arise
  - Ponte de pie
  lexicon: HALOT
  rationale: El imperativo exige acción inmediata. En español, «Levántate» transmite esa urgencia de modo natural y respeta la fuerza del mandato.
- source_word: רֵד
  english_pob_choice: go down
  chosen_spanish: baja
  alternatives_spanish:
  - desciende
  - ve hacia abajo
  lexicon: HALOT
  rationale: ירד conserva una dirección literal; «baja» es la equivalente más natural en español y mantiene la imagen espacial del texto.
- source_word: קְעִילָה
  english_pob_choice: Keilah
  chosen_spanish: Keilá
  alternatives_spanish:
  - Queila
  - Keilah
  lexicon: transliteration
  rationale: Se translitera el topónimo de forma coherente con el español bíblico, con acento para reflejar la pronunciación llana final.
- source_word: כִּי אֲנִי נֹתֵן
  english_pob_choice: for I am giving
  chosen_spanish: porque yo estoy entregando
  alternatives_spanish:
  - porque yo daré
  - pues yo doy
  lexicon: HALOT
  rationale: El participio נֹתֵן puede expresar acción inminente o segura. «Estoy entregando» conserva el aspecto progresivo/cercano que la POB documentó en inglés.
- source_word: פְּלִשְׁתִּים
  english_pob_choice: the Philistines
  chosen_spanish: los filisteos
  alternatives_spanish:
  - los Filisteos
  lexicon: HALOT
  rationale: Etnónimo estándar en español bíblico; se usa minúscula por ser nombre de pueblo.
- source_word: בְּיָדֶךָ
  english_pob_choice: into your hand
  chosen_spanish: en tu mano
  alternatives_spanish:
  - en tu poder
  - en tus manos
  lexicon: HALOT
  rationale: Se conserva la metáfora concreta del hebreo. «En tu mano» refleja el idioma bíblico de entrega y control, sin perder inteligibilidad en español.
theological_decisions:
- issue: Nombre divino YHWH
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: El texto hebreo usa el Tetragrámaton directamente, y el proyecto lo vierte como «Yahweh» en inglés; en español se normaliza a «Yahvé» por ser la transliteración establecida en el registro bíblico del proyecto.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Aspecto de נֹתֵן
  english_pob_reading: I am giving
  chosen_spanish_reading: estoy entregando
  alternative_spanish_readings:
  - voy a entregar
  - entregaré
  rationale: Se mantiene la tensión entre presente progresivo e inminencia futura. El participio hebreo señala una acción segura ya encaminada, y «estoy entregando» conserva mejor esa textura que un futuro simple.
  doctrine_reference: 'Gramática hebrea: participio con valor de acción inminente/certidumbre'
translation_notes:
  revision_awareness: La POB inglesa fue revisada de «Rise» a «Arise» por registro; en español se optó por «Levántate», que conserva la urgencia imperativa sin introducir arcaísmo innecesario. También se preservó la nota sobre el participio נֹתֵן como acción inminente o segura.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como forma estándar del nombre divino, coherente con el proyecto.
  - Se conserva la metáfora hebrea de «en tu mano» y se aclara en nota su valor idiomático.
  - «Keilá» sigue la transliteración española con acento para lectura natural.
  - El tono es bíblico pero moderno, evitando calcos innecesarios y sin suavizar la fuerza del mandato.
