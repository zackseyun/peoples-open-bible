  yaml_path: translation/nt/1_peter/002/023.yaml
  text: 'who, when he was insulted, did not insult in return; when he suffered, he did not threaten, but kept entrusting himself to the one who judges justly.'
translation:
  language: ko
  text: '그분은 욕을 당하시되 도리어 욕하지 아니하시고, 고난당하시되 위협하지 아니하시며, 다만 의롭게 심판하시는 분께 자신을 맡기셨습니다.'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: λοιδορούμενος ... οὐκ ἀντελοιδόρει
  english_pob_choice: when he was insulted ... did not insult in return
  chosen_korean: 욕을 당하시되 도리어 욕하지 아니하시고
  alternatives_korean:
  - 모욕당하시되 보복하여 모욕하지 아니하시고
  lexicon: BDAG
  rationale: λοιδορέω의 「모욕적 욕설」을 「욕」으로, ἀντι- 접두사의 「되갚음」을 「도리어」로 옮긴다.
- source_word: πάσχων οὐκ ἠπείλει
  english_pob_choice: when he suffered, he did not threaten
  chosen_korean: 고난당하시되 위협하지 아니하시며
  alternatives_korean:
  - 고통당하시되 협박하지 아니하시며
  lexicon: BDAG
  rationale: ἀπειλέω의 「위협·협박」을 「위협」으로 옮긴다.
- source_word: παρεδίδου δὲ τῷ κρίνοντι δικαίως
  english_pob_choice: kept entrusting himself to the one who judges justly
  chosen_korean: 의롭게 심판하시는 분께 자신을 맡기셨습니다
  alternatives_korean:
  - 공의로 재판하시는 분께 자신을 의탁하셨습니다
  lexicon: BDAG
  rationale: 미완료 παρεδίδου의 진행성을 살려 「맡기셨다」로 옮긴다. 「의롭게」는 δικαίως의 부사적 의미.
