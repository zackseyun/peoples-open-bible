base_translation:
  language: en
  yaml_path: translation/ot/daniel/002/024.yaml
  text: 'Therefore Daniel went in to Arioch[a], whom the king had appointed to destroy the wise men of Babylon. He went and said this to him: “Do not destroy the wise men of Babylon. Bring me in before the king[b], and I will show the interpretation to the king.”'
  footnotes:
  - marker: a
    text: Or 'Do not kill the wise men of Babylon.' The Aramaic verb can denote causing to perish or destroying; here it refers to the execution order against them.
    reason: lexical_alternative
  - marker: b
    text: Or 'I will make known the interpretation to the king.'
    reason: lexical_alternative
