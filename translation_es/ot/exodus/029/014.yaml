base_translation:
  language: en
  yaml_path: translation/ot/exodus/029/014.yaml
  text: But the flesh of the bull[a], and its hide, and its dung, you shall burn with fire outside the camp; it is a sin offering.
  footnotes:
  - marker: a
    text: Or 'purification offering.' The Hebrew חַטָּאת can denote either 'sin' or the sacrifice offered in relation to sin; in sacrificial contexts like this, many translate 'sin offering,' while some prefer 'purification offering' to highlight the rite's cleansing function.
    reason: lexical_alternative
