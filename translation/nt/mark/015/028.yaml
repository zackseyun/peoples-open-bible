id: MRK.15.28
reference: Mark 15:28
source:
  edition: robinson-pierpont-2005-byzantine
  text: Καὶ ἐπληρώθη ἡ γραφὴ ἡ λέγουσα, Καὶ μετὰ ἀνόμων ἐλογίσθη.
  language: Greek
translation:
  text: And[a] the scripture was fulfilled that says, "And he was numbered with the
    transgressors."
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: This verse is absent from the earliest Greek manuscripts (including 4th-century
      Sinaiticus and Vaticanus) and early Coptic translations, but is preserved in
      the Byzantine majority tradition and the Latin tradition. It was likely added
      by later scribes as a harmonization to Luke 22:37, which quotes Isaiah 53:12.
    reason: textual_critical
lexical_decisions:
- source_word: πληρόω
  chosen: was fulfilled
  alternatives:
  - was completed
  - came to pass
  lexicon: BDAG
  rationale: In the context of prophetic scripture, 'fulfilled' is the standard and
    most accurate rendering of the passive form of πληρόω, indicating the realization
    of a divine declaration.
- source_word: ἄνομος
  chosen: transgressors
  alternatives:
  - lawless ones
  - criminals
  lexicon: BDAG
  rationale: While literally 'lawless ones', 'transgressors' captures the theological
    weight of the Isaiah 53:12 quotation and aligns with traditional English renderings
    of this specific prophetic fulfillment.
- source_word: λογίζομαι
  chosen: numbered
  alternatives:
  - reckoned
  - counted
  - considered
  lexicon: BDAG
  rationale: '''Numbered'' or ''counted'' accurately reflects the passive sense of
    being grouped, classified, or evaluated alongside others in a specific category.'
