translation:
  language: es
  text: Allí te proveeré[a], pues aún quedan cinco años de hambre, para que no queden en la miseria tú, tu casa y todo lo que te pertenece.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'te sustentaré', 'te sostendré' o quizá 'te mantendré'. El verbo hebreo puede expresar sustento material continuo y, en este contexto, provisión y cuidado frente a la hambruna.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְכִלְכַּלְתִּי
  english_pob_choice: I will provide for you
  chosen_spanish: yo te sustentaré
  alternatives_spanish:
  - yo te proveeré
  - yo te alimentaré
  - yo te sostendré
  lexicon: HALOT
  rationale: כִּלְכֵּל en piel expresa sostener/materialmente proveer. En español, 'sustentar' conserva la idea de mantener con recursos sin reducirlo solo a comida; 'proveer' también sería posible, pero 'sustentar' refleja mejor el matiz de apoyo continuo en contexto de hambre.
- source_word: שָׁם
  english_pob_choice: There
  chosen_spanish: Allí
  alternatives_spanish:
  - ahí
  - allá
  lexicon: HALOT
  rationale: El adverbio locativo señala el lugar adonde Jacob irá. 'Allí' mantiene la prioridad del lugar en español y suena natural al inicio de la oración.
- source_word: כִּי
  english_pob_choice: for
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  lexicon: HALOT
  rationale: La cláusula introduce la razón de la provisión de José. 'Porque' expresa con claridad la causa y evita una ambigüedad de registro mayor que 'for' en inglés.
- source_word: עוֹד חָמֵשׁ שָׁנִים רָעָב
  english_pob_choice: there are still five years of famine
  chosen_spanish: aún quedan cinco años de hambre
  alternatives_spanish:
  - todavía quedan cinco años de hambre
  - el hambre durará todavía cinco años
  lexicon: HALOT
  rationale: '''חָמֵשׁ שָׁנִים רָעָב'' comunica duración restante. ''Aún quedan'' sigue de cerca el valor de עוֹד (''todavía/aún'') y conserva la construcción temporal sin forzar un futuro explícito.'
- source_word: פֶּן
  english_pob_choice: lest
  chosen_spanish: para que no
  alternatives_spanish:
  - no sea que
  - a fin de que no
  lexicon: HALOT
  rationale: פֶּן introduce una prevención o posible consecuencia negativa. En español moderno, 'para que no' comunica con naturalidad esa finalidad preventiva; 'no sea que' es posible pero más marcado estilísticamente.
- source_word: תִּוָּרֵשׁ
  english_pob_choice: become destitute
  chosen_spanish: caigas en la pobreza
  alternatives_spanish:
  - quedes arruinado
  - seas desposeído
  - caigas en la miseria
  lexicon: HALOT
  rationale: El nifal de ירשׁ aquí puede abarcar ruina, empobrecimiento o desposesión. En este contexto de hambre, 'caigas en la pobreza' preserva la fuerza de deterioro económico sin afirmar innecesariamente una pérdida legal de propiedad.
- source_word: אַתָּה וּבֵיתְךָ
  english_pob_choice: you and your household
  chosen_spanish: tú, tu casa
  alternatives_spanish:
  - tú y tu familia
  - tú y tu casa
  lexicon: HALOT
  rationale: '''בֵיתְךָ'' puede ser ''casa'' en sentido de unidad doméstica. ''Tu casa'' mantiene la correspondencia léxica; el inciso con comas ayuda a que la enumeración fluya en español.'
- source_word: וְכָל אֲשֶׁר לָךְ
  english_pob_choice: and all that belongs to you
  chosen_spanish: y todo lo que tienes
  alternatives_spanish:
  - y todo lo que es tuyo
  - y todas tus posesiones
  lexicon: HALOT
  rationale: La frase abarca tanto bienes como todo lo que pertenece a la persona. 'Todo lo que tienes' es amplio y natural; en español puede sonar un poco menos jurídico que 'pertenece a ti', pero conserva el alcance total del hebreo.
theological_decisions:
- issue: 'Alcance de פֶּן + תִּוָּרֵשׁ: pobreza, ruina o desposesión'
  english_pob_reading: lest you and your household and all that belongs to you become destitute
  chosen_spanish_reading: para que no caigas en la pobreza, tú, tu casa y todo lo que tienes
  alternative_spanish_readings:
  - no sea que te empobrezcas, tú, tu casa y todo lo que tienes
  - para que no quedes arruinado, tú, tu casa y todo lo que tienes
  - para que no seas desposeído, tú, tu casa y todo lo que tienes
  rationale: El hebreo puede abarcar empobrecimiento, ruina o incluso desposesión. La lectura española elegida sigue la interpretación principal del POB inglés ('become destitute') y deja implícita la gravedad económica sin cerrar indebidamente el matiz legal de desposesión.
  doctrine_reference: Ninguna; decisión léxico-semántica del hebreo verbal en contexto de hambruna.
translation_notes:
  revision_awareness: 'El inglés auditado fue afinado de ''because'' a ''for'' por registro. En español se optó por ''porque'' para mantener claridad causal; la estructura preventiva del final sigue el valor de ''lest'' y la revisión inglesa no altera el sentido base. La traducción conserva la línea interpretativa establecida por el POB: provisión material en contexto de hambre, con el matiz de posible ruina económica en תִּוָּרֵשׁ.'
  spanish_consistency_notes:
  - Se mantuvo 'Yahvé' no aplicable aquí, y 'Mesías/Cristo' no aparece en el versículo.
  - '''hambre'' se usó para רָעָב, siguiendo el sustantivo abstracto de calamidad; no se restringió a escasez de alimentos.'
  - '''tu casa'' reproduce בית en sentido doméstico/colectivo, coherente con el valor de ''household'' del POB inglés.'
  - Se evitó 'SEÑOR' o fórmulas tradicionales no presentes en el texto fuente.
  - La nota [a] queda anclada en 'sustentaré' para transparentar las alternativas del verbo hebreo.
