translation:
  language: es
  text: Porque soy más insensato[a] que nadie, y no tengo entendimiento humano.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «más bruto que un hombre», o «demasiado estúpido para ser hombre, y no tengo el entendimiento de un hombre».
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  - Porque, en efecto
  lexicon: HALOT
  rationale: Introduce la explicación del hablante para lo dicho antes. «Porque» conserva el valor explicativo-causal de כִּי en un español natural y digno.
- source_word: בַעַר
  english_pob_choice: more brutish
  chosen_spanish: más bruto
  alternatives_spanish:
  - más bestial
  - más estúpido
  - más insensato
  lexicon: HALOT
  rationale: El término hebreo expresa rudeza o torpeza de tipo casi animal. «Más bruto» comunica bien esa fuerza despectiva en español sin suavizarla demasiado.
- source_word: מֵאִישׁ
  english_pob_choice: than anyone
  chosen_spanish: que nadie
  alternatives_spanish:
  - que un hombre
  - que cualquier hombre
  - que una persona
  lexicon: HALOT
  rationale: La comparación hebrea con מִן más אִישׁ funciona aquí de modo intensivo y no exige una lectura estrictamente literal «que un hombre». «Que nadie» refleja mejor en español el sentido comparativo extremo que la revisión inglesa destacó.
- source_word: בִינַת אָדָם
  english_pob_choice: human understanding
  chosen_spanish: entendimiento humano
  alternatives_spanish:
  - entendimiento de hombre
  - discernimiento humano
  - insight humano
  lexicon: HALOT
  rationale: בִינָה se refiere a entendimiento/discernimiento. «Entendimiento humano» conserva el alcance genérico de אָדָם y suena natural en español bíblico contemporáneo.
- source_word: לִי
  english_pob_choice: I do not have
  chosen_spanish: no tengo
  alternatives_spanish:
  - no me pertenece
  - carezco de
  - no poseo
  lexicon: HALOT
  rationale: El dativo posesivo se vierte con naturalidad como posesión en español. «No tengo» preserva el sentido sin introducir una formulación artificial.
theological_decisions:
- issue: Valor genérico de אָדָם
  english_pob_reading: human understanding
  chosen_spanish_reading: entendimiento humano
  alternative_spanish_readings:
  - entendimiento de un hombre
  - entendimiento del hombre
  rationale: En este contexto אָדָם es antropológico y genérico, no marcadamente masculino. «Humano» mantiene esa amplitud y evita restringir el sentido a varón adulto.
  doctrine_reference: 'DOCTRINE.md §Translation philosophy 4; Contested terms: אָדָם'
translation_notes:
  revision_awareness: La redacción inglesa revisó «than a man» a «than anyone» para reflejar mejor el valor comparativo de מֵאִישׁ. La propuesta española sigue esa revisión con «que nadie», manteniendo también la fuerza depreciativa de בַעַר y el paralelismo con «entendimiento humano».
  spanish_consistency_notes:
  - Se mantuvo «humano» para אָדָם por consistencia con el criterio de género-precisión y porque el contexto es genérico.
  - «Más bruto» conserva la aspereza del hebreo sin convertirla en una paráfrasis excesiva.
  - La nota alternativa acompaña la tensión lexical entre una comparación literal y una idiomática en español.
