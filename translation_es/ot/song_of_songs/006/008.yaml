translation:
  language: es
  text: Hay sesenta reinas y ochenta concubinas, y mujeres jóvenes[a] sin número.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'doncellas'; posiblemente 'vírgenes'. El hebreo עֲלָמוֹת designa en general mujeres jóvenes y no exige por sí mismo el sentido más específico de 'vírgenes'.
