base_translation:
  language: en
  yaml_path: translation/deuterocanon/psalms_of_solomon/002/024.yaml
  text: And I saw[a], and I entreated the face of the Lord and said, “Enough, Lord[d][c][b], of your hand weighing heavily on Israel by the attack of the nations.”
  footnotes:
  - marker: a
    text: Or 'Be satisfied, Lord,' or 'Let it suffice, Lord.' The Greek imperative Ἱκάνωσον can be read more literally than the concise rendering 'Enough.'
    reason: lexical_alternative
  - marker: b
    text: Literally 'of your hands being heavy upon Israel,' preserving a common biblical image of divine pressure or judgment.
    reason: cultural_note
  - marker: c
    text: Or 'through the invasion of nations.' The noun ἐπαγωγή can suggest either the bringing-on of nations or their assault.
    reason: alternative_reading
  - marker: d
    text: Or 'I implored before the Lord'.
    reason: previous_rendering
