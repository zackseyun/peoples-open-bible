  - severity: low
    issue: «Palanganas» puede sonar demasiado doméstico
    rationale: No es incorrecto, pero en un inventario de utensilios del templo algunos lectores podrían preferir «vasijas» o «cuencos». No obstante, puede conservarse por cercanía al inglés «basins» y claridad concreta.
  revised_spanish_text: 'Y este era su número: 30 palanganas de oro, 1.000 palanganas de plata y 29 cuchillos[a].'
