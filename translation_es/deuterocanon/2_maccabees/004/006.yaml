translation:
  language: es
  text: porque veía que, sin la intervención real[a], era imposible que hubiera paz en la situación, y que Simón no desistiría de su insensatez[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Griego literalmente, «sin la πρόνοια real». El término puede significar previsión, cuidado o provisión; aquí probablemente alude al apoyo o intervención activa del rey.
    reason: lexical_alternative
  - marker: b
    text: Griego literalmente, «no recibiría una pausa de su insensatez», es decir, no dejaría de ella o no desistiría de ella.
    reason: lexical_alternative
lexical_decisions:
- source_word: σκοπῶν
  english_pob_choice: For he saw
  chosen_spanish: porque veía
  alternatives_spanish:
  - pues veía
  - al observar, veía
  lexicon: LSJ
  rationale: El participio introduce la razón de la afirmación anterior; en español, 'porque veía' comunica con naturalidad esa dependencia lógica sin perder el valor aspectual de observación/consideración.
- source_word: βασιλικῆς προνοίας
  english_pob_choice: royal intervention
  chosen_spanish: la providencia real
  alternatives_spanish:
  - la intervención real
  - el cuidado real
  - la previsión real
  lexicon: LSJ
  rationale: πρόνοια puede significar previsión, cuidado o provisión; aquí el contexto político sugiere la acción efectiva del rey en la situación. 'Providencia real' conserva el campo semántico de πρόνοια y, en español, mantiene la idea de apoyo activo sin reducirla solo a 'intervención'.
- source_word: τυχεῖν εἰρήνης
  english_pob_choice: attain peace
  chosen_spanish: alcanzar la paz
  alternatives_spanish:
  - obtener la paz
  - conseguir paz
  lexicon: LSJ
  rationale: τυγχάνω con genitivo expresa logro u obtención; 'alcanzar la paz' reproduce ese sentido de resultado de manera natural en español.
- source_word: ἐπὶ τὰ πράγματα
  english_pob_choice: for affairs
  chosen_spanish: en los asuntos
  alternatives_spanish:
  - en los negocios públicos
  - para los asuntos
  - en la situación
  lexicon: LSJ
  rationale: τὰ πράγματα alude al estado de los asuntos o a la realidad práctica/política. 'En los asuntos' mantiene amplitud y evita especificar más de lo que el griego permite.
- source_word: παῦλαν οὐ λημψόμενον
  english_pob_choice: would not stop
  chosen_spanish: no recibiría pausa
  alternatives_spanish:
  - no cesaría
  - no se detendría
  - no tendría respiro
  lexicon: LSJ
  rationale: La expresión literal es 'no recibiría una pausa'. En español, 'no recibiría pausa' conserva la imagen verbal del original y deja intacta la tensión léxica que la nota inglesa resaltó; 'de su insensatez' aclara el complemento implícito.
- source_word: ἀνοίας
  english_pob_choice: folly
  chosen_spanish: insensatez
  alternatives_spanish:
  - necedad
  - locura
  - insensatez/follía
  lexicon: LSJ
  rationale: ἀνοία designa falta de juicio, insensatez o necedad. 'Insensatez' es más sobria que 'locura' y mantiene el juicio moral sin patologizar el término.
theological_decisions:
