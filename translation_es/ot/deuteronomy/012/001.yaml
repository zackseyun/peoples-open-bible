review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador conserva bien la estructura general del versículo, mantiene correctamente «Yahvé» y refleja la distinción contextual entre «en la tierra» y «sobre la tierra». Sin embargo, no preserva con suficiente fidelidad la distinción léxica documentada entre חֻקִּים y מִשְׁפָּטִים: «las leyes y los decretos» desplaza el campo semántico de «statutes/judgments» y la nota alternativa invierte indebidamente cuál expresión sería más cercana al hebreo. También «cuidarán de poner por obra» es aceptable, pero «tendrán cuidado de cumplir» refleja mejor el valor de שׁמר + infinitivo en español bíblico natural.'
  spanish_quality_summary: El español es claro y legible, con tono digno y natural. «Estas son…» funciona bien, y la cláusula final «todos los días que ustedes vivan sobre la tierra» suena idiomática. Aun así, «leyes y decretos» resulta menos preciso que «estatutos y juicios», y la nota a debe corregirse para no presentar como alternativa lo que en realidad es la opción principal más fiel.
  glossary_alignment: 'Alineación parcial. «Yahvé», «Dios», y la distinción «en la tierra / sobre la tierra» están bien. La principal desviación es terminológica: el proyecto y la auditoría inglesa favorecen mantener una diferencia formal entre חֻקִּים y מִשְׁפָּטִים; en español «estatutos y juicios» preserva mejor esa tensión léxica que «leyes y decretos».'
  issues:
  - severity: high
    issue: Terminología legal insuficientemente fiel en «las leyes y los decretos»
    rationale: El hebreo distingue חֻקִּים y מִשְׁפָּטִים, y la auditoría inglesa escogió deliberadamente «statutes» y «judgments». «Leyes» generaliza demasiado el primero, y «decretos» no reproduce bien el matiz judicial del segundo.
  - severity: medium
    issue: Nota a mal orientada respecto de la opción principal
    rationale: La nota actual ofrece «los estatutos y las ordenanzas» como alternativa a «las leyes y los decretos», pero la primera opción es más cercana al hebreo y al razonamiento del POB. La nota debe reflejar una alternativa real, no invertir la prioridad léxica.
  - severity: low
    issue: «Cuidarán de poner por obra» puede afinarse
    rationale: La frase es comprensible, pero «tendrán cuidado de cumplir» o similar expresa con más claridad la combinación de observancia cuidadosa y obediencia práctica de שׁמר + infinitivo.
  revised_spanish_text: Estos son los estatutos y los juicios[a] que ustedes tendrán cuidado de cumplir en la tierra que Yahvé, el Dios de sus padres, les ha dado para que la posean[b], todos los días que ustedes vivan sobre la tierra[c].
  revised_footnotes:
