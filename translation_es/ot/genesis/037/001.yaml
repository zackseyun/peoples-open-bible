translation:
  language: es
  text: Ahora Jacob habitó en la tierra donde su padre había vivido como forastero[a], en la tierra de Canaán.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más formalmente: «Y Jacob se estableció en la tierra de los sojornos de su padre, en la tierra de Canaán».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֵּשֶׁב
  english_pob_choice: Now Jacob lived
  chosen_spanish: Ahora Jacob habitó
  alternatives_spanish:
  - Y Jacob se estableció
  - Entonces Jacob habitó
  lexicon: HALOT
  rationale: El verbo ישׁב en narrativa puede expresar residir, habitar o asentarse. «Habitó» conserva el sentido amplio de residencia sin introducir una permanencia más fuerte que la del hebreo. «Ahora» reproduce la transición discursiva del waw consecutivo en español natural.
- source_word: בְּאֶרֶץ
  english_pob_choice: in the land
  chosen_spanish: en la tierra
  alternatives_spanish:
  - en el país
  - en la región
  lexicon: HALOT
  rationale: En contextos geográficos bíblicos, אֶרֶץ suele referirse a una tierra/territorio. «Tierra» preserva mejor el registro bíblico y la referencia territorial que «país» o «región».
- source_word: מְגוּרֵי
  english_pob_choice: of his father's sojournings
  chosen_spanish: de las moradas
  alternatives_spanish:
  - de los peregrinajes
  - de las estancias temporales
  lexicon: HALOT
  rationale: מְגוּרֵי procede de גור y alude al vivir como forastero o residente temporal. En español, una construcción literal como «sojornes» sería poco natural; «moradas» comunica la idea de residencia sin perder el matiz de estancia no originaria.
- source_word: אָבִיו
  english_pob_choice: his father
  chosen_spanish: de su padre
  alternatives_spanish:
  - de su padre Isaac
  lexicon: HALOT
  rationale: El posesivo «su padre» refleja directamente el constructo pronominal. El referente es Isaac, pero aquí no es necesario añadir el nombre en el texto principal.
- source_word: בְּאֶרֶץ כְּנָעַן
  english_pob_choice: in the land of Canaan
  chosen_spanish: en la tierra de Canaán
  alternatives_spanish:
  - en Canaán
  lexicon: HALOT
  rationale: Se conserva la repetición de «en la tierra» porque el hebreo repite בְּאֶרֶץ y luego especifica el territorio. Esto mantiene el ritmo y la precisión geográfica del original.
translation_notes:
  revision_awareness: El texto español sigue de cerca el hebreo masorético de Génesis 37:1 y toma como guía la revisión inglesa que volvió más literal la frase מְגוּרֵי אָבִיו. Se evitó una paráfrasis del tipo «donde su padre había habitado» para conservar la forma constructa y el matiz de residencia como forastero. No se detectan variantes textuales relevantes en este versículo.
  spanish_consistency_notes:
  - Se usa «Jacob» para יעקב y «Canaán» para כנען conforme a la nomenclatura bíblica habitual en español.
  - Se conserva «tierra» de manera consistente con el valor territorial de אֶרֶץ en el marco narrativo del Génesis.
  - El anclaje de nota al pie en «moradas» señala la alternativa más literal sin sobrecargar el cuerpo principal del texto.
