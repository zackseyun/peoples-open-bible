translation:
  language: es
  text: Faraón los verá y se consolará[a] por toda su multitud, Faraón y todo su ejército, los caídos a espada, declara el Señor Yahvé.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: También puede entenderse como 'se consolará' / 'tomará consuelo'. El verbo hebreo puede significar además 'lamentarse' o 'arrepentirse' en otros contextos, pero aquí probablemente indica que Faraón halla una consolación sombría al ver que otros comparten su misma caída.
    reason: lexical_alternative
lexical_decisions:
- source_word: אוֹתָם
  english_pob_choice: them
  chosen_spanish: los
  alternatives_spanish:
  - a ellos
  - los mismos
  lexicon: HALOT
  rationale: Pronombre de objeto directo plural que retoma a los reyes/naciones del contexto inmediato; en español basta el clítico directo 'los'.
- source_word: יִרְאֶה
  english_pob_choice: will see
  chosen_spanish: verá
  alternatives_spanish:
  - mirará
  - verá entonces
  lexicon: HALOT
  rationale: El imperfecto hebreo tiene valor futuro en este discurso profético; 'verá' es natural y fiel.
- source_word: וְנִחַם
  english_pob_choice: and be comforted
  chosen_spanish: y se consolará
  alternatives_spanish:
  - y se consolará con
  - y tomará consuelo
  - y se arrepentirá
  lexicon: HALOT
  rationale: נחם puede significar consolarse/recibir consuelo en este contexto. 'Se consolará' conserva la ironía sombría del pasaje sin forzar el sentido a 'arrepentirse'.
- source_word: עַל כָּל המונ/ה
  english_pob_choice: over all his multitude
  chosen_spanish: por toda su multitud
  alternatives_spanish:
  - sobre toda su multitud
  - a causa de toda su multitud
  - respecto de toda su multitud
  lexicon: HALOT
  rationale: El hebreo עַל con נחם expresa el motivo o la ocasión del consuelo. 'Por' comunica bien esa relación causal/ocasionada en español, manteniendo la fuerza del texto.
- source_word: חַלְלֵי חֶרֶב
  english_pob_choice: slain by the sword
  chosen_spanish: los caídos a espada
  alternatives_spanish:
  - los muertos a espada
  - los heridos por la espada
  - los atravesados por la espada
  lexicon: HALOT
  rationale: La locución hebrea es un idiomismo militar de muerte violenta. 'Caídos a espada' es conciso y fiel en español bíblico contemporáneo.
- source_word: פַּרְעֹה וְכָל חֵילוֹ
  english_pob_choice: Pharaoh and all his army
  chosen_spanish: Faraón y todo su ejército
  alternatives_spanish:
  - Faraón y todo su host
  - Faraón y todas sus fuerzas
  - Faraón y toda su hueste
  lexicon: HALOT
  rationale: חֵילוֹ aquí es fuerza militar; 'ejército' es la equivalencia española más clara y natural.
- source_word: נְאֻם אֲדֹנָי יְהוִה
  english_pob_choice: declares the Lord GOD
  chosen_spanish: declara el Señor Yahvé
  alternatives_spanish:
  - oráculo del Señor Yahvé
  - declara el Señor Dios
  - declara el Señor Yavé
  lexicon: HALOT
  rationale: Se conserva el fórmula profética con 'declara'. Para אֲדֹנָי יְהוִה, la pauta del proyecto pide 'Yahvé' para el Tetragrama; 'Señor Yahvé' preserva la secuencia reverencial del hebreo sin ocultar el nombre divino.
theological_decisions:
- issue: Tratamiento del nombre divino en la fórmula profética אֲדֹנָי יְהוִה
  english_pob_reading: the Lord GOD
  chosen_spanish_reading: el Señor Yahvé
  alternative_spanish_readings:
  - el Señor Dios
  - Señor Yahvé
  - el Señor Yavé
  rationale: La pauta del proyecto exige traducir יְהוָה como 'Yahvé' y no enmascararlo como 'SEÑOR'. La combinación con אֲדֹנָי se refleja mejor en español como 'el Señor Yahvé', manteniendo a la vez el tono formal de la fórmula profética.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
translation_notes:
  revision_awareness: El texto inglés auditado fue revisado de 'concerning' a 'over' para עַל; la presente versión española evita esa oscilación con 'por', que expresa de forma natural la relación de ocasión o motivo del consuelo sin perder el matiz del hebreo. También se conserva la solución doctrinal del proyecto para el Tetragrama, pero adaptada a la sintaxis española con 'Señor Yahvé'.
  spanish_consistency_notes:
  - Se mantuvo 'Yahvé' para יְהוָה conforme al criterio del proyecto.
  - Se usó 'Faraón' como nombre propio regnal sin artículo.
  - '''Ejército'' traduce חֵיל en sentido militar, coherente con el contexto bélico.'
  - '''Caídos a espada'' conserva el idiomismo hebreo sin expandirlo innecesariamente.'
