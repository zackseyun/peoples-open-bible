translation:
  text: The disciples said to Jesus[a], “Tell us how our end will be.” He said, “Have
    you found the beginning, then, that you are seeking the end? For in the place
    where the beginning is, there the end will be. Blessed is the one who will stand
    in the beginning; he will know the end[d][c][b], and he will not taste death.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: “Have you found the beginning, then … ?” The particle sequence ⲁⲛⲧⲱⲧⲛ …
      ⲅⲁⲣ functions rhetorically; ‘then’ captures the tone without over‑translating
      ‘for/indeed.’
    reason: lexical_alternative
  - marker: b
    text: “In the place where the beginning is, there the end will be.” The Coptic
      explicitly uses ϩⲛ ⲡⲙⲁ ‘in the place’ with a relative clause; the translation
      keeps that structure.
    reason: cultural_note
  - marker: c
    text: '“Blessed is the one who will stand in the beginning”: literally “who will
      stand before it/in his presence in the beginning” (ⲉⲣⲁⲧϥ ϩⲛ ⲡⲁⲣⲭⲏ). The 3ms
      suffix may refer to ‘the beginning’ or to an implied ‘First/Origin.’'
    reason: dialect_note
  - marker: d
    text: “Will not taste death” renders the idiom ϫⲓϯⲡⲉ ⲛⲙⲟⲩ, a set Coptic expression
      for experiencing death.
    reason: cultural_note
lexical_decisions:
- source_word: ϫⲟⲟⲥ / ϫⲱⲛⲧⲟⲥ ⲉⲣⲟⲛ
  chosen: tell us
  alternatives:
  - say to us
  lexicon: Crum; Layton
  rationale: Formula for direct request; ϫⲟⲟⲥ ‘say’ with ⲉⲣⲟⲛ ‘to us’. Dilley’s normalized
    ϫⲱⲛⲧⲟⲥ reflects the same imperative function. Rendering as “tell us” fits the
    imperative nuance (Layton §204).
- source_word: ⲡϩⲁⲏ
  chosen: end
  alternatives:
  - goal
  - consummation
  lexicon: Crum
  rationale: Crum glosses ⲡϩⲁⲏ as ‘end, extremity, completion’. Context contrasts
    with ⲡⲁⲣⲭⲏ (beginning).
- source_word: ⲡⲁⲣⲭⲏ
  chosen: beginning
  alternatives:
  - origin
  lexicon: Crum
  rationale: Greek loan ἀρχή ‘beginning, origin’. Retained as “beginning” to preserve
    the chiastic contrast with ‘end’.
- source_word: ϭⲱⲗⲡ
  chosen: find
  alternatives:
  - discover
  lexicon: Crum
  rationale: Crum gives ‘find, discover’. Chose “found” (with “then”) to keep terse,
    literal force; “discover” would be acceptable nuance.
- source_word: ϣⲓⲛⲉ ⲛⲥⲁ ⲡϩⲁⲏ
  chosen: seek the end
  alternatives:
  - seek after the end
  - look for the end
  lexicon: Crum
  rationale: ϣⲓⲛⲉ ‘seek’ + ⲛⲥⲁ ‘after’ is idiomatic ‘seek after’. Rendered as “seek”
    for English naturalness while noting the construction.
- source_word: ϩⲛ ⲡⲙⲁ ⲉⲧⲉⲣⲉ … ⲙⲙⲁⲩ
  chosen: in the place where … there …
  alternatives:
  - where … there …
  lexicon: Layton
  rationale: Coptic uses explicit locative ϩⲛ ⲡⲙⲁ ‘in the place’ with relative ⲉⲧⲉⲣⲉ.
    Kept “in the place where … there …” to reflect the formal structure.
- source_word: ⲟⲩⲙⲁⲕⲁⲣⲓⲟⲥ
  chosen: Blessed
  alternatives:
  - Happy
  - Fortunate
  lexicon: Crum
  rationale: Loan from Greek μακάριος. “Blessed” preserves traditional sacral tone;
    “fortunate” noted as alternative.
- source_word: ⲁⲱϩⲉ / ϩⲱϩⲉ
  chosen: stand
  alternatives:
  - take one’s stand
  lexicon: Crum; Layton
  rationale: Verb ‘to stand, take a position’. Chose “stand” for brevity; “take one’s
    stand” is a viable literal alternative.
- source_word: ⲉⲣⲁⲧϥ (normalized ⲉⲣⲁⲧⲛⲧⲟϥ) ϩⲛ ⲡⲁⲣⲭⲏ
  chosen: in the beginning
  alternatives:
  - before it in the beginning
  - in his presence in the beginning
  lexicon: Crum; Layton
  rationale: ⲉⲣⲁⲧ- ‘before, in the presence of’ with 3ms suffix likely refers to the
    ‘beginning’ (ⲡⲁⲣⲭⲏ) or an implied ‘First’. Rendered non‑specifically as “in the
    beginning”; noted literal alternatives for review.
- source_word: ⲥⲟⲟⲩⲛ
  chosen: know
  alternatives:
  - recognize
  - understand
  lexicon: Crum
  rationale: Standard verb ‘to know’. “Know the end” retains Thomas’s compact diction.
- source_word: ϫⲓϯⲡⲉ ⲛⲙⲟⲩ
  chosen: taste death
  alternatives:
  - experience death
  lexicon: Crum; Layton
  rationale: Idiomatic expression ϫⲓⲡⲉ + ⲙⲟⲩ ‘to taste death’. Preserved as set idiom;
    alt gloss ‘experience death’ noted.
- source_word: ⲁⲛⲧⲱⲧⲛ … ⲅⲁⲣ
  chosen: then (rhetorical)
  alternatives:
  - indeed
  - for
  lexicon: Layton
  rationale: ⲁⲛⲧⲱ ‘then’ + ⲧⲱⲧⲛ (2pl) with Greek particle ⲅⲁⲣ often functions rhetorically.
    Rendered as ‘then’ in English to keep the question’s bite; ‘for/indeed’ would
    overburden the line.
- source_word: ⲕⲁⲁⲥ
  chosen: that
  alternatives:
  - so that
  lexicon: Layton
  rationale: 'Consecutive/complementizer introducing the purpose/result clause: ‘that
    you are seeking the end’. Kept simple as ‘that’.'
textual_note: 'No lacunae in Dilley’s Sahidic/Lycopolitan text for this saying. Orthographic/dialect
  points: (1) Opening request appears in the manuscript as ϫⲟⲟⲥ ⲉⲣⲟⲛ, whereas Dilley
  normalizes to ϫⲱⲛⲧⲟⲥ ⲉⲁⲛⲟⲛ; both convey “say/tell us.” (2) The verb for ‘stand’
  is written ϩⲱϩⲉ in the codex but normalized as ⲁⲱϩⲉ; both reflect the same lexeme.
  (3) The phrase ⲉⲣⲁⲧϥ ϩⲛ ⲡⲁⲣⲭⲏ contains a 3ms suffix pronoun on ⲉⲣⲁⲧ‑ (‘before/in
  the presence of’). Dilley’s normalization gives ⲉⲣⲁⲧⲛⲧⲟϥ, an orthographic assimilation;
  the referent is not explicit in the immediate clause. It most naturally points back
  to ⲡⲁⲣⲭⲏ (‘the beginning’), which takes the masculine article ⲡ‑ in Coptic; some
  interpreters see an implicit ‘First/Origin’ as the referent. The translation renders
  non‑specifically as “in the beginning” and flags literal alternatives in the notes.
  (4) The text uses the explicit locative ϩⲛ ⲡⲙⲁ ‘in the place,’ retained in translation
  to preserve Thomas’s pointed structure. No conjectural restorations are noted by
  Dilley.'
