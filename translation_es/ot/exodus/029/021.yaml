  glossary_alignment: No hay conflicto con la terminología base del proyecto. 'Aarón', 'santos', 'aceite de la unción' y 'vestiduras' son coherentes con las decisiones léxicas documentadas. La conservación de 'santos' en vez de 'consagrados' preserva bien קדשׁ, tal como exige la auditoría inglesa.
