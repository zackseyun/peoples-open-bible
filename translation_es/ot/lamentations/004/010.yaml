translation:
  language: es
  text: Las manos de mujeres compasivas cocinaron a sus propios hijos[a]; fueron alimento para ellas en la destrucción de la hija de mi pueblo[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «hirvieron a sus hijos». El verbo hebreo se refiere específicamente a cocinar, a menudo hirviendo.
    reason: lexical_alternative
  - marker: b
    text: «La hija de mi pueblo» es una expresión poética hebrea que personifica a mi pueblo, especialmente Jerusalén/Sión, en su devastación.
    reason: cultural_note
lexical_decisions:
- source_word: יְדֵי
  english_pob_choice: The hands of
  chosen_spanish: Las manos de
  alternatives_spanish:
  - Las manos
  lexicon: HALOT
  rationale: Conservo el sujeto concreto de la imagen hebrea. En español, 'las manos de' mantiene la crudeza y la vividez sin reducir prematuramente la frase a una simple referencia a las mujeres.
- source_word: נָשִׁים
  english_pob_choice: women
  chosen_spanish: mujeres
  alternatives_spanish:
  - esposas
  lexicon: HALOT
  rationale: El contexto no exige 'esposas'; 'mujeres' es el equivalente más natural y fiel al plural genérico del hebreo.
- source_word: רַחֲמָנִיּוֹת
  english_pob_choice: compassionate
  chosen_spanish: compasivas
  alternatives_spanish:
  - misericordiosas
  - tiernamente compasivas
  lexicon: HALOT
  rationale: '''Compasivas'' comunica bien la cualidad moral contrastante destacada por el inglés POB y evita una formulación demasiado devocional o arcaica.'
- source_word: בִּשְּׁלוּ
  english_pob_choice: cooked
  chosen_spanish: cocinaron
  alternatives_spanish:
  - hirvieron
  - ebulleron
  lexicon: HALOT
  rationale: El verbo hebreo remite a cocinar, a menudo hirviendo. 'Cocinaron' es un renderizado natural en español y conserva el sentido amplio sin restringirlo innecesariamente.
- source_word: יַלְדֵיהֶן
  english_pob_choice: their own children
  chosen_spanish: a sus propios hijos
  alternatives_spanish:
  - a sus hijos
  - a sus propios niños
  lexicon: HALOT
  rationale: '''Sus propios hijos'' explicita la fuerza posesiva que el inglés POB marcó con ''own''. En español, ''hijos'' transmite la relación filial con mayor precisión que ''niños''.'
- source_word: הָיוּ
  english_pob_choice: they became
  chosen_spanish: llegaron a ser
  alternatives_spanish:
  - se volvieron
  - fueron
  lexicon: HALOT
  rationale: '''Llegaron a ser'' expresa con claridad el cambio de estado que enlaza a los hijos con el predicado siguiente, sin forzar una lectura meramente copulativa.'
- source_word: לְבָרוֹת
  english_pob_choice: food
  chosen_spanish: alimento
  alternatives_spanish:
  - comida
  - para comer
  - para alimento
  lexicon: HALOT
  rationale: '''Alimento'' mantiene la referencia a algo destinado a nutrir, y en este contexto de horror conserva la función sustantiva del término sin sonar excesivamente coloquial.'
- source_word: לָמוֹ
  english_pob_choice: for them
  chosen_spanish: para ellas
  alternatives_spanish:
  - para ellos
  - para sí
  lexicon: HALOT
  rationale: El pronombre final se refiere a las mismas mujeres sujetas de la acción. 'Para ellas' lo vuelve explícito en español y evita ambigüedad de género en el beneficiario/consumidor.
- source_word: בְּשֶׁבֶר
  english_pob_choice: in the destruction
  chosen_spanish: en la destrucción
  alternatives_spanish:
  - en la ruina
  - en la quebradura
  - en el quebranto
  lexicon: HALOT
  rationale: La forma hebrea puede expresar fractura, ruina o desastre. 'Destrucción' comunica con claridad la catástrofe de Jerusalén, coherente con la elección del inglés POB.
- source_word: בַּת עַמִּי
  english_pob_choice: the daughter of my people
  chosen_spanish: la hija de mi pueblo
  alternatives_spanish:
  - mi pueblo
  - la doncella de mi pueblo
  lexicon: HALOT
  rationale: Conservo la personificación poética literalmente. 'Hija de mi pueblo' preserva la metáfora profética y lamentativa sin sustituirla por una paráfrasis explicativa.
theological_decisions:
- issue: Mantener la personificación poética בַּת עַמִּי
  english_pob_reading: the daughter of my people
  chosen_spanish_reading: la hija de mi pueblo
  alternative_spanish_readings:
  - mi pueblo
  - la ciudad de mi pueblo
  rationale: La expresión hebrea no es solo referencial; personifica al pueblo en su desolación. Mantenerla literalmente conserva su fuerza literaria y teológica en el lamento, en vez de aplanarla a una simple designación colectiva.
  doctrine_reference: Translation philosophy §1, §6
- issue: Intensidad del horror por el canibalismo en juicio
  english_pob_reading: cooked their own children; they became food for them
  chosen_spanish_reading: cocinaron a sus propios hijos; llegaron a ser alimento para ellas
  alternative_spanish_readings:
  - hirvieron a sus hijos; fueron su comida
  - prepararon a sus hijos como alimento
  rationale: El hebreo es deliberadamente brutal y no debe suavizarse. En español, 'cocinaron' y 'alimento' preservan la dureza del juicio sin añadir una interpretación distinta ni diluir el impacto del verso.
  doctrine_reference: Translation philosophy §1, §6
translation_notes:
  revision_awareness: 'Se revisó el versículo en consonancia con el audit trail inglés: se mantuvo la imaginería concreta de ''las manos'', el matiz de cocinar/hervir, la posesión enfática en ''sus propios hijos'', la transición de estado en ''llegaron a ser'', la función alimentaria de לְבָרוֹת y la personificación de ''la hija de mi pueblo''.'
  spanish_consistency_notes:
  - Se prefirió 'compasivas' frente a 'misericordiosas' para un registro bíblico claro pero moderno.
  - Se usó 'alimento' para preservar el registro sobrio del horror y evitar coloquialismos.
  - Se mantuvo la personificación femenina en el sintagma final para coherencia con el hebreo y con la línea poética del lamento.
