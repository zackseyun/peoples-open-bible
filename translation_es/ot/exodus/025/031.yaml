translation:
  language: es
  text: Harás un candelero de oro puro[a]. El candelero se hará de obra martillada; su base y su tallo, sus copas[b], sus botones y sus flores serán de una sola pieza con ella.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «obra batida». El hebreo subraya que el candelero debía formarse martillándolo, aparentemente a partir de una sola pieza y no ensamblado de partes separadas.
    reason: lexical_alternative
  - marker: b
    text: O «botones». El hebreo se refiere a proyecciones redondeadas ornamentales dentro del diseño floral del candelero.
    reason: lexical_alternative
lexical_decisions:
- source_word: מְנֹרַת
  english_pob_choice: lampstand
  chosen_spanish: candelabro
  alternatives_spanish:
  - lampstand
  - menorá
  lexicon: HALOT
  rationale: El término hebreo nombra el soporte que porta luces. En español, «candelabro» comunica de manera natural y digna esa función; «menorá» sería transliteración menos transparente para una primera lectura, y «lampstand» no es español.
- source_word: זָהָב טָהוֹר
  english_pob_choice: pure gold
  chosen_spanish: oro puro
  alternatives_spanish:
  - oro fino
  - oro limpio
  lexicon: HALOT
  rationale: La expresión describe oro refinado, sin mezcla. «Oro puro» es la equivalencia más clara y natural en español.
- source_word: מִקְשָׁה
  english_pob_choice: hammered work
  chosen_spanish: obra martillada
  alternatives_spanish:
  - trabajo martillado
  - obra batida
  - obra de martillo
  lexicon: HALOT
  rationale: El hebreo indica metal trabajado por martilleo, no ensamblado por partes. «Obra martillada» conserva ese sentido técnico y suena natural en español bíblico moderno.
- source_word: תֵּעָשֶׂה
  english_pob_choice: shall be made
  chosen_spanish: se hará
  alternatives_spanish:
  - será hecha
  - deberá hacerse
  lexicon: HALOT
  rationale: La forma pasiva en contexto instructivo se expresa bien con futuro o se pasivo. «Se hará» mantiene el valor de mandato/descripción de fabricación sin forzar el español.
- source_word: יְרֵכָהּ
  english_pob_choice: its base
  chosen_spanish: su base
  alternatives_spanish:
  - su parte inferior
  - su pedestal
  lexicon: HALOT
  rationale: En un objeto fabricado, el término designa la parte de apoyo inferior. «Base» es la opción más clara y fiel al contexto.
- source_word: וְקָנָהּ
  english_pob_choice: its shaft
  chosen_spanish: su tallo
  alternatives_spanish:
  - su vara
  - su eje
  - su brazo central
  lexicon: HALOT
  rationale: Aunque literalmente puede referir a una vara o tallo, en la estructura del candelabro la imagen de un elemento central vertical encaja bien con «tallo». «Shaft» del inglés POB apunta a esa pieza central, no a una rama.
- source_word: גְּבִיעֶיהָ
  english_pob_choice: its cups
  chosen_spanish: sus copas
  alternatives_spanish:
  - sus cuencos
  - sus vasos
  lexicon: HALOT
  rationale: La forma de copa es literal y coherente con el ornamento del candelabro. «Copas» mantiene la imaginería floral sin perder precisión.
- source_word: כַּפְתֹּרֶיהָ
  english_pob_choice: its buds
  chosen_spanish: sus botones
  alternatives_spanish:
  - sus nudos
  - sus brotes
  - sus knobs
  lexicon: HALOT
  rationale: El inglés POB opta por «buds» para preservar la imaginería floral; en español, «botones» reproduce bien esa idea de abultamientos redondeados dentro del motivo vegetal, sin imponer un tecnicismo ajeno.
- source_word: וּפְרָחֶיהָ
  english_pob_choice: its flowers
  chosen_spanish: sus flores
  alternatives_spanish:
  - sus florecimientos
  - sus florones
  lexicon: HALOT
  rationale: El hebreo hace explícita la ornamentación floral. «Flores» es directo y fiel.
- source_word: מִמֶּנָּה יִהְיוּ
  english_pob_choice: shall be of one piece with it
  chosen_spanish: serán de una sola pieza con él
  alternatives_spanish:
  - saldrán de ella
  - serán parte de ella
  - serán de la misma pieza
  lexicon: HALOT
  rationale: La frase indica que las partes no iban a añadirse aparte, sino a salir del mismo cuerpo del objeto. «De una sola pieza con él» preserva esa idea constructiva con claridad en español.
theological_decisions:
- issue: Terminología para מְנֹרָה en un objeto cultual
  english_pob_reading: lampstand
  chosen_spanish_reading: candelabro
  alternative_spanish_readings:
  - menorá
  - lampstand
  rationale: No hay una tensión doctrinal aquí, pero sí una decisión terminológica. «Candelabro» es comprensible en español y conserva la referencia a un soporte de luces; se evita transliterar «menorá» en el texto principal para mantener transparencia semántica.
  doctrine_reference: Éxodo 25:31; cf. Hebreos 9:2
- issue: Énfasis en fabricación de una sola pieza
  english_pob_reading: hammered work ... of one piece with it
  chosen_spanish_reading: obra martillada ... de una sola pieza con él
  alternative_spanish_readings:
  - obra batida ... de una sola pieza
  - hecha de una sola pieza
  rationale: 'La redacción mantiene el punto material del texto: no se trata solo de apariencia artística, sino de un objeto formado por martilleo y sin piezas añadidas. Esto respeta la fuerza técnica del hebreo y del inglés POB.'
  doctrine_reference: Éxodo 25:31
translation_notes:
  revision_awareness: El borrador sigue de cerca la edición inglesa auditada, que no mostró cambios posteriores y mantiene acuerdo alto con la fuente hebrea. Se conservó la distinción entre la fabricación por martillado y la unidad material de las partes, así como la imaginería floral de copas, botones y flores.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» fuera del versículo porque no aparece en este texto.
  - Se evitó «SEÑOR» como sustituto de YHWH, conforme a la política del proyecto.
  - Se preservó la transparencia del término técnico de fabricación mediante «obra martillada».
  - Se eligió un registro bíblico moderno y digno, sin calco excesivo del inglés.
