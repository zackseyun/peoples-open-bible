translation:
  language: es
  text: Sus hijos[a] serán como en tiempos antiguos[b], y su[c] congregación[d] será establecida delante de mí, y castigaré a todos sus opresores.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: ''sus hijos'' literalmente; aquí puede entenderse en sentido colectivo para la descendencia.'
    reason: lexical_alternative
  - marker: b
    text: O 'como antes' o 'como en tiempos pasados'.
    reason: lexical_alternative
  - marker: c
    text: El singular 'su' probablemente personifica a Jacob/Israel como un todo corporativo.
    reason: cultural_note
  - marker: d
    text: O 'asamblea' o 'comunidad'.
    reason: lexical_alternative
lexical_decisions:
- source_word: בָנָיו
  english_pob_choice: his children
  chosen_spanish: sus hijos
  alternatives_spanish:
  - sus hijos varones
  - sus descendientes
  lexicon: HALOT
  rationale: La forma hebrea dice literalmente 'sus hijos', pero en este contexto de restauración puede abarcar descendencia en sentido colectivo. En español, 'sus hijos' mantiene la naturalidad y conserva la tensión entre lectura literal y colectiva sin forzar una paráfrasis.
- source_word: כְּקֶדֶם
  english_pob_choice: as in former times
  chosen_spanish: como en tiempos antiguos
  alternatives_spanish:
  - como antes
  - como en tiempos pasados
  lexicon: HALOT
  rationale: La expresión señala una condición previa, anterior. 'Como en tiempos antiguos' comunica bien el matiz temporal sin sonar arcaico o rígido.
- source_word: וַעֲדָתוֹ
  english_pob_choice: his congregation
  chosen_spanish: su congregación
  alternatives_spanish:
  - su asamblea
  - su comunidad
  lexicon: HALOT
  rationale: עֵדָה designa un cuerpo reunido. 'Congregación' conserva el sentido corporativo y eclesial/covenantal que el POB inglés buscó, sin reducirlo a una comunidad genérica.
- source_word: לְפָנַי
  english_pob_choice: before me
  chosen_spanish: delante de mí
  alternatives_spanish:
  - en mi presencia
  lexicon: HALOT
  rationale: La preposición expresa estar ante la presencia de Dios. 'Delante de mí' es una correspondencia directa y natural en español.
- source_word: תִּכּוֹן
  english_pob_choice: will be established
  chosen_spanish: será establecida
  alternatives_spanish:
  - se afirmará
  - quedará firme
  lexicon: HALOT
  rationale: El nifal de כון comunica quedar firmemente asentado. 'Será establecida' preserva el sentido pasivo/resultativo y encaja con el habla profética.
- source_word: וּפָקַדְתִּי
  english_pob_choice: I will punish
  chosen_spanish: castigaré
  alternatives_spanish:
  - visitaré con juicio
  - ejerceré juicio sobre
  lexicon: HALOT
  rationale: En este contexto de juicio, פקד tiene fuerza punitiva. 'Castigaré' expresa con claridad el sentido judicial sin perder la referencia al acto divino de intervención.
- source_word: עַל כָּל לֹחֲצָיו
  english_pob_choice: all his oppressors
  chosen_spanish: a todos sus opresores
  alternatives_spanish:
  - a todos los que lo oprimen
  - a todos sus torturadores
  lexicon: HALOT
  rationale: לֹחֲצִים refiere a quienes ejercen opresión. 'Opresores' es el equivalente más directo y fiel al sustantivo de agente.
theological_decisions:
- issue: Referente del posesivo singular ('sus hijos', 'su congregación', 'sus opresores')
  english_pob_reading: Retain the singular pronouns without interpretive expansion.
  chosen_spanish_reading: Conservar los posesivos singulares.
  alternative_spanish_readings:
  - sus hijos, su congregación y sus opresores en sentido colectivo de Israel/Jacob
  - sus hijos, su congregación y sus opresores con 'su' explicitando la personificación
  rationale: El hebreo usa sufijos singulares; probablemente personifica a Jacob/Israel como un todo corporativo. El español puede conservar el singular sin resolver de más el referente, manteniendo la tensión textual que el POB inglés documenta.
  doctrine_reference: Preservar la tensión exegética sin resolver el referente más allá del texto.
translation_notes:
  revision_awareness: La versión inglesa auditada no requirió cambios en la última revisión; se mantiene la misma lectura de restauración futura, corporativa y judicial del verso.
  spanish_consistency_notes:
  - Se usa 'Yahvé' solo cuando aparezca el nombre divino; en este versículo no es necesario.
  - '''Congregación'' se conserva como término corporativo consistente con el audit trail inglés.'
  - El posesivo singular se mantiene por fidelidad al hebreo, aunque el referente sea corporativo.
