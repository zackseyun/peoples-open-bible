lexical_decisions:
- source_word: בֶּן אָדָם
  english_pob_choice: Son of man
  chosen_spanish: Hijo de hombre
  alternatives_spanish:
  - Ser humano
  - Mortal
  lexicon: HALOT
  rationale: Conserva el vocativo fijo del libro de Ezequiel y reproduce la forma idiomática del hebreo con máxima fidelidad formal. 'Hijo de hombre' es la equivalencia estable y reconocible para esta dirección profética, mejor que opciones más interpretativas como 'mortal'.
- source_word: הוֹדַע
  english_pob_choice: make known to
  chosen_spanish: da a conocer a
  alternatives_spanish:
  - informa a
  - declara a
  - haz saber a
  lexicon: HALOT
  rationale: 'El hiphil imperativo expresa una causación: ''hacer saber / dar a conocer''. En español, ''da a conocer a'' comunica bien la fuerza causativa y la construcción con destinatario, con un registro natural y digno.'
- source_word: יְרוּשָׁלִַם
  english_pob_choice: Jerusalem
  chosen_spanish: Jerusalén
  alternatives_spanish:
  - Yerushalén
  lexicon: HALOT
  rationale: Nombre propio estándar en español bíblico. Se mantiene la forma tradicional de transliteración usada en la lengua receptora.
- source_word: תּוֹעֲבֹתֶיהָ
  english_pob_choice: her abominations
  chosen_spanish: sus abominaciones
  alternatives_spanish:
  - sus actos abominables
  - sus cosas detestables
  lexicon: HALOT
  rationale: '''Abominaciones'' preserva el peso moral y cultual del término profético. Se usa ''sus'' en lugar de una reiteración explícita de ''de ella'' porque en español el posesivo ya refleja la referencia femenina a Jerusalén sin forzar la sintaxis.'
theological_decisions:
- issue: Personificación femenina de Jerusalén
  english_pob_reading: Render the suffix explicitly as 'her' in 'her abominations.'
  chosen_spanish_reading: Mantener el posesivo femenino implícito en 'sus abominaciones'.
  alternative_spanish_readings:
  - sus abominaciones de ella
  - sus abominaciones, de ella
  rationale: El hebreo personifica a Jerusalén como mujer; el español puede preservar esa referencia con el posesivo 'sus' sin volver la frase pesada. La decisión conserva la tensión literaria y evita neutralizar la personificación.
  doctrine_reference: Translation philosophy §4 (gender-accurate over gender-neutral)
translation_notes:
  revision_awareness: Se siguió la revisión del audit trail que prefirió una construcción más natural y formal ('make known to Jerusalem') frente a una literalidad menos idiomática. Por eso se eligió 'da a conocer a Jerusalén' en español, manteniendo la fuerza causativa del hiphil y el destinatario explícito.
  spanish_consistency_notes:
  - Se mantuvo 'Jerusalén' como nombre propio estándar.
  - Se conservó 'abominaciones' para reflejar la carga cultual y moral del término hebreo.
  - La frase 'Hijo de hombre' se trató como vocativo técnico del libro, no como descripción biográfica.
