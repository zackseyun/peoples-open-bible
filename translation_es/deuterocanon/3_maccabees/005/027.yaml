    issue: «salida ilegal» para ἀνόμῳ ἐξόδῳ
    rationale: Aunque «salida» refleja formalmente ἔξοδος, en este contexto español suena extraña y puede sugerir una salida física, cuando el contexto narrativo apunta mejor a un desenlace/resultado. El expediente léxico inglés mismo reconoce ese valor contextual.
  - severity: low
    issue: Ubicación del marcador de nota «[a]atónito»
    rationale: El marcador debe aparecer en el término o frase anotada de forma tipográficamente natural. Aquí debe anclarse a «desenlace ilegal[a]» o equivalente, no antes de «atónito».
  - severity: low
    issue: La nota b española comenta ἀγνωσίᾳ κεκρατημένος, pero el expediente inglés marca b sobre otro punto
    rationale: La auditoría inglesa parece tener una desalineación interna de notas. El español puede evitar reproducir una nota innecesaria sobre «ignorancia» si no aporta aclaración real al lector.
  revised_spanish_text: Pero cuando lo recibió y quedó atónito ante el desenlace ilegal[a], dominado en todo por la ignorancia, seguía preguntando si lo decretado se había llevado a cabo para él con urgencia.
