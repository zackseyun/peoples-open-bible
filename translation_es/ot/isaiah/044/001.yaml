translation:
  language: es
  text: Pero ahora[a], escucha, Jacob, mi siervo, e Israel, a quien he escogido.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Y ahora, escucha, Jacob, mi siervo, e Israel, a quien escogí».'
    reason: alternative_reading
lexical_decisions:
- source_word: וְעַתָּה
  english_pob_choice: But now
  chosen_spanish: Pero ahora
  alternatives_spanish:
  - Y ahora
  - Ahora
  lexicon: HALOT
  rationale: La conjunción más el adverbio temporal señalan un giro discursivo desde el contexto anterior de reprensión hacia una nueva exhortación. En español, «Pero ahora» conserva ese contraste natural sin perder la transición temporal.
- source_word: שְׁמַע
  english_pob_choice: hear
  chosen_spanish: escucha
  alternatives_spanish:
  - oye
  - escucha atentamente
  lexicon: HALOT
  rationale: El imperativo de שמע pide una respuesta auditiva y obediente. «Escucha» es natural en español bíblico contemporáneo y mantiene el tono profético directo.
- source_word: יַעֲקֹב
  english_pob_choice: Jacob
  chosen_spanish: Jacob
  lexicon: standard proper name
  rationale: Nombre propio conservado en transliteración habitual.
- source_word: עַבְדִּי
  english_pob_choice: my servant
  chosen_spanish: mi esclavo
  alternatives_spanish:
  - mi siervo
  lexicon: HALOT
  rationale: Aunque la POB inglesa opta por «servant» en su texto principal, el hebreo עבד conserva la fuerza de pertenencia y sujeción. En español, «esclavo» preserva mejor esa fuerza léxica que «siervo», aunque el contexto vocacional-covenantal sigue presente. Se mantiene la tensión léxica sin suavizarla.
- source_word: וְיִשְׂרָאֵל
  english_pob_choice: and Israel
  chosen_spanish: y Israel
  alternatives_spanish:
  - e Israel
  lexicon: standard proper name
  rationale: La coordinación simple reproduce el paralelismo hebreo entre Jacob e Israel como designaciones del mismo pueblo/persona colectiva.
- source_word: בָּחַרְתִּי בּוֹ
  english_pob_choice: whom I have chosen
  chosen_spanish: a quien he escogido
  alternatives_spanish:
  - a quien escogí
  - que he escogido
  lexicon: HALOT
  rationale: El verbo בחר con la preposición ב suele expresarse naturalmente en español con objeto directo relativo introducido por «a quien». El perfecto se traduce con «he escogido» para conservar el valor de acción cumplida con vigencia presente.
theological_decisions:
- issue: Designación de Israel como עַבְדִּי
  english_pob_reading: my servant
  chosen_spanish_reading: mi esclavo
  alternative_spanish_readings:
  - mi siervo
  rationale: Se conserva la tensión lexical del hebreo עבד sin diluirla en un término más piadoso pero menos fuerte. En este contexto, el pueblo es llamado al estatus de pertenencia y servicio bajo Yahvé; «esclavo» resguarda la fuerza semántica, mientras el sentido pactual queda claro por el conjunto del verso.
  doctrine_reference: Translation philosophy §1, §5
- issue: Valor discursivo de וְעַתָּה
  english_pob_reading: But now
  chosen_spanish_reading: Pero ahora
  alternative_spanish_readings:
  - Y ahora
  - Ahora
  rationale: 'La traducción adversativa preserva el cambio retórico y teológico: tras la denuncia de la idolatría, Yahvé vuelve a dirigirse a su pueblo con una palabra de reanudación y pertenencia.'
  doctrine_reference: 'Translation philosophy: optimal equivalence'
translation_notes:
  revision_awareness: 'El texto inglés actual está estable (latest_revision_pass: unchanged; cross-check: high_agreement). La nota alternativa se conserva porque el audit trail documenta «And now» y la forma verbal «I chose» como opciones léxicas legítimas del hebreo.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como forma preferente cuando aparezca el Tetragrámaton en el contexto más amplio del proyecto; este versículo no lo contiene explícitamente.
  - Se eligió «esclavo» para reflejar la fuerza de עבד, aunque el inglés POB usó «servant»; se documenta la opción tradicional alternativa «siervo».
  - La relativa «a quien he escogido» conserva el valor perfecto de בחרתי y el referente humano/colectivo de Israel.
  - La nota al pie marca la alternativa sin alterar la lectura principal publicada.
