translation:
  language: es
  text: 'Cuando se lo dijeron a David, él envió a recibirlos[b], porque los hombres estaban muy avergonzados[a]. Y el rey dijo: «Quédense en Jericó hasta que les crezca la barba, y luego regresen».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «profundamente avergonzados» o «muy deshonrados». El hebreo subraya la vergüenza pública o la humillación.'
    reason: lexical_alternative
  - marker: b
    text: 'El hebreo dice literalmente: «envió a recibirlos», lo cual sugiere que David despachó representantes, pero no especifica «mensajeros».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּגִּדוּ
  english_pob_choice: they told
  chosen_spanish: se lo dijeron
  alternatives_spanish:
  - se lo informaron
  - lo comunicaron
  lexicon: HALOT
  rationale: El hebreo usa un verbo de informar/decir en forma indefinida; en español, «se lo dijeron» expresa con naturalidad que alguien dio la noticia a David sin sobreespecificar quiénes eran.
- source_word: לְדָוִד
  english_pob_choice: David
  chosen_spanish: David
  alternatives_spanish:
  - a David
  lexicon: HALOT
  rationale: Nombre propio estándar; en español se conserva sin transliteración adicional.
- source_word: וַיִּשְׁלַח לִקְרָאתָם
  english_pob_choice: he sent to meet them
  chosen_spanish: envió a recibirlos
  alternatives_spanish:
  - envió a encontrarlos
  - envió mensajeros a recibirlos
  lexicon: HALOT
  rationale: La expresión hebrea indica enviar a alguien en dirección de ellos para hacerles frente/recibirlos. «A recibirlos» preserva la idea de encuentro sin afirmar explícitamente «mensajeros», que el texto no dice.
- source_word: כִּי
  english_pob_choice: for
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  lexicon: HALOT
  rationale: Introduce la causa de la acción de David; «porque» es la forma más clara y directa en español.
- source_word: הָאֲנָשִׁים
  english_pob_choice: the men
  chosen_spanish: los hombres
  alternatives_spanish:
  - los varones
  - aquellos hombres
  lexicon: HALOT
  rationale: El sustantivo masculino plural definido se refiere a los enviados/siervos de David; «los hombres» es natural y mantiene la referencia concreta.
- source_word: נִכְלָמִים מְאֹד
  english_pob_choice: greatly humiliated
  chosen_spanish: muy avergonzados
  alternatives_spanish:
  - profundamente humillados
  - muy deshonrados
  lexicon: HALOT
  rationale: El participio niphal de כלם comunica vergüenza/humillación pública. En español, «muy avergonzados» preserva el campo semántico sin perder naturalidad; la tensión entre vergüenza interna y humillación pública queda reflejada en la nota.
- source_word: וַיֹּאמֶר הַמֶּלֶךְ
  english_pob_choice: And the king said
  chosen_spanish: Y el rey dijo
  alternatives_spanish:
  - Entonces el rey dijo
  lexicon: HALOT
  rationale: Se conserva la secuencia narrativa y el título explícito «el rey», que en contexto se refiere a David.
- source_word: שְׁבוּ
  english_pob_choice: Stay
  chosen_spanish: Quédense
  alternatives_spanish:
  - Permanezcan
  - Alojaos
  lexicon: HALOT
  rationale: El imperativo de ישׁב aquí pide permanecer temporalmente; «quédense» es idiomático en español y comunica bien la estancia provisional.
- source_word: בִּירֵחוֹ
  english_pob_choice: at Jericho
  chosen_spanish: en Jericó
  alternatives_spanish:
  - en la ciudad de Jericó
  - allí en Jericó
  lexicon: HALOT
  rationale: Con un topónimo, «en Jericó» es la opción más natural en español y mantiene el sentido de permanencia local.
- source_word: עַד יְצַמַּח זְקַנְכֶם
  english_pob_choice: until your beards have grown
  chosen_spanish: hasta que les crezca la barba
  alternatives_spanish:
  - hasta que les haya crecido la barba
  - hasta que vuelva a crecerles la barba
  lexicon: HALOT
  rationale: צמח expresa brotar/crecer. En español, la forma impersonal «les crezca la barba» suena natural y conserva la imagen de crecimiento suficiente antes de volver.
- source_word: וְשַׁבְתֶּם
  english_pob_choice: and then return
  chosen_spanish: y luego regresen
  alternatives_spanish:
  - y después vuelvan
  - y regresen
  lexicon: HALOT
  rationale: שׁוב significa volver/retornar; «regresen» es claro y fluido, y «luego» refleja la secuencia temporal implícita por el «hasta que» anterior.
translation_notes:
  revision_awareness: 'Coincide con la revisión más reciente: no se requieren cambios respecto al texto fuente y al audit trail inglés; se mantiene la decisión de no explicitar «mensajeros» en el cuerpo del texto.'
  spanish_consistency_notes:
  - Se conserva «Yahvé» como norma del proyecto, pero este versículo no contiene el nombre divino.
  - Se eligió el paralelismo natural «muy avergonzados» frente a la alternativa más fuerte «profundamente humillados» para mantener legibilidad sin perder el valor semántico del hebreo.
  - El español usa «le/les» impersonal de manera acorde con la referencia a David y a los hombres.
  - «Regresen» y no «vuelvan» por claridad estilística; ambas opciones serían válidas en registro general.
