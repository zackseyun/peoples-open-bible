translation:
  language: es
  text: Porque este pueblo[a], los hijos de Israel, no confía en sus lanzas, sino en las alturas de sus montañas, en las cuales ellos mismos habitan; porque no es fácil acercarse[b] a las cumbres de sus montañas.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «pueblo de los hijos de Israel», «hijos de Israel» o «israelitas». El griego dice literalmente «hijos de Israel».
    reason: lexical_alternative
  - marker: b
    text: O «subir a». El verbo griego puede expresar también el movimiento de subir hacia terreno elevado.
    reason: lexical_alternative
lexical_decisions:
- source_word: λαὸς
  english_pob_choice: people
  chosen_spanish: pueblo
  alternatives_spanish:
  - nación
  - gente
  lexicon: LEH
  rationale: «Pueblo» es la equivalencia natural para un colectivo nacional en este discurso militar. Mantiene la referencia grupal sin introducir el matiz más abstracto de «nación».
- source_word: υἱῶν Ἰσραήλ
  english_pob_choice: sons of Israel
  chosen_spanish: los hijos de Israel
  alternatives_spanish:
  - los hijos varones de Israel
  - los israelitas
  lexicon: LEH
  rationale: El griego dice literalmente «hijos de Israel». En español, «los hijos de Israel» conserva de forma fiel la forma de parentesco del original; «israelitas» sería más idiomático, pero borra esa marca léxica.
- source_word: οὐ πέποιθαν ἐπὶ τοῖς δόρασιν αὐτῶν
  english_pob_choice: do not rely on their spears
  chosen_spanish: no confía en sus lanzas
  alternatives_spanish:
  - no confía en sus armas
  - no pone su confianza en sus lanzas
  lexicon: BDAG
  rationale: πέποιθαν expresa confianza/reliancia estable. En español, «no confía» comunica bien ese valor. Para δόρασιν, «lanzas» es el equivalente natural de «spears» y conserva la concreción bélica del texto.
- source_word: ἀλλʼ ἐπὶ τοῖς ὕψεσι τῶν ὀρέων αὐτῶν
  english_pob_choice: but on the heights of their mountains
  chosen_spanish: sino en las alturas de sus montañas
  alternatives_spanish:
  - sino en los altos de sus montañas
  - sino en las elevaciones de sus montañas
  lexicon: LEH
  rationale: ὕψεσι señala alturas/elevaciones. «Alturas de sus montañas» preserva el relieve estratégico sin introducir la connotación cultual que «lugares altos» podría sugerir en español.
- source_word: ἐν οἷς αὐτοὶ ἐνοικοῦσιν ἐν αὐτοῖς
  english_pob_choice: in which they themselves dwell
  chosen_spanish: en las cuales ellos mismos habitan
  alternatives_spanish:
  - donde ellos mismos viven
  - en las que ellos habitan
  lexicon: BDAG
  rationale: La repetición griega es enfática. «Ellos mismos» conserva ese énfasis, y «habitan» mantiene un tono más elevado que «viven» sin exagerar el sentido del verbo.
- source_word: οὐ γὰρ ἔστιν εὐχερὲς
  english_pob_choice: for it is not easy
  chosen_spanish: porque no es fácil
  alternatives_spanish:
  - pues no es fácil
  - porque no es sencillo
  lexicon: LEH
  rationale: «No es fácil» corresponde de manera directa a εὐχερές y suena natural en español contemporáneo, adecuado para una evaluación militar de la dificultad del acceso.
- source_word: προσβῆναι
  english_pob_choice: to approach
  chosen_spanish: subir
  alternatives_spanish:
  - acercarse
  - subir hasta
  - ascender
  lexicon: BDAG
  rationale: En este contexto de montañas y cumbres, el infinitivo comunica mejor la idea concreta de ascender. «Subir» recoge el movimiento hacia arriba implícito en el griego y se ajusta al paralelismo con «cumbres».
- source_word: ταῖς κορυφαῖς τῶν ὀρέων αὐτῶν
  english_pob_choice: the summits of their mountains
  chosen_spanish: las cumbres de sus montañas
  alternatives_spanish:
  - las cimas de sus montañas
  - las cumbres de las montañas de ellos
  lexicon: LEH
  rationale: κορυφαῖς es «cumbres»/«cimas». «Cumbres» conserva la imagen elevada y el tono estratégico del pasaje, y armoniza con «subir».
translation_notes:
  revision_awareness: Se siguió el pasaje griego de Judith 7:10 y el rastro de auditoría en inglés. Se conservó la estructura argumentativa y la imaginería militar/topográfica sin añadir interpretaciones. No fue necesario introducir revisiones textuales ni decisiones doctrinales especiales.
  spanish_consistency_notes:
  - Se mantuvo el paralelo retórico entre la confianza en las lanzas y la confianza en las alturas.
  - Se evitó «lugares altos» para no sugerir un sentido cultual ajeno al contexto.
  - Se usó «habitan» para conservar un registro solemne coherente con la prosa deuterocanónica.
  - La forma «los hijos de Israel» preserva la literalidad del genitivo plural masculino del griego.
