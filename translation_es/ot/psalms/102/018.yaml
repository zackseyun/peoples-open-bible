revisions:
- from: Volvió su mirada a la oración del desamparado y no despreció[a] su oración.
  to: Se volvió hacia la oración del desamparado[a] y no despreció la oración de ellos.
  rationale: Se ajusta el verbo a una forma más cercana a פָּנָה, se hace explícito el plural de תְּפִלָּתָם con «de ellos», y se reubica la nota al término הָעַרְעָר, que es donde reside la principal cuestión léxica documentada por la POB inglesa.
