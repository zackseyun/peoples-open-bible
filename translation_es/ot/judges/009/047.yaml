translation:
  language: es
  text: Y se le informó a Abimelec de que todos los señores de la torre de Siquem se habían reunido[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «los señores/amos de la torre de Siquem». La expresión hebrea dice literalmente «todos los baales de la torre de Siquem» y aquí se refiere, por contexto, a sus hombres principales o autoridades.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֻּגַּד
  english_pob_choice: it was reported
  chosen_spanish: fue informado
  alternatives_spanish:
  - se le informó
  - le fue comunicado
  - se le dio noticia
  lexicon: HALOT
  rationale: La forma pasiva comunica que la noticia llegó a Abimelec sin especificar el agente. «Fue informado» conserva ese sentido y suena natural en español.
- source_word: לַאֲבִימֶלֶךְ
  english_pob_choice: to Abimelech
  chosen_spanish: a Abimelec
  alternatives_spanish:
  - para Abimelec
  lexicon: Nombre propio
  rationale: El dativo marca al destinatario del informe; en español, «a Abimelec» expresa mejor esa recepción.
- source_word: כִּי
  english_pob_choice: that
  chosen_spanish: de que
  alternatives_spanish:
  - que
  lexicon: HALOT
  rationale: Introduce el contenido del informe indirecto. «De que» evita ambigüedad estilística después de «informado» y es natural en español actual.
- source_word: הִתְקַבְּצוּ
  english_pob_choice: had gathered together
  chosen_spanish: se habían reunido
  alternatives_spanish:
  - se habían congregado
  - se habían juntado
  lexicon: HALOT
  rationale: El hitpael señala reunión/agrupamiento colectivo. «Se habían reunido» preserva el matiz reflexivo y el estado resultante anterior al reporte.
- source_word: כָּל
  english_pob_choice: all
  chosen_spanish: todos
  alternatives_spanish:
  - todo
  lexicon: HALOT
  rationale: Con el sustantivo plural masculino, «todos» mantiene la totalidad explícita del hebreo.
- source_word: בַּעֲלֵי
  english_pob_choice: lords
  chosen_spanish: señores
  alternatives_spanish:
  - dueños
  - amos
  - jefes
  lexicon: HALOT
  rationale: El hebreo literalmente expresa «poseedores/señores de». Dado el contexto cívico, «señores» conserva el registro formal y la fuerza de autoridad sin imponer una traducción más interpretativa.
- source_word: מִגְדַּל
  english_pob_choice: tower
  chosen_spanish: torre
  alternatives_spanish:
  - fortaleza
  - bastión
  lexicon: HALOT
  rationale: La acepción básica es «torre»; mantenerla evita sobreinterpretar la estructura como fortaleza.
- source_word: שְׁכֶם
  english_pob_choice: Shechem
  chosen_spanish: Siquem
  alternatives_spanish:
  - Siquén
  lexicon: Nombre propio
  rationale: Se usa la forma española establecida del topónimo bíblico.
translation_notes:
  revision_awareness: La redacción sigue de cerca el texto hebreo y mantiene el pasivo informativo de וַיֻּגַּד, la reunión colectiva de הִתְקַבְּצוּ y el valor formal de בַּעֲלֵי. En comparación con el audit trail inglés, se conserva la alternativa lexical sobre בַּעֲלֵי mediante nota, pero en español se opta por «señores» como equivalente formal y legible.
  spanish_consistency_notes:
  - Se mantiene «Abimelec» y «Siquem» con grafía española habitual.
  - Se evita «SEÑOR» para בַּעֲלֵי porque aquí no es el tetragrámaton ni un título divino, sino una expresión de autoridad humana.
  - La construcción «fue informado... de que» refleja bien el reporte indirecto sin forzar un calco rígido del inglés.
