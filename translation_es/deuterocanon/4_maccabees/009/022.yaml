review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue de cerca la cláusula griega conservada y mantiene bien el contraste, la imagen del fuego, la transformación y la noción de ἀφθαρσία. Sin embargo, dos puntos requieren corrección: 1) el español con «como si siendo transformado» es gramaticalmente torpe tras «como si»; 2) falta la nota textual que el POB inglés conserva sobre la incompletitud del texto griego al terminar en τὰς. También conviene ajustar «hacia la incorruptibilidad» a «en incorruptibilidad» para reflejar mejor εἰς con «transformado ... en ...» en español natural.'
  spanish_quality_summary: El texto actual es comprensible pero poco idiomático en español culto moderno. «Como si siendo transformado» suena calcado; «como si fuera transformado» o «como si estuviera siendo transformado» sería más natural. «Soportó noblemente estas» es aceptable dada la fragmentariedad, aunque queda necesariamente abrupto. La puntuación con comas refleja bien la estructura.
  glossary_alignment: No hay conflictos con la terminología base del proyecto. «Incorruptibilidad» preserva correctamente ἀφθαρσία mejor que «inmortalidad» como lectura principal. «Noblemente» para εὐγενῶς y «soportó» para ὑπέμεινεν son adecuados. La excepción necesaria es sintáctica, no terminológica.
  issues:
  - severity: medium
    issue: Construcción no idiomática después de «como si»
    rationale: «como si siendo transformado» es un calco poco natural; en español debe decirse «como si fuera transformado» o similar para preservar claridad y dignidad literaria.
  - severity: medium
    issue: Falta la nota textual sobre la cláusula incompleta
    rationale: El POB inglés documenta explícitamente que el texto griego proporcionado termina de forma incompleta; esa información debe conservarse en español, especialmente porque el verso acaba abruptamente en «estas».
  - severity: low
    issue: «hacia la incorruptibilidad» suena menos natural con «transformado»
    rationale: Aunque intenta reflejar εἰς, en español la combinación más natural y fiel es «transformado ... en incorruptibilidad», que expresa resultado/estado sin perder la dirección implícita.
  revised_spanish_text: pero[a], como si fuera transformado en el fuego en incorruptibilidad[b], soportó noblemente estas[c]
  revised_footnotes:
  - marker: a
    text: 'O: «como si estuviera siendo transformado en el fuego en inmortalidad».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «en inmortalidad».'
    reason: lexical_alternative
  - marker: c
    text: El texto griego proporcionado para este versículo es incompleto y termina con «las ...»; por eso la traducción refleja solo la cláusula conservada.
    reason: textual_variant
  revision_rationale: Se corrige la sintaxis española tras «como si» para que sea natural y literaria, se mantiene «incorruptibilidad» como lectura principal conforme a la justificación léxico-teológica del POB, se ajusta la preposición a una construcción española más idiomática con «transformado ... en ...», y se añade la nota textual necesaria sobre la fragmentariedad del griego extante.
