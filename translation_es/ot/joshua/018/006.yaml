translation:
  language: es
  text: Y ustedes escribirán la tierra en siete porciones, y me la traerán aquí; y yo echaré lotes para ustedes aquí delante de Yahvé nuestro Dios.
  philosophy: optimal-equivalence
  footnotes: []
lexical_decisions:
- source_word: תִּכְתְּבוּ
  english_pob_choice: write down
  chosen_spanish: escribirán
  alternatives_spanish:
  - anotarán
  - escribirán por escrito
  - registrarán
  lexicon: HALOT
  rationale: El hebreo כתב aquí pide la idea básica de escribir o registrar. En español, «escribirán» comunica con naturalidad el acto de dejar constancia de la tierra sin añadir la imagen más técnica de cartografiar.
- source_word: הָאָרֶץ
  english_pob_choice: the land
  chosen_spanish: la tierra
  alternatives_spanish:
  - la tierra
  - el territorio
  - la región
  lexicon: HALOT
  rationale: En Josué, el referente es la porción territorial por repartirse; «la tierra» es la forma bíblica y natural en español, más idiomática que «el territorio».
- source_word: שִׁבְעָה חֲלָקִים
  english_pob_choice: in seven portions
  chosen_spanish: en siete porciones
  alternatives_spanish:
  - en siete partes
  - en siete divisiones
  lexicon: HALOT
  rationale: חֲלָקִים expresa partes o porciones para repartir. «En siete porciones» conserva el sentido de distribución hereditaria y suena natural en español.
- source_word: וַהֲבֵאתֶם אֵלַי הֵנָּה
  english_pob_choice: and bring it here to me
  chosen_spanish: y la traerán aquí a mí
  alternatives_spanish:
  - y la traerán acá a mí
  - y me la traerán aquí
  lexicon: HALOT
  rationale: El objeto colectivo es la descripción escrita de la tierra; en español conviene referirla con «la». «Aquí a mí» conserva el énfasis de הֵנָּה y del complemento אלי.
- source_word: וְיָרִיתִי
  english_pob_choice: I will cast
  chosen_spanish: yo echaré
  alternatives_spanish:
  - yo tiraré
  - yo lanzar é
  - yo echaré los lotes
  lexicon: HALOT
  rationale: El verbo ירה en este contexto alude a arrojar o echar lotes. «Echaré» mantiene el acto concreto sin convertirlo en una paráfrasis abstracta como «aportaré por sorteo».
- source_word: גּוֹרָל
  english_pob_choice: the lot / lots
  chosen_spanish: lotes
  alternatives_spanish:
  - suerte
  - suertes
  - el sorteo
  lexicon: HALOT
  rationale: גּוֹרָל designa la suerte o lote usado para repartir. «Lotes» conserva la imagen del objeto echado; «suertes» sería posible, pero en español actual puede sonar más figurado o religioso.
- source_word: פֹּה
  english_pob_choice: here
  chosen_spanish: aquí
  alternatives_spanish:
  - acá
  - en este lugar
  lexicon: HALOT
  rationale: פֹּה es un adverbio locativo simple. «Aquí» es la equivalencia más directa y natural.
- source_word: לִפְנֵי יְהוָה
  english_pob_choice: before Yahweh
  chosen_spanish: delante de Yahvé
  alternatives_spanish:
  - ante Yahvé
  - en presencia de Yahvé
  - delante de Yahvé nuestro Dios
  lexicon: HALOT
  rationale: לִפְנֵי significa estar delante de o en presencia de. Se conserva la terminología POB de «Yahvé» para יְהוָה, con un matiz reverencial natural en español mediante «delante de».
- source_word: אֱלֹהֵינוּ
  english_pob_choice: our God
  chosen_spanish: nuestro Dios
  alternatives_spanish:
  - Dios nuestro
  - el Dios nuestro
  lexicon: HALOT
  rationale: 'La construcción posesiva debe mantenerse explícita porque refuerza la confesión de pacto: «nuestro Dios».'
theological_decisions:
- issue: Render del Nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - el SEÑOR
  rationale: El texto hebreo nombra directamente a YHWH. Siguiendo la política terminológica del proyecto en español, se usa «Yahvé» para preservar el Nombre del pacto en vez de ocultarlo con una sustitución litúrgica.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יהוה / YHWH → Yahvé'
- issue: Valor de לִפְנֵי יְהוָה אֱלֹהֵינוּ
  english_pob_reading: before Yahweh our God
  chosen_spanish_reading: delante de Yahvé nuestro Dios
  alternative_spanish_readings:
  - ante Yahvé nuestro Dios
  - en presencia de Yahvé nuestro Dios
  rationale: Se conserva la relación espacial-ceremonial de estar 'delante de' Dios en un acto público de reparto. No se reduce a una mera fórmula devocional.
  doctrine_reference: Contexto ritual y judicial de reparto de la tierra en Josué 18
translation_notes:
  revision_awareness: La versión inglesa auditada cambió de «cast the lot» a «cast lots» para reflejar el plural implícito del hebreo. La redacción española sigue esa revisión con «echaré lotes», manteniendo la concreción del acto y evitando una abstracción no señalada por el texto.
  spanish_consistency_notes:
  - Se preserva «Yahvé» en lugar de «SEÑOR» conforme a la terminología del proyecto.
  - Se usa «lotes» para גּוֹרָל, coherente con el ajuste inglés a plural.
  - El objeto pronominal «la» refiere colectivamente a la tierra descrita por escrito, siguiendo el uso colectivo del hebreo y la solución inglesa auditada.
