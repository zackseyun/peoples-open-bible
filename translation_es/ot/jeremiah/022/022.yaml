translation:
  language: es
  text: Todos tus pastores, el viento los pastoreará[a], y tus amantes irán al cautiverio[b]; entonces te avergonzarás y quedarás humillada por toda tu maldad.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: ‘Todos tus líderes, el viento los dispersará’. El hebreo repite la misma raíz en ‘pastores’ y ‘pastoreará’, creando un juego de palabras irónico.'
    reason: lexical_alternative
  - marker: b
    text: ‘Tus amantes’ es una metáfora profética de las alianzas y apegos políticos ilícitos de Judá.
    reason: cultural_note
lexical_decisions:
- source_word: רֹעַיִךְ
  english_pob_choice: your shepherds
  chosen_spanish: tus pastores
  alternatives_spanish:
  - tus líderes
  - tus gobernantes
  - los que te pastorean
  lexicon: HALOT
  rationale: El hebreo usa el participio de רעה, literalmente ‘pastores’. En Jeremías, la imagen suele referirse a dirigentes o gobernantes, pero ‘pastores’ conserva la metáfora profética y la carga irónica del versículo.
- source_word: תִּרְעֶה רוּחַ
  english_pob_choice: the wind will shepherd
  chosen_spanish: serán apacentados por el viento
  alternatives_spanish:
  - el viento los pastoreará
  - el viento los dispersará
  - el viento los apacentará
  lexicon: HALOT
  rationale: La repetición de la raíz רעה crea un juego de palabras entre ‘pastores’ y ‘apacentar’. En español, ‘apacentados por el viento’ conserva el eco léxico y la ironía mejor que una traducción meramente explicativa como ‘dispersados’.
- source_word: מְאַהֲבַיִךְ
  english_pob_choice: your lovers
  chosen_spanish: tus amantes
  alternatives_spanish:
  - tus aliados
  - los que te aman
  lexicon: HALOT
  rationale: En Jeremías, ‘amantes’ funciona como metáfora profética de alianzas y apegos ilícitos. ‘Amantes’ conserva el valor figurado y la fuerza moral del término.
- source_word: בַּשְּׁבִי יֵלֵכוּ
  english_pob_choice: will go into captivity
  chosen_spanish: irán al cautiverio
  alternatives_spanish:
  - irán al exilio
  - serán llevados cautivos
  lexicon: HALOT
  rationale: La expresión significa literalmente ‘irán al cautiverio’. ‘Cautiverio’ es claro y fiel al idioma bíblico; ‘exilio’ es posible, pero atenúa el matiz de cautividad.
- source_word: תֵּבֹשִׁי
  english_pob_choice: you will surely be ashamed
  chosen_spanish: te avergonzarás
  alternatives_spanish:
  - serás avergonzada
  - quedarás avergonzada
  lexicon: HALOT
  rationale: בוש expresa vergüenza y deshonra. En español, el futuro reflexivo ‘te avergonzarás’ comunica bien la experiencia de vergüenza sin añadir más de lo que el hebreo dice.
- source_word: וְנִכְלַמְתְּ
  english_pob_choice: and humiliated
  chosen_spanish: y te humillarás
  alternatives_spanish:
  - y quedarás humillada
  - y serás humillada
  - y quedarás avergonzada
  lexicon: HALOT
  rationale: נכלם añade la idea de humillación/deshonra junto a בוש. ‘Te humillarás’ mantiene la distinción léxica en español, aunque la forma puede sonar reflexiva; se acepta por claridad y paralelismo.
- source_word: מִכֹּל רָעָתֵךְ
  english_pob_choice: because of all your evil
  chosen_spanish: por toda tu maldad
  alternatives_spanish:
  - a causa de toda tu maldad
  - por toda tu maldad
  lexicon: HALOT
  rationale: La preposición marca causa en contexto. ‘Maldad’ mantiene el alcance moral general de רָעָה y suena natural en español bíblico contemporáneo.
theological_decisions:
- issue: Metáfora profética de liderazgo y alianzas infieles
  english_pob_reading: Retain 'shepherds' and 'lovers' in the main text rather than replacing them with explanatory terms like 'leaders' and 'allies.'
  chosen_spanish_reading: Conservar ‘pastores’ y ‘amantes’ en el texto principal, sin sustituirlos por ‘líderes’ o ‘aliados’.
  alternative_spanish_readings:
  - Todos tus líderes serán dispersados por el viento, y tus aliados irán al cautiverio
  - Todos tus gobernantes serán apacentados por el viento, y tus aliados irán al cautiverio
  rationale: La imagen profética apunta a los dirigentes de Judá y a sus apegos/alianzas ilícitos. Mantener la metáfora preserva el filo retórico y teológico del reproche.
  doctrine_reference: Translation philosophy §§1, 3, 5
- issue: Juego de palabras con la raíz רעה
  english_pob_reading: The Hebrew uses the same shepherding root for 'your shepherds' and 'the wind will shepherd [them],' creating an ironic wordplay.
  chosen_spanish_reading: Reproducir el juego de palabras con ‘pastores’ / ‘apacentados por el viento’.
  alternative_spanish_readings:
  - el viento los dispersará
  - el viento los pastoreará
  rationale: El hebreo subraya la ironía mediante la repetición de la misma raíz. ‘Apacentados por el viento’ es menos natural que una paráfrasis, pero conserva la correspondencia verbal y el efecto retórico.
  doctrine_reference: Translation philosophy §§1, 5
translation_notes:
  revision_awareness: La redacción sigue de cerca el último pase de revisión del POB en inglés, que eliminó ‘away’ por no estar explícito en el hebreo, pero conservó el juego de palabras con la raíz רעה. En español se mantiene esa fidelidad mediante ‘serán apacentados por el viento’, sin introducir un adverbio equivalente no presente en el texto fuente.
  spanish_consistency_notes:
  - Se usa ‘Yahvé’ cuando el contexto requiera el nombre divino; este versículo no lo contiene.
  - Se prefirió ‘cautiverio’ para בַּשְּׁבִי por coherencia con el registro bíblico y la equivalencia léxica.
  - ‘Maldad’ traduce רָעָה en sentido moral general, evitando una explicación más fuerte que el hebreo no exige.
  - Se conservó el paralelismo vergüenza/humillación con dos verbos distintos en español para reflejar בוש / נכלם.
