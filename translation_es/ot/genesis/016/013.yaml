translation:
  language: es
  text: 'Así que ella llamó el nombre de Yahvé, quien le hablaba[a]: «Tú eres un Dios que me ve», porque dijo[c][b]: «¿De veras aquí he visto después del que me ve?»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Tú eres el Dios que ve», o «Tú eres un Dios de ver»'
    reason: lexical_alternative
  - marker: b
    text: 'La cláusula final es un hebreo difícil. Puede significar: «¿Acaso aun aquí he visto al que me vio y he seguido con vida?»'
    reason: alternative_reading
  - marker: c
    text: 'Una renderización anterior decía: «Así que ella llamó el nombre del SEÑOR, quien le hablaba»'
    reason: previous_rendering
lexical_decisions:
- source_word: וַתִּקְרָא שֵׁם
  english_pob_choice: she called the name
  chosen_spanish: llamó a
  alternatives_spanish:
  - puso nombre a
  - llamó el nombre de
  lexicon: HALOT
  rationale: La expresión hebrea קרא שם es un hebraísmo. En español, «llamó a» comunica de manera natural el acto de nombrar o dirigir una designación, evitando una construcción demasiado rígida. Se conserva la idea de dar un nombre/título sin forzar un calco poco idiomático.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  lexicon: HALOT
  rationale: El nombre divino יְהוָה se vierte como «Yahvé» según el estándar del proyecto, preservando el nombre propio del pacto en lugar de sustituirlo por un título.
- source_word: הַדֹּבֵר אֵלֶיהָ
  english_pob_choice: who spoke to her
  chosen_spanish: el que le hablaba
  alternatives_spanish:
  - el que le habló
  - quien le hablaba
  lexicon: HALOT
  rationale: El participio hebreo caracteriza a Yahvé como el que estaba dirigiéndose a Agar. «El que le hablaba» mantiene esa función descriptiva y suena natural en español.
- source_word: אַתָּה אֵל רֳאִי
  english_pob_choice: You are a God who sees me
  chosen_spanish: Tú eres un Dios que me ve
  alternatives_spanish:
  - Tú eres el Dios que me ve
  - Tú eres un Dios de visión
  lexicon: HALOT
  rationale: 'La frase admite varias matizaciones. Se conserva el sentido relacional y pastoral del texto: Dios como aquel que ve a Agar. «Que me ve» mantiene la fuerza de percepción personal sin resolver de más la ambigüedad del hebreo.'
- source_word: כִּי אָֽמְרָה
  english_pob_choice: for she said
  chosen_spanish: porque dijo
  alternatives_spanish:
  - pues dijo
  - ya que dijo
  lexicon: HALOT
  rationale: La partícula introduce la explicación de la denominación. «Porque dijo» es claro en español y conserva la función causal/explanatoria del hebreo.
- source_word: הֲ/גַ֥ם הֲלֹ֛ם
  english_pob_choice: Have I really here
  chosen_spanish: ¿De veras aquí
  alternatives_spanish:
  - ¿Acaso aquí
  - ¿También aquí
  lexicon: HALOT
  rationale: Las partículas expresan sorpresa y énfasis. «¿De veras aquí» reproduce esa perplejidad sin sobreinterpretar el matiz exacto.
- source_word: רָאִיתִי אַחֲרֵי רֹאִי
  english_pob_choice: seen after the One who sees me
  chosen_spanish: he visto al que me ve
  alternatives_spanish:
  - he visto después del que me ve
  - he visto al que ve por mí
  lexicon: HALOT
  rationale: El final del versículo es sintácticamente difícil. Se mantiene la tensión del hebreo con una formulación que deja claro el contraste entre ver y ser visto, sin introducir de forma innecesaria la paráfrasis interpretativa sobre sobrevivir a la visión.
theological_decisions:
- issue: Renderización del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Señor
  - Yahweh
  rationale: Se conserva el nombre propio divino en lugar de ocultarlo tras un título, de acuerdo con la doctrina del proyecto sobre el Tetragrámaton.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Título divino אֵל רֳאִי
  english_pob_reading: You are a God who sees me
  chosen_spanish_reading: Tú eres un Dios que me ve
  alternative_spanish_readings:
  - Tú eres el Dios que me ve
  - Tú eres un Dios de visión
  rationale: La redacción elegida preserva la tensión entre una designación personal y una descripción de atributo. El énfasis recae en la atención divina hacia Agar.
  doctrine_reference: 'DOCTRINE.md Translation philosophy §3: Preserve theological tension rather than resolve it'
- issue: Cláusula final difícil רָאִיתִי אַחֲרֵי רֹאִי
  english_pob_reading: Have I really here seen after the One who sees me?
  chosen_spanish_reading: ¿De veras aquí he visto al que me ve?
  alternative_spanish_readings:
  - ¿He visto aquí al que me ve y he quedado con vida?
  - ¿De veras aquí he visto después del que me ve?
  rationale: La clausula hebrea es notoriamente oscura. La traducción principal preserva el choque conceptual entre ver y ser vista sin resolver completamente la sintaxis, mientras que una nota recoge la alternativa interpretativa tradicional.
  doctrine_reference: 'DOCTRINE.md Translation philosophy §3: Preserve theological tension rather than resolve it'
translation_notes:
  revision_awareness: 'Se tuvo en cuenta el historial de revisión: el inglés pasó de una formulación más interpretativa a una más literal («called the name of»), por lo que el español conserva el hebraísmo de nombrar sin convertirlo en una paráfrasis explicativa. También se respetó la decisión de no resolver de más la cláusula final difícil.'
  spanish_consistency_notes:
  - Se usó «Yahvé» de manera consistente para יְהוָה.
  - Se evitó «SEÑOR» para no ocultar el nombre divino.
  - Se mantuvo la ambigüedad del final del versículo en lugar de imponer una lectura dogmática.
  - Las comillas y la puntuación se ajustaron al estilo español bíblico moderno.
  - Los marcadores de nota [a], [b] y [c] aparecen exactamente en el texto principal y están todos anclados.
