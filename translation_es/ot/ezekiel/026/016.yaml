review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue de cerca el hebreo y el rastro de auditoría inglés: conserva la secuencia verbal, la humillación de los gobernantes marítimos al bajar de sus tronos, el despojo de vestiduras, la metáfora de vestirse de temblor, sentarse en tierra, temblar repetidamente y quedar sobrecogidos ante Tiro. Sin embargo, la nota [a] no refleja la alternativa documentada en la POB inglesa (''leaders'' no ''seats''), y [b] está anclada al segmento equivocado: la literalidad de ''vestirán temblores'' corresponde a «Se vestirán de temblor», no a «a cada momento».'
  spanish_quality_summary: El español es claro, digno y legible. «Bajarán», «mantos», «vestidos bordados», «se vestirán de temblor» y «se sentarán en tierra» funcionan bien. El giro «se desprenderán de» es aceptable, aunque «se despojarán de» sería un poco más vívido; no es imprescindible cambiarlo. «Se quedarán espantados ante ti» comunica bien el efecto, aunque es algo más coloquial que «quedarán horrorizados/pasmados»; sigue siendo suficientemente natural y fiel.
  glossary_alignment: 'No hay términos de glosario de alto impacto en este versículo. «Príncipes» concuerda con la decisión documentada para נְשִׂיאֵי, y no hay conflictos con Yahvé/Mesías/Espíritu, etc. La principal desalineación está en las notas: la alternativa léxica debe explicar «líderes/gobernantes del mar», y la nota sobre el hebreo literal debe anclarse en «Se vestirán de temblor».'
  issues:
  - severity: medium
    issue: La nota [a] da una alternativa incorrecta para «de sus tronos».
    rationale: La POB inglesa documenta como alternativa «all the leaders of the sea», no una alternativa para כִּסְאוֹתָם. «De sus asientos» cambia el foco y no preserva la rationale léxica auditada.
  - severity: medium
    issue: La nota [b] está colocada en «a cada momento» pero su contenido explica «Se vestirán de temblor».
    rationale: La nota dice «Literalmente, “vestirán temblores”», lo cual corresponde a חֲרָדוֹת יִלְבָּשׁוּ, no a וְחָרְדוּ לִרְגָעִים. Los marcadores deben aparecer en el lugar relevante del texto.
  - severity: low
    issue: La nota [a] omite la aclaración explícita de que «príncipes del mar» se refiere a gobernantes marítimos.
    rationale: Aunque menciona humillación de gobernantes marítimos, conviene alinear mejor la nota con la explicación inglesa de la frase literal «príncipes del mar» y su sentido contextual.
  revised_spanish_text: Entonces todos los príncipes del mar[a] bajarán de sus tronos, se quitarán sus mantos y se desprenderán de sus vestidos bordados. Se vestirán de temblor[b], se sentarán en tierra, temblarán a cada momento y se quedarán espantados ante ti.
  revised_footnotes:
