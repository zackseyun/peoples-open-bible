translation:
  language: es
  text: Y traerán a todos sus hermanos[a] de todas las naciones como una ofrenda a Yahvé, en caballos, en carros, en literas, en mulas y en camellos[b], a mi santo monte, Jerusalén, dice Yahvé, así como los hijos de Israel traen la ofrenda en un recipiente limpio a la casa de Yahvé.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Hermanos» puede tener un sentido de parentesco más amplio aquí, no limitado a hermanos varones literales.
    reason: cultural_note
  - marker: b
    text: O «camellos veloces», si se entiende el término raro como una referencia a dromedarios o camellos de marcha rápida.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהֵבִיאוּ
  english_pob_choice: And they will bring
  chosen_spanish: Y traerán
  alternatives_spanish:
  - Y llevarán
  - Y traerán consigo
  lexicon: HALOT
  rationale: El verbo causativo en contexto profético expresa acción futura; «traerán» conserva el movimiento hacia el lugar de destino con español natural.
- source_word: כָּל אֲחֵיכֶם
  english_pob_choice: all your brothers
  chosen_spanish: a todos sus hermanos
  alternatives_spanish:
  - a todos sus parientes
  - a todos sus hermanos y hermanas
  lexicon: HALOT
  rationale: Se conserva «hermanos» para mantener la fuerza lexical de אָח y el paralelismo con la lectura inglesa, sin neutralizar el plural masculino del hebreo.
- source_word: מִכָּל הַגּוֹיִם
  english_pob_choice: from all the nations
  chosen_spanish: de entre todas las naciones
  alternatives_spanish:
  - de todas las naciones
  - desde todas las naciones
  lexicon: HALOT
  rationale: La expresión española «de entre» comunica mejor la idea de extracción o reunificación desde el medio de los pueblos, sin alterar el sentido básico.
- source_word: מִנְחָה
  english_pob_choice: an offering
  chosen_spanish: una ofrenda
  alternatives_spanish:
  - un regalo
  - un tributo
  lexicon: HALOT
  rationale: «Ofrenda» preserva el matiz cultual que exige la comparación con la ofrenda llevada al templo, sin restringirla a una categoría sacrificial más técnica de lo que el contexto pide.
- source_word: לַיהוָה
  english_pob_choice: to Yahweh
  chosen_spanish: a Yahvé
  alternatives_spanish:
  - para Yahvé
  lexicon: HALOT
  rationale: Se sigue el criterio del proyecto de nombrar explícitamente el Tetragrámaton como «Yahvé»; la preposición «a» refleja la dedicación/destinación de la ofrenda.
- source_word: בַּסּוּסִים
  english_pob_choice: on horses
  chosen_spanish: en caballos
  alternatives_spanish:
  - sobre caballos
  lexicon: HALOT
  rationale: La preposición instrumental se vierte con «en» por naturalidad en la serie de medios de transporte.
- source_word: וּבָרֶכֶב
  english_pob_choice: in chariots
  chosen_spanish: en carros
  alternatives_spanish:
  - en carruajes
  lexicon: HALOT
  rationale: «Carros» es la forma española más sobria y comprensible para רֶכֶב en una lista de transporte.
- source_word: וּבַצַּבִּים
  english_pob_choice: in litters
  chosen_spanish: en literas
  alternatives_spanish:
  - en palanquines
  - en carretas cubiertas
  lexicon: HALOT
  rationale: Se mantiene una solución que indique vehículo de transporte de personas; «literas» conserva la rareza del término y sugiere el sentido de transporte cubierto o llevado.
- source_word: וּבַפְּרָדִים
  english_pob_choice: on mules
  chosen_spanish: en mulas
  alternatives_spanish:
  - sobre mulas
  lexicon: HALOT
  rationale: פֶּרֶד corresponde claramente a «mula»; la forma plural española encaja con la enumeración de medios de viaje.
- source_word: וּבַכִּרְכָּרוֹת
  english_pob_choice: on camels
  chosen_spanish: en camellos
  alternatives_spanish:
  - en dromedarios
  - en carruajes
  lexicon: HALOT
  rationale: La lectura inglesa revisada opta por «camels»; en español «camellos» es la equivalencia natural y más transparente, sin forzar una precisión zoológica adicional que el hebreo difícil no exige.
- source_word: עַל הַר קָדְשִׁי יְרוּשָׁלַם
  english_pob_choice: to my holy mountain Jerusalem
  chosen_spanish: a mi santo monte, Jerusalén
  alternatives_spanish:
  - a Jerusalén, mi santo monte
  - sobre mi santo monte, Jerusalén
  lexicon: HALOT
  rationale: Se conserva la apposición entre «mi santo monte» y «Jerusalén»; «santo» mantiene la raíz de קָדֹשׁ y la puntuación ayuda a leer Jerusalén como especificación del monte.
- source_word: אָמַר יְהוָה
  english_pob_choice: says Yahweh
  chosen_spanish: dice Yahvé
  alternatives_spanish:
  - declara Yahvé
  - dijo Yahvé
  lexicon: HALOT
  rationale: La fórmula profética se vierte en presente con el nombre divino explícito, conforme al criterio del proyecto para YHWH.
- source_word: כַּאֲשֶׁר יָבִיאוּ
  english_pob_choice: just as ... bring
  chosen_spanish: así como ... traen
  alternatives_spanish:
  - tal como ... traen
  - como ... traen
  lexicon: HALOT
  rationale: «Así como» expresa con claridad la comparación entre la procesión de las naciones y la práctica cultual de Israel.
- source_word: בְנֵי יִשְׂרָאֵל
  english_pob_choice: the sons of Israel
  chosen_spanish: los hijos de Israel
  alternatives_spanish:
  - los hijos de Israel
  - los israelitas
  lexicon: HALOT
  rationale: Se conserva la fórmula filial del hebreo, que tiene valor tradicional y genealógico; «hijos» también mantiene el paralelismo verbal con «hermanos».
- source_word: אֶת הַמִּנְחָה
  english_pob_choice: the offering
  chosen_spanish: la ofrenda
  alternatives_spanish:
  - la ofrenda ritual
  - el tributo
  lexicon: HALOT
  rationale: Se repite «ofrenda» para mantener cohesión léxica entre la imagen general y la comparación final.
- source_word: בִּכְלִי טָהוֹר
  english_pob_choice: in a clean vessel
  chosen_spanish: en un recipiente limpio
  alternatives_spanish:
  - en un vaso limpio
  - en un recipiente puro
  lexicon: HALOT
  rationale: «Recipiente» es más amplio y moderno que «vaso»; «limpio» transmite la limpieza ritual de טָהוֹר sin añadir tecnicismo innecesario.
- source_word: בֵּית יְהוָה
  english_pob_choice: the house of Yahweh
  chosen_spanish: la casa de Yahvé
  alternatives_spanish:
  - el templo de Yahvé
  lexicon: HALOT
  rationale: Se mantiene el modismo hebreo «casa de Yahvé», que es más fiel que sustituirlo por «templo» como explicación interpretativa.
theological_decisions:
- issue: Alcance de «sus hermanos»
  english_pob_reading: The phrase refers primarily to dispersed Israelites/kinsmen being brought from the nations, while the wording may also resonate more broadly with eschatological ingathering.
  chosen_spanish_reading: La frase se refiere primariamente a hermanos/consanguíneos de Israel dispersos entre las naciones, sin resolver si el eco escatológico se abre a un alcance más amplio.
  alternative_spanish_readings:
  - Se refiere a gentiles convertidos como la ofrenda
  - Se refiere de manera inclusiva a todos los adoradores provenientes de las naciones
  rationale: La comparación con los hijos de Israel y el lenguaje de parentesco favorecen una lectura centrada en Israel. La traducción conserva esa tensión sin cerrarla interpretativamente.
  doctrine_reference: Preservar la tensión teológica en lugar de resolverla.
- issue: Relación entre la ofrenda y el medio de transporte
  english_pob_reading: The nations bring the dispersed as an offering to Yahweh, traveling by various conveyances.
  chosen_spanish_reading: Las diversas monturas y vehículos describen el modo de traer la ofrenda, no alteran su carácter dedicado a Yahvé.
  alternative_spanish_readings:
  - Los medios de transporte son una imagen meramente ornamental
  - La ofrenda misma es los hermanos traídos
  rationale: El hebreo acumula medios de transporte antes de volver a la imagen cultual de la ofrenda; el español debe conservar esa estructura sin fundir indebidamente las imágenes.
  doctrine_reference: Mantener la distinción entre metáfora de traslado e imagen de ofrenda.
translation_notes:
  revision_awareness: Tomé como base la revisión inglesa más reciente, que prefirió «camels» en lugar de «dromedaries», y la trasladé a «camellos» en español. También mantuve la lectura auditada del verso como un cuadro de reunión escatológica con lenguaje cultual, evitando resolver la tensión interpretativa sobre el alcance de «sus hermanos».
  spanish_consistency_notes:
  - Conservo «Yahvé» para el Tetragrámaton, de acuerdo con el criterio del proyecto.
  - Uso «ofrenda» de manera consistente para מִנְחָה en ambas apariciones.
  - Mantuve la serie de medios de transporte con preposición repetida («en») para reflejar la enumeración hebrea.
  - Respeté la distinción entre «santo monte» y «casa de Yahvé» como fórmulas distintas.
  - No neutralicé sistemáticamente «hermanos» ni «hijos de Israel», para preservar el lenguaje del texto fuente.
