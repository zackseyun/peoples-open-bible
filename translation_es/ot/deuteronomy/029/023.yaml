translation:
  language: es
  text: 'Y todas las naciones dirán[a]: «¿Por qué Yahvé ha hecho así a esta tierra? ¿Por qué este gran ardor de ira?»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, de manera más formal: «¿Por qué Yahvé ha hecho así a esta tierra? ¿Por qué esta gran fiereza de ira?»'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְאָמְרוּ
  english_pob_choice: And all the nations will say
  chosen_spanish: Y ... dirán
  alternatives_spanish:
  - Y ... dirán
  - Entonces ... dirán
  lexicon: HALOT
  rationale: El perfecto con וְ en este contexto profético se entiende como futuro de anuncio. En español, «dirán» comunica naturalmente esa certeza futura y mantiene la conexión discursiva con «Y».
- source_word: כָּל הַגּוֹיִם
  english_pob_choice: all the nations
  chosen_spanish: todas las naciones
  alternatives_spanish:
  - todos los pueblos
  - cada nación
  lexicon: HALOT
  rationale: גּוֹיִם designa aquí a pueblos/naciones extranjeros observando el juicio sobre la tierra. «Naciones» conserva el alcance colectivo y el registro bíblico adecuado.
- source_word: עַל מֶה
  english_pob_choice: Why
  chosen_spanish: ¿Por qué?
  alternatives_spanish:
  - ¿Con qué motivo?
  - ¿A causa de qué?
  lexicon: HALOT
  rationale: La expresión idiomática introduce una pregunta de causa. «¿Por qué?» es la equivalencia española más natural sin perder el sentido causal.
- source_word: עָשָׂה יְהוָה כָּכָה
  english_pob_choice: has Yahweh done thus
  chosen_spanish: Yahvé ha hecho así
  alternatives_spanish:
  - Yahvé ha hecho esto
  - Yahvé ha obrado de esta manera
  lexicon: HALOT
  rationale: עָשָׂה כָּכָה significa «hacer así/de este modo». «Ha hecho así» mantiene la forma general del hebreo y su tono solemne sin volverse artificial en español.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: Se conserva el nombre divino en su forma acordada para el POB español. «Yahvé» evita la sustitución por un título y refleja el Tetragrámaton con consistencia editorial.
- source_word: לָאָרֶץ הַזֹּאת
  english_pob_choice: to this land
  chosen_spanish: a esta tierra
  alternatives_spanish:
  - a esta tierra
  - sobre esta tierra
  lexicon: HALOT
  rationale: אָרֶץ aquí se refiere a la tierra del pacto sometida al juicio. En español, «tierra» es más fiel que «país» o «territorio», y la preposición «a» expresa bien el complemento del verbo.
- source_word: מֶה חֳרִי הָאַף הַגָּדוֹל הַזֶּה
  english_pob_choice: Why this great burning anger?
  chosen_spanish: ¿Qué significa este gran ardor de ira?
  alternatives_spanish:
  - ¿Qué es este gran ardor de ira?
  - ¿Por qué este gran ardor de ira?
  lexicon: HALOT
  rationale: 'La segunda מֶה puede funcionar como exclamación/interrogación de sentido: «¿qué es/qué significa?». «Ardor de ira» conserva la metáfora de calor/quemadura de חֳרִי y la fuerza idiomática de אַף como ira. Se evita «furia» para no borrar el matiz de ardor.'
theological_decisions:
- issue: Nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Jehová
  rationale: El texto hebreo usa directamente el Tetragrámaton. La edición española del POB conserva el nombre divino como «Yahvé» para mantener transparencia con la fuente y coherencia doctrinal.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: 'Expresión idiomática de ira: חֳרִי הָאַף'
  english_pob_reading: burning anger
  chosen_spanish_reading: ardor de ira
  alternative_spanish_readings:
  - ardor de enojo
  - fierza de ira
  rationale: El hebreo acumula una metáfora de calor/ardor con אַף como ira. «Ardor de ira» conserva la imagen corporal y el peso emocional sin suavizarla con un término más abstracto.
  doctrine_reference: Lexical imagery in Hebrew poetry/legal prose
translation_notes:
  revision_awareness: El pasaje coincide con la revisión más reciente marcada como sin cambios; se mantuvo la lectura de Yahvé y la equivalencia óptima para las dos preguntas retóricas, con ajuste del español para mayor naturalidad y preservación de la metáfora del ardor.
  spanish_consistency_notes:
  - Se usa «Yahvé» de forma consistente para יְהוָה.
  - Se mantiene «tierra» para אָרֶץ en sentido de tierra del pacto.
  - Se preserva la repetición interrogativa con dos preguntas, como en el hebreo y en el audit trail inglés.
  - «Ardor de ira» conserva la imagen semítica de calor/quemadura sin convertirla en una simple palabra abstracta.
