translation:
  text: Jesus said[1], "The one who knows the All, yet lacks himself[a][x][t][3][2],
    is lacking in every respect."
  philosophy: optimal-equivalence
  footnotes:
  - marker: '1'
    text: “the All” renders ⲡⲧⲏⲣϥ; alternatives include “the whole” or “everything.”
      Thomas often uses “the All” with cosmic scope (cf. the work’s internal usage).
    reason: lexical_alternative
  - marker: '2'
    text: '“lacks himself” translates ⲉⲣⲉ ⲛⲧⲟϥ ⲣϭⲣⲱϩ ⲟⲩⲁⲁ ⲛⲧⲟϥ; alternatives: “is
      lacking in himself,” or “is lacking (alone/by himself).” The ⲟⲩⲁⲁ + pronoun
      construction supports a reflexive nuance.'
    reason: lexical_alternative
  - marker: '3'
    text: “in every respect” reflects idiomatic ⲛⲡⲙⲁ ⲧⲏⲣⲛⲧⲟϥ (‘in the place [of him]
      all’), an adverbial totality phrase.
    reason: dialect_note
  - marker: t
    text: 'NH II, 45.20: the second subject pronoun is supplied by the editor (⟨ϥ⟩)
      and normalized as ⲛⲧⲟϥ; the scribe likely omitted it. Meaning is unchanged.'
    reason: lacuna_or_restoration
  - marker: x
    text: Thematically compare Mark 8:36; Matt 16:26; Luke 9:25 (gain the world vs.
      loss of self), noting that Thomas’s diction is distinct.
    reason: cross_reference
  - marker: a
    text: Or 'Jesus said, "The one who has come to know the All, yet lacks himself,
      is lacking in every respect."'.
    reason: previous_rendering
lexical_decisions:
- source_word: ⲥⲟⲟⲩⲛ (with ⲡⲉⲧⲉⲣⲉ‑)
  chosen: has come to know
  alternatives:
  - knows
  lexicon: Crum; Layton (relative perfect)
  rationale: ⲡⲉⲧⲉⲣⲉ‑ marks the relative perfect; rendering as “has come to know” preserves
    perfective nuance without overloading the English.
- source_word: ⲡⲧⲏⲣϥ
  chosen: the All
  alternatives:
  - the whole
  - everything
  lexicon: Crum; Layton
  rationale: ⲧⲏⲣ with pronominal suffix often means “the whole (of it).” In Thomas,
    ⲡⲧⲏⲣϥ frequently carries a cosmological sense (“the All”); retaining “the All”
    preserves Thomas’s deliberate strangeness and intertextual resonance.
- source_word: ⲣϭⲣⲱϩ
  chosen: lack
  alternatives:
  - be needy
  - be deficient
  - be deprived
  lexicon: Crum
  rationale: Intransitive use meaning ‘to be in want/lack’ fits the context and Thomasine
    idiom of deficiency vs. wholeness.
- source_word: ⲟⲩⲁⲁ (with ⲛⲧⲟϥ)
  chosen: himself
  alternatives:
  - alone
  - by himself
  - in himself
  lexicon: Crum
  rationale: ⲟⲩⲁⲁ ‘alone’ with dependent pronoun ⲛⲧⲟϥ yields a reflexive sense. Rendering
    as “lacks himself” keeps the paradoxical edge; “alone/by himself” are noted alternatives.
- source_word: ⲛⲡⲙⲁ ⲧⲏⲣⲛⲧⲟϥ
  chosen: in every respect
  alternatives:
  - entirely
  - altogether
  lexicon: Layton (syntax); Crum (ⲙⲁ)
  rationale: The idiom ‘in the place all-of-him’ functions adverbially for totality;
    “in every respect” is clear yet formally close.
textual_note: 'Dialect: Sahidic with Lycopolitan coloring. Line 20 shows an editorially
  supplied subject pronoun before the second ⲣϭⲣⱥϩ: Dilley prints ⟨ϥ⟩, normalized
  to ⲛⲧⲟϥ. The phrase-joined form has ⲟⲩⲁⲁϥ, while normalization reads ⲟⲩⲁⲁⲛⲧⲟϥ; both
  reflect the ‘alone + 3ms’ construction. No lacunae affecting meaning. The construction
  ⲛⲡⲙⲁ ⲧⲏⲣⲛⲧⲟϥ is an idiomatic totalizer (“in every respect”). No known POxy Greek
  overlap for this logion.'
