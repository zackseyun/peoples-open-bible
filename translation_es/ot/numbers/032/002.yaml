  to: 'Entonces vinieron los hijos de Gad y los hijos de Rubén, y dijeron a Moisés, al sacerdote Eleazar y a los jefes[a] de la congregación, diciendo:'
  rationale: Se cambia 'se acercaron' por 'vinieron' para ajustarse mejor al valor narrativo simple de וַיָּבֹאוּ y al expediente inglés. Se elimina la nota errónea sobre 'hijos de Gad'/'hijos de Rubén' porque el texto principal ya conserva el literal y la nota existente estaba mal formulada. Se conserva una sola nota útil sobre 'jefes/príncipes' para reflejar la alternativa léxica de נְשִׂיאֵי הָעֵדָה. No se requiere adjudicación adicional.
