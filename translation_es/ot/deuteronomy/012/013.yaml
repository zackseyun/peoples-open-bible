review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura hebrea de advertencia: הִשָּׁמֶר לְךָ = «Ten cuidado», פֶּן = «no sea que», תַּעֲלֶה = «ofrezcas», y אֲשֶׁר תִּרְאֶה = «que veas». También mantiene correctamente el enfoque específico en los holocaustos y no sobreextiende el sentido a toda adoración. Sin embargo, «en todo lugar» en español puede sonar menos natural y algo ambiguo; «en cualquier lugar» comunica mejor la prohibición de ofrecerlos en un sitio escogido libremente, sin alterar el sentido contextual. Además, conviene pulir la nota para un español más idiomático.'
  spanish_quality_summary: El texto es claro y fiel, pero requiere un ajuste menor de naturalidad. «Ten cuidado, no sea que…» es comprensible, aunque en español bíblico actual suele fluir mejor «Ten cuidado de no…» o se conserva la construcción con nota alternativa. Dado que el proyecto auditó la alternativa, puede mantenerse la línea principal cercana al inglés y reparar solo la expresión locativa. «Holocaustos» es técnicamente válido y eclesialmente reconocible, aunque para algunos lectores modernos puede evocar primero el uso histórico extrabíblico; aun así aquí sigue siendo aceptable por el contexto sacrificial.
  glossary_alignment: No hay conflicto con la terminología base del proyecto. No aparece Yahvé ni otros términos sensibles del glosario. «Holocaustos» concuerda con la decisión cultual para עֹלֹתֶיךָ; «ofrezcas» preserva bien el valor de תַּעֲלֶה. La revisión propuesta no altera ninguna decisión teológica documentada.
  issues:
  - severity: medium
    issue: «en todo lugar» suena menos idiomático en este contexto prohibitivo
    rationale: Aunque calca bien בְּכָל מָקוֹם / 'in every place', en español la advertencia contra lugares escogidos arbitrariamente se expresa con más naturalidad como «en cualquier lugar». Esto evita una lectura distributiva rígida poco natural sin importar una interpretación más amplia que la fuente.
  - severity: low
    issue: Redacción de la nota alternativa algo rígida
    rationale: 'La nota actual «O: “Ten cuidado de no ofrecer…”» es entendible, pero puede pulirse levemente para mayor naturalidad tipográfica y de estilo, manteniendo la misma alternativa léxica auditada.'
  revised_spanish_text: Ten cuidado, no sea que ofrezcas tus holocaustos en cualquier lugar que veas.[a]
  revised_footnotes:
  - marker: a
    text: 'O: «Ten cuidado de no ofrecer tus holocaustos en cualquier lugar que veas».

      '
    reason: lexical_alternative
  revision_rationale: Se hace una reparación menor para mejorar la naturalidad del español en la frase locativa, sin apartarse del sentido hebreo ni de la decisión teológica documentada. Se conserva la advertencia principal y se mantiene la alternativa auditada en una nota más pulida.
