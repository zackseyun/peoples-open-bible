  rationale: Se reestructuró la oración para producir un español gramatical y natural sin perder el demostrativo enfático del hebreo al inicio y al final ('esto... eso'). Se mantuvo el plural 'aguas' y los términos zoológicos 'aletas y escamas'. Se cambió el principal de נְחָלִים a 'corrientes' para reflejar mejor la elección auditada 'streams', dejando 'ríos' como alternativa en nota. El marcador de nota se movió a la palabra pertinente.
