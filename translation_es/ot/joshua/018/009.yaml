translation:
  language: es
  text: Así que los hombres fueron y atravesaron la tierra[a], y la describieron por escrito por ciudades, en siete porciones, en un libro[b]; y llegaron a Josué, al campamento de Siló.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «según las ciudades»; la frase indica que el reconocimiento de la tierra se organizó ciudad por ciudad.
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «sobre un libro o rollo» (עַל־סֵפֶר); es decir, en un documento escrito.'
    reason: cultural_note
lexical_decisions:
- source_word: וַיֵּלְכוּ
  english_pob_choice: went
  chosen_spanish: fueron
  alternatives_spanish:
  - se fueron
  - salieron
  lexicon: HALOT
  rationale: הלך en esta secuencia narrativa introduce el movimiento de los hombres. «Fueron» es natural en español, conserva la simplicidad del verbo hebreo y evita añadir matices no expresados.
- source_word: הָאֲנָשִׁים
  english_pob_choice: the men
  chosen_spanish: los hombres
  alternatives_spanish:
  - los varones
  - los hombres enviados
  lexicon: HALOT
  rationale: אֲנָשִׁים se refiere aquí a los representantes masculinos previamente comisionados. «Los hombres» mantiene la referencia definida y coincide con el uso general del pasaje.
- source_word: וַיַּעַבְרוּ בָאָרֶץ
  english_pob_choice: passed through the land
  chosen_spanish: atravesaron la tierra
  alternatives_spanish:
  - recorrieron la tierra
  - pasaron por la tierra
  lexicon: HALOT
  rationale: עבר con בָאָרֶץ describe recorrer el territorio en un reconocimiento. «Atravesaron la tierra» conserva la idea de tránsito por la región sin sonar demasiado explicativo.
- source_word: וַיִּכְתְּבוּהָ
  english_pob_choice: they wrote it down
  chosen_spanish: la escribieron
  alternatives_spanish:
  - la registraron
  - la anotaron
  lexicon: HALOT
  rationale: El sufijo femenino singular remite a «la tierra». En español, «la escribieron» comunica el acto de poner por escrito el levantamiento o registro, sin forzar una perífrasis innecesaria.
- source_word: לֶעָרִים
  english_pob_choice: by cities
  chosen_spanish: por ciudades
  alternatives_spanish:
  - según las ciudades
  - ciudad por ciudad
  lexicon: HALOT
  rationale: La frase indica el principio organizador del registro. «Por ciudades» mantiene la relación distributiva que el hebreo sugiere y suena natural en español.
- source_word: לְשִׁבְעָה חֲלָקִים
  english_pob_choice: in seven portions
  chosen_spanish: en siete porciones
  alternatives_spanish:
  - en siete partes
  - para siete repartos
  lexicon: HALOT
  rationale: חֲלָקִים son divisiones o porciones. «Porciones» preserva el lenguaje de reparto territorial con suficiente literalidad para este contexto.
- source_word: עַל סֵפֶר
  english_pob_choice: in a book
  chosen_spanish: en un libro
  alternatives_spanish:
  - en un rollo
  - en un documento escrito
  lexicon: HALOT
  rationale: סֵפֶר puede referirse a un documento escrito o rollo. «En un libro» sigue la equivalencia de la POB inglesa y comunica claramente el sentido de un registro escrito, aunque el soporte antiguo fuera probablemente un rollo.
- source_word: וַיָּבֹאוּ אֶל יְהוֹשֻׁעַ
  english_pob_choice: they came to Joshua
  chosen_spanish: llegaron a Josué
  alternatives_spanish:
  - vinieron a Josué
  - regresaron a Josué
  lexicon: HALOT
  rationale: El verbo dice simplemente «vinieron/llegaron». «Llegaron a Josué» es idiomático en español y no añade el matiz de retorno que el hebreo no explicita por sí solo.
- source_word: אֶל הַמַּחֲנֶה שִׁלֹה
  english_pob_choice: at the camp in Shiloh
  chosen_spanish: al campamento en Silo
  alternatives_spanish:
  - al campamento de Silo
  - al campamento, en Silo
  lexicon: HALOT
  rationale: La frase sitúa a Josué y al grupo en su ubicación. «Al campamento en Silo» reproduce el valor locativo con una construcción clara y sobria en español.
translation_notes:
  revision_awareness: 'El draft sigue el pass de alta concordancia sin cambios sustantivos: conserva la estructura narrativa, el orden de acciones y las dos notas léxicas ya documentadas en el audit trail inglés, adaptándolas a un español natural y publicable.'
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» no porque aparezca en el versículo, sino para respetar la terminología general del proyecto cuando corresponda; aquí no entra en la redacción.
  - Se eligió «por ciudades» para conservar la ambigüedad distributiva de לֶעָרִים, con nota alternativa que explicita la posibilidad «según las ciudades».
  - «Libro» reproduce la decisión inglesa de no restringir el soporte a «rollo» en el texto principal, dejando la precisión cultural en nota.
  - «Josué» se conserva como forma española estable del nombre propio; «Silo» sigue la forma hispana habitual del topónimo.
