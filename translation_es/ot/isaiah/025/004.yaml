translation:
  language: es
  text: Porque tú has sido un baluarte para el pobre, un baluarte para el necesitado en su angustia, un refugio contra la tormenta, una sombra contra el calor; porque el aliento[a] de los violentos es como una tormenta contra un muro[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «el soplo de los violentos»; רוּחַ puede significar «aliento», «viento» o «soplo» según el contexto.
    reason: lexical_alternative
  - marker: b
    text: O «como una tormenta golpeando un muro» o «como un aguacero contra un muro».
    reason: lexical_alternative
lexical_decisions:
- source_word: מָעוֹז
  english_pob_choice: stronghold
  chosen_spanish: baluarte
  alternatives_spanish:
  - fortaleza
  - refugio
  lexicon: HALOT
  rationale: Se preserva la idea de un punto de protección defensiva y se mantiene la repetición enfática del hebreo. «Baluarte» comunica mejor la imagen de defensa que «refugio», que aparece después como מַחְסֶה.
- source_word: דָּל
  english_pob_choice: poor
  chosen_spanish: pobre
  alternatives_spanish:
  - débil
  - humilde
  lexicon: HALOT
  rationale: En paralelo con אֶבְיֹון, el término describe vulnerabilidad social. «Pobre» es natural y fiel en español, sin cargar una lectura moral o meramente espiritual.
- source_word: אֶבְיֹון
  english_pob_choice: needy
  chosen_spanish: necesitado
  alternatives_spanish:
  - pobre
  - menesteroso
  lexicon: HALOT
  rationale: Se conserva la distinción respecto de דָּל mediante un segundo término de necesidad. «Necesitado» es claro y mantiene el sentido de carencia material o social.
- source_word: בַּצַּר לוֹ
  english_pob_choice: in his distress
  chosen_spanish: en su angustia
  alternatives_spanish:
  - en su aflicción
  - en su tribulación
  lexicon: HALOT
  rationale: La expresión señala la situación de apuro o estrechez del necesitado. «Angustia» es idiomática en español y preserva el 3ms sin paraphrasear.
- source_word: מַחְסֶה
  english_pob_choice: refuge
  chosen_spanish: refugio
  alternatives_spanish:
  - amparo
  - shelter
  lexicon: HALOT
  rationale: «Refugio» es el equivalente más directo y conserva el matiz de protección sin duplicar demasiado el valor defensivo de מָעוֹז.
- source_word: זֶרֶם
  english_pob_choice: storm
  chosen_spanish: tormenta
  alternatives_spanish:
  - aguacero
  - torrente
  lexicon: HALOT
  rationale: En la imagen poética de amenaza climática, «tormenta» funciona naturalmente en español y puede abarcar la fuerza destructiva sugerida por el contexto.
- source_word: צֵל
  english_pob_choice: shade
  chosen_spanish: sombra
  alternatives_spanish:
  - sombra fresca
  - amparo
  lexicon: HALOT
  rationale: «Sombra» es el correlato normal en español bíblico para el alivio del calor. Se evita ampliar a «sombra fresca», que añade un matiz no explícito.
- source_word: חֹרֶב
  english_pob_choice: heat
  chosen_spanish: calor
  alternatives_spanish:
  - ardor
  - calor abrasador
  lexicon: HALOT
  rationale: El contraste con «sombra» favorece el sentido de calor intenso. «Calor» es sobrio y fiel, sin introducir una explicación más amplia.
- source_word: רוּחַ
  english_pob_choice: breath
  chosen_spanish: aliento
  alternatives_spanish:
  - soplo
  - viento
  - respiración
  lexicon: HALOT
  rationale: El POB inglés optó por «breath» para preservar la fuerza física/violenta del término. «Aliento» mantiene esa concreción en español y permite la comparación figurada con la tormenta.
- source_word: עָרִיצִים
  english_pob_choice: the ruthless
  chosen_spanish: los violentos
  alternatives_spanish:
  - los crueles
  - los tiranos
  lexicon: HALOT
  rationale: El hebreo describe agresores opresivos y despiadados. «Los violentos» expresa la fuerza agresiva sin restringir innecesariamente el alcance político de «tiranos».
- source_word: קִיר
  english_pob_choice: wall
  chosen_spanish: muro
  alternatives_spanish:
  - pared
  - muralla
  lexicon: HALOT
  rationale: «Muro» reproduce bien la imagen de una estructura golpeada por la tormenta y suena más natural en español que «pared» en este contexto poético.
theological_decisions:
- issue: Imagen de protección divina sin expansión doctrinal
  english_pob_reading: Retain the concrete protective metaphors ('stronghold,' 'refuge,' 'shade') without allegorical expansion.
  chosen_spanish_reading: Mantener las metáforas concretas de protección («baluarte», «refugio», «sombra») sin ampliarlas alegóricamente.
  alternative_spanish_readings:
  - paráfrasis espiritual sobre consuelo o salvación
  - expansión doctrinal de la imagen
  rationale: El verso presenta de forma poética la protección de Dios mediante imágenes físicas de resguardo. La traducción debe conservar esa concreción sin añadir interpretaciones que el hebreo no exige.
  doctrine_reference: Principio de primacía del original; no importar afirmaciones doctrinales que el texto no formula.
translation_notes:
  revision_awareness: 'La revisión más reciente no introdujo cambios: el texto fuente y la lectura inglesa auditada permanecen estables, con acuerdo alto en la evaluación cruzada.'
  spanish_consistency_notes:
  - Se conserva la repetición de la idea de amparo para reflejar el paralelismo hebreo entre מָעוֹז y מַחְסֶה.
  - «Baluarte» se usa para la primera imagen defensiva y «refugio» para la segunda, evitando uniformar indebidamente términos distintos.
  - «Aliento» mantiene la tensión lexical de רוּחַ que el audit trail inglés también preserva con una nota alternativa.
  - Se evita «SEÑOR» en favor de una traducción directa del texto hebreo, que aquí no contiene el Tetragrámaton.
  - El plural «los violentos» refleja el sustantivo plural hebreo y mantiene el tono moral del adjetivo עָרִיצִים.
