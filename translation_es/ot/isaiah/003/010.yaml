review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja en general el sentido del hebreo: un mandato de declarar bienestar para el justo porque comerá el fruto de sus obras. Sin embargo, no preserva fielmente la forma verbal plural inicial אִמְרוּ (''digan/decid'') y además neutraliza en el texto el cambio de número documentado en el hebreo y conservado por el POB inglés en la cláusula final. La nota actual reconoce el cambio, pero el texto principal lo elimina.'
  spanish_quality_summary: El español es legible, pero 'Di del justo' suena menos natural que 'Digan del justo' o 'Digan del justo que...'. Además, la nota contiene una formulación poco pulida ('él/ellos comerá(n)') y una alternativa menos idiomática ('es bueno'). Conviene ajustar el verso para que suene natural y a la vez más cercano al perfil del proyecto.
  glossary_alignment: 'No hay términos del glosario mayor en juego aquí. ''Justo'' y ''fruto de sus obras'' son elecciones adecuadas. El principal problema no es terminológico sino de fidelidad sintáctica: el imperativo plural y el cambio de singular representativo a plural en la cláusula final.'
  issues:
  - severity: high
    issue: Imperativo plural hebreo renderizado como singular 'Di'
    rationale: אִמְרוּ es 2mp imperativo. El borrador justifica un singular impersonal, pero eso abandona un rasgo explícito de la forma fuente sin necesidad. En español, 'Digan' conserva mejor el valor exhortativo y suena natural.
  - severity: high
    issue: El texto principal elimina el cambio de número del hebreo en la cláusula final
    rationale: El hebreo pasa de צַדִּיק singular representativo a יֹאכֵלוּ / מַעַלְלֵיהֶם plurales. El POB inglés preserva esto en el texto principal. El español borrador fuerza 'comerá ... sus obras' en singular, contrariando la decisión auditada y reduciendo fidelidad formal significativa.
  - severity: medium
    issue: La nota al pie está redactada de manera poco natural en español
    rationale: La fórmula 'él/ellos comerá(n)' es torpe y visualmente extraña. También 'que es bueno' no expresa bien la alternativa más formal; 'que es bueno' podría entenderse moralmente del justo, no existencialmente sobre su situación.
  revised_spanish_text: Digan del justo que le irá bien[a], porque comerán el fruto de sus obras.
  revised_footnotes:
  - marker: a
    text: 'O, más formalmente: «Digan del justo que es bueno, porque él/ellos comerá/comerán el fruto de sus obras». El hebreo pasa de un singular representativo («justo») a formas plurales en la cláusula final.'
    reason: lexical_alternative
  revision_rationale: Se corrige el imperativo a plural para reflejar אִמְרוּ y se restaura en el texto principal el cambio de número de singular representativo a plural en la cláusula final, en línea con la evidencia hebrea y con la decisión del POB inglés. Se mantiene 'el justo' como singular representativo, pero con 'comerán' y 'sus obras' para preservar el rasgo fuente relevante. La nota se conserva, con redacción más clara.
