translation:
  language: es
  text: Porque grande es Yahvé, que lo hizo[a], y por su palabra su poderoso prevalece[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Masada conserva solo la primera cola («Porque grande es Yahvé, que lo hizo»); el hebreo de la Guenizá de El Cairo continúa con una lectura difícil, y el paralelo griego apoya el sentido «por su palabra apresura su curso».
    reason: textual_variant
  - marker: b
    text: O «a su mandato dirige su curso». Lit. «su poderoso»; el hebreo final es oscuro, y esta traducción conserva la cautela del texto base sin resolver de más el pasaje.
    reason: lexical_alternative
lexical_decisions:
- source_word: גדול / μέγας
  english_pob_choice: great
  chosen_spanish: grande
  alternatives_spanish:
  - poderoso
  - magnífico
  lexicon: HALOT / LXX μέγας
  rationale: En un himno de alabanza, «grande» reproduce de forma directa el predicado de magnitud/excelencia sin sobrerredefinirlo como una cualidad distinta. «Poderoso» sería posible, pero desplaza el matiz hacia fuerza más que grandeza.
- source_word: ה' / Κύριος
  english_pob_choice: the Lord
  chosen_spanish: el Señor
  alternatives_spanish:
  - Yahvé
  - el Dueño
  lexicon: Convención POB para el nombre divino
  rationale: La tradición editorial del POB en español suele reservar «Yahvé» para el tetragrámaton explícito, pero aquí el testimonio hebreo ofrece la abreviatura reverencial ה׳ y el griego Κύριος. En español, «el Señor» conserva el valor reverente y el eco bíblico sin falsear el testimonio base.
- source_word: עושהו / ὁ ποιήσας αὐτόν
  english_pob_choice: who made it
  chosen_spanish: que lo hizo
  alternatives_spanish:
  - su hacedor
  - que lo creó
  lexicon: HALOT / LXX ποιέω
  rationale: El contexto de Sirácida 43 habla de un astro; por eso el pronombre neutro de la versión inglesa corresponde naturalmente a «lo» en español. «Hizo» mantiene el acto creador o formativo sin añadir «crear», que sería más fuerte de lo que el verbo exige.
- source_word: בדבריו / ἐν λόγοις αὐτοῦ
  english_pob_choice: by his word
  chosen_spanish: por su palabra
  alternatives_spanish:
  - con sus palabras
  - al mandato de él
  lexicon: HALOT / λόγος
  rationale: La preposición instrumental admite «por» en español y el singular «palabra» sigue la decisión inglesa de no pluralizar innecesariamente. «Al mandato de él» explicita una lectura posible, pero introduce interpretación donde el texto permite una formulación más sobria.
- source_word: ינצח / κατέσπευσεν
  english_pob_choice: he hastens
  chosen_spanish: prevalece
  alternatives_spanish:
  - apresura
  - dirige su curso
  - empuja adelante
  lexicon: HALOT / LXX κατασπεύδω
  rationale: La revisión inglesa se apartó de la idea de movimiento para reflejar más de cerca la dificultad del hebreo final. Dado que el hebreo y el griego no convergen plenamente en una sola imagen, «prevalece» permite expresar eficacia/triunfo sin fijar indebidamente un mecanismo físico o astronómico que el crux textual no asegura.
- source_word: אביריו / πορείαν
  english_pob_choice: his mighty one
  chosen_spanish: su poderoso
  alternatives_spanish:
  - su poderoso ser
  - sus poderosos
  lexicon: HALOT / LXX πορεία
  rationale: El hebreo es crux textual y la revisión inglesa intentó evitar una solución demasiado interpretativa. En español, «su poderoso» conserva la tensión entre una posible lectura personal («su poderoso [ser]») y una más abstracta/funcional, sin forzar «curso» u otra explicación que el texto base no garantiza.
theological_decisions:
- issue: Divine name rendering in a doxological line
  english_pob_reading: the Lord
  chosen_spanish_reading: el Señor
  alternative_spanish_readings:
  - Yahvé
  - el Altísimo
  rationale: La línea es una confesión litúrgica de alabanza, pero el dato textual inmediato es la abreviatura reverencial hebrea y su paralelo griego Κύριος. «El Señor» preserva la reverencia y la política de traducción del POB sin introducir una transliteración que no corresponde al testimonio aquí usado.
  doctrine_reference: 'DOCTRINE.md: YHWH / divine name rendering'
- issue: Handling of the difficult second colon
  english_pob_reading: and by his word his mighty one prevails
  chosen_spanish_reading: y por su palabra prevalece su poderoso
  alternative_spanish_readings:
  - y por su palabra hastens its course
  - y por su palabra dirige su curso
  rationale: 'El hebreo final es oscuro y la historia editorial del inglés muestra una revisión para evitar importar un movimiento cósmico no explícito. La opción española conserva esa cautela: expresa el efecto eficaz de la palabra divina sin resolver el crux con una explicación más definida de la que los testigos permiten.'
  doctrine_reference: 'PHILOSOPHY.md: translate from Hebrew where it survives; use Greek parallel as input where clarifying, but do not over-resolve a crux'
translation_notes:
  revision_awareness: 'La redacción sigue el estado revisado del expediente inglés: se mantiene la afirmación inicial «great is the Lord who made it» y se evita trasladar de manera automática la antigua solución dinámica de «he hastens its course». La clausula final se conserva deliberadamente sobria para respetar el crux hebreo y el ajuste revisionado hacia una lectura menos interpretativa.'
  spanish_consistency_notes:
  - Se mantiene «Señor» para el nombre divino conforme al criterio del proyecto cuando el testimonio es la abreviatura reverencial/Κύριος.
  - Se usa «lo» porque el contexto de Sirácida habla de un astro y el referente en español es naturalmente neutro/impersonal.
  - «Palabra» en singular conserva la decisión auditada de no pluralizar λόγος בדבריו.
  - La última cláusula evita «curso/orbita» porque esa concreción no está asegurada por el hebreo final ni por la revisión inglesa más reciente.
