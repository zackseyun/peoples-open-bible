translation:
  language: es
  text: Tú eres radiante[a], más majestuoso que las montañas de caza.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «más majestuoso que las montañas de botín/despojo». El hebreo puede significar «presa» o, por extensión, «botín».
    reason: lexical_alternative
lexical_decisions:
- source_word: נָאוֹר
  english_pob_choice: radiant
  chosen_spanish: resplandeciente
  alternatives_spanish:
  - radiante
  - iluminado
  - fulgurante
  lexicon: HALOT
  rationale: El término describe brillo, esplendor o luminosidad. «Resplandeciente» conserva la imagen de brillo glorioso en un español natural y solemne. «Radiante» también sería posible; aquí se elige «resplandeciente» para mantener un matiz más poético sin perder la idea de luz.
- source_word: אַתָּה
  english_pob_choice: you are
  chosen_spanish: tú eres
  alternatives_spanish:
  - eres
  - tú
  lexicon: —
  rationale: El hebreo presenta una cláusula sin verbo explícito; en español se necesita el copulativo. «Tú eres» hace explícita la predicación y conserva el énfasis de segunda persona.
- source_word: אַדִּיר
  english_pob_choice: more majestic
  chosen_spanish: más majestuoso
  alternatives_spanish:
  - majestuoso
  - poderoso
  - glorioso
  lexicon: HALOT
  rationale: El adjetivo puede expresar majestad, nobleza o poder. Como la construcción es comparativa, el español requiere «más majestuoso» para reflejar la relación de comparación sin reducir el sentido a mera fuerza.
- source_word: מֵהַרְרֵי
  english_pob_choice: than the mountains of
  chosen_spanish: que las montañas de
  alternatives_spanish:
  - más que las montañas de
  - desde las montañas de
  - sobre las montañas de
  lexicon: HALOT
  rationale: El prefijo מִן puede expresar comparación («que») o separación («desde»). Siguiendo la lectura comparativa del POB inglés, «más majestuoso que» es la forma más natural en español y conserva el paralelismo poético.
- source_word: טָרֶף
  english_pob_choice: prey
  chosen_spanish: presa
  alternatives_spanish:
  - presa de caza
  - despojo
  - botín
  lexicon: HALOT
  rationale: El sustantivo puede significar presa arrancada por un depredador y, por extensión, despojo o botín. «Presa» preserva la imagen primaria de captura/depredación y funciona bien en la frase poética. Se evita «botín» en el texto principal para no cerrar prematuramente la imagen a un solo sentido.
theological_decisions:
- issue: Relación comparativa de מֵהַרְרֵי טָרֶף
  english_pob_reading: 'A comparison: God is more majestic than ''the mountains of prey.'''
  chosen_spanish_reading: 'Una comparación: eres más majestuoso que las montañas de presa.'
  alternative_spanish_readings:
  - Eres resplandeciente desde las montañas de presa.
  - Eres más majestuoso que las montañas de botín.
  rationale: La sintaxis con אַדִּיר favorece una lectura comparativa, no simplemente locativa. El español mantiene esa comparación con «más majestuoso que», sin resolver la imagen poética en una referencia histórica concreta. Se conserva así la ambigüedad controlada del hebreo y del POB inglés.
  doctrine_reference: Translation philosophy; preservation of poetic ambiguity
translation_notes:
  revision_awareness: 'El borrador sigue la lectura de alta concordancia del auditrial inglés: נָאוֹר como brillo/splendor, אַדִּיר en sentido comparativo, y מֵהַרְרֵי טָרֶף como una imagen poética abierta, sin forzar una interpretación histórica adicional.'
  spanish_consistency_notes:
  - Se mantiene el tratamiento reverencial de segunda persona singular («tú eres») acorde con la lectura directa del hebreo.
  - «Presa» conserva mejor la imaginería del hebreo que «botín» en el texto principal; la alternativa queda en nota para reflejar la tensión léxica documentada.
  - Se evita «SEÑOR» o «Yahvé» porque el versículo no contiene el nombre divino explícito; el sujeto pronominal ya está presente en el hebreo.
