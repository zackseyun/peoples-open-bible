translation:
  language: es
  text: Si se te presenta en el camino un nido de ave[a], en cualquier árbol o en el suelo, con polluelos o con huevos, y la madre está posada sobre los polluelos o sobre los huevos[b], no tomarás a la madre junto con las crías.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Cuando se te presente un nido de ave en el camino». El hebreo sugiere un hallazgo accidental, no una búsqueda deliberada.'
    reason: lexical_alternative
  - marker: b
    text: 'Literalmente: «la madre sobre los jóvenes». El hebreo usa esta expresión para indicar que la madre está sobre los polluelos o los huevos; la idea en la prohibición es no tomar a la madre junto con su cría.'
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי / יִקָּרֵא
  english_pob_choice: If ... happens to be
  chosen_spanish: Si se te presenta
  alternatives_spanish:
  - Cuando se te presente
  - Si se encuentra
  - Si ocurre que se encuentra
  lexicon: HALOT
  rationale: El hebreo introduce una situación casuística con encuentro incidental, no una búsqueda deliberada. 'Si se te presenta' conserva la condicionalidad y la idea de hallazgo fortuito en un español natural.
- source_word: קַן צִפּוֹר
  english_pob_choice: a bird’s nest
  chosen_spanish: un nido de ave
  alternatives_spanish:
  - un nido de pájaro
  - un nido de un ave
  lexicon: HALOT
  rationale: '''Nido de ave'' reproduce bien el constructo hebreo sin perder naturalidad. ''Pájaro'' sería más coloquial, pero ''ave'' mantiene un registro más general y sobrio.'
- source_word: לְפָנֶיךָ בַּדֶּרֶךְ
  english_pob_choice: before you on the way
  chosen_spanish: en el camino
  alternatives_spanish:
  - delante de ti en el camino
  - antes de ti en el camino
  - en tu camino
  lexicon: HALOT
  rationale: La idea espacial de algo que aparece en la ruta se expresa en español de manera más natural con 'en el camino'. La noción de presencia delante del caminante queda implícita en el contexto del hallazgo incidental.
- source_word: בְּכָל עֵץ א֣וֹ עַל הָאָרֶץ
  english_pob_choice: in any tree or on the ground
  chosen_spanish: en cualquier árbol o sobre la tierra
  alternatives_spanish:
  - en cualquier árbol o en el suelo
  - en cualquier árbol o sobre el suelo
  lexicon: HALOT
  rationale: '''Sobre la tierra'' sigue de cerca el hebreo y conserva el contraste con ''árbol''. ''En el suelo'' sería más idiomático en algunos contextos, pero aquí ''tierra'' mantiene el tono bíblico sin volverse arcaico.'
- source_word: אֶפְרֹחִים
  english_pob_choice: young ones
  chosen_spanish: polluelos
  alternatives_spanish:
  - crías
  - pichones
  - aves jóvenes
  lexicon: HALOT
  rationale: En contexto aviar, 'polluelos' es claro y preciso. Evita la vaguedad de 'crías' y suena más natural que 'aves jóvenes'.
- source_word: בֵיצִים
  english_pob_choice: eggs
  chosen_spanish: huevos
  lexicon: HALOT
  rationale: Traducción directa y transparente del hebreo.
- source_word: וְהָאֵם
  english_pob_choice: the mother
  chosen_spanish: la madre
  alternatives_spanish:
  - la madre ave
  - la madre pájaro
  lexicon: HALOT
  rationale: El hebreo dice simplemente 'la madre'. En español, 'la madre' conserva esa concisión y permite entender el contexto aviar por el resto de la frase.
- source_word: רֹבֶצֶת
  english_pob_choice: is sitting
  chosen_spanish: está echada
  alternatives_spanish:
  - está sentada
  - está cobijando
  - está empollando
  lexicon: HALOT
  rationale: '''Róbetzet'' expresa estar recostada o posada sobre los huevos o polluelos. ''Está echada'' conserva la imagen física sin añadir una interpretación demasiado técnica como ''empollando''.'
- source_word: לֹא תִקַּח
  english_pob_choice: you shall not take
  chosen_spanish: no tomarás
  alternatives_spanish:
  - no tomarás para ti
  - no cogerás
  lexicon: HALOT
  rationale: '''No tomarás'' preserva la forma legal prohibitiva y mantiene el paralelismo con la formulación normativa del hebreo.'
- source_word: הָאֵם עַל הַבָּנִים
  english_pob_choice: the mother along with the young
  chosen_spanish: a la madre junto con los hijos
  alternatives_spanish:
  - a la madre con los hijos
  - a la madre junto con la cría
  lexicon: HALOT
  rationale: '''Junto con'' expresa la idiomática hebrea de tomar la madre y la descendencia como conjunto. ''Hijos'' sigue el valor literal de בָּנִים, aunque en contexto animal puede referirse a la prole.'
theological_decisions:
- issue: Tratamiento de la norma casuística y su fuerza prohibitiva
  english_pob_reading: If ... you shall not take
  chosen_spanish_reading: Si ... no tomarás
  alternative_spanish_readings:
  - Cuando ... no tomarás
  - Si ... no tomes
  rationale: El hebreo presenta una ley condicional con mandato prohibitivo. 'Si ... no tomarás' conserva la estructura legal y su fuerza normativa sin suavizarla a mera observación.
  doctrine_reference: Derecho/casuística de la Torá
- issue: Ambigüedad de הַבָּנִים en contexto de animales
  english_pob_reading: the young
  chosen_spanish_reading: los hijos
  alternative_spanish_readings:
  - los polluelos
  - la cría
  - la descendencia
  rationale: La fuente hebrea usa 'hijos' literalmente, aunque el referente es animal. Se conserva ese valor para no borrar la tensión léxica, mientras el contexto aviar queda claro por 'nido', 'polluelos' y 'huevos'.
  doctrine_reference: Precisión semántica del hebreo bíblico
translation_notes:
  revision_awareness: 'Coincide con el contexto auditado en inglés: se mantiene la lectura casuística, el hallazgo incidental, ''mother'' como ''madre'' y la nota idiomática sobre ''the mother upon the young''. No se registran revisiones aplicadas en el origen; esta propuesta sigue esa estabilidad textual.'
  spanish_consistency_notes:
  - Se usa 'Yahvé' solo cuando aparezca el Nombre divino; este versículo no lo contiene.
  - '''Ave'' se eligió para mantener registro bíblico sobrio; no se fuerza ''pájaro''.'
  - '''Polluelos'' traduce el valor contextual de אֶפְרֹחִים sin alterar la referencia al nido.'
  - Se conserva la imagen idiomática de la madre 'echada sobre' los polluelos o huevos, alineada con la nota inglesa sobre la frase literal.
