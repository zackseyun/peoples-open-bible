translation:
  language: es
  text: He acercado mi justicia[a]; no está lejos, y mi salvación no tardará. Pondré salvación en Sion, para Israel mi esplendor[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «mi rectitud» o «mi vindicación» para «mi justicia».
    reason: lexical_alternative
  - marker: b
    text: O «mi gloria» para «mi esplendor».
    reason: lexical_alternative
lexical_decisions:
- source_word: קֵרַבְתִּי
  english_pob_choice: I have brought near
  chosen_spanish: He acercado
  alternatives_spanish:
  - Traigo cerca
  - He traído cerca
  - He hecho acercarse
  lexicon: HALOT
  rationale: El perfecto hebreo expresa acción completada con relevancia presente. «He acercado» conserva ese valor y suena natural en español bíblico moderno.
- source_word: צִדְקָתִי
  english_pob_choice: my righteousness
  chosen_spanish: mi justicia
  alternatives_spanish:
  - mi rectitud
  - mi vindicación
  - mi justicia rectificadora
  lexicon: HALOT
  rationale: En este contexto profético, צדקה puede abarcar justicia, rectitud y acto vindicador. Se opta por «justicia» como equivalente amplio y más natural en español, manteniendo la tensión teológica sin reducirla solo a una categoría forense.
- source_word: לֹא תִרְחָק
  english_pob_choice: it is not far away
  chosen_spanish: no está lejos
  alternatives_spanish:
  - no se alejará
  - no estará distante
  - no queda lejos
  lexicon: HALOT
  rationale: El verbo concuerda con «mi justicia». «No está lejos» transmite cercanía inmediata en un español claro, respetando el sentido de que no se halla a distancia.
- source_word: וּתְשׁוּעָתִי
  english_pob_choice: and my salvation
  chosen_spanish: y mi salvación
  alternatives_spanish:
  - y mi liberación
  - y mi victoria
  lexicon: HALOT
  rationale: «Salvación» preserva el uso isaiano amplio de תשועה y mantiene la repetición temática del versículo.
- source_word: לֹא תְאַחֵר
  english_pob_choice: will not delay
  chosen_spanish: no tardará
  alternatives_spanish:
  - no se demorará
  - no tardará en venir
  - no se retrasará
  lexicon: HALOT
  rationale: El imperfecto expresa futuro inminente. «No tardará» es breve, idiomático y fiel al valor de no demorarse.
- source_word: וְנָתַתִּי
  english_pob_choice: I will place
  chosen_spanish: Pondré
  alternatives_spanish:
  - Daré
  - Colocaré
  - Estableceré
  lexicon: HALOT
  rationale: נתן puede significar dar, poner o colocar. Con el complemento locativo, «pondré» comunica de manera natural la idea de establecer o situar algo en un lugar.
- source_word: בְצִיּוֹן
  english_pob_choice: in Zion
  chosen_spanish: en Sion
  alternatives_spanish:
  - en Zion
  lexicon: HALOT
  rationale: «Sion» es la forma española tradicional y transparente del topónimo, más natural para una lectura eclesial en español.
- source_word: תְּשׁוּעָה
  english_pob_choice: salvation
  chosen_spanish: salvación
  alternatives_spanish:
  - liberación
  lexicon: HALOT
  rationale: La repetición de «salvación» conserva el énfasis del hebreo y la coherencia terminológica del pasaje.
- source_word: לְיִשְׂרָאֵל
  english_pob_choice: for Israel
  chosen_spanish: para Israel
  alternatives_spanish:
  - a Israel
  - en favor de Israel
  lexicon: HALOT
  rationale: ל puede expresar beneficio o dirección. «Para Israel» conserva ese sentido benefactivo sin forzar una relación preposicional más específica.
- source_word: תִּפְאַרְתִּי
  english_pob_choice: my splendor
  chosen_spanish: mi esplendor
  alternatives_spanish:
  - mi gloria
  - mi belleza
  - mi honor
  lexicon: HALOT
  rationale: «Esplendor» preserva el matiz de majestad y honra sin absorber el término en el tecnicismo de «gloria». Mantiene además la ambigüedad productiva del hebreo al final del versículo.
theological_decisions:
- issue: Sentido de צִדְקָתִי en paralelo con תְּשׁוּעָתִי
  english_pob_reading: Retain 'my righteousness' as a broad theological term closely linked with God's saving action, without collapsing it into either moral attribute alone or forensic vindication alone.
  chosen_spanish_reading: Conservar «mi justicia» como término amplio, vinculado a la acción salvadora de Dios, sin reducirlo solo a justicia moral ni solo a vindicación forense.
  alternative_spanish_readings:
  - mi rectitud
  - mi vindicación
  - mi justicia vindicadora
  rationale: En Isaías, la justicia de Yahvé incluye su intervención fiel y salvadora. «Justicia» mantiene esa amplitud y deja visible la tensión entre atributo y acción salvífica.
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve it; consistency of key terms, or documented exception.'
- issue: Relación final entre תִּפְאַרְתִּי e Israel
  english_pob_reading: Translate the final phrase appositionally as 'for Israel my splendor,' leaving the compressed Hebrew relation intact.
  chosen_spanish_reading: Traducir la cláusula final como «para Israel mi esplendor», conservando la relación comprimida del hebreo.
  alternative_spanish_readings:
  - Israel, mi esplendor
  - mi esplendor para Israel
  - para Israel, mi gloria
  rationale: La sintaxis hebrea es breve y ambigua. «Para Israel mi esplendor» respeta el orden y deja abierta la relación exacta entre Israel y el esplendor divino, sin resolver en exceso la frase.
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: La redacción sigue la revisión más reciente del POB en la cláusula final, donde el sentido se ajusta a «for Israel my splendor». En español, se reflejó ese orden con «para Israel mi esplendor», evitando una paráfrasis que convierta a Israel en mera posesión o altere la ambigüedad del hebreo.
  spanish_consistency_notes:
  - Se mantuvo «Sion» como forma española habitual del topónimo.
  - Se conservó «salvación» en ambas apariciones de תשועה para reflejar la repetición hebrea.
  - Se evitó «SEÑOR» para יהוה porque este versículo no lo contiene explícitamente.
  - «Esplendor» se eligió como término consistente con el matiz de תפארת y con la nota alternativa «gloria».
