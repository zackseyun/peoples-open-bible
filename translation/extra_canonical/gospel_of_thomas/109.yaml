    | Azure: The rationale is correct on the Coptic. In Thomas 109 the sequence is
    effectively ''the buyer came/went; while he was digging/plowing (ⲉϥⲥⲕⲁⲉⲓ), he
    found the treasure (ⲁϥϩⲉ ⲉⲡⲁϩⲟ).'' The form ⲉϥⲥⲕⲁⲉⲓ is'
