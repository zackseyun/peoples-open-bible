review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura y el sentido general del hebreo: descendientes remanentes en la tierra, no destruidos por los hijos de Israel, a quienes Salomón impuso servicio laboral obligatorio, con continuidad ''hasta el día de hoy''. Sin embargo, el giro principal para וַיַּעֲלֵם לְמַס queda algo debilitado con ''los sometió a trabajo forzado''; el audit trail inglés documenta una fuerza administrativa más específica como ''conscripted them for forced labor'' / imposición de leva laboral.'
  spanish_quality_summary: El español es claro y legible, pero puede mejorarse en naturalidad y precisión. 'De los descendientes de ellos' suena algo pesado frente a 'De entre sus descendientes'. También conviene evitar la combinación de comas y raya de modo torpe. 'Los sometió a trabajo forzado' es comprensible, pero 'los reclutó para trabajo forzado' expresa mejor la imposición estatal sin sonar técnico en exceso.
  glossary_alignment: No hay términos del glosario mayor implicados salvo la designación nacional 'los hijos de Israel', que está bien conservada conforme a la justificación documentada. La nota sobre מַס debe mantener la idea de trabajo obligatorio estatal; 'tributo de trabajo' no es imposible, pero en español suena menos natural que 'leva laboral' o una explicación directa de labor obligatoria.
  issues:
  - severity: medium
    issue: '''los sometió a trabajo forzado'' atenúa la fuerza administrativa de וַיַּעֲלֵם לְמַס'
    rationale: El hebreo en este contexto no solo describe sujeción general, sino imposición/reclutamiento para servicio laboral obligatorio. 'Reclutó' o 'los puso bajo leva laboral' representa mejor la decisión léxica auditada.
  - severity: low
    issue: '''De los descendientes de ellos'' suena poco idiomático'
    rationale: Aunque fiel, en español general 'De entre sus descendientes' es más natural y mantiene exactamente el mismo referente.
  - severity: low
    issue: Puntuación mejorable alrededor del inciso
    rationale: La secuencia con coma, raya y otra coma resulta algo trabada. Puede aligerarse sin perder la estructura explicativa.
  - severity: low
    issue: Nota b usa 'tributo de trabajo', expresión poco natural
    rationale: La nota debe explicar מַס como labor obligatoria impuesta por el estado. La alternativa propuesta puede reformularse con mayor claridad para lectores hispanos.
  revised_spanish_text: De entre sus descendientes, que quedaron después de ellos en la tierra[a] —a quienes los hijos de Israel no habían destruido—, Salomón los reclutó para trabajo forzado[b], hasta el día de hoy.
