    text: O «Miren» o «Mira». El hebreo es una interjección profética de llamada de atención.
    reason: lexical_alternative
  - marker: b
    text: O «procederá con prudencia» o «prosperará». El verbo hebreo puede incluir la idea de actuar con sabiduría y también la de tener éxito.
    reason: lexical_alternative
