translation:
  language: es
  text: Bendice, Yahvé, su fuerza[a], y acepta la obra de sus manos. Aplasta los lomos de los que se levantan contra él, y de los que lo odian[b], para que no vuelvan a levantarse.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «su riqueza» o «su ejército»; el término hebreo puede denotar fuerza, recursos o fuerza militar.
    reason: lexical_alternative
  - marker: b
    text: 'Literalmente: «Aplasta los lomos de los que se levantan contra él». «Lomos» es una imagen hebrea de fuerza.'
    reason: cultural_note
lexical_decisions:
- source_word: בָּרֵךְ
  english_pob_choice: Bless
  chosen_spanish: Bendice
  alternatives_spanish:
  - Prospera
  - Bendice tú
  lexicon: HALOT
  rationale: El hebreo es un imperativo dirigido a Yahvé. «Bendice» reproduce directamente la petición sin introducir una interpretación más amplia como «prospera». El vocativo «oh» hace natural la apelación en español poético.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - SEÑOR
  lexicon: HALOT
  rationale: Se conserva el nombre divino revelado en el texto hebreo, de acuerdo con la norma del proyecto, en lugar de sustituirlo por un título.
- source_word: חֵילוֹ
  english_pob_choice: his strength
  chosen_spanish: su fuerza
  alternatives_spanish:
  - su riqueza
  - su ejército
  - su poder
  lexicon: HALOT
  rationale: חַיִל puede abarcar fuerza, recursos o fuerza militar. «Su fuerza» mantiene el campo semántico amplio sin estrecharlo indebidamente a riqueza o ejército.
- source_word: וּפֹעַל יָדָיו
  english_pob_choice: the work of his hands
  chosen_spanish: la obra de sus manos
  alternatives_spanish:
  - el trabajo de sus manos
  - lo que sus manos han hecho
  lexicon: HALOT
  rationale: La expresión hebrea es idiomática y concreta. «La obra de sus manos» conserva la imagen corporal y sugiere servicio u მოქმედidad sin perder naturalidad en español.
- source_word: תִּרְצֶה
  english_pob_choice: accept
  chosen_spanish: acepta
  alternatives_spanish:
  - te complazcas en
  - favorezcas
  lexicon: HALOT
  rationale: En este contexto culto y sacrificial, el verbo pide aprobación divina del servicio de Leví. «Acepta» es breve y fiel, sin especificar en exceso el matiz.
- source_word: מְחַץ
  english_pob_choice: Crush
  chosen_spanish: Aplasta
  alternatives_spanish:
  - Destroza
  - Golpea
  lexicon: HALOT
  rationale: El verbo es violento y poético. «Aplasta» transmite con fuerza la idea de quebrantar o hundir, de modo natural en español bíblico moderno.
- source_word: מָתְנַיִם
  english_pob_choice: the loins
  chosen_spanish: los lomos
  alternatives_spanish:
  - los riñones
  - la cintura
  - las caderas
  lexicon: HALOT
  rationale: «Lomos» preserva el hebraísmo corporal y su valor simbólico de vigor. En español bíblico es más transparente que una paráfrasis como «la fuerza» en el texto principal.
- source_word: קָמָיו
  english_pob_choice: those who rise against him
  chosen_spanish: los que se levantan contra él
  alternatives_spanish:
  - sus adversarios
  - los que se alzan contra él
  lexicon: HALOT
  rationale: La forma participial viene de קום («levantarse»). «Los que se levantan contra él» conserva el verbo de la imagen original mejor que una abstracción como «adversarios».
- source_word: וּמְשַׂנְאָיו
  english_pob_choice: those who hate him
  chosen_spanish: los que lo odian
  alternatives_spanish:
  - sus enemigos
  - los que le tienen odio
  lexicon: HALOT
  rationale: El participio expresa hostilidad personal. «Los que lo odian» mantiene esa relación directa y natural en español.
- source_word: מִן יְקוּמוּן
  english_pob_choice: so that they do not rise again
  chosen_spanish: para que no vuelvan a levantarse
  alternatives_spanish:
  - para que no se levanten otra vez
  - de modo que no se pongan en pie de nuevo
  lexicon: HALOT
  rationale: La construcción es elíptica y el sentido resultante es que, tras ser aplastados, no puedan levantarse de nuevo. «Para que no vuelvan a levantarse» expresa bien el resultado implícito sin alejarse del hebreo.
theological_decisions:
- issue: Referente de los pronombres singulares
  english_pob_reading: The pronouns refer to Levi, the tribe just blessed in the immediate context.
  chosen_spanish_reading: Los pronombres se refieren a Leví, la tribu bendecida en el contexto inmediato.
  alternative_spanish_readings:
  - Podrían entenderse de forma más general sobre el servicio sacerdotal o representativo de Leví.
  rationale: Mantener los pronombres singulares en español respeta la forma hebrea y el contexto literario inmediato de la bendición a Leví en los versículos anteriores.
  doctrine_reference: Deuteronomio 33:8–11; contexto narrativo inmediato
translation_notes:
  revision_awareness: Se corrigió la validación anterior anclando explícitamente las notas [a] y [b] en el texto español; no se añadieron notas sin marcador y se preservó el sentido poético y la tensión lexical del hebreo.
  spanish_consistency_notes:
  - Se usó «Yahvé» según la terminología del proyecto para el Tetragrámaton.
  - Se mantuvo el singular pronominal («su», «él») para reflejar a Leví en el contexto inmediato.
  - Se eligió un registro bíblico moderno y digno, sin depender de fórmulas tradicionales de sustitución como «SEÑOR».
  - Las imágenes corporales («lomos», «levantar(se)») se conservaron para no perder el vigor poético del original.
