translation:
  language: es
  text: Ahaz fue padre de Jarah[a], y Jarah fue padre de Alemet, Azmavet y Zimri; y Zimri fue padre de Moza.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: La genealogía paralela en 1 Crónicas 8:36 lee «Jehoadá» en lugar de «Jarah». Los manuscritos de Crónicas aquí leen «Jarah», y por eso se conserva en el texto principal.
    reason: textual_variant
lexical_decisions:
- source_word: הוֹלִיד
  english_pob_choice: fathered
  chosen_spanish: fue padre de
  alternatives_spanish:
  - engendró
  - engendró a
  - fue progenitor de
  lexicon: HALOT
  rationale: En genealogías, el hifil de ילד expresa la relación de paternidad/generación. En español, 'fue padre de' reproduce con naturalidad esa relación y evita un calco duro como 'engendró', que suena más técnico o arcaizante.
- source_word: וְ
  english_pob_choice: and
  chosen_spanish: y
  alternatives_spanish:
  - e
  lexicon: HALOT
  rationale: La conjunción enlaza de manera simple la cadena genealógica. 'Y' es la forma normal y no requiere ajuste fonético aquí.
- source_word: יַעְרָה
  english_pob_choice: Jarah
  chosen_spanish: Jarah
  alternatives_spanish:
  - Jearah
  lexicon: nombre propio
  rationale: Se conserva como nombre propio transliterado. 'Jarah' sigue la forma del texto consonántico y el criterio del POB inglés; 'Jearah' depende de la forma paralela tradicional, no del versículo base.
- source_word: עָלֶמֶת
  english_pob_choice: Alemeth
  chosen_spanish: Alemet
  alternatives_spanish:
  - Alemeth
  lexicon: nombre propio
  rationale: Nombre propio transliterado al español de manera coherente y legible. Se prefiere 'Alemet' porque evita una terminación inglesa innecesaria y refleja mejor la adaptación española de la forma hebrea.
- source_word: עַזְמָוֶת
  english_pob_choice: Azmaveth
  chosen_spanish: Azmavet
  alternatives_spanish:
  - Azmaveth
  lexicon: nombre propio
  rationale: Nombre propio transliterado. En español, la terminación '-et' resulta más natural que '-eth' y mantiene la proximidad al hebreo.
- source_word: זִמְרִי
  english_pob_choice: Zimri
  chosen_spanish: Zimri
  alternatives_spanish:
  - Zimrí
  lexicon: nombre propio
  rationale: Nombre propio transliterado. Se conserva la forma breve y reconocible; el acento gráfico no es necesario en una pronunciación española establecida por uso bíblico.
- source_word: מוֹצָא
  english_pob_choice: Moza
  chosen_spanish: Moza
  alternatives_spanish:
  - Mozá
  lexicon: nombre propio
  rationale: Nombre propio transliterado siguiendo el uso común. 'Moza' es clara en español y coincide con la forma estándar del nombre.
theological_decisions:
- issue: Variante textual en el nombre inicial
  english_pob_reading: The parallel genealogy in 1 Chronicles 8:36 reads 'Jehoaddah' instead of 'Jarah.' The Chronicles manuscripts here read 'Jarah,' which is retained in the main text.
  chosen_spanish_reading: Se retiene 'Jarah' en el texto principal y se señala la variante paralela en nota.
  alternative_spanish_readings:
  - Jehoadá
  - Jeara
  rationale: La decisión textual sigue el texto base de este versículo y conserva la tensión documentada con la genealogía paralela. No se armoniza el nombre en el cuerpo del texto, sino que se deja visible la variante manuscrita/tradicional.
  doctrine_reference: Crítica textual bíblica; 1 Crónicas 8:36
translation_notes:
  revision_awareness: La auditoría inglesa indica alta concordancia, sin revisiones aplicadas y con la lectura de 'Jarah' retenida en el texto principal. El español sigue esa decisión textual y adapta solamente la morfología y la sonoridad de los nombres propios para lectura pública natural.
  spanish_consistency_notes:
  - Se usa 'fue padre de' de manera uniforme para הוֹלִיד en toda la secuencia genealógica.
  - Se mantienen todos los nombres propios transliterados y sin traducir.
  - La nota textual se ancla solo en el nombre inicial, porque esa es la única variante documentada en el paquete fuente.
