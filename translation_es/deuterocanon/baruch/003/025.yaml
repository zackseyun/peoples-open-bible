lexical_decisions:
- source_word: μέγας
  english_pob_choice: Great
  chosen_spanish: Grande
  alternatives_spanish:
  - Grande en majestad
  - Majestuoso
  - Grande e imponente
  lexicon: BDAG
  rationale: El griego usa un adjetivo predicativo de amplitud/majestad. En español, «grande» es el equivalente más directo y natural; mantiene la amplitud semántica sin añadir una evaluación interpretativa más fuerte como «majestuoso» o «imponente».
- source_word: οὐκ ἔχει τελευτήν
  english_pob_choice: without end
  chosen_spanish: sin fin
  alternatives_spanish:
  - no tiene fin
  - sin término
  - sin final
  lexicon: BDAG
  rationale: La POB inglesa opta por una fórmula breve y natural que conserva la idea literal de «no tiene un fin». En español, «sin fin» reproduce bien esa concisión poética; «no tiene fin» sería más explícito, pero menos compacto.
- source_word: ὑψηλός
  english_pob_choice: lofty
  chosen_spanish: elevado
  alternatives_spanish:
  - alto
  - ensalzado
  - sublime
  lexicon: BDAG
  rationale: El adjetivo expresa altura/realce. «Elevado» conserva el registro poético y la noción de altura sin cargar el verso con una tonalidad excesivamente retórica. «Alto» suena más plano; «ensalzado» introducirá una valoración demasiado fuerte.
- source_word: ἀμέτρητος
  english_pob_choice: immeasurable
  chosen_spanish: imponderable
  alternatives_spanish:
  - inconmensurable
  - inmedible
  - sin medida
  lexicon: BDAG
  rationale: «Imponderable» comunica en español culto la idea de algo que no puede medirse o pesarse, y conserva el tono elevado del paralelismo. No obstante, se reconoce la tensión semántica con el literal «inconmensurable»; aquí se prioriza una lectura poética/publicación-readable, sin perder el valor de exceso respecto a toda medida humana.
theological_decisions:
- issue: Sujeto implícito del elogio
  english_pob_reading: The verse is rendered as a verbless poetic description of Wisdom, without inserting an explicit subject.
  chosen_spanish_reading: También en español se mantiene la descripción sin añadir un sujeto explícito.
  alternative_spanish_readings:
  - Ella es grande y sin fin, elevada e imponderable.
  - La Sabiduría es grande y sin fin, elevada e imponderable.
  rationale: El griego presenta una serie de predicados sin sujeto expreso. Dado que el contexto inmediato identifica el referente, conviene preservar la concisión poética y no introducir palabras ausentes del verso.
  doctrine_reference: Principio de equivalencia óptima y respeto de la elipsis poética del texto fuente.
translation_notes:
  revision_awareness: La lectura inglesa auditada entiende el verso como descripción poética compacta de Sabiduría, sin sujeto explícito, y conserva la alternativa más literal en nota. La versión española sigue esa misma línea, pero adapta 'lofty' e 'immeasurable' a un registro natural en español, manteniendo la tensión entre literalidad y fluidez.
  spanish_consistency_notes:
  - 'Se preservó la estructura coordinada del griego: dos miembros paralelos unidos por coma.'
  - No se introdujo «Sabiduría» en el texto principal para respetar la elipsis del original; su referencia queda implícita por el contexto.
  - «Sin fin» conserva el valor de οὐκ ἔχει τελευτήν sin expandirlo a una paráfrasis.
  - La nota recoge la alternativa más literal y ayuda a transparentar la opción poética principal.
  - Se evitó «SEÑOR» u otras convenciones no pertinentes, dado que el verso no contiene el nombre divino.
