lexical_decisions:
- source_word: ἐξ ἧς ἐγεννήθη Ἰησοῦς
  english_pob_choice: from whom Jesus was born
  chosen_korean: 마리아에게서…예수가 나셨습니다
  alternatives_korean:
  - 마리아에게서 예수께서 태어나셨습니다
  lexicon: BDAG
  rationale: 수동태 ἐγεννήθη는 마태가 의도적으로 「요셉이 낳았다」 정형을 깬다. 한국어에서도 「요셉이 예수를 낳았다」가 아니라 「마리아에게서 예수가 나셨다」로 옮겨 처녀 잉태로의 전환을 표시한다.
- source_word: ὁ λεγόμενος χριστός
  english_pob_choice: who is called the Messiah
  chosen_korean: 메시아라 불리는
  alternatives_korean:
  - 그리스도라 불리는
  lexicon: BDAG
  rationale: 칭호로서의 Χριστός를 「메시아」로 일관되게 옮긴다.
theological_decisions:
- issue: 족보의 정형(능동태 「낳았다」)이 16절에서 수동태로 전환되는 신학적 의미
  chosen_reading: 마리아에게서…예수가 나셨습니다
  alternative_readings:
  - 요셉이 예수를 낳았다
  rationale: 마태는 14대-14대-14대 정형을 의도적으로 깨뜨려, 요셉이 예수의 생물학적 아버지가 아님을 헬라어 수동태로 표시한다. 한국어 번역도 능동 정형을 깨고 수동 구문으로 옮겨야 같은 신학적 강조가 살아난다.
  doctrine_reference: 'DOCTRINE.md: preserve theological tension; virgin conception affirmation'
