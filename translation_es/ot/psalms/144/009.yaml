revisions:
- from: Oh Dios[a], cantaré un cántico nuevo para ti; con un arpa de diez cuerdas haré música para ti.
  to: Oh, Dios, cantaré un cántico nuevo a ti; con un arpa[a] de diez cuerdas te tocaré música.
  rationale: Se corrigió לָךְ a «a ti» en la primera cláusula para reflejar mejor el destinatario directo de la alabanza; se mejoró la puntuación del vocativo («Oh, Dios»); se movió la nota al instrumento, que es el elemento al que realmente se refiere; y se suavizó «haré música» a «te tocaré música» para un español más natural sin perder el sentido instrumental de אֲזַמְּרָה. Se mantuvo «cántico nuevo» por su adecuación poética y eclesial.
