    issue: La nota [b] está anclada en la frase equivocada.
    rationale: El contenido de la nota explica el modismo «menea la cabeza», pero en el borrador [b] aparece después de «se burla de ti». Esto rompe la correspondencia exigida entre marcador y texto anotado.
  - severity: medium
    issue: Capitalización poco natural en «La Virgen Hija de Sion» y «La Hija de Jerusalén».
    rationale: 'En español general y bíblico moderno, con artículo introductorio estas expresiones se leen con más naturalidad en minúscula: «la virgen hija de Sion», «la hija de Jerusalén». La personificación se mantiene por la construcción misma, sin necesidad de mayúsculas internas.'
