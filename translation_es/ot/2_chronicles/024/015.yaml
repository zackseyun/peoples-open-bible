  to: Yehoyadá envejeció y estaba lleno de días[a], y murió. Tenía ciento treinta años al morir.
  rationale: Se ajusta la expresión idiomática para un español más natural y fiel al valor de la frase hebrea, manteniendo la imagen original y la alternativa explicativa en nota. También se pule la puntuación de la nota.
