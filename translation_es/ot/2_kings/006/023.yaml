  yaml_path: translation/ot/2_kings/006/023.yaml
  text: So he prepared a great feast for them[a], and they ate and drank. Then he sent them away, and they went to their master[c][b]. And the raiding bands of Aram did not come again into the land of Israel.
  footnotes:
