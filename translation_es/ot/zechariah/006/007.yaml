    text: O “los de color bayo” (tradicionalmente, una designación de color para los caballos o equipos); el hebreo, tal como está puntuado en el Texto Masorético, se lee más naturalmente como “los fuertes”.
    reason: alternative_reading
  - marker: b
    text: O “la región” o “el país”; el hebreo אֶרֶץ puede significar “tierra”, “región” o “país”, según el contexto.
    reason: lexical_alternative
  revision_rationale: La revisión mantiene el buen español del borrador, pero alinea mejor el texto principal con la decisión documentada del POB para אֶרֶץ como alcance global (“throughout the earth”) mediante “toda la tierra”. También recoloca la nota léxica en la frase correcta y mejora la formulación de la alternativa de color.
