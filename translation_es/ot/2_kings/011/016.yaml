translation:
  language: es
  text: Así que le echaron mano[a], y ella fue por el camino de la entrada de los caballos[b] a la casa del rey, y allí fue puesta a muerte.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «la apresaron». El hebreo admite la idea concreta de sujetar o capturar; la frase española conserva el modismo sin excluir esa lectura.'
    reason: lexical_alternative
  - marker: b
    text: Literalmente, «la entrada de los caballos». Probablemente alude al acceso o paso por donde entraban los caballos al recinto real.
    reason: cultural_note
lexical_decisions:
- source_word: וַיָּשִׂימוּ לָהּ יָדַיִם
  english_pob_choice: they laid hands on her
  chosen_spanish: le echaron mano
  alternatives_spanish:
  - la sujetaron
  - la apresaron
  - pusieron las manos sobre ella
  lexicon: HALOT
  rationale: El hebreo es un modismo corporal de tomar a alguien por la fuerza. En español, «echar mano» conserva bien la fuerza idiomática y la acción de aprehensión sin volver la frase pesada o poco natural. Mantiene la tensión lexical entre toma física y captura judicial.
- source_word: וַתָּבֹא
  english_pob_choice: she went
  chosen_spanish: pasó
  alternatives_spanish:
  - fue
  - anduvo
  - se fue
  lexicon: HALOT
  rationale: El verbo puede ser «venir/ir» según el punto de vista. En este contexto narrativo de desplazamiento hacia la zona del palacio, «pasó» comunica el movimiento de manera natural en español y evita una literalidad forzada.
- source_word: דֶּרֶךְ
  english_pob_choice: by the way of
  chosen_spanish: por el camino de
  alternatives_spanish:
  - por la vía de
  - por la ruta de
  lexicon: HALOT
  rationale: דֶּרֶךְ denota camino, ruta o vía. «Por el camino de» mantiene el sentido locativo y resulta transparente en español bíblico contemporáneo.
- source_word: מְבוֹא הַסּוּסִים
  english_pob_choice: the horses’ entrance
  chosen_spanish: la entrada de los caballos
  alternatives_spanish:
  - la puerta de los caballos
  - el acceso de los caballos
  lexicon: HALOT
  rationale: Se conserva la estructura del constructo como una entrada asociada a los caballos. «Entrada» evita imponer «puerta» si el hebreo puede referirse también a un acceso o paso de ingreso.
- source_word: בֵּית הַמֶּלֶךְ
  english_pob_choice: the king’s house
  chosen_spanish: la casa del rey
  alternatives_spanish:
  - el palacio del rey
  - la casa real
  lexicon: HALOT
  rationale: La expresión hebrea es literalmente «casa del rey». En español, «casa del rey» preserva el vínculo formal con el texto fuente, aunque el referente sea el complejo palaciego.
- source_word: וַתּוּמַת
  english_pob_choice: she was put to death
  chosen_spanish: fue puesta a muerte
  alternatives_spanish:
  - fue matada
  - murió
  lexicon: HALOT
  rationale: El pasivo causativo expresa ejecución. «Fue puesta a muerte» reproduce esa fuerza judicial/executiva mejor que «murió», sin suavizar el acto ni volverlo interpretativo.
- source_word: שָׁם
  english_pob_choice: there
  chosen_spanish: allí
  alternatives_spanish:
  - ahí
  - allá
  lexicon: HALOT
  rationale: Adverbio locativo simple. «Allí» es la forma más sobria y natural en español narrativo.
translation_notes:
  revision_awareness: 'Se siguió de cerca el texto hebreo WLC y el auditor inglés: se preservó el modismo de aprehensión en lugar de una paráfrasis, y se mantuvo el giro constructo «entrada de los caballos» con una nota cultural para no imponer indebidamente «puerta».'
  spanish_consistency_notes:
  - Se evitó «SEÑOR» porque el versículo no contiene el nombre divino ni un sustituto de YHWH.
  - Se mantuvo «casa del rey» por fidelidad formal al hebreo, aun cuando el referente práctico sea el palacio.
  - «Puesta a muerte» refleja ejecución, no mera muerte natural.
  - La preposición y el orden verbal se ajustaron al español para que la oración suene natural sin perder el paralelismo narrativo.
