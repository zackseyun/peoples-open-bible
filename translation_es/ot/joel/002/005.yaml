base_translation:
  language: en
  yaml_path: translation/ot/joel/002/005.yaml
  text: Like the sound of chariots[a], they leap on the tops of the mountains; like the sound of a flame of fire consuming stubble[c][b]; like a mighty people arrayed for battle.
  footnotes:
  - marker: a
    text: Or 'they skip' or 'they dance'; the Hebrew verb can denote lively springing movement. Here it is rendered 'they leap' to fit the military advance imagery.
    reason: lexical_alternative
  - marker: b
    text: Literally, 'on the heads of the mountains.'
    reason: lexical_alternative
  - marker: c
    text: Or 'prepared for war' / 'drawn up for battle.' The Hebrew emphasizes ordered military formation.
    reason: lexical_alternative
