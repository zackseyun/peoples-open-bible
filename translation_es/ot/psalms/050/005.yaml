translation:
  language: es
  text: Reúnan ante mí[a] a mis fieles, a los que hacen mi pacto mediante sacrificio.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo literalmente: «los que cortan mi pacto sobre sacrificio».'
    reason: lexical_alternative
lexical_decisions:
- source_word: אִסְפוּ
  english_pob_choice: Gather
  chosen_spanish: Reúnan
  alternatives_spanish:
  - Junten
  - Reúnan
  lexicon: HALOT
  rationale: El imperativo plural de אסף pide una orden dirigida a varios agentes. «Reúnan» conserva la fuerza imperativa y suena natural en español bíblico moderno.
- source_word: לִי
  english_pob_choice: to me
  chosen_spanish: para mí
  alternatives_spanish:
  - a mí
  - para mí
  lexicon: HALOT
  rationale: En este contexto de convocatoria, «para mí» expresa con naturalidad la reunión en torno a Yahvé y evita una literalidad forzada. También mantiene el matiz de dirección hacia su presencia.
- source_word: חֲסִידָי
  english_pob_choice: my faithful ones
  chosen_spanish: mis fieles
  alternatives_spanish:
  - mis piadosos
  - mis santos
  - mis leales
  lexicon: HALOT
  rationale: חסיד apunta a lealtad pactual y piedad. «Fieles» comunica esa fidelidad relacional sin cargar el término con asociaciones eclesiásticas posteriores que tendría «santos».
- source_word: כֹּרְתֵי
  english_pob_choice: those who make
  chosen_spanish: los que hacen
  alternatives_spanish:
  - los que cortan
  - los que establecen
  lexicon: HALOT
  rationale: El participio con ברית expresa el idiomático «cortar un pacto». En español, «los que hacen» comunica el sentido principal con claridad, y el giro literal queda reflejado en la nota.
- source_word: בְרִיתִי
  english_pob_choice: my covenant
  chosen_spanish: mi pacto
  alternatives_spanish:
  - mi alianza
  - mi convenio
  lexicon: HALOT
  rationale: «Pacto» es el equivalente español más sobrio y fiel para בְרִית en este contexto teológico-jurídico. «Alianza» puede ser válido, pero «pacto» preserva mejor el registro bíblico de compromiso formal.
- source_word: עֲלֵי זָבַח
  english_pob_choice: by sacrifice
  chosen_spanish: mediante sacrificio
  alternatives_spanish:
  - sobre sacrificio
  - con sacrificio
  - por sacrificio
  lexicon: HALOT
  rationale: La preposición על en esta construcción señala la conexión ritual del pacto con el sacrificio. «Mediante sacrificio» comunica bien la mediación/relación ritual sin sonar torpe en español.
theological_decisions:
- issue: Identidad de חֲסִידַי en contexto de pacto
  english_pob_reading: my faithful ones
  chosen_spanish_reading: mis fieles
  alternative_spanish_readings:
  - mis santos
  - mis piadosos
  - mis leales
  rationale: La expresión se refiere a quienes están vinculados a Yahvé por fidelidad de pacto. «Mis fieles» conserva esa idea sin importar un sentido técnico posterior de «santos».
  doctrine_reference: Translation philosophy §§1, 5
- issue: Idiomatismo de «cortar un pacto»
  english_pob_reading: those who make my covenant by sacrifice
  chosen_spanish_reading: los que hacen mi pacto mediante sacrificio
  alternative_spanish_readings:
  - los que cortan mi pacto sobre sacrificio
  - los que establecen mi pacto con sacrificio
  rationale: La frase principal mantiene el sentido claro y publicable en español, mientras el trasfondo literal del hebreo («cortar un pacto») queda auditado en la nota.
  doctrine_reference: Translation philosophy §§1, 6
translation_notes:
  revision_awareness: 'El pasaje se mantiene estable respecto del análisis auditado: no hubo revisiones aplicadas y la solución española conserva la tensión entre el modismo idiomático («hacer un pacto») y el hebreo más literal («cortar un pacto»).'
  spanish_consistency_notes:
  - Se usa «Yahvé» como forma estándar del nombre divino en español POB, coherente con el marco editorial del proyecto.
  - Se prefirió «pacto» en vez de «alianza» para mantener la terminología bíblica-jurídica del hebreo ברית.
  - «Fieles» preserva la lectura pactual de חֲסִידָי sin introducir lenguaje eclesiástico posterior.
