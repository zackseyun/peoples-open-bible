  rationale: Se reemplazó «a la ilícita comida de carne» por «a comer carne ilícitamente» para lograr un español natural y digno sin perder el sentido de ἔκθεσμον σαρκοφαγίαν. La nueva redacción conserva la generalidad del objeto («carne») y mantiene que lo ilícito es el acto de comerla. Se revisó la nota para ofrecer alternativas más fieles al griego y más idiomáticas en español.
