translation:
  language: es
  text: Una buena cosa fortalece a otra[a], y quién se saciará de ver su gloria?[b]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Una cosa fortalece a otra». El griego puede entenderse de modo más formal como «Una fortalece las cosas buenas de otra»; la línea expresa la correspondencia mutua de las cosas creadas.'
    reason: lexical_alternative
  - marker: b
    text: El pronombre «su» probablemente se refiere a Dios; alternativamente, puede entenderse de manera más impersonal como el esplendor mostrado en la creación.
    reason: alternative_reading
lexical_decisions:
- source_word: ἓν τοῦ ἑνός
  english_pob_choice: One good thing ... another
  chosen_spanish: Una buena cosa ... a otra
  alternatives_spanish:
  - Una cosa ... de otra
  - Una cosa fortalece a otra
  - Una cosa de la otra
  lexicon: LSJ
  rationale: El giro griego es elíptico y relacional. En español, «una buena cosa ... a otra» mantiene la reciprocidad entre elementos creados sin forzar una explicación interpretativa excesiva en el texto principal. La nota conserva una alternativa más formal.
- source_word: ἐστερέωσεν
  english_pob_choice: strengthens
  chosen_spanish: fortalece
  alternatives_spanish:
  - hace firme
  - afirma
  - sostiene
  lexicon: LSJ
  rationale: El verbo significa literalmente hacer firme o fortalecer. «Fortalece» es natural en español y conserva la fuerza relacional del pasaje, sin perder la base léxica de firmeza.
- source_word: τὰ ἀγαθά
  english_pob_choice: good things
  chosen_spanish: una buena cosa
  alternatives_spanish:
  - los bienes
  - las cosas buenas
  - los beneficios
  lexicon: LSJ
  rationale: El plural sustantivado puede referirse a realidades buenas o beneficiosas. Dado el paralelismo con la primera cláusula, se opta por una formulación breve y transparente que preserve el sentido general de bondad/beneficio.
- source_word: τίς πλησθήσεται
  english_pob_choice: who can have enough
  chosen_spanish: ¿quién se saciará
  alternatives_spanish:
  - ¿quién quedará satisfecho
  - ¿quién tendrá bastante
  - ¿quién podrá llenarse
  lexicon: LSJ
  rationale: El futuro pasivo de πίμπλημι puede expresar plenitud o satisfacción. «Se saciará» comunica bien la imposibilidad retórica de quedar colmado ante la visión de la gloria, con un registro bíblico natural en español.
- source_word: ὁρῶν
  english_pob_choice: of seeing
  chosen_spanish: al ver
  alternatives_spanish:
  - viendo
  - al contemplar
  - por ver
  lexicon: LSJ
  rationale: El participio se vierte de modo idiomático con «al ver», manteniendo la acción continua de contemplar sin sobrecargar la sintaxis.
- source_word: δόξαν αὐτοῦ
  english_pob_choice: his glory
  chosen_spanish: su gloria
  alternatives_spanish:
  - su esplendor
  - su gloria
  lexicon: LSJ
  rationale: «Gloria» es el equivalente más directo de δόξα y mantiene el lenguaje teológico del pasaje. El pronombre queda intencionalmente abierto en el texto; la nota explica que normalmente se entiende de Dios, sin eliminar la posibilidad más impersonal.
theological_decisions:
- issue: Referente de αὐτοῦ
  english_pob_reading: his = God, with an alternative impersonal referent noted
  chosen_spanish_reading: su = Dios, con posible referencia más impersonal al esplendor manifestado en la creación
  alternative_spanish_readings:
  - su = la creación
  - su = el resplandor creado
  rationale: En el contexto de la alabanza al orden de la creación, la gloria contemplada se entiende naturalmente como la de Dios manifestada en sus obras. Sin embargo, el griego permite una lectura más impersonal; se preserva esa tensión en la nota en vez de resolverla por completo en el texto.
  doctrine_reference: Mantener la tensión interpretativa documentada; no borrar la referencia teológica más probable ni la alternativa gramatical posible.
translation_notes:
  revision_awareness: 'La redacción sigue la revisión más reciente del inglés POB, que pasó de una formulación más interpretativa a otra más cercana a ἓν τοῦ ἑνὸς ἐστερέωσεν τὰ ἀγαθά: ahora se privilegia una relación simple de fortalecimiento entre una cosa buena y otra, manteniendo la segunda cláusula con suavizado idiomático.'
  spanish_consistency_notes:
  - Se usa «gloria» para δόξα, no «esplendor», en el texto principal; «esplendor» queda como alternativa en la nota.
  - Se evita «Cristo» o lenguaje cristológico ajeno al contexto; el pasaje pertenece a un himno de creación.
  - La ambigüedad del pronombre final se conserva en nota, siguiendo la cautela del audit trail.
  - La formulación española busca ser publicable y fiel al griego sin depender mecánicamente del inglés.
