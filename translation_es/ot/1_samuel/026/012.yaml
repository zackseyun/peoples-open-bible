base_translation:
  language: en
  yaml_path: translation/ot/1_samuel/026/012.yaml
  text: So David took the spear and the jar of water from beside Saul’s head[a], and they went away. No one saw it, and no one knew it, and no one awoke, for they were all sleeping[b], because a deep sleep from Yahweh had fallen on them.
  footnotes:
  - marker: a
    text: Or, 'from beside Saul’s head.' The Hebrew expression refers to the area at Saul’s head as he lay sleeping.
    reason: lexical_alternative
  - marker: b
    text: Or, 'a deep sleep of the LORD had fallen on them.' The phrase indicates that the sleep came by the LORD’s action.
    reason: alternative_reading
