translation:
  language: es
  text: En aquel día habrá una calzada de Egipto a Asiria; y Asiria entrará en Egipto, y Egipto en Asiria[b]; y Egipto servirá con Asiria[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más literalmente: «y Egipto servirá a Asiria». La sintaxis hebrea permite esta lectura, aunque el contexto amplio favorece la idea de que Egipto se une a Asiria en el servicio/adoración de Dios.'
    reason: alternative_reading
  - marker: b
    text: 'El hebreo es elíptico en la segunda mitad del verso: «y Egipto en Asiria», es decir, «y Egipto entrará en Asiria».'
    reason: lexical_alternative
lexical_decisions:
- source_word: מְסִלָּה
  english_pob_choice: highway
  chosen_spanish: calzada
  alternatives_spanish:
  - camino
  - carretera
  - ruta
  lexicon: HALOT
  rationale: מְסִלָּה designa una vía elevada o preparada para el tránsito; en español, «calzada» conserva la idea de vía construida y despejada sin sonar excesivamente técnica. «Camino» sería más general y menos marcado; «carretera» introduce un matiz moderno anacrónico.
- source_word: מִמִּצְרַיִם אַשּׁוּרָה
  english_pob_choice: from Egypt to Assyria
  chosen_spanish: de Egipto a Asiria
  alternatives_spanish:
  - desde Egipto hasta Asiria
  - de Egipto hacia Asiria
  lexicon: HALOT
  rationale: La preposición hebrea marca dirección; «de... a...» reproduce naturalmente el movimiento entre los dos países y mantiene la imagen de conexión internacional. «Desde... hasta...» y «hacia» son posibles, pero menos directos aquí.
- source_word: וּבָא אַשּׁוּר בְּמִצְרַיִם
  english_pob_choice: and Assyria will come into Egypt
  chosen_spanish: Asiria entrará en Egipto
  alternatives_spanish:
  - Asiria vendrá a Egipto
  - Asiria llegará a Egipto
  lexicon: HALOT
  rationale: בוא con ב indica movimiento hacia el interior de un lugar. «Entrará en» conserva el valor direccional con naturalidad en español y refleja bien el paralelismo del verso.
- source_word: וּמִצְרַיִם בְּאַשּׁוּר
  english_pob_choice: and Egypt into Assyria
  chosen_spanish: y Egipto en Asiria
  alternatives_spanish:
  - y Egipto entrará en Asiria
  - y Egipto irá a Asiria
  lexicon: HALOT
  rationale: 'El hebreo es elíptico y omite un verbo que se sobreentiende por el contexto inmediato. En español, la elipsis puede mantenerse para preservar el paralelismo, aunque la lectura completa subyace: «Egipto entrará en Asiria».'
- source_word: וְעָבְדוּ
  english_pob_choice: will serve
  chosen_spanish: servirá
  alternatives_spanish:
  - adorará
  - servirá en adoración
  - prestará servicio
  lexicon: HALOT
  rationale: עבד posee un campo semántico amplio de servicio, trabajo y servicio cultual. El contexto inmediato y la revisión inglesa favorecen «servirá» como forma menos estrecha que «adorará», sin perder la posibilidad de un servicio religioso implícito.
- source_word: מִצְרַיִם אֶת אַשּׁוּר
  english_pob_choice: Egypt will serve with Assyria
  chosen_spanish: Egipto con Asiria
  alternatives_spanish:
  - Egipto servirá a Asiria
  - Egipto servirá junto con Asiria
  - Egipto servirá a Asiria en culto
  lexicon: HALOT
  rationale: 'La construcción hebrea es sintácticamente tensa: literalmente puede leerse como «Egipto [servirá] a Asiria», pero el contexto amplio del oráculo apunta a una relación conjunta de servicio, no a dominación política. En español, «servirá con Asiria» conserva la cooperación implícita y evita fijar indebidamente la relación como subordinación.'
theological_decisions:
- issue: Sentido de עָבַד en el cierre del verso
  english_pob_reading: Egypt will serve with Assyria
  chosen_spanish_reading: Egipto servirá con Asiria
  alternative_spanish_readings:
  - Egipto servirá a Asiria
  - Egipto adorará con Asiria
  rationale: El verso, leído junto con el contexto de Isaías 19:24-25, presenta una reconciliación de naciones bajo la acción de Yahvé. Traducir solo «adorará» estrecha demasiado el hebreo; traducir «servirá a Asiria» puede sugerir vasallaje político. «Servirá con Asiria» preserva la tensión entre el objeto verbal y la lectura contextual de servicio conjunto.
  doctrine_reference: Isaías 19:23–25; filosofía de traducción §3 y §5
- issue: Mantenimiento de la ambigüedad sintáctica en «Egipto en Asiria»
  english_pob_reading: and Egypt into Assyria
  chosen_spanish_reading: y Egipto en Asiria
  alternative_spanish_readings:
  - y Egipto entrará en Asiria
  - y Egipto irá a Asiria
  rationale: El hebreo omite el verbo en la segunda mitad del paralelismo. Mantener la elipsis en español refleja esa concisión poética y deja visible la tensión textual que el lector debe completar por contexto.
  doctrine_reference: Principios de paralelismo hebreo; traducción poética
translation_notes:
  revision_awareness: El borrador toma en cuenta la última revisión inglesa, que ajustó «worship with Assyria» a «serve with Assyria» para reflejar con más precisión עבד y evitar restringir el verbo a adoración. La versión española sigue esa decisión y conserva la ambigüedad sintáctica del hebreo en la segunda cola del verso, sin perder legibilidad.
  spanish_consistency_notes:
  - Se usa «Yahvé» como nombre divino por norma del proyecto, aunque en este verso no aparece explícitamente en el texto hebreo.
  - «Asiria» y «Egipto» se mantienen como topónimos históricos consistentes con el registro bíblico en español.
  - Se eligió «calzada» por su valor de vía preparada y solemne; no se moderniza a «carretera» para evitar una imagen anacrónica.
  - La coordinación final «servirá con Asiria» busca preservar el sentido contextual de cooperación sin forzar una traducción interpretativa demasiado cerrada.
