revisions:
- from: Te sentaste en un diván espléndido[a], con una mesa dispuesta delante de él; y sobre él pusiste mi incienso y mi aceite.
  to: Te sentaste sobre un lecho espléndido[a], con una mesa dispuesta delante de este, y sobre la mesa pusiste mi incienso y mi aceite.
  rationale: Se revisa para evitar la masculinización confusa de los sufijos hebreos femeninos, mejorar la claridad espacial de la escena y usar un término más natural y bíblicamente legible en español («lecho»). La nota se conserva y adapta para seguir informando la ambigüedad del hebreo sin sobrecargar el texto principal.
