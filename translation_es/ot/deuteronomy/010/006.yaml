  glossary_alignment: No hay términos del glosario mayor en juego como Yahvé/Mesías. Los nombres propios están transliterados de forma aceptable. «Ejerció el sacerdocio» es una buena opción contextual para ויכהן, aunque «sirvió como sacerdote» también habría sido válido.
