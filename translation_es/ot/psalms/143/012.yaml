    reason: lexical_alternative
  - marker: b
    text: '''Mi alma'' también puede entenderse como ''mi vida'' o simplemente ''yo''.'
    reason: lexical_alternative
  revision_rationale: 'Se ajusta el texto para reflejar con más fidelidad el hebreo y el rastro auditado del POB: se restituye el valor principal de חֶסֶד como ''amor fiel'' con la alternativa instrumental en nota; se mantiene נַפְשִׁי como ''mi alma'' en el texto principal y ''mi vida/yo'' en nota; y se corrige עַבְדֶּךָ a ''tu siervo'' según la excepción contextual documentada para oración sálmica. No se requiere adjudicación adicional porque las correcciones están claramente respaldadas por la evidencia y las decisiones ya auditadas.'
