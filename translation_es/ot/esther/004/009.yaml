translation:
  language: es
  text: Entonces Hathac vino y le dijo a Ester las palabras de Mardoqueo[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'el mensaje de Mardoqueo' o 'lo que dijo Mardoqueo'. El hebreo dice literalmente 'las palabras de Mardoqueo'.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּבֹא
  english_pob_choice: came
  chosen_spanish: vino
  alternatives_spanish:
  - llegó
  - vino de regreso
  lexicon: HALOT
  rationale: El verbo básico בוא permite 'venir/ir/llegar'. Dado el contexto narrativo inmediato, Hathac vuelve a Ester después de haber ido a Mardoqueo; 'vino' conserva esa perspectiva de retorno sin añadir información. 'Llegó' sería posible, pero menos marcado por la dirección relacional del relato.
- source_word: הֲתָךְ
  english_pob_choice: Hathach
  chosen_spanish: Hathac
  alternatives_spanish:
  - Hatach
  - Hathaj
  lexicon: Nombre propio
  rationale: Se translitera el nombre propio con una forma española transparente y de lectura natural. Se mantiene la identidad del personaje sin reinterpretación.
- source_word: וַיַּגֵּד
  english_pob_choice: told
  chosen_spanish: le contó
  alternatives_spanish:
  - le dijo
  - le informó
  lexicon: HALOT
  rationale: El hiphil de נגד expresa dar a conocer, decir, informar. En español, 'le contó' comunica bien el acto de transmitir el mensaje en una escena narrativa sencilla. 'Le informó' suena más formal; 'le dijo' es correcto, pero menos específico respecto al contenido comunicado.
- source_word: לְאֶסְתֵּר
  english_pob_choice: Esther
  chosen_spanish: a Ester
  alternatives_spanish:
  - a Esther
  lexicon: Sintaxis española
  rationale: El complemento con לְ se expresa naturalmente con la preposición 'a' en español. Se prefiere 'Ester' como forma usual en castellano bíblico moderno, manteniendo el nombre propio sin anglicismo.
- source_word: דִּבְרֵי
  english_pob_choice: the words of
  chosen_spanish: las palabras de
  alternatives_spanish:
  - el mensaje de
  - lo que dijo
  lexicon: HALOT
  rationale: El constructo plural de דָּבָר significa literalmente 'palabras'. 'Las palabras de Mardoqueo' preserva la cercanía formal al hebreo y evita suavizar el contenido a 'mensaje' sin necesidad. 'Lo que dijo' sería más idiomático, pero menos transparente.
- source_word: מָרְדֳּכָי
  english_pob_choice: Mordecai
  chosen_spanish: Mardoqueo
  alternatives_spanish:
  - Mordecai
  lexicon: Nombre propio
  rationale: Se usa la forma española asentada en la tradición bíblica en castellano, sin alterar el referente.
translation_notes:
  revision_awareness: El borrador corrige el fallo anterior asegurando que el único marcador de nota, [a], aparece exactamente en el texto español y que no se incluyen notas sin anclaje. La redacción mantiene la estructura narrativa del hebreo y la equivalencia auditada del POB en inglés.
  spanish_consistency_notes:
  - 'Se mantiene la transliteración consistente de nombres propios: Hathac, Ester, Mardoqueo.'
  - Se conserva la literalidad controlada de 'las palabras de Mardoqueo' con nota alternativa, como en el audit trail inglés.
  - No se introduce un equivalente doctrinal porque el versículo es narrativo y no plantea una decisión teológica explícita.
