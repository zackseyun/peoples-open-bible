review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien el hebreo y el rastro POB en los puntos principales: mantiene ''Yahvé'', conserva el matiz partitivo de ''algunos de los hombres de Bet-semes'', preserva la dificultad numérica con nota, y refleja la causa como haber mirado en/al arca. Sin embargo, dos elecciones españolas debilitan la fidelidad léxica e idiomática: ''en el pueblo'' suena poco natural para בָּעָם donde el audit trail prefiere sentido partitivo (''entre el pueblo''), y ''una gran herida'' no representa bien מַכָּה גְדוֹלָה en este contexto de juicio; ''un gran golpe'' o ''un gran azote'' preserva mejor la conexión con נכה.'
  spanish_quality_summary: El español es generalmente claro y digno, pero hay asperezas. 'Y él hirió' puede simplificarse a 'Él hirió' según puntuación española. 'Mirado dentro del arca' es comprensible, aunque 'mirado dentro del arca' suena un poco rígido; aun así, queda defendible por la nota. Las mejoras necesarias son sobre todo 'entre el pueblo' y 'con un gran golpe', que suenan más naturales y más fieles.
  glossary_alignment: 'Buena alineación con la terminología del proyecto: יְהוָה -> ''Yahvé'' correctamente; אֲרוֹן יְהוָה -> ''arca de Yahvé'' bien; no hay conflictos mayores de glosario. La única corrección relevante es mantener mejor la relación léxica entre נכה / מַכָּה mediante ''hirió ... con un gran golpe'' en lugar de ''gran herida''.'
  issues:
  - severity: medium
    issue: '''en el pueblo'' para בָּעָם'
    rationale: Aunque posible de forma literal, en español suena poco idiomático y no comunica tan bien el valor de 'among the people' documentado en el audit trail. 'Entre el pueblo' preserva mejor el sentido locativo/partitivo.
  - severity: medium
    issue: '''una gran herida'' para מַכָּה גְדוֹלָה'
    rationale: '''Herida'' desplaza el sentido hacia una lesión resultante, mientras que מַכָּה aquí se vincula al acto de golpear/juzgar y el audit trail justificó ''great blow''. ''Un gran golpe'' reproduce mejor esa relación léxica sin sobreinterpretar como plaga o matanza.'
  - severity: low
    issue: Apertura 'Y él hirió'
    rationale: La conjunción inicial no es necesaria y suena algo calcada. 'Él hirió' o simplemente 'Hirió' es más natural en español moderno sin pérdida de sentido.
  revised_spanish_text: Él hirió[a] a algunos de los hombres de Bet-semes porque habían mirado dentro del arca de Yahvé. Hirió entre el pueblo a setenta hombres, cincuenta mil hombres[b], y el pueblo se lamentó porque Yahvé había herido al pueblo con un gran golpe.
  revised_footnotes:
  - marker: a
    text: 'O: «porque habían mirado al arca de Yahvé». La preposición hebrea puede entenderse de modo más general, aunque «mirado dentro de» probablemente refleja la ofensa en su contexto.'
    reason: lexical_alternative
  - marker: b
    text: 'El hebreo dice literalmente: «setenta hombres, cincuenta mil hombres», una formulación difícil. Puede significar «setenta hombres de cincuenta mil hombres», «cincuenta mil y setenta hombres», o reflejar un problema textual; algunos testigos antiguos apoyan una cifra mucho menor.'
    reason: textual_variant
  revision_rationale: 'Se hicieron correcciones menores pero importantes para mejorar fidelidad e idiomaticidad: ''entre el pueblo'' en lugar de ''en el pueblo'' para reflejar mejor בָּעָם, y ''con un gran golpe'' en lugar de ''con una gran herida'' para representar mejor מַכָּה y su vínculo con el verbo ''herir/golpear''. También se suavizó la apertura a un español más natural.'
