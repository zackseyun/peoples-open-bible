translation:
  language: es
  text: Y tu comida que comerás será por peso, veinte siclos al día[a]; de tiempo en tiempo[b] la comerás.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El siclo era una unidad de peso, no necesariamente una moneda en este contexto.
    reason: cultural_note
  - marker: b
    text: 'O: «a intervalos»; la expresión hebrea literalmente dice «de tiempo en tiempo».'
    reason: lexical_alternative
lexical_decisions:
- source_word: מַאֲכָלְךָ
  english_pob_choice: your food
  chosen_spanish: tu comida
  alternatives_spanish:
  - tu alimento
  - lo que comerás
  lexicon: HALOT
  rationale: מַאֲכָל designa comida o alimento. 'Tu comida' es natural en español y conserva el sentido concreto sin volverlo demasiado general.
- source_word: אֲשֶׁר תֹּאכֲלֶנּוּ
  english_pob_choice: that you shall eat
  chosen_spanish: que comerás
  alternatives_spanish:
  - que has de comer
  - que vas a comer
  lexicon: HALOT
  rationale: La relativa especifica la comida indicada. 'Que comerás' conserva el tono directivo del imperfecto hebreo en un español claro y digno.
- source_word: בְּמִשְׁקוֹל
  english_pob_choice: by weight
  chosen_spanish: por peso
  alternatives_spanish:
  - pesado
  - por medida de peso
  - a peso
  lexicon: HALOT
  rationale: מִשְׁקוֹל se refiere al peso como criterio de ración. 'Por peso' mantiene la fuerza concreta y resulta idiomático en español.
- source_word: עֶשְׂרִים שֶׁקֶל
  english_pob_choice: twenty shekels
  chosen_spanish: veinte siclos
  alternatives_spanish:
  - veinte shekels
  - veinte siclos de peso
  lexicon: HALOT
  rationale: Se conserva la unidad antigua de peso. 'Siclos' es una forma castellana estable y evita modernizar indebidamente la medida.
- source_word: לַיּוֹם
  english_pob_choice: a day
  chosen_spanish: al día
  alternatives_spanish:
  - por día
  - cada día
  lexicon: HALOT
  rationale: El distributivo hebreo se expresa naturalmente con 'al día', que comunica la ración diaria sin añadir matices ajenos.
- source_word: מֵעֵת עַד עֵת
  english_pob_choice: from time to time
  chosen_spanish: de tiempo en tiempo
  alternatives_spanish:
  - a intervalos
  - de vez en cuando
  - en ciertos tiempos
  lexicon: HALOT
  rationale: La locución hebrea indica intervalos o tiempos determinados. 'De tiempo en tiempo' es una equivalencia transparente y mantiene el ritmo idiomático.
- source_word: תֹּאכֲלֶנּוּ
  english_pob_choice: you shall eat it
  chosen_spanish: la comerás
  alternatives_spanish:
  - la has de comer
  - la comerás tú
  lexicon: HALOT
  rationale: El verbo final repite la instrucción con énfasis. 'La comerás' conserva la repetición y la fuerza directiva del hebreo.
translation_notes:
  revision_awareness: La versión sigue de cerca el hebreo y el audit trail inglés, manteniendo la ración diaria por peso y la locución temporal idiomática sin atenuar la fuerza directiva del versículo.
  spanish_consistency_notes:
  - Se usa 'Yahvé' para el nombre divino cuando el contexto lo requiera; aquí no aparece.
  - '''Siclos'' conserva la medida antigua en lugar de convertirla a unidades modernas.'
  - '''De tiempo en tiempo'' se mantiene como equivalente idiomático de la expresión hebrea, con alternativa explicada en nota.'
