  source_alignment_summary: 'El borrador español refleja bien la estructura y el sentido general del hebreo y del POB inglés: la gente intenta que David coma, se mantiene ‘pan’, se conserva la fórmula de juramento y la prohibición se extiende hasta la puesta del sol. Sin embargo, ‘cualquier otra cosa’ añade ‘otra’, que no está en אוֹ כָל מְאוּמָה y puede sugerir contraste con el pan en vez de la amplitud absoluta ‘o cualquier cosa / nada en absoluto’.'
