  language: en
  yaml_path: translation/ot/genesis/044/018.yaml
  text: Then Judah came near to him and said[a], “Please, my lord, let your servant speak a word in my lord’s hearing, and do not let your anger burn against your servant[c][b], for you are like Pharaoh.”
  footnotes:
