- from: Y los hijos de Israel hicieron conforme a lo que les había ordenado Joakim, el sumo sacerdote, y el consejo de todo el pueblo de Israel[a], que estaban en Jerusalén[c][b].
  to: Y los hijos de Israel[a] hicieron como les instruyeron Joakim, el sumo sacerdote, y el consejo de todo el pueblo de Israel, que estaban en Jerusalén[c][b].
