revisions:
- from: Tanto los grandes como los pequeños morirán en esta tierra[a]. No serán sepultados, ni nadie hará duelo por ellos, ni se hará cortes en el cuerpo[b], ni se rapará la cabeza por ellos.
  to: Tanto los grandes como los pequeños morirán en esta tierra[a]. No serán sepultados, ni nadie hará duelo[b] por ellos, ni nadie se hará cortes, ni se rapará por ellos.
  rationale: Se reubicó la nota léxica al verbo de duelo, que es donde realmente aplica el alternativo documentado. También se suavizó la construcción impersonal para mejorar la naturalidad del español y mantener la enumeración de actos concretos de luto sin añadir explicación innecesaria en el texto principal. La nota cultural ahora menciona explícitamente las prácticas listadas en el versículo.
