base_translation:
  language: en
  yaml_path: translation/ot/ezra/005/008.yaml
  text: Let it be known to the king that we went to the province of Judah[a], to the house of the great God. It is being built with great stones, and timber is being laid in the walls[b]. This work is being done diligently and is prospering in their hands.
  footnotes:
  - marker: a
    text: Or 'with great stones.' The Aramaic phrase may refer generally to very large building stones.
    reason: lexical_alternative
  - marker: b
    text: Or 'carefully' or possibly 'rapidly' for 'diligently.' The adverb's nuance is debated, but it clearly describes the work as proceeding effectively.
    reason: lexical_alternative
