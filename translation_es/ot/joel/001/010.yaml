  verdict: revise
  source_alignment_summary: 'El borrador español sigue bien la estructura y el sentido básico del hebreo: devastación del campo, duelo de la tierra, y fracaso de los productos agrícolas. Sin embargo, «llora» estrecha innecesariamente אָבְלָה, que en este contexto personificado se acerca mejor a «está de duelo / se lamenta / se enluta» que a un acto específico de llorar. Además, «ha desfallecido» para אֻמְלַל suena poco idiomático con «aceite» en español bíblico-natural y comunica debilidad más que fracaso o marchitamiento del producto.'
  spanish_quality_summary: 'El texto es generalmente claro y digno, pero dos elecciones afectan la naturalidad y precisión: «la tierra llora» es comprensible pero menos fiel al matiz de duelo; «el aceite ha desfallecido» resulta extraño en español contemporáneo. Una ligera revisión mejora la fidelidad poética y la legibilidad sin apartarse del hebreo ni del rastro POB en inglés.'
  glossary_alignment: No hay conflictos con la terminología teológica del proyecto. «Campo», «tierra», «grano», «mosto» y «aceite» encajan bien. «Mosto» es una buena decisión para תִּירוֹשׁ. La revisión propuesta mantiene «aceite» para יִצְהָר, en línea con la revisión inglesa, y ajusta el verbo a un español más natural.
  issues:
  - severity: medium
    issue: «llora» para אָבְלָה
    rationale: El hebreo de אבל expresa luto o duelo; «llora» es una concreción posible, pero más estrecha que «está de duelo» o «se enluta», y pierde parte del matiz personificado del lamento fúnebre.
  - severity: medium
    issue: «ha desfallecido» con «aceite»
    rationale: Aunque intenta reflejar marchitez o decaimiento, en español suena poco natural para un producto agrícola. «se ha acabado» sería demasiado interpretativo; «se ha marchitado» aplicado al aceite no funciona. La nota inglesa preserva precisamente la alternativa «el aceite fresco se ha marchitado / el aceite de oliva ha faltado», por lo que conviene una formulación principal más idiomática y una nota léxica.
  revised_spanish_text: El campo está devastado; la tierra está de duelo[a], porque el grano está devastado, el mosto se ha secado y el aceite ha faltado[b].
  revised_footnotes:
  - marker: a
