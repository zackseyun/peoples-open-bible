translation:
  language: es
  text: 'e igualmente también Jacobo y Juan, hijos de Zebedeo, quienes eran socios de Simón. Y Jesús dijo a Simón: «No tengas miedo; desde ahora pescarás personas[a][b]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «capturando personas vivas». El verbo griego puede implicar tomar con vida, preservando un matiz distinto del más familiar «pescadores de hombres» de Mateo 4:19 y Marcos 1:17.
    reason: lexical_alternative
  - marker: b
    text: 'Compárese Mateo 4:19 y Marcos 1:17, donde Jesús dice: «Os haré pescadores de hombres». La redacción de Lucas es distinta y no debe aplanarse en la misma fórmula.'
    reason: cross_reference
lexical_decisions:
- source_word: ὁμοίως δὲ καὶ
  english_pob_choice: and likewise also
  chosen_spanish: e igualmente también
  alternatives_spanish:
  - e igualmente
  - y asimismo también
  lexicon: BDAG
  rationale: Conserva la relación aditiva y comparativa del griego. "Igualmente" refleja ὁμοίως; "también" mantiene el añadido enfático de καὶ sin volver la frase pesada en español.
- source_word: Ἰάκωβον καὶ Ἰωάννην υἱοὺς Ζεβεδαίου
  english_pob_choice: James and John, Zebedee’s sons
  chosen_spanish: Jacobo y Juan, hijos de Zebedeo
  alternatives_spanish:
  - Santiago y Juan, hijos de Zebedeo
  - Jacobo y Juan, los hijos de Zebedeo
  lexicon: BDAG
  rationale: Se conserva la identificación familiar directa del genitivo. "Jacobo" sigue la forma del nombre usada con frecuencia en español bíblico neutral y evita una sustitución no sustentada por el texto fuente.
- source_word: κοινωνοὶ
  english_pob_choice: partners
  chosen_spanish: socios
  alternatives_spanish:
  - compañeros
  - asociados
  - socios comerciales
  lexicon: BDAG
  rationale: En el contexto de pesca y trabajo compartido, el término apunta a una relación de negocio o colaboración activa. "Socios" comunica mejor esa fuerza que "compañeros".
- source_word: Μὴ φοβοῦ
  english_pob_choice: Do not be afraid
  chosen_spanish: No tengas miedo
  alternatives_spanish:
  - No temas
  - No tengas temor
  lexicon: BDAG
  rationale: Expresa de manera natural la fórmula de exhortación y consuelo. "No tengas miedo" suena claro y pastoral en español contemporáneo, sin perder el imperativo prohibitivo.
- source_word: ἀπὸ τοῦ νῦν
  english_pob_choice: from now on
  chosen_spanish: desde ahora
  alternatives_spanish:
  - a partir de ahora
  - desde este momento
  lexicon: BDAG
  rationale: Marca el cambio decisivo de vocación con una locución breve y idiomática en español.
- source_word: ἀνθρώπους
  english_pob_choice: people
  chosen_spanish: personas
  alternatives_spanish:
  - gente
  - seres humanos
  lexicon: BDAG
  rationale: Aunque el plural griego es masculino, el referente es genérico. "Personas" conserva la referencia a seres humanos sin forzar el masculino genérico en español.
- source_word: ζωγρῶν
  english_pob_choice: catching people
  chosen_spanish: pescando personas
  alternatives_spanish:
  - capturando personas
  - tomando vivas a las personas
  lexicon: BDAG
  rationale: Se mantiene la imagen de pesca, coherente con la escena, y se evita armonizar con Mateo/Marcos. El matiz de "capturar/tomar vivas" queda reservado para la nota, siguiendo la revisión del POB en inglés.
theological_decisions:
- issue: Metáfora de ζωγρέω en la vocación de Simón
  english_pob_reading: you will be catching people
  chosen_spanish_reading: estarás pescando personas
  alternative_spanish_readings:
  - capturarás personas
  - pescarás hombres
  rationale: El griego de Lucas difiere de la formulación más conocida en Mateo y Marcos. La traducción mantiene la metáfora pesquera sin fusionarla con los paralelos; el matiz de capturar con vida se explicita en una nota.
  doctrine_reference: Translation philosophy §1, §5
- issue: Valor genérico de ἀνθρώπους
  english_pob_reading: people
  chosen_spanish_reading: personas
  alternative_spanish_readings:
  - hombres
  - seres humanos
  rationale: Se traduce según el referente intencional, no según el género gramatical. El dicho de Jesús apunta a personas en general.
  doctrine_reference: Translation philosophy §4
translation_notes:
  revision_awareness: 'El texto español sigue la revisión más reciente del POB en inglés: el verbo principal de ζωγρῶν no incorpora «vivas» en el cuerpo del texto, y ese matiz se traslada a nota. También mantiene la diferenciación respecto de los paralelos de Mateo y Marcos, tal como indica el historial de revisión.'
  spanish_consistency_notes:
  - Se evitó «SEÑOR» porque no aparece en este versículo; el sujeto explícito es «Jesús».
  - Se eligió «socios» para κοινωνοὶ por el contexto narrativo de trabajo compartido, en lugar de «compañeros».
  - Se optó por «personas» para ἀνθρώπους por sensibilidad de género y fidelidad al referente genérico.
  - La metáfora pesquera se conservó sin harmonizarla con «pescadores de hombres», siguiendo el énfasis lucano y el audit trail en inglés.
