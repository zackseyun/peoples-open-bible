revisions:
- from: Entonces Moisés y Aarón salieron de delante de[a] la asamblea[b], a la entrada de la tienda de reunión, y se postraron sobre sus rostros; y la gloria de Yahvé apareció ante ellos[c].
  to: Entonces Moisés y Aarón fueron desde delante de[a] la asamblea[b] hasta la entrada de la tienda de reunión, y cayeron sobre sus rostros; y la gloria de Yahvé se les apareció[c].
  rationale: Se corrige el verbo principal para reflejar mejor וַיָּבֹא, se ajusta la aparición divina al valor de אֲלֵיהֶם mediante «se les apareció», y se mejora la naturalidad del modismo corporal manteniendo su sentido. Se conservan «Yahvé», «asamblea» y «tienda de reunión» por buena alineación con el proyecto y el hebreo.
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T21:48:10Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador conserva bien la estructura básica del hebreo: Moisés y Aarón se apartan de la presencia de la asamblea, van a la entrada de la tienda de reunión, caen/postran sus rostros y la gloria de Yahvé se manifiesta. Sin embargo, hay dos desajustes relevantes con el sentido fuente y el rastro auditado: (1) וַיָּבֹא se fuerza como «salieron», cuando el hebreo expresa la llegada/venida al destino desde delante de la asamblea; en español conviene mantener el movimiento completo con «fueron» o «vinieron». (2) אֲלֵיהֶם significa «a ellos», no «ante ellos»; en español «apareció a ellos» es menos natural, pero «se les apareció» preserva mejor la dirección dativa del hebreo.'
  spanish_quality_summary: 'El español es generalmente claro y digno, pero presenta giros algo duros o menos naturales: «salieron de delante de» resulta pesado, y «se postraron sobre sus rostros» suena calcado. Una formulación más idiomática y fiel sería «fueron desde delante de la asamblea… y cayeron rostro en tierra» o «cayeron sobre sus rostros». También conviene evitar «SEÑOR» en la nota, dado que la norma del proyecto favorece «Yahvé» en el texto principal, aunque una nota de alternativa puede reflejar la opción inglesa auditada.'
  glossary_alignment: Acierta en יְהוָה → «Yahvé» y en הַקָּהָל → «asamblea» con nota alternativa «congregación». «Tienda de reunión» es compatible con el proyecto. El problema principal de alineación lexical está en וַיָּבֹא → «salieron» y אֲלֵיהֶם → «ante ellos», ambos alejándose de las decisiones auditadas y del hebreo.
  issues:
  - severity: high
    issue: וַיָּבֹא fue traducido como «salieron».
    rationale: El verbo בוא aquí, junto con el complemento de destino «a la entrada de la tienda de reunión», describe el desplazamiento hacia ese lugar; «salieron» destaca solo la salida desde la asamblea y reemplaza indebidamente el verbo fuente. «Fueron» preserva mejor el conjunto del movimiento.
  - severity: medium
    issue: אֲלֵיהֶם fue traducido como «ante ellos».
    rationale: El hebreo usa una preposición direccional equivalente a «a ellos». En contexto teofánico, el español natural puede expresar esto como «se les apareció», que mantiene mejor el valor dativo que «apareció ante ellos».
  - severity: medium
    issue: «Se postraron sobre sus rostros» es poco natural en español.
    rationale: Aunque intenta conservar el modismo, en español suena rígido. «Cayeron sobre sus rostros» refleja más de cerca el hebreo, o «cayeron rostro en tierra» mejora la naturalidad sin perder el sentido.
  - severity: low
    issue: La nota alternativa c usa «SEÑOR».
    rationale: Como alternativa histórica puede tolerarse, pero debe presentarse claramente como variante de traducción, no como preferencia del proyecto, que usa «Yahvé» para יְהוָה.
  revised_spanish_text: Entonces Moisés y Aarón fueron desde delante de[a] la asamblea[b] hasta la entrada de la tienda de reunión, y cayeron sobre sus rostros; y la gloria de Yahvé se les apareció[c].
  revised_footnotes:
  - marker: a
    text: 'Hebreo: «desde delante de», un modismo que significa desde la presencia del pueblo reunido.'
    reason: source_note
  - marker: b
    text: O «la congregación».
    reason: lexical_alternative
  - marker: c
    text: O «apareció a ellos la gloria de Yahvé». Tradicionalmente, «la gloria del SEÑOR apareció ante ellos».
    reason: lexical_alternative
  revision_rationale: Se corrige el verbo principal para reflejar mejor וַיָּבֹא, se ajusta la aparición divina al valor de אֲלֵיהֶם mediante «se les apareció», y se mejora la naturalidad del modismo corporal manteniendo su sentido. Se conservan «Yahvé», «asamblea» y «tienda de reunión» por buena alineación con el proyecto y el hebreo.
