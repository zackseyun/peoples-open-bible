translation:
  language: es
  text: No se vuelvan[a] hacia los ídolos, ni se hagan para ustedes dioses de metal fundido[b]. Yo soy Yahvé, su Dios.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'ídolos inútiles'; el término hebreo puede llevar un matiz peyorativo de nulidad.
    reason: lexical_alternative
  - marker: b
    text: O 'dioses fundidos' o 'ídolos de metal'.
    reason: lexical_alternative
lexical_decisions:
- source_word: תִּפְנוּ
  english_pob_choice: turn
  chosen_spanish: se vuelvan hacia
  alternatives_spanish:
  - se dirijan hacia
  - pongan atención a
  - vuelvan sus ojos a
  lexicon: HALOT
  rationale: פנה con אֶל expresa dirección o orientación hacia algo. En español, 'se vuelvan hacia' conserva la imagen de dirigirse mentalmente o en lealtad hacia los ídolos, sin añadir explícitamente 'adorar'.
- source_word: אֱלִילִים
  english_pob_choice: idols
  chosen_spanish: ídolos
  alternatives_spanish:
  - ídolos inútiles
  - ídolos sin valor
  - falsos dioses
  lexicon: HALOT
  rationale: '''Ídolos'' es la equivalencia natural y directa. La posible carga peyorativa de inutilidad está documentada en la nota, pero no se impone en el texto principal.'
- source_word: אֱלֹהֵי מַסֵּכָה
  english_pob_choice: cast-metal gods
  chosen_spanish: dioses de metal fundido
  alternatives_spanish:
  - dioses de metal vaciado
  - ídolos de metal fundido
  - dioses fundidos
  lexicon: HALOT
  rationale: La construcción alude a deidades o imágenes hechas por fundición/casting de metal. 'Dioses de metal fundido' comunica el material y el modo de fabricación de manera clara en español, manteniendo el plural de אֱלֹהֵי.
- source_word: תַעֲשׂוּ לָכֶם
  english_pob_choice: make for yourselves
  chosen_spanish: hagan para ustedes
  alternatives_spanish:
  - se hagan
  - hagan para sí
  - fabriquen para ustedes
  lexicon: HALOT
  rationale: La secuencia verbal con לָכֶם tiene un valor beneficiario/reflexivo. 'Hagan para ustedes' preserva ese sentido sin forzar una reflexión más intensa que la del hebreo.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  - Jehová
  lexicon: HALOT
  rationale: Se sigue el convenio del proyecto para renderizar יְהוָה como 'Yahvé', preservando el nombre divino propio en la forma española establecida.
- source_word: אֱלֹהֵיכֶם
  english_pob_choice: your God
  chosen_spanish: su Dios
  alternatives_spanish:
  - su Dios
  - sus dioses
  lexicon: HALOT
  rationale: Aunque la forma morfológica incluye plural, aquí funciona como fórmula de pacto para el Dios único de Israel. En español, 'su Dios' expresa correctamente el singular contextual.
theological_decisions:
- issue: Si el verbo prohibitivo debe explicitar adoración al ídolo
  english_pob_reading: Do not turn to idols
  chosen_spanish_reading: No se vuelvan hacia los ídolos
  alternative_spanish_readings:
  - No adoren a los ídolos
  - No presten atención a los ídolos
  rationale: El hebreo dice 'volver/se dirigir hacia', no 'adorar'. Mantener esa formulación conserva la tensión textual y evita añadir un matiz doctrinal no explicitado por el verbo.
  doctrine_reference: 'DOCTRINE.md Translation philosophy: Original-language primacy; Preserve theological tension rather than resolve it'
- issue: Cómo presentar el Tetragrámaton sin sustituirlo por un título
  english_pob_reading: I am Yahweh your God
  chosen_spanish_reading: Yo soy Yahvé, su Dios
  alternative_spanish_readings:
  - Yo soy el SEÑOR, su Dios
  - Yo soy Jehová, su Dios
  rationale: El texto hebreo usa el nombre divino יְהוָה directamente. La traducción mantiene ese nombre propio según la convención del proyecto, en lugar de ocultarlo tras un título.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Si 'dioses de metal fundido' debe normalizarse como 'ídolos'
  english_pob_reading: cast-metal gods
  chosen_spanish_reading: dioses de metal fundido
  alternative_spanish_readings:
  - ídolos de metal fundido
  - dioses fundidos
  rationale: La POB inglesa conserva el sustantivo 'gods' para no borrar la forma del hebreo אֱלֹהֵי. El español mantiene esa misma tensión, evitando reducirlo prematuramente a 'ídolos' en el texto principal.
  doctrine_reference: 'DOCTRINE.md Translation philosophy: Preserve lexical tension; render construct phrases transparently'
translation_notes:
  revision_awareness: La última revisión del testimonio inglés quedó sin cambios y con alto grado de acuerdo; por eso no se introducen variantes textuales nuevas, sino una equivalencia española directa y auditable que conserva las decisiones léxicas documentadas.
  spanish_consistency_notes:
  - Se mantuvo 'Yahvé' de forma consistente para יְהוָה, conforme al estándar del proyecto.
  - '''Ídolos'' se reservó para אֱלִילִים; ''dioses de metal fundido'' conserva la tensión distinta de אֱלֹהֵי מַסֵּכָה.'
  - '''su Dios'' refleja el sentido singular de אֱלֹהֵיכֶם en fórmula de pacto.'
  - La prohibición se formuló como orientación hacia los ídolos, sin añadir 'adorar' en el cuerpo principal.
