translation:
  language: es
  text: 'Ahab habló a Nabot, diciendo: “Dame tu viña, para que me sirva de huerto de verduras, porque está cerca de mi casa; y en su lugar te daré una viña mejor que la tuya. O, si te parece bien[a], te daré su precio en plata”.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: “si es bueno en tus ojos”, un modismo que significa “si te parece bien” o “si lo apruebas”.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְדַבֵּר
  english_pob_choice: spoke
  chosen_spanish: habló
  alternatives_spanish:
  - dijo
  - habló con
  lexicon: HALOT
  rationale: El verbo hebreo דבּר introduce un acto de habla directo; “habló” conserva el valor narrativo sin sobrecargarlo. “Dijo” sería posible, pero “habló a” refleja mejor la construcción con אֶל.
- source_word: תְּנָה לִּי
  english_pob_choice: Give me
  chosen_spanish: Entrégame
  alternatives_spanish:
  - Dame
  - Dámelo
  lexicon: HALOT
  rationale: El imperativo de נתן con objeto indirecto expresa una petición de entrega. “Entrégame” es natural en español y mantiene la fuerza directa de la solicitud de Ahab.
- source_word: כַּרְמְךָ
  english_pob_choice: your vineyard
  chosen_spanish: tu viña
  alternatives_spanish:
  - tu viñedo
  - tu viña de uvas
  lexicon: HALOT
  rationale: כֶּרֶם es el término habitual para un terreno de vid; “viña” es el equivalente bíblico más preciso y natural en español. “Viñedo” puede sonar más técnico o moderno.
- source_word: וִיהִי לִי לְגַן יָרָק
  english_pob_choice: so that it may become a vegetable garden for me
  chosen_spanish: para que me sirva de huerto de verduras
  alternatives_spanish:
  - para que sea para mí un huerto
  - para que se convierta para mí en huerto de hortalizas
  lexicon: HALOT
  rationale: La frase hebrea expresa finalidad y resultado; en español, “para que me sirva de” comunica bien la intención. “Huerto de verduras” mantiene el sentido agrícola de יָרָק sin caer en un calco rígido.
- source_word: קָרוֹב אֵצֶל בֵּיתִי
  english_pob_choice: because it is near my house
  chosen_spanish: porque está cerca de mi casa
  alternatives_spanish:
  - porque está junto a mi casa
  - porque está pegado a mi casa
  lexicon: HALOT
  rationale: La razón dada por Ahab es espacial; “cerca de mi casa” reproduce el sentido sin perder naturalidad. “Junto a” también sería válido, pero menos fluido aquí.
- source_word: וְאֶתְּנָה לְךָ תַּחְתָּיו
  english_pob_choice: and in its place I will give you
  chosen_spanish: y en su lugar te daré
  alternatives_spanish:
  - y te daré a cambio
  - y te daré en vez de ella
  lexicon: HALOT
  rationale: תַּחַת con sufijo expresa sustitución/intercambio. “En su lugar” preserva esa relación de reemplazo de forma idiomática.
- source_word: כֶּרֶם טוֹב מִמֶּנּוּ
  english_pob_choice: a better vineyard than it
  chosen_spanish: una mejor viña que ella
  alternatives_spanish:
  - una viña mejor que ella
  - una viña superior a ella
  lexicon: HALOT
  rationale: El comparativo de טוב con מן pide una comparación explícita. “Mejor viña” mantiene el grado comparativo y la referencia al terreno ofrecido.
- source_word: אִם טוֹב בְּעֵינֶיךָ
  english_pob_choice: if it seems good in your eyes
  chosen_spanish: si te parece bien
  alternatives_spanish:
  - si es bueno a tus ojos
  - si te agrada
  lexicon: HALOT
  rationale: El hebreo es un modismo de aprobación personal. “Si te parece bien” comunica el sentido idiomático en español sin deshacer la idea de evaluación subjetiva.
- source_word: כֶּסֶף מְחִיר זֶה
  english_pob_choice: its price in silver
  chosen_spanish: su precio en plata
  alternatives_spanish:
  - el precio de esto en plata
  - plata como precio de ello
  lexicon: HALOT
  rationale: La expresión designa el pago monetario equivalente al valor del terreno. “Precio en plata” conserva el componente material y evita interpretar de más.
translation_notes:
  revision_awareness: 'Se ha mantenido el sentido del texto hebreo con equivalencia óptima, siguiendo el audit trail inglés: petición directa, finalidad de reemplazo, comparación de calidad y modismo de aprobación. No se detectan revisiones posteriores que requieran ajuste.'
  spanish_consistency_notes:
  - Se usa “viña” para כֶּרֶם, en coherencia con el uso bíblico y con el término agrícola más natural en español.
  - Se mantiene la imagen idiomática de “en su lugar” para תַּחְתָּיו, evitando una paráfrasis excesiva.
  - “Plata” traduce כֶּסֶף en su valor monetario, acorde con el contexto de pago.
  - Se conserva el contraste entre la viña y el huerto de verduras para reflejar la intención de Ahab de reemplazar una plantación valiosa por una utilidad doméstica.
