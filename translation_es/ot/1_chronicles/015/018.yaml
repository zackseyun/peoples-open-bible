translation:
  language: es
  text: 'Y con ellos estaban sus hermanos de segundo rango: Zacarías[a], Ben-Jaaziel, y Semiramot, y Jehiel, y Uní, Eliab, y Benaía, y Maaseías, y Matatías, y Elifelehu, y Micneías, y Obed-edom, y Jeiel, los porteros.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘sus hermanos, el segundo grupo’ / ‘sus hermanos del segundo orden’. La expresión hebrea probablemente distingue un rango secundario entre los levitas o músicos.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְעִמָּהֶם
  english_pob_choice: And with them were
  chosen_spanish: Y con ellos estaban
  alternatives_spanish:
  - Y con ellos
  - Y con ellos también estaban
  lexicon: HALOT
  rationale: La frase hebrea introduce un grupo acompañante; en español, ‘estaban’ completa naturalmente la cláusula nominal y mantiene el sentido de presencia/acompañamiento sin añadir contenido ajeno.
- source_word: אֲחֵיהֶם
  english_pob_choice: their brothers
  chosen_spanish: sus hermanos
  alternatives_spanish:
  - sus parientes
  - sus compañeros
  lexicon: HALOT
  rationale: ‘Hermanos’ conserva la literalidad del hebreo y la opción auditada del POB en inglés. En este contexto levítico puede aludir a miembros del mismo grupo, pero no conviene suavizarlo sin razón textual.
- source_word: הַמִּשְׁנִים
  english_pob_choice: of the second rank
  chosen_spanish: de la segunda categoría
  alternatives_spanish:
  - del segundo orden
  - de segundo rango
  - los segundos
  lexicon: HALOT
  rationale: El término distingue una condición secundaria o grupo subordinado. ‘Segunda categoría’ comunica esa relación de forma clara en español sin perder la tensión semántica entre rango y grupo secundario. Se evita una traducción demasiado técnica o ambigua.
- source_word: זְכַרְיָהוּ
  english_pob_choice: Zechariah
  chosen_spanish: Zacarías
  alternatives_spanish:
  - Zekarías
  - Zecharías
  lexicon: Transliteration standard
  rationale: Nombre propio bíblico con forma castellana establecida y reconocible para lectores en español.
- source_word: בֵּן
  english_pob_choice: Ben-Jaaziel
  chosen_spanish: Ben-Jaaziel
  alternatives_spanish:
  - Ben y Jaaziel
  lexicon: English revision awareness
  rationale: Se sigue la revisión auditada que trata la secuencia como un solo nombre compuesto en esta lista, no como dos personas separadas. En español se mantiene la unión con guion para reflejar el valor onomástico transmitido.
- source_word: וְיַעֲזִיאֵל
  english_pob_choice: Jaaziel
  chosen_spanish: Jaaziel
  alternatives_spanish:
  - Yaaziel
  - Jaaziel
  lexicon: Transliteration standard
  rationale: Se conserva la transliteración habitual en español, coherente con el audit trail inglés y con el resto de los nombres propios del verso.
- source_word: שְׁמִירָמוֹת
  english_pob_choice: Shemiramoth
  chosen_spanish: Semeiramot
  alternatives_spanish:
  - Shemiramot
  - Shemiramot
  lexicon: Transliteration standard
  rationale: Se adapta el nombre a una forma castellana legible, manteniendo la identidad del nombre propio sin depender de una transliteración inglesa rígida. La forma busca ser pronunciable y reconocible.
- source_word: יְחִיאֵל
  english_pob_choice: Jehiel
  chosen_spanish: Jehiel
  alternatives_spanish:
  - Yehiel
  lexicon: Transliteration standard
  rationale: Se conserva la forma española tradicional del nombre, ampliamente inteligible en contextos bíblicos.
- source_word: עֻנִּי
  english_pob_choice: Unni
  chosen_spanish: Uni
  alternatives_spanish:
  - Unni
  lexicon: Transliteration standard
  rationale: Se mantiene el nombre propio con ortografía española simple y natural, sin alterar la identificación del personaje.
- source_word: אֱלִיאָב
  english_pob_choice: Eliab
  chosen_spanish: Eliab
  alternatives_spanish:
  - Eliab
  lexicon: Transliteration standard
  rationale: Nombre propio ya establecido en español bíblico; no requiere adaptación adicional.
- source_word: בְּנָיָהוּ
  english_pob_choice: Benaiah
  chosen_spanish: Benaía
  alternatives_spanish:
  - Benaiah
  lexicon: Transliteration standard
  rationale: Se usa la forma castellana usual para el nombre, conservando su identidad y facilitando la lectura en español.
- source_word: מַעֲשֵׂיָהוּ
  english_pob_choice: Maaseiah
  chosen_spanish: Maaséía
  alternatives_spanish:
  - Maaseías
  - Maseías
  lexicon: Transliteration standard
  rationale: Se adapta el nombre para una pronunciación natural en español, manteniendo la relación con la forma hebrea y la tradición transliterada.
- source_word: מַתִּתְיָהוּ
  english_pob_choice: Mattithiah
  chosen_spanish: Matatías
  alternatives_spanish:
  - Mattitías
  - Matityahu
  lexicon: Transliteration standard
  rationale: Se usa una forma castellana reconocible y fluida, preservando el nombre propio bíblico sin calcar la grafía inglesa.
- source_word: אֱלִיפְלֵהוּ
  english_pob_choice: Eliphelehu
  chosen_spanish: Elifelehu
  alternatives_spanish:
  - Elifelehu
  lexicon: Transliteration standard
  rationale: Se mantiene el nombre propio con una forma española legible. La leve adaptación ortográfica favorece pronunciación y uniformidad.
- source_word: מִקְנֵיָהוּ
  english_pob_choice: Mikneiah
  chosen_spanish: Micneía
  alternatives_spanish:
  - Mikneía
  lexicon: Transliteration standard
  rationale: Se ajusta la ortografía a una lectura española natural, conservando la forma propia del nombre.
- source_word: עֹבֵד אֱדֹם
  english_pob_choice: Obed-edom
  chosen_spanish: Obed-edom
  alternatives_spanish:
  - Obed-Edom
  lexicon: Conventional biblical name form
  rationale: Se conserva la forma compuesta ya reconocible en español bíblico y en la auditada inglesa.
- source_word: וִיעִיאֵל
  english_pob_choice: Jeiel
  chosen_spanish: Jeiel
  alternatives_spanish:
  - Yeiel
  lexicon: Transliteration standard
  rationale: Se mantiene la transliteración tradicional del nombre, consistente con el resto del verso.
- source_word: הַשֹּׁעֲרִים
  english_pob_choice: the gatekeepers
  chosen_spanish: los porteros
  alternatives_spanish:
  - los guardianes de la puerta
  - los porteros del templo
  lexicon: HALOT
  rationale: ‘Porteros’ es el equivalente bíblico tradicional en español para los encargados de las puertas/entradas del santuario. Aunque ‘guardianes de la puerta’ sería más explicativo, ‘porteros’ mantiene mejor la función técnica del grupo en este contexto.
theological_decisions:
- issue: Valor de הַמִּשְׁנִים como clase o rango subordinado
  english_pob_reading: of the second rank / the second order
  chosen_spanish_reading: de la segunda categoría
  alternative_spanish_readings:
  - del segundo orden
  - de segundo rango
  - los segundos
  rationale: La frase marca una distinción funcional dentro del grupo levítico o musical, no una simple enumeración ordinal. ‘Segunda categoría’ comunica el estatus secundario sin forzar una lectura doctrinal o institucional que el texto no explicita.
  doctrine_reference: Ninguna; decisión lexical/organizativa basada en el hebreo.
- issue: Tratamiento de la secuencia Ben + Jaaziel como nombre compuesto
  english_pob_reading: Ben-Jaaziel
  chosen_spanish_reading: Ben-Jaaziel
  alternative_spanish_readings:
  - Ben y Jaaziel
  rationale: La revisión auditada del POB indica que no debe leerse como dos individuos distintos. En español se preserva el compuesto para no deshacer una decisión textual ya adjudicada en el proceso editorial.
  doctrine_reference: Ninguna; decisión textual y onomástica.
translation_notes:
  revision_awareness: Se incorporó la revisión auditada que corrige la segmentación de ‘Ben-Jaaziel’ como nombre compuesto. También se mantuvo la lectura del grupo como ‘de la segunda rank’ con una equivalencia española que conserve la distinción de estatus.
  spanish_consistency_notes:
  - Se mantiene ‘Yahvé’ como norma general cuando aparezca el Tetragrámaton; en este versículo no aparece.
  - Se usa ‘porteros’ como término técnico bíblico consistente con el resto del proyecto.
  - Los nombres propios se han uniformado con formas castellanas o castellanizadas, priorizando legibilidad y continuidad bíblica en español.
  - Se evitó introducir ‘Mesías’, ‘Señor’ o otras sustituciones no presentes en el verso.
  - La nota al pie se ancla en ‘segunda categoría’ para preservar la alternativa lexical del hebreo.
