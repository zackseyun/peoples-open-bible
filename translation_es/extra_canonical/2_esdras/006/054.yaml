source:
  edition: Bensly 1895 (Texts and Studies III.2) + Bensly 1875 Missing Fragment, cleaned Latin
  text: Et super his Adam quem constituisti ducem super omnibus factis quae fecisti, et ex eo educimur nos omnes quem elegisti populum. Haec autem omnia dixi coram te, domine, quoniam dixisti quia propter nos creasti primogenitum saeculum. Residuas autem gentes ab Adam natas dixisti eas nihil esse et quoniam saliuae adsimilatae sunt et sicut stillicidium de uaso similasti habundantiam eorum. Et nunc, domine, ecce istae gentes quae in nihilum deputatae sunt dominantur nostri et deuorant nos. Nos autem populus tuus quem uocasti primogenitum, unigenitum, aemulatorem, carissimum traditi sumus in manibus eorum. Et si propter nos creatum est saeculum, quare non haereditatem possidemus nostrum saeculum? usquequo haec?
  language: Latin
base_translation:
  language: en
  yaml_path: translation/extra_canonical/2_esdras/006/054.yaml
  text: And over these is Adam[a], whom you appointed ruler over all the works that you made; and from him we all have come, the people whom you have chosen.
  footnotes:
