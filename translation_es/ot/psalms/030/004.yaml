translation:
  language: es
  text: Yahvé, sacaste mi alma del Seol[a][b]; me mantuviste con vida de entre los que descienden al pozo[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Seol es el término hebreo para el ámbito de los muertos; alternativamente, «la sepultura».
    reason: lexical_alternative
  - marker: b
    text: O «mi vida» para «mi alma».
    reason: lexical_alternative
  - marker: c
    text: O «me reanimaste de entre los que descienden al pozo», o, con otra interpretación, «me mantuviste con vida para que no descendiera al pozo».
    reason: alternative_reading
lexical_decisions:
- source_word: יְהוָה
  english_pob_choice: O Yahweh
  chosen_spanish: ¡Oh Yahvé!
  alternatives_spanish:
  - Señor
  - Yahvé
  lexicon: HALOT
  rationale: El Tetragrámaton se preserva con el nombre propio «Yahvé», conforme a la política POB; en español se mantiene la invocación directa con «¡Oh» para reproducir el tono vocativo del hebreo y del inglés auditado.
- source_word: הֶעֱלִיתָ
  english_pob_choice: you brought up
  chosen_spanish: tú hiciste subir
  alternatives_spanish:
  - tú levantaste
  - tú sacaste
  lexicon: HALOT
  rationale: El causativo de עלה expresa hacer subir desde abajo; «hiciste subir» conserva la imagen vertical y de rescate sin neutralizarla con un verbo más general.
- source_word: שְׁאוֹל
  english_pob_choice: Sheol
  chosen_spanish: Seol
  alternatives_spanish:
  - el sepulcro
  - la sepultura
  - el reino de los muertos
  lexicon: HALOT
  rationale: Se preserva el término técnico hebreo en transliteración española para no reducir su alcance semántico a una sola equivalencia como «sepulcro» o «infierno».
- source_word: נַפְשִׁי
  english_pob_choice: my soul
  chosen_spanish: mi alma
  alternatives_spanish:
  - mi vida
  - a mí
  lexicon: HALOT
  rationale: Aunque «alma» puede ser más tradicional en español, aquí también conserva el paralelismo poético y la ambigüedad hebrea de נפשׁ entre alma, vida y la persona misma.
- source_word: חִיִּיתַנִי
  english_pob_choice: you kept me alive
  chosen_spanish: me mantuviste con vida
  alternatives_spanish:
  - me vivificaste
  - me preservaste la vida
  lexicon: HALOT
  rationale: «Me mantuviste con vida» expresa la idea de preservación/restauración de vida sin introducir explícitamente una formulación de resurrección que el versículo no exige.
- source_word: מִיּוֹרְדֵי בּוֹר
  english_pob_choice: from among those going down to the pit
  chosen_spanish: para que no descendiera al pozo
  alternatives_spanish:
  - de entre los que descienden al pozo
  - desde los que bajan al pozo
  lexicon: HALOT
  rationale: 'La construcción hebrea admite una lectura separativa o final/resultativa; se adopta en español una formulación que fluye de manera natural y retiene la tensión: Dios lo mantuvo con vida de modo que no bajara al pozo.'
- source_word: בּוֹר
  english_pob_choice: the pit
  chosen_spanish: el pozo
  alternatives_spanish:
  - el hoyo
  - la fosa
  - la sepultura
  lexicon: HALOT
  rationale: «Pozo» preserva la imagen concreta del בור como cavidad/hoyo y evita identificarlo demasiado pronto con una sola lectura doctrinal o funeraria.
theological_decisions:
- issue: Si el versículo debe explicitar muerte, sepulcro o resurrección
  english_pob_reading: Retain the Hebrew imagery of Sheol and the pit without resolving it into 'hell,' 'grave' alone, or explicit resurrection language.
  chosen_spanish_reading: Mantener la imaginería hebrea de Seol y el pozo sin convertirla en «infierno», «sepulcro» a secas ni en lenguaje explícito de resurrección.
  alternative_spanish_readings:
  - «infierno»
  - «sepulcro»
  - «me resucitaste de entre los muertos»
  rationale: El texto poético celebra liberación de la muerte o del borde de la muerte con imágenes heredadas del hebreo. La traducción conserva esa tensión y no agrega una precisión doctrinal que el versículo no formula.
  doctrine_reference: Preserve theological tension rather than resolve it.
translation_notes:
  revision_awareness: 'Coincide con el último pase de revisión: no se registraron cambios necesarios y el consenso de verificación fue de alta concordancia.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» para el Nombre divino, no «SEÑOR».
  - Se conserva «Seol» como transliteración técnica, con nota explicativa.
  - Se elige una solución verbal que preserve la imagen de ascenso/descenso y la ambigüedad del hebreo.
  - «Pozo» traduce בור de forma concreta y poética, sin cerrar el sentido a una sola lectura.
  - 'La puntuación vocativa en español se adapta para naturalidad: «¡Oh Yahvé!».'
