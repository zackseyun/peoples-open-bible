  glossary_alignment: 'No hay conflictos con la terminología del proyecto. «Bel», «Babilonia», «Dios» no aparecen de manera problemática, y no hay términos sensibles del glosario principal en disputa. La decisión de mantener «ha caído» concuerda con la rationale auditada. '
