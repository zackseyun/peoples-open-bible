translation:
  language: es
  text: Pero nadie puede entrar en la casa del hombre fuerte y saquear sus bienes[a], a menos que primero ate al hombre fuerte[b]; y entonces saqueará su casa.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «sus posesiones»; más literalmente, «sus utensilios/cosas».
    reason: lexical_alternative
  - marker: b
    text: El «hombre fuerte» forma parte de la metáfora de Jesús sobre vencer a Satanás; la traducción conserva la imagen sin explicitar la interpretación en el texto principal.
    reason: cross_reference
lexical_decisions:
- source_word: ἀλλ’
  english_pob_choice: But
  chosen_spanish: Pero
  alternatives_spanish:
  - Sin embargo
  - Mas
  lexicon: BDAG
  rationale: Marca el contraste con la afirmación previa de Jesús. En español, «Pero» conserva la oposición de forma natural y directa.
- source_word: οὐδεὶς δύναται
  english_pob_choice: no one can
  chosen_spanish: nadie puede
  alternatives_spanish:
  - nadie es capaz de
  - ninguno puede
  lexicon: BDAG
  rationale: El indefinido negativo junto con δύναμαι expresa imposibilidad; «nadie puede» es la forma más idiomática y fiel en español.
- source_word: εἰς τὴν οἰκίαν
  english_pob_choice: enter the house
  chosen_spanish: entrar en la casa
  alternatives_spanish:
  - ir a la casa
  - entrar a la casa
  lexicon: BDAG
  rationale: El participio εἰσελθών con εἰς + acusativo se vierte naturalmente como «entrar en la casa»; mantiene la imagen espacial sin sobrecargarla.
- source_word: τοῦ ἰσχυροῦ / τὸν ἰσχυρόν
  english_pob_choice: the strong man
  chosen_spanish: el hombre fuerte
  alternatives_spanish:
  - el fuerte
  - el poderoso
  - el hombre poderoso
  lexicon: BDAG
  rationale: El adjetivo funciona sustantivamente. «Hombre fuerte» conserva la imagen del dicho y es la forma más clara y natural en español para este marco metafórico.
- source_word: τὰ σκεύη αὐτοῦ
  english_pob_choice: his goods
  chosen_spanish: sus bienes
  alternatives_spanish:
  - sus posesiones
  - sus pertenencias
  - sus cosas
  lexicon: BDAG
  rationale: σκεύη puede significar literalmente utensilios o cosas, pero aquí el contexto de saqueo apunta a pertenencias/bienes. «Sus bienes» preserva la amplitud del término sin el literalismo de «utensilios».
- source_word: διαρπάσαι
  english_pob_choice: plunder
  chosen_spanish: saquear
  alternatives_spanish:
  - despojar
  - robar
  - saquear por completo
  lexicon: BDAG
  rationale: El verbo implica tomar por la fuerza y despojar. «Saquear» conserva mejor la fuerza del acto que «robar», y funciona bien con la metáfora de irrupción y despojo.
- source_word: ἐὰν μὴ
  english_pob_choice: unless
  chosen_spanish: a menos que
  alternatives_spanish:
  - si no
  - excepto que
  lexicon: BDAG
  rationale: Es el equivalente condicional natural en español para expresar la condición necesaria previa.
- source_word: πρῶτον
  english_pob_choice: first
  chosen_spanish: primero
  alternatives_spanish:
  - antes
  - antes de eso
  lexicon: BDAG
  rationale: Mantiene la prioridad temporal de atar al hombre fuerte antes del saqueo.
- source_word: δήσῃ
  english_pob_choice: ties up
  chosen_spanish: ate
  alternatives_spanish:
  - ate fuertemente
  - amarre
  - ata
  lexicon: BDAG
  rationale: δέω significa atar/bind. «Ate» conserva el acto de inmovilizar sin introducir una intensidad no explicitada por el texto.
- source_word: καὶ τότε
  english_pob_choice: then indeed
  chosen_spanish: y entonces
  alternatives_spanish:
  - entonces
  - y luego
  lexicon: BDAG
  rationale: El griego marca la consecuencia posterior al cumplimiento de la condición. «Y entonces» reproduce esa secuencia de manera sobria.
- source_word: τὴν οἰκίαν αὐτοῦ διαρπάσει
  english_pob_choice: he will plunder his house
  chosen_spanish: saqueará su casa
  alternatives_spanish:
  - saqueará su hogar
  - despojará su casa
  - saqueará su casa y su casa
  lexicon: BDAG
  rationale: Se conserva la imagen de la casa como el ámbito del despojo. «Casa» mantiene la repetición intencional del texto; «hogar» suavizaría demasiado la metáfora.
theological_decisions:
- issue: Mantener la metáfora del «hombre fuerte» sin explicitar su referente satánico en el texto principal
  english_pob_reading: Retain the metaphor without interpretive expansion in the main text.
  chosen_spanish_reading: Conservar la metáfora sin identificarla explícitamente en el cuerpo del versículo.
  alternative_spanish_readings:
  - el Satanás fuerte
  - el poder del maligno
  - el hombre fuerte, es decir, Satanás
  rationale: El griego presenta una figura metafórica dentro del argumento de Jesús. La traducción conserva esa imagen y deja la identificación interpretativa para notas o contexto, evitando resolver la tensión en el texto principal.
  doctrine_reference: Preservar la tensión teológica y la imagen retórica del pasaje; cf. la lectura contextual de Marcos 3.
translation_notes:
  revision_awareness: La revisión más reciente del archivo inglés no introdujo cambios y el control cruzado mostró alta concordancia con sólo observaciones menores; por eso se mantiene la equivalencia óptima ya establecida, ajustando la formulación española para mayor naturalidad sin alterar el sentido ni la imagen.
  spanish_consistency_notes:
  - Se usa «Dios»/«Yahvé» según corresponda, pero este versículo no contiene referencia divina directa.
  - Se mantiene «casa» de manera repetida para reflejar el paralelismo del griego y la elección auditada del POB inglés.
  - «Saquear» se prefiere sobre «robar» para conservar la fuerza del verbo διαρπάζω.
  - Las notas al pie distinguen la amplitud semántica de σκεύη y la lectura metafórica del «hombre fuerte».
