revisions:
- from: En el día en que se cumplan los días de tu vida[a], y en el momento de la muerte, reparte tu herencia.
  to: El día en que lleguen a su fin los días de tu vida[a], y en el momento de la muerte, reparte tu herencia.
  rationale: Se reemplaza «En el día en que se cumplan» por «El día en que lleguen a su fin» para evitar un calco poco natural y reflejar mejor συντελείας como finalización de la vida. Se conserva «los días de tu vida» para mantener la explicitud del griego y del rastro de auditoría inglés. La nota se ajusta para ofrecer una alternativa literal más clara en español.
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T22:57:16Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador transmite correctamente el sentido básico del griego: una referencia temporal al final de la vida, seguida del mandato de distribuir la herencia. Conserva bien «los días de tu vida» y traduce adecuadamente τελευτῆς y κληρονομίαν. Sin embargo, «En el día» suena poco natural en español bíblico actual, y «se cumplan» junto con la nota «consumación» introduce una matización de cumplimiento/plenitud menos precisa que la de terminación o finalización presente en συντελείας.'
  spanish_quality_summary: La frase es clara, pero «En el día en que» resulta algo calcada. Una formulación como «El día en que lleguen a su fin los días de tu vida» mantiene la estructura temporal y suena más natural y digna. «En el momento de la muerte» es aceptable, aunque «al tiempo de la muerte» o «cuando llegue la muerte» serían alternativas; no es necesario cambiarlas si se conserva la concisión. «Reparte tu herencia» es natural y fiel.
  glossary_alignment: No hay conflictos con la terminología base del proyecto. Las decisiones léxicas principales son adecuadas. La corrección necesaria afecta sobre todo a la naturalidad de la expresión temporal y a precisar mejor συντελείας como finalización, no como mero cumplimiento.
  issues:
  - severity: medium
    issue: «En el día en que» es poco natural y suena a calco
    rationale: Aunque refleja formalmente ἐν ἡμέρᾳ, en español corriente y bíblico legible «El día en que» expresa mejor la referencia temporal específica sin pérdida de sentido.
  - severity: medium
    issue: «se cumplan» debilita la idea de terminación de συντελείας
    rationale: El griego apunta a consumación/finalización de los días de la vida. «Cumplirse» puede sugerir simplemente completarse cronológicamente; «lleguen a su fin» expresa con mayor precisión el cierre de la vida.
  - severity: low
    issue: La nota al pie con «consumación» no es la alternativa más clara en español actual
    rationale: «Consumación» es posible, pero puede sonar más técnica o menos transparente. «La terminación de los días de tu vida» o mantener una literalidad explicada sería más clara para el lector hispano.
  revised_spanish_text: El día en que lleguen a su fin los días de tu vida[a], y en el momento de la muerte, reparte tu herencia.
  revised_footnotes:
  - marker: a
    text: Literalmente, «la terminación de los días de tu vida».
    reason: lexical_alternative
  revision_rationale: Se reemplaza «En el día en que se cumplan» por «El día en que lleguen a su fin» para evitar un calco poco natural y reflejar mejor συντελείας como finalización de la vida. Se conserva «los días de tu vida» para mantener la explicitud del griego y del rastro de auditoría inglés. La nota se ajusta para ofrecer una alternativa literal más clara en español.
