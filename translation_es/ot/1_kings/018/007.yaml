translation:
  language: es
  text: 'Mientras Obadías iba de camino[a], he aquí que Elías lo encontró. Y cuando lo reconoció, cayó sobre su rostro y dijo: «¿Eres tú, mi señor[b] Elías?»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «por el camino». La expresión hebrea indica que Obadías iba en tránsito cuando ocurrió el encuentro.
    reason: alternative_reading
  - marker: b
    text: O «mi amo Elías» o «señor Elías». El hebreo אֲדֹנִי es aquí una forma respetuosa de dirigirse a Elías, no un título divino.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְהִי
  english_pob_choice: As ... was
  chosen_spanish: Mientras ... iba
  alternatives_spanish:
  - Y sucedió que
  - Y aconteció que
  lexicon: HALOT
  rationale: La forma narrativa introduce una circunstancia en curso; «Mientras ... iba» conserva el valor temporal sin sonar forzado en español.
- source_word: בַּדֶּרֶךְ
  english_pob_choice: on the way
  chosen_spanish: por el camino
  alternatives_spanish:
  - en el camino
  - de camino
  lexicon: HALOT
  rationale: Expresa con naturalidad el estado de tránsito del personaje y evita un calco demasiado rígido.
- source_word: וְהִנֵּה
  english_pob_choice: behold
  chosen_spanish: he aquí
  alternatives_spanish:
  - mira
  - y he aquí
  lexicon: HALOT
  rationale: «He aquí» preserva el giro de atención y sorpresa del hebreo, con registro bíblico claro en español.
- source_word: לִקְרָאתוֹ
  english_pob_choice: to meet him
  chosen_spanish: le salió al encuentro
  alternatives_spanish:
  - a encontrarlo
  - a su encuentro
  lexicon: HALOT
  rationale: La idiomática hebrea de ir al encuentro se vierte de forma natural en español, manteniendo el movimiento recíproco de la escena.
- source_word: וַיַּכִּרֵהוּ
  english_pob_choice: he recognized him
  chosen_spanish: lo reconoció
  alternatives_spanish:
  - lo identificó
  - lo conoció
  lexicon: HALOT
  rationale: «Reconoció» expresa con precisión el sentido de נכר en este contexto de identificación inmediata.
- source_word: וַיִּפֹּל עַל פָּנָיו
  english_pob_choice: he fell on his face
  chosen_spanish: se postró sobre su rostro
  alternatives_spanish:
  - cayó rostro en tierra
  - se inclinó con el rostro en tierra
  lexicon: HALOT
  rationale: La expresión hebrea es un modismo de postración; «se postró sobre su rostro» conserva la fuerza semántica y la solemnidad del gesto.
- source_word: הַאַתָּה זֶה
  english_pob_choice: Is it you
  chosen_spanish: ¿Eres tú?
  alternatives_spanish:
  - ¿Eres tú ese?
  - ¿De veras eres tú?
  lexicon: HALOT
  rationale: La pregunta expresa reconocimiento sorprendido. En español, «¿Eres tú?» comunica esa identificación de manera natural; el resto del contexto completa la referencia.
- source_word: אֲדֹנִי
  english_pob_choice: my lord
  chosen_spanish: mi señor
  alternatives_spanish:
  - mi amo
  - señor mío
  lexicon: HALOT
  rationale: Aquí es un tratamiento respetuoso dirigido a Elías, no un título divino; «mi señor» mantiene la deferencia sin confundirlo con el uso teológico de «Señor».
- source_word: אֵלִיָּהוּ
  english_pob_choice: Elijah
  chosen_spanish: Elías
  lexicon: standard proper-name convention
  rationale: Nombre propio transliterado según la convención española usual.
theological_decisions:
- issue: Tratamiento respetuoso de אֲדֹנִי aplicado a Elías
  english_pob_reading: my lord / my master / sir; respectful address to Elijah, not a divine title
  chosen_spanish_reading: mi señor
  alternative_spanish_readings:
  - mi amo
  - señor
  rationale: Se conserva el valor honorífico humano del término, evitando tanto una traducción demasiado coloquial como una confusión con el título divino. El contexto demuestra que habla a Elías como superior respetado.
  doctrine_reference: 'DOCTRINE.md: distinguir títulos humanos de títulos divinos; traducir el valor contextual del término sin ocultar la forma original.'
translation_notes:
  revision_awareness: 'La redacción sigue de cerca la revisión más reciente del inglés POB: mantiene la secuencia narrativa directa («le salió al encuentro»), conserva la sorpresa de la escena con «he aquí» y formula la pregunta de reconocimiento en registro natural («¿Eres tú?»).'
  spanish_consistency_notes:
  - Se mantiene «Elías» para אֵלִיָּהוּ y «Obadías» para עֹבַדְיָהוּ, según convención española estándar.
  - Se usa «mi señor» para אֲדֹנִי por tratarse de una forma de respeto dirigida a un ser humano, no del nombre/título divino.
  - La puntuación y comillas siguen el uso editorial en español; la nota al pie queda anclada en «por el camino» para preservar la alternativa literal.
