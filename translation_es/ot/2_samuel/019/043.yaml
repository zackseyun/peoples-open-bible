    issue: «Porque el rey está cerca de mí[a]» no preserva bien el sentido contextual de parentesco/tribu.
    rationale: Aunque la nota explica la alternativa, el hebreo en este contexto y la decisión inglesa auditada favorecen cercanía relacional, no mera proximidad espacial. En español, «está cerca de mí» introduce una ambigüedad innecesaria y suena menos fiel al argumento de Judá.
  - severity: low
