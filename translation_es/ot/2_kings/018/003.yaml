translation:
  language: es
  text: Él hizo lo recto a los ojos de Yahvé, conforme a todo lo que había hecho David su padre[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebreo 'padre' aquí puede significar antepasado en la línea davídica, no necesariamente padre inmediato.
    reason: cultural_note
lexical_decisions:
- source_word: וַיַּעַשׂ
  english_pob_choice: He did
  chosen_spanish: Él hizo
  alternatives_spanish:
  - E hizo
  - Hizo
  lexicon: HALOT
  rationale: El wayyiqtol narrativo se vierte naturalmente con pretérito simple en español; se conserva la acción directa sin añadir palabras innecesarias.
- source_word: הַיָּשָׁר
  english_pob_choice: what was right
  chosen_spanish: lo recto
  alternatives_spanish:
  - lo justo
  - lo correcto
  - lo que era recto
  lexicon: HALOT
  rationale: El adjetivo con artículo funciona sustantivado. 'Lo recto' preserva la evaluación moral del texto de forma natural en español.
- source_word: בְּעֵינֵי יְהוָה
  english_pob_choice: in the eyes of Yahweh
  chosen_spanish: ante los ojos de Yahvé
  alternatives_spanish:
  - a los ojos de Yahvé
  - delante de Yahvé
  - en la evaluación de Yahvé
  lexicon: HALOT
  rationale: Se conserva el modismo hebreo de evaluación desde la perspectiva divina. 'Ante los ojos de Yahvé' mantiene transparencia idiomática y usa el nombre divino según la norma del proyecto.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: El Tetragrámaton se vierte como 'Yahvé' siguiendo la convención doctrinal del proyecto, en lugar de sustituirlo por un título.
- source_word: כְּכֹל אֲשֶׁר
  english_pob_choice: according to all that
  chosen_spanish: conforme a todo lo que
  alternatives_spanish:
  - según todo lo que
  - de acuerdo con todo lo que
  - tal como todo lo que
  lexicon: HALOT
  rationale: La construcción comparativa de conformidad se expresa con una fórmula española fluida que conserva la relación de modelo o patrón.
- source_word: עָשָׂה
  english_pob_choice: had done
  chosen_spanish: había hecho
  alternatives_spanish:
  - hizo
  - había actuado
  lexicon: HALOT
  rationale: 'El pluscuamperfecto español aclara la relación temporal: David sirve como antecedente y norma para la acción del rey.'
- source_word: דָּוִד אָבִיו
  english_pob_choice: David his father
  chosen_spanish: David su padre
  alternatives_spanish:
  - David su antepasado
  - su padre David
  - David, su padre
  lexicon: HALOT
  rationale: Se mantiene la fórmula dinástica literal. En español, 'su padre' conserva la relación textual, y el sentido de antepasado queda disponible para nota si se necesita.
theological_decisions:
- issue: Renderización del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Jehová
  rationale: El texto hebreo usa directamente el nombre personal de Dios. 'Yahvé' preserva ese dato y evita la sustitución por un título.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Sentido de 'padre' en 'David su padre'
  english_pob_reading: Retain the literal dynastic formula 'David his father' in the main text
  chosen_spanish_reading: Mantener la fórmula dinástica literal 'David su padre'
  alternative_spanish_readings:
  - David su antepasado
  - su padre David
  rationale: En contextos reales, 'padre' puede designar antepasado o fundador de la dinastía. La fórmula literal preserva la resonancia bíblica y la referencia al modelo davídico.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #1 and #5'
translation_notes:
  revision_awareness: La revisión más reciente indicó que no se requerían cambios; el borrador español se ajusta al acuerdo alto del paquete fuente y conserva la decisión doctrinal sobre Yahvé y la fórmula dinástica.
  spanish_consistency_notes:
  - Se usó 'Yahvé' de manera consistente para יְהוָה.
  - Se evitó 'SEÑOR' como sustitución del nombre divino.
  - '''Lo recto'' mantiene el valor evaluativo del hebreo sin sobreexplicar.'
  - '''Su padre'' conserva la fórmula textual, con nota aclaratoria sobre el sentido dinástico.'
