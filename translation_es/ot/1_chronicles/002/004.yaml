translation:
  language: es
  text: 'Tamar, su nuera, le dio hijos: Pérez[b] y Zérah. Todos los hijos de Judá fueron cinco[a].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «Todos los hijos de Judá fueron cinco», resumiendo el total después de añadir a Pérez y Zérah a los hijos anteriores de Judá.'
    reason: cross_reference
  - marker: b
    text: «Pérez» corresponde al nombre hebreo פֶּרֶץ; en algunos sistemas de transliteración aparece como «Peretz».
    reason: lexical_alternative
lexical_decisions:
- source_word: תָמָר
  english_pob_choice: Tamar
  chosen_spanish: Tamar
  alternatives_spanish:
  - Támara
  lexicon: HALOT
  rationale: Nombre propio; se translitera y se mantiene la forma bíblica usual en español.
- source_word: כַּלָּתוֹ
  english_pob_choice: his daughter-in-law
  chosen_spanish: su nuera
  alternatives_spanish:
  - su hija política
  - la esposa de su hijo
  lexicon: HALOT
  rationale: כַּלָּה con sufijo posesivo designa aquí a la esposa del hijo, es decir, nuera. «Su nuera» es el equivalente natural y preciso en español.
- source_word: יָלְדָה
  english_pob_choice: bore
  chosen_spanish: le dio a luz
  alternatives_spanish:
  - parió
  - dio a luz
  lexicon: HALOT
  rationale: El verbo expresa parto/nacimiento en registro genealógico. «Le dio a luz» conserva la relación con el destinatario implícito del hebreo y suena natural en español.
- source_word: לוֹ
  english_pob_choice: to him
  chosen_spanish: le
  alternatives_spanish:
  - a él
  - para él
  lexicon: HALOT
  rationale: El sufijo preposicional refiere a Judá; en español, el dativo «le» reproduce esa relación de manera idiomática dentro de la frase verbal.
- source_word: פֶּרֶץ
  english_pob_choice: Perez
  chosen_spanish: Pérez
  alternatives_spanish:
  - Peretz
  lexicon: HALOT
  rationale: Nombre propio. En español, la forma bíblica establecida es «Pérez»; se mantiene esa tradición para legibilidad pública.
- source_word: זָרַח
  english_pob_choice: Zerah
  chosen_spanish: Zérah
  alternatives_spanish:
  - Zéraj
  - Zerar
  lexicon: HALOT
  rationale: Nombre propio. Se conserva la transliteración bíblica corriente en español con acento para marcar la pronunciación.
- source_word: כָּל בְּנֵי יְהוּדָה
  english_pob_choice: All the sons of Judah
  chosen_spanish: Todos los hijos de Judá
  alternatives_spanish:
  - Todos los hijos varones de Judá
  - Todos los hijos de Judá
  lexicon: HALOT
  rationale: «בְּנֵי» significa literalmente «hijos de». En español bíblico, «hijos» reproduce el conteo genealógico y evita una paraphrase excesiva; el contexto indica descendencia masculina.
- source_word: חֲמִשָּׁה
  english_pob_choice: five
  chosen_spanish: cinco
  alternatives_spanish:
  - '5'
  lexicon: HALOT
  rationale: Número cardinal simple que resume el total genealógico.
theological_decisions:
- issue: Cláusula final de suma genealógica
  english_pob_reading: All the sons of Judah were five.
  chosen_spanish_reading: Todos los hijos de Judá fueron cinco.
  alternative_spanish_readings:
  - 'Éstos fueron todos los hijos de Judá: cinco'
  - Todos los hijos de Judá sumaban cinco
  rationale: Se mantiene la cláusula como un resumen contable directo, sin explicar más de lo que el hebreo dice. La puntuación conserva el carácter de recapitulación genealógica.
  doctrine_reference: Translation philosophy §1, §6
- issue: Términos de parentesco y descendencia
  english_pob_reading: Retain 'daughter-in-law' and 'sons' rather than neutralizing the terms.
  chosen_spanish_reading: su nuera / sus hijos
  alternative_spanish_readings:
  - pariente por matrimonio / descendientes
  - hijos e hijas
  rationale: El hebreo usa términos específicos de parentesco y descendencia masculina. En español se preserva esa precisión sin neutralizar el género cuando el texto fuente lo marca.
  doctrine_reference: Translation philosophy §4
- issue: Forma del nombre divino no presente explícitamente
  english_pob_reading: No divine-name issue in this verse beyond the proper noun Judah.
  chosen_spanish_reading: Judá
  alternative_spanish_readings:
  - Judas
  rationale: No hay sustitución por un título divino. Se conserva el nombre propio como corresponde al linaje de Judá.
  doctrine_reference: Translation philosophy §1
translation_notes:
  revision_awareness: El texto sigue de cerca el registro genealógico del hebreo y coincide con la decisión auditada del inglés POB de conservar la suma explícita del total de hijos de Judá. No se detectaron revisiones sustantivas en el pasaje fuente.
  spanish_consistency_notes:
  - Se mantiene el tono genealógico breve y declarativo.
  - Se conserva el orden natural del español sin perder la relación de dativo del hebreo.
  - Los nombres propios siguen formas bíblicas reconocibles para lectura eclesial en español.
  - La suma final se expresa sin expansión interpretativa.
