translation:
  language: es
  text: Pero Menelao[a], habiéndose ya ganado el favor de Ptolomeo, hijo de Dorímenes, le prometió una suma considerable de dinero para persuadir al rey.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «habiéndose ya congraciado con Ptolomeo» o «habiendo ya puesto a Ptolomeo de su lado». El participio griego λελιμμένος es difícil y puede sugerir que Menelao ya había asegurado la disposición favorable de Ptolomeo antes de hacer esta promesa de dinero.
    reason: lexical_alternative
lexical_decisions:
- source_word: λελιμμένος
  english_pob_choice: having been won over
  chosen_spanish: ya habiendo sido ganado
  alternatives_spanish:
  - ya habiendo sido persuadido
  - ya habiendo sido sobornado
  - ya habiendo sido atraído favorablemente
  lexicon: LSJ
  rationale: El participio perfecto pasivo sugiere un estado previo ya logrado sobre Menelao o sobre la disposición del otro actor; en español, «habiendo sido ganado» conserva la pasividad y la idea de influencia previa sin fijar el medio. Se evita precisar «sobornado» porque el griego de esta forma verbal, por sí solo, no obliga a ese matiz.
- source_word: ἐπηγγείλατο
  english_pob_choice: promised
  chosen_spanish: prometió
  alternatives_spanish:
  - ofreció
  - se comprometió a dar
  lexicon: BDAG
  rationale: La forma media aquí expresa de manera natural una promesa u ofrecimiento. «Prometió» es el equivalente más directo e idiomático en español y mantiene el valor de compromiso verbal.
- source_word: χρήματα ἱκανὰ
  english_pob_choice: a considerable amount of money
  chosen_spanish: una suma considerable de dinero
  alternatives_spanish:
  - suficiente dinero
  - fondos considerables
  - una gran suma de dinero
  lexicon: LSJ
  rationale: χρήματα significa dinero o fondos, e ἱκανά aporta la idea de cantidad suficiente/considerable. «Una suma considerable de dinero» refleja bien ambas ideas sin volver el español artificial.
- source_word: τῷ Πτολεμαίῳ Δορυμένους
  english_pob_choice: Ptolemy son of Dorymenes
  chosen_spanish: a Ptolomeo, hijo de Dorímenes
  alternatives_spanish:
  - a Ptolomeo de Dorímenes
  - a Ptolomeo, Dorímenes' hijo
  lexicon: LSJ
  rationale: El genitivo se entiende como patronímico; en español «hijo de Dorímenes» hace explícita la relación familiar de modo natural y auditable.
- source_word: πρὸς τὸ πεῖσαι τὸν βασιλέα
  english_pob_choice: to persuade the king
  chosen_spanish: para persuadir al rey
  alternatives_spanish:
  - con el fin de persuadir al rey
  - a fin de convencer al rey
  lexicon: BDAG
  rationale: La construcción preposición + infinitivo expresa finalidad. «Para persuadir al rey» reproduce con claridad ese valor de propósito, sin añadir contenido interpretativo extra.
theological_decisions:
- issue: Traducción del participio perfecto pasivo λελιμμένος y su posible trasfondo de influencia previa o soborno
  english_pob_reading: already having been won over; possibly already in a favorable disposition
  chosen_spanish_reading: ya habiendo sido ganado
  alternative_spanish_readings:
  - ya habiendo sido ganado favorablemente
  - ya habiendo sido sobornado
  - ya estando ya predispuesto favorablemente
  rationale: El texto no obliga a definir el mecanismo como soborno, aunque el contexto narrativo pueda sugerir maniobra indebida. La traducción conserva la ambigüedad del griego y permite leer una influencia previa sin forzar una imputación adicional.
  doctrine_reference: Principio de fidelidad semántica y cautela ante inferencias contextuales no explícitas
translation_notes:
  revision_awareness: Se revisó la lectura inglesa y el texto griego; la versión inglesa tomó λελιμμένος como «having been won over» con nota de posible matiz favorable previo. En español se preserva esa tensión sin convertirla en soborno explícito ni borrar la ambigüedad lexical.
  spanish_consistency_notes:
  - Se mantiene «Menelao» y «Ptolomeo, hijo de Dorímenes» como formas publicables y transparentes.
  - Se usa «rey» para βασιλέα, sin mayúscula, porque el griego no marca nombre propio aquí.
  - No se introduce «Cristo», «Señor» ni vocabulario litúrgico ajeno al pasaje.
