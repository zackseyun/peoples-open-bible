translation:
  language: es
  text: He cosido cilicio sobre mi piel, y he hundido mi cuerno[a] en el polvo[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Cuerno» es una metáfora hebrea de fuerza, honor o exaltación.
    reason: cultural_note
  - marker: b
    text: 'O: «y he arrojado / he profanado mi cuerno en el polvo». El verbo hebreo aquí es difícil y su matiz exacto es incierto.'
    reason: lexical_alternative
lexical_decisions:
- source_word: שַׂק
  english_pob_choice: sackcloth
  chosen_spanish: cilicio
  alternatives_spanish:
  - saco de cilicio
  - saco
  lexicon: HALOT
  rationale: En contexto de lamento, el término español más natural y reconocido para la prenda de duelo es «cilicio». Aunque «sackcloth» se puede verter literalmente como «saco», en español bíblico eso sería menos claro; «cilicio» conserva el valor cultural de vestidura penitencial/mortuoria sin perder precisión contextual.
- source_word: תָּפַרְתִּי
  english_pob_choice: I have sewn
  chosen_spanish: He cosido
  alternatives_spanish:
  - He cosido con aguja
  - He cosido/He remendado
  lexicon: HALOT
  rationale: El perfecto hebreo comunica una acción ya realizada con efecto presente. «He cosido» reproduce bien esa completitud en español y mantiene la imagen concreta de la acción de coser.
- source_word: עֲלֵי
  english_pob_choice: over
  chosen_spanish: sobre
  alternatives_spanish:
  - encima de
  - por encima de
  lexicon: HALOT
  rationale: La preposición expresa colocación encima del cuerpo. «Sobre» es la opción más natural y fiel en español, sin añadir matices direccionales no requeridos.
- source_word: גִלְדִּי
  english_pob_choice: my skin
  chosen_spanish: mi piel
  alternatives_spanish:
  - mi piel curtida
  - mi epidermis
  lexicon: HALOT
  rationale: Aunque el inglés POB eligió «skin», en español «piel» es el equivalente más natural y adecuado para el cuerpo humano; «piel» mantiene el contraste corporal del lamento sin sonar técnico o zoológico.
- source_word: וְעֹלַלְתִּי
  english_pob_choice: and thrust
  chosen_spanish: y he hundido
  alternatives_spanish:
  - y he arrojado
  - y he abatido
  - y he humillado
  lexicon: HALOT
  rationale: El verbo es difícil y admite varias lecturas. «He hundido» conserva una imagen concreta de rebajar o empujar hacia abajo, compatible con «en el polvo», sin resolver excesivamente la ambigüedad del hebreo.
- source_word: בֶעָפָר
  english_pob_choice: into the dust
  chosen_spanish: en el polvo
  alternatives_spanish:
  - en el polvo de la tierra
  - hasta el polvo
  lexicon: HALOT
  rationale: El hebreo permite un sentido locativo o resultativo. En español, con «hundido», «en el polvo» comunica bien la humillación sin forzar una dirección más explícita de la que exige el texto.
- source_word: קַרְנִי
  english_pob_choice: my horn
  chosen_spanish: mi cuerno
  alternatives_spanish:
  - mi fuerza
  - mi honra
  - mi dignidad
  lexicon: HALOT
  rationale: Se preserva la metáfora literal del hebreo, tal como hace la POB inglesa. «Cuerno» mantiene la fuerza poética de la imagen de poder, honor o exaltación, y evita interpretar el símbolo en la línea principal.
theological_decisions:
- issue: Metáfora de «cuerno» como símbolo de honra/fuerza
  english_pob_reading: Preserve the metaphor as 'my horn' in the main text
  chosen_spanish_reading: Conservar «mi cuerno» en el texto principal
  alternative_spanish_readings:
  - mi fuerza
  - mi honra
  - mi dignidad
  rationale: La imagen concreta forma parte del paralelismo poético y de la humillación expresada en el versículo. Mantener la metáfora evita aplanar el sentido y sigue de cerca la lectura auditada del POB inglés.
  doctrine_reference: Translation philosophy §3, §5
- issue: Valor incierto de וְעֹלַלְתִּי
  english_pob_reading: Render with a concrete lowering action ('thrust')
  chosen_spanish_reading: Traducir con un acto concreto de abatimiento («he hundido»)
  alternative_spanish_readings:
  - he defraudado
  - he profanado
  - he arrojado
  rationale: El hebreo es semánticamente difícil y la tradición de interpretación ofrece alternativas. «He hundido» conserva el movimiento descendente y la asociación con «polvo» sin imponer una glosa doctrinal o demasiado específica.
  doctrine_reference: Translation philosophy §3
translation_notes:
  revision_awareness: El pasaje coincide con la última revisión disponible, que no introdujo cambios y fue confirmada con alto grado de acuerdo. Se mantuvo la lectura principal del POB inglés y se adaptó al español con equivalencia óptima, preservando la ambigüedad verbal y la metáfora del «cuerno».
  spanish_consistency_notes:
  - Se evita «SEÑOR» porque no aparece el tetragrámaton ni un equivalente directo en este versículo.
  - Se eligió «cilicio» en vez de un literalismo como «saco» para reflejar el valor de vestidura de duelo en español bíblico.
  - Se conservó la metáfora de «cuerno» sin explicarla en el texto principal; la aclaración queda en nota.
  - La sintaxis usa perfecto compuesto para reflejar el estado resultante y mantener naturalidad en español.
  - Se usó «polvo» sin artículo para reproducir la concisión poética del hebreo.
