revisions:
- from: Porque del polvo no sale[a] el mal, ni del suelo brota el trabajo.
  to: Porque la aflicción no viene del polvo[a], ni del suelo brota la fatiga.
  rationale: 'Se revisa para reflejar mejor el sentido contextual documentado en el POB: sufrimiento/aflicción y fatiga penosa, no ''mal'' moral ni ''trabajo'' neutro. ''Viene del polvo'' también mejora la naturalidad del español sin perder la metáfora de procedencia negada. La nota conserva las alternativas léxicas importantes del hebreo.'
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T22:56:30Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador capta la estructura y la imaginería básica del hebreo, pero no preserva bien las decisiones léxicas auditadas del POB en dos puntos clave: אָוֶן se inclinó en inglés hacia ''trouble'' (aflicción/desgracia) y no hacia ''moral evil'', mientras que עָמָל se representó como ''toil'' en sentido de fatiga penosa, no como ''trabajo'' en general. Además, ''sale'' sin complemento explícito en español suena algo abrupto junto con ''del polvo''.'
  spanish_quality_summary: El español es comprensible, pero 'el mal' introduce una ambigüedad más moral de la deseada y 'el trabajo' suena demasiado neutro y cotidiano para un paralelo poético con sufrimiento. Una formulación como 'la aflicción' y 'la fatiga' conserva mejor el tono, la legibilidad y el sentido contextual. También conviene suavizar 'sale' a 'viene' para mayor naturalidad en español bíblico moderno.
  glossary_alignment: 'No hay conflicto con la terminología mayor del proyecto. El ajuste principal es alinear mejor la semántica contextual de אָוֶן y עָמָל con el audit trail inglés: ''aflicción''/''desgracia'' y ''fatiga'' en lugar de ''mal'' y ''trabajo''.'
  issues:
  - severity: high
    issue: '''el mal'' para אָוֶן desplaza el sentido hacia lo moral'
    rationale: El audit trail inglés escogió 'trouble' precisamente para evitar fijar el término como maldad o iniquidad. En español, 'el mal' suena más abstracto y moral que 'aflicción' o 'desgracia', y altera la tensión teológica documentada.
  - severity: medium
    issue: '''el trabajo'' para עָמָל es demasiado general'
    rationale: Aunque עָמָל puede incluir labor, aquí el paralelo con אָוֶן y el razonamiento sobre sufrimiento favorecen una idea de fatiga penosa/miseria, no 'trabajo' en sentido neutro.
  - severity: low
    issue: '''sale'' resulta menos natural que ''viene'' en esta construcción'
    rationale: El hebreo tiene idea de emergencia desde una fuente, pero en español 'no viene del polvo' suena más idiomático que 'del polvo no sale' en una línea sapiencial de este tipo.
  revised_spanish_text: Porque la aflicción no viene del polvo[a], ni del suelo brota la fatiga.
  revised_footnotes:
  - marker: a
    text: 'O: «Porque la iniquidad no viene del polvo, ni del suelo brota la miseria». El hebreo אָוֶן también puede referirse a iniquidad, calamidad o desgracia, y עָמָל puede significar fatiga, afán o miseria.'
    reason: lexical_alternative
  revision_rationale: 'Se revisa para reflejar mejor el sentido contextual documentado en el POB: sufrimiento/aflicción y fatiga penosa, no ''mal'' moral ni ''trabajo'' neutro. ''Viene del polvo'' también mejora la naturalidad del español sin perder la metáfora de procedencia negada. La nota conserva las alternativas léxicas importantes del hebreo.'
