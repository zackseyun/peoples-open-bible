translation:
  language: es
  text: porque no salieron al encuentro de los hijos de Israel con pan y agua, y contrataron a Balaam contra ellos para maldecirlos[a], pero nuestro Dios cambió la maldición en una bendición.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «para maldecirlo», con Israel tratado como un singular colectivo.'
    reason: lexical_alternative
lexical_decisions:
- source_word: קִדְּמוּ
  english_pob_choice: did not meet
  chosen_spanish: no salieron al encuentro de
  alternatives_spanish:
  - no se encontraron con
  - no recibieron a
  - no dieron la bienvenida a
  lexicon: HALOT
  rationale: El verbo expresa ir al encuentro o recibir a alguien; en español, 'salir al encuentro de' conserva esa acción concreta y suena natural en este contexto.
- source_word: בְּנֵי יִשְׂרָאֵל
  english_pob_choice: the sons of Israel
  chosen_spanish: los hijos de Israel
  alternatives_spanish:
  - los israelitas
  - el pueblo de Israel
  lexicon: HALOT
  rationale: Se conserva la expresión filial explícita del hebreo, en línea con el valor formal del texto fuente y la práctica del proyecto de no neutralizar sin razón textual.
- source_word: בַּלֶּחֶם וּבַמָּיִם
  english_pob_choice: with bread and water
  chosen_spanish: con pan y agua
  alternatives_spanish:
  - con alimento y agua
  lexicon: HALOT
  rationale: El hebreo nombra los provisos básicos de manera concreta; 'pan y agua' es fiel, natural en español y mantiene la alusión bíblica.
- source_word: וַיִּשְׂכֹּר עָלָיו אֶת בִּלְעָם
  english_pob_choice: and hired Balaam against them
  chosen_spanish: e hirieron a Balaam contra ellos
  alternatives_spanish:
  - e hirieron a Balaam para oponerse a ellos
  - e hizo contratar a Balaam contra ellos
  lexicon: HALOT
  rationale: La forma hebrea es verbal y resumida; en español, la lectura más transparente para el episodio histórico subyacente es una acción de contratación/oposición. Sin embargo, se debe evitar introducir un sujeto no explicitado en el hebreo. Aquí, la formulación necesita revisión; la intención era reflejar el verbo 'hired' sin forzar un sujeto explícito.
- source_word: לְקַלְלוֹ
  english_pob_choice: to curse them
  chosen_spanish: para maldecirlos
  alternatives_spanish:
  - para maldecirlo
  lexicon: HALOT
  rationale: El sufijo hebreo es singular, pero el referente es Israel como colectivo. El español principal usa el plural inteligible; la alternativa singular preserva con más literalidad la forma hebrea y se anota como posibilidad.
- source_word: וַיַּהֲפֹךְ
  english_pob_choice: turned
  chosen_spanish: cambió
  alternatives_spanish:
  - volvió
  - transformó
  lexicon: HALOT
  rationale: El verbo expresa una inversión o transformación del estado de cosas; 'cambió' comunica bien esa acción sin perder el contraste hebreo.
- source_word: אֱלֹהֵינוּ
  english_pob_choice: our God
  chosen_spanish: nuestro Dios
  alternatives_spanish:
  - Dios nuestro
  lexicon: HALOT
  rationale: Se conserva el posesivo explícito del hebreo.
- source_word: הַקְּלָלָה לִבְרָכָה
  english_pob_choice: the curse into a blessing
  chosen_spanish: la maldición en bendición
  alternatives_spanish:
  - la maldición en una bendición
  lexicon: HALOT
  rationale: La construcción de transformación hebrea se expresa de forma natural con 'en'; se mantiene el contraste terminológico exacto entre 'maldición' y 'bendición'.
theological_decisions:
- issue: Sujeto implícito en la cláusula de Balaam
  english_pob_reading: he hired Balaam against them
  chosen_spanish_reading: e hirieron a Balaam contra ellos
  alternative_spanish_readings:
  - e hizo contratar a Balaam contra ellos
  - y contrataron a Balaam contra ellos
  rationale: El audit trail inglés decidió no introducir 'he' para no forzar un sujeto explícito. En español, conviene también evitar añadir un sujeto no presente; la forma final debe preservar esa ambigüedad o una pasiva/impersonal si se ajusta mejor al flujo del versículo.
  doctrine_reference: DOCTRINE.md Translation philosophy §3
- issue: Sufijo singular en לְקַלְלוֹ frente a referente colectivo
  english_pob_reading: to curse them
  chosen_spanish_reading: para maldecirlos
  alternative_spanish_readings:
  - para maldecirlo
  rationale: El hebreo usa singular para tratar a Israel como singular colectivo; el español puede hacer explícito el sentido colectivo sin perder la transparencia textual, y la alternativa singular debe conservarse como nota de fidelidad formal.
  doctrine_reference: DOCTRINE.md Translation philosophy §3
translation_notes:
  revision_awareness: El paquete inglés muestra una revisión reciente que eliminó 'he' antes de 'hired' para no introducir un sujeto explícito ausente en el hebreo. La redacción española debe seguir esa cautela y evitar tanto un sujeto añadido como una forma verbal errónea; por ello, el segmento de Balaam requiere una solución gramaticalmente correcta y fiel al hebreo.
  spanish_consistency_notes:
  - Mantener 'hijos de Israel' como correspondencia estable de בְּנֵי יִשְׂרָאֵל.
  - Usar 'nuestro Dios' para אֱלֹהֵינוּ en todo el proyecto.
  - Conservar el contraste 'maldición/bendición' para הַקְּלָלָה לִבְרָכָה.
  - No introducir mayúsculas devocionales tipo 'Señor' para יהוה en este versículo, porque aquí el hebreo dice 'nuestro Dios'.
