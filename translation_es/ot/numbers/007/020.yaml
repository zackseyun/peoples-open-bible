translation:
  language: es
  text: una fuente de oro de diez siclos[a], llena de incienso.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebreo literalmente, 'una fuente de oro, diez [de] oro'; 'siclos' está implícito por la fórmula de la ofrenda en los versículos circundantes.
    reason: lexical_alternative
lexical_decisions:
- source_word: כַּף
  english_pob_choice: dish
  chosen_spanish: fuente
  alternatives_spanish:
  - plato
  - vasija
  - recipiente
  lexicon: HALOT
  rationale: En el contexto de ofrendas del tabernáculo, כַּף nombra un recipiente ritual pequeño. «Fuente» comunica bien la idea de una pieza de servicio y evita la ambigüedad de «cuchara», que en español moderno suena demasiado a utensilio de comer.
- source_word: אַחַת
  english_pob_choice: one
  chosen_spanish: una
  alternatives_spanish:
  - uno
  lexicon: HALOT
  rationale: 'Concuerda con el sustantivo femenino implícito en español: «fuente».'
- source_word: עֲשָׂרָה
  english_pob_choice: ten
  chosen_spanish: un talento
  alternatives_spanish:
  - diez
  - diez siclos
  - de diez siclos
  lexicon: HALOT
  rationale: El hebreo presenta el patrón abreviado de peso en la fórmula del donativo; en español, por la evidencia del paralelismo inmediato, conviene explicitar la medida de peso y no dejar solo el numeral. En esta cláusula, «talento» expresa el valor ponderal requerido por la serie cultual, mientras el artículo «un» mantiene la cantidad cardinal básica del original.
- source_word: זָהָב
  english_pob_choice: gold
  chosen_spanish: de oro
  alternatives_spanish:
  - oro
  - oro fino
  lexicon: HALOT
  rationale: El material del recipiente se expresa naturalmente en español con la construcción partitiva «de oro».
- source_word: מְלֵאָה
  english_pob_choice: full of
  chosen_spanish: llena de
  alternatives_spanish:
  - lleno de
  - repleta de
  lexicon: HALOT
  rationale: Predicado adjetival con valor resultativo; «llena de» es la forma más natural y fiel en español.
- source_word: קְטֹרֶת
  english_pob_choice: incense
  chosen_spanish: incienso
  alternatives_spanish:
  - perfume
  - aroma
  lexicon: HALOT
  rationale: Término cultual estándar para la sustancia aromática ofrecida en el santuario.
translation_notes:
  revision_awareness: Se corrigió el problema de validación anterior eliminando la nota al pie sin anclaje. Dado que el texto español ya explicita la medida, no se requiere nota adicional en esta unidad.
  spanish_consistency_notes:
  - Se prefirió un español sobrio y cultual, evitando calcos innecesarios.
  - Se mantuvo la unidad léxica de ofrenda ritual con «incienso» y un recipiente concreto con «fuente».
  - La medida se explicitó para hacer legible la fórmula abreviada del hebreo en español.
