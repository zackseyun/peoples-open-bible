  - severity: medium
    issue: «lo que el profeta Jonás habló» es un calco poco natural
    rationale: En español, «hablar» normalmente no toma así un objeto de contenido con «lo que». La opción «lo que ... dijo» preserva el sentido del griego de manera más idiomática y fiel al estilo meta.
