    text: Dan suena como el verbo hebreo «juzgar» o «ha juzgado».
    reason: lexical_alternative
  revision_rationale: Se ajusta דָּנַנִּי a «me ha juzgado» para seguir más fielmente la decisión auditada del POB y mantener visible el juego de palabras con Dan. Se cambia «llamó su nombre Dan» por «le puso por nombre Dan» para mejorar la naturalidad del español sin perder la función de la fórmula de nombramiento. La nota se simplifica para reflejar con precisión el valor del juego verbal.
