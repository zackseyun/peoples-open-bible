review_pass:
  verdict: revise
  source_alignment_summary: El borrador capta la estructura paralela del hebreo, pero falla en dos elecciones clave. בַּעֲמַל aquí, según la propia auditoría inglesa, apunta mejor a 'aflicción/problema/penuria' que a 'trabajo'; 'trabajo' suena demasiado a labor ordinaria. Además, יְנֻגָּעוּ significa 'ser afligidos/golpeados/plagados', no 'castigados', que introduce una idea de penalización o juicio no explícita en el texto. La distinción entre אֱנוֹשׁ y אָדָם sí puede conservarse bien en español con 'hombre mortal' frente a 'la humanidad'.
  spanish_quality_summary: 'El español del borrador tiene problemas de naturalidad: ''mortal hombre'' es poco idiomático; ''No están en el trabajo de...'' suena forzado; y la nota al pie mezcla alternativas de distintos vocablos, generando confusión. Una redacción más natural y fiel sería ''No están en la aflicción del hombre mortal, ni son afligidos junto con la humanidad.'''
  glossary_alignment: No hay términos del glosario principal directamente activados salvo la antropología genérica. 'La humanidad' alinea bien con אָדָם colectivo. No hay conflicto con Yahvé/Mesías/etc. Sí hay desalineación con la rationale documentada en inglés al usar 'trabajo' por בַּעֲמַל y 'castigados' por יְנֻגָּעוּ.
  issues:
  - severity: high
    issue: בַּעֲמַל fue traducido como 'en el trabajo de'
    rationale: La evidencia fuente y la auditoría inglesa favorecen 'aflicción/problema/penuria' en este contexto de sufrimientos comunes de la humanidad. 'Trabajo' estrecha el sentido hacia labor ordinaria y debilita la queja del salmista.
  - severity: high
    issue: יְנֻגָּעוּ fue traducido como 'son castigados'
    rationale: '''Castigados'' introduce una noción de castigo o sanción que el hebreo no exige. El verbo apunta a ser golpeados/afligidos/plagados, es decir, sufrir aflicción, no necesariamente castigo.'
  - severity: medium
    issue: '''mortal hombre'' es poco natural en español'
    rationale: Aunque intenta preservar la fuerza de אֱנוֹשׁ, el orden adjetival suena rígido. 'Hombre mortal' conserva el matiz con mejor legibilidad.
  - severity: medium
    issue: La nota al pie actual combina alternativas de palabras distintas
    rationale: La nota marcada en 'mortal[a]' incluye opciones relacionadas tanto con אֱנוֹשׁ como con עָמָל, lo que no corresponde al anclaje y confunde al lector. Debe limitarse a la alternativa preservada por la auditoría inglesa para la frase pertinente.
  revised_spanish_text: No están en la aflicción del hombre mortal[a], ni son afligidos junto con la humanidad.
  revised_footnotes:
  - marker: a
    text: 'O: ''No están en el trabajo penoso del hombre, ni son golpeados junto con la humanidad.'''
