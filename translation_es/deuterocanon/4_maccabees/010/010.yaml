translation:
  language: es
  text: Pero nosotros, oh tirano más impuro,[a] padecemos estas cosas por causa de la disciplina y la virtud de Dios.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literalmente, «oh tirano muy impuro». El griego usa un superlativo con matiz de contaminación o impureza moral-religiosa; «más impuro» lo expresa en español de forma natural.
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἡμεῖς μέν
  english_pob_choice: But we
  chosen_spanish: Pero nosotros
  alternatives_spanish:
  - Nosotros, por nuestra parte
  - Y nosotros
  lexicon: LSJ
  rationale: μέν introduce contraste; en español, «Pero nosotros» mantiene el giro adversativo de forma natural y conserva la oposición implícita del contexto.
- source_word: ὦ μιαρώτατε τύραννε
  english_pob_choice: O most defiled tyrant
  chosen_spanish: ¡oh tirano más impuro!
  alternatives_spanish:
  - ¡oh tirano más contaminado!
  - ¡oh vil tirano!
  lexicon: LSJ
  rationale: μιαρώτατε expresa mancha/impureza con fuerza moral y religiosa. «Más impuro» preserva esa carga mejor que un insulto solo moral como «vil». Se invierte el orden nominal por la sintaxis natural del español.
- source_word: διὰ παιδείαν
  english_pob_choice: for the sake of the discipline
  chosen_spanish: por causa de la disciplina
  alternatives_spanish:
  - a causa de la disciplina
  - por motivo de la disciplina
  - por la disciplina
  lexicon: LSJ
  rationale: διὰ con acusativo expresa causa o motivo. «Por causa de» mantiene la relación causal sin forzar una finalidad que el griego no exige aquí.
- source_word: καὶ ἀρετὴν
  english_pob_choice: and virtue
  chosen_spanish: y la virtud
  alternatives_spanish:
  - y la excelencia
  - y la rectitud
  lexicon: LSJ
  rationale: ἀρετή se rinde de manera directa como «virtud» en este discurso ético. Se conserva el sustantivo concreto y solemne.
- source_word: θεοῦ
  english_pob_choice: of God
  chosen_spanish: de Dios
  alternatives_spanish:
  - divina
  - de Yahvé
  lexicon: LSJ
  rationale: El genitivo θεοῦ se expresa de forma explícita como «de Dios», manteniendo la relación gramatical con ambas nociones, como en la revisión inglesa más reciente.
- source_word: ταῦτα πάσχομεν
  english_pob_choice: suffer these things
  chosen_spanish: padecemos estas cosas
  alternatives_spanish:
  - sufrimos estas cosas
  - soportamos estas cosas
  lexicon: LSJ
  rationale: πάσχομεν puede ser «sufrir» o «padecer». «Padecemos» suena natural en español bíblico y conserva la idea de soportar aflicción concreta.
theological_decisions:
- issue: Relación de θεοῦ con παιδείαν καὶ ἀρετήν
  english_pob_reading: θεοῦ qualifies both nouns, expressed idiomatically as 'the discipline and virtue of God.'
  chosen_spanish_reading: «la disciplina y la virtud de Dios», con θεοῦ entendido como genitivo que califica ambos sustantivos
  alternative_spanish_readings:
  - «la disciplina y la virtud divinas»
  - «la disciplina y virtud de Dios»
  rationale: Se conserva la lectura de que el genitivo alcanza a ambos términos coordinados. En español, repetir «de Dios» en ambos puede resultar pesado; una sola vez mantiene la relación sin ocultarla. La nota a explica la alternativa de leerlo como genitivo que modifica ambos.
  doctrine_reference: 'Translation philosophy: preserve source syntax and theological relation without flattening the genitive.'
translation_notes:
  revision_awareness: La revisión inglesa más reciente pasó de una paráfrasis con «godly training» a una formulación que conserva más directamente διὰ y el genitivo explícito θεοῦ. En español se siguió esa línea, optando por «por causa de la disciplina y la virtud de Dios» para reflejar la causalidad y mantener visible la relación con Dios.
  spanish_consistency_notes:
  - Se usa «Dios» de forma explícita, no la convención «SEÑOR», porque el texto griego contiene θεοῦ y no un sustituto litúrgico.
  - Se mantiene «virtud» para ἀρετή por consistencia con el valor ético del término en este contexto.
  - Se usa «padecemos» para πάσχομεν por su registro bíblico y su matiz de sufrir activamente una aflicción.
