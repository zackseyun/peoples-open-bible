    issue: '''Un cántico de ascensiones'' suena poco idiomático en español'
    rationale: Aunque es formalmente literal, 'ascensiones' no es la manera más natural de reproducir la fórmula tradicional de los títulos de Salmos en español. 'Cántico de las subidas' mantiene el sustantivo concreto y evita un calco rígido.
  - severity: low
    issue: La nota a del borrador se enfoca en 'para las ascensiones' pero no ofrece la alternativa española más natural
    rationale: Conviene alinear la nota con una alternativa más útil para lectores en español, manteniendo también la posibilidad de una traducción más interpretativa si se desea.
