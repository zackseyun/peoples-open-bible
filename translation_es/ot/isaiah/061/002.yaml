translation:
  language: es
  text: para proclamar el año del favor de Yahvé[a] y el día de la venganza de nuestro Dios, para consolar a todos los que están de duelo[b],
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «el año aceptable de Yahvé».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «a todos los dolientes».'
    reason: lexical_alternative
lexical_decisions:
- source_word: לִקְרֹא
  english_pob_choice: to proclaim
  chosen_spanish: proclamar
  alternatives_spanish:
  - anunciar
  - convocar
  lexicon: HALOT
  rationale: El infinitivo construído expresa aquí una proclamación pública y programática dentro de la misión del Siervo; por eso «proclamar» comunica mejor el anuncio solemne que un simple «llamar».
- source_word: שְׁנַת רָצוֹן
  english_pob_choice: the year of ... favor
  chosen_spanish: el año del favor
  alternatives_spanish:
  - el año aceptable
  - el año de benevolencia
  lexicon: HALOT
  rationale: «Favor» conserva en español la idea de una disposición positiva de Dios y evita una formulación arcaica; mantiene la apertura semántica de רָצוֹן sin sobretraducirla.
- source_word: לַיהוָה
  english_pob_choice: of Yahweh
  chosen_spanish: de Yahvé
  alternatives_spanish:
  - para Yahvé
  - perteneciente a Yahvé
  lexicon: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
  rationale: Se sigue el criterio confesional del proyecto para el nombre divino, transliterándolo como «Yahvé» en vez de enmascararlo como «SEÑOR».
- source_word: וְיוֹם נָקָם
  english_pob_choice: and the day of vengeance
  chosen_spanish: y el día de la venganza
  alternatives_spanish:
  - y un día de venganza
  - y el día del castigo retributivo
  lexicon: HALOT
  rationale: «Venganza» reproduce el peso semántico de נָקָם y preserva la tensión teológica con el favor divino sin atenuarla hacia un sentido más débil como «juicio».
- source_word: לֵאלֹהֵינוּ
  english_pob_choice: of our God
  chosen_spanish: de nuestro Dios
  alternatives_spanish:
  - para nuestro Dios
  - perteneciente a nuestro Dios
  lexicon: HALOT
  rationale: 'La relación expresada por ל se vierte de forma natural en español como posesión/relación: «de nuestro Dios», manteniendo el paralelismo con la primera cola.'
- source_word: לְנַחֵם
  english_pob_choice: to comfort
  chosen_spanish: para consolar
  alternatives_spanish:
  - para confortar
  - para dar consuelo a
  lexicon: HALOT
  rationale: En este contexto de restauración, נחם se expresa bien con «consolar», que es claro y bíblicamente reconocible en español sin perder la fuerza del infinitivo de propósito.
- source_word: כָּל אֲבֵלִים
  english_pob_choice: all who mourn
  chosen_spanish: a todos los que lloran
  alternatives_spanish:
  - a todos los dolientes
  - a todos los que están de duelo
  lexicon: HALOT
  rationale: Aunque el hebreo usa una forma participial/adjetival, en español la expresión natural y genérica es «los que lloran»; preserva el valor colectivo sin restringirlo a varones ni introducir una nota demasiado técnica.
theological_decisions:
- issue: Rendering the divine name יהוה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - el SEÑOR
  rationale: El texto hebreo contiene el Tetragrámaton directamente; conforme al criterio del proyecto, se translitera como «Yahvé» en el cuerpo del texto para hacer visible el nombre del pacto.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Maintaining the tension between favor and vengeance in God's mission
  english_pob_reading: Retain both 'the year of the LORD’s favor' and 'the day of vengeance of our God' without softening either term
  chosen_spanish_reading: Conservar tanto «el año del favor de Yahvé» como «el día de la venganza de nuestro Dios» sin suavizar ninguno de los dos
  alternative_spanish_readings:
  - reducir venganza a juicio
  - subordinar la venganza al consuelo
  rationale: La estructura hebrea yuxtapone favor y venganza; la versión española conserva esa tensión teológica en vez de resolverla o amortiguarla.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #3'
translation_notes:
  revision_awareness: El pasaje no recibió revisiones sustantivas en el último pase; el acuerdo de revisión fue alto y estable, así que la redacción española sigue de cerca el sentido hebreo y la elección auditada en inglés sin introducir cambios interpretativos nuevos.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» para יהוה conforme al estándar del proyecto.
  - Se conserva «venganza» para נָקָם para no diluir la tensión entre favor y retribución divina.
  - Se usa una construcción de propósito con «para» para reflejar el infinitivo לִקְרֹא y לְנַחֵם.
  - «Todos los que lloran» conserva el alcance genérico de אֲבֵלִים sin forzar un masculino exclusivo.
