translation:
  language: es
  text: 'Y la banda tejida[a] de su efod, que estaba sobre él, era de una sola pieza con él y de la misma hechura: de oro, azul, púrpura, hilo escarlata y lino fino torcido, tal como Yahvé había mandado a Moisés.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «la banda decorada de su efod ... salía de él, de la misma hechura». El hebreo subraya que esta banda era parte integral del efod y que correspondía a su misma hechura.'
    reason: lexical_alternative
lexical_decisions:
- source_word: חֵשֶׁב
  english_pob_choice: skillfully woven band
  chosen_spanish: cinto
  alternatives_spanish:
  - banda tejida con habilidad
  - cinturón tejido con habilidad
  - banda bordada
  lexicon: HALOT
  rationale: En este contexto sacerdotal, el término designa la pieza textil unida al efod. 'Cinto' comunica una banda/cintura funcional en español sin volverlo demasiado técnico; la nota conserva la alternativa más explícita donde el inglés POB resaltó el tejido hábil.
- source_word: אֲפֻדָּתוֹ
  english_pob_choice: his ephod
  chosen_spanish: del efod
  alternatives_spanish:
  - de su efod
  - del efod de él
  lexicon: HALOT
  rationale: El sufijo posesivo se refiere al efod sacerdotal. En español, 'del efod' es natural y conserva la referencia sin añadir énfasis innecesario al posesivo.
- source_word: אֲשֶׁר עָלָיו
  english_pob_choice: which was on it
  chosen_spanish: que estaba sobre él
  alternatives_spanish:
  - que estaba encima de él
  - que iba sobre él
  lexicon: HALOT
  rationale: La cláusula relativa ubica el cinto sobre el efod. 'Sobre él' mantiene la relación espacial sin introducir una interpretación más fuerte de sujeción que el hebreo no exige aquí.
- source_word: מִמֶּנּוּ הוּא
  english_pob_choice: was of one piece with it
  chosen_spanish: era de una sola pieza con él
  alternatives_spanish:
  - era integral con él
  - era de la misma pieza que él
  - salía de él
  lexicon: HALOT
  rationale: La construcción expresa continuidad estructural, no simple procedencia. 'De una sola pieza con él' reproduce bien la idea de integración artesanal que el POB inglés destacó.
- source_word: כְּמַעֲשֵׂהוּ
  english_pob_choice: made like it
  chosen_spanish: hecho conforme a su obra
  alternatives_spanish:
  - hecho como él
  - hecho con la misma hechura
  - de la misma obra
  lexicon: HALOT
  rationale: Aquí importa la correspondencia de hechura u obra con el efod. 'Conforme a su obra' conserva el valor de patrón/realización y suena natural en español bíblico contemporáneo.
- source_word: זָהָב
  english_pob_choice: gold
  chosen_spanish: de oro
  alternatives_spanish:
  - oro
  - en oro
  lexicon: HALOT
  rationale: Material estándar de la lista; 'de oro' funciona bien en enumeración de componentes textiles y ornamentales.
- source_word: תְּכֵלֶת
  english_pob_choice: blue
  chosen_spanish: azul
  alternatives_spanish:
  - azul púrpura
  - azul celeste
  lexicon: HALOT
  rationale: El color ritual del tabernáculo se vierte con el equivalente básico 'azul', siguiendo la equivalencia idiomática del POB inglés y evitando sobreprecisar el tono.
- source_word: אַרְגָּמָן
  english_pob_choice: purple
  chosen_spanish: púrpura
  alternatives_spanish:
  - morado
  - púrpura real
  lexicon: HALOT
  rationale: Color/teñido de lujo propio de textiles sagrados. 'Púrpura' es el equivalente estándar y más solemne en español.
- source_word: תּוֹלַעַת שָׁנִי
  english_pob_choice: scarlet yarn
  chosen_spanish: carmesí
  alternatives_spanish:
  - lana carmesí
  - hilo carmesí
  - escarlata
  lexicon: HALOT
  rationale: La expresión hebrea puede referirse al color/material teñido. En una lista de materiales, español fluido permite omitir 'hilo' cuando el contexto textil ya está claro; 'carmesí' preserva el tono rojo intenso sin añadir una sustancia no explicitada por el hebreo.
- source_word: שֵׁשׁ מָשְׁזָר
  english_pob_choice: fine twisted linen
  chosen_spanish: lino fino torcido
  alternatives_spanish:
  - lino fino retorcido
  - lino fino trenzado
  lexicon: HALOT
  rationale: La frase describe lino de calidad, retorcido en hilo. 'Lino fino torcido' es una traducción directa y legible; 'torcido' reproduce la manufactura indicada por el término.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  - Jehová
  lexicon: DOCTRINE.md contested terms
  rationale: Siguiendo el estándar del proyecto, el Tetragrámaton se rinde como 'Yahvé' en el texto principal español, preservando el nombre del pacto en lugar de ocultarlo bajo un título.
- source_word: צִוָּה אֶת מֹשֶׁה
  english_pob_choice: had commanded Moses
  chosen_spanish: había mandado a Moisés
  alternatives_spanish:
  - había ordenado a Moisés
  - mandó a Moisés
  lexicon: HALOT
  rationale: La fórmula final expresa cumplimiento de una instrucción previa. 'Había mandado' comunica bien el aspecto retrospectivo del hebreo en un español natural.
theological_decisions:
- issue: Rendering of the divine name יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - Jehová
  rationale: El texto hebreo usa el nombre pactual directamente. En coherencia con el proyecto, se evita la sustitución por un título como 'Señor' y se mantiene una forma reverente y reconocible en español.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Structural relation of the band to the ephod
  english_pob_reading: was of one piece with it
  chosen_spanish_reading: era de una sola pieza con él
  alternative_spanish_readings:
  - era integral con él
  - estaba unido a él
  rationale: La formulación hebrea no sugiere mera proximidad, sino continuidad de manufactura. La traducción conserva esa tensión material/artesanal sin exagerar el detalle técnico.
  doctrine_reference: Exodus 39:5 lexical note on מִמֶּנּוּ הוּא
- issue: Material/textile phrase תּוֹלַעַת שָׁנִי
  english_pob_reading: scarlet yarn
  chosen_spanish_reading: carmesí
  alternative_spanish_readings:
  - hilo carmesí
  - escarlata
  rationale: En español, el listado de materiales permite una solución más breve que siga siendo fiel. Se preserva el color y se deja implícito el carácter textil ya evidente en el contexto de vestiduras.
  doctrine_reference: 'HALOT: תּוֹלַעַת שָׁנִי'
translation_notes:
  revision_awareness: 'Se corrigió el problema de validación anterior: ahora el marcador [a] aparece anclado en el texto español exactamente donde corresponde. La traducción mantiene el valor integral de מִמֶּנּוּ הוּא y el cierre formulaico con Yahvé, sin depender mecánicamente del inglés.'
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' para יְהוָה conforme al estándar del proyecto.
  - Se usa 'efod' sin transliteración adicional, por consistencia con el corpus.
  - '''Carmesí'' se usa como equivalente breve de תּוֹלַעַת שָׁנִי en una lista de materiales; no se añade ''hilo'' para evitar sobreespecificación.'
  - La construcción 'de una sola pieza con él' preserva la idea de integridad estructural destacada en la nota inglesa.
  - El marcador [a] está insertado en el texto y no hay notas sin anclaje.
