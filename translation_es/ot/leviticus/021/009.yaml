translation:
  language: es
  text: Y la hija de un sacerdote[a], si se profana prostituyéndose, profana a su padre[b]; será quemada con fuego.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: ''si comienza a prostituirse''. En algunos contextos, el verbo hebreo puede significar ''comenzar'', pero aquí el sentido mejor sustentado es el de profanarse/profanar su condición.'
    reason: lexical_alternative
  - marker: b
    text: 'O: ''al prostituirse''.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וּ/בַת אִישׁ כֹּהֵן
  english_pob_choice: And the daughter of a priest
  chosen_spanish: Y la hija de un sacerdote
  alternatives_spanish:
  - Y una hija de sacerdote
  - Y la hija de un sacerdote
  lexicon: HALOT
  rationale: La cadena constructa se entiende idiomáticamente como 'la hija de un sacerdote'. En español, 'de un sacerdote' conserva el tono legal y evita una paráfrasis excesiva.
- source_word: כִּי
  english_pob_choice: if
  chosen_spanish: si
  alternatives_spanish:
  - cuando
  lexicon: HALOT
  rationale: En este contexto casuístico, introduce una cláusula condicional; 'si' refleja mejor la fuerza legal que 'cuando'.
- source_word: תֵחֵל
  english_pob_choice: profanes herself
  chosen_spanish: se profana
  alternatives_spanish:
  - empieza
  - se contamina
  lexicon: HALOT
  rationale: Se conserva el valor de חלל en sentido cultual. 'Se profana' mantiene el vínculo con la santidad sacerdotal y evita reducir el verbo a 'empieza'.
- source_word: לִ/זְנ֑וֹת
  english_pob_choice: by prostituting herself
  chosen_spanish: prostituyéndose
  alternatives_spanish:
  - al prostituirse
  - por prostituirse
  lexicon: HALOT
  rationale: La forma verbal expresa el modo en que se profana; 'prostituyéndose' es natural en español y conserva el sentido sexual concreto que exige el contexto legal.
- source_word: הִיא מְחַלֶּלֶת
  english_pob_choice: profanes
  chosen_spanish: profana
  alternatives_spanish:
  - la deshonra
  - la contamina
  lexicon: HALOT
  rationale: El participio piel de חלל se traduce mejor con 'profana' para preservar la terminología de santidad del pasaje. 'La deshonra' suaviza indebidamente la carga cultual.
- source_word: בָּ/אֵשׁ
  english_pob_choice: with fire
  chosen_spanish: con fuego
  alternatives_spanish:
  - en fuego
  lexicon: HALOT
  rationale: La fórmula penal se expresa de manera natural en español como 'con fuego', manteniendo la construcción judicial tradicional sin perder claridad.
- source_word: תִּשָּׂרֵף
  english_pob_choice: she shall be burned
  chosen_spanish: será quemada
  alternatives_spanish:
  - deberá ser quemada
  - ha de ser quemada
  lexicon: HALOT
  rationale: El imperfecto pasivo en contexto legal prescribe la pena; 'será quemada' reproduce adecuadamente esa fuerza normativa en español.
theological_decisions:
- issue: Mantener el vocabulario de profanación en una ley de santidad sacerdotal
  english_pob_reading: Use 'profane' language in both clauses
  chosen_spanish_reading: Usar 'se profana' / 'profana' en ambas cláusulas
  alternative_spanish_readings:
  - usar 'deshonra' / 'deshonra'
  - usar 'se contamina' / 'contamina'
  rationale: El texto pertenece a legislación de santidad; חלל tiene peso cultual y no solo moral. Repetir 'profana' preserva la relación entre la conducta sexual y la profanación de la santidad sacerdotal, sin desplazar el foco a un lenguaje más genérico.
  doctrine_reference: Translation philosophy §1, §5
translation_notes:
  revision_awareness: La revisión más reciente no introdujo cambios; el consenso del control cruzado fue alto, con observaciones menores. Se mantiene la lectura cultual de חלל y la cláusula casuística con 'si'.
  spanish_consistency_notes:
  - Se conserva 'profana' como término técnico de santidad para חלל.
  - '''Con fuego'' sigue la fórmula penal idiomática, pero en el texto principal se prefiere ''quemada con fuego'' por naturalidad.'
  - La estructura legal se mantiene sobria y directa, sin ampliar el contenido más allá del hebreo.
