  verdict: revise
  source_alignment_summary: 'El borrador sigue correctamente la línea hebrea principal: «su recuerdo» por זכרם, duración perpetua por עד עולם, y «no será olvidada» por לא תשכח. También preserva bien en nota la variante griega/Masada sobre «descendencia/semilla» y «gloria». La única desalineación significativa está en וצדקתם: «su justicia» es posible, pero en español aquí suena más abstracto/judicial que el elogio moral sapiencial de «their righteousness»; «su rectitud» preserva mejor el sentido contextual sin sobreinterpretar.'
  spanish_quality_summary: El español es claro y digno. «Su recuerdo permanecerá para siempre» fluye bien. Sin embargo, «su justicia no será olvidada» suena menos natural y menos preciso en este contexto que «su rectitud no será olvidada». La nota es comprensible, pero «hebreo de Genizá» conviene afinarse a «hebreo de la Genizá de El Cairo» para mayor precisión documental.
  glossary_alignment: No hay términos del glosario mayor en juego salvo צדקה/δικαιοσύνη. El proyecto permite «justicia / rectitud» según contexto; aquí la opción contextual más fiel en español es «rectitud». El resto de las decisiones léxicas están alineadas con la auditoría inglesa y con el estilo POB.
  issues:
  - severity: medium
    issue: «su justicia» para וצדקתם
    rationale: Aunque léxicamente posible, en español bíblico actual «justicia» aquí puede sugerir justicia judicial o social más que cualidad moral. En un elogio sapiencial de los antepasados, «rectitud» transmite mejor «righteousness» sin convertirlo en «obras justas».
  - severity: low
    issue: Redacción de la nota textual
    rationale: La nota es esencialmente correcta, pero «hebreo de Genizá» es algo impreciso. «hebreo de la Genizá de El Cairo» refleja mejor la base textual documentada.
