translation:
  language: es
  text: Pero para los que reprenden[a], será agradable, y una buena bendición[b] vendrá sobre ellos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «los que corrigen» o «los que amonestan». El participio hebreo se refiere a personas que dan la reprensión o corrección necesaria.'
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «bendición de bien», es decir, una bendición beneficiosa o favorable.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְלַמּוֹכִיחִים
  english_pob_choice: But for those who rebuke
  chosen_spanish: Pero para los que reprenden
  alternatives_spanish:
  - Pero para los que reprochan
  - Pero para los que corrigen
  lexicon: HALOT
  rationale: El participio de יכח puede abarcar reprensión, repruebo o corrección. 'Reprenden' conserva la función de personas que dan la amonestación necesaria, suena natural en español bíblico moderno y mantiene el contraste adversativo con el versículo anterior.
- source_word: יִנְעָם
  english_pob_choice: it will be pleasant
  chosen_spanish: será agradable
  alternatives_spanish:
  - habrá deleite
  - les irá bien
  - será dulce
  lexicon: HALOT
  rationale: El verbo expresa agradabilidad o deleite de modo impersonal. 'Será agradable' conserva esa tersura breve sin añadir un sujeto que el hebreo no explicita.
- source_word: וַעֲלֵיהֶם
  english_pob_choice: upon them
  chosen_spanish: sobre ellos
  alternatives_spanish:
  - encima de ellos
  - a ellos
  lexicon: HALOT
  rationale: '''Sobre ellos'' reproduce la imagen de la bendición que recae sobre los destinatarios y funciona bien con el verbo ''vendrá''.'
- source_word: תָּבֹוא
  english_pob_choice: will come
  chosen_spanish: vendrá
  alternatives_spanish:
  - llegará
  - vendrá a ellos
  lexicon: HALOT
  rationale: La forma futura simple de בוא se rinde de manera directa con 'vendrá', natural en español y acorde al movimiento descendente de la bendición.
- source_word: בִרְכַּת טוֹב
  english_pob_choice: a good blessing
  chosen_spanish: una bendición buena
  alternatives_spanish:
  - una bendición de bien
  - una bendición favorable
  - una buena bendición
  lexicon: HALOT
  rationale: El hebreo dice literalmente 'bendición de bien'. 'Bendición buena' conserva la compactación y el paralelismo con el audit trail inglés, sin transformar de más el sintagma ni suavizar la fuerza del sustantivo.
translation_notes:
  revision_awareness: Se siguió el texto hebreo masorético dado y el audit trail inglés; no hay revisiones aplicadas en la fuente. Se preservó el contraste adversativo inicial y la concisión del sintagma final, evitando suavizar la imagen de una bendición que viene sobre los destinatarios.
  spanish_consistency_notes:
  - Se usó 'reprenden' para mantener la fuerza de amonestación del participio hebreo sin convertirlo en un término eclesiástico más estrecho.
  - Se mantuvo 'bendición buena' como reflejo cercano de בִרְכַּת טוֹב, con nota explicativa para la posible lectura idiomática.
  - La puntuación sigue la sintaxis española natural, con coma tras la cláusula inicial y antes de la coordinación final.
