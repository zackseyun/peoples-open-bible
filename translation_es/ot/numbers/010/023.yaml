translation:
  language: es
  text: Y el jefe de la compañía[a] de la tribu de los hijos de Manasés era Gamaliel, hijo de Pedahsur.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebreo צְבָא también puede traducirse como «hueste», «ejército» o «división»; aquí se refiere al contingente tribal organizado.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְעַל
  english_pob_choice: And over
  chosen_spanish: Y sobre
  alternatives_spanish:
  - Y encima de
  - Y al frente de
  lexicon: HALOT
  rationale: La construcción formulaica hebrea introduce a quien está colocado sobre un contingente tribal. «Y sobre» mantiene la relación de superioridad/encargo sin añadir una paráfrasis innecesaria.
- source_word: צְבָא
  english_pob_choice: company
  chosen_spanish: compañía
  alternatives_spanish:
  - hueste
  - ejército
  - división
  lexicon: HALOT
  rationale: En este contexto organizativo del desierto, el término no apunta primariamente a combate, sino a un contingente ordenado. «Compañía» conserva esa idea de unidad organizada y es natural en español.
- source_word: מַטֵּה
  english_pob_choice: tribe
  chosen_spanish: tribu
  alternatives_spanish:
  - vara
  - bastón
  lexicon: HALOT
  rationale: Aquí מַטֵּה designa la unidad tribal, no el objeto físico. «Tribu» es la equivalencia contextual estable en español.
- source_word: בְּנֵי מְנַשֶּׁה
  english_pob_choice: the sons of Manasseh
  chosen_spanish: los hijos de Manasés
  alternatives_spanish:
  - los hijos de Manasés
  - los descendientes de Manasés
  lexicon: HALOT
  rationale: Se conserva la filiación tribal literal del hebreo. «Hijos» refleja el constructo bíblico y mantiene el vínculo genealógico/tribal.
- source_word: גַּמְלִיאֵל
  english_pob_choice: Gamaliel
  chosen_spanish: Gamaliel
  lexicon: standard transliteration
  rationale: Nombre propio transliterado de manera estándar, sin traducirlo.
- source_word: בֶּן
  english_pob_choice: son of
  chosen_spanish: hijo de
  alternatives_spanish:
  - el hijo de
  lexicon: HALOT
  rationale: Relación genealógica directa y concisa, ajustada al español bíblico moderno.
- source_word: פְּדָה צוּר
  english_pob_choice: Pedahzur
  chosen_spanish: Pedasur
  alternatives_spanish:
  - Pedahzur
  lexicon: standard transliteration
  rationale: El nombre personal hebreo פְּדָהצוּר se vierte como un solo nombre propio en español. «Pedasur» respeta mejor la adaptación fonética habitual en español que una transliteración más rígida.
theological_decisions:
- issue: Cómo renderizar צְבָא en un contexto de organización tribal sin perder su fuerza semántica
  english_pob_reading: company
  chosen_spanish_reading: compañía
  alternative_spanish_readings:
  - hueste
  - ejército
  - división
  rationale: La escena es administrativa y campamental; «compañía» transmite un cuerpo organizado sin imponer una lectura militar más fuerte de la que el contexto requiere. Se conserva, sin embargo, la posibilidad semántica amplia del hebreo.
  doctrine_reference: Ninguna
translation_notes:
  revision_awareness: 'Se corrigió la falta previa de anclaje para la nota al pie: ahora el marcador [a] aparece en el texto español. No se realizaron cambios de sentido respecto del audit trail inglés; solo se ajustó la forma española y la transliteración de Pedasur para mayor naturalidad en español.'
  spanish_consistency_notes:
  - Se mantiene «hijos de Manasés» para la fórmula tribal literal.
  - «Compañía» conserva la lectura organizativa del hebreo צְבָא sin forzar una imagen militar exclusiva.
  - El nombre propio se adapta como «Pedasur» para una lectura publicada y fluida en español.
  - Se usa «Y sobre» para reflejar la estructura formulaica recurrente sin sobreexplicar la relación sintáctica.
