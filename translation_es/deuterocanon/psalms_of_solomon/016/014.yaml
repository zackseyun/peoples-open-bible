    issue: La frase «y en pobreza» es poco idiomática en español.
    rationale: Aunque formalmente cercana al griego/inglés, en español natural se expresa mejor «y en la pobreza». Esto preserva el significado de carencia material sin sonar truncado.
  - severity: low
