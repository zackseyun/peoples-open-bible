    issue: '''sus maravillas'' puede debilitar el matiz de actos en נִפְלְאוֹתָיו'
    rationale: Aunque el hebreo permite 'wonders/marvels', la decisión auditada en inglés privilegia 'wondrous deeds' por su fuerza eventiva. En español, 'maravillas' puede entenderse como cualidades o cosas admirables en abstracto, mientras que 'obras maravillosas' comunica mejor hechos extraordinarios.
  - severity: low
    issue: Falta una nota léxica para la alternativa de נִפְלְאוֹתָיו
    rationale: El inglés POB incluye nota con alternativas ('his wonders' / 'his marvelous works'). Dado que el español revisado escogería una opción más explícita, conviene preservar la alternativa breve 'sus maravillas' en nota para reflejar la amplitud léxica documentada.
