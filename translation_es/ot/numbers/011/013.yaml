translation:
  language: es
  text: '¿De dónde voy a sacar carne para dar a todo este pueblo? Porque me lloran[a], diciendo: «Danos carne, para que comamos».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El hebreo dice literalmente «lloran sobre mí»; también puede entenderse «lloran delante de mí» o «me presionan con su llanto».
    reason: lexical_alternative
lexical_decisions:
- source_word: מֵאַיִן
  english_pob_choice: Where am I to get
  chosen_spanish: ¿De dónde voy a sacar
  alternatives_spanish:
  - ¿De dónde puedo obtener
  - ¿Dónde voy a conseguir
  lexicon: HALOT
  rationale: La pregunta hebrea pide origen o fuente de provisión. «¿De dónde voy a sacar» conserva la idea de procedencia y la urgencia de la queja de Moisés, con un español natural.
- source_word: לִי
  english_pob_choice: am I
  chosen_spanish: voy a
  alternatives_spanish:
  - tengo que
  - puedo
  lexicon: HALOT
  rationale: El pronombre dativo está absorbido en la pregunta española. «Voy a» expresa la situación personal de Moisés sin forzar un giro literal.
- source_word: בָּשָׂר
  english_pob_choice: meat
  chosen_spanish: carne
  alternatives_spanish:
  - carne de comer
  - carne para comer
  lexicon: HALOT
  rationale: En este contexto de provisión alimentaria, בשר refiere alimento cárnico; «carne» es el equivalente natural en español y preserva el sentido material.
- source_word: לָתֵת
  english_pob_choice: to give
  chosen_spanish: para dar
  alternatives_spanish:
  - para entregar
  - para proveer
  lexicon: HALOT
  rationale: El infinitivo de finalidad se expresa bien con «para dar», manteniendo la relación entre obtener carne y suministrarla al pueblo.
- source_word: לְכָל הָעָם הַזֶּה
  english_pob_choice: to all this people
  chosen_spanish: a todo este pueblo
  alternatives_spanish:
  - a toda esta gente
  - a todo este pueblo
  lexicon: HALOT
  rationale: «הָעָם» es colectivo singular; «todo este pueblo» conserva esa fuerza colectiva, como en la decisión inglesa de mantener el singular colectivo.
- source_word: עָלַי
  english_pob_choice: to me
  chosen_spanish: hacia mí
  alternatives_spanish:
  - contra mí
  - sobre mí
  lexicon: HALOT
  rationale: La preposición על con llorar puede indicar presión dirigida a alguien. «Hacia mí» mantiene la dirección del reclamo sin añadir un matiz hostil que el contexto no exige.
- source_word: לֵאמֹר
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - al decir
  - y diciendo
  lexicon: HALOT
  rationale: La forma quotativa se vierte de modo directo y natural con «diciendo».
- source_word: תְּנָה לָּנוּ
  english_pob_choice: Give us
  chosen_spanish: Danos
  alternatives_spanish:
  - Danos a nosotros
  - Concédenos
  lexicon: HALOT
  rationale: El imperativo con sufijo pronominal se traduce de forma idiomática con «danos».
- source_word: וְנֹאכֵלָה
  english_pob_choice: that we may eat
  chosen_spanish: para que comamos
  alternatives_spanish:
  - y comeremos
  - a fin de que comamos
  lexicon: HALOT
  rationale: La cohortativa expresa finalidad/deseo. «Para que comamos» conserva esa intención con un registro claro y bíblicamente digno.
translation_notes:
  revision_awareness: 'Se siguió de cerca el paquete hebreo y el rastro inglés: la frase de petición se mantiene con el valor direccional de עָלַי sin suavizar la tensión del reclamo, y la cohorte final se expresa como finalidad («para que comamos») conforme a la revisión inglesa que prefirió un enlace más directo y formal.'
  spanish_consistency_notes:
  - Se mantiene «todo este pueblo» para conservar el colectivo singular de העם, en coherencia con el criterio POB de no diluir la referencia.
  - Se usa «carne» en sentido alimentario, no «flesh», porque el contexto es de provisión de comida.
  - Se evita «SEÑOR» o una sustitución reverencial innecesaria, ya que aquí no aparece el Tetragrámaton ni una cita directa del nombre divino.
