translation:
  language: es
  text: 'Entonces David dijo[a]: «¿Me entregarán los hombres de Queila[b] a mí y a mis hombres en manos[c] de Saúl?». Y Yahvé respondió[d]: «Te entregarán[e]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «¿Me pondrán a mí y a mis hombres en manos de Saúl?». El hebreo usa un verbo de entregar o dar a alguien al poder de otro.
    reason: lexical_alternative
  - marker: b
    text: Hebreo «los hombres de Queila», expresión que en este contexto se refiere a los habitantes o líderes de la ciudad.
    reason: lexical_alternative
  - marker: c
    text: Hebreo «en mano de Saúl», un modismo que significa bajo el poder de Saúl.
    reason: lexical_alternative
  - marker: d
    text: Hebreo «Yahvé dijo».
    reason: literal_rendering
  - marker: e
    text: 'La respuesta hebrea dice literalmente: «Te entregarán», usando un objeto singular; David es tratado como representante de su grupo, con sus hombres implicados.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הֲ/יַסְגִּרוּ
  english_pob_choice: Will ... hand ... over
  chosen_spanish: ¿Entregarán ...?
  alternatives_spanish:
  - ¿Lo entregarán?
  - ¿Me darán en manos de...?
  lexicon: HALOT
  rationale: El verbo en hifil expresa dar a alguien en poder de otro. En español, «entregar» comunica bien esa cesión de una persona a un enemigo sin forzar un giro demasiado literal; se mantiene la pregunta de David y el valor de transferencia de poder.
- source_word: בַּעֲלֵי קְעִילָה
  english_pob_choice: the men of Keilah
  chosen_spanish: los hombres de Queila
  alternatives_spanish:
  - los habitantes de Queila
  - los dueños de Queila
  lexicon: HALOT
  rationale: Aunque בַּעֲלֵי puede significar «dueños» o «señores», aquí el contexto narrativo apunta a los pobladores o líderes de la ciudad. «Los hombres de Queila» conserva el sentido idiomático y evita una traducción excesivamente literal.
- source_word: אֹתִי וְאֶת אֲנָשַׁי
  english_pob_choice: me and my men
  chosen_spanish: a mí y a mis hombres
  alternatives_spanish:
  - a mí y a mis soldados
  - a mí y a mis compañeros
  lexicon: HALOT
  rationale: La expresión hebrea conserva el referente personal de David y su grupo. «Mis hombres» reproduce la fuerza del posesivo sin añadir precisión militar que el texto no exige.
- source_word: בְּיַד שָׁאוּל
  english_pob_choice: into Saul’s hand
  chosen_spanish: en mano de Saúl
  alternatives_spanish:
  - en la mano de Saúl
  - en poder de Saúl
  lexicon: HALOT
  rationale: Se conserva la imagen hebrea de «mano» como esfera de dominio. En español, «en mano de Saúl» suena bíblico y claro; se evita reemplazarla por «poder» en el texto principal para no borrar la imagen idiomática documentada.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  lexicon: HALOT
  rationale: 'Se sigue el criterio del proyecto para el Tetragrámaton: no se sustituye por una etiqueta genérica como «SEÑOR». «Yahvé» es la forma española estable y reconocible para el nombre divino revelado a Israel.'
- source_word: יַסְגִּירוּ
  english_pob_choice: They will hand you over
  chosen_spanish: Lo entregarán
  alternatives_spanish:
  - Te entregarán
  - Lo pondrán en sus manos
  lexicon: HALOT
  rationale: El hebreo responde literalmente con un objeto singular, refiriéndose a David como representante del grupo. En español, «lo» puede resultar impersonal; aquí se preserva la brevedad y el eco de la respuesta divina, aunque el contexto muestra que David y sus hombres están implícitos.
theological_decisions:
- issue: Renderización del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  rationale: El texto hebreo usa el Tetragrámaton directamente. Conforme a la norma del proyecto, se translitera como «Yahvé» para mantener el nombre personal del Dios del pacto en vez de ocultarlo bajo un título.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Objeto singular en la respuesta divina
  english_pob_reading: The Hebrew answer says literally, “They will hand you over,” using a singular object; David is addressed as the representative leader, with his men implied.
  chosen_spanish_reading: «Lo entregarán»
  alternative_spanish_readings:
  - «Te entregarán»
  - «Te entregarán a ti y a tus hombres»
  rationale: La respuesta hebrea conserva un objeto singular. En español, mantener el singular evita suavizar el detalle textual; la referencia colectiva se entiende por el contexto y por la pregunta previa de David.
  doctrine_reference: Notas de fidelidad textual y representación del referente colectivo
- issue: Imagen idiomática de «mano»
  english_pob_reading: Hebrew “into Saul’s hand,” an idiom meaning into Saul’s power.
  chosen_spanish_reading: «en mano de Saúl»
  alternative_spanish_readings:
  - «en la mano de Saúl»
  - «en poder de Saúl»
  rationale: Se conserva la metáfora bíblica de la mano como control o dominio. Esto mantiene la tensión literaria del hebreo sin sustituirla por una explicación interpretativa en el texto principal.
  doctrine_reference: Notas de imagen idiomática y preservación semántica
translation_notes:
  revision_awareness: 'Se revisó el paquete fuente y el audit trail en inglés; no se detectaron cambios posteriores relevantes en la traducción inglesa. La solución española sigue la misma lectura óptima, pero ajusta dos puntos de estilo: mantiene «Yahvé» como forma española del nombre divino y conserva la imagen idiomática de «mano» en el texto principal, explicándola en nota.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» conforme al criterio del proyecto para יְהוָה.
  - Se conserva «los hombres de Queila» para בַּעֲלֵי קְעִילָה por adecuación contextual.
  - Se preserva el objeto singular de la respuesta divina en la frase «Lo entregarán».
  - El registro es bíblico pero moderno, evitando arcaísmos innecesarios.
