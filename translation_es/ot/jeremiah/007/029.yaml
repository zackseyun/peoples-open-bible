base_translation:
  language: en
  yaml_path: translation/ot/jeremiah/007/029.yaml
  text: Cut off your hair and throw it away[a], and raise a lament on the bare heights[b], for Yahweh has rejected and abandoned the generation of his wrath.
  footnotes:
  - marker: a
    text: Or 'your crown.' The Hebrew noun can refer to consecration, a crown/diadem, or hair associated with consecration; here the commands 'cut off' and 'throw it away' favor the sense of consecrated hair.
    reason: lexical_alternative
  - marker: b
    text: Or 'the generation under his wrath.' The Hebrew is literally 'the generation of his wrath.'
    reason: alternative_reading
