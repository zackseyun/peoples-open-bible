  rationale: 'Se corrigió la colocación y el contenido de las notas para alinearlos con la auditoría inglesa: [a] para פֵּרַשְׂתִּי, [b] para סוֹרֵר, y [c] para מַחְשְׁבֹתֵיהֶם. También se mejoró la naturalidad de «que camina por un camino» a «que anda por un camino», conservando la metáfora ética del hebreo y evitando redundancia. Se mantuvo «que no es bueno» sin nota, porque esa es precisamente la decisión teológica y léxica del POB: no intensificar a «malo».'
