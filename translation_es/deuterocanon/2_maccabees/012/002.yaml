translation:
  language: es
  text: En cuanto a los comandantes locales, Timoteo y Apolonio hijo de Genaeo, y además Jerónimo y Demofón, y junto con estos Nicanor el Cipiárca[a], no les permitían vivir en paz.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Griego: «el Κυπριάρχης»; se conserva el título como «Cipiárca» para reflejar más directamente la designación de Nicanor, en vez de expandirla interpretativamente como «gobernador de Chipre».'
    reason: lexical_alternative
lexical_decisions:
- source_word: τῶν δὲ κατὰ τόπον στρατηγῶν
  english_pob_choice: of the local commanders
  chosen_spanish: de los comandantes locales
  alternatives_spanish:
  - de los generales de la región
  - de los comandantes de la zona
  lexicon: LSJ
  rationale: κατὰ τόπον expresa una distribución por lugar o región; 'comandantes locales' conserva la idea administrativa sin sobredeterminar el rango militar.
- source_word: Τιμόθεος
  english_pob_choice: Timotheus
  chosen_spanish: Timoteo
  alternatives_spanish:
  - Timóteo
  lexicon: equivalencia tradicional onomástica
  rationale: El nombre propio se adapta a la forma española habitual y reconocible para lectores eclesiales.
- source_word: Ἀπολλώνιος ὁ τοῦ Γενναίου
  english_pob_choice: Apollonius son of Gennaeus
  chosen_spanish: Apolonio hijo de Genaeo
  alternatives_spanish:
  - Apolonio, hijo de Genaeo
  - Apolonio de Genaeo
  lexicon: LSJ
  rationale: La construcción genitiva con artículo funciona como patronímico; 'hijo de' reproduce con claridad la relación familiar. 'Genaeo' mantiene la forma del nombre propio transmitido por la tradición textual.
- source_word: ἔτι δὲ
  english_pob_choice: and further
  chosen_spanish: y además
  alternatives_spanish:
  - y también
  - y además de esto
  lexicon: LSJ
  rationale: La partícula añade nombres a una lista; 'y además' comunica bien la función acumulativa en español.
- source_word: πρὸς δὲ τούτοις
  english_pob_choice: and besides these
  chosen_spanish: y junto con éstos
  alternatives_spanish:
  - y además de éstos
  - y además de ellos
  lexicon: LSJ
  rationale: La frase introduce otro nombre aparte de los ya citados. 'Junto con éstos' conserva la inclusión aditiva sin sonar demasiado repetitiva.
- source_word: Νικάνωρ ὁ Κυπριάρχης
  english_pob_choice: Nicanor the Cypriarch
  chosen_spanish: Nicanor el Cipiárca
  alternatives_spanish:
  - Nicanor el Cypriarca
  - Nicanor el gobernador de Chipre
  lexicon: LSJ
  rationale: Se conserva el título técnico de manera transparente mediante transliteración adaptada al español. Se evita reemplazarlo por una expansión interpretativa, siguiendo la revisión inglesa que prefirió 'Cypriarch' sobre una paráfrasis.
- source_word: οὐκ εἴων
  english_pob_choice: would not let
  chosen_spanish: no les permitían
  alternatives_spanish:
  - no los dejaban
  - no les dejaban
  lexicon: LSJ
  rationale: El imperfecto expresa una acción continua o reiterada de impedimento; 'no les permitían' preserva ese valor durativo en español natural.
- source_word: ἡσυχίαν ἄγειν
  english_pob_choice: live in peace
  chosen_spanish: vivir en paz
  alternatives_spanish:
  - llevar una vida tranquila
  - vivir tranquilos
  lexicon: LSJ
  rationale: El modismo significa pasar la vida en quietud o paz. 'Vivir en paz' es idiomático y comunica con claridad la idea de ausencia de hostigamiento.
translation_notes:
  revision_awareness: La redacción sigue de cerca el paquete griego y la revisión inglesa más reciente, que prefirió conservar el título Κυπριάρχης de forma más directa en vez de expandirlo como una glosa interpretativa. Se mantuvo la estructura acumulativa de la lista y el matiz durativo del imperfecto.
  spanish_consistency_notes:
  - Se usa 'Apolonio' y 'Timoteo' como formas españolas regulares de los nombres propios.
  - Se conservó 'Cipiárca' como transliteración funcional del título técnico, no como explicación amplia, para evitar perder la tensión léxica documentada.
  - '''Vivir en paz'' mantiene la idiomaticidad del modismo griego sin añadir contenido doctrinal.'
