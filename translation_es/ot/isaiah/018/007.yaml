    text: Or 'tribute' for 'gift.' The Hebrew term can denote a present offered to an honored ruler.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'line upon line' or 'measuring line upon measuring line'; the phrase is difficult and may refer to repeated measuring, command, or domination.
    reason: lexical_alternative
