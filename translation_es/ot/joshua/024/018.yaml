translation:
  language: es
  text: Yahvé expulsó de delante de nosotros a todos los pueblos[a], incluso a los amorreos que habitaban en la tierra. Nosotros también serviremos a Yahvé, porque él es nuestro Dios.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «y a los amorreos que habitaban en la tierra».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְגָרֶשׁ
  english_pob_choice: drove out
  chosen_spanish: expulsó
  alternatives_spanish:
  - echó
  - desalojó
  lexicon: HALOT
  rationale: גרש expresa la acción de sacar o expulsar con fuerza. En español, «expulsó» comunica bien el acto de remover a esos pueblos sin perder la fuerza del verbo ni sonar artificial.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  lexicon: HALOT
  rationale: La fuente hebrea usa el nombre propio divino. En la norma del proyecto, se vierte como «Yahvé» para preservar el Tetragrámaton, en lugar de sustituirlo por un título.
- source_word: כָּל הָעַמִּים
  english_pob_choice: all the peoples
  chosen_spanish: todos los pueblos
  alternatives_spanish:
  - todas las naciones
  - todos los pueblos y naciones
  lexicon: HALOT
  rationale: עַמִּים aquí es plural y étnico-político. «Pueblos» conserva ese matiz mejor que «gente» y evita forzar «naciones» si se quiere mantener la proximidad semántica al hebreo.
- source_word: וְאֶת הָאֱמֹרִי
  english_pob_choice: including the Amorites
  chosen_spanish: incluso al amorreo
  alternatives_spanish:
  - y al amorreo
  - hasta al amorreo
  lexicon: HALOT
  rationale: El hebreo simplemente coordina al amorreo con el conjunto previo; en español, «incluso» refleja la función explicativa del inglés POB, sin convertirlo en un añadido interpretativo excesivo.
- source_word: יֹשֵׁב הָאָרֶץ
  english_pob_choice: who lived in the land
  chosen_spanish: que habitaba en la tierra
  alternatives_spanish:
  - que vivía en la tierra
  - habitante de la tierra
  lexicon: HALOT
  rationale: El participio señala residencia continua. «Habitaba» es un equivalente natural y fiel; «en la tierra» mantiene el término hebreo sin precisar indebidamente el territorio.
- source_word: מִפָּנֵינוּ
  english_pob_choice: from before us
  chosen_spanish: de delante de nosotros
  alternatives_spanish:
  - de nuestra presencia
  - ante nosotros
  lexicon: HALOT
  rationale: La locución conserva la imagen espacial del hebreo y coincide con la elección auditada en inglés. «De delante de nosotros» es idiomática en español y refleja el desplazamiento de enemigos fuera de la presencia de Israel.
- source_word: גַּם אֲנַחְנוּ
  english_pob_choice: We also
  chosen_spanish: Nosotros también
  alternatives_spanish:
  - También nosotros
  - Y nosotros también
  lexicon: HALOT
  rationale: La partícula enfática marca respuesta y énfasis. «Nosotros también» reproduce bien la afirmación comprometida del pueblo.
- source_word: נַעֲבֹד
  english_pob_choice: will serve
  chosen_spanish: serviremos
  alternatives_spanish:
  - serviremos a
  - adoraremos
  lexicon: HALOT
  rationale: עבד con objeto divino abarca servicio de lealtad y culto. «Serviremos» conserva esa amplitud mejor que «adoraremos», que estrecharía el sentido a lo litúrgico.
- source_word: אֶת יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: a Yahvé
  alternatives_spanish:
  - a Yahvé mismo
  - a Dios
  lexicon: HALOT
  rationale: Se mantiene el nombre divino como objeto directo marcado por «a», según el uso español con verbos de servicio dirigido a una persona.
- source_word: כִּי
  english_pob_choice: for
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  lexicon: HALOT
  rationale: כִּי introduce la razón del compromiso. «Porque» es claro y natural en español; «pues» sería posible, pero menos directo.
- source_word: הוּא אֱלֹהֵינוּ
  english_pob_choice: he is our God
  chosen_spanish: él es nuestro Dios
  alternatives_spanish:
  - él es nuestro Dios y Señor
  - él es el Dios nuestro
  lexicon: HALOT
  rationale: 'אֱלֹהֵינוּ es singular posesivo: «nuestro Dios». Se evita «Señor» porque el hebreo no lo dice; «él es nuestro Dios» reproduce bien la confesión de alianza.'
theological_decisions:
- issue: Nombre divino del pacto
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Jehová
  - el SEÑOR
  rationale: El texto hebreo contiene explícitamente el Tetragrámaton. Siguiendo la política del proyecto, se conserva el nombre propio divino en vez de sustituirlo por un título, para no perder la referencia covenantal.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Sentido de עבד con Dios como objeto
  english_pob_reading: serve
  chosen_spanish_reading: serviremos
  alternative_spanish_readings:
  - adoraremos
  - obedeceremos
  rationale: En este contexto, el verbo expresa lealtad de pacto, servicio y adoración, no solo culto ritual. «Serviremos» preserva esa amplitud sin reducirla ni moralizarla.
  doctrine_reference: DOCTRINE.md Translation philosophy §1, §6
translation_notes:
  revision_awareness: El pasaje coincide plenamente con el texto hebreo y con la revisión inglesa auditada; no se requirieron ajustes posteriores. La única variación relevante es la adaptación natural al español de la coordinación «including»/«incluso» para reflejar el valor explicativo del segundo miembro.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» en coherencia con la terminología estándar del proyecto para יְהוָה.
  - Se usa «pueblos» para עַמִּים y no «naciones», por mayor cercanía al plural étnico del hebreo.
  - «Serviremos» conserva el alcance de culto y lealtad de עבד sin estrecharlo a adoración litúrgica.
  - La nota al pie marca la alternativa léxica sobre el participio de «habitar» y la coordinación con el amorreo.
