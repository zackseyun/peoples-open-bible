    issue: Marcador de nota [a] repetido indebidamente en el texto
    rationale: La nota a explica el término חֲסִידָיו («sus fieles»), pero el borrador también coloca [a] después de «y», lo que viola la regla de no reutilizar un mismo marcador para dos anclajes distintos.
  - severity: medium
    issue: «Actúa con orgullo» atenúa o vuelve ambiguo el matiz negativo de גַאֲוָה
    rationale: En español actual, «orgullo» puede tener valor positivo o neutro. El contexto hebreo y el contraste con los fieles exigen un término inequívocamente negativo como «soberbia» o «arrogancia».
  - severity: low
