  text: And he said to him[a], “May you come in health, brother; and do not be angry with me because I sought to learn your tribe and your family. And you indeed turn out to be my brother, from a good and noble lineage. For I knew Ananias and Jathan, the sons of Shemaiah the great, as we used to go together to Jerusalem to worship, bringing the firstborn and the tithes of the produce; and they were not led astray in the error of our brothers. You are from a good root[b], brother.”
