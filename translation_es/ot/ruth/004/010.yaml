revisions:
- from: Y además a Rut la moabita[a], la esposa de Mahlón, la he adquirido para mí como esposa, para levantar el nombre del muerto sobre su heredad, para que el nombre del muerto no sea eliminado[b] de entre sus hermanos y de la puerta de su lugar[c]. Ustedes son testigos hoy.
  to: Y además, a Rut la moabita, la esposa de Mahlón, la he adquirido[a] para mí como esposa, para levantar el nombre del muerto sobre su heredad, para que el nombre del muerto no sea cortado[b] de entre sus hermanos y de la puerta de su lugar[c]. Ustedes son testigos hoy.
  rationale: Se corrige la principal desalineación con el rastro de auditoría al restaurar la metáfora 'no sea cortado' para וְלֹא יִכָּרֵת. También se reubica la nota léxica al verbo 'he adquirido', donde realmente corresponde. Se hacen solo ajustes mínimos de puntuación y nota para conservar la fidelidad al hebreo y al POB inglés con mejor legibilidad en español.
