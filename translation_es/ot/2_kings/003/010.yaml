translation:
  language: es
  text: 'Entonces el rey de Israel dijo: «¡Ay! Yahvé ha llamado a estos tres reyes para ponerlos en manos de Moab[a]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «En manos de Moab» reproduce el modismo hebreo «en la mano de Moab», es decir, «bajo el poder de Moab».
    reason: cultural_note
lexical_decisions:
- source_word: וַיֹּאמֶר
  english_pob_choice: Then ... said
  chosen_spanish: Entonces ... dijo
  alternatives_spanish:
  - Y ... dijo
  - Luego ... dijo
  lexicon: HALOT
  rationale: El waw consecutivo avanza la narración; «Entonces» conserva la secuencia natural en español sin perder el valor narrativo.
- source_word: מֶלֶךְ יִשְׂרָאֵל
  english_pob_choice: the king of Israel
  chosen_spanish: el rey de Israel
  alternatives_spanish:
  - el monarca de Israel
  lexicon: HALOT
  rationale: Se mantiene el título no identificado del personaje, como en el hebreo y en el POB inglés.
- source_word: אֲהָהּ
  english_pob_choice: Alas!
  chosen_spanish: ¡Ay!
  alternatives_spanish:
  - ¡Ah!
  - ¡Oh, no!
  lexicon: HALOT
  rationale: Es una interjección de dolor o consternación; «¡Ay!» transmite lamento con registro digno y natural en español.
- source_word: קָרָא
  english_pob_choice: has called
  chosen_spanish: ha llamado
  alternatives_spanish:
  - ha convocado
  - ha convocado/summoned
  lexicon: HALOT
  rationale: El verbo básico es «llamar». «Ha llamado» conserva la forma léxica sin convertirlo de manera indebida en un verbo más interpretativo.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  lexicon: HALOT
  rationale: 'Se aplica el criterio del proyecto: el Tetragrámaton se rinde como «Yahvé», manteniendo el nombre personal divino en la línea editorial del POB en español.'
- source_word: לִשְׁלֹשֶׁת הַמְּלָכִים הָאֵלֶּה
  english_pob_choice: these three kings
  chosen_spanish: a estos tres reyes
  alternatives_spanish:
  - a los tres reyes estos
  lexicon: HALOT
  rationale: El demostrativo señala a la coalición ya mencionada; «estos tres reyes» es idiomático y preciso en español.
- source_word: לָתֵת אוֹתָם
  english_pob_choice: to give them
  chosen_spanish: para entregarlos
  alternatives_spanish:
  - para darlos
  - para ponerlos
  lexicon: HALOT
  rationale: Aunque el hebreo usa «dar», en español el propósito hostil se expresa con más naturalidad y fuerza mediante «entregarlos», sin alterar el sentido del contexto.
- source_word: בְּיַד מוֹאָב
  english_pob_choice: into the hand of Moab
  chosen_spanish: en manos de Moab
  alternatives_spanish:
  - en la mano de Moab
  - bajo el poder de Moab
  lexicon: HALOT
  rationale: Se conserva la imagen idiomática de «mano» en una forma española natural; «en manos de Moab» mantiene el valor de dominio/poder sin sobreexplicar.
theological_decisions:
- issue: Renderización del nombre divino יהוה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Jehová
  rationale: El texto hebreo contiene explícitamente el Nombre propio; se traduce como «Yahvé» para preservar esa distinción frente a títulos sustitutivos.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Valor de קָרָא en el comentario del rey
  english_pob_reading: has called
  chosen_spanish_reading: ha llamado
  alternative_spanish_readings:
  - ha convocado
  - ha reunido
  rationale: El verbo se mantiene en su núcleo léxico («llamar») y no se amplía interpretativamente; el tono de alarma del rey proviene de su lectura del evento, no de una traducción más fuerte del verbo.
  doctrine_reference: DOCTRINE.md Translation philosophy §1, §3
- issue: Idiomático de בְּיַד מוֹאָב
  english_pob_reading: into the hand of Moab
  chosen_spanish_reading: en manos de Moab
  alternative_spanish_readings:
  - bajo el poder de Moab
  - en la mano de Moab
  rationale: La expresión hebrea es un modismo de dominio o entrega a poder ajeno. En español, «en manos de» conserva el modismo sin oscurecer el sentido.
  doctrine_reference: POB style on Hebrew idioms and transparent renderings
translation_notes:
  revision_awareness: 'Se siguió el estado revisado más reciente del POB inglés: la cláusula «For» fue retirada después de «Alas!» por razones de naturalidad y ajuste al hebreo. En español se reflejó esa decisión sin introducir un conector causal adicional; se mantuvo la relación directa entre la exclamación y el contenido del temor del rey.'
  spanish_consistency_notes:
  - Se usa «Yahvé» para el Tetragrámaton, conforme al criterio del proyecto en español.
  - Se conserva la imagen idiomática de «mano(s)» cuando comunica poder/dominio sin necesidad de paráfrasis.
  - El tono es solemne y bíblico, pero con sintaxis española natural.
  - No se sustituyó el nombre divino por «SEÑOR» ni se introdujo léxico eclesiástico no motivado por el texto.
