translation:
  language: es
  text: Él irá a la generación de sus padres[a][b]; ya no verán jamás la luz[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'El hebreo presenta una tensión de persona y número: el verbo inicial está escrito como segunda persona masculina singular (''tú irás/venirás''), mientras que el verbo posterior es plural (''verán''). Muchas traducciones suavizan esto; el texto hebreo, tal como está, preserva ese cambio de perspectiva.'
    reason: alternative_reading
  - marker: b
    text: O 'sus antepasados' en lugar de 'sus padres', que es más literal.
    reason: lexical_alternative
  - marker: c
    text: '''Ver la luz'' es un modismo hebreo para experimentar la vida; aquí significa que nunca más volverán a la vida en este mundo.'
    reason: cultural_note
lexical_decisions:
- source_word: תָּבוֹא
  english_pob_choice: he will go
  chosen_spanish: Él irá
  alternatives_spanish:
  - Tú irás
  - Uno irá
  - Llegará
  lexicon: HALOT
  rationale: Aunque la forma hebrea es 2ms, el contexto del salmo presenta al hombre rico y su destino; el auditable inglés de la POB también opta por una referencia singular contextual. En español, 'Él irá' mantiene la fluidez y conserva la tensión de persona del hebreo sin forzar una forma impersonal.
- source_word: עַד
  english_pob_choice: to
  chosen_spanish: a
  alternatives_spanish:
  - hasta
  - hacia
  - para
  lexicon: HALOT
  rationale: Con דּוֹר אֲבוֹתָיו, la preposición marca destino o llegada. En español, 'a la generación de sus padres' expresa naturalmente la dirección/destino del movimiento.
- source_word: דּוֹר
  english_pob_choice: generation
  chosen_spanish: generación
  alternatives_spanish:
  - edad
  - linaje
  - ciclo
  lexicon: HALOT
  rationale: '''Generación'' reproduce el valor básico de דּוֹר y permite entender que se trata del grupo de los antepasados fallecidos, no solo de un período temporal.'
- source_word: אֲבוֹתָיו
  english_pob_choice: his fathers
  chosen_spanish: sus padres
  alternatives_spanish:
  - sus ancestros
  - sus antepasados
  - sus padres [lit. sus padres]
  lexicon: HALOT
  rationale: El hebreo dice literalmente 'sus padres'. En español bíblico, 'padres' puede sonar menos natural para lectores modernos; 'sus padres' conserva el vínculo familiar inmediato, mientras la nota explica la alternativa ancestral. Se evita imponer 'ancestros' en el texto principal para no borrar la literalidad documentada.
- source_word: עַד נֵצַח
  english_pob_choice: never again
  chosen_spanish: nunca más
  alternatives_spanish:
  - para siempre
  - eternamente
  - jamás otra vez
  lexicon: HALOT
  rationale: La construcción con negación expresa imposibilidad permanente de repetición. 'Nunca más' comunica con naturalidad la fuerza idiomática del hebreo y preserva el matiz de no retorno.
- source_word: לֹא יִרְאוּ
  english_pob_choice: they will not see
  chosen_spanish: verán
  alternatives_spanish:
  - no verán
  - no volverán a ver
  - no mirarán
  lexicon: HALOT
  rationale: El hebreo lleva un verbo plural ('verán/no verán'), lo que la POB inglesa preserva con 'they'. En español, la forma futura plural mantiene el sujeto colectivo implícito en el verso y permite que el lector perciba el cambio de perspectiva desde el individuo hacia los muertos en conjunto.
- source_word: אוֹר
  english_pob_choice: the light
  chosen_spanish: la luz
  alternatives_spanish:
  - luz
  - la claridad
  - la luz de la vida
  lexicon: HALOT
  rationale: '''La luz'' conserva la imagen hebrea y permite la lectura idiomática de vida/existencia que la POB inglesa anota. En español, ''la luz'' es natural y suficientemente abierta para abarcar ese doble valor.'
theological_decisions:
- issue: Tensión de persona y número en el hebreo
  english_pob_reading: The English POB renders the first clause singular ('He will go') and the second clause plural ('they will never again see the light'), preserving the Hebrew's shift in perspective.
  chosen_spanish_reading: Él irá... nunca más verán la luz.
  alternative_spanish_readings:
  - Tú irás... nunca más verán la luz.
  - Él irá... nunca más verá la luz.
  rationale: La forma verbal inicial es 2ms en hebreo, mientras que el verbo final es 3mp. En español, 'Él irá' sigue el sentido contextual del pasaje; 'verán' conserva el plural explícito del hebreo transmitido. Así se mantiene la tensión textual en lugar de nivelarla completamente.
  doctrine_reference: Translation philosophy §3; preservar la tensión teológica y textual en vez de resolverla artificialmente
- issue: Imagen de 'ver la luz' como eufemismo de vida
  english_pob_reading: '''See the light'' is a Hebrew idiom for experiencing life; here it means they will never again return to life in this world.'
  chosen_spanish_reading: nunca más verán la luz
  alternative_spanish_readings:
  - nunca más volverán a la vida
  - nunca más verán la luz de la vida
  rationale: Se conserva la metáfora bíblica en el texto principal para no borrar el modo de hablar hebreo. La nota explica su sentido idiomático de no volver a la vida terrenal.
  doctrine_reference: Uso idiomático bíblico de אוֹר; vida/muerte en poesía sapiencial
- issue: Destino del rico con sus antepasados
  english_pob_reading: generation of his fathers
  chosen_spanish_reading: la generación de sus padres
  alternative_spanish_readings:
  - la generación de sus ancestros
  - la generación de sus antepasados
  rationale: La frase preserva el movimiento hacia el ámbito de los muertos/antepasados sin reinterpretar el verso más allá de lo que el hebreo muestra. La redacción evita convertirlo en una paráfrasis doctrinal.
  doctrine_reference: Salmo 49:19–20; destino común de los mortales
translation_notes:
  revision_awareness: 'Se siguió el audit trail inglés de la POB y no se introdujeron revisiones nuevas: el punto crítico sigue siendo la tensión de persona/número en el hebreo, que en español se conserva parcialmente con ''Él irá'' y ''verán''.'
  spanish_consistency_notes:
  - Se usa 'luz' en sentido idiomático sin explicitar 'vida' en el texto principal, siguiendo la economía poética del hebreo.
  - Se evita 'SEÑOR' y no hay términos del pacto divino en este versículo.
  - '''Padres'' se mantiene en el texto principal por fidelidad literal, con alternativa ancestral explicada en nota.'
  - La puntuación y el orden responden al ritmo poético del verso hebreo, con una pausa fuerte entre las dos cláusulas.
