revisions:
- from: Entonces el Espíritu me levantó y me llevó a los exiliados en Caldea[a], en la visión por el Espíritu de Dios[c]; y la visión que yo había visto se fue de encima de mí[d].
  to: Entonces el Espíritu[a] me levantó y me llevó a Caldea, a los exiliados[b], en la visión por el Espíritu de Dios[c]; y la visión que yo había visto se fue de encima de mí[d].
  rationale: Se corrigió «en Caldea» a «a Caldea» para reflejar la forma direccional hebrea. Se reubicó y rehízo la nota [a] para que corresponda a נְשָׂאַתְנִי, conforme al aparato del POB inglés. Se añadió la nota [b] para preservar la alternativa colectiva de הַגּוֹלָה. Se mantuvieron «por el Espíritu de Dios» y «se fue de encima de mí» con sus notas porque son defendibles, fieles al hebreo y suficientemente naturales en español.
