translation:
  language: es
  text: Pero el hombre en honor no permanece[a][b]; es como las bestias[c] que perecen.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «la humanidad». El hebreo אָדָם puede denotar «el hombre» o «la humanidad»; el singular aquí es representativo.
    reason: lexical_alternative
  - marker: b
    text: 'Lit.: «no pasa la noche / no se hospeda». La expresión comunica no continuar ni permanecer en una condición de honor.'
    reason: lexical_alternative
  - marker: c
    text: O «las bestias que son destruidas». El verbo final se entiende tradicionalmente aquí como «perecer».
    reason: alternative_reading
lexical_decisions:
- source_word: אָדָם
  english_pob_choice: man
  chosen_spanish: el hombre
  alternatives_spanish:
  - la humanidad
  - el ser humano
  lexicon: HALOT
  rationale: El hebreo singular אָדָם funciona aquí de modo representativo para la humanidad. 'El hombre' conserva esa forma singular proverbial y coincide con la decisión auditada del POB en inglés; 'el ser humano' aclararía el sentido, pero suaviza el valor representativo del singular.
- source_word: בִּיקָר
  english_pob_choice: in honor
  chosen_spanish: en honor
  alternatives_spanish:
  - en esplendor
  - en valía
  - en preciosidad
  lexicon: HALOT
  rationale: יָקָר puede abarcar honor, valor o esplendor. 'En honor' expresa mejor el contraste del salmo entre el estatus humano y su fragilidad, y es natural en español bíblico actual.
- source_word: בַּל
  english_pob_choice: does not
  chosen_spanish: 'no'
  alternatives_spanish:
  - no llega a
  - no va a
  - nunca
  lexicon: HALOT
  rationale: La partícula negativa exige una negación simple en español. 'No' mantiene la concisión proverbial del hebreo y evita forzar una lectura temporal no explicitada.
- source_word: יָלִין
  english_pob_choice: remain
  chosen_spanish: permanece
  alternatives_spanish:
  - se queda
  - perdura
  - pasa la noche
  lexicon: HALOT
  rationale: Aunque el verbo puede significar literalmente 'pasar la noche' o 'posarse', aquí el contexto sapiencial comunica no durar en la condición de honor. 'Permanece' preserva esa idea sin introducir un giro idiomático extraño en español.
- source_word: נִמְשַׁל
  english_pob_choice: he is like
  chosen_spanish: es semejante a
  alternatives_spanish:
  - es como
  - se le compara con
  - queda igualado a
  lexicon: HALOT
  rationale: El niphal de משל expresa comparación. 'Es semejante a' reproduce esa relación comparativa con tono sobrio y evita una paráfrasis excesiva.
- source_word: כַּבְּהֵמוֹת
  english_pob_choice: the beasts
  chosen_spanish: las bestias
  alternatives_spanish:
  - los animales
  - las fieras
  lexicon: HALOT
  rationale: '''Bestias'' conserva el registro solemne y tradicional del paralelismo sapiencial, y refleja bien la amplitud genérica de בְּהֵמוֹת sin restringirlo a ''animales'' domésticos o a ''fieras'' salvajes.'
- source_word: נִדְמוּ
  english_pob_choice: that perish
  chosen_spanish: que perecen
  alternatives_spanish:
  - que son destruidas
  - que se extinguen
  - que mueren
  lexicon: HALOT
  rationale: La forma de דמה aquí se entiende tradicionalmente como 'perecer' o 'ser destruido'. 'Perecen' sigue la lectura del POB en inglés y mantiene el paralelo entre la mortalidad humana y la de las bestias.
translation_notes:
  revision_awareness: 'El texto sigue de cerca el paquete fuente hebreo y la auditoría inglesa del POB, sin cambios revisionales respecto del último pase: se mantiene la lectura proverbial de אָדָם como singular representativo, יָלִין como permanencia no duradera en honor, y נִדְמוּ en el sentido tradicional de perecer.'
  spanish_consistency_notes:
  - Se usó «el hombre» y no «SEÑOR» ni otras convenciones de máscara, porque el versículo trata de אָדָם, no del nombre divino.
  - «Bestias» se conservó por coherencia con el tono sapiencial y con la decisión inglesa auditada.
  - La secuencia de notas a/b/c sigue el orden de los puntos lexicales relevantes del versículo.
