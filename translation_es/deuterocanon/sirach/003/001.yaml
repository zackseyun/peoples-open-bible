  revision_rationale: Se quita «así» para no añadir contenido no explícito al imperativo hebreo וַעֲשׂוּ y para alinearse mejor con la auditoría inglesa revisada. Se ajusta la nota a un español natural y a una representación más fiel de la variante griega, conservando el contraste clave entre el hebreo genérico («un padre» / «vivan») y el griego más interpretativo («su padre» / «se salven»).
