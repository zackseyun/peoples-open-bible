base_translation:
  language: en
  yaml_path: translation/deuterocanon/1_esdras/002/024.yaml
  text: So now I have ordered that those men be stopped from building the city[a], and that care be taken that nothing further be done beyond this[c][b], and that this evil may not proceed any further to the detriment of kings.
  footnotes:
  - marker: a
    text: Or 'that nothing be done contrary to this.' The Greek phrase can point either to action beyond the king's order or action against it.
    reason: lexical_alternative
  - marker: b
    text: Or 'to trouble kings.' The phrase refers to causing disturbance or injury to royal authority.
    reason: lexical_alternative
  - marker: c
    text: Contextually, 'building the city' likely refers to rebuilding, but the Greek text itself says simply 'build the city.'
    reason: lexical_alternative
