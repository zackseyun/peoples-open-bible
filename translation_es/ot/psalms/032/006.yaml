translation:
  language: es
  text: Por tanto, que todo piadoso ore a ti en un tiempo en que puedas ser hallado[a]; ciertamente, cuando vengan las grandes aguas desbordadas[b], no lo alcanzarán.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Por esto, que todo fiel ore a ti mientras puedas ser hallado».'
    reason: lexical_alternative
  - marker: b
    text: 'Literalmente: «en la inundación de muchas aguas».'
    reason: lexical_alternative
lexical_decisions:
- source_word: עַל זֹאת
  english_pob_choice: Therefore
  chosen_spanish: Por tanto
  alternatives_spanish:
  - Por esto
  - Así que
  - Por ello
  lexicon: HALOT
  rationale: La frase establece una relación inferencial con el versículo anterior. «Por tanto» comunica bien la conclusión en español sin perder el vínculo causal.
- source_word: יִתְפַּלֵּל
  english_pob_choice: let ... pray
  chosen_spanish: que ... ore
  alternatives_spanish:
  - que ... ore
  - que ... ruegue
  - que ... haga oración
  lexicon: HALOT
  rationale: El imperfecto tiene fuerza exhortativa/jusiva en el contexto. «Que ... ore» reproduce esa invitación sin volverlo una simple descripción futura.
- source_word: כָּל חָסִיד
  english_pob_choice: every godly one
  chosen_spanish: todo piadoso
  alternatives_spanish:
  - todo fiel
  - todo fiel devoto
  - todo santo
  lexicon: HALOT
  rationale: חָסִיד denota una persona caracterizada por piedad/lealtad del pacto. «Piadoso» conserva esa cualidad en español actual sin cargarlo de matiz eclesiástico.
- source_word: אֵלֶיךָ
  english_pob_choice: to you
  chosen_spanish: a ti
  alternatives_spanish:
  - a ti, oh Dios
  - hacia ti
  lexicon: HALOT
  rationale: El destinatario es claro por el contexto; el pronombre simple mantiene naturalidad y evita añadir explicaciones no explícitas en el hebreo.
- source_word: לְעֵת מְצֹא
  english_pob_choice: at a time when you may be found
  chosen_spanish: en un tiempo en que puedas ser hallado
  alternatives_spanish:
  - en el tiempo de ser hallado
  - mientras puedas ser hallado
  - cuando puedas ser hallado
  lexicon: HALOT
  rationale: La construcción se entiende de forma pasiva respecto de Dios. «Puedas ser hallado» conserva la idea de accesibilidad divina y mantiene el matiz exhortativo de buscar a Dios mientras está disponible.
- source_word: רַק
  english_pob_choice: surely
  chosen_spanish: ciertamente
  alternatives_spanish:
  - solo
  - solamente
  - de veras
  lexicon: HALOT
  rationale: Aquí la partícula refuerza la seguridad de la afirmación siguiente; «ciertamente» expresa mejor ese valor asertivo que un restrictivo literal como «solo».
- source_word: לְשֵׁטֶף מַיִם רַבִּים
  english_pob_choice: when the great floodwaters come
  chosen_spanish: cuando vengan las grandes aguas torrenciales
  alternatives_spanish:
  - cuando lleguen las aguas caudalosas
  - en el embate de muchas aguas
  - cuando sobrevenga el diluvio de muchas aguas
  lexicon: HALOT
  rationale: La imagen es de aguas desbordadas y devastadoras. «Aguas torrenciales» transmite con claridad la fuerza de שֶׁטֶף y mantiene el registro poético sin forzar una paráfrasis excesiva.
- source_word: אֵלָיו
  english_pob_choice: him
  chosen_spanish: lo
  alternatives_spanish:
  - a él
  - le
  lexicon: HALOT
  rationale: Aunque el hebreo expresa dirección con la preposición, en español el verbo «alcanzar» funciona naturalmente con objeto directo. «Lo» conserva la referencia singular al justo protegido.
- source_word: לֹא יַגִּיעוּ
  english_pob_choice: they will not reach
  chosen_spanish: no lo alcanzarán
  alternatives_spanish:
  - no llegarán a él
  - no lo tocarán
  - no lo sobrepasarán
  lexicon: HALOT
  rationale: נגע en este contexto comunica llegar hasta el punto de contacto. «Alcanzarán» es idiomático en español y preserva la imagen de que las aguas no llegan a tocar al protegido.
theological_decisions:
- issue: Quién puede ser hallado en לְעֵת מְצֹא
  english_pob_reading: at a time when you may be found
  chosen_spanish_reading: en un tiempo en que puedas ser hallado
  alternative_spanish_readings:
  - mientras puedas ser hallado
  - cuando puedas ser hallado
  rationale: 'La formulación mantiene abierta la tensión poética: se exhorta a orar buscando a Yahvé en el tiempo oportuno, sin precisar de más si el énfasis cae en la disponibilidad divina o en la oportunidad del buscador. La pasiva conserva esa ambigüedad útil.'
  doctrine_reference: Preservar la tensión poética y la ambigüedad gramatical del hebreo.
- issue: Valor de רַק antes de la imagen de las aguas
  english_pob_reading: surely
  chosen_spanish_reading: ciertamente
  alternative_spanish_readings:
  - solo
  - solamente
  - de veras
  rationale: La partícula no debe leerse como limitación, sino como refuerzo enfático del resultado seguro. «Ciertamente» evita borrar ese valor y no introduce una restricción ajena al contexto.
  doctrine_reference: Función modal/enfática de partículas hebreas.
- issue: Sentido de la protección frente a las aguas
  english_pob_reading: The floodwaters symbolize overwhelming trouble/judgment from which the praying godly person is protected.
  chosen_spanish_reading: Las grandes aguas torrenciales simbolizan calamidad abrumadora, y el piadoso que ora queda preservado de que lo alcancen.
  alternative_spanish_readings:
  - protección literal contra una inundación
  - las aguas no alcanzan a Dios
  rationale: El paralelismo poético favorece una imagen metafórica de angustia o juicio abrumador, sin anular la lectura literal del cuadro. La traducción conserva la metáfora y el referente singular al justo.
  doctrine_reference: Preservar la tensión teológica entre imagen poética y aplicación general.
translation_notes:
  revision_awareness: El borrador sigue la revisión más reciente del inglés POB que sustituyó la imagen más literal de «rush of many waters» por una formulación más natural de «when the great floodwaters come». En español se reflejó esa decisión con «cuando vengan las grandes aguas torrenciales», manteniendo el singular referencial final («no lo alcanzarán») y la exhortación previa de buscar a Dios mientras pueda ser hallado.
  spanish_consistency_notes:
  - Se usa «Yahvé» de forma predeterminada para el nombre divino implícito en el contexto, aunque no aparezca explícitamente en este versículo.
  - «Piadoso» se escogió para חָסִיד por su valor de piedad/lealtad, evitando «santo» por su posible sesgo litúrgico.
  - Se conserva el paralelismo singular («lo») para el justo protegido, conforme al hebreo y al inglés POB.
  - La imagen de aguas destructoras se mantiene poética y no se reduce a una explicación doctrinal explícita en el texto principal.
