translation:
  language: es
  text: Las alas de estos querubines estaban extendidas veinte codos[a], y ellos estaban de pie sobre sus propios pies, con sus rostros hacia la casa.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «hacia el templo». El hebreo dice literalmente «hacia la casa», una designación común del edificio del templo.
    reason: lexical_alternative
lexical_decisions:
- source_word: כַּנְפֵי
  english_pob_choice: the wings of
  chosen_spanish: las alas de
  alternatives_spanish:
  - alas
  lexicon: HALOT
  rationale: El constructo hebreo introduce las alas como pertenecientes a los querubines. En español, 'las alas de' conserva la relación posesiva de manera natural y clara.
- source_word: הַכְּרוּבִים הָאֵלֶּה
  english_pob_choice: these cherubim
  chosen_spanish: estos querubines
  alternatives_spanish:
  - estos querubines
  - estos querubines celestiales
  lexicon: HALOT
  rationale: '''Querubines'' mantiene el término bíblico establecido. ''Estos'' conserva el énfasis demostrativo del hebreo; se evita ''querubines celestiales'' porque añade especificación no expresada aquí.'
- source_word: פֹּרְשִׂים
  english_pob_choice: spread
  chosen_spanish: se extendían
  alternatives_spanish:
  - estaban extendidas
  - se desplegaban
  - estaban desplegadas
  lexicon: HALOT
  rationale: El participio describe el estado de las alas. 'Se extendían' transmite la postura resultante de forma natural en español sin forzar una perífrasis demasiado técnica.
- source_word: אַמּוֹת עֶשְׂרִים
  english_pob_choice: twenty cubits
  chosen_spanish: veinte codos
  alternatives_spanish:
  - veinte codos de extensión
  - un total de veinte codos
  lexicon: HALOT
  rationale: '''Codos'' es la medida equivalente tradicional en español bíblico y conserva la concisión del hebreo sin añadir una dimensión interpretativa.'
- source_word: וְהֵם עֹמְדִים
  english_pob_choice: and they stood
  chosen_spanish: y ellos estaban de pie
  alternatives_spanish:
  - y estaban de pie
  - y ellos se mantenían de pie
  lexicon: HALOT
  rationale: El hebreo pasa de las alas a las figuras mismas. 'Estaban de pie' comunica el estado postural de manera idiomática y fiel al texto descriptivo.
- source_word: עַל רַגְלֵיהֶם
  english_pob_choice: on their feet
  chosen_spanish: sobre sus pies
  alternatives_spanish:
  - sobre sus patas
  - sobre sus piernas
  lexicon: HALOT
  rationale: '''Sobre sus pies'' sigue de cerca la imagen hebrea y evita reexplicar la postura con vocabulario ajeno al texto.'
- source_word: וּפְנֵיהֶם לַבָּיִת
  english_pob_choice: with their faces toward the house
  chosen_spanish: con el rostro hacia la casa
  alternatives_spanish:
  - con sus rostros hacia la casa
  - con la cara hacia la casa
  - con el rostro hacia el templo
  lexicon: HALOT
  rationale: Se conserva 'la casa' porque el hebreo usa בַּיִת, el término común para el edificio del templo. 'Rostro' mantiene el lenguaje corporal bíblico con dignidad, sin sustituirlo por una paráfrasis más libre.
theological_decisions:
- issue: בַּיִת en contexto del templo
  english_pob_reading: the house
  chosen_spanish_reading: la casa
  alternative_spanish_readings:
  - el templo
  rationale: El texto hebreo dice literalmente 'la casa'. Mantenerlo preserva el color del original y evita una identificación interpretativa que, aunque correcta por contexto, no está formulada explícitamente en el verso.
  doctrine_reference: Principio de primacía del texto fuente y retención de designaciones templarias idiomáticas
translation_notes:
  revision_awareness: El pasaje coincide estrechamente con el texto hebreo y con la solución auditada en inglés. Se mantuvo la misma tensión lexical en בַּיִת ('casa') mediante una nota alternativa, sin diluir la referencia templaria.
  spanish_consistency_notes:
  - Se conserva 'querubines' como término bíblico estándar, no 'querubes'.
  - Se mantiene 'la casa' en el texto principal para reflejar el hebreo, con nota que explicita el sentido contextual de templo.
  - El movimiento verbal 'se extendían' traduce el participio descriptivo sin convertirlo en narración dinámica excesiva.
  - La frase final usa 'rostro' para preservar la imagen corporal bíblica y la solemnidad del estilo.
