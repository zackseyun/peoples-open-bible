translation:
  language: es
  text: 'Entonces Amán dijo: «En verdad, la reina Ester no trajo a nadie con el rey al banquete[a] que había preparado, sino solo a mí; y mañana también estoy invitado[b] por ella junto con el rey».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Banquete» traduce מִשְׁתֶּה. También podría verterse «festín», pero «banquete» encaja mejor con el contexto cortesano del libro.
    reason: lexical_alternative
  - marker: b
    text: 'Literalmente: «soy llamado por ella». En este contexto, la forma pasiva expresa que ha sido invitado por Ester.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר
  english_pob_choice: Then ... said
  chosen_spanish: Entonces dijo
  alternatives_spanish:
  - Y dijo
  - Luego dijo
  lexicon: HALOT
  rationale: La forma narrativa con waw consecutiva pide una transición temporal natural en español; «Entonces dijo» conserva el avance del relato sin sonar mecánico.
- source_word: הָמָן
  english_pob_choice: Haman
  chosen_spanish: Amán
  alternatives_spanish:
  - Hamán
  lexicon: HALOT
  rationale: Se usa la forma castellana establecida en español bíblico para el personaje, manteniendo la identificación clara del nombre propio.
- source_word: אַף לֹא
  english_pob_choice: Indeed ... no one
  chosen_spanish: En verdad, ... a nadie
  alternatives_spanish:
  - Ciertamente, ... a nadie
  - Ni siquiera ... a nadie
  lexicon: HALOT
  rationale: La partícula intensiva añade énfasis a la autoexaltación de Amán; «En verdad» conserva esa fuerza sin introducir una negación adicional ajena al hebreo.
- source_word: הֵבִיאָה
  english_pob_choice: brought
  chosen_spanish: llevó
  alternatives_spanish:
  - trajo
  - hizo venir
  lexicon: HALOT
  rationale: En contexto de banquete, el verbo concreto puede expresarse naturalmente como «llevó»; mantiene el sentido de introducir a alguien en la ocasión sin forzar «invitó», que sería interpretativo.
- source_word: אֶסְתֵּר הַמַּלְכָּה
  english_pob_choice: Queen Esther
  chosen_spanish: la reina Ester
  alternatives_spanish:
  - Ester, la reina
  - la reina Esther
  lexicon: HALOT
  rationale: El orden español más natural es título + nombre; se conserva el honorífico y el referente sin calcar el inglés.
- source_word: אֶל הַמִּשְׁתֶּה
  english_pob_choice: to the banquet
  chosen_spanish: al banquete
  alternatives_spanish:
  - al festín
  - a la fiesta
  lexicon: HALOT
  rationale: מִשְׁתֶּה en este marco cortesano se entiende bien como «banquete»; es la equivalencia que mejor refleja el contexto del relato.
- source_word: אֲשֶׁר עָשָׂתָה
  english_pob_choice: she prepared
  chosen_spanish: que había preparado
  alternatives_spanish:
  - que hizo
  - que había hecho
  lexicon: HALOT
  rationale: El hebreo dice literalmente «que hizo»; en español, «preparado» comunica de manera idiomática la acción de organizar el banquete sin perder el sentido original.
- source_word: כִּי אִם אוֹתִי
  english_pob_choice: except me
  chosen_spanish: sino solo a mí
  alternatives_spanish:
  - excepto a mí
  - más que a mí
  lexicon: HALOT
  rationale: La construcción expresa exclusión; «sino solo a mí» reproduce el valor restrictivo y mantiene el tono de orgullo de Amán.
- source_word: וְגַם לְמָחָר
  english_pob_choice: and tomorrow also
  chosen_spanish: y mañana también
  alternatives_spanish:
  - y también mañana
  - además mañana
  lexicon: HALOT
  rationale: Se preserva el matiz aditivo de וְגַם y la referencia temporal de לְמָחָר con una formulación natural en español.
- source_word: קָרוּא
  english_pob_choice: am invited
  chosen_spanish: seré invitado
  alternatives_spanish:
  - estoy llamado
  - me han invitado
  lexicon: HALOT
  rationale: Aunque el valor básico es «llamado», en el contexto de banquete la pasiva tiene sentido de invitación; «seré invitado» expresa con claridad ese uso contextual.
- source_word: לָהּ
  english_pob_choice: by her
  chosen_spanish: por ella
  alternatives_spanish:
  - de parte de ella
  - por su parte
  lexicon: HALOT
  rationale: El lamed marca la procedencia/agencia de la invitación; «por ella» es la forma española más directa y natural.
- source_word: עִם הַמֶּלֶךְ
  english_pob_choice: together with the king
  chosen_spanish: junto con el rey
  alternatives_spanish:
  - con el rey
  - en compañía del rey
  lexicon: HALOT
  rationale: La expresión final conserva la idea de acompañamiento y simultaneidad al convite; «junto con» refleja bien el valor de עִם en este contexto.
theological_decisions:
- issue: Preservación del tono de autoexaltación y del matiz de exclusividad
  english_pob_reading: Indeed, Queen Esther brought no one with the king to the banquet she prepared except me; and tomorrow also I am invited by her together with the king.
  chosen_spanish_reading: En verdad, la reina Ester no llevó con el rey a nadie al banquete que había preparado, sino solo a mí; y mañana también seré invitado por ella junto con el rey.
  alternative_spanish_readings:
  - Ciertamente, la reina Ester no llevó con el rey a nadie al banquete que había preparado, excepto a mí; y mañana también seré invitado por ella junto con el rey.
  - Ni siquiera la reina Ester llevó con el rey a nadie al banquete que había preparado, salvo a mí; y mañana también seré invitado por ella junto con el rey.
  rationale: 'No hay una cuestión doctrinal directa, pero sí una decisión de lectura retórica: el hebreo enfatiza la exclusividad y el orgullo de Amán. La redacción elegida conserva esa tensión sin atenuarla ni exagerarla.'
  doctrine_reference: N/A
translation_notes:
  revision_awareness: 'La redacción sigue el acuerdo alto del audit trail inglés y mantiene sus dos decisiones clave: el matiz enfático de אַף לֹא y el sentido contextual de קָרוּא como invitación. Se evita calcar el inglés donde el español pide una sintaxis más natural, pero sin perder la concreción del hebreo.'
  spanish_consistency_notes:
  - Se conserva «Yahvé» como norma del proyecto, aunque este versículo no contiene el nombre divino.
  - Se usa «reina Ester» y «rey» con artículo definido, siguiendo el estilo bíblico español natural.
  - No se traduce מִשְׁתֶּה como «fiesta» para no diluir el trasfondo cortesano y ceremonial del pasaje.
