base_translation:
  language: en
  yaml_path: translation/ot/joshua/017/018.yaml
  text: But the hill country will be yours[a]; for it is a forest, and you shall clear it, and its farthest borders shall be yours. For you shall dispossess the Canaanites[c][b], though they have iron chariots and though they are strong.
  footnotes:
  - marker: a
    text: Or 'the mountain will be yours'; Hebrew הַר can mean 'mountain' or 'hill country,' and here likely refers to the upland region allotted to Joseph.
    reason: lexical_alternative
  - marker: b
    text: Or 'its extremities' or 'its outlying parts'; the Hebrew refers to the outer limits or borders of the forested hill country.
    reason: lexical_alternative
  - marker: c
    text: Hebrew 'the Canaanite ... he is strong,' using singular forms collectively for the people group.
    reason: lexical_alternative
