translation:
  language: es
  text: 'Pero Yahvé se enojó conmigo por causa de ustedes y no me escuchó[a], y Yahvé me dijo: «¡Basta![b] No me hables más de este asunto»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «por su causa» / «por cuenta de ustedes».
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «Basta para ti», un modismo de rechazo tajante.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּתְעַבֵּר
  english_pob_choice: was angry
  chosen_spanish: se enojó
  alternatives_spanish:
  - se airó
  - se enfureció
  - se indignó
  lexicon: HALOT
  rationale: El verbo en esta construcción idiomática expresa ira divina dirigida hacia alguien. «Se enojó» es natural en español y mantiene la fuerza sin exagerar más allá del hebreo.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  - Jehová
  lexicon: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
  rationale: El texto fuente usa directamente el nombre divino del pacto. En español se conserva como «Yahvé», conforme al criterio del proyecto, en vez de sustituirlo por un título.
- source_word: בִּי
  english_pob_choice: with me
  chosen_spanish: conmigo
  alternatives_spanish:
  - contra mí
  - a mí
  lexicon: HALOT
  rationale: Con el verbo de ira, el español natural exige «conmigo». Mantiene la relación personal del enojo sin alterar el sentido.
- source_word: לְמַעַנְכֶם
  english_pob_choice: because of you
  chosen_spanish: por causa de ustedes
  alternatives_spanish:
  - por su causa
  - a causa de ustedes
  - por ustedes
  lexicon: HALOT
  rationale: 'La frase marca causalidad: la reacción de Yahvé respecto de Moisés está vinculada con el pueblo. «Por causa de ustedes» conserva esa causalidad y el tono explicativo.'
- source_word: וְלֹא שָׁמַע אֵלַי
  english_pob_choice: and did not listen to me
  chosen_spanish: y no me escuchó
  alternatives_spanish:
  - y no me oyó
  - y no me hizo caso
  - y no atendió a mí
  lexicon: HALOT
  rationale: שׁמע con אֶל significa escuchar/atender. «No me escuchó» expresa de modo claro la negativa a atender la súplica de Moisés.
- source_word: רַב לָךְ
  english_pob_choice: Enough from you
  chosen_spanish: Basta para ti
  alternatives_spanish:
  - Basta de ti
  - Es suficiente
  - Ya basta
  lexicon: HALOT
  rationale: La expresión hebrea es una fórmula breve de rechazo tajante. En español, «Basta para ti» conserva la abrupta limitación del discurso, aunque de forma idiomática.
- source_word: אַל תּוֹסֶף דַּבֵּר
  english_pob_choice: do not speak
  chosen_spanish: no me hables más
  alternatives_spanish:
  - no vuelvas a hablar
  - no sigas hablándome
  - no hables más
  lexicon: HALOT
  rationale: 'El verbo con יסף aquí prohíbe continuar o repetir la acción. En español, el sentido queda bien recogido con una prohibición directa y relacional: «no me hables más».'
- source_word: עוֹד
  english_pob_choice: again
  chosen_spanish: más
  alternatives_spanish:
  - otra vez
  - de nuevo
  - ya
  lexicon: HALOT
  rationale: En esta prohibición, עוֹד indica repetición/continuación. En la frase española, «más» comunica la idea de continuidad y evita redundancia.
- source_word: בַּדָּבָר הַזֶּה
  english_pob_choice: about this matter
  chosen_spanish: de este asunto
  alternatives_spanish:
  - sobre este asunto
  - acerca de este asunto
  - de esta cuestión
  lexicon: HALOT
  rationale: דבר se refiere al tema concreto de la petición de Moisés. «Asunto» es formal y natural en español, y preserva el carácter referencial del sustantivo.
theological_decisions:
- issue: Rendering of the divine name יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: El hebreo presenta el nombre del pacto, no un título. La forma española del proyecto es «Yahvé», que conserva la referencia personal y evita la sustitución tradicional.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Force of the dismissal idiom רַב לָךְ
  english_pob_reading: Enough from you
  chosen_spanish_reading: Basta para ti
  alternative_spanish_readings:
  - Ya basta
  - Basta de ti
  - Es suficiente
  rationale: La expresión no es solo informativa; tiene tono de corte brusco. «Basta para ti» conserva el filo del hebreo sin añadir contenido no sustentado por el texto.
  doctrine_reference: HALOT, רַב + לְ in dismissal idiom
- issue: Negative prohibition אַל תּוֹסֶף דַּבֵּר ... עוֹד
  english_pob_reading: do not speak to me again
  chosen_spanish_reading: no me hables más
  alternative_spanish_readings:
  - no vuelvas a hablarme
  - no sigas hablándome
  - no me hables otra vez
  rationale: La combinación hebrea prohíbe continuar o repetir la petición. El español elegido mantiene la relación directa entre hablante y oyente y la noción de repetición.
  doctrine_reference: HALOT, יסף + infinitive; עוֹד as repetition/continuation
translation_notes:
  revision_awareness: 'La redacción sigue el pasaje base sin cambios sustantivos respecto del análisis auditado en inglés. Se conservan los dos puntos clave del original: la ira de Yahvé motivada por el pueblo y la fórmula breve y abrupta de rechazo en la respuesta divina. No se detectaron revisiones aplicadas en el registro inglés, por lo que el español se ajusta al acuerdo alto del control cruzado.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» conforme al criterio de nombre divino del proyecto.
  - Se eligió «se enojó» para conservar el valor idiomático de la ira divina sin calco rígido.
  - «No me hables más» representa en español la prohibición continuativa de אַל תּוֹסֶף דַּבֵּר + עוֹד.
  - Los marcadores de nota [a] y [b] están anclados en el texto donde corresponden.
