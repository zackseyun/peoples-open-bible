id: GEN.30.28
reference: Genesis 30:28
source:
  edition: WLC
  text: וַ/יֹּאמַ֑ר נָקְבָ֧/ה שְׂכָרְ/ךָ֛ עָלַ֖/י וְ/אֶתֵּֽנָה׃
translation:
  text: Then he said[a], “Name your wages, and I will give it.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “Specify your pay to me, and I will give it.”
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמַר
  chosen: Then he said
  alternatives:
  - And he said
  lexicon: HALOT
  rationale: The waw-consecutive advances the narrative. 'Then he said' gives natural modern English while preserving the sequential force; 'And he said' is more formally literal but less idiomatic.
- source_word: נָקְבָה
  chosen: Name
  alternatives:
  - Specify
  - Set
  - State clearly
  lexicon: HALOT
  rationale: From נקב in the sense of specifying or naming explicitly. In this context of compensation, 'Name' is concise and idiomatic in English ('name your price/wages'), while still reflecting the verbal idea of explicit designation.
- source_word: שְׂכָרְךָ
  chosen: your wages
  alternatives:
  - your pay
  - your hire
  - your reward
  lexicon: HALOT
  rationale: שָׂכָר commonly denotes wages/pay for labor. 'Your wages' best fits the employment context between Laban and Jacob. 'Reward' is too broad, and 'hire' is less natural in contemporary English.
- source_word: עָלַי
  chosen: to me
  alternatives:
  - for me
  - upon me
  - against me
  lexicon: HALOT
  rationale: 'Literally ''upon me,'' but in this idiom with naming/specifying terms it conveys direction toward the speaker: ''name/specify ... to me.'' This avoids an awkwardly literal rendering while preserving the sense that Laban invites Jacob to state the amount.'
- source_word: וְאֶתֵּנָה
  chosen: and I will give them
  alternatives:
  - and I will give it
  - and I will pay it
  lexicon: HALOT
  rationale: 'The cohortative-like form here expresses Laban''s commitment: ''and I will give.'' English requires an object; because ''wages'' is naturally plural in English, ''them'' is supplied for clarity. ''Pay it'' is possible dynamically, but ''give them'' stays closer to the Hebrew verb נתן.'
