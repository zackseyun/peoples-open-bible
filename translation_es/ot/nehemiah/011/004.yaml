translation:
  language: es
  text: 'Y en Jerusalén vivían algunos de los hijos de Judá y algunos de los hijos de Benjamín[a]. De los hijos de Judá: Ataías hijo de Uzías, hijo de Zacarías, hijo de Amarías, hijo de Sefatías, hijo de Mahalalel[b], de los hijos de Pérez.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «habitaban» para «vivían». El verbo hebreo puede indicar residir o asentarse.
    reason: lexical_alternative
  - marker: b
    text: «Hijos de Judá» y «hijos de Benjamín» significa miembros o descendientes de esas líneas tribales.
    reason: cultural_note
lexical_decisions:
- source_word: וּבִירוּשָׁלַם
  english_pob_choice: And in Jerusalem
  chosen_spanish: Y en Jerusalén
  alternatives_spanish:
  - Ahora en Jerusalén
  - En Jerusalén
  lexicon: HALOT
  rationale: La conjunción inicial mantiene la continuidad narrativa del contexto anterior. En español, 'Y en Jerusalén' conserva esa unión sin volver la frase forzada.
- source_word: יָשְׁבוּ
  english_pob_choice: there lived
  chosen_spanish: vivían
  alternatives_spanish:
  - habitaban
  - moraban
  - residían
  lexicon: HALOT
  rationale: El hebreo puede expresar residir o asentarse. 'Vivían' comunica con naturalidad el sentido residencial en una lista censal, sin arcaísmo.
- source_word: מִבְּנֵי יְהוּדָה
  english_pob_choice: some of the sons of Judah
  chosen_spanish: algunos de los hijos de Judá
  alternatives_spanish:
  - algunos de la casa de Judá
  - algunos de los descendientes de Judá
  lexicon: HALOT
  rationale: '''Hijos de'' preserva el idioma genealógico del hebreo; ''algunos de'' expresa el matiz partitivo de מִן.'
- source_word: וּמִבְּנֵי בִנְיָמִן
  english_pob_choice: and some of the sons of Benjamin
  chosen_spanish: y algunos de los hijos de Benjamín
  alternatives_spanish:
  - y algunos de la casa de Benjamín
  - y algunos de los descendientes de Benjamín
  lexicon: HALOT
  rationale: Se mantiene el paralelismo con la frase anterior y el mismo valor partitivo y genealógico.
- source_word: מִבְּנֵי יְהוּדָה
  english_pob_choice: 'Of the sons of Judah:'
  chosen_spanish: 'De los hijos de Judá:'
  alternatives_spanish:
  - 'Entre los hijos de Judá:'
  - 'De entre los hijos de Judá:'
  lexicon: HALOT
  rationale: Esta segunda mención funciona como encabezado de la lista nominal, por lo que una frase breve con dos puntos resulta natural y fiel.
- source_word: עֲתָיָה
  english_pob_choice: Athaiah
  chosen_spanish: Ataías
  alternatives_spanish:
  - Ataía
  lexicon: HALOT
  rationale: Se adopta la transliteración usual al español bíblico, con acento gráfico por la pronunciación llana en español.
- source_word: בֶן
  english_pob_choice: son of
  chosen_spanish: hijo de
  alternatives_spanish:
  - descendiente de
  lexicon: HALOT
  rationale: En una genealogía, 'hijo de' es la forma más transparente y directa para בֶן.
- source_word: עֻזִּיָּה
  english_pob_choice: Uzziah
  chosen_spanish: Uzías
  alternatives_spanish:
  - Uzías
  lexicon: HALOT
  rationale: Se usa la forma española tradicional del nombre bíblico, ampliamente reconocible y fiel a la transliteración convencional.
- source_word: זְכַרְיָה
  english_pob_choice: Zechariah
  chosen_spanish: Zacarías
  alternatives_spanish:
  - Zecarías
  lexicon: HALOT
  rationale: Forma española bíblica estándar, más natural para lectores en español.
- source_word: אֲמַרְיָה
  english_pob_choice: Amariah
  chosen_spanish: Amarías
  alternatives_spanish:
  - Amaríah
  lexicon: HALOT
  rationale: Se sigue la forma tradicional española del nombre propio.
- source_word: שְׁפַטְיָה
  english_pob_choice: Shephatiah
  chosen_spanish: Sefatías
  alternatives_spanish:
  - Jefatías
  lexicon: HALOT
  rationale: La adaptación al español conserva el nombre propio en una forma legible y bíblica.
- source_word: מַהֲלַלְאֵל
  english_pob_choice: Mahalalel
  chosen_spanish: Mhalalel
  alternatives_spanish:
  - Mahalalel
  lexicon: HALOT
  rationale: Se mantiene la transliteración del nombre propio. La forma elegida busca ser breve y consistente con la pronunciación española, sin traducir ni alterar el referente.
- source_word: מִבְּנֵי פָרֶץ
  english_pob_choice: of the sons of Perez
  chosen_spanish: de los hijos de Pérez
  alternatives_spanish:
  - de los descendientes de Pérez
  lexicon: HALOT
  rationale: '''Hijos de Pérez'' conserva el lenguaje de linaje/tribu del hebreo. Se usa la forma española habitual ''Pérez'' para el nombre.'
theological_decisions:
- issue: Valor genealógico y tribal de 'hijos de'
  english_pob_reading: '''Sons of Judah'' and ''sons of Benjamin'' means members or descendants of those tribal lines.'
  chosen_spanish_reading: '''Hijos de Judá'' y ''hijos de Benjamín'' se entienden como miembros o descendientes de esas líneas tribales.'
  alternative_spanish_readings:
  - '''descendientes de Judá'' y ''descendientes de Benjamín'''
  - '''la tribu de Judá'' y ''la tribu de Benjamín'''
  rationale: La POB inglesa conserva el idioma genealógico y explica su alcance tribal. En español se mantiene 'hijos de' para no perder esa forma semítica, dejando implícita la referencia a linajes/tribus.
  doctrine_reference: Genealogías tribales de Israel; uso bíblico de בני como pertenencia de linaje.
translation_notes:
  revision_awareness: No se reportan revisiones aplicadas en el audit trail; la versión inglesa más reciente quedó sin cambios y el cotejo final fue de alta concordancia. La redacción española sigue de cerca esa lectura estable, conservando el paralelismo y la estructura genealógica del hebreo.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' como norma del proyecto, pero este versículo no contiene el tetragrámaton.
  - Se usa 'hijos de' para preservar el valor tribal-genealógico del hebreo, no como traducción pedagógica de 'people of'.
  - Los nombres propios se transliteran o adaptan a formas españolas bíblicas habituales para claridad lectora.
  - La puntuación con dos puntos introduce correctamente la lista genealógica después de 'De los hijos de Judá'.
