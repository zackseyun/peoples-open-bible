revisions:
- from: Y acampando allí[a], no probó pan ni bebió agua[b], haciendo duelo por las grandes iniquidades de la multitud.
  to: Y alojándose allí[a], no probó pan ni bebió agua[b], haciendo duelo por los grandes actos sin ley de la multitud.
  rationale: Se corrige αὐλισθείς a 'alojándose allí' para evitar la sobreespecificación de un campamento, manteniendo la idea central de pasar allí la noche. Se cambia 'iniquidades' por 'actos sin ley' para preservar mejor la decisión léxica y teológica documentada para ἀνομία. Se conservan la sintaxis general, el ayuno literal ('pan' y 'agua') y el tono penitencial del pasaje.
