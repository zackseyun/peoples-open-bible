translation:
  language: es
  text: Reinó tres años en Jerusalén[a], y el nombre de su madre fue Micaía, hija de Uriel, de Guibeá. Y hubo guerra entre Abías y Jeroboam.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El paralelo en 1 Reyes 15:2 da a la madre de Abías el nombre de Maacá. El hebreo «hija» también puede emplearse de manera más amplia para una descendiente femenina, de modo que ambos relatos pueden reflejar convenciones genealógicas o de nombramiento diferentes.
    reason: alternative_reading
lexical_decisions:
- source_word: מָלַךְ
  english_pob_choice: reigned
  chosen_spanish: reinó
  alternatives_spanish:
  - fue rey
  - gobernó
  lexicon: HALOT
  rationale: El verbo hebreo expresa ejercer el reinado; «reinó» conserva la fórmula real con naturalidad en español y evita una paráfrasis menos precisa como «fue rey».
- source_word: וְשֵׁם אִמּוֹ
  english_pob_choice: and his mother’s name was
  chosen_spanish: y el nombre de su madre fue
  alternatives_spanish:
  - y el nombre de su madre era
  - y su madre se llamaba
  lexicon: HALOT
  rationale: La construcción genealógica hebrea se refleja de modo directo. «El nombre de su madre fue» mantiene la forma y el sentido sin sonar excesivamente rígido.
- source_word: מִיכָיָהוּ
  english_pob_choice: Micaiah
  chosen_spanish: Micaía
  alternatives_spanish:
  - Micaías
  - Micaiah
  lexicon: HALOT
  rationale: Se translitera al español con una forma legible y consistente. «Micaía» conserva el nombre propio hebreo sin forzar la ortografía inglesa.
- source_word: בַת אוּרִיאֵל
  english_pob_choice: daughter of Uriel
  chosen_spanish: hija de Uriel
  alternatives_spanish:
  - la hija de Uriel
  lexicon: HALOT
  rationale: La relación filial se expresa de manera literal. En español, «hija de Uriel» es la forma más natural y fiel al constructo hebreo.
- source_word: מִן גִּבְעָה
  english_pob_choice: from Gibeah
  chosen_spanish: de Gueba
  alternatives_spanish:
  - de Gibeá
  - procedente de Gueba
  lexicon: HALOT
  rationale: La preposición מִן indica procedencia. Se vierte con «de» para mantener la relación explícita; «Gueba» es la forma española habitual del topónimo hebreo גִּבְעָה.
- source_word: וּמִלְחָמָה הָיְתָה
  english_pob_choice: And there was war
  chosen_spanish: Y hubo guerra
  alternatives_spanish:
  - Y había guerra
  - Y se libró guerra
  lexicon: HALOT
  rationale: El hebreo presenta una cláusula existencial simple. «Y hubo guerra» es la equivalencia natural que evita introducir duración o matices no explicitados.
- source_word: בֵּין ... וּבֵין
  english_pob_choice: between ... and ...
  chosen_spanish: entre ... y ...
  alternatives_spanish:
  - entre ... e ...
  lexicon: HALOT
  rationale: Es la correspondencia normal en español para la oposición mutua entre dos partes.
- source_word: אֲבִיָּה
  english_pob_choice: Abijah
  chosen_spanish: Abías
  alternatives_spanish:
  - Abiyá
  lexicon: HALOT
  rationale: Se adopta la forma española establecida del nombre en contextos bíblicos hispanos, manteniendo la referencia a la persona de Crónicas sin importar la forma de Reyes.
theological_decisions:
- issue: Diferencia de nombre materno entre Crónicas y el paralelo de 1 Reyes 15:2
  english_pob_reading: Retain the Chronicler’s wording 'Micaiah daughter of Uriel from Gibeah' in the main text without harmonizing to Kings.
  chosen_spanish_reading: Mantener en el texto principal «Micaía, hija de Uriel, de Gueba» sin armonizarla con 1 Reyes.
  alternative_spanish_readings:
  - Harmonizar el nombre con Maacá de 1 Reyes 15:2
  - Interpretar «hija» en sentido ampliado como descendiente femenina
  rationale: La traducción debe reflejar el hebreo de Crónicas tal como está, sin resolver la tensión textual por adelantado. La posible amplitud semántica de בַת puede explicarse, pero no sustituye el enunciado del texto principal.
  doctrine_reference: Translation philosophy §§1, 3, 5
- issue: Uso del topónimo y de la forma del nombre en la tradición española
  english_pob_reading: Use straightforward transliteration and do not harmonize names across contexts.
  chosen_spanish_reading: 'Usar formas españolas legibles sin mezclar tradiciones textuales: «Gueba» y «Abías».'
  alternative_spanish_readings:
  - Gibeá / Gibeah
  - Abijam
  rationale: La forma española debe ser clara para lectores de iglesia y, a la vez, respetar la distinción entre Crónicas y Reyes. Se evita importar «Abijam», que pertenece a la tradición de Reyes.
  doctrine_reference: Translation philosophy §§1, 5
translation_notes:
  revision_awareness: 'La versión española sigue de cerca el hebreo de 2 Crónicas 13:2 y la auditoría inglesa: conserva la fórmula regnal, la genealogía tal como aparece en Crónicas y la declaración simple de guerra, sin armonizar el nombre materno con el pasaje paralelo de 1 Reyes. Se ajustó la toponimia a formas españolas transparentes y se mantuvo la tensión textual en nota.'
  spanish_consistency_notes:
  - Se usó «reinó» para מָלַךְ en una fórmula real breve y natural.
  - Se mantuvo la estructura genealógica con «el nombre de su madre fue» para reflejar וְשֵׁם אִמּוֹ.
  - «Micaía» y «Gueba» siguen una transliteración española legible, no una reproducción inglesa.
  - Se preservó «Abías» para el personaje de Crónicas, distinguiéndolo de «Abijam» en Reyes.
  - La nota a aclara la tensión con 1 Reyes 15:2 sin resolverla en el texto principal.
