translation:
  language: es
  text: 'Pero Moisés dijo delante de Yahvé: «He aquí, yo soy incircunciso de labios[a]; ¿y cómo me escuchará Faraón?»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Es decir, con labios no aptos para hablar bien.
    reason: lexical_clarification
lexical_decisions:
- source_word: וַיֹּאמֶר
  english_pob_choice: But Moses said
  chosen_spanish: Pero Moisés dijo
  alternatives_spanish:
  - Y Moisés dijo
  - Entonces Moisés dijo
  lexicon: HALOT
  rationale: La waw narrativa avanza la escena; en español, «pero» conserva bien el matiz de objeción o contraste inmediato del contexto sin perder la progresión narrativa. «Dijo» es la forma natural y fiel para וַיֹּאמֶר.
- source_word: מֹשֶׁה
  english_pob_choice: Moses
  chosen_spanish: Moisés
  alternatives_spanish:
  - Moshe
  lexicon: HALOT
  rationale: Nombre propio estándar en español bíblico. No hay razón contextual para transcribir la forma hebrea.
- source_word: לִפְנֵי יְהוָה
  english_pob_choice: before Yahweh
  chosen_spanish: delante de Yahvé
  alternatives_spanish:
  - en presencia de Yahvé
  - ante Yahvé
  lexicon: HALOT
  rationale: לִפְנֵי expresa ubicación relacional o espacial; «delante de» comunica bien esa presencia sin volverla interpretativa. Se mantiene «Yahvé» por la convención POB para el Tetragrama.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  - el SEÑOR
  lexicon: HALOT
  rationale: Se preserva el nombre divino revelado en el hebreo, conforme a la terminología POB. «Yahvé» es la forma establecida en español del proyecto.
- source_word: הֵן
  english_pob_choice: Behold
  chosen_spanish: He aquí
  alternatives_spanish:
  - Mira
  - Miren
  - He aquí
  lexicon: HALOT
  rationale: הֵן es un partícula de atención/formalidad. «He aquí» mantiene el tono elevado del hebreo y corresponde mejor al registro de la traducción de referencia que alternativas más coloquiales.
- source_word: עֲרַל שְׂפָתַיִם
  english_pob_choice: uncircumcised of lips
  chosen_spanish: incircunciso de labios
  alternatives_spanish:
  - incircunciso de los labios
  - de labios incircuncisos
  - falto de facilidad de palabra
  lexicon: HALOT
  rationale: Se conserva la metáfora hebrea sin suavizarla. «Incircunciso de labios» reproduce el valor léxico y la tensión teológica/imagética del original, evitando paráfrasis que borren el vínculo con el lenguaje del pacto.
- source_word: וְאֵיךְ
  english_pob_choice: so how
  chosen_spanish: ¿y cómo
  alternatives_spanish:
  - ¿cómo entonces
  - ¿así que cómo
  lexicon: HALOT
  rationale: La conjunción más interrogativa expresa una inferencia de consecuencia. En español, «¿y cómo» resulta natural y mantiene el razonamiento de Moisés.
- source_word: יִשְׁמַע אֵלַי
  english_pob_choice: will Pharaoh listen to me
  chosen_spanish: me escuchará
  alternatives_spanish:
  - me oirá
  - me hará caso
  lexicon: HALOT
  rationale: שמע con אֶל indica escuchar/prestar atención. «Me escuchará» conserva la idea de atender la palabra de Moisés sin exagerar hacia obediencia («me hará caso») ni debilitarlo a mera percepción auditiva («me oirá»).
- source_word: פַּרְעֹה
  english_pob_choice: Pharaoh
  chosen_spanish: Faraón
  alternatives_spanish:
  - el faraón
  lexicon: HALOT
  rationale: Término bíblico asentado en español para el título real egipcio. Se emplea con mayúscula como nombre/título en el contexto narrativo.
theological_decisions:
- issue: Renderización del nombre divino יהוה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: La lectura inglesa del POB preserva el nombre propio divino. En español, «Yahvé» mantiene esa decisión y evita la sustitución por un título, respetando la auditable diferencia entre nombre y apelativo.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Conservación de la metáfora 'uncircumcised of lips'
  english_pob_reading: Preserve the metaphor in the main text
  chosen_spanish_reading: incircunciso de labios
  alternative_spanish_readings:
  - falto de facilidad de palabra
  - no apto para hablar
  rationale: La imagen no se reduce a un simple problema de dicción; comunica inadecuación ritual/figurativa. Preservarla en español conserva la tensión documental del hebreo y evita una explicación prematura en el cuerpo del texto.
  doctrine_reference: 'DOCTRINE.md Translation philosophy: original-language primacy; preserve theological tension rather than resolve it'
translation_notes:
  revision_awareness: La versión inglesa auditada pasó de «Look» a «Behold» por ajuste de registro; en español se eligió «He aquí» para reflejar ese tono más formal y mantener la equivalencia óptima con הֵן. También se conservó la metáfora central en lugar de una paráfrasis explicativa, siguiendo la decisión teológica del POB.
  spanish_consistency_notes:
  - Se usó «Yahvé» de forma consistente para יהוה, conforme al estándar del proyecto.
  - Se mantuvo «incircunciso de labios» como metáfora principal, con nota alternativa solo para aclarar el sentido idiomático.
  - «Faraón» se conservó como título/nombre propio bíblico habitual en español.
  - El orden y la puntuación respetan el discurso directo y el contraste de Moisés ante Yahvé.
