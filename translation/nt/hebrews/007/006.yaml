id: HEB.7.6
reference: Hebrews 7:6
source:
  edition: SBLGNT
  text: ὁ δὲ μὴ γενεαλογούμενος ἐξ αὐτῶν δεδεκάτωκεν ⸀Ἀβραάμ, καὶ τὸν ἔχοντα τὰς ἐπαγγελίας εὐλόγηκεν.
translation:
  text: But the one who is not traced by genealogy from them has taken a tenth from Abraham and has blessed the one who had the promises[a][b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'has received tithes from Abraham.' The Greek verb refers to taking or receiving a tenth.
    reason: lexical_alternative
  - marker: b
    text: Or 'the one who has the promises.' Greek has a present participle, but English may use past tense here for smoother narrative reference to Abraham.
    reason: lexical_alternative
lexical_decisions:
- source_word: ὁ δὲ μὴ γενεαλογούμενος
  chosen: the one who is not traced by genealogy
  alternatives:
  - he whose genealogy is not recorded
  - the one not descended by genealogy
  - the one not counted in their genealogy
  lexicon: BDAG
  rationale: The articular present passive participle functions substantivally, referring to Melchizedek. γενεαλογέομαι here concerns genealogical registration/descent, not merely biological ancestry. 'Traced by genealogy' preserves the passive nuance and the argument of Hebrews that Melchizedek is outside the Levitical genealogical line.
- source_word: ἐξ αὐτῶν
  chosen: from them
  alternatives:
  - among them
  - from their line
  lexicon: BDAG
  rationale: Refers back to the sons/descendants of Levi in context. 'From them' is concise and preserves the relational sense without over-specifying beyond the immediate Greek.
- source_word: δεδεκάτωκεν
  chosen: has taken a tenth from
  alternatives:
  - has collected a tenth from
  - has received tithes from
  - has tithed
  lexicon: BDAG
  rationale: The perfect indicates a completed action with present relevance in the argument. 'Has taken a tenth from' renders the verb transparently and avoids importing the ecclesiastical term 'tithed' in a way that could obscure that Abraham is the giver, not the receiver. 'A tenth' is clear modern English and semantically equivalent to 'tithe'.
- source_word: Ἀβραάμ
  chosen: Abraham
  rationale: Standard English transliteration of the personal name.
- source_word: τὸν ἔχοντα τὰς ἐπαγγελίας
  chosen: the one who had the promises
  alternatives:
  - the one who has the promises
  - the one possessing the promises
  lexicon: BDAG
  rationale: The participle is present in Greek, but in English a past form fits the narrative reference to Abraham more naturally. 'The promises' preserves the plural ἐπαγγελίας and refers to the covenant promises given to Abraham.
- source_word: εὐλόγηκεν
  chosen: has blessed
  alternatives:
  - blessed
  lexicon: BDAG
  rationale: 'The perfect is retained with ''has blessed'' to match the Greek aspect and to support the author''s ongoing argumentative force: Melchizedek''s blessing of Abraham remains significant.'
