translation:
  language: es
  text: Y ahora he escogido y consagrado esta casa[a], para que mi nombre esté allí para siempre[b], y mis ojos y mi corazón estarán allí siempre.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «santificado». El verbo hebreo significa apartar para uso santo.
    reason: lexical_alternative
  - marker: b
    text: «Esta casa» se refiere al templo.
    reason: cultural_note
lexical_decisions:
- source_word: וְעַתָּה
  english_pob_choice: And now
  chosen_spanish: Y ahora
  alternatives_spanish:
  - Ahora
  lexicon: HALOT
  rationale: La conjunción más adverbio temporal marca transición en el discurso divino. «Y ahora» conserva mejor el hilo discursivo que un simple «Ahora».
- source_word: בָּחַרְתִּי
  english_pob_choice: I have chosen
  chosen_spanish: he escogido
  alternatives_spanish:
  - escogí
  lexicon: HALOT
  rationale: El perfecto hebreo expresa una acción completada con vigencia presente; en español, el pretérito perfecto compuesto comunica bien ese valor en contexto solemne.
- source_word: וְהִקְדַּשְׁתִּי
  english_pob_choice: and consecrated
  chosen_spanish: y consagrado
  alternatives_spanish:
  - y santificado
  - y hecho santo
  lexicon: HALOT
  rationale: קדשׁ en hifil significa apartar para uso santo. «Consagrado» es claro y natural en contexto de dedicación del templo, sin perder la idea de separación para Dios.
- source_word: הַבַּיִת הַזֶּה
  english_pob_choice: this house
  chosen_spanish: esta casa
  alternatives_spanish:
  - este templo
  lexicon: HALOT
  rationale: El hebreo dice literalmente «casa». Mantener «casa» conserva la formulación fuente y el idioma bíblico, aunque se refiere al templo.
- source_word: לִהְיוֹת שְׁמִי שָׁם
  english_pob_choice: that my name may be there
  chosen_spanish: para que mi nombre esté allí
  alternatives_spanish:
  - para que mi nombre esté allí mismo
  - para que mi nombre esté allí por siempre
  lexicon: HALOT
  rationale: La construcción infinitiva expresa propósito. «Para que» es la forma más natural en español; «mi nombre» conserva el valor teológico de la auto-revelación y presencia pactual de Dios.
- source_word: שְׁמִי
  english_pob_choice: my name
  chosen_spanish: mi nombre
  alternatives_spanish:
  - mi Nombre
  lexicon: HALOT
  rationale: En el lenguaje del templo, «nombre» designa la presencia revelada y el vínculo pactual de Dios. No se interpreta como mera etiqueta ni se sustituye por una paráfrasis.
- source_word: עַד עוֹלָם
  english_pob_choice: forever
  chosen_spanish: para siempre
  alternatives_spanish:
  - por תמיד
  - por toda la eternidad
  lexicon: HALOT
  rationale: La expresión indica duración indefinida y continua. «Para siempre» es la equivalencia idiomática más natural y fiel en español.
- source_word: וְהָיוּ עֵינַי וְלִבִּי שָׁם
  english_pob_choice: and my eyes and my heart will be there
  chosen_spanish: y mis ojos y mi corazón estarán allí
  alternatives_spanish:
  - y mi atención y mi corazón estarán allí
  - y mis ojos y mi mente estarán allí
  lexicon: HALOT
  rationale: 'Se preserva el lenguaje antropomórfico: «ojos» expresa atención vigilante y «corazón» expresa interés, voluntad y compromiso. No se parafrasea para evitar borrar la imagen bíblica.'
- source_word: לִבִּי
  english_pob_choice: my heart
  chosen_spanish: mi corazón
  alternatives_spanish:
  - mi mente
  lexicon: HALOT
  rationale: לב puede incluir pensamiento y voluntad, pero «corazón» retiene mejor la expresión antropomórfica hebrea y su fuerza afectiva-pactual.
- source_word: כָּל הַיָּמִים
  english_pob_choice: all the days
  chosen_spanish: todos los días
  alternatives_spanish:
  - siempre
  - continuamente
  lexicon: HALOT
  rationale: La frase es literalmente «todos los días». «Todos los días» conserva el giro hebreo y sigue siendo claro en español; aquí describe permanencia continua.
theological_decisions:
- issue: Lenguaje antropomórfico de Dios («mis ojos y mi corazón»)
  english_pob_reading: Preserve the anthropomorphic imagery literally
  chosen_spanish_reading: Conservar literalmente la imagen antropomórfica
  alternative_spanish_readings:
  - Parafrasear como «mi atención y mi cuidado estarán allí»
  rationale: El hebreo usa deliberadamente lenguaje corporal para expresar vigilancia atenta y compromiso pactual. Mantener la imagen preserva la textura teológica del texto sin imponer una explicación filosófica.
  doctrine_reference: Translation philosophy §3, §6
- issue: Teología del templo en «mi nombre esté allí»
  english_pob_reading: Retain 'my name' rather than interpret as full personal presence or mere reputation
  chosen_spanish_reading: Retener «mi nombre» como expresión de presencia y vínculo pactual, no como simple reputación
  alternative_spanish_readings:
  - «yo estaré allí»
  - «mi presencia estará allí»
  rationale: La frase pertenece al lenguaje veterotestamentario del templo, donde el nombre de Dios mora allí de modo pactual. Explicitarlo más sería introducir interpretación; debilitarlo como mera reputación empobrecería la teología del pasaje.
  doctrine_reference: Translation philosophy §1, §3
translation_notes:
  revision_awareness: 'La redacción sigue la revisión más reciente del POB inglés: conserva «And now» como transición discursiva, mantiene el paralelismo de «my eyes and my heart», y refleja la actualización estilística de «always» con «todos los días», sin perder la literalidad del hebreo. También respeta que el texto hable de «this house» y no lo sustituye por «templo» en el cuerpo principal.'
  spanish_consistency_notes:
  - Se prefirió «consagrado» frente a «santificado» en el texto principal, con nota alternativa, para una lectura natural en español moderno.
  - Se mantuvo «casa» por fidelidad al hebreo, aun cuando el referente es el templo.
  - Se conservaron las metáforas corporales («ojos», «corazón») sin explicación intrusiva en el texto principal.
  - La puntuación con coma tras «casa[a]» sigue la revisión inglesa reciente y mejora la legibilidad en español.
