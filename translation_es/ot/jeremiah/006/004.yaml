translation:
  language: es
  text: Consagren la guerra contra ella; levántense[a], y subamos al mediodía. ¡Ay de nosotros! porque el día declina, porque las sombras de la tarde se alargan.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Prepárense para la guerra contra ella». El hebreo usa literalmente lenguaje de consagración para la batalla.'
    reason: lexical_alternative
lexical_decisions:
- source_word: קַדְּשׁוּ
  english_pob_choice: Consecrate
  chosen_spanish: Consagren
  alternatives_spanish:
  - Prepárense
  - Santifiquen
  lexicon: HALOT
  rationale: El imperativo en piel de קדשׁ conserva la idea de apartar/consagrar. En español, "consagren" mantiene el matiz sacral de preparación bélica que el POB inglés preserva con "Consecrate", sin reducirlo a un simple "prepárense".
- source_word: עָלֶיהָ
  english_pob_choice: against her
  chosen_spanish: contra ella
  alternatives_spanish:
  - sobre ella
  - respecto de ella
  lexicon: HALOT
  rationale: Con מִלְחָמָה, על marca dirección hostil. En español, "contra ella" es la opción natural y fiel para referir la ciudad fem. sing. del contexto.
- source_word: מִלְחָמָה
  english_pob_choice: war
  chosen_spanish: la guerra
  alternatives_spanish:
  - la batalla
  lexicon: HALOT
  rationale: '"Guerra" reproduce mejor el alcance amplio del sustantivo y la colocación "consagrar guerra"; "batalla" estrecharía indebidamente el sentido.'
- source_word: קוּמוּ
  english_pob_choice: rise up
  chosen_spanish: levántense
  alternatives_spanish:
  - levántense ya
  - álcense
  lexicon: HALOT
  rationale: Como imperativo de urgencia militar, "levántense" es idiomático y enérgico en español. Mantiene la fuerza exhortativa del hebreo sin sonar forzado.
- source_word: וְנַעֲלֶה
  english_pob_choice: let us go up
  chosen_spanish: subamos
  alternatives_spanish:
  - subamos contra ella
  - marchamos
  lexicon: HALOT
  rationale: עלה se usa para avanzar hacia una ciudad. "Subamos" conserva la imagen espacial y militar del hebreo mejor que una paráfrasis directa como "ataquemos".
- source_word: בַּצָּהֳרָיִם
  english_pob_choice: at noon
  chosen_spanish: al mediodía
  alternatives_spanish:
  - a mediodía
  - en el mediodía
  lexicon: HALOT
  rationale: El término denota el mediodía; "al mediodía" es claro, natural y equivalente al "at noon" del POB inglés.
- source_word: אוֹי לָנוּ
  english_pob_choice: Woe to us
  chosen_spanish: ¡Ay de nosotros!
  alternatives_spanish:
  - ¡Ay para nosotros!
  - ¡Desdicha para nosotros!
  lexicon: HALOT
  rationale: '"¡Ay de nosotros!" transmite el clamor profético y la carga emotiva del hebreo, equivalente al registro de "Woe to us".'
- source_word: כִּי פָנָה הַיּוֹם
  english_pob_choice: for the day is declining
  chosen_spanish: porque el día declina
  alternatives_spanish:
  - porque el día se inclina
  - porque el día se va apagando
  lexicon: HALOT
  rationale: פנה literalmente es "volverse/torcerse"; en contexto expresa que el día va cayendo hacia la noche. "Declina" preserva esa metáfora con español formal y natural.
- source_word: יִנָּטוּ
  english_pob_choice: are lengthening
  chosen_spanish: se alargan
  alternatives_spanish:
  - se extienden
  - se prolongan
  lexicon: HALOT
  rationale: El niphal de נטה describe sombras que se extienden. "Se alargan" es la forma más idiomática y visual en español, equivalente al "lengthening" revisado del POB inglés.
- source_word: צִלְלֵי עָרֶב
  english_pob_choice: the shadows of evening
  chosen_spanish: las sombras de la tarde
  alternatives_spanish:
  - las sombras del atardecer
  - las sombras vespertinas
  lexicon: HALOT
  rationale: La construcción habla de sombras asociadas con la llegada de la tarde/noche. "De la tarde" comunica el valor temporal sin sobrecargar la frase y mantiene la imagen poética.
theological_decisions:
- issue: Lenguaje sacral de guerra en קַדְּשׁוּ ... מִלְחָמָה
  english_pob_reading: 'Render with explicit consecration language: ''Consecrate war against her'''
  chosen_spanish_reading: 'Conservar el lenguaje de consagración: "Consagren la guerra contra ella"'
  alternative_spanish_readings:
  - Prepárense para la guerra contra ella
  rationale: El texto usa vocabulario de consagración en contexto militar. Mantener "consagren" preserva la tensión teológica y cultual del pasaje, en línea con el POB inglés, sin añadir una aprobación divina que el versículo no explicita.
  doctrine_reference: Translation philosophy §1, §3
translation_notes:
  revision_awareness: 'El borrador sigue el último estado revisado del contexto inglés: se prefirió una formulación más idiomática para el descenso del día y el alargamiento de las sombras, manteniendo el núcleo metafórico del hebreo. La elección española refleja ese mismo equilibrio entre literalidad y naturalidad.'
  spanish_consistency_notes:
  - Se conserva "Yahvé" como norma del proyecto solo cuando aparece el nombre divino; este versículo no lo contiene.
  - '"Consagren" mantiene el matiz sacral del hebreo y evita neutralizarlo con "prepárense" en el texto principal.'
  - '"las sombras de la tarde" se eligió por claridad natural en español; la alternativa "del atardecer" queda implícita en la nota léxica.'
  - La puntuación reproduce el tono profético y exhortativo del hebreo con dos miembros paralelos y una conclusión causal.
