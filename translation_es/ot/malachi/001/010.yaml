translation:
  language: es
  text: ¡Oh[a], si hubiera entre ustedes siquiera uno que cerrara las puertas, para que no encendieran mi altar en vano! No me complazco en ustedes, dice Yahvé de los ejércitos[b], y no aceptaré una ofrenda[c] de las manos de ustedes.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O también: «¿Quién hay siquiera entre ustedes que cerrara las puertas?» El hebreo puede leerse como pregunta retórica, pero aquí probablemente expresa un deseo: que alguien cerrara las puertas del templo antes que seguir con un culto vacío.'
    reason: alternative_reading
  - marker: b
    text: «Encender mi altar en vano» también puede traducirse «prender mi altar en vano».
    reason: lexical_alternative
  - marker: c
    text: «Ofrenda» traduce מִנְחָה, que en contextos sacrificiales puede significar con más precisión «ofrenda de cereal».
    reason: lexical_alternative
lexical_decisions:
- source_word: מִי גַם בָּכֶם
  english_pob_choice: Oh, that there were even one among you
  chosen_spanish: ¡Oh, si hubiera entre ustedes siquiera uno
  alternatives_spanish:
  - ¿Quién hay siquiera entre ustedes?
  - Si tan solo hubiera uno entre ustedes
  lexicon: HALOT
  rationale: La expresión hebrea introduce una queja/declaración de deseo, no una simple pregunta informativa. En español, «¡Oh, si hubiera…!» conserva bien el valor optativo y lamentativo sin volverlo rígidamente interrogativo.
- source_word: וְיִסְגֹּר דְּלָתַיִם
  english_pob_choice: who would shut the doors
  chosen_spanish: que cerrara las puertas
  alternatives_spanish:
  - y cerrara las puertas
  - que pudiera cerrar las puertas
  lexicon: HALOT
  rationale: El verbo significa cerrar o echar el cerrojo; «las puertas» comunica naturalmente el plural hebreo en el contexto del templo. La relativa en subjuntivo encaja con el matiz deseado de la frase.
- source_word: וְלֹא תָאִירוּ מִזְבְּחִי
  english_pob_choice: so that you would not kindle my altar
  chosen_spanish: para que no encendieran mi altar
  alternatives_spanish:
  - para que no prendieran mi altar
  - y no encendieran mi altar
  lexicon: HALOT
  rationale: El hifil de אור aquí expresa encender/avivar el fuego del altar. «Encender mi altar» preserva la imagen sacrificial y suena natural en español; el complemento implícito se entiende por el contexto.
- source_word: חִנָּם
  english_pob_choice: in vain
  chosen_spanish: en vano
  alternatives_spanish:
  - gratis
  - sin provecho
  lexicon: HALOT
  rationale: La idea es de inutilidad o vaciedad del culto, no simplemente gratuidad económica. «En vano» es la correspondencia más clara y sobria en español.
- source_word: אֵין לִי חֵפֶץ בָּכֶם
  english_pob_choice: I have no pleasure in you
  chosen_spanish: No tengo complacencia en ustedes
  alternatives_spanish:
  - No me complazco en ustedes
  - No tengo agrado en ustedes
  lexicon: HALOT
  rationale: חֵפֶץ denota deleite, agrado o complacencia. «Complacencia» conserva el tono solemne y la fuerza personal del rechazo divino.
- source_word: יְהוָה צְבָאוֹת
  english_pob_choice: Yahweh of hosts
  chosen_spanish: Yahvé de los ejércitos
  alternatives_spanish:
  - Yahvé de los ejércitos celestiales
  - Yahvé de las huestes
  lexicon: HALOT
  rationale: Se sigue el nombre divino como «Yahvé» según el criterio del proyecto. «De los ejércitos» es la forma española transparente y ampliamente comprensible para צְבָאוֹת, manteniendo el título bíblico sin sustituirlo por una tradición masking.
- source_word: וּמִנְחָה
  english_pob_choice: an offering
  chosen_spanish: una ofrenda
  alternatives_spanish:
  - una ofrenda de cereal
  - una oblación
  - un regalo
  lexicon: HALOT
  rationale: מִנְחָה puede ser ofrenda, presente o ofrenda vegetal/cereal. «Ofrenda» conserva el sentido cultual amplio que el contexto exige, sin restringir innecesariamente a un tipo específico.
- source_word: לֹא אֶרְצֶה מִיֶּדְכֶם
  english_pob_choice: I will not accept an offering from your hand
  chosen_spanish: no aceptaré una ofrenda de su mano
  alternatives_spanish:
  - no recibiré una ofrenda de su mano
  - no me agradará una ofrenda de su mano
  lexicon: HALOT
  rationale: רצה en contexto sacrificial expresa aceptar favorablemente. «Aceptar» reproduce bien esa fuerza. «De su mano» mantiene la imagen hebrea del ofrecimiento presentado por ellos.
theological_decisions:
- issue: Representación del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - el SEÑOR
  rationale: El texto hebreo usa el Tetragrama de forma directa. En la serie POB en español se adopta «Yahvé» como forma principal, preservando el nombre pactual sin la convención de sustitución.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Sentido de מִנְחָה en el reproche sacrificial
  english_pob_reading: an offering
  chosen_spanish_reading: una ofrenda
  alternative_spanish_readings:
  - una ofrenda de cereal
  - una oblación
  rationale: Aunque מִנְחָה puede referirse específicamente a una ofrenda vegetal/cereal, aquí el contexto condena el culto defectuoso en general. «Ofrenda» conserva el alcance cultual sin forzar una precisión no exigida por el versículo.
  doctrine_reference: DOCTRINE.md Translation philosophy §1, §5
translation_notes:
  revision_awareness: 'El borrador sigue el consenso del audit trail inglés: la frase inicial se entiende como deseo/lamento; חִנָּם se rinde con una fórmula natural («en vano»); יְהוָה se traduce como «Yahvé»; y מִנְחָה permanece amplio como «ofrenda», aunque se reconoce la alternativa específica de «ofrenda de cereal».'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» conforme al criterio del proyecto para el Tetragrama.
  - Se usa «de los ejércitos» para צְבָאוֹת, forma clara y estable en español.
  - «Ofrenda» preserva el valor cultual general de מִנְחָה sin estrecharlo innecesariamente.
  - La imagen de «cerrar las puertas» conserva el contexto del templo y su culto.
  - El uso de subjuntivo en «si hubiera… que cerrara» transmite el matiz optativo del hebreo.
