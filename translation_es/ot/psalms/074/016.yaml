  rationale: Se restituye el orden del hebreo ('día ... también ... noche') para preservar el paralelismo y la fuerza de אַף. También se mueve la nota al pie a 'la luz', ya que allí recae la alternativa léxica de מָאוֹר. El resto del borrador ya era fiel, claro y acorde con las decisiones auditadas.
