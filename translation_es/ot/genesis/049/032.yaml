translation:
  language: es
  text: El campo y la cueva que está en él fueron comprados a los hijos de Het[a][b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «de los hititas». El hebreo dice literalmente «de los hijos de Het».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «La compra del campo y de la cueva que está en él fue de los hijos de Het».'
    reason: previous_rendering
lexical_decisions:
- source_word: מִקְנֵה
  english_pob_choice: the purchase of
  chosen_spanish: la compra de
  alternatives_spanish:
  - la adquisición de
  - la posesión de
  - la compra
  lexicon: HALOT
  rationale: El sustantivo nombra el acto o resultado de adquirir por compra. En español, «la compra de» conserva la referencia transaccional y suena natural en una cláusula nominal resumida.
- source_word: הַשָּׂדֶה
  english_pob_choice: the field
  chosen_spanish: el campo
  alternatives_spanish:
  - el terreno
  - la parcela
  lexicon: HALOT
  rationale: «Campo» es el equivalente directo y más transparente para שָׂדֶה en este contexto de propiedad de tierra.
- source_word: וְהַמְּעָרָה
  english_pob_choice: and the cave
  chosen_spanish: y de la cueva
  alternatives_spanish:
  - y la cueva
  lexicon: HALOT
  rationale: Se mantiene la coordinación de los dos elementos adquiridos. El genitivo preposicional («de la cueva») ayuda a integrar naturalmente la frase en español junto con «la compra de».
- source_word: אֲשֶׁר בּוֹ
  english_pob_choice: that is in it
  chosen_spanish: que está en él
  alternatives_spanish:
  - que estaba en él
  - que está allí
  lexicon: HALOT
  rationale: La relativa describe a la cueva en relación con el campo. «Está» refleja bien la referencia situacional resumida sin forzar una paráfrasis.
- source_word: מֵאֵת
  english_pob_choice: from
  chosen_spanish: a
  alternatives_spanish:
  - de parte de
  - de
  lexicon: HALOT
  rationale: En español, el origen/agente de una compra suele expresarse mejor con «a» en pasiva perifrástica («fue hecha a...»).
- source_word: בְּנֵי חֵת
  english_pob_choice: the sons of Heth
  chosen_spanish: los hijos de Het
  alternatives_spanish:
  - los hititas
  lexicon: HALOT
  rationale: Se preserva la forma hebrea transparente «hijos de Het», como hace la POB inglesa, y se deja la equivalencia contextual «hititas» como alternativa.
translation_notes:
  revision_awareness: 'La redacción española sigue la revisión inglesa más natural («were purchased») pero conserva la transparencia del hebreo nominal y del complemento de origen. Se mantuvieron todos los elementos del texto fuente: campo, cueva, relativa locativa y procedencia de los hijos de Het.'
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el Tetragrámaton aparece; aquí no aplica.
  - Se preserva «hijos de Het» como transliteración semántica transparente, con «hititas» como alternativa anotada.
  - La estructura pasiva española («fue hecha a») evita una traducción demasiado calcada y mantiene el sentido de adquisición por compra.
