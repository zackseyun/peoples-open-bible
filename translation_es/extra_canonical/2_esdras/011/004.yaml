review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien el latín: ''Nam'' se refleja como explicativo, ''capita eius erant quiescentia'' como estado de reposo, ''medium caput'' como la cabeza central/intermedia, y el contraste de ''sed'' queda al final. El sentido global coincide con la traducción inglesa auditada.'
  spanish_quality_summary: 'El español es claro y natural, pero la nota al pie no es fiel al expediente inglés ni a la revisión aplicada: presenta ''Pero'' como alternativa de traducción del inicio, aunque la auditoría precisamente corrigió eso. Además, ''Pues'' funciona, pero ''Porque'' suena más nítido en registro bíblico explicativo al inicio de oración en este contexto. El resto del verso es plenamente legible.'
  glossary_alignment: 'No hay términos del glosario mayor en juego. La decisión discursiva clave sí importa: conservar ''nam'' como explicativo y reservar el adversativo para ''sed''. El borrador lo hace en el texto principal, pero la nota crea confusión innecesaria al reintroducir la opción descartada.'
  issues:
  - severity: medium
    issue: La nota [a] ofrece «Pero» como alternativa inicial.
    rationale: La evidencia latina y la revisión auditada establecen que 'nam' aquí debe entenderse como explicativo ('For'), no adversativo. Incluir 'Pero' como alternativa contradice el expediente y puede desorientar al lector sobre la lógica del versículo.
  - severity: low
    issue: '''Pues'' es aceptable, pero ''Porque'' comunica con más transparencia el valor explicativo de ''nam'' en este contexto.'
    rationale: No es un error grave, pero al inicio de este versículo 'Porque' refleja de manera más directa el enlace causal-explicativo con la oración previa. Ayuda además a distinguir con más nitidez el posterior 'pero' de 'sed'.
  revised_spanish_text: Porque sus cabezas estaban en reposo, y la cabeza del medio era mayor que las otras cabezas, pero también ella estaba en reposo con ellas.
  revised_footnotes: []
  revision_rationale: Se elimina la nota porque contradice la decisión textual auditada sobre 'nam'. También se ajusta 'Pues' a 'Porque' para reflejar con mayor claridad el valor explicativo del latín al inicio del versículo, sin cambiar el sentido general. El resto del texto se mantiene por ser fiel, claro y natural.
