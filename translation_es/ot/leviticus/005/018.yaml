  yaml_path: translation/ot/leviticus/005/018.yaml
  text: He shall bring to the priest a ram without blemish from the flock[a], according to your valuation, for a guilt offering; and the priest shall make atonement for him concerning the error that he committed unintentionally, though he did not know it[b], and he shall be forgiven.
