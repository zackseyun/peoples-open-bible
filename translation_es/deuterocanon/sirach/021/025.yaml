    text: Lit. «en estas cosas». Aquí se traduce «por estas cosas» para expresar el sentido contextual más probable.
    reason: lexical_alternative
  - marker: b
    text: La imagen de «serán puestas en una balanza» sugiere que los sabios hablan con juicio medido.
    reason: cultural_note
  revision_rationale: Se ajusta βαρυνθήσεται a un español más fiel e idiomático («quedarán cargados») para conservar la metáfora de ser hechos pesados por esas cosas, sin confundirla con la acción de pesar en balanza. También se suaviza la nota cultural para hacerla más natural en español.
