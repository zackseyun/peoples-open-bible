id: 2CO.5.17
reference: 2 Corinthians 5:17
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: ὥστε εἴ τις ἐν Χριστῷ, καινὴ κτίσις· τὰ ἀρχαῖα παρῆλθεν, ἰδοὺ γέγονεν ⸀καινά·
base_translation:
  language: en
  yaml_path: translation/nt/2_corinthians/005/017.yaml
  text: So then, if anyone is in Messiah, there is a new creation; the old things have passed away; behold, new things have come.
  footnotes:
  - marker: a
    text: 'Or, ''he is a new creation.'' The Greek is elliptical: literally, ''if anyone is in the Messiah—new creation.'''
    reason: alternative_reading
  - marker: b
    text: Many English translations read, 'all things have become new.' The SBLGNT text here reads simply 'new things have come,' without an explicit word for 'all things.'
    reason: textual_variant
translation:
  language: ko
  text: 그러므로 누구든지 메시아 안에 있으면 새로운 피조물입니다. 옛것은 지나갔으니, 보십시오, 새것이 되었습니다.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ἐν Χριστῷ
  english_pob_choice: in Messiah
  chosen_korean: 메시아 안에
  alternatives_korean: []
  lexicon: BDAG
  rationale: 바울의 핵심 정형구.
- source_word: καινὴ κτίσις
  english_pob_choice: new creation
  chosen_korean: 새로운 피조물
  alternatives_korean:
  - 새 창조
  lexicon: BDAG
  rationale: '본 어구의 모호성을 보존: (a) 그 사람이 새로운 피조물이다 (b) 새로운 창조 세계가 도래했다. 한국어 「새로운 피조물」은 두 해석을 모두 열어 둔다.'
theological_decisions:
- issue: 5:17 καινὴ κτίσις의 양의성 보존 — 새로운 사람 또는 새로운 창조
  chosen_reading: 메시아 안에 있으면 새로운 피조물입니다
  alternative_readings:
  - 그는 새로운 피조물이다 (개인의 변화)
  - 새 창조가 임했다 (우주적 종말의 시작)
  rationale: '바울의 표현은 의도적으로 모호하다: (a) 개인적 차원 — 그리스도 안에 있는 자는 새로운 존재가 된다, (b) 우주적·종말론적 차원 — 그리스도 안에서 새 창조 세계가 도래했다. 한국 전통 번역은 대체로 (a)로 좁혀 「새로운 피조물이라」로 옮겨 왔으나, 바울의 종말론적 차원도 살아 있다. 「새로운 피조물입니다」는 두 차원을 모두 열어 두며, 「새 창조가 임했다」로 환원하지 않는다. 영어 POB의 "there is a new creation"도 의도적으로 양의성을 보존한다.'
  doctrine_reference: DOCTRINE.md §1 source-primacy; preserve interpretive ambiguity
