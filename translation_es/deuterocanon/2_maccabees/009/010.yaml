translation:
  language: es
  text: Y nadie podía llevar al hombre que un poco antes había parecido tocar las estrellas del cielo[a], debido al peso insoportable del hedor.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «había creído poder tocar las estrellas del cielo». El griego puede sugerir tanto una exaltación aparente como una autoestimación presuntuosa.'
    reason: lexical_alternative
lexical_decisions:
- source_word: τὸν ... δοκοῦντα
  english_pob_choice: the man who ... had seemed
  chosen_spanish: el hombre que ... había parecido
  alternatives_spanish:
  - aquel que ... parecía
  - el que ... parecía
  lexicon: LSJ
  rationale: El participio articular funciona como sustantivo y se refiere a Antíoco. En español, «el hombre» mantiene la referencia personal de manera natural y conserva el matiz de apariencia expresado por δοκοῦντα con un verbo de percepción como «parecer».
- source_word: μικρῷ πρότερον
  english_pob_choice: a little earlier
  chosen_spanish: un poco antes
  alternatives_spanish:
  - poco antes
  - muy poco antes
  lexicon: LSJ
  rationale: La expresión indica un pasado reciente. «Un poco antes» reproduce bien la cercanía temporal sin volver la frase artificial.
- source_word: τῶν οὐρανίων ἄστρων
  english_pob_choice: the stars of heaven
  chosen_spanish: las estrellas del cielo
  alternatives_spanish:
  - las estrellas celestiales
  - las estrellas del firmamento
  lexicon: LSJ
  rationale: La imagen elevada se conserva con «del cielo», una formulación natural en español que mantiene el tono cósmico del griego sin sonar forzada.
- source_word: ἅπτεσθαι
  english_pob_choice: to touch
  chosen_spanish: tocar
  alternatives_spanish:
  - alcanzar
  - rozar
  lexicon: LSJ
  rationale: «Tocar» preserva la imagen literal y la hipérbole de exaltación aparente. «Alcanzar» suaviza demasiado el verbo y debilita el paralelismo con la ironía del contexto.
- source_word: παρακομίζειν
  english_pob_choice: to carry
  chosen_spanish: llevar
  alternatives_spanish:
  - transportar
  - conducir
  lexicon: LSJ
  rationale: El verbo expresa cargar o trasladar a alguien. «Llevar» es el equivalente más natural en español y conserva la idea de traslado físico.
- source_word: διὰ τὸ τῆς ὀσμῆς ἀφόρητον βάρος
  english_pob_choice: because of the unbearable burden of the stench
  chosen_spanish: debido al peso insoportable del hedor
  alternatives_spanish:
  - por el hedor insoportable
  - a causa de la carga insoportable del olor
  lexicon: LSJ
  rationale: Se conserva βάρος como «peso», porque el griego usa una metáfora de peso/carga para el olor opresivo. «Hedor» expresa mejor el valor desagradable de ὀσμή en este contexto que un neutral «olor».
theological_decisions:
- issue: Ironía hiperbólica sobre la antigua altivez de Antíoco
  english_pob_reading: had seemed to touch the stars of heaven
  chosen_spanish_reading: había parecido tocar las estrellas del cielo
  alternative_spanish_readings:
  - había creído tocar las estrellas del cielo
  - parecía poder tocar las estrellas del cielo
  rationale: La construcción griega con δοκοῦντα admite tanto apariencia como presunción; la versión española mantiene esa tensión con «había parecido», sin decidir en exceso entre ilusión externa o autoexaltación subjetiva.
  doctrine_reference: Preservar la tensión lexical y retórica sin resolverla interpretativamente
translation_notes:
  revision_awareness: No se aplicaron revisiones posteriores en el pasaje fuente; el auditor inglés marcó el texto como sin cambios y con alta concordancia, así que esta propuesta sigue de cerca el griego y el criterio ya validado en la POB inglesa.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma general del proyecto, pero este versículo no contiene el nombre divino.
  - Se conserva la imagen concreta de «peso» para βάρος y no se la reduce a una mera cláusula adjetival, siguiendo la decisión auditada en inglés.
  - «Hedor» refleja mejor la carga negativa de ὀσμή en este contexto narrativo que el más neutro «olor».
