translation:
  language: es
  text: Mejor es la vista de los ojos[a] que el vagar del alma[b]; también esto es vapor y perseguir el viento[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «lo que ven los ojos» en lugar de «la vista de los ojos».
    reason: lexical_alternative
  - marker: b
    text: O «el deseo» o «el apetito» para נָפֶשׁ; aquí el hebreo probablemente alude al yo que desea más que al alma en sentido inmortal.
    reason: lexical_alternative
  - marker: c
    text: O «un afán tras el viento».
    reason: lexical_alternative
lexical_decisions:
- source_word: טוֹב
  english_pob_choice: Better is
  chosen_spanish: Mejor es
  alternatives_spanish:
  - Es mejor
  - Bueno es
  lexicon: HALOT
  rationale: En una comparación implícita, el español natural y fiel es 'Mejor es', manteniendo el valor comparativo de טוֹב sin volverlo rígidamente literal.
- source_word: מַרְאֵה עֵינַיִם
  english_pob_choice: the sight of the eyes
  chosen_spanish: la mirada de los ojos
  alternatives_spanish:
  - lo que ven los ojos
  - la visión de los ojos
  lexicon: HALOT
  rationale: '''La mirada de los ojos'' conserva la imagen concreta del constructo y comunica percepción visual sin perder la fuerza del hebreo.'
- source_word: מֵהֲלָךְ
  english_pob_choice: than the wandering of
  chosen_spanish: que el andar de
  alternatives_spanish:
  - que el vagar de
  - que el ir de
  lexicon: HALOT
  rationale: El sustantivo derivado de הלך expresa movimiento/ir. 'Andar' mantiene la literalidad básica y suena natural en español; 'vagar' añade un matiz más interpretativo de inquietud.
- source_word: נָפֶשׁ
  english_pob_choice: the soul
  chosen_spanish: el alma
  alternatives_spanish:
  - el deseo
  - la vida
  - el ser
  lexicon: HALOT
  rationale: Aunque el contexto puede sugerir apetito o deseo, la revisión inglesa optó por 'soul' para reflejar más directamente נֶפֶשׁ. En español, 'alma' preserva esa amplitud semántica sin imponer la idea platónica de una entidad separada.
- source_word: הֶבֶל
  english_pob_choice: vapor
  chosen_spanish: vapor
  alternatives_spanish:
  - vanidad
  - aliento
  lexicon: HALOT
  rationale: '''Vapor'' reproduce la metáfora de fugacidad e insustancialidad y evita el desgaste interpretativo de ''vanidad''.'
- source_word: וּרְעוּת רוּחַ
  english_pob_choice: a chasing after wind
  chosen_spanish: una persecución del viento
  alternatives_spanish:
  - un perseguir el viento
  - un afán tras el viento
  lexicon: HALOT
  rationale: '''Persecución del viento'' conserva la imagen del idiomático hebreo como esfuerzo inútil. Es más sobrio que una paráfrasis y mantiene la tensión metafórica.'
theological_decisions:
- issue: Sentido de נֶפֶשׁ en Eclesiastés 6:9
  english_pob_reading: the soul, with a note that Hebrew may refer to craving or the desiring self rather than the immaterial soul
  chosen_spanish_reading: el alma, sin cerrar el alcance semántico de נֶפֶשׁ
  alternative_spanish_readings:
  - el deseo
  - el apetito
  - la persona interior
  rationale: La fuente inglesa revisada privilegia 'soul' pero reconoce la posible referencia al impulso deseante. En español, 'alma' permite mantener esa ambigüedad controlada sin reemplazarla por un término más reductivo.
  doctrine_reference: Ecclesiastes; lexical semantics of נֶפֶשׁ
- issue: Expresión idiomática final sobre רוח
  english_pob_reading: and a chasing after wind
  chosen_spanish_reading: una persecución del viento
  alternative_spanish_readings:
  - una búsqueda del viento
  - un afán tras el viento
  rationale: El hebreo presenta una imagen de actividad fútil. 'Persecución del viento' conserva la inutilidad proverbial sin añadir doctrinas ajenas al texto.
  doctrine_reference: Ecclesiastes; wisdom literature imagery
translation_notes:
  revision_awareness: El texto inglés auditado pasó de 'appetite' a 'soul' para נֶפֶשׁ, manteniendo la idea de contraste entre la satisfacción visible y el impulso inquieto. La versión española sigue esa revisión y conserva el cierre proverbial de הֶבֶל / רְעוּת רוּחַ como 'vapor' y 'persecución del viento'.
  spanish_consistency_notes:
  - Usé 'Yahvé' solo cuando el hebreo o el contexto lo exigirían; este versículo no lo contiene.
  - Mantuve un registro sobrio y bíblico, pero evité calcos como 'el ir del alma' o 'la visión de los ojos' que sonarían forzados en español.
  - '''Alma'' se eligió como equivalente funcional de נֶפֶשׁ en el contexto de Qohelet, sin pretender fijar una antropología filosófica.'
