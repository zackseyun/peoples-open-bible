  text: 'For this is the covenant that I will make with the house of Israel after those days[a], says the Lord: putting my laws into their minds, and I will write them on their hearts; and I will be their God, and they will be my people.'
  footnotes:
  - marker: a
    text: 'Or, more smoothly: ''I will put my laws into their mind, and I will write them on their hearts.'' The Greek has a participle (''putting/giving'') followed by a future verb (''I will write'').'
    reason: lexical_alternative
translation:
  language: ko
  text: 이것이 그 날들 후에 내가 이스라엘 집과 더불어 맺을 언약이다, 야훼께서 말씀하신다. 내가 나의 율법을 그들의 생각 속에 두고, 그들의 마음 위에 새기리라. 또 나는 그들의 하나님이 되고, 그들은 나의 백성이 되리라.
  philosophy: optimal-equivalence
