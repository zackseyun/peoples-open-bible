translation:
  language: es
  text: El que cubre[a] una ofensa busca amor, pero el que repite[b] un asunto separa a amigos íntimos[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «cubre una transgresión». El hebreo conserva la metáfora de cubrir en lugar de expresar explícitamente «perdonar».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «vuelve a mencionar un asunto» o «vuelve a sacar un asunto». La idea es reabrir un conflicto en vez de dejarlo en paz.'
    reason: lexical_alternative
  - marker: c
    text: 'Hebreo: «separa a un amigo íntimo» (singular); aquí el plural expresa de manera más natural en español el sentido genérico del proverbio.'
    reason: lexical_alternative
lexical_decisions:
- source_word: מְכַסֶּה
  english_pob_choice: covers over
  chosen_spanish: cubre
  alternatives_spanish:
  - cubre por encima de
  - encubre
  - cubre sobre
  lexicon: HALOT
  rationale: El hebreo conserva la metáfora de cubrir. En español, «cubre» comunica esa imagen de manera natural sin explicitar «perdona», que iría más allá del verbo de base. La preposición «sobre» o adverbios equivalentes resultan pesados; por eso se deja la metáfora sobria en el verbo.
- source_word: פֶּשַׁע
  english_pob_choice: an offense
  chosen_spanish: una ofensa
  alternatives_spanish:
  - una transgresión
  - una rebelión
  - una falta
  lexicon: HALOT
  rationale: En contexto sapiencial relacional, «ofensa» comunica bien un agravio interpersonal. Mantiene el peso moral del término hebreo sin imponer una formulación demasiado jurídica o eclesiástica.
- source_word: מְבַקֵּשׁ
  english_pob_choice: seeks
  chosen_spanish: busca
  alternatives_spanish:
  - procura
  - persigue
  - desea
  lexicon: HALOT
  rationale: El participio expresa búsqueda activa. «Busca» es la equivalencia directa y natural en español, y preserva el paralelismo moral del proverbio.
- source_word: אַהֲבָה
  english_pob_choice: love
  chosen_spanish: amor
  alternatives_spanish:
  - afecto
  - amistad
  lexicon: HALOT
  rationale: El sustantivo es amplio y no debe estrecharse de entrada a «amistad». «Amor» conserva la amplitud relacional y la fuerza del contraste poético.
- source_word: שֹׁנֶה
  english_pob_choice: repeats
  chosen_spanish: repite
  alternatives_spanish:
  - vuelve a mencionar
  - saca otra vez
  - retoma
  lexicon: HALOT
  rationale: El verbo significa repetir o hacer de nuevo. «Repite» es la opción más fiel y concisa para la idea de volver sobre el asunto en vez de dejarlo descansar.
- source_word: בְדָבָר
  english_pob_choice: a matter
  chosen_spanish: un asunto
  alternatives_spanish:
  - una palabra
  - un tema
  - la cuestión
  lexicon: HALOT
  rationale: דבר puede significar palabra, asunto o tema. Aquí la lógica del proverbio apunta a un asunto reabierto; «un asunto» suena natural en español y conserva la amplitud semántica.
- source_word: מַפְרִיד
  english_pob_choice: separates
  chosen_spanish: separa
  alternatives_spanish:
  - divide
  - aleja
  - rompe la relación entre
  lexicon: HALOT
  rationale: El causativo expresa producir separación. «Separa» es directo y no añade una especificación psicológica que el hebreo no exige.
- source_word: אַלּוּף
  english_pob_choice: close friends
  chosen_spanish: un amigo íntimo
  alternatives_spanish:
  - un compañero cercano
  - un allegado
  - un amigo cercano
  lexicon: HALOT
  rationale: אַלּוּף puede referirse a un allegado íntimo o compañero cercano. El singular hebreo se mantiene de forma más literal con «un amigo íntimo», mientras que el plural inglés del POB era un ajuste genérico para el lector; en español el singular funciona bien y conserva la forma del original.
theological_decisions:
- issue: ¿Explicitar el acto como «perdonar» en vez de conservar la metáfora de cubrir?
  english_pob_reading: Whoever covers over an offense seeks love
  chosen_spanish_reading: El que cubre una ofensa busca amor
  alternative_spanish_readings:
  - El que perdona una ofensa busca amor
  - El que encubre una ofensa busca amor
  rationale: El hebreo usa la imagen de cubrir, no un verbo explícito de perdón. La traducción conserva esa tensión metafórica. «Perdona» interpreta correctamente en un nivel teológico, pero borra la imagen textual; «encubre» podría sonar a ocultación culpable en español.
  doctrine_reference: Sabiduría bíblica sobre reconciliación, perdón y caridad fraterna; no se fuerza una terminología doctrinal externa al proverbio.
- issue: ¿Cómo reflejar אַלּוּף sin perder su singularidad ni convertirlo artificialmente en plural?
  english_pob_reading: separates close friends
  chosen_spanish_reading: separa a un amigo íntimo
  alternative_spanish_readings:
  - separa a amigos íntimos
  - separa a un compañero cercano
  - rompe la amistad íntima
  rationale: El hebreo presenta un singular que puede funcionar de manera genérica. Mantener el singular evita una pluralización no necesaria y preserva la forma del proverbio, sin perder el sentido relacional general.
  doctrine_reference: Principios de traducción poética bíblica y uso genérico del singular en proverbios hebreos.
translation_notes:
  revision_awareness: Se revisó el alineamiento con el texto hebreo de WLC y con el audit trail en inglés. No hubo cambios necesarios en la decisión de fondo; se mantuvo la metáfora de «cubrir» y el valor relacional de אַלּוּף. La única adaptación relevante es conservar en español el singular hebreo «un amigo íntimo», que resulta natural y más transparente que pluralizarlo.
  spanish_consistency_notes:
  - Se mantuvo la metáfora verbal de cubrir sin introducir «perdonar» en el texto principal.
  - Se evitó «SEÑOR» o terminología litúrgica ajena al versículo.
  - «Amor» se usó con su amplitud relacional, coherente con el paralelismo sapiencial.
  - El singular «un amigo íntimo» respeta el hebreo y sigue siendo idiomático en español.
  - Las notas a, b y c corresponden a alternativas lexicales reales del audit trail y aparecen ancladas en el texto principal.
