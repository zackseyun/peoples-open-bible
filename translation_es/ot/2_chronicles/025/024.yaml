  to: Y tomó todo el oro y la plata[a], y todos los utensilios hallados en la casa de Dios con Obed-edom, y los tesoros de la casa del rey, y rehenes[b], y volvió a Samaria.
  rationale: La única reparación necesaria es cambiar «los hijos de las prendas» por «rehenes» en el texto principal. Esto alinea el español con el sentido elegido y documentado por el POB inglés, mejora mucho la inteligibilidad en español neutral y conserva la literalidad hebrea en la nota, como corresponde a una dificultad léxica.
