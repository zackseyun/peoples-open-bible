translation:
  language: es
  text: Y por la acción del Soberano fue vencido[a] por un sopor[b] muy dulce y profundo, quedando muy frustrado en su propósito impío y completamente decepcionado en su resolución inmutable.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «quedó dominado» o «fue tomado». El griego expresa una pasividad fuerte: fue vencido o retenido por la acción eficaz del Soberano.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «estupor». La imagen griega es insólita: combina dulzura y profundidad con una acción divina que lo detiene o lo vence.'
    reason: lexical_alternative
lexical_decisions:
- source_word: δεσπότου
  english_pob_choice: the Sovereign
  chosen_spanish: el Soberano
  alternatives_spanish:
  - el Dueño
  - el Maestro
  - el Señor
  lexicon: LSJ
  rationale: δεσπότης designa una autoridad absoluta. «Soberano» conserva el matiz de dominio y evita confundirlo con κύριος, que en español suele traducirse como «Señor».
- source_word: ἐνεργείᾳ
  english_pob_choice: action
  chosen_spanish: acción
  alternatives_spanish:
  - obra
  - operación
  - trabajo eficaz
  lexicon: LSJ
  rationale: El sustantivo expresa el obrar eficaz de Dios. «Acción» es natural en español y mantiene la idea de eficacia sin tecnicismo excesivo.
- source_word: κατεσχέθη
  english_pob_choice: was overcome with / was seized with
  chosen_spanish: quedó sobrecogido
  alternatives_spanish:
  - fue sobrecogido
  - fue dominado
  - quedó retenido
  lexicon: LSJ
  rationale: El pasivo sugiere ser tomado o dominado por una fuerza. «Quedó sobrecogido» comunica el efecto de ser vencido/atrapado por la intervención divina sin perder la pasividad del verbo.
- source_word: ἥδιστῳ
  english_pob_choice: most sweet / most pleasant
  chosen_spanish: muy dulce
  alternatives_spanish:
  - sumamente agradable
  - muy placentero
  - dulcísimo
  lexicon: LSJ
  rationale: El superlativo de ἡδύς conserva una cualidad sensorial inusual en el contexto. «Muy dulce» preserva la metáfora y evita una explicación que la aplane.
- source_word: βαθεῖ
  english_pob_choice: deep
  chosen_spanish: profundo
  alternatives_spanish:
  - hondo
  - intenso
  - abismal
  lexicon: LSJ
  rationale: «Profundo» reproduce literalmente la imagen espacial y se combina bien con «sopor».
- source_word: ἀθέσμου
  english_pob_choice: lawless
  chosen_spanish: impío
  alternatives_spanish:
  - sin ley
  - ilegal
  - desordenado
  lexicon: LSJ
  rationale: En este contexto la intención es moral y religiosa, no meramente jurídica. «Impío» comunica la oposición a Dios y la falta de rectitud que el griego sugiere.
- source_word: προθέσεως
  english_pob_choice: purpose
  chosen_spanish: propósito
  alternatives_spanish:
  - plan
  - intención
  - designio
  lexicon: LSJ
  rationale: «Propósito» es claro y corresponde al objetivo que el personaje había resuelto llevar a cabo.
- source_word: πολὺ διεσφαλμένος
  english_pob_choice: greatly thwarted
  chosen_spanish: muy frustrado
  alternatives_spanish:
  - muy desbaratado
  - grandemente frustrado
  - muy desviado
  lexicon: LSJ
  rationale: La idea es que su intento quedó fallido o deshecho. «Muy frustrado» sigue de cerca la lectura del inglés POB y es idiomático en español.
- source_word: ἀμεταθέτου
  english_pob_choice: unchangeable
  chosen_spanish: inmutable
  alternatives_spanish:
  - inalterable
  - invariable
  - no mudable
  lexicon: LSJ
  rationale: El adjetivo indica lo que no cambia ni se mueve. «Inmutable» conserva la firmeza del término y suena natural en español formal.
- source_word: λογισμοῦ
  english_pob_choice: resolve
  chosen_spanish: resolución
  alternatives_spanish:
  - pensamiento
  - cálculo
  - criterio
  lexicon: LSJ
  rationale: Aquí no se trata solo de un pensamiento aislado, sino de una determinación asentada. «Resolución» mantiene el paralelismo con «propósito».
- source_word: μεγάλως διεψευσμένος
  english_pob_choice: utterly disappointed
  chosen_spanish: grandemente desmentido
  alternatives_spanish:
  - totalmente frustrado
  - completamente defraudado
  - ampliamente decepcionado
  lexicon: LSJ
  rationale: διαψεύδω puede implicar quedar desmentido o resultar falso en la expectativa. «Grandemente desmentido» conserva mejor la idea de que su resolución quedó refutada por los hechos, sin convertirla solo en una emoción subjetiva.
theological_decisions:
- issue: Título divino δεσπότης
  english_pob_reading: the Sovereign
  chosen_spanish_reading: el Soberano
  alternative_spanish_readings:
  - el Maestro
  - el Dueño
  - el Señor
  rationale: Se mantiene la distinción léxica de δεσπότης frente a κύριος. «El Soberano» preserva la autoridad absoluta sin borrar el matiz técnico del término.
  doctrine_reference: 'DOCTRINE.md: Translate titles; consistency of key terms, or documented exception.'
- issue: Imágenes inusuales de dulzura y profundidad aplicadas a la acción divina
  english_pob_reading: most pleasant and deep stupor / most sweet and deep working
  chosen_spanish_reading: un sopor muy dulce y profundo
  alternative_spanish_readings:
  - una dulzura profunda y agradable
  - un estado profundo y muy dulce
  - un sopor dulcísimo y profundo
  rationale: El griego combina ἥδιστῳ καὶ βαθεῖ con κατεσχέθη de forma metafórica e inusual. «Sopor» conserva la idea de un estado que vence o domina, mientras que «muy dulce y profundo» retiene la extrañeza del original y la intervención divina que restringe.
  doctrine_reference: 'DOCTRINE.md: Preserve source metaphors unless clearly impossible in the target language.'
translation_notes:
  revision_awareness: La traducción toma en cuenta la revisión reciente del inglés POB, que prefirió una lectura menos mecánica de κατεσχέθη con ἥδιστῳ καὶ βαθεῖ. En español, se evitó tanto una calca rígida de «constraint» como una explicación interpretativa excesiva. También se conservó el doble contraste entre el fracaso del propósito impío y el desmentido de la resolución inmutable, reflejando el avance editorial que mantuvo esas dos cláusulas como paralelas y distintas.
  spanish_consistency_notes:
  - Se usó «Soberano» para δεσπότης, coherente con el audito inglés y con la distinción frente a κύριος.
  - Se prefirió «propósito» y «resolución» para reproducir la diferencia entre πρόθεσις y λογισμός.
  - Se evitó traducir ἀμετάθετος como «inalterable» en el cuerpo principal para conservar «inmutable», más transparente y consistente con el tono bíblico-formal.
  - La frase «grandemente desmentido» mantiene la tensión semántica de διαψεύδω sin reducirla únicamente a «decepción».
