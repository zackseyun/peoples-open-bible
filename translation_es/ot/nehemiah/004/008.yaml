base_translation:
  language: en
  yaml_path: translation/ot/nehemiah/004/008.yaml
  text: Then I looked[a], rose up, and said to the nobles, to the officials, and to the rest of the people, “Do not be afraid of them. Remember the Lord, who is great and fearsome, and fight for your brothers, your sons, your daughters, your wives[b], and your houses.”
  footnotes:
  - marker: a
    text: Or “great and awesome.” The Hebrew adjective can denote what inspires awe or dread; “fearsome” is used here to preserve that stronger sense.
    reason: lexical_alternative
  - marker: b
    text: “Your brothers” translates a masculine plural kinship term. The verse then separately names sons, daughters, and wives.
    reason: lexical_alternative
