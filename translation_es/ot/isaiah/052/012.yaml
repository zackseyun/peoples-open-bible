    issue: La nota [a] está anclada a 'con prisa' pero ofrece alternativas para וּבִמְנוּסָה ('en fuga').
    rationale: En el POB inglés, la nota a aclara la segunda expresión ('in flight'), no la primera ('in haste'). Tal como está, la nota española crea desalineación entre ancla, fuente y contenido.
  - severity: medium
    issue: La nota [b] comenta 'Yahvé va delante de ustedes', pero el audit trail inglés usa esa nota para explicar וּמְאַסִּפְכֶם / 'is your rear guard'.
    rationale: La nota inglesa b preserva el valor más literal 'gathering you up from behind' y explica la función de protección trasera. La nota actual española omite ese matiz importante y lo sustituye por una observación no documentada sobre guía del camino.
