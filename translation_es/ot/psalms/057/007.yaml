translation:
  language: es
  text: Prepararon una red para mis pasos[a]; mi alma fue doblegada[b]; cavaron una fosa delante de mí[d]; cayeron en medio de ella[c]. Selah
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «trampa» para «red».
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «mi alma fue doblegada»; «mi alma» también puede significar «yo» o «mi vida».'
    reason: lexical_alternative
  - marker: c
    text: 'Literalmente: «cayeron en medio de ella».'
    reason: lexical_alternative
  - marker: d
    text: O «mi alma fue doblegada. Cavaron una fosa delante de mí».
    reason: previous_rendering
lexical_decisions:
- source_word: רֶשֶׁת
  english_pob_choice: net
  chosen_spanish: red
  alternatives_spanish:
  - trampa
  - lazo
  lexicon: HALOT
  rationale: רֶשֶׁת designa una red usada para atrapar. En español, «red» conserva la imagen concreta y directa del texto; «trampa» o «lazo» son posibles, pero menos literales.
- source_word: הֵכִינוּ
  english_pob_choice: prepared
  chosen_spanish: prepararon
  alternatives_spanish:
  - dispusieron
  - pusieron lista
  lexicon: HALOT
  rationale: El Hifil de כון expresa preparar o dejar listo. «Prepararon» reproduce bien la acción deliberada de tender la trampa sin añadir interpretación.
- source_word: לִפְעָמַי
  english_pob_choice: for my steps
  chosen_spanish: para mis pasos
  alternatives_spanish:
  - para mis pies
  - para mi camino
  lexicon: HALOT
  rationale: פעם puede referirse a paso o pie. «Para mis pasos» sigue de cerca la metáfora de la caminata y conserva el plural del hebreo.
- source_word: כָּפַף
  english_pob_choice: was bowed down
  chosen_spanish: fue humillada
  alternatives_spanish:
  - se inclinó
  - fue doblegada
  - estuvo abatida
  lexicon: HALOT
  rationale: El verbo significa doblar, inclinar, encorvar. En este contexto poético, la expresión habla del abatimiento de la persona del salmista; en español «mi alma fue humillada» comunica esa condición sin perder el matiz de rebajamiento, aunque reconoce una tensión con la imagen corporal original.
- source_word: נַפְשִׁי
  english_pob_choice: my soul
  chosen_spanish: mi alma
  alternatives_spanish:
  - yo
  - mi vida
  - mi ser
  lexicon: HALOT
  rationale: נֶפֶשׁ puede significar alma, vida o persona. «Mi alma» preserva la formulación antropológica hebrea y la tonalidad poética.
- source_word: כָּרוּ
  english_pob_choice: dug
  chosen_spanish: cavaron
  alternatives_spanish:
  - excavaron
  - abrieron
  lexicon: HALOT
  rationale: El verbo significa literalmente cavar. «Cavaron» es natural en español y mantiene el paralelismo con la fosa.
- source_word: לְפָנַי
  english_pob_choice: before me
  chosen_spanish: delante de mí
  alternatives_spanish:
  - ante mí
  - en frente de mí
  lexicon: HALOT
  rationale: La expresión indica ubicación delante del hablante. «Delante de mí» suena natural y mantiene el sentido espacial directo.
- source_word: שִׁיחָה
  english_pob_choice: pit
  chosen_spanish: fosa
  alternatives_spanish:
  - pozo
  - hoyo
  - foso
  lexicon: HALOT
  rationale: El sustantivo designa una excavación o hueco usado para atrapar. «Fosa» conserva la idea de una cavidad preparada para hacer caer a alguien y funciona bien en español bíblico contemporáneo.
- source_word: נָפְלוּ
  english_pob_choice: they fell
  chosen_spanish: cayeron
  alternatives_spanish:
  - han caído
  - se precipitaron
  lexicon: HALOT
  rationale: El perfecto narra el desenlace de la trampa. «Cayeron» es el equivalente más natural y conserva la reversión de la intención enemiga.
- source_word: בְתוֹכָהּ
  english_pob_choice: into the middle of it
  chosen_spanish: en medio de ella
  alternatives_spanish:
  - dentro de ella
  - en su interior
  - en su mismo centro
  lexicon: HALOT
  rationale: La frase significa literalmente «en/into su interior o mitad». «En medio de ella» preserva la ironía del texto y coincide con el registro formal de la revisión inglesa.
- source_word: סֶלָה
  english_pob_choice: Selah
  chosen_spanish: Selah
  lexicon: HALOT
  rationale: El término es incierto y probablemente musical o litúrgico; se translitera, como en la tradición de la POB en inglés, en lugar de forzar una traducción especulativa.
theological_decisions:
- issue: Mantenimiento de la imagen del alma como sujeto humillado/bajado
  english_pob_reading: my soul was bowed down
  chosen_spanish_reading: mi alma fue humillada
  alternative_spanish_readings:
  - mi alma se inclinó
  - mi alma fue doblegada
  - yo fui humillado
  rationale: El hebreo usa נַפְשִׁי con un verbo de encorvar/bajar. La POB inglesa conserva «my soul» para mantener la antropología poética; en español se preserva «mi alma» y se expresa el estado de abatimiento con «fue humillada», sin convertirlo en una lectura doctrinal distinta.
  doctrine_reference: Antropología bíblica poética; no se introduce una doctrina sistemática, solo se preserva la metáfora del texto.
translation_notes:
  revision_awareness: La versión inglesa más reciente unió las dos mitades paralelas con punto y coma y prefirió «midst» frente a «middle». La redacción española sigue esa estructura de una sola oración con paralelismo interno y usa «en medio de ella» para reflejar de cerca el hebreo y el ajuste de registro de la revisión final.
  spanish_consistency_notes:
  - Se mantuvo «Selah» sin traducir, por coherencia con el tratamiento estándar del marcador litúrgico.
  - Se prefirió «red» en el texto principal y se dejó «trampa» en nota, siguiendo la alternativa léxica documentada en el audit trail.
  - Se preservó el plural «pasos» para לִפְעָמַי, en consonancia con la elección inglesa.
  - La coordinación con punto y coma refleja la estructura poética del versículo y evita fragmentar indebidamente los dos hemistiquios.
