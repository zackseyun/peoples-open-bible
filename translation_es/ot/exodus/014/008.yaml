translation:
  language: es
  text: Yahvé endureció el corazón de Faraón, rey de Egipto, y él persiguió a los hijos de Israel, mientras los hijos de Israel salían con la mano en alto[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literalmente, «con mano alta». También puede traducirse «con mano alzada» o «con mano levantada»; la expresión puede conservar la imagen concreta o entenderse idiomáticamente como una salida valiente o triunfal.
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהֹוָה
  english_pob_choice: the LORD / Yahweh in source audit context
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: El proyecto pide renderizar el nombre divino YHWH como «Yahvé» en el texto principal. Esta forma conserva la referencia al nombre propio y evita la sustitución por un título enmascarado.
- source_word: וַיְחַזֵּק
  english_pob_choice: hardened
  chosen_spanish: endureció
  alternatives_spanish:
  - fortaleció
  - hizo firme
  lexicon: HALOT
  rationale: El verbo significa literalmente «hacer fuerte/firmar». En el motivo recurrente del corazón de Faraón, «endureció» comunica bien el efecto narrativo y conserva la tensión teológica; «fortaleció» queda como alternativa lexical viable.
- source_word: לֵב
  english_pob_choice: heart
  chosen_spanish: corazón
  alternatives_spanish:
  - mente
  - interior
  - resolución
  lexicon: HALOT
  rationale: «Corazón» es el equivalente natural en español para el asiento de voluntad y disposición al que alude el hebreo en este contexto.
- source_word: פַּרְעֹה מֶלֶךְ מִצְרַיִם
  english_pob_choice: Pharaoh king of Egypt
  chosen_spanish: Faraón, rey de Egipto
  alternatives_spanish:
  - Faraón, el rey de Egipto
  lexicon: HALOT
  rationale: Se conserva la cadena constructa de manera directa y natural en español, con la puntuación necesaria para legibilidad.
- source_word: וַיִּרְדֹּף אַחֲרֵי
  english_pob_choice: he pursued
  chosen_spanish: persiguió
  alternatives_spanish:
  - corrió tras
  - dio persecución a
  lexicon: HALOT
  rationale: «Persiguió» reproduce el sentido hostil y militar del verbo con אחרי y resulta idiomático en español.
- source_word: בְּנֵי יִשְׂרָאֵל
  english_pob_choice: the sons of Israel
  chosen_spanish: los hijos de Israel
  alternatives_spanish:
  - los hijos de Israel
  - los israelitas
  lexicon: HALOT
  rationale: Se mantiene la expresión más cercana al hebreo y al audit trail inglés, preservando su repetición retórica en el versículo.
- source_word: יֹצְאִים
  english_pob_choice: were going out
  chosen_spanish: salían
  alternatives_spanish:
  - estaban saliendo
  - iban saliendo
  lexicon: HALOT
  rationale: El participio en contexto expresa acción en curso; «salían» comunica ese valor imperfectivo de forma natural y fluida.
- source_word: בְּיָד רָמָה
  english_pob_choice: with a high hand
  chosen_spanish: con mano alta
  alternatives_spanish:
  - con mano levantada
  - con mano en alto
  - valientemente
  lexicon: HALOT
  rationale: Se preserva la imagen concreta del hebreo, siguiendo la revisión inglesa más reciente que favorece «high hand». «Con mano alta» es una equivalencia transparente en español y deja abierta la carga idiomática para nota.
theological_decisions:
- issue: Dios como agente del endurecimiento del corazón de Faraón
  english_pob_reading: And the LORD hardened the heart of Pharaoh
  chosen_spanish_reading: Yahvé endureció el corazón de Faraón
  alternative_spanish_readings:
  - Yahvé fortaleció el corazón de Faraón
  rationale: 'La traducción mantiene la atribución directa a Yahvé sin suavizarla. Esto conserva la tensión teológica del texto: el verbo puede leerse también como «fortaleció», pero el contexto narrativo favorece «endureció».'
  doctrine_reference: Conservar la tensión teológica del texto; no resolverla por atenuación lexical.
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión más reciente del inglés POB, que prefirió «with a high hand» sobre «with a raised hand». Por eso el español adopta «con mano alta» y deja las opciones idiomáticas en la nota, sin desactivar la imagen del original.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» para יְהֹוָה según el estándar del proyecto.
  - Se usa «hijos de Israel» para reflejar la forma hebrea masculina plural y su repetición enfática.
  - «Con mano alta» conserva la metáfora concreta del hebreo y no la reemplaza por una interpretación totalmente explicativa.
