translation:
  language: es
  text: 'Entonces dije al rey: «Si le place al rey[a], que se me den cartas para los gobernadores de Más Allá del Río[b], para que me dejen pasar[c] hasta que llegue a Judá».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Si le parece bien al rey».'
    reason: lexical_alternative
  - marker: b
    text: «Más Allá del Río» es el término administrativo persa para la región al oeste del Éufrates.
    reason: cultural_note
  - marker: c
    text: 'O: «para que me concedan paso».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וָאוֹמַר
  english_pob_choice: Then I said
  chosen_spanish: Entonces dije
  alternatives_spanish:
  - Y dije
  - Luego dije
  lexicon: HALOT
  rationale: La forma con waw consecutiva avanza la narración; «Entonces dije» conserva esa secuencia de manera natural en español.
- source_word: אִם עַל הַמֶּלֶךְ טוֹב
  english_pob_choice: If it pleases the king
  chosen_spanish: Si le place al rey
  alternatives_spanish:
  - Si le parece bien al rey
  - Si agrada al rey
  lexicon: HALOT
  rationale: Es una fórmula cortesana. «Le place» reproduce bien el matiz deferente y el valor idiomático que el inglés POB decidió fijar como lectura principal.
- source_word: אִגְּרוֹת
  english_pob_choice: letters
  chosen_spanish: cartas
  alternatives_spanish:
  - cartas oficiales
  - documentos
  lexicon: HALOT
  rationale: Aquí designa comunicaciones escritas expedidas con autoridad real; «cartas» es claro y fiel en español sin sobrecargar el término.
- source_word: יִתְּנוּ לִי
  english_pob_choice: let letters be given to me
  chosen_spanish: que se me den
  alternatives_spanish:
  - que me den
  - que sean dadas a mí
  lexicon: HALOT
  rationale: El pasivo de petición refleja bien la cortesía de la solicitud dirigida al rey.
- source_word: פַּחֲוֹת
  english_pob_choice: governors
  chosen_spanish: gobernadores
  alternatives_spanish:
  - gobernadores provinciales
  - funcionarios
  lexicon: HALOT
  rationale: Es el equivalente directo para los administradores persas de provincia; «gobernadores» mantiene la claridad y el registro histórico.
- source_word: עֵבֶר הַנָּהָר
  english_pob_choice: Beyond the River
  chosen_spanish: del Otro lado del Río
  alternatives_spanish:
  - Más allá del Río
  - al otro lado del Río
  lexicon: HALOT
  rationale: Conviene conservar la designación administrativa persa como nombre propio. La mayúscula interna marca su carácter regional, no solo direccional.
- source_word: אֲשֶׁר יַעֲבִירוּנִי
  english_pob_choice: so that they may let me pass through
  chosen_spanish: para que me dejen pasar
  alternatives_spanish:
  - para que me concedan paso
  - para que me permitan atravesar
  lexicon: HALOT
  rationale: El Hifil expresa hacer pasar/permitir pasar; «dejen pasar» comunica la autorización de tránsito con naturalidad en español.
- source_word: עַד אֲשֶׁר אָבוֹא
  english_pob_choice: until I come
  chosen_spanish: hasta que llegue
  alternatives_spanish:
  - hasta que venga
  - hasta que arribe
  lexicon: HALOT
  rationale: «Llegue» conserva el sentido temporal y suena idiomático en español moderno.
- source_word: יְהוּדָה
  english_pob_choice: Judah
  chosen_spanish: Judá
  alternatives_spanish:
  - Judea
  - la tierra de Judá
  lexicon: HALOT
  rationale: El nombre propio bíblico se traduce como «Judá»; «Judea» sería anacrónico aquí.
theological_decisions:
- issue: Fórmula cortesana dirigida al rey
  english_pob_reading: If it pleases the king
  chosen_spanish_reading: Si le place al rey
  alternative_spanish_readings:
  - Si le parece bien al rey
  - Si agrada al rey
  rationale: No hay carga doctrinal, pero sí una fórmula de respeto que conviene mantener como expresión de deferencia real sin suavizarla demasiado.
  doctrine_reference: N/A
translation_notes:
  revision_awareness: La redacción sigue la revisión más reciente del inglés POB, que prefirió la fórmula formal «If it pleases the king» frente a una paráfrasis más débil. También conserva la lectura administrativa de «Beyond the River» y el valor de autorización de tránsito en el verbo Hifil.
  spanish_consistency_notes:
  - Se mantiene «Judá» para יְהוּדָה, coherente con el topónimo bíblico.
  - Se usa «cartas» como equivalente de אִגְּרוֹת en un contexto real y administrativo.
  - Se conserva la mayúscula en «Otro lado del Río» para reflejar el nombre regional persa.
  - No se introduce «SEÑOR» ni terminología eclesiástica ajena al hebreo de este versículo.
