  - severity: low
    issue: Puntuación/vocativo algo rígidos
    rationale: «Oh tierra» es posible, pero «tierra» sin «oh» suena más natural en español contemporáneo y sigue siendo digno. Además, la oración ya queda suficientemente marcada con una sola pareja de signos de exclamación.
