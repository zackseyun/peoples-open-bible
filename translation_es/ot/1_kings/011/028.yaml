translation:
  language: es
  text: Ahora bien, Jeroboam era un hombre de gran capacidad[a], y Salomón vio que el joven era trabajador, por lo cual lo nombró encargado de toda la mano de obra de la casa de José[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: La expresión hebrea puede significar también «un hombre valeroso» o «un hombre valiente». Puede denotar fuerza, valor o capacidad notable; aquí se ha elegido «de gran capacidad» porque el contexto destaca su aptitud para responsabilidades.
    reason: lexical_alternative
  - marker: b
    text: «La casa de José» designa a las tribus descendientes de José, especialmente Efraín y Manasés.
    reason: cultural_note
lexical_decisions:
- source_word: וְהָאִישׁ
  english_pob_choice: Now the man
  chosen_spanish: Ahora bien, el hombre
  alternatives_spanish:
  - Y el hombre
  - Ahora el hombre
  lexicon: HALOT
  rationale: El וְ inicial avanza la narración; en español, «Ahora bien» comunica ese giro discursivo de introducción sin sonar forzado. «El hombre» conserva la referencia definida del hebreo.
- source_word: יָרָבְעָם
  english_pob_choice: Jeroboam
  chosen_spanish: Jeroboam
  alternatives_spanish:
  - Yeroboam
  lexicon: Convención transliterada
  rationale: Nombre propio transliterado de forma estándar al español bíblico, manteniendo identificabilidad intertextual.
- source_word: גִּבּוֹר חָיִל
  english_pob_choice: a mighty man of valor
  chosen_spanish: un hombre valeroso
  alternatives_spanish:
  - un hombre poderoso
  - un hombre capaz
  - un hombre valiente
  lexicon: HALOT
  rationale: La expresión hebrea puede abarcar fuerza, valor o capacidad notable. En español, «valeroso» conserva la idea de mérito y vigor personal sin imponer un sentido exclusivamente militar. No se opta por «capaz» porque reduciría demasiado la amplitud de la fórmula.
- source_word: וַיַּרְא
  english_pob_choice: saw
  chosen_spanish: vio
  alternatives_spanish:
  - advirtió
  - observó
  lexicon: HALOT
  rationale: «Vio» sigue de cerca el verbo básico ראה y deja que la cláusula siguiente explicite qué percibió Salomón.
- source_word: הַנַּעַר
  english_pob_choice: the young man
  chosen_spanish: el joven
  alternatives_spanish:
  - el muchacho
  - el joven hombre
  lexicon: HALOT
  rationale: Aquí la referencia es a un hombre joven apto para responsabilidad administrativa; «el joven» es natural en español y evita una infantilización de «muchacho».
- source_word: כִּי עֹשֵׂה מְלָאכָה הוּא
  english_pob_choice: that the young man was industrious
  chosen_spanish: que el joven era trabajador
  alternatives_spanish:
  - que el joven hacía trabajo
  - que era diligente
  - que el joven estaba trabajando
  lexicon: HALOT
  rationale: La frase hebrea expresa a alguien que está ocupado en trabajo, con matiz de diligencia. «Trabajador» comunica esa disposición práctica en español sin añadir más de lo que el texto garantiza. Se evita «diligente» por sonar más interpretativo y menos inmediato.
- source_word: וַיַּפְקֵד אֹתוֹ
  english_pob_choice: he appointed him
  chosen_spanish: lo puso sobre
  alternatives_spanish:
  - lo nombró
  - lo asignó
  - lo designó
  lexicon: HALOT
  rationale: פקד en este contexto tiene fuerza de poner a cargo/nombrar sobre una tarea. «Lo puso sobre» refleja bien la relación de supervisión implícita en el hebreo y encaja con la cláusula de cargo administrativo.
- source_word: לְכָל סֵבֶל
  english_pob_choice: over all the labor force
  chosen_spanish: sobre toda la mano de obra
  alternatives_spanish:
  - sobre todo el trabajo
  - sobre toda la carga laboral
  - sobre toda la labor
  lexicon: HALOT
  rationale: סֵבֶל apunta a trabajo de carga, labor de servicio o corvea; en este verso el audit trail ya evitó «forced labor» por no estar explícito. «Mano de obra» conserva el sentido colectivo de trabajadores/labor organizacional y evita introducir la nota de coerción que el hebreo aquí no marca de manera expresa.
- source_word: בֵּית יוֹסֵף
  english_pob_choice: the house of Joseph
  chosen_spanish: la casa de José
  alternatives_spanish:
  - la casa de José
  - la casa de Joseph
  lexicon: HALOT
  rationale: Se preserva la expresión tribal hebrea. En español bíblico, «casa de José» comunica tanto la unidad genealógica como la referencia a las tribus descendientes de José, sin anticipar una glosa en el texto principal.
translation_notes:
  revision_awareness: La revisión inglesa más reciente corrigió «forced labor» a «labor force» porque el hebreo de este verso habla de servicio/carga laboral sin marcar explícitamente coerción. La versión española sigue esa revisión y evita añadir una noción de forzamiento que no está lexicalmente asegurada en este punto.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como convención general del proyecto, pero este verso no contiene el tetragrámaton.
  - Se prefirió «hombre valeroso» frente a «mighty man of valor» literalizado, para sostener naturalidad española sin perder la amplitud semántica.
  - «Casa de José» se conserva como designación tribal estable.
  - Se evitó «siervo» o «esclavo» porque el sustantivo aquí es סֵבֶל y el propio audit trail inglés ya corrigió el exceso de coerción en esta línea.
