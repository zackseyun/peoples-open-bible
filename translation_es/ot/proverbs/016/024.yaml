translation:
  language: es
  text: Las palabras agradables son un panal[a], dulces al alma[b] y sanidad para los huesos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Las palabras agradables son miel en panal»; el hebreo presenta literalmente la imagen de «panal de miel» o «miel en panal».'
    reason: lexical_alternative
  - marker: b
    text: «Alma» aquí también puede entenderse como «vida», «ser interior» o «persona».
    reason: lexical_alternative
lexical_decisions:
- source_word: צוּף דְּבַשׁ
  english_pob_choice: a honeycomb
  chosen_spanish: un panal
  alternatives_spanish:
  - un panal de miel
  - miel del panal
  - miel en panal
  lexicon: HALOT
  rationale: El hebreo apunta a la imagen concreta de la miel en el panal, no solo a la miel como sustancia. En español, «un panal» preserva la imagen compacta y natural; el contexto de «dulces» deja clara la asociación con la miel.
- source_word: אִמְרֵי
  english_pob_choice: words
  chosen_spanish: las palabras
  alternatives_spanish:
  - los dichos
  - las sentencias
  - las expresiones
  lexicon: HALOT
  rationale: El plural constructo se refiere a palabras habladas. «Palabras» es la equivalencia más directa y clara en español para un proverbio de sabiduría.
- source_word: נֹעַם
  english_pob_choice: pleasant
  chosen_spanish: agradables
  alternatives_spanish:
  - amables
  - deliciosas
  - graciosas
  lexicon: HALOT
  rationale: El sustantivo expresa lo agradable, deleitable o placentero. En español, «agradables» funciona bien con «palabras» sin cargar innecesariamente el término con matices devocionales.
- source_word: מָתוֹק
  english_pob_choice: sweet
  chosen_spanish: dulces
  alternatives_spanish:
  - sabrosas
  - suaves
  - placenteras
  lexicon: HALOT
  rationale: El adjetivo hebreo es literalmente «dulce». Se conserva la metáfora sensorial para mantener el paralelismo con la imagen del panal.
- source_word: לַנֶּפֶשׁ
  english_pob_choice: to the soul
  chosen_spanish: al alma
  alternatives_spanish:
  - a la vida
  - al ser interior
  - a la persona
  lexicon: HALOT
  rationale: נֶפֶשׁ puede significar alma, vida, yo o ser interior. Aquí, el paralelismo con «huesos» favorece un contraste interior/corporal que en español se expresa de forma natural con «alma».
- source_word: וּמַרְפֵּא
  english_pob_choice: and healing
  chosen_spanish: y medicina
  alternatives_spanish:
  - y sanidad
  - y curación
  - y remedio
  lexicon: HALOT
  rationale: El sustantivo puede referirse a curación o remedio. En este proverbio, «medicina» comunica bien la función de sanar y mantiene el tono proverbial y concreto del hebreo.
- source_word: לָעָצֶם
  english_pob_choice: to the bones
  chosen_spanish: para los huesos
  alternatives_spanish:
  - a los huesos
  - para el cuerpo
  - al esqueleto
  lexicon: HALOT
  rationale: Aunque el hebreo usa el singular colectivo, en español el plural «huesos» es idiomático y preserva la imagen corporal del paralelismo poético.
theological_decisions:
- issue: Sentido de נֶפֶשׁ en un paralelismo sapiencial
  english_pob_reading: '''Soul'' here can also mean ''life,'' ''self,'' or ''inner being.'''
  chosen_spanish_reading: «alma» mantiene el valor antropológico abierto; también puede sugerir «vida» o «ser interior».
  alternative_spanish_readings:
  - «vida»
  - «ser interior»
  - «persona»
  rationale: No se debe cerrar la polisemia de נֶפֶשׁ. En español, «alma» es la opción más natural y solemne, pero la nota preserva las alternativas semánticas documentadas por la POB en inglés.
  doctrine_reference: Antropología bíblica / semántica de נֶפֶשׁ
- issue: Imagen corporal de 'huesos' como metonimia de la persona
  english_pob_reading: and healing to the bones
  chosen_spanish_reading: «medicina para los huesos» conserva la metáfora corporal y su fuerza poética.
  alternative_spanish_readings:
  - «sanidad para el cuerpo»
  - «remedio para los huesos»
  rationale: El hebreo usa «huesos» como imagen del cuerpo entero o del vigor físico. No conviene sustituirla por un término más explicativo, porque se perdería el paralelismo entre interioridad y corporeidad.
  doctrine_reference: Poética hebrea / antropología corporal
translation_notes:
  revision_awareness: El borrador sigue de cerca el estado inglés más reciente, que quedó sin cambios tras la última revisión (high_agreement, sin modificaciones). Se mantuvo la imagen concreta de צוּף דְּבַשׁ como panal/honeycomb, la polisemia de נֶפֶשׁ, y el paralelo corporal de «huesos» sin suavizarlo.
  spanish_consistency_notes:
  - Se usa «palabras» para אִמְרֵי, en continuidad con la decisión inglesa de no sobrecargar con «dichos» salvo necesidad contextual.
  - Se evita «SEÑOR» porque el versículo no contiene el nombre divino ni un equivalente de κύριος.
  - Se mantiene un registro sapiencial claro y publicable, con metáfora sensorial preservada en español natural.
