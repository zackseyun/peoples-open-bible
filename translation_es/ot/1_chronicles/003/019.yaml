translation:
  language: es
  text: 'Los hijos de Pedaías: Zorobabel y Simi. Y los hijos de Zorobabel[a]: Mesulam y Hananías; y Selomit fue hermana de ellos.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'El hebreo dice en singular: ''el hijo de Zorobabel''. Como luego se nombran Mesulam y Hananías, el sentido genealógico puede entenderse colectivamente o como una irregularidad textual; por eso el texto principal dice ''los hijos de Zorobabel''.'
    reason: textual_variant
lexical_decisions:
- source_word: וּבְנֵי
  english_pob_choice: The sons of
  chosen_spanish: Los hijos de
  alternatives_spanish:
  - Y los hijos de
  - Los descendientes de
  lexicon: HALOT
  rationale: En una genealogía, בנים se entiende de manera natural como hijos; en español, 'hijos de' mantiene el sentido genealógico con naturalidad. Se omite la coordinación inicial explícita en el arranque, porque en español la frase funciona mejor como encabezado genealógico.
- source_word: פְדָיָה
  english_pob_choice: Pedaiah
  chosen_spanish: Pedaías
  alternatives_spanish:
  - Pedaía
  lexicon: Transliteración estándar
  rationale: Nombre propio transliterado al español. 'Pedaías' conserva mejor la adaptación gráfica habitual en español bíblico sin alterar la identidad del nombre.
- source_word: זְרֻבָּבֶל
  english_pob_choice: Zerubbabel
  chosen_spanish: Zorobabel
  alternatives_spanish:
  - Zerubabel
  - Zorobabel
  lexicon: Transliteración estándar
  rationale: Nombre propio bíblico adaptado a la forma española más reconocible y establecida, 'Zorobabel'.
- source_word: וְשִׁמְעִי
  english_pob_choice: and Shimei
  chosen_spanish: y Simi
  alternatives_spanish:
  - y Simei
  - y Semei
  lexicon: Transliteración estándar
  rationale: Nombre propio adaptado al español como 'Simi', conservando la referencia nominal sin anglicismo.
- source_word: וּבֶן זְרֻבָּבֶל
  english_pob_choice: And the sons of Zerubbabel
  chosen_spanish: Y los hijos de Zorobabel
  alternatives_spanish:
  - Y el hijo de Zorobabel
  - Y el hijo/los hijos de Zorobabel
  lexicon: HALOT
  rationale: El hebreo consonántico tiene el singular 'hijo', pero el contexto nombra dos varones y una hermana. Siguiendo el juicio auditado de la POB inglesa, el plural en el texto principal refleja el sentido genealógico coherente en español.
- source_word: מְשֻׁלָּם
  english_pob_choice: Meshullam
  chosen_spanish: Mesulam
  alternatives_spanish:
  - Mesullam
  - Mesulam
  lexicon: Transliteración estándar
  rationale: Nombre propio transliterado al español. 'Mesulam' es una adaptación natural y legible en español bíblico.
- source_word: וַחֲנַנְיָה
  english_pob_choice: and Hananiah
  chosen_spanish: y Hananías
  alternatives_spanish:
  - y Ananías
  lexicon: Transliteración estándar
  rationale: Nombre propio adaptado al español como 'Hananías', forma frecuente y clara en español bíblico.
- source_word: וּשְׁלֹמִית
  english_pob_choice: and Shelomith
  chosen_spanish: y Selomit
  alternatives_spanish:
  - y Selomit
  - y Salomit
  lexicon: Transliteración estándar
  rationale: Nombre propio femenino adaptado al español como 'Selomit', preservando la forma del hebreo sin forzar una equivalencia ajena al nombre.
- source_word: אֲחוֹתָם
  english_pob_choice: was their sister
  chosen_spanish: era su hermana
  alternatives_spanish:
  - su hermana
  - era la hermana de ellos
  lexicon: HALOT
  rationale: El hebreo es una cláusula nominal sin verbo expreso; en español, 'era su hermana' suple el verbo copulativo de manera idiomática y mantiene el parentesco plural ('su').
theological_decisions:
- issue: Irregularidad textual/genealógica en 'בן' singular frente a dos hijos nombrados
  english_pob_reading: The POB English main text reads 'the sons of Zerubbabel,' while noting the Hebrew singular 'the son of Zerubbabel' and explaining it as textual irregularity or collective/genealogical usage.
  chosen_spanish_reading: El texto principal dice 'los hijos de Zorobabel' y la nota explica que el hebreo tiene el singular 'el hijo de Zorobabel', aunque el contexto nombra dos varones y una hermana.
  alternative_spanish_readings:
  - Y el hijo de Zorobabel
  - Y los descendientes de Zorobabel
  rationale: Se conserva la tensión documentada entre el singular hebreo y el plural contextual, sin ocultarla. El plural en el texto principal ofrece una lectura coherente con la lista posterior, mientras la nota mantiene la alternativa textual.
  doctrine_reference: Crítica textual y lectura genealógica del AT
translation_notes:
  revision_awareness: 'Coincide con el audit trail en la decisión central: el hebreo presenta una irregularidad en וּבֶן זְרֻבָּבֶל, y la POB inglesa opta por el plural en la línea principal con nota explicativa. No se registran revisiones posteriores que cambien esa decisión.'
  spanish_consistency_notes:
  - Se mantuvo 'Zorobabel' de forma uniforme en todo el versículo.
  - Se usó 'hijos' en la línea principal y se preservó la singularidad hebrea solo en la nota.
  - Los nombres propios se adaptaron a formas españolas transparentes y consistentes.
