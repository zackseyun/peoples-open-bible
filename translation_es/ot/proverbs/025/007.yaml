translation:
  language: es
  text: 'Porque mejor es que se te diga[a]: «Sube acá», a que te humillen[b] ante un noble, a quien han visto tus ojos[c].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: La expresión «que se te diga» refleja el hebreo impersonal, sin especificar quién habla.
    reason: lexical_alternative
  - marker: b
    text: O, más literalmente, «a que seas rebajado» o «a que te pongan más abajo». El verbo hebreo puede destacar una disminución de rango o posición, con la vergüenza social que el contexto implica.
    reason: lexical_alternative
  - marker: c
    text: «A quien han visto tus ojos» conserva la imagen hebrea; algunas versiones la simplifican a «a quien has visto».
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  lexicon: HALOT
  rationale: Introduce la razón de la sentencia anterior; «porque» conserva el valor explicativo causal de כִּי en español natural y de registro digno.
- source_word: טוֹב
  english_pob_choice: better
  chosen_spanish: mejor
  alternatives_spanish:
  - más bueno
  lexicon: HALOT
  rationale: El comparativo exige una forma comparativa en español; «mejor» reproduce la relación «... que ...» sin forzar un calco.
- source_word: אֲמָר לְךָ
  english_pob_choice: that it be said to you
  chosen_spanish: que se te diga
  alternatives_spanish:
  - que te digan
  - que te sea dicho
  lexicon: HALOT
  rationale: La forma impersonal/pasiva del hebreo se refleja con una pasiva pronominal natural en español, manteniendo que no se especifica el hablante.
- source_word: עֲלֵה הֵנָּה
  english_pob_choice: Come up here
  chosen_spanish: Sube acá
  alternatives_spanish:
  - Sube aquí
  - Ven acá arriba
  lexicon: HALOT
  rationale: El imperativo con adverbio deíctico señala ascenso y mejor posición social; «sube acá» suena natural y conserva el movimiento ascendente.
- source_word: מֵהַשְׁפִּילְךָ
  english_pob_choice: than that you be humbled
  chosen_spanish: que ser humillado[a]
  alternatives_spanish:
  - que ser abatido
  - que ser puesto abajo
  lexicon: HALOT
  rationale: El hifil de שׁפל indica ser rebajado o puesto en una posición inferior ante otros; «humillado» comunica la rebaja pública y el deshonor del contexto cortesano. Se mantiene la nota para la alternativa más literal relacionada con «rebajado/puesto abajo».
- source_word: לִפְנֵי
  english_pob_choice: before
  chosen_spanish: delante de
  alternatives_spanish:
  - en presencia de
  - ante
  lexicon: HALOT
  rationale: «Delante de» expresa con claridad el escenario público y visible; funciona bien con el tono formal del proverbio.
- source_word: נָדִיב
  english_pob_choice: a nobleman
  chosen_spanish: un noble
  alternatives_spanish:
  - un nobleman
  - un príncipe
  - un magnate
  lexicon: HALOT
  rationale: נָדִיב denota una persona de alto rango; «noble» es idiomático en español y no sobreactúa la jerarquía política.
- source_word: אֲשֶׁר רָאוּ עֵינֶיךָ
  english_pob_choice: whom your eyes have seen
  chosen_spanish: a quien han visto tus ojos[b]
  alternatives_spanish:
  - a quien tú has visto
  - que has visto
  lexicon: HALOT
  rationale: Se conserva la imagen hebrea vívida de «tus ojos han visto», que la POB inglesa también retuvo por su fuerza expresiva.
theological_decisions:
- issue: Jerarquía social y humillación pública como sabiduría proverbial
  english_pob_reading: The verse contrasts being invited upward with being humbled before a nobleman, preserving the social-shame force of the Hebrew.
  chosen_spanish_reading: El versículo contrasta una invitación a subir con ser humillado delante de un noble, manteniendo la fuerza de deshonra pública del hebreo.
  alternative_spanish_readings:
  - ser rebajado delante de un noble
  - ser puesto abajo delante de un noble
  rationale: 'No hay una cuestión doctrinal controvertida, pero sí una tensión semántica: el texto no habla solo de un cambio de lugar, sino de una rebaja social visible. La traducción elegida conserva esa dimensión de vergüenza pública sin perder la imagen de ascenso literal/social.'
  doctrine_reference: Sabiduría proverbial; humillación/altivez en literatura sapiencial (cf. Pr 15:33; 18:12).
translation_notes:
  revision_awareness: El borrador inglés revisado cambió «humiliated» por «humbled» para acercarse más al valor léxico del hebreo y mantener un registro formal. La versión española sigue esa revisión al preferir «humillado» solo en el sentido de rebaja pública, no como una emoción interna, y mantiene la nota de alternativa más literal («rebajado/puesto abajo»).
  spanish_consistency_notes:
  - Se usó «Yahvé» por defecto solo cuando el texto lo requiriera; este versículo no contiene el nombre divino.
  - Se eligió «noble» para נָדִיב por ser natural en español y suficiente para el rango social del proverbio.
  - Se mantuvo el paralelismo comparativo con «mejor... que...», sin suavizar la tensión social del contraste.
  - La nota [b] se ancla en la expresión hebrea conservada; no se simplificó a «a quien has visto» para preservar la vividez del hebreo.
