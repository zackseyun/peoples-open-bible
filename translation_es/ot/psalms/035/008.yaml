  - marker: b
    text: The final 'in it' may refer to the net he hid, emphasizing that he is caught in his own trap; some take it with 'destruction,' yielding 'let him fall into destruction.'
    reason: alternative_reading
  - marker: c
    text: Or 'into destruction let him fall in it.'.
    reason: previous_rendering
