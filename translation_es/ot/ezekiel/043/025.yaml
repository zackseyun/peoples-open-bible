translation:
  language: es
  text: Por siete días ofrecerás cada día un macho cabrío como ofrenda por el pecado, y ofrecerán[a] un toro, un becerro del ganado[b], y un carnero del rebaño, sin defecto.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El hebreo cambia de singular («ofrecerás») a plural («ofrecerán»). Esta traducción conserva ese cambio en vez de suavizarlo.
    reason: alternative_reading
  - marker: b
    text: Hebreo literalmente, «un toro, un hijo de ganado vacuno». Es una expresión sacrificial estable; muchas versiones la suavizan como «un novillo» o «un toro del ganado».
    reason: lexical_alternative
lexical_decisions:
- source_word: שִׁבְעַת יָמִים
  english_pob_choice: For seven days
  chosen_spanish: Por siete días
  alternatives_spanish:
  - Siete días
  lexicon: HALOT
  rationale: La construcción hebrea expresa duración; en español, «Por siete días» comunica con naturalidad la extensión temporal sin perder el valor aspectual del original.
- source_word: תַּעֲשֶׂה
  english_pob_choice: you shall offer
  chosen_spanish: ofrecerás
  alternatives_spanish:
  - harás
  - prepararás
  lexicon: HALOT
  rationale: En contexto sacrificial, עשה no se traduce de forma mecánica como «hacer», sino como realizar/ofrecer el sacrificio. «Ofrecerás» preserva el sentido cultual de forma clara en español.
- source_word: שְׂעִיר חַטָּאת
  english_pob_choice: a goat as a sin offering
  chosen_spanish: un macho cabrío como ofrenda por el pecado
  alternatives_spanish:
  - un macho cabrío para ofrenda por el pecado
  - un macho cabrío como sacrificio por el pecado
  lexicon: HALOT
  rationale: שְׂעִיר designa un macho cabrío; «macho cabrío» conserva mejor la fuerza léxica que solo «cabra». חַטָּאת en este contexto es la ofrenda sacrificial, no el pecado abstracto, por eso se traduce «ofrenda por el pecado».
- source_word: לַיּוֹם
  english_pob_choice: each day
  chosen_spanish: cada día
  alternatives_spanish:
  - diariamente
  - por cada día
  lexicon: HALOT
  rationale: La frase indica repetición durante los siete días. «Cada día» es la forma más directa y natural en español, equivalente al valor distributivo del hebreo.
- source_word: וּפַר בֶּן בָּקָר
  english_pob_choice: a bull, a son of the herd
  chosen_spanish: un toro, un hijo de vacada
  alternatives_spanish:
  - un toro, un novillo
  - un toro del ganado vacuno
  lexicon: HALOT
  rationale: Se conserva la expresión hebrea literal que el inglés POB también retuvo. «Hijo de vacada» refleja el giro idiomático בֶּן בָּקָר y mantiene la tensión lexical documentada, aunque suene menos usual que «novillo».
- source_word: וְאַיִל מִן הַצֹּאן
  english_pob_choice: and a ram from the flock
  chosen_spanish: y un carnero del rebaño
  alternatives_spanish:
  - y un carnero de entre el rebaño
  - y un carnero de la ovejada
  lexicon: HALOT
  rationale: אַיִל es «carnero». מִן הַצֹּאן se expresa naturalmente como «del rebaño», manteniendo la referencia a la clase de animales sin sobrecargar la frase.
- source_word: תְּמִימִים
  english_pob_choice: without blemish
  chosen_spanish: sin defecto
  alternatives_spanish:
  - sin mancha
  - sin tacha
  - perfectos
  lexicon: HALOT
  rationale: En lenguaje sacrificial, תמים indica animales aptos, sin defecto físico. «Sin defecto» es claro, sobrio y cultualmente preciso en español.
- source_word: יַעֲשׂוּ
  english_pob_choice: they shall offer
  chosen_spanish: ofrecerán
  alternatives_spanish:
  - harán
  - prepararán
  lexicon: HALOT
  rationale: Como en תַּעֲשֶׂה, el verbo en contexto sacrificial significa ofrecer/realizar la ofrenda. Se conserva además el cambio de sujeto del hebreo con un plural explícito en español.
theological_decisions:
- issue: Cambio de sujeto gramatical dentro de las instrucciones sacrificiales
  english_pob_reading: Preserve the Hebrew shift from second person singular ('you shall offer') to third person plural ('they shall offer') in the main text.
  chosen_spanish_reading: Preservar el cambio hebreo de segunda persona singular («ofrecerás») a tercera persona plural («ofrecerán») en el texto principal.
  alternative_spanish_readings:
  - 'Uniformar ambas cláusulas en singular: «ofrecerás ... y ofrecerás ...»'
  - 'Uniformar ambas cláusulas en plural: «ofrecerán ... y ofrecerán ...»'
  rationale: El hebreo distingue claramente תַּעֲשֶׂה y יַעֲשׂוּ. Como no hay motivo doctrinal para armonizar la forma, se conserva la transición de sujeto para respetar el texto fuente y su posible tensión implícita sobre quién ejecuta cada parte del rito.
  doctrine_reference: Principios POB de primacía del texto fuente y no suavizar tensiones documentadas
translation_notes:
  revision_awareness: El borrador sigue de cerca el paquete fuente hebreo y el registro auditado en inglés. Se conserva la estructura sacrificial, la repetición distributiva de «por siete días / cada día», la expresión literal de בֶּן בָּקָר y el cambio de persona verbal de singular a plural sin armonizarlo.
  spanish_consistency_notes:
  - Se usa «Yahvé» por defecto cuando el Tetragrámaton no aparece explícitamente en este versículo.
  - Se mantiene «ofrenda por el pecado» para חַטָּאת, conforme al valor sacrificial del término.
  - Se evita «SEÑOR» como sustituto del nombre divino porque este versículo no lo exige.
  - «Sin defecto» preserva el lenguaje cultual estándar sin introducir una interpretación adicional.
