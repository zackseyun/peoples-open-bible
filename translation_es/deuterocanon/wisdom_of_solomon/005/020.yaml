translation:
  language: es
  text: Afilará la severa ira hasta hacerla espada, y el mundo librará batalla con él contra los insensatos[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «contra los necios». El término griego se refiere a quienes actúan de modo irracional o moralmente pervertido en su oposición a Dios, no necesariamente a una enfermedad mental en sentido clínico.
    reason: lexical_alternative
lexical_decisions:
- source_word: ὀξυνεῖ
  english_pob_choice: will sharpen
  chosen_spanish: afilará
  alternatives_spanish:
  - aguzará
  - hará más aguda
  lexicon: LSJ
  rationale: El verbo griego expresa la acción de volver agudo; en español, «afilará» comunica de manera natural la imagen de arma sin perder la metáfora.
- source_word: ἀπότομον
  english_pob_choice: severe
  chosen_spanish: severa
  alternatives_spanish:
  - fiera
  - áspera
  - intensa
  lexicon: LSJ
  rationale: El adjetivo modifica a «ira» con un matiz de dureza e intensidad. «Severa» conserva el tono formal y la fuerza judicial del pasaje sin sonar forzado.
- source_word: ὀργὴν
  english_pob_choice: wrath
  chosen_spanish: ira
  alternatives_spanish:
  - furor
  - enojo
  lexicon: LSJ
  rationale: En español «ira» mantiene el registro elevado y la carga judicial que el inglés POB quiso preservar con «wrath».
- source_word: εἰς ῥομφαίαν
  english_pob_choice: into a sword
  chosen_spanish: en una espada
  alternatives_spanish:
  - para una espada
  - como espada
  lexicon: LSJ
  rationale: La preposición griega marca resultado o transformación; «en una espada» transmite que la ira es convertida metafóricamente en arma.
- source_word: συνεκπολεμήσει
  english_pob_choice: will join battle with him
  chosen_spanish: librará batalla con él
  alternatives_spanish:
  - combatirá junto con él
  - peleará junto con él
  lexicon: LSJ
  rationale: El compuesto indica participar conjuntamente en la guerra. «Librará batalla con él» conserva la idea de acción militar compartida en español natural.
- source_word: ὁ κόσμος
  english_pob_choice: the world
  chosen_spanish: el mundo
  alternatives_spanish:
  - la creación
  - el orden creado
  lexicon: LSJ
  rationale: «El mundo» es la traducción directa y clara de κόσμος en este contexto cósmico y judicial.
- source_word: ἐπὶ τοὺς παράφρονας
  english_pob_choice: against the senseless
  chosen_spanish: contra los insensatos
  alternatives_spanish:
  - contra los faltos de juicio
  - contra los necios
  lexicon: LSJ
  rationale: παράφρων refiere a quienes carecen de juicio o están moralmente desordenados. «Insensatos» preserva la fuerza polémica sin sugerir enfermedad clínica.
theological_decisions:
- issue: Referente de αὐτῷ ('con él')
  english_pob_reading: The world joins battle with God, implied from the surrounding context of divine judgment.
  chosen_spanish_reading: El mundo libra batalla con Dios, implícito por el contexto del juicio divino.
  alternative_spanish_readings:
  - El mundo libra batalla con el justo por extensión del juicio divino
  rationale: La referencia implícita del pronombre queda abierta en el texto, pero el contexto inmediato favorece a Dios como antecedente. En español se mantiene «con él» para no añadir un sujeto explícito que el griego no da aquí.
  doctrine_reference: Preservar la tensión contextual sin resolverla excesivamente.
translation_notes:
  revision_awareness: Se corrigió el problema de validación anterior asegurando que el marcador de nota [a] aparezca exactamente en el texto español donde corresponde.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como término divino por defecto solo cuando aparezca el Tetragrámaton; en este versículo no aparece.
  - «Ira» se usa para conservar el tono elevado de ὀργή sin caer en un coloquialismo.
  - La imagen bélica de ῥομφαία se conserva con «espada» para legibilidad bíblica en español.
  - Se evitó toda alusión clínica en la traducción de παράφρονας, siguiendo la advertencia del audit trail inglés.
