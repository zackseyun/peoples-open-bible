    rationale: La POB inglesa documenta que en el contexto de Ester se trata específicamente del anillo de sello real. 'Anillo' no es falso, pero pierde una función semántica importante que el expediente decidió hacer explícita.
  - severity: medium
    issue: La nota al pie está anclada al término menos necesitado y no preserva la alternativa documentada para בֵּית הָמָן.
    rationale: El inglés usa nota para 'house of Haman' con alternativas 'household/estate'. En español, una nota similar ayuda a preservar el rango semántico de בַּיִת en este contexto narrativo-administrativo.
  - severity: low
    issue: '''Puso a Mardoqueo sobre'' es algo literal.'
    rationale: Es fiel al hebreo, pero 'nombró' o 'puso a cargo de' sería más idiomático. No obstante, no exige reescritura mayor si se mantiene la cercanía formal.
