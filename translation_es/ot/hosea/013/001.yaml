translation:
  language: es
  text: Cuando Efraín hablaba, había temblor; fue exaltado en Israel[a]. Pero se hizo culpable por Baal[b] y murió.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: “se hizo prominente en Israel” o “se exaltó en Israel”. El hebreo es breve y puede leerse de manera pasiva/resultativa o activa-reflexiva.'
    reason: alternative_reading
  - marker: b
    text: “Por Baal” también puede entenderse como “por medio del culto a Baal” o “en/con Baal”.
    reason: lexical_alternative
lexical_decisions:
- source_word: כְּדַבֵּר
  english_pob_choice: When ... spoke
  chosen_spanish: Cuando ... hablaba
  alternatives_spanish:
  - Al hablar
  - Cuando ... habló
  lexicon: HALOT
  rationale: La construcción temporal con כ + infinitivo se expresa con naturalidad en español como “cuando hablaba”. El imperfecto “hablaba” conserva el valor de marco temporal continuo y evita un giro demasiado mecánico.
- source_word: אֶפְרַיִם
  english_pob_choice: Ephraim
  chosen_spanish: Efraín
  alternatives_spanish:
  - Efraím
  lexicon: HALOT
  rationale: Se mantiene el nombre propio transliterado. “Efraín” es la forma más natural y reconocible en español bíblico; no se amplía a “el reino del norte” en el texto principal porque el hebreo conserva el nombre.
- source_word: רְתֵת
  english_pob_choice: trembling
  chosen_spanish: temblor
  alternatives_spanish:
  - temblorosa agitación
  - temblor/temor
  lexicon: HALOT
  rationale: El sustantivo puede expresar temblor, estremecimiento o alarma. “Temblor” conserva la imagen breve y fuerte sin precisar indebidamente si se trata de miedo, asombro o conmoción política.
- source_word: נָשָׂא הוּא בְּיִשְׂרָאֵל
  english_pob_choice: he was exalted in Israel
  chosen_spanish: fue exaltado en Israel
  alternatives_spanish:
  - fue levantado en Israel
  - se hizo prominente en Israel
  - se exaltó en Israel
  lexicon: HALOT
  rationale: La revisión inglesa prefirió la lectura pasiva/resultativa, y en español “fue exaltado” reproduce bien esa posibilidad sin perder la ambigüedad del hebreo terse. Se evita resolverla como reflexiva en el texto principal.
- source_word: וַיֶּאְשַׁם
  english_pob_choice: he became guilty
  chosen_spanish: se hizo culpable
  alternatives_spanish:
  - incurrió en culpa
  - quedó culpable
  lexicon: HALOT
  rationale: El verbo אשם indica incurrir en culpa o hacerse culpable. “Se hizo culpable” conserva la fuerza moral y el movimiento del relato sin añadir una explicación interpretativa.
- source_word: בַּבַּעַל
  english_pob_choice: through Baal
  chosen_spanish: por Baal
  alternatives_spanish:
  - a través de Baal
  - mediante Baal
  - por medio de Baal
  lexicon: HALOT
  rationale: El valor de ב aquí es instrumentativo o asociativo. “Por Baal” es breve y natural en español, y mantiene el nombre de la deidad sin convertir de antemano la frase en “idolatría” o “culto a Baal” en el cuerpo del versículo.
- source_word: וַיָּמֹת
  english_pob_choice: and died
  chosen_spanish: y murió
  alternatives_spanish:
  - y falleció
  lexicon: HALOT
  rationale: La forma narrativa se vierte con el pretérito simple “murió”, que conserva la gravedad del cierre. No se explicita si la muerte es literal, corporativa o metafórica, pues el hebreo permite esa amplitud.
theological_decisions:
- issue: Alcance de la exaltación y la muerte de Efraín
  english_pob_reading: The verse speaks of Ephraim/the northern kingdom gaining prominence in Israel and then becoming guilty through Baal, resulting in death.
  chosen_spanish_reading: El versículo presenta a Efraín alcanzando exaltación en Israel y luego cayendo en culpa por Baal, con el desenlace de muerte.
  alternative_spanish_readings:
  - Efraín fue exaltado por otros en Israel.
  - La muerte alude a una muerte corporativa o política más que a la de un individuo.
  rationale: No hay un término doctrinalmente polémico aquí, pero sí una sintaxis hebrea compacta. El español conserva la secuencia de ascenso, culpa y muerte sin cerrar innecesariamente si la muerte es literal, corporativa o metafórica.
  doctrine_reference: Translation philosophy §§1, 3, 5
- issue: Relación de Baal con la culpa
  english_pob_reading: ‘Through Baal’ may also be understood as ‘through Baal worship’ or ‘in/with Baal.’
  chosen_spanish_reading: La culpa se expresa “por Baal”, manteniendo abierta la relación exacta entre el ídolo, su culto y la culpabilidad de Efraín.
  alternative_spanish_readings:
  - por el culto a Baal
  - con Baal
  - en Baal
  rationale: El hebreo no exige añadir el sustantivo “culto” en el texto principal. Se deja la relación semántica abierta, como en la nota inglesa, para no borrar la tensión léxica entre la deidad nombrada y la práctica idolátrica implícita.
  doctrine_reference: Translation philosophy §§1, 5
translation_notes:
  revision_awareness: La revisión inglesa más reciente corrigió una lectura reflexiva previa (“he exalted himself”) y prefirió la pasiva/resultativa (“he was exalted”). La redacción española sigue esa decisión con “fue exaltado”, y conserva la nota alternativa porque el hebreo sigue siendo sintácticamente comprimido y admite otra lectura.
  spanish_consistency_notes:
  - Se usa “Efraín” como nombre propio, no una expansión interpretativa al reino del norte en el texto principal.
  - Se mantiene “Baal” sin glosa incorporada para respetar el nombre de la deidad y la ambigüedad del hebreo.
  - “Murió” conserva el cierre abrupto del hebreo sin añadir una interpretación sobre el tipo de muerte.
  - La nota a está anclada en “fue exaltado en Israel”, porque ahí reside la ambigüedad sintáctica principal.
