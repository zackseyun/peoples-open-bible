translation:
  language: es
  text: con piedras labradas costosas, con madera colocada en los edificios, y aquellas obras hechas con diligencia[a], y la obra prosperando en sus manos, y completadas con toda gloria[b] y cuidado.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'con prisa' para ἐπὶ σπουδῆς; el griego puede enfatizar tanto urgencia como diligencia o empeño.
    reason: lexical_alternative
  - marker: b
    text: Aquí 'gloria' probablemente señala esplendor o magnificencia en la ejecución de la obra, no solo honra en sentido abstracto.
    reason: cultural_note
lexical_decisions:
- source_word: λίθων ξυστῶν πολυτελῶν
  english_pob_choice: costly hewn stones
  chosen_spanish: piedras labradas costosas
  alternatives_spanish:
  - piedras talladas costosas
  - piedras labradas preciosas
  lexicon: LSJ
  rationale: ξυστῶν indica piedra trabajada o labrada, no piedra en bruto; πολυτελῶν añade la idea de alto costo o gran valor. 'Labradas' conserva el trabajo de cantería y 'costosas' mantiene el matiz económico sin introducir ornamento ajeno al contexto.
- source_word: ξύλων τιθεμένων ἐν τοῖς οἴκοις
  english_pob_choice: timber laid in the buildings
  chosen_spanish: madera colocada en los edificios
  alternatives_spanish:
  - madera puesta en las construcciones
  - vigas colocadas en los edificios
  lexicon: LSJ
  rationale: ξύλων es más amplio que 'vigas'; 'madera' permite abarcar el material de construcción sin estrechar demasiado el sentido. τιθεμένων expresa ser colocada o puesta, y οἴκοις aquí apunta a las estructuras edificadas, por lo que 'edificios' es natural en español.
- source_word: τὰ ἔργα ἐκεῖνα ἐπὶ σπουδῆς γινόμενα
  english_pob_choice: those works being done with diligence
  chosen_spanish: aquellas obras hechas con diligencia
  alternatives_spanish:
  - aquellas obras hechas con prisa
  - aquellas obras hechas con empeño
  lexicon: BDAG/LSJ
  rationale: σπουδή puede implicar diligencia, empeño o, en algunos contextos, prisa. Aquí, por el tono de informe de construcción, 'diligencia' transmite cuidado y energía sin forzar la idea de urgencia excesiva.
- source_word: εὐοδούμενον τὸ ἔργον ἐν ταῖς χερσὶν αὐτῶν
  english_pob_choice: the work prospering in their hands
  chosen_spanish: la obra prosperando en sus manos
  alternatives_spanish:
  - la obra teniendo éxito en sus manos
  - la obra avanzando bajo sus manos
  lexicon: LSJ
  rationale: εὐοδόω significa prosperar o tener éxito. Se conserva el modismo 'en sus manos' / 'en sus manos' para reflejar la agencia expresada por el griego y mantener la fuerza idiomática del pasaje.
- source_word: ἐν πάσῃ δόξῃ καὶ ἐπιμελείᾳ συντελούμενα
  english_pob_choice: being completed with all glory and care
  chosen_spanish: siendo concluida con toda gloria y cuidado
  alternatives_spanish:
  - siendo terminada con todo esplendor y diligencia
  - siendo completada con toda gloria y atención
  lexicon: LSJ
  rationale: συντελούμενα expresa que algo se lleva a término; 'siendo concluida' suena más natural en español para una obra. δόξα en este contexto arquitectónico puede sugerir esplendor o magnificencia, y ἐπιμέλεια es cuidado/atención/diligencia; 'gloria y cuidado' preserva ambas ideas sin perder el tono elevado.
translation_notes:
  revision_awareness: Se mantuvo el anclaje primario en el griego de Swete; la pauta paralela hebrea se usó solo como verificación de contexto y no como base principal de traducción. No se detectaron revisiones sustanciales en el expediente auditado.
  spanish_consistency_notes:
  - Se conservó 'Yahvé' como norma del proyecto cuando corresponda, pero este versículo no contiene el tetragrámaton ni lenguaje divino explícito.
  - '''Obras/obra'' refleja la repetición del griego y mantiene el tono de informe de construcción.'
  - Se evitó 'SEÑOR' o 'Cristo' por no estar presentes en el texto fuente.
