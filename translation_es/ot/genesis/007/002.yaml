    rationale: 'El hebreo usa singular colectivo: הַבְּהֵמָה אֲשֶׁר לֹא טְהֹרָה הִוא. Aunque el inglés POB pluraliza por idiomaticidad inglesa, en español no hace falta; «del animal que no es limpio» es natural, más ceñido al original y mantiene mejor el paralelismo con «de todo animal limpio».'
  - severity: low
