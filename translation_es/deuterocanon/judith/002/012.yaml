translation:
  language: es
  text: Porque tan cierto como que vivo, y por el poder[a] de mi reino, he hablado, y haré estas cosas por mi mano[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: También puede entenderse «poderío». El griego κράτος puede denotar poder, fuerza o fuerza gobernante.
    reason: lexical_alternative
  - marker: b
    text: Literalmente, «en mi mano»; la expresión significa «por mi mano», es decir, con acción personal y directa.
    reason: lexical_alternative
lexical_decisions:
- source_word: ὅτι
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  lexicon: BDAG
  rationale: Introduce la base solemne de la afirmación anterior. En español, «Porque» conserva el valor explicativo/causal sin sonar artificial en una fórmula de juramento.
- source_word: ζῶν ἐγώ
  english_pob_choice: as I live
  chosen_spanish: yo vivo
  alternatives_spanish:
  - como yo vivo
  - mientras viva
  lexicon: BDAG
  rationale: La forma griega es una fórmula de juramento; en español, «yo vivo» mantiene la afirmación directa y solemne. Se evita una paráfrasis más expansiva que no añade contenido al griego.
- source_word: τὸ κράτος
  english_pob_choice: the power
  chosen_spanish: el poder
  alternatives_spanish:
  - la fuerza
  - el poderío
  - la might
  lexicon: LSJ
  rationale: κράτος puede denotar poder, fuerza o poderío gobernante. «El poder» es el equivalente español más claro y natural en un contexto real, y conserva la amplitud semántica sin perder el matiz de autoridad.
- source_word: τῆς βασιλείας μου
  english_pob_choice: of my kingdom
  chosen_spanish: de mi reino
  alternatives_spanish:
  - de mi realeza
  - de mi soberanía
  lexicon: LSJ
  rationale: βασιλεία aquí remite al reino real. «Reino» es la opción más directa y transparente en español; «realeza» o «soberanía» serían más interpretativas.
- source_word: λελάληκα
  english_pob_choice: I have spoken
  chosen_spanish: he hablado
  alternatives_spanish:
  - he dicho
  - he declarado
  lexicon: BDAG
  rationale: El perfecto expresa una acción concluida con vigencia presente. «He hablado» conserva ese valor aspectual sin añadir solemnidad interpretativa extra.
- source_word: ποιήσω
  english_pob_choice: I will do
  chosen_spanish: haré
  alternatives_spanish:
  - llevaré a cabo
  - cumpliré
  lexicon: BDAG
  rationale: ποίησω es amplio; el objeto «estas cosas» completa el sentido. «Haré» reproduce de modo breve y fiel la futura ejecución personal.
- source_word: ταῦτα
  english_pob_choice: these things
  chosen_spanish: estas cosas
  alternatives_spanish:
  - esto
  - ellas
  lexicon: BDAG
  rationale: El plural demostrativo debe mantenerse en español. «Estas cosas» refleja con precisión la referencia a los actos previamente anunciados.
- source_word: ἐν χειρί μου
  english_pob_choice: by my hand
  chosen_spanish: por mi mano
  alternatives_spanish:
  - con mi mano
  - con mi propia mano
  lexicon: LSJ
  rationale: La expresión es idiomática para agencia personal directa. «Por mi mano» conserva la imagen y comunica que la acción será realizada directamente por el hablante.
theological_decisions:
- issue: Fórmula de juramento y autoverificación real
  english_pob_reading: For as I live, and by the power of my kingdom
  chosen_spanish_reading: Porque yo vivo, y por el poder de mi reino
  alternative_spanish_readings:
  - Pues, mientras vivo, y por el poder de mi reino
  - Ya que vivo, y por el poder de mi reino
  rationale: El griego presenta una construcción elíptica y solemne, propia de un juramento. La redacción española mantiene ese tono sin convertirlo en una paráfrasis explicativa ni introducir contenido no presente en el texto.
  doctrine_reference: DOCTRINE.md § Translation philosophy 3, 6
