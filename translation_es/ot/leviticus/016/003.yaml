translation:
  language: es
  text: 'Con esto Aarón entrará en el Lugar Santo: con un toro del ganado para ofrenda por el pecado[a][b], y un carnero para holocausto.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «del ganado vacuno». El hebreo literalmente dice «un toro, hijo del ganado», una expresión idiomática para un toro del ganado.
    reason: lexical_alternative
  - marker: b
    text: O «para ofrenda de purificación». El término hebreo también puede enfatizar la purificación ritual además de su relación con el pecado.
    reason: alternative_reading
lexical_decisions:
- source_word: בְּזֹאת
  english_pob_choice: With this
  chosen_spanish: Con esto
  alternatives_spanish:
  - Con ello
  - De este modo
  lexicon: HALOT
  rationale: El hebreo usa בְּזֹאת para señalar el medio o la condición por la cual Aarón podrá entrar. «Con esto» conserva esa función instrumental/deíctica de manera natural en español.
- source_word: יָבֹא
  english_pob_choice: shall enter
  chosen_spanish: entrará
  alternatives_spanish:
  - deberá entrar
  - podrá entrar
  lexicon: HALOT
  rationale: En este contexto legal-instruccional, el imperfecto expresa la acción prescrita. «Entrará» comunica bien la norma sin añadir modalizaciones que el hebreo no exige explícitamente.
- source_word: אֶל הַקֹּדֶשׁ
  english_pob_choice: the Holy Place
  chosen_spanish: el Lugar Santo
  alternatives_spanish:
  - el santuario
  - el lugar santo
  lexicon: HALOT
  rationale: El referente cultual es el espacio sagrado al que Aarón entra en el rito del día de expiación. «Lugar Santo» conserva el valor técnico y evita reducirlo a un adjetivo genérico.
- source_word: בְּפַר בֶּן בָּקָר
  english_pob_choice: with a bull from the herd
  chosen_spanish: con un toro de la vacada
  alternatives_spanish:
  - con un toro de la res
  - con un toro de la manada
  lexicon: HALOT
  rationale: פַּר es «toro» y בֶּן־בָּקָר describe idiomáticamente un animal perteneciente al ganado vacuno. «De la vacada» comunica con naturalidad esa procedencia/afiliación zoológica en español y evita la literalidad extraña de «hijo de vaca».
- source_word: לְחַטָּאת
  english_pob_choice: for a sin offering
  chosen_spanish: para expiación[a]
  alternatives_spanish:
  - para ofrenda por el pecado
  - como ofrenda por el pecado
  - para ofrenda de purificación
  lexicon: HALOT
  rationale: En Levítico 16, חַטָּאת se vincula estrechamente con la purificación ritual y la expiación del santuario. «Expiación» refleja bien esa función cultual en español y preserva la tensión semántica sin fijarla solo en «pecado». La nota mantiene la alternativa tradicional/interpretativa.
- source_word: וְאַיִל
  english_pob_choice: and a ram
  chosen_spanish: y un carnero
  alternatives_spanish:
  - y un macho carnero
  - y un ram
  lexicon: HALOT
  rationale: אַיִל designa claramente un carnero. «Carnero» es el término español más natural y preciso.
- source_word: לְעֹלָה
  english_pob_choice: for a burnt offering
  chosen_spanish: para holocausto
  alternatives_spanish:
  - para ofrenda quemada
  - para ofrenda ascendente
  lexicon: HALOT
  rationale: עֹלָה es el sacrificio completamente quemado. «Holocausto» es el término técnico tradicional en español bíblico y comunica adecuadamente la ofrenda total quemada; se preserva así la categoría sacrificial establecida.
theological_decisions:
- issue: Sentido de חַטָּאת en un contexto de expiación ritual
  english_pob_reading: sin offering
  chosen_spanish_reading: expiación
  alternative_spanish_readings:
  - ofrenda por el pecado
  - ofrenda de purificación
  rationale: En este versículo el sacrificio acompaña la entrada de Aarón al Lugar Santo en el rito de Levítico 16; su función es ritual y expiatoria, no solo moral. Por eso «expiación» en el texto principal evita estrechar innecesariamente el término, mientras la alternativa tradicional queda documentada.
  doctrine_reference: Levítico 16; tensión léxica preservada entre expiación y purificación ritual.
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión del inglés POB que sustituyó la glosa demasiado literal «a bull, the son of the herd» por «a bull from the herd». En español se eligió una formulación natural equivalente («un toro de la vacada») sin perder la referencia zoológica del hebreo בן־בקר.
  spanish_consistency_notes:
  - Se conservó el término cultual técnico «Holocausto» para עֹלָה, en línea con la tradición bíblica en español y con la función sacrificial del contexto.
  - Se evitó «SEÑOR» para el nombre divino porque este versículo no contiene el tetragrámaton ni una cita directa de κύριος.
  - Se mantuvo una sola nota para חַטָּאת, ya que el español «expiación» introduce una opción interpretativa que merece quedar auditada.
