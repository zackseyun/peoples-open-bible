    text: O «todas sus rebeliones… con las cuales se han rebelado». El hebreo repite la misma raíz en «transgresiones» y «han transgredido», enfatizando la culpabilidad.
    reason: lexical_alternative
  revision_rationale: 'Se revisa para alinear mejor el español con el hebreo y con las decisiones auditadas del POB inglés: se reemplaza «pecados» por «transgresiones» y «han transgredido» para conservar la repetición cognada de פשע; se actualiza el texto a un español neutral latinoamericano usando formas de ustedes; y se mantiene la fuerza del mandato y la tensión teológica de «háganse un corazón nuevo y un espíritu nuevo» sin suavizarla. La nota también se ajusta para reflejar la alternativa «rebeliones» conservando la misma repetición léxica.'
