revisions:
- from: En cuanto al ave viva, la tomará, junto con la madera de cedro, el hilo escarlata y el hisopo, y los mojará, y también al ave viva, en la sangre del ave que fue sacrificada, sobre las aguas vivas[a].
  to: En cuanto al ave viva, la tomará, junto con la madera de cedro, el hilo escarlata y el hisopo, y los sumergirá, junto con el ave viva, en la sangre del ave que fue degollada sobre el agua viva[a].
  rationale: Se ajusta el español para reflejar con más precisión el acto ritual de וְטָבַל mediante 'sumergirá'; se preserva mejor el matiz cultual de הַשְּׁחֻטָה con 'fue degollada'; y se mejora la naturalidad de מַיִם חַיִּים en español con 'el agua viva', manteniendo la nota de alternativa. La estructura general y los elementos rituales del borrador se conservan.
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T21:27:50Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue en gran medida la estructura y el sentido del hebreo: el ave viva es tomada junto con los demás elementos rituales, y todos son introducidos en la sangre del ave degollada sobre agua viva. Sin embargo, hay dos desajustes léxicos importantes: וְטָבַל se expresa mejor como ''los sumergirá/mojará'' en sentido de introducir en un líquido, pero ''mojará'' suena demasiado débil para el acto ritual; y הַשְּׁחֻטָה significa ''degollada/ sacrificada por degüello / inmolada'', no simplemente ''sacrificada'' si eso diluye el matiz de matanza ritual concreta. Además, ''sobre las aguas vivas'' pluraliza de forma menos natural en español un sintagma que en contexto ritual se entiende mejor como colectivo singular ''el agua viva''.'
  spanish_quality_summary: El español es generalmente claro, pero la frase 'y los mojará, y también al ave viva' resulta algo trabada y poco elegante. 'Mojará' es comprensible, pero menos preciso y menos digno que 'sumergirá'. 'Sobre las aguas vivas' suena poco idiomático en español bíblico actual; 'sobre el agua viva' conserva mejor el literal hebreo sin extrañeza innecesaria. También conviene evitar la repetición torpe de comas.
  glossary_alignment: No hay conflictos con terminología de proyecto como Yahvé/Mesías. Las decisiones principales son aceptables salvo que el hebreo מַיִם חַיִּים se vierte mejor como 'agua viva' en singular colectivo en español, con nota para 'aguas corrientes' o 'agua fresca'. 'Hisopo' y 'madera de cedro' están bien. 'Ave viva' es adecuado y mejor que 'pájaro'.
  issues:
  - severity: medium
    issue: '''mojará'' debilita וְטָבַל'
    rationale: El verbo hebreo describe introducir los objetos en un líquido; en contexto ritual, 'sumergirá' o 'mojará en' son posibles, pero 'mojar' puede sonar demasiado coloquial o superficial.
  - severity: medium
    issue: '''fue sacrificada'' diluye הַשְּׁחֻטָה'
    rationale: שׁחט es el verbo técnico de degollar/slaughter en contexto ritual. 'Fue degollada' o 'fue sacrificada por degüello' preserva mejor el matiz cultual.
  - severity: low
    issue: '''las aguas vivas'' suena poco natural'
    rationale: Aunque מים es formalmente plural en hebreo, en español el referente ritual se expresa con mayor naturalidad como 'el agua viva', manteniendo una nota para alternativas como 'aguas corrientes'.
  - severity: low
    issue: La coordinación 'y los mojará, y también al ave viva' es torpe
    rationale: 'Puede alisarse sin perder estructura fuente: ''y sumergirá en ella estos objetos y el ave viva'' o ''y los sumergirá, junto con el ave viva...''.'
  revised_spanish_text: En cuanto al ave viva, la tomará, junto con la madera de cedro, el hilo escarlata y el hisopo, y los sumergirá, junto con el ave viva, en la sangre del ave que fue degollada sobre el agua viva[a].
  revised_footnotes:
  - marker: a
    text: Literalmente, 'agua viva'; también puede entenderse como 'agua corriente' o 'agua fresca'.
    reason: lexical_alternative
  revision_rationale: Se ajusta el español para reflejar con más precisión el acto ritual de וְטָבַל mediante 'sumergirá'; se preserva mejor el matiz cultual de הַשְּׁחֻטָה con 'fue degollada'; y se mejora la naturalidad de מַיִם חַיִּים en español con 'el agua viva', manteniendo la nota de alternativa. La estructura general y los elementos rituales del borrador se conservan.
