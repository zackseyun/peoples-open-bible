    reason: lexical_alternative
  - marker: c
    text: O «hombres valientes de valor». La expresión hebrea es una fórmula militar que subraya fuerza y valentía.
    reason: lexical_alternative
  revision_rationale: Se reubicaron y corrigieron las notas para que correspondan a los lugares adecuados del texto y se añadió la alternativa necesaria para «subir contra Hai». También se fortaleció la traducción de גִּבּוֹרֵי הַחַיִל a «hombres poderosos de valor», que suena más formal y más cercana a la decisión inglesa auditada sin caer en una calca incomprensible.
