lexical_decisions:
- source_word: ηυφρανας / ευφρανας
  english_pob_choice: you made glad
  chosen_spanish: tú alegraste
  alternatives_spanish:
  - tú hiciste alegrar
  - tú llenaste de alegría
  - tú regocijaste
  lexicon: LSJ; BDAG
  rationale: 'El verbo griego εὐφραίνω tiene fuerza causativa: ''hacer alegre / alegrar''. En español, ''alegraste'' conserva la acción directa sobre otro sin añadir un objeto no expresado en el texto fragmentario. ''Hiciste alegrar'' suena más pesado; ''llenaste de alegría'' añade una imagen más interpretativa.'
translation_notes:
  revision_awareness: El texto base en griego para este versículo está incompleto y solo preserva el verbo en segunda persona singular. La versión española sigue esa restricción y no intenta suplir un objeto implícito. Se mantiene coherencia con la nota de la POB inglesa que también traduce de manera breve por la fragmentariedad del testimonio.
  spanish_consistency_notes:
  - Se usó tratamiento de segunda persona singular, en concordancia con la forma verbal griega y con la economía del fragmento conservado.
  - Se evitó 'Cristo', 'Señor' u այլ terminología doctrinal porque el testimonio disponible no las contiene.
  - La nota a pie de página explica la variante ortográfica sin cargarla de valor interpretativo adicional.
