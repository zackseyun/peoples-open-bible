translation:
  language: es
  text: 'Por tanto, montes de Israel, oigan la palabra del Señor Yahvé. Así dice el Señor Yahvé a los montes y a las colinas, a los barrancos[a] y a los valles, a las ruinas desoladas y a las ciudades abandonadas, que han llegado a ser botín y objeto de burla para el remanente[b] de las naciones vecinas:'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'cauces de agua' o 'canales' para 'barrancos' (אֲפִיקִים).
    reason: lexical_alternative
  - marker: b
    text: O 'el resto de las naciones vecinas' para 'el remanente de las naciones vecinas'.
    reason: lexical_alternative
lexical_decisions:
- source_word: לָכֵן
  english_pob_choice: Therefore
  chosen_spanish: Por tanto
  alternatives_spanish:
  - Por eso
  - Así que
  lexicon: HALOT
  rationale: La partícula inferencial introduce la consecuencia del contexto previo; 'Por tanto' suena natural, formal y conserva la relación lógica sin añadir matiz interpretativo.
- source_word: הָרֵי יִשְׂרָאֵל
  english_pob_choice: mountains of Israel
  chosen_spanish: montes de Israel
  alternatives_spanish:
  - montañas de Israel
  lexicon: HALOT
  rationale: '''Montes'' preserva bien el tono profético y el paralelismo con ''colinas''; en español bíblico resulta más fluido que repetir ''montañas''.'
- source_word: שִׁמְעוּ
  english_pob_choice: hear
  chosen_spanish: oigan
  alternatives_spanish:
  - escuchen
  - oíd
  lexicon: HALOT
  rationale: El imperativo plural requiere un verbo natural en español. 'Oigan' conserva la fuerza exhortativa y el registro digno, mejor que un calco más rígido.
- source_word: דְּבַר
  english_pob_choice: the word
  chosen_spanish: la palabra
  alternatives_spanish:
  - el mensaje
  lexicon: HALOT
  rationale: En fórmulas proféticas, 'palabra' es la equivalencia más directa y transparente, y mantiene el valor técnico del hebreo.
- source_word: אֲדֹנָי יְהוִה
  english_pob_choice: the Lord GOD
  chosen_spanish: el Señor Yahvé
  alternatives_spanish:
  - el Señor Dios
  - el Señor Yahveh
  lexicon: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
  rationale: Se conserva el nombre divino como 'Yahvé' según la política del proyecto, y 'Señor' para אֲדֹנָי. La combinación evita el ocultamiento del Tetragrámaton y refleja el título compuesto del hebreo.
- source_word: כֹּה אָמַר
  english_pob_choice: Thus says
  chosen_spanish: Así dice
  alternatives_spanish:
  - Así ha dicho
  - Esto dice
  lexicon: HALOT
  rationale: La fórmula mensajera profética se traduce con un giro solemne y corriente en español bíblico; 'Así dice' es la correspondencia más directa.
- source_word: לֶהָרִים וְלַגְּבָעוֹת
  english_pob_choice: to the mountains and to the hills
  chosen_spanish: a los montes y a las colinas
  alternatives_spanish:
  - a los montes y a los cerros
  lexicon: HALOT
  rationale: Se conserva la doble serie topográfica y la preposición repetida para mantener el ritmo retórico del hebreo.
- source_word: לָאֲפִיקִים
  english_pob_choice: ravines
  chosen_spanish: a los cauces[a]
  alternatives_spanish:
  - a los ravines
  - a los lechos de torrente
  lexicon: HALOT
  rationale: אֲפִיקִים puede referirse a cauces, canales o lechos de torrente. 'Cauces' es un español amplio y natural que no fuerza una sola imagen hidrológica.
- source_word: לְחֳרָבוֹת הַשֹּׁמְמוֹת
  english_pob_choice: the desolate ruins
  chosen_spanish: a las ruinas desoladas
  alternatives_spanish:
  - a los lugares arrasados
  - a las ruinas devastadas
  lexicon: HALOT
  rationale: 'Se combinan los dos elementos del hebreo: ruinas + desolación. ''Ruinas desoladas'' mantiene ambos sin sobreinterpretar.'
- source_word: עָרִים הַנֶּעֱזָבוֹת
  english_pob_choice: the abandoned cities
  chosen_spanish: y a las ciudades abandonadas
  alternatives_spanish:
  - y a las ciudades dejadas
  - y a las ciudades desamparadas
  lexicon: HALOT
  rationale: '''Abandonadas'' traduce de modo claro y contemporáneo el estado de haber sido dejadas atrás, en línea con el registro de devastación del pasaje.'
- source_word: לְבַז
  english_pob_choice: plunder
  chosen_spanish: botín
  alternatives_spanish:
  - presa
  - saqueo
  lexicon: HALOT
  rationale: '''Botín'' reproduce bien el sustantivo de resultado: aquello en que quedaron convertidas las ciudades para otros pueblos.'
- source_word: לַעַג
  english_pob_choice: mockery
  chosen_spanish: objeto de burla
  alternatives_spanish:
  - burla
  - escarnio
  lexicon: HALOT
  rationale: '''Objeto de burla'' expresa con precisión la idea de ridículo hacia las ciudades, sin perder la naturalidad del español.'
- source_word: שְׁאֵרִית הַגּוֹיִם
  english_pob_choice: the remnant of the nations
  chosen_spanish: el remanente de las naciones vecinas
  alternatives_spanish:
  - el remanente de las naciones
  - el resto de las naciones
  lexicon: HALOT
  rationale: '''Remanente'' conserva la fuerza formal de שְׁאֵרִית, y ''vecinas'' explicita el valor contextual de מִסָּבִיב sin convertir la frase en una categoría teológica ajena al pasaje.'
- source_word: מִסָּבִיב
  english_pob_choice: surrounding
  chosen_spanish: vecinas
  alternatives_spanish:
  - circundantes
  - alrededor
  lexicon: HALOT
  rationale: El hebreo describe a las naciones que rodean a Israel. 'Vecinas' es una solución natural en español que comunica cercanía geográfica y contextual.
theological_decisions:
- issue: Renderización del nombre divino יְהוָה en la fórmula אֲדֹנָי יְהוִה
  english_pob_reading: the Lord GOD
  chosen_spanish_reading: el Señor Yahvé
  alternative_spanish_readings:
  - el Señor Dios
  - el Señor Yahveh
  rationale: El texto hebreo contiene explícitamente el Tetragrámaton, y la política del proyecto exige preservarlo como 'Yahvé'. Se mantiene 'Señor' para אֲדֹנָי, evitando la sustitución por una máscara litúrgica y conservando la distinción del título compuesto.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Valor de שְׁאֵרִית en la frase 'שְׁאֵרִית הַגּוֹיִם'
  english_pob_reading: the remnant of the nations
  chosen_spanish_reading: el remanente de las naciones vecinas
  alternative_spanish_readings:
  - el remanente de las naciones
  - el resto de las naciones
  rationale: Aunque 'remanente' puede tener peso teológico en otros contextos, aquí designa simplemente a las naciones que quedan alrededor de Israel. Se conserva el matiz léxico sin forzar un uso escatológico o redentor no indicado por el pasaje.
  doctrine_reference: DOCTRINE.md §Translation philosophy 3, 5
translation_notes:
  revision_awareness: He seguido el tramo revisado del audit trail, especialmente la decisión de entender מִסָּבִיב como 'surrounding' y no como una perífrasis más larga. En español, 'vecinas' conserva esa concisión y claridad contextual. También he preservado el orden solemne de la lista topográfica y la fórmula profética.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' para יְהוָה conforme al criterio del proyecto, evitando la máscara 'SEÑOR'.
  - '''Señor'' representa אֲדֹנָי en la combinación del título divino.'
  - '''Montes'' y ''colinas'' reproducen el paralelismo topográfico del hebreo.'
  - '''Botín'' y ''objeto de burla'' sostienen el doble resultado semántico de לְבַז וּלְלַעַג.'
  - Se preserva la ambigüedad controlada de אֲפִיקִים con 'cauces' y una nota alternativa.
