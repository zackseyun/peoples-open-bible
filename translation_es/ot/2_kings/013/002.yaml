translation:
  language: es
  text: Él hizo lo malo ante los ojos de Yahvé y anduvo tras los pecados de Jeroboam hijo de Nabat[a], que hizo pecar a Israel; no se apartó de ellos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, de manera más formal: «no se apartó de ello». El hebreo tiene un sufijo femenino singular, probablemente referido colectivamente al patrón de pecado de Jeroboam.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּעַשׂ
  english_pob_choice: He did
  chosen_spanish: Él hizo
  alternatives_spanish:
  - Y hizo
  - E hizo
  lexicon: HALOT
  rationale: El wayyiqtol narrativo de עשה introduce la conducta del rey. En español, «hizo» transmite la acción de forma natural; se conserva el valor narrativo sin calcar innecesariamente la conjunción.
- source_word: הָרַע בְּעֵינֵי יְהוָה
  english_pob_choice: what was evil in the eyes of Yahweh
  chosen_spanish: lo malo a los ojos de Yahvé
  alternatives_spanish:
  - lo que era malo a los ojos de Yahvé
  - el mal ante Yahvé
  lexicon: HALOT
  rationale: La fórmula evaluativa de Reyes se expresa de manera idiomática en español como «lo malo a los ojos de Yahvé». Mantiene la valoración moral y la imagen hebrea de juicio ante la mirada divina.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahveh
  lexicon: HALOT
  rationale: 'Se sigue el criterio doctrinal del proyecto para el Tetragrámaton: transliterar el nombre divino como «Yahvé» en el texto principal, en vez de sustituirlo por un título.'
- source_word: וַיֵּלֶךְ אַחַר
  english_pob_choice: walked after
  chosen_spanish: anduvo tras
  alternatives_spanish:
  - siguió tras
  - caminó tras
  lexicon: HALOT
  rationale: La expresión idiomática hebrea indica adhesión a un patrón o conducta. «Anduvo tras» conserva la metáfora del seguimiento y resulta comprensible en español.
- source_word: חַטֹּאת
  english_pob_choice: sins
  chosen_spanish: los pecados
  alternatives_spanish:
  - los pecados de
  - las faltas
  lexicon: HALOT
  rationale: El plural hebreo apunta a las prácticas pecaminosas de Jeroboam. «Los pecados» mantiene el plural y la fuerza moral del término.
- source_word: יָרָבְעָם בֶּן נְבָט
  english_pob_choice: Jeroboam son of Nebat
  chosen_spanish: Jeroboam hijo de Nabat
  alternatives_spanish:
  - Jeroboam, hijo de Nabat
  lexicon: HALOT
  rationale: Los nombres propios se transliteran de forma estable. «Hijo de» conserva el patronímico hebreo; «Nabat» refleja la forma más cercana al hebreo נְבָט.
- source_word: אֲשֶׁר הֶחֱטִיא אֶת יִשְׂרָאֵל
  english_pob_choice: who caused Israel to sin
  chosen_spanish: que hizo pecar a Israel
  alternatives_spanish:
  - que causó que Israel pecara
  - que llevó a Israel a pecar
  lexicon: HALOT
  rationale: El hifil de חטא es causativo. «Hizo pecar» reproduce con precisión esa fuerza causativa en español, sin añadir matices no presentes en el hebreo.
- source_word: לֹא סָר מִמֶּנָּה
  english_pob_choice: he did not turn away from them
  chosen_spanish: no se apartó de ellos
  alternatives_spanish:
  - no se apartó de ella
  - no se desvió de ello
  lexicon: HALOT
  rationale: סור expresa apartarse o desviarse. El sufijo femenino singular hebreo permite una referencia colectiva al patrón de pecados; en español, «de ellos» hace explícita esa referencia plural, siguiendo la lógica contextual del audit trail en inglés.
theological_decisions:
- issue: Nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahveh
  - SEÑOR
  rationale: El texto hebreo usa el nombre propio de Dios. La lectura principal en español preserva ese nombre como transliteración, conforme al criterio del proyecto y sin ocultarlo tras un título genérico.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Valor del sufijo femenino singular en מִמֶּנָּה
  english_pob_reading: rendered idiomatically as plural 'from them' referring to Jeroboam's sins/practices
  chosen_spanish_reading: no se apartó de ellos
  alternative_spanish_readings:
  - no se apartó de ella
  - no se apartó de ello
  rationale: Aunque el hebreo tiene sufijo femenino singular, el antecedente funcional es el conjunto de pecados de Jeroboam. El plural español aclara el referente colectivo sin borrar la tensión morfológica señalada en el audit trail.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #5: consistency of key terms, or documented exception'
translation_notes:
  revision_awareness: La revisión más reciente quedó sin cambios; el presente borrador sigue de cerca el texto hebreo y la solución auditada en inglés, manteniendo la misma lectura sintáctica y la misma tensión morfológica del sufijo final.
  spanish_consistency_notes:
  - Se usa «Yahvé» de forma consistente para יְהוָה.
  - Se mantiene «pecados» para חַטֹּאת y «hizo pecar» para el causativo de הֶחֱטִיא.
  - «No se apartó de ellos» sigue la decisión contextual del audit trail, con nota que preserva la alternativa más formal.
  - 'Los nombres propios se transliteran de modo uniforme: Jeroboam, Nabat, Israel.'
