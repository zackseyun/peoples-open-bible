translation:
  language: es
  text: En el vigésimo quinto año de nuestro exilio[a], al principio del año, el décimo día del mes, en el decimocuarto año después de que la ciudad hubiera sido derribada[b], precisamente ese día la mano de Yahvé estuvo sobre mí, y me llevó allí.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «en la cabeza del año»; puede aludir al inicio del año o a una observancia de Año Nuevo, pero aquí se traduce de manera más transparente como «al principio del año».'
    reason: lexical_alternative
  - marker: b
    text: O «después de que la ciudad hubiera caído» / «después de que la ciudad hubiera sido capturada». El hebreo dice más literalmente «después de que la ciudad hubiera sido golpeada» o «derribada».
    reason: lexical_alternative
lexical_decisions:
- source_word: לְגָלוּתֵנוּ
  english_pob_choice: of our exile
  chosen_spanish: de nuestro exilio
  alternatives_spanish:
  - de nuestro cautiverio
  lexicon: HALOT
  rationale: גָּלוּת expresa la condición de deportación/exilio; en español, «exilio» comunica mejor esa realidad colectiva que «cautiverio», que puede sonar a encarcelamiento individual. Conservo el posesivo plural «nuestro» por la forma sufijada del hebreo.
- source_word: בְּרֹאשׁ הַשָּׁנָה
  english_pob_choice: at the beginning of the year
  chosen_spanish: al principio del año
  alternatives_spanish:
  - al comienzo del año
  - en la cabeza del año
  - en el Año Nuevo
  lexicon: HALOT
  rationale: La expresión hebrea dice literalmente «en la cabeza del año». Sigo la decisión de la POB inglesa de expresar la idea de forma transparente e idiomática, sin convertirla de manera interpretativa en una celebración específica si el texto no la explicita.
- source_word: בֶּעָשׂוֹר לַחֹדֶשׁ
  english_pob_choice: on the tenth day of the month
  chosen_spanish: el décimo día del mes
  alternatives_spanish:
  - el diez del mes
  - el día diez del mes
  lexicon: HALOT
  rationale: La frase marca una fecha del calendario. En español, «el décimo día del mes» reproduce con claridad el valor temporal sin alejarse del hebreo.
- source_word: הֻכְּתָה
  english_pob_choice: had been struck down
  chosen_spanish: había sido derribada
  alternatives_spanish:
  - había sido golpeada
  - había sido abatida
  - había caído
  lexicon: HALOT
  rationale: El pasivo de נכה conserva la idea de ser golpeada/abatida. «Derribada» mantiene la imagen de una ciudad violentamente destruida y coincide con la fuerza del inglés «struck down» sin suavizarla a «caída».
- source_word: הָעִיר
  english_pob_choice: the city
  chosen_spanish: la ciudad
  alternatives_spanish:
  - la ciudad de Jerusalén
  lexicon: HALOT
  rationale: El hebreo no nombra Jerusalén; la mantengo como «la ciudad» para respetar la referencia formal y no añadir precisión que el versículo no explicita.
- source_word: בְּעֶצֶם הַיּוֹם הַזֶּה
  english_pob_choice: on that very day
  chosen_spanish: precisamente ese día
  alternatives_spanish:
  - en ese mismo día
  - justamente ese día
  - en el mismo día
  lexicon: HALOT
  rationale: El modismo intensifica la exactitud de la fecha. «Precisamente ese día» conserva el énfasis sin sonar rígido en español.
- source_word: יַד יְהוָה
  english_pob_choice: the hand of Yahweh
  chosen_spanish: la mano de Yahvé
  alternatives_spanish:
  - el poder de Yahvé
  - la mano del SEÑOR
  lexicon: HALOT
  rationale: 'Conservo el modismo profético «mano» por su carga de agencia y presión divina. Sigo el estándar del proyecto para el nombre divino: «Yahvé», no una sustitución por mayúsculas reverenciales.'
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  lexicon: HALOT
  rationale: El texto hebreo usa explícitamente el Tetragrámaton. La forma española del proyecto es «Yahvé», preservando el nombre del pacto sin enmascararlo.
- source_word: וַיָּבֵא אֹתִי שָׁמָּה
  english_pob_choice: and he brought me there
  chosen_spanish: y me llevó allí
  alternatives_spanish:
  - y me trajo allí
  - y me condujo hasta allí
  lexicon: HALOT
  rationale: El verbo aquí puede expresarse naturalmente como «llevar»/«traer». «Llevó allí» mantiene la dirección del movimiento y el valor de שָׁמָּה como «allí» sin sobreexplicar el lugar.
theological_decisions:
- issue: Uso del nombre divino יהוה / YHWH
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: La POB inglesa ya documenta la decisión de no ocultar el nombre divino. En español, «Yahvé» es la forma coherente con el proyecto y preserva el valor teológico del nombre del pacto en el contexto profético.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Cómo reproducir el idiomatismo profético יַד יְהוָה
  english_pob_reading: the hand of Yahweh
  chosen_spanish_reading: la mano de Yahvé estuvo sobre mí
  alternative_spanish_readings:
  - el poder de Yahvé estaba sobre mí
  - la mano de Yahvé estaba sobre mí
  rationale: Conservar «mano» evita diluir el modismo en una abstracción como «poder». La preposición «sobre mí» mantiene la presión o iniciativa divina implicada en el hebreo y en la tradición profética.
  doctrine_reference: Uso profético recurrente en Ezequiel y otros profetas
translation_notes:
  revision_awareness: 'La versión española sigue de cerca la última revisión inglesa sin cambios sustanciales: mantiene la cronología, conserva el modismo «mano de Yahvé», y preserva la referencia no explicitada a «la ciudad» en lugar de añadir «Jerusalén». Las únicas decisiones adaptadas al español son de idiomaticidad controlada (p. ej., «al principio del año», «precisamente ese día», «me llevó allí») sin alterar el sentido auditado.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» de forma consistente para יְהוָה, conforme al estándar del proyecto.
  - Se conserva «exilio» para גָּלוּת, evitando «cautiverio» salvo contexto más restrictivo.
  - No se añade «Jerusalén», porque el hebreo y la POB inglesa retienen «la ciudad».
  - La fecha se expresa con artículo y orden natural del español, pero sin perder los valores temporales del hebreo.
  - La nota [a] se ancla en «exilio» porque la alternativa lexicográfica afecta a esa frase; la nota [b] se ancla en «derribada» por la variación semántica del pasivo hebreo.
