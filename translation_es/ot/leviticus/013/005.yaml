base_translation:
  language: en
  yaml_path: translation/ot/leviticus/013/005.yaml
  text: And the priest shall examine him on the seventh day[a], and behold, if the spot has remained unchanged in his sight and the spot has not spread in the skin[c][b], then the priest shall isolate him for seven days a second time.
  footnotes:
  - marker: a
    text: Or 'the affliction' or 'the mark' for Hebrew negaʿ; the term refers to the visible lesion under priestly examination, not necessarily a medically defined disease.
    reason: lexical_alternative
  - marker: b
    text: Literally, 'the spot has stood in his eyes,' an idiom meaning it appeared unchanged to the priest.
    reason: lexical_alternative
  - marker: c
    text: Or 'shall confine him' or more literally 'shall shut him up.'
    reason: lexical_alternative
