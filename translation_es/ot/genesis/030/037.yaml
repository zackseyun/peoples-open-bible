translation:
  language: es
  text: Entonces Jacob tomó para sí varas frescas de álamo[a], almendro[b] y plátano[c], y peló en ellas franjas blancas, dejando al descubierto lo blanco que estaba sobre las varas.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: ‘Álamo’ sigue la identificación más probable de לִבְנֶה; el hebreo es incierto y también se ha entendido como ‘estoraque fresco’.
    reason: lexical_alternative
  - marker: b
    text: ‘Almendro’ refleja la identificación más probable de לוּז; traducciones antiguas a veces leen ‘avellano’.
    reason: lexical_alternative
  - marker: c
    text: ‘Plátano’ corresponde a la identificación más probable de עֶרְמוֹן; versiones antiguas a veces dicen ‘castaño’.
    reason: lexical_alternative
lexical_decisions:
- source_word: מַקַּל
  english_pob_choice: rod(s)
  chosen_spanish: varas
  alternatives_spanish:
  - bastones
  - ramas
  - varas/varillas
  lexicon: HALOT
  rationale: El término hebreo designa piezas de madera cortadas para este procedimiento. 'Varas' conserva la concreción de 'rods' y suena natural en español bíblico sin volverlo excesivamente técnico.
- source_word: לִבְנֶה לַח
  english_pob_choice: fresh poplar
  chosen_spanish: álamo fresco / varas frescas de álamo
  alternatives_spanish:
  - álamo verde
  - estoraque fresco
  - álamo recién cortado
  lexicon: HALOT
  rationale: La identificación exacta de לִבְנֶה es incierta, pero 'álamo' es una equivalencia frecuente y bien atestiguada. 'Frescas' comunica לַח como madera aún tierna, húmeda o recién cortada.
- source_word: לוּז
  english_pob_choice: almond
  chosen_spanish: almendro
  alternatives_spanish:
  - avellano
  - almendra
  lexicon: HALOT
  rationale: Sigo la identificación preferida por el POB con 'almond'. En español, el árbol se expresa mejor como 'almendro' que como el fruto 'almendra'.
- source_word: עֶרְמוֹן
  english_pob_choice: plane tree
  chosen_spanish: plátano
  alternatives_spanish:
  - plátano de sombra
  - castaño
  lexicon: HALOT
  rationale: Para el árbol comúnmente identificado como 'plane tree', 'plátano' es la forma española más natural y reconocible. 'Plátano de sombra' sería más explícito pero menos fluido en el verso.
- source_word: וַיְפַצֵּל
  english_pob_choice: peeled
  chosen_spanish: peló
  alternatives_spanish:
  - descascaró
  - raspó
  - despojó de la corteza
  lexicon: HALOT
  rationale: El verbo describe la acción de quitar la corteza para exponer la madera clara. 'Peló' reproduce esa acción de manera breve y idiomática.
- source_word: פְּצָלוֹת לְבָנוֹת
  english_pob_choice: white stripes
  chosen_spanish: franjas blancas
  alternatives_spanish:
  - vetas blancas
  - rayas blancas
  - tiras blancas
  lexicon: HALOT
  rationale: '''Franjas blancas'' comunica bien el efecto visual de las zonas peladas sobre la vara, con un español claro y natural.'
- source_word: מַחְשֹׂף הַלָּבָן
  english_pob_choice: exposing the white
  chosen_spanish: dejando al descubierto lo blanco
  alternatives_spanish:
  - haciendo visible lo blanco
  - exponiendo la parte blanca
  lexicon: HALOT
  rationale: 'La expresión hebrea enfatiza el resultado del pelado: queda visible la parte blanca interna. ''Dejando al descubierto lo blanco'' preserva ese efecto sin sonar forzado.'
- source_word: אֲשֶׁר עַל הַמַּקְלוֹת
  english_pob_choice: that was on the rods
  chosen_spanish: que estaba en las varas
  alternatives_spanish:
  - que había sobre las varas
  - que estaba sobre las varas
  lexicon: HALOT
  rationale: La cláusula final aclara que lo blanco pertenecía a las varas una vez peladas. 'Que estaba en las varas' refleja el sentido relacional de עַל en este contexto de superficie/soporte.
translation_notes:
  revision_awareness: 'El pasaje sigue de cerca el texto hebreo y coincide con la lectura auditada del POB en lo esencial: Jacob toma varas de tres árboles, las pela y deja visible la madera blanca. Se mantuvo la incertidumbre lexical de los nombres arbóreos mediante notas, sin ocultar las opciones alternativas documentadas.'
  spanish_consistency_notes:
  - Se mantiene 'Jacob' y no 'Yaacob' por consistencia bíblica en español.
  - Se usa 'Yahvé' como norma general del proyecto, pero este versículo no contiene el nombre divino.
  - Se prefirió 'varas' para מַקַּל y 'peló' para וַיְפַצֵּל por claridad y cercanía al hebreo.
  - Se evitó 'Cristo', 'siervo' y otros términos no pertinentes al versículo.
