translation:
  language: es
  text: Pero al necio[a], una vida malvada es peor que la muerte.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: También podría traducirse «una vida mala» o «una vida miserable»; el griego dice literalmente «una vida mala/evil life», con un sentido que puede incluir tanto maldad moral como una condición ruin.
    reason: lexical_alternative
lexical_decisions:
- source_word: μωροῦ
  english_pob_choice: a fool
  chosen_spanish: el necio
  alternatives_spanish:
  - el insensato
  - el tonto
  - la persona necia
  lexicon: LSJ
  rationale: μωρός designa a una persona necia, insensata o torpe para la sabiduría. En español, "necio" conserva el registro sapiencial y evita el tono coloquial de "tonto".
- source_word: ὑπὲρ θάνατον
  english_pob_choice: worse than death
  chosen_spanish: peor que la muerte
  alternatives_spanish:
  - más que la muerte
  - más grave que la muerte
  - por encima de la muerte
  lexicon: LSJ
  rationale: El comparativo de ὑπέρ aquí expresa que esa vida resulta más gravosa que la muerte. "Peor que la muerte" reproduce bien el valor comparativo en español natural.
- source_word: ζωὴ πονηρά
  english_pob_choice: an evil life
  chosen_spanish: una vida mala
  alternatives_spanish:
  - una vida malvada
  - una vida perversa
  - una vida miserable
  lexicon: LSJ
  rationale: πονηρά puede ser moralmente mala o sencillamente ruin/penosa. "Vida mala" conserva la ambigüedad del griego entre maldad moral y condición miserable, sin estrechar el sentido a solo "miserable".
- source_word: τοῦ δὲ
  english_pob_choice: But for
  chosen_spanish: Pero para
  alternatives_spanish:
  - Y para
  - Mas para
  - Pero en cuanto a
  lexicon: LSJ
  rationale: δὲ introduce un contraste suave. "Pero para" es idiomático en español y mantiene el giro adversativo del enunciado sapiencial.
theological_decisions:
- issue: Tensión semántica de πονηρά en contexto sapiencial
  english_pob_reading: Retain 'evil' rather than reducing to purely experiential 'miserable.'
  chosen_spanish_reading: Mantener "mala" sin resolver del todo si el énfasis es moral o existencial.
  alternative_spanish_readings:
  - miserable
  - malvada
  - perversa
  rationale: El texto griego permite oír tanto la maldad como la miseria de una vida así. "Mala" preserva esa tensión sin imponer una sola lectura interpretativa.
  doctrine_reference: DOCTRINE.md §Translation philosophy 3
translation_notes:
  revision_awareness: Sin cambios respecto al último pase registrado; se mantiene la lectura existente con ajuste al español idiomático y a la ambigüedad lexical del griego.
  spanish_consistency_notes:
  - Se evita «SEÑOR» porque no aparece el nombre divino en este versículo.
  - «Neceo»/«insensato» se reservan para lenguaje sapiencial; aquí "necio" resulta más natural y fiel al tono.
  - La comparación final se formula con "peor que la muerte" para conservar el valor comparativo de ὑπέρ en español fluido.
