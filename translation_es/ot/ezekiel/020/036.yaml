translation:
  language: es
  text: Así como entré en juicio con sus padres en el desierto de la tierra de Egipto, así entraré en juicio con ustedes, declara el Señor Dios, Yahvé.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: כַּאֲשֶׁר
  english_pob_choice: Just as
  chosen_spanish: Así como
  alternatives_spanish:
  - Tal como
  - De la misma manera que
  lexicon: HALOT
  rationale: Marca una comparación de correspondencia entre la acción pasada y la futura. ‘Así como’ comunica con naturalidad en español la relación כַּאֲשֶׁר ... כֵּן.
- source_word: נִשְׁפַּטְתִּי
  english_pob_choice: I entered into judgment
  chosen_spanish: entré en juicio
  alternatives_spanish:
  - juzgué
  - litigué en juicio
  lexicon: HALOT
  rationale: Conserva el matiz judicial formal del Niphal de שׁפט sin sonar excesivamente literal en español. ‘Entré en juicio’ mantiene la idea de comparecer en un acto judicial o contencioso.
- source_word: אֶת אֲבוֹתֵיכֶם
  english_pob_choice: with your fathers
  chosen_spanish: con sus padres
  alternatives_spanish:
  - con sus antepasados
  - a sus padres
  lexicon: HALOT
  rationale: En español, con el verbo ‘entrar en juicio’ es más natural expresar la relación como ‘con sus padres’. ‘Sus padres’ reproduce el referente colectivo del hebreo y del inglés POB.
- source_word: בְּמִדְבַּר אֶרֶץ מִצְרָיִם
  english_pob_choice: in the wilderness of the land of Egypt
  chosen_spanish: en el desierto de la tierra de Egipto
  alternatives_spanish:
  - en el desierto de Egipto
  - en el desierto del país de Egipto
  lexicon: HALOT
  rationale: ‘Desierto’ es el equivalente idiomático de מִדְבָּר y ‘tierra de Egipto’ conserva los dos sustantivos del hebreo sin simplificar indebidamente la ubicación.
- source_word: כֵּן
  english_pob_choice: so
  chosen_spanish: así
  alternatives_spanish:
  - de igual manera
  - de la misma forma
  lexicon: HALOT
  rationale: Cierra la correspondencia de manera breve y clara, manteniendo el paralelismo con la primera mitad del versículo.
- source_word: אִשָּׁפֵט
  english_pob_choice: I will enter into judgment
  chosen_spanish: entraré en juicio
  alternatives_spanish:
  - juzgaré
  - litigaré en juicio
  lexicon: HALOT
  rationale: Se mantiene la correspondencia con נִשְׁפַּטְתִּי y el valor judicial formal del verbo. En español, repetir ‘entrar en juicio’ podría resultar pesado; ‘entraré en juicio’ conserva el sentido sin perder naturalidad.
- source_word: אִתְּכֶם
  english_pob_choice: with you
  chosen_spanish: con ustedes
  alternatives_spanish:
  - contra ustedes
  - junto con ustedes
  lexicon: HALOT
  rationale: La preposición hebrea admite una lectura judicial relacional; ‘con ustedes’ evita imponer una adversidad que el hebreo no expresa de forma directa.
- source_word: נְאֻם אֲדֹנָי יְהוִה
  english_pob_choice: declares the Lord GOD
  chosen_spanish: declara el Señor Yahvé
  alternatives_spanish:
  - declara el Señor Dios
  - oráculo del Señor Yahvé
  lexicon: HALOT
  rationale: Se traduce directamente el Tetragrama como ‘Yahvé’, conforme a la política del proyecto. ‘Señor Yahvé’ evita la redundancia de ‘Señor SEÑOR’ y conserva el valor solemne de la fórmula profética.
theological_decisions:
- issue: Tratamiento del nombre divino יְהוָה en la fórmula profética
  english_pob_reading: the Lord GOD
  chosen_spanish_reading: el Señor Yahvé
  alternative_spanish_readings:
  - Señor Yahvé
  - el Señor Dios
  rationale: El texto hebreo nombra explícitamente a Yahvé; la política del proyecto pide no ocultarlo con ‘SEÑOR’. Dado que אֲדֹנָי ya está presente, ‘Señor Yahvé’ preserva ambos títulos sin redundancia artificial.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Preservación del matiz judicial de שׁפט
  english_pob_reading: enter into judgment
  chosen_spanish_reading: entrar en juicio
  alternative_spanish_readings:
  - juzgar
  - litigar
  rationale: La POB inglesa conserva una formulación formal para reflejar el marco jurídico-covenantal. En español, ‘entrar en juicio’ reproduce ese matiz mejor que un simple ‘juzgar’, sin añadir una imagen doctrinal ajena.
  doctrine_reference: 'DOCTRINE.md: Judicial/covenantal language and prophetic lawsuit terminology'
translation_notes:
  revision_awareness: La revisión más reciente indicó que no hacía falta cambiar nada en el flujo de trabajo inglés; este borrador español sigue esa lectura de alta concordancia y mantiene el paralelismo judicial del original sin introducir glosas adicionales.
  spanish_consistency_notes:
  - Se mantiene ‘Yahvé’ para יְהוָה conforme al estándar del proyecto.
  - Se evita ‘SEÑOR’ como máscara del nombre divino.
  - ‘Entrar en juicio’ se usa de forma consistente para conservar el tono jurídico del hebreo.
  - El registro es solemne y publicable, pero en español natural y no calcado.
