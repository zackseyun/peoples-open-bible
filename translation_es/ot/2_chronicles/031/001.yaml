base_translation:
  language: en
  yaml_path: translation/ot/2_chronicles/031/001.yaml
  text: And when all this was finished[a], all Israel who were present went out to the cities of Judah and shattered the pillars, cut down the Asherim, and tore down the high places and the altars throughout all Judah and Benjamin, and in Ephraim and Manasseh, until they had completely destroyed them. Then all the sons of Israel returned, each man to his possession, to their cities.
  footnotes:
