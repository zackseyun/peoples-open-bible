    rationale: La rationale del borrador justifica «gergeseos» como si fuera equivalente, pero la forma adecuada para reflejar גִּרְגָּשִׁי es «girgaseos». Debe corregirse también la justificación léxica en el registro editorial, aunque aquí basta con reparar el texto.
  revised_spanish_text: y los amorreos, y los cananeos, y los girgaseos, y los jebuseos.
  revision_rationale: Se corrige únicamente el etnónimo הַגִּרְגָּשִׁי de «gergeseos» a «girgaseos» para preservar el referente hebreo y la decisión auditada en inglés («Girgashites»). No se requieren notas.
