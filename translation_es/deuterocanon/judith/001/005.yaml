translation:
  language: es
  text: Y en aquellos días el rey Nabucodonosor hizo guerra contra el rey Arfaxad en la gran llanura[a], es decir, en el territorio de Ragau.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «dentro de los límites de Ragau». El griego dice «en los límites/territorio de Ragau».
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐποίησεν πόλεμον
  english_pob_choice: made war
  chosen_spanish: hizo guerra
  alternatives_spanish:
  - declaró la guerra
  - entabló guerra
  lexicon: LSJ
  rationale: La expresión griega es un giro idiomático equivalente a 'hacer guerra'. 'Hizo guerra' conserva la cercanía formal al griego y suena natural en español. 'Declaró la guerra' introduce un matiz más específico que el texto no exige.
- source_word: ἐν ταῖς ἡμέραις ἐκείναις
  english_pob_choice: in those days
  chosen_spanish: en aquellos días
  alternatives_spanish:
  - durante aquellos días
  lexicon: LSJ
  rationale: La fórmula temporal se vierte de modo directo y bíblicamente natural en español como 'en aquellos días'. 'Aquellos' refleja el demostrativo de distancia del griego.
- source_word: βασιλεὺς Ναβουχοδονοσὸρ
  english_pob_choice: King Nebuchadnezzar
  chosen_spanish: el rey Nabucodonosor
  alternatives_spanish:
  - rey Nabucodonosor
  lexicon: LSJ
  rationale: Se mantiene el título real y se translitera el nombre conforme al uso bíblico en español. No se sustituye por una forma tradicional distinta porque el nombre ya está firmemente establecido en español.
- source_word: πρὸς βασιλέα Ἀρφαξὰδ
  english_pob_choice: against King Arphaxad
  chosen_spanish: contra el rey Arfaxad
  alternatives_spanish:
  - frente al rey Arfaxad
  - hacia el rey Arfaxad
  lexicon: LSJ
  rationale: En contexto de guerra, πρός expresa dirección hostil; 'contra' comunica mejor el valor adversativo. Se conserva el título 'rey' por claridad y fidelidad al griego.
- source_word: ἐν τῷ πεδίῳ τῷ μεγάλῳ
  english_pob_choice: in the great plain
  chosen_spanish: en la gran llanura
  alternatives_spanish:
  - en el gran campo
  - en la gran planicie
  lexicon: LSJ
  rationale: πεδίον designa un llano o llanura, y 'llanura' evita la ambigüedad de 'campo' en español. El adjetivo sigue al sustantivo de forma natural en español.
- source_word: τοῦτʼ ἔστιν
  english_pob_choice: that is
  chosen_spanish: es decir
  alternatives_spanish:
  - esto es
  - a saber
  lexicon: LSJ
  rationale: La locución explicativa se traduce con la equivalencia funcional natural 'es decir', que mantiene el matiz aclaratorio del griego.
- source_word: τοῖς ὁρίοις Ῥαγαῦ
  english_pob_choice: in the territory of Ragae
  chosen_spanish: en el territorio de Ragau
  alternatives_spanish:
  - dentro de los límites de Ragau
  - en las fronteras de Ragau
  lexicon: LSJ
  rationale: ὅρια puede significar límites, fronteras o territorio. 'Territorio' reproduce bien la localización geográfica amplia que implica la explicación. Se adopta 'Ragau' como transliteración española del topónimo griego.
translation_notes:
  revision_awareness: El texto griego y el inglés auditado concuerdan estrechamente; la principal decisión de traducción afectó ὅρια, donde el inglés opta por 'territory' y conserva como alternativa 'within the borders'. En español se refleja esa misma opción y se deja la alternativa en nota.
  spanish_consistency_notes:
  - Se usa 'Nabucodonosor' y 'Arfaxad' con la ortografía bíblica habitual en español.
  - Se mantiene la secuencia narrativa simple del original sin añadir elementos interpretativos.
  - '''Gran llanura'' traduce πεδίον con mayor precisión que ''campo'' en este contexto militar-geográfico.'
  - El topónimo final se translitera como 'Ragau' para seguir de cerca el griego y mantener consistencia con la forma española del lugar.
