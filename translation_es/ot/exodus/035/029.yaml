revisions:
- from: 'Todo hombre y mujer[a] cuyo corazón los movió a traer algo para toda la obra que Yahvé había mandado hacer por medio de Moisés: los hijos de Israel trajeron una ofrenda voluntaria a Yahvé[b][c].'
  to: 'Todo hombre o mujer[a] cuyo corazón los movió a traer algo para toda la obra que Yahvé había mandado hacer por medio de Moisés: los hijos de Israel trajeron una ofrenda voluntaria a Yahvé[b][c].'
  rationale: Se corrige la apertura para expresar de manera natural y fiel el distributivo hebreo («Todo hombre o mujer») y se reparan problemas gramaticales y de estilo en la nota [a], manteniendo intactas las decisiones léxicas y teológicas principales del borrador.
