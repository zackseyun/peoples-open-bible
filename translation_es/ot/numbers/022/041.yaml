translation:
  language: es
  text: Y por la mañana Balac tomó a Balaam y lo hizo subir a Bamot-baal[a], y desde allí vio el borde del pueblo[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «los altos de Baal», si la expresión se entiende de modo descriptivo y no como el nombre de lugar Bamot-baal.
    reason: alternative_reading
  - marker: b
    text: Es decir, desde allí solo era visible la parte más externa de Israel.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְהִי בַבֹּקֶר
  english_pob_choice: And in the morning
  chosen_spanish: Y por la mañana
  alternatives_spanish:
  - Y aconteció por la mañana
  - A la mañana siguiente
  lexicon: HALOT
  rationale: La fórmula narrativa marca la secuencia temporal; «por la mañana» expresa con naturalidad el valor de בַּבֹּקֶר sin volverla demasiado rígida ni añadir énfasis no explicitado.
- source_word: וַיִּקַּח
  english_pob_choice: took
  chosen_spanish: tomó
  alternatives_spanish:
  - tomó consigo
  - llevó
  lexicon: HALOT
  rationale: לקח se traduce de forma amplia como «tomó». En español, «tomó» conserva esa brevedad narrativa y no fuerza una especificación adicional.
- source_word: וַיַּעֲלֵהוּ
  english_pob_choice: brought him up
  chosen_spanish: lo hizo subir
  alternatives_spanish:
  - lo llevó arriba
  - lo subió
  lexicon: HALOT
  rationale: 'El hifil de עלה es causativo: «hacer subir» expresa bien la acción de conducirlo a un lugar elevado y mantiene la fuerza causativa del hebreo.'
- source_word: בָּמוֹת בָּעַל
  english_pob_choice: Bamoth-baal
  chosen_spanish: Bamot-baal
  alternatives_spanish:
  - los altos de Baal
  - Bamot Baal
  lexicon: HALOT
  rationale: Aquí la secuencia funciona como topónimo; por eso se translitera como nombre propio en lugar de traducirla descriptivamente en el cuerpo principal.
- source_word: וַיַּרְא
  english_pob_choice: he saw
  chosen_spanish: vio
  alternatives_spanish:
  - miró
  - contempló
  lexicon: HALOT
  rationale: ראה es el verbo ordinario «ver». En el contexto, el sujeto implícito sigue siendo Balaam, así que «vio» conserva la economía narrativa del hebreo.
- source_word: מִשָּׁם
  english_pob_choice: from there
  chosen_spanish: desde allí
  alternatives_spanish:
  - desde ese lugar
  lexicon: HALOT
  rationale: La expresión locativa es directa; «desde allí» reproduce con naturalidad el punto de vista desde el cual se observa.
- source_word: קְצֵה הָעָם
  english_pob_choice: the edge of the people
  chosen_spanish: el borde del pueblo
  alternatives_spanish:
  - el extremo del pueblo
  - la parte más externa del pueblo
  - el borde del campamento
  lexicon: HALOT
  rationale: קצה puede denotar borde, extremo o parte terminal. «Pueblo» mantiene el referente explícito del hebreo, sin añadir «campamento»; «borde» conserva la idea de solo una porción visible.
theological_decisions:
- issue: Topónimo versus frase descriptiva en Bamoth-baal
  english_pob_reading: The phrase is most likely a place name, though it could be read descriptively as 'the high places of Baal.'
  chosen_spanish_reading: 'Se mantiene como nombre de lugar: «Bamot-baal».'
  alternative_spanish_readings:
  - «los altos de Baal»
  - «los lugares altos de Baal»
  rationale: El audit trail inglés favorece el topónimo en el texto principal y reserva la lectura descriptiva como alternativa. En español conviene mantener esa misma distinción para no borrar la ambigüedad documentada.
  doctrine_reference: Toponimia bíblica y preservación de ambigüedad textual
- issue: Alcance visual de «קְצֵה הָעָם»
  english_pob_reading: That is, only the outermost part of Israel was visible from there.
  chosen_spanish_reading: «el borde del pueblo» permite inferir que solo una parte extrema de Israel era visible desde allí.
  alternative_spanish_readings:
  - «la parte más externa del pueblo»
  - «el extremo del pueblo»
  rationale: El hebreo dice literalmente «el borde/extremo del pueblo», y la nota inglesa aclara el alcance visual. En español se conserva la literalidad y se deja la explicación interpretativa en nota.
  doctrine_reference: Precisión semántica y contexto narrativo
translation_notes:
  revision_awareness: 'El texto español sigue el patrón del audit trail inglés: mantiene el topónimo Bamoth-baal/Bamot-baal como nombre propio en el cuerpo del verso y conserva la posibilidad descriptiva en nota; también reproduce la aclaración sobre el alcance de la visión, sin añadir elementos ajenos al hebreo.'
  spanish_consistency_notes:
  - Se usó «Yahvé» como terminología predeterminada solo cuando el texto lo requiera; este versículo no la contiene.
  - Se mantuvo «Bamot-baal» transliterado para preservar el valor de topónimo documentado en el análisis inglés.
  - «Pueblo» traduce הָעָם sin añadir «campamento», que no aparece en el hebreo.
  - La sintaxis busca fluidez bíblica en español sin desplazar la secuencia narrativa del hebreo.
