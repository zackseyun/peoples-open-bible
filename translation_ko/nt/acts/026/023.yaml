  - marker: b
    text: "'The people' here likely refers to the Jewish people, in contrast with 'the Gentiles.'"
    reason: lexical_alternative
  - marker: c
    text: "Or 'to the nations.' In this context the phrase commonly means the Gentiles."
    reason: lexical_alternative
  - marker: d
