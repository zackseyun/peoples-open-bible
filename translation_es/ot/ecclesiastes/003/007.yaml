translation:
  language: es
  text: tiempo de rasgar[a], y tiempo de coser; tiempo de guardar silencio[b], y tiempo de hablar;
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Posible alusión a rasgar vestiduras como señal de duelo, conmoción o luto; el hebreo no especifica el objeto.
    reason: cultural_note
  - marker: b
    text: O «tiempo de estar en silencio».
    reason: lexical_alternative
lexical_decisions:
- source_word: עֵת
  english_pob_choice: a time
  chosen_spanish: tiempo
  alternatives_spanish:
  - una ocasión
  - un momento
  - una temporada
  lexicon: HALOT
  rationale: עֵת designa un tiempo o momento determinado. «Tiempo» conserva la cadencia poética del paralelismo y funciona de manera natural en español sin introducir matices no presentes en el hebreo.
- source_word: לִקְרוֹעַ
  english_pob_choice: to tear
  chosen_spanish: rasgar
  alternatives_spanish:
  - desgarrar
  - romper
  - arrancar
  lexicon: HALOT
  rationale: קרע puede significar «rasgar» o «desgarrar», a menudo de vestiduras. «Rasgar» mantiene el sentido físico directo y sugiere la posible alusión cultural a rasgar prendas en duelo, sin especificar un objeto que el hebreo no nombra.
- source_word: לִתְפּוֹר
  english_pob_choice: to sew
  chosen_spanish: coser
  alternatives_spanish:
  - zurcir
  - remendar
  - tejer
  lexicon: HALOT
  rationale: תפר significa «coser». «Coser» conserva la antítesis inmediata con «rasgar» y evita interpretar la acción como «remendar», que añadiría una idea no expresada por el verbo.
- source_word: לַחֲשׁוֹת
  english_pob_choice: to keep silent
  chosen_spanish: callar
  alternatives_spanish:
  - guardar silencio
  - estar en silencio
  - quedarse callado
  lexicon: HALOT
  rationale: חשׁה significa callar o guardar silencio. «Callar» es breve, natural y poético en español; mantiene la idea de abstenerse de hablar sin suavizar el mandato implícito del paralelismo.
- source_word: לְדַבֵּר
  english_pob_choice: to speak
  chosen_spanish: hablar
  alternatives_spanish:
  - decir
  - pronunciar
  - expresarse
  lexicon: HALOT
  rationale: דבר es el verbo común «hablar / hablarer». «Hablar» es claro y digno en español; aunque «decir» es posible, sería menos fiel al valor general del verbo en el paralelismo con el silencio.
theological_decisions:
- issue: Posible alusión cultural en «rasgar»
  english_pob_reading: The phrase 'to tear' may allude to tearing garments as a sign of grief, shock, or mourning, though the object is not stated in the Hebrew.
  chosen_spanish_reading: «rasgar» deja abierta la posible alusión a rasgar vestiduras como signo de duelo, conmoción o luto, sin explicitarla en el texto principal.
  alternative_spanish_readings:
  - «desgarrar» podría sonar más intenso, pero no añade claridad lexical suficiente
  - «romper» sería más general, pero pierde la probable referencia cultural
  rationale: El hebreo no menciona el objeto; por eso conviene mantener una traducción verbal amplia y añadir la nota cultural como posibilidad, no como certeza.
  doctrine_reference: Ecclesiastes 3:7; cultural note on mourning gestures in the Hebrew Bible
- issue: Alternativa lexical de לַחֲשׁוֹת
  english_pob_reading: Or 'a time to be silent.'
  chosen_spanish_reading: «tiempo de callar» connota la misma alternativa que «tiempo de estar en silencio», sin duplicar la línea principal.
  alternative_spanish_readings:
  - «tiempo de estar en silencio»
  - «tiempo de guardar silencio»
  rationale: En español, «callar» es la forma más breve y natural para expresar la alternativa lexical que el inglés POB preservó. La nota recoge la equivalencia sin introducir una formulación pesada en el verso.
  doctrine_reference: Ecclesiastes 3:7; lexical alternative for חשׁה
translation_notes:
  revision_awareness: El pasaje muestra acuerdo alto entre la base hebrea y el audit trail inglés; no hubo revisiones aplicadas en la versión inglesa más reciente, así que la traducción española sigue de cerca la estructura paralela del hebreo y conserva la ambigüedad cultural de «rasgar».
  spanish_consistency_notes:
  - Se mantiene la repetición de «tiempo» para reflejar el paralelismo hebreo.
  - Se eligieron verbos breves y coordinables para preservar el ritmo poético.
  - No se introdujo un equivalente tradicional como «SEÑOR» ni terminología doctrinal ajena al verso.
  - La nota b se formula como alternativa lexical real, no como paráfrasis interpretativa.
