translation:
  language: es
  text: En el año dieciocho del reinado de Josías, se celebró[a] esta Pascua.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'se observó'; o más literalmente, 'se hizo'.
    reason: lexical_alternative
lexical_decisions:
- source_word: בִּ/שְׁמוֹנֶה עֶשְׂרֵה שָׁנָה
  english_pob_choice: In the eighteenth year
  chosen_spanish: En el año dieciocho
  alternatives_spanish:
  - En el año decimoctavo
  - En el año dieciocho
  lexicon: HALOT
  rationale: El hebreo usa una fórmula temporal regnal idiomática. En español, 'En el año dieciocho' comunica con claridad el dato cronológico sin forzar una estructura más pesada; 'decimoctavo' también sería válido, pero aquí 'dieciocho' mantiene el tono sencillo del aviso histórico.
- source_word: לְ/מַלְכ֖וּת יֹאשִׁיָּהוּ
  english_pob_choice: of Josiah’s reign
  chosen_spanish: del reinado de Josías
  alternatives_spanish:
  - de la realeza de Josías
  - del gobierno de Josías
  lexicon: HALOT
  rationale: מַלְכוּת refiere al período de gobierno real. 'Reinado' es la equivalencia natural y precisa en español, y conserva la relación temporal sin introducir matices ajenos.
- source_word: נַעֲשָׂה
  english_pob_choice: was kept
  chosen_spanish: se celebró
  alternatives_spanish:
  - se hizo
  - fue observado
  - se guardó
  lexicon: HALOT
  rationale: Con פֶּסַח, el verbo 'hacerse' en hebreo alude a la observancia de la Pascua. En español, 'se celebró' comunica esa realización ritual de modo natural, aunque 'fue observado' o 'se guardó' también reflejarían la idea de 'was kept' / 'was observed'.
- source_word: הַ/פֶּסַח
  english_pob_choice: Passover
  chosen_spanish: la Pascua
  alternatives_spanish:
  - el Pascua
  - la fiesta de Pascua
  lexicon: HALOT
  rationale: פֶּסַח se traduce de forma estándar como 'la Pascua'. En español bíblico y eclesial, este término es claro y fiel, sin ampliar innecesariamente el sustantivo.
- source_word: הַ/זֶּה
  english_pob_choice: this
  chosen_spanish: este
  alternatives_spanish:
  - esta
  - este mismo
  lexicon: HALOT
  rationale: El demostrativo retoma la Pascua específica mencionada en el contexto. En español debe concordar con 'Pascua' como sustantivo femenino, por eso se traduce 'esta' en sentido referencial; aquí se mantiene la deíxis del hebreo.
theological_decisions:
- issue: 'Valor del verbo con פֶּסַח: ''hacer'' vs. ''celebrar/guardar/observar'''
  english_pob_reading: '''this Passover was kept'' with a note allowing ''was observed'' or literally ''was done'''
  chosen_spanish_reading: '''se celebró esta Pascua'''
  alternative_spanish_readings:
  - '''se observó esta Pascua'''
  - '''se guardó esta Pascua'''
  - '''se hizo esta Pascua'''
  rationale: El hebreo נַעֲשָׂה es literalmente 'fue hecha/hecho', pero con פֶּסַח funciona como fórmula de observancia ritual. En español, 'se celebró' expresa esa observancia sin perder la tensión entre literalidad y sentido idiomático. Se preserva la posibilidad de leerlo como acto cultual concreto, no como mero evento abstracto.
  doctrine_reference: Observancia de la Pascua como rito de pacto en el AT
translation_notes:
  revision_awareness: 'Se siguió el audit trail en el punto clave del verbo נַעֲשָׂה con פֶּסַח: el inglés opta por ''was kept'' y conserva alternativas literales/rituales. El español adopta ''se celebró'' como equivalente natural, manteniendo la nota de alternativa literal para no borrar la tensión semántica.'
  spanish_consistency_notes:
  - Se usó 'Yosías' como 'Josías' por la forma española estándar del nombre.
  - Se mantuvo 'Pascua' como término bíblico establecido en español.
  - La concordancia deíctica se resolvió con 'esta' en referencia a 'Pascua'; el conjunto de la frase conserva el carácter de crónica regnal breve.
