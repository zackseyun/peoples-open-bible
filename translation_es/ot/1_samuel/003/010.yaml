revisions:
- from: 'Entonces Yahvé[a] vino y se quedó allí, y llamó como en las otras ocasiones: «¡Samuel, Samuel!». Y Samuel dijo: «Habla, porque tu esclavo está escuchando».'
  to: 'Entonces Yahvé vino y estuvo allí, y llamó como en las otras ocasiones[a]: «¡Samuel, Samuel!». Y Samuel dijo: «Habla, porque tu siervo está escuchando».'
  rationale: Se corrige «se quedó allí» a «estuvo allí» para reflejar mejor la acción concreta de וַיִּתְיַצַּב sin suavizarla; se cambia «tu esclavo» por «tu siervo» siguiendo la decisión contextual documentada para עַבְדֶּךָ en este versículo; y se reubica la nota al lugar pertinente, la expresión comparativa «como en las otras ocasiones».
