translation:
  language: es
  text: Y el sexto día[a], cuando preparen lo que traigan, será el doble de lo que recogen cada día.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «será una porción doble de lo que recogen cada día».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהָיָה
  english_pob_choice: And ... it will be
  chosen_spanish: Y ... será
  alternatives_spanish:
  - Y ... acontecerá
  - Y ... habrá
  lexicon: HALOT
  rationale: El hebreo introduce una circunstancia futura o resultativa; en español, "será" comunica de forma natural ese valor prospectivo sin forzar un calco con "acontecerá" ni volver la frase pesada con "habrá".
- source_word: בַּיּוֹם הַשִּׁשִּׁי
  english_pob_choice: on the sixth day
  chosen_spanish: en el sexto día
  alternatives_spanish:
  - el sexto día
  - para el sexto día
  lexicon: HALOT
  rationale: La preposición temporal se expresa con naturalidad en español con "en". No se añade "de la semana" porque no está explícito en el hebreo.
- source_word: וְהֵכִינוּ
  english_pob_choice: when they prepare
  chosen_spanish: cuando preparen
  alternatives_spanish:
  - y prepararán
  - cuando preparen
  lexicon: HALOT
  rationale: En este contexto instructivo, el perfecto con waw funciona como circunstancia temporal. "Cuando preparen" preserva ese valor sin sonar mecánico.
- source_word: אֵת אֲשֶׁר יָבִיאוּ
  english_pob_choice: what they bring in
  chosen_spanish: lo que traigan
  alternatives_spanish:
  - lo que introduzcan
  - lo que lleven
  lexicon: HALOT
  rationale: El conjunto refiere a lo recogido y llevado consigo. "Traigan" reproduce bien la idea de traer consigo el producto de la recolección; "introduzcan" sería demasiado técnico y "lleven" pierde el matiz de aportar de regreso.
- source_word: וְהָיָה מִשְׁנֶה
  english_pob_choice: it will be twice as much
  chosen_spanish: será dos veces tanto
  alternatives_spanish:
  - será el doble
  - será una porción doble
  lexicon: HALOT
  rationale: מִשְׁנֶה denota duplicación cuantitativa. "Dos veces tanto" conserva la comparación explícita del hebreo y evita cerrar la frase sólo en una expresión idiomática más interpretativa como "el doble".
- source_word: עַל אֲשֶׁר יִלְקְטוּ
  english_pob_choice: as what they gather
  chosen_spanish: como lo que recojan
  alternatives_spanish:
  - que lo que recojan
  - sobre lo que recojan
  lexicon: HALOT
  rationale: El valor comparativo de עַל se expresa naturalmente con "como" en español en este tipo de medida. "Recojan" mantiene el campo semántico de לקט en el contexto del maná.
- source_word: יוֹם יוֹם
  english_pob_choice: day by day
  chosen_spanish: día por día
  alternatives_spanish:
  - cada día
  - diariamente
  lexicon: HALOT
  rationale: La repetición distributiva se conserva mejor con "día por día", que refleja el ritmo hebreo y evita aplanar el matiz con una sola palabra adverbial.
translation_notes:
  revision_awareness: El texto inglés auditado pasó de «double what they gather» a «twice as much as what they gather» para ganar naturalidad y precisión. La versión española sigue esa revisión con una comparación cuantitativa explícita, evitando tanto un calco rígido como una paráfrasis más interpretativa que el hebreo.
  spanish_consistency_notes:
  - Se mantiene "Yahvé" como forma de la traducción POB para el nombre divino cuando aparezca; en este versículo no aparece.
  - Se usa un registro bíblico moderno y claro, evitando arcaísmos innecesarios.
  - '"Recojan" y "traigan" preservan el contexto de recolección del maná sin introducir vocabulario eclesiástico ajeno al pasaje.'
