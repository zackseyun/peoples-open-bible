translation:
  language: es
  text: Entonces lo tomaron y lo arrojaron al pozo[a]. Y el pozo estaba vacío; no había agua en él.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «cisterna» o «fosa»; el hebreo bór puede referirse a un pozo de agua, una cisterna o una fosa. Aquí la mención de que no había agua en él hace plausible «cisterna».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּקָּחֻהוּ
  english_pob_choice: Then they took him
  chosen_spanish: Entonces lo tomaron
  alternatives_spanish:
  - Y lo tomaron
  - Así que lo tomaron
  - Entonces lo llevaron
  lexicon: HALOT
  rationale: וַ-consecutivo avanza la narración; «Entonces» comunica bien ese avance en español. «Tomaron» conserva el sentido básico de לקח sin añadir violencia extra. Mantener el objeto clítico «lo» preserva la referencia explícita a José.
- source_word: וַיַּשְׁלִכוּ אֹתוֹ
  english_pob_choice: and threw him
  chosen_spanish: y lo arrojaron
  alternatives_spanish:
  - y lo echaron
  - y lo lanzaron
  - y lo tiraron
  lexicon: HALOT
  rationale: השליך expresa arrojar/echar con fuerza. «Arrojaron» conserva el tono más violento del verbo mejor que «tiraron», y es más sobrio que «lanzaron».
- source_word: הַבֹּרָה
  english_pob_choice: into the pit
  chosen_spanish: a la cisterna
  alternatives_spanish:
  - al pozo
  - a la fosa
  - al hoyo
  lexicon: HALOT
  rationale: בּוֹר puede ser pozo, cisterna o fosa. El contexto «no había agua en ella» favorece una cisterna seca; por eso se adopta «cisterna» como opción más precisa, manteniendo la nota de alternativa léxica.
- source_word: וְהַבּוֹר רֵק
  english_pob_choice: Now the pit was empty
  chosen_spanish: Ahora la cisterna estaba vacía
  alternatives_spanish:
  - Y la cisterna estaba vacía
  - Pero la cisterna estaba vacía
  lexicon: HALOT
  rationale: El waw funciona de forma explicativa o de trasfondo; «Ahora» refleja mejor ese valor que una simple «y». «Vacía» traduce רֵק de manera directa y natural.
- source_word: אֵין בּוֹ מָיִם
  english_pob_choice: there was no water in it
  chosen_spanish: no había agua en ella
  alternatives_spanish:
  - no tenía agua
  - no había agua dentro
  lexicon: HALOT
  rationale: La cláusula explica en qué sentido estaba vacía. «No había agua en ella» conserva la referencia al recipiente femenino implícito en «cisterna» y reproduce la negación existencial de forma idiomática.
translation_notes:
  revision_awareness: El texto inglés POB y su aparato crítico muestran alta concordancia y no presentan revisiones aplicadas; la decisión principal en español es precisar בור como «cisterna» por el contexto de ausencia de agua, manteniendo la alternativa «pozo» en nota.
  spanish_consistency_notes:
  - Se mantiene el registro narrativo sencillo y directo.
  - «Cisterna» se usa de manera coherente con el contexto acuoso-seco del versículo.
  - No se introduce ninguna carga interpretativa adicional más allá de la alternativa léxica documentada.
