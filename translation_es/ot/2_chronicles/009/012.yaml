base_translation:
  language: en
  yaml_path: translation/ot/2_chronicles/009/012.yaml
  text: And King Solomon gave the queen of Sheba all that she desired[a], whatever she asked, besides what she had brought to the king. Then she turned and went to her own land[b], she and her servants.
  footnotes:
  - marker: a
    text: Or 'apart from what she had brought to the king.' The Hebrew phrase may be understood as distinguishing Solomon's gifts from the gifts the queen had brought him.
    reason: lexical_alternative
  - marker: b
    text: Or 'she returned and went to her land.' The Hebrew literally says 'she turned and went.'
    reason: lexical_alternative
