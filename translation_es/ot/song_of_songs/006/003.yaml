translation:
  language: es
  text: Soy de mi amado, y mi amado es mío, que pasta[a] entre los lirios.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'que pastorea entre los lirios' o 'que apacienta entre los lirios'. El participio hebreo puede denotar pastar, apacentar o pastorear.
    reason: lexical_alternative
lexical_decisions:
- source_word: אֲנִי
  english_pob_choice: I
  chosen_spanish: Yo soy
  alternatives_spanish:
  - Soy
  lexicon: HALOT
  rationale: El hebreo abre con un pronombre enfático y una cláusula nominal. En español, 'Yo soy' conserva la fuerza enfática y la construcción breve del verso.
- source_word: לְדוֹדִי
  english_pob_choice: my beloved's
  chosen_spanish: de mi amado
  alternatives_spanish:
  - para mi amado
  - a mi amado
  - mi amado
  lexicon: HALOT
  rationale: El ל posesivo en esta fórmula poética se expresa de manera natural en español con 'de'. 'Amado' preserva el tono afectivo y elegante del término hebreo.
- source_word: וְדוֹדִי לִי
  english_pob_choice: and my beloved is mine
  chosen_spanish: y mi amado es mío
  alternatives_spanish:
  - y mi amado me pertenece
  - y mi amado es para mí
  lexicon: HALOT
  rationale: La cláusula nominal recíproca se traduce con 'es mío' para mantener el paralelismo y la relación de pertenencia sin añadir más de lo que dice el hebreo.
- source_word: הָרֹעֶה
  english_pob_choice: who grazes
  chosen_spanish: el que apacienta
  alternatives_spanish:
  - el que pastorea
  - el que pace
  - el que alimenta
  lexicon: HALOT
  rationale: El participio qal de רעה puede abarcar pastar, apacentar o pastorear. 'Apacienta' conserva el campo pastoral en español y permite la ambigüedad de acción sin exigir un objeto explícito.
- source_word: בַּשׁוֹשַׁנִּים
  english_pob_choice: among the lilies
  chosen_spanish: entre los lirios
  alternatives_spanish:
  - entre las flores
  - entre los lotos
  lexicon: HALOT
  rationale: La preposición ב en este marco poético se expresa de modo idiomático con 'entre'. 'Lirios' mantiene la imagen floral recurrente del Cantar.
theological_decisions:
- issue: Lenguaje relacional y poético del Cantar
  english_pob_reading: Retain the poetic mutual-belonging language without allegorical expansion.
  chosen_spanish_reading: Conservar el lenguaje de mutua pertenencia sin expansión alegórica.
  alternative_spanish_readings:
  - Interpretar al amado como Dios o el Mesías en la traducción
  - Suavizar el lenguaje amoroso para hacerlo más devocional
  rationale: El hebreo presenta una afirmación recíproca entre amantes. La traducción debe preservar ese sentido poético y no introducir una lectura alegórica en el texto principal.
  doctrine_reference: Principio de primacía del idioma original; preservar la tensión interpretativa en lugar de resolverla en la traducción.
translation_notes:
  revision_awareness: 'Se siguió el trazado inglés más reciente: se mantuvo la cláusula relativa simple ''who grazes'' en su función semántica, pero se optó por un español más natural y sobrio (''el que apacienta''), sin añadir ''su rebaño'' ni resolver la ambigüedad léxica del participio hebreo.'
  spanish_consistency_notes:
  - Se evitó 'SEÑOR' y toda sustitución reverencial innecesaria porque el verso no contiene el nombre divino.
  - '''Amado'' se mantuvo de forma consistente para דוֹדִי, evitando ''lover'' o ''esposo'' por no estar sustentados por el contexto inmediato.'
  - '''Entre los lirios'' conserva la imagen poética y no normaliza a ''flores'', que sería una generalización innecesaria.'
