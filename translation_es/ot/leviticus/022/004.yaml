base_translation:
  language: en
  yaml_path: translation/ot/leviticus/022/004.yaml
  text: Any man from the offspring of Aaron[a], if he is afflicted with a skin disease or has a discharge, shall not eat from the holy things until he becomes clean. And whoever touches anything unclean by a dead person, or a man from whom an emission of semen comes out[b],
  footnotes:
  - marker: a
    text: Traditionally, 'leprous.' The Hebrew term refers broadly to a ritually defiling skin condition, not necessarily to modern leprosy (Hansen's disease).
    reason: lexical_alternative
  - marker: b
    text: Or 'any person made unclean by a dead body.' The Hebrew expression is idiomatic for corpse-related impurity.
    reason: lexical_alternative
