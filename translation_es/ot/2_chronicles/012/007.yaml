  glossary_alignment: Alinea correctamente יְהוָה > «Yahvé», נכנעו > «se habían humillado / se han humillado», שׁחת > «destruiré», חמה > «ira», y conserva «por mano de Sisac» de forma inteligible. La única mejora léxica recomendada es ajustar כִּמְעַט לִפְלֵיטָה a una expresión española más natural que mantenga el matiz de rescate limitado.
