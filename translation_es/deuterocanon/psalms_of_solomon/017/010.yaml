translation:
  language: es
  text: Según sus pecados tú les retribuirás, oh Dios; que sean hallados[a] según sus obras.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Literalmente: «que sea hallado para ellos según sus obras».'
    reason: lexical_alternative
lexical_decisions:
- source_word: κατὰ
  english_pob_choice: according to
  chosen_spanish: según
  alternatives_spanish:
  - de acuerdo con
  - conforme a
  lexicon: BDAG
  rationale: Con acusativo en ambas cláusulas, κατά expresa medida o norma. «Según» comunica bien esa proporción en español y mantiene el paralelismo de la línea griega.
- source_word: ἁμαρτήματα
  english_pob_choice: sins
  chosen_spanish: pecados
  alternatives_spanish:
  - faltas
  - ofensas
  - actos pecaminosos
  lexicon: BDAG
  rationale: «Pecados» es el equivalente natural y directo en español para el plural moral del griego, sin suavizar su peso.
- source_word: ἀποδώσεις
  english_pob_choice: you will repay
  chosen_spanish: tú les pagarás
  alternatives_spanish:
  - tú les retribuirás
  - tú les darás pago
  - tú les devolverás
  lexicon: BDAG
  rationale: El verbo expresa retribución divina. «Pagarás» conserva la idea de dar a cada uno lo que corresponde; el objeto indirecto «les» mantiene la referencia a ellos.
- source_word: ὁ θεός
  english_pob_choice: O God
  chosen_spanish: oh Dios
  alternatives_spanish:
  - Dios
  - oh, Dios
  lexicon: BDAG
  rationale: Aunque formalmente nominativo, funciona como vocativo. «Oh Dios» conserva la dirección orante del texto.
- source_word: εὑρεθείη
  english_pob_choice: may they be found
  chosen_spanish: que sean hallados
  alternatives_spanish:
  - que les sea hallado
  - que se les encuentre
  lexicon: BDAG
  rationale: La optativa pasiva es literalmente «que sean hallados / encontrados». En español, «que sean hallados» preserva mejor la literalidad que una paráfrasis como «que reciban».
- source_word: ἔργα
  english_pob_choice: works
  chosen_spanish: obras
  alternatives_spanish:
  - hechos
  - acciones
  - obras realizadas
  lexicon: BDAG
  rationale: «Obras» reproduce con fidelidad el término griego y encaja con la fórmula retributiva del paralelismo.
translation_notes:
  revision_awareness: La versión española sigue de cerca la revisión final del inglés POB, que cambió la segunda cláusula de una idea de “recibir” a la literalidad de εὑρεθείη (“ser hallados”). Por eso se evita una paráfrasis interpretativa y se conserva una construcción pasiva formal en español.
  spanish_consistency_notes:
  - Se mantiene «Dios» con vocativo explícito, acorde con el griego.
  - «Pecados» y «obras» conservan el paralelismo moral y retributivo del texto.
  - La nota al pie refleja la alternativa literal que el inglés POB preservó en su aparato auditado.
