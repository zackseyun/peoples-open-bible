revisions:
- from: Puesto que conoces cada una de estas cosas[a], oh rey, presta también atención a la tierra y a nuestro pueblo, que está acosado[b], conforme a la benevolencia amable que tienes para con todos.
  to: Puesto que conoces cada una de estas cosas, oh rey, presta también atención al país y a nuestra nación[a], que está acosada, conforme a la bondad benévola[b] que tienes para con todos.
