translation:
  language: es
  text: Es una ofrenda por la culpa[a]; ciertamente ha incurrido en culpa contra Yahvé.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'El hebreo repite el mismo radical אשם para énfasis: sustantivo («culpa/ofrenda por la culpa») y verbo («incurrir en culpa»).'
    reason: lexical_alternative
lexical_decisions:
- source_word: אָשָׁם
  english_pob_choice: guilt offering
  chosen_spanish: ofrenda por la culpa
  alternatives_spanish:
  - ofrenda de reparación
  - ofrenda por la culpa y reparación
  - culpa
  lexicon: HALOT
  rationale: En contexto sacrificial, אָשָׁם nombra una ofrenda específica ligada a culpa/reparación. «Ofrenda por la culpa» conserva la función cultual sin perder la conexión semántica con el sustantivo hebreo. Se evita «culpa» a secas porque borraría el matiz de sacrificio.
- source_word: הוּא
  english_pob_choice: It is
  chosen_spanish: Es
  alternatives_spanish:
  - Esto es
  - Se trata de
  lexicon: HALOT
  rationale: 'El pronombre funciona de modo predicativo para identificar la ofrenda. En español basta el verbo copulativo: «Es una ofrenda por la culpa».'
- source_word: אָשֹׁם אָשַׁם
  english_pob_choice: has indeed incurred guilt
  chosen_spanish: ciertamente ha incurrido en culpa
  alternatives_spanish:
  - es ciertamente culpable
  - ha cometido una transgresión
  - ha incurrido sin duda en culpa
  lexicon: HALOT
  rationale: La repetición intensiva del mismo radical expresa énfasis. «Ciertamente ha incurrido en culpa» preserva el valor enfático y la idea de responsabilidad/culpabilidad sin forzar un calco verbal incómodo.
- source_word: לַיהוָה
  english_pob_choice: against the LORD
  chosen_spanish: contra Yahvé
  alternatives_spanish:
  - ante Yahvé
  - para Yahvé
  - respecto de Yahvé
  lexicon: HALOT
  rationale: El audit trail inglés corrigió la versión más neutral hacia «against the LORD» por la fuerza de culpabilidad de ל. En español, «contra Yahvé» expresa mejor esa relación de culpa que «ante Yahvé», que sería más débil y meramente forense.
- source_word: יהוה
  english_pob_choice: the LORD
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: Siguiendo el estándar del proyecto, el tetragrámaton se vierte como «Yahvé» en el texto principal, no como una máscara reverencial.
theological_decisions:
- issue: Relación entre la ofrenda por la culpa y la culpa contra Yahvé
  english_pob_reading: The offender's guilt is stated as liability in relation to Yahweh; the verse grounds the sacrifice in real culpability.
  chosen_spanish_reading: La frase declara tanto la naturaleza sacrificial de la ofrenda como la realidad de la culpa del ofensor en relación con Yahvé.
  alternative_spanish_readings:
  - Es una ofrenda perteneciente a Yahvé; ciertamente ha incurrido en culpa.
  - Es una ofrenda por la culpa; ciertamente ha pecado delante de Yahvé.
  rationale: La construcción hebrea enlaza el sustantivo de ofrenda con la repetición intensiva del verbo de culpa. Traducir «contra Yahvé» mantiene la fuerza relacional y jurídica de la cláusula final, sin diluirla en una mera dedicación cultual.
  doctrine_reference: Levítico 5:19; expiación y culpa ritual/covenantal
translation_notes:
  revision_awareness: 'El audit trail inglés pasó de una formulación más neutra a otra más fuerte en la relación con Yahvé: de «before the LORD» a «against the LORD». La presente versión sigue esa revisión y la hace visible en español mediante «contra Yahvé».'
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» como forma principal para יהוה, conforme a la terminología del proyecto.
  - Se eligió «ofrenda por la culpa» para preservar el carácter técnico del sacrificio sin confundirlo con la culpa misma.
  - No se usó «Cristo» ni terminología neotestamentaria; el texto es puramente levítico y jurídico-cultual.
  - La repetición intensiva del hebreo se refleja en la puntuación y en el adverbio «ciertamente», no en una redundancia artificial en español.
