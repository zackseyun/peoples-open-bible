translation:
  language: es
  text: Pero solo en el año dieciocho del reinado del rey Josías fue celebrada esta Pascua para Yahvé en Jerusalén[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «fue hecha»; es decir, «fue celebrada» u «observada».'
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי אִם
  english_pob_choice: but only
  chosen_spanish: pero solo
  alternatives_spanish:
  - sino solo
  - excepto que
  - más bien, solo
  lexicon: HALOT
  rationale: La pareja adversativa-exceptiva expresa una restricción respecto de lo dicho antes; en español, "pero solo" comunica bien esa limitación sin endurecer el estilo ni perder el contraste.
- source_word: בִּשְׁמֹנֶה עֶשְׂרֵה שָׁנָה
  english_pob_choice: in the eighteenth year
  chosen_spanish: en el año dieciocho
  alternatives_spanish:
  - en el año decimoctavo
  - en el decimoctavo año
  lexicon: HALOT
  rationale: La expresión temporal hebrea se vierte de manera natural en español como "en el año dieciocho"; también es posible el ordinal explícito, pero esta forma suena más fluida y mantiene el sentido regnal.
- source_word: לַמֶּלֶךְ יֹאשִׁיָּהוּ
  english_pob_choice: of King Josiah
  chosen_spanish: del rey Josías
  alternatives_spanish:
  - de rey Josías
  - del rey, Josías
  lexicon: HALOT
  rationale: La referencia al año de reinado se expresa idiomáticamente en español con "del rey Josías". Se conserva el nombre propio en forma castellana estándar, Jesús/Josías no aplica aquí; se usa Josías por transliteración bíblica tradicional y clara.
- source_word: נַעֲשָׂה
  english_pob_choice: was kept
  chosen_spanish: fue celebrada
  alternatives_spanish:
  - fue hecha
  - fue observada
  - se hizo
  lexicon: HALOT
  rationale: El verbo hebreo es literalmente "fue hecha/hecha"; con Pascua como sujeto, el sentido natural en español es que la fiesta se celebró. "Fue celebrada" mantiene la pasiva y respeta la observación ritual sin diluir el valor verbal del original.
- source_word: הַפֶּסַח הַזֶּה
  english_pob_choice: this Passover
  chosen_spanish: esta Pascua
  alternatives_spanish:
  - esta fiesta de Pascua
  - este Pesaj
  lexicon: HALOT
  rationale: '"Pascua" es el equivalente español asentado y suficientemente preciso. Se evita añadir "fiesta" en el texto principal porque el hebreo ya nombra la celebración de forma compacta.'
- source_word: לַיהוָה
  english_pob_choice: for Yahweh
  chosen_spanish: para Yahvé
  alternatives_spanish:
  - a Yahvé
  - en honor de Yahvé
  lexicon: HALOT
  rationale: 'Se sigue la norma del proyecto para el Tetragrámaton: "Yahvé" en el texto principal. La preposición "para" conserva la idea de dedicación/relación cultual del hebreo לְ sin forzar una lectura exclusivamente direccional.'
- source_word: בִּירוּשָׁלִָם
  english_pob_choice: in Jerusalem
  chosen_spanish: en Jerusalén
  alternatives_spanish:
  - en la ciudad de Jerusalén
  lexicon: HALOT
  rationale: Se traduce con el topónimo español estándar "Jerusalén", que es claro y natural en registro bíblico.
theological_decisions:
- issue: Nombre divino יְהוָה / YHWH
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Señor
  - Yahweh
  rationale: El texto hebreo usa el Tetragrámaton de manera directa; conforme a la política del proyecto, se preserva el nombre del pacto como "Yahvé" en español. Se evita el sustituto litúrgico "Señor" en el texto principal para no ocultar el nombre propio del pasaje.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Sentido de נַעֲשָׂה con Pascua como sujeto
  english_pob_reading: was kept
  chosen_spanish_reading: fue celebrada
  alternative_spanish_readings:
  - fue hecha
  - fue observada
  rationale: Aunque la forma verbal es literalmente pasiva de "hacer", el contexto ritual exige expresar que la Pascua se celebró. "Fue celebrada" mantiene la fuerza pasiva y evita una traducción mecánica que sonaría extraña o ambigua en español.
  doctrine_reference: 'Principio de equivalencia óptima: preservar el acto ritual sin borrar la pasiva hebrea'
translation_notes:
  revision_awareness: Se tomó como base el texto hebreo masorético provisto y el aparato de auditoría en inglés. No se introdujeron variantes textuales ni cambios de sentido respecto del consenso alto del registro fuente. La principal decisión de español fue mantener el nombre divino como Yahvé y verter נַעֲשָׂה de modo natural como "fue celebrada", con nota que conserva la literalidad hebrea.
  spanish_consistency_notes:
  - Se mantiene "Yahvé" para יְהוָה conforme a la terminología del proyecto.
  - '"Pascua" se usa como equivalente bíblico estándar en español, sin añadir glosas innecesarias en el texto principal.'
  - La pasiva española "fue celebrada" conserva la relación entre el sujeto ritual y la acción verbal hebrea.
  - Se conserva un registro reverente, claro y apto para lectura eclesial amplia.
