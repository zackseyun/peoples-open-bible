id: OBA.1.18
reference: Obadiah 1:18
source:
  edition: WLC
  text: וְ/הָיָה֩ בֵית יַעֲקֹ֨ב אֵ֜שׁ וּ/בֵ֧ית יוֹסֵ֣ף לֶהָבָ֗ה וּ/בֵ֤ית עֵשָׂו֙ לְ/קַ֔שׁ וְ/דָלְק֥וּ בָ/הֶ֖ם וַ/אֲכָל֑וּ/ם וְ/לֹֽא יִֽהְיֶ֤ה שָׂרִיד֙ לְ/בֵ֣ית עֵשָׂ֔ו כִּ֥י יְהוָ֖ה דִּבֵּֽר־־׃
translation:
  text: The house of Jacob will be a fire[a], and the house of Joseph a flame, and the house of Esau stubble. They will burn them and consume them, and there will be no survivor for the house of Esau[b], for Yahweh has spoken.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'They will set them ablaze and consume them.' The Hebrew of 'burn among them' is compact and may be understood more directly as hostile burning against the house of Esau.
    reason: lexical_alternative
  - marker: b
    text: Or 'no remnant.' Hebrew שָׂרִיד can mean 'survivor' or 'remnant'; 'survivor' is used here to avoid implying a preserved remnant of Esau in a verse announcing total destruction.
    reason: lexical_alternative
lexical_decisions:
- source_word: בֵית יַעֲקֹב
  chosen: the house of Jacob
  alternatives:
  - Jacob’s house
  - the household of Jacob
  lexicon: HALOT
  rationale: Rendered literally as 'house of Jacob' to preserve the corporate/familial-national sense of בֵית with a patriarchal name. 'Household' is possible but can sound too domestic; 'house' better preserves the prophetic idiom for a people or dynasty.
- source_word: אֵשׁ
  chosen: a fire
  alternatives:
  - fire
  lexicon: HALOT
  rationale: Indefinite in English fits the predicate construction and preserves the metaphor of destructive power without over-specifying.
- source_word: בֵית יוֹסֵף
  chosen: the house of Joseph
  alternatives:
  - Joseph’s house
  - the household of Joseph
  lexicon: HALOT
  rationale: Kept parallel with 'house of Jacob.' In prophetic usage this refers corporately to Joseph/Ephraim-related Israelite groups, and the formal parallelism should remain visible.
- source_word: לֶהָבָה
  chosen: a flame
  alternatives:
  - flame
  - blaze
  lexicon: HALOT
  rationale: '''Flame'' is the natural paired image with ''fire'' and preserves the poetic intensification between Jacob and Joseph.'
- source_word: בֵית עֵשָׂו
  chosen: the house of Esau
  alternatives:
  - Esau’s house
  - the household of Esau
  lexicon: HALOT
  rationale: Maintains the repeated prophetic formula and the corporate reference to Edom as Esau's line.
- source_word: לְקַשׁ
  chosen: stubble
  alternatives:
  - chaff
  - dry straw
  lexicon: HALOT
  rationale: קַשׁ commonly denotes stubble/straw-like combustible residue. 'Stubble' best matches the image of something quickly ignited and consumed; 'chaff' is less precise here.
- source_word: וְדָלְקוּ בָהֶם
  chosen: They will burn among them
  alternatives:
  - they will set fire to them
  - they will blaze against them
  - they will burn in them
  lexicon: HALOT
  rationale: The verb דלק can convey burning/kindling and, in some contexts, pursuing. Here the fire metaphor governs, so 'burn' is preferred. The preposition ב is somewhat flexible; 'among them' preserves the Hebrew form without over-interpreting it as a direct causative.
- source_word: וַאֲכָלוּם
  chosen: and consume them
  alternatives:
  - and devour them
  - and eat them up
  lexicon: HALOT
  rationale: Within the fire metaphor, 'consume' is idiomatic and natural English while preserving the totality implied by אכל.
- source_word: שָׂרִיד
  chosen: survivor
  alternatives:
  - remnant
  - one left
  lexicon: HALOT
  rationale: Rendered 'survivor' because the context is annihilatory judgment on Esau/Edom. 'Remnant' is a possible gloss, but in biblical theology it often carries positive covenantal overtones that are explicitly denied here.
- source_word: כִּי יְהוָה דִּבֵּר
  chosen: for the LORD has spoken
  alternatives:
  - for the LORD has said
  - because the LORD has spoken
  lexicon: HALOT
  rationale: Uses the doctrinally specified default 'the LORD' for יְהוָה. 'Has spoken' is a standard prophetic closure conveying the certainty and authority of the declaration.
