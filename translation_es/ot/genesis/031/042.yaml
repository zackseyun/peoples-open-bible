revisions:
- from: Si no hubiera estado conmigo el Dios de mi padre, el Dios de Abraham y el Temor de Isaac[a], ahora me habrías despedido con las manos vacías. Dios vio mi aflicción y el trabajo de mis manos, y juzgó anoche.
  to: Si no hubiera estado conmigo el Dios de mi padre, el Dios de Abraham y el Temor de Isaac[a], ya me habrías enviado lejos con las manos vacías. Dios vio mi aflicción y el trabajo de mis manos, y dio su fallo anoche.
  rationale: 'Se hicieron ajustes menores para mejorar fidelidad contextual y legibilidad en español: ''ya'' refleja mejor כִּי עַתָּה; ''me habrías enviado lejos'' evita el matiz demasiado laboral de ''despedido'' y se acerca más a שִׁלַּחְתָּנִי; ''dio su fallo anoche'' preserva el matiz judicial de וַיּוֹכַח sin añadir un objeto explícito y suena natural en español.'
  reviewer_model: gpt-5.4
