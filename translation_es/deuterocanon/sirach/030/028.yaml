translation:
  language: es
  text: Años de corazón alegre[a] son mejores que manjares, y su comida le sentará bien.[b]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo literalmente: «Años de un buen corazón en lugar de manjares, y su comida subirá sobre él». El sentido de la segunda línea es que la comida sencilla le sienta bien o es fácil de digerir para la persona alegre.'
    reason: lexical_alternative
  - marker: b
    text: 'El paralelo griego de Swete en este lugar dice una sentencia distinta: no dar autoridad sobre uno mismo ni sobre las posesiones a hijo, mujer, hermano o amigo. Por eso, aquí el testimonio hebreo refleja una tradición textual sustancialmente diferente.'
    reason: textual_variant
lexical_decisions:
- source_word: שנות
  english_pob_choice: Years of
  chosen_spanish: Años de
  alternatives_spanish:
  - Los años de
  - Una vida de
  lexicon: HALOT
  rationale: El constructo plural expresa una duración o estado a lo largo del tiempo; «Años de» conserva la imagen hebrea y su estructura sapiencial sin volverla demasiado abstracta.
- source_word: לב טוב
  english_pob_choice: a glad heart
  chosen_spanish: corazón alegre
  alternatives_spanish:
  - corazón bueno
  - corazón contento
  lexicon: HALOT
  rationale: En lenguaje sapiencial, לב טוב apunta a bienestar interior y alegría, no solo a bondad moral. «Corazón alegre» comunica ese matiz de manera natural en español.
- source_word: תחת
  english_pob_choice: better than
  chosen_spanish: son mejores que
  alternatives_spanish:
  - en vez de
  - en lugar de
  lexicon: HALOT
  rationale: Aquí תחת es comparativo. En español, «son mejores que» expresa de forma idiomática la preferencia implícita del dicho.
- source_word: מטעמים
  english_pob_choice: delicacies
  chosen_spanish: manjares
  alternatives_spanish:
  - delicias
  - viandas selectas
  - bocados delicados
  lexicon: HALOT
  rationale: El término designa comida fina o apetecible. «Manjares» mantiene el tono sapiencial y comunica comida lujosa sin perder claridad.
- source_word: ומאכלו
  english_pob_choice: his food
  chosen_spanish: su comida
  alternatives_spanish:
  - su alimento
  - la comida de él
  lexicon: HALOT
  rationale: El sufijo es masculino singular y puede referirse al hombre descrito. «Su comida» conserva esa referencia sin necesidad de explicitar el pronombre en español.
- source_word: יעלה עליו
  english_pob_choice: will agree with him
  chosen_spanish: le sentará bien
  alternatives_spanish:
  - le caerá bien
  - le será provechosa
  - le hará bien
  lexicon: HALOT
  rationale: La expresión hebrea literalmente sugiere que la comida «sube sobre él», es decir, que le resulta digestiva o beneficiosa. «Le sentará bien» es una equivalencia idiomática clara y fiel al sentido.
theological_decisions:
- issue: Variante textual hebreo-griega
  english_pob_reading: The Hebrew witness reflects a saying about glad-hearted years and food that agrees with the person, while the Greek parallel preserves a different warning about giving authority over oneself or possessions to family or friends.
  chosen_spanish_reading: La lectura principal sigue el testimonio hebreo y conserva el dicho sapiencial sobre años de corazón alegre y comida que sienta bien.
  alternative_spanish_readings:
  - No des autoridad sobre ti mismo ni tus bienes a hijo, mujer, hermano o amigo.
  rationale: El dossier auditado indica que la tradición hebrea y la griega divergen sustancialmente. Para este registro español se sigue el texto hebreo base, y la variante griega se documenta como tradición alternativa, no como texto principal.
  doctrine_reference: Crítica textual y transmisión de Sirácida
translation_notes:
  revision_awareness: El texto inglés revisado corrigió «its food» por «his food» para concordar con el sufijo masculino singular hebreo. En español se reflejó esa referencia con «su comida» y se mantuvo el valor idiomático de la segunda cola con «le sentará bien».
  spanish_consistency_notes:
  - Se mantuvo «corazón» para לב, en línea con el uso sapiencial de interioridad y disposición anímica.
  - Se evitó «SEÑOR» y otros términos no pertinentes; no hay aquí nombre divino ni cristología.
  - La traducción conserva la tensión entre literalidad y naturalidad sin borrar el matiz de digestibilidad/beneficio de יעלה עליו.
