base_translation:
  language: en
  yaml_path: translation/ot/zechariah/008/003.yaml
  text: 'Thus says Yahweh: I have returned to Zion and will dwell in the midst of Jerusalem[a], and Jerusalem will be called the City of Truth, and the mountain of Yahweh of Armies[b], the Holy Mountain.'
  footnotes:
  - marker: a
    text: Or 'the mountain of the LORD of Hosts.' The Hebrew title צְבָאוֹת is traditionally rendered 'Hosts'; 'Armies' makes the meaning more transparent in modern English.
    reason: lexical_alternative
  - marker: b
    text: '''City of Truth'' may also be understood as ''city of faithfulness,'' since the Hebrew אֱמֶת can denote truth, reliability, or faithfulness.'
    reason: lexical_alternative
