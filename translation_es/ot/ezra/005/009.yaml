  source_alignment_summary: 'El borrador español refleja con fidelidad el sentido básico del arameo y sigue bien la auditoría inglesa: secuencia narrativa (''Entonces''), consulta a los ancianos, pregunta por la autorización oficial, ''esta casa'' para בַּיְתָא, y ''esta estructura'' para אֻשַּׁרְנָא. También preserva adecuadamente las dos notas léxicas. Sin embargo, ''preguntamos a esos ancianos'' suena algo menos natural y más rígido que la construcción española habitual con ''a''; además, ''así'' es comprensible para כְּנֵמָא, pero ''como sigue'' reproduce mejor la función introductoria formal de la cita directa en este contexto administrativo.'
