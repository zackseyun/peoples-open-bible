id: GEN.44.10
reference: Genesis 44:10
source:
  edition: WLC
  text: וַ/יֹּ֕אמֶר גַּם עַתָּ֥ה כְ/דִבְרֵי/כֶ֖ם כֶּן ה֑וּא אֲשֶׁ֨ר יִמָּצֵ֤א אִתּ/וֹ֙ יִהְיֶה לִּ֣/י עָ֔בֶד וְ/אַתֶּ֖ם תִּהְי֥וּ נְקִיִּֽם־־־׃
translation:
  text: And he said[a], “Even now, let it be according to your words. The one with whom it is found will be my slave[b], and you will be innocent.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'whoever is found with it will be my servant.' The Hebrew עָבֶד can be rendered 'servant' or 'slave'; here 'slave' was chosen because the punitive, bonded status is foregrounded.
    reason: lexical_alternative
  - marker: b
    text: 'Or ''let it be according to your words: the one with whom it is found will become my slave, and you will be innocent.''.'
    reason: previous_rendering
lexical_decisions:
- source_word: גַּם עַתָּה
  chosen: Even now
  alternatives:
  - Now also
  - Even so now
  lexicon: HALOT
  rationale: The phrase marks immediate agreement or response in the present situation. 'Even now' is idiomatic modern English that preserves the emphatic force of גַּם with the temporal עַתָּה.
- source_word: כְדִבְרֵיכֶם כֵּן הוּא
  chosen: let it be according to your words
  alternatives:
  - according to your words, so it is
  - as you have said, so be it
  lexicon: HALOT
  rationale: The Hebrew affirms the proposal just made and adopts it. English benefits from an explicit jussive-like sense ('let it be') to convey the steward's acceptance of their stated terms.
- source_word: אֲשֶׁר יִמָּצֵא אִתּוֹ
  chosen: the one with whom it is found
  alternatives:
  - whoever is found with it
  - he with whom it is found
  lexicon: HALOT
  rationale: This relative clause identifies the guilty party by possession of the cup. 'The one with whom it is found' is clear and close to the Hebrew syntax.
- source_word: יִהְיֶה לִּי עָבֶד
  chosen: will become my slave
  alternatives:
  - will be my slave
  - will be my servant
  lexicon: HALOT
  rationale: עָבֶד here denotes bonded status under punishment, not mere hired service. In line with the project's guidance on bonded terms, 'slave' better reflects the coercive relation than 'servant.' 'Will become' slightly smooths the future sense into natural English.
- source_word: וְאַתֶּם תִּהְיוּ נְקִיִּם
  chosen: and you will be innocent
  alternatives:
  - and you will be clear
  - and you will be blameless
  - and the rest of you will be free from guilt
  lexicon: HALOT
  rationale: נְקִיִּם denotes freedom from guilt or liability. 'Innocent' is the most natural concise rendering in context, indicating the others will not be held culpable.
