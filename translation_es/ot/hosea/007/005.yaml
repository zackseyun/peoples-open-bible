translation:
  language: es
  text: En el día de nuestro rey[a], los príncipes se enfermaron con el ardor del vino[b]; él extendió su mano con los burladores[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «En el día del rey nuestro». Algunos entienden esto como un día festivo del rey, pero la formulación más literal es «día de nuestro rey».'
    reason: lexical_alternative
  - marker: b
    text: «El ardor del vino» también puede entenderse como «el calor del vino» o, menos probablemente, «el veneno del vino».
    reason: lexical_alternative
  - marker: c
    text: Es decir, se asoció con burladores al extenderles la mano.
    reason: cultural_note
lexical_decisions:
- source_word: י֣וֹם מַלְכֵּ֔נוּ
  english_pob_choice: On the day of our king
  chosen_spanish: En el día de nuestro rey
  alternatives_spanish:
  - En el día de nuestro rey[a]
  - En el día del rey nuestro
  - En el día de nuestro rey festivo
  lexicon: HALOT
  rationale: La construcción hebrea es literalmente «día de nuestro rey». En español, «en el día de nuestro rey» conserva la relación posesiva sin sobreexplicar una fiesta real que el hebreo no menciona explícitamente.
- source_word: הֶחֱל֥וּ
  english_pob_choice: made themselves sick
  chosen_spanish: se enfermaron
  alternatives_spanish:
  - se hicieron enfermos
  - se debilitaron
  - comenzaron
  lexicon: HALOT
  rationale: El hifil de חלה en este contexto de exceso con vino expresa una condición causada/autoinducida. «Se enfermaron» es natural en español y conserva la fuerza de daño físico sin introducir una lectura más interpretativa que la evidencia no exige.
- source_word: שָׂרִ֖ים
  english_pob_choice: the princes
  chosen_spanish: los príncipes
  alternatives_spanish:
  - los oficiales
  - los gobernantes
  - los líderes
  lexicon: HALOT
  rationale: «Príncipes» preserva el matiz cortesano y jerárquico del término, coherente con el contexto real del versículo.
- source_word: חֲמַ֣ת מִ/יָּ֑יִן
  english_pob_choice: with the heat of wine
  chosen_spanish: con el ardor del vino
  alternatives_spanish:
  - con el calor del vino
  - con el ardor del vino[b]
  - con el veneno del vino
  lexicon: HALOT
  rationale: חמה puede denotar calor/ardor, ira o veneno. Aquí, dentro de la escena de embriaguez, «ardor del vino» mantiene la imagen vívida sin forzar «veneno» ni convertirla en una paráfrasis demasiado explicativa.
- source_word: מָשַׁ֥ךְ יָד֖וֹ
  english_pob_choice: he stretched out his hand
  chosen_spanish: él extendió su mano
  alternatives_spanish:
  - él alargó su mano
  - él tendió su mano
  - él extendió su mano
  lexicon: HALOT
  rationale: 'El idioma hebreo es literal: «estiró/extendió su mano». «Extendió su mano» conserva la imagen y resulta idiomático en español, sin resolver prematuramente el matiz social de la frase.'
- source_word: אֶת לֹצְצִֽים
  english_pob_choice: with mockers
  chosen_spanish: con los burladores
  alternatives_spanish:
  - con los burladores[c]
  - con los escarnecedores
  - con los mofadores
  lexicon: HALOT
  rationale: לֹצְצִים son personas que se burlan o escarnecen. «Burladores» es natural en español y mantiene el tono despectivo. «Con» refleja la función relacional que el hebreo comunica en este contexto de asociación.
theological_decisions:
- issue: Sujeto singular de «él extendió su mano»
  english_pob_reading: The singular subject is left as 'he,' most naturally referring to the king in the scene.
  chosen_spanish_reading: Se conserva el singular con «él», sin identificarlo de forma más explícita que el texto.
  alternative_spanish_readings:
  - «el rey extendió su mano»
  - «se extendió la mano del rey»
  rationale: El verbo hebreo es singular y el antecedente más natural es el rey mencionado antes. Aun así, el texto no repite el sujeto, por lo que la traducción evita precisar más de lo que el hebreo dice.
  doctrine_reference: Principio de fidelidad gramatical y prudencia exegética
translation_notes:
  revision_awareness: La revisión más reciente del inglés POB no introdujo cambios; el texto se mantuvo estable y el presente borrador sigue esa lectura con equivalentes españoles conservadores.
  spanish_consistency_notes:
  - Se usa «Yahvé» en este proyecto cuando el hebreo nombra el Tetragrámaton; en este versículo no aparece.
  - Se preserva la distinción de tono entre «príncipes» y «burladores», manteniendo el contraste social del hebreo.
  - No se añadió «fiesta» o «banquete» porque el hebreo solo dice «día de nuestro rey».
