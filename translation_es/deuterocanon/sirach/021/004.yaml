translation:
  language: es
  text: Toda injusticia[a] es como una espada de dos filos; para su herida no hay curación.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Injusticia» traduce aquí ἀνομία en el sentido de violación del orden moral y legal; no pretende agotar todos los matices posibles de «iniquidad» o «maldad».
    reason: theological_note
lexical_decisions:
- source_word: ὡς
  english_pob_choice: like
  chosen_spanish: como
  alternatives_spanish:
  - así como
  - tal como
  lexicon: LSJ
  rationale: Introduce una comparación directa; 'como' es la forma natural y fiel en español.
- source_word: ῥομφαία δίστομος
  english_pob_choice: a two-edged sword
  chosen_spanish: una espada de dos filos
  alternatives_spanish:
  - una espada de doble filo
  - una espada de dos cortes
  lexicon: LSJ
  rationale: La imagen es la de una espada con dos filos. 'De dos filos' conserva el valor figurado y suena más idiomático y bíblico en español que un calco mecánico.
- source_word: πᾶσα ἀνομία
  english_pob_choice: all lawlessness
  chosen_spanish: toda injusticia
  alternatives_spanish:
  - toda anomia
  - toda maldad
  - toda iniquidad
  lexicon: BDAG
  rationale: ἀνομία expresa violación del orden o de la ley; en español 'injusticia' comunica bien esa ruptura moral-jurídica sin perder la fuerza ética del término. Se evita 'iniquidad' por ser más tradicional pero menos transparente, y 'anomia' por ser poco natural para la lectura pública.
- source_word: τῇ πληγῇ αὐτῆς
  english_pob_choice: for its wound
  chosen_spanish: para su herida
  alternatives_spanish:
  - por su herida
  - para el golpe que causa
  - por el golpe que causa
  lexicon: LSJ
  rationale: πληγή puede significar golpe o herida; aquí el paralelo con ἴασις pide 'herida'. La construcción española con 'para' reproduce de modo natural el sentido de resultado o referencia al daño.
- source_word: οὐκ ἔστιν ἴασις
  english_pob_choice: there is no healing
  chosen_spanish: no hay curación
  alternatives_spanish:
  - no hay sanidad
  - no hay remedio
  - no puede curarse
  lexicon: LSJ
  rationale: ἴασις significa curación o sanidad. 'Curación' mantiene la afirmación proverbial en español claro y directo.
theological_decisions:
- issue: Cómo traducir ἀνομία en un proverbio moral
  english_pob_reading: lawlessness
  chosen_spanish_reading: injusticia
  alternative_spanish_readings:
  - anomia
  - iniquidad
  - maldad
  rationale: La lectura inglesa resalta la idea de transgresión del orden moral. En español, 'injusticia' comunica esa misma dimensión de quebrantamiento de lo recto y lo debido, preservando la dureza del enunciado sin recurrir a un tecnicismo opaco.
  doctrine_reference: DOCTRINE.md §Translation philosophy 1, 5
translation_notes:
  revision_awareness: El texto griego y el contexto auditado en inglés están en alto acuerdo; no se documentan revisiones textuales ni cambios de última hora. Se ha mantenido la metáfora de la espada de dos filos y la estructura proverbial con una negación de curación.
  spanish_consistency_notes:
  - Se conserva el registro bíblico sobrio y público, evitando arcaísmos innecesarios.
  - '''Curación'' mantiene la claridad contemporánea sin desplazar el valor de ἴασις hacia un matiz meramente médico.'
  - La nota explica la decisión sobre ἀνομία para no borrar su fuerza normativa.
