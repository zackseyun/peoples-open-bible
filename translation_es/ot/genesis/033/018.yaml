translation:
  language: es
  text: Jacob llegó en paz[a] a la ciudad de Siquem, que está en la tierra de Canaán, cuando llegó de Padán-aram, y acampó frente a la ciudad.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Jacob llegó a Salem, ciudad de Siquem». El hebreo שָׁלֵם (shalem) puede leerse como «en paz/seguro» o como el nombre del lugar «Salem».'
    reason: alternative_reading
lexical_decisions:
- source_word: וַיָּבֹא
  english_pob_choice: came
  chosen_spanish: llegó
  alternatives_spanish:
  - vino
  - arribó
  lexicon: HALOT
  rationale: El wayyiqtol narra la llegada de Jacob; «llegó» transmite el movimiento de entrada de forma natural en español y mantiene el valor narrativo básico.
- source_word: שָׁלֵם
  english_pob_choice: safely
  chosen_spanish: en paz
  alternatives_spanish:
  - sano y salvo
  - seguramente
  - a salvo
  lexicon: HALOT
  rationale: El hebreo puede leerse como adverbio de estado («seguro, íntegro, en paz») y también admite la lectura toponímica «Salem». Para el texto principal, «en paz» conserva la idea de llegada sin daño y deja abierta la ambigüedad semántica con un tono bíblico natural en español.
- source_word: עִיר שְׁכֶם
  english_pob_choice: the city of Shechem
  chosen_spanish: la ciudad de Siquem
  alternatives_spanish:
  - la ciudad de Shechem
  - Siquem
  lexicon: HALOT
  rationale: La cadena constructa se expresa naturalmente como «la ciudad de Siquem». Se usa la forma castellana habitual «Siquem» para el topónimo, preservando el referente geográfico.
- source_word: אֲשֶׁר בְּאֶרֶץ כְּנַעַן
  english_pob_choice: which is in the land of Canaan
  chosen_spanish: que está en la tierra de Canaán
  alternatives_spanish:
  - que está en la tierra de Canaán
  - la cual está en la tierra de Canaán
  lexicon: HALOT
  rationale: La relativa identifica la ubicación de Siquem. «Está en» es una equivalencia clara y sobria del hebreo locativo.
- source_word: בְּבֹאוֹ מִפַּדַּן אֲרָם
  english_pob_choice: when he came from Paddan-aram
  chosen_spanish: cuando venía de Paddán-aram
  alternatives_spanish:
  - cuando llegó de Paddán-aram
  - al venir de Paddán-aram
  lexicon: HALOT
  rationale: El infinitivo constructo con sufijo tiene valor temporal. «Cuando venía de» mantiene la simultaneidad/antecedencia narrativa y evita repetir «llegó» de manera demasiado mecánica, aunque el hebreo sí repite la raíz בוא.
- source_word: פַּדַּן אֲרָם
  english_pob_choice: Paddan-aram
  chosen_spanish: Paddán-aram
  alternatives_spanish:
  - Paddan-aram
  lexicon: HALOT
  rationale: Topónimo transliterado. Se adapta la acentuación al español para facilitar lectura sin alterar la identificación del lugar.
- source_word: וַיִּחַן
  english_pob_choice: he camped
  chosen_spanish: acampó
  alternatives_spanish:
  - acamparía
  - levantó campamento
  lexicon: HALOT
  rationale: El verbo qal expresa campamento/encampamiento. «Acampó» es el equivalente directo y natural en español.
- source_word: אֶת־פְּנֵי הָעִיר
  english_pob_choice: before the city
  chosen_spanish: frente a la ciudad
  alternatives_spanish:
  - ante la ciudad
  - delante de la ciudad
  lexicon: HALOT
  rationale: La expresión idiomática «la faz de la ciudad» se vierte por su sentido espacial como «frente a la ciudad». En español, esta opción conserva la posición relativa sin sonar forzada.
theological_decisions:
- issue: 'Ambigüedad de שָׁלֵם: adverbio de estado o topónimo Salem'
  english_pob_reading: The main text reads 'safely,' with a footnote preserving the place-name possibility 'Salem.'
  chosen_spanish_reading: El texto principal lee «en paz», y la posibilidad topónimica queda abierta por la nota.
  alternative_spanish_readings:
  - Salem
  - sano y salvo
  - a salvo
  rationale: El hebreo admite ambas rutas interpretativas. En español, «en paz» comunica la idea de integridad/seguridad sin cancelar la lectura como lugar, por lo que es una solución equilibrada para el cuerpo del texto.
  doctrine_reference: Ninguno; decisión lexical/textual, no doctrinal.
translation_notes:
  revision_awareness: El borrador sigue la última revisión inglesa que prefirió una relación temporal natural («when he came from Paddan-aram») sin perder el valor del infinitivo constructo. En español se evitó una traducción demasiado literal y repetitiva, pero se mantuvo la ambigüedad principal de שָׁלֵם mediante «en paz» y nota alternativa.
  spanish_consistency_notes:
  - Se usa «Yahvé» por defecto solo cuando aparezca el nombre divino; este versículo no lo contiene.
  - Se mantiene «Siquem» como topónimo bíblico de lectura habitual en español.
  - Se translitera «Paddán-aram» con acento para lectura española, conservando el nombre propio del lugar.
  - «Frente a la ciudad» reproduce el valor espacial de אֶת־פְּנֵי הָעִיר sin sobreinterpretarlo.
