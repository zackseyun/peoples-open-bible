translation:
  language: es
  text: Sube al Líbano y grita; alza tu voz en Basán; grita desde Abarim[a], porque todos tus amantes[b] han sido destrozados.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «desde los cruces» o «desde las regiones de más allá». El hebreo puede entenderse más literalmente, pero aquí probablemente se trata de Abarim como nombre de lugar, junto con Líbano y Basán.'
    reason: lexical_alternative
  - marker: b
    text: «Tus amantes» es una metáfora profética para los aliados extranjeros o socios políticos de Judá.
    reason: cultural_note
lexical_decisions:
- source_word: עֲלִי
  english_pob_choice: Go up
  chosen_spanish: Sube
  alternatives_spanish:
  - Asciende
  - Sube arriba
  lexicon: HALOT
  rationale: Imperativo femenino singular de עלה. «Sube» es natural en español y conserva el movimiento ascendente sin volver el texto artificial.
- source_word: הַלְּבָנוֹן
  english_pob_choice: Lebanon
  chosen_spanish: el Líbano
  alternatives_spanish:
  - Líbano
  lexicon: HALOT
  rationale: Topónimo propio; en español lleva artículo definido cuando funciona como nombre geográfico en este tipo de uso poético.
- source_word: וּצְעָקִי
  english_pob_choice: cry out
  chosen_spanish: grita
  alternatives_spanish:
  - clama
  - da gritos
  lexicon: HALOT
  rationale: צעק expresa un clamor fuerte. «Grita» preserva la intensidad y la urgencia del paralelo poético.
- source_word: וּבַבָּשָׁן
  english_pob_choice: in Bashan
  chosen_spanish: en Basán
  alternatives_spanish:
  - en el Basán
  lexicon: HALOT
  rationale: Topónimo con preposición locativa. «Basán» mantiene la forma usual en español bíblico sin cargar el verso con una perífrasis.
- source_word: תְּנִי קוֹלֵךְ
  english_pob_choice: raise your voice
  chosen_spanish: alza tu voz
  alternatives_spanish:
  - levanta tu voz
  - eleva tu voz
  lexicon: HALOT
  rationale: El hebreo literalmente dice «da tu voz». «Alza tu voz» transmite bien el modismo en español y conserva el tono poético.
- source_word: וְצַעֲקִי
  english_pob_choice: cry out
  chosen_spanish: grita
  alternatives_spanish:
  - clama
  - vuelve a gritar
  lexicon: HALOT
  rationale: Se repite el mismo verbo para reforzar el paralelismo. Repetir «grita» en español preserva la insistencia retórica.
- source_word: מֵעֲבָרִים
  english_pob_choice: from Abarim
  chosen_spanish: desde Abarim
  alternatives_spanish:
  - desde los pasos
  - desde las regiones de מעברים
  lexicon: HALOT
  rationale: Aquí se toma como nombre de lugar, en paralelo con Líbano y Basán. Mantener «Abarim» conserva la tríada geográfica del verso.
- source_word: כִּי
  english_pob_choice: for
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  lexicon: HALOT
  rationale: Introduce la razón de la lamentación; «porque» es natural y explícito en español.
- source_word: נִשְׁבְּרוּ
  english_pob_choice: are shattered
  chosen_spanish: están hechos pedazos
  alternatives_spanish:
  - están quebrados
  - están destrozados
  lexicon: HALOT
  rationale: El nifal de שבר aquí comunica ruina intensa. «Están hechos pedazos» comunica la fuerza de «shattered» sin suavizar la imagen.
- source_word: מְאַהֲבָיִךְ
  english_pob_choice: your lovers
  chosen_spanish: tus amantes
  alternatives_spanish:
  - tus amantes políticos
  - tus aliados
  lexicon: HALOT
  rationale: Se conserva el lenguaje metafórico profético de «amantes», como en el texto fuente, en lugar de reemplazarlo por una interpretación. En contexto alude a alianzas extranjeras.
theological_decisions:
- issue: Metáfora profética de relaciones ilícitas aplicada a alianzas políticas
  english_pob_reading: Retain 'your lovers' as a prophetic metaphor for Judah's foreign allies or political partners.
  chosen_spanish_reading: Conservar «tus amantes» como metáfora profética, entendida en contexto como referencia a aliados extranjeros o pactos políticos.
  alternative_spanish_readings:
  - 'Traducir de forma interpretativa: «tus aliados»'
  - 'Explicitar: «tus amantes políticos»'
  rationale: El texto profético mantiene deliberadamente la imagen de amor adúltero para denunciar la infidelidad de Judá. En español, «tus amantes» conserva la fuerza retórica y la tensión teológica sin diluirla en una glosa interpretativa.
  doctrine_reference: Jeremías 22:20; metáfora profética de infidelidad del pacto
translation_notes:
  revision_awareness: La revisión inglesa más reciente cambió «are broken» por «are shattered» para intensificar נִשְׁבְּרוּ. En español se refleja esa intensificación con «están hechos pedazos», manteniendo el paralelismo geográfico y la metáfora de los «amantes».
  spanish_consistency_notes:
  - Se mantuvo la tríada geográfica Líbano–Basán–Abarim, siguiendo el criterio del texto fuente y del audit trail inglés.
  - Se prefirió «amantes» para conservar la metáfora profética, en lugar de interpretarla prematuramente como «aliados».
  - Se evitó el calco «da tu voz» porque en español suena menos natural; «alza tu voz» conserva el sentido idiomático.
  - «Hechos pedazos» transmite la fuerza de נִשְׁבְּרוּ con un registro bíblico claro y actual.
