review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura general del versículo y conserva los elementos clave: el patio del tabernáculo, la orientación sur, los paneles textiles, el material de lino, la medida de cien codos y la referencia a un solo lado. Sin embargo, hay dos desajustes relevantes con la evidencia fuente y la auditoría inglesa: (1) לִפְאַת se representa mejor como ''para el lado/costado sur'' que como ''al lado del sur'', y (2) la nota al pie está mal formulada porque ofrece como alternativa la misma palabra usada en el texto, en vez de preservar la alternativa documentada tipo ''tapices/lienzos''.'
  spanish_quality_summary: El español es legible, pero 'al lado del sur' suena poco natural y algo ambiguo en español contemporáneo; 'para el lado sur' o 'para el lado del sur' es más claro y además sigue mejor el valor especificativo del hebreo. 'Habrá cortinas para el patio' es comprensible, aunque 'cortinas' tiende a evocar decoración interior; por eso conviene mantener una nota con una alternativa más funcional. El resto del versículo fluye bien.
  glossary_alignment: No hay conflictos con la terminología teológica principal del proyecto. 'Tabernáculo' está bien. 'Patio' para חֲצַר es aceptable en español neutral. La elección 'cortinas' para קְלָעִים puede tolerarse por naturalidad, pero debe sostenerse con una nota léxica correcta; una alternativa como 'tapices' o 'lienzos colgantes' preserva mejor la función perimetral. 'Lino fino torcido', 'codos' y la referencia singular 'para un lado' están alineados con la justificación documentada.
  issues:
  - severity: medium
    issue: La frase 'al lado del sur' no refleja tan bien לִפְאַת נֶגֶב como una formulación especificativa tipo 'para el lado del sur'.
    rationale: La revisión inglesa ya ajustó 'On the south side' a 'For the south side' para seguir mejor la construcción hebrea que introduce las especificaciones de ese costado. En español, 'al lado del sur' suena más locativo y menos natural.
  - severity: medium
    issue: La nota al pie [a] está defectuosa porque da como alternativa 'cortinas' cuando esa misma palabra ya aparece en el texto principal.
    rationale: Las notas deben preservar una alternativa real. El inglés conserva 'curtains' como alternativa a 'hangings'; en español, si el texto principal dice 'cortinas', la nota debe ofrecer otra posibilidad como 'tapices' o 'lienzos colgantes', no repetir el término principal.
  - severity: low
    issue: La elección 'cortinas' para קְלָעִים puede sugerir drapería interior más que paneles perimetrales.
    rationale: No obliga por sí sola a rechazar el texto, porque en español sigue siendo entendible, pero una nota léxica bien hecha ayuda a evitar esa posible lectura demasiado doméstica.
  revised_spanish_text: Y harás el patio del tabernáculo; para el lado del sur, hacia el sur, habrá cortinas[a] para el patio, de lino fino torcido, de cien codos de largo para un lado.
  revised_footnotes:
  - marker: a
    text: O 'tapices' o 'lienzos colgantes'. El hebreo se refiere a paneles de tela que formaban el límite del patio.
    reason: lexical_alternative
  revision_rationale: Se ajusta 'al lado del sur' a 'para el lado del sur' para reflejar mejor la construcción hebrea y la auditoría inglesa. También se corrige la nota léxica para que ofrezca una alternativa real y útil a 'cortinas', preservando mejor el matiz funcional de קְלָעִים. Se añade una coma tras 'patio' para mejorar la lectura de la frase material-descriptiva.
