translation:
  language: es
  text: Y los egipcios sabrán que yo soy Yahvé[a], cuando yo obtenga gloria por medio de Faraón, por medio de sus carros y de sus jinetes[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El nombre hebreo יְהוָה se traduce aquí como «Yahvé» para preservar el nombre propio divino.
    reason: theological_note
  - marker: b
    text: 'O: «cuando sea glorificado por medio de Faraón, por medio de sus carros y de sus jinetes».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְיָדְעוּ
  english_pob_choice: And ... will know
  chosen_spanish: Y ... sabrán
  alternatives_spanish:
  - Entonces ... sabrán
  - Y ... conocerán
  lexicon: HALOT
  rationale: 'El verbo perfecto con prefijo en este contexto expresa un resultado futuro: los egipcios llegarán a reconocer a Yahvé por medio del acto que está por ocurrir. «Sabrán» es natural y conserva el valor de conocimiento reconocido públicamente.'
- source_word: מִצְרַיִם
  english_pob_choice: the Egyptians
  chosen_spanish: los egipcios
  alternatives_spanish:
  - Egipto
  lexicon: HALOT
  rationale: La forma puede referirse al país o a su gente, pero aquí el sujeto que llegará a conocer es el pueblo egipcio, no la tierra.
- source_word: כִּי אֲנִי יְהוָה
  english_pob_choice: that I am Yahweh
  chosen_spanish: que yo soy Yahvé
  alternatives_spanish:
  - que yo soy el SEÑOR
  - que yo soy Yahvé
  lexicon: HALOT
  rationale: Se conserva la fórmula de reconocimiento con el nombre propio divino. «Yo soy Yahvé» evita sustituir el nombre por un título y sigue el estándar del proyecto para יְהוָה.
- source_word: בְּהִכָּבְדִי
  english_pob_choice: when I gain glory
  chosen_spanish: cuando sea glorificado
  alternatives_spanish:
  - cuando me glorifique
  - cuando gane gloria
  - cuando muestre mi gloria
  lexicon: HALOT
  rationale: El verbo en nifal con sufijo de primera persona admite un sentido pasivo/reflexivo de ser honrado o glorificado. En español, «sea glorificado» preserva esa tensión y evita decidir de antemano entre pasivo y medio.
- source_word: בְּפַרְעֹה
  english_pob_choice: through Pharaoh
  chosen_spanish: en Faraón
  alternatives_spanish:
  - por medio de Faraón
  - a través de Faraón
  lexicon: HALOT
  rationale: La preposición ב en esta cadena funciona como esfera o medio de manifestación. «En Faraón» mantiene la estructura hebrea y deja abierta la relación exacta entre Faraón y la glorificación divina.
- source_word: בְּרִכְבּוֹ
  english_pob_choice: through his chariots
  chosen_spanish: en sus carros
  alternatives_spanish:
  - por medio de sus carros
  - en sus carros de guerra
  lexicon: HALOT
  rationale: רכב aquí designa el conjunto de carros/chariotry. «Carros» es claro en español y conserva el referente militar.
- source_word: וּבְפָרָשָׁיו
  english_pob_choice: and through his horsemen
  chosen_spanish: y en sus jinetes
  alternatives_spanish:
  - y por medio de sus jinetes
  - y en su caballería
  lexicon: HALOT
  rationale: פָרָשִׁים se refiere a jinetes o caballería montada. «Jinetes» es directo y mantiene el paralelismo con «carros».
theological_decisions:
- issue: Renderización del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Yahweh
  rationale: El texto hebreo usa explícitamente el Tetragrama. Conforme al estándar del proyecto, se traslada al español como «Yahvé» para preservar el nombre personal de Dios y no ocultarlo bajo un título.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH'
- issue: Valor de בְּהִכָּבְדִי
  english_pob_reading: when I gain glory / when I am glorified
  chosen_spanish_reading: cuando sea glorificado
  alternative_spanish_readings:
  - cuando gane gloria
  - cuando me glorifique
  rationale: El hebreo permite una lectura de glorificación recibida/manifestada en el evento. «Sea glorificado» conserva la ambigüedad entre pasivo y medio, en línea con la nota inglesa que admitía más de una formulación.
  doctrine_reference: 'DOCTRINE.md: Translation philosophy — preserve documented tensions'
translation_notes:
  revision_awareness: 'El inglés POB mantiene dos lecturas importantes: el reconocimiento del nombre divino y la tensión entre «gain glory» y «be glorified». La versión española conserva ambas: usa «Yahvé» y traduce בְּהִכָּבְדִי con una forma pasiva («sea glorificado») que no cierra la ambigüedad. No se introdujeron cambios doctrinales respecto del audit trail; solo se adaptó la preposición y el orden para que el español suene natural sin perder el paralelismo hebreo.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como forma regular del Tetragrama.
  - Se usa «Faraón» con mayúscula por tratarse del título/nombre en contexto bíblico.
  - «Carros» y «jinetes» conservan el paralelismo militar del hebreo.
  - La elección de «sea glorificado» preserva la tensión semántica documentada entre pasivo y medio.
