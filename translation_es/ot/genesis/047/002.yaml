translation:
  language: es
  text: De entre sus hermanos tomó a cinco hombres y los presentó ante Faraón[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: ''de la parte más extrema de sus hermanos'' / ''de los más selectos de sus hermanos''; la expresión hebrea dice literalmente ''de la punta/extremo de'', pero aquí probablemente funciona en sentido partitivo: José eligió a cinco de entre sus hermanos.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וּ/מִ/קְצֵה
  english_pob_choice: From among
  chosen_spanish: De entre
  alternatives_spanish:
  - desde la orilla de
  - desde el extremo de
  - de entre los escogidos de
  lexicon: HALOT
  rationale: 'El hebreo literalmente dice ''de la punta/extremo de'', pero con ''sus hermanos'' funciona de manera partitiva: se trata de tomar a algunos de entre el grupo. ''De entre'' comunica bien ese sentido en español natural sin perder la base textual. No se adopta ''los escogidos'' porque la idea de selección es contextual, no explícita en la forma hebrea.'
- source_word: אֶחָיו
  english_pob_choice: his brothers
  chosen_spanish: sus hermanos
  alternatives_spanish:
  - sus parientes
  lexicon: HALOT
  rationale: אָחִים con sufijo posesivo se refiere directamente a 'hermanos'. Dado que el contexto inmediato habla de los hermanos de José, la opción concreta es la más fiel y clara.
- source_word: לָקַח
  english_pob_choice: he took
  chosen_spanish: tomó
  alternatives_spanish:
  - escogió
  - seleccionó
  lexicon: HALOT
  rationale: El verbo básico לָקַח significa 'tomar'. Aunque aquí implica una elección, 'tomó' conserva el valor verbal del hebreo y deja que el contexto aporte la selección.
- source_word: חֲמִשָּׁה אֲנָשִׁים
  english_pob_choice: five men
  chosen_spanish: cinco hombres
  alternatives_spanish:
  - cinco de los hombres
  lexicon: HALOT
  rationale: La secuencia numeral + sustantivo se traduce de forma directa. 'Hombres' es natural y exacto para los referidos del relato.
- source_word: וַיַּצִּגֵם
  english_pob_choice: presented them
  chosen_spanish: los presentó
  alternatives_spanish:
  - los puso delante de
  - los llevó ante
  - los hizo comparecer ante
  lexicon: HALOT
  rationale: El hifil de יָצַג puede significar poner o presentar delante de alguien. 'Los presentó' es idiomático en español y mantiene el matiz formal de audiencia ante un rey.
- source_word: לִפְנֵי פַרְעֹה
  english_pob_choice: before Pharaoh
  chosen_spanish: ante Faraón
  alternatives_spanish:
  - delante de Faraón
  - en presencia de Faraón
  lexicon: HALOT
  rationale: לִפְנֵי expresa ubicación relacional y de audiencia. 'Ante Faraón' es una formulación digna y natural en español bíblico contemporáneo.
translation_notes:
  revision_awareness: 'Se sigue de cerca el consenso de la auditoría inglesa: valor partitivo de מִקְצֵה, referencia concreta a hermanos, y lenguaje de corte/comparecencia ante Faraón. No se observan revisiones posteriores que alteren la lectura base.'
  spanish_consistency_notes:
  - Se prefirió 'Faraón' como nombre propio tradicional en español, conforme al uso bíblico estable.
  - Se evitó 'SEÑOR' o equivalentes porque el versículo no contiene el nombre divino.
  - '''Ante'' conserva el tono narrativo formal sin sobrecargar la frase.'
