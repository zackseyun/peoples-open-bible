  yaml_path: translation/ot/genesis/034/007.yaml
  text: And Jacob’s sons came in from the field when they heard it[a], and the men were grieved and very angry, because he had done a disgraceful thing in Israel by lying with Jacob’s daughter[c][b], and such a thing should not be done.
  footnotes:
