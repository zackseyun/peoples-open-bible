translation:
  language: es
  text: 'Por tanto, así dice Yahvé: Miren[a], estoy entregando esta ciudad en mano de los caldeos y en mano de Nabucodonosor, rey de Babilonia, y él la capturará.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: una forma del nombre más cercana a «Nebucadrezar»; tradicionalmente se vierte «Nabucodonosor» en español.'
    reason: lexical_alternative
lexical_decisions:
- source_word: לָכֵן
  english_pob_choice: Therefore
  chosen_spanish: Por tanto
  alternatives_spanish:
  - Por eso
  - Así que
  lexicon: HALOT
  rationale: Expresa bien la fuerza inferencial y causal del hebreo sin sonar forzado; en español mantiene el vínculo lógico con lo anterior.
- source_word: כֹּה אָמַר יְהוָה
  english_pob_choice: thus says Yahweh
  chosen_spanish: así dice Yahvé
  alternatives_spanish:
  - así ha dicho Yahvé
  - esto dice Yahvé
  lexicon: HALOT
  rationale: Conserva la fórmula profética breve y solemne, y usa el nombre divino según el criterio del proyecto.
- source_word: הִנְנִי
  english_pob_choice: Behold, I am
  chosen_spanish: He aquí, estoy
  alternatives_spanish:
  - Mira, estoy
  - He aquí que estoy
  lexicon: HALOT
  rationale: Reproduce la deíctica enfática del hebreo y deja en claro la primera persona divina.
- source_word: נֹתֵן
  english_pob_choice: am giving
  chosen_spanish: estoy entregando
  alternatives_spanish:
  - estoy dando
  - voy a entregar
  lexicon: HALOT
  rationale: En este contexto de entrega de una ciudad a enemigos, 'entregar' expresa mejor el sentido de transferencia de control que un simple 'dar', sin perder el aspecto progresivo del participio.
- source_word: הָעִיר הַזֹּאת
  english_pob_choice: this city
  chosen_spanish: esta ciudad
  alternatives_spanish:
  - la ciudad esta
  - la ciudad
  lexicon: HALOT
  rationale: Traducción directa y natural del sustantivo con demostrativo, conservando la referencia inmediata.
- source_word: בְּיַד
  english_pob_choice: into the hand of
  chosen_spanish: en manos de
  alternatives_spanish:
  - en la mano de
  - bajo el poder de
  lexicon: HALOT
  rationale: El modismo hebreo se comunica de manera idiomática en español como 'en manos de', que preserva la idea de control y dominio.
- source_word: הַכַּשְׂדִּים
  english_pob_choice: the Chaldeans
  chosen_spanish: los caldeos
  alternatives_spanish:
  - los babilonios
  lexicon: HALOT
  rationale: Sigue de cerca el etnónimo hebreo; se mantiene 'caldeos' porque el texto lo usa junto con Babilonia y el rey de Babilonia.
- source_word: נְבוּכַדְרֶאצַּר
  english_pob_choice: Nebuchadnezzar
  chosen_spanish: Nabucodonosor
  alternatives_spanish:
  - Nebucadrézar
  lexicon: HALOT
  rationale: Se adopta la forma castellana ampliamente reconocible, mientras la variante más próxima al hebreo queda como alternativa documental.
- source_word: מֶלֶךְ בָּבֶל
  english_pob_choice: king of Babylon
  chosen_spanish: rey de Babilonia
  alternatives_spanish:
  - el rey de Babilonia
  lexicon: HALOT
  rationale: Construcción nominal simple y fiel al hebreo, sin añadidos interpretativos.
- source_word: וּלְכָדָהּ
  english_pob_choice: and he will capture it
  chosen_spanish: y él la capturará
  alternatives_spanish:
  - y la capturará
  - y él la tomará
  lexicon: HALOT
  rationale: Mantiene el sujeto singular implícito que concuerda con Nabucodonosor y conserva el valor verbal de captura de una ciudad.
theological_decisions:
- issue: Renderización del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - Jehová
  rationale: El texto hebreo contiene explícitamente el Tetragrámaton; conforme al criterio del proyecto, se lo vierte como 'Yahvé' en el texto principal.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Sujeto singular implícito en וּלְכָדָהּ
  english_pob_reading: 'the subject is rendered as Nebuchadnezzar: ''and he will capture it'''
  chosen_spanish_reading: 'se conserva el sujeto singular implícito: ''y él la capturará'''
  alternative_spanish_readings:
  - y la capturará
  - y será capturada
  rationale: La forma verbal hebrea es singular masculino; traducir con sujeto explícito conserva la sintaxis y evita diluir el referente personal del rey mencionado inmediatamente antes.
  doctrine_reference: Grammar and source syntax of the Hebrew text
translation_notes:
  revision_awareness: La revisión más reciente no introdujo cambios; el pasaje muestra alto acuerdo entre la auditoría inglesa y la fuente hebrea, sin variantes textuales o doctrinales que requieran notas.
  spanish_consistency_notes:
  - Se mantuvo 'Yahvé' para יְהוָה según el estándar del proyecto.
  - Se usó 'caldeos' para הַכַּשְׂדִּים por fidelidad al etnónimo hebreo.
  - Se eligió 'Nabucodonosor' como forma castellana reconocible, coherente con la nota lexical del original inglés.
  - Se preservó el paralelismo de 'en manos de... y en manos de...' para reflejar el hebreo בְּיַד... וּבְיַד.
  - No se añadieron notas al pie porque no hay una alternativa que requiera anclaje textual en esta traducción final.
