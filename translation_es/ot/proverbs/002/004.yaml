translation:
  language: es
  text: si la buscas como la plata y la escudriñas como tesoros escondidos[a][b],
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El hebreo puede entenderse también como «tesoros enterrados», ya que el término puede referirse a riquezas ocultas en la tierra o guardadas fuera de la vista.
    reason: lexical_alternative
  - marker: b
    text: El hebreo usa un sufijo femenino singular («búscala» / «escudríñala»), en referencia a la sabiduría o al entendimiento del contexto anterior. El español principal conserva esa referencia femenina implícita con «la».
    reason: lexical_alternative
lexical_decisions:
- source_word: אִם
  english_pob_choice: if
  chosen_spanish: si
  alternatives_spanish:
  - cuando
  lexicon: HALOT
  rationale: La partícula introduce una condición directa en el proverbio; «si» conserva con claridad el valor condicional del hebreo y suena natural en español.
- source_word: תְּבַקְשֶׁנָּה
  english_pob_choice: you seek it
  chosen_spanish: la buscas
  alternatives_spanish:
  - la buscas a ella
  - la buscas
  lexicon: HALOT
  rationale: El sufijo femenino singular remite a la sabiduría/entendimiento del contexto previo. En español, «la» permite conservar esa referencia femenina implícita sin forzar una personificación extraña; «buscar» reproduce el sentido básico del verbo.
- source_word: כַּכָּסֶף
  english_pob_choice: like silver
  chosen_spanish: como a la plata
  alternatives_spanish:
  - como plata
  - igual que la plata
  lexicon: HALOT
  rationale: La comparación hebrea con כ־ pide un equivalente explícito en español. «Como a la plata» mantiene la idea de valoración y búsqueda intensa, con una construcción natural en español bíblico moderno.
- source_word: וְכַמַּטְמוֹנִים
  english_pob_choice: and like hidden treasures
  chosen_spanish: como a los tesoros escondidos
  alternatives_spanish:
  - como a los tesoros ocultos
  - y como a los tesoros escondidos
  - como a los tesoros enterrados
  lexicon: HALOT
  rationale: מַטְמוֹנִים designa tesoros escondidos o guardados; «tesoros escondidos» conserva el valor semántico principal. Se omitió «y» porque en español la segunda comparación puede coordinarse de manera más fluida con la primera dentro de la misma estructura.
- source_word: תַּחְפְּשֶׂנָּה
  english_pob_choice: search for it
  chosen_spanish: la escudriñas
  alternatives_spanish:
  - la buscas con empeño
  - la buscas diligentemente
  - la rastreas
  lexicon: HALOT
  rationale: חפשׂ implica una búsqueda diligente e ինտensiva. «Escudriñar» comunica bien esa búsqueda minuciosa y enfática en español, manteniendo el paralelismo retórico con «buscar» sin perder la fuerza del verbo hebreo.
