    issue: '''Se enriqueció muchísimo'' sobreespecifica וַיִּפְרֹץ'
    rationale: El verbo hebreo describe aumento/expansión extraordinaria con resultado de prosperidad amplia. 'Enriquecerse' focaliza demasiado en riqueza monetaria; 'prosperó muchísimo' o 'llegó a ser muy próspero' preserva mejor la amplitud del original.
  - severity: low
    issue: La nota actual sobre '[a]' no preserva la alternativa léxica principal documentada en el POB inglés
    rationale: La nota inglesa relevante conserva la opción más general de 'maidservants and servants'. En español conviene reflejar la alternativa 'siervas y siervos' o 'sirvientas y sirvientes' para documentar la decisión fuerte de 'esclavas y esclavos'.
  revised_spanish_text: Y el hombre prosperó muchísimo, y llegó a tener muchos rebaños, esclavas[a] y esclavos[a], camellos y asnos.
  revised_footnotes:
  - marker: a
    text: 'O: ''siervas y siervos''. Los términos hebreos pueden traducirse más generalmente como personal de servicio doméstico, pero aquí aparecen enumerados entre las posesiones adquiridas, por lo que se eligió ''esclavas y esclavos''.'
    reason: lexical_alternative
  revision_rationale: Se revisa וַיִּפְרֹץ a 'prosperó muchísimo' para conservar mejor el sentido amplio de aumento extraordinario sin reducirlo a enriquecimiento monetario. Se elimina la nota anterior porque no es necesaria si la traducción principal ya refleja con fidelidad el hebreo. Se añade, en cambio, una nota léxica sobre 'esclavas y esclavos' para preservar la alternativa documentada en el rastro inglés y justificar la elección fuerte conforme a la política del proyecto.
