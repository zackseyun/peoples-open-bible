id: MAT.16.19
reference: Matthew 16:19
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: ⸀δώσω σοι τὰς ⸀κλεῖδας τῆς βασιλείας τῶν οὐρανῶν, καὶ ὃ ⸀ἐὰν δήσῃς ἐπὶ τῆς γῆς ἔσται δεδεμένον ἐν τοῖς οὐρανοῖς, καὶ ὃ ⸁ἐὰν λύσῃς ἐπὶ τῆς γῆς ἔσται λελυμένον ἐν τοῖς οὐρανοῖς.
base_translation:
  language: en
  yaml_path: translation/nt/matthew/016/019.yaml
  text: 'I will give you the keys of the kingdom of heaven[a], and whatever you bind on earth will have been bound in heaven[c][b], and whatever you loose on earth will have been loosed in heaven.'
translation:
  language: ko
  text: '「내가 너에게 하늘 나라의 열쇠를 줄 것이다. 네가 땅에서 매는 것은 무엇이든지 하늘에서 이미 매여 있을 것이며, 네가 땅에서 푸는 것은 무엇이든지 하늘에서 이미 풀려 있을 것이다.」'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 보다 문자적으로 「하늘들의 나라」. 마태는 이 표현을 자주 사용한다.
    reason: lexical_alternative
  - marker: b
    text: 한국어 전통 번역은 「매일 것이요 ... 풀릴 것이다」로 옮겼다. 헬라어는 보다 정확하게 「이미 매여 있을 것이다 ... 이미 풀려 있을 것이다」(미래 완료적 함의)로 이해될 수 있다.
    reason: alternative_reading
  - marker: c
    text: 「매다」와 「풀다」는 금하고 허락하다, 또는 의무를 부과하고 면제하다의 의미를 가질 수 있으나, 번역은 헬라어 비유를 그대로 보존한다.
    reason: lexical_alternative
lexical_decisions:
- source_word: τῆς βασιλείας τῶν οὐρανῶν
  english_pob_choice: the kingdom of heaven
  chosen_korean: 하늘 나라
  alternatives_korean:
  - 하늘들의 나라
  - 천국
  lexicon: BDAG
  rationale: '글로사리 정책: βασιλεία τῶν οὐρανῶν → 「하늘 나라」. 한국 전통의 「천국」은 사후 장소로 굳어졌으나, 헬라어는 하나님의 통치 그 자체를 가리킨다. 「하늘 나라」가 본문의 직설성을 살린다.'
- source_word: δήσῃς ... λύσῃς
  english_pob_choice: bind ... loose
  chosen_korean: 매는 ... 푸는
  lexicon: BDAG
  rationale: 랍비적 「금지·허락」, 「의무 부과·면제」의 비유. 한국어 「매다·풀다」가 그 비유를 그대로 보존한다.
- source_word: ἔσται δεδεμένον ... ἔσται λελυμένον
  english_pob_choice: will have been bound ... will have been loosed
  chosen_korean: 이미 매여 있을 것이며 ... 이미 풀려 있을 것이다
  alternatives_korean:
  - 매여 있을 것이며 ... 풀려 있을 것이다
  lexicon: BDAG
  rationale: 미래 완료 우회 표현(εἰμί + 완료분사). 하늘의 결정이 땅의 매고 푸는 것보다 시간상 앞선다는 함의를 「이미」로 살린다.
