  - severity: medium
    issue: «él ofrecerá» sobreinterpreta parcialmente הוּא יַעֲשֶׂה
    rationale: El POB inglés eligió «shall provide» para no implicar que el príncipe realiza personalmente el acto sacerdotal. «Ofrecerá» en español se acerca más a una ejecución ritual directa que a la provisión bajo su responsabilidad.
  - severity: low
    issue: Falta la nota alternativa para הַחַטָּאת
    rationale: El rastro inglés preserva «purification offering» como alternativa léxica. Dado que el español usa «ofrenda por el pecado», conviene mantener la alternativa «ofrenda purificadora» para reflejar el mismo abanico semántico.
