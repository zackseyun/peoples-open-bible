- from: Los llenó de conocimiento del entendimiento[a], y les mostró el bien y el mal.
  to: Los llenó de conocimiento y de entendimiento[a], y les mostró el bien y el mal[b].
  rationale: Se revisa la primera frase para evitar un calco poco natural en español, manteniendo a la vez el valor del genitivo griego mediante una nota explicativa. Se añade además la nota sobre «el bien y el mal» para preservar la alternativa semántica documentada en la auditoría inglesa.
