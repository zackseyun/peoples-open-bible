revisions:
- from: 'El artesano fortalece al orfebre[a]; el que alisa con el martillo fortalece al que golpea el yunque, diciendo del ensamblaje: «Es bueno»; y lo afirma con clavos para que no se tambalee[b].'
  to: 'El artesano fortalece al orfebre; el que alisa con el martillo fortalece al que golpea el yunque, diciendo de la soldadura[a]: «Es buena»; y lo fija con clavos para que no se tambalee[b].'
  rationale: Se reubicó la nota [a] sobre la frase correspondiente a לַדֶּבֶק y se cambió la lectura principal a «soldadura» para seguir la prioridad léxica documentada en el POB inglés. También se ajustó «Es bueno» a «Es buena» por concordancia natural con «soldadura», y «lo afirma con clavos» a «lo fija con clavos» para mayor naturalidad y precisión en español.
