translation:
  language: es
  text: 'Moisés dijo[a]: «Hoy llenen sus manos para Yahvé, porque cada hombre ha estado contra su hijo y contra su hermano[b], para que él les dé hoy una bendición[c]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo literalmente: ‘llenen sus manos’. Es un modismo de consagración o investidura para el servicio sagrado.'
    reason: lexical_alternative
  - marker: b
    text: El hebreo es muy comprimido; el sentido es que los levitas actuaron aun contra sus parientes cercanos en el episodio anterior.
    reason: alternative_reading
  - marker: c
    text: El hebreo no explicita quién da la bendición; por contexto puede entenderse como Yahvé.
    reason: alternative_reading
lexical_decisions:
- source_word: מִלְאוּ יֶדְכֶם
  english_pob_choice: fill your hand
  chosen_spanish: llenen su mano
  alternatives_spanish:
  - llenen sus manos
  - conságrense
  - ordénense
  lexicon: HALOT
  rationale: El hebreo literalmente dice ‘llenar la mano’, un modismo de investidura o consagración al servicio sagrado. En español se conserva la imagen verbal para no borrar el modismo, mientras que la nota explica su sentido cultual.
- source_word: לַיהוָה
  english_pob_choice: to the LORD
  chosen_spanish: para Yahvé
  alternatives_spanish:
  - a Yahvé
  - para el SEÑOR
  lexicon: HALOT
  rationale: Se usa ‘Yahvé’ según la política del proyecto para el nombre divino. ‘Para’ refleja bien la dedicación o finalidad del gesto en este contexto cultual.
- source_word: אִישׁ
  english_pob_choice: each man
  chosen_spanish: cada hombre
  alternatives_spanish:
  - cada uno
  - cada varón
  lexicon: HALOT
  rationale: El singular distributivo hebreo se expresa naturalmente con ‘cada hombre’, preservando el matiz genérico y el paralelismo del argumento.
- source_word: בִּבְנוֹ וּבְאָחִיו
  english_pob_choice: against his son and against his brother
  chosen_spanish: contra su hijo y contra su hermano
  alternatives_spanish:
  - a costa de su hijo y de su hermano
  - incluso contra su hijo y contra su hermano
  lexicon: HALOT
  rationale: La preposición hebrea es elíptica, pero el contexto narrativo exige que el sentido sea de oposición/acción contra los parientes cercanos. ‘Contra’ es la opción más directa y transparente en español.
- source_word: וְלָתֵת
  english_pob_choice: so that he may bestow
  chosen_spanish: para que él les dé
  alternatives_spanish:
  - a fin de darles
  - para otorgarles
  lexicon: HALOT
  rationale: El infinitivo con sentido de resultado/finalidad requiere explicitar el sujeto en español. Se mantiene la ambigüedad del hebreo en cuanto al agente, pero el contexto sugiere a Yahvé como dador de la bendición.
- source_word: עֲלֵיכֶם
  english_pob_choice: on you
  chosen_spanish: les
  alternatives_spanish:
  - sobre ustedes
  - a ustedes
  lexicon: HALOT
  rationale: En español, con ‘dar una bendición’ el complemento indirecto ‘les’ suena más natural que un calco con ‘sobre’. La relación de beneficio está implícita en la construcción.
- source_word: בְּרָכָה
  english_pob_choice: a blessing
  chosen_spanish: una bendición
  alternatives_spanish:
  - bendición
  lexicon: HALOT
  rationale: Se conserva el sustantivo singular indefinido, conforme al valor del hebreo y al uso natural del español.
- source_word: הַיּוֹם
  english_pob_choice: today
  chosen_spanish: hoy
  alternatives_spanish:
  - este día
  - en este día
  lexicon: HALOT
  rationale: ‘Hoy’ es la forma más natural y conserva la repetición enfática del hebreo.
theological_decisions:
- issue: Origen implícito de la bendición
  english_pob_reading: The implied subject is the LORD
  chosen_spanish_reading: El sujeto implícito queda sugerido por el contexto y puede entenderse como Yahvé
  alternative_spanish_readings:
  - Moisés es el sujeto implícito
  - 'la frase es simplemente final: ''para que haya una bendición'''
  rationale: El hebreo no nombra explícitamente al dador de la bendición. En contexto, la lectura más natural es Yahvé, pero la traducción española no lo fuerza con una sobreespecificación innecesaria. La nota conserva la tensión interpretativa.
  doctrine_reference: Preservar la tensión sintáctica y teológica sin resolverla artificialmente
translation_notes:
  revision_awareness: 'Se corrigió la validación anterior asegurando que cada marca de nota aparezca exactamente en el texto español: [a], [b] y [c] están ancladas en el lugar correspondiente.'
  spanish_consistency_notes:
  - Se mantuvo ‘Yahvé’ conforme al estándar del proyecto.
  - Se conservó el modismo hebreo ‘llenar la mano’ en el texto principal para no perder la imagen cultual.
  - Se evitó introducir ‘ordenar’ o ‘consagrar’ en el cuerpo principal, reservando la explicación para la nota.
  - 'Se tradujo el paralelismo con dos miembros coordinados: ‘contra su hijo y contra su hermano’.'
  - Se dejó ambigua la identidad explícita del dador de la bendición, siguiendo el hebreo y el audit trail.
