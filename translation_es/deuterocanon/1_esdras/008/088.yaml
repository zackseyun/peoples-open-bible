  source_alignment_summary: 'El borrador español sigue bien la estructura y el sentido básico del griego: ἰδοὺ, ἐσμὲν ἐνώπιόν σου, ἐν ταῖς ἀνομίαις ἡμῶν, y la incapacidad de permanecer delante de Dios por causa de esos pecados. Sin embargo, dos decisiones se desalinean parcialmente del rastro auditado: «¡Mira!» rebaja demasiado el registro solemne de ἰδοὺ en este contexto penitencial, y «iniquidades» se aparta de la preferencia documentada por conservar la fuerza de ἀνομίαι como violaciones de la ley. La cláusula final es fiel en sustancia, aunque puede hacerse más idiomática y cercana al inglés auditado.'
  spanish_quality_summary: El español es claro y comprensible, pero «¡Mira!» suena demasiado coloquial para una confesión litúrgica. «Hay posibilidad de estar en pie» es entendible, aunque algo pesado; «ya no hay manera de estar en pie» o «ya no hay forma de mantenerse en pie» fluye mejor. El registro general mejora si se usa «He aquí» y «actos de iniquidad», manteniendo dignidad sin caer en calco duro.
  glossary_alignment: 'No hay conflictos con la terminología teológica principal del proyecto. La cuestión clave es ἀνομίαι: aunque «iniquidades» es bíblico y válido, el audit trail inglés documenta la decisión de resaltar el componente de transgresión concreta. En español, «actos de iniquidad» preserva mejor esa rationale sin sonar tan forzado como «actos sin ley».'
  issues:
  - severity: medium
    issue: «¡Mira!» para ἰδοὺ
    rationale: En este contexto de confesión solemne, «¡Mira!» suena demasiado conversacional. «He aquí» o «Mira» sin exclamación serían posibles, pero «He aquí» refleja mejor el tono del inglés auditado revisado («Behold») y la dignidad del pasaje.
  - severity: medium
    issue: «en nuestras iniquidades» no refleja del todo la decisión léxica auditada para ἀνομίαι
    rationale: El inglés POB prefirió «lawless deeds» para mantener el matiz de actos concretos de transgresión. «Iniquidades» conserva el registro penitencial, pero difumina esa fuerza. «En nuestros actos de iniquidad» mantiene la accesibilidad y la rationale documentada.
  - severity: low
    issue: «ya no hay posibilidad de estar en pie» es algo rígido
    rationale: La idea es correcta, pero en español bíblico natural suena mejor «ya no hay manera de estar en pie delante de ti» o similar, conservando la imagen judicial/cultual sin torpeza estilística.
  revised_spanish_text: He aquí[a], estamos delante de ti en nuestros actos de iniquidad[b], porque ya no hay manera de estar en pie delante de ti por estas cosas.
