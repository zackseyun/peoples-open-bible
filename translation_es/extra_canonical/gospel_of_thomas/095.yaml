translation:
  language: es
  text: 'Jesús dijo[d]: «Si tienes dinero, no prestes con interés[a]; más bien[f][e][c][b], dáselo a aquel de quien no lo volverás a recibir»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Interés» traduce el copto ⲙⲏⲥⲉ, que en la Antigüedad a menudo equivalía a «usura»; históricamente, «usura» podía referirse a cualquier interés, no solo al excesivo.
    reason: cultural_note
  - marker: b
    text: El pronombre objeto en copto es plural («ellos»/«las»), probablemente porque el dinero se concibe como monedas; en español se prefiere el singular estilístico «lo» con «dinero».
    reason: dialect_note
  - marker: c
    text: 'La frase del destinatario es incierta: el manuscrito puede leerse como ⲙ[ⲙⲟϥ] («dalo»), mientras que el texto normalizado lee ϯ ⲛⲛⲧⲟϥ («da a él»). El sentido general —dirigir el don a cierto tipo de persona definida por la cláusula relativa— no cambia.'
    reason: textual_variant
  - marker: d
    text: «Jesús dijo» al inicio se restaura debido a un daño menor en NHAM02.48/lb35.
    reason: lacuna_or_restoration
  - marker: e
    text: 'La cláusula relativa también puede entenderse como «al que no te lo devolverá»; la redacción elegida sigue la lectura más común: «de quien no lo volverás a recibir».'
    reason: lexical_alternative
  - marker: f
    text: 'O: «dáselo al que no te lo devolverá».'
    reason: previous_rendering
lexical_decisions:
- source_word: ⲉϣⲱⲡⲉ
  english_pob_choice: if (it happens that)
  chosen_spanish: Si
  alternatives_spanish:
  - Cuando
  lexicon: Lambdin
  rationale: La cláusula es condicional y general; en español, «Si» expresa de manera natural la contingencia sin convertirla en una secuencia temporal.
- source_word: ⲟⲩⲛⲧⲁⲛⲧⲱⲧⲛ ϩⲟⲙⲧ
  english_pob_choice: you have money
  chosen_spanish: tienes dinero
  alternatives_spanish:
  - hay dinero para ti
  - posees dinero
  lexicon: Layton
  rationale: La construcción posesiva existencial del copto se vierte con una posesión natural en español. «Dinero» conserva el sentido general de ϩⲟⲙⲧ sin forzar «monedas» en el texto principal.
- source_word: ⲙⲡⲣϯ ⲉⲡⲙⲏⲥⲉ
  english_pob_choice: do not lend at interest
  chosen_spanish: no lo prestes con interés
  alternatives_spanish:
  - no lo prestes a usura
  - no des dinero con interés
  lexicon: Crum
  rationale: 'El valor idiomático es financiero: dar/prestar dinero con rendimiento. «Con interés» comunica el sentido sin imponer de entrada el matiz histórico-jurídico de «usura», que puede ir en nota.'
- source_word: ϯ ⲛⲛⲧⲟϥ
  english_pob_choice: give to the one
  chosen_spanish: dáselo a aquel
  alternatives_spanish:
  - dalo a quien
  - dáselo al que
  lexicon: Lambdin
  rationale: El copto admite una referencia dativa que el POB inglés trata como objeto directo resumido por «it». En español, «dáselo» conserva la referencia al dinero y «aquel» prepara la relativa siguiente con naturalidad.
- source_word: ⲛⲡⲉⲧⲉⲣⲉⲛⲧⲱⲧⲛⲛⲁϫⲓⲛⲧⲟⲟⲩ ⲁⲛ ⲛⲧⲛⲛⲧⲟϥ
  english_pob_choice: from whom you will not take them back
  chosen_spanish: de quien no lo volverás a recibir
  alternatives_spanish:
  - de quien no lo tomarás de vuelta
  - a quien no se lo reclamarás de vuelta
  lexicon: Layton
  rationale: La relativa permite expresar la idea de recuperar lo dado. «Volver a recibir» comunica bien el sentido recíproco de tomar/devolver sin sobrecargar el español con una estructura poco natural.
theological_decisions:
- issue: Tensión entre «usura/interés» como término histórico y una formulación comprensible en español contemporáneo
  english_pob_reading: ‘Interest’ renders Coptic ⲙⲏⲥⲉ, often equivalent to ‘usury’ in antiquity; historically ‘usury’ meant any interest, not just excessive rates.
  chosen_spanish_reading: «con interés» en el texto principal, sin ocultar el trasfondo de préstamo oneroso
  alternative_spanish_readings:
  - «a usura»
  - «con usura»
  rationale: El español moderno entiende mejor «interés», mientras que «usura» puede sonar solo a tasa excesiva. Mantener «interés» preserva la función económica del mandato y evita un anacronismo semántico; la tensión histórica puede registrarse en nota.
  doctrine_reference: ética económica bíblica / léxico histórico de la usura
- issue: Referencia pronominal final plural en copto frente a singular estilístico en español
  english_pob_reading: The object pronoun is plural (‘them’), likely because ‘money’ is conceptualized as coins; the translation preserves the plural in ‘them back’.
  chosen_spanish_reading: singular estilístico con «lo» en «no lo volverás a recibir»
  alternative_spanish_readings:
  - «no los volverás a recibir»
  - «de quien no volverás a recibirlos»
  rationale: Aunque el copto puede tratar el dinero como contable/plural, en español «dinero» funciona de forma natural como sustantivo de masa y exige concordancia singular. La elección evita una discordancia en el texto principal, sin negar la base plural del original.
  doctrine_reference: claridad idiomática y fidelidad semántica
- issue: Restauración de la apertura «Jesús dijo»
  english_pob_reading: ‘Jesus said’ at the start is restored due to minor damage in NHAM02.48/lb35.
  chosen_spanish_reading: «Jesús dijo» con nota de restauración
  alternative_spanish_readings:
  - omitir la apertura restaurada
  rationale: La restauración forma parte del auditable textus y debe aparecer, pero señalada como restaurada para no confundirla con una lectura perfectamente legible del manuscrito.
  doctrine_reference: crítica textual / restauración editorial
translation_notes:
  revision_awareness: 'Se tuvo en cuenta la revisión reciente del audit trail inglés: la formulación final estabiliza el antecedente singular de «dinero» en inglés, pero el copto sigue sugiriendo un objeto contable plural. En español se resolvió con una solución idiomática singular («lo»), sin perder la relación con el original.'
  spanish_consistency_notes:
  - Se mantiene «Jesús» para ⲓⲏⲥⲟⲩⲥ.
  - Se usa «interés» como término principal, no «usura», por claridad contemporánea y fidelidad contextual.
  - Se conserva la estructura imperativa negativa con «no lo prestes».
  - La relativa final queda en un español natural; no se fuerza un plural que rompería la referencia de «dinero».
  - Las notas distinguen restauración textual, variante de lectura y matiz léxico sin mezclar categorías.
