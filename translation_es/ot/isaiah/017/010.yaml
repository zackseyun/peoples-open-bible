review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien la estructura del hebreo: olvido de Dios, falta de memoria de la Roca, y consecuencia agrícola figurada. Sin embargo, hay dos fallas importantes de alineación con el expediente: (1) las notas están mal ancladas; la nota [a] del inglés corresponde a נִטְעֵי נַעֲמָנִים, no a «salvación», y la nota [b] corresponde a זְמֹרַת זָר, no a «refugio»; además falta la nota cultural equivalente a la inglesa [c]. (2) «lo siembras con una vid extranjera» suena poco natural en español para una vid/sarmiento y no refleja tan bien la revisión inglesa hacia una colocación/plantación más idiomática.'
  spanish_quality_summary: 'El español es generalmente claro y digno, pero «plantíos deleitosos» suena algo forzado; «plantas deleitosas» o «plantíos selectos» leen mejor. La frase final necesita mejora idiomática: en español bíblico-natural sería mejor «la plantas con una vid extranjera» o, más explícitamente según el antecedente implícito, «los plantas con una vid extranjera», aunque el sufijo singular hebreo favorece mantener un objeto singular colectivo. También deben corregirse las notas y su ubicación.'
  glossary_alignment: Buena alineación con la terminología del proyecto en «Dios», «salvación» y «Roca». No hay conflictos con Yahvé/Mesías/etc. La decisión de mantener la imaginería agrícola sin explicitar idolatría en el texto principal coincide con la pauta teológica documentada, pero la nota cultural faltante debe restaurarse.
  issues:
  - severity: high
    issue: Notas al pie mal asignadas a los lugares equivocados del texto
    rationale: La nota sobre «plantíos selectos» no pertenece a «salvación», y la nota sobre «estaca/brote ajeno» no pertenece a «refugio». Esto distorsiona la evidencia léxica y rompe la trazabilidad del expediente inglés.
  - severity: high
    issue: Falta la nota cultural sobre la posible alusión a cultos o alianzas extranjeras
    rationale: El expediente inglés preserva explícitamente esa posibilidad interpretativa sin llevarla al texto principal. Omitirla pierde una decisión teológica documentada.
  - severity: medium
    issue: «lo siembras con una vid extranjera» es poco idiomático en español
    rationale: Aunque זרע es «sembrar», con «vid»/«sarmiento» el español natural favorece «plantar» o «poner». La revisión inglesa ya ajustó esto por la imagen agrícola.
  - severity: low
    issue: «plantíos deleitosos» suena algo rígido
    rationale: No es incorrecto, pero «plantas deleitosas» fluye mejor y mantiene la ambigüedad del hebreo sin sonar técnico o afectado.
  revised_spanish_text: Porque te has olvidado del Dios de tu salvación, y no te has acordado de la Roca de tu refugio[c]; por tanto, plantas plantas deleitosas[a] y la plantas con una vid extranjera[b].
  revised_footnotes:
