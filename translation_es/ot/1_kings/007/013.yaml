translation:
  language: es
  text: Entonces el rey Salomón envió y tomó a Hiram de Tiro.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: וַיִּשְׁלַח
  english_pob_choice: sent
  chosen_spanish: envió
  alternatives_spanish:
  - mandó
  - envió por
  lexicon: HALOT
  rationale: El hebreo dice literalmente que el rey «envió». En español, «envió» mantiene ese valor básico sin añadir por sí mismo la idea de búsqueda o traslado que tendría «envió por». Se conserva así la coordinación con el verbo siguiente.
- source_word: הַמֶּלֶךְ שְׁלֹמֹה
  english_pob_choice: King Solomon
  chosen_spanish: el rey Salomón
  alternatives_spanish:
  - el rey, Salomón
  - rey Salomón
  lexicon: HALOT
  rationale: La apposición hebrea se expresa de forma natural en español como artículo + título + nombre. «El rey Salomón» conserva el sentido y la fluidez idiomática.
- source_word: וַיִּקַּח
  english_pob_choice: took
  chosen_spanish: tomó
  alternatives_spanish:
  - lo tomó
  - fue a buscar y lo tomó
  lexicon: HALOT
  rationale: POB eligió «took» para reflejar más de cerca el verbo hebreo לקח. En español, «tomó» reproduce ese valor léxico con fuerza equivalente. No se opta por una paráfrasis como «lo trajo» porque suavizaría el verbo fuente.
- source_word: אֶת חִירָם
  english_pob_choice: Hiram
  chosen_spanish: a Hiram
  alternatives_spanish:
  - Hiram
  lexicon: HALOT
  rationale: El marcador de objeto directo אֶת no se traduce como palabra separada, pero en español la persona puede introducirse con la preposición personal «a». Esto es una exigencia gramatical del español, no una adición interpretativa.
- source_word: מִצֹּר
  english_pob_choice: from Tyre
  chosen_spanish: de Tiro
  alternatives_spanish:
  - desde Tiro
  lexicon: HALOT
  rationale: צֹר es el topónimo «Tiro»; el hebreo usa la preposición de origen. «De Tiro» es la forma más directa y natural en español. «Desde Tiro» sería posible, pero aquí puede sonar más enfático en el punto de partida que en el origen simple.
translation_notes:
  revision_awareness: 'El audit trail inglés muestra una revisión importante: la POB pasó de «brought» a «took» para acercarse más al verbo fuente וַיִּקַּח sin perder naturalidad. En español se siguió esa misma decisión, evitando «trajo» y conservando «tomó».'
  spanish_consistency_notes:
  - Se mantiene el nombre propio «Salomón» y el topónimo «Tiro» de manera consistente con la transliteración habitual en español bíblico.
  - 'No se añadió nota de pie porque el español puede reflejar el contraste verbal sin ambigüedad significativa: «envió» / «tomó».'
  - Se preserva la sencillez del verso sin introducir elementos no presentes en el hebreo.
