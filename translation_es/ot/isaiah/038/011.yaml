translation:
  language: es
  text: 'Yo dije: «No veré a Yah, Yah[a] en la tierra de los vivientes; ya no miraré al hombre con los habitantes del mundo de los muertos[b]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «Yah, Yah», la forma breve poética del nombre divino; muchas traducciones lo vierten como «el SEÑOR».'
    reason: alternative_reading
  - marker: b
    text: O «ya no miraré al hombre con los habitantes de Hadel»; la expresión final es difícil, y חָדֶל lleva la idea de cese, fragilidad o de una esfera separada de la vida ordinaria.
    reason: lexical_alternative
lexical_decisions:
- source_word: אָמַרְתִּי
  english_pob_choice: I said
  chosen_spanish: Yo dije
  alternatives_spanish:
  - Dije
  - Yo pensé
  lexicon: HALOT
  rationale: Perfecto de 1.ª persona singular de אמר, usado para introducir el lamento en discurso directo. «Yo dije» conserva la inmediatez y la sencillez del hebreo; «yo pensé» suaviza demasiado la afirmación.
- source_word: לֹא אֶרְאֶה
  english_pob_choice: I will not see
  chosen_spanish: No veré
  alternatives_spanish:
  - No veré
  - No habré de ver
  lexicon: HALOT
  rationale: El imperfecto negado expresa una privación esperada o futura. En español, «no veré» comunica bien la expectativa de pérdida sin sobretraducir.
- source_word: יָהּ יָהּ
  english_pob_choice: Yah, Yah
  chosen_spanish: Yah, Yah
  alternatives_spanish:
  - Yahvé, Yahvé
  - el SEÑOR, el SEÑOR
  lexicon: HALOT
  rationale: El hebreo usa la forma breve poética del nombre divino y la repite para énfasis. Se conserva por transliteración para reflejar la forma real del texto y no confundirla con el tetragrama completo.
- source_word: בְּאֶרֶץ הַחַיִּים
  english_pob_choice: in the land of the living
  chosen_spanish: en la tierra de los vivientes
  alternatives_spanish:
  - en la tierra de los vivos
  - en la tierra de la vida
  lexicon: HALOT
  rationale: La expresión hebrea es un modismo de la esfera de los vivos frente a la muerte. «Tierra de los vivientes» mantiene el paralelo poético y suena natural en español bíblico.
- source_word: לֹא אַבִּיט
  english_pob_choice: I will no longer look on
  chosen_spanish: ya no miraré
  alternatives_spanish:
  - ya no contemplaré
  - ya no volveré a mirar
  lexicon: HALOT
  rationale: נבט en este contexto es «mirar, contemplar, fijar la vista». «Ya no miraré» conserva la variación respecto de «veré» y permite incorporar la fuerza de עוֹד con naturalidad.
- source_word: אָדָם
  english_pob_choice: man
  chosen_spanish: al hombre
  alternatives_spanish:
  - a ningún hombre
  - a la humanidad
  lexicon: HALOT
  rationale: אָדָם aquí es singular representativo y destaca la pérdida de trato humano. «Al hombre» mantiene esa fuerza sin convertirlo en plural abstracto.
- source_word: עוֹד
  english_pob_choice: no longer
  chosen_spanish: ya no
  alternatives_spanish:
  - nunca más
  - todavía no
  lexicon: HALOT
  rationale: 'Con la negación, עוֹד expresa continuidad que cesa: «ya no» es el equivalente español más natural y fiel.'
- source_word: עִם
  english_pob_choice: with
  chosen_spanish: con
  alternatives_spanish:
  - entre
  - junto con
  lexicon: HALOT
  rationale: Aunque en inglés auditado se glosa con «with/among», el valor básico del hebreo es «con». En español «con los habitantes...» conserva la construcción relacional del original.
- source_word: יֹשְׁבֵי
  english_pob_choice: the inhabitants of
  chosen_spanish: los habitantes de
  alternatives_spanish:
  - los que habitan en
  - los moradores de
  lexicon: HALOT
  rationale: Participio sustantivado plural en constructo. «Los habitantes de» es la forma más clara y reconocible en español contemporáneo.
- source_word: חָדֶל
  english_pob_choice: the world of the dead
  chosen_spanish: el mundo de los muertos
  alternatives_spanish:
  - la tierra del cese
  - el lugar del cese
  - el reino de los muertos
  lexicon: HALOT
  rationale: El término es difícil y raro, con matices de cese, desvanecimiento o una esfera cortada de la vida ordinaria. Siguiendo la revisión inglesa, «mundo de los muertos» comunica el contraste con «la tierra de los vivientes» sin ocultar la dificultad del hebreo.
theological_decisions:
- issue: Tratamiento de la forma divina breve יָהּ repetida dos veces
  english_pob_reading: Yah, Yah
  chosen_spanish_reading: Yah, Yah
  alternative_spanish_readings:
  - Yahvé, Yahvé
  - el SEÑOR, el SEÑOR
  rationale: 'La decisión sigue la primacía del original: el texto hebreo no usa YHWH completo, sino la forma breve poética יָהּ. En español se conserva «Yah» para no nivelar la distinción y para retener el énfasis de la repetición.'
  doctrine_reference: 'DOCTRINE.md: primacía del idioma original; el tratamiento habitual de יהוה no obliga a sustituir la forma breve יָהּ por una máscara tradicional.'
translation_notes:
  revision_awareness: 'Se siguió la revisión inglesa más reciente en la última expresión: el audit trail descartó una solución demasiado literal para חָדֶל («cese/cesación») y prefirió una formulación más natural y contextual («world of the dead»). La versión española adopta ese mismo criterio, preservando a la vez la repetición de «Yah, Yah» y el tono lamentativo del verso.'
  spanish_consistency_notes:
  - Se mantiene «Yah» en lugar de «Yahvé» porque el hebreo usa la forma corta יָהּ, no el tetragrama completo.
  - Se eligió «tierra de los vivientes» para conservar el paralelismo clásico con la esfera de los muertos.
  - «Ya no» traduce עוֹד dentro de una negación y evita un calco artificial.
  - La puntuación con dos puntos y comillas reproduce el discurso directo del lamento con claridad editorial.
