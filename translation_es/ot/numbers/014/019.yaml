review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la estructura del hebreo: súplica imperativa («perdona»), objeto («la iniquidad de este pueblo»), medida/apelación («según la grandeza de tu ...») y precedente divino («así como has perdonado ... desde Egipto hasta ahora»). También sigue el audit trail inglés revisado al optar por «has perdonado» para נָשָׂאתָה. Sin embargo, la nota al pie no preserva la alternativa léxica más importante documentada por el POB inglés para נָשָׂאתָה, sino que añade una nota sobre חֶסֶד que no corresponde a la huella de auditoría principal de este versículo.'
  spanish_quality_summary: El español es claro, natural y digno. «Por favor, perdona» suena bien; «iniquidad» y «este pueblo» son fieles y eclesialmente comprensibles. «Amor leal» es defendible para חֶסֶד, pero aquí la necesidad principal no es esa nota sino aclarar la alternativa de «has perdonado / has llevado-soportado». Conviene reubicar la nota al verbo final para preservar la ambigüedad léxica relevante sin recargar el texto.
  glossary_alignment: No hay conflicto con la terminología por defecto del proyecto. No aparece el nombre divino ni otros términos con política especial. La elección «amor leal» para חֶסֶד es aceptable en español, aunque la documentación inglesa usa «steadfast love»; se puede mantener sin problema. La corrección necesaria es de alineación de nota léxica, no de glosario principal.
  issues:
  - severity: medium
    issue: La nota al pie está anclada en «amor leal» en vez de preservar la alternativa léxica principal de נָשָׂאתָה.
    rationale: El POB inglés documenta explícitamente una nota sobre el verbo hebreo que puede significar «llevar/cargar/soportar» y, en algunos contextos, «perdonar». El borrador español omite esa alternativa clave y sustituye la nota por una explicación de חֶסֶד, que no es la nota preservada por la auditoría en este versículo.
  - severity: low
    issue: La nota actual sobre חֶסֶד es válida en abstracto, pero no necesaria aquí y desplaza una ambigüedad más significativa para este registro.
    rationale: La traducción principal «amor leal» es suficientemente clara sin nota. Si solo se conserva una nota, debe priorizarse la ambigüedad documentada del verbo נָשָׂאתָה.
  revised_spanish_text: Por favor, perdona la iniquidad de este pueblo según la grandeza de tu amor leal, así como has perdonado[a] a este pueblo desde Egipto hasta ahora.
  revised_footnotes:
  - marker: a
    text: 'O: «así como has llevado/soportado a este pueblo desde Egipto hasta ahora». El verbo hebreo puede significar «llevar/cargar» y, en algunos contextos, «perdonar».'
    reason: lexical_alternative
  revision_rationale: 'Se conserva el texto español principal porque es fiel, claro y sigue la revisión inglesa que privilegia «has perdonado». Se corrige la nota al pie para alinearla con la evidencia léxica y el audit trail del POB: la alternativa significativa en este versículo recae sobre נָשָׂאתָה, no sobre חֶסֶד. Así se preserva mejor la tensión semántica del hebreo sin cambiar la traducción principal.'
