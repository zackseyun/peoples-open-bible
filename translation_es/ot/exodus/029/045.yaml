review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja fielmente el hebreo: וְשָׁכַנְתִּי = «habitaré», בְּתוֹךְ = «en medio de», בְּנֵי יִשְׂרָאֵל = «los hijos de Israel», y la fórmula de pacto וְהָיִיתִי לָהֶם לֵאלֹהִים = «seré su Dios». La nota alternativa sobre «seré Dios para ellos» también preserva bien la opción más literal.'
  spanish_quality_summary: 'El texto principal suena natural, digno y claro en español bíblico moderno. Sin embargo, las notas requieren reparación: la nota a está invertida respecto del inglés auditado, la nota b repite la misma frase dos veces y no refleja la distinción «sons»/«children», y el anclaje de la nota c está colocado sobre «Dios» cuando la alternativa afecta a toda la cláusula verbal.'
  glossary_alignment: 'Buena alineación con la terminología del proyecto: «Dios» para אֱלֹהִים y preservación de «los hijos de Israel» conforme a la política de forma masculina explícita. No hay conflicto con términos troncales como «Yahvé» o «Mesías» en este versículo.'
  issues:
  - severity: medium
    issue: La nota a no corresponde a la alternativa inglesa auditada.
    rationale: El inglés tiene texto principal «among» y nota alternativa «in the midst of»; el español principal ya usa «en medio de», así que la alternativa apropiada debe invertirse a «entre los hijos de Israel» como texto principal o bien mantener el principal actual y hacer que la nota indique la otra opción correcta. Tal como está, la relación entre texto y nota no sigue limpiamente el rastro auditado.
  - severity: medium
    issue: La nota b está defectuosa y no comunica la distinción léxica documentada.
    rationale: 'Dice: «Hebreo: “los hijos de Israel”; tradicionalmente, “los hijos de Israel”», repitiendo la misma formulación. Debe reflejar una alternativa tradicional real en español, por ejemplo «los hijos de Israel» / «los hijos de Israel» no distingue nada; lo más cercano al audit trail es mencionar «tradicionalmente, “los hijos de Israel”» solo si hubiera contraste, pero en español conviene indicar «Hebreo: “los hijos de Israel”» y como tradicional «los hijos de Israel» no aporta. Mejor usar una alternativa tradicional española real: «los hijos de Israel» frente a «el pueblo de Israel» tampoco es tradicional directa. La solución más fiel es conservar una nota mínima sobre el hebreo literal y la traducción tradicional «los hijos de Israel» no cambia, por lo que esa nota debe reformularse para no ser redundante.'
  - severity: low
    issue: El marcador [c] está anclado en «Dios» en vez de en la cláusula pertinente.
    rationale: La alternativa «seré Dios para ellos» afecta a toda la expresión «seré su Dios», no solo al sustantivo final. En español es más claro anclar la nota después de la cláusula completa.
  revised_spanish_text: Y habitaré en medio de los hijos de Israel[a][b], y seré su Dios[c].
  revised_footnotes:
  - marker: a
    text: O «entre los hijos de Israel».
    reason: lexical_alternative
  - marker: b
    text: Hebreo «los hijos de Israel»; expresión familiar y genealógica que también se ha vertido de forma más libre como «los israelitas» o «el pueblo de Israel».
    reason: lexical_alternative
  - marker: c
    text: O «seré Dios para ellos».
    reason: alternative_reading
  revision_rationale: Se conserva el texto principal porque es fiel y natural, pero se corrigen las notas para que reflejen adecuadamente las decisiones léxicas documentadas y para eliminar la redundancia defectuosa de la nota b. También se entiende [c] como nota de cláusula completa.
