review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el sentido del griego: mandato de ayudar al prójimo dentro de los propios límites, seguido por una advertencia reflexiva de prudencia. Conserva correctamente la ambigüedad de μὴ ἐμπέσῃς mediante «no sea que caigas» y mantiene la nota alternativa. La única desviación relevante está en el anclaje de la nota: en el inglés la nota explica «lest you fall», pero en español quedó anclada a «capacidad», lo que no corresponde al problema léxico del original.'
  spanish_quality_summary: El español es claro y digno, pero «cuídate de ti mismo» suena algo redundante y menos idiomático que una formulación más natural como «ten cuidado» o «cuídate». También conviene mover la nota al segmento final, donde realmente aplica. El resto es legible y adecuado para un registro bíblico contemporáneo.
  glossary_alignment: No hay términos del glosario principal en disputa. «Prójimo» para πλησίον es apropiado; «según tu capacidad» representa bien κατὰ δύναμίν σου. La advertencia general de ἐμπέσῃς se conserva correctamente sin sobreespecificar el peligro.
  issues:
  - severity: medium
    issue: La nota [a] está anclada a «capacidad» en vez de a «caigas».
    rationale: La nota documenta alternativas léxicas de μὴ ἐμπέσῃς, no de κατὰ δύναμίν σου. Debe aparecer en el lugar correspondiente para reflejar fielmente el expediente POB y evitar confusión.
  - severity: low
    issue: «Cuídate de ti mismo» es menos natural y algo redundante en español.
    rationale: Aunque comunica el sentido reflexivo de πρόσεχε σεαυτῷ, una formulación como «ten cuidado» suena más idiomática y mantiene la advertencia sin pesadez.
  revised_spanish_text: Apoya a tu prójimo según tu capacidad, y ten cuidado, no sea que caigas[a].
