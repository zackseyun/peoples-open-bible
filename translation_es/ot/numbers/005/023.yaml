review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador capta bien la secuencia ritual y los referentes principales: el sacerdote, las maldiciones, el rollo y el agua amarga. Sin embargo, no preserva del todo la fuerza concreta de וּמָחָה אֶל, que en contexto describe quitar lo escrito de la superficie hacia/into el agua. «Las borrará en el agua amarga» suena menos natural y puede sugerir simplemente que el acto ocurre allí, no que las palabras sean lavadas al agua. También la nota b introduce «de la vista», matiz no sustentado por la evidencia dada.'
  spanish_quality_summary: El español es claro y ampliamente legible, pero «las borrará en el agua amarga» resulta torpe y semánticamente impreciso. Una formulación como «las lavará en el agua amarga» o «las quitará del rollo en el agua amarga» sería más natural; la primera además refleja bien la decisión inglesa auditada. Las notas están bien ancladas, pero la nota b debe ajustarse para no sobreinterpretar.
  glossary_alignment: No hay conflictos con la terminología principal del proyecto. «Sacerdote», «rollo» y «agua amarga» están bien. «Maldiciones» es una buena opción principal para הָאָלֹת, con la alternativa de juramento preservada en nota. El único ajuste léxico importante es al verbo מחה y su complemento direccional.
  issues:
  - severity: medium
    issue: «las borrará en el agua amarga» no expresa con suficiente claridad la transferencia de lo escrito al agua
    rationale: El hebreo וּמָחָה אֶל מֵי הַמָּרִים, y la auditoría inglesa, apuntan a quitar/lavar las palabras escritas hacia el agua. «Borrar en» en español suele indicar lugar o medio, no necesariamente traslado del escrito al líquido.
  - severity: medium
    issue: La nota b añade «de la vista», que no está apoyado por la evidencia fuente provista
    rationale: La alternativa inglesa conserva «blot them out / erase them» y explica que se refiere a quitar las palabras escritas. «Borrará de la vista» introduce un matiz interpretativo innecesario.
  revised_spanish_text: Entonces el sacerdote escribirá estas maldiciones[a] en el rollo y las lavará en el agua amarga[b].
  revised_footnotes:
