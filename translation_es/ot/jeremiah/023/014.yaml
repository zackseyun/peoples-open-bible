base_translation:
  language: en
  yaml_path: translation/ot/jeremiah/023/014.yaml
  text: 'And among the prophets of Jerusalem I have seen a horrible thing: committing adultery and walking in falsehood[a]; they have strengthened the hands of evildoers, so that no man turns back from his evil. All of them are to me like Sodom[b], and her inhabitants like Gomorrah.'
  footnotes:
  - marker: a
    text: Or 'no one turns back from his evil.' The Hebrew has the distributive singular 'man,' used representatively.
    reason: lexical_alternative
  - marker: b
    text: '''Turns back'' can also be rendered ''repents,'' since the Hebrew verb often carries the sense of turning from evil.'
    reason: lexical_alternative
