base_translation:
  language: en
  yaml_path: translation/ot/malachi/001/004.yaml
  text: 'Though Edom says[a], “We are shattered, but we will return and rebuild the ruins,” this is what Yahweh of Armies says: “They may build, but I will tear down, and they will be called the territory of wickedness[d][c][b], the people with whom Yahweh is indignant forever.”'
  footnotes:
  - marker: a
    text: Or, “They will build, but I will tear down.” The Hebrew can be read predictively; the main text brings out the concessive force in context.
    reason: alternative_reading
  - marker: b
    text: 'Traditional rendering: “the LORD of hosts.”'
    reason: lexical_alternative
  - marker: c
    text: Or, “the borderland of wickedness.”
    reason: lexical_alternative
  - marker: d
    text: Or, “the people against whom the LORD is indignant forever.”
    reason: lexical_alternative
