translation:
  language: es
  text: para que inspeccionen[a] Judea y Jerusalén, conforme a la ley del Señor que está en tu mano[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘supervisen’ o ‘indaguen sobre’. El verbo griego puede denotar inspección, supervisión o investigación oficial.
    reason: lexical_alternative
  - marker: b
    text: La expresión ‘en tu mano’ está respaldada por el paralelo hebreo en Esdras 7 y probablemente significa ‘encomendada a ti’ o ‘en tu posesión’.
    reason: cross_reference
lexical_decisions:
- source_word: ὅπως
  english_pob_choice: so that
  chosen_spanish: para que
  alternatives_spanish:
  - a fin de que
  - de modo que
  lexicon: LSJ
  rationale: Expresa con naturalidad la finalidad del verbo principal y conserva el valor purposivo del griego.
- source_word: ἐπισκέψωνται
  english_pob_choice: they may inspect
  chosen_spanish: inspeccionen
  alternatives_spanish:
  - supervisen
  - visiten
  - examinen
  lexicon: LSJ
  rationale: En un contexto administrativo, 'inspeccionen' comunica mejor el examen oficial o la revisión autorizada que una mera visita.
- source_word: κατὰ τὴν Ἰουδαίαν καὶ κατὰ Ἰερουσαλήμ
  english_pob_choice: Judea and Jerusalem
  chosen_spanish: Judea y Jerusalén
  alternatives_spanish:
  - en Judea y en Jerusalén
  - a través de Judea y Jerusalén
  - respecto de Judea y Jerusalén
  lexicon: LSJ
  rationale: Se mantiene la doble referencia geográfica sin sobrecargar la frase; el español puede omitir la repetición de 'κατά' sin perder el sentido de ámbito de la inspección.
- source_word: ἀκολούθως
  english_pob_choice: according to
  chosen_spanish: conforme a
  alternatives_spanish:
  - de acuerdo con
  - según
  - en conformidad con
  lexicon: LSJ
  rationale: '''Conforme a'' reproduce el valor normativo de la partícula adverbial en un registro claro y digno.'
- source_word: νόμῳ Κυρίου
  english_pob_choice: the law of the Lord
  chosen_spanish: la ley del Señor
  alternatives_spanish:
  - la ley de Yahvé
  - la ley del Señor Dios
  lexicon: LSJ
  rationale: '''Ley'' es la traducción natural de νόμος. Para κύριος en contexto judío bíblico, se conserva ''Señor'' por la convención del POB en este tipo de cita lxx, sin forzar una forma litúrgica distinta.'
theological_decisions:
- issue: Rendering Κυρίου in a Jewish scriptural context
  english_pob_reading: the Lord
  chosen_spanish_reading: el Señor
  alternative_spanish_readings:
  - Yahvé
  - el Señor
  rationale: El griego usa Κυρίου dentro de un contexto escritural judío; el audit trail inglés mantuvo 'the Lord'. En español, 'el Señor' preserva esa convención sin introducir una decisión de nombre divino no explicitada por el POB inglés para esta línea.
  doctrine_reference: 'DOCTRINE.md Contested terms: κύριος → Lord'
translation_notes:
  revision_awareness: El registro inglés fue revisado sin cambios en la última pasada; esta propuesta sigue la misma lectura principal y conserva la tensión administrativa de ἐπισκέψωνται mediante un verbo español de inspección. Se mantiene también el marco normativo de νόμος Κυρίου sin expandir el texto más allá de lo que el griego y el audit trail justifican.
  spanish_consistency_notes:
  - Se evita la paráfrasis devocional y se conserva el tono administrativo del pasaje.
  - '''Señor'' se mantiene como equivalente de Κυρίου en coherencia con el audit trail inglés.'
  - '''Inspeccionen'' refleja mejor el matiz oficial que ''visiten'' o ''supervisen'' en español contemporáneo.'
