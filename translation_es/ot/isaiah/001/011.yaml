translation:
  language: es
  text: ¿De qué me sirven sus muchos sacrificios?, dice Yahvé[a]. Estoy harto de holocaustos de carneros y de la grasa de animales engordados; y en la sangre de toros, corderos y machos cabríos[b] no me complazco.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «¿Para qué me sirven sus muchos sacrificios?» El hebreo dice literalmente: «¿Por qué a mí la multitud de sus sacrificios?»'
    reason: lexical_alternative
  - marker: b
    text: «Machos cabríos» traduce un término que más específicamente significa ‘cabros’ o ‘cabras macho’.
    reason: lexical_alternative
lexical_decisions:
- source_word: לָמָּה לִּי
  english_pob_choice: Why are ... to me?
  chosen_spanish: ¿Para qué me sirve ...?
  alternatives_spanish:
  - ¿Por qué ...?
  - ¿De qué me valen ...?
  lexicon: HALOT
  rationale: El hebreo combina la pregunta ‘¿por qué?’ con el dativo ‘para mí/a mí’, formando un giro idiomático que cuestiona el valor de los sacrificios desde la perspectiva de Yahvé. ‘¿Para qué me sirve...?’ preserva bien la fuerza retórica en español natural sin perder el matiz de utilidad cuestionada.
- source_word: רֹב זִבְחֵיכֶם
  english_pob_choice: your many sacrifices
  chosen_spanish: la abundancia de sus sacrificios
  alternatives_spanish:
  - la multitud de sus sacrificios
  - sus muchos sacrificios
  lexicon: HALOT
  rationale: רֹב expresa abundancia o multitud. ‘La abundancia de sus sacrificios’ mantiene el énfasis cuantitativo y suena natural en español bíblico contemporáneo.
- source_word: יֹאמַר יְהוָה
  english_pob_choice: says Yahweh
  chosen_spanish: dice Yahvé
  alternatives_spanish:
  - declara Yahvé
  - dice Yahvé el SEÑOR
  lexicon: HALOT
  rationale: 'Se mantiene el nombre divino según el estándar del proyecto: ‘Yahvé’. ‘Dice’ reproduce la fórmula profética directa y sobria del hebreo.'
- source_word: שָׂבַעְתִּי
  english_pob_choice: I have had enough
  chosen_spanish: Estoy harto
  alternatives_spanish:
  - Estoy satisfecho de más
  - Me basta
  lexicon: HALOT
  rationale: El verbo expresa saciedad hasta el rechazo. ‘Estoy harto’ comunica en español la idea de estar colmado y cansado de algo, con el tono profético de reprobación.
- source_word: עֹלוֹת אֵילִים
  english_pob_choice: burnt offerings of rams
  chosen_spanish: holocaustos de carneros
  alternatives_spanish:
  - ofrendas quemadas de carneros
  - holocaustos de rams
  lexicon: HALOT
  rationale: ‘עֹלוֹת’ corresponde a ‘holocaustos’ en el sentido sacrificial técnico de ofrendas totalmente consumidas; ‘carneros’ traduce אֵילִים con precisión zoológica y claridad litúrgica.
- source_word: חֵלֶב מְרִיאִים
  english_pob_choice: the fat of fattened animals
  chosen_spanish: la grasa de animales engordados
  alternatives_spanish:
  - la grasa de reses cebadas
  - la grosura de animales cebados
  lexicon: HALOT
  rationale: ‘חֵלֶב’ es grasa/fat; ‘מְרִיאִים’ alude a animales bien alimentados o engordados. ‘Animales engordados’ conserva el sentido sin arcaísmo.
- source_word: דַם פָּרִים וּכְבָשִׂים וְעַתּוּדִים
  english_pob_choice: the blood of bulls and lambs and goats
  chosen_spanish: la sangre de toros, corderos y machos cabríos
  alternatives_spanish:
  - la sangre de toros, ovejas y machos cabríos
  - la sangre de toros, corderos y cabritos
  lexicon: HALOT
  rationale: פָּרִים son toros; כְבָשִׂים puede referirse a corderos/ovejas según contexto sacrificial, y aquí ‘corderos’ es natural y concreto. עַתּוּדִים son machos cabríos, especificación más precisa que el simple ‘cabras’.
- source_word: לֹא חָפָצְתִּי
  english_pob_choice: I do not delight
  chosen_spanish: no me complazco
  alternatives_spanish:
  - no me deleito
  - no lo quiero
  lexicon: HALOT
  rationale: El verbo expresa deleite/placer/deseo. ‘No me complazco’ conserva el tono evaluativo y negativo del hebreo sin sonar demasiado moderno o psicológico.
theological_decisions:
- issue: Rendering the divine name יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahvé
  - Jehová
  - el SEÑOR
  rationale: El texto hebreo usa el Tetragrámaton directamente. Según el estándar del proyecto en español, se traduce como ‘Yahvé’ para preservar el nombre de pacto, en vez de ocultarlo bajo una convención tipográfica.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
translation_notes:
  revision_awareness: La redacción sigue la revisión reciente que corrigió el giro interrogativo de ‘What are...’ a ‘Why are...’, reflejando mejor לָמָּה. En español se optó por una formulación idiomática equivalente (‘¿Para qué me sirve...?’) que preserva la pregunta retórica sin mecanicismo. También se mantuvo la enumeración sacrificial y la negativa final con un verbo de deleite/agrado coherente con el audit trail.
  spanish_consistency_notes:
  - Se usa ‘Yahvé’ para el nombre divino, conforme al estándar del proyecto.
  - 'Se conservan términos sacrificiales con precisión léxica: ‘holocaustos’, ‘grasa’, ‘toros’, ‘corderos’ y ‘machos cabríos’.'
  - La pregunta inicial se formula de modo idiomático para mantener la fuerza de לָמָּה + dativo sin calco excesivo.
