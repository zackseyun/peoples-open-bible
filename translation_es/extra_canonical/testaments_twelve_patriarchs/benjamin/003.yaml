- from: '1[a]. Ahora, pues, hijos míos, también vosotros debéis amar al Señor, el Dios del cielo y de la tierra, y guardar sus mandamientos, imitando al hombre bueno y santo José. 2. Y que vuestra mente esté puesta en lo que es bueno, como sabéis que está la mía. Pues el que tiene la mente recta lo ve todo rectamente. 3. Temed al Señor y amad al prójimo; y si los espíritus de Beliar os empujan a toda maldad de aflicción, ciertamente no os dominarán, así como no dominaron a José mi hermano. 4. Cuántos hombres quisieron matarlo, y sin embargo Dios lo amparó[b]. Pues el que teme a Dios y ama a su prójimo no puede ser herido por el espíritu de Beliar, estando amparado por el temor de Dios. 5. Y no puede ser sometido por las intrigas de hombres ni de fieras, pues el Señor lo ayuda mediante el amor que tiene hacia su prójimo. 6. Pues también José rogó a nuestro padre que orase por sus hermanos, para que el Señor no les imputara pecado, porque habían obrado mal contra él. 7. Y así clamó Jacob:
    «Oh hijo bueno, has conmovido las entrañas de Jacob tu padre»; y abrazándolo, por dos horas seguía besándolo, diciendo: 8. «Se cumplirá sobre ti la profecía celestial».'
  to: '1[a]. Ahora pues, hijos míos, también ustedes amen a Yahvé, el Dios del cielo y de la tierra, y guarden sus mandamientos, imitando al hombre bueno y piadoso José. 2. Y que su mente esté puesta en lo que es bueno, como me conocen. Porque el que tiene la mente recta lo ve todo rectamente. 3. Teman a Yahvé y amen al prójimo; y si los espíritus de Beliar los empujan a toda aflicción mala, ciertamente no los dominarán, así como no dominaron a José mi hermano. 4. Cuántos hombres quisieron matarlo, y Dios lo amparó[b]. Pues el que teme a Dios y ama a su prójimo no puede ser herido por el espíritu de Beliar, estando amparado por el temor de Dios. 5. Y no puede ser sometido por las intrigas de hombres ni por fieras, siendo ayudado por el Señor mediante el amor que tiene hacia su prójimo. 6. Pues también José rogó a nuestro padre que orase por sus hermanos, para que el Señor no les imputara pecado, porque habían obrado mal contra él. 7. Y así clamó Jacob: «Oh hijo bueno, has conmovido las entrañas
    de Jacob tu padre»; y abrazándolo, lo seguía besando por dos horas, diciendo: 8. «Se cumplirá sobre ti la profecía celestial».'
  rationale: 'Three sets of corrections: (1) All Castilian vosotros/vosotras forms replaced with neutral Latin American ustedes paradigm throughout (debéis→deben, sabéis→conocen, vuestra→su, Temed→Teman, amad→amen, os empujan→los empujan, os dominarán→los dominarán, vosotros→ustedes, etc.). (2) v.1 ''santo'' replaced with ''piadoso'' for ὅσιος, consistent with per-verse 3.1 lexical decision. (3) v.3 ''Señor'' replaced with ''Yahvé'' for Κύριον, consistent with per-verse 3.1 and revised 3.3 and POB glossary.'
