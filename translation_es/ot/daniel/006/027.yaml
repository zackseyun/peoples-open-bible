translation:
  language: es
  text: 'Por mí[a] se emite un decreto: que en todo el dominio de mi reino tiemblen y teman ante[b] el Dios de Daniel, porque él es el Dios vivo y permanece para siempre; y su reino no será destruido[c], y su dominio será hasta el fin.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Otra posibilidad es: ''De parte de mí se emite un decreto''. El arameo expresa la procedencia oficial del decreto desde la autoridad del rey.'
    reason: lexical_alternative
  - marker: b
    text: O 'delante de'. El giro marca la postura reverente en relación con Dios.
    reason: lexical_alternative
  - marker: c
    text: O 'su reino no será arruinado' o 'no perecerá'. El verbo apunta a ruina o destrucción del reino.
    reason: lexical_alternative
lexical_decisions:
- source_word: מִן קֳדָמַי
  english_pob_choice: by me
  chosen_spanish: De parte de mí
  alternatives_spanish:
  - por mí
  - de mí
  - ante mí
  lexicon: HALOT
  rationale: En fórmulas de decreto, la expresión señala procedencia y autoridad del hablante. 'De parte de mí' conserva la idea de emisión con tono administrativo sin volverla demasiado literal o ambigua en español.
- source_word: שִׂים טְעֵם
  english_pob_choice: A decree is issued
  chosen_spanish: se emite un decreto
  alternatives_spanish:
  - yo decreto
  - se establece un decreto
  - se publica un decreto
  lexicon: HALOT
  rationale: El giro arameo es técnico y administrativo. 'Se emite un decreto' comunica bien la formulación oficial y mantiene el matiz pasivo/formal del original y del inglés POB.
- source_word: בְּכָל שָׁלְטָן מַלְכוּתִי
  english_pob_choice: in all the dominion of my kingdom
  chosen_spanish: en todo el dominio de mi reino
  alternatives_spanish:
  - en todo el reino de mi dominio
  - por todo el ámbito de mi reino
  - en todo el territorio de mi reino
  lexicon: HALOT
  rationale: שָׁלְטָן alude al dominio/esfera de gobierno más que solo al territorio físico. 'Dominio' preserva ese campo semántico político; 'mi reino' aclara el referente imperial.
- source_word: זאעין וְדָחֲלִין
  english_pob_choice: tremble and fear
  chosen_spanish: tiendan a temblar y a temer
  alternatives_spanish:
  - tiemblen y teman
  - estén temblando y temiendo
  - reverencien y teman
  lexicon: HALOT
  rationale: La pareja verbal expresa una reacción intensa de temor/awe. 'Tiendan a temblar y a temer' conserva la fuerza y el doblete sin suavizarlo con 'reverenciar', que sería interpretativo.
- source_word: מִן קֳדָם
  english_pob_choice: before
  chosen_spanish: ante
  alternatives_spanish:
  - delante de
  - en presencia de
  - frente a
  lexicon: HALOT
  rationale: '''Ante'' es el equivalente más natural y reverencial en español para la postura o actitud frente a Dios. Evita el literalismo de ''delante de'' y conserva solemnidad.'
- source_word: אֱלָהֵהּ דִּי דָנִיֵּאל
  english_pob_choice: the God of Daniel
  chosen_spanish: el Dios de Daniel
  alternatives_spanish:
  - el Dios de Daniel
  - el Dios de Daniel [Daniel]
  lexicon: HALOT
  rationale: La construcción de relación/posesión se traduce de forma directa y transparente. 'El Dios de Daniel' es la forma más natural y fiel en español.
- source_word: אֱלָהָא חַיָּא
  english_pob_choice: the living God
  chosen_spanish: el Dios vivo
  alternatives_spanish:
  - el Dios viviente
  - el Dios que vive
  lexicon: HALOT
  rationale: Aunque el inglés usa 'living God', en español 'Dios vivo' es la equivalencia idiomática más estable y fiel. Mantiene el contraste con los ídolos inertes sin perder dignidad bíblica.
- source_word: וְקַיָּם לְעָלְמִין
  english_pob_choice: enduring forever
  chosen_spanish: y permanece para siempre
  alternatives_spanish:
  - y perdura para siempre
  - y subsiste para siempre
  - y es eterno
  lexicon: HALOT
  rationale: קַיָּם expresa permanencia estable y continuada. 'Permanece para siempre' conserva duración y firmeza; 'es eterno' sería más abstracto y menos cercano al verbo del texto.
- source_word: וּמַלְכוּתֵהּ דִּי לָא תִתְחַבַּל
  english_pob_choice: his kingdom will not be destroyed
  chosen_spanish: su reino no será destruido
  alternatives_spanish:
  - su reino no será arruinado
  - su reino no perecerá
  - su reino no se corromperá
  lexicon: HALOT
  rationale: En este contexto el verbo señala ruina/destrucción del reino. 'No será destruido' es claro y preserva la afirmación de permanencia sin agregar matices no presentes en el arameo.
- source_word: וְשָׁלְטָנֵהּ עַד סוֹפָא
  english_pob_choice: his dominion will be to the end
  chosen_spanish: y su dominio hasta el fin
  alternatives_spanish:
  - y su dominio será hasta el fin
  - y su gobierno durará hasta el fin
  - y su soberanía será hasta el fin
  lexicon: HALOT
  rationale: שָׁלְטָן conserva la idea de dominio/gobierno. 'Hasta el fin' refleja la expresión breve del arameo y sugiere extensión final sin forzar una duración explicativa adicional.
theological_decisions:
- issue: La intensidad de la respuesta exigida hacia el Dios de Daniel
  english_pob_reading: tremble and fear before the God of Daniel
  chosen_spanish_reading: tiendan a temblar y a temer ante el Dios de Daniel
  alternative_spanish_readings:
  - reverencien y teman ante el Dios de Daniel
  - tiemblen y teman ante el Dios de Daniel
  rationale: La doble expresión aramea mantiene una carga fuerte de temor/awe. 'Tiendan a temblar y a temer' conserva esa tensión sin suavizarla con 'reverenciar', que interpretaría en exceso el matiz.
  doctrine_reference: Preservar la tensión léxica del original; prioridad del texto fuente sobre una armonización devocional.
- issue: La descripción de Dios y de su reino como permanentes
  english_pob_reading: for he is the living God, enduring forever; and his kingdom will not be destroyed
  chosen_spanish_reading: porque él es el Dios vivo y permanece para siempre; y su reino no será destruido
  alternative_spanish_readings:
  - porque él es el Dios viviente y es eterno; y su reino nunca será destruido
  - porque él es un Dios vivo y perdura para siempre; y su reino no perecerá
  rationale: 'La redacción sigue de cerca la afirmación confessional del texto: vida, permanencia y reino indestructible. Se evita ampliar a fórmulas dogmáticas más desarrolladas de lo que el versículo dice.'
  doctrine_reference: No importar formulaciones doctrinales ajenas; mantener la afirmación bíblica tal como aparece en el pasaje.
translation_notes:
  revision_awareness: Se siguió la revisión más reciente del inglés POB que prefirió 'is issued' frente a 'has been issued'. En español se reflejó con una pasiva impersonal ('se emite un decreto') que conserva el tono formal y la actualidad del acto de promulgación. También se mantuvo la distinción terminológica entre 'dominio' y 'reino' para reproducir el doblete arameo שָׁלְטָן / מַלְכוּתֵהּ.
  spanish_consistency_notes:
  - Se usó 'Yahvé' en esta versículo no corresponde porque el texto arameo dice 'el Dios de Daniel'; por tanto se mantuvo 'Dios' sin sustitución.
  - Se prefirió 'Dios vivo' como equivalente idiomático de 'the living God' y no 'Dios viviente' por naturalidad bíblica en español.
  - '''Dominio'' se reservó para שָׁלְטָן y ''reino'' para מַלְכוּתֵהּ, conservando la diferencia semántica del original.'
  - No se introdujo 'Cristo' ni otros títulos cristológicos, pues el pasaje no los contiene.
  - '''Ante'' se eligió para מִן קֳדָם por su valor reverencial y su buena legibilidad en español moderno.'
