lexical_decisions:
- source_word: ὁ δὲ
  english_pob_choice: But
  chosen_spanish: Pero
  alternatives_spanish:
  - Y
  - Ahora
  lexicon: LSJ
  rationale: δέ introduce una transición con contraste leve; en español, 'Pero' refleja bien ese giro narrativo sin volverlo demasiado fuerte.
- source_word: Ἡλιόδωρος
  english_pob_choice: Heliodorus
  chosen_spanish: Heliodoro
  lexicon: transliteración
  rationale: Nombre propio transliterado al español según la práctica del proyecto.
- source_word: τὸ διεγνωσμένον
  english_pob_choice: what had been decided
  chosen_spanish: lo que había sido decidido
  alternatives_spanish:
  - lo determinado
  - lo que había sido decretado
  - la resolución tomada
  lexicon: LSJ
  rationale: El participio perfecto pasivo sustantivado expresa algo ya resuelto con anterioridad; 'lo que había sido decidido' conserva el sentido de determinación previa en un español natural.
- source_word: ἐπετέλει
  english_pob_choice: was carrying out
  chosen_spanish: estaba ejecutando
  alternatives_spanish:
  - estaba llevando a cabo
  - estaba cumpliendo
  - estaba realizando
  lexicon: LSJ
  rationale: El imperfecto marca acción en curso en pasado. 'Estaba ejecutando' preserva la idea de poner en efecto una decisión ya tomada, en línea con la lectura inglesa.
