translation:
  language: es
  text: Y aunque ya tenía[a] el armazón de sus huesos quemado por todas partes, el joven magnánimo y semejante a Abraham no gimió.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «el armazón de sus huesos ya estaba quemado por todas partes». El griego presenta una imagen vívida del efecto del fuego sobre la estructura ósea.
    reason: lexical_alternative
lexical_decisions:
- source_word: περιτετηγμένον
  english_pob_choice: burned all around
  chosen_spanish: quemado por todas partes
  alternatives_spanish:
  - derretido por todas partes
  - consumido por todas partes
  - chamuscado por todas partes
  lexicon: LSJ
  rationale: El participio perfecto describe un daño ya extendido en toda la estructura ósea; en este contexto de tortura por fuego, «quemado por todas partes» comunica el efecto total sin forzar un literalismo que suene extraño en español.
- source_word: πῆγμα
  english_pob_choice: framework
  chosen_spanish: armazón
  alternatives_spanish:
  - estructura
  - masa
  - composición
  lexicon: LSJ
  rationale: Con «de los huesos», el término apunta a la estructura corporal formada por ellos. «Armazón» mantiene la imagen concreta del esqueleto y su disposición física.
- source_word: μεγαλόφρων
  english_pob_choice: noble-minded
  chosen_spanish: magnánimo
  alternatives_spanish:
  - noble de ánimo
  - de gran corazón
  - altivo
  lexicon: LSJ
  rationale: El adjetivo expresa grandeza de ánimo, valentía y dignidad moral. «Magnánimo» es un equivalente natural en español y preserva esa cualidad interior.
- source_word: Ἀβραμιαῖος
  english_pob_choice: Abraham-like
  chosen_spanish: semejante a Abraham
  alternatives_spanish:
  - abrahámico
  - como Abraham
  - de Abraham
  lexicon: LSJ
  rationale: La forma adjetival señala semejanza de carácter, no solo pertenencia o descendencia. «Semejante a Abraham» conserva explícitamente la comparación ejemplar.
- source_word: νεανίας
  english_pob_choice: young man
  chosen_spanish: joven
  alternatives_spanish:
  - muchacho
  - joven guerrero
  lexicon: LSJ
  rationale: Es el término estándar para un varón joven. En español, «joven» es natural y preciso; se evita añadir matices no presentes en el griego.
- source_word: οὐκ ἐστέναξεν
  english_pob_choice: did not groan
  chosen_spanish: no gimió
  alternatives_spanish:
  - no suspiró
  - no se lamentó
  - no lanzó un gemido
  lexicon: LSJ
  rationale: En un contexto de sufrimiento físico, στενάζω expresa gemido o queja audible. «No gimió» reproduce ese valor con fuerza y naturalidad en español.
theological_decisions:
- issue: Valor ejemplar de Ἀβραμιαῖος
  english_pob_reading: Abraham-like
  chosen_spanish_reading: semejante a Abraham
  alternative_spanish_readings:
  - abrahámico
  - descendiente de Abraham
  rationale: El elogio no parece limitarse a una identidad genealógica; subraya una semejanza en fe y firmeza al modo de Abraham. Por eso se mantiene la comparación ética y teológica en vez de una mera etiqueta de pertenencia.
  doctrine_reference: Lexical/theological continuity with the source's comparative characterization; avoid collapsing resemblance into ancestry.
translation_notes:
  revision_awareness: La traducción sigue de cerca el texto griego y el audit trail inglés, conservando la imagen corporal intensiva de πῆγμα y la comparación caracterizadora de Ἀβραμιαῖος. No se detectan revisiones recientes que requieran nota adicional.
  spanish_consistency_notes:
  - Se usa «Dios» y «Yahvé» según corresponda en otros contextos del proyecto; aquí no aparece el nombre divino.
  - Se evita «Cristo» porque no hay título mesiánico en este versículo.
  - «Gimió» mantiene un registro sobrio y bíblico sin caer en arcaísmo innecesario.
  - La nota [a] se ancla en «quemado por todas partes» para preservar la alternativa léxica documentada.
