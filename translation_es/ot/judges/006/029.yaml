translation:
  language: es
  text: 'Y cada hombre dijo a su compañero[a]: «¿Quién ha hecho esta cosa[b]?» Y ellos indagaron y buscaron, y dijeron: «Gedeón, hijo de Joás, ha hecho esta cosa[b]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «un hombre a otro». El hebreo dice literalmente «un hombre a su compañero».
    reason: lexical_alternative
  - marker: b
    text: O «este hecho» o «este acto». Aquí דָּבָר se refiere a la acción concreta que acababan de descubrir.
    reason: lexical_alternative
lexical_decisions:
- source_word: אִישׁ אֶל רֵעֵהוּ
  english_pob_choice: each man ... to his neighbor
  chosen_spanish: cada hombre ... a su compañero
  alternatives_spanish:
  - uno al otro
  - cada uno a su prójimo
  - cada hombre ... a su vecino
  lexicon: HALOT
  rationale: El hebreo usa un giro distributivo singular colectivo. «Cada hombre ... a su compañero» conserva la reciprocidad entre los presentes sin borrar el matiz idiomático del original.
- source_word: מִי
  english_pob_choice: Who
  chosen_spanish: ¿Quién
  alternatives_spanish:
  - ¿Quién es el que
  - ¿Cuál hombre
  lexicon: HALOT
  rationale: Interrogativo directo y natural en español para introducir la pregunta por la agencia.
- source_word: עָשָׂה
  english_pob_choice: has done
  chosen_spanish: ha hecho
  alternatives_spanish:
  - hizo
  - ha realizado
  - ha cometido
  lexicon: HALOT
  rationale: El perfecto hebreo en este contexto de indagación se refleja bien con el perfecto compuesto español. «Ha hecho» mantiene la referencia a una acción ya consumada.
- source_word: הַדָּבָר הַזֶּה
  english_pob_choice: this thing
  chosen_spanish: esta cosa
  alternatives_spanish:
  - este hecho
  - este acto
  - este asunto
  lexicon: HALOT
  rationale: דָּבָר aquí apunta a la acción concreta descubierta. «Esta cosa» sigue de cerca la amplitud semántica del texto fuente; aunque suena menos idiomático que «este hecho», evita precisar más de lo que el hebreo exige.
- source_word: וַיִּדְרְשׁוּ
  english_pob_choice: they inquired
  chosen_spanish: indagaron
  alternatives_spanish:
  - inquirieron
  - investigaron
  - preguntaron
  lexicon: HALOT
  rationale: דרשׁ expresa averiguación. «Indagaron» conserva el sentido de búsqueda de información y se diferencia de la acción posterior de buscar.
- source_word: וַיְבַקְשׁוּ
  english_pob_choice: searched
  chosen_spanish: buscaron
  alternatives_spanish:
  - buscaron con empeño
  - se pusieron a buscar
  - averiguaron
  lexicon: HALOT
  rationale: בקשׁ suele significar «buscar/seek». «Buscaron» reproduce el movimiento de indagación activa sin añadir un objeto explícito que el hebreo no menciona.
- source_word: גִּדְעוֹן בֶּן יוֹאָשׁ
  english_pob_choice: Gideon son of Joash
  chosen_spanish: Gedeón, hijo de Joás
  alternatives_spanish:
  - Gedeón, hijo de Joás
  - Gedeón hijo de Joás
  lexicon: HALOT
  rationale: Los nombres propios se castellanizan de forma habitual en español bíblico. Se conserva la construcción patronímica clara y directa.
- source_word: וַיֹּאמְרוּ
  english_pob_choice: they said
  chosen_spanish: dijeron
  alternatives_spanish:
  - dijeron entonces
  - respondieron
  - afirmaron
  lexicon: HALOT
  rationale: אָמַר se traduce de manera sencilla por «decir». En español, «dijeron» es la forma natural para reportar la conclusión verbal del grupo.
translation_notes:
  revision_awareness: 'La redacción sigue de cerca el último estado del audit trail inglés: se mantuvo el perfecto compuesto en ambas ocurrencias de עָשָׂה para reflejar el valor verbal del hebreo en una pregunta/investigación sobre una acción ya realizada, y se preservó la secuencia de «indagaron» + «buscaron» como dos verbos distintos para reproducir דרשׁ y בקשׁ sin fusionarlos.'
  spanish_consistency_notes:
  - Se evitó «SEÑOR» u otras sustituciones no pertinentes, ya que el versículo no contiene el nombre divino.
  - Se prefirió «hijo de» como patronímico estándar en español bíblico, manteniendo la claridad genealógica.
  - «Esta cosa» se dejó en el texto principal por fidelidad semántica, aunque en una nota se registran alternativas más idiomáticas para el español.
