translation:
  language: es
  text: Él bendecirá al pueblo del Señor en sabiduría, con alegría[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «con gozo» / «con regocijo» para μετʼ εὐφροσύνης.
    reason: lexical_alternative
lexical_decisions:
- source_word: εὐλογήσει
  english_pob_choice: He will bless
  chosen_spanish: Él bendecirá
  alternatives_spanish:
  - Él dará bendición
  - Él pronunciará bendición sobre
  lexicon: BDAG
  rationale: El futuro activo de εὐλογέω expresa acción benéfica en favor del pueblo; «bendecirá» es el equivalente natural y fiel en español, sin añadir explicación interpretativa.
- source_word: λαὸν
  english_pob_choice: people
  chosen_spanish: pueblo
  alternatives_spanish:
  - gente
  - nación
  lexicon: BDAG
  rationale: λαός señala a un pueblo como comunidad. «Pueblo» conserva ese sentido colectivo y resulta más natural que «gente» o «nación» en este contexto.
- source_word: Κυρίου
  english_pob_choice: the Lord's
  chosen_spanish: del Señor
  alternatives_spanish:
  - de Yahvé
  - del Señor Yahvé
  lexicon: BDAG
  rationale: 'El genitivo es posesivo: el pueblo pertenece al Señor. Aquí se mantiene «Señor» porque el texto griego dice Κυρίου y el contexto ya funciona con el título divino; no hay marca explícita del Tetragrámaton en este versículo como fuente inmediata.'
- source_word: ἐν σοφίᾳ
  english_pob_choice: in wisdom
  chosen_spanish: en sabiduría
  alternatives_spanish:
  - con sabiduría
  - sabia mente
  lexicon: BDAG
  rationale: ἐν con σοφίᾳ expresa esfera o modo. «En sabiduría» sigue de cerca la construcción griega y conserva la relación semántica sin sobreinterpretarla como simple instrumento.
- source_word: μετʼ εὐφροσύνης
  english_pob_choice: with gladness
  chosen_spanish: con alegría
  alternatives_spanish:
  - con gozo
  - con regocijo
  lexicon: BDAG
  rationale: μετά con genitivo expresa acompañamiento. εὐφροσύνη puede traducirse «alegría» o «gozo»; se elige «alegría» por su tono digno y comprensible, manteniendo la idea de gozo acompañante.
translation_notes:
  revision_awareness: La redacción griega distingue ἐν σοφίᾳ de μετʼ εὐφροσύνης; la versión española preserva esa diferencia con «en» y «con». El audit trail inglés también separa ambos matices y ofrece «with joy/rejoicing» como alternativas para εὐφροσύνη.
  spanish_consistency_notes:
  - Se evitó «SEÑOR» en mayúsculas como máscara editorial; se usa «Señor» como título divino en una forma española legible.
  - «sabiduría» conserva el sustantivo abstracto del griego sin convertirlo en adverbio.
  - «alegría» mantiene el matiz de εὐφροσύνη sin hacerla más solemne de lo que el texto exige.
  - La puntuación reproduce la cadencia breve del original y mantiene dos complementos preposicionales diferenciados.
