translation:
  language: es
  text: Y cuando se vea que Moab está agotado en el lugar alto[a], y viene a su santuario para orar[b][c], no podrá.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «él sea visto» o «parezca que Moab está agotado en el lugar alto». El hebreo permite un sentido más personal o más impersonal en la cláusula inicial.
    reason: lexical_alternative
  - marker: b
    text: «Lugar alto» se refiere a un sitio de culto elevado usado para la adoración.
    reason: cultural_note
  - marker: c
    text: O «no prevalecerá». Esta traducción hace explícito el sentido probable de que su oración no tendrá éxito.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהָיָה כִּי
  english_pob_choice: And when
  chosen_spanish: Y cuando
  alternatives_spanish:
  - Y acontecerá cuando
  - Y será cuando
  lexicon: HALOT
  rationale: La fórmula introduce una circunstancia futura; «Y cuando» conserva el valor temporal sin sonar forzado en español.
- source_word: נִרְאָה
  english_pob_choice: it is seen
  chosen_spanish: se vea
  alternatives_spanish:
  - se vea claramente
  - aparezca
  lexicon: HALOT
  rationale: El niphal permite un matiz pasivo o impersonal. «Se vea» mantiene esa apertura sin decidir de más el sujeto; en español también puede sugerir ‘cuando quede evidente’.
- source_word: נִלְאָה
  english_pob_choice: is worn out
  chosen_spanish: está agotado
  alternatives_spanish:
  - está cansado
  - se ha fatigado
  lexicon: HALOT
  rationale: El verbo expresa fatiga o agotamiento por esfuerzo inútil. «Está agotado» comunica bien el resultado durativo y es natural en español.
- source_word: מוֹאָב
  english_pob_choice: Moab
  chosen_spanish: Moab
  alternatives_spanish:
  - el de Moab
  lexicon: HALOT
  rationale: Se conserva el nombre propio del pueblo/nación personificada.
- source_word: עַל הַבָּמָה
  english_pob_choice: on the high place
  chosen_spanish: en el lugar alto
  alternatives_spanish:
  - sobre el lugar alto
  - en el alto lugar
  lexicon: HALOT
  rationale: «Lugar alto» comunica el sitio cultual elevado sin volverlo demasiado técnico o eclesiástico. Evita imponer una palabra tradicional que en español podría sonar más interpretativa que el hebreo.
- source_word: וּבָא
  english_pob_choice: and he comes
  chosen_spanish: y viene
  alternatives_spanish:
  - y entra
  - y se acerca
  lexicon: HALOT
  rationale: «Viene» conserva el movimiento hacia el destino y encaja con la construcción siguiente. Mantiene el singular personificado de Moab.
- source_word: אֶל מִקְדָּשׁוֹ
  english_pob_choice: to his sanctuary
  chosen_spanish: a su santuario
  alternatives_spanish:
  - a su santuario sagrado
  - a su templo
  lexicon: HALOT
  rationale: «Santuario» es suficientemente amplio para un sitio de culto y no fuerza el sentido institucional de «templo». El posesivo «su» conserva el sufijo singular.
- source_word: לְהִתְפַּלֵּל
  english_pob_choice: to pray
  chosen_spanish: para orar
  alternatives_spanish:
  - para rezar
  - para suplicar
  lexicon: HALOT
  rationale: «Orar» es el verbo español más digno y directo para la acción de dirigirse a Dios o a una deidad en este contexto. «Rezar» sería posible, pero puede sonar más confesional; «suplicar» añade un matiz no explícito.
- source_word: וְלֹא יוּכָל
  english_pob_choice: he will not be able
  chosen_spanish: no podrá
  alternatives_spanish:
  - no será capaz
  - no tendrá éxito
  lexicon: HALOT
  rationale: «No podrá» sigue de cerca el sentido literal de יכל. Se evita explicitar «tendrá éxito» para no cerrar la tensión entre capacidad y eficacia, aunque el contexto sugiere fracaso.
theological_decisions:
- issue: Sujeto singular personificado para Moab
  english_pob_reading: Render Moab as a personified singular ('he comes ... he will not be able')
  chosen_spanish_reading: 'Moab se mantiene en singular personificado: «viene ... no podrá»'
  alternative_spanish_readings:
  - «vienen ... no podrán» (plural colectivo)
  - «se llega ... no puede» (impersonal)
  rationale: El hebreo usa formas singulares con el nombre nacional. Mantener el singular conserva la retórica personificadora sin añadir interpretación doctrinal.
  doctrine_reference: Translation philosophy §5 (consistencia de términos clave, o excepción documentada)
- issue: Valor de la cláusula final יוּכָל
  english_pob_reading: 'The final clause is literal: ''he will not be able.'''
  chosen_spanish_reading: «no podrá»
  alternative_spanish_readings:
  - «no prevalecerá»
  - «no logrará nada»
  rationale: La revisión inglesa volvió al sentido más literal de יוּכָל. En español, «no podrá» mantiene esa literalidad y deja que el contexto sugiera la inutilidad de su oración.
  doctrine_reference: HALOT / revisión auditada del POB
translation_notes:
  revision_awareness: 'La revisión más reciente del POB en inglés ajustó la cláusula final de «he will not prevail» a «he will not be able» para reflejar más literalmente יוּכָל. La presente versión española sigue esa revisión con «no podrá», y conserva la estructura general del texto auditado: apertura temporal, ambigüedad del verbo inicial, personificación singular de Moab, y cierre literal de incapacidad.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como forma estándar del proyecto cuando aparezca el nombre divino; en este versículo no aparece.
  - Se evita traducir mecánicamente con calco rígido donde el español pide naturalidad, pero sin ampliar el sentido más allá del hebreo.
  - Se conserva la tensión entre lectura personal e impersonal en la cláusula inicial mediante nota.
  - La frase cultual «lugar alto» se traduce de manera descriptiva y no con terminología eclesiástica tradicional.
  - 'El verbo final se deja en su sentido literal de capacidad: «no podrá», según la revisión auditada.'
