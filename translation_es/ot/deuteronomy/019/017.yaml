revisions:
- from: Entonces los dos hombres que tienen la disputa se presentarán delante de Yahvé[a], delante de los sacerdotes y de los jueces que estén en aquellos días.
  to: Entonces los dos hombres que tienen la disputa[a] comparecerán delante de Yahvé, delante de los sacerdotes y de los jueces que estén en funciones en aquellos días.
  rationale: 'Se ajusta la cláusula final a un español natural y fiel al sentido contextual de funcionarios vigentes: «que estén en funciones en aquellos días». También se elimina una nota poco útil y se conserva en nota la alternativa léxica relevante sobre הָרִיב. «Comparecerán» mejora ligeramente el registro judicial sin apartarse del sentido de וְעָמְדוּ.'
