theological_decisions:
- issue: Reported speech attributed to David in Michal's reply
  chosen_reading: 'Translate Michal''s statement straightforwardly as a claim that David threatened her: ''Send me away. Why should I kill you?'''
  alternative_readings:
  - Render more interpretively as 'Let me go, or I will kill you'
  rationale: 'The Hebrew text presents two clauses: an imperative followed by a למה + first-person verb construction. Some English versions smooth this into an explicit threat (''or else I will kill you''), but the source text does not contain ''or else.'' The translation preserves the Hebrew wording and leaves the implied threat to the reader.'
  doctrine_reference: Translation philosophy §1, §3, §5
