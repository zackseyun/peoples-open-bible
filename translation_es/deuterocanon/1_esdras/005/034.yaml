translation:
  language: es
  text: los hijos de Hagía[a], los hijos de Facarét-Sabeié, los hijos de Sarotei, los hijos de Meisaías, los hijos de Gas, los hijos de Addús, los hijos de Subas, los hijos de Aferra, los hijos de Baroteis, los hijos de Safag, los hijos de Allón;
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El paralelo hebreo en Nehemías 7:51 es mucho más breve aquí («los hijos de Uza, los hijos de Paseah, los hijos de Besai»). 1 Esdras conserva una lista griega expandida, por lo que la traducción sigue los nombres griegos y no los armoniza con el hebreo.
    reason: alternative_reading
lexical_decisions:
- source_word: υἱοὶ
  english_pob_choice: the sons of
  chosen_spanish: los hijos de
  alternatives_spanish:
  - descendientes de
  - los hijos de
  lexicon: LSJ
  rationale: En esta lista genealógica, υἱοὶ funciona como fórmula de clan o linaje. «Los hijos de» preserva la repetición y el tono listado del griego, y evita interpretar con más libertad como «descendientes de».
- source_word: Ἁγιά
  english_pob_choice: Hagia
  chosen_spanish: Hagia
  alternatives_spanish:
  - Agia
  lexicon: LSJ
  rationale: Nombre propio transliterado. Se mantiene la forma del griego sin armonizarla con paralelos hebreos aproximados.
- source_word: Φακαρὲθ Σαβειή
  english_pob_choice: Phacareth-sabeie
  chosen_spanish: Phacareth-sabeie
  alternatives_spanish:
  - Phacareth Sabeie
  - Phakareth-sabeie
  lexicon: LSJ
  rationale: El griego presenta un nombre compuesto o estrechamente ligado; el guion conserva esa unión y deja visible la estructura del original.
- source_word: Σαρωθεί
  english_pob_choice: Sarothei
  chosen_spanish: Sarothei
  alternatives_spanish:
  - Sarothi
  lexicon: LSJ
  rationale: Nombre propio transliterado directamente desde la forma griega, sin intentar normalizarlo según el paralelo hebreo aproximado.
- source_word: Μεισαίας
  english_pob_choice: Meisaias
  chosen_spanish: Meisaias
  alternatives_spanish:
  - Misaias
  lexicon: LSJ
  rationale: Nombre propio transliterado de manera conservadora desde la forma griega.
- source_word: Γάς
  english_pob_choice: Gas
  chosen_spanish: Gas
  alternatives_spanish:
  - Gaas
  - Gaz
  lexicon: LSJ
  rationale: La forma griega es breve; se conserva una transliteración directa y simple.
- source_word: Ἀδδούς
  english_pob_choice: Addous
  chosen_spanish: Addous
  alternatives_spanish:
  - Addus
  lexicon: LSJ
  rationale: Nombre propio transliterado desde la forma griega, manteniendo el diptongo representado por ου.
- source_word: Σουβάς
  english_pob_choice: Soubas
  chosen_spanish: Soubas
  alternatives_spanish:
  - Subas
  lexicon: LSJ
  rationale: Nombre propio transliterado directamente; «ou» refleja ου del griego.
- source_word: Ἀφερρά
  english_pob_choice: Apherra
  chosen_spanish: Apherra
  alternatives_spanish:
  - Aferra
  lexicon: LSJ
  rationale: Nombre propio transliterado de forma conservadora desde el griego.
- source_word: Βαρωθείς
  english_pob_choice: Barotheis
  chosen_spanish: Barotheis
  alternatives_spanish:
  - Barothes
  - Barotheis
  lexicon: LSJ
  rationale: Nombre propio transliterado desde la forma griega; se conserva la secuencia vocálica visible en el original para auditabilidad.
- source_word: Σαφάγ
  english_pob_choice: Saphag
  chosen_spanish: Saphag
  alternatives_spanish:
  - Safag
  lexicon: LSJ
  rationale: Nombre propio transliterado directamente desde la forma consonántica griega.
- source_word: Ἀλλών
  english_pob_choice: Allon
  chosen_spanish: Allon
  alternatives_spanish:
  - Allōn
  lexicon: LSJ
  rationale: Nombre propio transliterado en forma española estándar. Se sigue el griego como texto principal, no el paralelo hebreo aproximado.
theological_decisions:
- issue: Relación con el paralelo hebreo de Nehemías 7:51
  english_pob_reading: The Hebrew parallel in Nehemiah 7:51 is much shorter here ... 1 Esdras preserves an expanded Greek list, so the translation follows the Greek names rather than harmonizing to the Hebrew.
  chosen_spanish_reading: La lista sigue los nombres griegos de 1 Esdras y no se armoniza con el paralelo hebreo más breve de Nehemías.
  alternative_spanish_readings:
  - Armonizar la lista con el hebreo de Nehemías
  - Reemplazar los nombres griegos por los del paralelo hebreo
  rationale: El testimonio primario es el griego de 1 Esdras. La brevedad y diferencia del paralelo hebreo se señala en la tradición auditada inglesa, pero no debe borrar la forma transmitida por el texto base griego.
  doctrine_reference: Principio textual de prioridad del testimonio base y no armonización indebida de listas genealógicas.
translation_notes:
  revision_awareness: Se revisó el pasaje con el último pase disponible y no se registraron cambios necesarios; se mantiene la decisión de seguir el griego de Swete como ancla principal y de conservar la lista expandida de nombres propios sin armonización al paralelo hebreo.
  spanish_consistency_notes:
  - Se mantiene de manera uniforme la fórmula repetida «los hijos de».
  - Los nombres propios se transliteran de forma conservadora y consistente con el audit trail inglés.
  - La nota al pie explica la variante textual sin introducir una armonización que el texto base no exige.
