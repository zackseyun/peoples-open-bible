translation:
  language: es
  text: ¿Será bueno cuando él los examine? ¿O lo engañarán como se engaña a un hombre?[a][b]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «se burlarán de él» / «lo tratarán con ligereza»; el verbo hebreo puede denotar burlarse, engañar o hacer mofa de alguien.
    reason: lexical_alternative
  - marker: b
    text: Hebreo «un hombre»; es decir, un mero ser humano, en contraste con Dios.
    reason: lexical_alternative
lexical_decisions:
- source_word: הֲטוֹב
  english_pob_choice: Will it be good
  chosen_spanish: ¿Será bueno
  alternatives_spanish:
  - ¿Sería bueno
  - ¿Es bueno
  lexicon: HALOT
  rationale: La interrogación hebrea con הֲ y טוֹב funciona retóricamente; en español, el futuro interrogativo conserva mejor la fuerza prospectiva del contexto de juicio y escrutinio divino.
- source_word: יַחְקֹר
  english_pob_choice: he examines
  chosen_spanish: examine
  alternatives_spanish:
  - busque
  - investigue
  lexicon: HALOT
  rationale: חקר expresa examinar a fondo o investigar; «examinar» es natural en español moderno y conserva la idea de escrutinio minucioso.
- source_word: אֶתְכֶם
  english_pob_choice: you
  chosen_spanish: los
  alternatives_spanish:
  - os
  - a ustedes
  lexicon: morphology
  rationale: El sufijo de segunda persona plural se vierte como objeto directo plural. En español latinoamericano neutral, «los» da una referencia plural clara y fluida.
- source_word: אִם
  english_pob_choice: Or
  chosen_spanish: ¿O
  alternatives_spanish:
  - ¿Si
  - ¿Y si
  lexicon: HALOT
  rationale: Aquí אִם introduce una alternativa paralela y retórica; «¿O» reproduce mejor el contraste entre las dos preguntas que «si» en español.
- source_word: כְּהָתֵל
  english_pob_choice: as one mocks
  chosen_spanish: se burlarán
  alternatives_spanish:
  - se engañarán
  - harán burla
  lexicon: HALOT
  rationale: El verbo admite las ideas de burlarse, engañar o hacer mofa. En este contexto de irreverencia ante Dios, «burlarse» preserva bien la fuerza insolente del término sin perder naturalidad.
- source_word: בֶּאֱנוֹשׁ
  english_pob_choice: a man
  chosen_spanish: de un hombre
  alternatives_spanish:
  - de un mortal
  - de un ser humano
  lexicon: HALOT
  rationale: אֱנוֹשׁ puede subrayar la fragilidad humana. «Un hombre» mantiene la brevedad idiomática del verso y deja visible el contraste humano-divino.
- source_word: תְּהָתֵלּוּ בוֹ
  english_pob_choice: will you mock him
  chosen_spanish: se burlarán de él
  alternatives_spanish:
  - lo engañarán
  - lo tratarán con burla
  lexicon: HALOT
  rationale: La forma verbal puede significar burlarse, engañar o tratar con ligereza. Dado que el paralelismo gira en torno a la burla irreverente, «se burlarán de él» capta la carga principal y permite la nota alternativa.
theological_decisions:
- issue: Referente de los pronombres de tercera persona
  english_pob_reading: The pronouns refer to God.
  chosen_spanish_reading: Los pronombres se refieren a Dios.
  alternative_spanish_readings:
  - Los pronombres se refieren a un examinador o juez no especificado.
  rationale: El contexto inmediato de Job 13:7–11 habla de hablar falsamente por Dios y de la inspección divina. Mantener a Dios como referente conserva el filo retórico del pasaje sin añadir teología externa.
  doctrine_reference: Contexto literario de Job 13:7–11
translation_notes:
  revision_awareness: Se ha seguido el texto hebreo y el audit trail inglés sin depender mecánicamente del inglés. La principal decisión fue resolver el valor retórico de הֲטוֹב y el paralelo de אִם, manteniendo el contraste entre la inspección divina y la respuesta humana irreverente. No se observaron revisiones aplicadas en el paquete fuente; el borrador adopta la lectura estable más reciente.
  spanish_consistency_notes:
  - Se usa «Dios» explícitamente donde el contexto apunta al referente divino, sin sustituirlo por una máscara reverencial.
  - Se mantiene un español moderno y sobrio, evitando arcaísmos innecesarios.
  - Las notas al pie preservan la tensión léxica de הָתֵל y el matiz antropológico de אֱנוֹשׁ.
