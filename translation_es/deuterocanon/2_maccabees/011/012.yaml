translation:
  language: es
  text: Pero la mayoría de ellos lograron escapar heridos y desnudos[a]; y Lisias mismo también escapó al huir vergonzosamente.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «despojados», si γυμνοὶ se entiende como que fueron despojados durante la huida y no completamente desnudos.
    reason: lexical_alternative
lexical_decisions:
- source_word: οἱ πλείονες
  english_pob_choice: most of them
  chosen_spanish: la mayoría de ellos
  alternatives_spanish:
  - la mayor parte de ellos
  - muchos de ellos
  lexicon: LSJ
  rationale: πλείονες funciona aquí como un sustantivo plural comparativo con sentido de mayoría. «La mayoría de ellos» es natural en español y conserva la idea cuantitativa del griego y del inglés POB.
- source_word: τραυματίαι
  english_pob_choice: wounded
  chosen_spanish: herida
  alternatives_spanish:
  - heridos
  - lastimada
  lexicon: LSJ
  rationale: 'El griego describe el estado de los que escaparon: estaban heridos. En español, el participio concuerda con «la mayoría» y conserva el valor adjetival sin añadir palabras innecesarias.'
- source_word: γυμνοὶ
  english_pob_choice: naked
  chosen_spanish: desnuda[a]
  alternatives_spanish:
  - desnudos
  - despojados
  lexicon: LSJ
  rationale: Se mantiene el sentido directo de «desnudos». En contexto militar, puede implicar que fueron despojados en la huida, pero el griego no lo especifica; por eso se conserva la ambigüedad con una nota.
- source_word: διεσώθησαν
  english_pob_choice: escaped
  chosen_spanish: escapó
  alternatives_spanish:
  - se salvaron
  - escaparon
  lexicon: BDAG/LSJ
  rationale: En este contexto narrativo de batalla, διασῴζω se entiende mejor como «escapar» o «salir con vida». Aunque el sujeto es plural, en español la concordancia puede mantenerse con «la mayoría» como sujeto colectivo.
- source_word: αἰσχρῶς
  english_pob_choice: shamefully
  chosen_spanish: vergonzosamente
  alternatives_spanish:
  - deshonrosamente
  - con vergüenza
  lexicon: LSJ
  rationale: El adverbio expresa una cualificación moral de la huida. «Vergonzosamente» reproduce bien ese matiz evaluativo en español actual.
- source_word: φεύγων
  english_pob_choice: by fleeing
  chosen_spanish: al huir
  alternatives_spanish:
  - mientras huía
  - huyendo
  lexicon: LSJ
  rationale: El participio presente indica manera o circunstancia acompañante. «Al huir» es idiomático en español y conserva la relación causal/modificadora con el escape de Lisias.
translation_notes:
  revision_awareness: Se ha seguido de cerca el texto griego de Swete y el expediente auditado en inglés. La principal decisión de español fue preservar la ambigüedad de γυμνοὶ con una nota, como hizo la POB inglesa con «naked/stripped», y adaptar la sintaxis para que suene natural en español sin perder la estructura narrativa.
  spanish_consistency_notes:
  - Se usa «Lisias» para el nombre propio, conforme al uso español estándar y al inglés POB.
  - Se evita suavizar el juicio moral de αἰσχρῶς; se conserva con un adverbio claramente valorativo.
  - «La mayoría de ellos» funciona como sujeto colectivo en español para mantener la concordancia natural con el verbo en singular cuando el foco recae en el conjunto.
