review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la estructura del griego y conserva correctamente elementos clave como «engaño», «casa santificada» y la dificultad de «οἴκου κατασχέσεως υἱῶν σου» con nota. Sin embargo, hay dos desajustes importantes: 1) «los que han tramado» suena menos natural que una relativa integrada («quienes» o «ellos, que...»), y 2) «tu pacto» no sigue el valor teológico documentado por el POB para διαθήκη, que aquí conviene verter como «tu pacto» o «tu alianza» según el proyecto; dado el glosario por defecto y la fuerza bíblica, «alianza» resulta más natural y eclesial en español amplio. Además, la nota [a] tiene comillas innecesarias al inicio y la enumeración de los complementos se beneficia de repetir «contra» o usar una serie más clara.'
  spanish_quality_summary: 'El español es mayormente legible, pero «sean para ellos herida y moretón» suena algo rígido y «los que han tramado» queda sintácticamente tosco. «Moretón» es comprensible, pero «herida y golpe» o «herida y contusión» sería más solemne; aun así, «moretón» puede mantenerse por concreción si se mejora la frase. «Sion» debería llevar tilde: «Sión».'
  glossary_alignment: Alineación parcial. «engaño» para ἀπάτην está bien y preserva la tensión ética. «casa santificada» sigue bien ἡγιασμένου. Pero para διαθήκη, aunque el borrador usa «pacto», el proyecto prioriza mantener la fuerza covenantal; en español bíblico amplio «alianza» suele expresar mejor ese registro. No hay términos Yahvé/Mesías en este versículo.
  issues:
