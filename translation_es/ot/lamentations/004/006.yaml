translation:
  language: es
  text: Porque la iniquidad de la hija de mi pueblo se ha vuelto mayor que el pecado de Sodoma[a], que fue arrasada en un momento[b], y no se alzaron manos contra ella.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «la culpa de la hija de mi pueblo es mayor que la culpa de Sodoma»; el hebreo עָוֹן puede abarcar iniquidad, culpa o la pena asociada.'
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo difícil; también puede entenderse: «y no hubo manos sobre ella» o «y no la tocaron manos».'
    reason: alternative_reading
lexical_decisions:
- source_word: וַיִּגְדַּל
  english_pob_choice: has become greater
  chosen_spanish: se ha vuelto mayor
  alternatives_spanish:
  - es mayor
  - ha crecido
  - se ha hecho mayor
  lexicon: HALOT
  rationale: El verbo גדל expresa hacerse grande o mayor. En español, «se ha vuelto mayor» conserva el movimiento verbal sin sonar forzado y mantiene el valor comparativo del contexto.
- source_word: עֲוֺן
  english_pob_choice: iniquity
  chosen_spanish: iniquidad
  alternatives_spanish:
  - culpa
  - maldad
  - castigo de la iniquidad
  lexicon: HALOT
  rationale: Aquí conviene mantener el peso moral de עָוֹן. «Iniquidad» reproduce bien el sentido principal y deja abierta la posible relación con culpa o consecuencia, como nota el audit trail.
- source_word: בַּת עַמִּי
  english_pob_choice: the daughter of my people
  chosen_spanish: la hija de mi pueblo
  alternatives_spanish:
  - mi pueblo
  - la hija de mi pueblo, Jerusalén
  lexicon: HALOT
  rationale: Es una personificación poética convencional. «La hija de mi pueblo» preserva la imagen y el lamento sin explicitar más de lo que permite el hebreo.
- source_word: מֵחַטַּאת סְדֹם
  english_pob_choice: than the sin of Sodom
  chosen_spanish: que el pecado de Sodoma
  alternatives_spanish:
  - que la culpa de Sodoma
  - que el castigo por el pecado de Sodoma
  lexicon: HALOT
  rationale: La comparación exige el valor de comparación «que». «Pecado» sigue el contraste moral del pasaje y evita introducir la idea de castigo como lectura principal.
- source_word: הַהֲפוּכָה
  english_pob_choice: which was overthrown
  chosen_spanish: que fue destruida
  alternatives_spanish:
  - que fue trastornada
  - que fue derribada
  - que fue subvertida
  lexicon: HALOT
  rationale: Aunque «overthrown» se acerca literalmente a «trastornada/derrocada», en español «fue destruida» comunica con naturalidad la ruina de Sodoma y mantiene la referencia intertextual al juicio divino. Se evita una traducción demasiado mecánica que oscurezca el sentido.
- source_word: כְמוֹ רָגַע
  english_pob_choice: in a moment
  chosen_spanish: en un momento
  alternatives_spanish:
  - como un instante
  - de repente
  - en un instante
  lexicon: HALOT
  rationale: La expresión marca brusquedad y rapidez. «En un momento» es idiomático en español y conserva la súbita caída de Sodoma.
- source_word: וְלֹא חָלוּ בָהּ יָדָיִם
  english_pob_choice: and no hands were laid on her
  chosen_spanish: y no se alzaron manos contra ella
  alternatives_spanish:
  - y no hubo manos sobre ella
  - y no la tocaron manos
  - y no se ejercieron manos contra ella
  lexicon: HALOT
  rationale: El hebreo final es oscuro. La frase española intenta reflejar la imagen de manos sin precisar más de lo que el texto garantiza. «Se alzaron manos contra ella» conserva la ambigüedad del original y permite la posibilidad de una acción humana directa sin resolverla excesivamente.
theological_decisions:
- issue: Sentido de עָוֹן en el contraste con Sodoma
  english_pob_reading: moral iniquity/guilt rather than punitive consequence
  chosen_spanish_reading: iniquidad moral más que castigo o pena
  alternative_spanish_readings:
  - culpa
  - castigo de la culpa
  rationale: La comparación inmediata con «el pecado de Sodoma» favorece una lectura moral. La traducción principal mantiene esa oposición sin cerrar la posibilidad semántica más amplia documentada por el léxico.
  doctrine_reference: 'Principio de tensión lexical preservada: no reducir עָוֹן a una sola acepción cuando el hebreo puede abarcar más.'
- issue: Cláusula final קשה / ambigua sobre las manos
  english_pob_reading: Sodom was overthrown suddenly without prolonged human assault
  chosen_spanish_reading: Sodoma fue destruida de manera repentina, sin una acción humana prolongada expresada en la cláusula final
  alternative_spanish_readings:
  - no se alzaron manos contra ella
  - no hubo manos sobre ella
  - no la tocaron manos
  rationale: El hebreo es muy comprimido y admite varias lecturas. La redacción principal retiene la imagen de las manos y la brusquedad del derribo sin afirmar con demasiada seguridad una explicación interpretativa. Así se preserva la tensión textual documentada por el POB.
  doctrine_reference: Transparencia textual y respeto por la ambigüedad del hebreo en poesía profética.
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión más reciente del POB en inglés, que prefirió una formulación más natural para el cierre («and no hands were laid on her»). En español se intentó conservar esa naturalidad sin perder la oscuridad del hebreo final.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como término por defecto en el proyecto, pero en este versículo no aparece el nombre divino.
  - Se eligió «Sodoma» con la forma tradicional castellana, ya establecida en uso bíblico y fiel al topónimo hebreo.
  - Se evitó «SEÑOR» o una paráfrasis que desdibujara la personificación poética «la hija de mi pueblo».
  - La cláusula final se dejó deliberadamente abierta para reflejar la dificultad señalada por el audit trail inglés.
