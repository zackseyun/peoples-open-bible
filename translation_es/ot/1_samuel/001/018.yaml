translation:
  language: es
  text: 'Ella dijo[a]: «Que tu sierva halle favor en tus ojos». Entonces la mujer se fue por su camino, comió[b], y su rostro ya no se veía abatido.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Literalmente: «Que tu sierva halle favor en tus ojos»; «sierva» traduce un término explícitamente femenino usado aquí como autoidentificación deferencial.'
    reason: lexical_alternative
  - marker: b
    text: 'O, más literalmente: «su rostro ya no era como antes», es decir, su expresión ya no mostraba su aflicción.'
    reason: lexical_alternative
lexical_decisions:
- source_word: תִּמְצָא
  english_pob_choice: May ... find
  chosen_spanish: Que ... halle
  alternatives_spanish:
  - Que ... encuentre
  - Ojalá ... halle
  lexicon: HALOT
  rationale: La forma volitiva en el discurso directo expresa un ruego respetuoso; en español, «Que ... halle» comunica bien ese valor optativo sin sonar áspero ni futurista.
- source_word: שִׁפְחָתְךָ
  english_pob_choice: your servant
  chosen_spanish: tu sierva
  alternatives_spanish:
  - tu servidora
  - tu esclava femenina
  lexicon: HALOT
  rationale: El sustantivo es explícitamente femenino. A diferencia del inglés, el español puede conservar esa marca sin perder naturalidad; «sierva» mantiene la deferencia y la distinción de género.
- source_word: חֵן בְּעֵינֶיךָ
  english_pob_choice: find favor in your eyes
  chosen_spanish: halle favor en tus ojos
  alternatives_spanish:
  - encuentre favor en tus ojos
  - halle gracia en tus ojos
  lexicon: HALOT
  rationale: Conservo la imagen hebrea de «en tus ojos», porque el modismo tiene peso literario y relacional. «Favor» refleja mejor el valor idiomático que «gracia» en este contexto.
- source_word: לְדַרְכָּהּ
  english_pob_choice: went on her way
  chosen_spanish: se fue por su camino
  alternatives_spanish:
  - fue por su camino
  - siguió su camino
  lexicon: HALOT
  rationale: La expresión es idiomática para partida y continuación del trayecto. «Se fue por su camino» suena natural en español y conserva el sentido direccional.
- source_word: וַתֹּאכַל
  english_pob_choice: ate
  chosen_spanish: comió
  alternatives_spanish:
  - comió algo
  - volvió a comer
  lexicon: HALOT
  rationale: El wayyiqtol narra la siguiente acción de manera simple. «Comió» es la versión directa y deja implícito el valor contextual de que volvió a comer con ánimo renovado.
- source_word: וּפָנֶיהָ לֹא הָיוּ לָהּ עוֹד
  english_pob_choice: her face was no longer downcast
  chosen_spanish: su rostro ya no estaba abatido
  alternatives_spanish:
  - su semblante ya no estaba triste
  - su rostro ya no era como antes
  lexicon: HALOT
  rationale: El hebreo dice literalmente que su rostro «no le era ya». En español conviene expresar el resultado visible del cambio emocional; «abatido» conserva la idea de tristeza/gravedad visible sin exagerar.
translation_notes:
  revision_awareness: La redacción sigue de cerca el hebreo masorético y coincide con el juicio de alta concordancia del auditor inglés. Se conserva la forma de ruego, la autoidentificación femenina y el modismo del rostro, evitando una paráfrasis excesiva.
  spanish_consistency_notes:
  - Se mantiene «sierva» para שִׁפְחָה por coherencia con el valor femenino explícito del término.
  - Se conserva «favor en tus ojos» como imagen idiomática, en vez de sustituirla por una formulación interpretativa sin base textual.
  - «Rostro abatido» traduce el efecto visible de la frase hebrea sin borrar la metáfora corporal.
