translation:
  language: es
  text: Porque mi ángel está con ustedes, y él mismo vela por sus almas[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «sus vidas». El griego ψυχαί puede significar «almas», «vidas» o «personas».
    reason: lexical_alternative
lexical_decisions:
- source_word: ἄγγελός
  english_pob_choice: angel
  chosen_spanish: ángel
  alternatives_spanish:
  - mensajero
  lexicon: BDAG
  rationale: El contexto de habla divina y la función protectora favorecen la lectura de un ser celestial; por eso se conserva «ángel» en español, como reflejo más natural de la opción inglesa y del sentido probable del griego.
- source_word: μεθʼ ὑμῶν
  english_pob_choice: with you
  chosen_spanish: con ustedes
  alternatives_spanish:
  - entre ustedes
  - con vosotros
  lexicon: BDAG
  rationale: La preposición μετά con genitivo significa normalmente «con». Se usa «ustedes» por neutralidad panhispánica y registro eclesial amplio.
- source_word: ἐκζητῶν
  english_pob_choice: is seeking
  chosen_spanish: está buscando
  alternatives_spanish:
  - está buscando con cuidado
  - está velando por
  - está procurando
  lexicon: BDAG
  rationale: Se mantiene el verbo de búsqueda para no borrar el matiz verbal del participio griego. «Está buscando» es natural en español y conserva la idea de atención activa sin convertirla en paráfrasis.
- source_word: τὰς ψυχὰς ὑμῶν
  english_pob_choice: your souls
  chosen_spanish: sus almas
  alternatives_spanish:
  - sus vidas
  - ustedes
  lexicon: BDAG
  rationale: Aunque ψυχή puede significar «vida», «alma» o «persona», aquí se conserva «almas» porque el contexto y la revisión inglesa reciente privilegiaron la forma más directa y formal. Se mantiene la tensión lexical, sin eliminar que también pueda implicar vida o persona.
- source_word: αὐτὸς
  english_pob_choice: he himself
  chosen_spanish: él mismo
  alternatives_spanish:
  - él
  - mismo
  lexicon: BDAG
  rationale: El pronombre es enfático; «él mismo» preserva esa insistencia en que el ángel realiza personalmente la acción.
theological_decisions:
- issue: Valor de ψυχή en contexto de protección divina
  english_pob_reading: your souls
  chosen_spanish_reading: sus almas
  alternative_spanish_readings:
  - sus vidas
  - ustedes
  rationale: La imagen presenta al ángel de Yahvé acompañando a los exiliados con cuidado activo. «Sus almas» sigue de cerca la revisión inglesa más reciente y el registro formal, sin cerrar el campo semántico de ψυχή, que puede abarcar vida, alma o persona.
  doctrine_reference: Preservar la tensión del original y no resolverla mediante una equivalencia doctrinal posterior; primacía del texto fuente.
translation_notes:
  revision_awareness: Se tomó en cuenta la revisión inglesa más reciente que cambió «lives» por «souls» para reflejar más directamente τὰς ψυχὰς y conservar un registro formal. La versión española sigue esa revisión, pero deja abierta la amplitud semántica de ψυχή en una nota.
  spanish_consistency_notes:
  - Se mantiene «ángel» para ἄγγελός, en coherencia con la lectura sobrenatural priorizada por el expediente inglés.
  - Se evita «SEÑOR» porque el versículo no contiene κύριος; el texto griego usa una primera persona divina implícita en la frase «mi ángel».
  - «Almas» respeta el tono formal y la revisión inglesa, mientras la nota conserva la alternativa léxica «vidas».
  - Se usa puntuación española y un estilo bíblico contemporáneo, sin recurrir a arcaísmos innecesarios.
