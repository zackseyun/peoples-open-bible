revisions:
- from: Tampoco comparé con ella ninguna piedra preciosa[a], porque todo el oro, a sus ojos, es un poco de arena[b], y la plata será tenida por barro delante de ella.
  to: Ni puse al nivel de ella ninguna piedra preciosa[a], porque todo el oro, a sus ojos, es poca arena[b], y la plata será tenida por barro delante de ella.
  rationale: Se ajusta la primera cláusula para expresar con mayor naturalidad y fidelidad el sentido comparativo jerárquico de οὐδὲ ὡμοίωσα αὐτῇ, evitando la formulación menos idiomática «comparé con ella». También se uniforma ψάμμος ὀλίγη con «poca arena», en línea más estrecha con la literalidad preservada por el POB inglés y su nota.
