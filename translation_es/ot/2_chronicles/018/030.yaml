revisions:
- from: 'Ahora el rey de Aram había ordenado a los comandantes de los carros que eran suyos, diciendo: «No peleen ni con pequeño ni con grande, sino solo con el rey de Israel[a]».'
  to: 'Ahora bien, el rey de Aram había ordenado a los comandantes de los carros de guerra que eran suyos, diciendo: «No peleen ni con pequeño ni con grande[a], sino con el rey de Israel solamente».'
  rationale: Se repara el anclaje de la nota para que corresponda a la expresión idiomática hebrea «pequeño... grande», se mejora ligeramente la naturalidad militar de «carros», y se hace más explícita en español la exclusividad de לְבַדּוֹ con «solamente» al final.
