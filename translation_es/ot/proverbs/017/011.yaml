  - severity: low
    issue: Sintaxis pasiva algo menos natural en español
    rationale: '''Se enviará contra él un mensajero cruel'' no es incorrecto, pero ''le será enviado un mensajero cruel'' fluye mejor y mantiene el sentido pasivo de יְשֻׁלַּח con dirección adversativa suficiente en contexto.'
  revised_spanish_text: Un hombre rebelde busca solo el mal, y le será enviado un mensajero[a] cruel.
