translation:
  language: es
  text: Y entró en Egipto con una fuerza imponente, con carros y elefantes y jinetes y un gran ejército[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «una gran expedición militar»; el griego στόλος puede referirse más ampliamente a una fuerza armada o a una expedición militar. En este contexto se entiende mejor como «ejército» que como una fuerza naval.
    reason: lexical_alternative
lexical_decisions:
- source_word: εἰσῆλθεν
  english_pob_choice: entered
  chosen_spanish: entró
  alternatives_spanish:
  - fue a
  - ingresó a
  lexicon: LSJ
  rationale: El aoristo de εἰσέρχομαι expresa entrar o ir a. «Entró» es natural en español y conserva la idea básica sin introducir una interpretación más fuerte que el texto.
- source_word: εἰς Αἴγυπτον
  english_pob_choice: Egypt
  chosen_spanish: en Egipto
  alternatives_spanish:
  - a Egipto
  - hacia Egipto
  lexicon: LSJ
  rationale: La preposición griega εἰς con verbo de movimiento admite «a»; en español, «entró en Egipto» suena idiomático y fiel al movimiento hacia el país.
- source_word: ὄχλῳ βαρεῖ
  english_pob_choice: with a heavy force
  chosen_spanish: con un ejército pesado
  alternatives_spanish:
  - con una fuerza pesada
  - con una multitud numerosa
  lexicon: LSJ
  rationale: ὄχλος aquí funciona en sentido militar de tropa/hueste; βαρεῖ añade la idea de peso o contundencia. «Ejército pesado» conserva el matiz militar y la fuerza del conjunto, sin reducirlo solo a tamaño.
- source_word: ἅρμασιν
  english_pob_choice: chariots
  chosen_spanish: carros
  alternatives_spanish:
  - carros de guerra
  - carros de combate
  lexicon: LSJ
  rationale: En español bíblico y de lectura amplia, «carros» comunica el referente de ἅρμασιν de manera breve; el contexto militar ya aclara que se trata de carros de guerra.
- source_word: ἐλέφανσιν
  english_pob_choice: elephants
  chosen_spanish: elefantes
  lexicon: LSJ
  rationale: Traducción directa y transparente del término griego. El contexto militar permite entenderlos como elefantes de guerra sin necesidad de añadirlo al texto principal.
- source_word: ἱππεῦσιν
  english_pob_choice: horsemen
  chosen_spanish: jinetes
  alternatives_spanish:
  - caballería
  - caballeros
  lexicon: LSJ
  rationale: ἱππεύς designa un hombre montado; «jinetes» es preciso y natural en español, y conserva mejor el valor de los individuos montados que «caballería».
- source_word: στόλῳ μεγάλῳ
  english_pob_choice: a great army
  chosen_spanish: una gran armada
  alternatives_spanish:
  - un gran ejército
  - una gran expedición militar
  lexicon: LSJ
  rationale: Aunque στόλος puede referir una expedición armada o un conjunto militar, el texto revisado de la POB inglesa optó por «army» en este contexto terrestre. «Armada» mantiene la idea de gran fuerza organizada y permite conservar algo del valor colectivo y expedicionario sin limitarlo a fuerza naval.
translation_notes:
  revision_awareness: La base inglesa fue revisada desde «great fleet» a «great army» para στόλῳ μεγάλῳ, por considerarse que el contexto es de campaña terrestre. La versión española sigue esa revisión y evita la lectura naval primaria, aunque conserva la amplitud semántica con «armada».
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» como norma del proyecto no aplicable en este versículo, pues no aparece el nombre divino.
  - Se prefirió «jinetes» sobre «caballería» para reflejar el sustantivo personal griego ἱππεῦσιν.
  - «Armada» se usó como equivalente colectivo-militar de στόλος, en línea con la revisión inglesa que descartó «fleet» en este contexto.
