translation:
  language: es
  text: Con sabiduría se edifica una casa[a], y con entendimiento se establece[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: También puede entenderse como «una familia» o «un hogar», porque בַּיִת puede referirse tanto a una vivienda como, por extensión, al grupo familiar o la casa en sentido doméstico.
    reason: lexical_alternative
  - marker: b
    text: O «se hace firme» / «queda firme». El verbo expresa no solo establecimiento, sino también firmeza o consolidación.
    reason: lexical_alternative
lexical_decisions:
- source_word: בְּחָכְמָה
  english_pob_choice: By wisdom
  chosen_spanish: Con sabiduría
  alternatives_spanish:
  - Por sabiduría
  - Mediante sabiduría
  lexicon: HALOT
  rationale: El prefijo בְּ marca medio o instrumento en este proverbio. «Con sabiduría» suena natural en español y conserva la idea de que la sabiduría es el medio por el cual se logra el resultado.
- source_word: יִבָּנֶה
  english_pob_choice: is built
  chosen_spanish: se edifica
  alternatives_spanish:
  - es construido
  - se construye
  lexicon: HALOT
  rationale: El nifal imperfecto expresa una acción pasiva/general en estilo proverbial. «Se edifica» mantiene ese valor gnómico y el matiz de construcción deliberada, más idiomático que una pasiva rígida.
- source_word: בָּיִת
  english_pob_choice: a house
  chosen_spanish: una casa
  alternatives_spanish:
  - un hogar
  - una casa / un hogar
  - una familia
  lexicon: HALOT
  rationale: En el paralelismo sapiencial, el sentido literal de «casa» es primario, aunque el término puede extenderse a hogar o familia. «Casa» conserva la imagen concreta sin cerrar la amplitud semántica.
- source_word: וּבִתְבוּנָה
  english_pob_choice: and by understanding
  chosen_spanish: y con entendimiento
  alternatives_spanish:
  - y mediante entendimiento
  - y con discernimiento
  lexicon: HALOT
  rationale: תְּבוּנָה designa entendimiento o discernimiento. «Con entendimiento» empareja bien con «con sabiduría» y mantiene el paralelismo sin forzar una glosa interpretativa.
- source_word: יִתְכּוֹנָן
  english_pob_choice: it is established
  chosen_spanish: se establece
  alternatives_spanish:
  - se afianza
  - queda firme
  - se asegura
  lexicon: HALOT
  rationale: La forma reflexiva/medio-pasiva de כון comunica quedar establecido, firmemente dispuesto o consolidado. «Se establece» es una solución idiomática y fiel al sentido resultativo.
translation_notes:
  revision_awareness: 'El texto hebreo y el audit trail inglés coinciden en alto grado; no se requieren revisiones sustantivas. La traducción española sigue la misma lectura proverbial, conservando el paralelismo medio-resultado: sabiduría/entendimiento como medios, casa/establecimiento como resultados.'
  spanish_consistency_notes:
  - Se evitó «SEÑOR» u otras sustituciones no pertinentes; no hay Tetragrámaton en este verso.
  - Se prefirió «sabiduría» y «entendimiento» por su correspondencia directa con el vocabulario sapiencial hebreo.
  - «Casa» se mantiene en el cuerpo del texto para preservar la imagen primaria, con nota que explicita la extensión semántica posible.
  - «Se edifica / se establece» conserva la fuerza impersonal y gnómica del hebreo sin introducir sujeto explícito.
