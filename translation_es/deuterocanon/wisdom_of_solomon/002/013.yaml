translation:
  language: es
  text: Afirma tener conocimiento de Dios, y se llama hijo[a] del Señor;
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «un hijo del Señor»; el griego παῖς también puede significar «siervo» en algunos contextos.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐπαγγέλλεται
  english_pob_choice: claims
  chosen_spanish: afirma
  alternatives_spanish:
  - pretende
  - declara
  - dice
  lexicon: BDAG
  rationale: En este contexto, el verbo presenta lo que los impíos atribuyen al justo como una autoafirmación; «afirma» comunica una pretensión o declaración sin decidir si es verdadera o falsa. «Pretende» podría sonar más polémico que el griego por sí solo, y «declara» es algo más formal pero menos natural en esta construcción.
- source_word: γνῶσιν ἔχειν θεοῦ
  english_pob_choice: to have knowledge of God
  chosen_spanish: tener conocimiento de Dios
  alternatives_spanish:
  - conocer a Dios
  - poseer conocimiento de Dios
  lexicon: BDAG
  rationale: Se conserva la fuerza nominal de γνῶσις mediante «conocimiento», en vez de reducirlo a «conocer», para reflejar con más precisión la construcción literal «tener conocimiento de». La formulación sigue siendo natural en español y no añade matices no presentes en el griego.
- source_word: θεοῦ
  english_pob_choice: God
  chosen_spanish: Dios
  alternatives_spanish:
  - de Dios
  lexicon: BDAG
  rationale: El genitivo θεοῦ se expresa de forma directa como «de Dios», manteniendo el sentido básico sin introducir una distinción teológica adicional que el texto no exige.
- source_word: παῖδα
  english_pob_choice: child
  chosen_spanish: hijo
  alternatives_spanish:
  - niño
  - siervo
  lexicon: BDAG
  rationale: Aunque παῖς puede abarcar «hijo», «niño» o «siervo», aquí el paralelismo con la auto-designación y la referencia a Κυρίου favorece el sentido filial. En español, «hijo» comunica mejor la relación personal con el Señor y evita una ambigüedad innecesaria; se conserva la alternativa semántica en nota.
- source_word: Κυρίου
  english_pob_choice: the Lord
  chosen_spanish: del Señor
  alternatives_spanish:
  - de Señor
  lexicon: BDAG
  rationale: Se mantiene la traducción estándar de κύριος como «Señor». El artículo definido en español aparece naturalmente en la construcción genitiva «del Señor», que preserva la solemnidad del título.
- source_word: ἑαυτὸν ὀνομάζει
  english_pob_choice: calls himself
  chosen_spanish: se llama a sí mismo
  alternatives_spanish:
  - se nombra a sí mismo
  - se da a sí mismo el nombre
  lexicon: BDAG
  rationale: La expresión reflexiva se vierte de modo idiomático en español. «Se llama a sí mismo» conserva la auto-designación del sujeto con un registro claro y fiel, sin ampliar el contenido del verbo.
theological_decisions:
- issue: παῖς en relación con Κυρίου puede sugerir filiación o servidumbre
  english_pob_reading: a child of the Lord
  chosen_spanish_reading: hijo del Señor
  alternative_spanish_readings:
  - hijo del Señor
  - siervo del Señor
  rationale: En español, «hijo» es la opción más natural para reflejar la relación filial implícita en el contexto, y evita la posible impresión de que el término se refiere principalmente a servicio. «Siervo» sigue siendo una alternativa lexical posible, pero no es la lectura principal del pasaje ni la más transparente en esta frase.
  doctrine_reference: 'DOCTRINE.md: Gender-accurate over gender-neutral; Consistency of key terms, or documented exception'
- issue: κύριος en esta construcción genitiva
  english_pob_reading: the Lord
  chosen_spanish_reading: el Señor
  alternative_spanish_readings:
  - Señor
  rationale: Se conserva el tratamiento reverente de κύριος como título divino en español. «Del Señor» reproduce naturalmente la relación genitiva y mantiene la coherencia terminológica del proyecto.
  doctrine_reference: 'DOCTRINE.md: Contested terms table — κύριος → Lord'
