    text: O «el poder de Madián». El hebreo dice literalmente «la mano de Madián».
    reason: lexical_alternative
  - marker: b
    text: O «los escondrijos». El término hebreo es raro; también se ha traducido «las cuevas» o «las guaridas».
    reason: lexical_alternative
