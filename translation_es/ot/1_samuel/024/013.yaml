review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador capta bien la estructura principal: invocación optativa a Yahvé para juzgar y vengar, seguida por la renuncia de David a actuar con su propia mano. Sin embargo, hay desajustes puntuales. «entre tú y yo» invierte el orden enfático del hebreo/POB («entre mí y ti»), y «mi mano no estará sobre ti» suena poco natural en español y deja opaco el valor idiomático de hostilidad. Además, la nota [a] está anclada en «me» pero en realidad comenta la preposición/complemento de «vengar», por lo que el anclaje no corresponde al lugar pertinente.'
  spanish_quality_summary: El texto es bastante legible, pero «me vengue de ti» puede funcionar mejor como «me vengue contra ti» para expresar con claridad el objeto de la represalia en español bíblico natural. Sobre todo, «mi mano no estará sobre ti» resulta forzado; «mi mano no será contra ti» comunica el hebraísmo con claridad y dignidad. También conviene ajustar la ubicación y contenido de las notas para que correspondan exactamente a los segmentos anotados.
  glossary_alignment: Se alinea correctamente con la política del proyecto al usar «Yahvé» para יְהוָה. No hay otros términos de glosario mayor en juego. La elección «vengue» preserva bien נקם. La revisión propuesta mantiene esa fuerza léxica mientras mejora el español idiomático.
  issues:
  - severity: medium
    issue: Orden de «entre tú y yo»
    rationale: El hebreo dice «entre mí y entre ti», y el POB inglés preserva esa contraposición explícita. «Entre mí y ti» suena aceptable y más fiel aquí que invertirlo a «entre tú y yo».
  - severity: medium
    issue: «mi mano no estará sobre ti» es poco natural y opaco
    rationale: Aunque intenta conservar la imagen hebrea, en español moderno suena extraño. «mi mano no será contra ti» mantiene el contraste y comunica mejor el sentido de abstenerse de acción hostil.
  - severity: medium
    issue: Anclaje y contenido de la nota [a] no corresponden
    rationale: La nota [a] aparece sobre «me», pero explica «sobre ti», que además pertenece a otra cláusula. Las notas deben anclarse exactamente donde corresponde el comentario.
  revised_spanish_text: Yahvé juzgue entre mí y ti, y Yahvé me vengue[a] contra ti; pero mi mano no será contra ti[b].
  revised_footnotes:
  - marker: a
    text: O «me vengue de ti». Con «vengar», el complemento puede expresarse en español de distintas maneras; aquí «contra ti» explicita con más claridad el objeto de la represalia.
    reason: lexical_alternative
  - marker: b
    text: Lit. «mi mano no será en ti/sobre ti»; en hebreo es una expresión idiomática para decir que David no actuará hostil o violentamente contra Saúl.
    reason: cultural_note
  revision_rationale: 'La revisión conserva el sentido fuente y la lógica teológica del versículo, pero mejora tres puntos: restituye el orden más fiel «entre mí y ti», aclara el complemento de «vengar» en español natural, y reemplaza una frase torpe («no estará sobre ti») por una formulación más clara («no será contra ti») apoyada por nota idiomática. También corrige la correspondencia entre marcadores y notas.'
