translation:
  language: es
  text: Así que ahora[a], no tengan miedo. Yo mismo los sustentaré a ustedes y a sus pequeños». Así los consoló y les habló al corazón.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «les habló amablemente» / «les habló de manera reconfortante»; literalmente, «les habló al corazón».
    reason: lexical_alternative
lexical_decisions:
- source_word: וְעַתָּה
  english_pob_choice: So now
  chosen_spanish: Así que ahora
  alternatives_spanish:
  - Y ahora
  - Ahora pues
  lexicon: HALOT
  rationale: La partícula conjuntiva y el adverbio temporal introducen una conclusión consoladora. 'Así que ahora' conserva la fuerza discursiva y el valor conclusivo sin sonar artificial en español.
- source_word: אַל תִּירָאוּ
  english_pob_choice: do not be afraid
  chosen_spanish: no tengan miedo
  alternatives_spanish:
  - no teman
  - no se asusten
  lexicon: HALOT
  rationale: La prohibición de temor se expresa de manera natural en español moderno. 'No tengan miedo' comunica la exhortación con un registro claro y pastoral.
- source_word: אָנֹכִי
  english_pob_choice: I myself
  chosen_spanish: Yo mismo
  alternatives_spanish:
  - Yo
  - En cuanto a mí, yo
  lexicon: HALOT
  rationale: El pronombre independiente es enfático. 'Yo mismo' preserva ese énfasis personal de José en su promesa de sostén.
- source_word: אֲכַלְכֵּל
  english_pob_choice: will provide for
  chosen_spanish: proveeré para
  alternatives_spanish:
  - sustentaré
  - mantendré
  lexicon: HALOT
  rationale: El verbo implica sostén material y provisión continua. 'Proveeré para' expresa esa idea con naturalidad y sin reducirlo solo a 'dar' o 'alimentar'.
- source_word: טַפְּכֶם
  english_pob_choice: your little ones
  chosen_spanish: sus pequeños
  alternatives_spanish:
  - sus niños
  - sus hijos pequeños
  lexicon: HALOT
  rationale: El término puede referirse a los niños pequeños o dependientes. 'Sus pequeños' conserva el matiz afectivo y la posible referencia de edad mejor que un término más general.
- source_word: וַיְנַחֵם אוֹתָם
  english_pob_choice: Thus he comforted them
  chosen_spanish: Así los consoló
  alternatives_spanish:
  - Y los consoló
  - De ese modo los confortó
  lexicon: HALOT
  rationale: En este contexto narrativo, נחם expresa consuelo/reaseguramiento. 'Los consoló' es la equivalencia más natural y fiel en español.
- source_word: וַיְדַבֵּר עַל לִבָּם
  english_pob_choice: spoke to their hearts
  chosen_spanish: les habló al corazón
  alternatives_spanish:
  - les habló al corazón de ellos
  - les habló de manera reconfortante
  lexicon: HALOT
  rationale: La imagen hebrea se mantiene en español con una fórmula idiomática comprensible. 'Al corazón' conserva la metáfora de habla íntima y persuasiva; evita banalizar la expresión como mera amabilidad.
translation_notes:
  revision_awareness: El texto base en inglés ya fue revisado y quedó sin cambios sustantivos; la versión española sigue ese mismo nivel de acuerdo alto con el hebreo, procurando una equivalencia óptima en un español natural y auditable.
  spanish_consistency_notes:
  - Se mantiene el discurso directo con tono de consuelo, sin intensificar ni suavizar indebidamente el mandato negativo.
  - '''Pequeños'' conserva la cercanía afectiva del hebreo טַפְּכֶם.'
  - La expresión final 'les habló al corazón' reproduce la metáfora semítica documentada en el audit trail, con nota alternativa para claridad.
  - Se evita 'SEÑOR' u otras sustituciones porque el versículo no contiene el nombre divino.
