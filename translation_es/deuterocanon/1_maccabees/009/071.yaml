translation:
  language: es
  text: Y aceptó, e hizo conforme a sus palabras, y le juró no buscarle daño[a] todos los días de su vida.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más literalmente: «no buscarle mal».'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀπεδέξατο
  english_pob_choice: accepted
  chosen_spanish: lo aceptó
  alternatives_spanish:
  - lo recibió
  - estuvo de acuerdo
  lexicon: LSJ
  rationale: El medio ἀπεδέξατο aquí expresa que aceptó la propuesta o las condiciones previas. «Lo aceptó» mantiene esa aceptación de forma breve y natural en español, más cercana que «lo recibió» y menos interpretativa que «estuvo de acuerdo».
- source_word: ἐποίησεν κατὰ τοὺς λόγους αὐτοῦ
  english_pob_choice: did according to his words
  chosen_spanish: hizo conforme a sus palabras
  alternatives_spanish:
  - hizo según sus palabras
  - actuó conforme a sus palabras
  lexicon: LSJ
  rationale: La expresión es idiomática para obrar de acuerdo con lo dicho. «Hizo conforme a sus palabras» conserva la relación formal con el griego y suena clara en español; «hizo según sus palabras» también es posible, pero un poco menos solemne.
- source_word: ὤμοσεν
  english_pob_choice: swore
  chosen_spanish: le juró
  alternatives_spanish:
  - juró
  - hizo un juramento
  lexicon: LSJ
  rationale: El verbo denota jurar un compromiso solemne. En español, «le juró» comunica bien el acto y conserva la referencia explícita al destinatario del juramento.
- source_word: μὴ ἐκζητῆσαι αὐτῷ κακὸν
  english_pob_choice: not to seek harm against him
  chosen_spanish: no buscarle mal
  alternatives_spanish:
  - no buscarle daño
  - no procurar su mal
  lexicon: LSJ
  rationale: El griego puede leerse literalmente como «no buscarle mal/evil», y el POB inglés eligió «harm» para expresar la intención hostil de manera idiomática. «No buscarle mal» mantiene esa fuerza semántica sin endurecer el español con una calca extraña.
- source_word: πάσας τὰς ἡμέρας τῆς ζωῆς αὐτοῦ
  english_pob_choice: all the days of his life
  chosen_spanish: todos los días de su vida
  alternatives_spanish:
  - durante toda su vida
  - por todos los días de su vida
  lexicon: LSJ
  rationale: Es una fórmula temporal estándar de duración vital. «Todos los días de su vida» reproduce bien el giro bíblico y corresponde de cerca al griego.
translation_notes:
  revision_awareness: El texto griego y el audit trail inglés muestran alto acuerdo y no requieren enmiendas; se conserva la cadencia narrativa con una equivalencia óptima fiel al sintagma hostil «κακὸν» sin sobrerreformular.
  spanish_consistency_notes:
  - Se mantiene «mal» para κακὸν, siguiendo la alternativa literal documentada en el POB inglés.
  - Se conserva un registro narrativo sobrio y bíblico, evitando tanto arcaísmos rígidos como paráfrasis expansivas.
  - El sujeto y los objetos pronominales se ajustan al español para claridad, sin alterar el contenido semántico del verso.
