translation:
  language: es
  text: Simón hijo de Yohanan, el sacerdote, fue grande entre sus hermanos y la gloria de su pueblo[a]; en su generación la casa fue reparada[b], y en sus días el templo fue fortalecido.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Paralelo griego: ''Simón hijo de Onias, el gran sacerdote'' (o ''sumo sacerdote''). El hebreo aquí lee ''Simón hijo de Yohanan, el sacerdote''.'
    reason: alternative_reading
  - marker: b
    text: O 'la casa fue atendida/restaurada'. El verbo hebreo puede indicar que fue atendida o reparada; el paralelo griego apunta de manera más concreta a una obra en la casa.
    reason: lexical_alternative
lexical_decisions:
- source_word: גְּדוֹל אֶחָיו
  english_pob_choice: great among his brothers
  chosen_spanish: grande entre sus hermanos
  alternatives_spanish:
  - el grande entre sus hermanos
  - el más grande entre sus hermanos
  - grande entre sus hermanos y superiores
  lexicon: HALOT
  rationale: El hebreo expresa una valoración de rango o excelencia en relación con sus hermanos; el español natural y fiel es 'grande entre sus hermanos'. Mantiene la fuerza honorífica sin convertirla en una glosa más interpretativa.
- source_word: וְתִפְאֶרֶת עַמּוֹ
  english_pob_choice: the glory of his people
  chosen_spanish: la gloria de su pueblo
  alternatives_spanish:
  - el esplendor de su pueblo
  - la honra de su pueblo
  - el honor de su pueblo
  lexicon: HALOT
  rationale: תִפְאֶרֶת puede ser gloria, esplendor u honor. 'Gloria' conserva bien el registro elevado y el paralelismo con el miembro anterior, por lo que resulta la opción más directa y digna en español.
- source_word: שִׁמְעוֹן בֶּן יוֹחָנָן
  english_pob_choice: Simon son of Yohanan
  chosen_spanish: Simón hijo de Yohanan
  alternatives_spanish:
  - Simeón hijo de Yohanan
  - Simón hijo de Juan
  lexicon: standard transliteration practice
  rationale: '''Simón'' es la forma española habitual del nombre; ''Yohanan'' preserva mejor el nombre hebreo que ''Juan''. Se mantiene la filiación literal del hebreo.'
- source_word: הַכֹּהֵן
  english_pob_choice: the priest
  chosen_spanish: el sacerdote
  alternatives_spanish:
  - el sacerdote principal
  - el sumo sacerdote
  lexicon: HALOT
  rationale: El testimonio hebreo dice simplemente 'el sacerdote'. En español, 'sacerdote' es el equivalente natural y claro. Se evita importar el título más fuerte del paralelo griego al texto principal sin una base hebrea explícita.
- source_word: נִפְקַד הַבָּיִת
  english_pob_choice: the house was repaired
  chosen_spanish: fue reparada la casa
  alternatives_spanish:
  - la casa fue atendida
  - la casa fue restaurada
  - se reparó la casa
  lexicon: HALOT
  rationale: El verbo hebreo admite la idea de ser atendida, visitada o reparada. A la luz del contexto de construcción y del paralelo griego, 'fue reparada la casa' comunica bien la acción sin sobreexplicar.
- source_word: הֵיכָל
  english_pob_choice: temple
  chosen_spanish: el templo
  alternatives_spanish:
  - el santuario
  - la casa
  - el recinto sagrado
  lexicon: HALOT
  rationale: En este contexto הֵיכָל designa el templo/santuario. 'El templo' es la opción más clara y natural en español.
- source_word: חֻזַּק
  english_pob_choice: was strengthened
  chosen_spanish: fue укрепecido
  alternatives_spanish:
  - fue fortalecido
  - quedó fortalecido
  - se fortaleció
  lexicon: HALOT
  rationale: El pasivo de חזק expresa ser hecho fuerte o fortalecido. La forma correcta y natural en español es 'fue fortalecido'; se conserva la idea de estabilidad estructural del recinto.
theological_decisions:
- issue: Título de Simón
  english_pob_reading: the priest, with Greek parallel suggesting 'the great priest' / 'high priest'
  chosen_spanish_reading: el sacerdote
  alternative_spanish_readings:
  - el sumo sacerdote
  - el gran sacerdote
  rationale: El texto hebreo conservado lee simplemente 'el sacerdote', mientras que el griego paralelo amplía el título. Para el texto principal se sigue el hebreo, preservando la tensión documental en una nota; así no se resuelve artificialmente una discrepancia histórica y titulativa.
  doctrine_reference: Primacía del testimonio original; mantener tensiones textuales relevantes
- issue: Relación entre 'casa' y 'templo'
  english_pob_reading: the house was repaired ... the temple was strengthened
  chosen_spanish_reading: la casa fue reparada ... el templo fue fortalecido
  alternative_spanish_readings:
  - la casa fue restaurada ... el templo fue fortalecido
  - la casa fue atendida ... el templo fue fortalecido
  rationale: Se conserva la variación del hebreo entre בַּיִת y הֵיכָל. 'Casa' mantiene el término literal; 'templo' aclara el referente sagrado en la segunda cola. Esto respeta la progresión semántica del verso sin homogeneizar indebidamente.
  doctrine_reference: Precisión léxica y respeto por la variación estilística del original
translation_notes:
  revision_awareness: El borrador sigue la revisión más reciente del proyecto al traducir גְּדוֹל אֶחָיו como 'grande entre sus hermanos' y וְתִפְאֶרֶת עַמּוֹ como 'la gloria de su pueblo'. También conserva la decisión auditada de mantener el hebreo 'Yohanan' en el nombre propio y de no absorber el título ampliado del griego en el texto principal.
  spanish_consistency_notes:
  - 'Se mantiene la terminología base del proyecto: Yahvé no aparece en este versículo; Mesías/Cristo no aplican aquí.'
  - Se usa 'sacerdote' para הַכֹּהֵן siguiendo el hebreo principal, con la ampliación griega reservada para nota.
  - Se conserva la alternancia 'casa/templo' para reflejar el hebreo בַּיִת / הֵיכָל.
  - Se corrigió la forma accidental no española en el borrador interno a 'fortalecido' en la lectura final del pasaje.
