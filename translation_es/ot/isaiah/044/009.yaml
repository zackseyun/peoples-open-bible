translation:
  language: es
  text: Todos los que modelan un ídolo son nada[a], y las cosas en que se deleitan[b] no aprovechan. Sus testigos[c] ni ven ni saben, para que queden avergonzados[d].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «Todos los fabricantes de ídolos son vacío» o «Todos los que forman una imagen tallada son vanidad».
    reason: lexical_alternative
  - marker: b
    text: O «sus cosas preciosas» o «sus cosas deseables».
    reason: lexical_alternative
  - marker: c
    text: «Sus testigos» puede referirse a los adoradores que testifican a favor de los ídolos, o irónicamente a los mismos ídolos.
    reason: alternative_reading
  - marker: d
    text: O «para que sean avergonzados».
    reason: lexical_alternative
lexical_decisions:
- source_word: יֹצְרֵי פֶסֶל
  english_pob_choice: who fashion an idol
  chosen_spanish: los que modelan un ídolo
  alternatives_spanish:
  - los que forman una imagen tallada
  - los fabricantes de ídolos
  lexicon: HALOT
  rationale: יֹצְרֵי expresa el acto de formar o modelar, y פֶסֶל nombra un ídolo o imagen de culto. "Modelan un ídolo" conserva el sentido concreto del hacer sin volverse rígido en español.
- source_word: כֻּלָּם
  english_pob_choice: All who
  chosen_spanish: Todos los que
  alternatives_spanish:
  - todos ellos
  lexicon: HALOT
  rationale: En esta construcción participial, el hebreo introduce de forma natural a los agentes. En español, "Todos los que" fluye mejor que un orden más literal.
- source_word: תֹּהוּ
  english_pob_choice: nothing
  chosen_spanish: nada
  alternatives_spanish:
  - vanidad
  - vacío
  - nada de valor
  lexicon: HALOT
  rationale: Aquí תֹּהוּ apunta a inutilidad y vaciedad práctica. "Nada" comunica con fuerza esa inutilidad, como en la decisión inglesa de 'nothing'.
- source_word: וַחֲמוּדֵיהֶם
  english_pob_choice: the things they delight in
  chosen_spanish: las cosas en que se deleitan
  alternatives_spanish:
  - sus cosas preciosas
  - sus cosas deseables
  - sus ídolos preciados
  lexicon: HALOT
  rationale: חֲמוּדֵיהֶם procede de la raíz de desear/amar y puede aludir a lo precioso o deseable. "Las cosas en que se deleitan" mantiene el matiz afectivo sin precisar más de lo que el hebreo garantiza.
- source_word: בַּל יוֹעִילוּ
  english_pob_choice: do not profit
  chosen_spanish: no aprovechan
  alternatives_spanish:
  - no sirven
  - no benefician
  lexicon: HALOT
  rationale: יוֹעִילוּ en hiphil expresa beneficio o provecho. "No aprovechan" es una equivalencia idiomática clara en español y cercana al valor verbal del hebreo.
- source_word: וְעֵדֵיהֶם
  english_pob_choice: Their witnesses
  chosen_spanish: Sus testigos
  alternatives_spanish:
  - los que dan testimonio de ellos
  - sus testigos, o sus defensores
  lexicon: HALOT
  rationale: La expresión puede referirse a quienes testifican a favor de los ídolos o, irónicamente, a los mismos ídolos. "Sus testigos" conserva la ambigüedad del original, como en el audit trail inglés.
- source_word: בַּל יִרְא֛וּ וּבַל יֵדְע֖וּ
  english_pob_choice: neither see nor know
  chosen_spanish: ni ven ni saben
  alternatives_spanish:
  - no ven ni conocen
  - ni ven ni entienden
  lexicon: HALOT
  rationale: El par de negaciones comunica ceguera e ignorancia. "Ni ven ni saben" es breve, natural y mantiene el paralelismo hebreo.
- source_word: לְמַעַן יֵבֹשׁוּ
  english_pob_choice: so that they will be put to shame
  chosen_spanish: para que queden avergonzados
  alternatives_spanish:
  - a fin de que sean avergonzados
  - para que sean puestos en vergüenza
  lexicon: HALOT
  rationale: 'לְמַעַן puede expresar propósito o resultado. Aquí el juicio profético suena bien como consecuencia: su ceguera termina en vergüenza. "Queden avergonzados" reproduce bien בוש en español.'
theological_decisions:
- issue: Alcance de תֹּהוּ en la denuncia contra la idolatría
  english_pob_reading: A statement of worthlessness/emptiness rather than metaphysical nonexistence.
  chosen_spanish_reading: Una afirmación de vaciedad e inutilidad, no una tesis filosófica sobre la inexistencia absoluta.
  alternative_spanish_readings:
  - una afirmación de caos
  - una afirmación de formlessness/forma no determinada
  rationale: El verso acusa a los hacedores de ídolos y a sus obras de ser inútiles. Traducir תֹּהוּ como "nada" mantiene la fuerza polémica sin ampliar el sentido hacia una ontología más fuerte que la del texto.
  doctrine_reference: Isaías 44:9 en contexto; cf. Isaías 41:24; 44:19
- issue: Referente de "sus testigos"
  english_pob_reading: The phrase refers to the idolaters/testifiers on behalf of the idols, not the idols themselves as literal witnesses.
  chosen_spanish_reading: La frase puede referirse a los adoradores o defensores de los ídolos, sin cerrar la ambigüedad del hebreo.
  alternative_spanish_readings:
  - los ídolos mismos, dichos irónicamente testigos
  - sus testigos, entendidos como quienes testifican por ellos
  rationale: El hebreo permite la ironía entre quienes respaldan al ídolo y el propio ídolo como incapaz de ver o saber. Mantener "Sus testigos" preserva esa tensión interpretativa.
  doctrine_reference: Isaías 44:9; ironía profética en la polémica contra los ídolos
translation_notes:
  revision_awareness: El borrador sigue de cerca el texto hebreo y el audit trail inglés; no se requirieron revisiones posteriores según el registro más reciente, y se preserva la ambigüedad retórica de 'sus testigos' y el valor de תֹּהוּ como vaciedad.
  spanish_consistency_notes:
  - Se mantiene 'ídolo' para פֶסֶל conforme al valor del término en contexto.
  - Se usa 'Yahvé' solo cuando el nombre divino aparezca explícitamente; en este versículo no aparece.
  - '''Ni ven ni saben'' conserva el paralelismo negativo del hebreo sin añadir explicación interpretativa en el cuerpo del texto.'
  - '''Queden avergonzados'' traduce el resultado/purpose clause de לְמַעַן con un español natural y reverente.'
