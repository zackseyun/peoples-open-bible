translation:
  language: es
  text: Y juzgaban al pueblo en todo tiempo. Todo asunto difícil lo llevaban a Moisés[a], pero todo asunto menor lo juzgaban ellos mismos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'También puede entenderse: “todo caso difícil ... todo caso menor”. El hebreo contrapone aquí los asuntos difíciles con los menores en un marco judicial.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְשָׁפְטוּ
  english_pob_choice: they judged
  chosen_spanish: juzgaban
  alternatives_spanish:
  - juzgaron
  - administraban justicia
  lexicon: HALOT
  rationale: El verbo שׁפט en este contexto describe la función continua de los jueces. En español, el imperfecto 'juzgaban' expresa mejor la acción habitual o reiterada que el perfecto simple.
- source_word: הָעָם
  english_pob_choice: the people
  chosen_spanish: el pueblo
  alternatives_spanish:
  - la gente
  - la nación
  lexicon: HALOT
  rationale: '''עם'' se refiere aquí a la comunidad del pacto en conjunto. ''El pueblo'' es natural en español bíblico y conserva el valor colectivo.'
- source_word: בְּכָל עֵת
  english_pob_choice: at all times
  chosen_spanish: en todo tiempo
  alternatives_spanish:
  - siempre
  - constantemente
  lexicon: HALOT
  rationale: La expresión indica disponibilidad continua para juzgar. 'En todo tiempo' mantiene la amplitud temporal de la frase hebrea sin volverla demasiado coloquial.
- source_word: הַדָּבָר הַקָּשֶׁה
  english_pob_choice: every difficult matter
  chosen_spanish: todo asunto difícil
  alternatives_spanish:
  - todo caso difícil
  - todo asunto duro
  lexicon: HALOT
  rationale: דבר puede significar asunto, caso o cuestión en un marco jurídico. 'Asunto difícil' conserva esa amplitud y refleja bien el contraste con 'pequeño'. Se evita 'caso' porque en español puede sonar más técnico de lo necesario, aunque sigue siendo una alternativa válida.
- source_word: יְבִיאוּן אֶל מֹשֶׁה
  english_pob_choice: they would bring ... to Moses
  chosen_spanish: lo llevaban a Moisés
  alternatives_spanish:
  - lo traían a Moisés
  - lo presentaban a Moisés
  lexicon: HALOT
  rationale: El verbo בוא en causativo expresa traer o llevar para presentar el asunto ante Moisés. 'Lo llevaban' conserva el sentido iterativo y la dirección hacia Moisés. Se usa pronombre neutro singular porque el antecedente es 'asunto'.
- source_word: כָל הַדָּבָר הַקָּטֹן
  english_pob_choice: every small matter
  chosen_spanish: todo asunto pequeño
  alternatives_spanish:
  - todo caso pequeño
  - todo asunto menor
  lexicon: HALOT
  rationale: '''קטן'' contrasta con ''קשה'' y marca lo menor o más sencillo. ''Asunto pequeño'' mantiene el paralelismo con ''asunto difícil'' y suena natural en español.'
- source_word: יִשְׁפּוּטוּ הֵם
  english_pob_choice: they themselves would judge
  chosen_spanish: lo juzgaban ellos mismos
  alternatives_spanish:
  - lo juzgaban por sí mismos
  - ellos mismos lo juzgaban
  lexicon: HALOT
  rationale: El pronombre independiente הֵם añade énfasis. 'Ellos mismos' preserva esa fuerza enfática en español. El pronombre 'lo' mantiene la referencia al asunto o caso tratado.
translation_notes:
  revision_awareness: He seguido el hebreo de manera directa, tomando el audit trail inglés como apoyo para el valor iterativo de los verbos y el contraste jurídico entre 'difícil' y 'pequeño'. La redacción española conserva el paralelismo del original y la referencia enfática a Moisés.
  spanish_consistency_notes:
  - Se mantiene 'Moisés' como nombre propio sin glosa.
  - Se usa 'asunto' para דבר de forma consistente con su sentido judicial en esta cláusula.
  - El imperfecto 'juzgaban/llevaban' refleja acción habitual, en línea con el valor repetido del contexto.
  - La nota al pie preserva la alternativa léxica documentada sin introducir una paráfrasis mayor.
