translation:
  language: es
  text: y Nebo, y Baal-meón, cuyos nombres[a] habían sido cambiados, y Sibma. Y dieron nombres a las ciudades que habían construido.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O “con nombres cambiados” / “cuyos nombres fueron cambiados”. La frase hebrea probablemente señala que Nebo y Baal-meón tenían nombres alterados.
    reason: lexical_alternative
lexical_decisions:
- source_word: נְב֞וֹ
  english_pob_choice: Nebo
  chosen_spanish: Nebo
  alternatives_spanish:
  - Nébo
  lexicon: HALOT
  rationale: Es nombre propio de lugar; se translitera, no se traduce. Se conserva la forma reconocible en español bíblico, sin añadir acento no atestiguado en la tradición del nombre.
- source_word: בַּ֧עַל מְע֛וֹן
  english_pob_choice: Baal-meon
  chosen_spanish: Baal-meón
  alternatives_spanish:
  - Baal-meon
  - Baal Meón
  lexicon: HALOT
  rationale: Es un topónimo compuesto. La tilde en la vocal final ayuda a la pronunciación española y mantiene la segmentación del nombre sin sustituirlo por un equivalente interpretativo.
- source_word: מֽוּסַבֹּ֥ת שֵׁ֖ם
  english_pob_choice: their names having been changed
  chosen_spanish: cuyos nombres habían sido cambiados
  alternatives_spanish:
  - con nombres cambiados
  - cuyos nombres fueron cambiados
  - renombrados
  lexicon: HALOT
  rationale: La expresión hebrea es pasiva y resultativa; en español queda natural con una relativa explicativa. Se conserva la tensión lexical de que los nombres fueron alterados, sin convertirlo en una simple paráfrasis libre.
- source_word: שִׂבְמָ֑ה
  english_pob_choice: Sibmah
  chosen_spanish: Sibma
  alternatives_spanish:
  - Sibmah
  - Shibma
  lexicon: HALOT
  rationale: Topónimo propio; se adopta una forma española breve y transparente. La forma sin -h final es más natural en español, mientras que el valor consonántico del nombre permanece claro.
- source_word: וַ/יִּקְרְא֣וּ בְ/שֵׁמֹ֔ת
  english_pob_choice: they gave names
  chosen_spanish: dieron nombres
  alternatives_spanish:
  - nombraron
  - los llamaron
  - les pusieron nombres
  lexicon: HALOT
  rationale: La construcción hebrea expresa asignación de nombres; en español, 'dar nombres' reproduce bien la acción sin forzar un calco como 'llamar con nombres'.
- source_word: אֶת שְׁמ֥וֹת הֶ/עָרִ֖ים
  english_pob_choice: to the cities
  chosen_spanish: a las ciudades
  alternatives_spanish:
  - a los nombres de las ciudades
  - a las ciudades, sus nombres
  lexicon: HALOT
  rationale: Aunque el hebreo dice literalmente 'los nombres de las ciudades', el sentido en contexto es que asignaron nombres a las ciudades. Se sigue la equivalencia auditada del inglés POB, manteniendo el objeto de la acción con fluidez española.
- source_word: אֲשֶׁ֥ר בָּנֽוּ
  english_pob_choice: that they had built
  chosen_spanish: que habían construido
  alternatives_spanish:
  - que construyeron
  - que habían edificado
  lexicon: HALOT
  rationale: בנה se rinde con el verbo común 'construir' en español. El pluscuamperfecto conserva la anterioridad relativa señalada por la revisión inglesa; 'edificado' sería posible pero más marcado y menos natural aquí.
translation_notes:
  revision_awareness: He seguido la revisión más reciente del inglés POB al reflejar la anterioridad con 'habían construido' y al evitar una paréntesis explicativa, integrando la nota semántica sobre el cambio de nombres mediante una frase relativa fluida en español.
  spanish_consistency_notes:
  - Se mantiene Yahvé como norma general del proyecto, pero este versículo no contiene el Tetragrámaton.
  - Se ha conservado la transliteración de los topónimos para respetar el carácter propio del texto.
  - La nota [a] se ancla en 'cambiados' para preservar la alternativa lexical documentada sobre מוּסַבֹּת שֵׁם.
