translation:
  language: es
  text: Un salmo de David[a], cuando estaba en la región desierta[b] de Judá.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «por David» o «para David»; el encabezamiento hebreo «de David» puede indicar autoría, dedicación o asociación.
    reason: alternative_reading
  - marker: b
    text: O «el desierto de Judá». El término hebreo puede referirse de manera amplia a región desierta, estepa o desierto.
    reason: lexical_alternative
lexical_decisions:
- source_word: מִזְמ֥וֹר
  english_pob_choice: A psalm
  chosen_spanish: Un salmo
  alternatives_spanish:
  - Un canto
  - Una melodía
  lexicon: HALOT
  rationale: En encabezamientos de salmos, el término funciona como rótulo técnico de género; «salmo» es el equivalente español más natural y preciso para ese uso litúrgico.
- source_word: לְ/דָוִ֑ד
  english_pob_choice: of David
  chosen_spanish: de David
  alternatives_spanish:
  - para David
  - por David
  - perteneciente a David
  lexicon: HALOT
  rationale: La preposición ל en estos encabezamientos puede indicar autoría, dedicación o asociación. «De David» conserva esa ambigüedad sin cerrarla prematuramente.
- source_word: בִּ֝/הְיוֹת֗/וֹ
  english_pob_choice: when he was
  chosen_spanish: cuando estaba
  alternatives_spanish:
  - mientras estaba
  - cuando fue
  lexicon: HALOT
  rationale: La construcción temporal pide una cláusula natural en español. «Cuando estaba» expresa el valor temporal sin forzar una lectura más específica que la del hebreo.
- source_word: בְּ/מִדְבַּ֥ר
  english_pob_choice: in the wilderness
  chosen_spanish: en el desierto
  alternatives_spanish:
  - en el desierto [b]
  - en la estepa
  lexicon: HALOT
  rationale: Aunque «wilderness» suele traducirse como «desierto» o «desierto/soledad», aquí el contexto geográfico favorece «desierto» como término claro y aceptable en español. La nota mantiene la alternativa léxica del hebreo, que puede abarcar terreno árido en sentido amplio.
- source_word: יְהוּדָֽה
  english_pob_choice: Judah
  chosen_spanish: Judá
  alternatives_spanish:
  - Judah
  lexicon: HALOT
  rationale: 'Nombre propio bíblico estándar en español: «Judá».'
theological_decisions:
- issue: Ambigüedad del encabezamiento «de David»
  english_pob_reading: Retain the ambiguous heading 'of David' rather than specifying authorship.
  chosen_spanish_reading: Mantener «de David» sin decidir si indica autoría, dedicación o asociación.
  alternative_spanish_readings:
  - por David
  - para David
  - salmo davídico
  rationale: El hebreo permite varias relaciones semánticas en los superscritos de salmos. La versión española conserva esa tensión interpretativa en vez de resolverla con una formulación más estrecha.
  doctrine_reference: Translation philosophy §3 (Preserve theological tension rather than resolve it)
translation_notes:
  revision_awareness: 'Se siguió la revisión auditada que corrige la ubicación de las notas: la nota de «David» va sobre «David» y la nota léxica de מִדְבַּר va sobre «desierto»; se preservó la ambigüedad del encabezamiento y la alternativa léxica del término de paisaje.'
  spanish_consistency_notes:
  - Se usa «Judá» para el nombre propio bíblico, de acuerdo con el uso español estándar.
  - Se mantiene el estilo sobrio y publicable propio de un encabezamiento bíblico.
  - La puntuación reproduce una oración completa en español con coma temporal natural.
