translation:
  language: es
  text: y a pedir misericordia[a] delante del Dios del cielo, acerca de este misterio, para que Daniel y sus compañeros no perecieran con el resto de los sabios de Babilonia.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'secreto'. El término arameo se refiere a una realidad oculta que requiere revelación.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְרַחֲמִין
  english_pob_choice: mercy
  chosen_spanish: misericordia
  alternatives_spanish:
  - compasión
  - misericordias
  lexicon: HALOT
  rationale: El arameo plural funciona idiomáticamente como objeto de la petición. En español, 'misericordia' conserva la fuerza religiosa natural de la súplica y evita una pluralización poco idiomática.
- source_word: לְמִבְעֵא
  english_pob_choice: to seek
  chosen_spanish: a pedir
  alternatives_spanish:
  - a buscar
  - a rogar
  lexicon: HALOT
  rationale: 'En este contexto, el infinitivo expresa propósito: acudir a Dios en súplica. ''Pedir'' comunica mejor la acción de oración que un calco como ''buscar''.'
- source_word: מִן קֳדָם
  english_pob_choice: from before
  chosen_spanish: delante de
  alternatives_spanish:
  - de delante de
  - ante
  lexicon: HALOT
  rationale: La imagen aramea es literalmente espacial, pero en español bíblico actual 'delante de' mantiene la idea de presentarse en la presencia de Dios sin sonar forzado.
- source_word: אֱלָהּ שְׁמַיָּא
  english_pob_choice: the God of heaven
  chosen_spanish: el Dios del cielo
  alternatives_spanish:
  - el Dios de los cielos
  lexicon: HALOT
  rationale: El título arameo es estándar en Daniel. 'Del cielo' refleja la forma singular del español moderno y sigue fielmente el valor titular del original.
- source_word: עַל רָזָה דְּנָה
  english_pob_choice: concerning this mystery
  chosen_spanish: respecto de este misterio
  alternatives_spanish:
  - acerca de este misterio
  - sobre este misterio
  - respecto de este secreto
  lexicon: HALOT
  rationale: '''Respecto de'' expresa bien la relación temática de עַל en una petición. ''Misterio'' preserva la carga revelatoria que Daniel da a רָז en este capítulo.'
- source_word: רָז
  english_pob_choice: mystery
  chosen_spanish: misterio
  alternatives_spanish:
  - secreto
  lexicon: HALOT
  rationale: En Daniel 2 el término no es solo algo oculto por humanos, sino una realidad escondida que requiere revelación divina. 'Misterio' reproduce mejor esa tensión que 'secreto'.
- source_word: דִּי לָא יְהֹבְדוּן
  english_pob_choice: so that ... might not perish
  chosen_spanish: para que ... no perezcan
  alternatives_spanish:
  - para que ... no sean destruidos
  - para que ... no mueran
  lexicon: HALOT
  rationale: La revisión inglesa prefirió 'perish' por la naturalidad del verbo. En español, 'perezcan' mantiene esa naturalidad y conserva el sentido de perder la vida o perecer bajo juicio.
- source_word: וְחַבְרוֹהִי
  english_pob_choice: his companions
  chosen_spanish: sus compañeros
  alternatives_spanish:
  - sus amigos
  - sus asociados
  lexicon: HALOT
  rationale: El posesivo se refiere a Daniel en el contexto narrativo. 'Compañeros' es formal, claro y más cercano al vínculo de colaboración que 'amigos'.
- source_word: עִם שְׁאָר
  english_pob_choice: with the rest of
  chosen_spanish: con el resto de
  alternatives_spanish:
  - junto con el resto de
  - con los demás de
  lexicon: HALOT
  rationale: La frase marca inclusión en el mismo destino. 'Con el resto de' es una equivalencia directa y natural en español.
- source_word: חַכִּימֵי בָבֶל
  english_pob_choice: the wise men of Babylon
  chosen_spanish: los sabios de Babilonia
  alternatives_spanish:
  - los sabios babilonios
  - los sabios de Babilonia
  lexicon: HALOT
  rationale: Es el grupo cortesano de intérpretes y consejeros en Daniel. 'Sabios' conserva el término establecido y 'de Babilonia' mantiene el marco histórico narrativo.
theological_decisions:
- issue: Rָז / hidden matter in Daniel 2
  english_pob_reading: mystery
  chosen_spanish_reading: misterio
  alternative_spanish_readings:
  - secreto
  rationale: La escena trata de una realidad oculta que solo Dios puede revelar. 'Misterio' preserva mejor el énfasis teológico en revelación divina, sin proyectar un uso técnico posterior.
  doctrine_reference: Translation philosophy §1, §3, §5
translation_notes:
  revision_awareness: La redacción sigue la revisión final del inglés al preferir 'perecer' frente a una idea más fuerte de destrucción, y conserva la decisión ya estabilizada de traducir רָז como 'misterio' en este capítulo, con la alternativa 'secreto' señalada en nota.
  spanish_consistency_notes:
  - Se mantiene 'Dios del cielo' para el título arameo estándar de Daniel 2, en lugar de una paráfrasis explicativa.
  - '''Misericordia'' se usa en singular idiomático, aunque el arameo esté en plural de intensidad/abstracción.'
  - Se evita 'SEÑOR' porque el hebreo/arameo aquí nombra explícitamente a Dios como 'el Dios del cielo'.
  - '''Sus compañeros'' preserva la relación cercana de Daniel con los jóvenes hebreos sin convertirla en un término eclesial.'
