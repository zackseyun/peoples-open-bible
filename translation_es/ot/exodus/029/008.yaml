  to: Y acercarás a sus hijos, y los vestirás con túnicas[a].
  rationale: Se reemplaza la perífrasis ‘harás que se acerquen’ por ‘acercarás’ para reflejar más directamente תַּקְרִיב y preservar mejor el matiz ritual de ‘bring near’. Se mantiene ‘sus hijos’ y ‘túnicas’ como opciones fieles y naturales. La nota se ajusta para armonizar con la elección principal y con la alternativa léxica documentada en la auditoría inglesa.
