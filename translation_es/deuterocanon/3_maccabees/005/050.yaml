review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien la secuencia y el sentido general del griego: giro enfático, recuerdo de ayudas previas desde el cielo, postración colectiva y separación de los niños que mamaban. Sin embargo, «las ayudas ... que les habían ocurrido antes» no representa bien ἀντιλήψεις γεγενημένας; en español suena impropio, porque la ayuda no «les ocurre». Además, el plural «ayudas» es posible pero menos natural aquí que «el auxilio» o «las intervenciones de ayuda».'
  spanish_quality_summary: 'El texto es mayormente claro, pero tiene dos tropiezos de naturalidad: «las ayudas ... que les habían ocurrido antes» y, en menor grado, la duplicación «Pero, sin embargo». «Rostro en tierra» y «separaron a los lactantes de los pechos» son legibles y fieles. Conviene también ajustar la nota para que no presente como alternativa lo mismo que ya dice el texto.'
  glossary_alignment: No hay conflictos con la terminología base del proyecto. «Del cielo» respeta ἐξ οὐρανοῦ sin explicitar indebidamente a Dios. «Lactantes» es una buena decisión contextual para νήπια. No intervienen términos sensibles como Yahvé, Mesías, esclavo, etc.
  issues:
  - severity: medium
    issue: «las ayudas ... que les habían ocurrido antes» es una construcción semánticamente deficiente
    rationale: ἀντιλήψεις son actos de ayuda/auxilio; en español la ayuda no suele «ocurrirles» a las personas. Esto debilita la fidelidad y la naturalidad. «El auxilio del cielo que antes les había llegado» o similar conserva mejor el sentido eventivo y retrospectivo.
  - severity: low
    issue: «Pero, sin embargo» suena algo cargado en español
    rationale: La acumulación enfática existe en griego, pero en español puede conservarse mejor con «Pero aun así» o «Sin embargo» sin perder el giro retórico.
  - severity: low
    issue: La nota [a] repite prácticamente la misma redacción del texto base
    rationale: La nota debería explicar la literalidad y el sentido implícito de lactancia, no ofrecer como alternativa exacta lo ya traducido.
  revised_spanish_text: Pero aun así, cuando también vieron el auxilio del cielo que antes les había llegado, todos a una se echaron rostro en tierra, y separaron a los lactantes de los pechos[a].
  revised_footnotes:
