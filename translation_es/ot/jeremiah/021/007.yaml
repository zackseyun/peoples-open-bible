  language: en
  yaml_path: translation/ot/jeremiah/021/007.yaml
  text: And after that[a], declares Yahweh, I will give Zedekiah king of Judah, his servants, the people, and those left in this city from the plague, from the sword, and from the famine into the hand of Nebuchadnezzar king of Babylon, into the hand of their enemies, and into the hand of those seeking their life; and he will strike them down with the edge of the sword. He will not spare them or have pity or compassion.
  footnotes:
