  to: 'Entonces Joás, rey de Israel, envió a Amasías, rey de Judá, diciendo: «El arbusto espinoso[a] que estaba en el Líbano envió al cedro que estaba en el Líbano, diciendo: “Da tu hija a mi hijo como esposa”. Y un animal salvaje[b] que estaba en el Líbano pasó y pisoteó el arbusto espinoso».'
