base_translation:
  language: en
  yaml_path: translation/ot/genesis/026/008.yaml
  text: And it happened[a], when he had been there a long time, that Abimelech king of the Philistines looked out through the window and saw, and behold, Isaac was laughing with Rebekah his wife.
  footnotes:
  - marker: a
    text: Or 'was sporting with,' 'was laughing with,' or 'was fondling.' The Hebrew verb is related to Isaac's name and can denote playful or intimate behavior; here it implies conduct that revealed Rebekah was his wife.
    reason: lexical_alternative
