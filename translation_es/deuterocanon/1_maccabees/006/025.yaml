  source_alignment_summary: 'El borrador español refleja bien la secuencia del griego: muerte continuada, saqueo de las herencias y acción hostil extendida más allá de ''nosotros''. También preserva razonablemente κληρονομίαι como ''herencias'' y ὅρια como ''territorios''. Sin embargo, ''estaban siendo muertos'' no es español natural ni digno; aunque intenta conservar el pasivo imperfecto de ἐθανατοῦντο, resulta torpe. Además, la nota al pie [a] está anclada en el verbo equivocado: en la auditoría inglesa la nota corresponde a ὅρια (''territories/borders/regions''), no a ἐθανατοῦντο.'
  spanish_quality_summary: La frase central necesita ajuste estilístico para sonar natural en español eclesial moderno. 'Eran ejecutados' preserva el pasivo y la gravedad mejor que 'estaban siendo muertos'. 'Nuestras herencias eran saqueadas' es claro y fluido. 'Extendieron la mano contra' es comprensible y bastante fiel. La puntuación y sintaxis general son buenas.
  glossary_alignment: 'No hay términos teológicos de proyecto en juego. Las decisiones léxicas principales son mayormente adecuadas: κληρονομίαι -> ''herencias'', διηρπάζοντο -> ''eran saqueadas'', ἐξέτειναν χεῖρα -> ''extendieron la mano contra'', ὅρια -> ''territorios''. La principal desviación es una elección española poco idiomática para ἐθανατοῦντο y la ubicación incorrecta de la nota léxica, que debe acompañar ''territorios'' por la ambigüedad de ὅρια.'
  issues:
