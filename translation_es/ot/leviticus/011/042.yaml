  text: כֹּל֩ הוֹלֵ֨ךְ עַל גָּח֜ וְ/כֹ֣ל הוֹלֵ֣ךְ עַל אַרְבַּ֗ע עַ֚ד כָּל מַרְבֵּ֣ה רַגְלַ֔יִם לְ/כָל הַ/שֶּׁ֖רֶץ הַ/שֹּׁרֵ֣ץ עַל הָ/אָ֑רֶץ לֹ֥א תֹאכְל֖וּ/ם כִּי שֶׁ֥קֶץ הֵֽם־׀־־־־־׃
base_translation:
  language: en
  yaml_path: translation/ot/leviticus/011/042.yaml
  text: Anything that goes on its belly[a], and anything that goes on four feet, even every creature with many feet, among all the swarming things that swarm on the earth—you shall not eat them[c][b], for they are detestable.
  footnotes:
  - marker: a
    text: Or 'crawls on its belly.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'the swarming thing that swarms,' a repeated form that emphasizes this class of small creatures.
    reason: lexical_alternative
  - marker: c
    text: Or 'they are an abomination.'
    reason: lexical_alternative
  ai_draft:
