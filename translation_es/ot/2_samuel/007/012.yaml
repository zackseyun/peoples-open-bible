    text: Or 'your descendant'; Hebrew 'your seed/offspring,' which can function collectively or as a representative singular.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'from your inward parts,' an idiom meaning from your own body—that is, your biological offspring.
    reason: cultural_note
