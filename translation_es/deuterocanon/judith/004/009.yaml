translation:
  language: es
  text: Y los hijos de Israel[a] hicieron como les instruyeron Joakim, el sumo sacerdote, y el consejo de todo el pueblo de Israel, que estaban en Jerusalén[c][b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘los israelitas’ o ‘los descendientes de Israel’.
    reason: lexical_alternative
  - marker: b
    text: O ‘les ordenaron’ o ‘les mandaron’.
    reason: lexical_alternative
  - marker: c
    text: 'El griego dice literalmente: ‘el consejo de todo el pueblo de Israel, que estaban en Jerusalén’; la cláusula final puede describir al consejo como asentado en Jerusalén.'
    reason: alternative_reading
lexical_decisions:
- source_word: οἱ υἱοὶ Ἰσραήλ
  english_pob_choice: the sons of Israel
  chosen_spanish: los hijos de Israel
  alternatives_spanish:
  - los israelitas
  - los hijos del Israel
  lexicon: LSJ
  rationale: Conservo la expresión genealógico-corporativa del griego. En español, ‘hijos de Israel’ es transparente y natural en registro bíblico, y refleja mejor el paralelismo con el original que una demónima más plana como ‘israelitas’.
- source_word: ἐποίησαν
  english_pob_choice: did
  chosen_spanish: hicieron
  alternatives_spanish:
  - actuaron
  - llevaron a cabo
  lexicon: LSJ
  rationale: El verbo básico de acción se vierte con el perfecto simple ‘hicieron’, que mantiene la sobriedad narrativa del griego y se integra bien en la construcción ‘hicieron conforme a’.
- source_word: καθὰ
  english_pob_choice: as
  chosen_spanish: conforme a
  alternatives_spanish:
  - según
  - tal como
  lexicon: LSJ
  rationale: ‘Conforme a’ expresa adecuación o conformidad con una instrucción y suena natural en español bíblico contemporáneo sin perder la relación comparativa del griego.
- source_word: συνέταξεν
  english_pob_choice: instructed
  chosen_spanish: les había ordenado
  alternatives_spanish:
  - les había instruido
  - les había mandado
  - les había dirigido
  lexicon: LSJ
  rationale: El verbo puede ir de ‘organizar/dirigir’ a ‘ordenar/mandar’. Aquí el contexto de obediencia pública favorece ‘había ordenado’, que conserva la fuerza directiva sin depender de un calco débil como ‘instruido’.
- source_word: Ἰωακεὶμ
  english_pob_choice: Joakim
  chosen_spanish: Joakim
  alternatives_spanish:
  - Jehoiaquim
  - Joaquín
  lexicon: transliteration
  rationale: Sigo la forma griega transmitida por el texto base, ‘Joakim’, en coherencia con la política de transliteración transparente del proyecto.
- source_word: ὁ ἱερεὺς ὁ μέγας
  english_pob_choice: the high priest
  chosen_spanish: el sumo sacerdote
  alternatives_spanish:
  - el gran sacerdote
  lexicon: LSJ
  rationale: ‘Sumo sacerdote’ es la equivalencia idiomática usual en español para el oficio judío designado por la frase, y comunica con claridad la dignidad del cargo sin perder su referencia institucional.
- source_word: ἡ γερουσία
  english_pob_choice: the council
  chosen_spanish: el consejo
  alternatives_spanish:
  - el senado
  - la gerusía
  lexicon: LSJ
  rationale: ‘Consejo’ es la opción más clara y natural en español para un cuerpo de ancianos/dirigentes. Evito ‘senado’ por su carga política moderna y ‘gerusía’ por resultar menos inteligible para lectura eclesial general.
- source_word: παντὸς δήμου Ἰσραήλ
  english_pob_choice: of the whole people of Israel
  chosen_spanish: de todo el pueblo de Israel
  alternatives_spanish:
  - de la totalidad del pueblo de Israel
  - de todo el pueblo israelita
  lexicon: LSJ
  rationale: ‘Pueblo’ reproduce bien δήμος en su sentido colectivo. ‘De todo el pueblo de Israel’ conserva la amplitud totalizante del griego y fluye naturalmente en español.
- source_word: οἱ ἐκάθηντο ἐν Ἰερουσαλήμ
  english_pob_choice: who sat in Jerusalem
  chosen_spanish: que estaban en Jerusalén
  alternatives_spanish:
  - que se sentaban en Jerusalén
  - que residían en Jerusalén
  lexicon: LSJ
  rationale: El participio puede modificar al consejo y/o describir su presencia en la ciudad. En español, ‘estaban en Jerusalén’ preserva esa ambigüedad sin forzar ‘sentados’ como estado literal, que suena extraño. La alternativa ‘residían’ sería más interpretativa.
theological_decisions:
- issue: Designación corporativa de Israel
  english_pob_reading: the sons of Israel
  chosen_spanish_reading: los hijos de Israel
  alternative_spanish_readings:
  - los israelitas
  - los hijos del Israel
  rationale: No hay disputa doctrinal directa, pero el texto enfatiza la identidad corporativa del pueblo. Mantener ‘los hijos de Israel’ conserva mejor la textura covenantal y la cercanía al griego que una versión demónima más abstracta.
  doctrine_reference: DOCTRINE.md §Translation philosophy 1, 4, 5
- issue: Alcance del participio final
  english_pob_reading: who sat in Jerusalem
  chosen_spanish_reading: que estaban en Jerusalén
  alternative_spanish_readings:
  - que se sentaban en Jerusalén
  - que residían en Jerusalén
  rationale: La cláusula final puede referirse al consejo como reunido o asentado en Jerusalén, y el griego admite esa lectura amplia. ‘Que estaban en Jerusalén’ evita cerrar indebidamente la relación sintáctica y deja visible la tensión interpretativa documentada por el audit trail inglés.
  doctrine_reference: DOCTRINE.md §Translation philosophy 2, 4
translation_notes:
  revision_awareness: El pasaje coincide con la revisión más reciente indicada como sin cambios necesarios; se mantiene la lectura de alta concordancia con el audit trail inglés y el texto griego de Swete. No se introducen cambios textuales ni reinterpretaciones fuera de las alternativas documentadas.
  spanish_consistency_notes:
  - Se conserva ‘Yahvé’ como término predeterminado del proyecto, aunque no aparece en este versículo.
  - Se mantiene ‘sumo sacerdote’ como equivalencia estable para ὁ ἱερεὺς ὁ μέγας, siguiendo el uso idiomático español.
  - Se evita ‘senado’ para ἡ γερουσία por su posible carga anacrónica en español.
  - La puntuación separa claramente la acción principal de la cláusula participial final para reflejar la ambigüedad sintáctica del griego.
