translation:
  language: es
  text: Mira[a], yo estoy junto al manantial de agua[b], y las hijas de los hombres de la ciudad[c] salen a sacar agua.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «He aquí»; la partícula hebrea llama la atención sobre la escena inmediata.
    reason: lexical_alternative
  - marker: b
    text: O «la fuente» o «el manantial»; el hebreo עֵין הַמָּיִם se refiere a una fuente de agua, no a la palabra más usual para «pozo».
    reason: lexical_alternative
  - marker: c
    text: Hebreo «las hijas de los hombres de la ciudad», una expresión social y familiar para las jóvenes de la ciudad.
    reason: lexical_alternative
lexical_decisions:
- source_word: הִנֵּה
  english_pob_choice: Look
  chosen_spanish: Mira
  alternatives_spanish:
  - Mira, pues
  - Observa
  - He aquí
  lexicon: HALOT
  rationale: La partícula deíctica pide atención inmediata. En español, «Mira» conserva la vividez directa del inglés POB sin caer en un arcaísmo innecesario como «He aquí», que suena más solemne que el hebreo en este contexto narrativo.
- source_word: נִצָּב
  english_pob_choice: am standing
  chosen_spanish: estoy junto a
  alternatives_spanish:
  - estoy de pie junto a
  - me encuentro junto a
  - permanezco junto a
  lexicon: HALOT
  rationale: El participio expresa postura/situación presente. En español, «estoy junto a» comunica con naturalidad la posición actual del hablante. Aunque «de pie» sería más literal, aquí la idea relevante es su ubicación al lado de la fuente.
- source_word: עַל עֵין הַמָּיִם
  english_pob_choice: by the spring of water
  chosen_spanish: junto a la fuente de agua
  alternatives_spanish:
  - junto al manantial
  - junto a la fuente
  - junto al manantial de agua
  lexicon: HALOT
  rationale: עֵין הַמָּיִם designa una fuente/manantial de agua, no un pozo. «Fuente de agua» preserva el valor lexical de «spring/fountain» del POB inglés y evita «pozo», que implicaría בְּאֵר. «Junto a» expresa bien עַל en este contexto.
- source_word: וּבְנוֹת אַנְשֵׁי הָעִיר
  english_pob_choice: the daughters of the men of the city
  chosen_spanish: las hijas de los hombres de la ciudad
  alternatives_spanish:
  - las hijas de los varones de la ciudad
  - las hijas de los hombres de la aldea
  lexicon: HALOT
  rationale: Se conserva la cadena constructa y la expresión social/familiar del hebreo. «Hombres» mantiene אַנְשֵׁי como masculino explícito; «hijas» reproduce בְנוֹת sin neutralizar el término. No se adopta una paráfrasis como «las jóvenes» porque el POB inglés documenta que la expresión subraya la relación familiar/social.
- source_word: יֹצְאֹת
  english_pob_choice: are coming out
  chosen_spanish: salen
  alternatives_spanish:
  - están saliendo
  - salen afuera
  - vienen saliendo
  lexicon: HALOT
  rationale: El participio femenino plural en contexto narrativo puede expresarse de forma natural en presente histórico en español. «Salen» es idiomático y suficiente; las formas progresivas añadirían peso innecesario sin mayor ganancia semántica.
- source_word: לִשְׁאֹב מָיִם
  english_pob_choice: to draw water
  chosen_spanish: a sacar agua
  alternatives_spanish:
  - a sacar agua del manantial
  - a extraer agua
  - a recoger agua
  lexicon: HALOT
  rationale: El idioma bíblico usa el verbo de extraer/obtener agua de la fuente. «Sacar agua» es la forma española natural y tradicionalmente inteligible para este acto, equivalente al inglés POB «draw water» y más fluida que una calca como «tirar de agua».
translation_notes:
  revision_awareness: Tomé como base el packet hebreo, confirmando que עֵין הַמָּיִם exige una solución de fuente/manantial y no «pozo». También seguí el auditoría inglesa que preserva la expresión social «the daughters of the men of the city», evitando una neutralización interpretativa. La nota inglesa sobre «spring/fountain» se reflejó en «fuente de agua», y la cadena constructa se mantuvo con sintaxis natural del español.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» fuera del texto porque este versículo no contiene el Tetragrámaton.
  - Se prefirió «hijas de los hombres de la ciudad» para conservar la estructura hebrea y su matiz social, en continuidad con la decisión inglesa.
  - Se evitó «pozo» para no confundir עֵין con בְּאֵר.
  - La puntuación reproduce el ritmo narrativo breve del hebreo y del POB inglés.
