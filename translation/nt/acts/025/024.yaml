theological_decisions:
- issue: Reference to 'the Jews' in a hostile legal context
  chosen_reading: Retain 'the Jews' as the ethnic-political group named in the Greek, while rendering πλῆθος as 'the whole body' to reflect collective rhetoric rather than every individual Jew.
  alternative_readings:
  - all the Jews
  - the Jewish leaders
  - the Jewish crowd
  rationale: The Greek explicitly says τῶν Ἰουδαίων, so the translation should not replace it with a narrower group unless the text itself does so. At the same time, πλῆθος is a collective term and Festus is summarizing opposition rhetorically, so the English should avoid implying a mathematically universal statement about every Jew.
  doctrine_reference: Translation philosophy §§1, 4, 5
