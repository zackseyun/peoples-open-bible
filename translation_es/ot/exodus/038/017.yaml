translation:
  language: es
  text: Las bases de las columnas eran de bronce[a], y los ganchos de las columnas y sus bandas[b] eran de plata, y el revestimiento de sus partes superiores era de plata; todas las columnas del atrio tenían bandas de plata.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «zócalos» para «bases».
    reason: lexical_alternative
  - marker: b
    text: El término hebreo traducido «bandas» se traduce tradicionalmente «filletes»; el detalle arquitectónico exacto es incierto, pero se refiere a accesorios de plata asociados con las columnas.
    reason: cultural_note
lexical_decisions:
- source_word: אֲדָנִים
  english_pob_choice: bases
  chosen_spanish: bases
  alternatives_spanish:
  - zócalos
  - sockets
  lexicon: HALOT
  rationale: En contexto de construcción del tabernáculo, el término se refiere a los soportes inferiores de las columnas. «Bases» es claro y natural en español moderno; «sockets» sería más técnico/anglófono, y «zócalos» puede sonar demasiado arquitectónico sin aportar precisión adicional.
- source_word: עַמֻּדִים
  english_pob_choice: pillars
  chosen_spanish: columnas
  alternatives_spanish:
  - postes
  - pilares
  lexicon: HALOT
  rationale: La imagen es de soportes verticales del atrio. «Columnas» es el equivalente español más transparente y digno en un registro arquitectónico bíblico; «postes» suena más doméstico y menos solemne, y «pilares» es posible pero menos idiomático en este contexto.
- source_word: נְחֹשֶׁת
  english_pob_choice: bronze
  chosen_spanish: bronce
  alternatives_spanish:
  - cobre
  lexicon: HALOT
  rationale: En descripciones del tabernáculo, el metal se entiende convencionalmente como una aleación de bronce. «Bronce» conserva el valor tradicional y la claridad moderna; «cobre» es lexicográficamente posible pero menos adecuado para el conjunto del contexto.
- source_word: וָוֵי
  english_pob_choice: hooks
  chosen_spanish: ganchos
  alternatives_spanish:
  - ganchos
  - clavijas
  - argollas
  lexicon: HALOT
  rationale: El hebreo designa las piezas fijadas a las columnas. «Ganchos» comunica bien la función física en español y mantiene la sencillez del texto; «clavijas» o «argollas» especifican demasiado o cambian la imagen.
- source_word: חֲשׁוּקֵיהֶם
  english_pob_choice: their bands
  chosen_spanish: sus bandas
  alternatives_spanish:
  - sus filletes
  - sus aros
  - sus cintas
  lexicon: HALOT
  rationale: El término es arquitectónicamente incierto, pero alude a elementos de plata asociados con las columnas. «Bandas» preserva la decisión del POB en inglés, sugiere un elemento envolvente o de sujeción, y evita el arcaísmo de «filletes».
- source_word: צִפּוּי
  english_pob_choice: overlay
  chosen_spanish: revestimiento
  alternatives_spanish:
  - recubrimiento
  - plaqueado
  lexicon: HALOT
  rationale: El sustantivo denota una capa metálica aplicada encima. «Revestimiento» es natural en español bíblico y técnico a la vez; evita la ambigüedad de «revestir» como acción y conserva la idea de una cubierta superficial.
- source_word: רָאשֵׁיהֶם
  english_pob_choice: their tops
  chosen_spanish: sus cabezas
  alternatives_spanish:
  - sus cimas
  - sus remates
  - sus capiteles
  lexicon: HALOT
  rationale: Literalmente significa «sus cabezas». Aunque «sus cabezas» puede sonar menos arquitectónico, aquí mantiene mejor la imagen hebrea y la relación con la capa de plata sobre la parte superior. «Capiteles» sería demasiado técnico y posiblemente anacrónico.
- source_word: מְחֻשָּׁקִים
  english_pob_choice: banded
  chosen_spanish: ceñidas
  alternatives_spanish:
  - rodeadas
  - bandadas
  - ajustadas
  lexicon: HALOT
  rationale: El participio pasivo está relacionado con la misma familia léxica que «bandas» y describe las columnas provistas de piezas que las circundan. «Ceñidas» conserva la idea de estar rodeadas o ajustadas con bandas, evitando la rigidez de una repetición mecánica y manteniendo la conexión semántica.
- source_word: חָצֵר
  english_pob_choice: courtyard
  chosen_spanish: atrio
  alternatives_spanish:
  - patio
  - courtyard
  lexicon: HALOT
  rationale: En el lenguaje bíblico en español, «atrio» es el término más asentado para el espacio cercado del tabernáculo. Aunque «courtyard» en inglés moderno corresponde a una zona abierta, «atrio» transmite mejor la función cultual y el uso tradicional inteligible en español.
translation_notes:
  revision_awareness: La versión inglesa revisada cambió «but» por «and» para reflejar la conjunción hebrea simple. La traducción española sigue esa lectura coordinativa con «y», sin introducir contraste. También se evitó sobreespecificar el término arquitectónico incierto de חֲשׁוּקֵיהֶם, manteniendo la equivalencia funcional de la decisión inglesa «bands».
  spanish_consistency_notes:
  - Se mantuvo «bronce» para נְחֹשֶׁת conforme al uso estándar del POB y del contexto del tabernáculo.
  - 'Se preservó la distinción entre el metal de las bases y el de las piezas superiores: bronce abajo, plata en ganchos, bandas y revestimiento.'
  - «Atrio» se emplea como término bíblico estable para el recinto exterior del tabernáculo.
  - No se usó «SEÑOR» ni terminología doctrinal ajena al versículo.
