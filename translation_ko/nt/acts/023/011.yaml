  text: 'Τῇ δὲ ἐπιούσῃ νυκτὶ ἐπιστὰς αὐτῷ ὁ κύριος εἶπεν· ⸀Θάρσει, ὡς γὰρ διεμαρτύρω τὰ περὶ ἐμοῦ εἰς Ἰερουσαλὴμ οὕτω σε δεῖ καὶ εἰς Ῥώμην μαρτυρῆσαι.'
base_translation:
  language: en
  yaml_path: translation/nt/acts/023/011.yaml
  text: But on the following night[a], the Lord stood by him and said, “Take courage, for just as you have testified about me in Jerusalem[b], so you must also testify in Rome.”
  footnotes:
  - marker: a
    text: Or “Take heart.”
    reason: lexical_alternative
  - marker: b
    text: "Or “bear witness”; both verbs for Paul's past and future speaking are from the same witness/testimony word group in Greek."
    reason: lexical_alternative
translation:
  language: ko
  text: 다음 날 밤에 주께서 그의 곁에 서서 말씀하셨습니다. 「용기를 가져라. 네가 예루살렘에서 나에 대해 증언한 것처럼, 로마에서도 그렇게 증언해야 한다.」
  philosophy: optimal-equivalence
