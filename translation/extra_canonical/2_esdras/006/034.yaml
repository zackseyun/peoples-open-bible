  category: mistranslation
  tier: 2
  from: so that you may not hasten away from the last times.’”
  to: so that you may not be hasty concerning the last times.’”
  rationale: The phrases `in prioribus temporibus` and `a novissimis temporibus` are parallel, referring to the beginning of creation and the eschaton. Translating `a novissimis` as 'away from' takes the preposition in a local sense of separation, which destroys the parallel and contradicts the context (Ezra is impatient *for* the end, not trying to escape it). Here, `a` means 'in respect to' or 'concerning' (L&S ab, II.C), matching the parallel `in`.
