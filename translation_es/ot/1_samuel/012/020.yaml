translation:
  language: es
  text: 'Y Samuel dijo al pueblo[a]: «No tengan miedo. Ustedes han hecho todo este mal. Pero no se aparten de ir en pos de Yahvé[b]; más bien, sirvan a Yahvé con todo su corazón».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «No teman».'
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «no se aparten de detrás de Yahvé», un modismo que significa dejar de seguirlo.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר
  english_pob_choice: And ... said
  chosen_spanish: dijo
  alternatives_spanish:
  - y dijo
  - entonces dijo
  lexicon: HALOT
  rationale: El wayyiqtol narrativo introduce el discurso de Samuel; en español, «dijo» basta para el flujo natural y la conjunción inicial «Y» conserva la secuencia narrativa sin sobrecargarla.
- source_word: הָעָם
  english_pob_choice: the people
  chosen_spanish: el pueblo
  alternatives_spanish:
  - la gente
  - el pueblo de Israel
  lexicon: HALOT
  rationale: En este contexto, el colectivo de Israel reunido ante Samuel puede expresarse naturalmente como «el pueblo»; mantiene el tono bíblico y evita una paráfrasis innecesaria.
- source_word: אַל תִּירָאוּ
  english_pob_choice: Do not be afraid
  chosen_spanish: No teman
  alternatives_spanish:
  - No tengan miedo
  - No teman ustedes
  lexicon: HALOT
  rationale: La prohibición negativa de ירא se expresa de forma idiomática y clara en español con «No teman», preservando la fuerza exhortativa.
- source_word: אַתֶּם עֲשִׂיתֶם
  english_pob_choice: You have done
  chosen_spanish: Ustedes han hecho
  alternatives_spanish:
  - Ustedes hicieron
  - Han hecho ustedes
  lexicon: HALOT
  rationale: El pronombre independiente se conserva con «Ustedes» para reflejar el énfasis del hebreo; el presente perfecto comunica que la acción ya realizada sigue siendo relevante.
- source_word: כָּל הָרָעָה הַזֹּאת
  english_pob_choice: all this evil
  chosen_spanish: todo este mal
  alternatives_spanish:
  - toda esta maldad
  - todo este mal cometido
  lexicon: HALOT
  rationale: «Mal» transmite la carga moral del hebreo רָעָה sin volver la frase extrañamente abstracta en español; mantiene la seriedad de la reprensión.
- source_word: אַךְ
  english_pob_choice: Yet
  chosen_spanish: Pero
  alternatives_spanish:
  - Sin embargo
  - No obstante
  - Mas
  lexicon: HALOT
  rationale: 'Aquí introduce una fuerte transición correctiva: pese al pecado reconocido, sigue la exhortación. «Pero» es breve y natural en español; el sentido concesivo se sostiene por el contexto.'
- source_word: אַל תָּסוּרוּ מֵאַחֲרֵי יְהוָה
  english_pob_choice: do not turn aside from following Yahweh
  chosen_spanish: no se desvíen de seguir a Yahvé
  alternatives_spanish:
  - no se aparten de seguir a Yahvé
  - no se desvíen de Yahvé
  lexicon: HALOT
  rationale: סור con מֵאַחֲרֵי expresa la imagen de apartarse de ir detrás de Yahvé; «no se desvíen de seguir a Yahvé» conserva esa relación de seguimiento sin calcar de modo duro el hebreo.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahveh
  lexicon: HALOT
  rationale: Se sigue la convención POB de traducir el Tetragrámaton como «Yahvé», preservando el nombre divino en lugar de sustituirlo por un título.
- source_word: וַעֲבַדְתֶּם אֶת יְהוָה
  english_pob_choice: but serve Yahweh
  chosen_spanish: sino sirvan a Yahvé
  alternatives_spanish:
  - y sirvan a Yahvé
  - sino adoren a Yahvé
  lexicon: HALOT
  rationale: עבד en contexto de pacto implica servir; «sino sirvan» refleja el contraste con la prohibición anterior y preserva mejor la antítesis del verso que «adoren».
- source_word: בְּכָל לְבַבְכֶם
  english_pob_choice: with all your heart
  chosen_spanish: con todo su corazón
  alternatives_spanish:
  - con todo su ser
  - con todo el corazón de ustedes
  lexicon: HALOT
  rationale: El hebreo idiomático expresa entrega interior total; en español, «con todo su corazón» es natural, solemne y fiel al sentido covenantal.
theological_decisions:
- issue: Traducción del Tetragrámaton יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Señor
  - Yahveh
  rationale: Se mantiene la decisión doctrinal y editorial del POB de no ocultar el nombre divino tras «SEÑOR». «Yahvé» reproduce el nombre propio revelado a Israel de forma reconocible en español.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Valor moral de רָעָה
  english_pob_reading: evil
  chosen_spanish_reading: mal
  alternative_spanish_readings:
  - maldad
  - malvado acto
  - error
  rationale: El contexto es una reprensión por una acción pecaminosa. «Mal» conserva la gravedad moral sin debilitarla a mera equivocación; aunque «mal» es algo más amplio que «evil», aquí mantiene adecuadamente el peso del reproche.
  doctrine_reference: HALOT; contexto narrativo-profético de reprensión
- issue: Imagen idiomática de מֵאַחֲרֵי יְהוָה
  english_pob_reading: do not turn aside from following Yahweh
  chosen_spanish_reading: no se desvíen de seguir a Yahvé
  alternative_spanish_readings:
  - no se aparten de seguir a Yahvé
  - no abandonen a Yahvé
  rationale: La fórmula hebrea no solo prohíbe abandonar a Yahvé sino apartarse de la senda de seguirlo. La traducción elegida conserva el movimiento figurado y evita borrar la imagen relacional del texto.
  doctrine_reference: Lexical note on Hebrew idiom
translation_notes:
  revision_awareness: 'Se siguió el estado más reciente del audit trail: sin revisiones aplicadas y con alta concordancia del revisor; no se introdujeron cambios de sentido respecto del inglés POB, solo ajustes naturales de español y preservación del nombre divino.'
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» para יְהוָה conforme a la convención del proyecto.
  - Se preservó el tono de reprensión con una estructura breve y directa.
  - «Ustedes» se usó para reflejar el énfasis del pronombre hebreo independiente.
  - La antítesis «no... sino...» refleja bien la corrección del hebreo entre prohibición y mandato positivo.
  - No se añadió ningún término eclesiástico tradicional que sustituyera el vocabulario del texto fuente.
