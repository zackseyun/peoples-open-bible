translation:
  language: es
  text: No volverás a ver al pueblo insolente[a], un pueblo de habla demasiado profunda para comprender[b], de lengua tartamuda[c], incomprensible.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'También: «fiero» o «desafiante». El hebreo נוֹעָז puede describir un pueblo arrogante o intimidante.'
    reason: lexical_alternative
  - marker: b
    text: Lit. «un pueblo profundo de labios, desde oír»; es decir, un pueblo cuyo habla es demasiado oscura para comprender.
    reason: source_note
  - marker: c
    text: 'También: «de lengua burlona», «de lengua extraña» o «de lengua bárbara». El hebreo es difícil; el sentido probable es el de una lengua extranjera e ininteligible.'
    reason: lexical_alternative
lexical_decisions:
- source_word: נוֹעָז
  english_pob_choice: insolent
  chosen_spanish: insolente
  alternatives_spanish:
  - fiero
  - desafiante
  - audaz
  lexicon: HALOT
  rationale: La forma participial/adjetival describe a un pueblo marcado por arrogancia y actitud intimidante. «Insolente» conserva tanto la carga despectiva como el matiz de desafío; «fiero» o «audaz» serían más débiles o más ambiguos en español.
- source_word: תִרְאֶה
  english_pob_choice: you will ... see
  chosen_spanish: volverás a ver
  alternatives_spanish:
  - verás
  - contemplarás
  - mirarás
  lexicon: HALOT
  rationale: En contexto, el verbo expresa que ya no se tendrá delante ni se enfrentará a ese pueblo. «Volverás a ver» reproduce con naturalidad el valor prospectivo-negativo de la cláusula inglesa y el sentido básico de ראה sin volverlo más interpretativo de lo necesario.
- source_word: עִמְקֵי שָׂפָה
  english_pob_choice: of speech too deep to understand
  chosen_spanish: de habla demasiado profunda para entender
  alternatives_spanish:
  - de habla profunda
  - de lenguaje incomprensible
  - de habla oscura
  lexicon: HALOT
  rationale: El hebreo dice literalmente «profundidades de labios»; se trata de un giro idiomático para habla ininteligible. «Habla demasiado profunda para entender» mantiene el tropo de profundidad y comunica el efecto funcional sin calcar de manera opaca.
- source_word: מִשְּׁמוֹעַ
  english_pob_choice: to understand
  chosen_spanish: para entender
  alternatives_spanish:
  - desde oír
  - a oír
  - de oír
  lexicon: HALOT
  rationale: Aunque literalmente significa «desde oír», aquí apunta a la incapacidad de captar el sentido de lo oído. «Para entender» transmite la función del giro en español, en línea con la decisión inglesa de priorizar inteligibilidad sobre literalidad mecánica.
- source_word: נִלְעַג לָשׁוֹן
  english_pob_choice: of a stammering tongue
  chosen_spanish: de lengua tartamuda
  alternatives_spanish:
  - de lengua burlona
  - de lengua extraña
  - de lengua bárbara
  lexicon: HALOT
  rationale: La expresión es difícil y probablemente alude a habla extranjera percibida como ininteligible. «Lengua tartamuda» sigue la lectura contextual adoptada por la POB inglesa; en español conserva la rareza sin convertirla en una descripción doctrinal o étnica más específica de lo que el texto exige.
- source_word: אֵין בִּינָה
  english_pob_choice: without comprehension
  chosen_spanish: sin comprensión
  alternatives_spanish:
  - sin entendimiento
  - sin inteligencia
  - que no comprende
  lexicon: HALOT
  rationale: La frase expresa ausencia de capacidad de comprender en relación con la lengua descrita. «Sin comprensión» es breve, formal y fiel al cierre del verso, manteniendo la misma fuerza que la revisión inglesa final.
- source_word: עַם ... עַם
  english_pob_choice: people ... a people
  chosen_spanish: pueblo ... pueblo
  alternatives_spanish:
  - nación ... nación
  - gente ... gente
  lexicon: HALOT
  rationale: La repetición se conserva para reflejar el énfasis hebreo. «Pueblo» resulta natural en español bíblico contemporáneo y evita la rigidez de «nación» en este contexto descriptivo.
translation_notes:
  revision_awareness: La redacción sigue el testimonio hebreo WLC y toma la solución inglesa revisada como guía para la última cláusula («without comprehension»), prefiriendo «sin comprensión» frente a formulaciones más explicativas. Se conserva la duplicación de עַם y el paralelismo entre la descripción de la gente y su habla.
  spanish_consistency_notes:
  - Se ha mantenido «pueblo» como equivalente de עַם para conservar el paralelismo.
  - '«Habla» y «lengua» se diferencian para reflejar el doble nivel del hebreo: el modo de hablar y el idioma/voz.'
  - No se introdujo «SEÑOR» ni terminología teológica adicional, porque el verso no contiene nombres divinos ni títulos mesiánicos.
