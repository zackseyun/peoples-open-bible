review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador conserva bien el sentido general del griego: ψυχή como «alma», διάβασις con la idea de cruce de ríos, σάλος como agitación marina, y πτοηθήσεται con fuerza más intensa que simple miedo. Sin embargo, «al cruzar ríos» cambia el sustantivo griego «en el cruce/paso de ríos» a una formulación verbal menos ceñida, y «ante el tumulto» no refleja tan directamente ἐν ... καὶ ... como dos ámbitos paralelos. Además, «será aterrada» suena poco natural en español.'
  spanish_quality_summary: El texto es comprensible, pero «no será aterrada» resulta forzado e impropio del español bíblico natural; «no se aterrorizará» o «no se espantará» serían más idiomáticos. «Tumulto de los mares» también suena menos marítimo que «agitación» u «oleaje». Conviene una leve revisión para mayor naturalidad sin perder fuerza poética.
  glossary_alignment: 'No hay conflictos con la terminología doctrinal del proyecto. «Alma» para ψυχή está bien justificado. La mejora principal es estilística y de ajuste semántico: preferir una expresión nominal para διάβασις y una imagen marítima más precisa para σάλος.'
  issues:
  - severity: medium
    issue: «no será aterrada» suena antinatural en español
    rationale: Aunque intenta reflejar el pasivo de πτοηθήσεται, en español esta formulación es torpe. «No se aterrorizará» conserva bien la intensidad y es mucho más idiomático.
  - severity: medium
    issue: «al cruzar ríos» debilita el valor nominal de διάβασις
    rationale: El griego habla de «el cruce/paso de ríos», no de la acción verbal del sujeto. «En el cruce de ríos» o «al paso de ríos» es más fiel y mantiene el paralelismo con la segunda frase.
  - severity: low
    issue: «tumulto de los mares» no es la opción más natural para σάλος
    rationale: σάλος describe agitación, oleaje, vaivén marino. «Agitación de los mares» suena más claro y más directamente marítimo que «tumulto».
