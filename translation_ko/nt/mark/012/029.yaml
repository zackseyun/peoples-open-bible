source:
  edition: SBLGNT
  text: ⸂ἀπεκρίθη ὁ Ἰησοῦς⸃ ὅτι Πρώτη ⸀ἐστίν· Ἄκουε, Ἰσραήλ, κύριος ὁ θεὸς ἡμῶν κύριος εἷς ἐστιν,
base_translation:
  language: en
  yaml_path: translation/nt/mark/012/029.yaml
  text: 'Jesus answered[a], “The first is: Hear, O Israel, the Lord our God[b], the Lord is one.'
  footnotes:
  - marker: a
    text: Or, “the Lord our God is one Lord,” or “the Lord is our God, the Lord alone.” The Greek echoes Deuteronomy 6:4 and may emphasize God's oneness and/or exclusivity.
    reason: alternative_reading
  - marker: b
    text: Because this line quotes the Shema (Deut 6:4), “Lord” here reflects the Greek κύριος used in the Septuagint for the divine name YHWH.
    reason: cross_reference
translation:
  language: ko
  text: 예수께서 대답하셨습니다. 「첫째는 이것입니다. 「이스라엘아, 들으라. 우리의 하나님 야훼는 한 분이신 야훼이시다.
  philosophy: optimal-equivalence
theological_decisions:
- issue: 12:29 신명기 6:4 인용에서 κύριος = יהוה
  chosen_reading: 야훼
  alternative_readings:
  - 주
  - 여호와
  rationale: 신명기 6:4 셰마(שְׁמַע יִשְׂרָאֵל יְהוָה אֱלֹהֵינוּ יְהוָה אֶחָד)의 LXX 인용이다. κύριος는 직접 יהוה를 번역하고 있으므로, 글로벌 정책에 따라 「야훼」로 옮긴다. 한국 전통의 「주」는 신명사방을 가린다.
  doctrine_reference: 'DOCTRINE.md: Glossary — κύριος (= YHWH) → 야훼'
