translation:
  language: es
  text: Será el más abatido[a] de los reinos, y no se enaltecerá[b] más sobre las naciones; y yo los disminuiré[c], para que no gobiernen sobre las naciones[d].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘entre los reinos’ para ‘de los reinos’. El hebreo marca a Egipto como el más abatido en comparación con los demás reinos.
    reason: lexical_alternative
  - marker: b
    text: O ‘ser levantado’ en vez de ‘enaltecerse’. La forma hebrea puede expresar elevación o autoexaltación; el contexto favorece la idea de orgullo político.
    reason: lexical_alternative
  - marker: c
    text: Literalmente, ‘los haré pocos’. El pronombre hebreo es plural y se refiere colectivamente al pueblo o poder de Egipto.
    reason: lexical_alternative
  - marker: d
    text: Literalmente, ‘entre las naciones’; se traduce ‘sobre las naciones’ porque ‘gobernar’ en español normalmente exige esa preposición para el objeto del dominio.
    reason: lexical_alternative
lexical_decisions:
- source_word: מִן הַמַּמְלָכוֹת
  english_pob_choice: of the kingdoms
  chosen_spanish: de los reinos
  alternatives_spanish:
  - entre los reinos
  - de entre los reinos
  lexicon: HALOT
  rationale: 'El מן comparativo/superlativo se expresa de forma natural en español con una construcción partitiva: ''de los reinos''. Mantiene la idea de inferioridad relativa sin forzar un calco.'
- source_word: תִּהְיֶה שְׁפָלָה
  english_pob_choice: it will be the lowliest
  chosen_spanish: será el más abatido
  alternatives_spanish:
  - será el más bajo
  - será el más humillado
  lexicon: HALOT
  rationale: שָׁפָל comunica bajeza, humillación y abatimiento. 'El más abatido' conserva el valor comparativo/superlativo y su tono de humillación, de modo más natural que una simple 'bajo'.
- source_word: וְלֹא תִתְנַשֵּׂא עוֹד
  english_pob_choice: and it will no longer exalt itself
  chosen_spanish: y no se enaltecerá más
  alternatives_spanish:
  - y ya no se elevará
  - y no volverá a exaltarse
  lexicon: HALOT
  rationale: La forma reflexiva de נשׂא aquí apunta a autoexaltación. 'No se enaltecerá más' conserva esa idea y suena idiomático en español bíblico contemporáneo.
- source_word: עַל הַגּוֹיִם
  english_pob_choice: above the nations
  chosen_spanish: sobre las naciones
  alternatives_spanish:
  - por encima de las naciones
  - entre las naciones
  lexicon: HALOT
  rationale: Con el verbo de exaltación, עַל expresa superioridad metafórica. 'Sobre las naciones' mantiene la imagen de preeminencia sin añadir interpretación innecesaria.
- source_word: וְהִמְעַטְתִּים
  english_pob_choice: and I will diminish them
  chosen_spanish: y yo lo disminuiré
  alternatives_spanish:
  - y yo los disminuiré
  - y yo los haré pocos
  lexicon: HALOT
  rationale: El verbo hiphil de מעט significa hacer pequeño o disminuir. Dado que el sujeto del pasaje es Egipto como entidad colectiva, el español puede concordar en singular con el reino/país, manteniendo la referencia colectiva implícita.
- source_word: לְבִלְתִּי רְדֹות
  english_pob_choice: so that they will not rule
  chosen_spanish: para que no gobiernen
  alternatives_spanish:
  - a fin de que no dominen
  - para impedir que gobiernen
  lexicon: HALOT
  rationale: רדה en este contexto es ejercer dominio político. 'Gobiernen' comunica ese sentido de forma clara en español, sin cargarlo de connotaciones eclesiásticas ajenas al texto.
- source_word: בַּגּוֹיִם
  english_pob_choice: over the nations
  chosen_spanish: sobre las naciones
  alternatives_spanish:
  - entre las naciones
  - en las naciones
  lexicon: HALOT
  rationale: Aunque la preposición hebrea puede ser locativa, con רדה el sentido es de dominio respecto de los pueblos. 'Sobre las naciones' reproduce mejor esa relación de gobierno.
theological_decisions:
- issue: Relación entre humillación nacional y pérdida de supremacía
  english_pob_reading: Egypt will be lowered and will no longer exalt itself or rule over the nations.
  chosen_spanish_reading: Egipto será abatido, dejará de enaltecerse y no gobernará sobre las naciones.
  alternative_spanish_readings:
  - Egipto será el más bajo de los reinos y no se alzará sobre las naciones
  - Egipto será humillado y no volverá a dominar a las naciones
  rationale: El texto une humillación, autoexaltación impedida y pérdida de dominio. La redacción española conserva esas tres capas sin suavizarlas ni convertirlas en una mera descripción moral.
  doctrine_reference: Juicio divino sobre las naciones en Ezequiel; soberanía de Dios sobre los reinos.
translation_notes:
  revision_awareness: La versión inglesa auditada pasó de 'make them few' a 'diminish them' para reflejar mejor el valor del verbo. La traducción española sigue ese ajuste con 'disminuiré', manteniendo además la posibilidad colectiva implícita del pronombre hebreo.
  spanish_consistency_notes:
  - Se prefirió ‘reinos’ para reflejar el marco político del pasaje y mantener coherencia con la comparación superlativa.
  - Se evitó ‘SEÑOR’ u otras sustituciones no presentes en el texto; aquí no aparece el tetragrámaton.
  - Se preservó la tensión entre singular colectivo y plural referencial con concordancia natural en español, sin borrar la referencia a Egipto como entidad nacional.
