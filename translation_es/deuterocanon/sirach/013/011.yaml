translation:
  language: es
  text: No confíes en su familiaridad contigo[a], ni creas en sus muchas palabras; porque con mucha charla te pondrá a prueba, y riéndose contigo te examinará.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «su libertad contigo», es decir, una confianza sin reservas o un modo de hablar libremente con él. El hebreo «libertad» y el paralelo griego apuntan en esta dirección.
    reason: lexical_alternative
lexical_decisions:
- source_word: אַל תִּבְטַח
  english_pob_choice: Do not trust
  chosen_spanish: No confíes
  alternatives_spanish:
  - No te fíes
  - No pongas tu confianza
  lexicon: HALOT
  rationale: La prohibición es directa; en español, «confiar» expresa bien la advertencia personal y conserva el valor de alerta relacional del hebreo.
- source_word: לְחֹפֶשׁ עִמּוֹ
  english_pob_choice: his ease with you
  chosen_spanish: su libertad contigo
  alternatives_spanish:
  - su familiaridad contigo
  - hablar libremente con él
  - su trato sin reservas contigo
  lexicon: HALOT
  rationale: El hebreo literalmente sugiere «libertad» y el paralelo griego apunta a la idea de hablar sin freno o con igualdad de trato. «Su libertad contigo» mantiene esa tensión semántica sin reducirla a una sola paráfrasis.
- source_word: וְאַל תַּאֲמִין
  english_pob_choice: and do not believe
  chosen_spanish: ni creas
  alternatives_spanish:
  - ni confíes
  - ni des crédito
  lexicon: HALOT
  rationale: Con el objeto «sus muchas palabras», «creer» es la opción más natural en español y conserva el paralelismo con la primera prohibición.
- source_word: לְרֹב שִׂיחוֹ
  english_pob_choice: his many words
  chosen_spanish: sus muchas palabras
  alternatives_spanish:
  - la abundancia de su hablar
  - su mucho hablar
  lexicon: HALOT
  rationale: La referencia es a la cantidad de discurso; «sus muchas palabras» sigue de cerca el hebreo y el griego πλείοσιν λόγοις.
- source_word: כִּי מַרְבִּית שִׂיחוֹ
  english_pob_choice: for with much talk
  chosen_spanish: porque con mucha charla
  alternatives_spanish:
  - porque con abundante habla
  - pues por su mucho hablar
  lexicon: HALOT
  rationale: La frase causal explica el motivo del consejo. «Mucha charla» comunica la abundancia de habla de manera idiomática y mantiene el matiz de discurso prolijo.
- source_word: נִסּיוֹן
  english_pob_choice: he is testing you
  chosen_spanish: te pondrá a prueba
  alternatives_spanish:
  - te probará
  - te tentará
  lexicon: HALOT
  rationale: El término admite la idea de prueba o examen. Dado el contexto interpersonal y el paralelo griego πειράσει σε, «poner a prueba» transmite con claridad la acción dirigida contra el interlocutor.
- source_word: וְשֹׂחֵק לְךָ
  english_pob_choice: while laughing with you
  chosen_spanish: y sonriéndote
  alternatives_spanish:
  - y riéndose contigo
  - y mientras se ríe contigo
  lexicon: HALOT
  rationale: El hebreo describe una aparente amabilidad. En español, «sonriéndote» recoge esa superficie amistosa sin volver la frase pesada; el griego προσγελῶν respalda un gesto de sonrisa o risa aparente.
- source_word: וַחֲקָרֶךָ
  english_pob_choice: he is probing you
  chosen_spanish: te examinará
  alternatives_spanish:
  - te investigará
  - te escrutará
  lexicon: HALOT
  rationale: La raíz connota buscar o examinar a fondo; el griego ἐξετάσει σε confirma la idea de escrutinio. «Examinará» es comprensible y mantiene la seriedad de la acción manipuladora.
translation_notes:
  revision_awareness: 'La redacción sigue el texto hebreo como fuente principal y toma el griego como control de coherencia: ambos enfatizan una libertad de trato o de palabra que no debe inspirar confianza, seguida de una advertencia contra el exceso de palabras, la prueba encubierta y la sonrisa fingida.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma general del proyecto, pero este versículo no contiene el nombre divino.
  - Se ha preferido un registro bíblico moderno y claro, evitando calcos excesivos.
  - El texto conserva la tensión semántica de לְחֹפֶשׁ עִמּוֹ mediante una nota, porque el español exige decidir entre libertad, familiaridad o hablar libremente.
