id: ISA.48.8
reference: Isaiah 48:8
source:
  edition: WLC
  text: גַּ֣ם לֹֽא שָׁמַ֗עְתָּ גַּ֚ם לֹ֣א יָדַ֔עְתָּ גַּ֕ם מֵ/אָ֖ז לֹא פִתְּחָ֣ה אָזְנֶ֑/ךָ כִּ֤י יָדַ֨עְתִּי֙ בָּג֣וֹד תִּבְגּ֔וֹד וּ/פֹשֵׁ֥עַ מִ/בֶּ֖טֶן קֹ֥רָא לָֽ/ךְ־־׃
translation:
  text: Indeed[a], you had not heard; indeed, you had not known; indeed, from of old your ear had not been opened. For I knew that you would surely deal treacherously[b], and that from the womb you would be called a transgressor.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'from birth.' The Hebrew literally says 'from the womb,' an idiom for the earliest stage of life.
    reason: lexical_alternative
  - marker: b
    text: Or 'a transgressor.' The Hebrew term denotes one who rebels or breaks faith.
    reason: lexical_alternative
lexical_decisions:
- source_word: גַּם
  chosen: indeed
  alternatives:
  - also
  - even
  lexicon: HALOT
  rationale: Repeated three times for emphatic accumulation. 'Indeed' captures the rhetorical force better than a flat 'also' in English.
- source_word: שָׁמַעְתָּ
  chosen: you had not heard
  alternatives:
  - you did not hear
  - you have not heard
  lexicon: HALOT
  rationale: Qal perfect 2ms with negation in prophetic retrospective context; pluperfect English fits the sequence of prior ignorance being described.
- source_word: יָדַעְתָּ
  chosen: you had not known
  alternatives:
  - you did not know
  - you have not known
  lexicon: HALOT
  rationale: Pairs with 'heard' and continues the retrospective description; 'known' preserves the cognitive sense of ידע.
- source_word: מֵאָז
  chosen: from long ago
  alternatives:
  - from then
  - from of old
  - from the beginning
  lexicon: HALOT
  rationale: In context it refers to a prior time stretching back, not merely a single point. 'From long ago' is idiomatic and preserves temporal depth.
- source_word: פִתְּחָה אָזְנֶךָ
  chosen: your ear had not been opened
  alternatives:
  - your ear was not opened
  - your ear had not opened
  lexicon: HALOT
  rationale: The Hebrew uses a feminine singular verb with 'ear' as subject. English naturally renders the idiom as a passive-like expression indicating lack of receptivity or disclosure.
- source_word: כִּי
  chosen: For
  alternatives:
  - because
  - surely
  lexicon: HALOT
  rationale: 'Introduces the reason for the preceding statements: God knew Israel''s character.'
- source_word: יָדַעְתִּי
  chosen: I knew
  alternatives:
  - I have known
  lexicon: HALOT
  rationale: Simple past best fits the explanatory clause in context.
- source_word: בָּגוֹד תִּבְגּוֹד
  chosen: you would surely deal treacherously
  alternatives:
  - you would surely betray
  - you would act very treacherously
  lexicon: HALOT
  rationale: Infinitive absolute plus imperfect intensifies the verbal idea. 'Surely deal treacherously' preserves both the lexical sense of בגד and the emphasis.
- source_word: וּפֹשֵׁעַ
  chosen: a rebel
  alternatives:
  - a transgressor
  - one who rebels
  lexicon: HALOT
  rationale: Substantival participle from פשע. 'Rebel' is concise and captures covenantal defiance better than the more abstract 'transgressor' in this context.
- source_word: מִבֶּטֶן
  chosen: from the womb
  alternatives:
  - from birth
  - from the belly
  lexicon: HALOT
  rationale: Standard idiom for earliest origin. 'From the womb' preserves the metaphorical vividness of the Hebrew.
- source_word: קֹרָא לָךְ
  chosen: you would be called
  alternatives:
  - one called you
  - it was called to you
  - you were named
  lexicon: HALOT
  rationale: The construction is idiomatic for designation or characterization. Given the lamed pronominal suffix, English passive 'you would be called' best conveys the sense of being designated by this label.
