    issue: «cómo ir» sobretraduce לָלֶכֶת
    rationale: El hebreo dice literalmente «saber ir / saber caminar hacia», no necesariamente «saber cómo ir». Aunque el inglés POB usó «how to go», en español «no sabe ir» suena más proverbial y más ceñido al original.
  - severity: medium
    issue: «a la ciudad» pierde la indefinición de אֶל עִיר
    rationale: El sustantivo hebreo aparece sin artículo y con fuerza genérica. En este proverbio, «a una ciudad» preserva mejor el sentido proverbial que «a la ciudad», que sugiere una ciudad conocida o específica.
  - severity: low
    issue: La nota al pie debe corresponder exactamente al texto principal revisado
    rationale: Si se revisa el texto principal, la nota debe actualizar tanto el anclaje como la formulación de la variante para mantener consistencia editorial.
