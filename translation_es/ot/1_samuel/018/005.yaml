  language: en
  yaml_path: translation/ot/1_samuel/018/005.yaml
  text: David went out wherever Saul sent him[a], and he acted wisely. So Saul appointed him over the men of war[b], and this was good in the eyes of all the people and also in the eyes of Saul’s servants.
  footnotes:
  - marker: a
    text: Or 'he prospered' / 'he had success' for 'he acted wisely' (Hebrew שׂכל in the Hiphil can carry both prudence and resulting success).
    reason: lexical_alternative
  - marker: b
    text: Or 'it pleased all the people and also Saul’s servants.' The Hebrew may refer either to David himself, to his appointment, or to the whole situation just described.
    reason: alternative_reading
