translation:
  language: es
  text: 'Porque cuando son abatidos[a], tú dices: «¡Levántalos!»; y él salva al de ojos abatidos[b].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Porque cuando son abatidos, tú dices: “Hay levantamiento”». La cláusula hebrea es elíptica y puede expresarse de manera más literal así.'
    reason: alternative_reading
  - marker: b
    text: Literalmente, «el abatido de ojos»; es decir, la persona humilde o desalentada.
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  english_pob_choice: For when
  chosen_spanish: Porque cuando
  alternatives_spanish:
  - Porque
  - Cuando
  - Pues cuando
  lexicon: HALOT
  rationale: El hebreo introduce la circunstancia o razón del dicho anterior; en español, «Porque cuando» conserva bien la relación causal-temporal que el audit trail inglés resolvió como «For when».
- source_word: הִשְׁפִּילוּ
  english_pob_choice: they are brought low
  chosen_spanish: son humillados
  alternatives_spanish:
  - son abatidos
  - son puestos abajo
  - se humillan
  lexicon: HALOT
  rationale: La forma plural describe un estado de ser rebajados o humillados; «son humillados» mantiene el pasivo/resultativo y evita leer un acto reflexivo que el hebreo no exige.
- source_word: וַתֹּאמֶר
  english_pob_choice: you say
  chosen_spanish: tú dices
  alternatives_spanish:
  - y dices
  - entonces dices
  - dirás
  lexicon: HALOT
  rationale: El hebreo se dirige al singular; «tú dices» conserva esa segunda persona y el tono proverbial o resultativo del contexto.
- source_word: גֵּוָה
  english_pob_choice: Lift them up!
  chosen_spanish: ¡Levántalos!
  alternatives_spanish:
  - ¡Alzamiento!
  - ¡Hay levantamiento!
  - ¡Ensánzalos!
  lexicon: HALOT
  rationale: La palabra es difícil y el contexto pide una reversión del abatimiento. «¡Levántalos!» sigue la interpretación de sentido del POB inglés y hace natural en español la declaración de elevación.
- source_word: וְשַׁח עֵינַיִם
  english_pob_choice: the one with downcast eyes
  chosen_spanish: el de ojos abatidos
  alternatives_spanish:
  - el de ojos bajos
  - el humilde
  - el de mirada humillada
  lexicon: HALOT
  rationale: La expresión es idiomática y literalmente «bajo de ojos»; «el de ojos abatidos» preserva la imagen visual y comunica la idea de humildad o desaliento sin borrar la tensión lexical.
- source_word: יוֹשִׁעַ
  english_pob_choice: he saves
  chosen_spanish: él salva
  alternatives_spanish:
  - él libra
  - él rescata
  - salva
  lexicon: HALOT
  rationale: El verbo es 3ms y el sujeto queda implícito en el contexto; en español, «él salva» mantiene la tersura del hebreo y deja al sujeto divino implícito, como en el POB inglés.
theological_decisions:
- issue: Sujeto implícito de יוֹשִׁעַ
  english_pob_reading: The subject is God ('he saves'), left implicit rather than expanded to 'God saves.'
  chosen_spanish_reading: El sujeto queda implícito en «él salva», entendido por el contexto como Dios.
  alternative_spanish_readings:
  - Dios salva
  - él libra
  - él rescata
  rationale: El hebreo usa un verbo masculino singular sin nombrar explícitamente al sujeto; mantener «él» conserva la concisión original y evita añadir un sustantivo que el texto no dice.
  doctrine_reference: Primacía del texto original; mantener la tensión y la elipsis del hebreo.
- issue: Sentido de גֵּוָה en la cláusula difícil
  english_pob_reading: 'Render as a declaration of uplift: ''Lift them up!'''
  chosen_spanish_reading: 'Traducir la palabra como una exclamación de elevación: «¡Levántalos!»'
  alternative_spanish_readings:
  - «Hay levantamiento»
  - «¡Exaltación!»
  - «Pride»/«orgullo» en sentido negativo
  rationale: La antítesis con «son humillados» favorece una reversión positiva. La solución española conserva la intención del POB inglés de hacer inteligible la cláusula elíptica sin borrar su dificultad.
  doctrine_reference: Equivalencia óptima; primacía del original sobre la tradición traductora.
translation_notes:
  revision_awareness: El texto sigue el pasaje con alta concordancia respecto al audit trail inglés y la revisión más reciente, sin cambios sustantivos; se resolvió la elipsis hebrea de גֵּוָה con una exclamación española natural y se mantuvo el sujeto divino implícito.
  spanish_consistency_notes:
  - Se usó «Dios» solo en la nota teológica, no en el texto principal, para respetar la elipsis del hebreo.
  - Se mantuvo la segunda persona singular («tú dices») conforme al vocativo del texto fuente.
  - Se preservó la imagen corporal de «ojos abatidos» para no aplanar la metáfora en una abstracción como «humilde» en el texto principal.
