translation:
  language: es
  text: Ahora bien, estos son los que proceden de Judea, los que subieron[a] del cautiverio del destierro, a quienes Nabucodonosor, rey de Babilonia, había llevado cautivos[b] a Babilonia.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El paralelo hebreo de Esdras 2:1 dice «los hijos de la provincia» en lugar de «los que proceden de Judea». Este borrador sigue el griego de 1 Esdras como fuente principal.
    reason: textual_variant
  - marker: b
    text: 'O: «a quienes Nabucodonosor, rey de Babilonia, había deportado a Babilonia».'
    reason: lexical_alternative
lexical_decisions:
- source_word: εἰσὶν δὲ οὗτοι
  english_pob_choice: Now these are
  chosen_spanish: Ahora bien, estos son
  alternatives_spanish:
  - Y estos son
  - Estos son
  lexicon: BDAG
  rationale: δὲ añade una transición suave; «Ahora bien» conserva el giro discursivo sin cargarlo de contraste fuerte. «Estos son» mantiene la presentación de la lista.
- source_word: οἱ ἐκ τῆς Ἰουδαίας
  english_pob_choice: the ones from Judea
  chosen_spanish: los que proceden de Judea
  alternatives_spanish:
  - los de Judea
  - los que son de Judea
  lexicon: BDAG
  rationale: La construcción con artículo y participio se vuelve natural en español como «los que proceden de». «Judea» corresponde directamente a Ἰουδαία, siguiendo el griego como fuente primaria.
- source_word: οἱ ἀναβάντες
  english_pob_choice: who came up
  chosen_spanish: los que subieron
  alternatives_spanish:
  - los que fueron subiendo
  - los que volvieron
  lexicon: BDAG
  rationale: ἀναβαίνω en contextos de retorno a la tierra se expresa bien con «subieron». En español conserva la imagen direccional tradicional sin forzar «regresaron», que no está explícito en el griego.
- source_word: ἐκ τῆς αἰχμαλωσίας τῆς παροικίας
  english_pob_choice: from the captivity of the exile
  chosen_spanish: de entre el cautiverio del destierro
  alternatives_spanish:
  - del cautiverio del exilio
  - de la cautividad del destierro
  lexicon: BDAG
  rationale: Se preserva el doble genitivo con una formulación española que suena natural y mantiene la densidad del griego. «Cautiverio» y «destierro» reflejan αἰχμαλωσία y παροικία sin aplanar la relación entre ambos términos.
- source_word: οὓς μετῴκισεν
  english_pob_choice: whom ... had carried away
  chosen_spanish: a quienes ... había llevado cautivos
  alternatives_spanish:
  - a quienes ... había deportado
  - a quienes ... había trasladado
  lexicon: BDAG
  rationale: μετοικίζω puede implicar traslado por deportación; «había llevado cautivos» conserva la fuerza del despojo y encaja con el contexto de Babilonia. Se evita «resettled» porque aquí el sentido es el de desplazamiento forzado.
- source_word: Ναβουχοδονοσὸρ
  english_pob_choice: Nebuchadnezzar
  chosen_spanish: Nabucodonosor
  alternatives_spanish:
  - Nabucodonosor
  - Nabucodonosor
  lexicon: LSJ
  rationale: Se adopta la forma española asentada del nombre propio, equivalente al transliterado inglés de la tradición bíblica, sin depender de una transliteración griega más literal.
- source_word: βασιλεὺς Βαβυλῶνος
  english_pob_choice: king of Babylon
  chosen_spanish: rey de Babilonia
  alternatives_spanish:
  - el rey de Babilonia
  lexicon: BDAG
  rationale: La expresión española directa y natural conserva la relación posesiva del griego sin añadir artículo innecesario.
- source_word: εἰς Βαβυλῶνα
  english_pob_choice: to Babylon
  chosen_spanish: a Babilonia
  alternatives_spanish:
  - hasta Babilonia
  - hacia Babilonia
  lexicon: BDAG
  rationale: «A Babilonia» expresa de modo claro la meta del traslado; «a» es más idiomático en español que «hacia» para un destino concreto.
theological_decisions:
- issue: Relación entre el griego de 1 Esdras y el paralelo hebreo de Esdras 2:1
  english_pob_reading: The Hebrew parallel in Ezra 2:1 reads 'the sons of the province' rather than 'the ones from Judea.' This draft follows the Greek text of 1 Esdras as the primary source.
  chosen_spanish_reading: El texto español sigue «los que proceden de Judea», conforme al griego de 1 Esdras, no la forma del paralelo hebreo «los hijos de la provincia».
  alternative_spanish_readings:
  - los hijos de la provincia
  - los de la provincia
  rationale: La decisión mantiene la prioridad del testigo griego indicado en el expediente y evita armonizar con el hebreo cuando éste difiere. La nota explica la variación textual sin ocultarla.
  doctrine_reference: Crítica textual / prioridad del testigo fuente
translation_notes:
  revision_awareness: Se siguió el testigo griego de Swete 1909 como ancla principal, con concordancia alta frente al paralelo hebreo. No se requirieron cambios por revisión posterior; la redacción mantiene la distinción textual ya documentada entre 1 Esdras y el paralelo de Esdras.
  spanish_consistency_notes:
  - Se mantiene «Judea» para Ἰουδαία, en línea con el texto griego primario.
  - Se usa «cautiverio» y «destierro» para preservar la doble referencia de αἰχμαλωσία / παροικία.
  - El nombre propio del rey babilonio se normaliza como «Nabucodonosor», forma estándar en español bíblico.
  - «Llevar cautivos» conserva la fuerza del desplazamiento forzado sin perder naturalidad en español.
  - La nota textual evita armonizar el pasaje con el paralelo hebreo y respeta la decisión de seguir 1 Esdras.
