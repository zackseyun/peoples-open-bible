theological_decisions:
- issue: Whether 'righteous' refers to truly righteous persons or is ironic/self-righteous
  chosen_reading: Retain the text's wording as 'righteous people' without making the irony explicit in translation.
  alternative_readings:
  - Render with scare quotes or paraphrase as 'those who think they are righteous'
  rationale: The Greek says 'righteous' and does not explicitly mark irony. The broader Lukan context may invite interpretive discussion, but the translation should preserve the textual tension rather than resolve it by paraphrase.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
- issue: Meaning of 'in heaven'
  chosen_reading: Translate locatively as 'in heaven' rather than specifying God or angels as the rejoicing subjects.
  alternative_readings:
  - '''before the angels of God'''
  - '''among the angels in heaven'''
  rationale: This verse states the location of joy, not explicitly the agents. Importing a specific subject would exceed the wording of the Greek, especially since v.10 uses different language when angels are mentioned.
  doctrine_reference: 'Translation philosophy §1 and §3: original-language primacy; preserve tension/ambiguity.'
