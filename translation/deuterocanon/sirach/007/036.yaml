translation:
  text: In all your words remember your end, and you will never sin.[a]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew witness (Kahana, Cairo Geniza composite) reads approximately, 'Do not turn your heart away from one who loves, for from him you will be loved.' The Hebrew here appears substantially different from the Greek tradition, so the main text follows the Greek parallel.
    reason: alternative_reading
lexical_decisions:
- source_word: ἐν πᾶσι τοῖς λόγοις σου
  chosen: In all your words
  alternatives:
  - In all your matters
  - In everything you say
  lexicon: LSJ
  rationale: The Hebrew witness is difficult and appears semantically divergent, while the Greek parallel gives a coherent admonition. λόγοι can mean words/speeches or matters; 'words' stays closer to the Greek while remaining natural English.
- source_word: μιμνήσκου
  chosen: remember
  alternatives:
  - be mindful of
  - keep in mind
  lexicon: BDAG
  rationale: An imperative of remembering; 'remember' is the most direct and idiomatic rendering.
- source_word: τὰ ἔσχατά σου
  chosen: your end
  alternatives:
  - your last things
  - your latter end
  - your final destiny
  lexicon: LSJ
  rationale: Literally 'your last things/end.' 'Your end' is concise and preserves the gravity and ambiguity of mortality/final outcome without importing later doctrinal specificity.
- source_word: καὶ εἰς τὸν αἰῶνα
  chosen: never
  alternatives:
  - forever
  - for eternity
  lexicon: LSJ
  rationale: In this idiom with a negated future verb, the sense is effectively 'never.' This is a natural optimal-equivalence rendering.
- source_word: οὐχ ἁμαρτήσεις
  chosen: you will never sin
  alternatives:
  - you will not sin
  - you will never go wrong
  lexicon: BDAG
  rationale: ἁμαρτάνω is the standard verb 'to sin.' The future after the imperative expresses the result of heeding the instruction.
- source_word: אַל תִּשָּׂא לֵב מֵאוֹהֵב, כִּי מִמֶּנוּ תֵּאָהֵב
  chosen: treated as a corrupt or substantially variant Hebrew witness; not followed in the main text
  alternatives:
  - Do not lift up your heart from one who loves, for from him you will be loved
  - Do not turn your heart away from a friend/lover, for by him you will be loved
  lexicon: HALOT
  rationale: The extant Hebrew as given in Kahana does not align with the Greek and yields a difficult sense. Because the Greek parallel is coherent and the Hebrew wording may reflect corruption or a different recension, the main translation follows the Greek while preserving the Hebrew-based alternative in a footnote.
