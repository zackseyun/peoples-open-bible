translation:
  language: es
  text: 'Y dijo: «Clamé a Yahvé desde mi angustia, y él me respondió. Desde el vientre[a] de Sheol[b] clamé; tú oíste mi voz».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Desde la matriz de Sheol». El término hebreo puede significar «vientre» o «matriz».'
    reason: lexical_alternative
  - marker: b
    text: Sheol es el término hebreo para el ámbito de los muertos; alternativamente, «el sepulcro» en una traducción más interpretativa.
    reason: alternative_reading
lexical_decisions:
- source_word: וַיֹּאמֶר
  english_pob_choice: And he said
  chosen_spanish: Y dijo
  alternatives_spanish:
  - Entonces dijo
  - Y él dijo
  lexicon: HALOT
  rationale: La forma narrativa wayyiqtol introduce el discurso de Jonás; «Y dijo» conserva el enlace discursivo hebreo sin añadir una secuencia temporal más fuerte de la que exige el texto.
- source_word: קָרָאתִי
  english_pob_choice: I called
  chosen_spanish: Clamé
  alternatives_spanish:
  - Llamé
  - Grité
  lexicon: HALOT
  rationale: En este contexto oracional, קרא expresa una invocación intensa. «Clamé» comunica mejor el matiz de llamado urgente a Dios que un simple «llamé», sin exceder el sentido del hebreo.
- source_word: מִצָּרָה לִי
  english_pob_choice: out of my distress
  chosen_spanish: desde mi angustia
  alternatives_spanish:
  - desde mi aflicción
  - desde mi aflicción y angustia
  - de mi angustia
  lexicon: HALOT
  rationale: צָרָה denota angustia, aflicción o estrechez. «Desde mi angustia» es natural en español y conserva el origen de la súplica sin añadir elementos no presentes en el hebreo.
- source_word: אֶל יְהוָה
  english_pob_choice: to Yahweh
  chosen_spanish: a Yahvé
  alternatives_spanish:
  - a Yahvé Dios
  - al SEÑOR
  lexicon: 'DOCTRINE.md contested terms: יהוה YHWH'
  rationale: El Tetragrámaton se vierte según la norma del proyecto como «Yahvé», manteniendo el nombre propio divino de forma transparente en español.
- source_word: וַיַּעֲנֵנִי
  english_pob_choice: and he answered me
  chosen_spanish: y él me respondió
  alternatives_spanish:
  - y me respondió
  - y me contestó
  lexicon: HALOT
  rationale: ענה aquí es la respuesta divina a la oración. «Me respondió» reproduce con claridad el sufijo pronominal y el paralelismo con la invocación previa.
- source_word: מִבֶּטֶן שְׁאוֹל
  english_pob_choice: From the belly of Sheol
  chosen_spanish: Desde el vientre de Sheol
  alternatives_spanish:
  - Desde el vientre de la muerte
  - Desde el vientre del Seol
  - Desde las entrañas de Sheol
  lexicon: HALOT
  rationale: בֶּטֶן puede significar «vientre» o «vientre/útero»; se mantiene la imagen corporal por su fuerza poética y por la cercanía con el lenguaje de Jonás. Se conserva «Sheol» para no resolver prematuramente el término hebreo con equivalentes interpretativos como «sepulcro» o «infierno».
- source_word: שִׁוַּעְתִּי
  english_pob_choice: I cried out
  chosen_spanish: clamé
  alternatives_spanish:
  - grité
  - pedí auxilio
  - clamé por ayuda
  lexicon: HALOT
  rationale: El verbo expresa un clamor vehemente. En español, «clamé» mantiene la intensidad sin añadir la frase explicativa «por ayuda», que el hebreo no exige explícitamente.
- source_word: שָׁמַעְתָּ קוֹלִי
  english_pob_choice: you heard my voice
  chosen_spanish: tú oíste mi voz
  alternatives_spanish:
  - tú escuchaste mi voz
  - oyeron mi voz
  lexicon: HALOT
  rationale: Se conserva la segunda persona del discurso directo. «Oíste mi voz» es una forma sobria y fiel; «escuchaste» también sería posible, pero «oíste» corresponde mejor al paralelismo bíblico y al registro del pasaje.
theological_decisions:
- issue: Traducción del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Jehová
  rationale: Se sigue la convención del proyecto para el nombre del pacto, preservando la forma auditiva y evitando la sustitución por un título genérico.
  doctrine_reference: 'DOCTRINE.md Contested terms: יהוה YHWH'
- issue: Tratamiento de שְׁאוֹל
  english_pob_reading: Sheol
  chosen_spanish_reading: Sheol
  alternative_spanish_readings:
  - sepulcro
  - infierno
  - la muerte
  - el reino de los muertos
  rationale: Se mantiene la transliteración para respetar la tensión léxica del hebreo y no importar una identificación teológica posterior. El contexto poético queda abierto al ámbito de los muertos sin cerrarlo a una sola noción doctrinal.
  doctrine_reference: 'DOCTRINE.md Translation philosophy §3: Preserve theological tension rather than resolve it'
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión más reciente del audit trail inglés, que ajustó «cried for help» a «cried out» para reflejar más directamente el verbo hebreo sin expansión interpretativa. La versión española evita igualmente añadir «por ayuda» y usa un verbo de clamor breve y directo.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como forma española estándar del proyecto para יְהוָה.
  - «Sheol» se conserva transliterado para no desactivar la ambigüedad conceptual del término hebreo.
  - La puntuación y las comillas siguen el uso editorial español, con el discurso directo claramente marcado.
  - «Vientre» reproduce la imagen corporal del hebreo sin convertirla en explicación.
