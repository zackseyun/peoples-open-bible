translation:
  language: es
  text: La calamidad de Moab está cerca de venir[a], y su calamidad[b] se apresura mucho.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «La calamidad de Moab está cerca; su calamidad se apresura mucho».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «suya». El sufijo hebreo es masculino singular y se refiere a Moab personificado como nación.'
    reason: lexical_alternative
lexical_decisions:
- source_word: קָרוֹב
  english_pob_choice: is near
  chosen_spanish: está cerca
  alternatives_spanish:
  - se acerca
  - está próxima
  lexicon: HALOT
  rationale: El adjetivo predicativo expresa inminencia; en español, «está cerca» conserva bien ese valor sin volver la frase innecesariamente rígida.
- source_word: אֵיד
  english_pob_choice: disaster
  chosen_spanish: calamidad
  alternatives_spanish:
  - desastre
  - ruina
  lexicon: HALOT
  rationale: El término apunta a una desgracia destructiva, no a mal moral. «Calamidad» comunica el peso profético y funciona bien con el paralelismo de la segunda cola.
- source_word: מוֹאָב
  english_pob_choice: Moab
  chosen_spanish: Moab
  lexicon: transliteration
  rationale: Se conserva el nombre propio de la nación sin adaptación.
- source_word: לָבוֹא
  english_pob_choice: to come
  chosen_spanish: venir
  alternatives_spanish:
  - llegar
  - presentarse
  lexicon: HALOT
  rationale: El infinitivo con ל expresa lo que está por ocurrir. «Venir» mantiene la idea de inminencia de manera natural en español.
- source_word: רָעָתוֹ
  english_pob_choice: his calamity
  chosen_spanish: su desastre
  alternatives_spanish:
  - su calamidad
  - su ruina
  - su mal
  lexicon: HALOT
  rationale: Aquí רעה denota desgracia o infortunio, no maldad ética. El sufijo masculino singular se puede reflejar con «su», manteniendo la personificación de Moab como nación.
- source_word: מִהֲרָה
  english_pob_choice: is hurrying
  chosen_spanish: se apresura
  alternatives_spanish:
  - se da prisa
  - corre
  lexicon: HALOT
  rationale: El verbo expresa rapidez o prisa. «Se apresura» conserva la fuerza verbal y suena más natural que una construcción demasiado literal.
- source_word: מְאֹד
  english_pob_choice: very quickly
  chosen_spanish: muy rápidamente
  alternatives_spanish:
  - con gran rapidez
  - muy deprisa
  lexicon: HALOT
  rationale: El intensificador se une naturalmente al adverbio de modo. «Muy rápidamente» preserva la intensidad enfática del hebreo.
translation_notes:
  revision_awareness: El texto base en inglés ya fue revisado sin cambios sustantivos y presenta moderada coincidencia con el control cruzado. En español, la principal decisión fue hacer explícita la lectura de calamidad/desastre sin introducir una ambigüedad moral en רעה.
  spanish_consistency_notes:
  - Se mantiene «Moab» como nombre propio sin artículos añadidos.
  - Se evita «SEÑOR» u այլ masking conventions porque no aparece el tetragrámaton en este versículo.
  - La cola final conserva la paralelismo y la intensificación del original hebreo sin ampliar el sentido.
