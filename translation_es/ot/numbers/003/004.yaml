translation:
  language: es
  text: Pero Nadab y Abiú murieron delante de Yahvé cuando ofrecieron fuego extraño delante de Yahvé en el desierto de Sinaí[a], y no tuvieron hijos varones[b]; y Eleazar e Itamar ejercieron el sacerdocio en presencia de Aarón su padre.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «fuego ajeno». El hebreo probablemente se refiere a fuego que no estaba autorizado para la ofrenda.
    reason: lexical_alternative
  - marker: b
    text: El hebreo dice específicamente «hijos varones». La expresión final también puede sugerir que Eleazar e Itamar sirvieron durante la vida de Aarón.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּמָת
  english_pob_choice: died
  chosen_spanish: murieron
  alternatives_spanish:
  - murieron
  - fallecieron
  lexicon: HALOT
  rationale: 'El verbo narrativo de מות se vierte naturalmente en pasado simple plural en español porque el sujeto es doble: Nadab y Abiú. ''Murieron'' conserva la fuerza directa del hecho sin añadir matiz no presente en el hebreo.'
- source_word: לִפְנֵי יְהוָה
  english_pob_choice: before Yahweh
  chosen_spanish: delante de Yahvé
  alternatives_spanish:
  - en presencia de Yahvé
  - ante Yahvé
  lexicon: HALOT
  rationale: Se mantiene la imagen relacional de estar 'delante de' la presencia divina. 'Delante de Yahvé' es claro en español y respeta la forma hebrea sin sustituir el nombre propio por una titulación.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  - Jehová
  lexicon: HALOT
  rationale: 'Se sigue la norma del proyecto para el Tetragrámaton: ''Yahvé''. Esto preserva el nombre propio del pacto y evita la sustitución por ''Señor''.'
- source_word: בְּהַקְרִבָם
  english_pob_choice: when they offered
  chosen_spanish: cuando ofrecieron
  alternatives_spanish:
  - cuando presentaron
  - al ofrecer
  lexicon: HALOT
  rationale: El infinitivo constructo con ב expresa circunstancia temporal. 'Cuando ofrecieron' comunica con naturalidad el momento del acto sacrificial.
- source_word: אֵשׁ זָרָה
  english_pob_choice: strange fire
  chosen_spanish: fuego extraño
  alternatives_spanish:
  - fuego extraño
  - fuego ajeno
  - fuego no autorizado
  lexicon: HALOT
  rationale: La POB inglesa terminó en 'strange fire' para acercarse más al léxico del hebreo. En español, 'fuego extraño' conserva esa correspondencia formal y la tensión semántica; 'no autorizado' explicaría, pero ya interpreta más de lo que el sintagma por sí solo dice.
- source_word: בְּמִדְבַּר סִינַי
  english_pob_choice: in the wilderness of Sinai
  chosen_spanish: en el desierto de Sinaí
  alternatives_spanish:
  - en el desierto de Sinaí
  - en el desierto del Sinaí
  lexicon: HALOT
  rationale: '''Desierto de Sinaí'' es una equivalencia natural y transparente para el topónimo compuesto, sin alterar la referencia geográfica.'
- source_word: וּבָנִים לֹא הָיוּ לָהֶם
  english_pob_choice: and they had no sons
  chosen_spanish: y no tuvieron hijos
  alternatives_spanish:
  - y no tuvieron hijos
  - y no tuvieron hijos varones
  - y no tuvieron hijos / y no tuvieron hijos varones
  lexicon: HALOT
  rationale: Aunque בָּנִים significa literalmente 'hijos/varones' y el contexto de sucesión sacerdotal favorece 'hijos varones', en español 'no tuvieron hijos' suena más natural y, en este contexto, sigue implicando ausencia de descendencia para la línea sacerdotal. Se conserva la posibilidad de tensión en la nota.
- source_word: וַיְכַהֵן
  english_pob_choice: served as priests
  chosen_spanish: ejercieron el sacerdocio
  alternatives_spanish:
  - sirvieron como sacerdotes
  - ejercieron el sacerdocio
  - oficiaron como sacerdotes
  lexicon: HALOT
  rationale: כהן denota función sacerdotal. 'Ejercieron el sacerdocio' conserva la categoría verbal de oficio y es idiomático en español bíblico moderno sin caer en rigidez litúrgica innecesaria.
- source_word: עַל פְּנֵי אַהֲרֹן אֲבִיהֶם
  english_pob_choice: in the presence of Aaron their father
  chosen_spanish: en presencia de Aarón su padre
  alternatives_spanish:
  - delante de Aarón su padre
  - durante la vida de Aarón su padre
  - bajo la supervisión de Aarón su padre
  lexicon: HALOT
  rationale: 'Se conserva la ambigüedad del hebreo: puede indicar ''ante/en presencia de'' y también sugerir contemporaneidad con Aarón vivo. ''En presencia de'' mantiene ambas posibilidades sin forzar la relación a una sola lectura.'
theological_decisions:
- issue: Tetragrámaton y nombre divino
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - Jehová
  rationale: Se adopta la política terminológica del proyecto para יְהוָה. No se sustituye por 'Señor' porque la tarea pide traducir de forma auditable el nombre propio, no enmascararlo litúrgicamente.
  doctrine_reference: 'DOCTRINE.md Contested terms: יהוה YHWH'
- issue: Relación de 'en presencia de Aarón su padre'
  english_pob_reading: in the presence of Aaron their father
  chosen_spanish_reading: en presencia de Aarón su padre
  alternative_spanish_readings:
  - delante de Aarón su padre
  - durante la vida de Aarón su padre
  rationale: El hebreo עַל־פְּנֵי puede expresar localización ('delante de') y, por extensión, contemporaneidad. La redacción española evita decidir de antemano entre presencia espacial y duración temporal, conservando la tensión textual documentada.
  doctrine_reference: HALOT, entry for עַל־פְּנֵי; English POB lexical note on possible lifetime sense
- issue: Ausencia de hijos / hijos varones
  english_pob_reading: they had no sons
  chosen_spanish_reading: no tuvieron hijos
  alternative_spanish_readings:
  - no tuvieron hijos varones
  - no tuvieron descendencia
  rationale: En el contexto de sucesión sacerdotal, 'sons' apunta a la continuidad genealógica requerida. 'Hijos' es una formulación más natural en español y mantiene el dato esencial; la nota preserva la alternativa más precisa si se quiere explicitar el matiz masculino.
  doctrine_reference: HALOT, בָּנִים; context of priestly succession in Numbers
translation_notes:
  revision_awareness: La revisión inglesa más reciente volvió de 'unauthorized fire' a 'strange fire' para acercarse más al léxico del hebreo, y mantuvo sin cambios la cláusula sobre la presencia de Aarón. Esta versión española refleja esa preferencia formal con 'fuego extraño' y conserva la ambigüedad de עַל־פְּנֵי mediante 'en presencia de'.
  spanish_consistency_notes:
  - Se usa 'Yahvé' de forma consistente para יְהוָה, conforme al criterio del proyecto.
  - '''Fuego extraño'' preserva la correspondencia lexical con el hebreo y evita una explicación interpretativa en el texto principal.'
  - '''En presencia de'' mantiene la ambigüedad hebrea entre localización y posible contemporaneidad.'
  - '''No tuvieron hijos'' es una solución natural en español, con nota para el matiz de בָּנִים en este contexto sacerdotal.'
