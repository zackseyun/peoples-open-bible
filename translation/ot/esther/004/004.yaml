id: EST.4.4
reference: Esther 4:4
source:
  edition: WLC
  text: וַ֠/תָּבוֹאינָה נַעֲר֨וֹת אֶסְתֵּ֤ר וְ/סָרִיסֶ֨י/הָ֙ וַ/יַּגִּ֣ידוּ לָ֔/הּ וַ/תִּתְחַלְחַ֥ל הַ/מַּלְכָּ֖ה מְאֹ֑ד וַ/תִּשְׁלַ֨ח בְּגָדִ֜ים לְ/הַלְבִּ֣ישׁ אֶֽת מָרְדֳּכַ֗י וּ/לְ/הָסִ֥יר שַׂקּ֛/וֹ מֵ/עָלָ֖י/ו וְ/לֹ֥א קִבֵּֽל־׃
translation:
  text: Esther’s young women and her eunuchs came and told her[a], and the queen was greatly distressed. She sent garments to clothe Mordecai and to remove his sackcloth from him[c][b], but he did not accept them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'female attendants' for 'young women.'
    reason: lexical_alternative
  - marker: b
    text: '''Eunuchs'' can in some contexts mean royal court officials, but in Esther’s palace setting the more specific sense is likely.'
    reason: cultural_note
  - marker: c
    text: Sackcloth was a coarse garment worn as a sign of mourning, grief, or humiliation.
    reason: cultural_note
lexical_decisions:
- source_word: נַעֲר֨וֹת
  chosen: young women
  alternatives:
  - female attendants
  - maids
  lexicon: HALOT
  rationale: The term refers to Esther’s female attendants in the royal setting. 'Young women' is a transparent rendering of the Hebrew while remaining natural English; 'maids' is archaic, and 'female attendants' is possible but less direct.
- source_word: וְסָרִיסֶיהָ
  chosen: and her eunuchs
  alternatives:
  - and her officials
  - and her court officers
  lexicon: HALOT
  rationale: סָרִיס commonly denotes eunuchs in royal courts, though in some contexts it can broaden to court officials. In Esther’s Persian court context, 'eunuchs' is the most textually grounded and historically fitting rendering.
- source_word: וַיַּגִּידוּ לָהּ
  chosen: came and told her
  alternatives:
  - reported it to her
  - informed her
  lexicon: HALOT
  rationale: The sequence includes both coming and reporting. 'Came and told her' preserves the narrative movement and remains idiomatic.
- source_word: וַתִּתְחַלְחַל
  chosen: was greatly distressed
  alternatives:
  - was deeply shaken
  - trembled greatly
  lexicon: HALOT
  rationale: The verb conveys intense agitation or trembling. In context, Esther’s emotional turmoil at Mordecai’s condition is best expressed as 'was greatly distressed,' which captures the sense without sounding overly physical in English.
- source_word: הַמַּלְכָּה
  chosen: the queen
  lexicon: HALOT
  rationale: Definite title referring to Esther in her royal role; straightforwardly rendered 'the queen.'
- source_word: בְּגָדִים
  chosen: garments
  alternatives:
  - clothes
  - clothing
  lexicon: HALOT
  rationale: '''Garments'' fits the formal courtly context and avoids sounding too casual, while still being clear modern English.'
- source_word: לְהַלְבִּישׁ אֶת מָרְדֳּכַי
  chosen: to clothe Mordecai
  alternatives:
  - to dress Mordecai
  lexicon: HALOT
  rationale: This infinitive expresses purpose. 'To clothe Mordecai' is a natural and fairly formal rendering that preserves the action clearly.
- source_word: וּלְהָסִיר שַׂקּוֹ מֵעָלָיו
  chosen: and remove his sackcloth from him
  alternatives:
  - and take his sackcloth off him
  lexicon: HALOT
  rationale: This preserves both the concrete action and the mourning symbolism of sackcloth. 'Remove his sackcloth from him' is slightly formal but clear and close to the Hebrew.
- source_word: שַׂקּוֹ
  chosen: his sackcloth
  alternatives:
  - his mourning clothes
  lexicon: HALOT
  rationale: '''Sackcloth'' is the standard and precise term for the mourning garment indicated by שַׂק. Although some readers may need context, replacing it with ''mourning clothes'' would lose the specific cultural marker.'
- source_word: וְלֹא קִבֵּל
  chosen: but he did not accept them
  alternatives:
  - but he would not accept them
  - but he did not receive them
  lexicon: HALOT
  rationale: The Hebrew singular verb with unstated object implies refusal of the garments sent. English supplies 'them' for clarity. 'Did not accept' communicates refusal more naturally than 'did not receive.'
