revisions:
- from: También extiende tu mano al pobre[a], para que tu bendición se complete.
  to: También tiende tu mano al pobre[a], para que tu bendición llegue a plenitud.
  rationale: Se propone una revisión menor para mejorar la naturalidad del español sin apartarse del hebreo ni de las decisiones documentadas del POB. «Tiende tu mano» conserva la imagen de ayuda generosa, y «llegue a plenitud» expresa mejor en español la idea de completitud de תִּשְׁלַם. La nota al pie se mantiene, con una leve mejora idiomática.
