revisions:
- from: Tú eras un querubín ungido[a], y yo te puse sobre el santo monte de Dios[b]; andabas en medio de piedras de fuego.
  to: Tú eras un querubín ungido, protector[a], y yo te puse sobre el santo monte de Dios[b]; andabas en medio de piedras de fuego.
  rationale: Se añade 'protector' al texto principal para representar הַסּוֹכֵךְ, en línea con el sentido funcional adoptado por el inglés POB ('guardian') y con español natural y eclesialmente legible. La nota [a] se ajusta para preservar la alternativa más literal 'que cubre' y formas tradicionales relacionadas, sin dejar el contenido principal incompleto.
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T22:35:04Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español transmite en general el sentido del hebreo y sigue bien el audit trail inglés: querubín, ungido, el monte santo de Dios y las piedras de fuego están bien preservados, y la nota sobre la irregularidad femenina inicial también está bien representada. Sin embargo, omite en el texto principal el componente de הַסּוֹכֵךְ, que el inglés sí incorporó como ''guardian'' con nota alternativa para ''that covers''. En español, dejar solo ''querubín ungido'' pierde una pieza significativa de la descripción fuente.'
  spanish_quality_summary: 'El español es claro y digno, pero la nota [a] está invertida respecto del texto principal: el texto no incluye la idea de cubrir/proteger, mientras la nota la presenta como alternativa. Además, ''tradicionalmente «querubín protector»'' no refleja bien la nota inglesa, que apunta a ''querubín que cubre'' / ''querubín protector'' como tradición de cobertura, no simplemente a ''protector'' como forma principal. Una reparación pequeña en el texto principal resuelve tanto fidelidad como coherencia de nota.'
  glossary_alignment: No hay conflicto con la terminología global del proyecto. 'Dios', 'querubín' y el resto del registro están bien. La decisión clave aquí es mantener explícito el valor de הַסּוֹכֵךְ en español; 'protector' funciona bien como equivalente claro del inglés 'guardian', con nota que preserve la alternativa más literal 'que cubre'.
  issues:
  - severity: high
    issue: Falta en el texto principal el equivalente de הַסּוֹכֵךְ.
    rationale: El hebreo describe al querubín no solo como ungido sino también como 'el que cubre/protege'. El inglés POB lo hizo explícito con 'guardian'. El español actual 'un querubín ungido' omite ese elemento semántico.
  - severity: medium
    issue: La nota [a] no corresponde a una alternativa del texto principal actual.
    rationale: 'Si el texto principal dice solo ''querubín ungido'', la nota ''O: «querubín que cubre»...'' introduce contenido ausente más que una alternativa puntual al texto traducido. Al incorporar ''protector'' en el texto, la nota vuelve a funcionar correctamente como alternativa lexical.'
  revised_spanish_text: Tú eras un querubín ungido, protector[a], y yo te puse sobre el santo monte de Dios[b]; andabas en medio de piedras de fuego.
  revised_footnotes:
  - marker: a
    text: 'O: «querubín ungido que cubre», tradicionalmente «querubín ungido protector» o «querubín ungido cobertor».'
    reason: lexical_alternative
  - marker: b
    text: El hebreo empieza con una forma femenina de «tú», mientras que los verbos y sufijos circundantes son masculinos; el sentido sigue siendo singular.
    reason: textual_variant
  revision_rationale: Se añade 'protector' al texto principal para representar הַסּוֹכֵךְ, en línea con el sentido funcional adoptado por el inglés POB ('guardian') y con español natural y eclesialmente legible. La nota [a] se ajusta para preservar la alternativa más literal 'que cubre' y formas tradicionales relacionadas, sin dejar el contenido principal incompleto.
