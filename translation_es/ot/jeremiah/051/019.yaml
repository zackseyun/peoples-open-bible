base_translation:
  language: en
  yaml_path: translation/ot/jeremiah/051/019.yaml
  text: Not like these is the Portion of Jacob[a], for he is the one who formed everything, and the tribe of his inheritance is Israel[c][b]; Yahweh of Armies is his name.
  footnotes:
  - marker: a
    text: Or, 'Jacob’s portion.' The Hebrew may mean either that the LORD is Jacob’s allotted share or, less likely in context, that Jacob possesses this portion.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'and the tribe of his inheritance.' The referent is Jacob/Israel as the people belonging to the LORD; some translations supply 'Israel' from the parallel in Jeremiah 10:16 for clarity.
    reason: alternative_reading
  - marker: c
    text: 'Traditional rendering: ''the LORD of hosts.'''
    reason: lexical_alternative
