translation:
  language: es
  text: ¿No son pocos mis días? Entonces cesa y déjame en paz[a], para que recobre un poco de ánimo[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «apártate de mí» / «retírate de mí». La expresión hebrea con «cesa» y «aparta de mí» es idiomática y condensada.
    reason: alternative_reading
  - marker: b
    text: O «para que tenga un poco de alivio» o «para que me recupere un poco». El verbo sugiere un breve alivio o reanimación del espíritu.
    reason: lexical_alternative
lexical_decisions:
- source_word: הֲלֹא
  english_pob_choice: Are not
  chosen_spanish: ¿No son
  alternatives_spanish:
  - ¿Acaso no son
  - ¿No es que son
  lexicon: HALOT
  rationale: La partícula interrogativa negativa introduce una pregunta retórica que espera asentimiento. «¿No son» conserva ese valor de manera natural en español.
- source_word: מְעַט
  english_pob_choice: few
  chosen_spanish: pocos
  alternatives_spanish:
  - breves
  - pocas
  lexicon: HALOT
  rationale: Con «días» en plural, el adjetivo expresa cantidad escasa; «pocos» refleja mejor la idea de número que «breves» en este contexto.
- source_word: יָמַי
  english_pob_choice: my days
  chosen_spanish: mis días
  alternatives_spanish:
  - los días de mi vida
  lexicon: HALOT
  rationale: Es la correspondencia directa del poseedor de primera persona. En contexto alude a la duración restante de su vida, pero no conviene expandirlo en el texto principal.
- source_word: יחדל
  english_pob_choice: cease
  chosen_spanish: cesa
  alternatives_spanish:
  - deja de
  - termina
  lexicon: HALOT
  rationale: El verbo pide una idea de detenerse o desistir. «Cesa» preserva la fuerza verbal previa a la acción siguiente, como en el audit trail inglés.
- source_word: ישית ממני
  english_pob_choice: leave me alone
  chosen_spanish: aléjate de mí
  alternatives_spanish:
  - apártate de mí
  - retírate de mí
  - déjame en paz
  lexicon: HALOT
  rationale: La construcción hebrea es idiomática y comprimida. El POB inglés la vierte como una petición de apartamiento; en español, «aléjate de mí» comunica con naturalidad ese desistir/retirarse, sin borrar la tensión del hebreo. La alternativa más literal queda en nota.
- source_word: וְאַבְלִיגָה
  english_pob_choice: so that I may brighten up
  chosen_spanish: para que me anime
  alternatives_spanish:
  - para que recobre aliento
  - para que recupere un poco de ánimo
  - para que me alegre un poco
  lexicon: HALOT
  rationale: El verbo בלג apunta a un alivio breve del ánimo, un recuperar compostura o frescura interior. «Me anime» mantiene la idea de reavivamiento emocional sin convertirla en mera alegría superficial.
- source_word: מְעָט
  english_pob_choice: a little
  chosen_spanish: un poco
  alternatives_spanish:
  - por un momento
  - un poco de alivio
  - algo
  lexicon: HALOT
  rationale: Funciona adverbialmente, indicando pequeña medida o breve duración. «Un poco» es la forma más clara y directa en español.
translation_notes:
  revision_awareness: La versión española sigue la revisión más reciente del audit trail inglés, que añadió «cease/cesa» para reflejar el verbo previo antes de «leave me alone/aléjate de mí», y conserva el sentido natural y fiel de la petición en dos movimientos.
  spanish_consistency_notes:
  - Se mantiene «Dios/Yahvé» sin necesidad de explicitación porque este versículo no lo nombra directamente.
  - Se evita traducir mecánicamente como calco duro; la cláusula final se formula con una construcción natural en español que conserva la misma tensión semántica del hebreo.
  - «Mis días» se conserva sin expansión interpretativa en el cuerpo del verso; la referencia a la vida restante queda implícita como en el original.
