translation:
  language: es
  text: 'Y dijo Salomón: «Tú has mostrado gran fidelidad del pacto[a] a tu siervo David, mi padre, porque él anduvo delante de ti en fidelidad[b], en justicia y en rectitud de corazón contigo; y le has conservado esta gran fidelidad del pacto, y le has dado un hijo sentado en su trono[c], como sucede hasta hoy».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'También: «amor leal» o «amor fiel» para «fidelidad del pacto».'
    reason: lexical_alternative
  - marker: b
    text: También puede entenderse como «en verdad», «con integridad» o «fielmente».
    reason: lexical_alternative
  - marker: c
    text: 'Hebraísmo: «como este día»; indica que la situación presente confirma visiblemente lo dicho.'
    reason: cultural_note
lexical_decisions:
- source_word: חֶסֶד
  english_pob_choice: covenant faithfulness
  chosen_spanish: fidelidad del pacto
  alternatives_spanish:
  - amor leal del pacto
  - misericordia del pacto
  - amor fiel
  lexicon: HALOT, BDB
  rationale: En este contexto regio y dinástico, חֶסֶד no se limita a amabilidad general; designa la lealtad pactal de Yahvé hacia David y su casa. 'Fidelidad del pacto' conserva ese peso relacional y promisor, de forma natural en español.
- source_word: עָשִׂיתָ עִם
  english_pob_choice: have shown
  chosen_spanish: has mostrado
  alternatives_spanish:
  - has hecho con
  - has obrado para
  - has tratado con
  lexicon: HALOT, BDB
  rationale: La construcción hebrea con חֶסֶד se expresa idiomáticamente en español con 'mostrar'. 'Has mostrado' comunica la acción divina de extender favor/lealtad sin calcar la sintaxis hebrea.
- source_word: עַבְדְּךָ
  english_pob_choice: your servant
  chosen_spanish: tu siervo
  alternatives_spanish:
  - tu esclavo
  lexicon: HALOT, BDB
  rationale: Aunque el término puede significar 'esclavo', aquí el lenguaje de oración real ante Dios y la referencia a David requieren 'siervo', que es el equivalente reverente y establecido en español.
- source_word: הָלַךְ לְפָנֶיךָ
  english_pob_choice: he walked before you
  chosen_spanish: anduvo delante de ti
  alternatives_spanish:
  - caminó delante de ti
  - vivió delante de ti
  - se condujo delante de ti
  lexicon: HALOT, BDB
  rationale: Conserva la metáfora bíblica del andar delante de Dios y suena natural en español. 'Anduvo' mantiene el tono narrativo y sapiencial del hebreo.
- source_word: בֶּאֱמֶת
  english_pob_choice: in faithfulness
  chosen_spanish: en fidelidad
  alternatives_spanish:
  - en verdad
  - con integridad
  - fielmente
  lexicon: HALOT, BDB
  rationale: Aquí אֱמֶת describe lealtad/reliabilidad más que mera exactitud proposicional. 'En fidelidad' refleja mejor esa fuerza relacional que 'en verdad' en español moderno.
- source_word: בִּצְדָקָה
  english_pob_choice: in righteousness
  chosen_spanish: en justicia
  alternatives_spanish:
  - en rectitud
  - en justicia recta
  lexicon: HALOT, BDB
  rationale: צְדָקָה puede traducirse como justicia o rectitud. Se eligió 'justicia' porque en español bíblico conserva el peso moral y covenantal de la conducta conforme a Dios.
- source_word: וּבְיִשְׁרַת לֵבָב
  english_pob_choice: in uprightness of heart
  chosen_spanish: en rectitud de corazón
  alternatives_spanish:
  - con integridad de corazón
  - en sinceridad de corazón
  - con corazón recto
  lexicon: HALOT, BDB
  rationale: La expresión apunta a la rectitud interior y sinceridad moral. 'Rectitud de corazón' es clara, fiel al hebreo y estilísticamente fluida en español.
- source_word: עִמָּךְ
  english_pob_choice: with you
  chosen_spanish: contigo
  alternatives_spanish:
  - con tú
  lexicon: HALOT, BDB
  rationale: El hebreo introduce una cercanía relacional distinta de 'delante de ti'. 'Contigo' preserva esa relación personal y evita repetir innecesariamente la misma preposición.
- source_word: וַתִּשְׁמָר לוֹ
  english_pob_choice: you have kept for him
  chosen_spanish: le has guardado
  alternatives_spanish:
  - le has preservado
  - le has mantenido
  lexicon: HALOT, BDB
  rationale: שׁמר implica guardar, conservar o preservar. 'Le has guardado' es preciso y natural, y en español puede abarcar la idea de mantener vigente la promesa/favor otorgado.
- source_word: בֵן יֹשֵׁב עַל כִּסְאוֹ
  english_pob_choice: a son sitting on his throne
  chosen_spanish: un hijo sentado en su trono
  alternatives_spanish:
  - un hijo para sentarse en su trono
  - un heredero sentado en su trono
  lexicon: HALOT, BDB
  rationale: El participio presenta al hijo como efectivamente entronizado. 'Sentado en su trono' preserva la imagen concreta y el cumplimiento visible, sin debilitarla a un mero futuro potencial.
- source_word: כַּיּוֹם הַזֶּה
  english_pob_choice: as it is this day
  chosen_spanish: como se ve hoy
  alternatives_spanish:
  - como es hoy
  - tal como se ve en este día
  - como está hoy
  lexicon: HALOT, BDB
  rationale: Este modismo hebreo subraya la evidencia presente y visible del hecho. 'Como se ve hoy' comunica bien en español esa confirmación observable sin sonar forzado.
theological_decisions:
- issue: Renderización de חֶסֶד en contexto del pacto davídico
  english_pob_reading: covenant faithfulness
  chosen_spanish_reading: fidelidad del pacto
  alternative_spanish_readings:
  - amor leal del pacto
  - misericordia del pacto
  - bondad pactal
  rationale: 'La frase recoge la dimensión pactal y dinástica del texto: Yahvé ha actuado con lealtad hacia David y ha preservado la línea real. ''Fidelidad del pacto'' mantiene el valor teológico del término sin reducirlo a emoción o benevolencia genérica.'
  doctrine_reference: Translation philosophy §5 (consistencia de términos clave, o excepción documentada)
- issue: Distinción entre verdad/fidelidad en בֶּאֱמֶת
  english_pob_reading: in faithfulness
  chosen_spanish_reading: en fidelidad
  alternative_spanish_readings:
  - en verdad
  - con integridad
  - fielmente
  rationale: El hebreo aquí enfatiza confiabilidad y lealtad del caminar de David, no solo exactitud factual. 'En fidelidad' evita perder la tensión semántica que el audit trail ya corrigió de 'truth' a 'faithfulness'.
  doctrine_reference: Translation philosophy §5 (consistencia de términos clave, o excepción documentada)
translation_notes:
  revision_awareness: La versión inglesa más reciente corrigió בֶּאֱמֶת de 'truth' a 'faithfulness'. La presente redacción española sigue esa revisión y mantiene la distinción entre 'delante de ti' y 'contigo', así como el valor pactal de חֶסֶד en dos ocurrencias paralelas.
  spanish_consistency_notes:
  - Se mantuvo 'Yahvé' implícito solo en la referencia teológica del registro; en el versículo no aparece el tetragrámaton, por lo que no se añadió nombre divino innecesario.
  - Se conservó 'siervo' para עבד en coherencia con el registro bíblico-reverente del relato.
  - '''Justicia'' se usó para צְדָקָה, y ''rectitud de corazón'' para יִשְׁרַת לֵבָב, evitando fusionar ambos términos.'
  - La repetición de 'fidelidad del pacto' para חֶסֶד en ambos lugares refleja la cohesión semántica del verso.
  - '''Como se ve hoy'' traduce el valor idiomático presente de כַּיּוֹם הַזֶּה sin añadir explicación interpretativa al texto principal.'
