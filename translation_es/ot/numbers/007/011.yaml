translation:
  language: es
  text: 'Entonces Yahvé dijo a Moisés: «Un líder[a] por día, un líder por día, presentarán su ofrenda para la dedicación del altar».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «un líder tribal por día». El hebreo repite «un líder, un día» para subrayar la secuencia ordenada de las ofrendas.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר
  english_pob_choice: Then ... said
  chosen_spanish: Entonces ... dijo
  alternatives_spanish:
  - Y ... dijo
  - Luego ... dijo
  lexicon: HALOT
  rationale: El waw consecutivo avanza la narración; en español, «Entonces» conserva esa secuencia natural sin añadir contenido.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: Se mantiene el nombre divino como transliteración del Tetragrámaton, conforme al estándar del proyecto, en vez de sustituirlo por un título.
- source_word: מֹשֶׁה
  english_pob_choice: Moses
  chosen_spanish: Moisés
  alternatives_spanish:
  - Moisés el profeta
  lexicon: HALOT
  rationale: Nombre propio bíblico estándar en español.
- source_word: נָשִׂיא
  english_pob_choice: leader
  chosen_spanish: líder
  alternatives_spanish:
  - jefe
  - príncipe
  - líder tribal
  lexicon: HALOT
  rationale: En este contexto se trata de los jefes tribales que traen ofrendas; «líder» es claro y evita las connotaciones monárquicas de «príncipe».
- source_word: אֶחָד
  english_pob_choice: one
  chosen_spanish: uno
  alternatives_spanish:
  - un
  - uno solo
  lexicon: HALOT
  rationale: Se preserva el numeral para mantener el patrón distributivo repetido del hebreo.
- source_word: לַיּוֹם
  english_pob_choice: each day
  chosen_spanish: por día
  alternatives_spanish:
  - cada día
  - al día
  lexicon: HALOT
  rationale: La repetición hebrea enfatiza la distribución ordenada; «por día» conserva la idea distributiva y permite una frase breve y natural.
- source_word: יַקְרִיבוּ
  english_pob_choice: they shall present
  chosen_spanish: presentarán
  alternatives_spanish:
  - ofrecerán
  - traerán
  lexicon: HALOT
  rationale: En contexto sacrificial, el hiphil de קרב puede significar presentar/ofrecer. «Presentarán» evita redundancia con «ofrenda» y conserva la acción cultual.
- source_word: קָרְבָּנָם
  english_pob_choice: their offering
  chosen_spanish: su ofrenda
  alternatives_spanish:
  - su sacrificio
  - su oblación
  lexicon: HALOT
  rationale: «Ofrenda» es el equivalente culto claro en español para el sustantivo de sacrificio presentado a Dios.
- source_word: לַחֲנֻכַּת
  english_pob_choice: for the dedication of
  chosen_spanish: para la dedicación de
  alternatives_spanish:
  - para la consagración de
  - en la dedicación de
  lexicon: HALOT
  rationale: El sustantivo indica la ocasión dedicatoria del altar; «dedicación» es natural y fiel en español.
- source_word: הַמִּזְבֵּחַ
  english_pob_choice: the altar
  chosen_spanish: el altar
  lexicon: HALOT
  rationale: Renderización estándar y directa del objeto cultual.
theological_decisions:
- issue: Renderización del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Jehová
  rationale: El texto hebreo usa directamente el Nombre divino; se conserva como «Yahvé» para reflejar la identidad personal del Dios del pacto y evitar la sustitución por un título.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Sentido distributivo de la repetición «נָשִׂיא אֶחָד לַיּוֹם נָשִׂיא אֶחָד לַיּוֹם»
  english_pob_reading: One leader each day, one leader each day
  chosen_spanish_reading: Un líder por día, un líder por día
  alternative_spanish_readings:
  - Un líder cada día, un líder cada día
  - Un líder al día, un líder al día
  rationale: Se conserva la repetición enfática del hebreo y su orden secuencial, sin suavizarla a una sola cláusula para no perder el énfasis textual.
  doctrine_reference: Principio de fidelidad retórica al paralelo hebreo
- issue: Naturaleza de la ofrenda en contexto cultual
  english_pob_reading: their offering
  chosen_spanish_reading: su ofrenda
  alternative_spanish_readings:
  - su sacrificio
  - su oblación
  rationale: El sustantivo hebreo es cultual y amplio; «ofrenda» mantiene el registro religioso sin introducir una especificación más fuerte de la necesaria.
  doctrine_reference: Lexical theology of sacrificial language
translation_notes:
  revision_awareness: No se registraron revisiones posteriores que alteren la lectura base; se sigue el texto hebreo masorético y el audit trail en inglés sin cambios sustantivos.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» conforme al estándar del proyecto para יְהוָה.
  - Se conserva la repetición enfática del hebreo con una estructura paralela en español.
  - «Ofrenda» se usa en sentido cultual y no como mero regalo secular.
  - El tono es bíblico, claro y publicable en español latinoamericano neutral.
