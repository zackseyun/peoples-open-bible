id: TIT.2.11
reference: Titus 2:11
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: Ἐπεφάνη γὰρ ἡ χάρις τοῦ ⸀θεοῦ σωτήριος πᾶσιν ἀνθρώποις
base_translation:
  language: en
  yaml_path: translation/nt/titus/002/011.yaml
  text: For the grace of God has appeared[b][a], bringing salvation to all people.
  footnotes:
  - marker: a
    text: Or 'has appeared, saving all people' or 'has appeared to all people.' The Greek adjective σωτήριος ('saving,' 'bringing salvation') and the dative phrase πᾶσιν ἀνθρώποις can be construed slightly differently in English.
    reason: lexical_alternative
  - marker: b
    text: '''All people'' translates Greek anthrōpois generically for humanity, not males only.'
    reason: lexical_alternative
translation:
  language: ko
  text: 이는 모든 사람[b]에게 구원을 가져오는[a] 하나님의 은혜가 나타났기 때문입니다.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 또는 「나타나서 모든 사람을 구원하시며」, 「모든 사람에게 나타나서」. 헬라어 형용사 σωτήριος(「구원하는·구원을 가져오는」)와 여격 πᾶσιν ἀνθρώποις는 약간씩 다르게 구성될 수 있다.
    reason: lexical_alternative
  - marker: b
    text: 「모든 사람」은 헬라어 ἀνθρώποις를 인류 전반에 대한 일반적 의미로 옮긴 것이며, 남성에 국한되지 않는다.
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἐπεφάνη
  english_pob_choice: has appeared
  chosen_korean: 나타났기
  alternatives_korean:
  - 드러났기
  - 출현했기
  lexicon: BDAG
  rationale: ἐπιφαίνω의 부정과거 수동. 「나타나다」가 표준 한국어 등가어. 그리스도의 「현현」(ἐπιφάνεια) 어휘군의 동사형.
- source_word: ἡ χάρις τοῦ θεοῦ
  english_pob_choice: the grace of God
  chosen_korean: 하나님의 은혜
  alternatives_korean:
  - 하나님의 호의
  lexicon: BDAG
  rationale: 글로서리 표준.
- source_word: σωτήριος πᾶσιν ἀνθρώποις
  english_pob_choice: bringing salvation to all people
  chosen_korean: 모든 사람에게 구원을 가져오는
  alternatives_korean:
  - 모든 사람을 구원하는
  - 모든 사람에게 구원이 되는
  lexicon: BDAG
  rationale: σωτήριος는 「구원하는·구원을 가져오는」 형용사. 여격 πᾶσιν ἀνθρώποις는 구원의 대상. 「구원을 가져오는」이 형용사적 의미와 여격을 모두 살린다.
- source_word: γάρ
  english_pob_choice: For
  chosen_korean: 이는 ~ 때문입니다
  alternatives_korean:
  - 왜냐하면
  lexicon: BDAG
  rationale: 앞 절들의 권면이 가능한 근거를 제시하는 인과 접속사. 한국어로는 후치 종속절로 옮기는 편이 흐름에 자연스럽다.
