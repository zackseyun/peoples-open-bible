translation:
  language: es
  text: Pues sobre el hombre había venido cierto temor y un temblor corporal, por los cuales se hacía evidente a los que miraban el dolor presente en su corazón[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «la angustia en su corazón»; el griego puede denotar tanto una aflicción interior como dolor más general.
    reason: lexical_alternative
lexical_decisions:
- source_word: περικεχύτο
  english_pob_choice: had come over
  chosen_spanish: había caído sobre
  alternatives_spanish:
  - lo había cubierto
  - se había abatido sobre
  - lo había sobrevenido
  lexicon: LSJ
  rationale: El griego usa una imagen de algo que se derrama o envuelve; en español, «había caído sobre» conserva la idea de una afección que recae y envuelve al hombre sin sonar mecánica.
- source_word: δέος
  english_pob_choice: dread
  chosen_spanish: temor
  alternatives_spanish:
  - pavor
  - terror
  - miedo
  lexicon: LSJ
  rationale: «Temor» mantiene la fuerza reverente/intensa de δέος sin cargarlo necesariamente con el exceso de «terror». En este contexto se combina bien con el temblor corporal.
- source_word: τι
  english_pob_choice: a certain
  chosen_spanish: un cierto
  alternatives_spanish:
  - algún
  - una especie de
  lexicon: LSJ
  rationale: La partícula indefinida atenúa y matiza el sustantivo; «un cierto» reproduce esa precisión del griego mejor que omitirla.
- source_word: φρικασμὸς σώματος
  english_pob_choice: bodily trembling
  chosen_spanish: temblor corporal
  alternatives_spanish:
  - estremecimiento del cuerpo
  - temblor del cuerpo
  - escalofrío corporal
  lexicon: LSJ
  rationale: La expresión indica una sacudida física del cuerpo; «temblor corporal» es natural en español y conserva explícita la dimensión física.
- source_word: διʼ ὧν
  english_pob_choice: by which
  chosen_spanish: por los cuales
  alternatives_spanish:
  - a través de los cuales
  - mediante los cuales
  - por medio de los cuales
  lexicon: LSJ
  rationale: Se refiere a los signos visibles de temor y temblor como medios por los cuales se evidenciaba el dolor interior; «por los cuales» mantiene esa relación causal/instrumental.
- source_word: πρόδηλον ἐγίνετο
  english_pob_choice: was becoming evident
  chosen_spanish: se hacía evidente
  alternatives_spanish:
  - se volvía evidente
  - quedaba patente
  - era evidente
  lexicon: LSJ
  rationale: El imperfecto expresa un proceso de manifestación; «se hacía evidente» conserva ese aspecto progresivo mejor que un simple pretérito.
- source_word: τοῖς θεωροῦσιν
  english_pob_choice: to those who were watching
  chosen_spanish: a los que miraban
  alternatives_spanish:
  - a los observadores
  - a los que estaban mirando
  - a los que contemplaban
  lexicon: LSJ
  rationale: El participio tiene valor de observadores presentes; «a los que miraban» es claro y mantiene la idea de quienes presenciaban la escena.
- source_word: τὸ κατὰ καρδίαν ἐνεστὸς ἄλγος
  english_pob_choice: the pain present in his heart
  chosen_spanish: el dolor presente en su corazón
  alternatives_spanish:
  - la angustia de su corazón
  - el dolor que tenía en el corazón
  - la aflicción interior
  lexicon: LSJ
  rationale: «κατὰ καρδίαν» apunta al interior/centro afectivo; «dolor presente en su corazón» sigue de cerca el griego y conserva la ambigüedad entre dolor físico y angustia interior que el inglés POB anotó.
theological_decisions:
- issue: Naturaleza del «dolor» interior
  english_pob_reading: the pain present in his heart; the Greek can denote inward emotional distress as well as pain more generally.
  chosen_spanish_reading: el dolor presente en su corazón, con posible matiz de angustia interior
  alternative_spanish_readings:
  - la angustia en su corazón
  - el sufrimiento en su corazón
  - la pena en su corazón
  rationale: El contexto permite tanto dolor como angustia; no conviene resolver la tensión reduciendo el término a una sola lectura. La redacción principal conserva la literalidad y deja espacio al matiz emocional.
  doctrine_reference: Psicología bíblica / lenguaje afectivo en literatura helenística
