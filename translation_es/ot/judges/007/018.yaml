  text: When I and all who are with me blow the ram’s horn[a], then you also must blow the horns all around the whole camp, and say[b], ‘For Yahweh and for Gideon!’
  footnotes:
  - marker: a
    text: Traditional English versions often read, 'The sword of the LORD and of Gideon,' influenced by the nearby wording in Judges 7:20. The Hebrew of this verse itself reads simply, 'For the LORD and for Gideon.'
    reason: alternative_reading
  - marker: b
    text: Hebrew שׁוֹפָר refers to a horn, often a ram’s horn, rather than a metal trumpet.
    reason: cultural_note
