revisions:
- from: 'Como su propio estiércol[a], perecerá para siempre; los que lo veían dirán: «¿Dónde está?»'
  to: 'Como su propio estiércol[a], perecerá para siempre; los que lo vieron dirán: «¿Dónde está él?»'
  rationale: Se ajusta «los que lo veían» a «los que lo vieron» para reflejar mejor el valor de רֹאָיו sin añadir un matiz habitual/imperfectivo. También se explicita «él» en la pregunta final para corresponder más de cerca al sufijo pronominal hebreo. Lo demás puede mantenerse tal como está.
