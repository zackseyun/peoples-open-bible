translation:
  language: es
  text: Y he aquí, seis hombres venían desde la dirección de la puerta superior, que mira al norte, cada uno con su arma para quebrar[a] en la mano; y un hombre entre ellos, vestido de lino, con un estuche de escriba[b] a su cintura. Y vinieron y se pararon junto al altar de bronce.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «cada uno con su arma destructora en la mano». El hebreo se refiere a un implemento para romper o aplastar, pero el tipo exacto de arma es incierto.'
    reason: lexical_alternative
  - marker: b
    text: 'Tradicionalmente: «con un tintero de escriba a su cintura» o «cuerno de tinta». El hebreo designa un estuche o recipiente asociado al escriba, pero la forma exacta no es segura.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהִנֵּה
  english_pob_choice: And behold
  chosen_spanish: Y he aquí
  alternatives_spanish:
  - Y mira
  - Y ve
  lexicon: HALOT
  rationale: Conserva el valor deíctico e introducción repentina de la visión profética. 'He aquí' es natural en español bíblico y mantiene la vividez sin volverlo coloquial.
- source_word: שִׁשָּׁה אֲנָשִׁים
  english_pob_choice: six men
  chosen_spanish: seis hombres
  alternatives_spanish:
  - seis personas
  - seis figuras
  lexicon: HALOT
  rationale: El hebreo es masculino plural y describe agentes con forma humana en la visión. 'Hombres' conserva el rasgo de género y la concreción del original.
- source_word: בָּאִים
  english_pob_choice: were coming
  chosen_spanish: venían
  alternatives_spanish:
  - venían caminando
  - estaban viniendo
  lexicon: HALOT
  rationale: El participio expresa acción en curso en la escena visionaria. 'Venían' reproduce bien ese movimiento progresivo en español.
- source_word: מִדֶּרֶךְ
  english_pob_choice: from the direction of
  chosen_spanish: desde la dirección de
  alternatives_spanish:
  - por la parte de
  - desde
  lexicon: HALOT
  rationale: La frase indica procedencia espacial por una ruta o rumbo. 'Desde la dirección de' es claro y preciso en español actual.
- source_word: שַׁעַר הָעֶלְיוֹן
  english_pob_choice: the upper gate
  chosen_spanish: la puerta superior
  alternatives_spanish:
  - la puerta de arriba
  - la puerta alta
  lexicon: HALOT
  rationale: '''Puerta'' es el equivalente más natural en este contexto arquitectónico. ''Superior'' conserva la relación espacial de ''upper'' sin añadir interpretación.'
- source_word: אֲשֶׁר מָפְנֶה צָפוֹנָה
  english_pob_choice: which faces north
  chosen_spanish: que mira al norte
  alternatives_spanish:
  - que está orientada al norte
  - que se vuelve hacia el norte
  lexicon: HALOT
  rationale: '''Mira al norte'' expresa de forma idiomática la orientación arquitectónica y preserva el sentido direccional del hebreo.'
- source_word: וְאִישׁ כְּלִי מַפָּצוֹ בְּיָדוֹ
  english_pob_choice: each with his weapon for smashing in his hand
  chosen_spanish: cada uno con su arma de destrucción en la mano
  alternatives_spanish:
  - cada uno con su arma para destruir en la mano
  - cada uno con su arma de aplastamiento en la mano
  - cada uno con su arma de quebrar en la mano
  lexicon: HALOT
  rationale: מַפָּץ denota un instrumento de romper o aplastar; el tipo exacto es incierto. 'Arma de destrucción' conserva la fuerza destructiva sin especificar indebidamente el objeto, siguiendo la cautela del texto fuente.
- source_word: וְאִישׁ אֶחָד בְּתוֹכָם
  english_pob_choice: and one man among them
  chosen_spanish: y un hombre entre ellos
  alternatives_spanish:
  - y un hombre en medio de ellos
  - y un solo hombre entre ellos
  lexicon: HALOT
  rationale: '''Entre ellos'' reproduce con naturalidad la posición dentro del grupo y evita sobrecargar la frase.'
- source_word: לָבֻשׁ בַּדִּים
  english_pob_choice: was clothed in linen
  chosen_spanish: vestido de lino
  alternatives_spanish:
  - cubierto de lino
  - con ropa de lino
  lexicon: HALOT
  rationale: La fórmula breve 'vestido de lino' es fiel y digna; conserva la asociación ritual del lino sin añadir matices ajenos.
- source_word: קֶסֶת הַסֹּפֵר
  english_pob_choice: a scribe’s writing case
  chosen_spanish: un estuche de escriba
  alternatives_spanish:
  - un estuche de escritura de escriba
  - un tintero de escriba
  - un estuche para escribir
  lexicon: HALOT
  rationale: El hebreo designa un recipiente o estuche asociado al escriba. 'Estuche de escriba' mantiene la función sin imponer la tradicional 'tintero', que sería más específica de lo que el hebreo exige.
- source_word: בְּמָתְנָיו
  english_pob_choice: at his waist
  chosen_spanish: a su cintura
  alternatives_spanish:
  - a sus lomos
  - a su cintura/entrepierna
  lexicon: HALOT
  rationale: '''Cintura'' comunica con claridad la ubicación corporal en español contemporáneo. ''Lomos'' sería más literal pero más arcaico y menos transparente.'
- source_word: וַיָּבֹאוּ
  english_pob_choice: And they came
  chosen_spanish: Y vinieron
  alternatives_spanish:
  - Entonces vinieron
  - Así vinieron
  lexicon: HALOT
  rationale: La forma narrativa hebrea avanza la acción. 'Y vinieron' mantiene la secuencia sencilla y continua.
- source_word: וַיַּעַמְדוּ אֵצֶל
  english_pob_choice: stood beside
  chosen_spanish: se detuvieron junto a
  alternatives_spanish:
  - se pusieron junto a
  - estuvieron junto a
  - se quedaron junto a
  lexicon: HALOT
  rationale: '''Junto a'' reproduce la cercanía de אֵצֶל. ''Se detuvieron'' refleja el acto de colocarse/ponerse en posición en la escena sin forzar una lectura de inmovilidad prolongada.'
- source_word: מִזְבַּח הַנְּחֹשֶׁת
  english_pob_choice: the bronze altar
  chosen_spanish: el altar de bronce
  alternatives_spanish:
  - el altar broncíneo
  - el altar de cobre
  lexicon: HALOT
  rationale: '''Bronce'' es el equivalente moderno y común en español bíblico para נְחֹשֶׁת. Conserva la referencia al altar conocido sin arcaísmos.'
theological_decisions:
- issue: Identidad de los seis hombres y del hombre vestido de lino
  english_pob_reading: Render them phenomenologically as 'men' without importing angelic interpretation into the translation.
  chosen_spanish_reading: Traducirlos como 'seis hombres' y 'un hombre entre ellos' sin introducir en el texto una identificación angelical.
  alternative_spanish_readings:
  - seis ángeles ejecutores y un ángel escriba
  - seres celestiales con apariencia humana
  rationale: 'El hebreo presenta lo que Ezequiel ve: hombres en la visión. Aunque el contexto amplio sugiere agentes celestiales, la traducción debe preservar la descripción fenomenológica y dejar la interpretación para el comentario.'
  doctrine_reference: Conservar la tensión interpretativa sin resolverla en la traducción.
translation_notes:
  revision_awareness: 'La redacción sigue de cerca el texto hebreo y coincide sustancialmente con la auditoría inglesa: mantiene la partícula deíctica, el aspecto progresivo de ''venían'', la orientación de la puerta, el valor incierto de מַפָּץ, el objeto de escriba como ''estuche'', y la cautela interpretativa respecto de la identidad de los personajes. No se requirieron revisiones frente al pass más reciente.'
  spanish_consistency_notes:
  - Se usa 'Yahvé' como norma cuando aparezca el nombre divino, pero este versículo no lo contiene.
  - '''Bronce'' se emplea de manera consistente para נְחֹשֶׁת.'
  - Se evita 'SEÑOR' como sustituto del nombre divino, pues no aplica aquí.
  - Se mantiene 'hombres' por fidelidad al plural masculino hebreo y al registro visionario.
  - La puntuación con punto y coma ayuda a reflejar la acumulación descriptiva del hebreo sin fragmentar en exceso la escena.
