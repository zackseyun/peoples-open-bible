translation:
  language: es
  text: Salmo de David. Yahvé[a], te llamo; ven pronto a mí. Inclina tu oído a mi voz cuando te llamo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebreo YHWH; tradicionalmente se traduce «el SEÑOR»; alternativamente, «Yahvé».
    reason: alternative_reading
lexical_decisions:
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - SEÑOR
  - Yahweh
  lexicon: יהוה
  rationale: La pauta del proyecto pide usar «Yahvé» en el texto principal para el Nombre divino. Mantiene la decisión auditada de la POB inglesa de no ocultar el nombre tras un título.
- source_word: קְרָאתִי/ךָ
  english_pob_choice: I call to you
  chosen_spanish: te llamo
  alternatives_spanish:
  - clamo a ti
  - te invoco
  lexicon: קרא
  rationale: El hebreo expresa el acto de dirigirse a Yahvé; «te llamo» reproduce con naturalidad el presente de súplica sin introducir un matiz más litúrgico que el del original.
- source_word: חוּשָׁה לִּי
  english_pob_choice: hurry to me
  chosen_spanish: apresúrate a mí
  alternatives_spanish:
  - corre a mí
  - date prisa en venir a mí
  lexicon: חוש
  rationale: Se conserva la urgencia del hebreo. «Apresúrate a mí» sigue el valor imperativo y la dirección hacia el hablante, aunque suena algo más formal en español que una paráfrasis expansiva.
- source_word: הַאֲזִינָה קוֹלִי
  english_pob_choice: Give ear to my voice
  chosen_spanish: Inclina tu oído a mi voz
  alternatives_spanish:
  - atiende a mi voz
  - oye mi voz
  lexicon: אזן
  rationale: «Inclina tu oído» preserva la imagen semítica de prestar atención con intención. «Mi voz» mantiene la referencia concreta del original y la traducción inglesa.
theological_decisions:
- issue: Tratamiento del Nombre divino
  english_pob_reading: Yahweh[a] with note that Hebrew YHWH is traditionally rendered 'the LORD'; alternatively 'Yahweh.'
  chosen_spanish_reading: Yahvé[a]
  alternative_spanish_readings:
  - SEÑOR
  - Yahweh
  rationale: Se sigue la política del proyecto de no enmascarar יהוה con «SEÑOR». La nota explica la alternativa tradicional y la base hebrea, manteniendo la transparencia textual.
  doctrine_reference: Onomástica divina / Tetragrámaton
translation_notes:
  revision_awareness: 'La base inglesa se amplió a partir del superscrito («A psalm of David») para incluir el resto del hebreo: invocación a Yahvé, petición de premura y súplica de atención a la voz. La versión española sigue esa ampliación y conserva el mismo alcance semántico.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» de forma consistente con el estándar del proyecto para יהוה.
  - Se evita «orar» o «suplicar» para no añadir un matiz no presente en el hebreo; el texto conserva el verbo de llamado directo.
  - La construcción «Inclina tu oído» respeta la imagen corporal del original y es comprensible en español bíblico contemporáneo.
