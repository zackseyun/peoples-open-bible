translation:
  language: es
  text: Y los hijos de Israel clamaron a Yahvé, su Dios[a], porque su espíritu había desfallecido[b], porque todos sus enemigos los habían rodeado y no había manera de escapar[c] de en medio de ellos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «los israelitas». El griego dice literalmente «los hijos de Israel».
    reason: lexical_alternative
  - marker: b
    text: O «su espíritu perdió el ánimo» / «su valor desfalleció».
    reason: lexical_alternative
  - marker: c
    text: O «no era posible escapar».
    reason: alternative_reading
lexical_decisions:
- source_word: οἱ υἱοὶ Ἰσραήλ
  english_pob_choice: the sons of Israel
  chosen_spanish: los hijos de Israel
  alternatives_spanish:
  - los israelitas
  - los hijos de Israel
  lexicon: LSJ
  rationale: Conservo la expresión genealógica y bíblica del griego. En español, «hijos de Israel» es transparente y reproduce la forma del original sin aplanarla a un colectivo más interpretativo como «israelitas».
- source_word: ἀνεβόησαν
  english_pob_choice: cried out
  chosen_spanish: clamaron
  alternatives_spanish:
  - gritaron
  - alzaron la voz
  - clamaron a
  lexicon: LSJ
  rationale: El verbo expresa un clamor urgente dirigido a Dios; «clamaron» comunica mejor esa súplica intensa que un simple «gritaron».
- source_word: Κύριον θεὸν αὐτῶν
  english_pob_choice: the Lord their God
  chosen_spanish: Yahvé, su Dios
  alternatives_spanish:
  - el Señor, su Dios
  - Yahvé su Dios
  lexicon: LSJ
  rationale: El contexto de oración y la convención del proyecto favorecen «Yahvé» para Κύριος. «su Dios» conserva la relación posesiva del griego y evita sustituir el nombre divino por una máscara litúrgica.
- source_word: ὠλιγοψύχησεν τὸ πνεῦμα αὐτῶν
  english_pob_choice: their spirit had grown faint
  chosen_spanish: su espíritu había desfallecido
  alternatives_spanish:
  - su espíritu había perdido el ánimo
  - su valor había decaído
  - su espíritu había perdido el corazón
  lexicon: LSJ
  rationale: «Desfallecido» conserva la imagen de debilitamiento interior y corresponde al matiz de ὠλιγοψύχησεν sin reducirlo solo a «ánimo» o «valor».
- source_word: τὸ πνεῦμα αὐτῶν
  english_pob_choice: their spirit
  chosen_spanish: su espíritu
  alternatives_spanish:
  - su ánimo
  - su aliento
  lexicon: LSJ
  rationale: Mantengo «espíritu» porque el griego dice literalmente πνεῦμα y el contexto ya orienta el sentido hacia el abatimiento interior.
- source_word: ἐκύκλωσαν πάντες οἱ ἐχθροὶ αὐτῶν
  english_pob_choice: all their enemies had surrounded them
  chosen_spanish: todos sus enemigos los habían rodeado
  alternatives_spanish:
  - todos sus enemigos los habían cercado
  - todos sus enemigos los habían circundado
  lexicon: LSJ
  rationale: «Habían rodeado» expresa con naturalidad en español la acción completada del aoristo en el contexto causal, siguiendo la revisión inglesa que optó por una forma más natural y formal.
- source_word: οὐκ ἦν διαφυγεῖν
  english_pob_choice: there was no escape
  chosen_spanish: no había escape
  alternatives_spanish:
  - no era posible escapar
  - no había manera de huir
  lexicon: LSJ
  rationale: «No había escape» mantiene la construcción impersonal y la imposibilidad expresada por el griego, en línea con la revisión inglesa por una formulación más natural que un gerundio o perífrasis excesiva.
- source_word: ἐκ μέσου αὐτῶν
  english_pob_choice: from among them
  chosen_spanish: de entre ellos
  alternatives_spanish:
  - de en medio de ellos
  - de entre sus filas
  lexicon: LSJ
  rationale: «De entre ellos» reproduce con naturalidad el valor locativo de la expresión griega y comunica la idea de quedar atrapados en medio del cerco.
theological_decisions:
- issue: Rendering of Κύριος in a prayer context
  english_pob_reading: Lord
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el Señor
  - el Maestro
  rationale: El texto griego usa Κύριος en una apelación orante a Dios. Siguiendo la norma del proyecto, se recupera el nombre divino como «Yahvé» en lugar de un título de sustitución, preservando la transparencia frente al original.
  doctrine_reference: 'Project default: יהוה / YHWH -> Yahvé'
- issue: Gender-accurate collective expression for οἱ υἱοὶ Ἰσραήλ
  english_pob_reading: the sons of Israel
  chosen_spanish_reading: los hijos de Israel
  alternative_spanish_readings:
  - los israelitas
  - los hijos de Jacob
  rationale: Se conserva la expresión masculina-familiar del griego. «Los israelitas» sería más fluido, pero atenúa la forma concreta del original y borra una distinción que el POB documenta como relevante.
  doctrine_reference: DOCTRINE.md §4 Gender-accurate over gender-neutral
- issue: Force of τὸ πνεῦμα αὐτῶν
  english_pob_reading: their spirit had grown faint
  chosen_spanish_reading: su espíritu había desfallecido
  alternative_spanish_readings:
  - su ánimo había flaqueado
  - su valor había decaído
  rationale: La lectura mantiene el sustantivo «espíritu» y el matiz de debilitamiento interior sin convertirlo en una glosa psicológica más explícita de lo que permite el griego.
  doctrine_reference: Lexical choice for πνεῦμα and ὠλιγοψύχησεν
translation_notes:
  revision_awareness: 'Tomé en cuenta la revisión inglesa más reciente que prefirió una formulación más natural y formal para οὐκ ἦν διαφυγεῖν: «there was no escape». Por eso opté por «no había escape» en lugar de una perífrasis más pesada. También preservé la transparencia del griego en «los hijos de Israel» y la referencia literal a «su espíritu».'
  spanish_consistency_notes:
  - Usé «Yahvé» para Κύριος conforme al estándar del proyecto, en vez de «SEÑOR» o «el Señor».
  - Mantengo «espíritu» como equivalente de πνεῦμα, sin reducirlo a «ánimo» en el texto principal.
  - Conservo la estructura causal repetida con «porque», reflejando los dos ὅτι del griego.
  - La puntuación separa las cláusulas de causa de modo claro y publicable en español contemporáneo.
