translation:
  language: es
  text: Así que enviaré fuego sobre Moab, y consumirá las ciudadelas de Queriot[a][b]; y Moab morirá en medio del tumulto, entre gritos[c], al son de la trompeta.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «los palacios de Queriot» o «las fortalezas de Queriot».
    reason: lexical_alternative
  - marker: b
    text: Queriot también puede entenderse como «las ciudades», aunque aquí probablemente sea un nombre de lugar.
    reason: alternative_reading
  - marker: c
    text: O «un grito de guerra».
    reason: lexical_alternative
lexical_decisions:
- source_word: וְשִׁלַּחְתִּי
  english_pob_choice: So I will send
  chosen_spanish: Así que enviaré
  alternatives_spanish:
  - Y enviaré
  lexicon: HALOT
  rationale: El hebreo expresa acción futura en secuencia profética con conjunción inicial. «Así que» conserva el valor consecutivo que el POB marcó con «So», y «enviaré» mantiene la agencia divina directa.
- source_word: אֵשׁ
  english_pob_choice: fire
  chosen_spanish: fuego
  alternatives_spanish:
  - llama
  lexicon: HALOT
  rationale: En un contexto de juicio, «fuego» es la equivalencia más natural y fiel al sustantivo hebreo, sin añadir matices no presentes en el texto.
- source_word: בְּמוֹאָב
  english_pob_choice: upon Moab
  chosen_spanish: sobre Moab
  alternatives_spanish:
  - contra Moab
  - en Moab
  lexicon: HALOT
  rationale: La preposición admite varias relaciones contextuales; con el envío de fuego, «sobre» reproduce bien la dirección hostil del juicio sin forzar una paráfrasis.
- source_word: וְאָכְלָה
  english_pob_choice: and it will consume
  chosen_spanish: y consumirá
  alternatives_spanish:
  - y devorará
  lexicon: HALOT
  rationale: El verbo femenino singular concuerda con «fuego». «Consumirá» expresa con naturalidad el efecto destructivo del fuego en español y conserva el sentido verbal.
- source_word: אַרְמְנוֹת
  english_pob_choice: the citadels
  chosen_spanish: las ciudades fortificadas
  alternatives_spanish:
  - los palacios
  - las fortalezas
  lexicon: HALOT
  rationale: El sustantivo puede abarcar estructuras palaciegas y defensivas. En español, «ciudades fortificadas» mantiene la carga de centro urbano defendido que el POB quiso preservar con «citadels», sin perder el trasfondo de fortaleza.
- source_word: הַקְּרִיּוֹת
  english_pob_choice: of Kerioth
  chosen_spanish: de Queriot
  alternatives_spanish:
  - de Keriot
  - de las ciudades
  lexicon: HALOT
  rationale: Se conserva el nombre propio como topónimo, siguiendo la lectura principal del POB. La forma «Queriot» es la transliteración más natural en español bíblico.
- source_word: וּמֵת
  english_pob_choice: and Moab will die
  chosen_spanish: y Moab morirá
  alternatives_spanish:
  - y Moab perecerá
  lexicon: HALOT
  rationale: El hebreo presenta al país personificado como sujeto de muerte futura. «Morirá» es directo y mantiene la imagen sin suavizarla.
- source_word: בְּשָׁאוֹן
  english_pob_choice: amid tumult
  chosen_spanish: entre tumulto
  alternatives_spanish:
  - en medio de tumulto
  - con estruendo
  lexicon: HALOT
  rationale: «Tumulto» reproduce bien el campo semántico de ruido confuso, desorden y agitación. «Entre» mantiene la idea de ámbito o circunstancia en la que ocurre la muerte.
- source_word: בִּתְרוּעָה
  english_pob_choice: amid shouting
  chosen_spanish: entre gritos
  alternatives_spanish:
  - con clamor
  - con griterío
  - con grito de guerra
  lexicon: HALOT
  rationale: El sustantivo puede significar grito, clamor o grito de guerra. Dado que el texto continúa con la trompeta, «gritos» evita duplicar demasiado el efecto sonoro y conserva una lectura amplia compatible con la guerra.
- source_word: בְּקוֹל שׁוֹפָר
  english_pob_choice: amid the sound of a trumpet
  chosen_spanish: al son de la trompeta
  alternatives_spanish:
  - con el sonido de la trompeta
  - al sonido de un cuerno
  lexicon: HALOT
  rationale: «Shofar» es el cuerno ritual/de guerra; en español bíblico, «trompeta» comunica de forma clara y digna el instrumento sonoro. «Al son de» reproduce bien el hebreo con una formulación natural.
theological_decisions:
- issue: Imagen de juicio divino mediante fuego enviado sobre una nación
  english_pob_reading: So I will send fire upon Moab
  chosen_spanish_reading: Así que enviaré fuego sobre Moab
  alternative_spanish_readings:
  - Y enviaré fuego contra Moab
  - Enviaré fuego sobre Moab
  rationale: El hebreo presenta una declaración directa de juicio de Yahvé. «Sobre Moab» mantiene la direccionalidad hostil sin introducir una traducción interpretativa excesiva; la formulación conserva el carácter de sentencia divina.
  doctrine_reference: Juicio profético de Yahvé sobre las naciones (Amós 2:1–3).
- issue: Topónimo vs. sentido común de הַקְּרִיּוֹת
  english_pob_reading: Kerioth may also be understood as 'the cities,' though it is likely a place-name here.
  chosen_spanish_reading: Queriot como nombre propio
  alternative_spanish_readings:
  - las ciudades
  - las ciudades de Queriot
  rationale: La nota del POB indica una posible lectura común, pero la principal probable es el topónimo. Por eso el texto principal conserva el nombre propio y deja la alternativa en nota, sin borrar la tensión léxica.
  doctrine_reference: Principio de transparencia textual y respeto por la ambigüedad léxica del hebreo.
translation_notes:
  revision_awareness: El borrador sigue de cerca la lectura y las notas del POB en inglés, manteniendo la secuencia profética, la imagen de juicio por fuego, la ambigüedad de אַרְמְנוֹת y הַקְּרִיּוֹת, y el paralelismo sonoro final. No se detectaron revisiones posteriores que obligaran a cambiar la decisión principal.
  spanish_consistency_notes:
  - Se usa «Yahvé» en el proyecto, pero en este versículo el Tetragrámaton no aparece explícitamente.
  - Se prefiere «fuego» y no una paráfrasis como «castigo ardiente», para respetar la imaginería original.
  - «Queriot» se translitera de modo consistente como topónimo bíblico.
  - 'Se mantiene la progresión sonora del hebreo: tumulto, gritos, trompeta.'
  - No se sustituye «trompeta» por «cuerno» en el texto principal, aunque la nota reconoce la equivalencia posible del shofar.
