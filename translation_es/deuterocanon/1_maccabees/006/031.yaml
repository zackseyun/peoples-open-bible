translation:
  language: es
  text: Y vinieron por Idumea y acamparon contra Bet-sur, y combatieron durante muchos días, y construyeron máquinas de asedio; pero salieron[a] y las quemaron con fuego, y combatieron con valentía[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El griego tiene un verbo singular, «salió», después de verbos plurales; probablemente se trata de un sujeto colectivo, refiriéndose a los defensores de Bet-sur que hicieron una salida.
    reason: textual_variant
  - marker: b
    text: O «valerosamente»; el adverbio griego literalmente significa «de manera viril».
    reason: lexical_alternative
lexical_decisions:
- source_word: διὰ τῆς Ἰδουμαίας
  english_pob_choice: through Idumea
  chosen_spanish: por Idumea
  alternatives_spanish:
  - a través de Idumea
  - por la tierra de Idumea
  lexicon: LSJ
  rationale: διά con genitivo expresa movimiento a través de una región. En español, «por» comunica naturalmente el trayecto sin añadir una expansión innecesaria; «Idumea» conserva la transliteración estándar del topónimo.
- source_word: παρενεβάλοσαν ἐπὶ Βεθσουρᾷ
  english_pob_choice: encamped against Bethsura
  chosen_spanish: acamparon contra Bet-sur
  alternatives_spanish:
  - acamparon en Bet-sur
  - acamparon junto a Bet-sur
  lexicon: LSJ
  rationale: παρεμβάλλω significa acampar, y ἐπί con dativo en contexto militar sugiere posicionamiento hostil. «Contra» conserva el sentido bélico. «Bet-sur» sigue la forma toponímica más usable en español; se mantiene el vínculo con el hebreo del nombre sin imponer una transliteración distinta.
- source_word: ἐπολέμησαν ἐπʼ ἡμέρας πολλάς
  english_pob_choice: they fought for many days
  chosen_spanish: combatieron durante muchos días
  alternatives_spanish:
  - pelearon por muchos días
  - hicieron guerra durante muchos días
  lexicon: LSJ
  rationale: La expresión señala duración. «Combatieron» es un verbo natural y suficientemente formal en español bíblico; «durante muchos días» reproduce con claridad el valor temporal del griego.
- source_word: μηχανὰς
  english_pob_choice: siege engines
  chosen_spanish: máquinas de asedio
  alternatives_spanish:
  - máquinas de guerra
  - ingenios de asedio
  lexicon: LSJ
  rationale: En contexto militar, μηχαναί designa dispositivos de asedio, no máquinas en sentido moderno. «Máquinas de asedio» es preciso y transparente para lectores actuales, manteniendo el campo semántico bélico.
- source_word: ἔξηλθεν
  english_pob_choice: they came out
  chosen_spanish: salieron
  alternatives_spanish:
  - salió
  - hicieron una salida
  lexicon: LSJ
  rationale: El texto griego conserva una forma singular tras una secuencia plural; la lectura colectiva, como en el POB inglés, es la más probable por el contexto. «Salieron» preserva el sentido básico sin forzar una reconstrucción más interpretativa.
- source_word: ἐνεπύρισαν αὐτοὺς ἐν πυρί
  english_pob_choice: burned them with fire
  chosen_spanish: los incendiaron con fuego
  alternatives_spanish:
  - los quemaron con fuego
  - les prendieron fuego
  lexicon: LSJ
  rationale: La frase intensifica la acción de quemar. «Los incendiaron con fuego» sigue de cerca la imagen del griego y mantiene explícito el medio («con fuego»), probablemente referido a las máquinas de asedio.
- source_word: ἀνδρωδῶς
  english_pob_choice: bravely
  chosen_spanish: con valentía
  alternatives_spanish:
  - valerosamente
  - varonilmente
  lexicon: LSJ
  rationale: El adverbio literalmente tiene el matiz de «de manera viril/varonil», pero en español contemporáneo «con valentía» transmite la fuerza encomiástica sin caer en una formulación arcaica o potencialmente ambigua.
translation_notes:
  revision_awareness: 'El texto griego y el control auditado inglés concuerdan ampliamente. Se mantuvo la estructura narrativa y el valor bélico de los verbos. La principal decisión abierta es la forma del último adverbio: se optó por una equivalencia natural («con valentía») y se preservó la alternativa más literal en nota. También se resolvió la irregularidad verbal de ἔξηλθεν como plural colectivo, siguiendo el juicio del POB inglés.'
  spanish_consistency_notes:
  - Se usó «Idumea» para el topónimo regional y «Bet-sur» para la plaza fortificada, evitando variación innecesaria.
  - Se mantuvo un tono sobrio y militar, acorde con el relato.
  - «Máquinas de asedio» preserva la especificidad técnica del griego sin modernizarlo en exceso.
  - La nota a documenta la irregularidad textual sin corregirla en el cuerpo del texto.
  - La nota b conserva la tensión semántica de ἀνδρωδῶς entre «valentía» y el matiz literal de «varonilmente».
