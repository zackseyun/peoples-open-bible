  to: ¿Quién es este[a], que se aferró a ello, y tuvo paz, y le fue para gloria? Porque en la abundancia de paz de su vida[b], te será para gloria.
  rationale: Se hicieron ajustes menores para mejorar la naturalidad del español y la precisión editorial sin cambiar la base textual seguida por el borrador. 'Se aferró a ello' suena más natural que 'se apegó a ello', y 'te será para gloria' expresa mejor la cláusula final en español. También se afinó la nota a para describir con más exactitud su función como lectura más literal del hebreo.
