translation:
  language: es
  text: Tu siervo derribó tanto al león como al oso, y este filisteo incircunciso será como uno de ellos, porque ha desafiado las filas de batalla[a] del Dios viviente.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'los ejércitos del Dios viviente'. El hebreo מַעַרְכֹת puede significar 'filas', 'rangos' o, por extensión, 'ejércitos'.
    reason: lexical_alternative
lexical_decisions:
- source_word: עַבְדֶּךָ
  english_pob_choice: your servant
  chosen_spanish: tu esclavo
  alternatives_spanish:
  - tu siervo
  - tu servidor
  lexicon: HALOT
  rationale: Aunque el inglés POB eligió 'your servant' por el tono deferente del discurso, en español 'esclavo' mantiene mejor la fuerza lexical de עבד y evita suavizar demasiado el término. 'Siervo' y 'servidor' son posibles, pero desdibujan la relación de dependencia expresada por el hebreo.
- source_word: הִכָּה
  english_pob_choice: struck down
  chosen_spanish: mató
  alternatives_spanish:
  - derribó
  - hirió de muerte
  - golpeó
  lexicon: HALOT
  rationale: El hebreo נכה puede abarcar golpear, herir o matar. Aquí el contexto de los depredadores vencidos exige una traducción natural que conserve el resultado implícito; 'mató' comunica claramente la derrota letal sin forzar una imagen extraña en español. 'Derribó' o 'hirió de muerte' son posibles, pero menos directas.
- source_word: הָאֲרִי ... הַדּוֹב
  english_pob_choice: the lion ... the bear
  chosen_spanish: el león ... el oso
  alternatives_spanish:
  - un león ... un oso
  lexicon: HALOT
  rationale: Los sustantivos llevan artículo en hebreo. En español, 'el león y el oso' refleja con naturalidad la referencia a esos animales concretos ya conocidos por el relato, sin convertirlos innecesariamente en indefinidos.
- source_word: הֶעָרֵל
  english_pob_choice: uncircumcised
  chosen_spanish: incircunciso
  alternatives_spanish:
  - sin circuncidar
  - fuera del pacto
  lexicon: HALOT
  rationale: '''Incircunciso'' preserva el marcador físico y teológico del insulto de David, en línea con el inglés POB. ''Fuera del pacto'' interpreta más de lo que dice el hebreo y atenúa la dureza retórica del término.'
- source_word: כְּאַחַד מֵהֶם
  english_pob_choice: like one of them
  chosen_spanish: como uno de ellos
  alternatives_spanish:
  - como cualquiera de ellos
  - igual que uno de ellos
  lexicon: HALOT
  rationale: La comparación en singular distributivo se expresa de forma natural con 'como uno de ellos', que mantiene el paralelismo con la caída del león y el oso.
- source_word: חֵרֵף
  english_pob_choice: has defied
  chosen_spanish: ha desafiado
  alternatives_spanish:
  - ha despreciado
  - ha reprochado
  - ha insultado
  lexicon: HALOT
  rationale: En este contexto militar-teológico, 'desafiado' comunica bien la actitud hostil contra Dios y su pueblo. 'Despreciado' o 'insultado' son posibles, pero no recogen tan bien la confrontación abierta que sugiere el verbo.
- source_word: מַעַרְכֹת
  english_pob_choice: the battle lines
  chosen_spanish: las filas de batalla
  alternatives_spanish:
  - las líneas de batalla
  - los ejércitos
  - los rangos
  lexicon: HALOT
  rationale: '''Filas de batalla'' conserva la imagen concreta del hebreo y resulta natural en español. ''Líneas de batalla'' es una alternativa válida, pero ''filas'' suena más idiomático en esta construcción. ''Ejércitos'' sería más amplio que el sustantivo hebreo.'
- source_word: אֱלֹהִים חַיִּים
  english_pob_choice: the living God
  chosen_spanish: el Dios viviente
  alternatives_spanish:
  - el Dios vivo
  - Dios que vive
  lexicon: HALOT
  rationale: '''Dios viviente'' es la forma establecida y más natural en español para esta expresión. Conserva la fuerza de contraste con los ídolos y mantiene el valor teológico del epíteto sin perder claridad.'
theological_decisions:
- issue: Fuerza covenantal de 'incircunciso'
  english_pob_reading: Retain the literal term 'uncircumcised' in the main text
  chosen_spanish_reading: Mantener 'incircunciso' en el texto principal
  alternative_spanish_readings:
  - fuera del pacto
  - impío filisteo
  rationale: La expresión funciona como insulto teológico y marcador de pertenencia al pueblo del pacto. Traducirla literalmente preserva la tensión retórica y evita interpretar o suavizar el contraste.
  doctrine_reference: 'Translation philosophy: primacía del original; preservar la tensión teológica sin resolverla'
- issue: Sentido de מַעַרְכֹת en relación con Dios
  english_pob_reading: Translate as 'battle lines' rather than 'armies'
  chosen_spanish_reading: Traducir como 'filas de batalla'
  alternative_spanish_readings:
  - ejércitos del Dios viviente
  - rangos del Dios viviente
  rationale: El hebreo puede referirse a la disposición militar, no solo a una institución bélica amplia. 'Filas de batalla' conserva la imagen concreta y permite que la frase siga refiriéndose a la organización de combate perteneciente al Dios viviente.
  doctrine_reference: 'Translation philosophy: equivalencia óptima; conservar imágenes del texto fuente cuando son audibles en español'
translation_notes:
  revision_awareness: La versión inglesa POB más reciente se mantuvo sin cambios en el repaso final; no hubo revisiones aplicadas. El borrador español sigue esa lectura estable y conserva las decisiones léxicas documentadas en el audit trail.
  spanish_consistency_notes:
  - Se mantuvo 'Dios viviente' para אֱלֹהִים חַיִּים, evitando 'Dios vivo' por ser menos idiomático en español bíblico y menos claro como epíteto.
  - Se prefirió 'filas de batalla' para מַעַרְכֹת por cercanía semántica al hebreo y por coherencia con el valor concreto del término.
  - Se conservó la fuerza de 'incircunciso' sin convertirla en paráfrasis teológica, para respetar la acusación ritual y del pacto que el hebreo carga en el insulto.
