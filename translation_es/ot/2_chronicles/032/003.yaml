  to: Y consultó con sus oficiales y con sus valientes para tapar las aguas de los manantiales[a] que estaban fuera de la ciudad, y ellos le ayudaron.
  rationale: Se cambia «sobre cerrar» por «para tapar» para reflejar mejor לִסְתּוֹם en contexto militar y producir un español más natural. También se pule la nota alternativa para que suene idiomática y mantenga la opción léxica documentada en el inglés POB.
