translation:
  language: es
  text: Porque no hablé a sus padres ni les mandé nada el día que los saqué de la tierra de Egipto acerca de holocausto y sacrificio[a][b][c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «sobre holocausto y sacrificio». El versículo probablemente usa retórica profética para subrayar que la obediencia, y no el sacrificio ritual, era la exigencia central del pacto de Dios; compárese el versículo siguiente.
    reason: lexical_alternative
  - marker: b
    text: Esta formulación no necesariamente niega que alguna vez se dieran leyes sacrificiales, sino que establece un contraste enfático dentro del contexto profético.
    reason: cross_reference
  - marker: c
    text: O «Porque no hablé a sus padres ni les mandé nada el día que los saqué de la tierra de Egipto acerca de holocausto y sacrificio».
    reason: previous_rendering
lexical_decisions:
- source_word: כִּי
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  lexicon: HALOT
  rationale: Introduce la base explicativa de la afirmación anterior. «Porque» conserva la relación causal o explicativa de manera natural en español.
- source_word: לֹא דִבַּרְתִּי
  english_pob_choice: I did not speak
  chosen_spanish: no hablé
  alternatives_spanish:
  - no dije
  - no me dirigí
  lexicon: HALOT
  rationale: דבר aquí corresponde al verbo ordinario «hablar». «No hablé» mantiene la negación directa y el tono profético tajante.
- source_word: אֶת אֲבוֹתֵיכֶם
  english_pob_choice: to your fathers
  chosen_spanish: a sus padres
  alternatives_spanish:
  - a sus antepasados
  - a sus padres/patriarcas
  lexicon: HALOT
  rationale: Se conserva el modismo hebreo de «padres» para los antepasados de Israel. En español, «a sus padres» comunica esa referencia histórica sin forzar una paráfrasis interpretativa.
- source_word: וְלֹא צִוִּיתִים
  english_pob_choice: or command them
  chosen_spanish: ni les mandé
  alternatives_spanish:
  - ni les ordené
  - ni les di mandamiento
  lexicon: HALOT
  rationale: צוה se traduce con el verbo común «mandar» para reflejar el valor imperativo. «Ni» coordina naturalmente con la negación previa y conserva el paralelismo del hebreo.
- source_word: בְּיוֹם הוֹצִיא אוֹתָם מֵאֶרֶץ מִצְרַיִם
  english_pob_choice: on the day I brought them out of the land of Egypt
  chosen_spanish: el día que los saqué de la tierra de Egipto
  alternatives_spanish:
  - el día en que los saqué de la tierra de Egipto
  - cuando los saqué de la tierra de Egipto
  lexicon: HALOT
  rationale: «El día que» reproduce de forma natural el valor temporal de בְּיוֹם. «Saqué» expresa la acción de salida con claridad y mantiene la referencia al éxodo.
- source_word: עַל דִּבְרֵי
  english_pob_choice: concerning
  chosen_spanish: acerca de
  alternatives_spanish:
  - sobre
  - con respecto a
  lexicon: HALOT
  rationale: La construcción introduce el tema de lo que no se habló ni se mandó. «Acerca de» es una equivalencia sobria y clara para el valor tópico de עַל דִּבְרֵי.
- source_word: עוֹלָה
  english_pob_choice: burnt offering
  chosen_spanish: holocausto
  alternatives_spanish:
  - ofrenda quemada
  - ofrenda totalmente quemada
  lexicon: HALOT
  rationale: «Holocausto» es el término bíblico tradicional en español para עוֹלָה y conserva la idea de una ofrenda íntegramente consumida por el fuego. Se prefiere por precisión terminológica.
- source_word: וָזָבַח
  english_pob_choice: and sacrifice
  chosen_spanish: sacrificio
  alternatives_spanish:
  - y ofrenda sacrificada
  - y víctimas sacrificadas
  lexicon: HALOT
  rationale: Aquí זבח funciona como categoría sacrificial general junto con עוֹלָה. «Sacrificio» mantiene esa amplitud sin cargar el texto con una explicación interpretativa.
theological_decisions:
- issue: Si la frase debe suavizarse para evitar la tensión con otros textos sobre la ley sacrificial.
  english_pob_reading: Render the Hebrew denial straightforwardly without softening it.
  chosen_spanish_reading: 'Traducir la negación de manera directa: Dios dice que no habló ni mandó eso «acerca de holocausto y sacrificio».'
  alternative_spanish_readings:
  - «no fue principalmente acerca de holocausto y sacrificio»
  - «no fue en primer lugar acerca de holocausto y sacrificio»
  rationale: El hebreo presenta una negación fuerte que el contexto profético usa para enfatizar la obediencia del pacto por encima del ritual. La traducción conserva esa tensión en el texto principal y deja la armonización para el lector y el contexto inmediato.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: La redacción sigue de cerca el orden y la fuerza del texto hebreo, tomando en cuenta el ajuste de estilo del audit trail inglés para evitar una sintaxis pesada en español. Se mantuvo la negación frontal, el anclaje temporal al éxodo y la construcción tópica con עַל דִּבְרֵי, sin suavizar la tensión teológica documentada.
  spanish_consistency_notes:
  - Se usa «Yahvé» por norma del proyecto cuando corresponda; en este versículo no aparece el Tetragrámaton, así que no se inserta.
  - Se prefirió «holocausto» para עוֹלָה por su valor terminológico estable en español bíblico.
  - Se mantuvo «padres» para reproducir el hebraísmo de אֲבוֹתֵיכֶם, en vez de «ancestros», siguiendo la preferencia de conservar el color idiomático de la fuente.
