review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el sentido básico del hebreo: las langostas no tienen rey y, aun así, avanzan ordenadamente. También preserva la nota alternativa sobre חֹצֵץ. Sin embargo, «en orden» atenúa demasiado la imagen léxica de división/formación presente en חֹצֵץ y documentada por el inglés POB como «in ranks», con alternativa «divided / in bands / divisions».'
  spanish_quality_summary: El español es natural y claro. No obstante, «salen en orden» suena algo general y pierde la viveza concreta de una formación organizada. «Salen en filas» comunica mejor la imagen proverbial en español sin imponer una militarización excesiva.
  glossary_alignment: 'No hay conflictos con la terminología troncal del proyecto. «Rey» para מֶלֶךְ y «langostas» para אַרְבֶּה están bien. La principal mejora es lexical: חֹצֵץ debe reflejar más claramente la idea de disposición por secciones/rangos que el simple «orden».'
  issues:
  - severity: medium
    issue: «en orden» debilita el matiz de חֹצֵץ
    rationale: El participio sugiere división/arreglo en secciones. «En orden» expresa orden general, pero no la idea de formación visible que el contexto de las langostas y la nota alternativa sí apoyan.
  - severity: low
    issue: La nota alternativa queda algo menos integrada con el texto principal
    rationale: Si el texto principal usa una expresión más concreta como «en filas», la relación con la alternativa «divididas… en bandas o divisiones» se vuelve más transparente para el lector.
  revised_spanish_text: Las langostas no tienen rey[a], pero todas salen en filas.
  revised_footnotes:
  - marker: a
    text: 'O: «y salen divididas», es decir, dispuestas en bandas o divisiones.'
    reason: lexical_alternative
