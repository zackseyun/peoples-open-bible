translation:
  language: es
  text: Y David se enojó porque Yahvé había irrumpido contra Uza[a]; y llamó a aquel lugar Pérez-uza hasta hoy.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: '«Pérez-uza» reproduce el juego de palabras del hebreo: puede entenderse como «brecha contra Uza» o «irrupción contra Uza», en eco de que Yahvé «había irrumpido contra Uza».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּחַר לְדָוִיד
  english_pob_choice: And David was angry
  chosen_spanish: Y David se enojó
  alternatives_spanish:
  - Y David ardió de ira
  - Y David estaba airado
  - Y David se indignó
  lexicon: HALOT
  rationale: El hebreo expresa que la ira se encendió en David. «Se enojó» comunica bien el estado emocional en español moderno y conserva la fuerza del idiomático חרה ל sin sonar forzado.
- source_word: כִּי
  english_pob_choice: because
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  lexicon: HALOT
  rationale: Introduce la causa del enojo de David. «Porque» es la equivalencia causal más directa y natural en español.
- source_word: פָרַץ יְהוָה פֶּרֶץ
  english_pob_choice: Yahweh had broken out against Uzza
  chosen_spanish: Yahvé había irrumpido contra Uzza
  alternatives_spanish:
  - Yahvé había hecho una brecha contra Uzza
  - Yahvé había estallado contra Uzza
  - Yahvé había quebrantado a Uzza
  lexicon: HALOT
  rationale: El verbo פרץ y el sustantivo cognado פֶּרֶץ expresan una irrupción/estallido con resultado destructivo. «Había irrumpido» conserva la idea de salida violenta mejor que una simple traducción con «golpeado» o «herido», y permite mantener el juego verbal con el nombre del lugar.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: 'Se sigue el criterio del proyecto para el Tetragrámaton: «Yahvé» preserva el nombre propio divino en vez de sustituirlo por un título.'
- source_word: בְּעֻזָּא
  english_pob_choice: against Uzza
  chosen_spanish: contra Uzza
  alternatives_spanish:
  - sobre Uzza
  - contra Uza
  lexicon: HALOT
  rationale: Con el verbo de irrupción, «contra» expresa claramente el blanco de la acción divina en español y evita una formulación menos natural como «sobre».
- source_word: וַיִּקְרָא לַמָּקוֹם הַהוּא
  english_pob_choice: so he called that place
  chosen_spanish: y llamó a aquel lugar
  alternatives_spanish:
  - y nombró aquel lugar
  - y puso por nombre a aquel lugar
  lexicon: HALOT
  rationale: La fórmula de nombramiento se traduce de modo directo y bíblico. «Llamó a aquel lugar» reproduce bien el hebreo y es claro en español.
- source_word: פֶּרֶץ עֻזָּא
  english_pob_choice: Perez-uzza
  chosen_spanish: Perez-uzza
  alternatives_spanish:
  - Brecha de Uzza
  - Irrupción de Uzza
  lexicon: HALOT
  rationale: Se conserva el nombre propio transliterado en el texto principal, como en la tradición de nombres bíblicos, mientras el juego de palabras queda indicado en la nota.
- source_word: עַד הַיּוֹם הַזֶּה
  english_pob_choice: to this day
  chosen_spanish: hasta hoy
  alternatives_spanish:
  - hasta el día de hoy
  - hasta este día
  lexicon: HALOT
  rationale: «Hasta hoy» es la forma natural y concisa en español para expresar que el nombre del lugar seguía vigente al momento de escribirse el relato.
theological_decisions:
- issue: Nombre divino del Tetragrámaton
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: Se mantiene la política del proyecto de traducir יְהוָה por el nombre propio divino «Yahvé», evitando la sustitución por un título y preservando la referencia directa al nombre del pacto.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Sentido de la acción divina expresada por פרץ
  english_pob_reading: had broken out against Uzza
  chosen_spanish_reading: había irrumpido contra Uzza
  alternative_spanish_readings:
  - había hecho una brecha contra Uzza
  - había estallado contra Uzza
  rationale: El hebreo no presenta una mera herida física, sino una irrupción/jornada súbita de juicio. «Irrumpido» conserva esa tensión y mantiene el eco semántico con el nombre de lugar Perez-uzza.
  doctrine_reference: Lexical-theological tension in 1 Crónicas 13:11
translation_notes:
  revision_awareness: El audit trail inglés revisó la cláusula para evitar la expresión incómoda «in a breach», quedando «had broken out against Uzza». La versión española sigue esa revisión con «había irrumpido contra Uzza», preservando el paralelismo léxico y el juego de palabras del topónimo.
  spanish_consistency_notes:
  - Se usa «Yahvé» para יְהוָה conforme a la terminología del proyecto.
  - Se conserva «Uzza» y «Perez-uzza» como transliteraciones de nombres propios.
  - «Hasta hoy» refleja el modismo temporal del hebreo sin añadir información interpretativa.
  - No se atenúa el matiz de juicio en el verbo «irrumpió/irrumpido».
