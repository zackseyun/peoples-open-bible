translation:
  language: es
  text: De entre los siervos de Faraón, el que temía la palabra de Yahvé[a] hizo que sus siervos y su ganado se refugiaran rápidamente en las casas[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Quien entre los siervos de Faraón temía la palabra de Yahvé».'
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «hizo huir»; es decir, los puso rápidamente bajo resguardo.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הַיָּרֵא
  english_pob_choice: Whoever ... feared
  chosen_spanish: Cualquiera ... que temía
  alternatives_spanish:
  - El que temía
  - Cualquiera que temía
  lexicon: HALOT
  rationale: El participio con artículo funciona de manera sustantiva para designar a uno dentro de un grupo. En español, «Cualquiera de los ... que temía» conserva ese valor de clase/subconjunto y evita una traducción rígida.
- source_word: דְּבַר יְהוָה
  english_pob_choice: the word of Yahweh
  chosen_spanish: la palabra de Yahvé
  alternatives_spanish:
  - el mensaje de Yahvé
  - la advertencia de Yahvé
  lexicon: HALOT
  rationale: דבר puede significar ‘palabra’ o ‘mensaje’. «Palabra» mantiene el giro bíblico normal y corresponde mejor al objeto temido en el hebreo que una paráfrasis como «advertencia».
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  lexicon: HALOT
  rationale: El texto hebreo usa directamente el Tetragrámaton. La norma del proyecto pide «Yahvé» como forma principal en español para preservar el nombre propio divino, no sustituirlo por un título.
- source_word: מֵעַבְדֵי פַרְעֹה
  english_pob_choice: among Pharaoh’s servants
  chosen_spanish: de los siervos de Faraón
  alternatives_spanish:
  - entre los siervos de Faraón
  - de entre los siervos de Faraón
  lexicon: HALOT
  rationale: 'El hebreo usa מן con valor partitivo: uno perteneciente a un grupo mayor. «De los siervos de Faraón» expresa bien esa pertenencia; en el contexto, «siervos» conserva el término de dependencia del original.'
- source_word: הֵנִיס
  english_pob_choice: hurried
  chosen_spanish: hizo entrar apresuradamente
  alternatives_spanish:
  - apresuró
  - hizo huir
  lexicon: HALOT
  rationale: El hifil de נוּס implica causar que algo se mueva rápidamente o se ponga a salvo. En este contexto, la acción concreta es llevar personas y ganado bajo techo antes del granizo; por eso «hizo entrar apresuradamente» comunica el sentido sin perder la idea de urgencia.
- source_word: עֲבָדָיו
  english_pob_choice: his servants
  chosen_spanish: a sus siervos
  alternatives_spanish:
  - a sus esclavos
  - a sus servidores
  lexicon: HALOT
  rationale: עבד puede ser ‘esclavo’ o ‘siervo’. Aquí el contexto de la casa/administración egipcia favorece «siervos» como término natural y suficientemente fiel, sin imponer una lectura social más dura que la que el pasaje exige.
- source_word: מִקְנֵהוּ
  english_pob_choice: his livestock
  chosen_spanish: su ganado
  alternatives_spanish:
  - sus animales
  - su hacienda ganadera
  lexicon: HALOT
  rationale: מִקְנֶה designa de manera amplia el ganado o los animales domésticos valiosos. «Ganado» es breve, claro y suficientemente general para el español bíblico contemporáneo.
- source_word: אֶל הַבָּתִּים
  english_pob_choice: into the houses
  chosen_spanish: en las casas
  alternatives_spanish:
  - dentro de las casas
  - a las casas
  lexicon: HALOT
  rationale: La construcción indica movimiento hacia resguardo. En español, «en las casas» mantiene naturalidad y el valor locativo-final, sin sonar forzado; el contexto ya comunica la entrada bajo techo.
theological_decisions:
- issue: Traducción del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: El versículo usa el Tetragrámaton directamente, no un título. Se mantiene el nombre propio divino para respetar la decisión editorial del proyecto y conservar la referencia explícita al pacto y a la identidad revelada de Dios.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה / YHWH → Yahvé'
translation_notes:
  revision_awareness: 'Se siguió el pasaje hebreo WLC y el contexto auditado de la POB en inglés, manteniendo las decisiones revisadas: participio sustantivado, valor partitivo de מִן, y el hifil de נוּס con sentido de traslado apresurado a refugio. No se detectaron revisiones posteriores que alteren la lectura base.'
  spanish_consistency_notes:
  - Se conserva «Yahvé» conforme a la terminología del proyecto para יהוה.
  - «Siervos» se usa de manera consistente para עבד cuando el contexto no exige «esclavos».
  - La frase final mantiene el plural «las casas» siguiendo el hebreo.
  - El verbo compuesto «hizo entrar apresuradamente» busca expresar la causatividad de הֵנִיס sin perder naturalidad en español.
