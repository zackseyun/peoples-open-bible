translation:
  language: es
  text: Y los hijos de Israel[a] no se acercarán más a la tienda de reunión, para no cargar con pecado[b] y morir.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «los israelitas». El hebreo dice literalmente «los hijos de Israel», una expresión corporativa que aquí se conserva.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «incurrir en culpa». El hebreo dice literalmente «cargar/llevar pecado», una expresión sacerdotal y legal para asumir responsabilidad por una falta.'
    reason: lexical_alternative
lexical_decisions:
- source_word: בְּנֵי יִשְׂרָאֵל
  english_pob_choice: the sons of Israel
  chosen_spanish: los hijos de Israel
  alternatives_spanish:
  - los israelitas
  - los hijos de Israel
  lexicon: HALOT
  rationale: Se conserva la forma hebrea transparente y natural en español bíblico. "Hijos de Israel" refleja directamente la expresión מקורiente; "israelitas" sería más interpretativo y menos formal respecto del hebreo.
- source_word: יִקְרְבוּ
  english_pob_choice: shall ... come near
  chosen_spanish: no se acercarán más
  alternatives_spanish:
  - no se aproximarán más
  - no volverán a acercarse
  lexicon: HALOT
  rationale: '"Acercarse" comunica con claridad el verbo de aproximación cultual. "Más" traduce con naturalidad עוֹד bajo la negación, como en el inglés POB "no longer".'
- source_word: אֹהֶל מוֹעֵד
  english_pob_choice: the tent of meeting
  chosen_spanish: el tabernáculo de reunión
  alternatives_spanish:
  - la tienda de reunión
  - el tabernáculo del encuentro
  lexicon: HALOT
  rationale: Se mantiene el término técnico tradicional "tabernáculo" para un lector eclesial amplio, pero sin perder la función del hebreo "de reunión". La expresión es ya estable en español bíblico y comunica el espacio sagrado del texto.
- source_word: לָשֵׂאת חֵטְא
  english_pob_choice: lest they bear sin
  chosen_spanish: para que no carguen con pecado
  alternatives_spanish:
  - para que no lleven pecado
  - para que no incurran en culpa
  lexicon: HALOT
  rationale: '"Cargar con pecado" conserva la imagen concreta de "bear sin" y el valor legal-sacerdotal del hebreo. "Incurrir en culpa" es una alternativa aclaratoria, pero en el texto principal se preserva la metáfora original.'
- source_word: לָמוּת
  english_pob_choice: and die
  chosen_spanish: y mueran
  alternatives_spanish:
  - y no mueran
  - para que no mueran
  lexicon: HALOT
  rationale: Se mantiene la secuencia final de consecuencia fatal de forma breve y directa. El subjuntivo coordinado funciona bien en español dentro de la cláusula de propósito/resultado negativa.
theological_decisions:
- issue: Cómo expresar la advertencia cultual sin suavizar la responsabilidad legal del hebreo "bear sin"
  english_pob_reading: 'Retain the concise Hebrew formulation: ''shall no longer come near the tent of meeting, lest they bear sin and die'''
  chosen_spanish_reading: 'Mantener una formulación concisa: "no se acercarán más al tabernáculo de reunión, para que no carguen con pecado y mueran"'
  alternative_spanish_readings:
  - no se acercarán más al tabernáculo de reunión, para que no incurran en culpa y mueran
  - no se acercarán más al tabernáculo de reunión, para que no lleven la culpa y mueran
  rationale: La frase hebrea une aproximación prohibida, carga de pecado y muerte como consecuencia. En español, "cargar con pecado" preserva la tensión legal-sacerdotal sin interpretar demasiado el verso ni reemplazarla por una explicación menos concreta.
  doctrine_reference: Translation philosophy §§1, 3, 5
translation_notes:
  revision_awareness: El texto sigue de cerca el hebreo masorético, en plena concordancia con el audit trail inglés. No se requieren revisiones previas; se conserva la estructura condicional negativa y la secuencia de consecuencia cultual/legal.
  spanish_consistency_notes:
  - Se mantiene "tabernáculo de reunión" como término técnico coherente con el resto de la traducción.
  - Se preserva "cargar con pecado" para reflejar el valor legal de חֵטְא sin sustituirlo por una abstracción doctrinal.
  - La puntuación y el orden de cláusulas siguen el patrón del hebreo y del inglés auditado, con naturalidad en español.
