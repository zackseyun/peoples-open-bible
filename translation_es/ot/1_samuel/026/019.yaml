  text: And now[a], please let my lord the king hear the words of his servant. If Yahweh has stirred you up against me, may he accept an offering; but if it is men, they are cursed before Yahweh, because they have driven me out today from having a share in Yahweh’s inheritance, saying, ‘Go[b], serve other gods.’
  footnotes:
