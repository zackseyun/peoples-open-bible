translation:
  language: es
  text: Pero los beerotitas huyeron a Gitaim y han vivido allí como extranjeros residentes hasta hoy[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «han estado viviendo allí como forasteros hasta hoy».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּבְרְחוּ
  english_pob_choice: fled
  chosen_spanish: huyeron
  alternatives_spanish:
  - escaparon
  - fugaron
  lexicon: HALOT
  rationale: El hebreo וַיִּבְרְחוּ expresa la acción de huir. En español, «huyeron» conserva el valor narrativo de manera natural y directa, sin añadir matices no presentes en el texto.
- source_word: הַבְּאֵרֹתִים
  english_pob_choice: the Beerothites
  chosen_spanish: los beerotitas
  alternatives_spanish:
  - los de Beerot
  - los hombres de Beerot
  lexicon: HALOT
  rationale: Se trata de un gentilicio plural formado a partir de Beerot. «Beerotitas» mantiene el referente étnico/toponímico de forma clara y cercana al patrón español para gentilicios bíblicos.
- source_word: גִּתָּיְמָה
  english_pob_choice: to Gittaim
  chosen_spanish: a Gitaim
  alternatives_spanish:
  - hacia Gitaim
  lexicon: HALOT
  rationale: La he direccional indica movimiento hacia un lugar. En español, la preposición simple «a» comunica bien el destino sin sobrecargar la frase.
- source_word: וַיִּהְיוּ שָׁם
  english_pob_choice: have lived there
  chosen_spanish: han vivido allí
  alternatives_spanish:
  - vivieron allí
  - han estado allí
  lexicon: HALOT
  rationale: El hebreo describe un estado continuado que llega hasta el presente narrativo. El perfecto compuesto español «han vivido» reproduce bien esa continuidad.
- source_word: גָּרִים
  english_pob_choice: as sojourners
  chosen_spanish: como forasteros
  alternatives_spanish:
  - como residentes foráneos
  - como extranjeros residentes
  - como huéspedes
  lexicon: HALOT
  rationale: גָּרִים señala residencia de no nativos, con matiz social de dependencia o extranjería. «Forasteros» conserva esa idea en un español natural; en la nota se ofrece la alternativa más literal «residentes foráneos».
- source_word: עַד הַיּוֹם הַזֶּה
  english_pob_choice: to this day
  chosen_spanish: hasta hoy
  alternatives_spanish:
  - hasta este día
  - hasta el día de hoy
  lexicon: HALOT
  rationale: La expresión temporal hebrea indica continuidad hasta el momento del narrador. «Hasta hoy» es idiomático y fiel al sentido.
- source_word: וַ
  english_pob_choice: But
  chosen_spanish: Pero
  alternatives_spanish:
  - Y
  - Ahora bien
  lexicon: HALOT
  rationale: La conjunción introduce un giro explicativo/contrastivo respecto del contexto anterior. «Pero» reproduce ese matiz mejor que una simple copulativa.
translation_notes:
  revision_awareness: Se siguió la revisión más reciente del audit trail, que prefirió un pasado simple para la huida en hebreo narrativo y mantuvo el valor continuo de la permanencia con perfecto compuesto en inglés; en español se preserva esa misma distinción con «huyeron» / «han vivido».
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como convención general del proyecto, pero este versículo no contiene el nombre divino.
  - «Beerotitas» sigue el patrón de gentilicio bíblico en español y evita una paráfrasis explicativa más larga.
  - «Forasteros» se eligió por su naturalidad; la nota conserva la alternativa más cercana al valor sociológico del participio hebreo.
