translation:
  language: es
  text: Sus mejillas son como canteros de especias, montículos de perfumes[a]; sus labios son lirios, destilando mirra fluida.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «canteros elevados de especias mixtas» para «montículos de perfumes»; el hebreo de esta frase es difícil y puede aludir a lechos elevados o montículos de plantas aromáticas más que a torres literales.
    reason: lexical_alternative
lexical_decisions:
- source_word: לְחָיָו
  english_pob_choice: his cheeks
  chosen_spanish: sus mejillas
  alternatives_spanish:
  - sus mandíbulas
  - su rostro
  lexicon: HALOT
  rationale: En este blason poético, el plural con sufijo masculino se refiere a los lados del rostro; «mejillas» es la equivalencia natural en español y conserva la imagen facial sin volverla demasiado anatómica como «mandíbulas» ni demasiado amplia como «rostro».
- source_word: כַּעֲרוּגַת הַבֹּשֶׂם
  english_pob_choice: like beds of spice
  chosen_spanish: como eras de especias
  alternatives_spanish:
  - como un lecho de bálsamo
  - como un cantero de perfume
  lexicon: HALOT
  rationale: עֲרוּגָה designa un lecho o cantero de jardín; «eras» mantiene esa imagen hortícola de manera natural en español, y «especias» preserva el valor aromático de הַבֹּשֶׂם sin imponer una sola planta concreta.
- source_word: מִגְדְּלוֹת מֶרְקָחִים
  english_pob_choice: mounds of perfumes
  chosen_spanish: montículos de perfumes
  alternatives_spanish:
  - torres de perfumes
  - montones de especias mezcladas
  lexicon: HALOT
  rationale: La expresión hebrea es difícil. Aunque מִגְדְּלוֹת puede sugerir literalmente «torres», el propio audit trail inglés revisado favorece «mounds» por mayor precisión y naturalidad; «montículos» conserva la imagen elevada sin forzar una arquitectura literal. «Perfumes» refleja מֶרְקָחִים como compuestos aromáticos.
- source_word: שִׂפְתוֹתָיו
  english_pob_choice: his lips
  chosen_spanish: sus labios
  alternatives_spanish:
  - sus bordes de la boca
  lexicon: HALOT
  rationale: Equivalencia directa y natural para el plural con sufijo; en español poético «labios» comunica bien la imagen sin perder precisión.
- source_word: שׁוֹשַׁנִּים
  english_pob_choice: lilies
  chosen_spanish: lirios
  alternatives_spanish:
  - azucenas
  - lotos
  lexicon: HALOT
  rationale: El término floral se suele verter como «lirios» en español bíblico y poético. «Azucenas» es posible, pero «lirios» mantiene mejor la amplitud tradicional y la sonoridad del paralelismo.
- source_word: נֹטְפ֖וֹת
  english_pob_choice: dripping
  chosen_spanish: destilando
  alternatives_spanish:
  - gotear de
  - rezumando
  lexicon: HALOT
  rationale: El participio expresa una salida suave y continua del aroma o la sustancia; «destilando» preserva ese fluir delicado en un registro poético claro, sin reducirlo a un goteo demasiado literal.
- source_word: מוֹר
  english_pob_choice: myrrh
  chosen_spanish: mirra
  alternatives_spanish:
  - resina de mirra
  lexicon: HALOT
  rationale: Correspondencia estándar para el aromático resinoso.
- source_word: עֹבֵר
  english_pob_choice: flowing
  chosen_spanish: fluida
  alternatives_spanish:
  - que corre
  - que fluye
  lexicon: HALOT
  rationale: Usado adjetivamente con «mirra», describe una mirra que fluye libremente. «Fluida» conserva la cualidad sensorial en español y evita una construcción menos natural como «que corre».
translation_notes:
  revision_awareness: La versión española sigue la revisión inglesa más reciente que prefirió una imagen de «mounds of perfumes» sobre «towers of perfume» por mayor precisión lexical. Se mantiene la dificultad del hebreo en la nota, sin aplanar el paralelismo poético.
  spanish_consistency_notes:
  - Se usó «Yahvé» como norma del proyecto cuando corresponde, pero este versículo no contiene el nombre divino.
  - Se mantuvo un registro poético moderno y dignificado, evitando calcos mecánicos.
  - «Eras» traduce el campo de עֲרוּגָה con naturalidad agrícola en español bíblico-poético.
  - «Mirra fluida» conserva la tensión semántica de נֹטְפוֹת מוֹר עֹבֵר sin sobreexplicarla.
