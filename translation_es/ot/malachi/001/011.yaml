revisions:
- from: Porque desde el nacimiento del sol hasta su ocaso[a], grande es mi nombre entre las naciones[b], y en todo lugar se ofrece incienso, y se presenta una ofrenda pura[d], a mi nombre; porque grande es mi nombre entre las naciones[c], dice Yahvé de los ejércitos.
  to: Porque desde la salida del sol hasta su ocaso[a], grande es mi nombre entre las naciones[b], y en todo lugar se ofrece incienso y se presenta una ofrenda pura[d] a mi nombre; porque grande es mi nombre[c] entre las naciones, dice Yahvé de los ejércitos.
  rationale: Se corrige 'nacimiento del sol' a 'salida del sol' por fidelidad idiomática al hebreo y mejor español. Se alisa la sintaxis de la cláusula central quitando la coma antes de 'a mi nombre'. Se conserva la estructura, la ambigüedad temporal, el vocabulario sacrificial y la terminología del proyecto.
