    rationale: Todo el aparato español explica ἄκουσον, τέκνον, etc., pero el estado final auditado adopta la línea hebrea/imaginativa. Debe ajustarse el texto español a esa base final, sin necesidad de reproducir aquí nuevas notas textuales si el versículo español final solo presenta la lectura vigente.
  - severity: low
