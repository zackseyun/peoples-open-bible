  verdict: revise
  source_alignment_summary: 'El borrador español transmite correctamente la estructura genealógica del hebreo: «Los hijos de Sem» seguido por la lista de nombres, y preserva bien las decisiones clave de sentido como nombres personales «Asur» y «Aram» en vez de entidades geográficas. También conserva adecuadamente la nota sobre la variante paralela de Génesis 10:23 para מֶשֶׁךְ.'
  spanish_quality_summary: El texto es claro y natural en español bíblico moderno. Sin embargo, «Arpajsad» no refleja bien la forma hebrea אַרְפַּכְשַׁד ni la decisión auditada inglesa «Arpachshad»; la forma española más fiel a esa base es «Arpacsad». El resto de la puntuación y fluidez son satisfactorias.
  glossary_alignment: No hay términos teológicos de glosario mayor en este versículo. En nombres propios, «Sem», «Elam», «Asur», «Lud», «Aram», «Uz», «Hul», «Geter» y «Mesec» son compatibles con un español bíblico legible. La única desalineación relevante es «Arpajsad», que introduce una consonante ajena a la transliteración hebrea documentada.
  issues:
  - severity: medium
    issue: «Arpajsad» es una transliteración deficiente de אַרְפַּכְשַׁד.
    rationale: La auditoría inglesa eligió «Arpachshad» para reflejar más directamente el hebreo frente a la forma tradicional «Arphaxad». En español, «Arpajsad» no preserva adecuadamente el grupo consonántico y parece una adaptación inconsistente; «Arpacsad» refleja mejor la base hebrea y la decisión lexical documentada.
  revised_spanish_text: 'Los hijos de Sem: Elam[a], Asur, Arpacsad, Lud y Aram; Uz, Hul, Geter y Mesec.'
