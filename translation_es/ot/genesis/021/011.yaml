translation:
  language: es
  text: El asunto fue muy desagradable a los ojos de Abraham[a], a causa de su hijo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «El asunto fue muy malo a los ojos de Abraham con respecto a su hijo».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֵּרַע
  english_pob_choice: was very displeasing
  chosen_spanish: fue muy desagradable
  alternatives_spanish:
  - fue muy mala
  - fue muy penosa
  - le pareció muy mal
  lexicon: HALOT
  rationale: El verbo en Qal con valor idiomático junto a בְּעֵינֵי expresa que algo resultó malo o desagradable para alguien. «Desagradable» comunica bien la evaluación negativa sin forzar «malo» en español, que puede sonar demasiado genérico o moralizante.
- source_word: הַדָּבָר
  english_pob_choice: the matter
  chosen_spanish: la cosa
  alternatives_spanish:
  - el asunto
  - el hecho
  - este asunto
  lexicon: HALOT
  rationale: 'דָּבָר tiene un rango amplio: ''palabra, cosa, asunto''. En este contexto apunta a la propuesta/pedido previo. «La cosa» mantiene la amplitud del hebreo; en español, «el asunto» también sería viable, pero «la cosa» conserva mejor la vaguedad deliberada del original.'
- source_word: מְאֹד
  english_pob_choice: very
  chosen_spanish: muy
  alternatives_spanish:
  - en gran manera
  - sumamente
  - mucho
  lexicon: HALOT
  rationale: Intensificador estándar; «muy» es natural y preserva la fuerza del adverbio sin elevar el registro.
- source_word: בְּעֵינֵי
  english_pob_choice: in Abraham’s eyes
  chosen_spanish: a los ojos de Abraham
  alternatives_spanish:
  - ante Abraham
  - en la opinión de Abraham
  - a Abraham
  lexicon: HALOT
  rationale: 'La imagen hebrea de ''en los ojos de'' se conserva en español con una expresión igualmente idiomática. Mantiene el matiz evaluativo: no solo cómo se sintió Abraham, sino cómo se le presentó la situación.'
- source_word: עַל אֹדוֹת
  english_pob_choice: on account of
  chosen_spanish: a causa de
  alternatives_spanish:
  - con respecto a
  - acerca de
  - por causa de
  lexicon: HALOT
  rationale: La frase introduce la razón del disgusto. «A causa de» refleja con claridad el valor causal de la construcción y funciona de manera natural en español formal.
- source_word: בְּנוֹ
  english_pob_choice: his son
  chosen_spanish: su hijo
  alternatives_spanish:
  - su hijo varón
  - su descendiente
  - su muchacho
  lexicon: HALOT
  rationale: בן significa específicamente 'hijo'. «Su hijo» preserva la relación familiar y la precisión del sustantivo sin añadir connotaciones no presentes en el texto.
translation_notes:
  revision_awareness: 'La redacción sigue de cerca el hebreo y la trayectoria auditada en inglés: se conserva la valoración negativa de וַיֵּרַע, la amplitud de הַדָּבָר, la imagen de בְּעֵינֵי y la relación causal de עַל אֹדוֹת. Se evitó traducir mecánicamente desde el inglés, pero se tomó su decisión revisada sobre la relación causal como apoyo para elegir una fórmula española natural.'
  spanish_consistency_notes:
  - Se mantiene 'a los ojos de' como equivalente idiomático de בְּעֵינֵי, en línea con el principio del POB de conservar imágenes fuente cuando resultan naturales.
  - '''Cosa'' se usó para reflejar la amplitud de דָּבָר; en una nota se ofrece ''mala'' como alternativa porque el hebreo permite tanto la valoración moral como la evaluación de desagrado, y el contexto favorece esta última.'
  - Se evitó 'SEÑOR' y otras sustituciones no pertinentes porque el versículo no contiene el nombre divino.
  - '''Hijo'' se conservó sin neutralizar el parentesco, ya que el hebreo especifica בן.'
