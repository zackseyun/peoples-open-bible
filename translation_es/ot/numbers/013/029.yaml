revisions:
- from: Amalec habita en la tierra del Négueb[a], y los hititas, los jebuseos y los amorreos habitan en la región montañosa[b], y los cananeos habitan junto al mar y junto al Jordán[c].
  to: Amalec habita[a] en la tierra del Négueb[b], y los hititas, los jebuseos y los amorreos habitan en la región montañosa, y los cananeos habitan junto al mar y a lo largo del Jordán[c].
  rationale: Se añadió la nota léxica faltante para יוֹשֵׁב, se mantuvo la nota sobre «Négueb» y se ajustó la última frase a «a lo largo del Jordán» para reflejar mejor el modismo hebreo עַל יַד, con notas simplificadas y alineadas con el audit trail inglés.
