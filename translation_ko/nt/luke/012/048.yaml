  text: 「알지 못하고 매 맞을 일을 한 자는 적게 맞을 것이다. 많이 받은 자에게는 많이 요구할 것이요, 많이 맡긴 자에게는 더 많이 요구할 것이다.」
  philosophy: optimal-equivalence
