    reason: lexical_alternative
  - marker: b
    text: El verbo hebreo literalmente significa "sube" o "asciende"; la imagen puede ser la de una espina que es alzada, blandida o que se mete en la mano del borracho de manera peligrosa y descontrolada.
    reason: lexical_alternative
