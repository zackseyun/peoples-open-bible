    rationale: La justificación documentada del POB para este término fue conservar en el texto principal la imagen hebrea menos explícita («bandas/rangos/tropas de fuego») y reservar «carro/caballos de fuego» para la nota griega. El borrador contradice esa decisión.
  - severity: high
    issue: Se pierde el valor de מעלה y שמים al integrarlos en «fue levantado»
    rationale: La evidencia y las decisiones léxicas documentan un sentido de ascenso hacia lo alto/los cielos. El español actual no expresa claramente ese elemento, pese a que el expediente lo considera significativo.
  - severity: medium
