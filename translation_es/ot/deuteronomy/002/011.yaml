translation:
  language: es
  text: Ellos también eran considerados Refaím[a], como los anaceos; y los moabitas los llaman Emim.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O “gigantes” para “Refaím”, aunque el hebreo preserva más naturalmente el nombre de un antiguo grupo étnico.
    reason: lexical_alternative
lexical_decisions:
- source_word: רְפָאִים
  english_pob_choice: Rephaim
  chosen_spanish: refaítas
  alternatives_spanish:
  - Rephaim
  - gigantes
  lexicon: HALOT
  rationale: La POB en inglés conserva el etnónimo para no reducirlo a una interpretación demasiado específica. En español, “refaítas” mantiene esa categoría de pueblo antiguo; “gigantes” queda como alternativa interpretativa, pero es menos precisa para el texto principal.
- source_word: יֵחָשְׁבוּ
  english_pob_choice: were considered
  chosen_spanish: se les consideraba
  alternatives_spanish:
  - eran considerados
  - se los contaba
  lexicon: HALOT
  rationale: El nifal expresa que eran tenidos por o clasificados como tales. “Se les consideraba” conserva bien ese valor pasivo y suena natural en español actual.
- source_word: אַף הֵם
  english_pob_choice: they too
  chosen_spanish: también
  alternatives_spanish:
  - ellos también
  - incluso ellos
  lexicon: HALOT
  rationale: El hebreo añade énfasis inclusivo. En español, “también” comunica ese valor de manera breve y fiel sin añadir matices ajenos.
- source_word: כָּעֲנָקִים
  english_pob_choice: like the Anakim
  chosen_spanish: como los anaceos
  alternatives_spanish:
  - como los anakitas
  - como los anaceos
  lexicon: HALOT
  rationale: Se conserva el nombre de este grupo antiguo mediante transliteración adaptada al español. “Como los anaceos” refleja la comparación explícita del hebreo; “anakitas” sería una alternativa menos tradicional en español bíblico.
- source_word: וְהַמּוֹאָבִים
  english_pob_choice: but the Moabites
  chosen_spanish: y los moabitas
  alternatives_spanish:
  - pero los moabitas
  - y los moabitas
  lexicon: HALOT
  rationale: El waw permite “y”; no es necesario cargarlo con una oposición explícita en el texto principal. La relación discursiva se entiende por el cambio de sujeto y la segunda cláusula.
- source_word: יִקְרְאוּ לָהֶם
  english_pob_choice: call them
  chosen_spanish: los llaman
  alternatives_spanish:
  - los nombran
  - los llaman
  lexicon: HALOT
  rationale: El hebreo usa el verbo de llamar/nombrar. “Los llaman” es la forma más natural y directa en español para este uso denominativo.
- source_word: אֵמִים
  english_pob_choice: Emim
  chosen_spanish: emitas
  alternatives_spanish:
  - Emim
  - emitas
  lexicon: HALOT
  rationale: 'Se adapta el etnónimo al plural español para lectura pública: “emitas”. Esto mantiene el valor de nombre propio de grupo; la forma sin adaptar queda como alternativa posible.'
translation_notes:
  revision_awareness: 'Se siguió el audit trail en inglés sin depender mecánicamente de él: se preserva el etnónimo Rephaim y el valor comparativo de ‘like the Anakim’, mientras que el conector de la segunda cláusula se ajustó a un español más natural. No hubo revisiones posteriores que alteraran el sentido base.'
  spanish_consistency_notes:
  - 'Se mantuvo una transliteración adaptada para los nombres de pueblos antiguos: refaítas, anaceos, emitas.'
  - Se evitó ‘SEÑOR’ o equivalentes porque el versículo no contiene el nombre divino.
  - El paralelismo semántico de las dos cláusulas se conserva sin sobreinterpretar la conjunción waw.
