translation:
  language: es
  text: Te dispersaré entre las naciones y te esparciré por las tierras, y purgaré de ti tu impureza[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «quitaré de ti tu impureza» o «pondré fin a tu contaminación en ti».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַהֲפִיצוֹתִי
  english_pob_choice: I will scatter
  chosen_spanish: te dispersaré
  alternatives_spanish:
  - te esparciré
  - te scatteré
  lexicon: HALOT
  rationale: En el contexto de juicio y exilio, el verbo comunica dispersión forzada. «Dispersaré» conserva bien la fuerza semántica y evita una repetición innecesaria en español con el segundo verbo.
- source_word: בַּגּוֹיִם
  english_pob_choice: among the nations
  chosen_spanish: entre las naciones
  alternatives_spanish:
  - entre los pueblos
  - entre los gentiles
  lexicon: HALOT
  rationale: «Naciones» es la equivalencia más directa y menos cargada interpretativamente para גּוֹיִם en este contexto de exilio.
- source_word: וְזֵרִיתִיךְ
  english_pob_choice: and disperse you
  chosen_spanish: y te esparciré
  alternatives_spanish:
  - y te dispersaré
  - y te aventaré
  lexicon: HALOT
  rationale: Como paralelo del primer verbo, «esparciré» mantiene la imagen de dispersión y evita un sonido demasiado técnico. También conserva la tensión poética del hebreo, que usa dos verbos cercanos sin necesidad de diferenciarlos de manera artificial en español.
- source_word: בָּאֲרָצוֹת
  english_pob_choice: through the lands
  chosen_spanish: por las tierras
  alternatives_spanish:
  - por los países
  - a través de las tierras
  lexicon: HALOT
  rationale: «Tierras» refleja el plural hebreo y, con «por», expresa la amplitud de la dispersión. «Países» sería posible, pero suena más moderno-administrativo.
- source_word: וַהֲתִמֹּתִי
  english_pob_choice: and I will purge
  chosen_spanish: purgaré
  alternatives_spanish:
  - eliminaré por completo
  - pondré fin a
  lexicon: HALOT
  rationale: El hebreo puede significar llevar a término o remover completamente; aquí, en combinación con טֻמְאָה, «purgaré» transmite la idea de quitar la impureza mediante juicio sin perder el matiz de limpieza resultante.
- source_word: טֻמְאָתֵךְ
  english_pob_choice: your uncleanness
  chosen_spanish: tu impureza
  alternatives_spanish:
  - tu inmundicia
  - tu contaminación
  lexicon: HALOT
  rationale: «Impureza» preserva el registro bíblico de טֻמְאָה sin cargar el término con una sola esfera (ritual o moral). Es la opción más transparente y natural en español contemporáneo eclesial.
- source_word: מִמֵּךְ
  english_pob_choice: from you
  chosen_spanish: de ti
  alternatives_spanish:
  - de en medio de ti
  - fuera de ti
  lexicon: HALOT
  rationale: «De ti» es la forma más directa y natural en español para expresar la remoción desde el sujeto dirigido.
theological_decisions:
- issue: Purificación mediante juicio/exilio
  english_pob_reading: The line is rendered as removal of Jerusalem's uncleanness through exile-judgment, without specifying whether the cleansing is primarily moral, ritual, or metaphorical.
  chosen_spanish_reading: La línea se traduce como una remoción de la impureza de Jerusalén mediante el juicio del exilio, sin precisar si la limpieza es ante todo moral, ritual o metafórica.
  alternative_spanish_readings:
  - Te consumiré por tu impureza
  - Te mostraré limpio de ti
  - Eliminaré tu contaminación
  rationale: 'El hebreo presenta una tensión teológica: el castigo dispersa, pero también elimina la impureza. La formulación española conserva esa tensión sin resolverla doctrinalmente ni reinterpretarla en términos ajenos al texto.'
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: Se siguió el paquete fuente hebreo y el audit trail inglés, sin cambios detectados en la revisión más reciente; la concordancia general es alta y el sentido quedó estable.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» solo cuando aparezca el nombre divino; este versículo no lo contiene.
  - «Naciones» y «tierras» conservan el paralelismo geográfico del hebreo.
  - «Impureza» se eligió para טֻמְאָה por ser más neutral que «inmundicia» y más natural que un tecnicismo ritual.
  - La duplicación verbal de dispersión se preservó con sinónimos cercanos («dispersaré» / «esparciré») para reflejar el paralelismo hebreo sin sonar forzado.
