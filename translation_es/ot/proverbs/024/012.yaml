source:
  edition: WLC
  text: כִּֽי תֹאמַ֗ר הֵן֮ לֹא יָדַ֪עְנ֫וּ זֶ֥ה הֲֽ/לֹא תֹ֘כֵ֤ן לִבּ֨וֹת הֽוּא יָבִ֗ין וְ/נֹצֵ֣ר נַ֭פְשְׁ/ךָ ה֣וּא יֵדָ֑ע וְ/הֵשִׁ֖יב לְ/אָדָ֣ם כְּ/פָעֳלֽ/וֹ־־־׀־׃
base_translation:
  language: en
  yaml_path: translation/ot/proverbs/024/012.yaml
  text: If you say[a], “Look, we did not know this,” does not he who weighs hearts understand, and he who keeps your soul know[e][d][c][b], and will he not repay a man according to his work?
  footnotes:
  - marker: a
    text: Or “we knew nothing of this.”
    reason: lexical_alternative
  - marker: b
    text: Hebrew “he who weighs hearts,” an image of God examining inner motives.
    reason: cultural_note
  - marker: c
    text: Or “he who guards your life.” Hebrew nephesh can mean “soul,” “life,” or “self,” depending on context.
    reason: lexical_alternative
  - marker: d
    text: Hebrew “a man,” used here in a generic sense for a human being.
    reason: lexical_alternative
  - marker: e
    text: Or “according to what he has done.”
    reason: lexical_alternative
