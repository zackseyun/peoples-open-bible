revisions:
- from: Pero Judas[a], que también era llamado Macabeo, habiéndose convertido en uno de unos diez y habiéndose retirado, vivía en los montes como una fiera, con los que estaban con él, y seguían alimentándose de vegetación para no participar en la contaminación.
  to: Pero Judas[a], también llamado Macabeo, habiendo quedado como uno de unos diez y habiéndose retirado, vivía en los montes como una fiera con los que estaban con él, y seguían alimentándose de alimento vegetal para no participar en la impureza.
  rationale: La revisión mantiene el contenido del original y del POB en inglés, pero mejora la naturalidad y precisión religiosa del español. «También llamado» sustituye una construcción más rígida; «habiendo quedado como uno de unos diez» expresa mejor el estado reducido del grupo; «alimento vegetal» comunica el sentido alimentario de χορτώδη τροφή con más claridad que «vegetación»; e «impureza» representa μολυσμός de forma más natural en contexto cultual-moral.
  reviewer_model: gpt-5.4
