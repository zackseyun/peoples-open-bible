translation:
  language: es
  text: Y el número de sus fuerzas era de cien mil soldados de a pie, y veinte mil jinetes[a], y treinta y dos elefantes entrenados para la guerra[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literalmente, «veinte mil de los caballos»; el griego probablemente usa «caballos» metonímicamente para tropas montadas.
    reason: lexical_alternative
  - marker: b
    text: Literalmente, «elefantes que sabían de guerra», es decir, elefantes entrenados o experimentados para el combate.
    reason: lexical_alternative
