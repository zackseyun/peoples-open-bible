    reason: lexical_alternative
  - marker: b
    text: '''Casas paternas'' se refiere a las unidades familiares ancestrales o clanes dentro de Israel.'
    reason: cultural_note
  - marker: c
    text: O 'los contados' / 'los registrados'. La expresión hebrea se refiere a los que habían sido inscritos en el censo.
    reason: lexical_alternative
  revision_rationale: Se corrige el verbo principal para reflejar la valencia causativa del hebreo y la decisión auditada del POB de no convertirlo en simple movimiento personal. También se mejora la naturalidad y claridad del cierre con 'los censados', preservando el trasfondo del censo. Se añaden notas equivalentes a las del rastro inglés y una nota cultural para 'casas paternas'.
