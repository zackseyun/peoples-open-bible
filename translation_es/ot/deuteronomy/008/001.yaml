translation:
  language: es
  text: Cumplirán cuidadosamente todo mandamiento[a] que yo les ordeno hoy, para que vivan, se multipliquen, entren y posean[b] la tierra que Yahvé juró a sus padres[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'todo el mandamiento'. El hebreo usa una expresión singular colectiva.
    reason: lexical_alternative
  - marker: b
    text: O 'hereden'. El verbo hebreo puede llevar el sentido de heredar o de tomar posesión, según el contexto.
    reason: lexical_alternative
  - marker: c
    text: Hebreo 'sus padres', refiriéndose a los antepasados patriarcales de Israel.
    reason: lexical_alternative
lexical_decisions:
- source_word: כָּל הַמִּצְוָה
  english_pob_choice: every commandment
  chosen_spanish: todo el mandamiento
  alternatives_spanish:
  - cada mandamiento
  - todo el conjunto de mandamientos
  lexicon: HALOT
  rationale: El hebreo usa una construcción singular colectiva. En español, 'todo el mandamiento' conserva esa unidad colectiva sin perder el alcance total; 'cada mandamiento' distribuiría demasiado el sentido, y 'el conjunto de mandamientos' añade una abstracción no explícita.
- source_word: מְצַוְּךָ
  english_pob_choice: I am commanding you
  chosen_spanish: yo os mando
  alternatives_spanish:
  - yo os estoy mandando
  - yo os mando hoy
  lexicon: HALOT
  rationale: El participio hebreo expresa una acción en curso o inmediata. En español, 'yo os mando' comunica de forma natural la fuerza presente del mandato sin sonar forzado; el plural 'os' mantiene el cambio de singular a plural del hebreo como una apelación corporativa a Israel.
- source_word: תִּשְׁמְרוּן לַעֲשׂוֹת
  english_pob_choice: you shall carefully keep ...
  chosen_spanish: guardaréis cuidadosamente
  alternatives_spanish:
  - guardaréis
  - observaréis cuidadosamente
  - guardaréis para hacer
  lexicon: HALOT
  rationale: שׁמר en contextos del pacto implica guardar con atención y fidelidad. 'Guardaréis cuidadosamente' reproduce esa fuerza mejor que un simple 'guardaréis'; el infinitivo 'para hacer' se integra de modo natural en español sin necesidad de una calca literal.
- source_word: לְמַעַן תִּחְיוּן
  english_pob_choice: so that you may live
  chosen_spanish: para que viváis
  alternatives_spanish:
  - para que podáis vivir
  - a fin de que viváis
  lexicon: HALOT
  rationale: La frase marca propósito/resultadо. 'Para que viváis' es natural y mantiene la relación causal-final del hebreo; 'podáis vivir' añade una modalidad no expresada explícitamente.
- source_word: וּרְבִיתֶם
  english_pob_choice: and multiply
  chosen_spanish: y seáis multiplicados
  alternatives_spanish:
  - y multipliquéis
  - y crezcáis en número
  lexicon: HALOT
  rationale: El verbo expresa aumento numérico dentro del lenguaje de bendición del pacto. 'Seáis multiplicados' conserva la forma pasiva/medio del hebreo y su resonancia bíblica; 'multipliquéis' haría al sujeto demasiado activo para este contexto.
- source_word: וּבָאתֶם
  english_pob_choice: and enter
  chosen_spanish: y entréis
  alternatives_spanish:
  - y entréis en
  - y lleguéis
  lexicon: HALOT
  rationale: En el contexto de la tierra prometida, 'entréis' es la forma más directa y clara en español. Mantiene el movimiento hacia el territorio sin añadir una preposición innecesaria.
- source_word: וִירִשְׁתֶּם
  english_pob_choice: and possess
  chosen_spanish: y poseáis
  alternatives_spanish:
  - y heredéis
  - y toméis posesión de
  lexicon: HALOT
  rationale: ירשׁ puede significar heredar o tomar posesión. Aquí el foco está en recibir y ocupar la tierra prometida; 'poseáis' conserva la idea de posesión efectiva sin restringirla a un matiz jurídico de herencia.
- source_word: הָאָרֶץ
  english_pob_choice: the land
  chosen_spanish: la tierra
  alternatives_spanish:
  - el país
  - la tierra prometida
  lexicon: HALOT
  rationale: En Deuteronomio, 'la tierra' es la expresión covenantal estándar para la tierra prometida. 'La tierra prometida' explicita demasiado; 'el país' debilita la resonancia bíblica.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  - el SEÑOR
  lexicon: HALOT
  rationale: El nombre divino se translitera en español como 'Yahvé', conforme al criterio del proyecto. Esto preserva el Tetragrama como nombre propio y evita la sustitución por un título.
- source_word: נִשְׁבַּע
  english_pob_choice: swore
  chosen_spanish: juró
  alternatives_spanish:
  - juró con juramento
  - hizo un juramento
  lexicon: HALOT
  rationale: El verbo hebreo expresa juramento solemne en contexto de pacto. 'Juró' es la forma española más natural y fiel; 'prometió' debilitaría la fuerza del juramento.
- source_word: לַאֲבֹתֵיכֶם
  english_pob_choice: to your fathers
  chosen_spanish: a vuestros padres
  alternatives_spanish:
  - a vuestros antepasados
  - a vuestros patriarcas
  lexicon: HALOT
  rationale: El hebreo dice literalmente 'a vuestros padres'. Se conserva esa formulación por fidelidad al término masculino del texto, entendiendo el referente como los antepasados patriarcales de Israel.
theological_decisions:
- issue: Nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - el SEÑOR
  rationale: El texto hebreo usa directamente el Tetragrama. En español, 'Yahvé' mantiene el nombre propio del pacto y sigue la convención del proyecto, evitando la sustitución litúrgica por 'el SEÑOR'.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Kinship term masculino לַאֲבֹתֵיכֶם
  english_pob_reading: to your fathers
  chosen_spanish_reading: a vuestros padres
  alternative_spanish_readings:
  - a vuestros antepasados
  - a vuestros padres y madres
  rationale: La forma hebrea es masculina plural y el POB en inglés la conserva como 'fathers'. En español se mantiene 'padres' para reflejar con precisión el término del texto, aunque el referente histórico sean los patriarcas de Israel.
  doctrine_reference: DOCTRINE.md Translation philosophy §4
translation_notes:
  revision_awareness: No se aplicaron revisiones posteriores al último pase; el estado de revisión indica que no hubo cambios necesarios. Se ha mantenido la lectura de 'cada/todo el mandamiento' como singular colectivo y la de 'Yahvé' para el nombre divino, en continuidad con el audit trail en inglés.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' para יְהוָה, conforme a la terminología del proyecto.
  - Se conserva la referencia masculina 'vuestros padres' para לַאֲבֹתֵיכֶם, sin neutralizar el término.
  - Se traduce שׁמר con un matiz de cuidado/fidelidad covenantal.
  - Se usa 'tierra' para הָאָרֶץ, con resonancia de la tierra prometida.
  - 'La secuencia verbal conserva el paralelismo del hebreo: vivir, multiplicarse, entrar y poseer.'
