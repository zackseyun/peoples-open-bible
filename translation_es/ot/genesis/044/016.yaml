revisions:
- from: 'Y Judá dijo[a]: «¿Qué diremos a mi señor? ¿Qué hablaremos? ¿O cómo nos justificaremos? Dios ha hallado la culpa[b] de tus esclavos. Aquí estamos, esclavos de mi señor, tanto nosotros como aquel en cuya mano fue hallada la copa».'
  to: 'Y Judá dijo[a]: «¿Qué diremos a mi señor? ¿Qué hablaremos? ¿O cómo nos justificaremos? Dios ha hallado la culpa[b] de tus siervos[c]. Aquí estamos, esclavos de mi señor, tanto nosotros como aquel en cuya mano fue hallada la copa».'
  rationale: Se revisa para reflejar mejor el matiz contextual de la primera ocurrencia de עבד como tratamiento deferente («tus siervos») y para conservar la segunda como «esclavos», donde el texto expresa sometimiento real. Se añade la nota correspondiente para mantener la justificación lexical presente en la auditoría inglesa. El resto del verso puede mantenerse tal como está por su cercanía al hebreo y buena legibilidad.
