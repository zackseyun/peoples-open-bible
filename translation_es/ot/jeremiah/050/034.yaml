translation:
  language: es
  text: Su Redentor es fuerte[a]; Yahvé de los Ejércitos[b] es su nombre. Ciertamente defenderá su causa[c], para dar descanso[d] a la tierra y traer inquietud a los habitantes de Babilonia.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O «su pariente-redentor». El término hebreo lleva matices familiares y legales: uno que redime o vindica a un pariente.'
    reason: lexical_alternative
  - marker: b
    text: 'Alternativa más tradicional: «Yahvé de las Huestes».'
    reason: lexical_alternative
  - marker: c
    text: O «ciertamente contenderá por su causa». El hebreo usa un término legal repetido para dar énfasis.
    reason: lexical_alternative
  - marker: d
    text: «La tierra» también puede entenderse como «el país».
    reason: alternative_reading
lexical_decisions:
- source_word: גֹּאֲלָם
  english_pob_choice: their Redeemer
  chosen_spanish: Su Redentor
  alternatives_spanish:
  - su rescatador
  - el redentor de ellos
  - su pariente-redentor
  lexicon: HALOT
  rationale: גאל designa a quien actúa como redentor o vindicador, con matiz familiar-jurídico en muchos contextos. «Redentor» comunica bien esa función en español bíblico y suena natural sin sobrecargar el texto; «pariente-redentor» explicita más el trasfondo legal-familiar, pero aquí resulta más técnico de lo necesario.
- source_word: חָזָק
  english_pob_choice: strong
  chosen_spanish: fuerte
  alternatives_spanish:
  - poderoso
  - robusto
  lexicon: HALOT
  rationale: El adjetivo expresa fuerza o poder. «Fuerte» es directo y claro en español, y conserva la afirmación breve del hebreo.
- source_word: יְהוָה צְבָאוֹת
  english_pob_choice: the LORD of Armies
  chosen_spanish: Yahvé de los Ejércitos
  alternatives_spanish:
  - Yahvé de las Armadas
  - Yahvé de los Ejércitos celestiales
  lexicon: HALOT
  rationale: Se mantiene el nombre divino como «Yahvé» según la norma del proyecto. צְבָאוֹת se vierte como «de los Ejércitos» para conservar la fórmula estable y el matiz bélico/divino; «Hosts» no es transparente en español moderno.
- source_word: שְׁמוֹ
  english_pob_choice: is his name
  chosen_spanish: es su nombre
  alternatives_spanish:
  - así se llama
  - ese es su nombre
  lexicon: HALOT
  rationale: Es una fórmula nominal hebrea convencional. «Es su nombre» es fiel, breve y natural en español bíblico.
- source_word: רִיב יָרִיב אֶת רִיבָם
  english_pob_choice: He will surely plead their case
  chosen_spanish: Sin duda pleiteará su pleito
  alternatives_spanish:
  - defenderá con certeza su causa
  - ciertamente contendrá por su causa
  lexicon: HALOT
  rationale: El verbo y el sustantivo de ריב evocan disputa legal y contención forense. «Pleiteará su pleito» conserva ese campo semántico y refleja la intensificación del infinitivo absoluto con el verbo finito; «defenderá su causa» suaviza un poco el matiz jurídico.
- source_word: לְמַעַן
  english_pob_choice: so that
  chosen_spanish: para
  alternatives_spanish:
  - a fin de que
  - con el propósito de
  lexicon: HALOT
  rationale: Marca propósito/resultado. En esta cláusula final, «para» expresa bien la relación causal-final en español sin añadir solemnidad innecesaria.
- source_word: הִרְגִּיעַ אֶת הָאָרֶץ
  english_pob_choice: give rest to the earth
  chosen_spanish: dar descanso a la tierra
  alternatives_spanish:
  - dar reposo a la tierra
  - traer quietud a la tierra
  lexicon: HALOT
  rationale: El hifil de רגע significa causar reposo o quietud. «Dar descanso» conserva la idea causativa y es idiomático; se mantiene «la tierra» como opción viable del hebreo, en contraste con los habitantes de Babilonia.
- source_word: וְהִרְגִּיז
  english_pob_choice: bring unrest
  chosen_spanish: poner inquietud
  alternatives_spanish:
  - causar inquietud
  - traer disturbio
  - ponerlos en agitación
  lexicon: HALOT
  rationale: El verbo expresa causar perturbación, agitación o temblor. «Poner inquietud» mantiene el contraste retórico con «dar descanso» y suena natural en español formal.
- source_word: לְיֹשְׁבֵי בָבֶל
  english_pob_choice: to the inhabitants of Babylon
  chosen_spanish: a los habitantes de Babilonia
  alternatives_spanish:
  - a los moradores de Babilonia
  - sobre los habitantes de Babilonia
  lexicon: HALOT
  rationale: Es una expresión estándar para el conjunto de los que habitan un lugar. «Habitantes de Babilonia» es claro y suficientemente formal.
theological_decisions:
- issue: Nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: El texto hebreo usa directamente el Tetragrámaton. En la línea del proyecto, se conserva el nombre propio divino como «Yahvé» y no se lo enmascara con un título tradicional.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Fórmula divina צְבָאוֹת
  english_pob_reading: of Armies
  chosen_spanish_reading: de los Ejércitos
  alternative_spanish_readings:
  - de los Ejércitos celestiales
  - de las Huestes
  rationale: «Ejércitos» comunica con mayor transparencia el trasfondo concreto del título que «Huestes», sin perder la fuerza del apelativo divino-guerrero.
  doctrine_reference: DOCTRINE.md Translation philosophy §1, §5
- issue: Alcance de הָאָרֶץ
  english_pob_reading: the earth
  chosen_spanish_reading: la tierra
  alternative_spanish_readings:
  - el país
  - la tierra/país
  rationale: En este contexto poético-judicial, «la tierra» mantiene abierta la amplitud del hebreo y deja el contraste con Babilonia sin reducirlo innecesariamente a un territorio local.
  doctrine_reference: DOCTRINE.md Translation philosophy §1, §5
translation_notes:
  revision_awareness: La revisión inglesa más reciente suavizó la segunda cola de la línea final de «bring agitation» a «bring unrest» para mantener el contraste con «give rest». En español se reflejó ese ajuste con «poner inquietud», que conserva el paralelismo semántico con «dar descanso» y evita un calco demasiado áspero.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» conforme al estándar del proyecto para יהוה.
  - Se prefirió «de los Ejércitos» para צְבָאוֹת siguiendo una estrategia transparente y no enmascarada.
  - «Pleiteará su pleito» conserva el énfasis forense del hebreo y evita reducir ריב a una mera defensa genérica.
  - «La tierra» deja abierta la posible amplitud de הָאָרֶץ sin forzar una lectura exclusiva.
