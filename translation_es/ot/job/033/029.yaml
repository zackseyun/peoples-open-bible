lexical_decisions:
- source_word: הֶן
  english_pob_choice: Look
  chosen_spanish: ¡Mira!
  alternatives_spanish:
  - Mira
  - Miren
  - ¡Miren!
  lexicon: HALOT
  rationale: La partícula deíctica introduce la afirmación con énfasis. «¡Mira!» mantiene ese valor de atención inmediata en un español natural y digno, mejor que una forma más arcaica.
- source_word: כָּל אֵלֶּה
  english_pob_choice: all these things
  chosen_spanish: todas estas cosas
  alternatives_spanish:
  - todo esto
  - todas estas
  - todas estas acciones
  lexicon: HALOT
  rationale: La expresión mira hacia los tratos divinos mencionados en el contexto. «Todas estas cosas» conserva el alcance total de כָּל más el demostrativo, con un sustantivo implícito claro en español.
- source_word: יִפְעַל
  english_pob_choice: does
  chosen_spanish: hace
  alternatives_spanish:
  - obra
  - actúa
  - realiza
  lexicon: HALOT
  rationale: פעל expresa el efectuar o llevar a cabo acciones. «Hace» es el verbo más natural en español con «todas estas cosas» y preserva el sentido de acción realizada.
- source_word: אֵל
  english_pob_choice: God
  chosen_spanish: Dios
  alternatives_spanish:
  - el Dios
  - Dios Todopoderoso
  lexicon: HALOT
  rationale: Aquí אֵל es el sustantivo común para Dios, no el nombre divino YHWH. «Dios» reproduce directamente el referente sin introducir un matiz no sustentado por el hebreo.
- source_word: פַּעֲמַיִם שָׁלֹשׁ
  english_pob_choice: two or three times
  chosen_spanish: dos o tres veces
  alternatives_spanish:
  - dos veces, tres veces
  - una y otra vez
  - repetidas veces
  lexicon: HALOT
  rationale: La secuencia numérica funciona como una expresión de repetición. «Dos o tres veces» conserva la forma y el valor idiomático sin convertirlo en una paráfrasis más libre.
- source_word: עִם
  english_pob_choice: with
  chosen_spanish: con
  alternatives_spanish:
  - para con
  - respecto a
  - en relación con
  lexicon: HALOT
  rationale: La preposición señala la relación de los tratos divinos con la persona. «Con» es la opción más directa y fiel en español.
- source_word: גָּבֶר
  english_pob_choice: a man
  chosen_spanish: un hombre
  alternatives_spanish:
  - una persona
  - un ser humano
  lexicon: HALOT
  rationale: El hebreo usa un singular masculino representativo. En español, «un hombre» mantiene la forma lexical y la fuerza del singular genérico, sin borrar la marca gramatical del original.
theological_decisions:
- issue: Lenguaje masculino representativo en גָּבֶר
  english_pob_reading: a man
  chosen_spanish_reading: un hombre
  alternative_spanish_readings:
  - una persona
  - un ser humano
  rationale: El hebreo presenta un singular masculino usado de manera representativa. La traducción conserva esa forma en el texto principal por fidelidad lexical, y deja implícito que el referente es genérico dentro del contexto.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
translation_notes:
  revision_awareness: El análisis de revisión indica alta concordancia con el texto fuente y con la traducción inglesa auditada; no se documentaron cambios posteriores, por lo que este borrador sigue la lectura estable del pasaje.
  spanish_consistency_notes:
  - Se conserva «Dios» para אֵל, no «Yahvé», porque el hebreo aquí no usa el nombre divino YHWH.
  - Se mantiene la secuencia «dos o tres veces» para reflejar la expresión numérica hebrea sin expansión interpretativa.
  - «Un hombre» preserva el singular representativo masculino del original, coherente con la política de exactitud de género del proyecto.
