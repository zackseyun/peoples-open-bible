revisions:
- from: En aquel día saldrán mensajeros[a] de delante de mí en barcos, para aterrar a Cus[b], que está segura; y habrá temblor en ellos en el día de Egipto[c], porque, miren, viene.
  to: En aquel día saldrán mensajeros[a] de delante de mí en barcos, para aterrar a Cus[b], que está segura; y vendrá temblor sobre ellos en el día de Egipto[c], porque, he aquí, ya viene.
  rationale: Se ajusta la cláusula final para reflejar mejor el tono profético de הִנֵּה con 'he aquí' y la inminencia con 'ya viene'. También se mejora la naturalidad y fidelidad de בָהֶם mediante 'sobre ellos', que expresa mejor un temblor/calamidad que sobreviene. El resto del texto se conserva por ser fiel al hebreo y al audit trail inglés.
