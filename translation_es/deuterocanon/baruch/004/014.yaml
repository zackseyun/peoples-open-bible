revisions:
- from: Que vengan los vecinos de Sión[a], que vengan los vecinos; y recuerden la cautividad de mis hijos y de mis hijas[b], que el Eterno les trajo.
  to: Que vengan los vecinos de Sión[a], que vengan los vecinos; y recuerden el cautiverio de mis hijos y de mis hijas[b], que el Eterno hizo venir sobre ellos.
