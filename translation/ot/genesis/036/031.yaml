id: GEN.36.31
reference: Genesis 36:31
source:
  edition: WLC
  text: וְ/אֵ֨לֶּה֙ הַ/מְּלָכִ֔ים אֲשֶׁ֥ר מָלְכ֖וּ בְּ/אֶ֣רֶץ אֱד֑וֹם לִ/פְנֵ֥י מְלָךְ מֶ֖לֶךְ לִ/בְנֵ֥י יִשְׂרָאֵֽל־׃
translation:
  text: These are the kings who reigned in the land of Edom before a king reigned over the sons of Israel[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'before a king reigned over the Israelites.' The Hebrew literally says 'before a king reigned for/over the sons of Israel.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְ/אֵלֶּה
  chosen: These are
  alternatives:
  - And these are
  - Now these are
  lexicon: HALOT
  rationale: Introduces a new list or section. English can omit the conjunction for smoother style, but retaining it as 'These are' still reflects the presentational force without unnecessary stiffness.
- source_word: הַמְּלָכִים
  chosen: the kings
  alternatives:
  - kings
  lexicon: HALOT
  rationale: Definite article is present in Hebrew, so 'the kings' is retained.
- source_word: אֲשֶׁר מָלְכוּ
  chosen: who reigned
  alternatives:
  - who ruled
  - that became kings
  lexicon: HALOT
  rationale: The relative clause with מלך in the Qal denotes exercising kingship. 'Reigned' is the most natural and precise English equivalent in this context.
- source_word: בְּאֶרֶץ אֱדוֹם
  chosen: in the land of Edom
  alternatives:
  - in Edom
  lexicon: HALOT
  rationale: The construct 'land of Edom' is explicit in Hebrew and preserves the territorial sense better than the shorter 'in Edom'.
- source_word: לִפְנֵי
  chosen: before
  alternatives:
  - prior to
  lexicon: HALOT
  rationale: 'Temporal sense is clear here: these Edomite kings preceded a later event.'
- source_word: מְלָךְ מֶלֶךְ
  chosen: any king reigned
  alternatives:
  - a king reigned
  - there reigned a king
  lexicon: HALOT
  rationale: The infinitive/finite construction emphasizes the occurrence of kingship among Israel. In idiomatic English, 'before any king reigned' best conveys the temporal point without awkward literalism. 'Any' captures the generic force of the singular noun in context.
- source_word: לִבְנֵי יִשְׂרָאֵל
  chosen: over the sons of Israel
  alternatives:
  - for the sons of Israel
  - over the Israelites
  - for the children of Israel
  lexicon: HALOT
  rationale: The preposition and context indicate kingship in relation to Israel as a people. 'Sons of Israel' preserves the Hebrew expression and aligns with the project's gender-accurate philosophy; 'over' makes explicit the governance relation implied by 'reigned' in English.
