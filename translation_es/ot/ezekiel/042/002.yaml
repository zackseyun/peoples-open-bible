translation:
  language: es
  text: Frente a la longitud de cien codos estaba la entrada del norte[a], y el ancho era de cincuenta codos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Enfrente de la longitud de cien codos estaba la entrada del norte». La expresión espacial hebrea es compacta y permite varias formulaciones muy cercanas.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אֶל פְּנֵי
  english_pob_choice: Facing
  chosen_spanish: Frente a
  alternatives_spanish:
  - Mirando hacia
  - En frente de
  - Frente a la
  lexicon: HALOT
  rationale: La expresión espacial compacta se vierte con una fórmula natural en español que conserva orientación y relación posicional sin volverla rígidamente literal. 'Frente a' mantiene el sentido de ubicación respecto de la medida.
- source_word: אֹרֶךְ
  english_pob_choice: length
  chosen_spanish: longitud
  alternatives_spanish:
  - largo
  - extensión
  lexicon: HALOT
  rationale: En un contexto arquitectónico, 'longitud' expresa con claridad la dimensión longitudinal del edificio o muro. Conserva el valor técnico del hebreo sin sonar coloquial.
- source_word: אַמּוֹת הַמֵּאָה
  english_pob_choice: one hundred cubits
  chosen_spanish: cien codos
  alternatives_spanish:
  - ciento de codos
  - cien medidas de codo
  lexicon: HALOT
  rationale: Se conserva la unidad antigua 'codo' para mantener la precisión del texto de medidas del templo. El cardinal se adapta al uso natural del español.
- source_word: פֶּתַח הַצָּפוֹן
  english_pob_choice: the north entrance
  chosen_spanish: la entrada norte
  alternatives_spanish:
  - la entrada del norte
  - el acceso norte
  - la puerta norte
  lexicon: HALOT
  rationale: פֶּתַח es 'entrada' o 'abertura'; en este pasaje arquitectónico, 'entrada' es la opción más clara. 'Norte' se usa como adjetivo de ubicación, como en el inglés auditado.
- source_word: וְהָרֹחַב
  english_pob_choice: and the width was
  chosen_spanish: y el ancho era
  alternatives_spanish:
  - y la anchura era
  - y el ancho medía
  - y la anchura fue
  lexicon: HALOT
  rationale: רֹחַב denota la dimensión transversal. 'Ancho' funciona de manera natural en español y conserva la relación de medida; el verbo copulativo se sobreentiende en estilo arquitectónico, pero aquí se explicita para fluidez.
- source_word: חֲמִשִּׁים אַמּוֹת
  english_pob_choice: fifty cubits
  chosen_spanish: cincuenta codos
  alternatives_spanish:
  - cinco decenas de codos
  lexicon: HALOT
  rationale: Se mantiene la unidad de medida 'codos' por consistencia con el contexto del templo y con el valor técnico del hebreo.
translation_notes:
  revision_awareness: El texto sigue de cerca el audit trail inglés y conserva la ambigüedad espacial señalada en la nota, usando una formulación española natural sin perder la relación entre la longitud de cien codos y la entrada norte.
  spanish_consistency_notes:
  - Se mantuvo 'codos' para la unidad de medida en ambas menciones.
  - '''Entrada norte'' evita la ambigüedad de ''puerta'' y coincide con el enfoque arquitectónico del pasaje.'
  - La nota a preserva la alternativa espacial documentada en el inglés POB.
