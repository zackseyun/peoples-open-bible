review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador capta bien la estructura básica del griego: una motivación económica concibe el objeto mencionado antes y la sabiduría técnica lo construye. Conserva correctamente σοφία como «sabiduría» y distingue entre ἐπενόησεν («ideó») y κατεσκεύασεν («construyó»). Sin embargo, «fue ... lo que lo ideó» suena algo forzado en español, y la nota al pie no refleja de la mejor manera la alternativa inglesa sobre ἐκείνο / el referente al barco.'
  spanish_quality_summary: El español es comprensible, pero «Porque fue el deseo de ganancia lo que lo ideó» resulta pesado y poco natural. También «sabiduría habilidosa» es aceptable, aunque algo rígido; no requiere cambio obligatorio, pero el conjunto mejora si se simplifica la primera cláusula. La nota necesita pulirse para sonar natural y para expresar mejor la alternativa «ese objeto / eso / lo» vinculada al barco previo.
  glossary_alignment: No hay conflicto con la terminología base del proyecto. «Sabiduría» para σοφία está bien justificada. «Ganancia» es admisible para πορισμῶν, con «provecho» como alternativa nota. No intervienen términos teológicos sensibles del glosario principal.
  issues:
  - severity: medium
    issue: Construcción española algo torpe en la primera cláusula
    rationale: «Porque fue el deseo de ganancia lo que lo ideó» reproduce el énfasis inglés de manera demasiado calcada. En español fluye mejor «Porque el deseo de ganancia ideó eso/lo ideó» o «Porque el deseo de ganancia fue quien lo ideó», pero esta última personifica más. La mejora principal es de naturalidad sin perder sentido.
  - severity: low
    issue: La nota al pie puede representar mejor la alternativa documentada
    rationale: La nota actual enfatiza «de ganancia / de provecho» pero no refleja con claridad la alternativa sobre el demostrativo y la referencia al barco. Conviene explicitar que el griego puede entenderse como «eso» o «lo», refiriéndose al barco del versículo anterior.
  revised_spanish_text: Porque el deseo de ganancia[a] ideó eso, y la sabiduría habilidosa lo construyó;
