translation:
  language: es
  text: Entonces Dios abrió la cavidad que está en Lehi[b], y de ella salió agua. Cuando él bebió, su espíritu volvió y revivió. Por eso la llamó En-hacore[a], que está en Lehi hasta el día de hoy.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: En-hacore probablemente significa «Fuente del que invoca» o «Fuente del que llamó», en alusión al clamor de Sansón a Dios.
    reason: lexical_alternative
  - marker: b
    text: O, según otra lectura de la escena, «Dios abrió el hueco de la quijada, y de él salió agua».
    reason: alternative_reading
lexical_decisions:
- source_word: וַיִּבְקַע
  english_pob_choice: split open
  chosen_spanish: abrió
  alternatives_spanish:
  - abrió de par en par
  - rajó
  - partió
  lexicon: HALOT
  rationale: El verbo expresa una abertura brusca y efectiva. En español, 'abrió' funciona aquí de manera natural y evita un calco duro, mientras que el contexto de la salida del agua ya comunica la acción violenta o decisiva.
- source_word: אֱלֹהִים
  english_pob_choice: God
  chosen_spanish: Dios
  alternatives_spanish:
  - el Dios
  - Dios mismo
  lexicon: HALOT
  rationale: El referente es el Dios de Israel actuando directamente; 'Dios' es la equivalencia normal y fiel.
- source_word: הַמַּכְתֵּשׁ
  english_pob_choice: the hollow place
  chosen_spanish: el hundimiento
  alternatives_spanish:
  - el hueco
  - la cavidad
  - el hoyo
  lexicon: HALOT
  rationale: En este contexto topográfico, el término no debe sonar como 'mortero'. 'Hundimiento' comunica una depresión o hendidura del terreno y mantiene el sentido espacial del pasaje.
- source_word: בַּלֶּחִי
  english_pob_choice: at Lehi
  chosen_spanish: en Lehi
  alternatives_spanish:
  - en la quijada
  - en el lugar llamado Lehi
  lexicon: HALOT
  rationale: Aquí funciona como nombre de lugar. Se conserva 'Lehi' sin traducir como 'quijada', porque el flujo narrativo lo trata como topónimo.
- source_word: וַיֵּצְאוּ מִמֶּנּוּ מַיִם
  english_pob_choice: water came out from it
  chosen_spanish: de él salió agua
  alternatives_spanish:
  - salieron aguas de él
  - de allí brotó agua
  lexicon: HALOT
  rationale: '''Agua'' en singular es natural en español y evita una pluralización innecesaria. ''Salió'' reproduce el movimiento de salida del hebreo de forma clara.'
- source_word: וַיֵּשְׁתְּ
  english_pob_choice: when he drank
  chosen_spanish: cuando bebió
  alternatives_spanish:
  - y bebió
  - al beber
  lexicon: HALOT
  rationale: Se mantiene la secuencia narrativa sin forzar una estructura demasiado literal. En español, 'cuando bebió' enlaza bien con la restauración inmediata que sigue.
- source_word: וַתָּשָׁב רוּחוֹ
  english_pob_choice: his spirit returned
  chosen_spanish: le volvió el espíritu
  alternatives_spanish:
  - su espíritu volvió
  - le volvió la vida
  - le volvió el aliento
  lexicon: HALOT
  rationale: '''Espíritu'' conserva la gama hebrea de רוּחַ sin reducirla a ''aliento'' ni interpretarla como mera ''fuerza''. La construcción impersonal ''le volvió'' suena natural en español y mantiene el sentido de restauración vital.'
- source_word: וַיֶּחִי
  english_pob_choice: he revived
  chosen_spanish: recobró la vida
  alternatives_spanish:
  - revivió
  - volvió a vivir
  - se recuperó
  lexicon: HALOT
  rationale: La expresión indica reanimación o restablecimiento de vida, no resurrección. 'Recobró la vida' es idiomática y evita una rigidez excesiva.
- source_word: קָרָא שְׁמָהּ
  english_pob_choice: he called its name
  chosen_spanish: llamó su nombre
  alternatives_spanish:
  - le puso nombre
  - lo nombró
  lexicon: HALOT
  rationale: La fórmula hebrea se conserva de manera bastante directa, pero con fluidez aceptable en español. El posesivo 'su' se refiere al lugar/pozo mencionado.
- source_word: עֵין הַקּוֹרֵא
  english_pob_choice: En-hakkore
  chosen_spanish: En-hacore
  alternatives_spanish:
  - En-hakkore
  - Fuente del que invoca
  - Manantial del que llamó
  lexicon: HALOT
  rationale: Se translitera el nombre propio en una forma española acostumbrada ('hacore') para conservar el valor onomástico. El sentido etimológico se reserva para la nota.
- source_word: עַד הַיּוֹם הַזֶּה
  english_pob_choice: to this day
  chosen_spanish: hasta el día de hoy
  alternatives_spanish:
  - hasta hoy
  - hasta este día
  lexicon: HALOT
  rationale: Es una fórmula temporal bíblica perfectamente natural en español y fiel al hebreo.
theological_decisions:
- issue: 'Cómo presentar הַמַּכְתֵּשׁ y בַּלֶּחִי: imagen del milagro y ubicación del agua'
  english_pob_reading: Treat Lehi as the place name in the main text rather than translating the term as 'jawbone.'
  chosen_spanish_reading: Mantener Lehi como topónimo en el texto principal y evitar 'quijada' como traducción principal.
  alternative_spanish_readings:
  - el hueco de la quijada
  - la cavidad en la quijada
  - el hueco que está en Lehi
  rationale: El contexto inmediato trata a Lehi como lugar nombrado y el cierre del versículo refuerza esa lectura. La opción principal no borra la alternativa conocida, pero evita imponer en el texto principal una imagen menos segura que podría desviar la escena.
  doctrine_reference: Énfasis narrativo y geográfico del texto; no define doctrina, sino una decisión de lectura contextual.
- issue: רוּחַ / restauración vital tras beber
  english_pob_reading: his spirit returned
  chosen_spanish_reading: le volvió el espíritu
  alternative_spanish_readings:
  - le volvió el aliento
  - recobró fuerzas
  - su espíritu volvió
  rationale: '''Espíritu'' preserva la amplitud semántica de רוּחַ sin reducir el efecto a energía física solamente. La frase mantiene la tensión entre lo vital y lo interior, acorde con el hebreo.'
  doctrine_reference: Antropología bíblica; distinción entre espíritu, aliento y fuerza según el contexto.
translation_notes:
  revision_awareness: La revisión más reciente indicó que no eran necesarios cambios; esta redacción sigue el estado estable con alta concordancia con el control cruzado.
  spanish_consistency_notes:
  - Se mantiene 'Dios' para אֱלֹהִים y no se sustituye por 'SEÑOR', porque el texto hebreo nombra directamente a Dios como agente.
  - Se conserva 'Lehi' como topónimo en la línea principal, coherente con la lectura auditada del POB en inglés.
  - '''Espíritu'' se usa para רוּחַ, preservando la ambigüedad vital/animadora del hebreo.'
  - '''En-hacore'' se translitera con una forma española legible; la nota explica el sentido del nombre.'
  - La nota de variante textual se limita a la lectura alternativa documentada sin desplazar la línea principal.
