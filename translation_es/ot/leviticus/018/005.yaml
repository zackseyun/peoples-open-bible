translation:
  language: es
  text: Así pues, guardarán mis estatutos y mis juicios[a], los cuales, si un hombre los hace, vivirá por ellos[b]. Yo soy Yahvé.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «los cuales si cualquiera los hace, vivirá por ellos». El hebreo usa «hombre» en singular representativo.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «vivirá en ellos». La preposición hebrea puede entenderse de modo instrumental («por») o de esfera/ámbito («en»).'
    reason: alternative_reading
lexical_decisions:
- source_word: וּשְׁמַרְתֶּם
  english_pob_choice: So you shall keep
  chosen_spanish: Así que guardarán
  alternatives_spanish:
  - Y guardarán
  - De modo que guardarán
  - Así pues, guardarán
  lexicon: HALOT
  rationale: El verbo de segunda persona plural funciona aquí como instrucción legal/futura. «Guardar» reproduce היטב שמר en contexto de pacto, y «Así que» refleja de manera natural la conexión con el contexto inmediato sin endurecerla en exceso.
- source_word: חֻקֹּתַי
  english_pob_choice: my statutes
  chosen_spanish: mis estatutos
  alternatives_spanish:
  - mis decretos
  - mis preceptos
  lexicon: HALOT
  rationale: «Estatutos» conserva el valor jurídico-formal de חֻקֹּתַי y mantiene el paralelismo con מִשְׁפָּטַי sin fusionar ambos términos.
- source_word: מִשְׁפָּטַי
  english_pob_choice: my judgments
  chosen_spanish: mis juicios
  alternatives_spanish:
  - mis ordenanzas
  - mis reglas
  - mis sentencias
  lexicon: HALOT
  rationale: «Juicios» preserva la distinción léxica con חֻקֹּתַי y refleja el campo semántico de משפט como decisiones/ordenamientos jurídicos. Se evita neutralizarlo en una sola categoría general.
- source_word: אֲשֶׁר יַעֲשֶׂה אֹתָם
  english_pob_choice: which if a man does them
  chosen_spanish: los cuales si un hombre los hace
  alternatives_spanish:
  - los cuales quienquiera que los haga
  - los cuales si alguien los hace
  - los cuales el hombre hará
  lexicon: HALOT
  rationale: La cláusula relativa admite una expansión condicional en español para expresar con claridad la fuerza proverbial de la construcción hebrea. «Los hace» conserva el lenguaje concreto de עשה. Se mantiene la referencia masculina singular representativa, tal como en el texto fuente.
- source_word: הָאָדָם
  english_pob_choice: a man
  chosen_spanish: un hombre
  alternatives_spanish:
  - una persona
  - alguien
  - la persona
  lexicon: HALOT
  rationale: Se conserva el singular masculino representativo del hebreo. «Un hombre» reproduce la formulación proverbial y jurídica sin suavizarla a un neutro que borre la forma del original.
- source_word: וָחַי
  english_pob_choice: he shall live
  chosen_spanish: vivirá
  alternatives_spanish:
  - vivirá él
  - tendrá vida
  - seguirá viviendo
  lexicon: HALOT
  rationale: El verbo חיה se vierte de forma directa como «vivirá», que en español mantiene el resultado prometido sin especificar indebidamente su alcance temporal o teológico.
- source_word: בָּהֶם
  english_pob_choice: by them
  chosen_spanish: por ellos
  alternatives_spanish:
  - en ellos
  - mediante ellos
  - a causa de ellos
  lexicon: HALOT
  rationale: «Por ellos» conserva la posible fuerza instrumental de la preposición y sigue de cerca la lectura auditada del inglés POB. Se deja abierta la ambigüedad entre medio y esfera sin resolverla interpretativamente.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahveh
  - el SEÑOR
  lexicon: HALOT
  rationale: Se usa «Yahvé» como forma española estable para el nombre divino, siguiendo el criterio del proyecto de no sustituir el Tetragrámaton por una máscara titulada.
theological_decisions:
- issue: Alcance de «vivirá por ellos»
  english_pob_reading: Retain the broad covenantal expression 'he shall live by them' without specifying temporal prosperity, covenant life in the land, or eternal life.
  chosen_spanish_reading: Conservar la expresión amplia «vivirá por ellos» sin precisar si se trata de vida temporal, vida del pacto o vida escatológica.
  alternative_spanish_readings:
  - vivirá en ellos
  - vivirá mediante ellos
  - obtendrá vida por medio de ellos
  rationale: El hebreo no determina de manera explícita el alcance exacto de la vida prometida. La traducción conserva esa tensión, evitando resolverla con una interpretación más estrecha de lo que permite el texto.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
- issue: Valor representativo de אָדָם
  english_pob_reading: Render as 'a man' in the main text.
  chosen_spanish_reading: Mantener «un hombre» en el texto principal.
  alternative_spanish_readings:
  - una persona
  - alguien
  - ser humano
  rationale: El hebreo usa singular masculino con fuerza representativa. Se conserva esa forma en español para no diluir la sintaxis y el perfil proverbial del enunciado legal.
  doctrine_reference: 'Translation philosophy §4: Gender-accurate over gender-neutral; Contested terms table for אָדָם.'
translation_notes:
  revision_awareness: El pasaje fue revisado recientemente sin cambios sustanciales; se mantiene el acuerdo alto con la auditoría inglesa y no se detectaron problemas de fondo adicionales.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» para יְהוָה de acuerdo con la terminología del proyecto.
  - Se conservaron dos términos jurídicos distintos, «estatutos» y «juicios», para reflejar la distinción léxica del hebreo.
  - La cláusula final se dejó abierta para no resolver la tensión semántica de בָּהֶם.
  - Se preservó el singular representativo de אָדָם con una nota explicativa.
  - El estilo busca ser moderno y digno, sin depender de fórmulas tradicionales de sustitución como «SEÑOR».
