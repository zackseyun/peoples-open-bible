translation:
  language: es
  text: 'Y Yahvé le dijo: «Baja, y sube tú, con Aarón contigo. Pero los sacerdotes y el pueblo no deben abrirse paso[a] para subir hacia Yahvé, no sea que él irrumpa contra ellos».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «irrumpir»; el hebreo usa una imagen verbal relacionada tanto para la intrusión del pueblo como para la irrupción del juicio de Yahvé.
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  - el SEÑOR
  lexicon: HALOT
  rationale: El nombre divino del Tetragrámaton se conserva como nombre propio en español, conforme al criterio del proyecto, y no se oculta tras un título. «Yahvé» es la forma base más adecuada para un texto público y reverente.
- source_word: לֶךְ רֵד
  english_pob_choice: Go down
  chosen_spanish: Desciende
  alternatives_spanish:
  - Baja
  - Ve, desciende
  lexicon: HALOT
  rationale: La doble orden funciona como mandato urgente. En español, «desciende» resume bien la imagen vertical y mantiene el tono imperativo sin sonar redundante.
- source_word: וְעָלִיתָ
  english_pob_choice: and come up
  chosen_spanish: subirás
  alternatives_spanish:
  - y subirás
  - y ascenderás
  lexicon: HALOT
  rationale: Aquí la forma verbal sigue al mandato y expresa movimiento futuro/injuntivo. «Subirás» comunica con naturalidad la secuencia esperada de retorno a la montaña.
- source_word: אַתָּה וְאַהֲרֹן עִמָּךְ
  english_pob_choice: you and Aaron with you
  chosen_spanish: tú y Aarón contigo
  alternatives_spanish:
  - tú, y Aarón contigo
  - tú y Aarón
  lexicon: HALOT
  rationale: Se conserva el pronombre enfático y la indicación de compañía. «Contigo» reproduce el valor de עִמָּךְ con claridad y sin perder la inclusión de Aarón.
- source_word: הַכֹּהֲנִים
  english_pob_choice: the priests
  chosen_spanish: los sacerdotes
  alternatives_spanish:
  - los sacerdotes cultuales
  - la casta sacerdotal
  lexicon: HALOT
  rationale: En español, «sacerdotes» es la equivalencia más transparente y tradicional para el contexto cultual; no introduce un matiz ajeno al hebreo.
- source_word: הָעָם
  english_pob_choice: the people
  chosen_spanish: el pueblo
  alternatives_spanish:
  - la gente
  - la comunidad
  lexicon: HALOT
  rationale: Mantiene el contraste entre los sacerdotes y la colectividad general con una expresión directa y bíblicamente natural.
- source_word: יֶהֶרְסוּ
  english_pob_choice: must not break through
  chosen_spanish: no deben romper
  alternatives_spanish:
  - no deben irrumpir
  - no deben abrirse paso
  lexicon: HALOT
  rationale: El verbo hebreo puede implicar quebrantar una barrera o forzar el paso. «Romper» conserva la dureza del término y deja visible la relación con el verbo siguiente, sin perder legibilidad en español.
- source_word: לַעֲלֹת אֶל יְהוָה
  english_pob_choice: to come up to Yahweh
  chosen_spanish: para subir a Yahvé
  alternatives_spanish:
  - para ascender a Yahvé
  - para acercarse a Yahvé subiendo
  lexicon: HALOT
  rationale: Se conserva la imagen espacial de ascenso ligada al encuentro con Dios en el monte. «Subir a Yahvé» es breve y fiel al hebreo.
- source_word: פֶּן יִפְרָץ בָּם
  english_pob_choice: lest he break out against them
  chosen_spanish: no sea que él irrumpa contra ellos
  alternatives_spanish:
  - no sea que se abalance contra ellos
  - no sea que haga irrupción entre ellos
  lexicon: HALOT
  rationale: פרץ aquí describe una irrupción súbita de juicio divino. «Irrumpa» preserva la fuerza del verbo y la asimetría entre el intento humano de pasar y la respuesta divina.
theological_decisions:
- issue: Nombre divino en la traducción
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Jehová
  - SEÑOR
  rationale: Se mantiene el nombre propio revelado, coherente con la política del proyecto para יְהוָה. No se sustituye por un título que borre la identidad nominal del texto.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Imagen verbal compartida entre el intento humano y el juicio divino
  english_pob_reading: break through / break out
  chosen_spanish_reading: romper / irrumpa
  alternative_spanish_readings:
  - abrirse paso / estalle
  - quebrantar / brote contra
  rationale: 'El hebreo usa vocabulario relacionado para dos acciones distintas: la transgresión humana y la salida judicial de Yahvé. La versión española conserva esa tensión mediante dos verbos emparentados pero no idénticos.'
  doctrine_reference: Exodus 19:24 source-level lexical pattern; POB audit trail note on related imagery
translation_notes:
  revision_awareness: El paquete auditado muestra alta concordancia y sin cambios sustantivos en la revisión más reciente; la propuesta sigue la lectura estable del inglés POB, pero ajusta la dicción al español para preservar el paralelismo verbal entre la intrusión humana y la irrupción divina.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como forma del nombre divino en todo el versículo.
  - Se conserva el contraste entre «subir» y el movimiento vertical del monte, evitando paráfrasis más abstractas.
  - La nota a pie de página se ancla en el lugar donde la alternancia verbal puede perderse en español, para preservar la tensión léxica del hebreo.
