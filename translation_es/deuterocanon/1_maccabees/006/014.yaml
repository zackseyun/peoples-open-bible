translation:
  language: es
  text: Mira[a], estoy pereciendo en gran dolor en tierra extranjera. Y llamó a Felipe, uno de sus amigos[b], y lo puso al frente de todo su reino.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «estoy muriendo en gran tristeza». El griego ἀπόλλυμαι puede expresar perecer o morir, y λύπη puede entenderse como dolor, tristeza o aflicción.'
    reason: lexical_alternative
  - marker: b
    text: «Uno de sus amigos» también puede reflejar un título cortesano para un asociado real o cortesano, no solo un amigo privado.
    reason: cultural_note
lexical_decisions:
- source_word: ἰδοὺ
  english_pob_choice: Look
  chosen_spanish: Mira
  alternatives_spanish:
  - Mira, pues
  - Mira bien
  - He aquí
  lexicon: BDAG
  rationale: Se traduce como un marcador discursivo vivo y natural en español. «Mira» conserva la inmediatez del parlante sin introducir un tono arcaico como «He aquí».
- source_word: ἀπόλλυμαι
  english_pob_choice: I am perishing
  chosen_spanish: me estoy perdiendo
  alternatives_spanish:
  - estoy muriendo
  - me estoy consumiendo
  - estoy pereciendo
  lexicon: BDAG
  rationale: El griego puede expresar ruina o muerte. En español, «me estoy perdiendo» comunica el proceso de deterioro y la cercanía de la muerte sin fijar más de lo que el texto exige; además permite mantener el matiz amplio que la POB inglesa conserva con «perishing».
- source_word: λύπῃ μεγάλῃ
  english_pob_choice: in great grief
  chosen_spanish: en gran dolor
  alternatives_spanish:
  - en gran tristeza
  - en profundo pesar
  - con gran angustia
  lexicon: BDAG
  rationale: λύπη abarca dolor, tristeza o aflicción. «Gran dolor» es idiomático en español y refleja la fuerza emocional de la frase sin perder su amplitud semántica.
- source_word: ἐν γῇ ἀλλοτρίᾳ
  english_pob_choice: in a foreign land
  chosen_spanish: en tierra extranjera
  alternatives_spanish:
  - en un país extraño
  - en una tierra ajena
  - en tierra de otro
  lexicon: BDAG
  rationale: «Tierra extranjera» es una equivalencia natural y clara para indicar que está fuera de su propia patria. Conserva el sentido de extrañamiento presente en el griego.
- source_word: ἐκάλεσεν
  english_pob_choice: he called
  chosen_spanish: llamó a
  alternatives_spanish:
  - mandó llamar a
  - hizo venir a
  - convocó a
  lexicon: BDAG
  rationale: El verbo simple del griego permite «llamó a»; no se necesita añadir la formalidad de «convocó» o la especificidad procesal de «mandó llamar».
- source_word: ἕνα τῶν φίλων αὐτοῦ
  english_pob_choice: one of his friends
  chosen_spanish: uno de sus amigos
  alternatives_spanish:
  - uno de sus compañeros
  - uno de sus cortesanos
  - uno de sus allegados
  lexicon: BDAG
  rationale: Se mantiene «amigos» como traducción literal y suficientemente abierta. En el contexto helenístico también puede aludir a un asociado de corte, pero el texto griego no obliga a sustituirlo en la línea principal.
- source_word: κατέστησεν
  english_pob_choice: appointed
  chosen_spanish: lo nombró
  alternatives_spanish:
  - lo puso
  - lo estableció
  - lo designó
  lexicon: BDAG
  rationale: El verbo implica una instalación oficial en autoridad. «Lo nombró» comunica una designación formal y es natural en español; en este contexto funciona como equivalente de «appointed».
- source_word: ἐπὶ πάσης τῆς βασιλείας αὐτοῦ
  english_pob_choice: over all his kingdom
  chosen_spanish: sobre todo su reino
  alternatives_spanish:
  - sobre la totalidad de su reino
  - sobre todo su dominio
  - sobre todo el reino
  lexicon: BDAG
  rationale: La frase denota autoridad sobre la totalidad del reino. «Sobre todo su reino» es claro y preserva la amplitud del mandato sin volverlo abstracto.
translation_notes:
  revision_awareness: Se revisó la línea para mantener el matiz amplio de ἀπόλλυμαι y λύπη sin volver la traducción demasiado interpretativa. También se conservó la posible ambigüedad cultural de φίλος mediante nota, siguiendo la cautela del auditor inglés. No se detectaron cambios sustanciales respecto al pasaje de control.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» como norma del proyecto cuando aparezca el tetragrámaton; este versículo no lo contiene.
  - Se evitó «Cristo/Mesías» porque el pasaje no los contiene.
  - Se prefirió un español natural pero sobrio, con «Mira» como equivalente de ἰδοὺ y con orden sintáctico fluido para lectura pública.
