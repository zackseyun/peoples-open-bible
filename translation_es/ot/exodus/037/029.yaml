translation:
  language: es
  text: Hizo el aceite de la unción santa y el incienso aromático[a] puro, obra de un perfumista[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'incienso de especias' o 'incienso especiado'. La expresión hebrea alude literalmente a incienso hecho con sustancias aromáticas.
    reason: lexical_alternative
  - marker: b
    text: O 'obra de un perfumista' o 'compuesto por un perfumista'. El hebreo destaca una preparación especializada por un artesano.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּעַשׂ
  english_pob_choice: He made
  chosen_spanish: Hizo
  alternatives_spanish:
  - Y hizo
  - Entonces hizo
  lexicon: HALOT
  rationale: El wayyiqtol narra una acción pasada completa. En español, 'hizo' conserva la acción simple y fluida sin añadir explicaciones que el hebreo no exige.
- source_word: שֶׁמֶן הַמִּשְׁחָה קֹדֶשׁ
  english_pob_choice: the holy anointing oil
  chosen_spanish: el aceite de la unción santa
  alternatives_spanish:
  - el aceite santo de la unción
  - el aceite de consagración santa
  lexicon: HALOT
  rationale: La cadena nominal hebrea designa aceite destinado al rito sagrado. 'Aceite de la unción santa' refleja bien la relación de pertenencia y mantiene el valor cultual de קֹדֶשׁ sin forzar una expresión más técnica que en español sonaría menos natural.
- source_word: קְטֹרֶת הַסַּמִּים
  english_pob_choice: the fragrant incense
  chosen_spanish: el incienso puro aromático
  alternatives_spanish:
  - el incienso de aromas
  - el incienso perfumado
  lexicon: HALOT
  rationale: El hebreo dice literalmente 'incienso de aromáticos/especias'. En español, 'aromático' conserva la referencia a sustancias olorosas y 'puro' refleja טָהוֹר. Se evita 'fragante' porque podría sonar más interpretativo y menos próximo al texto base.
- source_word: טָהוֹר
  english_pob_choice: pure
  chosen_spanish: puro
  alternatives_spanish:
  - limpio
  - puro y limpio
  lexicon: HALOT
  rationale: En contexto cultual, טָהוֹר expresa pureza ritual o cualidad no contaminada. 'Puro' es la equivalencia más directa y natural en español.
- source_word: מַעֲשֵׂה רֹקֵחַ
  english_pob_choice: the work of a perfumer
  chosen_spanish: obra de un perfumista
  alternatives_spanish:
  - trabajo de un perfumista
  - obra de un mezclador de aromas
  - obra de un artesano de perfumes
  lexicon: HALOT
  rationale: Rֹקֵחַ denota al especialista que compone o mezcla aromas/ungüentos. 'Perfumista' comunica la pericia artesanal en español moderno y conserva la idea de preparación especializada que subraya el texto.
translation_notes:
  revision_awareness: La revisión más reciente indica que no fueron necesarios cambios respecto del borrador inglés; por eso el español sigue de cerca la sintaxis y las decisiones léxicas auditadas, sin añadir paréntesis doctrinales ni amplificaciones.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' fuera de este versículo porque no aparece el tetragrámaton ni un κύριος alusivo en la fuente.
  - 'Se conserva el paralelismo nominal del hebreo: dos objetos fabricados y luego una frase de calificación artesanal.'
  - El adjetivo 'santa' se coloca junto a 'unción' para reflejar el valor cultual de קֹדֶשׁ sin perder naturalidad en español.
