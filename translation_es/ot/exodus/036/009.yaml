translation:
  language: es
  text: La longitud de cada cortina era de veintiocho codos, y la anchura de cada cortina era de cuatro codos; todas las cortinas tenían una sola medida[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «una medida para todas las cortinas».'
    reason: lexical_alternative
lexical_decisions:
- source_word: אֹרֶךְ
  english_pob_choice: length
  chosen_spanish: longitud
  alternatives_spanish:
  - largo
  lexicon: HALOT
  rationale: En un contexto de medidas físicas, «longitud» comunica con naturalidad la dimensión del objeto y mantiene la correspondencia directa con el hebreo.
- source_word: יְרִיעָה
  english_pob_choice: curtain
  chosen_spanish: cortina
  alternatives_spanish:
  - panel
  - telón
  lexicon: HALOT
  rationale: En el contexto del tabernáculo, la pieza textil colgante se entiende mejor en español como «cortina»; es transparente y ampliamente inteligible.
- source_word: הָאַחַת / הָאֶחָת
  english_pob_choice: each
  chosen_spanish: cada
  alternatives_spanish:
  - la una
  - una
  lexicon: HALOT
  rationale: El hebreo usa una forma distributiva que en español se expresa de manera natural con «cada», preservando que la medida aplica individualmente a cada cortina.
- source_word: שְׁמֹנֶה וְעֶשְׂרִים
  english_pob_choice: twenty-eight
  chosen_spanish: veintiocho
  alternatives_spanish:
  - ocho y veinte
  lexicon: HALOT
  rationale: El número compuesto se vierte con la forma normal del español contemporáneo.
- source_word: בָּאַמָּה
  english_pob_choice: cubits
  chosen_spanish: codos
  alternatives_spanish:
  - codos de longitud
  lexicon: HALOT
  rationale: Se conserva la unidad antigua de medida para permanecer transparente al texto fuente; «codos» es el equivalente español establecido.
- source_word: רֹחַב
  english_pob_choice: width
  chosen_spanish: anchura
  alternatives_spanish:
  - ancho
  lexicon: HALOT
  rationale: «Anchura» es el correlato natural de «longitud» en un enunciado de medidas y refleja con precisión la dimensión indicada.
- source_word: אַרְבַּע
  english_pob_choice: four
  chosen_spanish: cuatro
  lexicon: HALOT
  rationale: Correspondencia numeral directa.
- source_word: מִדָּה אַחַת
  english_pob_choice: one measurement
  chosen_spanish: una sola medida
  alternatives_spanish:
  - la misma medida
  - una medida
  lexicon: HALOT
  rationale: El hebreo dice literalmente «una medida»; en español, «una sola medida» conserva la fuerza de uniformidad sin sonar áspero o ambiguo.
- source_word: לְכָל הַיְרִיעֹת
  english_pob_choice: all the curtains
  chosen_spanish: todas las cortinas
  alternatives_spanish:
  - para todas las cortinas
  - para cada cortina
  lexicon: HALOT
  rationale: El alcance colectivo del cierre se expresa de forma natural con «todas las cortinas», manteniendo el sentido distributivo y colectivo del hebreo.
translation_notes:
  revision_awareness: El inglés POB pasó de una formulación más condensada («and the width, four cubits») a una más explícita («and the width of each curtain was four cubits») para reflejar mejor el hebreo; la versión española sigue esa explicitación y mantiene la simetría de las dos cláusulas de medida. También se conservó la nota de equivalencia para מִדָּה אַחַת, que el audit trail inglés resolvió como «one measurement».
  spanish_consistency_notes:
  - Se mantiene «codos» como unidad histórica de medida, evitando modernizarla.
  - Se usa «cortina» para יְרִיעָה en coherencia con el contexto del tabernáculo.
  - «Una sola medida» refleja el valor distributivo/uniforme de מִדָּה אַחַת sin perder naturalidad en español.
  - La repetición de «de cada cortina» en ambas cláusulas preserva la explicitación del hebreo y del último pase revisado del inglés POB.
