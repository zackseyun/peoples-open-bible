translation:
  language: es
  text: ¿Qué tendrán que hacer ustedes? No tendrán que esconderse en el día del gran juicio[a], y no serán hallados como pecadores[b][c]; y el juicio eterno estará sobre ustedes para todas las generaciones del mundo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: La cláusula «y no serán hallados como pecadores» es difícil en el contexto y en la sintaxis del ge'ez. Algunos intérpretes entienden una fuerza más adversativa, como «serán hallados pecadores»; aquí se conserva la redacción transmitida de manera sobria.
    reason: textual_variant
  - marker: b
    text: Literalmente, la expresión detrás de «estará sobre ustedes» puede leerse de manera más literal como «será de ustedes» o «será desde ustedes». En contexto, el sentido parece ser que el juicio eterno viene sobre o contra los destinatarios.
    reason: lexical_alternative
  - marker: c
    text: 'O: «No tendrán que esconderse en el día del gran juicio, y no serán hallados como pecadores; y el juicio eterno estará sobre ustedes».'
    reason: previous_rendering
lexical_decisions:
- source_word: ምንተ
  english_pob_choice: What
  chosen_spanish: ¿Qué
  alternatives_spanish:
  - ¿Por qué
  - ¿Qué cosa
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Interrogativo inicial de tono retórico. «¿Qué» conserva la pregunta de reproche o de desafío sin añadir contenido ajeno al original.
- source_word: ሀለወክሙ
  english_pob_choice: will you have
  chosen_spanish: tendrán que
  alternatives_spanish:
  - tienen
  - les queda
  - habrá para ustedes
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La forma existencial/cóptica con sufijo pronominal puede expresar disponibilidad o posesión. En español, «tendrán que» comunica mejor la idea de recurso o posibilidad restante dentro de una pregunta retórica, sin volverla demasiado literal ni demasiado libre.
- source_word: ትግበሩ
  english_pob_choice: to do
  chosen_spanish: hacer
  alternatives_spanish:
  - obrar
  - realizar
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Verbo común de hacer/obrar. «Hacer» es la equivalencia más directa y natural en la pregunta retórica.
- source_word: ትትኀብኡ
  english_pob_choice: you will be hidden / you will not have to hide
  chosen_spanish: esconderse
  alternatives_spanish:
  - ocultarse
  - ser escondidos
  - tener que esconderse
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El valor tético/reflexivo permite un sentido de ocultarse o esconderse. Dado el contexto consolador de 1 Enoc 105:1-4, 6, el español debe reflejar que no tendrán necesidad de esconderse. «Esconderse» mantiene la imagen y el ajuste contextual.
- source_word: በዕለተ ኵነኔ ዐቢይ
  english_pob_choice: on the day of the great judgment
  chosen_spanish: en el día del gran juicio
  alternatives_spanish:
  - en el día del juicio grande
  - en el día del juicio العظيم
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Fórmula apocalíptica fija. «Gran juicio» conserva la solemnidad y suena natural en español, sin perder el sentido escatológico.
- source_word: ወኢትትረከቡ
  english_pob_choice: and you will not be found
  chosen_spanish: y no serán hallados
  alternatives_spanish:
  - y no los encontrarán
  - y no se los hallará
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «Ser hallados» preserva el matiz judicial de aparecer/ser encontrados en un estado determinado. En español, encaja con la construcción siguiente y mantiene la tensión del texto.
- source_word: ከመ ኃጥኣን
  english_pob_choice: as sinners
  chosen_spanish: como pecadores
  alternatives_spanish:
  - como culpables
  - como impíos
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El sustantivo describe a quienes pecan. «Pecadores» es el equivalente más transparente y fiel; «como» conserva el comparativo del ge'ez.
- source_word: ኵነኔ እንተ ለዓለም
  english_pob_choice: everlasting judgment
  chosen_spanish: el juicio eterno
  alternatives_spanish:
  - el juicio perpetuo
  - el juicio para siempre
  - la condena eterna
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La expresión literalmente significa juicio que pertenece a la eternidad. «Juicio eterno» conserva la duración indefinida sin introducir «condena», que sería más interpretativo.
- source_word: ትከዉን እምኔክሙ
  english_pob_choice: will be upon you
  chosen_spanish: estará sobre ustedes
  alternatives_spanish:
  - vendrá sobre ustedes
  - será de ustedes
  - estará lejos de ustedes
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: 'Se sigue la lectura conservadora del audit trail inglés: el juicio recae «sobre» los destinatarios. En español, «estará sobre ustedes» preserva esa carga adversativa sin suavizarla.'
- source_word: ለእሉ ትዉልደ ዓለም
  english_pob_choice: for all the generations of the world
  chosen_spanish: para todas las generaciones del mundo
  alternatives_spanish:
  - por todas las generaciones del mundo
  - a lo largo de las generaciones del mundo
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La frase mantiene alcance temporal-cósmico. «Para todas las generaciones del mundo» es una equivalencia directa y clara en español.
theological_decisions:
- issue: Tono del inicio interrogativo
  english_pob_reading: 'A rhetorical question about remaining recourse: ''What will you have to do?'''
  chosen_spanish_reading: «¿Qué tendrán que hacer ustedes?»
  alternative_spanish_readings:
  - «¿Qué les queda por hacer?»
  - «¿Qué harán ustedes?»
  rationale: La pregunta no introduce una nueva doctrina, sino una amonestación retórica. «Tendrán que hacer» preserva la idea de obligación o recurso restante y evita resolver el matiz demasiado pronto.
  doctrine_reference: Conservar la tensión retórica del texto apocalíptico; no paraphrasear más allá de la evidencia.
- issue: Interpretación de 'no serán hallados como pecadores' dentro del contexto de 1 Enoc 105:1-6
  english_pob_reading: Retained as written, despite contextual awkwardness
  chosen_spanish_reading: «y no serán hallados como pecadores»
  alternative_spanish_readings:
  - «y no serán hallados pecadores»
  - «y no serán encontrados como pecadores»
  - «y serán hallados como pecadores»
  rationale: El texto ge'ez transmitido es difícil y la tradición auditada en inglés lo conserva sin emendar. El español debe mantener esa dificultad sin convertirla silenciosamente en una lectura más lisa. Sin embargo, la formulación se integra en el contexto de consuelo de los justos mediante la nota textual.
  doctrine_reference: Primacía del testimonio original; transparencia ante una dificultad textual sin falsear el sentido.
- issue: Relación entre el 'juicio eterno' y el pronombre direccional 'sobre ustedes'
  english_pob_reading: everlasting judgment will be upon you
  chosen_spanish_reading: «el juicio eterno estará sobre ustedes»
  alternative_spanish_readings:
  - «el juicio eterno vendrá sobre ustedes»
  - «el juicio eterno caerá sobre ustedes»
  - «el juicio eterno será de ustedes»
  rationale: La lectura inglesa revisada revirtió una mala interpretación previa y recuperó el sentido adversativo. En español, «estará sobre ustedes» mantiene esa dirección negativa sin añadir una imagen que no esté en el texto base.
  doctrine_reference: Lectura contextual del juicio como amenaza escatológica; no suavizar el aviso.
translation_notes:
  revision_awareness: 'El audit trail inglés muestra una corrección importante: una revisión previa entendió erróneamente el contexto como consuelo de justos y revirtió el juicio a ''far from you'', pero la revisión posterior restableció la lectura adversativa ''upon you''. La versión española sigue la lectura final auditada y evita arrastrar la inversión de sentido de la pasada revisión. A la vez, conserva la dificultad sintáctica de ''no serán hallados como pecadores'' mediante una nota textual.'
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' no aplicable aquí, pues el verso no contiene el nombre divino.
  - «Juicio» se usa de forma consistente para ኵነኔ; no se introduce «condena» en el texto principal para no añadir una interpretación no explicitada.
  - «Pecadores» traduce ኃጥኣን de manera directa y no se sustituye por un término más eclesiástico como «impíos».
  - La construcción «estará sobre ustedes» conserva la direccionalidad adversativa del audit trail inglés final.
  - El registro es solemne y bíblico, pero con español moderno y claro, evitando arcaísmos innecesarios.
