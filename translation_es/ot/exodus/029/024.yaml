translation:
  language: es
  text: Pondrás todo sobre las palmas de Aarón y sobre las palmas de sus hijos[a], y los mecerás como ofrenda mecida delante de Yahvé.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «sobre las palmas de Aarón y sobre las palmas de sus hijos»; algunas traducciones amplían a «manos», pero el hebreo es más específico: «palmas».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְשַׂמְתָּ
  english_pob_choice: You shall put
  chosen_spanish: Pondrás
  alternatives_spanish:
  - y pondrás
  - deberás poner
  lexicon: HALOT
  rationale: El hebreo continúa una instrucción ritual en forma verbal con valor directivo. En español, el futuro simple transmite bien el mandato sin sonar artificial; 'poner' conserva la concreción de colocar físicamente las porciones.
- source_word: הַכֹּל
  english_pob_choice: all of it
  chosen_spanish: todo
  alternatives_spanish:
  - todo ello
  - todo eso
  - el conjunto
  lexicon: HALOT
  rationale: El referente es el conjunto de las porciones mencionadas antes. 'Todo' es natural y suficiente en español; el contexto ya aclara que se trata de las partes sacrificiales.
- source_word: עַל כַּפֵּי
  english_pob_choice: on the palms of
  chosen_spanish: sobre las palmas de
  alternatives_spanish:
  - sobre las manos de
  - en las palmas de
  lexicon: HALOT
  rationale: כַּף nombra específicamente la palma/mano ahuecada. 'Palmas' conserva mejor la imagen concreta que 'manos', que sería más general. Mantiene la decisión léxica auditable del inglés POB.
- source_word: אַהֲרֹן
  english_pob_choice: Aaron
  chosen_spanish: Aarón
  alternatives_spanish:
  - Aaron
  lexicon: Transliteración española estándar
  rationale: Se usa la forma española habitual del nombre propio bíblico.
- source_word: בָנָיו
  english_pob_choice: his sons
  chosen_spanish: sus hijos
  alternatives_spanish:
  - sus hijos varones
  - sus descendientes varones
  lexicon: HALOT
  rationale: Aunque el inglés POB opta por 'sons' por precisión sacerdotal, en español 'hijos' es el equivalente normal y bíblico. Aquí el contexto de investidura sacerdotal hace claro que se trata de sus hijos varones, sin necesidad de sobreexplicarlo en el texto principal.
- source_word: וְהֵנַפְתָּ
  english_pob_choice: and you shall wave
  chosen_spanish: y lo mecerás
  alternatives_spanish:
  - y lo agitarás
  - y lo presentarás meciéndolo
  - y lo balancearás
  lexicon: HALOT
  rationale: En contexto sacrificial, נוף designa el gesto ritual de mecer/presentar. 'Mecer' es una opción española estable y precisa para el rito; evita el sentido físico demasiado amplio de 'agitar' y refleja mejor el acto cultual.
- source_word: אֹתָם
  english_pob_choice: them
  chosen_spanish: lo
  alternatives_spanish:
  - los
  - los mismos
  lexicon: HALOT
  rationale: El hebreo tiene plural masculino, pero en español el antecedente inmediato 'todo' / 'las porciones' puede expresarse de manera colectiva con 'lo' al referirse al conjunto de los elementos ofrecidos. Esta opción busca fluidez; una alternativa más estricta sería 'los'.
- source_word: תְּנוּפָה
  english_pob_choice: as a wave offering
  chosen_spanish: como ofrenda mecida
  alternatives_spanish:
  - como ofrenda mecida
  - como ofrenda agitada
  - como ofrenda de mecimiento
  lexicon: HALOT
  rationale: תְּנוּפָה nombra la ofrenda asociada al gesto de mecer. 'Ofrenda mecida' conserva la relación directa con el verbo elegido y evita un tecnicismo menos transparente para lectores hispanos.
- source_word: לִפְנֵי יְהוָה
  english_pob_choice: before Yahweh
  chosen_spanish: delante de Yahvé
  alternatives_spanish:
  - ante Yahvé
  - en presencia de Yahvé
  lexicon: HALOT
  rationale: 'Se sigue el estándar del proyecto para el nombre divino: ''Yahvé''. ''Delante de'' reproduce bien la escena cultual y su formulación bíblica usual en español.'
theological_decisions:
- issue: Renderizado del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - el SEÑOR
  rationale: El texto hebreo usa directamente el Tetragrámaton. Según la convención del proyecto, en español se traduce como 'Yahvé' para preservar el nombre del pacto, evitando el reemplazo por un título genérico.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Valor ritual de תְּנוּפָה
  english_pob_reading: wave offering
  chosen_spanish_reading: ofrenda mecida
  alternative_spanish_readings:
  - ofrenda de mecimiento
  - ofrenda balanceada
  rationale: La frase no describe solo el acto físico, sino una categoría cultual. 'Ofrenda mecida' conserva tanto el gesto como el estatus ritual, sin perder claridad en español.
  doctrine_reference: Lexical/cultic usage of sacrificial terminology in Pentateuchal priestly texts
translation_notes:
  revision_awareness: El pasaje muestra alto grado de acuerdo en el audit trail inglés y no presenta revisiones textuales pendientes. La única decisión sensible para el español es mantener la especificidad de כַּף como 'palmas' y conservar el término cultual de תְּנוּפָה con 'ofrenda mecida'.
  spanish_consistency_notes:
  - Se mantiene la forma española habitual 'Aarón'.
  - Se conserva 'Yahvé' conforme al estándar del proyecto para יְהוָה.
  - '''Mecer'' se usa de manera cultual, no meramente física.'
  - El singular colectivo 'lo' en la cláusula final busca fluidez, aunque el hebreo es plural; queda señalada la alternativa más literal en la decisión léxica.
