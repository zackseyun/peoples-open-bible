review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el sentido del hebreo: la maldición de Yahvé recae sobre la casa del impío, en contraste con la bendición sobre la morada de los justos. Conserva correctamente «Yahvé», el presente proverbial de יְבָרֵךְ y el valor genérico de רָשָׁע. Sin embargo, hay un problema en las notas: la nota [b] no preserva fielmente la alternativa inglesa, porque ofrece «morada» como alternativa para «morada» en vez de alternativas reales como «hogar» o «vivienda/aposento».'
  spanish_quality_summary: El español es claro, natural y digno. «La maldición de Yahvé está sobre la casa del impío» suena bien en registro bíblico contemporáneo. «Morada» también es adecuado. La única reparación necesaria es corregir la nota [b] para que no sea circular ni defectuosa.
  glossary_alignment: 'Buena alineación con la terminología del proyecto: יהוה → «Yahvé» correctamente; מְאֵרַת → «maldición» bien; רָשָׁע → «impío» es aceptable y legible en contexto sapiencial; צַדִּיקִים → «justos» adecuado. No hay conflicto teológico ni terminológico mayor.'
  issues:
  - severity: medium
    issue: La nota al pie [b] es incorrecta y circular.
    rationale: El texto dice «O «morada» o «hogar» para «morada»», lo que no aporta una alternativa real para la palabra elegida. El audit trail inglés preserva alternativas para «dwelling» como «abode» o «home»; en español deben ofrecerse alternativas genuinas, por ejemplo «hogar» o «vivienda».
  revised_spanish_text: La maldición de Yahvé está sobre la casa del impío[a], pero bendice la morada de los justos[b].
  revised_footnotes:
  - marker: a
    text: O «en la casa del impío»; la preposición hebrea puede entenderse de manera más literal, pero «está sobre la casa de» comunica mejor la idea de una maldición que recae sobre el hogar.
    reason: lexical_alternative
  - marker: b
    text: O «hogar» o «vivienda» para «morada».
    reason: lexical_alternative
  revision_rationale: Se conserva el texto principal porque es fiel al hebreo y al audit trail inglés. Solo se corrige la nota [b] para que preserve alternativas léxicas reales y elimine la redacción circular.
