translation:
  language: es
  text: Pero el rey se alegrará en Dios; todo el que jura por él[a] se gloriará[b], porque las bocas de los que dicen mentiras[c] serán cerradas.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «todo el que jura por Dios». El pronombre «él» se entiende naturalmente como referido a Dios en el contexto.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «se jactará». El verbo hebreo puede expresar gloriarse o exultar con honor.'
    reason: lexical_alternative
  - marker: c
    text: Literalmente, «la boca de los que hablan falsedad será cerrada».
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהַמֶּלֶךְ
  english_pob_choice: But the king
  chosen_spanish: Pero el rey
  alternatives_spanish:
  - Y el rey
  - El rey
  lexicon: HALOT
  rationale: El ו conjuntivo funciona aquí con valor adversativo por el contraste con el v. anterior, así que «Pero» reproduce bien el flujo del discurso. «rey» conserva el sustantivo simple del hebreo sin identificarlo más allá del texto.
- source_word: יִשְׂמַח
  english_pob_choice: will rejoice
  chosen_spanish: se alegrará
  alternatives_spanish:
  - se regocijará
  - se gozará
  lexicon: HALOT
  rationale: El imperfecto expresa acción futura/resultativa. «Se alegrará» es natural en español y conserva la idea de gozo activo sin volverlo excesivamente litúrgico.
- source_word: בֵּאלֹהִים
  english_pob_choice: in God
  chosen_spanish: en Dios
  alternatives_spanish:
  - por Dios
  - a causa de Dios
  lexicon: HALOT
  rationale: Con שמח, la preposición ב se entiende mejor como esfera o objeto del gozo. «En Dios» es la correspondencia más directa y idiomática.
- source_word: יִתְהַלֵּל
  english_pob_choice: will boast
  chosen_spanish: se gloriará
  alternatives_spanish:
  - se jactará
  - se alabará
  lexicon: HALOT
  rationale: El hitpael de הלל aquí tiene el sentido de gloriarse/boast. «Se gloriará» mantiene esa fuerza sin sonar tan coloquial como «se jactará» ni desplazar el sentido hacia alabanza dirigida a otro.
- source_word: כָּל הַנִּשְׁבָּע בּוֹ
  english_pob_choice: everyone who swears by him
  chosen_spanish: todo el que jura por él
  alternatives_spanish:
  - todos los que juran por él
  - todo el que hace juramento por él
  lexicon: HALOT
  rationale: La construcción participial distributiva se expresa de forma natural con «todo el que». «Jurar por él» conserva el valor idiomático del juramento invocando a Dios; el pronombre queda referido a Dios por contexto.
- source_word: בּוֹ
  english_pob_choice: by him
  chosen_spanish: por él
  alternatives_spanish:
  - en él
  lexicon: HALOT
  rationale: En español, con «jurar», la preposición normal es «por». Así se mantiene el sentido ritual/jurídico de invocar a la persona de Dios en el juramento.
- source_word: יִסָּכֵר פִּי
  english_pob_choice: the mouths ... will be shut
  chosen_spanish: la boca ... será cerrada
  alternatives_spanish:
  - las bocas ... serán cerradas
  - la boca ... será tapada
  lexicon: HALOT
  rationale: El niphal de סכר significa cerrarse/ser cerrada. He conservado el singular figurado «la boca» como imagen hebrea, aun cuando el sentido colectivo apunta a los falsos habladores.
- source_word: דֹבְרֵי שָׁקֶר
  english_pob_choice: those who speak lies
  chosen_spanish: los que hablan mentira
  alternatives_spanish:
  - los mentirosos
  - los que hablan falsedad
  lexicon: HALOT
  rationale: La construcción participial describe a personas caracterizadas por hablar falsedad. «Los que hablan mentira» conserva la acción verbal mejor que un sustantivo más general como «mentirosos».
theological_decisions:
- issue: Referencia de «el rey»
  english_pob_reading: Retain 'the king' without interpretive expansion.
  chosen_spanish_reading: Conservar «el rey» sin identificarlo explícitamente.
  alternative_spanish_readings:
  - David
  - el rey mesiánico
  rationale: El hebreo dice simplemente «el rey»; la traducción no debe resolver una identificación que el versículo no explicita. Así se preserva la tensión literaria y canónica sin sobreinterpretar.
  doctrine_reference: Preservar la tensión exegética; primacía del texto fuente.
- issue: Referente del pronombre en «jura por él»
  english_pob_reading: The pronoun refers to God.
  chosen_spanish_reading: El pronombre se refiere a Dios.
  alternative_spanish_readings:
  - se refiere al rey
  - se refiere al pueblo
  rationale: El antecedente explícito más natural es Dios, y la expresión bíblica normal es jurar por Dios. Mantener este referente evita perder la coherencia del hebreo y de la frase idiomática.
  doctrine_reference: Sentido llano del hebreo; coherencia lexical y contextual.
translation_notes:
  revision_awareness: La base inglesa fue revisada para pluralizar «the mouths» en la clausura final; en español se mantiene la imagen singular colectiva («la boca») porque el hebreo usa el singular פִּי con sentido representativo, sin perder el valor colectivo del sujeto participial.
  spanish_consistency_notes:
  - Se mantiene «Dios» para אֱלֹהִים, conforme al estándar del proyecto.
  - Se usa «jura por él» para el valor idiomático de jurar invocando a Dios; no se sustituye por fórmulas eclesiásticas ajenas al hebreo.
  - Se conserva «se gloriará» como equivalente de יִתְהַלֵּל, evitando reducirlo a simple «alabará».
  - La clausura final preserva la imagen bíblica de la boca cerrada de los difamadores sin añadir explicación interpretativa al texto principal.
