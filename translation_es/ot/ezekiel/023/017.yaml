translation:
  language: es
  text: Entonces los hijos de Babilonia vinieron a ella[a], al lecho de amor[b], y la contaminaron con su prostitución; y ella quedó contaminada por ellos, y su alma se alejó de ellos[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'los babilonios' o 'los hombres de Babilonia'.
    reason: lexical_alternative
  - marker: b
    text: O 'para un lecho de amor'.
    reason: lexical_alternative
  - marker: c
    text: O 'su alma quedó apartada de ellos' o 'los aborreció'.
    reason: lexical_alternative
lexical_decisions:
- source_word: בְנֵי בָבֶל
  english_pob_choice: the sons of Babylon
  chosen_spanish: los hijos de Babilonia
  alternatives_spanish:
  - los babilonios
  - los hombres de Babilonia
  lexicon: HALOT
  rationale: Se conserva la estructura constructa del hebreo ('hijos de Babilonia') para mantener transparencia frente al texto fuente. 'Los babilonios' es más natural, pero borra la forma explícita del original; 'los hombres de Babilonia' interpreta más de lo que el hebreo dice.
- source_word: לְמִשְׁכַּב דֹּדִים
  english_pob_choice: to the bed of love
  chosen_spanish: al lecho de amor
  alternatives_spanish:
  - para un lecho de amorío
  - al lecho de los amantes
  lexicon: HALOT
  rationale: '''Lecho de amor'' conserva la metáfora de lecho/acto amoroso sin volverla demasiado explicativa. ''Amorío'' o ''amantes'' desplazan el matiz del hebreo y suenan más interpretativos; ''lecho de amor'' mantiene el tono eufemístico-erótico del original.'
- source_word: וַיְטַמְּא֥וּ אוֹתָהּ
  english_pob_choice: they defiled her
  chosen_spanish: la contaminaron
  alternatives_spanish:
  - la profanaron
  - la hicieron inmunda
  lexicon: HALOT
  rationale: '''Contaminar'' comunica el valor moral-ritual de טמא en un español actual y evita una calca rígida. ''Profanar'' es posible, pero puede desplazar el foco hacia lo sagrado; ''hacer inmunda'' suena más técnico y menos natural en este contexto sexual-metafórico.'
- source_word: בְּתַזְנוּתָם
  english_pob_choice: with their prostitution
  chosen_spanish: con su prostitución
  alternatives_spanish:
  - con su fornicación
  - con su prostitución/fornicación
  lexicon: HALOT
  rationale: '''Prostitución'' es claro y reproduce la carga sexual del hebreo. ''Fornicación'' también podría funcionar, pero es más eclesial y menos transparente al paralelismo del pasaje; se evita ''harlotry'' por su arcaísmo en español.'
- source_word: וַתִּ֨טְמָא בָ֔ם
  english_pob_choice: she was defiled by them
  chosen_spanish: y ella quedó contaminada por ellos
  alternatives_spanish:
  - y fue contaminada por ellos
  - y quedó inmunda por ellos
  lexicon: HALOT
  rationale: Se mantiene la misma raíz conceptual de טמא para preservar el paralelismo con la cláusula anterior. 'Quedó contaminada' expresa bien el resultado pasivo del hebreo y suena fluido; 'inmunda' es más literal pero menos natural en español moderno.
- source_word: וַתֵּ֥קַע נַפְשָׁ֖הּ מֵ/הֶֽם
  english_pob_choice: her soul was alienated from them
  chosen_spanish: su alma se apartó de ellos
  alternatives_spanish:
  - su alma se alejó de ellos
  - su alma les tomó aversión
  - su alma quedó alienada de ellos
  lexicon: HALOT
  rationale: '''Se apartó'' refleja bien el movimiento de distanciamiento/repulsión del modismo hebreo sin sobreinterpretarlo como mera emoción. ''Alienada'' es más técnico y menos idiomático en español; ''tomó aversión'' intensifica demasiado el sentido y puede cerrar la ambigüedad del hebreo.'
theological_decisions:
- issue: Imagen sexual y moral en la alegoría profética
  english_pob_reading: Retain the explicit sexual metaphor and defilement language as part of the prophetic portrayal of Jerusalem/Oholibah's political-spiritual infidelity.
  chosen_spanish_reading: Conservar la metáfora sexual explícita y el lenguaje de contaminación como parte de la denuncia profética de la infidelidad político-espiritual.
  alternative_spanish_readings:
  - Suavizar la imagen hacia una alusión solo política
  - Explicar el pasaje únicamente en términos de alianzas internacionales
  rationale: El hebreo usa deliberadamente lenguaje erótico y de impureza; atenuarlo ocultaría una parte central de la retórica profética. La versión española debe dejar visible esa tensión sin moralizar ni eufemizar más allá de lo que el texto permite.
  doctrine_reference: 'Translation philosophy: original-language primacy over translation tradition; never paraphrase beyond what the source text warrants.'
translation_notes:
  revision_awareness: He seguido la revisión más reciente del POB inglés, que prefirió una clausula final de alienación del alma en lugar de una lectura más fuerte como 'abominó de ellos' o 'les tomó asco'. Por eso la cláusula final en español evita intensificar el sentido y mantiene el desplazamiento/alejamiento del alma. También se mantuvo la estructura paralela de contaminación/contaminada para reflejar el hebreo y el audit trail inglés.
  spanish_consistency_notes:
  - Se usa 'Babilonia' y no 'Babilonios' en la forma principal para respetar la estructura hebrea constructa; la nota ofrece la alternativa más idiomática.
  - Se evita 'SEÑOR' porque este versículo no contiene el tetragrámaton ni una cita directa de κύριος.
  - Se mantiene 'contaminar' como equivalente consistente de טמא en sentido moral-ritual dentro de este pasaje.
  - '''Su alma se apartó de ellos'' preserva la ambigüedad entre repulsión, separación y alienación que el inglés POB decidió no cerrar por completo.'
