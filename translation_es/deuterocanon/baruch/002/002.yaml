translation:
  language: es
  text: no se había hecho bajo todo el cielo tal como él había hecho en Jerusalén[a], conforme a lo que está escrito en la ley de Moisés.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O "bajo el cielo entero"; la expresión es un modismo que significa en cualquier lugar del mundo.
    reason: lexical_alternative
lexical_decisions:
- source_word: οὐκ ἐποιήθη
  english_pob_choice: it had not been done
  chosen_spanish: no se había hecho
  alternatives_spanish:
  - no fue hecho
  - no había ocurrido
  lexicon: BDAG
  rationale: El pasivo aoristo exige una voz pasiva o impersonal en español; el pluscuamperfecto encaja con el valor de anterioridad del contexto y conserva el alcance hasta ese momento, como en la revisión inglesa.
- source_word: ὑποκάτω παντὸς τοῦ οὐρανοῦ
  english_pob_choice: under all heaven
  chosen_spanish: bajo todo el cielo
  alternatives_spanish:
  - bajo el cielo entero
  - en todo el mundo
  lexicon: LSJ
  rationale: La frase es un modismo para abarcar toda la tierra. "Bajo todo el cielo" mantiene la imagen y la amplitud del griego sin explicitar demasiado el sentido.
- source_word: καθὰ
  english_pob_choice: as
  chosen_spanish: como
  alternatives_spanish:
  - tal como
  - así como
  lexicon: LSJ
  rationale: '"Como" expresa la comparación de forma natural en español y conserva la relación entre el evento y lo ocurrido en Jerusalén.'
- source_word: ἐποίησεν
  english_pob_choice: he had done
  chosen_spanish: había hecho
  alternatives_spanish:
  - hizo
  - había actuado
  lexicon: BDAG
  rationale: '"Haber hecho" reproduce el verbo amplio del griego sin concretar indebidamente el tipo de acción; el antecedente implícito se mantiene por contexto, como en el audit trail inglés.'
- source_word: ἐν Ἰερουσαλήμ
  english_pob_choice: in Jerusalem
  chosen_spanish: en Jerusalén
  lexicon: BDAG
  rationale: Correspondencia locativa directa y estándar.
- source_word: κατὰ τὰ γεγραμμένα
  english_pob_choice: according to what is written
  chosen_spanish: conforme a lo que está escrito
  alternatives_spanish:
  - según lo que está escrito
  - de acuerdo con lo escrito
  lexicon: BDAG
  rationale: La expresión remite a la autoridad de lo escrito; "conforme a" preserva la idea normativa sin sonar rígido y mantiene el vínculo con la fórmula bíblica.
- source_word: ἐν τῷ νόμῳ Μωυσῆ
  english_pob_choice: in the law of Moses
  chosen_spanish: en la ley de Moisés
  alternatives_spanish:
  - en la Ley de Moisés
  - en la ley mosaica
  lexicon: BDAG
  rationale: '"Ley de Moisés" es la forma más transparente y fiel al genitivo del griego; se evita "Ley" con mayúscula como convención no exigida por el original.'
theological_decisions:
- issue: Sujeto implícito de ἐποίησεν
  english_pob_reading: he refers to God
  chosen_spanish_reading: él refiere a Dios
  alternative_spanish_readings:
  - se hizo impersonalmente
  - fue hecho
  rationale: Se conserva la agencia divina implícita en el contexto, sin añadir un sujeto explícito que el verso no nombra; así se mantiene la tensión teológica y la referencia al juicio divino.
  doctrine_reference: Preservar la agencia divina implícita y la primacía del texto original sobre una explicitación interpretativa.
translation_notes:
  revision_awareness: La redacción sigue la revisión inglesa más reciente (he had done) mediante un pluscuamperfecto español. También conserva el paralelismo entre el pasivo inicial y la acción atribuida en Jerusalén, sin suavizar el alcance universal del modismo.
  spanish_consistency_notes:
  - Se usó "Moisés" con la forma genitiva española usual "de Moisés" para evitar un calco duro.
  - '"Bajo todo el cielo" mantiene el tono solemne y la amplitud idiomática del original.'
  - No se introdujo "SEÑOR" ni otras equivalencias de ocultamiento porque aquí no aparecen el tetragrámaton ni κύριος como sustituto directo.
