translation:
  language: es
  text: Si un hombre inteligente escucha una palabra sabia[a], la alabará y le añadirá algo[b]; un hombre derrochador la oyó y la rechazó[c], y la echó detrás de sí.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'También: «un dicho sabio». El griego λόγον σοφόν puede referirse a una expresión sabia más amplia que una sola palabra.'
    reason: lexical_alternative
  - marker: b
    text: La expresión «le añadirá algo» probablemente significa que desarrollará la palabra sabia aportando una idea adicional.
    reason: lexical_alternative
  - marker: c
    text: El griego de «rechazó» es difícil en este contexto; la idea es que respondió negativamente y desestimó lo que oyó.
    reason: alternative_reading
lexical_decisions:
- source_word: λόγον σοφόν
  english_pob_choice: a wise word
  chosen_spanish: una palabra sabia
  alternatives_spanish:
  - un dicho sabio
  - una sentencia sabia
  lexicon: LSJ
  rationale: λόγος puede referirse a una palabra, dicho o expresión; en este proverbio el contexto favorece una expresión sabia o un dicho breve. «Palabra sabia» conserva la concisión del griego y sigue siendo natural en español.
- source_word: ἐπιστήμων
  english_pob_choice: an intelligent man
  chosen_spanish: un hombre inteligente
  alternatives_spanish:
  - un hombre entendido
  - un hombre discreto
  - un hombre conocedor
  lexicon: LSJ
  rationale: El término describe a alguien con entendimiento o conocimiento. «Inteligente» funciona bien en contraste proverbial con el hombre derrochador y conserva la forma masculina singular representativa del griego.
- source_word: αἰνέσει
  english_pob_choice: he will praise it
  chosen_spanish: la alabará
  alternatives_spanish:
  - la elogiará
  - la aprobará
  lexicon: LSJ
  rationale: El verbo futuro expresa alabanza o encomio. «Alabar» es el equivalente más directo y natural para una respuesta positiva ante una palabra sabia.
- source_word: ἐπʼ αὐτὸν προσθήσει
  english_pob_choice: he will add to it
  chosen_spanish: añadirá a ella
  alternatives_spanish:
  - añadirá a eso
  - la ampliará
  - construirá sobre ella
  lexicon: LSJ
  rationale: La frase sugiere sumar algo más a la palabra sabia, posiblemente ampliándola o desarrollándola. «Añadirá a ella» mantiene la cercanía formal al griego y deja abierta la precisión del matiz.
- source_word: ὁ σπαταλῶν
  english_pob_choice: a wasteful man
  chosen_spanish: un hombre derrochador
  alternatives_spanish:
  - un hombre despilfarrador
  - un hombre disoluto
  - un hombre derrochador y disipado
  lexicon: LSJ
  rationale: σπαταλάω tiene el sentido de vivir con despilfarro o derroche. «Derrochador» conserva el contraste proverbial sin añadir connotaciones morales no exigidas por el texto.
- source_word: ἀπῄρεσεν αὐτῷ
  english_pob_choice: rejected it
  chosen_spanish: la rechazó
  alternatives_spanish:
  - la desechó
  - la rehusó
  - se disgustó con ella
  lexicon: LSJ
  rationale: La forma es difícil en este contexto, pero el hilo de la sentencia apunta a una reacción negativa y de desestimación. «Rechazó» sigue la revisión final del POB inglés y es más fiel que una mera idea de disgusto.
- source_word: ἀπέστρεψεν αὐτοῦ ὀπίσω τοῦ νώτου αὐτοῦ
  english_pob_choice: he cast it behind his back
  chosen_spanish: la echó detrás de su espalda
  alternatives_spanish:
  - la puso detrás de su espalda
  - la arrojó detrás de su espalda
  - la apartó tras su espalda
  lexicon: LSJ
  rationale: La imagen idiomática expresa desecho o desprecio. «Echar detrás de su espalda» comunica el gesto de rechazo en español; «espalda» conserva mejor la naturalidad que una calca más rígida.
theological_decisions:
- issue: Forma masculina singular proverbial
  english_pob_reading: Render with 'man' in both clauses
  chosen_spanish_reading: un hombre ... un hombre
  alternative_spanish_readings:
  - una persona ... una persona
  - quien ... quien
  rationale: El griego usa participios y sustantivos masculinos singulares de manera proverbial. Se conserva «hombre» para respetar esa forma representativa sin neutralizarla innecesariamente.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
- issue: Valor de λόγον σοφόν
  english_pob_reading: a wise word / wise saying
  chosen_spanish_reading: una palabra sabia
  alternative_spanish_readings:
  - un dicho sabio
  - una sentencia sabia
  rationale: La expresión puede abarcar más que una sola unidad léxica. «Palabra sabia» mantiene la tensión entre literalidad y sentido proverbial, sin obligar a decidir de manera excesiva entre «palabra» y «dicho».
  doctrine_reference: LSJ; English audit note a
translation_notes:
  revision_awareness: La redacción sigue la última revisión inglesa del POB, que prefirió «rejected it» frente a «was displeased with it» y «cast» frente a «threw», ajustando el español a una lectura más precisa y más formal del movimiento final de rechazo.
  spanish_consistency_notes:
  - 'Se mantuvo el paralelismo de dos tipos de oyentes: el hombre inteligente y el hombre derrochador.'
  - Se conservó la imagen corporal de «detrás de su espalda» para reflejar el gesto idiomático de desprecio.
  - Se evitó «SEÑOR» u otro vocabulario no pertinente; el versículo no contiene términos divinos.
  - «Palabra sabia» se eligió como equivalente formal y natural, con nota para la alternativa «dicho sabio».
