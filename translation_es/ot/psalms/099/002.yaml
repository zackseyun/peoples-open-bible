translation:
  language: es
  text: Yahvé es grande en Sion[a], y él es exaltado por encima de todos los pueblos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: "sobre todos los pueblos"; alternativamente, "por encima de todos los pueblos".'
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  lexicon: HALOT
  rationale: Se conserva el nombre propio del Tetragrámaton, siguiendo la decisión doctrinal del POB de no sustituirlo por un título. En español, 'Yahvé' es la forma estable y reverente más natural para este proyecto.
- source_word: בְּצִיּוֹן
  english_pob_choice: in Zion
  chosen_spanish: en Sion
  alternatives_spanish:
  - en Zion
  - en el monte Sion
  lexicon: HALOT
  rationale: La preposición בְּ expresa ubicación; 'en Sion' mantiene el sentido locativo y suena natural en español bíblico. Se evita ampliar a 'el monte Sion' porque el hebreo solo dice 'Sion'.
- source_word: גָּדוֹל
  english_pob_choice: great
  chosen_spanish: grande
  alternatives_spanish:
  - muy grande
  - mighty
  lexicon: HALOT
  rationale: El adjetivo significa grandeza. 'Grande' es la equivalencia directa y conserva el lenguaje de alabanza sin desplazar el foco hacia fuerza militar o poder.
- source_word: וְרָם
  english_pob_choice: exalted
  chosen_spanish: exaltado
  alternatives_spanish:
  - alto
  - enaltecido
  - levantado
  lexicon: HALOT
  rationale: El verbo/participio expresa altura en sentido figurado de supremacía. 'Exaltado' conserva ese matiz de elevación de estatus que la POB inglesa comunica con 'exalted'.
- source_word: הוּא
  english_pob_choice: he is
  chosen_spanish: él es
  alternatives_spanish:
  - él
  - y él
  lexicon: HALOT
  rationale: El pronombre independiente añade énfasis. En español, 'él es' reproduce esa fuerza predicativa de manera clara y natural.
- source_word: עַל כָּל הָעַמִּים
  english_pob_choice: above all the peoples
  chosen_spanish: sobre todos los pueblos
  alternatives_spanish:
  - por encima de todos los pueblos
  - sobre todas las naciones
  lexicon: HALOT
  rationale: עַל marca superioridad jerárquica; 'sobre' refleja bien esa relación. Se prefiere 'pueblos' porque el hebreo dice עַמִּים, que es más cercano a 'peoples' que a la noción más interpretativa de 'nations'.
theological_decisions:
- issue: Nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Señor
  - Jehová
  rationale: El texto hebreo usa directamente el nombre del pacto. La traducción española debe preservarlo, no reemplazarlo por un título reverencial. 'Yahvé' comunica la misma decisión doctrinal del POB en español.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
translation_notes:
  revision_awareness: El inglés POB quedó sin cambios en la última pasada de revisión; esta versión española sigue de cerca esa lectura estable y mantiene la única nota alternativa relevante para עַל כָּל הָעַמִּים.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' como forma del nombre divino, en línea con el estándar español del proyecto.
  - '''Sion'' se escribe sin tilde por convención española corriente en textos bíblicos y nombres propios transliterados.'
  - '''pueblos'' conserva mejor el plural hebreo עַמִּים que ''naciones''.'
