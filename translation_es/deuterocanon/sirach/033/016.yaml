translation:
  language: es
  text: Y yo también velé el último de todos[a], como uno que rebusca detrás de los vendimiadores.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «estuve despierto el último de todos»; el verbo griego puede destacar la vigilia o la vigilancia, y en este contexto probablemente sugiere un trabajo diligente hasta tarde.
    reason: lexical_alternative
lexical_decisions:
- source_word: κἀγώ
  english_pob_choice: And I too
  chosen_spanish: Y yo también
  alternatives_spanish:
  - Y yo
  - Yo también
  lexicon: LSJ
  rationale: La crasis añade valor conjuntivo y enfático. «Y yo también» conserva la suma de conexión y énfasis de manera natural en español.
- source_word: ἔσχατος
  english_pob_choice: last of all
  chosen_spanish: el último de todos
  alternatives_spanish:
  - el último
  - al final
  lexicon: LSJ
  rationale: El sentido es adverbial/predicativo y marca que el hablante llegó después de otros. «El último de todos» explicita ese orden con naturalidad.
- source_word: ἠγρύπνησα
  english_pob_choice: kept watch
  chosen_spanish: velé
  alternatives_spanish:
  - estuve despierto
  - fui vigilante
  - trabajé velando
  lexicon: LSJ
  rationale: El verbo puede significar estar despierto o vigilante. «Velé» preserva la idea de vigilancia diligente sin reducirla a simple insomnio.
- source_word: ὡς
  english_pob_choice: like
  chosen_spanish: como
  alternatives_spanish:
  - igual que
  - tal como
  lexicon: LSJ
  rationale: Introduce comparación, no identidad estricta. «Como» es el marcador simílico más claro y sobrio en español.
- source_word: καλαμώμενος
  english_pob_choice: one who gleans
  chosen_spanish: uno que rebusca
  alternatives_spanish:
  - uno que espiga
  - uno que recoge los restos
  lexicon: LSJ
  rationale: El participio alude a recoger lo que queda tras la cosecha. «Rebusca» expresa bien en español la acción de buscar y recoger restos de la vendimia sin perder la imagen agrícola.
- source_word: ὀπίσω
  english_pob_choice: behind
  chosen_spanish: detrás de
  alternatives_spanish:
  - tras
  - después de
  lexicon: LSJ
  rationale: La imagen espacial es concreta. «Detrás de» conserva esa visualidad y el matiz de seguimiento.
- source_word: τρυγητῶν
  english_pob_choice: the grape harvesters
  chosen_spanish: los vendimiadores
  alternatives_spanish:
  - los cosechadores de uva
  - los trabajadores de la vendimia
  lexicon: LSJ
  rationale: El término se refiere a quienes recogen la uva. «Vendimiadores» es preciso, bíblico y comprensible en español contemporáneo.
translation_notes:
  revision_awareness: El texto griego de Swete (1909) coincide plenamente con el audit trail en inglés; no se registran revisiones aplicadas y la evaluación cruzada indica alta concordancia.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma del proyecto cuando aparezca el nombre divino; este versículo no lo contiene.
  - Se traduce la imagen agrícola con vocabulario natural de vendimia para conservar el paralelismo con el griego y con la decisión inglesa de mantener la escena explícita.
  - No se introducen términos doctrinales ajenos al verso; el tono permanece descriptivo y literal en la medida compatible con el español idiomático.
