review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien la estructura comparativa del griego: Moisés/Salomón, oración a Κύριον, descenso del fuego y consumo de las ofrendas. También conserva correctamente la amplitud de τὰ τῆς θυσίας mediante una nota. Sin embargo, hay dos desajustes importantes: en español principal se usó «Señor» en lugar de «Yahvé», contrario a la política española del proyecto para κύριος vinculado al Dios de Israel, y «holocaustos» suena problemático en español moderno eclesial general; una formulación como «ofrendas completamente quemadas» preserva mejor la especificidad cultual sin la carga moderna del término.'
  spanish_quality_summary: El texto es generalmente claro y digno, pero «Así como también» al inicio suena algo forzado; «Así como» basta y mantiene el paralelismo. «Las cosas del sacrificio» es fiel aunque algo áspero, y la nota lo justifica bien. El punto y coma es aceptable, pero una coma da mejor continuidad al paralelismo. El mayor problema de legibilidad es «holocaustos», que hoy puede distraer o malentenderse.
  glossary_alignment: Debe ajustarse «Κύριον» a «Yahvé» según la terminología española del proyecto, aun reconociendo que el griego tiene κύριος. También conviene evitar «holocaustos» como equivalente principal de ὁλοκαυτώματα y expresar la idea como «ofrendas completamente quemadas», preservando la explicación técnica en nota. «Oró», «consumió» y la nota sobre τὰ τῆς θυσίας están alineados con el audit trail.
  issues:
  - severity: high
    issue: Uso de «Señor» en vez de «Yahvé»
    rationale: La guía española del proyecto establece como valor por defecto «Yahvé» para el nombre/título divino en el texto principal. Aunque el audit trail inglés mantenga «Lord» por seguir el griego κύριος, la revisión española debe aplicar la política terminológica del proyecto y explicar la excepción si no lo hiciera.
  - severity: medium
    issue: «Holocaustos» como texto principal para ὁλοκαυτώματα
    rationale: Aunque es etimológicamente cercano, en español moderno puede resultar ambiguo o distraer por su fuerte asociación histórica contemporánea. «Ofrendas completamente quemadas» o similar comunica mejor la especificidad cultual para lectores amplios.
  - severity: low
    issue: Inicio «Así como también» algo rígido
    rationale: El griego καθὼς καὶ se puede reflejar naturalmente como «Así como»; el segundo miembro ya lleva «así también», por lo que mantener «también» en ambos lados suena pesado en español.
  revised_spanish_text: Así como Moisés oró a Yahvé[a], y descendió fuego del cielo y consumió las cosas del sacrificio, así también Salomón oró a Yahvé[b], y el fuego descendió y consumió las ofrendas completamente quemadas.
  revised_footnotes:
  - marker: a
    text: El griego dice «al Señor» (Κύριον). En la POB española se usa «Yahvé» en el texto principal para el Dios de Israel, aunque aquí el testimonio griego conserve el título κύριος.
    reason: theological_terminology
  - marker: b
    text: 'Griego literalmente: «las cosas del sacrificio», expresión más amplia que puede aludir a los materiales sacrificiales o a las ofrendas asociadas con el sacrificio.'
    reason: lexical_alternative
  - marker: c
    text: O «holocaustos». El término griego designa ofrendas consumidas por completo por el fuego.
    reason: lexical_alternative
  revision_rationale: Se corrigió la terminología divina a «Yahvé» para ajustarla a la política española del proyecto. Se suavizó el arranque a «Así como» para mejor naturalidad. Se mantuvo la rareza fiel de τὰ τῆς θυσίας, pero su nota se reancló correctamente. Se reemplazó «holocaustos» en el texto principal por «ofrendas completamente quemadas» para preservar el sentido cultual con mejor legibilidad en español moderno; la alternativa técnica quedó en nota. También se ajustaron los marcadores de notas para que correspondan exactamente a sus anclajes.
