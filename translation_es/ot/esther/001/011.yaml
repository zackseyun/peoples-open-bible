translation:
  language: es
  text: para traer a la reina Vasti ante el rey con la corona real[a], para mostrar a los pueblos y a los oficiales su hermosura, porque ella era hermosa de aspecto[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «llevando puesta la corona real». El hebreo permite también una formulación más explícita de ese sentido; el texto principal conserva la expresión más literal «con la corona real».'
    reason: lexical_alternative
  - marker: b
    text: 'Lit.: «porque ella era buena de apariencia», un hebraísmo que expresa belleza física.'
    reason: lexical_alternative
lexical_decisions:
- source_word: לְהָבִיא
  english_pob_choice: to bring
  chosen_spanish: traer
  alternatives_spanish:
  - llevar
  - presentar
  lexicon: HALOT
  rationale: El infinitivo causativo expresa hacer que Vashti comparezca ante el rey. En español, «traer» comunica bien el movimiento hacia la presencia del rey sin introducir una interpretación adicional.
- source_word: וַשְׁתִּי
  english_pob_choice: Vashti
  chosen_spanish: Vasti
  alternatives_spanish:
  - Vashti
  lexicon: Transliteración propia del español
  rationale: Se translitera el nombre propio con grafía natural en español, manteniendo la referencia histórica sin depender de la forma inglesa.
- source_word: הַמַּלְכָּה
  english_pob_choice: Queen
  chosen_spanish: la reina
  alternatives_spanish:
  - reina
  lexicon: HALOT
  rationale: Es un título apposicional. En español, «la reina Vasti» resulta natural y conserva el rango real.
- source_word: לִפְנֵי הַמֶּלֶךְ
  english_pob_choice: before the king
  chosen_spanish: ante el rey
  alternatives_spanish:
  - delante del rey
  - en presencia del rey
  lexicon: HALOT
  rationale: «Ante el rey» reproduce la relación de comparecencia ante la autoridad y suena natural en español formal.
- source_word: בְּכֶתֶר מַלְכוּת
  english_pob_choice: with the royal crown
  chosen_spanish: con la corona real
  alternatives_spanish:
  - con la corona del reino
  - con la diadema real
  lexicon: HALOT
  rationale: La preposición ב permite un matiz acompañante/instrumental. La versión española mantiene la literalidad suficiente con un sintagma natural sin añadir el detalle interpretativo de «llevando puesta».
- source_word: לְהַרְאוֹת
  english_pob_choice: to show
  chosen_spanish: para mostrar
  alternatives_spanish:
  - para exhibir
  - para hacer ver
  lexicon: HALOT
  rationale: El causativo de ראה se expresa bien con «mostrar». «Para mostrar» conserva la finalidad del pasaje.
- source_word: הָעַמִּים
  english_pob_choice: the peoples
  chosen_spanish: a los pueblos
  alternatives_spanish:
  - a los pueblos sometidos
  - a las naciones
  lexicon: HALOT
  rationale: Se preserva el plural, importante en el contexto imperial persa. «Los pueblos» refleja la pluralidad mejor que un singular colectivo.
- source_word: וְהַשָּׂרִים
  english_pob_choice: the officials
  chosen_spanish: y a los oficiales
  alternatives_spanish:
  - y a los gobernantes
  - y a los príncipes
  lexicon: HALOT
  rationale: שָׂרִים se refiere a dignatarios o funcionarios de alto rango. «Oficiales» es amplio y comprensible; evita «príncipes», que podría sugerir filiación real.
- source_word: יָפְיָהּ
  english_pob_choice: her beauty
  chosen_spanish: su hermosura
  alternatives_spanish:
  - su belleza
  - su atractivo
  lexicon: HALOT
  rationale: El sustantivo abstracto con sufijo posesivo se vierte de modo directo. «Hermosura» mantiene un registro digno y comunica belleza visible.
- source_word: טוֹבַת מַרְאֶה
  english_pob_choice: beautiful in appearance
  chosen_spanish: hermosa de apariencia
  alternatives_spanish:
  - hermosa de aspecto
  - buena de apariencia
  lexicon: HALOT
  rationale: Se conserva el idiomatismo hebreo de forma suficientemente literal. «Hermosa de apariencia» refleja el juicio externo sobre su aspecto sin apagar la tensión idiomática del hebreo.
translation_notes:
  revision_awareness: La redacción sigue de cerca la revisión más reciente del tramo inglés, que prefirió «with the royal crown» en vez de «wearing the royal crown» para no introducir un detalle no explícito. Por eso el español usa «con la corona real» y no una paráfrasis de vestimenta. También se preserva el plural de «los pueblos» y el valor idiomático de «buena de apariencia» mediante una nota.
  spanish_consistency_notes:
  - Se mantiene «Vasti» como transliteración española coherente y publicación-readable.
  - Se conserva el plural «los pueblos» para reflejar la pluralidad del hebreo imperial.
  - «Oficiales» se usa para שָׂרִים como término amplio de dignatarios/cortesanos.
  - La formulación de la belleza evita domesticar el hebraísmo; la nota explica el giro literal subyacente.
