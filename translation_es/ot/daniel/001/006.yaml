translation:
  language: es
  text: Y entre ellos, de los hijos de Judá[a], estaban Daniel, Hananías, Misael y Azarías.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «de los judeanos». El hebreo dice más literalmente: «de los hijos de Judá».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְהִי
  english_pob_choice: And ... were
  chosen_spanish: estaban
  alternatives_spanish:
  - y había
  - y resultaron estar
  - y se hallaban
  lexicon: HALOT
  rationale: El hebreo introduce una afirmación narrativa-existencial. En español, «estaban» comunica con naturalidad la presencia/inclusión del grupo sin añadir un matiz especulativo o demasiado literal como «y sucedió que hubo».
- source_word: בָהֶם
  english_pob_choice: among them
  chosen_spanish: entre ellos
  alternatives_spanish:
  - en ellos
  - con ellos
  lexicon: HALOT
  rationale: El contexto indica inclusión dentro de un grupo ya mencionado; «entre ellos» conserva ese sentido distributivo e inclusivo de manera idiomática en español.
- source_word: מִבְּנֵי יְהוּדָה
  english_pob_choice: from the sons of Judah
  chosen_spanish: de los hijos de Judá
  alternatives_spanish:
  - de los hijos de Judá
  - de los judíos
  - de los judeanos
  lexicon: HALOT
  rationale: Se mantiene la fuerza literal de בני como «hijos», siguiendo la decisión del POB de no neutralizar automáticamente el masculino plural. «De Judá» conserva el referente tribal/persona y evita sustituirlo por una designación geográfica o etnónima no presente en el hebreo.
- source_word: דָּנִיֵּאל
  english_pob_choice: Daniel
  chosen_spanish: Daniel
  alternatives_spanish:
  - Daniel
  lexicon: nombre propio
  rationale: Nombre propio transliterado de forma estándar en español bíblico.
- source_word: חֲנַנְיָה
  english_pob_choice: Hananiah
  chosen_spanish: Hananías
  alternatives_spanish:
  - Hananías
  - Ananías
  lexicon: nombre propio
  rationale: Se emplea la transliteración bíblica usual en español, «Hananías», para preservar el valor nominal del hebreo sin castellanizar indebidamente ni sustituir por una forma distinta.
- source_word: מִישָׁאֵל
  english_pob_choice: Mishael
  chosen_spanish: Misael
  alternatives_spanish:
  - Misael
  - Mishael
  lexicon: nombre propio
  rationale: «Misael» es la forma establecida y natural en español bíblico para el nombre hebreo, manteniendo la identidad del personaje con lectura fluida.
- source_word: וַעֲזַרְיָה
  english_pob_choice: and Azariah
  chosen_spanish: y Azarías
  alternatives_spanish:
  - y Azarías
  - y Azarias
  lexicon: nombre propio
  rationale: Se conserva el nombre propio en su forma española habitual, «Azarías», con la conjunción coordinante del hebreo.
translation_notes:
  revision_awareness: 'El texto inglés auditado mantiene una equivalencia óptima y una nota sobre la alternativa lexical «from the Judeans». La redacción española sigue esa misma decisión: preserva el sentido inclusivo de בָהֶם y la literalidad de מִבְּנֵי יְהוּדָה, sin introducir una paráfrasis más amplia que el hebreo no requiera.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma general del proyecto, pero este versículo no contiene el Tetragrámaton ni una alusión directa a él.
  - 'Se usan formas españolas bíblicas estables para los nombres propios: Daniel, Hananías, Misael y Azarías.'
  - La nota al pie conserva la alternativa lexical del POB inglés para reflejar la tensión entre literalidad («hijos de Judá») e interpretación etnónica («judeanos»).
