  source_alignment_summary: 'El borrador refleja bien la estructura y el sentido básico del hebreo: prohibición de venta definitiva, razón causal basada en la propiedad divina, y estatus dependiente de Israel en la tierra. Sin embargo, «de manera permanente» suena más suelto que el matiz jurídico de לִצְמִתֻת, y la pareja «extranjeros y forasteros» no distingue con suficiente claridad גֵרִים / תוֹשָׁבִים según la lógica documentada. Conviene reforzar el tenor legal y la residencia dependiente.'
  spanish_quality_summary: El español es claro y natural, pero puede afinarse para sonar más bíblico-jurídico sin rigidez. «No debe venderse en perpetuidad» resulta más conciso y acorde al contexto legal que «de manera permanente». «Extranjeros y residentes temporales» comunica mejor la combinación de no pertenencia originaria y residencia sin derecho hereditario que «extranjeros y forasteros», que en pareja suena parcialmente redundante.
  glossary_alignment: No hay conflicto con términos troncales del proyecto como Yahvé/Mesías. Las decisiones principales son correctas, pero para תוֹשָׁב es preferible un equivalente que mantenga la idea de residencia dependiente/provisional; «forasteros» inclina demasiado hacia ajenidad social y menos hacia residencia. Las notas pueden mantenerse con ajuste mínimo para reflejar la nueva elección.
  issues:
  - severity: medium
    issue: לִצְמִתֻת se vierte como «de manera permanente»
    rationale: Aunque es comprensible, el hebreo tiene un matiz jurídico de perpetuidad/alienación irrevocable. «En perpetuidad» conserva mejor ese registro, y además ya está documentado como alternativa inglesa preservada en nota.
  - severity: medium
    issue: וְתוֹשָׁבִים como «forasteros»
    rationale: En pareja con «extranjeros», «forasteros» no expresa tan bien la noción de residente sin tenencia hereditaria. «Residentes temporales» o equivalente cercano preserva mejor el contraste y la explicación cultural documentada.
  - severity: low
    issue: La nota cultural usa «ocupantes residentes»
    rationale: La frase es entendible, pero «residentes dependientes» conecta mejor con la rationale inglesa y evita un matiz potencialmente moderno o político de «ocupantes».
  revised_spanish_text: La tierra no debe venderse[a] en perpetuidad, porque la tierra es mía[b]. Pues ustedes son extranjeros y residentes temporales conmigo.
