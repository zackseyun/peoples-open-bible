lexical_decisions:
- source_word: מַמְלְכ֣וֹת
  english_pob_choice: Kingdoms
  chosen_spanish: Reinos
  alternatives_spanish:
  - reinos
  - reinos de la tierra
  - dominios
  lexicon: HALOT
  rationale: El plural designa poderes o entidades políticas; en español, "reinos" conserva mejor la imagen soberana y el tono convocatorio que una paráfrasis más explicativa.
- source_word: הָאָרֶץ
  english_pob_choice: of the earth
  chosen_spanish: de la tierra
  alternatives_spanish:
  - de la tierra
  - del mundo
  - del país
  lexicon: HALOT
  rationale: En esta construcción universal, "tierra" comunica el alcance global sin reducirlo a una sola nación o territorio.
- source_word: שִׁירוּ
  english_pob_choice: sing
  chosen_spanish: canten
  alternatives_spanish:
  - canten
  - canten en voz alta
  - entonen
  lexicon: HALOT
  rationale: El imperativo plural exhorta a una acción vocal de alabanza; "canten" es el equivalente natural y directo en español.
- source_word: לֵאלֹהִים
  english_pob_choice: to God
  chosen_spanish: a Dios
  alternatives_spanish:
  - a Dios
  - para Dios
  lexicon: HALOT
  rationale: La preposición marca destinatario; "a Dios" es la forma más natural en español para el canto dirigido a Él.
- source_word: זַמְּרוּ
  english_pob_choice: sing praises
  chosen_spanish: canten alabanzas
  alternatives_spanish:
  - entonen alabanzas
  - hagan música
  - canten salmos
  lexicon: HALOT
  rationale: El piel de זמר implica alabanza musical. En español, "canten alabanzas" preserva el componente verbal y devocional mejor que "hagan música", que sería más genérico.
- source_word: אֲדֹנָי
  english_pob_choice: the Lord
  chosen_spanish: el Señor
  alternatives_spanish:
  - el Señor
  - Señor
  lexicon: HALOT
  rationale: Aquí el hebreo usa el título אֲדֹנָי, no el Tetragrámaton. Siguiendo el valor titular, se traduce como "el Señor"; esto evita confundirlo con Yahvé, que se reserva para יְהוָה en el proyecto.
- source_word: סֶלָה
  english_pob_choice: Selah
  chosen_spanish: Selah
  alternatives_spanish:
  - Selah
  lexicon: HALOT
  rationale: El término litúrgico se conserva por transliteración porque su función exacta es incierta; mantenerlo respeta el marcador textual sin sobreinterpretarlo.
theological_decisions:
- issue: Diferencia entre אֲדֹנָי y el nombre divino
  english_pob_reading: the Lord
  chosen_spanish_reading: el Señor
  alternative_spanish_readings:
  - Señor
  - Yahvé
  rationale: El verso no contiene el Tetragrámaton, sino el título אֲדֹנָי. Por fidelidad al hebreo y a la distinción terminológica del proyecto, se traduce como "el Señor" y no como "Yahvé".
  doctrine_reference: 'DOCTRINE.md: Translate titles; transliterate names; contested terms table for YHWH and Kyrios'
- issue: Alcance universal de "reinos de la tierra"
  english_pob_reading: Kingdoms of the earth
  chosen_spanish_reading: Reinos de la tierra
  alternative_spanish_readings:
  - Reinos de la tierra
  - Reinos del mundo
  - Los reinos de la tierra
  rationale: La frase convoca a entidades políticas de alcance global. En español, la forma sin artículo es tan natural como la inglesa y mantiene la estructura vocativa del hebreo.
  doctrine_reference: Salmos 68:33 en contexto de convocatoria universal a la alabanza
translation_notes:
  revision_awareness: 'Coincide con el control más reciente: no se reportaron cambios necesarios en la pasada de revisión y el cotejo indicó alta concordancia. Se ha conservado la estructura exhortativa, la distinción entre לֵאלֹהִים y אֲדֹנָי, y el marcador litúrgico Selah.'
  spanish_consistency_notes:
  - Se mantiene "Dios" para אֱלֹהִים y "el Señor" para אֲדֹנָי, conforme a la distinción terminológica del proyecto.
  - '"Selah" se conserva sin traducir por su carácter litúrgico incierto.'
  - La nota al pie refleja la alternativa musical ya documentada en el audit trail inglés sin añadir una paráfrasis nueva.
