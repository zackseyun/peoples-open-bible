translation:
  language: es
  text: '¡Mira![a] Clamo: «¡Violencia!», pero no se me responde; clamo por ayuda[b], pero no hay justicia[c].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «Injusticia», «Agravio» u «Outrage». El término hebreo puede designar violencia, wrongdoing o una querella legal indignada.
    reason: lexical_alternative
  - marker: b
    text: O «grito por ayuda». El verbo expresa una súplica urgente de auxilio.
    reason: lexical_alternative
  - marker: c
    text: O «no hay juicio» o «no hay redress legal». El hebreo conserva un matiz jurídico de justicia o de vindicación debida.
    reason: lexical_alternative
lexical_decisions:
- source_word: הֵן
  english_pob_choice: Look
  chosen_spanish: ¡Mira!
  alternatives_spanish:
  - Mira
  - Mira, pues
  - ¡Mira bien!
  lexicon: HALOT
  rationale: La partícula introduce una llamada enfática a prestar atención. «¡Mira!» conserva esa fuerza deíctica en español contemporáneo sin caer en un arcaísmo innecesario como «He aquí».
- source_word: אֶצְעַק
  english_pob_choice: I cry out
  chosen_spanish: clamo
  alternatives_spanish:
  - grito
  - clamo en voz alta
  - exclamo
  lexicon: HALOT
  rationale: El verbo expresa un grito intenso de aflicción. «Clamo» mantiene la intensidad y funciona bien en paralelo con el segundo verbo, sin sobrecargar el español con una repetición literal de «grito».
- source_word: חָמָס
  english_pob_choice: Violence
  chosen_spanish: «¡Violencia!»
  alternatives_spanish:
  - «¡Injusticia!»
  - «¡Agravio!»
  - «¡Abuso!»
  lexicon: HALOT
  rationale: En este contexto de querella legal y sufrimiento, el término hebreo puede abarcar violencia, agravio u ofensa jurídica. Se conserva «violencia» como la opción más directa, y se mantiene su tensión semántica en las notas.
- source_word: אֵעָנֶה
  english_pob_choice: I am not answered
  chosen_spanish: no se me responde
  alternatives_spanish:
  - no recibo respuesta
  - no se me contesta
  - no me responden
  lexicon: HALOT
  rationale: 'El nifal aquí es pasivo: la idea central es la ausencia de respuesta al clamor. «No se me responde» preserva esa voz pasiva y la relación verbal con el clamor previo.'
- source_word: אֲשַׁוַּע
  english_pob_choice: I cry for help
  chosen_spanish: clamo por ayuda
  alternatives_spanish:
  - grito pidiendo ayuda
  - suplico auxilio
  - clamo auxilio
  lexicon: HALOT
  rationale: El verbo expresa una súplica urgente de socorro. «Clamo por ayuda» es natural en español y conserva el valor de petición de auxilio sin perder la conexión poética con el primer verbo.
- source_word: מִשְׁפָּט
  english_pob_choice: justice
  chosen_spanish: justicia
  alternatives_spanish:
  - juicio
  - sentencia
  - redress legal
  lexicon: HALOT
  rationale: En la lamentación de Job, el término tiene fuerza jurídica y moral. «Justicia» comunica de forma clara esa ausencia de una decisión o vindicación justa, sin reducirlo a un sentido meramente condenatorio de «juicio».
theological_decisions:
- issue: Tensión teológica de la queja de Job sin suavizarla
  english_pob_reading: Render the verse as a lament over unanswered appeal and absent justice without softening the force of Job's accusation.
  chosen_spanish_reading: Presentar el versículo como una queja dolida por un clamor sin respuesta y por la ausencia de justicia, sin atenuar su carga acusatoria.
  alternative_spanish_readings:
  - Reformularlo para que suene más devocional o menos confrontativo
  - Suavizar «violencia» por un término más general
  rationale: 'El hebreo presenta una protesta directa: Job denuncia violencia, no recibe respuesta y no encuentra justicia. La traducción debe conservar esa tensión teológica y no resolverla por adelantado con una formulación más piadosa o más neutral.'
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: El borrador sigue la revisión final del POB en inglés que prefirió «I cry for help» para el segundo verbo, manteniendo la simetría poética con el primer clamor. También conserva la nota lexical amplia para חָמָס y la tensión jurídica de מִשְׁפָּט sin diluirla.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma general del proyecto, aunque este versículo no lo incluye.
  - Se usa «justicia» para מִשְׁפָּט en coherencia con el registro jurídico-moral del POB.
  - Se preserva la distinción entre los dos verbos de clamor mediante «clamo» y «clamo por ayuda», evitando una traducción mecánicamente repetitiva que borre el paralelismo.
  - La puntuación reproduce el contraste retórico del hebreo con una cláusula de protesta, una de no respuesta y una de ausencia de justicia.
