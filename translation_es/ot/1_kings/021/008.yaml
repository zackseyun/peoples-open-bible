revisions:
- from: Así que ella escribió cartas en nombre de Ahab[a], las selló con su sello y envió las cartas a los ancianos y a los nobles que estaban en su ciudad, los que vivían con Nabot.
  to: Entonces escribió cartas en nombre de Acab[a], las selló con su sello y envió las cartas a los ancianos y a los nobles que estaban en su ciudad, los que vivían con Nabot.
  rationale: Se ajustó «Ahab» a «Acab» por fidelidad al uso español estándar, se mejoró el arranque narrativo con «Entonces escribió» para sonar más natural en español bíblico, y se corrigió la nota al pie para claridad y buena puntuación. El resto del contenido preserva adecuadamente el hebreo y la decisión interpretativa documentada en el POB inglés.
