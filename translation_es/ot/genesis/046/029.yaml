translation:
  language: es
  text: Entonces José enjaezó su carro y subió para ir al encuentro de Israel su padre en Gosén. Se presentó ante él[a], se echó sobre su cuello[b] y lloró sobre su cuello por mucho tiempo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «apareció ante él» / «se hizo visible ante él». El hebreo puede traducirse de modo más formal, pero aquí probablemente expresa que José se presentó ante su padre en el reencuentro.
    reason: lexical_alternative
  - marker: b
    text: Literalmente, «lloró sobre su cuello» con la palabra final עוֹד; esta puede entenderse como «todavía» o «aún», pero en este contexto comunica llanto prolongado.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֶּאְסֹר
  english_pob_choice: harnessed
  chosen_spanish: enjaezó
  alternatives_spanish:
  - aparejó
  - preparó
  lexicon: HALOT
  rationale: El verbo hebreo literalmente puede implicar atar o sujetar; con «carro» el sentido idiomático es dejarlo listo para el viaje. «Enjaezó» conserva la imagen concreta de preparar el carro, con un registro natural en español.
- source_word: מֶרְכַּבְתּוֹ
  english_pob_choice: his chariot
  chosen_spanish: su carro
  alternatives_spanish:
  - su carro de guerra
  - su carroza
  lexicon: HALOT
  rationale: El sustantivo designa el vehículo; en este contexto, «su carro» es directo y fiel sin sobrecargar con un matiz militar que el pasaje no exige.
- source_word: וַיַּעַל
  english_pob_choice: went up
  chosen_spanish: subió
  alternatives_spanish:
  - fue
  - se dirigió
  lexicon: HALOT
  rationale: Se conserva la imagen verbal hebrea de «subir», que forma parte del modo narrativo del texto, aun cuando el movimiento sea hacia Gosén.
- source_word: לִקְרַאת
  english_pob_choice: to meet
  chosen_spanish: para ir al encuentro de
  alternatives_spanish:
  - para encontrar a
  - para recibir a
  lexicon: HALOT
  rationale: La construcción expresa propósito. «Ir al encuentro de» comunica bien el matiz de salir a encontrarse con alguien, de manera natural en español.
- source_word: יִשְׂרָאֵל אָבִיו
  english_pob_choice: Israel his father
  chosen_spanish: Israel su padre
  alternatives_spanish:
  - su padre Israel
  - Jacob su padre
  lexicon: HALOT
  rationale: Se conserva «Israel» como nombre del patriarca, siguiendo la decisión del POB en inglés de no sustituirlo por «Jacob». El orden mantiene cercanía al hebreo y sigue siendo claro en español.
- source_word: גֹּשְׁנָה
  english_pob_choice: in Goshen
  chosen_spanish: en Gosén
  alternatives_spanish:
  - a Gosén
  - hacia Gosén
  lexicon: HALOT
  rationale: El sufijo direccional admite matiz de movimiento hacia Gosén, pero en la escena el encuentro queda situado allí. «En Gosén» suena natural y refleja el contexto.
- source_word: וַיֵּרָא אֵלָיו
  english_pob_choice: He appeared before him
  chosen_spanish: Se le apareció
  alternatives_spanish:
  - se presentó ante él
  - apareció ante él
  lexicon: HALOT
  rationale: La forma nifal puede sonar pasiva o reflexiva; la revisión inglesa optó por «appeared before him». En español, «se le apareció» mantiene la percepción de hacerse visible ante el padre en el momento del reencuentro.
- source_word: וַיִּפֹּל עַל צַוָּארָיו
  english_pob_choice: fell on his neck
  chosen_spanish: se echó sobre su cuello
  alternatives_spanish:
  - cayó sobre su cuello
  - lo abrazó al cuello
  lexicon: HALOT
  rationale: Se conserva la imagen idiomática del hebreo y la fuerza emotiva del gesto. «Se echó sobre su cuello» es comprensible en español y evita suavizar demasiado la escena.
- source_word: וַיֵּבְךְּ עַל צַוָּארָיו
  english_pob_choice: wept on his neck
  chosen_spanish: lloró sobre su cuello
  alternatives_spanish:
  - lloró abrazándolo
  - lloró mientras lo abrazaba
  lexicon: HALOT
  rationale: La repetición de «sobre su cuello» preserva la intensificación emocional del hebreo y el paralelo con la línea anterior.
- source_word: עוֹד
  english_pob_choice: for a long time
  chosen_spanish: por largo tiempo
  alternatives_spanish:
  - todavía
  - aún
  - por mucho tiempo
  lexicon: HALOT
  rationale: Aquí עוֹד funciona adverbialmente para indicar duración prolongada. «Por largo tiempo» comunica esa idea con claridad y mantiene el tono sobrio de la escena.
translation_notes:
  revision_awareness: La redacción sigue el último estado del POB en inglés, incluyendo la revisión que prefirió «appeared before him» frente a «presented himself to him». La versión española refleja esa decisión con «Se le apareció», sin perder la posibilidad alternativa señalada en nota.
  spanish_consistency_notes:
  - Se mantiene «José» para el nombre personal y «Israel» para el patriarca, conforme al contexto narrativo y la decisión auditada del inglés POB.
  - Se usa «Gosén» como topónimo normalizado en español.
  - Se conserva la repetición de «sobre su cuello» para reflejar la estructura y la emoción del hebreo.
  - El tono busca ser moderno y digno, sin recurrir a un castellano arcaizante.
