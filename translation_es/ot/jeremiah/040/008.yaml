translation:
  language: es
  text: Ismael hijo de Natanías, y Johanán y Jonatán, hijos de Carea, y Seraías hijo de Tanhumet, y los hijos de Efai el netofatita[a], y Jezanías[b] hijo del maacatita —ellos y sus hombres— llegaron a Gedalías en Mizpa.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O posiblemente «los hijos de Ofi»; el nombre personal hebreo es textualmente incierto en su representación.
    reason: lexical_alternative
  - marker: b
    text: Jezanías también puede representarse «Jezaníahu»; algunos lo relacionan con formas traducidas en otros lugares como «Jaazanías».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּבֹאוּ
  english_pob_choice: came
  chosen_spanish: llegaron
  alternatives_spanish:
  - vinieron
  - fueron
  lexicon: HALOT
  rationale: El verbo בוא expresa movimiento con llegada al destino. En español, «llegaron» comunica bien la culminación del movimiento sin sonar forzado en la sintaxis de esta frase.
- source_word: אֶל
  english_pob_choice: to
  chosen_spanish: a
  alternatives_spanish:
  - hacia
  - ante
  lexicon: HALOT
  rationale: La preposición indica dirección hacia una persona; en español, «a Gedalías» es natural y fiel.
- source_word: הַמִּצְפָּתָה
  english_pob_choice: at Mizpah
  chosen_spanish: en Mizpa
  alternatives_spanish:
  - a Mizpa
  - en Mizpah
  lexicon: HALOT
  rationale: La terminación direccional hebrea señala el lugar de destino, pero en español la referencia locativa queda clara con «en Mizpa» y evita una construcción pesada.
- source_word: בֶּן נְתַנְיָהוּ
  english_pob_choice: son of Nethaniah
  chosen_spanish: hijo de Natanías
  alternatives_spanish:
  - hijo de Netanías
  - hijo de Nethanías
  lexicon: HALOT
  rationale: Se conserva la filiación explícita con «hijo de»; «Natanías» es una transliteración española transparente y reconocible.
- source_word: בְּנֵי קָרֵחַ
  english_pob_choice: the sons of Kareah
  chosen_spanish: hijos de Carea
  alternatives_spanish:
  - los hijos de Carea
  lexicon: HALOT
  rationale: El plural constructo se mantiene con «hijos de». «Carea» reproduce el nombre propio de forma natural en español.
- source_word: בֶן תַּנְחֻמֶת
  english_pob_choice: son of Tanhumeth
  chosen_spanish: hijo de Tanhumet
  alternatives_spanish:
  - hijo de Tanhumeth
  lexicon: HALOT
  rationale: Se conserva la patronimia sin añadir explicación; «Tanhumet» es una transliteración española sobria del nombre hebreo.
- source_word: בְנֵי עופי
  english_pob_choice: the sons of Ephai
  chosen_spanish: los hijos de Efai
  alternatives_spanish:
  - los hijos de Ofi
  lexicon: HALOT
  rationale: Se sigue la representación principal del POB en inglés («Ephai») con una forma española fluida, y se deja constancia de la alternativa textual/traductiva en nota.
- source_word: הַנְּטֹפָתִי
  english_pob_choice: the Netophathite
  chosen_spanish: el netofatita
  alternatives_spanish:
  - el de Netofa
  - el netofateo
  lexicon: HALOT
  rationale: El gentilicio se vierte con una forma española directamente derivada de Netofa/Netofat, manteniendo el valor étnico-geográfico sin paráfrasis.
- source_word: וִיזַנְיָהוּ
  english_pob_choice: Jezaniah
  chosen_spanish: Jezanías
  alternatives_spanish:
  - Jezaníahu
  - Jaazanías
  lexicon: HALOT
  rationale: Se adopta la forma española usual del nombre, preservando la oscilación transliterativa documentada en la tradición y en el POB inglés.
- source_word: בֶּן הַמַּעֲכָתִי
  english_pob_choice: son of the Maacathite
  chosen_spanish: hijo del maacatita
  alternatives_spanish:
  - hijo de un maacatita
  - hijo del maacatita
  lexicon: HALOT
  rationale: El gentilicio con artículo se conserva como identificador étnico/geográfico; «maacatita» reproduce el valor del hebreo sin suavizarlo a una paráfrasis.
- source_word: הֵמָּה וְאַנְשֵׁיהֶם
  english_pob_choice: they and their men
  chosen_spanish: ellos y sus hombres
  alternatives_spanish:
  - ellos y los hombres con ellos
  lexicon: HALOT
  rationale: La construcción resumida se vierte de forma concisa. «Sus hombres» mantiene la idea de los seguidores asociados a cada jefe sin introducir elementos ajenos.
translation_notes:
  revision_awareness: 'La versión española sigue de cerca el paquete fuente hebreo y el recorrido auditado en inglés: mantiene la secuencia narrativa, conserva las filiaciones y gentilicios, y refleja en nota la única incertidumbre léxica documentada para בְנֵי עופי. No se introducen cambios doctrinales ni armonizaciones ajenas al texto.'
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el hebreo subyacente lo exija; en este versículo no aparece el tetragrámaton.
  - Se mantiene «hijo(s) de» para las filiaciones, en coherencia con la transparencia hebrea del POB.
  - Los nombres propios se transliteran de forma española estable y legible, sin normalizarlos a formas tradicionales que oculten la relación con el hebreo.
  - «Netofatita» conserva el valor gentilicio del hebreo; no se sustituye por una paráfrasis locativa.
