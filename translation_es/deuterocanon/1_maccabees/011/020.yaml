translation:
  language: es
  text: En aquellos días, Jonatán reunió a los de Judea para hacer guerra contra la ciudadela[a] que estaba en Jerusalén; y construyeron contra ella muchas máquinas de asedio.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «el Acra», la fortaleza de Jerusalén.
    reason: lexical_alternative
lexical_decisions:
- source_word: συνήγαγεν
  english_pob_choice: gathered
  chosen_spanish: reunió
  alternatives_spanish:
  - juntó
  - aglutinó
  lexicon: LSJ
  rationale: El aoristo de συνάγω expresa reunir personas para un propósito concreto, aquí militar. «Reunió» es natural en español y conserva la acción de congregar sin añadir matices ajenos.
- source_word: τοὺς ἐκ τῆς Ἰουδαίας
  english_pob_choice: those from Judea
  chosen_spanish: los que eran de Judea
  alternatives_spanish:
  - los de Judea
  - los hombres de Judea
  lexicon: LSJ
  rationale: El griego es elíptico y no dice literalmente «hombres». «Los que eran de Judea» preserva esa referencia abierta a personas procedentes de Judea sin sobreespecificar.
- source_word: τοῦ ἐκπολεμῆσαι
  english_pob_choice: to make war against
  chosen_spanish: para guerrear contra
  alternatives_spanish:
  - para hacer guerra contra
  - para combatir contra
  lexicon: LSJ
  rationale: El infinitivo articular expresa propósito. ἐκπολεμέω tiene fuerza bélica más intensa que un simple «pelear»; «guerrear contra» comunica bien la intención hostil y mantiene la direccionalidad del griego.
- source_word: τὴν ἄκραν
  english_pob_choice: the citadel
  chosen_spanish: la ciudadela[a]
  alternatives_spanish:
  - el Acra[a]
  - la fortaleza[a]
  lexicon: LSJ
  rationale: ἄκρα puede significar una fortificación elevada o ciudadela. En 1 Macabeos alude probablemente al Acra de Jerusalén. «Ciudadela» funciona bien en español, y la nota conserva la alternativa más técnica y el trasfondo histórico.
- source_word: μηχανὰς πολλάς
  english_pob_choice: many siege engines
  chosen_spanish: muchas máquinas de asedio
  alternatives_spanish:
  - muchos ingenios de asedio
  - muchas máquinas militares
  lexicon: LSJ
  rationale: En contexto de sitio, μηχανή se refiere a artefactos bélicos de asedio, no a máquinas en sentido general. «Máquinas de asedio» es claro en español y suficientemente literal.
- source_word: ἐποίησαν ἐπʼ αὐτὴν
  english_pob_choice: they built many siege engines against it
  chosen_spanish: levantaron contra ella
  alternatives_spanish:
  - construyeron contra ella
  - hicieron contra ella
  lexicon: LSJ
  rationale: ποιέω con μηχαναί expresa fabricar o levantar dispositivos de guerra. «Levantaron» es idiomático en español para obras/artefactos de asedio y conserva el movimiento hostil de ἐπʼ αὐτήν.
translation_notes:
  revision_awareness: El texto griego y el audit trail inglés concuerdan de forma alta; no se registran revisiones sustanciales. Se mantuvo la lectura de sentido militar y la ambigüedad lexical de ἄκρα en una nota, sin desplazar el texto principal.
  spanish_consistency_notes:
  - Se emplea «Judea» como topónimo geográfico estándar en español.
  - Se evita traducir μηχανάς por «máquinas» a secas para no perder el matiz bélico del contexto.
  - La nota sobre ἄκρα preserva la alternativa histórica «Acra» sin duplicar la lectura principal.
