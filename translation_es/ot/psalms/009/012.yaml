translation:
  language: es
  text: ¡Canten alabanzas a Yahvé[a], que habita en Sion; declaren entre los pueblos sus hechos!
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «que está entronizado en Sion».
    reason: alternative_reading
lexical_decisions:
- source_word: זַמְּרוּ
  english_pob_choice: Sing praises
  chosen_spanish: ¡Canten alabanzas!
  alternatives_spanish:
  - ¡Canten!
  - ¡Entonen alabanzas!
  - ¡Hagan música de alabanza!
  lexicon: HALOT
  rationale: El imperativo plural pide una exhortación pública de alabanza. En español, 'canten alabanzas' comunica bien tanto el acto de cantar como el contenido laudatorio, sin sonar artificial.
- source_word: לַיהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: El hebreo usa el nombre divino YHWH; en esta serie se prefiere 'Yahvé' como representación transparente del nombre del pacto, siguiendo el criterio del proyecto y no el sustituto reverencial 'SEÑOR'.
- source_word: יֹשֵׁב צִיּוֹן
  english_pob_choice: who dwells in Zion
  chosen_spanish: que habita en Sion
  alternatives_spanish:
  - que está entronizado en Sion
  - que se sienta en Sion
  - que mora en Sion
  lexicon: HALOT
  rationale: יֹשֵׁב puede expresar 'habitar' o 'estar sentado'. En este contexto poético, 'habita' es natural en español y preserva la idea de presencia divina sin resolver de antemano la posible imagen de entronización.
- source_word: הַגִּידוּ
  english_pob_choice: declare
  chosen_spanish: declaren
  alternatives_spanish:
  - cuenten
  - proclamen
  - hagan saber
  lexicon: HALOT
  rationale: El hiphil de נגד indica anunciar públicamente. 'Declaren' mantiene el registro solemne y la fuerza exhortativa mejor que un simple 'cuenten'.
- source_word: בָעַמִּים
  english_pob_choice: among the peoples
  chosen_spanish: entre los pueblos
  alternatives_spanish:
  - entre las naciones
  - a los pueblos
  lexicon: HALOT
  rationale: La preposición ב con עמים comunica difusión en medio de ellos. 'Entre los pueblos' suena natural en español y conserva el plural colectivo sin cargar la expresión con matices políticos innecesarios.
- source_word: עֲלִילוֹתָיו
  english_pob_choice: his deeds
  chosen_spanish: sus obras
  alternatives_spanish:
  - sus hechos
  - sus actos
  - sus proezas
  lexicon: HALOT
  rationale: עֲלִילוֹת puede referirse a actos u obras, a menudo notables. 'Obras' es un equivalente bíblico claro en español; 'hechos' también sería posible, pero 'obras' mantiene mejor el tono doxológico del versículo.
theological_decisions:
- issue: Uso del nombre divino YHWH
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: El texto hebreo lleva el Tetragrama. En esta edición española se conserva el nombre divino de forma explícita como 'Yahvé', alineado con la política del proyecto y evitando el ocultamiento del nombre propio.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Nuance of יֹשֵׁב צִיּוֹן
  english_pob_reading: who dwells in Zion
  chosen_spanish_reading: que habita en Sion
  alternative_spanish_readings:
  - que está entronizado en Sion
  rationale: La expresión hebrea puede sugerir tanto morada/presencia como entronización real. La versión principal conserva la ambigüedad útil del original; la alternativa se documenta para no perder la tensión teológica.
  doctrine_reference: 'DOCTRINE.md Translation philosophy §3: Preserve theological tension rather than resolve it'
translation_notes:
  revision_awareness: 'El borrador sigue el texto hebreo directamente y es coherente con el audit trail inglés: mantiene el nombre divino como Yahvé, traduce el participio יֹשֵׁב con un verbo de presencia accesible en español y conserva la opción alternativa de entronización en una nota.'
  spanish_consistency_notes:
  - '''Yahvé'' se usa como forma estable para YHWH en el texto principal.'
  - '''Sion'' se conserva sin adaptación gráfica adicional por ser la forma bíblica usual en español.'
  - Se prefirió 'obras' para עֲלִילוֹתָיו por naturalidad litúrgica y porque no añade intensidad no explícita en el sustantivo.
  - La puntuación reproduce la división poética de dos imperativos y una cláusula relativa.
