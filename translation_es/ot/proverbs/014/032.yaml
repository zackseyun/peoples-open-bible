translation:
  language: es
  text: Por su maldad[a], el impío es arrojado, pero el justo halla[b] refugio en su muerte[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'Por su calamidad'. La palabra hebrea רָעָה puede significar 'maldad' o 'calamidad/desgracia' según el contexto.
    reason: lexical_alternative
  - marker: b
    text: O 'se refugia'.
    reason: lexical_alternative
  - marker: c
    text: Literalmente, 'en su muerte'; también puede entenderse 'al morir' o 'cuando muere'. Algunas traducciones interpretan más explícitamente 'tiene esperanza en su muerte', pero el hebreo no dice 'esperanza' de manera directa.
    reason: alternative_reading
lexical_decisions:
- source_word: בְּרָעָתוֹ
  english_pob_choice: By his evil
  chosen_spanish: Por su maldad
  alternatives_spanish:
  - Por su calamidad
  - En su desgracia
  - Por su mal
  lexicon: HALOT
  rationale: La preposición בְּ se entiende aquí de manera instrumental/causal, por eso 'por'. רָעָה admite tanto 'maldad' como 'calamidad/desgracia'; el contexto sapiencial y la oposición con 'el impío' favorecen la lectura moral en el texto principal, sin excluir la alternativa contextual.
- source_word: יִדָּחֶה
  english_pob_choice: is driven away
  chosen_spanish: es arrojado
  alternatives_spanish:
  - es echado
  - es derribado
  - es expulsado
  lexicon: HALOT
  rationale: El nifal de נדח/דחה expresa ser empujado, arrojado o apartado. 'Es arrojado' conserva la pasividad y el movimiento de apartamiento sin añadir una imagen demasiado específica.
- source_word: רָשָׁע
  english_pob_choice: the wicked
  chosen_spanish: el impío
  alternatives_spanish:
  - el malvado
  - el inicuo
  - el impío hombre
  lexicon: HALOT
  rationale: El adjetivo sustantivado se vierte naturalmente como 'el impío'. Mantiene el paralelo proverbial con 'el justo' y evita una expansión innecesaria.
- source_word: וְחֹסֶה
  english_pob_choice: finds refuge
  chosen_spanish: halla refugio
  alternatives_spanish:
  - busca refugio
  - se refugia
  - encuentra refugio
  lexicon: HALOT
  rationale: חסה expresa buscar u obtener refugio. 'Halla refugio' comunica el resultado estable de la imagen proverbial y preserva una formulación digna y natural en español.
- source_word: בְמוֹתוֹ
  english_pob_choice: in his death
  chosen_spanish: en su muerte
  alternatives_spanish:
  - al morir
  - cuando muere
  - a su muerte
  lexicon: HALOT
  rationale: La construcción es literalmente 'en su muerte'. Se mantiene esa forma compacta para conservar la tensión interpretativa del hebreo sin explicitar 'esperanza' o una lectura posterior a la muerte.
- source_word: צַדִּיק
  english_pob_choice: the righteous
  chosen_spanish: el justo
  alternatives_spanish:
  - el recto
  - el justo hombre
  - el inocente
  lexicon: HALOT
  rationale: El adjetivo sustantivado se traduce de modo natural como 'el justo', que preserva el contraste con 'el impío' y el tono sapiencial del proverbio.
theological_decisions:
- issue: Si el verso afirma esperanza después de la muerte o solo seguridad en la muerte
  english_pob_reading: The main text preserves the ambiguity with 'finds refuge in his death' rather than resolving it into an explicit statement about afterlife hope.
  chosen_spanish_reading: El texto principal conserva la ambigüedad con 'halla refugio en su muerte' y no introduce explícitamente 'esperanza'.
  alternative_spanish_readings:
  - el justo tiene esperanza en su muerte
  - el justo está seguro al morir
  rationale: El hebreo no dice directamente 'esperanza'. Mantener 'halla refugio en su muerte' respeta la tensión del proverbio y evita resolver teológicamente una expresión breve y discutida.
  doctrine_reference: Preservar la tensión teológica en lugar de resolverla.
translation_notes:
  revision_awareness: La versión inglesa revisada eliminó 'man' de 'the wicked man' para ajustarse mejor al hebreo y al estilo formal. En español se siguió esa decisión con 'el impío', sin añadir un sustantivo equivalente innecesario.
  spanish_consistency_notes:
  - Se mantuvo 'el justo' y 'el impío' para conservar el paralelismo sapiencial.
  - Se prefirió 'halla refugio' sobre 'toma refugio' por naturalidad estilística, pero sin perder el valor lexical de חסה.
  - Se conservó 'en su muerte' para no resolver la ambigüedad interpretativa del hebreo.
