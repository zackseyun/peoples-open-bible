review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura hebrea general: apódosis con «entonces estableceré», conservación de «el trono de tu reino», y fuerza pactal en «como pacté con David tu padre». También mantiene la imaginería de «ser cortado» para לֹא יִכָּרֵת y la referencia dinástica a «un hombre» que gobierne sobre Israel. Sin embargo, hay un problema formal importante con las notas: el marcador [a] se usa dos veces en el texto para dos funciones distintas, pero solo hay una nota, lo que viola la disciplina requerida de marcadores únicos. Además, la nota idiomática corresponde a toda la cláusula final, no específicamente a «tu reino».'
  spanish_quality_summary: El español es mayormente claro y digno, pero «No se te cortará un hombre...» suena algo forzado; puede mantenerse por cercanía al hebreo, pero conviene anclar la nota en esa cláusula y no en «tu reino». «gobierne sobre Israel» es legible y fiel. La revisión necesaria es pequeña y principalmente formal, con una leve mejora de puntuación/fluidez posible en la colocación de la nota.
  glossary_alignment: No hay conflictos con la terminología base del proyecto. «pacté» preserva bien la fuerza de כרת en este contexto. «hombre» mantiene correctamente אִישׁ. No aparecen términos sensibles como Yahvé/Mesías/Espíritu que requieran ajuste.
  issues:
  - severity: high
    issue: Marcador de nota [a] reutilizado indebidamente en dos lugares del texto
    rationale: Las instrucciones exigen marcadores únicos y que cada nota tenga un anclaje correspondiente. Aquí [a] aparece tras «tu reino» y tras «cortará», pero solo existe una nota, y su contenido solo aplica a la cláusula dinástica final.
  - severity: medium
    issue: La nota lexical alternativa está anclada en un lugar semánticamente inadecuado
    rationale: La alternativa «No te faltará un hombre...» explica toda la expresión «No se te cortará...», no «tu reino». El anclaje actual puede confundir al lector.
  revised_spanish_text: 'entonces estableceré el trono de tu reino, como pacté con David tu padre, diciendo: «No se te cortará[a] un hombre que gobierne sobre Israel»'
  revised_footnotes:
  - marker: a
    text: 'O, de manera más idiomática: «No te faltará un hombre que gobierne sobre Israel».'
    reason: lexical_alternative
  revision_rationale: 'Se corrige la reutilización indebida del marcador de nota y se mueve la nota al lugar donde realmente corresponde: la cláusula «No se te cortará...», que es donde surge la alternativa idiomática preservada por el POB inglés. No se requiere cambio sustancial de traducción.'
