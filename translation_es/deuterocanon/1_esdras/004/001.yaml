  glossary_alignment: 'No hay términos teológicos sensibles en este versículo. Las decisiones léxicas principales están alineadas con el POB inglés: «banquete», «gran», «bajo su autoridad», «nobles», «Media y Persia». Se recomienda ajustar οἰκογενέσιν de «su casa» a «su casa real» por contexto.'
