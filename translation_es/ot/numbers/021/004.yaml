revisions:
- from: Entonces partieron de [a]el monte Hor, por el camino del mar Rojo[b], para rodear la tierra de Edom, y el ánimo[c] del pueblo se impacientó en el camino.
  to: Entonces partieron del monte Hor por el camino del mar Rojo[a], para rodear la tierra de Edom, y el pueblo se impacientó[b] en el camino.
  rationale: Se corrige el anclaje de la nota de yam suph para que aparezca en «mar Rojo». Se simplifica la última cláusula a «el pueblo se impacientó», que representa mejor el modismo hebreo y sigue la decisión del POB inglés, mientras la nota [b] conserva las alternativas «se desanimó / perdió el ánimo». También se elimina la construcción poco natural «el ánimo del pueblo se impacientó».
