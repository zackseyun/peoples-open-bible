review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el sentido del hebreo: la multiplicidad de planes humanos contrasta con la firmeza del consejo de Yahvé. Mantiene correctamente «Yahvé», el valor contrastivo de וַ, y el sentido de מַחֲשָׁבוֹת como «planes». Sin embargo, «permanecerá» es aceptable pero menos directo que la imagen de תָקוּם = «se mantendrá en pie / permanecerá firme / prevalecerá».'
  spanish_quality_summary: El español es claro, natural y digno. «Muchos son los planes...» suena proverbial y «en el corazón de un hombre» es fiel al singular representativo. La mejora principal es hacer más explícita en español la idea de firmeza/establecimiento de תָקוּם; «permanecerá firme» suena natural y preserva mejor la imagen. También conviene alinear la nota léxica con el texto revisado sin cambios adicionales.
  glossary_alignment: 'Buena alineación con la terminología del proyecto: יהוה -> «Yahvé» correctamente; לֵב -> «corazón» correctamente; עֲצָה -> «consejo» bien justificado. No hay conflictos teológicos ni terminológicos mayores.'
  issues:
  - severity: medium
    issue: «permanecerá» atenúa la imagen de תָקוּם
    rationale: El verbo קום aquí expresa estar en pie, mantenerse firme o quedar establecido. «Permanecerá» comunica duración, pero «permanecerá firme» o similar refleja mejor la firmeza contrastiva del original.
  - severity: low
    issue: Inconsistencia menor entre la decisión léxica de יְהוָה y el texto inglés auditado
    rationale: La ficha indica correctamente «Yahvé» en español, aunque la columna de english_pob_choice dice «Yahweh». No afecta el texto final, pero la revisión española debe mantener «Yahvé», como ya hace.
  - severity: low
    issue: Error tipográfico en alternativa española de תָקוּם
    rationale: La alternativa «será հաստատado» mezcla escritura no española/hebreo y debe corregirse en metadatos, aunque no afecta el texto bíblico principal.
  revised_spanish_text: Muchos son los planes en el corazón de un hombre[a], pero el consejo de Yahvé permanecerá firme.
  revised_footnotes:
  - marker: a
    text: O «pensamientos» o «intenciones» para «planes».
    reason: lexical_alternative
  revision_rationale: Se conserva la estructura fiel y natural del borrador, pero se ajusta «permanecerá» a «permanecerá firme» para reflejar mejor el matiz de תָקוּם como algo que se mantiene en pie o queda establecido. No se requieren cambios en la nota léxica existente.
