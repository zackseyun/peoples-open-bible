translation:
  language: es
  text: He aquí[a] vienen días, declara Yahvé, cuando levantaré para David un Renuevo justo, y reinará como rey y actuará sabiamente[b], y hará justicia y rectitud en el país.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «Miren» o «Mira». El hebreo es una interjección profética de llamada de atención.
    reason: lexical_alternative
  - marker: b
    text: O «procederá con prudencia» o «prosperará». El verbo hebreo puede incluir la idea de actuar con sabiduría y también la de tener éxito.
    reason: lexical_alternative
lexical_decisions:
- source_word: הִנֵּה
  english_pob_choice: Behold
  chosen_spanish: He aquí
  alternatives_spanish:
  - Miren
  - Véanlo
  lexicon: HALOT
  rationale: Conserva la fuerza deíctica y solemne del anuncio profético. «He aquí» suena natural en español bíblico sin volverse coloquial.
- source_word: יָמִים בָּאִים
  english_pob_choice: days are coming
  chosen_spanish: vienen días
  alternatives_spanish:
  - los días vienen
  - están viniendo días
  lexicon: HALOT
  rationale: La fórmula profética se expresa de manera natural en español con «vienen días», manteniendo la idea de un tiempo futuro señalado por Dios.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: Se sigue el criterio del proyecto de traducir el nombre divino como «Yahvé», preservando el nombre propio del pacto y evitando el sustituto litúrgico «SEÑOR».
- source_word: וַהֲקִמֹתִי
  english_pob_choice: I will raise up
  chosen_spanish: levantaré
  alternatives_spanish:
  - haré surgir
  - estableceré
  lexicon: HALOT
  rationale: En este contexto davídico, el verbo comunica la acción de Dios de hacer aparecer/levantar un descendiente real. «Levantaré» conserva esa fuerza dinámica sin añadir interpretación excesiva.
- source_word: לְדָוִד
  english_pob_choice: for David
  chosen_spanish: para David
  alternatives_spanish:
  - a David
  - en favor de David
  lexicon: HALOT
  rationale: «Para David» refleja el dativo de beneficio/origen dinástico y mantiene la ambigüedad entre descendencia y beneficio en la línea de David.
- source_word: צֶמַח
  english_pob_choice: Branch
  chosen_spanish: Renuevo
  alternatives_spanish:
  - Rama
  - Vástago
  - Brote
  lexicon: HALOT
  rationale: «Renuevo» comunica bien la metáfora vegetal de un nuevo brote dinástico. Se evita «Rama» porque en español puede sonar más físico y menos claramente mesiánico; «vástago» sería posible, pero menos fluido aquí.
- source_word: צַדִּיק
  english_pob_choice: righteous
  chosen_spanish: justo
  alternatives_spanish:
  - recto
  - piadoso
  lexicon: HALOT
  rationale: En español, «justo» funciona de modo natural con «Renuevo» y con la secuencia posterior de «justicia y rectitud». Conserva tanto la dimensión moral como la del orden correcto.
- source_word: וּמָלַךְ מֶלֶךְ
  english_pob_choice: he will reign as king
  chosen_spanish: reinará como rey
  alternatives_spanish:
  - un rey reinará
  - reinará, rey
  lexicon: HALOT
  rationale: Reproduce el verbo más el sustantivo cognado para dar énfasis real, a la vez que suena idiomático en español.
- source_word: וְהִשְׂכִּיל
  english_pob_choice: act wisely
  chosen_spanish: actuará sabiamente
  alternatives_spanish:
  - procederá con prudencia
  - prosperará
  lexicon: HALOT
  rationale: '«Actuará sabiamente» mantiene la doble posibilidad del verbo: obrar con sabiduría y lograr buen éxito, sin reducirlo solo a prosperidad.'
- source_word: מִשְׁפָּט
  english_pob_choice: justice
  chosen_spanish: justicia
  alternatives_spanish:
  - juicio
  - derecho
  lexicon: HALOT
  rationale: En el contexto de gobierno real, el término apunta a una administración justa. «Justicia» es la opción más clara y bíblicamente reconocible en español.
- source_word: וּצְדָקָה
  english_pob_choice: righteousness
  chosen_spanish: rectitud
  alternatives_spanish:
  - justicia
  - justeza
  lexicon: HALOT
  rationale: Se elige «rectitud» para conservar la distinción con «justicia» y expresar el sentido de orden correcto y conducta recta. En español, esta pareja suele sonar más diferenciada que dos veces «justicia».
- source_word: בָּאָרֶץ
  english_pob_choice: in the land
  chosen_spanish: en la tierra
  alternatives_spanish:
  - en el país
  - en la tierra/país
  lexicon: HALOT
  rationale: «En la tierra» reproduce el alcance abierto del hebreo sin especificarlo como «Israel». Aunque el contexto puede ser territorial-covenantal, la forma española mantiene la misma amplitud.
theological_decisions:
- issue: Fuerza mesiánica del «Renuevo» davídico
  english_pob_reading: Retain the dynastic-messianic wording in the main text without inserting an explicit christological identifier.
  chosen_spanish_reading: Mantener la imagen real-davídica en el texto principal sin introducir «Mesías» ni una identificación cristológica explícita.
  alternative_spanish_readings:
  - Traducir de forma genérica como un nuevo rey
  - Escribir explícitamente «el Mesías»
  rationale: El hebreo presenta la figura por la metáfora profética del brote/renuevo davídico. «Renuevo justo» conserva la densidad intertextual y la posible lectura mesiánica sin sobreinterpretar el texto.
  doctrine_reference: Affirmations; Translation philosophy §§1, 3
- issue: Nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Jehová
  rationale: La lectura del audit trail confirma que el texto base usa el Tetragrámaton. En el español del proyecto se mantiene «Yahvé» como nombre propio divino, en lugar del reemplazo litúrgico tradicional.
  doctrine_reference: 'Contested terms table: יְהוָה YHWH'
translation_notes:
  revision_awareness: 'El pasaje coincide de manera alta con el audit trail inglés: se mantiene la imagen del «Branch/Renuevo», la doble cualidad real de «reinar como rey» y «actuar sabiamente», y la terminología de justicia/rectitud. No se detectan revisiones aplicadas en la fuente inglesa reciente, por lo que el borrador español sigue de cerca la lectura estable del texto auditado.'
  spanish_consistency_notes:
  - Se usa «Yahvé» de forma consistente con el estándar del proyecto.
  - «Renuevo» se mantiene como metáfora vegetal-dinástica, evitando glosas interpretativas dentro del texto principal.
  - Se distingue «justicia» de «rectitud» para reflejar el paralelismo hebreo משפט / צדקה.
  - La puntuación sigue un ritmo profético natural en español y conserva las dos notas de alternativa léxica donde el hebreo admite más de una lectura.
