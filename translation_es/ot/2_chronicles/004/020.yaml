translation:
  language: es
  text: los candelabros y sus lámparas, para encenderlas según lo prescrito, delante del santuario interior[a], de oro puro[b];
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «delante del Lugar Santísimo». El hebreo דְּבִיר se refiere al santuario interior del templo.
    reason: lexical_alternative
  - marker: b
    text: O «de oro refinado». La expresión «oro, sāgūr» denota oro purificado de alta calidad.
    reason: lexical_alternative
lexical_decisions:
- source_word: הַמְּנֹרוֹת
  english_pob_choice: the lampstands
  chosen_spanish: las lámparas
  alternatives_spanish:
  - los candelabros
  - las menorás
  lexicon: HALOT
  rationale: מְנוֹרָה designa un soporte/luminaria de aceite; en español, en este contexto cultual, «lámparas» evita el tecnicismo transliterado y mantiene la función del objeto dentro de la lista del mobiliario del templo. «Candelabros» puede sonar más moderno, pero desplaza ligeramente la imagen. «Menorás» es menos transparente para una traducción pública.
- source_word: וְנֵרֹתֵיהֶם
  english_pob_choice: and their lamps
  chosen_spanish: y sus lámparas
  alternatives_spanish:
  - y sus luces
  - y sus mechas
  lexicon: HALOT
  rationale: נֵר suele significar «lámpara»; al tratarse de las lámparas pertenecientes a las lámparas/portadores del versículo, «sus lámparas» conserva la relación posesiva sin forzar una reinterpretación. «Luces» sería más abstracto y «mechas» no corresponde bien aquí.
- source_word: לְבַעֲרָם
  english_pob_choice: to burn
  chosen_spanish: para encenderlas
  alternatives_spanish:
  - para hacerlas arder
  - para que ardan
  lexicon: HALOT
  rationale: El infinitivo con sufijo expresa finalidad respecto de las lámparas; en español, para un texto litúrgico claro, «para encenderlas» comunica la función cultual sin sonar áspero. «Para hacerlas arder» es más literal, pero menos natural; «para que ardan» pierde algo de la idea de acción ritual humana.
- source_word: כַּמִּשְׁפָּט
  english_pob_choice: according to the ordinance
  chosen_spanish: conforme al estatuto
  alternatives_spanish:
  - según el reglamento
  - según lo prescrito
  - conforme a la ordenanza
  lexicon: HALOT
  rationale: מִשְׁפָּט aquí apunta a una norma prescrita del culto. «Estatuto» conserva el carácter formal y legal/cultual en español bíblico contemporáneo. «Ordenanza» también es posible, pero «estatuto» suena más preciso y menos eclesiástico-tradicional.
- source_word: לִפְנֵי הַדְּבִיר
  english_pob_choice: before the inner sanctuary
  chosen_spanish: delante del santuario interior
  alternatives_spanish:
  - delante del lugar santísimo
  - frente al santuario interior
  - delante del debir
  lexicon: HALOT
  rationale: דְּבִיר se refiere al recinto interior del templo. «Santuario interior» preserva el sentido espacial sin imponer una formulación más técnica. «Lugar santísimo» es una equivalencia legítima en varios contextos, pero puede sonar más cerrada/doctrinal que el hebreo aquí; mantener «santuario interior» evita sobrespecificar.
- source_word: זָהָב סָגוּר
  english_pob_choice: of pure gold
  chosen_spanish: de oro puro
  alternatives_spanish:
  - de oro refinado
  - de oro puro y refinado
  - de oro fino
  lexicon: HALOT
  rationale: La expresión denota oro de alta calidad, depurado. «Oro puro» es la forma más natural y fiel en español. «Oro refinado» es posible, pero menos idiomático en esta colocación; «oro fino» puede sonar más tradicional pero menos explícito.
theological_decisions:
- issue: Cómo verter דְּבִיר sin ocultar ni sobredeterminar el espacio sagrado
  english_pob_reading: before the inner sanctuary; footnote allows 'before the Most Holy Place'
  chosen_spanish_reading: delante del santuario interior
  alternative_spanish_readings:
  - delante del lugar santísimo
  - delante del debir
  rationale: El POB inglés deja abierta la equivalencia lexical con una nota. En español, «santuario interior» mantiene la referencia espacial del hebreo sin convertirla de inmediato en una fórmula más cargada como «lugar santísimo». La nota permite la alternativa tradicional sin borrar la ambigüedad útil del original.
  doctrine_reference: Descripción del templo/espacio cultual; no implica una afirmación doctrinal adicional
translation_notes:
  revision_awareness: El texto base inglés muestra alta concordancia y no registra revisiones aplicadas; se conserva la equivalencia funcional del listado cultual y la nota léxica sobre דְּבִיר y זָהָב סָגוּר.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» para el nombre divino cuando aparezca; aquí no figura.
  - Se usa terminología cultual sobria y pública, evitando transliteraciones innecesarias.
  - «Santuario interior» conserva la tensión entre traducción descriptiva y término técnico sin imponer una sola tradición interpretativa.
