translation:
  language: es
  text: En los días de Saúl hicieron guerra[a] contra los hagritas, y cayeron en su poder[b]; y habitaron en sus tiendas por toda la región al oriente de Galaad.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O “libraron guerra”. El hebreo usa una locución idiomática equivalente a “hacer guerra”.
    reason: lexical_alternative
  - marker: b
    text: Literalmente, “cayeron en su mano”; es decir, quedaron bajo su poder. Los que cayeron son los hagritas, implícitos por el contexto.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּבִימֵי
  english_pob_choice: In the days of
  chosen_spanish: En los días de
  alternatives_spanish:
  - Durante el tiempo de
  lexicon: HALOT
  rationale: La construcción idiomática de preposición + plural de “día” indica un período de tiempo. “En los días de” conserva bien el valor temporal y es una fórmula natural en español bíblico sin volverse arcaica en exceso.
- source_word: שָׁאוּל
  english_pob_choice: Saul
  chosen_spanish: Saúl
  alternatives_spanish:
  - Saul
  lexicon: Transliteración estándar del nombre propio
  rationale: El nombre propio se vierte de manera usual al español como “Saúl”, forma transparente y reconocible para el lector bíblico hispanohablante.
- source_word: עָשׂוּ מִלְחָמָה
  english_pob_choice: made war
  chosen_spanish: hicieron guerra
  alternatives_spanish:
  - libraron guerra
  - pelearon
  lexicon: HALOT
  rationale: El hebreo usa la locución fija עשה מלחמה. “Hicieron guerra” conserva la estructura verbal del original y mantiene el matiz de acción bélica formal, sin sustituirlo por un verbo demasiado general como “pelearon”.
- source_word: עִם
  english_pob_choice: with
  chosen_spanish: contra
  alternatives_spanish:
  - con
  lexicon: HALOT
  rationale: Aunque el valor básico de la preposición es “con”, en contexto de combate el español exige normalmente “contra” para expresar la relación adversativa de forma clara. La elección no altera el sentido de guerra implícito en el hebreo.
- source_word: הַהַגְרִאִים
  english_pob_choice: the Hagrites
  chosen_spanish: los hagritas
  alternatives_spanish:
  - los hagareos
  - los hagréos
  lexicon: HALOT
  rationale: Se conserva el etnónimo en forma breve y legible. “Hagritas” sigue de cerca la designación del original y evita introducir una explicación interpretativa en el texto principal.
- source_word: וַיִּפְּל֖וּ בְּיָדָם
  english_pob_choice: they fell into their hand
  chosen_spanish: cayeron en su poder
  alternatives_spanish:
  - cayeron en sus manos
  - fueron entregados en su poder
  lexicon: HALOT
  rationale: La expresión hebrea es idiomática y significa quedar sometidos al poder de otro. “Cayeron en su poder” transmite la fuerza del giro sin sonar forzado en español. Se preserva así la tensión entre la imagen literal (“mano”) y el sentido de dominio.
- source_word: וַיֵּשְׁבוּ
  english_pob_choice: they lived
  chosen_spanish: habitaron
  alternatives_spanish:
  - vivieron
  - se establecieron
  lexicon: HALOT
  rationale: En este contexto ישב expresa residir/establecerse. “Habitaron” es más preciso que “vivieron” para una ocupación territorial posterior a la victoria, y mantiene un registro bíblico claro.
- source_word: בְּאָהֳלֵיהֶם
  english_pob_choice: in their tents
  chosen_spanish: en sus tiendas
  alternatives_spanish:
  - en sus campamentos
  - en sus moradas
  lexicon: HALOT
  rationale: Se conserva la imagen concreta de “tiendas”, que forma parte del cuadro narrativo y probablemente alude a asentamientos nómadas. “Tiendas” es más fiel que una generalización como “campamentos”.
- source_word: עַל כָּל פְּנֵי מִזְרָח
  english_pob_choice: throughout all the region east of
  chosen_spanish: por toda la región al oriente de
  alternatives_spanish:
  - a través de toda la región oriental de
  - en toda la extensión al este de
  lexicon: HALOT
  rationale: La locución hebrea expresa extensión espacial. “Por toda la región al oriente de” comunica el alcance geográfico de modo natural en español y mantiene la relación espacial con Galaad.
- source_word: לַגִּלְעָד
  english_pob_choice: Gilead
  chosen_spanish: Galaad
  alternatives_spanish:
  - Gilead
  lexicon: Transliteración bíblica tradicional en español
  rationale: “Galaad” es la forma española estándar del topónimo, ampliamente reconocible y adecuada para una traducción bíblica de lectura pública.
translation_notes:
  revision_awareness: Se tuvo en cuenta el texto hebreo consonante/vocalizado (WLC), la segmentación morfológica y el audit trail inglés. La versión inglesa ya había resuelto el referente implícito de “they” como los hagritas; en español se mantuvo esa inferencia sin explicitarla innecesariamente en el cuerpo, pero se aclaró en nota la imagen literal de “mano” para no perder la tensión idiomática.
  spanish_consistency_notes:
  - Se usó “Yahvé” cuando el texto fuente lo exige; en este versículo no aparece el nombre divino.
  - Se mantuvo un registro bíblico sobrio y contemporáneo, evitando calcos duros salvo donde el hebreo tiene una locución fija.
  - Se prefirió “Galaad” como topónimo español estándar para coherencia con el corpus.
  - Se mantuvo “hagritas” en minúscula por tratarse de etnónimo plural común en español bíblico, salvo criterios editoriales posteriores.
