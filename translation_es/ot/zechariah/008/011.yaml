translation:
  language: es
  text: Pero ahora no seré para el remanente de este pueblo como en los días anteriores[a], declara Yahvé de los ejércitos[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «no trataré al remanente de este pueblo como en los días anteriores». El hebreo es elíptico y deja implícito el matiz exacto según el contexto.'
    reason: alternative_reading
  - marker: b
    text: 'Tradicionalmente: «Yahvé de los ejércitos».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְעַתָּה
  english_pob_choice: But now
  chosen_spanish: Pero ahora
  alternatives_spanish:
  - Y ahora
  - Ahora
  lexicon: HALOT
  rationale: El hebreo introduce un contraste con la situación anterior. «Pero ahora» conserva bien el giro adversativo y suena natural en español.
- source_word: לֹא
  english_pob_choice: not
  chosen_spanish: 'no'
  alternatives_spanish:
  - no seré
  - no estaré
  lexicon: HALOT
  rationale: La negación gobierna la predicación elíptica del verso. En español debe mantenerse con claridad sin añadir contenido que el hebreo deja implícito.
- source_word: כַיָּמִים הָרִאשֹׁנִים
  english_pob_choice: as in the former days
  chosen_spanish: como en los días anteriores
  alternatives_spanish:
  - como en los días primeros
  - como en los días de antes
  lexicon: HALOT
  rationale: La comparación con los «días anteriores» comunica el valor de כ y mantiene el contraste temporal del original. «Anteriores» evita un calco demasiado rígido y sigue siendo fiel.
- source_word: אֲנִי
  english_pob_choice: I
  chosen_spanish: seré
  alternatives_spanish:
  - yo seré
  - yo estaré
  lexicon: HALOT
  rationale: El pronombre explícito puede quedar implícito en español porque la forma verbal ya lo marca; aun así, el sujeto divino sigue siendo claro por el contexto. No se añade una completación excesiva al predicado elíptico.
- source_word: לִשְׁאֵרִית
  english_pob_choice: to the remnant
  chosen_spanish: para el remanente
  alternatives_spanish:
  - al remanente
  - para el resto
  lexicon: HALOT
  rationale: «Remanente» preserva el término profético técnico y evita diluirlo en «resto». El dativo con ל se expresa naturalmente como «para» en esta construcción de relación/beneficio.
- source_word: הָעָם הַזֶּה
  english_pob_choice: of this people
  chosen_spanish: de este pueblo
  alternatives_spanish:
  - de este pueblo este
  - de este pueblo que es
  lexicon: HALOT
  rationale: «Pueblo» refleja correctamente עָם como colectivo singular en español. La relación genitiva se mantiene de forma directa y clara.
- source_word: נְאֻם יְהוָה צְבָאֽוֹת
  english_pob_choice: declares Yahweh of Armies
  chosen_spanish: declara Yahvé de los Ejércitos
  alternatives_spanish:
  - declara Yahvé de los ejércitos
  - declara Yahvé de los ejércitos celestiales
  lexicon: HALOT
  rationale: Se conserva «Yahvé» según la terminología base del proyecto. «De los Ejércitos» traduce צְבָאוֹת de manera transparente y mantiene la imagen marcial/cósmica sin recurrir al tradicional «de los ejércitos» como simple fórmula opaca.
theological_decisions:
- issue: Predicado elíptico tras «no seré para el remanente de este pueblo como en los días anteriores»
  english_pob_reading: Leave the statement open-ended in English without supplying 'against them' or 'as before' beyond the comparison phrase.
  chosen_spanish_reading: 'Mantener la elipsis: «no seré para el remanente de este pueblo como en los días anteriores».'
  alternative_spanish_readings:
  - no trataré al remanente de este pueblo como en los días anteriores
  - no me comportaré con el remanente de este pueblo como en los días anteriores
  rationale: El hebreo no explicita el predicado completo después de «yo». En español conviene conservar esa apertura y no resolverla con una acción concreta que el texto no dice. Así se preserva la tensión teológica y el peso contextual de la frase.
  doctrine_reference: Preservar la elipsis y la tensión contextual del texto profético.
translation_notes:
  revision_awareness: El borrador sigue de cerca la lectura revisada de la fuente hebrea y el audit trail inglés, sin añadir aclaraciones interpretativas que resuelvan la elipsis del original. No se introdujeron cambios textuales adicionales respecto al sentido ya acordado en el control de revisión más reciente.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como forma principal para יהוה, conforme al estándar del proyecto.
  - Se conserva «remanente» para שְׁאֵרִית por su valor técnico profético.
  - «Ejércitos» traduce צְבָאוֹת de manera directa; la nota recoge la alternativa tradicional.
  - La elipsis verbal se deja abierta en la línea principal para no sobre-especificar el sentido.
  - La puntuación y el orden sintáctico siguen una norma natural de español bíblico moderno, sin calcos innecesarios.
