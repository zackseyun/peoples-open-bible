  text: τοὺς δὲ βεβήλους καὶ γραώδεις μύθους παραιτοῦ. γύμναζε δὲ σεαυτὸν πρὸς εὐσέβειαν·
base_translation:
  language: en
  yaml_path: translation/nt/1_timothy/004/007.yaml
  text: But reject profane and old-womanish myths[a], and train yourself for godliness.
  footnotes:
  - marker: a
    text: Or 'old wives'' tales.' The Greek literally means 'myths characteristic of old women,' a pejorative expression.
    reason: lexical_alternative
translation:
  language: ko
  text: 그러나 속되고 노파의 이야기 같은 신화[a]는 물리치고, 도리어 그대 자신을 경건에 이르도록 훈련하십시오.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 또는 「노파의 옛이야기」. 헬라어는 직역하면 「노파에게 특유한 신화」이며 비하적 표현이다.
    reason: lexical_alternative
lexical_decisions:
- source_word: βεβήλους μύθους
  english_pob_choice: profane myths
  chosen_korean: 속된 ~ 신화
  alternatives_korean:
  - 세속적인 신화
  - 거룩하지 않은 신화
  lexicon: BDAG
  rationale: 1:9 βέβηλος와 일관 「속된」. 1:4·4:1 μῦθος와 일관 「신화」.
- source_word: γραώδεις
  english_pob_choice: old-womanish
  chosen_korean: 노파의 이야기 같은
  alternatives_korean:
  - 노파의 이야기 같은
  - 할머니들의 옛이야기 같은
  lexicon: BDAG
  rationale: 헬라어 본문의 비하적 어감을 직역으로 보존한다(현대 독자에게 거슬릴 수 있으나 본문의 어조를 약화하지 않음).
- source_word: παραιτοῦ
  english_pob_choice: reject
  chosen_korean: 물리치고
  alternatives_korean:
  - 거부하고
  - 사양하고
  lexicon: BDAG
  rationale: παραιτέομαι의 「물리치다·거부하다」를 「물리치다」로.
- source_word: γύμναζε δὲ σεαυτὸν πρὸς εὐσέβειαν
  english_pob_choice: train yourself for godliness
  chosen_korean: 그대 자신을 경건에 이르도록 훈련하십시오
  alternatives_korean:
  - 자신을 경건을 위해 단련하십시오
  - 자기를 경건에 합당하도록 연단하십시오
  lexicon: BDAG
  rationale: γυμνάζω는 운동선수의 「훈련」 비유. 「훈련」이 본의를 살린다.
