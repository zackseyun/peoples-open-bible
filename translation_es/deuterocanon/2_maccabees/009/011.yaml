revisions:
- from: Entonces comenzó a llegar a su fin la gran extensión de su arrogancia[a], quebrantado, y a llegar al reconocimiento[b] bajo un azote divino.
  to: Entonces su gran arrogancia comenzó a llegar a su fin[a], quebrantado, y comenzó a llegar a comprender[b] bajo un azote divino.
  rationale: Se revisa para evitar dos calcos poco naturales en español («la gran extensión de su arrogancia» y «llegar al reconocimiento») sin perder la cautela léxica ni teológica del griego. La nueva redacción mantiene el proceso de humillación y reconocimiento bajo juicio divino, y las notas conservan las alternativas relevantes del expediente inglés.
