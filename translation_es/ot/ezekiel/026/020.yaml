translation:
  language: es
  text: Entonces te haré bajar con los que descienden al pozo[a], al pueblo antiguo; y te haré habitar en la tierra de abajo[b], como las ruinas antiguas, con los que descienden al pozo, para que no seas habitada. Pero pondré gloria[c] en la tierra de los vivientes.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'el pueblo antiguo' o 'el pueblo de antaño'.
    reason: lexical_alternative
  - marker: b
    text: O 'en la tierra inferior' o 'en las regiones más bajas'.
    reason: lexical_alternative
  - marker: c
    text: O 'esplendor' o 'hermosura' en la tierra de los vivientes.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהוֹרַדְתִּיךְ
  english_pob_choice: Then I will bring you down
  chosen_spanish: Entonces te haré bajar
  alternatives_spanish:
  - Y te haré bajar
  - Entonces te bajaré
  lexicon: HALOT
  rationale: El hebreo hiphil de ירד es causativo; "te haré bajar" conserva esa fuerza sin sonar rígido en español.
- source_word: יֹרְדֵי בּוֹר
  english_pob_choice: those who go down to the pit
  chosen_spanish: los que descienden al pozo
  alternatives_spanish:
  - los que bajan al pozo
  - los que descienden al sepulcro
  lexicon: HALOT
  rationale: '"Pozo" conserva la imagen concreta de בור y su resonancia de sepulcro/abismo; "descienden" mantiene el participio verbal.'
- source_word: בּוֹר
  english_pob_choice: pit
  chosen_spanish: pozo
  alternatives_spanish:
  - sepulcro
  - fosa
  lexicon: HALOT
  rationale: Se prefirió "pozo" porque en español puede preservar la concreción física y el valor figurado de descenso al mundo de los muertos sin forzar un tecnicismo.
- source_word: עַם עוֹלָם
  english_pob_choice: the people of old
  chosen_spanish: el pueblo antiguo
  alternatives_spanish:
  - el pueblo de antaño
  - el pueblo de los antiguos tiempos
  lexicon: HALOT
  rationale: עוֹלָם aquí señala antigüedad, no duración eterna; "pueblo antiguo" mantiene la referencia temporal sin cargarla de matiz doctrinal.
- source_word: וְהוֹשַׁבְתִּיךְ
  english_pob_choice: I will make you dwell
  chosen_spanish: te haré habitar
  alternatives_spanish:
  - te haré morar
  - te asentaré
  lexicon: HALOT
  rationale: El causativo de ישׁב se expresa naturalmente con "hacer habitar", que conserva la acción de colocar/establecer a alguien en un lugar.
- source_word: בְּאֶרֶץ תַּחְתִּיּוֹת
  english_pob_choice: in the land below
  chosen_spanish: en la tierra de abajo
  alternatives_spanish:
  - en la tierra inferior
  - en el mundo inferior
  lexicon: HALOT
  rationale: La expresión es espacial y poética; "tierra de abajo" reproduce el contraste vertical del hebreo sin resolverlo con un término más técnico.
- source_word: כָּחֳרָבוֹת מֵעוֹלָם
  english_pob_choice: like the ancient ruins
  chosen_spanish: como las ruinas antiguas
  alternatives_spanish:
  - como ruinas de antiguo
  - como las desolaciones antiguas
  lexicon: HALOT
  rationale: La comparación con חורבות y el matiz temporal de מעולם se vierten de forma natural como "ruinas antiguas", preservando la imagen de devastación remota.
- source_word: לְמַעַן לֹא תֵשֵׁבִי
  english_pob_choice: so that you will not be inhabited
  chosen_spanish: para que no seas habitada
  alternatives_spanish:
  - para que no habites
  - para que no te asientes
  lexicon: HALOT
  rationale: Aunque el verbo es literalmente "sentarse/dwelling", aquí se habla de una ciudad; en español el pasivo "ser habitada" comunica mejor el resultado del juicio.
- source_word: וְנָתַתִּי
  english_pob_choice: But I will set
  chosen_spanish: Pero pondré
  alternatives_spanish:
  - Y pondré
  - Y estableceré
  lexicon: HALOT
  rationale: Se conserva el contraste adversativo del contexto y el valor de "poner/establecer" con un complemento abstracto.
- source_word: צְבִי
  english_pob_choice: glory
  chosen_spanish: gloria
  alternatives_spanish:
  - esplendor
  - hermosura
  lexicon: HALOT
  rationale: Aunque צבי puede significar belleza o esplendor, aquí "gloria" sigue la revisión inglesa más reciente y funciona bien como equivalente solemne en español bíblico.
- source_word: בְּאֶרֶץ חַיִּים
  english_pob_choice: in the land of the living
  chosen_spanish: en la tierra de los vivientes
  alternatives_spanish:
  - en la tierra de la vida
  - en el país de los vivos
  lexicon: HALOT
  rationale: Se mantiene la idiomática bíblica "tierra de los vivientes", clara en español y fiel al contraste con el pozo.
theological_decisions:
- issue: Valor de עַם עוֹלָם en un contexto de juicio y descenso al pozo
  english_pob_reading: the people of old
  chosen_spanish_reading: el pueblo antiguo
  alternative_spanish_readings:
  - el pueblo de antaño
  - el pueblo eterno
  rationale: Se preserva el sentido de antigüedad sin convertir עוֹלָם en eternidad; el contexto habla de los muertos/de generaciones antiguas, no de un pueblo eterno.
  doctrine_reference: Mantener la tensión lexical entre antigüedad y duración indefinida sin dogmatizarla.
- issue: Sentido final de צְבִי en contraste con el pozo y la tierra de los vivientes
  english_pob_reading: glory
  chosen_spanish_reading: gloria
  alternative_spanish_readings:
  - esplendor
  - belleza
  rationale: La revisión inglesa favorece "glory" por el registro profético-formal; en español "gloria" conserva ese tono solemne sin decidir excesivamente el matiz exacto de צְבִי.
  doctrine_reference: Preservar la ambigüedad semántica del hebreo con un término bíblico amplio.
translation_notes:
  revision_awareness: 'La redacción española sigue la revisión inglesa más reciente en los puntos clave: ''pueblo antiguo'' para עַם עוֹלָם, ''ruinas antiguas'' para כָּחֳרָבוֹת מֵעוֹלָם y ''gloria'' para צְבִי. Se mantiene el contraste de descenso al pozo y permanencia en la tierra de los vivientes, sin suavizar la imagen de juicio.'
  spanish_consistency_notes:
  - Se usó 'pozo' para בור de manera consistente con su valor figurado de sepulcro/abismo.
  - Se prefirió 'tierra de los vivientes' como fórmula bíblica estable para ארץ חיים.
  - Se mantuvo el paralelismo verbal con 'te haré bajar' / 'te haré habitar' para reflejar los causativos hebreos.
  - El pasivo 'ser habitada' se eligió por la referencia a una ciudad-persona en el juicio profético.
