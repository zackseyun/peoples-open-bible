translation:
  language: es
  text: Ahora, perdona, por favor, mi pecado[a], y vuelve conmigo[b], para que yo me postre ante Yahvé.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «levanta mi pecado», un modismo que significa «perdona mi pecado».'
    reason: lexical_alternative
  - marker: b
    text: O «para que adore a Yahvé»; el verbo hebreo se refiere literalmente a postrarse o prosternarse.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְעַתָּה
  english_pob_choice: Now
  chosen_spanish: Ahora
  alternatives_spanish:
  - Y ahora
  lexicon: HALOT
  rationale: Introduce la súplica inmediata de Saúl en un español natural y solemne. 'Ahora' conserva la relación temporal sin añadir carga interpretativa.
- source_word: שָׂא נָא אֶת חַטָּאתִי
  english_pob_choice: please pardon my sin
  chosen_spanish: por favor, perdona mi pecado
  alternatives_spanish:
  - por favor, levanta mi pecado
  - por favor, carga con mi pecado
  - por favor, absuelve mi pecado
  lexicon: HALOT
  rationale: El hebreo usa literalmente 'levanta' con 'mi pecado', un modismo para quitar/cargar lejos el pecado. En español, 'perdona mi pecado' comunica el sentido idiomático con claridad. 'Pecado' mantiene la fuerza directa de חַטָּאת en este contexto confesional.
- source_word: וְשׁוּב עִמִּי
  english_pob_choice: and return with me
  chosen_spanish: y vuelve conmigo
  alternatives_spanish:
  - y regresa conmigo
  - y vuelve junto a mí
  - y retorna conmigo
  lexicon: HALOT
  rationale: שׁוּב es 'volver/retornar'. 'Vuelve conmigo' expresa bien la petición de que Samuel acompañe a Saúl al regresar, con un verbo natural en español.
- source_word: וְאֶשְׁתַּחֲוֶה
  english_pob_choice: that I may bow down
  chosen_spanish: para que yo me postre
  alternatives_spanish:
  - para que yo me incline
  - para que yo adore
  - para que yo me postre y adore
  lexicon: HALOT
  rationale: El verbo señala postración física. 'Me postre' preserva el acto corporal sin reducirlo solo a una interioridad devocional; el contexto deja implícita la adoración.
- source_word: לַיהוָה
  english_pob_choice: to Yahweh
  chosen_spanish: ante Yahvé
  alternatives_spanish:
  - a Yahvé
  - delante de Yahvé
  - para Yahvé
  lexicon: HALOT
  rationale: La preposición marca dirección del acto de postrarse. 'Ante Yahvé' comunica bien la orientación reverente del gesto y mantiene el nombre divino conforme al estándar español del proyecto.
theological_decisions:
- issue: Renderizado del nombre divino יהוה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - el SEÑOR
  rationale: El proyecto español usa 'Yahvé' como forma principal del Tetragrámaton. Aquí el contexto no exige una sustitución litúrgica; conservar el nombre propio preserva la referencia al pacto y evita el ocultamiento del texto hebreo.
  doctrine_reference: 'DOCTRINE.md Contested terms: יהוה / YHWH'
- issue: Relación entre postrarse y adorar
  english_pob_reading: bow down / worship
  chosen_spanish_reading: me postre
  alternative_spanish_readings:
  - adorar
  - me incline
  - me postre y adore
  rationale: El hebreo expresa literalmente postración. En español, 'me postre' mantiene el sentido físico principal y deja la adoración como implicación contextual, sin sobretraducir el verbo.
  doctrine_reference: HALOT שׁחה / 7812
- issue: Modismo de 'levantar el pecado'
  english_pob_reading: pardon my sin
  chosen_spanish_reading: perdona mi pecado
  alternative_spanish_readings:
  - levanta mi pecado
  - carga con mi pecado
  - borra mi pecado
  rationale: Aunque el hebreo es idiomático, el español bíblico debe expresar el valor semántico, no la metáfora opaca. 'Perdona mi pecado' transmite de manera fiel y comprensible la remoción del pecado implícita en el verbo.
  doctrine_reference: HALOT נשׂא + חטאת
translation_notes:
  revision_awareness: El texto español sigue la última revisión del audit trail al preferir un valor de súplica más directo y formal ('perdona' en lugar de una paráfrasis más amplia) y al usar una construcción de propósito natural ('para que yo me postre') equivalente al 'that I may' final del inglés POB.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' como forma principal del Tetragrámaton, coherente con el estándar del proyecto.
  - '''Pecado'' traduce חַטָּאת en sentido confesional, sin introducir el matiz de sacrificio que no corresponde aquí.'
  - '''Postre'' conserva la postración física del hebreo sin sustituirla por un verbo exclusivamente cultual.'
  - La puntuación conserva dos miembros coordinados y una cláusula final de propósito, reflejando la sintaxis del hebreo y la lectura auditada en inglés.
