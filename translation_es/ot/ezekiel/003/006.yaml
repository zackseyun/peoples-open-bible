translation:
  language: es
  text: no a muchos pueblos de habla oscura y lengua difícil[a], cuyas palabras no entenderás; ciertamente, si yo te hubiera enviado a esos pueblos, te escucharían.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo literalmente: «profundos de labio y pesados de lengua», un modismo para un habla difícil de entender.'
    reason: lexical_alternative
lexical_decisions:
- source_word: עַמִּים רַבִּים
  english_pob_choice: many peoples
  chosen_spanish: muchos pueblos
  alternatives_spanish:
  - muchas naciones
  - muchos pueblos grupos
  lexicon: HALOT
  rationale: «עַמִּים» designa aquí pluralidades étnicas o nacionales; «pueblos» conserva mejor esa pluralidad que «naciones» y suena natural en español bíblico actual. Se omite una duplicación innecesaria de «muchos» con una segunda marca plural en español.
- source_word: עִמְקֵי שָׂפָה
  english_pob_choice: of obscure speech
  chosen_spanish: de habla oscura
  alternatives_spanish:
  - de habla profunda
  - de habla incomprensible
  - de habla extraña
  lexicon: HALOT
  rationale: El hebreo es un modismo literal, «profundos de labio», para un habla difícil de captar. «Habla oscura» transmite la idea de opacidad/comprensión difícil en español sin perder el carácter idiomático.
- source_word: וְכִבְדֵי לָשׁוֹן
  english_pob_choice: and difficult language
  chosen_spanish: y lengua difícil
  alternatives_spanish:
  - y lengua pesada
  - y lengua ardua
  - y lenguaje difícil
  lexicon: HALOT
  rationale: «Pesados de lengua» es literal pero poco natural en español. «Lengua difícil» conserva el sentido idiomático de habla difícil de seguir, en paralelo con «habla oscura».
- source_word: אֲשֶׁר לֹא תִשְׁמַע דִּבְרֵיהֶם
  english_pob_choice: whose words you cannot understand
  chosen_spanish: cuyas palabras no entenderás
  alternatives_spanish:
  - de quienes no oirás las palabras
  - cuyos discursos no comprenderás
  - cuyas palabras no podrás oír
  lexicon: HALOT
  rationale: Aquí שׁמע tiene el valor de «entender/comprender», no solo oír. «Palabras» sigue el hebreo דִּבְרֵי־הֶם y «entenderás» expresa la dificultad comunicativa con claridad.
- source_word: אִם לֹא
  english_pob_choice: Surely, if
  chosen_spanish: ciertamente, si
  alternatives_spanish:
  - seguramente, si
  - en verdad, si
  - si acaso
  lexicon: HALOT
  rationale: La construcción introduce una condición enfática/asseverativa. «Ciertamente, si» comunica la fuerza retórica del hebreo sin sonar forzado en español.
- source_word: שְׁלַחְתִּיךָ
  english_pob_choice: I had sent you
  chosen_spanish: yo te hubiera enviado
  alternatives_spanish:
  - yo te habría enviado
  - yo te envié
  - yo te enviara
  lexicon: HALOT
  rationale: El perfecto en este contexto irreal se expresa mejor en español con pluscuamperfecto de subjuntivo. Se prefiere «hubiera enviado» para la hipotética contrafactual.
- source_word: הֵמָּה יִשְׁמְעוּ אֵלֶיךָ
  english_pob_choice: they would listen to you
  chosen_spanish: ellos te escucharían
  alternatives_spanish:
  - ellos te oirían
  - ellos te prestarían atención
  - ellos te obedecerían
  lexicon: HALOT
  rationale: שׁמע con אֶל puede significar escuchar con respuesta. «Escucharían» mantiene el matiz de atención y receptividad sin llegar a «obedecerían», que excede el punto del versículo.
translation_notes:
  revision_awareness: La revisión inglesa reciente ajustó la puntuación para reflejar mejor el flujo del hebreo, sustituyendo el punto por punto y coma antes de la cláusula final. La redacción española imita ese flujo con punto y coma tras «entenderás».
  spanish_consistency_notes:
  - Se mantiene el registro bíblico moderno, sin recurrir a «SEÑOR» ni a fórmulas eclesiásticas innecesarias.
  - Se prefiere «pueblos» por la pluralidad étnica del hebreo.
  - Se conservó la tensión idiomática de «habla oscura / lengua difícil» en lugar de una paráfrasis interpretativa más libre.
  - Se usó puntuación con punto y coma para reproducir la relación entre la cláusula de comprensión y la condición hipotética final.
