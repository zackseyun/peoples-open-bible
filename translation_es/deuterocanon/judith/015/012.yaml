translation:
  language: es
  text: Y todo el pueblo saqueó el campamento[a] durante treinta días.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O "tomó como botín el campamento durante treinta días". El verbo griego subraya la captura de botín de guerra.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐλαφύρευσεν
  english_pob_choice: plundered
  chosen_spanish: saqueó
  alternatives_spanish:
  - despojó
  - tomó como botín
  lexicon: LSJ
  rationale: El verbo griego expresa la toma de botín de guerra tras una victoria. En español, "saqueó" comunica con naturalidad esa acción militar y mantiene la fuerza del término sin sonar arcaico. "Tomó como botín" conserva más explícitamente la idea de botín, pero resulta menos fluido en la línea principal.
- source_word: πᾶς ὁ λαός
  english_pob_choice: all the people
  chosen_spanish: todo el pueblo
  alternatives_spanish:
  - todo el pueblo reunido
  - toda la gente
  lexicon: LSJ
  rationale: La frase designa al conjunto entero del grupo implicado. "Todo el pueblo" es el equivalente natural en español y conserva el alcance colectivo sin convertirlo indebidamente en "ejército".
- source_word: τὴν παρεμβολὴν
  english_pob_choice: the camp
  chosen_spanish: el campamento
  alternatives_spanish:
  - el campamento militar
  - la encampación
  lexicon: LSJ
  rationale: En este contexto militar, παρεμβολή se refiere al campamento enemigo. "Campamento" es claro y natural en español; "campamento militar" explicita el matiz bélico, pero añade información que el griego no desarrolla aquí.
- source_word: ἐφʼ ἡμέρας τριάκοντα
  english_pob_choice: for thirty days
  chosen_spanish: durante treinta días
  alternatives_spanish:
  - por treinta días
  - a lo largo de treinta días
  lexicon: LSJ
  rationale: La expresión indica duración temporal. "Durante treinta días" reproduce de manera idiomática el valor durativo del griego y suena más natural en español que una traducción más literal con "por".
translation_notes:
  revision_awareness: El texto griego y la auditoría inglesa están en alto acuerdo; no se documentan revisiones sustantivas. La nota mantiene la alternativa léxica señalada en el POB inglés, trasladándola al español.
  spanish_consistency_notes:
  - Se mantiene un registro bíblico claro y contemporáneo, evitando un calco rígido.
  - '"Pueblo" conserva el sujeto colectivo del griego sin sobreespecificar la identidad militar del grupo.'
  - La nota al pie preserva la tensión léxica entre 'saqueó' y 'tomó como botín', correspondiente a la observación inglesa sobre el énfasis del verbo.
