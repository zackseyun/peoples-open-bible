translation:
  language: es
  text: Los que habitan en su sombra volverán; revivirán como el grano[a] y florecerán como la vid; su renombre[b] será como el vino del Líbano.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «producirán grano» o «serán reanimados con grano». La expresión hebrea es condensada y puede evocar el grano que vuelve a la vida o una abundante producción de grano.
    reason: lexical_alternative
  - marker: b
    text: O «su recuerdo» o «su memoria». El hebreo זִכְרוֹ también puede entenderse, menos probablemente en este contexto, como «su renombre» de ello/eso; aquí se traduce «renombre» por el paralelo elogioso con el vino del Líbano.
    reason: lexical_alternative
lexical_decisions:
- source_word: יָשֻׁבוּ
  english_pob_choice: will return
  chosen_spanish: volverán
  alternatives_spanish:
  - regresarán
  - volverán a habitar
  lexicon: HALOT
  rationale: El perfecto/imperfecto verbal expresa retorno o restauración; «volverán» reproduce de manera natural la idea de retorno restaurativo sin forzar una ampliación interpretativa.
- source_word: יֹשְׁבֵי בְצִלּוֹ
  english_pob_choice: Those who dwell in his shade
  chosen_spanish: Los que habitan en su sombra
  alternatives_spanish:
  - Los que moran bajo su sombra
  - Los que habitan en su sombra
  lexicon: HALOT
  rationale: «Habitan» conserva el participio sustantivado, y «sombra» mantiene la imagen de protección. Se prefiere «sombra» sobre «sombra/ sombra» alternatives because it is idiomatic and faithful to the metaphor without intensifying it beyond the Hebrew.
- source_word: יְחַיּוּ דָגָן
  english_pob_choice: they will revive like grain
  chosen_spanish: revivirán como el grano
  alternatives_spanish:
  - vivirán de nuevo como el grano
  - serán reanimados con grano
  - producirán grano
  lexicon: HALOT
  rationale: El piel de חיה tiene fuerza de «revivir / hacer vivir». El hebreo es comprimido y poético; «revivirán como el grano» preserva la imagen de vitalidad agrícola sin imponer una explicación interpretativa adicional.
- source_word: וְיִפְרְחוּ כַגָּפֶן
  english_pob_choice: and blossom like the vine
  chosen_spanish: y florecerán como la vid
  alternatives_spanish:
  - y brotarán como la vid
  - y florecerán como la parra
  lexicon: HALOT
  rationale: «Florecerán» corresponde bien a פרח y conserva el paralelismo con el grano. «Vid» es más natural y preciso en español bíblico que «parra» en este contexto poético.
- source_word: זִכְרוֹ
  english_pob_choice: his renown
  chosen_spanish: su renombre
  alternatives_spanish:
  - su memoria
  - su recuerdo
  - su memorial
  lexicon: HALOT
  rationale: זכר puede significar recuerdo/memoria o renombre; aquí el paralelo con el vino del Líbano favorece la idea de reputación apreciada. «Renombre» comunica esa cualidad sin resolver innecesariamente la ambigüedad del hebreo.
- source_word: כְּיֵין לְבָנוֹן
  english_pob_choice: like the wine of Lebanon
  chosen_spanish: como el vino del Líbano
  alternatives_spanish:
  - como el vino de Líbano
  lexicon: HALOT
  rationale: La comparación es directa; «del Líbano» conserva la referencia geográfica y la formulación idiomática en español.
theological_decisions:
- issue: Referencia del sufijo masculino singular en «su sombra» y «su renombre»
  english_pob_reading: Rendered with masculine singular pronouns ('his') without resolving beyond the Hebrew, allowing the personified referent in context to stand.
  chosen_spanish_reading: Se mantiene el singular posesivo «su» sin precisar más el antecedente.
  alternative_spanish_readings:
  - su sombra / su renombre de ellos
  - su sombra / su renombre de Israel
  - su sombra / su renombre de Efraín
  rationale: El hebreo conserva sufijos singulares; el contexto personifica al pueblo restaurado. En español, «su» permite preservar esa tensión gramatical y poética sin resolverla artificialmente.
  doctrine_reference: Preserve theological tension rather than resolve it.
translation_notes:
  revision_awareness: 'El texto coincide con la revisión más reciente del expediente inglés: no hay revisiones aplicadas y el consenso de auditoría es de alta concordancia; por ello la redacción española conserva las tensiones léxicas principales sin introducir emendaciones.'
  spanish_consistency_notes:
  - Se mantiene el paralelismo agrícola de «grano» / «vid» para reflejar la imaginería del hebreo.
  - Se usa «sombra» como equivalente natural de צֵל, sin convertirlo en «amparo» para no perder la metáfora.
  - Se conserva el singular posesivo «su» para respetar el sufijo hebreo y la ambigüedad referencial.
  - Se evita «SEÑOR» o fórmulas de sustitución, porque este versículo no contiene el nombre divino.
