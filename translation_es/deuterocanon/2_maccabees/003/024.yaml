translation:
  language: es
  text: Pero cuando él ya había llegado allí con los guardias en la tesorería[a], el Soberano de los espíritus y de toda autoridad hizo una gran manifestación[b], de modo que todos los que se habían atrevido a entrar[c], sobrecogidos por el poder de Dios, fueron reducidos a debilidad y temor.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'escoltas' por 'guardias'; el griego literalmente alude a portadores de lanzas.
    reason: lexical_alternative
  - marker: b
    text: O 'hizo una gran aparición'; el griego destaca una manifestación divina impactante.
    reason: lexical_alternative
  - marker: c
    text: También puede entenderse más generalmente como 'se habían atrevido a reunirse', pero el contexto inmediato favorece la entrada en el área de la tesorería.
    reason: alternative_reading
lexical_decisions:
- source_word: αὐτόθι
  english_pob_choice: there
  chosen_spanish: allí
  alternatives_spanish:
  - en ese lugar
  - ahí
  lexicon: LSJ
  rationale: El adverbio de lugar remite al sitio ya mencionado; 'allí' suena natural en español y conserva el avance narrativo sin añadir información.
- source_word: δορυφόροις
  english_pob_choice: guards
  chosen_spanish: guardias
  alternatives_spanish:
  - escoltas
  - hombres armados
  lexicon: LSJ
  rationale: Aunque literalmente alude a 'portadores de lanzas', en contexto designa una escolta armada. 'Guardias' comunica bien la función sin sobredeterminar el matiz militar.
- source_word: γαζοφυλάκιον
  english_pob_choice: treasury
  chosen_spanish: tesoro
  alternatives_spanish:
  - tesorería
  - cámara del tesoro
  lexicon: LSJ
  rationale: El término puede referirse al lugar donde se guardan valores. En español, 'tesoro' mantiene la idea del depósito de riquezas y es comprensible en lectura pública; 'tesorería' sería más institucional.
- source_word: ὁ τῶν πνευμάτων καὶ πάσης ἐξουσίας δυνάστης
  english_pob_choice: the Sovereign of spirits and of all authority
  chosen_spanish: el Soberano de los espíritus y de toda autoridad
  alternatives_spanish:
  - el Señor de los espíritus y de todo poder
  - el soberano de los espíritus y de toda potestad
  lexicon: LSJ
  rationale: δυνάστης designa a un soberano o gobernante; 'Soberano' preserva ese valor sin sustituirlo por κύριος. 'de los espíritus' mantiene el genitivo plural, y 'de toda autoridad' refleja la amplitud de πάσης ἐξουσίας sin reducirla a mera fuerza.
- source_word: ἐπιφάνειαν μεγάλην ἐποίησεν
  english_pob_choice: made a great manifestation
  chosen_spanish: hizo una gran manifestación
  alternatives_spanish:
  - produjo una gran aparición
  - realizó una gran manifestación
  lexicon: LSJ
  rationale: '''Manifestación'' conserva el sentido epifánico de una irrupción visible/divina sin importar un tecnicismo posterior; ''hizo'' reproduce con sobriedad el verbo griego.'
- source_word: κατατολμήσαντας συνελθεῖν
  english_pob_choice: had dared to come in
  chosen_spanish: se habían atrevido a entrar
  alternatives_spanish:
  - habían osado reunirse
  - habían tenido la osadía de entrar
  lexicon: LSJ
  rationale: El contexto inmediato favorece el acceso al área del tesoro, no solo el reunirse. 'Se habían atrevido a entrar' preserva la idea de audacia y la dirección espacial.
- source_word: καταπλαγέντας
  english_pob_choice: struck with awe
  chosen_spanish: sobrecogidos
  alternatives_spanish:
  - aterrados
  - llenos de asombro
  lexicon: LSJ
  rationale: El participio expresa ser violentamente impresionados o sobrecogidos por una presencia abrumadora. 'Sobrecogidos' permite abarcar temor y asombro, mejor que un término exclusivamente emocional.
- source_word: τὴν τοῦ θεοῦ δύναμιν
  english_pob_choice: the power of God
  chosen_spanish: el poder de Dios
  alternatives_spanish:
  - la fuerza de Dios
  lexicon: LSJ
  rationale: La construcción genitiva es directa y el término griego δύναμις aquí apunta a poder/acción eficaz. 'Poder de Dios' es la equivalencia más clara y fiel.
- source_word: εἰς ἔκλυσιν καὶ δειλίαν τραπῆναι
  english_pob_choice: were turned to weakness and fear
  chosen_spanish: fueron reducidos a debilidad y temor
  alternatives_spanish:
  - cayeron en desfallecimiento y miedo
  - quedaron en debilidad y cobardía
  lexicon: LSJ
  rationale: ἔκλυσις sugiere debilitamiento o desfallecimiento, y δειλία temor/cobardía. 'Debilidad y temor' conserva ambos polos; 'reducidos a' expresa el cambio de estado implícito en el pasivo resultativo.
theological_decisions:
- issue: Título divino ὁ τῶν πνευμάτων καὶ πάσης ἐξουσίας δυνάστης
  english_pob_reading: the Sovereign of spirits and of all authority
  chosen_spanish_reading: el Soberano de los espíritus y de toda autoridad
  alternative_spanish_readings:
  - el Señor de los espíritus y de todo poder
  - el soberano de los espíritus y de toda potestad
  rationale: Se conserva la distinción entre δυνάστης y el más común κύριος. 'Soberano' transmite gobierno real/efectivo, mientras que 'autoridad' evita reducir ἐξουσία a mera potencia física. El plural 'espíritus' se mantiene porque el griego no lo singulariza.
  doctrine_reference: 'DOCTRINE.md: Original-language primacy over translation tradition; Translate titles'
translation_notes:
  revision_awareness: 'El contexto auditado en inglés muestra un único ajuste reciente: ''of every authority'' pasó a ''of all authority'' para reflejar con mayor naturalidad πάσης ἐξουσίας. La versión española adopta desde el inicio ''de toda autoridad'', que sigue esa revisión y evita una lectura distributiva demasiado marcada. También se tuvo en cuenta la nota textual/semántica sobre συνελθεῖν, manteniendo la preferencia contextual por ''entrar''.'
  spanish_consistency_notes:
  - Se mantiene 'Dios' para θεός y no se introduce 'Señor' donde el griego no lo usa.
  - '''Soberano'' se reserva para δυνάστης para no aplanar el título en una fórmula eclesiástica más conocida.'
  - '''Poder'' traduce δύναμις de manera uniforme, mientras que ''autoridad'' traduce ἐξουσία para conservar la diferencia semántica.'
  - El inciso 'al tesoro' sigue la lectura contextual del área del gazofilacio, sin forzar una paraprástasis excesiva.
  - '''Sobrecogidos'' equilibra asombro y temor, respetando el resultado emocional fuerte del participio griego.'
