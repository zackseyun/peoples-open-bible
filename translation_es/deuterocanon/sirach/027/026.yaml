revisions:
- from: El que cava un hoyo caerá en él, y el que pone una trampa[a] será atrapado en ella.
  to: El que cava un foso caerá en él, y el que tiende un lazo[a] será atrapado en él.
  rationale: 'Se ajusta la imaginería para reflejar mejor la distinción del griego y la rationale del POB en inglés: βόθρον como ''foso'' y παγίδα como ''lazo''. También se simplifica la referencia pronominal final a ''en él'' por concordar naturalmente con ''lazo'' y mantener el paralelismo proverbial. No se requiere adjudicación adicional.'
