review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura y el sentido básico del griego: imperativos dirigidos a elementos de la creación, objeto «al Señor», y cierre temporal de perpetuidad. Sin embargo, «fuentes» para πηγαί es menos preciso en español contemporáneo que «manantiales» para fuentes naturales, y «exaltadlo» no expresa claramente la intensificación de ὑπερυψοῦτε («ensalzadlo en gran manera» / «exaltadlo en gran manera»).'
  spanish_quality_summary: El texto es legible y litúrgico, pero mezcla voseo peninsular arcaizante («bendecid», «cantad») con un objetivo declarado de español neutral latinoamericano. Conviene regularizar a imperativos de ustedes («bendigan», «canten alabanzas») para mayor naturalidad panhispánica. «Manantiales» mejora la imagen natural, y «ensálcenlo en gran manera» conserva mejor la elevación intensificada con buena fluidez.
  glossary_alignment: «Señor» para κύριος está bien y no activa la política de «Yahvé», ya que la fuente inmediata es griega κύριον. «Bendigan» preserva εὐλογεῖτε. «Lluvias» para ὄμβροι es correcto. Se recomienda «manantiales» para πηγαί por precisión natural. Para ὑμνεῖτε, «canten alabanzas» comunica bien la alabanza cantada. Para ὑπερυψοῦτε, se debe explicitar la intensificación con «ensálcenlo en gran manera».
  issues:
  - severity: medium
    issue: Registro verbal poco natural para el español objetivo
    rationale: «Bendecid / cantad / exaltadlo» suena marcado como peninsular/litúrgico tradicional y no como español neutral latinoamericano ampliamente legible.
  - severity: medium
    issue: πῆγαι traducido como «fuentes»
    rationale: Aunque posible, «fuentes» en español moderno puede sugerir surtidores o construcción humana; «manantiales» representa mejor fuentes naturales de agua en un catálogo de la creación.
  - severity: medium
    issue: Se pierde la fuerza intensiva de ὑπερυψοῦτε
    rationale: «Exaltadlo» por sí solo atenúa el intensivo del verbo griego. Conviene añadir «en gran manera» o equivalente para preservar la elevación reforzada del estribillo.
  revised_spanish_text: Bendigan al Señor, lluvias y manantiales; canten alabanzas y ensálcenlo en gran manera por los siglos.
  revision_rationale: Se ajusta el registro verbal al español neutral latinoamericano, se precisa πηγαί como «manantiales» en contexto de creación, y se restaura la intensificación de ὑπερυψοῦτε con «en gran manera», manteniendo el tono litúrgico y el sentido del estribillo griego.
