  text: שׁ֣וֹר אוֹ כֶ֤שֶׂב אוֹ עֵז֙ כִּ֣י יִוָּלֵ֔ד וְ/הָיָ֛ה שִׁבְעַ֥ת יָמִ֖ים תַּ֣חַת אִמּ֑/וֹ וּ/מִ/יּ֤וֹם הַ/שְּׁמִינִי֙ וָ/הָ֔לְאָה יֵרָצֶ֕ה לְ/קָרְבַּ֥ן אִשֶּׁ֖ה לַ/יהוָֽה־־׃
base_translation:
  language: en
  yaml_path: translation/ot/leviticus/022/027.yaml
  text: When an ox or a sheep or a goat is born[a], it shall remain seven days under its mother, and from the eighth day onward it shall be accepted as a food offering to Yahweh.
  footnotes:
