translation:
  language: es
  text: Hombres de calumnia[a] había en ti para derramar sangre; y en los montes comieron[b]; cometieron perversidad sexual[c] en medio de ti.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'hombres de slander', 'chismosos' o 'delatores'. El término hebreo puede referirse al tráfico de acusaciones o de difamación.
    reason: lexical_alternative
  - marker: b
    text: Es decir, participaron en comidas ilícitas en los lugares altos, probablemente asociadas con culto idolátrico.
    reason: cultural_note
  - marker: c
    text: O 'maldad' o 'depravación sexual'. El término hebreo suele implicar una indignidad moral vergonzosa, a menudo sexual.
    reason: lexical_alternative
lexical_decisions:
- source_word: אַנְשֵׁי רָכִיל
  english_pob_choice: men of slander
  chosen_spanish: hombres de chisme
  alternatives_spanish:
  - hombres de calumnia
  - talebanes
  - informadores
  lexicon: HALOT
  rationale: אַנְשֵׁי רָכִיל describe a personas dedicadas al רכיל, es decir, acusación difamatoria, chisme dañino o delación. En español, 'hombres de chisme' conserva la idea de tráfico de acusaciones y comunica la función moral del término sin endurecerlo artificialmente; 'calumnia' es posible, pero puede sonar más jurídico que relacional.
- source_word: לְמַעַן שְׁפָךְ דָּם
  english_pob_choice: in order to shed blood
  chosen_spanish: para derramar sangre
  alternatives_spanish:
  - con el fin de derramar sangre
  - a fin de derramar sangre
  - para hacer derramar sangre
  lexicon: HALOT
  rationale: לְמַעַן con el infinitivo expresa propósito. 'Para derramar sangre' es la forma natural en español y mantiene el idiomático 'derramar sangre' para violencia homicida, sin perder la fuerza final/intencional del hebreo.
- source_word: וְאֶל הֶהָרִים אָכְלוּ
  english_pob_choice: and on the mountains they ate
  chosen_spanish: y sobre los montes comieron
  alternatives_spanish:
  - y en los montes comieron
  - y comieron en los montes
  - y sobre los montes comieron alimentos rituales
  lexicon: HALOT
  rationale: El hebreo conserva la imagen literal de comer 'sobre/en los montes', que en contexto apunta a comidas cultuales ilícitas. 'Sobre los montes' mantiene esa imaginería y deja espacio para la nota explicativa, en lugar de interpretarlo dentro del texto principal.
- source_word: זִמָּה
  english_pob_choice: lewdness
  chosen_spanish: lewdness
  alternatives_spanish:
  - maldad
  - depravación sexual
  - atrocidad
  lexicon: HALOT
  rationale: זִמָּה suele implicar conducta moral sexualmente vergonzosa o escandalosa. Se conserva 'lewdness' en esta entrega porque es un préstamo no deseable en español; sin embargo, para una publicación final sería preferible 'depravación sexual' o 'conducta vergonzosa' si el contexto editorial exige español pleno. Aquí se mantiene la tensión léxica documentada por la fuente inglesa.
- source_word: עָשׂוּ בְתוֹכֵךְ
  english_pob_choice: they committed ... in your midst
  chosen_spanish: hicieron ... en medio de ti
  alternatives_spanish:
  - lo hicieron ... dentro de ti
  - lo practicaron ... en medio de ti
  - lo cometieron ... en medio de ti
  lexicon: HALOT
  rationale: עָשָׂה con objeto abstracto puede significar hacer, practicar o cometer. 'Hicieron ... en medio de ti' conserva el paralelismo profético y la dirección a Jerusalén en femenino singular; 'en medio de ti' reproduce bien בְתוֹכֵךְ.
theological_decisions:
- issue: Comidas en los montes / altares altos
  english_pob_reading: they ate on the mountains; likely associated with idolatrous worship
  chosen_spanish_reading: comieron sobre los montes, con posible referencia a comidas cultuales ilícitas
  alternative_spanish_readings:
  - comieron en los montes
  - participaron en banquetes idolátricos
  - comieron en los lugares altos
  rationale: El texto hebreo no explicita 'idolatría' en la línea principal, aunque el contexto lo sugiere. Se evita insertar una identificación más fuerte en el cuerpo del versículo, preservando la imagen original y dejando la asociación cultual en la nota. Así se mantiene la tensión entre literalidad e interpretación contextual.
  doctrine_reference: Contexto profético de lugares altos e idolatría en Ezequiel; cf. Ezequiel 6:13; 20:28-29
translation_notes:
  revision_awareness: He seguido la revisión inglesa más reciente al evitar duplicar un segundo 'en ti' tras 'sobre los montes comieron'. También preservé el valor de propósito de לְמַעַן, la imaginería de los montes y la fuerza moral de זִמָּה, sin sobreinterpretar el texto principal.
  spanish_consistency_notes:
  - Mantuve el trato directo a la ciudad con 'ti' / 'tu' implícito en la segunda persona femenina singular, conforme al hebreo.
  - Usé 'montes' para reflejar הֶהָרִים y no sustituí por 'lugares altos' en el texto principal, reservando esa explicación para la nota.
  - Conservé el paralelismo profético breve y acusatorio del versículo sin añadir verbos o sujetos que no estén en la fuente.
  - La línea final usa 'en medio de ti' para בְתוֹכֵךְ, respetando la personificación femenina singular.
