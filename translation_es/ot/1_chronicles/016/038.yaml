translation:
  language: es
  text: Y Obed-edom y sus hermanos[a], sesenta y ocho; y Obed-edom, hijo de Jedutún, y Hosá fueron porteros.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «sus hermanos» (sufijo plural). Algunas versiones suavizan a «sus hermanos» para clarificar la relación, pero el texto hebreo recibido conserva la pluralidad.'
    reason: alternative_reading
lexical_decisions:
- source_word: וְ/עֹבֵ֥ד אֱדֹם
  english_pob_choice: And Obed-edom
  chosen_spanish: Y Obed-edom
  alternatives_spanish:
  - Ahora Obed-edom
  - También Obed-edom
  lexicon: HALOT
  rationale: Se conserva la conjunción simple para mantener la continuidad de la lista genealógica/administrativa del contexto. El nombre propio se translitera de forma estándar en español.
- source_word: וַ/אֲחֵי/הֶ֖ם
  english_pob_choice: and their brothers
  chosen_spanish: y sus hermanos
  alternatives_spanish:
  - y sus hermanos[a]
  - y sus hermanos
  - y sus hermanos varones
  lexicon: HALOT
  rationale: Se mantiene el sufijo plural del texto hebreo recibido. En español, 'sus hermanos' refleja mejor la forma plural que 'sus hermanos' singularizada; no se suaviza a 'sus hermanos' de manera individualizante porque el hebreo conserva la pluralidad.
- source_word: שִׁשִּׁ֣ים וּ/שְׁמוֹנָ֑ה
  english_pob_choice: sixty-eight
  chosen_spanish: sesenta y ocho
  alternatives_spanish:
  - sesenta y ocho
  - sesenta y ocho
  lexicon: HALOT
  rationale: El cardinal se expresa en español moderno estándar. La forma natural no altera el valor numérico del hebreo.
- source_word: בֶּן יְדִית֛וּן
  english_pob_choice: son of Jeduthun
  chosen_spanish: hijo de Jedutún
  alternatives_spanish:
  - el hijo de Jedutún
  lexicon: HALOT
  rationale: Se conserva la relación filial formal, importante para la identificación genealógica en Crónicas. 'Hijo de' es la equivalencia directa y clara en español.
- source_word: וְ/חֹסָ֖ה
  english_pob_choice: and Hosah
  chosen_spanish: y Hosá
  alternatives_spanish:
  - y Hosá
  lexicon: HALOT
  rationale: Nombre propio transliterado con adaptación ortográfica española mínima para lectura fluida.
- source_word: לְ/שֹׁעֲרִֽים־
  english_pob_choice: were gatekeepers
  chosen_spanish: fueron porteros
  alternatives_spanish:
  - fueron porteros
  - servían como porteros
  - eran porteros
  lexicon: HALOT
  rationale: En español bíblico natural, 'porteros' comunica la función de guardia/guardián de acceso con fidelidad al contexto del templo. 'Fueron' expresa la asignación de oficio que el lamed hebreo indica; se evita una paráfrasis más explicativa que el hebreo no exige.
theological_decisions:
- issue: Función ministerial del término לְשֹׁעֲרִים
  english_pob_reading: were gatekeepers
  chosen_spanish_reading: fueron porteros
  alternative_spanish_readings:
  - servían como porteros
  - eran porteros
  rationale: El hebreo usa ל para indicar función u oficio. La traducción española debe expresar esa designación sin añadir doctrina ni desplazar el oficio a un sentido más amplio. 'Porteros' es una equivalencia tradicional y clara para el cargo de vigilancia de acceso.
  doctrine_reference: Orden y servicio del templo; oficio levítico de guardia/entrada, sin implicaciones doctrinales adicionales.
translation_notes:
  revision_awareness: El texto hebreo recibido coincide sustancialmente con la auditoría inglesa; no se requieren cambios de alcance. Se conserva la pluralidad de 'sus hermanos' y la estructura listada del versículo, con ajuste natural al español.
  spanish_consistency_notes:
  - Se usa 'Y' inicial para reflejar la continuidad narrativa.
  - 'Se mantiene la transliteración de nombres propios de forma consistente: Obed-edom, Jedutún, Hosá.'
  - '''Porteros'' se reserva aquí para el oficio de vigilancia de puertas; no se reemplaza por un término eclesiástico moderno.'
  - Se preserva el número como cardinal compuesto normal en español.
  - La nota al pie marca la tensión del plural hebreo sin resolverla por armonización.
