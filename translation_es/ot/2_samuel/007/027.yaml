revisions:
- from: 'Porque tú, Yahvé de los ejércitos, Dios de Israel, has revelado[a] a tu siervo, diciendo[b]: «Una casa te edificaré». Por eso tu siervo ha hallado en su corazón[c] para orar ante ti esta oración.'
  to: 'Porque tú, Yahvé de los ejércitos, Dios de Israel, has revelado[a] esto a tu siervo, diciendo[b]: «Te edificaré una casa». Por eso tu siervo ha hallado en su corazón[c] dirigirte esta oración.'
  rationale: La revisión corrige una omisión semántica («esto»), reemplaza una construcción española defectuosa por una formulación natural que conserva el hebraísmo de resolución interior, y suaviza el orden de la cita para mejor legibilidad sin perder solemnidad ni el doble sentido teológico de «casa».
