revisions:
- from: 'Entonces el Rabsaqué les dijo[a]: «Por favor, digan a Ezequías: “Así dice el gran rey[b], el rey de Asiria: ¿Qué es esta confianza que has puesto[c]?”»'
  to: 'Entonces el Rabsaqué les dijo[a]: «Por favor, digan a Ezequías: “Así dice el gran rey, el rey de Asiria: ¿Qué es esta confianza en la que has confiado[b]?”»'
  rationale: Se reemplaza «que has puesto» por «en la que has confiado» para reflejar con mayor fidelidad el verbo hebreo בטח y conservar en el texto principal la relación retórica con «confianza». También se recoloca la nota léxica en la cláusula pertinente y se elimina la nota redundante.
