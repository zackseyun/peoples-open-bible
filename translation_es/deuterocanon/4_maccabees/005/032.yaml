  text: Ante esto, prepara las ruedas, y sopla el fuego con todavía más intensidad.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: πρὸς ταῦτα
  english_pob_choice: For this
  chosen_spanish: Para esto
  alternatives_spanish:
  - Ante esto
  - En respuesta a esto
  - Por esto
  lexicon: LSJ
  rationale: La frase funciona como transición discursiva hacia una orden dada en reacción a lo que acaba de decirse. «Para esto» mantiene la referencia breve y natural sin explicitar de más el matiz de respuesta.
- source_word: τροχοὺς
  english_pob_choice: the wheels
  chosen_spanish: las ruedas
  alternatives_spanish:
  - las ruedas de tortura
  - los cilindros
  - los carros
  lexicon: LSJ
  rationale: τροχοί significa literalmente «ruedas». En este contexto martirial puede aludir a un instrumento de tortura, pero el griego nombra el objeto de forma directa; «las ruedas» conserva esa concreción sin interpretar demasiado.
- source_word: εὐτρέπιζε
  english_pob_choice: prepare
  chosen_spanish: prepara
  alternatives_spanish:
  - ten listas
  - dispón
  - alista
  lexicon: LSJ
  rationale: Es un imperativo que pide dejar listo el instrumento. «Prepara» es claro, sobrio y acorde con el tono del mandato.
- source_word: τὸ πῦρ
  english_pob_choice: the fire
  chosen_spanish: el fuego
  alternatives_spanish:
  - la llama
  - el brasero
  lexicon: LSJ
  rationale: El artículo griego señala un fuego concreto ya presente en la escena; «el fuego» refleja esa especificidad sin añadir detalles no dichos.
- source_word: ἔκφυσα
  english_pob_choice: blow
  chosen_spanish: sopla
  alternatives_spanish:
  - aviva
  - sopla sobre
  - abanica
  lexicon: LSJ
  rationale: El verbo describe soplar sobre el fuego para intensificarlo. «Sopla» conserva la imagen verbal directa y permite que el contexto muestre la finalidad intensificadora.
- source_word: σφοδρότερον
  english_pob_choice: even more fiercely
  chosen_spanish: con todavía más furia
  alternatives_spanish:
  - con mayor intensidad
  - aún más violentamente
  - con más fuerza
  lexicon: LSJ
  rationale: El comparativo intensifica el acto de avivar el fuego. «Con todavía más furia» comunica el aumento de intensidad en español natural y mantiene el tono enérgico del original.
translation_notes:
  revision_awareness: El texto base en inglés fue revisado y quedó sin cambios; la lectura griega se mantiene estable y la traducción española sigue de cerca la imagen verbal sin introducir interpretaciones ajenas al pasaje.
  spanish_consistency_notes:
  - Se mantiene un estilo sobrio y directo, adecuado para discurso narrativo de martirio.
  - No se añadió nota al pie porque el español elegido («sopla el fuego») ya refleja la imagen griega sin necesidad de desdoblar alternativas en el texto principal.
