- from: La mujer Necedad es alborotadora;[a] es simple y no sabe nada.
  to: La mujer Necedad es ruidosa;[a] es simple y no sabe nada.
  rationale: Se ajusta «alborotadora» a «ruidosa» para representar con mayor precisión el adjetivo/participio hebreo sin añadir un matiz agentivo. Se conserva el resto del verso porque es fiel, natural y coherente con la auditoría inglesa; también se mantiene la nota literal sobre la abrupta expresión hebrea «no sabe qué».
  reviewer_model: gpt-5.4
