translation:
  language: es
  text: Hay un hombre a quien Dios da riqueza, posesiones y honor, y no le falta nada para sí de todo lo que desea; pero Dios no le concede comer de ellos, porque un extranjero[a] los come. Esto es vanidad y un mal grave.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘un forastero’. El hebreo dice literalmente ‘un hombre extranjero’.
    reason: lexical_alternative
lexical_decisions:
- source_word: אִישׁ אֲשֶׁר
  english_pob_choice: There is a man to whom
  chosen_spanish: Hay un hombre[a] a quien
  alternatives_spanish:
  - Hay una persona a quien
  - Un hombre a quien
  lexicon: HALOT
  rationale: El hebreo abre de forma elíptica con un singular masculino representativo. En español, "Hay un hombre" conserva la observación proverbial y mantiene el valor representativo de אִישׁ sin neutralizar indebidamente el sujeto.
- source_word: יִתֶּן לוֹ הָאֱלֹהִים
  english_pob_choice: God gives
  chosen_spanish: Dios da
  alternatives_spanish:
  - Dios ha dado
  - Dios concede
  lexicon: HALOT
  rationale: El imperfecto expresa una observación general. "Da" mantiene esa fuerza proverbial con español natural y fiel al sentido.
- source_word: עֹשֶׁר
  english_pob_choice: riches
  chosen_spanish: riqueza
  alternatives_spanish:
  - riquezas
  - riqueza material
  lexicon: HALOT
  rationale: En esta lista, "riqueza" funciona bien en español y permite agrupar el campo semántico de bienes acumulados sin forzar un plural innecesario.
- source_word: נְכָסִים
  english_pob_choice: possessions
  chosen_spanish: posesiones
  alternatives_spanish:
  - bienes
  - propiedades
  lexicon: HALOT
  rationale: '"Posesiones" conserva el sentido de bienes poseídos y mantiene la progresión de la lista con un término claro y digno.'
- source_word: כָבוֹד
  english_pob_choice: honor
  chosen_spanish: honor
  alternatives_spanish:
  - gloria
  - prestigio
  lexicon: HALOT
  rationale: En este contexto social, "honor" es la mejor correspondencia para כָבוֹד y evita elevar indebidamente el término a un sentido más litúrgico de "gloria".
- source_word: וְאֵינֶנּוּ חָסֵר לְנַפְשׁוֹ
  english_pob_choice: so that he lacks nothing for himself
  chosen_spanish: y no le falta nada para sí
  alternatives_spanish:
  - y nada le falta para su alma
  - y no carece de nada para sí mismo
  lexicon: HALOT
  rationale: '"Para sí" comunica el idiomático לְנַפְשׁוֹ sin introducir una antropología técnica de "alma". La frase conserva la idea de suficiencia personal.'
- source_word: מִכֹּל אֲשֶׁר יִתְאַוֶּה
  english_pob_choice: of all that he desires
  chosen_spanish: de todo lo que desea
  alternatives_spanish:
  - de todo lo que anhela
  - de todo lo que codicia
  lexicon: HALOT
  rationale: '"Desea" es amplio y sobrio; evita una carga negativa excesiva que tendría "codicia" y mantiene la amplitud del hebreo.'
- source_word: וְלֹא יַשְׁלִיטֶנּוּ הָאֱלֹהִים
  english_pob_choice: yet God does not enable him
  chosen_spanish: pero Dios no le concede
  alternatives_spanish:
  - pero Dios no le permite
  - pero Dios no le da poder
  lexicon: HALOT
  rationale: יַשְׁלִיטֶנּוּ expresa hacer que tenga dominio o capacidad. En español, "no le concede" conserva el matiz de no otorgarle la facultad efectiva de disfrutarlo, y encaja con el seguimiento de la imagen del comer.
- source_word: לֶאֱכֹל מִמֶּנּוּ
  english_pob_choice: to eat from them
  chosen_spanish: comer de ello
  alternatives_spanish:
  - comer de ellos
  - disfrutar de ello
  lexicon: HALOT
  rationale: Se mantiene la metáfora concreta de comer, que en Qohelet suele aludir al goce o aprovechamiento de los bienes. "De ello" resume el conjunto plural de riquezas, posesiones y honor.
- source_word: אִישׁ נָכְרִי
  english_pob_choice: a foreign man / a foreigner
  chosen_spanish: un hombre extranjero
  alternatives_spanish:
  - un extranjero
  - un forastero
  lexicon: HALOT
  rationale: La combinación de אִישׁ + נָכְרִי se conserva al menos parcialmente con "hombre extranjero"; así se mantiene el color literal del hebreo y la referencia a una persona ajena.
- source_word: יֹאכֲלֶנּוּ
  english_pob_choice: eats them
  chosen_spanish: lo come
  alternatives_spanish:
  - los come
  - lo consume
  lexicon: HALOT
  rationale: Aunque el conjunto previo es plural en sentido, el sufijo hebreo es singular; en español, "lo" resulta más compacto y puede referirse al conjunto de bienes como una unidad colectiva.
- source_word: זֶה הֶבֶל
  english_pob_choice: This is vanity
  chosen_spanish: Esto es vanidad
  alternatives_spanish:
  - Esto es vapor
  - Esto es futilidad
  lexicon: HALOT
  rationale: '"Vanidad" sigue la tradición de Ecclesiastés y corresponde al término clave hebel, sin perder la posibilidad de una lectura más amplia de vaciedad o inconsistencia.'
- source_word: וָחֳלִי רָע
  english_pob_choice: a grievous evil
  chosen_spanish: un mal grave
  alternatives_spanish:
  - una grave aflicción
  - una grave enfermedad
  lexicon: HALOT
  rationale: La revisión inglesa prefirió "evil" frente a "sickness"; en español, "mal grave" conserva ese juicio ético-existencial fuerte sin convertirlo en una enfermedad física concreta.
theological_decisions:
- issue: Representación del masculino singular אִישׁ
  english_pob_reading: man
  chosen_spanish_reading: hombre
  alternative_spanish_readings:
  - persona
  - alguien
  rationale: El hebreo usa un singular masculino genérico y representativo. "Hombre" mantiene ese rasgo sin convertirlo en neutralización interpretativa.
  doctrine_reference: Translation philosophy §4
- issue: Sentido de לְנַפְשׁוֹ
  english_pob_reading: for himself
  chosen_spanish_reading: para sí
  alternative_spanish_readings:
  - para su alma
  - para sí mismo
  rationale: En este contexto sapiencial, נֶפֶשׁ funciona como la persona misma o su vida concreta. "Para sí" evita imponer una lectura antropológica de "alma" que el verso no exige.
  doctrine_reference: Translation philosophy §1, §3
- issue: Final phrase וָחֳלִי רָע
  english_pob_reading: a grievous evil
  chosen_spanish_reading: un mal grave
  alternative_spanish_readings:
  - una grave aflicción
  - una grave enfermedad
  rationale: La revisión del POB en inglés descartó "sickness" por no captar bien la expresión hebrea. En español, "mal grave" preserva la gravedad moral/existencial de la frase sin especificarla erróneamente como padecimiento físico.
  doctrine_reference: Revision note 2026-04-23; lexical decision for הֶבֶל וָחֳלִי רָע
translation_notes:
  revision_awareness: He seguido la revisión inglesa más reciente, que prefirió una lectura más natural de la clausula final como ‘a grievous evil’ y aclaró el valor idiomático de ‘to eat from them’. En español se conserva la metáfora de comer, se evita traducir לְנַפְשׁוֹ como ‘alma’, y se mantiene la observación proverbial en singular masculino representativo.
  spanish_consistency_notes:
  - Se mantiene Dios para הָאֱלֹהִים, conforme al criterio del proyecto.
  - Se conserva el verbo de comer como metáfora de disfrute/aprovechamiento, sin sustituirlo por ‘disfrutar’ en el texto principal.
  - ‘Vanidad’ se usa como término técnico de Ecclesiastés, y no se reemplaza por un sinónimo interpretativo.
  - El pie de nota se ancla en ‘hombre extranjero’ para preservar la alternativa lexical documentada.
