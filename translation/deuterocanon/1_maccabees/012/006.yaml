- issue: Force of 'brothers' in a diplomatic address
  chosen_reading: Retain 'brothers' as the stated kinship language of the letter.
  alternative_readings:
  - friends
  - kinsmen
  rationale: The text presents the Spartans as 'brothers,' reflecting the letter's diplomatic claim of fraternity. The translation preserves that claim without endorsing or explaining it beyond the wording of the verse.
