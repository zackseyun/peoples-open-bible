review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien el sentido del hebreo: conflicto hostil contra Jeremías, fracaso de sus adversarios, razón causal en la presencia divina, fórmula profética, y propósito de liberación. También conserva correctamente el nombre divino como «Yahvé». La única desviación relevante está en la nota [a], que presenta «pelearán contigo» como alternativa, pero en español esa frase suele sonar cooperativa o ambigua y no preserva con claridad la dirección hostil de אֵלֶיךָ con נלחם.'
  spanish_quality_summary: El texto principal es claro, natural y digno en español eclesial moderno. «Pelearán contra ti… no prevalecerán contra ti… yo estoy contigo… para librarte» suena bien y mantiene el tono profético. La puntuación y la sintaxis son buenas. Solo conviene ajustar la nota [a] para que la alternativa sea fiel y plenamente idiomática en español.
  glossary_alignment: 'Buena alineación con el glosario del proyecto: יְהוָה → «Yahvé» en texto principal; לְהַצִּילֶךָ → «librarte» con alternativa «rescatarte»; fórmula profética conservada con «declara Yahvé». No hay conflictos con la terminología doctrinal principal.'
  issues:
  - severity: medium
    issue: La nota [a] ofrece «pelearán contigo» como alternativa.
    rationale: Aunque formalmente podría reflejar una preposición cercana al inglés «with you», en español «pelear con/alguien» puede entenderse como pelear junto a alguien o tener una riña, y no comunica tan claramente el valor hostil idiomático de נלחם אֶל. Una alternativa como «lucharán contra ti» o «combatirán contra ti» preserva mejor el sentido fuente y evita ambigüedad.
  - severity: low
    issue: La nota [b] tiene comillas y formato algo torpes.
    rationale: El contenido es correcto, pero conviene normalizar la redacción y la puntuación para una presentación editorial más limpia en español.
  revised_spanish_text: Pelearán contra ti[a], pero no prevalecerán contra ti, porque yo estoy contigo, declara Yahvé[b], para librarte[c].
  revised_footnotes:
  - marker: a
    text: O «lucharán contra ti».
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «declara YHWH»; se conserva el nombre divino como «Yahvé».'
    reason: alternative_reading
  - marker: c
    text: O «para rescatarte».
    reason: lexical_alternative
  revision_rationale: Se conserva el texto principal, que es fiel y natural. Se corrige la nota [a] para eliminar una alternativa española ambigua y se pule la redacción de la nota [b] para mayor claridad editorial.
