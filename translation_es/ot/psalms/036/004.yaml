lexical_decisions:
- source_word: דִּבְרֵי
  english_pob_choice: The words of
  chosen_spanish: Las palabras de
  alternatives_spanish:
  - La խոս?
  - Los dichos de
  lexicon: HALOT
  rationale: 'דִּבְרֵי es plural constructo de דָּבָר, por lo que conviene conservar el plural y la relación posesiva natural en español: ''Las palabras de''.'
- source_word: פִיו
  english_pob_choice: his mouth
  chosen_spanish: su boca
  alternatives_spanish:
  - su boca
  - su habla
  lexicon: HALOT
  rationale: פִּי/ו es literalmente 'su boca'. Mantener la imagen concreta evita diluir el hebraísmo en un abstracto como 'habla'.
- source_word: אָוֶן
  english_pob_choice: wickedness
  chosen_spanish: maldad
  alternatives_spanish:
  - iniquidad
  - mal
  - perversidad
  lexicon: HALOT
  rationale: אָוֶן puede abarcar maldad, iniquidad o calamidad. Aquí, junto con 'engaño' y referido a lo que sale de la boca, 'maldad' comunica bien la carga moral sin sobreespecificar.
- source_word: וּמִרְמָה
  english_pob_choice: and deceit
  chosen_spanish: y engaño
  alternatives_spanish:
  - y fraude
  - y treta
  - y falsedad
  lexicon: HALOT
  rationale: מִרְמָה suele expresar engaño o fraude. 'Engaño' es la correspondencia más natural y clara en español para el contexto del habla.
- source_word: חָדַל
  english_pob_choice: he has ceased
  chosen_spanish: ha dejado de
  alternatives_spanish:
  - ha cesado de
  - ya no
  lexicon: HALOT
  rationale: חדל denota cesación. 'Ha dejado de' conserva el valor perfectivo y suena idiomático en español, sin perder la idea de interrupción de una práctica.
- source_word: לְהַשְׂכִּיל
  english_pob_choice: to act wisely
  chosen_spanish: actuar con sabiduría
  alternatives_spanish:
  - proceder con prudencia
  - obrar sabiamente
  - tener entendimiento
  lexicon: HALOT
  rationale: El hifil de שכל puede significar actuar con prudencia/entendimiento. Dado el paralelo con 'hacer el bien', 'actuar con sabiduría' conserva la idea práctica sin volverla meramente intelectual.
- source_word: לְהֵיטִיב
  english_pob_choice: to do good
  chosen_spanish: hacer el bien
  alternatives_spanish:
  - obrar bien
  - hacer lo bueno
  - beneficiar
  lexicon: HALOT
  rationale: El hifil de יטב significa hacer el bien o actuar beneficiosamente. 'Hacer el bien' es una fórmula clara y fiel al infinitivo final del hebreo.
translation_notes:
  revision_awareness: 'La redacción sigue el texto hebreo masorético de Salmo 36:4 y refleja el ajuste del POB inglés más reciente: ''he has ceased to act wisely, to do good'', manteniendo la distinción entre actuar con sabiduría y hacer el bien en dos complementos paralelos.'
  spanish_consistency_notes:
  - 'Se conserva el paralelismo poético con dos miembros coordinados: ''maldad y engaño'' / ''ha dejado de actuar con sabiduría, de hacer el bien''.'
  - Se eligió 'su boca' y no 'su habla' para mantener la imaginería concreta del hebreo.
  - No se sustituyó 'Yahvé' porque este versículo no contiene el nombre divino.
