review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español transmite bien el sentido básico del griego: dos imperativos coordinados, propósito preventivo con ἵνα μὴ εἰσέλθητε, y el contraste entre espíritu y carne. También mantiene correctamente «espíritu» en minúscula y «carne» para σάρξ. Sin embargo, la nota léxica para πειρασμόν no refleja con precisión el expediente inglés: introduce «ensayo», que suena impropio aquí, y repite «prueba» de forma torpe en la explicación.'
  spanish_quality_summary: El texto principal es claro, natural y digno. «Manténganse despiertos y oren» funciona bien en contexto. «El espíritu, en verdad, está dispuesto» es entendible, aunque algo más fluido en español sería «El espíritu, ciertamente, está dispuesto»; aun así, no exige cambio obligatorio. La principal deficiencia está en la redacción de la nota al pie, que necesita español más natural y terminología más adecuada.
  glossary_alignment: 'Alineación buena con el glosario del proyecto: πνεῦμα -> «espíritu» en minúscula según contexto humano; σάρξ -> «carne» y no una paráfrasis como «naturaleza pecaminosa»; πειρασμόν -> «tentación» en el texto principal con alternativa de nota. No hay términos del nombre divino ni de Mesías implicados.'
  issues:
  - severity: medium
    issue: La nota al pie usa «ensayo» como alternativa para πειρασμόν.
    rationale: «Ensayo» no corresponde bien al rango semántico de πειρασμός en este contexto bíblico y no sigue el expediente inglés, que da «testing» o «trial». En español, «prueba» o «prueba difícil»/«tribulación de prueba» serían mejores; al menos «prueba» basta.
  - severity: medium
    issue: 'La explicación de la nota repite «prueba» de manera poco natural: «una prueba o prueba de resistencia».'
    rationale: 'La nota actual tiene un problema de estilo y claridad. Debe expresarse con español idiomático, por ejemplo «una incitación al pecado o una prueba». '
  revised_spanish_text: Manténganse despiertos y oren[a], para que no entren en tentación. El espíritu, en verdad, está dispuesto, pero la carne es débil.
  revised_footnotes:
  - marker: a
    text: O «prueba» para «tentación» (πειρασμόν). El término griego puede referirse tanto a una incitación al pecado como a una prueba.
    reason: lexical_alternative
  revision_rationale: Se conserva el texto principal porque es fiel al griego, natural en español y alineado con las decisiones léxicas y teológicas del POB. Se corrige únicamente la nota al pie para ajustarla mejor al expediente inglés y mejorar su español.
