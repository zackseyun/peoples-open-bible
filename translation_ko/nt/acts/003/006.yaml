id: ACT.3.6
reference: Acts 3:6
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: εἶπεν δὲ Πέτρος· Ἀργύριον καὶ χρυσίον οὐχ ὑπάρχει μοι, ὃ δὲ ἔχω τοῦτό σοι δίδωμι· ἐν τῷ ὀνόματι Ἰησοῦ Χριστοῦ τοῦ Ναζωραίου ⸀περιπάτει.
base_translation:
  language: en
  yaml_path: translation/nt/acts/003/006.yaml
  text: 'But Peter said[a], “Silver and gold I do not have, but what I do have, this I give to you: in the name of Jesus Messiah the Nazarene[b], walk.”'
  footnotes:
  - marker: a
    text: Or “Jesus Christ.” The Greek title Χριστός is rendered “Messiah” here to preserve its meaning.
    reason: alternative_reading
  - marker: b
    text: Or “of Nazareth.” Greek τοῦ Ναζωραίου is more literally “the Nazarene.”
    reason: lexical_alternative
translation:
  language: ko
  text: 그러나 베드로가 말하였습니다. 「내게는 은과 금은 없으나, 내게 있는 것을 그대에게 주겠습니다. 나사렛 사람 예수 메시아의 이름으로[a] 걸으십시오.」
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 헬라어 Ἰησοῦ Χριστοῦ τοῦ Ναζωραίου. Χριστός를 칭호 「메시아」로 옮긴다.
    reason: alternative_reading
theological_decisions:
- issue: 3:6에서 치유 정식의 이름 처리
  chosen_reading: 나사렛 사람 예수 메시아의 이름으로
  alternative_readings:
  - 예수 그리스도의 이름으로
  rationale: 사도행전 초반의 그리스도론 정착 단계에서 Χριστός는 칭호로 기능하므로 「메시아」로 옮기고, Ναζωραῖος는 「나사렛 사람」으로 옮겨 지명 정체성을 보존한다. 치유는 이 이름의 권세에 직접 결부된다.
  doctrine_reference: 'DOCTRINE.md: Translate titles; Contested terms table for Χριστός'
