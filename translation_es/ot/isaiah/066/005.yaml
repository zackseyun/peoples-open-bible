base_translation:
  language: en
  yaml_path: translation/ot/isaiah/066/005.yaml
  text: 'Hear the word of Yahweh[a], you who tremble at his word: Your brothers who hate you, who cast you out for my name’s sake, have said, “Let Yahweh be glorified, that we may see your joy”[b]; but they will be put to shame.'
  footnotes:
  - marker: a
    text: Or, “who exclude you” or “who banish you.”
    reason: lexical_alternative
  - marker: b
    text: Hebrew, “Let the LORD be glorified, that we may see your joy.” The speakers are likely mocking the faithful; alternatively, the line may be rendered, “May the LORD be honored, and let us see your joy.”
    reason: alternative_reading
