revisions:
- from: Tus muertos vivirán; mis cuerpos muertos resucitarán. ¡Despierten y griten de gozo, ustedes que habitan en el polvo! Porque tu rocío es rocío de luces, y la tierra expulsará a los [c] muertos.
  to: Tus muertos vivirán[a]; mis cuerpos sin vida resucitarán. ¡Despierten y griten de gozo, ustedes que habitan en el polvo! Porque tu rocío es rocío de luces[b], y la tierra expulsará a los muertos[c].
