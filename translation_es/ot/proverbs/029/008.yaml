review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el paralelismo y el sentido general del hebreo: los burladores provocan desorden cívico y los sabios hacen retroceder la ira. Sin embargo, la elección principal «los hombres de burla» no suena idiomática en español y no reproduce bien el valor categorial de אַנְשֵׁי לָצוֹן, que en Proverbios se expresa mejor como «los burladores» o «los escarnecedores». Además, el orden de las notas en el texto español no corresponde bien a su función: la nota sobre la metáfora debe anclarse en el verbo, y la alternativa «prenden fuego» también depende del verbo, no de «ciudad».'
  spanish_quality_summary: El texto es comprensible y digno, pero «los hombres de burla» resulta torpe y poco natural para lectura bíblica pública. «Inflaman una ciudad» es aceptable y claro. «Los sabios apartan la ira» es idiomático y fiel. Conviene simplificar a una formulación más natural y reanclar las notas al verbo para mejorar legibilidad y precisión editorial.
  glossary_alignment: No hay conflictos con la terminología doctrinal del proyecto. «Los sabios» para חֲכָמִים es una excepción razonable y ya documentada en el propio borrador; en español es más natural que «hombres sabios». «Ira» para אָף es adecuado. La principal corrección léxica necesaria es אַנְשֵׁי לָצוֹן -> «los burladores», no «los hombres de burla».
  issues:
