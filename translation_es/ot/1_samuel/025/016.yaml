translation:
  language: es
  text: Fueron un muro alrededor de nosotros[a], tanto de noche como de día, todos los días que estuvimos con ellos, cuidando el rebaño[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «sobre nosotros», preservando con más literalidad la preposición; el sentido es el de una presencia protectora que los rodeaba.
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «el rebaño» (צאן), término colectivo que puede incluir ovejas y cabras.'
    reason: lexical_alternative
lexical_decisions:
- source_word: חוֹמָה
  english_pob_choice: a wall
  chosen_spanish: un muro
  alternatives_spanish:
  - una pared
  - una muralla
  - una protección
  lexicon: HALOT
  rationale: Conserva la imagen concreta de una estructura protectora. En español, «muro» suena natural y mantiene la fuerza figurada sin volverla abstracta.
- source_word: הָיוּ
  english_pob_choice: were
  chosen_spanish: fueron
  alternatives_spanish:
  - eran
  - estuvieron
  lexicon: HALOT
  rationale: El perfecto hebreo aquí presenta una realidad pasada; «fueron» funciona bien en español para describir su papel protector en ese período.
- source_word: עָלֵינוּ
  english_pob_choice: around us
  chosen_spanish: alrededor de nosotros
  alternatives_spanish:
  - sobre nosotros
  - encima de nosotros
  - para nosotros
  lexicon: HALOT
  rationale: La idea es de cobertura protectora. «Alrededor de nosotros» reproduce el sentido idiomático y evita una literalidad menos natural como «sobre nosotros».
- source_word: גַּם לַיְלָה גַּם יוֹמָם
  english_pob_choice: both by night and by day
  chosen_spanish: tanto de noche como de día
  alternatives_spanish:
  - de noche y de día
  - tanto por la noche como por el día
  - noche y día
  lexicon: HALOT
  rationale: La construcción correlativa también... también enfatiza continuidad total. «Tanto... como...» preserva esa intensidad de manera natural en español.
- source_word: כָּל יְמֵי
  english_pob_choice: all the days
  chosen_spanish: todos los días
  alternatives_spanish:
  - todo el tiempo
  - a lo largo de todos los días
  lexicon: HALOT
  rationale: Es una equivalencia cercana y clara para la expresión temporal, conservando el matiz de duración continua.
- source_word: הֱיוֹתֵנוּ עִמָּם
  english_pob_choice: we were with them
  chosen_spanish: que estuvimos con ellos
  alternatives_spanish:
  - mientras estuvimos con ellos
  - nuestro estar con ellos
  lexicon: HALOT
  rationale: El infinitivo constructo con sufijo expresa el período durante el cual ocurrió la acción; en español, una subordinada temporal es la forma más clara sin perder el sentido.
- source_word: רֹעִים
  english_pob_choice: tending
  chosen_spanish: cuidando
  alternatives_spanish:
  - pastoreando
  - apacentando
  - siendo pastores de
  lexicon: HALOT
  rationale: Aunque el verbo proviene de la esfera pastoril, en español «cuidando» comunica con naturalidad la función de atender y vigilar el rebaño. Se conserva la actividad sin forzar un calco.
- source_word: הַצֹּאן
  english_pob_choice: the flock
  chosen_spanish: el rebaño
  alternatives_spanish:
  - el ganado menor
  - las ovejas
  - el rebaño de ovejas y cabras
  lexicon: HALOT
  rationale: «צאן» es un colectivo para ganado menor. «Rebaño» preserva el sentido colectivo y es comprensible en español bíblico sin estrecharlo a solo ovejas.
translation_notes:
  revision_awareness: El texto español sigue de cerca la lectura aprobada del inglés POB y mantiene su imagen central de protección; no se requirieron revisiones respecto del consenso del audit trail.
  spanish_consistency_notes:
  - Se usó «Yahvé» no aplica en este versículo.
  - Se prefirió «muro» como equivalente concreto de חוֹמָה y «alrededor de nosotros» para עָלֵינוּ, manteniendo la metáfora protectora.
  - «Rebaño» conserva el valor colectivo de צאן y evita restringirlo solo a ovejas.
  - La subordinada temporal «que estuvimos con ellos» hace natural en español la construcción infinitiva hebrea sin perder duración.
