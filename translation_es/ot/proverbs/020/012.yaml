translation:
  language: es
  text: El oído que oye y el ojo que ve—Yahvé hizo a ambos[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «El oído que oye y el ojo que ve—Yahvé hizo a ambos».'
    reason: lexical_alternative
lexical_decisions:
- source_word: אֹזֶן
  english_pob_choice: ear
  chosen_spanish: oído
  alternatives_spanish:
  - oreja
  - oído
  lexicon: HALOT
  rationale: En este proverbio, el paralelo con ‘ojo’ favorece un sustantivo concreto y breve. ‘Oído’ comunica con naturalidad la facultad de oír y suena más fluido en español que ‘oreja’ en este contexto sapiencial.
- source_word: שֹׁמַעַת
  english_pob_choice: hearing
  chosen_spanish: que oye
  alternatives_spanish:
  - que escucha
  - oyente
  - que oye
  lexicon: HALOT
  rationale: El participio describe al sustantivo de manera atributiva. En español, ‘que oye’ conserva esa función descriptiva con simetría frente a ‘que ve’, sin añadir matices de intención que el hebreo no exige.
- source_word: עַיִן
  english_pob_choice: eye
  chosen_spanish: ojo
  alternatives_spanish:
  - ojo
  - un ojo
  lexicon: HALOT
  rationale: ‘Ojo’ es el equivalente concreto y directo de עַיִן. Se mantiene en singular para conservar el paralelismo poético de la línea hebrea.
- source_word: רֹאָה
  english_pob_choice: seeing
  chosen_spanish: que ve
  alternatives_spanish:
  - que mira
  - visible
  - que ve
  lexicon: HALOT
  rationale: Como participio atributivo, se traduce de forma natural con ‘que ve’. Esto reproduce el paralelismo con ‘que oye’ y evita una paráfrasis más amplia.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahvé
  lexicon: HALOT
  rationale: Se conserva el nombre divino como ‘Yahvé’, conforme al criterio de la POB en español para יְהוָה, en lugar de sustituirlo por un título como ‘el SEÑOR’.
- source_word: עָשָׂה
  english_pob_choice: made
  chosen_spanish: hizo
  alternatives_spanish:
  - hizo
  - ha hecho
  - formó
  lexicon: HALOT
  rationale: El perfecto qal expresa una afirmación general. ‘Hizo’ es directo, natural y suficientemente amplio para esta verdad proverbial sobre la acción de Dios.
- source_word: גַם
  english_pob_choice: both
  chosen_spanish: a ambos
  alternatives_spanish:
  - ambos
  - a ambos
  - los dos
  lexicon: HALOT
  rationale: El valor inclusivo de גַם junto con ‘los dos’ se expresa de modo idiomático en español como ‘a ambos’, manteniendo la idea de totalidad sin forzar una duplicación literal.
- source_word: שְׁנֵיהֶם
  english_pob_choice: of them
  chosen_spanish: a ambos
  alternatives_spanish:
  - de ambos
  - a ambos
  - los dos
  lexicon: HALOT
  rationale: La secuencia hebrea enfatiza ‘los dos de ellos’. En español, ‘a ambos’ integra ese énfasis de forma natural con el verbo ‘hizo’ y evita redundancia innecesaria.
theological_decisions:
- issue: Nombre divino en יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahvé
  rationale: El verso contiene el Tetragrama explícitamente. La traducción conserva el nombre propio del pacto en español como ‘Yahvé’, siguiendo el criterio doctrinal de la POB y evitando la sustitución por un título.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
translation_notes:
  revision_awareness: 'El audio-trail en inglés no muestra revisiones sustantivas: el pass más reciente indica que no hubo cambios necesarios y el veredicto de revisión es de alta concordancia. La versión española sigue de cerca esa lectura estable, preservando el paralelismo del proverbio y el nombre divino.'
  spanish_consistency_notes:
  - Se conservó el singular poético (‘oído’ / ‘ojo’) para mantener el paralelismo hebreo.
  - Se mantuvo el nombre divino ‘Yahvé’ según la terminología POB en español.
  - La construcción ‘que oye / que ve’ refleja el valor atributivo de los participios hebreos sin añadir interpretaciones.
  - La nota al pie ofrece una alternativa más literal con ‘el oído’ y ‘el ojo’ para transparentar la estructura del hebreo.
