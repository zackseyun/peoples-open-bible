revisions:
- from: Entonces los hombres se volvieron de allí y fueron hacia Sodoma[a], pero Abraham todavía estaba de pie delante de Yahvé.
  to: Entonces los hombres se volvieron de allí y fueron hacia Sodoma[a], pero Abraham todavía estaba ante Yahvé.
  rationale: Se conserva íntegramente el sentido del hebreo y del audit trail inglés, pero se mejora el español eliminando la expresión incorrecta «el Yahvé» en la nota y usando «ante» para una redacción más natural y digna tanto en el texto principal como en la variante textual. No hace falta adjudicación adicional.
  reviewer_model: gpt-5.4
