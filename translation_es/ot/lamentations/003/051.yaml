translation:
  language: es
  text: Mi ojo aflige mi alma[a] por causa de todas las hijas de mi ciudad[b][c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Alma» traduce נֶפֶשׁ con su valor de vida o ser interior. En este verso mantiene la intensidad emocional del hebreo.
    reason: lexical_alternative
  - marker: b
    text: 'También puede entenderse: «Mi ojo aflige mi alma más que todas las hijas de mi ciudad». El hebreo de מִכֹּל es difícil y puede tomarse en sentido comparativo más que causal.'
    reason: alternative_reading
  - marker: c
    text: «Las hijas de mi ciudad» puede ser una expresión hebrea para las mujeres de la ciudad.
    reason: cultural_note
lexical_decisions:
- source_word: עֵינִי
  english_pob_choice: My eye
  chosen_spanish: Mis ojos
  alternatives_spanish:
  - Mi ojo
  lexicon: HALOT
  rationale: El hebreo tiene singular con sufijo de primera persona, pero en español poético 'mis ojos' suena más natural y conserva la imagen personificada. Se mantiene la referencia a la visión como agente del lamento sin volverlo explicativo.
- source_word: עוללה
  english_pob_choice: grieves
  chosen_spanish: afligen
  alternatives_spanish:
  - me hacen sufrir
  - me maltratan
  - me causan dolor
  lexicon: HALOT
  rationale: El verbo admite la idea de tratar duramente, afligir o dañar. En español, 'afligen' comunica bien el efecto de dolor interno sobre el hablante y preserva el tono de lamento sin añadir demasiada paráfrasis.
- source_word: לְנַפְשִׁי
  english_pob_choice: my soul
  chosen_spanish: a mi alma
  alternatives_spanish:
  - a mi vida
  - a mi ser
  - a mi interior
  lexicon: HALOT
  rationale: נפש puede referirse a la vida, el yo o el ser interior. 'Alma' conserva el paralelismo emotivo del texto y la fuerza poética del hebreo; la preposición ל se refleja como destino o afectación indirecta.
- source_word: מִכֹּל
  english_pob_choice: because of all
  chosen_spanish: por causa de
  alternatives_spanish:
  - más que
  - de parte de
  - a causa de
  lexicon: HALOT
  rationale: El מן con כל puede ser causal o comparativo. Dado el contexto de lamento, la lectura causal es plenamente viable y en español 'por causa de' expresa claramente el motivo del dolor sin forzar una comparación.
- source_word: בְּנוֹת
  english_pob_choice: the daughters
  chosen_spanish: las hijas
  alternatives_spanish:
  - las mujeres
  - las muchachas
  lexicon: HALOT
  rationale: Se conserva el sustantivo literal 'hijas', como en el hebreo. Aunque puede funcionar como expresión colectiva para las mujeres de la ciudad, 'hijas' retiene mejor la imagen corporal y poética del original.
- source_word: עִירִי
  english_pob_choice: of my city
  chosen_spanish: de mi ciudad
  alternatives_spanish:
  - de la ciudad
  lexicon: HALOT
  rationale: El sufijo de primera persona es explícito y debe mantenerse. 'Mi ciudad' comunica la implicación personal del hablante y el vínculo afectivo con la comunidad lamentada.
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión del inglés POB que sustituyó 'causes grief to' por 'grieves', buscando una formulación más directa. La versión española adopta 'afligen' para conservar naturalidad y el matiz de daño emocional sin perder la personificación del ojo como sujeto del lamento.
  spanish_consistency_notes:
  - Se mantuvo 'mi ciudad' para reflejar el sufijo posesivo del hebreo.
  - Se evitó 'SEÑOR' u otra terminología no presente en el verso.
  - Se conservó la imagen poética de los ojos y el alma sin convertirla en una paráfrasis explicativa.
