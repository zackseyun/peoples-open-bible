    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּבֹא
  english_pob_choice: Then he went in
  chosen_spanish: Entonces entró
  alternatives_spanish:
  - Entonces fue adentro
  - Entonces pasó adentro
  lexicon: HALOT
  rationale: En este contexto narrativo, בוא indica que Jehú pasó al interior del lugar. «Entró» es natural en español y conserva el sentido direccional sin añadir información.
- source_word: וַיֹּאכַל וַיֵּשְׁתְּ
  english_pob_choice: ate and drank
  chosen_spanish: comió y bebió
  alternatives_spanish:
  - comió y bebió vino
  - comió y tomó bebida
  lexicon: HALOT
  rationale: Los verbos aparecen sin objeto explícito en hebreo. En español, la secuencia simple «comió y bebió» refleja con fidelidad la narración sin especificar más de lo que dice el texto.
- source_word: פִּקְדוּ נָא
  english_pob_choice: Please see to
  chosen_spanish: Por favor, ocúpense de
  alternatives_spanish:
  - Por favor, atiendan a
  - Por favor, cuiden de
  - Por favor, hagan cargo de
  lexicon: HALOT
  rationale: פּקד aquí tiene el sentido de encargarse de algo o prestar atención para resolverlo. «Ocúpense de» transmite bien la orden con la partícula de cortesía נָא y mantiene un registro formal y natural.
- source_word: הָאֲרוּרָה הַזֹּאת
  english_pob_choice: this cursed woman
  chosen_spanish: esta maldita
  alternatives_spanish:
  - esta maldita mujer
  - esta maldita persona
  - esta maldecida
  lexicon: HALOT
  rationale: El hebreo usa un femenino singular despectivo que se refiere a Jezabel. En español, «maldita» reproduce la dureza lexical sin necesidad de añadir «mujer» dentro del texto principal; la referencia personal queda clara por el contexto inmediato. Se deja abierta la alternativa interpretativa de un insulto sustantivado más que de un simple adjetivo.
- source_word: וְקִבְרוּהָ
  english_pob_choice: and bury her
  chosen_spanish: y sepúltenla
  alternatives_spanish:
  - y entiérrenla
  - y denle sepultura
  lexicon: HALOT
  rationale: El imperativo plural con sufijo femenino singular pide una acción directa sobre el cadáver. «Sepúltenla» conserva el mandato formal y suena natural en español bíblico contemporáneo.
- source_word: כִּי בַת מֶלֶךְ הִיא
  english_pob_choice: for she is a king’s daughter
  chosen_spanish: porque es hija de rey
  alternatives_spanish:
  - porque es hija de un rey
  - porque es una hija de rey
  - pues es hija de rey
  lexicon: HALOT
  rationale: La construcción hebrea enfatiza su estatus real. «Hija de rey» reproduce la concisión del original y evita especificar un rey particular que el hebreo no nombra. En español suena idiomático y mantiene el motivo de honor para la sepultura.
translation_notes:
  revision_awareness: 'El borrador sigue el contenido del texto hebreo WLC y armoniza con el audit trail inglés: mantiene la secuencia narrativa simple, conserva la carga despectiva de הָאֲרוּרָה y refleja el matiz pragmático de פִּקְדוּ נָא con una fórmula española natural de mandato cortés. También evita sobreespecificar el objeto de «bebió», como hace el inglés POB, y preserva la razón dada para la sepultura en forma breve y reverente.'
  spanish_consistency_notes:
  - Se usa «hija de rey» para mantener la concisión del constructo hebreo.
  - Se evita «SEÑOR» u otra sustitución no pertinente; el versículo no contiene el nombre divino.
  - «Sepúltenla» conserva el tono imperativo plural y la referencia femenina singular del sufijo hebreo.
  - La nota al pie recoge la alternativa semántica de insulto/adjetivo que el inglés POB también preserva con «cursed woman / accursed one».
