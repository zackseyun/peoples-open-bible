id: JOS.21.41
reference: Joshua 21:41
source:
  edition: WLC
  text: כֹּ֚ל עָרֵ֣י הַ/לְוִיִּ֔ם בְּ/ת֖וֹךְ אֲחֻזַּ֣ת בְּנֵֽי יִשְׂרָאֵ֑ל עָרִ֛ים אַרְבָּעִ֥ים וּ/שְׁמֹנֶ֖ה וּ/מִגְרְשֵׁי/הֶֽן־׃
translation:
  text: All the cities of the Levites within the possession of the sons of Israel were forty-eight cities[b][a], with their pasturelands.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the Israelites' / 'the children of Israel.' The Hebrew reads 'sons of Israel.'
    reason: lexical_alternative
  - marker: b
    text: Or 'open lands' or 'common lands' for the land surrounding the cities.
    reason: lexical_alternative
lexical_decisions:
- source_word: כֹּל
  chosen: All
  alternatives:
  - The whole number of
  lexicon: HALOT
  rationale: Quantifies the totality of the Levitical cities being summarized; simple 'All' is natural and accurate in English.
- source_word: עָרֵי הַלְוִיִּם
  chosen: the cities of the Levites
  alternatives:
  - the Levitical cities
  lexicon: HALOT
  rationale: Construct phrase literally means 'cities of the Levites.' This preserves the genitival relationship clearly; 'Levitical cities' is possible but slightly more interpretive.
- source_word: בְּתוֹךְ
  chosen: within
  alternatives:
  - in the midst of
  - among
  lexicon: HALOT
  rationale: Conveys location inside the larger territorial holdings of Israel in idiomatic modern English.
- source_word: אֲחֻזַּת
  chosen: the possession
  alternatives:
  - the inheritance
  - the property
  lexicon: HALOT
  rationale: Refers to landed holding or possession. 'Possession' fits the territorial sense here without overloading the covenantal nuance that 'inheritance' can carry in some contexts.
- source_word: בְּנֵי יִשְׂרָאֵל
  chosen: the sons of Israel
  alternatives:
  - the Israelites
  - the children of Israel
  lexicon: HALOT
  rationale: Following the project's gender-accurate principle, the formally masculine expression is retained as 'sons of Israel.' 'Israelites' is idiomatic but less formally transparent to the Hebrew.
- source_word: עָרִים אַרְבָּעִים וּשְׁמֹנֶה
  chosen: were forty-eight cities
  alternatives:
  - forty-eight cities
  lexicon: HALOT
  rationale: The Hebrew appositional summary gives the total number. Supplying 'were' makes a complete and natural English clause while preserving the count exactly.
- source_word: וּמִגְרְשֵׁיהֶן
  chosen: along with their pasturelands
  alternatives:
  - and their pasturelands
  - with their common lands
  - with their open lands
  lexicon: HALOT
  rationale: מִגְרָשׁ in these allotment texts denotes the surrounding open land/pastureland attached to a city. 'Pasturelands' is the clearest contextual rendering in Joshua.
