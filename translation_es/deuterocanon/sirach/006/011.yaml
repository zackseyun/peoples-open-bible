translation:
  language: es
  text: En tu prosperidad, él es como tú[a], pero en tu adversidad se separará de ti.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'El griego dice: «y hacia tus esclavos hablará con franqueza». El testimonio hebreo, en cambio, lee: «se separará de ti». El texto principal sigue el hebreo como testimonio primario conservado, y se mantiene la alternativa griega porque la divergencia es sustancial.'
    reason: alternative_reading
lexical_decisions:
- source_word: בְּטוֹבָתְךָ
  english_pob_choice: in your prosperity
  chosen_spanish: en tu prosperidad
  alternatives_spanish:
  - en tu buena fortuna
  - cuando todo te va bien
  - en tu bienestar
  lexicon: HALOT
  rationale: טובה aquí expresa una condición de bien o beneficio, no solo riqueza material. «Prosperidad» conserva el contraste con «adversidad» y suena natural en español sin restringir indebidamente el sentido.
- source_word: הוּא כָמוֹךָ
  english_pob_choice: he is like you
  chosen_spanish: él será como tú
  alternatives_spanish:
  - él es como tú
  - será igual a ti
  - él es como si fuera tú
  lexicon: HALOT
  rationale: El hebreo y el paralelo griego expresan comparación directa. En español, «será como tú» mantiene la idea relacional del comportamiento del supuesto amigo en tiempos favorables.
- source_word: וּבְרָעָתְךָ
  english_pob_choice: but in your adversity
  chosen_spanish: pero en tu adversidad
  alternatives_spanish:
  - pero en tu desgracia
  - pero en tu angustia
  - y en tu mala situación
  lexicon: HALOT
  rationale: רעה contrasta con טובה como situación desfavorable o mala. «Adversidad» reproduce ese contraste de forma equilibrada y digna en español.
- source_word: יִתְנַדֶּה מִמֶּךָּ
  english_pob_choice: he will separate himself from you
  chosen_spanish: se separará de ti
  alternatives_spanish:
  - se apartará de ti
  - se distanciará de ti
  - te dejará
  lexicon: HALOT
  rationale: El hitpael transmite una acción reflexiva de apartarse o distanciarse. «Se separará de ti» conserva esa fuerza con claridad; «apartará» o «distanciará» también serían posibles, pero esta opción es más directa.
theological_decisions:
- issue: Divergencia textual entre el hebreo y el griego en la segunda mitad del versículo
  english_pob_reading: The main text follows the extant Hebrew as the primary witness; a footnote preserves the Greek reading, 'and toward your servants he will speak boldly.'
  chosen_spanish_reading: 'El texto principal sigue el hebreo: «se separará de ti».'
  alternative_spanish_readings:
  - «y hacia tus esclavos hablará con franqueza»
  - «y para con tus sirvientes se mostrará confiado»
  rationale: El testimonio hebreo conservado presenta una lectura sustancialmente distinta de la griega. Como en la auditoría inglesa, el texto principal sigue el hebreo por ser el testimonio extante primario para este pasaje en Sirácides, y se preserva la alternativa griega en nota.
  doctrine_reference: Crítica textual / testimonio manuscrito
translation_notes:
  revision_awareness: 'Se mantiene sin cambios el criterio de la revisión más reciente: el acuerdo alto entre los testimonios y la opción del texto principal basado en el hebreo conservado, con nota para la variante griega sustancial.'
  spanish_consistency_notes:
  - Se usa «prosperidad» y «adversidad» para conservar el paralelismo antitético del hebreo.
  - Se evita «SEÑOR» u otras sustituciones no requeridas, ya que el versículo no contiene el tetragrámaton ni un título divino.
  - La nota a pie de página recoge la variante griega sustancial sin intentar fusionarla con el texto principal.
