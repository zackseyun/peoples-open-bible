revisions:
- from: 'Y la oración tenía esta forma: «Yahvé Dios[a], creador de todas las cosas, el temible[b] y poderoso y justo y misericordioso, el único rey y bueno[c]»'
  to: 'Y la oración tenía esta forma: «Yahvé Dios[a], creador de todas las cosas, el temible[b] y poderoso y justo y misericordioso, el único rey y el bueno[c]»'
