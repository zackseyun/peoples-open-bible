translation:
  language: es
  text: Así cambió su conducta delante de ellos y actuó como un loco[a] en sus manos; hacía marcas[b] en las puertas del portón, y dejaba que su saliva corriera sobre su barba.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'También: «fingió locura»; el verbo hebreo describe un comportamiento enajenado, y el contexto narrativo indica que fue deliberado.'
    reason: lexical_alternative
  - marker: b
    text: El verbo traducido aquí como «hacía marcas» es difícil y puede entenderse también como «rayaba» o «garabateaba» las puertas del portón.
    reason: alternative_reading
lexical_decisions:
- source_word: וַיְשַׁנּוֹ
  english_pob_choice: he changed
  chosen_spanish: cambió
  alternatives_spanish:
  - alteró
  - disfrazó
  lexicon: HALOT
  rationale: El verbo indica una alteración deliberada. «Cambió su conducta» comunica bien el giro visible sin añadir más de lo que el hebreo exige.
- source_word: טַעְמֹו
  english_pob_choice: his behavior
  chosen_spanish: su conducta
  alternatives_spanish:
  - su manera de ser
  - su juicio
  - su cordura
  lexicon: HALOT
  rationale: En este contexto narrativo, el término apunta a la apariencia o manera observable de actuar. «Conducta» mantiene esa referencia externa sin cerrar innecesariamente el sentido psicológico.
- source_word: בְּעֵינֵיהֶם
  english_pob_choice: before their eyes
  chosen_spanish: delante de ellos
  alternatives_spanish:
  - a la vista de ellos
  - en su presencia
  lexicon: HALOT
  rationale: La expresión hebrea es idiomática para indicar visibilidad ante otros. «Delante de ellos» conserva la naturalidad del español y la imagen de observación.
- source_word: וַיִּתְהֹלֵל
  english_pob_choice: acted like a madman
  chosen_spanish: se hizo el loco
  alternatives_spanish:
  - fingió locura
  - se comportó como un demente
  - raveó
  lexicon: HALOT
  rationale: La forma verbal describe un comportamiento trastornado o insensato, y en el contexto fue deliberado. «Se hizo el loco» expresa la conducta performativa de manera idiomática y clara en español.
- source_word: בְּיָדָם
  english_pob_choice: in their hands
  chosen_spanish: en sus manos
  alternatives_spanish:
  - bajo su control
  - en su custodia
  lexicon: HALOT
  rationale: La traducción literal mantiene la imagen hebrea; en español puede implicar poder o dominio sin necesidad de explicitarlo.
- source_word: ויתו
  english_pob_choice: he made marks
  chosen_spanish: trazaba marcas
  alternatives_spanish:
  - rayaba
  - rasguñaba
  - escribía garabatos
  lexicon: HALOT
  rationale: El verbo es difícil y admite varias lecturas cercanas. «Trazaba marcas» preserva la cautela del POB en inglés y evita precisar indebidamente si se trataba de rayar o garabatear.
- source_word: דַּלְתוֹת הַשַּׁעַר
  english_pob_choice: the doors of the gate
  chosen_spanish: las hojas de la puerta
  alternatives_spanish:
  - las puertas del portón
  - las hojas del portón
  lexicon: HALOT
  rationale: La expresión se refiere a las hojas o paneles de la puerta/portón de la ciudad. «Hojas de la puerta» es más natural en español para una estructura con batientes.
- source_word: וַיּוֹרֶד
  english_pob_choice: let ... run down
  chosen_spanish: dejaba que ... corriera
  alternatives_spanish:
  - hacía que ... bajara
  - dejaba correr
  lexicon: HALOT
  rationale: El verbo expresa movimiento descendente. En español, con saliva como sujeto, «dejaba que corriera» suena natural y conserva la imagen física.
- source_word: רִירוֹ
  english_pob_choice: his saliva
  chosen_spanish: su saliva
  alternatives_spanish:
  - su babilla
  - su baba
  - su esputo
  lexicon: HALOT
  rationale: «Saliva» es la opción neutra y clara en español moderno, manteniendo el registro digno del texto.
- source_word: אֶל זְקָנוֹ
  english_pob_choice: onto his beard
  chosen_spanish: sobre su barba
  alternatives_spanish:
  - en su barba
  - hasta su barba
  lexicon: HALOT
  rationale: La preposición indica movimiento hacia la barba y la imagen final es que la saliva termina allí. «Sobre su barba» reproduce bien el resultado visible.
translation_notes:
  revision_awareness: 'El pasaje coincide en alto grado con la auditoría inglesa: se mantiene la lectura de una conducta deliberadamente insensata, el verbo difícil sobre las puertas con traducción cautelosa, y la imagen final de la saliva descendiendo sobre la barba.'
  spanish_consistency_notes:
  - Se prefirió «Yahvé» en el proyecto cuando aparece el nombre divino, pero este versículo no lo contiene.
  - Se conservó un registro narrativo claro y sobrio, sin introducir explicaciones interpretativas ajenas al hebreo.
  - «Se hizo el loco» se eligió por naturalidad; la nota preserva la alternativa más técnica «fingió locura».
