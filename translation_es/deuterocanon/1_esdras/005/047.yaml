translation:
  language: es
  text: Entonces Jesúa[a], hijo de Jozadac, se levantó[b], junto con sus hermanos los sacerdotes, y Zorobabel, hijo de Salatiel, y sus hermanos, y prepararon el altar del Dios de Israel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Aquí Ἰησοῦς designa a Jesúa, el sumo sacerdote postexílico, no a Jesús de Nazaret. La tradición paralela hebrea favorece esta forma del nombre.
    reason: cross_reference
  - marker: b
    text: También puede entenderse como «se puso en pie» o «habiéndose levantado». El participio griego señala el inicio de una acción decisiva.
    reason: lexical_alternative
lexical_decisions:
- source_word: καταστὰς
  english_pob_choice: arose
  chosen_spanish: se levantó
  alternatives_spanish:
  - se puso en pie
  - se alzó
  - habiendo surgido
  lexicon: LSJ
  rationale: El participio aoristo introduce una acción decisiva y narrativa. En español, "se levantó" comunica el inicio de la acción con naturalidad, sin volverlo demasiado literal ni perder el sentido de disposición para actuar.
- source_word: Ἰησοῦς
  english_pob_choice: Jeshua
  chosen_spanish: Jesúa
  alternatives_spanish:
  - Jeshúa
  - Josué
  - Jesús
  lexicon: LSJ
  rationale: En este contexto postexílico se trata del sumo sacerdote conocido en la tradición hebrea como Jeshua/Josué; en español, "Jesúa" conserva la forma tradicional usada para este personaje y evita confusión con Jesús de Nazaret.
- source_word: ὁ τοῦ Ἰωσεδὲκ
  english_pob_choice: son of Jozadak
  chosen_spanish: hijo de Jozadac
  alternatives_spanish:
  - hijo de Josedec
  lexicon: LSJ
  rationale: El genitivo patronímico se expresa de forma idiomática como "hijo de". "Jozadac" sigue la transliteración bíblica común en español y mantiene la relación con la tradición paralela de Esdras-Nehemías.
- source_word: οἱ ἀδελφοὶ αὐτοῦ
  english_pob_choice: his brothers
  chosen_spanish: sus hermanos
  alternatives_spanish:
  - sus parientes
  lexicon: LSJ
  rationale: ἀδελφοί significa literalmente "hermanos". En el contexto sacerdotal, el sentido natural sigue siendo de parentesco o membresía familiar, sin necesidad de generalizar a "parientes".
- source_word: οἱ ἱερεῖς
  english_pob_choice: the priests
  chosen_spanish: los sacerdotes
  alternatives_spanish:
  - los presbíteros
  lexicon: LSJ
  rationale: Se mantiene el título cultual directo. "Sacerdotes" es la equivalencia natural en español y conserva la estructura del griego.
- source_word: Ζοροβαβὲλ
  english_pob_choice: Zerubbabel
  chosen_spanish: Zorobabel
  alternatives_spanish:
  - Zerubbabel
  lexicon: LSJ
  rationale: Se usa la forma asentada en español para el nombre del gobernador postexílico.
- source_word: ὁ τοῦ Σαλαθιὴλ
  english_pob_choice: son of Shealtiel
  chosen_spanish: hijo de Salatiel
  alternatives_spanish:
  - hijo de Seltiel
  lexicon: LSJ
  rationale: El patronímico se vierte con "hijo de". "Salatiel" es la forma usual en español y corresponde al linaje conocido en la tradición bíblica.
- source_word: ἡτοίμασαν
  english_pob_choice: prepared
  chosen_spanish: prepararon
  alternatives_spanish:
  - pusieron en orden
  - dejaron listo
  lexicon: LSJ
  rationale: El verbo σημαίνει preparar, disponer o dejar listo. "Prepararon" es la forma más directa y no añade el matiz físico de "erigieron" o "alzaron", que el griego no exige por sí solo.
- source_word: τὸ θυσιαστήριον
  english_pob_choice: the altar
  chosen_spanish: el altar
  alternatives_spanish:
  - el altar sacrificial
  lexicon: LSJ
  rationale: '"Altar" reproduce adecuadamente θυσιαστήριον en español. No se requiere ampliar a "sacrificial" porque el contexto ya lo implica.'
- source_word: τοῦ θεοῦ Ἰσραήλ
  english_pob_choice: of the God of Israel
  chosen_spanish: del Dios de Israel
  alternatives_spanish:
  - para el Dios de Israel
  lexicon: LSJ
  rationale: El genitivo puede leerse como pertenencia o relación. "Del Dios de Israel" es transparente en español y conserva el vínculo del altar con su deidad tutelar.
theological_decisions:
- issue: Identificación de Ἰησοῦς en contexto postexílico
  english_pob_reading: Jeshua, the postexilic high-priestly figure, not Jesus of Nazareth.
  chosen_spanish_reading: Jesúa, la figura sacerdotal postexílica, no Jesús de Nazaret.
  alternative_spanish_readings:
  - Josué
  - Jesús
  rationale: La tradición paralela y el contexto histórico obligan a distinguir a este personaje del Jesús neotestamentario. Mantener la forma postexílica evita una confusión cristológica inexistente en el pasaje.
  doctrine_reference: Historical-grammatical reading; canonical name disambiguation
translation_notes:
  revision_awareness: Se siguió el texto griego de Swete como ancla principal, con el paralelo hebreo como control de nombres propios y contexto histórico. La revisión inglesa no introdujo cambios sustanciales; se conservó la decisión de leer καταστὰς como acción iniciadora y de distinguir a Ἰησοῦς como figura postexílica.
  spanish_consistency_notes:
  - 'Se mantuvo una terminología bíblica estándar y transparente: Dios, altar, sacerdotes, hijo de.'
  - Se prefirió «se levantó» sobre una traducción más literal pero menos natural del participio griego.
  - Se conservó la distinción onomástica postexílica con una nota para evitar confusión con Jesús de Nazaret.
  - 'Los nombres propios siguen formas usuales en español bíblico: Jesúa, Jozadac, Zorobabel, Salatiel.'
