translation:
  language: es
  text: Y cuando Yahvé te haga entrar en la tierra de los cananeos, de los hititas, de los amorreos, de los hivitas y de los jebuseos, la cual juró a tus padres que te daría, una tierra que fluye con leche y miel, realizarás este servicio[a] en este mes.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «rito» o «observancia». El término hebreo puede denotar un acto prescrito de adoración o servicio.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהָיָה כִּי
  english_pob_choice: And when
  chosen_spanish: Y cuando
  alternatives_spanish:
  - Y sucederá cuando
  - Y será que cuando
  lexicon: HALOT
  rationale: La construcción hebrea introduce una condición/ocasión futura; «Y cuando» conserva el valor temporal y suena natural en español sin endurecerse con fórmulas más literales.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  lexicon: HALOT
  rationale: Se mantiene la transliteración del nombre divino como forma estándar del proyecto en español. «Yahvé» preserva el nombre propio del pacto en vez de sustituirlo por un título.
- source_word: יְבִיאֲךָ
  english_pob_choice: brings you
  chosen_spanish: te introduzca
  alternatives_spanish:
  - te lleve
  - te haga entrar
  lexicon: HALOT
  rationale: El hiphil de בוא expresa hacer entrar o conducir a un lugar. «Te introduzca» comunica el movimiento hacia dentro de la tierra con buena naturalidad en español; también conserva el matiz de guía divina.
- source_word: אֶל אֶרֶץ
  english_pob_choice: into the land
  chosen_spanish: en la tierra
  alternatives_spanish:
  - a la tierra
  - dentro de la tierra
  lexicon: HALOT
  rationale: Con el verbo de entrada, el español permite expresar el destino con «en la tierra»; es fluido y evita una repetición rígida de «a la tierra» en esta cláusula.
- source_word: הַכְּנַעֲנִי וְהַחִתִּי וְהָאֱמֹרִי וְהַחִוִּי וְהַיְבוּסִי
  english_pob_choice: the Canaanites, the Hittites, the Amorites, the Hivites, and the Jebusites
  chosen_spanish: de los cananeos, de los hititas, de los amorreos, de los hivitas y de los jebuseos
  alternatives_spanish:
  - de los cananeos, hititas, amorreos, hivitas y jebuseos
  - de la tierra de los cananeos, de los hititas, de los amorreos, de los hivitas y de los jebuseos
  lexicon: HALOT
  rationale: El hebreo usa etnónimos singulares con artículo; en español, la forma plural es la más clara e idiomática. Se conserva la enumeración de pueblos sin añadir «tierra de» porque el texto hebreo los presenta como habitantes de la tierra a la que Yahvé conduce al pueblo.
- source_word: אֲשֶׁר נִשְׁבַּע לַאֲבֹתֶיךָ לָתֶת לָךְ
  english_pob_choice: which he swore to your fathers to give you
  chosen_spanish: que juró a tus padres darte
  alternatives_spanish:
  - que juró a tus padres para darte
  - que juró a tus padres darte
  lexicon: HALOT
  rationale: Se conserva la relación del juramento con los padres y el don de la tierra, condensando la frase sin perder el sentido pactal. «Darte» expresa de forma natural el infinitivo final hebreo.
- source_word: אֶרֶץ זָבַת חָלָב וּדְבָשׁ
  english_pob_choice: a land flowing with milk and honey
  chosen_spanish: tierra que fluye leche y miel
  alternatives_spanish:
  - tierra que mana leche y miel
  - una tierra que fluye leche y miel
  lexicon: HALOT
  rationale: Se mantiene el giro tradicional y transparente de abundancia. «Fluye» reproduce la imagen verbal del participio hebreo sin añadir elementos ajenos; en español es comprensible y digno.
- source_word: וְעָבַדְתָּ אֶת הָעֲבֹדָה הַזֹּאת
  english_pob_choice: you shall perform this service
  chosen_spanish: realizarás este servicio
  alternatives_spanish:
  - servirás esta obra
  - cumplirás este servicio
  lexicon: HALOT
  rationale: El verbo עבד en este contexto cultual puede significar llevar a cabo una observancia prescrita. «Realizarás» preserva el carácter de acto ordenado, y «servicio» mantiene la conexión con el sustantivo עֲבֹדָה sin sustituirlo por «rito» o «observancia» como traducción principal.
- source_word: בַּחֹדֶשׁ הַזֶּה
  english_pob_choice: in this month
  chosen_spanish: en este mes
  alternatives_spanish:
  - durante este mes
  - en el mes este
  lexicon: HALOT
  rationale: Traducción temporal directa y natural. Mantiene la referencia al mes señalado para la observancia.
theological_decisions:
- issue: Nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Señor
  rationale: El texto usa el Tetragrámaton de forma explícita; se preserva el nombre propio del pacto en español, siguiendo la política del POB de no ocultarlo tras un título.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Alcance cultual de הָעֲבֹדָה הַזֹּאת
  english_pob_reading: this service
  chosen_spanish_reading: este servicio
  alternative_spanish_readings:
  - este rito
  - esta observancia
  rationale: En el contexto pascual/levítico, עֲבֹדָה puede referir un acto prescrito de culto o servicio. «Servicio» conserva la ambigüedad útil y la relación léxica con el verbo עבד, sin forzar una precisión litúrgica no explicitada por el hebreo.
  doctrine_reference: Translation philosophy §1, §5
translation_notes:
  revision_awareness: 'Coincide con el último pase de revisión: no se reportaron cambios necesarios y el acuerdo con el control cruzado fue alto. La redacción española sigue ese estado estable, manteniendo las decisiones léxicas y el sentido cultual del original.'
  spanish_consistency_notes:
  - Se usa «Yahvé» de manera consistente para יְהוָה.
  - Se conserva «servicio» para עֲבֹדָה, en línea con la decisión inglesa auditada.
  - La enumeración de pueblos se pluraliza en español para claridad idiomática.
  - Se evita «SEÑOR» como sustituto del nombre divino.
  - La puntuación y el orden de la cláusula siguen el flujo hebreo sin sonar forzados en español.
