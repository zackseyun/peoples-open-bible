translation:
  language: es
  text: Haré tambalear a Elam delante de sus enemigos y delante de los que buscan su vida[a][b]. Traeré sobre ellos calamidad[c], el ardor de mi ira, declara Yahvé; y enviaré tras ellos la espada hasta que los haya consumido.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «los haré temblar» o «los quebrantaré»; el verbo hebreo puede enfatizar causar pánico o causar derrumbe.
    reason: lexical_alternative
  - marker: b
    text: En hebreo, «los que buscan su vida» es un modismo para quienes buscan matarlos.
    reason: lexical_alternative
  - marker: c
    text: O «desastre»; רָעָה aquí se refiere a calamidad/juicio, no a mal moral.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהַחְתַּתִּי
  english_pob_choice: I will shatter
  chosen_spanish: Haré tambalear
  alternatives_spanish:
  - Los quebrantaré
  - Los haré temblar
  - Los desmoronaré
  lexicon: HALOT
  rationale: El verbo en hifil puede expresar causar pánico, abatimiento o derrumbe. En español, “haré tambalear” comunica el colapso producido por el juicio sin forzar una sola lectura física o emocional; conserva la amplitud semántica que la POB inglesa retuvo con “shatter”.
- source_word: עֵילָם
  english_pob_choice: Elam
  chosen_spanish: Elam
  alternatives_spanish:
  - Elán
  lexicon: Nombre propio
  rationale: Es un nombre propio geográfico; se translitera de forma estándar como “Elam” para mantener la identificación histórica.
- source_word: לִפְנֵי אֹיְבֵיהֶם
  english_pob_choice: before their enemies
  chosen_spanish: delante de sus enemigos
  alternatives_spanish:
  - en presencia de sus enemigos
  - ante sus enemigos
  lexicon: HALOT
  rationale: La locución expresa estar expuestos ante la fuerza hostil. “Delante de” reproduce bien la relación espacial y de vulnerabilidad sin sonar arcaico.
- source_word: מְבַקְשֵׁי נַפְשָׁם
  english_pob_choice: those who seek their life
  chosen_spanish: los que buscan su vida
  alternatives_spanish:
  - los que buscan quitarles la vida
  - los que buscan matarlos
  lexicon: HALOT
  rationale: La frase hebrea es idiomática, literalmente “los que buscan su alma/vida”. “Los que buscan su vida” preserva el giro original y el sentido de amenaza mortal, como en la POB inglesa.
- source_word: וְהֵבֵאתִי עֲלֵיהֶם רָעָה
  english_pob_choice: I will bring disaster on them
  chosen_spanish: Traeré sobre ellos calamidad
  alternatives_spanish:
  - Traeré sobre ellos desastre
  - Traeré sobre ellos mal
  lexicon: HALOT
  rationale: En contextos proféticos de juicio, רָעָה designa calamidad o desastre, no mal moral. “Calamidad” mantiene la referencia al castigo anunciado y evita una implicación doctrinal engañosa.
- source_word: אֶת חֲרוֹן אַפִּי
  english_pob_choice: my burning anger
  chosen_spanish: el ardor de mi ira
  alternatives_spanish:
  - mi ira ardiente
  - el fuego de mi ira
  - mi furor
  lexicon: HALOT
  rationale: La expresión conserva la metáfora del calor/ardor de la ira. “Ardor de mi ira” suena natural en español y refleja el énfasis intensivo del hebreo sin aplanarlo a “ira” solamente.
- source_word: נְאֻם יְהוָה
  english_pob_choice: declares Yahweh
  chosen_spanish: dice Yahvé
  alternatives_spanish:
  - declara Yahvé
  - oráculo de Yahvé
  - dice el Señor
  lexicon: Fórmula profética
  rationale: El hebreo usa la fórmula profética נְאֻם יְהוָה. En esta serie, el nombre divino se rinde como “Yahvé” por convención del proyecto; “dice Yahvé” comunica la solemnidad sin introducir una máscara litúrgica.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  - Jehová
  lexicon: 'Contested terms: יְהוָה YHWH'
  rationale: Se sigue el término doctrinal del proyecto para el Tetragrámaton. “Yahvé” preserva el nombre del pacto y evita reemplazarlo por “SEÑOR”.
- source_word: וְשִׁלַּחְתִּי אַחֲרֵיהֶם אֶת־הַחֶרֶב
  english_pob_choice: I will send the sword after them
  chosen_spanish: enviaré tras ellos la espada
  alternatives_spanish:
  - mandaré la espada tras ellos
  - enviaré la espada contra ellos
  - perseguiré con la espada
  lexicon: HALOT
  rationale: La imagen personificada de la espada que va en persecución se conserva con “tras ellos”. Este orden es natural en español y mantiene la fuerza pictórica del hebreo.
- source_word: עַד כַּלּוֹתִי אוֹתָם
  english_pob_choice: until I have consumed them
  chosen_spanish: hasta que los haya consumido
  alternatives_spanish:
  - hasta haberlos consumido
  - hasta destruirlos por completo
  - hasta acabarlos
  lexicon: HALOT
  rationale: כלה expresa terminar, consumir o llevar a su fin en un contexto de juicio. “Los haya consumido” preserva el alcance totalizante del verbo y la continuidad con la imagen de la espada.
theological_decisions:
- issue: رָעָה / רָעָה aplicada a la acción divina
  english_pob_reading: I will bring disaster on them
  chosen_spanish_reading: Traeré sobre ellos calamidad
  alternative_spanish_readings:
  - Traeré sobre ellos desastre
  - Traeré sobre ellos mal
  rationale: En este contexto profético, el término denota juicio adverso, no perversidad moral atribuida a Dios. “Calamidad” resguarda la distinción teológica y sigue la lectura auditable de la POB inglesa.
  doctrine_reference: Translation philosophy §1, §6
- issue: Fórmula con el nombre divino en la cláusula profética
  english_pob_reading: declares Yahweh
  chosen_spanish_reading: dice Yahvé
  alternative_spanish_readings:
  - declara Yahvé
  - oráculo de Yahvé
  rationale: La cláusula נְאֻם יְהוָה se vierte con una fórmula profética natural en español. Se preserva el nombre de Dios como “Yahvé”, conforme al estándar del proyecto para el Tetragrámaton.
  doctrine_reference: 'Contested terms: יְהוָה YHWH'
translation_notes:
  revision_awareness: 'La revisión más reciente del registro inglés indica agreement alto y sin cambios necesarios; no hubo revisiones aplicadas. La versión española sigue de cerca el trazado auditado: mantiene la alternancia semántica de חתת, la lectura idiomática de «los que buscan su vida», la noción judicial de רָעָה, y la fórmula profética con el nombre divino preservado.'
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» en vez de «SEÑOR» conforme al estándar doctrinal del proyecto.
  - Se evitó «mal» para רָעָה porque en este contexto sugiere maldad moral en lugar de calamidad judicial.
  - «Delante de» y «tras ellos» conservan la topografía relacional del hebreo sin sonar demasiado literal.
  - La nota de pie a en el texto apoya la ambigüedad legítima de חתת; la nota b aclara el modismo; la nota c preserva la alternativa léxica de רָעָה.
