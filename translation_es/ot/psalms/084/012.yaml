translation:
  language: es
  text: Pues Yahvé Dios es sol y escudo; Yahvé da favor y honor[a]. No retiene el bien de los que andan con integridad[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «gracia y gloria».
    reason: lexical_alternative
  - marker: b
    text: «Con integridad» aquí significa con rectitud o entereza de conducta, no perfección sin pecado.
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  lexicon: HALOT
  rationale: Introduce la base o razón de la afirmación anterior; «Porque» conserva con naturalidad en español el valor causal/discursivo del hebreo y encaja bien en el tono poético.
- source_word: שֶׁמֶשׁ
  english_pob_choice: sun
  chosen_spanish: sol
  alternatives_spanish:
  - luz
  - astro
  lexicon: HALOT
  rationale: Se conserva la metáfora literal del sustantivo; «sol» reproduce mejor la imagen poética que una explicación como «luz».
- source_word: וּמָגֵן
  english_pob_choice: and shield
  chosen_spanish: y escudo
  alternatives_spanish:
  - y protección
  - y defensor
  lexicon: HALOT
  rationale: «Escudo» mantiene la imagen bíblica de protección divina sin interpretarla; es el equivalente más directo y transparente en español.
- source_word: יְהוָה אֱלֹהִים
  english_pob_choice: Yahweh God
  chosen_spanish: Yahvé Dios
  alternatives_spanish:
  - Yahvé, Dios
  - el Señor Dios
  lexicon: HALOT
  rationale: 'Se sigue el estándar del proyecto para el Nombre divino: «Yahvé». «Dios» conserva la aposición appositiva del hebreo sin sustituir el Nombre por una convención de ocultamiento.'
- source_word: חֵן
  english_pob_choice: favor
  chosen_spanish: gracia
  alternatives_spanish:
  - favor
  - benevolencia
  lexicon: HALOT
  rationale: En este contexto poético, «gracia» conserva la amplitud semántica del término y funciona bien en paralelo con «honor». Se documenta que también puede leerse «favor».
- source_word: וְכָבוֹד
  english_pob_choice: and honor
  chosen_spanish: y honor
  alternatives_spanish:
  - y gloria
  - y dignidad
  lexicon: HALOT
  rationale: «Honor» comunica con naturalidad la idea de dignidad otorgada a los suyos; «gloria» queda como alternativa válida porque el hebreo también la permite.
- source_word: יִתֵּן
  english_pob_choice: gives
  chosen_spanish: da
  alternatives_spanish:
  - dará
  lexicon: HALOT
  rationale: El imperfecto expresa aquí acción característica o verdad general; el presente «da» transmite bien ese valor gnómico en español.
- source_word: לֹא יִמְנַע
  english_pob_choice: does not withhold
  chosen_spanish: No retiene
  alternatives_spanish:
  - No niega
  - No aparta
  lexicon: HALOT
  rationale: El verbo significa retener o impedir; «No retiene» es una versión natural y fiel que conserva el paralelismo con «da».
- source_word: טוֹב
  english_pob_choice: good
  chosen_spanish: el bien
  alternatives_spanish:
  - lo bueno
  - bien
  lexicon: HALOT
  rationale: Aquí el sustantivo funciona de manera amplia y concreta; «el bien» mantiene esa amplitud sin forzar una explicación adicional.
- source_word: לַהֹלְכִים
  english_pob_choice: from those who walk
  chosen_spanish: de los que andan
  alternatives_spanish:
  - de los que caminan
  - de los que viven
  lexicon: HALOT
  rationale: «Andan» conserva la metáfora bíblica de conducta o estilo de vida, y suena más natural en español que una traducción explicativa.
- source_word: בְּתָמִים
  english_pob_choice: blamelessly
  chosen_spanish: en integridad
  alternatives_spanish:
  - con integridad
  - en rectitud
  - intachablemente
  lexicon: HALOT
  rationale: El término apunta a integridad, entereza y rectitud de conducta, no a perfección sin pecado. «En integridad» preserva ese matiz y evita sobrerresolver la tensión teológica.
theological_decisions:
- issue: Rendering of the divine name יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Jehová
  - el SEÑOR
  rationale: El texto hebreo usa el Tetragrámaton de manera directa. Conforme al criterio del proyecto, se traduce como «Yahvé» para preservar el Nombre de pacto en vez de sustituirlo por una convención litúrgica.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Meaning of חֵן וְכָבוֹד
  english_pob_reading: favor and honor
  chosen_spanish_reading: gracia y honor
  alternative_spanish_readings:
  - favor y honor
  - gracia y gloria
  rationale: El hebreo admite tanto «favor» como «gracia» para חֵן, y כָבוֹד puede ser «honor» o «gloria». En español, «gracia y honor» conserva la amplitud semántica y el paralelismo poético, mientras la nota documenta la alternativa lexical.
  doctrine_reference: 'DOCTRINE.md Translation philosophy §3: Preserve theological tension rather than resolve it'
- issue: Scope of בְּתָמִים
  english_pob_reading: blamelessly means with integrity or uprightness, not sinless perfection
  chosen_spanish_reading: en integridad
  alternative_spanish_readings:
  - con integridad
  - en rectitud
  - intachablemente
  rationale: La expresión describe una conducta íntegra y entera, no una impecabilidad absoluta. «En integridad» comunica el sentido ético sin borrar la tensión documentada en el original.
  doctrine_reference: 'DOCTRINE.md Translation philosophy §3: Preserve theological tension rather than resolve it'
translation_notes:
  revision_awareness: El contexto de revisión y la verificación cruzada reportan alta concordancia y no indican cambios pendientes; por ello, la redacción española sigue de cerca las decisiones léxicas auditadas sin introducir reinterpretaciones nuevas.
  spanish_consistency_notes:
  - Se mantiene el Nombre divino como «Yahvé» conforme al estándar del proyecto.
  - «gracia» se usa aquí por el paralelismo poético, dejando documentada la alternativa «favor».
  - «No retiene el bien» conserva el valor general del hebreo y el paralelismo con «da».
  - «andar en integridad» conserva la metáfora ética tradicional sin sugerir perfección sin pecado.
