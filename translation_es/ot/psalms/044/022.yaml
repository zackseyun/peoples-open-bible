  source_alignment_summary: 'El borrador español refleja fielmente el hebreo: mantiene la pregunta retórica afirmativa de הֲלֹא con «¿No…?», traduce אֱלֹהִים como «Dios», conserva la idea de examen profundo de יַחֲקָר con «escudriñará», retiene el demostrativo compacto «esto», y expresa correctamente la razón con «Porque». La segunda cláusula preserva bien el sentido de conocimiento continuo de יֹדֵעַ y la expresión «las cosas ocultas del corazón» corresponde adecuadamente a תַּעֲלֻמוֹת לֵב, con la alternativa «los secretos del corazón» bien documentada en nota.'
