revisions:
- from: Pues eran justos y autodominados[a], valientes y de alma noble y amantes de sus hermanos, y tan entregados a su madre, que, aun guardando los preceptos de la ley[b] hasta la muerte, le obedecían.
  to: Pues eran justos y dueños de sí mismos[a], valientes y de alma noble, y amaban a sus hermanos; y tan entregados a su madre, que, aun guardando los preceptos de la ley[b] hasta la muerte, le obedecían.
  rationale: 'La revisión conserva plenamente el sentido del griego y del POB en inglés, pero sustituye dos expresiones poco naturales por formulaciones más idiomáticas y claras para un español eclesial amplio: ‘dueños de sí mismos’ por ‘autodominados’ y ‘amaban a sus hermanos’ por ‘amantes de sus hermanos’. También se ajusta ligeramente la puntuación para mejorar la fluidez del catálogo de virtudes.'
  reviewer_model: gpt-5.4
