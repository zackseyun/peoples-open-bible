translation:
  language: es
  text: La soberbia[a] del hombre lo humilla, pero el humilde de espíritu obtiene[b] honor.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «lo abate» o «lo rebaja». El hebreo puede significar hacer bajar, humillar o abatir.
    reason: lexical_alternative
  - marker: b
    text: O «retendrá el honor» o «alcanzará honor». El verbo hebreo puede implicar asir, sostener o obtener.
    reason: lexical_alternative
lexical_decisions:
- source_word: גַּאֲוַת
  english_pob_choice: pride
  chosen_spanish: soberbia
  alternatives_spanish:
  - orgullo
  - arrogancia
  lexicon: HALOT
  rationale: En este contexto sapiencial, el hebreo expresa una elevación de sí mismo que conduce a la caída. 'Soberbia' comunica mejor que 'orgullo' la carga negativa y moral del término, sin perder la idea de autoexaltación.
- source_word: אָדָם
  english_pob_choice: a man's
  chosen_spanish: del hombre
  alternatives_spanish:
  - de una persona
  - de la humanidad
  lexicon: HALOT
  rationale: El hebreo usa un singular genérico. 'Del hombre' conserva ese valor representativo en español y evita convertirlo en plural o en una abstracción impersonal.
- source_word: תַּשְׁפִּילֶנּוּ
  english_pob_choice: will bring him low
  chosen_spanish: lo humilla
  alternatives_spanish:
  - lo rebaja
  - lo abate
  - lo humillará
  lexicon: HALOT
  rationale: 'El hifil de שׁפל tiene sentido causativo: hacer bajar, rebajar, abajar. En español, ''lo humilla'' expresa esa acción degradante de manera natural y mantiene el contraste con ''honor''; el tiempo presente proverbial funciona como futuro gnómico.'
- source_word: וּשְׁפַל רוּחַ
  english_pob_choice: but one who is lowly in spirit
  chosen_spanish: pero el de espíritu humilde
  alternatives_spanish:
  - pero el humilde de espíritu
  - pero uno de espíritu humilde
  - pero el de ánimo humilde
  lexicon: HALOT
  rationale: La expresión literal es 'bajo/abajado de espíritu'. 'De espíritu humilde' conserva la metáfora interior sin sonar forzado en español y mantiene la antítesis con la soberbia.
- source_word: יִתְמֹךְ
  english_pob_choice: will obtain
  chosen_spanish: retiene
  alternatives_spanish:
  - obtiene
  - alcanza
  - asirá
  lexicon: HALOT
  rationale: El verbo תמך puede significar sostener, asir, retener o obtener según el contexto. Dado que el objeto es 'honor', 'retiene' capta la idea de aferrarse a él o conservarlo, preservando la posible tensión semántica entre recibir y sostener.
- source_word: כָּבוֹד
  english_pob_choice: honor
  chosen_spanish: el honor
  alternatives_spanish:
  - la honra
  - la gloria
  - el prestigio
  lexicon: HALOT
  rationale: En Proverbios, כבוד suele referirse a honor social o estima. 'El honor' es la forma más directa y fiel en español para esa valoración pública.
theological_decisions:
- issue: Tensión semántica de יִתְמֹךְ con 'honor' (obtener vs. sostener/retener)
  english_pob_reading: will obtain honor; footnote notes possible sense of holding fast to or attaining honor.
  chosen_spanish_reading: retiene el honor
  alternative_spanish_readings:
  - obtiene el honor
  - asirá el honor
  - mantendrá el honor
  rationale: 'El hebreo permite más de una relación con el objeto ''honor'': tomarlo, sostenerlo o adquirirlo. ''Retiene'' permite reflejar esa amplitud sin resolverla demasiado pronto hacia una sola opción, y se ajusta bien al paralelismo sapiencial.'
  doctrine_reference: Lexical/theological note on the semantic range of תמך in wisdom literature.
translation_notes:
  revision_awareness: 'El texto inglés POB vigente traduce el primer hemistiquio con ''will bring him low'' y el segundo con ''will obtain honor'', añadiendo una nota sobre la amplitud de תמך. La presente versión española conserva esa misma tensión: evita reducir יִתְמֹךְ a un solo matiz y mantiene la antítesis entre autoexaltación y humildad. No se reportan revisiones posteriores en el pasaje fuente.'
  spanish_consistency_notes:
  - Se mantiene el registro sapiencial breve y proverbial.
  - '''Honor'' se conserva como término de valoración social, no como ''gloria'' teológica.'
  - El singular genérico 'del hombre' reproduce el valor representativo del hebreo.
  - La puntuación conserva el contraste fuerte entre los dos hemistiquios.
