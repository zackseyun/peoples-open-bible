id: GEN.29.12
reference: Genesis 29:12
source:
  edition: WLC
  text: וַ/יַּגֵּ֨ד יַעֲקֹ֜ב לְ/רָחֵ֗ל כִּ֣י אֲחִ֤י אָבִ֨י/הָ֙ ה֔וּא וְ/כִ֥י בֶן רִבְקָ֖ה ה֑וּא וַ/תָּ֖רָץ וַ/תַּגֵּ֥ד לְ/אָבִֽי/הָ־׃
translation:
  text: Jacob told Rachel that he was her father's relative and that he was Rebekah's son[a]. Then she ran and told her father.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew 'brother of her father' uses 'brother' idiomatically for a near male relative; Jacob is specifically Laban's nephew.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּגֵּד
  chosen: told
  alternatives:
  - declared
  - informed
  lexicon: HALOT
  rationale: The Hiphil of נגד commonly means to tell or make known. 'Told' is natural modern English and fits the narrative style.
- source_word: כִּי
  chosen: that
  alternatives:
  - for
  - because
  lexicon: HALOT
  rationale: Here introducing reported content after 'told,' so 'that' best reflects the clause function.
- source_word: אֲחִי אָבִיהָ
  chosen: her father's kinsman
  alternatives:
  - her father's brother
  - a relative of her father
  lexicon: HALOT
  rationale: Hebrew אָח can mean literal brother or more broadly kinsman/relative. Since Jacob is actually Laban's nephew, not his brother, 'her father's kinsman' best conveys the idiomatic familial relationship without flattening the Hebrew. This follows source sense over overly literal tradition.
- source_word: בֶן רִבְקָה
  chosen: Rebekah's son
  alternatives:
  - the son of Rebekah
  lexicon: HALOT
  rationale: Simple filial expression; the possessive form is idiomatic in English.
- source_word: וַתָּרָץ
  chosen: she ran
  alternatives:
  - she hurried
  lexicon: HALOT
  rationale: רץ denotes running; 'she ran' preserves the vivid narrative movement.
- source_word: וַתַּגֵּד
  chosen: told
  alternatives:
  - reported
  - informed
  lexicon: HALOT
  rationale: Same verb as earlier in the verse; 'told' maintains reasonable consistency and readable narrative flow.
- source_word: לְאָבִיהָ
  chosen: her father
  lexicon: HALOT
  rationale: Direct and idiomatic rendering of the prepositional phrase.
