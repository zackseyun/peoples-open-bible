translation:
  language: es
  text: El que vive para siempre creó todas las cosas de una vez[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «creó todo colectivamente» o «creó todas las cosas en común»; el adverbio griego κοινῇ es algo condensado y aquí puede destacar la totalidad de la creación como un todo.
    reason: lexical_alternative
lexical_decisions:
- source_word: Ὁ ζῶν
  english_pob_choice: The one who lives
  chosen_spanish: El que vive
  alternatives_spanish:
  - El viviente
  - El que vive para siempre
  lexicon: BDAG
  rationale: El participio articular funciona sustantivamente. En español, «El que vive» conserva el valor descriptivo sin añadir un título no presente en el griego. Se evita «viviente» por sonar menos natural en este contexto.
- source_word: εἰς τὸν αἰῶνα
  english_pob_choice: forever
  chosen_spanish: por siempre
  alternatives_spanish:
  - para siempre
  - por la eternidad
  lexicon: BDAG
  rationale: La expresión indica duración perpetua. «Por siempre» es idiomático, claro y mantiene el sentido de permanencia sin exceso de solemnidad.
- source_word: ἔκτισεν
  english_pob_choice: created
  chosen_spanish: creó
  alternatives_spanish:
  - hizo
  - formó
  lexicon: BDAG
  rationale: κτίζω en contexto cosmológico expresa creación/origen. «Creó» es la correspondencia más directa y teológicamente precisa en español.
- source_word: τὰ πάντα
  english_pob_choice: all things
  chosen_spanish: todas las cosas
  alternatives_spanish:
  - todo
  - el conjunto de todas las cosas
  lexicon: BDAG
  rationale: La frase denota la totalidad de lo existente. «Todas las cosas» preserva la amplitud formal del griego y su tono elevado.
- source_word: κοινῇ
  english_pob_choice: at once
  chosen_spanish: en conjunto
  alternatives_spanish:
  - juntas
  - colectivamente
  - de una vez
  lexicon: LSJ
  rationale: El adverbio puede significar «en común», «colectivamente» o, en este contexto, el todo de la creación como unidad. «En conjunto» comunica bien esa idea sin introducir una afirmación filosófica más fuerte que la del texto.
theological_decisions:
- issue: Sujeto descrito sin nombrarlo explícitamente como Dios o Yahvé
  english_pob_reading: The one who lives forever
  chosen_spanish_reading: El que vive por siempre
  alternative_spanish_readings:
  - Dios, que vive por siempre
  - El Señor, que vive por siempre
  rationale: El griego no usa θεός ni κύριος, sino una frase participial descriptiva. La traducción conserva esa forma y deja que la identificación teológica emerja por contexto, sin añadir un título que el texto no da explícitamente.
  doctrine_reference: 'Primacía del original: no importar títulos ausentes del texto fuente; mantener la identificación contextual.'
translation_notes:
  revision_awareness: La redacción española sigue la revisión inglesa más reciente en la idea de totalidad creada «at once», pero prefiere «en conjunto» porque en español expresa con más naturalidad la unidad/totalidad implicada por κοινῇ sin sonar temporalmente rígido. Se preserva la tensión léxica entre «en común», «colectivamente» y la lectura global del acto creador.
  spanish_consistency_notes:
  - Se mantiene un registro bíblico sobrio y moderno, sin depender de fórmulas eclesiásticas tradicionales no sustentadas por el griego.
  - «Por siempre» se usa de forma consistente para εἰς τὸν αἰῶνα cuando el contexto expresa duración perpetua.
  - «En conjunto» se escogió para κοινῇ como equivalente principal; la nota conserva alternativas relevantes sin sobreinterpretar el adverbio.
