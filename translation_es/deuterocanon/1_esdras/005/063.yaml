translation:
  language: es
  text: Y cuando los enemigos de la tribu de Judá y de Benjamín oyeron, vinieron para averiguar cuál era el sonido de las trompetas[a][b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más literalmente: «cuál era la voz de las trompetas».'
    reason: lexical_alternative
  - marker: b
    text: El griego tiene el singular «tribu» con «Judá y Benjamín»; también puede entenderse como «las tribus de Judá y Benjamín».
    reason: alternative_reading
lexical_decisions:
- source_word: ἀκούσαντες
  english_pob_choice: when ... heard
  chosen_spanish: al oír
  alternatives_spanish:
  - cuando oyeron
  - después de oír
  lexicon: BDAG
  rationale: El participio aoristo introduce la circunstancia temporal de la acción principal. «Al oír» conserva esa relación temporal de manera natural en español sin perder el valor del original.
- source_word: οἱ ἐχθροὶ
  english_pob_choice: the enemies
  chosen_spanish: los enemigos
  alternatives_spanish:
  - sus enemigos
  - los hostiles
  lexicon: BDAG
  rationale: El sustantivo designa oponentes; «los enemigos» reproduce el sentido directo sin añadir un posesivo que el griego no expresa.
- source_word: τῆς φυλῆς Ἰούδα καὶ Βενιαμεὶν
  english_pob_choice: of the tribe of Judah and Benjamin
  chosen_spanish: de la tribu de Judá y de Benjamín
  alternatives_spanish:
  - de las tribus de Judá y de Benjamín
  - del pueblo de Judá y de Benjamín
  lexicon: BDAG
  rationale: El griego tiene φυλή en singular con los nombres coordinados de Judá y Benjamín. Se conserva el singular «tribu» para reflejar la forma fuente, aunque en español pueda sonar menos esperado.
- source_word: ἦλθοσαν
  english_pob_choice: they came
  chosen_spanish: vinieron
  alternatives_spanish:
  - llegaron
  - fueron
  lexicon: BDAG
  rationale: Verbo narrativo simple de movimiento. «Vinieron» expresa bien el desplazamiento hacia el lugar del sonido en español bíblico contemporáneo.
- source_word: ἐπιγνῶναι
  english_pob_choice: to find out
  chosen_spanish: para averiguar
  alternatives_spanish:
  - para saber
  - para discernir
  - para determinar
  lexicon: BDAG
  rationale: El infinitivo expresa propósito. «Averiguar» comunica con claridad que se acercan con intención de descubrir la causa o identidad del sonido.
- source_word: τίς ἡ φωνὴ τῶν σαλπίγγων
  english_pob_choice: what the sound of the trumpets was
  chosen_spanish: cuál era el sonido de las trompetas
  alternatives_spanish:
  - qué era la voz de las trompetas
  - qué significaba el sonido de las trompetas
  - qué sonido de trompetas era
  lexicon: BDAG
  rationale: 'φωνή puede significar «voz» o «sonido»; con trompetas, «sonido» es la equivalencia más natural en español. El interrogativo se vuelve una construcción idiomática: «cuál era...», manteniendo el sentido de indagación del griego.'
translation_notes:
  revision_awareness: Se siguió el anclaje principal griego de Swete LXX 1909. El contexto paralelo hebreo/MT se usó solo como comprobación general de nombres propios y no como control principal de esta redacción. La lectura inglesa auditada fue alta y no requirió revisiones sustantivas.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» como preferencia general del proyecto cuando aparezca el nombre divino; en este versículo no aparece.
  - Se prefirió «trumpetas»/«trompetas» según el uso bíblico natural en español para σάλπιγγες.
  - Se conservó el singular «tribu» para respetar la forma griega, con nota de alternativa plural.
  - El verbo de finalidad se vertió con una construcción natural de propósito en español («para averiguar»).
