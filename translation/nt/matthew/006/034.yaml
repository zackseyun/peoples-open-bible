id: MAT.6.34
reference: Matthew 6:34
source:
  edition: SBLGNT
  text: μὴ οὖν μεριμνήσητε εἰς τὴν αὔριον, ἡ γὰρ αὔριον μεριμνήσει ⸀αὑτῆς· ἀρκετὸν τῇ ἡμέρᾳ ἡ κακία αὐτῆς.
translation:
  text: Therefore do not worry about tomorrow[a], for tomorrow will worry about itself. Each day has enough trouble of its own.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Each day has enough evil of its own.' The Greek word can mean 'evil,' but here likely refers to the day's trouble or hardship.
    reason: lexical_alternative
lexical_decisions:
- source_word: μεριμνήσητε
  lemma: μεριμνάω
  chosen: do not worry
  alternatives:
  - do not be anxious
  - do not be concerned
  lexicon: BDAG
  rationale: The verb μεριμνάω in this discourse consistently refers to anxious care or worry. 'Do not worry' is natural modern English and fits the repeated theme in Matthew 6:25–34, while remaining close to the source.
- source_word: εἰς τὴν αὔριον
  chosen: about tomorrow
  alternatives:
  - for tomorrow
  - for the next day
  lexicon: BDAG
  rationale: Although εἰς is literally 'into/for,' with μεριμνάω the idiomatic sense is concern directed toward the future. 'About tomorrow' best communicates the force in clear English.
- source_word: ἡ αὔριον
  chosen: tomorrow
  alternatives:
  - the next day
  lexicon: BDAG
  rationale: The article with αὔριον personifies 'tomorrow' as the subject of the next clause. English does not require the article here; 'tomorrow' preserves the personification naturally.
- source_word: μεριμνήσει αὑτῆς
  chosen: will worry about itself
  alternatives:
  - will be anxious for itself
  - will care for itself
  lexicon: BDAG
  rationale: This clause is rhetorically personified. 'Will worry about itself' preserves the verbal link with the previous prohibition and keeps the irony of the saying. The reflexive pronoun αὑτῆς is represented by 'itself.'
- source_word: ἀρκετὸν
  chosen: has enough
  alternatives:
  - is sufficient
  - sufficient is
  lexicon: BDAG
  rationale: The predicate adjective means 'enough/sufficient.' Rendering it as 'has enough' produces idiomatic English while preserving the sense that each day already carries a full measure of burden.
- source_word: τῇ ἡμέρᾳ
  chosen: Each day
  alternatives:
  - for the day
  - to the day
  lexicon: BDAG
  rationale: The dative is idiomatically rendered in English as a reference to each individual day. 'Each day' communicates the distributive sense more clearly than a wooden 'for the day.'
- source_word: κακία
  chosen: trouble
  alternatives:
  - evil
  - badness
  - hardship
  lexicon: BDAG
  rationale: κακία often means 'evil' or 'wickedness,' but in this context the sense is the day's trouble, adversity, or distress. 'Trouble' fits the immediate context of anxiety and avoids implying that each day possesses moral evil as its defining attribute.
- source_word: αὐτῆς
  chosen: of its own
  alternatives:
  - its
  - belonging to it
  lexicon: BDAG
  rationale: The pronoun refers back to 'day.' 'Of its own' is a natural English way to express possession and emphasis, matching the Greek genitive.
