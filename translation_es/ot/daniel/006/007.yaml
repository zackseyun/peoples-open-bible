  text: אֱ֠דַיִן סָרְכַיָּ֤/א וַ/אֲחַשְׁדַּרְפְּנַיָּ/א֙ אִלֵּ֔ן הַרְגִּ֖שׁוּ עַל מַלְכָּ֑/א וְ/כֵן֙ אָמְרִ֣ין לֵ֔/הּ דָּרְיָ֥וֶשׁ מַלְכָּ֖/א לְ/עָלְמִ֥ין חֱיִֽי־׃
base_translation:
  language: en
  yaml_path: translation/ot/daniel/006/007.yaml
  text: 'Then these high officials and satraps came before the king and said this to him: “King Darius[b][a], live forever!”'
  footnotes:
  - marker: a
    text: Or “assembled before the king,” “came by agreement to the king,” or “came tumultuously to the king.” The Aramaic idiom emphasizes a coordinated collective approach and may imply conspiratorial intent from the context.
    reason: lexical_alternative
  - marker: b
    text: Literally, “King Darius, live for ages.” This is a conventional court acclamation, not a literal claim of immortality.
    reason: cultural_note
