revisions:
- from: 'Entonces Joram dijo[a]: «¡Apresten!» Y aprestaron su carro. Entonces Joram, rey de Israel, y Ocozías, rey de Judá, salieron, cada uno en su carro, para salir al encuentro de Jehú, y lo hallaron en la parcela de tierra de Nabot el jezreelita.'
  to: 'Entonces Joram dijo[a]: «¡Enganchen!» Y engancharon su carro. Entonces Joram, rey de Israel, y Ocozías, rey de Judá, salieron, cada uno en su carro, para encontrarse con Jehú, y lo hallaron en la parcela de Nabot el jezreelita.'
  rationale: Se ajusta el verbo principal a «enganchar» para reflejar con más precisión אסר en contexto de carro, siguiendo la lógica documentada en la auditoría inglesa. También se elimina la repetición innecesaria de «salir» y se aligera «parcela de tierra» a «parcela», manteniendo la referencia a la propiedad de Nabot y la legibilidad del español.
