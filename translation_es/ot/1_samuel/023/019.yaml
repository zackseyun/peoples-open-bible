revisions:
- from: 'Entonces los zifitas subieron a Saúl en Guibeá[a], diciendo: «¿No está David escondido entre nosotros en los refugios, en la zona boscosa, en el monte de Haquilá[b], que está a la derecha del Jesimón?»'
  to: 'Entonces los zifitas subieron a Saúl en Guibeá, diciendo: «¿No está David escondido entre nosotros en las fortalezas, en la zona boscosa[a], en la colina de Haquilá[b], que está a la derecha del Jesimón?»'
  rationale: Se reubicó la nota [a] para que corresponda a «zona boscosa», que es donde existe la alternativa «Horesh». Se cambió «refugios» por «fortalezas» para reflejar mejor בַמְּצָדוֹת, y «monte» por «colina» para reflejar mejor גִּבְעַת.
