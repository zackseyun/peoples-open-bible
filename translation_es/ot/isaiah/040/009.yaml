translation:
  language: es
  text: 'Sube a un monte alto[a], mensajera de buenas nuevas para Sion; levanta con fuerza tu voz, mensajera de buenas nuevas para Jerusalén; levántala, no temas; di a las ciudades de Judá[b]: «¡Mira, vuestro Dios!»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Oh Sion, mensajera de buenas nuevas, sube a un monte alto ... Oh Jerusalén, mensajera de buenas nuevas, levanta tu voz con fuerza». El hebreo también puede leerse con Sion y Jerusalén como los vocativos directamente dirigidos.'
    reason: alternative_reading
  - marker: b
    text: 'O: «tú que traes buenas nuevas a Sion ... a Jerusalén». El participio femenino puede describir a la mensajera más que a la ciudad personificada.'
    reason: lexical_alternative
lexical_decisions:
- source_word: מְבַשֶּׂרֶת
  english_pob_choice: bearer of good news
  chosen_spanish: mensajera de buenas nuevas
  alternatives_spanish:
  - portadora de buenas nuevas
  - heraldo de buenas nuevas
  - la que trae buenas nuevas
  lexicon: HALOT
  rationale: El participio femenino conserva fuerza agentiva y puede describir a la mensajera o a la ciudad personificada. «Mensajera de buenas nuevas» mantiene la relación participial y suena natural en español sin resolver de más la ambigüedad.
- source_word: צִיּוֹן
  english_pob_choice: Zion
  chosen_spanish: Sion
  alternatives_spanish:
  - Zión
  lexicon: HALOT
  rationale: Nombre propio bíblico estándar en español; «Sion» es la forma usual y clara en registro bíblico.
- source_word: יְרוּשָׁלִָם
  english_pob_choice: Jerusalem
  chosen_spanish: Jerusalén
  lexicon: HALOT
  rationale: Topónimo bíblico estándar en español.
- source_word: עֲלִי
  english_pob_choice: Go up
  chosen_spanish: Sube
  alternatives_spanish:
  - Asciende
  - Subid
  lexicon: HALOT
  rationale: Imperativo natural y directo en español; conserva el movimiento ascendente sin arcaísmo.
- source_word: הַר גָּבֹהַ
  english_pob_choice: a high mountain
  chosen_spanish: un monte alto
  alternatives_spanish:
  - una montaña alta
  - el monte alto
  lexicon: HALOT
  rationale: «Monte» funciona bien en registro bíblico y evita una dureza innecesaria; el indefinido refleja el valor genérico/clasificador observado en el inglés POB.
- source_word: הָרִימִי
  english_pob_choice: lift up
  chosen_spanish: levanta
  alternatives_spanish:
  - alza
  - levántala
  - levanta tu voz
  lexicon: HALOT
  rationale: En español, «levanta tu voz» ya está expresado en la línea anterior; aquí «levanta» puede entenderse con el objeto implícito y reproduce la repetición enfática. La traducción del objeto implícito se concreta en la segunda mitad como «levántala» para mantener la progresión retórica.
- source_word: בַכֹּחַ
  english_pob_choice: with strength
  chosen_spanish: con fuerza
  alternatives_spanish:
  - con poder
  - fuertemente
  lexicon: HALOT
  rationale: «Fuerza» mantiene el sustantivo fuerza/poder de modo claro y natural; evita convertirlo en adverbio cuando el hebreo conserva valor nominal.
- source_word: קוֹלֵךְ
  english_pob_choice: your voice
  chosen_spanish: tu voz
  alternatives_spanish:
  - tu sonido
  lexicon: HALOT
  rationale: Equivalente directo y natural en el contexto de proclamación pública.
- source_word: אַל תִּירָאִי
  english_pob_choice: do not fear
  chosen_spanish: no temas
  alternatives_spanish:
  - no tengas miedo
  - no te asustes
  lexicon: HALOT
  rationale: Imperativo prohibitivo idiomático y breve en español; conserva el tono exhortativo.
- source_word: אִמְרִי
  english_pob_choice: say
  chosen_spanish: di
  alternatives_spanish:
  - declara
  - proclama
  lexicon: HALOT
  rationale: Imperativo simple y fiel del verbo אמר; el contexto ya aporta la solemnidad profética.
- source_word: לְעָרֵי יְהוּדָה
  english_pob_choice: to the cities of Judah
  chosen_spanish: a las ciudades de Judá
  alternatives_spanish:
  - a las ciudades de Judea
  lexicon: HALOT
  rationale: Mantiene la referencia geográfica precisa y el plural distributivo.
- source_word: הִנֵּה
  english_pob_choice: Behold
  chosen_spanish: ¡Mira!
  alternatives_spanish:
  - ¡He aquí!
  - ¡Observa!
  lexicon: HALOT
  rationale: En español moderno, «¡Mira!» comunica la llamada de atención con dignidad y mayor naturalidad que «he aquí».
- source_word: אֱלֹהֵיכֶם
  english_pob_choice: your God
  chosen_spanish: tu Dios
  alternatives_spanish:
  - vuestro Dios
  - su Dios
  lexicon: HALOT
  rationale: El hebreo usa sufijo plural de segunda persona, pero en español bíblico dirigido a una ciudad personificada el singular posesivo es natural y corresponde al patrón del inglés POB. «Tu Dios» mantiene cercanía y la fuerza del anuncio.
theological_decisions:
- issue: Identificación sintáctica de las formas femeninas participiales מְבַשֶּׂרֶת
  english_pob_reading: The verse addresses a feminine herald associated with Zion and Jerusalem, rather than fully resolving whether the cities themselves are the heralds or the recipients.
  chosen_spanish_reading: El texto principal presenta a una mensajera de buenas nuevas asociada con Sion y Jerusalén, sin cerrar del todo si las ciudades son la mensajera personificada o la destinataria del anuncio.
  alternative_spanish_readings:
  - «Sube a un monte alto, oh Sion, mensajera de buenas nuevas ... oh Jerusalén, mensajera de buenas nuevas»
  - «Sube a un monte alto, tú que llevas buenas nuevas a Sion ... a Jerusalén»
  rationale: El hebreo permite ambas direcciones sintácticas. La redacción principal en español conserva esa tensión con una formulación que puede leerse de manera asociativa, mientras las alternativas preservan las dos soluciones mayores documentadas por el POB en inglés.
  doctrine_reference: Translation philosophy §3 Preserve theological tension rather than resolve it
- issue: Uso de אֱלֹהִים sin el nombre divino YHWH
  english_pob_reading: God
  chosen_spanish_reading: Dios
  alternative_spanish_readings:
  - el Señor
  rationale: En este versículo aparece אֱלֹהֵיכֶם, no יהוה; por tanto, «Dios» es la equivalencia directa y evita introducir el sustituto «Señor» sin base textual.
  doctrine_reference: Contested terms table distinguishes יְהוָה as Yahvé
translation_notes:
  revision_awareness: La redacción sigue el pasaje con alto acuerdo respecto del audit trail inglés y no introduce cambios de sentido no documentados; se mantiene la ambigüedad sintáctica principal sobre מְבַשֶּׂרֶת y el destinatario/personificación de Sion y Jerusalén.
  spanish_consistency_notes:
  - Se mantiene «Sion» y «Jerusalén» como topónimos bíblicos estándar en español.
  - Se traduce el imperativo profético con formas breves y naturales («Sube», «levanta», «no temas», «di»).
  - «Tu Dios» reproduce el posesivo singular natural en español para el anuncio dirigido a ciudades personificadas, sin añadir interpretación doctrinal.
  - «Mira» traduce la atención solemne de הִנֵּה con registro claro y publicable.
  - Las notas al pie conservan las alternativas sintácticas y léxicas relevantes para la transparencia audit trail.
