    text: 'Hebreo: «desde las partes más bajas del pozo» o «desde las profundidades de abajo del pozo».'
    reason: lexical_alternative
  revision_rationale: Se conserva «Invocé tu nombre» por su fidelidad al uso idiomático de קרא con «tu nombre». Se mantiene «Yahvé» conforme a la política del proyecto para יְהוָה. Se cambia «sepulcro» por «pozo» para reflejar mejor בּוֹר y armonizar con la nota lexical y la auditoría inglesa. «Las profundidades del pozo» comunica naturalmente en español el valor de תַּחְתִּיּוֹת sin perder la imagen literal.
