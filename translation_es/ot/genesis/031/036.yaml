translation:
  language: es
  text: 'Entonces Jacob se enojó y contendió con Labán. Jacob respondió y dijo a Labán[a]: «¿Cuál es mi transgresión? ¿Cuál es mi pecado, que me has perseguido?»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «me has perseguido con ardor». El verbo hebreo puede evocar la imagen de una persecución ardiente o intensa.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּחַר לְיַעֲקֹב
  english_pob_choice: Then Jacob became angry
  chosen_spanish: Entonces Jacob se enojó
  alternatives_spanish:
  - Entonces Jacob se enfureció
  - Entonces Jacob ardió de ira
  lexicon: HALOT
  rationale: El hebreo expresa el surgir de la ira hacia alguien; «se enojó» conserva el sentido ingresivo de la forma narrativa y suena natural en español sin añadir intensidad no explícita.
- source_word: וַיָּרֶב בְּלָבָן
  english_pob_choice: and contended with Laban
  chosen_spanish: y contendió con Labán
  alternatives_spanish:
  - y discutió con Labán
  - y litigó con Labán
  lexicon: HALOT
  rationale: ריב comunica disputa o contienda formal/contenciosa. «Contendió» conserva esa fuerza adversarial sin limitar el tono a una simple discusión.
- source_word: וַיַּעַן ... וַיֹּאמֶר
  english_pob_choice: Jacob answered and said
  chosen_spanish: Jacob respondió y dijo
  alternatives_spanish:
  - Jacob contestó y dijo
  - Jacob respondió
  lexicon: HALOT
  rationale: La pareja narrativa hebrea «respondió y dijo» se mantiene de forma transparente en español. «Respondió» evita un calco torpe y preserva el paralelismo del texto.
- source_word: מַה פִּשְׁעִי
  english_pob_choice: What is my transgression?
  chosen_spanish: ¿Cuál es mi transgresión?
  alternatives_spanish:
  - ¿Cuál es mi falta?
  - ¿Cuál es mi rebeldía?
  lexicon: HALOT
  rationale: פֶּשַׁע designa transgresión o rebelión, con matiz moral-jurídico. «Transgresión» reproduce mejor ese peso que «falta» o «error».
- source_word: מַה חַטָּאתִי
  english_pob_choice: What is my sin?
  chosen_spanish: ¿Cuál es mi pecado?
  alternatives_spanish:
  - ¿Qué pecado he cometido?
  - ¿Cuál es mi culpa?
  lexicon: HALOT
  rationale: חטאת apunta al pecado o culpa. «Pecado» mantiene el paralelismo con «transgresión» y conserva la formulación directa de la autosfensa de Jacob.
- source_word: כִּי דָלַקְתָּ אַחֲרַי
  english_pob_choice: that you have pursued me
  chosen_spanish: que me has perseguido
  alternatives_spanish:
  - que me has seguido
  - que me has venido persiguiendo
  lexicon: HALOT
  rationale: La revisión inglesa eliminó «hotly» para no expandir el hebreo; por eso el español evita cualquier adverbio interpretativo. «Perseguido» transmite el verbo básico sin añadir intensidad no marcada.
translation_notes:
  revision_awareness: La base inglesa fue revisada para retirar «hotly» y dejar solo «pursued»; esta versión española sigue esa decisión y evita añadir intensidad adverbial no sustentada por el hebreo. También conserva la secuencia narrativa «respondió y dijo» y el paralelismo interrogativo de «transgresión / pecado».
  spanish_consistency_notes:
  - Se mantiene «Labán» para el nombre propio según uso bíblico estándar en español.
  - Se conserva la distinción léxica entre «transgresión» y «pecado» para reflejar el paralelismo del hebreo.
  - No se introduce ninguna ampliación adverbial en el verbo final, en coherencia con la revisión textual del audit trail.
