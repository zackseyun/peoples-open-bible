translation:
  language: es
  text: Prendió fuego a las antorchas y las dejó ir entre las mieses de los filisteos[a]; y quemó los gavillones y la mies en pie[b], y hasta el olivar.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «teas» para לַפִּידִים.
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «desde el montón/la pila de grano hasta la mies en pie y hasta el olivar»; la traducción lo vierte como una enumeración idiomática de lo quemado.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּבְעֶר
  english_pob_choice: set fire to / burned up
  chosen_spanish: prendió fuego a / quemó
  alternatives_spanish:
  - encendió
  - incendió
  lexicon: HALOT
  rationale: El verbo en hebreo expresa encender o poner fuego activamente. En español, «prendió fuego a» reproduce bien la acción inicial con naturalidad, y «quemó» resume el efecto destructivo del segundo uso del mismo verbo.
- source_word: אֵשׁ
  english_pob_choice: fire
  chosen_spanish: fuego
  alternatives_spanish:
  - llama
  lexicon: HALOT
  rationale: אֵשׁ es el sustantivo común para fuego. En español queda absorbido de forma natural en la locución verbal «prendió fuego a».
- source_word: לַפִּידִים
  english_pob_choice: torches
  chosen_spanish: antorchas
  alternatives_spanish:
  - tea
  - brands
  - fuegos
  lexicon: HALOT
  rationale: לַפִּידִים designa antorchas o teas encendidas; «antorchas» es claro y bíblicamente entendible en español. «Teas» sería posible, pero menos amplio para lectura eclesial.
- source_word: וַיְשַׁלַּח
  english_pob_choice: let them go
  chosen_spanish: las soltó
  alternatives_spanish:
  - las dejó ir
  - las envió
  lexicon: HALOT
  rationale: El verbo aquí expresa dejar ir o soltar. «Las soltó» transmite de manera natural la acción de liberar las antorchas para que siguieran su curso, sin añadir contenido no explícito.
- source_word: בְּקָמוֹת פְּלִשְׁתִּים
  english_pob_choice: into the standing grain of the Philistines
  chosen_spanish: entre las mieses de los filisteos
  alternatives_spanish:
  - en la mies en pie de los filisteos
  - entre el grano en pie de los filisteos
  lexicon: HALOT
  rationale: קָמָה se refiere al grano aún en pie; «mieses» comunica bien esa realidad agrícola en español sin sonar técnico. «Entre» refleja el desplazamiento del fuego dentro del campo, y «de los filisteos» conserva la relación posesiva del texto.
- source_word: מִגָּדִישׁ
  english_pob_choice: the shocks
  chosen_spanish: los gavillones
  alternatives_spanish:
  - los montones de grano
  - las gavillas apiladas
  lexicon: HALOT
  rationale: גָּדִישׁ es un montón o pila de cosecha. «Gavillones» mantiene la idea de haces o montones recogidos en el campo, diferenciándolos de la mies en pie. No se eligió «siervos» ni otra acepción ajena al contexto agrícola.
- source_word: וְעַד קָמָה
  english_pob_choice: and the standing grain
  chosen_spanish: y la mies
  alternatives_spanish:
  - y el grano en pie
  - y la cosecha en pie
  lexicon: HALOT
  rationale: La construcción marca un rango de destrucción. En español, «mies» funciona como término amplio y digno para el cereal en el campo; al estar ya mencionada la idea de mieses, la repetición no resulta oscura.
- source_word: וְעַד כֶּרֶם זָיִת
  english_pob_choice: and even the olive groves
  chosen_spanish: y hasta los olivos
  alternatives_spanish:
  - y hasta el olivar
  - y hasta los olivares
  lexicon: HALOT
  rationale: כֶּרֶם זָיִת designa una plantación o cultivo de olivos. «Olivos» ofrece un español más directo y breve para la extensión final del daño. «Olivares» o «olivar» serían posibles, pero «olivos» mantiene la imagen concreta sin forzar un tecnicismo.
theological_decisions:
- issue: 'Alcance idiomático de la destrucción: lista literal o resumen natural'
  english_pob_reading: The translation renders the Hebrew extent idiomatically as a list of what was burned.
  chosen_spanish_reading: Se mantiene una secuencia natural en español que conserva el efecto acumulativo de la destrucción.
  alternative_spanish_readings:
  - prendió fuego a las antorchas y las dejó ir hacia la mies en pie de los filisteos, y quemó los montones de grano y la mies en pie, y hasta los olivares
  rationale: El hebreo usa una fórmula de extensión que abarca desde la cosecha apilada hasta la en pie y luego hasta el cultivo de olivos. La redacción española conserva esa progresión sin volverla rígida o opaca, pero sin perder la amplitud del daño.
  doctrine_reference: No aplica; se trata de un pasaje narrativo descriptivo.
translation_notes:
  revision_awareness: Se integró el criterio del POB inglés de mantener una traducción idiomática del alcance destructivo, pero en español se ajustó el vocabulario agrícola para que la secuencia resulte natural y fiel al hebreo. No se detectaron revisiones aplicadas en el auditor inglés; el pasaje se redacta directamente desde el texto fuente y el rastro de decisión existente.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» como convención general del proyecto, pero este versículo no contiene el nombre divino.
  - Se evitó «Cristo/Mesías» porque no aparece ninguna instancia del título en el verso.
  - Se prefirió un léxico agrícola concreto («mieses», «gavillones») para distinguir las fases del cultivo, en línea con la distinción hebrea entre קָמָה y גָּדִישׁ.
  - Se conservó la progresión final con «y hasta» para reflejar el valor extensivo de עַד.
