id: MRK.15.34
reference: Mark 15:34
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: καὶ τῇ ⸂ἐνάτῃ ὥρᾳ⸃ ἐβόησεν ὁ Ἰησοῦς φωνῇ ⸀μεγάλῃ· Ἐλωῒ ἐλωῒ ⸀λεμὰ σαβαχθάνι; ὅ ἐστιν μεθερμηνευόμενον Ὁ θεός μου ὁ θεός μου, εἰς τί ⸂ἐγκατέλιπές με⸃;
base_translation:
  language: en
  yaml_path: translation/nt/mark/015/034.yaml
  text: And at the ninth hour Jesus cried out with a loud voice[a], “Eloi, Eloi, lema sabachthani?” which is translated, “My God, my God[c][b], for what reason have you forsaken me?”
  footnotes:
  - marker: a
    text: Some manuscripts and many English traditions reflect the Semitic phrase as 'lama sabachthani' rather than 'lema sabachthani.'
    reason: textual_variant
  - marker: b
    text: Jesus's words echo Psalm 22:1.
    reason: cross_reference
  - marker: c
    text: Or 'why did you forsake me?'
    reason: lexical_alternative
translation:
  language: ko
  text: 제 구시에 예수께서 큰 소리로 부르짖으셨습니다. 「엘로이 엘로이 레마 사박다니?」 이는 번역하면 「나의 하나님, 나의 하나님, 어찌하여 저를 버리셨습니까?」 라는 뜻입니다.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: Ἐλωῒ ἐλωῒ λεμὰ σαβαχθάνι
  english_pob_choice: Eloi, Eloi, lema sabachthani
  chosen_korean: 엘로이 엘로이 레마 사박다니
  alternatives_korean:
  - 엘리 엘리 라마 사박다니
  lexicon: BDAG
  rationale: 마가가 보존한 아람어 형태(Ἐλωΐ는 אֱלָהִי, 마태의 ἠλι는 히브리 אֵלִי에서 옴)를 그대로 음역하여 마가 본문의 셈어 보존 의도를 유지한다.
theological_decisions:
- issue: 15:34의 아람어 부르짖음 보존(시편 22:1 반향)
  chosen_reading: 엘로이 엘로이 레마 사박다니
  alternative_readings:
  - 하나님, 하나님, 어찌하여 저를 버리셨습니까(번역만)
  rationale: 마가는 의도적으로 아람어 부르짖음을 음역으로 보존하고, 그 뒤에 헬라어 번역을 덧붙였다. 이는 십자가의 마지막 부르짖음이 시편 22:1(אֵלִי אֵלִי לָמָה עֲזַבְתָּנִי)의 반향임을 분명히 한다. 한국어 본문도 음역+번역을 병치하여 본문의 의도적 이중 언어 구조와 시편 인용의 무게를 그대로 살린다.
  doctrine_reference: 'DOCTRINE.md: render the source''s strongest plain meaning; preserve original-language signals'
