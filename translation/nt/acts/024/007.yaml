id: ACT.24.7
reference: Acts 24:7
source:
  edition: robinson-pierpont-2005-byzantine
  text: παρελθὼν δὲ Λυσίας ὁ χιλίαρχος μετὰ πολλῆς βίας ἐκ τῶν χειρῶν ἡμῶν ἀπήγαγεν,
  language: Greek
translation:
  text: But[a] Lysias the commander came and took him out of our hands with great
    force,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: This verse (along with the end of verse 6 and the beginning of verse 8)
      is absent from the earliest Greek manuscripts (including the 3rd-century Papyrus
      74 and the 4th-century Sinaiticus and Vaticanus) and early Coptic translations.
      It is preserved in the Byzantine majority tradition, the Latin tradition, and
      later Greek manuscripts. It reads as an early editorial expansion narrating
      the Roman commander's intervention before Felix.
    reason: textual_critical
lexical_decisions:
- source_word: παρέρχομαι
  chosen: came
  alternatives:
  - came forward
  - arrived
  - came along
  lexicon: BDAG
  rationale: The aorist participle παρελθὼν indicates Lysias arriving on the scene.
    Translated as a finite verb ('came and...') to maintain natural English narrative
    flow.
- source_word: χιλίαρχος
  chosen: commander
  alternatives:
  - tribune
  - captain
  lexicon: BDAG
  rationale: Literally 'commander of a thousand,' referring to a Roman military tribune.
    'Commander' is the most accessible equivalent for modern readers while accurately
    conveying his high military rank.
- source_word: βία
  chosen: force
  alternatives:
  - violence
  - strength
  lexicon: BDAG
  rationale: Combined with πολλῆς ('much/great'), 'great force' captures the physical
    coercion used by Lysias to extract Paul from the mob without necessarily implying
    malicious 'violence'.
- source_word: ἀπάγω
  chosen: took away
  alternatives:
  - led away
  - carried off
  lexicon: BDAG
  rationale: The verb means to lead or take someone away, often in a judicial or custodial
    context. 'Took him out of our hands' provides a smooth, idiomatic rendering of
    the Greek prepositional phrase.
