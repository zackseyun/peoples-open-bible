base_translation:
  language: en
  yaml_path: translation/extra_canonical/gospel_of_thomas/017.yaml
  text: Jesus said[a], “I will give you what eye has not seen, and what ear has not heard[e][d][c][b], and what hand has not touched—and it has not arisen upon the human heart.”
  footnotes:
  - marker: a
    text: “You” is plural in Coptic (ⲛⲁⲛⲧⲱⲧⲛ).
    reason: dialect_note
  - marker: b
    text: The prepositional phrase is literally “upon the heart” (ϩⲓ ⲡϩⲏⲧ), not the more idiomatic English “in/into the heart.”
    reason: lexical_alternative
  - marker: c
    text: Cf. Isaiah 64:4; 1 Corinthians 2:9 for a related triad (“eye has not seen …”), though Thomas’s wording is translated directly from the Coptic here.
    reason: cross_reference
  - marker: d
    text: 'MS object marking after the perception verbs appears as ⲉⲣⲟϥ in the first clause; Dilley normalizes with ⲛⲧⲟϥ across the triad. Sense: “see/hear/touch it.”'
    reason: textual_variant
  - marker: e
    text: Or 'I myself will give you'.
    reason: previous_rendering
