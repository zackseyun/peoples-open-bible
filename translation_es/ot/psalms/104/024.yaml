    changes_summary: Replaced 'your possessions' with 'your creatures' to better reflect קִנְיָנֶךָ in this context as what God has brought forth/owns within creation, yielding more natural English in parallel with the verse’s focus on created works.
translation:
  language: es
  text: ¡Cuán numerosas son tus obras[a], oh Yahvé! En sabiduría las hiciste todas; la tierra está llena de tus criaturas.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «lo que te pertenece». El hebreo puede denotar lo adquirido o poseído; en este contexto puede referirse ampliamente a las cosas que Dios ha hecho.
    reason: lexical_alternative
lexical_decisions:
- source_word: מָה רַבּוּ
  english_pob_choice: How many are
  chosen_spanish: ¡Cuán numerosas son!
  alternatives_spanish:
  - ¡Cuántas son!
  - ¡Qué numerosas son!
  lexicon: HALOT
  rationale: La exclamación hebrea expresa abundancia y multiplicidad. En español, «¡Cuán numerosas son!» conserva el tono poético y la idea de multitud sin volverla mecánica.
- source_word: מַעֲשֶׂיךָ
  english_pob_choice: your works
  chosen_spanish: tus obras
  alternatives_spanish:
  - tus trabajos
  - lo que has hecho
  lexicon: HALOT
  rationale: «Obras» es el equivalente directo y natural en español para מעשה en un himno de creación. «Trabajos» suena impropio aquí, y «lo que has hecho» explicita demasiado el sentido.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  - Jehová
  lexicon: HALOT
  rationale: 'Se sigue el criterio del proyecto para el Tetragrámaton: «Yahvé» como forma española estable y reverente del nombre divino, en lugar de una sustitución por título.'
- source_word: כֻּלָּם
  english_pob_choice: them all
  chosen_spanish: todas
  alternatives_spanish:
  - todas ellas
  - todas las obras
  lexicon: HALOT
  rationale: El pronombre retoma «tus obras»; en español, «todas» integra naturalmente el referente sin redundancia innecesaria.
- source_word: בְּחָכְמָה
  english_pob_choice: In wisdom
  chosen_spanish: En sabiduría
  alternatives_spanish:
  - con sabiduría
  - sabia y sabiamente
  lexicon: HALOT
  rationale: Se mantiene el sustantivo para preservar la imagen teológica de la sabiduría como esfera o modo de la creación, no solo como adverbio.
- source_word: עָשִׂיתָ
  english_pob_choice: you have made
  chosen_spanish: hiciste
  alternatives_spanish:
  - has hecho
  - formaste
  lexicon: HALOT
  rationale: En el español poético del versículo, el pretérito perfecto simple fluye de manera natural y expresa la acción creadora realizada. «Has hecho» también sería posible, pero suena menos idiomático en este contexto.
- source_word: מָלְאָה
  english_pob_choice: is full of
  chosen_spanish: está llena de
  alternatives_spanish:
  - se ha llenado de
  - rebosa de
  lexicon: HALOT
  rationale: «Está llena de» comunica el estado resultante presente que expresa el hebreo. «Rebosa de» intensifica más de lo que el texto exige.
- source_word: הָאָרֶץ
  english_pob_choice: the earth
  chosen_spanish: la tierra
  alternatives_spanish:
  - la tierra entera
  - la tierra/ el mundo
  lexicon: HALOT
  rationale: «La tierra» es la forma más natural en español para el ámbito cósmico del salmo y mantiene la amplitud del original.
- source_word: קִנְיָנֶךָ
  english_pob_choice: your creatures
  chosen_spanish: tus criaturas
  alternatives_spanish:
  - lo que te pertenece
  - tus posesiones
  - tus adquiridos
  lexicon: HALOT
  rationale: El término puede referirse a lo poseído/adquirido, pero en este contexto de creación la lectura más natural y coherente es «tus criaturas», siguiendo la decisión inglesa revisada que privilegia el campo de lo creado y perteneciente a Dios. No se borra la idea de pertenencia, sino que se expresa por medio de la creación misma.
theological_decisions:
- issue: Nombre divino en יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - Jehová
  rationale: Se conserva el nombre propio del pacto en una forma española estándar y reconocible. Esto evita la sustitución por un título y mantiene la transparencia respecto al hebreo.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Sentido de קִנְיָן en contexto de creación
  english_pob_reading: your creatures
  chosen_spanish_reading: tus criaturas
  alternative_spanish_readings:
  - tus posesiones
  - lo que te pertenece
  rationale: Aunque el lexema admite la noción de posesión/adquisición, el contexto del salmo habla de la creación entera. Por eso «criaturas» comunica de forma fiel y readable el resultado creado que llena la tierra, sin perder la relación de pertenencia a Dios.
  doctrine_reference: Psalm 104 creation hymn / lexical context
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión inglesa más reciente, que prefirió «your creatures» frente a «your possessions» para קִנְיָנֶךָ. La versión española refleja esa decisión como «tus criaturas», manteniendo la tensión entre pertenencia y creación sin volverla posesión abstracta.
  spanish_consistency_notes:
  - Se usa «Yahvé» de manera consistente para יהוה según el criterio del proyecto.
  - Se mantiene el paralelismo poético del versículo con una exclamación inicial, una cláusula de sabiduría y una declaración final sobre la plenitud de la tierra.
  - «Criaturas» aquí funciona en sentido creado y perteneciente a Dios; no debe leerse como una reducción zoológica del término.
  - La puntuación conserva el tono doxológico del hebreo y del inglés auditado.
