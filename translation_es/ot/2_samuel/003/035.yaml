  rationale: 'Se hicieron ajustes menores para mejorar fidelidad y naturalidad: ‘instar’ fluye mejor que ‘exhortar’ en este contexto; ‘o cualquier cosa’ elimina el matiz añadido por ‘otra’ y refleja mejor la amplitud absoluta del hebreo; y la nota b ahora recoge con mayor precisión la fórmula completa del juramento según la auditoría inglesa.'
