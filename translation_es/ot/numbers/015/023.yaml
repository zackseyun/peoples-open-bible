- from: todo lo que Yahvé les ha mandado[a] por medio de Moisés, desde el día en que Yahvé dio mandamiento y en adelante, por todas sus generaciones—
  to: todo lo que Yahvé les ha mandado[a] por medio de Moisés, desde el día en que Yahvé mandó y en adelante, a lo largo de sus generaciones—
