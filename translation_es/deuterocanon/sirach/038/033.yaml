translation:
  language: es
  text: Dedicará su corazón a completar el esmalte[a], y su desvelo limpiará el horno[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Esmalte» traduce aquí el término griego difícil τὸ χάρισμα, entendido en este contexto de alfarería como el acabado o capa aplicada a la pieza.
    reason: alternative_reading
  - marker: b
    text: O «horno de cocción». En el contexto de las líneas circundantes sobre alfarería, κάμινον puede referirse específicamente a un horno para cocer cerámica.
    reason: lexical_alternative
lexical_decisions:
- source_word: καρδίαν ἐπιδώσει
  english_pob_choice: he will apply his heart
  chosen_spanish: aplicará su corazón
  alternatives_spanish:
  - pondrá su corazón
  - dedicará su corazón
  - aplicará su mente
  lexicon: LSJ
  rationale: La expresión mantiene el lenguaje antropológico concreto de «corazón» y reproduce la idea de orientar la interioridad con empeño a una tarea. «Aplicará» conserva el matiz de dedicar o dirigir la atención al trabajo.
- source_word: συντελέσαι
  english_pob_choice: to complete
  chosen_spanish: completar
  alternatives_spanish:
  - terminar
  - llevar a cabo
  - llevar a término
  lexicon: LSJ
  rationale: El infinitivo expresa la finalidad del esfuerzo del artesano. «Completar» es natural en español y sigue de cerca el valor de llevar algo a su culminación.
- source_word: τὸ χάρισμα
  english_pob_choice: the glaze
  chosen_spanish: el esmalte
  alternatives_spanish:
  - el acabado
  - la decoración
  - la obra terminada
  lexicon: LSJ
  rationale: En este contexto de alfarería, un «don» literal no encaja. Dado el entorno inmediato de horno y trabajo cerámico, «esmalte» comunica mejor una capa o acabado aplicado a la pieza. Se conserva la cautela del POB inglés ante la precisión técnica exacta.
- source_word: ἡ ἀγρυπνία αὐτοῦ
  english_pob_choice: his wakefulness
  chosen_spanish: su vigilancia
  alternatives_spanish:
  - su desvelo
  - su insomnio
  - su cuidado vigilante
  lexicon: LSJ
  rationale: El sustantivo apunta a estar despierto y atento. «Vigilancia» conserva la idea de atención constante al trabajo, con un registro claro y natural en español.
- source_word: καθαρίσαι
  english_pob_choice: to cleanse
  chosen_spanish: limpiará
  alternatives_spanish:
  - purificará
  - limpiará a fondo
  - descontaminará
  lexicon: LSJ
  rationale: Aunque el griego puede significar «limpiar» o «purificar», aplicado al horno la lectura más directa en español es «limpiará». Evita introducir un matiz ritual que el contexto inmediato no exige.
- source_word: κάμινον
  english_pob_choice: the furnace
  chosen_spanish: el horno
  alternatives_spanish:
  - el horno de fuego
  - el horno de cocción
  - el horno/fogón
  lexicon: LSJ
  rationale: En el contexto alfarero, «horno» resulta idiomático y ampliamente inteligible; mantiene la referencia general del griego y permite la posible nota contextual de que puede tratarse específicamente de un horno de cocción.
translation_notes:
  revision_awareness: El inglés POB pasó de «glazing» a «glaze» para τὸ χάρισμα, afinando una referencia más natural al acabado cerámico. La presente redacción española refleja esa misma cautela semántica con «esmalte», manteniendo además la ambigüedad controlada del término técnico. También se conservó la posibilidad contextual de κάμινον como horno de cocción mediante nota.
  spanish_consistency_notes:
  - Se usó «corazón» para καρδίαν, en línea con el lenguaje bíblico antropológico y con el valor idiomático de dirigir la voluntad/atención.
  - Se prefirió «vigilancia» para ἀγρυπνία por su equilibrio entre literalidad y naturalidad.
  - No se usó «SEÑOR» ni terminología teológica no presente en el versículo.
  - Se evitó «purificará» para καθαρίσαι porque podría sugerir una acción moral o ritual no indicada por el objeto directo, un horno.
  - «Horno» se eligió como base y se dejó la precisión «de cocción» como alternativa contextual, siguiendo el criterio del POB inglés de preservar la ambigüedad útil.
