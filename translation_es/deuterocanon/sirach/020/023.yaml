translation:
  language: es
  text: Hay quien promete un favor por vergüenza a un amigo, y así se gana a ese amigo como enemigo por nada[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: También puede entenderse «sin causa» para δωρεάν; el adverbio griego puede expresar tanto la falta de justificación como la inutilidad del resultado.
    reason: lexical_alternative
lexical_decisions:
- source_word: χάριν
  english_pob_choice: a favor
  chosen_spanish: un favor
  alternatives_spanish:
  - gracia
  - bondad
  lexicon: LSJ
  rationale: En este contexto sapiencial, χάριν no expresa 'gracia' teológica, sino un favor o ayuda concreta. 'Un favor' comunica bien el acto prometido y conserva el registro social del pasaje.
- source_word: αἰσχύνης
  english_pob_choice: out of shame
  chosen_spanish: por vergüenza
  alternatives_spanish:
  - por vergüenza
  - a causa de la vergüenza
  - por bochorno
  lexicon: LSJ
  rationale: El genitivo indica la causa o el motivo de la promesa. 'Por vergüenza' mantiene esa presión moral y suena natural en español.
- source_word: ἐπαγγελλόμενος
  english_pob_choice: promises
  chosen_spanish: promete
  alternatives_spanish:
  - hace la promesa de
  - se compromete a dar
  lexicon: LSJ
  rationale: El participio describe la acción de prometer; el presente 'promete' es directo y fiel sin expandir innecesariamente el griego.
- source_word: φίλῳ
  english_pob_choice: to a friend
  chosen_spanish: a un amigo
  alternatives_spanish:
  - para un amigo
  - para su amigo
  lexicon: LSJ
  rationale: El dativo se entiende naturalmente como destinatario de la promesa. 'A un amigo' es la forma más transparente en español.
- source_word: ἐκτήσατο
  english_pob_choice: has acquired / acquires
  chosen_spanish: se gana
  alternatives_spanish:
  - ha adquirido
  - lo gana para sí
  - se hace de
  lexicon: LSJ
  rationale: 'El verbo expresa adquirir o ganar para sí; en español, ''se gana'' conserva el resultado irónico: por esa conducta termina obteniendo un enemigo.'
- source_word: ἐχθρόν
  english_pob_choice: an enemy
  chosen_spanish: un enemigo
  alternatives_spanish:
  - un adversario
  - un enemigo hostil
  lexicon: LSJ
  rationale: Es el sustantivo normal 'enemigo'; no hay motivo para suavizarlo.
- source_word: δωρεάν
  english_pob_choice: for nothing
  chosen_spanish: por nada
  alternatives_spanish:
  - sin motivo
  - gratuitamente
  - sin causa
  lexicon: LSJ
  rationale: δωρεάν puede significar 'sin causa' o 'gratuitamente'. 'Por nada' conserva la idea de inutilidad e ironía del resultado, con un español natural.
translation_notes:
  revision_awareness: La versión inglesa revisada cambió el segundo miembro a presente simple y añadió 'so' para reflejar mejor el valor resultativo del griego. En español, 'y así se gana' reproduce ese matiz de consecuencia sin forzar un perfecto compuesto.
  spanish_consistency_notes:
  - Se mantuvo un registro sobrio y sapiencial, sin añadir explicaciones interpretativas al cuerpo del texto.
  - Se prefirió 'por vergüenza' y no una paráfrasis psicológica más amplia, para conservar la concisión del genitivo griego.
  - '''Por nada'' refleja δωρεάν con una opción idiomática que deja abierta la alternativa ''sin causa'' en nota.'
