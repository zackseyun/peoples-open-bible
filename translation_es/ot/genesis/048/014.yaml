  language: en
  yaml_path: translation/ot/genesis/048/014.yaml
  text: Then Israel stretched out his right hand and placed it on Ephraim’s head[a], though he was the younger, and his left hand on Manasseh’s head, crossing his hands, for Manasseh was the firstborn.
  footnotes:
