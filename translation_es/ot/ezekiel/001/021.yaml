base_translation:
  language: en
  yaml_path: translation/ot/ezekiel/001/021.yaml
  text: When they went[a], these went; and when they stood, these stood; and when they were lifted up from above the earth, the wheels were lifted up alongside them[c][b], for the spirit of the living creatures was in the wheels.
  footnotes:
