  text: But if all prophesy[a], and some unbeliever or uninstructed person enters, he is convicted by all; he is examined by all.
  footnotes:
  - marker: a
    text: Or "outsider." The Greek term can refer to one who is not informed, not initiated, or not part of the speaking group.
