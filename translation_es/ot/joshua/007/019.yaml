translation:
  language: es
  text: 'Entonces Josué dijo a Acán: «Hijo mío, por favor da gloria a Yahvé, el Dios de Israel, y dale gracias[a]. Por favor, dime qué has hecho; no me lo ocultes».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «y dale gracias a él», o en este contexto posiblemente «hazle confesión».
    reason: lexical_alternative
lexical_decisions:
- source_word: בְּנִי
  english_pob_choice: My son
  chosen_spanish: Hijo mío
  alternatives_spanish:
  - Mi hijo
  - Hijo mío, querido
  lexicon: HALOT
  rationale: El hebreo expresa un apelativo filial directo y solemne. «Hijo mío» conserva la relación personal y el tono de súplica. Se evita «mi hijo» porque en español suena menos natural como vocativo inmediato en este contexto.
- source_word: שִׂים נָא כָבוֹד
  english_pob_choice: please give glory
  chosen_spanish: por favor da gloria
  alternatives_spanish:
  - asigna gloria
  - rinde gloria
  - da honor
  lexicon: HALOT
  rationale: El idiomismo hebreo literalmente dice «poner/ponerle gloria», pero el sentido contextual es reconocer públicamente el peso y honor de Dios. «Dar gloria» es una equivalencia natural y fiel en español. Se conserva «por favor» para נָא.
- source_word: לַיהוָה
  english_pob_choice: to Yahweh
  chosen_spanish: a Yahvé
  alternatives_spanish:
  - para Yahvé
  - al SEÑOR
  lexicon: HALOT
  rationale: Se sigue el estándar del proyecto de transliterar יהוה como «Yahvé», evitando la sustitución por «SEÑOR». La preposición se adapta naturalmente en español con «a».
- source_word: אֱלֹהֵי יִשְׂרָאֵל
  english_pob_choice: the God of Israel
  chosen_spanish: el Dios de Israel
  alternatives_spanish:
  - el Dios de Israelito
  - Dios, el Dios de Israel
  lexicon: HALOT
  rationale: La construcción en hebreo identifica al Dios del pacto en relación con Israel. «El Dios de Israel» es la forma directa y transparente en español.
- source_word: תוֹדָה
  english_pob_choice: give thanks to him
  chosen_spanish: dale gracias
  alternatives_spanish:
  - dale gratitud
  - dale confesión
  - dale acciones de gracias
  lexicon: HALOT
  rationale: La revisión inglesa más reciente corrigió el sentido hacia «thanks/thanksgiving». En este contexto judicial-confesional, «dar gracias» comunica bien la idea de reconocimiento dirigido a Dios sin sobrecargar el texto con una interpretación técnica. «Dale gracias» mantiene la ambigüedad útil entre agradecimiento y reconocimiento confesional.
- source_word: וְהַגֶּד נָא לִי
  english_pob_choice: Please tell me
  chosen_spanish: Por favor, dime
  alternatives_spanish:
  - Por favor, declárame
  - Por favor, háblame
  lexicon: HALOT
  rationale: El imperativo de נגד pide decir o declarar. «Dime» es claro, natural y mantiene la petición cortés de נָא.
- source_word: מֶה עָשִׂיתָ
  english_pob_choice: what you have done
  chosen_spanish: qué has hecho
  alternatives_spanish:
  - qué hiciste
  - qué has cometido
  lexicon: HALOT
  rationale: El perfecto hebreo expresa una acción completada con relevancia presente. «Qué has hecho» es natural en español y conserva esa vigencia.
- source_word: אַל תְּכַחֵד מִמֶּנִּי
  english_pob_choice: do not hide it from me
  chosen_spanish: no me lo ocultes
  alternatives_spanish:
  - no lo escondas de mí
  - no me lo encubras
  lexicon: HALOT
  rationale: כחד significa ocultar o encubrir. Como el objeto está implícito en hebreo, el español requiere un pronombre; «lo» es la opción más natural para referirse a la acción ya mencionada.
theological_decisions:
- issue: Sentido de תוֹדָה en un contexto de confesión
  english_pob_reading: Give thanks to him, with confessional nuance preserved by context
  chosen_spanish_reading: dale gracias, dejando que el contexto aporte la idea de reconocimiento/confesión
  alternative_spanish_readings:
  - dale gracias y confiesa
  - dale confesión
  - dale acción de gracias
  rationale: El término puede abarcar agradecimiento, alabanza o reconocimiento confesional. Dado que la revisión inglesa más reciente privilegió «thanks/thanksgiving», la traducción española sigue ese giro y no fuerza una lectura exclusivamente jurídica. El mandato siguiente («dime qué has hecho») sostiene el marco confesional sin necesidad de explicitarlo en el verbo principal.
  doctrine_reference: Translation philosophy §§3, 6
translation_notes:
  revision_awareness: El inglés POB fue revisado desde «give him praise» a «give thanks to him» por una adjudicación posterior que consideró que תוֹדָה refleja mejor «thanks/thanksgiving» que una alabanza genérica. La versión española sigue esa revisión reciente y evita una paráfrasis más fuerte que el hebreo no exige.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» según el estándar del proyecto para יהוה.
  - Se conserva el tono solemne pero directo del original mediante el vocativo «Hijo mío» y las peticiones con «por favor».
  - La frase final usa «no me lo ocultes» para reproducir el valor de «no escondas/ocultes» con objeto implícito en hebreo.
  - La nota al pie está anclada en «gracias[a]» para evitar marcadores sin referencia en el texto principal.
