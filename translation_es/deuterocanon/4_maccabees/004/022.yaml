revisions:
- from: Y cuando los hubo subyugado, estableció un decreto de que, si algunos de ellos eran hallados viviendo según la ley ancestral[a], fueran muertos.
  to: Y cuando los hubo subyugado, promulgó un decreto de que, si algunos de ellos eran hallados viviendo según la ley ancestral[a], se les diera muerte.
  rationale: Se reemplaza «estableció un decreto» por «promulgó un decreto» para una expresión oficial más natural y fiel al sentido administrativo de δόγμα ἔθετο. Se cambia «fueran muertos» por «se les diera muerte» para comunicar de manera idiomática la pena capital judicial implícita en θάνοιεν. Se conserva «subyugado», «eran hallados», «viviendo según» y «ley ancestral», que representan bien el sentido del original y del audit trail inglés.
