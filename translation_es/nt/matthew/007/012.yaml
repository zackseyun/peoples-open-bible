review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura y el sentido global del griego: inferencia lógica (οὖν), alcance universal (Πάντα… ὅσα ἐὰν), referencia genérica a οἱ ἄνθρωποι, reciprocidad ética, y la fórmula «la Ley y los Profetas». Sin embargo, la segunda mitad en español se vuelve menos fiel y menos natural por la combinación «háganlo ustedes también de la misma manera para ellos», que duplica innecesariamente la idea de οὕτως y debilita la reciprocidad idiomática. También «la gente» es posible, pero «las personas» encaja mejor con el plural genérico del griego y evita leve tono coloquial.'
  spanish_quality_summary: 'El texto es mayormente claro y digno, pero la frase central suena torpe en español e incluye un giro poco idiomático («de la misma manera para ellos»). Una reparación mínima mejora mucho la legibilidad: «hagan ustedes lo mismo por ellas». También conviene alinear la nota con la decisión inglesa sobre ἄνθρωποι, ya que en español «las personas» ya resuelve el punto sin ambigüedad masculina.'
  glossary_alignment: No hay conflictos con la terminología base del proyecto. «La Ley y los Profetas» está bien conservado. La principal cuestión léxica es preferir «las personas» sobre «la gente» por correspondencia más directa con οἱ ἄνθρωποι y mejor registro en esta formulación. «Por tanto» para οὖν está bien.
  issues:
  - severity: medium
    issue: Redacción poco natural en la cláusula recíproca
    rationale: «Háganlo ustedes también de la misma manera para ellos» sobretraduce οὕτως y produce una frase pesada. El griego se expresa mejor en español como «hagan ustedes lo mismo por ellas» o equivalente.
  - severity: low
    issue: Elección de «la gente»
    rationale: Aunque válida, «la gente» es más coloquial y singular colectiva; «las personas» refleja mejor el plural genérico οἱ ἄνθρωποι en un registro bíblico claro.
  - severity: low
    issue: Nota al pie menos relevante que la alternativa inglesa documentada
    rationale: La nota sobre «Por tanto» es aceptable, pero la audit trail inglesa preserva la alternativa léxica de ἄνθρωποι. En español, si se usa «las personas», no hace falta nota; por eso conviene eliminar la nota actual en vez de mantener una nota secundaria innecesaria.
  revised_spanish_text: Por tanto, en todo, lo que quieran que las personas les hagan, hagan ustedes lo mismo por ellas; porque esto es la Ley y los Profetas.
  revised_footnotes: []
  revision_rationale: Se conserva plenamente el sentido del griego y del POB inglés, pero se corrige la cláusula central para que suene natural y recíproca en español. «Las personas» mantiene el valor genérico de οἱ ἄνθρωποι sin necesidad de nota, y «hagan ustedes lo mismo por ellas» reproduce de forma clara οὕτως καὶ ὑμεῖς ποιεῖτε αὐτοῖς.
