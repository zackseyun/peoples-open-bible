review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue fielmente la estructura y el sentido del hebreo: mandato a Jeroboam, fórmula profética, nombre divino Yahvé, despojo del reino de Salomón y entrega de diez tribus. También conserva bien la nota léxica sobre קְרָעִים. Sin embargo, ‘arrancando’ para קֹרֵעַ desplaza la imagen dominante del contexto, que es rasgar/desgarrar el manto y, por extensión, desgarrar el reino; ‘rasgando’ preserva mejor la coherencia simbólica del pasaje y la justificación léxica auditada.'
  spanish_quality_summary: El español es claro y digno. ‘Toma para ti’ suena algo literal pero aceptable. El principal ajuste de calidad/fidelidad es cambiar ‘estoy arrancando’ por ‘estoy rasgando’, que además enlaza mejor con ‘pedazos arrancados’/‘pedazos desgarrados’ en la nota. Conviene también ajustar la nota para reflejar de manera más precisa el campo semántico de ‘rasgar’.
  glossary_alignment: 'Buen alineamiento general con el glosario del proyecto: יְהוָה → ‘Yahvé’, אֱלֹהֵי יִשְׂרָאֵל → ‘el Dios de Israel’, הַמַּמְלָכָה → ‘el reino’, עֲשָׂרָה הַשְּׁבָטִים → ‘diez tribus’. El único desajuste relevante es קֹרֵעַ, donde ‘rasgando’ refleja mejor la raíz קרע y la acción simbólica de Ahías que ‘arrancando’.'
  issues:
  - severity: medium
    issue: ‘arrancando’ para קֹרֵעַ debilita la imagen de ‘rasgar’ presente en el signo profético.
    rationale: La raíz קרע se usa tanto para los ‘pedazos’ del manto como para ‘rasgar’ el reino. ‘Arrancar’ enfatiza extracción más que desgarro y rompe la cohesión léxica del pasaje.
  - severity: low
    issue: La nota al pie usa ‘pedazos arrancados’, que sería mejor armonizar con el motivo de desgarro.
    rationale: Dado que el hebreo apunta a piezas producidas por rasgar, ‘pedazos rasgados’ o ‘pedazos desgarrados’ conecta mejor con la acción simbólica y con la revisión del verbo principal.
  revised_spanish_text: 'Y le dijo a Jeroboam[a]: «Toma para ti diez pedazos, porque así dice Yahvé, el Dios de Israel: “Mira, estoy rasgando el reino de la mano de Salomón, y te daré diez tribus”».'
  revised_footnotes:
  - marker: a
    text: O «diez pedazos rasgados». El sustantivo hebreo se refiere a fragmentos producidos por un desgarro, en consonancia con el gesto simbólico de Ahías con el manto.
    reason: lexical_alternative
  revision_rationale: Se reemplaza ‘arrancando’ por ‘rasgando’ para preservar con mayor precisión la raíz hebrea קרע y la coherencia simbólica con los pedazos del manto. También se ajusta la nota al pie para reflejar el mismo campo semántico de desgarro.
