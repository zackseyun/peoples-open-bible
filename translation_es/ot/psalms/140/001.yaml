translation:
  language: es
  text: Para el director del coro[a]. Salmo de David.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «por David» o «para David»; el encabezado hebreo puede indicar autoría, asociación o dedicación.
    reason: alternative_reading
lexical_decisions:
- source_word: לַמְנַצֵּחַ
  english_pob_choice: For the choirmaster
  chosen_spanish: Para el director del coro
  alternatives_spanish:
  - Para el maestro de coro
  - Para el líder musical
  - Para el jefe de los músicos
  lexicon: HALOT
  rationale: En los encabezados de los salmos, el término indica a la persona encargada de la ejecución musical. En español, «director del coro» comunica esa función con naturalidad y sin recurrir a un calco arcaizante como «jefe de los músicos».
- source_word: מִזְמוֹר
  english_pob_choice: A psalm
  chosen_spanish: Salmo
  alternatives_spanish:
  - Un salmo
  - Canto
  - Melodía
  lexicon: HALOT
  rationale: El sustantivo funciona aquí como rótulo de género. En un encabezado breve en español, «Salmo» transmite de forma clara y estándar la categoría literaria.
- source_word: לְדָוִד
  english_pob_choice: of David
  chosen_spanish: de David
  alternatives_spanish:
  - por David
  - para David
  - perteneciente a David
  lexicon: HALOT
  rationale: La preposición ל en los encabezados de salmos puede indicar autoría, asociación o dedicación. «De David» conserva esa ambigüedad mejor que una opción más específica como «por David» o «para David».
theological_decisions:
- issue: Relación del encabezado con David
  english_pob_reading: of David
  chosen_spanish_reading: de David
  alternative_spanish_readings:
  - por David
  - para David
  rationale: El hebreo no obliga a decidir entre autoría estricta, pertenencia o dedicación. Mantener «de David» preserva la tensión interpretativa documentada por la POB inglesa y evita afirmar más de lo que el texto exige.
  doctrine_reference: Preservar la ambigüedad del encabezado sin resolverla interpretativamente.
translation_notes:
  revision_awareness: El borrador sigue el estado revisado de la POB inglesa, que mantuvo sin cambios la solución «For the choirmaster. A psalm of David.» tras un control cruzado de alta concordancia. No se introducen cambios interpretativos adicionales.
  spanish_consistency_notes:
  - Se evita «SEÑOR» porque el hebreo aquí no contiene el nombre divino.
  - Se usa «Salmo» como rótulo de género, no como parte de una paráfrasis.
  - La nota al pie conserva la ambigüedad del encabezado davidico documentada en el audit trail inglés.
