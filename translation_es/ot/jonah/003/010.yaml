translation:
  language: es
  text: Cuando Dios vio sus hechos, que se habían apartado de su mal camino[a], Dios desistió[b] de la calamidad[c] que había dicho que les haría, y no la hizo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O «sus obras». El hebreo usa «camino» en singular con sentido colectivo: la conducta de ellos.'
    reason: lexical_alternative
  - marker: b
    text: O «cambió de parecer». El hebreo «relentió» describe la respuesta de Dios al arrepentimiento de Nínive sin implicar error, pecado o ignorancia en Dios.
    reason: theological_note
  - marker: c
    text: El hebreo usa la misma palabra tanto en «su mal camino» como aquí. En la primera instancia significa mal moral; aquí se refiere a calamidad o juicio anunciado.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּרְא
  english_pob_choice: saw
  chosen_spanish: vio
  alternatives_spanish:
  - miró
  - tomó nota de
  lexicon: HALOT
  rationale: ראיה en la narración indica percepción directa. «Vio» conserva la sencillez del hebreo y corresponde naturalmente al valor narrativo del verbo.
- source_word: מַעֲשֵׂיהֶם
  english_pob_choice: their deeds
  chosen_spanish: sus obras
  alternatives_spanish:
  - sus hechos
  - lo que hicieron
  lexicon: HALOT
  rationale: מַעֲשִׂים denota acciones u obras. «Obras» mantiene el peso moral del término y es idiomático en español bíblico sin volverse excesivamente técnico.
- source_word: כִּי שָׁבוּ
  english_pob_choice: that they had turned
  chosen_spanish: que se habían apartado
  alternatives_spanish:
  - que se habían vuelto
  - porque se apartaron
  lexicon: HALOT
  rationale: שׁוּב expresa volverse o apartarse. Aquí el contexto de arrepentimiento y cambio de conducta favorece «se habían apartado», que comunica el giro desde su conducta anterior sin perder la imagen direccional.
- source_word: מִדַּרְכָּם הָרָעָה
  english_pob_choice: from their evil way
  chosen_spanish: de su mal camino
  alternatives_spanish:
  - de sus malos caminos
  - de su camino malo
  lexicon: HALOT
  rationale: El hebreo usa un singular colectivo («camino»). «Mal camino» preserva esa imagen y distingue el valor moral de רָעָה aquí, sin introducir un plural que suavice la metáfora.
- source_word: וַיִּנָּחֶם
  english_pob_choice: relented
  chosen_spanish: se compadeció
  alternatives_spanish:
  - se arrepintió
  - cambió de parecer
  - se retractó
  lexicon: HALOT
  rationale: נחם aquí describe la respuesta divina ante el cambio de conducta de Nínive. En español, «se compadeció» comunica la retirada de la calamidad de modo reverente, sin sugerir pecado o error en Dios. Mantiene la tensión teológica documentada por la POB, aunque con un matiz más afectivo que «relented».
- source_word: עַל הָרָעָה
  english_pob_choice: concerning the disaster
  chosen_spanish: de la calamidad
  alternatives_spanish:
  - respecto del desastre
  - acerca de la desgracia
  lexicon: HALOT
  rationale: רָעָה aquí no es mal moral en Dios, sino calamidad anunciada. «Calamidad» evita ambigüedad teológica y traduce adecuadamente el referente contextual.
- source_word: אֲשֶׁר דִּבֶּר לַעֲשׂוֹת לָהֶם
  english_pob_choice: that he had spoken to bring on them
  chosen_spanish: que había dicho que les haría
  alternatives_spanish:
  - que había anunciado hacerles
  - que había hablado para hacerles
  lexicon: HALOT
  rationale: דִּבֶּר + לַעֲשׂוֹת expresa lo anunciado/amenazado por Dios. «Había dicho que les haría» sigue de cerca la estructura y conserva la idea de una acción declarada previamente.
- source_word: וְלֹא עָשָׂה
  english_pob_choice: and he did not do it
  chosen_spanish: y no la hizo
  alternatives_spanish:
  - y no lo hizo
  - y no la llevó a cabo
  lexicon: HALOT
  rationale: El objeto tácito remite a la calamidad recién mencionada; en español, el femenino «la» concuerda con «calamidad» y evita repetir el sustantivo, conservando la tersura del hebreo.
- source_word: הָאֱלֹהִים
  english_pob_choice: God
  chosen_spanish: Dios
  alternatives_spanish:
  - el Dios
  - el Señor
  lexicon: HALOT
  rationale: אֱלֹהִים designa aquí al Dios de Israel. «Dios» es la equivalencia directa y estándar, sin necesidad de sustitución litúrgica.
theological_decisions:
- issue: Tensión teológica en וַיִּנָּחֶם aplicado a Dios
  english_pob_reading: Rendered as 'God relented' rather than 'God repented' or 'changed his mind.'
  chosen_spanish_reading: «Dios se compadeció» en lugar de «Dios se arrepintió» o «Dios cambió de parecer».
  alternative_spanish_readings:
  - Dios se arrepintió
  - Dios cambió de parecer
  - Dios se retractó
  rationale: El hebreo presenta una respuesta real de Dios al arrepentimiento de Nínive, pero la traducción no debe sugerir culpa, ignorancia o error divinos. «Se compadeció» preserva la retirada de la amenaza y evita una lectura moralmente inapropiada; la tensión queda documentada en la decisión léxica.
  doctrine_reference: 'Translation philosophy §3: preservar la tensión teológica sin resolverla artificialmente.'
- issue: Sentido doble de רָעָה
  english_pob_reading: First occurrence rendered morally ('evil way'); second occurrence rendered as calamity/judgment ('disaster').
  chosen_spanish_reading: 'Primera aparición: «mal camino»; segunda: «calamidad».'
  alternative_spanish_readings:
  - malo ... maldad
  - camino malo ... desastre
  - maldad ... desastre
  rationale: El mismo lexema hebreo funciona con sentidos distintos según el contexto inmediato. En la primera instancia describe conducta moral; en la segunda, la amenaza de juicio. Mantener esa diferencia evita confundir el mal moral de Nínive con la acción punitiva anunciada por Dios.
  doctrine_reference: 'Translation philosophy §5: conservar o documentar las diferencias contextuales de términos clave.'
translation_notes:
  revision_awareness: 'Se siguió el estado más reciente del expediente: sin revisiones aplicadas y con alto acuerdo entre controles. La redacción española conserva la tensión de נחם, pero adapta el verbo al español con un matiz reverente y natural.'
  spanish_consistency_notes:
  - Se mantiene «Dios» para אֱלֹהִים, sin convertirlo en «Señor».
  - Se conserva el singular metafórico «camino» para דַּרְכָּם.
  - «Calamidad» se usa para la segunda רָעָה y no para la primera, donde domina el valor moral.
  - El referente anafórico de «la» en la última cláusula apunta a la calamidad anunciada.
