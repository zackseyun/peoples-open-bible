review_pass:
  verdict: revise
  source_alignment_summary: 'La cláusula de propósito «לִהְיוֹת ... מִבְטַחֶךָ» está bien reflejada con «Para que tu confianza esté en Yahvé». También se preservan correctamente «Yahvé» por יהוה y «hoy» por הַיּוֹם. Sin embargo, el borrador no sigue bien la revisión auditada del inglés en הוֹדַעְתִּיךָ: añadió «lo», aunque la versión inglesa revisada quitó el objeto explícito porque no está en el hebreo. Además, אַף אָתָּה se expresa de manera demasiado interpretativa con «sí, a ti mismo»; el hebreo enfatiza al destinatario, mejor con «aun a ti» o similar.'
  spanish_quality_summary: El español es generalmente claro, pero «te lo he dado a conocer» suena algo pesado y además introduce un objeto no expresado. «Sí, a ti mismo» no suena natural ni precisa en este contexto sapiencial; parece énfasis conversacional moderno más que refuerzo solemne. Una formulación más fiel y legible sería «te he hecho saber hoy, aun a ti» o «te he dado a conocer hoy, aun a ti».
  glossary_alignment: 'Alineación correcta en el nombre divino: יהוה → «Yahvé». No hay otros términos de glosario mayor en disputa. La decisión sobre el objeto implícito debe ajustarse a la auditoría inglesa revisada: no conviene suministrar «lo» en el texto principal; puede explicarse en nota.'
  issues:
  - severity: high
    issue: Se añadió un objeto explícito («lo») en הוֹדַעְתִּיךָ
    rationale: 'La revisión auditada en inglés eliminó «them» porque el objeto no está en el hebreo. El español puede funcionar sin objeto directo expreso: «te he hecho saber» o «te he dado a conocer».'
  - severity: medium
    issue: «Sí, a ti mismo» no refleja bien אַף אָתָּה
    rationale: El hebreo usa una partícula enfática más pronombre independiente para enfatizar al destinatario. «Sí» es una marca discursiva poco precisa aquí, y «a ti mismo» suena innecesariamente reflexivo. «Aun a ti» o «incluso a ti» conserva mejor el valor enfático.
  - severity: low
    issue: La nota al pie debe armonizarse con el texto revisado
    rationale: Si el texto principal ya no incluye «lo», la nota debe explicar que el hebreo no expresa objeto directo y que este queda implícito por el contexto, sin defender una adición en el cuerpo del versículo.
  revised_spanish_text: Para que tu confianza esté en Yahvé, te he hecho saber[a] hoy, aun a ti.
