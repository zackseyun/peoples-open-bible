translation:
  language: es
  text: Hay un tratado[a] entre tú y yo, y entre mi padre y tu padre. Mira, te he enviado plata y oro. Ve, rompe tu tratado con Baasa, rey de Israel[b], para que él se aparte de mí.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'pacto' o 'alianza' para בְּרִית; aquí se trata de un acuerdo político entre reyes.
    reason: lexical_alternative
  - marker: b
    text: Literalmente, 'y él suba de sobre mí'; el modismo probablemente significa que Baasa retiraría su presión o acción militar de Asa.
    reason: lexical_alternative
lexical_decisions:
- source_word: בְּרִית
  english_pob_choice: treaty
  chosen_spanish: pacto
  alternatives_spanish:
  - tratado
  - alianza
  - covenio
  lexicon: HALOT
  rationale: En español, 'pacto' comunica bien el acuerdo formal entre reyes sin cargar de forma innecesaria hacia un tecnicismo diplomático moderno ni hacia un registro eclesiástico. Mantiene la amplitud semántica de בְּרִית y deja abierta la tensión entre acuerdo político y formulación solemne.
- source_word: בֵּינִי וּבֵינֶךָ וּבֵין אָבִי וּבֵין אָבִיךָ
  english_pob_choice: between me and you, and between my father and your father
  chosen_spanish: entre tú y yo, y entre mi padre y tu padre
  alternatives_spanish:
  - entre mí y ti, y entre mi padre y tu padre
  - entre nosotros y nuestros padres
  lexicon: HALOT
  rationale: Conservo la repetición de 'entre' y el paralelismo diplomático del hebreo. 'Tú y yo' suena natural en español y preserva la relación bilateral explícita del texto.
- source_word: הִנֵּה
  english_pob_choice: Look
  chosen_spanish: Mira
  alternatives_spanish:
  - Mira, pues
  - He aquí
  - Observa
  lexicon: HALOT
  rationale: '''Mira'' conserva el valor deíctico e introductorio de הִנֵּה en un registro moderno y digno. Evita el arcaísmo de ''he aquí'' sin perder la fuerza de llamada de atención.'
- source_word: שָׁלַחְתִּי לְךָ כֶּסֶף וְזָהָב
  english_pob_choice: I have sent you silver and gold
  chosen_spanish: te he enviado plata y oro
  alternatives_spanish:
  - te he mandado plata y oro
  - he enviado para ti plata y oro
  lexicon: HALOT
  rationale: '''Plata y oro'' reproduce literalmente los bienes enviados. El perfecto español ''te he enviado'' conserva el valor de acción ya realizada con relevancia presente, como en la carta/diplomacia del contexto.'
- source_word: לֵךְ
  english_pob_choice: Go
  chosen_spanish: Ve
  alternatives_spanish:
  - Anda
  - Vete
  lexicon: HALOT
  rationale: '''Ve'' sigue la orden directa del hebreo con brevedad y naturalidad. ''Vete'' podría sugerir alejamiento físico más fuerte del que exige el contexto.'
- source_word: הָפֵר
  english_pob_choice: break
  chosen_spanish: rompe
  alternatives_spanish:
  - anula
  - deja sin efecto
  - quebranta
  lexicon: HALOT
  rationale: '''Rompe'' comunica con fuerza la nulificación de un pacto en español corriente y mantiene el carácter performativo del imperativo. ''Anula'' sería más jurídico, pero menos enérgico.'
- source_word: בְּרִיתְךָ אֶת־בַּעְשָׁא
  english_pob_choice: your treaty with Baasha
  chosen_spanish: tu pacto con Baasa
  alternatives_spanish:
  - tu tratado con Baasa
  - tu alianza con Baasa
  - tu convenio con Baasa
  lexicon: HALOT
  rationale: Repito 'pacto' para mantener la correspondencia con בְּרִית y la unidad terminológica dentro del versículo. 'Baasa' sigue la forma habitual en español bíblico, y la preposición 'con' expresa la relación pactada de manera natural.
- source_word: וְיַעֲלֶה מֵעָלַי
  english_pob_choice: so that he may withdraw from me
  chosen_spanish: para que él se aparte de mí
  alternatives_spanish:
  - para que se retire de mí
  - para que se aleje de mí
  - para que suba de sobre mí
  lexicon: HALOT
  rationale: El hebreo usa una idiomática 'subir de sobre mí', que en contexto significa cesar la presión o la agresión. 'Se aparte de mí' comunica ese sentido sin ocultar la tensión idiomática, aunque mantiene en español una lectura más general que la imagen original.
- source_word: מֶלֶךְ יִשְׂרָאֵל
  english_pob_choice: king of Israel
  chosen_spanish: rey de Israel
  alternatives_spanish:
  - monarca de Israel
  lexicon: HALOT
  rationale: '''Rey de Israel'' es la equivalencia directa y más transparente para el título regio del hebreo.'
theological_decisions:
- issue: bְּרִית como pacto político y no como lenguaje cultual exclusivo
  english_pob_reading: treaty; the context is a political pact between kings
  chosen_spanish_reading: pacto político entre reyes
  alternative_spanish_readings:
  - alianza
  - tratado
  - covenio
  rationale: 'El contexto no es litúrgico sino diplomático: Asa intenta desviar la presión militar mediante un acuerdo entre monarcas. ''Pacto'' en español conserva la solemnidad y evita forzar el texto hacia un tecnicismo estrictamente jurídico o eclesiástico.'
  doctrine_reference: Uso contextual de בְּרִית en historia narrativa; no es un término doctrinal aquí.
- issue: וְיַעֲלֶה מֵעָלַי como retirada de presión hostil
  english_pob_reading: so that he may withdraw from me
  chosen_spanish_reading: para que él se aparte de mí
  alternative_spanish_readings:
  - para que se retire de mí
  - para que se aleje de mí
  - para que suba de sobre mí
  rationale: La imagen hebrea puede leerse literalmente como 'subir de sobre mí', pero el sentido contextual es la cesación de hostilidad o presión militar. 'Se aparte de mí' mantiene esa orientación sin introducir una explicación interpretativa excesiva en el cuerpo del texto.
  doctrine_reference: Exégesis narrativa e idiomática; no implica cuestión doctrinal directa.
translation_notes:
  revision_awareness: Se revisó el equilibrio entre transparencia y naturalidad a la luz del audit trail inglés. El punto principal fue decidir entre un término diplomático más técnico ('tratado') y uno más amplio y bíblicamente resonante ('pacto'); también se preservó la fuerza idiomática de 'subir de sobre mí' en una nota, aunque en el texto principal se optó por una formulación española más natural.
  spanish_consistency_notes:
  - 'Se mantuvo un solo término principal para בְּרִית en todo el versículo: ''pacto''.'
  - Se conservó el paralelismo repetido de 'entre' para reflejar la estructura hebrea.
  - Se usó 'Baasa' para la transliteración coherente con el uso bíblico en español.
  - La nota de pie marca la tensión entre literalidad idiomática y claridad contextual en la cláusula final.
