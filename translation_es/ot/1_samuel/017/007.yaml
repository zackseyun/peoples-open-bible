translation:
  language: es
  text: El asta de su lanza era como una viga de tejedor; y la cabeza de hierro de su lanza pesaba seiscientos siclos; y el portador del escudo[a] iba delante de él.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «gran escudo»; el término hebreo puede denotar un escudo de cuerpo completo, no un broquel pequeño.
    reason: lexical_alternative
lexical_decisions:
- source_word: חץ
  english_pob_choice: shaft
  chosen_spanish: asta
  alternatives_spanish:
  - mango
  - asta de madera
  - palo
  lexicon: HALOT
  rationale: En este contexto, el término designa la parte larga de la lanza, no una flecha. «Asta» comunica la pieza alargada del arma con naturalidad en español y preserva la imagen de un objeto pesado y largo.
- source_word: חֲנִיתוֹ
  english_pob_choice: his spear
  chosen_spanish: su lanza
  alternatives_spanish:
  - su lanza de guerra
  - su pica
  lexicon: HALOT
  rationale: «Lanza» es el equivalente español más claro y fiel para el arma nombrada aquí. «Su» conserva el posesivo del hebreo.
- source_word: כִּ/מְנוֹר אֹֽרְגִ֔ים
  english_pob_choice: like a weaver’s beam
  chosen_spanish: como un rodillo de tejedor
  alternatives_spanish:
  - como la viga de un tejedor
  - como el travesaño de un telar
  lexicon: HALOT
  rationale: La comparación describe el grosor o la robustez del asta. «Rodillo de tejedor» intenta reflejar la imagen concreta sin imponer una reconstrucción técnica demasiado específica que el español no requiere.
- source_word: וְ/לַהֶבֶת חֲנִיתוֹ
  english_pob_choice: the iron head of his spear
  chosen_spanish: la cabeza de hierro de su lanza
  alternatives_spanish:
  - la punta de hierro de su lanza
  - la hoja de hierro de su lanza
  lexicon: HALOT
  rationale: «Lahebeth» señala la parte metálica prominente del arma. En español, «cabeza» comunica la pieza terminal de la lanza sin sugerir indebidamente una hoja como la de una espada.
- source_word: שֵׁשׁ מֵא֥וֹת שְׁקָלִ֖ים בַּרְזֶ֑ל
  english_pob_choice: weighed six hundred shekels
  chosen_spanish: pesaba seiscientos siclos
  alternatives_spanish:
  - era de seiscientos siclos
  - pesaba seiscientos siclos de hierro
  lexicon: HALOT
  rationale: El hebreo es elíptico; en español, «pesaba» expresa la relación de medida de manera natural. «Siclos» conserva la unidad antigua sin reinterpretarla.
- source_word: וְ/נֹשֵׂ֥א הַ/צִּנָּ֖ה
  english_pob_choice: the bearer of the shield
  chosen_spanish: el portador del escudo
  alternatives_spanish:
  - el que llevaba el escudo
  - el escudero
  lexicon: HALOT
  rationale: La estructura hebrea nombra a la persona por su función. «Portador del escudo» sigue de cerca esa construcción y evita matices ajenos que «escudero» podría introducir.
- source_word: הַ/צִּנָּ֖ה
  english_pob_choice: shield
  chosen_spanish: escudo
  alternatives_spanish:
  - gran escudo
  - escudo grande
  lexicon: HALOT
  rationale: El término puede referirse a un escudo de gran tamaño. En el texto principal, «escudo» mantiene legibilidad; la posible precisión de tamaño queda preservada en nota.
- source_word: הֹלֵ֥ךְ לְ/פָנָֽי/ו
  english_pob_choice: went before him
  chosen_spanish: iba delante de él
  alternatives_spanish:
  - caminaba delante de él
  - iba ante él
  lexicon: HALOT
  rationale: La construcción participial indica desplazamiento delante de Goliat. «Iba delante de él» es idiomático en español y mantiene la escena militar.
translation_notes:
  revision_awareness: 'Revisado contra el hebreo masorético (WLC) y el criterio inglés POB: se conserva la imagen comparativa del arma, se explicita la medida con una forma natural en español y se mantiene la ambigüedad de צנה en nota, como en el audit trail inglés.'
  spanish_consistency_notes:
  - Se usa «lanza» para חנית, en armonía con el contexto militar y con la elección inglesa «spear».
  - Se evita «SEÑOR» u otras sustituciones no pertinentes; el versículo no contiene el nombre divino.
  - Se conserva la unidad antigua «siclos» para evitar anacronismos y porque el texto fuente la presenta explícitamente.
  - La nota a cubre la misma tensión léxica que el original inglés preservó para צנה.
