translation:
  language: es
  text: Y ahora[a], Yahvé, tú eres Dios, y has hablado esta buena palabra acerca de tu siervo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «has hablado esta buena promesa acerca de tu siervo». El hebreo dice literalmente: «has hablado esta buena cosa acerca de tu siervo».'
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: Se conserva el nombre divino del pacto como forma transparente en español, siguiendo el criterio del proyecto para יְהוָה. 'SEÑOR' ocultaría el nombre propio; 'Jehová' no es la forma preferida del proyecto.
- source_word: וְעַתָּה
  english_pob_choice: And now
  chosen_spanish: Y ahora
  alternatives_spanish:
  - Ahora
  - Y entonces
  lexicon: HALOT
  rationale: La conjunción mantiene el enlace discursivo con la oración previa. 'Y ahora' reproduce mejor el giro retórico del hebreo que un simple 'Ahora'.
- source_word: אַתָּה הוּא הָאֱלֹהִים
  english_pob_choice: you are God
  chosen_spanish: tú eres Dios
  alternatives_spanish:
  - tú eres el Dios
  - tú mismo eres Dios
  lexicon: HALOT
  rationale: En español, 'tú eres Dios' expresa con naturalidad la confesión enfática del hebreo sin forzar el artículo. 'El Dios' sonaría menos idiomático aquí.
- source_word: וַתְּדַבֵּר
  english_pob_choice: you have spoken
  chosen_spanish: has hablado
  alternatives_spanish:
  - hablaste
  - has prometido
  lexicon: HALOT
  rationale: Se mantiene el acto de habla como hecho ya realizado con relevancia presente. 'Has prometido' interpreta el contenido; por eso queda fuera del texto principal.
- source_word: עַל
  english_pob_choice: concerning
  chosen_spanish: acerca de
  alternatives_spanish:
  - sobre
  - con respecto a
  lexicon: HALOT
  rationale: Con דִּבֵּר, עַל introduce el asunto del que se habla. 'Acerca de' es claro, natural y suficientemente formal en español.
- source_word: עַבְדְּךָ
  english_pob_choice: your servant
  chosen_spanish: tu siervo
  alternatives_spanish:
  - tu esclavo
  - tu servidor
  lexicon: HALOT
  rationale: En la oración dirigida a Dios, 'siervo' comunica la autodesignación humilde con mayor naturalidad que 'esclavo', aunque el campo léxico básico incluye servidumbre. 'Servidor' es posible pero menos estable en registro bíblico.
- source_word: הַטּוֹבָה הַזֹּאת
  english_pob_choice: this good thing
  chosen_spanish: esta buena cosa
  alternatives_spanish:
  - esta buena promesa
  - esta bondad
  lexicon: HALOT
  rationale: El hebreo dice literalmente 'esta buena [cosa]'. 'Cosa' conserva la literalidad que el audit trail inglés también preserva; 'promesa' sería una inferencia contextual, no el término explícito del hebreo.
theological_decisions:
- issue: Representación del nombre divino יהוה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Jehová
  rationale: El texto usa directamente el Tetragrámaton. Siguiendo la línea del proyecto, se translitera como 'Yahvé' para mantener visible el nombre del pacto y no sustituirlo por un título genérico.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Valor de הַטּוֹבָה הַזֹּאת
  english_pob_reading: this good thing
  chosen_spanish_reading: esta buena cosa
  alternative_spanish_readings:
  - esta buena promesa
  - esta bondad
  rationale: La hebrea no dice explícitamente 'promesa'. Aunque el contexto apunta a una promesa divina, el texto mantiene una expresión más general. La versión española conserva esa tensión para no sobreinterpretar.
  doctrine_reference: 'DOCTRINE.md: Translation method — preserve source-level ambiguity where the original is broader than the context'
translation_notes:
  revision_awareness: 'Se corrigió el fallo previo de validación: el marcador [a] ahora aparece exactamente en el texto español, anclado en «Y ahora[a]». No se añadieron notas sin ancla.'
  spanish_consistency_notes:
  - Se usa «Yahvé» de forma consistente para יְהוָה.
  - Se mantiene «Dios» para הָאֱלֹהִים en una confesión directa y singular.
  - Se conserva «siervo» como término de humildad en oración dirigida a Dios.
  - Se preserva la literalidad de «esta buena cosa» y se explica en nota la alternativa contextual «promesa».
