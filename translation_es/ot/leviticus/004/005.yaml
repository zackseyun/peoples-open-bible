revisions:
- from: Y el sacerdote ungido tomará parte de la sangre del toro y la llevará[a][b] al tabernáculo de reunión.
  to: Y el sacerdote ungido tomará[a] de la sangre del toro y la llevará[b] dentro de la tienda de reunión.
  rationale: Se ajusta «tabernáculo» a «tienda» para reflejar mejor אֹהֶל, se hace explícito el ingreso contextual con «dentro de», y se aligera «parte de la sangre» a «de la sangre» conservando la nota partitiva ya documentada por el POB inglés.
