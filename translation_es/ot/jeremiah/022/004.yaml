translation:
  language: es
  text: Porque si de veras hacéis este asunto[a], entonces entrarán por las puertas de esta casa reyes que se sientan sobre el trono de David, montando en carros y en caballos—él, sus esclavos[b] y su pueblo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «esta cosa» o «esta palabra». El hebreo דָּבָר puede referirse a una palabra, asunto o cosa.
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «él, sus esclavos y su pueblo», con pronombres singulares usados distributivamente después de «reyes».'
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי אִם
  english_pob_choice: For if
  chosen_spanish: Porque si
  alternatives_spanish:
  - Pues si
  - Porque sólo si
  lexicon: HALOT
  rationale: La combinación introduce una condición vinculada al mandato anterior. «Porque si» conserva la relación lógica y el tono de continuidad sin volver la frase artificial en español.
- source_word: עָשׂוֹ תַּעֲשׂוּ
  english_pob_choice: you truly do
  chosen_spanish: hacéis de veras
  alternatives_spanish:
  - hacéis en verdad
  - ciertamente hacéis
  lexicon: HALOT
  rationale: El infinitivo absoluto con verbo finito intensifica la acción. «De veras» comunica bien esa fuerza enfática en español moderno sin añadir paráfrasis excesiva.
- source_word: הַדָּבָר הַזֶּה
  english_pob_choice: this thing
  chosen_spanish: esta cosa
  alternatives_spanish:
  - este asunto
  - esta palabra
  lexicon: HALOT
  rationale: דָּבָר puede significar «palabra», «asunto» o «cosa». Aquí apunta al curso de conducta mandado; «esta cosa» mantiene el alcance amplio del hebreo y la correspondencia con la opción inglesa.
- source_word: וּבָאוּ
  english_pob_choice: will enter
  chosen_spanish: entrarán
  alternatives_spanish:
  - vendrán
  - entrarán a
  lexicon: HALOT
  rationale: Con «por las puertas de esta casa», el verbo expresa ingreso. «Entrarán» hace explícito ese movimiento en español natural.
- source_word: בְשַׁעֲרֵי הַבַּיִת הַזֶּה
  english_pob_choice: through the gates of this house
  chosen_spanish: por las puertas de esta casa
  alternatives_spanish:
  - por las puertas de este palacio
  - dentro de las puertas de esta casa
  lexicon: HALOT
  rationale: «Esta casa» refleja con fidelidad el hebreo y puede aludir al palacio/ casa real según el contexto. «Por las puertas» es la forma española natural para entrada a través de un acceso.
- source_word: מְלָכִים יֹשְׁבִים לְדָוִד עַל כִּסְאוֹ
  english_pob_choice: kings sitting on David’s throne
  chosen_spanish: reyes que se sientan sobre el trono de David
  alternatives_spanish:
  - reyes sentados sobre el trono de David
  - reyes que se sientan en el trono de David
  lexicon: HALOT
  rationale: La expresión describe sucesores dinásticos de David. «El trono de David» preserva el sentido real/dinástico sin cargar la frase con una lectura mesiánica no explícita en el versículo.
- source_word: רֹכְבִים בָּרֶכֶב וּבַסּוּסִים
  english_pob_choice: riding in chariots and on horses
  chosen_spanish: montando en carros y en caballos
  alternatives_spanish:
  - cabalgando en carros y en caballos
  - yendo en carros y en caballos
  lexicon: HALOT
  rationale: «Montando» transmite la imagen procesional con naturalidad; «carros» representa bien el singular colectivo hebreo, y «caballos» mantiene el paralelismo.
- source_word: הוּא וַעֲבָדָיו וְעַמּוֹ
  english_pob_choice: he, his servants, and his people
  chosen_spanish: él, sus siervos y su pueblo
  alternatives_spanish:
  - él, sus esclavos y su pueblo
  - él, sus servidores y su pueblo
  lexicon: HALOT
  rationale: El hebreo usa pronombres/posesivos singulares de modo distributivo después de «reyes». En español, «él» conserva el singular, mientras que «siervos» puede ser literal pero en español eclesial sería menos transparente que «siervos»; se mantiene la fuerza relacional del grupo asociado al rey.
theological_decisions:
- issue: Lectura dinástica de «el trono de David»
  english_pob_reading: Render as a promise of continuing Davidic succession without importing later messianic interpretation into the verse itself.
  chosen_spanish_reading: Presentar la frase como sucesión real davídica, sin imponer una lectura mesiánica directa al versículo.
  alternative_spanish_readings:
  - Hacerla explícitamente mesiánica
  - Traducirla como «descendientes de David»
  rationale: El contexto inmediato trata de la continuidad histórica de la monarquía davídica condicionada por la obediencia. La traducción conserva esa tensión histórica-teológica y no resuelve anticipadamente el alcance mesiánico.
  doctrine_reference: Preservar la tensión textual; primacía del fuente original sobre la tradición interpretativa.
- issue: Valor distributivo de la referencia singular final
  english_pob_reading: The singular pronoun is preserved distributively after the plural noun 'kings.'
  chosen_spanish_reading: Mantener «él» para reflejar el singular distributivo del hebreo tras el plural «reyes».
  alternative_spanish_readings:
  - «ellos, sus siervos y su pueblo»
  - reformular en plural para concordancia estilística
  rationale: El hebreo alterna plural y singular con valor distributivo. Conservar «él» evita borrar un rasgo gramatical documentado y sigue el ajuste revisado en el audit trail inglés.
  doctrine_reference: Atención al detalle gramatical del original; no armonizar indebidamente el número.
translation_notes:
  revision_awareness: La redacción sigue de cerca el texto hebreo y el audit trail inglés revisado, especialmente en la intensificación verbal, la elección de «casa» para בַּיִת y la conservación del singular distributivo final («él»). Se evitó resolver el matiz dinástico en clave mesiánica, en línea con el contexto inmediato y con la revisión inglesa más reciente.
  spanish_consistency_notes:
  - Se usa «Yahvé» en este proyecto cuando aparece el nombre divino; aquí no aparece.
  - Se mantuvo «trono de David» como expresión dinástica estable sin sustituirla por formulaciones interpretativas.
  - «Siervos» se emplea para עֲבָדָיו porque en este contexto designa la casa/entorno del rey; «esclavos» sería más duro y menos natural en español sin una ganancia semántica clara.
