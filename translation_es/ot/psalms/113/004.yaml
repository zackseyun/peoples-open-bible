- from: Yahvé es alto sobre todas las naciones; su gloria está sobre los cielos.
  to: Yahvé es exaltado sobre todas las naciones; su gloria está sobre los cielos.
  rationale: Se ajusta רָם de «es alto» a «es exaltado» para reflejar mejor el tono poético y la supremacía de Yahvé en español natural y digno, sin alterar el sentido ni la estructura paralela del versículo.
