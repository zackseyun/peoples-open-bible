base_translation:
  language: en
  yaml_path: translation/ot/nehemiah/003/034.yaml
  text: And he said before his brothers and the army of Samaria[a], and said, “What are these feeble Jews doing? Will they restore it for themselves? Will they sacrifice? Will they finish in a day? Will they revive the stones from the heaps of dust, though they are burned?”
  footnotes:
