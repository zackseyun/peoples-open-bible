    rationale: ‘hicieron conforme a lo que les había ordenado’ no refleja con suficiente cercanía el sencillo ‘did as ... instructed them’ y añade un pluscuamperfecto ausente del griego.
  - severity: medium
    issue: Concordancia y agencia de συνέταξεν insuficientemente transparentes
    rationale: El sujeto incluye a Joakim y al consejo; en español conviene expresar ‘como ... les instruyeron/ordenaron’ para mostrar claramente la relación entre los sujetos y la acción.
  - severity: low
