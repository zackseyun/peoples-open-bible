lexical_decisions:
- source_word: בִּנְיָמִן
  english_pob_choice: Benjamin
  chosen_spanish: Benjamín
  alternatives_spanish:
  - Benjamin
  lexicon: HALOT
  rationale: Nombre propio de persona y tribu; se translitera al español con la forma habitual Benjamín. El contexto genealógico exige suplir la relación implícita como «Los hijos de» para expresar con naturalidad el sentido del hebreo elíptico.
- source_word: בֶּלַע
  english_pob_choice: Bela
  chosen_spanish: Bela
  alternatives_spanish:
  - Béla
  lexicon: HALOT
  rationale: Nombre propio; se conserva la transliteración directa y breve, como en el contexto inglés auditado.
- source_word: בֶּכֶר
  english_pob_choice: Beker
  chosen_spanish: Becér
  alternatives_spanish:
  - Beker
  - Bequer
  lexicon: HALOT
  rationale: Nombre propio. Se prefiere una forma que refleje más de cerca las consonantes hebreas y que evite la grafía inglesa tradicional «Becher». La acentuación final ayuda a la lectura española sin alterar la identificación del nombre.
- source_word: יְדִיעֲאֵל
  english_pob_choice: Jediael
  chosen_spanish: Yedíael
  alternatives_spanish:
  - Jediael
  - Yediael
  lexicon: HALOT
  rationale: Nombre propio; se opta por una transliteración transparente desde el hebreo, manteniendo la vocalización aproximada y la secuencia consonántica. «Y» inicial conserva mejor la relación con la forma hebrea que la adaptación inglesa con J.
- source_word: שְׁלֹשָׁה
  english_pob_choice: three
  chosen_spanish: tres
  alternatives_spanish:
  - tres
  lexicon: HALOT
  rationale: Cardinal resumidor del total de los nombres enumerados; se traduce de manera directa como «tres».
- source_word: '[implicit genealogical heading]'
  english_pob_choice: 'The sons of Benjamin:'
  chosen_spanish: 'Los hijos de Benjamín:'
  alternatives_spanish:
  - 'Benjamín:'
  lexicon: HALOT
  rationale: El hebreo es nominal y elíptico; en español conviene explicitar la relación genealógica para que la cláusula sea natural y fiel al sentido.
theological_decisions:
