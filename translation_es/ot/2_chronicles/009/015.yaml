review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura y el sentido básico del hebreo: Salomón hizo doscientos escudos grandes de oro batido, y una cantidad de oro por escudo se expresa distributivamente. También preserva correctamente la nota sobre la unidad de peso implícita. Sin embargo, la cláusula verbal ''iban sobre'' suena poco natural en español para יַעֲלֶה עַל y debilita la claridad del dato de inventario; conviene una formulación más idiomática que siga siendo fiel al hebreo.'
  spanish_quality_summary: La redacción general es clara y digna, con buena terminología bíblica ('oro batido', 'siclos'). El principal problema es de naturalidad y precisión idiomática en 'iban sobre cada escudo', que en español suena forzado. Además, la nota al pie tiene una pequeña aspereza sintáctica en 'el uno escudo'; puede mejorarse manteniendo el carácter literal.
  glossary_alignment: No hay términos del glosario teológico principal en juego. 'Grandes escudos' para צִנָּה y 'oro batido' para זָהָב שָׁחוּט están bien alineados con las decisiones documentadas. 'Siclos' es adecuado para la unidad implícita.
  issues:
  - severity: medium
    issue: '''iban sobre cada escudo'' es una expresión poco idiomática en español'
    rationale: Aunque intenta conservar el matiz de יַעֲלֶה עַל ('went onto'), en español moderno suena torpe en un contexto de manufactura/inventario. 'Se usaban para cada escudo' o 'se aplicaban a cada escudo' comunica mejor el sentido sin sobreinterpretar 'cover'.
  - severity: low
    issue: 'La nota literal usa una frase española poco natural: ''el uno escudo'''
    rationale: Como glosa literal puede tolerarse cierta rigidez, pero 'el un escudo' o una reformulación mínima representa mejor la literalidad sin introducir un español defectuoso innecesario.
  revised_spanish_text: El rey Salomón hizo doscientos grandes escudos de oro batido[a]; seiscientos siclos de oro batido se usaban para cada escudo.
  revised_footnotes:
  - marker: a
    text: 'Literalmente: «seiscientos de oro batido subían sobre el un escudo». El hebreo implica una medida de peso; «siclos» se añade en español para mayor claridad.'
    reason: lexical_alternative
