review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador conserva bien el sentido básico del hebreo: lamento directo a Dios, rechazo divino y ausencia con los ejércitos. Sin embargo, «¿No es así, oh Dios, que...?» no refleja con naturalidad ni precisión la fuerza de הֲלֹא + pronombre («¿No... tú...?» / «¿No eres tú...?») y debilita la pregunta retórica unificada que el inglés auditado restauró. Además, falta la nota para la alternativa documentada «and do not go out».'
  spanish_quality_summary: 'El español actual suena forzado y poco idiomático en un salmo: «¿No es así... que nos has rechazado...?» es una calca discursiva poco natural. Una formulación más clara y digna es «¿No eres tú, oh Dios, quien nos ha rechazado, y no sales...?» o similar. También conviene conservar ambas notas del inglés POB y anclar los marcadores correctamente.'
  glossary_alignment: No hay conflicto con la terminología base del proyecto. «Dios» para אֱלֹהִים y «ejércitos» para צְבָאוֹת son adecuados. «Rechazado» preserva bien זנח. «Sales» es aceptable para תצא, con nota cultural militar. La repetición de «oh Dios» debe mantenerse por fidelidad al hebreo.
  issues:
  - severity: medium
    issue: 'Apertura interrogativa poco fiel y poco natural: «¿No es así... que...?»'
    rationale: הֲלֹא introduce una pregunta retórica de confirmación; aquí, con אַתָּה, el hebreo enfatiza «tú». «¿No es así... que...?» suena indirecto, debilita el énfasis y resulta menos natural en español bíblico contemporáneo.
  - severity: medium
    issue: Falta la nota equivalente a la nota inglesa c sobre «y no sales / y ¿no sales?»
    rationale: El expediente inglés preserva una alternativa de traducción previa para la segunda cláusula. Esa información auditada debe mantenerse también en español, especialmente porque la sintaxis interrogativa en español puede resolverse de más de una manera natural.
  - severity: low
    issue: Puntuación del vocativo mejorable
    rationale: 'En español es más natural aislar el vocativo con comas: «oh Dios». Esto mejora la legibilidad sin alterar el sentido.'
  revised_spanish_text: ¿No eres tú, oh Dios, quien nos ha rechazado,[a] y no sales, oh Dios,[c][b] con nuestros ejércitos?
  revised_footnotes:
