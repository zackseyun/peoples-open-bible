    reason: lexical_alternative
  - marker: b
    text: Or 'to the poor' or 'to the afflicted'; the Hebrew term can denote those who are lowly in status or circumstance, though here 'humble' best fits the contrast with 'scoffers.'
    reason: lexical_alternative
  - marker: c
    text: Or 'grace.'
    reason: lexical_alternative
