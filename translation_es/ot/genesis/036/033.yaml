- from: Bela murió[a], y Jobab, hijo de Zérah, de Bosra, reinó en su lugar.
  to: Bela murió, y Jobab hijo de Zerah, de Bozra[a], reinó en su lugar.
  rationale: Se corrige el anclaje de la nota para que corresponda a מִבָּצְרָה y se restablece una alternativa real entre el texto principal y la nota, conforme al audit trail inglés. También se mejora la consistencia de transliteración y la naturalidad del español con ajustes menores de nombre y puntuación.
