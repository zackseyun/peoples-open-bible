base_translation:
  language: en
  yaml_path: translation/ot/isaiah/008/014.yaml
  text: And he will become a sanctuary[a], and a stone of stumbling and a rock of offense to both houses of Israel[b], a trap and a snare to the inhabitant of Jerusalem.
  footnotes:
  - marker: a
    text: Or 'a stone of stumbling'; the Hebrew phrase אֶבֶן נֶגֶף overlaps with later biblical 'stumbling stone' language, but here 'to strike against' helps distinguish it from the next phrase, which explicitly speaks of stumbling.
    reason: lexical_alternative
  - marker: b
    text: Or 'for those who dwell in Jerusalem.' The Hebrew uses a singular participle with collective force.
    reason: lexical_alternative
