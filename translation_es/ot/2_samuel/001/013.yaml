  rationale: Se reemplazó «que le había dado el informe» por «que le había informado» para evitar un tono burocrático y acercarse más al valor narrativo de הַמַּגִּיד לוֹ. Se cambió «forastero amalecita» por «extranjero residente amalecita» para reflejar mejor גֵּר según el audit trail inglés y la nota lexical. La nota se ajustó para conservar la alternativa interpretativa de la frase hebrea con mejor español y mayor precisión.
