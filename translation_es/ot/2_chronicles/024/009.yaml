revisions:
- from: Y proclamaron en Judá y en Jerusalén que trajeran a Yahvé la contribución de Moisés, el siervo de Dios, para Israel[a], en el desierto.
  to: Y proclamaron en Judá y en Jerusalén que llevaran a Yahvé el tributo[a] de Moisés, siervo de Dios, para Israel en el desierto.
  rationale: Se cambia «contribución» por «tributo» para reflejar mejor el matiz de מַשְׂאַת como aporte exigido, en línea con la auditoría inglesa. Se simplifica la apposición a «Moisés, siervo de Dios» y se mantiene «para Israel en el desierto» sin coma para reducir ambigüedad y seguir más de cerca la estructura fuente. «Llevaran» suena ligeramente más natural que «trajeran» tras una proclamación pública, sin alterar el sentido.
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T22:10:49Z'
review_pass:
  verdict: revise
  source_alignment_summary: El borrador español transmite bien la proclamación pública, el alcance geográfico, el propósito de traer algo a Yahvé y el marco mosaico en el desierto. Sin embargo, «contribución» debilita el valor de מַשְׂאַת como aporte tasado/exigido, y la puntuación actual con «para Israel[a], en el desierto» puede hacer que «en el desierto» modifique a Israel en vez de al encargo mosaico. También conviene evitar que la nota diga «ofrenda» como si fuera el sentido principal no marcado.
  spanish_quality_summary: El español es claro y natural, pero puede afinarse para mayor precisión bíblica y mejor fluidez. «Proclamaron» funciona bien. «Tributo» en este contexto expresa mejor una exacción/importe requerido que «contribución», sin necesidad de sonar fiscal-moderno si se matiza en nota. Reubicar «en el desierto» junto a «Moisés, siervo de Dios» mejora la lectura.
  glossary_alignment: 'Alineado con la política del proyecto en «Yahvé». «Siervo de Dios» es apropiado para עֶבֶד en esta fórmula honorífica. El punto principal de desalineación es מַשְׂאַת: el audit trail favorece «levy», y en español «tributo» refleja mejor una contribución impuesta que «contribución» a secas.'
  issues:
  - severity: medium
    issue: מַשְׂאַת se vierte como «contribución»
    rationale: El hebreo y la auditoría inglesa apuntan a una aportación tasada o exigida. «Contribución» es posible, pero en español tiende a sonar demasiado voluntaria o general; «tributo» preserva mejor el matiz obligatorio.
  - severity: medium
    issue: La colocación de «en el desierto» crea ambigüedad sintáctica
    rationale: En «para Israel[a], en el desierto», el complemento final puede leerse como si describiera a Israel o el acto de traer. Es preferible colocarlo junto a la referencia mosaica para reflejar mejor el hebreo.
  - severity: low
    issue: La nota al pie prioriza «ofrenda» en la explicación
    rationale: La explicación «ofrenda o cuota evaluada y exigida» puede inclinar la comprensión hacia una ofrenda general. La nota auditada resalta un aporte tasado/impuesto; conviene mantener ese enfoque más de cerca.
  revised_spanish_text: Y proclamaron en Judá y en Jerusalén que llevaran a Yahvé el tributo[a] de Moisés, siervo de Dios, para Israel en el desierto.
  revised_footnotes:
  - marker: a
    text: O «la contribución» o «el impuesto» de Moisés, siervo de Dios. El término hebreo se refiere a un aporte tasado o exigido.
    reason: lexical_alternative
  revision_rationale: Se cambia «contribución» por «tributo» para reflejar mejor el matiz de מַשְׂאַת como aporte exigido, en línea con la auditoría inglesa. Se simplifica la apposición a «Moisés, siervo de Dios» y se mantiene «para Israel en el desierto» sin coma para reducir ambigüedad y seguir más de cerca la estructura fuente. «Llevaran» suena ligeramente más natural que «trajeran» tras una proclamación pública, sin alterar el sentido.
