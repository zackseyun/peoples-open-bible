id: 2TI.1.3
reference: 2 Timothy 1:3
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: Χάριν ἔχω τῷ θεῷ, ᾧ λατρεύω ἀπὸ προγόνων ἐν καθαρᾷ συνειδήσει, ὡς ἀδιάλειπτον ἔχω τὴν περὶ σοῦ μνείαν ἐν ταῖς δεήσεσίν μου, νυκτὸς καὶ ἡμέρας
base_translation:
  language: en
  yaml_path: translation/nt/2_timothy/001/003.yaml
  text: I thank God, whom I serve as my ancestors did with a clean conscience, as I constantly remember you in my prayers night and day.
translation:
  language: ko
  text: 나는 조상 때로부터[a] 깨끗한 양심으로 섬겨[b] 온 하나님께 감사드립니다. 밤낮으로 드리는 나의 간구 가운데 그대를 끊임없이 기억하면서 그러합니다.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 직역하면 「조상으로부터」. 조상의 신앙과 섬김의 전통 안에 자신이 서 있음을 가리키는 표현이다.
    reason: lexical_alternative
  - marker: b
    text: 또는 「예배해 온」. 헬라어 λατρεύω는 종교적 섬김 또는 하나님을 향한 예배 행위를 가리킨다.
    reason: lexical_alternative
lexical_decisions:
- source_word: Χάριν ἔχω τῷ θεῷ
  english_pob_choice: I thank God
  chosen_korean: 하나님께 감사드립니다
  alternatives_korean:
  - 하나님께 감사한다
  - 하나님께 감사를 드린다
  lexicon: BDAG
  rationale: 헬라어 관용구를 자연스러운 한국어 「감사드리다」로 옮긴다. 합쇼체 격식과 하나님을 대상으로 한 경어 어감을 함께 살린다.
- source_word: λατρεύω
  english_pob_choice: serve
  chosen_korean: 섬기다
  alternatives_korean:
  - 예배하다
  - 봉사하다
  lexicon: BDAG
  rationale: λατρεύω는 본래 제의적 섬김·예배를 가리키나, 본 절의 「깨끗한 양심으로」와 결합되어 삶 전체의 헌신적 섬김을 함의한다. 「섬기다」가 가장 포괄적이며, 「예배하다」 가능성은 각주에 남긴다.
- source_word: ἀπὸ προγόνων
  english_pob_choice: as my ancestors did
  chosen_korean: 조상 때로부터
  alternatives_korean:
  - 조상으로부터
  - 조상 대대로
  lexicon: BDAG
  rationale: ἀπό + 속격은 시간적 기점과 계승의 의미를 함께 담는다. 「조상 때로부터」는 그 계승된 신앙 전통의 흐름을 자연스럽게 담는다.
- source_word: ἐν καθαρᾷ συνειδήσει
  english_pob_choice: with a clean conscience
  chosen_korean: 깨끗한 양심으로
  alternatives_korean:
  - 청결한 양심으로
  - 깨끗한 마음으로
  lexicon: BDAG
  rationale: συνείδησις는 도덕적 자기 인식을 가리키는 「양심」으로 한국어에서 확립되어 있다. 「깨끗한」은 한국어로 가장 자연스러운 일상어이다.
- source_word: ἀδιάλειπτον ἔχω τὴν περὶ σοῦ μνείαν
  english_pob_choice: I constantly remember you
  chosen_korean: 그대를 끊임없이 기억하면서
  alternatives_korean:
  - 너를 끊임없이 기억하면서
  - 그대에 대한 기억을 끊임없이 가지면서
  lexicon: BDAG
  rationale: 「ἔχω ... μνείαν」(기억을 가지다)이라는 명사 구문을 자연스러운 한국어 동사 구문(「기억하면서」)으로 옮기되, 영적 멘토가 제자에게 보내는 친밀한 톤을 살려 2인칭을 「그대」로 한다.
- source_word: ἐν ταῖς δεήσεσίν μου
  english_pob_choice: in my prayers
  chosen_korean: 나의 간구 가운데
  alternatives_korean:
  - 내 기도 중에
  - 나의 기도에서
  lexicon: BDAG
  rationale: δέησις는 일반적 기도(προσευχή)보다 좁은 「간구·청원」의 어감을 가지므로 「간구」로 옮긴다.
