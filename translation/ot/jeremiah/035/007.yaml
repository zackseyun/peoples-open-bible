id: JER.35.7
reference: Jeremiah 35:7
source:
  edition: WLC
  text: וּ/בַ֣יִת לֹֽא תִבְנ֗וּ וְ/זֶ֤רַע לֹֽא תִזְרָ֨עוּ֙ וְ/כֶ֣רֶם לֹֽא תִטָּ֔עוּ וְ/לֹ֥א יִֽהְיֶ֖ה לָ/כֶ֑ם כִּ֠י בָּ/אֳהָלִ֤ים תֵּֽשְׁבוּ֙ כָּל יְמֵי/כֶ֔ם לְמַ֨עַן תִּֽחְי֜וּ יָמִ֤ים רַבִּים֙ עַל פְּנֵ֣י הָ/אֲדָמָ֔ה אֲשֶׁ֥ר אַתֶּ֖ם גָּרִ֥ים שָֽׁם־־־־־׃
translation:
  text: You must not build a house[a], and you must not sow seed, and you must not plant a vineyard, nor shall you have one; but you shall live in tents all your days, so that you may live many days on the face of the land where you are residing there.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'where you are sojourning' / 'where you are living as temporary residents.' The Hebrew verb carries the sense of residing as a non-permanent resident.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּבַיִת
  chosen: a house
  alternatives:
  - a household
  lexicon: HALOT
  rationale: בַּיִת commonly means a physical house here, fitting the contrast with living in tents. 'Household' is possible elsewhere but not in this nomadic-lifestyle prohibition.
- source_word: תִבְנוּ
  chosen: you must not build
  alternatives:
  - you shall not build
  lexicon: HALOT
  rationale: Imperfect with לֹא in this instructional context functions as prohibition. 'You must not build' communicates the force naturally in modern English.
- source_word: וְזֶרַע
  chosen: seed
  alternatives:
  - crops
  - grain
  lexicon: HALOT
  rationale: The noun is literally 'seed.' Keeping 'seed' preserves the concrete agricultural prohibition without over-specifying the crop.
- source_word: תִזְרָעוּ
  chosen: you must not sow
  alternatives:
  - you shall not sow
  lexicon: HALOT
  rationale: Standard agricultural verb; paired with 'seed' for a close rendering of the Hebrew expression.
- source_word: וְכֶרֶם
  chosen: a vineyard
  alternatives:
  - a vine plot
  lexicon: HALOT
  rationale: כֶּרֶם normally denotes a vineyard. This is the natural English equivalent.
- source_word: תִטָּעוּ
  chosen: you must not plant
  alternatives:
  - you shall not plant
  lexicon: HALOT
  rationale: Straightforward rendering of נטע in agricultural context.
- source_word: וְלֹא יִהְיֶה לָכֶם
  chosen: nor shall you have one
  alternatives:
  - and it shall not be yours
  - and there shall not be one for you
  lexicon: HALOT
  rationale: The singular verb with dative pronoun likely refers back to vineyard/property possession in summary form. 'Nor shall you have one' is idiomatic and preserves the prohibition on possession, not merely planting.
- source_word: כִּי
  chosen: but
  alternatives:
  - for
  - rather
  lexicon: HALOT
  rationale: Here כִּי introduces the positive alternative to the preceding prohibitions. 'But' captures the contrast better than a causal 'for' in English.
- source_word: בָּאֳהָלִים
  chosen: in tents
  alternatives:
  - in tent-dwellings
  lexicon: HALOT
  rationale: Literal and natural rendering of the plural noun with preposition.
- source_word: תֵּשְׁבוּ
  chosen: you shall live
  alternatives:
  - you shall dwell
  - you shall sit
  lexicon: HALOT
  rationale: ישב in habitation contexts means 'dwell/live.' 'Live' is more natural modern English than 'dwell' while preserving the sense.
- source_word: כָּל יְמֵיכֶם
  chosen: all your days
  alternatives:
  - all the days of your life
  lexicon: HALOT
  rationale: A close, idiomatic rendering of the Hebrew temporal expression.
- source_word: לְמַעַן תִּחְיוּ
  chosen: so that you may live
  alternatives:
  - in order that you may live
  - that you may survive
  lexicon: HALOT
  rationale: לְמַעַן marks purpose. 'So that you may live' preserves the purpose/result nuance without overinterpreting as mere survival.
- source_word: יָמִים רַבִּים
  chosen: many days
  alternatives:
  - a long time
  - many years
  lexicon: HALOT
  rationale: Literal phrase meaning longevity. 'Many days' preserves the Hebrew idiom; 'a long time' is smoother but less transparent.
- source_word: עַל פְּנֵי הָאֲדָמָה
  chosen: on the face of the land
  alternatives:
  - upon the land
  - on the land
  lexicon: HALOT
  rationale: The Hebrew idiom is retained fairly closely. 'Land' is preferable to 'ground' here because the context is residence in a territory.
- source_word: אֲשֶׁר אַתֶּם גָּרִים שָׁם
  chosen: where you are residing there
  alternatives:
  - where you sojourn
  - where you are living as temporary residents
  lexicon: HALOT
  rationale: גור denotes residing as a sojourner/temporary resident. 'Residing there' keeps the verbal sense, though the nuance of non-permanent residence is significant enough to preserve in a footnote.
