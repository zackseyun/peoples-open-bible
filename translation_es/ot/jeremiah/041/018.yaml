  - severity: medium
    issue: «sobre la tierra» para בָּאָרֶץ
    rationale: Es formalmente posible, pero en español actual suena ambiguo y menos administrativo. Dado el contexto de nombramiento gubernamental, «sobre el país» comunica mejor el sentido de autoridad territorial sin apartarse del hebreo.
  - severity: low
    issue: Nota c no corresponde idealmente al texto base
    rationale: La nota propone «designado / nombrado sobre la tierra», pero si se revisa el texto principal conviene armonizar la nota con «puesto a cargo del país» o formulaciones equivalentes más naturales en español.
