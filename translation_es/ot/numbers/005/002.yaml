revisions:
- from: Ordena a los hijos de Israel que expulsen del campamento a todo[a] leproso, a todo el que tenga una secreción[b] y a todo el que esté impuro por un cadáver.
  to: Ordena a los hijos de Israel que saquen del campamento a toda persona con una enfermedad de la piel[a], a todo el que tenga una secreción y a todo el que esté impuro por un cadáver[b].
  rationale: Se revisa el texto principal para alinear כָּל צָרוּעַ con la decisión léxica documentada del POB, evitando «leproso» en el cuerpo del texto y conservándolo como alternativa en nota. También se cambia «expulsen» por «saquen» para reflejar con más neutralidad וִישַׁלְּחוּ, y se corrigen los anclajes de las notas para que correspondan a los términos explicados.
