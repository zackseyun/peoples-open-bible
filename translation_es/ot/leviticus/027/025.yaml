translation:
  language: es
  text: Y toda tu tasación[a] será según el siclo del santuario; el siclo será de veinte geras.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, «según el siclo santo». El hebreo se refiere al siclo patrón usado para las valoraciones relacionadas con el santuario.
    reason: lexical_alternative
lexical_decisions:
- source_word: עֶרְכְּךָ
  english_pob_choice: valuation of yours
  chosen_spanish: tu valoración
  alternatives_spanish:
  - tu tasación
  - tu valor asignado
  - tu avalúo
  lexicon: HALOT
  rationale: En Levítico 27, ערך nombra el valor fijado en una disposición votiva, no un valor abstracto. 'Valoración' conserva el sentido técnico mejor que 'precio', y el posesivo de segunda persona singular mantiene el matiz de 'of yours' del hebreo y del inglés POB.
- source_word: בְּשֶׁקֶל הַקֹּדֶשׁ
  english_pob_choice: by the sanctuary shekel
  chosen_spanish: según el siclo del santuario
  alternatives_spanish:
  - conforme al siclo del santuario
  - según el siclo santo
  - según el siclo sagrado
  lexicon: HALOT
  rationale: '''Siclo del santuario'' comunica en español el estándar oficial usado en contextos cultuales, tal como el inglés POB optó por ''sanctuary shekel''. ''Según'' expresa aquí la norma de medida o cálculo, sin perder el sentido reglamentario.'
- source_word: גֵּרָה
  english_pob_choice: gerahs
  chosen_spanish: geras
  alternatives_spanish:
  - gerahs
  lexicon: HALOT
  rationale: Se translitera el término porque designa una unidad de peso/valor sin equivalente natural en español. 'Geras' sigue la adaptación fonética usual en español cuando se pluraliza un préstamo transliterado.
- source_word: עֶשְׂרִים גֵּרָה יִהְיֶה הַשָּׁקֶל
  english_pob_choice: the shekel shall be twenty gerahs
  chosen_spanish: el siclo será de veinte geras
  alternatives_spanish:
  - el siclo será veinte geras
  - veinte geras será el siclo
  lexicon: HALOT
  rationale: La cláusula define el valor del siclo. 'Será de' suena natural en español para expresar composición o equivalencia de medida, y preserva la función normativa del hebreo sin añadir explicación interpretativa.
- source_word: שֶׁקֶל
  english_pob_choice: shekel
  chosen_spanish: siclo
  alternatives_spanish:
  - shekel
  lexicon: HALOT
  rationale: En español bíblico-readable, 'siclo' es el término tradicional y comprensible para la unidad monetaria/pesada. No se mantiene 'shekel' porque el español ya posee una forma asentada que evita anglicismo innecesario.
- source_word: וְכָל
  english_pob_choice: And every
  chosen_spanish: Y toda
  alternatives_spanish:
  - Y cada
  - Y toda una
  lexicon: HALOT
  rationale: El distributivo exige un femenino singular concordando con 'valoración' en español. 'Toda' preserva el alcance general de כל sin volver la frase torpe.
translation_notes:
  revision_awareness: Se siguió de cerca el texto hebreo y el expediente auditado en inglés. No se adoptaron cambios de revisión recientes porque el pasaje muestra alta concordancia y la formulación inglesa ya resuelve adecuadamente el valor técnico de la medida.
  spanish_consistency_notes:
  - Se prefirió 'siclo' como equivalente español estable, en lugar de conservar el anglicismo 'shekel'.
  - '''Valoración'' mantiene el tecnicismo levítico sin introducir una paráfrasis explicativa.'
  - La nota conserva la alternativa documentada entre el valor estándar del santuario y la formulación 'santa/sagrada' para reflejar la tensión léxica del original.
