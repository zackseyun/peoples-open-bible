translation:
  language: es
  text: 'Para los hijos de Aser,[a] por sus generaciones, por sus clanes, por las casas de sus padres, según el número de nombres, de veinte años en adelante, todo varón que sale a la guerra:'
  philosophy: optimal-equivalence
