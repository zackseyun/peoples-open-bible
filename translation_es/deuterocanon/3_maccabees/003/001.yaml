base_translation:
  language: en
  yaml_path: translation/deuterocanon/3_maccabees/003/001.yaml
  text: And when the impious man had learned this[a], he became so enraged that he was angry not only with those in Alexandria, but also opposed those in the country more violently; and after ordering that they quickly gather all together in one place[c][b], he intended to remove them from life by the cruelest death.
  footnotes:
  - marker: a
    text: Or, 'had learned' or 'had received this report' for 'had taken this in.' The Greek participle μεταλαβών can denote receiving information as well as taking something in more generally.
    reason: lexical_alternative
  - marker: b
    text: Literally, 'those in the χώρα.' Here it likely means those outside Alexandria in the surrounding country districts, not the whole land in an abstract sense.
    reason: cultural_note
  - marker: c
    text: Literally, 'to transfer [them] from life'—that is, to put them to death.
    reason: lexical_alternative
