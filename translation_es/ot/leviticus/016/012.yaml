translation:
  language: es
  text: Y tomará un incensario lleno de brasas de fuego de sobre el altar, de delante de Yahvé, y sus dos manos llenas de incienso aromático finamente molido, y lo llevará dentro del velo[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «dentro del velo». La expresión hebrea se refiere a llevar el incensario y el incienso al espacio detrás de la cortina, es decir, al santuario interior.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְלָקַח
  english_pob_choice: And he shall take
  chosen_spanish: Y tomará
  alternatives_spanish:
  - Y deberá tomar
  - Entonces tomará
  lexicon: HALOT
  rationale: La forma narrativa legal hebrea expresa instrucción futura/modal. «Tomará» mantiene el valor prescriptivo sin volver la frase pesada en español.
- source_word: מְלֹא הַמַּחְתָּה
  english_pob_choice: a censer full
  chosen_spanish: un incensario lleno
  alternatives_spanish:
  - un incensario lleno hasta el borde
  - un incensario con suficiente contenido
  lexicon: HALOT
  rationale: La construcción hebrea indica un recipiente lleno. «Incensario lleno» conserva el objeto ritual y la idea de plenitud sin calcar torpemente la estructura constructa.
- source_word: גַּחֲלֵי אֵשׁ
  english_pob_choice: coals of fire
  chosen_spanish: brasas de fuego
  alternatives_spanish:
  - brasas ardientes
  - carbones de fuego
  lexicon: HALOT
  rationale: «Brasas de fuego» refleja el genitivo hebreo y suena natural en español. «Brasas ardientes» sería más interpretativo; se prefiere mantener la relación léxica entre brasas y fuego.
- source_word: מֵעַל הַמִּזְבֵּחַ
  english_pob_choice: from upon the altar
  chosen_spanish: de sobre el altar
  alternatives_spanish:
  - de encima del altar
  - desde sobre el altar
  lexicon: HALOT
  rationale: La preposición מֵעַל tiene el sentido específico de «desde sobre/encima». «De sobre» preserva ese matiz espacial mejor que un simple «del altar».
- source_word: מִלִּפְנֵי יְהוָה
  english_pob_choice: before Yahweh
  chosen_spanish: de delante de Yahvé
  alternatives_spanish:
  - ante Yahvé
  - en presencia de Yahvé
  lexicon: HALOT
  rationale: Se conserva el nombre divino «Yahvé» según el criterio del proyecto. «De delante de» reproduce con fidelidad la expresión relacional hebrea sin convertirla en una fórmula litúrgica más interpretativa.
- source_word: וּמְלֹא חָפְנָיו
  english_pob_choice: and both his hands full of
  chosen_spanish: y ambos sus puños llenos
  alternatives_spanish:
  - y ambas sus manos llenas
  - y ambas palmas llenas
  lexicon: HALOT
  rationale: El dual hebreo señala ambas manos. «Ambos sus puños» intenta conservar la fuerza concreta de חָפְנָיו como porción recogida en las manos; aunque «manos» sería más transparente, «puños» preserva mejor la imagen de una medida tomada con las manos.
- source_word: קְטֹרֶת סַמִּים
  english_pob_choice: fragrant incense
  chosen_spanish: incienso aromático
  alternatives_spanish:
  - incienso fragante
  - incienso de especias
  lexicon: HALOT
  rationale: El compuesto denota incienso hecho con sustancias aromáticas. «Aromático» es claro y conserva la cualidad sensorial sin introducir una lectura demasiado moderna como «perfume».
- source_word: דַּקָּה
  english_pob_choice: finely ground
  chosen_spanish: finamente molido
  alternatives_spanish:
  - pulverizado finamente
  - molido fino
  lexicon: HALOT
  rationale: El adjetivo describe algo reducido a partículas finas. «Finamente molido» comunica la preparación ritual con naturalidad en español.
- source_word: וְהֵבִיא
  english_pob_choice: and bring
  chosen_spanish: y lo llevará
  alternatives_spanish:
  - y lo traerá
  - y lo introducirá
  lexicon: HALOT
  rationale: El hiphil de בוא aquí expresa movimiento de introducir. «Lo llevará» funciona en español ritual, y mantiene el flujo de la instrucción.
- source_word: מִבֵּית לַפָּרֹכֶת
  english_pob_choice: inside the veil
  chosen_spanish: desde dentro del velo
  alternatives_spanish:
  - dentro del velo
  - al interior del velo
  lexicon: HALOT
  rationale: La expresión hebrea apunta al espacio tras el velo, es decir, al santuario interior. Se conserva «velo» para la cortina sagrada y se usa «desde dentro» para reflejar el valor direccional del hebreo. La redacción admite la ambigüedad espacial documentada por la POB inglesa.
theological_decisions:
- issue: Renderización del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - el SEÑOR
  rationale: El texto hebreo contiene el Tetragrámaton, no un título genérico. Conforme al criterio del proyecto, se usa «Yahvé» en español para preservar el nombre propio del pacto y mantener transparencia textual.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Valor de la frase final מִבֵּית לַפָּרֹכֶת
  english_pob_reading: inside the veil
  chosen_spanish_reading: desde dentro del velo
  alternative_spanish_readings:
  - dentro del velo
  - tras el velo
  - al interior del velo
  rationale: La POB inglesa anotó que la expresión refiere el espacio detrás del velo, es decir, el santuario interior. En español se conserva la literalidad relativa («desde dentro del velo») para no borrar esa tensión semántica entre ubicación y dirección.
  doctrine_reference: Lexical note on sanctuary terminology and veil/inner sanctuary distinction
translation_notes:
  revision_awareness: La versión inglesa revisada cambió «a full censer» por «a censer full» y añadió «both» para el dual de «his hands». En español se reflejó esa revisión con «un incensario lleno» y «ambos sus puños llenos», evitando una construcción que sonara como sustantivo cuantificado artificialmente. También se mantuvo la nota de ambigüedad sobre el acceso «dentro/tras el velo», ahora anclada correctamente en el texto.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como forma principal para el Tetragrámaton, conforme al estándar del proyecto.
  - «Velo» se usa para לַפָּרֹכֶת por claridad bíblica y consistencia con el lenguaje del santuario.
  - Se conserva la estructura coordinada del hebreo con series de sintagmas nominales, sin convertirla en una paráfrasis explicativa.
  - «Aromático» y «finamente molido» reflejan el valor material y ritual del incienso sin sobreinterpretar la composición.
