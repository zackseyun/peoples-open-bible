translation:
  language: es
  text: El rey salió[a], y todo el pueblo con él a pie, y se detuvieron en la casa lejana.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O posiblemente un nombre de lugar: «Beth-merhak». La frase hebrea puede leerse como «casa de distancia/lejanía», pero muchos la entienden descriptivamente como «la última casa».'
    reason: alternative_reading
lexical_decisions:
- source_word: וַיֵּצֵא
  english_pob_choice: went out
  chosen_spanish: salió
  alternatives_spanish:
  - fue
  - se fue
  - salió de allí
  lexicon: HALOT
  rationale: El wayyiqtol de יצא expresa salir o partir. «Salió» es la forma española más directa y natural, manteniendo el movimiento narrativo sin sobretraducción.
- source_word: הַמֶּלֶךְ
  english_pob_choice: the king
  chosen_spanish: el rey
  alternatives_spanish:
  - el monarca
  lexicon: HALOT
  rationale: La referencia es al rey David en el contexto inmediato; «el rey» conserva la designación directa y bíblica del hebreo.
- source_word: וְכָל הָעָם
  english_pob_choice: and all the people
  chosen_spanish: y todo el pueblo
  alternatives_spanish:
  - y toda la gente
  - y toda la multitud
  lexicon: HALOT
  rationale: עָם puede abarcar el grupo que acompaña al rey. «Pueblo» reproduce el alcance colectivo sin restringirlo a tropas ni a una sola clase social.
- source_word: בְּרַגְלָיו
  english_pob_choice: with him on foot
  chosen_spanish: a pie
  alternatives_spanish:
  - con él a pie
  - andando tras él
  - siguiéndolo a pie
  lexicon: HALOT
  rationale: La expresión literalmente apunta a ir «junto/a los pies» de alguien, pero en este contexto narrativo indica que iban caminando. «A pie» conserva el rasgo físico esencial de la frase.
- source_word: וַיַּעַמְדוּ
  english_pob_choice: they halted
  chosen_spanish: se detuvieron
  alternatives_spanish:
  - se pararon
  - se quedaron
  - hicieron alto
  lexicon: HALOT
  rationale: עמד puede significar «ponerse de pie» o «detenerse». En un contexto de desplazamiento, «se detuvieron» comunica con claridad el cese del movimiento.
- source_word: בֵּית הַמֶּרְחָק
  english_pob_choice: the distant house
  chosen_spanish: la casa distante
  alternatives_spanish:
  - la casa lejana
  - la casa más alejada
  - Beth-merhak
  lexicon: HALOT
  rationale: La lectura descriptiva del hebreo favorece una traducción adjetival. «Casa distante» refleja el sentido literal sin decidir de antemano si se trata de un nombre propio o de una descripción topográfica.
theological_decisions:
- issue: Lectura de בֵּית הַמֶּרְחָק como descripción o topónimo
  english_pob_reading: The phrase is most naturally understood appellatively as 'the distant house' rather than as a place-name. The possible place-name reading is preserved in a footnote.
  chosen_spanish_reading: la casa distante
  alternative_spanish_readings:
  - Beth-merhak
  - la última casa
  rationale: El hebreo permite tanto una lectura descriptiva («casa de distancia/lejanía») como una interpretación como nombre de lugar. La traducción principal evita imponer un topónimo, pero conserva la posibilidad de lectura alternativa en nota.
  doctrine_reference: N/A
translation_notes:
  revision_awareness: La redacción española sigue la revisión más reciente del POB inglés, que corrigió «the last house» a «the distant house» para reflejar con más literalidad el hebreo y evitar una interpretación excesiva. Por eso la traducción principal usa una formulación descriptiva, mientras que la nota conserva la alternativa de topónimo.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» para el Tetragrámaton cuando aparezca en contextos cercanos; aquí no aplica.
  - Se traduce עָם como «pueblo» por su amplitud colectiva, en consonancia con el criterio POB de no restringirlo innecesariamente.
  - Se evita el calco rígido «a sus pies» porque en español sonaría forzado y podría sugerir una imagen distinta.
  - La puntuación y la mayúscula inicial siguen el uso editorial español estándar y conservan el paralelismo narrativo del hebreo.
