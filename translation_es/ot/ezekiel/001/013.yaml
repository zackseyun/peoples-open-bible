base_translation:
  language: en
  yaml_path: translation/ot/ezekiel/001/013.yaml
  text: And as for the likeness of the living creatures[a], their appearance was like burning coals of fire, like the appearance of torches; it was moving about among the living creatures, and the fire had brightness[c][b], and from the fire lightning was coming forth.
