    text: 'También: «súplicas». El término hebreo se refiere a peticiones insistentes para obtener favor o misericordia.'
    reason: lexical_alternative
  - marker: b
    text: 'También: «palabras tiernas».'
    reason: lexical_alternative
  revision_rationale: Se corrige la sintaxis española para que el destinatario se exprese de manera natural y fiel («te hará» en vez de «le hará ... a ti»). Se mantienen las decisiones léxicas principales del borrador, pero se ajustan las notas para reflejar con más precisión y sencillez las alternativas documentadas en la auditoría inglesa.
