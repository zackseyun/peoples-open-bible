translation:
  text: 'A copy of the testament of Reuben[a], what he commanded his sons before he died, in the one hundred and twenty-fifth year of his life.


    2 Two years after the death of Joseph his brother, when Reuben had fallen sick, the sons of Joseph and the sons of his sons were gathered to visit him. 3 And he said to them, “My children, behold, I am dying, and I am going the way of my fathers.” 4 Then, seeing there Judah and Gad and Asher, his brothers, he said to them, “Raise me up, so that I may tell my brothers and my children the things hidden in my heart; for behold, even now I am failing.” 5 And rising up, he kissed them and said to them, “Hear, my brothers and my sons; pay attention to Reuben your father in the things that I command you.


    6 “And behold, today I call the God of heaven to witness against you, that you not walk in the ignorance of youth and in sexual immorality, in which I was carried away and defiled the bed of my father Jacob. 7 And I tell you that he struck me with a severe blow in my loins for seven months; and if my father Jacob had not prayed for me to the Lord, the Lord would have been willing to destroy me. 8 For I was thirty years old when I did the evil thing before the Lord, and for seven months I was weakened to the point of death. 9 And after this, with the resolve of my soul, I repented before the Lord for seven years. 10 And I drank no wine or strong drink[b], and meat did not enter my mouth, and I ate no bread of desire; but I was mourning over my sin, for it was great—such a thing had not happened in Israel.”'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'I gave myself over'; the Greek 'was poured out' is vivid and may depict being overcome by lust rather than a simple statement of action.
    reason: lexical_alternative
    anchor_ref: '1:6'
  - marker: b
    text: '''Bread of desire'' likely means rich or choice food, expressed in deliberately literal ascetic language.'
    reason: lexical_alternative
    anchor_ref: '1:10'
lexical_decisions:
- source_word: διαθήκη
  chosen: testament
  alternatives:
  - covenant
  - last charge
  lexicon: LSJ
  rationale: In this literary work the term functions as a farewell charge or testamentary discourse, not a covenant between parties. 'Testament' preserves the genre label.
- source_word: ἐνετείλατο
  chosen: commanded
  alternatives:
  - charged
  - instructed
  lexicon: BDAG
  rationale: The verb carries authoritative father-to-sons force. 'Commanded' preserves the testamentary urgency better than the softer 'instructed.'
- source_word: πορεύομαι ὁδὸν τῶν πατέρων μου
  chosen: I am going the way of my fathers
  alternatives:
  - I am departing to my fathers
  - I am going the road of my fathers
  lexicon: LSJ
  rationale: This is a conventional death formula. The chosen rendering keeps the idiom recognizable and elevated without over-paraphrase.
- source_word: κρυπτά
  chosen: hidden
  alternatives:
  - secret
  - concealed
  lexicon: BDAG
  rationale: Reuben is disclosing what has been kept in his heart. 'Hidden' is natural and preserves the inward, previously undisclosed sense.
- source_word: ἐπιμαρτύρομαι
  chosen: I call ... to witness against you
  alternatives:
  - I testify
  - I solemnly charge you before
  lexicon: BDAG
  rationale: The verb is solemn and forensic. The construction with God as witness supports 'call to witness,' and 'against you' preserves the warning force.
- source_word: ἀγνοίᾳ νεότητος
  chosen: ignorance of youth
  alternatives:
  - youthful ignorance
  - the folly of youth
  lexicon: LSJ
  rationale: The phrase points to immature moral blindness associated with youth. 'Ignorance of youth' stays close to the Greek while remaining readable.
- source_word: πορνείᾳ
  chosen: sexual immorality
  alternatives:
  - fornication
  - sexual sin
  lexicon: BDAG
  rationale: This is the project's default accessible rendering for broad illicit sexual conduct. It avoids archaic phrasing while retaining moral specificity.
- source_word: ἐξεχύθην
  chosen: I was poured out
  alternatives:
  - I was overcome
  - I gave myself over
  lexicon: LSJ
  rationale: The verb is vivid and somewhat unusual here. 'I was poured out' preserves the metaphorical force and Reuben's sense of being given over to lust, rather than flattening it into a generic paraphrase.
- source_word: ἐμίανα κοίτην
  chosen: defiled the bed
  alternatives:
  - polluted the marriage bed
  - defiled the couch
  lexicon: BDAG
  rationale: '''Defiled the bed'' is a direct and idiomatic way to render the sexual dishonor implied by the phrase, with likely allusion to his father''s bed.'
- source_word: πληγῇ μεγάλῃ
  chosen: a severe blow
  alternatives:
  - a great plague
  - a heavy stroke
  lexicon: LSJ
  rationale: The context is bodily affliction as divine punishment. 'Severe blow' communicates punitive striking without implying a public epidemic.
- source_word: ἐπὶ τῆς λαγόνος μου
  chosen: in my loins
  alternatives:
  - in my flank
  - in my groin
  lexicon: LSJ
  rationale: The term refers to the loins/hip region. 'Loins' preserves the elevated register and may intentionally connect the punishment to sexual sin.
- source_word: ἐμαλακίσθην
  chosen: I was weakened
  alternatives:
  - I became feeble
  - I was enfeebled
  lexicon: BDAG
  rationale: The passive indicates bodily debilitation. 'I was weakened' is clear, natural, and suitably grave.
- source_word: ἐν προαιρέσει ψυχῆς μου
  chosen: with the resolve of my soul
  alternatives:
  - with deliberate purpose
  - with the intention of my heart
  lexicon: LSJ
  rationale: The phrase emphasizes intentional inward resolve in repentance. The chosen wording preserves both volition and the elevated testamentary tone.
- source_word: μετενόησα
  chosen: I repented
  alternatives:
  - I changed my mind
  - I turned back
  lexicon: BDAG
  rationale: Per project philosophy, specific-sin contexts take 'repent.' Here Reuben confesses a concrete sexual sin and describes penitential practice.
- source_word: σίκερα
  chosen: strong drink
  alternatives:
  - liquor
  - fermented drink
  lexicon: BDAG
  rationale: '''Strong drink'' is the standard and sufficiently transparent rendering for this broad category distinct from wine.'
- source_word: ἄρτον ἐπιθυμίας
  chosen: bread of desire
  alternatives:
  - pleasant bread
  - rich food
  - desirable bread
  lexicon: LSJ
  rationale: The phrase is somewhat idiomatic and ascetic in context. 'Bread of desire' preserves the literal texture and signals self-denial; a note supplies the smoother sense.
- source_word: πενθῶν
  chosen: mourning
  alternatives:
  - grieving
  - lamenting
  lexicon: BDAG
  rationale: The term suggests sustained penitential mourning, not merely inward sadness. 'Mourning' fits the ascetic and confessional setting.
