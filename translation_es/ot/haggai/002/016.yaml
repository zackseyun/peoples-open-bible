revisions:
- from: Cuando uno llegaba a un montón de veinte medidas, había solo diez; cuando uno llegaba al lagar para sacar cincuenta [a], había solo veinte.
  to: Cuando uno llegaba a un montón de veinte medidas, había solo diez; cuando uno llegaba al lagar de vino para sacar cincuenta medidas[a], había solo veinte.
  rationale: Se añadió 'medidas' en la segunda mitad para reflejar el valor cuantitativo de פּוּרָה conforme al audit trail inglés y para evitar una elipsis poco natural en español. Se precisó הַיֶּקֶב como 'lagar de vino' para representar mejor el recipiente/vat asociado al vino. También se corrigió la colocación del marcador de nota.
