revisions:
- from: Y aconteció en el cuarto año del rey Ezequías, que era el séptimo año de Oseas hijo de Ela, rey de Israel, que Salmanasar, rey de Asiria, subió contra Samaria y la sitió.
  to: Y aconteció en el cuarto año del rey Ezequías, que era el séptimo año de Oseas hijo de Ela, rey de Israel, que Salmanasar, rey de Asiria, marchó contra Samaria y la sitió.
  rationale: Se mantiene el contenido y el tono bíblico del original, pero se sustituye «subió contra» por «marchó contra» para mayor naturalidad en español. No se añaden notas porque no surge una ambigüedad nueva ni es necesario preservar aquí las alternativas inglesas. La sintaxis queda prácticamente igual al borrador, aunque la recomendación editorial ideal sería puntuar la cláusula parentética con rayas; aun así, el cambio mínimo necesario es léxico.
