base_translation:
  language: en
  yaml_path: translation/ot/habakkuk/002/018.yaml
  text: What profit is an idol when its maker has carved it— a cast image and a teacher of lies? For the one who formed it trusts in it[d][c][b][a], making mute idols.
  footnotes:
  - marker: a
    text: Or 'a carved image'; 'idol' makes explicit that the carved object is an object of false worship.
    reason: lexical_alternative
  - marker: b
    text: Or 'a molten image.'
    reason: lexical_alternative
  - marker: c
    text: Hebrew 'teacher of lies,' likely personifying the idol as something that misleads its worshipers.
    reason: lexical_alternative
  - marker: d
    text: אֱלִילִים can carry the sense 'worthless idols' or 'nothings.'
    reason: lexical_alternative
