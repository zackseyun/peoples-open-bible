id: COL.4.15
reference: Colossians 4:15
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: ἀσπάσασθε τοὺς ἐν Λαοδικείᾳ ἀδελφοὺς καὶ ⸂Νύμφαν καὶ τὴν κατ’ οἶκον αὐτῆς⸃ ἐκκλησίαν.
base_translation:
  language: en
  yaml_path: translation/nt/colossians/004/015.yaml
  text: Greet the brothers in Laodicea, and Nympha and the church in her house.
translation:
  language: ko
  text: 라오디게아에 있는 형제들에게 문안하고, 눔바와 그녀의 집에 있는 회중[a]에게도 문안하십시오.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 일부 사본은 「눔바스」(남성)와 「그의 집」 또는 「그들의 집」으로 읽는다.
    reason: textual_variant
lexical_decisions:
- source_word: ἀσπάσασθε
  english_pob_choice: Greet
  chosen_korean: 문안하고 ... 문안하십시오
  alternatives_korean:
  - 인사를 전하라
  lexicon: BDAG
  rationale: 부정과거 명령. 한국 교회의 정립된 「문안하다」 사용.
- source_word: τοὺς ἐν Λαοδικείᾳ ἀδελφοὺς
  english_pob_choice: the brothers in Laodicea
  chosen_korean: 라오디게아에 있는 형제들
  alternatives_korean:
  - 라오디게아의 형제 자매들
  lexicon: BDAG
  rationale: 성별-정확성 원칙에 따라 「형제들」 보존.
- source_word: Νύμφαν
  english_pob_choice: Nympha
  chosen_korean: 눔바
  alternatives_korean:
  - 눔바스
  lexicon: BDAG
  rationale: SBLGNT는 여성형으로 읽는다. 한국 교회의 정립된 음역 「눔바」(또는 남성형 「눔바스」).
- source_word: τὴν κατ’ οἶκον αὐτῆς ἐκκλησίαν
  english_pob_choice: the church in her house
  chosen_korean: 그녀의 집에 있는 회중
  alternatives_korean:
  - 그녀의 집에 모이는 교회
  - 그 집의 가정 교회
  lexicon: BDAG
  rationale: 가정에서 모이는 회중을 가리키므로, 글로사리 기본 「회중」을 사용한다(개별 가정 회중의 비제도적 성격 보존).
theological_decisions:
- issue: Νύμφαν의 성별과 사본 이독
  chosen_reading: 「눔바」(여성) + 「그녀의 집」
  alternative_readings:
  - 「눔바스」(남성) + 「그의 집」
  - 「그들의 집」
  rationale: SBLGNT는 αὐτῆς(여성 단수 「그녀의」)를 읽는다. 사본·해석사적 변이는 각주로 보존.
  doctrine_reference: 'DOCTRINE.md: Preserve textual/interpretive tension'
- issue: ἐκκλησία(가정 회중)의 어휘
  chosen_reading: 회중
  alternative_readings:
  - 교회
  rationale: 가정에서 모이는 신자 무리를 가리키므로 글로사리 기본 「회중」(바울의 모임 어감)을 따른다. 1:18 등 그리스도의 몸 전체적·제도적 용례에서는 「교회」를 사용한 carve-out과 구분.
  doctrine_reference: 'KOREAN_PIPELINE.md: ἐκκλησία default 회중'
