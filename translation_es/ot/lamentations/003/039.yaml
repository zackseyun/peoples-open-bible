translation:
  language: es
  text: ¿Por qué se queja un hombre que aún vive, el hombre, por sus pecados[a][b]?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «por el castigo de sus pecados»; algunos entienden que la frase se refiere no al pecado mismo, sino al sufrimiento causado por él.
    reason: alternative_reading
  - marker: b
    text: O «su pecado». La forma hebrea puede entenderse como singular en algunas tradiciones.
    reason: lexical_alternative
lexical_decisions:
- source_word: מַה
  english_pob_choice: Why should
  chosen_spanish: ¿Por qué habría de... ?
  alternatives_spanish:
  - ¿Por qué...?
  - ¿Qué...?
  lexicon: HALOT
  rationale: La pregunta hebrea es retórica; en español, «¿Por qué habría de...?» conserva mejor esa fuerza que un simple «¿Qué?», que sonaría naturalizado en exceso y perdería el matiz exhortativo.
- source_word: יִּתְאוֹנֵן
  english_pob_choice: complain
  chosen_spanish: quejarse
  alternatives_spanish:
  - murmurar
  - lamentarse
  - refunfuñar
  lexicon: HALOT
  rationale: El verbo expresa queja o murmuración ante la situación. «Quejarse» es el equivalente más claro y actual en español. Se evita «lamentarse» porque podría sonar a duelo legítimo más que a queja reprochable.
- source_word: אָדָם
  english_pob_choice: man
  chosen_spanish: un hombre
  alternatives_spanish:
  - una persona
  - la humanidad
  lexicon: HALOT
  rationale: Aquí aparece como singular representativo y en paralelo con גבר. «Un hombre» mantiene la concreción del hebreo y la fuerza personal de la pregunta.
- source_word: חָי
  english_pob_choice: living
  chosen_spanish: vivo
  alternatives_spanish:
  - que vive
  - viviente
  lexicon: HALOT
  rationale: «Vivo» funciona de modo natural como adjetivo atributivo en español y conserva la contraposición implícita de alguien que aún está bajo misericordia y no destruido.
- source_word: גֶּבֶר
  english_pob_choice: a man
  chosen_spanish: un hombre
  alternatives_spanish:
  - un varón
  - un hombre fuerte
  lexicon: HALOT
  rationale: El paralelismo con אָדָם favorece una repetición funcional más que una nueva clase semántica. «Un hombre» preserva esa reiteración sin introducir «fuerza» que el contexto no exige.
- source_word: עַל
  english_pob_choice: for
  chosen_spanish: por
  alternatives_spanish:
  - a causa de
  - debido a
  - sobre
  lexicon: HALOT
  rationale: En español, «quejarse por» puede expresar tanto el motivo de la queja como la referencia a la culpa o sus consecuencias. Por eso encaja mejor que «sobre» y mantiene abierta la tensión interpretativa del verso.
- source_word: חטאו
  english_pob_choice: his sins
  chosen_spanish: sus pecados
  alternatives_spanish:
  - su pecado
  - el castigo de sus pecados
  lexicon: HALOT
  rationale: La tradición consonántica puede leerse en singular o plural, pero el hebreo y la lectura inglesa principal admiten un sentido plural genérico. «Sus pecados» es claro en español y preserva la referencia a la culpabilidad sin resolver si el foco es el pecado mismo o sus consecuencias.
theological_decisions:
- issue: Si el verso debe explicitar el castigo por el pecado en lugar del pecado mismo
  english_pob_reading: The main text speaks of complaining 'for his sins' without adding 'punishment.'
  chosen_spanish_reading: El texto principal dice «por sus pecados» sin añadir «castigo».
  alternative_spanish_readings:
  - por el castigo de sus pecados
  - por su pecado
  rationale: El hebreo no nombra explícitamente el castigo. Algunos intérpretes lo infieren del contexto, pero incorporarlo al texto principal iría más allá de lo que está escrito. La redacción española mantiene esa tensión y deja la lectura alternativa para nota.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: El borrador sigue el último pase de revisión del inglés POB, que desplazó el sentido hacia una queja relacionada con la culpa y/o sus consecuencias, sin añadir explícitamente «castigo» al texto principal. La versión española conserva esa misma tensión interpretativa mediante «por sus pecados» y la nota alternativa.
  spanish_consistency_notes:
  - Se usa «un hombre» en ambas ocurrencias para reproducir el paralelismo hebreo אָדָם / גֶּבֶר.
  - «Vivo» mantiene el contraste existencial del hebreo sin cargar el verso con una explicación interpretativa.
  - «Por» permite en español la misma amplitud semántica que el inglés auditado («for»), incluyendo motivo, referencia o consecuencia.
  - Se evita «SEÑOR» u otra sustitución teológica no pertinente, ya que el verso no contiene el Tetragrámaton.
