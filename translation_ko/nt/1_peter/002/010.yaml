  text: οἵ ποτε οὐ λαὸς νῦν δὲ λαὸς θεοῦ, οἱ οὐκ ἠλεημένοι νῦν δὲ ἐλεηθέντες.
base_translation:
  language: en
  yaml_path: translation/nt/1_peter/002/010.yaml
  text: "you who once were not a people, but now are God's people; you who had not received mercy, but now have received mercy."
translation:
  language: ko
  text: '여러분은 전에는 백성이 아니더니 이제는 하나님의 백성이 되었고, 전에는 자비를 얻지 못한 자들이더니 이제는 자비를 얻은 자들이 되었습니다.[a]'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 호세아 1:6-10; 2:23 인용. 호세아의 「로 암미」/「로 루하마」 → 「내 백성」/「긍휼히 여김 받은 자」 반전을 환기한다.
    reason: ot_citation
lexical_decisions:
- source_word: λαὸς θεοῦ
  english_pob_choice: God's people
  chosen_korean: 하나님의 백성
  alternatives_korean:
  - 하나님께 속한 백성
  lexicon: BDAG
  rationale: 호세아의 「암미」(내 백성) 반전 모티프를 살려 「하나님의 백성」으로 옮긴다.
- source_word: οἱ οὐκ ἠλεημένοι ... ἐλεηθέντες
  english_pob_choice: had not received mercy ... have received mercy
  chosen_korean: 자비를 얻지 못한 자들 ... 자비를 얻은 자들
  alternatives_korean:
  - 긍휼히 여김을 받지 못한 자들 ... 긍휼히 여김을 받은 자들
  - 불쌍히 여김을 못 받은 자 ... 받은 자
  lexicon: BDAG
  rationale: ἐλεέω의 호세아 인용. 한국 성서 전통의 「긍휼히 여김 받음」도 가능하나, 현대 합쇼체에서는 「자비를 얻다」가 자연스럽다. 호 1:6의 「로 루하마」 반전을 보존.
theological_decisions:
- issue: 호 1-2장 인용의 보존
  chosen_reading: '「전에는 ~아니더니 이제는 ~이다」 반복 구조를 한국어로 그대로 살림; OT citation 각주'
  alternative_readings:
  - 한 문장으로 통합하여 평이화
  rationale: 호세아의 이름·반전 모티프(로 암미 → 암미, 로 루하마 → 루하마)는 본문 신학의 핵심이다. 반복 구조를 한국어로도 보존한다.
  doctrine_reference: 'DOCTRINE.md: OT 심상 보존'
