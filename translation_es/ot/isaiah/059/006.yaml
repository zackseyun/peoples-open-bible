    issue: «Sus telas» para קוּרֵיהֶם es semánticamente inadecuado en español.
    rationale: Aunque intenta reflejar algo tejido, «telas» suele denotar material textil útil o acabado. En el verso, la imagen recalca que lo que producen no sirve como vestidura; «tejidos» o una opción similar preserva mejor la metáfora sin sugerir tela propiamente dicha.
  - severity: low
