translation:
  language: es
  text: ¡Mira![a] yo te he hecho pequeño entre las naciones[b]; eres muy despreciado.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «insignificante entre las naciones».'
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo literalmente: «te he dado pequeño entre las naciones», un modismo que significa «te he hecho pequeño entre las naciones».'
    reason: lexical_alternative
lexical_decisions:
- source_word: הִנֵּה
  english_pob_choice: Look
  chosen_spanish: ¡Mira!
  alternatives_spanish:
  - Mira
  - He aquí
  - ¡Miren!
  lexicon: HALOT
  rationale: Mantiene la fuerza deíctica y llamativa del hebreo con un español natural y directo. 'He aquí' suena más arcaico; 'Mira' comunica mejor el golpe retórico del anuncio.
- source_word: קָטֹן
  english_pob_choice: small
  chosen_spanish: pequeño
  alternatives_spanish:
  - pequeño
  - insignificante
  - de poca importancia
  lexicon: HALOT
  rationale: Aquí el término expresa disminución de estatus o humillación. 'Pequeño' conserva la imagen básica sin añadir la interpretación evaluativa de 'insignificante', que queda solo como alternativa.
- source_word: נְתַתִּיךָ
  english_pob_choice: I have made you
  chosen_spanish: te he hecho
  alternatives_spanish:
  - te he dado
  - te he puesto
  lexicon: HALOT
  rationale: El verbo hebreo es literalmente 'he dado', pero en esta construcción con el adjetivo predicativo significa causalmente 'hacer' o 'volver' a alguien pequeño. 'Te he hecho' refleja el sentido idiomático auditado por la POB en inglés.
- source_word: בַּגּוֹיִם
  english_pob_choice: among the nations
  chosen_spanish: entre las naciones
  alternatives_spanish:
  - entre las naciones
  - entre los pueblos
  - entre las naciones gentiles
  lexicon: HALOT
  rationale: '''Naciones'' conserva el referente colectivo general de גּוֹיִם sin introducir una distinción tardía como ''gentiles''. ''Entre'' expresa con naturalidad la ubicación relacional dentro del grupo.'
- source_word: בָּזוּי
  english_pob_choice: despised
  chosen_spanish: despreciado
  alternatives_spanish:
  - despreciado
  - tenido en desprecio
  - desairado
  lexicon: HALOT
  rationale: '''Despreciado'' reproduce el campo semántico de ser tratado con desdén o contemptuado. Es una correspondencia natural y fiel al participio pasivo.'
- source_word: מְאֹד
  english_pob_choice: greatly
  chosen_spanish: muy
  alternatives_spanish:
  - muy
  - en gran manera
  - sobremanera
  lexicon: HALOT
  rationale: Como adverbio de intensidad, 'muy' es la opción más transparente y directa en español. 'Sobremanera' sería más literaria, pero menos inmediata.
theological_decisions:
- issue: Aspecto perfecto profético en una sentencia divina
  english_pob_reading: I have made you small among the nations.
  chosen_spanish_reading: Te he hecho pequeño entre las naciones.
  alternative_spanish_readings:
  - Te haré pequeño entre las naciones.
  - Te hago pequeño entre las naciones.
  rationale: Se conserva el perfecto como acto decretado ya formulado por Yahvé, con relevancia presente. El pretérito perfecto compuesto en español mantiene mejor que el futuro la fuerza de decisión divina ya pronunciada.
  doctrine_reference: 'Translation philosophy: primacía del texto original; conservar el valor perfecto/decretivo del hebreo en el discurso profético.'
translation_notes:
  revision_awareness: El pass más reciente indica concordancia alta y ningún cambio aplicado; esta versión sigue de cerca el audit trail inglés sin introducir revisiones nuevas.
  spanish_consistency_notes:
  - Se mantuvo 'Yahvé' implícito en la voz divina del contexto, sin ocultar el nombre divino por 'SEÑOR'.
  - '''Naciones'' traduce גּוֹיִם en sentido general y no como término técnico contrastivo.'
  - La puntuación reproduce la exclamación inicial y la pausa fuerte del anuncio profético.
