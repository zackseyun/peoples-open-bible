  language: en
  yaml_path: translation/ot/esther/008/017.yaml
  text: And in every province and in every city[a], wherever the king’s word and his decree reached, there was joy and gladness for the Jews, a feast and a good day. And many from the peoples of the land were becoming Jews[b], because the fear of the Jews had fallen on them.
  footnotes:
  - marker: a
    text: Or 'were declaring themselves Jews' or 'were adopting Jewish identity/practice'; the Hebrew verb is rare and may denote identifying with the Jews rather than formal conversion in a later technical sense.
    reason: alternative_reading
  - marker: b
    text: Literally 'a good day,' that is, a festive or celebratory day.
    reason: lexical_alternative
