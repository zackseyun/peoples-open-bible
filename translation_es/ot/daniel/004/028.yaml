review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura y el sentido del arameo: la interrupción mientras el rey aún hablaba, la voz procedente del ámbito celestial, la fórmula impersonal de anuncio y la pérdida del reino. Sin embargo, en dos puntos se aparta del mejor reflejo del expediente POB: (1) מִן שְׁמַיָּא está auditado como ‘from heaven’, y en español ‘desde el cielo’ puede sonar más físico que teológico; ‘del cielo’ preserva mejor la resonancia del oráculo divino. (2) La nota alternativa ‘ha sido removido de ti’ suena poco natural en español; conviene ‘te ha sido quitado’ o ‘ha sido quitado de ti’.'
  spanish_quality_summary: El español es claro y digno, pero puede mejorarse ligeramente para mayor naturalidad bíblica y fluidez. ‘Mientras la palabra aún estaba en la boca del rey’ es fiel, aunque algo rígido; aun así es aceptable. La mejora principal es preferir ‘del cielo’ sobre ‘desde el cielo’ y afinar la nota léxica para evitar un calco poco idiomático.
  glossary_alignment: No hay términos del glosario principal en disputa aquí (ni Yahvé, Mesías, etc.). La elección ‘rey Nabucodonosor’ es adecuada y la impersonal ‘A ti se te dice’ conserva bien el tono formal. El ajuste propuesto fortalece la coherencia con la decisión inglesa documentada sobre ‘from heaven’.
  issues:
  - severity: medium
    issue: ‘desde el cielo’ frente a ‘del cielo’
    rationale: El expediente inglés justifica explícitamente ‘from heaven’ por su resonancia teológica en un anuncio de juicio divino. En español, ‘una voz cayó del cielo’ conserva mejor esa fuerza idiomática y teológica que ‘desde el cielo’, que puede sonar más espacial o meteorológica.
  - severity: low
    issue: Nota léxica ‘ha sido removido de ti’ poco natural
    rationale: Aunque comunica la idea, ‘removido de ti’ es un calco torpe en español general. Una alternativa como ‘te ha sido quitado’ preserva mejor el valor pasivo/remocional documentado y suena natural para lectura eclesial amplia.
  revised_spanish_text: 'Mientras la palabra aún estaba en la boca del rey[a], una voz cayó del cielo: «A ti se te dice, rey Nabucodonosor: el reino se ha apartado de ti».


    [a] O: «el reino te ha sido quitado».'
