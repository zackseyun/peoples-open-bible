translation:
  language: es
  text: 'Y les dirás: «Así dice Yahvé de los ejércitos, el Dios de Israel: Beban y embriáguense, y vomiten[a], y caigan, y no se levanten, por causa de la espada que yo envío en medio de ustedes».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «y echen fuera»; el verbo raro hebreo también puede entenderse como «y vomiten».
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - SEÑOR
  - Jehová
  lexicon: WLC/HALOT
  rationale: El nombre divino del Tetragrámaton se conserva como nombre propio en español. 'Yahvé' sigue la decisión del POB de no sustituir el nombre por un título, y evita la máscara litúrgica 'SEÑOR'.
- source_word: צְבָאוֹת
  english_pob_choice: of hosts
  chosen_spanish: de los ejércitos
  alternatives_spanish:
  - de los ejércitos celestiales
  - de las huestes
  lexicon: HALOT
  rationale: En español, 'de los ejércitos' comunica bien el título divino y mantiene la amplitud de fuerzas sometidas a Yahvé. 'Huestes' sería más tradicional pero menos transparente para lectores modernos.
- source_word: אֱלֹהֵי יִשְׂרָאֵל
  english_pob_choice: the God of Israel
  chosen_spanish: el Dios de Israel
  alternatives_spanish:
  - el Dios de Israel
  - el Dios de Israel
  lexicon: HALOT
  rationale: Construcción directa y estable en español; 'el Dios de Israel' preserva el vínculo pactual sin añadir matices que el hebreo no exige.
- source_word: שְׁתוּ
  english_pob_choice: Drink
  chosen_spanish: Beban
  alternatives_spanish:
  - Tomen
  - Beban ustedes
  lexicon: HALOT
  rationale: Imperativo plural en discurso profético. Se eligió el imperativo de cortesía/plural de tercera persona formal para un registro bíblico natural en español. La forma de mandato mantiene la fuerza del hebreo.
- source_word: וְשִׁכְרוּ
  english_pob_choice: and become drunk
  chosen_spanish: y embriáguense
  alternatives_spanish:
  - y queden ebrios
  - y pónganse borrachos
  lexicon: HALOT
  rationale: '''Embriagarse'' transmite el proceso de llegar a la intoxicación con registro digno. Se evita ''borrachos'' por ser más coloquial y por reducir el verbo a un adjetivo.'
- source_word: וּקְיוּ
  english_pob_choice: and vomit
  chosen_spanish: y vomiten
  alternatives_spanish:
  - y echen
  - y spew
  lexicon: HALOT
  rationale: El verbo raro refiere a vomitar. 'Vomiten' es la equivalencia más clara y directa en español; 'echen' sería demasiado genérico.
- source_word: וְנִפְלוּ
  english_pob_choice: and fall
  chosen_spanish: y caigan
  alternatives_spanish:
  - y se desplomen
  - y caigan por tierra
  lexicon: HALOT
  rationale: '''Caigan'' conserva la imagen simple del hebreo. No se explicita ''por tierra'' porque el contexto ya sugiere la caída y el movimiento subsecuente.'
- source_word: וְלֹא תָקוּמוּ
  english_pob_choice: and do not rise
  chosen_spanish: y no se levanten
  alternatives_spanish:
  - y no se alcen
  - y no vuelvan a levantarse
  lexicon: HALOT
  rationale: En español, 'levantarse' comunica mejor el contraste con 'caer'. La forma reflexiva plural conserva el imperativo negativo/resultativo del hebreo sin añadir 'nunca' o 'otra vez'.
- source_word: מִפְּנֵי הַחֶרֶב
  english_pob_choice: because of the sword
  chosen_spanish: por causa de la espada
  alternatives_spanish:
  - a causa de la espada
  - ante la espada
  lexicon: HALOT
  rationale: El hebreo expresa la relación causal ligada a la amenaza. 'Por causa de' reproduce con claridad la función causal elegida por el POB en inglés, sin convertir la expresión en un simple marcador espacial.
- source_word: אֲשֶׁר אָנֹכִי שֹׁלֵחַ בֵּינֵיכֶם
  english_pob_choice: that I am sending among you
  chosen_spanish: que yo envío en medio de ustedes
  alternatives_spanish:
  - que envío entre ustedes
  - que estoy enviando entre ustedes
  lexicon: HALOT
  rationale: '''בֵּין'' con sufijo indica ''entre/en medio de''. ''En medio de ustedes'' preserva la imagen espacial del arma moviéndose dentro del pueblo. Se usa presente en español para la inmediatez profética.'
theological_decisions:
- issue: Tratamiento del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Jehová
  rationale: Se conserva el nombre propio divino en vez de sustituirlo por un título. 'Yahvé' es la forma adoptada por el POB en español para reflejar el Tetragrámaton con transparencia auditable.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Sentido de la secuencia de imperativos de juicio
  english_pob_reading: Drink and become drunk, and vomit, and fall, and do not rise
  chosen_spanish_reading: Beban y embriáguense, y vomiten, y caigan, y no se levanten
  alternative_spanish_readings:
  - Beban y embriáguense; vomiten y caigan, y no se levanten
  - Beban, embriáguense, vomiten, caigan y no se levanten
  rationale: La secuencia reproduce el tono de sentencia irónica/judicial del hebreo. No se suaviza ni se parafrasea el mandato, porque el texto expresa juicio mediante imperativos encadenados.
  doctrine_reference: 'POB translation principles: preserve rhetorical force and lexical tension in prophetic speech'
translation_notes:
  revision_awareness: La redacción sigue de cerca la versión inglesa revisada que eliminó la coma después de 'Drink' para una coordinación más natural; en español se refleja con una sola serie fluida de imperativos sin pausa innecesaria. Se mantuvo la fuerza acumulativa del hebreo y el título divino como 'Yahvé'.
  spanish_consistency_notes:
  - Se conserva 'Yahvé' para יְהוָה, conforme al estándar español del proyecto.
  - '''De los ejércitos'' traduce צְבָאוֹת de manera transparente y ampliamente comprensible.'
  - '''En medio de ustedes'' preserva la imagen espacial de בֵּין con sufijo plural.'
  - El registro mantiene tono bíblico moderno, evitando arcaísmos innecesarios como 'Jehová' o 'sepulcral'.
