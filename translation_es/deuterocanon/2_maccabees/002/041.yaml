translation:
  language: es
  text: De igual manera, también Judas reunió para nosotros todo lo que había sido dispersado por la guerra que había ocurrido[a], y está con nosotros[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «lo que había sido dispersado». El griego no especifica más precisamente los elementos en este versículo, aunque el contexto sugiere registros o escritos reunidos.'
    reason: lexical_alternative
  - marker: b
    text: Literalmente, «y está con nosotros», con verbo singular usado en griego para un sujeto neutro plural.
    reason: lexical_alternative
lexical_decisions:
- source_word: ὡσαύτως
  english_pob_choice: Likewise
  chosen_spanish: De igual manera
  alternatives_spanish:
  - Asimismo
  - Igualmente
  lexicon: LSJ
  rationale: Expresa la conexión comparativa con lo anterior sin sonar forzado en español y conserva el valor correlativo de la frase inicial.
- source_word: δὲ καὶ
  english_pob_choice: also
  chosen_spanish: también
  alternatives_spanish:
  - y también
  - además
  lexicon: LSJ
  rationale: Mantiene el matiz aditivo de la combinación sin sobrecargar la oración.
- source_word: Ἰούδας
  english_pob_choice: Judas
  chosen_spanish: Judas
  alternatives_spanish:
  - Judá
  lexicon: LSJ
  rationale: Nombre propio en contexto macabeo; 'Judas' corresponde al uso histórico de Judas Macabeo.
- source_word: τὰ διεσπεπτωκότα
  english_pob_choice: all the things that had been scattered
  chosen_spanish: todas las cosas que habían sido dispersadas
  alternatives_spanish:
  - todo lo que había sido dispersado
  - las cosas dispersadas
  lexicon: LSJ
  rationale: El participio perfecto neutro plural indica elementos en estado resultante de dispersión; 'cosas' preserva la amplitud no especificada del griego.
- source_word: διὰ τὸν γεγονότα πόλεμον
  english_pob_choice: because of the war that had occurred
  chosen_spanish: a causa de la guerra que había ocurrido
  alternatives_spanish:
  - a causa de la guerra
  - por la guerra que había ocurrido
  lexicon: LSJ
  rationale: '''A causa de'' refleja la relación causal y ''había ocurrido'' conserva el valor de evento ya sucedido.'
- source_word: ἐπισυνήγαγεν
  english_pob_choice: gathered together
  chosen_spanish: reunió
  alternatives_spanish:
  - recogió
  - juntó
  lexicon: LSJ
  rationale: '''Reunió'' transmite la idea de juntar en un solo conjunto; el complemento ''todas las cosas'' ya expresa la completitud.'
- source_word: πάντα
  english_pob_choice: all
  chosen_spanish: todas las cosas
  alternatives_spanish:
  - todo
  - todo ello
  lexicon: LSJ
  rationale: En español, con el antecedente neutro plural implícito, 'todas las cosas' hace explícita la amplitud sin añadir especificación indebida.
- source_word: καὶ ἔστιν παρʼ ἡμῖν
  english_pob_choice: and they are with us
  chosen_spanish: y están con nosotros
  alternatives_spanish:
  - y están entre nosotros
  - y se hallan con nosotros
  lexicon: LSJ
  rationale: El verbo singular griego con sujeto neutro plural se entiende naturalmente en plural en español. 'Con nosotros' conserva la idea de presencia/posesión comunitaria sin forzar una interpretación más precisa que la del texto.
translation_notes:
  revision_awareness: Se incorporó la revisión inglesa que prefirió 'had occurred' sobre 'had happened'; en español se reflejó con 'había ocurrido'. La redacción mantiene la amplitud indeterminada de τὰ διεσπεπτωκότα y la observación gramatical del verbo singular griego con sujeto neutro plural.
  spanish_consistency_notes:
  - Se evitó 'SEÑOR' u otra sustitución teológica no presente en el texto.
  - Se mantuvo un registro bíblico moderno y comprensible, sin calcos innecesarios.
  - '''Reunió'' y ''están con nosotros'' preservan el sentido de colecta y posesión/ubicación comunitaria del griego.'
