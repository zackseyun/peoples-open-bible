translation:
  language: es
  text: Pero tú lamentarás amargamente por haber dado muerte injustamente[a] a los campeones de la virtud[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «sin causa» o «sin justificación». El griego puede leerse literalmente como «sin causa».
    reason: lexical_alternative
  - marker: b
    text: O «los atletas de la virtud» o «los luchadores por la virtud». El término griego evoca contendientes en una lucha y aquí se usa de manera honorífica.
    reason: lexical_alternative
lexical_decisions:
- source_word: σὺ δὲ
  english_pob_choice: But you
  chosen_spanish: Pero tú
  alternatives_spanish:
  - Y tú
  - Mas tú
  - Pero usted
  lexicon: LSJ
  rationale: El griego marca contraste directo y segunda persona; «Pero tú» conserva la oposición con naturalidad en español sin perder el tono de reproche.
- source_word: κακῶς
  english_pob_choice: bitterly
  chosen_spanish: amargamente
  alternatives_spanish:
  - dolorosamente
  - con amargura
  - miserablemente
  lexicon: LSJ
  rationale: Con οἰμώξεις, el adverbio intensifica el lamento. «Amargamente» comunica el matiz afectivo y la dureza del grito mejor que una forma más plana.
- source_word: οἰμώξεις
  english_pob_choice: will wail
  chosen_spanish: aullarás
  alternatives_spanish:
  - lamentarás
  - gritarás de dolor
  - gemirás
  lexicon: LSJ
  rationale: οἰμώζω expresa lamento sonoro y desgarrado. «Aullarás» conserva la viveza del gemido público y violento, acorde con el tono de denuncia.
- source_word: τοὺς τῆς ἀρετῆς ἀγωνιστάς
  english_pob_choice: the champions of virtue
  chosen_spanish: los campeones de la virtud
  alternatives_spanish:
  - los atletas de la virtud
  - los luchadores por la virtud
  - los contendientes de la virtud
  lexicon: LSJ
  rationale: ἀγωνιστής evoca a quien contiende en una lucha o competencia. La POB inglesa eligió una equivalencia honorífica; «campeones» reproduce ese valor honorífico en español sin borrar la imagen de combate.
- source_word: τῆς ἀρετῆς
  english_pob_choice: of virtue
  chosen_spanish: de la virtud
  alternatives_spanish:
  - de la excelencia
  - de la excelencia moral
  lexicon: LSJ
  rationale: En 4 Macabeos, ἀρετή pertenece al campo moral-filosófico. «Virtud» es la forma más directa y reconocible en español para ese sentido.
- source_word: ἀναίτιως
  english_pob_choice: without cause / unjustly
  chosen_spanish: injustamente
  alternatives_spanish:
  - sin causa
  - sin justificación
  - sin culpa
  lexicon: LSJ
  rationale: La revisión inglesa privilegia la naturalidad de «unjustly» manteniendo la idea de ausencia de causa válida. «Injustamente» refleja bien esa carga en español; se conserva la posibilidad semántica de «sin causa» en nota.
- source_word: ἀποκτεῖναι
  english_pob_choice: for having ... put to death
  chosen_spanish: por haber dado muerte
  alternatives_spanish:
  - por haber matado
  - por matar
  - por haber hecho morir
  lexicon: LSJ
  rationale: El infinitivo de aoristo funciona causalmente en la denuncia. «Por haber dado muerte» es sobrio y mantiene la gravedad del acto sin suavizarlo.
theological_decisions:
- issue: ἀρετή en contexto martirial helenístico
  english_pob_reading: virtue
  chosen_spanish_reading: virtud
  alternative_spanish_readings:
  - excelencia
  - excelencia moral
  rationale: Se conserva el término filosófico-moral del libro, sin trasladarlo a un vocabulario doctrinal posterior. En español «virtud» mantiene la red semántica de 4 Macabeos.
  doctrine_reference: 'Translation philosophy: original-language primacy; consistency of key terms, or documented exception.'
- issue: 'ἀναίτιως: relación entre culpa, causa y juicio'
  english_pob_reading: unjustly / without cause
  chosen_spanish_reading: injustamente
  alternative_spanish_readings:
  - sin causa
  - sin justificación
  rationale: El español necesita una opción fluida que conserve la idea de ausencia de motivo legítimo. «Injustamente» transmite la evaluación moral/jurídica implicada por el griego.
  doctrine_reference: 'Translation philosophy: original-language primacy; consistency of key terms, or documented exception.'
translation_notes:
  revision_awareness: La revisión inglesa final cambió «miserably» por «bitterly» y «without cause» por «unjustly». La redacción española sigue esa decisión final con «amargamente» e «injustamente», sin perder la posibilidad semántica literal del griego, preservada en nota.
  spanish_consistency_notes:
  - Se mantiene «virtud» para ἀρετή, coherente con el audit trail inglés y con el registro filosófico-moral de 4 Macabeos.
  - Se conserva el valor honorífico de ἀγωνιστής mediante «campeones», evitando una traducción demasiado literal que sonaría extraña en español.
  - No se usa «Cristo», «Señor» ni terminología ajena al texto; el versículo no contiene léxico teológico que requiera adaptación doctrinal.
  - El orden español sigue el contraste inicial del griego y el complemento causal final, con una puntuación clara y publicable.
