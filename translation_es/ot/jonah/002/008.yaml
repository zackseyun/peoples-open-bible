    text: Or 'When my soul grew faint within me.' Hebrew nephesh can mean 'life,' 'soul,' or 'self' depending on context.
    reason: lexical_alternative
  - marker: b
    text: Or 'to your holy palace/sanctuary.' The Hebrew term can denote a royal palace or temple; here 'temple' fits the prayer context.
    reason: lexical_alternative
