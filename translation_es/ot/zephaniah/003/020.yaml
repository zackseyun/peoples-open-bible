translation:
  language: es
  text: En aquel tiempo yo los haré entrar[a], y en aquel tiempo los reuniré; porque haré de ustedes un nombre y una alabanza entre todos los pueblos de la tierra, cuando yo restaure sus fortunas[b] ante sus propios ojos, dice Yahvé.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, más literalmente, ‘los haré volver’ o ‘los traeré’. El hebreo permite una idea de retorno/restauración además de la de traer o introducir.
    reason: lexical_alternative
  - marker: b
    text: O, más literalmente, ‘cuando yo haga volver su cautiverio’ o ‘cuando yo traiga de vuelta a sus cautivos’. El giro hebreo expresa de manera amplia la restauración de quienes sufrieron exilio o calamidad.
    reason: lexical_alternative
lexical_decisions:
- source_word: בָּעֵת הַהִיא
  english_pob_choice: At that time
  chosen_spanish: En aquel tiempo
  alternatives_spanish:
  - En ese tiempo
  - Entonces
  lexicon: HALOT
  rationale: La fórmula temporal profética se conserva de manera natural en español con ‘En aquel tiempo’, que mantiene el valor de marco escatológico sin sonar rígido.
- source_word: אָבִיא אֶתְכֶם
  english_pob_choice: I will bring you in
  chosen_spanish: yo los haré entrar
  alternatives_spanish:
  - yo los traeré
  - yo los haré volver
  lexicon: HALOT
  rationale: El verbo causativo permite ‘hacer entrar’, que refleja bien el matiz de introducir o llevar de vuelta a un estado/restauración, sin añadir de forma obligatoria el adverbio ‘volver’ que no está explícito en el hebreo.
- source_word: וּבָעֵת קַבְּצִי אֶתְכֶם
  english_pob_choice: and at that time I will gather you
  chosen_spanish: y en aquel tiempo los reuniré
  alternatives_spanish:
  - y en aquel tiempo los juntar é
  - y cuando los reúna
  lexicon: HALOT
  rationale: ‘Reunir’ comunica el sentido de קבץ con naturalidad en español y conserva el paralelismo con la frase temporal repetida en el hebreo y en la revisión inglesa.
- source_word: אֶתֵּן אֶתְכֶם לְשֵׁם וְלִתְהִלָּה
  english_pob_choice: I will make you a name and a praise
  chosen_spanish: haré de ustedes un nombre y una alabanza
  alternatives_spanish:
  - los pondré como renombre y alabanza
  - los haré famosos y alabados
  lexicon: HALOT
  rationale: La frase hebrea es idiomática; ‘hacer de ustedes un nombre y una alabanza’ conserva la imagen de conferir renombre y honor sin suavizarla excesivamente.
- source_word: בְּכֹל עַמֵּי הָאָרֶץ
  english_pob_choice: among all the peoples of the earth
  chosen_spanish: entre todos los pueblos de la tierra
  alternatives_spanish:
  - entre todos los pueblos de la tierra
  - entre todas las naciones de la tierra
  lexicon: HALOT
  rationale: ‘Pueblos’ preserva עמים en plural y ‘de la tierra’ mantiene la amplitud contextual del hebreo, siguiendo la lectura global del contexto profético.
- source_word: בְּשׁוּבִי אֶת שְׁבוּתֵיכֶם
  english_pob_choice: when I restore your fortunes
  chosen_spanish: cuando yo restaure sus fortunas
  alternatives_spanish:
  - cuando yo restaure su cautiverio
  - cuando yo los traiga de vuelta
  lexicon: HALOT
  rationale: 'Se mantiene la decisión idiomática de la POB inglesa: ‘restaurar sus fortunas’ expresa el sentido amplio de restauración del giro hebreo שוב שׁבות sin reducirlo solo al cautiverio.'
- source_word: לְעֵינֵיכֶם
  english_pob_choice: before your eyes
  chosen_spanish: ante sus propios ojos
  alternatives_spanish:
  - a sus ojos
  - en su presencia
  lexicon: HALOT
  rationale: La expresión idiomática se vierte con ‘ante sus propios ojos’, que comunica visibilidad y testimonio directo de la restauración.
- source_word: אָמַר יְהוָה
  english_pob_choice: says Yahweh
  chosen_spanish: dice Yahvé
  alternatives_spanish:
  - declara Yahvé
  - dice el SEÑOR
  lexicon: HALOT
  rationale: 'Se sigue la terminología del proyecto para el Nombre divino: ‘Yahvé’ en lugar de ‘SEÑOR’, y la fórmula profética ‘dice’ para el cierre oracular.'
theological_decisions:
- issue: Renderización del Nombre divino יְהוָה
  english_pob_reading: says Yahweh
  chosen_spanish_reading: dice Yahvé
  alternative_spanish_readings:
  - dice el SEÑOR
  - declara Yahvé
  rationale: El texto hebreo usa explícitamente el Tetragrámaton; el proyecto pide ‘Yahvé’ en el texto principal. ‘Dice’ conserva la fórmula profética estándar sin borrar el nombre propio divino.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Sentido del giro שׁוּב שְׁבוּת
  english_pob_reading: restore your fortunes
  chosen_spanish_reading: restaure sus fortunas
  alternative_spanish_readings:
  - restaure su cautiverio
  - los haga volver de su cautiverio
  rationale: La POB inglesa optó por el sentido idiomático amplio de restauración. En español, ‘fortunas’ conserva ese alcance, aunque suene algo más literario; se evita reducir la frase solo a retorno físico del exilio.
  doctrine_reference: DOCTRINE.md Translation philosophy §1, §5
- issue: Posible tensión entre 'traer' y 'reunir' en el paralelismo
  english_pob_reading: I will bring you in ... I will gather you
  chosen_spanish_reading: yo los haré entrar ... los reuniré
  alternative_spanish_readings:
  - los traeré ... los juntar é
  - los haré volver ... los reuniré
  rationale: 'Se mantiene la distinción paralela del hebreo: un primer movimiento de ingreso/restauración y un segundo de recolección. Evitar una sola solución uniforme ayuda a preservar la progresión poética.'
  doctrine_reference: DOCTRINE.md Translation philosophy §1
translation_notes:
  revision_awareness: La revisión inglesa más reciente ajustó la segunda cláusula para repetir con mayor claridad ‘at that time’. El español refleja ese paralelismo con la repetición de ‘en aquel tiempo’. También se preserva el enfoque idiomático de ‘restore your fortunes’ y la decisión de traducir el Nombre divino como Yahweh/Yahvé según el marco del proyecto.
  spanish_consistency_notes:
  - Se usa ‘Yahvé’ para יְהוָה conforme al estándar del proyecto.
  - Se mantiene ‘pueblos’ para עַמֵּי y ‘tierra’ para הָאָרֶץ, evitando ‘naciones’ para no borrar el matiz léxico de amos/pueblos.
  - ‘Ante sus propios ojos’ conserva la visibilidad pública del acto divino.
  - El texto evita ‘SEÑOR’ como sustituto del Nombre divino en la línea principal.
  - Se conserva la paralelismo temporal con dos ocurrencias de ‘en aquel tiempo’.
