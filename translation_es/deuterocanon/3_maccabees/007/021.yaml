translation:
  language: es
  text: cada uno a su lugar de antes[a], habiendo obtenido autoridad sobre sus enemigos con gloria y temor, sin que ninguna de sus posesiones fuera perturbada en absoluto[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El griego está muy comprimido y resulta algo difícil. «A su lugar de antes» expresa el sentido probable de retorno o restauración, aunque también podría entenderse como «a lo que antes era suyo» o «a la posición anterior».
    reason: alternative_reading
  - marker: b
    text: 'También puede entenderse: «sin que ninguna de sus posesiones fuera perturbada por nadie» o «sin que ninguna de sus posesiones fuera sacudida». El sentido general es que nada de lo suyo fue dañado o alterado.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἕκαστος
  english_pob_choice: each one
  chosen_spanish: cada uno
  alternatives_spanish:
  - cada uno de ellos
  - uno por uno
  lexicon: LSJ
  rationale: El distributivo singular se conserva mejor con «cada uno», que mantiene el énfasis individual del griego sin añadir interpretación.
- source_word: εἰς τὴν ἔμπροσθεν
  english_pob_choice: to his former place
  chosen_spanish: a su lugar anterior
  alternatives_spanish:
  - al lugar de antes
  - a lo que antes era suyo
  - a su posición anterior
  lexicon: LSJ
  rationale: La expresión es elíptica en griego. En español, «lugar anterior» comunica de forma natural la idea de retorno/restauración sin forzar un calco demasiado duro.
- source_word: ἐν τοῖς ἐχθροῖς
  english_pob_choice: over their enemies
  chosen_spanish: sobre sus enemigos
  alternatives_spanish:
  - entre sus enemigos
  - en relación con sus enemigos
  lexicon: LSJ
  rationale: La relación aquí es de dominio o superioridad, no meramente locativa. «Sobre sus enemigos» refleja mejor el estado de autoridad en el contexto.
- source_word: ἐξουσίαν ἐσχηκότες
  english_pob_choice: having obtained authority
  chosen_spanish: habiendo obtenido autoridad
  alternatives_spanish:
  - habiendo tenido autoridad
  - habiendo alcanzado poder
  - habiendo conseguido dominio
  lexicon: BDAG
  rationale: «Autoridad» es la correspondencia más directa de ἐξουσία. El participio perfecto se vierte con «habiendo obtenido» para conservar el estado resultante.
- source_word: μετὰ δόξης καὶ φόβου
  english_pob_choice: with glory and fear
  chosen_spanish: con gloria y temor
  alternatives_spanish:
  - con honor y temor
  - con esplendor y temor
  - con gloria y miedo
  lexicon: LSJ
  rationale: Se mantienen ambos sustantivos sin interpretarlos. «Temor» conserva mejor la ambigüedad del griego que «miedo», y deja abierta la pregunta de si el temor recae sobre ellos o acompaña su estado.
- source_word: τὸ σύνολον
  english_pob_choice: their whole body of possessions
  chosen_spanish: toda la totalidad
  alternatives_spanish:
  - el total
  - la totalidad entera
  - todo el conjunto
  lexicon: LSJ
  rationale: El griego es muy comprimido. En español conviene expresar la fuerza colectiva con una construcción natural que prepare la referencia a las posesiones que sigue en el genitivo.
- source_word: ὑπὸ μηδενὸς διασεισθέντες
  english_pob_choice: having been disturbed by none
  chosen_spanish: sin que ninguna... hubiera sido en absoluto perturbada
  alternatives_spanish:
  - sin haber sido perturbadas por nadie
  - no habiendo sido sacudidas por nadie
  - sin que nadie las hubiera alterado
  lexicon: LSJ
  rationale: El participio significa literalmente «sacudidas/perturbadas». En este contexto de bienes conservados, «perturbada» comunica la idea de no haber sufrido alteración ni daño, sin perder el núcleo semántico.
- source_word: τῶν ὑπαρχόντων
  english_pob_choice: of possessions
  chosen_spanish: de sus posesiones
  alternatives_spanish:
  - de sus bienes
  - de su propiedad
  - de lo que poseían
  lexicon: LSJ
  rationale: Ὑπάρχοντα se usa aquí en sentido de bienes/posesiones. «Posesiones» es claro y fiel; el posesivo se añade por el contexto del genitivo de pertenencia.
translation_notes:
  revision_awareness: La redacción española sigue la revisión más reciente del inglés auditado, especialmente la corrección de ἐν τοῖς ἐχθροῖς ἐξουσίαν ἐσχηκότες como una relación de autoridad sobre los enemigos, y de la cláusula final para reflejar que ninguna de las posesiones fue perturbada o alterada.
  spanish_consistency_notes:
  - Se mantiene «autoridad» para ἐξουσία en lugar de «poder», por ser más preciso y menos interpretativo.
  - Se conserva «gloria y temor»/«gloria y temor» como par de sustantivos no explicados, preservando la tensión semántica del original.
  - No se usa «SEÑOR» ni terminología teológica ajena al pasaje, ya que no hay aquí referencias directas al nombre divino ni a títulos cristológicos.
