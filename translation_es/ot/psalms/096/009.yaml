translation:
  language: es
  text: Adoren a Yahvé en el esplendor de la santidad[a]; tiemblen delante de él, toda la tierra.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «en vestiduras santas» o «en santa hermosura». La frase hebrea puede referirse tanto al esplendor propio de la santidad como a un adorno o atuendo sagrado para la adoración.'
    reason: alternative_reading
lexical_decisions:
- source_word: הִשְׁתַּחֲו֣וּ
  english_pob_choice: Worship
  chosen_spanish: Adoren
  alternatives_spanish:
  - Postrense
  - Rindan adoración
  lexicon: HALOT
  rationale: El hebreo expresa inclinarse/postrarse en acto de reverencia y culto. En español, 'adoren' comunica de forma natural el imperativo cultual sin perder la idea de reverencia; 'postrense' es más físico pero menos idiomático como mandato litúrgico general.
- source_word: לַיהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  - el SEÑOR
  lexicon: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
  rationale: Se preserva el nombre divino con la forma española establecida por el proyecto, 'Yahvé', en lugar de enmascararlo con 'SEÑOR'. Es la opción más transparente y auditable para el Tetragrámaton.
- source_word: בְּהַדְרַת
  english_pob_choice: in the splendor of
  chosen_spanish: en la hermosura de
  alternatives_spanish:
  - en el esplendor de
  - en la belleza de
  lexicon: HALOT
  rationale: הדר puede implicar esplendor, majestad o adorno. 'Hermosura' en español conserva el matiz estético y digno, y funciona bien con 'santidad' sin forzar una lectura demasiado técnica.
- source_word: קֹדֶשׁ
  english_pob_choice: holiness
  chosen_spanish: la santidad
  alternatives_spanish:
  - la santidad santa
  - la santidad/lo sagrado
  - la santidad
  lexicon: HALOT
  rationale: Aquí קֹדֶשׁ funciona de modo abstracto con הדרת. 'Santidad' preserva la cualidad sagrada sin resolver en exceso si la frase apunta a vestiduras, adorno sacro o a la belleza propia de la santidad.
- source_word: חִ֥ילוּ
  english_pob_choice: tremble
  chosen_spanish: tiemblen
  alternatives_spanish:
  - teman
  - estremezcan
  - tremen
  lexicon: HALOT
  rationale: El verbo puede abarcar temblor, agitación reverente o angustia. 'Tiemblen' conserva la respuesta corporal y emocional ante la presencia divina y suena natural en español bíblico contemporáneo.
- source_word: מִפָּנָיו
  english_pob_choice: before him
  chosen_spanish: delante de él
  alternatives_spanish:
  - ante él
  - en su presencia
  - frente a él
  lexicon: HALOT
  rationale: La expresión idiomática española 'delante de él' comunica la proximidad reverente de manera clara y fiel al hebreo 'de delante de su rostro/presencia'.
- source_word: כָּל הָאָרֶץ
  english_pob_choice: all the earth
  chosen_spanish: toda la tierra
  alternatives_spanish:
  - toda la tierra
  - toda la tierra habitada
  - el mundo entero
  lexicon: HALOT
  rationale: La fórmula universal del salmo se expresa naturalmente como 'toda la tierra'. Mantiene el alcance cósmico y evita estrecharla a 'la tierra' en sentido local.
theological_decisions:
- issue: Forma de traducir el nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - el SEÑOR
  rationale: El texto hebreo usa directamente el nombre del pacto. El español del proyecto adopta 'Yahvé' para mantener transparencia textual y evitar el reemplazo litúrgico por una convención de ocultamiento.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Ambigüedad de בְּהַדְרַת קֹדֶשׁ
  english_pob_reading: in the splendor of holiness
  chosen_spanish_reading: en la hermosura de la santidad
  alternative_spanish_readings:
  - en el esplendor de la santidad
  - en vestiduras santas
  - en santa hermosura
  rationale: El hebreo puede describir la belleza inherente a la santidad o un adorno/atuendo sagrado. La redacción principal conserva esa amplitud poética sin cerrar indebidamente la tensión; la nota mantiene la alternativa de vestidura/adorno.
  doctrine_reference: 'DOCTRINE.md Translation philosophy §3: Preserve theological tension rather than resolve it'
translation_notes:
  revision_awareness: La revisión más reciente marcó el texto como sin cambios necesarios; el presente borrador sigue esa lectura de alta concordancia y conserva la ambigüedad reconocida en בְּהַדְרַת קֹדֶשׁ mediante una nota en lugar de resolverla por completo.
  spanish_consistency_notes:
  - Se mantiene Yahvé como forma del nombre divino conforme al estándar del proyecto.
  - Se evita 'SEÑOR' como máscara litúrgica para no perder transparencia con el hebreo.
  - '''Tiemblen'' conserva el matiz reverente y temeroso de חִילוּ mejor que una paráfrasis emocional.'
  - '''Toda la tierra'' preserva el alcance universal del mandato.'
  - La nota [a] está anclada en la frase 'la hermosura de la santidad' porque allí reside la ambigüedad léxica relevante.
