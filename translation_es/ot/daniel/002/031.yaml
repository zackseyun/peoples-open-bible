translation:
  language: es
  text: Tú, rey, estabas mirando, y he aquí que había una sola gran estatua[a]. Esa estatua era inmensa, y su esplendor era extraordinario[b]; estaba de pie delante de ti, y su aspecto era aterrador[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Arameo צְלֵם puede traducirse como 'imagen' o 'estatua'; aquí se prefiere 'estatua' porque el contexto presenta una figura visible, grande y erguida ante el rey.
    reason: lexical_alternative
  - marker: b
    text: O 'su brillo era extraordinario'. El término resalta el resplandor o esplendor excepcional de la figura.
    reason: lexical_alternative
  - marker: c
    text: O 'su aspecto era temible'. El arameo describe una apariencia que provoca temor.
    reason: lexical_alternative
lexical_decisions:
- source_word: אַ֣נְתְּה
  english_pob_choice: You
  chosen_spanish: Tú
  alternatives_spanish:
  - Tú mismo
  lexicon: HALOT
  rationale: Pronombre de segunda persona singular dirigido directamente al rey. En español conviene mantener la dirección personal con 'Tú'; el matiz enfático de 'Tú mismo' no es necesario aquí.
- source_word: מַלְכָּא
  english_pob_choice: O king
  chosen_spanish: oh rey
  alternatives_spanish:
  - rey
  lexicon: HALOT
  rationale: Es vocativo. 'Oh rey' conserva el tono de dirección cortesana y evita la pérdida de la fuerza apelativa que tendría solo 'rey'.
- source_word: חָזֵה הֲוַיְתָ
  english_pob_choice: were watching
  chosen_spanish: estabas mirando
  alternatives_spanish:
  - veías
  - estabas viendo
  lexicon: HALOT
  rationale: El participio con auxiliar expresa acción en curso en pasado. 'Estabas mirando' reproduce bien esa duración y es natural en español.
- source_word: וַאֲלוּ
  english_pob_choice: and behold
  chosen_spanish: y he aquí
  alternatives_spanish:
  - y mira
  - y mira, he aquí
  lexicon: HALOT
  rationale: Fórmula deíctica que introduce una aparición inesperada en la visión. 'Y he aquí' es solemne y fiel al valor de introducción súbita.
- source_word: צְלֵם חַד שַׂגִּיא
  english_pob_choice: a single great statue
  chosen_spanish: una sola gran estatua
  alternatives_spanish:
  - una sola gran imagen
  - una imagen enorme
  lexicon: HALOT
  rationale: צְלֵם puede ser 'imagen' o 'estatua'; aquí 'estatua' comunica mejor la figura visible y monumental. חַד se rinde con 'una sola' para mantener la unicidad, y שַׂגִּיא con 'gran'.
- source_word: צַלְמָא דִּכֵּן
  english_pob_choice: That statue
  chosen_spanish: Esa estatua
  alternatives_spanish:
  - Aquella estatua
  - Esta estatua
  lexicon: HALOT
  rationale: Retoma la figura recién presentada. 'Esa estatua' conserva la referencia anafórica natural en español sin perder el valor demostrativo.
- source_word: רַב
  english_pob_choice: immense
  chosen_spanish: inmensa
  alternatives_spanish:
  - grande
  - enorme
  lexicon: HALOT
  rationale: Segundo adjetivo de tamaño que intensifica al anterior. 'Inmensa' evita repetir 'grande' y reproduce la ampliación de escala.
- source_word: וְזִיוֵהּ יַתִּיר
  english_pob_choice: and its splendor was extraordinary
  chosen_spanish: y su esplendor era extraordinario
  alternatives_spanish:
  - y su brillo era extraordinario
  - y su resplandor era superior
  lexicon: HALOT
  rationale: זִיו denota brillo, resplandor o esplendor. 'Esplendor' expresa dignidad visual sin reducirlo solo a luminosidad; יַתִּיר se vierte como 'extraordinario' para la idea de excedencia.
- source_word: קָאֵם לְקָבְלָךְ
  english_pob_choice: was standing before you
  chosen_spanish: estaba en pie delante de ti
  alternatives_spanish:
  - estaba de pie frente a ti
  - estaba de pie ante ti
  lexicon: HALOT
  rationale: El participio describe una escena estática. 'Estaba en pie delante de ti' es idiomático y preserva la ubicación frente al rey.
- source_word: וְרֵוֵהּ דְּחִיל
  english_pob_choice: and its appearance was terrifying
  chosen_spanish: y su aspecto era terrible
  alternatives_spanish:
  - y su apariencia era espantosa
  - y su aspecto inspiraba temor
  lexicon: HALOT
  rationale: רֵו puede referirse a apariencia o aspecto; דְּחִיל expresa algo que produce temor. 'Terrible' mantiene la fuerza semántica clásica y clara en español.
theological_decisions:
- issue: Cómo traducir צְלֵם en un contexto de sueño/visión real sin desactivar su concreción visual.
  english_pob_reading: statue
  chosen_spanish_reading: estatua
  alternative_spanish_readings:
  - imagen
  - ídolo
  rationale: El contexto describe una figura grande, visible y erguida ante el rey. 'Estatua' refleja mejor la concreción física que 'imagen'; 'ídolo' introduciría una carga interpretativa no indicada por el verso mismo.
  doctrine_reference: Daniel 2:31; léxico arameo contextual
- issue: 'Cómo expresar la fuerza del doble lenguaje de tamaño y magnificencia: שַׂגִּיא y רַב; זִיוֵהּ יַתִּיר.'
  english_pob_reading: single great statue... immense... its splendor was extraordinary
  chosen_spanish_reading: una sola gran estatua... inmensa... su esplendor era extraordinario
  alternative_spanish_readings:
  - una gran estatua... muy grande...
  - una enorme estatua... resplandeciente
  rationale: 'La repetición de adjetivos no debe aplanarse. Se mantiene la progresión: ''una sola gran estatua'' / ''inmensa'' / ''esplendor extraordinario'', reflejando el énfasis acumulativo del arameo.'
  doctrine_reference: Daniel 2:31; principio de equivalencia óptima
- issue: Cómo rendir דְּחִיל sin suavizar el efecto emocional del final.
  english_pob_reading: terrifying
  chosen_spanish_reading: terrible
  alternative_spanish_readings:
  - espantoso
  - atemorizante
  rationale: '''Terrible'' conserva el impacto de algo que infunde temor y es natural en español bíblico actual. Evita tanto la debilidad de ''impresionante'' como una paráfrasis excesiva.'
  doctrine_reference: Daniel 2:31; semántica de miedo en arameo
translation_notes:
  revision_awareness: 'La redacción española sigue la revisión más reciente del inglés auditado: ''a single great statue'', con la secuencia reordenada para reflejar con claridad la acumulación del arameo: tamaño, esplendor, posición y apariencia temible. Se evitó reducir ''חד'' a un artículo simple, y se preservó la distinción entre tamaño (''gran'', ''inmensa'') y cualidad visual (''esplendor extraordinario'').'
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' como norma del proyecto, pero este verso no contiene el tetragrámaton ni κύριος divino.
  - '''Estatua'' se usa de forma consistente para צְלֵם en este contexto visionario.'
  - '''Aspecto'' y ''esplendor'' distinguen bien apariencia general y brillo/majestad visual.'
  - La puntuación separa claramente las cláusulas, siguiendo la sintaxis del original sin sobrecargarla.
