translation:
  language: es
  text: El cuerpo de un hombre es vanidad[a], pero un nombre de bondad no será cortado.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Paralelo griego: «el nombre de los pecadores no será borrado como bueno» (o «para bien»). El testimonio hebreo, en cambio, dice: «un nombre de bondad no será cortado».'
    reason: alternative_reading
lexical_decisions:
- source_word: הבל
  english_pob_choice: vanity
  chosen_spanish: vanidad
  alternatives_spanish:
  - vapor
  - aliento
  - vaciedad
  lexicon: HALOT
  rationale: En sabiduría, הבל expresa fugacidad e insustancialidad. «Vanidad» conserva esa carga proverbial en español y mantiene la fuerza del contraste con el cuerpo humano.
- source_word: אדם
  english_pob_choice: a man
  chosen_spanish: un hombre
  alternatives_spanish:
  - un ser humano
  - la humanidad
  lexicon: HALOT
  rationale: El hebreo está en singular proverbial. Se conserva el singular personal «un hombre» para respetar la forma del dicho, sin volverlo un plural abstracto.
- source_word: בגויתו
  english_pob_choice: body
  chosen_spanish: en su cuerpo
  alternatives_spanish:
  - en su cadáver
  - en su figura
  lexicon: HALOT
  rationale: גויה puede significar cuerpo o cadáver. Aquí, como en la lectura de apoyo griega σῶμασιν, «cuerpo» es la opción más natural y menos específica que «cadáver».
- source_word: אך
  english_pob_choice: but
  chosen_spanish: pero
  alternatives_spanish:
  - sin embargo
  - mas
  lexicon: HALOT
  rationale: La función discursiva es adversativa. «Pero» comunica con claridad el contraste entre la condición corporal pasajera y el nombre perdurable.
- source_word: שם
  english_pob_choice: name
  chosen_spanish: nombre
  alternatives_spanish:
  - reputación
  - renombre
  lexicon: HALOT
  rationale: «Nombre» es literal y bíblicamente resonante; en contexto deja entender la idea de reputación sin sobreinterpretarla.
- source_word: חסד
  english_pob_choice: kindness / gracious
  chosen_spanish: bondad
  alternatives_spanish:
  - gracia
  - benevolencia
  - misericordia
  lexicon: HALOT
  rationale: חסד puede abarcar bondad, lealtad, benevolencia o gracia. Aquí, unido a «nombre», su valor humano y positivo se expresa con «bondad», evitando imponer un matiz más técnico o específicamente covenantal.
- source_word: לא יכרת
  english_pob_choice: will not be cut off
  chosen_spanish: no será borrado
  alternatives_spanish:
  - no será cortado
  - no perecerá
  lexicon: HALOT
  rationale: La imagen básica es de eliminación o desaparición. En español, «no será borrado» transmite bien el sentido idiomático y armoniza con la variante griega preservada en la nota.
theological_decisions:
- issue: Divergencia entre el hebreo conservado y el paralelo griego en la segunda cola
  english_pob_reading: 'Follow the Hebrew: ''a name of kindness will not be cut off'''
  chosen_spanish_reading: 'seguir el hebreo: «un nombre de bondad no será borrado»'
  alternative_spanish_readings:
  - «el nombre de los pecadores no será borrado para bien»
  - «el nombre de los pecadores no será borrado como bueno»
  rationale: El hebreo está atestiguado con alta confianza y ofrece una sentencia positiva sobre la permanencia de un nombre caracterizado por la bondad. El griego presenta una formulación distinta y negativa; se conserva la tensión en la nota sin armonizarla artificialmente.
  doctrine_reference: 'PHILOSOPHY.md: where the Hebrew survives with high confidence, it governs; preserve meaningful textual tension.'
translation_notes:
  revision_awareness: La redacción española sigue el testimonio hebreo como texto principal, pero refleja en la nota la tensión documentada con el paralelo griego. Se prefirió «no será borrado» por su naturalidad en español y por su cercanía a la imagen de eliminación; la nota preserva la alternativa de «no será cortado» implícita en el hebreo y la variante griega con «borrado».
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» fuera del texto porque este versículo no contiene el nombre divino.
  - Se evitó «Cristo»/«Mesías» porque no aparece ningún término mesiánico.
  - Se preservó el singular proverbial con «un hombre» y no se generalizó a plural.
  - La elección de «bondad» busca ser transparente al hebreo חסד sin cargar el verso con una terminología más técnica que podría sonar menos natural en español.
