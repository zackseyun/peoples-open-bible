id: 1TI.3.6
reference: 1 Timothy 3:6
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: μὴ νεόφυτον, ἵνα μὴ τυφωθεὶς εἰς κρίμα ἐμπέσῃ τοῦ διαβόλου.
base_translation:
  language: en
  yaml_path: translation/nt/1_timothy/003/006.yaml
  text: He must not be a recent convert[a], so that he may not become puffed up and fall into the judgment of the devil.
  footnotes:
  - marker: a
    text: Or 'fall into the same condemnation as the devil'; alternatively, 'fall under judgment associated with the devil.'
    reason: alternative_reading
translation:
  language: ko
  text: 새로 믿은 사람이어서는 안 됩니다. 그렇지 않으면 교만해져서 마귀의 정죄[a]에 빠질 수 있기 때문입니다.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 또는 「마귀가 받은 동일한 정죄에 빠질」; 또는 「마귀와 결부된 심판 아래 떨어질」.
    reason: alternative_reading
lexical_decisions:
- source_word: μὴ νεόφυτον
  english_pob_choice: not a recent convert
  chosen_korean: 새로 믿은 사람이어서는 안 됩니다
  alternatives_korean:
  - 갓 회심한 사람이어서는
  - 신참 신자여서는
  lexicon: BDAG
  rationale: νεόφυτος는 「새로 심긴 자」 — 새로 신앙에 들어선 자. 한국 교회 어휘 「새로 믿은 사람」.
- source_word: τυφωθεὶς
  english_pob_choice: puffed up
  chosen_korean: 교만해져서
  alternatives_korean:
  - 우쭐해져서
  - 거만해져서
  lexicon: BDAG
  rationale: τυφόομαι는 「자만에 부풀어 오르다」. 「교만해져서」가 자연스럽다.
- source_word: εἰς κρίμα ἐμπέσῃ τοῦ διαβόλου
  english_pob_choice: fall into the judgment of the devil
  chosen_korean: 마귀의 정죄에 빠질
  alternatives_korean:
  - 마귀에게 내려진 정죄에 떨어질
  - 마귀와 같은 심판에 빠질
  lexicon: BDAG
  rationale: 속격 「마귀의」가 (1) 마귀가 받은 정죄 또는 (2) 마귀가 부추긴 정죄 둘 다 가능. 모호함은 각주.
