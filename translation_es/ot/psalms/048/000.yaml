translation:
  language: es
  text: Un canto, un salmo, de[a] los hijos de Coré.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «para los hijos de Coré». La preposición hebrea puede indicar asociación, autoría, dedicación o contexto de interpretación en los encabezados de los salmos.
    reason: alternative_reading
lexical_decisions:
- source_word: שִׁיר
  english_pob_choice: song
  chosen_spanish: canto
  alternatives_spanish:
  - canción
  - himno
  lexicon: HALOT
  rationale: En un encabezado de salmo, שִׁיר nombra una pieza poética o musical. «Canto» conserva el valor genérico de composición cantada y suena natural en español bíblico sin volverlo más litúrgico de lo que permite el hebreo.
- source_word: מִזְמוֹר
  english_pob_choice: psalm
  chosen_spanish: salmo
  alternatives_spanish:
  - salmodia
  - poema
  lexicon: HALOT
  rationale: El término es el rótulo de género ya establecido en español bíblico. Mantener «salmo» preserva la distinción de género entre שִׁיר y מִזְמוֹר, como hace la versión inglesa de referencia con «song» y «psalm».
- source_word: לִבְנֵי
  english_pob_choice: of the sons of
  chosen_spanish: de
  alternatives_spanish:
  - para
  - a
  - perteneciente a
  lexicon: HALOT
  rationale: La preposición ל en estos títulos puede señalar asociación, dedicación, autoría o destino interpretativo. «De» conserva mejor esa amplitud en español que «para», que estrecharía demasiado el sentido.
- source_word: קֹרַח
  english_pob_choice: Korah
  chosen_spanish: Coré
  alternatives_spanish:
  - Korah
  - Cora
  lexicon: HALOT
  rationale: En español bíblico, el nombre se expresa normalmente como «Coré». Es la forma convencional y claramente reconocible para lectores de la Biblia en español.
theological_decisions:
- issue: Función de la expresión לִבְנֵי קֹרַח
  english_pob_reading: of the sons of Korah
  chosen_spanish_reading: de los hijos de Coré
  alternative_spanish_readings:
  - para los hijos de Coré
  - de parte de los hijos de Coré
  rationale: La expresión no obliga a decidir entre autoría, dedicación o ejecución. «De los hijos de Coré» mantiene la ambigüedad semántica del hebreo y evita imponer una relación más específica de la que el texto prueba.
  doctrine_reference: Translation philosophy §3, §5
translation_notes:
  revision_awareness: 'Se atendió la observación del expediente en inglés: el marcador de nota se coloca sobre la preposición correspondiente en español («de») para que la nota explique la ambigüedad de ל y no un elemento distinto. La redacción española conserva el paralelismo del encabezado: dos designaciones genéricas seguidas de la afiliación a los hijos de Coré.'
  spanish_consistency_notes:
  - Se mantiene «salmo» como término de género técnico.
  - Se usa «Coré» por convención bíblica en español.
  - La nota [a] se ancla en la preposición «de» para reflejar la ambigüedad del hebreo ל.
