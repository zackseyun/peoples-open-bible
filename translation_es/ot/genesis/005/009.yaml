translation:
  language: es
  text: Enosh vivió noventa años y fue padre de Kenan[a][b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: La expresión «fue padre de» comunica de manera natural en español moderno el valor genealógico del verbo hebreo; una alternativa más tradicional es «engendró».
    reason: lexical_alternative
  - marker: b
    text: El nombre «Kenan» sigue la forma hebrea del texto masorético. La tradición griega y algunas versiones antiguas reflejan «Cainan».
    reason: alternative_reading
lexical_decisions:
- source_word: וַיְחִי
  english_pob_choice: lived
  chosen_spanish: vivió
  alternatives_spanish:
  - vivió durante
  - estuvo vivo
  lexicon: HALOT
  rationale: En fórmulas genealógicas con edad, חיה en wayyiqtol expresa la duración de la vida hasta un punto concreto. En español, «vivió» reproduce naturalmente ese valor temporal sin añadir paráfrasis.
- source_word: אֱנוֹשׁ
  english_pob_choice: Enosh
  chosen_spanish: Enós
  alternatives_spanish:
  - Enosh
  - Enos
  lexicon: transliteración hebrea estándar
  rationale: El texto hebreo permite una transliteración directa. «Enós» conserva la forma hebrea y es legible en español bíblico; «Enosh» refleja más literalmente la vocalización, pero resulta menos asentado en español.
- source_word: תִּשְׁעִים שָׁנָה
  english_pob_choice: ninety years
  chosen_spanish: noventa años
  alternatives_spanish:
  - noventa año(s)
  lexicon: HALOT
  rationale: 'La expresión de edad en hebreo se expresa de manera idiomática en español como plural: «noventa años». No conviene mantener el singular de שָׁנָה porque sonaría ajeno al uso normal del español.'
- source_word: וַיּוֹלֶד
  english_pob_choice: fathered
  chosen_spanish: engendró
  alternatives_spanish:
  - fue padre de
  - engendró a
  lexicon: HALOT
  rationale: En genealogías, ילד en hifil indica causar el nacimiento de un descendiente. «Engendró» conserva la fuerza genealógica y la brevedad del hebreo; «fue padre de» es claro, pero menos conciso.
- source_word: קֵינָן
  english_pob_choice: Kenan
  chosen_spanish: Kenán
  alternatives_spanish:
  - Cainan
  lexicon: transliteración hebrea estándar
  rationale: El hebreo masorético lee קֵינָן, por lo que la forma base en español es «Kenán». Se conserva la variante tradicional «Cainan» solo como posibilidad histórica, pero no como texto principal.
translation_notes:
  revision_awareness: 'El hebreo y la auditoría inglesa concuerdan en una lectura genealógica simple: Enosh/Enós vivió noventa años y fue padre de Kenan/Kenán. No hay revisiones textuales ni cambios de sentido relevantes en el expediente, así que la traducción española sigue de cerca el valor lexical y sintáctico del original.'
  spanish_consistency_notes:
  - 'Se mantiene el nombre propio con acentuación española normalizada: Enós, Kenán.'
  - Se evita «Cristo», terminología eclesiástica o paraphrasis no sustentada por el pasaje.
  - La puntuación reproduce una cláusula genealógica breve y directa, acorde con el estilo de listas de Génesis.
