base_translation:
  language: en
  yaml_path: translation/ot/1_samuel/014/027.yaml
  text: But Jonathan had not heard when his father put the people under oath[a], so he stretched out the tip of the staff that was in his hand and dipped it into the honeycomb, and he brought his hand to his mouth[b], and his eyes brightened.
  footnotes:
  - marker: a
    text: Or, more literally, 'into the forest/thicket of honey'; the Hebrew expression likely refers to a honeycomb or dense mass of honey.
    reason: lexical_alternative
  - marker: b
    text: '''His eyes brightened'' is a Hebrew idiom indicating renewed strength or alertness after eating.'
    reason: cultural_note
