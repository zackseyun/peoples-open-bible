base_translation:
  language: en
  yaml_path: translation/ot/leviticus/013/017.yaml
  text: And the priest shall examine it[a], and behold, the diseased spot has turned white; then the priest shall pronounce the spot clean[c][b]; it is clean.
  footnotes:
  - marker: a
    text: Or 'the infection,' 'the lesion,' or 'the affliction.' Hebrew negaʿ refers to the visible afflicted area under priestly inspection, without specifying a modern medical diagnosis.
    reason: lexical_alternative
  - marker: b
    text: Or 'shall declare the spot clean.' The priest's role here is to render a ritual verdict after examination, not to heal the condition.
    reason: lexical_alternative
  - marker: c
    text: 'Hebrew: ''clean is it/he.'' The pronoun is masculine singular; English renders the verdict with reference to the spot.'
    reason: lexical_alternative
