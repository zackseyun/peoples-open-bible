id: 1TH.1.6
reference: 1 Thessalonians 1:6
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: καὶ ὑμεῖς μιμηταὶ ἡμῶν ἐγενήθητε καὶ τοῦ κυρίου, δεξάμενοι τὸν λόγον ἐν θλίψει πολλῇ μετὰ χαρᾶς πνεύματος ἁγίου,
base_translation:
  language: en
  yaml_path: translation/nt/1_thessalonians/001/006.yaml
  text: And you became imitators of us and of the Lord[a], having received the word in much affliction with joy of the Holy Spirit,
  footnotes:
  - marker: a
    text: Or 'with joy of the Holy Spirit,' that is, joy produced by the Holy Spirit.
    reason: lexical_alternative
translation:
  language: ko
  text: 그리고 여러분은 큰 환난 가운데서 성령의 기쁨[a]으로 그 말씀을 받아 우리와 주님을 본받는 자들이 되었습니다.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 또는 「성령에게서 오는 기쁨」, 「성령께서 주시는 기쁨」. 속격은 출처·기원의 의미를 함께 담는다.
    reason: lexical_alternative
lexical_decisions:
- source_word: μιμηταὶ
  english_pob_choice: imitators
  chosen_korean: 본받는 자들
  alternatives_korean:
  - 모방자
  - 따르는 자들
  lexicon: BDAG
  rationale: 바울의 본 받음 어휘를 그대로 보존한다. 한국어 「본받다」는 모범의 능동적 따름을 분명히 담는다.
- source_word: ἐγενήθητε
  english_pob_choice: became
  chosen_korean: 되었습니다
  alternatives_korean:
  - 되어 가게 되었습니다
  lexicon: BDAG
  rationale: 부정과거의 시작·전이 의미. 합쇼체 종결 「되었습니다」가 자연스럽다.
- source_word: κυρίου
  english_pob_choice: Lord
  chosen_korean: 주님
  alternatives_korean:
  - 주
  lexicon: BDAG
  rationale: 예수를 가리키는 기독론적 칭호. 「우리」와 병렬되어 단독 명사로 나오므로 친밀한 경어 「주님」을 택한다.
- source_word: δεξάμενοι
  english_pob_choice: having received
  chosen_korean: 받아
  alternatives_korean:
  - 받아들여
  - 영접하고
  lexicon: BDAG
  rationale: 부정과거 중간태 분사. 한국어 연결어미 「받아」로 자연스러운 동반 정황을 표현한다.
- source_word: τὸν λόγον
  english_pob_choice: the word
  chosen_korean: 그 말씀
  alternatives_korean:
  - 메시지
  - 말씀
  lexicon: BDAG
  rationale: 선포된 복음 메시지를 가리킨다. 한국어 「말씀」은 사도적 선포의 무게를 그대로 담는다. 「그」를 두어 앞서 언급된 복음을 지시한다.
- source_word: ἐν θλίψει πολλῇ
  english_pob_choice: in much affliction
  chosen_korean: 큰 환난 가운데서
  alternatives_korean:
  - 많은 고난 가운데서
  - 심한 압박 속에서
  lexicon: BDAG
  rationale: θλῖψις는 압박·고난의 의미. 한국 교회 전통 어휘 「환난」이 표준 등가어이며, πολλή는 강도의 「큰」으로 옮긴다.
- source_word: μετὰ χαρᾶς πνεύματος ἁγίου
  english_pob_choice: with joy of the Holy Spirit
  chosen_korean: 성령의 기쁨으로
  alternatives_korean:
  - 성령에게서 오는 기쁨으로
  - 성령께서 주시는 기쁨으로
  lexicon: BDAG
  rationale: 속격을 「~의」로 보존해 출처·기원·속성의 다중성을 본문에 남긴다. 해석적 풀이는 각주로 살린다. 영어 POB의 동일한 선택과 일치한다.
theological_decisions:
- issue: 「성령의 기쁨」 속격의 의미
  chosen_reading: 출처·기원의 의미를 열어두는 「성령의 기쁨」
  alternative_readings:
  - 성령에게서 오는 기쁨
  - 성령께서 주시는 기쁨
  rationale: 헬라어 속격은 출처·기원·속성을 함께 담을 수 있다. 본문 어휘를 좁히지 않고 「~의」로 보존하되, 해석의 가능성은 각주로 둔다.
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve it'
