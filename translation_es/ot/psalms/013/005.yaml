translation:
  language: es
  text: 'para que no diga mi enemigo: «He prevalecido contra él[a]», y mis adversarios se alegren porque yo sea sacudido[b].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «Lo he vencido».
    reason: lexical_alternative
  - marker: b
    text: O «porque yo resbalo» o «porque yo tambaleo».
    reason: lexical_alternative
lexical_decisions:
- source_word: פֶּן
  english_pob_choice: lest
  chosen_spanish: para que no
  alternatives_spanish:
  - no sea que
  - a fin de que no
  lexicon: HALOT
  rationale: 'Expresa en español la finalidad negativa del hebreo: evitar el resultado temido. ''Para que no'' suena natural y conserva el valor de prevención.'
- source_word: יֹאמַר
  english_pob_choice: say
  chosen_spanish: diga
  alternatives_spanish:
  - diga en voz alta
  - declare
  lexicon: HALOT
  rationale: En discurso directo, 'decir' se vierte de forma simple y directa; el subjuntivo encaja con la cláusula de propósito negativa.
- source_word: אֹיְבִי
  english_pob_choice: my enemy
  chosen_spanish: mi enemigo
  alternatives_spanish:
  - mi adversario
  - mi foe
  lexicon: HALOT
  rationale: El singular con sufijo posesivo se conserva literalmente y de manera clara en español.
- source_word: יְכָלְתִּיו
  english_pob_choice: I have overcome him
  chosen_spanish: He prevalecido contra él
  alternatives_spanish:
  - Lo he vencido
  - He vencido sobre él
  lexicon: HALOT
  rationale: '''Prevalecer contra'' mantiene la fuerza competitiva de יכל sin introducir una idea de destrucción total; además preserva bien la relación con la alternativa inglesa documentada ''I have prevailed against him''.'
- source_word: צָרַי
  english_pob_choice: my adversaries
  chosen_spanish: mis adversarios
  alternatives_spanish:
  - mis enemigos
  - mis contrarios
  lexicon: HALOT
  rationale: Se conserva el plural y una palabra española que distingue este grupo del enemigo singular anterior.
- source_word: יָגִילוּ
  english_pob_choice: rejoice
  chosen_spanish: se alegren
  alternatives_spanish:
  - exulten
  - se regocijen
  lexicon: HALOT
  rationale: '''Alegrarse'' transmite gozo jubiloso en español actual; en el subjuntivo mantiene la dependencia de la cláusula final/temida.'
- source_word: כִּי
  english_pob_choice: because
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  lexicon: HALOT
  rationale: Introduce con naturalidad la razón del gozo de los adversarios.
- source_word: אֶמּוֹט
  english_pob_choice: I am shaken
  chosen_spanish: yo vacilo
  alternatives_spanish:
  - yo titubeo
  - yo tambaleo
  - yo soy sacudido
  lexicon: HALOT
  rationale: El verbo מוט en niphal puede expresar inestabilidad, vacilación o tambaleo. 'Vacilo' comunica la fragilidad del sujeto en un español sobrio y poético sin forzar una imagen demasiado física.
translation_notes:
  revision_awareness: Se corrigió la validación anterior anclando ambos marcadores de nota directamente en el texto español. Se mantuvo la lectura de contraste entre el enemigo singular, los adversarios plurales y la idea de inestabilidad de אֶמּוֹט.
  spanish_consistency_notes:
  - Se evitó 'SEÑOR' o formulaciones de mayúsculas litúrgicas porque el versículo no contiene el nombre divino.
  - Se prefirió 'prevalecido contra él' para conservar la fuerza de יכל sin sobrerinterpretar la victoria.
  - Se mantuvo una diferenciación estilística entre singular ('mi enemigo') y plural ('mis adversarios').
