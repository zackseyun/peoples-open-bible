  from: then what will anyone say about those who are like your people?
  to: Or how will one speak of your praises? Or to whom will what is in your law be
    explained?
  rationale: The draft severely mistranslates the first half of the verse and completely
    omits the second half. The Syriac text reads 'aw aykannā nēmar ʿal teshbḥātāk?
    aw l-man netpashaq mā d-b-nāmōsāk?' which translates to 'Or how shall one speak
    of your praises? Or to whom shall what is in your law be explained?' The draft
    seems to have misread 'teshbḥātāk' (your praises) and dropped the second clause
    entirely.
