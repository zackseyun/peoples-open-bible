translation:
  language: es
  text: Y se apresuraron a hacer guerra contra ellos[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O «se dieron prisa a hacer guerra contra ellos» o «lanzaron un ataque contra ellos». El griego es breve: literalmente, «apresuraron guerra contra ellos».'
