translation:
  language: es
  text: 'Avergüénzate[a], Sidón, porque el mar ha hablado, la fortaleza del mar, diciendo: «No he estado de parto, y no he dado a luz[b], y no he criado jóvenes varones[c] ni he exaltado vírgenes».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «sé avergonzada». La frase personifica a Sidón como ciudad femenina y traduce el mandato con fuerza profética.
    reason: lexical_alternative
  - marker: b
    text: O «no he sufrido dolores de parto». El hebreo puede referirse al dolor o a las contracciones del parto.
    reason: lexical_alternative
  - marker: c
    text: O «muchachos». El hebreo se refiere específicamente a varones jóvenes, en contraste con «vírgenes».
    reason: lexical_alternative
lexical_decisions:
- source_word: בּוֹשִׁי
  english_pob_choice: Be ashamed
  chosen_spanish: Avergüénzate
  alternatives_spanish:
  - Siéntete avergonzada
  - Ponte en vergüenza
  lexicon: HALOT
  rationale: Es un imperativo femenino singular dirigido a Sidón como ciudad personificada. «Avergüénzate» conserva la fuerza del mandato y el campo semántico de vergüenza con una forma natural en español.
- source_word: צִיד֔וֹן
  english_pob_choice: Sidon
  chosen_spanish: Sidón
  alternatives_spanish:
  - Sidon
  lexicon: Transliteración estándar
  rationale: Nombre propio de la ciudad fenicia, normalmente adaptado en español como «Sidón».
- source_word: כִּֽי
  english_pob_choice: for
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  lexicon: HALOT
  rationale: Introduce la razón del imperativo. En español profético, «porque» expresa con claridad la relación causal.
- source_word: יָ֔ם
  english_pob_choice: the sea
  chosen_spanish: el mar
  alternatives_spanish:
  - el mar
  lexicon: HALOT
  rationale: El sustantivo es literal y se mantiene como imagen personificada que habla.
- source_word: מָע֥וֹז הַיָּם
  english_pob_choice: the stronghold of the sea
  chosen_spanish: la fortaleza del mar
  alternatives_spanish:
  - el baluarte del mar
  - la fortaleza del mar
  lexicon: HALOT
  rationale: מָעוֹז denota una fortaleza o lugar fuerte. «Fortaleza del mar» conserva la construcción y la imagen sin interpretarla excesivamente.
- source_word: לֵאמֹר
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - diciendo
  lexicon: HALOT
  rationale: Fórmula estándar que introduce el discurso directo.
- source_word: לֹֽא חַ֣לְתִּי
  english_pob_choice: I have not been in labor
  chosen_spanish: No he estado de parto
  alternatives_spanish:
  - No he sufrido dolores de parto
  - No he estado en labor
  lexicon: HALOT
  rationale: El hebreo apunta a los dolores/estado de parto. «He estado de parto» resulta natural en español y preserva la imagen del alumbramiento.
- source_word: יָלַ֗דְתִּי
  english_pob_choice: I have not given birth
  chosen_spanish: no he dado a luz
  alternatives_spanish:
  - no he dado a luz
  - no he parido
  lexicon: HALOT
  rationale: Verbo directo de dar nacimiento; «dar a luz» es claro y estándar en español.
- source_word: גִדַּ֛לְתִּי
  english_pob_choice: I have not raised
  chosen_spanish: no he criado
  alternatives_spanish:
  - no he criado
  - no he educado
  lexicon: HALOT
  rationale: En este contexto de descendencia, el verbo expresa criar hasta la madurez; «criado» es más natural que «he hecho grande».
- source_word: בַּחוּרִ֖ים
  english_pob_choice: young men
  chosen_spanish: jóvenes
  alternatives_spanish:
  - jóvenes
  - muchachos
  - jóvenes varones
  lexicon: HALOT
  rationale: El término refiere a varones jóvenes; «jóvenes» es conciso, aunque en nota se mantiene la posibilidad de «jóvenes varones» por contraste con «vírgenes».
- source_word: רוֹמַ֥מְתִּי
  english_pob_choice: exalted
  chosen_spanish: he exaltado
  alternatives_spanish:
  - he exaltado
  - he levantado
  lexicon: HALOT
  rationale: La revisión del POB en inglés preserva el verbo distinto de גִדַּלְתִּי. En español, «exaltado» mantiene el paralelo léxico y la elevación retórica del hebreo.
- source_word: בְתוּלֽוֹת
  english_pob_choice: virgins
  chosen_spanish: vírgenes
  alternatives_spanish:
  - vírgenes
  - doncellas
  - jóvenes vírgenes
  lexicon: HALOT
  rationale: El término hebreo designa específicamente vírgenes; «vírgenes» es la opción más precisa y conserva el contraste con בַּחוּרִים.
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión del texto inglés que cambió «brought up virgins» por «exalted virgins» para reflejar con mayor precisión רוֹמַמְתִּי. Por eso la línea española usa «he exaltado vírgenes» y no una paráfrasis de crianza en ese segundo miembro.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» fuera del versículo porque no aparece el tetragrámaton ni un equivalente directo en este pasaje.
  - Se conservó la personificación poética del mar y la ciudad, evitando explicaciones interpretativas dentro del texto principal.
  - 'Se distinguieron los dos verbos del final: גִדַּלְתִּי como «he criado» y רוֹמַמְתִּי como «he exaltado».'
