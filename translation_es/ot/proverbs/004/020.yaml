translation:
  language: es
  text: Hijo mío, presta atención a mis palabras[a]; inclina tu oído[b] a mis dichos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Escucha atentamente mis palabras».'
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «inclina tu oído», un modismo que significa escuchar con atención.'
    reason: cultural_note
lexical_decisions:
- source_word: בְּנִי
  english_pob_choice: My son
  chosen_spanish: Hijo mío
  alternatives_spanish:
  - Mi hijo
  - Hijo mío
  lexicon: HALOT
  rationale: El hebreo es un vocativo paternal/directivo; en español, «Hijo mío» conserva el tono afectuoso y exhortativo sin neutralizar el masculino singular del texto fuente.
- source_word: לִדְבָרַי
  english_pob_choice: to my words
  chosen_spanish: mis palabras
  alternatives_spanish:
  - mis dichos
  - mi palabra
  - mis expresiones
  lexicon: HALOT
  rationale: דבר en este contexto se refiere a las palabras o instrucciones del hablante. «Mis palabras» es natural en español y mantiene el paralelismo con la segunda cola.
- source_word: הַקְשִׁיבָה
  english_pob_choice: pay attention
  chosen_spanish: presta atención
  alternatives_spanish:
  - escucha atentamente
  - atiende con cuidado
  - da oído
  lexicon: HALOT
  rationale: El imperativo hifil de קשׁב exige escucha activa y cuidadosa. «Presta atención» comunica bien la fuerza idiomática sin sonar forzado en español moderno.
- source_word: לַאֲמָרַי
  english_pob_choice: to my sayings
  chosen_spanish: mis dichos
  alternatives_spanish:
  - mis palabras
  - mis dichos
  - mis declaraciones
  lexicon: HALOT
  rationale: אמרים mantiene un matiz poético y sapiencial. «Dichos» preserva la distinción retórica respecto de «palabras» en la primera cola, como hace el inglés POB con «sayings».
- source_word: הַט
  english_pob_choice: incline
  chosen_spanish: inclina
  alternatives_spanish:
  - vuelve
  - dobla
  - torna
  lexicon: HALOT
  rationale: נטה con «oído» forma una imagen idiomática de escucha atenta. «Inclina» conserva la metáfora y el registro sapiencial elevado.
- source_word: אָזְנֶךָ
  english_pob_choice: your ear
  chosen_spanish: tu oído
  alternatives_spanish:
  - tu oreja
  - tus oídos
  lexicon: HALOT
  rationale: El singular hebreo se conserva. «Oído» suena más natural y digno en español bíblico actual que «oreja», y mantiene la imagen idiomática de atención.
translation_notes:
  revision_awareness: El texto coincide con el sentido del hebreo masorético y con el control de alta concordancia del expediente inglés; no se requirieron cambios de revisión respecto del audit trail.
  spanish_consistency_notes:
  - Se mantuvo el paralelismo sapiencial entre «palabras» y «dichos» para no aplanar la distinción retórica del hebreo.
  - Se prefirió «oído» a «oreja» por registro bíblico contemporáneo y claridad, sin perder la imagen corporal del modismo.
  - La puntuación reproduce dos miembros poéticos unidos por punto y coma, con cadencia natural para lectura pública.
