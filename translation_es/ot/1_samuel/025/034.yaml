revisions:
- from: Pero, tan cierto como que vive Yahvé, el Dios de Israel, que me ha impedido hacerte daño, si no te hubieras dado prisa y venido a encontrarme, para la luz de la mañana no le habría quedado a Nabal[a] ni un solo varón.
  to: Pero, tan cierto como que vive Yahvé, el Dios de Israel, que me ha impedido hacerte daño, si no te hubieras dado prisa y venido a mi encuentro, ciertamente para el amanecer no le habría quedado a Nabal ni un solo varón[a].
  rationale: Se conserva la traducción general del borrador, pero se corrige la representación de כִּי אִם con 'ciertamente', se sustituye la expresión poco idiomática 'para la luz de la mañana' por 'para el amanecer', se mejora la naturalidad de 'venido a mi encuentro', y se mueve el marcador de nota al sintagma que realmente traduce el idiomático hebreo.
  reviewer_model: gpt-5.4
