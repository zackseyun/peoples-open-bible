translation:
  language: es
  text: Y la multitud[a], atraída por el encanto de la obra, ahora consideró al hombre que poco antes había sido honrado un objeto de culto.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «ídolo» o «imagen sagrada» para «objeto de culto» (σέβασμα).
    reason: lexical_alternative
lexical_decisions:
- source_word: πλῆθος
  english_pob_choice: the multitude
  chosen_spanish: la multitud
  alternatives_spanish:
  - la gente
  - la muchedumbre
  lexicon: LSJ
  rationale: πλῆθος designa un grupo numeroso. «La multitud» conserva el valor colectivo y el tono elevado del pasaje, en línea con la elección inglesa.
- source_word: ἐφελκόμενον
  english_pob_choice: drawn by
  chosen_spanish: atraída
  alternatives_spanish:
  - arrastrada
  - llevada
  lexicon: LSJ
  rationale: El participio expresa una acción pasiva de ser atraído por una fuerza externa. «Atraída» comunica bien esa idea en español sin volverla demasiado mecánica.
- source_word: διὰ τὸ εὔχαρι τῆς ἐργασίας
  english_pob_choice: by the charm of the workmanship
  chosen_spanish: por el encanto de la obra
  alternatives_spanish:
  - por la gracia de la hechura
  - por la belleza del trabajo
  lexicon: LSJ
  rationale: εὔχαρι apunta a lo agradable, grato o encantador; ἐργασία aquí refiere a la obra hecha, la hechura. «Encanto de la obra» mantiene el sentido causal y la naturalidad en español.
- source_word: τὸν πρὸ ὀλίγου τιμηθέντα ἄνθρωπον
  english_pob_choice: the man who a little before had been honored
  chosen_spanish: al hombre que poco antes había sido honrado
  alternatives_spanish:
  - al hombre honrado no hace mucho
  - al hombre que había sido honrado poco tiempo antes
  lexicon: LSJ
  rationale: La frase contrasta el honor humano previo con la veneración posterior. «Poco antes» preserva la referencia temporal cercana de πρὸ ὀλίγου y «al hombre» mantiene el valor de ἄνθρωπον.
- source_word: νῦν
  english_pob_choice: now
  chosen_spanish: ahora
  alternatives_spanish:
  - en ese momento
  - entonces
  lexicon: LSJ
  rationale: Marca el contraste temporal con «poco antes». «Ahora» es el equivalente más directo y natural.
- source_word: σέβασμα
  english_pob_choice: an object of worship
  chosen_spanish: un objeto de culto
  alternatives_spanish:
  - un objeto de adoración
  - un ídolo
  - una imagen sagrada
  lexicon: LSJ
  rationale: σέβασμα denota algo reverenciado o venerado. «Objeto de culto» conserva la amplitud del término sin decidir prematuramente entre «ídolo» o «imagen sagrada».
- source_word: ἐλογίσαντο
  english_pob_choice: regarded as
  chosen_spanish: consideró como
  alternatives_spanish:
  - estimó como
  - tuvo por
  lexicon: LSJ
  rationale: El verbo expresa una apreciación o consideración mental. «Consideró como» reproduce de manera idiomática la construcción del original y el sentido del inglés auditable.
theological_decisions:
- issue: Alcance de σέβασμα en una crítica a la idolatría
  english_pob_reading: The text describes a formerly honored human being coming to be treated as an object of worship.
  chosen_spanish_reading: El texto describe a un hombre que antes había sido honrado y que ahora es tratado como un objeto de culto.
  alternative_spanish_readings:
  - '... como un ídolo.'
  - '... como una imagen sagrada.'
  rationale: «Objeto de culto» preserva la tensión teológica sin estrechar el término más allá de lo que exige el griego. Las alternativas son posibles, pero introducen un matiz más específico que el texto no obliga a fijar.
  doctrine_reference: Conservar la tensión léxica y teológica; no resolverla prematuramente.
translation_notes:
  revision_awareness: El borrador sigue la lectura revisada del inglés POB ('drawn by') y mantiene su enfoque de equivalencia óptima, pero reexpresa la causalidad y la construcción acusativa en español con una formulación natural y fiel al griego.
  spanish_consistency_notes:
  - Se mantuvo «multitud» para πλῆθος, en consonancia con el registro elevado del pasaje.
  - Se eligió «Yahvé» en el proyecto general solo cuando corresponda; este versículo no contiene el nombre divino.
  - «Objeto de culto» conserva la amplitud semántica de σέβασμα y permite la nota alternativa a «ídolo» o «imagen sagrada».
  - Se usó «honrado» para τιμηθέντα para preservar el contraste explícito entre honor previo y culto posterior.
