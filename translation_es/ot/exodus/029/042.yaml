translation:
  language: es
  text: Será un holocausto regular[a] por todas sus generaciones, a la entrada de la tienda de reunión, delante de Yahvé, donde me reuniré con ustedes[b], para hablarte allí.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «un holocausto continuo» o «un holocausto perpetuo».
    reason: lexical_alternative
  - marker: b
    text: El hebreo cambia del plural («con ustedes») al singular («hablarte»), probablemente distinguiendo al pueblo en general de Moisés específicamente.
    reason: lexical_alternative
lexical_decisions:
- source_word: עֹלַת תָּמִיד
  english_pob_choice: a regular burnt offering
  chosen_spanish: un holocausto regular
  alternatives_spanish:
  - un holocausto continuo
  - un holocausto perpetuo
  lexicon: HALOT
  rationale: עֹלָה es el sacrificio totalmente quemado; en español, «holocausto» comunica bien esa ofrenda en contexto cultual. תָּמִיד expresa su carácter establecido y regular; «regular» conserva la idea de recurrencia prescrita sin forzar una continuidad temporal absoluta. Las alternativas «continuo» y «perpetuo» son posibles, pero pueden sonar más fuertes que el matiz requerido por el contexto.
- source_word: לְדֹרֹתֵיכֶם
  english_pob_choice: throughout your generations
  chosen_spanish: por todas sus generaciones
  alternatives_spanish:
  - a través de sus generaciones
  - para sus generaciones
  lexicon: HALOT
  rationale: La expresión idiomática señala vigencia a lo largo de las sucesivas generaciones. «Por todas sus generaciones» transmite bien ese alcance duradero en un español natural y reverente.
- source_word: פֶּתַח
  english_pob_choice: at the entrance
  chosen_spanish: a la entrada
  alternatives_spanish:
  - en la entrada
  - junto a la entrada
  lexicon: HALOT
  rationale: פֶּתַח denota la entrada o abertura. «A la entrada» reproduce el valor locativo con naturalidad en español.
- source_word: אֹהֶל מוֹעֵד
  english_pob_choice: the tent of meeting
  chosen_spanish: la tienda de reunión
  alternatives_spanish:
  - la tienda de encuentro
  - la tienda de asignación
  lexicon: HALOT
  rationale: «Tienda de reunión» preserva el término ya asentado en español bíblico para אֹהֶל מוֹעֵד, sin sustituirlo por una formulación más interpretativa. «Reunión» mantiene la función del lugar donde Yahvé se encuentra con su pueblo y con Moisés.
- source_word: לִפְנֵי יְהוָה
  english_pob_choice: before Yahweh
  chosen_spanish: delante de Yahvé
  alternatives_spanish:
  - ante Yahvé
  - en presencia de Yahvé
  lexicon: HALOT
  rationale: La preposición לִפְנֵי en contexto cultual se expresa naturalmente como «delante de». Se conserva «Yahvé» para el Nombre divino, conforme a la política terminológica del proyecto.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  - el SEÑOR
  lexicon: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
  rationale: Se mantiene la transliteración española establecida por el proyecto, «Yahvé», para reproducir el Nombre divino sin sustituirlo por un título. La forma «Yahweh» puede ser útil en inglés, pero en español la norma del proyecto es «Yahvé».
- source_word: אֲשֶׁר אִוָּעֵד לָכֶם שָׁמָּה
  english_pob_choice: where I will meet with you
  chosen_spanish: donde me encontraré con ustedes
  alternatives_spanish:
  - donde me reuniré con ustedes
  - donde me haré presente ante ustedes
  lexicon: HALOT
  rationale: El nifal de יעד expresa encuentro concertado; «me encontraré con ustedes» preserva ese sentido relacional y pactal sin volverlo demasiado técnico. El adverbio «allí» queda implícito en la estructura española mediante «donde» y se mantiene el plural de «ustedes» para לָכֶם.
- source_word: לְדַבֵּר אֵלֶיךָ שָׁם
  english_pob_choice: to speak to you there
  chosen_spanish: para hablarte allí
  alternatives_spanish:
  - para hablarle allí
  - para hablar contigo allí
  lexicon: HALOT
  rationale: 'El infinitivo expresa finalidad: el encuentro es para hablar. Se traduce con «para hablarte allí» para conservar el singular de אֵלֶיךָ y reflejar que el destinatario específico es Moisés. «Hablarte» es más natural que un calco como «hablar a ti», y «allí» reproduce שָׁם.'
theological_decisions:
- issue: Renderización del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - el SEÑOR
  rationale: El texto hebreo usa el Tetragrámaton directamente. En la línea doctrinal del proyecto, la traducción española debe conservar el Nombre propio y no reemplazarlo por una sustitución litúrgica. «Yahvé» es la forma fijada para el español en este proyecto.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh / Spanish project default: Yahvé'
- issue: Cambio de número en los pronombres del versículo
  english_pob_reading: retain plural 'you' in 'with you' and singular 'you' in 'to speak to you'
  chosen_spanish_reading: mantener plural en «con ustedes» y singular en «hablarte»
  alternative_spanish_readings:
  - armonizar ambos como plural
  - armonizar ambos como singular
  rationale: El hebreo pasa de לָכֶם (plural) a אֵלֶיךָ (singular). En español se conserva la distinción entre el destinatario colectivo y el destinatario singular, sin suavizarla. Esto respeta la tensión textual documentada por la auditoría inglesa.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #1, #3, #5'
translation_notes:
  revision_awareness: La revisión más reciente marcó el texto como sin cambios necesarios; la concordancia cruzada indica acuerdo alto y no se registraron objeciones de revisión.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como forma española del Nombre divino, conforme al estándar del proyecto.
  - «Tienda de reunión» conserva la terminología cultual establecida para אֹהֶל מוֹעֵד.
  - 'Se preserva el cambio de número del hebreo: plural en «ustedes» y singular en «hablarte».'
  - «Holocausto» se usa aquí por su valor técnico de ofrenda totalmente quemada; no se sustituye por un término menos preciso.
