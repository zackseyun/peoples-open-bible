translation:
  language: es
  text: 'Esta fue[a] la herencia de la tribu de los hijos de Neftalí[b], según sus clanes: las ciudades y sus aldeas.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'Esta es'. El demostrativo hebreo con cláusula nominal puede traducirse en español en presente o en pasado; aquí el pasado encaja bien con el resumen retrospectivo después de la lista de repartición.
    reason: lexical_alternative
  - marker: b
    text: Lit. 'los hijos de Neftalí'. Esta expresión tribal hebrea denota a los descendientes o miembros tribales de Neftalí.
    reason: lexical_alternative
lexical_decisions:
- source_word: זֹאת
  english_pob_choice: This was
  chosen_spanish: Esta fue
  alternatives_spanish:
  - Esta es
  - Fue esta
  lexicon: HALOT
  rationale: El demostrativo femenino singular introduce una fórmula de resumen retrospectivo. En español, el pasado simple conserva naturalmente el cierre del reparto ya descrito, sin forzar una lectura presente que también sería posible en hebreo.
- source_word: נַחֲלַת
  english_pob_choice: the inheritance
  chosen_spanish: la herencia
  alternatives_spanish:
  - la heredad
  - la porción
  lexicon: HALOT
  rationale: En contexto de distribución territorial, נַחֲלָה designa la porción heredada de la tierra. 'Herencia' conserva bien el valor patrimonial y covenantal en español; 'heredad' es posible, pero menos natural para lectores amplios.
- source_word: מַטֵּה
  english_pob_choice: the tribe
  chosen_spanish: la tribu
  alternatives_spanish:
  - la vara
  - el bastón
  lexicon: HALOT
  rationale: Aquí מַטֶּה funciona como designación tribal estable, no en sentido literal de vara. 'Tribu' es el equivalente contextual claro y fiel.
- source_word: בְנֵי נַפְתָּלִי
  english_pob_choice: of the sons of Naphtali
  chosen_spanish: de los hijos de Neftalí
  alternatives_spanish:
  - de la gente de Neftalí
  - de Neftalí
  lexicon: HALOT
  rationale: '''Hijos de'' refleja de cerca la construcción hebrea y su identidad de linaje. Se conserva por fidelidad formal al giro tribal, aunque en español también podría resumirse como ''de Neftalí''.'
- source_word: לְמִשְׁפְּחֹתָם
  english_pob_choice: according to their clans
  chosen_spanish: según sus clanes
  alternatives_spanish:
  - por sus familias
  - de acuerdo con sus familias
  lexicon: HALOT
  rationale: En listas tribales, מִשְׁפָּחָה se entiende mejor como 'clan' que como 'familia' en sentido nuclear. La preposición לְ expresa distribución/clasificación, bien captada por 'según'.
- source_word: הֶעָרִים
  english_pob_choice: the cities
  chosen_spanish: las ciudades
  alternatives_spanish:
  - los pueblos
  - las villas
  lexicon: HALOT
  rationale: עִיר suele traducirse como 'ciudad'; aunque algunas localidades quizá fueran pequeñas, 'ciudades' preserva la fórmula territorial convencional de Josué.
- source_word: וְחַצְרֵיהֶן
  english_pob_choice: and their villages
  chosen_spanish: y sus aldeas
  alternatives_spanish:
  - y sus asentamientos
  - y sus caseríos
  lexicon: HALOT
  rationale: חָצֵר en esta fórmula alude a asentamientos dependientes o aldeas vinculadas a las ciudades. 'Aldeas' es una equivalencia natural y transparente en español, sin introducir un matiz pastoril indebido.
translation_notes:
  revision_awareness: El pasaje en inglés POB se mantiene sin cambios textuales relevantes; la principal adaptación es idiomática al español, conservando la estructura resumitiva y la terminología tribal/territorial del hebreo.
  spanish_consistency_notes:
  - Se mantuvo 'Neftalí' como forma española estándar del nombre propio.
  - Se prefirió 'clanes' para מִשְׁפְּחֹת porque en este contexto expresa mejor la unidad tribal de reparto que 'familias'.
  - No se añadió nota de variante para 'esta fue/esta es' porque la elección en español sigue la misma tensión documentada en la nota inglesa y se resolvió de forma idiomática.
