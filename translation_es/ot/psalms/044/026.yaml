revisions:
- from: Porque nuestra alma se ha hundido en el polvo[a][b]; nuestro vientre se pega a la tierra.
  to: Porque nuestra alma[a] se ha hundido hasta el polvo[b]; nuestro vientre se aferra a la tierra.
