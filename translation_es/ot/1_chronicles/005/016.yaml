translation:
  language: es
  text: Vivieron en Galaad, en Basán y sus pueblos[a], y en todos los pastizales de Sarón[b], hasta sus límites[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literalmente, «sus hijas»; hebraísmo para pueblos o asentamientos dependientes.
    reason: lexical_alternative
  - marker: b
    text: O «tierras abiertas» o «tierras comunales» de Sarón.
    reason: lexical_alternative
  - marker: c
    text: Literalmente, «sobre sus salidas»; es decir, hasta sus extremos o límites exteriores.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֵּשְׁבוּ
  english_pob_choice: They lived
  chosen_spanish: Vivieron
  alternatives_spanish:
  - Habitaban
  - Residieron
  - Se establecieron
  lexicon: HALOT
  rationale: ישב expresa habitar o residir; en este aviso territorial, «vivieron» comunica una residencia estable y natural en español, sin cargar el matiz inicial de instalación que tendría «se establecieron».
- source_word: בַּגִּלְעָד
  english_pob_choice: in Gilead
  chosen_spanish: en Galaad
  alternatives_spanish:
  - en Gilead
  lexicon: HALOT
  rationale: Nombre propio geográfico; se adapta a la forma habitual en español bíblico «Galaad» para la región conocida, manteniendo la referencia territorial.
- source_word: בַּבָּשָׁן
  english_pob_choice: in Bashan
  chosen_spanish: en Basán
  alternatives_spanish:
  - en Bashán
  lexicon: HALOT
  rationale: Nombre propio geográfico transliterado en la forma española usual «Basán».
- source_word: וּבִבְנֹתֶיהָ
  english_pob_choice: and its towns
  chosen_spanish: y sus pueblos
  alternatives_spanish:
  - y sus ciudades hijas
  - y sus aldeas
  - y sus localidades dependientes
  lexicon: HALOT
  rationale: El hebreo dice literalmente «sus hijas», un modismo para asentamientos dependientes. En español, «sus pueblos» comunica el sentido idiomático con claridad y sin alargar innecesariamente la frase.
- source_word: וּבְכָל
  english_pob_choice: and in all
  chosen_spanish: y en todos
  alternatives_spanish:
  - y por todos
  - y en todo
  lexicon: HALOT
  rationale: Conserva el valor distributivo de la preposición con כל, enlazando naturalmente con el sintagma siguiente.
- source_word: מִגְרְשֵׁי
  english_pob_choice: the pasturelands of
  chosen_spanish: los pastizales de
  alternatives_spanish:
  - los terrenos abiertos de
  - los campos abiertos de
  - las tierras de pasto de
  lexicon: HALOT
  rationale: מִגְרָשׁ puede referirse a terrenos abiertos o de pasto alrededor de asentamientos. «Pastizales» mantiene ese valor espacial y rural de manera clara en español.
- source_word: שָׁרוֹן
  english_pob_choice: Sharon
  chosen_spanish: Sarón
  alternatives_spanish:
  - Sharon
  lexicon: HALOT
  rationale: Topónimo bíblico; en español tradicional y reconocido es «Sarón».
- source_word: עַל תּוֹצְאוֹתָם
  english_pob_choice: as far as their borders
  chosen_spanish: hasta sus límites
  alternatives_spanish:
  - hasta sus salidas
  - hasta sus contornos
  - hasta sus fronteras
  lexicon: HALOT
  rationale: La expresión es idiomática y espacial. «Hasta sus límites» transmite el sentido de alcance total/externo sin forzar una traducción demasiado literal de «salidas».
theological_decisions:
- issue: Referencia territorial de la frase final
  english_pob_reading: as far as their borders
  chosen_spanish_reading: hasta sus límites
  alternative_spanish_readings:
  - hasta sus fronteras
  - hasta sus contornos
  - hasta sus salidas
  rationale: No hay tensión doctrinal; la decisión es semántica. Se preserva la idea de extensión territorial máxima sin convertir el hebraísmo en un giro extraño para el lector español.
  doctrine_reference: N/A
translation_notes:
  revision_awareness: 'Coincide con la lectura estable del pasaje en el audit trail inglés: residir en Galaad, Basán y sus poblados dependientes, y en los pastizales de Sarón, con cierre espacial idiomático en la frase sobre sus límites. No se documentaron revisiones aplicadas en el registro fuente.'
  spanish_consistency_notes:
  - Se conserva el nombre divino y la terminología bíblica propia del proyecto, aunque este versículo no la contiene.
  - «Basán» y «Sarón» siguen la forma española estándar para topónimos bíblicos.
  - Se evitó «SEÑOR» y otras sustituciones innecesarias porque el versículo no contiene el Tetragrámaton.
