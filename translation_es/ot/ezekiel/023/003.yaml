review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador conserva bien la estructura hebrea, la repetición de זנה, el doble «allí» y la explicitud sexual del pasaje. Sin embargo, presenta problemas de naturalidad y precisión en español: «les fueron manoseados sus pechos» es gramaticalmente torpe; «fueron tocados» debilita demasiado el segundo verbo; y «senos de doncellez» suena poco idiomático. El sentido fuente de violación/manipulación sexual temprana debe mantenerse con formulación española más natural y fiel.'
  spanish_quality_summary: El texto es mayormente comprensible, pero varias expresiones suenan calcadas o poco naturales para un registro bíblico moderno y digno. «Manoseados» comunica bien el carácter impropio, pero la construcción pasiva usada es deficiente. «Senos de doncellez» resulta artificial; «senos virginales» o «senos de su virginidad» sería más claro. La puntuación y el flujo general son buenos.
  glossary_alignment: No hay conflicto con términos base del proyecto. La elección «se prostituyeron» alinea bien con זנה. No hay nombres divinos ni términos doctrinales especiales en juego. La decisión de conservar imaginería sexual explícita coincide con la pauta del proyecto.
  issues:
  - severity: medium
    issue: 'Construcción no idiomática: «Allí les fueron manoseados sus pechos»'
    rationale: En español, la combinación de dativo + pasiva perifrástica + posesivo suena forzada y poco natural. Una forma como «Allí les manosearon los pechos» preserva mejor el sentido y la claridad.
  - severity: medium
    issue: «Fueron tocados» suaviza demasiado עִשּׂוּ en este contexto
    rationale: Aunque el verbo es difícil, en paralelismo con la primera cola conviene una formulación algo más fuerte que «tocados». «Les tocaron» o «manipularon» mantiene mejor el tono sexual explícito sin sobreinterpretar.
  - severity: medium
    issue: «Senos de doncellez» es poco idiomático en español actual
    rationale: La frase intenta reflejar בְּתוּלֵיהֶן, pero resulta artificial. «Senos virginales» comunica con claridad y dignidad la referencia a virginidad/maidenhood.
  - severity: low
    issue: La nota alternativa c contiene «trataron los pechos de su virginidad»
    rationale: Esta formulación reproduce demasiado de cerca una estructura poco natural del inglés/hebreo. Conviene una alternativa española más inteligible que siga señalando la dificultad del original.
