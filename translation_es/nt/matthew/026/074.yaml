translation:
  language: es
  text: 'Entonces comenzó a maldecir y a jurar[a]: «No conozco al hombre». E inmediatamente cantó un gallo.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, más literalmente, «comenzó a invocar maldiciones y a jurar». El sentido probablemente es que invocaba maldiciones para reforzar su negación, posiblemente sobre sí mismo.
    reason: lexical_alternative
lexical_decisions:
- source_word: τότε
  english_pob_choice: Then
  chosen_spanish: Entonces
  alternatives_spanish:
  - Luego
  - Después
  lexicon: BDAG
  rationale: Marca la secuencia temporal inmediata del relato; «Entonces» es natural y conciso en español narrativo.
- source_word: ἤρξατο
  english_pob_choice: he began
  chosen_spanish: comenzó
  alternatives_spanish:
  - empezó
  - se puso a
  lexicon: BDAG
  rationale: Conserva el valor ingresivo de ἄρχω con infinitivos complementarios y sugiere escalada en la negación.
- source_word: καταθεματίζειν
  english_pob_choice: to curse
  chosen_spanish: maldecir
  alternatives_spanish:
  - proferir maldiciones
  - invocar maldiciones
  lexicon: BDAG
  rationale: El verbo puede expresar maldecir o invocar maldiciones. «Maldecir» mantiene la fuerza léxica directa sin añadir por cuenta propia la idea reflexiva de «sobre sí mismo», que la revisión inglesa decidió no explicitar en el texto principal.
- source_word: ὀμνύειν
  english_pob_choice: to swear
  chosen_spanish: jurar
  alternatives_spanish:
  - hacer juramento
  - jurar un juramento
  lexicon: BDAG
  rationale: Se refiere al acto de prestar juramento; «jurar» es la equivalencia breve y natural en español.
- source_word: Οὐκ οἶδα τὸν ἄνθρωπον
  english_pob_choice: I do not know the man
  chosen_spanish: No conozco al hombre
  alternatives_spanish:
  - No sé quién es ese hombre
  - No conozco a este hombre
  lexicon: BDAG
  rationale: Preserva la negación de conocimiento/acquaintance y el artículo definido. «Al hombre» refleja mejor el acusativo personal en español que una paráfrasis más explícita.
- source_word: ἀλέκτωρ ἐφώνησεν
  english_pob_choice: a rooster crowed
  chosen_spanish: cantó un gallo
  alternatives_spanish:
  - un gallo cantó
  - el gallo cantó
  lexicon: BDAG
  rationale: «Cantar» es el verbo idiomático en español para el sonido del gallo; «un gallo» conserva el anartro griego sin forzar definitud.
theological_decisions:
- issue: Sentido de καταθεματίζειν en la negación de Pedro
  english_pob_reading: Peter curses and swears as an intensified denial, likely invoking curses in an oath context, but the main text avoids over-specifying that the curses are explicitly self-directed.
  chosen_spanish_reading: Pedro empezó a maldecir y a jurar, sin añadir en el texto principal que las maldiciones cayeran sobre sí mismo.
  alternative_spanish_readings:
  - comenzó a invocar maldiciones sobre sí mismo y a jurar
  - comenzó a maldecirse y a jurar
  rationale: La combinación con ὀμνύειν pide una negación intensificada mediante juramento. El español principal conserva esa fuerza sin convertir una inferencia contextual en una afirmación explícita.
  doctrine_reference: Translation philosophy §1, §3
- issue: Valor de ἄνθρωπος en la frase de negación
  english_pob_reading: ‘the man’ refers specifically to Jesus while preserving the Greek wording.
  chosen_spanish_reading: «el hombre» se mantiene como referencia directa y sobria a Jesús, sin sustituirlo por un nombre propio.
  alternative_spanish_readings:
  - «ese hombre»
  - «este hombre»
  - «Jesús»
  rationale: El texto griego usa la expresión genérica con artículo; conservarla evita adelantar una aclaración que el original no formula en ese punto.
  doctrine_reference: Translation philosophy §1
translation_notes:
  revision_awareness: 'La versión inglesa auditada pasó de una expansión más explícita («call down curses on himself») a una formulación más directa («curse»). La redacción española sigue esa revisión: evita añadir «sobre sí mismo» en el texto principal, pero conserva en la nota la posibilidad semántica de una invocación de maldiciones ligada al juramento. También se mantuvo el cierre narrativo inmediato con el canto del gallo, de acuerdo con el griego y la revisión inglesa estable.'
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando corresponda al nombre divino; aquí no aparece.
  - «Maldecir» y «jurar» distinguen acción de maldición y acto de juramento, reflejando dos infinitivos griegos coordinados.
  - «Gallo» se traduce con el verbo idiomático «cantar», no con un calco como «llamar».
