translation:
  language: es
  text: Mientras iban de camino[a], llegaron al Tigris al atardecer, y acamparon allí.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El griego breve aquí solo dice que llegaron al Tigris al atardecer y acamparon allí. La tradición semítica más larga amplía de inmediato la escena con el episodio del pez que sigue.
    reason: textual_variant
lexical_decisions:
- source_word: πορευόμενοι
  english_pob_choice: were traveling
  chosen_spanish: iban de camino
  alternatives_spanish:
  - estaban viajando
  - iban viajando
  - caminaban
  lexicon: BDAG
  rationale: El participio indica movimiento en curso. «Iban de camino» conserva la idea durativa con un español natural y digno, sin forzar un calco pesado.
- source_word: τὴν ὁδόν
  english_pob_choice: on the road
  chosen_spanish: de camino
  alternatives_spanish:
  - por la carretera
  - en el camino
  - en la ruta
  lexicon: BDAG
  rationale: La expresión funciona como giro de viaje. «De camino» es idiomático en español y mantiene el contexto concreto del desplazamiento.
- source_word: ἦλθον ἑσπέρας
  english_pob_choice: came by evening
  chosen_spanish: llegaron al Tigris al atardecer
  alternatives_spanish:
  - llegaron por la tarde
  - llegaron al caer la tarde
  - llegaron al anochecer
  lexicon: BDAG
  rationale: La frase marca el momento de la llegada. «Al atardecer» reproduce bien el valor temporal de ἑσπέρας en un registro claro y literario.
- source_word: ἐπὶ τὸν Τίγριν ποταμόν
  english_pob_choice: to the Tigris River
  chosen_spanish: al Tigris
  alternatives_spanish:
  - al río Tigris
  - hasta el río Tigris
  - junto al Tigris
  lexicon: BDAG
  rationale: El griego indica llegada al río. En español, el nombre propio «Tigris» ya comunica el referente; el artículo y la preposición resuelven con naturalidad la dirección sin necesidad de añadir «río» en el texto principal.
- source_word: ηὐλίζοντο
  english_pob_choice: camped
  chosen_spanish: acamparon
  alternatives_spanish:
  - pasaron la noche
  - se alojaron
  - pernoctaron
  lexicon: BDAG
  rationale: El verbo describe detenerse para pasar la noche en el viaje. «Acamparon» encaja bien con el contexto ribereño y conserva la concreción de la escena.
- source_word: ἐκεῖ
  english_pob_choice: there
  chosen_spanish: allí
  alternatives_spanish:
  - ahí
  - en ese lugar
  lexicon: BDAG
  rationale: Adverbio locativo simple; «allí» es la equivalencia directa y más natural en español.
theological_decisions:
- issue: Variante textual breve griega frente a la ampliación de la tradición semítica/recensión larga
  english_pob_reading: The Greek short text here simply says they reached the Tigris by evening and camped there. The longer Semitic/long-recension tradition expands the scene immediately with the fish episode that follows.
  chosen_spanish_reading: 'La traducción sigue el texto griego breve: llegaron al Tigris al atardecer y acamparon allí.'
  alternative_spanish_readings:
  - Seguir la expansión de la tradición larga e incorporar aquí el episodio del pez.
  - Añadir una nota más extensa sobre la recensión larga en el cuerpo del versículo.
  rationale: La POB en inglés tomó como ancla el griego y señaló la variante textual en nota. Para mantener la transparencia, el texto español sigue el testimonio griego breve y reserva la ampliación para una nota textual.
  doctrine_reference: Principio de crítica textual y prioridad del testimonio base griego; no implica una diferencia doctrinal.
translation_notes:
  revision_awareness: No hay cambios de revisión aplicados en el expediente inglés; se mantiene la lectura base griega breve y su nota de variante textual.
  spanish_consistency_notes:
  - Se mantiene «Tigris» como nombre propio transliterado, coherente con el inglés auditado.
  - Se evita introducir «río» en el cuerpo principal para conservar la fluidez del español, aunque el referente es claramente el río Tigris.
  - «Acamparon» reproduce el valor de alojarse para pasar la noche en contexto de viaje, tal como en la decisión inglesa.
