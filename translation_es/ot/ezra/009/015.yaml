translation:
  language: es
  text: ¡Yahvé, Dios de Israel, tú eres justo[a], porque hemos quedado como un remanente[b], tal como estamos hoy. Aquí estamos delante de ti, en nuestra culpa, porque nadie puede mantenerse en pie delante de ti por causa de esto[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'recto'.
    reason: lexical_alternative
  - marker: b
    text: O 'un remanente escapado' o 'sobrevivientes'.
    reason: lexical_alternative
  - marker: c
    text: 'Hebreo: ''no hay mantenerse en pie delante de ti por causa de esto'', un modismo para expresar que no se puede permanecer o resistir en la presencia de Dios bajo culpa.'
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  lexicon: HALOT
  rationale: El texto hebreo usa el Nombre propio del pacto, no un título genérico. En español, la convención POB indicada para יְהוָה es 'Yahvé', que preserva el nombre divino sin sustituirlo por 'SEÑOR'.
- source_word: אֱלֹהֵי יִשְׂרָאֵל
  english_pob_choice: God of Israel
  chosen_spanish: Dios de Israel
  alternatives_spanish:
  - el Dios de Israel
  lexicon: HALOT
  rationale: La construcción de estado constructo se vierte de forma directa e idiomática. 'Dios de Israel' conserva el vínculo pactual y la dirección de la confesión.
- source_word: צַדִּיק
  english_pob_choice: righteous
  chosen_spanish: justo
  alternatives_spanish:
  - recto
  - justo
  lexicon: HALOT
  rationale: Aquí la cualidad afirmada de Yahvé es judicial y moral. En español, 'justo' mantiene mejor la resonancia de rectitud/justicia que 'recto' y puede abarcar la afirmación de que Dios actúa correctamente en juicio y misericordia.
- source_word: נִשְׁאַ֥רְנוּ פְלֵיטָ֖ה
  english_pob_choice: we have been left as a remnant
  chosen_spanish: hemos quedado como un remanente
  alternatives_spanish:
  - hemos sido dejados como un remanente
  - hemos sobrevivido como un remanente
  lexicon: HALOT
  rationale: El nifal expresa haber sido dejado/restado. 'Hemos quedado' comunica bien el resultado actual sin perder la pasiva implícita. 'Remanente' conserva el peso histórico-teológico del grupo preservado.
- source_word: כְּהַיּוֹם הַזֶּה
  english_pob_choice: as it is this day
  chosen_spanish: como en este día
  alternatives_spanish:
  - como es este día
  - tal como en este día
  lexicon: HALOT
  rationale: La expresión temporal apunta al estado presente observable. 'Como en este día' mantiene el valor de actualidad con español natural y solemne.
- source_word: הִנְנוּ לְפָנֶיךָ
  english_pob_choice: Here we are before you
  chosen_spanish: Aquí estamos delante de ti
  alternatives_spanish:
  - He aquí que estamos delante de ti
  - Estamos aquí ante ti
  lexicon: HALOT
  rationale: הִנְנוּ es presentativo. 'Aquí estamos' reproduce la inmediatez sin archaísmo excesivo; 'delante de ti' conserva el matiz relacional y judicial de estar ante la presencia divina.
- source_word: בְּאַשְׁמָתֵינוּ
  english_pob_choice: in our guilt
  chosen_spanish: en nuestra culpa
  alternatives_spanish:
  - con nuestra culpa
  - en nuestra culpabilidad
  lexicon: HALOT
  rationale: אַשְׁמָה designa culpa/culpabilidad objetiva, no solo sentimiento. 'En nuestra culpa' suena natural en español y mantiene el estado de responsabilidad ante Dios.
- source_word: אֵין לַעֲמוֹד לְפָנֶיךָ
  english_pob_choice: no one can stand before you
  chosen_spanish: no hay quien pueda mantenerse en pie delante de ti
  alternatives_spanish:
  - no podemos estar en pie delante de ti
  - nadie puede permanecer delante de ti
  lexicon: HALOT
  rationale: La idiomática hebrea de 'estar de pie' expresa capacidad de resistir o permanecer en presencia divina. 'Mantenerse en pie' conserva el giro y la imposibilidad sin volverlo plano.
- source_word: עַל זֹאת
  english_pob_choice: because of this
  chosen_spanish: por causa de esto
  alternatives_spanish:
  - a causa de esto
  - debido a esto
  lexicon: HALOT
  rationale: עַל introduce causalidad. 'Por causa de esto' es claro y formal, y permite vincular la incapacidad de mantenerse en pie con la culpa confesada.
theological_decisions:
- issue: Renderización del Nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Jehová
  rationale: La base hebrea trae explícitamente el Tetragrámaton. La tradición POB para español usa 'Yahvé' como forma transparente del Nombre, evitando la máscara 'SEÑOR' y preservando la distinción entre Nombre propio y título.
  doctrine_reference: 'DOCTRINE.md: contested terms — יְהוָה / YHWH → Yahvé'
- issue: Valor de צַדִּיק aplicado a Dios
  english_pob_reading: you are righteous
  chosen_spanish_reading: tú eres justo
  alternative_spanish_readings:
  - tú eres recto
  - tú eres justo/recto
  rationale: El contexto es una confesión judicial y pactual. 'Justo' comunica que Dios actúa correctamente en juicio; no se estrecha innecesariamente a una sola teoría retributiva, pero tampoco pierde la fuerza ética-jurídica del término.
  doctrine_reference: 'DOCTRINE.md Translation philosophy: preserve theological tension rather than resolve it'
- issue: Sentido idiomático de 'no hay quien pueda mantenerse en pie delante de ti'
  english_pob_reading: there is no standing before you because of this
  chosen_spanish_reading: no hay quien pueda mantenerse en pie delante de ti por causa de esto
  alternative_spanish_readings:
  - nadie puede permanecer delante de ti por causa de esto
  - no podemos estar en pie delante de ti por esto
  rationale: La frase hebrea es una expresión idiomática de incapacidad para soportar la presencia divina bajo culpa. La traducción conserva el idiomático 'mantenerse en pie' y la causalidad, sin suavizar la tensión de juicio.
  doctrine_reference: 'DOCTRINE.md: preserve theological tension; idioms under guilt before God'
translation_notes:
  revision_awareness: 'El borrador sigue de cerca la revisión auditada del inglés: se mantiene la fuerza causal de כִּי (''porque''), se conserva el valor resultativo de נִשְׁאַ֥רְנוּ como ''hemos quedado'', y se reproduce el idiomático de ''estar de pie'' en la cláusula final en vez de interpretarlo como mera imposibilidad física. También se preserva la distinción del Nombre divino frente a un título genérico.'
  spanish_consistency_notes:
  - Se usa 'Yahvé' de forma consistente para יְהוָה, conforme al criterio POB.
  - '''Justo'' se eligió para צַדִּיק por su adecuación moral/judicial y su naturalidad en español.'
  - '''Remanente'' mantiene la resonancia bíblica y comunitaria del sustantivo פְלֵיטָה.'
  - La cláusula final conserva el giro semítico 'mantenerse en pie' para no borrar la tensión teológica del texto.
