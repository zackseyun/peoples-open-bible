  yaml_path: translation/deuterocanon/sirach/026/007.yaml
  text: A jealous wife is heartache and grief when set against another woman[b][a], and a scourge of the tongue that associates with everyone.
  footnotes:
  - marker: a
    text: Or 'a rival wife ... over another wife.' The Greek ἀντίζηλος with ἐπὶ γυναικί may point to rivalry with another woman, possibly another wife, but the wording is compressed and can also be read more generally as jealousy directed against another woman.
    reason: lexical_alternative
  - marker: b
    text: The final clause is difficult. The Greek literally speaks of 'a scourge of the tongue, communicating/being shared with all,' which may mean speech that lashes everyone indiscriminately.
    reason: alternative_reading
