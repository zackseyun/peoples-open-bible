revisions:
- from: Y la hirió en el cuello dos veces con todas sus fuerzas[a], y le quitó la cabeza, y rodó su cuerpo fuera de la cama[b], y quitó el dosel de los postes.
  to: Y golpeó su cuello dos veces con todas sus fuerzas, y le quitó la cabeza[a], e hizo rodar su cuerpo fuera de la cama, y quitó el dosel[b] de los postes.
  rationale: Se corrige el error grave de referente/género cambiando «la hirió» por «golpeó su cuello», que refleja el griego y evita una lectura equivocada. Se sustituye «rodó su cuerpo» por «hizo rodar su cuerpo» para representar mejor ἀπεκύλισεν. También se reubica la nota sobre la decapitación al sintagma correcto y se ancla la ambigüedad de κωνώπιον en «dosel».
