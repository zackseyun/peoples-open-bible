translation:
  language: es
  text: 'Estos eran los hijos de Dan[a] según sus clanes: de Sujam, el clan de los sujamitas. Estos eran los clanes de Dan según sus familias.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «hijos de Dan»; en esta fórmula genealógica de censo, «hijos» puede funcionar como término de descendencia tribal.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אֵלֶּה
  english_pob_choice: These were
  chosen_spanish: Estos eran
  alternatives_spanish:
  - Estos son
  - Estos
  lexicon: HALOT
  rationale: La forma demostrativa introduce un registro censal-genealógico; en español, el pretérito imperfecto/ser compuesto no es necesario, pero «eran» conserva el valor de listado retrospectivo sin perder la fuerza deíctica.
- source_word: בְנֵי דָן
  english_pob_choice: the sons of Dan
  chosen_spanish: los hijos de Dan
  alternatives_spanish:
  - los descendientes de Dan
  - los hijos varones de Dan
  lexicon: HALOT
  rationale: Se mantiene la fórmula genealógica directa. En este contexto censal, «hijos» puede funcionar como término de descendencia tribal; «descendientes» sería una explicación interpretativa más explícita.
- source_word: לְמִשְׁפְּחֹתָם
  english_pob_choice: by their clans
  chosen_spanish: por sus familias
  alternatives_spanish:
  - según sus familias
  - por sus clanes
  lexicon: HALOT
  rationale: En Números, מִשְׁפָּחָה designa subdivisiones tribales; en español «familias» es una opción natural y fiel al contexto, y además evita una repetición rígida de «clanes».
- source_word: לְשׁוּחָם
  english_pob_choice: of Shuham
  chosen_spanish: de Sujam
  alternatives_spanish:
  - de Shuham
  - perteneciente a Sujam
  lexicon: HALOT
  rationale: Se conserva la relación de procedencia del antepasado del clan. «Sujam» sigue la transcripción hispana del nombre propio con adaptación fonética razonable.
- source_word: מִשְׁפַּחַת הַשּׁוּחָמִי
  english_pob_choice: the clan of the Shuhamites
  chosen_spanish: la familia de los sujamitas
  alternatives_spanish:
  - el clan de los sujamitas
  - la familia del sujamita
  lexicon: HALOT
  rationale: El singular constructo con el gentilicio denota el grupo colectivo descendiente de Sujam. «Familia» mantiene la relación genealógica y resulta más natural en español que una duplicación de «clan».
- source_word: מִשְׁפְּחֹת דָן
  english_pob_choice: the clans of Dan
  chosen_spanish: las familias de Dan
  alternatives_spanish:
  - los clanes de Dan
  - las familias danitas
  lexicon: HALOT
  rationale: La frase resumitiva final se vierte de manera coherente con el término ya elegido para מִשְׁפָּחָה. Se evita la repetición mecánica de «clanes» y se preserva el sentido de subdivisiones tribales.
- source_word: לְמִשְׁפְּחֹתָם
  english_pob_choice: by their families
  chosen_spanish: por sus familias
  alternatives_spanish:
  - según sus familias
  - por sus clanes
  lexicon: HALOT
  rationale: Se respeta la repetición del hebreo sin forzar una solución más literal que sonaría torpe en español. La traducción final mantiene la estructura formal del censo.
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión del texto base inglés que ajustó la frase final para evitar la repetición incómoda de «clanes» y reflejar mejor el hebreo. En español se resolvió de modo similar mediante «familias», conservando el paralelismo formal sin duplicar innecesariamente el mismo sustantivo.
  spanish_consistency_notes:
  - 'Se mantiene una sola traducción de מִשְׁפָּחָה en todo el versículo: «familia(s)», para preservar fluidez y coherencia.'
  - Se conserva el paralelismo del hebreo con una segunda cláusula resumitiva al final del versículo.
  - El nombre propio se adapta como «Sujam» para uniformidad en español; si el proyecto prefiere otra transliteración, debe aplicarse consistentemente en el corpus.
