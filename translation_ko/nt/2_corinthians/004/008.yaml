  text: ἐν παντὶ θλιβόμενοι ἀλλ’ οὐ στενοχωρούμενοι, ἀπορούμενοι ἀλλ’ οὐκ ἐξαπορούμενοι,
base_translation:
  language: en
  yaml_path: translation/nt/2_corinthians/004/008.yaml
  text: We are afflicted in every way, but not crushed; perplexed, but not driven to despair.
  footnotes:
  - marker: a
    text: Or "in everything"; the phrase denotes comprehensive scope, not necessarily literal spatial surround.
    reason: lexical_alternative
  - marker: b
    text: Literally, "not narrowed/constricted"; "crushed" expresses the sense in idiomatic English.
    reason: lexical_alternative
  - marker: c
    text: Or "not utterly at a loss." The Greek intensifies the previous term "perplexed."
    reason: lexical_alternative
translation:
  language: ko
  text: 우리는 사방에서 환난을 당하지만 짓눌리지 않으며, 당황하지만 절망하지 않습니다.
  philosophy: optimal-equivalence
