translation:
  language: es
  text: Por estas cosas estoy llorando; mi ojo, mi ojo corre con agua, porque el consolador que restaura mi alma[a] está lejos de mí. Mis hijos han quedado desolados, porque el enemigo ha prevalecido.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «vida». El hebreo נֶפֶשׁ puede significar «vida», «ser» o «alma» según el contexto.
    reason: lexical_alternative
lexical_decisions:
- source_word: עַל אֵלֶּה
  english_pob_choice: For these things
  chosen_spanish: Por estas cosas
  alternatives_spanish:
  - A causa de estas cosas
  - Por estas razones
  lexicon: HALOT
  rationale: La preposición עַל con el demostrativo introduce la causa o motivo del lamento. «Por estas cosas» conserva el valor causal y suena natural en español, sin añadir una explicación más fuerte de la que da el hebreo.
- source_word: בוֹכִיָּה
  english_pob_choice: I am weeping
  chosen_spanish: estoy llorando
  alternatives_spanish:
  - lloro
  - estoy llorando
  lexicon: HALOT
  rationale: La forma participial expresa una acción continua. «Estoy llorando» reproduce bien esa duración y mantiene el tono de lamentación personificada.
- source_word: עֵינִי עֵינִי
  english_pob_choice: my eye, my eye
  chosen_spanish: mi ojo, mi ojo
  alternatives_spanish:
  - mis ojos
  - mi ojo y mi ojo
  lexicon: HALOT
  rationale: Se conserva el singular repetido para mantener la intensidad poética del hebreo. «Mis ojos» suavizaría la repetición y perdería parte del efecto retórico.
- source_word: יֹרְדָה מַיִם
  english_pob_choice: runs down with water
  chosen_spanish: derrama agua
  alternatives_spanish:
  - corre con agua
  - se desliza con agua
  lexicon: HALOT
  rationale: El hebreo dice literalmente que «desciende agua». «Derrama agua» expresa la imagen con naturalidad en español y preserva el carácter vívido sin introducir «lágrimas», que sería una explicitación interpretativa.
- source_word: מְנַחֵם
  english_pob_choice: the comforter
  chosen_spanish: el consolador
  alternatives_spanish:
  - el que consuela
  - el consolador
  lexicon: HALOT
  rationale: El participio funciona sustantivamente. «El consolador» transmite la referencia a una figura concreta de consuelo, conforme al contexto.
- source_word: מֵשִׁיב נַפְשִׁי
  english_pob_choice: who restores my soul
  chosen_spanish: que restaura mi alma
  alternatives_spanish:
  - que restaura mi vida
  - que me restaura
  lexicon: HALOT
  rationale: El auditorio en inglés revisó entre «life» y «soul»; en español, «alma» mantiene la correspondencia más directa con נֶפֶשׁ sin forzar una lectura puramente dualista. «Mi vida» sería posible, pero aquí el contexto de consuelo/restauración permite «alma» de forma clara y tradicionalmente inteligible.
- source_word: רָחַק מִמֶּנִּי
  english_pob_choice: is far from me
  chosen_spanish: se ha alejado de mí
  alternatives_spanish:
  - está lejos de mí
  - se aparta de mí
  lexicon: HALOT
  rationale: El perfecto hebreo comunica una separación ya ocurrida. «Se ha alejado de mí» preserva esa distancia efectiva y encaja con el tono elegíaco.
- source_word: בָנַי
  english_pob_choice: My children
  chosen_spanish: Mis hijos
  alternatives_spanish:
  - Mis hijos
  - Mis muchachos
  lexicon: HALOT
  rationale: Aunque literalmente puede significar «mis hijos varones», en este contexto personificado funciona colectivamente. «Mis hijos» es el equivalente más natural y fiel para el habla de Sion.
- source_word: שׁוֹמֵמִים
  english_pob_choice: have become desolate
  chosen_spanish: han quedado desolados
  alternatives_spanish:
  - están desolados
  - han sido devastados
  lexicon: HALOT
  rationale: El término denota desolación resultante de ruina. «Han quedado desolados» conserva el estado alcanzado y evita una intensificación innecesaria.
- source_word: גָבַר אוֹיֵב
  english_pob_choice: the enemy has prevailed
  chosen_spanish: el enemigo ha prevalecido
  alternatives_spanish:
  - el enemigo ha vencido
  - el enemigo se ha impuesto
  lexicon: HALOT
  rationale: גבר señala superioridad o dominio efectivo. «Ha prevalecido» refleja bien esa idea y mantiene el tono sobrio del lamento.
theological_decisions:
- issue: Rendering of נַפְשִׁי in the phrase מֵשִׁיב נַפְשִׁי
  english_pob_reading: who restores my soul
  chosen_spanish_reading: que restaura mi alma
  alternative_spanish_readings:
  - que restaura mi vida
  - que me restaura
  rationale: Se preserva la ambigüedad semántica de נֶפֶשׁ, pero se elige «alma» por ser la correspondencia más cercana al término repetido y por ser plenamente comprensible en español bíblico actual. No se pretende fijar una antropología técnica donde el contexto poético habla de consuelo y restauración personal.
  doctrine_reference: Translation philosophy §1, §3
translation_notes:
  revision_awareness: El audio de revisión del texto inglés cambió de «my life» a «my soul» para acercarse más a נַפְשִׁי. La versión española sigue esa revisión y mantiene «mi alma» como equivalente principal, dejando «vida» como alternativa en nota.
  spanish_consistency_notes:
  - Se conserva la repetición enfática «mi ojo, mi ojo» para reflejar el hebreo.
  - Se evita traducir קושי/agua como «lágrimas» para no añadir una explicitación no presente en el texto.
  - «Consolador» se usa como sustantivo definido, coherente con la personificación del lamento.
  - «Ha prevalecido» mantiene la idea de dominio del enemigo sin añadir una victoria militar específica que el verso no desarrolla.
