revisions:
- from: 'Así que David envió e indagó acerca de la mujer, y él dijo: «¿No es esta Betsabé, hija de Eliam, esposa de Urías el hitita?»'
  to: 'Entonces David envió y preguntó por la mujer, y dijo: «¿No es esta Betsabé, hija de Eliam, esposa de Urías el hitita?»'
  rationale: 'Se hicieron ajustes menores para lograr un español más natural y digno sin apartarse del hebreo ni del rastro de auditoría en inglés: «Entonces» por fluidez narrativa, «preguntó por» como equivalente idiomático de «inquired about», y «y dijo» en lugar de «y él dijo» para evitar un pronombre innecesario. No hacen falta notas.'
