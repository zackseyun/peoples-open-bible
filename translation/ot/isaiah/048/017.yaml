id: ISA.48.17
reference: Isaiah 48:17
source:
  edition: WLC
  text: כֹּֽה אָמַ֧ר יְהוָ֛ה גֹּאַלְ/ךָ֖ קְד֣וֹשׁ יִשְׂרָאֵ֑ל אֲנִ֨י יְהוָ֤ה אֱלֹהֶ֨י/ךָ֙ מְלַמֶּדְ/ךָ֣ לְ/הוֹעִ֔יל מַדְרִֽיכֲ/ךָ֖ בְּ/דֶ֥רֶךְ תֵּלֵֽךְ־׃
translation:
  text: 'Thus says Yahweh[a], your Redeemer, the Holy One of Israel: I am Yahweh your God, who teaches you to profit[b], who leads you in the way you should go.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more formally, “who teaches you to profit.”
    reason: lexical_alternative
  - marker: b
    text: Or “who guides you in the way you go.” The Hebrew may be read more descriptively (“the way you go”) or more instructionally (“the way you should go”); the main text reflects the instructional sense in context.
    reason: alternative_reading
lexical_decisions:
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  rationale: Rendered according to the project's default for the divine name, following the stated doctrine table and standard English Bible convention.
- source_word: גֹּאַלְךָ
  chosen: your Redeemer
  alternatives:
  - your kinsman-redeemer
  - the one who redeems you
  lexicon: HALOT
  rationale: The participial form functions as a title for YHWH. 'Redeemer' is the most natural concise English equivalent in Isaiah, preserving covenantal and salvific force without over-specifying the kinship nuance in the main text.
- source_word: קְדוֹשׁ יִשְׂרָאֵל
  chosen: the Holy One of Israel
  alternatives:
  - Israel's Holy One
  lexicon: HALOT
  rationale: This is a fixed Isaianic title; the traditional rendering is both accurate and clear.
- source_word: אֱלֹהֶיךָ
  chosen: your God
  alternatives:
  - your mighty God
  lexicon: HALOT
  rationale: In construct with the 2ms suffix and in covenantal context, 'your God' is the standard and contextually appropriate rendering.
- source_word: מְלַמֶּדְךָ
  chosen: who teaches you
  alternatives:
  - teaching you
  - the one teaching you
  lexicon: HALOT
  rationale: The participle describes ongoing characteristic action by God. Relative-clause English is the most natural way to express this.
- source_word: לְהוֹעִיל
  chosen: for your benefit
  alternatives:
  - to profit you
  - for profit
  - for what is beneficial
  lexicon: HALOT
  rationale: The infinitive conveys beneficial purpose/result. 'For your benefit' communicates the sense in clear modern English better than the more archaic 'to profit you,' while preserving the idea of advantage rather than mere instruction.
- source_word: מַדְרִיכֲךָ
  chosen: who leads you
  alternatives:
  - who guides you
  - guiding you
  lexicon: HALOT
  rationale: '''Leads'' fits the causative sense and pairs well with the following path imagery. ''Guides'' is possible, but ''leads'' better preserves the movement metaphor.'
- source_word: בְּדֶרֶךְ
  chosen: in the way
  alternatives:
  - in a way
  - on the path
  lexicon: HALOT
  rationale: With the following verb of going, this idiom refers to the course/path of life or conduct. 'In the way' preserves the metaphor and reads naturally in English.
- source_word: תֵּלֵךְ
  chosen: you should go
  alternatives:
  - you go
  - you will go
  - you are to go
  lexicon: HALOT
  rationale: Although formally imperfect 2ms, in this context after 'the way' it expresses the proper course to take rather than simple future. 'You should go' best captures the instructional nuance in idiomatic English without overstating command.
