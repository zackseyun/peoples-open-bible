translation:
  language: es
  text: Y los días de Isaac fueron ciento ochenta años[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «los días de Isaac fueron cien año y ochenta año», usando «días» como modismo para la duración de la vida.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּהְיוּ
  english_pob_choice: were
  chosen_spanish: fueron
  alternatives_spanish:
  - eran
  - llegaron a ser
  lexicon: HALOT
  rationale: En este cierre genealógico/narrativo, el verbo hebreo funciona como copulativo que introduce la suma de la vida de Isaac. «Fueron» conserva la sencillez narrativa y permite una lectura natural en español sin perder el valor de totalización.
- source_word: יְמֵי
  english_pob_choice: the days of
  chosen_spanish: los días de
  alternatives_spanish:
  - la vida de
  - los años de
  lexicon: HALOT
  rationale: Se conserva la idiomática hebrea «días de» para no borrar la expresión fuente que el POB inglés decidió mantener. En español es comprensible y respeta el uso semítico de «días» como duración de vida.
- source_word: יִצְחָק
  english_pob_choice: Isaac
  chosen_spanish: Isaac
  lexicon: Transliteración estándar del nombre propio
  rationale: Nombre propio transliterado de forma estable y reconocible en español bíblico.
- source_word: מְאַת שָׁנָה וּשְׁמֹנִים שָׁנָה
  english_pob_choice: one hundred and eighty years
  chosen_spanish: de cien años y ochenta años
  alternatives_spanish:
  - de ciento ochenta años
  - de cien años y ochenta
  lexicon: HALOT
  rationale: La construcción hebrea expresa la edad por suma de unidades («cien años y ochenta años»). Se evita compactar demasiado en «ciento ochenta años» para no borrar la forma de expresión preservada por el POB; el plural natural en español se mantiene para una edad total.
translation_notes:
  revision_awareness: El texto hebreo y el audit trail inglés coinciden plenamente en sentido y no muestran revisiones aplicadas; la versión española conserva esa estabilidad y reproduce el modismo hebreo de forma auditable.
  spanish_consistency_notes:
  - Se prefiere «fueron» sobre una perífrasis más interpretativa para mantener el tono de cierre cronístico.
  - Se conserva «los días de» porque el POB inglés documenta explícitamente esa decisión lexical.
  - La nota al pie explica la equivalencia idiomática sin reemplazar la forma fuente en el cuerpo del texto.
