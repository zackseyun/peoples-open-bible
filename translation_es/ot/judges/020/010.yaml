revisions:
- from: Y tomaremos diez hombres de cada cien de todas las tribus de Israel[a], y cien de cada mil, y mil de cada diez mil, para llevar provisiones para el pueblo, para hacer cuando lleguen a Guibeá de Benjamín[b], conforme a toda la vileza que hizo en Israel.
  to: Y tomaremos diez hombres de cada cien de todas las tribus de Israel, y cien de cada mil, y mil de cada diez mil, para tomar provisiones para el pueblo, para que, cuando lleguen[a] a Guibeá de Benjamín, hagan conforme a toda la vileza[b] que hizo en Israel.
  rationale: Se reparó la sintaxis para que el español sea natural y fiel al hebreo comprimido, se ajustó 'llevar' a 'tomar' para reflejar mejor לָקַחַת צֵדָה, y se recolocaron las notas en los términos que realmente explican.
