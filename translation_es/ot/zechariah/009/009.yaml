review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español sigue bien la estructura del hebreo y del POB inglés: conserva la doble apelación a Sion/Jerusalén, la inmediatez de la venida del rey, los predicados «justo ... humilde», y la imagen del asno/pollino con nota sobre el paralelismo poético. Sin embargo, hay ajustes necesarios para mayor fidelidad semántica y naturalidad española: «Da gritos» suena menos preciso que un clamor jubiloso; «con salvación» es algo opaco en español para וְנוֹשָׁע y conviene una forma más inteligible que siga abierta; y la puntuación alrededor de «humilde» puede mejorar.'
  spanish_quality_summary: El texto es mayormente claro y digno, pero contiene formulaciones algo rígidas o poco idiomáticas para español bíblico contemporáneo. «Hija Sion / hija Jerusalén» es aceptable en registro bíblico, aunque algo marcado; «Da gritos» suena más coloquial que solemne; «con salvación es él» no fluye bien. Con ajustes menores, el verso gana legibilidad sin perder literalidad.
  glossary_alignment: 'No hay conflicto con la terminología principal del proyecto. «Sion», «Jerusalén», «rey», «justo», «humilde», «asno» y «asna» están bien. La principal cuestión léxica es וְנוֹשָׁע: el inglés auditado optó por «having salvation», y en español «salvador» sobreinterpretaría, mientras «salvado» resolvería demasiado hacia la pasiva; «dotado de salvación» o «con salvación» son posibles, pero la segunda resulta menos natural. También conviene alinear la nota de עָנִי con las alternativas documentadas en inglés.'
  issues:
  - severity: medium
    issue: «Da gritos» para הָרִיעִי
    rationale: Transmite volumen, pero no suena tan digno ni tan específicamente celebratorio como el contexto regio-profético. «Lanza gritos de júbilo» sería demasiado expansivo; «grita» o «da voces de alegría» son opciones, pero la segunda añade contenido. «Da voces» mejora algo, aunque «grita» es más directo.
  - severity: medium
    issue: «con salvación es él» para וְנוֹשָׁע
    rationale: Preserva ambigüedad, pero resulta poco natural y semánticamente borroso en español. Hace falta una formulación más legible sin clausurar las alternativas pasiva/resultado. «Dotado de salvación» mantiene apertura y suena más claro.
  - severity: low
    issue: Coma antes de «y montado»
    rationale: La pausa «humilde, y montado...» es menos natural en español moderno; la coordinación fluye mejor sin esa coma.
  - severity: low
    issue: Nota b introduce «justo y recto» como alternativa
    rationale: No corresponde bien a una alternativa léxica simple del término hebreo, sino a una expansión interpretativa. Conviene dejar alternativas más limpias como «recto».
  - severity: low
    issue: Nota c usa «deliverado»
    rationale: Hay un anglicismo/errata evidente; debe decir «librado» o «rescatado».
