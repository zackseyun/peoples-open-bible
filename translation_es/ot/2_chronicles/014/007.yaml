base_translation:
  language: en
  yaml_path: translation/ot/2_chronicles/014/007.yaml
  text: And Asa had an army of three hundred thousand from Judah bearing large shields and spears[a], and from Benjamin two hundred eighty thousand bearing shields and drawing bows. All these were mighty men of valor.
  footnotes:
