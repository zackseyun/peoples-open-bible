translation:
  language: es
  text: Y reunirá un pueblo santo, a quien conducirá en rectitud[a]; y juzgará las tribus del pueblo santificado por Yahvé, su Dios.[b]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «en justicia».
    reason: lexical_alternative
  - marker: b
    text: O «santificado por el Señor su Dios».
    reason: lexical_alternative
lexical_decisions:
- source_word: συνάξει
  english_pob_choice: will gather
  chosen_spanish: reunirá
  alternatives_spanish:
  - juntará
  - agrupará
  lexicon: LSJ
  rationale: El verbo expresa la reunión de personas; en español, «reunirá» comunica con naturalidad la acción futura de reunir sin añadir matices ajenos.
- source_word: λαὸν ἅγιον
  english_pob_choice: a holy people
  chosen_spanish: un pueblo santo
  alternatives_spanish:
  - un pueblo sagrado
  - un pueblo consagrado
  lexicon: LSJ
  rationale: «Pueblo santo» preserva el valor covenantal y religioso de ἅγιος y es la forma más directa y clara en español.
- source_word: ἀφήγήσεται
  english_pob_choice: he will lead
  chosen_spanish: lo conducirá
  alternatives_spanish:
  - lo guiará
  - lo llevará adelante
  lexicon: LSJ
  rationale: El griego indica dirección/guía de un pueblo. «Conducirá» mantiene el sentido de liderazgo y guía en un registro digno; el objeto implícito se expresa con «lo» para evitar ambigüedad en español.
- source_word: ἐν δικαιοσύνῃ
  english_pob_choice: in righteousness
  chosen_spanish: en justicia
  alternatives_spanish:
  - en rectitud
  - en justicia y rectitud
  lexicon: LSJ
  rationale: Aunque el proyecto suele usar «justicia» como opción viable para δικαιοσύνη en contextos reales y judiciales, aquí la conducción del rey-mesías puede expresarse con esa misma palabra sin perder la fuerza normativa del término.
- source_word: κρινεῖ
  english_pob_choice: he will judge
  chosen_spanish: juzgará
  alternatives_spanish:
  - gobernará
  - regirá
  lexicon: LSJ
  rationale: «Juzgará» conserva el valor básico de κρίνω y deja abierta la resonancia de gobierno real sin sustituirla por una paráfrasis política.
- source_word: ἡγιασμένου
  english_pob_choice: made holy
  chosen_spanish: santificado
  alternatives_spanish:
  - hecho santo
  - consagrado
  lexicon: LSJ
  rationale: La forma pasiva perfecta exige un participio que indique acción recibida. «Santificado» es preciso y formal; mantiene la idea de una acción divina sobre el pueblo.
- source_word: ὑπὸ Κυρίου θεοῦ αὐτοῦ
  english_pob_choice: by the Lord his God
  chosen_spanish: por el Señor su Dios
  alternatives_spanish:
  - por Yahvé su Dios
  - por el Señor, su Dios
  lexicon: LSJ
  rationale: Se conserva «Señor» aquí porque el griego cita κύριος en un sintagma fijo con θεός; en español, la expresión resultante es la más natural y transparente dentro de este versículo, sin perder la referencia divina.
theological_decisions:
- issue: δικαιοσύνη en contexto real/judicial
  english_pob_reading: in righteousness
  chosen_spanish_reading: en justicia
  alternative_spanish_readings:
  - en rectitud
  rationale: El inglés POB preserva la tensión entre la justicia moral y el gobierno recto. En español, «en justicia» permite mantener esa amplitud semántica y también la posible resonancia judicial sin forzar una glosa explicativa.
  doctrine_reference: DOCTRINE.md contested terms table
- issue: κύριος θεός αὐτοῦ y la referencia al nombre divino
  english_pob_reading: by the Lord his God
  chosen_spanish_reading: por el Señor su Dios
  alternative_spanish_readings:
  - por Yahvé su Dios
  rationale: Aunque el proyecto suele renderizar יהוה como «Yahvé», aquí el texto griego presenta κύριος θεοῦ αὐτοῦ como una fórmula titulada. Dado que la fuente inmediata es griega y el audit trail inglés retiene «Lord», se mantiene «Señor» en la frase fija; la relación posesiva «su Dios» conserva la referencia personal.
  doctrine_reference: Project name-rendering policy / source-language allusion handling
translation_notes:
  revision_awareness: La revisión inglesa más reciente ajustó la segunda mitad para reflejar mejor el griego anarthrous y la estructura de «laoú hēgiasménou». En español se conserva la relación genitiva como «del pueblo santificado», evitando introducir un artículo o cuantificador que no está exigido por el original. También se mantiene la correspondencia paralela entre «un pueblo santo» y «el pueblo santificado».
  spanish_consistency_notes:
  - Se mantiene «justicia» para δικαιοσύνη, en continuidad con el criterio del proyecto y con la alternativa inglesa documentada.
  - Se usa «santo/santificado» para ἅγιος/ἡγιασμένου, distinguiendo adjetivo de participio pasivo.
  - «Señor» se conserva como traducción de κύριος en la fórmula final del griego, sin convertirlo automáticamente en «Yahvé» por tratarse de una construcción nominal griega.
  - La puntuación refleja dos miembros principales unidos por punto y coma, en paralelo con el griego.
