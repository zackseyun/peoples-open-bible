base_translation:
  language: en
  yaml_path: translation/ot/joshua/020/005.yaml
  text: And if the avenger of blood pursues him[a], they shall not hand the manslayer over into his hand, because he struck his neighbor without intent and had not hated him before, from yesterday or the day before.
  footnotes:
