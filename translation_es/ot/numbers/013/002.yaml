revisions:
- from: Envía para ti mismo[a] hombres, y que ellos exploren[b] la tierra de Canaán, que yo estoy dando a los hijos[c] de Israel. Enviarás uno por cada tribu de sus padres, cada uno un líder entre ellos[d].
  to: Envía para ti[a] hombres, y que exploren[b] la tierra de Canaán, que yo estoy dando a los hijos[c] de Israel. Enviarás un hombre de cada tribu de sus padres; cada uno, un líder entre ellos[d].
  rationale: La revisión mantiene todas las decisiones clave del POB auditado, pero corrige la expresión tribal para representar con más fidelidad y mejor español לְמַטֵּה אֲבֹתָיו. También suaviza ligeramente לְךָ para evitar una frase innecesariamente tiesa, sin perder el matiz personal. Las notas se conservan donde aportan valor real y siguen marcadores únicos correctamente anclados.
