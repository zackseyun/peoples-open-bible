translation:
  language: es
  text: Las tiendas de los destructores están tranquilas[a], y están seguros los que provocan a Dios[b]—aquellos en cuya mano Dios pone[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «están a gusto», «viven seguros» o «prosperan». El hebreo expresa sosiego o ausencia de perturbación, no solo prosperidad material.'
    reason: alternative_reading
  - marker: b
    text: 'O: «los que irritan a Dios» o «los que enfurecen a Dios». El hiphil de רגז aquí tiene sentido causal: provocar o encolerizar.'
    reason: lexical_alternative
  - marker: c
    text: La cláusula final es difícil. Literalmente, algo como «en cuya mano Dios trae/ha traído». La traducción busca conservar la sintaxis y la ambigüedad del hebreo sin resolver del todo el sentido de la imagen.
    reason: source_note
lexical_decisions:
- source_word: יִשְׁלָ֤יוּ
  english_pob_choice: are at ease
  chosen_spanish: están en paz
  alternatives_spanish:
  - están a gusto
  - están tranquilos
  - viven seguros
  lexicon: HALOT
  rationale: El verbo expresa quietud, sosiego o ausencia de perturbación. 'Están en paz' comunica esa idea en español sin reducirla solo a prosperidad material, y conserva el contraste irónico del contexto.
- source_word: אֹהָלִ֨ים
  english_pob_choice: tents
  chosen_spanish: tiendas
  alternatives_spanish:
  - carpas
  - moradas
  - hogares
  lexicon: HALOT
  rationale: '''Tiendas'' mantiene la imagen concreta del hebreo y funciona bien en poesía sapiencial. ''Hogares'' sería más interpretativo.'
- source_word: לְ/שֹׁ֥דְדִ֗ים
  english_pob_choice: of destroyers
  chosen_spanish: de los destructores
  alternatives_spanish:
  - de los saqueadores
  - de los robadores
  - de los despojadores
  lexicon: HALOT
  rationale: 'Se conserva el valor amplio del participio: gente que arruina, saquea o destruye. ''Destructores'' evita estrecharlo solo a robo y refleja la violencia del término.'
- source_word: וּֽבַטֻּחוֹת
  english_pob_choice: are secure
  chosen_spanish: seguros están
  alternatives_spanish:
  - están seguros
  - están confiados
  - están sin temor
  lexicon: HALOT
  rationale: El sustantivo/adjetivo derivado de בטח expresa seguridad o confianza. 'Seguros están' mantiene el paralelismo poético con el primer cola y sugiere estabilidad externa e interna.
- source_word: לְ/מַרְגִּ֣יזֵי אֵ֑ל
  english_pob_choice: those who provoke God
  chosen_spanish: los que provocan a Dios
  alternatives_spanish:
  - los que irritan a Dios
  - los que enfurecen a Dios
  - los que hacen temblar a Dios
  lexicon: HALOT
  rationale: 'El hiphil de רגז tiene fuerza causal: provocar, irritar, enfurecer. ''Provocan a Dios'' es idiomático en español y conserva la idea de ofensa contra Dios.'
- source_word: אֵל
  english_pob_choice: God
  chosen_spanish: Dios
  alternatives_spanish:
  - el Poderoso
  lexicon: HALOT
  rationale: En este contexto el título divino se entiende naturalmente como 'Dios'. 'El Poderoso' sería posible, pero menos directo para la lectura pública.
- source_word: לַ/אֲשֶׁ֤ר הֵבִ֖יא אֱל֣וֹהַּ בְּ/יָדֽ/וֹ
  english_pob_choice: those into whose hand God brings
  chosen_spanish: a quienes Dios trae a su mano
  alternatives_spanish:
  - a quienes Dios pone en su mano
  - en cuya mano Dios trae
  - a quienes Dios entrega en su poder
  lexicon: HALOT
  rationale: La cláusula final es difícil. Se respeta la revisión inglesa que entiende a אֱלוֹהַּ como sujeto ('Dios') y בְּיָדוֹ como 'a su mano'. 'Trae a su mano' conserva el hebraísmo sin forzar una interpretación adicional sobre el sentido exacto de la imagen.
theological_decisions:
- issue: Sentido de אֱלוֹהַּ en la cláusula final
  english_pob_reading: '''God'' as the subject, with the clause remaining syntactically difficult'
  chosen_spanish_reading: 'Dios es el sujeto: ''a quienes Dios trae a su mano'''
  alternative_spanish_readings:
  - '''dios'' en sentido irónico, como objeto de confianza del impío'
  - '''a quienes Dios pone en su poder'' como paráfrasis interpretativa'
  rationale: La revisión inglesa reciente corrigió la cláusula para reflejar a אֱלוֹהַּ como 'God' y preservar la sintaxis sin añadir una interpretación cerrada. En español se sigue esa línea, evitando resolver la ambigüedad más allá de lo que el texto permite.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: Se tomó en cuenta la revisión más reciente del inglés POB, que corrigió la cláusula final de una lectura interpretativa ('whose god brings into their hand') a una más ajustada al hebreo ('those into whose hand God brings'). La versión española sigue esa corrección y conserva la dificultad del cierre en vez de resolverla de manera dogmática.
  spanish_consistency_notes:
  - Se usó 'Dios' para אֵל y אֱלוֹהַּ, sin introducir 'SEÑOR' ni 'Yahvé', porque en este versículo el texto apunta al título divino general y la cláusula final depende de la lectura revisada del hebreo.
  - Se mantuvo 'tiendas' para אֹהָלִים por fidelidad a la imagen poética.
  - '''Provocan a Dios'' conserva el valor fuerte del participio y suena natural en español bíblico contemporáneo.'
  - La construcción 'a quienes Dios trae a su mano' preserva el hebraísmo sin convertirlo en una explicación interpretativa excesiva.
