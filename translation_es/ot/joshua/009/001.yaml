base_translation:
  language: en
  yaml_path: translation/ot/joshua/009/001.yaml
  text: And it happened[a], when all the kings who were beyond the Jordan—in the hill country, in the lowland, and along the whole coast of the Great Sea toward Lebanon—the Hittite, the Amorite, the Canaanite, the Perizzite, the Hivite, and the Jebusite—heard of it[c][b],
  footnotes:
  - marker: a
    text: Hebrew literally, 'when all the kings ... heard.' The object is left unstated here and is supplied in English as 'of it' from the surrounding context.
