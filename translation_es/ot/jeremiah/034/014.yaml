translation:
  language: es
  text: Al cabo de siete años[a], cada uno de ustedes[b] enviará a su hermano hebreo, que haya sido vendido a usted[c] y le haya servido seis años; lo dejará ir libre de su lado. Pero sus padres no me escucharon ni inclinaron el oído.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «Después de siete años». La expresión hebrea puede entenderse como el cumplimiento de un período de siete años.
    reason: lexical_alternative
  - marker: b
    text: O «cada hombre»; el hebreo usa un singular distributivo.
    reason: lexical_alternative
  - marker: c
    text: O «que se haya vendido a usted»; la forma hebrea puede entenderse en sentido pasivo o reflexivo en este contexto legal.
    reason: lexical_alternative
lexical_decisions:
- source_word: מִקֵּץ שֶׁבַע שָׁנִים
  english_pob_choice: At the end of seven years
  chosen_spanish: Al fin de siete años
  alternatives_spanish:
  - Después de siete años
  lexicon: HALOT
  rationale: La expresión marca la culminación de un período de siete años; «al fin de» conserva ese cierre temporal sin añadir mecánicas calendáricas no explicitadas. «Después de» es posible, pero suaviza el matiz de término del plazo.
- source_word: תְּשַׁלְּחוּ
  english_pob_choice: each of you shall send away
  chosen_spanish: cada uno de ustedes enviará lejos
  alternatives_spanish:
  - cada uno de ustedes liberará
  - cada uno de ustedes despedirá
  lexicon: HALOT
  rationale: El verbo שׁלח tiene fuerza concreta de enviar/alejar; «enviará lejos» preserva la repetición verbal del pasaje y el sentido legal de despido/liberación sin borrar la imagen.
- source_word: אִישׁ
  english_pob_choice: each of you
  chosen_spanish: cada uno de ustedes
  alternatives_spanish:
  - cada hombre
  - cada persona
  lexicon: HALOT
  rationale: Aunque el hebreo usa un singular distributivo, en español «cada uno de ustedes» comunica con naturalidad el carácter distributivo del mandato. «Cada hombre» sería más literal pero menos idiomático.
- source_word: אָחִיו הָעִבְרִי
  english_pob_choice: his Hebrew brother
  chosen_spanish: su hermano hebreo
  alternatives_spanish:
  - su par hebreo
  - su compatriota hebreo
  lexicon: HALOT
  rationale: «Hermano hebreo» conserva la fraternidad legal/covenantal del texto. «Par hebreo» o «compatriota hebreo» atenúan la fuerza familiar que sí está presente en אָח.
- source_word: אֲשֶׁר יִמָּכֵר לְךָ
  english_pob_choice: who has been sold to you
  chosen_spanish: que haya sido vendido a usted
  alternatives_spanish:
  - que se venda a usted
  - que fue vendido a usted
  lexicon: HALOT
  rationale: El nifal de מכר permite una lectura pasiva o reflexiva; en español, «haya sido vendido» mantiene la pasividad sin decidir por una autoventa que el hebreo no exige. Se conserva el valor legal de la venta.
- source_word: וַעֲבָדְךָ שֵׁשׁ שָׁנִים
  english_pob_choice: and has served you six years
  chosen_spanish: y le haya servido seis años
  alternatives_spanish:
  - y haya trabajado para usted seis años
  - y le haya servido durante seis años
  lexicon: HALOT
  rationale: עבד en este contexto legal se expresa bien con «servir». «Le haya servido seis años» mantiene el tiempo completo de servicio previo a la liberación y evita cargar el texto con connotaciones ajenas.
- source_word: וְשִׁלַּחְתּוֹ חָפְשִׁי
  english_pob_choice: you shall send him away free
  chosen_spanish: lo enviará libre
  alternatives_spanish:
  - lo dejará ir libre
  - lo despedirá libre
  lexicon: HALOT
  rationale: La secuencia repite שׁלח y culmina con חָפְשִׁי. «Lo enviará libre» conserva ambos elementos con brevedad formal; «lo dejará ir libre» es más explicativo pero menos pegado al léxico.
- source_word: מֵעִמָּךְ
  english_pob_choice: from you
  chosen_spanish: de usted
  alternatives_spanish:
  - de su lado
  - de su presencia
  lexicon: HALOT
  rationale: La frase literal «de contigo/desde con usted» se naturaliza como «de usted» en español, preservando la idea de separación sin añadir expansión interpretativa.
- source_word: שָׁמְעוּ
  english_pob_choice: did not listen to me
  chosen_spanish: no me escucharon
  alternatives_spanish:
  - no me oyeron
  - no obedecieron
  lexicon: HALOT
  rationale: שׁמע con אֶל expresa oír con atención/hear-heed. «Escucharon» conserva la metáfora auditiva que el audit trail quiso mantener; «obedecieron» sería legítimo, pero más interpretativo.
- source_word: הִטּוּ אֶת אָזְנָם
  english_pob_choice: incline their ear
  chosen_spanish: inclinaron su oído
  alternatives_spanish:
  - prestaron atención
  - volvieron su oído
  lexicon: HALOT
  rationale: Se mantiene el modismo hebreo con un equivalente transparente en español. «Inclinaron su oído» preserva la imagen corporal y la fuerza de atención deliberada.
theological_decisions:
- issue: Lenguaje de parentesco covenantal y masculinidad singular
  english_pob_reading: his Hebrew brother
  chosen_spanish_reading: su hermano hebreo
  alternative_spanish_readings:
  - su par hebreo
  - su compatriota hebreo
  rationale: El texto legal usa masculino singular y parentesco fraternal. Se conserva esa forma porque neutralizarla haría perder la tonalidad familiar/covenantal del mandato, que el audit trail considera significativa.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
- issue: Terminología de servidumbre vinculada a una venta legal
  english_pob_reading: who has been sold to you ... has served you six years
  chosen_spanish_reading: que haya sido vendido a usted y le haya servido seis años
  alternative_spanish_readings:
  - que se venda a usted y le haya servido seis años
  - que fue vendido a usted y le haya servido seis años
  rationale: La cláusula combina venta y servicio dentro de un marco jurídico de liberación. «Vendido» mantiene la realidad legal; «servido» conserva עבד sin convertirlo en un término más suave que podría ocultar la fuerza del pasaje.
  doctrine_reference: DOCTRINE.md §Translation philosophy 1, 5
translation_notes:
  revision_awareness: 'La redacción sigue el sentido confirmado por el pasaje hebreo y por el audit trail inglés: se conserva el marcador temporal de culminación («al fin de siete años»), el distributivo legal («cada uno de ustedes»), la repetición de שׁלח mediante «enviará/lo enviará», y la cláusula de rechazo final con el modismo auditivo «inclinaron su oído». Se tuvo en cuenta la revisión inglesa que prefirió «free from you» por naturalidad; en español se resolvió con «libre de usted» para mantener la misma relación entre libertad y separación sin calco áspero.'
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el texto lo exija; este versículo no contiene el nombre divino explícito.
  - «Hebreo» se mantiene como adjetivo étnico/legal, en línea con la POB inglesa.
  - Se preserva el tono jurídico del mandato con verbos concretos («enviará», «vendido», «servido», «libre»).
  - No se introduce «obedecieron» para שׁמע, porque el audit trail favorece conservar el valor de escuchar/hear-heed.
  - Se evita «siervo» para עבד, ya que el contexto trata de servicio laboral forzado o vinculado a deuda, no de un matiz devocional.
