base_translation:
  language: en
  yaml_path: translation/ot/genesis/027/041.yaml
  text: And Esau hated Jacob because of the blessing with which his father had blessed him[a], and Esau said in his heart, “The days of mourning for my father are drawing near[c][b]; then I will kill Jacob my brother.”
  footnotes:
  - marker: a
    text: Or, “Esau hated Jacob.” The Hebrew verb denotes sustained hostility or enmity, not merely a passing feeling.
    reason: lexical_alternative
  - marker: b
    text: Literally, “said in his heart.”
    reason: lexical_alternative
  - marker: c
    text: Or, “The days of my father’s mourning are drawing near.” The Hebrew may be understood either as mourning for Isaac after his death or as Isaac’s own period of grief.
    reason: lexical_alternative
