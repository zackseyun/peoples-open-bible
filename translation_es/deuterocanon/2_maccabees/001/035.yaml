translation:
  language: es
  text: Y de ellos el rey recibía muchos regalos variados[a], y los distribuía.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «muchas cosas diversas». El griego no expresa el objeto explícitamente; «regalos» se añade por el contexto.
    reason: lexical_alternative
lexical_decisions:
- source_word: οἷς
  english_pob_choice: from them
  chosen_spanish: de ellos
  alternatives_spanish:
  - de quienes
  - de esos hombres
  - de los cuales
  lexicon: LSJ
  rationale: El relativo griego se refiere a las personas mencionadas antes; en español, «de ellos» comunica de modo natural la relación de procedencia que exige ἐλάμβανεν en este contexto.
- source_word: πολλὰ διάφορα
  english_pob_choice: many various gifts
  chosen_spanish: muchos regalos diversos
  alternatives_spanish:
  - muchas cosas diversas
  - muchos presentes diversos
  - muchos obsequios diversos
  lexicon: LSJ
  rationale: διάφορα significa «diversos, varios, diferentes». Como el griego no nombra explícitamente el objeto, el POB inglés suplió «gifts» por contexto; en español, «regalos» conserva esa suplencia contextual sin hacer la frase pesada, y «diversos» preserva la idea de pluralidad/variedad.
- source_word: ἐλάμβανεν
  english_pob_choice: received
  chosen_spanish: recibía
  alternatives_spanish:
  - recibió
  - tomaba
  - iba recibiendo
  lexicon: LSJ
  rationale: El imperfecto griego sugiere una acción en curso o repetida; «recibía» mantiene ese matiz narrativo mejor que un pretérito puntual.
- source_word: μετεδίδου
  english_pob_choice: distributed
  chosen_spanish: los distribuía
  alternatives_spanish:
  - los repartía
  - los compartía
  - los daba
  lexicon: LSJ
  rationale: μεταδίδωμι indica dar o repartir una porción. «Los distribuía» reproduce bien la idea de redistribuir lo recibido; el pronombre «los» retoma implícitamente los regalos mencionados.
translation_notes:
  revision_awareness: El texto griego es breve y el principal punto de decisión es la suplencia del objeto implícito tras πολλὰ διάφορα. La versión inglesa del POB ya optó por «gifts» por contexto; aquí se conserva esa decisión en español con un equivalente natural y se mantiene el imperfecto narrativo de ambos verbos.
  spanish_consistency_notes:
  - Se conserva «Y» inicial para reflejar la cadena narrativa del griego.
  - «regalos» sigue la suplencia contextual del inglés POB; no se traduce literalmente como «cosas» para evitar aspereza innecesaria.
  - El indefinido plural implícito en «los distribuía» remite a los «regalos diversos» mencionados previamente.
