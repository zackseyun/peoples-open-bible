  text: 'The sons of Tola: Uzzi[a], Rephaiah, Jeriel, Jahmai, Ibsam, and Samuel, heads of their fathers’ houses belonging to Tola, mighty men of valor according to their generations[c][b]. Their number in the days of David was twenty-two thousand six hundred.'
