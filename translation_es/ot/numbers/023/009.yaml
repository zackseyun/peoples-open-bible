translation:
  language: es
  text: Porque desde la cumbre de las peñas lo veo, y desde los collados lo contemplo. Mira, un pueblo que habita aparte, y no se cuenta[a] entre las naciones.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «y no será contado entre las naciones». El verbo hebreo también puede entenderse en sentido pasivo, además de reflexivo o medio.'
    reason: alternative_reading
lexical_decisions:
- source_word: כִּי
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  lexicon: HALOT
  rationale: La partícula introduce la explicación del oráculo; «Porque» conserva bien la fuerza conectiva sin volverla demasiado causal o discursiva.
- source_word: מֵרֹאשׁ
  english_pob_choice: from the top of
  chosen_spanish: desde la cumbre de
  alternatives_spanish:
  - desde la cima de
  - desde lo alto de
  lexicon: HALOT
  rationale: En contexto topográfico, רֹאשׁ funciona como «cima/cumbre». «Desde la cumbre de» mantiene la imagen de altura con español natural y solemne.
- source_word: צֻרִים
  english_pob_choice: the rocks
  chosen_spanish: las peñas
  alternatives_spanish:
  - las rocas
  - los riscos
  lexicon: HALOT
  rationale: El plural de צוּר alude a alturas rocosas. «Peñas» transmite mejor el relieve escarpado y poético que «rocas» en español bíblico-literario.
- source_word: אֶרְאֶנּוּ
  english_pob_choice: I see him
  chosen_spanish: lo veo
  alternatives_spanish:
  - lo observo
  - lo percibo
  lexicon: HALOT
  rationale: El objeto singular masculino preserva la referencia colectiva a Israel. En español, el clítico «lo» comunica mejor la referencia que repetir «a él» en este verso poético.
- source_word: וּמִגְּבָעוֹת
  english_pob_choice: and from the hills
  chosen_spanish: y desde los collados
  alternatives_spanish:
  - y desde las colinas
  - y desde las alturas
  lexicon: HALOT
  rationale: «גְּבָעוֹת» corresponde a elevaciones menores; «collados» conserva el paralelismo poético con «peñas» y suena más natural en registro bíblico.
- source_word: אֲשׁוּרֶנּוּ
  english_pob_choice: I behold him
  chosen_spanish: lo contemplo
  alternatives_spanish:
  - lo miro
  - lo observo
  lexicon: HALOT
  rationale: El verbo poético añade matiz de mirar atentamente. «Contemplo» distingue este segundo verbo de «veo» y mantiene la elevación del estilo.
- source_word: הֶן
  english_pob_choice: Look
  chosen_spanish: Mira
  alternatives_spanish:
  - He aquí
  - Observa
  lexicon: HALOT
  rationale: Es una partícula deíctica que llama la atención sobre lo que sigue. «Mira» es claro y directo en español moderno.
- source_word: עָם
  english_pob_choice: a people
  chosen_spanish: un pueblo
  alternatives_spanish:
  - una nación
  - un pueblo entero
  lexicon: HALOT
  rationale: «Pueblo» preserva la identidad colectiva de Israel sin sobrecargar con matices políticos modernos de «nación».
- source_word: לְבָדָד
  english_pob_choice: alone
  chosen_spanish: aparte
  alternatives_spanish:
  - solo
  - en aislamiento
  lexicon: HALOT
  rationale: «Aparte» comunica separatividad/distinción en un español fluido y evita la posible ambigüedad de «solo» como mero estado de soledad.
- source_word: יִשְׁכֹּן
  english_pob_choice: dwelling
  chosen_spanish: habita
  alternatives_spanish:
  - mora
  - habitará
  lexicon: HALOT
  rationale: El imperfecto puede expresar estado característico. «Habita» comunica la permanencia del rasgo sin forzar un futuro explícito.
- source_word: וּבַגּוֹיִם
  english_pob_choice: among the nations
  chosen_spanish: entre las naciones
  alternatives_spanish:
  - entre los pueblos
  - con las naciones
  lexicon: HALOT
  rationale: El contraste es social y colectivo; «entre las naciones» reproduce bien la relación de inserción/recuento dentro de otras entidades nacionales.
- source_word: לֹא יִתְחַשָּׁב
  english_pob_choice: not reckoning itself among the nations
  chosen_spanish: y no es contado entre las naciones
  alternatives_spanish:
  - y no se cuenta entre las naciones
  - y no se considera entre las naciones
  - y no es considerado entre las naciones
  lexicon: HALOT
  rationale: El hitpael de חשב admite lectura reflexiva/middle y pasiva. Para un español natural y fiel, la voz pasiva refleja «es contado» mantiene la tensión con la opción pasiva del audit trail sin imponer una autorreflexión que el español vuelva pesada.
theological_decisions:
- issue: 'Lectura del cierre: reflexiva/middle o pasiva'
  english_pob_reading: and not reckoning itself among the nations
  chosen_spanish_reading: y no es contado entre las naciones
  alternative_spanish_readings:
  - y no se cuenta entre las naciones
  - y no es considerado entre las naciones
  rationale: El hebreo permite una lectura medio-reflexiva o pasiva. En español, «es contado» preserva la ambigüedad necesaria y evita resolver la tensión, mientras mantiene el sentido de distinción de Israel sin añadir una doctrina ajena al verso.
  doctrine_reference: Preservar la tensión del original; primacía del hebreo sobre una sola tradición de traducción.
translation_notes:
  revision_awareness: El borrador refleja la revisión más reciente del audit trail al preferir una formulación equivalente a «reckoning itself», pero en español se optó por una pasiva natural («es contado») porque el hitpael admite tanto matiz reflexivo/middle como pasivo. La decisión conserva la tensión textual documentada en el POB inglés y evita forzar una reflexividad artificial en español.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» como forma por defecto solo cuando aparezca el nombre divino; este verso no lo contiene.
  - Se evitó «SEÑOR» y la paráfrasis doctrinal; el verso conserva imagen poética de altura y separación.
  - «Pueblo» y «naciones» respetan el paralelismo israelitas/otras naciones sin introducir connotaciones modernas no presentes en el hebreo.
