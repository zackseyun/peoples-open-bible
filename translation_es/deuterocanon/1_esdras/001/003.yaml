  rationale: Se ajusta la redacción al español neutral latinoamericano («Santifíquense»), se mejora la naturalidad cultual («santos servidores», «el arca santa»), y se rehace la nota para que parta de la dificultad del griego mismo y no de la revisión inglesa como autoridad primaria. Se mantiene la decisión sustantiva de conservar la ambigüedad textual en nota y usar «Yahvé» en el texto principal.
