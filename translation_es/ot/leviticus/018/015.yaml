translation:
  language: es
  text: No descubrirás la desnudez de tu nuera[a]; ella es la mujer de tu hijo; no descubrirás su desnudez.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: ''descubrir la desnudez'', una fórmula legal recurrente en Levítico para relaciones sexuales prohibidas.'
    reason: lexical_alternative
lexical_decisions:
- source_word: עֶרְוַת
  english_pob_choice: the nakedness of
  chosen_spanish: la desnudez de
  alternatives_spanish:
  - la vergüenza de
  - las partes íntimas de
  lexicon: HALOT
  rationale: En Levítico 18, עֶרְוָה forma una fórmula legal fija con 'descubrir'. 'Desnudez' conserva el idioma eufemístico sin sustituirlo por una paráfrasis más explícita. 'Vergüenza' o 'partes íntimas' debilitan o alteran la repetición técnica del pasaje.
- source_word: כַּלָּתְךָ
  english_pob_choice: your daughter-in-law
  chosen_spanish: tu nuera
  alternatives_spanish:
  - la esposa de tu hijo
  lexicon: HALOT
  rationale: El término de parentesco directo en el contexto es 'nuera'. Es la forma más natural y precisa en español para el hebreo con sufijo de segunda persona masculina singular.
- source_word: תְגַלֵּה / תְגַלֶּה
  english_pob_choice: you shall not uncover
  chosen_spanish: no descubrirás
  alternatives_spanish:
  - no deberás descubrir
  - no tendrás relaciones sexuales con
  lexicon: HALOT
  rationale: Se conserva el verbo tradicional del hebreo y del audit trail inglés para mantener la fórmula legal repetida en Levítico 18. La opción más explícita sobre relaciones sexuales sería interpretativa y borraría el eufemismo del texto fuente.
- source_word: אֵשֶׁת בִּנְךָ
  english_pob_choice: your son's wife
  chosen_spanish: la mujer de tu hijo
  alternatives_spanish:
  - la esposa de tu hijo
  - la mujer de tu hijo
  lexicon: HALOT
  rationale: La frase appositiva explica la relación prohibida. 'La mujer de tu hijo' reproduce de manera natural y fiel la relación de posesión/estado expresada por el hebreo, sin añadir matices ajenos.
- source_word: הִוא
  english_pob_choice: she is
  chosen_spanish: ella es
  alternatives_spanish:
  - es ella
  - sí, ella es
  lexicon: HALOT
  rationale: El pronombre resalta e identifica a la mujer mencionada. 'Ella es' conserva ese valor explicativo de forma clara y sobria en español.
- source_word: עֶרְוָתָהּ
  english_pob_choice: her nakedness
  chosen_spanish: su desnudez
  alternatives_spanish:
  - su vergüenza
  - sus partes íntimas
  lexicon: HALOT
  rationale: La repetición de 'desnudez' preserva la fórmula legal y la cohesión interna del capítulo. Mantener el mismo término evita suavizar o reinterpretar la prohibición.
theological_decisions:
- issue: Eufemismo legal de 'descubrir la desnudez' en una prohibición sexual
  english_pob_reading: Retain the idiom 'uncover the nakedness' rather than replacing it with 'have sexual relations with.'
  chosen_spanish_reading: Conservar el eufemismo 'descubrir la desnudez' en lugar de explicitar 'tener relaciones sexuales con'.
  alternative_spanish_readings:
  - tener relaciones sexuales con
  - deshonrar sexualmente
  rationale: El hebreo usa una fórmula estable en Levítico 18 para prohibiciones sexuales. La traducción debe respetar esa frase técnica y su repetición intertextual; una paráfrasis más explícita aclararía, pero también borraría la forma legal del original.
  doctrine_reference: Principios de traducción POB §§1, 5, 6
translation_notes:
  revision_awareness: 'El texto español sigue el audit trail inglés sin depender mecánicamente de él: conserva la fórmula legal ''descubrir la desnudez'', traduce el parentesco con el término natural ''nuera'', y mantiene la repetición final para respetar la estructura enfática del hebreo. No se registraron revisiones posteriores en el expediente.'
  spanish_consistency_notes:
  - Se mantiene 'desnudez' de manera consistente en ambas ocurrencias de עֶרְוָה.
  - '''Nuera'' corresponde al vínculo familiar implícito por el hebreo y evita una explicación más larga que el texto no requiere.'
  - 'La puntuación con dos puntos y punto y coma refleja la progresión explicativa del hebreo: prohibición, identificación, repetición.'
