translation:
  language: es
  text: Ten cuidado[a]; no te inclines hacia la iniquidad[b], porque has escogido esto en vez de la aflicción[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «Ten precaución», «Guárdate» o «Cuídate».
    reason: lexical_alternative
  - marker: b
    text: O «maldad», «mal» o «perversidad» para hebreo אָוֶן.
    reason: lexical_alternative
  - marker: c
    text: O «en lugar de la aflicción» o «que la miseria». El sentido es que no debe preferir la maldad al sufrimiento que está padeciendo.
    reason: lexical_alternative
lexical_decisions:
- source_word: הִשָּׁמֶר
  english_pob_choice: Take care
  chosen_spanish: Ten cuidado
  alternatives_spanish:
  - Guárdate
  - Ten precaución
  - Cuídate
  lexicon: HALOT
  rationale: El imperativo niphal funciona como advertencia; «Ten cuidado» comunica bien el tono exhortativo en español moderno sin volverse arcaico.
- source_word: אַל תֵּפֶן
  english_pob_choice: do not turn
  chosen_spanish: no te inclines
  alternatives_spanish:
  - no te vuelvas
  - no te apartes
  - no te gires hacia
  lexicon: HALOT
  rationale: La prohibición expresa dirección moral más que mero movimiento físico; «no te inclines» preserva la idea de orientar el corazón o la decisión hacia algo malo.
- source_word: אֶל אָוֶן
  english_pob_choice: to iniquity
  chosen_spanish: hacia la iniquidad
  alternatives_spanish:
  - al mal
  - a la maldad
  - a la perversidad
  lexicon: HALOT
  rationale: «אָוֶן» en este contexto ético apunta a maldad/iniquidad; «iniquidad» mantiene la fuerza moral del término y evita reducirlo a simple desgracia.
- source_word: כִּי
  english_pob_choice: for
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  - puesto que
  lexicon: HALOT
  rationale: Introduce la base de la advertencia; «porque» es natural en español y conserva la relación explicativa.
- source_word: עַל זֶה
  english_pob_choice: this
  chosen_spanish: esto
  alternatives_spanish:
  - por esto
  - en esto
  - sobre esto
  lexicon: HALOT
  rationale: La construcción apunta a lo ya mencionado; «esto» evita dureza y mantiene la referencia directa.
- source_word: בָּחַרְתָּ
  english_pob_choice: you have chosen
  chosen_spanish: has escogido
  alternatives_spanish:
  - has elegido
  - has preferido
  - escogiste
  lexicon: HALOT
  rationale: El perfecto 2ms se traduce con presente perfecto en español; «escogido» conserva la decisión ya tomada con vigencia actual.
- source_word: מֵעֹנִי
  english_pob_choice: rather than affliction
  chosen_spanish: más bien que la aflicción
  alternatives_spanish:
  - antes que la aflicción
  - en lugar de la aflicción
  - más que la aflicción
  lexicon: HALOT
  rationale: «עֹנִי» en Job se refiere a sufrimiento/aflicción; la comparación con מ se expresa naturalmente con «más bien que» para evitar una lectura mecánica y preservar el contraste.
translation_notes:
  revision_awareness: Se corrigió el problema de validación anterior asegurando que cada marcador de nota aparezca exactamente en el texto español; se eliminó cualquier nota no anclada. La redacción sigue el borrador auditado de Job 36:21 sin introducir cambios textuales de fondo.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» como convención general del proyecto, pero este versículo no contiene el Tetragrámaton.
  - Se prefirió «iniquidad» para אָוֶן por coherencia con el tono moral de la advertencia y con la decisión inglesa auditada.
  - Se evitó «siervo» u otros términos no pertinentes; el verso trata una exhortación ética dirigida al interlocutor.
  - La comparación final se resolvió con «más bien que» para reflejar el hebreo מֵ sin forzar una estructura extraña en español.
