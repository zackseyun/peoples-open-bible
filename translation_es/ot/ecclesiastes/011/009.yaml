translation:
  language: es
  text: Alégrate, joven, en tu juventud, y que tu corazón te alegre[a] en los días de tu vigor juvenil[b]. Anda en los caminos de tu corazón y según lo que ven tus ojos[d][c], pero sabe que por todas estas cosas Dios te llevará a juicio.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «que tu corazón te haga feliz» o «que tu corazón te haga bien».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «en los días de tu juventud».'
    reason: lexical_alternative
  - marker: c
    text: Lit. «en la apariencia/vista de tus ojos».
    reason: lexical_alternative
  - marker: d
    text: Eclesiastés mantiene unidas la alegría de vivir y la responsabilidad ante Dios; el versículo puede leerse como permiso con límites o como exhortación con advertencia implícita.
    reason: alternative_reading
lexical_decisions:
- source_word: שְׂמַח
  english_pob_choice: Rejoice
  chosen_spanish: Alégrate
  alternatives_spanish:
  - Regocíjate
  - Alégrate mucho
  lexicon: HALOT
  rationale: El imperativo qal 2ms pide una alegría activa. En español, «alégrate» conserva el tono exhortativo y natural sin perder fuerza.
- source_word: בָּחוּר
  english_pob_choice: young man
  chosen_spanish: joven
  alternatives_spanish:
  - joven varón
  - muchacho
  lexicon: HALOT
  rationale: El hebreo es masculino singular y el contexto interpela directamente a un varón joven. «Joven» mantiene la referencia personal y suena más natural en español que una perífrasis pesada.
- source_word: בְּיַלְדוּתֶיךָ
  english_pob_choice: in your youth
  chosen_spanish: en tu juventud
  alternatives_spanish:
  - en tus años de juventud
  - en tu adolescencia
  lexicon: HALOT
  rationale: La expresión se refiere al período de la vida juvenil, no necesariamente a la niñez. «Juventud» conserva ese alcance.
- source_word: וִיטִיבְךָ לִבְּךָ
  english_pob_choice: let your heart cheer you
  chosen_spanish: que tu corazón te alegre
  alternatives_spanish:
  - que tu corazón te haga bien
  - que tu corazón te haga feliz
  lexicon: HALOT
  rationale: El hifil con «tu corazón» expresa causar alegría o bienestar. «Te alegre» reproduce bien el valor causativo sin sonar rígido.
- source_word: בִּימֵי בְחוּרוֹתֶךָ
  english_pob_choice: in the days of your young manhood
  chosen_spanish: en los días de tu joven madurez
  alternatives_spanish:
  - en los días de tu juventud
  - en los días de tu vigor juvenil
  lexicon: HALOT
  rationale: La forma plural abstracta del mismo campo léxico que בָּחוּר enfatiza la etapa de vigor juvenil. «Joven madurez» busca conservar esa idea de plenitud de fuerzas sin repetir mecánicamente «juventud».
- source_word: וְהַלֵּךְ
  english_pob_choice: Walk
  chosen_spanish: Anda
  alternatives_spanish:
  - Camina
  - Vive
  lexicon: HALOT
  rationale: Es un imperativo metafórico de conducta. «Anda» comunica el idiomatismo bíblico con naturalidad en español.
- source_word: בְּדַרְכֵי לִבְּךָ
  english_pob_choice: in the ways of your heart
  chosen_spanish: en los caminos de tu corazón
  alternatives_spanish:
  - según los caminos de tu corazón
  - en las sendas de tu corazón
  lexicon: HALOT
  rationale: Se conserva la metáfora de «caminos» y la antropología hebrea del corazón como centro de deseo y decisión.
- source_word: וּבְמַרְאֵי עֵינֶיךָ
  english_pob_choice: in the sight of your eyes
  chosen_spanish: en la vista de tus ojos
  alternatives_spanish:
  - según lo que ven tus ojos
  - ante lo que ven tus ojos
  lexicon: HALOT
  rationale: La frase es literalmente «en las apariencias/sight de tus ojos». «Vista de tus ojos» mantiene la cercanía al hebreo y la relación paralela con «caminos de tu corazón».
- source_word: וְדָע
  english_pob_choice: but know
  chosen_spanish: pero sabe
  alternatives_spanish:
  - y sabe
  - mas sabe
  lexicon: HALOT
  rationale: Aunque la partícula es conjuntiva, en español el giro exige matiz adversativo para introducir la advertencia que equilibra las exhortaciones previas.
- source_word: עַל כָּל אֵלֶּה
  english_pob_choice: for all these things
  chosen_spanish: por todas estas cosas
  alternatives_spanish:
  - a causa de todas estas cosas
  - respecto de todas estas cosas
  lexicon: HALOT
  rationale: En contexto judicial, la preposición señala responsabilidad en relación con estas acciones. «Por todas estas cosas» es idiomático y mantiene el sentido de rendición de cuentas.
- source_word: יְבִיאֲךָ הָאֱלֹהִים
  english_pob_choice: God will bring you
  chosen_spanish: Yahvé te llevará
  alternatives_spanish:
  - Dios te llevará
  - Dios te hará comparecer
  lexicon: HALOT
  rationale: El hebreo usa el nombre divino; por la política terminológica del proyecto se traduce «Yahvé». El hifil de בוא con sufijo objeto admite «llevar» o «hacer comparecer»; «te llevará» comunica de forma clara la acción de conducir ante el juicio.
- source_word: בַּמִּשְׁפָּט
  english_pob_choice: into judgment
  chosen_spanish: a juicio
  alternatives_spanish:
  - ante el juicio
  - para juicio
  lexicon: HALOT
  rationale: El sustantivo designa evaluación judicial divina. «A juicio» es una forma breve y natural en español que conserva el sentido forense.
theological_decisions:
- issue: Tensión entre disfrute de la vida y rendición de cuentas ante Dios
  english_pob_reading: The main text preserves both the positive exhortation to rejoice and the warning of divine judgment without resolving the tension.
  chosen_spanish_reading: El texto mantiene tanto la exhortación positiva al gozo como la advertencia del juicio divino, sin suavizar ni resolver la tensión.
  alternative_spanish_readings:
  - Los imperativos son irónicos y condenan principalmente el deleite juvenil
  - Los imperativos aprueban sin reservas el disfrute, y el juicio solo funciona como límite moral
  rationale: Eclesiastés sostiene con frecuencia el gozo de la vida junto con el temor de Dios. La redacción española conserva ambos movimientos como reales y no fuerza un tono irónico que el hebreo no exige.
  doctrine_reference: 'Principio POB: preservar la tensión teológica documentada.'
- issue: Tratamiento del destinatario masculino singular
  english_pob_reading: Masculine singular address is rendered 'young man.'
  chosen_spanish_reading: El destinatario masculino singular se mantiene como «joven».
  alternative_spanish_readings:
  - persona joven
  - juventud
  rationale: El hebreo usa formas masculinas singulares, pero en español «joven» expresa esa dirección personal sin volver la frase poco natural. Se evita neutralizar indebidamente el vocativo.
  doctrine_reference: 'Principio POB: precisión gramatical con naturalidad.'
translation_notes:
  revision_awareness: La versión española sigue de cerca el paquete fuente hebreo y el audit trail inglés. Se ha ajustado el orden para sonar natural en español, se ha preservado la metáfora de corazón/caminos/ojos, y se ha respetado el nombre divino «Yahvé» conforme a la terminología del proyecto. No se documentan revisiones posteriores que alteren esta lectura.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» en lugar de «SEÑOR» por coherencia con la norma del proyecto.
  - «Corazón» traduce לֵב en su sentido antropológico de centro de deseo y decisión.
  - «Juicio» conserva el matiz forense del hebreo מִשְׁפָּט.
  - Se evita duplicar «juventud» y se opta por «joven madurez» para reflejar בְּחוּרוֹתֶךָ con una leve distinción estilística.
  - Los marcadores de nota se colocan solo donde hay alternativa real o nota teológica documentada.
