  glossary_alignment: 'La terminología del proyecto se sigue correctamente: יְהוָה se traduce como «Yahvé» en ambas ocurrencias; no hay conflicto con otros términos glosarios relevantes en este versículo. La elección de «Mical» es una adaptación española estándar y adecuada. «Despreció» conserva bien la fuerza de וַתִּבֶז.'
