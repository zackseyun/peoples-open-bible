translation:
  language: es
  text: Y todo lo que tenía fue saqueado[a], y no me quedó nada sino Ana, mi esposa, y Tobit, mi hijo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'El griego dice literalmente: «nada me quedó sino Ana, mi esposa, y Tobit, mi hijo». Esto describe lo que quedó con Tobit después de la pérdida de sus bienes; no implica que su esposa y su hijo fueran posesiones.'
    reason: lexical_alternative
lexical_decisions:
- source_word: διηρπάγη
  english_pob_choice: were plundered
  chosen_spanish: fue saqueado
  alternatives_spanish:
  - fue plunderado
  - fue robado
  - fue despojado
  lexicon: BDAG
  rationale: El verbo griego expresa un despojo violento por parte de otros. «Fue saqueado» conserva bien la idea de bienes tomados como botín y suena natural en español para la pérdida de posesiones.
- source_word: πάντα τὰ ὑπάρχοντά μου
  english_pob_choice: all my possessions
  chosen_spanish: todo lo que tenía
  alternatives_spanish:
  - todas mis posesiones
  - todos mis bienes
  - todas mis pertenencias
  lexicon: BDAG
  rationale: La expresión griega se refiere a las posesiones materiales de Tobit. En español, «todo lo que tenía» comunica la totalidad de la pérdida con naturalidad y evita una repetición pesada de «posesiones».
- source_word: οὐ κατελείφθη μοι οὐδέν
  english_pob_choice: nothing was left to me
  chosen_spanish: no me quedó nada
  alternatives_spanish:
  - nada me fue dejado
  - no me quedó absolutamente nada
  - no quedó nada para mí
  lexicon: BDAG
  rationale: La pasiva impersonal griega se expresa de forma natural en español con «no me quedó nada», conservando la fuerza totalizante de οὐδέν.
- source_word: πλὴν
  english_pob_choice: except
  chosen_spanish: sino
  alternatives_spanish:
  - excepto
  - salvo
  - fuera de
  lexicon: BDAG
  rationale: «Sino» marca con claridad la única excepción en una frase negativa y es idiomático en español moderno.
- source_word: Ἄννας
  english_pob_choice: Anna
  chosen_spanish: Ana
  alternatives_spanish:
  - Anna
  - Hannah
  lexicon: Greek proper name tradition
  rationale: Aunque el griego tiene la forma Ἄννα, en español bíblico y eclesial la forma asentada y más transparente es «Ana». Se conserva el mismo nombre propio sin alterar el referente.
- source_word: Τωβεὶτ
  english_pob_choice: Tobit
  chosen_spanish: Tobit
  alternatives_spanish:
  - Tobías
  - Tobit/Tobías
  lexicon: Greek proper name tradition
  rationale: El nombre griego coincide con el título tradicional del libro y con el nombre propio usado en la tradición textual española más reconocible. «Tobit» evita introducir una forma distinta no apoyada por este testimonio griego.
translation_notes:
  revision_awareness: Se siguió el testimonio griego de Swete 1909 y el auditorio inglés, manteniendo la fuerza de la pérdida total. Se adoptó una redacción española más natural que el inglés («fue saqueado», «no me quedó nada») sin suavizar el despojo violento ni convertir a la esposa e hijo en propiedad.
  spanish_consistency_notes:
  - Se usó «Ana» como forma española habitual del nombre Ἄννα, manteniendo el referente del texto griego.
  - Se conservó «Tobit» en coherencia con el nombre propio del libro y con la forma griega Τωβεὶτ.
  - La negación total («no me quedó nada») preserva el alcance de οὐδέν.
  - La nota al pie evita una mala lectura posesiva de la cláusula final.
