translation:
  language: es
  text: Cuando pusieron su umbral junto a mi umbral[a] y sus postes de puerta junto a mis postes de puerta[b], con solo la pared entre mí y ellos, profanaron mi santo nombre por las abominaciones que cometieron; por eso los consumí en mi ira.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «su sillar junto a mi sillar». El término hebreo puede denotar umbral o sillar.
    reason: lexical_alternative
  - marker: b
    text: O «sus marcos de puerta junto a mis marcos de puerta».
    reason: lexical_alternative
lexical_decisions:
- source_word: בְּתִתָּם
  english_pob_choice: When they set
  chosen_spanish: Cuando pusieron
  alternatives_spanish:
  - Cuando colocaron
  - Al poner
  lexicon: HALOT
  rationale: La construcción temporal con infinitivo en hebreo introduce el momento en que ocurre la acción. «Cuando pusieron» conserva el valor temporal y suena natural en español.
- source_word: סִפָּם / סִפִּי
  english_pob_choice: their threshold / my threshold
  chosen_spanish: su umbral / mi umbral
  alternatives_spanish:
  - su dintel inferior / mi dintel inferior
  - su escalón / mi escalón
  lexicon: HALOT
  rationale: סַף puede referirse a umbral o umbral/sillar de entrada. «Umbral» es fiel, claro y adecuado al contexto arquitectónico del templo.
- source_word: מְזוּזָתָם / מְזוּזָתִי
  english_pob_choice: their doorposts / my doorposts
  chosen_spanish: sus postes de puerta / mis postes de puerta
  alternatives_spanish:
  - sus jambas / mis jambas
  - sus marcos de puerta / mis marcos de puerta
  lexicon: HALOT
  rationale: מְזוּזָה designa el poste o jamba de la puerta. «Postes de puerta» mantiene la imagen concreta y evita tecnicismos menos transparentes.
- source_word: אֵצֶל
  english_pob_choice: beside
  chosen_spanish: junto a
  alternatives_spanish:
  - al lado de
  - junto con
  lexicon: HALOT
  rationale: La preposición indica proximidad inmediata. «Junto a» es breve, idiomático y conserva la cercanía insistente del texto.
- source_word: וְהַקִּיר בֵּינִי וּבֵינֵיהֶם
  english_pob_choice: with only the wall between me and them
  chosen_spanish: con solo la pared entre mí y ellos
  alternatives_spanish:
  - con la pared solamente entre mí y ellos
  - mientras la pared quedaba entre mí y ellos
  lexicon: HALOT
  rationale: La frase hebrea es nominal y describe una separación mínima. «Con solo la pared» recoge la restricción enfatizada por el texto y sigue el ajuste del audit trail en inglés.
- source_word: וְטִמְּא֣וּ
  english_pob_choice: they defiled
  chosen_spanish: profanaron
  alternatives_spanish:
  - contaminaron
  - hicieron impuro
  lexicon: HALOT
  rationale: En un contexto de santidad y del nombre divino, «profanaron» comunica bien la idea de tratar como común o impuro. Aunque «defilaron» es posible, en español «profanaron mi santo nombre» es más natural y preciso.
- source_word: שֵׁם קָדְשִׁי
  english_pob_choice: my holy name
  chosen_spanish: mi santo nombre
  alternatives_spanish:
  - mi nombre santo
  - mi sagrado nombre
  lexicon: HALOT
  rationale: La expresión hebrea es fija y teológicamente densa. «Mi santo nombre» mantiene el paralelismo bíblico y el valor reverencial del hebreo.
- source_word: בְּתוֹעֲבוֹתָם
  english_pob_choice: by the abominations
  chosen_spanish: por las abominaciones
  alternatives_spanish:
  - mediante las abominaciones
  - a causa de las abominaciones
  lexicon: HALOT
  rationale: El בְּ puede marcar medio o causa. «Por las abominaciones» conserva la relación causal/instrumental sin sonar forzado en español.
- source_word: אֲשֶׁר עָשׂוּ
  english_pob_choice: that they committed
  chosen_spanish: que cometieron
  alternatives_spanish:
  - que hicieron
  - que practicaron
  lexicon: HALOT
  rationale: Con «abominaciones», el verbo español natural es «cometer». No añade contenido ajeno y comunica el peso moral del acto.
- source_word: וָאֲכַל אֹתָם
  english_pob_choice: so I consumed them
  chosen_spanish: por eso los consumí
  alternatives_spanish:
  - y los consumí
  - por eso los devoré
  lexicon: HALOT
  rationale: El hebreo usa una metáfora de consumo en juicio. «Los consumí» preserva la fuerza del verbo sin volverlo literal en exceso. «Por eso» refleja la consecuencia lógica destacada por el contexto.
- source_word: בְּאַפִּי
  english_pob_choice: in my anger
  chosen_spanish: en mi ira
  alternatives_spanish:
  - en mi furor
  - en mi enojo
  lexicon: HALOT
  rationale: אַף significa literalmente nariz/ira, pero aquí es idiomáticamente «ira». «En mi ira» es la forma más natural y elevada en español bíblico contemporáneo.
theological_decisions:
- issue: Lenguaje antropomórfico en וָאֲכַל אֹתָם
  english_pob_reading: Rendered idiomatically as 'I consumed them' rather than a literal 'I ate them.'
  chosen_spanish_reading: Se traduce idiomáticamente como «los consumí», no como «los comí».
  alternative_spanish_readings:
  - los devoré
  - los destruí
  rationale: El hebreo emplea una imagen de juicio divino. «Consumí» conserva la metáfora y evita una literalidad extraña, manteniendo a la vez la severidad del castigo.
  doctrine_reference: Equivalencia óptima; preservar el sentido fuente sin suavizar ni exagerar la imagen.
- issue: Profanación del nombre santo
  english_pob_reading: they defiled my holy name
  chosen_spanish_reading: profanaron mi santo nombre
  alternative_spanish_readings:
  - contaminaron mi santo nombre
  - hicieron impuro mi santo nombre
  rationale: En español bíblico, «profanar» comunica muy bien el acto de tratar como común o impuro algo santo. Mantiene la tensión entre santidad y ofensa ritual/moral.
  doctrine_reference: Santidad del nombre divino en el lenguaje profético; cf. uso bíblico de profanar lo santo.
translation_notes:
  revision_awareness: El borrador en inglés fue ajustado previamente para reflejar que solo una pared los separaba; la versión española incorpora ese matiz con «con solo la pared entre mí y ellos». También se mantuvo la metáfora de juicio en «los consumí», coherente con el último pase editorial y con el valor idiomático del hebreo.
  spanish_consistency_notes:
  - Se conservó «Yahvé» como forma por defecto solo cuando aparezca el nombre divino explícito; en este versículo no aparece.
  - Se eligió «umbral» y «postes de puerta» para mantener consistencia arquitectónica con el registro del POB y evitar sustituir el léxico técnico por formulaciones tradicionales menos precisas.
  - «Santo nombre» se usa de forma estable para שֵׁם קָדְשִׁי, manteniendo la resonancia bíblica sin convertirla en paráfrasis.
