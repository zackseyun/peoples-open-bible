translation:
  language: es
  text: Donde tú mueras, yo moriré, y allí seré sepultada. Yahvé me haga así, y aún más[a], si algo fuera de la muerte me separa de ti[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, más literalmente, «Así me haga Yahvé, y así añada». Esta es una fórmula hebrea de juramento que invoca juicio divino.
    reason: lexical_alternative
  - marker: b
    text: O, «si algo excepto la muerte me separa de ti».
    reason: alternative_reading
lexical_decisions:
- source_word: בַּאֲשֶׁר
  english_pob_choice: Where
  chosen_spanish: Donde
  alternatives_spanish:
  - En el lugar donde
  - Allí donde
  lexicon: HALOT
  rationale: La construcción introduce un lugar; en español, 'Donde' comunica con naturalidad la relación locativa sin perder el valor relativo del hebreo.
- source_word: תָּמ֨וּתִי / אָמ֔וּת
  english_pob_choice: you die, I will die
  chosen_spanish: tú mueras / yo moriré
  alternatives_spanish:
  - tú mueras / yo muera
  - tú mueres / yo muero
  lexicon: HALOT
  rationale: El hebreo usa formas de morir enlazadas en un juramento solemne. En español conviene mantener la fuerza de compromiso con futuro en la respuesta principal ('moriré') y subjuntivo en la cláusula condicional de lugar ('muerras' no, sino 'muera' would be with yo; here 'mueras' if second person), pero el texto base admite una formulación fluida y reverente; la traducción busca conservar el paralelismo y la resolución voluntaria.
- source_word: וְשָׁם
  english_pob_choice: and there
  chosen_spanish: y allí
  alternatives_spanish:
  - y en ese lugar
  - y allí mismo
  lexicon: HALOT
  rationale: '''Allí'' reproduce bien la continuidad locativa y suena natural en español.'
- source_word: אֶקָּבֵר
  english_pob_choice: I will be buried
  chosen_spanish: seré sepultada
  alternatives_spanish:
  - seré enterrada
  - me sepultarán
  lexicon: HALOT
  rationale: El nifal expresa pasividad. 'Seré sepultada' conserva el tono solemne y bíblico sin caer en una calca rígida; además, el contexto habla en voz femenina de Rut.
- source_word: כֹּה יַעֲשֶׂה יְהוָה לִי וְכֹה יֹסִיף
  english_pob_choice: May Yahweh do so to me, and more also
  chosen_spanish: Yahvé me haga así, y aun añada
  alternatives_spanish:
  - Así me haga Yahvé, y aun añada
  - Yahvé haga así conmigo, y aún más
  lexicon: HALOT
  rationale: Se mantiene la fórmula juratoria hebrea con verbo en subjuntivo. 'Me haga así' y 'aun añada' conservan la solemnidad y la economía del hebreo sin sustituirla por una paráfrasis interpretativa.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - SEÑOR
  - Yahweh
  lexicon: HALOT
  rationale: 'Se sigue el criterio del proyecto para el Tetragrámaton: transliteración ''Yahvé'' en el texto principal, en lugar de un sustituto titular.'
- source_word: כִּי
  english_pob_choice: if
  chosen_spanish: si
  alternatives_spanish:
  - cuando
  - porque
  lexicon: HALOT
  rationale: En contextos de juramento, כִּי introduce la condición del maldición/juramento; 'si' es el equivalente español más natural para conservar esa fuerza.
- source_word: הַמָּוֶת
  english_pob_choice: death
  chosen_spanish: la muerte
  alternatives_spanish:
  - muerte
  lexicon: HALOT
  rationale: Aunque el hebreo lleva artículo, en español el sustantivo definido resulta natural. Se conserva explícitamente el artículo por la personificación/absolutización del término en el juramento.
- source_word: יַפְרִיד
  english_pob_choice: separates
  chosen_spanish: separa
  alternatives_spanish:
  - parte
  - divide
  lexicon: HALOT
  rationale: El verbo hiphil expresa separación. 'Separa' mantiene la relación interpersonal del pasaje con claridad y sin exceso de interpretación.
- source_word: בֵּינִי וּבֵינֵךְ
  english_pob_choice: me from you
  chosen_spanish: de ti
  alternatives_spanish:
  - entre tú y yo
  - entre mí y ti
  lexicon: HALOT
  rationale: El hebreo expresa separación 'entre' las dos personas; en español, 'me separa de ti' comunica la misma relación de manera idiomática y natural.
theological_decisions:
- issue: Expresión del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Yahweh
  rationale: El versículo usa directamente el Nombre divino. Para el texto principal se adopta 'Yahvé', coherente con la política del proyecto y más reconocible en español bíblico amplio que la transliteración inglesa 'Yahweh'.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Fuerza del juramento de Rut
  english_pob_reading: if anything but death separates me from you
  chosen_spanish_reading: si algo, fuera de la muerte, me separa de ti
  alternative_spanish_readings:
  - si nada más que la muerte me separa de ti
  - si algo excepto la muerte me separa de ti
  rationale: 'La cláusula funciona como fórmula de autoimprecación: solo la muerte puede romper la unión. La redacción elegida conserva la condición juratoria y la exclusividad de la muerte sin suavizarla.'
  doctrine_reference: 'DOCTRINE.md: Oath formulas and imprecatory conditions'
translation_notes:
  revision_awareness: 'Se revisó el pasaje sin cambios sustanciales respecto del audit trail inglés: se conservan el paralelismo solemne, la fórmula de juramento y la decisión por el nombre divino Yahvé/Yahvé en español, con ajuste de naturalidad sintáctica para una lectura pública en español.'
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' para יְהוָה, conforme al estándar del proyecto.
  - Se conserva 'sepultada' para reflejar el registro solemne del pasaje y el contexto femenino de Rut.
  - 'La cláusula final preserva la ambigüedad juratoria del hebreo: muerte como única excepción a la separación.'
