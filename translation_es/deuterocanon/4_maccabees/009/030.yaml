translation:
  language: es
  text: ¿No te parece[a], oh el más cruel de todos los tiranos, que ahora sufres tormento más que yo, al ver vencido el orgulloso razonamiento de tu tiranía por nuestra perseverancia por causa de la piedad[b]?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «¿No piensas...?»; δοκεῖς puede expresar tanto ‘parecer’ como ‘pensar’. Se eligió «te parece» por su naturalidad en una pregunta retórica de confrontación.
    reason: lexical_alternative
  - marker: b
    text: O «por causa de nuestra piedad». La expresión puede entenderse como una perseverancia motivada por la devoción fiel a Dios.
    reason: lexical_alternative
lexical_decisions:
- source_word: Οὐ δοκεῖς
  english_pob_choice: Do you not think
  chosen_spanish: ¿No te parece
  alternatives_spanish:
  - ¿No piensas
  - ¿No te parece a ti
  lexicon: LSJ
  rationale: δοκεῖς introduce una pregunta retórica directa. «Te parece» suena natural en español y conserva el matiz de percepción/opinión sin debilitar el desafío del hablante.
- source_word: ὦ πάντων ὠμότατε τύραννε
  english_pob_choice: O most savage tyrant of all
  chosen_spanish: oh tirano de todos el más cruel
  alternatives_spanish:
  - oh tirano el más cruel de todos
  - oh tirano de todos el más brutal
  lexicon: LSJ
  rationale: ὠμότατε expresa la superlación de crueldad o brutalidad; «el más cruel» es directo y fiel. Se conserva πάντων con «de todos» para mantener la fuerza enfática del vocativo.
- source_word: πλεῖον ἐμοῦ σε νῦν βασανίζεσθαι
  english_pob_choice: that you are now being tortured more than I am
  chosen_spanish: que ahora tú eres torturado más que yo
  alternatives_spanish:
  - que ahora sufres más tormento que yo
  - que ahora eres atormentado más que yo
  lexicon: LSJ
  rationale: βασανίζεσθαι puede ser ‘ser torturado/atormentado’; aquí se eligió «eres torturado» para preservar el lenguaje de tormento físico e ironizar el sufrimiento interior del tirano frente al martirio exterior.
- source_word: ὁρῶν
  english_pob_choice: seeing
  chosen_spanish: al ver
  alternatives_spanish:
  - viendo
  - mientras ves
  lexicon: LSJ
  rationale: El participio es circunstancial. «Al ver» transmite bien la relación temporal y causal sin volver torpe la sintaxis española.
- source_word: σου νικώμενον
  english_pob_choice: being conquered
  chosen_spanish: vencido
  alternatives_spanish:
  - siendo vencido
  - siendo derrotado
  lexicon: LSJ
  rationale: El pasivo indica el principio del tirano como objeto de derrota. «Vencido» es más fluido en español y conserva la imagen de conflicto.
- source_word: τὸν τῆς τυραννίδος ὑπερήφανον λογισμὸν
  english_pob_choice: the proud reasoning of your tyranny
  chosen_spanish: el orgulloso razonamiento de tu tiranía
  alternatives_spanish:
  - la altiva mentalidad de tu tiranía
  - el altivo pensamiento de tu tiranía
  lexicon: LSJ
  rationale: λογισμός en 4 Macabeos suele relacionarse con la razón y el razonamiento moral; «razonamiento» preserva esa trama conceptual mejor que un mero término psicológico. Se mantiene la tensión entre razón y arrogancia con «orgulloso».
- source_word: ὑπὸ τῆς διὰ τὴν εὐσέβειαν ἡμῶν ὑπομονῆς
  english_pob_choice: by our endurance for the sake of godliness
  chosen_spanish: por nuestra perseverancia por causa de la piedad para con Dios
  alternatives_spanish:
  - por nuestra perseverancia por causa de la reverencia a Dios
  - por nuestra perseverancia a causa de nuestra piedad
  lexicon: LSJ
  rationale: ὑπομονή es perseverancia/endurance bajo aflicción; «perseverancia» funciona muy bien en español y conserva la idea de resistencia paciente. εὐσέβεια aquí apunta a la devoción fiel a Dios; «piedad para con Dios» explicita la dirección del término sin reducirlo a formalismo.
theological_decisions:
- issue: Cómo rendir εὐσέβεια en contexto martirial
  english_pob_reading: godliness
  chosen_spanish_reading: piedad para con Dios
  alternative_spanish_readings:
  - piedad
  - reverencia
  - devoción a Dios
  rationale: En este contexto εὐσέβεια no es mera religiosidad externa, sino fidelidad devota a Dios que sostiene la resistencia. «Piedad para con Dios» mantiene esa orientación explícita y evita perder la referencia teológica.
  doctrine_reference: Translation philosophy §6; consistency of key terms §5
- issue: Cómo reflejar la ironía de βασανίζεσθαι aplicada al tirano
  english_pob_reading: being tortured more than I am
  chosen_spanish_reading: eres torturado más que yo
  alternative_spanish_readings:
  - sufres más tormento que yo
  - eres atormentado más que yo
  rationale: 'La frase expresa una inversión irónica: el tirano, aunque no sufre el mismo suplicio corporal, resulta más atormentado interiormente por la resistencia de los mártires. «Eres torturado» conserva esa ironía y el léxico fuerte del pasaje.'
  doctrine_reference: Translation philosophy §5
translation_notes:
  revision_awareness: La redacción sigue la revisión final del inglés, donde se prefirió el participio circunstancial (‘seeing’) para reflejar más directamente la construcción griega. En español, esa relación se expresó con «al ver», que conserva el valor participial y la fluidez sintáctica.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma general del proyecto, pero este versículo no contiene el tetragrámaton; por eso no aplica aquí.
  - Se conserva «piedad»/«perseverancia» como léxico de virtud martirial, en consonancia con el marco de 4 Macabeos.
  - «Razón/razonamiento» se reserva para λογισμός cuando el contexto enfatiza la racionalidad moral; aquí se optó por «razonamiento» por coherencia con el audit trail en inglés.
