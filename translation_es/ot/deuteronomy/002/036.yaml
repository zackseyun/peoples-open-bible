revisions:
- from: Desde Aroer[a], que está en la ribera del valle del Arnón, y desde la ciudad que está en el valle, hasta Galaad, no hubo ninguna ciudad demasiado alta para nosotros; Yahvé nuestro Dios las puso todas delante de nosotros.
  to: Desde Aroer[a], que está en el borde del valle del Arnón, y desde la ciudad que está en el valle, hasta Galaad, no hubo ninguna ciudad demasiado alta para nosotros; Yahvé nuestro Dios las entregó todas delante de nosotros.
  rationale: Se ajusta «ribera» a «borde» para una expresión más natural y más cercana al valor topográfico auditado de שְׂפַת נַחַל. Se cambia «las puso todas delante de nosotros» por «las entregó todas delante de nosotros» para reflejar con mayor fidelidad el verbo נָתַן en contexto de conquista, manteniendo a la vez el modismo לְפָנֵינוּ.
