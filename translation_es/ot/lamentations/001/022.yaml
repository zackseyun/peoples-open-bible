base_translation:
  language: en
  yaml_path: translation/ot/lamentations/001/022.yaml
  text: Let all their evil come before you[a], and deal with them as you have dealt with me because of all my transgressions; for my groans are many[c][b], and my heart is sick.
  footnotes:
  - marker: a
    text: Or 'their wickedness'; רָעָה can also mean 'calamity' in some contexts, but here likely refers to culpable evil.
    reason: lexical_alternative
  - marker: b
    text: Or 'do to them as you have done to me.' The Hebrew repeats the same verb in both clauses.
    reason: lexical_alternative
  - marker: c
    text: Or 'my sighs are many.'
    reason: lexical_alternative
