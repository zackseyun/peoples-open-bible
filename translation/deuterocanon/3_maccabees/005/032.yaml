id: 3MA.5.32
reference: 3 Maccabees 5:32
source:
  edition: lxx-swete-1909
  text: καίπερ εἰ μὴ διὰ τὴν τῆς συστροφῆς στοργὴν καὶ τῆς χρείας, τὸ ζῆν ἀντὶ τούτων ἐστερήθης.
  language: Greek
  pages:
  - 744
  confidence: high
  validation: agree
translation:
  text: Yet[a], if it were not for your affection because of the gathering together and the necessity[b], you would have been deprived of life instead of these things.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'your affection for the gathering' or 'your fondness for the crowd.' The Greek συστροφή can denote a gathering or massed crowd; the exact nuance here is context-dependent.
    reason: lexical_alternative
  - marker: b
    text: The phrase 'and for need' may also be understood as 'and because of necessity.'
    reason: lexical_alternative
lexical_decisions:
- source_word: καίπερ
  chosen: Yet, if it were not
  alternatives:
  - although
  - even though
  lexicon: LSJ
  rationale: καίπερ normally introduces a concessive idea ('although, although indeed'). In this sentence it works with εἰ μή to form a concessive condition best expressed in natural English as 'Yet, if it were not for...' rather than a stiff literalism.
- source_word: διὰ
  chosen: for
  alternatives:
  - because of
  - on account of
  lexicon: BDAG
  rationale: With the accusative, διὰ marks cause or reason. 'For' is concise and idiomatic here in the phrase 'for your affection for...'.
- source_word: τὴν τῆς συστροφῆς στοργὴν
  chosen: your affection for the crowding together
  alternatives:
  - your attachment to the gathering
  - your fondness for the mob
  - your affection for the assembly
  lexicon: LSJ
  rationale: στοργή denotes affection or natural attachment. συστροφή can denote a gathering, massing together, or crowding. Because the context is hostile and physical rather than formal worship, 'crowding together' preserves the concrete sense without overinterpreting it as 'assembly' or pejoratively as 'mob'.
- source_word: καὶ τῆς χρείας
  chosen: and for need
  alternatives:
  - and for necessity
  - and because of the situation
  lexicon: LSJ
  rationale: χρεία commonly means need or necessity. The phrase is terse in Greek; 'and for need' keeps that terseness while preserving the causal sense alongside the previous genitive phrase.
- source_word: τὸ ζῆν
  chosen: life
  alternatives:
  - to live
  - the right to live
  lexicon: BDAG
  rationale: The articular infinitive literally means 'the living' or 'to live.' In English, 'life' is the most natural equivalent in the idiom 'be deprived of life.'
- source_word: ἀντὶ τούτων
  chosen: instead of these things
  alternatives:
  - rather than these things
  - in place of this
  lexicon: BDAG
  rationale: ἀντί marks substitution or exchange. 'Instead of these things' reflects the comparative force while staying close to the Greek plural demonstrative.
- source_word: ἐστερήθης
  chosen: you would have been deprived
  alternatives:
  - you would have been robbed
  - you would have lost
  lexicon: BDAG
  rationale: στερέω in the passive means to be deprived of something. The passive English rendering preserves both the grammar and the severity of the threat.
