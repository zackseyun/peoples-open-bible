base_translation:
  language: en
  yaml_path: translation/ot/isaiah/023/011.yaml
  text: He has stretched out his hand over the sea[a]; he has made kingdoms tremble. Yahweh has commanded concerning Canaan[c][b], to destroy her strongholds.
  footnotes:
  - marker: a
    text: Or "against Canaan." The Hebrew preposition can be understood in more than one way here.
    reason: alternative_reading
  - marker: b
    text: '"Canaan" here likely refers to the Phoenician region associated with Tyre.'
    reason: cultural_note
  - marker: c
    text: Or "its fortresses." The Hebrew uses a feminine singular suffix, consistent with personifying the land or city.
    reason: lexical_alternative
