translation:
  language: es
  text: David lo invitó[a], y comió y bebió delante de él[b], y lo embriagó. Al anochecer salió para acostarse en su lecho con los siervos de su señor[c], pero no bajó a su casa[d].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «David lo llamó» o «David lo mandó llamar».'
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «delante de él», es decir, en la presencia de David.'
    reason: lexical_alternative
  - marker: c
    text: 'O: «con los siervos de su amo». Aquí «su señor» se refiere a David.'
    reason: lexical_alternative
  - marker: d
    text: 'El hebreo dice literalmente: «no bajó a su casa». Se conserva el verbo direccional.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּקְרָא לוֹ
  english_pob_choice: David invited him
  chosen_spanish: David lo convidó
  alternatives_spanish:
  - David lo llamó
  - David lo mandó llamar
  - David lo citó
  lexicon: HALOT
  rationale: קרא con ל y complemento personal puede significar llamar o convocar. En este contexto de banquete, «convidó» comunica mejor en español la acción social de invitar, sin perder que David inició y dispuso el encuentro.
- source_word: לְפָנָיו
  english_pob_choice: before him
  chosen_spanish: delante de él
  alternatives_spanish:
  - en su presencia
  - ante él
  lexicon: HALOT
  rationale: La expresión hebrea es literalmente «antes de su rostro/presencia». «Delante de él» conserva la relación espacial y social del texto, y funciona con naturalidad en español.
- source_word: וַיְשַׁכְּרֵהוּ
  english_pob_choice: he made him drunk
  chosen_spanish: lo embriagó
  alternatives_spanish:
  - lo emborrachó
  - lo hizo beber hasta embriagarse
  lexicon: HALOT
  rationale: El verbo causativo expresa que David hizo que Urías quedara ebrio. «Lo embriagó» conserva esa causatividad y es más sobrio en registro que una forma coloquial.
- source_word: בָעֶרֶב
  english_pob_choice: In the evening
  chosen_spanish: Al anochecer
  alternatives_spanish:
  - Por la tarde
  - Al caer la tarde
  lexicon: HALOT
  rationale: La marca temporal introduce el siguiente movimiento narrativo. «Al anochecer» es natural, preciso y mantiene el avance temporal del hebreo.
- source_word: לִשְׁכַּב
  english_pob_choice: to lie
  chosen_spanish: acostarse
  alternatives_spanish:
  - tumbarse
  - echarse
  lexicon: HALOT
  rationale: Aunque literalmente es «yacer/recostarse», en español «acostarse» expresa bien la intención de ir a dormir o recostarse, sin añadir más de lo que el contexto permite.
- source_word: בְּמִשְׁכָּבוֹ
  english_pob_choice: on his bed
  chosen_spanish: en su cama
  alternatives_spanish:
  - sobre su cama
  - en su lecho
  lexicon: HALOT
  rationale: מִשְׁכָּב puede referirse al lecho o cama. «En su cama» es la manera más clara y natural en español para esta escena concreta.
- source_word: עִם עַבְדֵי אֲדֹנָיו
  english_pob_choice: with the servants of his lord
  chosen_spanish: con los siervos de su señor
  alternatives_spanish:
  - con los servidores de su señor
  - con los siervos de su amo
  lexicon: HALOT
  rationale: 'Se conserva la estructura posesiva y la ironía narrativa: Urías permanece con los sirvientes de quien es su señor. «Siervos» mantiene el sabor léxico más cercano al hebreo que «servidores».'
- source_word: וְאֶל בֵּיתוֹ לֹא יָרָד
  english_pob_choice: but he did not go down to his house
  chosen_spanish: pero no bajó a su casa
  alternatives_spanish:
  - y no bajó a su casa
  - pero no descendió a su casa
  lexicon: HALOT
  rationale: Se retiene el verbo direccional «bajar» para no aplanar el hebreo, que dice literalmente que no «descendió» a su casa. «Pero» refleja con naturalidad el giro adversativo de la escena.
theological_decisions:
- issue: Tratamiento del nombre divino / título en la expresión אֲדֹנָיו
  english_pob_reading: The 'lord' here is David.
  chosen_spanish_reading: su señor
  alternative_spanish_readings:
  - su amo
  - su señor David
  rationale: En este versículo אֲדֹנָיו no designa a Yahvé sino al superior humano de Urías, es decir, David. Por eso se traduce como «su señor», preservando el vínculo relacional y la ironía del relato sin introducir un título eclesiástico ajeno al contexto.
  doctrine_reference: 2 Samuel 11:13; relación señor-siervo en el relato histórico
- issue: Valor narrativo de la embriaguez
  english_pob_reading: he made him drunk
  chosen_spanish_reading: lo embriagó
  alternative_spanish_readings:
  - lo emborrachó
  - lo hizo beber hasta embriagarse
  rationale: El texto atribuye a David una acción deliberada para alterar el estado de Urías. «Lo embriagó» conserva esa responsabilidad causal sin suavizarla ni añadir elementos explicativos que no están en el hebreo.
  doctrine_reference: 2 Samuel 11:13; agencia moral en la narrativa bíblica
translation_notes:
  revision_awareness: 'Se siguió de cerca el acuerdo alto del control cruzado y la versión inglesa auditada, sin cambios de sentido respecto del último pase revisado. Se mantuvieron las decisiones léxicas clave: el valor causativo de שכר, el verbo direccional ירד, y la referencia humana de אֲדֹנָיו a David.'
  spanish_consistency_notes:
  - Se evitó «SEÑOR» para no ocultar el matiz relacional humano de אֲדֹנָיו en este contexto.
  - Se prefirió «siervos» para mantener consistencia con la fuerza léxica del hebreo y con la decisión POB de no rebajar δοῦλος/estructuras afines a un español más genérico cuando el texto exige precisión.
  - «Bajar» se mantuvo en el cierre para respetar la imagen verbal del hebreo y su repetición contextual.
