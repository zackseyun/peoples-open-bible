translation:
  language: es
  text: 'Y la cuota de ladrillos que ellos hacían ayer y antes de ayer[a], se la impondréis; no la disminuiréis en nada, porque están ociosos. Por eso claman, diciendo: «Vayamos a sacrificar a nuestro Dios».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: También puede entenderse de manera más idiomática como «antes» o «como antes» para la expresión «ayer y antes de ayer».
    reason: lexical_alternative
lexical_decisions:
- source_word: מַתְכֹּנֶת
  english_pob_choice: quota
  chosen_spanish: cuota
  alternatives_spanish:
  - cantidad fijada
  - cantidad requerida
  - cuota obligatoria
  lexicon: HALOT
  rationale: En este contexto laboral, el término no describe una “forma” sino una cantidad prescrita de producción. “Cuota” reproduce bien la idea administrativa y coercitiva de una cantidad impuesta.
- source_word: הַלְּבֵנִים
  english_pob_choice: bricks
  chosen_spanish: ladrillos
  alternatives_spanish:
  - adobes
  - bloques
  lexicon: HALOT
  rationale: Es el referente concreto del pasaje y el sustantivo más natural en español para el trabajo de fabricación mencionado.
- source_word: תְּמוֹל שִׁלְשֹׁם
  english_pob_choice: yesterday and the day before
  chosen_spanish: ayer y antes de ayer
  alternatives_spanish:
  - como antes
  - antes
  - ayer y el día anterior
  lexicon: HALOT
  rationale: La expresión hebrea alude a los dos días previos. En español, “ayer y antes de ayer” conserva la referencia temporal y sigue siendo claro; la nota recoge la alternativa más idiomática si se entiende de manera amplia.
- source_word: תָּשִׂימוּ עֲלֵיהֶם
  english_pob_choice: you shall impose on them
  chosen_spanish: la impondréis sobre ellos
  alternatives_spanish:
  - la pondréis sobre ellos
  - se la impondréis
  - la estableceréis sobre ellos
  lexicon: HALOT
  rationale: El verbo “poner sobre” en español puede sonar físico; “imponer” transmite la carga administrativa y coercitiva del mandato. Se conserva el objeto directo femenino referido a la cuota.
- source_word: לֹא תִגְרְעוּ מִמֶּנּוּ
  english_pob_choice: you shall not reduce any of it
  chosen_spanish: no la disminuiréis en nada
  alternatives_spanish:
  - no quitaréis nada de ella
  - no la reduciréis
  - no disminuiréis de ella
  lexicon: HALOT
  rationale: El verbo expresa quitar o rebajar cantidad. “No la disminuiréis en nada” mantiene el valor total y suena natural en español bíblico actual.
- source_word: נִרְפִּים
  english_pob_choice: idle
  chosen_spanish: ociosos
  alternatives_spanish:
  - holgazanes
  - flojos
  - inactivos
  lexicon: HALOT
  rationale: La acusación del faraón describe falta de trabajo o de ocupación. “Ociosos” preserva la fuerza del reproche sin añadir una valoración moral más fuerte que la del texto.
- source_word: צֹעֲקִים
  english_pob_choice: crying out
  chosen_spanish: claman
  alternatives_spanish:
  - gritan
  - dan voces
  - protestan
  lexicon: HALOT
  rationale: El participio señala un clamor intenso. “Claman” es sobrio y bíblico en español, y comunica protesta o súplica sin exageración.
- source_word: נֵלְכָה נִזְבְּחָה
  english_pob_choice: Let us go and sacrifice
  chosen_spanish: Vayamos a sacrificar
  alternatives_spanish:
  - Vamos a sacrificar
  - Vayamos y sacrifiquemos
  - Dejemos ir para sacrificar
  lexicon: HALOT
  rationale: Los cohortativos expresan intención o petición colectiva. “Vayamos a sacrificar” reproduce la secuencia de movimiento + sacrificio de forma natural y fiel.
- source_word: לֵאלֹהֵינוּ
  english_pob_choice: to our God
  chosen_spanish: a nuestro Dios
  alternatives_spanish:
  - a nuestro Dios
  - para nuestro Dios
  lexicon: HALOT
  rationale: La preposición introduce el destinatario del sacrificio. “A nuestro Dios” es la forma más directa y ajustada al español.
theological_decisions:
- issue: 'Valor del reproche faraónico: “idle”/“ociosos”'
  english_pob_reading: because they are idle
  chosen_spanish_reading: porque están ociosos
  alternative_spanish_readings:
  - porque son holgazanes
  - porque están inactivos
  rationale: El texto presenta la acusación de Faraón como una justificación de su dureza, no como un juicio moral inspirado. “Ociosos” conserva esa carga acusatoria sin intensificarla ni suavizarla indebidamente.
  doctrine_reference: Ex 5:8 en su contexto narrativo; no hay decisión doctrinal directa, sino discernimiento de tono y culpa humana.
- issue: 'Forma del plural exhortativo: “Let us go and sacrifice”'
  english_pob_reading: Let us go and sacrifice to our God.
  chosen_spanish_reading: Vayamos a sacrificar a nuestro Dios.
  alternative_spanish_readings:
  - Vamos a sacrificar a nuestro Dios.
  - Vayamos y sacrifiquemos a nuestro Dios.
  rationale: Los cohortativos hebreos expresan una propuesta colectiva. La traducción mantiene el matiz exhortativo sin convertirlo en simple futuro ni en una fórmula litúrgica más solemne de lo que el hebreo requiere.
  doctrine_reference: Ex 5:8; forma verbal cohortativa en hebreo bíblico.
translation_notes:
  revision_awareness: La base inglesa revisó su propia redacción de “the day before yesterday” a “the day before” por naturalidad idiomática. En español, la expresión equivalente más literal “ayer y antes de ayer” se mantiene porque sigue siendo clara; la nota ofrece la alternativa idiomática “antes” o “como antes” si se prefiere una paráfrasis más breve. No se siguió mecánicamente la versión inglesa; se reevaluó la locución hebrea directamente en español.
  spanish_consistency_notes:
  - Se usó “Yahvé” no porque aparezca explícitamente aquí, sino como norma del proyecto cuando corresponda; este versículo contiene la forma genérica “Dios”, así que no aplica.
  - Se prefirió “cuota” para מַתְכֹּנֶת conforme al contexto de producción obligatoria, evitando “patrón” o “modelo”, que no encajarían aquí.
  - Se mantuvo el tono judicial/administrativo del mandato con “impondréis” y “disminuiréis”, en línea con la coerción del texto.
  - Se eligió “a nuestro Dios” para לֵאלֹהֵינוּ por claridad del destinatario del sacrificio y concordancia natural en español.
