  to: 'Y el sacerdote les dijo: «Vayan en paz. El camino por el que ustedes van está delante de Yahvé[a]».'
  rationale: 'Se requiere una reparación pequeña pero importante de fidelidad: cambiar «que ustedes llevan» por «por el que ustedes van» para reflejar correctamente אֲשֶׁר תֵּלְכוּ בָהּ. También se ajusta levemente la nota para mantener consistencia con «Yahvé» y con la alternativa documentada en el rastro inglés.'
