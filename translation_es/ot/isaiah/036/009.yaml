translation:
  language: es
  text: ¿Cómo, pues, podrás volver atrás el rostro de un solo capitán[a] de los menos importantes[b] de los siervos de mi señor, mientras confías para ti en Egipto, para carros y jinetes?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Capitán» también puede verterse «gobernador» u «oficial»; el término hebreo designa a un jefe subordinado o funcionario.
    reason: lexical_alternative
  - marker: b
    text: Lit. «los pequeños»; la expresión señala rango inferior, no tamaño físico.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְאֵיךְ
  english_pob_choice: How then
  chosen_spanish: ¿Cómo, pues... ?
  alternatives_spanish:
  - ¿Y cómo... ?
  - ¿Cómo entonces... ?
  lexicon: HALOT
  rationale: La partícula introduce una pregunta retórica con avance argumentativo; «pues» conserva ese enlace sin sonar forzado en español.
- source_word: תָּשִׁיב אֵת פְּנֵי
  english_pob_choice: can you turn back the face of
  chosen_spanish: podrás volver atrás el rostro de
  alternatives_spanish:
  - podrás hacer retroceder el rostro de
  - podrás resistir a
  lexicon: HALOT
  rationale: Conservo el giro idiomático «volver atrás el rostro» porque el texto fuente lo presenta de manera literal; en español suena comprensible y deja visible la imagen, que puede implicar resistir o hacer retroceder.
- source_word: פַחַת
  english_pob_choice: captain
  chosen_spanish: capitán
  alternatives_spanish:
  - gobernador
  - oficial
  - comandante
  lexicon: HALOT
  rationale: En este contexto de burla militar, «capitán» comunica bien un rango subordinado. Mantiene la nota de una función inferior sin imponer una estructura administrativa más específica de la que el hebreo exige.
- source_word: אַחַד
  english_pob_choice: one / a single
  chosen_spanish: un solo
  alternatives_spanish:
  - uno
  - un único
  lexicon: HALOT
  rationale: '«Un solo» reproduce la fuerza despectiva del hebreo: no se trata de muchos, sino de uno solo, lo que intensifica el desafío.'
- source_word: עַבְדֵי אֲדֹנִי
  english_pob_choice: my master's servants
  chosen_spanish: de los siervos de mi señor
  alternatives_spanish:
  - de los esclavos de mi señor
  - de los servidores de mi señor
  lexicon: HALOT
  rationale: Aquí «siervos» conserva la relación de pertenencia y subordinación del hebreo sin introducir la dureza lexical de «esclavos», que en español podría sonar más fuerte de lo necesario para este contexto de corte y ejército.
- source_word: הַקְטַנִּים
  english_pob_choice: the least
  chosen_spanish: de los más pequeños
  alternatives_spanish:
  - de los menores
  - de los más bajos
  - de los menos importantes
  lexicon: HALOT
  rationale: La expresión hebrea marca rango inferior; «los más pequeños» transmite la idea de los de menor importancia/jerarquía, manteniendo la ironía del insulto.
- source_word: וַתִּבְטַח לְךָ עַל מִצְרַיִם
  english_pob_choice: while you trust for yourself in Egypt
  chosen_spanish: mientras confías para ti en Egipto
  alternatives_spanish:
  - mientras pones tu confianza en Egipto
  - y confías para ti en Egipto
  lexicon: HALOT
  rationale: «Mientras» sigue de cerca el valor conjuntivo del hebreo en la réplica retórica. «Para ti» conserva el matiz reflexivo/beneficiario presente en el pronombre.
- source_word: לְרֶכֶב
  english_pob_choice: for chariots
  chosen_spanish: en carros
  alternatives_spanish:
  - para carros
  - en carros de guerra
  lexicon: HALOT
  rationale: «Carros» es la forma natural en español para el hebreo רֶכֶב en este contexto militar; el contexto ya deja claro que son carros de guerra.
- source_word: וּלְפָרָשִׁים
  english_pob_choice: and horsemen
  chosen_spanish: y en jinetes
  alternatives_spanish:
  - y en caballería
  - y en hombres de a caballo
  lexicon: HALOT
  rationale: «Jinetes» mantiene la imagen concreta de tropas montadas y suena natural en español; además conserva la coordinación con «en carros».
translation_notes:
  revision_awareness: 'Se siguió la revisión más reciente del inglés auditado: se conservó el giro literal «volver atrás el rostro de», se reflejó el singular enfático con «un solo», y se respetó la relación de subordinación en «de los siervos de mi señor» y el matiz de simultaneidad en «mientras».'
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» como término por defecto solo cuando aparezca el tetragrámaton; este versículo no lo contiene.
  - Se evitó «Señor» para אדוני porque aquí se refiere al señor humano del hablante; se tradujo como «mi señor».
  - La preposición repetida en «en carros y en jinetes» ayuda a mantener el paralelismo hebreo y la claridad sintáctica en español.
