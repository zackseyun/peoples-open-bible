base_translation:
  language: en
  yaml_path: translation/ot/psalms/144/000.yaml
  text: Of David. Blessed is Yahweh[a], my rock, who trains my hands for battle, my fingers for war.
  footnotes:
  - marker: a
    text: Or 'For David' or 'By David' in the psalm heading; the Hebrew preposition can indicate authorship, association, or dedication.
    reason: alternative_reading
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T20:37:22Z'
    unchanged: false
    changes_summary: Completed the verse by translating the full Hebrew text beyond the superscription; rendered יְהוָה as 'Yahweh,' צוּרִי as 'my rock,' and the participial clause naturally as 'who trains my hands for battle, my fingers for war.'
translation:
  language: es
  text: De David[a]. Bendito sea Yahvé, mi roca, que adiestra mis manos para la batalla, mis dedos para la guerra.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «Para David» o «Por David» en el encabezado del salmo; la preposición hebrea puede indicar autoría, asociación o dedicación.
    reason: alternative_reading
lexical_decisions:
- source_word: לְדָוִד
  english_pob_choice: Of David.
  chosen_spanish: De David.
  alternatives_spanish:
  - Para David.
  - Por David.
  lexicon: לְ + nombre propio en encabezado salmódico
  rationale: El hebreo en el encabezado admite relación de autoría, dedicación o asociación; en español, 'De David' conserva esa ambigüedad sin forzar una sola interpretación.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - SEÑOR
  - Yahweh
  lexicon: Nombre divino del pacto
  rationale: El proyecto establece 'Yahvé' como forma principal en español para el nombre divino, preservando la decisión auditada de no ocultarlo con una sustitución devocional.
- source_word: צוּרִי
  english_pob_choice: my rock
  chosen_spanish: mi roca
  alternatives_spanish:
  - mi peña
  - mi refugio
  lexicon: צוּר
  rationale: '''Roca'' reproduce de manera natural y fiel la metáfora hebrea, manteniendo la imagen de firmeza y protección sin suavizarla.'
- source_word: הַמְלַמֵּד יָדַי לַקְרָב אֶצְבְּעוֹתַי לַמִּלְחָמָה
  english_pob_choice: who trains my hands for battle, my fingers for war
  chosen_spanish: que adiestra mis manos para la batalla, mis dedos para la guerra
  alternatives_spanish:
  - que entrena mis manos para la batalla, mis dedos para la guerra
  - que instruye mis manos para la batalla, mis dedos para la guerra
  lexicon: Participio de למד con objetos paralelos
  rationale: '''Adiestra'' transmite bien la idea de formar mediante práctica o entrenamiento, conservando el paralelo poético entre manos y dedos y el matiz de preparación para el combate.'
theological_decisions:
- issue: Tratamiento del nombre divino en un encabezado poético
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  rationale: Se mantiene la transparencia del texto fuente y la decisión POB de no enmascarar el Tetragrámaton en el texto principal.
  doctrine_reference: Tetragrámaton / nombre del pacto
translation_notes:
  revision_awareness: 'La revisión inglesa posterior completó el contenido del versículo más allá del encabezado, consolidando la lectura completa: bendición a Yahvé, confesión de Dios como roca y afirmación de su acción formativa para la guerra. La versión española sigue esa revisión y conserva la ambigüedad del encabezado mediante una nota.'
  spanish_consistency_notes:
  - Se mantuvo 'Yahvé' como forma principal del nombre divino, conforme a las pautas del proyecto.
  - Se preservó la estructura poética paralela ('mis manos... mis dedos...') para reflejar el hebreo.
  - No se introdujo 'Cristo' ni vocabulario eclesiástico ajeno al hebreo del versículo.
  - El encabezado se dejó breve y natural en español, sin resolver indebidamente la ambigüedad del לְ inicial.
