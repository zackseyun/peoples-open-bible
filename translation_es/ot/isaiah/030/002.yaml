review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español sigue bien el sentido general del hebreo: describe a los que van a Egipto sin consultar a Yahvé y buscando protección en Faraón/Egipto. Conserva correctamente la metáfora concreta de «mi boca» mediante una expresión cercana. Sin embargo, hay un desajuste importante en el anclaje de las notas: la nota [a] está puesta sobre «Egipto» aunque explica «a mi boca / mi consejo», y la nota [b] está puesta sobre «mi boca» aunque explica לָעוֹז. Además, «preguntado a mi boca» es poco natural en español; «preguntado de mi boca» preserva mejor la imagen hebrea y refleja mejor el inglés auditado «asked at my mouth».'
  spanish_quality_summary: 'El español es mayormente claro y digno. «Los que se encaminan a descender a Egipto» es entendible, aunque algo pesado; no exige cambio. La principal mejora necesaria es la naturalidad de la frase antropomórfica: «no han preguntado de mi boca» suena más idiomático que «a mi boca» sin perder concreción. También conviene alinear las notas con las frases que realmente comentan.'
  glossary_alignment: No hay conflicto con la terminología del proyecto. No aparece el nombre divino en el texto de este versículo. «Faraón», «Egipto», «fortaleza», «sombra» y «ampararse» son adecuados. La decisión de no usar una paráfrasis como «mi consejo» en el texto principal está bien, siempre que la nota alternativa quede correctamente anclada.
  issues:
  - severity: high
    issue: Los marcadores de notas están anclados a las frases equivocadas.
    rationale: La nota [a] explica la expresión «a/de mi boca», no «Egipto»; la nota [b] explica «para buscar refugio», no «mi boca». Esto rompe la trazabilidad del aparato crítico y puede confundir al lector.
  - severity: medium
    issue: «No han preguntado a mi boca» suena poco natural en español.
    rationale: Aunque intenta conservar el antropomorfismo hebreo, en español «preguntar de la boca de alguien» o «consultar de boca de alguien» comunica mejor la idea de buscar dirección procedente de la boca/habla divina. Además, armoniza mejor con el audit trail inglés «asked at my mouth».
  - severity: low
    issue: «Se encaminan a descender» es algo pesado.
    rationale: Es inteligible y fiel, así que no requiere cambio obligatorio; pero «se encaminan a bajar» o «parten para bajar» sería algo más fluido. Dado que el cambio principal ya resuelve lo necesario, puede conservarse.
  revised_spanish_text: los que se encaminan a descender a Egipto, pero no han preguntado de mi boca[a], para buscar refugio[b] en la fortaleza de Faraón y ampararse en la sombra de Egipto.
  revised_footnotes:
