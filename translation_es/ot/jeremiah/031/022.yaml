translation:
  language: es
  text: '¿Hasta cuándo vacilarás[a], hija infiel[b]? Porque Yahvé ha creado una cosa nueva en la tierra[c]: una mujer rodeará a un hombre[d].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «¿Hasta cuándo te apartarás?», «¿Hasta cuándo te evadirás?», o «¿Hasta cuándo te volverás esquiva?». El hebreo comunica movimiento evasivo o apartamiento; aquí «vacilarás» procura expresar esa inestabilidad en contexto de infidelidad de pacto.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «hija rebelde», «hija descarriada» o «hija apóstata». El hebreo describe una rebeldía o extravío de pacto.'
    reason: lexical_alternative
  - marker: c
    text: O, «en la tierra». Aquí «la tierra» probablemente se refiere a la tierra de Israel por el contexto.
    reason: lexical_alternative
  - marker: d
    text: La cláusula final es difícil y muy debatida. Aquí se traduce literalmente como «una mujer rodeará a un hombre». Posibles interpretaciones incluyen «una mujer cortejará a un hombre», «la débil vencerá al fuerte», o una imagen figurada de Israel restaurada volviendo a Yahvé.
    reason: alternative_reading
lexical_decisions:
- source_word: תִּתְחַמָּקִין
  english_pob_choice: will you waver
  chosen_spanish: te apartarás
  alternatives_spanish:
  - vacilarás
  - te evadirás
  - te volverás esquiva
  lexicon: HALOT
  rationale: El verbo comunica apartarse, deslizarse o sustraerse; en español, «te apartarás» conserva la idea de desviación relacional y moral sin forzar una imagen física. «Vacilarás» sería posible, pero pierde el matiz de evasión presente en el contexto de rebeldía de pacto.
- source_word: הַבַּת הַשּׁוֹבֵבָה
  english_pob_choice: faithless daughter
  chosen_spanish: hija infiel
  alternatives_spanish:
  - hija rebelde
  - hija desviada
  - hija infiel y descarriada
  lexicon: HALOT
  rationale: שׁוֹבֵבָה expresa extravío o vuelta atrás en lenguaje de pacto. «Hija infiel» es idiomático en español y preserva el reproche covenantal sin suavizarlo ni volverlo técnico.
- source_word: כִּי
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  - Porque en efecto
  lexicon: HALOT
  rationale: Aquí introduce la razón de la pregunta anterior; «Porque» expresa de manera natural la relación discursiva.
- source_word: בָרָא
  english_pob_choice: has created
  chosen_spanish: ha creado
  alternatives_spanish:
  - creó
  - crea
  - creará
  lexicon: HALOT
  rationale: El qatal se mantiene como perfecto en español. «Ha creado» conserva la acción ya realizada con relevancia presente, como en el audit trail inglés.
- source_word: חֲדָשָׁה
  english_pob_choice: a new thing
  chosen_spanish: una cosa nueva
  alternatives_spanish:
  - algo nuevo
  - una novedad
  - una realidad nueva
  lexicon: HALOT
  rationale: El adjetivo funciona sustantivamente; «una cosa nueva» reproduce con fidelidad la expresión abierta y concreta, sin cerrar el sentido con una paráfrasis interpretativa.
- source_word: בָּאָרֶץ
  english_pob_choice: in the land
  chosen_spanish: en la tierra
  alternatives_spanish:
  - en el país
  - en la tierra del país
  - en la tierra de Israel
  lexicon: HALOT
  rationale: Aunque el contexto puede sugerir la tierra de Israel, el hebreo permite «tierra» o «país». «En la tierra» mantiene la amplitud del término sin añadir una explicitación no requerida por el texto.
- source_word: נְקֵבָה
  english_pob_choice: a woman
  chosen_spanish: una mujer
  alternatives_spanish:
  - una hembra
  - una femenina
  - una mujer
  lexicon: HALOT
  rationale: Aunque el término base puede ser «hembra/femenina», en este contexto humano relacional «mujer» es la forma natural y precisa en español, evitando una sonoridad clínica.
- source_word: תְּסוֹבֵב
  english_pob_choice: will surround
  chosen_spanish: rodeará
  alternatives_spanish:
  - circundará
  - envolverá
  - hará círculo alrededor de
  lexicon: HALOT
  rationale: «Rodeará» conserva el valor básico de סבב (‘ir alrededor, rodear, circundar’) y suena natural en español. Mantiene la imagen concreta del hebreo sin añadir una interpretación como «cortejar».
- source_word: גָּבֶר
  english_pob_choice: a man
  chosen_spanish: a un hombre
  alternatives_spanish:
  - a un varón
  - a un fuerte
  - a un guerrero
  lexicon: HALOT
  rationale: «Hombre» es la equivalencia más transparente y neutral en español. Las opciones «varón» o «guerrero» introducirían matices no exigidos por el contexto inmediato.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  lexicon: HALOT
  rationale: Se conserva la transliteración del nombre divino revelado, conforme al estándar del proyecto, en lugar de sustituirlo por un título.
theological_decisions:
- issue: Interpretación de la cláusula enigmática נְקֵבָה תְּסוֹבֵב גָּבֶר
  english_pob_reading: Retain the literal image 'a woman will surround a man' in the main text.
  chosen_spanish_reading: 'Mantener la imagen literal: «una mujer rodeará a un hombre».'
  alternative_spanish_readings:
  - una mujer cortejará a un hombre
  - la débil vencerá a la fuerte
  - Israel volverá al Señor
  rationale: La cláusula es léxicamente clara pero interpretativamente debatida. La redacción española conserva la imagen abierta del original y evita resolver la tensión con una paráfrasis teológica.
  doctrine_reference: Translation philosophy §3 (Preserve theological tension rather than resolve it); §4 (Gender-accurate over gender-neutral)
- issue: Valor de בָרָא en contexto profético
  english_pob_reading: Render as 'has created' rather than a future tense.
  chosen_spanish_reading: Traducirlo como «ha creado».
  alternative_spanish_readings:
  - creará
  - crea
  rationale: El perfecto hebreo se conserva como perfecto en español, manteniendo la fuerza de acción realizada con relevancia presente y sin forzar un futuro.
  doctrine_reference: 'Translation philosophy: original-language primacy over translation tradition; preserve ambiguity where genuine'
translation_notes:
  revision_awareness: Se siguió el acuerdo de revisión más reciente (sin cambios). La redacción mantiene la lectura literal del final enigmático y conserva el perfecto de בָרָא como «ha creado».
  spanish_consistency_notes:
  - Se usó Yahvé para el nombre divino, conforme al estándar del proyecto.
  - Se mantuvo un tono bíblico moderno y digno, sin calco mecánico.
  - Se evitó resolver la cláusula final con interpretaciones no explicitadas por el hebreo.
  - Los marcadores de nota [a] y [b] aparecen exactamente en el texto principal y solo una vez cada uno.
