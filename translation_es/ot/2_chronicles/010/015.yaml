translation:
  language: es
  text: Así que el rey no escuchó al pueblo[a], porque este giro de los acontecimientos provenía de Dios, para que Yahvé estableciera su palabra que había hablado por medio de Ahías el silonita a Jeroboam hijo de Nabat.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «porque la causa provenía de Dios». El sustantivo hebreo puede denotar un giro, una circunstancia o un desarrollo causativo.
    reason: lexical_alternative
lexical_decisions:
- source_word: שָׁמַע
  english_pob_choice: listen to
  chosen_spanish: escuchó
  alternatives_spanish:
  - oyó
  - prestó atención a
  - obedeció
  lexicon: HALOT
  rationale: En el contexto de אֶל הָעָם, el verbo expresa hacer caso a la petición del pueblo, no solo percibir sonidos. «Escuchó» comunica bien esa atención a la voz ajena sin forzar la idea de obediencia plena.
- source_word: נְסִבָּה
  english_pob_choice: turn of events
  chosen_spanish: giro de los acontecimientos
  alternatives_spanish:
  - giro
  - circunstancia
  - causa
  lexicon: HALOT
  rationale: El sustantivo puede denotar giro, circunstancia o desarrollo causativo. «Giro de los acontecimientos» conserva la idea narrativa/providencial y suena natural en español, manteniendo la ambigüedad entre el curso del evento y su causa sin resolverla de más.
- source_word: מֵעִם הָאֱלֹהִים
  english_pob_choice: from God
  chosen_spanish: de parte de Dios
  alternatives_spanish:
  - de Dios
  - procedía de Dios
  - venía de Dios
  lexicon: HALOT
  rationale: La frase señala procedencia divina. «De parte de Dios» expresa origen y agencia con claridad en español y conserva mejor la relación personal implícita que un simple «de Dios» en este contexto narrativo.
- source_word: לְמַעַן
  english_pob_choice: so that
  chosen_spanish: para que
  alternatives_spanish:
  - a fin de que
  - con el fin de que
  lexicon: HALOT
  rationale: Marca propósito. «Para que» es la forma más natural en español y mantiene la fuerza final del hebreo.
- source_word: הָקִים
  english_pob_choice: might establish
  chosen_spanish: estableciera
  alternatives_spanish:
  - confirmara
  - hiciera firme
  - cumpliera
  lexicon: HALOT
  rationale: El hiphil de קום aquí significa hacer que algo se mantenga en pie, es decir, establecer o confirmar. «Estableciera» preserva esa imagen y encaja con «su palabra».
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahveh
  - Jehová
  lexicon: HALOT
  rationale: Se mantiene el nombre divino como nombre propio, no como sustituto reverencial. «Yahvé» es la forma habitual en el español del proyecto y preserva el Tetragrámaton.
- source_word: דְּבָרוֹ
  english_pob_choice: his word
  chosen_spanish: su palabra
  alternatives_spanish:
  - su mensaje
  - su dicho
  - su promesa
  lexicon: HALOT
  rationale: «Palabra» conserva el término amplio del hebreo y permite entender la declaración profética sin estrecharla indebidamente a «promesa».
- source_word: בְּיַד
  english_pob_choice: through
  chosen_spanish: por medio de
  alternatives_spanish:
  - por la mano de
  - mediante
  - a través de
  lexicon: HALOT
  rationale: El modismo marca mediación instrumental. «Por medio de» es idiomático y conserva el papel de Ahías como mediador de la palabra profética.
- source_word: הַשִּׁלוֹנִי
  english_pob_choice: the Shilonite
  chosen_spanish: el silonita
  alternatives_spanish:
  - el de Silo
  - el shilonita
  lexicon: HALOT
  rationale: El gentilicio se vierte con la forma española tradicional y clara «silonita», que identifica a Ahías como oriundo de Silo sin perder el matiz etnónimo.
- source_word: בֶּן נְבָט
  english_pob_choice: son of Nebat
  chosen_spanish: hijo de Nabat
  alternatives_spanish:
  - hijo de Nebat
  lexicon: HALOT
  rationale: Se conserva la estructura patronímica estándar. «Nabat» refleja la adaptación ortográfica castellana que suele emplear este proyecto para el nombre propio.
theological_decisions:
- issue: Causación divina y acción humana
  english_pob_reading: for this turn of events was from God
  chosen_spanish_reading: porque este giro de los acontecimientos era de parte de Dios
  alternative_spanish_readings:
  - porque esta circunstancia venía de Dios
  - porque la causa era de Dios
  - porque esto procedía de Dios
  rationale: 'El hebreo atribuye el origen del acontecimiento a Dios sin negar que el rey realmente no escuchó al pueblo. La formulación española conserva esa tensión: Dios es la fuente providencial del giro, pero la negación del rey sigue siendo una acción humana real.'
  doctrine_reference: 'Translation philosophy §3: preservar la tensión teológica en vez de resolverla'
- issue: Renderización del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahveh
  - Jehová
  rationale: Se traduce el Tetragrámaton con el nombre propio «Yahvé», conforme a la política del proyecto, para no ocultar el nombre del pacto detrás de un título genérico.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה / YHWH'
translation_notes:
  revision_awareness: 'El contexto inglés fue revisado y quedó estable (latest_revision_pass: unchanged; cross-check high_agreement). No se requieren ajustes textuales adicionales respecto al audit trail en inglés.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» para יְהוָה, conforme al estándar del proyecto.
  - Se conserva «palabra» para דְּבָרוֹ y «por medio de» para בְּיַד como traducción de la mediación profética.
  - «Silonita» se usa como gentilicio español legible para הַשִּׁלוֹנִי.
  - No se suaviza la tensión entre la soberanía divina y la acción real del rey; ambas permanecen en la redacción.
