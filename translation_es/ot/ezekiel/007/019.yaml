translation:
  language: es
  text: Arrojarán su plata a las calles[a], y su oro será una cosa impura. Su plata y su oro no podrán librarlos en el día de la ira de Yahvé. No saciarán su apetito ni llenarán sus estómagos, porque ha sido tropiezo de su iniquidad.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, más literalmente, “su oro será para impureza”; el término hebreo puede evocar impureza menstrual y, por tanto, algo ritualmente repulsivo.
    reason: lexical_alternative
lexical_decisions:
- source_word: כַּסְפָּם
  english_pob_choice: their silver
  chosen_spanish: su plata
  alternatives_spanish:
  - su dinero
  lexicon: HALOT
  rationale: כֶּסֶף puede referirse a la plata como metal o al dinero. Aquí, en paralelo con el oro y en un contexto de juicio, “plata” conserva la imagen concreta del metal precioso.
- source_word: בַּחוּצוֹת
  english_pob_choice: into the streets
  chosen_spanish: a las calles
  alternatives_spanish:
  - en las calles
  - a los espacios abiertos
  lexicon: HALOT
  rationale: חוּצוֹת designa calles o espacios abiertos de la ciudad. “A las calles” expresa bien el gesto público de arrojarla.
- source_word: יַשְׁלִיכוּ
  english_pob_choice: they will throw
  chosen_spanish: arrojarán
  alternatives_spanish:
  - tirarán
  - echarán
  lexicon: HALOT
  rationale: El verbo intensivo comunica un acto de echar con fuerza o desprecio. “Arrojarán” mantiene ese matiz mejor que un verbo más débil.
- source_word: וּזְהָבָם
  english_pob_choice: their gold
  chosen_spanish: su oro
  alternatives_spanish:
  - su oro precioso
  lexicon: HALOT
  rationale: Traducción directa del metal precioso, en paralelo con “su plata”.
- source_word: לְנִדָּה יִהְיֶה
  english_pob_choice: will become an unclean thing
  chosen_spanish: será una cosa impura
  alternatives_spanish:
  - será impuro
  - será como impureza
  - será algo inmundo
  lexicon: HALOT
  rationale: נִדָּה puede aludir a impureza ritual, incluso con resonancia de impureza menstrual. En el texto principal, “una cosa impura” conserva la fuerza metafórica sin hacer demasiado explícita una imagen especializada.
- source_word: לֹא יוּכַל לְהַצִּילָם
  english_pob_choice: will not be able to deliver them
  chosen_spanish: no podrán librarlos
  alternatives_spanish:
  - no podrán salvarlos
  - no podrán rescatarlos
  lexicon: HALOT
  rationale: “Librar” funciona bien en español bíblico para el acto de sacar de peligro o juicio, sin reducir el sentido a una sola esfera. Se mantiene el plural con el sujeto compuesto.
- source_word: בְּיוֹם עֶבְרַת יְהוָה
  english_pob_choice: in the day of Yahweh’s wrath
  chosen_spanish: en el día de la ira de Yahvé
  alternatives_spanish:
  - en el día del furor de Yahvé
  - en el día de la ira ardiente de Yahvé
  lexicon: HALOT
  rationale: עֶבְרָה denota ira, furor o indignación. Se usa “ira” por claridad natural en español, conservando el nombre divino Yahvé según el estándar del proyecto.
- source_word: נַפְשָׁם
  english_pob_choice: their appetite
  chosen_spanish: su apetito
  alternatives_spanish:
  - su alma
  - su vida
  - su deseo
  lexicon: HALOT
  rationale: En este contexto de comer y llenarse, נֶפֶשׁ se refiere a la necesidad o apetito vital, no a un concepto abstracto del alma. “Apetito” preserva el sentido inmediato.
- source_word: לֹא יְשַׂבֵּעוּ
  english_pob_choice: they will not satisfy
  chosen_spanish: no saciarán
  alternatives_spanish:
  - no quedarán saciados
  - no satisfarán
  lexicon: HALOT
  rationale: Con “apetito” como objeto implícito, “saciarán” expresa de forma natural la idea de llenar el hambre o deseo físico.
- source_word: וּמֵעֵיהֶם
  english_pob_choice: their stomachs
  chosen_spanish: sus entrañas
  alternatives_spanish:
  - sus estómagos
  - sus vientres
  lexicon: HALOT
  rationale: מֵעֶה literalmente alude a las partes internas, y en un contexto de comida puede referirse a las entrañas o al vientre. “Entrañas” conserva la concreción corporal con un registro bíblico natural en español.
- source_word: לֹא יְמַלֵּאוּ
  english_pob_choice: nor fill
  chosen_spanish: ni llenarán
  alternatives_spanish:
  - ni colmarán
  - ni saciarán
  lexicon: HALOT
  rationale: Mantiene el paralelismo verbal con la cláusula anterior y reproduce el sentido de llenar el interior corporal.
- source_word: מִכְשׁוֹל
  english_pob_choice: stumbling block
  chosen_spanish: el tropiezo
  alternatives_spanish:
  - la piedra de tropiezo
  - el obstáculo
  lexicon: HALOT
  rationale: מִכְשׁוֹל es aquello que hace tropezar. “Tropiezo” conserva la metáfora con naturalidad en español y permite el enlace con la culpa.
- source_word: עֲוֺנָם
  english_pob_choice: their iniquity
  chosen_spanish: de su iniquidad
  alternatives_spanish:
  - de su culpa
  - de su pecado
  lexicon: HALOT
  rationale: עָוֺן puede significar iniquidad, culpa o la carga del pecado. “Iniquidad” mantiene el peso moral y la formulación tradicional sin perder precisión.
- source_word: הָיָה
  english_pob_choice: it has become
  chosen_spanish: fue
  alternatives_spanish:
  - ha sido
  - se convirtió
  lexicon: HALOT
  rationale: En español, el perfecto de estado resultante puede expresarse de forma natural con “fue” en una sentencia proverbial o profética. La forma conserva la idea de resultado sin sonar forzada.
theological_decisions:
- issue: Nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: El texto hebreo usa directamente el Tetragrámaton. Conforme al estándar del proyecto, se traduce por “Yahvé” para preservar el nombre del pacto y evitar la sustitución por un título genérico.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Sentido de לְנִדָּה
  english_pob_reading: an unclean thing
  chosen_spanish_reading: una cosa impura
  alternative_spanish_readings:
  - impureza
  - una cosa inmunda
  - menstruación/impureza menstrual
  rationale: El hebreo puede evocar impureza ritual y, específicamente, la impureza menstrual. En el cuerpo del verso se mantiene una formulación amplia y comprensible, dejando la alusión más específica para la nota.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #1, #6'
- issue: Sentido de נַפְשָׁם y la imagen corporal final
  english_pob_reading: their appetite / their stomachs
  chosen_spanish_reading: su apetito / sus entrañas
  alternative_spanish_readings:
  - su alma / sus estómagos
  - su vida / sus vientres
  rationale: El paralelismo con comer, saciar y llenar apunta al apetito y al interior corporal. Se evita “alma” por ser engañoso en este contexto, y “entrañas” mantiene una imagen bíblica natural en español.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #1, #3'
translation_notes:
  revision_awareness: Se revisó el contexto auditado en inglés y la evaluación de alta concordancia; no se identificaron cambios sustanciales necesarios respecto del sentido base. Se ajustó la segunda cláusula para conservar la imagen corporal con un español bíblico natural (“entrañas”) y se preservó la nota léxica sobre נִדָּה.
  spanish_consistency_notes:
  - Se usó Yahvé de manera consistente con el estándar del proyecto para יְהוָה.
  - Se mantuvo un registro bíblico claro y moderno, evitando tanto arcaísmos innecesarios como paráfrasis expansivas.
  - Se preservó la tensión léxica de נִדָּה mediante una nota, sin cargar el texto principal con una explicación técnica.
  - Se evitó traducir נַפְשָׁם por “alma”, porque el contexto inmediato es de hambre y saciedad corporal.
