  text: For do you not have houses for eating and drinking? Or do you despise the church of God and shame those who have nothing? What should I say to you? Should I praise you? In this I do not praise you[a].
  footnotes:
  - marker: a
    text: Or 'the poor' or 'those who have no food'; Greek literally, 'those not having.'
    reason: lexical_alternative
