translation:
  language: es
  text: Ayúdanos[a], Dios de nuestra salvación, por la gloria de tu nombre[b]; líbranos y haz expiación[c] por nuestros pecados por amor de tu nombre.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «ven en nuestra ayuda».
    reason: lexical_alternative
  - marker: b
    text: O «por causa de la gloria de tu nombre».
    reason: lexical_alternative
  - marker: c
    text: O «expía nuestros pecados»; el verbo hebreo lleva lenguaje de expiación, no solo de perdón.
    reason: lexical_alternative
lexical_decisions:
- source_word: עָזְרֵנוּ
  english_pob_choice: Help us
  chosen_spanish: Ayúdanos
  alternatives_spanish:
  - Ven en nuestra ayuda
  - Auxílianos
  lexicon: HALOT
  rationale: El imperativo de עזר con sufijo de 1ª persona plural pide una súplica directa. «Ayúdanos» es natural en español, conserva la urgencia del ruego y evita una paráfrasis excesiva.
- source_word: אֱלֹהֵי יִשְׁעֵנוּ
  english_pob_choice: God of our salvation
  chosen_spanish: Dios de nuestra salvación
  alternatives_spanish:
  - nuestro Dios salvador
  - Dios nuestro Salvador
  lexicon: HALOT
  rationale: La cadena constructa expresa literalmente «Dios de nuestra salvación». Mantenerla en español conserva el vínculo posesivo y la fuente de la liberación.
- source_word: עַל דְּבַר כְּבוֹד שְׁמֶךָ
  english_pob_choice: for the glory of your name
  chosen_spanish: por la gloria de tu nombre
  alternatives_spanish:
  - por causa de la gloria de tu nombre
  - a causa de la gloria de tu nombre
  lexicon: HALOT
  rationale: עַל דְּבַר expresa base o motivo. «Por la gloria de tu nombre» comunica de forma directa la apelación al honor/reputación de Dios, preservando כבוד y שם como elementos distintos.
- source_word: וְהַצִּילֵנוּ
  english_pob_choice: deliver us
  chosen_spanish: líbranos
  alternatives_spanish:
  - rescátanos
  - sálvanos
  lexicon: HALOT
  rationale: נצל en hifil suele expresar librar o rescatar. «Líbranos» funciona bien en español bíblico y evita repetir innecesariamente el campo semántico de «salvación» ya presente en el verso.
- source_word: וְכַפֵּר עַל
  english_pob_choice: atone for
  chosen_spanish: expía
  alternatives_spanish:
  - haz expiación por
  - cubre
  lexicon: HALOT
  rationale: כפר con עַל en contexto cultual/teológico remite a expiación. «Expía» es breve y fiel; conserva la fuerza sacrificial/ritual que se perdería con «perdona».
- source_word: חַטֹּאתֵינוּ
  english_pob_choice: our sins
  chosen_spanish: nuestros pecados
  alternatives_spanish:
  - nuestras faltas
  - nuestras transgresiones
  lexicon: HALOT
  rationale: El plural con sufijo de 1ª plural se traduce naturalmente como «nuestros pecados». Es claro, exacto y acorde con el contexto penitencial.
- source_word: לְמַעַן שְׁמֶךָ
  english_pob_choice: for your name’s sake
  chosen_spanish: por amor de tu nombre
  alternatives_spanish:
  - por causa de tu nombre
  - por tu nombre
  lexicon: HALOT
  rationale: El modismo apela al carácter y la reputación de Dios como motivo de acción. «Por amor de tu nombre» es una fórmula reverente y ampliamente inteligible en español, sin perder el sentido causal/petitorio.
theological_decisions:
- issue: Rendering of כפר in a penitential plea
  english_pob_reading: atone for our sins
  chosen_spanish_reading: expía nuestros pecados
  alternative_spanish_readings:
  - perdona nuestros pecados
  - haz expiación por nuestros pecados
  rationale: El verbo hebreo כפר es más denso que «perdonar» y remite a expiación, no solo a remisión verbal. «Expía» conserva esa carga teológica sin introducir una explicación doctrinal ajena al texto.
  doctrine_reference: Translation philosophy §§1, 5, 6
- issue: Motivation clause centered on God's name
  english_pob_reading: for the glory of your name ... for your name’s sake
  chosen_spanish_reading: por la gloria de tu nombre ... por amor de tu nombre
  alternative_spanish_readings:
  - porque tu nombre es glorioso
  - a causa de la gloria de tu nombre
  rationale: La súplica se fundamenta en el honor y la reputación de Yahvé, no en el mérito del orante. La traducción mantiene las dos referencias al nombre para conservar la estructura retórica del verso.
  doctrine_reference: Translation philosophy §§1, 3, 6
translation_notes:
  revision_awareness: 'La redacción sigue la revisión auditada del inglés POB: la cláusula inicial se hace más directa («por la gloria de tu nombre»), y se conserva el doble motivo centrado en el nombre de Dios. También se mantiene la diferencia entre «líbranos» y «expía» para no fusionar rescate y expiación.'
  spanish_consistency_notes:
  - Se usó «Dios» para אֱלֹהֵי en armonía con el estándar del proyecto.
  - Se prefirió «expía» para preservar el matiz cultual de כפר, evitando reducirlo a «perdona».
  - Se evitó sustituir el lenguaje del nombre de Yahvé por un título genérico, y la formulación respeta el motivo teológico del versículo.
  - La puntuación sigue el paralelismo del hebreo con dos peticiones principales separadas por punto y coma.
