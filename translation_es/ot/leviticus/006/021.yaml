revisions:
- from: Y una vasija de barro en la que se haya cocido será quebrada; pero si se ha cocido en una vasija de bronce[a], será restregada y enjuagada con agua.
  to: Y una vasija de barro en la que sea hervida será quebrada; pero si es hervida en una vasija de bronce[a], esta será fregada a fondo y enjuagada con agua.
  rationale: Se revisa principalmente בשׁל para reflejar con mayor precisión el sentido de «hervir» documentado en la auditoría inglesa y en el contexto sacrificial. También se simplifica la sintaxis hacia una formulación normativa más natural en español. Se conserva la nota léxica sobre «bronce/cobre» porque está bien fundada y correctamente anclada.
