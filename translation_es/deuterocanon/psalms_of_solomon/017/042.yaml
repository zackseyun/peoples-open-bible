translation:
  language: es
  text: Y no se debilitará en sus días en su Dios, porque Dios lo ha hecho poderoso en el Espíritu Santo[a], y sabio en el consejo del entendimiento[b], con fuerza y rectitud[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «por el Espíritu Santo».
    reason: alternative_reading
  - marker: b
    text: O «en el consejo de la comprensión».
    reason: lexical_alternative
  - marker: c
    text: O «justicia».
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀσθενήσει
  english_pob_choice: will not grow weak
  chosen_spanish: no se debilitará
  alternatives_spanish:
  - no será débil
  - no desfallecerá
  lexicon: BDAG / LSJ
  rationale: El verbo expresa llegar a perder fuerza; en español, «debilitarse» conserva bien la idea dinámica sin exagerar el matiz.
- source_word: ἐπὶ θεῷ αὐτοῦ
  english_pob_choice: in his God
  chosen_spanish: en su Dios
  alternatives_spanish:
  - sobre su Dios
  - apoyado en su Dios
  - por su Dios
  lexicon: BDAG / LSJ
  rationale: La decisión inglesa reciente favorece una lectura más literal y menos interpretativa. «En su Dios» conserva la preposición y la relación estrecha con Dios sin añadir una explicación que el griego no expresa de forma explícita.
- source_word: κατηργάσατο
  english_pob_choice: has made
  chosen_spanish: ha hecho
  alternatives_spanish:
  - ha preparado
  - ha capacitado
  - ha hecho eficaz
  lexicon: BDAG / LSJ
  rationale: En este contexto el verbo presenta el efecto de la acción divina sobre el rey/Mesías. «Ha hecho» reproduce la causalidad de manera natural en español sin forzar un tecnicismo.
- source_word: δυνατὸν
  english_pob_choice: powerful
  chosen_spanish: poderoso
  alternatives_spanish:
  - fuerte
  - mighty
  lexicon: BDAG / LSJ
  rationale: «Poderoso» comunica capacidad y vigor de forma directa y digna; funciona mejor que «mighty» en español y preserva el valor semántico básico.
- source_word: ἐν πνεύματι ἁγίῳ
  english_pob_choice: in the Holy Spirit
  chosen_spanish: en el Espíritu Santo
  alternatives_spanish:
  - por el Espíritu Santo
  - en espíritu santo
  lexicon: BDAG / LSJ
  rationale: Dado el contexto y la revisión inglesa que entiende la frase de manera definida, la traducción española adopta la lectura explícita «Espíritu Santo». Mantiene la tensión teológica del texto, pero no la rebaja a una expresión genérica.
- source_word: σοφὸν ἐν βουλῇ συνέσεως
  english_pob_choice: wise in the counsel of understanding
  chosen_spanish: sabio en el consejo del entendimiento
  alternatives_spanish:
  - sabio en consejo prudente
  - sabio en el consejo prudente
  lexicon: BDAG / LSJ
  rationale: La estructura griega vincula sabiduría con un consejo caracterizado por entendimiento. «Consejo del entendimiento» conserva la relación nominal estrecha del original y sigue siendo comprensible en español.
- source_word: ἰσχύος
  english_pob_choice: strength
  chosen_spanish: fuerza
  alternatives_spanish:
  - fortaleza
  - poder
  lexicon: BDAG / LSJ
  rationale: «Fuerza» es la correspondencia más directa y natural con el cierre de la frase, y armoniza bien con «justicia».
- source_word: δικαιοσύνης
  english_pob_choice: righteousness
  chosen_spanish: justicia
  alternatives_spanish:
  - rectitud
  lexicon: BDAG
  rationale: Aunque el proyecto suele usar «justicia», aquí el paralelismo con «fuerza» y la lectura natural en español favorecen «justicia» como equivalente amplio de δικαιοσύνη. No se elimina la tensión jurídica/moral; simplemente se expresa con una palabra idiomática y válida.
theological_decisions:
- issue: 'Sentido de πνεύματι ἁγίῳ: ¿lectura determinada o preservación de ambigüedad?'
  english_pob_reading: The English audit trail moved from 'in holy spirit' to 'in the Holy Spirit' after revision.
  chosen_spanish_reading: El texto español adopta «el Espíritu Santo» como lectura definida.
  alternative_spanish_readings:
  - en espíritu santo
  - por el Espíritu Santo
  rationale: El contexto mesiánico y la revisión del inglés favorecen una referencia concreta al Espíritu Santo. En español, capitalizar y articular la expresión evita una ambigüedad que aquí sería menos natural, sin borrar que el griego carece de artículo.
  doctrine_reference: Mantener la lectura pneumatológica explícita conforme al contexto y a la revisión del texto base.
translation_notes:
  revision_awareness: La revisión inglesa posterior corrigió la duplicación, hizo más literal ἐπὶ θεῷ αὐτοῦ como «in his God» y terminó adoptando «the Holy Spirit». La versión española sigue esa línea revisada, pero mantiene una formulación natural y publicación-readable.
  spanish_consistency_notes:
  - Se conserva «Dios» sin máscara litúrgica, conforme al uso del proyecto para θεός.
  - Se traduce πνεῦμα con mayúscula en «Espíritu Santo» por decisión contextual, no por automatismo.
  - Se evita un calco como «sobre su Dios» porque en español sonaría forzado y oscurecería el sentido relacional del griego.
  - «Justicia» mantiene el término del proyecto para δικαιοσύνη y no se sustituye por «rectitud» sin necesidad contextual.
