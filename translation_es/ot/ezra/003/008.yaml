  to: Y en el segundo año, después de su llegada a la casa de Dios en Jerusalén, en el segundo mes, comenzaron Zorobabel hijo de Salatiel, y Jesúa hijo de Josadac, y el resto de sus hermanos, los sacerdotes y los levitas, y todos los que habían venido del cautiverio[a] a Jerusalén, y designaron a los levitas, desde los veinte años en adelante, para supervisar la obra de la casa de Yahvé.
  rationale: Se corrige el anclaje de la nota al pie para que corresponda a מֵהַשְּׁבִי ('del cautiverio'), y se mejora la precisión léxica de וַיַּעֲמִידוּ con 'designaron'. También se aligera la puntuación para una lectura más natural en español, sin apartarse del orden y sentido del hebreo ni de la auditoría inglesa.
