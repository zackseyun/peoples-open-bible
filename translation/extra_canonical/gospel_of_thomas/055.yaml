translation:
  text: Jesus said, "Whoever does not hate his father and his mother cannot be my
    disciple; and whoever does not hate his brothers and his sisters, and does not
    carry his cross as I do, will not be worthy of me."[a][b][c]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Printed MS reads “his brothers … and his sisters” (ⲥⲛⲏⲩ … ⲥⲱⲛⲉ). Dilley’s
      normalized lemmatization lists “his son … his daughter.” This draft follows
      the manuscript reading.
    reason: textual_variant
  - marker: b
    text: Coptic ⲛⲡⲁϩⲉ = “in my way/road, in my manner.” It is not the explicit verb
      “follow,” which the saying does not use.
    reason: dialect_note
  - marker: c
    text: Cf. Luke 14:26–27; Matthew 10:37–38 for related motifs, though Thomas’s
      diction is distinct.
    reason: cross_reference
  - marker: a
    text: Or 'will not be my disciple'.
    reason: previous_rendering
  - marker: b
    text: Or 'in my way'.
    reason: previous_rendering
lexical_decisions:
- source_word: ⲙⲟⲥⲧⲉ
  chosen: hate
  alternatives:
  - detest
  - reject
  lexicon: Crum; Lambdin
  rationale: Strong verb in Sahidic; Thomas’s diction is sharp. Retain the force rather
    than softening to “love less.”
- source_word: ϣⲣⲙⲁⲑⲏⲧⲏⲥ
  chosen: be/become a disciple
  alternatives:
  - be a pupil
  lexicon: Layton
  rationale: With future ⲛⲧⲟϥ … construction, means “he will (not) be/become a disciple.”
    Rendering as “my disciple” is idiomatic English for ⲛⲁⲛⲟⲕ (to me).
- source_word: ⲉⲓⲱⲧ / ⲙⲁⲁⲩ
  chosen: father / mother
  alternatives: []
  lexicon: Crum
  rationale: Common kinship terms; kept literal.
- source_word: ⲥⲛⲏⲩ
  chosen: brothers
  alternatives:
  - siblings
  - kinsmen
  lexicon: Crum
  rationale: MS (printed) reads ⲥⲛⲏⲩ; parallel ⲥⲱⲛⲉ follows, so translate as “brothers
    … and … sisters.”
- source_word: ⲥⲱⲛⲉ
  chosen: sisters
  alternatives:
  - female relatives
  lexicon: Crum
  rationale: Standard Sahidic “sister.” Paired with ⲥⲛⲏⲩ.
- source_word: ϥⲓ
  chosen: carry
  alternatives:
  - take up
  - bear
  lexicon: Crum
  rationale: In context with ⲥⲧⲁⲩⲣⲟⲥ, “carry” conveys ongoing bearing. “Take up” is
    possible but more idiomatic to the Synoptics, which we avoid harmonizing to.
- source_word: ⲥⲧⲁⲩⲣⲟⲥ
  chosen: cross
  alternatives:
  - stake
  lexicon: Loanword (Greek)
  rationale: Greek loan; standard meaning “cross.”
- source_word: ϩⲉ (ⲛⲡⲁϩⲉ)
  chosen: way (in my way)
  alternatives:
  - path
  - manner
  lexicon: Crum
  rationale: ϩⲉ denotes “way/road; manner.” “In my way” preserves the literal prepositional
    phrase and Thomas’s distinctive cadence, rather than smoothing to “follow me.”
- source_word: ⲉⲓⲣⲉ ⲛⲁⲝⲓⲟⲥ
  chosen: be worthy
  alternatives:
  - be fit
  - deserve
  lexicon: Layton; Greek loan ⲁⲝⲓⲟⲥ
  rationale: 'Coptic idiom ⲉⲓⲣⲉ + adjective conveys state/quality: “be(n) worthy.”'
- source_word: ⲡⲉⲧⲉⲣⲉ…
  chosen: whoever
  alternatives:
  - the one who
  lexicon: Layton
  rationale: Indefinite relative introduces the gnomic condition; “whoever” preserves
    the open, proverbial force.
textual_note: 'No lacunae are indicated in Dilley’s text for this saying. Orthography:
  the MS spells Greek ⲥⲧⲁⲩⲣⲟⲥ with a nonstandard ligature (printed ⲥⳁⲟⲥ), normalized
  to ⲥⲧⲁⲩⲣⲟⲥ. Clause structure: the first protasis uses the indefinite relative ⲡⲉⲧⲉⲣⲉ…,
  while the second is coordinated with ⲁⲩⲱ and a finite clause (printed “… ⲛ̄ϥⲙⲉⲥⲧⲉ
  …”), which Dilley’s normalization renders as another indefinite conditional (ⲛⲧⲉⲛⲧⲟϥ…).
  We translate both as “whoever …” to keep the parallelism. Reading issue (LB 27):
  the printed MS reads ⲥⲛⲏⲩ “brothers,” followed by ⲥⲱⲛⲉ “sisters.” The normalized
  line shows ⲡⲉϥⲥⲟⲛ · ⲙⲛ ⲡⲉϥⲥⲱⲛⲉ (“his son … his daughter”), which would shift the
  sense to children. We follow the manuscript’s ⲥⲛⲏⲩ/ⲥⲱⲛⲉ as the clearer reading consistent
  with the coordinate structure and typical Sahidic forms. The phrase ⲛⲡⲁϩⲉ is taken
  literally as “in my way/road,” not harmonized to “follow me.”'
