base_translation:
  language: en
  yaml_path: translation/ot/1_samuel/016/023.yaml
  text: And whenever the spirit of God came upon Saul[a], David would take the lyre and play it with his hand; then Saul found relief, and it was well with him[c][b], and the harmful spirit departed from him.
  footnotes:
  - marker: a
    text: Or, 'the harp.' The Hebrew kinnor refers to an ancient stringed instrument, likely more like a lyre than a modern harp.
    reason: lexical_alternative
  - marker: b
    text: Or, 'the evil spirit.' The Hebrew can mean 'evil' or 'harmful'; here the sense may emphasize the spirit's distressing effect on Saul.
    reason: lexical_alternative
  - marker: c
    text: The first clause reads 'the spirit of God,' while the final clause reads 'the harmful spirit.' The translation preserves the wording distinction found in the Hebrew rather than harmonizing the two expressions.
    reason: alternative_reading
