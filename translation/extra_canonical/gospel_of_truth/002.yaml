  consult_excerpt: 'Since all searched for the one from whom they had come – all were
    within him, the uncontainable, inconceivable one who’s beyond every thought –
    (and) since ignorance of the Father caused anguish and terror, and the anguish
    grew thick like a fog, so that no one could see – Error was strengthened. It worked
    on its own matter in vain, not knowing the Truth.

    It happened in a deluding way, as it (Error) prepared with power, in beauty, a
    substitute for the Truth. Now this wasn’t humiliating for the uncontainable, inconceivable
    one, because the anguish and forgetfulness and delusion of deceit were like nothing,
    whereas the Truth is established, unchangeable, unperturbed, beyond beauty. Because
    of this, disregard Error, since it has no root.

    It happened in a fog concerning the Father. It happens (now) since it (Error)
    prepares works in forgetfulness and terror, so that with them it (Error) might
    attract those in the middle and imprison them.

    The forgetfulness of Error wasn’t revealed; it wasn’t a 18 [thought] from the
    Father. Forgetfulness didn’t come into being from the Father, though it did come
    into being because of him. What comes into being within him is the knowledge,
    which was revealed so that forgetfulness might be dissolved, and the Father might
    be known. Forgetfulness came into being because the Father was unknown, so when
    the Father comes to be known, forgetfulness won’t exist anymore.'
translation:
  text: 'Since all were searching for the One from whom they had come forth — and
    they were all within him, the uncontainable, inconceivable One beyond every thought
    — and since ignorance of the Father brought distress and dread, and the distress
    thickened like a fog so that no one could see, Error was strengthened. It worked
    at its own matter to no purpose, because it did not know the Truth.


    It came about in a delusive manner: Error arrayed, with power and with a certain
    beauty, a substitute for the Truth. Yet this did not disgrace the Uncontainable,
    the Inconceivable; for the distress and the Forgetfulness and the illusion of
    deceit are as nothing, while the Truth stands firm — unchanging, untroubled, beyond
    beauty. Because of this, disregard Error, for it has no root.


    It happened in a fog with respect to the Father; and it happens even now: Error
    prepares works in Forgetfulness and in fear, so that by means of them it might
    draw those who are in the middle and imprison them.


    The Forgetfulness of Error was not revealed; it was not a thought from the Father.
    Forgetfulness did not come into being from the Father — though it did come into
    being on account of him. What comes into being within him is the knowledge, which
    was manifested so that Forgetfulness might be dissolved and the Father might be
    known. Since Forgetfulness arose because the Father was unknown, once the Father
    comes to be known, Forgetfulness will no longer exist.'
