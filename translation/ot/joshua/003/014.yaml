id: JOS.3.14
reference: Joshua 3:14
source:
  edition: WLC
  text: וַ/יְהִ֗י בִּ/נְסֹ֤עַ הָ/עָם֙ מֵ/אָ֣הֳלֵי/הֶ֔ם לַ/עֲבֹ֖ר אֶת הַ/יַּרְדֵּ֑ן וְ/הַ/כֹּהֲנִ֗ים נֹֽשְׂאֵ֛י הָ/אָר֥וֹן הַ/בְּרִ֖ית לִ/פְנֵ֥י הָ/עָֽם־׃
translation:
  text: And it happened[a], when the people set out from their tents to cross the Jordan, and the priests carrying the ark of the covenant were before the people,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'ahead of the people.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְהִי
  chosen: And it happened
  alternatives:
  - And it came to pass
  - Now it happened
  lexicon: HALOT
  rationale: Narrative wayyiqtol of היה introducing a new event. 'And it happened' preserves the Hebrew discourse function without archaic English.
- source_word: בִּנְסֹעַ
  chosen: when the people set out
  alternatives:
  - as the people pulled up camp
  - when the people journeyed
  lexicon: HALOT
  rationale: Infinitive construct of נסע with ב marks temporal circumstance. 'Set out' is natural modern English for breaking camp and departing.
- source_word: הָעָם
  chosen: the people
  lexicon: HALOT
  rationale: Standard rendering of עם in this narrative context, referring to Israel collectively.
- source_word: מֵאָהֳלֵיהֶם
  chosen: from their tents
  alternatives:
  - from their encampments
  - from their homes
  lexicon: HALOT
  rationale: אהל literally means 'tent.' Since Israel is camped in transit, 'tents' is more concrete and faithful than the broader 'encampments.'
- source_word: לַעֲבֹר
  chosen: to cross
  alternatives:
  - to pass over
  lexicon: HALOT
  rationale: Infinitive construct of עבר expressing purpose. 'To cross' is the clearest idiomatic rendering in context of crossing a river.
- source_word: אֶת הַיַּרְדֵּן
  chosen: the Jordan
  alternatives:
  - the Jordan River
  lexicon: HALOT
  rationale: Proper name of the river. English commonly uses 'the Jordan'; 'River' is implicit and unnecessary here.
- source_word: וְהַכֹּהֲנִים נֹשְׂאֵי
  chosen: with the priests carrying
  alternatives:
  - and the priests were carrying
  - and the priests, bearers of
  lexicon: HALOT
  rationale: The Hebrew uses a nominal clause/apposition-like construction, literally 'and the priests, bearers of.' In English, 'with the priests carrying' smoothly conveys the attendant circumstance while preserving the relation to the main action.
- source_word: הָאָרוֹן
  chosen: the ark
  alternatives:
  - the chest
  lexicon: HALOT
  rationale: Ark is the established and accurate rendering for ארון in this cultic context; 'chest' would be too flat and would lose canonical resonance.
- source_word: הַבְּרִית
  chosen: of the covenant
  alternatives:
  - of the treaty
  - of the pact
  lexicon: HALOT
  rationale: ברית in Israel's theological and narrative context is best rendered 'covenant,' preserving its established biblical sense.
- source_word: לִפְנֵי הָעָם
  chosen: before the people
  alternatives:
  - ahead of the people
  - in front of the people
  lexicon: HALOT
  rationale: לפני denotes spatial position in front of. 'Before the people' is concise and natural, while retaining the formal narrative tone.
