translation:
  language: es
  text: Canten a Yahvé[a], toda la tierra[b]; anuncien su salvación de día en día.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «a Yahvé». Se mantiene el nombre divino en lugar de sustituirlo por un título como «el Señor».'
    reason: theological_note
  - marker: b
    text: 'O: «proclamen / anuncien buenas nuevas de su salvación». El verbo hebreo transmite la idea de anunciar buenas noticias.'
    reason: lexical_alternative
lexical_decisions:
- source_word: שִׁירוּ
  english_pob_choice: Sing
  chosen_spanish: Canten
  alternatives_spanish:
  - Canten alabanzas
  - Canten con júbilo
  lexicon: HALOT
  rationale: El imperativo plural pide una acción directa de cantar. En español, «canten» conserva la fuerza exhortativa sin añadir «alabanzas», que no está explícito en el hebreo.
- source_word: לַיהוָה
  english_pob_choice: to Yahweh
  chosen_spanish: a Yahvé
  alternatives_spanish:
  - a Yahvé
  - al Señor
  lexicon: HALOT
  rationale: Se conserva el nombre divino como «Yahvé», conforme al criterio del proyecto para יהוה, en vez de sustituirlo por un título como «Señor».
- source_word: כָּל הָאָרֶץ
  english_pob_choice: all the earth
  chosen_spanish: toda la tierra
  alternatives_spanish:
  - toda la tierra
  - toda la tierra habitada
  lexicon: HALOT
  rationale: «Tierra» reproduce bien el alcance universal del hebreo en este contexto de alabanza pública. «Toda la tierra» suena natural en español y mantiene la amplitud del llamado.
- source_word: בַּשְּׂרוּ
  english_pob_choice: proclaim
  chosen_spanish: anuncien
  alternatives_spanish:
  - proclamen
  - anuncien buenas nuevas
  lexicon: HALOT
  rationale: El verbo piel de בשׂר incluye la idea de anunciar buenas noticias. «Anuncien» es claro y natural; no se añade «buenas nuevas» en el texto principal para no sobrecargar la línea poética, pero la fuerza de anuncio queda preservada.
- source_word: מִיּוֹם אֶל יוֹם
  english_pob_choice: from day to day
  chosen_spanish: de día en día
  alternatives_spanish:
  - día tras día
  - de día en día
  lexicon: HALOT
  rationale: La expresión hebrea indica continuidad diaria. «De día en día» es una equivalencia idiomática corriente en español y conserva la cadencia poética.
- source_word: יְשׁוּעָתוֹ
  english_pob_choice: his salvation
  chosen_spanish: su salvación
  alternatives_spanish:
  - su salvación
  - su liberación
  lexicon: HALOT
  rationale: «Salvación» corresponde al sentido amplio de יְשׁוּעָה y encaja con el anuncio público del texto. «Liberación» es posible, pero «salvación» conserva mejor el peso teológico y literario.
theological_decisions:
- issue: Rendering the divine name יהוה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahvé
  - el SEÑOR
  rationale: La fuente hebrea usa el Tetragrámaton, y el criterio del proyecto es expresarlo como «Yahvé». Se evita la sustitución por un título reverencial para no ocultar el nombre propio del pacto.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יהוה YHWH → Yahvé'
translation_notes:
  revision_awareness: 'El borrador sigue de cerca el texto hebreo de WLC y el audit trail inglés: conserva el nombre divino como Yahvé, traduce el imperativo plural con un llamado directo en español y mantiene la paralelidad poética entre cantar y anunciar la salvación. No se detectaron revisiones aplicadas en el pasaje inglés que obliguen a un ajuste adicional.'
  spanish_consistency_notes:
  - «Yahvé» se usa de forma consistente para יהוה, conforme al estándar del proyecto.
  - «Salvación» mantiene el valor teológico amplio de יְשׁוּעָה sin estrecharlo indebidamente a un solo matiz.
  - La secuencia verbal «Canten... anuncien...» preserva la estructura exhortativa del hebreo.
  - La expresión «de día en día» conserva el paralelismo y la idea de continuidad diaria.
