translation:
  language: es
  text: Bendigan al Señor, sol y luna; canten alabanzas y exáltenlo grandemente por los siglos[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, más literalmente, 'por los siglos'.
    reason: lexical_alternative
lexical_decisions:
- source_word: εὐλογεῖτε
  english_pob_choice: Bless
  chosen_spanish: Bendigan
  alternatives_spanish:
  - Bendecid
  - Alaben
  - Glorifiquen
  lexicon: BDAG
  rationale: El imperativo plural de εὐλογέω conserva aquí un tono litúrgico de exhortación coral. 'Bendigan' mantiene la fuerza de convocatoria y suena natural en español bíblico contemporáneo, sin perder la textura formal del himno.
- source_word: ἥλιος καὶ σελήνη
  english_pob_choice: sun and moon
  chosen_spanish: sol y luna
  alternatives_spanish:
  - el sol y la luna
  lexicon: LSJ
  rationale: La vocación directa a los astros funciona en español con artículo implícito; 'sol y luna' es más fluido en poesía litúrgica y preserva el paralelismo del griego.
- source_word: τὸν κύριον
  english_pob_choice: the Lord
  chosen_spanish: el Señor
  alternatives_spanish:
  - el Amo
  - el Maestro
  lexicon: BDAG
  rationale: Se mantiene la convención de POB para κύριος en este contexto himnódico referido al Dios de Israel. 'Señor' conserva el valor reverencial sin introducir mayúsculas de convención editorial no presentes en el griego.
- source_word: ὑμνεῖτε
  english_pob_choice: sing praise
  chosen_spanish: canten alabanzas
  alternatives_spanish:
  - hagan un himno
  - alaben cantando
  lexicon: BDAG
  rationale: ὑμνέω implica cantar o entonar alabanza. 'Canten alabanzas' comunica la dimensión musical de manera natural y clara en español, equivalente al 'sing praise' del audit trail inglés.
- source_word: ὑπερυψοῦτε
  english_pob_choice: highly exalt
  chosen_spanish: exáltenlo grandemente
  alternatives_spanish:
  - exáltenlo mucho más
  - ensálcenlo sobremanera
  lexicon: LSJ
  rationale: El compuesto intensivo pide una traducción que preserve el aumento de exaltación. 'Grandemente' transmite la intensidad sin sonar arcaico ni inflar indebidamente el texto.
- source_word: εἰς τοὺς αἰῶνας
  english_pob_choice: forever
  chosen_spanish: por los siglos
  alternatives_spanish:
  - para siempre
  - por los siglos de los siglos
  lexicon: BDAG
  rationale: La expresión griega significa duración continua/por las edades. 'Por los siglos' preserva mejor la imagen temporal plural del original que 'para siempre', y queda idiomático en español litúrgico.
theological_decisions:
- issue: Título divino κύριος en un himno judío griego
  english_pob_reading: the Lord
  chosen_spanish_reading: el Señor
  alternative_spanish_readings:
  - Yahvé
  - el Amo
  rationale: Aunque el proyecto suele usar 'Yahvé' para el nombre divino hebreo, aquí el texto griego dice κύριος y el audit trail inglés lo trata como 'the Lord'. En español, 'el Señor' preserva el registro devocional y respeta la forma del texto griego sin forzar una reconstrucción del tetragrámaton que no está explícita en este versículo.
  doctrine_reference: 'DOCTRINE.md Contested terms: κύριος → Lord'
translation_notes:
  revision_awareness: 'El cotejo revisado coincide plenamente con el auditorio inglés: no se documentan cambios textuales ni revisiones sustantivas; por tanto, la versión española sigue el mismo perfil de equivalencia óptima y mantiene las decisiones léxicas centrales del audit trail.'
  spanish_consistency_notes:
  - He usado 'Señor' para κύριος de forma consistente con el contexto litúrgico del himno y con la decisión inglesa documentada.
  - '''Canten alabanzas'' conserva la connotación musical de ὑμνεῖτε, evitando un simple ''alaben'' que perdería ese matiz.'
  - '''Por los siglos'' mantiene la pluralidad temporal de εἰς τοὺς αἰῶνας, mientras la nota recoge la alternativa más literal.'
  - La puntuación reproduce un llamado vocativo con pausa media tras 'Señor' y conserva el paralelismo del original griego.
