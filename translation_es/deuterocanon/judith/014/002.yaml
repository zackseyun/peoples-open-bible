translation:
  language: es
  text: Y sucederá que, cuando despunte el alba y salga el sol sobre la tierra, cada uno de ustedes tome sus armas de guerra, y todo hombre poderoso salga fuera de la ciudad. Ustedes nombrarán un jefe[a] sobre ellos, como si bajaran al llano contra la avanzada de los hijos de Assur[b]; pero no bajarán.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «un comandante» o «un líder». El griego ἀρχηγός puede denotar una cabeza, jefe o comandante.'
    reason: lexical_alternative
  - marker: b
    text: «Hijos de Assur» es una traducción literal de la expresión griega; se refiere a los asirios.
    reason: cultural_note
lexical_decisions:
- source_word: καὶ ἔσται ἡνίκα ἐὰν διαφαύσῃ ὁ ὄρθρος
  english_pob_choice: when dawn breaks
  chosen_spanish: cuando despunte el alba
  alternatives_spanish:
  - cuando amanezca
  - cuando despunte la mañana
  lexicon: LSJ
  rationale: La imagen idiomática del inicio de la luz matutina se expresa de forma natural con 'despuntar el alba', que conserva el valor temporal y figurado de ὄρθρος sin sonar mecánico.
- source_word: ἐξέλθῃ ὁ ἥλιος ἐπὶ τὴν γῆν
  english_pob_choice: the sun rises upon the earth
  chosen_spanish: salga el sol sobre la tierra
  alternatives_spanish:
  - el sol salga sobre la tierra
  - el sol se eleve sobre la tierra
  lexicon: LSJ
  rationale: '''Salir el sol'' reproduce de cerca ἐξέλθῃ y es un giro natural en español; ''sobre la tierra'' conserva ἐπὶ τὴν γῆν sin reducirlo solo a ''sobre el país'' o ''sobre la región''.'
- source_word: ἀναλήμψεσθε
  english_pob_choice: shall take up
  chosen_spanish: tomará
  alternatives_spanish:
  - tomará en mano
  - alzará
  lexicon: LSJ
  rationale: En este contexto militar, 'tomar' puede implicar 'tomar en las manos' las armas; el complemento 'sus armas de guerra' completa la idea sin forzar una perífrasis pesada.
- source_word: τὰ σκεύη τὰ πολεμικὰ
  english_pob_choice: weapons of war
  chosen_spanish: armas de guerra
  alternatives_spanish:
  - utensilios de guerra
  - aperos de guerra
  lexicon: LSJ
  rationale: Aunque σκεύη puede abarcar equipo o pertrechos, aquí el contexto bélico pide una expresión clara y directa. 'Armas de guerra' comunica el sentido militar con naturalidad en español.
- source_word: πᾶς ἀνὴρ ἰσχύων
  english_pob_choice: every mighty man
  chosen_spanish: todo hombre fuerte
  alternatives_spanish:
  - todo varón fuerte
  - todo hombre valiente
  lexicon: LSJ
  rationale: Se conserva el masculino singular distributivo de ἀνήρ con 'hombre'. 'Fuerte' refleja ἰσχύων y mantiene el perfil físico/capaz del grupo movilizado.
- source_word: ἔξω τῆς πόλεως
  english_pob_choice: beyond the city
  chosen_spanish: fuera de la ciudad
  alternatives_spanish:
  - más allá de la ciudad
  - fuera de los muros de la ciudad
  lexicon: LSJ
  rationale: '''Fuera de la ciudad'' es la forma más natural en español y mantiene la dirección exterior indicada por ἔξω.'
- source_word: δώσετε ἀρχηγὸν εἰς αὐτούς
  english_pob_choice: You shall appoint a leader over them
  chosen_spanish: Ustedes les pondrán un jefe
  alternatives_spanish:
  - Ustedes les nombrarán un jefe
  - Ustedes les darán un jefe
  lexicon: LSJ
  rationale: ἀρχηγός puede ser 'jefe', 'líder' o 'comandante'. 'Poner un jefe' expresa con naturalidad la designación de autoridad; 'les' aclara el destinatario del nombramiento.
- source_word: ὡς καταβαίνοντες ἐπὶ τὸ πεδίον
  english_pob_choice: as though going down to the plain
  chosen_spanish: como si bajaran al llano
  alternatives_spanish:
  - como si descendieran al llano
  - como si fueran bajando al llano
  lexicon: LSJ
  rationale: '''Bajar al llano'' es una manera idiomática y breve de conservar el movimiento descendente y la idea de simulación introducida por ὡς.'
- source_word: εἰς τὴν προφυλακὴν υἱῶν Ἀσσούρ
  english_pob_choice: against the advance guard of the sons of Asshur
  chosen_spanish: contra la avanzada de los hijos de Assur
  alternatives_spanish:
  - contra la vanguardia de los hijos de Assur
  - contra el puesto avanzado de los hijos de Assur
  lexicon: LSJ
  rationale: Se conserva la expresión literal 'hijos de Assur' como en la fuente griega, siguiendo el audit trail inglés. 'Avanzada' comunica προφυλακή como fuerza adelantada o vanguardia.
- source_word: οὐ καταβήσεσθε
  english_pob_choice: you shall not go down
  chosen_spanish: no bajarán
  alternatives_spanish:
  - no descenderán
  - ustedes no bajarán
  lexicon: LSJ
  rationale: La forma futura con valor prohibitivo se mantiene en español con 'no bajarán', que conserva tanto la instrucción como el movimiento literal de καταβαίνω.
theological_decisions:
- issue: Mantener el masculino del grupo militar en πᾶς ἀνὴρ ἰσχύων
  english_pob_reading: every mighty man
  chosen_spanish_reading: todo hombre fuerte
  alternative_spanish_readings:
  - todo varón fuerte
  - todo hombre valiente
  rationale: El griego usa ἀνήρ, no un término genérico de persona. En un contexto de movilización militar, se conserva el referente masculino sin neutralizarlo, de acuerdo con la lectura auditada en inglés.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
- issue: Conservar la literalidad semítica de 'los hijos de Assur'
  english_pob_reading: the sons of Asshur
  chosen_spanish_reading: los hijos de Assur
  alternative_spanish_readings:
  - los asirios
  - los hombres de Assur
  rationale: La frase literal preserva la forma del griego y deja visible la designación étnica/poética. La equivalencia inmediata 'asirios' es válida, pero aquí se mantiene la huella textual que el POB inglés documenta.
  doctrine_reference: DOCTRINE.md §Source transparency and lexical auditability
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión auditada que ajustó el inglés de 'comes out' a 'rises' para el sol y de 'strong man' a 'mighty man'. En español se optó por 'salga el sol' y 'todo hombre fuerte', manteniendo naturalidad y el perfil masculino del término griego ἀνήρ con ἰσχύων. También se preservó la estructura militar del mandato y la referencia literal a 'los hijos de Assur'.
  spanish_consistency_notes:
  - Se usa 'Yahvé' solo cuando aparece el nombre divino explícito; este versículo no lo contiene.
  - '''Assur'' se mantiene como forma transliterada coherente con la designación literal del griego.'
  - El futuro español conserva valor imperativo/prohibitivo en varios verbos, conforme al tono de instrucción del original.
  - Se evita 'SEÑOR' porque no hay aquí sustitución del nombre divino; el versículo no contiene κύριος en ese sentido.
