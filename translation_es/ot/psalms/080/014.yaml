- from: Un jabalí del bosque lo destroza[a], y las bestias salvajes del campo[b] se alimentan de él.
  to: Un jabalí del bosque la destroza[a], y las bestias salvajes del campo pastan en ella[b].
  rationale: Se corrige la concordancia con el referente femenino singular del hebreo y del contexto poético («la vid»/«la viña»). También se reubica la nota [b] para que corresponda a la alternativa léxica del verbo final, en línea con la auditoría inglesa. «Pastan en ella» preserva mejor el matiz de רעה, mientras que la nota ofrece la opción más amplia «se alimentan de ella».
