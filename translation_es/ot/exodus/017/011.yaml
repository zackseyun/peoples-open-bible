base_translation:
  language: en
  yaml_path: translation/ot/exodus/017/011.yaml
  text: And whenever Moses raised his hand[a], Israel prevailed; and whenever he let down his hand[b], Amalek prevailed.
  footnotes:
  - marker: a
    text: Or 'when Moses lifted up his hand ... when he let down his hand.' The Hebrew construction can be rendered more formally with 'when,' but the context suggests repeated action during the battle, hence 'whenever.'
    reason: lexical_alternative
  - marker: b
    text: '''Let down'' renders a verb that can also mean ''caused to rest'' or ''lowered.'' The contrast with ''raised his hand'' favors the idiomatic sense ''let down.'''
    reason: lexical_alternative
