review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la estructura del hebreo: dos grupos introducidos por ''los que'', la postración en las azoteas, el culto al conjunto celeste y el jurar tanto por Yahvé como por Milcóm. También preserva correctamente la tensión de sincretismo y la nota sobre בְּמַלְכָּם. Sin embargo, ''ante el ejército del cielo'' cambia ligeramente la dirección del complemento: el hebreo tiene לְ con el objeto de culto (''al ejército del cielo''), no simplemente una postura ''ante'' él.'
  spanish_quality_summary: 'El español es claro y digno, pero puede afinarse para sonar más natural y más fiel: ''postrarse ... al ejército del cielo'' mantiene mejor la relación verbal; además, la coma antes de ''y juran por Milcóm'' no es necesaria en español. El resto es legible y terminológicamente sólido.'
  glossary_alignment: 'Buena alineación con el glosario del proyecto: יהוה -> ''Yahvé'' correctamente; הַמִּשְׁתַּחֲוִים -> ''se postran'' es adecuado; בְּמַלְכָּם -> ''Milcóm'' en texto principal con alternativas en nota está bien documentado. La única mejora es ajustar לִצְבָא הַשָּׁמַיִם de ''ante el ejército del cielo'' a ''al ejército del cielo'' para respetar mejor la sintaxis y el sentido de orientación cultual.'
  issues:
  - severity: medium
    issue: '''ante el ejército del cielo'' debilita la relación de culto expresada por לִצְבָא'
    rationale: El hebreo presenta el objeto de la postración/adoración con לְ. En español, 'postrarse ante' describe postura frente a alguien, pero 'postrarse al ejército del cielo' preserva mejor que se trata del destinatario del acto cultual, en línea con el inglés POB y la sintaxis fuente.
  - severity: low
    issue: Coma innecesaria en 'los que se postran, los que juran...'
    rationale: La pausa no está exigida por el español y puede hacer la frase un poco más trabada. Sin coma, la estructura sigue clara y más fluida.
  revised_spanish_text: los que se postran en las azoteas al ejército del cielo[a] y los que se postran, los que juran por Yahvé y juran por Milcóm.
  revised_footnotes:
  - marker: a
    text: O ‘por su rey’; algunos entienden que el nombre aquí es ‘Molec’.
    reason: alternative_reading
  revision_rationale: Se ajusta 'ante' a 'al' para reflejar mejor el complemento del acto de postración en el hebreo y en la auditoría inglesa. También se elimina una coma innecesaria para mejorar la fluidez del español sin cambiar el sentido. La nota textual sobre Milcóm se conserva tal como corresponde.
