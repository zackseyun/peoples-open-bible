revisions:
- from: 'Y Yahvé dijo: «Así los hijos de Israel comerán su pan impuro[a] entre las naciones, a donde yo los arrojaré[b]».'
  to: 'Y Yahvé dijo: «Así comerán los hijos de Israel su pan impuro[a] entre las naciones donde yo los expulsaré[b]».'
  rationale: 'Se reemplaza ''arrojaré'' por ''expulsaré'' para reflejar con más precisión y naturalidad el sentido exílico de אַדִּיחֵם. Se corrige la nota al pie eliminando la forma no estándar ''defilecido''. También se suaviza el orden verbal a un español más natural: ''Así comerán los hijos de Israel su pan...'''
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T22:35:53Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura y el sentido general del hebreo: Yahvé habla, anuncia el modo (''Así''), mantiene ''los hijos de Israel'', conserva ''su pan'' y el marco exílico ''entre las naciones''. Sin embargo, ''a donde yo los arrojaré'' suena menos natural y menos preciso que el valor de expulsión/dispersión de אַדִּיחֵם + שָׁם. En español bíblico natural, ''donde yo los expulsaré'' o ''adonde yo los expulsaré'' transmite mejor la acción de destierro forzado. Además, la nota ''defilecido'' contiene una forma no española.'
  spanish_quality_summary: 'El texto es mayormente legible y digno, pero necesita un pequeño ajuste de naturalidad y precisión léxica. ''Arrojaré'' aplicado a personas en este contexto suena brusco y algo físico, menos idiomático para el exilio que ''expulsaré''. La nota al pie también requiere corrección de español: ''defilecido'' no es forma estándar; conviene usar ''contaminado'' o simplemente mantener ''inmundo''.'
  glossary_alignment: 'Alinea bien con los términos del proyecto: יְהוָה -> ''Yahvé''; בְנֵי יִשְׂרָאֵל -> ''los hijos de Israel''; לַחְמָם -> ''su pan''. Para טָמֵא, ''impuro'' es aceptable en español aunque ''inmundo'' sigue siendo alternativa útil en nota. Para אַדִּיחֵם, ''expulsaré'' se ajusta mejor al razonamiento documentado que ''arrojaré''.'
  issues:
  - severity: medium
    issue: '''yo los arrojaré'' no es la mejor opción para אַדִּיחֵם'
    rationale: El hebreo expresa hacerlos salir/ser expulsados o dispersados en exilio. 'Arrojar' en español puede sonar demasiado físico o coloquial; 'expulsaré' preserva mejor la fuerza de expulsión forzada y mejora la naturalidad.
  - severity: medium
    issue: La nota al pie usa 'defilecido', forma no estándar
    rationale: No es español natural ni correcto en este registro. Debe sustituirse por una alternativa válida como 'contaminado' o eliminarse.
  - severity: low
    issue: La correspondencia de notas del inglés no se preserva del todo
    rationale: El inglés documenta alternativa para 'sons of Israel' y para el verbo de dispersión; en español basta con mantener la nota relevante para impureza y la del verbo, pero conviene formularlas con español claro y alternativas útiles.
  revised_spanish_text: 'Y Yahvé dijo: «Así comerán los hijos de Israel su pan impuro[a] entre las naciones donde yo los expulsaré[b]».

    '
  revised_footnotes:
  - marker: a
    text: O «inmundo». El término conserva el matiz de impureza ritual, especialmente en el contexto del exilio entre las naciones.
    reason: lexical_alternative
  - marker: b
    text: O «yo los desterraré» o «yo los dispersaré». El verbo expresa expulsión forzada; «expulsaré» conserva bien esa fuerza en español.
    reason: lexical_alternative
  revision_rationale: 'Se reemplaza ''arrojaré'' por ''expulsaré'' para reflejar con más precisión y naturalidad el sentido exílico de אַדִּיחֵם. Se corrige la nota al pie eliminando la forma no estándar ''defilecido''. También se suaviza el orden verbal a un español más natural: ''Así comerán los hijos de Israel su pan...'''
