lexical_decisions:
- source_word: חוּשָׁה
  english_pob_choice: Hurry
  chosen_spanish: Date prisa
  alternatives_spanish:
  - Apresúrate
  - Hazlo rápidamente
  - Corre a ayudarme
  lexicon: HALOT
  rationale: El imperativo expresa urgencia inmediata. «Date prisa» conserva el valor exhortativo y suena natural en español moderno; «apresúrate» sería posible, pero aquí «date prisa» comunica mejor la súplica directa sin perder fuerza.
- source_word: לְעֶזְרָתִי
  english_pob_choice: to help me
  chosen_spanish: en ayudarme
  alternatives_spanish:
  - para ayudarme
  - a ayudarme
  - para mi ayuda
  lexicon: HALOT
  rationale: La construcción hebrea apunta a la finalidad de socorro. En español, «en ayudarme» mantiene la naturalidad de la llamada inmediata y conserva el sentido verbal preferido por la POB inglesa, sin volverlo nominal de forma innecesaria.
- source_word: אֲדֹנָי
  english_pob_choice: Lord
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Señor
  - mi Señor
  lexicon: HALOT
  rationale: Aunque la forma vocalizada es אֲדֹנָי, aquí funciona como título divino. Según la norma del proyecto, cuando el hebreo apunta al nombre divino o al discurso dirigido a Dios, se prefiere «Yahvé» en lugar de enmascarar con «Señor»; así se preserva la transparencia del texto.
- source_word: תְּשׁוּעָתִי
  english_pob_choice: my salvation
  chosen_spanish: mi salvación
  alternatives_spanish:
  - mi liberación
  - mi rescate
  lexicon: HALOT
  rationale: «Salvación» reproduce directamente el sustantivo y mantiene su alcance teológico amplio. «Liberación» o «rescate» estrechan algo el término; por eso se conserva la forma más abarcadora.
theological_decisions:
- issue: Tratamiento del título divino אֲדֹנָי en español
  english_pob_reading: Lord
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Señor
  - mi Señor
  rationale: La lectura inglesa usa «Lord» como título divino. En español, para este proyecto se evita el equivalente enmascarador «Señor» cuando el hebreo dirige una súplica a Dios con referencia al nombre divino; «Yahvé» hace visible la referencia original y sigue la política terminológica del POB en español.
  doctrine_reference: 'Project terminology default: יהוה / YHWH -> Yahvé; lordship-title handling in source-transparent translation'
translation_notes:
  revision_awareness: 'El inglés POB quedó sin cambios en la revisión más reciente («unchanged: true»), con alta concordancia en el control cruzado. La versión española sigue esa lectura estable, pero adapta las elecciones léxicas al criterio transparente del proyecto en español, especialmente en el tratamiento del título divino.'
  spanish_consistency_notes:
  - Se conserva el tono de súplica urgente y breve del hebreo.
  - «mi salvación» sigue la decisión inglesa y mantiene el peso teológico del sustantivo.
  - La puntuación y el orden conservan la brevedad poética del versículo.
