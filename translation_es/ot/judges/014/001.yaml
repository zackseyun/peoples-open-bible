translation:
  language: es
  text: Entonces Sansón bajó a Timná[a], y en Timná vio a una mujer de entre las hijas de los filisteos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más idiomáticamente: «de entre las mujeres filisteas».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֵּרֶד
  english_pob_choice: went down
  chosen_spanish: bajó
  alternatives_spanish:
  - descendió
  - fue hacia abajo
  lexicon: HALOT
  rationale: El hebreo ירד expresa literalmente movimiento hacia abajo. En español, 'bajó' conserva tanto el valor verbal como el matiz topográfico natural de la narración, sin sonar más rígido que 'descendió'.
- source_word: שִׁמְשׁוֹן
  english_pob_choice: Samson
  chosen_spanish: Sansón
  lexicon: convención onomástica bíblica en español
  rationale: Nombre propio tradicional y transparente en español.
- source_word: תִּמְנָתָה
  english_pob_choice: to Timnah
  chosen_spanish: a Timnat
  alternatives_spanish:
  - hacia Timnat
  lexicon: topónimo bíblico
  rationale: El he direccional marca movimiento hacia el lugar; 'a Timnat' transmite de forma natural esa dirección en español.
- source_word: וַיַּרְא
  english_pob_choice: he saw
  chosen_spanish: vio
  alternatives_spanish:
  - notó
  - observó
  lexicon: HALOT
  rationale: ראה es el verbo básico 'ver'. 'Vio' mantiene la observación narrativa sin añadir interpretación.
- source_word: אִשָּׁה
  english_pob_choice: a woman
  chosen_spanish: una mujer
  alternatives_spanish:
  - una esposa
  - una joven
  lexicon: HALOT
  rationale: Aunque אשה puede significar 'esposa' en otros contextos, aquí aún solo la ve; 'mujer' es el sentido menos cargado y más ajustado al contexto.
- source_word: בְּתִמְנָתָה
  english_pob_choice: at Timnah
  chosen_spanish: en Timnat
  alternatives_spanish:
  - en Timnat
  - allí en Timnat
  lexicon: preposición locativa
  rationale: La preposición ב indica ubicación. 'En Timnat' es la equivalencia natural en español y no sobreespecifica el lugar.
- source_word: מִבְּנוֹת פְּלִשְׁתִּים
  english_pob_choice: from the daughters of the Philistines
  chosen_spanish: de entre las hijas de los filisteos
  alternatives_spanish:
  - de entre las mujeres filisteas
  - de las hijas de los filisteos
  lexicon: HALOT
  rationale: Se conserva la expresión literal 'hijas de los filisteos' para reflejar el hebreo. 'De entre' expresa con claridad el valor partitivo de מִן; se mantiene la tensión entre literalidad étnica y fluidez española.
translation_notes:
  revision_awareness: Se siguió el pasaje fuente hebreo (WLC) y el audit trail inglés sin cambios de revisión pendientes; la versión inglesa reciente se mantuvo estable y el español conserva sus decisiones clave de forma fiel y auditable.
  spanish_consistency_notes:
  - Se usa 'Sansón' como forma bíblica estable en español.
  - Se conserva 'Timnat' para el topónimo, sin añadir artículos ni glosas innecesarias.
  - Se mantiene la construcción partitiva 'de entre' para reflejar el מִ prefijal con precisión y naturalidad.
  - No se introduce 'Cristo', 'SEÑOR' ni otra terminología no presente en el versículo.
