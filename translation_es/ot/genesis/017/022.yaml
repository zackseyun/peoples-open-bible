- from: Cuando terminó de hablar con él[a], Dios subió de junto a Abraham.
  to: Cuando terminó de hablar con él[a], Dios subió de Abraham.
  rationale: Se conserva la estructura temporal y el verbo de ascenso del hebreo, pero se elimina «de junto a», que añadía una imagen no apoyada por מֵעַל. La formulación revisada sigue siendo breve, fiel al audit trail inglés y suficientemente natural en español con apoyo de la nota léxica existente.
