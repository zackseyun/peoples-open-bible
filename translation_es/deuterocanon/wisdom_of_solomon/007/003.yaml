  yaml_path: translation/deuterocanon/wisdom_of_solomon/007/003.yaml
  text: And I too[a], when I was born, drew in the common air, and fell upon the earth that is subject to the same sufferings; and my first voice was the same as everyone's[b], as I cried.
  footnotes:
