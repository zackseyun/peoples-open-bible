revisions:
- from: La justicia guarda al íntegro en el camino[a], pero la maldad trastorna al pecador.
  to: La rectitud guarda al íntegro en el camino, pero la maldad derriba al pecador[a].
  rationale: Se ajusta צְדָקָה a «rectitud» para reflejar mejor la cualidad moral sapiencial; se cambia «trastorna» por «derriba» para expresar con mayor fidelidad la fuerza destructiva de תְּסַלֵּף; y se reemplaza la nota sobre «camino/senda» por la ambigüedad léxica más importante del verso, la de חַטָּאת, tal como la documenta el expediente inglés.
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T22:18:58Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la estructura antitética del hebreo y acierta en varias decisiones clave: «guarda» para תִּצֹּר, «al íntegro» para תָּם, «en el camino» para דָּרֶךְ y «al pecador» para חַטָּאת conforme a la revisión adjudicada en el audit trail inglés. Sin embargo, «trastorna» para תְּסַלֵּף debilita la imagen de arruinar/derribar/pervertir, y la nota al pie actual no preserva la tensión interpretativa documentada sobre חַטָּאת, que sí debería constar en español dado el expediente inglés.'
  spanish_quality_summary: 'El español es claro, natural y de registro sapiencial adecuado. «La justicia» es comprensible, pero en este contexto «la rectitud» representa mejor la cualidad moral de צְדָקָה y evita una posible lectura demasiado forense. La frase revisada suena más nítida y fiel: «La rectitud guarda al íntegro en el camino, pero la maldad derriba al pecador».'
  glossary_alignment: El borrador no entra en conflicto con términos de proyecto mayores. No obstante, para צְדָקָה conviene preferir «rectitud» en este proverbio, ya que el propio expediente inglés distingue este uso sapiencial de una noción más judicial de «justicia». «Pecador» para חַטָּאת es aceptable aquí, pero debe acompañarse de nota alternativa sobre «pecado» para reflejar la documentación léxica y teológica.
  issues:
  - severity: medium
    issue: «La justicia» para צְדָקָה es menos preciso en este contexto sapiencial
    rationale: Aunque es posible, en Proverbios el sustantivo aquí describe una cualidad moral protectora. «La rectitud» comunica mejor ese matiz ético y sigue la racionalidad lexical del expediente inglés, que prefirió 'Righteousness' sobre 'Justice'.
  - severity: medium
    issue: La nota al pie está anclada a דָּרֶךְ, pero omite la ambigüedad documentada de חַטָּאת
    rationale: El audit trail inglés conserva una nota sobre la posible lectura «sin/pecado» frente a «the sinner». La nota española actual sobre «camino/senda» no corresponde a la principal tensión interpretativa relevante del verso.
  - severity: medium
    issue: «Trastorna» debilita el valor de תְּסַלֵּף
    rationale: El verbo hebreo expresa torcer, pervertir, arruinar o derribar. «Trastorna» puede sugerir confusión mental o alteración general, pero no transmite tan bien el efecto destructivo y reversivo del paralelismo.
  revised_spanish_text: La rectitud guarda al íntegro en el camino, pero la maldad derriba al pecador[a].
  revised_footnotes:
  - marker: a
    text: 'O: «al pecado». El hebreo חַטָּאת puede entenderse aquí como «pecado» en sentido abstracto o como referencia a una persona pecadora.'
    reason: alternative_reading
  revision_rationale: Se ajusta צְדָקָה a «rectitud» para reflejar mejor la cualidad moral sapiencial; se cambia «trastorna» por «derriba» para expresar con mayor fidelidad la fuerza destructiva de תְּסַלֵּף; y se reemplaza la nota sobre «camino/senda» por la ambigüedad léxica más importante del verso, la de חַטָּאת, tal como la documenta el expediente inglés.
