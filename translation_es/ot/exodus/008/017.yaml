review_pass:
  verdict: revise
  source_alignment_summary: El borrador refleja bien la estructura condicional, la inminencia del anuncio y la ambigüedad léxica de עָרֹב como 'enjambre'. También conserva correctamente 'mi pueblo', la acumulación retórica 'sobre ti... sobre tus siervos... sobre tu pueblo', y la alternativa de אֲדָמָה como 'suelo/tierra'. Sin embargo, 'y sobre tus casas' no reproduce bien el valor de וּבְבָתֶּיךָ en este contexto, donde la plaga entra en las casas y la siguiente cláusula dice que se llenarán. Además, 'yo, he aquí, enviaré' suena forzado en español; una colocación más natural y fiel al hebreo es 'he aquí, yo envío' o 'mira, yo envío'.
  spanish_quality_summary: 'El texto es en general claro y digno, pero tiene dos problemas de naturalidad: la secuencia ''yo, he aquí'' es poco idiomática, y ''sobre tus casas'' sugiere exterioridad más que invasión interior. ''El suelo sobre el que están'' es comprensible, aunque con artículo masculino no concuerda tan de cerca con ''tierra''; mantener ''suelo'' es aceptable si se conserva la nota. Conviene ajustar la sintaxis para mayor fluidez e inteligibilidad eclesial.'
  glossary_alignment: No hay conflictos con la terminología teológica del proyecto. 'Siervos' aquí es adecuado porque el hebreo es עֲבָדֶיךָ ('tus siervos/servidores'), no δοῦλος del NT con la preferencia por 'esclavo'. 'Enjambre' sigue bien la decisión auditada para עָרֹב. No aparece el nombre divino ni otra terminología sensible del glosario.
  issues:
