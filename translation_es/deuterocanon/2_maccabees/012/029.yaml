translation:
  language: es
  text: Entonces levantaron el campamento de allí y se dirigieron a la ciudad de los escitas[a], a seiscientos estadios de Jerusalén.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O posiblemente «a Escitópolis», la ciudad que probablemente se quiere decir con la expresión griega «la ciudad de los escitas».
    reason: alternative_reading
lexical_decisions:
- source_word: ἀναζεύξαντές
  english_pob_choice: broke camp
  chosen_spanish: levantaron el campamento
  alternatives_spanish:
  - partieron
  - alzaron el campamento
  - desarmaron el campamento
  lexicon: LSJ
  rationale: El griego se refiere al acto de levantar el campamento antes de partir; en español, «levantaron el campamento» conserva con naturalidad el matiz militar/logístico mejor que un simple «partieron».
- source_word: ὥρμησαν
  english_pob_choice: set out
  chosen_spanish: se dirigieron
  alternatives_spanish:
  - se pusieron en marcha
  - avanzaron
  - marcharon
  lexicon: LSJ
  rationale: En este contexto narrativo de viaje, el verbo expresa movimiento decidido hacia un destino, no un ataque. «Se dirigieron» mantiene esa finalidad sin introducir violencia indebida.
- source_word: ἐπὶ Σκυθῶν πόλιν
  english_pob_choice: for the city of the Scythians
  chosen_spanish: a la ciudad de los escitas
  alternatives_spanish:
  - hacia la ciudad de los escitas
  - a Escitópolis
  - a la ciudad escita
  lexicon: LSJ
  rationale: El griego usa una expresión descriptiva, no el nombre propio. Por fidelidad al texto base, se conserva «la ciudad de los escitas» y no se normaliza a «Escitópolis» en el texto principal.
- source_word: ἀπέχουσαν
  english_pob_choice: which is ... from
  chosen_spanish: a
  alternatives_spanish:
  - que está a
  - distante de
  - alejada de
  lexicon: LSJ
  rationale: La revisión inglesa eliminó la cláusula relativa explícita por una construcción appositiva más natural. En español, la aposición con «a seiscientos estadios de Jerusalén» reproduce bien esa fluidez.
- source_word: σταδίους ἑξακοσίους
  english_pob_choice: six hundred stadia
  chosen_spanish: seiscientos estadios
  alternatives_spanish:
  - unos seiscientos estadios
  - cerca de 111 kilómetros
  - aproximadamente 69 millas
  lexicon: LSJ
  rationale: Se conserva la unidad antigua para transparencia y exactitud formal, como en la edición inglesa; las equivalencias modernas quedan fuera del texto principal.
translation_notes:
  revision_awareness: La versión inglesa revisada eliminó «which is» para volver la frase más natural en aposición. La redacción española sigue ese mismo ajuste con «a seiscientos estadios de Jerusalén», manteniendo el sentido de distancia del participio griego sin forzar una relativa innecesaria.
  spanish_consistency_notes:
  - Se mantiene «escitas» en minúsculas porque el griego es descriptivo; el nombre propio equivalente se reserva para la nota.
  - «Levantar el campamento» conserva mejor el sentido militar de ἀναζεύξαντές que un mero «salieron».
  - Se conserva la unidad «estadios» sin conversión, siguiendo la transparencia del texto fuente.
  - La puntuación con coma antes de la aposición refleja la estructura narrativa y la revisión inglesa más natural.
