translation:
  language: es
  text: 'Lo que les viene a la mente[a] ciertamente no sucederá[b]—eso que ustedes dicen: «Seremos como las naciones, como los clanes de las tierras, sirviendo madera y piedra[c][d]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Lo que les viene a su espíritu». El hebreo dice literalmente: «la cosa que sube sobre su espíritu» o «la cosa que sube sobre ustedes» en su espíritu.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «nunca llegará a suceder»; el hebreo usa un infinitivo absoluto con el verbo para dar énfasis.'
    reason: lexical_alternative
  - marker: c
    text: Es decir, sirviendo a ídolos hechos de madera y piedra.
    reason: cultural_note
  - marker: d
    text: 'O: «adorando madera y piedra».'
    reason: alternative_reading
lexical_decisions:
- source_word: וְהָעֹלָה עַל רוּחֲכֶם
  english_pob_choice: What is coming up in your mind
  chosen_spanish: Lo que sube en su ánimo
  alternatives_spanish:
  - Lo que sube en su espíritu
  - Lo que surge en su mente
  - Lo que viene a su pensamiento
  lexicon: HALOT
  rationale: El hebreo expresa algo que ‘asciende’ sobre la facultad interior indicada por רוּחַ. ‘Ánimo’ conserva la imagen de algo que sube desde dentro y es natural en español bíblico sin reducirlo a una psicología técnica. Mantiene también la ambigüedad entre interioridad, intención y pensamiento que el inglés POB resolvió con ‘mind’.
- source_word: הָיוֹ לֹא תִהְיֶה
  english_pob_choice: will certainly not happen
  chosen_spanish: no sucederá ciertamente
  alternatives_spanish:
  - no ocurrirá en absoluto
  - nunca llegará a suceder
  - ciertamente no será
  lexicon: HALOT
  rationale: La infinitiva absoluta con la forma finita intensifica la negación. ‘No sucederá ciertamente’ conserva el énfasis sin volver la frase demasiado rígida en español, y refleja la fuerza enfática del hebreo mejor que una negación simple.
- source_word: אֲשֶׁר אַתֶּם אֹמְרִים
  english_pob_choice: that you say
  chosen_spanish: eso que ustedes dicen
  alternatives_spanish:
  - lo que ustedes dicen
  - que ustedes dicen
  - así como ustedes dicen
  lexicon: HALOT
  rationale: La construcción introduce el contenido de la cita. ‘Eso que ustedes dicen’ funciona bien como enlace al discurso directo y evita una subordinación demasiado literal que suene pesada.
- source_word: נִהְיֶה
  english_pob_choice: We will be
  chosen_spanish: Seremos
  alternatives_spanish:
  - Llegaremos a ser
  - Vamos a ser
  - Seremos nosotros
  lexicon: HALOT
  rationale: El imperfecto en primera persona plural expresa intención o futuro. ‘Seremos’ es la forma más natural y fiel en una cita directa.
- source_word: כַגּוֹיִם
  english_pob_choice: like the nations
  chosen_spanish: como las naciones
  alternatives_spanish:
  - como los pueblos
  - como las gentiles naciones
  lexicon: HALOT
  rationale: ‘Naciones’ reproduce el sentido político-étnico normal de גּוֹיִם en Ezequiel. ‘Pueblos’ sería posible, pero puede borrar la referencia a entidades nacionales concretas.
- source_word: כְּמִשְׁפְּחוֹת הָאֲרָצוֹת
  english_pob_choice: like the clans of the lands
  chosen_spanish: como las familias de las tierras
  alternatives_spanish:
  - como los clanes de las tierras
  - como las familias de los países
  - como los clanes de los países
  lexicon: HALOT
  rationale: מִשְׁפָּחוֹת designa grupos de parentesco extensos; ‘familias’ es comprensible y evita un tecnicismo. ‘Tierras’ mantiene el plural del hebreo y suena más cercano al registro bíblico que ‘países’.
- source_word: לְשָׁרֵת
  english_pob_choice: serving
  chosen_spanish: sirviendo a
  alternatives_spanish:
  - para servir a
  - rindiendo servicio a
  - adorando
  lexicon: HALOT
  rationale: El verbo significa ‘servir’; se conserva el valor lexical sin convertirlo en ‘adorar’. En contexto, el servicio es idolátrico, pero el texto hebreo nombra el acto con el verbo general 'servir'.
- source_word: עֵץ וָאָבֶן
  english_pob_choice: wood and stone
  chosen_spanish: madera y piedra
  alternatives_spanish:
  - árbol y piedra
  - leño y piedra
  - madera y roca
  lexicon: HALOT
  rationale: En español, ‘madera y piedra’ expresa con claridad el material de los ídolos y preserva la fuerza polémica del hebreo. ‘Árbol’ sería engañoso aquí porque sugeriría un objeto vivo en vez de un ídolo fabricado.
theological_decisions:
- issue: La fuerza idolátrica de לְשָׁרֵת
  english_pob_reading: serving wood and stone
  chosen_spanish_reading: sirviendo a madera y piedra
  alternative_spanish_readings:
  - adorando madera y piedra
  - sirviendo a ídolos de madera y piedra
  rationale: Se mantiene el verbo ‘servir’ porque el hebreo no usa aquí el verbo específico ‘adorar’. A la vez, la referencia idolátrica queda suficientemente clara por el objeto del servicio y puede explicitarse en nota sin sustituir el léxico del texto.
  doctrine_reference: Translation philosophy §1, §5
- issue: Sentido de רוּחַ en la frase inicial
  english_pob_reading: What is coming up in your mind
  chosen_spanish_reading: Lo que sube en su ánimo
  alternative_spanish_readings:
  - Lo que sube en su espíritu
  - Lo que sube en su mente
  rationale: El término רוּחַ aquí apunta a la interioridad, no necesariamente al ‘Espíritu’ como categoría teológica. ‘Ánimo’ conserva la imagen del ascenso interior y evita imponer una distinción antropológica que el hebreo no exige en este contexto.
  doctrine_reference: Translation philosophy §1, §3
- issue: Alusión cultural a los ídolos de madera y piedra
  english_pob_reading: serving wood and stone
  chosen_spanish_reading: sirviendo a madera y piedra
  alternative_spanish_readings:
  - sirviendo a ídolos de madera y piedra
  - adorando a ídolos de madera y piedra
  rationale: El texto bíblico conserva la materialidad de ‘madera y piedra’. Una nota puede aclarar que se trata de ídolos, pero el cuerpo principal no debe reemplazar la imagen por una interpretación ya resuelta.
  doctrine_reference: Translation philosophy §5
translation_notes:
  revision_awareness: Revisado a la luz del último pase, que no propuso cambios; la versión española mantiene la lectura enfática de la negación, conserva el valor verbal de לְשָׁרֵת como ‘servir’ y deja explícita en nota la ambigüedad de רוּחַ sin convertirla en una interpretación doctrinal cerrada.
  spanish_consistency_notes:
  - Se conserva Yahvé para el Tetragrámaton según el estándar del proyecto, aunque este versículo no lo contiene.
  - Se mantiene ‘naciones’ para גּוֹיִם y ‘familias de las tierras’ para מִשְׁפְּחוֹת הָאֲרָצוֹת, en continuidad con el audit trail inglés.
  - Se evita ‘Cristo’/‘Mesías’ porque no hay base léxica en este versículo.
  - La estructura de cita directa se mantiene clara con comillas españolas y guion largo para la apódosis enfática.
