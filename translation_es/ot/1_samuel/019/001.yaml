    rationale: El registro inglés documenta alternativas significativas tanto para לְהָמִית אֶת דָּוִד como para חָפֵץ בְּדָוִד מְאֹד. Deben conservarse cuando son relevantes y especialmente aquí ayudan a evitar pérdida de matiz.
  revised_spanish_text: Saúl habló a Jonatán su hijo y a todos sus siervos para matar a David[a], pero Jonatán, hijo de Saúl, sentía gran aprecio por David[b].
  revised_footnotes:
  - marker: a
    text: O, 'para darle muerte a David'. El verbo hebreo es causativo ('hacer morir' / 'dar muerte'), pero en este contexto el sentido es sencillamente que Saúl hablaba de matar a David.
    reason: lexical_alternative
  - marker: b
    text: O, 'se deleitaba mucho en David' o 'lo amaba mucho'. El hebreo dice que Jonatán 'hallaba gran deleite en' David.
    reason: lexical_alternative
