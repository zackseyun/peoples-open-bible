revisions:
- from: Después de él, Malkías hijo del orfebre reparó hasta la casa de los servidores del templo[a] y de los mercaderes, frente a la Puerta de la Inspección[b], y hasta la cámara alta de la esquina[c].
  to: Después de él, Malkías hijo del orfebre reparó hasta la casa de los servidores del templo[a] y de los mercaderes, frente a la Puerta de la Inspección[b], y hasta la cámara alta del ángulo[c].
  rationale: Se mantiene casi todo el borrador por su fidelidad general, pero se corrige la nota [b] para eliminar el anglicismo "Muster" y expresar en español las alternativas semánticas de מִפְקָד. Además, se ajusta "de la esquina" a "del ángulo" en el texto y en la nota [c] para una formulación más natural en contexto de fortificación, sin cambiar el sentido del original.
