translation:
  language: es
  text: 'No te apoyes en tus riquezas[a], ni digas: «Tengo poder».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebreo literalmente, «hay poder en mi mano»; el paralelo griego refleja el sentido «soy autosuficiente» o «me basta».
    reason: alternative_reading
lexical_decisions:
- source_word: אַל תִּשָּׁעֵן / μὴ ἔπεχε
  english_pob_choice: Do not rely
  chosen_spanish: No te apoyes
  alternatives_spanish:
  - No confíes en
  - No te apoyes sobre
  - No dependas de
  lexicon: HALOT / LXX usage
  rationale: El hebreo expresa la idea de apoyarse o recostarse figuradamente, y el griego también transmite la noción de no fijarse/aferrarse a las posesiones. En español, «apoyarse en» conserva bien la metáfora y su fuerza exhortativa.
- source_word: חֵילֶךָ / τοῖς χρήμασίν σου
  english_pob_choice: your wealth
  chosen_spanish: tus riquezas
  alternatives_spanish:
  - tu riqueza
  - tus bienes
  - tus recursos
  lexicon: HALOT / χρήματα
  rationale: El hebreo חֵיל puede referirse a riqueza, recursos o capacidad; el paralelo griego χρήματα apunta claramente a bienes/dinero. «Riquezas» es natural en español y mantiene el matiz económico del consejo.
- source_word: יֵשׁ לְאֵל יָדִי / Αὐτάρκη μοί ἐστιν
  english_pob_choice: I have the power
  chosen_spanish: Tengo poder
  alternatives_spanish:
  - Mi mano tiene fuerza
  - Tengo suficiente fuerza
  - Soy autosuficiente
  lexicon: HALOT / αυτοάρκης
  rationale: 'La cláusula hebrea es breve y algo difícil: literalmente sugiere que «hay para la fuerza de mi mano». El paralelo griego expresa autosuficiencia. «Tengo poder» sigue de cerca la revisión inglesa reciente y conserva la afirmación de capacidad sin introducir demasiado interpretación.'
theological_decisions:
- issue: Relación entre el hebreo difícil y el paralelo griego en la segunda prohibición
  english_pob_reading: The second prohibition warns against claiming self-sufficiency grounded in one's own power.
  chosen_spanish_reading: La segunda prohibición advierte contra atribuirse poder propio como base de seguridad.
  alternative_spanish_readings:
  - 'No digas: «Soy autosuficiente»'
  - 'No digas: «Mi mano basta»'
  - 'No digas: «Tengo suficiente»'
  rationale: El testimonio hebreo es el principal, pero la forma griega aclara que el blanco del dicho es la autosuficiencia. En español, «Tengo poder» conserva la referencia al poder personal, mientras la nota puede explicitar el trasfondo de suficiencia propia sin borrar la tensión textual.
  doctrine_reference: 'PHILOSOPHY.md: traducir desde el hebreo preservado, usando el paralelo griego como control real de sentido'
translation_notes:
  revision_awareness: La versión inglesa fue revisada desde una formulación interpretativa («My power is enough for me») hacia una más literal («I have the power»). La propuesta española sigue esa revisión reciente, pero mantiene la metáfora de apoyo y una nota que preserve la lectura de autosuficiencia sugerida por el griego.
  spanish_consistency_notes:
  - Se usa «riquezas» para חֵילֶךָ por la evidencia del paralelo χρήματα.
  - Se evita «SEÑOR» o fórmulas tradicionales innecesarias porque el versículo no contiene el Nombre divino.
  - «Poder» se conserva como sustantivo abstracto, en consonancia con la revisión inglesa y la idea de capacidad/autosuficiencia.
