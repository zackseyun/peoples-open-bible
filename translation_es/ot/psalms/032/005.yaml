translation:
  language: es
  text: 'Te hice saber mi pecado, y no encubrí mi iniquidad. Dije: «Confesaré mis transgresiones a Yahvé», y tú perdonaste[a] la iniquidad de mi pecado. Selah'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «levantaste» o «llevaste» la iniquidad de mi pecado; el verbo lleva la imagen de quitar una carga y por eso idiomáticamente significa «perdonaste».'
    reason: lexical_alternative
lexical_decisions:
- source_word: חַטָּאתִי
  english_pob_choice: my sin
  chosen_spanish: mi pecado
  alternatives_spanish:
  - mi pecado
  - mi ofensa
  lexicon: HALOT
  rationale: En español, «pecado» reproduce con naturalidad el valor básico de חטאת y encaja con la tríada del verso. «Pecado» evita endurecer el matiz como si fuera solo una falta técnica, pero conserva la carga moral.
- source_word: אוֹדִיעֲךָ
  english_pob_choice: I made known to you
  chosen_spanish: te hice saber
  alternatives_spanish:
  - te di a conocer
  - te lo hice saber
  lexicon: HALOT
  rationale: 'El hifil de ידע es causativo: «hacer saber». «Te hice saber» conserva ese valor sin sonar artificial en español bíblico contemporáneo.'
- source_word: עֲוֺנִי
  english_pob_choice: my iniquity
  chosen_spanish: mi iniquidad
  alternatives_spanish:
  - mi culpa
  - mi maldad
  lexicon: HALOT
  rationale: «Iniquidad» mantiene la distinción léxica frente a חטאת y פשע, y preserva el peso teológico y jurídico del término mejor que una simplificación como «culpa».
- source_word: כִסִּיתִי
  english_pob_choice: I did not cover
  chosen_spanish: no encubrí
  alternatives_spanish:
  - no cubrí
  - no oculté
  lexicon: HALOT
  rationale: Aunque el verbo significa literalmente «cubrir», en español «encubrir» comunica con claridad la imagen de ocultar el pecado sin perder el contraste intencional con el perdón divino posterior.
- source_word: אוֹדֶה
  english_pob_choice: I will confess
  chosen_spanish: confesaré
  alternatives_spanish:
  - reconoceré
  - daré gracias
  lexicon: HALOT
  rationale: En contexto penitencial, y con el objeto «mis transgresiones», el valor de confesar es el pertinente. «Confesaré» conserva la fuerza performativa del verbo.
- source_word: עֲלֵי פְשָׁעַי
  english_pob_choice: my transgressions
  chosen_spanish: mis transgresiones
  alternatives_spanish:
  - acerca de mis transgresiones
  - sobre mis transgresiones
  lexicon: HALOT
  rationale: La preposición sobre/contra/acerca de puede sonar pesada en español. Aquí se integra naturalmente en el complemento del verbo «confesar» como el contenido de la confesión.
- source_word: לַיהוָה
  english_pob_choice: to Yahweh
  chosen_spanish: a Yahvé
  alternatives_spanish:
  - a Yahvé
  - al Señor
  lexicon: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
  rationale: 'Se sigue la directriz del proyecto: יהוה se vierte «Yahvé» en el texto principal, preservando el nombre del pacto en lugar de la sustitución tradicional «SEÑOR».'
- source_word: נָשָׂאתָ
  english_pob_choice: you forgave
  chosen_spanish: perdonaste
  alternatives_spanish:
  - levantaste
  - llevaste
  lexicon: HALOT
  rationale: En combinación con un pecado/iniquidad como objeto, נָשׂא expresa la remoción de la culpa. «Perdonaste» comunica el sentido idiomático en español; la imagen de levantar/cargar queda reconocida en la decisión teológica y la nota.
- source_word: עֲוֺן חַטָּאתִי
  english_pob_choice: the iniquity of my sin
  chosen_spanish: la iniquidad de mi pecado
  alternatives_spanish:
  - la culpa de mi pecado
  - mi pecado iniquo
  lexicon: HALOT
  rationale: Se conserva la cadena constructa sin aplanarla. «La iniquidad de mi pecado» suena solemne en español y preserva la superposición de culpa/pecado del hebreo.
- source_word: סֶלָה
  english_pob_choice: Selah
  chosen_spanish: Selah
  alternatives_spanish:
  - Selah
  lexicon: HALOT
  rationale: Se translitera el término porque su función exacta es incierta y no conviene imponer una glosa interpretativa en el texto principal.
theological_decisions:
- issue: Tratamiento del nombre divino יהוה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Jehová
  rationale: El proyecto español exige usar «Yahvé» para יהוה en el texto principal. En este verso el nombre aparece de forma explícita, así que no se usa una convención de reemplazo litúrgico.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Valor de נָשָׂאתָ aplicado al pecado
  english_pob_reading: you forgave
  chosen_spanish_reading: perdonaste
  alternative_spanish_readings:
  - levantaste
  - llevaste
  rationale: El hebreo conserva la imagen de cargar/levantar la culpa, pero el sentido en contexto es el de remisión del pecado. «Perdonaste» es la equivalencia idiomática más clara; la imagen literal se preserva en una nota.
  doctrine_reference: DOCTRINE.md Translation philosophy §3, §6
translation_notes:
  revision_awareness: La revisión más reciente del expediente inglés quedó sin cambios y fue confirmada con acuerdo alto; por eso el borrador español sigue de cerca las decisiones ya auditadas, especialmente en la tríada de términos de pecado, la confesión y el remate con el perdón divino.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» para יהוה en coherencia con las directrices del proyecto.
  - Se conserva la distinción entre «pecado», «iniquidad» y «transgresiones» para reflejar la tríada hebrea.
  - «Confesaré» se usa como verbo principal de la declaración penitencial, sin diluir el valor de reconocimiento explícito.
  - «Selah» se translitera sin interpretación, de acuerdo con la práctica del proyecto.
