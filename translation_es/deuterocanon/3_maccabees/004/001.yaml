translation:
  language: es
  text: Y por todas partes donde llegaba este decreto, se organizaba entre las naciones una celebración pública[a] con gritos y alegría[b], como si el odio que desde mucho antes danzaba en sus mentes contra ellos se manifestara ahora abiertamente con audacia.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'entre los gentiles'. El griego τοῖς ἔθνεσιν puede designar a las naciones en general, pero en este contexto probablemente se refiere a la población no judía.
    reason: lexical_alternative
  - marker: b
    text: El participio griego detrás de 'danzaba' es vívido y algo difícil; sugiere una hostilidad ya agitándose o bullendo en su interior antes de este momento.
    reason: lexical_alternative
lexical_decisions:
- source_word: Πάντῃ
  english_pob_choice: everywhere
  chosen_spanish: por todas partes
  alternatives_spanish:
  - en todo lugar
  - en todas partes
  lexicon: LSJ
  rationale: El adverbio expresa alcance distributivo; 'por todas partes' suena natural en español y conserva la idea de extensión general.
- source_word: προσέπιπτεν
  english_pob_choice: arrived
  chosen_spanish: llegaba
  alternatives_spanish:
  - arribaba
  - alcanzaba
  - caía sobre
  lexicon: LSJ
  rationale: El verbo griego, aplicado a un decreto, describe su llegada o alcance a distintos lugares; 'llegaba' mantiene la fluidez sin perder el matiz de difusión.
- source_word: πρόσταγμα
  english_pob_choice: decree
  chosen_spanish: decreto
  alternatives_spanish:
  - edicto
  - mandato
  lexicon: LSJ
  rationale: Se trata de una orden oficial; 'decreto' es claro, formal y adecuado para un mandato real.
- source_word: δημοτελής
  english_pob_choice: public
  chosen_spanish: público
  alternatives_spanish:
  - comunal
  - a costa del pueblo
  lexicon: LSJ
  rationale: El adjetivo puede sugerir algo hecho para el pueblo o con carácter cívico. 'Público' conserva ese rasgo sin concretar indebidamente el aspecto económico.
- source_word: συνίστατο
  english_pob_choice: was organized
  chosen_spanish: se organizaba
  alternatives_spanish:
  - se celebraba
  - se disponía
  - se instituía
  lexicon: LSJ
  rationale: El imperfecto pasivo/medio sugiere una acción que se iba estableciendo; 'se organizaba' comunica bien el sentido de un festejo arreglado o dispuesto.
- source_word: τοῖς ἔθνεσιν
  english_pob_choice: among the nations
  chosen_spanish: entre las naciones
  alternatives_spanish:
  - entre los gentiles
  - entre los pueblos
  lexicon: LSJ
  rationale: Aquí la expresión puede leerse como 'naciones' en sentido amplio, y esa opción sigue la revisión inglesa más reciente. En un contexto judío también puede aludir a los no judíos, pero 'entre las naciones' resulta más neutral y auditable en español.
- source_word: εὐωχία
  english_pob_choice: celebration
  chosen_spanish: banquete
  alternatives_spanish:
  - festín
  - celebración
  - banquete festivo
  lexicon: LSJ
  rationale: El término apunta a un festejo con comida abundante. 'Banquete' conserva ese núcleo concreto mejor que 'celebración', que en español sería demasiado general; el adjetivo 'público' ya marca el carácter social.
- source_word: ἀλαλαγμῶν
  english_pob_choice: shouting
  chosen_spanish: gritos
  alternatives_spanish:
  - clamores
  - vítores
  lexicon: LSJ
  rationale: Denota exclamaciones fuertes y ruidosas. 'Gritos' preserva la intensidad sin decidir si son de júbilo o de agitación.
- source_word: χαρᾶς
  english_pob_choice: joy
  chosen_spanish: alegría
  alternatives_spanish:
  - gozo
  - regocijo
  lexicon: LSJ
  rationale: '''Alegría'' es la forma más natural y clara en español moderno; mantiene el tono festivo del pasaje.'
- source_word: προκατεσκιρωμένης
  english_pob_choice: long before dancing in their minds
  chosen_spanish: que desde mucho antes saltaba en su mente
  alternatives_spanish:
  - que desde mucho antes brincaba en su mente
  - que ya venía agitándose en su mente
  - que desde antes se agitaba
  lexicon: LSJ
  rationale: La forma es difícil y figurada; el griego conserva una imagen de movimiento previo e interior. 'Saltaba en su mente' intenta reproducir la vivacidad sin perder el carácter incómodo de la expresión.
- source_word: διάνοιαν
  english_pob_choice: minds
  chosen_spanish: mente
  alternatives_spanish:
  - mente
  - pensamiento
  - entendimiento
  lexicon: LSJ
  rationale: Se refiere al ámbito interior del pensamiento o disposición; singular colectivo en español funciona bien con el participio figurado.
- source_word: ἐκφαινομένης
  english_pob_choice: being openly displayed
  chosen_spanish: se manifestara abiertamente
  alternatives_spanish:
  - se mostrara abiertamente
  - se hiciera visible
  - se diera a conocer
  lexicon: LSJ
  rationale: El participio expresa salida a la luz de algo interno. 'Se manifestara abiertamente' recoge la exposición pública y el contraste con lo previo.
- source_word: παρρησίας
  english_pob_choice: boldness
  chosen_spanish: audacia
  alternatives_spanish:
  - franqueza
  - osadía
  - libertad
  lexicon: LSJ
  rationale: Aquí la 'parresía' no es mera franqueza neutral, sino una exposición abierta y decidida de hostilidad; 'audacia' transmite mejor ese énfasis.
- source_word: ἀπεχθείας
  english_pob_choice: hatred
  chosen_spanish: odio
  alternatives_spanish:
  - hostilidad
  - enemistad
  lexicon: LSJ
  rationale: El sustantivo indica aversión u odio contra alguien. 'Odio' conserva la fuerza emocional del pasaje y la oposición abierta hacia ellos.
theological_decisions:
- issue: Sentido de τοῖς ἔθνεσιν en un relato judío griego
  english_pob_reading: among the nations
  chosen_spanish_reading: entre las naciones
  alternative_spanish_readings:
  - entre los gentiles
  - entre los pueblos
  rationale: La revisión inglesa más reciente prefirió 'nations' por neutralidad y consistencia. En español, 'entre las naciones' conserva esa neutralidad y evita introducir de forma no necesaria el término eclesial 'gentiles', aunque el trasfondo narrativo puede implicarlo.
  doctrine_reference: 'Translation philosophy: original-language primacy; consistency of key terms, or documented exception.'
- issue: Imagen difícil de la hostilidad 'preexistente' en la mente
  english_pob_reading: the hatred long before dancing in their minds
  chosen_spanish_reading: el odio que desde mucho antes saltaba en su mente
  alternative_spanish_readings:
  - el odio que desde mucho antes se agitaba en su mente
  - el odio que desde mucho antes brincaba en su mente
  rationale: La construcción griega es vívida y no completamente transparente. Se conserva la idea de un odio ya activo interiormente, sin suavizarla a una simple abstracción; así se mantiene la tensión lexical y la fuerza imagética del original.
  doctrine_reference: 'Translation philosophy: original-language primacy; preserve documented lexical tension.'
translation_notes:
  revision_awareness: La base inglesa pasó de 'among the Gentiles' a 'among the nations' para mayor neutralidad, y mantuvo la imagen difícil con 'dancing in their minds'. La versión española sigue esa revisión reciente en 'entre las naciones', pero conserva la tensión figurada del participio con una formulación igualmente viva, sin normalizarla por completo.
  spanish_consistency_notes:
  - Se mantiene 'decreto' para πρόσταγμα, en coherencia con un mandato real formal.
  - '''Banquete público'' preserva el rasgo cívico de δημοτελής y el componente festivo de εὐωχία.'
  - Se evita 'Cristo', 'Señor' o vocabulario eclesial no presente en el texto.
  - '''Odio'' se usa para ἀπεχθείας, manteniendo la fuerza negativa sin atenuación.'
