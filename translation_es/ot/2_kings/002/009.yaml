translation:
  language: es
  text: 'Cuando habían cruzado, Elías le dijo a Eliseo: «Pide lo que debo hacer por ti antes de que yo sea tomado de ti». Y Eliseo respondió: «Te ruego que haya para mí una doble porción[a] de tu espíritu[b]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «que dos porciones de tu espíritu vengan a mí». El modismo hebreo significa «una doble porción», probablemente con eco de la porción de herencia del primogénito.'
    reason: lexical_alternative
  - marker: b
    text: «Tu espíritu» se refiere al espíritu asociado con el ministerio profético de Elías; algunos entienden esto como una petición de dos veces su poder profético.
    reason: alternative_reading
lexical_decisions:
- source_word: כְ/עָבְרָ֗/ם
  english_pob_choice: when they had crossed over
  chosen_spanish: cuando habían cruzado
  alternatives_spanish:
  - cuando cruzaron
  - mientras cruzaban
  lexicon: HALOT
  rationale: El hebreo marca una acción ya completada antes del diálogo. «Habían cruzado» conserva el orden temporal y suena natural en español sin perder la relación conjunta de Elías y Eliseo.
- source_word: שְׁאַל֙
  english_pob_choice: Ask
  chosen_spanish: Pide
  alternatives_spanish:
  - Pregunta
  - Solicita
  lexicon: HALOT
  rationale: En este contexto la orden no pide información sino que invita a formular una petición. «Pide» expresa mejor el sentido pragmático del mandato que «pregunta».
- source_word: מָ֣ה אֶֽעֱשֶׂה לָּ֔/ךְ
  english_pob_choice: what I should do for you
  chosen_spanish: lo que debo hacer por ti
  alternatives_spanish:
  - lo que haré por ti
  - lo que pueda hacer por ti
  lexicon: HALOT
  rationale: La fórmula hebrea funciona como ofrecimiento de conceder una solicitud. «Lo que debo hacer por ti» mantiene el tono deliberativo y relacional sin volverlo más fuerte de lo que dice el texto.
- source_word: בְּ/טֶ֖רֶם אֶלָּקַ֣ח מֵ/עִמָּ֑/ךְ
  english_pob_choice: before I am taken from you
  chosen_spanish: antes de que yo sea tomado de junto a ti
  alternatives_spanish:
  - antes de que me lleven de ti
  - antes de que sea quitado de tu lado
  lexicon: HALOT
  rationale: 'El nifal de לקח es pasivo: Elías es el que será tomado. «De junto a ti» preserva la separación relacional de מֵעִמָּךְ mejor que una paráfrasis como «de tu lado», aunque ésta sería posible.'
- source_word: וִֽ/יהִי נָ֛א
  english_pob_choice: Please, let ... be
  chosen_spanish: Te ruego
  alternatives_spanish:
  - Por favor
  - Si quieres
  lexicon: HALOT
  rationale: En español, la petición de Eliseo queda más natural y reverente si se abre con una fórmula de súplica. «Te ruego» recoge el valor de cortesía y urgencia de נָא; el deseo implícito continúa en la oración principal.
- source_word: פִּֽי שְׁנַ֥יִם
  english_pob_choice: a double portion
  chosen_spanish: una doble porción
  alternatives_spanish:
  - una porción doble
  - dos porciones
  lexicon: HALOT
  rationale: La expresión es un modismo de herencia/provisión, no una cantidad literal de «dos bocas». «Una doble porción» conserva el idioma bíblico y la fuerza inherente de la frase.
- source_word: בְּ/רוּחֲ/ךָ֖
  english_pob_choice: your spirit
  chosen_spanish: tu espíritu
  alternatives_spanish:
  - tu Espíritu
  - tu aliento/espíritu
  lexicon: HALOT
  rationale: רוּחַ aquí se refiere al espíritu asociado con Elías y su ministerio profético. Se mantiene en minúscula para no imponer una lectura técnica de «Espíritu Santo» que el hebreo, por sí solo, no exige.
- source_word: אֵלָֽ/י
  english_pob_choice: be upon me
  chosen_spanish: sobre mí
  alternatives_spanish:
  - en mí
  - venga a mí
  lexicon: HALOT
  rationale: El hebreo final expresa dirección hacia Eliseo; en español, «sobre mí» conserva la idea de una investidura o reposo del espíritu sin añadir un verbo no presente en el original.
theological_decisions:
- issue: Sentido de פִּי שְׁנַיִם
  english_pob_reading: Elisha asks for a double portion/share of Elijah's spirit, likely echoing firstborn-inheritance language rather than asking to be twice as powerful as Elijah in an absolute sense.
  chosen_spanish_reading: Eliseo pide una doble porción del espíritu de Elías, conservando la resonancia de herencia y sin convertirla en una afirmación explícita de «doble poder».
  alternative_spanish_readings:
  - Eliseo pide dos veces más poder espiritual que Elías.
  - Eliseo pide una porción literal de dos partes.
  rationale: El modismo hebreo se entiende con mayor naturalidad como «doble porción». La traducción evita resolver la tensión hacia una lectura cuantitativa de poder y deja que el contexto determine el alcance exacto.
  doctrine_reference: Preservar la tensión textual sin armonizarla artificialmente.
- issue: Referente de «tu espíritu»
  english_pob_reading: Elijah's spirit/prophetic endowment is in view, not a direct technical reference to the Holy Spirit as such.
  chosen_spanish_reading: «Tu espíritu» se entiende como el espíritu/impulso profético ligado a Elías, no como una designación técnica explícita del Espíritu Santo.
  alternative_spanish_readings:
  - El Espíritu Santo en sentido directo y técnico.
  - El carisma profético de Elías como mera cualidad humana.
  rationale: La forma posesiva apunta a algo propio de Elías. Mantener «espíritu» sin mayúscula evita importar una precisión doctrinal que el hebreo no formula, pero tampoco reduce indebidamente el alcance espiritual del pasaje.
  doctrine_reference: No imponer una lectura trinitaria o pneumatológica más específica que el texto.
translation_notes:
  revision_awareness: 'Coincide con el pasaje hebreo y con el audit trail inglés: se conserva el orden temporal, el ofrecimiento de Elías, el modismo de «doble porción» y la referencia a «tu espíritu» sin sobreinterpretación doctrinal. No se detectaron revisiones previas aplicadas en el expediente base.'
  spanish_consistency_notes:
  - Se usa «Elías» y «Eliseo» de forma consistente para los nombres propios.
  - Se mantiene «espíritu» en minúscula por coherencia con la decisión lexical auditada.
  - Se eligió una fórmula española natural para la petición de Eliseo, manteniendo el contenido semántico del jussivo hebreo.
  - La nota sobre la acción de cruzar preserva la ambigüedad temporal menor sin contradecir el texto.
