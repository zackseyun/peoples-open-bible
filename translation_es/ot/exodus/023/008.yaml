translation:
  language: es
  text: Y no aceptarás soborno, porque el soborno ciega a los de ojos claros[a] y pervierte las palabras[b] de los justos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O "los perspicaces". El hebreo conserva la imagen de la vista mientras también implica buen juicio o discernimiento.
    reason: lexical_alternative
  - marker: b
    text: '"Las palabras de los justos" también puede entenderse en sentido jurídico como "las declaraciones" o "el caso" de quienes están en lo correcto.'
    reason: lexical_alternative
lexical_decisions:
- source_word: שֹׁחַד
  english_pob_choice: bribe
  chosen_spanish: soborno
  alternatives_spanish:
  - cohecho
  - mordida
  - regalo
  lexicon: HALOT
  rationale: En español jurídico y moral, "soborno" es el equivalente más claro y natural para una entrega corruptora destinada a influir un juicio. "Cohecho" sería más técnico; "mordida" es regional y coloquial; "regalo" sería demasiado neutral y borraría la fuerza corruptora del término.
- source_word: לֹא תִקָּח
  english_pob_choice: you shall not take
  chosen_spanish: no aceptarás
  alternatives_spanish:
  - no tomarás
  - no recibirás
  lexicon: HALOT
  rationale: Aunque el verbo hebreo es literalmente "tomar", en español la prohibición se entiende con más precisión como "aceptar" un soborno. Esto conserva el valor legal de la norma sin volverla extraña en castellano, y mantiene el sentido de recibir una paga corrupta.
- source_word: יְעַוֵּר
  english_pob_choice: blinds
  chosen_spanish: ciega
  alternatives_spanish:
  - hace ciego
  - cegará
  lexicon: HALOT
  rationale: '"Ciega" conserva la imagen física del hebreo y su fuerza metafórica sobre el juicio corrupto. Es una forma breve y idiomática en español, equivalente al efecto causativo del verbo.'
- source_word: פִּקְחִים
  english_pob_choice: the clear-sighted
  chosen_spanish: los de vista clara
  alternatives_spanish:
  - los perspicaces
  - los discernidores
  - los abiertos de ojos
  lexicon: HALOT
  rationale: El hebreo mantiene la metáfora de la vista. "Los de vista clara" preserva esa imagen mejor que una traducción puramente interpretativa como "los perspicaces". Aunque suena un poco marcado, sigue siendo transparente y auditable. El término admite también la idea de personas con buen juicio.
- source_word: וִיסַלֵּף
  english_pob_choice: twists
  chosen_spanish: pervierte
  alternatives_spanish:
  - retuerce
  - distorsiona
  - falsea
  lexicon: HALOT
  rationale: '"Pervierte" recoge bien la idea de torcer o desviar el contenido de las palabras en un contexto judicial. Es más fuerte que "distorsiona" y más fiel al alcance moral del verbo en este marco legal.'
- source_word: דִּבְרֵי
  english_pob_choice: the words of
  chosen_spanish: las palabras de
  alternatives_spanish:
  - las declaraciones de
  - los asuntos de
  - el caso de
  lexicon: HALOT
  rationale: El sustantivo hebreo puede abarcar palabras, declaraciones o asunto legal. "Las palabras de" conserva la transparencia textual del hebreo y permite que el contexto judicial sugiera la lectura forense sin sobreespecificarla.
- source_word: צַדִּיקִים
  english_pob_choice: the righteous
  chosen_spanish: los justos
  alternatives_spanish:
  - los rectos
  - los inocentes
  - los que están en lo correcto
  lexicon: HALOT
  rationale: '"Los justos" es el equivalente español más estable para צַדִּיקִים y preserva tanto la dimensión moral como la posible resonancia judicial de quienes están en lo correcto en una disputa.'
theological_decisions:
- issue: Alcance judicial de "las palabras de los justos"
  english_pob_reading: May also be understood in a legal sense as 'the statements' or 'the case' of those who are in the right.
  chosen_spanish_reading: Puede entenderse también en sentido jurídico como "las declaraciones" o "el caso" de quienes están en lo correcto.
  alternative_spanish_readings:
  - '"las declaraciones"'
  - '"el caso"'
  - '"la causa"'
  rationale: 'El hebreo דִּבְרֵי צַדִּיקִים permite una lectura amplia: palabras, declaraciones o asunto legal. En español conviene preservar esa amplitud con una nota, sin cerrar el texto a una sola interpretación. "La causa" es posible, pero introduce un matiz más técnico que el texto base no exige.'
  doctrine_reference: Exodus 23:8; legal wisdom and judicial impartiality in covenant law
- issue: Metáfora de la vista en פִּקְחִים
  english_pob_reading: '''the clear-sighted'' with the imagery of sight while implying sound judgment.'
  chosen_spanish_reading: '"los de vista clara" conserva la imagen de la vista y sugiere buen juicio.'
  alternative_spanish_readings:
  - '"los perspicaces"'
  - '"los discernidores"'
  rationale: La metáfora visual es parte del diseño del verso. Se preserva en español para no perder la tensión entre visión física y juicio recto. Una versión puramente interpretativa debilitaría la imagen hebrea.
  doctrine_reference: Exodus 23:8; metaphor of sight and discernment in biblical legal language
translation_notes:
  revision_awareness: La revisión inglesa más reciente no introdujo cambios; se mantuvo la lectura aprobada de Exodo 23:8 con acuerdo alto. La versión española sigue de cerca esa decisión auditada, preservando la metáfora visual de פִּקְחִים y el posible alcance judicial de דִּבְרֵי צַדִּיקִים.
  spanish_consistency_notes:
  - Se usa "Yahvé" cuando el texto hebreo contiene el nombre divino; este versículo no lo contiene.
  - Se mantiene un registro legal y sobrio acorde con la instrucción del pacto.
  - '"Justos" traduce צַדִּיקִים de forma consistente con el uso POB para preservar la amplitud moral y jurídica.'
