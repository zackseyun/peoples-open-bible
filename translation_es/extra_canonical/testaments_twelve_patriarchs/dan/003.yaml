base_translation:
  language: en
  yaml_path: translation/extra_canonical/testaments_twelve_patriarchs/dan/003.yaml
  text: 'If you lose truth and patience[a], you will perish.


    2 Anger is blindness, for it does not allow one to see anyone’s face truly. 3 Even if it is a father or a mother, it regards them as enemies. If it is a brother, it does not know him. If it is a prophet of the Lord, it disobeys him; if a righteous man, it does not see him; if a friend, it does not recognize him. 4 For the spirit of anger wraps him in the net of deceit and blinds his eyes, and through falsehood it darkens his mind and gives him his own vision. 5 And with what does it veil his eyes? With hatred in his heart against his brother, leading to envy.


    6 For anger is evil, my children, because it throws even the soul itself into turmoil. 7 And it gives strength to the body, so that it may commit every lawless deed. 8 And when the body has done all these things, the soul justifies what has been done, because it does not see rightly. 9 Therefore the one who is angry, if he is physically strong, has his soul’s power for anger threefold: one from the help of attendants, by which he justifies the deed; a second through wealth, persuading and overpowering unjustly[b]; and a third, because he has natural strength, by it he does evil. 10 But if the one who is angry is weak, he has the passion of wrath in him twofold[d][c], for anger always helps him in lawlessness.'
  footnotes:
  - marker: a
    text: Or 'longsuffering' for 'patience' (μακροθυμία).
    reason: lexical_alternative
  - marker: b
    text: '''See anyone’s face in truth'' is a literal image for perceiving a person rightly.'
    reason: lexical_alternative
  - marker: c
    text: The phrase 'gives him his own vision' suggests that anger replaces reality with a self-generated, distorted perception.
    reason: lexical_alternative
  - marker: d
    text: The Greek distinguishes θυμός ('anger') and ὀργή ('wrath') in the latter part of the chapter; the English preserves some of that variation.
    reason: lexical_alternative
