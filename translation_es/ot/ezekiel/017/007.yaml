source:
  edition: WLC
  text: וַ/יְהִ֤י נֶֽשֶׁר אֶחָד֙ גָּד֔וֹל גְּד֥וֹל כְּנָפַ֖יִם וְ/רַב נוֹצָ֑ה וְ/הִנֵּה֩ הַ/גֶּ֨פֶן הַ/זֹּ֜את כָּֽפְנָ֧ה שָׁרֳשֶׁ֣י/הָ עָלָ֗י/ו וְ/דָֽלִיּוֹתָי/ו֙ שִׁלְחָה לּ֔/וֹ לְ/הַשְׁק֣וֹת אוֹתָ֔/הּ מֵ/עֲרֻג֖וֹת מַטָּעָֽ/הּ־־־׃
base_translation:
  language: en
  yaml_path: translation/ot/ezekiel/017/007.yaml
  text: And there was another great eagle with great wings and much plumage[a]; and behold, this vine bent its roots toward him and sent out its branches to him[d][c][b], that he might water it from the beds where it was planted.
  footnotes:
  - marker: a
    text: Or 'vulture' for נֶשֶׁר; the Hebrew term can denote a large bird of prey more generally, though 'eagle' best fits the imagery here.
    reason: lexical_alternative
  - marker: b
    text: Or 'turned its roots toward him and stretched out its shoots to him.'
    reason: lexical_alternative
  - marker: c
    text: The final phrase may also be rendered 'from the beds of its planting' or 'from the garden plots where it was planted.'
    reason: lexical_alternative
  - marker: d
    text: Or 'so that he might water it from the beds where it was planted.'.
    reason: previous_rendering
