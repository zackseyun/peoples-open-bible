translation:
  language: es
  text: Se enviaron cartas por mano de los mensajeros[a] a todas las provincias del rey, para destruir, matar y aniquilar[b] a todos los judíos, desde jóvenes hasta ancianos[c], niños y mujeres, en un solo día, el día trece del mes duodécimo, es decir, el mes de Adar, y para saquear sus bienes[d].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘por los correos’; literalmente, ‘por la mano de los corredores’. El hebreo se refiere a mensajeros reales que corrían con los despachos.
    reason: lexical_alternative
  - marker: b
    text: Los tres verbos ‘destruir’, ‘matar’ y ‘aniquilar’ forman una intensificación deliberada en el decreto hebreo.
    reason: lexical_alternative
  - marker: c
    text: O ‘de joven a anciano’. El hebreo es literalmente ‘de joven a anciano’, usado distributivamente para abarcar a toda la población.
    reason: lexical_alternative
  - marker: d
    text: O ‘tomar sus bienes como botín’. El hebreo expresa la idea de saquearlos como despojo.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְנִשְׁלֹחוַ / וְנִשְׁל֨וֹחַ
  english_pob_choice: Letters were sent
  chosen_spanish: Se enviaron cartas
  alternatives_spanish:
  - Y se enviaron cartas
  - Fueron enviadas cartas
  lexicon: HALOT
  rationale: La construcción hebrea introduce el decreto en forma impersonal/pasiva; en español natural, ‘Se enviaron cartas’ comunica bien la acción sin añadir un sujeto innecesario.
- source_word: סְפָרִים
  english_pob_choice: Letters
  chosen_spanish: cartas
  alternatives_spanish:
  - escritos
  - documentos
  - misivas
  lexicon: HALOT
  rationale: En el contexto administrativo persa, ‘cartas’ es claro y formal sin sobreespecificar el tipo de escrito.
- source_word: בְּיַד הָרָצִים
  english_pob_choice: by the hand of the couriers
  chosen_spanish: por medio de los corredores
  alternatives_spanish:
  - por mano de los corredores
  - por medio de los mensajeros
  - por los corredores
  lexicon: HALOT
  rationale: Conserva el sentido idiomático de mediación (‘por la mano de’) y traduce הָרָצִים como ‘corredores’, reflejando el valor literal de ‘the runners’ en un registro comprensible en español.
- source_word: אֶל כָּל מְדִינוֹת הַמֶּלֶךְ
  english_pob_choice: to all the provinces of the king
  chosen_spanish: a todas las provincias del rey
  alternatives_spanish:
  - a todas las provincias del rey
  - a todas las provincias del monarca
  lexicon: HALOT
  rationale: Respeta el orden y la referencia política del hebreo; ‘del rey’ es más directo y fiel que una paráfrasis.
- source_word: לְהַשְׁמִיד לַהֲרֹג וּלְאַבֵּד
  english_pob_choice: to destroy, to kill, and to annihilate
  chosen_spanish: para destruir, matar y aniquilar
  alternatives_spanish:
  - para destruir, matar y exterminar
  - para borrar, matar y destruir
  lexicon: HALOT
  rationale: La tríada hebrea es una intensificación deliberada de violencia total; ‘destruir, matar y aniquilar’ preserva esa acumulación sin suavizarla.
- source_word: אֶת כָּל הַיְּהוּדִים
  english_pob_choice: all the Jews
  chosen_spanish: a todos los judíos
  alternatives_spanish:
  - a todo el pueblo judío
  - a todos los judíos
  lexicon: HALOT
  rationale: Mantiene el referente étnico directo del texto hebreo y la fuerza totalizadora de כָּל.
- source_word: מִנַּעַר וְעַד זָקֵן
  english_pob_choice: from young to old
  chosen_spanish: desde jóvenes hasta ancianos
  alternatives_spanish:
  - de joven a anciano
  - desde jóvenes hasta viejos
  - desde joven hasta anciano
  lexicon: HALOT
  rationale: El hebreo usa singular distributivo con valor de totalidad por edades; en español, el plural idiomático ‘jóvenes… ancianos’ comunica esa cobertura general sin perder el alcance de edad.
- source_word: טַף וְנָשִׁים
  english_pob_choice: children and women
  chosen_spanish: niños y mujeres
  alternatives_spanish:
  - niños y mujeres
  - pequeños y mujeres
  - niños, incluidas las mujeres
  lexicon: HALOT
  rationale: ‘טַף’ suele referirse a los pequeños/dependientes; ‘niños’ es la opción más natural y clara para el español actual, manteniendo el carácter no combatiente de la lista.
- source_word: בְּיוֹם אֶחָד
  english_pob_choice: in one day
  chosen_spanish: en un solo día
  alternatives_spanish:
  - en un día
  - en el mismo día
  lexicon: HALOT
  rationale: La equivalencia es directa; ‘un solo día’ conserva la concentración temporal del decreto.
- source_word: בִּשְׁלוֹשָׁה עָשָׂר לְחֹדֶשׁ שְׁנֵים עָשָׂר
  english_pob_choice: on the thirteenth day of the twelfth month
  chosen_spanish: el trece del duodécimo mes
  alternatives_spanish:
  - el día trece del duodécimo mes
  - el trece del mes duodécimo
  lexicon: HALOT
  rationale: En español bíblico moderno, la fecha puede expresarse de forma natural sin repetir ‘día’; el sentido calendárico se mantiene con claridad.
- source_word: הוּא חֹדֶשׁ אֲדָר
  english_pob_choice: that is, the month Adar
  chosen_spanish: es decir, el mes de Adar
  alternatives_spanish:
  - es decir, el mes Adar
  - que es el mes de Adar
  lexicon: HALOT
  rationale: La frase apposicional aclara el nombre del mes; ‘es decir’ conserva bien la función explicativa del hebreo.
- source_word: וּשְׁלָלָם לָבוֹז
  english_pob_choice: and to plunder their possessions
  chosen_spanish: y para apoderarse de sus bienes
  alternatives_spanish:
  - y para saquear sus bienes
  - y para tomar sus posesiones como botín
  - y para robar sus pertenencias
  lexicon: HALOT
  rationale: El hebreo combina sustantivo y verbo para expresar saqueo autorizado. ‘Apoderarse de sus bienes’ comunica el sentido de despojo de manera natural en español, sin perder la idea de botín.
theological_decisions:
- issue: Triple intensificación de violencia en el decreto
  english_pob_reading: The three verbs 'destroy,' 'kill,' and 'annihilate' are a deliberate intensification in the Hebrew decree.
  chosen_spanish_reading: La tríada ‘destruir, matar y aniquilar’ se mantiene como intensificación deliberada, sin suavizar el alcance del edicto.
  alternative_spanish_readings:
  - destruir, matar y exterminar
  - borrar, matar y destruir
  rationale: El texto presenta una escalada retórica de violencia total; conviene conservarla para no reducir su fuerza ni armonizarla artificialmente.
  doctrine_reference: Fidelidad al sentido textual; lenguaje narrativo del juicio/violencia en la Escritura sin mitigación interpretativa
- issue: Alcance inclusivo de ‘desde jóvenes hasta ancianos’
  english_pob_reading: Or 'from young to old.' The Hebrew is literally 'from young man to old man,' used distributively for the whole population.
  chosen_spanish_reading: Se traduce de manera inclusiva por edad, sin restringirlo a varones.
  alternative_spanish_readings:
  - de joven a anciano
  - desde jóvenes hasta viejos
  rationale: El hebreo funciona distributivamente para toda la población; el español debe reflejar ese alcance general sin introducir un sesgo masculino innecesario.
  doctrine_reference: Precisión semántica del hebreo; principio de totalidad distributiva
translation_notes:
  revision_awareness: El inglés POB fue revisado para preferir ‘from young to old’ sobre ‘from young man to old man’ y ‘their possessions’ sobre ‘their spoil’. En español se siguió esa revisión con una formulación natural (‘desde jóvenes hasta ancianos’, ‘sus bienes’) sin perder el trasfondo distributivo ni la idea de botín.
  spanish_consistency_notes:
  - Se prefirió ‘judíos’ para הַיְּהוּדִים, coherente con el referente étnico del texto.
  - ‘Corredores’ conserva el matiz literal de הָרָצִים; ‘mensajeros’ quedó como alternativa menos literal.
  - La fecha se normalizó a una forma natural en español (‘el trece del duodécimo mes’) manteniendo la equivalencia calendárica.
  - ‘Adar’ se dejó sin transliteración adicional porque es ya una forma estable en español bíblico.
  - 'Se evitó ‘SEÑOR’ o ‘rey’ con mayúscula teológica: el texto trata del rey persa, no del nombre divino.'
