    rationale: Aunque es fiel, en español suena más natural 'de los hombres, las mujeres y los que podían entender' o 'de los hombres y las mujeres y de los que podían entender'. La revisión puede mejorar fluidez sin perder la triple distinción del hebreo.
  - severity: low
