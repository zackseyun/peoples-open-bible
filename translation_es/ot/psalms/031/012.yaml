translation:
  language: es
  text: A causa de todos mis enemigos me he convertido en un reproche[a], especialmente para mis vecinos, y en un terror para mis conocidos; los que me ven en la calle[b] huyen de mí[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O «De todos mis enemigos me he convertido en un reproche»; algunos entienden la frase inicial en sentido comparativo: «más que todos mis enemigos».'
    reason: alternative_reading
  - marker: b
    text: Literalmente «afuera». La expresión se refiere a ser visto en público.
    reason: cultural_note
  - marker: c
    text: También puede significar «se apartan de mí» o «se alejan de mí».
    reason: lexical_alternative
lexical_decisions:
- source_word: מִכָּל צֹרְרַי
  english_pob_choice: Because of all my enemies
  chosen_spanish: Porque de todos mis enemigos
  alternatives_spanish:
  - Desde todos mis enemigos
  - Más que todos mis enemigos
  lexicon: HALOT
  rationale: El מן con כָּל y el sustantivo siguiente puede entenderse como causa, fuente o comparación. En español, «Porque de todos mis enemigos» comunica de forma natural la causa o el trasfondo de la vergüenza, sin forzar una construcción literal poco idiomática. Mantiene abierta la alternativa comparativa sin imponerla en el texto principal.
- source_word: הָיִיתִי חֶרְפָּה
  english_pob_choice: I have become a reproach
  chosen_spanish: he llegado a ser un reproche
  alternatives_spanish:
  - soy un reproche
  - llegué a ser un reproche
  lexicon: HALOT
  rationale: El qatal con היה más un sustantivo expresa un estado resultante. «He llegado a ser» conserva el valor de proceso con efecto presente. «Reproche» preserva el sentido relacional de objeto de burla, vergüenza o desprecio.
- source_word: וְלִשֲׁכֵנַי מְאֹד
  english_pob_choice: especially to my neighbors
  chosen_spanish: especialmente para mis vecinos
  alternatives_spanish:
  - y mucho para mis vecinos
  - y en gran manera para mis vecinos
  lexicon: HALOT
  rationale: מְאֹד funciona como intensificador. La idea es que la deshonra recae de forma particular sobre quienes están más cerca, por eso «especialmente» expresa bien la intensificación social en español natural.
- source_word: וּפַחַד לִמְיֻדָּעָי
  english_pob_choice: and a terror to my acquaintances
  chosen_spanish: y un terror para mis conocidos
  alternatives_spanish:
  - y un pavor para quienes me conocen
  - y un objeto de temor para mis conocidos
  lexicon: HALOT
  rationale: פַּחַד denota miedo, terror o pavor. En posición predicativa, el sentido es que él se ha vuelto motivo de temor para otros. «Conocidos» conserva el matiz de gente familiar o asociada, sin exigir intimidad amistosa.
- source_word: רֹאַי בַּחוּץ
  english_pob_choice: those who see me in the street
  chosen_spanish: los que me ven en la calle
  alternatives_spanish:
  - los que me ven afuera
  - los que me ven al aire libre
  lexicon: HALOT
  rationale: בַּחוּץ literalmente significa «afuera», pero aquí apunta al espacio público. «En la calle» transmite de manera clara y natural el ámbito público donde otros lo reconocen y se apartan de él.
- source_word: נָדְד֥וּ מִמֶּנִּי
  english_pob_choice: flee from me
  chosen_spanish: huyen de mí
  alternatives_spanish:
  - se apartan de mí
  - se alejan de mí
  lexicon: HALOT
  rationale: נָדַד puede significar huir, vagar o apartarse. En este contexto de evitación social inmediata, «huyen de mí» conserva la fuerza del movimiento de rechazo que el inglés POB también quiso expresar.
translation_notes:
  revision_awareness: 'Coincide con la última revisión del audit trail: no se registraron cambios y el análisis cruzado mostró alto acuerdo. La redacción española sigue de cerca la solución semántica aprobada en inglés, manteniendo la ambigüedad inicial de מִכָּל y la imagen social pública de la segunda mitad del versículo.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» no requerido en este versículo.
  - Se usa «reproche» para חֶרְפָּה, en continuidad con el criterio POB de conservar el valor relacional de deshonra.
  - Se prefiere «vecinos» y «conocidos» por su naturalidad en español y por reflejar proximidad social, no necesariamente parentesco.
  - «En la calle» traduce el valor contextual de בַּחוּץ como espacio público.
  - No se añade puntuación interpretativa que cierre la ambigüedad de la frase inicial.
