    issue: '''se edificaron para sí'' es español poco natural y potencialmente equívoco'
    rationale: Aunque intenta reflejar el valor reflexivo de לָהֶם, en español 'se edificaron' normalmente significa que ellos mismos fueron edificados o se edificaron a sí mismos. El hebreo expresa que construyeron estos sitios/objetos para su propio uso, no que se construyeron a sí mismos.
  - severity: low
    issue: '''sobre toda colina alta'' suena menos idiomático que ''en toda colina alta'''
    rationale: La idea topográfica se preserva, pero en español bíblico-natural 'en toda colina alta' resulta más fluido para ubicar santuarios y objetos cultuales.
