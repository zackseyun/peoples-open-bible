    issue: El inicio 'No me miren' debilita el matiz de mirada insistente o escrutadora.
    rationale: El hebreo literal es 'no me miren', pero el POB inglés documentó correctamente que el contexto pide una mirada socialmente marcada ('stare'). En español, 'No se queden mirándome' preserva mejor ese matiz sin caer en paráfrasis excesiva.
  - severity: low
    issue: La correspondencia léxica entre נֹטֵרָה y לֹא נָטָרְתִּי queda parcialmente rota con 'cuidar' / 'he guardado'.
    rationale: El POB inglés intentó mantener la conexión 'keeper/kept'. En español no es necesario calcarla con 'guardar' en ambos lugares, pero sí conviene una opción coherente. 'Me pusieron a cuidar las viñas... mi propia viña no la he cuidado' conserva la resonancia y suena más natural.
