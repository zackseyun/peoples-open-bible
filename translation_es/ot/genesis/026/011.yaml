translation:
  language: es
  text: 'Entonces Abimelec mandó a todo el pueblo[a], diciendo: «El que toque a este hombre o a su esposa ciertamente será condenado a muerte».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, más literalmente, «el que toque a este hombre o a su esposa».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְצַו
  english_pob_choice: commanded
  chosen_spanish: mandó
  alternatives_spanish:
  - ordenó
  - comandó
  lexicon: HALOT
  rationale: El piel de צוה expresa una orden con autoridad. En español, «mandó» comunica bien la fuerza imperativa sin sonar tan técnico como «ordenó» ni tan marcial como «comandó».
- source_word: כָּל הָעָם
  english_pob_choice: all the people
  chosen_spanish: todo el pueblo
  alternatives_spanish:
  - toda la gente
  - todo el pueblo del lugar
  lexicon: HALOT
  rationale: «Pueblo» conserva el valor colectivo de עם en un contexto de autoridad pública. «Todo el pueblo» es natural y mantiene el alcance general del mandato.
- source_word: לֵאמֹר
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - y dijo
  - 'así:'
  - diciendo así
  lexicon: HALOT
  rationale: La forma introduc­to­ria de discurso se rinde de modo directo y natural con «diciendo».
- source_word: הַנֹּגֵעַ
  english_pob_choice: whoever touches
  chosen_spanish: El que toque
  alternatives_spanish:
  - quien toque
  - el que toca
  - quienquiera que toque
  lexicon: HALOT
  rationale: El participio con artículo funciona genéricamente. «El que toque» conserva el valor general y evita una paráfrasis más explicativa que el hebreo.
- source_word: בָּאִישׁ הַזֶּה
  english_pob_choice: this man
  chosen_spanish: a este hombre
  alternatives_spanish:
  - a este varón
  - a este hombre aquí
  lexicon: HALOT
  rationale: En español se requiere repetir la preposición con «toque». «Este hombre» reproduce el referente sin añadir interpretación.
- source_word: וּבְאִשְׁתּוֹ
  english_pob_choice: or his wife
  chosen_spanish: o a su esposa
  alternatives_spanish:
  - o a su mujer
  - o a su cónyuge
  lexicon: HALOT
  rationale: «Esposa» es el sentido contextual preciso de אשה con sufijo posesivo. Se mantiene la coordinación inclusiva del hebreo con «o» en la cláusula de amenaza.
- source_word: מוֹת יוּמָת
  english_pob_choice: shall surely be put to death
  chosen_spanish: ciertamente morirá
  alternatives_spanish:
  - será muerto
  - será ejecutado sin falta
  - sin duda morirá
  lexicon: HALOT
  rationale: El infinitivo absoluto más imperfecto intensifica la certeza de la pena. En español, «ciertamente morirá» reproduce esa certeza de manera sobria; aunque el hebreo es una fórmula judicial de muerte, la pasiva explícita no es obligatoria en español si el contexto ya la implica.
translation_notes:
  revision_awareness: El texto inglés más reciente se mantuvo sin cambios en la revisión indicada; la presente propuesta sigue esa lectura estable y conserva la advertencia lexical sobre la forma genérica de הַנֹּגֵעַ.
  spanish_consistency_notes:
  - Se evita «SEÑOR» o terminología no presente en este versículo.
  - «Mandó» mantiene el tono de autoridad del verbo hebreo sin sobrecargar el registro.
  - Se conserva la ambigüedad genérica de הַנֹּגֵעַ con una nota alternativa, en paralelo al aparato inglés.
  - «Esposa» se usa por el contexto inmediato; no se neutraliza a «mujer» para no perder precisión relacional.
