translation:
  language: es
  text: 'Porque dijeron: «Un hombre, un sacerdote de la descendencia de Aarón, ha venido con las fuerzas[a], y no nos agraviará».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «con el ejército» o «con las tropas». El plural griego δυνάμεις sugiere fuerzas militares; «las fuerzas» mantiene esa pluralidad sin añadir precisión no explícita.
    reason: lexical_alternative
lexical_decisions:
- source_word: εἶπαν γάρ
  english_pob_choice: For they said
  chosen_spanish: Porque dijeron
  alternatives_spanish:
  - Pues dijeron
  - Porque decían
  lexicon: BDAG
  rationale: γάρ introduce explicación o motivo; en español, «porque» comunica bien esa relación. El aoristo εἶπαν se vierte con un pasado simple narrativo, natural en español bíblico moderno.
- source_word: Ἄνθρωπος
  english_pob_choice: A man
  chosen_spanish: Un hombre
  alternatives_spanish:
  - Hombre
  - Una persona
  lexicon: BDAG
  rationale: Se conserva el valor de individuo masculino en aposición con «sacerdote», sin generalizar a «persona» ni suavizar la referencia.
- source_word: ἱερεὺς
  english_pob_choice: a priest
  chosen_spanish: un sacerdote
  alternatives_spanish:
  - sacerdote
  lexicon: BDAG
  rationale: «Sacerdote» es el equivalente culto y claro en español para el oficio levítico referido aquí.
- source_word: ἐκ τοῦ σπέρματος Ἀαρών
  english_pob_choice: from the seed of Aaron
  chosen_spanish: de la descendencia de Aarón
  alternatives_spanish:
  - de la línea de Aarón
  - de la estirpe de Aarón
  lexicon: BDAG
  rationale: σπέρμα tiene aquí sentido genealógico. En español, «descendencia» evita la literalidad extraña de «semilla» y conserva la fuerza de legitimidad por linaje sacerdotal.
- source_word: ἦλθεν
  english_pob_choice: has come
  chosen_spanish: ha venido
  alternatives_spanish:
  - vino
  - ha llegado
  lexicon: BDAG
  rationale: El perfecto español expresa la llegada reciente y su relevancia inmediata en el razonamiento de los hablantes, como en el audit trail inglés.
- source_word: ἐν ταῖς δυνάμεσιν
  english_pob_choice: with the forces
  chosen_spanish: con las fuerzas
  alternatives_spanish:
  - con el ejército
  - con las tropas
  lexicon: BDAG
  rationale: δυνάμεις en plural tiene sentido militar. «Las fuerzas» conserva el plural y el matiz de contingentes armados sin precisar más de lo que el griego dice.
- source_word: οὐκ ἀδικήσει ἡμᾶς
  english_pob_choice: he will not wrong us
  chosen_spanish: no nos hará mal
  alternatives_spanish:
  - no nos hará injusticia
  - no nos dañará
  - no nos agraviará
  lexicon: BDAG
  rationale: ἀδικέω puede implicar tratar injustamente, agraviar o hacer daño. «No nos hará mal» suena natural en español y conserva la seguridad negativa sin forzar un tecnicismo jurídico en el cuerpo del texto.
theological_decisions:
- issue: Descendencia aarónica como base de legitimidad sacerdotal
  english_pob_reading: from the seed of Aaron
  chosen_spanish_reading: de la descendencia de Aarón
  alternative_spanish_readings:
  - de la línea de Aarón
  - de la estirpe de Aarón
  rationale: El texto apela a la legitimidad del sacerdote por herencia aarónica. Mantener la referencia genealógica en español evita interpretar de más y conserva la tensión entre título religioso y linaje.
  doctrine_reference: DOCTRINE.md §Translation philosophy 1, 4, 5
translation_notes:
  revision_awareness: La revisión más reciente indicó alta concordancia y que no eran necesarios cambios sustantivos. Esta versión mantiene la lectura del audit trail inglés, pero ajusta el hilo explicativo al español con equivalentes naturales y conservando el matiz genealógico y militar del griego.
  spanish_consistency_notes:
  - Se usa «Aarón» como forma estable del nombre propio.
  - Se mantiene «descendencia» para el valor genealógico de σπέρμα en contexto sacerdotal.
  - «Fuerzas» conserva el plural militar del original y armoniza con el registro bíblico moderno sin caer en arcaísmo.
