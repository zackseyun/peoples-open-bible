- from: Él les dio las tierras de las naciones[a], y ellos heredaron el trabajo de los pueblos.
  to: Él les dio las tierras de las naciones[a], y ellos heredaron la labor de los pueblos.
  rationale: Se reemplaza 'trabajo' por 'labor' para reflejar mejor עמל y evitar una lectura poco natural en español. Se mantiene 'heredaron' por el matiz de posesión recibida por don divino. La nota se ajusta para coherencia léxica con el texto revisado.
  reviewer_model: gpt-5.4
