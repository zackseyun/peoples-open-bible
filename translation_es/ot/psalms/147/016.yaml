lexical_decisions:
- source_word: הַנֹּתֵן
  english_pob_choice: He gives
  chosen_spanish: Él da
  alternatives_spanish:
  - el que da
  - quien da
  lexicon: HALOT
  rationale: El participio hebreo expresa una acción característica y continua en una alabanza sobre Dios; en español, el presente simple 'Él da' comunica mejor esa acción habitual que una construcción participial literal.
- source_word: שֶׁלֶג
  english_pob_choice: snow
  chosen_spanish: nieve
  alternatives_spanish:
  - nieve
  lexicon: HALOT
  rationale: El sentido léxico es directo y no presenta tensión contextual; 'nieve' conserva la imagen poética de forma natural en español.
- source_word: כַּצָּמֶר
  english_pob_choice: like wool
  chosen_spanish: como lana
  alternatives_spanish:
  - como lana
  - como lana de oveja
  lexicon: HALOT
  rationale: La comparación pide un término español idiomático. 'Lana' reproduce la cualidad visual y táctil del hebreo sin cargar la imagen con una especificación innecesaria.
- source_word: כְּפוֹר
  english_pob_choice: frost
  chosen_spanish: la escarcha
  alternatives_spanish:
  - frost
  - hoarfrost
  - el rocío helado
  lexicon: HALOT
  rationale: En español, 'escarcha' es la equivalencia más natural para el fenómeno descrito. Mantiene la posible especificidad de una capa helada fina, sin perder legibilidad.
- source_word: כָּאֵפֶר
  english_pob_choice: like ashes
  chosen_spanish: como ceniza
  alternatives_spanish:
  - como cenizas
  - como ceniza
  lexicon: HALOT
  rationale: El hebreo usa un singular colectivo/comparativo; 'ceniza' funciona bien en español poético y evita forzar un plural donde el sustantivo colectivo es suficiente.
- source_word: יְפַזֵּר
  english_pob_choice: he scatters
  chosen_spanish: esparce
  alternatives_spanish:
  - dispersa
  - esparce
  lexicon: HALOT
  rationale: '''פזר'' describe dispersar ampliamente. ''Esparce'' preserva el gesto visual y la fluidez poética del verso mejor que una opción más técnica o pesada.'
translation_notes:
  revision_awareness: El texto hebreo y el audit trail inglés están en alto acuerdo; no se requirieron cambios de revisión. La versión española sigue de cerca las imágenes y elecciones léxicas del POB inglés, adaptándolas a un español natural.
  spanish_consistency_notes:
  - Se mantiene 'Él' para referirse a Dios de manera implícita, coherente con el sujeto elíptico del participio hebreo.
  - '''Nieve'' y ''lana'' conservan la simetría imagística del verso: blanco, suave y extendido.'
  - '''Escarcha'' se eligió como equivalente principal, dejando ''frost'' como alternativa en nota para reflejar la ambigüedad léxica del término hebreo.'
