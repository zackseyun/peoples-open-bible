translation:
  language: es
  text: 'Yahvé dijo al Acusador[a]: «Yahvé te reprenda, Acusador. Sí, Yahvé, el que ha escogido Jerusalén, te reprenda. ¿No es este un tizón sacado del fuego?[b]»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, tradicionalmente, «Satanás». El hebreo usa el título «el Acusador».
    reason: alternative_reading
  - marker: b
    text: O «un tizón rescatado del fuego».
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  - el SEÑOR
  lexicon: Transliteración del Tetragrama
  rationale: Se conserva el nombre divino como nombre propio, siguiendo la decisión auditada del POB en inglés. En español, 'Yahvé' es la forma transparente y reverente más adecuada para el Tetragrama, evitando la sustitución por un título.
- source_word: הַשָּׂטָן
  english_pob_choice: the Accuser / O Accuser
  chosen_spanish: el Acusador
  alternatives_spanish:
  - Satanás
  - el adversario
  lexicon: HALOT
  rationale: El artículo hebreo y el contexto judicial apoyan un título funcional, no necesariamente un nombre propio. 'Acusador' reproduce el sentido léxico y el marco forense. Mantener 'Satanás' como principal borraría esa tensión documentada; por eso se reserva como alternativa.
- source_word: יִגְעַר
  english_pob_choice: rebuke
  chosen_spanish: reprenda
  alternatives_spanish:
  - repruebe
  - amenace
  lexicon: HALOT
  rationale: El verbo expresa una reprensión autoritativa y judicial. 'Reprenda' suena natural en español bíblico moderno y mantiene el tono imperativo de la escena.
- source_word: הַבֹּחֵר בִּירוּשָׁלִָם
  english_pob_choice: who has chosen Jerusalem
  chosen_spanish: el que ha escogido Jerusalén
  alternatives_spanish:
  - el que elige Jerusalén
  - quien ha elegido Jerusalén
  lexicon: HALOT
  rationale: El participio con artículo identifica a Yahvé por su acción característica. 'El que ha escogido' conserva el sentido de elección ya establecida y resulta fluido en español sin perder la referencia pactal.
- source_word: הֲלוֹא
  english_pob_choice: Is not
  chosen_spanish: ¿No es
  alternatives_spanish:
  - ¿Acaso no es?
  - ¿No es acaso?
  lexicon: HALOT
  rationale: La partícula introduce una pregunta retórica que espera afirmación. '¿No es...?' conserva ese valor con naturalidad en español.
- source_word: אוּד
  english_pob_choice: brand
  chosen_spanish: tizón
  alternatives_spanish:
  - leño
  - brandón
  - madero
  lexicon: HALOT
  rationale: En español, 'tizón' comunica bien la imagen de una pieza parcialmente quemada rescatada del incendio. Conserva la metáfora de algo casi consumido por el fuego.
- source_word: מֻצָּל מֵאֵשׁ
  english_pob_choice: snatched from the fire
  chosen_spanish: sacado del fuego
  alternatives_spanish:
  - rescatado del fuego
  - arrancado del fuego
  lexicon: HALOT
  rationale: '''Sacado del fuego'' refleja con sobriedad la imagen hebrea de rescate desde el incendio. Se evita intensificar con ''arrancado'' y se mantiene el matiz de salvación visible en el original.'
theological_decisions:
- issue: Cómo traducir הַשָּׂטָן en una escena de acusación judicial
  english_pob_reading: Rendered as 'the Accuser' in the main text
  chosen_spanish_reading: el Acusador en el texto principal
  alternative_spanish_readings:
  - Satanás
  - el adversario
  rationale: El hebreo con artículo funciona como título descriptivo dentro de una escena judicial. 'Acusador' preserva esa lectura y la fuerza legal del pasaje. La forma tradicional 'Satanás' se mantiene solo como alternativa reconocible, sin imponerla al texto principal.
  doctrine_reference: Translation philosophy §1, §3
- issue: Conservar la repetición de la reprensión divina
  english_pob_reading: Retained the repetition and direct speech without smoothing it out
  chosen_spanish_reading: 'Se conserva la doble reprensión: «Yahvé te reprenda... Yahvé... te reprenda»'
  alternative_spanish_readings:
  - Reducir la repetición a una sola reprensión
  - fundir las dos cláusulas
  rationale: La repetición aparece en el hebreo y refuerza la solemnidad y el peso judicial de la declaración. Mantenerla evita aplanar el énfasis del texto.
  doctrine_reference: Translation philosophy §1, §5
- issue: Cómo reflejar el valor narrativo de 'escogido Jerusalén'
  english_pob_reading: who has chosen Jerusalem
  chosen_spanish_reading: el que ha escogido Jerusalén
  alternative_spanish_readings:
  - el que elige Jerusalén
  - el escogedor de Jerusalén
  rationale: La elección divina en tiempo perfecto expresa una acción ya establecida y pactal. 'Ha escogido' transmite mejor esa estabilidad que una traducción meramente presente o nominal.
  doctrine_reference: Translation philosophy §2
translation_notes:
  revision_awareness: La versión española sigue de cerca el texto hebreo y la decisión auditada del POB inglés, sin introducir cambios de sentido. Se preservan el título funcional de הַשָּׂטָן, la repetición de la reprensión divina y la imagen concreta del objeto sacado del fuego. No se requirieron revisiones respecto del pasaje base auditado.
  spanish_consistency_notes:
  - Se usa 'Yahvé' para el Tetragrama, en coherencia con el estándar del proyecto.
  - '''Acusador'' mantiene el valor titulado y judicial de הַשָּׂטָן en esta escena.'
  - '''Reprenda'' conserva el tono imperativo y forense del verbo גער.'
  - '''Tizón'' ofrece una equivalencia española natural para אוּד sin perder la imagen de algo medio consumido por el fuego.'
  - Se conserva la repetición verbal y la estructura retórica del hebreo.
  - Las notas al pie ofrecen las alternativas documentadas sin desplazar la lectura principal.
