review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja correctamente el sentido básico del hebreo: Jefté va contra los ammonitas para pelear y Yahvé los entrega en su mano. También preserva bien el nombre divino «Yahvé» y la nota sobre la literalidad de «pasó». Sin embargo, «pasó a los hijos de Amón» suena poco natural y puede confundirse en español; además, la decisión de mantener «los hijos de Amón» en el texto principal sacrifica claridad innecesariamente, cuando el English POB documenta que la forma idiomática étnica es preferible en el texto principal y la literal puede quedar en nota.'
  spanish_quality_summary: La frase principal necesita un ajuste de naturalidad y legibilidad. «Entonces Jefté pasó a los hijos de Amón» no es español claro en este contexto militar. «Cruzó hacia los amonitas» o «fue contra los amonitas» serían más comprensibles, pero dado el rastro auditado conviene conservar el movimiento concreto con «cruzó hacia los amonitas» y dejar la literalidad «a los hijos de Amón» en nota. El resto del versículo es claro y digno; «los entregó en su mano» es aceptable y bíblicamente transparente.
  glossary_alignment: Alineación buena en «Yahvé», «Jefté», y en la conservación del modismo «en su mano». Se recomienda ajustar «בני עמון» a «los amonitas» en el texto principal por claridad e idiomaticidad, con nota para la forma literal. No hay conflicto doctrinal.
  issues:
  - severity: medium
    issue: «pasó a los hijos de Amón» es poco natural y potencialmente ambiguo en español
    rationale: Aunque intenta reflejar de cerca עבר + אל, en español esa construcción no comunica bien la idea de desplazamiento militar hacia un enemigo. La traducción debe ser fiel y legible.
  - severity: medium
    issue: «los hijos de Amón» en el texto principal es menos idiomático que «los amonitas»
    rationale: El referente étnico se expresa de forma más natural en español con «los amonitas». La forma literal puede preservarse en nota, como ya hace el English POB.
  revised_spanish_text: Entonces Jefté cruzó hacia los amonitas[a] para combatir contra ellos, y Yahvé los entregó en su mano.
  revised_footnotes:
  - marker: a
    text: 'Hebreo: «cruzó hacia los hijos de Amón». La expresión se refiere a que Jefté fue contra los amonitas en batalla.'
    reason: lexical_alternative
  revision_rationale: Se corrige la construcción principal para que el español sea natural y claro sin perder el movimiento concreto de עבר. Se traslada la forma literal «hijos de Amón» a la nota, mientras el texto principal usa el gentilicio idiomático «amonitas», en línea con el rastro auditado. No se requieren cambios doctrinales ni de fondo.
