translation:
  language: es
  text: '¿Piensas que esto es justo? Dices[a]: «Mi justicia es mayor que la de Dios».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Mi justicia está delante de Dios», o «Mi derecho procede de Dios». El hebreo es conciso, y la relación de «mi justicia» con «Dios» es debatida.'
    reason: alternative_reading
lexical_decisions:
- source_word: הֲזֹאת
  english_pob_choice: Do you think this
  chosen_spanish: ¿Piensas que esto es...
  alternatives_spanish:
  - ¿Consideras esto...
  - ¿Crees que esto es...
  lexicon: HALOT
  rationale: La partícula interrogativa con el demostrativo introduce una pregunta retórica. En español, «¿Piensas que esto es...?» transmite de forma natural la valoración que Elihú cuestiona.
- source_word: חָשַׁבְתָּ
  english_pob_choice: do you think
  chosen_spanish: piensas
  alternatives_spanish:
  - has considerado
  - te has imaginado
  lexicon: HALOT
  rationale: חשב expresa pensar, considerar o estimar. «Piensas» conserva el tono directo y acusatorio del hebreo.
- source_word: לְמִשְׁפָּט
  english_pob_choice: is just
  chosen_spanish: es justo
  alternatives_spanish:
  - es justicia
  - es recto
  - es correcto
  lexicon: HALOT
  rationale: מִשְׁפָּט puede abarcar juicio, justicia o derecho legal. Aquí la frase evalúa si la declaración puede calificarse como justa; «es justo» suena natural y mantiene ese juicio valorativo.
- source_word: אָמַרְתָּ
  english_pob_choice: you say
  chosen_spanish: tú dices
  alternatives_spanish:
  - tú dijiste
  - dices
  lexicon: HALOT
  rationale: Aunque el verbo está en perfecto, en discurso hebreo introduce una cita con vigencia actual. «Tú dices» conserva esa acusación viva.
- source_word: צִדְקִי
  english_pob_choice: My righteousness
  chosen_spanish: Mi justicia
  alternatives_spanish:
  - Mi rectitud
  - Mi righteousness
  lexicon: HALOT
  rationale: צֶדֶק/צְדָקָה puede referirse a justicia, rectitud o derecho. En español, «mi justicia» preserva el campo semántico judicial-moral y resulta más idiomático que un calco técnico.
- source_word: מֵאֵל
  english_pob_choice: greater than God’s
  chosen_spanish: mayor que la de Dios
  alternatives_spanish:
  - antes de Dios
  - procedente de Dios
  lexicon: HALOT
  rationale: La preposición מִן con valor comparativo permite entender una comparación. «Mayor que la de Dios» sigue la lectura comparativa adoptada en el POB inglés y explicita el referente divino en español.
theological_decisions:
- issue: Relación entre «mi justicia» y Dios
  english_pob_reading: 'comparative: ''My righteousness is greater than God''s'''
  chosen_spanish_reading: 'comparativo: «Mi justicia es mayor que la de Dios»'
  alternative_spanish_readings:
  - «Mi justicia está delante de Dios»
  - «Mi derecho procede de Dios»
  rationale: El hebreo es comprimido y admite más de una relación sintáctica entre «mi justicia» y «Dios». En el contexto de la acusación de Elihú, se mantiene la lectura comparativa; las alternativas posibles se dejan implícitas en la decisión léxica sin borrar la tensión interpretativa.
  doctrine_reference: Preservar la tensión textual sin resolverla de manera excesiva
translation_notes:
  revision_awareness: Se tomó como base la revisión inglesa más reciente, que fortaleció el comparativo («greater than God’s»). La versión española refleja ese mismo valor comparativo con una formulación natural y mantiene abierta la ambigüedad señalada por la nota alternativa.
  spanish_consistency_notes:
  - Se usa «Dios» para אֵל siguiendo el estándar del proyecto.
  - Se eligió «justicia» para צִדְקִי por su combinación de fuerza moral y jurídica en español.
  - Se mantuvo el estilo de cita directa con comillas españolas para claridad litúrgica y editorial.
  - La nota a pie de página está anclada correctamente en el texto con [a].
