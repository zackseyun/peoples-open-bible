  text: וְ/עַתָּה֙ הַ/בְּרָכָ֣ה הַ/זֹּ֔את אֲשֶׁר הֵבִ֥יא שִׁפְחָתְ/ךָ֖ לַֽ/אדֹנִ֑/י וְ/נִתְּנָה֙ לַ/נְּעָרִ֔ים הַ/מִּֽתְהַלְּכִ֖ים בְּ/רַגְלֵ֥י אֲדֹנִֽ/י־׃
base_translation:
  language: en
  yaml_path: translation/ot/1_samuel/025/027.yaml
  text: And now[b][a], let this present that your servant has brought to my lord be given to the young men who follow my lord.
  footnotes:
