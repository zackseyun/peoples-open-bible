review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el sentido general del arameo: la fórmula idiomática שְׁפַר קֳדָם דָּרְיָוֶשׁ está bien captada con «A Darío le pareció bien», וַהֲקִים con «nombrar», y אֲחַשְׁדַּרְפְּנַיָּא con «sátrapas». También preserva la idea distributiva de בְּכָל מַלְכוּתָא. Sin embargo, la nota [a] no corresponde a una alternativa real del segmento «sobre el reino» y añade una paráfrasis excesiva («de toda la extensión del territorio») que no procede del expediente inglés ni del original.'
  spanish_quality_summary: 'El español es claro y natural. No obstante, «sobre el reino» suena algo rígido en español administrativo bíblico; «para todo el reino» o «sobre todo el reino» serían más idiomáticos según contexto, pero aquí puede mantenerse por cercanía formal. El problema principal es de aparato de notas: la nota [a] estorba la lectura, sobreexplica y no aporta una alternativa léxica útil. La frase principal queda mejor sin esa nota.'
  glossary_alignment: No hay términos del glosario principal en disputa en este versículo. «Sátrapas» se ajusta bien a la decisión documentada, y la nota alternativa «gobernadores provinciales» está correctamente preservada. No hay cuestiones teológicas especiales.
  issues:
  - severity: medium
    issue: La nota [a] sobre «sobre el reino» no está justificada.
    rationale: El inglés POB no preserva nota en ese punto, y la redacción española propuesta no ofrece una alternativa léxica clara sino una paráfrasis interpretativa innecesaria. Además, recarga el texto sin resolver una ambigüedad real.
  - severity: low
    issue: «Sobre el reino» es aceptable pero algo tieso en español.
    rationale: No es incorrecto, y conserva bien «over the kingdom», pero en español moderno puede sonar menos natural que otras soluciones. Aun así, no exige cambio forzoso si se busca cercanía al original.
  revised_spanish_text: A Darío le pareció bien nombrar sobre el reino ciento veinte sátrapas[a], que estuvieran en todo el reino.
  revised_footnotes:
  - marker: a
    text: O «gobernadores provinciales» para «sátrapas», funcionarios administrativos persas de alto rango.
    reason: lexical_alternative
  revision_rationale: 'Se elimina la nota [a] porque no corresponde a una alternativa léxica necesaria y añade explicación excesiva no sustentada por el expediente. Se conserva la traducción base, que es fiel y legible, junto con la única nota útil: la alternativa para «sátrapas».'
