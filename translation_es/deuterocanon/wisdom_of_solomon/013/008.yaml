  glossary_alignment: 'No hay conflictos con la terminología base del proyecto. La decisión clave es léxica y de naturalidad: mantener la fuerza evaluativa de συγγνωστοί sin deslizarse innecesariamente hacia ''perdonables'' en el texto principal. La nota alternativa puede conservar ''perdonables'' y ''merecen perdón''.'
