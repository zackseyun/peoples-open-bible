translation:
  language: es
  text: Para el director del coro. Salmo de David[a]; cántico[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: La expresión hebrea «de David» puede indicar autoría, dedicación o asociación; la traducción conserva esa ambigüedad en lugar de especificar «por David».
    reason: alternative_reading
  - marker: b
    text: 'O: «Salmo de David. Cántico».'
    reason: previous_rendering
lexical_decisions:
- source_word: לַמְנַצֵּחַ
  english_pob_choice: For the choirmaster
  chosen_spanish: Para el director del coro
  alternatives_spanish:
  - Para el maestro de coro
  - Para el dirigente musical
  - Para el jefe de músicos
  lexicon: HALOT
  rationale: En los encabezamientos de salmos, el término señala a la persona encargada de la ejecución musical. "Director del coro" comunica bien la función y mantiene un registro natural en español. Se conserva la fuerza direccional del ל con "Para".
- source_word: מִזְמוֹר
  english_pob_choice: A psalm
  chosen_spanish: Salmo
  alternatives_spanish:
  - Un salmo
  - Canto salmódico
  lexicon: HALOT
  rationale: Es el término técnico habitual del encabezamiento. En español, el sustantivo simple "Salmo" funciona de manera idiomática y respeta el valor genérico del hebreo sin añadir más precisión de la que ofrece el texto.
- source_word: לְדָוִד
  english_pob_choice: of David
  chosen_spanish: de David
  alternatives_spanish:
  - para David
  - perteneciente a David
  - por David
  lexicon: HALOT
  rationale: La preposición ל en estos encabezamientos puede indicar autoría, dedicación o asociación. "De David" preserva esa ambigüedad mejor que "por David" y encaja con el uso bíblico en español.
- source_word: שִׁיר
  english_pob_choice: A song
  chosen_spanish: cántico
  alternatives_spanish:
  - canción
  - canto
  lexicon: HALOT
  rationale: Se distingue de מִזְמוֹר en el hebreo y conviene no fusionarlo sin necesidad. "Cántico" mantiene el matiz litúrgico y resulta más digno y apropiado que "canción" en un encabezamiento bíblico.
theological_decisions:
- issue: Ambigüedad de לְדָוִד sobre autoría, dedicación o asociación
  english_pob_reading: The Hebrew 'of David' may indicate authorship, dedication, or association; the translation preserves that ambiguity rather than specifying 'by David.'
  chosen_spanish_reading: '"de David" conserva la misma ambigüedad sin decidir autoría exclusiva.'
  alternative_spanish_readings:
  - '"por David" (más explícito de autoría)'
  - '"para David" (más explícito de dedicación)'
  rationale: El encabezamiento no obliga a fijar una sola relación entre David y el salmo. Mantener la ambigüedad es más fiel al dato hebreo y al enfoque auditado del texto base en inglés.
  doctrine_reference: N/A
translation_notes:
  revision_awareness: 'La versión inglesa revisada cambió la puntuación de ''A psalm of David. A song.'' a ''A psalm of David; a song.'' para unir mejor las dos descripciones. En español se refleja esa relación con punto y coma: ''Salmo de David; cántico.'''
  spanish_consistency_notes:
  - Se mantiene "David" como nombre propio sin transliteración adicional.
  - Se evita "SEÑOR" porque aquí no aparece el Tetragrámaton.
  - '"cántico" se prefiere por su registro litúrgico y porque distingue mejor שִׁיר de מִזְמוֹר.'
  - La puntuación con punto y coma reproduce la relación apposicional del hebreo y del audit trail inglés.
