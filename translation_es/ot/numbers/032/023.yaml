revisions:
- from: Pero si no hacen así[a], miren, habrán pecado contra Yahvé, y sepan que su pecado los hallará.
  to: Pero si no hacen así[a], ciertamente han pecado contra Yahvé, y sepan que su pecado los hallará.
  rationale: Se ajusta «habrán pecado» a «han pecado» para reflejar mejor el perfecto hebreo/resultativo y el inglés auditado. Se reemplaza «miren» por «ciertamente» para un tono más solemne y menos coloquial. Se corrige la nota al pie para un español natural, manteniendo las alternativas léxicas e idiomáticas documentadas. Se conserva «Yahvé» según la política del proyecto y «los hallará» como texto principal, apoyado por la nota para el matiz de exposición/consecuencia.
