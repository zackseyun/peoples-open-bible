  to: Por siete días ofrecerás cada día un macho cabrío como ofrenda por el pecado, y ofrecerán[a] un toro, un becerro del ganado[b], y un carnero del rebaño, sin defecto.
  rationale: Se corrigió la omisión de «cada día» para reflejar לַיּוֹם. Se reemplazó la expresión poco natural «un hijo de vacada» por «un becerro del ganado» en el texto principal, manteniendo la literalidad hebrea en nota. También se añadió una nota para el cambio de sujeto singular/plural, siguiendo el audit trail inglés y preservando una tensión significativa del hebreo.
