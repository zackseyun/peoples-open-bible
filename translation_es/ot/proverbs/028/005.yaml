    rationale: En la auditoría inglesa, la nota alternativa comenta el alcance de כֹל / ‘all things’, no מִשְׁפָּט / ‘justice’. Mantenerla donde está induce una lectura errónea del texto fuente.
  - severity: medium
    issue: La redacción de la nota introduce una alternativa verbal (‘disciernen’) no paralela a la nota inglesa y potencialmente confusa.
    rationale: La nota inglesa preserva una alternativa de alcance (‘understand all things’) aplicada al primer colon como variante interpretativa contextual, no una sustitución léxica aislada de ‘entienden’ por ‘disciernen’ en español. Es mejor formular la nota de modo claro y directamente conectado con el segmento anotado.
  revised_spanish_text: Los hombres malos no entienden la justicia, pero los que buscan a Yahvé entienden todas las cosas[a].
