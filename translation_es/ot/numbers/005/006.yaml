translation:
  language: es
  text: 'Habla a los hijos de Israel: Cuando un hombre o una mujer cometa cualquiera de los pecados de la humanidad[a], actuando con infidelidad contra Yahvé, esa persona es culpable,'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «cualquiera de los pecados del ser humano». El hebreo usa aquí אָדָם en sentido genérico, referido a los seres humanos en general.'
    reason: lexical_alternative
lexical_decisions:
- source_word: דַּבֵּר
  english_pob_choice: Speak
  chosen_spanish: Habla
  alternatives_spanish:
  - Di
  - Habla
  lexicon: HALOT
  rationale: El imperativo de דבר en fórmulas de instrucción divina se expresa de manera natural en español con «Habla». Mantiene el tono directo y solemne sin volverse arcaico.
- source_word: בְּנֵי יִשְׂרָאֵל
  english_pob_choice: the sons of Israel
  chosen_spanish: los hijos de Israel
  alternatives_spanish:
  - los israelitas
  - los hijos de Israel
  lexicon: HALOT
  rationale: Se conserva la formulación filial/covenantal del hebreo. «Israelitas» sería más neutral, pero borra la imagen textual explícita.
- source_word: אִישׁ אֽוֹ אִשָּׁה
  english_pob_choice: a man or a woman
  chosen_spanish: un hombre o una mujer
  alternatives_spanish:
  - un varón o una mujer
  - cualquier hombre o mujer
  lexicon: HALOT
  rationale: La pareja masculina/femenina queda explícita en español con la forma más clara y natural. «Varón» es posible, pero aquí «hombre» funciona bien en el registro legal.
- source_word: כִּי יַעֲשׂוּ
  english_pob_choice: When ... commits
  chosen_spanish: Cuando ... cometa
  alternatives_spanish:
  - Si ... comete
  - Cuando ... hacen
  lexicon: HALOT
  rationale: Aunque el verbo hebreo está en plural, depende distributivamente de «un hombre o una mujer». El español idiomático pide singular genérico con valor casuístico de «cuando».
- source_word: מִכָּל חַטֹּאת הָאָדָם
  english_pob_choice: any of the sins of mankind
  chosen_spanish: cualquiera de los pecados de la humanidad
  alternatives_spanish:
  - cualquiera de los pecados del hombre
  - cualquiera de los pecados de la humanidad
  lexicon: HALOT
  rationale: El hebreo usa אָדָם en sentido genérico, no masculino particular. «Humanidad» expresa bien ese valor colectivo en español y evita una lectura exclusivamente masculina, sin perder el alcance universal.
- source_word: לִמְעֹל מַעַל
  english_pob_choice: by acting unfaithfully
  chosen_spanish: actuando con infidelidad
  alternatives_spanish:
  - obrando con deslealtad
  - cometiendo una traición
  lexicon: HALOT
  rationale: La construcción intensiva comunica quiebra de lealtad pactal. «Infidelidad» transmite esa idea con naturalidad en español bíblico, más específicamente que «trespasar» o «deslealtad» según el contexto.
- source_word: בַּיהוָה
  english_pob_choice: against Yahweh
  chosen_spanish: contra Yahvé
  alternatives_spanish:
  - contra el SEÑOR
  - contra Yahvé
  lexicon: HALOT
  rationale: 'Se sigue el criterio del proyecto para יהוה: «Yahvé» en el texto principal, manteniendo la referencia directa al Nombre divino en vez de enmascararlo.'
- source_word: וְאָשְׁמָה הַנֶּפֶשׁ הַהִוא
  english_pob_choice: then that person is guilty
  chosen_spanish: esa persona será culpable
  alternatives_spanish:
  - y esa persona es culpable
  - entonces esa persona quedará culpable
  lexicon: HALOT
  rationale: נפש aquí se refiere a la persona concreta, no a un tecnicismo sobre el alma. «Será culpable» expresa bien el estado resultante de responsabilidad legal.
theological_decisions:
- issue: Renderización de יהוה
  english_pob_reading: against Yahweh
  chosen_spanish_reading: contra Yahvé
  alternative_spanish_readings:
  - contra el SEÑOR
  - contra Yahvé
  rationale: El proyecto pide representar יהוה como «Yahvé» en el texto principal. Esto conserva la transparencia del Nombre divino y evita el reemplazo litúrgico por un título genérico.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Alcance genérico de אָדָם
  english_pob_reading: sins of mankind
  chosen_spanish_reading: pecados de la humanidad
  alternative_spanish_readings:
  - pecados del hombre
  - pecados de la humanidad
  rationale: El hebreo אָדָם funciona de forma genérica y colectiva. «Humanidad» comunica ese alcance sin restringirlo a un varón individual y preserva la tensión lexical del original.
  doctrine_reference: 'DOCTRINE.md Translation philosophy §4; Contested terms: אָדָם *adam*'
translation_notes:
  revision_awareness: El texto sigue la revisión auditada que prefirió una formulación más natural para el valor genérico de אָדָם. En español, «pecados de la humanidad» mantiene esa generalidad y evita el sesgo masculino de «del hombre», mientras conserva la estructura legal de la cláusula.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» conforme al estándar del proyecto para יהוה.
  - «Hijos de Israel» conserva la forma covenantal del hebreo mejor que «israelitas».
  - «Persona» traduce נֶפֶשׁ en su sentido jurídico de individuo responsable, no como doctrina técnica del alma.
  - El tono es legal y directo, acorde con una instrucción divina casuística.
