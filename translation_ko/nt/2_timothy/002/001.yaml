id: 2TI.2.1
reference: 2 Timothy 2:1
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: Σὺ οὖν, τέκνον μου, ἐνδυναμοῦ ἐν τῇ χάριτι τῇ ἐν Χριστῷ Ἰησοῦ,
base_translation:
  language: en
  yaml_path: translation/nt/2_timothy/002/001.yaml
  text: You, then, my child, be strengthened in the grace that is in Messiah Jesus,
translation:
  language: ko
  text: 그러므로 내 아들이여, 그대는 메시아[a] 예수 안에 있는 은혜로 강건해지십시오.[b]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 또는 「그리스도」. Χριστός를 칭호로 옮기는 본 번역의 원칙에 따라 「메시아」로 번역한다.
    reason: lexical_alternative
  - marker: b
    text: 또는 「강해지십시오」. 헬라어 ἐνδυναμοῦ(중간/수동)는 「힘을 받아 강하게 됨」을 함의한다.
    reason: lexical_alternative
lexical_decisions:
- source_word: τέκνον μου
  english_pob_choice: my child
  chosen_korean: 내 아들
  alternatives_korean:
  - 나의 자녀
  - 나의 아이
  lexicon: BDAG
  rationale: 1:2의 「사랑하는 아들 디모데」와 일관되게 「내 아들」로 옮긴다.
- source_word: ἐνδυναμοῦ
  english_pob_choice: be strengthened
  chosen_korean: 강건해지십시오
  alternatives_korean:
  - 강해지십시오
  - 힘을 받으십시오
  lexicon: BDAG
  rationale: 중간/수동 명령형 ἐνδυναμοῦ는 「힘을 받아 강하게 되라」는 수동적 의미를 함의한다. 「강건해지십시오」가 그 수동적 강화의 의미를 자연스럽게 담는다.
- source_word: ἐν τῇ χάριτι τῇ ἐν Χριστῷ Ἰησοῦ
  english_pob_choice: in the grace that is in Messiah Jesus
  chosen_korean: 메시아 예수 안에 있는 은혜로
  alternatives_korean:
  - 메시아 예수 안에 있는 은혜 안에서
  lexicon: BDAG
  rationale: ἐν은 도구·영역 모두 가능. 강화의 수단을 가리키므로 「은혜로」가 자연스럽다.
