  to: Entonces Asa tomó toda la plata y el oro que quedaban en los tesoros de la casa de Yahvé y en los tesoros de la casa del rey[a], y los puso en manos de sus siervos. Luego el rey Asa los envió a Ben-adad, hijo de Tabrimón, hijo de Jezión, rey de Aram[b], que habitaba en Damasco, diciendo,
