revisions:
- from: Porque he saciado el alma cansada[a], y he llenado[b] a toda alma desfallecida.
  to: Porque he saciado el alma cansada[a], y toda alma desfallecida[b] he llenado.
  rationale: Se conserva la traducción base, pero se corrige la nota [b] para que refleje la alternativa léxica documentada para דָּאֲבָה y se mueve su anclaje a «desfallecida», donde realmente corresponde. También se ajusta levemente el orden para mejorar la naturalidad del español sin apartarse del paralelismo del hebreo ni del POB inglés.
