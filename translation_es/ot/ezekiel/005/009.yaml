translation:
  language: es
  text: Y haré en ti[a] lo que no he hecho, y ni volveré a hacer algo semejante, a causa de todas tus abominaciones.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «contra ti» o «a ti» en lugar de «en ti». La preposición hebrea es literalmente «en», pero algunas traducciones la hacen más interpretativa en este contexto de juicio.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְעָשִׂיתִי
  english_pob_choice: And I will do
  chosen_spanish: Y haré
  alternatives_spanish:
  - Y haré
  - Y ejecutaré
  - Y actuaré
  lexicon: HALOT
  rationale: הָשָׂה/עשה es un verbo amplio (“hacer”). En español, “haré” comunica con naturalidad la acción divina sin añadir especificaciones que el hebreo no da.
- source_word: בָךְ
  english_pob_choice: in you
  chosen_spanish: en ti
  alternatives_spanish:
  - contra ti
  - sobre ti
  lexicon: HALOT
  rationale: La preposición ב conserva mejor su forma concreta como “en”. En contexto de juicio puede entenderse con valor judicial, pero el texto fuente no exige reemplazarla por una interpretación más explícita.
- source_word: אֵת אֲשֶׁר לֹא עָשִׂיתִי
  english_pob_choice: what I have not done
  chosen_spanish: lo que no he hecho
  alternatives_spanish:
  - lo que nunca he hecho
  - aquello que no he hecho
  lexicon: HALOT
  rationale: El perfecto hebreo niega una acción anterior hasta el presente; “lo que no he hecho” refleja esa forma sin intensificar indebidamente a “nunca”.
- source_word: וְאֵת אֲשֶׁר לֹא אֶעֱשֶׂה
  english_pob_choice: and the like of which I will never do again
  chosen_spanish: y lo que no volveré a hacer nunca más
  alternatives_spanish:
  - y lo que no haré otra vez
  - y algo semejante no volveré a hacerlo
  lexicon: HALOT
  rationale: La frase incluye el matiz de repetición futura negada. En español, “no volveré a hacer nunca más” comunica ese valor enfático sin alejarse del alcance del hebreo.
- source_word: כָמֹהוּ
  english_pob_choice: the like of which
  chosen_spanish: lo que
  alternatives_spanish:
  - algo semejante
  - algo como eso
  lexicon: HALOT
  rationale: El comparativo del hebreo se integra en la construcción española de manera implícita para evitar una expresión rígida, manteniendo la idea de algo semejante sin sobrecargar la frase.
- source_word: עוֹד
  english_pob_choice: again
  chosen_spanish: nunca más
  alternatives_spanish:
  - otra vez
  - de nuevo
  lexicon: HALOT
  rationale: Aquí עוֹד refuerza la idea de repetición futura. “Nunca más” reproduce el sentido enfático de irrepetibilidad mejor que una simple repetición como “otra vez”.
- source_word: יַעַן
  english_pob_choice: because of
  chosen_spanish: a causa de
  alternatives_spanish:
  - porque
  - por
  lexicon: HALOT
  rationale: יַעַן introduce la causa del juicio. “A causa de” es claro, formal y fiel a la relación causal del hebreo.
- source_word: כָל תּוֹעֲבֹתָיִךְ
  english_pob_choice: all your abominations
  chosen_spanish: todas tus abominaciones
  alternatives_spanish:
  - todas tus cosas abominables
  - todas tus prácticas abominables
  lexicon: HALOT
  rationale: “Abominaciones” preserva el peso profético y moral del término תּוֹעֵבָה, sin suavizarlo con un equivalente más genérico.
theological_decisions:
- issue: Intensidad e irrepetibilidad del juicio
  english_pob_reading: Retain the absolute, unprecedented language without softening or qualifying it.
  chosen_spanish_reading: 'Mantener un lenguaje absoluto e irrepetible: “lo que no he hecho” / “lo que no volveré a hacer nunca más”.'
  alternative_spanish_readings:
  - hacer una gran destrucción
  - un juicio muy severo
  rationale: El hebreo enfatiza que el acto de juicio será sin precedente y sin repetición. La redacción española conserva ese golpe retórico sin diluirlo en una paráfrasis general.
  doctrine_reference: Translation philosophy §§1, 3, 6
- issue: Preposición בָךְ en contexto de juicio
  english_pob_reading: Translate literally as 'in you' rather than interpretively as 'against you.'
  chosen_spanish_reading: Traducir literalmente “en ti”, dejando que el contexto judicial cargue el sentido.
  alternative_spanish_readings:
  - contra ti
  - sobre ti
  rationale: La traducción mantiene prioridad al texto fuente y no sustituye la preposición por una interpretación. El contexto ya indica que se trata de juicio.
  doctrine_reference: Translation philosophy §§1, 5
translation_notes:
  revision_awareness: Se incorporó la revisión más reciente del audit trail al evitar “nunca he hecho” y usar “no he hecho”, que refleja de manera más directa el perfecto hebreo sin añadir énfasis no explícito en el מקור. También se conservó la fuerza comparativa y repetitiva del cierre mediante una formulación española natural.
  spanish_consistency_notes:
  - Se mantuvo “abominaciones” para תּוֹעֲבֹת, en coherencia con la terminología profética del proyecto.
  - Se prefirió “Yahvé” para el nombre divino cuando corresponda; este versículo no lo contiene explícitamente en el texto hebreo dado.
  - Se evitó “Mesías/Cristo” porque no aparece en el versículo.
  - Se usó el tuteo reverencial estándar (“ti”) para reflejar el singular femenino de la referencia a Jerusalén, sin cambiar el referente implícito.
