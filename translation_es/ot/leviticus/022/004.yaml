translation:
  language: es
  text: Cualquier hombre de la descendencia de Aarón, si está afligido por una afección cutánea[a] o tiene una secreción, no comerá de las cosas santas hasta que quede limpio. Y el que toque cualquier cosa impura por causa de un muerto[b], o un hombre del cual salga una emisión de semen,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Tradicionalmente, “leproso”. El término hebreo se refiere de manera amplia a una condición cutánea ritualmente impura, no necesariamente a la lepra moderna (enfermedad de Hansen).
    reason: lexical_alternative
  - marker: b
    text: O “cualquier persona hecha impura por un cadáver”. La expresión hebrea es idiomática para la impureza relacionada con un muerto.
    reason: lexical_alternative
lexical_decisions:
- source_word: אִישׁ אִישׁ
  english_pob_choice: Any man
  chosen_spanish: Cualquier hombre
  alternatives_spanish:
  - Todo hombre
  - Cualquier varón
  lexicon: HALOT
  rationale: 'La duplicación hebrea funciona distributivamente: no es “un hombre” singular aislado, sino una regla para cualquiera dentro del grupo. “Cualquier hombre” preserva ese valor legal y mantiene el sujeto masculino del texto.'
- source_word: מִזֶּרַע אַהֲרֹן
  english_pob_choice: from the offspring of Aaron
  chosen_spanish: de la descendencia de Aarón
  alternatives_spanish:
  - de los descendientes de Aarón
  - de la estirpe de Aarón
  lexicon: HALOT
  rationale: זֶרַע expresa linaje/descendencia, no semilla literal. “Descendencia” conserva el sentido genealógico en español bíblico actual sin perder naturalidad.
- source_word: צָרוּעַ
  english_pob_choice: afflicted with a skin disease
  chosen_spanish: afligido por una afección cutánea
  alternatives_spanish:
  - con lepra
  - afectado por una enfermedad de la piel
  lexicon: HALOT
  rationale: El hebreo designa una condición ritual de impureza tradicionalmente llamada “leprosa”, pero no identificable sin más con la lepra moderna. “Afección cutánea” evita precisión médica anacrónica y conserva el marco ritual.
- source_word: זָב
  english_pob_choice: has a discharge
  chosen_spanish: tiene una secreción
  alternatives_spanish:
  - tiene un flujo
  - está con una secreción
  lexicon: HALOT
  rationale: El término alude a una descarga corporal que produce impureza ritual. “Secreción” es claro, sobrio y suficientemente amplio para el contexto.
- source_word: בַּקֳּדָשִׁים
  english_pob_choice: from the holy things
  chosen_spanish: de las cosas santas
  alternatives_spanish:
  - de lo consagrado
  - de las ofrendas santas
  lexicon: HALOT
  rationale: La expresión apunta a los bienes/ofrendas consagrados a Yahvé. “Cosas santas” sigue de cerca el valor del hebreo y funciona bien en el registro legal del capítulo.
- source_word: לֹא יֹאכַל
  english_pob_choice: shall not eat
  chosen_spanish: no comerá
  alternatives_spanish:
  - no podrá comer
  - no debe comer
  lexicon: HALOT
  rationale: Es una prohibición legal. El futuro prohibitivo “no comerá” reproduce bien el tono normativo del hebreo.
- source_word: עַד אֲשֶׁר יִטְהָר
  english_pob_choice: until he becomes clean
  chosen_spanish: hasta que esté limpio
  alternatives_spanish:
  - hasta que sea limpio
  - hasta que quede limpio
  lexicon: HALOT
  rationale: El verbo indica el paso a un estado de pureza ritual. “Esté limpio” comunica el estado resultante con naturalidad en español; se conserva la noción ritual sin sobreexplicar.
- source_word: וְהַנֹּגֵעַ
  english_pob_choice: And whoever touches
  chosen_spanish: Y el que toque
  alternatives_spanish:
  - Y quien toque
  - Y cualquiera que toque
  lexicon: HALOT
  rationale: El participio sustantivado introduce otro caso legal. “El que toque” mantiene el estilo normativo y evita una paráfrasis excesiva.
- source_word: בְּכָל טְמֵא נֶפֶשׁ
  english_pob_choice: anything unclean by a dead person
  chosen_spanish: cualquier cosa impura por causa de un muerto
  alternatives_spanish:
  - cualquier impureza por muerto
  - algo hecho impuro por un cadáver
  lexicon: HALOT
  rationale: La frase hebrea es idiomática y ligada a impureza por contacto con la muerte humana. “Por causa de un muerto” conserva ese vínculo sin introducir tecnicismos ajenos al lector español.
- source_word: שִׁכְבַת זָרַע
  english_pob_choice: an emission of semen
  chosen_spanish: una emisión de semen
  alternatives_spanish:
  - una eyaculación
  - semen emitido
  lexicon: HALOT
  rationale: El modismo designa emisión seminal. “Emisión de semen” es transparente, formal y no eufemística, en línea con el cuidado léxico del POB.
- source_word: תֵּצֵא מִמֶּנּוּ
  english_pob_choice: comes out from him
  chosen_spanish: salga de él
  alternatives_spanish:
  - salga de su cuerpo
  - provenga de él
  lexicon: HALOT
  rationale: 'El hebreo es concreto: algo “sale” de la persona. “Salga de él” conserva la imagen sin sonar forzado en español.'
theological_decisions:
- issue: Impureza ritual frente a diagnóstico médico moderno
  english_pob_reading: Use 'afflicted with a skin disease' for צָרוּעַ and 'becomes clean' for ritual restoration
  chosen_spanish_reading: Usar “afligido por una afección cutánea” y “hasta que esté limpio” para el restablecimiento ritual
  alternative_spanish_readings:
  - con lepra
  - hasta que sea purificado
  rationale: El pasaje regula acceso a las cosas santas; no pretende hacer un diagnóstico médico moderno. La redacción preserva la tensión entre impureza ritual y limpieza ritual sin convertirla en una afirmación clínica o moral.
  doctrine_reference: Translation philosophy §§1, 3, 6
- issue: Mantener el sujeto masculino del reglamento sacerdotal
  english_pob_reading: Retain 'man' in 'Any man from the offspring of Aaron'
  chosen_spanish_reading: Retener “hombre” en “Cualquier hombre de la descendencia de Aarón”
  alternative_spanish_readings:
  - cualquier persona
  - cualquiera de la descendencia de Aarón
  rationale: El hebreo usa una forma masculina y el contexto trata de descendencia aarónica en función sacerdotal. “Hombre” conserva esa referencia sin neutralizar indebidamente el alcance gramatical del texto.
  doctrine_reference: Translation philosophy §4
translation_notes:
  revision_awareness: 'El borrador sigue de cerca la lectura inglesa auditada y confirma las decisiones ya asentadas: el distributivo אִישׁ אִישׁ, זֶרַע como descendencia, צָרוּעַ como condición cutánea ritual, זָב como secreción, y la impureza por contacto con un muerto. Se mantiene el tono legal de Levítico sin introducir simplificaciones médicas ni eufemismos innecesarios.'
  spanish_consistency_notes:
  - Se mantiene “Yahvé” implícito en la sección, siguiendo la terminología del proyecto, aunque en este versículo no aparece el tetragrámaton.
  - “Cosas santas” se reserva para קֹדֶשׁ/קֳדָשִים en este contexto cultual para conservar consistencia interna.
  - Se usa “limpio” en sentido ritual, no moral o higiénico; el contexto levítico lo delimita.
  - La frase final queda abierta porque el versículo continúa en la siguiente línea; no se añade cierre inexistente en el hebreo.
