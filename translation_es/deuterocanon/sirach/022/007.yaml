  verdict: revise
  source_alignment_summary: 'El borrador español conserva bien la estructura proverbial y el sentido general del griego: enseñar a un necio se compara con una acción inútil y con despertar a alguien de un sueño profundo. Sin embargo, la nota al pie altera indebidamente la sintaxis fuente al decir «es como pegar» en la formulación más formal, cuando el griego no añade «como» explícito sino que yuxtapone participios predicativos.'
  spanish_quality_summary: 'El español es claro, natural y de registro sapiencial apropiado. «Necio» y «sueño profundo» funcionan muy bien. La única reparación necesaria es en la nota: la alternativa formal debe reflejar con más precisión la construcción griega. El texto principal puede mantenerse.'
  glossary_alignment: No hay términos del glosario teológico principal implicados. «Necio» para μωρόν y «tiesto» para ὄστρακον son defendibles en contexto; «pegar» para συγκολλῶν es natural y fiel. No hay conflicto con las directrices de Yahvé/Mesías/etc.
  issues:
  - severity: medium
    issue: La nota al pie alternativa formal introduce «es como» donde el griego no lo explicita.
    rationale: La auditoría inglesa señala expresamente que la alternativa más formal debe representar los participios comparativos sin un «is like» explícito. En español, la nota debe decir algo como «El que enseña a un necio pega un tiesto, despierta a uno de un sueño profundo», no «es como pegar...».
  revised_spanish_text: Enseñar a un necio[a] es como pegar un tiesto, como despertar a uno de un sueño profundo.
  revised_footnotes:
  - marker: a
    text: 'O, más formalmente: «El que enseña a un necio pega un tiesto, despierta a uno de un sueño profundo». El griego usa participios comparativos más que un «es como» explícito.'
    reason: lexical_alternative
  revision_rationale: 'Se conserva el texto principal, que es fiel y natural, pero se corrige la nota al pie para reflejar con precisión la observación auditada sobre la sintaxis griega: la formulación más formal no debe repetir «es como».'
