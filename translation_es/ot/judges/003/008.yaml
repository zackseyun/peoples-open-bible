translation:
  language: es
  text: Entonces la ira de Yahvé se encendió[a] contra Israel, y los vendió en manos de Cusán-risataim, rey de Aram-naharaim[b]. Y los hijos de Israel[c] sirvieron a Cusán-risataim ocho años.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «la ira de Yahvé ardió». El hebreo conserva la imagen de fuego en la ira divina.
    reason: lexical_alternative
  - marker: b
    text: O «Mesopotamia»; el hebreo dice «Aram-naharaim», tradicionalmente entendido como «Aram de los dos ríos».
    reason: alternative_reading
  - marker: c
    text: «Los hijos de Israel» es la expresión literal del hebreo; muchas traducciones ponen «los israelitas».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּחַר אַף
  english_pob_choice: the anger ... burned
  chosen_spanish: la ira ... se encendió
  alternatives_spanish:
  - la ira ... ardió
  - la ira ... se inflamó
  lexicon: HALOT
  rationale: El hebreo usa una imagen de fuego para la ira. En español, «se encendió» conserva esa metáfora con naturalidad y evita la lectura más plana de «se enojó».
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: Se conserva el nombre divino personal según la convención POB, no el reemplazo titulado. «Yahvé» comunica el Tetragrámaton de forma legible en español.
- source_word: וַיִּמְכְּרֵם
  english_pob_choice: he sold them
  chosen_spanish: los vendió
  alternatives_spanish:
  - los entregó
  - los puso en manos de
  lexicon: HALOT
  rationale: El verbo básico es «vender». Mantenerlo preserva la fuerza judicial del texto, en vez de suavizarlo con una paráfrasis interpretativa.
- source_word: בְּיַד
  english_pob_choice: into the hand of
  chosen_spanish: en mano de
  alternatives_spanish:
  - en poder de
  - a manos de
  lexicon: HALOT
  rationale: La expresión hebrea idiomática se mantiene de forma transparente. «En mano de» conserva la imagen de dominio/control.
- source_word: כּוּשַׁן רִשְׁעָתַיִם
  english_pob_choice: Cushan-rishathaim
  chosen_spanish: Cusán-risatáin
  alternatives_spanish:
  - Cusán-risataim
  lexicon: HALOT
  rationale: Se translitera el nombre propio. Se ajusta a ortografía española con acento prosódico para guiar la lectura sin traducir el antropónimo.
- source_word: אֲרַם נַהֲרָיִם
  english_pob_choice: Aram-naharaim
  chosen_spanish: Aram-naharaim
  alternatives_spanish:
  - Mesopotamia
  - Aram de los Dos Ríos
  lexicon: HALOT
  rationale: Se conserva el topónimo hebreo transliterado, siguiendo la decisión del POB inglés. Las alternativas interpretativas quedan disponibles para nota.
- source_word: וַיַּעַבְדוּ
  english_pob_choice: served
  chosen_spanish: sirvieron
  alternatives_spanish:
  - estuvieron sometidos a
  - fueron esclavos de
  lexicon: HALOT
  rationale: «Servir» refleja directamente עבד y permite el matiz de sujeción política sin añadir una glosa más fuerte que el hebreo aquí no exige de modo explícito.
- source_word: בְנֵי יִשְׂרָאֵל
  english_pob_choice: the sons of Israel
  chosen_spanish: los hijos de Israel
  alternatives_spanish:
  - los israelitas
  - los hijos de Jacob
  lexicon: HALOT
  rationale: Se conserva la expresión literal del hebreo, tal como hace la auditoría inglesa, en lugar de neutralizarla a una colectividad moderna.
- source_word: שְׁמֹנֶה שָׁנִים
  english_pob_choice: eight years
  chosen_spanish: ocho años
  alternatives_spanish:
  - durante ocho años
  lexicon: HALOT
  rationale: Expresión temporal directa y sin problema interpretativo; se traduce de forma simple y natural.
theological_decisions:
- issue: El nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: La línea doctrinal del POB exige preservar el nombre personal de Dios en vez de ocultarlo tras un título. En español, «Yahvé» es la forma estándar de esa decisión editorial.
  doctrine_reference: 'DOCTRINE.md: Contested terms — YHWH → Yahweh'
- issue: La frase בְּיַד como imagen de dominio
  english_pob_reading: into the hand of
  chosen_spanish_reading: en mano de
  alternative_spanish_readings:
  - en poder de
  - a manos de
  rationale: Se mantiene la metáfora hebrea de entrega bajo control de otro, en vez de explicitarla con una fórmula puramente abstracta que diluya la imagen bíblica.
  doctrine_reference: DOCTRINE.md Translation philosophy §2
- issue: La designación colectiva בְנֵי יִשְׂרָאֵל
  english_pob_reading: the sons of Israel
  chosen_spanish_reading: los hijos de Israel
  alternative_spanish_readings:
  - los israelitas
  - los hijos de Jacob
  rationale: Se preserva la forma hebrea masculina y su valor fórmula-covenantal, coherente con la política de precisión gramatical del proyecto.
  doctrine_reference: DOCTRINE.md Translation philosophy §4
translation_notes:
  revision_awareness: 'Se tuvo en cuenta el estado de revisión más reciente: la auditoría inglesa indica alta concordancia, sin cambios aplicados en el último pase. La redacción española sigue esa línea estable, preservando el nombre divino, la metáfora de la ira encendida y las formas literales clave del hebreo.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» para יְהוָה, consistente con el estándar del proyecto.
  - Se translitera «Aram-naharaim» sin sustituirlo por «Mesopotamia» en el texto principal.
  - Se conserva «los hijos de Israel» por fidelidad a la expresión hebrea y a la auditoría inglesa.
  - La puntuación y el orden de cláusulas buscan una lectura natural en español sin perder la sintaxis narrativa del original.
