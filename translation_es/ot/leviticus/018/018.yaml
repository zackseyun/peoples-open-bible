translation:
  language: es
  text: Y no tomarás una mujer, además de su hermana, como esposa rival[a], para descubrir su desnudez mientras su hermana esté viva.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, ‘como rival’. El hebreo es compacto y permite una traducción más literal; aquí se hace explícita la relación matrimonial implícita en el contexto legal.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְאִשָּׁה
  english_pob_choice: And ... a woman
  chosen_spanish: una mujer
  alternatives_spanish:
  - una esposa
  - una mujer/esposa
  lexicon: HALOT
  rationale: En el contexto legal de tomar en matrimonio, ‘mujer’ conserva la amplitud del hebreo אִשָּׁה sin cerrar prematuramente el matiz matrimonial; el verbo ‘tomar’ aporta la fuerza marital.
- source_word: אֶל אֲחֹתָהּ
  english_pob_choice: in addition to her sister
  chosen_spanish: además de su hermana
  alternatives_spanish:
  - junto a su hermana
  - en relación con su hermana
  lexicon: HALOT
  rationale: La preposición אֶל aquí expresa la adición relacional de una segunda mujer respecto de la primera hermana. ‘Además de su hermana’ reproduce con naturalidad la idea de tomar una adicional en ese vínculo.
- source_word: לֹא תִקָּח
  english_pob_choice: you shall not take
  chosen_spanish: no tomarás
  alternatives_spanish:
  - no deberás tomar
  - no tomarás para ti
  lexicon: HALOT
  rationale: El imperfecto prohibitivo en un contexto jurídico se expresa bien con futuro de mandato en español. ‘No tomarás’ mantiene el tono legal del precepto.
- source_word: לִצְרֹר
  english_pob_choice: as a rival wife
  chosen_spanish: como esposa rival
  alternatives_spanish:
  - como rival
  - para hacerla rival
  lexicon: HALOT
  rationale: El sentido resultativo de צרר en este contexto es crear rivalidad entre hermanas dentro del matrimonio. ‘Esposa rival’ comunica esa relación sin perder el matiz legal y evita una paráfrasis excesiva.
- source_word: לְגַלּוֹת עֶרְוָתָהּ
  english_pob_choice: to uncover her nakedness
  chosen_spanish: para descubrir su desnudez
  alternatives_spanish:
  - para tener relaciones sexuales con ella
  - para exponer su desnudez
  lexicon: HALOT
  rationale: Se conserva la fórmula eufemística levítica con un equivalente español directo y transparente. ‘Descubrir su desnudez’ refleja el idioma bíblico sin sustituirlo por una explicación interpretativa.
- source_word: עָלֶיהָ
  english_pob_choice: while her sister is still alive
  chosen_spanish: mientras su hermana viva
  alternatives_spanish:
  - durante la vida de su hermana
  - mientras su hermana esté viva
  lexicon: HALOT
  rationale: Aunque el hebreo dice literalmente ‘sobre ella’, el contexto legal y la frase final requieren expresar la restricción temporal con claridad. ‘Mientras su hermana viva’ recoge la fuerza contextual sin sobreexplicar.
- source_word: בְּחַיֶּיהָ
  english_pob_choice: while her sister is still alive
  chosen_spanish: mientras su hermana viva
  alternatives_spanish:
  - en su vida
  - durante su vida
  lexicon: HALOT
  rationale: La frase final confirma la limitación temporal durante la vida de la primera hermana. La misma formulación en español mantiene cohesión y claridad jurídica.
theological_decisions:
- issue: Alcance de la prohibición respecto del matrimonio con dos hermanas
  english_pob_reading: The verse prohibits taking a woman's sister as an additional wife during the first sister's lifetime.
  chosen_spanish_reading: El versículo prohíbe tomar a la hermana de una mujer como esposa adicional mientras la primera hermana viva.
  alternative_spanish_readings:
  - Prohíbe casarse con dos hermanas en cualquier circunstancia.
  - Prohíbe cualquier arreglo que produzca rivalidad, sin centrarse en la sororidad.
  rationale: La sintaxis hebrea, especialmente לִצְרֹר y la cláusula final sobre la vida de la hermana, apunta a la toma de una hermana como esposa adicional durante la vida de la primera. La traducción conserva ese sentido legal sin ampliarlo indebidamente.
  doctrine_reference: Translation philosophy §§1, 3, 5
translation_notes:
  revision_awareness: La redacción revisada del inglés aclaró la relación idiomática de אֶל אֲחֹתָהּ como ‘in addition to her sister’ y de לִצְרֹר como ‘rival wife’. La versión española conserva esa precisión con ‘además de su hermana’ y ‘como esposa rival’, manteniendo el sentido jurídico y la eufemía levítica.
  spanish_consistency_notes:
  - Se preserva el verbo legal ‘tomar’ para לֹא תִקָּח, coherente con el estilo POB en leyes matrimoniales.
  - Se mantiene ‘desnudez’ para עֶרְוָה por consistencia con el lenguaje levítico y para no perder la fórmula eufemística.
  - ‘Yahvé’ no aparece porque el versículo no contiene el Tetragrámaton; no se introduce terminología ajena al texto.
