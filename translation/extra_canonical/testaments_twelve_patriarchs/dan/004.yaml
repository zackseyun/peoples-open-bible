theological_decisions:
- issue: Personified moral agency in 'spirit' and Beliar
  chosen_reading: Retain the language of 'this very spirit' and 'Beliar rules over it' as the Greek presents a moral-spiritual dynamic, not merely psychology.
  alternative_readings:
  - Render 'spirit' as 'impulse' and treat Beliar as purely metaphorical evil
  rationale: The testament combines ethical exhortation with spiritual conflict language. Preserving both dimensions matches the source and avoids reductionism.
  doctrine_reference: DOCTRINE.md §Translation philosophy 3
- issue: κύριος in paraenetic Jewish testament context
  chosen_reading: Translate Κύριος as 'the Lord.'
  alternative_readings:
  - the LORD
  - Master
  rationale: Follows project default for κύριος while preserving elevated covenantal-religious force.
  doctrine_reference: 'DOCTRINE.md Contested terms: κύριος'
