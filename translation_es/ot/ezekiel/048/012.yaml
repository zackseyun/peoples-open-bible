translation:
  language: es
  text: Y será para ellos una porción especial[a], de la porción apartada de la tierra, santísimo[b], junto al territorio[c] de los levitas.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «una porción reservada»; el hebreo תְּרוּמִיָּה está relacionado con una porción apartada para uso sagrado.
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «santísimo»; la expresión es superlativa y aquí describe la santidad de la porción de tierra.'
    reason: lexical_alternative
  - marker: c
    text: O «el límite» o «la frontera» de los levitas.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהָיְתָה
  english_pob_choice: And it shall be
  chosen_spanish: Y será
  alternatives_spanish:
  - Y será para ellos
  - Y les corresponderá
  lexicon: HALOT
  rationale: La forma verbal introduce una disposición futura/resultante; en español, «será» comunica bien ese valor sin forzar un futuro perifrástico.
- source_word: לָהֶם
  english_pob_choice: for them
  chosen_spanish: para ellos
  alternatives_spanish:
  - de ellos
  - perteneciente a ellos
  lexicon: HALOT
  rationale: El dativo expresa asignación o beneficio para el grupo referido; «para ellos» es natural y conserva esa relación.
- source_word: תְּרוּמִיָּה
  english_pob_choice: a special allotment
  chosen_spanish: una porción especial
  alternatives_spanish:
  - una ofrenda
  - una contribución
  - una porción reservada
  lexicon: HALOT
  rationale: En este contexto de distribución territorial, el término apunta a una porción apartada. «Porción especial» comunica el valor de separación sin perder legibilidad; además evita reducir el término a un acto cultual בלבד.
- source_word: מִתְּרוּמַת הָאָרֶץ
  english_pob_choice: from the contribution of the land
  chosen_spanish: de la porción de la tierra
  alternatives_spanish:
  - de la contribución de la tierra
  - de la ofrenda de la tierra
  - de la porción apartada de la tierra
  lexicon: HALOT
  rationale: El sustantivo terumah ya quedó reflejado con «porción»; repetir «porción» ayuda a mantener la relación interna del hebreo. «De la tierra» conserva el genitivo sin introducir una estructura más técnica que en español sonaría forzada.
- source_word: קֹדֶשׁ קָדָשִׁים
  english_pob_choice: most holy
  chosen_spanish: santísimo
  alternatives_spanish:
  - muy santo
  - santísimo lugar
  - santo de los santos
  lexicon: HALOT
  rationale: La construcción superlativa funciona como predicado descriptivo. «Santísimo» preserva la intensidad absoluta sin convertirlo en un término técnico del santuario que el contexto no exige.
- source_word: אֶל גְּבוּל הַלְוִיִּם
  english_pob_choice: beside the territory of the Levites
  chosen_spanish: junto al territorio de los levitas
  alternatives_spanish:
  - junto al límite de los levitas
  - al lado del territorio de los levitas
  - junto a la frontera de los levitas
  lexicon: HALOT
  rationale: אֶל en este marco de límites expresa adyacencia, y גְּבוּל puede funcionar territorialmente. «Junto al territorio» mantiene la idea espacial y suena natural en español.
theological_decisions:
- issue: Rango semántico de תְּרוּמִיָּה en un reparto territorial sagrado
  english_pob_reading: special allotment
  chosen_spanish_reading: porción especial
  alternative_spanish_readings:
  - ofrenda
  - contribución
  - porción reservada
  rationale: La frase trata de una franja de tierra consagrada, no solo de una ofrenda ritual. «Porción especial» conserva la separación sagrada y la dimensión de asignación territorial sin borrar el trasfondo cultual.
  doctrine_reference: Consecución del espacio consagrado en Ezequiel 45–48; santidad territorial sin confundirlo con el sacrificio del culto.
- issue: Uso de קֹדֶשׁ קָדָשִׁים como superlativo predicativo
  english_pob_reading: most holy
  chosen_spanish_reading: santísimo
  alternative_spanish_readings:
  - santo de los santos
  - muy santo
  rationale: El hebreo expresa grado máximo de santidad. En español, «santísimo» transmite ese superlativo de forma breve y sin imponer la lectura técnica del recinto interior del templo.
  doctrine_reference: Lenguaje bíblico de santidad máxima; distinción entre un uso descriptivo y el nombre técnico del sanctasanctórum.
translation_notes:
  revision_awareness: 'Se tuvo en cuenta la revisión inglesa más reciente, que eliminó la palabra ''place'' para respetar que el hebreo dice literalmente ''most holy'' como predicado. Por eso el español evita añadir ''lugar'' o ''lugar santísimo'' y conserva una formulación predicativa breve: «santísimo».'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» por defecto cuando corresponda, pero este versículo no contiene el nombre divino.
  - Se evita «Cristo» o terminología eclesiástica no presente en el texto.
  - Se usa «levitas» en minúscula como designación de grupo.
  - La puntuación sigue el orden sintáctico natural del español, preservando la estructura de reparto territorial del hebreo.
