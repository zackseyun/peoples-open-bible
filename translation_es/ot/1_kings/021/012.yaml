review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura hebrea: proclamación pública de un ayuno, acción causativa de sentar a Nabot y ubicación prominente respecto del pueblo. También conserva la alternativa léxica documentada en la nota. Sin embargo, la frase principal ''en cabeza del pueblo'' no suena natural en español y además omite el artículo requerido para reproducir la imagen literal (''en la cabeza de'').'
  spanish_quality_summary: 'La mayor debilidad es de naturalidad y gramática idiomática: ''sentaron a Nabot en cabeza del pueblo'' resulta torpe y poco estándar en español moderno. Una formulación como ''al frente del pueblo'' comunica con claridad el sentido principal en el texto, mientras la nota preserva la literalidad y alternativas. El resto del versículo es claro, digno y fiel.'
  glossary_alignment: No hay términos teológicos sensibles en disputa aquí. 'Proclamaron', 'un ayuno', 'sentaron a Nabot' y 'el pueblo' concuerdan con las decisiones del POB y con un español eclesial legible. El nombre 'Nabot' es aceptable en español.
  issues:
  - severity: medium
    issue: 'Expresión no idiomática: ''en cabeza del pueblo'''
    rationale: Aunque intenta conservar la imagen hebrea, en español moderno no es una colocación natural. Puede entorpecer la comprensión del lector y suena gramaticalmente incompleta frente al literal más exacto 'en la cabeza del pueblo'.
  - severity: low
    issue: La nota literal no coincide exactamente con la forma más literal española
    rationale: La nota dice 'en cabeza del pueblo', pero el hebreo בְּרֹאשׁ se refleja mejor literalmente como 'en la cabeza del pueblo' o, si se busca naturalidad en el texto, dejar la literalidad en la nota.
  revised_spanish_text: Proclamaron un ayuno y sentaron a Nabot al frente del pueblo[a].
  revised_footnotes:
  - marker: a
    text: O «ante el pueblo» o «en el lugar más prominente entre el pueblo». La expresión hebrea dice literalmente «en la cabeza del pueblo».
    reason: lexical_alternative
