translation:
  language: es
  text: Su tierra hirvió de ranas[a], aun en las cámaras de sus reyes.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «sus reyes». La forma hebrea es plural; aunque el relato de Éxodo suele hablar de un solo rey, aquí el salmo conserva el plural, quizá como plural poético o colectivo.'
    reason: lexical_alternative
lexical_decisions:
- source_word: שָׁרַץ
  english_pob_choice: swarmed
  chosen_spanish: se llenó
  alternatives_spanish:
  - pululó
  - se atestó
  lexicon: HALOT
  rationale: El verbo hebreo expresa proliferación abundante, como una invasión/abundancia de seres vivos. En español, 'se llenó' comunica el resultado de esa proliferación de manera natural y digna, sin perder la idea de invasión que tiene 'swarmed'.
- source_word: אַרְצָם
  english_pob_choice: their land
  chosen_spanish: su tierra
  alternatives_spanish:
  - la tierra de ellos
  - su país
  lexicon: HALOT
  rationale: La forma con sufijo posesivo plural se refiere a la tierra de ellos; 'su tierra' es la equivalencia más directa y idiomática en español, manteniendo el referente egipcio implícito por el contexto.
- source_word: צְפַרְדְּעִים
  english_pob_choice: frogs
  chosen_spanish: ranas
  alternatives_spanish:
  - sapos
  - ranas y sapos
  lexicon: HALOT
  rationale: El término hebreo designa el animal del relato de la plaga. 'Ranas' es la traducción estándar y más natural en español bíblico contemporáneo; 'sapos' sería menos preciso como equivalente general.
- source_word: בְּחַדְרֵי
  english_pob_choice: in the chambers of
  chosen_spanish: en las cámaras de
  alternatives_spanish:
  - en las habitaciones de
  - dentro de las cámaras de
  lexicon: HALOT
  rationale: '''Cámaras'' conserva el tono elevado del salmo y refleja bien el plural constructo hebreo. ''Habitaciones'' sería más común, pero menos acorde con el registro poético del texto.'
- source_word: מַלְכֵיהֶם
  english_pob_choice: their kings
  chosen_spanish: sus reyes
  alternatives_spanish:
  - su rey
  - los reyes de ellos
  lexicon: HALOT
  rationale: El hebreo tiene forma plural ('sus reyes'), y conviene conservarla en español en lugar de armonizarla con la singularidad de Éxodo 8. Esto respeta la redacción poética del salmo y su posible plural generalizante o colectivo.
theological_decisions:
- issue: Pluralidad de 'sus reyes' frente al relato de Éxodo
  english_pob_reading: The Hebrew uses the plural form 'their kings,' while the Exodus plague narrative commonly speaks of a singular king.
  chosen_spanish_reading: sus reyes
  alternative_spanish_readings:
  - su rey
  rationale: Se mantiene el plural hebreo para no borrar una tensión documental entre el salmo y el relato narrativo de Éxodo. La traducción debe reflejar la forma del texto base, no armonizarla prematuramente.
  doctrine_reference: Salmo 105:30; Éxodo 8
translation_notes:
  revision_awareness: 'Coincide con el último pase: no se documentaron revisiones ni cambios necesarios, y el cotejo cruzado mostró alto acuerdo.'
  spanish_consistency_notes:
  - Se mantiene 'cámaras' para preservar el registro poético y la correspondencia con 'chambers'.
  - Se evita normalizar 'sus reyes' a singular para respetar la forma hebrea y la nota auditada del POB en inglés.
  - Se usa un español simple y reverente, sin introducir armonizaciones interpretativas no exigidas por el hebreo.
