translation:
  language: es
  text: 'Pero un hombre tensó su arco[a] al azar y golpeó al rey de Israel entre las junturas de la armadura y la coraza[c]. Entonces dijo al conductor del carro: «Vuelve tu mano[b] y sácame del campamento, porque estoy herido».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «sin apuntar» / «en su inocencia». El hebreo לְתֻמּוֹ puede expresar simplicidad o inocencia, pero en este contexto de batalla probablemente significa que el arquero disparó sin un objetivo específico.'
    reason: lexical_alternative
  - marker: b
    text: 'Literalmente: «Vuelve tu mano». La expresión probablemente significa girar el carro o maniobrarlo fuera del combate.'
    reason: lexical_alternative
  - marker: c
    text: 'O: «entre las junturas de la armadura y la coraza». La terminología exacta de la armadura es incierta, pero la idea es que la flecha entró por una abertura en la protección del rey.'
    reason: cultural_note
lexical_decisions:
- source_word: מָשַׁךְ בַּקֶּשֶׁת
  english_pob_choice: drew his bow
  chosen_spanish: tensó su arco
  alternatives_spanish:
  - disparó su arco
  - jaló su arco
  lexicon: HALOT
  rationale: El hebreo expresa la acción de tensar el arco para el disparo. En español, «tensó su arco» conserva la imagen sin sonar forzado; «disparó» perdería la metáfora física del acto de tensar.
- source_word: לְתֻמּוֹ
  english_pob_choice: at random
  chosen_spanish: al azar
  alternatives_spanish:
  - sin apuntar
  - sin intención precisa
  - en su inocencia
  lexicon: HALOT
  rationale: En este contexto militar, la frase indica que el hombre no apuntó a un blanco específico. «Al azar» comunica bien esa falta de dirección intencional; la lectura moral de «inocencia» queda reservada en nota.
- source_word: בֵּין הַדְּבָקִים וּבֵין הַשִּׁרְיָן
  english_pob_choice: between the joints of the armor and the breastplate
  chosen_spanish: entre las junturas de la armadura y la coraza
  alternatives_spanish:
  - entre las junturas de la armadura y la corazaza
  - entre las piezas de la armadura y la coraza
  - entre los puntos de unión de la armadura y la coraza
  lexicon: HALOT
  rationale: La frase describe una abertura vulnerable en la protección del rey. «Junturas» mantiene la idea de puntos de unión; «armadura» y «coraza» reflejan el campo semántico de protección corporal sin imponer una reconstrucción técnica excesiva.
- source_word: לָרַכָּב
  english_pob_choice: to the charioteer
  chosen_spanish: al conductor del carro
  alternatives_spanish:
  - al auriga
  - al carretero
  - al conductor del carro de guerra
  lexicon: HALOT
  rationale: «רַכָּב» nombra al que maneja el carro. «Conductor del carro» es claro en español moderno y evita un término demasiado especializado o ambiguo para lectores amplios.
- source_word: הֲפֹךְ יָדֶיךָ
  english_pob_choice: Turn your hand
  chosen_spanish: Vuelve tu mano
  alternatives_spanish:
  - Gira tu mano
  - Maneja el carro
  - Da vuelta
  lexicon: HALOT
  rationale: Se preserva la imagen literal que el POB inglés conserva en el texto principal. La expresión probablemente alude a maniobrar el carro; el español mantiene esa tensión sin reemplazarla por una paráfrasis demasiado interpretativa.
- source_word: וְהוֹצֵאתַנִי מִן הַמַּחֲנֶה
  english_pob_choice: and take me out of the camp
  chosen_spanish: y sáquenme del campamento
  alternatives_spanish:
  - y llévame fuera del campamento
  - y sácame del campamento
  - y retírenme del campamento
  lexicon: HALOT
  rationale: El hebreo pide ser sacado fuera del campamento militar. El imperativo plural «sáquenme» refleja la forma castellana natural del pedido dirigido al conductor y a quienes lo acompañan; «campamento» conserva el sentido militar del término.
- source_word: כִּי הָחֳלֵיתִי
  english_pob_choice: for I am wounded
  chosen_spanish: porque estoy herido
  alternatives_spanish:
  - porque estoy malherido
  - porque estoy enfermo
  - porque estoy lastimado
  lexicon: HALOT
  rationale: Aunque el verbo puede significar enfermar o debilitarse, aquí el contexto inmediato de una flecha que lo alcanza pide el sentido de lesión física. «Estoy herido» sigue el POB inglés y evita intensificar sin base explícita.
theological_decisions:
- issue: 'El sentido de לְתֻמּוֹ: inocencia moral o disparo sin intención'
  english_pob_reading: at random; the archer shot without specific aim
  chosen_spanish_reading: al azar; disparó sin un blanco específico
  alternative_spanish_readings:
  - en su inocencia
  - sin intención
  - sin apuntar
  rationale: La escena narra un hecho de batalla, no una evaluación moral del arquero. Por eso la traducción principal adopta una lectura de falta de puntería o intención concreta, dejando constancia de la posible matización de «inocencia» en nota.
  doctrine_reference: Sin referencia doctrinal específica; decisión semántica contextual
translation_notes:
  revision_awareness: 'Seguí el pasaje inglés auditado y su revisión más reciente: se evitó intensificar la herida más allá de «wounded», y se prefirió una expresión que conserve la imagen hebrea de las junturas de la armadura. También se mantuvo la ambigüedad de הֲפֹךְ יָדֶיךָ en el texto principal, con explicación en nota.'
  spanish_consistency_notes:
  - Se usó «Yahvé» solo cuando el texto hebreo lo exigiría explícitamente; en este versículo no aparece el nombre divino.
  - Se tradujo el lenguaje militar con términos naturales en español («armadura», «coraza», «conductor del carro») sin reemplazar la imagen del texto.
  - Se mantuvo la diferencia entre la acción de tensar el arco y el efecto de herir, siguiendo la distinción del hebreo y del POB inglés.
