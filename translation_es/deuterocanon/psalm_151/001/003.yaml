translation:
  language: es
  text: ¿Y quién anunciará[a] a mi Señor? El Señor mismo[b], él mismo oye.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «¿Y quién reportará a mi Señor?» o «¿Y quién declarará a mi Señor?». El verbo griego puede significar «anunciar», «reportar» o «declarar».
    reason: lexical_alternative
  - marker: b
    text: 'El griego repite el pronombre para dar énfasis: «El Señor mismo, él mismo oye».'
    reason: lexical_alternative
lexical_decisions:
- source_word: τίς
  english_pob_choice: who
  chosen_spanish: quién
  alternatives_spanish:
  - qué persona
  lexicon: BDAG
  rationale: El interrogativo introduce una pregunta retórica; «quién» es el equivalente natural y directo en español.
- source_word: ἀναγγελεῖ
  english_pob_choice: will report
  chosen_spanish: lo anunciará
  alternatives_spanish:
  - lo reportará
  - lo declarará
  - se lo dirá
  lexicon: BDAG
  rationale: El verbo puede significar dar noticia, anunciar o declarar. «Lo anunciará» conserva el valor de hacer saber algo y suena más natural en español bíblico que un calco como «reportará».
- source_word: τῷ κυρίῳ μου
  english_pob_choice: to my Lord
  chosen_spanish: a mi Señor
  alternatives_spanish:
  - a mi Señor/Maestro
  lexicon: BDAG
  rationale: κύριος se traduce aquí como «Señor», siguiendo el uso de título reverencial del texto. El posesivo «mi» se mantiene para reflejar la relación expresada en el griego.
- source_word: αὐτός
  english_pob_choice: himself
  chosen_spanish: mismo
  alternatives_spanish:
  - él mismo
  lexicon: BDAG
  rationale: El pronombre es enfático; «mismo» junto con «él mismo» en la segunda parte reproduce esa insistencia sin sonar forzado.
- source_word: Κύριος
  english_pob_choice: the Lord
  chosen_spanish: el Señor
  alternatives_spanish:
  - Señor
  lexicon: BDAG
  rationale: Se conserva la terminología estándar del proyecto para κύριος como título divino/reverencial. En español, el artículo hace natural la repetición enfática.
- source_word: εἰσακούει
  english_pob_choice: hears
  chosen_spanish: oye
  alternatives_spanish:
  - escucha
  - atiende
  lexicon: BDAG
  rationale: εἰσακούω puede implicar oír favorablemente o prestar oído. «Oye» es breve y fiel al sentido básico sin añadir más que el griego exige; «escucha» o «atiende» ya interpretan más.
theological_decisions:
- issue: Renderización de κύριος en ambas apariciones
  english_pob_reading: Lord / the Lord
  chosen_spanish_reading: Señor / el Señor
  alternative_spanish_readings:
  - maestro
  - dueño
  rationale: El versículo usa κύριος primero como vocativo posesivo («mi Señor») y luego como sujeto enfático. En español, «Señor» mantiene el valor de título y evita debilitar la referencia reverencial con «maestro» o «dueño».
  doctrine_reference: 'DOCTRINE.md Contested terms: κύριος → Lord'
- issue: Repetición enfática con αὐτός αὐτός
  english_pob_reading: The Lord himself, he himself hears
  chosen_spanish_reading: el Señor mismo, él mismo oye
  alternative_spanish_readings:
  - el Señor mismo oye
  - el Señor oye
  rationale: El griego duplica el pronombre para enfatizar. La duplicación en español («mismo... él mismo») preserva esa intensidad y evita borrar una tensión estilística presente en el original.
  doctrine_reference: Greek emphasis / anaphora in poetic style
translation_notes:
  revision_awareness: Se siguió el ajuste del registro inglés para colocar la nota léxica junto a «anunciará» y no junto a la cláusula final. También se respetó la decisión auditada de mantener el énfasis del doble αὐτός en la segunda oración.
  spanish_consistency_notes:
  - Se mantiene «Señor» para κύριος, coherente con el resto del proyecto.
  - Se prefirió «oye» para εἰσακούει porque el contexto no obliga a expresar respuesta favorable explícita.
  - La partícula interrogativa y la estructura breve conservan el tono poético y retórico del griego.
  - La nota [b] se vincula a la repetición enfática del pronombre, no a una variante textual.
