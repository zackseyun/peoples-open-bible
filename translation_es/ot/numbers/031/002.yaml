review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura y el sentido general del hebreo: un mandato directo a Moisés para ejecutar venganza en favor de Israel contra Madián, seguido del modismo de muerte «serás reunido a tu pueblo». Sin embargo, la formulación principal «Venga venganza» no representa fielmente un imperativo natural de 2ª persona singular en español; suena defectuosa y puede leerse como subjuntivo/jusivo impersonal. También «sobre los madianitas» es menos natural en español con «venganza» que «contra los madianitas».'
  spanish_quality_summary: La frase inicial no es idiomática ni clara en español moderno y digno. «Toma venganza» o «Ejecuta venganza» serían naturales; «Toma venganza» además coincide con la decisión auditada en inglés. La segunda cláusula es buena y legible; «serás reunido a tu pueblo» funciona, aunque «reunido con tu pueblo» sería más idiomático, pero conservar «a» mantiene mejor el giro hebreo y el precedente inglés. Las notas necesitan ajustarse al texto revisado.
  glossary_alignment: No hay conflictos con la terminología base del proyecto. «los hijos de Israel» preserva bien בני ישראל. «venganza» mantiene נקם/נקמת con su fuerza léxica. «serás reunido a tu pueblo» preserva correctamente el modismo de muerte. El cambio recomendado es estilístico-gramatical y de fidelidad funcional al imperativo, no terminológico.
