base_translation:
  language: en
  yaml_path: translation/ot/numbers/020/026.yaml
  text: Strip Aaron of his garments and put them on Eleazar his son[b][a]. Then Aaron will be gathered to his people and die there.
  footnotes:
  - marker: a
    text: Or, more explicitly in context, 'his priestly garments.' The Hebrew says simply 'his garments.'
    reason: lexical_alternative
  - marker: b
    text: '''Will be gathered'' is a Hebrew idiom used of death; compare the fuller expression ''gathered to his people'' elsewhere.'
    reason: cross_reference
