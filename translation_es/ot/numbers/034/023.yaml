translation:
  language: es
  text: 'Para los hijos de José[a], para la tribu de los hijos de Manasés: un líder, Janiel hijo de Efod.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «descendientes de José ... descendientes de Manasés». El hebreo repite «hijos de» en lenguaje tribal-genealógico.
    reason: lexical_alternative
lexical_decisions:
- source_word: לִ/בְנֵי יוֹסֵף
  english_pob_choice: For the sons of Joseph
  chosen_spanish: Para los hijos de José
  alternatives_spanish:
  - Para los descendientes de José
  - Para los hijos de José
  lexicon: HALOT
  rationale: En este registro tribal, בְּנֵי conserva la forma genealógica «hijos de». «José» se mantiene como nombre propio bíblico estándar en español. «Para» refleja el לְ inicial de destinación/asignación administrativa.
- source_word: לְ/מַטֵּה
  english_pob_choice: for the tribe of
  chosen_spanish: para la tribu de
  alternatives_spanish:
  - para el bastón de
  - para la vara de
  lexicon: HALOT
  rationale: En contextos de censo y reparto territorial, מַטֶּה significa idiomáticamente «tribu». «Tribu» en español preserva ese valor administrativo y evita el sentido literal de «vara» o «bastón».
- source_word: בְנֵי מְנַשֶּׁה
  english_pob_choice: the sons of Manasseh
  chosen_spanish: los hijos de Manasés
  alternatives_spanish:
  - los descendientes de Manasés
  - los hijos de Manasés
  lexicon: HALOT
  rationale: Se conserva la construcción genealógica hebrea con «hijos de». «Manasés» es la forma usual y reconocible en español para el nombre tribal/personal.
- source_word: נָשִׂיא
  english_pob_choice: a leader
  chosen_spanish: un líder
  alternatives_spanish:
  - un jefe
  - un príncipe
  - un caudillo
  lexicon: HALOT
  rationale: נָשִׂיא designa aquí un jefe designado de la tribu. «Líder» comunica la función administrativa sin introducir matices monárquicos que «príncipe» podría sugerir en español.
- source_word: חַנִּיאֵל
  english_pob_choice: Hanniel
  chosen_spanish: Hanniel
  alternatives_spanish:
  - Janniel
  lexicon: standard transliteration
  rationale: Nombre propio transliterado. Se mantiene la forma convencional en español, coherente con el audit trail inglés.
- source_word: בֶּן אֵפֹד
  english_pob_choice: son of Ephod
  chosen_spanish: hijo de Efod
  alternatives_spanish:
  - hijo de Éfod
  - hijo de Ephod
  lexicon: HALOT
  rationale: La construcción patronímica se traduce de forma directa. Aquí אֵפֹד funciona como nombre propio, no como la vestidura sacerdotal, por lo que se translitera como nombre personal en español.
translation_notes:
  revision_awareness: El texto fuente y el control inglés coinciden de manera alta; no se detectaron revisiones sustantivas en el pasaje. La versión española sigue la estructura administrativa y genealógica del hebreo sin añadir información.
  spanish_consistency_notes:
  - Se mantuvo la repetición de la fórmula genealógica «hijos de» para respetar el paralelismo del hebreo.
  - «Líder» se eligió como equivalente funcional de נָשִׂיא en un contexto de nombramiento tribal.
  - Se conservó la transliteración de los nombres propios bíblicos habituales en español.
  - La nota al pie marca la alternativa semántica de «descendientes» para reflejar el rango genealógico del hebreo.
