id: 1TI.3.1
reference: 1 Timothy 3:1
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: Πιστὸς ὁ λόγος· εἴ τις ἐπισκοπῆς ὀρέγεται, καλοῦ ἔργου ἐπιθυμεῖ.
base_translation:
  language: en
  yaml_path: translation/nt/1_timothy/003/001.yaml
  text: 'This saying is trustworthy: if anyone aspires to oversight[b][a], he desires a good work.'
  footnotes:
  - marker: a
    text: Or 'the office of overseer'; traditionally, 'bishopric.'
    reason: alternative_reading
  - marker: b
    text: Or 'a noble task.'
    reason: lexical_alternative
translation:
  language: ko
  text: '이 말씀은 신실합니다: 누구든지 감독의 직분[a]을 사모하면 그는 선한 일[b]을 사모하는 것입니다.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 또는 「감독의 직무」 「감독직」; 전통적으로 「감독직」.
    reason: alternative_reading
  - marker: b
    text: 또는 「귀한 일」 「고귀한 사역」.
    reason: lexical_alternative
lexical_decisions:
- source_word: Πιστὸς ὁ λόγος
  english_pob_choice: This saying is trustworthy
  chosen_korean: 이 말씀은 신실합니다
  alternatives_korean:
  - 이 말씀은 미쁩니다
  - 이 말씀은 믿을 만합니다
  lexicon: BDAG
  rationale: 1:15와 일관.
- source_word: ἐπισκοπῆς
  english_pob_choice: oversight
  chosen_korean: 감독의 직분
  alternatives_korean:
  - 감독의 직무
  - 감독직
  lexicon: BDAG
  rationale: ἐπισκοπή는 ἐπίσκοπος(감독)의 직위·직무. 한국 신학 어휘 「감독의 직분」.
- source_word: ὀρέγεται
  english_pob_choice: aspires
  chosen_korean: 사모하면
  alternatives_korean:
  - 갈망하면
  - 추구하면
  lexicon: BDAG
  rationale: ὀρέγω의 「뻗어 잡으려 함」을 「사모」로 옮긴다. 「갈망」은 강도가 너무 강하다.
- source_word: καλοῦ ἔργου ἐπιθυμεῖ
  english_pob_choice: he desires a good work
  chosen_korean: 그는 선한 일을 사모하는 것입니다
  alternatives_korean:
  - 그는 귀한 사역을 갈망하는 것입니다
  lexicon: BDAG
  rationale: ἐπιθυμέω의 「열망」을 앞 ὀρέγεται와 어휘적 변화를 위해 「사모하는 것입니다」로 옮겨 두 어휘의 흐름을 살린다.
