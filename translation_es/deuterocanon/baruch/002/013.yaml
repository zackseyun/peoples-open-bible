translation:
  language: es
  text: Que tu ira se aparte de nosotros[a], porque hemos quedado pocos entre las naciones adonde nos dispersaste.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «tu ira se aparte de nosotros».'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀποστραφήτω
  english_pob_choice: Let ... turn away
  chosen_spanish: Que ... se aparte
  alternatives_spanish:
  - Que ... se vuelva
  - Que ... se retire
  lexicon: BDAG
  rationale: El verbo en griego funciona como una súplica jussiva. En español, «Que ... se aparte» conserva el valor de petición y suena natural y solemne sin añadir contenido ajeno.
- source_word: ὁ θυμός σου
  english_pob_choice: your wrath
  chosen_spanish: tu ira
  alternatives_spanish:
  - tu furor
  - tu enojo
  lexicon: LEH
  rationale: En este contexto de oración penitencial, el campo semántico apunta a la indignación divina. «Ira» mantiene la gravedad del juicio; «furor» sería más intenso y «enojo» demasiado suave.
- source_word: ἀφ᾽ ἡμῶν
  english_pob_choice: from us
  chosen_spanish: de nosotros
  alternatives_spanish:
  - lejos de nosotros
  - apartado de nosotros
  lexicon: BDAG
  rationale: La preposición expresa alejamiento respecto de los suplicantes. En combinación con «se aparte», «de nosotros» transmite el sentido de forma idiomática.
- source_word: ὅτι
  english_pob_choice: for
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  lexicon: BDAG
  rationale: Introduce la base de la súplica. «Porque» expresa claramente la relación causal en español actual.
- source_word: κατελείφθημεν
  english_pob_choice: we have been left
  chosen_spanish: hemos quedado
  alternatives_spanish:
  - hemos sido dejados
  - hemos sido abandonados
  lexicon: LEH
  rationale: El pasivo griego describe el estado resultante de haber quedado como remanente. «Hemos quedado» preserva ese resultado sin forzar una pasiva poco natural en español.
- source_word: ὀλίγοι
  english_pob_choice: few
  chosen_spanish: pocos
  alternatives_spanish:
  - unos pocos
  - muy pocos
  lexicon: BDAG
  rationale: Adjetivo predicativo simple. «Pocos» es fiel y no intensifica más de lo que dice el griego.
- source_word: ἐν τοῖς ἔθνεσιν
  english_pob_choice: among the nations
  chosen_spanish: entre las naciones
  alternatives_spanish:
  - entre los pueblos
  - en medio de las naciones
  lexicon: BDAG
  rationale: En contexto exílico, ἔθνη se refiere a naciones extranjeras. «Entre las naciones» es natural en español y conserva el matiz de estar dispersos en medio de otros pueblos.
- source_word: οὗ διέσπειρας ἡμᾶς
  english_pob_choice: where you scattered us
  chosen_spanish: adonde nos dispersaste
  alternatives_spanish:
  - donde nos dispersaste
  - entre las cuales nos dispersaste
  lexicon: LEH
  rationale: διέσπειρας evoca dispersión en el exilio. «Dispersaste» conserva la imagen fuerte; «adonde» refleja el valor locativo del relativo y enlaza bien con el movimiento implícito de la dispersión.
theological_decisions:
- issue: Intensidad del término para la ira divina
  english_pob_reading: wrath
  chosen_spanish_reading: ira
  alternative_spanish_readings:
  - enojo
  - furor
  rationale: La petición implora la cesación de un juicio divino real. «Ira» conserva la seriedad teológica del texto sin cargarlo con un tono más extremo que el griego.
  doctrine_reference: 'DOCTRINE.md: preservar el peso teológico sin sobreinterpretar'
- issue: Valor del pasivo en κατελείφθημεν
  english_pob_reading: we have been left
  chosen_spanish_reading: hemos quedado
  alternative_spanish_readings:
  - hemos sido dejados
  - hemos sido abandonados
  rationale: La forma griega destaca el estado presente de un pueblo reducido. «Hemos quedado» mantiene la idea de remanente y evita una pasiva castellana más pesada o más interpretativa.
  doctrine_reference: 'DOCTRINE.md: equivalencia óptima con transparencia sintáctica'
translation_notes:
  revision_awareness: 'La redacción sigue el patrón revisado en el audit trail inglés: se mantiene la petición jussiva, se conserva la causalidad de ὅτι con «porque», y no se añade ningún equivalente redundante para ἐκεῖ, ya que en español la frase queda completa sin un «allí» explícito.'
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el texto fuente lo exige; aquí no aparece el nombre divino, sino la referencia pronominal a Dios.
  - Se mantiene «naciones» para ἔθνη, en continuidad con el registro exílico y con el uso POB.
  - «Dispersaste» conserva la imagen del exilio sin suavizarla a «exiliaste» o «desterraste».
