review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien el griego y el audit trail inglés en los elementos principales: conserva el motivo de celo (ἐζήλωσεν), la imagen corporal de agitación interior (οἱ νεφροὶ αὐτοῦ → ‘entrañas’), la ambigüedad judicial de κατὰ τὸ κρίμα, la rapidez de δραμὼν y la crudeza de ἔσφαξεν. Sin embargo, hay dos desajustes menores pero reales: el texto coloca la nota [a] sobre ‘tuvo celo’ cuando la nota explica ‘sus riñones temblaron’, y ‘corriendo subió’ añade una idea espacial de ascenso más fuerte de lo que exige el griego, que solo marca aproximación rápida.'
  spanish_quality_summary: El español es claro y legible, con buen registro bíblico moderno. ‘Sus entrañas temblaron’ y ‘conforme al juicio’ funcionan bien. ‘Tuvo celo’ es comprensible pero algo menos natural en español que ‘ardió de celo’; aun así, puede mantenerse por cercanía formal. La principal reparación necesaria es mover la nota [a] al segmento de las entrañas y suavizar ‘corriendo subió’ a una formulación más natural y más ajustada, como ‘corriendo hacia él’.
  glossary_alignment: No hay conflictos con la terminología base del proyecto. No aparecen Yahvé/Mesías/Cristo ni otros términos sensibles del glosario. ‘Juicio’, ‘ira’, ‘entrañas’ y ‘degolló’ son compatibles con las decisiones léxicas documentadas. La elección ‘degolló’ preserva bien la fuerza de σφάζω.
  issues:
  - severity: medium
    issue: La nota [a] está anclada en ‘tuvo celo’, pero su contenido explica ‘sus riñones temblaron’.
    rationale: Las notas deben anclarse exactamente en la palabra o frase pertinente. Tal como está, induce a error sobre qué expresión comenta la nota cultural.
  - severity: medium
    issue: ‘Corriendo subió’ sobretraduce δραμὼν.
    rationale: El participio expresa acción rápida; ‘subió’ introduce una noción direccional/elevacional más específica que no es necesaria y puede sonar forzada en español. ‘Corriendo hacia él’ o ‘corriendo’ preserva mejor el valor del griego y la naturalidad.
  - severity: low
    issue: ‘Tuvo celo’ es algo rígido en español narrativo.
    rationale: No es incorrecto y conserva el motivo teológico, pero suena menos idiomático que alternativas como ‘ardió de celo’. Dado el compromiso de cercanía formal, puede mantenerse.
  revised_spanish_text: Y Matatías lo vio y tuvo celo; y sus entrañas[a] temblaron, y sacó ira conforme al juicio[b], y corriendo hacia él lo degolló sobre el altar.
  revised_footnotes:
