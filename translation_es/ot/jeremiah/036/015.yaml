translation:
  language: es
  text: 'Y ellos le dijeron[a]: «Por favor, siéntate y léelo para que lo oigamos». Entonces Baruc lo leyó para que lo oyeran.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Literalmente: «en nuestros oídos» y «en sus oídos». Es un hebraísmo que significa «de modo que pudiéramos oírlo / pudieran oírlo».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמְרוּ אֵלָיו
  english_pob_choice: And they said to him
  chosen_spanish: Y ellos le dijeron
  alternatives_spanish:
  - Entonces le dijeron
  - Y le dijeron
  lexicon: HALOT
  rationale: El hebreo avanza la narración con waw consecutivo; «Y ellos le dijeron» conserva el flujo y mantiene el referente explícito sin añadir matiz interpretativo.
- source_word: שֵׁב נָא
  english_pob_choice: Please sit down
  chosen_spanish: Por favor, siéntate
  alternatives_spanish:
  - Siéntate, por favor
  - Por favor, toma asiento
  lexicon: HALOT
  rationale: שֵׁב es el imperativo de sentarse; en español «siéntate» es natural y fiel. נָא expresa ruego/cortesía, bien reflejado con «por favor».
- source_word: וּקְרָאֶנָּה
  english_pob_choice: and read it
  chosen_spanish: y léelo
  alternatives_spanish:
  - y lee esto
  - y proclámalo
  lexicon: HALOT
  rationale: El sufijo femenino singular remite al rollo/documento ya mencionado; en español el objeto directo se expresa naturalmente con «lo». «Léelo» conserva la acción de leer sin sobredeterminarla como «proclamar».
- source_word: בְּאָזְנֵינוּ
  english_pob_choice: in our hearing
  chosen_spanish: en nuestros oídos
  alternatives_spanish:
  - en nuestra audiencia
  - para que lo oigamos
  lexicon: HALOT
  rationale: La expresión hebrea es literalmente «en nuestros oídos». Aquí se conserva la imagen semítica con una frase española comprensible y reverente; no se sustituye por una paráfrasis más libre.
- source_word: וַיִּקְרָא בָרוּךְ
  english_pob_choice: So Baruch read
  chosen_spanish: Entonces Baruc lo leyó
  alternatives_spanish:
  - Y Baruc lo leyó
  - Así que Baruc lo leyó
  lexicon: HALOT
  rationale: Se mantiene la respuesta narrativa de Baruc. «Entonces» transmite bien la secuencia; «lo» retoma el rollo previamente referido.
- source_word: בְּאָזְנֵיהֶם
  english_pob_choice: in their hearing
  chosen_spanish: en sus oídos
  alternatives_spanish:
  - en su audiencia
  - para que lo oyeran
  lexicon: HALOT
  rationale: Se conserva la repetición del mismo hebraísmo del inicio. «En sus oídos» refleja con transparencia la expresión idiomática, dejando visible el paralelismo del texto.
translation_notes:
  revision_awareness: El pasaje coincide plenamente con el texto hebreo y con la línea de traducción inglesa auditada; no se observaron revisiones aplicadas ni tensiones textuales adicionales.
  spanish_consistency_notes:
  - Se usa «Baruc» para el nombre propio conforme a la forma española habitual del personaje.
  - Se preserva el paralelismo de la expresión hebrea «en nuestros oídos / en sus oídos» para mantener visible el mismo giro idiomático en ambas mitades del verso.
  - El tono de cortesía se expresa con «por favor», equivalente funcional de נָא en este contexto.
