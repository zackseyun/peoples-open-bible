  yaml_path: translation/ot/ecclesiastes/003/019.yaml
  text: 'For the fate of the sons of man and the fate of the beast is one fate for them: as this one dies[a], so dies that one, and one breath is for all. Man has no advantage over the beast, for all is vapor.'
  footnotes:
