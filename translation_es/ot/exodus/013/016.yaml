review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español sigue bien el hebreo y el rastro del POB inglés: mantiene la literalidad de «mano» y «entre tus ojos», usa «Yahvé» para יהוה, y conserva la apertura interpretativa sobre טוֹטָפֹת mediante una nota. Sin embargo, hay un ajuste importante: el hebreo/POB inglés dice «as a sign ... and as frontlets», no «como una señal ... y como frontales» en ambos miembros; en español suena más natural y preciso «sea una señal ... y frontales». Además, «sobre tu mano» puede afinarse a «en tu mano» para mayor naturalidad sin perder fidelidad.'
  spanish_quality_summary: El texto es claro y digno, pero «como frontales» después de «y» resulta algo forzado en español. También la colocación de notas [a][b] está invertida respecto al orden del POB inglés, aunque no es un error grave si ambas anclan en la frase correcta. La redacción propuesta mejora fluidez y naturalidad manteniendo el contenido.
  glossary_alignment: 'Alineado en lo esencial con la terminología del proyecto: יהוה -> «Yahvé» correctamente; no introduce «SEÑOR». No hay conflicto con otros términos doctrinales clave. «Frontales» es aceptable como equivalente de «frontlets», con nota que preserve «bandas/filacterias».'
  issues:
