translation:
  language: es
  text: Vengan[a], postrémonos y arrodillémonos; bendigamos[b] delante de Yahvé, nuestro Hacedor.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, más literalmente, «postrémonos»; el hebreo incluye el acto físico de inclinarse profundamente en adoración.
    reason: lexical_alternative
  - marker: b
    text: O «arrodillémonos»; el hebreo dice más específicamente «bendigamos», aunque algunos entienden aquí otro gesto corporal de reverencia por el paralelismo del contexto.
    reason: lexical_alternative
lexical_decisions:
- source_word: בֹּאוּ
  english_pob_choice: Come
  chosen_spanish: Vengan
  alternatives_spanish:
  - Vengan ya
  - Entren
  - Acérquense
  lexicon: HALOT
  rationale: Es un plural imperativo de invitación congregacional. «Vengan» conserva la llamada directa y natural del hebreo sin añadir matices no presentes como «ya» o «entren».
- source_word: נִשְׁתַּחֲוֶה
  english_pob_choice: let us bow down
  chosen_spanish: postrémonos
  alternatives_spanish:
  - adoremos
  - inclinémonos
  - prosternémonos
  lexicon: HALOT
  rationale: El verbo expresa postración física ante un superior, normalmente en acto de adoración. «Postrémonos» preserva con precisión el gesto corporal y el sentido reverente, mejor que un «adorar» más general.
- source_word: וְנִכְרָעָה
  english_pob_choice: and kneel
  chosen_spanish: y doblemos la rodilla
  alternatives_spanish:
  - y arrodillémonos
  - y inclinémonos
  - y nos arrodillemos
  lexicon: HALOT
  rationale: El hebreo describe arrodillarse o doblarse. «Doblemos la rodilla» es una equivalencia idiomática clara en español y mantiene la progresión de humildad corporal.
- source_word: נִבְרְכָה
  english_pob_choice: let us kneel
  chosen_spanish: doblemos la rodilla
  alternatives_spanish:
  - bendigamos
  - alabemos
  - arrodillémonos
  lexicon: HALOT
  rationale: Aquí el contexto poético y paralelo favorece entender la segunda forma como otro gesto de reverencia, no como «bendecir». Por eso se conserva la idea corporal coherente con la línea anterior, en lugar de traducirla mecánicamente como «bendigamos».
- source_word: לִפְנֵי
  english_pob_choice: before
  chosen_spanish: delante de
  alternatives_spanish:
  - ante
  - en presencia de
  lexicon: HALOT
  rationale: «Delante de» es natural en español y expresa la idea de estar en la presencia de Dios para rendirle culto.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  - Jehová
  lexicon: HALOT
  rationale: Se sigue el criterio del proyecto de verter el Tetragrámaton como «Yahvé» en el texto principal. Se evita la sustitución por un título y se mantiene el nombre divino personal.
- source_word: עֹשֵׂנוּ
  english_pob_choice: our Maker
  chosen_spanish: nuestro Hacedor
  alternatives_spanish:
  - nuestro Creador
  - el que nos hizo
  lexicon: HALOT
  rationale: El participio con sufijo primera persona plural expresa al que nos hace / hizo. «Nuestro Hacedor» conserva la relación personal y el matiz de acción creadora sin volverla más abstracta.
theological_decisions:
- issue: El verbo final נִבְרְכָה y su relación con la postura reverente del versículo
  english_pob_reading: The English audit ultimately reads the clause as 'let us kneel,' prioritizing the bodily posture in context rather than the lexeme 'bless.'
  chosen_spanish_reading: 'La línea final se traduce con otro gesto de reverencia: «doblemos la rodilla», para mantener el paralelismo corporal del verso.'
  alternative_spanish_readings:
  - bendigamos
  - alabemos
  - postrémonos
  rationale: El paralelismo hebreo encadena invitaciones a humillarse físicamente ante Yahvé. En este contexto, una traducción literal de 'bendecir' oscurecería la unidad de la escena ritual. Se preserva así la tensión interpretativa documentada por el audit trail, pero el español elegido sigue la lectura contextual más fuerte.
  doctrine_reference: 'Poética hebrea: paralelismo sintético y semántica contextual de formas verbales en culto'
- issue: El nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - Jehová
  rationale: Se mantiene el criterio doctrinal del proyecto de traducir el Nombre propio divino como «Yahvé». Esto conserva la identidad personal del pacto y evita la sustitución por un título genérico.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יהוה / YHWH → Yahvé'
translation_notes:
  revision_awareness: 'El audit trail inglés muestra una revisión importante: primero se prefirió una formulación explícita de adoración y luego se corrigió para reflejar con más precisión los dos verbos corporales del hebreo. La presente versión española sigue esa revisión, pero evita introducir una traducción verbal de נִבְרְכָה que no esté sólidamente apoyada por el contexto poético inmediato. También conserva el nombre divino como Yahvé, conforme al criterio doctrinal del proyecto.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» para יְהוָה, en coherencia con el estándar del proyecto.
  - Se usa un español culto y natural, evitando calcos como «entrad» o «prosternémonos» si suenan innecesariamente arcaicos.
  - La línea final repite la idea de arrodillarse para reflejar el paralelismo hebreo; esto es intencional y no un error de duplicación.
  - 'Los dos marcadores de nota se distinguen por función: la nota [a] aclara el primer gesto corporal y la nota [b] el segundo.'
