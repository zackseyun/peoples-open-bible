lexical_decisions:
- source_word: בַּשְּׁפֵלָה
  english_pob_choice: In the lowland
  chosen_spanish: En la Sefelá
  alternatives_spanish:
  - En la llanura baja
  - En las tierras bajas
  lexicon: HALOT
  rationale: El término hebreo nombra la región de las estribaciones o tierras bajas de Judá. En español, «Sefelá» conserva el nombre geográfico técnico del territorio y evita perder la referencia regional precisa; la alternativa «llanura baja» comunica el sentido, pero borra el topónimo histórico.
- source_word: אֶשְׁתָּאֹל
  english_pob_choice: Eshtaol
  chosen_spanish: Eshtaol
  alternatives_spanish:
  - Estaol
  lexicon: Nombre propio
  rationale: Es nombre de lugar; se translitera. Se mantiene «Eshtaol» por ser la forma más reconocible y cercana al hebreo, acorde con la decisión inglesa de no traducir topónimos.
- source_word: וְצָרְעָה
  english_pob_choice: Zorah
  chosen_spanish: Zorá
  alternatives_spanish:
  - Zora
  - Zorah
  lexicon: Nombre propio
  rationale: Es un nombre de lugar. Se usa una forma española breve y pronunciable, con tilde para marcar la acentuación final. «Zorah» refleja la transliteración inglesa, pero en español «Zorá» resulta más natural y legible sin alterar la referencia del topónimo.
- source_word: וְאַשְׁנָה
  english_pob_choice: and Ashnah
  chosen_spanish: Ajsná
  alternatives_spanish:
  - Asná
  - Ashná
  lexicon: Nombre propio
  rationale: Es nombre de lugar. Se translitera con «j» para reflejar la fricativa gutural del hebreo /ʃ/ y evitar una lectura demasiado anglicizada; la tilde indica la acentuación final. «Asná» sería más simplificada, pero perdería algo de cercanía fonética con el original.
translation_notes:
  revision_awareness: El texto inglés auditado mantiene la estructura de lista de lugares y no requiere correcciones textuales; la única decisión interpretativa relevante es cómo verter בַּשְּׁפֵלָה. Se preserva la toponimia sin añadir elementos inexistentes.
  spanish_consistency_notes:
  - 'Se conserva el orden del hebreo: región seguida de tres nombres de lugares.'
  - Se usa una nota para la alternativa de lectura geográfica, como en el audit trail inglés.
  - Se mantiene un registro toponímico uniforme con acentuación española para facilitar la lectura pública.
