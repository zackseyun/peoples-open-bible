base_translation:
  language: en
  yaml_path: translation/extra_canonical/gospel_of_thomas/054.yaml
  text: Jesus said[a], “Blessed are the poor[f][e][d][c][b], for yours is the kingdom of the heavens.”
  footnotes:
  - marker: a
    text: ‘Blessed’ could also be rendered ‘Happy’ or ‘How fortunate,’ but the beatitude formula and evaluative tone favor ‘Blessed.’
    reason: lexical_alternative
  - marker: b
    text: Coptic ⲡϩⲏⲕⲉ is singular (‘the poor person’) used generically; English ‘the poor’ reflects the collective sense.
    reason: dialect_note
  - marker: c
    text: ⲡⲙⲛⲧⲣⲣⲟ may also be translated ‘kingdom’ or ‘reign.’ ‘Kingship’ emphasizes sovereignty rather than a place.
    reason: lexical_alternative
  - marker: d
    text: Compare Luke 6:20 (‘Blessed are you poor, for yours is the kingdom of God’) and Matthew 5:3 (‘Blessed are the poor in spirit, for theirs is the kingdom of heaven’). Thomas’s wording differs in address and attribute.
    reason: cross_reference
  - marker: e
    text: ‘Of the heavens’ reproduces the explicit plural in Coptic (ⲛⲡⲡⲉ), a Thomasine phrasing not to be conflated with ‘of God.’
    reason: dialect_note
  - marker: f
    text: Or 'Jesus said, “Blessed are the poor, for yours is the kingship of the heavens.”'.
    reason: previous_rendering
