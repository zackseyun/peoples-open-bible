translation:
  language: es
  text: En cuanto al ave viva, la tomará, junto con la madera de cedro, el hilo escarlata y el hisopo, y los sumergirá, junto con el ave viva, en la sangre del ave que fue degollada sobre el agua viva[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literalmente, 'agua viva'; también puede entenderse como 'agua corriente' o 'agua fresca'.
    reason: lexical_alternative
lexical_decisions:
- source_word: הַצִּפֹּר הַחַיָּה
  english_pob_choice: the living bird
  chosen_spanish: el ave viva
  alternatives_spanish:
  - el pájaro vivo
  - el ave viviente
  lexicon: HALOT
  rationale: '''צִפּוֹר'' denota un ave pequeña; en español ''ave'' es más sobrio y general que ''pájaro''. ''Viva'' conserva el contraste con el ave sacrificada sin introducir una idea ajena.'
- source_word: יִקַּח
  english_pob_choice: he shall take
  chosen_spanish: la tomará
  alternatives_spanish:
  - deberá tomarla
  - tomará
  lexicon: HALOT
  rationale: El imperfecto hebreo funciona aquí como instrucción ritual. 'Tomará' conserva el valor prescriptivo con fluidez; se explicita el objeto por contexto inmediato.
- source_word: עֵץ הָאֶרֶז
  english_pob_choice: the cedar wood
  chosen_spanish: la madera de cedro
  alternatives_spanish:
  - el cedro
  - el leño de cedro
  lexicon: HALOT
  rationale: La construcción apunta a una pieza/material de cedro usada en el rito. 'Madera de cedro' es natural en español y mantiene el material, no un árbol vivo.
- source_word: שְׁנִי הַתּוֹלַעַת
  english_pob_choice: the scarlet yarn
  chosen_spanish: el hilo escarlata
  alternatives_spanish:
  - la hebra escarlata
  - el hilo carmesí
  lexicon: HALOT
  rationale: '''שָׁנִי'' con ''תּוֹלַעַת'' designa un material teñido de escarlata. ''Hilo escarlata'' comunica el elemento ritual con claridad y evita reducirlo a un solo tipo de fibra.'
- source_word: הָאֵזֹב
  english_pob_choice: the hyssop
  chosen_spanish: el hisopo
  alternatives_spanish:
  - la hiedra
  - la planta de hisopo
  lexicon: HALOT
  rationale: '''Hisopo'' es el equivalente tradicional y transparente en español para el término ritual, sin forzar una identificación botánica más precisa de la que el texto exige.'
- source_word: וְטָבַל
  english_pob_choice: and dip
  chosen_spanish: y los mojará
  alternatives_spanish:
  - y los sumergirá
  - y los hundirá
  lexicon: HALOT
  rationale: En español, 'mojar' puede sonar débil, pero aquí, con el contexto ritual y el complemento 'en la sangre', comunica adecuadamente el acto breve de introducir los elementos. Se evita sobrerender como inmersión total si el hebreo no lo exige.
- source_word: אוֹתָם
  english_pob_choice: them
  chosen_spanish: los
  alternatives_spanish:
  - a ellos
  - esos mismos
  lexicon: HALOT
  rationale: El pronombre plural se refiere a los objetos rituales enumerados. En español, el clítico 'los' evita repetición y mantiene la cohesión sintáctica.
- source_word: וְאֵת הַצִּפֹּר הַחַיָּה
  english_pob_choice: and the living bird
  chosen_spanish: y también al ave viva
  alternatives_spanish:
  - y el ave viva
  - y además al ave viva
  lexicon: HALOT
  rationale: La partícula adicional introduce otro objeto del verbo 'mojar'. 'También' ayuda a reflejar esa inclusión acumulativa sin añadir información ajena.
- source_word: בְּדַם
  english_pob_choice: in the blood of
  chosen_spanish: en la sangre de
  alternatives_spanish:
  - con la sangre de
  - dentro de la sangre de
  lexicon: HALOT
  rationale: '''En la sangre de'' es la equivalencia más directa para la preposición con טבל. Mantiene la relación de inmersión o contacto con el medio ritual.'
- source_word: הַצִּפֹּר הַשְּׁחֻטָה
  english_pob_choice: the bird that was slaughtered
  chosen_spanish: el ave que fue sacrificada
  alternatives_spanish:
  - el ave degollada
  - el ave inmolada
  lexicon: HALOT
  rationale: '''שׁחט'' es un verbo ritual de matanza/sacrificio. En español, ''sacrificada'' conserva mejor el registro cultual que ''muerta''; ''degollada'' sería demasiado literal y puede sonar crudo.'
- source_word: עַל הַמַּיִם הַחַיִּים
  english_pob_choice: over the living water
  chosen_spanish: sobre las aguas vivas
  alternatives_spanish:
  - sobre el agua viva
  - sobre aguas corrientes
  lexicon: HALOT
  rationale: Se mantiene 'aguas vivas' para reflejar de cerca la forma hebrea y la decisión revisada del POB en inglés. En español, el plural 'aguas' puede sonar más natural en una fórmula de culto y preserva el matiz literal de מים חיים.
theological_decisions:
- issue: מַיִם חַיִּים en contexto ritual y su posible carga simbólica
  english_pob_reading: living water
  chosen_spanish_reading: aguas vivas
  alternative_spanish_readings:
  - agua viva
  - aguas corrientes
  - agua fresca
  rationale: 'El texto hebreo habla de agua viva en sentido literal: agua corriente/fresca, no estancada. Se conserva la formulación literal en español porque el POB inglés revisado volvió a ''living water'' para aproximarse más al hebreo, y porque ''agua viva'' puede conservar también la tensión semántica sin borrar el rito concreto.'
  doctrine_reference: Éxodo 30:18-21; Levítico 14:5-7; filosofía de traducción §1, §3, §6
translation_notes:
  revision_awareness: La versión inglesa auditada pasó de 'fresh water' a 'living water' en una revisión posterior para acercarse más al hebreo sin perder el registro formal. La traducción española sigue esa revisión y por eso conserva 'aguas vivas' en el texto principal, con nota para alternativas léxicas legítimas.
  spanish_consistency_notes:
  - Se mantiene 'ave' para צִּפּוֹר y 'hisopo' para אֵזֹב, en continuidad con el registro cultual del POB.
  - '''Madera de cedro'' refleja el sustantivo material, no un árbol vivo, y evita una lectura botánicamente impropia.'
  - '''Sacrificada'' preserva el matiz ritual de שׁחט mejor que un simple ''muerta''.'
  - Se usa el plural 'aguas vivas' para conservar la literalidad de מַיִם חַיִּים y una sonoridad natural en español bíblico.
