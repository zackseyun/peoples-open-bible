translation:
  language: es
  text: Mis labios no hablarán[a] injusticia, ni mi lengua proferirá engaño.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo usa una construcción de juramento con ''si'' (אִם) para expresar una negación enfática: literalmente, ''si mis labios hablaran injusticia...,'', es decir, ''mis labios no hablarán injusticia.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: אִם
  english_pob_choice: will not
  chosen_spanish: no ... [a]
  alternatives_spanish:
  - si
  - ciertamente no
  lexicon: HALOT
  rationale: En este juramento implícito, אִם funciona como negación enfática y no como condicional simple. En español, la negación explícita transmite mejor el valor asseverativo que un 'si' literal.
- source_word: תְּדַבֵּרְנָה
  english_pob_choice: will speak
  chosen_spanish: hablarán
  alternatives_spanish:
  - hablen
  - dirán
  lexicon: HALOT
  rationale: El verbo expresa hablar/decir en futuro resolutivo. 'Hablarán' conserva la fuerza verbal y la forma plural concordando con 'labios', mientras suena natural en español.
- source_word: שְׂפָתַי
  english_pob_choice: my lips
  chosen_spanish: mis labios
  alternatives_spanish:
  - mi boca
  - mi hablar
  lexicon: HALOT
  rationale: Se preserva la imagen corporal concreta del hebreo. 'Mis labios' mantiene el paralelismo poético con 'mi lengua' y evita una abstracción innecesaria.
- source_word: עַוְלָה
  english_pob_choice: injustice
  chosen_spanish: injusticia
  alternatives_spanish:
  - maldad
  - mal
  - injusticia moral
  lexicon: HALOT
  rationale: '''Injusticia'' reproduce bien la fuerza ética/jurídica del sustantivo y distingue este primer miembro de la idea de engaño del segundo.'
- source_word: וּלְשׁוֹנִי
  english_pob_choice: nor will my tongue
  chosen_spanish: ni mi lengua
  alternatives_spanish:
  - y mi lengua
  - ni mi hablar
  lexicon: HALOT
  rationale: El waw se entiende mejor aquí como continuación negativa, por lo que 'ni' expresa con naturalidad el paralelismo y la negación compartida del verso.
- source_word: יֶהְגֶּה
  english_pob_choice: utter
  chosen_spanish: proferirá
  alternatives_spanish:
  - pronunciará
  - dirá
  - musitará
  lexicon: HALOT
  rationale: הגה puede abarcar emitir palabra o vocalizar. 'Proferirá' conserva el registro elevado y el matiz de una emisión verbal concreta, sin reducirlo a mera meditación.
- source_word: רְמִיָּה
  english_pob_choice: deceit
  chosen_spanish: engaño
  alternatives_spanish:
  - decepción
  - falsedad
  - engaño fraudulento
  lexicon: HALOT
  rationale: '''Engaño'' es una equivalencia natural en español para el campo semántico de רְמִיָּה y encaja bien con ''proferirá''; mantiene la distinción respecto a ''injusticia''.'
theological_decisions:
- issue: Construcción con juramento/negación enfática mediante אִם
  english_pob_reading: Hebrew uses an oath-like construction with 'if' to express strong denial; English makes this explicit as 'will not.'
  chosen_spanish_reading: 'La frase se vierte como una negación enfática: ''no ...'', sin conservar un ''si'' literal en el texto principal.'
  alternative_spanish_readings:
  - si mis labios hablaran...
  - ciertamente mis labios no hablarán...
  rationale: En español, un 'si' literal sonaría condicional y ocultaría el valor de negación solemne. La forma negativa directa comunica mejor la intención retórica del hebreo, mientras la nota preserva el trasfondo del giro idiomático.
  doctrine_reference: Retórica hebrea / juramento implícito en lenguaje poético
translation_notes:
  revision_awareness: 'Coincide con el cierre revisado del POB en inglés: no se requieren cambios respecto del sentido auditado. La decisión principal es cómo expresar en español la negación enfática del hebreo sin perder su carácter idiomático.'
  spanish_consistency_notes:
  - Se mantiene 'injusticia' para עַוְלָה y 'engaño' para רְמִיָּה, diferenciando claramente ambos términos.
  - Se preserva la imaginería corporal ('labios', 'lengua') tal como permite el hebreo.
  - La negación se formula de manera natural en español, con nota que explica el valor de אִם en este contexto.
