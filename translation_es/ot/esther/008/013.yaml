translation:
  language: es
  text: Una copia del documento había de emitirse como decreto en cada provincia y provincia[a], hecho público[b] a todos los pueblos, a fin de que los judíos estuvieran preparados para aquel día[c], para vengarse[d] de sus enemigos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «en cada una de las provincias». El hebreo repite «provincia y provincia» como expresión distributiva.
    reason: lexical_alternative
  - marker: b
    text: O «publicado» o «divulgado».
    reason: lexical_alternative
  - marker: c
    text: O «para este día». El hebreo literalmente dice «para este día», refiriéndose a la fecha señalada.
    reason: lexical_alternative
  - marker: d
    text: O «para tomar venganza de sus enemigos». Algunos traductores suavizan con «para defenderse», pero el verbo hebreo expresa venganza.
    reason: alternative_reading
lexical_decisions:
- source_word: פַּתְשֶׁגֶן
  english_pob_choice: copy
  chosen_spanish: copia
  alternatives_spanish:
  - copia del documento
  - transcripción
  lexicon: HALOT
  rationale: El persa prestado פַּתְשֶׁגֶן designa una copia o transcripción oficial, no el original. «Copia» es breve y fiel al valor documental del término.
- source_word: הַכְּתָב
  english_pob_choice: the document
  chosen_spanish: el documento
  alternatives_spanish:
  - la escritura
  - el escrito
  lexicon: HALOT
  rationale: Aunque literalmente significa «la escritura», en este marco administrativo alude al texto oficial. «Documento» comunica mejor su función sin perder la referencia al escrito.
- source_word: לְהִנָּתֵן דָּת
  english_pob_choice: was to be issued as law
  chosen_spanish: había de emitirse como decreto
  alternatives_spanish:
  - había de darse como decreto
  - había de promulgarse como ley
  lexicon: HALOT
  rationale: La expresión transmite la emisión formal de una orden legal. «Emitirse como decreto» conserva el matiz administrativo-jurídico sin sonar forzado en español.
- source_word: בְּכָל מְדִינָה וּמְדִינָה
  english_pob_choice: in every province and province
  chosen_spanish: en cada provincia y provincia
  alternatives_spanish:
  - en cada provincia
  - en toda provincia y provincia
  lexicon: HALOT
  rationale: Conservo la repetición distributiva del hebreo para reflejar su alcance imperial y su forma idiomática, tal como lo hizo el POB inglés.
- source_word: גָּלוּי
  english_pob_choice: being made public
  chosen_spanish: publicada
  alternatives_spanish:
  - hecha pública
  - divulgada
  lexicon: HALOT
  rationale: El participio expresa que el decreto quedaba expuesto o dado a conocer. «Publicada» es natural en español y preserva la idea de publicación oficial.
- source_word: לְכָל הָעַמִּים
  english_pob_choice: to all the peoples
  chosen_spanish: entre todos los pueblos
  alternatives_spanish:
  - a todos los pueblos
  - para todos los pueblos
  lexicon: HALOT
  rationale: עַמִּים conserva el matiz de grupos étnicos o poblaciones. «Entre todos los pueblos» expresa con fluidez la difusión pública dentro del imperio.
- source_word: וְלִהְיוֹת
  english_pob_choice: and so that ... would be
  chosen_spanish: y así
  alternatives_spanish:
  - y para que
  - y de modo que
  lexicon: HALOT
  rationale: El infinitivo continúa la finalidad/resultante del decreto. «Y así» conecta con naturalidad la consecuencia esperada en español.
- source_word: הַיְּהוּדִים
  english_pob_choice: the Jews
  chosen_spanish: los judíos
  alternatives_spanish:
  - los judeanos
  lexicon: HALOT
  rationale: En Ester designa al pueblo judío en el imperio persa; «judíos» es la forma habitual y exacta en este contexto.
- source_word: עֲתוּדִים
  english_pob_choice: ready
  chosen_spanish: estuvieran preparados
  alternatives_spanish:
  - estuvieran listos
  - estuvieran dispuestos
  lexicon: HALOT
  rationale: El adjetivo significa preparados/ready. «Estuvieran preparados» es claro y conserva el valor de preparación anticipada.
- source_word: לַיּוֹם הַזֶּה
  english_pob_choice: on that day
  chosen_spanish: para aquel día
  alternatives_spanish:
  - para este día
  - en aquel día
  lexicon: HALOT
  rationale: El hebreo dice literalmente «para este día», refiriéndose a la fecha fijada por el decreto. En español, «aquel día» mantiene la referencia narrativa sin sugerir inmediatez.
- source_word: לְהִנָּקֵם
  english_pob_choice: to avenge themselves
  chosen_spanish: para vengarse
  alternatives_spanish:
  - para tomar venganza
  - para vengarse de
  lexicon: HALOT
  rationale: El verbo niphal denota vengarse / tomar venganza. En español, «vengarse» conserva la fuerza léxica sin suavizarla a «defenderse».
- source_word: מֵאֹיְבֵיהֶם
  english_pob_choice: on their enemies
  chosen_spanish: de sus enemigos
  alternatives_spanish:
  - contra sus enemigos
  - de parte de sus enemigos
  lexicon: HALOT
  rationale: Con el verbo de venganza, el español admite «vengarse de». Mantiene la relación directa con el objeto de la acción.
theological_decisions:
- issue: Fuerza de la venganza frente a una lectura defensiva
  english_pob_reading: to avenge themselves
  chosen_spanish_reading: para vengarse
  alternative_spanish_readings:
  - para defenderse
  - para tomar venganza
  rationale: El hebreo נקם expresa venganza/represalia, no solo defensa. Conservé esa fuerza para no atenuar el lenguaje del texto, aunque el contexto narrativo incluya autoprotección.
  doctrine_reference: Principio de fidelidad léxica del POB; Esther 8:13 / HALOT נקם
translation_notes:
  revision_awareness: Se tomó en cuenta la revisión más reciente del POB inglés, que prefirió «document» sobre «written decree» y «decree» sobre «law» para ajustar mejor פַּתְשֶׁגֶן y דָּת. En español, por claridad y naturalidad, se optó por «documento» y «decreto», manteniendo la distinción entre el texto escrito y su promulgación pública. También se preservó la repetición distributiva «provincia y provincia».
  spanish_consistency_notes:
  - Se mantiene «judíos» para הַיְּהוּדִים, coherente con el uso contextual en Ester.
  - Se conserva el valor administrativo-jurídico de דָּת como «decreto» y no «ley» para no desdibujar la promulgación concreta.
  - Se refleja la fuerza de נקם con un verbo de venganza, no con una lectura meramente defensiva.
  - La repetición «provincia y provincia» se mantiene como rasgo auditado del hebreo, aunque suene marcada, porque es parte del diseño distributivo del verso.
