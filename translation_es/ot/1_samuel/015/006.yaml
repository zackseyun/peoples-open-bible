  text: וַ/יֹּ֣אמֶר שָׁא֣וּל אֶֽל הַ/קֵּינִ֡י לְכוּ֩ סֻּ֨רוּ רְד֜וּ מִ/תּ֣וֹךְ עֲמָלֵקִ֗י פֶּן אֹֽסִפְ/ךָ֙ עִמּ֔/וֹ וְ/אַתָּ֞ה עָשִׂ֤יתָה חֶ֨סֶד֙ עִם כָּל בְּנֵ֣י יִשְׂרָאֵ֔ל בַּ/עֲלוֹתָ֖/ם מִ/מִּצְרָ֑יִם וַ/יָּ֥סַר קֵינִ֖י מִ/תּ֥וֹךְ עֲמָלֵֽק־־־־׃
base_translation:
  language: en
  yaml_path: translation/ot/1_samuel/015/006.yaml
  text: Then Saul said to the Kenite[a], “Go, turn aside, go down from among the Amalekites, lest I sweep you away with them[c][b]. For you showed kindness to all the sons of Israel when they came up from Egypt.” So the Kenite turned aside from among the Amalekites.
  footnotes:
  - marker: a
    text: 'Or ''kindness'' or ''loyalty'' for ''covenant loyalty'' (Hebrew: hesed).'
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'all the sons of Israel,' a standard national expression for the people of Israel.
    reason: lexical_alternative
  - marker: c
    text: Or 'lest I destroy you with them'; the Hebrew verb can carry the sense of being removed or swept away together in judgment.
    reason: lexical_alternative
