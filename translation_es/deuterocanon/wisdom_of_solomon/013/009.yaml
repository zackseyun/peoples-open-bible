    issue: «Dueño» para δεσπότην
    rationale: Aunque recoge la idea de posesión, en español moderno suena demasiado doméstico o coloquial («el dueño de algo») y rebaja el tono del pasaje. δεσπότης aquí expresa señorío absoluto sobre la creación; «Soberano» lo comunica con más dignidad y claridad.
  - severity: low
    issue: Nota al pie con «la edad»
    rationale: La explicación literal del griego puede formularse mejor en español. «La edad» no es la equivalencia más reconocible para αἰών en este contexto; «el siglo» o una glosa explicativa evita extrañeza innecesaria.
