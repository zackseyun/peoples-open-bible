translation:
  language: es
  text: Porque la aflicción no viene del polvo[a], ni del suelo brota la fatiga.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Porque la iniquidad no viene del polvo, ni del suelo brota la miseria». El hebreo אָוֶן también puede referirse a iniquidad, calamidad o desgracia, y עָמָל puede significar fatiga, afán o miseria.'
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Puesto que
  - Porque, en efecto
  lexicon: HALOT
  rationale: כִּי introduce la explicación del dicho anterior; «Porque» preserva esa relación causal/expositiva de manera natural en español.
- source_word: יֵצֵא
  english_pob_choice: does not come from
  chosen_spanish: sale
  alternatives_spanish:
  - sale de
  - proviene
  - surge
  lexicon: HALOT
  rationale: El hebreo expresa salida/emergencia desde una fuente. «Sale» mantiene el verbo de movimiento sin sobrecargar el verso con una paráfrasis.
- source_word: מֵעָפָר
  english_pob_choice: from the dust
  chosen_spanish: del polvo
  alternatives_spanish:
  - de polvo
  - desde el polvo
  - del polvo de la tierra
  lexicon: HALOT
  rationale: עָפָר es «polvo»; «del polvo» conserva la imagen material y la relación de origen. Se evita añadir artículo o matiz innecesario.
- source_word: אָוֶן
  english_pob_choice: trouble
  chosen_spanish: el mal
  alternatives_spanish:
  - la desgracia
  - la aflicción
  - la iniquidad
  lexicon: HALOT
  rationale: En Job, אָוֶן puede abarcar daño, calamidad o maldad. Aquí el paralelismo con עָמָל permite una traducción amplia; «el mal» es breve y deja abierta la tensión semántica sin fijarla solo en lo moral.
- source_word: וּמֵאֲדָמָה
  english_pob_choice: nor ... from the ground
  chosen_spanish: ni del suelo
  alternatives_spanish:
  - ni de la tierra
  - ni del terreno
  - ni del campo
  lexicon: HALOT
  rationale: אֲדָמָה es el suelo/tierra cultivable. «Suelo» funciona bien con la imagen agrícola y mantiene el paralelismo con «polvo».
- source_word: יִצְמַח
  english_pob_choice: sprout
  chosen_spanish: brota
  alternatives_spanish:
  - germina
  - crece
  - sale
  lexicon: HALOT
  rationale: צמח es un verbo vegetal; «brota» conserva la metáfora de algo que emerge como planta desde la tierra.
- source_word: עָמָל
  english_pob_choice: toil
  chosen_spanish: el trabajo
  alternatives_spanish:
  - la fatiga
  - la fatiga penosa
  - el afán
  lexicon: HALOT
  rationale: עָמָל puede denotar esfuerzo penoso, fatiga o trabajo. Se eligió «trabajo» para evitar una redundancia excesiva con «mal» y porque en español puede mantener, en contexto poético, la idea de labor pesada; la ambigüedad queda abierta, como en el hebreo.
theological_decisions:
- issue: Alcance semántico de אָוֶן y עָמָל en el argumento de Elifaz
  english_pob_reading: The verse speaks of human trouble/toil not arising automatically from the earth, using agricultural imagery to argue that suffering has a cause beyond impersonal natural emergence.
  chosen_spanish_reading: El verso afirma que el mal y el trabajo penoso no brotan por sí mismos del orden natural, usando imagen agrícola para sostener que el sufrimiento tiene una causa más allá de una simple emergencia impersonal.
  alternative_spanish_readings:
  - El verso habla de la iniquidad y la miseria que no nacen de la tierra.
  - El verso se refiere solo al dolor humano, sin sugerir nada sobre la causa moral del sufrimiento.
  rationale: La poesía de Job permite una franja semántica amplia. Mantener «el mal» y «el trabajo» conserva la tensión entre lectura moral y calamidad sin resolverla de forma prematura, en línea con la cautela del audit trail inglés.
  doctrine_reference: Preservar la tensión teológica del texto de Job sin sobreexplicar la causa del sufrimiento.
translation_notes:
  revision_awareness: 'Se siguió de cerca el audit trail inglés: el giro explicativo de כִּי, la imagen agrícola de «dust/ground» y la doble ambigüedad de אָוֶן / עָמָל. En español se optó por una formulación breve y publicable, pero se preservó la alternativa léxica en nota para no cerrar indebidamente el campo semántico.'
  spanish_consistency_notes:
  - Se mantuvo «polvo» para עָפָר y «suelo» para אֲדָמָה, respetando el paralelismo material.
  - Se usó «brota» para יִצְמַח por su color vegetal.
  - Se evitó «SEÑOR» u այլ masking, pues el versículo no contiene el nombre divino.
  - La nota a explica la tensión léxica entre lectura moral y calamidad, coherente con el tratamiento inglés.
