revisions:
- from: Porque vive Yahvé[a], el que salva a Israel, si está en Jonatán, mi hijo, ciertamente morirá.” Pero no hubo quien le respondiera de entre todo el pueblo.
  to: Porque vive Yahvé[a], el que salva a Israel, aun si está en Jonatán, mi hijo, ciertamente morirá». Pero nadie de entre todo el pueblo le respondió.
  rationale: Se ajusta «si» a «aun si» para preservar el valor enfático/extremo de כִּי אִם según la auditoría inglesa. También se aligera la última cláusula con una formulación más natural en español, manteniendo el sentido partitivo de מִכָּל הָעָם. Se conserva la nota sobre la elipsis del objeto implícito.
