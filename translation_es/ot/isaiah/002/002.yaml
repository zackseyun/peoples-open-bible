translation:
  language: es
  text: Y acontecerá que en los días postreros[a] el monte de la casa de Yahvé será establecido como el más alto de los montes, y será levantado por encima de las colinas[b]; y todas las naciones afluirán[c] a él.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «en los últimos días» o «en días venideros».'
    reason: alternative_reading
  - marker: b
    text: 'O: «el monte de la casa de Yahvé será establecido sobre la cima de los montes».'
    reason: alternative_reading
  - marker: c
    text: El verbo hebreo pinta a las naciones «fluyendo» como un río hacia él.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהָיָה
  english_pob_choice: And ... shall be
  chosen_spanish: Y acontecerá que
  alternatives_spanish:
  - Y será
  - Y sucederá
  lexicon: HALOT
  rationale: La fórmula hebrea introduce una escena futura profética. «Acontecerá que» conserva el valor prospectivo sin sonar mecánico, y mantiene el matiz solemne del pasaje.
- source_word: בְּאַחֲרִית הַיָּמִים
  english_pob_choice: in the latter days
  chosen_spanish: en los últimos días
  alternatives_spanish:
  - en los postreros días
  - en los días venideros
  lexicon: HALOT
  rationale: Se preserva el giro idiomático profético con una expresión natural en español. «Últimos días» mantiene la amplitud temporal y la posible resonancia escatológica sin forzar una cronología específica.
- source_word: נָכוֹן יִהְיֶה
  english_pob_choice: shall be established
  chosen_spanish: será establecido
  alternatives_spanish:
  - permanecerá firme
  - será afirmado
  lexicon: HALOT
  rationale: El hebreo comunica firmeza y asentamiento seguro. «Será establecido» es la forma más directa y digna en español para reflejar esa estabilidad.
- source_word: הַר בֵּית יְהוָה
  english_pob_choice: the mountain of the house of Yahweh
  chosen_spanish: el monte de la casa de Yahvé
  alternatives_spanish:
  - el monte de la casa de Yahweh
  - el monte de la casa de Yahvé
  lexicon: HALOT
  rationale: Se conserva la estructura del hebreo con «monte» y «casa» explícitos. «Yahvé» sigue la terminología proyectada para el Tetragrámaton en el texto principal.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  lexicon: HALOT
  rationale: El nombre divino se vierte como «Yahvé» conforme a la convención terminológica del proyecto en español, preservando el nombre propio y evitando la sustitución por un título.
- source_word: בְּרֹאשׁ הֶהָרִים
  english_pob_choice: as the highest of the mountains
  chosen_spanish: como el más alto de los montes
  alternatives_spanish:
  - en la cima de los montes
  - sobre la cumbre de los montes
  lexicon: HALOT
  rationale: La expresión admite lectura espacial y de supremacía. En el contexto paralelo del versículo, «como el más alto de los montes» comunica mejor la preeminencia sin imponer una topografía literal.
- source_word: וְנִשָּׂא מִגְּבָעוֹת
  english_pob_choice: and shall be lifted up above the hills
  chosen_spanish: y será levantado por encima de las colinas
  alternatives_spanish:
  - y será exaltado sobre las colinas
  - y será alzado por encima de los cerros
  lexicon: HALOT
  rationale: El verbo expresa elevación/exaltación en contraste con «colinas». «Por encima de» reproduce bien el comparativo del hebreo y conserva la imagen de altura relativa.
- source_word: וְנָהֲר֥וּ
  english_pob_choice: shall stream
  chosen_spanish: fluirán
  alternatives_spanish:
  - correrán
  - acudirán como río
  lexicon: HALOT
  rationale: Se conserva la metáfora hidráulica del hebreo, que describe a las naciones moviéndose hacia Sion como un río. «Fluirán» es literal y comprensible en español.
- source_word: אֵלָיו
  english_pob_choice: to it
  chosen_spanish: hacia él
  alternatives_spanish:
  - a él
  - hacia ello
  lexicon: HALOT
  rationale: Aunque el antecedente inmediato incluye el monte, el sustantivo «monte» es masculino en español. «Hacia él» respeta el referente gramatical y mantiene el movimiento direccional.
- source_word: כָּל הַגּוֹיִם
  english_pob_choice: all the nations
  chosen_spanish: todas las naciones
  alternatives_spanish:
  - todos los pueblos
  - todas las gentes
  lexicon: HALOT
  rationale: «Naciones» es la correspondencia más natural para גוים en este contexto profético y mantiene el contraste con Israel/Zion sin introducir una interpretación adicional.
theological_decisions:
- issue: Alcance temporal de בְּאַחֲרִית הַיָּמִים
  english_pob_reading: in the latter days
  chosen_spanish_reading: en los últimos días
  alternative_spanish_readings:
  - en los postreros días
  - en los días venideros
  rationale: Se conserva la amplitud del hebreo sin resolverlo de antemano hacia un esquema escatológico cerrado. La formulación elegida es natural en español y mantiene la tensión profética del texto.
  doctrine_reference: Translation philosophy §3
- issue: Sentido de la exaltación del monte
  english_pob_reading: shall be established as the highest of the mountains
  chosen_spanish_reading: será establecido como el más alto de los montes
  alternative_spanish_readings:
  - será establecido sobre la cima de los montes
  - será puesto en la cumbre de los montes
  rationale: El hebreo puede leerse como ubicación espacial o como supremacía. La traducción principal favorece la idea de preeminencia, en armonía con el paralelo inmediato, sin cerrar la posibilidad de la lectura espacial.
  doctrine_reference: Translation philosophy §3
- issue: Tratamiento del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  rationale: Se usa «Yahvé» como forma española estable para el Nombre divino, preservando el carácter de nombre propio del pacto y evitando su sustitución por un título genérico.
  doctrine_reference: 'Contested terms: יְהוָה YHWH'
translation_notes:
  revision_awareness: La versión española sigue de cerca el audit trail inglés y el hebreo WLC. No se aplicaron revisiones posteriores; el estado de concordancia del control cruzado fue alto y sin cambios necesarios.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» para יְהוָה conforme al estándar del proyecto en español.
  - Se preservó la tensión entre lectura espacial y de supremacía en la exaltación del monte, sin sobreexplicar el texto.
  - «Naciones» se mantuvo para גוים, evitando «gentiles» por ser más interpretativo en este contexto.
  - La metáfora de flujo se conservó con «fluirán» para reflejar el hebreo verbalmente y no neutralizar la imagen.
