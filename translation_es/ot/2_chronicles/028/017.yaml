translation:
  language: es
  text: Los edomitas también habían venido, atacaron a Judá y se llevaron cautivos[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'También es posible: «vinieron y atacaron a Judá y tomaron cautivos». El hebreo usa el verbo militar común «golpear/herir» y una expresión cognada para tomar cautivos.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְעוֹד
  english_pob_choice: had also
  chosen_spanish: también habían
  alternatives_spanish:
  - además habían
  - también
  lexicon: HALOT
  rationale: עוֹד añade una incursión más en la secuencia narrativa; «también habían» conserva ese matiz de adición y el valor de anterioridad relativa expresado por el perfecto compuesto en español.
- source_word: אֲדוֹמִים
  english_pob_choice: the Edomites
  chosen_spanish: los edomitas
  alternatives_spanish:
  - Edom
  - los hombres de Edom
  lexicon: HALOT
  rationale: El gentilicio plural se refiere al pueblo de Edom, no al territorio. «Edomitas» es el equivalente natural en español bíblico y conserva el valor colectivo.
- source_word: בָּאוּ
  english_pob_choice: had come
  chosen_spanish: habían venido
  alternatives_spanish:
  - vinieron
  - habían llegado
  lexicon: HALOT
  rationale: El qatal presenta una acción completada en la secuencia narrativa. «Habían venido» reproduce bien el sentido de llegada/incursión previa a las acciones siguientes.
- source_word: וַיַּכּוּ
  english_pob_choice: attacked
  chosen_spanish: hirieron
  alternatives_spanish:
  - golpearon
  - atacaron
  - hirieron con violencia
  lexicon: HALOT
  rationale: נכה significa literalmente «golpear» y en contexto militar puede implicar ataque. «Hirieron» mantiene el verbo básico y la fuerza bélica sin introducir la idea de una victoria total que el hebreo no explicita.
- source_word: בִיהוּדָה
  english_pob_choice: Judah
  chosen_spanish: a Judá
  alternatives_spanish:
  - contra Judá
  - en Judá
  lexicon: HALOT
  rationale: Con el verbo de ataque, el complemento funciona naturalmente como objeto directo en español; «a Judá» conserva la referencia al pueblo/territorio sin sobrecargar la sintaxis.
- source_word: וַיִּשְׁבּוּ
  english_pob_choice: carried away
  chosen_spanish: se llevaron
  alternatives_spanish:
  - llevaron
  - tomaron cautivos
  - llevaron cautiva a la población
  lexicon: HALOT
  rationale: שׁבה expresa tomar cautivos. «Se llevaron» comunica el acto de traslado forzoso y prepara bien el sustantivo cognado que sigue.
- source_word: שֶׁבִי
  english_pob_choice: captives
  chosen_spanish: cautivos
  alternatives_spanish:
  - prisioneros
  - cautividad
  - un grupo de cautivos
  lexicon: HALOT
  rationale: El sustantivo designa a los cautivos o el estado de cautiverio. «Cautivos» es la forma más directa y evita la extrañeza de una traducción demasiado literal.
translation_notes:
  revision_awareness: El pasaje coincide sustancialmente con el texto hebreo y con la solución inglesa auditada; no se observan revisiones textuales aplicadas en el paquete de fuente.
  spanish_consistency_notes:
  - Se mantuvo «Judá» como nombre propio sin artículo para respetar el uso bíblico en español.
  - Se evitó «SEÑOR» o equivalentes porque no aparece el Tetragrámaton en este versículo.
  - La elección de «hirieron» preserva la fuerza del verbo militar hebreo sin afirmar una derrota total.
