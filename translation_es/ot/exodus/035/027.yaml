    issue: Las notas al pie están ancladas a las palabras equivocadas.
    rationale: La nota marcada [a] trata sobre la identificación incierta de שֹׁהַם/«ónice», pero en el borrador está colocada después de «engaste». La nota [b] explica «pectoral» frente a «breastplate», y sí corresponde al final de «pectoral». Esto debe corregirse para preservar el rastro auditado y evitar confusión del lector.
  - severity: low
    issue: La nota [b] usa «O 'pectoral'» aunque el texto principal ya dice «pectoral».
    rationale: La alternativa debe señalar el término alterno, no repetir el principal. En español conviene decir «O 'coraza del pecho'» o, mejor aún, explicar directamente que el hebreo se refiere al ornamento sacerdotal del pecho y no a una armadura. Dado que el inglés conserva la alternativa 'breastplate', una formulación equivalente y natural en español sería «O 'coraza del pecho'».
  revised_spanish_text: Y los dirigentes trajeron las piedras de ónice[a] y las piedras para engaste, para el efod y para el pectoral[b].
