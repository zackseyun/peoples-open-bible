  glossary_alignment: No hay conflictos con la terminología teológica principal del proyecto. 'Forastero o residente' es aceptable para reflejar גֵּר/תּוֹשָׁב por separado, aunque 'extranjero residente' también sería viable. 'Tu hermano' alinea bien con la decisión teológica. 'Se vende' preserva adecuadamente la fuerza reflexiva/contextual de וְנִמְכַּר.
