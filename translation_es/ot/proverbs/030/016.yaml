base_translation:
  language: en
  yaml_path: translation/ot/proverbs/030/016.yaml
  text: Sheol[a], and a barren womb; earth, never satisfied with water; and fire, which never says[c][b], “Enough.”
  footnotes:
  - marker: a
    text: Or 'the grave' or 'the realm of the dead' for 'Sheol.'
    reason: lexical_alternative
  - marker: b
    text: Literally 'the restraint/closure of the womb,' that is, a womb that does not bear children.
    reason: lexical_alternative
  - marker: c
    text: The Hebrew expression at the end is difficult; many understand it as 'Enough!' Others have proposed a sense related to 'wealth' or 'substance.'
    reason: lexical_alternative
