translation:
  language: es
  text: Y la batalla se intensificó[a], y Jonatán extendió su mano para golpear a Bacides[b], pero él se apartó de él hacia atrás.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Y la batalla se cerró» o «Y la lucha se apretó». El verbo griego puede sugerir que el combate se junta o se vuelve más intenso.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «pero él se apartó de él a la retaguardia» o «pero se desvió de él hacia atrás». El griego puede expresarse de manera más literal, destacando el movimiento evasivo de Bacides.'
    reason: lexical_alternative
lexical_decisions:
- source_word: συνῆγεν
  english_pob_choice: grew intense
  chosen_spanish: se intensificó
  alternatives_spanish:
  - se cerró
  - se apretó
  - se volvió más reñida
  lexicon: LSJ
  rationale: En contexto de combate, el griego sugiere que la lucha se junta, se comprime o se vuelve más intensa. «Se intensificó» comunica naturalmente ese aumento de tensión sin perder la fuerza dinámica del verbo.
- source_word: ὁ πόλεμος
  english_pob_choice: the battle
  chosen_spanish: la batalla
  alternatives_spanish:
  - la guerra
  - el combate
  - la lucha
  lexicon: LSJ
  rationale: Aquí el contexto es una acción militar concreta, no una guerra en sentido amplio. «Batalla» conserva la concreción del pasaje y evita la amplitud de «guerra».
- source_word: ἐξέτεινεν ... τὴν χεῖρα αὐτοῦ
  english_pob_choice: stretched out his hand
  chosen_spanish: extendió su mano
  alternatives_spanish:
  - alargó su mano
  - tendió su mano
  - extendió la mano
  lexicon: LSJ
  rationale: La expresión griega es idiomática y presenta la acción preparatoria del golpe. «Extendió su mano» mantiene la estructura visible y suena natural en español.
- source_word: πατάξαι
  english_pob_choice: to strike
  chosen_spanish: para golpear
  alternatives_spanish:
  - para herir
  - para dar un golpe
  - para atacar
  lexicon: LSJ
  rationale: «Golpear» reproduce la fuerza inmediata del verbo sin cargarlo con arcaísmo ni con una generalización como «atacar».
- source_word: Βακχίδην
  english_pob_choice: Bacchides
  chosen_spanish: Bacquides
  alternatives_spanish:
  - Bacides
  lexicon: transliteration
  rationale: Se conserva el nombre propio mediante transliteración al español. «Bacquides» refleja mejor la adaptación gráfica habitual en español para esta forma.
- source_word: ἐξέκλινεν
  english_pob_choice: turned away
  chosen_spanish: se desvió
  alternatives_spanish:
  - se apartó
  - viró
  - se echó a un lado
  lexicon: LSJ
  rationale: El verbo indica apartarse o torcerse hacia un lado. «Se desvió» preserva esa evasiva sin añadir detalles interpretativos.
- source_word: ἀπ᾿ αὐτοῦ
  english_pob_choice: from him
  chosen_spanish: de él
  alternatives_spanish:
  - alejándose de él
  - apartándose de él
  lexicon: LSJ
  rationale: La preposición expresa separación con referencia a Jonatán como antecedente. «De él» es directo y fiel en español.
- source_word: εἰς τὰ ὀπίσω
  english_pob_choice: to the rear
  chosen_spanish: hacia la retaguardia
  alternatives_spanish:
  - hacia atrás
  - a la retaguardia
  - hacia la parte de atrás
  lexicon: LSJ
  rationale: En un contexto militar, «retaguardia» comunica la dirección hacia la parte posterior con color militar apropiado, manteniendo la imagen espacial del griego.
translation_notes:
  revision_awareness: Se ha seguido de cerca el texto griego de Swete y el audit trail inglés. La revisión más reciente indicó que no se requieren cambios sustanciales; por eso se mantiene la equivalencia óptima con ajustes naturales al español.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» para el tetragrama cuando corresponda, aunque este versículo no lo contiene.
  - Se conserva el nombre propio «Jonatán» según uso español bíblico estándar.
  - Se evita «Cristo» porque el pasaje no contiene lenguaje mesiánico.
  - «Batalla» y «retaguardia» sostienen el registro militar del contexto sin sobretraducción.
