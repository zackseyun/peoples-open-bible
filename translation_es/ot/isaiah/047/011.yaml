review_pass:
  verdict: revise
  source_alignment_summary: El borrador sigue bien la estructura tripartita del hebreo y acierta en 'mal', 'cómo conjurarlo' y 'ruina'. Sin embargo, falla de manera importante en כַּפְּרָהּ al usar 'expirarla', que no corresponde al verbo hebreo ni es español natural para este contexto. También 'no la conocerás' al final suena poco idiomático para un evento repentino; el hebreo expresa que no lo sabrá/no estará al tanto, no conocimiento relacional. La nota [c] no preserva una alternativa significativa del inglés y resulta innecesaria.
  spanish_quality_summary: El texto es mayormente legible y digno, pero contiene un error léxico grave ('expirarla') y una formulación final poco natural ('no la conocerás'). Además, hay un problema tipográfico con el anclaje '[b]' separado del verbo. La puntuación y el registro general son adecuados.
  glossary_alignment: No hay conflictos con la terminología de proyecto (sin Yahvé/Mesías/etc. en este versículo). 'Mal' para רָעָה y 'ruina' para שׁוֹאָה están bien. Para כַּפְּרָהּ conviene seguir la decisión auditada inglesa y usar en el texto principal 'apartarla' o 'evitarla', dejando 'aplacarla'/'expiarla' en nota. 'Conjurarlo' para שַׁחְרָהּ es defendible por el contexto de artes ocultas.
  issues:
  - severity: high
    issue: '''expirarla'' traduce incorrectamente כַּפְּרָהּ'
    rationale: '''Expirarla'' en español significa otra cosa y no transmite ''cubrir/expiar/apartar/aplacar''. Además, no es una opción documentada en el expediente inglés ni una formulación natural.'
  - severity: medium
    issue: '''no la conocerás'' es demasiado literal y poco idiomático'
    rationale: Para una calamidad repentina, el español natural pide 'no lo sabrás' o 'no te darás cuenta', preservando mejor el valor de ידע sin sugerir conocimiento personal de la ruina.
  - severity: low
    issue: La nota [c] es innecesaria y no responde a una ambigüedad relevante del original
    rationale: El inglés POB no conserva una nota aquí, y 'de repente' ya expresa bien פִּתְאֹם. La nota añade poco valor y complica el aparato.
  - severity: low
    issue: Anclaje tipográfico defectuoso en '[b]expirarla'
    rationale: El marcador debe ir unido limpiamente a la palabra o frase pertinente dentro del texto, no separado por un espacio extraño.
