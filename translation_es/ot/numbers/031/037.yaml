lexical_decisions:
- source_word: הַמֶּכֶס
  english_pob_choice: the tribute
  chosen_spanish: el tributo
  alternatives_spanish:
  - la contribución
  - el impuesto
  - la porción tributada
  lexicon: HALOT
  rationale: מֶכֶס designa una porción exigida o apartada como due; «tributo» conserva ese valor de contribución impuesta sin reducirlo a una categoría fiscal moderna.
- source_word: לַיהוָה
  english_pob_choice: for Yahweh
  chosen_spanish: para Yahvé
  alternatives_spanish:
  - de Yahvé
  - a Yahvé
  - perteneciente a Yahvé
  lexicon: HALOT
  rationale: La lamed marca aquí destino/dedicación. «Para Yahvé» expresa de modo natural que el tributo estaba apartado en su favor.
- source_word: מִן הַצֹּאן
  english_pob_choice: from the flock
  chosen_spanish: de las ovejas
  alternatives_spanish:
  - del rebaño
  - de la majada
  - del ganado menor
  lexicon: HALOT
  rationale: צֹאן puede abarcar ovejas y cabras, pero en español «de las ovejas» resulta más concreto y natural en este conteo de botín; aun así, se reconoce el trasfondo colectivo del término.
- source_word: שֵׁשׁ מֵאוֹת חָמֵשׁ וְשִׁבְעִים
  english_pob_choice: six hundred seventy-five
  chosen_spanish: seiscientos setenta y cinco
  alternatives_spanish:
  - seiscientos y setenta y cinco
  lexicon: HALOT
  rationale: Se mantiene el valor cardinal exacto en español moderno, sin añadir elementos no presentes en el hebreo.
theological_decisions:
- issue: Renderización del nombre divino יהוה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Yahweh
  - Jehová
  rationale: 'Se sigue el criterio del proyecto para יהוה: transliteración reverente del nombre divino en lugar de una sustitución por título mayúsculo. En español, «Yahvé» es la forma establecida en el marco editorial del proyecto.'
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
translation_notes:
  revision_awareness: El contexto inglés no introduce variantes textuales ni notas; la versión española conserva la misma estructura simple y el mismo contenido numérico, ajustando solo el registro natural del español y el tratamiento del nombre divino conforme al proyecto.
  spanish_consistency_notes:
  - Se usa «Yahvé» de manera consistente para יהוה.
  - Se conserva «tributo» para reflejar la fuerza obligatoria/apartada de מֶכֶס.
  - «De las ovejas» comunica bien el colectivo en español, aunque el hebreo puede abarcar ganado menor en general.
