  text: אַף הִ֭יא כְּ/חֶ֣תֶף תֶּֽאֱרֹ֑ב וּ֝/בוֹגְדִ֗ים בְּ/אָדָ֥ם תּוֹסִֽף־׃
base_translation:
  language: en
  yaml_path: translation/ot/proverbs/023/028.yaml
  text: Indeed[a], she lies in wait like a robber[b], and she increases the treacherous among men.
  footnotes:
  - marker: a
    text: Or 'like a bandit.' The Hebrew term חֶתֶף is rare and difficult; some understand it more generally as violent seizure or sudden attack.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'among man,' with אָדָם used generically for humanity; that is, she increases the treacherous among humankind.
    reason: lexical_alternative
