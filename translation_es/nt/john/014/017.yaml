  source_alignment_summary: 'El borrador español sigue bien el griego y el audit trail inglés: conserva «Espíritu de la verdad», la incapacidad del mundo para recibirlo, la secuencia «no lo ve ni lo conoce / ustedes lo conocen», y la distinción «con ustedes / en ustedes». También preserva correctamente la personalización del Espíritu pese al neutro griego mediante «a quien».'
  spanish_quality_summary: 'El texto principal es claro, natural y eclesialmente legible. Sin embargo, hay un problema de calidad en los metadatos léxicos: aparece la forma contaminada «no puede aceptarlo» en escritura devanagari («aceptarlo» parcialmente corrupto), lo que indica descuido textual. Además, la nota [a] suena algo rígida con «el cual»; conviene ajustarla para un español más natural y fiel al contraste personal/gramatical.'
  glossary_alignment: 'Alineado con la terminología del proyecto: πνεῦμα -> «Espíritu» con mayúscula contextual; τῆς ἀληθείας -> «de la verdad»; κόσμος -> «el mundo»; γινώσκειν -> «conocer»; μένει -> «permanece»; ἐν ὑμῖν -> «en ustedes». No hay conflicto con Yahvé/Mesías ni otros términos globales.'
  issues:
