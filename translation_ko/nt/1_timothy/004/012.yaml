id: 1TI.4.12
reference: 1 Timothy 4:12
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: μηδείς σου τῆς νεότητος καταφρονείτω, ἀλλὰ τύπος γίνου τῶν πιστῶν ἐν λόγῳ, ἐν ἀναστροφῇ, ἐν ⸀ἀγάπῃ, ἐν πίστει, ἐν ἁγνείᾳ.
base_translation:
  language: en
  yaml_path: translation/nt/1_timothy/004/012.yaml
  text: Let no one look down on your youth[a], but be an example for the believers in speech, in conduct, in love, in faith, in purity.
  footnotes:
  - marker: a
    text: Or "in faithfulness." The Greek word can denote either faith or faithfulness in this context.
    reason: alternative_reading
translation:
  language: ko
  text: 아무도 그대의 젊음을 업신여기지 못하게 하십시오. 도리어 말과 행실과 사랑과 믿음[a]과 순결에서 믿는 자들의 본이 되십시오.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 또는 「신실함」. 헬라어 πίστις는 본 문맥에서 「믿음」 또는 「신실함」을 가리킬 수 있다.
    reason: alternative_reading
lexical_decisions:
- source_word: μηδείς σου τῆς νεότητος καταφρονείτω
  english_pob_choice: Let no one look down on your youth
  chosen_korean: 아무도 그대의 젊음을 업신여기지 못하게 하십시오
  alternatives_korean:
  - 누구도 그대의 어린 나이를 깔보지 못하게 하십시오
  lexicon: BDAG
  rationale: καταφρονέω의 「업신여기다」가 자연스럽다.
- source_word: τύπος γίνου τῶν πιστῶν
  english_pob_choice: be an example for the believers
  chosen_korean: 믿는 자들의 본이 되십시오
  alternatives_korean:
  - 신자들의 본보기가 되십시오
  - 믿는 자들의 모범이 되십시오
  lexicon: BDAG
  rationale: τύπος의 「모형·본」을 「본」으로(1:16 ὑποτύπωσις 「본보기」와 어휘 변화).
- source_word: ἐν λόγῳ, ἐν ἀναστροφῇ, ἐν ἀγάπῃ, ἐν πίστει, ἐν ἁγνείᾳ
  english_pob_choice: in speech, in conduct, in love, in faith, in purity
  chosen_korean: 말과 행실과 사랑과 믿음과 순결에서
  alternatives_korean:
  - 말, 처신, 사랑, 신실함, 정결에서
  lexicon: BDAG
  rationale: 다섯 영역의 평행 구조를 한국어 열거 「~와 ~와 ~」로 옮긴다. ἀναστροφή는 3:15 「처신」과 일관할 수도 있으나 본 절은 일반적 「행실」.
