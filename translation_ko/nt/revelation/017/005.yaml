lexical_decisions:
- source_word: μυστήριον
  english_pob_choice: mystery
  chosen_korean: 비밀
  alternatives_korean:
  - 신비
  - 상징
  lexicon: BDAG
  rationale: '바울과 묵시문학의 「하나님의 비밀」 전통에서 μυστήριον은 「감추어졌다가 드러난 것」으로, 「비밀」이 자연스럽다.'
theological_decisions:
- issue: '17:5 μυστήριον이 이름의 일부인지, 이름 앞에 붙은 표지인지'
  chosen_reading: '이름의 일부로 표기(「비밀, 큰 바벨론, ...」)'
  alternative_readings:
  - '이름 앞의 표지로 표기(상징적으로: 큰 바벨론, ...)'
  rationale: 헬라어 본문은 μυστήριον을 ὄνομα γεγραμμένον에 동격으로 두어 이름의 일부로 읽을 수 있게 한다. 한국어에서도 이를 이름 사슬의 일부로 보존하여 묵시적 폭로의 무게를 살린다.
  doctrine_reference: 'DOCTRINE.md: Preserve apocalyptic disclosure structure'
