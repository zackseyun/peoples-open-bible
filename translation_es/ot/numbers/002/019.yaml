translation:
  language: es
  text: 'Y su división[a], los inscritos[b] de entre ellos: cuarenta mil quinientos.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «su hueste». צָבָא puede referirse a una agrupación militar; aquí la POB opta por «división» para reflejar el orden del campamento y el registro censal.
    reason: lexical_alternative
  - marker: b
    text: O «los alistados de entre ellos» o «los contados de entre ellos». El hebreo se refiere a los registrados o censados para servicio.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּצְבָאוֹ
  english_pob_choice: And his division
  chosen_spanish: Y su división
  alternatives_spanish:
  - Y su compañía
  - Y su ejército
  - Y su hueste
  lexicon: HALOT
  rationale: En este contexto de censo y ordenamiento del campamento, צָבָא señala una unidad organizada asociada al líder tribal. «División» conserva la idea de agrupación militar/administrativa sin forzar el sentido de «ejército» en una simple cifra censal.
- source_word: וּפְקֻדֵיהֶם
  english_pob_choice: those numbered from them
  chosen_spanish: los contados de entre ellos
  alternatives_spanish:
  - los mustreados de entre ellos
  - los inscritos de entre ellos
  - los numerados de entre ellos
  lexicon: HALOT
  rationale: 'פקד aquí funciona en sentido censal: los que fueron contados o registrados para servicio. «Los contados de entre ellos» mantiene el participio con naturalidad en español y evita añadir «hombres» o «musterados» sin que el hebreo lo explicite en esta cláusula breve.'
- source_word: אַרְבָּעִים אֶלֶף וַחֲמֵשׁ מֵאוֹת
  english_pob_choice: forty thousand and five hundred
  chosen_spanish: cuarenta mil quinientos
  alternatives_spanish:
  - cuarenta mil y quinientos
  - cuarenta mil y cincocientos
  lexicon: HALOT
  rationale: Número cardinal ordinario; en español natural se expresa como «cuarenta mil quinientos», sin necesidad de repetir la conjunción.
translation_notes:
  revision_awareness: El texto coincide con el sentido del hebreo masorético y con la decisión auditada en la POB inglesa; no se requieren cambios textuales ni notas doctrinales adicionales.
  spanish_consistency_notes:
  - Se mantiene «división» para צָבָא, en armonía con el uso censal-militar del pasaje.
  - Se evita «SEÑOR» u այլ sustitutos porque no aparece el nombre divino en este versículo.
  - «Contados» conserva el valor de recuento/censo de פקד sin sobreespecificar el sexo o la función de los registrados.
