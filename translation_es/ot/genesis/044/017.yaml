translation:
  language: es
  text: 'Pero él dijo[a]: «¡Lejos de mí hacer esto! El hombre en cuya mano fue hallada la copa será mi esclavo[b], pero ustedes pueden subir en paz a su padre».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «El hombre con quien fue hallada la copa». El hebreo dice literalmente: «en cuya mano fue hallada la copa».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «siervo». El hebreo עָבֶד puede denotar tanto siervo como esclavo; aquí se prefiere «esclavo» por el contexto de servidumbre punitiva.'
    reason: lexical_alternative
lexical_decisions:
- source_word: חָלִילָה לִּי
  english_pob_choice: Far be it from me
  chosen_spanish: ¡Lejos de mí!
  alternatives_spanish:
  - ¡No lo permita Dios!
  - ¡Imposible para mí!
  - ¡Lejos esté de mí!
  lexicon: HALOT
  rationale: La expresión hebrea es un rechazo enfático e idiomático de hacer algo reprobable. «¡Lejos de mí!» reproduce bien la fuerza, con un español natural y solemne sin introducir una fórmula más interpretativa que la hebrea.
- source_word: מֵעֲשׂוֹת זֹאת
  english_pob_choice: to do this
  chosen_spanish: hacer esto
  alternatives_spanish:
  - de hacer esto
  - hacer tal cosa
  lexicon: HALOT
  rationale: El infinitivo con preposición expresa la acción rechazada. En español, después de la locución de rechazo, «hacer esto» resulta claro y fiel.
- source_word: הָאִישׁ אֲשֶׁר נִמְצָא הַגָּבִיעַ בְּיָדוֹ
  english_pob_choice: The man in whose hand the cup was found
  chosen_spanish: El hombre en cuya mano fue hallada la copa
  alternatives_spanish:
  - El hombre con quien fue hallada la copa
  - El hombre en cuyo poder fue hallada la copa
  lexicon: HALOT
  rationale: Se conserva la imagen concreta de «en cuya mano» y la pasiva «fue hallada», que refleja bien el hebreo. «Copa» es el sentido directo de גָּבִיעַ en este relato.
- source_word: הוּא יִהְיֶה לִּי עָבֶד
  english_pob_choice: he shall be my slave
  chosen_spanish: será mi esclavo
  alternatives_spanish:
  - será mi siervo
  lexicon: HALOT
  rationale: POB opta por «slave» por la fuerza punitiva del contexto. En español, «esclavo» preserva esa carga de sometimiento penal mejor que «siervo».
- source_word: וְאַתֶּם עֲלוּ
  english_pob_choice: but you may go up
  chosen_spanish: y ustedes suban
  alternatives_spanish:
  - pero ustedes suban
  - y ustedes pueden subir
  lexicon: HALOT
  rationale: El verbo imperativo plural se traduce con «suban». El matiz de concesión/relevo del contexto queda sugerido por la oposición con el hombre retenido; aquí el español fluye mejor sin forzar un auxiliar permisivo explícito.
- source_word: לְשָׁלוֹם
  english_pob_choice: in peace
  chosen_spanish: en paz
  alternatives_spanish:
  - en seguridad
  - pacíficamente
  lexicon: HALOT
  rationale: Es la equivalencia idiomática directa y natural en español para la despedida sin peligro ni conflicto.
- source_word: אֶל אֲבִיכֶם
  english_pob_choice: to your father
  chosen_spanish: a su padre
  alternatives_spanish:
  - a su padre
  - a vuestro padre
  lexicon: HALOT
  rationale: Como el discurso en español se dirige a varios hermanos de forma reverencial, «su padre» mantiene la referencia natural del plural. También evita una alternancia pronominal incómoda en español.
theological_decisions:
- issue: Valor punitivo de עָבֶד
  english_pob_reading: '''slave'' is chosen because the context is punitive bondage.'
  chosen_spanish_reading: «esclavo» conserva la idea de servidumbre coercitiva impuesta como castigo.
  alternative_spanish_readings:
  - «siervo» suavizaría indebidamente la coerción
  - «servidor» no expresa la penalidad
  rationale: El contexto de una sanción judicial o penal hace que la dependencia forzada sea central. Por eso se mantiene la dureza semántica del término, siguiendo la decisión auditada del inglés.
  doctrine_reference: Lexical force / bondservitude context
translation_notes:
  revision_awareness: Se revisó la coherencia con el audit trail inglés y no se detectaron cambios sustantivos en la última pasada; el borrador español mantiene la imagen hebrea, la fuerza idiomática de rechazo y la opción punitiva de עָבֶד.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma general del proyecto, pero este versículo no contiene el nombre divino.
  - «copa» refleja el objeto concreto del relato y evita una generalización innecesaria.
  - La segunda persona plural se adapta en español con «ustedes» para un registro bíblico claro y neutral latinoamericano.
