revisions:
- from: 'Entonces ella llamó a su marido y dijo[a]: «Por favor, envíame uno de los muchachos y una de las burras[b], para que yo pueda correr hasta el hombre de Dios y volver».'
  to: 'Entonces ella llamó a su marido y dijo: «Por favor, envíame uno de los muchachos y una de las burras[a], para que corra al hombre de Dios y vuelva».[b]'
  rationale: Se ajusta «hasta el hombre de Dios» a «al hombre de Dios» para un español más natural y para reflejar mejor el valor direccional idiomático de עַד en contexto de movimiento. Se cambia «para que yo pueda correr» por «para que corra» para evitar añadir capacidad no presente en el hebreo y mantener el propósito del cohortativo. Se corrige la nota sobre «burras» para que la alternativa realmente contraste con la especificidad femenina del término hebreo. También se reubica la nota de alternativa verbal al lugar donde corresponde semánticamente.
