translation:
  language: es
  text: Ella llena todos sus almacenes de deleite[a][b], y sus graneros con su cosecha.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'El hebreo dice: ''Ella llena todos sus almacenes de deleite, y sus graneros con su cosecha''. El testigo griego, en cambio, lee: ''La corona de sabiduría es el temor del Señor, brotando con paz y salud sanadora''.'
    reason: textual_variant
  - marker: b
    text: También puede entenderse como 'cosas preciosas', 'cosas agradables' o 'cosas deseables' para 'deleite'.
    reason: lexical_alternative
lexical_decisions:
- source_word: כָּל אוֹצָרֶיהָ
  english_pob_choice: All her storehouses
  chosen_spanish: Todos sus almacenes
  alternatives_spanish:
  - Todas sus despensas
  - Todos sus tesoros
  lexicon: HALOT
  rationale: אוֹצָר puede referirse a depósitos o almacenes de bienes; en paralelo con אֲסָמֶיהָ ('sus graneros'), el sentido agrícola y de almacenamiento es más natural que 'tesoros'. 'Almacenes' comunica bien el conjunto y evita un matiz demasiado abstracto.
- source_word: תְּמַלֵּא
  english_pob_choice: fills
  chosen_spanish: los llena
  alternatives_spanish:
  - los llenará
  - está llenando
  lexicon: HALOT
  rationale: El imperfecto hebreo funciona de modo proverbial en literatura sapiencial. El presente 'los llena' conserva ese valor gnómico en español sin forzar un futuro.
- source_word: חֶמְדָּה
  english_pob_choice: delight
  chosen_spanish: deleite
  alternatives_spanish:
  - deseo
  - cosas preciosas
  - cosas agradables
  lexicon: HALOT
  rationale: חֶמְדָּה puede significar deseo, cosas deseables o valor deleitoso. 'Deleite' mantiene el matiz positivo y abstracto que mejor encaja con la línea hebrea; por eso se conserva además la alternativa léxica en nota.
- source_word: וַאֲסָמֶיהָ
  english_pob_choice: and her granaries
  chosen_spanish: y sus graneros
  alternatives_spanish:
  - y sus almacenes
  - y sus trojes
  lexicon: HALOT
  rationale: אָסָם designa un granero o depósito de grano. 'Graneros' conserva la imagen agrícola y el paralelismo con la primera mitad del verso.
- source_word: בִּתְבוּאָתָהּ
  english_pob_choice: with her produce
  chosen_spanish: de su cosecha
  alternatives_spanish:
  - con su fruto
  - con su producción
  lexicon: HALOT
  rationale: תְּבוּאָה es cosecha, fruto o producto del campo. 'Cosecha' resulta natural en español y conserva la idea de rendimiento agrícola personificado.
- source_word: στέφανος σοφίας
  english_pob_choice: not adopted in main text
  chosen_spanish: corona de sabiduría
  alternatives_spanish:
  - coroa de la sabiduría
  - diadema de sabiduría
  lexicon: BDAG
  rationale: 'La tradición griega presenta una lectura muy distinta: ''corona de sabiduría...''. No se adopta en el texto principal porque el hebreo disponible gobierna esta sección, pero la alternativa se preserva para visibilizar la tensión textual significativa.'
theological_decisions:
- issue: Divergencia entre el hebreo conservado y el testigo griego en Sirácida 1:17
  english_pob_reading: Translate the extant Hebrew as the main text, with the Greek tradition preserved in a footnote
  chosen_spanish_reading: Traducir el hebreo como texto principal y dejar visible la tradición griega en nota
  alternative_spanish_readings:
  - 'Traducir el griego como texto principal: ''La corona de sabiduría es el temor del Señor, brotando con paz y salud curativa'''
  rationale: La política de la serie para Sirácida es seguir el hebreo donde existe, usando el griego como control y testimonio alterno. Aquí la discrepancia es sustancial, de modo que no se armoniza; se mantiene la tensión textual en nota para no ocultar una tradición importante.
  doctrine_reference: 'PHILOSOPHY.md: traducir Sirácida desde el hebreo donde sobrevive; preservar ambigüedad/tensión textual'
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión del inglés POB que ajustó la sintaxis para reflejar mejor el plural de כָּל אוֹצָרֶיהָ. En español se mantuvo el plural 'Todos sus almacenes' para conservar ese ajuste y la estructura proverbial del hebreo.
  spanish_consistency_notes:
  - Se preserva la personificación femenina de la sabiduría con 'sus'.
  - Se evita 'SEÑOR' en el cuerpo principal porque el pasaje hebreo citado no contiene el Tetragrámaton; la nota griega se traduce con 'Señor' por corresponder al κύριος del testigo griego.
  - '''Graneros'' y ''cosecha'' mantienen el campo semántico agrícola del hebreo.'
  - La puntuación separa los dos hemistiquios y hace visible el paralelismo poético.
