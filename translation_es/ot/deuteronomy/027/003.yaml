base_translation:
  language: en
  yaml_path: translation/ot/deuteronomy/027/003.yaml
  text: And you shall write on them all the words of this law when you cross over[a], so that you may enter the land that Yahweh your God is giving you, a land flowing with milk and honey, just as Yahweh, the God of your fathers[b], spoke to you.
  footnotes:
  - marker: a
    text: Or 'all the words of this instruction.' The Hebrew torah can mean 'instruction' as well as 'law'; here 'law' fits the covenantal context.
    reason: lexical_alternative
  - marker: b
    text: Or 'the God of your ancestors.' The Hebrew reads 'your fathers,' preserving the covenant formula used throughout Deuteronomy.
    reason: lexical_alternative
