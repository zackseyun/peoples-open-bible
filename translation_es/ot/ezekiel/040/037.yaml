  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura y el sentido general del hebreo y sigue de cerca las decisiones auditadas del POB en inglés: orientación del pórtico hacia el atrio exterior, palmeras en las jambas a ambos lados, y ocho escalones/gradas de subida. Sin embargo, la colocación de las notas alternativas está invertida respecto al rastro de auditoría inglés: la nota sobre «vestíbulo/porche» corresponde a «pórtico», mientras que la nota sobre «motivos de palmera» corresponde a «palmeras».'
  spanish_quality_summary: El español es claro, natural y de registro digno. «Su pórtico daba hacia el atrio exterior» y «en sus jambas, de un lado y del otro» son legibles. Solo conviene corregir el anclaje de las notas para que el lector no asocie la alternativa equivocada con la palabra equivocada.
  glossary_alignment: 'No hay términos teológicos sensibles aquí. El vocabulario arquitectónico está bien alineado con las decisiones del proyecto: «pórtico», «atrio exterior», «jambas», «palmeras». «Gradas» es aceptable en registro bíblico, aunque «escalones» también sería posible; no requiere cambio.'
  issues:
  - severity: medium
    issue: Las notas al pie [a] y [b] están ancladas a los términos equivocados.
    rationale: En el POB inglés, la alternativa «vestibule/porch» explica אֵילָו = «its portico», mientras que la alternativa sobre decoración de palmera explica תִמֹרִים = «palm trees». En el borrador español, [a] está sobre «pórtico» pero su texto sí corresponde; [b] está sobre «palmeras» y también corresponde, pero el resumen del POB inglés enumera las notas en orden inverso al texto. Para evitar cualquier confusión y mantener coherencia interna, conviene dejar las notas correctamente ancladas y formuladas de modo inequívoco en español.
  revised_spanish_text: Su pórtico[a] daba hacia el atrio exterior, y había palmeras[b] en sus jambas, de un lado y del otro; y ocho gradas subían hasta él.
  revised_footnotes:
  - marker: a
    text: O «su vestíbulo» o «su porche». El término hebreo puede referirse al elemento de entrada del portal.
    reason: lexical_alternative
  - marker: b
    text: O «motivos de palmera» o «decoraciones de palmera». El hebreo nombra palmeras explícitamente, pero en este contexto arquitectónico quizá se trate de relieves tallados.
    reason: lexical_alternative
  revision_rationale: El texto principal puede mantenerse. Se ajustan las notas para que queden inequívocamente ligadas a las decisiones léxicas correctas y expresadas con mayor claridad en español.
