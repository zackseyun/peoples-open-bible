base_translation:
  language: en
  yaml_path: translation/ot/2_samuel/017/025.yaml
  text: And Absalom set Amasa over the army in place of Joab. Now Amasa was the son of a man whose name was Ithra the Israelite[a], who had gone in to Abigail the daughter of Nahash, sister of Zeruiah, Joab’s mother.
  footnotes:
