    text: 'Hebreo: «Nabucodrezzar»; en el texto principal se usa la forma más familiar en español, «Nabucodonosor».'
    reason: lexical_alternative
  revision_rationale: Se explicita «Nabucodonosor» en la cláusula final para evitar una transición de sujeto confusa en español, y se sustituye «pronunció sentencia sobre él» por «dictó sentencia contra él», una formulación judicial más natural y precisa en este contexto.
