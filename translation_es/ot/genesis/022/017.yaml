  to: que ciertamente te bendeciré[a], y ciertamente multiplicaré tu descendencia[b] como las estrellas de los cielos y como la arena que está a la orilla del mar; y tu descendencia poseerá la puerta de los enemigos de él[c].
  rationale: 'Se requiere una reparación pequeña pero importante para alinear el español con una decisión auditada clave: conservar la tensión del singular colectivo en la última cláusula. ''Los enemigos de él'' es menos elegante, pero deja visible en español lo que el hebreo marca y lo que el English POB decidió preservar. También se ajusta ''en la orilla'' a ''a la orilla'' por mejor naturalidad, sin cambiar el sentido. La nota c se reemplaza para reflejar la alternativa plural documentada por la auditoría inglesa.'
  reviewer_model: gpt-5.4
