  language: en
  yaml_path: translation/ot/isaiah/030/026.yaml
  text: And the light of the moon will be like the light of the sun[a], and the light of the sun will be sevenfold, like the light of seven days, on the day when Yahweh binds up the fracture of his people and heals the wound from his blow.
