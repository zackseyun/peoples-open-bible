id: ROM.1.27
reference: Romans 1:27
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: ὁμοίως τε καὶ οἱ ἄρσενες ἀφέντες τὴν φυσικὴν χρῆσιν τῆς θηλείας ἐξεκαύθησαν ἐν τῇ ὀρέξει αὐτῶν εἰς ἀλλήλους, ἄρσενες ἐν ἄρσεσιν τὴν ἀσχημοσύνην κατεργαζόμενοι καὶ τὴν ἀντιμισθίαν ἣν ἔδει τῆς πλάνης αὐτῶν ἐν ⸀ἑαυτοῖς ἀπολαμβάνοντες.
base_translation:
  language: en
  yaml_path: translation/nt/romans/001/027.yaml
  text: And likewise the males[a], having abandoned the natural use of the female, were inflamed in their desire for one another[d][c][b], males with males committing indecency and receiving in themselves the due penalty for their error.
  footnotes:
  - marker: a
    text: Or 'the natural use of the female.'
    reason: lexical_alternative
  - marker: b
    text: Or 'burned in their lust for one another.'
    reason: lexical_alternative
  - marker: c
    text: Or 'doing what is shameful.'
    reason: lexical_alternative
  - marker: d
    text: Or 'the fitting recompense' or 'the due recompense' for their error.
    reason: lexical_alternative
translation:
  language: ko
  text: 마찬가지로 남자들도 여자와의 본성적인 관계를 버리고 서로에 대한 욕망으로 불태워져, 남자가 남자와 더불어 부끄러운 일을 행하고 그들의 미혹에 대한 합당한 보응을 자기 자신 안에 받았습니다.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ἐξεκαύθησαν
  english_pob_choice: were inflamed
  chosen_korean: 불태워져
  alternatives_korean:
  - 불붙어
  - 타올라
  lexicon: BDAG
  rationale: 수동태와 강조 접두사를 「불태워지다」로 보존한다.
- source_word: ἀσχημοσύνην
  english_pob_choice: indecency
  chosen_korean: 부끄러운 일
  alternatives_korean:
  - 수치스러운 일
  - 꼴사나운 일
  lexicon: BDAG
  rationale: 공적 수치의 함의를 「부끄러운 일」로 옮긴다.
- source_word: πλάνης
  english_pob_choice: error
  chosen_korean: 미혹
  alternatives_korean:
  - 오류
  - 잘못된 길
  lexicon: BDAG
  rationale: 바울의 「길 잃음」의 함의를 「미혹」으로 보존한다.
- source_word: ἀντιμισθίαν
  english_pob_choice: due penalty
  chosen_korean: 합당한 보응
  alternatives_korean:
  - 마땅한 갚음
  lexicon: BDAG
  rationale: 상응의 함의를 「합당한 보응」으로 옮긴다.
theological_decisions:
- issue: 1:27 동성 간 행위에 대한 직설적 진단 보존
  chosen_reading: 남자가 남자와 더불어 부끄러운 일을 행하고 ... 합당한 보응을 자기 자신 안에 받았습니다
  alternative_readings:
  - 완곡어법을 통한 부드러운 표현
  rationale: 북성 원칙에 따라 본문의 강도와 특정성을 약화시키지 않는다. 한국 전통의 「상남끼리」 같은 우회 어법보다 직접적인 「남자가 남자와 더불어」로 옮겨 바울의 진단을 보존한다.
  doctrine_reference: 'DOCTRINE.md §1+§5 — Rom 1:18-32 wrath: preserve force'
