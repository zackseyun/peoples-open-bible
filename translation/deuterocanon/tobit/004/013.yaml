id: TOB.4.13
reference: Tobit 4:13
source:
  edition: lxx-swete-1909
  text: καὶ νῦν, παιδίον, ἀγάπα τοὺς ἀδελφούς σου, καὶ μὴ ὑπερηφάνευε τῇ καρδίᾳ σου ἀπὸ τῶν ἀδελφῶν σου καὶ τῶν υἱῶν καὶ θυγατέρων τοῦ λαοῦ σου, λαβεῖν σεαυτῷ ἐξ αὐτῶν γυναῖκα. διότι ἐν τῇ ὑπερηφανίᾳ ἀπώλεια καὶ ἀκαταστασία πολλή, καὶ ἐν τῇ ἀχρειότητι ἐλάττωσις καὶ ἔνδεια μεγάλη· ἡ γὰρ ἀχρειότης μήτηρ ἐστὶν τοῦ λιμοῦ.
  language: Greek
  pages:
  - 832
  - 835
  - 837
  - 838
  - 839
  - 840
  - 841
  - 842
  - 843
  - 844
