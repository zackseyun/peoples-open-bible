revisions:
- from: Pero cuando nadie respondió[a], él apartó la cortina y entró en el dormitorio, y lo encontró tendido muerto sobre el dosel[b]; y su cabeza le había sido quitada.
  to: Pero cuando nadie respondió, apartó la cortina y entró en el dormitorio, y lo encontró tendido muerto sobre el dosel[a]; y le habían quitado la cabeza[b].
  rationale: La revisión hace el español más natural y mantiene mejor el razonamiento léxico del POB. Se elimina el pronombre enfático innecesario, se conserva «dosel» con su ambigüedad en nota, y se añade una nota para la formulación literal de la decapitación, reflejando la evidencia griega y el rastro inglés sin sobreparafrasear.
