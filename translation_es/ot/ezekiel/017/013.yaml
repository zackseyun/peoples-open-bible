    issue: ‘de la semilla real’ suena demasiado literal y pierde el sentido partitivo
    rationale: מִזֶּרַע הַמְּלוּכָה no es solo ‘de la semilla real’ como abstracción, sino ‘uno de la descendencia real’. La formulación actual no expresa claramente que se tomó a un individuo de esa línea.
  - severity: low
    issue: ‘hizo pacto con él’ es menos natural que ‘hizo un pacto con él’
    rationale: Aunque comprensible, en español general y eclesial moderno ‘hizo un pacto con él’ suena más idiomático y sigue preservando la fuerza de בְּרִית.
  revised_spanish_text: Y tomó a uno de la descendencia real, e hizo un pacto con él[a], poniéndolo bajo juramento, y tomó a los poderosos de la tierra.
