translation:
  language: es
  text: Tensan su lengua, su arco, para la mentira, y no para la fidelidad se han fortalecido en la tierra; porque de mal en mal van[a], y a mí no me conocen[b], declara Yahvé.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «de una maldad a otra», según el sentido idiomático de una progresión continua.'
    reason: lexical_alternative
  - marker: b
    text: «No me conocen» también puede llevar el sentido de reconocerme relacionalmente y en términos de pacto.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּדְרְכוּ
  english_pob_choice: They bend
  chosen_spanish: Tensan
  alternatives_spanish:
  - Bendicen
  - Doblan
  - Tensan como arco
  lexicon: HALOT
  rationale: El verbo דרך con imagen de arco expresa tensar o preparar el arco para disparar. En español, «tensan» comunica esa acción con naturalidad y conserva la metáfora bélica aplicada a la lengua.
- source_word: לְשׁוֹנָם
  english_pob_choice: their tongue
  chosen_spanish: su lengua
  alternatives_spanish:
  - su lengua
  - sus lenguas
  lexicon: HALOT
  rationale: El hebreo usa singular con sufijo plural, pero en español «su lengua» mantiene la imagen colectiva y es la forma más idiomática para el órgano del habla como instrumento.
- source_word: קַשְׁתָּם
  english_pob_choice: their bow
  chosen_spanish: como arco
  alternatives_spanish:
  - su arco
  - su arco de guerra
  lexicon: HALOT
  rationale: 'En la construcción hebrea hay aposición/imagen elíptica. El español requiere explicitar la comparación: la lengua es tratada como arco. «Como arco» preserva la figura sin sobreexplicar.'
- source_word: שֶׁקֶר
  english_pob_choice: for falsehood
  chosen_spanish: de mentira
  alternatives_spanish:
  - para la falsedad
  - para la mentira
  - de falsedad
  lexicon: HALOT
  rationale: שקר designa falsedad/engaño. Aquí «de mentira» funciona de modo natural con «arco» y conserva el valor abstracto y moral del término.
- source_word: לֶאֱמוּנָה
  english_pob_choice: for faithfulness
  chosen_spanish: la fidelidad
  alternatives_spanish:
  - la fe
  - la verdad
  - la lealtad
  lexicon: HALOT
  rationale: אֱמוּנָה suele significar firmeza, fiabilidad, fidelidad. «Fidelidad» es la mejor contraparte española frente a «mentira», manteniendo el contraste ético.
- source_word: גָּבְרוּ
  english_pob_choice: have they grown strong
  chosen_spanish: se han fortalecido
  alternatives_spanish:
  - han prevalecido
  - se han hecho poderosos
  - han crecido en poder
  lexicon: HALOT
  rationale: גבר implica volverse fuerte o prevalecer. «Se han fortalecido» conserva el matiz de aumento de poder/solidez con tono claro y fluido en español.
- source_word: בָאָרֶץ
  english_pob_choice: in the land
  chosen_spanish: en la tierra
  alternatives_spanish:
  - en el país
  - en la tierra prometida
  lexicon: HALOT
  rationale: En Jeremías, la referencia es la tierra/cuerpo social del pacto. «En la tierra» respeta el alcance contextual y la fórmula habitual del libro.
- source_word: מֵרָעָה אֶל רָעָה
  english_pob_choice: from evil to evil
  chosen_spanish: de mal en mal
  alternatives_spanish:
  - de maldad en maldad
  - de una maldad a otra
  - de mal a peor
  lexicon: HALOT
  rationale: La frase expresa progresión continua en el mal. «De mal en mal» es un equivalente español establecido y muy cercano al hebreo.
- source_word: יָצָאוּ
  english_pob_choice: they go
  chosen_spanish: van
  alternatives_spanish:
  - salen
  - avanzan
  - prosiguen
  lexicon: HALOT
  rationale: El verbo salir puede indicar progresión o desplazamiento. «Van» refleja el movimiento continuo del hebreo y suena natural en esta construcción idiomática.
- source_word: יָדָעוּ
  english_pob_choice: they do not know me
  chosen_spanish: no me conocen
  alternatives_spanish:
  - no me reconocen
  - no me han conocido
  - no me reconocen ni me obedecen
  lexicon: HALOT
  rationale: ידע en contexto relacional/covenantal incluye conocimiento personal y reconocimiento de alianza. «No me conocen» preserva la ambigüedad teológica sin reducirla a mera información.
- source_word: נְאֻם יְהוָה
  english_pob_choice: declares Yahweh
  chosen_spanish: declara Yahvé
  alternatives_spanish:
  - dice Yahvé
  - oráculo de Yahvé
  lexicon: HALOT
  rationale: La fórmula profética se vierte de modo solemne y claro como «declara Yahvé». Mantiene el nombre divino conforme a la norma del proyecto.
theological_decisions:
- issue: Conocimiento relacional/covenantal en ידע
  english_pob_reading: they do not know me
  chosen_spanish_reading: no me conocen
  alternative_spanish_readings:
  - no me reconocen
  - no me obedecen
  rationale: El hebreo puede implicar conocimiento relacional, reconocimiento de autoridad y lealtad pactal. La traducción principal conserva «conocen» para no estrechar indebidamente el sentido; el matiz relacional queda abierto.
  doctrine_reference: Preservar la tensión semántica de ידע en contexto de pacto.
- issue: Imagen de lengua como arma
  english_pob_reading: They bend their tongue, their bow, for falsehood
  chosen_spanish_reading: Tensan su lengua como arco de mentira
  alternative_spanish_readings:
  - Tensan su lengua, su arco, para mentir
  - Tensan su lengua para la mentira
  rationale: El hebreo une lengua y arco en una imagen de agresión verbal. El español necesita una comparación explícita para que la imagen se entienda sin perder su fuerza metafórica.
  doctrine_reference: Mantener la metáfora bélica del habla en Jeremías.
- issue: Fidelidad frente a mentira
  english_pob_reading: not for faithfulness
  chosen_spanish_reading: y no para la fidelidad
  alternative_spanish_readings:
  - y no para la verdad
  - y no para la lealtad
  rationale: אֱמוּנָה aquí contrasta con שקר. «Fidelidad» preserva mejor el valor ético-relacional que «verdad» en español contemporáneo.
  doctrine_reference: Conservar el contraste moral del paralelismo hebreo.
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión inglesa más reciente, que ajustó la puntuación para hacer más clara la aposición («their tongue, their bow») y prefirió «go» por naturalidad. En español, esa claridad se expresa con la comparación explícita «como arco» y con «van», que conserva el movimiento progresivo sin perder fluidez.
  spanish_consistency_notes:
  - Se mantiene Yahvé para יהוה, conforme a la norma del proyecto.
  - Se usó «fidelidad» para אֱמוּנָה por contraste directo con «mentira».
  - Se preservó la imagen bélica de la lengua sin convertirla en paráfrasis moral general.
  - «No me conocen» deja abierta la lectura relacional/covenantal de ידע.
  - La puntuación reproduce la progresión del texto hebreo con dos miembros principales y una cláusula final profética.
