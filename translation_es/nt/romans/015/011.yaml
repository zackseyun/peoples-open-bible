base_translation:
  language: en
  yaml_path: translation/nt/romans/015/011.yaml
  text: 'And again: “Praise the Lord[a], all the nations[b], and let all the peoples praise him.”'
  footnotes:
  - marker: a
    text: Or “all the Gentiles.” Greek ἔθνη can mean “nations” or “Gentiles”; here the quotation has a universal sense, while also fitting Paul’s argument about the Gentiles.
    reason: lexical_alternative
  - marker: b
    text: Or “Praise the LORD,” reflecting the Hebrew source of the quotation, where the divine name is represented in Greek by κύριος (“Lord”).
    reason: alternative_reading
