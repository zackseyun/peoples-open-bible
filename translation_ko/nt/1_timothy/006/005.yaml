id: 1TI.6.5
reference: 1 Timothy 6:5
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: διαπαρατριβαὶ διεφθαρμένων ἀνθρώπων τὸν νοῦν καὶ ἀπεστερημένων τῆς ἀληθείας, νομιζόντων πορισμὸν εἶναι τὴν ⸀εὐσέβειαν.
base_translation:
  language: en
  yaml_path: translation/nt/1_timothy/006/005.yaml
  text: constant friction among people whose minds are corrupted and who have been deprived of the truth[b][a], imagining that godliness is a means of gain.
  footnotes:
  - marker: a
    text: Or 'constant quarrels' or 'continual wranglings.' The Greek term pictures ongoing friction or rubbing against one another.
    reason: lexical_alternative
  - marker: b
    text: Or 'imagining that godliness is profit' or 'a source of profit.' The sense is that they treat devotion to God as something to exploit for material advantage.
    reason: lexical_alternative
translation:
  language: ko
  text: 그리고 마음이 부패하고 진리를 빼앗긴 사람들 사이의 끊임없는 충돌[a]이 일어납니다. 그들은 경건을 이익의 수단으로 여기는 자들입니다[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 또는 「끊임없는 다툼」 「계속되는 마찰」. 헬라어 어휘는 지속적으로 서로 부딪치는 마찰을 그린다.
    reason: lexical_alternative
  - marker: b
    text: 또는 「경건을 이익으로」 「수익원으로 여기는」. 곧 하나님을 향한 헌신을 물질적 이득을 위해 이용하려 한다는 의미이다.
    reason: lexical_alternative
lexical_decisions:
- source_word: διαπαρατριβαὶ
  english_pob_choice: constant friction
  chosen_korean: 끊임없는 충돌
  alternatives_korean:
  - 끊임없는 마찰
  - 계속되는 다툼
  lexicon: BDAG
  rationale: διά + παρά + τρίβω 강조 합성. 「충돌」이 그 강조를 살린다.
- source_word: διεφθαρμένων ἀνθρώπων τὸν νοῦν
  english_pob_choice: people whose minds are corrupted
  chosen_korean: 마음이 부패한 사람들
  alternatives_korean:
  - 정신이 부패한 자들
  - 마음이 타락한 자들
  lexicon: BDAG
  rationale: διαφθείρω의 완료 수동을 「부패하고」로.
- source_word: ἀπεστερημένων τῆς ἀληθείας
  english_pob_choice: who have been deprived of the truth
  chosen_korean: 진리를 빼앗긴
  alternatives_korean:
  - 진리에서 떨어져 나간
  lexicon: BDAG
  rationale: ἀποστερέω의 「빼앗다」를 「빼앗긴」으로.
- source_word: νομιζόντων πορισμὸν εἶναι τὴν εὐσέβειαν
  english_pob_choice: imagining that godliness is a means of gain
  chosen_korean: 경건을 이익의 수단으로 여기는 자들
  alternatives_korean:
  - 경건을 돈벌이로 여기는 자들
  - 경건을 이득의 도구로 보는 자들
  lexicon: BDAG
  rationale: πορισμός의 「이득·수익」을 「이익」으로 절제하여 옮긴다.
