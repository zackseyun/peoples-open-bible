translation:
  language: es
  text: Porque, ¿quién de toda carne[a] ha oído la voz del Dios vivo, que habla de en medio del fuego, como nosotros la hemos oído, y ha vivido?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «toda carne», un modismo para la humanidad mortal.'
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  lexicon: HALOT
  rationale: Introduce la razón del temor y la petición del pueblo en el contexto inmediato. «Porque» conserva la fuerza explicativa/causal de כִּי en español natural.
- source_word: מִי
  english_pob_choice: who
  chosen_spanish: ¿quién?
  alternatives_spanish:
  - ¿qué persona?
  - ¿quién de...?
  lexicon: HALOT
  rationale: Es una pregunta retórica; «¿quién?» es la equivalencia más natural y fiel en español.
- source_word: כָל בָּשָׂר
  english_pob_choice: all flesh
  chosen_spanish: toda carne
  alternatives_spanish:
  - todo ser humano
  - toda la humanidad
  lexicon: HALOT
  rationale: Se mantiene el idiomatismo hebreo para conservar el matiz de mortalidad y creaturalidad. En español, «carne» suena algo marcado, pero sigue siendo comprensible y refleja mejor el texto fuente que una paráfrasis más plana.
- source_word: שָׁמַע
  english_pob_choice: has heard
  chosen_spanish: ha oído
  alternatives_spanish:
  - oyó
  - ha escuchado
  lexicon: HALOT
  rationale: El perfecto compuesto comunica bien la experiencia cumplida con relevancia presente en la pregunta retórica.
- source_word: קוֹל
  english_pob_choice: the voice
  chosen_spanish: la voz
  alternatives_spanish:
  - el sonido
  lexicon: HALOT
  rationale: Con un hablante explícito, «voz» es la mejor equivalencia; «sonido» sería demasiado general.
- source_word: אֱלֹהִים חַיִּים
  english_pob_choice: the living God
  chosen_spanish: el Dios vivo
  alternatives_spanish:
  - el Dios viviente
  lexicon: HALOT
  rationale: Aunque la forma hebrea es plural morfológicamente, el referente es singular y el giro es una designación estable de Dios. «Dios vivo» preserva el sentido y es idiomático en español bíblico moderno.
- source_word: מְדַבֵּר
  english_pob_choice: speaking
  chosen_spanish: que hablaba
  alternatives_spanish:
  - hablando
  - que habla
  lexicon: HALOT
  rationale: 'El participio modifica a «el Dios vivo» y en español resulta más fluido con una relativa: «que hablaba». Mantiene la acción en curso sin endurecer la sintaxis.'
- source_word: מִתּוֹךְ הָאֵשׁ
  english_pob_choice: from the midst of the fire
  chosen_spanish: desde en medio del fuego
  alternatives_spanish:
  - desde el interior del fuego
  - de en medio del fuego
  lexicon: HALOT
  rationale: Conserva la imagen vívida de procedencia desde dentro del fuego. «Desde en medio» reproduce bien la relación espacial del hebreo sin perder naturalidad.
- source_word: כָּמֹנוּ
  english_pob_choice: as we have
  chosen_spanish: como nosotros
  alternatives_spanish:
  - como nosotros lo hemos hecho
  - igual que nosotros
  lexicon: HALOT
  rationale: En español, la comparación retórica se entiende mejor con una construcción directa; el verbo ya queda implícito por el contexto inmediato.
- source_word: וַיֶּחִי
  english_pob_choice: and lived
  chosen_spanish: y ha vivido
  alternatives_spanish:
  - y vivió
  - y sobrevivió
  lexicon: HALOT
  rationale: «Ha vivido» sigue el valor perfecto del hebreo en una pregunta retórica y conserva la sorpresa de que alguien permanezca con vida después de oír la voz divina.
theological_decisions:
- issue: Idiom of mortal humanity in כָל בָּשָׂר
  english_pob_reading: all flesh
  chosen_spanish_reading: toda carne
  alternative_spanish_readings:
  - todo ser humano
  - toda la humanidad
  rationale: 'Se preserva el idiomatismo para mantener la carga antropológica del hebreo: humanidad mortal y frágil ante Dios. Esto evita suavizar el efecto retórico del pasaje.'
  doctrine_reference: Translation philosophy §1, §3, §6
- issue: Singular referent of אֱלֹהִים חַיִּים
  english_pob_reading: the living God
  chosen_spanish_reading: el Dios vivo
  alternative_spanish_readings:
  - el Dios viviente
  - los dioses vivos
  rationale: Aunque la forma es plural en hebreo, el contexto y el uso bíblico establecen un singular referencial. Traducir en plural distorsionaría el sentido teológico del texto.
  doctrine_reference: Affirmations; Translation philosophy §1
translation_notes:
  revision_awareness: 'El texto fuente y el audit trail inglés muestran alto acuerdo y no registran revisiones aplicadas; la redacción española sigue de cerca esas decisiones, preservando los dos puntos sensibles del versículo: el modismo antropológico y el título singular para Dios.'
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el texto fuente lo requiere; aquí no aparece el nombre divino, sino אֱלֹהִים, por lo que corresponde «Dios».
  - Se mantiene el registro bíblico contemporáneo y reverente sin recurrir a mayúsculas litúrgicas artificiales.
  - La pregunta retórica se conserva con puntuación española completa para reflejar el énfasis del hebreo.
  - «Toda carne» se deja con nota porque el español moderno puede sonar marcado, pero es una opción auditable y fuente-cercana.
