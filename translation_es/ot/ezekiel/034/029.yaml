base_translation:
  language: en
  yaml_path: translation/ot/ezekiel/034/029.yaml
  text: And I will raise up for them a planting of renown[a], and they will no longer be consumed by famine in the land[b], nor will they bear the disgrace of the nations anymore.
  footnotes:
  - marker: a
    text: Or 'a planting for a name,' that is, 'a famous/renowned planting.'
    reason: lexical_alternative
  - marker: b
    text: The Hebrew phrase rendered 'those swept away by famine' is difficult; more literally, 'those gathered of famine,' possibly meaning 'victims of famine' or 'those consumed by famine.'
    reason: lexical_alternative
