revisions:
- from: 'Entonces Safán, el escriba, fue al rey y le llevó un informe al rey, y dijo: «Tus siervos[a] han vaciado la plata que fue hallada en la casa y la han entregado en manos de los obreros, los encargados de la casa de Yahvé»[b].'
  to: 'Entonces Safán, el escriba, vino al rey y le dio un informe, y dijo: «Tus siervos[a] han vaciado la plata que fue hallada en la casa[b] y la han entregado en manos de los obreros, los encargados de la casa de Yahvé»'
  rationale: Se reubica la nota cultural para que explique correctamente la primera mención de 'la casa', que es donde surge la posible ambigüedad. También se pule el español con 'vino al rey' y 'le dio un informe' para sonar más natural y reflejar mejor el hebreo sin alterar el sentido.
