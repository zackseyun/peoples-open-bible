translation:
  language: es
  text: 'Y Judá también peleará[a] en Jerusalén, y la riqueza de todas las naciones de alrededor será reunida: oro, plata y vestidos, en grandísima abundancia.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «contra Jerusalén». La preposición hebrea normalmente significa «en», pero algunos entienden la frase, a la luz del contexto circundante, como indicación de oposición.
    reason: alternative_reading
lexical_decisions:
- source_word: וְגַם
  english_pob_choice: And ... also
  chosen_spanish: Y ... también
  alternatives_spanish:
  - Y aun
  - Y además
  lexicon: HALOT
  rationale: El hebreo añade continuidad con énfasis. «Y ... también» conserva la fuerza aditiva de וְגַם de manera natural en español.
- source_word: יְהוּדָה
  english_pob_choice: Judah
  chosen_spanish: Judá
  alternatives_spanish:
  - Judah
  lexicon: HALOT
  rationale: Es el nombre propio geográfico y étnico habitual en español bíblico contemporáneo.
- source_word: תִּלָּחֵם
  english_pob_choice: will fight
  chosen_spanish: peleará
  alternatives_spanish:
  - combatirá
  - hará guerra
  lexicon: HALOT
  rationale: El nifal de לחם aquí expresa entrar en combate. «Peleará» comunica bien la acción sin sobrerregularizarla como «hará guerra».
- source_word: בִּירוּשָׁלִָם
  english_pob_choice: at Jerusalem
  chosen_spanish: en Jerusalén
  alternatives_spanish:
  - contra Jerusalén
  - en/contra Jerusalén
  lexicon: HALOT
  rationale: La preposición ב normalmente es locativa («en/at»). Se mantiene esa lectura en el texto principal; la alternativa opositiva se preserva en nota por el contexto más amplio.
- source_word: וְאֻסַּף
  english_pob_choice: will be gathered
  chosen_spanish: será reunida
  alternatives_spanish:
  - será recogida
  - será reunida y juntada
  lexicon: HALOT
  rationale: La forma pasiva con waw profética expresa futuro. «Será reunida» refleja el pasivo y funciona bien con el sustantivo colectivo siguiente.
- source_word: חֵיל
  english_pob_choice: the wealth
  chosen_spanish: la riqueza
  alternatives_spanish:
  - el botín
  - los bienes
  - la fortuna
  lexicon: HALOT
  rationale: Aunque חֵיל puede referirse a fuerza, ejército o riqueza, la lista de oro, plata y vestidos indica bienes materiales; «riqueza» es el equivalente más claro en español.
- source_word: כָּל הַגּוֹיִם סָבִיב
  english_pob_choice: of all the surrounding nations
  chosen_spanish: de todas las naciones de alrededor
  alternatives_spanish:
  - de todas las naciones circundantes
  - de todas las naciones alrededor
  lexicon: HALOT
  rationale: La frase marca procedencia amplia y espacial. «De alrededor» preserva la idea de circunferencia sin sonar demasiado técnica.
- source_word: זָהָב וָכֶסֶף וּבְגָדִים
  english_pob_choice: gold and silver and garments
  chosen_spanish: oro, plata y vestidos
  alternatives_spanish:
  - oro, plata y prendas
  - oro, plata y ropas
  lexicon: HALOT
  rationale: La lista de objetos valiosos se traduce de forma directa. «Vestidos» mantiene un registro bíblico natural y evita estrechar el sentido a simple ropa cotidiana.
- source_word: לָרֹב מְאֹד
  english_pob_choice: in very great abundance
  chosen_spanish: en muy grande abundancia
  alternatives_spanish:
  - en gran abundancia
  - en abundancia muy grande
  lexicon: HALOT
  rationale: La frase intensifica la cantidad. «En muy grande abundancia» conserva el doble énfasis del hebreo y suena idiomático en español.
theological_decisions:
- issue: Si בִּירוּשָׁלִָם indica lucha en/at Jerusalén o contra Jerusalén
  english_pob_reading: Judah also will fight at Jerusalem
  chosen_spanish_reading: Judá también peleará en Jerusalén
  alternative_spanish_readings:
  - Judá también peleará contra Jerusalén
  rationale: La preposición hebrea es normalmente locativa, por lo que el texto principal conserva «en Jerusalén». Dado que el contexto más amplio permite una lectura hostil, se mantiene la tensión mediante nota en vez de resolverla dogmáticamente.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: La revisión más reciente indicó que no se requerían cambios y el verificador cruzado mostró alto acuerdo; por eso se mantiene la solución principal con la tensión interpretativa preservada en nota.
  spanish_consistency_notes:
  - Se usa «Yahvé» como norma del proyecto, pero este versículo no contiene el nombre divino.
  - Se mantiene «Judá» como nombre propio y «Jerusalén» como topónimo estándar en español.
  - Se prefiere «peleará» frente a calcos más pesados como «hará guerra», por claridad y fidelidad al valor verbal.
  - La lista final de bienes se conserva sin ampliarla ni explicarla más allá de lo que el hebreo warrants.
  - La nota reproduce la alternativa de lectura sin imponer una interpretación doctrinal única.
