translation:
  language: es
  text: Y volvió con ellos, él mismo y sus tropas, por ciento veinte días.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ἀνέστρεψεν
  english_pob_choice: returned
  chosen_spanish: volvió
  alternatives_spanish:
  - regresó
  - retornó
  lexicon: LSJ
  rationale: En este contexto narrativo, ἀναστρέφω expresa volver atrás o regresar. «Volvió» conserva el sentido direccional con español natural y digno.
- source_word: μετʼ αὐτῶν
  english_pob_choice: with them
  chosen_spanish: con ellos
  alternatives_spanish:
  - junto con ellos
  - con ellos mismos
  lexicon: LSJ
  rationale: La preposición μετά con genitivo indica compañía; «con ellos» es la forma más directa y natural en español.
- source_word: αὐτὸς
  english_pob_choice: he himself
  chosen_spanish: él mismo
  alternatives_spanish:
  - él
  - personalmente él
  lexicon: LSJ
  rationale: El pronombre explícito añade énfasis y distingue al líder en persona. «Él mismo» preserva ese énfasis mejor que un simple «él».
- source_word: ἡ δύναμις αὐτοῦ
  english_pob_choice: his force
  chosen_spanish: su fuerza
  alternatives_spanish:
  - su ejército
  - sus tropas
  lexicon: LSJ
  rationale: δύναμις puede referirse a una fuerza armada; «fuerza» mantiene el alcance semántico amplio del griego y sigue siendo comprensible en un contexto militar.
- source_word: ἐφʼ ἡμέρας ἑκατὸν εἴκοσι
  english_pob_choice: for one hundred twenty days
  chosen_spanish: por ciento veinte días
  alternatives_spanish:
  - durante ciento veinte días
  - a lo largo de ciento veinte días
  lexicon: LSJ
  rationale: La construcción temporal indica duración. «Por ciento veinte días» es idiomática en español y reproduce bien el valor durativo.
translation_notes:
  revision_awareness: La versión inglesa auditada no presenta notas ni revisiones textuales; el testimonio griego y la traducción inglesa concuerdan estrechamente, por lo que no se introducen variantes ni notas críticas.
  spanish_consistency_notes:
  - Se mantiene el orden sencillo de la narración sin añadir información implícita.
  - Se conserva el pronombre enfático «él mismo» para reflejar el griego αὐτός.
  - «Su fuerza» evita especificar innecesariamente «ejército» y respeta la amplitud de δύναμις.
