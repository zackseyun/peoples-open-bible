  rationale: Se corrige el lugar y el contenido de la nota [a] para que corresponda al verbo hebreo relevante y preserve mejor las alternativas léxicas documentadas. También se ajusta «a mis huesos» a «en mis huesos» por mayor naturalidad en español sin alterar el sentido fuente. No se requiere adjudicación adicional; es una reparación menor y segura.
