  text: וַ/יֹּ֨אמֶר יְהוָ֜ה אֶל גִּדְע֗וֹן עוֹד֮ הָ/עָ֣ם רָב֒ הוֹרֵ֤ד אוֹתָ/ם֙ אֶל הַ/מַּ֔יִם וְ/אֶצְרְפֶ֥/נּוּ לְ/ךָ֖ שָׁ֑ם וְ/הָיָ֡ה אֲשֶׁר֩ אֹמַ֨ר אֵלֶ֜י/ךָ זֶ֣ה יֵלֵ֣ךְ אִתָּ֗/ךְ ה֚וּא יֵלֵ֣ךְ אִתָּ֔/ךְ וְ/כֹ֨ל אֲשֶׁר אֹמַ֜ר אֵלֶ֗י/ךָ זֶ֚ה לֹא יֵלֵ֣ךְ עִמָּ֔/ךְ ה֖וּא לֹ֥א יֵלֵֽךְ־־׀־־׃
translation:
  text: 'Then the LORD said to Gideon, “The people are still too many. Bring them down to the water, and there I will test them for you. And this is what will happen: anyone of whom I say to you, ‘This one shall go with you,’ he shall go with you; but anyone of whom I say to you, ‘This one shall not go with you,’ he shall not go.”'
