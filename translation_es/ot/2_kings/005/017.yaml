translation:
  language: es
  text: 'Entonces Naamán dijo[a]: «Si no, te ruego que se le dé a tu siervo una carga de tierra, tanto como puedan llevar un par de mulas; porque tu siervo ya no ofrecerá holocausto ni sacrificio a otros dioses[b], sino solo a Yahvé»[c].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «la carga de un par de mulas» o «una carga de dos mulas». La frase hebrea se refiere a tanta tierra como pueda llevar un par de mulas.
    reason: lexical_alternative
  - marker: b
    text: La petición de Naamán por tierra de Israel puede reflejar la antigua asociación de una deidad con una tierra, o un deseo de adorar a Yahvé sobre tierra israelita; el texto no declara explícitamente la razón.
    reason: cultural_note
  - marker: c
    text: Yahvé representa el nombre divino יהוה (YHWH) en esta traducción.
    reason: source_note
lexical_decisions:
- source_word: וָלֹא
  english_pob_choice: If not
  chosen_spanish: Si no
  alternatives_spanish:
  - Y si no
  - En caso contrario
  lexicon: HALOT
  rationale: La expresión introduce una respuesta elíptica y condicional al rechazo previo, no un simple «y no». «Si no» conserva ese valor discursivo con naturalidad en español.
- source_word: יֻתַּן נָא לְעַבְדְּךָ
  english_pob_choice: please let there be given to your servant
  chosen_spanish: te ruego que se le dé a tu siervo
  alternatives_spanish:
  - por favor, que se dé a tu siervo
  - permite que se le dé a tu siervo
  lexicon: HALOT
  rationale: El hebreo tiene una forma pasiva con partícula de cortesía. «Te ruego que se le dé» preserva la deferencia y la pasividad sin sonar forzado en español.
- source_word: מַשָּׂא
  english_pob_choice: a load
  chosen_spanish: una carga
  alternatives_spanish:
  - un bulto
  - un peso
  lexicon: HALOT
  rationale: «Carga» comunica bien algo transportable y mantiene el sentido de cantidad cargada que desarrolla la frase siguiente.
- source_word: צֶמֶד פְּרָדִים
  english_pob_choice: as much as a pair of mules can carry
  chosen_spanish: tanto como puedan llevar un par de mulas
  alternatives_spanish:
  - la carga de un par de mulas
  - la cantidad que puede llevar un par de mulas
  lexicon: HALOT
  rationale: La construcción describe la cantidad que pueden transportar las mulas. La frase elegida es natural en español y conserva la medida implícita.
- source_word: אֲדָמָה
  english_pob_choice: earth
  chosen_spanish: tierra
  alternatives_spanish:
  - suelo
  - suelo de tierra
  lexicon: HALOT
  rationale: En español bíblico, «tierra» expresa con claridad el material del que Naamán pide una porción transportada desde Israel.
- source_word: עֹלָה
  english_pob_choice: burnt offering
  chosen_spanish: holocausto
  alternatives_spanish:
  - ofrenda quemada
  - ofrenda total
  lexicon: HALOT
  rationale: «Holocausto» es el término técnico más reconocido en español para la ofrenda totalmente quemada; aquí mantiene precisión sacrificial.
- source_word: זֶבַח
  english_pob_choice: sacrifice
  chosen_spanish: sacrificio
  alternatives_spanish:
  - ofrenda
  - víctima
  lexicon: HALOT
  rationale: «Sacrificio» conserva el valor general del término sin especificarlo más de lo que el hebreo hace.
- source_word: לֵאלֹהִים אֲחֵרִים
  english_pob_choice: to other gods
  chosen_spanish: a otros dioses
  alternatives_spanish:
  - para otros dioses
  - ante otros dioses
  lexicon: HALOT
  rationale: La preposición marca el destinatario de la ofrenda. «A otros dioses» es idiomático y fiel.
- source_word: לַיהוָה
  english_pob_choice: to Yahweh
  chosen_spanish: a Yahvé
  alternatives_spanish:
  - a Yahweh
  - al SEÑOR
  lexicon: HALOT
  rationale: 'Se sigue el estándar del proyecto para el nombre divino: «Yahvé». Mantiene el nombre de pacto sin la convención de máscara litúrgica.'
theological_decisions:
- issue: Nombre divino יהוה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - el SEÑOR
  rationale: El texto hebreo termina con el Tetragrámaton. En español se adopta «Yahvé» según el estándar del proyecto, preservando el nombre propio del Dios de Israel y evitando el reemplazo por un título genérico.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Sentido de la petición por tierra de Israel
  english_pob_reading: translated straightforwardly as a request for transported soil without explaining motive in the main text
  chosen_spanish_reading: una carga de tierra, tanto como puedan llevar un par de mulas
  alternative_spanish_readings:
  - un altar base
  - tierra para adorar allí
  - una carga de suelo
  rationale: La frase hebrea presenta la petición sin explicar abiertamente su motivación religiosa o cultural. La traducción mantiene esa reserva y no resuelve en el cuerpo del texto una tensión que el versículo no explicita.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #3: Preserve theological tension rather than resolve it'
- issue: Oferta exclusiva a Yahvé
  english_pob_reading: but only to Yahweh
  chosen_spanish_reading: sino solo a Yahvé
  alternative_spanish_readings:
  - sino únicamente a Yahvé
  - sino solo al Yahvé
  rationale: El hebreo expresa exclusividad fuerte con כִּי אִם. «Sino solo a Yahvé» comunica esa exclusión de manera clara y sobria en español.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #2: Preserve emphatic contrasts'
translation_notes:
  revision_awareness: 'Se tuvo en cuenta la revisión más reciente del expediente inglés: se mantuvo la formulación clara de la petición como una cantidad transportable por un par de mulas, se respetó la referencia a la tierra/terreno como elemento trasladado desde Israel, y se conservó la exclusividad del culto a Yahvé sin añadir explicación motivacional en el texto principal.'
  spanish_consistency_notes:
  - Se usó «Yahvé» de forma consistente para יהוה, conforme al estándar del proyecto.
  - Se distinguió «holocausto» para עֹלָה y «sacrificio» para זֶבַח, manteniendo la diferencia léxica del hebreo.
  - «Tierra» se eligió para אֲדָמָה en un registro bíblico natural y transparente.
  - La cita mantiene el tono deferente de Naamán con «te ruego» y «tu siervo».
