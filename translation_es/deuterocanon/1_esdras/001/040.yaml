translation:
  language: es
  text: Ahora, lo registrado sobre él[a], y su impureza e impiedad, está escrito en el libro de las crónicas de los reyes.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «lo relatado sobre él». El participio griego puede referirse a asuntos contados o puestos por escrito.'
    reason: alternative_reading
lexical_decisions:
- source_word: ἱστορηθέντα
  english_pob_choice: things recorded
  chosen_spanish: las cosas registradas
  alternatives_spanish:
  - los hechos registrados
  - las cosas relatadas
  - los registros acerca de él
  lexicon: LSJ
  rationale: El participio expresa asuntos que han sido narrados o puestos por escrito. «Las cosas registradas» conserva el sentido documental y el plural de τὰ ... ἱστορηθέντα sin añadir una explicación que el griego no exige.
- source_word: ἀκαθαρσίας
  english_pob_choice: uncleanness
  chosen_spanish: impureza
  alternatives_spanish:
  - inmundicia
  - contaminación ritual
  - impureza moral
  lexicon: LSJ
  rationale: En español, «impureza» comunica bien la fuerza moral-religiosa del término y resulta natural en un juicio de carácter. «Inmundicia» suena más fuerte pero puede inclinarse demasiado a lo sexual o a lo ritual; por eso se prefiere una forma más amplia.
- source_word: δυσσεβείας
  english_pob_choice: impiety
  chosen_spanish: impiedad
  alternatives_spanish:
  - irreverencia
  - falta de piedad
  - maldad
  lexicon: LSJ
  rationale: «Impiedad» reproduce con precisión la falta de reverencia hacia Dios que señala el griego. Es más específico que «maldad» y conserva el paralelo con «impureza» como doble acusación moral-religiosa.
- source_word: ἀναγέγραπται
  english_pob_choice: are written
  chosen_spanish: están escritas
  alternatives_spanish:
  - han sido escritas
  - quedan escritas
  - están registradas
  lexicon: LSJ
  rationale: El perfecto pasivo indica algo asentado y vigente en el registro. «Están escritas» es idiomático en español y mantiene la idea de permanencia documental mejor que una perífrasis más pesada.
- source_word: βίβλῳ τῶν χρόνων τῶν βασιλέων
  english_pob_choice: the book of the chronicles of the kings
  chosen_spanish: el libro de las crónicas de los reyes
  alternatives_spanish:
  - el libro de los anales de los reyes
  - el libro de los tiempos de los reyes
  - el libro cronístico de los reyes
  lexicon: LSJ
  rationale: La expresión funciona como fórmula archivística. «Crónicas» es la equivalencia española más natural para χρόνων en este contexto, y «de los reyes» conserva la referencia a los anales reales sin forzar un tecnicismo.
theological_decisions:
- issue: Doble acusación moral-religiosa en ἀκαθαρσίας καὶ δυσσεβείας
  english_pob_reading: Render both terms distinctly as 'uncleanness and impiety'
  chosen_spanish_reading: «impureza y su impiedad» como dos términos distintos
  alternative_spanish_readings:
  - «inmundicia e impiedad»
  - «impureza e irreverencia»
  - «defilement and ungodliness»
  rationale: El griego presenta dos sustantivos condenatorios separados; la traducción los mantiene diferenciados para no diluir la intensidad del juicio. No hay aquí un término doctrinalmente disputado, pero sí una tensión léxica que conviene preservar en español.
  doctrine_reference: Translation philosophy §§1, 5
translation_notes:
  revision_awareness: Se siguió el ajuste de la última revisión inglesa al preferir una formulación más directa de τὰ ... ἱστορηθέντα («las cosas registradas») en lugar de una expresión que añada «cuentas» o «relatos» innecesarios. La frase final conserva el tono formal y el valor documental del pasaje.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma general solo cuando aparece el nombre divino explícito; aquí no aplica.
  - Se usa «impureza» y «impiedad» como pareja semántica diferenciada, en línea con la doble acusación del griego.
  - «Crónicas» se emplea en sentido archivístico/histórico, no como título bíblico técnico.
  - La nota[a] se ancla en «él» porque allí aparece la ambigüedad natural entre «registradas» y «relatadas» en el griego.
