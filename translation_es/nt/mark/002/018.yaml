translation:
  language: es
  text: 'Ahora bien, los discípulos de Juan y los fariseos estaban ayunando. Y vienen y le dicen[a]: «¿Por qué los discípulos de Juan y los discípulos de los fariseos ayunan, pero tus discípulos no ayunan?»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «unas personas vinieron y le dijeron». El griego deja implícito el sujeto de «vienen» y «dicen».'
    reason: alternative_reading
lexical_decisions:
- source_word: ἦσαν ... νηστεύοντες
  english_pob_choice: were fasting
  chosen_spanish: estaban ayunando
  alternatives_spanish:
  - ayunaban
  - estaban practicando ayuno
  lexicon: BDAG
  rationale: La construcción perifrástica con imperfecto de εἰμί + participio presente expresa acción en desarrollo en el pasado. En español, «estaban ayunando» conserva bien ese aspecto y suena natural sin perder la continuidad narrativa.
- source_word: οἱ μαθηταὶ Ἰωάννου
  english_pob_choice: John's disciples
  chosen_spanish: los discípulos de Juan
  alternatives_spanish:
  - los discípulos de Juan el Bautista
  - los discípulos de Juan
  lexicon: BDAG
  rationale: El genitivo señala relación de pertenencia/asociación. «De Juan» reproduce la relación de manera directa y clara; añadir «el Bautista» sería una precisión contextual no explícita en el griego de este versículo.
- source_word: οἱ Φαρισαῖοι
  english_pob_choice: the Pharisees
  chosen_spanish: los fariseos
  alternatives_spanish:
  - los fariseos
  lexicon: BDAG
  rationale: Es el nombre establecido del grupo en español y no requiere expansión adicional.
- source_word: ἔρχονται καὶ λέγουσιν
  english_pob_choice: they come and say
  chosen_spanish: vienen y le dicen
  alternatives_spanish:
  - se acercan y le dicen
  - vienen y dicen
  lexicon: BDAG
  rationale: Los presentes históricos de Marcos conservan vivacidad narrativa. «Vienen y le dicen» reproduce ese efecto de presente sin forzar una construcción poco natural en español.
- source_word: αὐτῷ
  english_pob_choice: to him
  chosen_spanish: le
  alternatives_spanish:
  - a él
  lexicon: BDAG
  rationale: El dativo indirecto se expresa de modo natural con pronombre átono en español.
- source_word: Διὰ τί
  english_pob_choice: Why
  chosen_spanish: ¿Por qué
  alternatives_spanish:
  - ¿Para qué razón?
  - ¿Por qué motivo?
  lexicon: BDAG
  rationale: Es la interrogativa idiomática en español y mantiene el sentido exacto de la pregunta.
- source_word: οἱ μαθηταὶ τῶν Φαρισαίων
  english_pob_choice: the disciples of the Pharisees
  chosen_spanish: los discípulos de los fariseos
  alternatives_spanish:
  - los discípulos fariseos
  - los discípulos pertenecientes a los fariseos
  lexicon: BDAG
  rationale: La relación genitiva se expresa de manera clara y no ambigua con «de los fariseos». Se evita la forma posesiva compacta porque en español suena menos natural aquí y puede oscurecer la referencia.
- source_word: νηστεύουσιν
  english_pob_choice: fast
  chosen_spanish: ayunan
  alternatives_spanish:
  - están ayunando
  lexicon: BDAG
  rationale: En la pregunta, el presente expresa práctica habitual más que un acto momentáneo. «Ayunan» mantiene ese valor customary y contrasta bien con la negación final.
- source_word: οἱ δὲ σοὶ μαθηταὶ
  english_pob_choice: but your disciples
  chosen_spanish: pero tus discípulos
  alternatives_spanish:
  - pero los discípulos tuyos
  lexicon: BDAG
  rationale: «Tus discípulos» preserva la fuerza posesiva de σοί/σός y suena natural en español, mientras que δέ se refleja con «pero» para marcar contraste.
theological_decisions:
- issue: Sujetos implícitos de «vienen y le dicen»
  english_pob_reading: Rendered generically as 'they come and say to him' without specifying the subject.
  chosen_spanish_reading: Se mantiene la indeterminación con «vienen y le dicen», sin identificar quiénes son los que hablan.
  alternative_spanish_readings:
  - vinieron y le dijeron
  - unos hombres vinieron y le dijeron
  rationale: El griego deja implícito el sujeto de los verbos; especificarlo iría más allá del texto. La traducción conserva esa ambigüedad narrativa y evita cerrar prematuramente la escena.
  doctrine_reference: Primacía del texto original; mantener tensiones o indeterminaciones donde el griego no las resuelve.
translation_notes:
  revision_awareness: Se corrigió el problema de validación anterior asegurando que el marcador [a] aparezca explícitamente en el texto español. La redacción mantiene el presente histórico de Marcos y la ambigüedad del sujeto implícito, conforme al expediente inglés y al griego.
  spanish_consistency_notes:
  - Se usa «ayunar/ayunan» de manera consistente para νηστεύω.
  - Se conserva «fariseos» como nombre propio de grupo sin latinización adicional.
  - Se prefirió «discípulos de los fariseos» para reflejar con claridad la relación genitiva.
  - El contraste final se marcó con «pero» para reproducir δέ en un español natural.
