translation:
  language: es
  text: Porque tu morada es el cielo de los cielos[a], inaccesible para los hombres[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literalmente, «el cielo de los cielos», una expresión de estilo hebreo para el cielo supremo.
    reason: lexical_alternative
  - marker: b
    text: 'O: «inaccesible para los seres humanos».'
    reason: lexical_alternative
lexical_decisions:
- source_word: κατοικητήριόν
  english_pob_choice: dwelling place
  chosen_spanish: morada
  alternatives_spanish:
  - lugar de morada
  - habitación
  - vivienda
  lexicon: LSJ
  rationale: El sustantivo indica un lugar donde alguien habita. «Morada» mantiene el sentido concreto de residencia y suena natural y digno en español bíblico.
- source_word: οὐρανὸς τοῦ οὐρανοῦ
  english_pob_choice: the heaven of heaven / the heaven of heavens
  chosen_spanish: el cielo de los cielos
  alternatives_spanish:
  - el cielo del cielo
  - el cielo de cielo
  - el más alto cielo
  lexicon: LSJ
  rationale: La expresión es un superlativo semítico. En español, «el cielo de los cielos» conserva la estructura idiomática y el valor intensivo sin perder inteligibilidad.
- source_word: ἀνέφικτος
  english_pob_choice: unreachable
  chosen_spanish: inaccesible
  alternatives_spanish:
  - inalcanzable
  - imposible de alcanzar
  - fuera del alcance
  lexicon: LSJ
  rationale: El adjetivo expresa que no se puede alcanzar o acceder. «Inaccesible» comunica bien esa imposibilidad de acceso con registro elevado.
- source_word: ἀνθρώποις
  english_pob_choice: men
  chosen_spanish: los hombres
  alternatives_spanish:
  - los seres humanos
  - la humanidad
  - las personas
  lexicon: LSJ
  rationale: El griego usa un plural genérico para humanos. «Los hombres» conserva el registro tradicional y elevado; se mantiene documentada la alternativa inclusiva en la nota.
theological_decisions:
- issue: Superlativo semítico «cielo de los cielos»
  english_pob_reading: the heaven of heaven / the heaven of heavens
  chosen_spanish_reading: el cielo de los cielos
  alternative_spanish_readings:
  - el cielo del cielo
  - el más alto cielo
  rationale: La frase subraya la trascendencia de la morada divina por encima del cielo ordinario. Se evitó una paráfrasis que perdiera la huella semítica del original.
  doctrine_reference: 'DOCTRINE.md: Translation philosophy §1, §6'
- issue: Referencia genérica a la humanidad en ἀνθρώποις
  english_pob_reading: men
  chosen_spanish_reading: los hombres
  alternative_spanish_readings:
  - los seres humanos
  - las personas
  rationale: El griego se refiere a la humanidad en general, no sólo a varones. Se preserva el registro elevado de la fuente, dejando constancia de la alternativa inclusiva.
  doctrine_reference: 'DOCTRINE.md: Translation philosophy §4'
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión inglesa más reciente, que prefirió una forma más literal de la expresión οὐρανὸς τοῦ οὐρανοῦ. En español se decidió conservar esa cercanía al original mediante «el cielo de los cielos», manteniendo a la vez una redacción fluida y publicable.
  spanish_consistency_notes:
  - Se respetó el uso de «Yahvé» cuando aparezca el tetragrámaton; aquí no corresponde.
  - Se eligió «cielo» y no «cielos» sueltos para reproducir la construcción intensiva del genitivo griego.
  - Se mantuvo un registro bíblico sobrio sin calcar el inglés de forma rígida.
  - Las notas documentan la alternativa inclusiva para ἀνθρώποις sin alterar el texto principal.
