  to: Les hicieron la guerra[a] a Bera, rey de Sodoma, Birsha, rey de Gomorra, Sinab, rey de Admá, Seméber, rey de Zeboím[b], y al rey de Bela (es decir, Zoar).
  rationale: La revisión mantiene el sentido del hebreo y del POB inglés, pero mejora la naturalidad del español con 'hicieron la guerra', restituye una forma de nombre más trazable ('Birsha') y recupera la variante léxica documentada para צביים en una nota española. También se ajusta la sintaxis con 'a ... y al rey' para que la lista suene más natural en español sin cambiar el significado.
