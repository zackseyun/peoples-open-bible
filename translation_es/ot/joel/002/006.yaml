translation:
  language: es
  text: Delante de él los pueblos se retuercen[b][a]; todos los rostros palidecen.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Ante su presencia, los pueblos están en angustia».'
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «todos los rostros juntan palidez», un modismo comúnmente entendido en el sentido de que los rostros se ponen pálidos.'
    reason: lexical_alternative
lexical_decisions:
- source_word: מִפָּנָיו
  english_pob_choice: Before him
  chosen_spanish: Delante de él
  alternatives_spanish:
  - Ante su presencia
  - Antes de él
  lexicon: HALOT
  rationale: La expresión con מִן + פנים comunica proximidad o confrontación con la presencia de alguien. «Delante de él» conserva esa relación personal de manera natural en español y mantiene la ambigüedad del referente masculino singular sin precisarlo interpretativamente.
- source_word: יָחִילוּ
  english_pob_choice: writhe
  chosen_spanish: se estremecen
  alternatives_spanish:
  - se retuercen
  - están en angustia
  lexicon: HALOT
  rationale: El verbo puede abarcar temblor, convulsión o angustia intensa. «Se estremecen» transmite bien la reacción corporal y el temor sin forzar una imagen demasiado específica en español.
- source_word: עַמִּים
  english_pob_choice: peoples
  chosen_spanish: los pueblos
  alternatives_spanish:
  - las naciones
  - los pueblos humanos
  lexicon: HALOT
  rationale: «Pueblos» refleja el plural colectivo del hebreo sin convertirlo automáticamente en una categoría política más estrecha como «naciones».
- source_word: כָּל פָּנִים
  english_pob_choice: all faces
  chosen_spanish: todos los rostros
  alternatives_spanish:
  - todas las caras
  - cada rostro
  lexicon: HALOT
  rationale: «Rostros» es una forma natural en español para conservar el hebreo idiomático y enlaza bien con la imagen siguiente de palidez facial.
- source_word: פָארוּר
  english_pob_choice: grow pale
  chosen_spanish: palidecen
  alternatives_spanish:
  - se ponen pálidos
  - se vuelven pálidos
  lexicon: HALOT
  rationale: El contexto favorece el sentido idiomático de pérdida de color en el rostro. «Palidecen» traduce ese efecto de manera idiomática y fiel, evitando una paráfrasis excesiva.
theological_decisions:
- issue: Referencia del sufijo masculino singular en מִפָּנָיו
  english_pob_reading: Rendered generically as 'him' without specifying whether the referent is the LORD, the day, or the invading army.
  chosen_spanish_reading: «él» sin precisar si se refiere a Yahvé, al día, o al ejército invasor.
  alternative_spanish_readings:
  - delante de Yahvé
  - delante de ello
  rationale: El contexto inmediato permite más de una identificación del referente. Se conserva la ambigüedad del hebreo y del análisis POB en vez de resolverla interpretativamente.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: Se corrigió el problema de validación anterior asegurando que el único marcador de nota [a] aparezca exactamente en el texto español. La redacción sigue el pasaje fuente y el hilo de revisión inglesa, pero usa una formulación española más natural para «grow pale».
  spanish_consistency_notes:
  - Se mantuvo la ambigüedad del referente de «él» para no sobreinterpretar el hebreo.
  - «Pueblos» y «rostros» conservan el tono colectivo e imagético del original.
  - «Palidecen» refleja el valor idiomático del hebreo para la pérdida de color facial.
