base_translation:
  language: en
  yaml_path: translation/deuterocanon/sirach/035/010.yaml
  text: Have mercy on the people called by your name[a], on Israel, your firstborn[c][b], whom you acquired.
  footnotes:
  - marker: a
    text: Or 'who bear your name.' The Hebrew idiom denotes a people identified as belonging to God.
    reason: lexical_alternative
  - marker: b
    text: Or 'whom you possessed,' 'whom you purchased,' or possibly 'whom you created.' The Hebrew verb can carry several related senses.
    reason: alternative_reading
  - marker: c
    text: The Greek parallel in Swete reads a substantially different line here, reflecting a different textual tradition; this translation follows the extant Hebrew witness.
    reason: textual_variant
