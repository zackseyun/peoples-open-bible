translation:
  language: es
  text: 'Solamente[a], Jehú no se apartó de los pecados de Jeroboam hijo de Nabat, por los cuales hizo pecar a Israel: los becerros de oro que estaban en Betel y en Dan.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'no se desvió'; el hebreo dice literalmente 'no se apartó de detrás de ellos'.
    reason: lexical_alternative
lexical_decisions:
- source_word: רַק
  english_pob_choice: Only
  chosen_spanish: Solamente
  alternatives_spanish:
  - Solo
  - No obstante
  lexicon: HALOT
  rationale: Expresa la idea restrictiva/excepcional de forma natural en español y conserva el valor de limitación del hebreo.
- source_word: חֲטָאֵי
  english_pob_choice: sins
  chosen_spanish: pecados
  alternatives_spanish:
  - faltas
  - transgresiones
  lexicon: HALOT
  rationale: El constructo plural se refiere a los pecados concretos asociados con la política cultual de Jeroboam; 'pecados' es claro y fiel al referente.
- source_word: הֶחֱטִיא
  english_pob_choice: caused ... to sin
  chosen_spanish: hizo pecar a
  alternatives_spanish:
  - hizo que ... pecara
  - llevó a ... a pecar
  lexicon: HALOT
  rationale: El hiphil es causativo; 'hizo pecar a' conserva esa fuerza de manera directa y transparente en español.
- source_word: לֹא סָר
  english_pob_choice: did not turn away
  chosen_spanish: no se apartó
  alternatives_spanish:
  - no se desvió
  - no dejó
  lexicon: HALOT
  rationale: En español, 'apartarse' comunica bien la idea idiomática de dejar una conducta o camino sin añadir una paráfrasis innecesaria.
- source_word: מֵאַחֲרֵיהֶם
  english_pob_choice: from following
  chosen_spanish: de
  alternatives_spanish:
  - de seguirlos
  - de andar tras ellos
  lexicon: HALOT
  rationale: La forma hebrea literalmente dice 'de detrás de ellos'; en español, con el antecedente 'pecados', la construcción más natural es 'de los pecados', manteniendo la referencia sin forzar un calco.
- source_word: עֶגְלֵי הַזָּהָב
  english_pob_choice: the golden calves
  chosen_spanish: los becerros de oro
  alternatives_spanish:
  - los terneros de oro
  - los toros de oro
  lexicon: HALOT
  rationale: '''Becerros de oro'' es el equivalente bíblico tradicional y semánticamente preciso para los ídolos de culto; evita suavizar o cambiar el referente concreto.'
- source_word: אֲשֶׁר בֵּית אֵל וַאֲשֶׁר בְּדָן
  english_pob_choice: that were at Bethel and at Dan
  chosen_spanish: que estaban en Betel y en Dan
  alternatives_spanish:
  - que estaban en Bet-el y en Dan
  - que estaban en la Betel y en Dan
  lexicon: HALOT
  rationale: '''Estaban en'' reproduce con naturalidad la localización de los objetos de culto. Se mantiene Betel como transliteración estándar del topónimo.'
theological_decisions:
- issue: Relación entre 'los pecados de Jeroboam' y 'los becerros de oro'
  english_pob_reading: The phrase 'the golden calves' is rendered appositionally, identifying the specific sins Jehu continued to follow.
  chosen_spanish_reading: '''los becerros de oro'' aparece como aclaración appositiva de ''los pecados de Jeroboam'', identificando concretamente esos pecados cultuales.'
  alternative_spanish_readings:
  - Podría leerse como una nueva cláusula explicativa separada por dos puntos.
  - Podría conservarse con un guion largo para marcar más explícitamente la aclaración.
  rationale: El hebreo pasa de lo abstracto ('pecados de Jeroboam') a lo concreto ('los becerros de oro'). Los dos puntos comunican esa aclaración sin introducir una interpretación ajena al texto.
  doctrine_reference: 1 Reyes 12:28-30; 2 Reyes 17:21-23
- issue: Valor de לֹא סָר
  english_pob_reading: did not turn away
  chosen_spanish_reading: no se apartó
  alternative_spanish_readings:
  - no se desvió
  - no dejó
  rationale: La imagen hebrea de no apartarse de una práctica se expresa con naturalidad en español como 'no se apartó', conservando la permanencia en la conducta idolátrica.
  doctrine_reference: 2 Reyes 10:31; 2 Reyes 13:2
- issue: Nombre divino no presente en el versículo
  english_pob_reading: No explicit divine-name rendering issue in this verse.
  chosen_spanish_reading: No aplica en este versículo.
  rationale: El texto no contiene יהוה ni κύριος; por tanto, no se requiere decisión de sustitución por 'Yahvé'.
  doctrine_reference: N/A
translation_notes:
  revision_awareness: El inglés POB fue revisado desde 'did not turn away from following' a 'did not turn away from', para reflejar mejor el hebreo idiomático. La versión española sigue esa revisión con 'no se apartó de', evitando añadir 'seguir' en la superficie textual y manteniendo la referencia causal a los pecados de Jeroboam y su manifestación concreta en los becerros de oro.
  spanish_consistency_notes:
  - Se mantiene 'Jehú' para יֵהוּא y 'Jeroboam hijo de Nabat' para יָרָבְעָם בֶּן נְבָט, en consonancia con el estilo bíblico español estándar.
  - '''Betel'' y ''Dan'' se conservan como topónimos transliterados usuales.'
  - Se prefirió 'Solamente' para רַק por su valor restrictivo y por su naturalidad en español bíblico moderno.
  - La puntuación con dos puntos reproduce la transición del abstracto al concreto sin necesidad de un guion largo.
  - No se introdujo 'Yahvé' porque el versículo no contiene el nombre divino.
