translation:
  language: es
  text: Si no lo sabes, tú, la más hermosa entre las mujeres, sal por ti misma tras las huellas[a] del rebaño, y apacienta tus cabras jóvenes junto a las tiendas de los pastores.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «detrás del rebaño»; el hebreo dice literalmente «en las huellas/pisadas del rebaño».'
    reason: lexical_alternative
lexical_decisions:
- source_word: אִם לֹא תֵדְעִי
  english_pob_choice: If you do not know
  chosen_spanish: Si no lo sabes
  alternatives_spanish:
  - Si no conoces
  - Si no entiendes
  lexicon: HALOT; uso contextual de ידע
  rationale: Mantiene la condición real y el valor básico de ידע como ‘saber/conocer’. En español, ‘lo sabes’ suena natural y conserva la referencia elíptica a saber adónde ir o qué hacer.
- source_word: הַיָּפָה בַּנָּשִׁים
  english_pob_choice: most beautiful among women
  chosen_spanish: la más hermosa entre las mujeres
  alternatives_spanish:
  - la más bella entre las mujeres
  - hermosa entre las mujeres
  lexicon: HALOT; construcción superlativa con בְּ
  rationale: La expresión hebrea funciona como superlativo relacional. ‘La más hermosa entre las mujeres’ comunica mejor el sentido que un simple adjetivo sin comparación.
- source_word: צְאִי לָךְ
  english_pob_choice: go out for yourself
  chosen_spanish: sal tras
  alternatives_spanish:
  - ve por ti misma
  - sal por ti misma
  lexicon: HALOT; valor reflexivo de לָךְ
  rationale: ‘Sal’ traduce el imperativo con naturalidad; ‘tras’ permite conservar la idea espacial del contexto pastoril. El matiz reflexivo de לָךְ se hace patente en el encadenamiento del mandato, aunque no siempre requiere una traducción literal con ‘para ti’.
- source_word: בְּעִקְבֵי הַצֹּאן
  english_pob_choice: in the tracks of the flock
  chosen_spanish: tras las huellas del rebaño
  alternatives_spanish:
  - en las huellas del rebaño
  - siguiendo las huellas del rebaño
  lexicon: HALOT; עִקְבֵי como ‘huellas/pisadas/seguimiento’
  rationale: ‘Huellas’ mantiene la imaginería concreta del hebreo y resulta natural en español. ‘Tras’ expresa el movimiento detrás del rebaño sin borrar la metáfora de caminar siguiendo sus pasos.
- source_word: וּרְעִי
  english_pob_choice: pasture
  chosen_spanish: apacienta
  alternatives_spanish:
  - pastorea
  - alimenta
  lexicon: HALOT; רעה en Qal
  rationale: En español, ‘apacienta’ es el equivalente más idiomático para el cuidado de ganado menor, manteniendo el sentido de conducir a pastar. ‘Pastorea’ sería posible, pero puede sonar más general o más técnico.
- source_word: גְּדִיֹּתַיִךְ
  english_pob_choice: your young goats
  chosen_spanish: tus cabritas
  alternatives_spanish:
  - tus cabritos pequeños
  - tus crías de cabra
  lexicon: HALOT; sustantivo de cría caprina
  rationale: ‘Cabritas’ transmite de forma clara y breve la idea de crías de cabra, equivalente a ‘young goats’. Se preserva el diminutivo afectivo implícito sin volverlo coloquial en exceso.
- source_word: עַל מִשְׁכְּנ֥וֹת הָרֹעִים
  english_pob_choice: beside the shepherds’ tents
  chosen_spanish: junto a las tiendas de los pastores
  alternatives_spanish:
  - al lado de las tiendas de los pastores
  - cerca de las tiendas de los pastores
  lexicon: HALOT; מִשְׁכְּנוֹת como moradas/tiendas
  rationale: ‘Tiendas’ es el equivalente más natural en un contexto pastoril y comunica bien el plural de מִשְׁכְּנוֹת. ‘Junto a’ refleja la proximidad de עַל sin caer en un literalismo espacial impropio en español.
translation_notes:
  revision_awareness: El pasaje coincide sustancialmente con la edición inglesa auditada; la única diferencia principal es la elección de un español más idiomático para el imperativo y la preposición espacial, sin alterar la imagen pastoral ni el matiz reflexivo del hebreo.
  spanish_consistency_notes:
  - Se mantiene ‘rebaño’ para צֹאן y no ‘ovejas’, porque el hebreo es colectivo y el contexto incluye cabras/pastores.
  - Se traduce עַל de manera contextual como ‘junto a’, siguiendo el valor espacial de proximidad documentado en el audit trail.
  - Se preserva la imagen concreta de ‘huellas’ para עִקְבֵי, en lugar de abstraerla a ‘detrás’ sin marca visual.
