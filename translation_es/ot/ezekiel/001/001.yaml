translation:
  language: es
  text: Y sucedió en el trigésimo año, en el cuarto mes, el quinto día del mes, mientras yo estaba entre los exiliados junto al río Quebar[a], se abrieron los cielos, y vi visiones de Dios[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O posiblemente «junto al canal Quebar»; el hebreo dice «río Quebar», pero el lugar pudo haber sido un canal principal en Babilonia.
    reason: cultural_note
  - marker: b
    text: O «visiones divinas» o «visiones procedentes de Dios».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְהִי
  english_pob_choice: Now it happened
  chosen_spanish: Y sucedió
  alternatives_spanish:
  - Y aconteció
  - Y fue así
  lexicon: HALOT
  rationale: La forma wayyiqtol introduce una narración nueva. «Y sucedió» conserva el arranque narrativo sin recurrir a un giro demasiado arcaico.
- source_word: בִּשְׁלֹשִׁים שָׁנָה
  english_pob_choice: in the thirtieth year
  chosen_spanish: en el año treinta
  alternatives_spanish:
  - en el trigésimo año
  lexicon: HALOT
  rationale: El hebreo expresa un marcador temporal con cardinal + sustantivo. En español, «año treinta» suena natural y fiel; «trigésimo» sería más formal pero menos fluido.
- source_word: בָּרְבִיעִי
  english_pob_choice: in the fourth month
  chosen_spanish: en el mes cuarto
  alternatives_spanish:
  - en el cuarto mes
  lexicon: HALOT
  rationale: Aunque el sustantivo «mes» no se repite en hebreo, el contexto de fórmula de datación lo exige para claridad. «Mes cuarto» mantiene el orden semítico sin perder inteligibilidad.
- source_word: בַּחֲמִשָּׁה לַחֹדֶשׁ
  english_pob_choice: on the fifth day of the month
  chosen_spanish: a los cinco días del mes
  alternatives_spanish:
  - el cinco del mes
  - el quinto día del mes
  lexicon: HALOT
  rationale: La fórmula indica el día del mes. «A los cinco días del mes» reproduce bien el valor temporal; también conserva el tono documental.
- source_word: בְתוֹךְ הַגּוֹלָה
  english_pob_choice: among the exiles
  chosen_spanish: entre los exiliados
  alternatives_spanish:
  - en medio de los exiliados
  - entre los deportados
  lexicon: HALOT
  rationale: «Exiliados» comunica bien la comunidad de los deportados sin endurecer el registro. «Deportados» es posible, pero menos natural en español bíblico contemporáneo.
- source_word: עַל נְהַר כְּבָר
  english_pob_choice: by the Kebar River
  chosen_spanish: junto al río Quebar
  alternatives_spanish:
  - junto al canal Quebar
  - junto al río Kebar
  lexicon: HALOT
  rationale: Se conserva el nombre propio con transliteración hispana «Quebar». «Río» sigue el sustantivo hebreo נְהַר, aunque la nota puede admitir la posibilidad de un canal.
- source_word: נִפְתְּחוּ הַשָּׁמַיִם
  english_pob_choice: the heavens were opened
  chosen_spanish: se abrieron los cielos
  alternatives_spanish:
  - los cielos se abrieron
  - se abrieron los cielos de Dios
  lexicon: HALOT
  rationale: «Cielos» mantiene el plural hebreo y el registro elevado. El pasivo impersonal español funciona con naturalidad y conserva el valor visionario.
- source_word: וָאֶרְאֶה
  english_pob_choice: and I saw
  chosen_spanish: y vi
  alternatives_spanish:
  - y entonces vi
  lexicon: HALOT
  rationale: Continuación narrativa simple y directa, sin añadir matices no presentes en el hebreo.
- source_word: מַרְאוֹת אֱלֹהִים
  english_pob_choice: visions of God
  chosen_spanish: visiones de Dios
  alternatives_spanish:
  - visiones divinas
  - visiones procedentes de Dios
  lexicon: HALOT
  rationale: Se conserva la construcción genitiva sin resolverla de modo excesivo. «Visiones de Dios» mantiene la ambigüedad entre contenido, origen y cualidad, como en el hebreo.
theological_decisions:
- issue: Ambigüedad del genitivo en מַרְאוֹת אֱלֹהִים
  english_pob_reading: visions of God
  chosen_spanish_reading: visiones de Dios
  alternative_spanish_readings:
  - visiones divinas
  - visiones procedentes de Dios
  rationale: El hebreo admite más de una relación genitiva. La traducción principal preserva esa tensión en vez de especificar si las visiones pertenecen a Dios, proceden de Dios o son de carácter divino.
  doctrine_reference: 'Translation philosophy §3: preservar la tensión teológica cuando el original la permite.'
- issue: Posible valor espacial de עַל נְהַר כְּבָר
  english_pob_reading: by the Kebar River
  chosen_spanish_reading: junto al río Quebar
  alternative_spanish_readings:
  - junto al canal Quebar
  rationale: El texto hebreo usa נְהַר, «río», pero la tradición interpretativa reconoce la posibilidad de un canal en Babilonia. La redacción principal sigue el sustantivo del texto y deja abierta la alternativa en nota.
  doctrine_reference: Principio POB de distinguir entre el dato textual y la hipótesis histórica cuando ambas son plausibles.
translation_notes:
  revision_awareness: Coincide con el antecedente inglés de la POB en filosofía óptima-equivalente y en la preservación de la ambigüedad de מַרְאוֹת אֱלֹהִים. Se mantiene la nota cultural sobre Quebar como río/canal potencial y se adapta al español con «río Quebar», dejando la alternativa en nota. No se detectan revisiones posteriores que alteren el sentido base.
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando aparezca el Tetragrámaton; aquí no aparece, por lo que no corresponde.
  - Se mantiene «Dios» para אֱלֹהִים y no se especifica «de parte de Dios» para no resolver la ambigüedad genitiva.
  - Se usa «exiliados» como término consistente y comprensible para הגולה.
  - Se conserva el plural «cielos» para הַשָּׁמַיִם, en armonía con el registro bíblico y la sintaxis española.
