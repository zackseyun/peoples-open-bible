  yaml_path: translation/ot/joel/002/015.yaml
  text: Blow a trumpet in Zion[a]; consecrate a fast[c][b]; call a solemn assembly.
  footnotes:
  - marker: a
    text: Or 'ram's horn' for 'trumpet' (שׁוֹפָר), emphasizing the specific instrument used for alarm or sacred summons.
    reason: lexical_alternative
  - marker: b
    text: Or 'sanctify a fast.' The Hebrew verb means to set apart as holy for a sacred purpose.
    reason: lexical_alternative
  - marker: c
    text: Or 'call/proclaim a sacred assembly.' The Hebrew עֲצָרָה denotes a formal religious gathering marked by solemnity.
    reason: lexical_alternative
