translation:
  language: es
  text: ¿A quién mostrarás[a] tu bondad, oh Dios[b], sino a los que invocan al Señor?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «tratarás con bondad».
    reason: lexical_alternative
  - marker: b
    text: 'La forma griega con artículo funciona aquí como vocativo: «oh Dios».'
    reason: source_note
lexical_decisions:
- source_word: τίνι
  english_pob_choice: to whom
  chosen_spanish: ¿A quién
  alternatives_spanish:
  - ¿Para quién
  lexicon: LSJ
  rationale: El dativo interrogativo introduce una pregunta retórica sobre el destinatario de la acción de Dios. En español, «¿A quién?» es la equivalencia más natural y precisa.
- source_word: χρηστεύσῃ
  english_pob_choice: will show kindness
  chosen_spanish: mostrarás bondad
  alternatives_spanish:
  - serás bondadoso
  - tratarás con bondad
  - harás bondad
  lexicon: LSJ
  rationale: El verbo expresa una acción benévola hacia alguien. «Mostrarás bondad» conserva el valor de trato amable señalado por el audit trail inglés y suena natural en español, sin cargar el verbo con un matiz más técnico que el texto no exige.
- source_word: ὁ θεός
  english_pob_choice: O God
  chosen_spanish: oh Dios
  alternatives_spanish:
  - Dios
  lexicon: NA/usage
  rationale: Aunque el griego usa artículo nominativo, aquí funciona como vocativo solemne. En español, «oh Dios» reproduce mejor la apelación directa que solo «Dios».
- source_word: ἐπικαλουμένοις
  english_pob_choice: those who call on
  chosen_spanish: los que invocan
  alternatives_spanish:
  - los que llaman a
  - los que claman a
  lexicon: BDAG
  rationale: El participio designa a quienes apelan o invocan al Señor. «Invocan» conserva el sentido religioso directo y evita la ambigüedad de un simple «llaman».
- source_word: κύριον
  english_pob_choice: Lord
  chosen_spanish: el Señor
  alternatives_spanish:
  - el Amo
  lexicon: BDAG
  rationale: Siguiendo la política del proyecto, κύριος se traduce «Señor» en este contexto religioso de invocación.
theological_decisions:
- issue: Dirección de la acción verbal respecto de Dios
  english_pob_reading: You will show kindness, O God
  chosen_spanish_reading: mostrarás bondad, oh Dios
  alternative_spanish_readings:
  - serás bondadoso, oh Dios
  - harás bondad, oh Dios
  rationale: La revisión del inglés corrigió la lectura de tercera persona a segunda persona. El español debe reflejar una interrogación dirigida a Dios, no una afirmación sobre lo que Dios hace a otros desde fuera de la apelación directa.
  doctrine_reference: Salmo de súplica y alabanza; vocativo directo a Dios
translation_notes:
  revision_awareness: El inglés auditado pasó de «will God be kind» a «will you show kindness, O God» por corrección gramatical y luego fijó «show kindness» como versión preferida. La traducción española sigue esa revisión y mantiene la estructura retórica de pregunta directa.
  spanish_consistency_notes:
  - Se conserva «Señor» para κύριος conforme al uso del proyecto en contextos de invocación religiosa.
  - «Invocan» mantiene el matiz devocional de ἐπικαλουμένοις sin volverlo meramente verbal o social.
  - La puntuación refleja una sola pregunta retórica, como en el griego.
