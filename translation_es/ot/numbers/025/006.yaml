base_translation:
  language: en
  yaml_path: translation/ot/numbers/025/006.yaml
  text: And behold[a], a man from the sons of Israel came and brought a Midianite woman near to his brothers, before the eyes of Moses and before the eyes of all the congregation of the sons of Israel[b], while they were weeping at the entrance of the tent of meeting.
  footnotes:
