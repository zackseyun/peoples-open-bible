translation:
  language: es
  text: Hicieron dos anillos de oro y los pusieron sobre los dos hombreros del efod, abajo, en su parte frontal, opuesto a su unión[a], por encima de la banda tejida[b] del efod.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «frente a su unión» o «frente a su punto de unión»; el hebreo se refiere al lugar donde las partes del efod se unían.
    reason: lexical_alternative
  - marker: b
    text: O «por encima del cinto tejido del efod».
    reason: lexical_alternative
lexical_decisions:
- source_word: טַבְּעֹת
  english_pob_choice: rings
  chosen_spanish: anillos
  alternatives_spanish:
  - aros
  - anillos metálicos
  lexicon: HALOT
  rationale: En el contexto del vestuario sacerdotal, el término denota piezas de metal para sujeción. «Anillos» es natural en español y conserva bien la idea de objeto circular de oro.
- source_word: כִתְפֹת
  english_pob_choice: shoulder pieces
  chosen_spanish: hombreros
  alternatives_spanish:
  - hombros
  - piezas de hombro
  - correas de hombro
  lexicon: HALOT
  rationale: Aquí no se trata de los hombros anatómicos, sino de la parte del efod que va sobre los hombros. «Hombreros» comunica de manera clara y breve esa sección del vestido sin perder el sentido técnico.
- source_word: מִלְמַטָּה
  english_pob_choice: below
  chosen_spanish: abajo
  alternatives_spanish:
  - debajo
  - en la parte inferior
  lexicon: HALOT
  rationale: La indicación espacial es sencilla y relativa a la ubicación de los anillos. «Abajo» mantiene la concisión del hebreo y su función topográfica.
- source_word: מִמּוּל פָּנָיו
  english_pob_choice: on its front side
  chosen_spanish: en su parte frontal
  alternatives_spanish:
  - frente a su frente
  - del lado de enfrente
  lexicon: HALOT
  rationale: En un objeto como el efod, la referencia a «su rostro» se expresa con naturalidad como la parte delantera o frontal.
- source_word: לְעֻמַּת
  english_pob_choice: opposite
  chosen_spanish: frente a
  alternatives_spanish:
  - en correspondencia con
  - opuesto a
  lexicon: HALOT
  rationale: La palabra marca alineación o correspondencia de posición. «Frente a» expresa bien esa relación espacial en español sin sobrerreformularla.
- source_word: מֶחְבַּרְתּוֹ
  english_pob_choice: its joining
  chosen_spanish: su unión
  alternatives_spanish:
  - su juntura
  - su punto de unión
  - su empalme
  lexicon: HALOT
  rationale: El término señala el lugar donde las partes del efod están unidas. «Unión» conserva el valor de conexión/juntura y evita una lectura demasiado técnica o doméstica como «costura».
- source_word: חֵשֶׁב
  english_pob_choice: skillfully woven band
  chosen_spanish: cinto tejido
  alternatives_spanish:
  - banda tejida
  - cinturón tejido
  - faja tejida
  lexicon: HALOT
  rationale: En este contexto sacerdotal, el término designa la banda o cinturón tejido del efod. «Cinto tejido» es fiel, sobrio y comprensible en español bíblico moderno.
- source_word: אֵפֹד
  english_pob_choice: ephod
  chosen_spanish: efod
  alternatives_spanish:
  - efod (prenda sacerdotal)
  lexicon: HALOT
  rationale: Es un término técnico del vestuario sacerdotal y debe transliterarse. «Efod» es la forma asentada en español bíblico.
- source_word: וַיִּתְּנֻם
  english_pob_choice: put them
  chosen_spanish: los pusieron
  alternatives_spanish:
  - los colocaron
  - los situaron
  lexicon: HALOT
  rationale: El verbo indica la acción simple de colocar. «Los pusieron» suena natural en español y mantiene la simplicidad del hebreo.
translation_notes:
  revision_awareness: La base inglesa revisó «seam» a «joining» para reflejar más directamente el hebreo מֶחְבַּרְתּוֹ. En español se eligió «unión» para preservar ese mismo matiz de lugar de juntura, manteniendo la colocación espacial del versículo y la referencia al cinto tejido del efod.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» fuera del versículo porque no aparece el Tetragrámaton aquí.
  - Se transliteró «efod» siguiendo la práctica POB para términos técnicos sin equivalente único.
  - No se añadió mayúscula a «anillos» ni a «cinto» porque son sustantivos comunes en la frase descriptiva.
