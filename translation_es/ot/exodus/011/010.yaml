base_translation:
  language: en
  yaml_path: translation/ot/exodus/011/010.yaml
  text: And Moses and Aaron did all these signs before Pharaoh[a], and Yahweh hardened Pharaoh’s heart[c][b], and he did not let the sons of Israel go out from his land.
  footnotes:
