translation:
  language: es
  text: 'Entonces ella lo agarró por su prenda[b], diciendo: «¡Acuéstate[a] conmigo!» Pero él dejó su prenda en su mano y huyó y salió fuera.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «¡Duérmete conmigo!». El hebreo usa literalmente «acostarse» o «yacer» como eufemismo para una proposición sexual.
    reason: lexical_alternative
  - marker: b
    text: O «ropa», «manto» o «vestido». El hebreo usa un término general para una prenda de vestir.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַתִּתְפְּשֵׂהוּ
  english_pob_choice: she grabbed him
  chosen_spanish: lo agarró
  alternatives_spanish:
  - lo asió
  - lo sujetó
  - lo tomó fuertemente
  lexicon: HALOT
  rationale: תפשׂ expresa tomar o sujetar con firmeza. «Agarró» es natural en español y conserva la acción repentina y física del relato.
- source_word: בְּבִגְדוֹ / בִּגְדוֹ
  english_pob_choice: by his garment / his garment
  chosen_spanish: por su vestido
  alternatives_spanish:
  - por su ropa
  - por su manto
  - por su ropa exterior
  lexicon: HALOT
  rationale: בגד es un término general para una prenda o vestimenta. «Vestido» comunica bien la pieza de ropa sin especificar más de lo que el hebreo exige; «por» refleja el valor del prefijo בְ en el gesto de sujetarlo.
- source_word: לֵאמֹר
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - y dijo
  - al decir
  lexicon: HALOT
  rationale: El infinitivo de לומר introduce el discurso directo. «Diciendo» mantiene la secuencia narrativa del hebreo con naturalidad en español.
- source_word: שִׁכְבָה עִמִּי
  english_pob_choice: Lie with me!
  chosen_spanish: ¡Acuéstate conmigo!
  alternatives_spanish:
  - ¡Duérmete conmigo!
  - ¡Ten relaciones conmigo!
  lexicon: HALOT
  rationale: שׁכב con עִם es un eufemismo sexual. «Acuéstate conmigo» conserva la forma idiomática sin volverlo demasiado técnico o demasiado coloquial.
- source_word: וַיַּעֲזֹב
  english_pob_choice: he left
  chosen_spanish: dejó
  alternatives_spanish:
  - abandonó
  - soltó
  - soltó su vestido
  lexicon: HALOT
  rationale: Aquí עזב se entiende del vestido que queda atrás. «Dejó» reproduce el hecho narrativo de manera breve y natural; el objeto directo implícito se recupera por el contexto.
- source_word: בְּיָדָהּ
  english_pob_choice: in her hand
  chosen_spanish: en su mano
  alternatives_spanish:
  - en la mano de ella
  - en su poder
  lexicon: HALOT
  rationale: יד significa literalmente «mano». «En su mano» conserva el detalle físico de la escena y coincide con la imagen hebrea.
- source_word: וַיָּנָס
  english_pob_choice: fled
  chosen_spanish: huyó
  alternatives_spanish:
  - escapó
  - corrió huyendo
  lexicon: HALOT
  rationale: נוס indica huir con urgencia. «Huyó» preserva la fuerza narrativa y la brevedad del verbo hebreo.
- source_word: וַיֵּצֵא הַחוּצָה
  english_pob_choice: went outside
  chosen_spanish: salió afuera
  alternatives_spanish:
  - salió al exterior
  - salió fuera
  lexicon: HALOT
  rationale: יצא + החוצה expresa movimiento hacia afuera. «Salió afuera» es plenamente comprensible en español y mantiene el doble énfasis direccional del hebreo, aunque suene ligeramente redundante, como en el original.
theological_decisions:
- issue: Eufemismo sexual en la petición de ella
  english_pob_reading: “Lie with me!” preserves the idiomatic and literary force of the Hebrew sexual euphemism.
  chosen_spanish_reading: «¡Acuéstate conmigo!» conserva el eufemismo sexual sin explicitarlo de forma técnica.
  alternative_spanish_readings:
  - «¡Duérmete conmigo!»
  - «¡Ten relaciones conmigo!»
  rationale: El hebreo usa un giro idiomático. En español, «acostarse con» comunica de modo fiel y sobrio la proposición sexual, sin diluir el tono narrativo ni forzar una paráfrasis interpretativa.
  doctrine_reference: N/A — lexical/idiomatic rather than doctrinal
- issue: Dirección narrativa de la huida
  english_pob_reading: “went outside” preserves the directional sense.
  chosen_spanish_reading: «salió afuera» mantiene el movimiento hacia el exterior con el matiz enfático del hebreo.
  alternative_spanish_readings:
  - «salió fuera»
  - «salió al exterior»
  rationale: El hebreo combina el verbo salir con el adverbio/direccional externo. En español, la repetición puede sonar marcada, pero ayuda a preservar el énfasis narrativo del texto fuente.
  doctrine_reference: N/A — narrative/lexical
translation_notes:
  revision_awareness: 'Se siguió el audit trail inglés sin cambios sustanciales: se mantuvo el valor narrativo de תפשׂ como acción brusca, בגד como término general de vestimenta, y el eufemismo sexual de שׁכב con עִם. La única adaptación principal fue elegir un español natural que conserve la concisión y la tensión de la escena.'
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el hebreo nombra explícitamente el tetragrámaton; aquí no aplica.
  - Se mantiene «vestido» como equivalente amplio de בגד, evitando una especificación no exigida por el hebreo.
  - 'Se preserva el tono narrativo breve con verbos en secuencia: «agarró», «dejó», «huyó», «salió».'
  - Se evita explicar de más el eufemismo sexual dentro del texto principal; la nota lo aclara sin sobrecargar la línea de lectura.
