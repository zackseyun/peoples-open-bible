translation:
  language: es
  text: Sus aposentos de guardia, sus pilares laterales[a] y su pórtico[b], con ventanas todo alrededor, tenían cincuenta codos de longitud y veinticinco codos de anchura.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: También podría entenderse como 'jambas' o 'pilastras'; el término hebreo para este elemento lateral es algo técnico.
    reason: lexical_alternative
  - marker: b
    text: También podría traducirse 'vestíbulo' o 'porche' para esta estructura de entrada.
    reason: lexical_alternative
lexical_decisions:
- source_word: תָּאָיו
  english_pob_choice: Its guardrooms
  chosen_spanish: Sus guardrooms
  alternatives_spanish:
  - Sus cámaras
  - Sus celdas
  lexicon: HALOT
  rationale: El término técnico arquitectónico de Ezequiel conserva mejor la función de aposentos de vigilancia o custodia. Se deja el préstamo 'guardrooms' porque el audit trail inglés ya marcó la especialidad del término y el español puede entenderlo en un contexto bíblico-técnico sin perder precisión. 'Cámaras' o 'celdas' suavizan demasiado la fuerza funcional.
- source_word: אֵלָיו
  english_pob_choice: its side pillars
  chosen_spanish: sus pilares laterales
  alternatives_spanish:
  - sus jambas
  - sus pilastras
  lexicon: HALOT
  rationale: En español, 'pilares laterales' comunica el elemento estructural sin forzar un tecnicismo opaco. 'Jambas' sería más técnico, pero menos transparente; 'pilastras' sugiere un término arquitectónico posible, aunque no necesariamente el más natural en este pasaje.
- source_word: אֵלַמּוֹ
  english_pob_choice: its portico
  chosen_spanish: su pórtico
  alternatives_spanish:
  - su vestíbulo
  - su porche
  lexicon: HALOT
  rationale: '''Pórtico'' es el equivalente arquitectónico más natural y digno en español para esta estructura de entrada. Conserva el valor formal del espacio frontal sin rebajarla a un ''porche'' doméstico ni volverla demasiado vaga con ''vestíbulo''.'
- source_word: וְחַלּוֹנוֹת לוֹ סָבִיב סָבִיב
  english_pob_choice: with windows all around
  chosen_spanish: con ventanas todo alrededor
  alternatives_spanish:
  - y con ventanas alrededor
  - y tenía ventanas todo alrededor
  lexicon: HALOT
  rationale: La construcción expresa la disposición circunferencial de las ventanas. 'Todo alrededor' reproduce bien el valor distributivo de סָבִיב סָבִיב con español natural y sin perder la relación circunstancial.
- source_word: אֹרֶךְ חֲמִשִּׁים אַמָּה
  english_pob_choice: had a length of fifty cubits
  chosen_spanish: tenían una longitud de cincuenta codos
  alternatives_spanish:
  - eran de cincuenta codos de largo
  - medían cincuenta codos de largo
  lexicon: HALOT
  rationale: La fórmula métrica se vierte de manera clara y formal. 'Longitud' mantiene el registro técnico, y 'codos' conserva la unidad de medida del original sin modernizarla artificialmente.
- source_word: וְרֹחַב חָמֵשׁ וְעֶשְׂרִים אַמָּה
  english_pob_choice: and a width of twenty-five cubits
  chosen_spanish: y una anchura de veinticinco codos
  alternatives_spanish:
  - y medían veinticinco codos de ancho
  - y una medida de ancho de veinticinco codos
  lexicon: HALOT
  rationale: '''Anchura'' es el correlato más directo de רֹחַב y funciona bien en español bíblico contemporáneo. Se mantiene la unidad ''codos'' para no desviar el dato dimensional del texto.'
translation_notes:
  revision_awareness: La versión inglesa más reciente no introdujo cambios; se mantiene la lectura estable del audit trail y se traslada al español con equivalencias arquitectónicas transparentes.
  spanish_consistency_notes:
  - Se preserva el registro arquitectónico técnico sin neutralizarlo en términos demasiado generales.
  - Se mantuvieron las unidades de medida del original ('codos') para conservar exactitud y auditabilidad.
  - Se usó 'pórtico' como término principal, coherente con la opción inglesa documentada y natural en español culto.
