translation:
  language: es
  text: Si concedes a tu alma el placer que desea[a], te hará alegría para tus enemigos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Si complaces a tu alma con el placer de su anhelo, llegarás a ser algo de lo que tus enemigos se alegren».'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐὰν
  english_pob_choice: If
  chosen_spanish: Si
  alternatives_spanish:
  - Cuando
  - Siempre que
  lexicon: BDAG
  rationale: La cláusula es condicional y de tono sapiencial; «Si» reproduce con naturalidad la advertencia del griego sin añadir temporalidad que el texto no exige.
- source_word: χορηγήσεις
  english_pob_choice: you grant
  chosen_spanish: concedes
  alternatives_spanish:
  - das
  - suministras
  - proporcionas
  - te dejas llevar por
  lexicon: BDAG
  rationale: El verbo implica suministrar o proveer; en español, «concedes» expresa bien la idea de otorgar/permitir a la propia alma aquello que pide, sin volverlo más interpretativo de lo necesario.
- source_word: τῇ ψυχῇ σου
  english_pob_choice: your soul
  chosen_spanish: tu alma
  alternatives_spanish:
  - a ti mismo
  - tu ser
  - tu vida
  - tu apetito
  lexicon: BDAG
  rationale: Se mantiene ψυχή con «alma» para hacer visible el sustantivo del original. En este contexto sapiencial puede rozar la esfera del deseo interior, pero no se reduce el término a «apetito».
- source_word: εὐδοκίαν
  english_pob_choice: the pleasure
  chosen_spanish: el placer
  alternatives_spanish:
  - la satisfacción
  - el deleite
  - lo agradable
  lexicon: BDAG
  rationale: Aquí el sentido es lo que agrada o satisface; «placer» comunica bien la fuerza de gratificación personal que la advertencia pone en cuestión.
- source_word: ἐπιθυμίας
  english_pob_choice: it desires
  chosen_spanish: que desea
  alternatives_spanish:
  - de deseo
  - de anhelo
  - de codicia
  lexicon: BDAG
  rationale: El genitivo califica al placer como ligado al deseo. «Que desea» hace clara la relación sin llevar la palabra a un sentido sexual o moral más estrecho que el del griego.
- source_word: ποιήσει σε
  english_pob_choice: it will make you
  chosen_spanish: te convertirá en
  alternatives_spanish:
  - te hará
  - te volverá
  - te hará ser
  lexicon: BDAG
  rationale: La construcción causativa expresa transformación resultante; «te convertirá en» refleja mejor el efecto de devenir algo para otros, no solo un cambio genérico.
- source_word: ἐπίχαρμα
  english_pob_choice: a joy
  chosen_spanish: alegría
  alternatives_spanish:
  - gozo
  - motivo de júbilo
  - objeto de regocijo
  - algo de lo que se alegren
  lexicon: LSJ
  rationale: En contexto, el sustantivo designa algo sobre lo que otros se alegran. «Alegría» mantiene la idea de objeto de regocijo y, con el complemento siguiente, deja clara la connotación hostil.
- source_word: τῶν ἐχθρῶν σου
  english_pob_choice: to your enemies
  chosen_spanish: para tus enemigos
  alternatives_spanish:
  - de tus enemigos
  - a tus enemigos
  lexicon: BDAG
  rationale: 'Con «alegría», el complemento más natural en español es «para tus enemigos», que preserva la relación de beneficio irónico: ellos se alegran por tu caída o degradación.'
theological_decisions:
- issue: ψυχή y la antropología del versículo
  english_pob_reading: Retain 'soul' in the main text
  chosen_spanish_reading: Mantener «alma» en el texto principal
  alternative_spanish_readings:
  - «a ti mismo»
  - «tu apetito»
  rationale: El texto griego nombra explícitamente la ψυχή; la traducción conserva esa terminología para no borrar la tensión entre interioridad, deseo y autocontrol que el dicho sapiencial presenta.
  doctrine_reference: 'DOCTRINE.md §Translation philosophy: original-language primacy; readable modern Spanish'
- issue: ἐπίχαρμα τῶν ἐχθρῶν σου y el matiz hostil
  english_pob_reading: a joy to your enemies
  chosen_spanish_reading: «alegría para tus enemigos»
  alternative_spanish_readings:
  - «gozo para tus enemigos»
  - «objeto de regocijo para tus enemigos»
  - «algo de lo que tus enemigos se alegren»
  rationale: 'La expresión conserva la imagen de ser causa de regocijo para enemigos. No se adelanta una glosa como «hazmerreír», porque el griego puede ser más amplio: no solo burla, sino también triunfo o satisfacción hostil.'
  doctrine_reference: 'DOCTRINE.md §Translation philosophy: optimal equivalence; preserve ambiguity where present'
translation_notes:
  revision_awareness: La revisión inglesa más reciente sustituyó «a delight to your enemies» por «a joy to your enemies» para reflejar mejor ἐπίχαρμα. La redacción española sigue ese ajuste con «alegría para tus enemigos», manteniendo el condicional, el objeto interno de deseo y el resultado hostil sin añadir una paráfrasis excesiva.
  spanish_consistency_notes:
  - Se mantiene «alma» para ψυχή, en coherencia con la terminología POB de visibilizar el término fuente cuando no hay razón fuerte para neutralizarlo.
  - Se evita «Cristo/Señor» o vocabulario eclesiástico ajeno; el versículo es sapiencial y no requiere terminología confesional.
  - El tono es moderno pero sobrio, apto para publicación, y conserva la advertencia moral del original.
