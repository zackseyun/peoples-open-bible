translation:
  language: es
  text: 'Pero Joab dijo[a]: «¡Yahvé añada a su pueblo cien veces más de los que son! ¿No son todos, mi señor el rey[c][b], siervos de mi señor? ¿Por qué busca mi señor esto? ¿Por qué habría de ser esto una culpa para Israel?»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Que Yahvé añada a su pueblo cien veces más de los que son».'
    reason: alternative_reading
  - marker: b
    text: 'O: «¿No son todos esclavos de mi señor?».'
    reason: lexical_alternative
  - marker: c
    text: Es decir, culpa o responsabilidad que vendría sobre Israel por esta acción.
    reason: cultural_note
lexical_decisions:
- source_word: יוֹסֵף / יְהוָה
  english_pob_choice: May Yahweh add
  chosen_spanish: ¡Yahvé añada!
  alternatives_spanish:
  - Yahvé añadirá
  - Que Yahvé añada
  lexicon: HALOT
  rationale: El hebreo usa un jussivo optativo, una expresión de deseo o súplica; en español la forma exhortativa/subjuntiva «añada» comunica mejor esa fuerza que un futuro simple. Se conserva «Yahvé» para el Tetragrama, siguiendo la decisión POB documentada.
- source_word: עַל עַמּוֹ כָּהֵם מֵאָה פְעָמִים
  english_pob_choice: to his people a hundred times as many as they are
  chosen_spanish: a su pueblo cien veces más de los que son
  alternatives_spanish:
  - a su pueblo cien veces más
  - sobre su pueblo cien veces más de los que son
  lexicon: HALOT
  rationale: La construcción comparativa expresa multiplicación respecto de la cantidad presente. «Cien veces más de los que son» reproduce la relación comparativa sin cargar el español con una perífrasis excesiva.
- source_word: הֲלֹא
  english_pob_choice: Are ... not
  chosen_spanish: ¿No son ...?
  alternatives_spanish:
  - ¿Acaso no son ...?
  - ¿No es verdad que son ...?
  lexicon: HALOT
  rationale: Se trata de una pregunta retórica que espera asentimiento. «¿No son...?» es natural en español y mantiene esa fuerza discursiva.
- source_word: אֲדֹנִי הַמֶּלֶךְ
  english_pob_choice: my lord the king
  chosen_spanish: mi señor el rey
  alternatives_spanish:
  - mi señor, el rey
  - mi señor rey
  lexicon: HALOT
  rationale: El vocativo cortesano se expresa con «mi señor el rey», una fórmula digna y directa en español. Se evita «maestro» por no corresponder al registro real del pasaje.
- source_word: כֻּלָּם לַאדֹנִי לַעֲבָדִים
  english_pob_choice: servants of my lord
  chosen_spanish: siervos de mi señor
  alternatives_spanish:
  - esclavos de mi señor
  - servidores de mi señor
  lexicon: HALOT
  rationale: Aquí el contexto es de sujeción política y cortesana. En español, «siervos» conserva subordinación personal sin forzar la lectura de esclavitud chattel que podría oscurecer la escena. Se mantiene la tensión léxica documentada, aunque POB inglés optó por «servants».
- source_word: יְבַקֵּשׁ זֹאת
  english_pob_choice: seek this
  chosen_spanish: pide esto
  alternatives_spanish:
  - busca esto
  - requiere esto
  lexicon: HALOT
  rationale: Aunque בקש puede ser «buscar», en este contexto la frase se refiere al acto de solicitar o procurar un censo. «Pide esto» suena natural en español y conserva el sentido de demanda o búsqueda activa.
- source_word: לְאַשְׁמָה
  english_pob_choice: guilt
  chosen_spanish: culpa
  alternatives_spanish:
  - culpabilidad
  - falta
  lexicon: HALOT
  rationale: El sustantivo designa responsabilidad o culpabilidad resultante, no una ofrenda. «Culpa» comunica bien la carga moral/jurídica en español.
- source_word: יִהְיֶה לְאַשְׁמָה לְיִשְׂרָאֵל
  english_pob_choice: should it become guilt for Israel
  chosen_spanish: habría de ser esto una culpa para Israel
  alternatives_spanish:
  - llegaría a ser culpa para Israel
  - sería culpa para Israel
  lexicon: HALOT
  rationale: La construcción con imperfecto en interrogación retórica sugiere posibilidad o consecuencia temida. «Habría de ser» conserva esa eventualidad y el tono prudencial de Joab.
theological_decisions:
- issue: Renderización del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - SEÑOR
  rationale: El texto hebreo contiene el nombre propio divino, no un título. Siguiendo la política POB, se conserva una forma transliterada del nombre en español; «Yahvé» es la forma estándar de esta serie y evita la sustitución por un título enmascarado.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Valor semántico de עֲבָדִים respecto del rey
  english_pob_reading: servants
  chosen_spanish_reading: siervos
  alternative_spanish_readings:
  - esclavos
  - servidores
  rationale: 'El contexto inmediato es cortesano-político: el pueblo pertenece al ámbito de autoridad del rey. «Siervos» mantiene subordinación y dignidad relacional; «esclavos» sería posible lexicalmente, pero en español desplaza el foco hacia la esclavitud material más que hacia la lealtad bajo el rey.'
  doctrine_reference: 'DOCTRINE.md Contested terms: δοῦλος servant / slave (context-dependent); consistency by documented exception principle'
translation_notes:
  revision_awareness: 'El pasaje coincide sustancialmente con la última revisión auditada: no se requieren cambios textuales de fondo. Se mantiene la equivalencia óptima ya aprobada, ajustando la formulación española para mayor naturalidad sin perder la fuerza jussiva, retórica y cortesana del hebreo.'
  spanish_consistency_notes:
  - Se conserva «Yahvé» de forma uniforme para יְהוָה, conforme al estándar POB.
  - Se usa «mi señor el rey» como vocativo de corte y «mi señor» para repetir el tratamiento dentro de la pregunta.
  - «Siervos» se eligió por contexto político-cortesano; se documenta la alternativa «esclavos» en nota para no borrar la tensión léxica.
  - «Culpa» reproduce el sentido de אשׁמה como responsabilidad o imputación de culpa, no como ofrenda.
