translation:
  language: es
  text: Ahora los amalecitas y los cananeos están viviendo en el valle. Mañana, vuélvanse y pónganse en marcha hacia el desierto, por el camino del mar Rojo[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «mar de Juncos». Tradicionalmente se traduce «mar Rojo».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהָעֲמָלֵקִי
  english_pob_choice: Now the Amalekites
  chosen_spanish: Ahora los amalecitas
  alternatives_spanish:
  - Y el amalecita
  - Los amalecitas
  lexicon: HALOT
  rationale: El sustantivo gentilicio singular con artículo funciona colectivamente para el pueblo; en español, el plural es el equivalente natural. Se conserva el matiz discursivo de וְ con «Ahora», como en la solución inglesa, para introducir la observación contextual sin sonar meramente aditivo.
- source_word: וְהַכְּנַעֲנִי
  english_pob_choice: and the Canaanites
  chosen_spanish: y los cananeos
  alternatives_spanish:
  - y el cananeo
  lexicon: HALOT
  rationale: Como en el caso anterior, el singular con artículo designa al grupo étnico. El plural español comunica mejor el referente colectivo y evita una forma demasiado artificial.
- source_word: יוֹשֵׁב
  english_pob_choice: are living
  chosen_spanish: están viviendo
  alternatives_spanish:
  - habitan
  - viven
  - están habitando
  lexicon: HALOT
  rationale: El participio expresa una acción de residencia en curso. «Están viviendo» mantiene el valor durativo y resulta natural en español moderno.
- source_word: בָּעֵמֶק
  english_pob_choice: in the valley
  chosen_spanish: en el valle
  alternatives_spanish:
  - en la hondonada
  - en la llanura
  lexicon: HALOT
  rationale: עֵמֶק se refiere aquí a un valle o zona baja. «Valle» es la opción más directa e idiomática en español.
- source_word: מָחָר
  english_pob_choice: Tomorrow
  chosen_spanish: Mañana
  alternatives_spanish:
  - Al día siguiente
  lexicon: HALOT
  rationale: Adverbio temporal sencillo; «Mañana» es la equivalencia natural y concisa.
- source_word: פְּנוּ
  english_pob_choice: turn
  chosen_spanish: den vuelta
  alternatives_spanish:
  - giren
  - vuélvanse
  - cambien de dirección
  lexicon: HALOT
  rationale: El imperativo pide un cambio de dirección. «Den vuelta» transmite el giro con claridad y sin añadir explícitamente «atrás», que no está en el verbo mismo.
- source_word: וּסְעוּ
  english_pob_choice: and set out
  chosen_spanish: pónganse en marcha
  alternatives_spanish:
  - y salgan
  - y emprendan viaje
  - y marchen
  lexicon: HALOT
  rationale: נסע en contexto de viaje implica levantar el campamento y avanzar. «Pónganse en marcha» comunica bien la orden de partida en español.
- source_word: לָכֶם
  english_pob_choice: for yourselves
  chosen_spanish: para ustedes
  alternatives_spanish:
  - para vosotros
  - para ustedes mismos
  lexicon: HALOT
  rationale: El pronombre dativo refuerza la dirección de la orden. En español, «para ustedes» conserva la referencia directa sin forzar una reflexividad que el texto no exige necesariamente.
- source_word: הַמִּדְבָּר
  english_pob_choice: the wilderness
  chosen_spanish: el desierto
  alternatives_spanish:
  - la estepa
  - el yermo
  lexicon: HALOT
  rationale: Aunque מִדְבָּר puede abarcar la idea de «wilderness», en este contexto de marcha geográfica el español «desierto» resulta más natural y comprensible. Se evita «desierto» como categoría exclusivamente arenosa; aquí funciona como región deshabitada o semideshabitada.
- source_word: דֶּרֶךְ יַם סוּף
  english_pob_choice: by the way of the Red Sea
  chosen_spanish: por el camino del mar Rojo
  alternatives_spanish:
  - por la ruta del mar Rojo
  - por el camino del mar de Juncos
  lexicon: HALOT
  rationale: דֶּרֶךְ indica ruta o trayecto, por lo que «por el camino de» reproduce bien la relación. Se mantiene «mar Rojo» por ser el designador tradicional ya reflejado en el texto inglés, sin ocultar que la base hebrea puede leerse más literalmente como «mar de Juncos».
translation_notes:
  revision_awareness: 'Se siguió la lectura inglesa auditada sin cambios de fondo: gentilicios colectivos en plural, participio durativo, y la equivalencia tradicional de יַם סוּף en el cuerpo principal con una nota transparente sobre la alternativa más literal. No se detectaron revisiones aplicadas en el pasaje fuente.'
  spanish_consistency_notes:
  - Se preservó el contraste entre «Yahvé» y «Dios» según el estándar del proyecto, aunque este versículo no contiene ninguno de esos lexemas.
  - Se evitó «SEÑOR» o formulaciones litúrgicas no presentes en el hebreo.
  - La nota [a] se ancla en «mar Rojo» para mantener la transparencia sobre la opción literal «mar de Juncos».
