translation:
  language: es
  text: Entonces escribió cartas en nombre de Acab[a], las selló con su sello y envió las cartas a los ancianos y a los nobles que estaban en su ciudad, los que vivían con Nabot.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «que estaban en la ciudad de Acab». El sufijo de «su ciudad» puede entenderse como referido a Nabot o a Acab.'
    reason: alternative_reading
lexical_decisions:
- source_word: וַתִּכְתֹּב
  english_pob_choice: So she wrote
  chosen_spanish: Así que ella escribió
  alternatives_spanish:
  - Y ella escribió
  - Entonces escribió
  lexicon: HALOT
  rationale: El waw consecutivo avanza la acción narrativa; «Así que» comunica bien la secuencia en español sin volver el texto rígido. El sujeto femenino se conserva explícito para reflejar a Jezabel por el contexto.
- source_word: סְפָרִים / הַסְּפָרִים
  english_pob_choice: letters / the letters
  chosen_spanish: cartas / las cartas
  alternatives_spanish:
  - documentos
  - escritos
  lexicon: HALOT
  rationale: En este contexto de comunicación oficial enviada a autoridades locales, «cartas» es la equivalencia más natural y precisa en español. «Documentos» es posible, pero menos específico; «escritos» resulta más general.
- source_word: בְּשֵׁם אַחְאָב
  english_pob_choice: in Ahab’s name
  chosen_spanish: en nombre de Ahab
  alternatives_spanish:
  - bajo el nombre de Ahab
  - en el nombre de Ahab
  lexicon: HALOT
  rationale: La frase indica representación o autoridad delegada. «En nombre de Ahab» conserva ese valor idiomático en español de forma clara y fiel.
- source_word: וַתַּחְתֹּם בְּחֹתָמוֹ
  english_pob_choice: sealed them with his seal
  chosen_spanish: las selló con su sello
  alternatives_spanish:
  - las cerró con su sello
  - las selló con su anillo-sello
  lexicon: HALOT
  rationale: «Sellar» reproduce היטב el acto de autenticar un escrito con un sello oficial. La forma breve «con su sello» es natural y corresponde al hebreo sin añadir detalles no explícitos.
- source_word: הַזְּקֵנִים
  english_pob_choice: the elders
  chosen_spanish: los ancianos
  alternatives_spanish:
  - los líderes
  - los ancianos de la ciudad
  lexicon: HALOT
  rationale: «Ancianos» es la traducción estándar y conserva el matiz de autoridades civiles locales. La especificación «de la ciudad» no está en el sustantivo mismo y se deja para el contexto.
- source_word: הַחֹרִים
  english_pob_choice: the nobles
  chosen_spanish: los nobles
  alternatives_spanish:
  - los notables
  - los oficiales
  lexicon: HALOT
  rationale: «Nobles» expresa adecuadamente el rango social de personas prominentes o de alta condición. «Notables» también sería viable, pero menos directo.
- source_word: אֲשֶׁר בְּעִירוֹ
  english_pob_choice: who were in his city
  chosen_spanish: que estaban en su ciudad
  alternatives_spanish:
  - que estaban en la ciudad de él
  - que estaban en la ciudad de Nabot
  - que estaban en la ciudad de Ahab
  lexicon: HALOT
  rationale: Se mantiene la ambigüedad del sufijo posesivo sin resolverla en el texto principal. «Su ciudad» reproduce la tensión del hebreo y permite la doble referencia posible que el POB inglés preserva en nota.
- source_word: הַיֹּשְׁבִים אֶת נָבוֹת
  english_pob_choice: who were living with Naboth
  chosen_spanish: los que vivían con Nabot
  alternatives_spanish:
  - los que habitaban con Nabot
  - los que residían con Nabot
  - los que se sentaban con Nabot
  lexicon: HALOT
  rationale: יָשַׁב con אֶת expresa convivencia o residencia junto a alguien. «Vivían con Nabot» conserva ese valor relacional/local sin sobreinterpretarlo.
theological_decisions:
- issue: Referente del sufijo en בְּעִירוֹ
  english_pob_reading: ‘his city’ refers to Naboth, with an alternative that it could refer to Ahab preserved in a footnote
  chosen_spanish_reading: «su ciudad» se deja ambiguo en el texto principal, con la posibilidad de Nabot o Ahab preservada en nota
  alternative_spanish_readings:
  - «su ciudad» entendido como la ciudad de Nabot
  - «su ciudad» entendido como la ciudad de Ahab
  rationale: El hebreo permite más de una lectura, y el POB inglés decidió no cerrar la cuestión sin nota. La traducción española conserva esa tensión en el cuerpo principal y la explicita en la nota.
  doctrine_reference: 'Translation philosophy §3: preserve theological/interpretive tension rather than resolve it silently'
translation_notes:
  revision_awareness: La redacción sigue la última revisión del POB inglés, que añadió la segunda preposición «a» delante de «los nobles» y ajustó la cláusula participial a una forma más natural. Por eso el español conserva la doble coordinación («a los ancianos y a los nobles») y usa «los que vivían con Nabot» para reflejar la frase participial sin forzarla.
  spanish_consistency_notes:
  - Se mantiene «Ahab» y «Nabot» como formas propias ya establecidas en la serie.
  - Se usa «cartas» para סְפָרִים en este contexto administrativo, en línea con el valor epistolar del pasaje.
  - Se conserva «en nombre de» como fórmula idiomática para בְּשֵׁם.
  - «Ancianos» y «nobles» se mantienen como términos de rango social, sin introducir glosas interpretativas en el texto principal.
